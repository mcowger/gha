<script id="project-data" type="application/json">[{"owner":"arihantcodes","repo":"spectrum-ui","url":"https://github.com/arihantcodes/spectrum-ui","readme":"<div align=\"center\">\n  <h1>Spectrum UI</h1>\n<a href=\"https://x.com/arihantCodes\">\nFollow Us on X\n</a>\n  \n</div>\n<div align=\"center\">\n<br />\n<br />\n<a href=\"https://vercel.com/oss\">\n  <img alt=\"Vercel OSS Program\" src=\"https://vercel.com/oss/program-badge.svg\" />\n</a>\n</div>\n<br />\n\n\n![ui.spectrumhq.in](public/og.png)\n\n\n## Contributing to Spectrum UI\n\nThank you for your interest in contributing to Spectrum UI! 🎉  \nWe value contributions from the community, whether it's a bug fix, a new feature, or an enhancement. Your input helps us grow and improve the library.\n\n---\n\n### How to Contribute\n\nFollow these steps to get started with contributing to Spectrum UI:\n\n---\n\n#### 1. **Fork the Repository**\n\nClick the \"Fork\" button at the top-right of the repository page to create your own copy of the project.\n\n---\n\n#### 2. **Clone Your Fork**\n\nClone your forked repository to your local machine:\n\n```bash\ngit clone https://github.com/arihantcodes/spectrum-ui.git\ncd spectrum-ui\n```\n\n---\n\n#### 3. **Install Dependencies**\n\nRun the following command to install the project's dependencies:\n\n```bash\nnpm install\n```\n\n---\n\n#### 4. **Start the Development Server**\n\nRun the development server to test your changes locally:\n\n```bash\nnpm run dev\n```\n\n---\n\n#### 5. **Create a New Branch**\n\nCreate a branch for your feature or fix:\n\n```bash\ngit checkout -b feature-name\n```\n\n---\n\n#### 6. **Make Your Changes**\n\nEdit the code to implement your feature or fix the bug.\n\n---\n\n#### 7. **Commit Your Changes**\n\nAfter making your changes, commit them with a descriptive message:\n\n```bash\ngit commit -m \"Add feature-name\"\n```\n\n---\n\n#### 8. **Push Your Changes**\n\nPush your branch to your forked repository:\n\n```bash\ngit push origin feature-name\n```\n\n---\n\n#### 9. **Create a Pull Request (PR)**\n\n- Go to the [Pull Requests](https://github.com/your-username/spectrum-ui/pulls) section of the original repository.\n- Click **\"New Pull Request\"**.\n- Select your branch and submit your PR.\n- Provide a clear description of your changes, including why they are beneficial.\n\n---\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/svg?repos=arihantcodes/spectrum-ui&type=Date)](https://www.star-history.com/#arihantcodes/spectrum-ui&Date)\n\n\n### Contributors\n\nThanks to all the amazing contributors who have helped improve Spectrum UI! 💖\n\n<div align=\"center\">\n\n![Contributors](https://contributors-img.web.app/image?repo=arihantcodes/spectrum-ui)\n\n</div>\n\n\n\nhi\n\n","summary":"Spectrum UI is a modern component library designed to provide developers with a collection of reusable, aesthetic interface elements for web applications. The project simplifies the frontend development process by offering pre-built components that help streamline the creation of polished, professional user interfaces. It is an ideal resource for developers and designers who want to accelerate their workflow while maintaining a high standard of visual quality in their projects.","description":"Spectrum UI ⭐ is a collection of re-usable components built using Aceternity UI Magic UI and ShadCN UI that you can copy and paste into your apps.","stars":993,"language":"TypeScript"},{"owner":"untitleduico","repo":"react","url":"https://github.com/untitleduico/react","readme":"[![Untitled UI React](https://www.untitledui.com/react/untitled-ui-react-open-graph.jpg)](https://www.untitledui.com/react)\n\n# Untitled UI React\n\n[Untitled UI React](https://www.untitledui.com/react) is the world’s largest collection of open-source React components built with Tailwind CSS and React Aria. Everything you need to design and develop modern, beautiful interfaces—fast. Just copy, paste, and build.\n\nBuilt with React 19.2, Tailwind CSS v4.2, TypeScript 5.9, and React Aria, Untitled UI React components deliver modern performance, type safety, and maintainability.\n\n[Learn more](https://www.untitledui.com/react) • [Documentation](https://www.untitledui.com/react/docs/introduction) • [Figma](https://www.untitledui.com/figma) • [FAQs](https://www.untitledui.com/faqs)\n\n## Documentation\n\nCheck out our documentation here → [untitledui.com/react/docs](https://www.untitledui.com/react/docs/introduction)\n\n## Installation\n\nCheck out our installation guide here → [untitledui.com/react/docs/installation](https://www.untitledui.com/react/docs/installation)\n\n## Resources\n\nUntitled UI React is built on top of [Untitled UI Figma](https://www.untitledui.com/figma), the world's largest and most popular Figma UI kit and design system. Explore more:\n\n**[Untitled UI Figma:](https://www.untitledui.com/figma)** The world's largest Figma UI kit and design system.\n<br/>\n**[Untitled UI Icons:](https://www.untitledui.com/icons)** A clean, consistent, and neutral icon library crafted specifically for modern UI design.\n<br/>\n**[Untitled UI file icons:](https://www.untitledui.com/resources/file-icons)** Free file format icons, designed specifically for modern web and UI design.\n<br/>\n**[Untitled UI flag icons:](https://www.untitledui.com/resources/flag-icons)** Free country flag icons, designed specifically for modern web and UI design.\n<br/>\n**[Untitled UI avatars:](https://www.untitledui.com/resources/avatars)** Free placeholder user avatars and profile pictures to use in your projects.\n<br/>\n**[Untitled UI logos:](https://www.untitledui.com/resources/logos)** Free fictional company logos to use in your projects.\n\n## License\n\nUntitled UI React open-source components are licensed under the MIT license, which means you can use them for free in unlimited commercial projects.\n\n> [!NOTE]\n> This license applies only to the components included in this open-source repository. [Untitled UI React PRO](https://www.untitledui.com/react) includes hundreds more advanced UI components and page examples and is subject to a separate [license agreement](https://www.untitledui.com/license).\n\n[Untitled UI license agreement →](https://www.untitledui.com/license)\n\n[Frequently asked questions →](https://www.untitledui.com/faqs)\n","summary":"Untitled UI React is a comprehensive open-source library that provides a vast collection of pre-built React components designed for rapid interface development. Built using Tailwind CSS, React Aria, and TypeScript, the library emphasizes modern performance, type safety, and seamless integration for developers working on sophisticated web projects. This resource is ideal for front-end engineers and designers looking to streamline their workflow by simply copying and pasting high-quality, maintainable components into their applications.","description":"Untitled UI React is the world’s largest collection of open-source React components built with Tailwind CSS and React Aria. Just copy, paste, and build.","stars":1755,"language":"TypeScript"},{"owner":"FormidableLabs","repo":"victory","url":"https://github.com/FormidableLabs/victory","readme":"<div align=\"center\">\n  <a href=\"https://commerce.nearform.com/open-source/\" target=\"_blank\">\n    <img alt=\"Victory — Formidable, We build the modern web\" src=\"https://oss.nearform.com/api/banner.svg?badge=victory&bg=9c2f1e\" />\n  </a>\n\n  <strong>\n    an ecosystem of composable React components for building interactive data visualizations.\n  </strong>\n\n  <br />\n  <br />\n\n  <a href=\"https://npmjs.com/package/victory\">\n    <img alt=\"weekly downloads\" src=\"https://img.shields.io/npm/dw/victory.svg\">\n  </a>\n  <a href=\"https://npmjs.com/package/victory\">\n    <img alt=\"current version\" src=\"https://img.shields.io/npm/v/victory.svg\">\n  </a>\n  <a href=\"https://github.com/FormidableLabs/victory/actions\">\n    <img alt=\"build status\" src=\"https://github.com/FormidableLabs/victory/actions/workflows/ci.yml/badge.svg\">\n  </a>\n\n  <a href=\"https://github.com/FormidableLabs/victory#maintenance-status\">\n    <img alt=\"Maintenance Status\" src=\"https://img.shields.io/badge/maintenance-active-green.svg\" />\n  </a>\n\n  <br />\n  <br />\n</div>\n\n# `Victory`\n\n## Contents\n\n- [Getting Started](#getting-started)\n- [Victory Native](#victory-native)\n- [API Documentation](http://commerce.nearform.com/open-source/victory/docs)\n- [Guides](http://commerce.nearform.com/open-source/victory/guides)\n- [Contributing](#contributing)\n\n* See the **docs and examples** on the website: https://commerce.nearform.com/open-source/victory\n* **Experiment** with all Victory components in this [code sandbox](https://codesandbox.io/s/dj4f7t)\n\n## Getting started\n\n1. Add Victory to your project:\n\n```sh\n# npm\n$ npm i --save victory\n# or yarn\n$ yarn add victory\n```\n\n2. Add your first Victory component:\n\n```js\nimport React from \"react\";\nimport { render } from \"react-dom\";\nimport { VictoryPie } from \"victory\";\n\nconst PieChart = () => {\n  return <VictoryPie />;\n};\n\nrender(<PieChart />, document.getElementById(\"app\"));\n```\n\n3. `VictoryPie` component will be rendered, and you should see:\n\n<p align=\"center\">\n  <img align=\"center\" width=\"471\" alt=\"pie\" src=\"https://cloud.githubusercontent.com/assets/3719995/20915779/b51e3652-bb3c-11e6-8243-6e7521a59115.png\">\n</p>\n\n<br />\n\n## Requirements\n\nProjects using Victory should also depend on [React][]. As of `victory@34.0.0` Victory requires React version `16.3.0` or above\n\n## Victory Native\n\nVictory Native shares most of its code with Victory, and has a nearly identical API! To learn more, check out the [Victory Native package README](./packages/victory-native/README.md).\n\n## Contributing\n\nPlease see the [Contributing guide](CONTRIBUTING.md).\n\n## Maintenance Status\n\n**Active:** Formidable is actively working on this project, and we expect to continue to work for the foreseeable future. Bug reports, feature requests and pull requests are welcome.\n\n[react]: https://facebook.github.io/react/\n","summary":"Victory is an ecosystem of composable React components designed for building interactive and highly customizable data visualizations. It provides a consistent API that allows developers to easily integrate charts into both web and React Native applications. This project is an ideal solution for frontend developers who need a robust, maintainable, and flexible library to handle complex data representation in their React-based projects.","description":"A collection of composable React components for building interactive data visualizations","stars":11240,"language":"TypeScript"},{"owner":"magicuidesign","repo":"magicui","url":"https://github.com/magicuidesign/magicui","readme":"<img alt=\"Magic UI - UI Library for Design Engineers\" src=\"https://cdn.magicui.design/bento-grid.gif\" width=\"100%\">\n<h3 align=\"center\">Magic UI</h3>\n<p align=\"center\">\n    UI Library for Design Engineers\n</p>\n<div align=\"center\">\n  <a href=\"https://github.com/magicuidesign/magicui/stargazers\"><img alt=\"GitHub Repo stars\" src=\"https://img.shields.io/github/stars/magicuidesign/magicui\"></a>\n  <a href=\"https://twitter.com/magicuidesign\"><img alt=\"Twitter Follow\" src=\"https://img.shields.io/twitter/follow/magicuidesign\"></a>\n  <a href=\"https://github.com/magicuidesign/magicui/blob/main/LICENSE.md\"><img alt=\"License\" src=\"https://img.shields.io/badge/License-MIT-yellow.svg\"></a>\n  <a href=\"https://discord.com/invite/87p2vpsat5\"><img alt=\"Discord\" src=\"https://img.shields.io/discord/1151315619246002176\"></a>\n  \n</div>\n\n## Documentation\n\nVisit https://magicui.design/docs to view the documentation.\n\n## Contributing\n\nVisit our [contributing guide](https://github.com/magicuidesign/magicui/blob/main/CONTRIBUTING.md) to learn how to contribute. It only takes ~5 minutes to add your own build]: https://github.com/gitleaks/gitleaks/actions/workflows/test.yml/badge.svg\n[build]: https://github.com/gitleaks/gitleaks/actions/workflows/test.yml\n[go-report-card-badge]: https://goreportcard.com/badge/github.com/gitleaks/gitleaks/v8\n[go-report-card]: https://goreportcard.com/report/github.com/gitleaks/gitleaks/v8\n[dockerhub]: https://hub.docker.com/r/zricethezav/gitleaks\n[dockerhub-badge]: https://img.shields.io/docker/pulls/zricethezav/gitleaks.svg\n[gitleaks-action]: https://github.com/gitleaks/gitleaks-action\n[gitleaks-badge]: https://img.shields.io/badge/protected%20by-gitleaks-blue\n\n\n[![GitHub Action Test][badge-build]][build]\n[![Docker Hub][dockerhub-badge]][dockerhub]\n[![Gitleaks Action][gitleaks-badge]][gitleaks-action]\n[![GoDoc][go-docs-badge]][go-docs]\n[![GoReportCard][go-report-card-badge]][go-report-card]\n[![License][badge-license]][license]\n\nGitleaks is a tool for **detecting** secrets like passwords, API keys, and tokens in git repos, files, and whatever else you wanna throw at it via `stdin`. If you wanna learn more about how the detection engine works check out this blog: [Regex is (almost) all you need](https://lookingatcomputer.substack.com/p/regex-is-almost-all-you-need).\n\n```\n➜  ~/code(master) gitleaks git -v\n\n    ○\n    │╲\n    │ ○\n    ○ ░\n    ░    gitleaks\n\n\nFinding:     \"export BUNDLE_ENTERPRISE__CONTRIBSYS__COM=cafebabe:deadbeef\",\nSecret:      cafebabe:deadbeef\nRuleID:      sidekiq-secret\nEntropy:     2.609850\nFile:        cmd/generate/config/rules/sidekiq.go\nLine:        23\nCommit:      cd5226711335c68be1e720b318b7bc3135a30eb2\nAuthor:      John\nEmail:       john@users.noreply.github.com\nDate:        2022-08-03T12:31:40Z\nFingerprint: cd5226711335c68be1e720b318b7bc3135a30eb2:cmd/generate/config/rules/sidekiq.go:sidekiq-secret:23\n```\n\n\n## Getting Started\n\nGitleaks can be installed using Homebrew, Docker, or Go. Gitleaks is also available in binary form for many popular platforms and OS types on the [releases page](https://github.com/gitleaks/gitleaks/releases). In addition, Gitleaks can be implemented as a pre-commit hook directly in your repo or as a GitHub action using [Gitleaks-Action](https://github.com/gitleaks/gitleaks-action).\n\n### Installing\n\n```bash\n# MacOS\nbrew install gitleaks\n\n# Docker (DockerHub)\ndocker pull zricethezav/gitleaks:latest\ndocker run -v ${path_to_host_folder_to_scan}:/path zricethezav/gitleaks:latest [COMMAND] [OPTIONS] [SOURCE_PATH]\n\n# Docker (ghcr.io)\ndocker pull ghcr.io/gitleaks/gitleaks:latest\ndocker run -v ${path_to_host_folder_to_scan}:/path ghcr.io/gitleaks/gitleaks:latest [COMMAND] [OPTIONS] [SOURCE_PATH]\n\n# From Source (make sure `go` is installed)\ngit clone https://github.com/gitleaks/gitleaks.git\ncd gitleaks\nmake build\n```\n\n### Pre-Commit\n\n1. Install pre-commit from https://pre-commit.com/#install\n2. Create a `.pre-commit-config.yaml` file at the root of your repository with the following content:\n\n   ```\n   repos:\n     - repo: https://github.com/gitleaks/gitleaks\n       rev: v8.24.2\n       hooks:\n         - id: gitleaks\n   ```\n\n   for a [native execution of gitleaks](https://github.com/gitleaks/gitleaks/releases) or use the [`gitleaks-docker` pre-commit ID](https://github.com/gitleaks/gitleaks/blob/master/.pre-commit-hooks.yaml) for executing gitleaks using the [official Docker images](#docker)\n\n3. Auto-update the config to the latest repos' versions by executing `pre-commit autoupdate`\n4. Install with `pre-commit install`\n5. Now you're all set!\n\n```\n➜ git commit -m \"this commit contains a secret\"\nDetect hardcoded secrets.................................................Failed\n```\n\nNote: to disable the gitleaks pre-commit hook you can prepend `SKIP=gitleaks` to the commit command\nand it will skip running gitleaks\n\n```\n➜ SKIP=gitleaks git commit -m \"skip gitleaks check\"\nDetect hardcoded secrets................................................Skipped\n```\n\n## Usage\n\n```\nGitleaks scans code, past or present, for secrets\n\nUsage:\n  gitleaks [command]\n\nAvailable Commands:\n  completion  Generate the autocompletion script for the specified shell\n  dir         scan directories or files for secrets\n  git         scan git repositories for secrets\n  help        Help about any command\n  stdin       detect secrets from stdin\n  version     display gitleaks version\n\nFlags:\n  -b, --baseline-path string          path to baseline with issues that can be ignored\n  -c, --config string                 config file path\n                                      order of precedence:\n                                      1. --config/-c\n                                      2. env var GITLEAKS_CONFIG\n                                      3. env var GITLEAKS_CONFIG_TOML with the file content\n                                      4. (target path)/.gitleaks.toml\n                                      If none of the four options are used, then gitleaks will use the default config\n      --diagnostics string            enable diagnostics (http OR comma-separated list: cpu,mem,trace). cpu=CPU prof, mem=memory prof, trace=exec tracing, http=serve via net/http/pprof\n      --diagnostics-dir string        directory to store diagnostics output files when not using http mode (defaults to current directory)\n      --enable-rule strings           only enable specific rules by id\n      --exit-code int                 exit code when leaks have been encountered (default 1)\n  -i, --gitleaks-ignore-path string   path to .gitleaksignore file or folder containing one (default \".\")\n  -h, --help                          help for gitleaks\n      --ignore-gitleaks-allow         ignore gitleaks:allow comments\n  -l, --log-level string              log level (trace, debug, info, warn, error, fatal) (default \"info\")\n      --max-archive-depth int         allow scanning into nested archives up to this depth (default \"0\", no archive traversal is done)\n      --max-decode-depth int          allow recursive decoding up to this depth (default \"0\", no decoding is done)\n      --max-target-megabytes int      files larger than this will be skipped\n      --no-banner                     suppress banner\n      --no-color                      turn off color for verbose output\n      --redact uint[=100]             redact secrets from logs and stdout. To redact only parts of the secret just apply a percent value from 0..100. For example --redact=20 (default 100%)\n  -f, --report-format string          output format (json, csv, junit, sarif, template)\n  -r, --report-path string            report file\n      --report-template string        template file used to generate the report (implies --report-format=template)\n      --timeout int                   set a timeout for gitleaks commands in seconds (default \"0\", no timeout is set)\n  -v, --verbose                       show verbose output from scan\n      --version                       version for gitleaks\n\nUse \"gitleaks [command] --help\" for more information about a command.\n```\n\n### Commands\n\n⚠️ v8.19.0 introduced a change that deprecated `detect` and `protect`. Those commands are still available but\nare hidden in the `--help` menu. Take a look at this [gist](https://gist.github.com/zricethezav/b325bb93ebf41b9c0b0507acf12810d2) for easy command translations.\nIf you find v8.19.0 broke an existing command (`detect`/`protect`), please open an issue.\n\nThere are three scanning modes: `git`, `dir`, and `stdin`.\n\n#### Git\n\nThe `git` command lets you scan local git repos. Under the hood, gitleaks uses the `git log -p` command to scan patches.\nYou can configure the behavior of `git log -p` with the `log-opts` option.\nFor example, if you wanted to run gitleaks on a range of commits you could use the following\ncommand: `gitleaks git -v --log-opts=\"--all commitA..commitB\" path_to_repo`. See the [git log](https://git-scm.com/docs/git-log) documentation for more information.\nIf there is no target specified as a positional argument, then gitleaks will attempt to scan the current working directory as a git repo.\n\n#### Dir\n\nThe `dir` (aliases include `files`, `directory`) command lets you scan directories and files. Example: `gitleaks dir -v path_to_directory_or_file`.\nIf there is no target specified as a positional argument, then gitleaks will scan the current working directory.\n\n#### Stdin\n\nYou can also stream data to gitleaks with the `stdin` command. Example: `cat some_file | gitleaks -v stdin`\n\n### Creating a baseline\n\nWhen scanning large repositories or repositories with a long history, it can be convenient to use a baseline. When using a baseline,\ngitleaks will ignore any old findings that are present in the baseline. A baseline can be any gitleaks report. To create a gitleaks report, run gitleaks with the `--report-path` parameter.\n\n```\ngitleaks git --report-path gitleaks-report.json # This will save the report in a file called gitleaks-report.json\n```\n\nOnce as baseline is created it can be applied when running the detect command again:\n\n```\ngitleaks git --baseline-path gitleaks-report.json --report-path findings.json\n```\n\nAfter running the detect command with the --baseline-path parameter, report output (findings.json) will only contain new issues.\n\n## Pre-Commit hook\n\nYou can run Gitleaks as a pre-commit hook by copying the example `pre-commit.py` script into\nyour `.git/hooks/` directory.\n\n## Load Configuration\n\nThe order of precedence is:\n\n1. `--config/-c` option:\n      ```bash\n      gitleaks git --config /home/dev/customgitleaks.toml .\n      ```\n2. Environment variable `GITLEAKS_CONFIG` with the file path:\n      ```bash\n      export GITLEAKS_CONFIG=\"/home/dev/customgitleaks.toml\"\n      gitleaks git .\n      ```\n3. Environment variable `GITLEAKS_CONFIG_TOML` with the file content:\n      ```bash\n      export GITLEAKS_CONFIG_TOML=`cat customgitleaks.toml`\n      gitleaks git .\n      ```\n4. A `.gitleaks.toml` file within the target path:\n      ```bash\n      gitleaks git .\n      ```\n\nIf none of the four options are used, then gitleaks will use the default config.\n\n## Configuration\n\nGitleaks offers a configuration format you can follow to write your own secret detection rules:\n\n```toml\n# Title for the gitleaks configuration file.\ntitle = \"Custom Gitleaks configuration\"\n\n# You have basically two options for your custom configuration:\n#\n# 1. define your own configuration, default rules do not apply\n#\n#    use e.g., the default configuration as starting point:\n#    https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml\n#\n# 2. extend a configuration, the rules are overwritten or extended\n#\n#    When you extend a configuration the extended rules take precedence over the\n#    default rules. I.e., if there are duplicate rules in both the extended\n#    configuration and the default configuration the extended rules or\n#    attributes of them will override the default rules.\n#    Another thing to know with extending configurations is you can chain\n#    together multiple configuration files to a depth of 2. Allowlist arrays are\n#    appended and can contain duplicates.\n\n# useDefault and path can NOT be used at the same time. Choose one.\n[extend]\n# useDefault will extend the default gitleaks config built in to the binary\n# the latest version is located at:\n# https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml\nuseDefault = true\n# or you can provide a path to a configuration to extend from.\n# The path is relative to where gitleaks was invoked,\n# not the location of the base config.\n# path = \"common_config.toml\"\n# If there are any rules you don't want to inherit, they can be specified here.\ndisabledRules = [ \"generic-api-key\"]\n\n# An array of tables that contain information that define instructions\n# on how to detect secrets\n[[rules]]\n# Unique identifier for this rule\nid = \"awesome-rule-1\"\n\n# Short human-readable description of the rule.\ndescription = \"awesome rule 1\"\n\n# Golang regular expression used to detect secrets. Note Golang's regex engine\n# does not support lookaheads.\nregex = '''one-go-style-regex-for-this-rule'''\n\n# Int used to extract secret from regex match and used as the group that will have\n# its entropy checked if `entropy` is set.\nsecretGroup = 3\n\n# Float representing the minimum shannon entropy a regex group must have to be considered a secret.\nentropy = 3.5\n\n# Golang regular expression used to match paths. This can be used as a standalone rule or it can be used\n# in conjunction with a valid `regex` entry.\npath = '''a-file-path-regex'''\n\n# Keywords are used for pre-regex check filtering. Rules that contain\n# keywords will perform a quick string compare check to make sure the\n# keyword(s) are in the content being scanned. Ideally these values should\n# either be part of the identiifer or unique strings specific to the rule's regex\n# (introduced in v8.6.0)\nkeywords = [\n  \"auth\",\n  \"password\",\n  \"token\",\n]\n\n# Array of strings used for metadata and reporting purposes.\ntags = [\"tag\",\"another tag\"]\n\n    # ⚠️ In v8.21.0 `[rules.allowlist]` was replaced with `[[rules.allowlists]]`.\n    # This change was backwards-compatible: instances of `[rules.allowlist]` still  work.\n    #\n    # You can define multiple allowlists for a rule to reduce false positives.\n    # A finding will be ignored if _ANY_ `[[rules.allowlists]]` matches.\n    [[rules.allowlists]]\n    description = \"ignore commit A\"\n    # When multiple criteria are defined the default condition is \"OR\".\n    # e.g., this can match on |commits| OR |paths| OR |stopwords|.\n    condition = \"OR\"\n    commits = [ \"commit-A\", \"commit-B\"]\n    paths = [\n      '''go\\.mod''',\n      '''go\\.sum'''\n    ]\n    # note: stopwords targets the extracted secret, not the entire regex match\n    # like 'regexes' does. (stopwords introduced in 8.8.0)\n    stopwords = [\n      '''client''',\n      '''endpoint''',\n    ]\n\n    [[rules.allowlists]]\n    # The \"AND\" condition can be used to make sure all criteria match.\n    # e.g., this matches if |regexes| AND |paths| are satisfied.\n    condition = \"AND\"\n    # note: |regexes| defaults to check the _Secret_ in the finding.\n    # Acceptable values for |regexTarget| are \"secret\" (default), \"match\", and \"line\".\n    regexTarget = \"match\"\n    regexes = [ '''(?i)parseur[il]''' ]\n    paths = [ '''package-lock\\.json''' ]\n\n# You can extend a particular rule from the default config. e.g., gitlab-pat\n# if you have defined a custom token prefix on your GitLab instance\n[[rules]]\nid = \"gitlab-pat\"\n# all the other attributes from the default rule are inherited\n\n    [[rules.allowlists]]\n    regexTarget = \"line\"\n    regexes = [ '''MY-glpat-''' ]\n\n\n# ⚠️ In v8.25.0 `[allowlist]` was replaced with `[[allowlists]]`.\n#\n# Global allowlists have a higher order of precedence than rule-specific allowlists.\n# If a commit listed in the `commits` field below is encountered then that commit will be skipped and no\n# secrets will be detected for said commit. The same logic applies for regexes and paths.\n[[allowlists]]\ndescription = \"global allow list\"\ncommits = [ \"commit-A\", \"commit-B\", \"commit-C\"]\npaths = [\n  '''gitleaks\\.toml''',\n  '''(.*?)(jpg|gif|doc)'''\n]\n# note: (global) regexTarget defaults to check the _Secret_ in the finding.\n# Acceptable values for regexTarget are \"match\" and \"line\"\nregexTarget = \"match\"\nregexes = [\n  '''219-09-9999''',\n  '''078-05-1120''',\n  '''(9[0-9]{2}|666)-\\d{2}-\\d{4}''',\n]\n# note: stopwords targets the extracted secret, not the entire regex match\n# like 'regexes' does. (stopwords introduced in 8.8.0)\nstopwords = [\n  '''client''',\n  '''endpoint''',\n]\n\n# ⚠️ In v8.25.0, `[[allowlists]]` have a new field called |targetRules|.\n#\n# Common allowlists can be defined once and assigned to multiple rules using |targetRules|.\n# This will only run on the specified rules, not globally.\n[[allowlists]]\ntargetRules = [\"awesome-rule-1\", \"awesome-rule-2\"]\ndescription = \"Our test assets trigger false-positives in a couple rules.\"\npaths = ['''tests/expected/._\\.json$''']\n```\n\nRefer to the default [gitleaks config](https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml) for examples or follow the [contributing guidelines](https://github.com/gitleaks/gitleaks/blob/master/CONTRIBUTING.md) if you would like to contribute to the default configuration. Additionally, you can check out [this gitleaks blog post](https://blog.gitleaks.io/stop-leaking-secrets-configuration-2-3-aeed293b1fbf) which covers advanced configuration setups.\n\n### Additional Configuration\n\n#### Composite Rules (Multi-part or `required` Rules)\nIn v8.28.0 Gitleaks introduced composite rules, which are made up of a single \"primary\" rule and one or more auxiliary or `required` rules. To create a composite rule, add a `[[rules.required]]` table to the primary rule specifying an `id` and optionally `withinLines` and/or `withinColumns` proximity constraints. A fragment is a chunk of content that Gitleaks processes at once (typically a file, part of a file, or git diff), and proximity matching instructs the primary rule to only report a finding if the auxiliary `required` rules also find matches within the specified area of the fragment.\n\n**Proximity matching:** Using the `withinLines` and `withinColumns` fields instructs the primary rule to only report a finding if the auxiliary `required` rules also find matches within the specified proximity. You can set:\n\n- **`withinLines: N`** - required findings must be within N lines (vertically)\n- **`withinColumns: N`** - required findings must be within N characters (horizontally)\n- **Both** - creates a rectangular search area (both constraints must be satisfied)\n- **Neither** - fragment-level matching (required findings can be anywhere in the same fragment)\n\nHere are diagrams illustrating each proximity behavior:\n\n```\np = primary captured secret\na = auxiliary (required) captured secret\nfragment = section of data gitleaks is looking at\n\n\n    *Fragment-level proximity*\n    Any required finding in the fragment\n          ┌────────┐\n   ┌──────┤fragment├─────┐\n   │      └──────┬─┤     │ ┌───────┐\n   │             │a│◀────┼─│✓ MATCH│\n   │          ┌─┐└─┘     │ └───────┘\n   │┌─┐       │p│        │\n   ││a│    ┌─┐└─┘        │ ┌───────┐\n   │└─┘    │a│◀──────────┼─│✓ MATCH│\n   └─▲─────┴─┴───────────┘ └───────┘\n     │    ┌───────┐\n     └────│✓ MATCH│\n          └───────┘\n\n\n   *Column bounded proximity*\n   `withinColumns = 3`\n          ┌────────┐\n   ┌────┬─┤fragment├─┬───┐\n   │      └──────┬─┤     │ ┌───────────┐\n   │    │        │a│◀┼───┼─│+1C ✓ MATCH│\n   │          ┌─┐└─┘     │ └───────────┘\n   │┌─┐ │     │p│    │   │\n┌──▶│a│  ┌─┐  └─┘        │ ┌───────────┐\n│  │└─┘ ││a│◀────────┼───┼─│-2C ✓ MATCH│\n│  │       ┘             │ └───────────┘\n│  └── -3C ───0C─── +3C ─┘\n│  ┌─────────┐\n│  │ -4C ✗ NO│\n└──│  MATCH  │\n   └─────────┘\n\n\n   *Line bounded proximity*\n   `withinLines = 4`\n         ┌────────┐\n   ┌─────┤fragment├─────┐\n  +4L─ ─ ┴────────┘─ ─ ─│\n   │                    │\n   │              ┌─┐   │ ┌────────────┐\n   │         ┌─┐  │a│◀──┼─│+1L ✓ MATCH │\n   0L  ┌─┐   │p│  └─┘   │ ├────────────┤\n   │   │a│◀──┴─┴────────┼─│-1L ✓ MATCH │\n   │   └─┘              │ └────────────┘\n   │                    │ ┌─────────┐\n  -4L─ ─ ─ ─ ─ ─ ─ ─┌─┐─│ │-5L ✗ NO │\n   │                │a│◀┼─│  MATCH  │\n   └────────────────┴─┴─┘ └─────────┘\n\n\n   *Line and column bounded proximity*\n   `withinLines = 4`\n   `withinColumns = 3`\n         ┌────────┐\n   ┌─────┤fragment├─────┐\n  +4L   ┌└────────┴ ┐   │\n   │            ┌─┐     │ ┌───────────────┐\n   │    │       │a│◀┼───┼─│+2L/+1C ✓ MATCH│\n   │         ┌─┐└─┘     │ └───────────────┘\n   0L   │    │p│    │   │\n   │         └─┘        │\n   │    │           │   │ ┌────────────┐\n  -4L    ─ ─ ─ ─ ─ ─┌─┐ │ │-5L/+3C ✗ NO│\n   │                │a│◀┼─│   MATCH    │\n   └───-3C────0L───+3C┴─┘ └────────────┘\n```\n\n<details><summary>Some final quick thoughts on composite rules.</summary>This is an experimental feature! It's subject to change so don't go sellin' a new B2B SaaS feature built ontop of this feature. Scan type (git vs dir) based context is interesting. I'm monitoring the situation. Composite rules might not be super useful for git scans because gitleaks only looks at additions in the git history. It could be useful to scan non-additions in git history for `required` rules. Oh, right this is a readme, I'll shut up now.</details>\n\n#### gitleaks:allow\n\nIf you are knowingly committing a test secret that gitleaks will catch you can add a `gitleaks:allow` comment to that line which will instruct gitleaks\nto ignore that secret. Ex:\n\n```\nclass CustomClass:\n    discord_client_secret = '8dyfuiRyq=vVc3RRr_edRk-fK__JItpZ'  #gitleaks:allow\n\n```\n\n#### .gitleaksignore\n\nYou can ignore specific findings by creating a `.gitleaksignore` file at the root of your repo. In release v8.10.0 Gitleaks added a `Fingerprint` value to the Gitleaks report. Each leak, or finding, has a Fingerprint that uniquely identifies a secret. Add this fingerprint to the `.gitleaksignore` file to ignore that specific secret. See Gitleaks' [.gitleaksignore](https://github.com/gitleaks/gitleaks/blob/master/.gitleaksignore) for an example. Note: this feature is experimental and is subject to change in the future.\n\n#### Decoding\n\nSometimes secrets are encoded in a way that can make them difficult to find\nwith just regex. Now you can tell gitleaks to automatically find and decode\nencoded text. The flag `--max-decode-depth` enables this feature (the default\nvalue \"0\" means the feature is disabled by default).\n\nRecursive decoding is supported since decoded text can also contain encoded\ntext.  The flag `--max-decode-depth` sets the recursion limit. Recursion stops\nwhen there are no new segments of encoded text to decode, so setting a really\nhigh max depth doesn't mean it will make that many passes. It will only make as\nmany as it needs to decode the text. Overall, decoding only minimally increases\nscan times.\n\nThe findings for encoded text differ from normal findings in the following\nways:\n\n- The location points the bounds of the encoded text\n  - If the rule matches outside the encoded text, the bounds are adjusted to\n    include that as well\n- The match and secret contain the decoded value\n- Two tags are added `decoded:<encoding>` and `decode-depth:<depth>`\n\nCurrently supported encodings:\n\n- **percent** - Any printable ASCII percent encoded values\n- **hex** - Any printable ASCII hex encoded values >= 32 characters\n- **base64** - Any printable ASCII base64 encoded values >= 16 characters\n\n#### Archive Scanning\n\nSometimes secrets are packaged within archive files like zip files or tarballs,\nmaking them difficult to discover. Now you can tell gitleaks to automatically\nextract and scan the contents of archives. The flag `--max-archive-depth`\nenables this feature for both `dir` and `git` scan types. The default value of\n\"0\" means this feature is disabled by default.\n\nRecursive scanning is supported since archives can also contain other archives.\nThe `--max-archive-depth` flag sets the recursion limit. Recursion stops when\nthere are no new archives to extract, so setting a very high max depth just\nsets the potential to go that deep. It will only go as deep as it needs to.\n\nThe findings for secrets located within an archive will include the path to the\nfile inside the archive. Inner paths are separated with `!`.\n\nExample finding (shortened for brevity):\n\n```\nFinding:     DB_PASSWORD=8ae31cacf141669ddfb5da\n...\nFile:        testdata/archives/nested.tar.gz!archives/files.tar!files/.env.prod\nLine:        4\nCommit:      6e6ee6596d337bb656496425fb98644eb62b4a82\n...\nFingerprint: 6e6ee6596d337bb656496425fb98644eb62b4a82:testdata/archives/nested.tar.gz!archives/files.tar!files/.env.prod:generic-api-key:4\nLink:        https://github.com/leaktk/gitleaks/blob/6e6ee6596d337bb656496425fb98644eb62b4a82/testdata/archives/nested.tar.gz\n```\n\nThis means a secret was detected on line 4 of `files/.env.prod.` which is in\n`archives/files.tar` which is in `testdata/archives/nested.tar.gz`.\n\nCurrently supported formats:\n\nThe [compression](https://github.com/mholt/archives?tab=readme-ov-file#supported-compression-formats)\nand [archive](https://github.com/mholt/archives?tab=readme-ov-file#supported-archive-formats)\nformats supported by mholt's [archives package](https://github.com/mholt/archives)\nare supported.\n\n#### Reporting\n\nGitleaks has built-in support for several report formats: [`json`](https://github.com/gitleaks/gitleaks/blob/master/testdata/expected/report/json_simple.json), [`csv`](https://github.com/gitleaks/gitleaks/blob/master/testdata/expected/report/csv_simple.csv?plain=1), [`junit`](https://github.com/gitleaks/gitleaks/blob/master/testdata/expected/report/junit_simple.xml), and [`sarif`](https://github.com/gitleaks/gitleaks/blob/master/testdata/expected/report/sarif_simple.sarif).\n\nIf none of these formats fit your need, you can create your own report format with a [Go `text/template` .tmpl file](https://www.digitalocean.com/community/tutorials/how-to-use-templates-in-go#step-4-writing-a-template) and the `--report-template` flag. The template can use [extended functionality from the `Masterminds/sprig` template library](https://masterminds.github.io/sprig/).\n\nFor example, the following template provides a custom JSON output:\n```gotemplate\n# jsonextra.tmpl\n[{{ $lastFinding := (sub (len . ) 1) }}\n{{- range $i, $finding := . }}{{with $finding}}\n    {\n        \"Description\": {{ quote .Description }},\n        \"StartLine\": {{ .StartLine }},\n        \"EndLine\": {{ .EndLine }},\n        \"StartColumn\": {{ .StartColumn }},\n        \"EndColumn\": {{ .EndColumn }},\n        \"Line\": {{ quote .Line }},\n        \"Match\": {{ quote .Match }},\n        \"Secret\": {{ quote .Secret }},\n        \"File\": \"{{ .File }}\",\n        \"SymlinkFile\": {{ quote .SymlinkFile }},\n        \"Commit\": {{ quote .Commit }},\n        \"Entropy\": {{ .Entropy }},\n        \"Author\": {{ quote .Author }},\n        \"Email\": {{ quote .Email }},\n        \"Date\": {{ quote .Date }},\n        \"Message\": {{ quote .Message }},\n        \"Tags\": [{{ $lastTag := (sub (len .Tags ) 1) }}{{ range $j, $tag := .Tags }}{{ quote . }}{{ if ne $j $lastTag }},{{ end }}{{ end }}],\n        \"RuleID\": {{ quote .RuleID }},\n        \"Fingerprint\": {{ quote .Fingerprint }}\n    }{{ if ne $i $lastFinding }},{{ end }}\n{{- end}}{{ end }}\n]\n```\n\nUsage:\n```sh\n$ gitleaks dir ~/leaky-repo/ --report-path \"report.json\" --report-format template --report-template testdata/report/jsonextra.tmpl\n```\n\n## Sponsorships\n\n<p align=\"left\">\n\t<h3><a href=\"https://coderabbit.ai/?utm_source=oss&utm_medium=sponsorship&utm_campaign=gitleaks\">coderabbit.ai</h3>\n\t  <a href=\"https://coderabbit.ai/?utm_source=oss&utm_medium=sponsorship&utm_campaign=gitleaks\">\n\t\t  <img alt=\"CodeRabbit.ai Sponsorship\" src=\"https://github.com/gitleaks/gitleaks/assets/15034943/76c30a85-887b-47ca-9956-17a8e55c6c41\" width=200>\n\t  </a>\n</p>\n\n\n## Exit Codes\n\nYou can always set the exit code when leaks are encountered with the --exit-code flag. Default exit codes below:\n\n```\n0 - no leaks present\n1 - leaks or error encountered\n126 - unknown flag\n```\n\n### Join the Discord! [![Discord](https://img.shields.io/discord/1102689410522284044.svg?label=&logo=discord&logoColor=ffffff&color=7389D8&labelColor=6A7EC2)](https://discord.gg/8Hzbrnkr7E)\n","summary":"Gitleaks is a specialized security tool designed to detect hardcoded secrets—such as API keys, passwords, and tokens—within git repositories, local files, and data streams. It utilizes a powerful regex-based detection engine that can be easily integrated into development workflows through pre-commit hooks, GitHub Actions, or containerized environments. This utility is essential for developers and security professionals looking to proactively prevent credential leaks and maintain robust security hygiene across their codebases.","description":"Find secrets with Gitleaks 🔑","stars":27487,"language":"Go"},{"owner":"soxoj","repo":"maigret","url":"https://github.com/soxoj/maigret","readme":"# Maigret\n\n<div align=\"center\">\n  <div>\n    <a href=\"https://pypi.org/project/maigret/\">\n        <img alt=\"PyPI version badge for Maigret\" src=\"https://img.shields.io/pypi/v/maigret?style=flat-square\" />\n    </a>\n    <a href=\"https://pepy.tech/project/maigret\">\n      <img alt=\"Downloads/month\" src=\"https://static.pepy.tech/badge/maigret/month\" />\n      <img alt=\"Total downloads\" src=\"https://static.pepy.tech/badge/maigret\" />\n    </a>\n    <a href=\"https://github.com/soxoj/maigret\">\n        <img alt=\"Minimum Python version required: 3.10+\" src=\"https://img.shields.io/badge/Python-3.10%2B-brightgreen?style=flat-square\" />\n    </a>\n    <a href=\"https://github.com/soxoj/maigret/blob/main/LICENSE\">\n        <img alt=\"License badge for Maigret\" src=\"https://img.shields.io/github/license/soxoj/maigret?style=flat-square\" />\n    </a>\n    <a href=\"https://github.com/soxoj/maigret\">\n        <img alt=\"View count for Maigret project\" src=\"https://komarev.com/ghpvc/?username=maigret&color=brightgreen&label=views&style=flat-square\" />\n    </a>\n  </div>\n  <br>\n  <div>\n    <img src=\"https://raw.githubusercontent.com/soxoj/maigret/main/static/maigret.png\" height=\"300\" alt=\"Maigret logo\"/>\n  </div>\n  <br>\n  <div>\n    <b>English</b> · <a href=\"README.zh-CN.md\">简体中文</a>\n  </div>\n  <br>\n</div>\n\n**Maigret** collects a dossier on a person **by username only**, checking for accounts on a huge number of sites and gathering all the available information from web pages. No API keys required. **[AI profiling (demo)](#ai-analysis)**. \n\n## Sponsors\n\n<table>\n  <tr>\n    <td width=\"250\" align=\"center\">\n      <a href=\"https://www.rapidproxy.io/?ref=soxoj\">\n        <img src=\"https://github.com/user-attachments/assets/1b4ad463-c6eb-448b-8e14-5792ee3d4181\" height=\"100px\" alt=\"RapidProxy\" />\n      </a>\n    </td>\n    <td>\n      <a href=\"https://www.rapidproxy.io/?ref=soxoj\"><b>RapidProxy</b></a> provides high-performance residential proxies for Twitter scraping, Selenium automation, and web data extraction.<br>\n      90M+ IPs • Smart rotation • Anti-block • Non-expiring traffic<br>\n      <b>Special Offer:</b> Try it free — Plans from $0.65/GB. Use code <code>RAPID10</code> for 10% off.\n    </td>\n  </tr>\n  <tr>\n    <td width=\"250\" align=\"center\">\n      <a href=\"https://vaultproxies.net/?utm_source=maigret&utm_medium=readme\">\n        <img src=\"https://i.imgur.com/TF165pP.gif\" width=\"180\" alt=\"VaultProxies\" />\n      </a>\n    </td>\n    <td>\n      <a href=\"https://vaultproxies.net/?utm_source=maigret&utm_medium=readme\"><b>VaultProxies</b></a> — The proxy network ops teams reach for when they're tired of getting throttled, flagged, or guessed.<br>\n      Enterprise-grade rotation • High uptime • Throttle-resistant routing<br>\n      <b>Special Offer:</b> Plans from $1/GB — as low as $0.50/GB. Use code <code>50OFF</code> for 50% off.\n    </td>\n  </tr>\n</table>\n\n## Contents\n\n- [In one minute](#in-one-minute)\n- [Main features](#main-features)\n- [Demo](#demo)\n- [Installation](#installation)\n- [Usage](#usage)\n- [Contributing](#contributing)\n- [Commercial Use](#commercial-use)\n- [About](#about)\n\n<a id=\"one-minute\"></a>\n## In one minute\n\nEnsure you have Python 3.10 or higher.\n\n```bash\npip install maigret\nmaigret YOUR_USERNAME\n```\n\nNo install? Try the [community Telegram bot](https://sites.google.com/view/maigret-bot-link) or a [Cloud Shell](#cloud-shells). \n\nWant a web UI? See [how to launch it](#web-interface).\n\nSee also: [Quick start](https://maigret.readthedocs.io/en/latest/quick-start.html). \n\n## Main features\n\n- Supports 3,000+ sites ([see full list](https://github.com/soxoj/maigret/blob/main/sites.md)). A default run checks the 500 highest-ranked sites by traffic; pass `-a` to scan everything, or `--tags` to narrow by category/country.\n- Embeddable in Python projects — import `maigret` and run searches programmatically (see [library usage](https://maigret.readthedocs.io/en/latest/library-usage.html)).\n- [Extracts](https://github.com/soxoj/socid_extractor) all available information about the account owner from profile pages and site APIs, including links to other accounts.\n- Performs recursive search using discovered usernames and other IDs.\n- Allows filtering by tags (site categories, countries).\n- Detects and partially bypasses blocks, censorship, and CAPTCHA.\n- Fetches an [auto-updated site database](https://maigret.readthedocs.io/en/latest/settings.html#database-auto-update) from GitHub each run (once per 24 hours), and falls back to the built-in database if offline.\n- Works with Tor and I2P websites; able to check domains.\n- Ships with a [web interface](#web-interface) for browsing results as a graph and downloading reports in every format from a single page.\n- Optional [AI analysis mode](#ai-analysis) (`--ai`) that turns raw findings into a short investigation summary using an OpenAI-compatible API.\n\nFor the complete feature list, see the [features documentation](https://maigret.readthedocs.io/en/latest/features.html).\n\n### Used by\n\nProfessional OSINT and social-media analysis tools built on Maigret:\n\n<a href=\"https://github.com/SocialLinks-IO/sociallinks-api\"><img height=\"60\" alt=\"Social Links API\" src=\"https://github.com/user-attachments/assets/789747b2-d7a0-4d4e-8868-ffc4427df660\"></a>\n<a href=\"https://sociallinks.io/products/sl-crimewall\"><img height=\"60\" alt=\"Social Links Crimewall\" src=\"https://github.com/user-attachments/assets/0b18f06c-2f38-477b-b946-1be1a632a9d1\"></a>\n<a href=\"https://usersearch.ai/\"><img height=\"60\" alt=\"UserSearch\" src=\"https://github.com/user-attachments/assets/66daa213-cf7d-40cf-9267-42f97cf77580\"></a>\n\n## Demo\n\n### Video\n\n<a href=\"https://asciinema.org/a/Ao0y7N0TTxpS0pisoprQJdylZ\">\n  <img src=\"https://asciinema.org/a/Ao0y7N0TTxpS0pisoprQJdylZ.svg\" alt=\"asciicast\" width=\"600\">\n</a>\n\n### Reports\n\n[PDF report](https://raw.githubusercontent.com/soxoj/maigret/main/static/report_alexaimephotographycars.pdf), [HTML report](https://htmlpreview.github.io/?https://raw.githubusercontent.com/soxoj/maigret/main/static/report_alexaimephotographycars.html)\n\n![HTML report screenshot](https://raw.githubusercontent.com/soxoj/maigret/main/static/report_alexaimephotography_html_screenshot.png)\n\n![XMind 8 report screenshot](https://raw.githubusercontent.com/soxoj/maigret/main/static/report_alexaimephotography_xmind_screenshot.png)\n\n[Full console output](https://raw.githubusercontent.com/soxoj/maigret/main/static/recursive_search.md)\n\n## Installation\n\nAlready ran the [In one minute](#one-minute) steps? You're set. Below are alternative methods.\n\nDon't want to install anything? Use the [community Telegram bot](https://sites.google.com/view/maigret-bot-link).\n\n### Windows\n\nDownload `maigret_standalone.exe` from [Releases](https://github.com/soxoj/maigret/releases). You can launch it two ways:\n\n- **Double-click it** — Maigret will ask for a username, run a default search, and wait at the end so the report links stay visible.\n- **Run it from a terminal** — open Command Prompt (press `Win+R`, type `cmd`, hit Enter) or PowerShell to pass extra options:\n\n```cmd\ncd %USERPROFILE%\\Downloads\nmaigret_standalone.exe USERNAME\nmaigret_standalone.exe USERNAME --html       :: also save an HTML report\nmaigret_standalone.exe --help                :: list all options\n```\n\nVideo guide: https://youtu.be/qIgwTZOmMmM.\n\n<a id=\"cloud-shells\"></a>\n### Cloud Shells\n\nRun Maigret in the browser via cloud shells or Jupyter notebooks:\n\n<a href=\"https://console.cloud.google.com/cloudshell/open?git_repo=https://github.com/soxoj/maigret&tutorial=cloudshell-tutorial.md\"><img src=\"https://user-images.githubusercontent.com/27065646/92304704-8d146d80-ef80-11ea-8c29-0deaabb1c702.png\" alt=\"Open in Cloud Shell\" height=\"50\"></a>\n<a href=\"https://repl.it/github/soxoj/maigret\"><img src=\"https://replit.com/badge/github/soxoj/maigret\" alt=\"Run on Replit\" height=\"50\"></a>\n\n<a href=\"https://colab.research.google.com/gist/soxoj/879b51bc3b2f8b695abb054090645000/maigret-collab.ipynb\"><img src=\"https://colab.research.google.com/assets/colab-badge.svg\" alt=\"Open In Colab\" height=\"45\"></a>\n<a href=\"https://mybinder.org/v2/gist/soxoj/9d65c2f4d3bec5dd25949197ea73cf3a/HEAD\"><img src=\"https://mybinder.org/badge_logo.svg\" alt=\"Open In Binder\" height=\"45\"></a>\n\n### Local installation (pip)\n\n```bash\n# install from pypi\npip3 install maigret\n\n# usage\nmaigret username\n```\n\n### From source\n\n```bash\n# or clone and install manually\ngit clone https://github.com/soxoj/maigret && cd maigret\n\n# build and install\npip3 install .\n\n# usage\nmaigret username\n```\n\n### Docker\n\nTwo image variants are published:\n\n- `soxoj/maigret:latest` — CLI mode (default)\n- `soxoj/maigret:web` — auto-launches the [web interface](#web-interface)\n\n```bash\n# official image (CLI)\ndocker pull soxoj/maigret\n\n# CLI usage\ndocker run -v /mydir:/app/reports soxoj/maigret:latest username --html\n\n# Web UI (open http://localhost:5000)\ndocker run -p 5000:5000 soxoj/maigret:web\n\n# Web UI on a custom port\ndocker run -e PORT=8080 -p 8080:8080 soxoj/maigret:web\n\n# manual build\ndocker build -t maigret .                  # CLI image (default target)\ndocker build --target web -t maigret-web . # Web UI image\n```\n\n### Troubleshooting\n\nBuild errors? See the [troubleshooting guide](https://maigret.readthedocs.io/en/latest/installation.html#troubleshooting).\n\nPDF reports (`--pdf`) are an optional extra — install with `pip install 'maigret[pdf]'`. They need system-level graphics libraries on Linux/macOS; see the [PDF reports section](https://maigret.readthedocs.io/en/latest/installation.html#optional-pdf-reports-maigret-pdf) for per-OS install steps.\n\n## Usage\n\n### Examples\n\n```bash\n# make HTML, PDF, and Xmind8 reports\nmaigret user --html\nmaigret user --pdf\nmaigret user --xmind #Output not compatible with xmind 2022+\n\n# machine-readable exports\nmaigret user --json ndjson   # newline-delimited JSON (also: --json simple)\nmaigret user --csv\nmaigret user --txt\nmaigret user --graph         # interactive D3 graph (HTML)\n\n# search on sites marked with tags photo & dating\nmaigret user --tags photo,dating\n\n# search on sites marked with tag us\nmaigret user --tags us\n\n# highlight sites whose page also mentions specific keywords\nmaigret user --keywords python rust\n# keyword-matched sites are shown with \"[++]\" in bright green\n\n# search for three usernames on all available sites\nmaigret user1 user2 user3 -a\n\n# AI-assisted investigation summary (needs OPENAI_API_KEY)\nmaigret user --ai\n```\n\nRun `maigret --help` for all options. Docs: [CLI options](https://maigret.readthedocs.io/en/latest/command-line-options.html), [more examples](https://maigret.readthedocs.io/en/latest/usage-examples.html). Running into 403s or timeouts? See [TROUBLESHOOTING.md](TROUBLESHOOTING.md).\n\n<a id=\"web-interface\"></a>\n### Web interface\n\nMaigret has a built-in web UI with a results graph and downloadable reports.\n\n<details>\n<summary>Web Interface Screenshots</summary>\n\n![Web interface: how to start](https://raw.githubusercontent.com/soxoj/maigret/main/static/web_interface_screenshot_start.png)\n\n![Web interface: results](https://raw.githubusercontent.com/soxoj/maigret/main/static/web_interface_screenshot.png)\n\n</details>\n\n```console\nmaigret --web 5000\n```\n\nOpen http://127.0.0.1:5000, enter a username, and view results.\n\n### Python library\n\n**Maigret can be embedded in your own Python projects.** The CLI is a thin wrapper around an async function you can call directly — build custom pipelines, feed results into your own tooling, or run it inside a larger OSINT workflow.\n\nSee the full [library usage guide](https://maigret.readthedocs.io/en/latest/library-usage.html) for a working example, async patterns, and how to filter sites by tag.\n\n### Useful CLI flags\n\n- `--parse URL` — parse a profile page, extract IDs/usernames, and use them to kick off a recursive search.\n- `--permute` — generate likely username variants from two or more inputs (e.g. `john doe` → `johndoe`, `j.doe`, …) and search for all of them.\n- `--self-check [--auto-disable]` — verify `usernameClaimed` / `usernameUnclaimed` pairs against live sites for maintainers auditing the database.\n- `--ai` / `--ai-model` — run the [AI analysis](#ai-analysis) over the search results and stream a short investigation summary to the terminal.\n\n<a id=\"ai-analysis\"></a>\n### AI analysis\n\n[![asciicast](https://asciinema.org/a/979404.svg)](https://asciinema.org/a/979404)\n\n`--ai` collects the search results, builds an internal Markdown report, and sends it to an OpenAI-compatible chat completion endpoint to produce a short, neutral investigation summary (likely real name, location, occupation, interests, languages, confidence, follow-up leads). Per-site progress is suppressed and the model's output is streamed to stdout.\n\n```bash\nexport OPENAI_API_KEY=sk-...\nmaigret user --ai\n\n# pick a different model\nmaigret user --ai --ai-model gpt-4o-mini\n```\n\nThe key can also be set as `openai_api_key` in `settings.json`. The endpoint defaults to `https://api.openai.com/v1`, but `openai_api_base_url` in `settings.json` can point to any OpenAI-compatible API (Azure OpenAI, OpenRouter, a local server, …). See the [settings docs](https://maigret.readthedocs.io/en/latest/settings.html) for the full list of options.\n\n### Tor / I2P / proxies\n\nMaigret can route checks through a proxy, Tor, or I2P — useful for `.onion` / `.i2p` sites and for bypassing WAFs that block datacenter IPs.\n\n```bash\n# any HTTP/SOCKS proxy\nmaigret user --proxy socks5://127.0.0.1:1080\n\n# Tor (default gateway socks5://127.0.0.1:9050)\nmaigret user --tor-proxy socks5://127.0.0.1:9050\n\n# I2P (default gateway http://127.0.0.1:4444)\nmaigret user --i2p-proxy http://127.0.0.1:4444\n```\n\nStart your Tor / I2P daemon before running the command — Maigret does not manage these gateways.\n\n### Cloudflare bypass\n\n> **Experimental.** The Cloudflare webgate is under active development; the configuration schema, CLI behaviour, and the set of routed sites may change without backwards-compatibility guarantees.\n\nA subset of sites in the database require a real browser to solve a JavaScript challenge. Maigret can offload these checks to a local [FlareSolverr](https://github.com/FlareSolverr/FlareSolverr) instance:\n\n```bash\ndocker run -d -p 8191:8191 --name flaresolverr ghcr.io/flaresolverr/flaresolverr:latest\nmaigret --cloudflare-bypass <username>\n```\n\nThe bypass is opt-in (`--cloudflare-bypass` or `cloudflare_bypass.enabled` in `settings.json`) and only fires for sites whose `protection` field matches. See the [feature docs](https://maigret.readthedocs.io/en/latest/features.html#cloudflare-bypass) for backend options and configuration.\n\n## Contributing\n\nAdd or fix new sites surgically in `data.json` (no `json.load`/`json.dump`), then run `./utils/update_site_data.py` to regenerate `sites.md` and the database metadata, and open a pull request. For more details, see the [CONTRIBUTING guide](https://github.com/soxoj/maigret/blob/main/CONTRIBUTING.md) and [development docs](https://maigret.readthedocs.io/en/latest/development.html). Release history: [CHANGELOG.md](CHANGELOG.md).\n\n## Commercial Use\n\nThe open-source Maigret is MIT-licensed and free for commercial use without restriction — but site checks break over time and need active maintenance.\n\nFor serious commercial use — with a **daily-updated site database** or a **username-check API** — reach out: 📧 [maigret@soxoj.com](mailto:maigret@soxoj.com)\n\n- Private site database — 5 000+ sites, updated daily (separate from the public open-source database)\n- Username check API — integrate Maigret into your product\n\n## About\n\n### Disclaimer\n\n**For educational and lawful purposes only.** You are responsible for complying with all applicable laws (GDPR, CCPA, etc.) in your jurisdiction. The authors bear no responsibility for misuse.\n\n### Feedback\n\n[Open an issue](https://github.com/soxoj/maigret/issues) · [GitHub Discussions](https://github.com/soxoj/maigret/discussions) · [Telegram](https://t.me/soxoj)\n\n### SOWEL classification\n\nOSINT techniques used:\n- [SOTL-2.2. Search For Accounts On Other Platforms](https://sowel.soxoj.com/other-platform-accounts)\n- [SOTL-6.1. Check Logins Reuse To Find Another Account](https://sowel.soxoj.com/logins-reuse)\n- [SOTL-6.2. Check Nicknames Reuse To Find Another Account](https://sowel.soxoj.com/nicknames-reuse) \n\n### License\n\nMIT © [Maigret](https://github.com/soxoj/maigret)\n","summary":"Maigret is a powerful OSINT tool designed to collect comprehensive dossiers on individuals using only a username. It scans over 3,000 websites to identify linked accounts and automatically extracts available metadata from public profiles without the need for API keys. This tool is ideal for security researchers, investigators, and privacy-conscious users who need an automated way to map a digital footprint across the web.","description":"🕵️‍♂️ Collect a dossier on a person by username from 3000+ sites","stars":31243,"language":"Python"},{"owner":"standard-schema","repo":"standard-schema","url":"https://github.com/standard-schema/standard-schema","readme":"<h1 align=\"center\">\n  <img alt=\"Standard Schema fire logo\" loading=\"lazy\" width=\"50\" height=\"50\" decoding=\"async\" data-nimg=\"1\" style=\"color:transparent\" src=\"https://standardschema.dev/favicon.svg\">\n  </br>\n  Standard Schema</h1>\n<p align=\"center\">\n  A family of specs for interoperable TypeScript\n  <br/>\n  <a href=\"https://standardschema.dev\">standardschema.dev</a>\n</p>\n<br/>\n\n<!-- start -->\n\nThe Standard Schema project is a set of interfaces that standardize the provision and consumption of shared functionality in the TypeScript ecosystem.\n\nIts goal is to allow tools to accept a single input that includes all the types and capabilities they need— no library-specific adapters, no extra dependencies. The result is an ecosystem that's fair for implementers, friendly for consumers, and open for end users.\n\n## The specifications\n\nThe specifications can be found below in their entirety. Libraries wishing to implement a spec can copy/paste the code block below into their codebase. They're also available at `@standard-schema/spec` on [npm](https://www.npmjs.com/package/@standard-schema/spec) and [JSR](https://jsr.io/@standard-schema/spec).\n\n```ts\n// #########################\n// ###   Standard Typed  ###\n// #########################\n\n/** The Standard Typed interface. This is a base type extended by other specs. */\nexport interface StandardTypedV1<Input = unknown, Output = Input> {\n  /** The Standard properties. */\n  readonly \"~standard\": StandardTypedV1.Props<Input, Output>;\n}\n\nexport declare namespace StandardTypedV1 {\n  /** The Standard Typed properties interface. */\n  export interface Props<Input = unknown, Output = Input> {\n    /** The version number of the standard. */\n    readonly version: 1;\n    /** The vendor name of the schema library. */\n    readonly vendor: string;\n    /** Inferred types associated with the schema. */\n    readonly types?: Types<Input, Output> | undefined;\n  }\n\n  /** The Standard Typed types interface. */\n  export interface Types<Input = unknown, Output = Input> {\n    /** The input type of the schema. */\n    readonly input: Input;\n    /** The output type of the schema. */\n    readonly output: Output;\n  }\n\n  /** Infers the input type of a Standard Typed. */\n  export type InferInput<Schema extends StandardTypedV1> = NonNullable<\n    Schema[\"~standard\"][\"types\"]\n  >[\"input\"];\n\n  /** Infers the output type of a Standard Typed. */\n  export type InferOutput<Schema extends StandardTypedV1> = NonNullable<\n    Schema[\"~standard\"][\"types\"]\n  >[\"output\"];\n}\n\n// ##########################\n// ###   Standard Schema  ###\n// ##########################\n\n/** The Standard Schema interface. */\nexport interface StandardSchemaV1<Input = unknown, Output = Input> {\n  /** The Standard Schema properties. */\n  readonly \"~standard\": StandardSchemaV1.Props<Input, Output>;\n}\n\nexport declare namespace StandardSchemaV1 {\n  /** The Standard Schema properties interface. */\n  export interface Props<Input = unknown, Output = Input>\n    extends StandardTypedV1.Props<Input, Output> {\n    /** Validates unknown input values. */\n    readonly validate: (\n      value: unknown,\n      options?: StandardSchemaV1.Options | undefined\n    ) => Result<Output> | Promise<Result<Output>>;\n  }\n\n  /** The result interface of the validate function. */\n  export type Result<Output> = SuccessResult<Output> | FailureResult;\n\n  /** The result interface if validation succeeds. */\n  export interface SuccessResult<Output> {\n    /** The typed output value. */\n    readonly value: Output;\n    /** A falsy value for `issues` indicates success. */\n    readonly issues?: undefined;\n  }\n\n  export interface Options {\n    /** Explicit support for additional vendor-specific parameters, if needed. */\n    readonly libraryOptions?: Record<string, unknown> | undefined;\n  }\n\n  /** The result interface if validation fails. */\n  export interface FailureResult {\n    /** The issues of failed validation. */\n    readonly issues: ReadonlyArray<Issue>;\n  }\n\n  /** The issue interface of the failure output. */\n  export interface Issue {\n    /** The error message of the issue. */\n    readonly message: string;\n    /** The path of the issue, if any. */\n    readonly path?: ReadonlyArray<PropertyKey | PathSegment> | undefined;\n  }\n\n  /** The path segment interface of the issue. */\n  export interface PathSegment {\n    /** The key representing a path segment. */\n    readonly key: PropertyKey;\n  }\n\n  /** The Standard types interface. */\n  export interface Types<Input = unknown, Output = Input>\n    extends StandardTypedV1.Types<Input, Output> {}\n\n  /** Infers the input type of a Standard. */\n  export type InferInput<Schema extends StandardTypedV1> =\n    StandardTypedV1.InferInput<Schema>;\n\n  /** Infers the output type of a Standard. */\n  export type InferOutput<Schema extends StandardTypedV1> =\n    StandardTypedV1.InferOutput<Schema>;\n}\n\n// ###############################\n// ###   Standard JSON Schema  ###\n// ###############################\n\n/** The Standard JSON Schema interface. */\nexport interface StandardJSONSchemaV1<Input = unknown, Output = Input> {\n  /** The Standard JSON Schema properties. */\n  readonly \"~standard\": StandardJSONSchemaV1.Props<Input, Output>;\n}\n\nexport declare namespace StandardJSONSchemaV1 {\n  /** The Standard JSON Schema properties interface. */\n  export interface Props<Input = unknown, Output = Input>\n    extends StandardTypedV1.Props<Input, Output> {\n    /** Methods for generating the input/output JSON Schema. */\n    readonly jsonSchema: StandardJSONSchemaV1.Converter;\n  }\n\n  /** The Standard JSON Schema converter interface. */\n  export interface Converter {\n    /** Converts the input type to JSON Schema. May throw if conversion is not supported. */\n    readonly input: (\n      options: StandardJSONSchemaV1.Options\n    ) => Record<string, unknown>;\n    /** Converts the output type to JSON Schema. May throw if conversion is not supported. */\n    readonly output: (\n      options: StandardJSONSchemaV1.Options\n    ) => Record<string, unknown>;\n  }\n\n  /**\n   * The target version of the generated JSON Schema.\n   *\n   * It is *strongly recommended* that implementers support `\"draft-2020-12\"` and `\"draft-07\"`, as they are both in wide use. All other targets can be implemented on a best-effort basis. Libraries should throw if they don't support a specified target.\n   *\n   * The `\"openapi-3.0\"` target is intended as a standardized specifier for OpenAPI 3.0 which is a superset of JSON Schema `\"draft-04\"`.\n   */\n  export type Target =\n    | \"draft-2020-12\"\n    | \"draft-07\"\n    | \"openapi-3.0\"\n    // Accepts any string for future targets while preserving autocomplete\n    | ({} & string);\n\n  /** The options for the input/output methods. */\n  export interface Options {\n    /** Specifies the target version of the generated JSON Schema. Support for all versions is on a best-effort basis. If a given version is not supported, the library should throw. */\n    readonly target: Target;\n\n    /** Explicit support for additional vendor-specific parameters, if needed. */\n    readonly libraryOptions?: Record<string, unknown> | undefined;\n  }\n\n  /** The Standard types interface. */\n  export interface Types<Input = unknown, Output = Input>\n    extends StandardTypedV1.Types<Input, Output> {}\n\n  /** Infers the input type of a Standard. */\n  export type InferInput<Schema extends StandardTypedV1> =\n    StandardTypedV1.InferInput<Schema>;\n\n  /** Infers the output type of a Standard. */\n  export type InferOutput<Schema extends StandardTypedV1> =\n    StandardTypedV1.InferOutput<Schema>;\n}\n```\n","summary":"Standard Schema provides a set of universal interfaces designed to standardize how TypeScript schema libraries interact with one another. By establishing a common specification for validation and type inference, the project eliminates the need for library-specific adapters and redundant dependencies. It is particularly beneficial for tool authors and library maintainers who want to build highly interoperable TypeScript ecosystems that are open, flexible, and easy for end users to implement.","description":"A standard interface for TypeScript schema validation libraries","stars":3523,"language":"TypeScript"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
</body>
