<script id="project-data" type="application/json">[{"owner":"Skyvern-AI","repo":"skyvern","url":"https://github.com/Skyvern-AI/skyvern","readme":"<!-- DOCTOC SKIP -->\n\n<h1 align=\"center\">\n <a href=\"https://www.skyvern.com\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"fern/images/skyvern_logo.png\"/>\n    <img height=\"120\" src=\"fern/images/skyvern_logo_blackbg.png\"/>\n  </picture>\n </a>\n <br />\n</h1>\n<p align=\"center\">\n🐉 Automate Browser-based workflows using LLMs and Computer Vision 🐉\n</p>\n<p align=\"center\">\n  <a href=\"https://www.skyvern.com/\"><img src=\"https://img.shields.io/badge/Website-blue?logo=googlechrome&logoColor=black\"/></a>\n  <a href=\"https://www.skyvern.com/docs/\"><img src=\"https://img.shields.io/badge/Docs-yellow?logo=gitbook&logoColor=black\"/></a>\n  <a href=\"https://discord.gg/fG2XXEuQX3\"><img src=\"https://img.shields.io/discord/1212486326352617534?logo=discord&label=discord\"/></a>\n  <!-- <a href=\"https://pepy.tech/project/skyvern\" target=\"_blank\"><img src=\"https://static.pepy.tech/badge/skyvern\" alt=\"Total Downloads\"/></a> -->\n  <a href=\"https://github.com/skyvern-ai/skyvern\"><img src=\"https://img.shields.io/github/stars/skyvern-ai/skyvern\" /></a>\n  <a href=\"https://github.com/Skyvern-AI/skyvern/blob/main/LICENSE\"><img src=\"https://img.shields.io/github/license/skyvern-ai/skyvern\"/></a>\n  <a href=\"https://twitter.com/skyvernai\"><img src=\"https://img.shields.io/twitter/follow/skyvernai?style=social\"/></a>\n  <a href=\"https://www.linkedin.com/company/95726232\"><img src=\"https://img.shields.io/badge/Follow%20 on%20LinkedIn-8A2BE2?logo=linkedin\"/></a>\n</p>\n\n[Skyvern](https://www.skyvern.com) automates browser-based workflows using LLMs and computer vision. It provides a Playwright-compatible SDK that adds AI functionality on top of playwright, as well as a no-code workflow builder to help both technical and non-technical users automate manual workflows on any website, replacing brittle or unreliable automation solutions.\n\n<p align=\"center\">\n  <img src=\"fern/images/geico_shu_recording_cropped.gif\"/>\n</p>\n\nTraditional approaches to browser automations required writing custom scripts for websites, often relying on DOM parsing and XPath-based interactions which would break whenever the website layouts changed.\n\nInstead of only relying on code-defined XPath interactions, Skyvern relies on Vision LLMs to learn and interact with the websites.\n\n# How it works\nSkyvern was inspired by the Task-Driven autonomous agent design popularized by [BabyAGI](https://github.com/yoheinakajima/babyagi) and [AutoGPT](https://github.com/Significant-Gravitas/AutoGPT) -- with one major bonus: we give Skyvern the ability to interact with websites using browser automation libraries like [Playwright](https://playwright.dev/).\n\nSkyvern uses a swarm of agents to comprehend a website, and plan and execute its actions:\n\n<picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"fern/images/skyvern_2_0_system_diagram.png\" />\n  <img src=\"fern/images/skyvern_2_0_system_diagram.png\" />\n</picture>\n\nThis approach has a few advantages:\n\n1. Skyvern can operate on websites it's never seen before, as it's able to map visual elements to actions necessary to complete a workflow, without any customized code\n1. Skyvern is resistant to website layout changes, as there are no pre-determined XPaths or other selectors our system is looking for while trying to navigate\n1. Skyvern is able to take a single workflow and apply it to a large number of websites, as it's able to reason through the interactions necessary to complete the workflow\nA detailed technical report can be found [here](https://www.skyvern.com/blog/skyvern-2-0-state-of-the-art-web-navigation-with-85-8-on-webvoyager-eval/).\n\n# Demo\n<!-- Redo demo -->\nhttps://github.com/user-attachments/assets/5cab4668-e8e2-4982-8551-aab05ff73a7f\n\n# Quickstart\n\n## Skyvern Cloud\n[Skyvern Cloud](https://app.skyvern.com) is a managed cloud version of Skyvern that allows you to run Skyvern without worrying about the infrastructure. It allows you to run multiple Skyvern instances in parallel and comes bundled with anti-bot detection mechanisms, proxy network, and CAPTCHA solvers.\n\nIf you'd like to try it out, navigate to [app.skyvern.com](https://app.skyvern.com) and create an account.\n\n## Run Locally (UI + Server)\n\nChoose your preferred setup method:\n\n> **Database default**: `skyvern quickstart` and `skyvern run server` default to a SQLite database at `~/.skyvern/data.db` so the pip path works without Postgres or Docker. To use Postgres instead, pass `--postgres` for a local container or `--database-string` for an existing database. Docker Compose always uses the bundled Postgres service.\n\n### Option A: pip install (Recommended for Python-managed local setup)\n\nDependencies needed:\n- [Python 3.11, 3.12, or 3.13](https://www.python.org/downloads/)\n\nAdditionally, for Windows:\n- [Rust](https://rustup.rs/)\n- VS Code with C++ dev tools and Windows SDK\n\n#### 1. Install Skyvern\n\n```bash\npip install \"skyvern[all]\"\n```\n\n#### 2. Run Skyvern\n\n```bash\nskyvern quickstart\n```\n\nThe pip quickstart uses SQLite by default. For a local Postgres container, run `skyvern quickstart --postgres`.\n\n### Option B: Docker Compose\n\nUse this option if you want everything containerized (Postgres, API, UI) and don't want to install Python/Node locally.\n\n1. Install [Docker Desktop](https://www.docker.com/products/docker-desktop/)\n2. Clone the repository:\n   ```bash\n   git clone https://github.com/skyvern-ai/skyvern.git && cd skyvern\n   ```\n3. Configure your LLM provider in `.env` (the `quickstart --docker-compose` command below will create it from `.env.example` if missing):\n   ```bash\n   cp .env.example .env  # if not already created\n   # edit .env to add your LLM API key\n   ```\n4. Start everything:\n   ```bash\n   docker compose up -d\n   ```\n5. Open http://localhost:8080\n\n### Troubleshooting\n\n**`(sqlite3.OperationalError) table organizations already exists`** — You hit a known bug in `pip install skyvern==1.0.31`. Fix:\n\n```bash\nrm ~/.skyvern/data.db   # remove the leftover SQLite file\npip install --upgrade skyvern   # 1.0.32+ contains the fix\nskyvern quickstart\n```\n\nIf you are still on 1.0.31 and cannot upgrade, install via uv instead:\n\n```bash\nuv pip install skyvern\n```\n\n**`pip install skyvern` fails with ResolutionImpossible (litellm / fastmcp)** — You hit a dependency-resolution conflict in 1.0.31. Either upgrade to 1.0.32+ or use uv: `uv pip install skyvern`.\n\n## SDK\n\n**Skyvern is a Playwright extension that adds AI-powered browser automation.** It gives you the full power of Playwright with additional AI capabilities—use natural language prompts to interact with elements, extract data, and automate complex multi-step workflows.\n\n**Installation:**\n- Python SDK / cloud API: `pip install skyvern`\n- Local server + packaged UI: `pip install \"skyvern[all]\"` then run `skyvern quickstart`\n- Local server + packaged UI with Postgres: `pip install \"skyvern[all]\"` then run `skyvern quickstart --postgres`\n- Packaged UI for an existing API: `pip install \"skyvern[ui]\"` then run\n  `skyvern run ui --api-url <api-url> --api-key <api-key>`\n- TypeScript: `npm install @skyvern/client`\n\n### AI-Powered Page Commands\n\nSkyvern adds four core AI commands directly on the page object:\n\n| Command | Description |\n|---------|-------------|\n| `page.act(prompt)` | Perform actions using natural language (e.g., \"Click the login button\") |\n| `page.extract(prompt, schema)` | Extract structured data from the page with optional JSON schema |\n| `page.validate(prompt)` | Validate page state, returns `bool` (e.g., \"Check if user is logged in\") |\n| `page.prompt(prompt, schema)` | Send arbitrary prompts to the LLM with optional response schema |\n\nAdditionally, `page.agent` provides higher-level workflow commands:\n\n| Command | Description |\n|---------|-------------|\n| `page.agent.run_task(prompt)` | Execute complex multi-step tasks |\n| `page.agent.login(credential_type, credential_id)` | Authenticate with stored credentials (Skyvern, Bitwarden, 1Password) |\n| `page.agent.download_files(prompt)` | Navigate and download files |\n| `page.agent.run_workflow(workflow_id)` | Execute pre-built workflows |\n\n### AI-Augmented Playwright Actions\n\nAll standard Playwright actions support an optional `prompt` parameter for AI-powered element location:\n\n| Action | Playwright | AI-Augmented |\n|--------|------------|--------------|\n| Click | `page.click(\"#btn\")` | `page.click(prompt=\"Click login button\")` |\n| Fill | `page.fill(\"#email\", \"a@b.com\")` | `page.fill(prompt=\"Email field\", value=\"a@b.com\")` |\n| Select | `page.select_option(\"#country\", \"US\")` | `page.select_option(prompt=\"Country dropdown\", value=\"US\")` |\n| Upload | `page.upload_file(\"#file\", \"doc.pdf\")` | `page.upload_file(prompt=\"Upload area\", files=\"doc.pdf\")` |\n\n**Three interaction modes:**\n```python\n# 1. Traditional Playwright - CSS/XPath selectors\nawait page.click(\"#submit-button\")\n\n# 2. AI-powered - natural language\nawait page.click(prompt=\"Click the green Submit button\")\n\n# 3. AI fallback - tries selector first, falls back to AI if it fails\nawait page.click(\"#submit-btn\", prompt=\"Click the Submit button\")\n```\n\n### Core AI Commands - Examples\n\n```python\n# act - Perform actions using natural language\nawait page.act(\"Click the login button and wait for the dashboard to load\")\n\n# extract - Extract structured data with optional JSON schema\nresult = await page.extract(\"Get the product name and price\")\nresult = await page.extract(\n    prompt=\"Extract order details\",\n    schema={\"order_id\": \"string\", \"total\": \"number\", \"items\": \"array\"}\n)\n\n# validate - Check page state (returns bool)\nis_logged_in = await page.validate(\"Check if the user is logged in\")\n\n# prompt - Send arbitrary prompts to the LLM\nsummary = await page.prompt(\"Summarize what's on this page\")\n```\n\n### Quick Start Examples\n\n**Run via UI:**\n```bash\nskyvern run all\n```\nNavigate to http://localhost:8080 to run tasks through the web interface. If the packaged UI is missing, `skyvern run ui` will offer to install the matching UI package. For non-interactive setup, use `skyvern run ui --install-ui` or `skyvern run all --install-ui`.\n\nTo run only the packaged UI against an existing Skyvern API, install `skyvern[ui]` and pass\n`--api-url`; the CLI infers `--wss-url` from the API URL unless you override it. You can also set\n`VITE_API_BASE_URL`, `VITE_WSS_BASE_URL`, `VITE_ARTIFACT_API_BASE_URL`, `VITE_SKYVERN_API_KEY`,\nand `VITE_BROWSER_STREAMING_MODE` before running `skyvern run ui`.\n\n**Python SDK:**\n```python\nfrom skyvern import Skyvern\n\n# Local mode\nskyvern = Skyvern.local()\n\n# Or connect to Skyvern Cloud\nskyvern = Skyvern(api_key=\"your-api-key\")\n\n# Launch browser and get page\nbrowser = await skyvern.launch_cloud_browser()\npage = await browser.get_working_page()\n\n# Mix Playwright with AI-powered actions\nawait page.goto(\"https://example.com\")\nawait page.click(\"#login-button\")  # Traditional Playwright\nawait page.agent.login(credential_type=\"skyvern\", credential_id=\"cred_123\")  # AI login\nawait page.click(prompt=\"Add first item to cart\")  # AI-augmented click\nawait page.agent.run_task(\"Complete checkout with: John Snow, 12345\")  # AI task\n```\n\n**TypeScript SDK:**\n```typescript\nimport { Skyvern } from \"@skyvern/client\";\n\nconst skyvern = new Skyvern({ apiKey: \"your-api-key\" });\nconst browser = await skyvern.launchCloudBrowser();\nconst page = await browser.getWorkingPage();\n\n// Mix Playwright with AI-powered actions\nawait page.goto(\"https://example.com\");\nawait page.click(\"#login-button\");  // Traditional Playwright\nawait page.agent.login(\"skyvern\", { credentialId: \"cred_123\" });  // AI login\nawait page.click({ prompt: \"Add first item to cart\" });  // AI-augmented click\nawait page.agent.runTask(\"Complete checkout with: John Snow, 12345\");  // AI task\n\nawait browser.close();\n```\n\n**Simple task execution:**\n```python\nfrom skyvern import Skyvern\n\nskyvern = Skyvern()\ntask = await skyvern.run_task(prompt=\"Find the top post on hackernews today\")\nprint(task)\n```\n\n## Advanced Usage\n\n### Control your own browser (Chrome)\n\nLet Skyvern control your existing Chrome browser — with all your cookies, logins, and extensions.\n\n#### Step 1: Enable remote debugging in Chrome\n\n1. Open Chrome and navigate to `chrome://inspect/#remote-debugging`\n2. Click **Enable** to start the debugging server\n3. You should see: **Server running at: 127.0.0.1:9222**\n\n> [!TIP]\n> The `skyvern init browser` command can do this automatically — it opens `chrome://inspect/#remote-debugging`, waits for you to enable it, and saves the config.\n\n#### Step 2: Connect Skyvern\n\n**Option A — Python Code:**\n```python\nfrom skyvern import Skyvern\n\nskyvern = Skyvern(\n    base_url=\"http://localhost:8000\",\n    api_key=\"YOUR_API_KEY\",\n    browser_address=\"http://127.0.0.1:9222\",\n)\ntask = await skyvern.run_task(\n    prompt=\"Find the top post on hackernews today\",\n)\n```\n\n**Option B — Skyvern Service:**\n\nAdd two variables to your .env file:\n```bash\nBROWSER_TYPE=cdp-connect\nBROWSER_REMOTE_DEBUGGING_URL=http://127.0.0.1:9222\n```\n\nRestart Skyvern service `skyvern run all` and run the task through UI or code\n\n### Connect Skyvern Cloud to your local browser\n\nLet Skyvern Cloud control a Chrome browser running on your machine — with all your existing cookies, logins, and extensions. Useful for automating sites where you're already logged in or behind a VPN.\n\n```bash\n# One command to start Chrome + create a tunnel to Skyvern Cloud\nskyvern browser serve --tunnel\n```\n\nThen use the tunnel URL in your task:\n\n```python\nfrom skyvern import Skyvern\n\nskyvern = Skyvern(api_key=\"your-api-key\")\ntask = await skyvern.run_task(\n    prompt=\"Download the latest invoice from my account\",\n    browser_address=\"https://abc123.ngrok-free.dev\",\n)\n```\n\n> [!WARNING]\n> Always use `--api-key` when exposing your browser via a tunnel. Without it, anyone with the URL has full control of your browser. See the [security docs](https://www.skyvern.com/docs/optimization/browser-tunneling#security).\n\nSee the [full documentation](https://www.skyvern.com/docs/optimization/browser-tunneling) for all options, manual tunnel setup, and troubleshooting.\n\n### Get consistent output schema from your run\nYou can do this by adding the `data_extraction_schema` parameter:\n```python\nfrom skyvern import Skyvern\n\nskyvern = Skyvern()\ntask = await skyvern.run_task(\n    prompt=\"Find the top post on hackernews today\",\n    data_extraction_schema={\n        \"type\": \"object\",\n        \"properties\": {\n            \"title\": {\n                \"type\": \"string\",\n                \"description\": \"The title of the top post\"\n            },\n            \"url\": {\n                \"type\": \"string\",\n                \"description\": \"The URL of the top post\"\n            },\n            \"points\": {\n                \"type\": \"integer\",\n                \"description\": \"Number of points the post has received\"\n            }\n        }\n    }\n)\n```\n\n### Helpful commands to debug issues\n\n\n```bash\n# Launch the Skyvern Server Separately*\nskyvern run server\n\n# Launch the Skyvern UI\nskyvern run ui\n\n# Check status of the Skyvern service\nskyvern status\n\n# Stop the Skyvern service\nskyvern stop all\n\n# Stop the Skyvern UI\nskyvern stop ui\n\n# Stop the Skyvern Server Separately\nskyvern stop server\n```\n\n# Performance & Evaluation\n\nSkyvern has SOTA performance on the [WebBench benchmark](webbench.ai) with a 64.4% accuracy. The technical report + evaluation can be found [here](https://www.skyvern.com/blog/web-bench-a-new-way-to-compare-ai-browser-agents/)\n\n<p align=\"center\">\n  <img src=\"fern/images/performance/webbench_overall.png\"/>\n</p>\n\n## Performance on WRITE tasks (eg filling out forms, logging in, downloading files, etc)\n\nSkyvern is the best performing agent on WRITE tasks (eg filling out forms, logging in, downloading files, etc), which is primarily used for RPA (Robotic Process Automation) adjacent tasks.\n\n<p align=\"center\">\n  <img src=\"fern/images/performance/webbench_write.png\"/>\n</p>\n\n# Skyvern Features\n\n## Skyvern Tasks\nTasks are the fundamental building block inside Skyvern. Each task is a single request to Skyvern, instructing it to navigate through a website and accomplish a specific goal.\n\nTasks require you to specify a `url`, `prompt`, and can optionally include a `data schema` (if you want the output to conform to a specific schema) and `error codes` (if you want Skyvern to stop running in specific situations).\n\n<p align=\"center\">\n  <img src=\"fern/images/skyvern_2_0_screenshot.png\"/>\n</p>\n\n\n## Skyvern Workflows\nWorkflows are a way to chain multiple tasks together to form a cohesive unit of work.\n\nFor example, if you wanted to download all invoices newer than January 1st, you could create a workflow that first navigated to the invoices page, then filtered down to only show invoices newer than January 1st, extracted a list of all eligible invoices, and iterated through each invoice to download it.\n\nAnother example is if you wanted to automate purchasing products from an e-commerce store, you could create a workflow that first navigated to the desired product, then added it to a cart. Second, it would navigate to the cart and validate the cart state. Finally, it would go through the checkout process to purchase the items.\n\nSupported workflow features include:\n1. Browser Task\n1. Browser Action\n1. Data Extraction\n1. Validation\n1. For Loops\n1. File parsing\n1. Sending emails\n1. Text Prompts\n1. HTTP Request Block\n1. Custom Code Block\n1. Uploading files to block storage\n1. (Coming soon) Conditionals\n\n<p align=\"center\">\n  <img src=\"fern/images/block_example_v2.png\"/>\n</p>\n\n## Livestreaming\nSkyvern allows you to livestream the viewport of the browser to your local machine so that you can see exactly what Skyvern is doing on the web. This is useful for debugging and understanding how Skyvern is interacting with a website, and intervening when necessary\n\n## Form Filling\nSkyvern is natively capable of filling out form inputs on websites. Passing in information via the `navigation_goal` will allow Skyvern to comprehend the information and fill out the form accordingly.\n\n## Data Extraction\nSkyvern is also capable of extracting data from a website.\n\nYou can also specify a `data_extraction_schema` directly within the main prompt to tell Skyvern exactly what data you'd like to extract from the website, in jsonc format. Skyvern's output will be structured in accordance to the supplied schema.\n\n## File Downloading\nSkyvern is also capable of downloading files from a website. All downloaded files are automatically uploaded to block storage (if configured), and you can access them via the UI.\n\n## Authentication\nSkyvern supports a number of different authentication methods to make it easier to automate tasks behind a login. If you'd like to try it out, please reach out to us [via email](mailto:founders@skyvern.com) or [discord](https://discord.gg/fG2XXEuQX3).\n\n<p align=\"center\">\n  <img src=\"fern/images/secure_password_task_example.png\"/>\n</p>\n\n\n### 🔐 2FA Support (TOTP)\nSkyvern supports a number of different 2FA methods to allow you to automate workflows that require 2FA.\n\nExamples include:\n1. QR-based 2FA (e.g. Google Authenticator, Authy)\n1. Email based 2FA\n1. SMS based 2FA\n\n🔐 Learn more about 2FA support [here](https://www.skyvern.com/docs/credentials/totp).\n\n### Password Manager Integrations\nSkyvern currently supports the following password manager integrations:\n- [x] Bitwarden\n- [x] Custom Credential Service (HTTP API)\n- [ ] 1Password\n- [ ] LastPass\n\n\n## Model Context Protocol (MCP)\n\nSkyvern supports the Model Context Protocol (MCP) to allow you to use any LLM that supports MCP.\n\nSee the MCP documentation [here](https://www.skyvern.com/docs/integrations/mcp#mcp-server)\n\n## Zapier / Make.com / N8N Integration\nSkyvern supports Zapier, Make.com, and N8N to allow you to connect your Skyvern workflows to other apps.\n\n* [Zapier](https://www.skyvern.com/docs/integrations/zapier)\n* [Make.com](https://www.skyvern.com/docs/integrations/make.com)\n* [N8N](https://www.skyvern.com/docs/integrations/n8n)\n\n🔐 Learn more about 2FA support [here](https://www.skyvern.com/docs/credentials/totp).\n\n\n# Real-world examples of Skyvern\nWe love to see how Skyvern is being used in the wild. Here are some examples of how Skyvern is being used to automate workflows in the real world. Please open PRs to add your own examples!\n\n## Invoice Downloading on many different websites\n[Book a demo to see it live](https://meetings.hubspot.com/skyvern/demo)\n\n<p align=\"center\">\n  <img src=\"fern/images/invoice_downloading.gif\"/>\n</p>\n\n## Automate the job application process\n[💡 See it in action](https://app.skyvern.com/tasks/create/job_application)\n<p align=\"center\">\n  <img src=\"fern/images/job_application_demo.gif\"/>\n</p>\n\n## Automate materials procurement for a manufacturing company\n[💡 See it in action](https://app.skyvern.com/tasks/create/finditparts)\n<p align=\"center\">\n  <img src=\"fern/images/finditparts_recording_crop.gif\"/>\n</p>\n\n## Navigating to government websites to register accounts or fill out forms\n[💡 See it in action](https://app.skyvern.com/tasks/create/california_edd)\n<p align=\"center\">\n  <img src=\"fern/images/edd_services.gif\"/>\n</p>\n<!-- Add example of delaware entity lookups x2 -->\n\n## Filling out random contact us forms\n[💡 See it in action](https://app.skyvern.com/tasks/create/contact_us_forms)\n<p align=\"center\">\n  <img src=\"fern/images/contact_forms.gif\"/>\n</p>\n\n\n## Retrieving insurance quotes from insurance providers in any language\n[💡 See it in action](https://app.skyvern.com/tasks/create/bci_seguros)\n<p align=\"center\">\n  <img src=\"fern/images/bci_seguros_recording.gif\"/>\n</p>\n\n[💡 See it in action](https://app.skyvern.com/tasks/create/geico)\n\n<p align=\"center\">\n  <img src=\"fern/images/geico_shu_recording_cropped.gif\"/>\n</p>\n\n# Contributor Setup\nMake sure to have [uv](https://docs.astral.sh/uv/getting-started/installation/) installed.\n1. Run this to create your virtual environment (`.venv`)\n    ```bash\n    uv sync --group dev\n    ```\n2. Perform initial server configuration\n    ```bash\n    uv run skyvern quickstart\n    ```\n3. Navigate to `http://localhost:8080` in your browser to start using the UI\n   *The Skyvern CLI supports Windows, WSL, macOS, and Linux environments.*\n\n# Documentation\n\nMore extensive documentation can be found on our [📕 docs page](https://www.skyvern.com/docs). Please let us know if something is unclear or missing by opening an issue or reaching out to us [via email](mailto:founders@skyvern.com) or [discord](https://discord.gg/fG2XXEuQX3).\n\n# Supported LLMs\n| Provider | Supported Models |\n| -------- | ------- |\n| OpenAI   | GPT-5.5, GPT-5.4, GPT-5, GPT-4.1, o3, o4-mini |\n| Anthropic | Claude 4.7 Opus, Claude 4.6 (Sonnet, Opus), Claude 4.5 (Haiku, Sonnet, Opus) |\n| Azure OpenAI | Any GPT models deployed to your Azure subscription |\n| AWS Bedrock | Claude 4.7, Claude 4.6 (Sonnet, Opus), Claude 4.5 (Sonnet, Opus) |\n| Gemini | Gemini 3.1 Pro, Gemini 3 Flash, Gemini 2.5 Pro/Flash |\n| Ollama | Run any locally hosted model via [Ollama](https://github.com/ollama/ollama) |\n| OpenRouter | Access models through [OpenRouter](https://openrouter.ai) |\n| OpenAI-compatible | Any custom API endpoint that follows OpenAI's API format (via [liteLLM](https://docs.litellm.ai/docs/providers/openai_compatible)) |\n\nFor detailed LLM configuration including all available model keys, environment variables, and multi-model setups, see the [LLM Configuration docs](https://www.skyvern.com/docs/self-hosted/llm-configuration).\n\n# Contributing\n\nWe welcome PRs and suggestions! Don't hesitate to open a PR/issue or to reach out to us [via email](mailto:founders@skyvern.com) or [discord](https://discord.gg/fG2XXEuQX3).\nPlease have a look at our [contribution guide](CONTRIBUTING.md) and\n[\"Help Wanted\" issues](https://github.com/skyvern-ai/skyvern/issues?q=is%3Aopen+is%3Aissue+label%3A%22help+wanted%22) to get started!\n\nIf you want to chat with the skyvern repository to get a high level overview of how it is structured, how to build off it, and how to resolve usage questions, check out [Code Sage](https://sage.storia.ai?utm_source=github&utm_medium=referral&utm_campaign=skyvern-readme).\n\n# Telemetry\n\nBy Default, Skyvern collects basic usage statistics to help us understand how Skyvern is being used. If you would like to opt-out of telemetry, please set the `SKYVERN_TELEMETRY` environment variable to `false`.\n\n# License\nSkyvern's open source repository is supported via a managed cloud. All of the core logic powering Skyvern is available in this open source repository licensed under the [AGPL-3.0 License](LICENSE), with the exception of anti-bot measures available in our managed cloud offering.\n\nIf you have any questions or concerns around licensing, please [contact us](mailto:support@skyvern.com) and we would be happy to help.\n\n# Star History\n\n[![Star History Chart](https://api.star-history.com/svg?repos=Skyvern-AI/skyvern&type=Date)](https://star-history.com/#Skyvern-AI/skyvern&Date)\n","summary":"Skyvern automates complex browser-based workflows by leveraging Large Language Models and computer vision rather than brittle, code-defined selectors. The platform enables users to interact with unfamiliar websites through an autonomous agent system that adapts to layout changes and performs tasks without requiring custom scripts. By offering both a Playwright-compatible SDK and a no-code workflow builder, Skyvern provides a robust automation solution for both developers and non-technical users looking to streamline manual web processes.","description":"Automate browser based workflows with AI","stars":21803,"language":"Python"},{"owner":"gleam-lang","repo":"gleam","url":"https://github.com/gleam-lang/gleam","readme":"<p align=\"center\">\n  <img src=\"images/lucy.png\" alt=\"Lucy, Gleam's mascot\">\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/gleam-lang/gleam/releases\"><img src=\"https://img.shields.io/github/release/gleam-lang/gleam\" alt=\"GitHub release\"></a>\n  <a href=\"https://discord.gg/Fm8Pwmy\"><img src=\"https://img.shields.io/discord/768594524158427167?color=blue\" alt=\"Discord chat\"></a>\n</p>\n\n<!-- A spacer -->\n<div>&nbsp;</div>\n\nGleam is a friendly language for building type-safe systems that scale! For more\ninformation see [the website](https://gleam.run).\n\n## Support Gleam!\n\nGleam is not owned by a corporation, instead it is kindly supported by its\nsponsors. If you like Gleam please consider [sponsoring the project or members\nof the core team](https://gleam.run/sponsor).\n\nThank you so much! 💖\n","summary":"Gleam is a friendly, high-level programming language designed for building scalable and reliable systems that run on the Erlang and JavaScript runtimes. It prioritizes developer experience by offering a powerful static type system that eliminates common runtime errors while maintaining straightforward, readable syntax. This language is an excellent choice for developers who want the performance and fault-tolerance of the BEAM virtual machine combined with the safety and maintainability of modern functional programming.","description":"⭐️ A friendly language for building type-safe, scalable systems!","stars":21538,"language":"Rust"},{"owner":"HeyPuter","repo":"puter","url":"https://github.com/HeyPuter/puter","readme":"<h3 align=\"center\"><img width=\"80\" alt=\"Puter.com, The Personal Cloud Computer: All your files, apps, and games in one place accessible from anywhere at any time.\" src=\"https://assets.puter.site/puter-logo.png\"></h3>\n\n<h3 align=\"center\">The Open-Source Internet Computer!</h3>\n\n<p align=\"center\">\n    <a href=\"https://puter.com/?ref=github.com\"><strong>« LIVE DEMO »</strong></a>\n    <br />\n    <br />\n    <a href=\"https://puter.com/?ref=github.com\">Puter.com</a>\n    ·\n    <a href=\"https://apps.puter.com/\">App Store</a>\n    ·\n    <a href=\"https://developer.puter.com\" target=\"_blank\">Developers</a>\n    ·\n    <a href=\"https://discord.com/invite/PQcx7Teh8u\">Discord</a>\n    ·\n    <a href=\"https://reddit.com/r/puter\">Reddit</a>\n    ·\n    <a href=\"https://twitter.com/HeyPuter\">X</a>\n</p>\n\n<h3 align=\"center\"><img width=\"800\" style=\"border-radius:5px;\" alt=\"screenshot\" src=\"https://assets.puter.site/puter.com-screenshot.webp\"></h3>\n\n<br/>\n\n## Puter\n\nPuter is an advanced, open-source, self-hostable internet computer designed to be feature-rich, fast, and highly extensible.\n\n### For Users\nPuter's goal is to provide you with every app and feature you need to work, create, and play under one roof. From a simple [Notepad](https://online-notepad.com) and [Voice Recorder](https://voice-recorder.com) to [Spreadsheet](https://apps.puter.com/app/spreadsheet) and [Camera](https://online-camera.com), Puter wants to be the all-in-one solution for your digital life.\n\n\n### For Developers\n\nPuter provides everything you need to build and publish web apps and games. From [AI](https://developer.puter.com/ai/) to [Cloud Storage](https://developer.puter.com/object-storage/) and [Database](https://developer.puter.com/key-value-database/) to [Serverless Workers](https://developer.puter.com/serverless-workers/), Puter has you covered. Puter also helps you get users! Once you build your app, you can publish it on our [App Store](https://apps.puter.com/) to reach and monetize users.\n\n<br/>\n\n## Getting Started\n\n\n### 💻 Local Development\n\n```bash\ngit clone https://github.com/HeyPuter/puter\ncd puter\nnpm install\nnpm start\n```\n**→** This should launch Puter at  http://puter.localhost:4100\n\n\n<br/>\n\n### 🚀 Self-Hosting\n\n#### Linux/macOS\n\n```bash\ncurl -fsSL https://puter.com/selfhost | sh\n```\n\n#### Windows\n\n```powershell\nirm https://puter.com/selfhost?os=windows | iex\n```\n\n**→** For more details, see [Self-Hosting Puter](./doc/self-hosting.md).\n\n<br/>\n\n### ☁️ Puter.com\n\nPuter is available as a hosted service at [**puter.com**](https://puter.com).\n\n<br/>\n\n## Support\n\nConnect with the maintainers and community through these channels:\n\n- Bug report or feature request? Please [open an issue](https://github.com/HeyPuter/puter/issues/new/choose).\n- Discord: [discord.com/invite/PQcx7Teh8u](https://discord.com/invite/PQcx7Teh8u)\n- X (Twitter): [x.com/HeyPuter](https://x.com/HeyPuter)\n- Reddit: [reddit.com/r/puter/](https://www.reddit.com/r/puter/)\n- Mastodon: [mastodon.social/@puter](https://mastodon.social/@puter)\n- Security issues or abuse reports? [security@puter.com](mailto:security@puter.com)\n- Email maintainers at [hi@puter.com](mailto:hi@puter.com)\n\nWe are always happy to help you with any questions you may have. Don't hesitate to ask!\n\n<br/>\n\n## License\n\nThis repository, including all its contents, sub-projects, modules, and components, is licensed under [AGPL-3.0](https://github.com/HeyPuter/puter/blob/main/LICENSE.txt) unless explicitly stated otherwise. Third-party libraries included in this repository may be subject to their own licenses.\n\n<br/>\n\n## Translations\n\n- [Arabic / العربية](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.ar.md)\n- [Armenian / Հայերեն](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.hy.md)\n- [Bengali / বাংলা](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.bn.md)\n- [Chinese / 中文](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.zh.md)\n- [Danish / Dansk](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.da.md)\n- [English](https://github.com/HeyPuter/puter/blob/main/README.md)\n- [Farsi / فارسی](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.fa.md)\n- [Finnish / Suomi](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.fi.md)\n- [French / Français](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.fr.md)\n- [German /  Deutsch](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.de.md)\n- [Hebrew/ עברית](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.he.md)\n- [Hindi / हिंदी](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.hi.md)\n- [Hungarian / Magyar](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.hu.md)\n- [Indonesian / Bahasa Indonesia](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.id.md)\n- [Italian / Italiano](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.it.md)\n- [Japanese / 日本語](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.jp.md)\n- [Korean / 한국어](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.ko.md)\n- [Malay / Bahasa Malaysia](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.my.md)\n- [Malayalam / മലയാളം](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.ml.md)\n- [Polish / Polski](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.pl.md)\n- [Portuguese / Português](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.pt.md)\n- [Punjabi / ਪੰਜਾਬੀ](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.pa.md)\n- [Romanian / Română](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.ro.md)\n- [Russian / Русский](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.ru.md)\n- [Spanish / Español](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.es.md)\n- [Swedish / Svenska](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.sv.md)\n- [Tamil / தமிழ்](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.ta.md)\n- [Telugu / తెలుగు](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.te.md)\n- [Thai / ไทย](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.th.md)\n- [Turkish / Türkçe](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.tr.md)\n- [Ukrainian / Українська](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.ua.md)\n- [Urdu / اردو](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.ur.md)\n- [Vietnamese / Tiếng Việt](https://github.com/HeyPuter/puter/blob/main/doc/i18n/README.vi.md)\n","summary":"Puter is an advanced, open-source internet computer that provides a comprehensive desktop-like environment accessible directly from a web browser. It serves as an all-in-one platform for users to manage their files, applications, and games while offering developers a robust suite of tools including AI integration, cloud storage, and serverless hosting. By enabling self-hosting, Puter is an ideal solution for individuals looking to maintain personal control over their digital workspace or developers seeking a streamlined environment to build, deploy, and monetize web-based applications.","description":"🌐 The Internet Computer! Free, Open-Source, and Self-Hostable.","stars":42077,"language":"TypeScript"},{"owner":"Project-DARC","repo":"DARC","url":"https://github.com/Project-DARC/DARC","readme":"# Decentralized Autonomous Regulated Company (DARC)\n\nWelcome to the official repository for the Decentralized Autonomous Regulated Company (DARC) project. DARC is a project\nthat aims to create a decentralized autonomous company that is regulated by a plugin system based on commercial laws.\nThe project is currently in the early stages of development and is not yet ready for production use.\n\nEnglish | [简体中文](./README_cn.md) | [日本語](./README_ja.md)\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/svg?repos=project-darc/darc&type=Date)](https://star-history.com/#project-darc/darc&Date)\n\n\n## Join our community\n\nTelegram: [https://t.me/projectdarc](https://t.me/projectdarc)\nDiscord: [https://discord.gg/QzKbTHVgGG](https://discord.gg/QzKbTHVgGG)\n\n## Whitepaper\n\nEnglish: [darc-whitepaper.pdf](https://github.com/Project-DARC/DARC-whitepaper/blob/release/darc-whitepaper.pdf)\n\nChinese(中文版): [darc-whitepaper-cn.pdf](https://github.com/Project-DARC/DARC-whitepaper/blob/release/darc-whitepaper-cn.pdf)\n\n## What is DARC?\n\nDecentralized Autonomous Regulated Company (DARC) is a company virtual machine that can be compiled and deployed to\nEVM-compatible blockchains with following features:\n\n- **Multi-level tokens**, each level token can be used as common stock, preferred stock, convertible bonds, board of\n  directors, product tokens, non-fungible tokens (NFT), with different prices, voting power and dividend power, which\n  are defined by the company's plugin(law) system.\n- **Program** composed of a series of DARC instructions that include managing tokens, dividends, voting, legislation,\n  purchasing, withdrawing cash, and other company operations.\n- **Dividend Mechanism** for distributing dividends to token holders according to certain rules.\n- **Plugin-as-a-Law**.The plugin system serves as the by-law or commercial contract that supervises all operations. All\n  company operations need to be approved by the plugin system or corresponding voting process.\n\n## By-Law Script\n\nBy-law script is a JavaScript-like programming language that is used to define the company's commercial rules and\noperations on DARC. For example:\n\n```javascript\nmint_tokens(   // mint token operation\n    [addr1, addr2, addr3],   // token address\n    [0, 0, 0],   // token class \n    [500, 300, 200]  // number of tokens\n);\n\npay_cash(100000000, 0, 1); // pay 0.1 ETH as purchase\n\ntransfer_tokens(   // transfer token operation\n    [addr1, addr2, addr3],   // token address\n    [0, 0, 0],   // token class \n    [100, 100, 200]  // number of tokens\n);\n\nadd_withdraw_cash(10000000);  // add 0.01 ETH to withdraw balance\n\nwithdraw_cash_to(  // withdraw cash from my account to other address\n    [addr4, addr5],       // withdraw cash to addr4, addr5\n    [10000000, 10000000]  // withdraw amount 0.01 ETH, 0.01 ETH\n);\n\n\n```\n\nAbove By-law Script will be transpiled via code generator and sent to corresponding DARC VM contract. The DARC will\nexecute the program if the plugin system approves. To add plugin and voting rules to the DARC, we can simple compose the\nplugin conditions and voting rules, then send them via operation `add_voting_rule()`, `add_and_enable_plugins()`\nor `add_plugins()`, and they will be deployed and effective immediately if the current plugin system approves the\noperation.\n\nHere is a quick example, assume we need to limit the transfer of tokens by major shareholders (>25%) by asking the board\nof directors for an all-hand vote (assuming 5 tokens in total), and it requires 100% approval (5 out of 5) in 1 hour. We\ncan add a new plugin and corresponding voting rule to the DARC VM contract:\n\n```javascript\nadd_voting_rule(  // add a voting rule (as index 5)\n    [\n        {\n            voting_class: [1], // voting token class: 1, level-1 token owners (board of directors) are required to vote\n            approve_percentage: 99,  // 99% voting power is required to approve\n            voting_duration: 3600,  // voting duration: 1 hour (3600 seconds)\n            execute_duration: 3600,  // pending duration for execution: 1 hour (3600 seconds)\n            is_absolute_majority: true,  // absolute majority is required, not relative majority\n        }\n    ]\n)\n\nadd_and_enable_plugins(   // add and enable plugins (as index 7)\n    [\n        {\n            condition:  // define the condition:\n                (operation == \"transfer_tokens\")   // if operation is transfer_tokens\n                & (operator_total_voting_power_percentage > 25),  // and addr1's voting power > 25%\n            return_type: voting_needed,  // return type: requires a vote\n            return_level: 100,  // priority: 100\n            votingRuleIndex: 5 // voting rule index 5 (ask board of directors to vote and must 100% approve)\n            note: \"100% Approval is needed by board members to transfer tokens by major shareholders (>25%)\"\n            is_before_operation: false,  // check the plugin after the operation is executed in sandbox\n        }\n    ]\n)\n```\n\nAfter above By-Law Script is executed, the DARC VM contract will add a new plugin and voting rule, and the plugin will\nbe effective immediately (if there exists any voting procedure related to `add_voting_rule()`\nand `add_and_enable_plugins()`, the plugin will be effective after the voting process is approved). If the\noperator (`addr1`) tries to transfer tokens to addr2, the plugin will check the condition and return `voting_needed` to\nthe DARC VM contract, and the DARC VM contract will ask the board of directors (level-1 token owners) to vote. If the\nboard of directors approves the operation, the operation will be executed in the sandbox, otherwise the operation will\nbe rejected. For example, if there are 3 voting rules are triggerd, the voting operation will be:\n\n```javascript\nvote([true, true, true])\n```\n\nIf the voting process is approved by the existing voting rules and plugins, the new program will be approved to execute\nin the next execution pending duration (1 hour in this example), and the program owner or any other members can execute\nthe program in the next 1 hour, or the program will be ignored and removed from the pending list.\n\n## \"Plugin-as-a-Law\"\n\nThe law of DARC is defined in below pseudo-code:\n\n```javascript\nif (plugin_condition == true) {\n    plugin_decision = allows / denies / requires a vote\n}\n```\n\nEach plugin contains a condition expression tree and a corresponding decision (return type). When the condition tree is\nevaluated to true while the program is submitted before running, the plugin will make a decision by allows, denies or\nrequires a vote. For example:\n\n### Example 1: Anti-Dilutive shares\n\nAnti-Dilutive shares is a basic mechanism to prevent the company (including DAO and other on-chain \"tokenomics\") from\nissuing too many shares and dilute the ownership of the existing shareholders. In DARC, the company and early-stage\ninvestors can define a law of \"anti-dilutive shares\", and the law can be abolished by certain process.\n\n***Law 1 (Anti-Dilutive Shares): Shareholder X should always holds 10% of the total stock.***\n\n*Design of Plugin: If operation is minting new level-0 tokens, plugin should check the state of token ownerships, X\nshould always keep a minimum total voting power of 10%, as well as dividend power of 10% after executing the operation*\n\nIn By-law script, we can define the plugin with following conditions:\n\n```javascript\n// define X's address\nconst x_addr = \"0x1234567890123456789012345678901234567890\";\n\n// define the plugin\nconst anti_delutive = {\n\n    // define the trigger condition\n    condition:\n        ((operation == \"mint_tokens\")             // if operator is minting new tokens\n            | (operation == \"pay_to_mint_tokens\"))   // or operator is paying to mint new tokens\n        &                                          // and        \n        ((total_voting_power_percentage(x) < 10)    // X's total voting power < 10%\n            | (total_dividend_power_percentage(x) < 10)),   // or X's total dividend power < 10%\n\n    // define the decision: reject the operation\n    return_type: NO,\n\n    // define the priority: 100\n    return_level: 100,\n\n    // check the plugin after the operation is executed in sandbox\n    is_before_operation: false,\n}\n```\n\nSince it checks the state of token ownerships, the plugin should be executed after the operation is executed inside the\nDARC's sandbox. If the plugin's condition is evaluated to true, the plugin will deny the operation after executing in\nthe sandbox, and the operation will be rejected to be executed in the real environment. Otherwise, \"minting new tokens\"\nwill be allowed to execute.\n\nWhen this plugin is added to the DARC, the operator (the author of current program) must mint extra tokens to\naddress `x_addr` to satisfy the **Law 1** above, otherwise it will be rejected. For example, the DARC has only one level\nof tokens (level 0, voting power = 1, dividend power = 1), the stock ownerships are:\n\n| ShareHolders | Number of tokens | Percentage |\n|--------------|------------------|------------|\n| CEO          | 400              | 40%        |\n| CTO          | 300              | 30%        |\n| CFO          | 200              | 20%        |\n| VC X         | 100              | 10%        |\n| **Total**    | **1000**         | **100%**   |\n\nIf the operator want to mint 200 tokens and issue them to VC Y, the operator must mint 20 tokens to address `x_addr` to\nsatisfy the **Law 1** above, otherwise the operation will be rejected. Here is a sample investment program by VC Y:\n\n```javascript\npay_cash(1000000000000)  // pay 1000 ETH to the DARC\nmint_tokens(20, 0, x_addr)  // mint 20 level-0 tokens to address x_addr\nmint_tokens(180, 0, y_addr)  // mint 180 level-0 tokens to address y_addr\nadd_and_enable_plugin([new_law_1, new_law_2, new_law_3])  // investment laws by VC Y\n```\n\nAfter the operation, the stock ownerships are:\n\n| ShareHolders | Number of tokens | Percentage |\n|--------------|------------------|------------|\n| CEO          | 400              | 33.33%     |\n| CTO          | 300              | 25%        |\n| CFO          | 200              | 16.67%     |\n| VC X         | 120              | 10%        |\n| VC Y         | 180              | 15%        |\n| **Total**    | **1200**         | 100%       |\n\nAlso another plugin should be added to the DARC to define the legislation of the \"Abolish Law 1\":\n\n***Law 1.1(Law 1 Appendix): Both Law 1 and Law 1 Appendix (current Law) can be abolished if and only if the operator is\nX***\n\n*Design of Plugin: If operation is \"disable_plugins\", and the plugin that to be disabled is with `id == 1` or `id == 2`,\nand the operator is not X, then the plugin should reject the operation (assume the anti dilutive law index is 1, and the\nappendix law index is 2, both are before-operation plugins)*\n\n```javascript\nconst law_1_appendix = {\n\n    // define the trigger condition\n    condition:\n        (operation == \"disable_plugins\")\n        & ((disable_after_op_plugin_id == 1) | (disable_after_op_plugin_id == 2))\n        & (operator != x_addr),\n\n    // define the decision\n    return_type: no,\n\n    // define the priority\n    return_level: 100,\n\n    // reject the operation before sandbox\n    is_before_operation: true,\n}\n```\n\n### Example 2: Bet-on Agreement/Valuation-Adjustment Mechanism(VAM) Agreement\n\n***Law2: If total revenue < 1000 ETH by 2035/01/01, shareholder X can take over 75% of total voting power and 90% of\ndividend power.***\n\n*Design of Plugin: After executing in sandbox, check the following conditions:*\n\n- *timestamp >= 2035/01/01*\n\n- *revenue since 2000/01/01 < 1000 ETH*\n\n- *operation is \"mint_tokens\"*\n\n- *total voting power of x <= 75%*\n\n- *the dividend power of x <= 90%*\n\n*then the plugin should approve the operation*\n\nIn By-law script, we can define the above plugin as following:\n\n```javascript\nconst bet_on_2 = {\n\n    // define the trigger condition\n    condition:\n        (timestamp >= toTimestamp('2035/01/01')) &\n        (revenue_since(946706400) < 1000000000000) & // 1000000000000 Gwei = 1000 ETH\n        (operation == \"mint_tokens\") &\n        (total_voting_power_percentage(x) < 75) &\n        (total_dividend_power_percentage(x) < 90),\n\n    // define the decision\n    return_type: yes,\n\n    // define the priority\n    return_level: 100,\n\n    // approve the operation after executing in sandbox\n    is_before_operation: false,\n}\n```\n\n### Example 3: Employee Payroll\n\n***Law 3: The payroll for employees with role level X should be 10 ETH per month.***\n\n*Design of Plugin: If operation is \"add withdrawable cash\", the amount is less than or equals to 10 ETH, and the last\noperation was at least 30 days, then this operation should be approved and skip sandbox check*\n\nIn By-law script, we can define the plugin with following conditions (for example, level X = 2 can withdraw 10 ETH per\n30 days):\n\n```javascript\nconst payroll_law_level_2 = {\n    condition:\n        (operation == \"add_withdrawable_cash\") &   // operation is \"add withdrawable cash\"\n        (member_role_level == 2) &   // the operator address is in role level 2\n\n        // add cash by < every 30 days = 2592000 seconds\n        (operator_last_operation_window(\"add_withdrawable_cash\") >= 2592000) &\n        // each time add < 10000000000 Gwei = 10 ETH to the account\n        (add_withdrawable_cash_amount <= 10000000000),\n\n    // approve the operation and skip sandbox check\n    return_type: yes_and_skip_sandbox,\n    return_level: 1\n    is_before_operation: true,\n}\n```\n\nWith the plugin above, the operator can add withdrawable cash to the employee's account with amount less than or equals\nto 10 ETH, and the last operation was at least 30 days. The plugin will approve the operation and skip the sandbox\ncheck. When the employee address is disable, removed from role level X, or other plugins with higher priority deny the\noperation, these operations will be rejected.\n\n### Example 4: Voting and legislation\n\nFor daily operations, the board of directors can be defined as a group of addresses, and the voting mechanism can be\nused to make decisions. For example, let's design the voting mechanism for the following scenario:\n\n1. Any address X with more than 10% total voting power can be added to the board by minting 1 token (level 2, board\n   voting token), if and only if the behavior is approved by 2/3 of all the board members (voting rule 1).\n\n```javascript\nconst add_board_member = {\n    condition:\n        (operation == \"mint_tokens\") &   // operation is \"mint_tokens\"\n        (mint_tokens_level == 2) &  // the token level is 2\n        (mint_tokens_amount == 1) &  // the amount is 1\n        (operator_total_voting_power_percentage >= 10),   // the operator address holds at least 10% of the total voting power\n    return_type: voting_needed,\n    voting_rule: 1,  // Under the voting rule 1, the operation will be approved if and only if 2/3 of all the board members approve the operation\n    return_level: 100,\n    is_before_operation: false, // make the decision after executing in sandbox\n}\n```\n\n2. Any operator with more than 7% of all voting power can submit `enable_plugins()` , and it needs to be approved by\n   100% of all the board members. Each operator can try to activate plugin per 10 days.\n\n```javascript\nconst enable_plugin = {\n    condition:\n        (operation == \"enable_plugins\") &   // operation is \"enable_plugins\"\n        (operator_total_voting_power_percentage >= 7) &   // the operator address holds at least 7% of the total voting power\n        (operator_last_operation_window(\"enable_plugin\") >= 864000),  // each operator can try to enable plugins once per 864000 seconds (10 days)\n\n    return_type: voting_needed,\n    voting_rule: 2,  // Under the voting rule 2, the operation will be approved if and only if 100% of all the board members approve the operation\n    return_level: 100,\n    is_before_operation: false, // make the decision after executing in sandbox\n}\n```\n\n3. To disable plugins 2,3 and 4, the operator needs to hold at least 20% of total voting power, and the operation needs\n   to be approved by 70% of all common stock token(level-0) voters as relative majority(voting rule 2). For each member\n   of DARC, this operation can be executed once per 15 days (1296000 seconds).\n\n```javascript\nconst disable_2_3_4 = {\n    condition:\n        (operation == \"disable_plugins\") &   // operation is \"disable_plugins\"\n        (\n            disable_after_op_plugin_id == 2\n            | disable_after_op_plugin_id == 3\n            | disable_after_op_plugin_id == 4\n        ) &  // disable after operation plugins 2,3 and 4\n        (operator_total_voting_power_percentage >= 20) &   // the operator address holds at least 20% of the total voting power\n        (operator_last_operation_window(\"disable_plugins\") >= 1296000),  // each operator can try to disable plugins once per 1296000 seconds (15 days)\n    return_type: voting_needed,\n    voting_rule: 3,  // Under the voting rule 3, the operation will be approved if and only if 70% of all the common stock holders approve the operation\n    is_before_operation: false, // make the decision after sandbox check\n}\n```\n\n### Example 5: Multi-level Tokens: Product tokens and Non-fungible tokens\n\nHere is an example of how to design a token with different levels of voting power and dividend power. The voting power\nand dividend power are used to calculate the voting power and dividend power of each token holder. Here is the table of\nthe token levels:\n\n| Level | Token                            | Voting Power | Dividend Power | Total Supply |\n|-------|----------------------------------|--------------|----------------|--------------|\n| 0     | Level-0 Common Stock             | 1            | 1              | 100,000      |\n| 1     | Level-1 Stock                    | 20           | 1              | 10,000       |\n| 2     | Board of Directors               | 1            | 0              | 5            |\n| 3     | Executives                       | 1            | 0              | 5            |\n| 4     | Non-Voting Shares                | 0            | 1              | 200,000      |\n| 5     | Product Token A (0.01 ETH/token) | 0            | 0              | ∞            |\n| 6     | Product Token B (10 ETH/token)   | 0            | 0              | ∞            |\n| 7     | Non-Fungible Token #1            | 0            | 0              | 1            |\n| 8     | Non-Fungible Token #2            | 0            | 0              | 1            |\n| 9     | Non-Fungible Token #3            | 0            | 0              | 1            |\n| 10    | Non-Fungible Token #4            | 0            | 0              | 1            |\n| 11    | Non-Fungible Token #5            | 0            | 0              | 1            |\n| ...   | ...                              | ...          | ...            | ...          |\n\nTo pay for service or prochase for products, customers can use `pay_cash()` to pay for the service directly, or\nuse `pay_to_mint_tokens()` as a payment method and receive product tokens/NFTs.\n\nHere is an example about how to define \"Product Token A\" and \"NFT\" price and total supply.\n\n```javascript\nconst product_token_A_price_law = {\n    condition:\n        (operation == \"pay_to_mint_tokens\") &   // operation is \"pay_to_mint_tokens\"\n        (pay_to_mint_tokens_level == 5) &  // the token level is 5\n        (pay_to_mint_price_per_token >= 10000000000000000),   // price per token >= 0.01 ETH = 10000000000000000 wei\n\n    return_type: yes_and_skip_sandbox,  // approve the operation and skip sandbox check\n    return_level: 1,\n    is_before_operation: true, // approve the operation and skip sandbox check\n}\n\nconst NFT_price_law = {\n    condition:\n        (operation == \"pay_to_mint_tokens\") &   // operation is \"pay_to_mint_tokens\"\n        (pay_to_mint_tokens_level >= 7) &  // the token level is 7 or higher\n        (pay_to_mint_token_amount == 1) &  // only allow to mint 1 token at a time\n        (pay_to_mint_current_level_total_supply == 0) &  // current total supply is 0\n        (pay_to_mint_price_per_token >= 10000000000000000000),   // price per token >= 10 ETH = 10000000000000000000 wei\n\n    return_type: yes_and_skip_sandbox,  // approve the operation and skip sandbox check\n    return_level: 1,\n    is_before_operation: true, // approve the operation and skip sandbox check\n}\n```\n\n### Example 6: Lock dividend yield rate for 5 years\n\nThe dividend mechanism is designed to distribute dividends to token holders under certain rules:\n\n1. For each `X` purchase transactions, take Y‱ of the total income as the dividendable cash\n2. The `offer_dividend()` operation can be called, which will distribute the dividendable cash to token holders'\n   dividend withdraw balance\n3. The amount of dividends per token holder (X) is calculated by the following\n   formula: `dividend_X = dividendable_cash * dividend_power(X) / total_dividend_power`\n4. After the `offer_dividend()` operation is called, the dividendable cash and dividendable transaction counter will be\n   set to 0, and the dividend withdraw balance of each token holder will be increased by `dividend_X`\n\nTo make sure the dividend yield rate is stable, we can add a plugin to the DARC to lock the dividend yield rate for 5\nyears by limiting the `set_parameters()` function.\n\n***Law 6: The dividend yield rate should be locked > 500‱ (5%) before 2030-01-01.***\n\n```javascript\nconst dividend_yield_rate_law = {\n    condition:\n        (operation == \"set_parameters\") &  // operation is \"set_parameters\"\n        (set_parameters_key == \"dividendPermyriadPerTransaction\") &  // the key is \"dividend_yield_rate\"\n        (set_parameters_value < 500) &  // the value is < 500‱ (5%)\n        (timestamp < 1893477600),  // the timestamp < unix timestamp  2030-01-01 00:00:00 (UTC) \n\n    return_type: no,  // reject the operation\n    return_level: 1,\n    is_before_operation: true, // reject the operation and skip sandbox check\n}\n```\n\n### Example 7: Investment program package\n\nHere is an unofficial example program of **Simple agreement for future equity (SAFE)**, a common investment contract by\na VC firm:\n\n1. The VC firm will pay 1000 ETH (1000000000000 Gwei) cash to the DARC as investment\n2. The VC firm will be granted 100,000,000 level-0 tokens (common stock) and 1 level-2 token (board of members)\n3. The VC firm will be granted the right to disable plugins 5, 6, 7\n4. The VC firm will be granted the right to enable plugins 8, 9, 10, 11\n5. The VC firm will be granted the right to change its role to level-5 (majority shareholder level)\n6. It's recommended to sign and scan a PDF document to record the agreement, upload the PDF document to IPFS, and add\n   the IPFS hash `QmcpxHN3a5HYnPurtuDs3jDfDSg1LPDe2KVBUG4RifcSbC` to the DARC permanent storage array. This can help the\n   emergency agent to verify and fix DARC technical issues if needed.\n\n```javascript\nconst vc_addr = \"0x1234567890123456789012345678901234567890\";  // define my address\n\npay_cash(1000000000000, 0, 1);  // pay 1000 ETH = 1000000000000 Gwei cash\n\nmint_token([vc_addr], [100000000], [0]);  // mint 100,000,000 level-0 tokens (common stock) to VC firm\n\nmint_token([vc_addr], [1], [2]);  // mint a single 2-level token (board of members) to VC firm\n\ndisable_plugins([5, 6, 7], [false, false, false]) // disable previes after-operation plugins 5, 6, 7\n\nenable_plugins([8, 9, 10, 11], [false, false, false, false]) // enable new added plugins 8, 9, 10, which were added before this program\n\nchange_member_role(vc_addr, 5);  // change the role of VC firm to level-5 (majority shareholder level)\n\n/** Finally, sign and scan a SAFE document,\n * upload and pin on IPFS, and add the IPFS hash value to the DARC\n * just in case if DARC needs emergency agent to take over the DARC\n */\nadd_storage(['QmcpxHN3a5HYnPurtuDs3jDfDSg1LPDe2KVBUG4RifcSbC']);\n```\n\n## Building the source\n\nSince Hardhat and OpenZeppelin are used, the project can be built using the following commands:\n\n1. Install dependencies\n\n   We recommend that you use `pnpm` instead of `npm`, but `npm` can also work.\n\n   `pnpm` is a newer package manager that has some advantages over npm. It is faster, more efficient, and disk-space\n   friendly.\n\n    ```shell\n    cd darc-protocol\n    npm install\n    ```\n\n2. Compile the contracts\n\n    ```shell\n    npx hardhat compile\n    ```\n\n3. Run the Darc test network\n\n    ```shell\n    npm run node\n    ```\n\n4. Test contracts\n\n    ```shell\n    npx hardhat test\n    REPORT_GAS=true npm run test\n    ```\n\n5. Deploy contracts\n\n    ```shell\n    npm run deploy\n    ```\n","summary":"Project-DARC (Decentralized Autonomous Regulated Company) provides a virtual machine framework that allows users to deploy regulated corporate structures directly onto EVM-compatible blockchains. Its core functionality revolves around a flexible \"plugin-as-a-law\" system, enabling the customization of complex operational rules, multi-level token classes, and automated dividend distributions. By using a JavaScript-like scripting language, developers can define and enforce commercial by-laws, making this platform ideal for those seeking to build compliant, automated, and decentralized organizations.","description":"Decentralized Autonomous Regulated Company (DARC), a company virtual machine that runs on any EVM-compatible blockchain, with on-chain law system, multi-level tokens and dividends mechanism.","stars":9171,"language":"TypeScript"},{"owner":"electron","repo":"electron","url":"https://github.com/electron/electron","readme":"[![Electron Logo](https://electronjs.org/images/electron-logo.svg)](https://electronjs.org)\n\n[![GitHub Actions Build Status](https://github.com/electron/electron/actions/workflows/build.yml/badge.svg)](https://github.com/electron/electron/actions/workflows/build.yml)\n[![Electron Discord Invite](https://img.shields.io/discord/745037351163527189?color=%237289DA&label=chat&logo=discord&logoColor=white)](https://discord.gg/electronjs)\n\n:memo: Available Translations: 🇨🇳 🇧🇷 🇪🇸 🇯🇵 🇷🇺 🇫🇷 🇺🇸 🇩🇪.\nView these docs in other languages on our [Crowdin](https://crowdin.com/project/electron) project.\n\nThe Electron framework lets you write cross-platform desktop applications\nusing JavaScript, HTML and CSS. It is based on [Node.js](https://nodejs.org/) and\n[Chromium](https://www.chromium.org) and is used by the\n[Visual Studio Code](https://github.com/Microsoft/vscode/) and many other [apps](https://electronjs.org/apps).\n\nFollow [@electronjs](https://twitter.com/electronjs) on Twitter for important\nannouncements.\n\nThis project adheres to the Contributor Covenant\n[code of conduct](https://github.com/electron/electron/tree/main/CODE_OF_CONDUCT.md).\nBy participating, you are expected to uphold this code. Please report unacceptable\nbehavior to [coc@electronjs.org](mailto:coc@electronjs.org).\n\n## Installation\n\nTo install prebuilt Electron binaries, use [`npm`](https://docs.npmjs.com/).\nThe preferred method is to install Electron as a development dependency in your\napp:\n\n```sh\nnpm install electron --save-dev\n```\n\nFor more installation options and troubleshooting tips, see\n[installation](docs/tutorial/installation.md). For info on how to manage Electron versions in your apps, see\n[Electron versioning](docs/tutorial/electron-versioning.md).\n\n## Platform support\n\nEach Electron release provides binaries for macOS, Windows, and Linux.\n\n* macOS (Monterey and up): Electron provides 64-bit Intel and Apple Silicon / ARM binaries for macOS.\n* Windows (Windows 10 and up): Electron provides `ia32` (`x86`), `x64` (`amd64`), and `arm64` binaries for Windows. Windows on ARM support was added in Electron 5.0.8. Support for Windows 7, 8 and 8.1 was [removed in Electron 23, in line with Chromium's Windows deprecation policy](https://www.electronjs.org/blog/windows-7-to-8-1-deprecation-notice).\n* Linux: The prebuilt binaries of Electron are built on Ubuntu 22.04. They have also been verified to work on:\n  * Ubuntu 18.04 and newer\n  * Fedora 32 and newer\n  * Debian 10 and newer\n\n## Electron Fiddle\n\nUse [`Electron Fiddle`](https://github.com/electron/fiddle)\nto build, run, and package small Electron experiments, to see code examples for all of Electron's APIs, and\nto try out different versions of Electron. It's designed to make the start of your journey with\nElectron easier.\n\n## Resources for learning Electron\n\n* [electronjs.org/docs](https://electronjs.org/docs) - All of Electron's documentation\n* [electron/fiddle](https://github.com/electron/fiddle) - A tool to build, run, and package small Electron experiments\n* [electronjs.org/community#boilerplates](https://electronjs.org/community#boilerplates) - Sample starter apps created by the community\n\n## Programmatic usage\n\nMost people use Electron from the command line, but if you require `electron` inside\nyour **Node app** (not your Electron app) it will return the file path to the\nbinary. Use this to spawn Electron from Node scripts:\n\n```javascript\nconst electron = require('electron')\nconst proc = require('node:child_process')\n\n// will print something similar to /Users/maf/.../Electron\nconsole.log(electron)\n\n// spawn Electron\nconst child = proc.spawn(electron)\n```\n\n### Mirrors\n\n* [China](https://npmmirror.com/mirrors/electron/)\n\nSee the [Advanced Installation Instructions](https://www.electronjs.org/docs/latest/tutorial/installation#mirror) to learn how to use a custom mirror.\n\n## Documentation translations\n\nWe crowdsource translations for our documentation via [Crowdin](https://crowdin.com/project/electron).\nWe currently accept translations for Chinese (Simplified), French, German, Japanese, Portuguese,\nRussian, and Spanish.\n\n## Contributing\n\nIf you are interested in reporting/fixing issues and contributing directly to the code base, please see [CONTRIBUTING.md](CONTRIBUTING.md) for more information on what we're looking for and how to get started.\n\n## Community\n\nInfo on reporting bugs, getting help, finding third-party tools and sample apps,\nand more can be found on the [Community page](https://www.electronjs.org/community).\n\n## License\n\n[MIT](https://github.com/electron/electron/blob/main/LICENSE)\n\nWhen using Electron logos, make sure to follow [OpenJS Foundation Trademark Policy](https://trademark-policy.openjsf.org/).\n","summary":"Electron is a powerful open-source framework that enables developers to build cross-platform desktop applications using web technologies like JavaScript, HTML, and CSS. By leveraging Node.js for backend access and Chromium for frontend rendering, it allows for the creation of native-feeling applications across macOS, Windows, and Linux. This framework is ideal for developers who want to streamline their workflow by applying existing web expertise to desktop software development, as evidenced by its use in major applications like Visual Studio Code.","description":":electron: Build cross-platform desktop apps with JavaScript, HTML, and CSS","stars":121518,"language":"C++"},{"owner":"PromtEngineer","repo":"localGPT","url":"https://github.com/PromtEngineer/localGPT","readme":"# LocalGPT - Private Document Intelligence Platform\n\n<div align=\"center\">\n\n<p align=\"center\">\n<a href=\"https://trendshift.io/repositories/2947\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/2947\" alt=\"PromtEngineer%2FlocalGPT | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/></a>\n</p>\n\n[![GitHub Stars](https://img.shields.io/github/stars/PromtEngineer/localGPT?style=flat-square)](https://github.com/PromtEngineer/localGPT/stargazers)\n[![GitHub Forks](https://img.shields.io/github/forks/PromtEngineer/localGPT?style=flat-square)](https://github.com/PromtEngineer/localGPT/network/members)\n[![GitHub Issues](https://img.shields.io/github/issues/PromtEngineer/localGPT?style=flat-square)](https://github.com/PromtEngineer/localGPT/issues)\n[![GitHub Pull Requests](https://img.shields.io/github/issues-pr/PromtEngineer/localGPT?style=flat-square)](https://github.com/PromtEngineer/localGPT/pulls)\n[![Python 3.8+](https://img.shields.io/badge/python-3.8+-blue.svg?style=flat-square)](https://www.python.org/downloads/)\n[![License](https://img.shields.io/badge/license-MIT-green.svg?style=flat-square)](LICENSE)\n[![Docker](https://img.shields.io/badge/docker-supported-blue.svg?style=flat-square)](https://www.docker.com/)\n\n<p align=\"center\">\n    <a href=\"https://x.com/engineerrprompt\">\n      <img src=\"https://img.shields.io/badge/Follow%20on%20X-000000?style=for-the-badge&logo=x&logoColor=white\" alt=\"Follow on X\" />\n    </a>\n    <a href=\"https://discord.gg/tUDWAFGc\">\n      <img src=\"https://img.shields.io/badge/Join%20our%20Discord-5865F2?style=for-the-badge&logo=discord&logoColor=white\" alt=\"Join our Discord\" />\n    </a>\n  </p>\n</div>\n\n## 🚀 What is LocalGPT?\n\nLocalGPT is a **fully private, on-premise Document Intelligence platform**. Ask questions, summarise, and uncover insights from your files with state-of-the-art AI—no data ever leaves your machine.\n\nMore than a traditional RAG (Retrieval-Augmented Generation) tool, LocalGPT features a **hybrid search engine** that blends semantic similarity, keyword matching, and [Late Chunking](https://jina.ai/news/late-chunking-in-long-context-embedding-models/) for long-context precision. A **smart router** automatically selects between RAG and direct LLM answering for every query, while **contextual enrichment** and sentence-level [Context Pruning](https://huggingface.co/naver/provence-reranker-debertav3-v1) surface only the most relevant content. An independent **verification** pass adds an extra layer of accuracy.\n\nThe architecture is **modular and lightweight**—enable only the components you need. With a pure-Python core and minimal dependencies, LocalGPT is simple to deploy, run, and maintain on any infrastructure.The system has minimal dependencies on frameworks and libraries, making it easy to deploy and maintain. The RAG system is pure python and does not require any additional dependencies.\n\n## ▶️ Video\nWatch this [video](https://youtu.be/JTbtGH3secI) to get started with LocalGPT. \n\n| Home | Create Index | Chat |\n|------|--------------|------|\n| ![](Documentation/images/Home.png) | ![](Documentation/images/Index%20Creation.png) | ![](Documentation/images/Retrieval%20Process.png) |\n\n## ✨ Features\n\n- **Utmost Privacy**: Your data remains on your computer, ensuring 100% security.\n- **Versatile Model Support**: Seamlessly integrate a variety of open-source models via Ollama.\n- **Diverse Embeddings**: Choose from a range of open-source embeddings.\n- **Reuse Your LLM**: Once downloaded, reuse your LLM without the need for repeated downloads.\n- **Chat History**: Remembers your previous conversations (in a session).\n- **API**: LocalGPT has an API that you can use for building RAG Applications.\n- **GPU, CPU, HPU & MPS Support**: Supports multiple platforms out of the box, Chat with your data using `CUDA`, `CPU`, `HPU (Intel® Gaudi®)` or `MPS` and more!\n\n### 📖 Document Processing\n- **Multi-format Support**: PDF, DOCX, TXT, Markdown, and more (Currently only PDF is supported)\n- **Contextual Enrichment**: Enhanced document understanding with AI-generated context, inspired by [Contextual Retrieval](https://www.anthropic.com/news/contextual-retrieval)\n- **Batch Processing**: Handle multiple documents simultaneously\n\n### 🤖 AI-Powered Chat\n- **Natural Language Queries**: Ask questions in plain English\n- **Source Attribution**: Every answer includes document references\n- **Smart Routing**: Automatically chooses between RAG and direct LLM responses\n- **Query Decomposition**: Breaks complex queries into sub-questions for better answers\n- **Semantic Caching**: TTL-based caching with similarity matching for faster responses\n- **Session-Aware History**: Maintains conversation context across interactions\n- **Answer Verification**: Independent verification pass for accuracy\n- **Multiple AI Models**: Ollama for inference, HuggingFace for embeddings and reranking\n\n\n### 🛠️ Developer-Friendly\n- **RESTful APIs**: Complete API access for integration\n- **Real-time Progress**: Live updates during document processing\n- **Flexible Configuration**: Customize models, chunk sizes, and search parameters\n- **Extensible Architecture**: Plugin system for custom components\n\n### 🎨 Modern Interface\n- **Intuitive Web UI**: Clean, responsive design\n- **Session Management**: Organize conversations by topic\n- **Index Management**: Easy document collection management\n- **Real-time Chat**: Streaming responses for immediate feedback\n\n---\n\n## 🚀 Quick Start\n\nNote: The installation is currently only tested on macOS. \n\n### Prerequisites\n- Python 3.8 or higher (tested with Python 3.11.5)\n- Node.js 16+ and npm (tested with Node.js 23.10.0, npm 10.9.2)\n- Docker (optional, for containerized deployment)\n- 8GB+ RAM (16GB+ recommended)\n- Ollama (required for both deployment approaches)\n\n### ***NOTE***\nBefore this brach is moved to the main branch, please clone this branch for instalation:\n\n```bash\ngit clone -b localgpt-v2 https://github.com/PromtEngineer/localGPT.git\ncd localGPT\n```\n\n### Option 1: Docker Deployment \n\n```bash\n# Clone the repository\ngit clone https://github.com/PromtEngineer/localGPT.git\ncd localGPT\n\n# Install Ollama locally (required even for Docker)\ncurl -fsSL https://ollama.ai/install.sh | sh\nollama pull qwen3:0.6b\nollama pull qwen3:8b\n\n# Start Ollama\nollama serve\n\n# Start with Docker (in a new terminal)\n./start-docker.sh\n\n# Access the application\nopen http://localhost:3000\n```\n\n**Docker Management Commands:**\n```bash\n# Check container status\ndocker compose ps\n\n# View logs\ndocker compose logs -f\n\n# Stop containers\n./start-docker.sh stop\n```\n\n### Option 2: Direct Development (Recommended for Development)\n\n```bash\n# Clone the repository\ngit clone https://github.com/PromtEngineer/localGPT.git\ncd localGPT\n\n# Install Python dependencies\npip install -r requirements.txt\n\n# Key dependencies installed:\n# - torch==2.4.1, transformers==4.51.0 (AI models)\n# - lancedb (vector database)\n# - rank_bm25, fuzzywuzzy (search algorithms)\n# - sentence_transformers, rerankers (embedding/reranking)\n# - docling (document processing)\n# - colpali-engine (multimodal processing - support coming soon)\n\n# Install Node.js dependencies\nnpm install\n\n# Install and start Ollama\ncurl -fsSL https://ollama.ai/install.sh | sh\nollama pull qwen3:0.6b\nollama pull qwen3:8b\nollama serve\n\n# Start the system (in a new terminal)\npython run_system.py\n\n# Access the application\nopen http://localhost:3000\n```\n\n**System Management:**\n```bash\n# Check system health (comprehensive diagnostics)\npython system_health_check.py\n\n# Check service status and health\npython run_system.py --health\n\n# Start in production mode\npython run_system.py --mode prod\n\n# Skip frontend (backend + RAG API only)\npython run_system.py --no-frontend\n\n# View aggregated logs\npython run_system.py --logs-only\n\n# Stop all services\npython run_system.py --stop\n# Or press Ctrl+C in the terminal running python run_system.py\n```\n\n**Service Architecture:**\nThe `run_system.py` launcher manages four key services:\n- **Ollama Server** (port 11434): AI model serving\n- **RAG API Server** (port 8001): Document processing and retrieval\n- **Backend Server** (port 8000): Session management and API endpoints\n- **Frontend Server** (port 3000): React/Next.js web interface\n\n### Option 3: Manual Component Startup\n\n```bash\n# Terminal 1: Start Ollama\nollama serve\n\n# Terminal 2: Start RAG API\npython -m rag_system.api_server\n\n# Terminal 3: Start Backend\ncd backend && python server.py\n\n# Terminal 4: Start Frontend\nnpm run dev\n\n# Access at http://localhost:3000\n```\n\n---\n\n### Detailed Installation\n\n#### 1. Install System Dependencies\n\n**Ubuntu/Debian:**\n```bash\nsudo apt update\nsudo apt install python3.8 python3-pip nodejs npm docker.io docker-compose\n```\n\n**macOS:**\n```bash\nbrew install python@3.8 node npm docker docker-compose\n```\n\n**Windows:**\n```bash\n# Install Python 3.8+, Node.js, and Docker Desktop\n# Then use PowerShell or WSL2\n```\n\n#### 2. Install AI Models\n\n**Install Ollama (Recommended):**\n```bash\n# Install Ollama\ncurl -fsSL https://ollama.ai/install.sh | sh\n\n# Pull recommended models\nollama pull qwen3:0.6b          # Fast generation model\nollama pull qwen3:8b            # High-quality generation model\n```\n\n#### 3. Configure Environment\n\n```bash\n# Copy environment template\ncp .env.example .env\n\n# Edit configuration\nnano .env\n```\n\n**Key Configuration Options:**\n```env\n# AI Models (referenced in rag_system/main.py)\nOLLAMA_HOST=http://localhost:11434\n\n# Database Paths (used by backend and RAG system)\nDATABASE_PATH=./backend/chat_data.db\nVECTOR_DB_PATH=./lancedb\n\n# Server Settings (used by run_system.py)\nBACKEND_PORT=8000\nFRONTEND_PORT=3000\nRAG_API_PORT=8001\n\n# Optional: Override default models\nGENERATION_MODEL=qwen3:8b\nENRICHMENT_MODEL=qwen3:0.6b\nEMBEDDING_MODEL=Qwen/Qwen3-Embedding-0.6B\nRERANKER_MODEL=answerdotai/answerai-colbert-small-v1\n```\n\n#### 4. Initialize the System\n\n```bash\n# Run system health check\npython system_health_check.py\n\n# Initialize databases\npython -c \"from backend.database import ChatDatabase; ChatDatabase().init_database()\"\n\n# Test installation\npython -c \"from rag_system.main import get_agent; print('✅ Installation successful!')\"\n\n# Validate complete setup\npython run_system.py --health\n```\n\n---\n\n## 🎯 Getting Started\n\n### 1. Create Your First Index\n\nAn **index** is a collection of processed documents that you can chat with.\n\n#### Using the Web Interface:\n1. Open http://localhost:3000\n2. Click \"Create New Index\"\n3. Upload your documents (PDF, DOCX, TXT)\n4. Configure processing options\n5. Click \"Build Index\"\n\n#### Using Scripts:\n```bash\n# Simple script approach\n./simple_create_index.sh \"My Documents\" \"path/to/document.pdf\"\n\n# Interactive script\npython create_index_script.py\n```\n\n#### Using API:\n```bash\n# Create index\ncurl -X POST http://localhost:8000/indexes \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"name\": \"My Index\", \"description\": \"My documents\"}'\n\n# Upload documents\ncurl -X POST http://localhost:8000/indexes/INDEX_ID/upload \\\n  -F \"files=@document.pdf\"\n\n# Build index\ncurl -X POST http://localhost:8000/indexes/INDEX_ID/build\n```\n\n### 2. Start Chatting\n\nOnce your index is built:\n\n1. **Create a Chat Session**: Click \"New Chat\" or use an existing session\n2. **Select Your Index**: Choose which document collection to query\n3. **Ask Questions**: Type natural language questions about your documents\n4. **Get Answers**: Receive AI-generated responses with source citations\n\n### 3. Advanced Features\n\n#### Custom Model Configuration\n```bash\n# Use different models for different tasks\ncurl -X POST http://localhost:8000/sessions \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"title\": \"High Quality Session\",\n    \"model\": \"qwen3:8b\",\n    \"embedding_model\": \"Qwen/Qwen3-Embedding-4B\"\n  }'\n```\n\n#### Batch Document Processing\n```bash\n# Process multiple documents at once\npython demo_batch_indexing.py --config batch_indexing_config.json\n```\n\n#### API Integration\n```python\nimport requests\n\n# Chat with your documents via API\nresponse = requests.post('http://localhost:8000/chat', json={\n    'query': 'What are the key findings in the research papers?',\n    'session_id': 'your-session-id',\n    'search_type': 'hybrid',\n    'retrieval_k': 2
