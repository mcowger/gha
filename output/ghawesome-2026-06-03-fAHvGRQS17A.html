0\n})\n\nprint(response.json()['response'])\n```\n\n---\n\n## 🔧 Configuration\n\n### Model Configuration\n\nLocalGPT supports multiple AI model providers with centralized configuration:\n\n#### Ollama Models (Local Inference)\n```python\nOLLAMA_CONFIG = {\n    \"host\": \"http://localhost:11434\",\n    \"generation_model\": \"qwen3:8b\",        # Main text generation\n    \"enrichment_model\": \"qwen3:0.6b\"       # Lightweight routing/enrichment\n}\n```\n\n#### External Models (HuggingFace Direct)\n```python\nEXTERNAL_MODELS = {\n    \"embedding_model\": \"Qwen/Qwen3-Embedding-0.6B\",           # 1024 dimensions\n    \"reranker_model\": \"answerdotai/answerai-colbert-small-v1\", # ColBERT reranker\n    \"fallback_reranker\": \"BAAI/bge-reranker-base\"             # Backup reranker\n}\n```\n\n### Pipeline Configuration\n\nLocalGPT offers two main pipeline configurations:\n\n#### Default Pipeline (Production-Ready)\n```python\n\"default\": {\n    \"description\": \"Production-ready pipeline with hybrid search, AI reranking, and verification\",\n    \"storage\": {\n        \"lancedb_uri\": \"./lancedb\",\n        \"text_table_name\": \"text_pages_v3\",\n        \"bm25_path\": \"./index_store/bm25\"\n    },\n    \"retrieval\": {\n        \"retriever\": \"multivector\",\n        \"search_type\": \"hybrid\",\n        \"late_chunking\": {\"enabled\": True},\n        \"dense\": {\"enabled\": True, \"weight\": 0.7},\n        \"bm25\": {\"enabled\": True}\n    },\n    \"reranker\": {\n        \"enabled\": True,\n        \"type\": \"ai\",\n        \"strategy\": \"rerankers-lib\",\n        \"model_name\": \"answerdotai/answerai-colbert-small-v1\",\n        \"top_k\": 10\n    },\n    \"query_decomposition\": {\"enabled\": True, \"max_sub_queries\": 3},\n    \"verification\": {\"enabled\": True},\n    \"retrieval_k\": 20,\n    \"contextual_enricher\": {\"enabled\": True, \"window_size\": 1}\n}\n```\n\n#### Fast Pipeline (Speed-Optimized)\n```python\n\"fast\": {\n    \"description\": \"Speed-optimized pipeline with minimal overhead\",\n    \"retrieval\": {\n        \"search_type\": \"vector_only\",\n        \"late_chunking\": {\"enabled\": False}\n    },\n    \"reranker\": {\"enabled\": False},\n    \"query_decomposition\": {\"enabled\": False},\n    \"verification\": {\"enabled\": False},\n    \"retrieval_k\": 10,\n    \"contextual_enricher\": {\"enabled\": False}\n}\n```\n\n### Search Configuration\n\n```python\nSEARCH_CONFIG = {\n    'hybrid': {\n        'dense_weight': 0.7,\n        'sparse_weight': 0.3,\n        'retrieval_k': 20,\n        'reranker_top_k': 10\n    }\n}\n```\n---\n\n## 🛠️ Troubleshooting\n\n### Common Issues\n\n#### Installation Problems\n```bash\n# Check Python version\npython --version  # Should be 3.8+\n\n# Check dependencies\npip list | grep -E \"(torch|transformers|lancedb)\"\n\n# Reinstall dependencies\npip install -r requirements.txt --force-reinstall\n```\n\n#### Model Loading Issues\n```bash\n# Check Ollama status\nollama list\ncurl http://localhost:11434/api/tags\n\n# Pull missing models\nollama pull qwen3:0.6b\n```\n\n#### Database Issues\n```bash\n# Check database connectivity\npython -c \"from backend.database import ChatDatabase; db = ChatDatabase(); print('✅ Database OK')\"\n\n# Reset database (WARNING: This deletes all data)\nrm backend/chat_data.db\npython -c \"from backend.database import ChatDatabase; ChatDatabase().init_database()\"\n```\n\n#### Performance Issues\n```bash\n# Check system resources\npython system_health_check.py\n\n# Monitor memory usage\nhtop  # or Task Manager on Windows\n\n# Optimize for low-memory systems\nexport PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512\n```\n\n### Getting Help\n\n1. **Check Logs**: The system creates structured logs in the `logs/` directory:\n   - `logs/system.log`: Main system events and errors\n   - `logs/ollama.log`: Ollama server logs\n   - `logs/rag-api.log`: RAG API processing logs\n   - `logs/backend.log`: Backend server logs\n   - `logs/frontend.log`: Frontend build and runtime logs\n\n2. **System Health**: Run comprehensive diagnostics:\n   ```bash\n   python system_health_check.py  # Full system diagnostics\n   python run_system.py --health  # Service status check\n   ```\n\n3. **Health Endpoints**: Check individual service health:\n   - Backend: `http://localhost:8000/health`\n   - RAG API: `http://localhost:8001/health`\n   - Ollama: `http://localhost:11434/api/tags`\n\n4. **Documentation**: Check the [Technical Documentation](TECHNICAL_DOCS.md)\n5. **GitHub Issues**: Report bugs and request features\n6. **Community**: Join our Discord/Slack community\n\n---\n\n## 🔗 API Reference\n\n### Core Endpoints\n\n#### Chat API\n```http\n# Session-based chat (recommended)\nPOST /sessions/{session_id}/chat\nContent-Type: application/json\n\n{\n  \"query\": \"What are the main topics discussed?\",\n  \"search_type\": \"hybrid\",\n  \"retrieval_k\": 20,\n  \"ai_rerank\": true,\n  \"context_window_size\": 5\n}\n\n# Legacy chat endpoint\nPOST /chat\nContent-Type: application/json\n\n{\n  \"query\": \"What are the main topics discussed?\",\n  \"session_id\": \"uuid\",\n  \"search_type\": \"hybrid\",\n  \"retrieval_k\": 20\n}\n```\n\n#### Index Management\n```http\n# Create index\nPOST /indexes\nContent-Type: application/json\n{\n  \"name\": \"My Index\",\n  \"description\": \"Description\",\n  \"config\": \"default\"\n}\n\n# Get all indexes\nGET /indexes\n\n# Get specific index\nGET /indexes/{id}\n\n# Upload documents to index\nPOST /indexes/{id}/upload\nContent-Type: multipart/form-data\nfiles: [file1.pdf, file2.pdf, ...]\n\n# Build index (process uploaded documents)\nPOST /indexes/{id}/build\nContent-Type: application/json\n{\n  \"config_mode\": \"default\",\n  \"enable_enrich\": true,\n  \"chunk_size\": 512\n}\n\n# Delete index\nDELETE /indexes/{id}\n```\n\n#### Session Management\n```http\n# Create session\nPOST /sessions\nContent-Type: application/json\n{\n  \"title\": \"My Session\",\n  \"model\": \"qwen3:0.6b\"\n}\n\n# Get all sessions\nGET /sessions\n\n# Get specific session\nGET /sessions/{session_id}\n\n# Get session documents\nGET /sessions/{session_id}/documents\n\n# Get session indexes\nGET /sessions/{session_id}/indexes\n\n# Link index to session\nPOST /sessions/{session_id}/indexes/{index_id}\n\n# Delete session\nDELETE /sessions/{session_id}\n\n# Rename session\nPOST /sessions/{session_id}/rename\nContent-Type: application/json\n{\n  \"new_title\": \"Updated Session Name\"\n}\n```\n\n### Advanced Features\n\n#### Query Decomposition\nThe system can break complex queries into sub-questions for better answers:\n```http\nPOST /sessions/{session_id}/chat\nContent-Type: application/json\n\n{\n  \"query\": \"Compare the methodologies and analyze their effectiveness\",\n  \"query_decompose\": true,\n  \"compose_sub_answers\": true\n}\n```\n\n#### Answer Verification\nIndependent verification pass for accuracy using a separate verification model:\n```http\nPOST /sessions/{session_id}/chat\nContent-Type: application/json\n\n{\n  \"query\": \"What are the key findings?\",\n  \"verify\": true\n}\n```\n\n#### Contextual Enrichment\nDocument context enrichment during indexing for better understanding:\n```bash\n# Enable during index building\nPOST /indexes/{id}/build\n{\n  \"enable_enrich\": true,\n  \"window_size\": 2\n}\n```\n\n#### Late Chunking\nBetter context preservation by chunking after embedding:\n```bash\n# Configure in pipeline\n\"late_chunking\": {\"enabled\": true}\n```\n\n#### Streaming Chat\n```http\nPOST /chat/stream\nContent-Type: application/json\n\n{\n  \"query\": \"Explain the methodology\",\n  \"session_id\": \"uuid\",\n  \"stream\": true\n}\n```\n\n#### Batch Processing\n```bash\n# Using the batch indexing script\npython demo_batch_indexing.py --config batch_indexing_config.json\n\n# Example batch configuration (batch_indexing_config.json):\n{\n  \"index_name\": \"Sample Batch Index\",\n  \"index_description\": \"Example batch index configuration\",\n  \"documents\": [\n    \"./rag_system/documents/invoice_1039.pdf\",\n    \"./rag_system/documents/invoice_1041.pdf\"\n  ],\n  \"processing\": {\n    \"chunk_size\": 512,\n    \"chunk_overlap\": 64,\n    \"enable_enrich\": true,\n    \"enable_latechunk\": true,\n    \"enable_docling\": true,\n    \"embedding_model\": \"Qwen/Qwen3-Embedding-0.6B\",\n    \"generation_model\": \"qwen3:0.6b\",\n    \"retrieval_mode\": \"hybrid\",\n    \"window_size\": 2\n  }\n}\n```\n\n```http\n# API endpoint for batch processing\nPOST /batch/index\nContent-Type: application/json\n\n{\n  \"file_paths\": [\"doc1.pdf\", \"doc2.pdf\"],\n  \"config\": {\n    \"chunk_size\": 512,\n    \"enable_enrich\": true,\n    \"enable_latechunk\": true,\n    \"enable_docling\": true\n  }\n}\n```\n\nFor complete API documentation, see [API_REFERENCE.md](API_REFERENCE.md).\n\n---\n\n## 🏗️ Architecture\n\nLocalGPT is built with a modular, scalable architecture:\n\n```mermaid\ngraph TB\n    UI[Web Interface] --> API[Backend API]\n    API --> Agent[RAG Agent]\n    Agent --> Retrieval[Retrieval Pipeline]\n    Agent --> Generation[Generation Pipeline]\n\n    Retrieval --> Vector[Vector Search]\n    Retrieval --> BM25[BM25 Search]\n    Retrieval --> Rerank[Reranking]\n\n    Vector --> LanceDB[(LanceDB)]\n    BM25 --> BM25DB[(BM25 Index)]\n\n    Generation --> Ollama[Ollama Models]\n    Generation --> HF[Hugging Face Models]\n\n    API --> SQLite[(SQLite DB)]\n```\n\nOverview of the Retrieval Agent\n\n```mermaid\ngraph TD\n    classDef llmcall fill:#e6f3ff,stroke:#007bff;\n    classDef pipeline fill:#e6ffe6,stroke:#28a745;\n    classDef cache fill:#fff3e0,stroke:#fd7e14;\n    classDef logic fill:#f8f9fa,stroke:#6c757d;\n    classDef thread stroke-dasharray: 5 5;\n\n    A(Start: Agent.run) --> B_asyncio.run(_run_async);\n    B --> C{_run_async};\n\n    C --> C1[Get Chat History];\n    C1 --> T1[Build Triage Prompt <br/> Query + Doc Overviews ];\n    T1 --> T2[\"(asyncio.to_thread)<br/>LLM Triage: RAG or LLM_DIRECT?\"]; class T2 llmcall,thread;\n    T2 --> T3{Decision?};\n\n    T3 -- RAG --> RAG_Path;\n    T3 -- LLM_DIRECT --> LLM_Path;\n\n    subgraph RAG Path\n        RAG_Path --> R1[Format Query + History];\n        R1 --> R2[\"(asyncio.to_thread)<br/>Generate Query Embedding\"]; class R2 pipeline,thread;\n        R2 --> R3{{Check Semantic Cache}}; class R3 cache;\n        R3 -- Hit --> R_Cache_Hit(Return Cached Result);\n        R_Cache_Hit --> R_Hist_Update;\n        R3 -- Miss --> R4{Decomposition <br/> Enabled?};\n\n        R4 -- Yes --> R5[\"(asyncio.to_thread)<br/>Decompose Raw Query\"]; class R5 llmcall,thread;\n        R5 --> R6{{Run Sub-Queries <br/> Parallel RAG Pipeline}}; class R6 pipeline,thread;\n        R6 --> R7[Collect Results & Docs];\n        R7 --> R8[\"(asyncio.to_thread)<br/>Compose Final Answer\"]; class R8 llmcall,thread;\n        R8 --> V1(RAG Answer);\n\n        R4 -- No --> R9[\"(asyncio.to_thread)<br/>Run Single Query <br/>(RAG Pipeline)\"]; class R9 pipeline,thread;\n        R9 --> V1;\n\n        V1 --> V2{{Verification <br/> await verify_async}}; class V2 llmcall;\n        V2 --> V3(Final RAG Result);\n        V3 --> R_Cache_Store{{Store in Semantic Cache}}; class R_Cache_Store cache;\n        R_Cache_Store --> FinalResult;\n    end\n\n    subgraph Direct LLM Path\n        LLM_Path --> L1[Format Query + History];\n        L1 --> L2[\"(asyncio.to_thread)<br/>Generate Direct LLM Answer <br/> (No RAG)\"]; class L2 llmcall,thread;\n        L2 --> FinalResult(Final Direct Result);\n    end\n\n    FinalResult --> R_Hist_Update(Update Chat History);\n    R_Hist_Update --> ZZZ(End: Return Result);\n```\n\n---\n\n## 🤝 Contributing\n\nWe welcome contributions from developers of all skill levels! LocalGPT is an open-source project that benefits from community involvement.\n\n### 🚀 Quick Start for Contributors\n\n```bash\n# Fork and clone the repository\ngit clone https://github.com/PromtEngineer/localGPT.git\ncd localGPT\n\n# Set up development environment\npip install -r requirements.txt\nnpm install\n\n# Install Ollama and models\ncurl -fsSL https://ollama.ai/install.sh | sh\nollama pull qwen3:0.6b qwen3:8b\n\n# Verify setup\npython system_health_check.py\npython run_system.py --mode dev\n```\n\n### 📋 How to Contribute\n\n1. **🐛 Report Bugs**: Use our [bug report template](.github/ISSUE_TEMPLATE/bug_report.md)\n2. **💡 Request Features**: Use our [feature request template](.github/ISSUE_TEMPLATE/feature_request.md)\n3. **🔧 Submit Code**: Follow our [development workflow](CONTRIBUTING.md#development-workflow)\n4. **📚 Improve Docs**: Help make our documentation better\n\n### 📖 Detailed Guidelines\n\nFor comprehensive contributing guidelines, including:\n- Development setup and workflow\n- Coding standards and best practices\n- Testing requirements\n- Documentation standards\n- Release process\n\n**👉 See our [CONTRIBUTING.md](CONTRIBUTING.md) guide**\n\n---\n\n## 📄 License\n\nThis project is licensed under the MIT License - see the [LICENSE](LICENSE) file for details. For models, please check their respective licenses.\n\n---\n\n## 📞 Support\n\n- **Documentation**: [Technical Docs](TECHNICAL_DOCS.md)\n- **Issues**: [GitHub Issues](https://github.com/PromtEngineer/localGPT/issues)\n- **Discussions**: [GitHub Discussions](https://github.com/PromtEngineer/localGPT/discussions)\n- **Business Deployment and Customization**: [Contact Us](https://tally.so/r/wv6R2d)\n---\n\n<div align=\"center\">\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/svg?repos=PromtEngineer/localGPT&type=Date)](https://star-history.com/#PromtEngineer/localGPT&Date)\n","summary":"LocalGPT is a private, on-premise document intelligence platform that allows users to interact with their data without any information leaving their local machine. It utilizes a sophisticated hybrid search engine that combines semantic similarity, keyword matching, and advanced context pruning to deliver precise Retrieval-Augmented Generation (RAG) results. By supporting a wide variety of open-source models and providing a modular, hardware-agnostic architecture, the platform is ideal for privacy-conscious developers and organizations who need to build secure, locally-hosted AI applications.","description":"Chat with your documents on your local device using GPT models. No data leaves your device and 100% private. ","stars":22207,"language":"Python"},{"owner":"wasmerio","repo":"winterjs","url":"https://github.com/wasmerio/winterjs","readme":"> [!IMPORTANT]\n> This project is now deprecated in favor of the [Edge.js JS runtime](https://edgejs.org/), which can run any Node.js apps sandboxed with Wasmer.\n\n<div align=\"center\">\n  <a href=\"https://github.com/wasmerio/winterjs\" target=\"_blank\">\n    <picture>\n      <source srcset=\"https://raw.githubusercontent.com/wasmerio/winterjs/main/assets/winterjs-logo-white.png\" height=\"128\" media=\"(prefers-color-scheme: dark)\">\n      <img height=\"128\" src=\"https://raw.githubusercontent.com/wasmerio/winterjs/main/assets/winterjs-logo-black.png\" alt=\"Wasmer logo\">\n    </picture>\n  </a>\n</div>\n\nWinterJS is *blazing-fast* JavaScript server that runs Service Workers scripts according to the [Winter Community Group specification](https://wintercg.org/).\n\n**WinterJS is able to handle up to 100,000 reqs/s in a single laptop** (see [Benchmark](./benchmark)).\n\n----\n\n> Note: WinterJS is not officially endorsed by WinterCG, despite sharing \"Winter\" in their name. There are many [runtimes supporting WinterCG](https://runtime-keys.proposal.wintercg.org/), WinterJS being one among those.\n\n## Running WinterJS with Wasmer\n\nThe WinterJS server is published in Wasmer as [`wasmer/winterjs`](https://wasmer.io/wasmer/winterjs).\n\nYou can run the HTTP server locally with:\n\n```shell\nwasmer run wasmer/winterjs --net --mapdir=tests:tests tests/simple.js\n```\n\nWhere `simple.js` is:\n\n```js\naddEventListener('fetch', (req) => {\n  req.respondWith(new Response('hello'));\n});\n```\n\n## Building from source\n\nWinterJS needs to build SpiderMonkey from source as part of its own build process.\nPlease follow the steps outlined here to make sure you are ready to build SpiderMonkey: https://github.com/wasmerio/mozjs/blob/master/README.md.\n\nYou also need to do this before installing WinterJS with `cargo install`, which builds WinterJS from the source instead of downloading pre-built binaries.\n\nAlso, when building WinterJS in debug mode, you need to have NodeJS and npm installed and run `npm install` beforehand.\nThis is required since debug builds of WinterJS also build the TypeScript code in `src/builtins/internal_js_modules`.\nRelease builds use the existing, pre-compiled `*.js` sources in that directory.\nThis was done to simplify installing WinterJS with `cargo install`.\nIf you update the TypeScript sources, make sure to update the `*.js` sources by building at least once in debug mode and commit the updated `*.js` files.\n\nOnce you can build SpiderMonkey, you simply need to run `cargo build` as usual to build WinterJS itself.\n\n## Running WinterJS Natively\n\nYou can install WinterJS natively with:\n\n```\ncargo install --git https://github.com/wasmerio/winterjs winterjs\n```\n\nOnce you have WinterJS installed, you can simply do:\n\n```shell\nwinterjs tests/simple.js\n```\n\nAnd then access the server in https://localhost:8080/\n\n# How WinterJS works\n\nWinterJS is powered by [SpiderMonkey](https://spidermonkey.dev/), [Spiderfire](https://github.com/Redfire75369/spiderfire) and [hyper](https://hyper.rs/)\nto bring a new level of awesomeness to your Javascript apps.\n\nWinterJS is using the [WASIX](https://wasix.org) standard to compile to WebAssembly. Please note that compiling to WASIX is currently a complex process. We recommend using precompiled versions from [`wasmer/winterjs`](https://wasmer.io/wasmer/winterjs), but please open an issue if you need to compile to WASIX locally.\n\n## Limitations\n\nWinterJS is fully compliant with the WinterCG spec, although the runtime itself is still a work in progress.\nFor more information, see the API Compatibility section below.\n\n# WinterCG API Compatibility\n\nThis section will be updated as APIs are added/fixed.\nIf an API is missing from this section, that means that it is still not implemented.\n\nYou can check a more detailed list here: https://runtime-compat.unjs.io/\n\nThe following words are used to describe the status of an API:\n\n* ✅ Stable - The API is implemented and fully compliant with the spec. This does not account for potential undiscovered implementation errors in the native code.\n* 🔶 Partial - The API is implemented but not fully compliant with the spec and/or there are known limitations.\n* ❌ Pending - The API is not implemented yet.\n\n|API|Status|Notes|\n|:-:|:-:|:--|\n|`console`|✅ Stable|\n|`fetch`|✅ Stable|\n|`URL`|✅ Stable|\n|`URLSearchParams`|✅ Stable|\n|`Request`|✅ Stable|\n|`Headers`|✅ Stable|\n|`Response`|✅ Stable|\n|`Blob`|✅ Stable|\n|`File`|✅ Stable|\n|`FormData`|✅ Stable|\n|`TextDecoder`|✅ Stable|\n|`TextDecoderStream`|✅ Stable|\n|`TextEncoder`|✅ Stable|\n|`TextEncoderStream`|✅ Stable|\n|`ReadableStream` and supporting types|✅ Stable|\n|`WritableStream` and supporting types|✅ Stable|\n|`TransformStream` and supporting types|🔶 Partial|Back-pressure is not implemented\n|`atob`|✅ Stable|\n|`btoa`|✅ Stable|\n|`performance.now()`|✅ Stable|\n|`performance.timeOrigin`|✅ Stable|\n|`crypto`|✅ Stable|\n|`crypto.subtle`|🔶 Partial|Only HMAC, MD5 and SHA algorithms are supported\n\n# Other supported APIs\n\nThe following (non-WinterCG) APIs are implemented and accessible in WinterJS:\n\n|API|Status|Notes|\n|:-:|:-:|:--|\n|[Service Workers Caches API](https://www.w3.org/TR/service-workers/#cache-objects)|✅ Stable|Accessible via `caches`. `caches.default` (similar to [Cloudflare workers](https://developers.cloudflare.com/workers/runtime-apis/cache/#accessing-cache)) is also available.<br/>The current implementation is memory-backed, and cached responses will *not* persist between multiple runs of WinterJS.\n","summary":"WinterJS is a high-performance JavaScript server designed to execute Service Worker scripts in strict accordance with the WinterCG specification. Powered by the SpiderMonkey engine and the hyper library, it provides a lightweight, sandboxed environment capable of handling extremely high request volumes. This project is ideal for developers seeking a fast and compliant runtime for server-side JavaScript applications, though it is now deprecated in favor of the Edge.js runtime.","description":"Winter is coming... ❄️","stars":3197,"language":"JavaScript"},{"owner":"appwrite","repo":"appwrite","url":"https://github.com/appwrite/appwrite","readme":"<img width=\"1920\" height=\"1080\" alt=\"image\" src=\"https://github.com/user-attachments/assets/55a81268-4ecc-46cd-bdf5-73f7e8662fee\" />\n\n<br />\n<p align=\"center\">\n    <h1>Appwrite</h1>\n    <b>Appwrite is an open-source, all-in-one development platform. Use built-in backend infrastructure and web hosting, all from a single place.</b>\n    <br />\n    <br />\n</p>\n\n[![Discord](https://img.shields.io/badge/chat-5865F2?style=flat-square&logo=discord&logoColor=white)](https://appwrite.io/discord)\n[![X](https://img.shields.io/badge/follow-000000?style=flat-square&logo=x&logoColor=white)](https://x.com/appwrite)\n[![Appwrite Cloud](https://img.shields.io/badge/Cloud-F02E65?style=flat-square&logo=icloud&logoColor=white)](https://cloud.appwrite.io)\n\nEnglish | [简体中文](README-CN.md)\n\nAppwrite is an open-source development platform for building web, mobile, and AI applications. It brings together backend infrastructure and web hosting in one place, so teams can build, ship, and scale without stitching together a fragmented stack. Appwrite is available as a managed cloud platform and can also be self-hosted on infrastructure you control.\n\nWith Appwrite, you can add authentication, databases, storage, functions, messaging, realtime capabilities, and integrated web app hosting through Sites. It is designed to reduce the repetitive backend work required to launch modern products while giving developers secure primitives and flexible APIs to build production-ready applications faster.\n\nFind out more at [https://appwrite.io](https://appwrite.io).\n\nTable of Contents:\n\n- [Products](#products)\n- [Installation \\& Setup](#installation--setup)\n- [Self-Hosting](#self-hosting)\n  - [Unix](#unix)\n  - [Windows](#windows)\n    - [CMD](#cmd)\n    - [PowerShell](#powershell)\n  - [Upgrade from an Older Version](#upgrade-from-an-older-version)\n- [One-Click Setups](#one-click-setups)\n- [Getting Started](#getting-started)\n  - [SDKs](#sdks)\n    - [Client](#client)\n    - [Server](#server)\n- [Architecture](#architecture)\n- [Contributing](#contributing)\n- [Security](#security)\n- [Follow Us](#follow-us)\n- [License](#license)\n\n\n## Products\n\n- **[Appwrite Auth](https://appwrite.io/docs/products/auth)** - Secure user authentication with multiple login methods including email/password, SMS, OAuth, anonymous sessions, and magic links. Includes session management, multi-factor authentication, and user verification flows.\n\n- **[Appwrite Databases](https://appwrite.io/docs/products/databases)** - Scalable structured data storage with support for databases, tables, and rows. Includes querying, pagination, indexing, and relationships to model complex application data.\n\n- **[Appwrite Storage](https://appwrite.io/docs/products/storage)** - Secure file storage with support for uploads, downloads, encryption, compression, and file transformations for media and assets.\n\n- **[Appwrite Functions](https://appwrite.io/docs/products/functions)** - Serverless compute platform to run custom backend logic in isolated runtimes, triggered by events or scheduled jobs.15 runtimes supported.\n\n- **[Appwrite Messaging](https://appwrite.io/docs/products/messaging)** - Multi-channel messaging system for sending emails, SMS, and push notifications to users for engagement, alerts, and transactional workflows.\n\n- **[Appwrite Sites](https://appwrite.io/docs/products/sites)** - Integrated hosting platform to deploy and scale web applications with support for custom domains, SSR, and seamless backend integration. Git integration and previews are supported.\n\n\n## Installation & Setup\n\nThe easiest way to get started with Appwrite is by [signing up for Appwrite Cloud](https://cloud.appwrite.io/). While Appwrite Cloud is in public beta, you can build with Appwrite completely free, and we won't collect your credit card information.\n\n## Self-Hosting\n\nAppwrite is designed to run in a containerized environment. Running your server is as easy as running one command from your terminal. You can either run Appwrite on your localhost using docker-compose or on any other container orchestration tool, such as [Kubernetes](https://kubernetes.io/docs/home/), [Docker Swarm](https://docs.docker.com/engine/swarm/), or [Rancher](https://rancher.com/docs/).\n\nBefore running the installation command, make sure you have [Docker](https://www.docker.com/products/docker-desktop) installed on your machine:\n\n### Unix\n\n```bash\ndocker run -it --rm \\\n    --publish 20080:20080 \\\n    --volume /var/run/docker.sock:/var/run/docker.sock \\\n    --volume \"$(pwd)\"/appwrite:/usr/src/code/appwrite:rw \\\n    --entrypoint=\"install\" \\\n    appwrite/appwrite:1.9.0\n```\n\n### Windows\n\n#### CMD\n\n```cmd\ndocker run -it --rm ^\n    --publish 20080:20080 ^\n    --volume //var/run/docker.sock:/var/run/docker.sock ^\n    --volume \"%cd%\"/appwrite:/usr/src/code/appwrite:rw ^\n    --entrypoint=\"install\" ^\n    appwrite/appwrite:1.9.0\n```\n\n#### PowerShell\n\n```powershell\ndocker run -it --rm `\n    --publish 20080:20080 `\n    --volume /var/run/docker.sock:/var/run/docker.sock `\n    --volume ${pwd}/appwrite:/usr/src/code/appwrite:rw `\n    --entrypoint=\"install\" `\n    appwrite/appwrite:1.9.0\n```\n\nOnce the Docker installation is complete, go to http://localhost to access the Appwrite console from your browser. Please note that on non-Linux native hosts, the server might take a few minutes to start after completing the installation.\n\nFor advanced production and custom installation, check out our Docker [environment variables](https://appwrite.io/docs/environment-variables) docs. You can also use our public [docker-compose.yml](https://appwrite.io/install/compose) and [.env](https://appwrite.io/install/env) files to manually set up an environment.\n\n### Upgrade from an Older Version\n\nIf you are upgrading your Appwrite server from an older version, you should use the Appwrite migration tool once your setup is completed. For more information regarding this, check out the [Installation Docs](https://appwrite.io/docs/self-hosting).\n\n## One-Click Setups\n\nIn addition to running Appwrite locally, you can also launch Appwrite using a pre-configured setup. This allows you to get up and running quickly with Appwrite without installing Docker on your local machine.\n\nChoose from one of the providers below:\n\n<table border=\"0\">\n  <tr>\n    <td align=\"center\" width=\"100\" height=\"100\">\n      <a href=\"https://marketplace.digitalocean.com/apps/appwrite\">\n        <img width=\"50\" height=\"39\" src=\"public/images/integrations/digitalocean-logo.svg\" alt=\"DigitalOcean Logo\" />\n          <br /><sub><b>DigitalOcean</b></sub></a>\n        </a>\n    </td>\n    <td align=\"center\" width=\"100\" height=\"100\">\n      <a href=\"https://www.linode.com/marketplace/apps/appwrite/appwrite/\">\n        <img width=\"50\" height=\"39\" src=\"public/images/integrations/akamai-logo.svg\" alt=\"Akamai Logo\" />\n          <br /><sub><b>Akamai Compute</b></sub></a>\n      </a>\n    </td>\n    <td align=\"center\" width=\"100\" height=\"100\">\n      <a href=\"https://aws.amazon.com/marketplace/pp/prodview-2hiaeo2px4md6\">\n        <img width=\"50\" height=\"39\" src=\"public/images/integrations/aws-logo.svg\" alt=\"AWS Logo\" />\n          <br /><sub><b>AWS Marketplace</b></sub></a>\n      </a>\n    </td>\n  </tr>\n</table>\n\n## Getting Started\n\nGetting started with Appwrite is as easy as creating a new project, choosing your platform, and integrating its SDK into your code. You can easily get started with your platform of choice by reading one of our Getting Started tutorials.\n\n| Platform              | Technology                                                                         |\n| --------------------- | ---------------------------------------------------------------------------------- |\n| **Web app**           | [Quick start for Web](https://appwrite.io/docs/quick-starts/web)                   |\n|                       | [Quick start for Next.js](https://appwrite.io/docs/quick-starts/nextjs)            |\n|                       | [Quick start for React](https://appwrite.io/docs/quick-starts/react)               |\n|                       | [Quick start for Vue.js](https://appwrite.io/docs/quick-starts/vue)                |\n|                       | [Quick start for Nuxt](https://appwrite.io/docs/quick-starts/nuxt)                 |\n|                       | [Quick start for SvelteKit](https://appwrite.io/docs/quick-starts/sveltekit)       |\n|                       | [Quick start for Refine](https://appwrite.io/docs/quick-starts/refine)             |\n|                       | [Quick start for Angular](https://appwrite.io/docs/quick-starts/angular)           |\n| **Mobile and Native** | [Quick start for React Native](https://appwrite.io/docs/quick-starts/react-native) |\n|                       | [Quick start for Flutter](https://appwrite.io/docs/quick-starts/flutter)           |\n|                       | [Quick start for Apple](https://appwrite.io/docs/quick-starts/apple)               |\n|                       | [Quick start for Android](https://appwrite.io/docs/quick-starts/android)           |\n| **Server**            | [Quick start for Node.js](https://appwrite.io/docs/quick-starts/node)              |\n|                       | [Quick start for Python](https://appwrite.io/docs/quick-starts/python)             |\n|                       | [Quick start for .NET](https://appwrite.io/docs/quick-starts/dotnet)               |\n|                       | [Quick start for Dart](https://appwrite.io/docs/quick-starts/dart)                 |\n|                       | [Quick start for Ruby](https://appwrite.io/docs/quick-starts/ruby)                 |\n|                       | [Quick start for Deno](https://appwrite.io/docs/quick-starts/deno)                 |\n|                       | [Quick start for PHP](https://appwrite.io/docs/quick-starts/php)                   |\n|                       | [Quick start for Kotlin](https://appwrite.io/docs/quick-starts/kotlin)             |\n|                       | [Quick start for Swift](https://appwrite.io/docs/quick-starts/swift)               |\n\n### SDKs\n\nBelow is a list of currently supported platforms and languages. If you would like to help us add support to your platform of choice, you can go over to our [SDK Generator](https://github.com/appwrite/sdk-generator) project and view our [contribution guide](https://github.com/appwrite/sdk-generator/blob/master/CONTRIBUTING.md).\n\n#### Client\n\n- :white_check_mark: &nbsp; [Web](https://github.com/appwrite/sdk-for-web)\n- :white_check_mark: &nbsp; [Flutter](https://github.com/appwrite/sdk-for-flutter)\n- :white_check_mark: &nbsp; [Apple](https://github.com/appwrite/sdk-for-apple)\n- :white_check_mark: &nbsp; [Android](https://github.com/appwrite/sdk-for-android)\n- :white_check_mark: &nbsp; [React Native](https://github.com/appwrite/sdk-for-react-native)\n\n#### Server\n\n- :white_check_mark: &nbsp; [NodeJS](https://github.com/appwrite/sdk-for-node)\n- :white_check_mark: &nbsp; [PHP](https://github.com/appwrite/sdk-for-php)\n- :white_check_mark: &nbsp; [Dart](https://github.com/appwrite/sdk-for-dart)\n- :white_check_mark: &nbsp; [Deno](https://github.com/appwrite/sdk-for-deno)\n- :white_check_mark: &nbsp; [Ruby](https://github.com/appwrite/sdk-for-ruby)\n- :white_check_mark: &nbsp; [Python](https://github.com/appwrite/sdk-for-python)\n- :white_check_mark: &nbsp; [Kotlin](https://github.com/appwrite/sdk-for-kotlin)\n- :white_check_mark: &nbsp; [Swift](https://github.com/appwrite/sdk-for-swift)\n- :white_check_mark: &nbsp; [.NET](https://github.com/appwrite/sdk-for-dotnet)\n\nLooking for more SDKs? - Help us by contributing a pull request to our [SDK Generator](https://github.com/appwrite/sdk-generator)!\n\n## Architecture\n\n![Appwrite Architecture showing how Appwrite is built and the services and tools it uses](docs/specs/overview.drawio.svg)\n\nAppwrite uses a microservices architecture that was designed for easy scaling and delegation of responsibilities. In addition, Appwrite supports multiple APIs, such as REST, WebSocket, and GraphQL to allow you to interact with your resources by leveraging your existing knowledge and protocols of choice.\n\nThe Appwrite API layer was designed to be extremely fast by leveraging in-memory caching and delegating any heavy-lifting tasks to the Appwrite background workers. The background workers also allow you to precisely control your compute capacity and costs using a message queue to handle the load. You can learn more about our architecture in the [contribution guide](CONTRIBUTING.md#architecture-1).\n\n## Contributing\n\nAll code contributions, including those of people having commit access, must go through a pull request and be approved by a core developer before being merged. This is to ensure a proper review of all the code.\n\nWe truly :heart: pull requests! If you wish to help, you can learn more about how you can contribute to this project in the [contribution guide](CONTRIBUTING.md).\n\n## Security\n\nFor security issues, kindly email us at [security@appwrite.io](mailto:security@appwrite.io) instead of posting a public issue on GitHub.\n\n## Follow Us\n\nJoin our growing community around the world! Check out our official [Blog](https://appwrite.io/blog). Follow us on [X](https://twitter.com/appwrite), [LinkedIn](https://www.linkedin.com/company/appwrite/), [Dev Community](https://dev.to/appwrite) or join our live [Discord server](https://appwrite.io/discord) for more help, ideas, and discussions.\n\n## License\n\nThis repository is available under the [BSD 3-Clause License](./LICENSE).\n","summary":"Appwrite is an open-source, all-in-one backend-as-a-service platform designed to streamline the development of web, mobile, and AI applications. It provides a comprehensive suite of tools including user authentication, scalable databases, file storage, serverless functions, and multi-channel messaging. By offering these capabilities through flexible APIs and integrated web hosting, Appwrite empowers developers and teams to eliminate repetitive infrastructure tasks and accelerate their path to production.","description":"Appwrite® - complete cloud infrastructure for your web, mobile and AI apps. Including Auth, Databases, Storage, Functions, Messaging, Hosting, Realtime and more","stars":56205,"language":"TypeScript"},{"owner":"BuilderIO","repo":"mitosis","url":"https://github.com/BuilderIO/mitosis","readme":"<br>\n<br>\n<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://cdn.builder.io/api/v1/image/assets%2FYJIGb4i01jvw0SRdL5Bt%2F44413839f214431290930e447572b843\">\n    <img width=\"400\" alt=\"Mitosis logo\" src=\"https://cdn.builder.io/api/v1/image/assets%2FYJIGb4i01jvw0SRdL5Bt%2F570f689e59824cb78cf5773350ab4144\">\n  </picture>\n</p>\n\n<p align=\"center\">\n  Write components once, compile to every framework\n</p>\n\n<br>\n\n<p align=\"center\">\n  <a href=\"https://github.com/prettier/prettier\"><img alt=\"code style: prettier\" src=\"https://img.shields.io/badge/code_style-prettier-ff69b4.svg\" /></a>\n  <a href=\"https://github.com/BuilderIO/mitosis/pulls\"><img alt=\"PRs Welcome\" src=\"https://img.shields.io/badge/PRs-welcome-brightgreen.svg\" /></a>\n  <a href=\"https://github.com/BuilderIO/mitosis/blob/main/LICENSE\"><img alt=\"License\" src=\"https://img.shields.io/github/license/BuilderIO/mitosis\" /></a>\n  <a href=\"https://www.npmjs.com/package/@builder.io/mitosis\"><img alt=\"Types\" src=\"https://img.shields.io/npm/types/@builder.io/mitosis\" /></a>\n  <a href=\"https://www.npmjs.com/package/@builder.io/mitosis\" rel=\"nofollow\"><img src=\"https://img.shields.io/npm/v/@builder.io/mitosis.svg?sanitize=true\"></a>\n</p>\n\n## Overview\n\n[Mitosis](https://mitosis.builder.io/docs/overview/) provides a unified development experience across all frameworks, enabling you to build components in a single codebase and compile them to React, Vue, Angular, Svelte, Solid, Alpine, Qwik, and more.\n\nUsing Mitosis, you can:\n\n- Maintain a consistent design system across multiple frameworks ([example](https://github.com/db-ux-design-system/core-web))\n- Sync your [design systems from Figma to code](https://mitosis.builder.io/docs/figma/) and publish them to npm across frameworks\n- Avoid the [pitfalls of web components](https://mitosis.builder.io/docs/overview/) by compiling to native framework code\n\n_PS: We are actively looking for folks interested in becoming contributors to Mitosis. If interested, look at our list of [good first issues](https://github.com/BuilderIO/mitosis/contribute) or reach out on our [Discord](https://discord.gg/yxjk5vn6pn)_\n\n![Gif example of devloping with Mitosis](https://cdn.builder.io/api/v1/file/assets%2FYJIGb4i01jvw0SRdL5Bt%2F868af1e6d9fd4923b18ecd1d892f3a6e)\n\n## Quickstart\n\nTo create a new Mitosis project from scratch, run the following `create` command:\n\n```bash\nnpm create @builder.io/mitosis@latest\n```\n\nOnce completed, make sure to read the `README.md` generated in your new project. It will explain the structure of your project, and provide a walkthrough on how to build/test your components.\n\nRead the full [getting started docs](https://mitosis.builder.io/docs/quickstart/) for more.\n\n### Integration with Figma\n\nTo make generating Mitosis components easier, as well as to keep your design system in code in sync with your design system in Figma, Mitosis integrates with Figma.\n\nLearn more about our [Figma integration](https://mitosis.builder.io/docs/figma).\n\n![Demo of using Mitosis with Figma](https://cdn.builder.io/api/v1/file/assets%2FYJIGb4i01jvw0SRdL5Bt%2Fde65b7d174354c0baf189ee4e652a31b)\n\n## Resources\n\n- [Documentation](https://mitosis.builder.io/docs)\n- [Playground](https://mitosis.builder.io/playground)\n- [Figma integration](https://mitosis.builder.io/docs/figma/)\n- [Mitosis Discord](https://discord.gg/yxjk5vn6pn)\n\n## Contribute\n\nInterested in contribute? Head over to the [CONTRIBUTING](CONTRIBUTING.md) docs and see how you can get setup & started!\n\nOnce you're ready, checkout our [issues](https://github.com/BuilderIO/mitosis/contribute) page and grab your first issue!\n\n<br>\n<br>\n<p align=\"center\">\n   <a href=\"https://www.builder.io/m/developers\">\n      <picture>\n         <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://user-images.githubusercontent.com/844291/230786554-eb225eeb-2f6b-4286-b8c2-535b1131744a.png\">\n         <img width=\"250\" alt=\"Made with love by Builder.io\" src=\"https://user-images.githubusercontent.com/844291/230786555-a58479e4-75f3-4222-a6eb-74c5af953eac.png\">\n       </picture>\n   </a>\n</p>\n","summary":"Mitosis is a framework-agnostic tool that allows developers to write components once and compile them into native code for various platforms, including React, Vue, Angular, Svelte, and Qwik. By generating framework-specific code rather than relying on web components, it enables the creation of high-performance, consistent design systems across an entire organization. This project is ideal for library authors and teams looking to avoid code duplication while maintaining broad framework support for their UI components.","description":"Write components once, run everywhere. Compiles to React, Vue, Qwik, Solid, Angular, Svelte, and more. ","stars":13836,"language":"TypeScript"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
</body>
