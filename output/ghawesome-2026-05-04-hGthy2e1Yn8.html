[![Python 3.12+](https://img.shields.io/badge/python-3.12+-blue.svg)](https://www.python.org/downloads/)\n[![Runs on Cloud Run](https://img.shields.io/badge/runs%20on-Google%20Cloud%20Run-4285F4.svg)](https://cloud.google.com/run)\n\n</div>\n\n---\n\n## Why Broccoli\n\n- 🎯 **Linear ticket → reviewable PR.** Assign an issue to the Broccoli bot and watch it plan, implement, and open a pull request while you sleep.\n- 🔒 **Your infra. Your keys. Your data.** Deployed to your GCP project against your Postgres. No third-party control plane, no data leaving your tenancy.\n- 🧱 **Production-grade on day one.** Serverless Cloud Run + Secret Manager + webhook dedupe + durable job state. No toy.\n- 🧩 **Own your prompts.** Start with our opinionated prompt templates. Fork, tune, and version them with your code.\n- ⚡ **AI code review on every PR.** Claude and Codex read your diffs, leave actionable comments, and push fix commits when you ask.\n- 🛠️ **Deploys in ~30 minutes.** One bootstrap script. One config file. Two webhooks. Ship.\n\n## Use This With a Coding Agent\nPaste the following prompt to your favorite coding agent. Ours is codex cli. \n\n```text\nDeploy this repository to my Google Cloud project.\n\nIf I only gave you the GitHub repo URL, clone the repo first. If I already opened the repo locally, work from the existing checkout.\n\nUse the repo's deployment instructions, scripts, and `.agents/skills/broccoli-oss-gcp-deploy/SKILL.md`. Treat this as a request to deploy the app, not just inspect the codebase.\n\nDo not assume I have any of the prerequisites done yet. Before discovery, walk me through these checkpoints one at a time, and for each one confirm my answer before moving on. If a section of the README covers the step, point me to it instead of re-explaining.\n\n1. GCP project + billing. Ask whether I already have a Google Cloud project with billing attached, and whether `gcloud` is logged in to that account. If not, walk me through creating the project at https://console.cloud.google.com/cloud-resource-manager and attaching billing at https://console.cloud.google.com/billing/projects, or offer to have the deployment skill create the project for me. Record the Project ID.\n2. GitHub App. Ask whether I have already created a GitHub App for Broccoli with the required repository permissions (Contents, Pull requests, Issues = read/write; Metadata = read-only) and the required webhook event subscriptions: `Pull request review` for review-feedback automation, plus `Pull request` if I also want Broccoli to react when PRs are opened, updated, reopened, or marked ready for review. Call out that on GitHub, repository permissions and webhook events are separate settings — the `Pull requests` permission alone does not subscribe the App to PR events. If not, walk me through `README.md -> Deploy it on your GCP -> 1. Create a GitHub App` step by step. Have me record the numeric App ID and download the private key PEM file locally. Placeholder Homepage/Webhook URLs are fine for now; bootstrap will print the real URLs.\n3. Linear bot user + API key. IMPORTANT: the Linear API key must belong to a dedicated Linear bot user, NOT my personal account. A personal key silently breaks the \"issue assigned to bot triggers a run\" flow. Ask whether a dedicated bot user already exists. If not, walk me through `README.md -> 2. Designate a Linear bot user`: create or designate a Linear user, add it to every team whose issues should route through Broccoli, then log in as that bot user (or have an admin switch to that user) and generate the API key from that user's settings page. Before you accept the key as ready, explicitly confirm with me that it came from the bot user and not from my personal account. Record the bot user id.\n4. OpenAI + Anthropic API keys. Ask whether I already have active API keys with billing enabled on each account. If not, send me to the OpenAI and Anthropic API keys pages to create them.\n5. Linear webhook. This one comes later and is configured after bootstrap prints the service URL. Just tell me now that once the service URL exists, I will add a Linear webhook pointing at `${Service URL}/webhooks/linear` using the auto-generated `broccoli-oss-linear-webhook-secret` and subscribe to Issue and Issue label events. I do not need to do anything for this step yet.\n6. Secret Manager population. Once the target project exists, for each of the four operator-managed secrets (`broccoli-oss-github-app-private-key-pem`, `broccoli-oss-linear-api-key`, `broccoli-oss-openai-api-key`, `broccoli-oss-anthropic-api-key`) give me the exact Secret Manager console URL for the target project and pause until I confirm each secret has a `latest` version. You retrieve the auto-generated webhook and DB password secrets yourself after bootstrap; I do not touch those.\n\nWorkflow after the checkpoints above:\n- Run a non-mutating discovery step and fail fast on missing `gcloud` auth, billing access, org or project permissions, or other required local tools.\n- If I do not already have a target GCP project, create or prepare one first.\n- Before making cloud changes, show me the resolved deployment plan and any missing non-secret inputs.\n- Never ask me to paste secrets into chat. If required secrets are missing, tell me exactly which secret names I need to populate in the target project and pause until I confirm they are present.\n- Prefer the repo's existing deploy scripts, documented defaults, and post-deploy checks over guesswork.\n- Use the Cloud Build path by default instead of local Docker.\n- After deployment, continue through the verification steps you can safely run, then report the service URL, any remaining manual setup (including the Linear webhook from checkpoint 5), and the smoke-test result.\n```\n\nThis is the fast path if you want the agent to drive the deployment for you. If you want the manual step-by-step path instead, use the guide below; it starts from project creation and shows exactly where the manual setup happens.\n\n---\n\n## Table of contents\n\n- [Architecture at a glance](#architecture-at-a-glance)\n- [Prerequisites](#prerequisites)\n- [Deploy it on your GCP](#deploy-it-on-your-gcp)\n  - [0. Create or choose a GCP project](#0-create-or-choose-a-gcp-project)\n  - [1. Create a GitHub App](#1-create-a-github-app)\n  - [2. Designate a Linear bot user](#2-designate-a-linear-bot-user)\n  - [3. Open Secret Manager in the right project](#3-open-secret-manager-in-the-right-project)\n  - [4. Add the required secret values](#4-add-the-required-secret-values)\n  - [5. Build and push images with Cloud Build](#5-build-and-push-images-with-cloud-build)\n  - [6. Run bootstrap](#6-run-bootstrap)\n  - [7. Install the GitHub App on a repo](#7-install-the-github-app-on-a-repo)\n  - [8. Run migrations and seed repo config](#8-run-migrations-and-seed-repo-config)\n  - [9. Register the webhooks](#9-register-the-webhooks)\n  - [10. Run preflight](#10-run-preflight)\n  - [11. Run the smoke tests](#11-run-the-smoke-tests)\n- [Operating Broccoli](#operating-broccoli)\n  - [Inspecting job state](#inspecting-job-state)\n  - [Ignored webhook responses](#ignored-webhook-responses)\n  - [Retrying a failed webhook safely](#retrying-a-failed-webhook-safely)\n- [IAM](#iam)\n- [Local development](#local-development)\n- [Documentation](#documentation)\n- [Contributing](#contributing)\n- [License](#license)\n- [FAQ](#faq)\n\n---\n\n## Architecture at a glance\n\nBroccoli runs as two Cloud Run workloads over a shared Postgres:\n\n| Component | Role |\n| --- | --- |\n| `broccoli-oss-service` | FastAPI service that receives GitHub and Linear webhooks, verifies signatures, dedupes deliveries, and creates job records. |\n| `broccoli-oss-runner` | Cloud Run Job by default; optionally launched inside Blaxel sandboxes when `EXECUTION_BACKEND=blaxel`. Executes automation using the `codex` and `claude` CLIs against vendored prompt templates. |\n| Postgres | Durable state for jobs, webhook deliveries, PR state, Linear issue state, and repo config. |\n| Secret Manager | Holds the GitHub App private key, webhook secrets, LLM API keys, and database URL. |\n\nSee [ARCHITECTURE.md](ARCHITECTURE.md) for the full design and [JOB-CONTRACT.md](JOB-CONTRACT.md) for the webhook and state-model contract.\n\n## Prerequisites\n\n- A Google Cloud account that can either create a new project and attach billing, or administer an existing project.\n- `gcloud` authenticated to that Google Cloud account. You do not need to know the final project ID before starting.\n- Browser access to GitHub, Linear, and the GCP Console. Several first-time setup steps are intentionally manual because the required values live in those products and should not be pasted into chat.\n- Docker with `buildx` only if you intentionally want to build images locally instead of using the default Cloud Build path.\n- Python 3.12+ and [`uv`](https://github.com/astral-sh/uv) for operator tooling (migrations, seed, preflight).\n- An Anthropic API key and an OpenAI (or Codex) API key, or the ability to create them.\n\n---\n\n## Deploy it on your GCP\n\nThe sequence below is written for a first-time operator. It starts from zero, explains where values come from, and calls out the steps that must still happen manually for security reasons.\n\n### 0. Create or choose a GCP project\n\nYou need a Google Cloud project before you can add Broccoli secrets or deploy Cloud Run services.\n\nIf you already have a project you want to use:\n\n1. Open the project in the GCP Console.\n2. Record the **Project ID**. You will use this in later steps.\n3. Confirm billing is attached to that project.\n\nIf you do not have a project yet:\n\n1. Open the Google Cloud \"Manage resources\" page: <https://console.cloud.google.com/cloud-resource-manager>.\n2. Create a project, or use the `broccoli-oss-gcp-deploy` skill to create one for you.\n3. Attach billing on the billing projects page: <https://console.cloud.google.com/billing/projects>.\n4. Record the new **Project ID**.\n\nIf you are using the Codex deployment skill, it can create the project, attach billing, enable the required APIs, and create the Secret Manager secret containers for you. That is often the easiest path for a first-time operator because it gives you a real project to click into before you need to add any secrets.\n\n### 1. Create a GitHub App\n\nUse a GitHub App (not a PAT) so Broccoli can mint scoped installation tokens.\n\n**Repository permissions:**\n\n- Contents: read/write\n- Pull requests: read/write\n- Issues: read/write\n- Metadata: read-only\n\n**Subscribe to events:**\n\n- `Pull request review` — required; drives the review-feedback automation.\n- `Pull request` — required only if you want Broccoli to react when PRs are opened, updated, reopened, or marked ready for review.\n\n> GitHub treats repository **permissions** and webhook **event subscriptions** as separate settings. The `Pull requests` permission above is what lets Broccoli read and act on PRs; the `Pull request` event above is what notifies Broccoli that a PR changed. PR-opened automation needs both.\n\nAt this stage, set Homepage URL and Webhook URL to placeholders. You will update them after Step 6 prints the real service URL. Record the **App ID** and download a **private key** PEM.\n\n- **GitHub App ID** is the numeric identifier GitHub assigns to the app. `deploy/bootstrap.sh` passes it to the service and runner so they can mint installation tokens.\n- **GitHub App private key PEM** is the private key file you generate in the GitHub App settings page. Broccoli uses it together with the App ID to authenticate to GitHub as the app.\n- Keep the PEM file local. Do not paste it into chat.\n\n### 2. Designate a Linear bot user\n\nBroccoli triggers when an issue is assigned to a specific Linear user.\n\n1. Create or designate a dedicated Linear user to act as the Broccoli bot.\n2. Give that user access to every team whose issues should be routed through Broccoli.\n3. Generate a Linear API key scoped to a user or token that can read issues, comments, and labels for those teams.\n4. Record the **bot user id**. You will seed it into `global_config` in Step 8.\n\n### 3. Open Secret Manager in the right project\n\nIf this is your first time using GCP, this is the step that usually causes confusion: the secrets go into **Google Cloud Secret Manager inside your deployment project**.\n\n1. Open Secret Manager: <https://console.cloud.google.com/security/secret-manager>.\n2. Use the project selector at the top of the page to switch to your Broccoli deployment project.\n3. Confirm the selected project ID matches the one you recorded in Step 0.\n4. If you used the Codex deployment skill to prepare the project, some or all secret containers may already exist. That is fine. You can open an existing secret and click **Add new version** instead of creating it again.\n\n### 4. Add the required secret values\n\nThese values must be entered manually because they come from GitHub, Linear, OpenAI, and Anthropic accounts that the deploy helper cannot safely read on your behalf. Do not paste secret values into chat. Add them in Secret Manager through the GCP Console or from your own terminal.\n\nFor each secret below:\n\n1. In Secret Manager, either click **Create secret** or open the existing secret with the same name.\n2. Use the exact secret name shown below.\n3. Paste the value or upload the file contents.\n4. Save it and confirm the secret now has a `latest` version.\n\nRequired before bootstrap:\n\n| Secret | Where the value comes from | What to do |\n| --- | --- | --- |\n| `broccoli-oss-github-app-private-key-pem` | The PEM file you downloaded in Step 1 from GitHub App settings | Paste the full PEM contents as the secret value |\n| `broccoli-oss-linear-api-key` | A Linear API key for the bot user from Step 2 | Paste the API key as the secret value |\n| `broccoli-oss-openai-api-key` | Your OpenAI API keys page | Paste the API key as the secret value |\n| `broccoli-oss-anthropic-api-key` | Your Anthropic API keys page | Paste the API key as the secret value |\n\nOptional to create manually if you are following the raw shell path in this README:\n\n| Secret | What it is used for | How to get or generate it |\n| --- | --- | --- |\n| `broccoli-oss-db-password` | Password for the `broccoli_oss` PostgreSQL user; also used to derive `broccoli-oss-database-url` for Cloud SQL deploys | Generate a random value locally, for example `openssl rand -hex 32` |\n| `broccoli-oss-gh-webhook-secret` | Shared secret GitHub uses to sign webhook requests to Broccoli | Generate a random value locally, for example `openssl rand -hex 32`, and paste the same value into the GitHub App webhook secret field later |\n| `broccoli-oss-linear-webhook-secret` | Shared secret Linear uses to sign webhook requests to Broccoli | Generate a random value locally, for example `openssl rand -hex 32`, and paste the same value into the Linear webhook config later |\n\nIf you are using the `broccoli-oss-gcp-deploy` helper, it can auto-generate `broccoli-oss-db-password`, `broccoli-oss-gh-webhook-secret`, and `broccoli-oss-linear-webhook-secret` after the project exists. You still need to provide the four operator-managed secrets above yourself.\n\nFor the default Cloud SQL path:\n\n- You do not pre-populate `broccoli-oss-database-url`. `deploy/bootstrap.sh` derives it from the Cloud SQL connection name and the DB password, then writes that secret for you.\n- You do need `broccoli-oss-db-password`. It is the Cloud SQL database user's password and should be a random high-entropy string.\n\n### 5. Build and push images with Cloud Build\n\n```bash\ncd path/to/this-repo\nexport GCP_PROJECT_ID=your-project\nexport GCP_REGION=us-central1\nexport TAG=v0.1.0\nexport PUSH=1\n./deploy/build-and-push.sh\n```\n\nBy default, `deploy/build-and-push.sh` uses Google Cloud Build. That means Google builds and pushes the images inside your GCP project, so you do not need local Docker for the recommended deploy path.\n\nThe script prints `SERVICE_IMAGE=...` and `RUNNER_IMAGE=...` so you can copy them into the next step.\n\nIf you intentionally want to build locally with Docker instead, set:\n\n```bash\nexport BUILD_BACKEND=docker\n./deploy/build-and-push.sh\n```\n\n### 6. Run bootstrap\n\n`deploy/bootstrap.sh` is idempotent and uses incremental Cloud Run env/secret updates, so you can safely re-run it.\n\nBy default, deployments keep the existing Cloud Run Jobs execution path (`EXECUTION_BACKEND=cloud_run_jobs`). To opt into Blaxel sandboxes, set `EXECUTION_BACKEND=blaxel` on the service and make sure the optional Blaxel env vars below are present before restarting the service.\n\n```bash\nexport GCP_PROJECT_ID=your-project\nexport GCP_REGION=us-central1\nexport GITHUB_APP_ID=123456\nexport SERVICE_IMAGE=us-docker.pkg.dev/your-project/containers/broccoli-oss-service:v0.1.0\nexport RUNNER_IMAGE=us-docker.pkg.dev/your-project/containers/broccoli-oss-runner:v0.1.0\n\n# Common optional overrides:\nexport INGRESS_SERVICE_NAME=broccoli-oss-service\nexport RUNNER_JOB_BASENAME=broccoli-oss-runner\nexport RUNNER_TIMEOUT_SECONDS=3600\nexport DB_BACKEND=cloudsql\nexport DB_INSTANCE_NAME=broccoli-oss-pg\nexport DB_AUTHORIZED_NETWORKS=0.0.0.0/0\n\n./deploy/bootstrap.sh\n```\n\nBootstrap prints:\n\n- Deployed **service URL**\n- **GitHub webhook URL** (`${Service URL}/webhooks/github`)\n- **Linear webhook URL** (`${Service URL}/webhooks/linear`)\n- Cloud Run service and job resource names\n\nWhen `DB_BACKEND=cloudsql`, bootstrap also patches the Cloud SQL instance with a public IPv4 and sets `authorizedNetworks` from `DB_AUTHORIZED_NETWORKS`. The default is `0.0.0.0/0`, which allows connections from anywhere. Override it with a narrower CIDR list if you want to restrict direct Postgres access.\n\nGo back to your GitHub App settings and set **Homepage URL** and **Webhook URL** to the values printed above, then paste the value of `broccoli-oss-gh-webhook-secret` into the app's webhook secret field.\n\n### 7. Install the GitHub App on a repo\n\nFrom the GitHub App settings:\n\n1. Click **Install App**.\n2. Choose the account or org that owns the target repository.\n3. Select **Only select repositories** unless you intentionally want broader scope.\n4. Grant access to the target repository.\n5. Capture the **installation id** from the install URL (`/settings/installations/<id>`) — you'll seed it next.\n\n### 8. Run migrations and seed repo config\n\nFor the default Cloud Run + Cloud SQL deployment, `broccoli-oss-database-url` is written for the Cloud Run runtime and uses the `/cloudsql/...` Unix socket path. That secret is correct for the deployed service and runner, but it is **not** the right value to use directly from your laptop.\n\nFor local operator commands, start a local TCP tunnel with Cloud SQL Auth Proxy and build a local `DATABASE_URL` from `broccoli-oss-db-password` instead:\n\n```bash\ncloud-sql-proxy your-project:us-central1:broccoli-oss-pg --port 5432\n\nDB_PASSWORD=\"$(gcloud secrets versions access latest \\\n  --secret=broccoli-oss-db-password \\\n  --project your-project)\"\nexport DATABASE_URL=\"postgresql://broccoli_oss:${DB_PASSWORD}@127.0.0.1:5432/broccoli_oss\"\n\nuv sync --dev\nuv run python -m app.operator migrate\nuv run python -m app.operator schema-version\n```\n\nIf you are using the Codex deployment skill after bootstrap, it should retrieve generated secrets from Secret Manager and use existing target-project credentials where possible instead of telling you to run those helper commands yourself. The commands below remain the manual fallback path.\n\nIf you want Codex to finish the operator flow in GCP instead of from your laptop, use:\n\n```bash\npython .agents/skills/broccoli-oss-gcp-deploy/scripts/deploy.py \\\n  --github-app-id <github-app-id> \\\n  --project-id your-project \\\n  --apply \\\n  --post-deploy-operator \\\n  --github-repo-full-name acme/demo \\\n  [--git-clone-url https://github.com/acme/demo.git] \\\n  [--default-branch main] \\\n  [--github-installation-id 12345678] \\\n  [--linear-team-id <linear-team-id>] \\\n  [--linear-bot-user-id <linear-bot-user-id>]\n```\n\nThat path runs `migrate`, `schema-version`, `seed`, and `preflight` inside GCP by creating a temporary Cloud Run Job, executing the operator commands there, and deleting the temporary job when it finishes. Any of the optional repo and Linear flags may be omitted when the wrapper can safely discover them from the target project's own secrets and APIs.\n\nYou can discover the Linear bot user id and candidate team ids using the target project's existing Linear API key:\n\n```bash\nLINEAR_API_KEY=\"$(gcloud secrets versions access latest \\\n  --secret=broccoli-oss-linear-api-key \\\n  --project your-project)\"\n\ncurl -s https://api.linear.app/graphql \\\n  -H \"Authorization: ${LINEAR_API_KEY}\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"query\":\"query ViewerAndTeams { viewer { id name } teams { nodes { id key name } } }\"}'\n```\n\nThe response includes:\n\n- `viewer.id`: usually the bot user id when the API key belongs to the bot user\n- `teams.nodes[].id`: candidate `linear_team_id` values\n\nEdit `db/seed/example.seed.yaml` (or a copy) with your real values:\n\n```yaml\nrepos:\n  - repo_key: demo\n    enabled: true\n    github_repo_full_name: acme/demo\n    github_installation_id: 12345678   # from Step 7 install URL /settings/installations/<id>\n    git_clone_url: https://github.com/acme/demo.git\n    default_branch: main\n    base_branch: main\n    linear_team_id: <linear-team-uuid>\n    config_json: {}\n\nglobal:\n  linear_bot_user_id:\n    userId: <linear-bot-user-id>       # from Step 2\n```\n\nTop-level keys supported today: `repos` and `global` (with `linear_bot_user_id`). The seeder rejects duplicate `repo_key`, duplicate `github_repo_full_name`, blank required strings, and unknown keys.\n\n```bash\nuv run python -m app.operator seed --file db/seed/example.seed.yaml\n```\n\n### 9. Register the webhooks\n\nRetrieve the generated webhook secrets yourself if you need to paste them into GitHub or Linear:\n\n```bash\ngcloud secrets versions access latest \\\n  --secret=broccoli-oss-gh-webhook-secret \\\n  --project your-project\n\ngcloud secrets versions access latest \\\n  --secret=broccoli-oss-linear-webhook-secret \\\n  --project your-project\n```\n\n**GitHub** — the GitHub App webhook is already configured in Step 6; just confirm it points to `${Service URL}/webhooks/github`, that the webhook secret matches `broccoli-oss-gh-webhook-secret`, and that the app is subscribed to the right events:\n\n- `Pull request review` — required; drives review-feedback automation.\n- `Pull request` — required only if you want PR-opened / updated / reopened / ready-for-review automation.\n\n**Linear** — add a new webhook pointing to `${Service URL}/webhooks/linear`, using the value of `broccoli-oss-linear-webhook-secret`. Subscribe to **Issue** and **Issue label** events. This step is intentionally manual unless you choose to give Codex an admin-capable Linear credential; the normal bot API key is expected to be non-admin.\n\nRouting rules to know:\n\n- The issue must be assigned to the configured bot user.\n- Exactly one routing label must match an enabled `repo_key`.\n- `0 < estimate < 3` selects the small-estimate skill path; everything else uses the default path.\n\n### 10. Run preflight\n\nPreflight verifies DB connectivity, Secret Manager presence, backend-specific execution prerequisites (Cloud Run Job metadata by default, or Blaxel env + secret resolution when `EXECUTION_BACKEND=blaxel`), GitHub App installation token minting for the first enabled repo, Linear API access, and vendored prompt-template integrity.\n\n```bash\nexport GITHUB_APP_ID=123456\nexport GITHUB_APP_PRIVATE_KEY_PEM=\"$(gcloud secrets versions access latest \\\n  --secret=broccoli-oss-github-app-private-key-pem \\\n  --project your-project)\"\nexport GH_WEBHOOK_SECRET=\"$(gcloud secrets versions access latest \\\n  --secret=broccoli-oss-gh-webhook-secret \\\n  --project your-project)\"\nexport LINEAR_API_KEY=\"$(gcloud secrets versions access latest \\\n  --secret=broccoli-oss-linear-api-key \\\n  --project your-project)\"\nexport LINEAR_WEBHOOK_SECRET=\"$(gcloud secrets versions access latest \\\n  --secret=broccoli-oss-linear-webhook-secret \\\n  --project your-project)\"\nexport RUNNER_JOB_NAME=\"projects/your-project/locations/us-central1/jobs/broccoli-oss-runner\"\nexport GCP_PROJECT_ID=your-project\nexport GCP_REGION=us-central1\nexport APP_BASE_URL=https://your-service-url\n\nuv run python -m app.operator preflight\n```\n\n### Optional Blaxel sandbox backend\n\n`EXECUTION_BACKEND` defaults to `cloud_run_jobs`. Set it to `blaxel` only when you want webhook-triggered and promoted jobs to run inside Blaxel sandboxes instead of Cloud Run Jobs.\n\nRequired Blaxel env vars:\n\n- `BL_WORKSPACE`\n- `BL_API_KEY`\n- `BROCCOLI_BLAXEL_SANDBOX_IMAGE`\n\nOptional Blaxel env vars:\n\n- `BL_REGION`\n- `BROCCOLI_BLAXEL_SANDBOX_MEMORY_MB` (defaults to `4096`)\n- `BROCCOLI_BLAXEL_SANDBOX_TTL` (defaults to `6h`)\n- `BROCCOLI_BLAXEL_REGION`\n\nRequired service-mode Blaxel LLM secret selector env vars:\n\n- `OPENAI_API_KEY_SECRET`\n- `ANTHROPIC_API_KEY_SECRET`\n\nImage requirements for the Blaxel sandbox runner:\n\n- repo code available at `/app`\n- Python dependencies installed for this repo\n- `codex` and `claude` CLIs installed, matching `docker/Dockerfile.runner` expectations\n- the image able to run `python -m app.runner.main <job_id>` from `/app`\n\n### 11. Run the smoke tests\n\nGitHub webhook canary:\n\n```bash\nAPP_BASE_URL=https://your-service-url \\\nDATABASE_URL=postgresql://... \\\nGH_WEBHOOK_SECRET=... \\\nCANARY_GITHUB_REPO_FULL_NAME=acme/demo \\\nCANARY_GITHUB_PR_NUMBER=12 \\\nuv run python tests/smoke/github_webhook_canary.py\n```\n\nLinear webhook canary:\n\n```bash\nAPP_BASE_URL=https://your-service-url \\\nDATABASE_URL=postgresql://... \\\nLINEAR_WEBHOOK_SECRET=... \\\nCANARY_LINEAR_ISSUE_ID=issue-id \\\nCANARY_LINEAR_BOT_USER_ID=bot-user-id \\\nCANARY_LINEAR_CREATOR_ID=creator-id \\\nCANARY_LINEAR_REPO_KEY=demo \\\nuv run python tests/smoke/linear_webhook_canary.py\n```\n\nBoth scripts print the HTTP response plus the matching `webhook_deliveries` row. You're live.\n\n---\n\n## Operating Broccoli\n\n### Inspecting job state\n\nUseful tables: `webhook_deliveries`, `jobs`, `github_pr_state`, `linear_issue_state`, `repo_configs`, `global_config`.\n\n```sql\nSELECT provider, delivery_id, processed_at, ignored_reason, error_stage, job_id\nFROM webhook_deliveries\nORDER BY received_at DESC\nLIMIT 20;\n\nSELECT id, kind, status, routing_repo_key, error_kind, error_message\nFROM jobs\nORDER BY created_at DESC\nLIMIT 20;\n\n-- Lifecycle comment and launch metadata (best-effort)\nSELECT\n  id,\n  kind,\n  run_metadata->'launch' AS launch,\n  run_metadata->'linear'->'commentIds' AS linear_comment_ids,\n  run_metadata->'githubReviewFeedback' AS github_review_feedback,\n  run_metadata->'run' AS run_stage\nFROM jobs\nORDER BY created_at DESC\nLIMIT 20;\n```\n\nLifecycle comments are best-effort side effects. If GitHub/Linear APIs are unavailable or permissions are missing,\njobs should still run; `run_metadata` records what could be posted.\n\n### Ignored webhook responses\n\nEvery delivery is recorded, including ignored ones, so routing decisions are auditable. Common `ignored_reason` values:\n\n| Reason | Meaning |\n| --- | --- |\n| `unsupported_event` | Event is outside Broccoli's supported surface |\n| `duplicate_delivery` | Delivery id was already durably handled |\n| `missing_repo_routing` | No enabled `repo_key` matched the webhook payload |\n| `review_state_not_changes_requested` | GitHub review wasn't actionable |\n| `not_automation_ready` | Linear issue isn't currently assigned to the configured bot |\n\n### Retrying a failed webhook safely\n\nWebhook delivery dedupe is stored in Postgres. Safe behavior:\n\n- If the original delivery was already processed, a redelivery returns `duplicate_delivery`.\n- If the original job record exists but launch bookkeeping failed, a redelivery reuses the stored job id.\n- Do not manually mutate `jobs` or `webhook_deliveries` rows unless you are intentionally repairing state.\n\n**Preferred retry path:**\n\n1. Fix the root cause.\n2. Redeliver the original webhook from GitHub or Linear.\n3. Confirm the same delivery id reaches a terminal job state.\n\n---\n\n## IAM\n\nBroccoli prefers \"works on the first deploy\" over the strictest least-privilege model. Tighten after you're live.\n\n**Runtime service accounts:**\n\n- Ingress service account: project-level `roles/run.developer`\n- Ingress + runner service accounts: `roles/secretmanager.secretAccessor`\n- Ingress + runner service accounts: `roles/cloudsql.client` (only when using Cloud SQL)\n\n**Deployer permissions:** project `Owner` or `Editor`, plus permission to create service accounts and IAM bindings.\n\nReference docs consulted for IAM decisions:\n\n- [Cloud Run: Create jobs](https://docs.cloud.google.com/run/docs/create-jobs)\n- [Cloud Run: Execute jobs](https://docs.cloud.google.com/run/docs/execute/jobs)\n- [Cloud Run IAM roles and permissions](https://docs.cloud.google.com/iam/docs/roles-permissions/run)\n\n---\n\n## Local development\n\n```bash\nuv sync --dev\ncp .env.example .env   # fill in real values; never commit .env\nuv run ruff check .\nuv run pytest\n```\n\nThe `.env` file is gitignored. See [CONTRIBUTING.md](CONTRIBUTING.md) for the full contributor workflow.\n\n---\n\n## Documentation\n\n- [ARCHITECTURE.md](ARCHITECTURE.md) — design, components, data flow\n- [JOB-CONTRACT.md](JOB-CONTRACT.md) — webhook and state-model contract\n- [CONTRIBUTING.md](CONTRIBUTING.md) — how to contribute\n- [CHANGELOG.md](CHANGELOG.md) — release history\n\nLifecycle comment parity notes:\n\n- Linear issue automation posts best-effort lifecycle comments (`enqueued`, `started`, `prOpened`, terminal).\n- GitHub review-feedback jobs post a best-effort \"launcher started\" comment and a terminal failure comment.\n- Other private-repo behaviors (debug mode, plan-verbatim mode, extra remediation flows) are intentionally out of scope.\n\n## Contributing\n\nIssues and pull requests are welcome. Start with [CONTRIBUTING.md](CONTRIBUTING.md) for setup, expectations, and the review loop. Do not post secrets, credentials, or other sensitive deployment details in public issues.\n\n## License\n\nBroccoli OSS is released under the [MIT License](LICENSE). Bundled third-party notices are in [NOTICE](NOTICE).\n\n---\n\n## FAQ\n\n**Can I use an externally managed Postgres?** Yes — set `DB_BACKEND` to anything other than `cloudsql` and point `DATABASE_URL` at your instance.\n\n**Can I swap out the LLMs?** The runner shells out to the `codex` and `claude` CLIs; swapping requires forking the runner handlers and the vendored prompt templates. Contributions that make this pluggable are welcome.\n\n**Is there a hosted version?** Not today. Broccoli runs in your own GCP project against your own keys.\n\n**Is there a closed-source variant?** A closed-source variant of Broccoli running on different infrastructure exists and is not published here. The OSS path in this repo is self-contained and production-ready.\n","summary":"Broccoli OSS is a serverless AI‑first helper that turns Linear tickets into finished pull requests, automatically planning, coding, and opening the PR while you sleep. It runs entirely on your own Google Cloud project, leveraging Claude and Codex to review diffs, comment, and even push fix commits, and it preserves all data inside your tenancy with no external control plane. The tool ships in about half an hour with a single bootstrap script, durable job state, webhook deduplication, and fully customisable prompt templates that can be forked, tuned, and versioned in‑house. Engineering teams looking to automate ticket-to‑PR workflows, streamline code reviews, and keep AI operations on‑premise will find Broccoli a powerful, production‑grade addition to their CI/CD pipeline.","description":"Broccoli turns Linear tickets into shipped PRs — powered by Claude and Codex, running on your own Google Cloud or Blaxel containers.","stars":283,"language":"Python"},{"owner":"outcomeops","repo":"context-engineering","url":"https://github.com/outcomeops/context-engineering","readme":"# Context Engineering\n\nA working reference implementation of **context engineering** — the discipline of designing, retrieving, and injecting the information an AI system needs to produce accurate, organization-specific outputs.\n\nThis repo is the code companion to [**What Is Context Engineering?**](https://www.outcomeops.ai/context-engineering) on outcomeops.ai. The glossary defines the concepts; this repo shows them running end-to-end against a real corpus on Amazon Bedrock.\n\n> Context engineering treats context as a first-class engineering artifact — version-controlled, retrievable, and enforceable — rather than as prompts typed into a chat window.\n\n---\n\n## The five components\n\nA context engineering system has five components. Each folder implements one against the same running example (a Spring PetClinic codebase with ADRs):\n\n| # | Component | What it does | Folder |\n|---|---|---|---|\n| 1 | **Corpus** | The organizational material that defines how you think, build, and decide | [`01-corpus/`](./01-corpus) |\n| 2 | **Retrieval** | Identifies which portions of the corpus are relevant to a given request | [`02-retrieval/`](./02-retrieval) |\n| 3 | **Injection** | Gets retrieved context into the model's working memory at decision time | [`03-injection/`](./03-injection) |\n| 4 | **Output** | Produces reviewable artifacts (code, PRs, docs) shaped by that context | [`04-output/`](./04-output) |\n| 5 | **Enforcement** | Ensures the generated output actually reflects the retrieved context | [`05-enforcement/`](./05-enforcement) |\n\nPlus [`comparisons/`](./comparisons) — the same task run with and without context engineering, plus how CE differs from RAG, Copilot, and agent frameworks.\n\nA system with only components 1–3 is a RAG system. The output and enforcement layers are what make CE different — they make the generated content reviewable and governable.\n\n---\n\n## Running the examples\n\nAll examples use **Amazon Bedrock** with Claude. Each folder has its own `requirements.txt` and `README.md` with a runnable command.\n\n**Prerequisites:**\n\n- Python 3.11+\n- AWS account with credentials configured (`aws configure` or env vars)\n- AWS region that supports Claude and Titan (e.g. `us-east-1`, `us-west-2`)\n\nThis repo uses Anthropic Claude for generation and Amazon Titan for embeddings. Titan and most Bedrock foundation models are **auto-enabled** on first invocation — no action needed.\n\n**Anthropic Claude requires a one-time First Time Use (FTU) form per AWS account.** If your account has never used Anthropic models on Bedrock, the first script run will fail with `AccessDeniedException`. To fix:\n\n1. Open any Anthropic Claude model in the [Bedrock model catalog](https://console.aws.amazon.com/bedrock/home#/model-catalog)\n2. Fill the First Time Use form (company, use case — about a minute)\n3. Submit — access is granted immediately, no review queue\n\nIf you're in an AWS Organization child account, the form must be submitted from the management account to inherit access.\n\n**Quickstart:**\n\n```bash\ngit clone https://github.com/outcomeops/context-engineering.git\ncd context-engineering/01-corpus\npip install -r requirements.txt\npython ingest_adrs.py ./sample-adrs\n```\n\nSet the model via environment variable if you want to override the default:\n\n```bash\nexport BEDROCK_MODEL_ID=\"us.anthropic.claude-sonnet-4-5-20250929-v1:0\"\nexport AWS_REGION=\"us-east-1\"\n```\n\n---\n\n## Why this repo exists\n\nMost AI coding assistants produce generic output. An engineer using a generic assistant still has to adapt the output to local patterns — the assistant doesn't know what your team decided last quarter, what your compliance framework requires, or why you picked one library over another.\n\nA context-engineered system produces output that already conforms to local patterns, because the retrieval layer has fed the model the relevant ADRs, code, and standards at decision time. The enforcement layer ensures the output actually cites what it relied on.\n\nThis repo exists to show the pattern in code, end-to-end, so teams can build it themselves or evaluate commercial tools that claim to do it.\n\n---\n\n## Context engineering changes organizations, not just code\n\nThe five-component model is the technical frame. Teams that actually deploy it consistently discover the harder shift is organizational. Roles, KPIs, and decision rights in a traditional software org were shaped by a world where AI could not read the corpus. Once it can, the middle layers of that structure start to look different — and the repo above is only useful in the first place because of those changes.\n\n- [The rise of the outcome engineer](https://www.outcomeops.ai/blogs/the-rise-of-the-outcome-engineer) — the emerging role\n- [Engineers who own the outcome](https://www.outcomeops.ai/blogs/engineers-who-own-the-outcome) — the operating model\n- [OutcomeOps and context engineering: the next corporate evolution beyond DevOps](https://www.outcomeops.ai/blogs/outcomeops-and-context-engineering-the-next-corporate-evolution-beyond-devops) — what comes after DevOps\n- [Death of the traditional product owner](https://www.outcomeops.ai/blogs/death-of-the-traditional-product-owner) — the product-side role shift\n- [Measuring what actually matters](https://www.outcomeops.ai/blogs/measurng-what-actually-matters) — the KPI shift\n\n---\n\n## Further reading\n\nFoundational articles, reference guides, and practitioner writeups on context engineering as a discipline:\n\n- [Effective context engineering for AI agents](https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents) (Anthropic, Sep 2025) — curating and limiting what an agent sees\n- [The rise of context engineering](https://blog.langchain.com/the-rise-of-context-engineering/) (LangChain, Jun 2025) — the article that made the term widely used\n- [Context engineering for agents](https://blog.langchain.com/context-engineering-for-agents/) (LangChain, Jul 2025) — write/select/compress/isolate framing\n- [Context Engineering: Bringing Engineering Discipline to Prompts](https://addyo.substack.com/p/context-engineering-bringing-engineering) (Addy Osmani, Jul 2025) — engineering-discipline framing\n- [Context Engineering Guide](https://www.promptingguide.ai/guides/context-engineering-guide) (PromptingGuide.ai) — reference entry\n- [Documenting Architecture Decisions](https://cognitect.com/blog/2011/11/15/documenting-architecture-decisions) (Michael Nygard, 2011) — the original ADR essay; the format used throughout this repo\n- [OutcomeOps and context engineering: the next corporate evolution beyond DevOps](https://www.outcomeops.ai/blogs/outcomeops-and-context-engineering-the-next-corporate-evolution-beyond-devops) (OutcomeOps) — the organizational thesis behind this repo\n- [OutcomeOps: self-documenting architecture — when code becomes queryable](https://www.outcomeops.ai/blogs/outcomeops-self-documenting-architecture-when-code-becomes-queryable) (OutcomeOps) — how ADR corpora compound as code evolves\n- [The real cost of knowledge: why most AI engineering platforms over-engineer RAG](https://www.outcomeops.ai/blogs/the-real-cost-of-knowledge-why-most-ai-engineering-platforms-over-engineer-rag) (OutcomeOps) — against premature retrieval infrastructure\n- [What AI-assisted development actually looks like in two years](https://www.outcomeops.ai/blogs/what-ai-assisted-development-actually-looks-like-in-two-years) (OutcomeOps) — the working developer's view\n\n## Companion repositories\n\n- [bonigarcia/context-engineering](https://github.com/bonigarcia/context-engineering) — book companion from Boni García; organized by chapter with polyglot examples\n- [davidkimai/Context-Engineering](https://github.com/davidkimai/Context-Engineering) — concepts, patterns, and techniques\n- [Meirtz/Awesome-Context-Engineering](https://github.com/Meirtz/Awesome-Context-Engineering) — curated list of papers, tools, and articles\n- [joelparkerhenderson/architecture-decision-record](https://github.com/joelparkerhenderson/architecture-decision-record) — the definitive ADR resource list\n\n## Deep dives by component\n\nEach folder's README has its own curated reading list; the quick index:\n\n- **Corpus** — see [`01-corpus/`](./01-corpus#further-reading) — ADR formats, corpus bootstrapping, self-documenting architecture\n- **Retrieval** — see [`02-retrieval/`](./02-retrieval#further-reading) — FAISS, \"Lost in the Middle,\" retrieval economics\n- **Injection** — see [`03-injection/`](./03-injection#further-reading) — prompt structure, token budgets, inference cost\n- **Output** — see [`04-output/`](./04-output#further-reading) — JSON Schema, Bedrock tool-use, the outcome engineer\n- **Enforcement** — see [`05-enforcement/`](./05-enforcement#further-reading) — LLM-as-judge research, PR-as-guardrail\n- **Comparisons** — see [`comparisons/`](./comparisons#further-reading) — CE vs RAG vs agents vs enterprise search\n\n---\n\n## About\n\nBuilt by Brian Carpio at [OutcomeOps](https://www.outcomeops.ai). Questions, corrections, or contributions welcome via issues and PRs.\n\n## License\n\nMIT — see [LICENSE](./LICENSE).\n","summary":"Context Engineering is a reference implementation that treats the knowledge an AI system needs to generate accurate, organization‑specific outputs as a first‑class engineering artifact. It demonstrates five core components—corpus creation, relevance retrieval, context injection, reviewable output generation, and enforcement of context adherence—using Amazon Bedrock with Claude and Titan. The project includes end‑to‑end examples on a Spring PetClinic codebase, comparisons with simple RAG and other agent approaches, and scripts to ingest and query ADRs. Engineers and teams that require AI outputs that automatically align with internal standards, policies, or design decisions will benefit most, as the framework guarantees that generated code, docs, or PRs are grounded in the latest organizational artifacts.","description":null,"stars":122,"language":"Python"},{"owner":"faiscadev","repo":"fakecloud","url":"https://github.com/faiscadev/fakecloud","readme":"<p align=\"center\">\n  <strong>fakecloud</strong><br>\n  <em>Local AWS cloud emulator. Free forever.</em>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/faiscadev/fakecloud/actions\"><img src=\"https://img.shields.io/github/actions/workflow/status/faiscadev/fakecloud/ci.yml?branch=main&label=CI\" alt=\"CI\"></a>\n  <a href=\"https://codecov.io/gh/faiscadev/fakecloud\"><img src=\"https://img.shields.io/codecov/c/github/faiscadev/fakecloud?label=coverage\" alt=\"Coverage\"></a>\n  <a href=\"https://github.com/faiscadev/fakecloud/blob/main/LICENSE\"><img src=\"https://img.shields.io/badge/license-AGPL--3.0-blue\" alt=\"License\"></a>\n  <a href=\"https://github.com/faiscadev/fakecloud/pkgs/container/fakecloud\"><img src=\"https://img.shields.io/badge/ghcr.io-fakecloud-blue?logo=docker\" alt=\"GHCR\"></a>\n  <a href=\"https://crates.io/crates/fakecloud\"><img src=\"https://img.shields.io/crates/v/fakecloud\" alt=\"crates.io\"></a>\n  <a href=\"https://fakecloud.dev\"><img src=\"https://img.shields.io/badge/docs-fakecloud.dev-green\" alt=\"Docs\"></a>\n</p>\n\n---\n\nfakecloud is a free, open-source local AWS emulator for integration testing and local development. Single binary, no account, no auth token, no paid tier. Point your AWS SDK at `http://localhost:4566` and it works.\n\nIn March 2026, LocalStack replaced its open-source Community Edition with a proprietary image that requires an account and auth token. fakecloud exists so teams can keep a fully local AWS testing workflow without one.\n\n## Quick start\n\n```sh\ncurl -fsSL https://raw.githubusercontent.com/faiscadev/fakecloud/main/install.sh | bash\nfakecloud\n```\n\nThen point any AWS SDK or CLI at `http://localhost:4566` with dummy credentials:\n\n```sh\naws --endpoint-url http://localhost:4566 sqs create-queue --queue-name my-queue\n```\n\nOther install options (Cargo, Docker, Docker Compose, source) are documented at [fakecloud.dev/docs/getting-started](https://fakecloud.dev/docs/getting-started).\n\n## Why fakecloud\n\n- **Free, forever.** AGPL-3.0, no paid tier, no account, no token.\n- **100% conformance** per implemented service. Every operation validated against AWS's own Smithy models — 59,000+ generated test variants on every commit.\n- **Tested against upstream Terraform acceptance tests.** CI runs `hashicorp/terraform-provider-aws` `TestAcc*` suites against fakecloud. Catches waiter/field-presence/drift bugs that pure SDK tests miss.\n- **Real cross-service wiring.** EventBridge -> Step Functions, S3 -> Lambda, SES inbound -> S3/SNS/Lambda, and 15+ more integrations actually execute end-to-end.\n- **Real infrastructure for stateful services.** Lambda runs in Docker containers (23 runtimes). RDS runs real Postgres/MySQL/MariaDB/Oracle/SQL Server/Db2. ElastiCache runs real Redis/Valkey/Memcached.\n- **Single binary.** ~19 MB, ~10 MiB idle memory, ~500ms startup. No Docker required to run fakecloud itself (only to exercise the services that need real containers).\n- **Bedrock, the whole surface.** 111 operations across runtime + full control plane: `InvokeModel`/`Converse` (with streaming), guardrails (real content evaluation + PII detection), custom model jobs, model import, inference profiles, provisioned throughput, async batch via S3, prompt management, agreements, automated reasoning. Configurable responses per prompt + fault injection for deterministic Bedrock tests. LocalStack's Ultimate-tier Bedrock covers 4 ops backed by Ollama; fakecloud is free and covers the full Bedrock shape. See [`/bedrock-emulator/`](https://fakecloud.dev/bedrock-emulator/).\n- **First-party test SDKs** for TypeScript, Python, Go, PHP, Java, and Rust. Assert on what your code called without writing raw HTTP.\n- **Opt-in SigV4 verification and IAM enforcement.** Off by default so tests just work; turn on `--verify-sigv4` for real cryptographic signature checking and `--iam soft|strict` for identity-policy evaluation (Allow/Deny with Deny precedence, Action/Resource wildcards, user/group/role policies, `Condition` blocks with all 28 AWS operators against global keys like `aws:username` / `aws:SourceIp` / `aws:CurrentTime`, plus resource-based policies for S3 bucket, SNS topic, and Lambda function policies with AWS's cross-account combining semantics) across IAM, STS, SQS, SNS, and S3. See [the security docs](https://fakecloud.dev/docs/reference/security/).\n- **LocalStack and real-AWS URL compatibility.** Both `*.localhost.localstack.cloud` and `*.amazonaws.com` Host headers decode to service + region for routing, including every S3 virtual-hosted variant (`<bucket>.s3.<region>.…`, legacy `<bucket>.s3.amazonaws.com` with implicit `us-east-1`, and the older dash-separated `<bucket>.s3-<region>.amazonaws.com`). Persisted queue URLs, presigned URLs, webhook targets, and dev scripts from either system replay against fakecloud unchanged.\n\n## Supported services\n\n33 services, 2,422 operations, 100% conformance per implemented service.\n\n| Service                   | Ops | Notes                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    |\n| ------------------------- | --- | ---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- |\n| S3                        | 107 | Versioning, lifecycle, notifications, multipart, replication, website, **real SSE-KMS encrypt/decrypt**                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  |\n| SQS                       | 23  | FIFO, DLQs, long polling, batch, **real KMS encrypt/decrypt on `KmsMasterKeyId` queues**                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 |\n| SNS                       | 42  | Fan-out to SQS/Lambda/HTTP, filter policies, **KMS audit-trail on `KmsMasterKeyId` topics**                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              |\n| EventBridge               | 57  | Pattern matching, schedules, archives, replay, API destinations                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          |\n| EventBridge Scheduler     | 12  | at/rate/cron, SQS targets, DLQ routing, one-shot self-delete                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             |\n| Lambda                    | 85  | Real Docker, 23 runtimes, ESM with FilterCriteria + partial-batch failure                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                |\n| DynamoDB                  | 57  | Transactions, PartiQL, backups, global tables, streams, **KMS audit-trail on SSE-KMS tables**                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            |\n| IAM                       | 176 | Users, roles, policies, groups, OIDC/SAML, **PassRole trust enforcement**                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                |\n| STS                       | 11  | AssumeRole, session tokens, federation                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   |\n| SSM                       | 146 | Parameters, documents, commands, maintenance, patch baselines, **SecureString -> real KMS encrypt/decrypt**                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              |\n| Secrets Manager           | 23  | Versioning, rotation via Lambda, replication, **real KMS encrypt/decrypt**                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               |\n| CloudWatch Logs           | 113 | Groups, streams, subscription filters, query language                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    |\n| KMS                       | 53  | Encryption, aliases, grants, real ECDH, key import, **cross-service hook**                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    |\n| API Gateway v1            | 124 | REST APIs, resources, methods, integrations (`MOCK`/`HTTP`/`HTTP_PROXY`/`AWS_PROXY` Lambda), deployments, stages, API keys, usage plans, authorizers, models, request validators, VPC links, domain names, base path mappings, client certs, gateway responses, docs, tags
