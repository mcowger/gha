<script id="project-data" type="application/json">[{"owner":"nex-crm","repo":"wuphf","url":"https://github.com/nex-crm/wuphf","readme":"# WUPHF (pronounced \"woof\")\n\n<p align=\"center\">\n  <img src=\"assets/hero.png\" alt=\"WUPHF onboarding — Your AI team, visible and working.\" width=\"720\" />\n</p>\n\n[![Discord](https://img.shields.io/badge/Discord-Join%20Community-5865F2?logo=discord&logoColor=white)](https://discord.gg/gjSySC3PzV)\n[![License: MIT](https://img.shields.io/badge/License-MIT-A87B4F)](LICENSE)\n[![Go](https://img.shields.io/badge/Go-1.25+-00ADD8?logo=go&logoColor=white)](go.mod)\n\n<p align=\"left\">\n  <a href=\"https://news.ycombinator.com/item?id=47899844\">\n    <img src=\"website/hn-badge.svg\" alt=\"WUPHF — Hacker News Life of Product Week's #1\" width=\"223\" height=\"48\" />\n  </a>\n</p>\n\n### Slack for AI employees with a shared brain.\n\nA collaborative office for AI employees with a shared brain, running your work 24x7.\n\nOne command. One shared office. CEO, PM, engineers, designer, CMO, CRO — all visible, arguing, claiming tasks, and shipping work instead of disappearing behind an API. Unlike the original WUPHF.com, this one works.\n\n> *\"WUPHF. When you type it in, it contacts someone via phone, text, email, IM, Facebook, Twitter, and then... WUPHF.\"*\n> — Ryan Howard, Season 7\n\n> _30-second teaser — what the office feels like when the agents are actually working._\n\n<video width=\"630\" height=\"300\" src=\"https://github.com/user-attachments/assets/36661391-a0ee-43d6-80d9-177776a53bc9\"></video>\n\n> _Full walkthrough — launch to first shipped task, end to end._\n\n<video width=\"630\" height=\"300\" src=\"https://github.com/user-attachments/assets/f4cdffbf-4388-49bc-891d-6bd050ff8247\"></video>\n\n## Get Started\n\n**Prerequisites:** one agent CLI — [Claude Code](https://docs.anthropic.com/en/docs/claude-code) by default, or [Codex CLI](https://github.com/openai/codex) when you pass `--provider codex`. [tmux](https://github.com/tmux/tmux/wiki/Installing) is required for `--tui` mode (the web UI runs agents headlessly by default; tmux-backed dispatch remains as an internal fallback).\n\n```bash\nnpx wuphf\n```\n\nThat's it. The browser opens automatically and you're in the office. Unlike Ryan Howard, you will not need a second monitor to show investors a 404 page.\n\nPrefer a global install?\n\n```bash\nnpm install -g wuphf && wuphf\n```\n\nBuilding from source (requires Go):\n\n```bash\ngit clone https://github.com/nex-crm/wuphf.git\ncd wuphf\ngo build -o wuphf ./cmd/wuphf\n./wuphf\n```\n\n> **Forking this?** See [FORKING.md](FORKING.md) for running WUPHF without Nex, swapping branding, and adding your own agent packs. For the internals, see [ARCHITECTURE.md](ARCHITECTURE.md).\n\n> **Stability:** pre-1.0. `main` moves daily. Pin your fork to a release tag, not `main`.\n\n## Setup prompt (for AI agents)\n\nPaste this into Claude Code, Codex, or Cursor and let your agent drive the install:\n\n```text\nSet up https://github.com/nex-crm/wuphf for me. Read `README.md` first, then run\n`npx wuphf` to install and launch the office — the web UI opens at\nhttp://localhost:7891 automatically.\n\nOnce it is running, confirm you can see #general, the team of agents, and the\ncomposer. If anything looks off, re-read the \"What You Should See\" and \"Other\nCommands\" sections of README.md before retrying — do not skip to flags.\n\nFor agent conventions and the MCP tools each teammate gets, read `AGENTS.md`.\nFor internals and how the broker, workspaces, and memory fit together, read\n`ARCHITECTURE.md`. If I mention forking or rebranding, read `FORKING.md`.\n\nAfter it is installed and running, open https://github.com/nex-crm/wuphf in my\nbrowser. If I am logged in to GitHub, ask me whether you should star the repo\nfor me as a quick demo that the browser interaction works — only click the star\nif I say yes. If I am not logged in, just open https://wuphf.team.\n```\n\n## Options\n\n| Flag | What it does |\n|------|-------------|\n| `--memory-backend <name>` | Pick the organizational memory backend (`nex`, `gbrain`, `none`) |\n| `--no-nex` | Skip the Nex backend (no context graph, no Nex-managed integrations) |\n| `--tui` | Use the tmux TUI instead of the web UI |\n| `--no-open` | Don't auto-open the browser |\n| `--pack <name>` | Pick an agent pack (`starter`, `founding-team`, `coding-team`, `lead-gen-agency`, `revops`) |\n| `--opus-ceo` | Upgrade CEO from Sonnet to Opus |\n| `--provider <name>` | LLM provider override (`claude-code`, `codex`) |\n| `--collab` | Start in collaborative mode — all agents see all messages (this is the default) |\n| `--unsafe` | Bypass agent permission checks (local dev only) |\n| `--web-port <n>` | Change the web UI port (default 7891) |\n\n`--no-nex` still lets Telegram and any other local integration keep working. To switch back to CEO-routed delegation after launch, use `/focus` inside the office.\n\n## Memory: Notebooks and the Wiki\n\nEvery agent gets its own **notebook**. The team shares a **wiki**. New installs get the wiki as a local git repo of markdown articles — file-over-app, readable, `git clone`-able. Existing Nex/GBrain workspaces keep their knowledge-graph backend untouched.\n\n**The promotion flow:**\n\n1. Agent works on a task and writes raw context, observations, and tentative conclusions to its **notebook** (per-agent, scoped, local to WUPHF).\n2. When something in the notebook looks durable (a recurring playbook, a verified entity fact, a confirmed preference), the agent gets a promotion hint.\n3. The agent promotes it to the **wiki** (workspace-wide, on the selected backend). Now every other agent can query it.\n4. The wiki points other agents at whoever last recorded the context, so they know who to @mention for fresher working detail.\n\nNothing is promoted automatically. Agents decide what graduates from notebook to wiki.\n\n**Backends for the wiki:**\n\n- `markdown` (the \"team wiki\" tile in onboarding — the flag name is a historical artefact) is the default for new installs since v0.0.6. It is not just a markdown folder. It is a living knowledge graph: typed facts with triplets, per-entity append-only fact logs, LLM-synthesized briefs committed under the `archivist` identity, `/lookup` cited-answer retrieval, and a `/lint` suite that flags contradictions, orphans, stale claims, and broken cross-references. Everything lives as a local git repo at `~/.wuphf/wiki/` — `cat`, `grep`, `git log`, `git clone`, all work. No API key required.\n- `nex` was the previous default. Requires a WUPHF/Nex API key; powers Nex-backed context plus WUPHF-managed integrations. Existing users stay on `nex` via persisted config — no forced migration.\n- `gbrain` mounts `gbrain serve` as the wiki backend. It requires an API key during `/init`: `OpenAI` gives you the full path with embeddings and vector search, while `Anthropic` alone is reduced mode.\n- `none` disables the shared wiki entirely. Notebooks still work locally.\n\n**Internal naming (for code spelunkers):** the notebook is `private` memory, the wiki is `shared` memory. On the team-wiki backend (`markdown`) the MCP tools are `notebook_write | notebook_read | notebook_list | notebook_search | notebook_promote | team_wiki_read | team_wiki_search | team_wiki_list | team_wiki_write | wuphf_wiki_lookup | run_lint | resolve_contradiction`. On `nex`/`gbrain` the MCP tools are the legacy `team_memory_query | team_memory_write | team_memory_promote`. The two tool sets never coexist on one server instance — backend selection flips the surface. See `DESIGN-WIKI.md` for the reading view and `docs/specs/WIKI-SCHEMA.md` for the operational contract.\n\nExamples:\n\n```bash\nwuphf --memory-backend markdown   # new default\nwuphf --memory-backend nex\nwuphf --memory-backend gbrain\nwuphf --memory-backend none\n```\n\nWhen you select `gbrain`, onboarding asks for an OpenAI or Anthropic key up front and explains the tradeoff. If you want embeddings and vector search, use OpenAI.\n\n## Other Commands\n\nThe examples below assume `wuphf` is on your `PATH`. If you just built the binary and haven't moved it, prefix with `./` (as in Get Started above) or run `go install ./cmd/wuphf` to drop it in `$GOPATH/bin`.\n\n```bash\nwuphf init          # First-time setup\nwuphf share         # Invite one team member over Tailscale/WireGuard\nwuphf shred         # Delete workspace state and reopen onboarding\nwuphf --1o1         # 1:1 with the CEO\nwuphf --1o1 cro     # 1:1 with a specific agent\n```\n\n## Share With a Team Member\n\nPrerequisite: both machines are on the same Tailscale or WireGuard network.\n\n```bash\nwuphf share\n```\n\nSend the printed `/join` URL to one team member. The invite is one use, expires after 24 hours, and the shared web listener only starts on a private-network address by default. Public interfaces are blocked unless you pass an explicit unsafe override.\n\nFor the full walkthrough, see [Share WUPHF With a Team Member](docs/tutorials/share-with-team-member.md).\n\n## Publishing skills\n\nOnce a team-authored skill exists at `team/skills/<slug>.md`, you can publish it to the public agent-skill commons or pull a community skill back into your wiki. Publish opens a real PR via `gh`; install fetches a public raw `SKILL.md` and installs it as an active skill in the local team wiki.\n\n```bash\n# Publish your team's deploy skill to the Anthropic skills marketplace\nwuphf skills publish deploy-frontend --to anthropics\n\n# Dry-run the same publish to inspect the manifest + PR body without opening the PR\nwuphf skills publish deploy-frontend --to anthropics --dry-run\n\n# Publish to a custom GitHub repo (optionally pinning a non-main branch)\nwuphf skills publish deploy-frontend --to github:nex-crm/wuphf-skills\nwuphf skills publish deploy-frontend --to github:nex-crm/wuphf-skills@master\n\n# Pull a community skill into your team's wiki\nwuphf skills install web-research --from anthropics\n```\n\nSupported hubs: `anthropics`, `lobehub`, or any `github:owner/repo[@branch]`. Custom GitHub hubs default to `main` unless a branch is specified. Publish requires `gh auth login` first; install only needs network access since it fetches public raw URLs.\n\n## What You Should See\n\n- A browser tab at `localhost:7891` with the office\n- `#general` as the shared channel\n- The team visible and working\n- A composer to send messages and slash commands\n\nIf it feels like a hidden agent loop, something is wrong. If it feels like The Office, you're exactly where you need to be.\n\n## Telegram Bridge\n\nWUPHF can bridge to Telegram. Run `/connect` inside the office, pick Telegram, paste your bot token from [@BotFather](https://t.me/BotFather), and select a group or DM. Messages flow both ways.\n\n## OpenClaw Bridge\n\nAlready running [OpenClaw](https://openclaw.ai) agents? You can bring them into the WUPHF office.\n\nInside the office, run `/connect openclaw`, paste your gateway URL (default `ws://127.0.0.1:18789`) and the `gateway.auth.token` from your `~/.openclaw/openclaw.json`, then pick which sessions to bridge. Each becomes a first-class office member you can `@mention`. OpenClaw agents keep running in their own sandbox; WUPHF just gives them a shared office to collaborate in.\n\nWUPHF authenticates to the gateway using an Ed25519 keypair (persisted at `~/.wuphf/openclaw/identity.json`, 0600), signed against the server-issued nonce during every connect. OpenClaw grants zero scopes to token-only clients, so device pairing is mandatory — on loopback the gateway approves silently on first use.\n\nWant to add a new integration? See [docs/ADD-A-TRANSPORT.md](docs/ADD-A-TRANSPORT.md).\n\n## External Actions\n\nTo let agents take real actions (send emails, update CRMs, etc.), WUPHF ships with two action providers. Pick whichever fits your style.\n\n### One CLI — default, local-first\n\nUses a local CLI binary to execute actions on your machine. Good if you want everything running locally and don't want to send credentials to a third party.\n\n```\n/config set action_provider one\n```\n\n### Composio — cloud-hosted\n\nConnects SaaS accounts (Gmail, Slack, etc.) through Composio's hosted OAuth flows. Good if you'd rather not manage local CLI auth.\n\n1. Create a [Composio](https://composio.dev) project and generate an API key.\n2. Connect the accounts you want (Gmail, Slack, etc.).\n3. Inside the office:\n   ```\n   /config set composio_api_key <key>\n   /config set action_provider composio\n   ```\n\n## Why WUPHF\n\n| Feature | How it works |\n|---|---|\n| Sessions | Fresh per turn (no accumulated context) |\n| Tools | Per-agent scoped (DM loads 4, full office loads 27) |\n| Agent wakes | Push-driven (zero idle burn) |\n| Live visibility | Stdout streaming |\n| Mid-task steering | DM any agent, no restart |\n| Runtimes | Mix Claude Code, Codex, and OpenClaw in one channel |\n| Memory | Per-agent notebook + shared workspace wiki (knowledge graphs on GBrain or Nex) |\n| Price | Free and open source (MIT, self-hosted, your API keys) |\n\n## Benchmark\n\n10-turn CEO session on Codex. All numbers measured from live runs.\n\n| Metric | WUPHF |\n|---|---|\n| Input per turn | Flat ~87k tokens |\n| Billed per turn (after cache) | ~40k tokens |\n| 10-turn total | ~286k tokens |\n| Cache hit rate | 97% (Claude API prompt cache) |\n| Claude Code cost (5-turn) | $0.06 |\n| Idle token burn | Zero (push-driven, no polling) |\n\nAccumulated-session orchestrators grow from 124k to 484k input per turn over the same session. WUPHF stays flat. 7x difference measured over 8 turns.\n\n**Fresh sessions.** Each agent turn starts clean. No conversation history accumulates.\n\n**Prompt caching.** Claude Code gets 97% cache read because identical prompt prefixes across fresh sessions align with Anthropic's prompt cache.\n\n**Per-role tools.** DM mode loads 4 MCP tools instead of 27. Fewer tool schemas = smaller prompt = better cache hits.\n\n**Zero idle burn.** Agents only spawn when the broker pushes a notification. No heartbeat polling.\n\n### Reproduce it\n\n```bash\nwuphf --pack starter &\n./scripts/benchmark.sh\n```\n\nAll numbers are live-measured on your machine with your keys.\n\n## Claim Status\n\nEvery claim in this README, grounded to the code that makes it true.\n\n| Claim | Status | Where it lives |\n|---|---|---|\n| CEO on Sonnet by default, `--opus-ceo` to upgrade | ✅ shipped | `internal/team/headless_claude.go:203` |\n| Collaborative mode default, `/focus` (in-app) to switch to CEO-routed delegation | ✅ shipped | `cmd/wuphf/channel.go` (`/collab`, `/focus`) |\n| Per-agent MCP scoping (DM loads 4 tools, not 27) | ✅ shipped | `internal/teammcp/` |\n| Fresh session per turn (no `--resume` accumulation) | ✅ shipped | `internal/team/headless_claude.go` |\n| Push-driven agent wakes (no heartbeat) | ✅ shipped | `internal/team/broker.go` |\n| Workspace isolation per agent | ✅ shipped | `internal/team/worktree.go` |\n| Telegram bridge | ✅ shipped | `internal/team/telegram.go` |\n| Two action providers (One CLI default, Composio) | ✅ shipped | `internal/action/registry.go`, `internal/action/one.go`, `internal/action/composio.go` |\n| OpenClaw bridge (bring your existing agents into the office) | ✅ shipped | `internal/team/openclaw.go`, `internal/openclaw/` |\n| `wuphf import` — migrate from external orchestrator state | ✅ shipped | `cmd/wuphf/import.go` |\n| Live web-view agent streaming | 🟡 partial | `web/index.html` + broker stream |\n| Prebuilt binary via goreleaser | 🟡 config ready | `.goreleaser.yml` — tags pending |\n| Resume in-flight work on restart | ✅ shipped v0.0.2.0 | see `CHANGELOG.md` |\n| LLM Wiki — git-native team memory (Karpathy-style) with Wikipedia-style UI | ✅ shipped | `internal/team/wiki_git.go`, `internal/team/wiki_worker.go`, `web/src/components/wiki/`, `DESIGN-WIKI.md` |\n| `--memory-backend markdown` (new default for fresh installs) | ✅ shipped | `internal/config/config.go` (`MemoryBackendMarkdown`) |\n\nLegend: ✅ shipped · 🟡 partial · 🔜 planned. If a claim and a status disagree, the code wins — file an issue.\n\n## Evaluate This Repo\n\nBefore you fork, run this prompt against the codebase with any AI coding assistant (Claude Code, Cursor, Codex, etc.). It tells the assistant to play a cynical senior engineer doing a fork-or-skip review — no marketing spin, just file paths, line numbers, and a verdict in under 500 words. Drop it in, read the answer, decide.\n\n```\nYou are a cynical senior engineer evaluating whether to fork this repo as the\nbase for a multi-agent terminal office product. No prior context — explore it\nas you naturally would. Tell me: should I fork this, and what's your honest\ntake? Be specific: file paths, line numbers, actual evidence. \"The docs are\nbad\" is useless. Under 500 words.\n```\n\nWe run this ourselves before every release. If the AI finds something we missed, [file an issue](https://github.com/nex-crm/wuphf/issues).\n\n## Watch the wiki write itself\n\n5-minute terminal walkthrough of the Karpathy LLM-wiki loop: an agent records five facts, the synthesis threshold fires, the broker shells out to your own LLM CLI, the result commits to a git repo under the `archivist` identity, and the full author chain is visible in `git log`.\n\n```bash\nWUPHF_MEMORY_BACKEND=markdown HOME=\"$HOME/.wuphf-dev-home\" \\\n  ./wuphf-dev --broker-port 7899 --web-port 7900 &\n./scripts/demo-entity-synthesis.sh\n```\n\nRequirements: `curl`, `python3`, a running broker with `--memory-backend markdown`, and any supported LLM CLI (claude / codex / openclaw) on PATH. Env vars `BROKER`, `ENTITY_KIND`, `ENTITY_SLUG`, `AGENT_SLUG`, `THRESHOLD` override the defaults — see the header of `scripts/demo-entity-synthesis.sh`.\n\n## The Name\n\nFrom [*The Office*](https://theoffice.fandom.com/wiki/WUPHF.com_(Website)), Season 7. Ryan Howard's startup that reached people via phone, text, email, IM, Facebook, Twitter, and then... WUPHF. Michael Scott invested $10,000. Ryan burned through it. The site went offline.\n\nThe joke still fits. Except this WUPHF ships.\n\n\n\n> *\"I invested ten thousand dollars in WUPHF. Just need one good quarter.\"*\n> — Michael Scott\n\nMichael: still waiting on that quarter. We are not.\n","summary":"WUPHF is a browser‑based collaborative office for AI agents, giving each channel a shared “brain” that lets the crew—CEO, PM, engineer, designer, CMO, CRO—oversee, argue, and ship work around the clock. It spins up instantly via a single command using predefined Claude or Codex agent packs, then opens a web UI where users can watch the agents claim tasks, communicate through traditional channels, and store knowledge in a pluggable memory backend. The project includes a TUI fallback, a customizable agent architecture, and instructions for forking or rebranding, making it ideal for data scientists, AI product teams, and developers building autonomous AI workflows.","description":"WUPHF is a collaborative office of AI employees who build and maintain their own knowledge base to never lose context for the tasks you give them. Supports Claude Code, Codex, OpenClaw and local LLMs via OpenCode.","stars":846,"language":"Go"},{"owner":"saffron-health","repo":"libretto","url":"https://github.com/saffron-health/libretto","readme":"<!-- Generated from packages/libretto/README.template.md by `pnpm sync:mirrors`. Do not edit directly. -->\n\n# Libretto\n\n[![npm version](https://img.shields.io/npm/v/libretto)](https://www.npmjs.com/package/libretto)\n[![License: MIT](https://img.shields.io/badge/License-MIT-blue.svg)](https://opensource.org/licenses/MIT)\n[![GitHub Discussions](https://img.shields.io/github/discussions/saffron-health/libretto)](https://github.com/saffron-health/libretto/discussions)\n[![Discord](https://img.shields.io/badge/Discord-Join%20chat-5865F2?logo=discord&logoColor=white)](https://discord.gg/NYrG56hVDt)\n\nLibretto is a toolkit for building robust web integrations. It gives your coding agent a live browser and a token-efficient CLI to:\n\n- Inspect live pages with minimal context overhead\n- Capture network traffic to reverse-engineer site APIs\n- Record user actions and replay them as automation scripts\n- Debug broken workflows interactively against the real site\n\nWe at [Saffron Health](https://saffron.health) built Libretto to help us maintain our browser integrations to common healthcare software. We're open-sourcing it so other teams have an easier time doing the same thing.\n\nhttps://github.com/user-attachments/assets/9b9a0ab3-5133-4b20-b3be-459943349d18\n\n### Quick Links\n\n- Website: [libretto.sh](https://libretto.sh)\n- Docs: [libretto.sh/docs](https://libretto.sh/docs)\n- Repository: [github.com/saffron-health/libretto](https://github.com/saffron-health/libretto)\n- Discord: [discord.gg/NYrG56hVDt](https://discord.gg/NYrG56hVDt)\n\n## Installation\n\n```bash\nnpm install libretto\n\n# First-time onboarding: install skill, download Chromium, and pin the default snapshot model\nnpx libretto setup\n\n# Check workspace readiness at any time\nnpx libretto status\n\n# Manually change the snapshot analysis model (advanced override)\nnpx libretto ai configure <openai | anthropic | gemini | vertex>\n```\n\n`setup` detects available provider credentials (e.g. `OPENAI_API_KEY`) and automatically pins the default model to `.libretto/config.json`. Re-running `setup` on a healthy workspace shows the current configuration instead of re-prompting. If credentials are missing for a previously configured provider, `setup` offers an interactive repair flow.\n\nUse `ai configure` when you want to explicitly switch providers or set a custom model string.\n\n## Use cases\n\nLibretto is designed to be used as a skill through your coding agent. Here are some example prompts:\n\n### One-shot script generation\n\n> Use the Libretto skill. Go on LinkedIn and scrape the first 10 posts for content, who posted it, the number of reactions, the first 25 comments, and the first 25 reposts.\n\nYour coding agent will open a window for you to log into LinkedIn, and then automatically start exploring.\n\n### Interactive script building\n\n> I'm gonna show you a workflow in the eclinicalworks EHR to get a patient's primary insurance ID. Use libretto skill to turn it into a playwright script that takes patient name and dob as input to get back the insurance ID. URL is ...\n\nLibretto can read your actions you perform in the browser, so you can perform a workflow, then ask it to use your actions to rebuild the workflow.\n\n### Convert browser automation to network requests\n\n> We have a browser script at ./integration.ts that automates going to Hacker News and getting the first 10 posts. Convert it to direct network scripts instead. Use the Libretto skill.\n\nLibretto can read network requests from the browser, which it can use to reverse engineer the API and create a script that directly calls those requests. Directly making API calls is faster, and more reliable, than UI automation. You can also ask Libretto to conduct a security analysis which analyzes the requests for common security cookies, so you can understand whether a network request approach will be safe.\n\n### Fix broken integrations\n\n> We have a browser script at ./integration.ts that is supposed to go to Availity and perform an eligibility check for a patient. But I'm getting a broken selector error when I run it. Fix it. Use the Libretto skill.\n\nAgents can use Libretto to reproduce the failure, pause the workflow at any point, inspect the live page, and fix issues, all autonomously.\n\n### CLI usage\n\nYou can also use Libretto directly from the command line. All commands accept `--session <name>` to target a specific session.\n\n```bash\nnpx libretto open <url>                    # launch browser and open a URL\nnpx libretto run ./integration.ts --headless # run a workflow and close on success\nnpx libretto run ./integration.ts --headless --stay-open-on-success # keep a successful run inspectable\nnpx libretto snapshot --objective \"...\"    # capture PNG + HTML and analyze with an LLM\nnpx libretto exec \"<code>\"                 # execute Playwright TypeScript against the open page\nnpx libretto close                         # close the browser\n```\n\n`run` sessions are inspectable through the same daemon-backed commands as `open` sessions. Successful runs close the browser by default; pass `--stay-open-on-success` to keep the browser open for `pages`, `snapshot`, and `exec`. Failed or paused workflows keep the browser open so you can inspect the exact page state before fixing or resuming the workflow.\n\nRun `npx libretto help` for the full list of commands.\n\n## Configuration\n\nAll Libretto state lives in a `.libretto/` directory at your project root. See the [configuration docs](https://libretto.sh/docs/configuration) for details on config files, sessions, and profiles.\n\n## Join the Community\n\nJoin our Discord to connect with other developers, get help, and share what you've built:\n\n[![Discord](https://img.shields.io/badge/Discord-Join%20chat-5865F2?logo=discord&logoColor=white)](https://discord.gg/NYrG56hVDt)\n\nFor longer-form threads, head to [GitHub Discussions](https://github.com/saffron-health/libretto/discussions). Found a bug? [Open an issue](https://github.com/saffron-health/libretto/issues/new).\n\n## License\n\n[MIT License](LICENSE) — use it freely in commercial and open-source projects.\n\n## Development\n\nFor local development in this repository:\n\n```bash\npnpm i\npnpm build\npnpm type-check\npnpm test\n```\n\nSource layout:\n\n- `packages/libretto/src/cli/` — CLI commands\n- `packages/libretto/src/runtime/` — browser runtime (network, recovery, downloads, extraction)\n- `packages/libretto/src/shared/` — shared utilities (config, LLM client, logging, state)\n- `packages/libretto/test/` — test files (`*.spec.ts`)\n- `packages/libretto/README.template.md` — source of truth for the repo and package READMEs\n- `packages/libretto/skills/libretto/` — source of truth for the Libretto skill\n\nRun `pnpm sync:mirrors` after editing `packages/libretto/README.template.md` or anything under `packages/libretto/skills/libretto/`.\n\nTo check that generated READMEs, skill mirrors, and skill version metadata are in sync without fixing them, run `pnpm check:mirrors`. To release, run `pnpm prepare-release`.\n\n---\n\n> [!NOTE]\n> This is an early-stage project under active development. APIs may change before version 1.0. We recommend pinning to specific versions in production.\n\nBuilt by the team at [Saffron Health](https://saffron.health).\n","summary":"Libretto is a toolkit that equips coding agents with a live browser and a token‑efficient command line interface for building and debugging web integrations. It lets users inspect and interact with live pages, capture and analyze network traffic to reverse‑engineer APIs, record user actions and replay them as automation scripts, and debug broken workflows in real time. The library is especially useful for developers and data engineers who maintain browser‑based integrations with complex web services, such as healthcare software, by streamlining script creation, migration to a direct‑API approach, and troubleshooting. With open‑source tools and an active community, teams can quickly adopt and extend Libretto for robust, secure web automation.","description":"The AI toolkit for building and maintaining browser automations","stars":584,"language":"TypeScript"},{"owner":"kunchenguid","repo":"no-mistakes","url":"https://github.com/kunchenguid/no-mistakes","readme":"<h1 align=\"center\"><code>git push no-mistakes</code></h1>\n<p align=\"center\">\n  <a href=\"https://github.com/kunchenguid/no-mistakes/actions/workflows/release.yml\"\n    ><img\n      alt=\"Release\"\n      src=\"https://img.shields.io/github/actions/workflow/status/kunchenguid/no-mistakes/release.yml?style=flat-square&label=release\"\n  /></a>\n  <a href=\"https://img.shields.io/badge/platform-macOS%20%7C%20Linux%20%7C%20Windows-blue?style=flat-square\"\n    ><img\n      alt=\"Platform\"\n      src=\"https://img.shields.io/badge/platform-macOS%20%7C%20Linux%20%7C%20Windows-blue?style=flat-square\"\n  /></a>\n  <a href=\"https://x.com/kunchenguid\"\n    ><img\n      alt=\"X\"\n      src=\"https://img.shields.io/badge/X-@kunchenguid-black?style=flat-square\"\n  /></a>\n  <a href=\"https://discord.gg/Wsy2NpnZDu\"\n    ><img\n      alt=\"Discord\"\n      src=\"https://img.shields.io/discord/1439901831038763092?style=flat-square&label=discord\"\n  /></a>\n</p>\n\n<h3 align=\"center\">Kill all the slop. Raise clean PR.</h3>\n\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/kunchenguid/no-mistakes/main/demo.gif\" alt=\"no-mistakes demo\" width=\"800\" />\n</p>\n\n`no-mistakes` puts a local git proxy in front of your real remote. Push to `no-mistakes` instead of `origin`, and it spins up a disposable worktree, runs an AI-driven validation pipeline, forwards upstream only after every check passes, and opens a clean PR automatically.\n\n- **Non-blocking** - the pipeline runs in an isolated worktree without disrupting your work.\n- **Agent-agnostic** - `claude`, `codex`, `rovodev`, `opencode`, `pi`, or `acp:<target>` via `acpx`.\n- **Human stays in charge** - auto-fix or review findings, your call.\n- **Clean PRs by default** - push, open PR, watch CI, and auto-fix failures in one shot.\n\nFull documentation: <https://kunchenguid.github.io/no-mistakes/>\n\n## Install\n\n```sh\ncurl -fsSL https://raw.githubusercontent.com/kunchenguid/no-mistakes/main/docs/install.sh | sh\n```\n\nWindows, Go install, and build-from-source instructions are in the [installation guide](https://kunchenguid.github.io/no-mistakes/start-here/installation/).\n\n## Quick Start\n\n```sh\n$ no-mistakes init\n  ✓ Gate initialized\n\n    repo  /Users/you/src/my-repo\n    gate  no-mistakes → /Users/you/.no-mistakes/repos/abc123def456.git\n  remote  git@github.com:you/my-repo.git\n\n  Push through the gate with:\n  git push no-mistakes <branch>\n\n$ git checkout my-branch\n\n# do some work in the branch...\n\n$ git push no-mistakes\n  * Pipeline started\n\n  Run no-mistakes to review.\n\n$ no-mistakes\n# opens the TUI for the active run\n```\n\nYou can also skip `git push` and run `no-mistakes` directly after making changes. The setup wizard walks you through creating a branch, committing, and pushing through the gate, then attaches if the daemon registers the new run.\n\nSee the [quick start](https://kunchenguid.github.io/no-mistakes/start-here/quick-start/) for the full first-run walkthrough.\n\n## Development\n\n```sh\nmake build   # Build bin/no-mistakes with version info\nmake test    # Run go test -race ./... (excludes the e2e suite)\nmake e2e     # Run the tagged end-to-end agent journey suite\nmake e2e-record # Re-record e2e fixtures when agent wire formats change\nmake lint    # Run go vet ./...\nmake fmt     # Run gofmt -w .\nmake demo    # Regenerate demo.gif and demo.mp4 (needs vhs and ffmpeg)\nmake docs    # Build the Astro docs site in docs/dist\n```\n\nSee `Makefile` for the full target list.\n\n`make e2e-record` overwrites `internal/e2e/fixtures/` from the real `claude`, `codex`, and `opencode` CLIs, spends real API quota, and should be reviewed before committing.\n","summary":"`no‑mistakes` is a lightweight git proxy that sits in front of your remote. By pushing to it instead of the normal origin, it creates a disposable worktree, runs an AI‑driven validation pipeline using agents such as Claude or Codex, and only forwards the changes upstream after every check passes—automatically opening a clean pull request. The tool is non‑blocking, agent‑agnostic, and gives the developer full control over auto‑fixes or reviews, while streamlining the release cycle. It is ideal for engineers and teams that want to enforce code quality and CI checks before any code lands.","description":"git push no-mistakes","stars":429,"language":"Go"},{"owner":"ENTERPILOT","repo":"GOModel","url":"https://github.com/ENTERPILOT/GOModel","readme":"<p align=\"center\">\n  <img alt=\"GoModel logo\" src=\"docs/logo.svg\" width=\"96\">\n</p>\n\n<h1 align=\"center\">\n  GoModel - AI Gateway in Go\n</h1>\n\n<p align=\"center\">\n  <a href=\"https://github.com/ENTERPILOT/GoModel/actions/workflows/test.yml\"><img alt=\"CI\" src=\"https://github.com/ENTERPILOT/GoModel/actions/workflows/test.yml/badge.svg\"></a>\n  <a href=\"https://github.com/ENTERPILOT/GoModel/blob/main/go.mod\"><img alt=\"GO Version\" src=\"https://img.shields.io/github/go-mod/go-version/ENTERPILOT/GoModel?label=GO\"></a>\n  <a href=\"https://hub.docker.com/r/enterpilot/gomodel\"><img alt=\"Docker Pulls\" src=\"https://img.shields.io/docker/pulls/enterpilot/gomodel?label=Docker%20Pulls\"></a>\n  <a href=\"https://discord.gg/gaEB9BQSPH\"><img alt=\"Discord\" src=\"https://img.shields.io/badge/Discord-Join-5865F2?logo=discord&logoColor=white\"></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://news.ycombinator.com/item?id=47849097\"><img alt=\"Hacker News\" src=\"https://img.shields.io/badge/Hacker%20News-Apr%2021%20%2726%20%7C%20%234-brightgreen?logo=ycombinator&logoColor=white\"></a>\n  <a href=\"https://gomodel.enterpilot.io/docs\"><img alt=\"docs GoModel\" src=\"https://img.shields.io/badge/Docs-GoModel-blue\"></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://news.ycombinator.com/item?id=47849097\"><img alt=\"GoModel on Hacker News\" src=\"https://hackerbadge.vercel.app/api?id=47849097\"></a>\n</p>\n\n<p align=\"center\">\n  A fast and lightweight AI gateway written in Go, providing a unified OpenAI-compatible API for OpenAI, Anthropic, Gemini, DeepSeek, xAI, Groq, OpenRouter, Z.ai, Azure OpenAI, Oracle, Ollama, and more.\n</p>\n\n<a href=\"docs/dashboard.gif\">\n  <img src=\"docs/dashboard.gif\" alt=\"GoModel AI gateway dashboard showing AI usage analytics, observability panel, token and costs tracking, and estimated cost monitoring\" width=\"100%\">\n</a>\n\n## Quick Start with Docker\n\n**Step 1:** Start GoModel container\n\n```bash\ndocker run --rm -p 8080:8080 \\\n  -e LOGGING_ENABLED=true \\\n  -e LOGGING_LOG_BODIES=true \\\n  -e LOG_FORMAT=text \\\n  -e LOGGING_LOG_HEADERS=true \\\n  -e OPENAI_API_KEY=\"your-openai-key\" \\\n  enterpilot/gomodel\n```\n\nPass only the provider credentials or base URL you need (at least one required):\n\n```bash\ndocker run --rm -p 8080:8080 \\\n  -e OPENAI_API_KEY=\"your-openai-key\" \\\n  -e ANTHROPIC_API_KEY=\"your-anthropic-key\" \\\n  -e GEMINI_API_KEY=\"your-gemini-key\" \\\n  -e DEEPSEEK_API_KEY=\"your-deepseek-key\" \\\n  -e GROQ_API_KEY=\"your-groq-key\" \\\n  -e OPENROUTER_API_KEY=\"your-openrouter-key\" \\\n  -e ZAI_API_KEY=\"your-zai-key\" \\\n  -e XAI_API_KEY=\"your-xai-key\" \\\n  -e AZURE_API_KEY=\"your-azure-key\" \\\n  -e AZURE_BASE_URL=\"https://your-resource.openai.azure.com/openai/deployments/your-deployment\" \\\n  -e AZURE_API_VERSION=\"2024-10-21\" \\\n  -e ORACLE_API_KEY=\"your-oracle-key\" \\\n  -e ORACLE_BASE_URL=\"https://inference.generativeai.us-chicago-1.oci.oraclecloud.com/20231130/actions/v1\" \\\n  -e ORACLE_MODELS=\"openai.gpt-oss-120b,xai.grok-3\" \\\n  -e OLLAMA_BASE_URL=\"http://host.docker.internal:11434/v1\" \\\n  -e VLLM_BASE_URL=\"http://host.docker.internal:8000/v1\" \\\n  enterpilot/gomodel\n```\n\n⚠️ Avoid passing secrets via `-e` on the command line - they can leak via shell history and process lists. For production, use `docker run --env-file .env` to load API keys from a file instead.\n\n**Step 2:** Make your first API call\n\n```bash\ncurl http://localhost:8080/v1/chat/completions \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"model\": \"gpt-5-chat-latest\",\n    \"messages\": [{\"role\": \"user\", \"content\": \"Hello!\"}]\n  }'\n```\n\n**That's it!** GoModel automatically detects which providers are available based on the credentials you supply.\n\n### Supported LLM Providers\n\nExample model identifiers are illustrative and subject to change; consult provider catalogs for current models. Feature columns reflect gateway API support, not every individual model capability exposed by an upstream provider.\n\n| Provider      | Credential                                                        | Example Model                      | Chat | `/responses` | Embed | Files | Batches | Passthru |\n| ------------- | ----------------------------------------------------------------- | ---------------------------------- | :--: | :----------: | :---: | :---: | :-----: | :------: |\n| OpenAI        | `OPENAI_API_KEY`                                                  | `gpt-5.5`                          |  ✅  |      ✅      |  ✅   |  ✅   |   ✅    |    ✅    |\n| Anthropic     | `ANTHROPIC_API_KEY`                                               | `claude-sonnet-4-20250514`         |  ✅  |      ✅      |  ❌   |  ❌   |   ✅    |    ✅    |\n| Google Gemini | `GEMINI_API_KEY`                                                  | `gemini-2.5-flash`                 |  ✅  |      ✅      |  ✅   |  ✅   |   ✅    |    ❌    |\n| DeepSeek      | `DEEPSEEK_API_KEY`                                                | `deepseek-v4-pro`                  |  ✅  |      ✅      |  ❌   |  ❌   |   ❌    |    ❌    |\n| Groq          | `GROQ_API_KEY`                                                    | `llama-3.3-70b-versatile`          |  ✅  |      ✅      |  ✅   |  ✅   |   ✅    |    ❌    |\n| OpenRouter    | `OPENROUTER_API_KEY`                                              | `google/gemini-2.5-flash`          |  ✅  |      ✅      |  ✅   |  ✅   |   ✅    |    ✅    |\n| Z.ai          | `ZAI_API_KEY` (`ZAI_BASE_URL` optional)                           | `glm-5.1`                          |  ✅  |      ✅      |  ✅   |  ❌   |   ❌    |    ✅    |\n| xAI (Grok)    | `XAI_API_KEY`                                                     | `grok-4`                           |  ✅  |      ✅      |  ✅   |  ✅   |   ✅    |    ❌    |\n| Azure OpenAI  | `AZURE_API_KEY` + `AZURE_BASE_URL` (`AZURE_API_VERSION` optional) | `gpt-5`                            |  ✅  |      ✅      |  ✅   |  ✅   |   ✅    |    ✅    |\n| Oracle        | `ORACLE_API_KEY` + `ORACLE_BASE_URL`                              | `openai.gpt-oss-120b`              |  ✅  |      ✅      |  ❌   |  ❌   |   ❌    |    ❌    |\n| Ollama        | `OLLAMA_BASE_URL`                                                 | `llama3.2`                         |  ✅  |      ✅      |  ✅   |  ❌   |   ❌    |    ❌    |\n| vLLM          | `VLLM_BASE_URL` (`VLLM_API_KEY` optional)                         | `meta-llama/Llama-3.1-8B-Instruct` |  ✅  |      ✅      |  ✅   |  ❌   |   ❌    |    ✅    |\n\n✅ Supported ❌ Unsupported\n\nFor Z.ai's GLM Coding Plan, set `ZAI_BASE_URL=https://api.z.ai/api/coding/paas/v4`.\nConfigured model lists are available for every provider with\n`<PROVIDER>_MODELS`, for example\n`OPENROUTER_MODELS=openai/gpt-oss-120b,anthropic/claude-sonnet-4` or\n`ORACLE_MODELS=openai.gpt-oss-120b,xai.grok-3`. DeepSeek defaults to\n`https://api.deepseek.com`; set `DEEPSEEK_BASE_URL` only when using a compatible\nproxy or alternate DeepSeek endpoint. By default,\n`CONFIGURED_PROVIDER_MODELS_MODE=fallback` uses those lists only when upstream\n`/models` is unavailable or empty. Set `CONFIGURED_PROVIDER_MODELS_MODE=allowlist`\nto expose only configured models for providers that define a list, skipping\ntheir upstream `/models` calls.\nFor vLLM, set `VLLM_API_KEY` only if the upstream server was started with\n`--api-key`.\nTo register multiple instances of the same provider type without `config.yaml`,\nuse suffixed env vars such as `OPENAI_EAST_API_KEY` and\n`OPENAI_EAST_BASE_URL`; add `OPENAI_EAST_MODELS` to configure that instance's\nmodel list. This registers provider `openai-east` with type `openai`.\n\n---\n\n## Alternative Setup Methods\n\n### Running from Source\n\n**Prerequisites:** Go 1.26.2+\n\n1. Create a `.env` file:\n\n   ```bash\n   cp .env.template .env\n   ```\n\n2. Add your API keys to `.env` (at least one required).\n\n3. Start the server:\n\n   ```bash\n   make run\n   ```\n\n### Docker Compose\n\n**Infrastructure only** (Redis, PostgreSQL, MongoDB, Adminer - no image build):\n\n```bash\ndocker compose up -d\n# or: make infra\n```\n\n**Full stack** (adds GoModel + Prometheus; builds the app image):\n\n```bash\ncp .env.template .env\n# Add your API keys to .env\ndocker compose --profile app up -d\n# or: make image\n```\n\n| Service         | URL                   |\n| --------------- | --------------------- |\n| GoModel API     | http://localhost:8080 |\n| Adminer (DB UI) | http://localhost:8081 |\n| Prometheus      | http://localhost:9090 |\n\n### Building the Docker Image Locally\n\n```bash\ndocker build -t gomodel .\ndocker run --rm -p 8080:8080 --env-file .env gomodel\n```\n\n---\n\n## API Endpoints\n\n### OpenAI-Compatible API\n\n| Endpoint                    | Method | Description                                                                                                  |\n| --------------------------- | ------ | ------------------------------------------------------------------------------------------------------------ |\n| `/v1/chat/completions`      | POST   | Chat completions (streaming supported)                                                                       |\n| `/v1/responses`             | POST   | OpenAI Responses API                                                                                         |\n| `/v1/embeddings`            | POST   | Text embeddings                                                                                              |\n| `/v1/models`                | GET    | List available models                                                                                        |\n| `/v1/files`                 | POST   | Upload a file (OpenAI-compatible multipart)                                                                  |\n| `/v1/files`                 | GET    | List files                                                                                                   |\n| `/v1/files/{id}`            | GET    | Retrieve file metadata                                                                                       |\n| `/v1/files/{id}`            | DELETE | Delete a file                                                                                                |\n| `/v1/files/{id}/content`    | GET    | Retrieve raw file content                                                                                    |\n| `/v1/batches`               | POST   | Create a native provider batch (OpenAI-compatible schema; inline `requests` supported where provider-native) |\n| `/v1/batches`               | GET    | List stored batches                                                                                          |\n| `/v1/batches/{id}`          | GET    | Retrieve one stored batch                                                                                    |\n| `/v1/batches/{id}/cancel`   | POST   | Cancel a pending batch                                                                                       |\n| `/v1/batches/{id}/results`  | GET    | Retrieve native batch results when available                                                                 |\n\n### Provider Passthrough\n\n| Endpoint            | Method                                       | Description                                        |\n| ------------------- | -------------------------------------------- | -------------------------------------------------- |\n| `/p/{provider}/...` | GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS | Provider-native passthrough with opaque upstream responses |\n\n### Admin Endpoints\n\n| Endpoint                                   | Method | Description                                |\n| ------------------------------------------ | ------ | ------------------------------------------ |\n| `/admin/dashboard`                         | GET    | Admin dashboard UI                         |\n| `/admin/api/v1/dashboard/config`           | GET    | Dashboard configuration                    |\n| `/admin/api/v1/cache/overview`             | GET    | Cache statistics overview                  |\n| `/admin/api/v1/usage/summary`              | GET    | Aggregate token usage statistics           |\n| `/admin/api/v1/usage/daily`                | GET    | Per-period token usage breakdown           |\n| `/admin/api/v1/usage/models`               | GET    | Usage breakdown by model                   |\n| `/admin/api/v1/usage/user-paths`           | GET    | Usage breakdown by user path               |\n| `/admin/api/v1/usage/log`                  | GET    | Paginated usage log entries                |\n| `/admin/api/v1/audit/log`                  | GET    | Paginated audit log entries                |\n| `/admin/api/v1/audit/conversation`         | GET    | Conversation thread around one audit entry |\n| `/admin/api/v1/providers/status`           | GET    | Provider availability status               |\n| `/admin/api/v1/runtime/refresh`            | POST   | Refresh runtime configuration              |\n| `/admin/api/v1/models`                     | GET    | List models with provider type             |\n| `/admin/api/v1/models/categories`          | GET    | List model categories                      |\n| `/admin/api/v1/model-overrides`            | GET    | List model overrides                       |\n| `/admin/api/v1/model-overrides/:selector`  | PUT    | Create/update model override               |\n| `/admin/api/v1/model-overrides/:selector`  | DELETE | Remove model override                      |\n| `/admin/api/v1/auth-keys`                  | GET    | List authentication keys                   |\n\n### Operations Endpoints\n\n| Endpoint              | Method | Description                       |\n| --------------------- | ------ | --------------------------------- |\n| `/health`             | GET    | Health check                      |\n| `/metrics`            | GET    | Prometheus metrics (experimental, when enabled) |\n| `/swagger/index.html` | GET    | Swagger UI (when enabled)         |\n\n---\n\n## Gateway Configuration\n\nGoModel is configured through environment variables and an optional `config.yaml`. Environment variables override YAML values. See [`.env.template`](.env.template) and [`config/config.example.yaml`](config/config.example.yaml) for the available options.\n\nKey settings:\n\n| Variable                        | Default                                | Description                                                                      |\n| ------------------------------- | -------------------------------------- | -------------------------------------------------------------------------------- |\n| `PORT`                          | `8080`                                 | Server port                                                                      |\n| `BASE_PATH`                     | `/`                                    | Mount the gateway under a path prefix such as `/g`                               |\n| `GOMODEL_MASTER_KEY`            | (none)                                 | API key for authentication                                                       |\n| `ENABLE_PASSTHROUGH_ROUTES`     | `true`                                 | Enable provider-native passthrough routes under `/p/{provider}/...`              |\n| `ALLOW_PASSTHROUGH_V1_ALIAS`    | `true`                                 | Allow `/p/{provider}/v1/...` aliases while keeping `/p/{provider}/...` canonical |\n| `ENABLED_PASSTHROUGH_PROVIDERS` | `openai,anthropic,openrouter,zai,vllm` | Comma-separated list of enabled passthrough providers                            |\n| `STORAGE_TYPE`                  | `sqlite`                               | Storage backend (`sqlite`, `postgresql`, `mongodb`)                              |\n| `METRICS_ENABLED`               | `false`                                | Enable Prometheus metrics (experimental)                                         |\n| `LOGGING_ENABLED`               | `false`                                | Enable audit logging                                                             |\n| `GUARDRAILS_ENABLED`            | `false`                                | Enable the configured guardrails pipeline                                        |\n\n**Quick Start - Authentication:** By default `GOMODEL_MASTER_KEY` is unset. Without this key, API endpoints are unprotected and anyone can call them. This is insecure for production. **Strongly recommend** setting a strong secret before exposing the service. Add `GOMODEL_MASTER_KEY` to your `.env` or environment for production deployments.\n\n---\n\n## Response Caching\n\nGoModel has a two-layer response cache that reduces LLM API costs and latency for repeated or semantically similar requests.\n\n### Layer 1 - Exact-match cache\n\nHashes the full request body (path + `Workflow` + body) and returns a stored response on byte-identical requests. Sub-millisecond lookup. Activate by environment variables: `RESPONSE_CACHE_SIMPLE_ENABLED` and `REDIS_URL`.\n\nResponses served from this layer carry `X-Cache: HIT (exact)`.\n\n### Layer 2 - Semantic cache\n\nEmbeds the last user message via your configured provider’s OpenAI-compatible `/v1/embeddings` API (`cache.response.semantic.embedder.provider` must name a key in the top-level `providers` map) and performs a KNN vector search. Semantically equivalent queries - e.g. _\"What's the capital of France?\"_ vs _\"Which city is France's capital?\"_ - can return the same cached response without an upstream LLM call.\n\nExpected hit rates: ~60–70% in high-repetition workloads vs. ~18% for exact-match alone.\n\nResponses served from this layer carry `X-Cache: HIT (semantic)`.\n\nSupported vector backends: `qdrant`, `pgvector`, `pinecone`, `weaviate` (set `cache.response.semantic.vector_store.type` and the matching nested block).\n\nBoth cache layers run **after** guardrail/workflow patching so they always see the final prompt. Use `Cache-Control: no-cache` or `Cache-Control: no-store` to bypass caching per-request.\n\n---\n\nSee [DEVELOPMENT.md](docs/DEVELOPMENT.md) for testing, linting, and pre-commit setup.\n\n---\n\n# Roadmap to 0.2.0\n\n### Must Have\n\n- [ ] Intelligent routing\n- [ ] Broader provider support: Cohere, Command A, and Operational\n- [ ] Budget management with limits per `user_path` and/or API key\n- [ ] Editable model pricing for accurate cost tracking and budgeting\n- [ ] Full support for the OpenAI `/responses` and `/conversations` lifecycle\n- [ ] Prompt cache visibility showing how much of each prompt was cached by the provider\n- [ ] Guardrails hardening: better UI, simpler architecture, easier custom guardrails, and response-side guardrails before output reaches the client\n- [ ] Passthrough for all providers, beyond the current OpenAI and Anthropic beta\n- [ ] Fix failover charts in the dashboard\n\n### Should Have\n\n- [ ] Cluster mode\n\n## Community\n\nJoin our [Discord](https://discord.gg/gaEB9BQSPH) to connect with other GoModel users.\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/svg?repos=enterpilot/gomodel&type=date&legend=top-left)](https://www.star-history.com/#enterpilot/gomodel&type=date&legend=top-left)\n","summary":"GoModel is a fast, lightweight Go‑based AI gateway that exposes a single OpenAI‑compatible API to a wide range of LLM providers—including OpenAI, Anthropic, Gemini, DeepSeek, xAI, Groq, OpenRouter, Azure, Oracle, Ollama, and more—so you can switch models and vendors without changing your client code. It boots instantly with Docker, offers comprehensive logging, usage analytics, token and cost monitoring, and an observability dashboard to track usage in real time. The gateway automatically detects available providers from supplied credentials, making it ideal for developers, data scientists, and ops teams who need to experiment with multiple models or enforce cost controls while keeping their applications agnostic to underlying LLM services.","description":"AI gateway written in Go. Lightweight unified OpenAI-compatible API for OpenAI, Anthropic, Gemini, Groq, xAI & Ollama. LiteLLM alternative with observability, guardrails, streaming, costs and usage tracking.","stars":816,"language":"Go"},{"owner":"paniclock","repo":"paniclock","url":"https://github.com/paniclock/paniclock","readme":"<p align=\"center\">\n  <img src=\"assets/paniclock-logo-and-name-v1.png\" alt=\"PanicLock\" width=\"400\">\n</p>\n\nPanicLock is a macOS menu bar utility that instantly disables Touch ID and locks the screen with a single click or closing your laptop lid.\n\nPanicLock fills a gap macOS leaves open: there is no built-in way to instantly disable Touch ID when it matters. Biometrics are convenient day-to-day, and sometimes preferable when you need speed or want to avoid your password being observed. But in sensitive situations, law enforcement and border agents in many countries can compel a biometric unlock in ways they cannot with a password. PanicLock gives you a one-click menu bar button, a customizable hotkey, or an automatic lock-on-lid-close option that immediately disables Touch ID and locks your screen, restoring password-only protection without killing your session or shutting down.\n\n<p align=\"center\">\n  <a href=\"https://github.com/paniclock/paniclock/releases/latest/download/PanicLock.dmg\">\n    <img src=\"https://img.shields.io/badge/Download-PanicLock-blue?style=for-the-badge&logo=apple\" alt=\"Download PanicLock\">\n  </a>\n</p>\n\n## Features\n\n- **One-click panic lock** — Click the menu bar icon or press a hotkey to instantly lock\n- **Lock on Close** — Optionally lock and disable Touch ID when you close the lid\n- **Temporarily disables Touch ID** — Forces password-only unlock\n- **Auto-restore** — Original Touch ID settings restored after unlock\n- **Keyboard shortcut** — Configure a global hotkey (e.g., ⌃⌥⌘L)\n- **Launch at login** — Start automatically when you log in\n\n## Install\n\n### Homebrew\n\n```bash\nbrew install paniclock/tap/paniclock\n```\n\n### Manual Download\n\nDownload the latest DMG from the [releases page](https://github.com/paniclock/paniclock/releases/latest).\n\n## Requirements\n\n- macOS 14.0 (Sonoma) or later\n- Mac with Touch ID\n\n## Usage\n\n| Action | Result |\n|--------|--------|\n| **Left-click** icon | Trigger panic lock immediately |\n| **Right-click** icon | Open menu (Preferences, Uninstall, Quit) |\n\n### Lock on Close\n\nWhen enabled in Preferences, closing your Mac's lid will automatically disable Touch ID and lock your screen. Touch ID stays disabled until you re-login with your password. If your screen locks for other reasons (screensaver, display sleep, etc.), Touch ID will still work as normal.\n\n### First Launch\n\nOn first use, you'll be prompted for your admin password to install the privileged helper. This is a one-time setup.\n\n## Building from Source\n\n1. Clone this repository\n2. Open `PanicLock.xcodeproj` in Xcode\n3. Set your Development Team in both targets (PanicLock and PanicLockHelper)\n4. Update Team ID in `Info.plist` (`SMPrivilegedExecutables`) and `Info-Helper.plist` (`SMAuthorizedClients`)\n5. Build and run\n\n## Uninstall\n\n**Homebrew:**\n```bash\nbrew uninstall paniclock\n```\n\n**From the app:** Right-click → \"Uninstall PanicLock...\" → Enter admin password\n\n**Manual:**\n```bash\nsudo launchctl bootout system/com.paniclock.helper\nsudo rm -f /Library/PrivilegedHelperTools/com.paniclock.helper\nsudo rm -f /Library/LaunchDaemons/com.paniclock.helper.plist\nrm -rf /Applications/PanicLock.app\n```\n\n## How It Works\n\nPanicLock uses a privileged helper (installed via SMJobBless) to modify Touch ID timeout settings:\n\n1. Reads current timeout via `bioutil -r -s`\n2. Sets timeout to 1 second via `bioutil -w -s -o 1`\n3. Locks screen via `pmset displaysleepnow`\n4. Restores original timeout after ~2 seconds\n\nPanicLock only disables Touch ID. If you have other unlock methods enabled — Apple Watch unlock, security keys, etc. — your Mac can still be unlocked using those.\n\n## Security\n\n- **Minimal privileges** — Helper only runs 3 hardcoded commands (`bioutil`, `pmset`)\n- **Code-signed XPC** — Helper verifies connecting app's bundle ID + team ID + certificate\n- **No network activity** — App is 100% offline, no telemetry or analytics\n- **No data collection** — Only stores preferences (icon style, keyboard shortcut)\n- **Open source** — Full code available for audit\n\nNote: PanicLock only disables Touch ID. If you have other unlock methods enabled, Apple Watch unlock, security keys, etc., your Mac can still be unlocked using those.\n\n## Releasing\n\nThe release script handles building, signing, notarizing, and packaging:\n\n```bash\n./scripts/release.sh\n```\n\n**Features:**\n- Extracts version from Xcode project automatically\n- Signs with Developer ID for distribution outside the App Store\n- Submits to Apple for notarization (can take minutes to hours)\n- Creates a notarized DMG for distribution\n- Supports parallel notarizations — each version gets its own `build/release/<version>/` directory\n\n**Workflow:**\n1. Bump `MARKETING_VERSION` in Xcode\n2. Run `./scripts/release.sh` — builds and submits for notarization\n3. Run again later to check status and continue when approved\n4. Final output: `build/release/<version>/PanicLock-<version>.dmg`\n\n## License\n\nMIT License — See [LICENSE](LICENSE) for details.\n\n## Contributing\n\nContributions welcome! Please open an issue or pull request.\n","summary":"PanicLock is a macOS menu‑bar utility that instantly disables Touch ID and locks the screen, providing a one‑click or hotkey “panic lock” for situations where biometric unlocks must be prevented. It offers a lock‑on‑lid‑close option, temporary Touch ID disablement, automatic restoration of original settings, and the ability to launch at login. The tool is designed for macOS users with Touch ID who require rapid, password‑only protection in sensitive scenarios, such as security or law‑enforcement contexts. Because it runs a minimal‑privilege helper, it remains completely offline and open‑source.","description":"Instantly disable Touch ID and lock your Mac with one click or keyboard shortcut.","stars":406,"language":"Swift"},{"owner":"dropseed","repo":"plain","url":"https://github.com/dropseed/plain","readme":"# Plain\n\n**The Python web framework for building apps.**\n\nOriginally a fork of Django, reshaped over years of real use.\nReady for the era of agents.\n\n## Get started\n\nStart with an agent (Claude, Codex, Amp, OpenCode, or your agent of choice):\n\n```\nmkdir my-app && cd my-app && claude \"$(curl -sSf https://plainframework.com/start.md)\"\n```\n\nOr start with uv directly:\n\n```\nuvx plain-start my-app\n```\n\nFull walkthrough: https://plainframework.com/start/\n\n## What Plain code looks like\n\nExplicit, typed, and predictable. What's good for humans is good for AI.\n\nModels are Postgres-only:\n\n```python\n# app/users/models.py\nfrom plain import postgres\nfrom plain.postgres import types\nfrom plain.passwords.models import PasswordField\n\n@postgres.register_model\nclass User(postgres.Model):\n    email: str = types.EmailField()\n    password: str = PasswordField()\n    display_name: str = types.TextField(max_length=100)\n    is_admin: bool = types.BooleanField(default=False)\n    created_at: datetime = types.DateTimeField(create_now=True)\n\n    query: postgres.QuerySet[User] = postgres.QuerySet()\n\n    model_options = postgres.Options(\n        constraints=[\n            postgres.UniqueConstraint(fields=[\"email\"], name=\"unique_email\"),\n        ],\n    )\n```\n\nURLs use a `Router` class:\n\n```python\n# app/users/urls.py\nfrom plain.urls import Router, path\nfrom . import views\n\nclass UsersRouter(Router):\n    namespace = \"users\"\n    urls = [\n        path(\"<int:pk>/\", views.UserDetail),\n    ]\n```\n\nViews are class-based:\n\n```python\n# app/users/views.py\nfrom plain.views import DetailView\nfrom .models import User\n\nclass UserDetail(DetailView):\n    template_name = \"users/detail.html\"\n\n    def get_object(self):\n        return User.query.get(pk=self.url_kwargs[\"pk\"])\n```\n\nTemplates are Jinja:\n\n```html\n{# app/users/templates/users/detail.html #}\n{% extends \"base.html\" %}\n\n{% block content %}\n<h1>{{ user.display_name }}</h1>\n<p>Joined {{ user.created_at.strftime(\"%B %Y\") }}</p>\n{% endblock %}\n```\n\n## An opinionated stack\n\nPython where you want it, JS where you need it.\n\n- **Python:** 3.13+\n- **Database:** Postgres\n- **Templates:** Jinja2\n- **Frontend:** htmx, Tailwind CSS\n- **Python tooling:** uv (packages), ruff (lint/format), ty (type checking)\n- **JavaScript tooling:** oxc (lint/format), esbuild (bundling)\n- **Testing:** pytest\n\nModels declare fields as annotated attributes, and that typing carries through views, forms, and URLs. `plain check` runs `ty` on every pass — what your IDE shows, CI enforces, and agents read from the same signatures.\n\n## Observability at the core\n\nOpenTelemetry traces, a built-in request observer, and slow-query detection ship in the box. The first time an N+1 matters, you already have the tools to see it.\n\n## Agents at the forefront\n\nPredictable APIs, typed signatures, and on-demand docs happen to be what both people and coding agents need. Plain projects also ship tooling that agents use automatically.\n\n**Rules** — Always-on guardrails stored in project rules files (e.g. `.claude/rules/` for Claude Code). Short files (~50 lines) that prevent the most common mistakes.\n\n**Docs** — Full framework documentation, accessible on demand from the command line:\n\n```\nplain docs models                      # full docs\nplain docs models --api                # typed signatures only\nplain docs models --search \"queryset\"  # just the sections matching a term\nplain docs --search \"queryset\"         # search across all packages\n```\n\n**Skills** — End-to-end workflows triggered by slash commands:\n\n- `/plain-install` — add a new package and walk through setup\n- `/plain-upgrade` — bump versions, read changelogs, apply breaking changes, run checks\n- `/plain-optimize` — capture performance traces, identify slow queries and N+1 problems, apply fixes\n- `/plain-bug` — collect context and submit a bug report as a GitHub issue\n\n## First-party ecosystem\n\n30 packages, one framework. All with built-in docs. Decisions that usually take a sprint are already made.\n\n**Foundation:**\n\n- [plain](https://plainframework.com/docs/plain/plain/) — core framework\n- [plain.postgres](https://plainframework.com/docs/plain-postgres/plain/postgres/) — database ORM\n- [plain.auth](https://plainframework.com/docs/plain-auth/plain/auth/) — authentication\n- [plain.sessions](https://plainframework.com/docs/plain-sessions/plain/sessions/) — session storage\n\n**Backend:**\n\n- [plain.api](https://plainframework.com/docs/plain-api/plain/api/) — REST APIs\n- [plain.jobs](https://plainframework.com/docs/plain-jobs/plain/jobs/) — background jobs\n- [plain.email](https://plainframework.com/docs/plain-email/plain/email/) — sending email\n- [plain.cache](https://plainframework.com/docs/plain-cache/plain/cache/) — caching layer\n- [plain.redirection](https://plainframework.com/docs/plain-redirection/plain/redirection/) — URL redirects\n- [plain.vendor](https://plainframework.com/docs/plain-vendor/plain/vendor/) — vendored dependencies\n\n**Frontend:**\n\n- [plain.htmx](https://plainframework.com/docs/plain-htmx/plain/htmx/) — dynamic UI\n- [plain.tailwind](https://plainframework.com/docs/plain-tailwind/plain/tailwind/) — CSS framework\n- [plain.elements](https://plainframework.com/docs/plain-elements/plain/elements/) — HTML components\n- [plain.pages](https://plainframework.com/docs/plain-pages/plain/pages/) — static pages\n- [plain.esbuild](https://plainframework.com/docs/plain-esbuild/plain/esbuild/) — JS bundling\n\n**Development:**\n\n- [plain.dev](https://plainframework.com/docs/plain-dev/plain/dev/) — local server\n- [plain.pytest](https://plainframework.com/docs/plain-pytest/plain/pytest/) — testing helpers\n- [plain.toolbar](https://plainframework.com/docs/plain-toolbar/plain/toolbar/) — debug toolbar\n- [plain.code](https://plainframework.com/docs/plain-code/plain/code/) — code formatting\n- [plain.portal](https://plainframework.com/docs/plain-portal/plain/portal/) — remote shell and file transfer\n- [plain.tunnel](https://plainframework.com/docs/plain-tunnel/plain/tunnel/) — dev tunneling\n- [plain.start](https://plainframework.com/docs/plain-start/plain/start/) — project starter\n\n**Production:**\n\n- [plain.admin](https://plainframework.com/docs/plain-admin/plain/admin/) — database admin\n- [plain.observer](https://plainframework.com/docs/plain-observer/plain/observer/) — request tracing\n- [plain.flags](https://plainframework.com/docs/plain-flags/plain/flags/) — feature flags\n- [plain.scan](https://plainframework.com/docs/plain-scan/plain/scan/) — security scanning\n- [plain.pageviews](https://plainframework.com/docs/plain-pageviews/plain/pageviews/) — analytics\n- [plain.support](https://plainframework.com/docs/plain-support/plain/support/) — support tickets\n\n**Users:**\n\n- [plain.passwords](https://plainframework.com/docs/plain-passwords/plain/passwords/) — password auth\n- [plain.oauth](https://plainframework.com/docs/plain-oauth/plain/oauth/) — social login\n- [plain.loginlink](https://plainframework.com/docs/plain-loginlink/plain/loginlink/) — magic links\n\n## About\n\nPlain is a fork of [Django](https://www.djangoproject.com/), started in the stone age of 2023 and driven by real use at [PullApprove](https://www.pullapprove.com/).\n\n- Docs: https://plainframework.com/docs/\n- Source: https://github.com/dropseed/plain\n- Getting started: https://plainframework.com/start/\n- License: [BSD-3](https://github.com/dropseed/plain/blob/main/LICENSE)\n","summary":"Plain is a typed, Postgres‑only Python web framework that extends Django‑style conventions with explicit type annotations and built‑in observability. It provides typed models, a router, class‑based views, Jinja templates, and an htmx/Tailwind front‑end, all supported by command‑line tools for linting, testing, and OpenTelemetry tracing. The framework includes a rich first‑party ecosystem of 30 packages, automated documentation, and slash‑command “skills” that let agents perform installs, upgrades, optimizations, and bug reporting. Developers building modern, agent‑ready web applications—and those who need a predictable, typed stack that integrates tightly with large‑language‑model assistants—will find Plain especially useful.","description":"The Python web framework for building apps.","stars":1022,"language":"Python"},{"owner":"ginlix-ai","repo":"langalpha","url":"https://github.com/ginlix-ai/langalpha","readme":"<p align=\"center\">\n  <img src=\"web/public/logo_words.png\" alt=\"LangAlpha\" height=\"120\" />\n  <br>\n  <strong>A vibe investing agent harness</strong>\n  <br>\n  LangAlpha is built to help interpret financial markets and support investment decisions.\n  <br><br>\n  <img src=\"https://img.shields.io/badge/python-3.12+-blue.svg\" alt=\"Python 3.12+\" />\n  <a href=\"https://github.com/langchain-ai/langchain\"><img src=\"https://img.shields.io/badge/LangChain-1c3c3c?logo=langchain&logoColor=white\" alt=\"LangChain\" /></a>\n  <img src=\"https://img.shields.io/badge/license-Apache%202.0-green.svg\" alt=\"License\" />\n</p>\n\n> [!NOTE]\n> **Gemini 3 Hackathon** — If you're a judge or reviewer for the [Gemini 3 Hackathon](https://gemini3.devpost.com/), please refer to the [`hackathon/gemini-3`](https://github.com/ginlix-ai/langalpha/tree/hackathon/gemini-3) branch for the frozen submission. This `main` branch contains ongoing development beyond the submission.\n\n---\n\n<p align=\"center\">\n  <a href=\"#getting-started\">Getting Started</a> &bull;\n  <a href=\"docs/api/README.md\">API Docs</a> &bull;\n  <a href=\"src/ptc_agent/\">Agent Core</a> &bull;\n  <a href=\"src/server/\">Backend</a> &bull;\n  <a href=\"web/\">Web</a> &bull;\n  <a href=\"libs/ptc-cli/\">TUI</a> &bull;\n  <a href=\"skills/\">Skills</a> &bull;\n  <a href=\"mcp_servers/\">MCP</a>\n</p>\n\n<p align=\"center\">\n  <video src=\"https://github.com/user-attachments/assets/c3935d9a-73fd-4f34-bad8-af4c6233f355\" autoplay loop muted playsinline width=\"900\"></video>\n</p>\n<p align=\"center\"><em>Activated with a skill, the agent dispatches parallel subagents to gather market data, news, and macro context, then presents a morning note with inline interactive visualizations.</em></p>\n\n## Why LangAlpha\n\nEvery AI finance tool today treats investing as one-shot: ask a question, get an answer, move on. But real investing is Bayesian — you start with a thesis, new data arrives daily, and you update your conviction accordingly. It's an iterative process that unfolds over weeks and months: refining theses, revisiting positions, layering new analysis on top of old. No single prompt captures that.\n\n### *From vibe coding to vibe investing*\n\nInspired by software engineering: a codebase persists, and every commit builds on what came before. Code agent harnesses like Claude Code and OpenCode succeeded by building agents that embrace this pattern, exploring existing context and building on prior work. LangAlpha brings that same insight: give the agent a persistent workspace, and research naturally compounds.\n\nIn practice, you create a workspace per research goal (\"Q2 rebalance\", \"data center demand deep dive\", \"energy sector rotation\"). The agent interviews you about your goals and style, produces its first deliverable, and saves everything to the workspace filesystem. Come back tomorrow and your files, threads, and accumulated research are still there.\n\n## Features Highlights\n\n- **Progressive Tool Discovery** — Any MCP tools loaded as summary in context and full documentation dumped into the workspace, allowing the agent to discover and use tools truly on demand. Also supports binding json tools with skills and only expose to agent when skill is activated.\n- **Programmatic Tool Calling (PTC)** — The agent writes and executes Python to process financial data from mcp servers instead of pouring raw data into the LLM context window, enabling complex multi-step analysis while dramatically reducing token waste.\n- **Financial data ecosystem** — Multi-tier provider hierarchy with native tools for quick lookups and MCP servers for bulk data processing, charting, and multi-year analysis in sandboxes.\n- **Persistent workspaces** — Each workspace maps to a dedicated sandbox with structured directories and a workspace notes file (`agent.md`) that compounds research across sessions and threads. A separate long-term memory store (`.agents/user/memory/`, `.agents/workspace/memory/`) persists durable user preferences and cross-sandbox knowledge, and a user-managed memo store (`.agents/user/memo/`) lets you upload PDFs and markdown research notes that the agent can read on demand.\n- **Skills for Financial Research** — Pre-built workflows for DCF models, initiating coverage reports, earnings analysis, morning notes, document generation, and more — activatable by slash command or auto-detection.\n- **Finance Research Workbench** — Web UI with inline financial charts, multi-format file viewer, TradingView charting, real-time WebSocket market data, shareable conversations, and subagent monitoring.\n- **Multi-provider model layer** — Provider-agnostic LLM abstraction and automatic failover on error.\n- **Automations** — Schedule recurring or one-shot tasks, or set price-triggered automations that fire when a stock or index hits a real-time price condition.\n- **Secretary** — Flash agent doubles as a secretary: create and manage workspaces, dispatch deep PTC analyses in the background, monitor running tasks, and retrieve results — all through conversational commands with human-in-the-loop approval.\n- **Agent swarm** — Parallel async subagents with isolated context windows, preloaded toolset/skills, mid-execution steering, checkpoint-based resume, and live progress monitoring in the UI.\n- **Live steering** — Send follow-up messages while the agent/subagent is working to course-correct, clarify, or redirect without waiting for it to finish.\n- **Middleware stack** — 25 composable layers handling skill loading, plan mode, multimodal input, auto-compaction, and context management support long-running agent sessions.\n- **Security & workspace vault** — Encryption at rest via pgcrypto, automatic credential leak detection and redaction, sandboxed execution, and per-workspace secret storage for safe agent access\n- **Channel integrations** — Use LangAlpha from Slack, Discord with complete feature support.\n- **Production-ready infrastructure** — SSE-streamed agent activity with Redis-buffered reconnection replay, background execution decoupled from HTTP connections, and PostgreSQL-backed state persistence.\n\n## What Powers It\n\n**System Architecture**\n\n```mermaid\n%%{init: {'theme': 'neutral'}}%%\n\nflowchart TB\n    Web[\"Web UI<br/>React 19 · Vite · Tailwind\"] -- \"REST · SSE\" --> API\n    Web -- \"WebSocket\" --> WSP\n    CLI[\"CLI / TUI\"] -- \"REST · SSE\" --> API\n\n    subgraph Server [\"FastAPI Backend\"]\n        API[\"API Routers<br/>Threads · Workspaces · Market Data<br/>OAuth · Automations · Skills\"]\n        WSP[\"WebSocket Proxy\"]\n        API --> ChatHandler[\"Chat Handler<br/>LLM Resolution · Credit Check\"]\n        ChatHandler --> BTM[\"Background Task Manager<br/>asyncio.shield · Workflow Lifecycle\"]\n    end\n\n    subgraph PostgreSQL [\"PostgreSQL — Dual Pool\"]\n        AppPool[(\"App Data<br/>Users · Workspaces · Threads<br/>Turns · BYOK Keys · Automations\")]\n        CheckPool[(\"LangGraph Checkpointer<br/>Agent State · Checkpoints\")]\n    end\n\n    subgraph Redis [\"Redis\"]\n        EventBuf[(\"SSE Event Buffer<br/>150K events · Reconnect Replay\")]\n        DataCache[(\"API Cache<br/>Market Data · SWR\")]\n        Steering[(\"Steering Queue<br/>User Messages Mid-workflow\")]\n    end\n\n    BTM --> AppPool\n    BTM --> CheckPool\n    BTM --> EventBuf\n    BTM --> Steering\n    API --> DataCache\n\n    BTM -. \"Sandbox API\" .-> Daytona[\"Daytona<br/>Cloud Sandboxes\"]\n    API -. \"REST\" .-> FinAPIs[\"Financial APIs<br/>FMP · SEC EDGAR\"]\n    WSP -. \"WebSocket\" .-> GData[\"ginlix-data<br/>Polygon.io · Massive\"]\n```\n\n\n\n### Multi-Provider Model Layer\n\nLangAlpha runs on a provider-agnostic model layer that abstracts across multiple LLM backends. The same middleware stack, tools, and workflows work regardless of which model is driving them. It ships with two modes:\n\n- **PTC mode** for deep, multi-step investment research. Strong reasoning drives multi-step analysis where the agent plans its approach, thinks through financial data, and writes code for complex analysis. Long context lets it cross-reference SEC filings and research reports in a single pass.\n- **Flash mode** for fast conversational responses and workspace orchestration: quick market lookups, chart-and-chat in MarketView, lightweight Q&A, and a secretary that manages workspaces, dispatches deep PTC analyses in the background, and relays results back through natural conversation.\n\n**Bring your own model** — Use your existing AI subscriptions and API keys directly. Connect ChatGPT or Claude subscriptions via OAuth (OpenAI Codex OAuth, Claude Code OAuth), use coding plans from Kimi (Moonshot), GLM (Zhipu), or MiniMax, or supply your own API keys for any supported provider via BYOK. All keys are encrypted at rest via PostgreSQL pgcrypto (see [Security](#security)).\n\n**Model resilience** — 3 retries with exponential backoff on the same model, then automatic failover to a configured fallback model. Reasoning effort (`low`/`medium`/`high`) is normalized across providers automatically.\n\n### Programmatic Tool Calling (PTC) and Workspace Architecture\n\nMost AI agents interact with data through one-off JSON tool calls which dump the result into the context window directly. Programmatic Tool Calling flips this: instead of passing raw data through the LLM, the agent writes and executes code inside a [Daytona](https://www.daytona.io/) cloud sandbox that processes data locally and returns only the final result. This dramatically reduces token waste while enabling analysis that would otherwise exceed context limits.\n\n**PTC Execution Flow**\n\n```mermaid\n%%{init: {'theme': 'neutral'}}%%\n\nflowchart LR\n    LLM[\"LLM\"] -- \"1 — Writes Python\" --> EC[\"ExecuteCode Tool\"]\n    EC -- \"2 — Sends to sandbox\" --> Run[\"Code Runner\"]\n\n    subgraph Sandbox [\"Daytona Cloud Sandbox\"]\n        Run -- \"3 — import tools.*\" --> Wrappers[\"Generated Wrappers<br/>One module per MCP server\"]\n        Wrappers -- \"4 — JSON-RPC stdio\" --> MCP[\"MCP Servers<br/>Subprocesses in sandbox\"]\n    end\n\n    MCP -- \"5 — REST / WS\" --> APIs[\"Financial APIs<br/>FMP · Yahoo · Polygon\"]\n    APIs -- \"6 — Data\" --> MCP\n    Run -- \"7 — stdout · charts · files\" --> EC\n    EC -- \"8 — Result\" --> LLM\n```\n\n\n\nIn addition, the workspace environment enables persistence beyond a single session. Each sandbox has a structured directory layout — `work/<task>/` for per-task working areas (data, charts, code), `results/` for finalized reports, and `data/` for shared datasets — so intermediate results survive across sessions. At the root sits `agent.md`, a workspace notes file that the agent maintains across threads: workspace goals, key findings, a thread index, and a file index of important artifacts. A middleware layer injects `agent.md` into every model call, so the agent always has full context of prior work without re-reading files. Orthogonal to this, a store-backed long-term memory system (`.agents/user/memory/`, `.agents/workspace/memory/`) captures durable user preferences and cross-sandbox knowledge that survives workspace resets, and a user-managed memo store (`.agents/user/memo/`) holds documents you upload — PDFs are text-extracted server-side and metadata is generated asynchronously by an LLM so the agent can find and cite them by topic. Each workspace supports multiple conversation threads tied to a single research goal.\n\n<p align=\"center\">\n  <img src=\"docs/images/workspaces-list-page.png\" alt=\"Workspaces page with research workspace cards\" width=\"800\" />\n</p>\n<p align=\"center\"><em>Each workspace maps to a persistent sandbox — organize research by theme, portfolio, or thesis.</em></p>\n\n<p align=\"center\">\n  <img src=\"docs/images/chat-data-center-research-with-value-chain-dashboard.png\" alt=\"PTC agent generating an AI compute value chain dashboard with supply chain analysis\" width=\"800\" />\n</p>\n<p align=\"center\"><em>The agent writes code to build interactive dashboards — here analyzing the AI compute supply chain via PTC.</em></p>\n\n### Financial Data Ecosystem\n\nWhile PTC excels at complex work like multi-step data processing, financial modeling, and chart creation, spinning up code execution for every data lookup is overkill. So we also built a native financial data toolset that transforms frequently used data into an LLM-digestible format. These tools also come with artifacts that render directly in the frontend, giving the human layer immediate visual context alongside the agent's analysis.\n\n**Native tools** for quick reference via direct tool calls:\n\n- **Company overview** with real-time quotes, price performance, key financial metrics, analyst consensus, and revenue breakdown\n- **SEC filings** (10-K, 10-Q, 8-
