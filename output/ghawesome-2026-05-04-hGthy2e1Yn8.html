K) with earnings call transcripts and formatted markdown for citation\n- **Market indices** and **sector performance** for broad market context\n- **Web search** (Tavily, Serper, Bocha) and **web crawling** with circuit breaker fault tolerance\n\n**MCP servers** for raw data consumed through PTC code execution:\n\n- **Price data** for OHLCV time series across stocks, commodities, crypto, and forex\n- **Fundamentals** for multi-year financial statements, ratios, growth metrics, and valuation\n- **Macro economics** for GDP, CPI, unemployment, Fed funds rate, treasury yield curve (1M–30Y), country risk premiums, economic calendar, and earnings calendar\n- **Options** for options chain with filtering, historical OHLCV for option contracts, and real-time bid/ask snapshots\n\nThe agent picks the right layer automatically: native tools for fast lookups that fit in context, MCP tools when the task requires bulk data processing, charting, or multi-year trend analysis in the sandbox.\n\n#### Data Provider Fallback Chain\n\nLangAlpha supports a three-tier data provider hierarchy. Each tier is optional — the system gracefully degrades when higher tiers are unavailable:\n\n\n| Tier | Provider                          | Key Required      | What It Adds                                                                               |\n| ---- | --------------------------------- | ----------------- | ------------------------------------------------------------------------------------------ |\n| 1    | **ginlix-data** (hosted proxy)    | `GINLIX_DATA_URL` | Real-time WebSocket price feed, intraday data, extented trading hour data, options data    |\n| 2    | **FMP** (Financial Modeling Prep) | `FMP_API_KEY`     | High-quality fundamentals, financial statements, macro data, analyst data                  |\n| 3    | **Yahoo Finance** (yfinance)      | *None — free*     | Price history, basic fundamentals, earnings, holdings, insider transactions, ESG, screener |\n\n\nAll tiers are enabled by default. To run with **free data only** (Yahoo Finance), run `make config` with prompted selection. You can also edit `agent_config.yaml` manually.\n\n> [!NOTE]\n> Yahoo Finance data is community-sourced and has limitations: no intraday data below 1-hour intervals, delayed quotes, limited macro coverage, and occasional rate limiting. An `FMP_API_KEY` is strongly recommended ([free tier available](https://site.financialmodelingprep.com/)).\n\n<p align=\"center\">\n  <img src=\"docs/images/chat-nvda-amd-googl-comps-analysis-with-stock-cards.png\" alt=\"Comparable company analysis with live NVDA, AMD, and GOOGL stock cards\" width=\"800\" />\n</p>\n<p align=\"center\"><em>Native financial data tools render live stock cards inline while the agent runs a comps analysis.</em></p>\n\n### Financial Research Skills\n\nThe agent ships with 23 pre-built financial research skills, each activatable by slash command or automatic detection. Skills follow the [Agent Skills Spec](https://agentskills.io/specification) and can be extended by dropping a `SKILL.md` file into the workspace.\n\n\n| Category                 | Skills                                                                                    |\n| ------------------------ | ----------------------------------------------------------------------------------------- |\n| **Valuation & Modeling** | DCF Model, Comps Analysis, 3-Statement Model, Model Update, Model Audit                   |\n| **Equity Research**      | Initiating Coverage (30–50pg report), Earnings Preview, Earnings Analysis, Thesis Tracker |\n| **Market Intelligence**  | Morning Note, Catalyst Calendar, Sector Overview, Competitive Analysis, Idea Generation   |\n| **Document Generation**  | PDF, DOCX, PPTX, XLSX — create, edit, extract                                             |\n| **Operations**           | Investment Deck QC, Scheduled Automations, User Profile & Portfolio                       |\n\n\nAcknowledgement: some of skills are adapted from [anthropics/financial-services-plugins](https://github.com/anthropics/financial-services-plugins).\n\n<p align=\"center\">\n  <img src=\"docs/images/chat-comparable-company-valuation-pdf-report.png\" alt=\"Comps Analysis skill generating an Excel workbook and PDF report for NVDA, AMD, and GOOGL\" width=\"800\" />\n</p>\n<p align=\"center\"><em>The Comps Analysis skill builds a multi-sheet Excel workbook with operating metrics and valuation multiples.</em></p>\n\n### Multimodal Intelligence\n\nThe agent natively reads images (PNG, JPG, GIF, WebP) and PDFs — the multimodal middleware intercepts file reads, downloads content from the sandbox or URLs, and injects it as base64 into the conversation for direct visual interpretation. In MarketView, the user's live candlestick chart can be captured and sent to the agent as multimodal context — the capture includes both the chart image and structured metadata (symbol, interval, OHLCV, moving averages, RSI, 52-week range) so the agent can reason about both the visual pattern and the underlying data.\n\n<p align=\"center\">\n  <img src=\"docs/images/marketview-googl-intraday-chart-with-ai-analysis.png\" alt=\"MarketView showing GOOGL intraday candlestick chart with AI technical analysis\" width=\"800\" />\n</p>\n<p align=\"center\"><em>MarketView captures the live chart and sends it to the agent for real-time technical analysis.</em></p>\n\n### Automations\n\nThe agent can schedule its own tasks from within a conversation — no separate UI needed. Users can also manage automations from the dedicated Automations page with full CRUD, execution history, and manual trigger. All automation types share the same `AutomationExecutor`, configurable agent mode (PTC or Flash), and automatic disabling after consecutive failures.\n\n**Time-based** — Standard cron expressions for recurring schedules (\"run this analysis every Monday at 9 AM\") and one-shot datetime scheduling for single future executions.\n\n**Price-triggered** — Set a price target or percentage move on any stock or major index, and the agent executes your instructions the moment the condition is met. A `PriceMonitorService` subscribes to a shared upstream WebSocket connection to [ginlix-data](https://github.com/ginlix-ai/ginlix-data) for real-time ticks (stocks on the realtime tier, indices on the delayed tier). Redis-based deduplication prevents duplicate triggers across server instances.\n\n\n| Condition                    | Example                                        |\n| ---------------------------- | ---------------------------------------------- |\n| Price above / below          | Trigger when AAPL crosses $200                 |\n| Percent change above / below | Trigger when SPX moves +2% from previous close |\n\n\nConditions can be combined (AND logic), and each price automation supports **one-shot** (fire once) or **recurring** mode with a configurable cooldown (minimum 4 hours, or once per trading day by default).\n\n> [!NOTE]\n> Price-triggered automations require the real-time WebSocket feed from ginlix-data. During the beta, this feature is available exclusively on the [hosted platform](https://ginlix.ai). Broader WebSocket data source support is planned for future releases.\n\n<p align=\"center\">\n  <img src=\"docs/images/automations-page-earnings-pre-analysis-schedules.png\" alt=\"Automations page with scheduled earnings pre-analysis tasks\" width=\"800\" />\n</p>\n<p align=\"center\"><em>Schedule recurring research — here, pre-earnings analysis for major tech stocks runs automatically before each report.</em></p>\n\n**Agent Architecture**\n\n```mermaid\n%%{init: {'theme': 'neutral'}}%%\n\nflowchart TB\n    subgraph Orchestrator [\"BackgroundSubagentOrchestrator\"]\n        direction TB\n        Agent[\"Main Agent · LangGraph ReAct\"]\n    end\n\n    Agent -- \"Task(init · update · resume)\" --> SubPool\n    SubPool -- \"results\" --> Orchestrator\n\n    subgraph SubPool [\"Subagent Pool — Parallel Async\"]\n        direction LR\n        S1[\"general-purpose\"]\n        S2[\"research\"]\n        S3[\"user-defined\"]\n    end\n\n    subgraph Middleware [\"Middleware — 25 Layers\"]\n        direction LR\n        MW1[\"Tool Safety<br/>Leak Detection<br/>Protected Paths<br/>Error Handling\"]\n        MW2[\"Context & Skills<br/>agent.md Injection<br/>Skill Loading<br/>Multimodal\"]\n        MW3[\"Coordination<br/>HITL · Plan Mode<br/>Steering<br/>Subagent Dispatch\"]\n        MW4[\"Resilience<br/>Compaction<br/>Retry + Fallback<br/>Prompt Caching\"]\n    end\n\n    Agent -- \"wraps model + tool calls\" --> Middleware\n    Middleware --> LLM[\"Multi-Provider LLM<br/>Gemini · OpenAI · Anthropic · DeepSeek · ...\"]\n\n    Agent <--> Tools\n\n    subgraph Tools [\"Tool Layer\"]\n        direction LR\n        T1[\"execute_code<br/>bash\"]\n        T2[\"Filesystem<br/>read · write · edit<br/>glob · grep\"]\n        T3[\"Finance<br/>Market Data · SEC<br/>Options · Screener\"]\n        T4[\"Web<br/>Search · Fetch\"]\n        T5[\"ShowWidget<br/>Inline HTML\"]\n    end\n\n    T1 <--> Workspace\n    T2 <--> Workspace\n\n    subgraph Workspace [\"Workspace — Daytona Sandbox\"]\n        direction LR\n        W1[\"agent.md<br/>Workspace Notes\"]\n        W2[\"work/‹task›/<br/>data · charts\"]\n        W3[\"results/<br/>Reports\"]\n        W4[\"tools/<br/>MCP Wrappers\"]\n    end\n```\n\n\n\n### Agent Swarm\n\nThe core agent runs on [LangGraph](https://github.com/langchain-ai/langgraph) and spawns parallel async subagents via a `Task()` tool. Subagents execute concurrently with isolated context windows, preventing drift in long reasoning chains. Each subagent returns synthesized results back to the main agent, keeping the orchestrator lean. The main agent can choose to wait for a subagent's result or continue other pending work. Interrupting the main agent does not stop running subagents, so you can halt the orchestrator, update your requirements, or dispatch additional subagents while existing ones finish in the background. You can also switch to the **Subagents** view in the UI to see their progress in real time (web frontend only).\n\nBeyond simple dispatch, the main agent can send follow-up instructions to a still-running subagent via `Task(action=\"update\")`, or resume a completed subagent with full checkpoint context via `Task(action=\"resume\")` for iterative refinement. If the server restarts, subagent state is automatically reconstructed from LangGraph checkpoints.\n\n<p align=\"center\">\n  <img src=\"docs/images/chat-ai-compute-timeline-dashboard.png\" alt=\"Parallel subagents building an AI compute timeline dashboard\" width=\"800\" />\n</p>\n<p align=\"center\"><em>Three research subagents run in parallel, each covering a different chip family — results merge into an interactive timeline.</em></p>\n\n### Middleware Stack\n\nThe agent ships with a middleware stack, including:\n\n- **Live steering** — agents can take wrong turns, chase irrelevant data, or misunderstand your intent mid-analysis. Steering lets you course-correct without waiting. Send a follow-up message at any time while the agent is working — updated instructions, clarifications, or entirely new questions — and the middleware injects it into the conversation before the next LLM call. The agent sees your message as if you had said it in real time, adjusts its plan, and continues from there. Steering works at every level: redirect the main agent, send follow-up instructions to individual background subagents via `Task(action=\"update\")`, or let the system gracefully return unconsumed messages to your input box if the workflow finishes before picking them up. No work is lost, no restarts required.\n- **Dynamic skill loading** via a `LoadSkill` tool that lets the agent discover and activate skill toolsets on demand, keeping the default tool surface lean while making specialized capabilities available when needed\n- **Multimodal** intercepts file reads for images and PDFs, downloads content from the sandbox or URLs, and injects it as base64 into the conversation so multimodal models can interpret them natively\n- **Plan mode** with human-in-the-loop interrupts lets you review and approve the agent's strategy before execution\n- **Auto-compaction** compresses conversation history when approaching token limits, preserving key context while freeing space\n- **Context management** automatically offloads tool results exceeding 40,000 tokens to the workspace filesystem, keeping a truncated preview in context. For very long sessions, a two-tier compaction system first truncates old tool arguments, then LLM-summarizes the conversation history while offloading the full transcript to the workspace for recovery. Research sessions can run indefinitely without hitting token limits.\n\nSee [`src/ptc_agent/agent/middleware/`](src/ptc_agent/agent/middleware/) for the full set.\n\nAcknowledgement: some of middleware components are adapted or inspired by the implementation in [LangChain DeepAgents](https://github.com/langchain-ai/deepagents).\n\n### Streaming and Infrastructure\n\nThe server streams all agent activity over SSE: text chunks, tool calls with arguments and results, subagent status updates, file operation artifacts, and human-in-the-loop interrupts. Every agent decision is fully traceable in the UI.\n\nWorkflows run as independent background tasks behind `asyncio.shield()`, fully decoupled from the HTTP/SSE connection. If the browser tab closes or the network drops, the agent keeps working. On reconnect, up to 150,000 buffered events replay from Redis with `last_event_id` deduplication, picking up exactly where the client left off. A background cleanup task auto-purges abandoned workflows after one hour. Soft interrupts pause the main agent while background subagents continue running.\n\nPostgreSQL backs LangGraph checkpointing, conversation history, and user data (watchlists, portfolios, preferences), so agent state and user context persist across sessions. Redis buffers SSE events so that browser refreshes and network drops do not lose in-flight messages: the client reconnects and replays automatically. The server also handles synchronization between local data and sandbox data, keeping MCP, skills, and user context in sync. See the full [API reference](docs/api/README.md) for details.\n\n## Security & Workspace Vault\n\nLangAlpha applies a layered security model across credentials, code execution, and user-supplied secrets.\n\n**Encryption at rest** — All sensitive data (BYOK API keys, OAuth tokens, vault secrets) is encrypted inside PostgreSQL using `pgcrypto` (`pgp_sym_encrypt` / `pgp_sym_decrypt`). Plaintext never exists in the database or in application memory during persistence.\n\n**Credential leak detection** — Every tool output is scanned before it reaches the LLM context. The middleware resolves all known secret values (MCP server keys, sandbox tokens, vault secrets) and redacts any match as `[REDACTED:KEY_NAME]`. The same redaction applies to human-facing surfaces — file reads and downloads are scrubbed before reaching the client.\n\n**Sandboxed code execution** — Each workspace runs in its own [Daytona](https://www.daytona.io/) cloud sandbox with a dedicated filesystem and network boundary. Protected path guards prevent the agent from accessing internal system directories — blocking both tool input (short-circuiting the call before execution) and tool output (redacting leaked paths).\n\n### Workspace Vault\n\nEach workspace has a built-in secret vault for storing API keys and credentials that the agent can use during code execution — useful for accessing third-party data sources (brokerage APIs, external data vendors, etc.) or building LLM-powered workflows inside the workspace. Store a secret once in the UI, and it's available to every agent session in that workspace via a simple Python API:\n\n```python\nfrom vault import get, list_names, load_env\n\napi_key = get(\"MY_API_KEY\")       # retrieve a single secret\nnames = list_names()               # list available secret names\nload_env()                         # bulk-load all secrets as env vars\n```\n\nVault secrets inherit every protection layer above — encrypted at rest, redacted from all agent and human-facing output, and blocked from direct file access. Only the workspace owner can create, update, reveal, or delete secrets.\n\n## Frontend\n\nThe web UI is more than a chat interface — it's a full research workbench:\n\n- **Inline financial charts** — tool results render as interactive sparklines, bar charts, and overview cards directly in the chat thread\n- **Inline HTML widgets** — the agent can render interactive HTML/SVG visualizations (Chart.js charts, metric cards, data tables) directly in the chat via the `ShowWidget` tool, with theme-aware styling and sandboxed iframes\n- **Multi-format file viewer** — PDF (paginated, zoomable), Excel, CSV, HTML preview, and source code (Monaco editor with diff mode) — all viewable inline without download\n- **TradingView charting** — full TradingView Advanced Chart with drawing tools, indicators, and professional candlestick styling\n- **Live market data** — real-time WebSocket price feed with 1-second tick resolution, extended hours visualization, and multiple moving average overlays\n- **Shareable conversations** — one-click sharing with granular permissions (toggle file browsing and download access), replay via public URL\n- **Real-time subagent monitoring** — watch each background task's streaming output and tool calls live, with the ability to send mid-execution instructions\n- **Automations** — CRUD management with cron builder, execution history, manual trigger, and price-triggered automations that fire when a stock or index hits a real-time price condition\n\n<p align=\"center\">\n  <img src=\"docs/images/dashboard-market-overview-with-news-and-portfolio.png\" alt=\"Dashboard with market indices, news, portfolio, and earnings calendar\" width=\"800\" />\n</p>\n<p align=\"center\"><em>The dashboard surfaces market indices, personalized news, portfolio tracking, and upcoming earnings at a glance.</em></p>\n\n## Channel Integrations\n\nUse LangAlpha from the tools you already work in. The integration gateway relays messages between messaging platforms and the core agent, with each channel receiving responses in its native format. Channel integrations are available exclusively on our hosted service with one-click setup and quick account binding — visit [integrations](https://ginlix.ai/account/integrations) to get started.\n\n\n| Feature                        | Slack | Discord | Feishu | Telegram | WhatsApp |\n| ------------------------------ | ----- | ------- | ------ | -------- | -------- |\n| Rich text / markdown           | ✅     | ✅       | ✅      | ✅        | 🔜       |\n| File upload (user → agent)     | ✅     | ✅       | ✅      | ❌        | ➖        |\n| File download (agent → user)   | ✅     | ✅       | ✅      | ❌        | ➖        |\n| Image rendering                | ✅     | ✅       | ✅      | ❌        | ➖        |\n| Human-in-the-loop interrupts   | ✅     | ✅       | ✅      | ⚠️       | ➖        |\n| Subagent tracking              | ✅     | ✅       | ✅      | ✅        | 🔜       |\n| Workspace / model selection    | ✅     | ✅       | ✅      | ✅        | 🔜       |\n| Automation delivery (outbound) | ✅     | ✅       | ❌      | ➖        | ➖        |\n| Simplified account linking     | ✅     | ✅       | ❌      | ❌        | ➖        |\n| Slash commands                 | ✅     | ✅       | ✅      | ✅        | ➖        |\n\n\nSlack and Discord offer native channels and thread-level groups, which map naturally to LangAlpha workspaces and threads — context is managed natively. Telegram and WhatsApp lack these primitives, so they run a simplified orchestration mode. Feishu has full messaging and card-based UI with OAuth coming soon. Telegram has partial support with full coverage coming soon. WhatsApp is planned.\n\n## Getting Started\n\n> [!TIP]\n> **Don't want to self-host?** Try the [hosted version](https://ginlix.ai) — it includes full data infrastructure (FMP, real-time market data, cloud sandboxes) out of the box. Bring your own LLM key (BYOK) and start immediately with no setup.\n\nYou can start LangAlpha with **nothing but Docker** — no API keys for data, no cloud sandbox. Just Docker for infrastructure and your own LLM subscription for the AI model.\n\n```bash\ngit clone https://github.com/ginlix-ai/langalpha.git\ncd langalpha\nmake config   # interactive wizard — creates .env, configures LLM, data sources, sandbox, and search\nmake up       # starts PostgreSQL, Redis, backend, and frontend\n```\n\n- **Frontend:** [http://localhost:5173](http://localhost:5173)\n- **Backend API:** [http://localhost:8000](http://localhost:8000) (interactive docs at `/docs`)\n- **Verify:** `curl http://localhost:8000/health`\n\nFor the full experience, the wizard will prompt you for optional keys — or add them to `.env` later:\n\n\n| Key                                  | What It Unlocks                                                                                                         |\n| ------------------------------------ | ----------------------------------------------------------------------------------------------------------------------- |\n| `DAYTONA_API_KEY`                    | Persistent cloud sandboxes with cross-session workspace support ([daytona.io](https://www.daytona.io/))                 |\n| `FMP_API_KEY`                        | High-quality fundamentals, macro, SEC filings, options ([free tier available](https://site.financialmodelingprep.com/)) |\n| `SERPER_API_KEY` or `TAVILY_API_KEY` | Web search                                                                                                              |\n| `LANGSMITH_API_KEY`                  | Tracing and observability                                                                                               |\n\n\n> [!NOTE]\n> Without external service keys you get a functional but reduced experience: Yahoo Finance provides free price history, fundamentals, earnings, and analyst data, but lacks real-time quotes, intraday tick data, macro economics, and options analytics. The Docker sandbox replaces Daytona cloud sandboxes — full PTC code execution works, but with a downgraded security and isolation. Add keys incrementally to unlock more capabilities.\n\nRun `make help` to see all available commands. For manual setup without Docker, see [CONTRIBUTING.md](CONTRIBUTING.md#manual-setup).\n\n## Documentation\n\n- **[API Reference](docs/api/README.md)** with endpoints for chat streaming, workspaces, workflow state, and more\n- **Interactive API docs** at `http://localhost:8000/docs` when the server is running\n\n## Contact\n\nFor partnerships, collaborations, or general inquiries, reach out to [contact@ginlix.ai](mailto:contact@ginlix.ai).\n\n## Disclaimer\n\nLangAlpha is a research tool, not a financial advisor. Nothing produced by this software constitutes investment advice, a recommendation, or a solicitation to buy or sell any security. All output is for informational and educational purposes only. Use at your own discretion — always do your own due diligence before making investment decisions.\n\n## License\n\nApache License 2.0\n","summary":"LangAlpha is an AI‑powered investing assistant that treats market research as an evolving, Bayesian process rather than a one‑shot query. It builds a persistent workspace for each research goal, automatically discovering and executing tools via programmatic Python calls to pull data from a tiered financial ecosystem and MCP servers, then renders interactive visualizations in a web front‑end. The system’s skill‑driven workflow lets users step through iterative analysis, saving notes, queries, and derived insights for future sessions. Asset managers, analysts, and active traders who need a scalable, research‑oriented tool to continuously update investment theses will find LangAlpha most useful.","description":"Claude Code for Finance","stars":1031,"language":"Python"},{"owner":"refactoringhq","repo":"tolaria","url":"https://github.com/refactoringhq/tolaria","readme":"![Latest stable](https://img.shields.io/github/v/release/refactoringhq/tolaria?display_name=tag) [![CI](https://github.com/refactoringhq/tolaria/actions/workflows/ci.yml/badge.svg?branch=main)](https://github.com/refactoringhq/tolaria/actions/workflows/ci.yml) [![Build](https://github.com/refactoringhq/tolaria/actions/workflows/release.yml/badge.svg?branch=main)](https://github.com/refactoringhq/tolaria/actions/workflows/release.yml) [![Codecov](https://codecov.io/gh/refactoringhq/tolaria/graph/badge.svg?branch=main)](https://codecov.io/gh/refactoringhq/tolaria) [![CodeScene Hotspot Code Health](https://codescene.io/projects/76865/status-badges/hotspot-code-health)](https://codescene.io/projects/76865)\n\n# 💧 Tolaria\n\nTolaria is a desktop app for macOS, Windows, and Linux for managing **markdown knowledge bases**. People use it for a variety of use cases:\n\n* Operate second brains and personal knowledge\n* Organize company docs as context for AI\n* Store OpenClaw/assistants memory and procedures\n\nPersonally, I use it to **run my life** (hey 👋 [Luca here](http://x.com/lucaronin)). I have a massive workspace of 10,000+ notes, which are the result of my [Refactoring](https://refactoring.fm/) work + a ton of personal journaling and *second braining*.\n\n<img width=\"1000\" height=\"656\" alt=\"1776506856823-CleanShot_2026-04-18_at_12 06 57_2x\" src=\"https://github.com/user-attachments/assets/8aeafb0a-b236-43c2-a083-ec111f903c38\" />\n\n## Walkthroughs\n\nYou can find some Loom walkthroughs below — they are short and to the point:\n- [How I Organize My Own Tolaria Workspace](https://www.loom.com/share/bb3aaffa238b4be0bd62e4464bca2528)\n- [My Inbox Workflow](https://www.loom.com/share/dffda263317b4fa8b47b59cdf9330571)\n- [How I Save Web Resources to Tolaria](https://www.loom.com/share/8a3c1776f801402ebbf4d7b0f31e9882)\n\n## Principles\n\n- 📑 **Files-first** — Your notes are plain markdown files. They're portable, work with any editor, and require no export step. Your data belongs to you, not to any app.\n- 🔌 **Git-first** — Every vault is a git repository. You get full version history, the ability to use any git remote, and zero dependency on Tolaria servers.\n- 🛜 **Offline-first, zero lock-in** — No accounts, no subscriptions, no cloud dependencies. Your vault works completely offline and always will. If you stop using Tolaria, you lose nothing.\n- 🔬 **Open source** — Tolaria is free and open source. I built this for [myself](https://x.com/lucaronin) and for sharing it with others.\n- 📋 **Standards-based** — Notes are markdown files with YAML frontmatter. No proprietary formats, no locked-in data. Everything works with standard tools if you decide to move away from Tolaria.\n- 🔍 **Types as lenses, not schemas** — Types in Tolaria are navigation aids, not enforcement mechanisms. There's no required fields, no validation, just helpful categories for finding notes.\n- 🪄**AI-first but not AI-only** — A vault of files works very well with AI agents, but you are free to use whatever you want. We support Claude Code, Codex CLI, and Gemini CLI setup paths, but you can edit the vault with any AI you want. We provide an AGENTS file for your agents to figure out.\n- ⌨️ **Keyboard-first** — Tolaria is designed for power-users who want to use keyboard as much as possible. A lot of how we designed the Editor and the Command Palette is based on this.\n- 💪 **Built from real use** — Tolaria was created for manage my personal vault of 10,000+ notes, and I use it every day. Every feature exists because it solved a real problem.\n\n## Installation\n\n### Homebrew\n\nInstall via Homebrew on macOS:\n\n```batch\nbrew install --cask tolaria\n```\n\n### Download from releases\n\nDownload the [latest release here](https://refactoringhq.github.io/tolaria/download/) for macOS, Windows, or Linux.\n\n## Getting started\n\nWhen you open Tolaria for the first time you get the chance of cloning the [getting started vault](https://github.com/refactoringhq/tolaria-getting-started) — which gives you a walkthrough of the whole app.\n\n## Open source and local setup\n\nTolaria is open source and built with Tauri, React, and TypeScript. If you want to run or contribute to the app locally, here is [how to get started](https://github.com/refactoringhq/tolaria/blob/main/docs/GETTING-STARTED.md). You can also find the gist below 👇\n\n### Prerequisites\n\n- Node.js 20+\n- pnpm 8+\n- Rust stable\n- macOS or Linux for development\n\n#### Linux system dependencies\n\nTauri 2 on Linux requires WebKit2GTK 4.1 and GTK 3:\n\n- Arch / Manjaro:\n  ```bash\n  sudo pacman -S --needed webkit2gtk-4.1 base-devel curl wget file openssl \\\n    appmenu-gtk-module libappindicator-gtk3 librsvg\n  ```\n- Debian / Ubuntu (22.04+):\n  ```bash\n  sudo apt install libwebkit2gtk-4.1-dev build-essential curl wget file \\\n    libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev \\\n    libsoup-3.0-dev patchelf\n  ```\n- Fedora 38+:\n  ```bash\n  sudo dnf install webkit2gtk4.1-devel openssl-devel curl wget file \\\n    libappindicator-gtk3-devel librsvg2-devel\n  ```\n\nThe bundled MCP server still spawns the system `node` binary at runtime on Linux, so install Node from your distro package manager if you want the external AI tooling flow.\n\n### Quick start\n\n```bash\npnpm install\npnpm dev\n```\n\nOpen `http://localhost:5173` for the browser-based mock mode, or run the native desktop app with:\n\n```bash\npnpm tauri dev\n```\n\n## Tech Docs\n\n- 📐 [ARCHITECTURE.md](docs/ARCHITECTURE.md) — System design, tech stack, data flow\n- 🧩 [ABSTRACTIONS.md](docs/ABSTRACTIONS.md) — Core abstractions and models\n- 🚀 [GETTING-STARTED.md](docs/GETTING-STARTED.md) — How to navigate the codebase\n- 📚 [ADRs](docs/adr) — Architecture Decision Records\n\n## Security\n\nIf you believe you have found a security issue, please report it privately as described in [SECURITY.md](./SECURITY.md).\n\n## License\n\nTolaria is licensed under AGPL-3.0-or-later. The Tolaria name and logo remain covered by the project’s trademark policy.\n","summary":"Tolaria is a cross‑platform desktop application that lets users build and browse markdown‑based knowledge bases as plain‑file vaults, perfect for personal second brains or company documentation. It treats each vault as a Git repo, providing full version history, remote syncing, and zero lock‑in, while remaining offline‑first with no subscriptions or cloud dependencies. The interface emphasizes keyboard workflow, file‑first navigation, and AI‑friendly data structures, and includes convenient tools for capturing web resources, inbox workflows, and agent‑ready metadata. Developers, writers, and researchers who value portable, standards‑compliant notes and powerful version control will benefit most from using Tolaria.","description":"Desktop app to manage markdown knowledge bases","stars":9486,"language":"TypeScript"},{"owner":"BasedHardware","repo":"omi","url":"https://github.com/BasedHardware/omi","readme":"<div align=\"center\">\n\n# **omi**\n\n### A 2nd brain you trust more than your 1st\n\nOmi captures your screen and conversations, transcribes in real-time, generates summaries and action items, and gives you an AI chat that remembers everything you've seen and heard. Works on desktop, phone and wearables. Fully open source.\n\nTrusted by 300,000+ professionals.\n\n\n[![Discord](https://img.shields.io/discord/1192313062041067520?label=Discord&logo=discord&logoColor=white&style=for-the-badge)](http://discord.omi.me)&ensp;\n[![GitHub Repo stars](https://img.shields.io/github/stars/BasedHardware/Omi?style=for-the-badge)](https://github.com/BasedHardware/Omi)&ensp;\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg?style=for-the-badge)](https://opensource.org/licenses/MIT)\n\n[Website](https://omi.me/) · [Docs](https://docs.omi.me/) · [Discord](http://discord.omi.me) · [Twitter](https://x.com/kodjima33) · [DeepWiki](https://deepwiki.com/BasedHardware/omi)\n\n</div>\n\n## Quick Start\n\n\n\n```bash\ngit clone https://github.com/BasedHardware/omi.git && cd omi/desktop && ./run.sh --yolo\n```\n\nBuilds the macOS app, connects to the cloud backend, and launches. No env files, no credentials, no local backend.\n\n> **Requirements:** macOS 14+, [Xcode](https://developer.apple.com/xcode/) (includes Swift & code signing), [Node.js](https://nodejs.org/)\n\n<details>\n  <summary>Full Installation</summary>\n  \nFor local development with the full backend stack:\n\n1. Install prerequisites\n\n```bash\nxcode-select --install\ncurl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh\n```\n\n2. Clone and configure\n\n```bash\ngit clone https://github.com/BasedHardware/omi.git\ncd omi/desktop\ncp Backend-Rust/.env.example Backend-Rust/.env\n```\n\n3. Build and run\n\n```bash\n./run.sh\n```\n\nSee [desktop/README.md](desktop/README.md) for environment variables and credential setup.\n\n\n### Mobile App\n\n```bash\ncd app && bash setup.sh ios    # or: bash setup.sh android\n```\n\n</details>\n\n<p align=\"center\">\n  <a href=\"https://macos.omi.me\"><img src=\"docs/assets/readme/download-macos-badge.png\" alt=\"Download for macOS\" height=\"50\"></a>\n  <a href=\"https://apps.apple.com/us/app/friend-ai-wearable/id6502156163\"><img src=\"docs/assets/readme/download-appstore-badge.png\" alt=\"Download on the App Store\" height=\"50\"></a>\n  <a href=\"https://play.google.com/store/apps/details?id=com.friend.ios\"><img src=\"docs/assets/readme/download-gplay-badge.png\" alt=\"Get it on Google Play\" height=\"50\"></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://app.omi.me\">Try in Browser</a>\n</p>\n\n<details>\n  <summary>How it works</summary>\n\n\n```\n┌─────────────────────────────────────────────────────────┐\n│                      Your Devices                       │\n│                                                         │\n│  ┌──────────┐  ┌──────────────┐  ┌───────────────────┐  │\n│  │ Omi      │  │ macOS App    │  │ Mobile App        │  │\n│  │ Wearable │  │ (Swift/Rust) │  │ (Flutter)         │  │\n│  └────┬─────┘  └──────┬───────┘  └────────┬──────────┘  │\n│       │    BLE         │   HTTPS/WS        │             │\n└───────┼────────────────┼───────────────────┼─────────────┘\n        │                │                   │\n        ▼                ▼                   ▼\n┌─────────────────────────────────────────────────────────┐\n│                    Omi Backend (Python)                  │\n│                                                         │\n│  ┌─────────┐  ┌──────────┐  ┌─────────┐  ┌──────────┐  │\n│  │ Listen  │  │ Pusher   │  │ VAD     │  │ Diarizer │  │\n│  │ (REST)  │  │ (WS)     │  │ (GPU)   │  │ (GPU)    │  │\n│  └─────────┘  └──────────┘  └─────────┘  └──────────┘  │\n│                                                         │\n│  ┌─────────┐  ┌──────────┐  ┌─────────┐  ┌──────────┐  │\n│  │ Deepgram│  │ Firestore│  │ Redis   │  │ LLMs     │  │\n│  │ (STT)   │  │ (DB)     │  │ (Cache) │  │ (AI)     │  │\n│  └─────────┘  └──────────┘  └─────────┘  └──────────┘  │\n└─────────────────────────────────────────────────────────┘\n```\n\n| Component | Path | Stack |\n|-----------|------|-------|\n| **macOS app** | [`desktop/`](desktop/) | Swift, SwiftUI, Rust backend |\n| Mobile app | [`app/`](app/) | Flutter (iOS & Android) |\n| Backend API | [`backend/`](backend/) | Python, FastAPI, Firebase |\n| Firmware | [`omi/`](omi/) | nRF, Zephyr, C |\n| Omi Glass | [`omiGlass/`](omiGlass/) | ESP32-S3, C |\n| SDKs | [`sdks/`](sdks/) | React Native, Swift, Python |\n| AI Personas | [`web/personas-open-source/`](web/personas-open-source/) | Next.js |\n\n</details>\n\n## Documentation\n\n### Getting Started\n- [Introduction](https://docs.omi.me/)\n- [Quick Start Guide](https://docs.omi.me/quickstart)\n- [macOS App Development](desktop/README.md)\n- [Mobile App Setup](https://docs.omi.me/doc/developer/AppSetup)\n- [Backend Setup](https://docs.omi.me/doc/developer/backend/Backend_Setup)\n- [Contributing](https://docs.omi.me/doc/developer/Contribution)\n\n### Building Apps\n- [App Development Guide](https://docs.omi.me/doc/developer/apps/Introduction)\n- [Example Apps](https://docs.omi.me/doc/developer/apps/examples/Github) — GitHub, Slack, OmiMentor\n- [Audio Streaming Apps](https://docs.omi.me/doc/developer/apps/AudioStreaming)\n- [Custom Chat Tools](https://docs.omi.me/doc/developer/apps/ChatTools)\n- [Submit to App Store](https://docs.omi.me/doc/developer/apps/Submitting)\n\n### API & SDKs\n- [API Reference](https://docs.omi.me/api-reference/introduction) — REST endpoints for memories, conversations, action items\n- [Python SDK](sdks/python/)\n- [Swift SDK](sdks/swift/)\n- [React Native SDK](sdks/react-native/)\n- [MCP Server](mcp/) — Model Context Protocol integration\n\n### Architecture\n- [Backend Deep Dive](https://docs.omi.me/doc/developer/backend/backend_deepdive)\n- [Transcription Pipeline](https://docs.omi.me/doc/developer/backend/transcription)\n- [Chat System](https://docs.omi.me/doc/developer/backend/chat_system)\n- [Audio Streaming Pipeline](https://docs.omi.me/doc/developer/backend/listen_pusher_pipeline)\n- [BLE Protocol](https://docs.omi.me/doc/developer/Protocol)\n\n## Omi Hardware\n![Omi](https://github.com/user-attachments/assets/7a658366-9e02-4057-bde5-a510e1f0217a)\n\nOpen-source AI wearables that pair with the mobile app for 24h+ continuous capture.\n\n<p align=\"center\">\n  <img src=\"https://github.com/user-attachments/assets/834d3fdb-31b5-4f22-ae35-da3d2b9a8f59\" alt=\"Omi Wearable\" width=\"49%\" />\n  <img src=\"https://github.com/user-attachments/assets/fdad4226-e5ce-4c55-b547-9101edfa3203\" alt=\"Omi Glass\" width=\"49%\" />\n</p>\n\n- [Buy Omi](https://www.omi.me/pages/product)\n- [Buy Omi Glass Dev Kit](https://www.omi.me/glass) — ESP32-S3, camera + audio\n- [Open Source Hardware Designs](https://docs.omi.me/doc/hardware/consumer/electronics)\n- [Buying Guide](https://docs.omi.me/doc/assembly/Buying_Guide)\n- [Build the Device](https://docs.omi.me/doc/assembly/Build_the_device)\n- [Flash Firmware](https://docs.omi.me/doc/get_started/Flash_device)\n- [Integrate Your Wearable](https://docs.omi.me/doc/integrations)\n- [Hardware Specs](https://docs.omi.me/doc/hardware/DevKit2)\n\n## License\n\nMIT — see [LICENSE](LICENSE)\n","summary":"Omi is an open‑source “second brain” that records your screen and audio, transcribes conversations in real time, and automatically produces summaries and action items while feeding an AI chat that retains all captured context. It ships as a native macOS app, Flutter mobile app, and wearable companion, syncing via a lightweight Python backend that interfaces with Deepgram, Firestore, Redis, and LLM services. Users gain instantaneous insight and memory of meetings, lectures, or collaborative sessions without manually taking notes. Professionals, writers, developers, and anyone who needs to trap and recall large volumes of information would benefit from Omi’s cross‑device, end‑to‑end capture and retrieval workflow.","description":"AI that sees your screen, listens to your conversations and tells you what to do","stars":12388,"language":"Dart"},{"owner":"zeroecco","repo":"holos","url":"https://github.com/zeroecco/holos","readme":"<picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"./docs/holos-lockup-dark.svg\">\n  <img alt=\"holos\" src=\"./docs/holos-lockup-light.svg\" width=\"340\">\n</picture>\n\nDocker compose for KVM. Define multi-VM stacks in one YAML file. No libvirt, no\nXML, no distributed control plane.\n\nWebsite and docs: <https://zeroecco.github.io/holos/>\n\nThe primitive is a VM, not a container. Every workload instance gets its own\nkernel boundary, qcow2 overlay, cloud-init seed, and generated SSH access.\n\n## Quick Start\n\n> Requires Linux + `/dev/kvm`. macOS builds run offline commands like\n> `validate`, `import`, `images`, and `pull`, but `up` and `run` need a KVM\n> host.\n\nOne disposable VM, no compose file:\n\n```bash\nholos run alpine\nholos exec <printed-project-name>\nholos down <printed-project-name>\n```\n\nA single-service stack you can `curl`. Save as `holos.yaml`:\n\n```yaml\nname: hello\n\nservices:\n  web:\n    image: ubuntu:noble\n    ports:\n      - \"8080:80\"\n    cloud_init:\n      packages:\n        - nginx\n      write_files:\n        - path: /var/www/html/index.html\n          content: \"hello from holos\\n\"\n      runcmd:\n        - systemctl restart nginx\n```\n\n```bash\nholos up\ncurl localhost:8080\nholos down hello\n```\n\nThat is a real VM booting a cloud image, installing a package, writing config,\nand forwarding a host port.\n\n## Install\n\nPre-built binaries are attached to every\n[GitHub release](https://github.com/zeroecco/holos/releases):\n\n```bash\nTAG=v0.2.3\nASSET=holos_${TAG#v}_Linux_x86_64.tar.gz\nBASE=https://github.com/zeroecco/holos/releases/download/$TAG\ncurl -LO $BASE/$ASSET\ncurl -LO $BASE/checksums.txt\ngrep \" $ASSET$\" checksums.txt | sha256sum -c -\ngh attestation verify $ASSET --repo zeroecco/holos\nsudo tar -xz -C /usr/local/bin -f $ASSET holos\nholos version\nholos doctor\n```\n\nRelease pages include SHA-256 checksums and GitHub artifact attestations for\nsigned provenance. Verify both before installing binaries on production hosts.\n\nOr build from source:\n\n```bash\ngo build -o bin/holos ./cmd/holos\ngo test ./...\nbin/holos doctor\n```\n\n## CLI\n\n```text\nholos up [-f holos.yaml] [--lock-timeout 5m|--no-wait]\n                                     start all services\nholos run [flags] <image> [-- cmd...] launch a one-off VM\nholos down <project>                 stop and remove a project\nholos ps [-f holos.yaml]             list running projects\nholos start [-f holos.yaml] [svc]    start a stopped service or all services\nholos stop [-f holos.yaml] [svc]     stop a service or all services\nholos console <project> [<inst>]     attach serial console\nholos exec <project> [<inst>] [-- cmd...]\n                                     SSH into an instance\nholos logs <project> [<svc|inst>]    show console logs\nholos validate [-f holos.yaml]       validate compose file\nholos pull <image>                   pull a cloud image\nholos verify <image>|--all           verify cached image checksums\nholos images                         list available images\nholos devices [--gpu]                list PCI devices and IOMMU groups\nholos doctor [--json]                check host dependencies\nholos install [-f holos.yaml] [--system] [--enable]\n                                     install a systemd unit\nholos uninstall [-f holos.yaml] [--system]\n                                     remove the systemd unit\nholos import [vm...] [--all] [--xml file] [--connect uri] [-o file]\n                                     convert virsh VMs into holos.yaml\n```\n\n## Docs\n\n- [Website](https://zeroecco.github.io/holos/): landing page and rendered docs.\n- [CLI guide](./docs/cli.md): ad hoc VMs, `exec`, systemd install, virsh import,\n  and `doctor`.\n- [Compose file](./docs/compose.md): services, volumes, healthchecks,\n  networking, PCI passthrough, Dockerfile provisioning, and defaults.\n- [JSON Schema](./docs/holos.schema.json): editor completion and validation for\n  `holos.yaml`.\n- [Examples](./examples/README.md): runnable and template stacks with\n  README-style explanations.\n- [Development](./docs/development.md): build, test, host requirements, and\n  release process.\n- [Security policy](./SECURITY.md): supported versions and private reporting.\n- [Threat model / hardening](./docs/threat-model.md):\n  image verification, state permissions, locks, and operational guidance.\n- [Contributing](./CONTRIBUTING.md): build, test, style, and PR conventions.\n\n## Examples\n\nStart with the small nginx example:\n\n```bash\nholos up -f examples/alpine-nginx/holos.yaml\ncurl localhost:8080\nholos down alpine-nginx\n```\n\nThe examples directory also includes Dockerfile provisioning, GPU passthrough,\nand a multi-service stack that shows `depends_on`, generated config, and\nreplicas.\n\n## Host Requirements\n\n- Linux with `/dev/kvm`\n- `qemu-system-x86_64`\n- `qemu-img`\n- One of `cloud-localds`, `genisoimage`, `mkisofs`, or `xorriso`\n- OVMF / edk2-ovmf firmware for UEFI or PCI passthrough\n- `ssh` for `holos exec` and healthchecks\n\nRun `holos doctor` to check the host.\n\n## Troubleshooting\n\n### SSH resets on first boot\n\n`kex_exchange_identification: read: Connection reset by peer` usually means\ncloud-init is still regenerating host keys and restarting sshd. `holos exec`\nwaits up to 60s by default, but very slow first boots may need another retry or\n`holos exec -w 5m <project>`.\n\n### Console shows `Login incorrect`\n\nThe serial console may attempt autologin before cloud-init creates the user.\nWait for `cloud-init ... finished` in the console log, then use `holos exec`.\nCloud images generally do not ship with a console password, and holos does not\nadd one.\n\n### `up` fails on macOS\n\nKVM is a Linux kernel feature. macOS binaries are useful for authoring and\noffline commands, but `holos up` and `holos run` must execute on a Linux KVM\nhost.\n\n## Non-Goals\n\nholos is not Kubernetes. It does not try to solve multi-host clustering, live\nmigration, service meshes, overlay networks, schedulers, CRDs, or control plane\nquorum.\n\nThe goal is to make KVM workable for single-host stacks without importing the\noperational shape of Kubernetes.\n\n## License\n\nLicensed under the [Apache License, Version 2.0](./LICENSE). See\n[`NOTICE`](./NOTICE) for attribution.\n","summary":"Holos turns KVM virtualization into a Docker‑Compose‑style workflow, letting you define multi‑VM stacks in a single YAML file without libvirt XML or a distributed control plane. It provisions each service as a full VM with its own kernel, qcow2 overlay, cloud‑init seed and SSH access, supporting port forwarding, PCI passthrough, healthchecks, and even Dockerfile‑style provisioning. The CLI offers easy one‑off VMs, stack deployment, management commands, and image verification, while prebuilt binaries include GitHub attestation for secure production use. System administrators, developers, and DevOps engineers who need lightweight, reproducible VM testing or local staging environments can benefit from Holos’s simple yet powerful VMs-as-containers approach.","description":"docker compose for kvm/qemu","stars":134,"language":"Go"},{"owner":"superhq-ai","repo":"superhq","url":"https://github.com/superhq-ai/superhq","readme":"# SuperHQ\n\nA sandboxed AI agent orchestration platform built with Rust and [GPUI](https://gpui.rs). Run multiple AI coding agents (Claude Code, Codex, etc.) in isolated sandbox environments with full terminal access.\n\n> **Warning:** This is a very early alpha. Expect rough edges, missing features, and breaking changes. Not ready for production use.\n\n![SuperHQ](website/public/screenshot.webp)\n\n## Install\n\n```bash\nbrew tap superhq-ai/tap && brew install --cask superhq\n```\n\nOr download the latest `.dmg` from the [Releases](https://github.com/superhq-ai/superhq/releases) page.\n\n> **macOS Gatekeeper:** Since the app is not notarized, macOS will block it on first launch.\n> Open **System Settings > Privacy & Security**, scroll down, and click **\"Open Anyway\"** next to the SuperHQ message.\n\n### Requirements\n\n- macOS 14+ (Apple Silicon)\n- ~500 MB disk space for the Shuru runtime (downloaded on first launch)\n\n## Supported Agents\n\n| Agent | Auth | Notes |\n|-------|------|-------|\n| **Claude Code** | Anthropic API key | Installed automatically via npm |\n| **OpenAI Codex** | OpenAI API key, OpenRouter API key, or ChatGPT Plus/Pro subscription (OAuth) | OpenAI/OAuth use the auth gateway; if `OPENROUTER_API_KEY` is set, Codex routes through OpenRouter |\n| **Pi** | Anthropic API key and/or OpenAI API key (or ChatGPT Plus/Pro via OAuth) | At least one provider required. OpenAI models routed through auth gateway |\n\n## Security Model\n\nAgents run inside sandboxed VMs and **never see your real API keys**. SuperHQ uses an **auth gateway** — a reverse proxy on the host that injects credentials into outgoing API requests without exposing them to the sandbox.\n\nFor Codex with OAuth, the gateway handles token refresh and forwards authenticated requests to `chatgpt.com/backend-api/codex` — so your ChatGPT Plus/Pro subscription works out of the box.\n\n## Features\n\n- **Sandboxed workspaces** — each workspace runs in an isolated VM with its own filesystem, networking, and resource limits\n- **Multiple agents** — run Claude Code, OpenAI Codex, and custom agents side-by-side\n- **Secure auth gateway** — agents never see real API keys or OAuth tokens\n- **Port management** — forward sandbox ports to host, expose host ports to sandboxes\n- **Review panel** — see file changes made by agents with unified diff view\n- **Keyboard-first navigation** — fast workspace/tab switching with shortcuts\n\n## Keyboard Shortcuts\n\n### Workspaces\n\n| Action | Shortcut |\n|--------|----------|\n| New workspace | `Cmd+N` |\n| Switch workspace 1-9 | `Cmd+1` - `Cmd+9` |\n| Next workspace | `Ctrl+Cmd+]` |\n| Previous workspace | `Ctrl+Cmd+[` |\n\n### Tabs\n\n| Action | Shortcut |\n|--------|----------|\n| New agent tab | `Cmd+T` |\n| Close tab | `Cmd+W` |\n| Switch tab 1-9 | `Ctrl+1` - `Ctrl+9` |\n| Next tab | `Cmd+Shift+]` |\n| Previous tab | `Cmd+Shift+[` |\n\n### App\n\n| Action | Shortcut |\n|--------|----------|\n| Settings | `Cmd+,` |\n| Toggle review panel | `Cmd+B` |\n| Ports | `Cmd+Shift+P` |\n\nHold `Cmd` to see workspace shortcut badges. Hold `Ctrl` to see tab badges.\n\n## Building from source\n\nRequires the [shuru SDK](https://github.com/superhq-ai/shuru) cloned as a sibling directory:\n\n```sh\ngit clone https://github.com/superhq-ai/shuru.git ../shuru\ncargo build --release\n```\n\n### Package as macOS app\n\n```sh\n./scripts/package.sh\n# Output: target/SuperHQ-<version>.dmg\n```\n\n## Architecture\n\n- **GPUI** — GPU-accelerated UI framework (from Zed editor)\n- **shuru-sdk** — sandboxed VM orchestration (boot, exec, filesystem, networking)\n- **SQLite** — workspace config, secrets (AES-256-GCM encrypted), port mappings\n- **Auth gateway** — reverse proxy that injects API credentials without exposing them to sandboxes\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=superhq-ai%2Fsuperhq&type=date&legend=top-left\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=superhq-ai/superhq&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=superhq-ai/superhq&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=superhq-ai/superhq&type=date&legend=top-left\" />\n </picture>\n</a>\n\n## License\n\n[GNU Affero General Public License v3.0](LICENSE)\n","summary":"SuperHQ is a sandboxed AI agent orchestration platform built in Rust with GPUI, enabling users to launch multiple coding assistants such as Claude Code and OpenAI Codex inside isolated VM workspaces that provide full terminal access. Its core features include securely isolated workspaces, a reverse‑proxy auth gateway that injects API credentials without exposing them to the sandbox, flexible port forwarding, and a review panel that shows unified diffs of agent‑generated changes. This tool is ideal for developers or technical writers who want to experiment with or compare several AI coding agents side‑by‑side while keeping secrets, resources, and outputs tightly contained.","description":"Sandboxed AI agent orchestration platform","stars":236,"language":"Rust"},{"owner":"Infisical","repo":"agent-vault","url":"https://github.com/Infisical/agent-vault","readme":"<p align=\"center\">\n  <img src=\"assets/banner.png\" alt=\"Agent Vault\" />\n</p>\n\n<p align=\"center\"><strong>HTTP credential proxy and vault</strong></p>\n\n<p align=\"center\">\nAn open-source credential broker by <a href=\"https://infisical.com\">Infisical</a> that sits between your agents and the APIs they call.<br>\nAgents should not possess credentials. Agent Vault eliminates credential exfiltration risk with brokered access.\n</p>\n\n<p align=\"center\">\n<strong>New here? The <a href=\"https://infisical.com/blog/agent-vault-the-open-source-credential-proxy-and-vault-for-agents\">launch blog post</a> has the full story behind Agent Vault.</strong>\n</p>\n\n<p align=\"center\">\n<a href=\"https://docs.agent-vault.dev\">Documentation</a> | <a href=\"https://docs.agent-vault.dev/installation\">Installation</a> | <a href=\"https://docs.agent-vault.dev/reference/cli\">CLI Reference</a> | <a href=\"https://infisical.com/slack\">Slack</a>\n</p>\n\n<p align=\"center\">\n  <img src=\"assets/agent-vault.gif\" alt=\"Agent Vault demo\" />\n</p>\n\n## Why Agent Vault\n\nTraditional secrets management relies on returning credentials directly to the caller. This breaks down with AI agents, which are non-deterministic systems vulnerable to prompt injection that can be fooled into leaking its secrets.\n\nAgent Vault takes a different approach: **Agent Vault never reveals vault-stored credentials to agents**. Instead, agents route HTTP requests through a local proxy that injects the right credentials at the network layer.\n\n- **Brokered access, not retrieval** - Your agent gets a scoped session and a local `HTTPS_PROXY`. It calls target APIs normally, and Agent Vault injects the right credential at the network layer (headers, or — for APIs like Twilio that need the value in the URL — declared placeholder rewrites in the path or query string). Credentials are never returned to the agent. Hosts without a configured service forward as plain proxy traffic by default; flip a vault into strict deny mode (`unmatched_host_policy=deny`) to reject them with 403 instead.\n- **Works with any agent** - Custom Python/TypeScript agents, sandboxed processes, and coding agents like Claude Code, Cursor, and Codex. Anything that speaks HTTP — including streaming responses and WebSocket-based voice/realtime APIs (e.g. OpenAI Realtime).\n- **Encrypted at rest** - Credentials are encrypted with AES-256-GCM using a random data encryption key (DEK). An optional master password wraps the DEK via Argon2id, so rotating the password does not re-encrypt credentials. A passwordless mode is available for PaaS deploys.\n- **Request logs** - Every proxied request is persisted per vault with method, host, path, status, latency, and the credential key names involved. Bodies, headers, and query strings are not recorded. Retention is configurable per vault.\n\n## Installation\n\nSee the [installation guide](https://docs.agent-vault.dev/installation) for full details.\n\n### Script (macOS / Linux)\n\n```bash\ncurl --proto '=https' --proto-redir '=https' --tlsv1.2 -fsSL https://get.agent-vault.dev | sh\nagent-vault server -d\n```\n\nSupports macOS (Intel + Apple Silicon) and Linux (x86_64 + ARM64).\n\n### [Docker](https://docs.agent-vault.dev/self-hosting/docker)\n\n```bash\ndocker run -it -p 14321:14321 -p 14322:14322 -v agent-vault-data:/data infisical/agent-vault\n```\n\nFor non-interactive environments (Docker Compose, CI, detached mode), pass the master password as an env var:\n\n```bash\ndocker run -d -p 14321:14321 -p 14322:14322 \\\n  -e AGENT_VAULT_MASTER_PASSWORD=your-password \\\n  -v agent-vault-data:/data infisical/agent-vault\n```\n\n### From source\n\nRequires [Go 1.25+](https://go.dev/dl/) and [Node.js 22+](https://nodejs.org/).\n\n```bash\ngit clone https://github.com/Infisical/agent-vault.git\ncd agent-vault\nmake build\nsudo mv agent-vault /usr/local/bin/\nagent-vault server -d\n```\n\nThe server starts the HTTP API on port `14321` and a TLS-encrypted transparent HTTPS proxy on port `14322`. A web UI is available at `http://localhost:14321`.\n\n## Quickstart\n\n### CLI — local agents (Claude Code, Cursor, Codex, OpenClaw, Hermes, OpenCode)\n\nWrap any local agent process with `agent-vault run` (long form: `agent-vault vault run`). Agent Vault creates a scoped session, sets `HTTPS_PROXY` and CA-trust env vars, and launches the agent — all HTTPS traffic is transparently proxied and authenticated:\n\n```bash\nagent-vault run -- claude\nagent-vault vault run -- agent\nagent-vault vault run -- codex\nagent-vault vault run -- opencode\n```\n\nThe agent calls APIs normally (e.g. `fetch(\"https://api.github.com/...\")`). Agent Vault intercepts the request, injects the credential, and forwards it upstream. The agent never sees secrets.\n\nFor **non-cooperative** isolation — where the child physically cannot reach anything except the Agent Vault proxy, regardless of what it tries — launch it in a Docker container with egress locked down by iptables:\n\n```bash\nagent-vault run --isolation=container --share-agent-dir -- claude\n```\n\n`--share-agent-dir` bind-mounts your host's `~/.claude` into the container so the agent reuses your existing login. Currently Claude-only; support for other agents is coming soon.\n\nSee [Container isolation](https://docs.agent-vault.dev/guides/container-isolation) for the threat model and flags.\n\n### SDK — sandboxed agents (Docker, Daytona, E2B)\n\nFor agents running inside containers, use the SDK from your orchestrator to mint a session and pass proxy config into the sandbox:\n\n```bash\nnpm install @infisical/agent-vault-sdk\n```\n\n```typescript\nimport { AgentVault, buildProxyEnv } from \"@infisical/agent-vault-sdk\";\n\nconst av = new AgentVault({\n  token: \"YOUR_TOKEN\",\n  address: \"http://localhost:14321\",\n});\nconst session = await av\n  .vault(\"default\")\n  .sessions.create({ vaultRole: \"proxy\" });\n\n// certPath is where you'll mount the CA certificate inside the sandbox.\nconst certPath = \"/etc/ssl/agent-vault-ca.pem\";\n\n// env: { HTTPS_PROXY, NO_PROXY, NODE_USE_ENV_PROXY, SSL_CERT_FILE,\n//         NODE_EXTRA_CA_CERTS, REQUESTS_CA_BUNDLE, CURL_CA_BUNDLE,\n//         GIT_SSL_CAINFO, DENO_CERT }\nconst env = buildProxyEnv(session.containerConfig!, certPath);\nconst caCert = session.containerConfig!.caCertificate;\n\n// Pass `env` as environment variables and mount `caCert` at `certPath`\n// in your sandbox — Docker, Daytona, E2B, Firecracker, or any other runtime.\n// Once configured, the agent inside just calls APIs normally:\n//   fetch(\"https://api.github.com/...\") — no SDK, no credentials needed.\n```\n\nSee the [TypeScript SDK README](sdks/sdk-typescript/README.md) for full documentation.\n\n## Development\n\n```bash\nmake build      # Build frontend + Go binary\nmake test       # Run tests\nmake web-dev    # Vite dev server with hot reload (port 5173)\nmake dev        # Go + Vite dev servers with hot reload\nmake docker     # Build Docker image\n```\n\n## Open-source vs. paid\n\nThis repo available under the [MIT expat license](https://github.com/Infisical/infisical/blob/main/LICENSE), with the exception of the `ee` directory which will contain premium enterprise features requiring a Infisical license.\n\nIf you are interested in Infisical or exploring a more commercial path for Agent Vault, take a look at [our website](https://infisical.com/) or [book a meeting with us](https://infisical.cal.com/vlad/infisical-demo).\n\n## Contributing\n\nWhether it's big or small, we love contributions. Agent Vault follows the same contribution guidelines as Infisical.\n\nCheck out our guide to see how to [get started](https://infisical.com/docs/contributing/getting-started).\n\nNot sure where to get started? You can:\n\n- Join our <a href=\"https://infisical.com/slack\">Slack</a>, and ask us any questions there.\n\n## We are hiring!\n\nIf you're reading this, there is a strong chance you like the products we created.\n\nYou might also make a great addition to our team. We're growing fast and would love for you to [join us](https://infisical.com/careers).\n\n---\n\n> **Preview.** Agent Vault is in active development and the API is subject to change. Please review the [security documentation](https://docs.agent-vault.dev/learn/security) before deploying.\n","summary":"Agent Vault is an open‑source HTTP credential broker that sits between agents and the APIs they call, never returning secrets to the agent itself but injecting them at the network layer. It offers brokered access, encrypted at rest with AES‑256‑GCM and optional Argon2id‑protected keys, and logs all proxied requests without exposing request bodies or headers. The proxy works with any HTTP‑speaking agent—including custom Python/TypeScript code, sandboxed processes, and popular coding agents such as Claude, Cursor, and Codex—and supports streaming and websocket APIs. The tool is ideal for developers and security teams building AI or automation agents who need to keep credentials out of the agents while still allowing seamless API access.","description":"A HTTP credential proxy and vault for AI agents","stars":943,"language":"Go"},{"owner":"smol-machines","repo":"smolvm","url":"https://github.com/smol-machines/smolvm","readme":"<p align=\"center\">\n  <img src=\"assets/logo.png\" alt=\"smol machines\" width=\"80\">\n</p>\n\n<p align=\"center\">\n  <a href=\"https://discord.gg/E5r8rEWY9J\"><img src=\"https://img.shields.io/badge/Discord-Join-5865F2?logo=discord&logoColor=white\" alt=\"Discord\"></a>\n  <a href=\"https://github.com/smol-machines/smolvm/releases\"><img src=\"https://img.shields.io/github/v/release/smol-machines/smolvm?label=Release\" alt=\"Release\"></a>\n  <a href=\"https://github.com/smol-machines/smolvm/blob/main/LICENSE\"><img src=\"https://img.shields.io/badge/License-Apache_2.0-blue.svg\" alt=\"License\"></a>\n</p>\n\nsmolvm\n======\n\nShip and run software with isolation by default.\n\nThis is a CLI tool that lets you:\n1. Manage and run custom Linux virtual machines locally with: sub-second cold start, cross-platform (macOS, Linux), elastic memory usage.\n2. Pack a stateful virtual machine into a single file (.smolmachine) to rehydrate on any supported platform.\n\nInstall\n-------\n\n```bash\n# install (macOS + Linux)\ncurl -sSL https://smolmachines.com/install.sh | bash\n\n# for coding agents — install + discover all commands\ncurl -sSL https://smolmachines.com/install.sh | bash && smolvm --help\n```\n\nOr download from [GitHub Releases](https://github.com/smol-machines/smolvm/releases).\n\nQuick Start\n-----------\n\n```bash\n# run a command in an ephemeral VM (cleaned up after exit)\nsmolvm machine run --net --image alpine -- sh -c \"echo 'Hello world from a microVM' && uname -a\"\n\n# interactive shell\nsmolvm machine run --net -it --image alpine -- /bin/sh\n# inside the VM: apk add sl && sl && exit\n```\n\nUse This For\n------------\n\n**Sandbox untrusted code** — run untrusted programs in a hardware-isolated VM. Host filesystem, network, and credentials are separated by a hypervisor boundary.\n\n```bash\n# network is off by default — untrusted code can't phone home\nsmolvm machine run --image alpine -- nslookup example.com\n# fails — no network access\n\n# lock down egress — only allow specific hosts\nsmolvm machine run --net --image alpine --allow-host registry.npmjs.org -- wget -q -O /dev/null https://registry.npmjs.org\n# works — allowed host\n\nsmolvm machine run --net --image alpine --allow-host registry.npmjs.org -- wget -q -O /dev/null https://google.com\n# fails — not in allow list\n```\n\n**Pack into portable executables** — turn any workload into a self-contained binary. All dependencies are pre-baked — no install step, no runtime downloads, boots in <200ms.\n\n```bash\nsmolvm pack create --image python:3.12-alpine -o ./python312\n./python312 run -- python3 --version\n# Python 3.12.x — isolated, no pyenv/venv/conda needed\n```\n\n**Persistent machines for development** — create, stop, start. Installed packages survive restarts.\n\n```bash\nsmolvm machine create --net myvm\nsmolvm machine start --name myvm\nsmolvm machine exec --name myvm -- apk add sl\nsmolvm machine exec --name myvm -it -- /bin/sh\n# inside: sl, ls, uname -a — type 'exit' to leave\nsmolvm machine stop --name myvm\n```\n\n**Use git and SSH without exposing keys** — forward your host SSH agent into the VM. Private keys never enter the guest — the hypervisor enforces this. Requires an SSH agent running on your host (`ssh-add -l` to check).\n\n```bash\nsmolvm machine run --ssh-agent --net --image alpine -- sh -c \"apk add -q openssh-client && ssh-add -l\"\n# lists your host keys, but they can't be extracted from inside the VM\n\nsmolvm machine exec --name myvm -- git clone git@github.com:org/private-repo.git\n```\n\n**Declare environments with a Smolfile** — reproducible VM config in a simple TOML file.\n\n```toml\nimage = \"python:3.12-alpine\"\nnet = true\n\n[network]\nallow_hosts = [\"api.stripe.com\", \"db.example.com\"]\n\n[dev]\ninit = [\"pip install -r requirements.txt\"]\nvolumes = [\"./src:/app\"]\n\n[auth]\nssh_agent = true\n```\n\n```bash\nsmolvm machine create myvm -s Smolfile\nsmolvm machine start --name myvm\n```\n\nMore examples: [python](https://github.com/smol-machines/smolvm/tree/main/examples/python-app) · [node](https://github.com/smol-machines/smolvm/tree/main/examples/node-app) · [doom](https://github.com/smol-machines/smolvm/tree/main/examples/doom-web)\n\nHow It Works\n------------\n\nEach workload gets real hardware isolation — its own kernel on [Hypervisor.framework](https://developer.apple.com/documentation/hypervisor) (macOS) or KVM (Linux). [libkrun](https://github.com/containers/libkrun) VMM with custom kernel: [libkrunfw](https://github.com/smol-machines/libkrunfw). Pack it into a `.smolmachine` and it runs anywhere the host architecture matches, with zero dependencies.\n\nImages use the [OCI](https://opencontainers.org/) format — the same open standard Docker uses. Any image on Docker Hub, ghcr.io, or other OCI registries can be pulled and booted as a microVM. No Docker daemon required.\n\nDefaults: 4 vCPUs, 8 GiB RAM. Memory is elastic via virtio balloon — the host only commits what the guest actually uses and reclaims the rest automatically. vCPU threads sleep in the hypervisor when idle, so over-provisioning has near-zero cost. Override with `--cpus` and `--mem`.\n\nComparison\n----------\n\n|                     | smolvm | Containers | Colima | QEMU | Firecracker | Kata |\n|---------------------|--------|------------|--------|------|-------------|------|\n| Isolation           | VM per workload | Namespace (shared kernel) | Namespace (1 VM) | Separate VM | Separate VM | VM per container |\n| Boot time           | <200ms | ~100ms | ~seconds | ~15-30s | <125ms | ~500ms |\n| Architecture        | Library (libkrun) | Daemon | Daemon (in VM) | Process | Process | Runtime stack |\n| Per-workload VMs    | Yes | No | No (shared) | Yes | Yes | Yes |\n| macOS native        | Yes | Via Docker VM | Yes (krunkit) | Yes | No | No |\n| Embeddable SDK      | Yes | No | No | No | No | No |\n| Portable artifacts  | `.smolmachine` | Images (need daemon) | No | No | No | No |\n\nPlatform Support\n----------------\n\n| Host | Guest | Requirements |\n|------|-------|-------------|\n| macOS Apple Silicon | arm64 Linux | macOS 11+ |\n| macOS Intel | x86_64 Linux | macOS 11+ (untested) |\n| Linux x86_64 | x86_64 Linux | KVM (`/dev/kvm`) |\n| Linux aarch64 | aarch64 Linux | KVM (`/dev/kvm`) |\n\nKnown Limitations\n-----------------\n\n* Network is opt-in (`--net` on `machine create`). TCP/UDP only, no ICMP.\n* Volume mounts: directories only (no single files).\n* macOS: binary must be signed with Hypervisor.framework entitlements.\n* `--ssh-agent` requires an SSH agent running on the host (`SSH_AUTH_SOCK` must be set).\n* GPU acceleration requires libkrun built with `GPU=1` and virglrenderer + a Vulkan driver on the host (see [GPU Acceleration](#gpu-acceleration) below).\n\nGPU Acceleration\n----------------\n\nsmolvm exposes the host GPU to guests via **virtio-gpu / Venus** (Vulkan-over-virtio). Guest workloads see a real Vulkan device; on Linux + Intel this renders as:\n\n```\nANGLE (Intel, Vulkan 1.4 (Virtio-GPU Venus (Intel(R) UHD Graphics ...)), venus)\n```\n\n### Host requirements\n\n**macOS** — virglrenderer and MoltenVK are bundled in the smolvm distribution. No extra installs needed.\n\n**Linux** — virglrenderer and a host Vulkan driver must be installed from the system package manager:\n\n| Distro | Packages |\n|--------|----------|\n| Alpine | `apk add virglrenderer mesa-vulkan-intel` (or `mesa-vulkan-ati` for AMD) |\n| Debian/Ubuntu | `apt install virglrenderer0 mesa-vulkan-drivers` |\n\n> virglrenderer depends on libEGL and libdrm from the host GPU driver stack — these are hardware-specific and cannot be bundled. Any GPU-capable Linux host will already have them installed via its GPU driver.\n\n### Usage\n\n```bash\n# CLI\nsmolvm machine run --gpu --image alpine -- vulkaninfo --summary\n\n# Smolfile\n# gpu = true\n# gpu_vram = 2048   # MiB, default 4096\n```\n\nThe guest Vulkan loader must be pointed at the virtio ICD:\n\n```bash\nexport VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/virtio_icd.x86_64.json\n```\n\n### Headless browser example\n\nSee [`examples/headless-browser/`](examples/headless-browser/) for a working Chromium setup using ANGLE + Venus for hardware-accelerated WebGL inside a headless VM.\n\nDevelopment\n-----------\n\nSee [docs/DEVELOPMENT.md](docs/DEVELOPMENT.md).\n\n[Apache-2.0](LICENSE) · made by [@binsquare](https://github.com/BinSquare) · [twitter](https://x.com/binsquares) · [github](https://github.com/smol-machines/smolvm)\n","summary":"smolvm is a lightweight CLI for running isolated Linux virtual machines with hypervisor‑level isolation, offering sub‑second cold starts and elastic memory usage across macOS and Linux. It can package a fully‑configured, stateful VM into a single `.smolmachine` file, sandbox untrusted code with fine‑grained network controls, and bundle any workload into a portable executable that boots in under 200 ms. The tool also supports persistent dev containers, secure forwarding of host SSH keys, and reproducible configurations via a simple TOML “Smolfile”. Developers, security teams, and CI pipelines will find smolvm useful for creating reproducible, isolated runtimes without the overhead of full containers or external VM managers.","description":"Tool to build & run portable, lightweight, self-contained virtual machines.","stars":3129,"language":"Rust"},{"owner":"h4ckf0r0day","repo":"obscura","url":"https://github.com/h4ckf0r0day/obscura","readme":"<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/h4ckf0r0day/obscura/main/assets/icon.png\" alt=\"Obscura\" width=\"80\" />\n</p>\n\n<h2 align=\"center\">Obscura</h2>\n\n<p align=\"center\">\n  <strong>The open-source headless browser for AI agents and web scraping.</strong><br>\n  Lightweight, stealthy, and built in Rust.\n</p>\n\n---\n\nObscura is a headless browser engine written in Rust, built for web scraping and AI agent automation. It runs real JavaScript via V8, supports the Chrome DevTools Protocol, and acts as a drop-in replacement for headless Chrome with Puppeteer and Playwright.\n\n### Why Obscura over headless Chrome?\n\nDesigned for automation at scale, not desktop browsing.\n\n| Metric       | Obscura      | Headless Chrome |\n|--------------|--------------|------------------|\n| Memory       | **30 MB**    | 200+ MB          |\n| Binary size  | **70 MB**    | 300+ MB          |\n| Anti-detect  | **Built-in** | None          |\n| Page load    | **85 ms**    | ~500 ms          |\n| Startup      | **Instant**  | ~2s              |\n| Puppeteer    | **Yes**      | Yes              |\n| Playwright   | **Yes**      | Yes              |\n\n## Install\n\n### Download\n\nGrab the latest binary from [Releases](https://github.com/h4ckf0r0day/obscura/releases):\n\n```bash\n# Linux x86_64\ncurl -LO https://github.com/h4ckf0r0day/obscura/releases/latest/download/obscura-x86_64-linux.tar.gz\ntar xzf obscura-x86_64-linux.tar.gz\n./obscura fetch https://example.com --eval \"document.title\"\n\n# macOS Apple Silicon\ncurl -LO https://github.com/h4ckf0r0day/obscura/releases/latest/download/obscura-aarch64-macos.tar.gz\ntar xzf obscura-aarch64-macos.tar.gz\n\n# macOS Intel\ncurl -LO https://github.com/h4ckf0r0day/obscura/releases/latest/download/obscura-x86_64-macos.tar.gz\ntar xzf obscura-x86_64-macos.tar.gz\n\n# Windows\nDownload the `.zip` from the releases page and extract it manually.\n```\n\nNo Chrome, no Node.js, no dependencies. Release archives include both\n`obscura` and `obscura-worker`; keep them in the same directory for the\nparallel `scrape` command.\n\nLinux release builds target Ubuntu 22.04 so the downloaded binary remains\nusable on common LTS servers with glibc 2.35+.\n\n### Build from source\n\n```bash\ngit clone https://github.com/h4ckf0r0day/obscura.git\ncd obscura\ncargo build --release\n\n# With stealth mode (anti-detection + tracker blocking)\ncargo build --release --features stealth\n```\n\nRequires Rust 1.75+ ([rustup.rs](https://rustup.rs)). First build takes ~5 min (V8 compiles from source, cached after).\n\n## Quick Start\n\n### Fetch a page\n\n```bash\n# Get the page title\nobscura fetch https://example.com --eval \"document.title\"\n\n# Extract all links\nobscura fetch https://example.com --dump links\n\n# Render JavaScript and dump HTML\nobscura fetch https://news.ycombinator.com --dump html\n\n# Wait for dynamic content\nobscura fetch https://example.com --wait-until networkidle0\n\n# Bound navigation time for slow or broken pages\nobscura fetch https://example.com --timeout 10\n```\n\n### Start the CDP server\n\n```bash\nobscura serve --port 9222\n\n# With stealth mode (anti-detection + tracker blocking)\nobscura serve --port 9222 --stealth\n```\n\n### Scrape in parallel\n\n```bash\nobscura scrape url1 url2 url3 ... \\\n  --concurrency 25 \\\n  --eval \"document.querySelector('h1').textContent\" \\\n  --format json\n```\n\n## Puppeteer / Playwright\n\n### Puppeteer\n\n```bash\nnpm install puppeteer-core\n```\n\n```javascript\nimport puppeteer from 'puppeteer-core';\n\nconst browser = await puppeteer.connect({\n  browserWSEndpoint: 'ws://127.0.0.1:9222/devtools/browser',\n});\n\nconst page = await browser.newPage();\nawait page.goto('https://news.ycombinator.com');\n\nconst stories = await page.evaluate(() =>\n  Array.from(document.querySelectorAll('.titleline > a'))\n    .map(a => ({ title: a.textContent, url: a.href }))\n);\nconsole.log(stories);\n\nawait browser.disconnect();\n```\n\n### Playwright\n\n```bash\nnpm install playwright-core\n```\n\n```javascript\nimport { chromium } from 'playwright-core';\n\nconst browser = await chromium.connectOverCDP({\n  endpointURL: 'ws://127.0.0.1:9222',\n});\n\nconst page = await browser.newContext().then(ctx => ctx.newPage());\nawait page.goto('https://en.wikipedia.org/wiki/Web_scraping');\nconsole.log(await page.title());\n\nawait browser.close();\n```\n\n### Form submission & login\n\n```javascript\nawait page.goto('https://quotes.toscrape.com/login');\nawait page.evaluate(() => {\n  document.querySelector('#username').value = 'admin';\n  document.querySelector('#password').value = 'admin';\n  document.querySelector('form').submit();\n});\n// Obscura handles the POST, follows the 302 redirect, maintains cookies\n```\n\n## Benchmarks\n\nPage load:\n\n| Page | Obscura | Chrome |\n|------|---------|--------|\n| Static HTML | **51 ms** | ~500 ms |\n| JS + XHR + fetch | **84 ms** | ~800 ms |\n| Dynamic scripts | **78 ms** | ~700 ms |\n\n## Stealth Mode\n\nEnable with `--features stealth`.\n\n### Anti-fingerprinting\n- Per-session fingerprint randomization (GPU, screen, canvas, audio, battery)\n- Realistic `navigator.userAgentData` (Chrome 145, high-entropy values)\n- `event.isTrusted = true` for dispatched events\n- Hidden internal properties (`Object.keys(window)` safe)\n- Native function masking (`Function.prototype.toString()` → `[native code]`)\n- `navigator.webdriver = undefined` (matches real Chrome)\n\n### Tracker Blocking\n- 3,520 domains blocked\n- Blocks analytics, ads, telemetry, and fingerprinting scripts\n- Prevents trackers from loading entirely\n- Enabled automatically with `--stealth`\n\n## CDP API\n\nObscura implements the Chrome DevTools Protocol for Puppeteer/Playwright compatibility.\n\n| Domain | Methods |\n|--------|---------|\n| **Target** | createTarget, closeTarget, attachToTarget, createBrowserContext, disposeBrowserContext |\n| **Page** | navigate, getFrameTree, addScriptToEvaluateOnNewDocument, lifecycleEvents |\n| **Runtime** | evaluate, callFunctionOn, getProperties, addBinding |\n| **DOM** | getDocument, querySelector, querySelectorAll, getOuterHTML, resolveNode |\n| **Network** | enable, setCookies, getCookies, setExtraHTTPHeaders, setUserAgentOverride |\n| **Fetch** | enable, continueRequest, fulfillRequest, failRequest (live interception) |\n| **Storage** | getCookies, setCookies, deleteCookies |\n| **Input** | dispatchMouseEvent, dispatchKeyEvent |\n| **LP** | getMarkdown (DOM-to-Markdown conversion) |\n## CLI Reference\n\n### `obscura serve`\n\nStart a CDP WebSocket server.\n\n| Flag | Default | Description |\n|------|---------|-------------|\n| `--port` | `9222` | WebSocket port |\n| `--proxy` | — | HTTP/SOCKS5 proxy URL |\n| `--stealth` | off | Enable anti-detection + tracker blocking |\n| `--workers` | `1` | Number of parallel worker processes |\n| `--obey-robots` | off | Respect robots.txt |\n\n### `obscura fetch <URL>`\n\nFetch and render a single page.\n\n| Flag | Default | Description |\n|------|---------|-------------|\n| `--dump` | `html` | Output: `html`, `text`, or `links` |\n| `--eval` | — | JavaScript expression to evaluate |\n| `--wait-until` | `load` | Wait: `load`, `domcontentloaded`, `networkidle0` |\n| `--timeout` | `30` | Maximum navigation time in seconds |\n| `--selector` | — | Wait for CSS selector |\n| `--stealth` | off | Anti-detection mode |\n| `--quiet` | off | Suppress banner |\n\n### `obscura scrape <URL...>`\n\nScrape multiple URLs in parallel with worker processes.\n\n| Flag | Default | Description |\n|------|---------|-------------|\n| `--concurrency` | `10` | Parallel workers |\n| `--eval` | — | JS expression per page |\n| `--format` | `json` | Output: `json` or `text` |\n\n## License\n\nApache 2.0\n\n---\n","summary":"Obscura is a lightweight, Rust‑based headless browser engine designed to run real JavaScript via V8 and expose the Chrome DevTools Protocol, making it a drop‑in replacement for headless Chrome in automation workflows. It offers an ultra‑low memory footprint (around 30 MB), a small binary size (≈70 MB), instant startup, built‑in anti‑detection and stealth modes, and full compatibility with Puppeteer and Playwright. The project is ideal for developers building large‑scale web‑scraping or AI agent solutions who need fast, resource‑efficient, and stealthy browser automation without the overhead of Chrome or Node.js dependencies.","description":"The headless browser for AI agents and web scraping","stars":10040,"language":"Rust"},{"owner":"besimple-oss","repo":"broccoli","url":"https://github.com/besimple-oss/broccoli","readme":"<div align=\"center\">\n\n# 🥦 Broccoli OSS\n\n**AI teammates for your engineering loop.**\nBroccoli turns Linear tickets into shipped PRs — powered by Claude and Codex, running on your own Google Cloud.\n\n[![CI](https://github.com/besimple-oss/broccoli/actions/workflows/ci.yml/badge.svg)](https://github.com/besimple-oss/broccoli/actions/workflows/ci.yml)\n[![License: MIT](https://img.shields.io/badge/License-MIT-blue.svg)](LICENSE)\n
