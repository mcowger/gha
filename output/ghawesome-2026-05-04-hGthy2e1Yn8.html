ll`.\n\n```bash\ngit clone https://github.com/Jellypod-Inc/cartoon-studio.git\ncd cartoon-studio\nnpm install      # also downloads chrome-headless-shell (~190 MB)\nnpm start\n```\n\n`npm start` boots a Vite dev server for the renderer and an Electron process for main + preload, with HMR on the renderer. The `postinstall` script downloads chrome-headless-shell once for your host platform; rerun `npm run setup:chrome` if it gets stale or you switch architectures.\n\n## Three screens, three jobs\n\n- **Stage** — drag SVG characters onto a scene. Library on the left, 1920×1080 canvas on the right. Move, resize from any corner, <kbd>Delete</kbd> to remove.\n- **Dialogue** — write the script. Per-line speaker, voice (87 voices across 8 providers), and text. Press ▶ to generate a fresh take and play it inline. Press **✦ Write with AI** to author the whole script from a premise.\n- **Play** — final-cut preview inside a film cabinet. Scrub, play, restart, render to MP4.\n\n## How it works\n\n```mermaid\nflowchart TD\n    A([Script]) --> B[TTS · word timestamps]\n    D([SVG character · 9-shape mouth rig]) --> E\n    B --> C[Mouth cues from vowels]\n    C --> E[Composition HTML]\n    E --> F[HyperFrames render]\n    F --> G([MP4])\n```\n\nWhat runs through an LLM and what doesn't:\n\n- **LLM** — script authoring (OpenAI), vision-based mouth detection on uploaded SVGs (OpenAI vision).\n- **Not LLM** — TTS, word-level alignment, mouth-cue generation (deterministic vowel heuristic), placement, composition, render. Output is reproducible from the same script + voices + characters.\n\n## Built on\n\n| Layer | Project | What it gives us |\n| --- | --- | --- |\n| **Speech** | [Speech SDK](https://github.com/Jellypod-Inc/speech-sdk) | One `generateSpeech()` call across **13 providers** with native or Whisper-derived word timestamps. Built and maintained by [Jellypod](https://jellypod.ai). The reason Cartoon Studio can swap voice providers from a dropdown. |\n| **Render** | [HyperFrames](https://github.com/heygen-com/hyperframes) | HTML composition → MP4 via headless Chrome + GSAP timelines + ffmpeg. We hand it a paused timeline with `.set()` calls per mouth cue; HyperFrames seeks frame by frame and muxes the audio. |\n| **SVG art** | [Recraft V4](https://fal.ai/models/fal-ai/recraft/v4/text-to-vector) | Text → flat construction-paper SVG characters and scenes. We hint a magenta background plate so it can be reliably stripped, then auto-rig the mouth via geometric heuristic (or vision-LLM fallback for unusual faces). |\n| **Lip-sync catalog** | [Preston Blair · Rhubarb](https://github.com/DanielSWolf/rhubarb-lip-sync) | The 9 mouth shapes (X closed · A–H open variants) Rhubarb popularized. We don't bundle Rhubarb — cues come from word timestamps via a vowel-per-word heuristic, which is faster and regenerates instantly when the text changes. Rhubarb itself is excellent for true phoneme-driven sync. |\n\n## Bring your own API keys\n\nEvery key lives encrypted in your OS keyring — macOS Keychain · Windows DPAPI · Linux GNOME Libsecret / KWallet — via Electron's `safeStorage`. The settings file holds only ciphertext, with file mode `0600` on Unix. The renderer process never sees plaintext keys, only an \"is set\" boolean map. Audit all of this in **Settings → SC.SEC · Key Vault**.\n\nThe app boots fine with no keys. Every key is optional; nothing is gated. If a key isn't set when an action needs it, you get a single editorial toast with a one-click \"Open Settings\" shortcut.\n\n### Dialogue & scenes\n\n| Key | Used for |\n| --- | --- |\n| `OPENAI_API_KEY` | Script authoring · vision-based mouth detection on uploaded SVGs · OpenAI TTS · Whisper word alignment for any provider without native timestamps. |\n| `FAL_API_KEY` | Recraft V4 character + scene generation. |\n\n### Text-to-speech\n\n| Key | Provider · what it's good for |\n| --- | --- |\n| `ELEVENLABS_API_KEY` | ElevenLabs — best voice quality, native word-level timestamps. |\n| `GOOGLE_API_KEY` | Google Gemini 3.1 Flash TTS — 30 expressive voices. |\n| `CARTESIA_API_KEY` | Cartesia Sonic-3 — ultra-low latency, expressive character voices. |\n| `DEEPGRAM_API_KEY` | Deepgram Aura-2 — natural conversational voices. |\n| `HUME_API_KEY` | Hume Octave-2 — emotionally intelligent, prompt-steerable. |\n| `FISH_AUDIO_API_KEY` | Fish Audio S2-Pro — paste reference IDs from fish.audio. |\n| `INWORLD_API_KEY` | Inworld TTS-1.5-Max — character voices built for game/agent NPCs. |\n\n## Build a binary for your machine\n\n```bash\nnpm run make\n```\n\nSquirrel installer on Windows · `.zip` containing the `.app` on macOS · `.deb` / `.rpm` on Linux. Output lands in `out/`.\n\n> **Signing.** Builds are unsigned — on macOS you'll hit Gatekeeper (\"damaged / can't be opened\") and possibly Keychain access issues since the Fuses plugin invalidates the ad-hoc signature. On Windows you'll see SmartScreen. These go away once we ship signed builds via an Apple Developer ID + Authenticode certificate.\n\n## Project layout\n\n```\nsrc/\n  main/        Electron main — settings, IPC, TTS, render, composition\n  preload/     contextBridge exposing IpcApi to the renderer\n  renderer/    Vanilla TS + Tailwind 4 — screens, modals, design system\n    screens/   Stage / Dialogue / Play\n  shared/      Cross-process types\nresources/\n  defaults/    Bundled characters (Bill · Ted · Jane · Max) + scenes\nscripts/       CLI tools (e.g. `npm run rig` for SVG mouth-rigging)\ndocs/          Repo media\n```\n\nForge is configured to:\n\n- Bundle `resources/defaults/` as `extraResource` so default characters & scenes ship with the app.\n- Unpack `node_modules/hyperframes/**` from the asar so the render child process can resolve the CLI entry.\n\n---\n\n<div align=\"center\">\n\n<a href=\"https://jellypod.ai\">\n  <img src=\"docs/jellypod-icon.png\" alt=\"Jellypod\" width=\"72\" height=\"72\" />\n</a>\n\n**Sponsored by [Jellypod](https://jellypod.ai)**\n\n</div>\n","summary":"**Cartoon Studio** is a desktop application that lets creators script, animate, and render 2‑D cartoon shows without relying on cloud services. It combines drag‑and‑drop SVG characters, a dialogue editor with AI‑generated scripts, and an integrated playback and rendering engine that converts the scene into a finished MP4. Key features include multilingual TTS from 13 cloud providers, deterministic mouth‑sync based on vowel cues, and a headless‑Chrome rendering pipeline powered by HyperFrames. The app is ideal for independent animators, educators, and hobbyists who want a reproducible, offline workflow for producing short animated clips.","description":"An open-source desktop studio app for making 2D animated cartoon shows.","stars":50,"language":"TypeScript"},{"owner":"SethPyle376","repo":"hiraeth","url":"https://github.com/SethPyle376/hiraeth","readme":"# Hiraeth\n\nHiraeth is a local AWS emulator focused on fast integration testing. Signed AWS\nSDK requests go through a local HTTP endpoint, state is stored in SQLite, and an\noptional web UI exposes local service state for debugging.\n\n![Hiraeth web UI showing the SQS dashboard](docs/assets/hiraeth-web-ui.png)\n\nThis project is early. It is intended for local development and test\nenvironments, not as a production AWS replacement.\n\n## Current Scope\n\n- AWS SigV4 header authentication with a seeded local test credential.\n- Authorization modes for `audit`, `enforce`, and `off`.\n- SQS queue resource policy authorization and IAM identity policy evaluation.\n- SQLite-backed IAM users, access keys, inline policies, managed policies, SQS\n  queues, messages, attributes, and tags.\n- SQS-compatible endpoint for common queue and message operations.\n- Partial IAM Query API support for users, access keys, inline user policies,\n  managed policies, and policy attachments.\n- STS `GetCallerIdentity` support.\n- SQLite-backed request tracing with span flow visualization in the web UI.\n- Web admin UI on a separate port for inspecting local service state.\n- Docker and Docker Compose support.\n- SQLx offline query metadata for checked SQL builds.\n\n## Documentation\n\n- [Service docs](docs/README.md)\n- [IAM](docs/iam/README.md)\n- [SQS](docs/sqs/README.md)\n- [Tracing](docs/tracing/README.md)\n\n## Quickstart\n\nStart Hiraeth with Docker Compose:\n\n```sh\ndocker compose up --build\n```\n\nThe AWS-compatible endpoint listens on `http://localhost:4566`. The admin UI\nlistens on `http://localhost:4567`.\n\nThe default seeded credential is:\n\n```sh\nexport AWS_ACCESS_KEY_ID=test\nexport AWS_SECRET_ACCESS_KEY=test\nexport AWS_DEFAULT_REGION=us-east-1\n```\n\nFor service-specific examples, API support, and current gaps, see:\n\n- [IAM docs](docs/iam/README.md)\n- [SQS docs](docs/sqs/README.md)\n\nCompose writes SQLite data to `/data/db.sqlite` inside the container. Mount your\nown volume or bind mount at `/data` if you want data to survive container\nrecreation.\n\n## Container Image\n\nRelease images are published to GitHub Container Registry:\n\n```sh\ndocker pull ghcr.io/sethpyle376/hiraeth:v0.2.0\n```\n\nRelease maintainers can publish a multi-architecture image for `linux/amd64`\nand `linux/arm64` from a local Docker Buildx environment:\n\n```sh\ndocker login ghcr.io\nscripts/publish-image.sh v0.2.0\n```\n\nThe publish script pushes `ghcr.io/sethpyle376/hiraeth:<tag>`. Tags must match\nthe release format `v*.*.*`.\n\n## Running From Source\n\n```sh\nmkdir -p .local\nHIRAETH_DATABASE_URL=sqlite://.local/db.sqlite cargo run -p hiraeth_runtime\n```\n\nDefaults:\n\n| Setting | Environment variable | Default |\n| --- | --- | --- |\n| AWS emulator host | `HIRAETH_HOST` | `0.0.0.0` |\n| AWS emulator port | `HIRAETH_PORT` | `4566` |\n| SQLite URL | `HIRAETH_DATABASE_URL` | `sqlite://data/db.sqlite` |\n| Authorization mode | `HIRAETH_AUTH_MODE` | `audit` |\n| Web UI enabled | `HIRAETH_WEB_ENABLED` | `true` |\n| Web UI host | `HIRAETH_WEB_HOST` | `127.0.0.1` |\n| Web UI port | `HIRAETH_WEB_PORT` | `4567` |\n\nWhen running from source, prefer setting `HIRAETH_DATABASE_URL` to a path under\n`.local/` or another directory that already exists.\n\n## Web UI\n\nThe web UI is an admin/debug surface for local service state. Current\nservice-specific UI coverage is documented under [docs/iam](docs/iam/README.md)\nand [docs/sqs](docs/sqs/README.md).\n\nThe tracing dashboard records local AWS requests, spans through the runtime and\nservice layers, and full request/response bodies. See the\n[tracing docs](docs/tracing/README.md) for usage notes and data exposure\ndetails.\n\nThe web UI does not use SigV4 authentication. Keep `HIRAETH_WEB_HOST` bound to a\ntrusted interface unless you intentionally want to expose local test state.\n\nThe current UI vendors its JavaScript and CSS assets and serves them from the\nHiraeth web process.\n\n## AI Usage\n\nAI tools are used as part of this project's development workflow for code\ngeneration, refactoring, test writing, documentation drafts, and design\ndiscussion.\n\nMost runtime code has been written by hand, most test code has been generated.\nRegardless, all changes are reviewed, edited, and accepted by a human maintainer,\nand the project relies on normal engineering checks such as tests, SQLx query\nchecking, and manual review rather than treating AI output as authoritative.\n\n## Contributing\n\nCompatibility reports, focused bug fixes, docs improvements, and small SQS\nparity improvements are welcome. See [CONTRIBUTING.md](CONTRIBUTING.md) for the\ndevelopment workflow, suggested issue labels, and starter contribution ideas.\n\n## License\n\nHiraeth is licensed under the [MIT License](LICENSE).\n\n## Development\n\nFormat and test:\n\n```sh\ncargo fmt\ncargo test\n```\n\nPrepare the local database used by SQLx query checking:\n\n```sh\ncargo run -p xtask -- prepare-db\n```\n\nSeed SQS queues and messages into a running Hiraeth endpoint:\n\n```sh\ncargo run -p xtask -- seed\n```\n\nBy default this targets `http://localhost:4566` with the local `test`/`test`\ncredential. Use `cargo run -p xtask -- seed --help` to see endpoint, region,\ncredential, prefix, and reset options.\n\nRefresh SQLx offline metadata:\n\n```sh\nDATABASE_URL=sqlite://.local/db.sqlite cargo sqlx prepare --workspace -- --all-targets\n```\n\nCheck SQLx metadata in CI-style mode:\n\n```sh\nDATABASE_URL=sqlite://.local/db.sqlite cargo sqlx prepare --workspace --check -- --all-targets\n```\n\nThe checked SQL metadata under `.sqlx/` should be committed when queries or\nmigrations change.\n","summary":"Hiraeth is a lightweight local AWS emulator designed to accelerate integration testing for developers and QA teams. It intercepts signed AWS SDK calls over HTTP, authenticates them with SigV4 using a seeded test credential, and stores state in SQLite, supporting SQS operations, IAM policy evaluation, and partial STS functionality while offering an optional web UI for debugging and request tracing. The system is Docker‑friendly, easily spin‑upable via Compose or run from source, and exposes a separate admin portal for inspecting queues, policies, and spans. Developers working on AWS‑dependent services can use Hiraeth to run fast, consistent tests in isolation without a remote AWS account.","description":"Local AWS emulator focused on fast integration testing, with SQS support, SQLite-backed state, and a debug-friendly web UI.","stars":72,"language":"Rust"},{"owner":"NV404","repo":"gova","url":"https://github.com/NV404/gova","readme":"# Gova\n\n**The declarative GUI framework for Go.** Build native desktop apps for macOS,\nWindows, and Linux from a single Go codebase — typed components, reactive\nstate, real platform dialogs, and one static binary. No JavaScript runtime, no\nembedded browser, no C++ toolchain to learn.\n\n[![Go Reference](https://pkg.go.dev/badge/github.com/nv404/gova.svg)](https://pkg.go.dev/github.com/nv404/gova)\n[![Go Report Card](https://goreportcard.com/badge/github.com/nv404/gova)](https://goreportcard.com/report/github.com/nv404/gova)\n[![CI](https://github.com/nv404/gova/actions/workflows/ci.yml/badge.svg)](https://github.com/nv404/gova/actions/workflows/ci.yml)\n[![License: MIT](https://img.shields.io/badge/license-MIT-blue.svg)](LICENSE)\n\n> **Status:** pre-1.0. The API will shift before `v1.0.0`. Pin a tag in\n> production.\n\n```go\npackage main\n\nimport . \"github.com/nv404/gova\"\n\nvar Counter = Define(func(s *Scope) View {\n    count := State(s, 0)\n    return VStack(\n        Text(count.Format(\"Count: %d\")),\n        Button(\"+\", func() { count.Update(func(n int) int { return n + 1 }) }),\n        Button(\"-\", func() { count.Update(func(n int) int { return n - 1 }) }),\n    )\n})\n\nfunc main() { Run(\"Counter\", Counter) }\n```\n\n<p align=\"center\">\n  <img\n    src=\"docs-site/public/screenshots/counter-example.png\"\n    alt=\"Counter example window on macOS\"\n    width=\"640\"\n  />\n</p>\n\n## Why Gova\n\n- **Components as structs.** Views are plain Go structs with typed prop fields;\n  defaults are zero values; composition is plain function calls. No magic\n  property wrappers, no string keys, no hook-ordering rules.\n- **Explicit reactive scope.** State, signals, and effects live on a `Scope`\n  you can see. No hidden scheduler, no re-render surprises, no Rx, no Redux.\n- **Real native integrations where it matters.** `NSAlert`, `NSOpenPanel`,\n  `NSSavePanel`, and `NSDockTile` badge/progress/menu on macOS through cgo.\n  Fyne fallbacks on Windows and Linux — same API everywhere.\n- **One static binary.** `go build` produces a single executable. No\n  JavaScript runtime, no embedded browser, no extra assets to bundle.\n- **Hot reload that actually reloads.** `gova dev` watches Go files, rebuilds\n  on save, and relaunches — with an opt-in `PersistedState` so UI state\n  survives the reload.\n- **Built on Fyne, but Fyne stays internal.** The public API is yours to rely\n  on. We swap out renderer details without breaking your code.\n\n## At a glance\n\n| Metric        | Value     | Notes                               |\n|---------------|-----------|-------------------------------------|\n| Binary size   | ~32 MB    | `counter` example, default build    |\n| Stripped      | ~23 MB    | `go build -ldflags \"-s -w\"`         |\n| Memory idle   | ~80 MB    | RSS, `counter` running              |\n| Go version    | 1.26+     | plus a C toolchain for cgo          |\n| License       | MIT       | no runtime fees                     |\n\nMeasured on macOS arm64 with Go 1.26.2. Numbers will vary by platform and\nfeature set.\n\n## Install\n\n```bash\ngo get github.com/nv404/gova@latest\n```\n\nOptional CLI for `dev` / `build` / `run`:\n\n```bash\ngo install github.com/nv404/gova/cmd/gova@latest\ngova dev ./examples/counter\n```\n\nPrerequisites: **Go 1.26+** and a C toolchain (Xcode CLT on macOS,\n`build-essential` + `libgl1-mesa-dev` on Linux, MinGW on Windows).\n\n## Docs\n\nFull documentation lives at **[gova.dev](https://gova.dev)** (or run\n`npm run dev` inside `docs-site/` for local browsing). Key sections:\n\n- [Getting started](https://gova.dev/docs/getting-started/installation)\n- [Core concepts](https://gova.dev/docs/concepts/components)\n- [State and effects](https://gova.dev/docs/state/state)\n- [Native dialogs](https://gova.dev/docs/overlays/native-dialogs)\n- [Platform integration](https://gova.dev/docs/platform/dock)\n- [CLI](https://gova.dev/docs/cli/overview)\n\n## Examples\n\nEvery example in [`examples/`](./examples) is a runnable program:\n\n| Example       | What it shows                                          |\n|---------------|--------------------------------------------------------|\n| `counter`     | The minimum viable Gova app                            |\n| `todo`        | State, lists, forms                                    |\n| `fancytodo`   | Categories, derived state, richer layout               |\n| `notes`       | Nav, multi-view, stores                                |\n| `themed`      | Dark/light mode, semantic colors                       |\n| `components`  | `Viewable` composition, `ZStack`, `Scaffold`           |\n| `dialogs`     | Native dialogs, dock badge / progress / menu, app icon |\n\n```bash\ngo run ./examples/dialogs\n```\n\n## Platform support\n\n| Feature                   | macOS                 | Windows         | Linux           |\n|---------------------------|-----------------------|-----------------|-----------------|\n| Core UI                   | Supported             | Supported       | Supported       |\n| Hot reload (`gova dev`)   | Supported             | Supported       | Supported       |\n| App icon (runtime)        | Supported             | Supported       | Supported       |\n| Native dialogs            | NSAlert / NSOpenPanel | Fyne fallback   | Fyne fallback   |\n| Dock / taskbar            | NSDockTile            | Planned         | Planned         |\n\n## CLI\n\nThe `gova` CLI ships alongside the framework.\n\n| Command       | Purpose      | Notes                                                      |\n|---------------|--------------|------------------------------------------------------------|\n| `gova dev`    | Hot reload   | Watch `.go` files, rebuild on save, relaunch the window    |\n| `gova build`  | Compile      | Static binary to `./bin/<name>`                            |\n| `gova run`    | Execute      | Build and launch once, no file watching                    |\n\n## Contributing\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md). Tests are the contract:\n\n```bash\ngo test ./...\n```\n\nIssues, discussions, and PRs all live on\n[GitHub](https://github.com/nv404/gova). Security issues? See\n[SECURITY.md](SECURITY.md).\n\n## License\n\n[MIT](LICENSE). Gova is built on [Fyne](https://fyne.io) (BSD-3), which ships\nwith the module as an internal dependency.\n","summary":"Gova is a declarative GUI framework written in Go that allows developers to build native desktop applications for macOS, Windows, and Linux from a single Go codebase, producing a single static binary without the need for JavaScript runtimes, embedded browsers, or complex toolchains. It offers typed component structs, a clear reactive “Scope” for state, signals, and effects, native platform dialogs and integrations via cgo on macOS, and a hot‑reload development loop that preserves UI state across rebuilds. The framework is ideal for Go programmers who want a straightforward, zero‑runtime overhead way to create cross‑platform desktop apps with a single, developer‑friendly API.","description":"declarative GUI framework for Go","stars":326,"language":"Go"},{"owner":"yapstudios","repo":"sfsym","url":"https://github.com/yapstudios/sfsym","readme":"# sfsym\n\n![demo](./demo.svg)\n\n[![Homebrew](https://img.shields.io/badge/homebrew-yapstudios%2Ftap-orange)](https://github.com/yapstudios/homebrew-tap)\n[![License: MIT](https://img.shields.io/badge/license-MIT-blue)](./LICENSE)\n\nA command-line tool for exporting Apple SF Symbols as SVG, PDF, or PNG. The vector paths come directly from macOS's symbol renderer, so the output is the same geometry the system draws. No Xcode project, no redraw, and no runtime dependency on SF Symbols.app.\n\n```sh\nsfsym export heart.fill -f svg -o heart.svg\n# 569B -> heart.svg\n```\n\n> **Before you use this**\n>\n> - **Licensing.** SF Symbols are Apple property. The [SF Symbols License](https://developer.apple.com/support/terms/) permits their use only in artwork and mockups for apps that run on Apple platforms. `sfsym` is a tool; the restriction applies to what you ship with the output it produces. Don't embed SF Symbols in an Android app or a generic website.\n> - **Private API.** The renderer reads a private ivar on `NSSymbolImageRep` to reach the underlying `CUINamedVectorGlyph` object. This has been stable from macOS 13 through macOS 26, but Apple doesn't guarantee it. If a future release changes the layout, `sfsym` fails fast rather than producing incorrect output.\n\n## Install\n\n### Homebrew\n\n```sh\nbrew install yapstudios/tap/sfsym\n```\n\nA prebuilt universal binary. No compile step, no Xcode dependency. Runs on macOS 13 (Ventura) or later, on Apple silicon or Intel.\n\n### From source\n\nRequires Xcode Command Line Tools (`xcode-select --install`).\n\n```sh\ngit clone https://github.com/yapstudios/sfsym.git\ncd sfsym\nScripts/install.sh\n```\n\nThe script builds a release binary and installs it at `~/.local/bin/sfsym`.\n\n### Manual\n\n```sh\nswift build -c release\ncp -f .build/release/sfsym ~/.local/bin/sfsym\n```\n\n## Quick start\n\n```sh\n# Format is inferred from the -o extension.\nsfsym export heart.fill -o heart.svg\n\n# Colored and sized.\nsfsym export star.fill --color '#FFD60A' --size 48 -o star.svg\n\n# Short hex and alpha are both accepted.\nsfsym export heart.fill --color '#f00' -o heart.svg\nsfsym export heart.fill --color '#007AFF80' -o half.svg    # fill-opacity preserved\n\n# Multi-layer symbol with per-layer colors.\nsfsym export cloud.sun.rain.fill \\\n  --mode palette --palette '#4477ff,#ffcc00,#ff3b30' -o weather.svg\n\n# Vector PDF with Apple's hierarchical opacity ladder.\nsfsym export heart.fill -f pdf --mode hierarchical --color '#007AFF' -o heart.pdf\n\n# PNG at 2x pixel density: --size 128 produces 256x256 pixels.\nsfsym export cloud.sun.rain.fill -f png --mode multicolor --size 128 -o cloud@2x.png\n\n# Find a symbol by keyword or category, then export it.\nsfsym list --search magnifyingglass\nsfsym list --category weather --limit 10\n```\n\n## Commands\n\n### `export`\n\nRenders a single symbol. The output format is inferred from the `-o` file extension (`.svg`, `.pdf`, or `.png`); use `-f` to override. The default format is SVG.\n\n```sh\nsfsym export <name>  [-f svg|pdf|png]\n                     [--mode monochrome|hierarchical|palette|multicolor]\n                     [--weight ultralight|thin|light|regular|medium|semibold|bold|heavy|black]\n                     [--scale small|medium|large]\n                     [--size <int 1..2048>]\n                     [--color <hex|systemName>]\n                     [--palette <hex,hex,...>]\n                     [-o <path>|-]\n                     [--json]\n```\n\nColors accept `#RGB`, `#RGBA`, `#RRGGBB`, `#RRGGBBAA`, or an Apple system color name such as `systemRed`, `systemBlue`, `label`, or `systemGray2`. Run `sfsym colors` for the full list. SVG output preserves alpha as `fill-opacity`.\n\n`--size N` produces a square `N × N`-point canvas in every format. The symbol is scaled uniformly to fit and is centered inside the canvas. PNG output uses 2x pixel density, so `--size 128` becomes a `256 × 256`-pixel file.\n\nIn `palette` mode, colors cycle if there are fewer than the symbol has layers, and `sfsym` prints a warning if there are more. Passing `--color` in a mode that ignores it, or `--palette` in a mode that ignores it, prints a one-line warning to stderr.\n\nPassing `--json` with a file path writes the image as usual and prints a JSON summary (`{\"name\", \"format\", \"path\", \"bytes\"}`) to stdout. Passing `--json` with `-o -` sends the image bytes to stdout and the summary to stderr.\n\n### `batch`\n\nReads one `export` invocation per line from stdin. Because Swift and AppKit start once, throughput reaches about 800 exports per second. Lines may optionally begin with `export` or `sfsym export`.\n\n```sh\nprintf 'heart.fill -f svg -o heart.svg\\n\\\nstar.fill  -f svg -o star.svg\\n' | sfsym batch\n# batch: ok=2 fail=0 in 0.01s (284/s)\n```\n\nExporting the entire library:\n\n```sh\nsfsym list | awk '{print $1 \" -f svg -o out/\"$1\".svg\"}' | sfsym batch\n# batch: ok=8302 fail=1 in 10.1s (822/s)\n```\n\nThe exit code is `2` if any line fails and `0` otherwise. `--fail-fast` stops after the first failure. With `--json`, each failure is written as a JSON object on stderr (`{\"code\", \"error\", \"line\"}`), and the run ends with a final summary object (`{\"code\": \"summary\", \"ok\", \"fail\", \"seconds\", \"rate\"}`). The entire stream is parseable by `jq`.\n\n### `list`\n\nEnumerates every SF Symbol name the OS knows about (8,300 or more). The data is read directly from the installed `Assets.car`, so the list stays current with OS updates without a version table baked into the binary.\n\n```sh\nsfsym list                              # every name, newline-separated\nsfsym list --prefix cloud               # filter by name prefix\nsfsym list --contains check             # case-insensitive substring match\nsfsym list --category weather           # filter by Apple's taxonomy\nsfsym list --search magnifyingglass     # filter by Apple's semantic keywords\nsfsym list --limit 20                   # cap the result count\nsfsym list --json                       # emit a JSON array\n```\n\n`--category` and `--search` read metadata from `/Applications/SF Symbols.app/Contents/Resources/Metadata/`. If SF Symbols.app isn't installed, those two flags return an error; the others work without it.\n\n### `info`\n\nPrints geometry and layer metadata for a single symbol.\n\n```sh\nsfsym info heart.fill --json\n```\n\n```json\n{\n  \"name\": \"heart.fill\",\n  \"size\": { \"width\": 40, \"height\": 33 },\n  \"alignmentRect\": { \"x\": 4, \"y\": 2, \"width\": 31.5, \"height\": 29 },\n  \"templateLayers\": 1,\n  \"hierarchyLayers\": 1,\n  \"paletteLayers\": 1,\n  \"hierarchyLevels\": [0],\n  \"modes\": [\"monochrome\", \"hierarchical\", \"palette\"]\n}\n```\n\n### `modes`\n\nLists the rendering modes available for a symbol.\n\n```sh\nsfsym modes cloud.sun.rain.fill --json\n# [\"monochrome\",\"hierarchical\",\"palette\"]\n```\n\n### `colors`\n\nLists every named color that `--color` and `--palette` accept, with its resolved sRGB hex value.\n\n```sh\nsfsym colors --json\n# [{\"name\":\"systemRed\",\"hex\":\"#ff383c\"}, ...]\n```\n\n### `categories`\n\nLists Apple's category keys (`communication`, `weather`, `devices`, and so on). Use this alongside `list --category`. The data is sourced from SF Symbols.app; if the app isn't installed, the command exits with code 1 and an empty result.\n\n```sh\nsfsym categories --json\n```\n\n### `schema`\n\nPrints a machine-readable description of the CLI as JSON: every subcommand, flag, enum, default, and a set of example invocations. Intended for LLM tools and scripted automation.\n\n```sh\nsfsym schema | jq '.commands[] | .name'\n```\n\n## Rendering modes\n\n| Mode | Output | Behavior |\n|------|--------|----------|\n| `monochrome` | vector | Every layer is filled with the `--color` tint. |\n| `hierarchical` | vector | Primary, secondary, and tertiary tiers at Apple's `1.0 / 0.68 / 0.32` opacity ladder of `--color`. |\n| `palette` | vector | One `--palette` color per layer, in Apple's declared layer order. |\n| `multicolor` | raster in PDF; vector in PNG only through `-f png` | Apple's baked-in per-layer tints. |\n\nThe matrix is format-sensitive:\n\n| Format | monochrome | hierarchical | palette | multicolor |\n|--------|:----------:|:------------:|:-------:|:----------:|\n| **SVG** | vector | vector | vector | -- |\n| **PDF** | vector | vector | vector | raster in PDF |\n| **PNG** | raster | raster | raster | raster |\n\nSVG multicolor isn't supported. The private vector entry point inside CoreUI crashes when the color-resolver block runs outside of SF Symbols.app's process. For multicolor output, use `-f png`. For vector output with per-layer colors, use `palette` mode.\n\n## Shell completions\n\n`sfsym` ships completion scripts for bash, zsh, and fish. Symbol-name completion is generated at tab time by invoking `sfsym list`, so symbols added by a macOS update are picked up immediately, without regenerating the script.\n\n```sh\n# Zsh\nsfsym completions zsh > ~/.zsh/completions/_sfsym\n# then in ~/.zshrc:\nfpath=(~/.zsh/completions $fpath)\nautoload -U compinit && compinit\n\n# Bash\nsfsym completions bash > /usr/local/etc/bash_completion.d/sfsym\n# or source it inline:\nsource <(sfsym completions bash)\n\n# Fish\nsfsym completions fish > ~/.config/fish/completions/sfsym.fish\n```\n\n## How it works\n\n![architecture](./architecture.svg)\n\n### Rendering pipeline\n\n1. `NSImage(systemSymbolName:)` with an `NSImage.SymbolConfiguration` produces an `NSSymbolImageRep`.\n2. The rep's private `_vectorGlyph` ivar is a `CUINamedVectorGlyph`, Apple's runtime symbol object. It exposes per-layer `CGPath` access and a small set of draw entry points.\n3. For vector output, `sfsym` draws the glyph into a `CGPDFContext`. The resulting PDF content stream consists of path operators (`m`, `l`, `c`, `re`, `f`) with no embedded images.\n4. For SVG, a small PDF interpreter walks those operators, rewrites them as SVG `d` attribute commands, flips the Y axis, and tags each `<path>` with its Apple layer index (for example, `data-layer=\"hierarchical-0\"` or `palette-3`). Downstream tools can restyle the output without touching the geometry.\n5. For PNG, `NSBitmapImageRep` renders at 2x pixel density under `NSAppearance(named: .aqua)` so that multicolor system tints resolve predictably. (Using `.darkAqua` silently mirrors several symbol families — the `tophalf`/`bottomhalf`/`lefthalf`/`righthalf` variants — so the filled half lands on the wrong side of the glyph.)\n\n### Symbol enumeration\n\n`sfsym list` walks the BOM tree inside `CoreGlyphs.bundle/Contents/Resources/Assets.car` and extracts every `FACETKEYS` entry that has an identifier attribute. This is the same file AppKit reads from, so the two enumerations never disagree.\n\n## Output conventions\n\n- **SVG.** Self-contained, with no external CSS. The `viewBox` is `0 0 size size`, a square canvas with the symbol scaled to fit and centered. Path coordinates are in standard SVG space (top-left origin), so `<path>` elements can be lifted directly into JSX or HTML without a wrapper transform. Every `<path>` carries a `fill` attribute (sRGB hex), a `data-layer` attribute (`monochrome-0`, `hierarchical-N`, or `palette-N`), and `fill-opacity` when alpha is less than 1 or when drawing a hierarchical tier. The geometry matches Apple's PDF output exactly.\n- **PDF.** Single page, with a `MediaBox` of `size × size` points. Vector for monochrome, hierarchical, and palette modes. Multicolor output embeds a rasterized image.\n- **PNG.** Square output at `2·size × 2·size` pixels (2x pixel density). Rendered under `aqua` so that dynamic colors resolve and half-filled symbols keep their canonical orientation.\n\n## Comparison\n\n| | sfsym | SF Symbols.app \"Copy as SVG\" | `Image(systemName:)` | Manual export |\n|---|:---:|:---:|:---:|:---:|\n| Works from the command line | Yes | No | No | Varies |\n| Scriptable | Yes | No | No | No |\n| Covers all 8,300+ symbols | Yes | Yes | Yes | Yes |\n| Vector SVG | Yes | Yes | n/a | Yes |\n| Per-mode output | Yes | No (monochrome template only) | No | No |\n| Per-layer data attributes | Yes | No | No | No |\n| Stays current with OS updates | Yes (reads installed bundle) | Yes | Yes | No |\n| AI-agent-compatible | Yes (`schema`, `--json`, stable exit codes) | No | No | No |\n\n## Project structure\n\n```\nsfsym/\n├── Sources/sfsym/\n│   ├── main.swift                   # entry point, error-to-exit-code mapping\n│   ├── CLI.swift                    # argument parsing, usage text, schema\n│   ├── Render.swift                 # PDF, PNG, and SVG orchestration\n│   ├── Glyph.swift                  # CUINamedVectorGlyph KVC wrapper\n│   ├── PdfToSvg.swift               # PDF content-stream interpreter and SVG emitter\n│   ├── AssetsCar.swift              # BOMStore reader for FACETKEYS\n│   ├── Catalog.swift                # name enumeration for sfsym list\n│   ├── Metadata.swift               # categories and search data from SF Symbols.app\n│   └── Completions.swift            # bash, zsh, and fish completion scripts\n├── Sources/harness/\n│   └── main.swift                   # diff harness (48 symbols, modes, formats)\n├── Scripts/\n│   └── install.sh                   # build and copy to ~/.local/bin\n├── Package.swift\n└── demo.svg                         # header animation\n```\n\n## License\n\nMIT. See [LICENSE](./LICENSE).\n\nOutput produced by `sfsym` contains symbols that are property of Apple Inc. Use of SF Symbols is governed by the [SF Symbols License](https://developer.apple.com/support/terms/), which permits their use only in artwork and mockups for apps developed for Apple platforms.\n\nThis project isn't affiliated with Apple Inc. SF Symbols and related marks are trademarks of Apple Inc.\n","summary":"sfsym is a lightweight command‑line utility that extracts Apple SF Symbols into SVG, PDF, or PNG files, using the native macOS renderer to preserve the exact vector geometry of each symbol. It offers a range of customization options—such as colors, sizes, weight, scale, and rendering modes like monochrome, hierarchical, palette, or multicolor—allowing developers to generate appropriately styled assets for their iOS and macOS projects. Designers and UI engineers who need high‑fidelity, export‑ready icon assets can use sfsym without an Xcode project, making it ideal for rapid prototyping or integration into modern development workflows.","description":"Export Apple SF Symbols as SVG","stars":58,"language":"Swift"},{"owner":"dchu917","repo":"ctx","url":"https://github.com/dchu917/ctx","readme":"# ctx\n\nLocal context manager for Claude Code and Codex.\n\nKeep exact conversation bindings, resume work cleanly, branch context without mixing streams, and optionally inspect saved workstreams in a local browser frontend.\n\n```text\nClaude Code chat          Codex chat\n      |                      |\n      v                      v\n   /ctx ...               ctx ...\n          \\              /\n           v            v\n      +----------------------+\n      | workstream: feature-audit |\n      |   claude:  abc123    |\n      |   codex:   def456    |\n      +----------------------+\n                 |\n                 +--> feature-audit-v2 branch\n```\n\n## Why `ctx`\n\n- Exact transcript binding: each internal ctx session can bind to the exact Claude and/or Codex conversation it came from.\n- No transcript drift: later pulls stay on that bound conversation instead of jumping to the newest chat on disk.\n- Safe branching: start a new workstream from the current state of another one without sharing future transcript pulls or hijacking the source conversation.\n- Indexed retrieval: saved workstreams, sessions, and entries are indexed for fast `ctx search` lookup.\n- Curated loads: pin saved entries so they always load, exclude saved entries so they stay searchable but stop getting passed back to the model, or delete them entirely.\n- Local-first: no API keys, no hosted service, plain SQLite plus local files.\n\n## Quick Install\n\nClone the repo and do the standard project-local setup:\n\n```bash\ngit clone https://github.com/dchu917/ctx.git\ncd ctx\n./setup.sh\n```\n\nThis is the main development-friendly install path.\n\nIt does the following:\n\n- creates `./.contextfun/context.db`\n- writes `./ctx.env`\n- installs a repo-backed `ctx` shim into `~/.contextfun/bin`\n- links local skills into `~/.claude/skills` and `~/.codex/skills`\n\nUse this when:\n\n- you want the repo checked out locally\n- you want `ctx` to use a project-local DB by default\n- you are developing or editing the repo itself\n\n## 4-Step Demo\n\n1. Clone and set it up:\n\n```bash\ngit clone https://github.com/dchu917/ctx.git\ncd ctx\n./setup.sh\n```\n\n2. Start a new workstream:\n\nClaude Code:\n\n```text\n/ctx start feature-audit --pull\n```\n\nCodex or your terminal:\n\n```bash\nctx start feature-audit --pull\n```\n\n3. Know what `--pull` means:\n\n- `ctx start feature-audit --pull` creates the workstream and pulls the existing context from the current conversation into it.\n- `ctx start feature-audit` creates the workstream starting from that point only. It does not backfill the earlier conversation.\n\n4. Come back later and continue or branch:\n\nClaude Code:\n\n```text\n/ctx resume feature-audit\n/ctx branch feature-audit feature-audit-v2\n```\n\nCodex:\n\n```bash\nctx resume feature-audit\nctx branch feature-audit feature-audit-v2\n```\n\n## Daily Use\n\nClaude Code:\n\n- `/ctx`: show the current workstream for this repo, or tell you that none is set yet.\n- `/ctx list`: list saved workstreams, with this repo first when applicable.\n- `/ctx search dataset download`: search saved workstreams and entries for matching context.\n- `/ctx start my-stream --pull`: create a new workstream and pull the existing context from the current conversation into it before continuing.\n- `/ctx resume my-stream`: continue an existing workstream and append new context from this conversation to it.\n- `/ctx rename better-name`: rename the current workstream.\n- `/ctx rename better-name --from old-name`: rename a specific workstream without switching to it first.\n- `/ctx delete my-stream`: delete the latest saved `ctx` session in that workstream.\n- `/ctx curate my-stream`: open the saved-memory curation UI for that workstream.\n- `/ctx branch source-stream target-stream`: create a new workstream seeded from the current saved state of another one.\n- `/branch source-stream target-stream`: Claude shortcut for the same branch operation.\n\nCodex:\n\n- `ctx`: show the current workstream for this repo, or tell you that none is set yet.\n- `ctx list`: list saved workstreams.\n- `ctx list --this-repo`: list only workstreams linked to the current repo.\n- `ctx search dataset download`: search saved workstreams and entries for matching context.\n- `ctx search dataset download --this-repo`: search only workstreams linked to the current repo.\n- `ctx web --open`: open the optional local browser UI for browsing, searching, and copying continuation commands.\n- `ctx start my-stream`: create a new workstream starting from this point only.\n- `ctx start my-stream --pull`: create a new workstream and pull the existing context from the current conversation into it first.\n- `ctx resume my-stream`: continue an existing workstream.\n- `ctx resume my-stream --compress`: continue an existing workstream with a smaller load pack.\n- `ctx rename better-name`: rename the current workstream.\n- `ctx rename better-name --from old-name`: rename a specific workstream without switching to it first.\n- `ctx delete my-stream`: delete the latest saved `ctx` session in that workstream.\n- `ctx curate my-stream`: open the saved-memory curation UI for that workstream.\n- `ctx branch source-stream target-stream`: create a new workstream seeded from the current saved state of another one.\n\nCodex note:\n\nCodex does not currently support repo-defined custom slash commands like `/ctx list`, so in Codex you should use the installed `ctx` command with subcommands. When `ctx start`, `ctx resume`, or `ctx branch` load context, they print a short summary of what the workstream is, the latest session being targeted, and the most recent items. They also include an explicit hint that in Codex you can inspect the full command output with `ctrl-t`, and in Claude you can expand the tool output block, plus guidance for the agent to summarize briefly and ask how you want to proceed instead of pasting the full pack back.\n\n## Other Installation Paths\n\n### Clone the repo and install a shared global setup from that clone\n\n```bash\ngit clone https://github.com/dchu917/ctx.git\ncd ctx\n./setup.sh --global\n```\n\nThis runs the same quickstart entrypoint, but installs the pinned global release into `~/.contextfun` instead of wiring the current clone as the live runtime.\n\n### Install globally without cloning first\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/dchu917/ctx/main/scripts/install.sh | bash\n```\n\nThis installs a pinned tagged release into `~/.contextfun`, including the `ctx` binary, the Python package, the default DB, and the self-contained Claude/Codex skills.\n\n### Install the bootstrap skill first with `skills.sh`\n\n```bash\nnpx skills add https://github.com/dchu917/ctx --skill ctx -y -g\n```\n\nThis installs the `ctx` bootstrap skill first, not the CLI binary directly. After that, the bundled `skills/ctx/scripts/ctx.sh` wrapper can run `ctx install` or auto-install the global CLI into `~/.contextfun` on first use.\n\n### Bootstrap an agent shell without a full manual clone flow\n\nGlobal shell bootstrap:\n\n```bash\nsource <(curl -fsSL https://raw.githubusercontent.com/dchu917/ctx/main/scripts/agent_bootstrap.sh)\n```\n\nProject-local shell bootstrap:\n\n```bash\nsource <(curl -fsSL https://raw.githubusercontent.com/dchu917/ctx/main/scripts/agent_setup_local_ctx.sh)\n```\n\nThese are best for Claude Code or Codex terminals.\n\n### Advanced manual wiring after cloning\n\nRepo-backed `ctx` shim:\n\n```bash\nbash scripts/install_shims.sh\n```\n\nSkill links only:\n\n```bash\nbash scripts/install_skills.sh\n```\n\nOverride skill directories if needed:\n\n```bash\nCODEX_SKILLS_DIR=/custom/codex/skills \\\nCLAUDE_SKILLS_DIR=/custom/claude/skills \\\nbash scripts/install_skills.sh\n```\n\n## Documentation\n\n- [Install and Remove](docs/install.md)\n- [Usage](docs/usage.md)\n- [Architecture](docs/architecture.md)\n- [Integrations](docs/integrations.md)\n- [Repo Layout](docs/repo-layout.md)\n- [Maintenance and Release](docs/maintenance.md)\n- [Documentation Index](docs/README.md)\n\n## Curate Saved Memory\n\nUse `ctx curate <workstream>` to review the saved entries that feed future loads for a workstream:\n\n```bash\nctx curate my-stream\n```\n\nThe terminal UI lets you scroll saved entries, inspect a preview, and change how each entry behaves in future packs:\n\n- `j` / `k` or arrow keys move through entries\n- `Enter` toggles a larger preview\n- `p` pins an entry so it always loads, even in compressed mode\n- `x` excludes an entry from future loads, but keeps it saved and searchable\n- `a` restores the default load behavior\n- `d` marks an entry for deletion, then `y` confirms the delete\n- `q` exits\n\nNotes:\n\n- This changes ctx memory only. It does not edit or delete the original Claude/Codex chat.\n- If you are in a non-interactive shell, use `ctx web --open` and manage entries from the browser detail page instead.\n- `ctx delete --interactive <workstream>` opens the same curation UI.\n- See [docs/usage.md](docs/usage.md) and [docs/architecture.md](docs/architecture.md) for deeper detail on load controls.\n\n## Clear Workstreams\n\nUse `ctx clear` to delete whole workstreams together with their linked sessions and saved entries:\n\n```bash\nctx clear --this-repo --yes\nctx clear --all --yes\n```\n\nNotes:\n\n- `--this-repo` deletes only workstreams linked to the current repo.\n- `--all` deletes workstreams across the entire current `ctx` DB.\n- `--yes` is required for the actual delete. Without it, `ctx` prints what would be removed and exits without deleting anything.\n- This clears ctx-managed memory, attachments, and current-workstream pointers for the deleted workstreams. It does not delete the original Claude/Codex chat files.\n\n## Security\n\n`ctx` is a context layer, not a sandbox. See [SECURITY.md](SECURITY.md) for the threat-model summary and [docs/maintenance.md](docs/maintenance.md) for operational notes.\n\n## FAQ\n\nDo I need API keys?\n\n- No. Everything is local.\n\nCan multiple repos share the same context DB?\n\n- Yes. Set `ctx_DB` to a shared path such as `~/.contextfun/context.db`.\n\nDoes deleting a ctx session delete the actual Claude/Codex chat?\n\n- No. It only deletes the internal ctx session and its stored attachments.\n\n## License\n\nMIT. See [LICENSE](LICENSE).\n","summary":"`ctx` is a local context manager that lets Claude Code and Codex users keep precise transcripts of their conversations and organize them into named *workstreams*.  It binds each session to the exact chat it originated from, prevents transcript drift, supports branching new workstreams from existing ones, and provides indexed search and curation tools—all stored in a local SQLite database without API keys.  The tool offers a simple CLI/shim for creating, resuming, branching, renaming, and deleting workstreams, as well as a browser‑based UI to inspect saved content.  Developers who build or collaborate on code with Claude or Codex will benefit from cleaner context tracking and easier reuse of prior interactions.","description":"Local context manager for Claude Code and Codex with workstreams, transcript binding, and branching.","stars":117,"language":"Python"},{"owner":"agzam","repo":"remoto.el","url":"https://github.com/agzam/remoto.el","readme":"#+TITLE: El Remoto\n\n#+HTML: <p align=\"center\"><img src=\"./test/el-remoto-logo.png\" alt=\"El Remoto logo\"/></p>\n\n[[https://github.com/agzam/remoto.el/actions/workflows/run-tests.yml][https://github.com/agzam/remoto.el/actions/workflows/run-tests.yml/badge.svg]]\n\n#+begin_quote\nEl Remoto - browse any GitHub repository in Emacs without cloning it.\n#+end_quote\n\n* What\n\n[[./test/demo.gif]]\n\nremoto.el registers a virtual filesystem via ~file-name-handler-alist~ that translates standard Emacs file operations into GitHub API calls via the ~ghub~ library. The result: ~find-file~, ~dired~, tab-completion, ~dired-subtree~ - all standard Emacs file tooling works against a remote GitHub repo. Read-only.\n\n* Why\n\nSometimes you just want to look at code. Check a function signature, read a README, browse a project structure. Cloning a repo for that is overkill - it takes disk space, creates another directory to manage, and breaks your flow.\n\n* Where\n\nFor now it works only with GitHub repos. Future plans include support for other forges - GitLab, Codeberg, etc.\n\n* How\n** use-package + straight\n\nYou need to load the package so it can register its file handler and advice.\n\n#+begin_src emacs-lisp\n(use-package remoto\n  :straight (:host github :repo \"agzam/remoto.el\")\n  :demand t)\n#+end_src\n\nThe package is not on MELPA yet. Maybe upvote the [[https://github.com/melpa/melpa/pull/9978][submission PR]], who knows, perhaps it gets accepted faster.\n\n** Usage\n\n*** remoto-browse\n\nThe main entry point. Accepts any GitHub URL format:\n\n#+begin_src emacs-lisp\nM-x remoto-browse RET https://github.com/torvalds/linux RET\nM-x remoto-browse RET git@github.com:torvalds/linux.git RET\nM-x remoto-browse RET torvalds/linux RET\n#+end_src\n\n*** C-x d / C-x C-f\n\nGitHub URLs are detected automatically in ~dired~ and ~find-file~:\n\n#+begin_src emacs-lisp\nC-x d /github.com/torvalds/linux RET\nC-x C-f https://github.com/torvalds/linux/blob/master/README RET\n#+end_src\n\n*** find-file completion\n\nThe ~/github:~ prefix enables multi-level completion directly in ~find-file~ (~C-x C-f~). Type ~/github:~ and then narrow through users, repos, branches, and files:\n\n#+begin_example\n/github:tor         -> users/orgs matching \"tor\" (torvalds/, torgeirhelge/, ...)\n/github:torvalds/   -> repos (linux, subsurface, ...)\n/github:torvalds/lin -> filters repos starting with \"lin\"\n/github:torvalds/linux@        -> branches (master, ...)\n/github:torvalds/linux@master: -> file-level completion within the repo\n#+end_example\n\nHitting RET on ~/github:owner/repo~ (without ~@branch~) opens the repo with its default branch. User search requires at least 2 characters.\n\n*** Canonical paths\n\nThe virtual filesystem uses paths of the form:\n\n#+begin_example\n/github:OWNER/REPO@REF:/PATH\n#+end_example\n\n~REF~ is optional - omitting it uses the repo's default branch.\n\n*** Commands\n\n| Command                  | Description                                            |\n|--------------------------+--------------------------------------------------------|\n| ~remoto-browse~          | Prompt for a repo, open dired at root                  |\n| ~remoto-refresh~         | Clear tree cache for current repo, re-fetch            |\n| ~remoto-copy-github-url~ | Copy ~github.com~ URL for current file/line to kill ring |\n\n** How it works\n\n1. On first access to any file in a repo, the full directory tree is fetched via the Git Trees API (one HTTP call).\n2. Directory listings, ~file-exists-p~, completions - all served from the cached tree in memory.\n3. File contents are fetched on demand when you actually open a file.\n4. Content is cached by SHA, so re-opening the same file is instant.\n5. Authentication, SSO, private repos - all handled transparently by ~ghub~.\n\n** FAQ\n*** Why this isn't a [[https://www.gnu.org/software/emacs/manual/html_node/tramp/][TRAMP]] backend?\n- TRAMP fundamentally is a shell-over-transport abstraction. Every TRAMP backend assumes a remote shell on the other end, remoto.el has no remote shell.\n- TRAMP's backend API is large. You'd need to implement or stub dozens of operations, many of which assume concepts that don't map to a REST API (process execution, file ownership, symlink resolution, timestamps).\n- TRAMP's connection management (open/close/reuse) is built around persistent sessions. The GitHub API is stateless HTTP - there's no connection to manage.\n- TRAMP's caching layer is path-based and per-connection. remoto's tree cache (one API call fetches the entire repo tree, then everything is served from memory) is a fundamentally different - and much more efficient - model for a read-only tree-structured API.\n- =file-name-handler-alist= IS the same mechanism TRAMP uses. Registering there directly gives you the same integration (dired, find-file, completions) without the framework overhead.\n  \nFor a read-only tree browser backed by a REST API, a direct file-name-handler is the simpler, more natural fit\n\n*** Why not just use plain HTTP?\n\nGit's own protocols let you talk to a remote repo without cloning it, so why not use that, right?\n\n- Tree listing. There's no raw HTTP URL that gives you a directory listing. raw.githubblabla.com can't do directory indexes. You'd have to shell out to =git ls-tree ... etc.= over the ssh, which means essentially implementing a partial git client.\n\n- Branch listing and repo search - no git protocol equivalent for those - need the API\n\n- Current approach fetches the entire tree in one API call. Doing the same over git pack protocol means negotiating a fetch, receiving packfile data and parsing it. Much heavier, much more code.\n\nWe can only imagine a world where git's transport layer gives you a browsable filesystem interface. It doesn't - git's protocols are optimized for syncing object graphs, not random-access file browsing.\n\n** Limitations\n\n- Read-only. No commits, no pushes, no file modifications. You still can copy them out.\n- No git operations (log, blame, diff).\n- Timestamps in dired are synthetic (the tree API has no timestamps).\n- Very large repos (100k+ files) use slower per-directory fetching.\n- Rate limit: 5,000 requests/hour (normal browsing stays well within this).\n- Repo completion at ~/github:owner/~ shows the 30 most recently updated repos on empty input. Typing narrows via the GitHub search API.\n\n* Changelog\n\nSee [[file:changelog.org][changelog.org]] for a detailed list of changes and version history.\n\n* License\nCopyright © 2026 Ag Ibragimov\n\nGPL-3.0-or-later. See [[file:LICENSE][LICENSE]].\n","summary":"El Remoto is an Emacs package that creates a virtual file system backed by the GitHub API, allowing users to explore any GitHub repository directly from within Emacs without cloning it. It registers a file‑handler that translates ordinary Emacs file operations—such as `find-file`, `dired`, and completion—into API calls, caching directory trees and file contents for quick, read‑only access. Key features include convenient repository browsing with `remoto-browse`, automatic path detection in dired and find-file, multi‑level autocompletion for users, repos, branches, and files, and transparent authentication via `ghub`. The package is ideal for developers, code reviewers, and quick reference seekers who need to inspect project structure or source code on the fly without the overhead of a full clone.","description":"Browse GitHub repos without cloning","stars":58,"language":"Emacs Lisp"},{"owner":"sachitrafa","repo":"YourMemory","url":"https://github.com/sachitrafa/YourMemory","readme":"<!-- mcp-name: io.github.sachitrafa/yourmemory -->\n<div align=\"center\">\n\n# YourMemory\n\n**Persistent memory for AI agents — built on the science of how humans remember.**\n\n[![PyPI](https://img.shields.io/pypi/v/yourmemory?color=blue&logo=pypi&logoColor=white)](https://pypi.org/project/yourmemory/)\n[![PyPI Downloads](https://img.shields.io/pypi/dm/yourmemory?color=brightgreen)](https://pypi.org/project/yourmemory/)\n[![License: CC BY-NC 4.0](https://img.shields.io/badge/license-CC%20BY--NC%204.0-lightgrey)](https://creativecommons.org/licenses/by-nc/4.0/)\n[![LoCoMo Recall@5](https://img.shields.io/badge/LoCoMo%20Recall%405-59%25-brightgreen)](BENCHMARKS.md)\n[![LongMemEval Recall@5](https://img.shields.io/badge/LongMemEval%20Recall--all%405-85%25-brightgreen)](BENCHMARKS.md)\n[![Docker Build](https://img.shields.io/github/actions/workflow/status/sachitrafa/YourMemory/docker-publish.yml?branch=main&label=docker&logo=docker)](https://github.com/sachitrafa/YourMemory/actions/workflows/docker-publish.yml)\n\n</div>\n\n---\n\n## The Problem\n\nEvery session, your AI assistant starts from zero. It asks the same questions, forgets your preferences, re-learns your stack. There is no memory between conversations.\n\n**YourMemory fixes that.** It gives AI agents a persistent memory layer that works the way human memory does — important things stick, forgotten things fade, outdated facts get replaced automatically. One command to install, zero infrastructure required. Memory starts working the moment you add it to your AI client.\n\n---\n\n## How Well Does It Work?\n\n### LoCoMo-10 — 1,534 QA pairs across 10 multi-session conversations\n\n| System | Recall@5 | 95% CI |\n|--------|:--------:|:------:|\n| **YourMemory** (BM25 + vector + graph + decay) | **59%** | 56–61% |\n| Zep Cloud | 28% | 26–30% |\n\n> **2× better recall than Zep Cloud on the same benchmark.**\n\n*The 59% result used `all-mpnet-base-v2`. The current default model (`multi-qa-mpnet-base-dot-v1`) scores 55% on LoCoMo session-summary retrieval — see [BENCHMARKS.md](BENCHMARKS.md) for details.*\n\n### LongMemEval-S — 500 questions, ~53 sessions each\n\n| System | Recall-all@5 | nDCG@5 |\n|--------|:------------:|:------:|\n| **YourMemory** (full stack · `multi-qa-mpnet-base-dot-v1`) | **85%** | **87%** |\n\nFull methodology in [BENCHMARKS.md](BENCHMARKS.md). Writeup: [I built memory decay for AI agents using the Ebbinghaus forgetting curve](https://dev.to/sachit_mishra_686a94d1bb5/i-built-memory-decay-for-ai-agents-using-the-ebbinghaus-forgetting-curve-1b0e).\n\n---\n\n## Quick Start\n\n**Supports Python 3.11–3.14. No Docker, no database setup, no external services.**\n\n### Step 1 — Install\n\n```bash\npip install yourmemory\n```\n\n### Step 2 — Get your config path\n\n```bash\nyourmemory-path\n```\n\nPrints your full executable path and a ready-to-paste config block. Copy it.\n\n### Step 3 — Wire into your AI client\n\n<details>\n<summary><strong>Claude Code</strong></summary>\n\nAdd to `~/.claude/settings.json`:\n\n```json\n{\n  \"mcpServers\": {\n    \"yourmemory\": {\n      \"command\": \"yourmemory\"\n    }\n  }\n}\n```\n\nReload (`Cmd+Shift+P` → `Developer: Reload Window`).\n\n</details>\n\n<details>\n<summary><strong>Claude Desktop</strong></summary>\n\nAdd to `~/Library/Application Support/Claude/claude_desktop_config.json` (macOS) or `%APPDATA%\\Claude\\claude_desktop_config.json` (Windows):\n\n```json\n{\n  \"mcpServers\": {\n    \"yourmemory\": {\n      \"command\": \"yourmemory\"\n    }\n  }\n}\n```\n\nRestart Claude Desktop.\n\n</details>\n\n<details>\n<summary><strong>Cline (VS Code)</strong></summary>\n\nVS Code doesn't inherit your shell PATH. Run `yourmemory-path` first to get the full executable path.\n\nIn Cline → **MCP Servers** → **Edit MCP Settings**:\n\n```json\n{\n  \"mcpServers\": {\n    \"yourmemory\": {\n      \"command\": \"/full/path/to/yourmemory\",\n      \"args\": [],\n      \"env\": { \"YOURMEMORY_USER\": \"your_name\" }\n    }\n  }\n}\n```\n\nRestart Cline after saving.\n\n</details>\n\n<details>\n<summary><strong>Cursor</strong></summary>\n\nAdd to `~/.cursor/mcp.json`:\n\n```json\n{\n  \"mcpServers\": {\n    \"yourmemory\": {\n      \"command\": \"/full/path/to/yourmemory\",\n      \"args\": [],\n      \"env\": { \"YOURMEMORY_USER\": \"your_name\" }\n    }\n  }\n}\n```\n\n</details>\n\n<details>\n<summary><strong>Windsurf / OpenCode / any MCP client</strong></summary>\n\nYourMemory is a standard stdio MCP server. Use the full path from `yourmemory-path` if the client doesn't inherit shell PATH.\n\n```json\n{\n  \"mcpServers\": {\n    \"yourmemory\": {\n      \"command\": \"/full/path/to/yourmemory\",\n      \"env\": { \"YOURMEMORY_USER\": \"your_name\" }\n    }\n  }\n}\n```\n\n</details>\n\n> **First start is automatic.** On the first run, YourMemory initialises your database, downloads the language model, and injects memory workflow instructions into your AI client config — no manual setup needed.\n\n### Step 4 — Start remembering\n\nThat's it. On the first MCP start, YourMemory automatically:\n- Initialises your local database at `~/.yourmemory/memories.duckdb`\n- Downloads the spaCy language model in the background\n- Injects the memory workflow rules into your AI client\n\nYour AI now recalls what it learned in previous sessions, without you telling it to.\n\n---\n\n## Memory Dashboard\n\nEvery YourMemory instance ships with a built-in browser UI. When the MCP server is running, open:\n\n```\nhttp://localhost:3033/ui\n```\n\nBrowse your memories by agent, filter by category, sort by strength, and see which memories are fading.\n\n<details>\n<summary><strong>What you'll see</strong></summary>\n\n- **Strength bars** — how close each memory is to being pruned\n- **Agent tabs** — switch between All / User / per-agent views\n- **Category badges** — fact · strategy · assumption · failure\n- **Stats** — total, strong (≥ 50%), fading (5–50%), near prune (< 10%)\n\n</details>\n\n---\n\n## MCP Tools\n\nThree tools, called by your AI automatically.\n\n| Tool | When | What it does |\n|------|------|--------------|\n| `recall_memory(query, current_path?)` | Start of every task | Surfaces relevant memories ranked by similarity × strength; boosts spatially matched memories |\n| `store_memory(content, importance, context_paths?)` | After learning something new | Embeds and stores with biological decay; tags optional file/dir paths for spatial recall |\n| `update_memory(id, new_content)` | When a memory is outdated | Re-embeds and replaces; logs old content to audit trail |\n\n```python\n# Store with spatial context\nstore_memory(\"Sachit prefers tabs over spaces in Python\", importance=0.9, category=\"fact\",\n             context_paths=[\"/projects/backend\"])\n\n# Next session — spatial boost applied when working in that path:\nrecall_memory(\"Python formatting\", current_path=\"/projects/backend\")\n# → {\"content\": \"Sachit prefers tabs over spaces in Python\", \"strength\": 0.87, \"score\": 0.81}\n```\n\n### Categories control how fast memories fade\n\n| Category | Survives without recall | Use case |\n|----------|------------------------|----------|\n| `strategy` | ~38 days | Successful patterns |\n| `fact` | ~24 days | Preferences, identity |\n| `assumption` | ~19 days | Inferred context |\n| `failure` | ~11 days | Errors, environment-specific issues |\n\n---\n\n## How It Works\n\n### Ebbinghaus Forgetting Curve\n\nMemory strength decays exponentially — importance and recall frequency slow that decay:\n\n```\neffective_λ  = base_λ × (1 - importance × 0.8)\nstrength     = clamp(importance × e^(−effective_λ × active_days) × (1 + recall_count × 0.2), 0, 1)\nhybrid_score = 0.4 × bm25_norm + 0.6 × cosine_similarity\n```\n\n`active_days` counts only days the user was active — vacations don't cause memory loss. Decay is used for pruning only, not ranking. Memories below strength `0.05` are pruned automatically every 24 hours.\n\n**Session wrap-up scoring:** recalled memory IDs are tracked per session and get a recall_count boost when the session goes idle (30 min default). Set `YOURMEMORY_SESSION_IDLE` to change the window.\n\n**Recall throttling:** identical (user, query) pairs are cached to avoid redundant retrieval within a configurable window. Set `YOURMEMORY_RECALL_COOLDOWN` (seconds, default 0 = off).\n\n### Hybrid Retrieval: Vector + BM25 + Graph\n\nRetrieval runs in two rounds to surface related context that vocabulary-based search misses:\n\n**Round 1 — Hybrid search:** cosine similarity + BM25 keyword scoring, returns top-k above threshold.\n\n**Round 2 — Graph expansion:** BFS traversal from Round 1 seeds surfaces memories that share context but not vocabulary — connected via semantic edges (cosine similarity ≥ 0.4).\n\n```\nrecall(\"Python backend\")\n  Round 1 → [1] Python/MongoDB    (sim=0.61)\n             [2] DuckDB/spaCy     (sim=0.19)\n  Round 2 → [5] Docker/Kubernetes (sim=0.29 — below cut-off, surfaced via graph)\n```\n\n**Chain-aware pruning:** A decayed memory is kept alive if any graph neighbour is above the prune threshold. Related memories age together.\n\n---\n\n## Multi-Agent Memory\n\nMultiple agents can share the same YourMemory instance — each with isolated private memories and controlled access to shared context.\n\n```python\nfrom src.services.api_keys import register_agent\n\nresult = register_agent(\n    agent_id=\"coding-agent\",\n    user_id=\"sachit\",\n    can_read=[\"shared\", \"private\"],\n    can_write=[\"shared\", \"private\"],\n)\n# → result[\"api_key\"]  — ym_xxxx, shown once only\n```\n\nPass `api_key` to any MCP call to authenticate as an agent:\n\n```python\nstore_memory(content=\"Staging uses self-signed cert — skip SSL verify\",\n             importance=0.7, category=\"failure\",\n             api_key=\"ym_xxxx\", visibility=\"private\")\n\nrecall_memory(query=\"staging SSL\", api_key=\"ym_xxxx\")\n# → returns shared memories + this agent's private memories\n# → other agents see shared only\n```\n\n---\n\n## Stack\n\n| Component | Role |\n|-----------|------|\n| **DuckDB** | Default vector DB — zero setup, native cosine similarity |\n| **NetworkX** | Default graph backend — persists at `~/.yourmemory/graph.pkl` |\n| **sentence-transformers** | Local embeddings (`multi-qa-mpnet-base-dot-v1`, 768 dims) |\n| **spaCy** | Local NLP for deduplication and SVO triple extraction |\n| **APScheduler** | Automatic 24h decay job |\n| **PostgreSQL + pgvector** | Optional — for teams or large datasets |\n| **Neo4j** | Optional graph backend — `pip install 'yourmemory[neo4j]'` |\n\n<details>\n<summary><strong>PostgreSQL setup (optional)</strong></summary>\n\n```bash\npip install yourmemory[postgres]\n```\n\nCreate a `.env` file:\n\n```bash\nDATABASE_URL=postgresql://YOUR_USER@localhost:5432/yourmemory\n```\n\n**macOS**\n```bash\nbrew install postgresql@16 pgvector && brew services start postgresql@16\ncreatedb yourmemory\n```\n\n**Ubuntu / Debian**\n```bash\nsudo apt install postgresql postgresql-contrib postgresql-16-pgvector\ncreatedb yourmemory\n```\n\n</details>\n\n---\n\n## Architecture\n\n```\nClaude / Cline / Cursor / Any MCP client\n    │\n    ├── recall_memory(query, current_path?, api_key?)\n    │       └── throttle check (YOURMEMORY_RECALL_COOLDOWN)\n    │               embed → vector similarity (Round 1)\n    │               → graph BFS expansion  (Round 2)\n    │               → score = sim × strength → top-k\n    │               → spatial boost (+0.08) if current_path matches context_paths\n    │               → session tracking → recall_count bump on session end\n    │\n    ├── store_memory(content, importance, category?, context_paths?, visibility?, api_key?)\n    │       └── question? → reject\n    │               contradiction check → update if conflict\n    │               embed() → INSERT → index_memory() → graph node + edges\n    │               record_activity(user_id) → active days log\n    │\n    └── update_memory(id, new_content, importance)\n            └── log old content → memory_history (audit trail)\n                    embed(new_content) → UPDATE → refresh graph node\n\n  Vector DB (Round 1)             Graph DB (Round 2)\n  DuckDB (default)                NetworkX (default)\n    memories.duckdb                 graph.pkl\n    ├── embedding FLOAT[768]        ├── nodes: memory_id, strength\n    ├── importance FLOAT            └── edges: sim × verb_weight ≥ 0.4\n    ├── recall_count INTEGER\n    ├── context_paths JSON        Neo4j (opt-in)\n    ├── visibility VARCHAR          └── bolt://localhost:7687\n    ├── agent_id VARCHAR\n    user_activity (active days log)\n    memory_history (supersession audit)\n```\n\n---\n\n## Contributing\n\nPRs are welcome. See [CONTRIBUTORS.md](CONTRIBUTORS.md) for the people who have already improved YourMemory.\n\n---\n\n## Dataset Reference\n\nBenchmarks use the [LoCoMo](https://github.com/snap-research/locomo) dataset by Snap Research.\n\n> Maharana et al. (2024). *LoCoMo: Long Context Multimodal Benchmark for Dialogue.* Snap Research.\n\n---\n\n## License\n\nCopyright 2026 **Sachit Misra** — Licensed under [CC-BY-NC-4.0](LICENSE).\n\n**Free for:** personal use, education, academic research, open-source projects.  \n**Not permitted:** commercial use without a separate written agreement.\n\nCommercial licensing: mishrasachit1@gmail.com\n","summary":"YourMemory adds a human‑like, persistent memory layer to AI agents, letting them retain preferences and facts between sessions without any external database or cloud service. It combines BM25 retrieval, dense vectors, a graph‑based context store, and an Ebbinghaus‑inspired forgetting curve to keep important information while fading outdated details, achieving 59 % recall on LoCoMo and 85 % on LongMemEval. The package ships with a single pip install, zero infrastructure, and turnkey integration for Claude, VS Code, Cursor, and other MCP‑compatible tools. It is ideal for developers building personal assistants, chatbots, or any AI application that requires reliable, long‑term memory without cloud dependencies.","description":"Agentic AI memory with Ebbinghaus forgetting curve decay. +16pp better recall than Mem0 on LoCoMo.","stars":210,"language":"Python"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
