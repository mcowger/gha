                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   |\n| Bedrock                   | 101 | Foundation models, guardrails, custom models, invocation/eval jobs                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       |\n| Bedrock Runtime           | 10  | InvokeModel, Converse, streaming, configurable responses, fault inject                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   |\n| ECR                       | 58  | Full API — OCI v2 push/pull, lifecycle, scanning, registry, pull-through                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 |\n| ECS                       | 60  | **Full API** — clusters, task definitions, real task execution, services + rolling deployments, container instances, capacity providers, task sets, ECS Exec                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             |\n| Elastic Load Balancing v2 | 51  | ALB/NLB/GWLB CRUD: load balancers, target groups + targets + real health probes, **listeners + rules + certificates**, LB/listener/target-group attributes, capacity reservations, **mTLS trust stores + revocations**, SSL policies, resource policies, tags. **In-process HTTP data plane** for ALBs — per-LB TCP bind, rule matching, forward / fixed-response / redirect, sticky sessions, X-Forwarded-\\* headers                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    |\n| CloudFront                | 147 | Distributions + invalidations + tagging + by-X listings + web ACL/alias association. OAC + Cache/OriginRequest/ResponseHeaders/ContinuousDeployment policies. CloudFront Functions, Public Keys, Key Groups, Key Value Stores, OAIs (legacy), Monitoring Subscriptions. Streaming Distributions (legacy RTMP). Field-Level Encryption configs + profiles + Realtime Log Configs. VPC Origins, Anycast IP Lists, Trust Stores, Resource Policies. **Connection Groups + Domain Association/DNS Verification + Managed Certificate Details + Promote-Staging Distribution** — full CRUD with ETag/If-Match concurrency. REST-XML protocol, full `DistributionConfig` round-trip incl. origins, cache behaviors, custom error responses, viewer certificates, geo restrictions                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              |\n| Route 53                  | 71  | **Full control plane.** **Hosted zones + RRsets + health checks + traffic policies + DNSSEC + KSK + query logging + CIDR collections + VPC associations + reusable delegation sets + geo locations + account limits + tags** — CRUD, default SOA/NS seeding, `INSYNC` change tracking, hosted zone limits, list-by-name, `TestDNSAnswer`. **Health checks**: full lifecycle, `HealthCheckVersion` optimistic concurrency, `ResetElements`, `HealthCheckInUse` on delete, checker IP ranges. **Traffic policies + instances**: versioned policies, `TrafficPolicyAlreadyExists`/`InUse`, `TrafficPolicyInstanceAlreadyExists`, list-by-zone/by-policy. **DNSSEC + KSK**: enable/disable signing, `CreateKeySigningKey` with KMS-ARN, activate/deactivate, `InvalidKeySigningKeyStatus` blocks delete-while-active. **Query logging**: one config per zone, public-zone-only, CloudWatch Logs ARN. **CIDR collections**: PUT/DELETE_IF_EXISTS atomic changes, `CollectionVersion` optimistic concurrency, `CidrCollectionInUseException` on delete-with-locations. **VPC associations**: associate/disassociate (private-zone only, last-VPC removal blocked), `CreateVPCAssociationAuthorization` + revoke + list, `ListHostedZonesByVPC`. **Reusable delegation sets**: 4-NS synthesis, in-use protection on delete, `MAX_ZONES_BY_REUSABLE_DELEGATION_SET` limit. **Geo locations + account limits + tags**: `ListGeoLocations`/`GetGeoLocation` over a representative dataset (continents + sample countries + US subdivisions), `GetAccountLimit` for all 5 owner-scoped types, full tag CRUD on health checks + hosted zones via `ChangeTagsForResource`/`ListTagsForResource`/`ListTagsForResources`. REST-XML under `/2013-04-01/` |\n| WAF v2                    | 55  | **Full control plane.** WebACLs / RuleGroups / IPSets / RegexPatternSets — Create/Get/List/Update/Delete with `LockToken` optimistic concurrency (`WAFOptimisticLockException` on stale tokens, fresh token returned on every mutation). REGIONAL + CLOUDFRONT scope segmentation. ARN-keyed `WebACL <-> resource` associations (`AssociateWebACL`/`DisassociateWebACL`/`GetWebACLForResource`/`ListResourcesForWebACL`). `WAFAssociatedItemException` on delete-while-associated for WebACLs and delete-while-referenced for RuleGroups. **`CheckCapacity`** computes WCU as recursive count of statement leaves through `AndStatement`/`OrStatement`/`NotStatement` composition. **API keys** via `CreateAPIKey`/`DeleteAPIKey`/`GetDecryptedAPIKey`/`ListAPIKeys` — round-trip the configured `TokenDomains`. **Logging configurations** (`Put`/`Get`/`Delete`/`List`) keyed by WebACL ARN. **Permission policies** (`Put`/`Get`/`Delete`) on RuleGroups for cross-account share. **Tags** with `WAFNonexistentItemException` on unknown ARNs. **Managed rule groups + sets**: read-only AWS catalog (Common, KnownBadInputs, SQLi), `DescribeAllManagedProducts`, `DescribeManagedProductsByVendor`, `DescribeManagedRuleGroup`, `ListAvailableManagedRuleGroups`/`ListAvailableManagedRuleGroupVersions`, `GetManagedRuleSet`, vendor-side `PutManagedRuleSetVersions`/`UpdateManagedRuleSetVersionExpiryDate`. **Mobile SDK release** lookups + presigned download URL synthesis. `GetSampledRequests`, `GetTopPathStatisticsByTraffic`, `GetRateBasedStatementManagedKeys` return empty observability stubs. JSON 1.1 protocol                                                                                                    |\n| Application Auto Scaling  | 14  | **Full control plane.** Scalable targets (`Register`/`Deregister`/`Describe`) for ECS, Lambda, DynamoDB, RDS, ElastiCache, SageMaker, EMR, AppStream, Cassandra, Kafka, Neptune, EC2 Spot Fleet, Comprehend. Step + target-tracking + predictive scaling policies (`Put`/`Describe`/`Delete`). Scheduled actions with cron / one-shot start/end times + `Timezone`. `DescribeScalingActivities` (`IncludeNotScaledActivities`), deterministic `GetPredictiveScalingForecast` with hourly Load + Capacity buckets. `RoleARN` defaults to the per-namespace service-linked role ARN. `Deregister` cascades to policies + scheduled actions for that target. `TagResource`/`UntagResource`/`ListTagsForResource` keyed by ARN. JSON 1.1 protocol                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            |\n| Athena                    | 70  | **Full control plane.** Workgroups (default `primary` seeded), Data Catalogs (default `AwsDataCatalog` seeded), Named Queries, Prepared Statements (keyed by `(workgroup, statement_name)`), Query Executions, Notebooks, Sessions + Calculations, Capacity Reservations + Capacity Assignment Configuration. `StartQueryExecution` synthesizes a SUCCEEDED execution with a single-row `[[\"1\"]]` result so callers can immediately fetch via `GetQueryResults` without polling. `DeleteWorkGroup` rejects `primary` and refuses non-empty workgroups unless `RecursiveDeleteOption=true`. `DeleteDataCatalog` rejects `AwsDataCatalog`. Statement classification (DML / DDL / UTILITY) from leading SQL keyword. Tags keyed by ARN across workgroup / datacatalog / capacity-reservation resources. `ListEngineVersions` / `ListApplicationDPUSizes` / `ListExecutors` / `GetResourceDashboard` return read-only catalog data. JSON 1.1 protocol                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        |\n| ACM (Certificate Manager) | 17  | **Full control plane.** Public-cert lifecycle: `RequestCertificate` (DNS / EMAIL validation, deterministic synthesized DNS validation records), `DescribeCertificate`, `GetCertificate`, `ListCertificates`, `SearchCertificates`, `DeleteCertificate`, `RenewCertificate`, `RevokeCertificate` (AMAZON_ISSUED only). Imported certs: `ImportCertificate` (round-trips PEM, supports re-import to same ARN), `ExportCertificate` (returns cert + chain + key with passphrase). Tags via `Add`/`Remove`/`ListTagsForCertificate`. Account-wide expiry events via `Get`/`PutAccountConfiguration`. `UpdateCertificateOptions` for transparency-logging + export prefs. `ResendValidationEmail` only for EMAIL-validated certs. `IdempotencyToken` dedupes exact matches on token + DomainName + SANs (real ACM keys this on a 1-hour window; fakecloud uses exact match for determinism). JSON 1.1 protocol                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                |\n\nPer-service docs and feature matrices: [fakecloud.dev/docs/services](https://fakecloud.dev/docs/services).\n\n## Common use cases\n\n| What you want to do                        | Command                                                                     |\n| ------------------------------------------ | --------------------------------------------------------------------------- |\n| **Test Lambda locally**                    | `fakecloud` then `aws --endpoint-url http://localhost:4566 lambda invoke …` |\n| **Mock DynamoDB in tests**                 | `fakecloud` then point boto3/aws-sdk at `http://localhost:4566`             |\n| **Local S3 for integration tests**         | `fakecloud` then use any S3 SDK with `endpoint_url=http://localhost:4566`   |\n| **Fake AWS server for tests**              | `fakecloud` — single binary on port 4566, any AWS SDK works                 |\n| **Replace LocalStack in CI**               | `curl … install.sh`, then `fakecloud &` as a background step                |\n| **Terraform local dev**                    | Point the `aws` provider `endpoints` block at `http://localhost:4566`       |\n| **CDK local testing**                      | `cdklocal deploy --endpoint-url http://localhost:4566`                      |\n| **Moto equivalent for Go/Java/Node**       | `fakecloud` — real HTTP server, every AWS SDK works, no language lock-in    |\n| **Integration test AWS in GitHub Actions** | Install or pull `ghcr.io/faiscadev/fakecloud`, run as service container     |\n\nFull guides: [fakecloud.dev/docs/guides](https://fakecloud.dev/docs/guides).\n\n## Compared to LocalStack Community\n\n| Feature                   | fakecloud                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 | LocalStack Community (post-March 2026)                                         |\n| ------------------------- | ----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- | ------------------------------------------------------------------------------ |\n| License                   | AGPL-3.0                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  | Proprietary                                                                    |\n| Auth required             | No nito User Pools        | 122 operations                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            | [Paid only](https://docs.localstack.cloud/references/licensing/)               |\n| SES v2                    | Full send + templates + DKIM + suppression                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                | [Paid only](https://docs.localstack.cloud/references/licensing/)               |\n| SES inbound email         | Real receipt rule action execution                                            | [Paid only](https://docs.localstack.cloud/references/licensing/)               |\n| Bedrock                   | 111 operations (control plane + runtime)                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  | Not available                                                                  |\n| ECR                       | 58 operations, real `docker push`/`pull` via OCI v2                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       | [Paid only](https://docs.localstack.cloud/references/licensing/)               |\n| ECS                       | **60 operations — full API** incl. real task execution, services, task sets, capacity providers                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           | [Paid only](https://docs.localstack.cloud/references/licensing/)               |\n| Elastic Load Balancing v2 | **51 operations** ALB/NLB/GWLB incl. mTLS trust stores, capacity reservations, attributes, resource policies, plus an in-process HTTP data plane (rule matching + forward/fixed-response/redirect + sticky sessions)                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      | [Paid only](https://docs.localstack.cloud/references/licensing/)               |\n| CloudFront                | **147 operations** — distributions, invalidations, tagging, by-X listings, web ACL/alias association. OAC + Cache/OriginRequest/ResponseHeaders/ContinuousDeployment policies. CloudFront Functions, Public Keys, Key Groups, Key Value Stores, Origin Access Identities (legacy), Monitoring Subscriptions. Streaming Distributions (legacy RTMP). Field-Level Encryption configs + profiles + Realtime Log Configs. VPC Origins, Anycast IP Lists, Trust Stores, Resource Policies. **Connection Groups + Domain Association/DNS Verification + Managed Certificate Details + Promote-Staging Distribution** — full CRUD with ETag/If-Match concurrency. Full `DistributionConfig` round-trip (origins, cache behaviors, custom error responses, viewer certificates, geo restrictions) | [Paid only](https://docs.localstack.cloud/references/licensing/)               |\n\n> Performance numbers measured on Apple M1 via `time fakecloud`, `ps -o rss`, `ls -lh`.\n\n## First-party SDKs\n\nNormal AWS SDKs handle your application code. fakecloud's own SDKs let your tests assert on what happened — sent emails, SNS messages, Lambda invocations, Bedrock calls, and more.\n\n| Language   | Install                                         |\n| ---------- | ----------------------------------------------- |\n| TypeScript | `npm install fakecloud`                         |\n| Python     | `pip install fakecloud`                         |\n| Go         | `go get github.com/faiscadev/fakecloud/sdks/go` |\n| PHP        | `composer require fakecloud/fakecloud`          |\n| Java       | `dev.fakecloud:fakecloud` (Maven Central)       |\n| Rust       | `cargo add fakecloud-sdk`                       |\n\n```ts\nimport { FakeCloud } from \"fakecloud\";\n\nconst fc = new FakeCloud();\n\n// Your app sends through the normal AWS SDK.\n// Your test asserts the side effect directly.\nconst { emails } = await fc.ses.getEmails();\nexpect(emails).toHaveLength(1);\n\nawait fc.reset();\n```\n\nFull SDK reference for all six languages: [fakecloud.dev/docs/sdks](https://fakecloud.dev/docs/sdks).\n\n## Use with AI coding tools\n\nAdd one of these snippets to your project so AI coding assistants (Claude Code, Cursor, GitHub Copilot) automatically use fakecloud for AWS integration tests.\n\n<details>\n<summary><strong>Claude Code</strong> — add to <code>CLAUDE.md</code></summary>\n\n```markdown\n## AWS Testing\n\nFor integration tests, use fakecloud as a local AWS emulator.\n\n- Install: `curl -fsSL https://raw.githubusercontent.com/faiscadev/fakecloud/main/install.sh | bash`\n- Run: `fakecloud` (listens on http://localhost:4566)\n- Configure AWS SDK endpoint to http://localhost:4566 with dummy credentials (access_key=test, secret_key=test)\n- Docs: https://fakecloud.dev/llms.txt\n```\n\n</details>\n\n<details>\n<summary><strong>Cursor</strong> — add to <code>.cursor/rules</code></summary>\n\n```\nFor AWS integration tests, use fakecloud (local AWS emulator) at http://localhost:4566.\nInstall: curl -fsSL https://raw.githubusercontent.com/faiscadev/fakecloud/main/install.sh | bash\nRun: fakecloud\nUse dummy credentials (access_key=test, secret_key=test).\nDocs: https://fakecloud.dev/llms.txt\n```\n\n</details>\n\n<details>\n<summary><strong>GitHub Copilot</strong> — add to <code>.github/copilot-instructions.md</code></summary>\n\n```markdown\n## AWS Testing\n\nUse fakecloud as a local AWS emulator for integration tests.\n\n- Run: `fakecloud` (listens on http://localhost:4566)\n- Configure endpoint_url to http://localhost:4566 with dummy credentials\n- Docs: https://fakecloud.dev/llms.txt\n```\n\n</details>\n\n## Docs and guides\n\n- **[fakecloud.dev](https://fakecloud.dev)** — website\n- **[Getting started](https://fakecloud.dev/docs/getting-started)** — install, first test, SDK setup\n- **[Guides](https://fakecloud.dev/docs/guides)** — in-depth how-tos (testing Bedrock, cross-service integration, CI setup)\n- **[Reference](https://fakecloud.dev/docs/reference)** — configuration, introspection endpoints, persistence\n- **[Blog](https://fakecloud.dev/blog)** — essays and hot takes on testing, AWS, and AI-assisted development\n\n### Verifying image signatures\n\nEvery published image (`fakecloud`, `fakecloud-postgres`, `fakecloud-mysql`, `fakecloud-mariadb`) is Trivy-scanned and cosign-signed via GitHub OIDC. Verify before pulling:\n\n```sh\ncosign verify ghcr.io/faiscadev/fakecloud:latest \\\n  --certificate-identity-regexp '^https://github\\.com/faiscadev/fakecloud/' \\\n  --certificate-oidc-issuer       https://token.actions.githubusercontent.com\n```\n\nSee [security docs](https://fakecloud.dev/docs/reference/security/#image-supply-chain-cosign--trivy) for details.\n\n## Contributing\n\nContributions welcome. Fork, branch, write tests, open a PR.\n\n- Conventional commits (`feat:`, `fix:`, `chore:`, `test:`, `refactor:`)\n- E2E tests for every new action\n- `cargo test --workspace && cargo clippy --workspace -- -D warnings && cargo fmt --check`\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for more.\n\n## License\n\nfakecloud is free and open-source, licensed under [AGPL-3.0-or-later](https://www.gnu.org/licenses/agpl-3.0.html). Using fakecloud as a dev/test dependency has zero AGPL implications for your application — the copyleft clause only applies if you modify and redistribute fakecloud itself as a network service.\n\n---\n\n<p align=\"center\">\n  Part of the <a href=\"https://faisca.dev\">faisca</a> project family | <a href=\"https://fakecloud.dev\">fakecloud.dev</a>\n</p>\n","summary":"fakecloud is an open‑source local AWS emulator that lets teams run integration tests and develop against a fully local AWS stack without needing an AWS account or paid tiers. It offers near‑full conformance to the AWS API, supports real cross‑service interactions such as EventBridge with Step Functions, Lambda in Docker, and stateful services like RDS, ElastiCache, and Bedrock, and includes first‑party test SDKs for several languages. The lightweight single binary starts in under half a second and remains under 20 MB, enabling fast, repeatable local testing pipelines. Developers, QA engineers, and CI/CD workflows benefit from a free, always‑available emulator that accurately mirrors AWS behavior for end‑to‑end testing.","description":"Free, open-source AWS emulator. LocalStack alternative: 33 services, 2,422 operations, 100% conformance. No account, no auth token, no paid tier.","stars":274,"language":"Rust"},{"owner":"SeanFDZ","repo":"macmind","url":"https://github.com/SeanFDZ/macmind","readme":"# MacMind\n\n**A complete transformer neural network implemented entirely in HyperTalk,  trained on a Macintosh SE/30.**\n\nMacMind is a 1,216-parameter single-layer single-head transformer that learns the bit-reversal permutation -- the opening step of the Fast Fourier Transform -- from random examples.  Every line of the neural network is written in HyperTalk,  a scripting language from 1987 designed for making interactive card stacks,  not matrix math.  It has token embeddings,  positional encoding,  self-attention with scaled dot-product scores,  cross-entropy loss,  full backpropagation,  and stochastic gradient descent.  No compiled code.  No external libraries.  No black boxes.\n\nOption-click any button and read the actual math.\n\n![MacMind trained to step 1000 on a Macintosh SE/30](images/hero-trained-step1000.jpeg)\n\n---\n\n## Why This Exists\n\nThe same fundamental process that trained MacMind -- forward pass,  loss computation,  backward pass,  weight update,  repeat -- is what trained every large language model that exists today.  The difference is scale,  not kind.  MacMind has 1,216 parameters.  GPT-4 has roughly a trillion.  The math is identical.\n\nWe are at a moment where AI affects nearly everyone but almost nobody understands what it actually does.  MacMind is a demonstration that the process is knowable -- that backpropagation and attention are not magic,  they are math,  and that math does not care whether it is running on a TPU cluster or a 68000 processor from 1987.\n\nEverything is inspectable.  Everything is modifiable.  Change the learning rate,  swap the training task,  resize the model -- all from within HyperCard's script editor.  This is the engine with the hood up.\n\n---\n\n## What It Learns\n\nThe bit-reversal permutation reorders a sequence by reversing the binary representation of each position index.  For an 8-element sequence:\n\n```\nPosition:    0    1    2    3    4    5    6    7\nBinary:     000  001  010  011  100  101  110  111\nReversed:   000  100  010  110  001  101  011  111\nMaps to:     0    4    2    6    1    5    3    7\n```\n\nSo input `[3, 7, 1, 9, 5, 2, 8, 4]` becomes `[3, 5, 1, 8, 7, 2, 9, 4]`.\n\nThis permutation is the first step of the Fast Fourier Transform,  one of the most important algorithms in computing.  The model is never told the rule.  It discovers the positional pattern purely through self-attention and gradient descent -- the same process,  scaled up enormously,  that taught larger models to understand language.\n\nAfter training,  the attention map on Card 4 reveals the butterfly routing pattern of the FFT.  The model independently discovered the same mathematical structure that Cooley and Tukey published in 1965.\n\n---\n\n## The Stack\n\nMacMind is a 5-card HyperCard stack:\n\n| Card | Purpose |\n|------|---------|\n| **1 -- Title** | Project name and credits |\n| **2 -- Training** | Train the model and watch it learn in real time |\n| **3 -- Inference** | Test the trained model on any 8-digit input |\n| **4 -- Attention Map** | Visualize the 8x8 attention weight matrix |\n| **5 -- About** | Plain-text explanation of what the model is doing |\n\n### Training (Card 2)\n\nClick **Train 10** for 10 training steps,  or **Train to 100%** to train until the model gets a perfect score on a sample.  For deeper training,  run **Train 10** repeatedly or click **Train to 100%** again -- the model picks up where it left off.  For a longer run,  open the Message Box (Cmd-M) and type `trainN 1000` to train for 1,000 steps straight.\n\nEach step generates a random 8-digit sequence,  runs the full forward pass,  computes cross-entropy loss,  backpropagates gradients through every layer,  and updates all 1,216 weights.  Progress bars,  per-position accuracy,  and a training log update in real time.\n\n**Note:** The training log field has a 30,000 character limit (a HyperCard constraint).  After roughly 900 steps the log will fill up and HyperCard will display an error.  To clear it and continue,  open the Message Box (Cmd-M) and type:\n\n```\nput \"\" into card field \"trainingLog\"\n```\n\nThen resume training with `trainN 500` (or whatever number of steps you want).\n\n![Card 2 -- Blank stack ready to train](images/card2-blank.jpeg)\n\n### Inference (Card 3)\n\nAfter training,  click **New Random** to generate a test input,  then **Permute** to run the trained model.  The output row shows the model's predictions and the confidence row shows how sure it is about each position.\n\nTo verify the result,  apply the bit-reversal permutation by hand.  The output should rearrange the input positions in this order:\n\n```\nOutput[0] = Input[0]        Output[4] = Input[1]\nOutput[1] = Input[4]        Output[5] = Input[5]\nOutput[2] = Input[2]        Output[6] = Input[3]\nOutput[3] = Input[6]        Output[7] = Input[7]\n```\n\nFor example,  input `[3, 7, 1, 9, 5, 2, 8, 4]` should produce `[3, 5, 1, 8, 7, 2, 9, 4]`.  If the model is well-trained,  every position will be correct with confidence above 90%.\n\n![Card 3 -- Inference with correct prediction and confidence scores](images/card3-inference.jpeg)\n\n### Attention Map (Card 4)\n\nThe 8x8 grid visualizes which input positions the model attends to when producing each output position.  After training,  you should see the butterfly pattern: positions 0, 2, 5, 7 attend to themselves (fixed points of the permutation),  while positions 1 and 4 attend to each other,  and positions 3 and 6 attend to each other (swap pairs).\n\nThis is the same routing structure discovered by Cooley and Tukey in 1965 for the Fast Fourier Transform:\n\n![FFT Butterfly Diagram](https://upload.wikimedia.org/wikipedia/commons/9/98/Butterfly-FFT.png)\n*The classic FFT butterfly diagram ([public domain](https://en.wikipedia.org/wiki/Butterfly_diagram)).  The model discovers this structure independently through attention.*\n\n![Card 4 -- Attention map showing learned routing pattern](images/card4-attention-map.jpeg)\n\n---\n\n## Architecture\n\n| Component | Dimensions | Parameters |\n|-----------|-----------|------------|\n| Token embeddings (W_embed) | 10 x 16 | 160 |\n| Position embeddings (W_pos) | 8 x 16 | 128 |\n| Query projection (W_Q) | 16 x 16 | 256 |\n| Key projection (W_K) | 16 x 16 | 256 |\n| Value projection (W_V) | 16 x 16 | 256 |\n| Output projection (W_out) | 16 x 10 | 160 |\n| **Total** | | **1,216** |\n\nData flow:\n\n```\nInput digits [8]\n    |\nToken embedding lookup + position embedding --> [8 x 16]\n    |\nQ, K, V projections --> [8 x 16] each\n    |\nAttention scores = Q x K^T, scaled by 1/sqrt(16) --> [8 x 8]\n    | softmax per row\nAttention weights --> [8 x 8]\n    |\nContext = weights x V --> [8 x 16]\n    |\nResidual connection: context + embedded input --> [8 x 16]\n    |\nOutput logits = residual x W_out --> [8 x 10]\n    | softmax per position\nPredictions --> [8 x 10] probability distribution over digits\n```\n\nAll weights and activations are stored as comma-delimited numbers in hidden HyperCard fields on Card 2.  A 16x16 weight matrix is 256 comma-separated values in a single field.  Save the stack,  quit,  reopen it: the trained model is still there.\n\n---\n\n## Training on Real Hardware\n\nMacMind was trained on a Macintosh SE/30 running System 7.6.1 and has also been tested through Basilisk II on Apple Silicon.  HyperTalk is interpreted,  and every multiply,  every field access,  every variable lookup goes through the interpreter.  Each training step takes several seconds.  Training to convergence (~1,000 steps) takes hours.\n\nThe model was left training overnight,  grinding through backpropagation one 8 MHz multiply-accumulate at a time.  By morning it had learned the permutation.\n\n---\n\n## Requirements\n\n**HyperCard 2.0 or later** is required.  HyperCard 1.x evaluates arithmetic left-to-right without standard precedence (`2 + 3 * 4 = 20` instead of `14`),  which would silently corrupt every matrix multiplication and gradient computation in the model.  HyperCard 2.0 introduced standard mathematical operator precedence.  The stack was built and tested with HyperCard 2.1.\n\n| | HyperCard 2.1 Minimum | MacMind Reference |\n|---|---|---|\n| **HyperCard** | 2.0 | 2.1 |\n| **System software** | System 7 | System 7.6.1 |\n| **RAM** | 1 MB (2 MB recommended) | 4 MB |\n| **Processor** | 68000 | 68030 (Mac SE/30) |\n| **Also runs on** | Mac OS 8,  Mac OS 9,  Mac OS X Classic Environment (through 10.4 Tiger on PowerPC) | |\n\nOn real vintage hardware,  each training step takes several seconds and full training takes hours.  On a modern Mac running Basilisk II or SheepShaver,  performance is comparable -- HyperTalk interpretation is the bottleneck,  not the host CPU.\n\n---\n\n## Running It Yourself\n\n### Quick Start (pre-trained)\n\n1. Download `MacMind-Trained.img` from [Releases](https://github.com/SeanFDZ/macmind/releases)\n2. Open it on your Mac running System 7 through Mac OS 9,  or in an emulator (Basilisk II,  SheepShaver,  Mini vMac)\n3. Double-click the MacMind stack\n4. Navigate to Card 3 (Inference),  click **New Random**,  then **Permute**\n\n### Watch It Learn (blank stack)\n\n1. Download `MacMind-Blank.img` from [Releases](https://github.com/SeanFDZ/macmind/releases)\n2. Open it on your Mac or in an emulator\n3. Navigate to Card 2 (Training)\n4. Click **Train 10** for short runs,  or **Train to 100%** to train until the model gets a perfect score on a sample.  For a longer run,  open the Message Box (Cmd-M) and type `trainN 1000` to train for 1,000 steps straight.  The model picks up where it left off each time.\n\n### Validate the Math (Python)\n\nThe `validate.py` script is a Python/NumPy reference implementation of the exact same transformer.  It trains on the same task with the same architecture and confirms convergence to 100% accuracy.\n\n```\npip install numpy\npython3 validate.py\n```\n\n---\n\n## Credits\n\n- **[Frank Rosenblatt (1958)](https://en.wikipedia.org/wiki/Perceptron)** -- the Perceptron: first demonstration that a machine can learn from examples by adjusting weights\n- **[Paul Werbos (1974) / Rumelhart,  Hinton & Williams (1986)](https://en.wikipedia.org/wiki/Backpropagation)** -- backpropagation: the training algorithm this project implements\n- **[Vaswani et al. (2017)](https://arxiv.org/abs/1706.03762)** -- \"Attention Is All You Need\": the transformer architecture this model implements\n- **[Cooley & Tukey (1965)](https://en.wikipedia.org/wiki/Cooley%E2%80%93Tukey_FFT_algorithm)** -- the Fast Fourier Transform algorithm whose bit-reversal permutation is the training task\n\nMacMind is an original implementation by [Sean Lavigne](https://fallingdata.zone).\n\n---\n\n## Also From Falling Data Zone\n\n**[AgentBridge](https://github.com/SeanFDZ/agentbridge)** -- let AI agents talk to your Classic Mac.  A native System 7 / Mac OS 8 / Mac OS 9 application that connects Claude and other AI agents to Classic Mac OS through a simple text-based protocol.  Works on real hardware and emulators.\n\nMore apps at [apps.fallingdata.zone](https://apps.fallingdata.zone).\n\n---\n\n## License\n\nMIT.  See [LICENSE](LICENSE).\n","summary":"MacMind is a fully self‑contained transformer neural network written entirely in HyperTalk that was trained on a Macintosh SE/30 to learn the bit‑reversal permutation, the first step of the Fast Fourier Transform.  It implements token embeddings, positional encoding, a single‑head self‑attention layer, cross‑entropy loss, full back‑propagation and stochastic gradient descent—all in plain scripting without compiled code or external libraries.  The stack is organized into five HyperCard cards that give real‑time training, inference, attention‑map visualization and explanatory text, letting users watch the model discover the FFT butterfly pattern from scratch.  It appeals to educators, AI researchers seeking transparent demos, and vintage computing enthusiasts who want a tangible, inspectable example of modern deep‑learning math running on retro hardware.","description":"Single-layer transformer in HyperTalk for the classic Macintosh","stars":101,"language":"Python"},{"owner":"vinhnx","repo":"VTCode","url":"https://github.com/vinhnx/VTCode","readme":"<img src=\"./resources/logo/vt_code_adaptive.svg\" alt=\"vtcode\"/>\n\n<a href=\"./docs/skills/SKILLS_GUIDE.md\"><img src=\"https://img.shields.io/badge/Agent%20Skills-BFB38F?style=for-the-badge\" alt=\"Skills\"/></a> <a href=\"./docs/guides/zed-acp.md\"><img src=\"https://img.shields.io/badge/agent%20client%20protocol-383B73?style=for-the-badge&logo=zedindustries\" alt=\"zed\"/></a> <a href=\"./docs/guides/mcp-integration.md\"><img src=\"https://img.shields.io/badge/model%20context%20protocol-A63333?style=for-the-badge&logo=modelcontextprotocol\" alt=\"MCP\"/></a>\n\n<a href=\"https://crates.io/crates/vtcode\"><img src=\"https://img.shields.io/crates/v/vtcode?style=flat-square&color=171C26&label=crates.io\" alt=\"Crates.io Version\"/></a> <a href=\"https://github.com/vinhnx/vtcode/releases\"><img src=\"https://img.shields.io/github/v/release/vinhnx/vtcode?style=flat-square&color=171C26&label=Release\" alt=\"GitHub Release\"/></a>\n\n[![Ask DeepWiki](https://deepwiki.com/badge.svg)](https://deepwiki.com/vinhnx/VTCode)\n\n---\n\n<strong>VT Code</strong> is an open-source coding agent with LLM-native code understanding and robust shell safety. Supports multiple LLM providers with automatic failover and efficient context management.\n\n<p align=\"center\">\n  <img src=\"./resources/gif/vtcode.gif\" alt=\"VT Code\" />\n</p>\n\n---\n\n## Installation\n\n**Native Installer (Recommended)** - No dependencies, instant setup:\nThe default macOS/Linux installer also attempts the recommended [ripgrep](https://github.com/BurntSushi/ripgrep) + [ast-grep](https://ast-grep.github.io/) bundle for enhanced semantic grep and programming language-level understanding (optional).\nOfficial macOS/Linux release archives bundle `ghostty-vt/` runtime libraries for richer PTY screen snapshots. VT Code still falls back to the built-in `legacy_vt100` backend when those assets are unavailable in non-release or custom installs.\n\n**macOS & Linux:**\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/vinhnx/vtcode/main/scripts/install.sh | bash\n\n# Or skip ripgrep + ast-grep during install\ncurl -fsSL https://raw.githubusercontent.com/vinhnx/vtcode/main/scripts/install.sh | bash -s -- --without-search-tools\n```\n\n**Windows (PowerShell):**\n\n```powershell\nirm https://raw.githubusercontent.com/vinhnx/vtcode/main/scripts/install.ps1 | iex\n```\n\n**Alternative Installation Methods:**\n\n```bash\n# Cargo (Rust package manager)\ncargo install vtcode\n\n# Homebrew (macOS/Linux)\n# From homebrew/core (official):\nbrew install vtcode\n\n# From vinhnx/tap (development/bleeding edge):\nbrew tap vinhnx/tap\nbrew install vtcode\n\n# If switching between taps, uninstall first:\nbrew uninstall vtcode\nbrew install vtcode  # or: brew install vinhnx/tap/vtcode\n\n# Optional: install the search tools bundle later\nvtcode dependencies install search-tools\n```\n\nGhostty VT is not installed through `vtcode dependencies install ...`.\nInstead, VT Code uses runtime libraries that are either:\n\n- Bundled in official macOS/Linux release archives under `ghostty-vt/`\n- Copied by the native installers during release installs\n- Staged locally for development with `scripts/setup-ghostty-vt-dev.sh`\n- Auto-bootstrapped by `./scripts/run.sh` and `./scripts/run-debug.sh` when the runtime libraries are missing\n\nSee [Installation Guide](./docs/installation/README.md), [Development Setup](./docs/development/DEVELOPMENT_SETUP.md), and [Ghostty VT Packaging](./docs/development/GHOSTTY_VT_PACKAGING.md).\n\n> **Note:** If you encounter \"installed from different tap\" errors, uninstall the existing formula first: `brew uninstall vtcode`, then install from your preferred tap.\n\n**See [Installation Guide](./docs/installation/) and [Native Installer Guide](./docs/installation/NATIVE_INSTALLERS.md) for more options and troubleshooting.**\n\n## Usage\n\n```bash\n# Set your API key\nexport OPENAI_API_KEY=\"sk-...\"\n\n# Launch VT Code\nvtcode\n```\n\n### Skills Support\n\nVT Code includes comprehensive support for Skills, following the [open Agent Skills standard](http://agentskills.io/). Skills enable VT Code to leverage external capabilities and extend its functionality through a standardized skill system.\n\n- **Skill Discovery**: VT Code can discover and load skills from multiple locations with precedence handling\n- **Standard Compliance**: Fully compliant with the Agent Skills specification for interoperability\n- **Multi-Location Support**: Skills can be loaded from local directories, remote repositories, or embedded resources\n- **Extensible Ecosystem**: Integrate with the growing ecosystem of Agent Skills for enhanced capabilities\n\nFor more information about skills implementation in VT Code, see [Agent Skills Guide](./docs/skills/SKILLS_GUIDE.md).\n\n### Subagents And Background Helpers\n\nVT Code can delegate bounded work to foreground subagents and also run an explicitly configured background subagent as a managed subprocess.\n\n- `/agent` and `/agents active` inspect delegated agents in place without switching the main session\n- Background subprocesses are opt-in; VT Code no longer ships with a preconfigured default background agent\n- `Ctrl+B` starts or stops the configured default background subagent only after `[subagents.background]` is enabled and `default_agent` is set\n- `/subprocesses` or `Alt+S` opens the Local Agents drawer\n- The wide-mode sidebar shows a unified Local Agents section for delegated agents and background subprocesses\n\nThe background runtime is configured under `[subagents.background]`:\n\n```toml\n[subagents.background]\nenabled = true\ndefault_agent = \"rust-engineer\"\nrefresh_interval_ms = 2000\nauto_restore = true\ntoggle_shortcut = \"ctrl+b\"\n```\n\n### Supported Providers\n\nVT Code works with GitHub Copilot, OpenAI, Anthropic, Google Gemini, DeepSeek, OpenRouter, Z.AI, Moonshot AI, MiniMax, HuggingFace Inference Providers, Ollama (local & cloud), and LM Studio (local).\n\nSet the corresponding environment variable for your provider (see [Installation Guide](./docs/installation/#supported-ai-providers) for all options).\n\n#### GitHub Copilot Integration\n\nVT Code includes first-class support for GitHub Copilot with OAuth device-flow authentication via the official `copilot` CLI:\n\n```bash\n# Install GitHub Copilot CLI\nbrew install gh-copilot\n\n# Authenticate\ncopilot login\n\n# Or use VT Code's TUI\nvtcode\n# Then: /login copilot\n```\n\nFor detailed setup, see [GitHub Copilot Authentication](./docs/guides/oauth-authentication.md#github-copilot-managed-auth).\n\n### Agent Protocols\n\nVT Code supports multiple agent protocols for integration:\n\n#### Agent Client Protocol (ACP)\n\nVT Code can integrate with code editors like Zed. For setup and troubleshooting, refer to the\n[ACP docs](./docs/guides/zed-acp.md).\n\nFor local development, prefer pointing Zed at a small wrapper script that runs the repo build\n(`target/debug/vtcode` or `target/release/vtcode`) with an explicit `--config` path, instead of\nrelying on an older installed binary in `~/.local/bin`.\n\n#### Agent2Agent (A2A) Protocol\n\nVT Code implements the [Agent2Agent (A2A) Protocol](https://a2a-protocol.org), enabling communication and interoperability between AI agents. The A2A protocol supports:\n\n- **Agent Discovery**: Via Agent Cards at `/.well-known/agent-card.json`\n- **Task Lifecycle Management**: States like `submitted`, `working`, `completed`, `failed`\n- **Real-time Streaming**: Via Server-Sent Events (SSE)\n- **Rich Content Types**: Text, file, and structured data parts\n- **Push Notifications**: Webhook-based async updates\n- **JSON-RPC 2.0**: Over HTTP(S) for interoperability\n\nFor more information about A2A protocol support, see [A2A Protocol Documentation](./docs/a2a/a2a-protocol.md).\n\n#### Anthropic API Compatibility\n\nVT Code provides compatibility with the [Anthropic Messages API](https://docs.anthropic.com/en/api/messages) to help connect existing applications to VT Code, including tools like Claude Code.\n\nThe server supports:\n\n- Messages endpoint at `/v1/messages`\n- Streaming responses\n- Tool calling\n- Vision (image) support\n- Multi-turn conversations\n- System prompts\n- All major Anthropic API features\n\nFor more information about Anthropic API compatibility, see [Anthropic API Documentation](./docs/a2a/a2a-protocol.md).\n\n#### Open Responses Specification\n\nVT Code conforms to the [Open Responses](https://www.openresponses.org/) specification, an open, vendor-neutral standard for large language model APIs. This enables interoperable LLM workflows across different providers.\n\nKey features of Open Responses conformance:\n\n- **Unified Item Types**: State machine-based items with defined lifecycle states\n- **Semantic Streaming**: Events describe meaningful transitions, not raw token deltas\n- **Agentic Loop Support**: Composable tool invocation and message orchestration\n- **Extension Points**: Provider-specific features via namespaced extensions (e.g., `vtcode:file_change`)\n\nFor more information about Open Responses implementation, see [Open Responses Documentation](./docs/protocols/OPEN_RESPONSES.md).\n\n#### Agent Trajectory Interchange Format (ATIF)\n\nVT Code implements the [Agent Trajectory Interchange Format (ATIF)](https://www.harborframework.com/docs/agents/trajectory-format) v1.4 for standardized session trajectory export. ATIF captures complete interaction histories — user messages, agent responses, tool calls, observations, and LLM metrics — in a JSON format usable across debugging, visualization, SFT, and RL pipelines.\n\n- **Complete History**: Every agent step, tool invocation, and observation in one file\n- **LLM Metrics**: Per-step and aggregate token usage, costs, and cache statistics\n- **Interoperable**: Compatible with Harbor, OpenHands, Gemini CLI, Claude Code, and Codex trajectories\n- **Opt-in**: Enable via `telemetry.atif_enabled = true` in `vtcode.toml`\n\nFor more information, see [ATIF Trajectory Format Documentation](./docs/protocols/ATIF_TRAJECTORY_FORMAT.md).\n\n### Authentication\n\nVT Code supports secure OAuth 2.0 authentication for seamless account-based access:\n\n- **OAuth Providers**: OpenAI ChatGPT and OpenRouter with PKCE-secured flows\n- **Secure Token Storage**: OS-native credential stores (Keychain, Credential Manager, Secret Service)\n- **Automatic Token Refresh**: Transparent token renewal without user intervention\n- **Fallback Encryption**: AES-256-GCM encrypted files when keyring unavailable\n\nFor detailed setup and provider guides, see [OAuth Authentication Guide](./docs/guides/oauth-authentication.md).\n\n### Configuration\n\nVT Code supports a rich set of configuration options, with preferences stored in `vtcode.toml`. Key configuration features include:\n\n- **OAuth Settings**: Control authentication method and token storage per provider\n- **Lifecycle Hooks**: Execute shell commands in response to agent events - see [Lifecycle Hooks Guide](./docs/guides/lifecycle-hooks.md)\n- **Tool Policies**: Control which tools are allowed, prompted, or denied\n- **Security Settings**: Configure human-in-the-loop approval and workspace boundaries\n- **Performance Tuning**: Adjust context limits, timeouts, and caching behavior\n- **PTY Backend Selection**: Ghostty VT is the default backend; it falls back to `legacy_vt100` when runtime libraries are unavailable\n\nFor full configuration options, see [Configuration](./docs/config/CONFIGURATION_PRECEDENCE.md).\n\nFor Ghostty VT runtime library packaging details, see [Ghostty VT Packaging](./docs/development/GHOSTTY_VT_PACKAGING.md).\n\n### CLI Design Principles\n\nVT Code follows the [Command Line Interface Guidelines](https://clig.dev/) and standard UNIX principles to ensure a robust and pipe-friendly experience:\n\n- **Output Streams**: Primary output (e.g., code from `ask`, events from `exec`) is sent to `stdout`. All logs, metadata, reasoning traces, and interaction prompts are sent to `stderr`. This allows you to safely pipe `vtcode` output to other tools.\n    ```bash\n    # Only the generated code is saved to file; metadata remains on screen\n    vtcode ask \"factorial function in rust\" > factorial.rs\n    ```\n- **Standard Arguments**: Adheres to GNU/POSIX argument parsing standards using `clap`, supporting standard flags like `--help`, `--version`, and `--` separator for positional arguments.\n\n---\n\n### Key Features\n\n- **Security First**: Multi-layered security model with tree-sitter-bash command validation, execution policy, and sandbox isolation\n- **OAuth Authentication**: Secure PKCE-based OAuth flows with OS-native credential storage and automatic token refresh ([docs](./docs/guides/oauth-authentication.md))\n- **Multi-Provider AI**: OpenAI, Anthropic, DeepSeek, Gemini, Z.AI, Moonshot AI, OpenRouter, MiniMax, Ollama (local)\n- **Semantic Code Understanding**: LLM-native code analysis and navigation (Rust, Python, JavaScript/TypeScript, Go, Java, and more)\n- **Smart Tools**: Built-in code analysis, file operations, terminal commands, and refactoring\n- **Agent Skills**: Comprehensive skills location system with multi-location support and precedence handling, aligned with the [open Agent Skills standard](http://agentskills.io/) ([docs](./docs/skills/SKILLS_GUIDE.md))\n- **Editor Integration**: Native support for Zed IDE via Agent Client Protocol (ACP)\n- **Lifecycle Hooks**: Execute custom shell commands in response to agent events for context enrichment, policy enforcement, and automation ([docs](./docs/guides/lifecycle-hooks.md))\n- **Context Management**: Advanced token budget tracking and context curation\n- **TUI Interface**: Rich terminal user interface with real-time streaming\n- **Ghostty VT Snapshots**: PTY sessions use Ghostty VT runtime libraries when available and fall back to built-in `legacy_vt100`\n- **Auto-Update System**: Built-in update manager with release channels, version pinning, and mirror support ([docs](./docs/guides/UPDATE_SYSTEM.md))\n\n### Security & Safety\n\nVT Code implements a **defense-in-depth security model** to protect against prompt injection and argument injection attacks:\n\n- **Execution Policy**: Command allowlist with per-command argument validation\n- **Workspace Isolation**: All operations confined to workspace boundaries\n- **OS-Native Sandboxing**: macOS Seatbelt and Linux Landlock + seccomp for kernel-enforced isolation\n- **Tool Policies**: Configurable allow/deny/prompt policies for MCP tools\n- **Human-in-the-Loop**: Configurable approval system for sensitive operations\n- **Audit Trail**: Comprehensive logging of all command executions\n\nSee [Security Model](./docs/security/SECURITY_MODEL.md) and [Sandbox Deep Dive](./docs/sandbox/SANDBOX_DEEP_DIVE.md) for details.\n\n---\n\n### Docs & Examples\n\n- [**Installation**](./docs/installation/README.md)\n    - [Native Installers](./docs/installation/NATIVE_INSTALLERS.md)\n    - [Quick Reference](./docs/installation/QUICK_REFERENCE.md)\n- [**Getting started**](./docs/user-guide/getting-started.md)\n    - [Interactive mode](./docs/user-guide/interactive-mode.md)\n    - [Command line interface](./docs/user-guide/commands.md)\n    - [Subagents](./docs/user-guide/subagents.md)\n- [**OAuth Authentication**](./docs/guides/oauth-authentication.md) - Secure OAuth 2.0 flows with PKCE, token storage, and automatic refresh\n- [Configuration](./docs/config/CONFIGURATION_PRECEDENCE.md)\n- [**Update System**](./docs/guides/UPDATE_SYSTEM.md) - Release channels, version pinning, and update management\n- [**AI Provider Setup**](./docs/providers/PROVIDER_GUIDES.md) - Complete guides for configuring different LLM providers:\n    - [OpenAI, Anthropic, Google Gemini](./docs/user-guide/getting-started.md#configure-your-llm-provider)\n    - [OpenRouter](./docs/providers/openrouter.md)\n    - [Ollama](./docs/providers/ollama.md)\n    - [LM Studio](./docs/providers/lmstudio.md)\n- [**Context Engineering**](./docs/context/context_engineering.md)\n    - [Token budget management](./docs/context/context_engineering.md#3-token-budget-management)\n    - [Dynamic context curation](./docs/context/context_engineering.md#2-just-in-time-context-loading)\n- [**Agent Skills**](./docs/skills/SKILLS_GUIDE.md) - Comprehensive skills location system with multi-location support, precedence handling, and the [open Agent Skills standard](http://agentskills.io/).\n    - [**Standard Compliance**](./docs/skills/AGENT_SKILLS_SPEC_IMPLEMENTATION.md) - How VT Code implements the Agent Skills standard\n- [**Code Intelligence**](./docs/user-guide/tree-sitter-integration.md)\n- [**Agent Client Protocol (ACP)**](./docs/guides/zed-acp.md)\n- [**Zed Integration**](./docs/guides/zed-acp.md) - Agent Client Protocol Integration. VT Code is fully [capable ACP agent](https://agentclientprotocol.com/overview/agents), works with [ACP Clients](https://agentclientprotocol.com/overview/clients), for example [Zed](https://zed.dev/).\n- [**Lifecycle Hooks**](./docs/guides/lifecycle-hooks.md) - Execute shell commands in response to agent events, enabling context enrichment, policy enforcement, and automation\n- [**Keyboard Shortcuts**](./docs/guides/tui-event-handling.md)\n- [**macOS Alt Shortcut Troubleshooting**](./docs/guides/macos-alt-shortcut-troubleshooting.md) - Solutions for when Alt/Option shortcuts don't work on macOS\n- [**Exec Mode**](./docs/user-guide/exec-mode.md)\n- [**Development**](./docs/development/README.md)\n    - [Development Setup](./docs/development/DEVELOPMENT_SETUP.md)\n    - [Testing](./docs/development/testing.md)\n    - [CI/CD](./docs/development/ci-cd.md)\n    - [**Empirical Evaluation**](./evals/README.md) - Formal framework for measuring LLM performance across safety, logic, and coding benchmarks.\n- [**FAQ**](./docs/FAQ.md) - Frequently asked questions about VT Code\n- [**TUI & Async Guides**](./docs/guides/)\n    - [Event Handling](./docs/guides/tui-event-handling.md) - Terminal event architecture and patterns\n    - [Async Architecture](./docs/guides/async-architecture.md) - Tokio async/await design and best practices\n    - [Rendering Best Practices](./docs/guides/terminal-rendering-best-practices.md) - Widget rendering and display optimization\n- [**Ratatui Integration**](./docs/README.md) - Complete integration of Ratatui FAQ best practices\n    - [Summary](./docs/README.md) - Overview of all improvements\n    - [FAQ Integration](./docs/styling/RATATUI_FAQ_INTEGRATION.md) - Mapping of FAQ topics to code\n    - [Async Improvements](./docs/README.md) - Tokio best practices applied\n- [**Architecture**](./docs/ARCHITECTURE.md)\n- [**Security**](./docs/security/SECURITY_MODEL.md)\n    - [Security Model](./docs/security/SECURITY_MODEL.md)\n    - [Security Documentation Index](./docs/security/SECURITY_DOCUMENTATION_INDEX.md)\n    - [Tool Policies](./docs/modules/vtcode_tools_policy.md)\n- [**Anthropic API Compatibility**](./docs/a2a/a2a-protocol.md) - Documentation for Anthropic Messages API compatibility server\n- [**ATIF Trajectory Format**](./docs/protocols/ATIF_TRAJECTORY_FORMAT.md) - Standardized agent trajectory export for debugging, SFT, and RL pipelines\n\n---\n\n## Documents\n\n- Ask Google Gemini CodeWiki <a href=\"https://codewiki.google/github.com/vinhnx/vtcode\"><img src=\"https://img.shields.io/badge/google%20gemini-8E75B2?style=for-the-badge&logo=google%20gemini&logoColor=white\" alt=\"Ask CodeWiki\"></a>\n- Ask Devin DeepWiki <a href=\"https://deepwiki.com/vinhnx/vtcode\"><img src=\"https://deepwiki.com/badge.svg\" alt=\"Ask DeepWiki\"></a>\n\n---\n\n## Visual Studio Code Extension\n\nVT Code is available as an VS Code extension.\n\n  <a href=\"https://marketplace.visualstudio.com/items?itemName=nguyenxuanvinh.vtcode-companion\" target=\"_blank\">\n    <img src=\"https://custom-icon-badges.demolab.com/badge/Visual%20Studio%20Code-0078d7.svg?style=for-the-badge&logo=vsc&logoColor=white&label=Install\" alt=\"VS Code Extension\"/>\n  </a>\n\nThe original VT Code extension for Visual Studio Code with full semantic code understanding and AI assistance.\n\nVT Code is also compatible with other VS Code-compatible editors:\n\n  <a href=\"https://open-vsx.org/extension/nguyenxuanvinh/vtcode-companion\" target=\"_blank\">\n    <img src=\"https://img.shields.io/badge/Available%20on-Open%20VSX-4CAF50?style=for-the-badge&logo=opensearch&logoColor=white\" alt=\"Open VSX Registry\"/>\n  </a>\n\nCompatible with Cursor, Windsurf, and other VS Code-compatible editors through the Open VSX registry.\n\nFor installation instructions and download links for other IDEs, visit our [IDE Downloads](./docs/ide/downloads.md) page. For troubleshooting, see the [IDE Integration Troubleshooting Guide](./docs/ide/troubleshooting.md).\n\n---\n\n### Contributing\n\nI warmly welcome contributions of all kinds! Please read [CONTRIBUTING.md](./docs/CONTRIBUTING.md) and [AGENTS.md](AGENTS.md) for my project-specific rules and guidelines (for both humans and agents).\n\nWhether you're looking to fix bugs, add new features, improve documentation, or enhance the user experience, your help is greatly appreciated.\n\nHow To Contribute:\n\n- Report issues you're experiencing\n- Upvote issues that matter to you\n- Help answer questions on the issue tracker\n\nIf you're not sure where to start:\n\n- Check out the [issues page](https://github.com/vinhnx/vtcode/issues)\n- Browse by labels that interest you\n- Look for [good first issue](https://github.com/vinhnx/vtcode/issues?q=is%3Aopen+is%3Aissue+label%3A%22good+first+issue%22) labeled items\n- Feel free to browse all open issues and pick one that resonates with you!\n\nSteps to get started:\n\n1. Fork the repository by clicking the Fork button in the top-right corner\n2. Clone your forked repository to your local machine\n3. Create a new branch for your changes and start contributing!\n\nWhen reporting an issue, please include enough details for others to reproduce the problem effectively.\n\n---\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/svg?repos=vinhnx/vtcode&type=timeline&legend=top-left)](https://www.star-history.com/#vinhnx/vtcode&type=timeline&legend=top-left)\n\n---\n\n## License\n\nThis repository is licensed under the [MIT License](LICENSE).\n","summary":"VT Code is an open‑source terminal‑based coding assistant that plugs a large language model into a developer’s workflow, providing low‑latency, safe code‑editing and generation directly inside a shell. It automatically supplies the LLM with the repository’s context, uses semantic search tools like ripgrep and ast‑grep to surface relevant files, and supports automatic failover across multiple LLM providers while keeping shell interactions secure. The agent speaks the standard Agent Skills protocol, integrates with Zed Industries’ client protocol and the Model Context Protocol, and is distributed as a Rust crate with native installers for macOS, Linux and Windows. Developers seeking a lightweight, LLM‑powered assistant that keeps them within the terminal and respects project context will benefit most from VT Code.","description":"Open-source coding agent with code understanding and robust shell safety. Supports multiple LLM providers with automatic failover and efficient context management.","stars":569,"language":"Rust"},{"owner":"kontext-dev","repo":"kontext-cli","url":"https://github.com/kontext-dev/kontext-cli","readme":"<div align=\"center\">\n\n<img src=\"assets/banner-cli.svg\" alt=\"Kontext CLI banner\" width=\"100%\" />\n\n<p><strong>Local guardrails and scoped credentials for AI coding agents.</strong></p>\n\n<p>\n  <a href=\"https://kontext.security\">Website</a>\n  ·\n  <a href=\"https://docs.kontext.security/getting-started/welcome\">Documentation</a>\n  ·\n  <a href=\"https://app.kontext.security\">Dashboard</a>\n  ·\n  <a href=\"https://discord.gg/gw9UpFUhyY\">Discord</a>\n</p>\n\n<p>\n  <a href=\"LICENSE\"><img alt=\"License: MIT\" src=\"https://img.shields.io/badge/license-MIT-152822?labelColor=0d1714\"></a>\n  <a href=\"https://github.com/kontext-security/kontext-cli/releases\"><img alt=\"Latest release\" src=\"https://img.shields.io/github/v/release/kontext-security/kontext-cli?color=152822&labelColor=0d1714\"></a>\n  <img alt=\"Built with Go\" src=\"https://img.shields.io/badge/Go-1.25-152822?labelColor=0d1714\">\n</p>\n\n</div>\n\n## What is Kontext CLI?\n\nKontext CLI is an open-source command-line tool that gives AI coding agents local guardrails, scoped credentials, and readable tool-call traces — without changing how developers work.\n\n**Why we built it:** Agents like Claude Code now run shell commands, edit code, open pull requests, and call provider APIs from your machine. Most of the time that is exactly what you want. Sometimes it is `rm -rf`, `gcloud sql databases delete prod`, `git push --force main`, or a command that leaks a secret before you notice, [like it happened here](https://x.com/lifeof_jer/status/2048103471019434248). The same agents also need credentials, and long-lived keys in `.env` files are the wrong primitive for autonomous tools.\n\n**How it works:** `kontext guard start` runs locally: it captures Claude Code tool calls, redacts them, scores risk, and shows risky actions in a local dashboard. `kontext start --agent claude` adds the hosted layer: provider connection, short-lived scoped credentials, and team-visible traces. Use Guard when you want local visibility first; use hosted mode when credentials and team governance matter too.\n\n## Quick Start\n\n```bash\nbrew install kontext-security/tap/kontext\nkontext guard start\nclaude\n```\n\nThat is it: local-only, no login, observe mode. The dashboard opens at `http://127.0.0.1:4765`.\n\nTo add short-lived credentials and team-visible traces, run `kontext start --agent claude` from a project with Claude Code installed.\n\n## Operating Modes\n\n| Mode | Command | Best for | Login required |\n| --- | --- | --- | --- |\n| Guard | `kontext guard start` | Local risk visibility, notifications, redacted local traces | No |\n| Hosted | `kontext start --agent claude` | Scoped credentials, shared traces, team governance | Yes |\n\n## What You Get\n\n| Capability | What it means |\n| --- | --- |\n| Local Guard mode | Watch Claude Code tool calls locally, score risk, and store redacted traces in SQLite. |\n| Observe-mode notifications | Surface `would ask` and `would deny` actions without blocking Claude Code. |\n| Local dashboard | Review sessions, commands, reasons, risk scores, and signals at `127.0.0.1:4765`. |\n| Scoped credentials | Replace hardcoded provider keys with short-lived tokens injected only for the active agent session. |\n| Managed env file | Keep provider placeholders in `.env.kontext` instead of raw secrets. |\n| Hosted connect | Connect missing user providers through a browser flow instead of leaking keys locally. |\n| Governed sessions | Stream PreToolUse, PostToolUse, and UserPromptSubmit events to Kontext in hosted mode. |\n| Native runtime | One small Go binary. Guard mode has an embedded dashboard; installed users do not need Node or Docker. |\n\n## Managed Credentials\n\nFor hosted sessions, the CLI creates `.env.kontext` locally:\n\n```dotenv\nGITHUB_TOKEN={{kontext:github}}\nLINEAR_API_KEY={{kontext:linear}}\n```\n\n`.env.kontext` stores provider placeholders, not long-lived provider keys. At runtime, hosted mode exchanges placeholders such as `{{kontext:github}}` for short-lived scoped credentials. Keep `.env.kontext` out of source control in repos that do not already ignore it. Literal values you add stay untouched.\n\n## Providers and Traces\n\nProvider setup and trace review live in the hosted dashboard at [app.kontext.security](https://app.kontext.security). Use the same account you used for `kontext login`.\n\n**Add providers**\n\n1. Open **Providers** in the dashboard.\n2. Add a built-in provider, such as GitHub or Linear, or create a custom provider.\n3. For built-in providers, configure allowed scopes and any provider-specific OAuth settings shown in the dashboard. For custom providers, choose end-user OAuth, end-user key, or organization key.\n4. Open **Applications** → **kontext-cli** → **Providers** and attach the providers the CLI application can use.\n5. Reference the provider handles in `.env.kontext`.\n\n**Check traces**\n\n1. Run `kontext start --agent claude`.\n2. Ask Claude Code to perform a tool-using task.\n3. Open **Traces** in the dashboard to inspect live hook events, tool calls, outcomes, user attribution, and session context.\n\n## Security\n\n- Guard mode is local-only by default: no login, no hosted API, no trace upload.\n- Guard mode stores redacted events in local SQLite and scores risk with local rules plus a local JSON Markov-chain model.\n- Hosted mode uses OIDC browser login with refresh tokens stored in the system keyring.\n- Hosted mode uses RFC 8693 token exchange for short-lived, provider-scoped runtime credentials.\n- Provider credentials stored in Kontext are encrypted at rest with AES-256-GCM.\n- Long-lived provider keys are not written to the project or agent config by Kontext.\n- Kontext captures tool events and outcomes. It does not capture LLM reasoning, token usage, or full conversation history.\n\n## Supported Agents\n\n| Agent | Guard mode | Hosted mode | Status |\n| --- | --- | --- | --- |\n| Claude Code | `kontext guard start` | `kontext start --agent claude` | Active |\n\nCursor, Copilot, and Codex support are planned, but they are not shipped in this repo yet.\n\n## Architecture\n\nGuard mode:\n\n```text\nkontext guard start\n  │\n  ├─ Hooks: generated Claude Code settings.json\n  │    │\n  │    ├─ PreToolUse        → kontext guard hook claude-code\n  │    ├─ PostToolUse       → kontext guard hook claude-code\n  │    └─ UserPromptSubmit  → kontext guard hook claude-code\n  │\n  ├─ Local daemon: 127.0.0.1:4765\n  ├─ Risk engine: deterministic rules + Markov-chain score\n  ├─ Store: local SQLite with redacted events\n  └─ Dashboard: embedded local web UI + notifications\n```\n\nHosted mode:\n\n```text\nkontext start --agent claude\n  │\n  ├─ Auth: OIDC refresh token from system keyring\n  ├─ ConnectRPC: CreateSession → governed session in dashboard\n  ├─ BootstrapCli: sync managed provider entries into .env.kontext\n  ├─ Token exchange: {{kontext:provider}} → short-lived credential\n  ├─ Sidecar: Unix socket server + heartbeat loop\n  ├─ Hooks: generated Claude Code settings.json\n  │    │\n  │    ├─ PreToolUse        → kontext hook → sidecar → ProcessHookEvent\n  │    ├─ PostToolUse       → kontext hook → sidecar → ProcessHookEvent\n  │    └─ UserPromptSubmit  → kontext hook → sidecar → ProcessHookEvent\n  │\n  └─ Exit: EndSession → credential expiry + temp file cleanup\n```\n\n## Useful Commands\n\n```bash\nkontext guard status      # show local Guard counters\nkontext guard dashboard   # open or print the local dashboard URL\nkontext guard doctor      # check daemon and Claude Code hook state\nkontext doctor            # inspect global Kontext CLI setup\nkontext start --verbose   # print redacted hosted-mode diagnostics\n```\n\n## Development\n\n```bash\ngo build -o bin/kontext ./cmd/kontext\ngo test ./...\ngo test -race ./...\ngo vet ./...\npnpm install --frozen-lockfile\npnpm build\nmake guard-e2e\n```\n\nGenerate protobuf code with:\n\n```bash\nbuf generate\n```\n\nService definitions live in [kontext-security/proto `agent.proto`](https://github.com/kontext-security/proto/blob/main/proto/kontext/agent/v1
