/agent.proto).\n\n## Community\n\n- Read [SUPPORT.md](SUPPORT.md) for support channels.\n- Read [CONTRIBUTING.md](CONTRIBUTING.md) before opening a contribution.\n- Kontext CLI is released under the [MIT License](LICENSE).\n","summary":"Kontext CLI is an open‑source command‑line tool that adds local guardrails, scoped credentials, and easily readable tool‑call traces to AI coding agents such as Claude Code, all without requiring developers to change their workflow. It runs in a local “Guard” mode that captures and redacts agent actions, scores risk, and presents a lightweight web dashboard, while an optional hosted mode injects short‑lived provider tokens and sends governance events to a team‑visible console. Key capabilities include risk‑scoring dashboards, observe‑mode notifications, placeholder‑based `.env.kontext` files, and seamless provider login flows. Developers and engineering teams who deploy autonomous agents on their machines—especially those concerned with accidental destructive commands or secret leakage—can use it to gain real‑time visibility, enforce credential hygiene, and maintain compliance.","description":"Open-source CLI for AI coding agents. Give your coding agents access to services without exposing keys.","stars":181,"language":"Go"},{"owner":"yantrikos","repo":"yantrikdb-server","url":"https://github.com/yantrikos/yantrikdb-server","readme":"# YantrikDB\n\n> ⚠ **Correction notice (2026-04-19):** Phase 3 benchmark writeups committed\n> earlier today (`docs/phase3a/`, `docs/phase3b/`, `docs/phase3c/`,\n> `docs/phase3d/`) used a Python simulator for the \"structured memory\"\n> condition — NOT the actual yantrikdb engine. Rerun with real yantrikdb\n> is in [`docs/phase3e/`](docs/phase3e/). Full audit trail in\n> [`CORRECTIONS.md`](CORRECTIONS.md). Full corrected findings post\n> coming 2026-04-20.\n\n**A memory database that forgets, consolidates, and detects contradictions.**\n\nVector databases store memories. They don't manage them. After 10,000 memories, recall quality degrades because there's no consolidation, no forgetting, no conflict resolution. Your AI agent just gets noisier.\n\nYantrikDB is different. It's a **cognitive memory engine** — embed it, run it as a server, or connect via MCP. It thinks about what it stores.\n\n**Shortest path to try it:** [MCP setup for Claude Code / Cursor / Windsurf →](#get-started-in-60-seconds--claude-code--cursor--windsurf) (one `pip install`, one config block).\n\n> **The bigger picture:** YantrikDB is the memory layer being built on the road to [YantrikOS](https://github.com/yantrikos) — an AI-native operating system where agents are first-class primitives, not apps on top. Memory was the bottleneck, so we're shipping it first.\n\n[![Crates.io](https://img.shields.io/crates/v/yantrikdb-server)](https://crates.io/crates/yantrikdb-server)\n[![PyPI](https://img.shields.io/pypi/v/yantrikdb)](https://pypi.org/project/yantrikdb/)\n[![Docker](https://img.shields.io/badge/docker-ghcr.io%2Fyantrikos%2Fyantrikdb-blue)](https://github.com/yantrikos/yantrikdb-server/pkgs/container/yantrikdb)\n[![License: AGPL-3.0](https://img.shields.io/badge/license-AGPL--3.0-blue)](LICENSE)\n\n![YantrikDB demo: storing three facts, recalling them, then think() flagging a contradiction between two memories](docs/images/demo.gif)\n\n## 99.9% token savings vs file-based memory\n\n| Memories | File-Based (CLAUDE.md) | YantrikDB | Token Savings | Recall Precision |\n|---|---|---|---|---|\n| 100 | 1,770 tokens | 69 tokens | **96%** | 66% |\n| 500 | 9,807 tokens | 72 tokens | **99.3%** | 77% |\n| 1,000 | 19,988 tokens | 72 tokens | **99.6%** | 84% |\n| 5,000 | 101,739 tokens | 53 tokens | **99.9%** | 88% |\n\nAt 500 memories, file-based memory exceeds 32K context. At 5,000, it doesn't fit in any model — not even 200K. YantrikDB stays at ~70 tokens per query. **Precision improves with more data** — the opposite of context stuffing.\n\nReproduce: `python benchmarks/bench_token_savings.py`\n\n---\n\n## Three things no other database does\n\n### 1. It forgets\n\n```python\ndb.record(\"read the SLA doc by Friday\", importance=0.4, half_life=86400)  # 1 day\n# 24 hours later, this memory's relevance score has decayed\n# 7 days later, recall stops surfacing it unless explicitly queried\n```\n\n### 2. It consolidates\n\n```python\n# 20 similar memories about the same meeting\nfor note in meeting_notes:\n    db.record(note, namespace=\"standup-2026-04-12\")\n\ndb.think()\n# → {\"consolidation_count\": 5}  # collapsed 20 fragments into 5 canonical memories\n```\n\n### 3. It detects contradictions\n\n```python\ndb.record(\"CEO is Alice\")\ndb.record(\"CEO is Bob\")  # added later in another conversation\n\ndb.think()\n# → {\"conflicts_found\": 1, \"conflicts\": [{\"memory_a\": \"CEO is Alice\",\n#                                         \"memory_b\": \"CEO is Bob\",\n#                                         \"type\": \"factual_contradiction\"}]}\n```\n\nPlus: temporal decay with configurable half-life, entity graph with relationship edges, personality derivation from memory patterns, session-aware context surfacing, multi-signal scoring (recency × importance × similarity × graph proximity).\n\n---\n\n## What makes this different\n\nYantrikDB isn't just storage with operations. The engine has a layer that makes agents feel less reactive:\n\n- **Proactive triggers** — the system surfaces what needs attention: pending conflicts, decaying important memories, approaching deadlines, patterns across domains. Agents don't have to ask what they should care about. The memory tells them.\n- **Derived personality** — stable tendencies extracted from memory patterns over time. \"This user prefers X, reacts to Y, values Z.\" Informs default agent behavior across sessions.\n- **Procedural memory** — strategies that worked before get recorded and reinforced. Agents learn what to do, not just what they know.\n- **Temporal awareness** — `stale` surfaces important memories that haven't been touched recently. `upcoming` surfaces memories with approaching deadlines.\n\nFull cognitive architecture lives in the [standalone engine repo](https://github.com/yantrikos/yantrikdb). This server repo focuses on deployment, HTTP API, and cluster operations.\n\n---\n\n## Get started in 60 seconds — Claude Code / Cursor / Windsurf\n\n**The fastest adoption path.** One `pip install`, one config block, and your agent gets persistent memory that auto-recalls on conversation start, auto-remembers decisions, and flags contradictions — without you prompting it.\n\n```bash\npip install yantrikdb-mcp\n```\n\nAdd this to your MCP client config — typically `~/.claude.json` or `.mcp.json` in your project for Claude Code, and the equivalent `mcp` block in settings for Cursor/Windsurf ([Claude Code](https://docs.claude.com/en/docs/claude-code/mcp) · [Cursor](https://docs.cursor.com/context/model-context-protocol) · [Windsurf](https://docs.windsurf.com/windsurf/mcp)):\n\n```json\n{\n  \"mcpServers\": {\n    \"yantrikdb\": {\n      \"command\": \"yantrikdb-mcp\"\n    }\n  }\n}\n```\n\nThat's it. No env vars. Uses a local SQLite memory file at `~/.yantrikdb/memory.db`. First call auto-initializes the schema. Restart your client — the `yantrikdb` MCP server will show up with 15 memory tools (see below).\n\n**Want a shared memory across machines or teammates?** Point at a YantrikDB cluster instead of local SQLite:\n\n```json\n{\n  \"mcpServers\": {\n    \"yantrikdb\": {\n      \"command\": \"yantrikdb-mcp\",\n      \"env\": {\n        \"YANTRIKDB_SERVER_URL\": \"http://node1:7438,http://node2:7438\",\n        \"YANTRIKDB_TOKEN\": \"ydb_your_database_token\"\n      }\n    }\n  }\n}\n```\n\n**Want it over HTTP/SSE instead of stdio?** (For IDE integrations that don't support stdio MCP servers.)\n\n```json\n{\n  \"mcpServers\": {\n    \"yantrikdb\": {\n      \"type\": \"sse\",\n      \"url\": \"http://your-server:8420/sse\",\n      \"headers\": { \"Authorization\": \"Bearer YOUR_API_KEY\" }\n    }\n  }\n}\n```\n\nThen start: `yantrikdb-mcp --transport sse --port 8420`.\n\n### The 15 MCP tools your agent gets\n\n| | Tools |\n|---|---|\n| **Core memory** | `remember` · `recall` · `forget` · `correct` |\n| **Cognition** | `think` (consolidate + conflict-detect) · `memory` · `trigger` (proactive insights) |\n| **Knowledge graph** | `graph` (entities + relations) · `category` |\n| **Conflicts & corrections** | `conflict` (list + resolve contradictions) |\n| **Time** | `session` · `temporal` (stale/upcoming queries) |\n| **Behavior** | `procedure` (strategies) · `personality` (derived traits) |\n| **Ops** | `stats` (engine health + diagnostics) |\n\nFull tool reference and agent-integration patterns: **[yantrikdb-mcp →](https://github.com/yantrikos/yantrikdb-mcp)** · [docs](https://yantrikdb.com/guides/mcp/)\n\n---\n\n## Other ways to use it\n\n### As a network server (binary API + HA cluster)\n\n```bash\ndocker run -p 7438:7438 ghcr.io/yantrikos/yantrikdb:latest\ncurl -X POST http://localhost:7438/v1/remember -d '{\"text\":\"hello\"}'\n```\n\nSingle Rust binary. HTTP + binary wire protocol. 2-voter + 1-witness HA cluster via Docker Compose or Kubernetes. Per-tenant quotas, Prometheus metrics, AES-256-GCM at-rest encryption, runtime deadlock detection. See [docker-compose.cluster.yml](deploy/docker-compose.cluster.yml) and [k8s manifests](deploy/kubernetes/).\n\n### As an embedded library (Python or Rust)\n\n```bash\npip install yantrikdb\n# or\ncargo add yantrikdb\n```\n\n```python\nimport yantrikdb\ndb = yantrikdb.YantrikDB(\"memory.db\", embedding_dim=384)\ndb.set_embedder(SentenceTransformer(\"all-MiniLM-L6-v2\"))\ndb.record(\"Alice leads engineering\", importance=0.8)\ndb.recall(\"who leads the team?\", top_k=3)\ndb.think()  # consolidate, detect conflicts, derive personality\n```\n\n---\n\n## Performance\n\nLive numbers from a 2-core LXC cluster with 1689 memories:\n\n| Operation | Latency |\n|---|---|\n| Recall p50 | 112ms (most is query embedding ~100ms) |\n| Recall p99 | 190ms |\n| Batch write | 76 writes/sec |\n| Engine lock acquire | <0.1ms |\n| Deep health probe | <1ms |\n\nFor pre-computed embeddings (skip query-time embedding), recall p50 drops to ~5ms.\n\n---\n\n## Status\n\n**v0.5.13** — hardened alpha + RFC 006 Phase 0 observability telemetry shipped. The embeddable engine has been used in production by the YantrikOS ecosystem since early 2026. The network server runs live on a 3-node Proxmox cluster with multiple tenants.\n\nA 42-task hardening sprint just completed across 8 epics:\n- `parking_lot` mutexes everywhere with runtime deadlock detection (caught a self-deadlock that would have taken hours to find with std::sync)\n- Per-handler Prometheus metrics, structured JSON logging, deep health checks\n- Chaos-tested failover (leader kill, network partition, kill-9 mid-write)\n- Per-tenant quotas, load shedding, control plane replication\n- 1178 core tests + chaos harness + cargo-fuzz + CRDT property tests\n- 5 operational runbooks, watchdog with auto-restart\n\nRead the maturity notes: https://yantrikdb.com/server/quickstart/#maturity\n\n\n\n## The Problem\n\nCurrent AI memory is:\n\n> Store everything → Embed → Retrieve top-k → Inject into context → Hope it helps.\n\nThat's not memory. That's a search engine with extra steps.\n\nReal memory is hierarchical, compressed, contextual, self-updating, emotionally weighted, time-aware, and predictive. YantrikDB is built for that.\n\n## Why Not Existing Solutions?\n\n| Solution | What it does | What it lacks |\n|----------|-------------|---------------|\n| **Vector DBs** (Pinecone, Weaviate) | Nearest-neighbor lookup | No decay, no causality, no self-organization |\n| **Knowledge Graphs** (Neo4j) | Structured relations | Poor for fuzzy memory, not adaptive |\n| **Memory Frameworks** (LangChain, Mem0) | Retrieval wrappers | Not a memory architecture — just middleware |\n| **File-based** (CLAUDE.md, memory files) | Dump everything into context | O(n) token cost, no relevance filtering |\n\n### Benchmark: Selective Recall vs. File-Based Memory\n\n| Memories | File-Based | YantrikDB | Token Savings | Precision |\n|----------|-----------|-----------|---------------|-----------|\n| 100 | 1,770 tokens | 69 tokens | **96%** | 66% |\n| 500 | 9,807 tokens | 72 tokens | **99.3%** | 77% |\n| 1,000 | 19,988 tokens | 72 tokens | **99.6%** | 84% |\n| 5,000 | 101,739 tokens | 53 tokens | **99.9%** | 88% |\n\nAt 500 memories, file-based exceeds 32K context windows. At 5,000, it doesn't fit in any context window — not even 200K. YantrikDB stays at ~70 tokens per query. Precision *improves* with more data — the opposite of context stuffing.\n\n## Architecture\n\n### Design Principles\n\n- **Embedded, not client-server** — single file, no server process (like SQLite)\n- **Local-first, sync-native** — works offline, syncs when connected\n- **Cognitive operations, not SQL** — `record()`, `recall()`, `relate()`, not `SELECT`\n- **Living system, not passive store** — does work between conversations\n- **Thread-safe** — `Send + Sync` with internal Mutex/RwLock, safe for concurrent access\n\n### Five Indexes, One Engine\n\n```\n┌──────────────────────────────────────────────────────┐\n│                   YantrikDB Engine                    │\n│                                                      │\n│  ┌──────────┬──────────┬──────────┬──────────┐       │\n│  │  Vector  │  Graph   │ Temporal │  Decay   │       │\n│  │  (HNSW)  │(Entities)│ (Events) │  (Heap)  │       │\n│  └──────────┴──────────┴──────────┴──────────┘       │\n│  ┌──────────┐                                        │\n│  │ Key-Value│  WAL + Replication Log (CRDT)          │\n│  └──────────┘                                        │\n└──────────────────────────────────────────────────────┘\n```\n\n1. **Vector Index (HNSW)** — semantic similarity search across memories\n2. **Graph Index** — entity relationships, profile aggregation, bridge detection\n3. **Temporal Index** — time-aware queries (\"what happened Tuesday\", \"upcoming deadlines\")\n4. **Decay Heap** — importance scores that degrade over time, like human memory\n5. **Key-Value Store** — fast facts, session state, scoring weights\n\n### Memory Types (Tulving's Taxonomy)\n\n| Type | What it stores | Example |\n|------|---------------|---------|\n| **Semantic** | Facts, knowledge | \"User is a software engineer at Meta\" |\n| **Episodic** | Events with context | \"Had a rough day at work on Feb 20\" |\n| **Procedural** | Strategies, what worked | \"Deploy with blue-green, not rolling update\" |\n\nAll memories carry **importance**, **valence** (emotional tone), **domain**, **source**, **certainty**, and **timestamps** — used in a multi-signal scoring function that goes far beyond cosine similarity.\n\n## Key Capabilities\n\n### Relevance-Conditioned Scoring\n\nNot just vector similarity. Every recall combines:\n\n- **Semantic similarity** (HNSW) — what's topically related\n- **Temporal decay** — recent memories score higher\n- **Importance weighting** — critical decisions beat trivia\n- **Graph proximity** — entity relationships boost connected memories\n- **Retrieval feedback** — learns from past recall quality\n\nWeights are tuned automatically from usage patterns.\n\n### Conflict Detection & Resolution\n\nWhen memories contradict, YantrikDB doesn't guess — it creates a conflict segment:\n\n```\n\"works at Google\" (recorded Jan 15) vs. \"works at Meta\" (recorded Mar 1)\n→ Conflict: identity_fact, priority: high, strategy: ask_user\n```\n\nResolution is conversational: the AI asks naturally, not programmatically.\n\n### Semantic Consolidation\n\nAfter many conversations, memories pile up. `think()` runs:\n\n1. **Consolidation** — merge similar memories, extract patterns\n2. **Conflict scan** — find contradictions across the knowledge base\n3. **Pattern mining** — cross-domain discovery (\"work stress correlates with health entries\")\n4. **Trigger evaluation** — proactive insights worth surfacing\n\n### Proactive Triggers\n\nThe engine generates triggers when it detects something worth reaching out about:\n\n- Memory conflicts needing resolution\n- Approaching deadlines (temporal awareness)\n- Patterns detected across domains\n- High-importance memories about to decay\n- Goal tracking (\"how's the marathon training?\")\n\nEvery trigger is grounded in real memory data — not engagement farming.\n\n### Multi-Device Sync (CRDT)\n\nLocal-first with append-only replication log:\n\n- **CRDT merging** — graph edges, memories, and metadata merge without conflicts\n- **Vector indexes rebuild locally** — raw memories sync, each device rebuilds HNSW\n- **Forget propagation** — tombstones ensure forgotten memories stay forgotten\n- **Conflict detection** — contradictions across devices are flagged for resolution\n\n### Sessions & Temporal Awareness\n\n```python\nsid = db.session_start(\"default\", \"claude-code\")\ndb.record(\"decided to use PostgreSQL\")  # auto-linked to session\ndb.record(\"Alice suggested Redis for caching\")\ndb.session_end(sid)\n# → computes: memory_count, avg_valence, topics, duration\n\ndb.stale(days=14)    # high-importance memories not accessed recently\ndb.upcoming(days=7)  # memories with approaching deadlines\n```\n\n## Full API\n\n| Operation | Methods |\n|-----------|---------|\n| **Core** | `record`, `record_batch`, `recall`, `recall_with_response`, `recall_refine`, `forget`, `correct` |\n| **Knowledge Graph** | `relate`, `get_edges`, `search_entities`, `entity_profile`, `relationship_depth`, `link_memory_entity` |\n| **Cognition** | `think`, `get_patterns`, `scan_conflicts`, `resolve_conflict`, `derive_personality` |\n| **Triggers** | `get_pending_triggers`, `acknowledge_trigger`, `deliver_trigger`, `act_on_trigger`, `dismiss_trigger` |\n| **Sessions** | `session_start`, `session_end`, `session_history`, `active_session`, `session_abandon_stale` |\n| **Temporal** | `stale`, `upcoming` |\n| **Procedural** | `record_procedural`, `surface_procedural`, `reinforce_procedural` |\n| **Lifecycle** | `archive`, `hydrate`, `decay`, `evict`, `list_memories`, `stats` |\n| **Sync** | `extract_ops_since`, `apply_ops`, `get_peer_watermark`, `set_peer_watermark` |\n| **Maintenance** | `rebuild_vec_index`, `rebuild_graph_index`, `learned_weights` |\n\n## Technical Decisions\n\n| Decision | Choice | Rationale |\n|----------|--------|-----------|\n| **Core language** | Rust | Memory safety, no GC, ideal for embedded engines |\n| **Architecture** | Embedded (like SQLite) | No server overhead, sub-ms reads, single-tenant |\n| **Bindings** | Python (PyO3), TypeScript | Agent/AI layer integration |\n| **Storage** | Single file per user | Portable, backupable, no infrastructure |\n| **Sync** | CRDTs + append-only log | Conflict-free for most operations, deterministic |\n| **Thread safety** | Mutex/RwLock, Send+Sync | Safe concurrent access from multiple threads |\n| **Query interface** | Cognitive operations API | Not SQL — designed for how agents think |\n\n## Ecosystem\n\n| Package | What | Install | Source |\n|---------|------|---------|--------|\n| **[yantrikdb-mcp](https://github.com/yantrikos/yantrikdb-mcp)** | **MCP server for Claude Code / Cursor / Windsurf — start here** | `pip install yantrikdb-mcp` | [GitHub](https://github.com/yantrikos/yantrikdb-mcp) · [PyPI](https://pypi.org/project/yantrikdb-mcp/) |\n| [yantrikdb-client](https://github.com/yantrikos/yantrikdb-client) | Python client SDK for the HTTP server (typed memory, reflect, character primitives) | `pip install yantrikdb-client` | [GitHub](https://github.com/yantrikos/yantrikdb-client) · [PyPI](https://pypi.org/project/yantrikdb-client/) |\n| [yantrikdb-server](https://github.com/yantrikos/yantrikdb-server) | HTTP + wire-protocol server, HA cluster | `docker run ghcr.io/yantrikos/yantrikdb` | [GitHub](https://github.com/yantrikos/yantrikdb-server) |\n| [yantrikdb (Rust)](https://crates.io/crates/yantrikdb) | Embedded Rust engine | `cargo add yantrikdb` | [GitHub](https://github.com/yantrikos/yantrikdb) |\n| [yantrikdb (Python)](https://pypi.org/project/yantrikdb/) | Python bindings via PyO3 | `pip install yantrikdb` | [GitHub](https://github.com/yantrikos/yantrikdb) |\n\n## Roadmap\n\n- [x] **V0** — Embedded engine, core memory model (record, recall, relate, consolidate, decay)\n- [x] **V1** — Replication log, CRDT-based sync between devices\n- [x] **V2** — Conflict resolution with human-in-the-loop\n- [x] **V3** — Proactive cognition loop, pattern detection, trigger system\n- [x] **V4** — Sessions, temporal awareness, cross-domain pattern mining, entity profiles\n- [ ] **V5** — Multi-agent shared memory, federated learning across users\n\n## Research & Publications\n\n- **U.S. Patent Application 19/573,392** (March 2026): \"Cognitive Memory Database System with Relevance-Conditioned Scoring and Autonomous Knowledge Management\"\n- **Zenodo:** [YantrikDB: A Cognitive Memory Engine for Persistent AI Systems](https://zenodo.org/records/14933693)\n\n## Author\n\n**Pranab Sarkar** — [ORCID](https://orcid.org/0009-0009-8683-1481) · [LinkedIn](https://www.linkedin.com/in/pranab-sarkar-b0511160/) · developer@pranab.co.in\n\n## License\n\nAGPL-3.0. See [LICENSE](LICENSE) for the full text.\n\nThe [MCP server](https://github.com/yantrikos/yantrikdb-mcp) is MIT-licensed — using the engine via the MCP server does not trigger AGPL obligations on your code.\n","summary":"YantrikDB is a cognitive memory engine designed to let AI agents manage memories more intelligently than traditional vector databases, by automatically forgetting, consolidating, and flagging contradictions among stored facts. It exposes a server or Python client API that trims token usage to a few dozen per query while improving recall precision as data grows, and offers features such as configurable temporal decay, entity graph relationships, and proactive conflict detection. The system is built to serve AI‑native operating systems and agents that need robust, low‑latency memory, making it especially useful for developers and researchers building conversational, knowledge‑driven applications that require scalable, self‑healing memory layers.","description":"Cognitive memory database for AI agents — consolidates duplicates, detects contradictions, fades stale memories via temporal decay. Rust, AGPL, ships as library / MCP server / HTTP cluster.","stars":139,"language":"Rust"},{"owner":"doors-dev","repo":"doors","url":"https://github.com/doors-dev/doors","readme":"# Doors\n[![codecov](https://codecov.io/gh/doors-dev/doors/branch/main/graph/badge.svg?token=6FOBJKNHFZ)](https://codecov.io/gh/doors-dev/doors)\n[![Go Report Card](https://goreportcard.com/badge/github.com/doors-dev/doors)](https://goreportcard.com/report/github.com/doors-dev/doors)\n[![Go Reference](https://pkg.go.dev/badge/github.com/doors-dev/doors.svg)](https://pkg.go.dev/github.com/doors-dev/doors)\n[![Mentioned in Awesome Go](https://awesome.re/mentioned-badge.svg)](https://github.com/avelino/awesome-go)\n\n[https://doors.dev](https://doors.dev)\n\nDoors is a server-driven UI framework + runtime for building stateful, reactive web applications in Go.\n\n## Example\n\n```gox\ntype Search struct {\n    input doors.Source[string] // reactive state\n}\n\nelem (s Search) Main() {\n    <input\n        (doors.AInput{\n            On: func(ctx context.Context, r doors.RequestInput) bool {\n                s.input.Update(ctx, r.Event().Value) // update state\n                return false\n            },\n        })\n        type=\"text\"\n        placeholder=\"search\">\n\n    ~(s.input.Bind(s.results)) // bind results to state changes\n}\n\nelem (s Search) results(input string) {\n    ~(for _, user := range Users.Search(input) {\n        <card>\n            ~(user.Name)\n        </card>\n    })\n}\n```\n\n## Some highlights\n\n- **Front-end framework capabilities in server-side Go.** Reactive state primitives, dynamic routing, composable components.\n- **No public API layer.** No endpoint design needed, private temporal transport is handled under the hood.\n- **Unified control flow.** No context switch between back-end/front-end.\n- **Integrated web stack.** Bundle assets, build scripts, serve private files, automate CSP, and ship in one binary.\n\n## Execution model\n\nGo server is UI runtime: web application runs on a stateful server, while the browser acts as a remote renderer and input layer.\n\n## Mental model\n\nLink DOM to the data it depends on.\n\n## Peculiarities\n\n- Purposely build Go language extension with its own LSP, parser, and editor plugins. Adds HTML as Go expressions and `elem` primitives.\n- Reactive state primitives that can be subscribed to, derived, and mutated.\n- Dynamic containers that can be updated, replaced, or removed at runtime.\n- Type-safe routing with URLs represented as Go structs.\n- HTTP/3-ready synchronization protocol (rolling-request + streaming, events via regular post, no WebSockets/SSE).\n- Custom concurrency engine that enables non-blocking event processing, parallel rendering, and tree-aware state propagation.\n- Secure by default: every user can interact only with what you render to them. Means you check permissions when your render the button and that's is enough to be sure that related action wont be triggered by anyone else.\n\n## Where Doors fits best\n\n- SaaS products\n- Business systems\n- Customer portals\n- Admin panels\n- Internal tools\n- Real-time apps with meaningful server-side workflows\n\n## Where it is not the right fit\n\n- Static or mostly non-interactive sites\n- Client-first apps with minimal server behavior and simple routing\n- Offline-first PWAs where the browser must be the primary runtime\n\n## Comparisons\n\n### Doors vs HTMX\n\nHTMX enhances HTML by coordinating behavior through attributes and endpoints. Doors is a UI runtime: you write the interaction flow directly in Go and let the runtime handle synchronization.\n\n### Doors vs React, Next.js, and similar stacks\n\nTypical JavaScript stacks place much of the interaction model in the browser while the server acts mainly as a data service. Doors keeps that flow on the server in Go, with the browser focused on display and input.\n\n## Learn more\n\n- [Officiean Website](https://doors.dev)\n- [Documentation](https://doors.dev/docs/)\n- [Tutorial](https://doors.dev/tutorial/)\n- [API Reference](https://pkg.go.dev/github.com/doors-dev/doors)\n- [GoX](https://github.com/doors-dev/gox)\n\n## Status\n\nDoors is in beta. It is ready for development and can be used in production with caution, but you should expect fixes and updates as the ecosystem matures.\n\n## Licensing\n\nDoors is licensed under the Apache License 2.0.\n\nSee also:\n\n- [Apache License 2.0](./LICENSE)\n","summary":"Doors is a server‑driven UI framework written in Go that lets developers build reactive, stateful web applications entirely on the server while the browser acts only as a rendering and input layer. It provides reactive state primitives, composable components, type‑safe routing, and a private communication protocol that eliminates the need for a public API, streamlining control flow and reducing context switches. The framework bundles asset handling, build scripts, CSP automation, and deployment into a single binary, making it ideal for SaaS products, admin panels, and internal business tools where server‑side logic and real‑time workflows dominate. Developers who want a Go‑centric full‑stack solution with secure, permission‑aware rendering will find Doors a compelling alternative to client‑heavy stacks like React or Next.js.","description":"Server-driven framework for building stateful, reactive web applications entirely in Go.","stars":111,"language":"Go"},{"owner":"RivoLink","repo":"leaf","url":"https://github.com/RivoLink/leaf","readme":"<p align=\"center\">\n  <img src=\"images/logo-wordmark.svg\" alt=\"leaf\" width=\"360\" />\n</p>\n\n<p align=\"center\">\n  Terminal Markdown previewer — GUI-like experience.\n</p>\n\n<p align=\"center\">\n  <img src=\"images/preview.png\" alt=\"leaf\" width=\"710px\" /><br>\n  <sub>See more screenshots in the <a href=\"demo/README.md\">features</a> demo</sub>\n</p>\n\n## Install\n\nInstall the latest published binary.\n\nmacOS / Linux / Android / Termux:\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/RivoLink/leaf/main/scripts/install.sh | sh\n```\n\nWindows:\n\n```powershell\nirm https://raw.githubusercontent.com/RivoLink/leaf/main/scripts/install.ps1 | iex\n```\n\nnpm:\n\n```bash\nnpm install -g @rivolink/leaf\n```\n\nArchLinux (AUR):\n\nUse an [AUR helper](https://wiki.archlinux.org/title/AUR_helpers), such as `yay`:\n\n```bash\nyay -S leaf-markdown-viewer\n```\n\nVerify the installation:\n\n```bash\nleaf --version\n```\n\n## Update\n\nUpdate an existing installation to the latest published release.\n\nSelf:\n\n```bash\nleaf --update\n```\n\n`leaf --update` downloads the matching published asset, verifies it against the published `checksums.txt` SHA256, and then installs it.\n\nOn Windows, if replacing the running `.exe` is blocked by the OS, rerun the PowerShell installer from the install section.\n\nnpm:\n\n```bash\nnpm update -g @rivolink/leaf\n```\n\n## Build\n\nClone the repository:\n\n```bash\ngit clone https://github.com/RivoLink/leaf.git\ncd leaf\n```\n\nBuild the release binary locally:\n\n```bash\ncargo build --release\n```\n\nCreate a local bin directory if needed and symlink `leaf` into it:\n\n```bash\nmkdir -p ~/.local/bin\nln -sf \"$(pwd)/target/release/leaf\" ~/.local/bin/leaf\n```\n\nIf `~/.local/bin` is not already on your `PATH`, add it to `~/.bashrc` or `~/.zshrc`:\n\n```bash\nexport PATH=\"$HOME/.local/bin:$PATH\"\n```\n\n## Usage\n\n```bash\n# Open a Markdown file\nleaf TESTING.md\n\n# Watch mode — reloads automatically on save\nleaf --watch TESTING.md\nleaf -w TESTING.md\n\n# Open the fuzzy Markdown picker\nleaf\n\n# Open the classic directory browser picker\nleaf --picker\n\n# Open the fuzzy Markdown picker, then watch the selected file\nleaf -w\n\n# Open the classic directory browser picker, then watch the selected file\nleaf -w --picker\n\n# Open a dash-prefixed filename\nleaf -- -notes.md\n\n# Stream Markdown from another CLI tool\nclaude \"explain Rust lifetimes\" | leaf\n\n# Preview a local file through stdin\ncat TESTING.md | leaf\n\n```\n\n## Configuration\n\nSet default values for theme, editor, and watch mode via `config.toml`:\n\n```bash\nleaf --config\n```\n\nThis opens the configuration file in your editor. If the file does not exist yet, leaf creates it with documented defaults.\n\n```toml\ntheme = \"ocean\"      # arctic, forest, ocean, solarized-dark\neditor = \"nano\"      # any editor in PATH\nwatch = false        # auto-reload when opening a file\n```\n\nAll settings are optional. CLI arguments always take priority. See [`config.toml`](config.toml) for details.\n\n## Keybindings\n\n| Key | Action |\n|---|---|\n| `j` / `↓` | Scroll down |\n| `k` / `↑` | Scroll up |\n| `d` / PgDn | Page down (20 lines) |\n| `u` / PgUp | Page up (20 lines) |\n| `g` / Home | Top |\n| `G` / End | Bottom |\n| `t` | Toggle TOC sidebar |\n| `Shift+Sel` | Select text |\n| `Shift+T` | Open theme picker |\n| `Shift+E` | Open editor picker |\n| `Shift+P` | Open file browser |\n| `Ctrl+E` | Open in editor |\n| `Ctrl+P` | Open fuzzy picker |\n| `Ctrl+F` / `/` | Find |\n| `n` / `N` | Next / prev match |\n| `?` | Show help popup |\n| `r` | Force reload (watch mode) |\n| `q` | Quit |\n\n## Features\n\n- **Live preview** — Watch mode with automatic reload and visual feedback.\n- **File picker** — Fuzzy Markdown picker, directory browser, and watch after selection.\n- **Editor integration** — Open the current file in your preferred editor.\n- **Frontmatter support** — YAML frontmatter rendered as a table (horizontal or vertical based on key count).\n- **Rich Markdown rendering** — Tables, lists, blockquotes, rules, bold, italic, and strikethrough.\n- **Syntax highlighting** — Common aliases like `py`, `cpp`, `json`, `toml`, `ps1`, `dockerfile`.\n- **LaTeX support** — Inline, block, and `latex` / `tex` code blocks rendered as formulas.\n- **Navigation** — TOC sidebar, active section tracking, heading jumps, and search.\n- **Terminal UX** — Theme picker, help popup, file path popup, mouse and keyboard support.\n- **CLI friendly** — stdin support and `leaf --update` with SHA256 verification.\n\n## Typical AI Workflow\n\n```bash\n# Terminal 1: generate the file\naichat \"...\" > notes.md\n\n# Terminal 2: live watch\nleaf --watch notes.md\n```\n\n## Troubleshooting\n\n### Windows: missing Visual C++ runtime\n\nIf `leaf.exe` does not start on Windows and reports a missing MSVC runtime, install the latest supported Microsoft Visual C++ Redistributable from Microsoft Learn:\n\n- https://learn.microsoft.com/fr-fr/cpp/windows/latest-supported-vc-redist?view=msvc-170\n\nDirect download for the latest supported **X64** Microsoft Visual C++ Redistributable:\n\n- https://aka.ms/vc14/vc_redist.x64.exe\n\nFor `leaf-windows-x86_64.exe`, the relevant package is the latest supported **X64** Visual C++ v14 Redistributable.\n\n### Windows: update or file replacement error\n\nIf `leaf --update` fails on Windows with an error about replacing, renaming, or writing `leaf.exe`, the running executable was likely locked by the OS.\n\nClose any terminal session still running `leaf`, then rerun the PowerShell installer from the install section:\n\n```powershell\nirm https://raw.githubusercontent.com/RivoLink/leaf/main/scripts/install.ps1 | iex\n```\n\n## Uninstall\n\nmacOS / Linux / Android / Termux:\n\n```bash\nrm -f ~/.local/bin/leaf\n```\n\nWindows:\n\n```powershell\nRemove-Item \"$env:LOCALAPPDATA\\Programs\\leaf\\leaf.exe\" -Force\n```\n\nnpm:\n\n```bash\nnpm uninstall -g @rivolink/leaf\n```\n\n## Contributors\n\nThanks to all contributors.\n\n![Contributors](https://contrib.rocks/image?repo=RivoLink/leaf)\n\n## Support\n\nContributions are welcome. Feel free to open an issue or submit a pull request.\n\nSee the [CONTRIBUTING.md](CONTRIBUTING.md) file for details.\n\nIf you like **leaf**, consider giving the project a star ⭐\n\n## License\n\nThis project is licensed under the MIT License.\n\nSee the [LICENSE](LICENSE) file for details.\n","summary":"Leaf is a terminal‑based Markdown previewer that delivers a GUI‑like rendering directly inside your shell. It supports live preview with automatic reload, fuzzy and directory file pickers, easy editor integration, and rich Markdown features such as tables, lists, block quotes, and syntax‑highlighted code blocks, while also rendering YAML frontmatter as a table. Additional convenience options include theming, configurable shortcuts, and the ability to pipe Markdown from other CLI tools. Leaf is ideal for developers, technical writers, and anyone who prefers a fast, low‑overhead Markdown viewing experience without leaving the terminal.","description":"Terminal Markdown previewer — GUI-like experience.","stars":592,"language":"Rust"},{"owner":"GRVYDEV","repo":"marky","url":"https://github.com/GRVYDEV/marky","readme":"<h1 align=\"center\">\n  <br>\n   Marky\n  <br>\n</h1>\n\n<h4 align=\"center\">A fast, native markdown viewer for macOS and Linux built with <a href=\"https://v2.tauri.app\">Tauri v2</a>, <a href=\"https://react.dev\">React</a>, and <a href=\"https://github.com/markdown-it/markdown-it\">markdown-it</a>. Beautiful rendering of tables, code blocks, task lists, math, and diagrams — with live reload.</h4>\n\n<p align=\"center\">\n    <a href=\"https://github.com/GRVYDEV/marky/stargazers\"><img src=\"https://img.shields.io/github/stars/GRVYDEV/marky\" alt=\"Stars Badge\"/></a>\n    <a href=\"https://github.com/GRVYDEV/marky/network/members\"><img src=\"https://img.shields.io/github/forks/GRVYDEV/marky\" alt=\"Forks Badge\"/></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://youtu.be/nGBxt8uOVjc\">View Demo</a> •\n  <a href=\"#install\">Install</a> •\n  <a href=\"https://github.com/GRVYDEV/marky/issues\">Request Features</a>\n</p>\n\n![Marky screenshot](assets/marky-img.png)\n\n<!-- TABLE OF CONTENTS -->\n<details open=\"open\">\n  <summary><h2 style=\"display: inline-block\">Table of Contents</h2></summary>\n  <ol>\n    <li>\n      <a href=\"#about-the-project\">About The Project</a>\n      <ul>\n        <li><a href=\"#features\">Features</a></li>\n      </ul>\n    </li>\n    <li>\n      <a href=\"#install\">Install</a>\n      <ul>\n        <li><a href=\"#homebrew-macos\">Homebrew (macOS)</a></li>\n        <li><a href=\"#ubuntu--debian\">Ubuntu / Debian</a></li>\n        <li><a href=\"#appimage-linux\">AppImage (Linux)</a></li>\n        <li><a href=\"#from-source\">From Source</a></li>\n      </ul>\n    </li>\n    <li><a href=\"#usage\">Usage</a></li>\n    <li><a href=\"#keyboard-shortcuts\">Keyboard Shortcuts</a></li>\n    <li><a href=\"#development\">Development</a></li>\n    <li><a href=\"#built-with\">Built With</a></li>\n    <li><a href=\"#roadmap\">Roadmap</a></li>\n    <li><a href=\"#contributing\">Contributing</a></li>\n    <li><a href=\"#contact-me\">Contact Me</a></li>\n  </ol>\n</details>\n\n## About The Project\n\nMarky is a desktop markdown viewer designed for one thing: opening `.md` files from the terminal and getting beautiful, instant rendering. Launch it with `marky FILENAME` to view a file or `marky FOLDER` to open a folder as a persistent workspace (Obsidian-style). Files reload live as they change on disk — perfect for viewing Claude-generated plans, documentation, or notes as they're being written.\n\n### Features\n\n- **CLI-first** — `marky README.md` opens a window. `marky ./docs/` opens a folder.\n- **Live reload** — edits on disk (from your editor, Claude, etc.) update the view instantly.\n- **Folders** — add folders as persistent workspaces (Obsidian-style). They appear in a sidebar and restore on launch.\n- **Cmd+K command palette** — fuzzy-search files across all open folders, powered by [nucleo](https://github.com/helix-editor/nucleo).\n- **Syntax highlighting** — [Shiki](https://shiki.style) with VS Code themes for accurate, beautiful code blocks.\n- **Math** — KaTeX rendering for `$inline$` and `$$display$$` math.\n- **Mermaid diagrams** — fenced `mermaid` blocks render as SVG.\n- **GFM** — tables, task lists, strikethrough, autolinks, footnotes.\n- **Light & dark themes** — follows system preference or toggle manually.\n- **Sanitized rendering** — all HTML is run through DOMPurify. Safe to view untrusted markdown.\n- **Small & fast** — native webview, no Electron. Production `.dmg` is under 15 MB.\n\n## Install\n\n### Homebrew (macOS)\n\n_NOTE_: I am currently waiting for apple developer review so for the time being the app is not signed. This will be fixed soon.\n\n```bash\nbrew tap GRVYDEV/tap\nbrew install --cask GRVYDEV/tap/marky\n# This is temporary until I can sign the binary\nxattr -cr /Applications/Marky.app\n```\n\n### Ubuntu / Debian\n\nDownload the `.deb` for your architecture from the [latest release](https://github.com/GRVYDEV/marky/releases/latest):\n\n```bash\n# amd64\ncurl -LO https://github.com/GRVYDEV/marky/releases/latest/download/marky_0.1.2_amd64.deb\nsudo dpkg -i marky_0.1.2_amd64.deb\n\n# arm64\ncurl -LO https://github.com/GRVYDEV/marky/releases/latest/download/marky_0.1.2_arm64.deb\nsudo dpkg -i marky_0.1.2_arm64.deb\n```\n\n### AppImage (Linux)\n\nDownload the AppImage from the [latest release](https://github.com/GRVYDEV/marky/releases/latest):\n\n```bash\ncurl -LO https://github.com/GRVYDEV/marky/releases/latest/download/Marky_0.1.2_amd64.AppImage\nchmod +x Marky_0.1.2_amd64.AppImage\n./Marky_0.1.2_amd64.AppImage\n```\n\n### From Source\n\nRequires [Rust](https://rustup.rs/), [Node.js](https://nodejs.org/), and [pnpm](https://pnpm.io/).\n\n```bash\ngit clone https://github.com/GRVYDEV/marky.git\ncd marky\npnpm install\npnpm tauri build\n./scripts/install-cli.sh\n```\n\nThe install script symlinks `marky` to `~/.local/bin/`. Make sure that's on your `PATH`:\n\n```bash\n# bash/zsh\nexport PATH=\"$HOME/.local/bin:$PATH\"\n\n# fish\nset -Ux fish_user_paths $HOME/.local/bin $fish_user_paths\n```\n\n## Usage\n\n```bash\n# Open a single file\nmarky README.md\n\n# Open a folder as a workspace\nmarky ./docs/\n\n# Open with no args — restores your last session\nmarky\n```\n\n## Keyboard Shortcuts\n\n| Shortcut      | Action                              |\n| ------------- | ----------------------------------- |\n| `Cmd+K`       | Command palette (fuzzy file search) |\n| `Cmd+O`       | Open file                           |\n| `Cmd+Shift+O` | Add folder                          |\n| `Cmd+F`       | Search in page                      |\n\n## Development\n\n```bash\npnpm install\npnpm tauri dev       # dev server with HMR\n```\n\n### Run Tests\n\n```bash\n# Frontend\npnpm test\n\n# Rust\ncd src-tauri && cargo test\n```\n\n### Project Structure\n\n```\nsrc-tauri/       Rust backend — CLI, file I/O, file watching, folder registry, fuzzy search\nsrc/             React frontend — markdown pipeline, UI components, theme\nsrc/components/  App components (Viewer, Sidebar, CommandPalette, etc.)\nsrc/components/ui/  shadcn/ui primitives\nsrc/lib/         Core logic (markdown-it config, Shiki, Tauri IPC wrappers)\nsrc/styles/      Tailwind base + markdown prose styles\nscripts/         Install helpers\n```\n\n## Built With\n\n| Layer               | Tech                                                      |\n| ------------------- | --------------------------------------------------------- |\n| Desktop shell       | [Tauri v2](https://v2.tauri.app)                          |\n| Frontend            | React + TypeScript + Vite                                 |\n| Markdown            | [markdown-it](https://github.com/markdown-it/markdown-it) |\n| Syntax highlighting | [Shiki](https://shiki.style)                              |\n| Math                | [KaTeX](https://katex.org)                                |\n| Diagrams            | [Mermaid](https://mermaid.js.org)                         |\n| Fuzzy search        | [nucleo](https://github.com/helix-editor/nucleo)          |\n| UI primitives       | [shadcn/ui](https://ui.shadcn.com)                        |\n| Styling             | [Tailwind CSS](https://tailwindcss.com)                   |\n| File watching       | [notify](https://github.com/notify-rs/notify)             |\n\n## Roadmap\n\n- **Built-in AI chat** — chat with Claude Code or Codex directly inside your markdown documents\n- **Git diff review** — view and review local git diffs without leaving the app\n\n## Contributing\n\nContributions are what make the open source community such an amazing place to learn, inspire, and create.\nAny contributions you make are **greatly appreciated**.\n\n1. Fork the Project\n2. Create your Feature Branch: `git checkout -b feature/AmazingFeature`\n3. Commit your Changes: `git commit -m 'Add some AmazingFeature'`\n4. Push to the Branch: `git push origin feature/AmazingFeature`\n5. Open a Pull Request\n\nBefore submitting a PR:\n\n- Run `pnpm test` and `cd src-tauri && cargo test`\n- Run `pnpm typecheck`\n- Actually open a markdown file with `pnpm tauri dev` and verify it renders correctly\n\n## Contact Me\n\n> GitHub [@GRVYDEV](https://github.com/GRVYDEV) &nbsp;&middot;&nbsp;\n> Twitter [@grvydev](https://twitter.com/grvydev)\n","summary":"Marky is a lightweight, Tauri‑based desktop application that renders Markdown files with a high‑fidelity preview directly from the terminal. It offers instant live‑reload, Obsidian‑style folder workspaces, a fuzzy command palette, Shiki‑powered syntax highlighting, KaTeX math, Mermaid diagrams, GFM helpers, and safe rendering via DOMPurify, all within an under‑15‑MB bundle. Developers, writers, and documentation teams that rely on CLI workflows or AI‑generated content can quickly preview notes, code snippets, and diagrams in a clean, theme‑aware interface on macOS or Linux.","description":"A lightweight easy to use markdown viewer","stars":231,"language":"TypeScript"},{"owner":"XTraceAI","repo":"xtrace-sdk","url":"https://github.com/XTraceAI/xtrace-sdk","readme":"<div align=\"center\">\n\n<!-- Replace with your banner gif once added to assets/ -->\n<img src=\"assets/xtrace_orbital.gif\" width=\"600\" alt=\"XTrace SDK\">\n\n<p><strong> The encrypted vector database.<br>Your data never leaves your machine in plaintext. </strong></p>\n\n<p>\n  <a href=\"https://pypi.org/project/xtrace-ai-sdk/\"><img src=\"https://img.shields.io/pypi/v/xtrace-ai-sdk?color=blue&label=PyPI&cacheSeconds=0\" alt=\"PyPI\"></a>\n  <a href=\"https://github.com/XTraceAI/xtrace-sdk/blob/main/LICENSE\"><img src=\"https://img.shields.io/badge/License-Apache--2.0-ffffff?labelColor=d4eaf7&color=2e6cc4\" alt=\"License\"></a>\n  <a href=\"https://www.python.org/downloads/\"><img src=\"https://img.shields.io/badge/Python-3.11+-3776AB?logo=python&logoColor=white\" alt=\"Python 3.11+\"></a>\n  <a href=\"https://docs.xtrace.ai\"><img src=\"https://img.shields.io/badge/Docs-docs.xtrace.ai-blue\" alt=\"Docs\"></a>\n</p>\n\n<h4>\n  <a href=\"https://docs.xtrace.ai\">Documentation</a> |\n  <a href=\"https://x.com/XTrace_ai\">X</a> |\n  <a href=\"https://www.linkedin.com/company/xtrace-ai/\">LinkedIn</a>\n</h4> \n<sub>Manage your AI memory &rarr; <a href=\"https://mem.xtrace.ai\">mem.xtrace.ai</a></sub>\n</div>\n\n---\n\n# What is XTrace?\n\nEvery vector database on the market requires you to hand your data to a third party in plaintext. XTrace doesn't. Your documents and embedding vectors are encrypted **on your machine** before anything is transmitted. The server stores and searches over ciphertexts — it computes nearest-neighbor results without ever seeing the plaintext. Your data stays yours, even during search.\n\nThe SDK has two modules:\n\n- **x-vec** — encrypted vector search. Store and query text chunks with end-to-end encryption.\n- **x-mem** — encrypted agent memory for AI agents (coming soon).\n\n## How It Works\n\n```\n    Your Machine                              XTrace Server\n┌────────────────────────┐                ┌─────────────────────────┐\n│                        │                │                         │\n│  Documents + Queries   │                │  Stores only ciphertext │\n│         │              │                │                         │\n│         ▼              │                │  Searches over          │\n│  Embed + Encrypt       │── ciphertext ─▶│  encrypted vectors      │\n│  (keys stay here)      │                │  (never decrypts)       │\n│         ▲              │                │                         │\n│         │              │◀─ ciphertext ──│  Returns encrypted      │\n│  Decrypt results       │                │  results                │\n│                        │                │                         │\n└────────────────────────┘                └─────────────────────────┘\n  Secret key never leaves                   Zero knowledge\n```\nXTrace encrypts everything on your machine before anything touches the network. Your content is embedded locally with a model of your choice, and both the resulting vectors and the raw text are encrypted with Paillier homomorphic encryption and AES-256, respectively. The server only ever stores and operates on ciphertexts. When you search, your query is encrypted the same way. The secret key never leaves your environment, and the server never sees a single byte of plaintext. [Verify the encryption](#verify-the-encryption)\n\n# Quick Start\n\n> [!TIP]\n> 🚀 **Create a free account at [app.xtrace.ai](https://app.xtrace.ai)** to get your API key and org ID. The free tier is rate-limited but fully functional.\n\n\n## Install\n\n```bash\n# Base SDK\nuv pip install xtrace-ai-sdk\n\n# With local embedding support (Sentence Transformers)\nuv pip install \"xtrace-ai-sdk[embedding]\"\n```\n\nRequires Python 3.11+.\n\n## Documentation\n\nFull documentation at [docs.xtrace.ai](https://docs.xtrace.ai), or build locally:\n\n```bash\ncd docs && make html\n```\n\n## CLI\n\nThe fastest way to go from zero to search results:\n\n```bash\nuv pip install \"xtrace-ai-sdk[cli]\"\n\nxtrace init                                    # set up credentials + encryption keys\nxtrace kb create my-first-kb                   # create a knowledge base (note the KB ID)\nxtrace xvec load ./my-docs/ <KB_ID>            # encrypt and upload documents\nxtrace xvec retrieve <KB_ID> \"your query\"      # search\n```\n\n## Python SDK\n\nFull async example:\n\n```python\nimport asyncio\nfrom xtrace_sdk.x_vec.utils.execution_context import ExecutionContext\nfrom xtrace_sdk.x_vec.crypto.key_provider import PassphraseKeyProvider\nfrom xtrace_sdk.x_vec.data_loaders.loader import DataLoader\nfrom xtrace_sdk.x_vec.inference.embedding import Embedding\nfrom xtrace_sdk.integrations.xtrace import XTraceIntegration\nfrom xtrace_sdk.x_vec.retrievers.retriever import Retriever\n\n# One-time setup: generate your private cryptographic state and save it\nprovider = PassphraseKeyProvider(\"your-secret-passphrase\")\nctx = ExecutionContext.create(\n    key_provider=provider,\n    homomorphic_client_type=\"paillier_lookup\",\n    embedding_length=512,\n    key_len=1024,\n    path=\"data/exec_context\",\n)\n\nembed  = Embedding(\"sentence_transformer\", \"mixedbread-ai/mxbai-embed-large-v1\", 512)\nxtrace = XTraceIntegration(org_id=\"your_org_id\", api_key=\"your_api_key\")\n\nasync def main():\n    # Encrypt and store documents — content and vectors never leave in plaintext\n    loader = DataLoader(ctx, xtrace)\n    docs   = [{\"chunk_content\": \"XTrace encrypts your embeddings.\", \"meta_data\": {}}]\n    vectors = [await embed.bin_embed(d[\"chunk_content\"]) for d in docs]\n    index, db = await loader.load_data_from_memory(docs, vectors)\n    await loader.dump_db(db, index=index, kb_id=\"your_kb_id\")\n\n    # Query with an encrypted vector — the server never sees the query in plaintext\n    retriever = Retriever(ctx, xtrace)\n    vec     = await embed.bin_embed(\"How does XTrace protect my data?\")\n    ids     = await retriever.nn_search_for_ids(vec, k=3, kb_id=\"your_kb_id\")\n    results = await retriever.retrieve_and_decrypt(ids, kb_id=\"your_kb_id\")\n    for r in results:\n        print(r[\"chunk_content\"])\n\nasyncio.run(main())\n```\n\n## Verify the Encryption\n\nThis repo exists so you can verify the encryption yourself. The tests run fully offline and require no XTrace account:\n\n```bash\nuv pip install -e \".[dev]\"\npytest tests/x_vec/\n```\n\n`test_paillier_encryption.py` and `test_paillier_lookup_encryption.py` verify encrypt/decrypt round-trips and homomorphic addition on ciphertexts — the same primitives the SDK uses when sending data to XTrace. The secret key never leaves your machine.\n\n# Contributing\n\nWe welcome contributions. See [CONTRIBUTING.md](CONTRIBUTING.md) for guidelines.\n\n# License\n\nApache 2.0 — see [LICENSE](LICENSE).\n","summary":"XTrace SDK is a Python library that delivers a privacy‑preserving vector database for AI applications. It encrypts every document, embedding vector, and query on the client side with Paillier homomorphic encryption and AES‑256, so the remote server can only store and search ciphertext while never seeing plaintext. Core features include lightweight client‑side embedding support, an end‑to‑end “encrypt‑then‑upload” workflow, and a CLI for rapid integration, with an upcoming encrypted AI‑agent memory module. The library benefits developers, data scientists, and regulated organizations that need secure, private search and memory for sensitive AI workloads without handing data to third‑party services.","description":"open source version xtrace sdk","stars":282,"language":"Python"},{"owner":"itsmeadarsh2008","repo":"backlit-kbd","url":"https://github.com/itsmeadarsh2008/backlit-kbd","readme":"# backlit-kbd\n\n[![CI](https://img.shields.io/github/actions/workflow/status/itsmeadarsh2008/backlit-kbd/ci.yml?branch=main&label=tests)](https://github.com/itsmeadarsh2008/backlit-kbd/actions/workflows/ci.yml)\n[![Publish](https://img.shields.io/github/actions/workflow/status/itsmeadarsh2008/backlit-kbd/publish.yml?branch=main&label=publish)](https://github.com/itsmeadarsh2008/backlit-kbd/actions/workflows/publish.yml)\n[![PyPI version](https://img.shields.io/pypi/v/backlit-kbd)](https://pypi.org/project/backlit-kbd/)\n[![Python](https://img.shields.io/pypi/pyversions/backlit-kbd)](https://pypi.org/project/backlit-kbd/)\n[![License](https://img.shields.io/github/license/itsmeadarsh2008/backlit-kbd)](LICENSE)\n[![Downloads](https://img.shields.io/pypi/dm/backlit-kbd)](https://pypi.org/project/backlit-kbd/)\n[![Buy Me A Coffee](https://img.shields.io/badge/Buy%20Me%20a%20Coffee-support-yellow?logo=buymeacoffee)](https://buymeacoffee.com/itsmeadarsh)\n[![Sponsor](https://img.shields.io/badge/GitHub%20Sponsors-support-pink?logo=githubsponsors)](https://github.com/sponsors/itsmeadarsh2008)\n\nBeginner-friendly Python package to control keyboard backlight brightness.\n\nIt supports:\n- Real Linux keyboard backlight devices (auto-discovered from sysfs)\n- A mock backend for safe testing without touching laptop hardware\n\n## What This Means\n\n- If you use `--mock`, commands run in memory only (safe for learning).\n- If you do not use `--mock`, the package tries real hardware automatically.\n- You usually do not need `--device-path`.\n\n## Installation\n\nStep 1: Install from PyPI\n\n```bash\npip install backlit-kbd\n```\n\nStep 2 (optional): Install local editable version for development\n\n```bash\npip install -e .\n```\n\nStep 3 (optional): Install dev dependencies\n\n```bash\npip install -e .[dev]\n```\n\n## Quick Start (Python)\n\nStep 1: Import\n\n```python\nfrom backlit_kbd import NotificationBlinker, create_controller\n```\n\nStep 2: Create a safe controller (mock fallback)\n\n```python\ncontroller = create_controller(fallback_to_mock=True)\n```\n\nStep 3: Turn on brightness to 60%\n\n```python\ncontroller.turn_on(60.0)\n```\n\nStep 4: Blink for a notification\n\n```python\ncontroller.blink(count=3, on_ms=120, off_ms=120, level_percent=100.0)\n```\n\nStep 5: Use async notification manager\n\n```python\nblinker = NotificationBlinker(controller)\nblinker.start(\"chat-message\", count=5, on_ms=80, off_ms=120)\n```\n\n## CLI Guide (Beginner Friendly)\n\n### 1) Check Current State\n\nWith mock backend:\n\n```bash\nbacklit-kbd --mock info\n```\n\nWith real hardware backend:\n\n```bash\nbacklit-kbd info\n```\n\n### 2) Set Brightness by Raw Level\n\nWith mock backend:\n\n```bash\nbacklit-kbd --mock set 2\n```\n\nWith real hardware backend:\n\n```bash\nbacklit-kbd set 2\n```\n\n### 3) Set Brightness by Percentage\n\nWith mock backend:\n\n```bash\nbacklit-kbd --mock percent 75\n```\n\nWith real hardware backend:\n\n```bash\nbacklit-kbd percent 75\n```\n\n### 4) Increase and Decrease\n\nIncrease by default step (`1`):\n\n```bash\nbacklit-kbd --mock inc\n```\n\nIncrease by custom step:\n\n```bash\nbacklit-kbd --mock inc 2\n```\n\nDecrease by custom step:\n\n```bash\nbacklit-kbd --mock dec 2\n```\n\nReal hardware equivalents:\n\n```bash\nbacklit-kbd inc\nbacklit-kbd inc 2\nbacklit-kbd dec 2\n```\n\n### 5) Turn On and Off\n\nWith mock backend:\n\n```bash\nbacklit-kbd --mock on --percent 40\nbacklit-kbd --mock off\n```\n\nWith real hardware backend:\n\n```bash\nbacklit-kbd on --percent 40\nbacklit-kbd off\n```\n\n### 6) Blink Pattern (Synchronous)\n\nWith mock backend:\n\n```bash\nbacklit-kbd --mock blink --count 4 --on-ms 100 --off-ms 100 --level-percent 100\n```\n\nWith real hardware backend:\n\n```bash\nbacklit-kbd blink --count 4 --on-ms 100 --off-ms 100 --level-percent 100\n```\n\n### 7) Notification Blink (Async-style Command)\n\nWith mock backend:\n\n```bash\nbacklit-kbd --mock notify --name chat --count 5 --on-ms 80 --off-ms 120 --level-percent 100\n```\n\nWith real hardware backend:\n\n```bash\nbacklit-kbd notify --name chat --count 5 --on-ms 80 --off-ms 120 --level-percent 100\n```\n\n## Full CLI Commands\n\nGlobal options:\n- `--mock` Use in-memory backend (safe, no hardware writes)\n- `--device-path PATH` Optional advanced override for a specific sysfs device\n\nCommands:\n- `info`\n- `set <value>`\n- `percent <value>`\n- `inc [step]`\n- `dec [step]`\n- `on [--percent N]`\n- `off`\n- `blink [--count N --on-ms N --off-ms N --level-percent N]`\n- `notify [--name NAME --count N --on-ms N --off-ms N --level-percent N]`\n\n## Examples Folder\n\nScripts:\n- `examples/blink_notification.py`\n- `examples/brightness_wave.py`\n- `examples/disco_light.py`\n\nRun them:\n\n```bash\npython examples/blink_notification.py\n```\n\n```bash\npython examples/brightness_wave.py\n```\n\n```bash\npython examples/disco_light.py\n```\n\n## Testing\n\nRun tests:\n\n```bash\npython -m pytest\n```\n\nIf you are using the project virtual environment:\n\n```bash\n.venv/bin/pytest\n```\n\n## Troubleshooting\n\n1. `Permission denied` on Linux real hardware mode:\n- You may need proper privileges/udev rules to write to sysfs.\n\n2. No device found in real hardware mode:\n- Use `--mock` for learning/testing.\n- Or use `create_controller(fallback_to_mock=True)` in Python.\n\n3. Want safe practice mode always:\n- Use `--mock` in CLI, or `force_mock=True` / `fallback_to_mock=True` in code.\n\n## Release and Publish\n\nThis repo has GitHub Actions workflows:\n- `CI` runs tests on push and pull request\n- `Publish` builds and publishes to PyPI\n- Uses `astral-sh/setup-uv`\n- Uses PyPI Trusted Publishing (OIDC)\n\nTo publish a new version:\n1. Update version in `pyproject.toml`\n2. Create and push a tag like `v0.1.1`\n3. Or publish a GitHub release\n\n## Support\n\n- Buy Me a Coffee: https://buymeacoffee.com/itsmeadarsh\n- GitHub Sponsors (individual/company): https://github.com/sponsors/itsmeadarsh2008\n\n## Contributing\n\n- Start with `examples/`\n- Check tests in `tests/`\n- Open issues and PRs\n\n## License\n\nMIT License. Created by Adarsh Gourab Mahalik.\n","summary":"backlit‑kbd is a beginner‑friendly Python package that lets users control the brightness of laptop keyboard backlights, automatically discovering real hardware devices via sysfs while also providing a safe mock backend for testing. It offers a simple API for turning brightness on or off, setting raw or percentage levels, adjusting in steps, and running synchronous or asynchronous blink patterns—including notification‑style blinks that can be managed by a dedicated blinker class. The accompanying command‑line interface mirrors these capabilities with convenient flags for mock mode, making it useful for both casual laptop users who want quick brightness tweaks and developers who need programmatic or scripted control for builds, tutorials, or notification systems.","description":"A beginner-friendly Python package for controlling keyboard backlight.","stars":25,"language":"Python"},{"owner":"mmaaz-git","repo":"sostactic","url":"https://github.com/mmaaz-git/sostactic","readme":"# Sostactic\n\nThis is a collection of Lean4 tactics for proving polynomial inequalities via _sum-of-squares (SOS) decompositions_, powered by a Python backend. You can use it via Python or Lean.\n\nThese tactics are significantly more powerful than `nlinarith` and `positivity` -- i.e., they can prove inequalities they cannot. In theory, they can be used to prove any of the following types of statements\n- prove that a polynomial is nonnegative globally\n- prove that a polynomial is nonnegative over a semialgebraic set (i.e., defined by a set of polynomial inequalities)\n- prove that a semialgebraic set is empty, i.e., that a system of polynomial inequalities is infeasible\n\nTo see more about how it works, read the [blog post](https://mmaaz.ca/writings/sostactic.html). Full documentation is provided towards the end of this `README`; feel free to point your coding agent at it.\n\n## Quick Examples\n\n```lean\nimport Sostactic\n\n-- AM-GM inequality\nexample (x y : ℝ) : 2 * x * y ≤ x^2 + y^2 := by\n  sos_decomp\n\n-- Motzkin polynomial: ratio of SOS\nexample (x y z : ℝ) :\n    0 ≤ x^4 * y^2 + x^2 * y^4 + z^6 - 3 * x^2 * y^2 * z^2 := by\n  sos_decomp (degree := 2)\n\n-- 4x³ - 3x + 1 ≥ 0 on [0, 1] (touches 0 at x = 1/2)\n-- linarith, positivity, and nlinarith all fail\nexample (x : ℝ) (h1 : 0 ≤ x) (h2 : 0 ≤ 1 - x) :\n    0 ≤ 4 * x^3 - 3 * x + 1 := by\n  putinar_decomp (order := 2)\n\n-- two disjoint disks centered at (0,0) and (3,3)\n-- linarith and nlinarith fail\nexample : ¬∃ x y : ℝ, 0 ≤ 1 - x^2 - y^2 ∧ 0 ≤ 1 - (x - 3)^2 - (y - 3)^2 := by\n  rintro ⟨x, y, h1, h2⟩\n  schmudgen_empty (order := 1)\n```\n\nLook at `Sostactic/Examples.lean` for more interesting examples!\n\n## Setup\n\n### Prerequisites\n\n- [elan](https://github.com/leanprover/elan) (Lean 4 toolchain manager)\n- Python 3.10+\n\n### 1. Add the dependency\n\nIf your project uses `lakefile.toml`:\n\n```toml\n[[require]]\nname = \"sostactic\"\ngit = \"https://github.com/mmaaz-git/sostactic.git\"\nrev = \"main\"\n```\n\nOr if your project uses `lakefile.lean`:\n\n```lean\nrequire sostactic from git\n  \"https://github.com/mmaaz-git/sostactic.git\" @ \"main\"\n```\n\nThen fetch and build:\n\n```bash\nlake update sostactic\nlake build\n```\n\n> **Note:** Sostactic tracks Mathlib `v4.29.0-rc8`. If your project uses a different Mathlib version, you may need to align them. When creating a new project, the default Mathlib version should match.\n\n### 2. Set up the Python environment\n\nCreate a virtual environment in your project root and install the dependencies:\n\n```bash\npython3 -m venv .venv\n.venv/bin/python3 -m ensurepip\n.venv/bin/python3 -m pip install -r .lake/packages/Sostactic/python/requirements.txt\n```\n\nThat's it. Sostactic auto-discovers `.venv/bin/python3` in your project root.\n\n> **Tip:** Add `.venv/` to your `.gitignore`.\n\n### Advanced: custom Python path\n\nIf your Python lives elsewhere, set the `SOSTACTIC_PYTHON` environment variable:\n\n```bash\nexport SOSTACTIC_PYTHON=/path/to/your/python3\n```\n\n## How it works\n\nThis package has 3 possible ways to use it: as a Python API, as a Python CLI, and as a Lean package. The Lean tactics call the Python CLI to generate the certificate, and then the certificate is checked inside Lean. The Python program uses `cvxpy`, a convex optimization solver, due to the well-established correspondence between SOS polynomials and semidefinite programming (SDP). One issue is that the SDP solution is numerical: we use a rationalization and projecting step, with some additional numerical tricks, to get an _exact_ answer, which is then checked in Lean.\n\nA caveat is that, due to numerical issues, exactification may fail, for a variety of reasons. In the spirit of interactive theorem provers, the solver provides suggestions about how to fix the solution by passing additional arguments.\n\nFor more details on the theory and algorithms, see the [blog post](https://mmaaz.ca/writings/sostactic.html).\n\nThe rest of this `README` introduces the Python API, the Python CLI, and then the Lean tactics.\n\n## Python API\n\nThe entire Python program is contained in `python/sos.py`, with tests in `python/test_sos.py`. There are 5 main functions:\n\n### `sos_decomp(p, denom_degree_bound=0, denom_template=None)`\n\nProve that a polynomial `p` is globally nonnegative by finding an exact SOS certificate.\n\n```python\nfrom sympy import symbols, Poly\nfrom python.sos import sos_decomp\n\nx, y = symbols('x y')\nresult = sos_decomp(Poly(x**2 + y**2, x, y))\nprint(result[\"success\"])  # True\nprint(result[\"exact_sos\"])  # weighted SOS terms: [(weight, poly), ...]\n```\n\nWith `denom_degree_bound=0` (default), finds a pure SOS decomposition: `p = w₁s₁² + w₂s₂² + ...`\n\nWith `denom_degree_bound > 0`, finds SOS polynomials `d` and `n` such that `d·p = n`, handling polynomials like Motzkin's that are nonneg but not themselves SOS:\n\n```python\nx, y, z = symbols('x y z')\nmotzkin = Poly(x**4*y**2 + x**2*y**4 + z**6 - 3*x**2*y**2*z**2, x, y, z)\nresult = sos_decomp(motzkin, denom_degree_bound=2)\nprint(result[\"exact_num_sos\"])  # numerator SOS decomposition\nprint(result[\"exact_den_sos\"])  # denominator SOS decomposition\n```\n\nYou can also pass an explicit `denom_template` as a sympy expression with free parameters (e.g., `a*x**2 + b*y**2 + c*z**2`).\n\nOn failure, `result[\"diagnostics\"]` contains rank info and `result[\"suggestion\"]` has a hint for what to try next.\n\n### `putinar(target, constraints, order, basis_overrides=None)`\n\nProve that `target >= 0` on the semialgebraic set `{x : g₁(x) >= 0, ..., gₘ(x) >= 0}` using Putinar's Positivstellensatz.\n\n```python\nfrom python.sos import putinar\n\nx = symbols('x')\nresult = putinar(\n    target=4*x**3 - 3*x + 1,\n    constraints=[x, 1 - x],\n    order=2\n)\nprint(result[\"success\"])  # True\nprint(result[\"exact_certificate_blocks\"])  # certificate blocks with multipliers and SOS\n```\n\nThe `order` is the global relaxation order `r`. Each block with multiplier `h` is truncated by\n`deg(h * sigma) <= 2r`, so `sigma` uses monomials of degree at most `floor((2r - deg(h)) / 2)`.\n\n### `schmudgen(target, constraints, order, basis_overrides=None)`\n\nSame interface as `putinar`, but uses Schmüdgen's Positivstellensatz, which uses products of all subsets of constraints as multipliers. More powerful than Putinar (works on any compact set), but the SDP grows exponentially in the number of constraints.\n\n```python\nfrom python.sos import schmudgen\n\nx = symbols('x')\nresult = schmudgen(\n    target=x*(1 - x),\n    constraints=[x, 1 - x],\n    order=1\n)\n```\n\n### `putinar_empty(constraints, order, basis_overrides=None)`\n\nProve that `{x : g₁(x) >= 0, ..., gₘ(x) >= 0}` is empty. Equivalent to `putinar(-1, constraints, order=order)`.\n\n```python\nfrom python.sos import putinar_empty\n\nx = symbols('x')\nresult = putinar_empty(constraints=[x, -x - 1], order=1)\nprint(result[\"success\"])  # True — the set {x >= 0, x <= -1} is empty\n```\n\n### `schmudgen_empty(constraints, order, basis_overrides=None)`\n\nSame as `putinar_empty`, using Schmüdgen's Positivstellensatz.\n\n### Return value\n\nAll functions return a dict with at least:\n- `\"success\"`: whether an exact certificate was found\n- `\"suggestion\"`: on failure, a hint for what to try (e.g., increase degree, use a template)\n\nOn success, the result also contains the exact certificate data (SOS terms, Gram matrices, certificate blocks). On failure, `\"diagnostics\"` or `\"block_diagnostics\"` contain per-block exactification diagnostics useful for tuning `basis_overrides`. The backend also returns a heuristic `basis_override_suggestion` and a top-level `\"suggestion\"` string you can paste into the CLI or Lean tactic. Suggestions are derived from the failed numeric solution itself; they do not trigger additional hidden SDP solves.\n\n## Python CLI\n\nThe CLI provides the same 3 commands (`sos_decomp`, `putinar`, `schmudgen`) and outputs JSON certificates.\n\n### `sos_decomp`\n\n```bash\npython python/sos.py sos_decomp --poly \"x**2 + y**2\" --vars \"x y\"\n\n# with denominator search\npython python/sos.py sos_decomp --poly \"x**4*y**2 + x**2*y**4 + z**6 - 3*x**2*y**2*z**2\" \\\n    --vars \"x y z\" --denom-degree-bound 2\n\n# with explicit denominator template\npython python/sos.py sos_decomp --poly \"x**4*y**2 + x**2*y**4 + z**6 - 3*x**2*y**2*z**2\" \\\n    --vars \"x y z\" --denom-degree-bound 2 --denom-template \"a*x**2 + b*y**2 + c*z**2\"\n\n# save certificate to file\npython python/sos.py sos_decomp --poly \"x**2 + y**2\" --vars \"x y\" --out cert.json\n```\n\n### `putinar`\n\n```bash\n# prove 4x^3 - 3x + 1 >= 0 on [0, 1]\npython python/sos.py putinar --poly \"4*x**3 - 3*x + 1\" --constraints \"x, 1-x\" \\\n    --vars \"x\" --order 2\n\n# prove emptiness (--poly defaults to -1)\npython python/sos.py putinar --constraints \"x, -x-1\" --vars \"x\" --order 1\n```\n\n### `schmudgen`\n\n```bash\n# prove x(1-x) >= 0 on [0, 1]\npython python/sos.py schmudgen --poly \"x*(1-x)\" --constraints \"x, 1-x\" \\\n    --vars \"x\" --order 1\n\n# prove emptiness\npython python/sos.py schmudgen --constraints \"1-x**2-y**2, x**2+y**2-2\" \\\n    --vars \"x y\" --order 1\n```\n\n### CLI arguments\n\n| Argument | Description |\n|----------|-------------|\n| `--poly` | Target polynomial (default `\"-1\"` for `putinar`/`schmudgen`) |\n| `--constraints` | Comma-separated list of constraint polynomials |\n| `--vars` | Space-separated list of variable names |\n| `--denom-degree-bound` | Denominator degree bound (for `sos_decomp`) |\n| `--denom-template` | Explicit denominator template (for `sos_decomp`) |\n| `--order` | Global relaxation order for `putinar`/`schmudgen` |\n| `--basis-overrides` | Per-block SOS degree caps, e.g. `\"0:2,3:0\"` |\n| `--out` | Path to write JSON certificate |\n\n### Output format\n\nThe CLI outputs a JSON certificate. For a successful `sos_decomp`:\n\n```json\n{\n  \"success\": true,\n  \"kind\": \"sos\",\n  \"status\": \"optimal\",\n  \"exact_sos\": [\n    {\"weight\": \"1\", \"poly\": {\"expr\": \"y\", \"gens\": [\"x\", \"y\"]}},\n    {\"weight\": \"1\", \"poly\": {\"expr\": \"x\", \"gens\": [\"x\", \"y\"]}}\n  ],\n  \"exact_identity\": {\"expr\": \"0\", \"gens\": [\"x\", \"y\"]},\n  \"exact_residual\": {\"expr\": \"0\", \"gens\": [\"x\", \"y\"]},\n  ...\n}\n```\n\nThis says `x² + y² = 1·y² + 1·x²`. For Positivstellensatz certificates, the result includes `exact_certificate_blocks` with multiplier/SOS pairs for each constraint block.\n\nOn failure, the output includes diagnostics and a suggestion:\n\n```json\n{\n  \"success\": false,\n  \"status\": \"infeasible\",\n  \"suggestion\": \"not SOS — try adding a denominator with denom_degree_bound=2\"\n}\n```\n\n## Lean tactics\n\n### `sos_decomp` — Global nonnegativity\n\nProves that a polynomial `f` is nonnegative globally by finding an SOS decomposition, optionally with a denominator to decompose it into a ratio of SOS polynomials. By Artin's theorem, any globally nonnegative polynomial can be decomposed into a ratio of SOS.\n\nGoals can be in any of these forms: `0 ≤ f`, `f ≥ 0`, `a ≤ b`, or `a ≥ b`.\n\n```lean\n-- plain SOS\nexample (x y : ℝ) : 0 ≤ x^2 + y^2 := by sos_decomp\n\n-- with denominator search (degree bound for the denominator)\nexample (x y z : ℝ) :\n    0 ≤ x^4 * y^2 + x^2 * y^4 + z^6 - 3 * x^2 * y^2 * z^2 := by\n  sos_decomp (degree := 2)\n\n-- with explicit denominator template\nexample (x y z : ℝ) :\n    0 ≤ x^4 * y^2 + x^2 * y^4 + z^6 - 3 * x^2 * y^2 * z^2 := by\n  sos_decomp (degree := 2) (denom_template := \"a*x^2 + b*y^2 + c*z^2\")\n\n-- also handles a ≤ b and a ≥ b goals\nexample (x y : ℝ) : 2 * x * y ≤ x^2 + y^2 := by sos_decomp\n```\n\n### `putinar_decomp` / `schmudgen_decomp` — Nonnegativity on semialgebraic sets\n\nProves `0 ≤ f` given polynomial inequality hypotheses, using Putinar's or Schmüdgen's Positivstellensatz. Hypotheses can be in any of these forms: `0 ≤ g`, `g ≥ 0`, `a ≤ b`, or `a ≥ b`.\n\n```lean\n-- Putinar: requires Archimedean (compact) constraints\nexample (x : ℝ) (h1 : 0 ≤ x) (h2 : x ≤ 1) :\n    0 ≤ 4 * x^3 - 3 * x + 1 := by\n  putinar_decomp (order := 2)\n\n-- Schmüdgen: requires compact constraints, uses products of gᵢ\nexample (x : ℝ) (h1 : 0 ≤ x) (h2 : x ≤ 1) :\n    0 ≤ x * (1 - x) := by\n  schmudgen_decomp (order := 1)\n```\n\n### `putinar_empty` / `schmudgen_empty` — Emptiness of semialgebraic sets\n\nProves `False` from contradictory polynomial inequality hypotheses, showing the feasible set is empty.\n\n```lean\n-- {x ≥ 0, x ≤ -1} is empty\nexample (x : ℝ) (h1 : 0 ≤ x) (h2 : x ≤ -1) : False := by\n  putinar_empty (order := 1)\n\n-- disjoint disks\nexample (x y : ℝ) (h1 : x^2 + y^2 ≤ 1) (h2 : x^2 + y^2 ≥ 2) : False := by\n  schmudgen_empty (order := 1)\n```\n\n### Common parameters\n\n| Parameter | Description |\n|-----------|-------------|\n| `order := n` | Relaxation order for `putinar_decomp` / `schmudgen_decomp` / emptiness tactics |\n| `degree := n` | Degree bound for `sos_decomp` |\n| `denom_template := \"...\"` | Explicit denominator template (for `sos_decomp`) |\n| `basis_overrides := \"0:2,3:0\"` | Per-block SOS degree caps used to shrink exactification search space |\n| `cert := \"path.json\"` | Load a pre-generated certificate from file |\n\n### Certificate Import\n\nThe SDP solver can be slow for large problems. You can pre-generate certificates and load them from JSON files, so the solver doesn't re-run on every file reload:\n\n```lean\nexample (x y z : ℝ) :\n    0 ≤ x^4 * y^2 + x^2 * y^4 + z^6 - 3 * x^2 * y^2 * z^2 := by\n  sos_decomp (cert := \"certs/motzkin.json\")\n```\n\nLean still independently verifies the certificate — the JSON file is untrusted.\n\n### Interactive goals\n\nIf one of the sub-goals does not close automatically, the tactic leaves it as a **named goal** for you to close interactively. For `sos_decomp` and the Positivstellensatz decomp tactics, the goals are:\n\n- `sos_identity` / `pstv_identity` — the polynomial identity (normally closed by `ring_nf`)\n- `sos_nonneg` / `pstv_nonneg` — the nonnegativity claim (normally closed by `positivity`)\n\nFor `sos_decomp` with a denominator, the goals are `hD_ne`, `hmul`, `hD_nonneg`, and `hN_nonneg`.\n\nYou can close them with `case`:\n\n```lean\nexample (x y : ℝ) : 0 ≤ x^2 + y^2 := by\n  sos_decomp\n  case sos_identity => ring\n  case sos_nonneg => positivity\n```\n\n## Advanced Usage\n\n### Pre-generating certificates for large problems\n\nThe SDP solver can be slow for large polynomials. You can use the Python CLI to generate a certificate once (e.g., overnight), save it to a JSON file, and then load it in Lean so the solver doesn't re-run on every file reload:\n\n```bash\n# generate the certificate\npython python/sos.py sos_decomp \\\n    --poly \"x**4*y**2 + x**2*y**4 + z**6 - 3*x**2*y**2*z**2\" \\\n    --vars \"x y z\" --denom-degree-bound 2 --out certs/motzkin.json\n\n# or for Positivstellensatz certificates\npython python/sos.py putinar --poly \"4*x**3 - 3*x + 1\" \\\n    --constraints \"x, 1-x\" --vars \"x\" --order 2 --out certs/chebyshev.json\n```\n\nThen in Lean:\n\n```lean\nexample (x y z : ℝ) :\n    0 ≤ x^4 * y^2 + x^2 * y^4 + z^6 - 3 * x^2 * y^2 * z^2 := by\n  sos_decomp (cert := \"certs/motzkin.json\")\n\nexample (x : ℝ) (h1 : 0 ≤ x) (h2 : x ≤ 1) :\n    0 ≤ 4 * x^3 - 3 * x + 1 := by\n  putinar_decomp (cert := \"certs/chebyshev.json\")\n```\n\nLean still independently verifies the certificate — the JSON file is untrusted.\n\n### Troubleshooting Failures\n\nThe backend can fail either because the relaxation is too small (the SDP is infeasible at the chosen parameters) or because a numerical SDP solution does not exactify cleanly. In both cases, it returns diagnostics and suggestions.\n\n**Increase the relaxation order.** If the solver returns infeasible, the truncation may be too small. Try increasing the order:\n\n```lean\n-- order 1 might not be enough\nexample ... := by putinar_decomp (order := 2)\n-- try order 3\nexample ... := by putinar_decomp (order := 3)\n```\n\n**Use a denominator.** For `sos_decomp`, if the polynomial is nonneg but not SOS (like Motzkin's), you need a denominator:\n\n```lean\n-- fails without denominator\n-- example ... := by sos_decomp\n-- works with denominator degree 2\nexample ... := by sos_decomp (degree := 2)\n```\n\n**Use basis overrides.** When exactification fails after the SDP is already feasible, the solver suggests `basis_overrides` to shrink selected SOS blocks. Run once without them, then rerun explicitly with the suggested override:\n\n```lean\nexample ... := by putinar_decomp (order := 3) (basis_overrides := \"1:2,2:3\")\n```\n\nThe format is `\"block:degree,block:degree,...\"` where each pair restricts a specific block to a smaller SOS degree cap. For example, `0:2` means block 0 may only use monomials of degree at most 1.\n\n**Use a denominator template.** For `sos_decomp` with a denominator, you can guide the solver by specifying the form of the denominator with free parameters:\n\n```lean\nexample (x y z : ℝ) :\n    0 ≤ x^4 * y^2 + x^2 * y^4 + z^6 - 3 * x^2 * y^2 * z^2 := by\n  sos_decomp (degree := 2) (denom_template := \"a*x^2 + b*y^2 + c*z^2\")\n```\n\n**Try Schmüdgen instead of Putinar.** For constrained problems, Schmüdgen's theorem is more powerful (it uses products of all subsets of constraints). If Putinar fails, Schmüdgen may succeed:\n\n```lean\n-- putinar might fail here\n-- example ... := by putinar_decomp (order := 2)\n-- schmudgen uses product multipliers\nexample ... := by schmudgen_decomp (order := 2)\n```\n\n**Pre-generate the certificate.** If the solver is too slow to run interactively, generate the certificate with the Python CLI and load it in Lean (see [Pre-generating certificates](#pre-generating-certificates-for-large-problems) above).\n\n### Heartbeat and timeout issues in Lean\n\nFor large polynomials, Lean's proof reconstruction can hit the default heartbeat limit. You can increase it locally:\n\n```lean\nset_option maxHeartbeats 800000 in\nexample ... := by sos_decomp (degree := 2)\n```\n\nIf one of the sub-goals does not close automatically, it will be left as a named goal (e.g., `sos_identity` or `sos_nonneg`) for you to close manually. See [Interactive goals](#interactive-goals).\n\n## Dependencies\n\n**Lean:** [Mathlib](https://github.com/leanprover-community/mathlib4) (multivariate polynomials, positivity tactic)\n\n**Python:** sympy, numpy, cvxpy, clarabel\n\n## License\n\nMIT\n","summary":"Sostactic is a Lean 4 library that automates the proof of polynomial inequalities using sum‑of‑squares (SOS) decompositions, with a Python back‑end that solves the underlying semidefinite program. It can prove global non‑negativity of polynomials, non‑negativity on semialgebraic sets, and the infeasibility of polynomial systems—tasks that outstrip built‑in tactics such as `nlinarith` and `positivity`. Users can employ the library directly from Lean, call it through a Python API or CLI, and take advantage of automatic rationalization to obtain formally verified certificates. The toolkit is ideal for mathematicians and theorem‑proving engineers who need to reason about intricate algebraic inequalities that are difficult for conventional tactics.","description":"Proving polynomial inequalities with sum-of-squares certificates","stars":28,"language":"Python"},{"owner":"Jellypod-Inc","repo":"cartoon-studio","url":"https://github.com/Jellypod-Inc/cartoon-studio","readme":"<div align=\"center\">\n\n<img src=\"docs/logo.png\" alt=\"Cartoon Studio\" width=\"140\" />\n\n# Cartoon Studio\n\n**Create your own 2D animated cartoon show.**\n\nAn open-source desktop studio — script in, MP4 out. Bring your own API keys; no telemetry, no cloud.\n\n[![License](https://img.shields.io/badge/license-Apache_2.0-blue?style=flat-square)](LICENSE)\n[![Electron](https://img.shields.io/badge/built_with-Electron-47848F?style=flat-square&logo=electron&logoColor=white)](https://www.electronjs.org/)\n[![Node](https://img.shields.io/badge/Node-≥24-339933?style=flat-square&logo=nodedotjs&logoColor=white)](https://nodejs.org)\n[![Stars](https://img.shields.io/github/stars/Jellypod-Inc/cartoon-studio?style=flat-square&logo=github&label=stars)](https://github.com/Jellypod-Inc/cartoon-studio/stargazers)\n\n**[Quick start](#quick-start)** · **[Three screens](#three-screens-three-jobs)** · **[How it works](#how-it-works)** · **[Built on](#built-on)** · **[API keys](#bring-your-own-api-keys)**\n\n</div>\n\n<br />\n\n![Cartoon Studio preview](docs/hero.png)\n\n## Quick start\n\n> **Heads up — no pre-built binaries yet.** Code signing and distribution are still being sorted out. For now, run from source. Works on macOS, Windows, and Linux.\n\nYou only need **Node ≥ 24** (the repo pins `24` via `.nvmrc` — run `nvm use` to match CI). `ffmpeg` and Chrome are bundled via `postinsta
