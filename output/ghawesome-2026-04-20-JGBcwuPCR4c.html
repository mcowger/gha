rp](https://sharp.pixelplumbing.com)** — the export pipeline.\n\n---\n\n## 👋 About the maker\n\nOpen Carrusel is built and maintained by **[tododeia](https://www.tododeia.com)** — a content + AI lab building tools for creators who want leverage without lock-in.\n\nFounder: **Enrique Rocha** ([@soyenriquerocha](https://www.instagram.com/soyenriquerocha)) — Tijuanense, content creator, builds AI tools so creators don't fall behind. Also behind [@tododeia](https://www.instagram.com/tododeia) and [@metara.ai](https://www.instagram.com/metara.ai).\n\nIf Open Carrusel saves you time, the best support is:\n\n- ⭐ **Star this repo** to help others find it\n- 🐛 **Open an issue** when something breaks (or send a PR)\n- 📲 **Tag [@soyenriquerocha](https://www.instagram.com/soyenriquerocha) or [@tododeia](https://www.instagram.com/tododeia)** when you ship a carousel made with it — we love seeing it\n- 🌐 **Visit [tododeia.com](https://www.tododeia.com)** for more AI-for-creators content\n\n---\n\n## 📄 License\n\n[MIT](./LICENSE) — do anything you want with it. Attribution appreciated, never required.\n\n---\n\n<div align=\"center\">\n\n**Built with ❤️ in Tijuana by [tododeia](https://www.tododeia.com).**\n\n*Hecho para creadores que construyen el futuro.*\n\n</div>\n","summary":"Open Carrusel is a local‑first, open‑source tool that lets you build Instagram carousel posts by chatting with Claude. The application renders real HTML/CSS slides in a Three‑panel editor, screenshots them to pixel‑perfect PNGs at Instagram‑exact dimensions, and offers drag‑reorderable previews and a one‑click export. It runs entirely on your machine with a single setup command, keeping your data private and eliminating subscription costs. Designers, marketers, and social‑media creators who want fast, on‑brand carousel production without relying on third‑party platforms will find it especially valuable.","description":"AI-powered Instagram carousel builder. Chat with Claude to design slides; export as PNGs at exact Instagram dimensions. Type /start in Claude Code to bootstrap.","stars":123,"language":"TypeScript"},{"owner":"rexa-developer","repo":"tiks","url":"https://github.com/rexa-developer/tiks","readme":"# tiks\n\n**Procedural UI sounds for the web. Zero audio files. Pure synthesis.**\n\n[![npm](https://img.shields.io/npm/v/@rexa-developer/tiks)](https://www.npmjs.com/package/@rexa-developer/tiks)\n[![gzip size](https://img.shields.io/badge/gzip-~2KB-brightgreen)](https://bundlephobia.com/package/@rexa-developer/tiks)\n[![license](https://img.shields.io/badge/license-MIT-blue)](LICENSE)\n\nEvery native app has satisfying sounds — iOS toggle clicks, macOS trash crumple, Android keyboard taps. Web apps have nothing. **tiks** brings that missing sensory layer using the Web Audio API. Every sound is generated at runtime through oscillators, noise buffers, and gain envelopes. No audio files shipped. Just math.\n\nAll sounds share a common synthesis engine with a unified theme — so they sound like they belong together.\n\n## Install\n\n```bash\nnpm install @rexa-developer/tiks\n```\n\n## Quick Start\n\n```ts\nimport { tiks } from '@rexa-developer/tiks'\n\n// Initialize (call on first user gesture for browser autoplay policy)\ntiks.init()\n\n// Play sounds\ntiks.click()\ntiks.success()\ntiks.toggle(true)\n```\n\nThat's it. Three lines.\n\n## Sounds\n\n| Method | Character | Duration |\n|--------|-----------|----------|\n| `click()` | Short, crisp tap | ~30ms |\n| `toggle(true)` | Rising pitch snap | ~60ms |\n| `toggle(false)` | Falling pitch snap | ~60ms |\n| `success()` | Two-note rising chime | ~200ms |\n| `error()` | Gentle buzz/thud | ~150ms |\n| `warning()` | Cautious double-tap | ~180ms |\n| `hover()` | Whisper-soft tick | ~15ms |\n| `pop()` | Playful bubble pop | ~80ms |\n| `swoosh()` | Quick transition whoosh | ~120ms |\n| `notify()` | Bright attention ping | ~300ms |\n\n## Themes\n\nTwo built-in themes that change the character of every sound:\n\n```ts\ntiks.init({ theme: 'soft' })   // Warm, rounded, Apple-like (default)\ntiks.init({ theme: 'crisp' })  // Sharp, tactile, mechanical keyboard feel\n```\n\nSwitch at runtime:\n\n```ts\ntiks.setTheme('crisp')\n```\n\n### Custom Themes\n\n```ts\nimport { tiks, defineTheme } from '@rexa-developer/tiks'\n\nconst brand = defineTheme({\n  name: 'brand',\n  baseFreq: 500,\n  oscType: 'triangle',\n  decay: 0.8,\n})\n\ntiks.init({ theme: brand })\n```\n\nTheme properties:\n\n| Property | Type | Description |\n|----------|------|-------------|\n| `name` | `string` | Theme identifier |\n| `baseFreq` | `number` | Root frequency all sounds derive from |\n| `noiseColor` | `'white' \\| 'pink'` | Noise type for transients |\n| `oscType` | `OscillatorType` | `'sine'` `'triangle'` `'square'` `'sawtooth'` |\n| `filterFreq` | `number` | Bandpass center for click/transient sounds |\n| `filterQ` | `number` | Filter resonance |\n| `attack` | `number` | Attack time in seconds |\n| `decay` | `number` | Decay multiplier (1.0 = normal, 0.5 = snappy) |\n| `brightness` | `number` | Highpass cutoff (higher = brighter) |\n\n## Controls\n\n```ts\ntiks.setVolume(0.5)   // 0.0 - 1.0 (default: 0.3)\ntiks.mute()\ntiks.unmute()\ntiks.setTheme('crisp')\n```\n\n## Options\n\n```ts\ntiks.init({\n  theme: 'soft',              // 'soft' | 'crisp' | custom theme\n  volume: 0.4,                // 0.0 - 1.0\n  muted: false,               // Start muted\n  respectReducedMotion: true,  // Auto-mute if prefers-reduced-motion\n})\n```\n\n## React\n\n```tsx\nimport { useTiks } from '@rexa-developer/tiks/react'\n\nfunction ToggleButton() {\n  const { click, toggle } = useTiks()\n\n  return (\n    <button onClick={() => {\n      click()\n      setEnabled(prev => {\n        toggle(!prev)\n        return !prev\n      })\n    }}>\n      Toggle\n    </button>\n  )\n}\n```\n\nThe hook auto-initializes on mount. All returned methods are stable references.\n\n> **Note:** `volume` and `muted` are shared globally across all `useTiks` hooks (they live on the underlying audio engine). `theme` is per-hook. If two hooks pass different `volume` values, the last-mounted one wins.\n\n## Vue\n\n```vue\n<script setup lang=\"ts\">\nimport { useTiks } from '@rexa-developer/tiks/vue'\n\nconst { click, success, error } = useTiks()\n<\/script>\n\n<template>\n  <button @click=\"click\">Click me</button>\n</template>\n```\n\nThe composable auto-initializes on component mount. Same global/per-instance semantics as the React hook: `volume` and `muted` are shared across all `useTiks` calls, `theme` is per-composable.\n\n## Tree-Shakeable Imports\n\nFor minimal bundles, import only the sounds you need:\n\n```ts\nimport { init, click, success } from '@rexa-developer/tiks'\n\ninit()\nclick()\nsuccess()\n```\n\n## CDN\n\n```html\n<script type=\"module\">\n  import { tiks } from 'https://esm.sh/@rexa-developer/tiks'\n  document.querySelector('#btn').onclick = () => tiks.click()\n<\/script>\n```\n\n## Accessibility\n\n- **`prefers-reduced-motion`**: Pass `respectReducedMotion: true` to auto-mute\n- **Sounds are additive**: Never the only way to convey information — always pair with visual feedback\n- **Global mute**: `tiks.mute()` for user control\n- **Default volume is 30%**: Subtle, not intrusive\n\n## Browser Support\n\nWorks in all browsers that support the [Web Audio API](https://caniuse.com/audio-api) — Chrome, Firefox, Safari, Edge, and mobile browsers. The library handles autoplay policy automatically by resuming the AudioContext on first interaction.\n\n## How It Works\n\nEach sound is a pure function that creates Web Audio nodes, connects them, schedules playback, and lets the browser garbage-collect them:\n\n```\nOscillatorNode ──┐\n                 ├──→ GainNode (envelope) ──→ MasterGain ──→ speakers\nNoiseBuffer ─────┘\n    ↓\nFilterNode ───────────────────────────────┘\n```\n\nNo audio files. No downloads. No decoding. Just oscillators and math.\n\n## Size\n\n| Entry | Gzipped |\n|-------|---------|\n| Core (`tiks`) | ~2KB |\n| React hook (`tiks/react`) | ~300B |\n| Vue composable (`tiks/vue`) | ~300B |\n\n## License\n\nMIT\n","summary":"tiks is a tiny, Web Audio‑API based library that generates procedural UI sounds on the fly, eliminating the need for audio files. It offers a suite of ready‑to‑use sounds such as clicks, toggles, success alerts, and more, all unified by a synthesis engine that supports theme switching, custom theme definition, volume control, and reduced‑motion handling. The package includes convenient React and Vue hooks that auto‑initialize the engine and expose stable sound‑playing functions. Front‑end developers building rich web applications, UI/UX designers, and anyone who wants native‑app‑style sound feedback without the overhead of audio assets will find tiks valuable.","description":"Procedural UI sounds for the web. Zero audio files. Pure synthesis.","stars":236,"language":"TypeScript"},{"owner":"heyderekj","repo":"dinky","url":"https://github.com/heyderekj/dinky","readme":"# Dinky\n\nA small macOS utility that compresses **images**, **videos**, and **PDFs**. Drop files in, get smaller ones back.\n\nFor images: supports JPG, PNG, WebP, AVIF, TIFF, and BMP. Outputs WebP, AVIF, or lossless PNG depending on your preference. For video: export to MP4 with H.264 or HEVC and quality presets. For PDFs: **flatten pages** (default) for reliable smaller files on most scans and image-heavy documents, or **preserve text and links** for a best-effort stream rewrite when size is secondary. Strips metadata (where applicable), respects max dimensions and file size targets for images, and saves next to the original by default.\n\n<p align=\"center\">\n  <img src=\"site/screenshots/screenshot-drop-active.webp\" width=\"32%\" alt=\"Drop zone with a file being dragged in — Release to compress\" />\n  <img src=\"site/screenshots/screenshot-sidebar-presets.webp\" width=\"32%\" alt=\"Sidebar with presets, type tabs, and format picker\" />\n  <img src=\"site/screenshots/screenshot-watch-folder.webp\" width=\"32%\" alt=\"Watch folder settings: global watch and per-preset watch folders\" />\n</p>\n\n## Releases\n\n**1.x** (from 1.0 on) was **images only**. **2.0** added **videos and PDFs** alongside images. Older 1.x DMGs and ZIPs stay on [GitHub Releases](https://github.com/heyderekj/dinky/releases) for anyone who needs them; use the [latest release](https://github.com/heyderekj/dinky/releases/latest) for full format support.\n\n## About the developer\n\nHey! I'm [Derek Castelli](https://www.heyderekj.com), a full-time freelance web designer working primarily in Webflow and Figma (and now more in Cursor and Claude). Image compression is a constant part of the job — every site build involves optimizing photos for fast load times, and doing that by hand in a browser or through a bloated app gets old fast. Dinky came out of that frustration.\n\n## Features\n\n- **Drag and drop** — drop images, videos, or PDFs onto the window, the Dock icon, or the file picker\n- **Clipboard compress** — paste a copied image straight into Dinky with ⌘⇧V; the hotkey works system-wide, even when Dinky isn't focused\n- **Compress from a URL** — drop or paste a direct `http(s)` link to an image, video, or PDF; Dinky downloads it (max 500 MB) into a temp folder, compresses, and cleans up after itself\n- **Format conversion (images)** — Auto, WebP, AVIF, or lossless PNG; Auto picks the right format per image\n- **PDF compression** — flatten pages for typical size wins (default), or preserve text and links with best-effort optimization (qpdf + PDFKit)\n- **Video compression** — export to MP4 with H.264 or HEVC and quality presets\n- **Compression presets** — save named presets with format, quality, limits, destination, watch folder, and filename settings; apply in one click\n- **Before & after preview** — side-by-side or slider view to compare original and compressed (images)\n- **Watch folder** — point Dinky at a folder and new supported files are compressed automatically; global or per-preset with its own folder\n- **Batch speed** — cap parallel jobs: one at a time (Fast), up to three (Faster), or up to eight (Fastest)\n- **Batch order** (optional) — start with the largest files first to finish the full batch sooner; default is smallest first for quicker early feedback\n- **Max width** — resize on the way out with common web presets or a custom value (images)\n- **Max file size** — binary-searches the quality level to hit an exact MB target (images)\n- **Batch compression** — multiple files compress concurrently, live results as they finish\n- **Manual mode** — drop files first, then right-click each one to choose format individually\n- **Show in Finder** — jump straight to any compressed file from the results list\n- **PNG lossless** — run oxipng on PNGs when you need to keep transparency or format fidelity\n- **Destination** — save next to the original, to Downloads, or pick a custom folder; presets can have their own unique output folder\n- **Originals** — keep, move to Trash, or move to a Backup folder of your choosing on every successful compress; set per preset or globally\n- **Notifications** — sound and system notification when a batch finishes; sound scales with savings: a soft tink for tiny saves, a full chime for big ones\n- **Smart quality** — auto-detects photo vs. graphic (UI, illustration, logo, screenshot) per image and picks quality accordingly; or force Photo, Graphic, or Mixed per preset\n- **Session history** — review past compression sessions with file counts and total bytes saved\n- **Apple Shortcuts** — compress images from automations via a native Shortcuts action\n- **Custom keyboard shortcuts** — rebind Open Files, Clipboard Compress, Compress Now, Clear, and Delete in Settings → Shortcuts\n- **Launch at login** — opt in once and Dinky's ready the moment you log in (handy alongside Watch Folders for set-and-forget compression)\n- **Easy updating** — one click checks for a new release, installs, and relaunches; no browser, no re-drag\n- **Skip threshold** — skip files below a minimum savings target: Off, 2%, 5%, or 10%\n- **Advanced** — strip metadata, sanitize filenames for web, open output folder automatically\n- **Quirky idle animation** — three choreographed card-drop variants that loop then hold until you come back\n- ~28 MB installed (bundled encoders + PDF **qpdf** dylibs). Dinky style.\n\n### What others don't do\n\n- **Actually changes the format (images)** — ImageOptim squeezes your JPEG and hands it back as a JPEG. Dinky converts to WebP, AVIF, or lossless PNG, which is where 30–80% of the real savings live. Optimage does this too, but costs money and weighs 62 MB.\n- **Images, videos, and PDFs in one app** — most \"compression\" apps stop at images. Dinky also re-encodes video to MP4 (H.264 or HEVC) with quality presets, and shrinks PDFs by flattening pages (default) or preserving structure with qpdf-backed stream optimization when you need selectable text. One drop zone, three file types, same workflow.\n- **Results you can act on** — most compression apps give you a done screen you can't do anything with. Dinky's results list works like Finder: select files, drag them somewhere else, double-click to open, right-click to remove individual items.\n- **Watch folders that actually fit a workflow** — point Dinky at a folder and new files get compressed automatically. Global, or per-preset with its own folder, format, and destination — so screenshots, client video exports, and PDF receipts can all land in different places and come out optimized.\n- **Presets for everything, not just quality** — save format, quality, max width, max file size, destination, watch folder, and filename rules together, then apply in one click. Different presets for blog images, social video, and CMS PDFs without touching settings each time.\n- **Notifications with a personality** — other apps either don't notify at all or send a generic \"Done.\" Dinky's notification (and chime) changes based on how many files you compressed and how much you saved. Small things, but they add up.\n- **Built into macOS** — Finder Quick Action, \"Open with\" handler, clipboard paste with ⌘⇧V, Dock-icon drops, and a native Apple Shortcuts action for automations. No browser tab, no upload, nothing leaves your Mac.\n- **Free, open source, and tiny** — Optimage is $15 and image-only. ImageOptim is free but lossless and image-only. Dinky is free, open source, handles images + video + PDFs, converts formats, and at ~28 MB fits in a fraction of the space Optimage takes up.\n\n## Why it exists\n\n[Optimage](https://optimage.app/) crashed. Instead of finding a replacement, I figured it was a good excuse to build my own — this was my first macOS app.\n\nI liked [Squoosh](https://github.com/GoogleChromeLabs/squoosh) but didn't want to be in a browser every time I needed to compress something. I wanted something that lived on my Mac, stayed out of the way, and just worked.\n\n## How it works\n\nBuilt entirely in Swift and SwiftUI, targeting macOS 15 Sequoia and later. On macOS 26 Tahoe you get the full liquid glass UI; on Sequoia it uses the frosted material fallback. No Electron, no web views, no third-party UI frameworks, no SPM dependencies. The whole app is ~28 MB, still appropriately dinky.\n\nCompression runs through a native `actor`-based service. **Images** use bundled CLI encoders (cwebp, avifenc, oxipng). **Video** uses AVFoundation export. **PDFs** use **PDFKit** plus **ImageIO** for flattening, and bundled **qpdf** (then PDFKit) on the preserve-text path. See `docs/PDF_COMPRESSION.md` for modes, metrics logging (`pdf_metrics` in Console), and manual fixture checks. Multiple files can run concurrently according to your batch speed setting; heavy PDF flattening and HEIC transcoding run off the actor so parallel slots stay useful, and AVIF encoder threads scale with batch width so many concurrent jobs don’t each claim all cores.\n\nThe sidebar stores preferences via `@AppStorage`. The results list updates live as each file finishes. Error details are tappable. The idle animation on the drop zone runs through three choreographed variants then holds — portrait, landscape, and wide cards dragged in by a pinch cursor from whatever corner the window is closest to.\n\nThe app registers as an \"Open with\" handler and exposes a Finder Quick Action so you can compress without opening the app manually.\n\n## Built with\n\n- SwiftUI (macOS 15+, liquid glass on macOS 26)\n- AppKit for window and event integration\n- `actor` concurrency model for compression\n- `@AppStorage` / `UserDefaults` for preferences\n- `NSServices` for Finder integration\n- Claude Sonnet 4.6, Opus 4.7, and Cursor\n\n## Compression engines\n\nDinky is a native front-end for these pieces:\n\n- [cwebp](https://developers.google.com/speed/webp) — Google's WebP encoder (BSD)\n- [avifenc](https://github.com/AOMediaCodec/libavif) — Alliance for Open Media's AVIF encoder (BSD)\n- [oxipng](https://github.com/shssoichiro/oxipng) — lossless PNG optimizer in Rust (MIT)\n- [qpdf](https://qpdf.sourceforge.io/) — structural PDF optimization on the preserve-text path (Apache 2.0)\n- PDFKit, Core Graphics, and ImageIO — page flatten and PDF rewrite in macOS\n- AVFoundation — video export\n\n## Install\n\nDownload the DMG and drag Dinky to Applications.\n\nSince the app isn't notarized, macOS may (will probably) block it on first launch. To open it anyway, try launching it once, then go to **System Settings → Privacy & Security**, scroll down, and click **Open Anyway**.\n\nOr skip that entirely and run this in Terminal:\n```bash\nxattr -dr com.apple.quarantine /Applications/Dinky.app\n```\n\nUpdating Dinky is one click — no browser, no re-drag, no quarantine step. A banner appears when a new version is out; click **Install Update** and the app downloads, installs, and relaunches on its own.\n","summary":"Dinky is a macOS utility that shrinks images, videos, and PDFs, offering format conversion for JPG, PNG, WebP, AVIF, TIFF, BMP and exporting videos to MP4 with H.264 or HEVC while also flattening PDFs for size savings. It streamlines the workflow with drag‑and‑drop, clipboard hotkeys, URL downloads, and watch‑folder automation, letting users configure presets for format, quality, size limits, and destination to balance speed and fidelity. Side‑by‑side previews, batch concurrency controls, and lossless PNG support give fine‑grained control over compression settings. Web designers, developers, and content creators who routinely need to optimize media for web or storage will find Dinky a quick, one‑stop solution.","description":"Dinky makes files smaller.","stars":212,"language":"Swift"},{"owner":"gridex","repo":"gridex","url":"https://github.com/gridex/gridex","readme":"# Gridex\n\nA native database IDE for macOS and Windows with built-in AI chat. Connect to PostgreSQL, MySQL, SQLite, Redis, MongoDB, and SQL Server from a single app.\n\n![macOS 14+](https://img.shields.io/badge/macOS-14%2B-blue)\n![Windows 10+](https://img.shields.io/badge/Windows-10%2B-0078D4)\n![Swift 5.10](https://img.shields.io/badge/Swift-5.10-orange)\n![License](https://img.shields.io/badge/license-Apache%202.0-blue)\n\n<p align=\"center\">\n  <img src=\"assets/screenshot.jpg\" alt=\"Gridex Screenshot\" width=\"100%\">\n</p>\n\n## Features\n\n### Database Support\n\n| Database | Driver | Highlights |\n|----------|--------|------------|\n| **PostgreSQL** | [PostgresNIO](https://github.com/vapor/postgres-nio) | Parameterized queries, SSL/TLS, sequences, full schema inspection |\n| **MySQL** | [MySQLNIO](https://github.com/vapor/mysql-nio) | Character set handling, parameterized queries, SSL |\n| **SQLite** | System `libsqlite3` | File-based, WAL mode, zero config |\n| **Redis** | [RediStack](https://github.com/swift-server/RediStack) | Key browser, SCAN filter, Server INFO dashboard, Slow Log viewer |\n| **MongoDB** | [MongoKitten](https://github.com/orlandos-nl/MongoKitten) | Document editor, NDJSON export/restore, aggregation |\n| **SQL Server** | [CosmoSQLClient](https://github.com/vkuttyp/CosmoSQLClient-Swift) | TDS 7.4 protocol, native BACKUP DATABASE, stored procedures |\n\n### AI Chat\n\nBuilt-in AI assistant that understands your schema and writes SQL for you.\n\n- **Anthropic Claude** — streaming responses, direct API\n- **OpenAI GPT** — full API support\n- **Google Gemini** — Flash model support\n- **Ollama** — local LLM, no API key needed\n\nAll requests go directly from your machine to the provider. Gridex never proxies prompts. API keys are stored in the macOS Keychain.\n\n### Data Grid\n\n- Inline cell editing with type-aware parsing\n- Sort, filter, and paginate large datasets\n- Add/delete rows with pending change tracking and commit workflow\n- Column resize, multi-column sort\n- Copy rows, export to CSV/JSON/SQL\n\n### Query Editor\n\n- Multi-tab with connection-grouped Chrome-style tab bar\n- Syntax highlighting (keywords, strings, numbers, comments, functions)\n- Full query history persisted via SwiftData\n- Execute selection, execute all\n- Redis CLI mode\n\n### Schema Tools\n\n- Table structure viewer (columns, indexes, foreign keys, constraints)\n- ER Diagram with auto-layout, zoom, pan, and FK relationship lines\n- Function inspector with source code and parameter signatures\n- Stored procedure support (MSSQL)\n\n### SSH Tunnel\n\n- Password and private-key authentication\n- Local port forwarding through bastion hosts\n- Managed by `SSHTunnelService` actor (thread-safe, async/await)\n\n### Import & Export\n\n- **Export**: CSV, JSON, SQL (INSERT statements), SQL (full DDL with sequences/indices), schema DDL\n- **Import**: CSV (with column mapping), SQL dumps\n\n### Backup & Restore\n\n| Database | Backup Method |\n|----------|---------------|\n| PostgreSQL | pg_dump (custom, SQL, tar) / pg_restore |\n| MySQL | mysqldump / mysql CLI |\n| SQLite | File copy |\n| MongoDB | NDJSON (one document per line) |\n| Redis | JSON snapshot via SCAN |\n| SQL Server | Native `BACKUP DATABASE` |\n\nSupports selective table backup, compression options, and progress callbacks.\n\n### Redis Management\n\n- Virtual \"Keys\" table with SCAN-based browsing\n- Key Detail View — edit hash fields, list items, set/zset members\n- Pattern-based filter bar (glob syntax: `user:*`, `cache:?`)\n- Server INFO dashboard with auto-refresh\n- Slow Log viewer, Flush DB, key rename/duplicate, TTL management\n\n### MongoDB Document Editor\n\n- NDJSON document editing with syntax-aware editor\n- Document insert/update/delete\n- Aggregation pipeline support\n\n### Other\n\n- Multi-window support (Cmd+N)\n- macOS Keychain for all credential storage\n- Dark mode native\n- Connection save/load with SSH tunnel config and SSL/TLS options\n\n## Requirements\n\n### macOS\n\n- macOS 14.0 (Sonoma) or later\n- Swift 5.10+ / Xcode 15+\n\n### Windows\n\n- Windows 10 or later (64-bit)\n- Visual Studio 2022+, .NET 8 SDK, vcpkg\n\n## Build & Run\n\n### macOS\n\n```bash\ngit clone https://github.com/gridex/gridex.git\ncd gridex\n\n# Debug (ad-hoc signed, fast local testing)\nswift build\n.build/debug/Gridex\n\n# Or build .app bundle\n./scripts/build-app.sh\nopen dist/Gridex.app\n```\n\n### Release\n\n```bash\n# Apple Silicon\n./scripts/release.sh\n# → dist/Gridex-<version>-arm64.dmg\n\n# Intel\nARCH=x86_64 ./scripts/release.sh\n# → dist/Gridex-<version>-x86_64.dmg\n\n# Both architectures\n./scripts/release-all.sh\n```\n\nRelease pipeline: `swift build` → `.app` bundle → code sign → notarize → staple → DMG → sign DMG → notarize DMG.\n\n**Environment variables for release:**\n\n| Variable | Description |\n|----------|-------------|\n| `ARCH` | `arm64` or `x86_64` (default: host) |\n| `SIGN_IDENTITY` | Developer ID certificate SHA-1 (or set in `.env`) |\n| `NOTARY_PROFILE` | `notarytool` keychain profile (default: `gridex-notarize`) |\n| `NOTARIZE` | Set to `0` to skip notarization |\n\n## Architecture\n\nClean Architecture with 5 layers. Dependencies point inward — Presentation → Services → Data → Domain → Core.\n\n```\ngridex/\n├── macos/                    macOS app (Swift, AppKit)\n│   ├── App/                  Lifecycle, DI container, AppState, constants\n│   ├── Core/                 Protocols, models, enums, errors — zero deps\n│   │   ├── Protocols/        DatabaseAdapter, LLMService, SchemaInspectable\n│   │   ├── Models/           RowValue, ConnectionConfig, QueryResult, etc.\n│   │   └── Enums/            DatabaseType, GridexError\n│   ├── Domain/               Use cases, repository protocols\n│   ├── Data/                 Adapters, SwiftData persistence, Keychain\n│   │   ├── Adapters/         SQLite, PostgreSQL, MySQL, MongoDB, Redis, MSSQL\n│   │   ├── Persistence/      SwiftData models (connections, query history)\n│   │   └── Keychain/         macOS Keychain service\n│   ├── Services/             Cross-cutting concerns\n│   │   ├── QueryEngine/      QueryEngine actor, ConnectionManager, QueryBuilder\n│   │   ├── AI/               Anthropic, OpenAI, Ollama, Gemini providers\n│   │   ├── SSH/              SSHTunnelService (NIOSSH port forwarding)\n│   │   └── Export/           ExportService, BackupService\n│   └── Presentation/         AppKit views, SwiftUI settings, ViewModels\n│       ├── Views/            18 view groups (DataGrid, QueryEditor, AIChat, etc.)\n│       └── Windows/          macOS window management\n├── windows/                  Windows app (C++, WinUI 3)\n├── scripts/                  Build and release automation\n└── Package.swift             SPM manifest\n```\n\n### Key Protocols\n\n- **`DatabaseAdapter`** — ~50 methods covering connection, queries, schema, CRUD, transactions, pagination. All 6 database adapters conform to this.\n- **`LLMService`** — Streaming AI responses via `AsyncThrowingStream`. All 4 AI providers conform.\n- **`SchemaInspectable`** — Full schema snapshot (tables, views, indices, constraints).\n\n### Concurrency\n\n- `actor` for thread-safe services: `QueryEngine`, `ConnectionManager`, `SSHTunnelService`, `BackupService`, `SchemaInspectorService`\n- `async/await` throughout — no completion handlers\n- `Sendable` constraints on all data models\n\n### Dependency Injection\n\n`DependencyContainer` (singleton) manages service creation. SwiftData `ModelContainer` shared across windows. Services injected via SwiftUI environment.\n\n## Dependencies\n\n| Package | Version | Purpose |\n|---------|---------|---------|\n| [postgres-nio](https://github.com/vapor/postgres-nio) | 1.21.0+ | PostgreSQL driver |\n| [mysql-nio](https://github.com/vapor/mysql-nio) | 1.7.0+ | MySQL driver |\n| [swift-nio-ssl](https://github.com/apple/swift-nio-ssl) | 2.27.0+ | TLS for NIO connections |\n| [swift-nio-ssh](https://github.com/apple/swift-nio-ssh) | 0.8.0+ | SSH tunnel support |\n| [RediStack](https://github.com/swift-server/RediStack) | 1.6.0+ | Redis driver |\n| [MongoKitten](https://github.com/orlandos-nl/MongoKitten) | 7.9.0+ | MongoDB driver (pure Swift) |\n| [CosmoSQLClient-Swift](https://github.com/vkuttyp/CosmoSQLClient-Swift) | main | MSSQL via TDS 7.4 (no FreeTDS) |\n\nSystem library: `libsqlite3` (linked at build time).\n\n## Contributing\n\nContributions are welcome. Please open an issue first to discuss what you'd like to change.\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for guidelines and [CODE_OF_CONDUCT.md](CODE_OF_CONDUCT.md) for community standards.\n\n## License\n\nLicensed under the [Apache License, Version 2.0](LICENSE).\n\nCopyright © 2026 Thinh Nguyen.\n\nYou may use, modify, and distribute this software — including in commercial or closed-source products — provided you preserve the copyright notice and NOTICE file. See the LICENSE for full terms.\n","summary":"Gridex is a cross‑platform native database IDE that lets macOS and Windows users connect to PostgreSQL, MySQL, SQLite, Redis, MongoDB, and SQL Server from a single application. It offers an intelligent AI chat that can understand schema and generate SQL, supporting Anthropic Claude, OpenAI GPT, Google Gemini, and local Ollama models, and a full‑featured data grid with inline editing, sort, filter, and bulk export to CSV, JSON, or SQL. The editor supports multi‑tab browsing, syntax highlighting, query history, and a Redis CLI mode, while its schema tools provide ER diagrams, function inspectors, and stored procedure support. Database administrators, developers, and data analysts who manage various database systems will benefit from Gridex’s integrated backup & restore, SSH tunneling, and import/export utilities, all secured with macOS Keychain credential storage.","description":"A native macOS / windows database IDE built with Swift and AppKit. Connect to PostgreSQL, MySQL, SQLite, and Redis from a single app with a fast, keyboard-driven interface.","stars":198,"language":"Swift"},{"owner":"drasimwagan","repo":"mdv","url":"https://github.com/drasimwagan/mdv","readme":"# MDV — Markdown Data & Visualization\n\n> Write documents, dashboards, and slides in a Markdown superset. Add charts, KPI cards, tables, and styled regions with nothing more complicated than fenced code blocks and named styles.\n\n`.mdv` is **strict CommonMark plus four additions**:\n\n1. **YAML front-matter** for title, theme, named styles, and dataset references.\n2. **Fenced blocks** for data/visuals: `` ```chart type=bar x=region y=sales ``.\n3. **`:::` containers** for styled regions and layout: `::: callout` / `::: columns`.\n4. **`:::` `toc`** for an auto-generated table of contents.\n\nNo selectors, no classes, no expressions, no code. Themes provide defaults, named styles give reusable looks, the renderer does the rest.\n\n## Quick look\n\n````markdown\n---\ntitle: Q1 Report\ntheme: report\ndata:\n  sales: ./data/sales.csv\n---\n\n::: toc\n:::\n\n# Q1 Results\n\n```stat\nlabel, value, delta\nTotal revenue, $2.06M, +14%\nNew customers, 1238, +8%\n```\n\n```chart type=line data=sales x=month y=revenue series=region yFormat=currency title=\"Monthly revenue\"\n```\n````\n\nRenders to self-contained HTML (charts are inline SVG, no JS runtime) and PDF. Lives inside VS Code via a side-by-side preview.\n\n## Getting started\n\n```bash\ngit clone <repo> mdv\ncd mdv\nnpm install\nnpm run build\n\n# Render an example\nnode packages/mdv-cli/dist/index.js render examples/09-full-report.mdv\n\n# Or: live preview with auto-reload\nnode packages/mdv-cli/dist/index.js preview examples/09-full-report.mdv\n```\n\nSee [docs/getting-started.md](docs/getting-started.md) for a walkthrough.\n\n## Documentation\n\n- [Getting started](docs/getting-started.md) — install, author your first file, see it rendered.\n- [Syntax reference](docs/syntax.md) — front-matter, fenced blocks, `:::` containers.\n- [Charts & stats](docs/charts.md) — every visualization type with all options.\n- [Data](docs/data.md) — inline CSV / JSON / file-referenced datasets.\n- [Themes & styles](docs/themes-and-styles.md) — built-in themes and how to define named styles.\n- [CLI](docs/cli.md) — `render`, `preview`, `export --pdf`.\n- [VS Code extension](docs/vscode.md) — side-by-side live preview.\n- [Publishing the VS Code extension](docs/publishing-vscode-extension.md) — Marketplace workflow.\n\n## Examples\n\n[`examples/`](examples) contains 10 sample files covering every feature. Rendered HTML is in [`examples/out/`](examples/out).\n\n## Status\n\n","summary":"MDV turns ordinary Markdown into a full‑featured data‑centric authoring language, letting writers create reports, dashboards, and slides with charts, KPI cards, tables, and styled sections using only fenced code blocks and simple YAML front‑matter. It adds four extensions—YAML front‑matter, fenced data blocks for charts and statistics, `:::` containers for layout and styling, and an auto‑generated TOC—while producing self‑contained, JavaScript‑free HTML or PDF outputs. The built‑in renderer supports themes and reusable named styles, and a VS Code extension offers live preview with auto‑reload for a smooth authoring experience. MDV is ideal for analysts, data journalists, and anyone who needs to embed visualizations in clean, version‑controlled documents without writing custom web code.","description":"MDV — a Markdown superset for documents, dashboards, and slides with embedded data and visualizations. HTML + PDF export, live preview, VS Code extension.","stars":274,"language":"TypeScript"},{"owner":"techjarves","repo":"USB-Uncensored-LLM","url":"https://github.com/techjarves/USB-Uncensored-LLM","readme":"# USB-Uncensored-LLM ⚡\n\n**USB-Uncensored-LLM** is a fully air-gapped, zero-dependency, plug-and-play Local AI environment designed to run seamlessly from your **local hard drive** or a **portable USB/SSD**. It bypasses complex installations natively executing large language models directly on your hardware with no internet required.\n\nWith a unified architecture, you can initialize your AI models once and choose to keep them on your system or carry them with you across Windows, macOS, and Linux PCs.\n\n🎥 **Watch the Setup & Demo Video:** [https://youtu.be/60PSXsoXc8A](https://youtu.be/60PSXsoXc8A)\n\n[![USB-Uncensored-LLM Setup & Demo](https://img.youtube.com/vi/60PSXsoXc8A/maxresdefault.jpg)](https://youtu.be/60PSXsoXc8A)\n\n## 🚀 Core Features\n* **Zero Dependency Setup:** Ships with portable Python and isolated engine binaries. No system permissions, registry edits, or package managers required.\n* **Cross-Platform Interoperability:** Uses a intelligent `Shared` volume system — download your 5GB+ AI models *once*, and use them natively on Windows, macOS, and Linux without duplication.\n* **Censorship Free:** Integrates cutting-edge ablative and heretic fine-tuned models for completely unfiltered interactions.\n* **Network Proxied UI:** The custom Python HTTP server instantly serves a blazing-fast dark mode UI. You can access the AI from your phone or tablet on the same WiFi network without complex CORS configuration.\n* **Hardware Accelerated:** Uses a custom-compiled Ollama engine under the hood, natively capitalizing on AVX CPU instructions, NVIDIA CUDA, or Apple Metal GPU accelerators dynamically when plugged into different host machines.\n\n---\n\n## 💻 System Requirements\nBefore preparing your drive, ensure you have:\n- **Storage:** A USB 3.0+ flash drive or SSD with an absolute minimum of **8 GB** free space (16 GB is **highly** recommended).\n- **RAM:** The host computer should have at least **8 GB of system memory** to run the 2B/4B models, and **16 GB of memory** to fluidly run the 9B/12B models.\n\n---\n\n## 📂 Folder Architecture\n\nThe project is structured to strictly isolate operating system executables while securely unifying heavy model weights to save precious portable storage capacity.\n\n```text\n[Portable USB Drive]\n ├── 📁 Android    # Native Android (Termux) installers & launchers\n ├── 📁 Linux      # Native Ubuntu/Debian offline installers & launchers\n ├── 📁 Mac        # Native macOS offline installers & launchers\n ├── 📁 Windows    # Native Windows offline automatic UI menus\n └── 📁 Shared     # Unified Data System\n      ├── 📁 bin         (Holds isolated executables: ollama-windows.exe, ollama-darwin...)\n      ├── 📁 chat_data   (Houses cross-platform persistent conversation history)\n      ├── 📁 models      (HuggingFace GGUF Weights & local database mapping)\n      └── 📁 python      (Isolated portable python environment)\n```\n\n---\n\n## 🧠 Curated AI Model Library\n\nThis USB ships with a curated installer for the highest-quality, locally operable uncensored models available on the open-source market today:\n\n1. **Gemma 2 2B Abliterated (~1.6 GB)**: *Recommended for all.* Extremely fast, incredibly smart for its size, with safety alignment vectors mathematically purged.\n2. **Gemma 4 E4B Ultra Uncensored Heretic (~5.34 GB)**: A \"heretic\" fine-tune that aggressively forces compliance to all user queries regardless of content or legality.\n3. **Qwen 3.5 9B Uncensored Aggressive (~5.2 GB)**: A much larger, incredibly competent reasoning model with a strict adherence to raw, unbiased answers.\n4. **Custom Models**: The installer supports downloading *any* .gguf weight directly from HuggingFace natively into the USB's engine.\n\n---\n\n## ⚙️ Quick Start Guide\n\n### Step 1: Initialize the Engine\nDepending on the computer you are currently plugged into, navigate into the respective Operating System folder and double-click/run the install script. \n* **Windows:** Double-click `Windows/install.bat`\n* **macOS:** Open Terminal, drag in `Mac/install.command`, and press Enter.\n* **Linux:** Run `bash Linux/install.sh`\n* **Android:** Open Termux, run `bash Android/install.sh` (see Android section below)\n\n> **Note:** Initializing simply downloads the tiny 50MB execution engine specific to that computer to the `Shared/bin` folder. \n\n### Step 2: Download AI Models \nIt is highly recommended to run the model download phase via a **Windows PC** (`Windows/install.bat`), which provides an interactive, terminal-based catalog to easily select and download highly curated, uncensored GGUF Models. \n*(If you do not have a Windows PC, simply download your `.gguf` weights from HuggingFace and place them into the `Shared/models` folder manually).*\n\n### Step 3: Launch\nOpen the respective OS folder and run the `start` script:\n* **Windows:** `Windows/start-fast-chat.bat`\n* **macOS:** `Mac/start.command`\n* **Linux:** `bash Linux/start.sh`\n* **Android:** `bash Android/start.sh` (in Termux)\n\nThe engine will spin up securely in the background, and your default web browser will automatically open the locally-served Chat UI.\n\n---\n\n## 🏠 Local Disk Installation\nWhile this project is optimized for USB portability, it works beautifully as a lightweight local AI setup on your primary computer.\n\n**How to Install Locally:**\n1.  **Download/Clone** this repository to a folder on your `C:\\` or `D:\\` drive.\n2.  Navigate to the **Windows** (or Mac/Linux) folder.\n3.  Run **`install.bat`** and choose your desired models.\n4.  The system will download everything into that local folder. \n5.  Run **`start-fast-chat.bat`** to begin.\n\n*Benefit:* Running from an internal SSD is significantly faster than a USB drive, resulting in near-instant AI model loading!\n\n---\n\n## 📱 Android Native (Termux)\nRun the AI engine **directly on your Android phone or tablet** — no PC required!\n\n### Requirements\n- **Termux** installed from [F-Droid](https://f-droid.org/en/packages/com.termux/) (NOT the Play Store — it's outdated)\n- **6 GB+ RAM** (8 GB+ recommended). Only the 2B model runs well on 6 GB devices.\n- **WiFi or mobile data** for initial setup (downloading engine + models)\n- **ARM64 processor** (virtually all modern Android phones/tablets)\n\n### Setup\n1. Copy the USB-Uncensored-LLM folder to your Android device (via USB OTG, file transfer, or `git clone`)\n2. Open **Termux** and navigate to the project folder\n3. Run: `bash Android/install.sh`\n4. Select your model (Gemma 2 2B recommended for most Android devices)\n5. Wait for downloads to complete — **keep Termux in the foreground!**\n\n### Launch\n```bash\nbash Android/start.sh\n```\nThe AI engine starts and Chrome opens automatically with the chat UI.\n\n### Android Performance Tips\n- **Run `termux-wake-lock`** before starting — prevents Android from killing the process\n- **Keep Termux in the foreground** for best performance\n- **Close other apps** to free RAM for the AI model\n- **Use the 2B model** on devices with less than 12 GB RAM\n- **Plug in your charger** — LLM inference drains battery fast\n- Expect **~3-10 tokens/sec** on the 2B model (vs 30-50+ on a PC with GPU)\n\n---\n\n## 📱 LAN Mobile Access\nIf you want to use the Heavyweight AI from your phone while lounging on the couch:\n1. Ensure your PC running the `start` script and your phone are on the exact same WiFi network.\n2. The terminal window will automatically detect your host machine and display a **Network Access** IP Address (e.g., `http://192.168.1.15:3333`).\n3. Simply type that URL into your mobile browser (Safari/Chrome). The custom Python server perfectly routes mobile queries directly to the USB! *(Note: If pages do not load, ensure Windows Firewall allows incoming connections on port `3333`)*.\n\n---\n\n## 🛠️ Troubleshooting\n\n- **The script instantly closes on Windows:** You likely have the legacy Windows App Execution Aliases turned on, which tricks the OS. Run the script via a command prompt, or right-click the `.bat` file and \"Run as Administrator\".\n- **\"Ollama Engine Not Found\":** You attempted to run the `start` script before the `install` script downloaded the base software for your specific OS. Run your OS's installer!\n- **Slow Generation Speeds:** Your model is too large for your host PC's RAM. Re-run `install.bat` and select the **Gemma 2 2B Abliterated** model, which runs rapidly even on older machines.\n\n---\n> *Disclaimer: USB-Uncensored-LLM is built for uncompromising computational freedom. By utilizing ablative models, the system will not moralize, lecture, or refuse your prompts. Please use responsibly.*\n# USB-Uncensored-LLM\n","summary":"USB‑Uncensored‑LLM is a portable, zero‑dependency Local AI runtime that runs LLMs directly from a USB stick or internal drive without needing an internet connection or system‑wide installations. It bundles a lightweight Python environment, a custom‑compiled Ollama engine, and a collection of uncensored models such as Gemma 2 2B and Qwen 3.5 9B, all stored once in a shared volume that works across Windows, macOS, and Linux. The tool automatically detects CPU or GPU acceleration on the host machine, serves a fast dark‑mode web UI over the local network, and preserves conversation history in a cross‑platform format. Developers, privacy‑focused users, and researchers who need a turnkey, censorship‑free LLM setup on multiple operating systems will benefit from this plug‑and‑play solution.","description":"The ultimate zero-install, portable local AI environment. Run high-quality, uncensored LLMs (Gemma, Qwen, NemoMix) directly from any USB drive or SSD. Fully air-gapped, cross-platform (Win/Mac/Linux), and privacy-first with persistent chat history.","stars":271,"language":"Shell"},{"owner":"momenbasel","repo":"Phosphor","url":"https://github.com/momenbasel/Phosphor","readme":"<p align=\"center\">\n  <img src=\"Resources/banner.svg\" alt=\"Phosphor Banner\" width=\"100%\">\n</p>\n\n<p align=\"center\">\n  <img src=\"Resources/AppIcon.svg\" alt=\"Phosphor Icon\" width=\"128\" height=\"128\">\n</p>\n\n<h1 align=\"center\">Phosphor</h1>\n\n<p align=\"center\">\n  <strong>Free and open-source iOS device manager for macOS.</strong><br>\n  <a href=\"https://github.com/momenbasel/Phosphor/releases/latest\">Download</a> -\n  <a href=\"https://momenbasel.github.io/Phosphor/\">Website</a> -\n  <a href=\"#features\">Features</a> -\n  <a href=\"#installation\">Install</a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/momenbasel/Phosphor/releases/latest\"><img src=\"https://img.shields.io/github/v/release/momenbasel/Phosphor?style=flat-square&color=5856D6\" alt=\"Release\"></a>\n  <a href=\"https://github.com/momenbasel/Phosphor/blob/main/LICENSE\"><img src=\"https://img.shields.io/github/license/momenbasel/Phosphor?style=flat-square&color=34C759\" alt=\"License\"></a>\n  <a href=\"https://github.com/momenbasel/Phosphor/actions\"><img src=\"https://img.shields.io/github/actions/workflow/status/momenbasel/Phosphor/build.yml?style=flat-square\" alt=\"Build\"></a>\n  <img src=\"https://img.shields.io/badge/platform-macOS%2014%2B-blue?style=flat-square\" alt=\"Platform\">\n  <img src=\"https://img.shields.io/badge/swift-5.9-orange?style=flat-square\" alt=\"Swift\">\n</p>\n\n---\n\nPhosphor gives you complete control over your iPhone, iPad, and iPod touch without proprietary software, iCloud lock-in, or subscriptions. Built natively with SwiftUI and powered by [pymobiledevice3](https://github.com/doronz88/pymobiledevice3) with [libimobiledevice](https://libimobiledevice.org/) as fallback. Supports iOS 17-26+.\n\n---\n\n## Why Phosphor?\n\nApple's Finder integration is all-or-nothing. Proprietary tools like iMazing cost $50/year. Phosphor fills the gap:\n\n| Feature | Finder | iMazing | Phosphor |\n|---------|--------|---------|----------|\n| Full device backup | Yes | Yes | Yes |\n| Incremental backup | No | Yes | Yes |\n| Browse backup contents | No | Yes | Yes |\n| Selective file restore | No | Yes | Yes |\n| Export iMessages to CSV/HTML | No | Yes | Yes |\n| Export WhatsApp messages | No | Yes | Yes |\n| Photo extraction (no iCloud) | No | Yes | Yes |\n| App data extraction | No | Yes | Yes |\n| Install/remove IPAs | No | Yes | Yes |\n| Battery health diagnostics | No | Yes | Yes |\n| Real-time device console | No | Yes | Yes |\n| Device file system browser | No | Yes | Yes |\n| Drag-and-drop file transfer | No | Yes | Yes |\n| Scheduled Wi-Fi backups | No | Yes | Yes |\n| Time Machine backup restore | No | No | **Yes** |\n| Contacts export (vCard/CSV) | No | Yes | Yes |\n| Calendar export (ICS/CSV) | No | Yes | Yes |\n| Apple Watch data browsing | No | Yes | Yes |\n| Backup archive format | No | .imazing | **.phosphor** |\n| Localization (7 languages) | No | Yes | Yes |\n| Crash report viewer | No | Yes | Yes |\n| Process monitor | No | Yes | Yes |\n| Ringtone creator | No | Yes | Yes |\n| HEIC to JPG conversion | No | Yes | Yes |\n| iOS 26 support | N/A | Paid | **Yes** |\n| Price | Free | $49.99/yr | Free |\n| Open source | No | No | **MIT** |\n\n## Features\n\n### Device Management\n- Automatic detection of connected iOS devices via USB\n- Device info: model, iOS version, serial, UDID, IMEI, Wi-Fi/Bluetooth MAC\n- Pair/unpair devices\n- Restart, shutdown, sleep commands\n- Take device screenshots\n\n### Backups\n- Create full and incremental local backups (no iCloud required)\n- Browse backup contents through parsed `Manifest.db`\n- Navigate by domain (Camera Roll, Apps, Home, System, Keychain, etc.)\n- Search files across the entire backup\n- Extract individual files or entire domains\n- Manage backup encryption\n- Delete old backups\n\n### Messages\n- Browse all iMessage and SMS conversations from backups\n- View messages in a native chat-bubble interface\n- Search across all messages\n- Export conversations to **CSV**, **HTML**, **Plain Text**, or **JSON**\n- Export all conversations at once\n- HTML export styled like native iMessage (blue/gray bubbles)\n\n### Photos & Videos\n- Browse Camera Roll from backup without restoring\n- Filter by type: Photos, Videos, Screenshots\n- Grid and list view modes\n- Batch extract to any folder\n- Preserves original filenames and structure\n\n### Applications\n- List all installed apps on connected devices\n- Browse apps stored in backups with data sizes\n- Install `.ipa` files directly to device\n- Remove apps from device\n- Extract individual app containers (Documents, Library, tmp)\n\n### File System\n- Browse device filesystem via AFC (Apple File Conduit) - no FUSE/ifuse required on macOS Sonoma+\n- Navigate directories, view file metadata\n- Copy files to/from device via pymobiledevice3 AFC push/pull\n- Browse specific app containers (Documents, Library, tmp)\n- Delete files on device\n- Drag-and-drop file transfer\n\n### Contacts\n- Browse all contacts from backup AddressBook database\n- View phone numbers, emails, organization details\n- Search across all contacts\n- Export as **vCard (.vcf)** or **CSV**\n\n### Calendar\n- Browse calendars and events from backup\n- View event details, duration, all-day status\n- Export as **ICS (iCalendar)** or **CSV**\n\n### Apple Watch\n- View paired Apple Watch info from iPhone backup\n- Browse WatchKit extension apps with data sizes\n- Activity ring history (Move, Exercise, Stand)\n- Extract all Watch-related data from backup\n\n### Diagnostics\n- Battery: current charge, charging status, health percentage, design vs. actual capacity (mAh), cycle count, temperature\n- Storage: total capacity, usage breakdown (Apps, Photos, Media, Other), available space\n- Visual storage bar similar to macOS About This Mac\n- Real-time device system log (syslog) streaming with proper process termination\n- Filter and search logs\n- Export logs to file\n- Color-coded log levels (Error/Warning/Debug)\n- **Crash report viewer** - Pull and browse device crash reports\n- **Process monitor** - Live process list from device\n\n### Backup Management\n- **Time Machine mode**: 3D animated backup browser for visual restore\n- **Scheduled backups**: automatic hourly/daily/weekly/monthly via USB or Wi-Fi\n- **.phosphor archives**: portable backup export/import format\n- Backup encryption management (enable/disable/verify)\n- Drag-and-drop file transfer in file browser\n\n## Installation\n\n### Homebrew (recommended)\n\n```bash\nbrew tap momenbasel/phosphor\nbrew install --cask phosphor\n```\n\n### Manual\n\n1. Download the latest `.dmg` from [Releases](https://github.com/momenbasel/Phosphor/releases)\n2. Drag `Phosphor.app` to Applications\n3. Install pymobiledevice3: `pip3 install pymobiledevice3`\n4. Optional fallback: `brew install libimobiledevice ideviceinstaller`\n\n### Build from Source\n\n```bash\n# Install pymobiledevice3 (primary)\npip3 install pymobiledevice3\n\n# Optional fallback tools\nbrew install libimobiledevice ideviceinstaller\n\n# Clone and build\ngit clone https://github.com/momenbasel/Phosphor.git\ncd Phosphor\nswift build -c release\n\n# Create app bundle\nbash Scripts/build.sh\n\n# Launch\nopen .build/Phosphor.app\n```\n\n## Requirements\n\n- **macOS 14.0** (Sonoma) or later\n- **pymobiledevice3** (primary backend, supports iOS 17-26+): `pip3 install pymobiledevice3`\n- **libimobiledevice** (optional fallback): `brew install libimobiledevice`\n- **ideviceinstaller** (optional fallback for app management)\n- **ifuse** (legacy file mounting, not needed with pymobiledevice3)\n\nPhosphor checks for available tools on launch and uses the best available backend automatically.\n\n## Architecture\n\n```\nSources/Phosphor/\n  App/           SwiftUI app entry point\n  Models/        DeviceInfo, BackupInfo, Message, MediaItem, AppBundle\n  Services/      DeviceManager, BackupManager, MessageExporter,\n                 PhotoExtractor, AppManager, FileTransferManager,\n                 DiagnosticsManager\n  ViewModels/    MVVM state management layer\n  Views/         SwiftUI views organized by feature\n  Utilities/     Shell (process runner), SQLiteReader, BackupManifest,\n                 PlistParser\n```\n\n**Key design decisions:**\n\n- **pymobiledevice3 primary, libimobiledevice fallback** - Every operation tries pymobiledevice3 first (JSON-based, supports latest iOS), falls back to libimobiledevice CLI if unavailable.\n- **No C bindings** - Wraps CLI tools via subprocess. Simpler dependency chain, easier to maintain.\n- **Direct SQLite** - Parses iOS backup databases (`Manifest.db`, `sms.db`) using system `sqlite3`. Zero external Swift dependencies.\n- **MVVM** - Services handle business logic, ViewModels manage UI state, Views are declarative and composable.\n- **Zero external dependencies** - Only system frameworks (SwiftUI, Foundation, sqlite3, UniformTypeIdentifiers).\n\n## iOS Backup Format\n\nPhosphor directly parses Apple's backup format:\n\n```\n~/Library/Application Support/MobileSync/Backup/<UDID>/\n  Info.plist           Device metadata\n  Manifest.plist       Encryption status, app list\n  Manifest.db          SQLite database mapping files to SHA-1 hashes\n  Status.plist         Backup state\n  <xx>/<sha1-hash>     Actual files, organized in 2-char prefix dirs\n```\n\nThe `Manifest.db` contains a `Files` table with columns:\n- `fileID` - SHA-1 hash (also the filename on disk)\n- `domain` - e.g., `CameraRollDomain`, `AppDomain-com.example.app`\n- `relativePath` - Original path within the domain\n- `flags` - 1=file, 2=directory, 4=symlink\n\nPhosphor parses this to provide file-system-like browsing without modifying the backup.\n\n## Roadmap\n\n- [x] WhatsApp message parsing (ChatStorage.sqlite)\n- [x] Apple Notes extraction (NoteStore.sqlite)\n- [x] Call log browsing and export\n- [x] Safari bookmarks and history\n- [x] Health data extraction (samples, workouts, all data types)\n- [x] Music and ringtone transfer (extract from backup, install to device via AFC)\n- [x] Batch operations (multi-select extract in Photos, Music)\n- [x] Wi-Fi device connection (libimobiledevice network mode)\n- [x] Encrypted backup browsing (via iphone-backup-decrypt)\n- [x] Drag-and-drop file transfer\n- [x] Localization (English, Arabic, Spanish, French, German, Japanese, Chinese)\n- [x] Apple Watch data through paired iPhone\n- [x] Time Machine-style backup restore with 3D animation\n- [x] Scheduled automatic backups (hourly/daily/weekly/monthly, Wi-Fi support)\n- [x] .phosphor backup archive format (portable backup export/import)\n- [x] Contacts browsing and export (vCard, CSV)\n- [x] Calendar events browsing and export (ICS, CSV)\n- [x] Device-to-device transfer (clone) - backup source, restore to destination\n- [x] Full pymobiledevice3 migration (72 Shell calls, 13 services)\n- [x] Crash report viewer\n- [x] Process monitor\n- [x] Ringtone creator (afconvert)\n- [x] HEIC to JPG conversion (sips)\n- [x] Backup progress bar with percentage\n- [x] Syslog proper process termination\n- [x] Backup cancel support\n- [x] Backup encryption management (enable/disable/change password)\n- [ ] Voicemail browsing\n\n## Contributing\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for development setup and guidelines.\n\n## Credits\n\n- [pymobiledevice3](https://github.com/doronz88/pymobiledevice3) - Pure Python implementation of Apple's mobile device protocols (primary backend)\n- [libimobiledevice](https://libimobiledevice.org/) - Cross-platform protocol library for iOS devices (fallback)\n- [ifuse](https://github.com/libimobiledevice/ifuse) - FUSE filesystem for iOS devices (legacy)\n- Apple's SF Symbols for iconography\n\n## License\n\n[MIT](LICENSE) - Use it, fork it, ship it.\n","summary":"Phosphor is a free, open‑source macOS application that gives users full, native control over iPhones, iPads and iPod touches—seamlessly replacing Apple’s limited Finder integration without any subscription or iCloud lock‑in. Powered by SwiftUI and the pymobiledevice3 stack, it offers comprehensive device management, including automatic detection, device info display, pairing, and power commands, as well as live console and process monitoring.  Its robust backup system supports full, incremental, and Time‑Machine‑style backups, lets users browse and selectively restore files, export iMessages and other logs, and transfer files via drag‑and‑drop, all through a clean user interface.  The app is ideal for power users, developers, and anyone who needs a versatile, no‑cost alternative to commercial iOS management tools.","description":"Free and open-source iOS device manager for macOS. Browse backups, export messages, extract photos, manage apps - no subscriptions, no iCloud lock-in.","stars":73,"language":"Swift"},{"owner":"Ademking","repo":"MD-This-Page","url":"https://github.com/Ademking/MD-This-Page","readme":"# .MD this page\n\n> Turn any webpage into clean, LLM-ready Markdown in one click.  \n> Strip the browser, keep the structure, then copy or download instantly.\n\n![](screenshot.png)\n\n<div align=\"center\">\n  <a href=\"https://chromewebstore.google.com/detail/md-this-page/banfcmclfmmlbkhionmemhibbjedhikm\">\n    <img src=\"https://raw.githubusercontent.com/Ademking/BetterViewer/master/docs/download-chrome.svg\">\n  </a>\n  <a href=\"https://addons.mozilla.org/en-US/firefox/addon/md-this-page/\">\n    <img src=\"https://raw.githubusercontent.com/Ademking/BetterViewer/master/docs/firefox.svg\">\n  </a>\n</div>\n\n<br/>\n\n<div align=\"center\">\n  <img src=\"https://img.shields.io/github/release/Ademking/MD-This-Page?style=for-the-badge&sort=semver\">\n  <img src=\"https://img.shields.io/github/stars/Ademking/MD-This-Page?style=for-the-badge&sort=semver\">\n  <img src=\"https://img.shields.io/chrome-web-store/rating/banfcmclfmmlbkhionmemhibbjedhikm?style=for-the-badge\">\n</div>\n\n### How it works\n\n1. Open any webpage  \n2. Right-click → \".MD this page\" (or press `Alt+M`)  \n3. Get clean Markdown instantly  \n\n## Why Markdown (and why it matters for LLMs)\n\nModern LLMs perform significantly better when content is provided in clean, structured Markdown instead of raw HTML or cluttered webpage data.\n\nHTML pages include navigation bars, scripts, ads, and deeply nested DOM structures that add noise and consume context window without adding meaning. This extension solves that by converting pages into a simplified, structured format that is easier to process and reason about.\n\n**Benefits for LLM workflows:**\n\n- **Less noise, more signal:** Removes ads, UI elements, and boilerplate content that distract from the main text.\n- **Better structure understanding:** Headings, lists, and sections are preserved in a format LLMs naturally interpret well.\n- **Token efficiency:** Markdown is significantly more compact than HTML, helping fit more useful content into limited context windows.\n- **Improved reasoning quality:** Clean hierarchical formatting makes it easier for models to summarize, extract, and answer questions accurately.\n- **Reliable parsing:** Unlike raw HTML, Markdown avoids deeply nested or inconsistent DOM structures that can confuse extraction pipelines.\n\n**In short:** this extension turns “web pages” into “LLM-ready documents.”\n\n## Features\n\n- **One-Click Conversion:** Use the context menu (right-click) or the keyboard shortcut (`Alt+M`) to instantly convert the current page.\n- **Smart Extraction:** Powered by Mozilla's Readability library to isolate the main content and ignore ads, navbars, and unnecessary elements.\n- **Dedicated Preview Tab:** Opens a clean interface where you can view and refine the extracted Markdown.\n- **Customizable Output:** Toggle various elements to tailor the Markdown to your needs:\n  - Remove/Keep Images\n  - Remove/Keep Links\n  - Show/Hide Metadata (Title, Author, Date)\n  - Show/Hide Source URL\n  - Generate a Document Structure / Page Map\n- **Export Options:**\n  - Copy to clipboard\n  - Download as a `.md` file\n  - Copy as a prompt (useful for AI workflows)\n\n## Try it out!\n\n<table align=\"center\">\n  <tr>\n    <td align=\"center\">\n      <a href=\"https://chromewebstore.google.com/detail/md-this-page/banfcmclfmmlbkhionmemhibbjedhikm\">\n        <img src=\"https://raw.githubusercontent.com/Ademking/BetterViewer/master/docs/download-chrome.svg\">\n      </a>\n    </td>\n    <td align=\"center\">\n      <a href=\"https://addons.mozilla.org/en-US/firefox/addon/md-this-page/\">\n        <img src=\"https://raw.githubusercontent.com/Ademking/BetterViewer/master/docs/firefox.svg\">\n      </a>\n    </td>\n  </tr>\n</table>\n\nOr you can install the extension from [releases](https://github.com/Ademking/MD-This-Page/releases) or build it from source (see instructions below). Once installed, simply right-click on any webpage and select \".MD this page\" to see the magic happen.\n\n\n<img width=\"1919\" height=\"1046\" alt=\"image\" src=\"https://github.com/user-attachments/assets/73351a35-bdd2-478d-8b5e-d57bdf9de12f\" />\n\n\n\n## Getting Started\n\nThis extension is built with [Plasmo](https://docs.plasmo.com/) and React.\n\n### Prerequisites\n\n- Node.js\n- pnpm (or npm, yarn)\n\n### Installation & Development\n\n1. Clone the repository and navigate to the project directory:\n\n   ```bash\n   cd md-this-page\n   ```\n\n2. Install dependencies:\n\n   ```bash\n   pnpm install\n   ```\n\n3. Run the development server:\n\n   ```bash\n   pnpm dev\n   ```\n\n   _This will run the Plasmo dev server and generate a `build/chrome-mv3-dev` directory._\n\n4. Load the extension in Chrome:\n   - Go to `chrome://extensions/`\n   - Enable **Developer mode**\n   - Click **Load unpacked**\n   - Select the `build/chrome-mv3-dev` directory from this project.\n\n### Building for Production\n\nTo create a production build of the extension:\n\n```bash\npnpm build\n```\n\nThis will output the production-ready extension into `build/chrome-mv3-prod`.\n\n## Built With\n\n- [Plasmo](https://plasmo.com/) - Browser Extension Framework\n- [React](https://reactjs.org/) - UI Library\n- [Tailwind CSS](https://tailwindcss.com/) - Styling\n- [@mozilla/readability](https://github.com/mozilla/readability) - Content extraction\n- [Turndown](https://github.com/mixmark-io/turndown) - HTML to Markdown conversion\n\n## License\n\nMIT License\n\n## Credits\n\nAdem Kouki - [GitHub](https://github.com/Ademking)\n","summary":"MD‑This‑Page is a browser extension that turns any web page into clean, LLM‑ready Markdown with a single click or shortcut. It uses Mozilla’s Readability engine to strip navigation, ads, and other clutter, preserving headings, lists, and other structural elements while offering options to include or exclude images, links, metadata, and the source URL. The output can be viewed in a dedicated preview tab, copied to the clipboard, downloaded as a `.md` file, or copied as an AI prompt. The tool is especially valuable for researchers, content creators, and developers who feed web‑derived text into large language models and need concise, well‑structured input.","description":"Convert any web page to clean, readable Markdown with just one click.","stars":222,"language":"TypeScript"},{"owner":"likeablob","repo":"cydintosh","url":"https://github.com/likeablob/cydintosh","readme":"<div>\n<img src=\"./assets/cydintosh_front.jpg\" height=\"300px\">\n<img src=\"./assets/cydintosh_front_3.jpg\" height=\"300px\">\n</div>\n\n# Cydintosh\n\nA Macintosh Plus emulator port for Cheap-Yellow-Display board (ESP32), with some little 68k Mac applications.\n\n- Macintosh Plus emulation using umac and Musashi 68k emulator\n- 240x320 LCD with touchpad emulation for mouse control\n- *Homebrew* Mac applications built with Retro68 (Weather, WiFi status, etc.)\n- IPC between Mac and ESP32 (WiFi scan, MQTT weather data)\n\n## Hardware BOM\n\n| Component                | Quantity | Notes                                         |\n| ------------------------ | :------- | :-------------------------------------------- |\n| CYD2USB (ESP32-2432S028) | 1        | ESP32 with ILI9341 240x320 LCD, XPT2046 touch |\n| M2x3 Self-Tapping screw  | 4        | For enclosure assembly                        |\n\n> Note: The enclosure is only compatible with the [CYD2USB](https://github.com/witnessmenow/ESP32-Cheap-Yellow-Display/blob/main/cyd.md) (Type-C + micro USB) variant.\n\n## Getting Started\n\n1. **Flash**: See [Building](#building) to build and flash the firmware/ROM/disk image\n2. **Print**: 3D print the enclosure from [`./enclosure`](./enclosure)\n3. **Assemble**: Mount the CYD into the enclosure and secure with four M2x3 self-tapping screws\n\n## Prerequisites for Emulator\n\n- Mac Plus ROM v3 (4D1F8172, 128KB) `rom.bin`\n- System 3.2 bootable disk image (400KB)\n- HFS disk image (800KB `cyd_800k.dsk` provided, includes pre-built Mac apps for Cydintosh)\n\nSee also the [pico-mac](https://github.com/evansm7/pico-mac) repo for ROM and disk image requirements.\n\n## Building\n\n```bash\n# Clone and initialize submodules\ngit clone --recursive https://github.com/likeablob/cydintosh\ncd cydintosh\n\n# If you cloned without --recursive, initialize submodules:\ngit submodule update --init --recursive\n\n# Setup m68k configuration\n(cd external/umac/external/Musashi && ln -sf ../../../../include/m68kconf.h m68kconf.h)\n\n# Generate m68kops.c\n(cd external/umac && make prepare)\n\n# Create user configuration\ncp include/user_config.h.tmpl include/user_config.h\n# Edit include/user_config.h with your WiFi/MQTT settings\n\n# Generate and flash patched ROM\npython3 tools/generate_patched_rom.py path/to/rom.bin -o rom_patched.bin\nesptool --port /dev/ttyUSB0 --baud 921600 write_flash 0x210000 rom_patched.bin\n\n# Prepare disk image\n# The cyd_800k.dsk includes pre-built Mac applications (CydCtl, Weather, WiFi).\n# To create a fresh disk with System 3.2 using Mini vMac emulator:\n#   ./Mini\\ vMac system3.dsk cyd_800k.dsk\n#   Then copy System folder from system3.dsk to cyd_800k.dsk in the emulator\n\n# Finally, copy the prepared disk to data/disk.img\ncp cyd_800k.dsk data/disk.img\n\n# Build and upload firmware\n# For the CYD (micro USB) variant, use `-e cyd`\n# Add a new [env:xxx] section to platformio.ini for other minor variants.\npio run -e cyd2usb -t upload\n\n\n# Upload disk image\npio run -e cyd2usb -t uploadfs\n```\n\nTo use the Weather app, continue with [Home Assistant Setup](#home-assistant-setup).\n\n## Development\n\n```bash\n# Format tracked C/C++ files\nmise run format\n\n# Check formatting without changes\nmise run format:check\n```\n\n## Mac Applications\n\n*Homebrew* Mac applications for Cydintosh.\n\n| App     | Description                           |\n| ------- | ------------------------------------- |\n| Weather | Weather display via MQTT              |\n| CydCtl  | Hardware control (backlight, RGB LED) |\n| WiFi    | WiFi status and scan                  |\n\n<div>\n<img src=\"./assets/cydintosh_app_weather.jpg\" height=\"300px\">\n<img src=\"./assets/cydintosh_app_cydctl.jpg\" height=\"300px\">\n<img src=\"./assets/cydintosh_app_wifi.jpg\" height=\"300px\">\n</div>\n\n### ESP32-Mac IPC Interface\n\nThe ESP32 exposes a command interface via memory-mapped region at `0xF00000`. Mac applications read/write this shared memory to communicate with ESP32:\n\n| App     | Commands                                           |\n| ------- | -------------------------------------------------- |\n| Weather | `GET_WEATHER_DATA` ...                             |\n| CydCtl  | `GET_HW_STATE`, `SET_BACKLIGHT`, `SET_LED_RGB` ... |\n| WiFi    | `GET_WIFI_LIST`, `GET_WIFI_STATUS` ...             |\n\nSee `include/umac_ipc.h` and `mac-app/common/esp_ipc.h` for full command definitions.\n\n### Weather App\n\n```mermaid\nflowchart LR\n    HA[\"Home Assistant<br/>(Automation)\"] -->|\"Publish<br>(1h)\"| MB[(\"MQTT Broker\")]\n    MB -->|\"Data\"| ESP[\"ESP32\"]\n    ESP -->|\"Data\"| MAC[\"Weather App\"]\n    ESP -.->|\"Subscribe\"| MB\n    MAC -.->|\"Polling<br>(30s)\"| ESP\n    \n    linkStyle 0,1,2 stroke:#4CAF50,color:#4CAF50\n    linkStyle 3,4 stroke:#999\n```\n\n1. Home Assistant automation publishes weather data to MQTT every hour\n2. ESP32 subscribes to MQTT topics and stores received data\n3. Weather App polls ESP32 via IPC every 30s and renders the data\n\n#### Home Assistant Setup\n\nYou need to set up MQTT and a weather integration in Home Assistant to use the Weather app.\n\n- [MQTT Integration](https://www.home-assistant.io/integrations/mqtt/)\n- [Weather Integrations](https://www.home-assistant.io/integrations/#weather)\n- [Definitive guide to Weather integrations (Community)](https://community.home-assistant.io/t/definitive-guide-to-weather-integrations/736419)\n\n\n1. In Home Assistant, go to **Settings > Automations > Create Automation > Edit YAML**\n2. Paste the content of [`homeassistant/weather_to_mqtt.yaml`](homeassistant/weather_to_mqtt.yaml)\n3. Edit the variables:\n   ```yaml\n   variables:\n     weather_entity: \"weather.home\"\n     topic_prefix: \"home/weather\"\n     location: \"Chicago\"\n   ```\n\n#### ESP32 Configuration\n\nWiFi and MQTT broker credentials are configured in [`include/user_config.h`](include/user_config.h.tmpl):\n\n```c\n...\n#define WIFI_SSID       \"YOUR_WIFI_SSID\"\n#define WIFI_PASSWORD   \"YOUR_WIFI_PASSWORD\"\n\n#define MQTT_BROKER_URL \"mqtt://192.168.1.100:1883\"\n#define MQTT_USERNAME   \"YOUR_MQTT_USERNAME\"\n#define MQTT_PASSWORD   \"YOUR_MQTT_PASSWORD\"\n```\n\n### Updating the Disk Image Manually\n\n```bash\n# Rebuild applications and update disk image\n./tools/update-disk.sh data/disk.img\n\n# Re-upload disk image\npio run -e cyd2usb -t uploadfs\n```\n\n## Gallery\n\n<div>\n<img src=\"./assets/cydintosh_front_3.jpg\" height=\"300px\">\n<img src=\"./assets/cydintosh_back.jpg\" height=\"300px\">\n</div>\n\n## Acknowledgements\n\n- [Musashi](https://github.com/kstenerud/Musashi) - m68k emulator\n- [umac](https://github.com/evansm7/umac) - Mac Plus emulator core\n- [pico-mac](https://github.com/evansm7/pico-mac) - Reference implementation for RP2040\n- [ESP32-Cheap-Yellow-Display](https://github.com/witnessmenow/ESP32-Cheap-Yellow-Display) - CYD community\n- For dependencies, see also src/idf_component.yml\n\n## License\n\n- **Software**: MIT\n- **External libraries**: See respective licenses in `external/`\n\n## TODO\n\n- [ ] Better icons for mac-apps\n\n## Related Projects\n\n- [likeablob/denki-kurage](https://github.com/likeablob/denki-kurage): Another CYD-based gadget\n- Macbar (WIP):  ESP32-S3 port utilizing PSRAM\n- Macbento (WIP)\n","summary":"Cydintosh is a portable Macintosh Plus emulator ported to the Cheap‑Yellow‑Display (CYD) ESP32 board, using the umac and Musashi 68k core to run legacy Mac software on a 240 × 320 ILI9341 LCD with touchpad‑emulated mouse input. It ships with a handful of “homebrew” Mac applications—built with Retro68—such as Weather, WiFi status, and a hardware‑control panel, and includes a memory‑mapped IPC interface that forwards sensor data and network status to the host via Wi‑Fi and MQTT. The project is ideal for retro‑computing hobbyists who want to build or 3D‑print a compact Mac emulator, developers looking to experiment with low‑level 68k emulation on microcontrollers, or Home Assistant users who wish to display real‑time weather or network information on a nostalgic screen.","description":"Cydintosh: Little 68k Brother is watching your Smart Home 👀","stars":103,"language":"C"},{"owner":"vincentkoc","repo":"tokenjuice","url":"https://github.com/vincentkoc/tokenjuice","readme":"<img src=\"docs/tokenjuice.jpg\" alt=\"tokenjuice banner\"/>\n\n# tokenjuice 🧃\n\nlean output compaction for terminal-heavy agent workflows.\n\n## what it does\n\nan agent or harness calls noisy tools like `git status`, `pnpm test`, `pnpm --help`, `docker build`, or `rg`.\n\ntokenjuice sits in front of that tool call, runs it, trims the fat from the output, and passes back a much cleaner result to the harness.\n\nthe important bit is the boundary:\n\n- the original command still runs\n- tokenjuice compacts the observed output after execution\n- `--raw` / `--full` gives you an explicit unaltered escape hatch when you need it\n- raw output can be stored locally when you explicitly ask for it\n- the harness gets a smaller, more useful payload instead of a wall of terminal junk\n\n## install\n\n```bash\nnpm install -g tokenjuice\n# or\npnpm add -g tokenjuice\n# or\nyarn global add tokenjuice\n# or\nbrew tap vincentkoc/tap\nbrew install tokenjuice\n```\n\nthen:\n\n```bash\ntokenjuice --help\ntokenjuice --version\ntokenjuice install codex\ntokenjuice install claude-code\ntokenjuice install pi\ntokenjuice uninstall codex\n```\n\n## why\n\ntool output wastes absurd amounts of context. your llm needs a diet.\n\ntokenjuice compacts observed output after execution, gives hosts a boring, deterministic summary by default, and only stores raw output when you explicitly ask for it.\n\n## goals\n\n- library first, not framework-locked\n- JSON rules for parseability and inspection\n- explicit `reduce` and `wrap` modes\n- file-backed artifacts that are easy to debug\n- no silent command rewrite\n- speed and reliability over gimmicks\n\n## commands\n\n```bash\ntokenjuice --help\ntokenjuice --version\ntokenjuice reduce [file]\ntokenjuice reduce-json [file]\ntokenjuice wrap -- <command> [args...]\ntokenjuice wrap --raw -- <command> [args...]\ntokenjuice wrap --store -- <command> [args...]\ntokenjuice install codex\ntokenjuice install codex --local\ntokenjuice install claude-code\ntokenjuice install pi\ntokenjuice install pi --local\ntokenjuice uninstall codex\ntokenjuice ls\ntokenjuice cat <artifact-id>\ntokenjuice verify\ntokenjuice discover\ntokenjuice doctor\ntokenjuice doctor hooks\ntokenjuice doctor pi\ntokenjuice stats\n```\n\n## overview\n\ntokenjuice can install host integrations for:\n\n| Logo | Client | Install | Hook file | Supported |\n| --- | --- | --- | --- | --- |\n| <img width=\"48px\" src=\"docs/client-claude.jpg\" alt=\"Claude\" /> | [Claude Code](https://docs.anthropic.com/en/docs/claude-code) | `tokenjuice install claude-code` | `~/.claude/settings.json` | ✅ Yes |\n| <img width=\"48px\" src=\"docs/client-openai.jpg\" alt=\"Codex\" /> | [Codex CLI](https://github.com/openai/codex) | `tokenjuice install codex` | `~/.codex/hooks.json` | ✅ Yes |\n| <img width=\"48px\" src=\"docs/client-pi.png\" alt=\"pi\" /> | [pi](https://github.com/badlogic/pi-mono/tree/main/packages/coding-agent) | `tokenjuice install pi` | `~/.pi/agent/extensions/tokenjuice.js` | ✅ Yes |\n\nshared behavior:\n\n- the original shell command still runs untouched\n- tokenjuice only rewrites the output that goes back through the hook or extension\n- raw command execution logs are still raw\n- `tokenjuice doctor hooks` checks installed host hooks together instead of making you guess which integration drifted\n- `tokenjuice doctor pi` inspects the installed Pi extension directly when you only care about that surface\n- `tokenjuice uninstall codex` cleanly removes the Codex hook and `tokenjuice doctor hooks` reports that as `disabled`, not broken\n- `tokenjuice install codex --local` / `tokenjuice doctor hooks --local` are for testing the current repo build before release\n- `tokenjuice install pi --local` forces the installed pi extension to be bundled from the current repo source, so local integration changes can be verified before release\n- Claude Code preserves unrelated settings keys while updating `hooks.PostToolUse`\n- Codex, Claude Code, and pi keep exact file-content reads raw, but compact safe repository inventory commands such as `find`, `ls`, `rg --files`, `git ls-files`, and `fd`\n\nlibrary-side adapters can also use `runReduceJsonCli(...)` to call the CLI without rebuilding the child-process + JSON plumbing themselves.\n\nrepository inventory compaction is deliberately narrow. standalone inventory commands compact only when they are inventory-only, and pipelines only compact when every downstream segment is a structural stdin transform: `sort`, `head`, `tail`, or `uniq`. mixed command sequences, source commands that execute other commands such as `find ... -exec ...` or `fd --exec ...`, and pipelines such as `find ... | xargs wc -l`, `rg --files | rg TODO src`, or `git ls-files | jq -R .` stay raw.\n\nfor pi, `tokenjuice install pi` installs a project-agnostic extension into `~/.pi/agent/extensions/tokenjuice.js`. after `/reload`, pi compacts noisy `bash` tool results and exposes `/tj status`, `/tj on`, `/tj off`, and `/tj raw-next`.\n\nwhen a reducer gets it wrong or the engine needs the untouched output, use the explicit bypass:\n\n```bash\ntokenjuice wrap --raw -- pnpm --help\ntokenjuice wrap --full -- git status\n```\n\nif the hook itself goes stale after a package upgrade, repair it with:\n\n```bash\ntokenjuice doctor hooks\ntokenjuice doctor pi\ntokenjuice install codex\ntokenjuice install claude-code\ntokenjuice install pi\n```\n\nfor machine callers, set:\n\n```json\n{\n  \"options\": {\n    \"raw\": true\n  }\n}\n```\n\nenvelope payload:\n\n```json\n{\n  \"input\": {\n    \"toolName\": \"exec\",\n    \"command\": \"pnpm test\",\n    \"combinedText\": \"RUN  v3.2.4 /repo\\n...\",\n    \"exitCode\": 1\n  },\n  \"options\": {\n    \"classifier\": \"tests/pnpm-test\",\n    \"store\": true,\n    \"maxInlineChars\": 1200\n  }\n}\n```\n\n## adapter JSON\n\n`reduce-json` is the machine-facing adapter command. it reads JSON from stdin or a file and always writes JSON to stdout.\n\ndirect payload:\n\n```json\n{\n  \"toolName\": \"exec\",\n  \"command\": \"pnpm test\",\n  \"argv\": [\"pnpm\", \"test\"],\n  \"combinedText\": \"RUN  v3.2.4 /repo\\n...\",\n  \"exitCode\": 1\n}\n```\n\n## rule system\n\n- built-in JSON rules live in `src/rules`\n- user overrides live in `~/.config/tokenjuice/rules`\n- project overrides live in `.tokenjuice/rules`\n- later layers override earlier ones by rule id\n\n## docs\n\n- spec: `docs/spec.md`\n- rules: `docs/rules.md`\n- security: `SECURITY.md`\n\n## status\n\nusable foundation for token reduction with diagnostics and a growing reducer set, now focused on deeper coverage and tuning.\n\n💙 built by [Vincent Koc](https://github.com/vincentkoc).\n","summary":"Tokenjuice is a lightweight CLI that sits between a terminal tool and an LLM‑driven harness, executing the original command unchanged while trimming excess output into a concise, deterministic summary. It provides quick‑fire “wrap” and “reduce” modes, configurable JSON rules, raw‑output escapes, and local artifact storage, all while keeping the original command’s logs untouched. The tool ships integrations for popular coding‑agent clients such as Claude Code, Codex, and Pi, allowing developers to seamlessly replace verbose tooling logs with compact, context‑ready payloads. Architects of large‑language‑model agents, build pipelines, and dev‑ops automation can benefit by reducing context windows and improving readability of noisy terminal output.","description":"🧃 Token weight loss. Lean output compaction for terminal-heavy agent workflows. Works as a native CLI tool or as an extension to popular coding and agent frameworks.","stars":98,"language":"TypeScript"},{"owner":"vyfor","repo":"animate","url":"https://github.com/vyfor/animate","readme":"# 🎞️ animate\n\nAnimation Library for Rust.\n\n![Demo](./.github/assets/demo.gif)\n\n## Features\n\n- **Lightweight**: Zero dependencies by default.\n- **Ergonomic**: Macro-driven API with m
