/dp/B07ZFD6SKP)\n- [Matter Smart Power Strip](https://www.amazon.com/dp/B0DYDFKJJJ), individually controlled AC outlets with 2 USB-A and 2 USB-C ports\n- [Siglent SDS1104X-E Oscilloscope](https://www.amazon.com/Siglent-SDS1104X-oscilloscope-channels-standard/dp/B0771N1ZF9)\n- Dupont wires\n- Pen spring or similar light compression spring\n- 3D printer for the printable toolhead parts in `cad/`\n\nOptional / interchangeable:\n\n- [Universal Oscilloscope Probes](https://www.amazon.com/dp/B0827JL1T2)\n- USB power brick, 5V\n- USB 2.0 pigtail cable\n\n## Hardware Architecture\n\n```mermaid\nflowchart LR\n    Operator[Operator] --> Dashboard[Web Dashboard]\n    Dashboard --> Apps[Python Apps]\n    Apps --> CNC[GRBL CNC over USB serial]\n    Apps --> Microscope[USB Microscope via mjpg-streamer]\n    Apps --> Scope[Oscilloscope over LAN / SCPI]\n    Apps --> Outlet[Optional LAN Power Outlet]\n\n    Endstop[Optical Endstop] --> ScopeC4[Scope C4 Safety Voltage]\n    Pogo[Pogo Measurement] --> ScopeC1[Scope C1 Measurement]\n    ScopeC4 --> Apps\n    ScopeC1 --> Apps\n```\n\n## Runtime Architecture\n\n```mermaid\nflowchart TD\n    Preflight[Preflight] --> SafetyCheck{Channel 4 clear?}\n    SafetyCheck -- no --> Stop[STOP State]\n    SafetyCheck -- yes --> Motion[Monitored Motion]\n    Motion --> Monitor[EndstopMonitor thread >= 10 Hz]\n    Monitor --> C4{C4 clear?}\n    C4 -- yes --> Capture[Microscope Capture]\n    C4 -- no --> FeedHold[Immediate feed hold]\n    FeedHold --> Stop\n    Capture --> Stitch[Stitch / Map]\n    Stitch --> Review[Manual Probe Review]\n    Review --> Approved{Approved target and measured probe offset?}\n    Approved -- no --> Stop\n    Approved -- yes --> Probe[Bounded probe motion]\n```\n\n## STOP State\n\n```mermaid\nstateDiagram-v2\n    [*] --> Running\n    Running --> STOP: C4 triggered / C4 fault / CNC alarm / real limit pin\n    STOP --> Report: log voltage, status, action\n    Report --> WaitForOperator: no automatic recovery motion\n    WaitForOperator --> Running: operator explicitly clears condition\n```\n\n## Quick Start\n\nInstall dependencies:\n\n```bash\nuv sync\n```\n\nStart the dashboard on a configured hardware host:\n\n```bash\nPYTHONPATH=. python3 apps/dashboard.py\n```\n\nThe dashboard defaults to port `5000`.\n\n## Configuration\n\nStart from [config/autoprober.example.env](config/autoprober.example.env). Do\nnot publish lab-specific IPs, hostnames, credentials, calibration files, or\ncaptured target images unless you intend to release them.\n\nImportant runtime values are configurable:\n\n- `AUTOPROBER_LOG_PATH`: runtime log path\n- `AUTOPROBER_RUNTIME_ROOT`: calibration, flat-field, and runtime state directory\n- `AUTOPROBER_MICROSCOPE_SNAPSHOT_URL`: microscope snapshot endpoint\n- `AUTOPROBER_SCOPE_HOST` / `AUTOPROBER_SCOPE_PORT`: oscilloscope SCPI endpoint\n- Dashboard: Flask on port `5000`\n\nDo not commit local environment files that contain lab-specific hosts, paths,\nor target data.\n\n## Main Workflows\n\n1. Run preflight checks.\n2. Verify Channel 4 is clear.\n3. Home and calibrate only when the physical setup is ready.\n4. Capture microscope frames with monitored motion.\n5. Import or generate target map artifacts for review.\n6. Approve probe candidates manually.\n7. Execute any probe motion only after microscope-to-probe offset is measured\n   and stored.\n\n## What Is Excluded\n\nThis release candidate intentionally excludes:\n\n- Trial microscope captures and stitched target images\n- Uploaded reference images\n- Local backups and archives\n- `.venv`, `__pycache__`, Playwright artifacts\n- Runtime logs, calibration cache, flat-field images\n- Machine-specific SSH/deploy state\n\nSee [RELEASE_MANIFEST.md](RELEASE_MANIFEST.md) for details.\n\n## License\n\nThis project is source-available under the PolyForm Noncommercial License 1.0.0.\n\nYou may use, modify, and share this project for noncommercial purposes.\n\nCommercial use requires a separate paid commercial license.\n\nFor commercial licensing, contact: autoprober@gainsecmail.com\n\n## Current Limitations\n\n- The microscope-to-pogo XY offset must be measured before real probing.\n- Calibration must not be fabricated; the runtime calibration file should be\n  generated on the machine that will move.\n- The dashboard is a lab-control tool and should not be exposed to untrusted\n  networks.\n\n## Responsible Use\n\nThis project is intended for controlled lab work on equipment and targets you\nare authorized to test. Do not use it to probe, damage, or analyze systems\nwithout permission.\n\n## Authors\n\n[Jon 'GainSec' Gaines](https://gainsec.com/)\n","summary":"AutoProber is a hardware‑automation stack that lets a software agent autonomously inspect a target chip on a board, capture microscope imagery, map pins and pads, and then physically probe them with a CNC‑controlled probe—all via a web dashboard or Python scripts. The system integrates a GRBL CNC controller, oscilloscope‑based safety monitoring, a USB microscope, and custom printable toolhead parts, automatically staging targets from plate detection to probe execution while documenting the XYZ coordinates and annotations. It is ideal for hardware hackers, embedded security researchers, or electronic testers who need a safe, repeatable way to probe small‑signal traces or verify pin mappings on surface‑mount devices.","description":"Hardware hacker’s flying probe automation stack for agent-driven   target discovery, microscope mapping, safety-monitored CNC motion, probe review, and   controlled pin probing.","stars":256,"language":"Python"},{"owner":"Robbyant","repo":"lingbot-map","url":"https://github.com/Robbyant/lingbot-map","readme":"<div align=\"center\">\n  <img src=\"assets/teaser.png\" width=\"100%\">\n\n<h1>LingBot-Map: Geometric Context Transformer for Streaming 3D Reconstruction</h1>\n\nRobbyant Team\n\n</div>\n\n<div align=\"center\">\n\n[![Paper](https://img.shields.io/static/v1?label=Paper&message=arXiv&color=red&logo=arxiv)](https://arxiv.org/abs/2604.14141)\n[![PDF](https://img.shields.io/static/v1?label=Paper&message=PDF&color=red&logo=adobeacrobatreader)](lingbot-map_paper.pdf)\n[![Project](https://img.shields.io/badge/Project-Website-blue)](https://technology.robbyant.com/lingbot-map)\n[![HuggingFace](https://img.shields.io/static/v1?label=%F0%9F%A4%97%20Model&message=HuggingFace&color=orange)](https://huggingface.co/robbyant/lingbot-map)\n[![ModelScope](https://img.shields.io/static/v1?label=%F0%9F%A4%96%20Model&message=ModelScope&color=purple)](https://www.modelscope.cn/models/Robbyant/lingbot-map)\n[![License](https://img.shields.io/badge/License-Apache--2.0-green)](LICENSE.txt)\n\n</div>\n\nhttps://github.com/user-attachments/assets/fe39e095-af2c-4ec9-b68d-a8ba97e505ab\n\n-----\n\n### 🗺️ Meet LingBot-Map! We've built a feed-forward 3D foundation model for streaming 3D reconstruction! 🏗️🌍\n\nLingBot-Map has focused on:\n\n- **Geometric Context Transformer**: Architecturally unifies coordinate grounding, dense geometric cues, and long-range drift correction within a single streaming framework through anchor context, pose-reference window, and trajectory memory.\n- **High-Efficiency Streaming Inference**: A feed-forward architecture with paged KV cache attention, enabling stable inference at ~20 FPS on 518×378 resolution over long sequences exceeding 10,000 frames.\n- **State-of-the-Art Reconstruction**: Superior performance on diverse benchmarks compared to both existing streaming and iterative optimization-based approaches.\n\n---\n\n# ⚙️ Quick Start\n\n## Installation\n\n**1. Create conda environment**\n\n```bash\nconda create -n lingbot-map python=3.10 -y\nconda activate lingbot-map\n```\n\n**2. Install PyTorch (CUDA 12.8)**\n\n```bash\npip install torch==2.9.1 torchvision==0.24.1 --index-url https://download.pytorch.org/whl/cu128\n```\n\n> For other CUDA versions, see [PyTorch Get Started](https://pytorch.org/get-started/locally/).\n\n**3. Install lingbot-map**\n\n```bash\npip install -e .\n```\n\n**4. Install FlashInfer (recommended)**\n\nFlashInfer provides paged KV cache attention for efficient streaming inference:\n\n```bash\n# CUDA 12.8 + PyTorch 2.9\npip install flashinfer-python -i https://flashinfer.ai/whl/cu128/torch2.9/\n```\n\n> For other CUDA/PyTorch combinations, see [FlashInfer installation](https://docs.flashinfer.ai/installation.html).\n> If FlashInfer is not installed, the model falls back to SDPA (PyTorch native attention) via `--use_sdpa`.\n\n**5. Visualization dependencies (optional)**\n\n```bash\npip install -e \".[vis]\"\n```\n\n# 📦 Model Download\n\n| Model Name | Huggingface Repository | ModelScope Repository | Description |\n| :--- | :--- | :--- | :--- |\n| lingbot-map | [robbyant/lingbot-map](https://huggingface.co/robbyant/lingbot-map) | [Robbyant/lingbot-map](https://www.modelscope.cn/models/Robbyant/lingbot-map) | Balanced and latest checkpoint — strong all-around performance across short and long sequences. |\n| lingbot-map-long | [robbyant/lingbot-map](https://huggingface.co/robbyant/lingbot-map) | [Robbyant/lingbot-map](https://www.modelscope.cn/models/Robbyant/lingbot-map) | Better suited for long sequences. |\n| lingbot-map-stage1 | [robbyant/lingbot-map](https://huggingface.co/robbyant/lingbot-map) | [Robbyant/lingbot-map](https://www.modelscope.cn/models/Robbyant/lingbot-map) | Stage-1 training checkpoint of lingbot-map — can be loaded into the VGGT model for bidirectional inference. |\n\n> 🚧 **Coming soon:** we're training an stronger model that supports longer sequences — stay tuned.\n\n# 🎬 Demo\n\nRun `demo.py` for interactive 3D visualization via a browser-based [viser](https://github.com/nerfstudio-project/viser) viewer (default `http://localhost:8080`).\n\n### Try the Example Scenes\n\nWe provide four example scenes in `example/` that you can run out of the box:\n\n```bash\n# Church scene\npython demo.py --model_path /path/to/lingbot-map.pt \\\n    --image_folder example/church --mask_sky\n\n# University scene\npython demo.py --model_path /path/to/lingbot-map.pt \\\n    --image_folder example/university --mask_sky\n\n# Loop scene (loop closure trajectory)\npython demo.py --model_path /path/to/lingbot-map.pt \\\n    --image_folder example/loop\n\n# Oxford scene with sky masking (outdoor, large scale scene)\npython demo.py --model_path /path/to/lingbot-map-long.pt \\\n    --image_folder example/oxford --mask_sky\n```\n\n### Streaming Inference from Images\n\n```bash\npython demo.py --model_path /path/to/checkpoint.pt \\\n    --image_folder /path/to/images/\n```\n\n### Streaming Inference from Video\n\n```bash\npython demo.py --model_path /path/to/checkpoint.pt \\\n    --video_path video.mp4 --fps 10\n```\n\n### Streaming with Keyframe Interval\n\nUse `--keyframe_interval` to reduce KV cache memory by only keeping every N-th frame as a keyframe. Non-keyframe frames still produce predictions but are not stored in the cache. This is useful for long sequences which exceed 320 frames (We train with video RoPE on 320 views, so performance degrades when the KV cache stores more than 320 views. Using a keyframe strategy allows inference over longer sequences.).\n\n```bash\npython demo.py --model_path /path/to/checkpoint.pt \\\n    --image_folder /path/to/images/ --keyframe_interval 6\n```\n\n### Windowed Inference (for long sequences, >3000 frames)\n\n```bash\npython demo.py --model_path /path/to/checkpoint.pt \\\n    --video_path video.mp4 --fps 10 \\\n    --mode windowed --window_size 128\n```\n\n\n### Sky Masking\n\nSky masking uses an ONNX sky segmentation model to filter out sky points from the reconstructed point cloud, which improves visualization quality for outdoor scenes.\n\n**Setup:**\n\n```bash\n# Install onnxruntime (required)\npip install onnxruntime        # CPU\n# or\npip install onnxruntime-gpu    # GPU (faster for large image sets)\n```\n\nThe sky segmentation model (`skyseg.onnx`) will be automatically downloaded from [HuggingFace](https://huggingface.co/JianyuanWang/skyseg/resolve/main/skyseg.onnx) on first use.\n\n**Usage:**\n\n```bash\npython demo.py --model_path /path/to/checkpoint.pt \\\n    --image_folder /path/to/images/ --mask_sky\n```\n\nSky masks are cached in `<image_folder>_sky_masks/` so subsequent runs skip regeneration. You can also specify a custom cache directory with `--sky_mask_dir`, or save side-by-side mask visualizations with `--sky_mask_visualization_dir`:\n\n```bash\npython demo.py --model_path /path/to/checkpoint.pt \\\n    --image_folder /path/to/images/ --mask_sky \\\n    --sky_mask_dir /path/to/cached_masks/ \\\n    --sky_mask_visualization_dir /path/to/mask_viz/\n```\n\n### Visualization Options\n\n| Argument | Default | Description |\n|:---|:---|:---|\n| `--port` | `8080` | Viser viewer port |\n| `--conf_threshold` | `1.5` | Visibility threshold for filtering low-confidence points |\n| `--point_size` | `0.00001` | Point cloud point size |\n| `--downsample_factor` | `10` | Spatial downsampling for point cloud display |\n\n### Without FlashInfer (SDPA fallback)\n\n```bash\npython demo.py --model_path /path/to/checkpoint.pt \\\n    --image_folder /path/to/images/ --use_sdpa\n```\n\n### Running on Limited GPU Memory\n\nIf you run into out-of-memory issues, try one (or both) of the following:\n\n- **`--offload_to_cpu`** — offload per-frame predictions to CPU during inference (on by default; use `--no-offload_to_cpu` only if you have memory to spare).\n- **`--num_scale_frames 2`** — reduce the number of bidirectional scale frames from the default 8 down to 2, which shrinks the activation peak of the initial scale phase.\n\n### Faster Inference\n\nLower the number of iterative refinement steps in the camera head to trade a small amount of pose accuracy for wall-clock speed:\n\n```bash\npython demo.py --model_path /path/to/checkpoint.pt \\\n    --image_folder /path/to/images/ --camera_num_iterations 1\n```\n\n`--camera_num_iterations` defaults to `4`; setting it to `1` skips three refinement passes in the camera head (and shrinks its KV cache by 4×).\n\n# 📜 License\n\nThis project is released under the Apache License 2.0. See [LICENSE](LICENSE.txt) file for details.\n\n# 📖 Citation\n\n```bibtex\n@article{chen2026geometric,\n  title={Geometric Context Transformer for Streaming 3D Reconstruction},\n  author={Chen, Lin-Zhuo and Gao, Jian and Chen, Yihang and Cheng, Ka Leong and Sun, Yipengjing and Hu, Liangxiao and Xue, Nan and Zhu, Xing and Shen, Yujun and Yao, Yao and Xu, Yinghao},\n  journal={arXiv preprint arXiv:2604.14141},\n  year={2026}\n}\n```\n\n# ✨ Acknowledgments\n\nWe thank Shangzhan Zhang, Jianyuan Wang, Yudong Jin, Christian Rupprecht, and Xun Cao for their helpful discussions and support.\n\nThis work builds upon several excellent open-source projects:\n\n- [VGGT](https://github.com/facebookresearch/vggt)\n- [DINOv2](https://github.com/facebookresearch/dinov2)\n- [Flashinfer](https://github.com/flashinfer-ai/flashinfer)\n\n---\n","summary":"LingBot‑Map is a feed‑forward foundation model that performs real‑time streaming 3D reconstruction by integrating geometric context, coordinate grounding, and drift‑correction into a single transformer architecture. It employs a geometric‑context transformer with anchor context, pose‑reference window, and trajectory memory, and uses paged KV‑cache attention to keep inference stable at roughly 20 FPS on 518×378 inputs even over more than 10,000 frames. Benchmark results show that it outperforms both streaming and optimization‑based baselines, offering high‑accuracy reconstructions across diverse scenes. The library is intended for researchers and practitioners in AR/VR, robotics, SLAM, and any application that requires efficient, long‑sequence 3D scene reconstruction.","description":"A feed-forward 3D foundation model for reconstructing scenes from streaming data","stars":2936,"language":"Python"},{"owner":"activetheory","repo":"activeframe","url":"https://github.com/activetheory/activeframe","readme":"# ActiveFrame 🖼️ (beta)\n\n![ActiveFrame sample](./docs/assets/sample.gif)\n![ActiveFrame sample2](./docs/assets/sample2.gif)\n\nDemo: https://activetheory.github.io/activeframe/  \n[More Context](https://x.com/luruke/status/2037511335257223626?s=20)\n\nActiveFrame is a small pipeline and javascript library for turning a video into a **single binary `.af` file** and decoding it in the browser with the **Web Codec API** — without a `<video>` element and **without third-party dependencies** such as FFmpeg.wasm, Mediabunny, or other JS demuxers/decoders.\n\nThe file packs **raw encoded samples** (H.264 / H.265) plus a **JSON manifest**. The runtime loads the buffer, configures the decoder from the manifest, and exposes **frame-accurate** navigation via `setFrame(index)`.\n\n---\n\n## Why use this instead of “regular” video?\n\n- Frame-accurate control and random access\n- Feed the frame natively to WebGL/WebGPU and Canvas 2D\n- Hardware accelerated**\n- Optimized for interactive scrubbing, 3D, image-like control over which frame is shown\n- You can keep multiple videos \"in sync\"\n- Predictable loading times, buffering, etc\n\n---\n\n## Why use this instead of “regular” spritesheet?\n\n- Smaller file size, leveraging H.264 / H.265 intra frame compression\n- Better memory management\n\n\n---\n\n## Generating an `.af` file\n\n```bash\nnode af.js <input video> <output.af> [maxWidth] [h264|h265] [gop] [crf]\n```\n\n---\n\n## Roadmap / ideas\n\n- Surface **codec support** before loading (e.g. companion manifest or a tiny probe).\n- **Streaming** or partial fetch (range requests), LOD, adaptive quality.\n- **Runtime tuning** of hardware vs software decode based on performance.\n- **Benchmark suite** to calibrate and fine tune performance and hw support.\n\n\n---\n\nDemo video is from [Netflix Open Content](https://opencontent.netflix.com/) – Meridian. Under Creative Commons Attribution 4.0 International Public License.\n","summary":"ActiveFrame compresses a video into a compact binary `.af` file that bundles raw H.264/H.265 samples with a JSON manifest, allowing browser playback through the Web Codec API without a `<video>` element or external demuxers. Its runtime offers frame‑accurate navigation, hardware‑accelerated decoding, and seamless integration with WebGL/WebGPU and Canvas 2D, making it ideal for interactive scrubbing, 3D visualizations, and synchronized multi‑video workflows. Compared to traditional spritesheets, the format delivers smaller file sizes via intra‑frame compression and more efficient memory usage. Web developers and content creators who need precise frame control, low‑latency streaming, or lightweight interactive media will benefit most from this tool.","description":"Custom .af video format for WebCodecs: frame-accurate playback without a video tag or third-party decoders.","stars":274,"language":"JavaScript"},{"owner":"SteveTheKiller","repo":"KillerPDF","url":"https://github.com/SteveTheKiller/KillerPDF","readme":"# KillerPDF\n\nPortable PDF editor for field techs. View, annotate, merge, split, edit text, draw, sign, and print without an Adobe subscription or a phone-home. Single Windows EXE, ~6 MB zipped, no runtime install required.\n\nPart of [killertools.net](https://killertools.net).\n\n## Features\n\n- High-quality rendering via PDFium (Docnet.Core)\n- Merge multiple PDFs and split out selected pages, drag-and-drop page reordering\n- Inline text editing with font matching against the original document\n- Text boxes, freehand drawing, and highlight overlays with adjustable color, size, and opacity\n- Draw and save reusable signatures, click to place anywhere on a page\n- Full-text search with result highlighting, drag-select to copy text\n- Print with annotations flattened into the output\n- No installer, no runtime install, no admin rights, no config files, no account\n\n## Screenshots\n\n![KillerPDF main view](screenshots/main-view.png)\n\n![Highlighting and annotation](screenshots/highlight.png)\n\n## Requirements\n\n- Windows 10 or 11 (x64)\n- No runtime install. Everything needed is inside the EXE (targets .NET Framework 4.8, which ships with every supported Windows release).\n\n## Download\n\n- Prebuilt binary: <https://github.com/SteveTheKiller/KillerPDF/releases/latest/download/KillerPDF.zip>\n- Source (GPL3 corresponding source for this release): <https://github.com/SteveTheKiller/KillerPDF/releases/download/v1.1.1/KillerPDF-1.1.1-src.zip>\n\n## Build from source\n\n```powershell\ngit clone https://github.com/SteveTheKiller/KillerPDF.git\ncd KillerPDF\ndotnet publish -c Release\n```\n\nOutput lands in `bin/Release/net48/publish/`. The publish step produces a single Costura-bundled `KillerPDF.exe` plus a versioned `KillerPDF-<version>-src.zip` for GPL3 source distribution.\n\nRequires the .NET 8 SDK or later to build (even though the output targets .NET Framework 4.8).\n\n## Changelog\n\nSee [CHANGELOG.md](CHANGELOG.md).\n\n## Why this exists\n\nI hate Adobe. Acrobat is bloated, tries to hijack file associations, wants a subscription to do basic things, and phones home constantly. Most of the \"free\" alternatives are either ad-riddled, cloud-based, or rebrands of the same PDF engine sold under three different names.\n\nKillerPDF is what I wanted: local-only, portable, no account, no telemetry. The PDF equivalent of Notepad.\n\n## License\n\nGPLv3. See [LICENSE](LICENSE). If you fork, modify, or redistribute KillerPDF, your version must also be released under GPLv3 with source available. No exceptions for commercial rebrands.\n","summary":"KillerPDF is a lightweight, portable PDF editor for Windows that runs from a single ~6 MB executable without requiring any runtime installation or admin rights. It offers a full set of offline capabilities—including viewing, annotating, merging, splitting, inline text editing, drawing, signature creation, full-text search, and printing with flattened annotations—while relying on PDFium for high‑quality rendering. Designed for field technicians and mobile workers who need a no‑subscription, no‑telemetry tool, it delivers the core PDF editing functions of commercial software in a single, self‑contained package. The application is distributed under GPL v3, requiring any modifications to remain open source.","description":"Portable PDF editor for Windows. GPLv3. No installer, no account, no subscription, no telemetry.","stars":289,"language":"C#"},{"owner":"cathrynlavery","repo":"diagram-design","url":"https://github.com/cathrynlavery/diagram-design","readme":"# Diagram Design\n\n**I wanted good-looking diagrams for my blog posts.**\n\nI write at [littlemight.com](https://littlemight.com). Every time I needed a diagram — an architecture sketch, a flowchart, a pyramid of what matters most — I'd ask Claude and get back a generic rounded-box thing that looked nothing like the rest of the site. I'd either fight with Figma for 30 minutes or just skip the diagram.\n\nSo I built a Claude Code skill for it. 13 types, editorial quality, matches your brand in 60 seconds by reading your website.\n\n> *The highest-quality move is usually deletion.* Every node earns its place. The accent color is reserved for the 1–2 things the reader should look at first. Target density: 4/10.\n\n---\n\n## What it makes\n\nAll 13 diagrams ship in three variants: minimal light, minimal dark, and full-editorial. Open any of them directly in a browser — no build step, no JS, no external images.\n\n<table>\n<tr>\n  <td align=\"center\" width=\"33%\"><img src=\"docs/screenshots/architecture.png\" alt=\"Architecture\"><br><b>Architecture</b><br><sub>Components + connections</sub></td>\n  <td align=\"center\" width=\"33%\"><img src=\"docs/screenshots/flowchart.png\" alt=\"Flowchart\"><br><b>Flowchart</b><br><sub>Decision logic</sub></td>\n  <td align=\"center\" width=\"33%\"><img src=\"docs/screenshots/sequence.png\" alt=\"Sequence\"><br><b>Sequence</b><br><sub>Messages over time</sub></td>\n</tr>\n<tr>\n  <td align=\"center\"><img src=\"docs/screenshots/state.png\" alt=\"State machine\"><br><b>State machine</b><br><sub>States + transitions</sub></td>\n  <td align=\"center\"><img src=\"docs/screenshots/er.png\" alt=\"ER / data model\"><br><b>ER / data model</b><br><sub>Entities + fields</sub></td>\n  <td align=\"center\"><img src=\"docs/screenshots/timeline.png\" alt=\"Timeline\"><br><b>Timeline</b><br><sub>Events on an axis</sub></td>\n</tr>\n<tr>\n  <td align=\"center\"><img src=\"docs/screenshots/swimlane.png\" alt=\"Swimlane\"><br><b>Swimlane</b><br><sub>Cross-functional flow</sub></td>\n  <td align=\"center\"><img src=\"docs/screenshots/quadrant.png\" alt=\"Quadrant\"><br><b>Quadrant</b><br><sub>Two-axis positioning</sub></td>\n  <td align=\"center\"><img src=\"docs/screenshots/nested.png\" alt=\"Nested\"><br><b>Nested</b><br><sub>Hierarchy by containment</sub></td>\n</tr>\n<tr>\n  <td align=\"center\"><img src=\"docs/screenshots/tree.png\" alt=\"Tree\"><br><b>Tree</b><br><sub>Parent → children</sub></td>\n  <td align=\"center\"><img src=\"docs/screenshots/layers.png\" alt=\"Layers\"><br><b>Layer stack</b><br><sub>Stacked abstractions</sub></td>\n  <td align=\"center\"><img src=\"docs/screenshots/venn.png\" alt=\"Venn\"><br><b>Venn</b><br><sub>Set overlap</sub></td>\n</tr>\n<tr>\n  <td align=\"center\" colspan=\"3\"><img src=\"docs/screenshots/pyramid.png\" alt=\"Pyramid\" width=\"40%\"><br><b>Pyramid / funnel</b><br><sub>Ranked hierarchy or conversion drop-off</sub></td>\n</tr>\n</table>\n\n**Browse the live gallery:** open [`assets/index.html`](assets/index.html) in your browser to flip through all 13 types with light / dark / full-editorial tabs.\n\n---\n\n## Install\n\n```bash\n# Clone into your Claude Code skills directory\ngit clone git@github.com:cathrynlavery/diagram-design.git ~/.claude/skills/diagram-design\n\n# Or if you keep skills elsewhere, symlink it\ngit clone git@github.com:cathrynlavery/diagram-design.git ~/code/diagram-design\nln -s ~/code/diagram-design ~/.claude/skills/diagram-design\n```\n\nRestart Claude Code. The skill registers as `diagram-design` and activates whenever you ask Claude to make a diagram.\n\n### Alternative: install as a plugin\n\nQuicker to install — but the skill lives in the plugin cache, so edits to `references/style-guide.md` don't survive plugin updates. Pick this if you just want to try it out; use the clone route above if you plan to customize the style guide by hand.\n\n**Claude Code:**\n```\n/plugin marketplace add cathrynlavery/diagram-design\n/plugin install diagram-design@diagram-design\n```\n\n**Claude Cowork:** Customize → Directory → Plugins → **+** → paste `cathrynlavery/diagram-design` → Sync, then install from the Personal list.\n\n---\n\n## Onboarding — make it look like *your* brand\n\nThe whole point: ship editorial-quality diagrams in **your** colors and typography, not a generic template.\n\nOut of the box, diagrams render in a neutral **stone + rust** palette (warm off-white paper, deep charcoal ink, rust-orange accent). Good enough to screenshot straight away. But 60 seconds of onboarding is better — the skill will pull your brand from your website and apply it across every diagram.\n\n### The flow\n\n```\nYou:     \"onboard diagram-design to https://yoursite.com\"\nClaude:  → fetches the homepage\n         → extracts the dominant palette + font stack\n         → maps detected values to semantic roles:\n             paper, ink, muted, accent, link\n         → shows a proposed diff\n         → writes your tokens to references/style-guide.md\nYou:     \"yes, apply it\"\n```\n\nEvery new diagram now uses your colors. Your website's paper color becomes the diagram background. Your CTA color becomes the focal accent. Your body font stack becomes the node label family.\n\n### What gets extracted\n\n| Detected from your site | Becomes |\n|---|---|\n| `<body>` background | `paper` token |\n| Primary text color | `ink` token |\n| Secondary / caption text | `muted` token |\n| Cards or containers | `paper-2` token |\n| Most-used brand color (CTA, link, heading) | `accent` token |\n| `<h1>` font family | `title` font |\n| `<body>` font family | `node-name` font |\n| `<code>` / `<pre>` font | `sublabel` font |\n\n### Contrast checks happen automatically\n\nBefore writing tokens, the skill verifies WCAG AA contrast on `ink` over `paper`. If your site has a color that fails contrast at diagram sizes (9–12px), it proposes an adjusted value and explains why.\n\n### Manual override\n\nPrefer to set tokens by hand? Open [`references/style-guide.md`](references/style-guide.md) and edit the table. Everything downstream reads from there — the 13 types, the annotation primitive, and the gallery all inherit semantic role names (`accent`, not `#b5523a`).\n\n### First-run gate\n\nThe skill won't silently ship default-skinned diagrams into a branded project. On first use in a new project, it checks if `style-guide.md` has been customized. If not, it pauses and asks:\n\n> *\"This is your first diagram in this project. The style guide is still at the default. Want to run onboarding, paste tokens manually, or proceed with default?\"*\n\nSee [`references/onboarding.md`](references/onboarding.md) for the full spec.\n\n---\n\n## Quickstart\n\n```bash\n# Open the gallery to see all 13 types\nopen ~/.claude/skills/diagram-design/assets/index.html\n\n# In Claude Code, just ask:\n# \"Make me an architecture diagram of my app: frontend, backend, database, Redis cache.\"\n# \"I need a quadrant showing Q2 projects by impact vs effort.\"\n# \"Give me a sequence diagram of the OAuth handshake.\"\n```\n\nClaude will pick the right type, build the HTML, and save it. You can also start from a template directly:\n\n```bash\ncp assets/template.html my-diagram.html        # minimal light\ncp assets/template-full.html my-diagram.html   # editorial with summary cards\n```\n\n---\n\n## Architecture\n\nProgressive disclosure. `SKILL.md` is a lean index — it tells Claude how to pick a type and where to look for detail. Every type lives in its own reference file, loaded only when relevant.\n\n```\ndiagram-design/\n├── SKILL.md                         — top-level: philosophy, selection guide, checklist\n├── references/                      — loaded only when a type or primitive is chosen\n│   ├── style-guide.md               — single source of truth for colors + fonts\n│   ├── onboarding.md                — the URL-to-tokens flow\n│   ├── type-architecture.md\n│   ├── type-flowchart.md\n│   ├── type-sequence.md\n│   ├── type-state.md\n│   ├── type-er.md\n│   ├── type-timeline.md\n│   ├── type-swimlane.md\n│   ├── type-quadrant.md\n│   ├── type-nested.md\n│   ├── type-tree.md\n│   ├── type-layers.md\n│   ├── type-venn.md\n│   ├── type-pyramid.md\n│   ├── primitive-annotation.md      — italic-serif editorial callouts\n│   └── primitive-sketchy.md         — hand-drawn SVG filter variant\n├── assets/\n│   ├── index.html                   — live gallery, tabbed\n│   ├── template*.html               — scaffolds for new diagrams\n│   └── example-<type>.html          — 3 variants × 13 types\n└── docs/screenshots/                — the images in this README\n```\n\nThis keeps Claude's working context tight (only load what you need) and makes the skill easy to extend — drop a new `type-<name>.md` and wire it into the selection guide.\n\n### What loads when\n\nThe top-level `SKILL.md` is always in context. Everything else is pulled in only when relevant — this is what keeps the skill fast even with 15 reference files.\n\n| You ask for… | Claude loads |\n|---|---|\n| \"Make me a flowchart\" | `SKILL.md` + `references/type-flowchart.md` |\n| \"Build an architecture diagram\" | `SKILL.md` + `references/type-architecture.md` |\n| \"Onboard this skill to my site\" | `SKILL.md` + `references/onboarding.md` + `references/style-guide.md` |\n| \"Add an editorial callout to this diagram\" | `SKILL.md` + `references/primitive-annotation.md` |\n| \"Give me a hand-drawn version\" | `SKILL.md` + `references/primitive-sketchy.md` |\n| Routine diagram-making (any of the 13 types) | Only `SKILL.md` + that one type's reference |\n\nNo matter how many types exist, Claude only reads the one you need. Add a new type tomorrow and nothing else changes.\n\n---\n\n## The design system (in one paragraph)\n\nOne accent color, 1–2 focal elements per diagram. Three font families: Instrument Serif (title + italic callouts), Geist sans (node names), Geist Mono (technical sublabels). 1px hairline borders, no shadows, max border-radius 10px. Every coord, width, and gap divisible by 4 — non-negotiable, it's what keeps the diagrams from feeling AI-generated. Mono is for technical content (ports, URLs, field types), not a blanket \"dev\" aesthetic. Coral-tinted focal nodes draw the eye to the 1–2 things that matter. Full spec in [`SKILL.md`](SKILL.md#5-design-system).\n\n---\n\n## Primitives\n\n- **Annotation callout** — italic Instrument Serif + dashed Bézier leader, for editorial asides that sit in the margins. See [`references/primitive-annotation.md`](references/primitive-annotation.md).\n- **Sketchy filter** — SVG turbulence + displacement map for a hand-drawn variant. Good for essays, not for technical docs. See [`references/primitive-sketchy.md`](references/primitive-sketchy.md).\n\n---\n\n## When *not* to use this skill\n\n- **Quick unicode diagrams** for tweets or terminal output → wiretext-style skill.\n- **Lists of anything** → a table or bullets.\n- **Before/after comparisons** → a table.\n- **One-shape \"diagrams\"** — a single box with a label → just write the sentence.\n\nBefore drawing, ask: *would a reader learn more from this than from a well-written paragraph?* If no, don't draw.\n\n---\n\n## About\n\nMade by **Cathryn Lavery** — founder of [BestSelf.co](https://bestself.co?utm_source=diagram-design&utm_medium=readme&utm_campaign=github&utm_content=bio). I write about AI, entrepreneurship, and designing nice-looking things at [littlemight.com](https://littlemight.com?utm_source=diagram-design&utm_medium=readme&utm_campaign=github&utm_content=bio) — blog + newsletter.\n\nIf this is useful, **star the repo** and come [say hi on X](https://x.com/cathrynlavery).\n","summary":"Diagram‑Design is a Claude Code skill that auto‑generates 13 types of high‑quality, brand‑matching diagrams—ranging from architecture sketches and flowcharts to state machines and Venn diagrams—in just a minute. Each diagram comes with three ready‑to‑use visual variants (minimal light, minimal dark, and full‑editorial) that open directly in any browser without build steps, JavaScript, or external image assets. The skill reads your website’s style guide to set colors and spacing, ensuring consistency with your editorial branding. It’s ideal for writers, designers, and technical bloggers who need polished, easily customizable diagrams to illustrate concepts in their posts.","description":"Thirteen editorial diagram types for Claude Code. Self-contained HTML + SVG. No shadows, no Mermaid-slop.","stars":825,"language":"HTML"},{"owner":"akazwz","repo":"hostc","url":"https://github.com/akazwz/hostc","readme":"<div align=\"center\">\n  <img src=\"./apps/workers/public/favicon.svg\" alt=\"hostc logo\" width=\"80\" height=\"80\" />\n  <h1>hostc</h1>\n  <p><strong>Localhost to the edge.</strong></p>\n  <p>Secure, fast, and frictionless edge tunnels. Powered by Cloudflare Workers.</p>\n</div>\n\n---\n\n**hostc** is a modern, lightweight, and zero-configuration tool to instantly expose your local HTTP and WebSocket services to the public internet. Built entirely on top of Cloudflare Workers and Durable Objects for global low-latency edge networking.\n\n## ✨ Features\n\n- **Zero Config**: Just run one command and get a public HTTPS URL.\n- **WebSocket Support**: Seamlessly proxies WebSocket upgrades (`ws://` -> `wss://`) out of the box.\n- **Edge Powered**: Traffic is routed through Cloudflare's massive global network network.\n- **Self-Hostable**: You can easily deploy the worker to your own Cloudflare account.\n\n## 🚀 Quick Start\n\nYou don't even need to install anything if you have Node.js. Just run:\n\n```bash\nnpx hostc 3000\n```\n\nOr, install it globally for frequent use:\n\n```bash\nnpm install -g hostc\n\nhostc 3000\n```\n\n> **Public URL**: You'll instantly get a URL like `https://t-a1b2c3d4.hostc.dev` that routes traffic directly to your `http://127.0.0.1:3000`.\n\n## 🏗️ Architecture & Monorepo\n\nThis project is a Monorepo managed by `pnpm`.\n\n| Package / App | Description |\n| --- | --- |\n| [`apps/cli`](./apps/cli) | The Node.js command-line interface tool. |\n| [`apps/workers`](./apps/workers) | The Cloudflare Worker and Durable Object handling the tunnel connections. |\n| [`packages/tunnel-protocol`](./packages/tunnel-protocol) | Shared protocol and WebSocket message types. |\n\n## 🛠️ Local Development\n\n### Requirements\n- Node.js 18+\n- `pnpm` v8+\n- A Cloudflare account (if you want to deploy the worker yourself)\n\n### Setup\n\n1. **Install dependencies**\n   ```bash\n   pnpm install\n   ```\n\n2. **Run the Cloudflare Worker locally**\n   ```bash\n   pnpm dev:workers\n   ```\n\n3. **Run the CLI locally against your local worker**\n   ```bash\n   cd apps/cli\n   pnpm dev\n   \n   # Or using the environment variable with the built CLI:\n   HOSTC_SERVER_URL=http://127.0.0.1:8787 hostc 3000\n   ```\n\n## 📖 License\n\nApache License 2.0. Made with ❤️ by [akazwz](https://github.com/akazwz).\n","summary":"hostc is a zero‑configuration tool that instantly exposes local HTTP and WebSocket services to the public internet via Cloudflare Workers and Durable Objects, offering secure, fast, and frictionless edge tunnels. Key capabilities include an out‑of‑the‑box CLI that yields a public HTTPS URL after a single command, built‑in WebSocket upgrade support, and the ability to self‑host the Worker on any Cloudflare account. Developers, test engineers, and anyone who needs quick, low‑latency remote access to local services can benefit from its lightweight, cloud‑edge‑powered design. The monorepo structure keeps the CLI, Worker code, and shared tunnel protocol neatly organized for easy local development or deployment.","description":"Localhost to the edge. Secure, fast, and zero-config edge tunnels powered by Cloudflare Workers.","stars":188,"language":"TypeScript"},{"owner":"bergside","repo":"design-md-chrome","url":"https://github.com/bergside/design-md-chrome","readme":"# TypeUI DESIGN.md Extractor (Chrome Extension)\n\nThis Chrome extension extract styles and information from any given site and generates a `DESIGN.md` or `SKILL.md` file that you can use with tools such as Google Stitch, Claude Code, Codex, and others to build websites with a given design system blueprint. The file is based on the open-source [TypeUI DESIGN.md](https://www.typeui.sh/design-md) format.\n\n<img width=\"599\" height=\"592\" alt=\"Screenshot 2026-04-16 at 21 27 09\" src=\"https://github.com/user-attachments/assets/6ba14eac-17a1-4577-83f2-213fedb9d152\" />\n\n## Getting started\n\nLoad the extension in Chrome:\n\n1. Open `chrome://extensions`\n2. Enable **Developer mode**\n3. Click **Load unpacked**\n4. Select this project folder\n\n## Curated design skills\n\nCheck out curated design systems at [typeui.sh/design-skills](https://www.typeui.sh/design-skills).\n\n## Available actions\n\n| Action | Description |\n| --- | --- |\n| Auto-extract | Reads styles from the active tab (typography, colors, spacing, radius, shadows, motion). |\n| Generate `DESIGN.md` | Produces design-system documentation markdown from extracted signals. |\n| Generate `SKILL.md` | Produces agent-ready skill markdown from extracted signals. |\n| Refresh | Re-runs extraction for the current page state. |\n| Download | Saves generated output as `DESIGN.md` or `SKILL.md`. |\n| Explain (`?`) | Shows how the file was generated, with TypeUI reference. |\n\n## Generated file structure\n\nThe generated markdown follows this structure:\n\n| Section | What it does |\n| --- | --- |\n| `Mission` | Defines the design-system objective for the extracted site. |\n| `Brand` | Captures product/brand context, URL, audience, and product surface. |\n| `Style Foundations` | Lists inferred visual tokens and foundations. |\n| `Accessibility` | Applies WCAG 2.2 AA requirements and interaction constraints. |\n| `Writing Tone` | Sets guidance tone for implementation-ready output. |\n| `Rules: Do` | Lists required implementation practices. |\n| `Rules: Don't` | Lists anti-patterns and prohibited behavior. |\n| `Guideline Authoring Workflow` | Defines ordered guideline authoring steps. |\n| `Required Output Structure` | Enforces consistent output sections. |\n| `Component Rule Expectations` | Defines required interaction/state details. |\n| `Quality Gates` | Adds testable quality and consistency checks. |\n\n## Local development\n\nRun tests locally:\n\n```bash\nnode tests/run-tests.mjs\n```\n\n## License\n\nThis project is open-source under the MIT License.\n","summary":"The bergside/design-md-chrome extension captures visual styles and layout details from any website and turns them into a structured DESIGN.md or SKILL.md file using the TypeUI format. It automatically extracts typography, colors, spacing, radius, shadows, motion, and accessibility data, then generates documentation that can be consumed by AI helpers like Claude Code or Google Stitch to produce design‑system‑centric code. Designers, front‑end developers, and AI‑powered development teams can quickly bootstrap a design system template, ensuring consistent implementation and faster hand‑off from design to code.","description":"Chrome extension to extract styles from any website and generate DESIGN.md files and design skills for AI based on TypeUI","stars":532,"language":"JavaScript"},{"owner":"codejunkie99","repo":"agentic-stack","url":"https://github.com/codejunkie99/agentic-stack","readme":"# agentic-stack\n\n**Keep one portable memory-and-skills layer across coding-agent harnesses, so switching tools doesn't reset how your agent works.**\n\nA portable `.agent/` folder (memory + skills + protocols) that plugs into Claude Code, Cursor, Windsurf, OpenCode, OpenClaw, Hermes, Pi Coding Agent, or a DIY Python loop — and keeps its knowledge when you switch.\n\n<p align=\"center\">\n  <img src=\"docs/demo.gif\" alt=\"agentic-stack demo\" width=\"880\"/>\n</p>\n\n<p align=\"center\">\n  <img src=\"docs/diagram.svg\" alt=\"agentic-stack architecture\" width=\"880\"/>\n</p>\n\n[![GitHub release](https://img.shields.io/github/v/release/codejunkie99/agentic-stack)](https://github.com/codejunkie99/agentic-stack/releases)\n[![License: Apache 2.0](https://img.shields.io/badge/license-Apache%202.0-blue.svg)](LICENSE)\n\n\n## Quickstart\n\n### macOS / Linux\n\n```bash\n# tap + install (one-time — both lines required)\nbrew tap codejunkie99/agentic-stack https://github.com/codejunkie99/agentic-stack\nbrew install agentic-stack\n\n# drop the brain into any project — the onboarding wizard runs automatically\ncd your-project\nagentic-stack claude-code\n# or: cursor | windsurf | opencode | openclaw | hermes | pi | standalone-python\n```\n\n### Windows (PowerShell)\n\n```powershell\n# clone + run the native installer\ngit clone https://github.com/codejunkie99/agentic-stack.git\ncd agentic-stack\n.\\install.ps1 claude-code C:\\path\\to\\your-project\n```\n\n### Already installed?\n\n```bash\nbrew update && brew upgrade agentic-stack\n```\n\n### Clone instead?\n\n```bash\ngit clone https://github.com/codejunkie99/agentic-stack.git\ncd agentic-stack && ./install.sh claude-code         # mac / linux / git-bash\n# or on Windows PowerShell: .\\install.ps1 claude-code\n# adapters: claude-code | cursor | windsurf | opencode | openclaw | hermes | pi | standalone-python\n```\n\n## Onboarding wizard\n\nAfter the adapter is installed, a terminal wizard populates\n`.agent/memory/personal/PREFERENCES.md` — the **first file your AI reads\nat the start of every session** — and writes a feature-toggle file at\n`.agent/memory/.features.json`.\n\nSix preference questions (each skippable with Enter):\n\n| Question | Default |\n|---|---|\n| What should I call you? | *(skip)* |\n| Primary language(s)? | `unspecified` |\n| Explanation style? | `concise` |\n| Test strategy? | `test-after` |\n| Commit message style? | `conventional commits` |\n| Code review depth? | `critical issues only` |\n\nPlus one **Optional features** step (opt-in, off by default):\n\n| Feature | Default |\n|---|---|\n| Enable FTS memory search `[BETA]` | `no` |\n\n**Flags:**\n\n```bash\nagentic-stack claude-code --yes          # accept all defaults, beta off (CI/scripted)\nagentic-stack claude-code --reconfigure  # re-run the wizard on an existing project\n```\n\nEdit `.agent/memory/personal/PREFERENCES.md` any time to refine your\nconventions, or `.agent/memory/.features.json` to flip feature toggles.\n\n## Review protocol (host-agent CLI)\n\nThe nightly `auto_dream.py` cycle only **stages** candidate lessons. It\ndoes not mark anything accepted or modify semantic memory. Your host\nagent does the review in-session:\n\n```bash\n# list pending candidates, sorted by priority\npython3 .agent/tools/list_candidates.py\n\n# accept with rationale (required)\npython3 .agent/tools/graduate.py <id> --rationale \"evidence holds, matches PREFERENCES\"\n\n# reject with reason (required); preserves decision history\npython3 .agent/tools/reject.py <id> --reason \"too specific to generalize\"\n\n# requeue a previously-rejected candidate\npython3 .agent/tools/reopen.py <id>\n```\n\nGraduated lessons land in `semantic/lessons.jsonl` (source of truth) and\nare rendered to `semantic/LESSONS.md`. Rejected candidates retain full\ndecision history so recurring churn is visible, not fresh.\n\nSee [`docs/architecture.md`](docs/architecture.md) for the full lifecycle.\n\n---\n\n## What this is\n\nEvery guide shows the folder structure. This repo gives you the folder\nstructure **plus the files that actually go inside**: a working portable\nbrain with five seed skills, four memory layers, enforced permissions, a\nnightly staging cycle, host-agent review tools, and adapters for eight\nharnesses.\n\n- **Memory** — `working/`, `episodic/`, `semantic/`, `personal/`. Each\n  layer has its own retention policy. Query-aware retrieval (salience ×\n  relevance); nightly compression into reviewable candidates.\n- **Review protocol** — `auto_dream.py` stages candidate lessons\n  mechanically. Your host agent reviews them via CLI tools\n  (`graduate.py`, `reject.py`, `reopen.py`) and commits decisions with\n  a required rationale. No unattended reasoning, no provider coupling.\n- **Skills** — progressive disclosure. A lightweight manifest always\n  loads; full `SKILL.md` files only load when triggers match the task.\n  Every skill ships with a self-rewrite hook.\n- **Protocols** — typed tool schemas, a `permissions.md` that the\n  pre-tool-call hook enforces, and a delegation contract for sub-agents.\n\n## What's new in v0.7.0\n\n- **Three host-agent tools that make the brain usable from day one.**\n  - `learn.py` — teach the agent a rule in one command:\n    `python3 .agent/tools/learn.py \"Always serialize timestamps in UTC\" --rationale \"past cross-region bugs\"`.\n    Stages + graduates + renders in one step. Idempotent. Cleans up staged\n    files on heuristic reject; preserves on crashes so retries work.\n  - `recall.py` — surface graduated lessons relevant to what you're about\n    to do: `python3 .agent/tools/recall.py \"add a created_at column\"`.\n    Returns ranked lexical-overlap hits with per-entry source labels.\n    Merges `lessons.jsonl` and seed bullets in `LESSONS.md` so graduating\n    your first lesson doesn't hide the seeds. Logs every recall to\n    episodic memory for audit.\n  - `show.py` — colorful dashboard of brain state (episodes, candidates,\n    lessons, failing skills, 14d activity sparkline). `--json` / `--plain`\n    / `NO_COLOR` flags.\n- **Adapter wiring for recall across all 8 harnesses.** Every adapter\n  (`claude-code`, `cursor`, `windsurf`, `opencode`, `openclaw`, `hermes`,\n  `pi`, `standalone-python`) now instructs the model to run\n  `recall.py \"<intent>\"` before deploy / migration / timestamp / debug /\n  refactor work, and to surface results in a `Consulted lessons before\n  acting:` block.\n- **Seed UTC lesson ships pre-graduated.** New installs see proactive\n  recall return a real hit on first try — no setup ceremony for the\n  demo path. Stored at `.agent/memory/semantic/lessons.jsonl`.\n- **Reliability fixes.**\n  - `pattern_id` canonicalizes conditions (casefold, unicode-whitespace\n    collapse, zero-width strip, dedupe, sort) — so the same logical set\n    always yields the same id.\n  - `validate.heuristic_check` now requires ≥3 content words in a claim\n    (blocks junk like `!!!abc` that passed the raw-length gate).\n  - `graduate.py` retry path is idempotent: re-renders `LESSONS.md`,\n    honors original reviewer/rationale from `lessons.jsonl` to keep\n    stores in sync, refuses retries against legacy rows missing\n    metadata.\n  - `render_lessons` + `append_lesson` now hold an advisory exclusive\n    flock on `lessons.jsonl`. Concurrent writers serialize; `LESSONS.md`\n    can no longer be stale relative to `lessons.jsonl`. Atomic rewrite\n    via temp file + rename.\n\n## What's new in v0.6.0\n\n- **Pi Coding Agent adapter.** `./install.sh pi` drops `AGENTS.md` and\n  symlinks `.pi/skills` to `.agent/skills` so pi sees the full brain\n  with zero duplication. Safe to install alongside hermes/opencode\n  (they all read `AGENTS.md`; we skip the overwrite if one exists).\n- **OpenClient → OpenClaw.** Adapter renamed across the board.\n  Installed file changed: `.openclient-system.md` → `.openclaw-system.md`.\n  Breaking for existing OpenClient users — re-run `./install.sh openclaw`.\n\n## What's new in v0.5.0\n\n- **Host-agent review protocol.** Python handles filing (cluster, stage,\n  heuristic prefilter, decay). The host agent handles reasoning via\n  `list_candidates.py` / `graduate.py` / `reject.py` / `reopen.py`.\n  Graduation requires `--rationale` so rubber-stamping is structurally\n  impossible.\n- **Structured `lessons.jsonl` as source of truth.** `LESSONS.md` is\n  rendered from it. Hand-curated content above the sentinel is\n  preserved across renders; legacy bullets auto-migrate on first run.\n- **Content clustering.** Proper single-linkage Jaccard with bridge\n  merging. Pattern IDs derived from canonical claim + conditions, stable\n  across cluster-membership changes.\n- **[BETA] FTS5 memory search.** Opt-in full-text search over all\n  `.md` / `.jsonl` memory documents. Default **off**; enable during\n  onboarding or edit `.agent/memory/.features.json` directly.\n- **Windows-native installer.** `install.ps1` runs natively in\n  PowerShell; `install.sh` continues to work under Git Bash / WSL.\n\n\n## Memory search `[BETA]`\n\nOpt-in FTS5 keyword search over all memory documents:\n\n```bash\n# enable during onboarding (or set manually in .agent/memory/.features.json)\npython3 .agent/memory/memory_search.py \"deploy failure\"\npython3 .agent/memory/memory_search.py --status\npython3 .agent/memory/memory_search.py --rebuild\n```\n\nFalls back to **ripgrep** (`rg`) if installed, then to `grep` — both\nrestricted to `.md` / `.jsonl` so source files never pollute results.\nThe index is stored at `.agent/memory/.index/` and gitignored.\n\n## Repo layout\n\n```\n.agent/                         # the portable brain (same across harnesses)\n├── AGENTS.md                   # the map\n├── harness/                    # conductor + hooks (standalone path)\n├── memory/                     # working / episodic / semantic / personal\n│   ├── auto_dream.py           # staging-only dream cycle\n│   ├── cluster.py              # content clustering + pattern extraction\n│   ├── promote.py              # stage candidates\n│   ├── validate.py             # heuristic prefilter (length + exact duplicate)\n│   ├── review_state.py         # candidate lifecycle + decision log\n│   ├── render_lessons.py       # lessons.jsonl → LESSONS.md\n│   └── memory_search.py        # [BETA] FTS5 search (opt-in)\n├── skills/                     # _index.md + _manifest.jsonl + SKILL.md files\n├── protocols/                  # permissions + tool schemas + delegation\n└── tools/                      # host-agent CLI + memory_reflect + skill_loader\n    ├── learn.py                # one-shot lesson teaching (stage + graduate)\n    ├── recall.py               # surface lessons relevant to an intent\n    ├── show.py                 # colorful brain-state dashboard\n    ├── list_candidates.py\n    ├── graduate.py\n    ├── reject.py\n    └── reopen.py\n\nadapters/                       # one small shim per harness\n├── claude-code/   (CLAUDE.md + settings.json hooks)\n├── cursor/        (.cursor/rules/*.mdc)\n├── windsurf/      (.windsurfrules)\n├── opencode/      (AGENTS.md + opencode.json)\n├── openclaw/      (system-prompt include)\n├── hermes/        (AGENTS.md)\n├── pi/            (AGENTS.md + .pi/skills symlink)\n└── standalone-python/  (DIY conductor entrypoint)\n\ndocs/                           # architecture, getting-started, per-harness\ninstall.sh                      # mac / linux / git-bash installer\ninstall.ps1                     # Windows PowerShell installer\nonboard.py                      # onboarding wizard entry point\nonboard_features.py             # .features.json read/write\nonboard_ui.py                   # ANSI palette, banner, clack-style layout\nonboard_widgets.py              # arrow-key prompts (text, select, confirm)\nonboard_render.py               # answers → PREFERENCES.md content\nonboard_write.py                # atomic file write with backup\n```\n\n## Supported harnesses\n\n| Harness | Config file it reads | Hook support |\n|---|---|---|\n| **Claude Code** | `CLAUDE.md` + `.claude/settings.json` | yes (PostToolUse, Stop) |\n| **Cursor** | `.cursor/rules/*.mdc` | no (manual reflect calls) |\n| **Windsurf** | `.windsurfrules` | no (manual reflect calls) |\n| **OpenCode** | `AGENTS.md` + `opencode.json` | partial (permission rules) |\n| **OpenClaw** | system-prompt include | varies by fork |\n| **Hermes Agent** | `AGENTS.md` (agentskills.io compatible) | partial (own memory) |\n| **Pi Coding Agent** | `AGENTS.md` + `.pi/skills/` | no (extension system) |\n| **Standalone Python** | `run.py` (any LLM) | yes (full control) |\n\n## Seed skills\n\n- **skillforge** — creates new skills from recurring patterns\n- **memory-manager** — runs reflection cycles, surfaces candidate lessons\n- **git-proxy** — all git ops, with safety constraints\n- **debug-investigator** — reproduce → isolate → hypothesize → verify\n- **deploy-checklist** — the fence between staging and production\n\n## How it compounds\n\n1. Skills log every action to episodic memory.\n2. `auto_dream.py` clusters recurring patterns into candidate lessons.\n3. The host agent reviews candidates with `graduate.py` / `reject.py`.\n4. Graduated lessons append to `lessons.jsonl`; `LESSONS.md` re-renders.\n5. Future sessions load query-relevant accepted lessons automatically.\n6. `on_failure` flags skills that fail 3+ times in 14 days for rewrite.\n7. `git log .agent/memory/` becomes the agent's autobiography.\n\n## Run the staging cycle nightly\n\n```bash\ncrontab -e\n0 3 * * * python3 /path/to/project/.agent/memory/auto_dream.py >> /path/to/project/.agent/memory/dream.log 2>&1\n```\n\n`auto_dream.py` resolves its paths absolutely and performs only mechanical\nfile operations (cluster, stage, prefilter, decay). No git commits, no\nnetwork, no reasoning — safe to run unattended.\n\n## License\n\nApache 2.0 — see [LICENSE](LICENSE).\n\n## Credits\n\nBased on the article **[\"The Agentic Stack\"](https://x.com/Av1dlive/status/2044453102703841645?s=20)**\nby [@AV1DLIVE](https://twitter.com/AV1DLIVE) — follow for updates and collabs.\nCoded using Minimax-M2.7 in the Claude Code harness; PR review by Macroscope and Codex.\nPatterns from Gstack, Claude Code's memory system, and conversations in the\nagent-engineering community. Built with the hypothesis that\n**harness-agnosticism is the point**.\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/svg?repos=codejunkie99/agentic-stack&type=Date)](https://star-history.com/#codejunkie99/agentic-stack&Date)\n","summary":"Agentic‑Stack is a lightweight, portable brain that can be dropped into any AI coding agent such as Claude Code, Cursor, Windsurf, OpenCode, and others, keeping the agent’s memory, skills, and protocols intact across tool switches. The package installs a `.agent/` folder and an onboarding wizard that writes a customizable preferences file and optional feature toggles, while also providing a nightly review workflow for staging and approving lessons. With adapters for a range of coding agents and a simple CLI for configuration, users can maintain consistent behavior, preferences, and knowledge without losing context when they move between platforms. This is ideal for developers who rely on multiple AI‑assisted coding tools and want a unified, re‑usable memory layer and review process.","description":"One brain, many harnesses. Portable .agent/ folder (memory + skills + protocols) that plugs into Claude Code, Cursor, Windsurf, OpenCode, OpenClaw, Hermes, or DIY Python — and keeps its knowledge when you switch.","stars":683,"language":"Python"},{"owner":"assai-id","repo":"nemesis","url":"https://github.com/assai-id/nemesis","readme":"# Nemesis\nNemesis is the public-facing investigative interface as the result of Operation Diponegoro, initiated by Abil Sudarman School of Artificial Intelligence. We ingest millions of rows of procurement data, surface anomalies, and make the findings legible to citizens, journalists, and policymakers.\n\nLive dashboard: https://assai.id/nemesis\n\n\n> End the vampire ball.\n\n\n## Release Status\n\n| Asset | Status | ETA |\n|-------|--------|-----|\n| Fine-tuned model | 🟡 In progress | ? |\n| Scraping & Analyze source code | 🟡 In progress | ? |\n\n\n\nStay tuned.\n\n## Downloads\n\n### Dataset\n\n[Download SIRUP raw jsonl dataset (analyzed by GPT-5.4)](https://contenflowstorage.blob.core.windows.net/shared/gpt-5.4-analyzed-sirup.zip?sp=r&st=2026-04-16T12:00:08Z&se=2029-04-16T20:15:08Z&spr=https&sv=2025-11-05&sr=b&sig=m%2FATynnnZq5gSdP8xWWw2ew41EMJZz09fDQRwpbWolk%3D)\n\n[Download SIRUP dataset SQL Ver (analyzed by GPT-5.4-mini)](https://contenflowstorage.blob.core.windows.net/shared/datasets/dashboard.sql?sp=r&st=2026-04-16T12:16:15Z&se=2029-04-16T20:31:15Z&spr=https&sv=2025-11-05&sr=b&sig=sKPH9uazyLcYcSwhARcEwVSG%2FTld9VnGJgZ2mOZIxrA%3D)\n\n\n### Model\nStay tuned\n\n### 1. Prepare the Database\n\nDownload and unzip the raw dataset, then convert it to SQLite:\n\n```bash\n# Convert raw jsonl data / sql data\n\n# Place the resulting .SQL file at the expected path:\nmv dashboard.sqlite backend/data/dashboard.sqlite\n\n\n```\n\nThe backend expects the database at `backend/data/dashboard.sqlite`.\n\n### 2. Run the Application\n\n**1. Start the backend**\n\n```bash\ncd backend\nnpm start\n```\n\nThe backend runs on `http://127.0.0.1:3000`.\n\n**2. Serve the frontend** (in a second terminal)\n\n```bash\ncd frontend\npython3 -m http.server 8080\n```\n\nThen open `http://127.0.0.1:8080` in your browser.\n\nThe frontend is preconfigured to call the backend at `http://127.0.0.1:3000/api`.\n\n## Notes\n\n- No frontend build step required — plain HTML/CSS/JS.\n- If `backend/node_modules` is missing, install dependencies:\n```bash\n  cd backend\n  npm install\n```\n- For development mode with hot reload:\n```bash\n  cd backend\n  npm run dev\n```\n\n## Environment\n\nBackend config is loaded from `backend/.env`. Default values:\n\n```env\nPORT=3000\nCORS_ORIGIN=*\nSQLITE_PATH=data/dashboard.sqlite\nAUDIT_DATASET_DIR=dataset\nGEO_ROOT_PATH=seed/geo\n```\n","summary":"Nemesis is a publicly‑facing investigative platform built to ingest and analyze millions of procurement records, surface anomalies, and present clear findings for citizens, journalists, and policymakers. It processes raw JSONL data into a SQLite database, exposes a lightweight Node.js backend API, and serves a front‑end dashboard that visualizes irregularities and patterns in procurement spend. The project includes downloadable pre‑analyzed datasets and a simple deployment workflow that requires only a data import followed by running the backend and serving the static UI. Researchers, data‑journalists, and regulators looking to uncover corrupt or inefficient procurement practices would find Nemesis a useful, ready‑to‑deploy tool.","description":null,"stars":471,"language":"JavaScript"},{"owner":"listyantidewi1","repo":"your-everyday-tools","url":"https://github.com/listyantidewi1/your-everyday-tools","readme":null,"summary":null,"description":null,"stars":null,"language":null,"error":"No README found"},{"owner":"Hainrixz","repo":"open-carrusel","url":"https://github.com/Hainrixz/open-carrusel","readme":"<div align=\"center\">\n\n# Open Carrusel\n\n### Chat with Claude. Design Instagram carousels. Export pixel-perfect PNGs.\n\n**Local-first. Open source. One command to start.**\n\n[![License: MIT](https://img.shields.io/badge/license-MIT-1a1a2e.svg?style=flat-square)](./LICENSE)\n[![Built with Claude](https://img.shields.io/badge/built%20with-Claude-e94560.svg?style=flat-square)](https://claude.ai)\n[![Made by tododeia](https://img.shields.io/badge/made%20by-tododeia-1a1a2e.svg?style=flat-square)](https://www.tododeia.com)\n[![Next.js 16](https://img.shields.io/badge/Next.js-16-000.svg?style=flat-square)](https://nextjs.org)\n[![React 19](https://img.shields.io/badge/React-19-149eca.svg?style=flat-square)](https://react.dev)\n[![TypeScript](https://img.shields.io/badge/TypeScript-5-3178c6.svg?style=flat-square)](https://www.typescriptlang.org)\n[![Tailwind v4](https://img.shields.io/badge/Tailwind-v4-38bdf8.svg?style=flat-square)](https://tailwindcss.com)\n\n![Dashboard](./docs/screenshots/dashboard.png)\n\n</div>\n\n---\n\n## Table of contents\n\n- [Why Open Carrusel](#-why-open-carrusel)\n- [See it in action](#-see-it-in-action)\n- [Quickstart (60 seconds)](#-quickstart-60-seconds)\n- [What you can do](#-what-you-can-do)\n- [How the AI agent works](#-how-the-ai-agent-works)\n- [Slash commands](#-slash-commands)\n- [Architecture](#-architecture)\n- [Tech stack](#-tech-stack)\n- [Project structure](#-project-structure)\n- [Configuration](#%EF%B8%8F-configuration)\n- [Troubleshooting](#-troubleshooting)\n- [Roadmap](#%EF%B8%8F-roadmap)\n- [Contributing](#-contributing)\n- [Acknowledgments](#-acknowledgments)\n- [About the maker](#-about-the-maker)\n- [License](#-license)\n\n---\n\n## ✨ Why Open Carrusel\n\nDesigning Instagram carousels eats hours. You either:\n\n- Pay $20–60/month for a closed-source tool that limits how creative you can get\n- Wrestle Canva templates that everyone else also uses\n- Hand-craft slides in Figma and lose your weekend\n\n**Open Carrusel takes a different bet.** You chat with Claude — the same model many designers already trust — and it generates real HTML/CSS slides that get screenshotted to PNGs at exact Instagram dimensions. Slides are unique, on-brand, and pixel-perfect. Everything runs on your laptop. Nothing is sent to a cloud you don't control.\n\nIt's open source under MIT. Fork it, tweak the system prompt, ship your own variant. No accounts. No subscriptions. No vendor lock-in.\n\n---\n\n## 🎬 See it in action\n\n**Dashboard** — your carousels, templates, and one-click export.\n\n![Dashboard](./docs/screenshots/dashboard.png)\n\n**Editor** — chat panel (left), live preview (center), drag-reorderable filmstrip (bottom).\n\n![Editor](./docs/screenshots/editor.png)\n\n> The slides shown above were generated by chatting with Claude. No templates, no copy-paste — every layout, color, and font choice came from a conversation.\n\n---\n\n## 🚀 Quickstart (60 seconds)\n\n> First run takes 1–2 minutes (Puppeteer downloads ~300 MB of Chromium for PNG export). After that, every launch is seconds.\n\n### One-command path (recommended)\n\n1. **Install [Claude Code](https://docs.anthropic.com/en/docs/claude-code)** and authenticate.\n2. **Clone and open the repo** in Claude Code:\n   ```bash\n   git clone https://github.com/Hainrixz/open-carrusel.git\n   cd open-carrusel\n   claude\n   ```\n3. In the Claude Code prompt, type:\n   ```\n   /start\n   ```\n\nThat's it. Dependencies install, the dev server starts, your browser opens. Now design carousels by chatting.\n\n### Manual path (if you don't use Claude Code)\n\n```bash\ngit clone https://github.com/Hainrixz/open-carrusel.git\ncd open-carrusel\nnpm run setup        # installs deps + seeds /data/\nnpm run dev          # starts http://localhost:3000\n```\n\nYou won't get the AI chat without Claude Code installed (the in-app agent shells out to the `claude` CLI), but the editor and export still work for static slides.\n\n---\n\n## 🧰 What you can do\n\n- **Three-panel editor** designed for flow: chat (left), live preview (center), drag-reorderable slide filmstrip (bottom).\n- **Generate slides by chatting**: \"Make me a 5-slide carousel about productivity habits — bold sans-serif, dark mode, accent red.\" Watch them stream in.\n- **Iterate per slide**: \"Make slide 3 more minimal\", \"Change the accent to teal\", \"Swap the hook for something punchier.\"\n- **Three Instagram aspect ratios** ready to go: 1:1 (1080×1080), 4:5 (1080×1350), 9:16 (1080×1920).\n- **Brand config** — name, color palette, fonts, logo, style keywords. Claude reads it before every generation so output stays on-brand.\n- **Templates** — save any carousel as a template, reuse it for the next one.\n- **Reference images** — drop in screenshots of carousels you love. Claude studies them to match style.\n- **Drag to reorder** slides via dnd-kit. Undo per-slide if a tweak goes sideways (version history per slide).\n- **Safe-zone overlay** to verify nothing important crops behind Instagram's UI.\n- **Fullscreen preview** for the final review.\n- **One-click export** — Puppeteer screenshots each slide HTML at the exact pixel dimensions Instagram expects, zips them, downloads.\n- **Captions + hashtags** generator built into the editor.\n- **All local** — slides, brand, uploads, exports all live in `/data/` and `/public/uploads/`. Nothing is sent to a cloud you don't control. The only network call is when Claude Code talks to Anthropic.\n\n---\n\n## 💬 How the AI agent works\n\nThe in-app agent is the **Claude CLI** spawned as a subprocess from `/api/chat` with `--allowedTools Bash WebFetch`. Messages stream back to the browser via Server-Sent Events.\n\nWhen you ask for a slide, Claude:\n\n1. Reads your brand config + active carousel state from the system prompt\n2. Writes the slide as a complete HTML/CSS string\n3. POSTs it to `/api/carousels/[id]/slides` via `curl` (using its `Bash` tool)\n4. The new slide appears in your filmstrip seconds later\n\n### Example chat\n\n```\nYou    > Create a 5-slide carousel about “3 morning habits that\n         actually move the needle.” Punchy, dark mode, accent red,\n         portrait 4:5.\n\nClaude > Coming up. I'll build a hook slide, three habit slides,\n         and a CTA. Working...\n         [streams 5 HTML slides into the filmstrip]\n\nYou    > Slide 3 — the headline is too long. Cut it in half and\n         move the icon to the top.\n\nClaude > Done.\n         [updates that slide; you can /undo if you preferred the old one]\n```\n\n### How the slides become PNGs\n\nSlides are stored as **body-level HTML** (no `<html>`/`<head>`/`<!DOCTYPE>`). The shared function `wrapSlideHtml()` in [`src/lib/slide-html.ts`](./src/lib/slide-html.ts) wraps that body into a full document — adding font loading, dimension constraints, and box-sizing reset — and serves it both:\n\n- to a **sandboxed `<iframe>`** for live preview in the editor\n- to **Puppeteer (headless Chromium)** for export, screenshot at exact Instagram pixel dimensions, zipped, downloaded\n\nBecause the same wrap function feeds both paths, what you see is exactly what you export. No surprises.\n\n---\n\n## 🛠 Slash commands\n\nType these inside Claude Code:\n\n| Command         | What it does                                                                                            |\n|-----------------|---------------------------------------------------------------------------------------------------------|\n| `/start [port]` | Install + seed + run + open browser. Idempotent — re-running on a healthy install is seconds.           |\n| `/stop [port]`  | Kill the dev server. Defaults to `:3000`, accepts a port arg matching `/start`.                         |\n| `/reset`        | Wipe local carousels, templates, brand config, uploads, exports — and re-seed defaults. Asks first.    |\n| `/doctor`       | Run setup diagnostics: Node version, Claude CLI on PATH, deps installed, data files seeded, port free. |\n\nYou can also run them outside Claude Code:\n\n```bash\nnpm run setup     # equivalent to /start (skips the browser-open + background server bits)\nnpm run dev       # start the dev server\nnpm run build     # production build\nnpm run doctor    # run scripts/doctor.mjs (works pre-`npm install`)\n```\n\n---\n\n## 🏗 Architecture\n\n```mermaid\nflowchart LR\n  U([\"Browser :3000\"])\n  C[\"Chat Panel\"]\n  P[\"Slide Preview<br/>(sandboxed iframe)\"]\n  F[\"Filmstrip<br/>(dnd-kit)\"]\n  API[\"/api/chat<br/>SSE streaming/\"]\n  CCLI[\"Claude CLI<br/>subprocess\"]\n  SLIDES[\"/api/carousels/.../slides/\"]\n  DATA[(\"/data/*.json<br/>async-mutex<br/>atomic writes\")]\n  EXP[\"/api/.../export/\"]\n  PUP[\"Puppeteer<br/>(headless Chromium)\"]\n  ZIP{{\"ZIP of PNGs\"}}\n\n  U --> C & P & F\n  C -- \"POST chat\" --> API\n  API -- \"spawn\" --> CCLI\n  CCLI -. \"SSE\" .-> API\n  API -. \"SSE\" .-> C\n  CCLI -- \"curl POST slide HTML\" --> SLIDES\n  SLIDES <--> DATA\n  P <--> SLIDES\n  F <--> SLIDES\n  U -- \"Export\" --> EXP\n  EXP --> PUP\n  PUP --> ZIP\n  ZIP --> U\n```\n\n**Why these choices:**\n\n- **Local-first, single-user.** The whole app is a localhost web app talking to local files. No cloud, no auth, no database.\n- **Claude CLI as the agent.** Lets us reuse the user's existing Claude Code authentication, capabilities, and context. The subprocess gets `Bash` (to `curl` the slide-write endpoints) and `WebFetch` (for research while designing).\n- **Slides as HTML.** Claude already writes great HTML/CSS — way more flexible than canvas, way easier to debug than a JSON DSL. The same HTML powers preview *and* export, so what you see is what you ship.\n- **Sandboxed iframes.** No `<script>` tags allowed (enforced by the iframe `sandbox=\"\"` attribute). Slides can't run code or escape their box.\n- **JSON file storage with async-mutex + atomic writes.** No SQLite, no Postgres. Reads and writes go through [`src/lib/data.ts`](./src/lib/data.ts) with proper locking, and writes are tmp-file + rename to avoid torn JSON.\n\nFor more, see [`CLAUDE.md`](./CLAUDE.md) — the architecture doc tuned for AI assistants working on this codebase.\n\n---\n\n## 📦 Tech stack\n\n| Layer        | Tool                                                                              |\n|--------------|-----------------------------------------------------------------------------------|\n| Framework    | [Next.js 16](https://nextjs.org) (Turbopack), [React 19](https://react.dev)       |\n| Language     | TypeScript 5                                                                      |\n| Styling      | [Tailwind CSS v4](https://tailwindcss.com) (CSS-first config in `globals.css`)    |\n| UI primitives| [Radix UI](https://www.radix-ui.com), [lucide-react](https://lucide.dev)          |\n| Drag/drop    | [@dnd-kit](https://dndkit.com)                                                    |\n| AI agent     | [Claude CLI](https://docs.anthropic.com/en/docs/claude-code) subprocess           |\n| Image export | [Puppeteer](https://pptr.dev), [Sharp](https://sharp.pixelplumbing.com)           |\n| Zipping      | [Archiver](https://github.com/archiverjs/node-archiver)                           |\n| Storage      | JSON files + [async-mutex](https://github.com/DirtyHairy/async-mutex)             |\n| Animation    | CSS-first ([Emil Kowalski's design philosophy](https://animations.dev))           |\n\n---\n\n## 📁 Project structure\n\n```\nopen-carrusel/\n├── .claude/\n│   └── commands/             ← /start, /stop, /reset, /doctor (Claude Code slash commands)\n├── data/                     ← user state (gitignored): brand, carousels, templates, exports\n├── docs/screenshots/         ← README assets\n├── public/uploads/           ← user uploads (gitignored): logos, reference images\n├── scripts/\n│   ├── setup.mjs             ← npm install + seed data dirs + Claude CLI detection (cross-platform)\n│   └── doctor.mjs            ← env diagnostic (zero deps, runs pre-install)\n├── src/\n│   ├── app/\n│   │   ├── api/              ← every backend route (chat, carousels, slides, export, brand, ...)\n│   │   ├── carousel/[id]/    ← editor page\n│   │   ├── globals.css       ← Tailwind v4 theme + Emil-style motion tokens\n│   │   ├── layout.tsx\n│   │   └── page.tsx          ← dashboard page\n│   ├── components/\n│   │   ├── brand/            ← BrandSetup, ColorPicker, FontSelector, LogoUpload\n│   │   ├── chat/             ← ChatPanel, ChatMessage, ChatInput, ReferenceImages\n│   │   ├── editor/           ← CarouselPreview, SlideFilmstrip, SlideRenderer, ExportButton, ...\n│   │   ├── layout/           ← TopBar\n│   │   ├── templates/        ← TemplateGallery, TemplateCard\n│   │   └── ui/               ← Button, Input, Badge, ConfirmDialog, CreateCarouselDialog\n│   ├── lib/\n│   │   ├── chat-system-prompt.ts   ← dynamic system prompt (brand + carousel context)\n│   │   ├── slide-html.ts            ← wrapSlideHtml() — the rendering contract\n│   │   ├── carousels.ts             ← carousel + slide CRUD with version history\n│   │   ├── data.ts                  ← JSON storage with async-mutex + atomic writes\n│   │   ├── claude-path.ts           ← portable Claude CLI discovery\n│   │   └── ...\n│   └── types/                ← shared TypeScript types\n├── CLAUDE.md                 ← architecture doc for AI assistants working on this code\n├── LICENSE                   ← MIT\n├── README.md                 ← you are here\n├── next.config.ts\n├── package.json\n└── tsconfig.json\n```\n\n---\n\n## ⚙️ Configuration\n\n### Environment variables (`.env.local`)\n\nCreated automatically by `scripts/setup.mjs` if it can find your Claude CLI. You can override:\n\n```bash\nCLAUDE_CLI_PATH=/path/to/claude   # set if `which claude` doesn't find it\n```\n\nOn Windows, run `where claude` in PowerShell to find the path (typically `C:\\Users\\<you>\\AppData\\Roaming\\npm\\claude.cmd`), then set `CLAUDE_CLI_PATH` in `.env.local`.\n\n### Brand config\n\nSet on first run (or via the gear icon in the top bar). Stored at `/data/brand.json`. Fields:\n\n- **Name** — your handle / company / project\n- **Colors** — primary, secondary, accent, background, surface\n- **Fonts** — heading + body (Google Fonts; the `/api/fonts` endpoint serves a curated list)\n- **Logo** — optional; used by Claude when you ask for branded slides\n- **Style keywords** — free-text style hints (\"editorial, minimalist, warm tones\") that get injected into Claude's system prompt\n\n### Templates\n\nSave any carousel as a template via the bookmark icon in the editor toolbar. Templates appear in the dashboard's Templates tab. Stored at `/data/templates.json`.\n\n### Reference images\n\nDrop screenshots into the chat panel's \"Reference Images\" section. Stored under `/public/uploads/`. Claude Code can read them via `WebFetch` of the local URL when designing.\n\n---\n\n## 🩺 Troubleshooting\n\n**`/start` says \"Node v18 detected, need ≥20.\"**\nNext.js 16 requires Node 20+. Install via [nodejs.org](https://nodejs.org) or [nvm](https://github.com/nvm-sh/nvm).\n\n**`/start` says \"Claude CLI not found.\"**\nInstall [Claude Code](https://docs.anthropic.com/en/docs/claude-code) and authenticate. The setup script searches `~/.local/bin/claude`, `/usr/local/bin/claude`, `/opt/homebrew/bin/claude`, `~/.npm-global/bin/claude`, and `$CLAUDE_CLI_PATH`. If yours lives elsewhere, set `CLAUDE_CLI_PATH` in `.env.local`.\n\n**Port 3000 is in use.**\nRun `/stop` to kill whatever's there, or run `/start 3001` to use a different port.\n\n**Export fails or hangs.**\nLikely a Puppeteer/Chromium issue. Try `rm -rf node_modules && npm install` to re-trigger the Chromium download. On Linux you may need `apt install` of common Chromium dependencies (libnss3, libatk1.0-0, libxss1, etc.).\n\n**Slides look fine in preview but export looks different.**\nThat shouldn't happen — both go through `wrapSlideHtml()`. If it does, file an issue with the slide HTML attached.\n\n**The AI keeps generating slides that ignore my brand colors.**\nOpen the brand setup (gear icon) and confirm your colors and style keywords are saved. They're injected into Claude's system prompt on every chat request via `chat-system-prompt.ts`.\n\n**Run `/doctor`** for a full env audit — it'll tell you which of the above applies.\n\n---\n\n## 🗺️ Roadmap\n\nOpen ideas — PRs welcome. Tick what you ship, add your own.\n\n- [ ] **Multi-language slide generation** — Spanish-LATAM voice presets so creators don't fight the AI's English defaults\n- [ ] **Reels storyboard mode** — vertical 9:16 with optional text-on-clip annotations\n- [ ] **Twitter/X thread export** — same brand voice, different surface\n- [ ] **Notion / Linear export** — push the carousel as a doc with each slide as a section\n- [ ] **Theme presets gallery** — community-curated `style-presets.json` you can one-click apply\n- [ ] **Per-slide AI chat** — a smaller chat thread scoped to a single slide\n- [ ] **Hosted demo** — for people who want to try before installing Claude Code\n\n---\n\n## 🤝 Contributing\n\nPRs welcome. The bar:\n\n- **Run `npm run doctor` and `npm run build`** before opening a PR — both should pass clean.\n- **Follow the file conventions** in [`CLAUDE.md`](./CLAUDE.md) — components ≤ 300 lines, types in `src/types/`, libs in `src/lib/`, `cn()` from `src/lib/utils.ts` for class merging, all data writes through `src/lib/data.ts`.\n- **Don't touch the slide rendering contract.** `wrapSlideHtml()` in `src/lib/slide-html.ts` is the seam between preview and export. Change it carefully and test the export round-trip.\n- **Animations follow [Emil Kowalski's philosophy](https://animations.dev)** — CSS-first, custom easings (already defined as CSS variables in `globals.css`), respect `prefers-reduced-motion`. See the `oc-*` utility classes already in `globals.css` before authoring new ones.\n\nGood first contributions: roadmap items above, more brand templates, accessibility audits, real screenshots/demos for the README, translations.\n\n---\n\n## 🙏 Acknowledgments\n\n- **[Emil Kowalski](https://emilkowal.ski)** — animation philosophy that shaped the whole motion system. The `oc-*` CSS classes encode his design-engineering principles (custom easings, restraint over excess, `@starting-style` over JS for entries).\n- **[Anthropic](https://www.anthropic.com)** — Claude (the model) and Claude Code (the CLI) are the brain of the in-app agent.\n- **[Vercel](https://vercel.com)** — Next.js + Turbopack make local-first React apps feel snappy.\n- **[Radix UI](https://www.radix-ui.com)** + **[shadcn/ui](https://ui.shadcn.com)** — the patterns underneath the dialog/button/input primitives.\n- **[dnd-kit](https://dndkit.com)** — the only sane drag-and-drop story in React.\n- **[Puppeteer](https://pptr.dev)** + **[Sha
