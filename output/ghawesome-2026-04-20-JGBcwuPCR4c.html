<script id="project-data" type="application/json">[{"owner":"shivampkumar","repo":"trellis-mac","url":"https://github.com/shivampkumar/trellis-mac","readme":"# TRELLIS.2 for Apple Silicon\n\nRun [TRELLIS.2](https://github.com/microsoft/TRELLIS) image-to-3D generation natively on Mac.\n\nThis is a port of Microsoft's TRELLIS.2 — a state-of-the-art image-to-3D model — from CUDA-only to Apple Silicon via PyTorch MPS. No NVIDIA GPU required.\n\n## Results\n\nGenerates **400K+ vertex meshes** from single images in **~3.5 minutes on M4 Pro**.\n\nOutput includes textured OBJ and GLB files with PBR materials, ready for use in 3D applications.\n\n### Example (nearest-neighbor sampling, trilinear interpolation WIP)\n\n**Input** &rarr; **Generated 3D mesh (424K vertices, 858K triangles)**\n\n<p>\n<img src=\"assets/shoe_input.png\" width=\"200\">\n<img src=\"assets/shoe_front.png\" width=\"280\">\n<img src=\"assets/shoe_side.png\" width=\"280\">\n</p>\n\n## Requirements\n\n- macOS on Apple Silicon (M1 or later)\n- Python 3.11+\n- 24GB+ unified memory recommended (the 4B model is large)\n- ~15GB disk space for model weights (downloaded on first run)\n\n## Quick Start\n\n```bash\n# Clone this repo\ngit clone https://github.com/shivampkumar/trellis-mac.git\ncd trellis-mac\n\n# Log into HuggingFace (needed for gated model weights)\nhf auth login\n\n# Request access to these gated models (usually instant approval):\n#   https://huggingface.co/facebook/dinov3-vitl16-pretrain-lvd1689m\n#   https://huggingface.co/briaai/RMBG-2.0\n\n# Run setup (creates venv, installs deps, clones & patches TRELLIS.2)\nbash setup.sh\n\n# Activate the environment\nsource .venv/bin/activate\n\n# Generate a 3D model from an image\npython generate.py path/to/image.png\n```\n\nOutput files are saved to the current directory (or use `--output` to specify a path).\n\n## Usage\n\n```bash\n# Basic usage\npython generate.py photo.png\n\n# With options\npython generate.py photo.png --seed 123 --output my_model --pipeline-type 512\n\n# All options\npython generate.py --help\n```\n\n| Option | Default | Description |\n|--------|---------|-------------|\n| `--seed` | 42 | Random seed for generation |\n| `--output` | `output_3d` | Output filename (without extension) |\n| `--pipeline-type` | `512` | Pipeline resolution: `512`, `1024`, `1024_cascade` |\n\n## What Was Ported\n\nTRELLIS.2 depends on several CUDA-only libraries. This port replaces them with pure-PyTorch and pure-Python alternatives:\n\n| Original (CUDA) | Replacement | Purpose |\n|---|---|---|\n| `flex_gemm` | `backends/conv_none.py` | Sparse 3D convolution via gather-scatter |\n| `o_voxel._C` hashmap | `backends/mesh_extract.py` | Mesh extraction from dual voxel grid |\n| `flash_attn` | PyTorch SDPA | Scaled dot-product attention for sparse transformers |\n| `cumesh` | Stub (graceful skip) | Hole filling, mesh simplification |\n| `nvdiffrast` | Stub | Differentiable rasterization (texture export) |\n\nAdditionally, all hardcoded `.cuda()` calls throughout the codebase were patched to use the active device instead.\n\n### Technical Details\n\n**Sparse 3D Convolution** (`backends/conv_none.py`): Implements submanifold sparse convolution by building a spatial hash of active voxels, gathering neighbor features for each kernel position, applying weights via matrix multiplication, and scatter-adding results back. Neighbor maps are cached per-tensor to avoid redundant computation.\n\n**Mesh Extraction** (`backends/mesh_extract.py`): Reimplements `flexible_dual_grid_to_mesh` using Python dictionaries instead of CUDA hashmap operations. Builds a coordinate-to-index lookup table, finds connected voxels for each edge, and triangulates quads using normal alignment heuristics.\n\n**Attention** (patched `full_attn.py`): Adds an SDPA backend to the sparse attention module. Pads variable-length sequences into batches, runs `torch.nn.functional.scaled_dot_product_attention`, then unpads results.\n\n## Performance\n\nBenchmarks on M4 Pro (24GB), pipeline type `512`:\n\n| Stage | Time |\n|-------|------|\n| Model loading | ~45s |\n| Image preprocessing | ~5s |\n| Sparse structure sampling | ~15s |\n| Shape SLat sampling | ~90s |\n| Texture SLat sampling | ~50s |\n| Mesh decoding | ~30s |\n| **Total** | **~3.5 min** |\n\nMemory usage peaks at around 18GB unified memory during generation.\n\n## Limitations\n\n- **No texture export**: Texture baking requires `nvdiffrast` (CUDA-only differentiable rasterizer). Meshes export with vertex colors only.\n- **Hole filling disabled**: Mesh hole filling requires `cumesh` (CUDA). Meshes may have small holes.\n- **Slower than CUDA**: The pure-PyTorch sparse convolution is ~10x slower than the CUDA `flex_gemm` kernel. This is the main bottleneck.\n- **No training support**: Inference only.\n\n## License\n\nThe porting code in this repository (backends, patches, scripts) is released under the MIT License.\n\nUpstream model weights are subject to their own licenses:\n- **TRELLIS.2**: [MIT License](https://github.com/microsoft/TRELLIS.2/blob/main/LICENSE)\n- **DINOv3**: [Meta custom license](https://huggingface.co/facebook/dinov3-vitl16-pretrain-lvd1689m/blob/main/LICENSE.md) (gated, review before commercial use)\n- **RMBG-2.0**: [CC BY-NC 4.0](https://huggingface.co/briaai/RMBG-2.0) (non-commercial; commercial use requires a license from BRIA)\n\n## Credits\n\n- [TRELLIS.2](https://github.com/microsoft/TRELLIS.2) by Microsoft Research — the original model and codebase\n- [DINOv3](https://github.com/facebookresearch/dinov3) by Meta — image feature extraction\n- [RMBG-2.0](https://github.com/Bria-AI/RMBG-2.0) by BRIA AI — background removal\n","summary":"TRELLIS.MAC brings Microsoft’s state‑of‑the‑art TRELLIS.2 image‑to‑3D generation to Apple Silicon, enabling users to turn a single photo into a high‑resolution textured mesh without an NVIDIA GPU. It replaces CUDA‑only components with pure‑Python/PyTorch alternatives, producing 400 K‑plus vertex meshes in roughly three and a half minutes on an M4 Pro and exporting ready‑to‑use OBJ and GLB files with PBR materials. The ease of setup, minimal memory requirement (24 GB unified memory ideal) and the ability to run entirely on macOS makes it especially useful for 3D artists, game developers, and designers who need quick, GPU‑free 3D content creation from images.","description":null,"stars":228,"language":"Python"},{"owner":"kyegomez","repo":"OpenMythos","url":"https://github.com/kyegomez/OpenMythos","readme":"# OpenMythos\n\n<p align=\"left\">\n  <a href=\"https://pypi.org/project/open-mythos/\" target=\"_blank\">\n    <picture>\n      <source srcset=\"https://img.shields.io/pypi/v/open-mythos?style=for-the-badge&color=3670A0\" media=\"(prefers-color-scheme: dark)\">\n      <img alt=\"Version\" src=\"https://img.shields.io/pypi/v/open-mythos?style=for-the-badge&color=3670A0\">\n    </picture>\n  </a>\n  <a href=\"https://twitter.com/kyegomezb/\">\n    <picture>\n      <source srcset=\"https://img.shields.io/badge/Twitter-Follow-1DA1F2?style=for-the-badge&logo=twitter&logoColor=white\" media=\"(prefers-color-scheme: dark)\">\n      <img src=\"https://img.shields.io/badge/Twitter-Follow-1DA1F2?style=for-the-badge&logo=twitter&logoColor=white\" alt=\"Twitter\">\n    </picture>\n  </a>\n  <a href=\"https://discord.gg/3keGBK9Pvr\" target=\"_blank\">\n    <picture>\n      <source srcset=\"https://img.shields.io/badge/Discord-Join-5865F2?style=for-the-badge&logo=discord&logoColor=white\" media=\"(prefers-color-scheme: dark)\">\n      <img alt=\"Discord\" src=\"https://img.shields.io/badge/Discord-Join-5865F2?style=for-the-badge&logo=discord&logoColor=white\">\n    </picture>\n  </a>\n  <a href=\"https://pytorch.org\" target=\"_blank\">\n    <picture>\n      <source srcset=\"https://img.shields.io/badge/PyTorch-Implemented-EE4C2C?style=for-the-badge&logo=pytorch&logoColor=white\" media=\"(prefers-color-scheme: dark)\">\n      <img alt=\"PyTorch\" src=\"https://img.shields.io/badge/PyTorch-Implemented-EE4C2C?style=for-the-badge&logo=pytorch&logoColor=white\">\n    </picture>\n  </a>\n</p>\n\n> **Disclaimer:** OpenMythos is an independent, community-driven theoretical reconstruction based solely on publicly available research and speculation. It is not affiliated with, endorsed by, or connected to Anthropic or any of their proprietary systems.\n\nOpenMythos is an open-source, theoretical implementation of the Claude Mythos model. It implements a Recurrent-Depth Transformer (RDT) with three stages: **Prelude** (transformer blocks), a looped **Recurrent Block** (up to `max_loop_iters`), and a final **Coda**. Attention is switchable between MLA and GQA, and the feed-forward uses a sparse MoE with routed and shared experts ideal for exploring compute-adaptive, depth-variable reasoning.\n\n\n## Installation\n\n```bash\npip install open-mythos\n\n#uv pip install open-mythos\n```\n\n## Usage\n\n```python\n\nimport torch\nfrom open_mythos.main import OpenMythos, MythosConfig\n\n\nattn_type = \"mla\"  # or \"gqa\"\n\nbase = {\n    \"vocab_size\": 1000,\n    \"dim\": 256,\n    \"n_heads\": 8,\n    \"max_seq_len\": 128,\n    \"max_loop_iters\": 4,\n    \"prelude_layers\": 1,\n    \"coda_layers\": 1,\n    \"n_experts\": 8,\n    \"n_shared_experts\": 1,\n    \"n_experts_per_tok\": 2,\n    \"expert_dim\": 64,\n    \"lora_rank\": 8,\n    \"attn_type\": attn_type,\n}\n\nif attn_type == \"gqa\":\n    cfg = MythosConfig(**base, n_kv_heads=2)\nelse:\n    cfg = MythosConfig(\n        **base,\n        n_kv_heads=8,\n        kv_lora_rank=32,\n        q_lora_rank=64,\n        qk_rope_head_dim=16,\n        qk_nope_head_dim=16,\n        v_head_dim=16,\n    )\n\nmodel = OpenMythos(cfg)\ntotal = sum(p.numel() for p in model.parameters())\nprint(f\"\\n[{attn_type.upper()}] Parameters: {total:,}\")\n\nids = torch.randint(0, cfg.vocab_size, (2, 16))\nlogits = model(ids, n_loops=4)\nprint(f\"[{attn_type.upper()}] Logits shape: {logits.shape}\")\n\nout = model.generate(ids, max_new_tokens=8, n_loops=8)\nprint(f\"[{attn_type.upper()}] Generated shape: {out.shape}\")\n\nA = model.recurrent.injection.get_A()\nprint(\n    f\"[{attn_type.upper()}] Spectral radius ρ(A) max: {A.max().item():.4f} (must be < 1)\"\n)\n```\n\n\n\n## Model Variants\n\nPre-configured scales from 1B to 1T parameters:\n\n```python\nfrom open_mythos import (\n    mythos_1b,\n    mythos_3b,\n    mythos_10b,\n    mythos_50b,\n    mythos_100b,\n    mythos_500b,\n    mythos_1t,\n    OpenMythos,\n)\n\ncfg = mythos_7b()  # returns a MythosConfig\nmodel = OpenMythos(cfg)\n\ntotal = sum(p.numel() for p in model.parameters())\nprint(f\"Parameters: {total:,}\")\n```\n\n| Variant | `dim` | Experts | `expert_dim` | Loop iters | Context | Max output |\n|---|---|---|---|---|---|---|\n| `mythos_1b` | 2048 | 64 | 2048 | 16 | 4k | 4k |\n| `mythos_3b` | 3072 | 64 | 4096 | 16 | 4k | 4k |\n| `mythos_10b` | 4096 | 128 | 5632 | 24 | 8k | 4k |\n| `mythos_50b` | 6144 | 256 | 9728 | 32 | 8k | 4k |\n| `mythos_100b` | 8192 | 256 | 13568 | 32 | 1M | 128k |\n| `mythos_500b` | 12288 | 512 | 23040 | 48 | 1M | 128k |\n| `mythos_1t` | 16384 | 512 | 34560 | 64 | 1M | 128k |\n\n---\n\n## Training\n\nThe training script for the 3B model on FineWeb-Edu is at [`training/3b_fine_web_edu.py`](training/3b_fine_web_edu.py).\n\n**Single GPU:**\n```bash\npython training/3b_fine_web_edu.py\n```\n\n**Multi-GPU (auto-detects GPU count):**\n```bash\ntorchrun --nproc_per_node=$(python -c \"import torch; print(torch.cuda.device_count())\") training/3b_fine_web_edu.py\n```\n\nKey design choices:\n\n| Feature | Detail |\n|---|---|\n| Optimizer | AdamW |\n| Dataset | `HuggingFaceFW/fineweb-edu` (`sample-10BT` by default, swap to `sample-100BT` or `default` for full run) |\n| Tokenizer | `openai/gpt-oss-20b` via `MythosTokenizer` |\n| Parallelism | PyTorch DDP via `torchrun`, sharded streaming dataset |\n| Precision | bfloat16 on H100/A100, float16 + GradScaler on older GPUs |\n| Schedule | Linear warmup (2000 steps) → cosine decay |\n| Target | 30B tokens (~Chinchilla-adjusted for looped architecture) |\n\n---\n\n## Documentation\n\n| Page | Description |\n|---|---|\n| [`docs/open_mythos.md`](docs/open_mythos.md) | Full API reference for the `OpenMythos` class — constructor, `forward`, `generate`, all sub-modules, configuration reference, and usage examples |\n| [`docs/datasets.md`](docs/datasets.md) | Recommended training datasets with token budget guidance per model size |\n\n---\n\n## The Central Hypothesis\n\nClaude Mythos is suspected to be a **Recurrent-Depth Transformer (RDT)** — also called a Looped Transformer (LT). Rather than stacking hundreds of unique layers, a subset of layers is recycled and run through multiple times per forward pass. Same weights. More loops. Deeper thinking.\n\nThis is not chain-of-thought. There is no intermediate token output. All of this reasoning happens **silently, inside a single forward pass**, in continuous latent space.\n\n---\n\n## Architecture\n\nA looped transformer divides its layers into three functional blocks:\n\n```\nInput\n  ↓\n[Prelude P]        — standard transformer layers, run once\n  ↓\n[Recurrent Block R] — looped T times\n  ↑_______↓         (hidden state h updated each loop with input injection e)\n  ↓\n[Coda C]           — standard transformer layers, run once\n  ↓\nOutput\n```\n\nThe recurrent block update rule at each loop step t:\n\n```\nh_{t+1} = A·h_t + B·e + Transformer(h_t, e)\n```\n\nWhere:\n- `h_t` is the hidden state after loop t\n- `e` is the encoded input (from the Prelude), injected at every loop\n- `A` and `B` are learned injection parameters\n- The Transformer blocks apply attention and MLP as usual\n\nThe injection of `e` at every step is what prevents the model from drifting — it keeps the original input signal alive throughout the entire recurrence depth.\n\nThe full implementation is in [`open_mythos/main.py`](open_mythos/main.py). See the [`OpenMythos` class reference](docs/open_mythos.md) for a detailed API walkthrough, configuration options, and usage examples.\n\n---\n\n## Why This Explains Mythos\n\n### 1. Systematic Generalization\n\nVanilla transformers fail to combine knowledge in ways they have never seen during training. Looped transformers pass this test. The ability emerges through a **three-stage grokking process**:\n\n1. Memorization — model fits training distribution\n2. In-distribution generalization — model handles known compositions\n3. Systematic generalization — model handles novel compositions OOD, abruptly and suddenly\n\nThis is why Mythos feels qualitatively different from other models on novel questions — the capability phase-transitions in, rather than emerging gradually.\n\n### 2. Depth Extrapolation\n\nTrain on 5-hop reasoning chains. Test on 10-hop. Vanilla transformer fails. Looped transformer succeeds — by running more inference-time loops. This maps directly to the observation that Mythos handles deeply compositional problems (multi-step math, long-horizon planning, layered arguments) without explicit chain-of-thought.\n\nMore loops at inference = deeper reasoning chains = harder problems solved.\n\n### 3. Latent Thoughts as Implicit Chain-of-Thought\n\nEach loop iteration is the functional equivalent of one step of chain-of-thought, but operating in continuous latent space rather than token space. A looped model running T loops implicitly simulates T steps of CoT reasoning. This has been formally proven (Saunshi et al., 2025).\n\nFurthermore, continuous latent thoughts — unlike discrete token outputs — can encode **multiple alternative next steps simultaneously**. This allows something closer to breadth-first search over the reasoning space, rather than a single committed reasoning path. The model is effectively exploring many possible directions inside each forward pass before converging.\n\n### 4. No Parameter Explosion\n\nA looped model with k layers run L times achieves the quality of a kL-layer non-looped model, with only k layers worth of parameters. For Mythos-scale deployments, this matters enormously:\n\n- Memory footprint does not grow with reasoning depth\n- Inference-time compute scales with loop count, not model size\n- This makes deeper reasoning \"free\" in terms of parameters\n\n---\n\n## The Stability Problem (and How It Was Likely Solved)\n\nTraining looped models is notoriously unstable. Two failure modes dominate:\n\n- **Residual explosion** — the hidden state `h_t` grows unboundedly across loops\n- **Loss spikes** — training diverges suddenly due to large spectral norms in injection parameters\n\n### The Dynamical Systems View\n\nRecast looping as a discrete linear time-invariant (LTI) dynamical system over the residual stream. Ignoring the nonlinear Transformer contribution, the recurrence becomes:\n\n```\nh_{t+1} = A·h_t + B·e\n```\n\nFor this LTI system, stability is governed entirely by the **spectral radius** of A:\n- `ρ(A) < 1` → stable, convergent\n- `ρ(A) ≥ 1` → unstable, divergent\n\nEmpirically, every divergent training run learns `ρ(A) ≥ 1`. Every convergent run maintains `ρ(A) < 1`.\n\n### The Fix\n\nConstrain the injection parameters so that stability is guaranteed **by construction**:\n\n1. Parameterize A as a continuous negative diagonal matrix\n2. Discretize using ZOH/Euler schemes: `A_discrete = exp(Δt · A_continuous)`\n3. Enforce negativity via `A := Diag(-exp(log_A))` with a learned scalar `Δt`\n4. This ensures `ρ(A) < 1` always holds, regardless of learning rate or batch noise\n\nThe result: the looped model becomes significantly more robust to hyperparameter selection and trains cleanly even at high learning rates. This is the Parcae architecture (Prairie et al., 2026), and it represents the most likely class of solution Anthropic used to make Mythos trainable.\n\n---\n\n## Scaling Laws for Looped Models\n\nParcae establishes the first predictable scaling laws for looped training:\n\n- **Training**: For a fixed FLOP budget with fixed parameters, increasing mean recurrence and reducing token count yields a lower loss than training with minimal loops on more data. Optimal recurrence and optimal token count both follow **power laws** with consistent exponents across scales.\n- **Inference**: More test-time loops improves quality following a **predictable, saturating exponential decay** — gains are real but diminishing. This mirrors the inference-time scaling of chain-of-thought.\n\nAt 770M parameters, a looped model achieves the downstream quality of a 1.3B fixed-depth Transformer trained on the same data — roughly **half the parameters for the same quality**.\n\nApplied to Mythos: if trained under these scaling laws, Mythos could be dramatically more parameter-efficient than it appears, with a large fraction of its apparent \"capability\" coming from loop depth rather than raw parameter count.\n\n---\n\n## The Loop Index Embedding Hypothesis\n\nA key open question is whether the looped block behaves **identically** on every iteration, or whether it can learn to do different things at different loop depths.\n\nWithout any positional signal across loops, the same weights must handle both early-stage pattern matching and late-stage refinement — a tight constraint. A **RoPE-like embedding of the loop index** injected alongside the input at each step would allow the same parameters to implement functionally distinct operations across iterations, much like how RoPE allows the same attention heads to behave differently at different sequence positions.\n\nIf Mythos uses this technique, each loop is not a repetition — it is a distinct computational phase, all sharing weights but operating in different representational regimes. This would substantially increase the expressiveness of the recurrent block without increasing parameter count.\n\n---\n\n## The Overthinking Problem\n\nMore loops is not always better. Beyond a certain depth, excessive recurrence **degrades predictions** — the hidden state drifts past the solution and into noise. This is the \"overthinking\" failure mode.\n\nThe original Universal Transformer (Dehghani et al., 2018) addressed this with an **Adaptive Computation Time (ACT)** halting mechanism: a learned scalar per position that dynamically decides when to stop looping. Positions that are harder to process receive more computation; simple tokens halt early.\n\nMythos almost certainly has some version of this. The model cannot naively run the maximum number of loops on every input — it needs a learned signal for when the answer has converged. The ACT mechanism also makes the model **Turing-complete** under certain assumptions, which has theoretical implications for the class of problems it can solve.\n\n---\n\n## Mixture of Experts — Suspected for Large Parameter Counts\n\nThe looped transformer explains the depth of Mythos's reasoning, but not the breadth. Handling wildly different domains — code, math, literature, science, law — with the same weights requires **Mixture of Experts (MoE)**. The suspected design replaces every FFN in the Recurrent Block with a fine-grained MoE layer: each FFN is split into many small experts (1/m the normal size), a router selects the top-mK of them per token via learned affinity scores, and a small number of **shared experts** are always activated regardless of routing to absorb common cross-domain knowledge — syntax, basic reasoning, general context — that would otherwise be redundantly learned by every routed expert. Routing collapse is prevented through a bias term on the router logits adjusted dynamically during training, keeping load balanced across experts without distorting the loss signal. \n\nAs the hidden state `h_t` evolves across loop iterations, the router may select different expert subsets at each depth, making every loop computationally distinct despite shared weights. MoE provides breadth; looping provides depth. If the activation ratio is ~5%, Mythos could hold hundreds of billions of total parameters while activating only a small fraction per token — the true parameter count, if ever disclosed, would be a storage number, not a compute number.\n\n---\n\n## The Memorization-Reasoning Tradeoff\n\nLooped models exhibit an interesting dichotomy: looping improves reasoning but can hurt memorization. The recurrent structure is optimized for iterative composition — running a reasoning chain forward — but does not inherently improve the storage of rote facts.\n\nThis maps to an observable characteristic of Mythos: it reasons exceptionally well about novel problems it has never seen, but its factual recall can be inconsistent. The architecture is structurally biased toward composition over memorization.\n\nLooping-based regularization (Saunshi et al., 2025) can be used to balance this tradeoff during training — applying stronger looping constraints for reasoning tasks while relaxing them for retrieval tasks.\n\n---\n\n## Parameter Reuse via LoRA Adaptation\n\nA complementary approach from Relaxed Recursive Transformers (Bae et al., 2024): rather than requiring fully identical weights at every loop, add a small **depth-wise LoRA module** at each iteration. This preserves the compactness of weight sharing while allowing each loop to adapt its behavior slightly.\n\nThe result:\n- Each loop shares a large common weight matrix (the recursive base)\n- A small rank-r adaptation matrix shifts behavior per iteration depth\n- The total parameter overhead is minimal\n\nThis bridges the gap between pure weight-tying (maximally parameter-efficient, less expressive) and fully distinct layers (maximally expressive, no parameter savings). Mythos likely sits somewhere on this spectrum.\n\n---\n\n## Continuous Depth-wise Batching\n\nA downstream consequence of the recursive architecture: **Continuous Depth-wise Batching**. Because all tokens share the same recurrent block, the model can exit the loop at different depths for different tokens or sequences — processing easy inputs quickly and hard inputs with more iterations, all within the same batch.\n\nTheoretical analysis suggests 2-3x improvements in inference throughput. For a deployed model like Mythos serving many users simultaneously, this would be a substantial efficiency gain.\n\n---\n\n## Summary: What Mythos Probably Is\n\n| Property | Description |\n|---|---|\n| Architecture | Recurrent-Depth Transformer (Prelude + Looped Recurrent Block + Coda) |\n| FFN layer | Suspected MoE — fine-grained experts + always-on shared experts |\n| Parameter count | Very large total; small fraction activated per token (~5% estimate) |\n| Reasoning mechanism | Implicit multi-hop via iterative latent updates — no token output between steps |\n| Inference-time scaling | More loops = deeper reasoning, following predictable exponential decay |\n| Training stability | LTI-constrained injection parameters with spectral radius < 1 |\n| Loop differentiation | Likely uses loop-index positional embedding (à la RoPE) per iteration |\n| Halting | Adaptive Computation Time or learned convergence criterion |\n| Scaling law | Optimal training scales looping and data together, not parameters alone |\n| Reasoning vs. memory | Structurally biased toward composition; memorization requires separate treatment |\n| Deployment | Continuous Depth-wise Batching enables variable compute per request |\n\n---\n\n## References\n\n### Twitter / X\n\n- Why Claude Mythos is so good — looped transformer theory (Sigrid Jin): https://x.com/realsigridjin/status/2044620031410266276\n- LT implicit reasoning over parametric knowledge unlocks generalization (Yuekun Yao): https://x.com/yuekun_yao/status/2044229171627639004\n- Looped transformer cyclic trajectories and input injection (rosinality): https://x.com/rosinality/status/2043953033428541853\n- Parcae scaling laws for stable looped language models — thread (Hayden Prairie): https://x.com/hayden_prairie/status/2044453231913537927\n- RoPE-like loop index embedding idea to differentiate functions across iterations (davidad): https://x.com/davidad/status/2044453231913537927\n- On the Looped Transformers Controversy by ChrisHayduk: https://x.com/ChrisHayduk/status/2045947623572688943\n- On the Looped Transformers Controversy Summary by @realsigridjin https://x.com/realsigridjin/status/2046012743778766875\n\n\n### Papers\n\n- Fine-grained expert segmentation and shared expert isolation in MoE: https://arxiv.org/abs/2401.06066\n- Loop, Think, & Generalize — Implicit Reasoning in Recurrent Depth Transformers: https://arxiv.org/pdf/2604.07822\n- Parcae — Scaling Laws for Stable Looped Language Models: https://arxiv.org/abs/2604.12946\n- Parcae blog: https://sandyresearch.github.io/parcae/\n- Universal Transformers: https://arxiv.org/pdf/1807.03819\n- Reasoning with Latent Thoughts — On the Power of Looped Transformers: https://arxiv.org/abs/2502.17416\n- Training Large Language Models to Reason in a Continuous Latent Space: https://arxiv.org/abs/2412.06769\n- Relaxed Recursive Transformers — Effective Parameter Sharing with Layer-wise LoRA: https://arxiv.org/pdf/2410.20672\n- Mixture-of-Depths Attention: https://arxiv.org/abs/2603.15619\n\n---\n\n## Citation\n\nIf you use OpenMythos in your research or build on this work, please cite:\n\n```bibtex\n@software{gomez2026openmythos,\n  author    = {Kye Gomez},\n  title     = {OpenMythos: A Theoretical Reconstruction of the Claude Mythos Architecture},\n  year      = {2026},\n  url       = {https://github.com/kyegomez/OpenMythos},\n  note      = {Recurrent-Depth Transformer with MoE, MLA, LTI-stable injection, and ACT halting}\n}\n```\n\n---\n\n## License\n\nMIT License — Copyright (c) 2026 Kye Gomez. See [`LICENSE`](LICENSE) for the full text.\n","summary":"OpenMythos is an open‑source, community‑driven recreation of the Claude Mythos architecture, built around a Recurrent‑Depth Transformer (RDT) that loops a recurrent block up to a maximum number of iterations. The model supports both MLA and GQA attention modes, and its feed‑forward stage uses a sparse mixture‑of‑experts, allowing researchers to explore compute‑adaptive, depth‑variable reasoning. It ships with a range of pre‑configured scales—from 1 B to 1 T parameters—and can be easily installed via pip and integrated into PyTorch workflows. Developers and machine‑learning researchers who want to experiment with advanced transformer designs, MoE routing, and dynamic inference depth will find OpenMythos a flexible and extensible toolkit.","description":"A theoretical reconstruction of the Claude Mythos architecture, built from first principles using the available research literature.","stars":2998,"language":"Python"},{"owner":"ZenNotes","repo":"zennotes","url":"https://github.com/ZenNotes/zennotes","readme":"# ZenNotes\n\n<p align=\"center\">\n  <img src=\"build/icon.png\" alt=\"ZenNotes app icon\" width=\"160\">\n</p>\n\nZenNotes is a keyboard-first desktop notes app built on Electron,\nReact, TypeScript, and CodeMirror 6. It keeps notes as ordinary local\nMarkdown files, adds a Vim-friendly editing and navigation model, and\nships a first-party MCP server so tools like Claude Code, Claude\nDesktop, and Codex can work directly against the same vault.\n\nThe goal is not \"another markdown renderer.\" The goal is a local-first\nnotes environment that still feels fast and intentional when you live in\nit all day.\n\nDownload the latest build from [GitHub Releases](https://github.com/ZenNotes/zennotes/releases/latest).\n\n## What ZenNotes is for\n\n- writing and organizing plain-file Markdown notes without a database\n- moving quickly with keyboard-first navigation and Vim motions\n- working across edit, split, and preview modes without losing context\n- keeping task management, tags, search, archive, and trash inside the\n  same vault\n- rendering math and diagrams directly from Markdown\n- letting MCP-capable coding / note-taking tools read and write the\n  vault safely through a bundled server\n\n## Core product ideas\n\n### Plain files first\n\nEvery note lives on disk as a normal `.md` file inside a chosen vault.\nZenNotes does not invent a hidden store for note content. The app adds\nviews, metadata extraction, search, and rendering on top of the files\nyou already own.\n\n### Keyboard-first by default\n\nThe app assumes you want fast navigation, not pointer-heavy chrome.\nThere is first-class Vim mode, leader-key flows, remappable shortcuts,\nbuffer switching, pane motion, command palette access, local ex prompts,\nand which-key style hint overlays.\n\n### Preview is part of the workflow\n\nZenNotes supports:\n\n- edit mode\n- preview mode\n- split mode\n- pinned reference panes\n- detached note windows\n\nThat makes it useful both as a writing tool and as a reading /\nresearching tool.\n\n### AI tooling should work with the real vault\n\nZenNotes includes a standalone MCP server entry and a settings UI that\ncan install the server into supported clients. The intent is simple:\nyour assistant should operate on the same notes you do, using normal\nMarkdown files and safe vault operations.\n\n## Feature overview\n\n### Notes, folders, and lifecycle\n\nEach vault is organized into four top-level folders:\n\n- `inbox/` for active work\n- `quick/` for fast capture\n- `archive/` for cold storage\n- `trash/` for recoverable deletion\n\nZenNotes can create, rename, duplicate, move, archive, unarchive, trash,\nrestore, and reveal notes and folders. The app also watches the vault on\ndisk, so external edits are reflected back into the UI.\n\nAttachments are stored under a vault-local attachments directory\n(`attachements/` in the current implementation, with legacy `_assets/`\nsupport still recognized).\n\n### Editor and preview\n\nThe editor stack is CodeMirror 6 with a Markdown-oriented workflow:\n\n- live preview behavior in the editor\n- heading folding\n- outline extraction and jumps\n- word wrap controls\n- configurable line numbers\n- syntax highlighting for fenced code blocks\n- local asset embedding\n- inline PDF support\n\nPreview mode renders:\n\n- GitHub-flavored Markdown\n- KaTeX math\n- Mermaid\n- TikZ\n- JSXGraph\n- function-plot\n- callouts\n- footnotes\n- wiki links and backlinks\n\nExpanded diagram viewing is built in for diagram-heavy notes.\n\n### Search, tags, tasks, and built-in views\n\nZenNotes includes:\n\n- note search by title / path\n- vault-wide text search\n- tags view\n- tasks view\n- archive view\n- trash view\n- quick notes view\n- built-in help view\n\nVault text search can use the built-in engine, `ripgrep`, or `fzf`,\nwith auto-detection and optional custom binary paths exposed in\nSettings.\n\nTask parsing is markdown-native: checkboxes stay as normal `- [ ]` /\n`- [x]` lines in the note body and are surfaced into the global Tasks\nview.\n\n### Themes, fonts, and app customization\n\nThe app exposes a substantial settings surface:\n\n- multiple theme families and light / dark / auto modes\n- independent interface, text, and monospace font selection\n- editor font size and line-height controls\n- preview and editor width controls\n- dark-sidebar option\n- content alignment\n- keymap overrides\n- Vim toggles and leader hint behavior\n- search backend selection\n\n### MCP integration\n\nZenNotes ships a dedicated MCP server and installation flows for:\n\n- Claude Code\n- Claude Desktop\n- Codex CLI\n\nThe app can:\n\n- detect whether the ZenNotes MCP entry is installed\n- install or uninstall it for each supported client\n- show the exact runtime used to launch the server\n- edit the server's default note-shaping instructions from Settings\n\nThe MCP server exposes vault operations like reading notes, creating\nnotes, moving notes, appending to notes, searching text, listing notes,\nlisting assets, toggling tasks, and related filesystem-safe actions.\n\n## Download\n\nThe fastest way to get the app is the latest GitHub release:\n\n- [Latest release](https://github.com/ZenNotes/zennotes/releases/latest)\n\nRelease assets are built per platform in GitHub Actions and uploaded to\nthe matching release automatically:\n\n- macOS: `.dmg` and `.zip`\n- Windows: installer `.exe` and `.zip`\n- Linux: `.AppImage` and `.deb`\n\nIf the repository is private, GitHub access to the release assets follows\nthe repository's normal permissions.\n\n## Vault model\n\nZenNotes expects a chosen vault root and will ensure the basic folder\nlayout exists on first open. The app also seeds a welcome note the first\ntime a vault is initialized.\n\nHigh-level behavior:\n\n- only `inbox`, `quick`, and `archive` are treated as searchable note\n  folders\n- `trash` is recoverable deletion, not part of normal search\n- tags and wiki links are extracted from note bodies\n- attachment presence is inferred from local links in Markdown\n- vault changes are watched and pushed into the renderer over IPC\n\n## Development\n\n### Requirements\n\n- Node.js 22+ recommended\n- npm\n- macOS, Windows, or Linux for Electron development\n\n### Install\n\n```bash\nnpm install\n```\n\n### Run the app in development\n\n```bash\nnpm run dev\n```\n\nThis starts the Electron main process, preload bundle, and renderer via\n`electron-vite`.\n\n### Typecheck\n\n```bash\nnpm run typecheck\n```\n\n### Build\n\n```bash\nnpm run build\n```\n\nThis produces:\n\n- `out/main` for the Electron main process\n- `out/preload` for the preload bridge\n- `out/renderer` for the renderer bundle\n\nThe standalone MCP server is built as `out/main/mcp.js`.\n\n## Packaging\n\nAvailable package scripts:\n\n| Script | Purpose |\n| --- | --- |\n| `npm run dev` | Run the app in development mode |\n| `npm run build` | Build all Electron bundles |\n| `npm run start` | Preview the built app |\n| `npm run test:run` | Run the automated test suite |\n| `npm run typecheck` | Run node + web TypeScript checks |\n| `npm run pack` | Build and create unpacked app output |\n| `npm run dist:mac` | Build macOS distributables |\n| `npm run dist:win` | Build Windows distributables |\n| `npm run dist:linux` | Build Linux distributables |\n\nIcon packaging notes live in [build/README.md](build/README.md).\n\n### Signed macOS releases\n\nPublic macOS releases are wired for hardened runtime signing and\nnotarization. The release workflow expects these GitHub Actions secrets:\n\n- `MACOS_CERTIFICATE_P12`\n- `MACOS_CERTIFICATE_PASSWORD`\n- `APPLE_ID`\n- `APPLE_APP_SPECIFIC_PASSWORD`\n- `APPLE_TEAM_ID`\n\nOptional Windows signing can be supplied with:\n\n- `WINDOWS_CERTIFICATE_P12`\n- `WINDOWS_CERTIFICATE_PASSWORD`\n\nTagged releases fail the macOS release job if the required Apple signing\nor notarization secrets are missing, which prevents accidentally shipping\nan unsigned public mac build.\n\n## Repository layout\n\n```text\nsrc/\n  main/       Electron main process, vault I/O, watchers, TikZ, MCP install management\n  preload/    Context bridge / IPC surface exposed to the renderer\n  renderer/   React app, editor UI, preview UI, settings, panes, styles\n  mcp/        Standalone MCP server entry, tool definitions, default instructions\n  shared/     Shared IPC contracts and cross-process types\nbuild/        Packaging resources (icons, installer assets)\nout/          Built output generated by electron-vite\n```\n\n## Architecture notes\n\n### Main process\n\n`src/main/` is responsible for:\n\n- window lifecycle\n- persisted app config\n- vault selection and layout bootstrapping\n- filesystem operations for notes, folders, archive, trash, and assets\n- vault watching\n- task scanning\n- vault-wide text search\n- TikZ rendering\n- MCP client install / uninstall flows\n\n### Preload\n\n`src/preload/index.ts` exposes the app's typed bridge through\n`window.zen`, including vault operations, search, task scanning, window\ncontrols, TikZ rendering, clipboard helpers, and MCP settings actions.\n\n### Renderer\n\n`src/renderer/` holds the desktop UI:\n\n- sidebar, note list, editor, preview, floating note windows\n- command palette, help view, tags/tasks/archive/trash views\n- pane layout and tab state\n- settings UI\n- theme system\n- diagram rendering for Mermaid, TikZ, JSXGraph, and function-plot\n\nState is managed with Zustand.\n\n### MCP server\n\n`src/mcp/index.ts` is a standalone stdio server built on\n`@modelcontextprotocol/sdk`. It exposes vault operations to compatible\nclients and ships opinionated note-writing instructions tailored to\nZenNotes' markdown features and vault model.\n\nThose instructions can be overridden by the user and are persisted as a\nplain Markdown file under the app's user-data directory.\n\n## Why the MCP story matters here\n\nZenNotes is intentionally opinionated about how assistants should write\nnotes:\n\n- use the vault as shared storage, not as a scratchpad\n- prefer surgical edits over blind overwrites\n- lean on KaTeX and diagram fences instead of ASCII approximations\n- connect notes through wiki links\n- preserve user-owned content and frontmatter\n\nThat behavior is encoded in the bundled MCP instructions and surfaced in\nSettings so users can tune it without forking the app.\n\n## Current status\n\nZenNotes is still an actively changing codebase. The app already has a\nmeaningful feature surface, but the product and interaction model are\nstill being refined quickly.\n\nIf you are contributing, expect UI polish, keyboard flows, diagram\nrendering, and MCP ergonomics to keep evolving.\n\n## License\n\nMIT\n","summary":"ZenNotes is a desktop Markdown notes application built on Electron, React, TypeScript, and CodeMirror 6 that treats every note as a plain local file and provides a keyboard‑first editing experience with Vim‑style motions. It offers a rich workflow that blends edit, preview, split, and pinned panels while supporting math, diagrams, and inline PDFs, and includes a built‑in MCP server so AI tools can operate on the same vault. Users can organize notes into inbox, quick, archive, and trash folders, perform vault‑wide search, tagging, task management, and view backlinks and outlines, all without a hidden database. The app is ideal for writers, researchers, and developers who prefer a fast, local, keyboard‑driven note‑taking environment that stays tightly coupled to the files they already own.","description":"Keyboard-first local Markdown notes with Vim motions, diagrams, and MCP integration.","stars":145,"language":"TypeScript"},{"owner":"NikolayS","repo":"pgque","url":"https://github.com/NikolayS/pgque","readme":"<h1 align=\"center\">PgQue – PgQ, universal edition</h1>\n\n<p align=\"center\"><strong>Zero-bloat Postgres queue. One SQL file to install, <code>pg_cron</code> to tick.</strong></p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/NikolayS/pgque/actions/workflows/ci.yml\"><img src=\"https://github.com/NikolayS/pgque/actions/workflows/ci.yml/badge.svg\" alt=\"CI\"></a>\n  <a href=\"https://www.postgresql.org/\"><img src=\"https://img.shields.io/badge/PostgreSQL-14--18-336791?logo=postgresql&logoColor=white\" alt=\"PostgreSQL 14-18\"></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/badge/License-Apache_2.0-blue.svg\" alt=\"License\"></a>\n  <a href=\"https://github.com/citusdata/pg_cron\"><img src=\"https://img.shields.io/badge/pg__cron-optional-336791\" alt=\"pg_cron\"></a>\n  <a href=\"https://github.com/NikolayS/pgque\"><img src=\"https://img.shields.io/badge/anti--extension-%5Ci_and_go-orange\" alt=\"Anti-Extension\"></a>\n  <a href=\"https://news.ycombinator.com/item?id=47817349\"><img src=\"https://img.shields.io/badge/Hacker%20News-discussion-ff6600?logo=ycombinator&logoColor=white\" alt=\"Discussion on Hacker News\"></a>\n</p>\n\n<p align=\"center\"><img src=\"docs/images/death_spiral.gif\" alt=\"Death spiral of a SKIP LOCKED queue under sustained load — the failure mode PgQue avoids by construction\" width=\"720\"></p>\n\nDiscussion on [Hacker News](https://news.ycombinator.com/item?id=47817349).\n\n*For teams who want a durable event stream inside Postgres. The model is closer to Kafka (log) than to ActiveMQ or RabbitMQ (task message queue). Shared event log, independent per-consumer cursors, zero bloat under sustained load. Pure SQL and PL/pgSQL, any Postgres 14+ — managed or self-hosted, no sidecar daemon. The rest of this README walks the history, comparison, and install paths that back up the claim.*\n\n## Contents\n\n- [Why PgQue](#why-pgque)\n- [Latency trade-off](#latency-trade-off)\n- [Comparison](#comparison)\n- [Installation](#installation)\n- [Roles and grants](#roles-and-grants)\n- [Project status](#project-status)\n- [Docs](#docs)\n- [Quick start](#quick-start)\n- [Client libraries](#client-libraries)\n- [Benchmarks](#benchmarks)\n- [Architecture](#architecture)\n- [Contributing](#contributing)\n- [License](#license)\n\nPgQue brings back [PgQ](https://github.com/pgq/pgq) — one of the longest-running Postgres queue architectures in production — in a form that runs on any Postgres platform, managed providers included.\n\nPgQ was designed at Skype to run messaging for hundreds of millions of users, and it ran on large self-managed Postgres deployments for over a decade. Standard PgQ depends on a C extension (`pgq`) and an external daemon (`pgqd`), neither of which run on most managed Postgres providers.\n\nPgQue rebuilds that battle-tested engine in pure PL/pgSQL, so the zero-bloat queue pattern works anywhere you can run SQL — without adding another distributed system to your stack.\n\n**The anti-extension.** Pure SQL + PL/pgSQL on any Postgres 14+ — including RDS, Aurora, Cloud SQL, AlloyDB, Supabase, Neon, and most other managed providers. No C extension, no `shared_preload_libraries`, no provider approval, no restart.\n\nHistorical context, two decks:\n\n- [Marko Kreen (Skype), PGCon 2009 — PgQ](https://www.pgcon.org/2009/schedule/attachments/91_pgq.pdf)\n- [Alexander Kukushkin (Microsoft), 2026 — Rediscovering PgQ](https://speakerdeck.com/cyberdemn/rediscovering-pgq)\n\n## Why PgQue\n\nMost Postgres queues rely on `SKIP LOCKED` plus `DELETE` and/or `UPDATE`. That holds up in toy examples and then turns into dead tuples, VACUUM pressure, index bloat, and performance drift under sustained load.\n\nPgQue avoids that whole class of problems. It uses **snapshot-based batching** and **TRUNCATE-based table rotation** instead of per-row deletion. The hot path stays predictable:\n\n- **Zero bloat by design** — no dead tuples in the main queue path\n- **No performance decay** — it does not get slower because it has been running for months\n- **Built for heavy-loaded systems** — the sustained-load regime the original PgQ architecture was designed for\n- **Real Postgres guarantees** — ACID transactions, transactional enqueue/consume, WAL, backups, replication, SQL visibility\n- **Works on managed Postgres** — no custom build, no C extension, no separate daemon\n\nPgQue gives you queue semantics **inside** Postgres, with Postgres durability and transactional behavior, without the bloat tax most in-database queues eventually hit.\n\n## Latency trade-off\n\nPgQue is built around **snapshot-based batching**, not row-by-row claiming. That's what gives it zero bloat in the hot path, stable behavior under sustained load, and clean ACID semantics inside Postgres.\n\nThe trade-off is **end-to-end delivery latency** — the gap between `send` and when a consumer can `receive` the event. In the default configuration, end-to-end delivery typically lands within ~1–2 seconds: up to 1 s for the next tick, plus the consumer's poll interval. Per-call latency (the `send` / `receive` / `ack` functions themselves) stays in the microsecond range.\n\nWays to reduce delivery latency: tune tick frequency and queue thresholds; use `force_tick()` for tests and demos or to force an immediate batch. Future versions may add logical-decoding-based wake-ups for sub-second delivery without cutting the tick interval.\n\nIf your top priority is single-digit-millisecond dispatch, PgQue is the wrong tool. If your priority is **stability under load without bloat**, that is where PgQue fits.\n\n## Comparison\n\n| Feature | PgQue | PgQ | PGMQ | River | Que | pg-boss |\n|---|---|---|---|---|---|---|\n| Snapshot-based batching (no row locks) | ✅ | ✅ | ❌ | ❌ | ❌ | ❌ |\n| Zero bloat under sustained load | ✅ | ✅ | ❌ | ❌ | ❌ | ❌ |\n| No external daemon or worker binary | ✅ | ❌ | ✅ | ❌ | ❌ | ❌ |\n| Pure SQL install, managed Postgres ready | ✅ | ❌ | ✅ | ✅ | ✅ | ✅ |\n| Language-agnostic SQL API | ✅ | ✅ | ✅ | ❌ | ❌ | ❌ |\n| Multiple independent consumers (fan-out) | ✅ | ✅ | ❌ | ❌ | ❌ | ✅ |\n| Built-in retry with backoff | ✅ | ✅ | ⚠️ | ✅ | ✅ | ✅ |\n| Built-in dead letter queue | ✅ | ❌ | ⚠️ | ⚠️ | ❌ | ✅ |\n\n**Legend:** ✅ yes · ❌ no · ⚠️ partial / indirect\n\n**Notes:**\n\n- **[PgQ](https://github.com/pgq/pgq)** is the Skype-era queue engine (~2007) PgQue is derived from. Same snapshot/rotation architecture, but requires C extensions and an external daemon (`pgqd`) — unavailable on managed Postgres. PgQue removes both constraints.\n- **No external daemon:** PgQue uses pg_cron (or your own scheduler) for ticking; PGMQ uses visibility timeouts. River, Que, and pg-boss require a Go / Ruby / Node.js worker binary.\n- **[Que](https://github.com/que-rb/que)** uses advisory locks (not SKIP LOCKED) — no dead tuples from *claiming*, but completed jobs are still DELETEd. Brandur's [bloat post](https://brandur.org/postgres-queues) was about Que at Heroku. Ruby-only.\n- **PGMQ retry** is visibility-timeout re-delivery (`read_ct` tracking) — no configurable backoff or max attempts.\n- **pg-boss fan-out** is copy-per-queue `publish()`/`subscribe()`, not a shared event log with independent cursors.\n- **Category:** River, Que, and pg-boss (and Oban, graphile-worker, solid_queue, good_job) are **job queue frameworks**. PgQue is an **event/message queue** optimized for high-throughput streaming with fan-out.\n\n### What differentiates PgQue\n\n**1. Zero event-table bloat, by design.** SKIP LOCKED queues (PGMQ, River, pg-boss, Oban, graphile-worker) UPDATE + DELETE rows, creating dead tuples that require VACUUM. Under sustained load this causes documented failures:\n\n- [Brandur/Heroku (2015)](https://brandur.org/postgres-queues) — 60k backlog in one hour.\n- [PlanetScale (2026)](https://planetscale.com/blog/keeping-a-postgres-queue-healthy) — death spiral at 800 jobs/sec with OLAP on the side.\n- [River issue #59](https://github.com/riverqueue/river/issues/59) — autovacuum starvation.\n\nOban Pro shipped table partitioning to mitigate it; PGMQ ships aggressive autovacuum settings. PgQue's TRUNCATE rotation creates zero dead tuples by construction. No tuning. Immune to xmin horizon pinning.\n\n**2. Native fan-out.** Each registered consumer maintains its own cursor on a shared event log and independently receives all events. That is different from competing-consumers (SKIP LOCKED) where each job goes to one worker. pg-boss has fan-out but it is copy-per-queue (one INSERT per subscriber per event). PgQue's model is a position on a shared log — no data duplication, atomic batch boundaries, late subscribers catch up. Closer to Kafka topics than to a job queue.\n\n### When to use PgQue vs. a job queue\n\n- **Choose PgQue** when you want event-driven fan-out, no bloat to tune around, and a language-agnostic SQL API, and you do not need per-job priorities or a worker framework.\n- **Choose a job queue** when you need per-job lifecycle, sub-3ms latency, priority queues, cron scheduling, unique jobs, or deep ecosystem integration (Elixir/Go/Node.js/Ruby).\n\n## Installation\n\n**Requirements:** Postgres 14+, and something that calls `pgque.ticker()` periodically (every 1 second by default). `pg_cron` is the recommended default — pre-installed or one-command available on all major managed Postgres providers (RDS, Aurora, Cloud SQL, AlloyDB, Supabase, Neon); on self-managed Postgres, follow the [pg_cron setup guide](https://github.com/citusdata/pg_cron#setting-up-pg_cron). Any external scheduler (system `cron`, systemd, a worker loop in your app) works as an alternative — see below.\n\nInside a psql session:\n\n```sql\nbegin;\n\\i sql/pgque.sql\ncommit;\n```\n\nOr from the shell, same single-transaction guarantee via `psql --single-transaction`:\n\n```bash\nPAGER=cat psql --no-psqlrc --single-transaction -d mydb -f sql/pgque.sql\n```\n\nWith `pg_cron` available in the same database as PgQue, `pgque.start()` creates the default ticker and maintenance jobs:\n\n```sql\nselect pgque.start();\n```\n\n**pg_cron in a different database.** `pg_cron` runs jobs in one designated database (`cron.database_name`, typically `postgres`). If your PgQue schema lives in a different database, use the [cross-database pattern](https://github.com/citusdata/pg_cron#creating-a-cron-job-in-a-different-database) to call `pgque.ticker()` and `pgque.maint()` across databases. *Todo: a future release will detect this and emit the correct `cron.schedule_in_database` calls from `pgque.start()` automatically.*\n\n**pg_cron log hygiene.** The ticker runs every second, adding ~3,600 rows per hour to `cron.job_run_details` with no built-in purge. Set `alter system set cron.log_run = off;` globally, or schedule a periodic purge — see [the tutorial](docs/tutorial.md#production-cadence-use-pg_cron) for both recipes.\n\nWithout `pg_cron`, PgQue still installs. Drive ticking and maintenance from your application or an external scheduler:\n\n```bash\nPAGER=cat psql --no-psqlrc -c \"select pgque.ticker()\"   # every 1 second\nPAGER=cat psql --no-psqlrc -c \"select pgque.maint()\"    # every 30 seconds\n```\n\n**Important:** PgQue does not deliver messages without a working ticker. Enqueueing still works, but consumers will see nothing new because no ticks are created. If you do not use `pg_cron`, run `pgque.ticker()` and `pgque.maint()` yourself.\n\nTreat installation as one-way for now — upgrade and reinstall paths are still being tightened. To uninstall: `\\i sql/pgque_uninstall.sql`.\n\n## Roles and grants\n\nThe install creates three roles. Application users do not need superuser — grant them whichever role matches their access pattern.\n\n| Role | Purpose | Granted access |\n|---|---|---|\n| `pgque_reader` | Dashboards, metrics, debugging | `get_queue_info`, `get_consumer_info`, `get_batch_info`, `version`, plus `select` on all tables |\n| `pgque_writer` | Producers and consumers (most apps) | inherits `pgque_reader` + the modern API (`send`, `send_batch`, `subscribe`, `unsubscribe`, `receive`, `ack`, `nack`) and the underlying PgQ primitives (`insert_event`, `next_batch`, `get_batch_events`, `finish_batch`, `event_retry`, `register_consumer`, `unregister_consumer`) |\n| `pgque_admin`  | Operators, migrations | inherits `pgque_writer` + full schema/table/sequence access. `uninstall()` is revoked from both `pgque_admin` and PUBLIC (superuser-only — it drops the schema). |\n\nTypical app setup:\n\n```sql\n\\i sql/pgque.sql\nselect pgque.start();                     -- optional pg_cron ticker + maint\n\ncreate user app_orders with password '...';          -- replace with a real password\ngrant pgque_writer to app_orders;\n\ncreate user metrics with password '...';              -- replace with a real password\ngrant pgque_reader to metrics;\n```\n\nDDL-class operations (`create_queue`, `drop_queue`, `start`, `stop`, `maint`, `ticker`, `force_tick`) are not granted to `pgque_writer` and should be performed by an admin / migration role. They currently default to PUBLIC; revoking from PUBLIC and granting only to `pgque_admin` is on the roadmap.\n\n## Project status\n\nPgQue is **early-stage** as a product and API layer. PgQ itself has run at Skype scale for over a decade. What's new here is the packaging, modernization, managed-Postgres compatibility, and the higher-level PgQue API around that core.\n\nThe default install stays small in v0.1; additional APIs live under `sql/experimental/` until they are worth promoting. See [blueprints/PHASES.md](blueprints/PHASES.md).\n\n## Docs\n\n- [Tutorial](docs/tutorial.md) — a hands-on walkthrough. Start here if you are new.\n- [Reference](docs/reference.md) — every shipped function and role.\n- [Examples](docs/examples.md) — patterns: fan-out, exactly-once, batch loading, recurring jobs.\n- [Benchmarks](docs/benchmarks.md) — throughput measurements and methodology.\n- [PgQ concepts](docs/pgq-concepts.md) — glossary (batch, tick, rotation) for contributors.\n- [PgQ history](docs/pgq-history.md) — where this engine came from.\n\n## Quick start\n\n```sql\n-- tx 1: create queue + consumer\nselect pgque.create_queue('orders');\nselect pgque.subscribe('orders', 'processor');\n\n-- tx 2: send a message\nselect pgque.send('orders', '{\"order_id\": 42, \"total\": 99.95}'::jsonb);\n\n-- tx 3: advance the queue if you are not using pg_cron\n-- (force_tick bypasses lag/count thresholds — handy in demos/tests)\nselect pgque.force_tick('orders');\nselect pgque.ticker();\n\n-- tx 4: receive (batch_id is the same for every returned row)\nselect * from pgque.receive('orders', 'processor', 100);\n\n-- tx 5: acknowledge\nselect pgque.ack(:batch_id);\n```\n\nSend, tick, and receive should be separate transactions — that's PgQ's snapshot-based design working as intended. In normal operation, `pg_cron` or an external scheduler drives `pgque.ticker()`; `force_tick()` is mainly for demos, tests, and manual operation.\n\nLonger walkthrough in the [tutorial](docs/tutorial.md); patterns like fan-out, exactly-once, and recurring jobs in [examples](docs/examples.md).\n\n## Client libraries\n\nPgQue is SQL-first, so any Postgres driver works. Example client libraries exist for **Python**, **Go**, and **TypeScript** — unpublished, still evolving, demonstrating integration patterns rather than stable SDKs. **Contributions welcome.**\n\n### Python (`pgque-py`) — psycopg 3\n\n```python\nfrom pgque import PgqueClient, Consumer\n\nclient = PgqueClient(conn)\nclient.send(\"orders\", {\"order_id\": 42})\n\nconsumer = Consumer(dsn, queue=\"orders\", name=\"processor\", poll_interval=30)\n\n@consumer.on(\"order.created\")\ndef handle_order(msg):\n    process_order(msg.payload)\n\nconsumer.start()\n```\n\n### Go (`pgque-go`) — pgx/v5\n\n```go\nclient, _ := pgque.Connect(ctx, \"postgresql://localhost/mydb\")\n\nconsumer := client.NewConsumer(\"orders\", \"processor\")\nconsumer.Handle(\"order.created\", func(ctx context.Context, msg pgque.Message) error {\n    return processOrder(msg)\n})\nconsumer.Start(ctx)\n```\n\n### TypeScript (`pgque-ts`) — node-postgres\n\n```ts\nconst client = new PgqueClient('postgresql://localhost/mydb');\nawait client.connect();\n\nawait client.send('orders', { order_id: 42 }, 'order.created');\nawait client.subscribe('orders', 'processor');\n\nconst messages = await client.receive('orders', 'processor', 100);\nif (messages.length > 0) await client.ack(messages[0].batch_id);\n```\n\n### Any language\n\n```sql\nselect pgque.send('orders', '{\"order_id\": 42}'::jsonb);\nselect * from pgque.receive('orders', 'processor', 100);\nselect pgque.ack(batch_id);\n```\n\n## Benchmarks\n\nPreliminary laptop numbers: ~86k ev/s PL/pgSQL insert, ~2.4M ev/s consumer\nread rate, zero dead-tuple growth under a 30-minute sustained test. See\n[docs/benchmarks.md](docs/benchmarks.md) for the full table and methodology.\nServer-class numbers to follow.\n\n## Architecture\n\nPgQue keeps PgQ's proven core architecture — snapshot-based batch isolation, three-table TRUNCATE rotation on the hot path, separate retry / delayed / dead-letter tables, and independent per-consumer cursors — and adds a modern API layer on top. See [blueprints/SPECx.md](blueprints/SPECx.md) for the full specification and [docs/pgq-concepts.md](docs/pgq-concepts.md) for the batch/tick/rotation glossary.\n\n## Contributing\n\nSee [blueprints/SPECx.md](blueprints/SPECx.md) for the specification and implementation plan. New code should follow red/green TDD: write the failing test first, then fix it.\n\n## License\n\nApache-2.0. See [LICENSE](LICENSE).\n\nPgQue includes code derived from [PgQ](https://github.com/pgq/pgq) (ISC license, Marko Kreen / Skype Technologies OU). See [NOTICE](NOTICE).\n","summary":"PgQue is a lightweight, pure‑SQL implementation of the long‑proven PgQ queue engine, designed to deliver a durable, Kafka‑style event stream entirely inside PostgreSQL. It eliminates the usual `SKIP LOCKED`/`DELETE` bloat by batching with snapshots and rotating tables via `TRUNCATE`, keeping the hot path compact and steady‑state performance predictable. With no C extension, daemon, or `shared_preload_libraries` required, a single SQL file will install PgQue on any PostgreSQL 14+ instance—including managed services like RDS, Cloud SQL, or Neon—making it ideal for teams that want a low‑overhead, all‑in‑database queue without adding a separate sidecar.","description":"PgQue – Zero-bloat Postgres queue. One SQL file to install, pg_cron to tick.","stars":721,"language":"PLpgSQL"},{"owner":"ZeroZ-lab","repo":"cc-design","url":"https://github.com/ZeroZ-lab/cc-design","readme":"# CC Design\n\n**[Demo](https://cc-design-demo.vercel.app)**\n\nA Claude Code skill for high-fidelity HTML design and prototype creation — slide decks, interactive prototypes, landing pages, UI mockups, animations, and visual design explorations.\n\nAdapted from the Claude Artifacts design environment to work natively in Claude Code, using Playwright MCP for verification and local scripts for export.\n\n## Screenshots\n\n**Demo Gallery**\n\n[![Demo Gallery](./screenshots/previews/cc-design-home-preview.png)](./screenshots/previews/cc-design-home-preview.png)\n\n<p align=\"center\">\n  <a href=\"./screenshots/previews/cc-design-enterprise-preview.png\"><img src=\"./screenshots/previews/cc-design-enterprise-preview.png\" alt=\"Enterprise Hero\" width=\"32%\"></a>\n  <a href=\"./screenshots/previews/cc-design-scifi-preview.png\"><img src=\"./screenshots/previews/cc-design-scifi-preview.png\" alt=\"Sci-Fi Website\" width=\"32%\"></a>\n  <a href=\"./screenshots/previews/cc-design-tesla-preview.png\"><img src=\"./screenshots/previews/cc-design-tesla-preview.png\" alt=\"Tesla 3D\" width=\"32%\"></a>\n</p>\n<p align=\"center\">\n  <a href=\"./screenshots/previews/cc-design-aether-preview.png\"><img src=\"./screenshots/previews/cc-design-aether-preview.png\" alt=\"AETHER\" width=\"32%\"></a>\n  <a href=\"./screenshots/previews/cc-design-glass-preview.png\"><img src=\"./screenshots/previews/cc-design-glass-preview.png\" alt=\"Glass Dashboard\" width=\"32%\"></a>\n  <a href=\"./screenshots/previews/cc-design-banking-preview.png\"><img src=\"./screenshots/previews/cc-design-banking-preview.png\" alt=\"Banking App\" width=\"32%\"></a>\n</p>\n<p align=\"center\">\n  <a href=\"./screenshots/previews/cc-design-spacex-preview.png\"><img src=\"./screenshots/previews/cc-design-spacex-preview.png\" alt=\"SpaceX\" width=\"32%\"></a>\n  <a href=\"./screenshots/previews/cc-design-mars-preview.png\"><img src=\"./screenshots/previews/cc-design-mars-preview.png\" alt=\"Mars Landing\" width=\"32%\"></a>\n  <a href=\"./screenshots/previews/cc-design-mechops-preview.png\"><img src=\"./screenshots/previews/cc-design-mechops-preview.png\" alt=\"Mech-Ops\" width=\"32%\"></a>\n</p>\n<p align=\"center\">\n  <a href=\"./screenshots/previews/cc-design-llm-sketch-preview.png\"><img src=\"./screenshots/previews/cc-design-llm-sketch-preview.png\" alt=\"LLM Sketch\" width=\"32%\"></a>\n  <a href=\"./screenshots/previews/cc-design-retro-preview.png\"><img src=\"./screenshots/previews/cc-design-retro-preview.png\" alt=\"Retro Pixel\" width=\"32%\"></a>\n  <a href=\"./screenshots/previews/cc-design-thermo-preview.png\"><img src=\"./screenshots/previews/cc-design-thermo-preview.png\" alt=\"Thermodynamics\" width=\"32%\"></a>\n</p>\n\n## Overview\n\nCC Design embeds a structured design workflow into Claude Code, enabling it to operate as an expert product designer across the full lifecycle: from clarifying requirements and acquiring design context, through building with real UI kits and design systems, to delivering polished HTML artifacts with screenshot-based verification.\n\nTwo core principles:\n\n- **Context-first design** — Never design from scratch when existing brand systems, component libraries, or product code is available. Actively acquire and reuse design vocabulary before creating new visual directions.\n- **Progressive disclosure** — The main skill definition stays concise while 12+ technical references are loaded on demand, keeping context window usage minimal.\n\n## Features\n\n| Category | Capabilities |\n|---|---|\n| **Output formats** | Interactive prototypes, slide decks, landing pages, UI mockups, animated motion studies, wireframes, design systems |\n| **Brand style cloning** | Progressive loading of 68+ brand design systems from [getdesign.md](https://getdesign.md) (Stripe, Vercel, Notion, Linear, Apple, etc.) |\n| **Design patterns** | Curated catalog of proven layout patterns with case studies from Stripe, Linear, Notion, and more |\n| **Design excellence** | Built-in quality framework with emotional tone targeting, hierarchy checks, and anti-slop rules |\n| **Variations** | Generates 3+ design directions across layout, interaction, visual intensity, and motion axes |\n| **Prototyping** | React + Babel inline JSX with pinned versions, component scope management, starter scaffolds |\n| **Tweaks system** | Self-contained in-page design controls with real-time preview and localStorage persistence |\n| **Verification** | Three-phase verification (structural, visual, design excellence) via Playwright MCP |\n| **Export** | PPTX, PDF, and self-contained inline HTML via local Node.js scripts |\n\n## Installation\n\nClone into your Claude Code skills directory:\n\n```bash\ngit clone https://github.com/ZeroZ-lab/cc-design.git ~/.claude/skills/cc-design\n```\n\nOr add as a submodule:\n\n```bash\ngit submodule add https://github.com/ZeroZ-lab/cc-design.git skills/cc-design\n```\n\n### Export scripts\n\n```bash\ncd ~/.claude/skills/cc-design/scripts && npm install && cd -\n```\n\nThis installs `pptxgenjs` and `playwright`. For Playwright-backed export:\n\n```bash\nnpx playwright install chromium\n```\n\n## Project Structure\n\n```\ncc-design/\n├── SKILL.md                              # Skill definition (YAML frontmatter + workflow)\n├── EXAMPLES.md                           # Usage examples and advanced workflows\n├── screenshots/                          # Demo screenshots for README\n├── agents/\n│   └── openai.yaml                       # Codex-compatible platform interface config\n├── references/\n│   ├── design-excellence.md              # Quality framework, emotional tones, anti-slop rules\n│   ├── design-patterns.md                # Proven layout patterns and component patterns\n│   ├── frontend-design.md                # General frontend design fundamentals\n│   ├── design-system-creation.md         # Creating design systems from scratch\n│   ├── getdesign-loader.md               # Brand style loading from getdesign.md\n│   ├── react-babel-setup.md              # React/Babel pinned versions and scope rules\n│   ├── starter-components.md             # Starter component catalog and usage\n│   ├── interactive-prototype.md          # Interactive prototype patterns\n│   ├── tweaks-system.md                  # In-page tweak controls\n│   ├── platform-tools.md                 # Playwright tool reference\n│   ├── verification-protocol.md          # Three-phase verification protocol\n│   ├── question-protocol.md              # Structured clarifying question templates\n│   └── case-studies/                     # Real-world design references\n│       ├── README.md                     # Case study index\n│       ├── product-pages/                # Stripe, Linear, Notion landing pages\n│       ├── presentations/                # Pitch deck, keynote-style layouts\n│       ├── mobile-apps/                  # iOS onboarding patterns\n│       └── creative-works/               # Creative design references\n├── templates/                            # Starter component files\n│   ├── deck_stage.js                     # Slide presentation stage\n│   ├── design_canvas.jsx                 # Side-by-side option grid\n│   ├── ios_frame.jsx                     # iPhone device frame\n│   ├── android_frame.jsx                 # Android device frame\n│   ├── macos_window.jsx                  # macOS window chrome\n│   ├── browser_window.jsx                # Browser window chrome\n│   └── animations.jsx                    # Timeline animation engine\n└── scripts/                              # Export utility scripts\n    ├── package.json\n    ├── gen_pptx.js                       # HTML → PPTX export\n    ├── super_inline_html.js              # HTML + assets → single file\n    ├── open_for_print.js                 # HTML → PDF via Playwright\n    └── lib/\n        └── parse_args.js                 # Shared CLI argument parser\n```\n\n### Architecture\n\n```\n┌─────────────────────────────────────┐\n│           SKILL.md                  │  ← Always loaded into context\n│  Routing table, workflow, rules,    │\n│  content guidelines, contracts      │\n└──────────────┬──────────────────────┘\n               │  Loaded on demand per routing table\n       ┌───────┴────────┐\n       ▼                ▼\n┌──────────────┐  ┌──────────────┐\n│ references/  │  │ templates/   │\n│ 12 docs +    │  │ (copied to   │\n│ case-studies │  │  project)    │\n└──────────────┘  └──────────────┘\n                        │\n                ┌───────┴────────┐\n                ▼                ▼\n         ┌──────────────┐  ┌──────────────┐\n         │  scripts/    │  │  agents/     │\n         │  (export     │  │  (platform   │\n         │   tools)     │  │   config)    │\n         └──────────────┘  └──────────────┘\n```\n\n## Usage\n\nThe skill activates automatically for design-related requests. Example prompts:\n\n```\n\"Design a landing page for our SaaS product\"\n\"Create a 10-slide pitch deck for the Q3 board meeting\"\n\"Build an interactive prototype of the checkout flow\"\n\"Explore 3 visual directions for the new dashboard\"\n\"Make the onboarding screens look good on mobile\"\n\"Create a design system for our product\"\n\"Low-fidelity wireframe for an e-commerce checkout\"\n```\n\n### Brand Style Cloning\n\nMention a brand name to load its design system from [getdesign.md](https://getdesign.md):\n\n```\n\"Create a pricing page with Stripe's aesthetic\"\n\"Notion-style kanban board\"\n\"Mix Vercel's minimalism with Linear's purple accents\"\n\"Show me this dashboard in Apple style vs Tesla style\"\n```\n\nSupports 68+ brands. See [EXAMPLES.md](./EXAMPLES.md) for detailed patterns.\n\n## Design Workflow\n\n```\nUnderstand → Route → Acquire Context → Design Intent → Build → Verify → Deliver\n    │          │           │                │             │        │         │\n    ▼          ▼           ▼                ▼             ▼        ▼         ▼\n Clarify    Load        Read            6-question    HTML +   3-phase    File\n questions  refs +      design          checklist     React    verify:    delivered\n            templates   system          (focal,      comps    structural,\n                                     tone, flow,             visual,\n                                     spacing,               excellence\n                                     color, type)\n```\n\nThe routing table in SKILL.md maps task types to the specific references and templates needed, loading only what's required for each design task.\n\n## Compatibility\n\n| Platform | Status | Notes |\n|---|---|---|\n| Claude Code (CLI) | **Primary target** | Playwright MCP + local scripts |\n| Codex / OpenAI-compatible | Supported | Prompt metadata in `agents/openai.yaml` |\n\n## Contributing\n\n1. Fork this repository\n2. Create a feature branch (`git checkout -b feat/your-feature`)\n3. Keep SKILL.md under 200 lines — move new technical content to `references/`\n4. Add case studies under `references/case-studies/` with subcategory folders\n5. Test with representative design prompts\n6. Open a pull request\n\nWhen adding new reference documents, add a row to the routing table in SKILL.md so the model knows when to load it.\n\n## License\n\nMIT\n","summary":"CC Design is a Claude Code skill that turns AI into a full‑spectrum product designer, turning written briefs into polished HTML prototypes, slide decks, landing pages, and animated mockups.  It integrates Playwright’s multi‑chromium verification and local export scripts to generate and validate responsive visuals while reusing existing brand kits, component libraries, and design patterns from a curated catalog of 70+ brand systems.  Built‑in quality checks enforce layout hierarchy, emotional tone, and anti‑layout‑slop rules, and the skill can produce multiple design variations on demand.  Designers, front‑end developers, and product teams looking to prototype quickly and consistently will find CC Design a powerful, automatic design assistant.","description":"High-fidelity HTML design and prototype guidance skill for AI agents","stars":398,"language":"JavaScript"},{"owner":"browser-use","repo":"browser-harness","url":"https://github.com/browser-use/browser-harness","readme":"<img src=\"https://r2.browser-use.com/github/ajsdlasnnalsgasld.png\" alt=\"Browser Harness\" width=\"100%\" />\n\n# Browser Harness ♞\n\nThe simplest, thinnest, **self-healing** harness that gives LLM **complete freedom** to complete any browser task. Built directly on CDP.\n\nThe agent writes what's missing, mid-task. No framework, no recipes, no rails. One websocket to Chrome, nothing between.\n\n```\n  ● agent: wants to upload a file\n  │\n  ● helpers.py → upload_file() missing\n  │\n  ● agent edits the harness and writes it    helpers.py   192 → 199 lines\n  │                                                       + upload_file()\n  ✓ file uploaded\n```\n\n**You will never use the browser again.**\n\n## Setup prompt\n\nPaste into Claude Code or Codex:\n\n```text\nSet up https://github.com/browser-use/browser-harness for me.\n\nRead `install.md` first to install and connect this repo to my real browser. Then read `SKILL.md` for normal usage. Always read `helpers.py` because that is where the functions are. When you open a setup or verification tab, activate it so I can see the active browser tab. After it is installed, open this repository in my browser and, if I am logged in to GitHub, ask me whether you should star it for me as a quick demo that the interaction works — only click the star if I say yes. If I am not logged in, just go to browser-use.com.\n```\n\nWhen this page appears, tick the checkbox so the agent can connect to your browser:\n\n<img src=\"docs/setup-remote-debugging.png\" alt=\"Remote debugging setup\" width=\"520\" style=\"border-radius: 12px;\" />\n\nSee [domain-skills/](domain-skills/) for example tasks.\n\n## Free remote browsers\n\nUseful for sub-agents or deployment. **Free tier: 3 concurrent browsers, no card required.**\n\n- Grab a key at [cloud.browser-use.com/new-api-key](https://cloud.browser-use.com/new-api-key)\n- Or let the agent sign up itself via [docs.browser-use.com/llms.txt](https://docs.browser-use.com/llms.txt) (setup flow + challenge context included).\n\n## How simple is it? (~592 lines of Python)\n\n- `install.md` — first-time install and browser bootstrap\n- `SKILL.md` — day-to-day usage\n- `run.py` (~36 lines) — runs plain Python with helpers preloaded\n- `helpers.py` (~195 lines) — starting tool calls; the agent edits these\n- `admin.py` + `daemon.py` (~361 lines) — daemon bootstrap plus the CDP websocket and socket bridge\n\n## Contributing\n\nPRs and improvements welcome. The best way to help: **contribute a new domain skill** under [domain-skills/](domain-skills/) for a site or task you use often (LinkedIn outreach, ordering on Amazon, filing expenses, etc.). Each skill teaches the agent the selectors, flows, and edge cases it would otherwise have to rediscover.\n\n- **Skills are written by the harness, not by you.** Just run your task with the agent — when it figures something non-obvious out, it files the skill itself (see [SKILL.md](SKILL.md)). Please don't hand-author skill files; agent-generated ones reflect what actually works in the browser.\n- Open a PR with the generated `domain-skills/<site>/` folder — small and focused is great.\n- Bug fixes, docs tweaks, and helper improvements are equally welcome.\n- Browse existing skills (`github/`, `linkedin/`, `amazon/`, ...) to see the shape.\n\nIf you're not sure where to start, open an issue and we'll point you somewhere useful.\n\n---\n\n[Bitter lesson](https://browser-use.com/posts/bitter-lesson-agent-frameworks) · [Skills](https://browser-use.com/posts/web-agents-that-actually-learn)\n","summary":"Browser‑Harness is a minimal, self‑healing bridge that lets large language models manipulate any browser task over a single CDP websocket—no extra framework or recipes needed.  The agent can detect missing functions, edit the helper file on the fly, and continue the task until completion, allowing continuous, adaptive automation.  It ships with a lightweight Python runtime, free remote browsers for sub‑agents, and a plug‑in architecture for community‑contributed domain‑skills.  Ideal for AI researchers, automated web‑task developers, and any user who wants to extend LLM control to arbitrary web interactions without writing boilerplate code.","description":"Self-healing browser harness that enables LLMs to complete any task.","stars":2991,"language":"Python"},{"owner":"GainSec","repo":"AutoProber","url":"https://github.com/GainSec/AutoProber","readme":"# AutoProber\n\nAutoProber is the hardware hacker's flying probe automation stack for giving\nyour agent everything it needs to go from \"there's a new target on the plate\"\nto probing individual pins in a safe way.\n\n![AutoProber assembly](docs/images/autoprober-assembly-2.jpg)\n\nDemo video: https://gainsec.com/autoprober-demo-mp4/\n\n## Flow\n\n1. Tell the agent to ingest the project.\n2. Connect all the hardware.\n3. Tell the agent to confirm that all parts are functioning.\n\n![Top of the AutoProber web dashboard](docs/images/Public-Release-Images/TopofWebDash.png)\n\n4. Have it run homing and then calibration.\n5. Attach the custom probe and microscope header.\n6. Tell the agent that there is a new target on the plate.\n7. It will find where the target is on the plate, then take individual frames,\n   keeping a record of the XYZ while noting pads, pins, chips, and other\n   interesting features.\n\n![Detected labels and target features](docs/images/Public-Release-Images/labels.png)\n\n8. It will stitch the frames together and annotate the map, including pins and\n   interesting components it identified.\n\n![Annotated map view](docs/images/Public-Release-Images/mapview.png)\n\n9. It will add probe targets to the web dashboard for you to approve or deny.\n\n![Probe review dashboard section](docs/images/Public-Release-Images/bottomdash.png)\n\n10. It will probe the approved targets and report back.\n\nAll hardware can be controlled through the web dashboard, Python scripts, or by\nthe agent itself.\n\n![Manual controls and hardware panels](docs/images/Public-Release-Images/MidofDash1.png)\n\nThis repo is a self-contained source-available release candidate. It contains\nthe Python control code, dashboard, CAD files, and documentation needed to\ncreate your own AutoProber.\n\n## Safety Model\n\nThis project can move physical hardware. Treat it as a machine-control system,\nnot a normal web app.\n\nThe required safety design is:\n\n- GRBL `Pn:P` is ignored. The CNC probe pin is not a trusted endstop.\n- The independent safety endstop is read from oscilloscope Channel 4.\n- Channel 4 must be continuously monitored during any motion.\n- Any Channel 4 trigger, ambiguous voltage, CNC alarm, or real X/Y/Z limit pin\n  is a stop condition.\n- The agent/operator must stop and report. Recovery motion is not automatic.\n\nRead [docs/safety.md](docs/safety.md) and [docs/operations.md](docs/operations.md)\nbefore running hardware.\n\n## Repository Layout\n\n```text\napps/                 Operator-facing scripts and Flask dashboard entrypoint\nautoprober/           Reusable Python package for CNC, scope, microscope, logging, safety\ndashboard/            Single-page web dashboard\ndocs/                 Architecture, device references, operations, and safety guidance\ncad/                  Printable STL files for the current custom toolhead\nconfig/               Example environment/configuration files\nAGENTS.md             Agent/operator safety rules\nLICENSE               PolyForm Noncommercial 1.0.0 license and commercial contact\npyproject.toml        Python project metadata\nuv.lock               Locked Python dependency resolution\n```\n\n## Hardware Stack\n\nThe tested project architecture uses:\n\n- GRBL-compatible 3018-style CNC controller over USB serial\n- USB microscope served by `mjpg_streamer`\n- Siglent oscilloscope over LAN/SCPI for Channel 4 safety monitoring and\n  Channel 1 measurement\n- Optical endstop wired to an external 5V supply and oscilloscope Channel 4\n- Optional network-controlled outlet for lab power control\n- Current printable custom toolhead parts in `cad/`\n\nDefault runtime assumptions are documented in the device docs. Replace them\nwith your own lab settings before use.\n\nFor a shopping-oriented hardware list, see [docs/BOM.md](docs/BOM.md).\n\n## Reference Parts\n\nThese are the specific parts or part classes used for the prototype release.\nVerify current listings, dimensions, voltage, and connector compatibility\nbefore buying.\n\nMy build:\n\n- [Optical End Stop](https://www.amazon.com/dp/B08977QFK5)\n- [USB Microscope](https://www.amazon.com/dp/B00XNYXQHE)\n- [SainSmart Genmitsu 3018-PROVer V2](https://www.amazon.com
