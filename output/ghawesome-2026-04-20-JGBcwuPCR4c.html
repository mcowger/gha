inimal boilerplate.\n- **Extensible**: Many built-in types with support for custom interpolators.\n- **Animation modes**: `#[once]`, `#[cycle]`, and `#[alternate]`.\n- **Easing**: Built-in and custom easing functions.\n- **Ratatui-friendly**: Interpolators for ratatui types, gated behind the `ratatui` feature flag.\n\n## Installation\n\n```sh\ncargo add animate\n```\n\n## Getting started\n\nAdd `#[animate]` to a struct and mark the fields you want to animate:\n\n```rust\n#[animate]\npub struct MyWidget {\n    #[once(duration = 300)]\n    progress: f64,\n\n    #[cycle(duration = 400, easing = cubic_in)]\n    color: Color,\n\n    #[alternate(duration = 500, easing = quad_in_out)]\n    status: String,\n}\n```\n\nBy default the macro generates an update method named `animate`. It must be called at the top of your struct's render method.\n\n```rust\n#[animate]\npub struct MyWidget { ... }\n\nimpl MyWidget {\n    pub fn draw(&mut self, frame: &mut Frame) {\n        self.animate();\n\n        // rest of your code\n    }\n}\n```\n\nIf the name conflicts with an existing method, rename it:\n\n```rust\n#[animate(update = \"update_animations\")]\npub struct MyWidget { ... }\n```\n\nNext, place `animate::tick()` **before** your struct's update call at the start of each frame:\n\n```rust\nlet mut widget = MyWidget::new(...);\n\nloop {\n    animate::tick(tickrate);\n    terminal.draw(|frame| {\n        widget.draw(frame);\n    })?;\n}\n```\n\nUse `get()` to read and `set()` to write animated fields.\n\n## Minimal example\n\n```rust\nuse animate::animate;\nuse std::{io::{stdout, Write}, thread, time::Duration};\n\n#[animate]\nstruct Counter {\n    #[once(duration = 400)]\n    value: u32,\n}\n\nfn main() -> std::io::Result<()> {\n    let mut c = Counter::new(0);\n\n    loop {\n        animate::tick(8);  // advance global frame time by frame delta (ms)\n        c.animate();       // update all animated fields\n\n        let v = *c.value;\n        if v == 0 {\n            c.value.set(100);\n        }\n\n        print!(\"\\rCounter value: {v}\");\n        stdout().flush()?;\n\n        if v == 100 {\n            break;\n        }\n\n        thread::sleep(Duration::from_millis(8));\n    }\n\n    Ok(())\n}\n```\n\n## Animation modes\n\n| Attribute      | Behaviour                                           |\n|----------------|-----------------------------------------------------|\n| `#[once]`      | Animates to target once, then holds.                |\n| `#[cycle]`     | Loops continuously from start to target.            |\n| `#[alternate]` | Ping-pongs back and forth between start and target. |\n\n## Fields\n\nAll mode attributes accept the same options:\n\n```rust\n#[once(duration = 300, easing = quad_in_out, interp = my_interp_fn)]\n```\n\n| Option     | Type       | Default             | Description                                      |\n|------------|------------|---------------------|--------------------------------------------------|\n| `duration` | `u64` (ms) | `0`                 | Animation duration in milliseconds.              |\n| `easing`   | path       | `linear`            | Easing function (`fn(f64) -> f64`).              |\n| `interp`   | path       | `<T as Lerp>::lerp` | Interpolation function (`fn(&T, &T, f64) -> T`). |\n\n## Built-in easing functions\n\n`linear`, `quad_in`, `quad_out`, `quad_in_out`,\n`cubic_in`, `cubic_out`, `cubic_in_out`\n\n## Custom types\n\nImplement `Lerp` for any type:\n\n```rust\nimpl animate::Lerp for MyColor {\n    fn lerp(start: &Self, end: &Self, t: f64) -> Self {\n        MyColor {\n            r: u8::lerp(&start.r, &end.r, t),\n            g: u8::lerp(&start.g, &end.g, t),\n            b: u8::lerp(&start.b, &end.b, t),\n        }\n    }\n}\n```","summary":"**animate** is a lightweight Rust library that adds declarative animation capabilities to structs via a simple macro. It supports multiple animation modes (`once`, `cycle`, `alternate`), built‑in and custom easing functions, and offers ergonomic getters and setters for animated fields, all with zero dependencies by default. The API is extensible through a `Lerp` trait for user‑defined types and includes optional ratatui interpolators. This library is ideal for developers building command‑line UIs, game engines, or any Rust application that needs smooth, configurable animations without a heavy runtime.","description":"🎞️ Animation Library for Rust","stars":70,"language":"Rust"},{"owner":"QuinnAho","repo":"claudemap","url":"https://github.com/QuinnAho/claudemap","readme":"Welcome to...\n\n![ClaudeMap](resources/img/ClaudeMapBranding.png)\n\n[![Version](https://img.shields.io/badge/version-v0.2.0-blue)](CHANGELOG.md) [![License: MIT](https://img.shields.io/badge/license-MIT-green)](LICENSE) ![npm downloads](https://img.shields.io/npm/dw/%40quinnaho%2Fclaudemap) ![GitHub stars](https://img.shields.io/github/stars/QuinnAho/claudemap)\n\n**Google Maps for vibecoders.**\n\nAI lets you build faster than ever, but the very tools that help our productivity are leaving us behind - you don't understand what you're building anymore. You can vibecode a full app in a weekend and not even start to explain how it works. ClaudeMap fixes that.\n\nUnlike traditional visualization tools, ClaudeMap organizes your code by what it actually does. Claude reads your project and groups it into concepts in a way you actually think about your project. Zoom out to see the big picture. Zoom in to see the details. Colors show what's healthy and what's broken. Use `/explain` and ask any question about your code, Claude will present directly on the map and explain step by step. Use `/show` to tell Claude what you want to find or see, and it moves the map for you.\n\nAll powered by the same AI you vibecode with.\n\n## See It In Action\n\n[![ClaudeMap Demo](resources/img/thumbnail.png)](https://www.loom.com/share/6a2ff0948ae64ae6994fb3817cb3607e)\n\n[Try the map](https://quinnaho.github.io/claudemap/) (standalone preview, Claude features require Claude Code or Codex)\n\n[Longer YouTube walkthrough](https://www.youtube.com/watch?v=mubRRx5mXzA)\n\n## Install\n\n```bash\nnpx @quinnaho/claudemap install\nclaude\n/setup-claudemap\n```\n\n**Codex support is here!**`npx @quinnaho/claudemap install --assistant codex` - see [Codex guide](docs/CODEX.md).\n\nIn Codex, run `/skills`, choose `codexmap-runtime`, or prefix natural-language requests with `$codexmap-runtime`, for example:\n\n```text\n$codexmap-runtime build the initial map for this repo\n```\n\n## Commands\n\n| Command | Description |\n|---------|-------------|\n| `/setup-claudemap` | Analyze your repo and generate the map |\n| `/refresh` | Update map after code changes |\n| `/explain` | AI-guided walkthroughs with visual highlighting |\n| `/show` | Navigate the map with natural language |\n\n## What's New in v0.2.0\n\n- **Sub-map support** - create scoped maps for larger codebases\n- **Codex support** - works with Claude Code and OpenAI Codex\n- **Stable map generation** - consistent layouts across rebuilds\n- **Iterative refinement** - tweak your map without starting over\n- **Better refresh UX** - smoother updates after code changes\n\n## Learn More\n\n- [Full Guide](docs/GUIDE.md) - setup walkthrough, commands, multi-map workflow\n- [Codex Guide](docs/CODEX.md) - Codex-specific setup and commands\n- [Changelog](CHANGELOG.md) - version history\n- [Contributing](CONTRIBUTING.md) - help improve ClaudeMap\n\n## License\n\nMIT\n","summary":"ClaudeMap is an AI‑powered visual mapping tool that turns a codebase into an intuitive, concept‑driven diagram. It uses Claude (or Codex) to analyze your repo, grouping files into logical entities, coloring sections by health, and letting you zoom in for details; commands such as `/explain` or `/show` let you ask questions and nudge the map with natural language. The tool supports sub‑maps for large projects, offers consistent layout and iterative refinement, and integrates directly into the Claude Code and Codex ecosystems. Developers who rapidly prototype or “vibecode” with AI want a clear, explainable view of what their code is actually doing, and ClaudeMap provides that overview in a single interactive map.","description":"google maps for vibecoders.","stars":117,"language":"JavaScript"},{"owner":"thdxg","repo":"macterm","url":"https://github.com/thdxg/macterm","readme":"<h1 align=\"center\">\n  <img src=\"./assets/icon.png\" width=\"128\" />\n  <br />\n  ▞▚ macterm ▞▚\n</h1>\n\n<p align=\"center\">\n  A lightweight, native terminal for macOS built with SwiftUI and libghostty.\n</p>\n\n![screenshot](./assets/screenshot.png)\n\n## Features\n\n- **Vertical Project Sidebar**: Native macOS sidebar for organizing projects and tabs vertically.\n- **Split Panes**: Unlimited horizontal and vertical splits, with optional auto-tiling.\n- **Persistence**: Projects, tabs, and panes are saved and restored automatically.\n- **Quick terminal**: Global terminal accessible from anywhere.\n- **Highly Configurable**: Configurable theme, font, and keymap with hot-reloading.\n- **Command Palette**: Versatile command palette to interact with multiplexing (open, delete, and search projects)\n\n## Install\n\nDownload the latest `.dmg` from [Releases](https://github.com/thdxg/macterm/releases), open it, and drag Macterm to Applications.\n\nSince the app is not signed with an Apple Developer certificate, macOS will block it on first launch. To fix this, run:\n\n```bash\nxattr -cr /Applications/Macterm.app\n```\n\n## Requirements\n\n- macOS 26.0+\n- Swift 6.0+\n- [mise](https://mise.jdx.dev/) (optional, but recommended)\n\n## Quick Start\n\n```bash\n# Install necessary tools (swiftlint, gh, etc.)\nmise install\n\n# Setup dependencies\nmise run setup\n\n# Run in debug mode\nmise run run\n\n# Build release bundle\nmise run build\n```\n\n## License\n\nMIT\n","summary":"Macterm is a lightweight, native macOS terminal built with SwiftUI and libghostty that prioritizes speed and a clean, modern interface. It offers a vertical project sidebar, unlimited split panes with optional auto‑tiling, persistent project state, a global quick‑terminal shortcut, a highly configurable theme/font/keymap system, and a versatile command palette for managing multiplexed sessions. The tool is ideal for macOS developers and power users who need a fast, Apple‑style terminal that retains workspace layouts across launches and responds immediately to global keyboard shortcuts.","description":"A lightweight terminal multiplexer for macOS built with SwiftUI and libghostty","stars":77,"language":"Swift"},{"owner":"Lyx3314844-03","repo":"superspider","url":"https://github.com/Lyx3314844-03/superspider","readme":"# SuperSpider\n\n<p align=\"center\">\n  <img src=\"docs/assets/superspider-wordmark.svg\" alt=\"SuperSpider — Multi-Language Web Crawler Framework\" width=\"900\" />\n</p>\n\n<p align=\"center\">\n  <img src=\"docs/assets/superspider-icon.svg\" alt=\"SuperSpider icon\" width=\"160\" />\n</p>\n\n<p align=\"center\">\n  <b>Multi-Language Web Crawler Framework</b><br/>\n  AI · Media Download · Distributed · Anti-Bot · Node-Reverse\n</p>\n\n<p align=\"center\">\n  <a href=\"#-if-this-project-helped-you\">⭐ If this project helped you, please give it a star!</a>\n</p>\n\n---\n\nSuperSpider is a **multi-language web crawler framework** that ships four production-ready runtimes in Python, Go, Rust, and Java. Each runtime covers the same broad capability surface — web crawling, browser automation, AI extraction, media download, anti-bot, distributed execution — but is optimized for a different engineering environment.\n\n| Runtime | Language | Delivery | Tagline |\n| --- | --- | --- | --- |\n| 🐍 **pyspider** | Python | virtualenv | AI-first, project-oriented, rapid iteration |\n| 🐹 **gospider** | Go | compiled binary | Concurrent, binary-first, distributed workers |\n| 🦀 **rustspider** | Rust | release binary | Performance-first, feature-gated, strongly typed |\n| ☕ **javaspider** | Java | Maven / JAR | Enterprise-first, browser workflows, audit trails |\n\n---\n\n## 🕷️ What Can SuperSpider Do?\n\n### 🌐 Web Crawling\n- HTTP and browser-based crawling (Playwright + Selenium)\n- Scrapy-style project interface with plugin injection\n- Dynamic site handling (JavaScript-rendered pages)\n- Proxy pool with health checking and automatic rotation\n- Rate limiting, circuit breaker, deduplication\n- Robots.txt compliance\n- Session and cookie management\n- Checkpoint and incremental crawl (resume interrupted crawls)\n\n### 🎬 Media Download — 10 Platforms\nAll four runtimes can download from:\n\n| Platform | Format |\n| --- | --- |\n| **YouTube** | HLS, DASH, MP4 |\n| **Bilibili** | HLS, DASH, M4S |\n| **IQIYI** | HLS, DASH |\n| **Tencent Video** | HLS, direct link |\n| **Youku** | HLS, DASH |\n| **Douyin** | MP4, direct link |\n| **Generic HLS** | M3U8 streams |\n| **Generic DASH** | MPD manifests |\n| **FFmpeg merge** | TS/M4S → MP4 |\n| **DRM detection** | Widevine, PlayReady |\n\n### 🤖 AI Extraction\n- **LLM extraction** — OpenAI (GPT-4o, etc.) and Anthropic/Claude\n- **Entity extraction** — named entities, structured data\n- **Content summarization** — automatic page summarization\n- **Sentiment analysis** — positive/negative/neutral classification\n- **Smart parser** — auto-detects page type and extracts relevant fields (PySpider only)\n- **Schema-driven output** — strongly typed structured extraction (PySpider only)\n- **Few-shot examples** — guide the LLM with examples\n- **XPath suggestion studio** — AI-suggested XPath selectors\n\n### 🛡️ Anti-Bot\n- TLS fingerprint rotation (JA3/JA4 mimicry)\n- Browser behavior simulation (mouse movement, scroll, reading pace)\n- WAF bypass techniques\n- Night mode (reduced crawl rate during off-hours)\n- **Captcha solving**: 2captcha, Anti-Captcha, reCAPTCHA v2/v3, hCaptcha, image captcha\n- SSRF protection (blocks internal network access)\n\n### 🔐 JS Encryption / Node-Reverse\nMany modern sites protect their APIs with JavaScript-generated signatures. SuperSpider handles this via a Node.js bridge:\n- Node-reverse client for JS-encrypted sites\n- Encrypted site crawler (HMAC, AES, token-based)\n- JS signature execution via Node.js bridge server\n- Supports HMAC-SHA256, AES-encrypted params, timestamp tokens\n\n### 🌍 Distributed Crawling\n- **Redis** queue (native, all four runtimes)\n- **RabbitMQ** — broker-native (Go, Java), bridge (Rust), native (Python)\n- **Kafka** — broker-native (Go, Java), bridge (Rust), native (Python)\n- Distributed workers with state machine\n- Node discovery: environment variables, file, DNS-SRV, Consul, etcd\n- Dataset mirror to database backends\n\n### 🗄️ Storage Backends\n| Backend | PySpider | GoSpider | RustSpider | JavaSpider |\n| --- | --- | --- | --- | --- |\n| SQLite | ✅ | ✅ | ✅ | ✅ |\n| PostgreSQL | ✅ | ✅ process | ✅ driver+process | ✅ |\n| MySQL | ✅ | ✅ process | ✅ driver+process | ✅ |\n| MongoDB | ✅ | ✅ process | ✅ driver+process | ✅ |\n| JSON / CSV / JSONL | ✅ | ✅ | ✅ | ✅ |\n\n### 📊 Observability\n- Audit trail: in-memory, file, JSONL, composite\n- Monitoring and metrics dashboard\n- Preflight validation (check config before crawling)\n- Checkpoint and resume (SQLite-backed)\n- Incremental crawl (only crawl new/changed pages)\n\n---\n\n## 🐍 PySpider — AI-First Python Crawler\n\n**Best for:** AI-powered extraction, rapid prototyping, research workflows\n\n### Unique Capabilities\n- **Smart parser** — automatically detects page type (article, product, listing, etc.) and extracts relevant fields without writing selectors\n- **Schema-driven LLM extraction** — define a JSON schema, get structured output from any page\n- **Graph crawler** — crawl relationship graphs, extract nodes and edges\n- **Research runtime** — Jupyter-style notebook output for data analysis\n- **Plugin injection** — extend any part of the pipeline with Python plugins\n- **Async runtime** — full async/await support with aiohttp\n\n### Install\n```bash\n# Windows\nscripts\\windows\\install-pyspider.bat\n\n# Linux / macOS\nbash scripts/linux/install-pyspider.sh\nbash scripts/macos/install-pyspider.sh\n```\n\n**Output:** `.venv-pyspider` — run `python -m pyspider version` to verify\n\n---\n\n## 🐹 GoSpider — Concurrent Binary Crawler\n\n**Best for:** High-concurrency production crawling, binary deployment, distributed worker clusters\n\n### Unique Capabilities\n- **Single binary** — no runtime dependencies, deploy anywhere\n- **Native Selenium/WebDriver** — direct WebDriver protocol, no wrapper overhead\n- **Broker-native queues** — RabbitMQ and Kafka via native Go clients\n- **Dedicated platform extractors** — separate packages for Bilibili, IQIYI, Tencent, Youku, Douyin\n- **Process + driver DB adapters** — flexible database backend selection\n- **Audit trail module** — structured audit logging with composite writers\n\n### Install\n```bash\n# Windows\nscripts\\windows\\install-gospider.bat\n\n# Linux / macOS\nbash scripts/linux/install-gospider.sh\nbash scripts/macos/install-gospider.sh\n```\n\n**Output:** `gospider/gospider` binary — run `./gospider/gospider --version` to verify\n\n---\n\n## 🦀 RustSpider — Performance-First Crawler\n\n**Best for:** Performance-sensitive deployments, strict resource boundaries, feature-gated release control\n\n### Unique Capabilities\n- **Feature-gated modules** — compile only what you need (browser, distributed, API, web)\n- **Native node+playwright process** — Playwright runs as a managed subprocess, not a wrapper\n- **Fantoccini Selenium facade** — async Rust WebDriver client\n- **Real captcha API flow** — async 2captcha/Anti-Captcha with polling, not placeholder\n- **Driver-level DB adapters** — native Rust drivers for Postgres, MySQL, MongoDB\n- **Benchmark suite** — built-in performance benchmarks\n- **Preflight validation** — validate all config and dependencies before starting\n\n### Install\n```bash\n# Windows\nscripts\\windows\\install-rustspider.bat\n\n# Linux / macOS\nbash scripts/linux/install-rustspider.sh\nbash scripts/macos/install-rustspider.sh\n```\n\n**Output:** `rustspider/target/release/rustspider` — run `./rustspider/target/release/rustspider --version` to verify\n\n---\n\n## ☕ JavaSpider — Enterprise Java Crawler\n\n**Best for:** Enterprise Java environments, Maven/JAR delivery, browser-heavy automation, audit-conscious execution\n\n### Unique Capabilities\n- **Maven profiles** — `lite / ai / browser / distributed / full` — build only what you need\n- **Dedicated audit trail** — the strongest audit support in the set: in-memory, file, JSONL, composite\n- **Broker-native queues** — RabbitMQ via `amqp-client`, Kafka via `kafka-clients`\n- **REST API server** — built-in `/health`, `/jobs`, `/jobs/{id}`, `/jobs/{id}/result` endpoints\n- **Async spider runtime** — `AsyncSpiderRuntime` for non-blocking execution\n- **Workflow replay** — record and replay browser workflows\n- **Generic-parser fallback** — media parsing never fails silently; falls back to generic extraction\n\n### Maven Profiles\n```bash\n# Minimal (core crawling only)\nmvn -f javaspider/pom.xml -P lite -DskipTests package\n\n# With AI extraction\nmvn -f javaspider/pom.xml -P ai -DskipTests package\n\n# With browser automation\nmvn -f javaspider/pom.xml -P browser -DskipTests package\n\n# With distributed runtime\nmvn -f javaspider/pom.xml -P distributed -DskipTests package\n\n# Everything\nmvn -f javaspider/pom.xml -P full -DskipTests package\n```\n\n### Install\n```bash\n# Windows\nscripts\\windows\\install-javaspider.bat\n\n# Linux / macOS\nbash scripts/linux/install-javaspider.sh\nbash scripts/macos/install-javaspider.sh\n```\n\n**Output:** `javaspider/target/` — run `java -jar javaspider/target/javaspider-*.jar --version` to verify\n\n---\n\n## 📦 Install Prerequisites\n\n| Framework | Required |\n| --- | --- |\n| 🐍 PySpider | Python 3.8+, pip, venv |\n| 🐹 GoSpider | Go 1.20+ |\n| 🦀 RustSpider | Rust 1.70+, Cargo |\n| ☕ JavaSpider | Java 17+, Maven 3.8+ |\n\n---\n\n## 🗺️ Quick Selection Guide\n\n| I need... | Use |\n| --- | --- |\n| AI-powered extraction with LLM | 🐍 PySpider |\n| High-concurrency binary deployment | 🐹 GoSpider |\n| Maximum performance, strict boundaries | 🦀 RustSpider |\n| Enterprise Java, Maven/JAR, audit trail | ☕ JavaSpider |\n| Download YouTube / Bilibili / Douyin | any (all four) |\n| Crawl JS-encrypted sites | any (all four support node-reverse) |\n| Distributed worker cluster | 🐹 GoSpider or 🦀 RustSpider |\n| Rapid prototyping and research | 🐍 PySpider |\n\n---\n\n## 📚 Documentation\n\n| Document | Description |\n| --- | --- |\n| [`docs/FRAMEWORK_CAPABILITIES.md`](docs/FRAMEWORK_CAPABILITIES.md) | Detailed per-framework capability descriptions |\n| [`docs/FRAMEWORK_CAPABILITY_MATRIX.md`](docs/FRAMEWORK_CAPABILITY_MATRIX.md) | Full capability comparison tables |\n| [`docs/SUPERSPIDER_INSTALLS.md`](docs/SUPERSPIDER_INSTALLS.md) | Install instructions for all three OS |\n| [`LATEST_FRAMEWORK_COMPLETION_REPORT.md`](LATEST_FRAMEWORK_COMPLETION_REPORT.md) | Latest completion status and verification evidence |\n| [`MEDIA_PARITY_REPORT.md`](MEDIA_PARITY_REPORT.md) | Media platform coverage evidence |\n| [`ADVANCED_USAGE_GUIDE.md`](ADVANCED_USAGE_GUIDE.md) | Advanced crawling scenarios |\n| [`ENCRYPTED_SITE_CRAWLING_GUIDE.md`](ENCRYPTED_SITE_CRAWLING_GUIDE.md) | JS-encrypted site crawling |\n| [`NODE_REVERSE_INTEGRATION_GUIDE.md`](NODE_REVERSE_INTEGRATION_GUIDE.md) | Node.js reverse engineering bridge |\n| [`ULTIMATE_ENHANCEMENT_GUIDE.md`](ULTIMATE_ENHANCEMENT_GUIDE.md) | Full capability enhancement reference |\n| [`CHANGELOG.md`](CHANGELOG.md) | Version history |\n| [`CONTRIBUTING.md`](CONTRIBUTING.md) | Contribution guide |\n\n---\n\n## ⭐ If This Project Helped You\n\nIf SuperSpider saved you time, helped you build something, or taught you something new — please consider giving it a **⭐ star** on GitHub!\n\n**Why it matters:**\n- ⭐ Stars help other developers discover this project\n- ⭐ Stars motivate continued development and maintenance\n- ⭐ Stars show the community that multi-language crawler frameworks are valuable\n\n**Has SuperSpider helped you?**\n- 🎬 Downloaded videos from YouTube, Bilibili, or other platforms?\n- 🤖 Extracted structured data using AI/LLM?\n- 🛡️ Bypassed anti-bot protection on a challenging site?\n- 🔐 Cracked a JS-encrypted API?\n- 🌍 Built a distributed crawler cluster?\n- 📊 Automated data collection for research or business?\n\nIf yes to any of the above — **[click the ⭐ Star button](https://github.com/Lyx3314844-03/superspider)** at the top of this page. It takes 2 seconds and means a lot! 🙏\n\n---\n\n## 📄 License\n\nMIT License — see [LICENSE](LICENSE) for details.\n","summary":"SuperSpider is a cross‑language web‑crawler framework that ships production‑ready runtimes in Python, Go, Rust, and Java, all sharing a unified feature set. It supports HTTP and browser‑based crawling, dynamic pages, proxy rotation, media download from major platforms, and AI‑powered extraction, summarization, sentiment analysis, and LLM‑driven content parsing. Built‑in anti‑bot tools—including TLS fingerprint rotation, browser simulation, and captcha solving—plus Node.js‑based JavaScript signature handling allow it to scrape sites that normally require client‑side logic. Engineers and data‑science teams needing performant, distributed, and AI‑enhanced crawling across multiple programming environments will benefit from SuperSpider’s comprehensive, plug‑in‑ready capabilities.","description":"Enterprise-grade multi-language web scraping framework (Java/Go/Rust/Python) with complete capabilities","stars":140,"language":"HTML"},{"owner":"areofyl","repo":"fetch","url":"https://github.com/areofyl/fetch","readme":"# fetch\n\nA donut.c-inspired fetch tool that spins your distro logo in 3D with live-updating system info.\n\n![demo](demo.gif)\n\nTakes any ASCII/Unicode distro logo, turns each character into a point cloud\nbased on its visual density, and renders it as a rotating 3D relief with\nBlinn-Phong shading. System info is gathered natively from `/proc`, `/sys`,\nand GTK config — no external dependencies required.\n\nBased on [gentoo.c](https://github.com/areofyl/gentoo.c).\n\n## Build & run\n\n```\nmake\n./fetch\n```\n\nPress any key to stop — the keypress passes through to the shell, so it\nworks as a startup fetch. Ctrl-C works too.\n\n## Install\n\n```\nsudo make install\n```\n\n`PREFIX=~/.local make install` if you don't want it system-wide.\n\n### Nix Flake\nAdd this repo to your ```flake.nix```. The package is built using the unstable channel. You can overwrite this by setting ```inputs.nixpkgs.follows = \"nixpkgs\"``` (if your default is 25.11).\n\n```nix\ninputs = {\n  ...\nareofyl-fetch.url = \"github:areofyl/fetch\";\n  ...\n}\n```\n#### Home-manager\nYou also need to import the nix package in your ```home.nix```. Check ```nix/home-module.nix``` for the options. Most are the same but hyphens can not be used so camel-case has been used for those options instead.\n\n```nix\n{ pkgs, inputs, ... }: \n\n{\n  import = [ inputs.areofyl-fetch.homeManagerModules.default ];\n  \n  programs.fetch = {\n    enable = true;\n    labelColor = \"red\";\n    info = [];\n    speed = 1.0;\n    spin = \"xy\";\n  };\n  \n}\n```\n\n## Logos\n\nBy default it auto-detects your distro and grabs the logo from fastfetch\n(if installed) with its original per-character colors preserved. Works with\nany of fastfetch's 500+ distro logos!\n\nYou can also specify one directly:\n\n```\n./fetch -l arch\n./fetch -l NixOS\n./fetch -l asahi\n```\n\nOr drop a custom logo in `~/.config/fetch/logo.txt`:\n\n```\n# distro: gentoo\n         -/oyddmdhs+:.\n     -odNMMMMMMMMNNmhy+-`\n...\n```\n\nWithout fastfetch, the built-in Gentoo logo is used.\n\n## System info\n\nAll system info is gathered natively — no fastfetch or neofetch needed:\n\n- **OS** — `/etc/os-release`\n- **Host** — `/proc/device-tree/model` or `/sys/class/dmi/id/product_name`\n- **Kernel** — `uname()`\n- **Uptime** — `/proc/uptime`\n- **Packages** — emerge, pacman, dpkg, rpm, xbps, apk\n- **Shell** — `$SHELL` + version\n- **Display** — `/sys/class/drm/card*/modes`\n- **WM** — env vars + process detection\n- **Theme/Icons/Font** — `~/.config/gtk-3.0/settings.ini`\n- **CPU** — `/proc/cpuinfo` or device-tree (Apple Silicon)\n- **GPU** — DRM device uevent\n- **Memory/Swap** — `/proc/meminfo`\n- **Disk** — `statvfs()`\n- **Battery** — `/sys/class/power_supply` (energy_now/energy_full)\n- **Local IP** — `ip addr`\n\nStats like memory, battery, and uptime update in real-time while the logo spins.\n\n## Config\n\nCreate `~/.config/fetch/config` to customize:\n\n```\n# fields — list to show, in this order\n# remove or comment out to hide\nos\nhost\nkernel\nuptime\npackages\nshell\ndisplay\nwm\ntheme\nicons\nfont\nterminal\ncpu\ngpu\nmemory\nswap\ndisk\nip\nbattery\nlocale\ncolors\n\n# appearance\n# label_color=magenta   (red, green, yellow, blue, magenta, cyan, white)\n# separator=─           (character for the title separator)\n# shading=.,-~:;=!*#$@  (characters for 3D shading, supports UTF-8)\n\n# 3d\n# light=top-left        (top-left, top-right, top, left, right, front, bottom-left, bottom-right)\n# spin=xy               (x, y, or xy)\n# speed=1.0             (rotation speed)\n# size=1.0              (logo scale, e.g. 2.0 for double size)\n# height=36             (override render height in rows)\n```\n\n## Options\n\n| Flag | Description |\n|------|-------------|\n| `-l`, `--logo <name>` | Use a logo from fastfetch by name |\n| `--rotate-x` | Lock rotation to X axis only |\n| `--rotate-y` | Lock rotation to Y axis only |\n| `-s`, `--speed <float>` | Speed multiplier (default 1.0) |\n| `--size <float>` | Scale the logo (e.g. 2.0 for double size) |\n| `--height <n>` | Override render height in rows |\n| `--no-info` | Just the logo, no system info |\n| `--no-color` | Disable coloring |\n| `--frames <n>` | Stop after n frames |\n| `--infinite` | Run forever |\n| `--shading-chars <str>` | Custom shading ramp, supports UTF-8 |\n| `-h`, `--help` | Show help |\n\nCLI flags override config file settings.\n\n## Contributing\n\nPRs are welcome! If you want to add a feature, fix a bug, or package fetch for\nyour distro, go for it. I try to keep the codebase small and easy to understand,\nso smaller PRs are easier to merge than big ones.\n\nIf you want to chat about ideas before writing code, reach out on\n[Reddit](https://www.reddit.com/user/areofyl) or open an issue.\n\n## How it works\n\nEach character in the logo gets a weight based on its visual density — `M` is\nheavy, `.` is light, `█` is full, `░` is thin. That weight becomes a height,\nturning the flat logo into a 3D relief. Surface normals come from the height\ngradient, and everything gets rotated + projected + shaded every frame with a\nz-buffer. Single file C, no deps beyond libm.\n","summary":"`fetch` is a lightweight, dependency‑free launch‑time system info tool that renders your distro’s ASCII/Unicode logo as a rotating 3‑D relief with Blinn‑Phong shading. It gathers live metrics—such as OS, kernel, uptime, CPU/GPU usage, memory, storage, battery and network—and overlays them atop the spinning logo, updating them in real time. The program supports custom logos, per‑character colours retained from fastfetch, and a rich configuration file to toggle fields, change colours, spinning axis, speed, and size, making it ideal for users who want a visually appealing, information‑rich splash screen without relying on external utilities. Installation is simple via `make`, `make install`, or through Nix/Home‑manager, and a single keypress stops the display, forwarding input to the shell.","description":"An animated 3D fetch tool for your terminal. Takes your distro's ASCII logo, turns it into a spinning 3D object, and displays system info alongside it.","stars":115,"language":"C"},{"owner":"Barath19","repo":"Boxer3D","url":"https://github.com/Barath19/Boxer3D","readme":"# Boxer3D\n\nAR 3D object detection for iPhone with LiDAR. Detects objects with YOLO and lifts them to 3D oriented bounding boxes using [BoxerNet](https://facebookresearch.github.io/boxer/) (Meta Research), displayed in augmented reality.\n\n## Demo\n\n<img width=\"1418\" height=\"849\" alt=\"banner\" src=\"https://github.com/user-attachments/assets/05cd68b9-7df5-41d1-95fe-4197fdb539d5\" />\n\n![Boxer3D](https://github.com/user-attachments/assets/e5c5cbce-bcf3-48d4-9994-d317f647950d)\n\n## How It Works\n\n```\niPhone Camera + LiDAR\n       │\n       ├──► YOLO11n (2D detection) ──► top 3 bounding boxes\n       │\n       ├──► LiDAR depth ──► median depth per 16×16 patch\n       │\n       ├──► ARKit ──► camera pose + intrinsics + gravity\n       │\n       └──► BoxerNet (3D lifting) ──► oriented 3D bounding boxes\n                                           │\n                                     SceneKit AR rendering\n```\n\n1. **YOLO11n** detects objects in 2D (640×640, 80 COCO classes)\n2. **BoxerNet** lifts 2D boxes to 7-DoF 3D boxes (center, size, yaw) using DINOv3 visual features + LiDAR depth\n3. **ARKit** Camera poses + Gravity Vector + LiDAR depth\n4. **SceneKit** renders 3D wireframe boxes anchored in the real world\n\n## Requirements\n\n- iPhone 12 Pro or later (LiDAR required)\n- iOS 16.0+\n- ~450 MB storage for models\n\n## Setup\n\n1. **Clone**\n   ```bash\n   git clone git@github.com:Barath19/Boxer3D.git\n   cd Boxer3D\n   ```\n\n2. **Download models** from [Hugging Face](https://huggingface.co/Barath/boxer3d)\n   ```bash\n   pip install huggingface_hub\n   huggingface-cli download Barath/boxer3d --local-dir boxer/\n   ```\n   This places the following in the `boxer/` directory:\n   - `BoxerNet.onnx` (~391 MB, float32) — exported from BoxerNet checkpoint\n   - `yolo11n.onnx` (~10 MB, float32) — exported from Ultralytics YOLO11n\n\n3. **Open in Xcode**\n   ```bash\n   open boxer.xcodeproj\n   ```\n   Xcode will automatically resolve the ONNX Runtime SPM dependency.\n\n4. **Build & Run** on your iPhone (Cmd+R)\n\n## Models\n\n| Model | Size | Input | Output |\n|-------|------|-------|--------|\n| **yolo11n** | 10 MB | (1, 3, 640, 640) RGB | (1, 84, 8400) boxes + classes |\n| **BoxerNet** | 391 MB | (1, 3, 960, 960) RGB + (1, 1, 60, 60) depth + (1, M, 4) boxes + (1, 3600, 6) rays | (M, 3) center, (M, 3) size, (M,) yaw, (M,) confidence |\n\nBoth models run with ONNX Runtime CoreML Execution Provider for Metal/Neural Engine acceleration.\n\n## Dependencies\n\n- [ONNX Runtime](https://github.com/microsoft/onnxruntime-swift-package-manager) v1.24.2 (via SPM)\n- ARKit, SceneKit, SwiftUI (built-in)\n\n## Roadmap\n\n- [x] Port BoxerNet to Swift\n- [x] Convert BoxerNet.pt to ONNX\n- [x] Upload ONNX weights for download\n- [ ] Optimize for portrait mode\n\n## Acknowledgments\n\nBased on **Boxer: Robust Lifting of Open-World 2D Bounding Boxes to 3D** by Daniel DeTone, Tianwei Shen, Fan Zhang, Lingni Ma, Julian Straub, Richard Newcombe, and Jakob Engel (Meta Reality Labs Research).\n\n- [Project page](https://facebookresearch.github.io/boxer/)\n- [GitHub](https://github.com/facebookresearch/boxer)\n\n```bibtex\n@article{boxer2026,\n  title={Boxer: Robust Lifting of Open-World 2D Bounding Boxes to 3D},\n  author={Daniel DeTone and Tianwei Shen and Fan Zhang and Lingni Ma \n          and Julian Straub and Richard Newcombe and Jakob Engel},\n  year={2026},\n}\n```\n","summary":"Boxer3D turns iPhone LiDAR+camera data into real‑time, AR‑anchored 3‑D bounding boxes by combining YOLO11n 2‑D detections with BoxerNet’s 7‑DOF 3‑D lifting. The framework uses ONNX Runtime CoreML on iOS to run a 10 MB YOLO model and a 391 MB BoxerNet model, then maps depth and pose from ARKit to wireframe boxes rendered in SceneKit. It requires an iPhone 12 Pro or newer running iOS 16+, and can be set up with a single model download from Hugging Face. The tool is ideal for AR developers, computer‑vision researchers, and anyone needing lightweight, portable 3‑D object detection on mobile.","description":"AR 3D object detection for iPhone with LiDAR — YOLO 2D + BoxerNet 3D lifting","stars":181,"language":"Swift"},{"owner":"seojoonkim","repo":"memkraft","url":"https://github.com/seojoonkim/memkraft","readme":"<img src=\"assets/memkraft-banner.webp\" alt=\"MemKraft - Zero-dependency compound memory for AI agents\" width=\"100%\">\n\n# MemKraft 🧠\n\n**v0.8.2** · Ultimate zero-dependency compound knowledge system for AI agents. Auto-extract, classify, search, and maintain memory in plain Markdown. **Debugging is memory. Time travel is memory. Multi-agent handoffs are memory. Facts have bitemporal validity. Memories decay reversibly. Wiki links build graphs.**\n\n> **Plain Markdown source-of-truth · zero deps · zero keys.**\n> In 30 seconds: `pipx install memkraft && memkraft init && memkraft agents-hint claude-code`\n\n<div align=\"center\">\n\n<br>\n\n[![PyPI][pypi-badge]][pypi-url]\n[![Python][python-badge]][pypi-url]\n[![License][license-badge]][license-url]\n[![Tests][tests-badge]](#)\n[![Dependencies][deps-badge]][pypi-url]\n\n[pypi-badge]: https://img.shields.io/pypi/v/memkraft?style=for-the-badge&color=blue\n[python-badge]: https://img.shields.io/badge/python-3.9%2B-blue?style=for-the-badge\n[license-badge]: https://img.shields.io/badge/license-MIT-green?style=for-the-badge\n[tests-badge]: https://img.shields.io/badge/tests-525%20passed-brightgreen?style=for-the-badge\n[deps-badge]: https://img.shields.io/badge/dependencies-zero-brightgreen?style=for-the-badge\n[pypi-url]: https://pypi.org/project/memkraft/\n[license-url]: LICENSE\n\n<br>\n\n[Quick Start](#quick-start) · [Features](#features) · [API Reference](#api-reference) · [CLI Reference](#cli-reference) · [Architecture](#architecture) · [Changelog](#changelog)\n\n</div>\n\n<br>\n\n[![PyPI](https://img.shields.io/pypi/v/memkraft.svg)](https://pypi.org/project/memkraft/)\n[![Python](https://img.shields.io/pypi/pyversions/memkraft.svg)](https://pypi.org/project/memkraft/)\n[![Downloads](https://img.shields.io/pypi/dm/memkraft.svg)](https://pypi.org/project/memkraft/)\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](LICENSE)\n\n## 30-Second Quickstart\n\n```bash\npip install memkraft\nmemkraft init                   # → creates ./memory/ with RESOLVER, TEMPLATES, entities/, ...\nmemkraft agents-hint claude-code >> AGENTS.md   # your agent is now memory-aware\n```\n\n### Or scaffold a full project\n\n```bash\nmemkraft init --template claude-code   # CLAUDE.md + memory/ + examples\nmemkraft init --template cursor        # .cursorrules + memory/\nmemkraft init --template mcp           # claude_desktop_config snippet + memory/\nmemkraft init --template rag           # retrieval-focused structure\nmemkraft init --template minimal       # just memory/entities/\nmemkraft templates list                # see all presets\n```\n\nTemplates are **idempotent** — re-running `init --template X` never overwrites your edits.\n\nOr in Python:\n\n```python\nfrom memkraft import MemKraft\nmk = MemKraft(\"./memory\"); mk.init()\nmk.track(\"Simon Kim\", entity_type=\"person\", source=\"news\")\nmk.update(\"Simon Kim\", info=\"Launched MemKraft 0.8.1\", source=\"PyPI\")\nmk.search(\"MemKraft\")\n```\n\nThat's it. Your agent now has persistent memory as plain markdown files.\nNo API keys. No database. No config. Just `.md` files you own.\n\n### Optional extras\n\n```bash\npip install 'memkraft[mcp]'      # + MCP server  (`python -m memkraft.mcp`)\npip install 'memkraft[watch]'    # + auto-reindex on save (`memkraft watch`)\npip install 'memkraft[all]'      # everything\n```\n\n## Connect Any Agent in 30 Seconds\n\n`memkraft agents-hint <target>` prints copy-paste-ready integration snippets:\n\n```bash\nmemkraft agents-hint claude-code   # → CLAUDE.md / AGENTS.md block\nmemkraft agents-hint openclaw      # → AGENTS.md block for ОpenClaw\nmemkraft agents-hint cursor        # → .cursorrules block\nmemkraft agents-hint openai        # → Custom GPT / function-calling schema\nmemkraft agents-hint mcp           # → claude_desktop_config.json snippet\nmemkraft agents-hint langchain     # → LangChain StructuredTool wrappers\n```\n\nPaste the output. Done. Or pipe it straight into your config:\n\n```bash\nmemkraft agents-hint claude-code >> AGENTS.md\n```\n\nSee [`examples/`](examples/) for runnable variants.\n\n## What Makes MemKraft Different\n\n|                        | **MemKraft**   | Mem0        | Letta    |\n|------------------------|----------------|-------------|----------|\n| Dependencies           | **0**          | many        | many     |\n| API key required       | **No**         | Yes         | Yes      |\n| Source of truth        | Plain `.md`    | Cloud/DB    | DB       |\n| Local-first            | ✅             | —           | —        |\n| Git-friendly           | ✅             | —           | —        |\n\n## More CLI & Python Usage\n\n```bash\nmemkraft init\nmemkraft extract \"Simon Kim is the CEO of Hashed in Seoul.\" --source \"news\"\nmemkraft brief \"Simon Kim\"\nmemkraft doctor                          # 🟢/🟡/🔴 health check with fix hints\nmemkraft doctor --fix --yes              # auto-repair missing structure (create-only, never deletes)\nmemkraft stats --export json             # workspace stats for CI dashboards\nmemkraft mcp doctor                      # validate MCP server readiness\nmemkraft mcp test                        # remember→search→recall smoke test\n```\n\nMCP (Claude Desktop / Cursor) setup: see [`docs/mcp-setup.md`](docs/mcp-setup.md).\n\n### Python Usage\n\n```python\nfrom memkraft import MemKraft\n\nmk = MemKraft(\"/path/to/memory\")\nmk.init()  # returns {\"created\": [...], \"exists\": [...], \"base_dir\": \"...\"}\n\n# Extract entities & facts from text\nmk.extract_conversations(\"Simon Kim is the CEO of Hashed.\", source=\"news\")\n\n# Track an entity\nmk.track(\"Simon Kim\", entity_type=\"person\", source=\"news\")\nmk.update(\"Simon Kim\", info=\"Launched MemKraft\", source=\"X/@simonkim_nft\")\n\n# Search with fuzzy matching\nresults = mk.search(\"venture capital\", fuzzy=True)\n\n# Agentic multi-hop search with context-aware re-ranking\nresults = mk.agentic_search(\n    \"who is the CEO of Hashed\",\n    context=\"crypto investment research\",  # Conway SMS: same query, different context → different ranking\n    file_back=True,  # feedback loop: results auto-filed back to entity timelines\n)\n\n# Run health check (5 self-diagnostic assertions)\nreport = mk.health_check()\n# → {\"pass_rate\": 80.0, \"health_score\": \"A\", ...}\n\n# Dream Cycle - nightly maintenance\nmk.dream(dry_run=True)\n```\n\n<details>\n<summary><b>More CLI examples - 6 daily patterns that cover 90% of use</b></summary>\n\n<br>\n\n```bash\n# 1. Extract & Track - auto-detect entities from any text\nmemkraft extract \"Simon Kim is the CEO of Hashed in Seoul.\" --source \"news\"\nmemkraft extract \"Revenue grew 85% YoY\" --confidence verified --when \"bull market\"\nmemkraft track \"Simon Kim\" --type person --source \"X/@simonkim_nft\"\nmemkraft update \"Simon Kim\" --info \"Launched MemKraft\" --source \"X/@simonkim_nft\"\n\n# 2. Search & Recall - find anything in your memory\nmemkraft search \"venture capital\" --fuzzy\nmemkraft search \"Seoul VC\" --file-back           # feedback loop: auto-file to timelines\nmemkraft lookup \"Simon\" --brain-first\nmemkraft agentic-search \"who is the CEO of Hashed\" --context \"meeting prep\"\n\n# 3. Meeting Prep - compile all context before a meeting\nmemkraft brief \"Simon Kim\"\nmemkraft brief \"Simon Kim\" --file-back            # record brief generation in timeline\nmemkraft links \"Simon Kim\"\n\n# 4. Ingest & Classify - inbox → structured pages (safe by default)\nmemkraft cognify            # recommend-only; add --apply to move files\nmemkraft detect \"Jack Ma and 马化腾 discussed AI\" --dry-run\n\n# 5. Log & Reflect - structured audit trail\nmemkraft log --event \"Deployed v0.3\" --tags deploy --importance high\nmemkraft retro              # daily Well / Bad / Next retrospective\n\n# 6. Maintain & Heal - Dream Cycle keeps memory healthy\nmemkraft health-check       # 5 assertions → pass rate + health score (A/B/C/D)\nmemkraft dream --dry-run    # nightly: sources, duplicates, bloated pages\nmemkraft resolve-conflicts --strategy confidence  # resolve contradictory facts\nmemkraft diff               # what changed since last maintenance?\nmemkraft open-loops         # find all unresolved items\n\n# 7. Debug Hypothesis Tracking - \"Debugging is Memory\"\nmemkraft debug start \"API returns 500 on POST /users\"\nmemkraft debug hypothesis \"Database connection timeout\"\nmemkraft debug evidence \"DB pool healthy\" --result contradicts\nmemkraft debug reject --reason \"DB is fine\"\nmemkraft debug hypothesis \"Request validation missing\"\nmemkraft debug evidence \"Empty POST triggers 500\" --result supports\nmemkraft debug confirm\nmemkraft debug end \"Added request body validation\"\nmemkraft debug search-rejected \"timeout\"  # avoid past mistakes\n```\n\n</details>\n\n<br>\n\n## Features\n\n### Ingestion & Extraction\n\n| Feature | Description |\n|---------|-------------|\n| **Auto-extract** | Pipe any text in, get entities + facts out. Regex-based NER for EN, KR, CN, JP - no LLM calls. |\n| **CJK detection** | 806 stopwords, 100 Chinese surnames, 85 Japanese surnames, Korean particle stripping. |\n| **Cognify pipeline** | Routes `inbox/` items to the right directory. Recommend-only by default - `--apply` to move. |\n| **Fact registry** | Extracts currencies, percentages, dates, quantities into a cross-domain index. |\n| **Originals capture** | Save raw text verbatim - no paraphrasing. |\n| **Confidence levels** | Tag facts as `verified` / `experimental` / `hypothesis`. Dream Cycle warns untagged facts. |\n| **Applicability conditions** | `--when \"condition\" --when-not \"condition\"` - facts get `When:` / `When NOT:` metadata. |\n\n### Search & Retrieval\n\n| Feature | Description |\n|---------|-------------|\n| **Fuzzy search** | `difflib.SequenceMatcher`-based. Works offline, zero setup. |\n| **Brain-first lookup** | Searches entities → notes → decisions → meetings. Stops after sufficient high-relevance results. |\n| **Agentic search** | Multi-hop: decompose query → search → traverse `[[wiki-links]]` → re-rank by tier/recency/confidence/applicability. |\n| **Goal-weighted re-ranking** | Conway SMS: same query with different `--context` produces different rankings. |\n| **Feedback loop** | `--file-back`: search results auto-filed back to entity timelines (compound interest for memory). |\n| **Progressive disclosure** | 3-level query: L1 index (~50 tokens) → L2 section headers → L3 full file. |\n| **Backlinks** | `[[entity-name]]` cross-references. See every page that references an entity. |\n| **Link suggestions** | Auto-suggest missing `[[wiki-links]]` based on known entity names. |\n\n### Structure & Organization\n\n| Feature | Description |\n|---------|-------------|\n| **Compiled Truth + Timeline** | Dual-layer entity model: mutable current state + append-only audit trail with `[Source:]` tags. |\n| **Memory tiers** | Core / Recall / Archival - explicit context window priority. `promote` to reclassify. |\n| **Memory type classification** | 8 types: identity, belief, preference, relationship, skill, episodic, routine, transient. |\n| **Type-aware decay** | Identity memories decay 10x slower than routine memories. Differential decay multipliers. |\n| **RESOLVER.md** | MECE classification tree - every piece of knowledge has exactly one destination. |\n| **Source attribution** | Every fact tagged with `[Source: who, when, how]`. Enforced by Dream Cycle. |\n| **Dialectic synthesis** | Auto-detect contradictory facts during `extract`, tag `[CONFLICT]`, generate `CONFLICTS.md`. |\n| **Conflict resolution** | `resolve-conflicts --strategy newest|confidence|keep-both|prompt`. |\n| **Live Notes** | Persistent tracking for people and companies. Auto-incrementing updates + timeline. |\n\n### Maintenance & Audit\n\n| Feature | Description |\n|---------|-------------|\n| **Dream Cycle** | Nightly auto-maintenance: missing sources, thin pages, duplicates, inbox age, bloated pages, daily notes. |\n| **Debug Hypothesis Tracking** | OBSERVE → HYPOTHESIZE → EXPERIMENT → CONCLUDE flow. Track hypotheses, evidence, rejections. Auto-switch warning after 2 failures. Search past sessions to avoid repeating failed approaches. |\n| **Health Check** | 5 self-diagnostic assertions: source attribution, orphan facts, duplicates, inbox freshness, unresolved conflicts. Pass rate % + health score (A/B/C/D). |\n| **Memory decay** | Older, unaccessed memories naturally decay - type-aware differential curves. |\n| **Fact dedup** | Detects and merges duplicate facts across entities. |\n| **Auto-summarize** | Condenses bloated pages while preserving key information. |\n| **Diff tracking** | See exactly what changed since the last Dream Cycle. |\n| **Open loop tracking** | Finds all pending / TODO / FIXME items across memory. |\n\n### Logging & Reflection\n\n| Feature | Description |\n|---------|-------------|\n| **Session logging** | JSONL event trail with tags, importance, entity, task, and decision fields. |\n| **Daily retrospective** | Auto-generated Well / Bad / Next from session events + file changes. |\n| **Decision distillation** | Scans events and notes for decision candidates. EN + KR keyword matching. |\n| **Meeting briefs** | One command compiles entity info, timeline, open threads, and a pre-meeting checklist. |\n\n### Debugging\n\n| Feature | Description |\n|---------|-------------|\n| ✅ **Debug Hypothesis Tracking** | OBSERVE→HYPOTHESIZE→EXPERIMENT→CONCLUDE loop with persistent failure memory. |\n\n### 📸 Memory Snapshots & Time Travel (v0.5.1)\n\n| Feature | Description |\n|---------|-------------|\n| **Snapshot** | Create a point-in-time manifest of all memory files (hash, size, summary, sections, fact count, link count). Optionally embed full content. |\n| **Snapshot List** | List all saved snapshots, newest first, with labels and metadata. |\n| **Snapshot Diff** | Compare two snapshots (or snapshot vs live state). Shows added, removed, modified, unchanged files with byte deltas. |\n| **Time Travel** | Search memory *as it was* at a past snapshot. Answer \"what did I know about X on March 1st?\" |\n| **Entity Timeline** | Track how a specific entity evolved across all snapshots — new, modified, unchanged, deleted states. |\n\n### 🧠 Channel Context Memory + Task Continuity + Agent Working Memory (v0.5.4)\n\n| Feature | Description |\n|---------|-------------|\n| **Channel Context Memory** | Per-channel context persistence. Save/load/update context keyed by channel ID (e.g. `telegram-46291309`). Stored in `.memkraft/channels/{channel_id}.json`. |\n| **Task Continuity Register** | Task lifecycle tracking with full history. `task_start` → `task_update` → `task_complete` + `task_history` + `task_list`. Each update stores timestamp + status + note. Stored in `.memkraft/tasks/{task_id}.json`. |\n| **Agent Working Memory** | Per-agent persistent context. `agent_save` / `agent_load` any working memory dict. Stored in `.memkraft/agents/{agent_id}.json`. |\n| **`agent_inject()`** | **The key feature.** Merges agent working memory + channel context + task history into a single ready-to-inject prompt block. Use this to give sub-agents full situational awareness. |\n\n```python\nfrom memkraft import MemKraft\n\nmk = MemKraft(\"/path/to/memory\")\n\n# Save channel context\nmk.channel_save(\"telegram-46291309\", {\n    \"summary\": \"DM with Simon\",\n    \"recent_tasks\": [\"vibekai deploy\", \"memkraft v0.5.4\"],\n    \"preferences\": {\"language\": \"ko\"},\n})\n\n# Register a task\nmk.task_start(\"deploy-001\", \"Deploy vibekai to production\",\n              channel_id=\"telegram-46291309\", agent=\"zeon\")\nmk.task_update(\"deploy-001\", \"active\", \"vercel build passed\")\n\n# Save agent working memory\nmk.agent_save(\"zeon\", {\n    \"key_context\": \"Simon's AI assistant\",\n    \"active_tasks\": [\"deploy-001\"],\n    \"learned\": [\"always report completion\", \"no silence\"],\n})\n\n# Inject merged context block into a sub-agent instruction\nblock = mk.agent_inject(\"zeon\",\n                        channel_id=\"telegram-46291309\",\n                        task_id=\"deploy-001\")\nprint(block)\n# ## Agent Working Memory\n# - **key_context:** Simon's AI assistant\n# - **active_tasks:** deploy-001\n# ...\n# ## Channel Context\n# - **summary:** DM with Simon\n# ...\n# ## Task Context\n# - **Task:** Deploy vibekai to production\n# - **Status:** active\n# - **History:**\n#   - [2026-04-15T...] active: vercel build passed\n```\n\n```python\nfrom memkraft import MemKraft\n\nmk = MemKraft(\"/path/to/memory\")\n\n# Take a snapshot before a big operation\nsnap = mk.snapshot(label=\"before-migration\", include_content=True)\n\n# ... time passes, memory changes ...\n\n# What changed?\ndiff = mk.snapshot_diff(snap[\"snapshot_id\"])  # vs live state\n# → {added: [...], removed: [...], modified: [...], unchanged_count: 42}\n\n# Search memory as it was at that snapshot\nresults = mk.time_travel(\"venture capital\", snapshot_id=snap[\"snapshot_id\"])\n\n# How did an entity evolve over time?\ntimeline = mk.snapshot_entity(\"Simon Kim\")\n# → [{snapshot_id, timestamp, fact_count, size, change_type: \"new\"}, ...]\n```\n\n<br>\n\n## 🐛 Debugging is Memory\n\nDebugging insights are too valuable to lose in scrollback. MemKraft treats the entire debug process as first-class memory.\n\n**The debug-hypothesis loop** - inspired by [Shen Huang's scientific debugging method](https://github.com/LichAmnesia/lich-skills/tree/main/skills/debug-hypothesis):\n\n```\nOBSERVE → HYPOTHESIZE → EXPERIMENT → CONCLUDE\n    ↑                        |\n    |    rejected?           |\n    +←── next hypothesis ←───+\n    |\n    all rejected? → back to OBSERVE\n```\n\n- `mk.start_debug(\"bug description\")` - begin a tracked session\n- `mk.log_hypothesis(bug_id, \"theory\", \"evidence\")` - record each theory\n- `mk.log_evidence(bug_id, hyp_id, \"test result\", \"supports|contradicts\")` - track proof\n- `mk.reject_hypothesis(bug_id, hyp_id, \"reason\")` - mark failed approaches\n- `mk.confirm_hypothesis(bug_id, hyp_id)` - lock in the root cause\n- `mk.end_debug(bug_id, \"resolution\")` - close session, feed back to memory\n\n**Why it matters:** rejected hypotheses are permanent memory. Next time you hit a similar bug, MemKraft surfaces what you already tried - no more repeating the same failed approaches.\n\n<br>\n\n## API Reference\n\n### `MemKraft(base_dir=None)`\n\nInitialize the memory system. If `base_dir` is not provided, uses `$MEMKRAFT_DIR` or `./memory`.\n\n```python\nfrom memkraft import MemKraft\nmk = MemKraft(\"/path/to/memory\")\n```\n\n### Core Methods\n\n| Method | Description |\n|--------|-------------|\n| `init(path=\"\")` | Create memory directory structure with all subdirectories and templates. |\n| `track(name, entity_type=\"person\", source=\"\")` | Start tracking an entity. Creates a live-note in `live-notes/`. |\n| `update(name, info, source=\"manual\")` | Append new information to a tracked entity's timeline. |\n| `brief(name, save=False, file_back=False)` | Generate a meeting brief for an entity. `file_back=True` records the brief generation in the entity timeline. |\n| `promote(name, tier=\"core\")` | Change memory tier: `core` / `recall` / `archival`. |\n| `list_entities()` | List all tracked entities with their types. |\n\n### Extraction & Classification\n\n| Method | Description |\n|--------|-------------|\n| `extract_conversations(input_text, source=\"\", dry_run=False, confidence=\"experimental\", applicability=\"\")` | Extract entities and facts from text. `confidence`: `verified` / `experimental` / `hypothesis`. `applicability`: `\"When: X \\| When NOT: Y\"`. |\n| `detect(text, source=\"\", dry_run=False)` | Detect entities in text (EN/KR/CN/JP). |\n| `cognify(dry_run=False, apply=False)` | Route inbox items to structured directories. Recommend-only by default. |\n| `extract_facts_registry(text=\"\")` | Extract numeric/date facts into cross-domain index. |\n| `detect_conflicts(entity_name, new_fact, source=\"\")` | Check for contradictory facts and tag with `[CONFLICT]`. |\n| `resolve_conflicts(strategy=\"newest\", dry_run=False)` | Resolve conflicts. Strategies: `newest`, `confidence`, `keep-both`, `prompt`. |\n| `classify_memory_type(text)` | Classify text into one of 8 memory types. |\n\n### Search\n\n| Method | Description |\n|--------|-------------|\n| `search(query, fuzzy=False)` | Search memory files. Returns list of `{file, score, context, line}`. |\n| `agentic_search(query, max_hops=2, json_output=False, context=\"\", file_back=False)` | Multi-hop search with query decomposition, link traversal, and goal-weighted re-ranking. `context` enables Conway SMS reconstructive ranking. `file_back` enables the feedback loop. |\n| `lookup(query, json_output=False, brain_first=False, full=False)` | Brain-first lookup: stop early on high-relevance hits unless `full=True`. |\n| `query(query=\"\", level=1, recent=0, tag=\"\", date=\"\")` | Progressive disclosure: L1=index, L2=sections, L3=full. |\n| `links(name)` | Show backlinks to an entity (`[[wiki-links]]`). |\n\n### Maintenance\n\n| Method | Description |\n|--------|-------------|\n| `dream(date=None, dry_run=False, resolve_conflicts=False)` | Run Dream Cycle. 6 health checks + optional conflict resolution. |\n| `health_check()` | Run 5 self-diagnostic assertions. Returns `{pass_rate, health_score, assertions}`. |\n| `decay(days=90, dry_run=False)` | Flag stale facts. Type-aware: identity decays 10x slower than routine. |\n| `dedup(dry_run=False)` | Find and merge duplicate facts. |\n| `summarize(name=None, max_length=500)` | Auto-summarize bloated entity pages. |\n| `diff()` | Show changes since last Dream Cycle. |\n| `open_loops(dry_run=False)` | Find unresolved items (TODO/FIXME/pending). |\n| `build_index()` | Build memory index at `.memkraft/index.json`. |\n| `suggest_links()` | Suggest missing `[[wiki-links]]`. |\n\n### Logging\n\n| Method | Description |\n|--------|-------------|\n| `log_event(event, tags=\"\", importance=\"normal\", entity=\"\", task=\"\", decision=\"\")` | Log a session event to JSONL. |\n| `log_read(date=None)` | Read session events for a date. |\n| `retro(dry_run=False)` | Generate daily retrospective (Well / Bad / Next). |\n| `distill_decisions()` | Scan for decision candidates in events and notes. |\n\n### Debug Hypothesis Tracking\n\n| Method | Description |\n|--------|-------------|\n| `start_debug(bug_description)` | Start a new debug session. Returns `{bug_id, file, status}`. |\n| `log_hypothesis(bug_id, hypothesis, evidence=\"\", status=\"testing\")` | Log a hypothesis. Auto-increments ID (H1, H2, ...). |\n| `get_hypotheses(bug_id)` | Get all hypotheses for a debug session. |\n| `reject_hypothesis(bug_id, hypothesis_id, reason=\"\")` | Reject a hypothesis. Preserved permanently for future reference. |\n| `confirm_hypothesis(bug_id, hypothesis_id)` | Confirm a hypothesis. Feeds back into memory. |\n| `log_evidence(bug_id, hypothesis_id, evidence_text, result=\"neutral\")` | Log evidence. Result: `supports` / `contradicts` / `neutral`. |\n| `get_evidence(bug_id, hypothesis_id=\"\")` | Get evidence entries, optionally filtered by hypothesis. |\n| `end_debug(bug_id, resolution)` | End session with resolution. Auto-feeds to memory. |\n| `get_debug_status(bug_id)` | Get current session status and hypothesis counts. |\n| `debug_history(limit=10)` | List past debug sessions. |\n| `search_debug_sessions(query)` | Search past sessions by description/hypothesis/resolution. |\n| `search_rejected_hypotheses(query)` | Search rejected hypotheses — anti-pattern detector. |\n\n### Memory Snapshots & Time Travel\n\n| Method | Description |\n|--------|-------------|\n| `snapshot(label=\"\", include_content=False)` | Create a point-in-time snapshot of all memory files. Returns `{snapshot_id, timestamp, label, file_count, total_bytes, path}`. |\n| `snapshot_list()` | List all saved snapshots, newest first. |\n| `snapshot_diff(snapshot_a, snapshot_b=\"\")` | Compare two snapshots, or a snapshot vs live state. Returns `{added, removed, modified, unchanged_count}`. |\n| `time_travel(query, snapshot_id=\"\", date=\"\")` | Search memory as it was at a past snapshot. Supports search by snapshot ID or date. |\n| `snapshot_entity(name)` | Track how a specific entity evolved across all snapshots (new/modified/unchanged/deleted). |\n\n<br>\n\n## CLI Reference\n\n```\nmemkraft <command> [options]\n```\n\n### Commands\n\n| Command | Description |\n|---------|-------------|\n| `init [--path DIR]` | Initialize memory structure |\n| `extract TEXT [--source S] [--dry-run] [--confidence C] [--when W] [--when-not W]` | Auto-extract entities and facts |\n| `detect TEXT [--source S] [--dry-run]` | Detect entities in text (EN/KR/CN/JP) |\n| `track NAME [--type T] [--source S]` | Start tracking an entity |\n| `update NAME --info INFO [--source S]` | Update a tracked entity |\n| `list` | List all tracked entities |\n| `brief NAME [--save] [--file-back]` | Generate meeting brief |\n| `promote NAME [--tier T]` | Change memory tier (core/recall/archival) |\n| `search QUERY [--fuzzy] [--file-back]` | Search memory files |\n| `agentic-search QUERY [--max-hops N] [--json] [--context C] [--file-back]` | Multi-hop agentic search |\n| `lookup QUERY [--json] [--brain-first] [--full]` | Brain-first lookup |\n| `query [QUERY] [--level 1\\|2\\|3] [--recent N] [--tag T] [--date D]` | Progressive disclosure query |\n| `links NAME` | Show backlinks to an entity |\n| `cognify [--dry-run] [--apply]` | Process inbox into structured pages |\n| `log --event E [--tags T] [--importance I] [--entity E] [--task T] [--decision D]` | Log session event |\n| `log --read [--date D]` | Read session events |\n| `retro [--dry-run]` | Daily retrospective |\n| `distill-decisions` | Scan for decision candidates |\n| `health-check` | Run 5 self-diagnostic assertions → health score |\n| `dream [--date D] [--dry-run] [--resolve-conflicts]` | Run Dream Cycle (nightly maintenance) |\n| `resolve-conflicts [--strategy S] [--dry-run]` | Resolve fact conflicts |\n| `decay [--days N] [--dry-run]` | Flag stale facts |\n| `dedup [--dry-run]` | Find and merge duplicates |\n| `summarize [NAME] [--max-length N]` | Auto-summarize bloated pages |\n| `diff` | Show changes since last Dream Cycle |\n| `open-loops [--dry-run]` | Find unresolved items |\n| `index` | Build memory index |\n| `suggest-links` | Suggest missing wiki-links |\n| `extract-facts [TEXT]` | Extract numeric/date facts |\n| `debug start DESC` | Start a new debug session (OBSERVE) |\n| `debug hypothesis TEXT [--bug-id ID] [--evidence E]` | Log a hypothesis (HYPOTHESIZE) |\n| `debug evidence TEXT [--bug-id ID] [--hypothesis-id H] [--result R]` | Log evidence (supports/contradicts/neutral) |\n| `debug reject [--bug-id ID] [--hypothesis-id H] [--reason R]` | Reject current hypothesis |\n| `debug confirm [--bug-id ID] [--hypothesis-id H]` | Confirm current hypothesis |\n| `debug status [--bug-id ID]` | Show debug session status |\n| `debug history [--limit N]` | List past debug sessions |\n| `debug end RESOLUTION [--bug-id ID]` | End debug session (CONCLUDE) |\n| `debug search QUERY` | Search past debug sessions |\n| `debug search-rejected QUERY` | Search rejected hypotheses (anti-patterns) |\n| `snapshot [--label L] [--include-content]` | Create a point-in-time memory snapshot |\n| `snapshot-list` | List all saved snapshots (newest first) |\n| `snapshot-diff SNAP_A [SNAP_B]` | Compare two snapshots or snapshot vs live state |\n| `time-travel QUERY [--snapshot ID] [--date YYYY-MM-DD]` | Search memory as it was at a past snapshot |\n| `snapshot-entity NAME` | Show how an entity evolved across snapshots |\n| `selfupdate [--dry-run]` | Self-upgrade MemKraft via pip when newer version on PyPI |\n| `doctor [--check-updates]` | Health check; with `--check-updates` also reports PyPI version status |\n\n<br>\n\n## Staying Up To Date\n\nMemKraft ships an opt-in self-upgrade flow so agents (and humans) never silently drift behind PyPI:\n\n```bash\nmemkraft doctor --check-updates   # 🟢 up to date / 🟡 update available / 🔴 PyPI unreachable\nmemkraft selfupdate               # pip install -U memkraft when newer\nmemkraft selfupdate --dry-run     # check only\n```\n\nClassic still works:\n\n```bash\npip install -U memkraft\n```\n\n**For agents:** add `memkraft doctor --check-updates` to your weekly skill or heartbeat — if it reports 🟡, ask the human before running `memkraft selfupdate`. Never auto-upgrade without explicit consent.\n\n**For maintainers:** pushing a `vX.Y.Z` git tag triggers `.github/workflows/release.yml`, which builds, verifies (`twine check`), publishes to PyPI, and cuts a GitHub Release. Requires a `PYPI_API_TOKEN` repo secret — add it at `Settings → Secrets and variables → Actions`.\n\n<br>\n\n## Architecture\n\n```\nRaw Input ──▶ Extract ──▶ Classify ──▶ Forge ──▶ Compound Knowledge\n     ▲            │                                      │\n     │        Confidence                                 │\n     │        Applicability                              │\n     │                                                   │\n     └──── Feedback Loop ◄── Brain-first recall ◄───────┘\n                              maintained by Dream Cycle + Health Check\n```\n\n### How It Works\n\n**Zero dependencies.** Built entirely from Python stdlib: `re` for NER, `difflib` for fuzzy search, `json` for structured data, `pathlib` for file ops. No vector DB, no LLM calls at runtime, no framework lock-in.\n\n**Compiled Truth + Timeline.** Every entity has two layers: a mutable *Compiled Truth* (current state) and an append-only *Timeline* with `[Source:]` tags. You get both \"what we know now\" and \"how we got here.\"\n\n**Auto-Extract pipeline.** Multi-stage NER: English Title Case → Korean particle stripping → Chinese surname detection (100 surnames) → Japanese surname detection (85 surnames) → fact extraction (`X is/was/leads Y`) → stopword filtering (806 KR/CN/JP stopwords).\n\n**Goal-weighted re-ranking (Conway SMS).** `agentic_search(\"X\", context=\"meeting prep\")` and `agentic_search(\"X\", context=\"investment analysis\")` return different rankings from the same data. Memory type, confidence, and applicability conditions all factor into scoring.\n\n**Feedback loop.** `--file-back` files search results back into entity timelines. Each query makes future queries richer - compound interest for memory.\n\n**Health Check.** 5 assertions: (1) source attribution, (2) no orphan facts, (3) no duplicates, (4) inbox freshness, (5) no unresolved conflicts. Returns a pass rate and letter grade (A/B/C/D).\n\n### Memory Directory Structure\n\n```\nmemory/\n├── .memkraft/           # Internal state (index.json, timestamps)\n├── sessions/            # Structured event logs (YYYY-MM-DD.jsonl)\n├── RESOLVER.md          # Classification decision tree (MECE)\n├── TEMPLATES.md         # Page templates with tier labels\n├── CONFLICTS.md         # Auto-generated conflict report\n├── open-loops.md        # Unresolved items hub\n├── fact-registry.md     # Cross-domain numeric/date facts\n├── YYYY-MM-DD.md        # Daily notes\n├── entities/            # People, companies, concepts (Tier: recall)\n├── live-notes/          # Persistent tracking targets (Tier: core)\n├── decisions/           # Decision records with rationale\n├── originals/           # Captured verbatim - no paraphrasing\n├── inbox/               # Quick capture before classification\n├── tasks/               # Work-in-progress context\n├── meetings/            # Briefs and notes\n└── debug/               # Debug sessions (DEBUG-YYYYMMDD-HHMMSS.md)\n```\n\n<br>\n\n## Comparison\n\n| | **MemKraft** | **Mem0** | **Letta** |\n|---|:---:|:---:|:---:|\n| **Storage** | Plain Markdown | Vector + Graph DB | DB-backed |\n| **Dependencies** | Zero | Vector DB + API | DB + runtime |\n| **Offline / git-friendly** | ✅ | ❌ | ❌ |\n| Auto-extract (EN/KR/CN/JP) | ✅ | ✅ (LLM) | - |\n| Agentic search | ✅ | - | - |\n| Goal-weighted re-ranking | ✅ | - | - |\n| Feedback loop | ✅ | - | - |\n| Confidence levels | ✅ | - | - |\n| Health check | ✅ | - | - |\n| Conflict detection & resolution | ✅ | - | - |\n| Source attribution | Required | - | - |\n| Dream Cycle | ✅ | - | - |\n| Memory tiers | ✅ | - | ✅ |\n| Type-aware decay | ✅ | - | - |\n| Debug hypothesis tracking | ✅ | - | - |\n| Memory snapshots & time travel | ✅ | ❌ | ❌ |\n| Entity evolution timeline | ✅ | ❌ | ❌ |\n| Snapshot diff | ✅ | ❌ | ❌ |\n| **Semantic search** | ❌ | ✅ | - |\n| **Graph memory** | ❌ | ✅ | - |\n| **Self-editing memory** | ❌ | - | ✅ |\n| **Cost** | Free | Free tier + paid | Free |\n\n**Choose MemKraft when:** you want portable, git-friendly, zero-dependency memory that works with any agent framework, offline, forever.\n\n**Choose something else when:** you need semantic/vector search, graph traversal, or a full agent runtime with virtual context management.\n\n<br>\n\n## Contributing\n\nPRs welcome. See [CONTRIBUTING.md](CONTRIBUTING.md).\n\n## License\n\n[MIT](LICENSE) - use it however you want.\n\n---\n\n## Changelog\n\n### v0.8.1 (2026-04-17)\n\nThe \"connect-any-agent-in-30-seconds\" release. **Fully backward-compatible.**\n\n- **`mk.init()` now returns a dict** (`{\"created\": [...], \"exists\": [...], \"base_dir\": \"...\"}`) so scripts and tests can branch on it without parsing stdout.\n- **`memkraft agents-hint <target>` CLI** — paste-ready integration blocks for `claude-code`, `openclaw`, `openai`, `cursor`, `mcp`, `langchain`. Supports `--format json` and `--base-dir`.\n- **`examples/` folder** — drop-in AGENTS.md, OpenAI function-calling, 10-line RAG loop.\n- **`python -m memkraft.mcp`** — MCP stdio server exposing `remember / search / recall / link`. Extras: `pip install 'memkraft[mcp]'`.\n- **`memkraft watch`** — filesystem auto-reindex. Extras: `pip install 'memkraft[watch]'`.\n- **`memkraft doctor`** — health check with 🟢/🟡/🔴 icons and fix hints.\n- 515 tests passing (was 492, +23 new).\n\n### v0.8.0 (2026-04-17)\n\nFour new subsystems — all zero-dep, all backward-compatible.\n\n**1. Bitemporal Fact Layer** — track facts with separate `valid_time` and `record_time`.\n```python\nmk.fact_add(\"Simon\", \"role\", \"CEO of Hashed\", valid_from=\"2020-03-01\")\nmk.fact_add(\"Simon\", \"role\", \"CTO\", valid_from=\"2018-01-01\", valid_to=\"2020-02-29\")\nmk.fact_at(\"Simon\", \"role\", as_of=\"2019-06-01\")   # -> {\"value\": \"CTO\", ...}\nmk.fact_history(\"Simon\")                           # full timeline, recorded-order\nmk.fact_invalidate(\"Simon\", \"role\", invalid_at=\"2026-04-17\")\n```\nStored as inline Markdown markers in `memory/facts/<slug>.md` — human-readable, git-diffable.\n\n**2. Memory Tier Labels + Working Set** — Letta-style `core | recall | archival` via a single YAML frontmatter line.\n```python\nmk.tier_set(memory_id, tier=\"core\")\nmk.tier_promote(memory_id)     # archival -> recall -> core\nmk.tier_demote(memory_id)\nmk.tier_list(tier=\"core\")\nmk.working_set(limit=10)       # all core + recently-accessed recall\n```\n\n**3. Reversible Decay + Tombstone** — memories fade numerically instead of being deleted, and tombstoned files move to `.memkraft/tombstones/` (still restorable).\n```python\nmk.decay_apply(memory_id, decay_rate=0.5)     # weight 1.0 -> 0.5\nmk.decay_list(below_threshold=0.1)            # show faded memories\nmk.decay_run(criteria={\"weight_gt\": 0.5})     # batch decay (cron)\nmk.decay_tombstone(memory_id)                 # move to tombstones, still on disk\nmk.decay_restore(memory_id)                   # full undo — weight back to 1.0\n```\n\n**4. Cross-Entity Link Graph + Backlinks** — `[[Wiki Link]]` patterns become a bidirectional graph; the file system is the DB.\n```python\nmk.link_scan()                                # build/refresh index\nmk.link_backlinks(\"Simon\")                    # files that mention [[Simon]]\nmk.link_forward(\"inbox/notes.md\")             # entities referenced from a file\nmk.link_graph(\"Simon\", hops=2)                # N-hop neighbourhood\nmk.link_orphans()                             # entities referenced but never defined\n```\nIndex persisted at `.memkraft/links/backlinks.json` and `.memkraft/links/forward.json`.\n\n**Tests:** 409 → 492 (83 new across `test_v080_*`).\n\n### v0.7.0 (2026-04-15)\n\n- **`channel_update` modes:** `mode=\"append\"` (list append) and `mode=\"merge\"` (dict shallow merge) added. Default `mode=\"set\"` unchanged — fully backward compatible.\n- **Task delegation tracking:** `mk.task_delegate(task_id, from_agent, to_agent, context_note)` — delegate a task between agents with delegation events in history. `task_start()` gains optional `delegated_by` param.\n- **`agent_inject` filters:** `max_history` (default 5) limits task history entries. `include_completed_tasks=True` includes completed channel tasks in the inject block.\n- **Agent handoff:** `mk.agent_handoff(from_agent, to_agent, task_id, context_note)` — transfers working memory context, records handoff in `to_agent` memory, and delegates the task. Returns an inject-ready context block.\n- **Channel task listing:** `mk.channel_tasks(channel_id, status, limit)` — filter tasks by channel and status (`active`/`completed`/`all`), sorted by creation time descending.\n- **Task cleanup:** `mk.task_cleanup(max_age_days, archive)` — archive or delete completed tasks older than threshold. Archive goes to `.memkraft/tasks/archive/`.\n- **New CLI commands:** `channel-update --mode`, `task-delegate`, `channel-tasks`, `agent-handoff`, `task-cleanup`\n- **Tests:** 357 → 409 (52 new in `test_v070_multiagent.py`)\n\n### v0.5.4 (2026-04-15)\n\n- **Channel Context Memory:** `mk.channel_save()` / `mk.channel_load()` / `mk.channel_update()` — per-channel context persistence keyed by channel ID. Stored in `.memkraft/channels/{channel_id}.json`. Enables agents to recall channel-specific summaries, recent tasks, and preferences across sessions.\n- **Task Continuity Register:** `mk.task_start()` / `mk.task_update()` / `mk.task_complete()` / `mk.task_history()` / `mk.task_list()` — full task lifecycle with timestamped history. Stored in `.memkraft/tasks/{task_id}.json`.\n- **Agent Working Memory:** `mk.agent_save()` / `mk.agent_load()` / `mk.agent_inject()` — per-agent persistent working memory. The `agent_inject()` method merges agent memory + channel context + task history into a single ready-to-inject prompt block for sub-agent delegation.\n- **CLI commands:** `channel-save/load`, `task-start/update/list`, `agent-save/load/inject`\n- **zero-dependency maintained** (stdlib only: json, pathlib, datetime)\n- Tests: 328 → 377 (49 new in `test_v054_context.py`)\n\n### v0.5.1 (2026-04-14)\n\n- **Memory Snapshots & Time Travel:** `mk.snapshot()` / `mk.snapshot_list()` / `mk.snapshot_diff()` / `mk.time_travel()` / `mk.snapshot_entity()` — create point-in-time snapshots of all memory files (hash, size, summary, sections, fact count, link count), compare any two snapshots to see what changed, search memory as it was at a past date, and track how individual entities evolved over time\n- **CLI snapshot commands:** `memkraft snapshot` / `snapshot-list` / `snapshot-diff` / `time-travel` / `snapshot-entity`\n- Snapshot manifests saved as JSON under `.memkraft/snapshots/` — zero-dependency, git-friendly\n- Optional `--include-content` flag embeds full file text in snapshots for richer time-travel queries\n- Date-based time travel: `time-travel \"query\" --date 2026-03-01` finds the closest snapshot on or before that date\n- Tests: 277 → 328 (51 new for Snapshots & Time Travel)\n\n### v0.4.1 (2026-04-13)\n\n- README: comprehensive \"Debugging is Memory\" section with flow diagram, full API/CLI reference for debug methods\n- README: Appendix — Inspirations & Credits (8 projects with links)\n- Tests: 277 (79 new for Debug Hypothesis Tracking)\n\n### v0.4.0 (2026-04-13)\n\n- **Debug Hypothesis Tracking (Debugging is Memory):** `mk.start_debug()` / `mk.log_hypothesis()` / `mk.log_evidence()` / `mk.reject_hypothesis()` / `mk.confirm_hypothesis()` / `mk.end_debug()` - full OBSERVE→HYPOTHESIZE→EXPERIMENT→CONCLUDE loop with persistent failure memory, 2-fail auto-switch warning, anti-pattern detection via `search_rejected_hypotheses()`, and feedback into entity timelines\n- **CLI debug commands:** `memkraft debug start|hypothesis|evidence|reject|confirm|status|history|search-rejected`\n- Tests: 198 → 277\n\n### v0.3.0 (2026-04-13)\n\n- **Query-to-Memory Feedback Loop:** `agentic-search --file-back` / `search --file-back` - search results auto-filed back to entity timelines (compound interest for memory)\n- **Confidence Levels:** All facts support `verified` / `experimental` / `hypothesis` tags; `extract --confidence verified`; Dream Cycle warns about untagged facts; agentic-search re-ranking weights by confidence; conflict resolution via `--strategy confidence`\n- **Memory Health Assertions:** `memkraft health-check` - 5 self-diagnostic assertions (source attribution, orphan facts, duplicates, inbox freshness, unresolved conflicts) with pass rate % and health score (A/B/C/D); auto-runs in Dream Cycle\n- **Applicability Conditions:** `extract --when \"condition\" --when-not \"condition\"` - facts get `When:` / `When NOT:` metadata; agentic-search boosts results matching current context's applicability conditions\n- **Python re-export:** `from memkraft import MemKraft` now works directly\n- Tests: 158 → 198\n\n### v0.2.0 (2026-04-12)\n\n- **Goal-Weighted Reconstructive Memory (Conway SMS):** `agentic-search --context` - same query with different context produces different result rankings; memory-type-aware re-ranking with differential decay curves\n- **Dialectic Synthesis:** Auto-detect contradictory facts during `extract`, tag with `[CONFLICT]`, generate `CONFLICTS.md` report, resolve via `dream --resolve-conflicts` or `resolve-conflicts` command\n- **Memory Type Classification:** 8 memory types (identity, belief, preference, relationship, skill, episodic, routine, transient) with differential decay multipliers\n- **Type-Aware Decay:** Identity memories decay 10x slower than routine memories\n- Tests: 112 → 158\n\n### v0.1.0 (2026-04-12)\n\n- Initial release: extract, detect, decay, dedup, summarize, agentic search\n- Entity tracking (track, update, brief, promote)\n- Dream Cycle (7 health checks), cognify, retro\n- Hybrid search (exact + IDF-weighted + fuzzy), agentic multi-hop search\n- Zero dependencies - stdlib only\n\n---\n\n<div align=\"center\">\n\n**MemKraft** - *Agents don't learn. They search. Until now.*\n\n[GitHub](https://github.com/seojoonkim/memkraft) · [PyPI](https://pypi.org/project/memkraft/) · [Issues](https://github.com/seojoonkim/memkraft/issues)\n\n## Appendix: Inspirations & Credits\n\nMemKraft stands on the shoulders of giants. These projects and ideas shaped our approach:\n\n| Project | Inspiration | Link |\n|---------|------------|------|\n| **Karpathy auto-research** | Evidence-based autonomous research methodology | [Tweet](https://x.com/karpathy/status/1906697764923920553) |\n| **Shen Huang debug-hypothesis** | Scientific debugging: hypothesis-driven, max 5-line experiments | [GitHub](https://github.com/LichAmnesia/lich-skills/tree/main/skills/debug-hypothesis) · [Tweet](https://x.com/ShenHuang_/status/2043469166418735204) |\n| **Letta (MemGPT)** | Tiered memory architecture (core / archival / recall) | [GitHub](https://github.com/letta-ai/letta) |\n| **mem0** | Agent memory extraction and retrieval patterns | [GitHub](https://github.com/mem0ai/mem0) |\n| **Zep** | Temporal memory decay and entity extraction | [GitHub](https://github.com/getzep/zep) |\n| **MemoryWeaver** | Dialectic synthesis and memory reconstruction | [GitHub](https://github.com/pchaganti/gx-memory-weaver) |\n| **Shubham Saboo's 6-agent system** | OpenClaw-based multi-agent + SOUL.md / MEMORY.md pattern | [Article](https://x.com/Saboo_Shubham_/article) |\n| **Karpathy llm-wiki** | Wiki-style structured knowledge for LLMs | [Tweet](https://x.com/karpathy/status/2042079355925164424) |\n\n*\"If I have seen further, it is by standing on the shoulders of giants.\"*\n\nThank you to all these creators for sharing their work openly. MemKraft exists because of you.\n\n</div>\n","summary":"MemKraft is a zero‑dependency, file‑based memory system that lets AI agents persist, search, and manage knowledge entirely in plain Markdown. It automatically extracts, classifies, and indexes facts with bitemporal validity, allowing reversible memory decay, graph‑based link building, and easy integration via CLI hooks or API calls. The tool ships with templated setups for popular frameworks (Claude‑code, LangChain, OpenAI, etc.) and optional auto‑reindexing and MCP server support, all without requiring external databases or API keys. Developers and researchers building conversational or retrieval‑augmented agents will benefit from the simplicity of owning their memory files while still gaining powerful persistence and search capabilities.","description":"Ultimate zero-dependency compound knowledge system for AI agents. Auto-extract, classify, search, and maintain memory in plain Markdown.","stars":83,"language":"Python"},{"owner":"jlabon2","repo":"PsUi","url":"https://github.com/jlabon2/PsUi","readme":"# PsUi\n\n[![PowerShell Gallery](https://img.shields.io/powershellgallery/v/PsUi?label=PSGallery&color=blue)](https://www.powershellgallery.com/packages/PsUi)\n![Downloads](https://img.shields.io/powershellgallery/dt/PsUi?color=green)\n![PowerShell 5.1+](https://img.shields.io/badge/PowerShell-5.1%2B-5391FE?logo=powershell&logoColor=white)\n![Tests](https://img.shields.io/github/actions/
