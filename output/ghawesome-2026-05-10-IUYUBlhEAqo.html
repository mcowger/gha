re\n\n```\npackages/\n  protocol/       Shared types, schemas, constants\n  discovery/      mDNS peer discovery (LAN mode)\n  daemon/         Fastify server — the laptop side\n  relay/          Cloudflare Worker (Durable Object) — the phone-control relay\n  deploy-relay/   npx CLI for one-command Worker deploy\n  cli/            loopsy binary\n  mcp-server/     MCP server for AI coding agents (LAN mode)\n  dashboard/      Local web dashboard\napps/\n  mobile/         Flutter iOS/Android app (in submission review)\n```\n\n## Development\n\n```bash\ngit clone https://github.com/leox255/loopsy.git\ncd loopsy\npnpm install\npnpm build\nnode packages/cli/dist/index.js init\nnode packages/cli/dist/index.js start\n```\n\nReleases are tag-driven. Pushing a `v*` tag publishes both `loopsy` and `@loopsy/deploy-relay` to npm via OIDC Trusted Publisher with provenance attestations.\n\n## License\n\nApache 2.0 — see [LICENSE](LICENSE).\n","summary":"Loopsy lets you control a laptop’s terminal from your phone by connecting through a lightweight Cloudflare Worker relay, turning your phone into a portable command‑line interface. It offers a full-featured PTY with ANSI support, persistent sessions that survive disconnections, voice input via the Web Speech API, and per‑session auto‑approval settings. The solution can be used with a public maintained relay or self‑hosted on the free Cloudflare Workers tier for full privacy, making it ideal for developers, sysadmins, and power users who need on‑the‑go terminal access or want to command their laptop from a mobile device.","description":"Cross-machine AI agent communication, plus a mobile app to control any terminal on your machine.","stars":104,"language":"TypeScript"},{"owner":"carlovalenti","repo":"TRiP","url":"https://github.com/carlovalenti/TRiP","readme":"# TRiP — TRansformer in Progress\n\nA few-files, all-in-one C engine for Transformer AI models: inference, training, tokenizer creation, chat, and vision.\n\nBuilt from scratch over 18 months (from March 2024 to August 2025) during my lunch breaks and weekend nights, TRiP exists just because I wanted to truly understand the transformer internals - from the matrix multiplications up.\n\nTRiP's purpose is purely educational, for me and for anyone willing to learn about transformers. It supports Gemma 1, Llama 2, PaliGemma, and GPT-2, with full inference and training. It does not aim to track the latest model releases, and is not trying to compete with llama.cpp.\n\nNOTE: since people are asking:\nhere's what's AI-generated in the code:\n- the json parser (with some fix)\n- the safetensors checkpoint save function\n- the whole jpeg-X11 management functions (I had no interest in developing them)\n- the final file split (I initially wrote everything as main.c :D )\n- some revisions of the comments before I made the commit\n- this readme, for the most part :D\n\nThat's all, I think; the rest, it's all hand-coded by me. And it would had no sense otherwise, since the whole point in doing this was: to achieve the closest to a full-stack understanding of the transformer internals.\n\n\n## What TRiP supports\n\n- **Architectures:** Llama2, Gemma 1.0/1.1, PaliGemma 1 (vision+language), GPT-2\n- **Checkpoint formats:** SafeTensors (HuggingFace), Karpathy's llama2.c and gpt2 formats\n- **Weight types:** bf16, float16, float32\n- **Training:** full backpropagation with AdamW, cosine annealing LR, gradient clipping\n- **Tokenizer:** BPE (SentencePiece-compatible), with vocabulary creation from scratch\n- **Inference:** greedy, top-k, and nucleus (top-p) sampling\n- **Chat:** interactive chat with Llama, Gemma, and TinyLlama chat templates\n- **Vision:** multimodal inference with PaliGemma (JPEG input, X11 display)\n- **Memory:** RAM-optimized mode via mmap for large models on limited hardware\n\n## Building\n\n### Dependencies\n\n```\ngcc (recommended: version 13 or higher, to get support for bfloat16; with OpenMP support)\nlibjpeg-dev (or libjpeg62-turbo-dev)\nlibx11-dev\n```\n\nWARNING: do NOT expect higher performance with bfloat16 or float16 on CPUs; today's CPUs are not optimized for floating point operations in such formats, and float32 always performs best.\nThat surprised me a lot, too.\n\n\nOn Debian:\n```bash\nsudo apt install build-essential libomp-dev libjpeg62-turbo-dev libx11-dev\n```\n\nOn Ubuntu:\n```bash\nsudo apt install build-essential libomp-dev libjpeg-dev libx11-dev\n```\n\n\n### Windows (WSL)\n\nTRiP runs natively under WSL (Windows Subsystem for Linux). To enable\nthe X11 display features (vision mode, image display), install an X server\non the Windows side:\n\n- [VcXsrv](https://sourceforge.net/projects/vcxsrv/) (free, lightweight)\n- [Xming](http://www.straightrunning.com/XmingNotes/) (free version available)\n- [MobaXterm](https://mobaxterm.mobatek.net/) (has a built-in X server)\n\nThen in your WSL terminal, before running TRiP:\n\n```bash\nexport DISPLAY=:0\n```\n\nIf using WSL2 (most setups), use instead:\n\n```bash\nexport DISPLAY=$(cat /etc/resolv.conf | grep nameserver | awk '{print $2}'):0\n```\n\nX11 is only needed for vision mode. Chat, inference, and training work without it.\n\n\n### Compile\n\n```bash\nmake\n```\n\nThat's it. No cmake, no external frameworks, no Python. Just `make`.\n\n## Quick start\n\n### Chat with a Gemma model\n\nDownload a Gemma-2B-IT model from HuggingFace (safetensors format), then:\n\n```bash\n./trip --chat \\\n    --checkpoint gemma-2b-it/model.safetensors \\\n    --tokenizer gemma-2b-it/tokenizer.json \\\n    --chat_scheme GEMMA\n```\n\n### Run inference on a prompt\n\n```bash\n./trip --decode \\\n    --input_text=\"The capital of Italy is\" \\\n    --checkpoint gemma-2b-it/model.safetensors \\\n    --tokenizer gemma-2b-it/tokenizer.json\n```\n\nOr from a text file:\n\n```bash\n./trip --decode prompt.txt \\\n    --checkpoint gemma-2b-it/model.safetensors \\\n    --tokenizer gemma-2b-it/tokenizer.json\n```\n\n### Train a model\n\n```bash\n./trip --train \\\n    --checkpoint my_model/model.safetensors \\\n    --tokenizer my_model/tokenizer.json \\\n    --train_data my_dataset.txt \\\n    --train_config training_args.json\n```\n\n### Vision (PaliGemma)\n\n```bash\n./trip --vision photo.jpg \\\n    --checkpoint paligemma/model.safetensors \\\n    --tokenizer paligemma/tokenizer.json \\\n    --input_text=\"Describe this image\"\n```\n\n### Build a tokenizer vocabulary from scratch\n\n```bash\n./trip --build_vocab corpus.txt --vocab_size 32000 --tokenizer my_tokenizer.json\n```\n\n## Full CLI reference\n\n```\nUSAGE:\n  ./trip <ACTION> [OPTIONS...]\n```\n\n### Actions (pick one)\n\n| Flag | Description |\n|------|-------------|\n| `--decode [file]` | Run inference on a prompt (from file, `--input_text`, or stdin) |\n| `--chat` | Interactive chat session |\n| `--vision [image.jpg]` | Multimodal inference with an image |\n| `--train` | Train the model |\n| `--create` | Create a new model from a configuration file |\n| `--build_vocab <data.txt>` | Build a new tokenizer vocabulary from a text corpus |\n| `--utest` | Run unit tests |\n| `--help` | Show help |\n\n### Model & tokenizer options\n\n| Flag | Default | Description |\n|------|---------|-------------|\n| `--checkpoint <path>` | `default.model` | Path to model checkpoint file(s) |\n| `--checkpoint_type <type>` | `SAFETENSORS` | Format: `SAFETENSORS`, `LLAMA2_AK`, `GPT2_AK` |\n| `--configuration <path>` | (auto) | Path to `config.json` (for SafeTensors) |\n| `--tokenizer <path>` | `default.tokenizer` | Path to tokenizer file |\n| `--tokenizer_format <type>` | `JSON_HUGGINGFACE` | Format: `JSON_HUGGINGFACE`, `LLAMA2_AK`, `GPT2_AK` |\n| `--tokenizer_type <type>` | `SENTENCEPIECE` | Algorithm: `SENTENCEPIECE`, `TRIP` |\n\n### Inference & sampling options\n\n| Flag | Default | Description |\n|------|---------|-------------|\n| `--input_text=\"<prompt>\"` | — | Provide prompt text directly on the command line |\n| `--system_prompt \"<text>\"` | — | System prompt for chat mode |\n| `--chat_scheme <scheme>` | (none) | Chat template: `LLAMA`, `TINY_LLAMA`, `GEMMA` |\n| `--chat_save_context <file>` | — | Pre-process and save chat context for faster startup |\n| `--chat_load_context <file>` | — | Load a previously saved chat context |\n| `--temperature <value>` | `1.0` | Sampling temperature. `0.0` = greedy (always pick the most probable token) |\n| `--top_p <value>` | `0.9` | Nucleus sampling: sample from the smallest set of tokens whose cumulative probability exceeds this value |\n| `--top_k <value>` | (disabled) | Top-k sampling: sample from the k most probable tokens |\n| `--ram` | (off) | Memory-map weights instead of loading them (slower, uses less RAM) |\n\n### Training options\n\n| Flag | Default | Description |\n|------|---------|-------------|\n| `--train_config <path>` | `training_args.json` | Path to training configuration JSON |\n| `--train_data <path>` | `training_data.txt` | Path to training data (plain text) |\n\nIn \"examples/\", you can find an example for training_args.json, and a sample file to fine-tune GEMMA and TinyLlama using their chat template. Take care: models are VERY sensitive to correct use of their chat template when you fine-tune them.\n\n## File map\n\nTRiP is organized into 7 files. Open `trip.h` for the complete map.\n\n| File | Lines | What it contains |\n|------|-------|-----------------|\n| `trip.h` | ~900 | The map. Every type, struct, global, and declaration. |\n| `math.c` | ~3000 | Tensor ops, each forward+backward paired side by side: matmul, softmax, layernorm, RMSnorm, RoPE, attention, FFN activations, vector arithmetic |\n| `forward.c` | ~1500 | Forward pass orchestration + token sampling |\n| `backward.c` | ~1500 | Backward pass + AdamW optimizer + gradient management |\n| `model.c` | ~5500 | Checkpoint I/O, model init, memory management, tokenizer, vision preprocessing |\n| `utils.c` | ~1000 | Logging, JSON parser, terminal I/O, JPEG/X11 image handling |\n| `main.c` | ~1900 | CLI argument parsing, chat loop, training loop, inference loop |\n\n## How it works (for the curious)\n\nTRiP implements a transformer from first principles in C. No PyTorch, no TensorFlow, no ONNX — just linear algebra on arrays of floats.\n\nThe **residual stream** is the central concept: a vector that flows through the model like data on a bus. Each layer reads from it, processes it through attention and a feed-forward network, and writes back to it. The forward pass walks the layers top to bottom; the backward pass walks them bottom to top, computing gradients via the chain rule.\n\nEvery math operation (`math.c`) is implemented as a forward+backward pair: you can read `rmsnorm()` and immediately below it `rmsnorm_backward()`, and see exactly how the gradient flows through the same computation in reverse.\n\nI put a lot of comments in the code, both as reminders to me, and to render TRiP basically an annotated school book about transformers.\n\nFor a deeper understanding of backpropagation, see [Andrej Karpathy's lecture](https://www.youtube.com/watch?v=i94OvYb6noo); TRiP would never have existed without his work.\n\n## License\n\n[CC BY-NC 4.0](https://creativecommons.org/licenses/by-nc/4.0/) — free to use, study, modify, and share for non-commercial purposes, with attribution. For commercial licensing, contact the author.\n\n## Acknowledgments\n\n- **Andrej Karpathy** — for [llama2.c](https://github.com/karpathy/llama2.c), [nanoGPT](https://github.com/karpathy/nanoGPT), and the lectures that made all of this possible\n- **Google** — for releasing the Gemma model family\n- **Meta** — for releasing the Llama model family\n\n","summary":"TRiP is a lightweight, all‑in‑one C engine that implements Transformer models from the ground up, offering training, inference, tokenizer creation, chat, and even vision support. It supports Llama‑2, Gemma‑1, PaliGemma, and GPT‑2 checkpoints, with full back‑propagation, AdamW optimizer, and sampling strategies like greedy, top‑k and nucleus, while providing a memory‑efficient mmap mode for large models. Because it is written entirely in C without reliance on external frameworks, it allows fine‑grained inspection of matrix operations and low‑level optimizations for CPU workloads. The project is ideal for researchers, students, and hobbyists who want to tinker with transformer internals and run end‑to‑end experiments on modest hardware.","description":"A complete transformer engine in C — inference, training, chat, vision.","stars":61,"language":"C"},{"owner":"djayatillake","repo":"studybible-mcp","url":"https://github.com/djayatillake/studybible-mcp","readme":"# Study Bible MCP Server\n\nA Bible study assistant for Claude that provides full scholarly lexicons (LSJ Greek, BDB Hebrew, Abbott-Smith NT Greek), morphologically-tagged biblical texts, cross-references, Theographic genealogy graphs, Aquifer Open Study Notes, a Bible dictionary, key theological terms, Ancient Near East cultural context, and hermeneutical methodology based on Fee & Stuart's \"How to Read the Bible for All Its Worth\".\n\n## Quick Start\n\n### Claude Desktop\n\n1. Open **Settings** → **Connectors**\n2. Click **Add Custom Connector**\n3. Paste: `https://studybible-mcp.fly.dev/sse`\n4. Restart Claude Desktop\n\nThat's it. No signup, no API keys, no downloads.\n\n### Claude Code\n\n```bash\nclaude mcp add study-bible https://studybible-mcp.fly.dev/sse\n```\n\n### ChatGPT (Developer Mode)\n\n1. Open **Settings** → **Developer Mode** → enable it\n2. Go to **Actions** → **Add MCP Server**\n3. Enter URL: `https://studybible-mcp.fly.dev/mcp`\n\n### Cursor / Windsurf / Cline\n\nAdd to your MCP configuration (usually `.cursor/mcp.json`, `.windsurf/mcp.json`, or Cline settings):\n\n```json\n{\n  \"mcpServers\": {\n    \"study-bible\": {\n      \"command\": \"npx\",\n      \"args\": [\"-y\", \"mcp-remote\", \"https://studybible-mcp.fly.dev/sse\"]\n    }\n  }\n}\n```\n\n### Install via pip / uvx (local stdio)\n\n```bash\npip install studybible-mcp\nstudybible-mcp --transport stdio\n```\n\nOr run directly without installing:\n\n```bash\nuvx studybible-mcp --transport stdio\n```\n\n### Manual Config (Alternative)\n\nIf you prefer editing config files directly:\n\n```json\n{\n  \"mcpServers\": {\n    \"study-bible\": {\n      \"command\": \"npx\",\n      \"args\": [\"-y\", \"mcp-remote\", \"https://studybible-mcp.fly.dev/sse\"]\n    }\n  }\n}\n```\n\nConfig file locations:\n- macOS: `~/Library/Application Support/Claude/claude_desktop_config.json`\n- Windows: `%APPDATA%\\Claude\\claude_desktop_config.json`\n- Linux: `~/.config/Claude/claude_desktop_config.json`\n\n---\n\n## How It Works\n\n### Architecture Overview\n\n```\n┌─────────────────────┐     ┌──────────────────────────────────────────┐\n│   Claude Desktop    │     │   Study Bible MCP Server                 │\n│   or Claude Code    │     │   (Fly.io)                               │\n│                     │     │                                          │\n│  ┌───────────────┐  │ MCP │  ┌─────────────┐  ┌───────────────────┐  │\n│  │ User asks a   │──┼─────┼─▶│ MCP Server  │─▶│ SQLite DB (359MB) │  │\n│  │ Bible question│  │     │  │ (Python)    │  │                   │  │\n│  └───────────────┘  │     │  └─────────────┘  │ • Lexicons (LSJ,  │  │\n│                     │     │        │          │   BDB, Abbott-     │  │\n│  ┌───────────────┐  │     │        ▼          │   Smith, Strong's) │  │\n│  │ Claude uses   │◀─┼─────┼── Tool Results    │ • Tagged NT + OT  │  │\n│  │ 18 tools to   │  │     │                   │ • Names + ACAI    │  │\n│  │ look up data  │  │     │                   │ • Morphology      │  │\n│  └───────────────┘  │     │                   │ • Study Notes     │  │\n│                     │     │                   │ • Bible Dictionary │  │\n│                     │     │                   │ • Key Terms        │  │\n│                     │     │                   │ • ANE Context      │  │\n│                     │     │                   │ • Embeddings       │  │\n│                     │     │                   └───────────────────┘  │\n└─────────────────────┘     └──────────────────────────────────────────┘\n```\n\nWhen you ask Claude a Bible question:\n1. Claude analyses your question and decides which tools to use\n2. Claude calls the appropriate MCP tools (e.g., `lookup_verse`, `word_study`, `get_study_notes`)\n3. The server queries the pre-built SQLite database\n4. Results are returned to Claude\n5. Claude synthesises the data into a helpful response\n\nSee [ARCHITECTURE.md](ARCHITECTURE.md) for a full Mermaid flowchart of all 18 tools and how the agent chains them together.\n\n### The Database\n\nThe server includes a pre-built SQLite database (~600MB) containing:\n\n| Table | Rows | Content |\n|-------|------|---------|\n| `lexicon` | 19,391 | Greek (Full LSJ + Abbott-Smith NT) and Hebrew (Full BDB) word definitions with Strong's numbers |\n| `verses` | 31,280 | Every verse of the Bible with morphology tags |\n| `passages` | 5,290 | Verses grouped by ancient section markers |\n| `names` | 4,299 | Biblical people, places, and things |\n| `morphology` | 2,768 | Grammatical parsing code definitions |\n| `thematic_references` | 22 | Core theological theme cross-references |\n| `aquifer_content` | 102,673 | Study notes, dictionary articles, translation notes, key terms |\n| `acai_entities` | 3,175 | Rich entity annotations (people, places, groups, key terms) |\n| `ane_entries` | 87 | Ancient Near East cultural context entries across 12 dimensions |\n| `ane_book_mappings` | 314 | Maps ANE entries to biblical books and chapter ranges |\n| `verse_vectors` | 31,280 | OpenAI embeddings for semantic search |\n| `passage_vectors` | 5,190 | OpenAI embeddings for passage similarity |\n\n---\n\nYou can download the pre-built database directly: **[study_bible.db](https://studybible-mcp.fly.dev/download/study_bible.db)** (~600MB)\n\n---\n\n## Available Tools (18)\n\n### Core Text & Language\n\n#### 1. `lookup_verse`\n\nRetrieve a verse with its original language text and word-by-word analysis.\n\n**When Claude uses it**: User asks about a specific verse, wants to see the Greek or Hebrew text, or asks about specific words in a passage.\n\n**What it returns**: English translation, original Greek/Hebrew text, word-by-word breakdown with Strong's numbers, morphological parsing, genre-specific interpretation guidance.\n\n**Example**:\n```\nUser: \"Look up Romans 8:28 with the Greek\"\n\nClaude calls: lookup_verse(reference=\"Romans 8:28\", include_original=true)\n\nReturns:\n- Verse text in English\n- Greek: πάντα συνεργεῖ εἰς ἀγαθόν...\n- Word analysis: συνεργεῖ (G4903) = \"works together\" [V-PAI-3S]\n- Genre guidance: \"Epistles - What problem was being addressed?\"\n```\n\n#### 2. `word_study`\n\nDeep dive into a Greek or Hebrew word's meaning, usage, and etymology. Greek entries include both the full Liddell-Scott-Jones (LSJ) definition for classical breadth and the Abbott-Smith definition for NT-specific insight (with LXX/Hebrew equivalents, synonym discussions, and NT occurrence counts). Hebrew entries include the full Brown-Driver-Briggs (BDB) definition.\n\n**When Claude uses it**: User asks about the meaning of a Greek/Hebrew word, wants to understand different translations of a term, or asks about theological concepts (love, faith, grace).\n\n**What it returns**: Original word in Greek/Hebrew script, transliteration, Strong's number, brief definition, full LSJ or BDB scholarly definition, Abbott-Smith NT-focused definition (Greek words), LXX/Hebrew cross-references, synonym discussions, NT occurrence count, etymology, usage count, semantic range, related words, example passages.\n\n**Example**:\n```\nUser: \"What does 'agape' mean in Greek?\"\n\nClaude calls: word_study(strongs=\"G26\")\n\nReturns:\n- ἀγάπη (agapē, G26)\n- Brief Definition: \"love, goodwill, benevolence\"\n- Full LSJ Definition: [scholarly entry with classical and biblical usage]\n- Abbott-Smith Definition: [NT-focused entry with sense hierarchy]\n- LXX / Hebrew Equivalents: H0160 אַהֲבָה\n- Synonyms: SYN.: φιλία — love which chooses its object...\n- NT Usage: Occurs 116 times in the New Testament\n- Related words: ἀγαπάω (to love), ἀγαπητός (beloved)\n```\n\n#### 3. `search_lexicon`\n\nSearch across Greek and Hebrew lexicons by English meaning.\n\n**When Claude uses it**: User wants to find the Greek/Hebrew word for an English concept, asks \"How do you say X in Greek?\", or is exploring related words.\n\n**Example**:\n```\nUser: \"What are the Greek words for 'love'?\"\n\nClaude calls: search_lexicon(query=\"love\", language=\"greek\")\n\nReturns:\n- G26 ἀγάπη - divine, unconditional love\n- G5368 φιλέω - brotherly, affectionate love\n- G2309 θέλω - desire, wish\n```\n\n#### 4. `get_cross_references`\n\nFind passages related to a verse or theological theme.\n\n**When Claude uses it**: User asks \"What other passages talk about X?\", wants to see Scripture interpreting Scripture, or is studying a theological theme.\n\n**Built-in themes**: `salvation_by_grace`, `deity_of_christ`, `atonement`, `resurrection`, `holy_spirit`, `justification`.\n\n**Example**:\n```\nUser: \"What passages support salvation by grace alone?\"\n\nClaude calls: get_cross_references(theme=\"salvation_by_grace\")\n\nReturns:\n- Genesis 15:6 - Abraham believed, credited as righteousness\n- Romans 3:21-26 - Righteousness through faith in Christ\n- Ephesians 2:8-9 - Saved by grace through faith\n- Titus 3:5-7 - Not by works of righteousness\n```\n\n#### 5. `lookup_name`\n\nGet information about biblical people, places, and things, enriched with ACAI entity annotations (variant names, roles, reference counts, speech attributions).\n\n**When Claude uses it**: User asks \"Who was X?\", wants to know about a place's significance, or asks about relationships between biblical figures.\n\n**What it returns**: Original Hebrew/Greek form, type (person, place, thing), description, key references, relationships (father, mother, children), ACAI annotations (variant names, roles, verse reference count, attributed speeches).\n\n**Example**:\n```\nUser: \"Who was Abraham?\"\n\nClaude calls: lookup_name(name=\"Abraham\")\n\nReturns:\n- Type: Person\n- Original: אַבְרָהָם\n- Description, key references, family relationships\n- ACAI: Also known as \"Abram\", referenced in 275 verses, 52 attributed speeches\n```\n\n#### 6. `parse_morphology`\n\nExplain Greek or Hebrew grammatical parsing codes.\n\n**When Claude uses it**: User asks what a morphology code means or wants to understand verb tense, mood, voice.\n\n**Example**:\n```\nUser: \"What does V-AAI-3S mean?\"\n\nClaude calls: parse_morphology(code=\"V-AAI-3S\", language=\"greek\")\n\nReturns:\n- Part of Speech: Verb\n- Tense: Aorist, Voice: Active, Mood: Indicative\n- Person: 3rd, Number: Singular\n```\n\n#### 7. `search_by_strongs`\n\nFind all verses containing a specific Strong's number.\n\n**When Claude uses it**: User wants to see how a word is used throughout Scripture or is doing a comprehensive word study.\n\n**Example**:\n```\nUser: \"Show me all the places where 'hesed' (H2617) appears\"\n\nClaude calls: search_by_strongs(strongs=\"H2617\", limit=20)\n\nReturns:\n- H2617 חֶסֶד (hesed) - \"lovingkindness, steadfast love\"\n- Genesis 24:12, Exodus 34:6, Psalm 23:6, Psalm 136...\n```\n\n### Scholarly Commentary\n\n#### 8. `get_study_notes`\n\nGet scholarly study notes and translation notes for a Bible verse or chapter.\n\n**When Claude uses it**: User wants commentary on a specific verse, help explaining a difficult passage, or translation and cultural background notes.\n\n**What it returns**: Combined commentary from three sources: Aquifer Open Study Notes (66 books of concise verse-level scholarly commentary), unfoldingWord Translation Notes (translator-focused linguistic insights), and SIL Translator Notes (additional translation and cultural context).\n\n**Example**:\n```\nUser: \"What do the study notes say about John 3:16?\"\n\nClaude calls: get_study_notes(reference=\"John 3:16\")\n\nReturns:\n- Aquifer Open Study Notes: [verse commentary]\n- Translation Notes (UW): [linguistic insights]\n- Translation Notes (SIL): [cultural context]\n```\n\n#### 9. `get_bible_dictionary`\n\nLook up a topic in the Tyndale Bible Dictionary.\n\n**When Claude uses it**: User needs background information on a biblical topic, historical or cultural context, or a detailed article about a person, place, or concept.\n\n**What it returns**: Full dictionary article from a collection of 500+ topical articles covering biblical people, places, theological concepts, cultural practices, historical background, and archaeological findings.\n\n**Example**:\n```\nUser: \"Tell me about the Pharisees\"\n\nClaude calls: get_bible_dictionary(topic=\"Pharisees\")\n\nReturns: Full Tyndale Bible Dictionary article with historical background,\nbeliefs, practices, and NT context.\n```\n\n#### 10. `get_key_terms`\n\nLook up a key theological term in the FIA Key Terms database.\n\n**When Claude uses it**: User wants a precise definition of a theological term, or needs to understand how a concept is used across Scripture.\n\n**What it returns**: Definition from a collection of 200+ carefully defined theological and biblical terms with biblical usage, cross-references, and translation guidance.\n\n**Example**:\n```\nUser: \"Define the term atonement\"\n\nClaude calls: get_key_terms(term=\"atonement\")\n\nReturns: FIA Key Terms definition with biblical usage, cross-references,\nand translation guidance.\n```\n\n### Graph Knowledge (Theographic Bible Metadata)\n\n#### 11. `explore_genealogy`\n\nTrace family relationships (ancestors or descendants) for a biblical person using genealogical data for 1,100+ persons.\n\n**What it returns**: Family tree with generation numbers and relationship types, immediate family (spouse, siblings), Mermaid diagram.\n\n**Example**:\n```\nUser: \"Show me the family tree of David\"\n\nClaude calls: explore_genealogy(person=\"David\", direction=\"both\", generations=5)\n\nReturns: Ancestor chain (Jesse → Obed → Boaz...), descendants,\nspouse(s), siblings, Mermaid flowchart diagram.\n```\n\n#### 12. `explore_person_events`\n\nFind all events a biblical person participated in, in chronological order.\n\n**What it returns**: Timeline of a person's life events with locations and approximate dates, Mermaid timeline diagram.\n\n#### 13. `explore_place`\n\nExplore the biblical history of a geographic location.\n\n**What it returns**: Events at the location, people born or who died there, coordinates, Mermaid network diagram.\n\n#### 14. `find_connection`\n\nFind the family relationship path between two biblical people.\n\n**What it returns**: Shortest relationship path through parent, child, sibling, and partner relationships, Mermaid flowchart.\n\n**Example**:\n```\nUser: \"How are Ruth and Jesus related?\"\n\nClaude calls: find_connection(person1=\"Ruth\", person2=\"Jesus\")\n\nReturns: Ruth → child → Obed → child → Jesse → child → David → ... → Jesus\n```\n\n#### 15. `people_in_passage`\n\nFind all people, places, and events mentioned in a Bible passage.\n\n**What it returns**: All entities mentioned in a chapter or verse according to Theographic Bible Metadata.\n\n### Cultural Context\n\n#### 18. `get_ane_context`\n\nRetrieve Ancient Near East cultural and historical context that illuminates biblical passages. Covers 12 dimensions of ANE life across 9 time periods.\n\n**When Claude uses it**: User asks about cultural background, customs, practices, or worldview behind a passage; when understanding the original context would prevent modern misreadings.\n\n**What it returns**: Structured entries with title, summary, detailed explanation, ANE parallels from extra-biblical sources, interpretive significance, key references, and scholarly sources.\n\n**Dimensions**: Cosmology & Worldview, Religious Practices, Social Structure, Legal & Covenant, Political & Imperial, Economic Life, Literary Conventions, Warfare & Military, Daily Life & Material Culture, Death & Afterlife, Gender & Family, Education & Literacy.\n\n**Periods**: Patriarchal, Exodus/Conquest, Judges/Early Monarchy, United Monarchy, Divided Monarchy, Assyrian/Babylonian, Persian, Hellenistic, Roman.\n\n**Example**:\n```\nUser: \"What's the cultural background behind Genesis 15 - the covenant ceremony?\"\n\nClaude calls: get_ane_context(reference=\"Genesis 15:1\", dimension=\"legal_covenant\")\n\nReturns:\n- Suzerainty Treaty Forms: ANE covenant structure (preamble, stipulations,\n  witnesses, curses/blessings) parallels Deuteronomy and Genesis 15\n- Self-Maledictory Oath: Walking between animal halves = \"may I become\n  like these animals if I break this covenant\"\n- ANE Parallels: Hittite suzerainty treaties, Mari covenant rituals\n- Interpretive Significance: God alone passes through the pieces,\n  taking the covenant curse entirely upon himself\n```\n\n### Hybrid Search\n\n#### 16. `graph_enriched_search`\n\nCombine passage lookup with graph context for the most comprehensive single-query view of a verse.\n\n**What it returns**: Verse text (English + original), all people/places/events mentioned, family relationships for each person mentioned.\n\n#### 17. `find_similar_passages`\n\nDiscover semantically similar passages across the Bible using vector embeddings.\n\n**When Claude uses it**: User wants to find thematic connections not captured by explicit cross-references, or asks \"What passages are similar to X?\"\n\n**What it returns**: Similar passages ranked by semantic similarity (%), genre warnings, hermeneutical cautions.\n\n**Important**: Semantic similarity indicates shared vocabulary and concepts, but does NOT establish theological connection. The tool includes warnings to verify genre compatibility, authorial intent, and historical context.\n\n**Example**:\n```\nUser: \"Find passages similar to Daniel 7:7\"\n\nClaude calls: find_similar_passages(reference=\"Daniel 7:7\", limit=5)\n\nReturns:\n- Daniel 7:15-28 (70.0% similar) - interpretation of the vision\n- Revelation 9:17-21 (61.1% similar) - locusts with lion's teeth\n- Daniel 2:29-45 (60.8% similar) - Nebuchadnezzar's statue\n```\n\n---\n\n## How Users Interact\n\n### Natural Language Queries\n\nUsers don't need to know the tool names. They just ask questions:\n\n| User Question | Claude Uses |\n|--------------|-------------|\n| \"What does John 3:16 say in Greek?\" | `lookup_verse` |\n| \"What's the Greek word for love?\" | `search_lexicon` |\n| \"Study the word 'agape'\" | `word_study` |\n| \"Who was Abraham?\" | `lookup_name` |\n| \"What other passages talk about grace?\" | `get_cross_references` |\n| \"Parse V-AAI-3S\" | `parse_morphology` |\n| \"Where else does G26 appear?\" | `search_by_strongs` |\n| \"What do the study notes say about Romans 8:28?\" | `get_study_notes` |\n| \"Look up 'covenant' in the Bible dictionary\" | `get_bible_dictionary` |\n| \"Define the key term 'atonement'\" | `get_key_terms` |\n| \"Show me David's family tree\" | `explore_genealogy` |\n| \"What events happened in Moses' life?\" | `explore_person_events` |\n| \"What's the history of Bethlehem?\" | `explore_place` |\n| \"How are Ruth and Jesus related?\" | `find_connection` |\n| \"Who are the people in Romans 8?\" | `people_in_passage` |\n| \"Give me everything about Genesis 22:1\" | `graph_enriched_search` |\n| \"Find passages similar to Daniel 7\" | `find_similar_passages` |\n| \"What's the cultural context of Genesis 15?\" | `get_ane_context` |\n\n### Example Conversation\n\n**User**: \"I'm studying Romans 5:8. What does Paul mean when he says God 'demonstrates' his love?\"\n\n**Claude's internal process**:\n1. Look up the verse: `lookup_verse(reference=\"Romans 5:8\")`\n2. Study the key word: `word_study(word=\"demonstrates\")` → finds G4921 συνίστημι\n3. Get study notes: `get_study_notes(reference=\"Romans 5:8\")`\n4. Check cross-references for context\n5. Apply genre guidance (Epistles)\n\n**Claude's response**:\n> In Romans 5:8, Paul uses the Greek word **συνίστημι** (synistēmi, G4921), which means \"to stand together, to commend, to demonstrate.\" This is a present tense verb, indicating ongoing action.\n>\n> The genre context is important here: Romans is an epistle, and Paul is building an argument. In the immediate context (Romans 5:1-11), he's explaining how we have peace with God through justification by faith. Verse 8 is his proof: God didn't wait for us to become worthy, but demonstrated his love \"while we were still sinners.\"\n>\n> The word \"demonstrates\" carries the sense of proving beyond doubt - not just telling us about his love, but showing it through action (Christ's death).\n>\n> Related passages on God's love demonstrated through Christ: John 3:16, 1 John 4:9-10.\n\n---\n\n## Example Questions\n\nTry asking Claude:\n\n```\nWhat does John 3:16 say in Greek? Break down the key words.\n```\n\n```\nStudy the word 'agape' - how is it different from other Greek words for love?\n```\n\n```\nWhat's the context of Romans 8:28? Who is Paul writing to and why?\n```\n\n```\nShow me cross-references for Ephesians 2:8-9 on salvation by grace.\n```\n\n```\nWho was Melchizedek and why is he significant?\n```\n\n```\nParse the verb morphology in Philippians 2:12 - \"work out your salvation\"\n```\n\n```\nWhat does the Hebrew word 'hesed' mean? Where is it used?\n```\n\n```\nHelp me understand Revelation 13 - what are these beasts?\n```\n\n```\nWhat do the study notes say about John 1:1?\n```\n\n```\nLook up 'baptism' in the Bible dictionary.\n```\n\n```\nShow me David's family tree going back 5 generations.\n```\n\n```\nHow are Abraham and Jesus connected genealogically?\n```\n\n```\nWhat events happened in the life of Moses?\n```\n\n```\nFind passages similar to John 3:16 - what other verses talk about God's love like this?\n```\n\n```\nWhat Old Testament passages connect to Daniel's vision of the Son of Man?\n```\n\n```\nWhat's the Ancient Near East background for the creation account in Genesis 1?\n```\n\n```\nExplain the cultural context of covenant-making in Genesis 15.\n```\n\n---\n\n## Hermeneutical Framework\n\nThis isn't just a reference tool. It's designed to guide users toward sound biblical interpretation.\n\n### The Problem It Solves\n\nCommon interpretation errors include:\n- **Proof-texting**: Using isolated verses to support predetermined conclusions\n- **Allegorizing**: Finding hidden meanings not intended by the author\n- **Ignoring genre**: Reading poetry as prose or prophecy as history\n- **Ignoring context**: Ripping verses from their historical and literary setting\n- **Moralizing**: Reducing narratives to \"be good like David\"\n\n### The Fee & Stuart Method\n\nThe interpretive framework is based on **\"How to Read the Bible for All Its Worth\"** by Gordon Fee and Douglas Stuart - the standard textbook for biblical hermeneutics used in seminaries worldwide.\n\n**About the authors:**\n- **Gordon Fee** (1934-2022): New Testament scholar, professor at Regent College, author of major commentaries on 1 Corinthians, Philippians, and Pauline theology. One of the translators of the NIV and TNIV.\n- **Douglas Stuart**: Old Testament scholar, professor at Gordon-Conwell Theological Seminary, author of commentaries on Hosea-Jonah, Exodus, and Old Testament hermeneutics.\n\nTheir book (first published 1981, now in its 4th edition) has sold over a million copies and is used as the introductory hermeneutics text at most evangelical seminaries. It teaches readers to interpret Scripture according to its literary genre, historical context, and authorial intent - avoiding both wooden literalism and uncontrolled allegorizing.\n\nThe server embeds genre-specific interpretation principles from this methodology:\n\n#### Core Principles\n\n1. **Exegesis Before Application**\n   - First discover what the text meant to its original audience\n   - Then determine what it means for us today\n   - Never jump directly to application\n\n2. **Context is King**\n   - Historical context: time, culture, author, audience, occasion\n   - Literary context: genre, surrounding passages, book structure\n   - A text without context is a pretext for a proof text\n\n3. **Genre Determines Method**\n   Different biblical literature requires different approaches\n\n### Genre-Specific Guidelines\n\n#### Epistles (Letters)\n**Key principle**: Think contextually - what problem was being addressed?\n\n- Read the entire letter to understand the argument flow\n- Ask: What problem prompted this letter?\n- Pay attention to logical connectors (therefore, because, so that)\n- Distinguish between central argument and supporting points\n- Not every statement is universally prescriptive\n\n**Common errors**:\n- Taking verses out of their argumentative context\n- Ignoring the specific historical situation being addressed\n- Treating every instruction as a timeless command\n\n#### Old Testament Narratives\n**Key principle**: Three levels (meta, national, individual); descriptive not prescriptive\n\n- Narratives describe what happened, not necessarily what should happen\n- Three levels: God's universal plan, Israel's story, individual accounts\n- Characters are not always examples to follow - observe their flaws\n- The narrator rarely makes direct theological statements\n- God is the ultimate hero of every narrative\n\n**Common errors**:\n- Treating every character's action as a model to follow\n- Allegorizing details that are simply historical facts\n- Moralizing: \"Be brave like David\" without seeing God's work\n\n#### Gospels\n**Key principle**: Two-level documents (Jesus' original context + evangelist's purpose)\n\n- Consider both Jesus' original meaning and the Gospel writer's purpose\n- Each Gospel has a specific audience and theological emphasis\n- Account for the already/not-yet tension of the Kingdom\n- Compare parallel accounts to see each writer's emphasis\n\n**Common errors**:\n- Harmonizing too quickly without hearing each Gospel's voice\n- Ignoring Jesus' audience (Pharisees, disciples, crowds)\n- Applying teachings directly without considering the cross\n\n#### Parables\n**Key principle**: Find the main point; don't allegorize every detail\n\n- Identify the one or two main points - parables are not allegories\n- Consider the audience: Who is Jesus speaking to and why?\n- Look for cultural background that illuminates meaning\n- The unexpected twist often carries the main message\n\n**Common errors**:\n- Allegorizing every detail (the donkey represents X...)\n- Missing the shock value for the original audience\n- Creating theological systems from parabolic details\n\n#### Prophets\n**Key principle**: Covenant enforcement; check if \"future\" is now past\n\n- Prophets were covenant enforcement officers - calling Israel back\n- Most \"predictions\" were about events now in our past\n- The prophetic lawsuit pattern: accusation, judgment, hope\n- Distinguish near fulfillment from ultimate/eschatological fulfillment\n- Poetry and metaphor are the normal mode of prophetic speech\n\n**Common errors**:\n- Reading all prophecy as about the end times\n- Literalizing poetic and metaphorical language\n- Creating detailed end-times timelines from prophetic poetry\n\n#### Psalms\n**Key principle**: Poetry/prayer; understand the types (lament, thanksgiving, praise)\n\n- Psalms are inspired responses to God - poetry, not doctrine\n- Identify the type: Lament, Thanksgiving, Praise, Royal, Wisdom\n- Poetry uses metaphor, hyperbole, and parallelism\n- The emotions are real and God-given - even the difficult ones\n- Many psalms find their ultimate fulfillment in Christ\n\n**Common errors**:\n- Treating poetic expressions as doctrinal statements\n- Ignoring the emotional dimension\n- Literalizing metaphorical language\n\n#### Wisdom Literature\n**Key principle**: General truths, not guarantees; compare with full canon\n\n- Proverbs are general truths, not unconditional promises\n- Wisdom literature wrestles with life's complexity\n- Job and Ecclesiastes challenge simplistic interpretations\n- The fear of the Lord is the foundation of all wisdom\n- Compare individual proverbs with the full biblical witness\n\n**Common errors**:\n- Treating Proverbs as unconditional promises\n- Ignoring the dialogue format in Job (not all speeches are true)\n- Missing the \"under the sun\" perspective in Ecclesiastes\n\n#### Apocalyptic (Revelation)\n**Key principle**: Apocalyptic imagery; already/not yet eschatology\n\n- Apocalyptic is a literary genre with its own conventions\n- Symbols are stock imagery (beasts, numbers) with recognized meanings\n- The primary message is: God wins, evil is judged, Christ reigns\n- Read in light of OT prophets and the already/not yet tension\n- Multiple valid interpretive approaches exist\n\n**Common errors**:\n- Literalizing symbolic imagery (666 as a barcode)\n- Creating detailed chronological timelines\n- Missing the pastoral purpose: encouragement for suffering believers\n\n### The Reasoning Pattern\n\nThe server's hermeneutics module guides Claude through this sequence:\n\n1. **IDENTIFY**: What biblical text(s) are relevant?\n2. **GENRE**: What type of literature is this?\n3. **CONTEXT**: Historical, literary, canonical\n4. **CONTENT**: What does the text say? (Greek/Hebrew when helpful)\n5. **CROSS-REFERENCES**: Scripture interprets Scripture\n6. **APPLICATION**: Timeless principle behind temporal commands\n7. **HUMILITY**: Acknowledge uncertainty where it exists\n\n---\n\n## Self-Hosting\n\nWant to run your own instance? See [docs/SELF_HOST.md](docs/SELF_HOST.md).\n\nOptions:\n- Local Python development\n- Docker deployment\n- Your own Fly.io instance\n\n---\n\n## Project Structure\n\n```\nstudybible-mcp/\n├── src/study_bible_mcp/\n│   ├── server.py              # MCP server (stdio + SSE transports)\n│   ├── database.py            # SQLite queries (async)\n│   ├── tools.py               # 18 tool definitions\n│   ├── hermeneutics.py        # Genre detection & interpretation\n│   └── parsers/\n│       ├── lexicon.py         # TFLSJ, BDB, Abbott-Smith, TBESG, TBESH parsers\n│       ├── aquifer.py         # BibleAquifer JSON parser\n│       ├── acai.py            # ACAI entity annotation parser\n│       ├── ane_context.py     # ANE cultural context parser\n│       ├── tagged_text.py     # TAGNT/TAHOT morphology parsers\n│       └── proper_names.py    # TIPNR name parser\n├── scripts/\n│   ├── download_stepbible.py  # Download all source data (--aquifer flag)\n│   ├── build_database.py      # Build SQLite database\n│   ├── generate_embeddings.py # Generate vector embeddings\n│   ├── import_theographic.py  # Import Theographic graph data\n│   └── test_server.py         # Manual test suite\n├── tests/\n│   └── test_tool_selection.py # Pytest: agent tool selection (71 tests)\n├── prompts/\n│   └── system_prompt.md       # Full hermeneutical framework for agents\n├── docs/\n│   ├── SETUP.md               # Quick setup guide\n│   └── SELF_HOST.md           # Self-hosting instructions\n├── ARCHITECTURE.md            # Mermaid flowchart of all 18 tools\n├── Dockerfile                 # Multi-stage build with database\n├── fly.toml                   # Fly.io deployment config\n└── pyproject.toml\n```\n\n---\n\n## Data Sources\n\n### STEPBible - Tyndale House, Cambridge\n\nBiblical text and brief lexicon data come from the [STEPBible project](https://www.stepbible.org/) ([GitHub](https://github.com/STEPBible/STEPBible-Data)), developed by scholars at **Tyndale House, Cambridge** - one of the world's leading centres for biblical research. Licensed CC BY 4.0.\n\n| File | Description | Content |\n|------|-------------|---------|\n| **TFLSJ** | Full Liddell-Scott-Jones Greek Lexicon | 10,846 Greek words with full scholarly definitions |\n| **Abbott-Smith** | Manual Greek Lexicon of the NT (TEI XML) | 5,896 NT-focused entries with LXX cross-refs and synonym discussions |\n| **TBESG** | Tyndale Brief Lexicon - Greek (fallback) | 5,600+ Greek words with brief definitions |\n| **TBESH** | Tyndale Brief Lexicon - Hebrew (fallback) | 8,600+ Hebrew words with brief definitions |\n| **TAGNT** | Translators Amalgamated Greek NT (2 parts) | Every word of the Greek NT with morphology, Strong's numbers, glosses |\n| **TAHOT** | Translators Amalgamated Hebrew OT (4 parts) | Every word of the Hebrew OT with morphology, Strong's numbers, glosses |\n| **TIPNR** | Translators Proper Names | 4,299 biblical people, places, and things with references |\n| **TEGMC/TEHMC** | Morphology Codes | Grammatical parsing code definitions |\n\n### BDB Hebrew Lexicon\n\nThe full unabridged Brown-Driver-Briggs Hebrew lexicon (8,090 entries) comes from [eliranwong/unabridged-BDB-Hebrew-lexicon](https://github.com/eliranwong/unabridged-BDB-Hebrew-lexicon). The BDB is the standard scholarly Hebrew-English lexicon, originally published in 1906 and still widely used in academic study. Public domain text.\n\n### Abbott-Smith Greek Lexicon\n\nG. Abbott-Smith's *A Manual Greek Lexicon of the New Testament* (1922) provides NT-focused definitions that complement the broader classical coverage of LSJ. The TEI XML edition (5,896 entries) comes from [translatable-exegetical-tools/Abbott-Smith](https://github.com/translatable-exegetical-tools/Abbott-Smith). Public domain text.\n\nAbbott-Smith enriches 5,426 existing Greek entries with:\n\n| Field | Description | Coverage |\n|-------|-------------|----------|\n| **NT-focused definition** | Full definition with sense hierarchy | 5,871 entries |\n| **NT occurrence count** | Word frequency in the New Testament | 5,480 entries |\n| **LXX/Hebrew equivalents** | Hebrew words the Greek translates in the Septuagint | 3,317 entries |\n| **Synonym discussions** | Scholarly notes distinguishing related Greek words | 398 entries |\n\n### BibleAquifer\n\nScholarly commentary and reference content from [BibleAquifer](https://github.com/BibleAquifer) (CC BY-SA 4.0):\n\n| Resource | Description | Content |\n|----------|-------------|---------|\n| **Aquifer Open Study Notes** | Verse-level scholarly commentary | 66 books |\n| **Tyndale Bible Dictionary** | Topical articles | 500+ articles on people, places, theology, history, archaeology |\n| **UW Translation Notes** | unfoldingWord translator commentary | Linguistic insights for 49+ books |\n| **SIL Translator Notes** | SIL International translator notes | Translation and cultural context |\n| **FIA Key Terms** | Key theological terms | 200+ carefully defined terms with cross-references |\n\n### ACAI Entity Annotations\n\nRich entity annotations from [BibleAquifer/ACAI](https://github.com/BibleAquifer/ACAI) (CC BY-SA 4.0):\n\n| Type | Count | Content |\n|------|-------|---------|\n| People | ~2,500 | Family relationships, variant names, roles, speech attributions, verse references |\n| Places | ~400 | Geographic entities with biblical references |\n| Groups | ~200 | People groups, nations, tribes |\n| Key Terms | ~75 | Annotated theological concepts |\n\n### Theographic Bible Metadata\n\nGraph data for genealogy, events, and places from [Theographic](https://github.com/robertrouse/theographic-bible-metadata). Used by the `explore_genealogy`, `explore_person_events`, `explore_place`, `find_connection`, `people_in_passage`, and `graph_enriched_search` tools.\n\n### Ancient Near East Context\n\n87 structured entries covering 12 dimensions of ANE cultural and historical context across 9 time periods, with 314 book-chapter mappings. Data is stored in [`data/ane_context/`](data/ane_context/) as JSON files (one per dimension). Sources include Walton, Hallo, Matthews & Benjamin, Pritchard (ANET), and other standard ANE reference works.\n\n### Vector Embeddings\n\nSemantic search uses OpenAI's `text-embedding-3-small` model via [sqlite-vec](https://github.com/asg017/sqlite-vec) for the `find_similar_passages` tool.\n\n---\n\n## Contributing\n\nContributions welcome! Especially:\n\n- Additional thematic cross-references\n- Improved genre detection\n- New translation support\n- Better morphology parsing\n- Documentation improvements\n\n---\n\n## License\n\nMIT License. See [LICENSE](LICENSE).\n\nData from STEPBible is licensed under [CC BY 4.0](https://creativecommons.org/licenses/by/4.0/).\nData from BibleAquifer and ACAI is licensed under [CC BY-SA 4.0](https://creativecommons.org/licenses/by-sa/4.0/).\n\n---\n\n## Acknowledgments\n\n- [STEPBible](https://www.stepbible.org/) for the freely available biblical data\n- [BibleAquifer](https://github.com/BibleAquifer) for study notes, dictionary, translation notes, and key terms\n- [eliranwong](https://github.com/eliranwong/unabridged-BDB-Hebrew-lexicon) for the unabridged BDB Hebrew lexicon\n- [translatable-exegetical-tools](https://github.com/translatable-exegetical-tools/Abbott-Smith) for the Abbott-Smith Greek Lexicon TEI XML edition\n- [Theographic](https://github.com/robertrouse/theographic-bible-metadata) for genealogy and event graph data\n- Gordon Fee & Douglas Stuart for the hermeneutical framework in \"How to Read the Bible for All Its Worth\"\n- The MCP community for the protocol and tooling\n","summary":"The studybible‑mcp project delivers a lightweight MCP Server that powers Claude with deep biblical scholarship, offering instant access to LSJ, BDB, and Abbott‑Smith lexicons, morphologically-tagged OT/NT texts, cross‑references, genealogy maps, and Aquifer‑style study notes. Its pre‑built SQLite database (≈600 MB) supports 18 specialized tools that retrieve verse data, word studies, dictionary entries, key theological terms, and Ancient Near‑East context, enabling Claude to synthesize comprehensive answers to Scripture questions. The integration is plug‑and‑play across Claude Desktop, Claude Code, ChatGPT Developer Mode, and other MCP‑compatible clients, requiring no API keys or downloads. Scholars, students, and AI developers looking to enrich biblical research or build intelligent study assistants will find this server a ready‑to‑use, scholarly resource.","description":"Bible study MCP server with Greek/Hebrew lexicons and Fee & Stuart hermeneutics","stars":51,"language":"Python"},{"owner":"calebwin","repo":"gitgres","url":"https://github.com/calebwin/gitgres","readme":"<p align=\"left\"><img src=\"res/logo.png\" alt=\"GitGres\" height=\"160\"></p>\n\nGitGres is a starting point for private reimplementations of GitHub optimizied for individual teams' agent needs. GitHub is a fantastic site for sharing code and it is likely how you're viewing this if you're a human. GitGres exists to solve for a few issues:\n\n* **Trading off cost for uptime.** GitHub offers free code storage but less-than-stellar uptime. With GitGres, you have the flexibility to use a Postgres DBMS with tiered storage [1] to tune cost while maintaining uptime.\n* **Trading off latency for cost.** GitHub puts you at the mercy of current system load. With GitGres, just choose your favorite Postgres cache [2].\n* **Trading off consistency for throughput.** GitHub is a cloud service. If requests reach GitHub's servers out of order, bad things can happen. GitGres is a server backed by Postgres. It can run locally. It can run colocated with many agents. Consistency and throughput are fully tunable.\n\nEverything - git objects, refs, packfiles, deltas, tokens, PRs, issues,\ncomments, reviews, reactions, teams, orgs, events - lives in Postgres rows.\nThe server holds nothing on disk.\n\n### Setup\n\n```bash\n# 1. Build (binaries land in ./target/release/{gitgres,git-remote-gitgres,gitgres-server}).\ncargo build --release --bins\n\n# 2. Have a Postgres reachable. e.g.\nexport GITGRES_DB='host=localhost user=postgres dbname=gitgres'\n\n# 3. Apply the schema (idempotent).\ngitgres init\n\n# 4. Boot the server. The first --bootstrap-token mints an admin token tied\n#    to user 'demo' that you can use to manage everything else through the API.\ngitgres serve --listen 0.0.0.0:8080 --bootstrap-token \"$(openssl rand -hex 32)\"\n\n# (For TLS:)\ngitgres serve --listen 0.0.0.0:8443 \\\n              --tls /path/cert.pem /path/key.pem \\\n              --bootstrap-token TOKEN\n```\n\n`gitgres serve` env vars:\n\n| Var | Default | Purpose |\n|---|---|---|\n| `GITGRES_DB` | — | Postgres conn string if `--db` not given |\n| `GITGRES_PUBLIC_URL` | `https://gitgres.local` | Base URL the API returns in `Repository.cloneUrl` |\n| `GITGRES_WORKERS` | `8` | HTTP worker threads |\n| `GITGRES_GQL_LOG` | unset | If set, logs every GraphQL request body to stderr |\n\n### Usage\n\n**Plain `git`** (smart HTTP, v1 + v2):\n```bash\ngit clone http://gitgres.host/owner/repo.git\ngit push http://demo:TOKEN@gitgres.host/owner/repo.git main\n```\n\n**`gh` CLI**:\n```bash\n# Print a hosts.yml entry, drop into ~/.config/gh/hosts.yml:\ngitgres gh-config --host gitgres.host --token TOKEN --user alice\n\n# Or pipe a token into gh:\necho \"TOKEN\" | gh auth login --hostname gitgres.host --with-token\n\ngh pr create / list / view / merge / comment / close / diff\ngh issue create / list / view / comment / close\ngh repo create / view / clone / fork / list\ngh release create / list / view\ngh label create / list / edit / delete\ngh api /repos/owner/repo/...   # the entire REST surface\n```\n\n**Custom remote helper** (alternative to smart HTTP, also works):\n```bash\ngit clone \"gitgres::host=db.local user=u dbname=gitgres#owner/repo\"\n```\n\n### Limitations\n\nCurrently, GitGres doesn't support search, actions/workflows/runs/secrets, SSH transport, webhooks, HTTP/2, web UI.\n\n### Citations\n\n[1] https://www.alibabacloud.com/help/en/polardb/polardb-for-postgresql/cold-data-archiving/\n\n[2] https://www.pgcache.com/\n","summary":"GitGres is a self‑hosted GitHub‑compatible service that stores every Git object, reference, issue, pull request and other metadata entirely in a PostgreSQL database, so nothing is kept on disk by the server. It offers fine‑grained control over cost, uptime, latency, and consistency by letting teams choose their own Postgres tier, cache, and deployment mode while still supporting standard git operations over HTTP and the full gh CLI REST/GraphQL interface. The solution is ideal for organizations that need a private, highly customizable alternative to GitHub for their internal teams, especially where predictable performance, lower total cost of ownership, or tighter integration with existing data infrastructures is required.","description":"A private GitHub on Postgres","stars":72,"language":"Rust"},{"owner":"hunvreus","repo":"pi-hosts","url":"https://github.com/hunvreus/pi-hosts","readme":"# pi-hosts\n\nGive the Pi coding agent access to your servers.\n\n`pi-hosts` gives Pi named SSH targets, host facts, connection reuse, command risk checks, and an audit trail.\n\n```text\ncheck docker version on web-1\nis api-1 healthy?\ncompare disk usage on web-1 and web-2\ncheck all database servers\nupdate nginx config on web-1 and restart it\ninstall htop on db-1\nvacuum the database on app-1\n```\n\n## Why This Exists\n\nPi can often infer `ssh web-1 'command'` by itself. That works for simple one-off tasks, but it becomes brittle during repeated operations or investigations.\n\nWith `pi-hosts`, Pi gets:\n\n- predictable target resolution from host names, aliases, and tags\n- cached host facts such as OS, distro, package manager, service manager, Docker, and sudo\n- guarded execution with risk classification before remote commands run\n- lower token burn on repeated workflows because Pi calls typed host tools instead of rediscovering SSH details\n- faster workflows from fewer tool calls plus OpenSSH connection multiplexing, reusing a master connection for up to 10 minutes\n- convenience: say `web-1` instead of spelling out SSH details, ask for `database servers` or `prod` when checking upgrades, health, traffic, or incidents\n- JSONL audit records for command, host, policy decision, exit code, duration, timeout, and truncation\n\nExample measurement for a `Check Docker version on web-1` prompt:\n\n| Setup | Time | Turns | Tool calls | Tokens |\n| --- | ---: | ---: | ---: | ---: |\n| **with `pi-hosts`** | **5.1s** | **2** | **1 `host_exec`** | **1,968** |\n| without `pi-hosts` | 19.6s | 6 | 5 built-in tools | 4,403 |\n\n## Install\n\n```bash\npi install npm:pi-hosts\n```\n\nThen restart Pi or run `/reload`.\n\n## Quickstart\n\nUse natural language:\n\n```text\nimport all hosts from my SSH config\nadd web-1 at 10.0.0.12 as deploy and tag it web, prod\nadd db-1 at 10.0.0.20 as deploy and tag it database, prod\nshow my hosts\n```\n\nOr use slash commands directly:\n\n```text\n/hosts import ssh --all\n/hosts list\n/hosts upsert web-1 --address 10.0.0.12 --user deploy --port 22 --tags web,prod\n/hosts upsert db-1 --address 10.0.0.20 --user deploy --tags database,prod\n/hosts list\n```\n\nOnce hosts are added:\n\n```text\nrun uptime on web-1\nrefresh facts for all database servers\ncheck failed services on prod\n```\n\n`~/.ssh/config` is only an import source. After import, `pi-hosts` stores its own inventory in `~/.pi/agent/extensions/pi-hosts/hosts.json`.\n\n## Commands\n\n| Command | Purpose |\n| --- | --- |\n| `/hosts list` | List hosts |\n| `/hosts lookup <name>` | Show one host and cached facts |\n| `/hosts upsert <name> --address <host> [--user <user>] [--port <port>] [--tags a,b]` | Add or update a host |\n| `/hosts remove <name>` | Remove a host |\n| `/hosts facts refresh <name>` | Probe and cache remote facts |\n| `/hosts import ssh <alias>` | Import one SSH config host |\n| `/hosts import ssh --all` | Import all explicit SSH config hosts |\n| `/hosts import ssh --preview --all` | Preview import without writing |\n| `/hosts config show` | Show loaded config |\n| `/hosts config path` | Show config search paths |\n| `/hosts config reload` | Reload config without restarting Pi |\n\nThe agent uses typed tools behind the scenes, primarily `host_exec(hosts, command)`.\n\n## Target Resolution\n\nUsers can refer to hosts by:\n\n- name: `web-1`\n- alias: `frontend-1`\n- tag: `database`, `prod`, `web`\n- explicit host marker: `#web-1`\n\nMost prompts should use the plain name:\n\n```text\ncheck docker version on web-1\ncheck all database servers\n```\n\n`#web-1` is an optional escape hatch when you want to make a host mention unambiguous:\n\n```text\ncheck #web-1\n```\n\nResolution is exact, not fuzzy. `check all database servers` works when hosts are tagged `database`; `check all db servers` works when hosts are tagged `db`.\n\nExecution stays explicit internally: Pi may infer targets from natural language, but `host_exec` receives concrete host ids.\n\n## Architecture\n\n`pi-hosts` has a few small pieces:\n\n- **Inventory**: canonical JSON host store with names, aliases, tags, SSH transport fields, metadata, and cached facts.\n- **Import**: one-way import from `~/.ssh/config`; wildcard defaults are applied, but SSH config is not live state.\n- **Resolution**: user prompts resolve to explicit host ids by exact name, alias, explicit host marker, or tag. See [Target Resolution](#target-resolution).\n- **Facts**: remote probes cache OS, kernel, distro, package manager, service manager, container runtime, and sudo availability.\n- **Policy**: shell commands are classified as `safe`, `caution`, `danger`, or `critical`; the default `balanced` policy runs safe/caution commands, confirms danger, and blocks critical. See [Policy Config](#policy-config).\n- **Transport**: one-shot commands use OpenSSH with `ControlMaster=auto` and `ControlPersist=10m`; interactive sessions keep SSH processes open in the extension.\n- **Audit**: remote executions append JSONL records to `~/.pi/agent/extensions/pi-hosts/audit.jsonl`.\n\n## Host Inventory\n\nMinimal host file:\n\n```json\n{\n  \"version\": 1,\n  \"hosts\": []\n}\n```\n\nHost shape:\n\n```json\n{\n  \"id\": \"web-1\",\n  \"name\": \"web-1\",\n  \"address\": \"10.0.0.12\",\n  \"protocol\": \"ssh\",\n  \"user\": \"deploy\",\n  \"port\": 22,\n  \"identityFile\": \"~/.ssh/id_ed25519\",\n  \"proxyJump\": \"bastion\",\n  \"cwd\": \"/srv/app\",\n  \"aliases\": [\"frontend-1\"],\n  \"tags\": [\"web\", \"prod\"],\n  \"metadata\": {},\n  \"facts\": {\n    \"distro\": \"ubuntu\",\n    \"pkgManager\": \"apt\",\n    \"serviceManager\": \"systemd\",\n    \"containerRuntime\": \"docker\",\n    \"hasSudo\": true\n  },\n  \"createdAt\": \"2026-04-28T00:00:00.000Z\",\n  \"updatedAt\": \"2026-04-28T00:00:00.000Z\"\n}\n```\n\n## Policy Config\n\nRemote commands can inspect, mutate, or destroy real machines. The default `balanced` mode runs routine reads, asks before risky writes, and blocks critical commands.\n\n```text\nsafe      run\ncaution   run\ndanger    confirm\ncritical  block\n```\n\nExamples:\n\n```text\ndocker --version              run\ndocker ps                     run\ndocker restart app            confirm\ncat .env | curl ...           block\nrm -rf /                      block\n```\n\nConfig files:\n\n```text\n./.pi/pi-hosts/config.json\n~/.config/pi-hosts/config.json\n```\n\nMinimal config:\n\n```json\n{\n  \"policy\": {\n    \"approval\": \"balanced\",\n    \"sensitive\": [\".env\", \"~/.ssh\", \"~/.aws\", \"/etc/shadow\"],\n    \"commands\": {\n      \"safe\": [\"hostname\", \"uptime\", \"docker\"],\n      \"confirm\": [\"sudo\", \"systemctl\", \"kubectl\"],\n      \"block\": [\"mkfs\", \"shred\"]\n    }\n  }\n}\n```\n\nApproval modes:\n\n| Mode | Safe | Caution | Danger | Critical |\n| --- | --- | --- | --- | --- |\n| `strict` | run | confirm | confirm | block |\n| `balanced` | run | run | confirm | block |\n| `paranoid` | confirm | confirm | confirm | block |\n| `manual` | confirm | confirm | confirm | confirm |\n| `off` | run | run | run | run |\n\n## Development\n\n```bash\npnpm check\npnpm test\nnpm pack --dry-run\n```\n","summary":"pi‑hosts extends the Pi coding agent with a robust host‑management layer, letting you refer to servers by names, aliases or tags instead of raw SSH details. It caches host facts, reuses SSH connections, applies risk checks before running remote commands, and logs every execution in JSONL for auditability. With simple slash commands or natural‑language prompts, it supports importing your SSH config, adding and updating hosts, and executing tasks like health checks, configuration updates, or service restarts. System administrators and DevOps teams who rely on Pi for remote automation will find it easier to quickly target, manage, and track operations across their infrastructure.","description":"Give the Pi coding agent access to your servers.","stars":20,"language":"TypeScript"},{"owner":"xodn348","repo":"destiny","url":"https://github.com/xodn348/destiny","readme":"<p align=\"center\">\n  <img src=\"assets/hero.png\" alt=\"destiny — a real fortune skill for Claude Code\" width=\"700\">\n</p>\n\n<h1 align=\"center\">destiny</h1>\n\n<p align=\"center\">\n  A real fortune-telling skill for <a href=\"https://claude.com/claude-code\">Claude Code</a>.<br>\n  Not a horoscope generator. The numbers are computed; only the interpretation is generative.\n</p>\n\n---\n\n## Quick start\n\n### Prerequisites\n\n- [Claude Code](https://claude.com/claude-code) **v2.0 or newer**\n  - Check with `claude --version`\n  - Update with `npm i -g @anthropic-ai/claude-code`\n- The `/plugin` command must be available. On modern Claude Code it's on by default. If `/plugin` isn't recognized inside Claude Code, run `/config` and enable Plugins, then restart Claude Code.\n\n### Install (inside Claude Code)\n\n```\n/plugin marketplace add xodn348/destiny\n/plugin install destiny@destiny-marketplace\n/destiny\n```\n\n### Install from terminal (fallback if `/plugin` isn't available)\n\n```bash\nclaude plugin marketplace add xodn348/destiny\nclaude plugin install destiny@destiny-marketplace\n```\n\nThen launch Claude Code and run `/destiny`.\n\n### Verify\n\n```bash\nclaude plugin list   # should show: destiny@destiny-marketplace\n```\n\nThat's it. The first `/destiny` call asks for your birth date, time, city, and gender — once. Every call after is just `/destiny`.\n\n## How it flows\n\n```\nClaude Code\n   │\n   ▼\ndestiny plugin            ← installed once via /plugin install\n   │\n   ▼\n/destiny skill            ← invoked any time\n   │\n   ▼\nyour birth date           ← asked once, saved to ~/.destiny/profile.json\n   │\n   ▼\ndestiny of the day        ← personalized: today's fortune + life reading\n```\n\n## What you get\n\nEach `/destiny` produces a two-section reading:\n\n**🔮 Today's Fortune** — a short prose reading of today against your birth chart, with five-category stars (overall, love, money, career, health), a hexagram drawn for this moment, and a lucky number / color / direction.\n\n**🌌 Life Reading** — your character, the broad arc of your life, and where you are in your current 10-year period. Plain language, no untranslated jargon.\n\n## Example output\n\n<p align=\"center\">\n  <img src=\"assets/example.png\" alt=\"Sample /destiny reading\" width=\"700\">\n</p>\n\n<p align=\"center\"><sub>Real run from a sample profile (1992-07-31, Suwon). Same person + same day always produces identical script output; only the prose phrasing changes between calls.</sub></p>\n\n## How it works (the principles in 60 seconds)\n\nThis skill uses three pieces of classical East Asian metaphysics, each computed deterministically from your birth date and time:\n\n- **Four Pillars (the eight-character birth chart)** — Your year, month, day, and hour of birth each map to a pair of Chinese characters (one \"Heavenly Stem\" + one \"Earthly Branch\") drawn from a 60-cycle calendar that has run continuously for over two millennia. The eight characters together describe your \"elemental fingerprint\": which of the five elements (Wood / Fire / Earth / Metal / Water) dominate, which are missing, and how they relate. The character of your day-of-birth is your \"core self\".\n\n- **Perpetual lunar calendar** — The engine that converts solar dates to the eight characters. It handles solar terms (the 24 climate divisions of the year), lunar/solar conversion, true-solar-time correction by birthplace longitude, and Korean Daylight Saving for births in 1987–88. Equivalent to the calendar published by Korea's national astronomical observatory.\n\n- **The I-Ching (Book of Changes)** — A 3,000-year-old divination system of 64 hexagrams. We draw one hexagram for the present moment using *plum-blossom time divination* — an algorithm by the Song-dynasty scholar Shao Yong that derives the hexagram from the current lunar date and hour. Hexagram texts are from James Legge's 1899 public-domain translation.\n\nThe skill computes today's \"day pillar\" the same way and analyzes its relationship with your birth chart — five-element generation/control cycles, branch harmonies and clashes — to produce the reading.\n\n## What's actually computed (vs. interpreted by Claude)\n\n| Layer | Source |\n|---|---|\n| Your eight-character birth chart | [`lunar-python`](https://github.com/6tail/lunar-python) — pure-Python perpetual calendar |\n| True solar time correction | longitude offset from local standard time meridian (1° = 4 min) |\n| Korean DST handling (1987–88) | automatic |\n| Today's day pillar | `lunar-python` |\n| Five Elements + Ten Gods relationships | classical 60-cycle lookup tables |\n| Branch harmonies, clashes, punishments | classical lookup tables |\n| I-Ching hexagram for this moment | plum-blossom time divination |\n| Hexagram corpus | King Wen ordering, Legge (1899) public-domain translation |\n| Lucky number / color / direction | derived from your day-of-birth's element + the hexagram |\n| **Star ratings, character sketch, life arc, today's advice** | **Claude, applying classical reading conventions to the data above** |\n\nSame person + same day always produces identical script output. Only the prose phrasing changes between calls.\n\nNo external APIs. No scraped sites. Everything runs locally.\n\n## Variants\n\n- `/destiny` — full reading (auto-loads saved profile)\n- `/destiny today` — only today's fortune\n- `/destiny life` — only life reading\n- `/destiny reset` — delete saved profile and start over\n- `/destiny in english|korean|japanese|chinese|spanish` — switch language\n- `/destiny born YYYY-MM-DD HH:MM <city> <m|f>` — one-off without saving\n- `/destiny quick` — generic daily, no personal data\n- `/destiny compat <partner birth> <city> <m|f>` — couple compatibility (궁합) reading using two charts\n- `/destiny hook on` / `/destiny hook off` — auto-run `/destiny` on every Claude Code session start (opt-in)\n\n## Auto-run on session start (optional)\n\nIf you want `/destiny` to fire every time you launch Claude Code — like a morning paper — run `/destiny hook on` once. To turn it off, `/destiny hook off`. Both commands edit `~/.claude/settings.json` safely (your other hooks are preserved, and a backup is saved to `~/.claude/settings.json.destiny-backup` before the first install).\n\nIf you'd rather wire it manually, add this to `~/.claude/settings.json`:\n\n```json\n{\n  \"hooks\": {\n    \"SessionStart\": [\n      {\n        \"matcher\": \"*\",\n        \"hooks\": [{\"type\": \"command\", \"command\": \"claude --print '/destiny'\"}]\n      }\n    ]\n  }\n}\n```\n\n## About\n\nA Claude Code plugin for daily fortune readings. Your birth chart and today's day pillar are computed locally by a Python perpetual lunar calendar (`lunar-python`) — the same math used by traditional almanacs. Claude only translates those fixed numbers into prose, using documented classical reading conventions.\n\nNot scientifically validated; not advice. For fun. See **Safety & disclaimer** below. Default English; Korean / Japanese / Chinese / Spanish on request.\n\n## Stack\n\n- Python 3.10+\n- [`lunar-python`](https://github.com/6tail/lunar-python) (MIT) — pure-Python perpetual lunar calendar\n- I-Ching: King Wen ordering + Legge (1899) public-domain judgments\n- Claude Code plugin format\n\n## Safety & disclaimer\n\n**For entertainment only. No scientific basis. Not advice.**\n\n`destiny` is a personal entertainment project rooted in classical East Asian metaphysics (Four Pillars / I-Ching). The chart calculations are deterministic and the prose is written by Claude on top of that fixed data — but the **underlying system has no scientifically established predictive validity**, and the readings are not predictions of anything real.\n\n**This is not professional advice of any kind.** Specifically, nothing produced by this tool is or should be treated as: medical, psychological, psychiatric, financial, investment, legal, employment, relationship, or any other professional advice. Do not make life decisions based on a reading. Do not use it as a substitute for consulting a qualified professional or for talking to a real human in your life when something matters.\n\n**Mental-health crisis.** If you are in crisis or having thoughts of self-harm, please contact a qualified professional immediately. International directory of crisis lines: <https://findahelpline.com>.\n\n**Intended audience.** This tool is intended for adults who understand it is a recreational reading.\n\n**No warranty, no liability.** This software is provided \"AS IS\", without warranty of any kind, express or implied — see the LICENSE file for the full text. The author and contributors **disclaim all liability** for any direct, indirect, incidental, consequential, or other damages or harm — financial, emotional, relational, professional, or otherwise — arising out of or in connection with the use, reliance on, or inability to use this software or any reading it produces. By using this tool you agree that you do so **at your own risk and on your own discretion**.\n\n**Local laws.** Fortune-telling and divination are regulated in some jurisdictions. You are responsible for ensuring your use of this tool complies with the laws applicable to you.\n\n## License\n\nMIT\n","summary":"**destiny** is a Claude Code plugin that delivers daily, personalized fortune‑tellers grounded in deterministic East Asian metaphysics. After a single prompt for birth date, time, city, and gender, it computes your Four‑Pillar chart, lunar calendar details, and a present‑moment I‑Ching hexagram, then generates a short fortune for the day and a concise life‑reading in plain language. The plugin stores your profile in a local JSON file, so subsequent `/destiny` calls run instantly and always produce consistent numerical outputs while varying the prose. It’s ideal for Claude Code users who appreciate authentic Chinese astrology readings that blend computational rigor with creative interpretation.","description":"Daily fortune-telling plugin for Claude Code.","stars":46,"language":"Python"},{"owner":"4RH1T3CT0R7","repo":"ttf-doom","url":"https://github.com/4RH1T3CT0R7/ttf-doom","readme":"# TTF-DOOM\n\nA DOOM-style raycaster that runs inside a TrueType font's hinting program.\n\n<p align=\"center\">\n  <img src=\"docs/media/demo.gif\" width=\"640\" />\n</p>\n\n<p align=\"center\">\n  <a href=\"https://4rh1t3ct0r7.github.io/ttf-doom/\">\n    <img src=\"https://img.shields.io/badge/PLAY_IN_BROWSER-00cc44?style=for-the-badge\" alt=\"Play in Browser\" />\n  </a>\n</p>\n\n## What is this?\n\nTrueType fonts have a built-in virtual machine for grid-fitting glyphs. It's got a stack, storage slots, arithmetic, conditionals, function calls - and it turns out it's Turing-complete. I wanted to see if I could get it to render 3D graphics.\n\nThe font file contains a DDA raycasting engine written in TrueType bytecode. The glyph \"A\" has 16 vertical bar contours, and the hinting program raycasts against a 16x16 tile map and repositions those bars using SCFS instructions to form a 3D perspective view. The whole thing is 6.5 KB.\n\nJS handles movement, enemies, and shooting, then passes coordinates to the font through `font-variation-settings`. The font does the raycasting and wall rendering. Canvas overlay draws enemies, weapon, and HUD on top.\n\n## How it works\n\nI wrote a small compiler that takes a custom DSL and outputs TrueType hinting assembly. The DSL looks like a stripped-down C:\n\n```\nfunc raycast(col: int) -> int:\n    var ra: int = player_angle + col * 3 - FOV_HALF\n    var dx: int = get_cos(ra)\n    var dy: int = get_sin(ra)\n    ...\n```\n\nThis compiles to TT bytecode - `FDEF`, `CALL`, `RS`, `WS`, `SCFS`, etc. - and gets injected into a `.ttf` file along with sin/cos lookup tables and the map data. The compiler handles variable allocation (everything goes into TT storage slots), function definitions (FDEF/ENDF), and a few other things like fixed-point math.\n\nThe pipeline: `doom.doom` -> lexer -> parser -> codegen -> `doom.ttf`\n\n<p align=\"center\">\n  <img src=\"docs/media/transform.gif\" width=\"640\" />\n</p>\n\n## TrueType arithmetic is insane\n\n`MUL` does `(a*b)/64`. Not `a*b`. Everything is F26Dot6 fixed-point internally. So `1 * 4 = 0`. I lost probably two days to this before I found a workaround: `DIV(a, 1)` returns `a * 64` (DIV is equally broken), then `MUL(a*64, b)` = `(a*64*b)/64` = `a*b`.\n\nThere's no WHILE instruction either. Loops compile to recursive FDEFs, and FreeType caps the call stack at ~64 frames. 16 columns x 14 ray steps barely fits.\n\n`return` inside a recursive-while doesn't exit. It pushes a value and keeps going. Everything had to be rewritten with hit flags.\n\nSCFS takes F26Dot6 pixel coordinates, not font units - took me a while to figure out why every bar was a tiny speck. Chrome caches hinted glyphs and sometimes skips re-hinting when axes change - fixed with per-frame jitter. `SVTCA[0]` selects Y, `[1]` selects X.\n\n## Architecture\n\nThe font just renders walls. JS does everything else.\n\nPlayer position and angle go into three font variation axes (`MOVX`, `MOVY`, `TURN`). JS stuffs coordinates into `font-variation-settings` every frame. Browser re-hints the glyph. Shape changes.\n\nPress Tab in the demo to see what's going on under the hood:\n\n<p align=\"center\">\n  <img src=\"docs/media/debug-mode.png\" width=\"640\" />\n</p>\n\n## Try it\n\n```\ngit clone https://github.com/4RH1T3CT0R7/ttf-doom.git\ncd ttf-doom\npip install fonttools freetype-py pygame pytest\npython game/build.py\npython -m http.server 8765\n```\n\nOpen `http://localhost:8765/hosts/browser/index.html` in Chrome or Edge. WASD to move, arrows to turn, Space to shoot. Press Tab for a debug overlay showing the font variation axes in real-time.\n\n## Project layout\n\n```\ncompiler/       DSL -> TrueType assembly (lexer, parser, codegen)\nfontgen/        font builder, glyph generator, sin/cos tables\ngame/           raycaster source (doom.doom) and build script\nhosts/browser/  browser demo\nhosts/python/   pygame host (for development)\ntests/          451 tests\ndoom.ttf        the playable font (6,580 bytes)\n```\n\n## llama.ttf vs this\n\n[llama.ttf](https://github.com/fuglede/llama.ttf) also runs computation in a font, but it uses HarfBuzz's WASM shaper - basically a WebAssembly runtime bolted onto font shaping. TTF-DOOM uses the actual TrueType hinting bytecode that Apple shipped in 1991 for grid-fitting glyphs. Different VM entirely.\n\n## License\n\n[Apache 2.0](LICENSE)\n","summary":"TTF-DOOM is a faux‑DOOM engine that runs entirely inside a TrueType font’s hinting virtual machine, using the glyph “A” to perform a DDA raycast against a 16×16 tile map. With a tiny 6.5 KB font file and a lightweight JavaScript host, the engine swaps player coordinates into `font‑variation‑settings` each frame, letting the font itself render the walls while JS draws enemies, HUD, and handles game logic. The project ships a custom DSL compiler that turns a simple C‑like syntax into TrueType bytecode, handling fixed‑point arithmetic, recursion for loops, and quirky quirks of the TT VM. Enthusiasts, font engineers, and esoteric‑programming hobbyists will appreciate the demonstration of TrueType’s Turing‑completeness and the creative use of font rendering for real‑time graphics.","description":"A 3D raycasting engine running inside a TrueType font's hinting virtual machine","stars":56,"language":"Python"},{"owner":"sqliteai","repo":"adam","url":"https://github.com/sqliteai/adam","readme":"# Adam\n\nEmbeddable AI agent library in C.\n\nAdam gives you a complete agent loop: tool calling, memory, sessions, voice, streaming, structured output, in one `#include`. Works with cloud APIs (Anthropic, OpenAI, Google Gemini, Groq, Together, xAI) and local models (llama.cpp) through the same interface. Compiles on macOS, Linux, Windows, iOS, Android, and WASM.\n\n## Quick Start\n\n```c\n#include \"adam.h\"\n\nint main(void) {\n    adam_init();\n\n    adam_settings_t *s = adam_create_settings();\n    adam_settings_set_provider(s, ADAM_API_ANTHROPIC,\n                               getenv(\"ANTHROPIC_API_KEY\"),\n                               \"claude-sonnet-4-20250514\");\n\n    adam_history_t *h = adam_history_create();\n    adam_run_result_t r = adam_run(s, h, \"What is the capital of France?\");\n\n    printf(\"%s\\n\", r.final_response);  // \"The capital of France is Paris.\"\n\n    adam_run_result_free(&r);\n    adam_history_destroy(h);\n    adam_settings_destroy(s);\n    adam_cleanup();\n}\n```\n\n```bash\nmake deps    # build llama.cpp + whisper.cpp\nmake all     # build libadam.a\nmake test    # run 161 tests (ASan + UBSan)\n```\n\n## Features\n\n| Feature | Description |\n|---------|-------------|\n| **Agent loop** | Tool calling with automatic iteration until final response |\n| **Three providers** | Anthropic, OpenAI, Google Gemini + any compatible API + local GGUF via llama.cpp |\n| **Local vision** | Multimodal image understanding via llama.cpp + mmproj (Gemma 3, LLaVA, etc.) |\n| **Image generation** | Native image output via Gemini image models (gemini-3.1-flash-image-preview) |\n| **Database extensions
