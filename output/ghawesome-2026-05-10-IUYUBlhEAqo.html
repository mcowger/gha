<script id="project-data" type="application/json">[{"owner":"regent-vcs","repo":"re_gent","url":"https://github.com/regent-vcs/re_gent","readme":"<div align=\"center\">\n  <a href=\"https://github.com/regent-vcs/regent\">\n    <img\n      src=\"assets/regent-logo-dark.png\"\n      alt=\"re_gent\"\n      width=\"100%\"\n    />\n  </a>\n  <br />\n  <br />\n  <h1>Version-Control for AI Agents</h1>\n  <p>\n    Version control for AI agent activity. Track what your agent did, which prompt wrote each line, and rewind when things break.\n  </p>\n\n[![Star on GitHub](https://img.shields.io/github/stars/regent-vcs/regent?style=for-the-badge&logo=github&color=gold)](https://github.com/regent-vcs/regent)\n[![Apache 2.0 License](https://img.shields.io/badge/License-Apache%202.0-blue?style=for-the-badge)](LICENSE)\n[![Go Version](https://img.shields.io/github/go-mod/go-version/regent-vcs/regent?style=for-the-badge&logo=go&logoColor=white&color=00ADD8)](go.mod)\n\n[![CI Status](https://img.shields.io/github/actions/workflow/status/regent-vcs/regent/ci.yml?style=for-the-badge&logo=githubactions&logoColor=white)](https://github.com/regent-vcs/regent/actions/workflows/ci.yml)\n[![Contributions Welcome](https://img.shields.io/badge/Contributions-Welcome-10b981?style=for-the-badge&logo=github)](CONTRIBUTING.md)\n[![Claude Code Compatible](https://img.shields.io/badge/Claude%20Code-Compatible-6366f1?style=for-the-badge&logo=anthropic&logoColor=white)](https://github.com/regent-vcs/regent)\n\n</div>\n\n---\n\n## Demo\n\n<div align=\"center\">\n  <img src=\"assets/demo-fast.gif\" alt=\"re_gent tracking Claude Code activity\" width=\"100%\"/>\n  <p><em>Every tool call is automatically captured. No manual commits needed.</em></p>\n</div>\n\n---\n\n## Quick Start\n\n```bash\n# Install via Homebrew (macOS/Linux)\nbrew tap regent-vcs/tap\nbrew install regent\n\n# Or via Go\ngo install github.com/regent-vcs/regent/cmd/rgt@latest\n\n# Initialize in your project\ncd your-project\nrgt init\n\n# Work with Claude Code normally (every tool call is tracked)\n\n# See what happened\nrgt log\nrgt blame src/file.go:42\n```\n\nThat's it. Your agent activity is now auditable.\n\n---\n\n## What You Get\n\n### See what your agent actually did\n\n```bash\n$ rgt log\n\nStep a1b2c3d  |  2 min ago  |  Tool: Edit\n│ File: src/handler.go\n│ Added error handling to request handler\n│ + 5 lines, - 2 lines\n\nStep d4e5f6g  |  5 min ago  |  Tool: Write\n│ File: tests/handler_test.go\n│ Created unit tests for handler\n│ + 23 lines\n\nStep f8g9h0i  |  8 min ago  |  Tool: Bash\n│ Command: go mod tidy\n│ Cleaned up dependencies\n```\n\n### Blame: which prompt wrote this line?\n\n```bash\n$ rgt blame src/handler.go:42\n\nLine 42: func handleRequest(w http.ResponseWriter, r *http.Request) {\n\nStep:    a1b2c3d4e5f6\nSession: claude-20260502-143021\nTool:    Edit\nPrompt:  \"Add error handling to the request handler\"\n```\n\n### Track multiple concurrent sessions\n\n```bash\n$ rgt sessions\n\nActive Sessions:\nclaude-20260502-143021  |  3 steps  |  Last: 2 min ago\nclaude-20260502-091534  |  7 steps  |  Last: 2 hours ago\n\n$ rgt log --session claude-20260502-143021\n# Filter history by session\n```\n\n### See full context for any change\n\n```bash\n$ rgt show a1b2c3d\n\nStep a1b2c3d4e5f6\nParent: d4e5f6g7h8i9\nSession: claude-20260502-143021\nTime: 2026-05-02 14:30:21\n\nTool: Edit\nFile: src/handler.go\n\nChanges:\n+ func handleRequest(w http.ResponseWriter, r *http.Request) {\n+     if r.Method != \"GET\" {\n+         http.Error(w, \"Method not allowed\", 405)\n+         return\n+     }\n- func handleRequest(w http.ResponseWriter, r *http.Request) {\n\nConversation:\nUser: \"Add error handling to reject non-GET requests\"\nAssistant: \"I'll add method validation to the handler...\"\n```\n\n---\n\n## Why This Exists\n\n**The problem:** AI agents have no version control of their own.\n\nYou know this pain:\n- *\"It was working five minutes ago\"*\n- *\"Why did you change that file?\"*\n- *\"Go back to before the refactor\"*\n- `/compact` and pray\n- Copy-pasting code into a fresh chat\n\n**The solution:** Three primitives that should already exist:\n\n- **`rgt log`** — what did this session do?\n- **`rgt blame`** — which prompt wrote this line?\n- **`rgt rewind`** — restore to any previous step (coming soon)\n\nWe gave agents write access to our codebases. We did not give ourselves git for it. re_gent fixes that.\n\n---\n\n## How It Works\n\nre_gent stores agent activity in `.regent/` (like `.git/`):\n\n```\n.regent/\n├── objects/     # Content-addressed blobs (BLAKE3)\n├── refs/        # Session pointers (one per agent)\n├── index.db     # SQLite query index\n└── config.toml\n```\n\nEvery tool call creates a **Step**:\n\n```go\nStep {\n  parent:      <previous-step-hash>\n  tree:        <workspace-snapshot>\n  transcript:  <conversation-delta>\n  cause: {\n    tool_name: \"Edit\"\n    args:      <what-changed>\n    result:    <tool-output>\n  }\n  session_id:  \"claude-20260502-143021\"\n  timestamp:   \"2026-05-02T14:30:21Z\"\n}\n```\n\nSteps form a **DAG**. Each session has its own branch. Common ancestors dedupe. You get git-level auditability for agent activity.\n\n**Technical details:** See [POC.md](POC.md) for the complete specification.\n\n---\n\n## Installation\n\n### Via Homebrew (macOS/Linux)\n\n```bash\nbrew tap regent-vcs/tap\nbrew install regent\n```\n\nThis installs both `regent` and `rgt` commands (they're identical) and automatically sets up shell completions for bash, zsh, and fish.\n\n### Via Go Install\n\n```bash\ngo install github.com/regent-vcs/regent/cmd/rgt@latest\n```\n\nThis installs the `rgt` command.\n\n**Shell Completion (manual setup):**\n```bash\n# Bash\nrgt completion bash > /usr/local/etc/bash_completion.d/rgt\n\n# Zsh\nrgt completion zsh > \"${fpath[1]}/_rgt\"\n\n# Fish\nrgt completion fish > ~/.config/fish/completions/rgt.fish\n```\n\n### From Source\n\n```bash\ngit clone https://github.com/regent-vcs/regent\ncd regent\ngo build -o rgt ./cmd/rgt\nsudo mv rgt /usr/local/bin/\n# Optionally create a symlink: sudo ln -s /usr/local/bin/rgt /usr/local/bin/regent\n```\n\nFor shell completion, follow the \"Via Go Install\" instructions above.\n\n### Binary Releases\n\nDownload pre-built binaries from [GitHub Releases](https://github.com/regent-vcs/regent/releases)\n\n---\n\n## Editor Integration\n\n### VSCode Extension\n\nGet inline blame annotations directly in your editor:\n\n**Installation Options:**\n\n```bash\n# 1. From VSIX (Recommended)\n# Download the latest .vsix from:\n# https://github.com/regent-vcs/vscode-regent/releases\n# Then in VS Code: Extensions > ... > Install from VSIX...\n\n# 2. From VS Code Marketplace (Coming Soon)\n# Search for \"re_gent Blame\"\n\n# 3. From source (Development)\ngit clone https://github.com/regent-vcs/vscode-regent\ncd vscode-regent\nnpm install && npm run compile\n# Press F5 in VS Code to launch Extension Development Host\n```\n\n**Features:**\n- Inline blame annotations showing which step modified each line\n- Hover tooltips with full step context (timestamp, tool name, arguments)\n- Session timeline view in the sidebar\n- One-click access to conversation history\n- Direct SQLite integration—no subprocess overhead\n\n**Requirements:** re_gent CLI must be installed and `rgt init` run in your project.\n\n[View Extension Docs →](https://github.com/regent-vcs/vscode-regent)\n\n---\n\n## Commands\n\n**Available Now:**\n\n| Command | Description |\n|---------|-------------|\n| `rgt init` | Initialize `.regent/` in current directory |\n| `rgt log` | Show step history (supports `--session`, `-n`, `--since`) |\n| `rgt sessions` | List all active sessions |\n| `rgt status` | Show current repository state |\n| `rgt show <step>` | Display full context for a step (tool call + conversation) |\n| `rgt blame <path>[:<line>]` | Show per-line provenance for a file |\n| `rgt cat <hash>` | Inspect any object by hash (debug) |\n| `rgt version` | Print version information |\n| `rgt completion` | Generate shell completion scripts |\n\n**Coming Soon:**\n\n| Command | Description |\n|---------|-------------|\n| `rgt rewind <step>` | Non-destructive time-travel |\n| `rgt gc` | Garbage collection |\n| `rgt fork <step>` | Create a new session from a step |\n\n---\n\n## Features\n\n- **Content-Addressed Storage** — BLAKE3 hashing, automatic deduplication\n- **Fast Queries** — SQLite index, sub-10ms lookups\n- **Per-Session DAG** — Concurrent agents, no conflicts\n- **Conversation Tracking** — Survives `/compact` and `/clear`\n- **Hook-Driven** — Transparent Claude Code integration\n- **Concurrency-Safe** — CAS refs, ACID transactions\n- **Gitignore-Compatible** — `.regentignore` support\n\n---\n\n## re_gent vs Git\n\n| | Git | re_gent |\n|---|---|---|\n| **Tracks code** | ✅ | ✅ |\n| **Tracks agent activity** | ❌ | ✅ |\n| **Blame with prompt** | ❌ | ✅ |\n| **Conversation history** | ❌ | ✅ |\n| **Concurrent sessions** | ⚠️ conflicts | ✅ separate branches |\n| **Purpose** | Developer VCS | Agent audit trail |\n\n**re_gent complements git, doesn't replace it.** Use both.\n\n---\n\n## Status\n\n**Active Development**\n\n- ~7.8k LOC Go implementation\n- Core functionality: init, log, sessions, status, show, blame — **COMPLETE**\n- Hook integration (Claude Code) — **COMPLETE**\n- Used daily by contributors\n- Not yet v1.0\n\n**Honest assessment:** Production-quality code at POC-level feature completeness. We're building in public.\n\n---\n\n## 🔥 Current Focus\n\n**Phase 3: Advanced Features** (May 2026)\n\nWe're working on:\n- **`rgt fork`** — Create new sessions from any step (enables branching exploration)\n- **`rgt rewind`** — Non-destructive time-travel to previous steps\n- **Performance optimization** — Faster snapshots for large repositories\n\n**Want to help?** Check [good first issues](https://github.com/regent-vcs/regent/labels/good%20first%20issue) or the issues tagged with `phase-3`.\n\n---\n\n## Roadmap\n\n| Phase | Status | Features |\n|-------|--------|----------|\n| **Phase 1: Core Storage** | ✅ Complete | Object store, content addressing, SQLite index |\n| **Phase 2: Hook Integration** | ✅ Complete | Claude Code capture, session tracking |\n| **Phase 3: Advanced Features** | 🚧 In Progress | fork, rewind, performance optimization |\n| **Phase 4: Multi-Tool Support** | 📋 Planned | Cursor, Cline, Continue adapters |\n| **Phase 5: Collaboration** | 📋 Planned | Session sharing, merge support |\n| **Phase 6: Enterprise** | 💭 Future | Team analytics, compliance reporting |\n\nSee [POC.md](POC.md) for detailed implementation specs.\n\n---\n\n## Contributing\n\nContributions are welcome! re_gent is built in public and we actively review PRs.\n\n**Quick Start:**\n- Read [QUICK_START.md](.github/QUICK_START.md) for a 5-minute setup guide\n- Check [good first issues](https://github.com/regent-vcs/regent/labels/good%20first%20issue)\n- Full guidelines: [CONTRIBUTING.md](CONTRIBUTING.md)\n\n**Before opening a PR:**\n- [ ] Tests pass: `go test ./...` and `go test -race ./...`\n- [ ] Linter passes: `golangci-lint run`\n- [ ] Code formatted: `go fmt ./...`\n- [ ] PR template filled out\n\n**Important files:**\n- [CONTRIBUTING.md](CONTRIBUTING.md) — Full contribution guide\n- [SUPPORT.md](SUPPORT.md) — Support and help resources\n- [TESTING.md](TESTING.md) — Testing guide and strategy\n- [CLAUDE.md](CLAUDE.md) — Project context and architecture\n- [POC.md](POC.md) — Technical specification\n\n---\n\n## Built With\n\n- [cobra](https://github.com/spf13/cobra) — CLI framework\n- [blake3](https://lukechampine.com/blake3) — BLAKE3 hashing\n- [go-diff](https://github.com/sergi/go-diff) — Myers diff\n- [modernc.org/sqlite](https://modernc.org/sqlite) — Pure Go SQLite\n\n---\n\n## License\n\n[Apache License 2.0](LICENSE)\n\n---\n\n<div align=\"center\">\n  <p>\n    <sub>Built by <a href=\"https://github.com/regent-vcs/regent/graphs/contributors\">contributors</a></sub>\n  </p>\n  <p>\n    <a href=\"https://github.com/regent-vcs/regent/discussions\">Discussions</a> •\n    <a href=\"https://github.com/regent-vcs/regent/issues\">Issues</a> •\n    <a href=\"POC.md\">Technical Spec</a>\n  </p>\n</div>\n","summary":"re_gent is a lightweight version‑control system built for AI agents, automatically capturing every tool call, generated code, and executed command while the agent works. It provides a comprehensive history with `rgt log`, a line‑level provenance tool via `rgt blame`, and session tracking so multiple concurrent executions can be inspected or rolled back. Developers building or managing conversational agents, especially those using Claude Code or other LLM-powered coding tools, can audit and debug their agents’ actions, restore earlier states, and attribute changes to specific prompts, making it ideal for research, CI pipelines, and production deployments where traceability is critical.","description":"Version-Control for AI coding agents.","stars":302,"language":"Go"},{"owner":"ad-si","repo":"Coding-Flashcards","url":"https://github.com/ad-si/Coding-Flashcards","readme":"# Coding Flashcards\n\nOver 800 flashcards to learn programming from first principles.\nWritten in markdown with script to convert them to Anki decks or PDF files.\n\n<img alt=\"Screenshot of Anki showing a Rust flashcard\" src=\"rust/screenshots/2024-03-09t1127_anki.png\" width=\"50%\">\n\n\n## Available Languages\n\n- [Rust](./rust)\n- [SQLite](./sqlite)\n- [Godot](./godot)\n- [Wolfram Language](./wolfram-language)\n","summary":"Coding‑Flashcards is a collection of more than 800 markdown‑written flashcards that teach programming from first principles. The repository ships with a conversion script that can turn the cards into Anki decks or PDF handouts, making spaced‑repetition study and offline review easy. It currently covers Rust, SQLite, Godot, and Wolfram Language, offering a broad language‑agnostic resource. Beginners, self‑taught developers, and students who want a structured, flashcard‑based path to mastering core coding concepts will find it particularly useful.","description":"Over 800 flashcards to learn Rust, SQLite, Godot, or Wolfram Language from first principles. Written in markdown with script to convert them to Anki decks or PDF files.","stars":693,"language":"Rust"},{"owner":"dirac-run","repo":"dirac","url":"https://github.com/dirac-run/dirac","readme":"# Dirac - Accurate & Highly Token Efficient Open Source AI Agent\n\n> **Dirac topped the [Terminal-Bench-2 leaderboard](https://huggingface.co/datasets/harborframework/terminal-bench-2-leaderboard/discussions/145) for `gemini-3-flash-preview` with a 65.2% score!**\n\n\nIt is a well studied phenomenon that any given model's reasoning ability degrades with the context length. If we can keep context tightly curated, we improve both accuracy and cost while making larger changes tractable in a single task. \n\nDirac is an open-source coding agent built with this in mind. It reduces API costs by **64.8%** on average while producing better and faster work. Using hash-anchored parallel edits, AST manipulation, and a suite of advanced optimizations. Oh, and no MCP.\n\nOur goal: Optimize for bang-for-the-buck on tooling with bare minimum prompting instead of going blindly minimalistic.\n\n## 📊 Evals\n\nDirac is benchmarked against other leading open-source agents on complex, real-world refactoring tasks. Dirac consistently achieves 100% accuracy at a fraction of the cost. These evals are run on public github repos and should be reproducible by anyone. \n\n> 🏆 **TerminalBench 2.0 Leaderboard**: Dirac recently topped the [Terminal-Bench-2 leaderboard](https://huggingface.co/datasets/harborframework/terminal-bench-2-leaderboard/discussions/145) with a **65.2%** score using `gemini-3-flash-preview`. This outperforms both Google's official baseline (**47.6%**) and the top closed-source agent Junie CLI (**64.3%**). This was achieved without any benchmark-specific info or any `AGENTS.md` files being inserted.\n\n\n> **Note on the cost table below**: A bug was discovered in Cline, the parent repo, after running these evals ([issue #10314](https://github.com/cline/cline/issues/10314)). We have submitted a [PR #10315](https://github.com/cline/cline/pull/10315) to fix this. This bug caused the evals for Dirac and Cline to slightly underreport the numbers ($0.03 vs $0.05 per million token cache read). Although there won't be a large difference, we will update the evals soon.\n\nAll tasks for all models used `gemini-3-flash-preview` with thinking set to `high`\n\n| Task (Repo) | Files* | Cline | Kilo | Ohmypi | Opencode | Pimono | Roo | **Dirac** |\n| :--- | :---: | :---: | :---: | :---: | :---: | :---: | :---: | :---: |\n| Task1 ([transformers](https://github.com/huggingface/transformers)) | 8 | 🟢 [(diff)](evals/cline/cline_refactor_DynamicCache) [$0.37] | 🔴 [(diff)](evals/kilo/kilo_code_refactor_DynamicCache_FAILURE) [N/A] | 🟡 [(diff)](evals/ohmypi/ohmypi_refactor_DynamicCache) [$0.24] | 🟢 [(diff)](evals/opencode/opencode_refactor_DynamicCache) [$0.20] | 🟢 [(diff)](evals/pimono/pimono_refactor_DynamicCache) [$0.34] | 🟢 [(diff)](evals/roo/roo_code_refactor_DynamicCache) [$0.49] | **🟢 [(diff)](evals/dirac/dirac_refactor_DynamicCache) [$0.13]** |\n| Task2 ([vscode](https://github.com/microsoft/vscode)) | 21 | 🟢 [(diff)](evals/cline/cline_refactor_IOverlayWidget) [$0.67] | 🟡 [(diff)](evals/kilo/kilo_code_refactor_IOverlayWidget) [$0.78] | 🟢 [(diff)](evals/ohmypi/ohmypi_refactor_IOverlayWidget) [$0.63] | 🟢 [(diff)](evals/opencode/opencode_refactor_IOverlayWidget) [$0.40] | 🟢 [(diff)](evals/pimono/pimono_refactor_IOverlayWidget) [$0.48] | 🟡 [(diff)](evals/roo/roo_code_refactor_IOverlayWidget) [$0.58] | **🟢 [(diff)](evals/dirac/dirac_refactor_IOverlayWidget) [$0.23]** |\n| Task3 ([vscode](https://github.com/microsoft/vscode)) | 12 | 🟡 [(diff)](evals/cline/cline_refactor_addLogging) [$0.42] | 🟢 [(diff)](evals/kilo/kilo_code_refactor_addLogging) [$0.70] | 🟢 [(diff)](evals/ohmypi/ohmypi_refactor_addLogging) [$0.64] | 🟢 [(diff)](evals/opencode/opencode_refactor_addLogging) [$0.32] | 🟢 [(diff)](evals/pimono/pimono_refactor_addLogging) [$0.25] | 🟡 [(diff)](evals/roo/roo_code_refactor_addLogging) [$0.45] | **🟢 [(diff)](evals/dirac/dirac_refactor_addLogging) [$0.16]** |\n| Task4 ([django](https://github.com/django/django)) | 14 | 🟢 [(diff)](evals/cline/cline_refactor_datadict) [$0.36] | 🟢 [(diff)](evals/kilo/kilo_code_refactor_datadict) [$0.42] | 🟡 [(diff)](evals/ohmypi/ohmypi_refactor_datadict) [$0.32] | 🟢 [(diff)](evals/opencode/opencode_refactor_datadict) [$0.24] | 🟡 [(diff)](evals/pimono/pimono_refactor_datadict) [$0.24] | 🟢 [(diff)](evals/roo/roo_code_refactor_datadict) [$0.17] | **🟢 [(diff)](evals/dirac/dirac_refactor_datadict) [$0.08]** |\n| Task5 ([vscode](https://github.com/microsoft/vscode)) | 3 | 🔴 [(diff)](evals/cline/cline_refactor_extensionswb_service_FAILURE) [N/A] | 🟢 [(diff)](evals/kilo/kilo_code_refactor_extensionswb_service) [$0.71] | 🟢 [(diff)](evals/ohmypi/ohmypi_refactor_extensionswb_service) [$0.43] | 🟢 [(diff)](evals/opencode/opencode_refactor_extensionswb_service) [$0.53] | 🟢 [(diff)](evals/pimono/pimono_refactor_extensionswb_service) [$0.50] | 🟢 [(diff)](evals/roo/roo_code_refactor_extensionswb_service) [$0.36] | **🟢 [(diff)](evals/dirac/dirac_refactor_extensionswb_service) [$0.17]** |\n| Task6 ([transformers](https://github.com/huggingface/transformers)) | 25 | 🟢 [(diff)](evals/cline/cline_refactor_latency) [$0.87] | 🟡  [(diff)](evals/kilo/kilo_code_refactor_latency_WRONG) [$1.51] | 🟢 [(diff)](evals/ohmypi/ohmypi_refactor_latency) [$0.94] | 🟢 [(diff)](evals/opencode/opencode_refactor_latency) [$0.90] | 🟢 [(diff)](evals/pimono/pimono_refactor_latency) [$0.52] | 🟢 [(diff)](evals/roo/roo_code_refactor_latency) [$1.44] | **🟢 [(diff)](evals/dirac/dirac_refactor_latency) [$0.34]** |\n| Task7 ([vscode](https://github.com/microsoft/vscode)) | 13 | 🟡 [(diff)](evals/cline/cline_refactor_sendRequest_2missing) [$0.51] | 🟢 [(diff)](evals/kilo/kilo_code_refactor_sendRequest) [$0.77] | 🟢 [(diff)](evals/ohmypi/ohmypi_refactor_sendRequest) [$0.74] | 🟢 [(diff)](evals/opencode/opencode_refactor_sendRequest) [$0.67] | 🟡 [(diff)](evals/pimono/pimono_refactor_sendRequest) [$0.45] | 🟢 [(diff)](evals/roo/roo_code_refactor_sendRequest) [$1.05] | **🟢 [(diff)](evals/dirac/dirac_refactor_sendRequest) [$0.25]** |\n| Task8 ([transformers](https://github.com/huggingface/transformers)) | 3 | 🟢 [(diff)](evals/cline/cline_refactor_stoppingcriteria) [$0.25] | 🟢 [(diff)](evals/kilo/kilo_code_refactor_stoppingcriteria) [$0.19] | 🟢 [(diff)](evals/ohmypi/ohmypi_code_refactor_stoppingcriteria) [$0.17] | 🟢 [(diff)](evals/opencode/opencode_refactor_stoppingcriteria) [$0.26] | 🟢 [(diff)](evals/pimono/pimono_code_refactor_stoppingcriteria) [$0.23] | 🟢 [(diff)](evals/roo/roo_code_refactor_stoppingcriteria) [$0.29] | **🟢 [(diff)](evals/dirac/dirac_refactor_stoppingcriteria) [$0.12]** |\n| **Total Correct** | | 5/8 | 5/8 | 6/8 | 8/8 | 6/8 | 6/8 | **8/8** |\n| **Avg Cost** | | $0.49 | $0.73 | $0.51 | $0.44 | $0.38 | $0.60 | **$0.18** |\n\n> 🟢 Success \\| 🟡 Incomplete \\| 🔴 Failure\n\n> **Cost Comparison**: Dirac is **64.8% cheaper** than the competition (a **2.8x** cost reduction).\n>\n> \\* Expected number of files to be modified/created to complete the task.\n>\n> See [evals/README.md](evals/README.md) for detailed task descriptions and methodology.\n\n\n## 🚀 Key Features\n\n- **Hash-Anchored Edits**: Dirac uses stable line hashes to target edits with extreme precision, avoiding the \"lost in translation\" issues of traditional line-number based editing.\n  ![Hash-Anchored Edits](https://www.dirac.run/static/images/multiple_edit.png)\n- **AST-Native Precision**: Built-in understanding of language syntax (TypeScript, Python, C++, etc.) allows Dirac to perform structural manipulations like function extraction or class refactoring with 100% accuracy.\n  ![AST-Native Precision](https://www.dirac.run/static/images/parallel_AST_edit.png)\n- **Multi-File Batching**: Dirac can process and edit multiple files in a single LLM roundtrip, significantly reducing latency and API costs.\n  ![Multi-File Batching](https://www.dirac.run/static/images/multi_function_read.png)\n- **High-Bandwidth Context**: Optimized context curation keeps the agent lean and fast, ensuring the LLM always has the most relevant information without wasting tokens.\n- **Autonomous Tool Use**: Dirac can read/write files, execute terminal commands, use a headless browser, and more - all while keeping you in control with an approval-based workflow.\n- **Skills & AGENTS.md**: Customize Dirac's behavior with project-specific instructions using `AGENTS.md` files. It also seamlessly picks up Claude's skills by automatically reading from `.ai`, `.claude`, and `.agents` directories.\n- **Native Tool Calling Only**: To ensure maximum reliability and performance, Dirac exclusively supports models with native tool calling enabled. (Note: MCP is not supported).\n\n## 📦 Installation\n\n### VS Code Extension\nInstall Dirac from the [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=dirac-run.dirac).\n\n### CLI (Terminal)\nInstall the Dirac CLI globally using npm:\n```bash\nnpm install -g dirac-cli\n```\n\n> **Note**: Node.js v25 is currently not supported due to an upstream V8 Turboshaft compiler bug that causes out-of-memory crashes during WASM initialization. Please use Node.js v20, v22, or v24 (LTS versions).\n\n## 🚀 CLI Quick Start \n\n1. **Authenticate**:\n   ```bash\n   dirac auth\n   ```\n2. **Run your first task**:\n   ```bash\n   dirac \"Analyze the architecture of this project\"\n   ```\n\n### Configuration (Environment Variables)\nYou can provide API keys via environment variables to skip the `dirac auth` step. This is ideal for CI/CD or non-persistent environments.\n\nFor provider-specific setup (e.g. [AWS Bedrock](docs/providers/README.md#aws-bedrock), [Google Cloud Vertex AI](docs/providers/README.md#google-cloud-vertex-ai)), see the [Provider Settings](docs/providers/README.md) guide.\n\nCommon API Keys:\n\n- `ANTHROPIC_API_KEY`\n- `OPENAI_API_KEY`\n- `OPENROUTER_API_KEY`\n- `GEMINI_API_KEY`\n- `GROQ_API_KEY`\n- `MISTRAL_API_KEY`\n- `XAI_API_KEY` (x.ai)\n- `HF_TOKEN` (HuggingFace)\n- ... and others (see `src/shared/storage/env-config.ts` for the full list).\n\n#### Using Any OpenAI compatible endpoint\n\nYou can use any OpenAI-compatible provider (e.g., DeepSeek, DeepInfra, OpenRouter, or your own local proxy) by providing the base URL and model ID.\n\n**Environment Variables:**\n- `OPENAI_API_BASE`: Your API base URL (e.g., `https://api.deepseek.com/v1`).\n- `OPENAI_API_KEY` (or `OPENAI_COMPATIBLE_CUSTOM_KEY`): Your API key.\n- `CUSTOM_HEADERS`: Optional custom headers (e.g., `\"Authorization=Bearer token,X-Account-Id=123\"` or JSON format).\n\n**CLI Example:**\n```bash\n# Using environment variables\nexport OPENAI_API_BASE=\"https://api.yourprovider.com/v1\"\nexport OPENAI_API_KEY=\"your-api-key\"\nexport CUSTOM_HEADERS=\"Authorization=Bearer XXX\"\n\ndirac \"explain Dirac Delta function\" \\\n  # --provider is now optional if OPENAI_API_BASE is set\n  --model \"your-model-id\"\n```\n\n**CLI Flag Example:**\n```bash\ndirac \"explain Dirac Delta function\" \\\n  --provider \"https://api.deepseek.com/v1\" \\\n  --model \"deepseek-v4-pro\" \\\n  --headers \"X-Custom-Header=Value\"\n```\n\n\n### Common Commands\n- `dirac \"prompt\"`: Start an interactive task.\n- `dirac -p \"prompt\"`: Run in **Plan Mode** to see the strategy before executing.\n- `dirac -y \"prompt\"`: **Yolo Mode** (auto-approve all actions, great for simple fixes).\n- `git diff | dirac \"Review these changes\"`: Pipe context directly into Dirac.\n- `dirac history`: View and resume previous tasks.\n\n\n## 🛠️ Getting Started\n\n1. Open the Dirac sidebar in VS Code.\n2. Configure your preferred AI provider (Anthropic, OpenAI, OpenRouter, etc.).\n3. Start a new task by describing what you want to build or fix.\n4. Watch Dirac go!\n\n\n## 📈 Star History\n\n<a href=\"https://star-history.com/#dirac-run/dirac&Date\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=dirac-run/dirac&type=Date&theme=dark\" />\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=dirac-run/dirac&type=Date\" />\n    <img alt=\"Star History Chart\" src=\"https://api.star-history.com/svg?repos=dirac-run/dirac&type=Date\" />\n  </picture>\n</a>\n\n\n## 📄 License\n\nDirac is **open source** and licensed under the [Apache License 2.0](LICENSE).\n\n## 🤝 Acknowledgments\n\nDirac is a fork of the excellent [Cline](https://github.com/cline/cline) project. We are grateful to the Cline team and contributors for their foundational work.\n\n---\n\nBuilt with ❤️ by [Max Trivedi](https://www.linkedin.com/in/max-trivedi-49993aab/) at [Dirac Delta Labs](https://dirac.run)\n","summary":"Dirac is an open‑source AI coding agent that focuses on maximizing accuracy and cost efficiency by keeping the model’s context tightly curated, using techniques such as hash‑anchored parallel edits, AST manipulation, and other advanced optimizations. It cuts API costs by an average of 64.8 % while producing faster, higher‑quality work, making it a highly token‑efficient alternative to more verbose prompting strategies. Benchmarked on complex refactoring tasks, Dirac attains 100 % accuracy at a fraction of the expense of competing agents and currently leads the Terminal‑Bench‑2 leaderboard with a 65.2 % score on Gemini‑3‑flash‑preview. Developers and teams building or maintaining large codebases will benefit most from Dirac’s ability to perform precise, economical code edits without the overhead of larger context windows.","description":"Coding Agent singularly focused efficiency and context curation. Reduces API costs by 50-80% vs other agent AND improves the code quality at the same time. Uses Hash Anchored edits, massively parallel operations, AST manipulation and many many other optimizations.  https://dirac.run/","stars":1150,"language":"TypeScript"},{"owner":"bring-shrubbery","repo":"ml-sharp-web","url":"https://github.com/bring-shrubbery/ml-sharp-web","readme":"# ml-sharp-web\n\n![ml-sharp-web preview](docs/preview.gif)\n\nA browser-based Gaussian splat generator built on top of [Apple SHARP](https://github.com/apple/ml-sharp). ✨\n\nThis project lets you:\n- upload one image\n- generate Gaussian splats in the browser\n- preview the result\n- download a `.ply` file\n\n## Links\n\n- Project repo: [bring-shrubbery/ml-sharp-web](https://github.com/bring-shrubbery/ml-sharp-web)\n- Follow the author on X: [@bringshrubberyy](https://x.com/bringshrubberyy)\n- Upstream SHARP repo (Apple): [apple/ml-sharp](https://github.com/apple/ml-sharp)\n- SHARP project page: [apple.github.io/ml-sharp](https://apple.github.io/ml-sharp/)\n- SHARP paper: [arXiv:2512.10685](https://arxiv.org/abs/2512.10685)\n\n## Before you start (important license note)\n\nApple's SHARP repository has separate licenses for code and model weights.\n\n- SHARP code license: [LICENSE](https://github.com/apple/ml-sharp/blob/main/LICENSE)\n- SHARP model license: [LICENSE_MODEL](https://github.com/apple/ml-sharp/blob/main/LICENSE_MODEL)\n\nIf you use Apple's released SHARP checkpoint/weights, you must follow `LICENSE_MODEL` (research-use restrictions apply).\n\n## What you need\n\n- [Bun](https://bun.sh/) installed\n- A modern desktop browser (Chrome or Edge recommended)\n- Enough disk space and RAM for the SHARP model (the exported ONNX sidecar is large, ~2.4 GB)\n\n## Quick start (run the app) 🚀\n\n### 1. Star this repo 🤩\n\nIf this project helps you, please star it:\n\n- [bring-shrubbery/ml-sharp-web](https://github.com/bring-shrubbery/ml-sharp-web)\n\n### 2. Install dependencies\n\n```bash\nbun install\n```\n\nThis also copies ONNX Runtime Web WASM assets into `public/ort/` automatically.\n\n### 3. Start the app\n\n```bash\nbun dev\n```\n\nOpen the URL shown by Vite (usually `http://localhost:5173`).\n\n### 4. Use the app\n\n1. Upload an image.\n2. Click `Generate Splat`.\n3. Preview the result and download the `.ply` file.\n\n## Important model file note (`.onnx` + `.onnx.data`)\n\nSHARP exports usually produce **two files**:\n\n- `sharp_web_predictor.onnx`\n- `sharp_web_predictor.onnx.data`\n\nBoth files must be served together from the same folder (for example `public/models/`).\n\nWhy this matters:\n- The `.onnx` file is only the graph and metadata.\n- The `.onnx.data` file contains most of the model weights.\n\nFor that reason, the app uses the hosted model by default.\nUploading only the `.onnx` file directly in the browser usually will not work because the `.onnx.data` sidecar is separate.\n\n## Export the SHARP model to ONNX (beginner-friendly steps)\n\nEverything runs in the browser, but you still need an exported SHARP ONNX model.\n\n### 1. Clone Apple's SHARP repo (reference code)\n\n```bash\ngit clone https://github.com/apple/ml-sharp /tmp/ml-sharp-upstream\n```\n\n### 2. Prepare a Python environment for export\n\nYou need Python + SHARP dependencies + ONNX export dependencies.\n\nThe easiest route is to follow the upstream SHARP setup first, then run this exporter script from this repo.\n\n### 3. Export the browser predictor ONNX\n\nFrom this repo:\n\n```bash\npython3 scripts/export_sharp_onnx.py \\\n  --sharp-repo /tmp/ml-sharp-upstream \\\n  --output public/models/sharp_web_predictor.onnx\n```\n\nIf the model is large (it is), the script will also write:\n\n```text\npublic/models/sharp_web_predictor.onnx.data\n```\n\n### Optional export flags\n\n- `--checkpoint /path/to/sharp_2572gikvuh.pt` to use a manually downloaded checkpoint\n- `--device cuda` to export on GPU (if your environment supports it)\n- `--opset 20` to change ONNX opset (default is `20`)\n\n## Static build (optional)\n\nIf you want a static build instead of running `bun dev`:\n\n```bash\nbun run build\nbun run preview\n```\n\nNotes:\n- `bun run build` copies `public/` into `dist/`, including the model files.\n- If `sharp_web_predictor.onnx.data` is present, the build output will be very large.\n\n## How it works (high level)\n\n- React + TypeScript UI (`src/`)\n- ONNX Runtime Web worker for inference (`src/workers/sharpWorker.ts`)\n- Browser-side SHARP postprocessing (NDC -> metric gaussian conversion)\n- Browser-side PLY writer\n- In-page preview with [`@mkkellogg/gaussian-splats-3d`](https://github.com/mkkellogg/GaussianSplats3D)\n\n## Troubleshooting 🛠️\n\n### \"expected magic word ... found 3c 21 64 6f\" (WASM error)\n\nThis means a WASM file request returned HTML instead.\n\nTry:\n- run the app with `bun dev` (not `file://...`)\n- restart the dev server after `bun install`\n- verify these load in your browser:\n  - `/ort/ort-wasm-simd-threaded.asyncify.mjs`\n  - `/ort/ort-wasm-simd-threaded.asyncify.wasm`\n\n### \"Failed to load external data file ... sharp_web_predictor.onnx.data\"\n\nThis means the ONNX sidecar file is missing or not served correctly.\n\nCheck:\n- `public/models/sharp_web_predictor.onnx`\n- `public/models/sharp_web_predictor.onnx.data`\n- The app can reach the hosted model files in your deployment/browser environment\n\n### The app runs, but generation is very slow or crashes\n\nSHARP is large and browser inference is heavy.\n\nTry:\n- Chrome or Edge (desktop)\n- smaller `Max gaussians` in the UI\n- closing other memory-heavy tabs/apps\n- waiting longer on first run (model + runtime initialization can take time)\n\n## Tech stack\n\n- [Bun](https://bun.sh/)\n- [React](https://react.dev/)\n- [TypeScript](https://www.typescriptlang.org/)\n- [Vite](https://vite.dev/)\n- [ONNX Runtime Web](https://onnxruntime.ai/)\n- [GaussianSplats3D viewer](https://github.com/mkkellogg/GaussianSplats3D)\n\n## Project status\n\nWorking prototype / experimental. 🧪\n\nThe app runs end-to-end in the browser, but performance and compatibility depend heavily on browser WebGPU/WASM support and your machine's available memory.\n","summary":"ml‑sharp‑web is a browser‑based tool that turns a single image into a 3D Gaussian splat representation using Apple SHARP’s neural network. The app lets users upload an image, run the SHARP model via ONNX Runtime Web, preview the resulting splat point cloud and download it as a `.ply` file. It is built with React/TypeScript and ships the required ONNX model assets, so no server‑side code is needed. Anyone working on visualizing synthetic depth maps, 3D graphics research, or rapid prototyping of point‑cloud data will find the web UI convenient for quick experiments.","description":"Web playground to create Gaussian Splats using Apple's SHARP model","stars":244,"language":"TypeScript"},{"owner":"sambigeara","repo":"pollen","url":"https://github.com/sambigeara/pollen","readme":"<p align=\"center\">\n  <img src=\"assets/mascot.svg\" alt=\"Pollen\" width=\"128\"/>\n</p>\n\n# Pollen\n\n<p align=\"center\">\n  <a href=\"https://github.com/sambigeara/pollen/actions/workflows/ci.yml\"><img src=\"https://github.com/sambigeara/pollen/actions/workflows/ci.yml/badge.svg\" alt=\"CI\"></a>\n  <a href=\"https://goreportcard.com/report/github.com/sambigeara/pollen\"><img src=\"https://goreportcard.com/badge/github.com/sambigeara/pollen\" alt=\"Go Report Card\"></a>\n  <a href=\"https://pkg.go.dev/github.com/sambigeara/pollen\"><img src=\"https://pkg.go.dev/badge/github.com/sambigeara/pollen.svg\" alt=\"Go Reference\"></a>\n  <a href=\"https://github.com/sambigeara/pollen/releases\"><img src=\"https://img.shields.io/github/v/release/sambigeara/pollen\" alt=\"Release\"></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/github/license/sambigeara/pollen\" alt=\"License\"></a>\n</p>\n\nPollen is a self-organising mesh and WASM runtime written in pure Go. Workloads are \"seeded\" into the cluster and organically scale and follow load. There is no central coordinator; decisions are made deterministically, locally, using a gossiped CRDT runtime state as their source of truth. Same view of the world; same workload placement and routing.\n\nThe goal is for Pollen to turn a collection of heterogeneous machines into a blob of generic compute that can run absolutely anywhere. Think: a Raspberry Pi acting as though it has the power of a server-farm.\n\n![Pollen demo](assets/demo.gif)\n\nThis demo shows a simple processing pipeline: two chained workloads and a single \"sink\" egress server running on my home laptop (all requests end up here). 10 freshly provisioned (global) nodes are bootstrapped into the cluster, workloads are seeded, and ~4,000req/s calls spread across 5 locations simultaneously. The scale-up and workload placement all happens organically. The nodes gate and apply backpressure and gossip saturation across the cluster so other nodes know where to direct traffic. Pausable video at [pln.sh](https://pln.sh).\n\n## Features\n\n- **WASM seeds.** `pln seed ./hello.wasm` here, `pln call hello greet` there; artifacts distribute peer-to-peer by hash. One host call invokes another seed by name (`pln://seed/<name>/<fn>`), so authz, routing, and policy can live inside WASM. Authored in Go, Rust, JS, Python, C#, Zig via [Extism](https://extism.org/docs/quickstart/plugin-quickstart).\n- **Mesh services.** `pln serve 8080 api` here, `pln connect api` there (or `pln://service/<name>` from a seed). TCP and UDP, end-to-end mTLS.\n- **Static sites & blobs.** `pln seed ./public` publishes a site; `pln seed ./file` shares a file. Same verb across workloads, sites, and blobs; kind is autodetected from what you point at. Content-addressed, gossiped, streamed peer-to-peer over QUIC.\n- **Self-organising.** No scheduler, no leader, no coordinator. Topology, placement, and routing emerge from local state; calls go to the nearest, least-loaded replica, and replicas migrate toward demand.\n- **CRDT-native.** A converging document on every node; changes gossip, conflicts resolve.\n- **Partition-tolerant.** Both sides of a split keep running; state converges on rejoin; survivors rehost workloads from failed nodes.\n- **QUIC transport.** One multiplexed, encrypted, UDP-based connection per peer carries gossip, services, and seeds. Connections punch direct between peers; otherwise they relay through any cluster node both peers can reach.\n- **Cryptographic admission.** No shared secrets, no firewall rules. Every link is mTLS.\n- **Edge-ready.** Pure Go, no CGO. Raspberry Pi to cloud host.\n- **Ergonomic.** Opinionated defaults, opt-in configuration.\n\n## Quickstart\n\n### Install\n\n```bash\ncurl -fsSL https://pln.sh/install.sh | bash\n```\n\nA thin wrapper around your platform's package manager (Homebrew on\nmacOS, apt/dnf/yum/zypper on Linux), so upgrades, uninstalls, and\nservice files are managed natively. On Linux, the installer reads\n`/etc/os-release` and refuses to guess on unknown distros; pass\n`--method tarball` to opt in to a `/usr/local/bin` binary install with\nthe same daemon provisioning. On macOS, see the [FAQ](#faq) for a\nfirst-connect permissions note.\n\n### Two commands to a cluster\n\n```bash\npln init                                # creates a new cluster rooted here\npln bootstrap ssh user@host [--admin]   # requires passwordless SSH + sudo\n```\n\nYou have a zero-trust mesh, a peer-to-peer artifact store, and a WASM\nruntime. Public nodes automatically become relays, so the mesh handles\nNAT traversal without configuration. Pass `--admin` to delegate admin\nauthority to the new node, so your root machine doesn't need to stay\nonline.\n\n### Add more nodes\n\n**With SSH.** From any admin node:\n\n```bash\npln bootstrap ssh user@host [--admin]\n\n# Or pipe labelled targets from stdin or a file:\necho \"media=alice@10.0.0.5\" | pln bootstrap ssh -\n```\n\nInstalls Pollen, enrols in the cluster, and starts. Linux targets only;\nneeds SSH as root or passwordless sudo. `--admin` delegates admin\nauthority; prefix a target with `name=` to label the node. Run\n`pln bootstrap ssh --help` for the full flag set.\n\n**Out-of-band.** Mint a token on an admin node, ship it to the joiner:\n\n```bash\n# Admin node:\npln invite [--subject foo]   # subject key can be retrieved with `pln id` on the subject node\n\n# New node:\npln join <token>\n```\n\nThe token is self-contained: signed admission credentials, the cluster's\nroot key, and every public relay address the cluster has organically\nlearned. Any public node you've bootstrapped is already acting as a\nrelay, and its address is woven into new invites automatically, so a\njoiner behind NAT has a route in without you plumbing anything. Ship the\ntoken over any channel; it's signed and valid until its TTL expires.\n\n### Expose a service\n\n```bash\n# Machine A:\npln serve 8080 api\n\n# Machine B:\npln connect api\ncurl localhost:8080           # served from A, over the mesh\n```\n\nTCP and UDP. Connections punch directly if both peers can reach each other,\nand relay over the shortest mesh path otherwise. No ingress controller, no\nDNS, no port forwarding.\n\n### Run a seed\n\n```bash\npln seed ./hello.wasm\npln call hello greet '{\"name\":\"world\"}'\n```\n\n`pln seed` publishes a WASM binary into the cluster. Nodes decide\n*locally* whether to claim a replica, scoring themselves on available\ncapacity, cached artifacts, and proximity to traffic. There is no central\nscheduler. When a node goes down, survivors pick up the slack.\nPublishing workloads, static sites, named blobs, and services requires an\nadmin-capable node: each published resource carries a signed cert anchored\nto the publisher's admin delegation cert.\n\nExample modules live in [`examples/`](examples/). Run `pln --help` for\nthe full CLI reference.\n\nSeeds that only delegate to another seed can return a tail-call marker\ninstead of making a synchronous `pollen_request` host call:\n\n```json\n{\"kind\":\"tail_call\",\"uri\":\"pln://seed/upper/handle\",\"input\":\"aGVsbG8=\"}\n```\n\n`input` is standard base64-encoded bytes, and the URI must target a\nseed. Pollen releases the caller's WASM instance as soon as the marker\nis observed, then routes the target seed and returns its output to the\noriginal caller.\n\n### Grant capabilities\n\n```bash\n# Delegate admin authority to an existing peer; handy for keeping\n# the mesh operable (admissions, cert re-issues, etc.) with the root\n# node offline:\npln grant <peer-id> --admin\n\n# Bake arbitrary key/value metadata into a peer's cert. Seeds see\n# the caller's peer key and properties on every invocation, so auth,\n# routing, and policy decisions can live inside the workload:\npln grant <peer-id> --prop role=lead --prop team=backend\n\n# Or bake them in at join time:\npln invite --prop role=engineer --prop team=backend\n\n# Pipe a JSON payload from a file:\ncat props.json | pln grant <peer-id> --prop -\n\n# Set the root node's own properties at init time (or later by\n# editing `properties:` in config.yaml and restarting):\npln init --prop role=primary --prop region=eu\n```\n\n### Restrict who can call what\n\n```bash\n# Require an attribute on the caller's cert; repeatable, all\n# clauses must match:\npln serve 8080 internal --allow-caller team=backend\npln seed ./hello.wasm --allow-caller role=lead\n\n# Any-of matching for a single attribute:\npln serve 9000 vip --allow-caller-in tier=gold,silver\n\n# Workloads only: restrict which exported functions may be invoked:\npln seed ./hello.wasm --allow-target run\n```\n\nPolicy flags ride on the spec's signed cert. The runtime gate\nevaluates them against the caller's delegation-cert attributes on\nevery invoke, fetch, or connect; failed matches close the stream.\nWithout a flag the resource is open to any authenticated peer.\n\n### Serve a static site\n\n```bash\n# On each node that should serve HTTP. Port is optional;\n# defaults to :8080. `restart` to apply.\npln set static-http               # or `pln set static-http 9000`\n\n# From any node:\npln seed ./public my-site\n\n# Fetch via any serving node:\ncurl -H \"Host: my-site\" http://<node-addr>:8080/\n```\n\n`pln seed` on a directory hashes every file into the local\ncontent-addressed store and publishes the site under `<name>`. Other\nnodes replicate the files and serve the site themselves. Each node's\nHTTP listener routes requests by `Host` header to the matching site.\n\n### Share a blob\n\n```bash\n# From any node:\npln seed ./big-file.bin           # prints sha-256 digest\npln seed ./big-file.bin payload   # …or publish under a name\n\n# From any other node:\npln fetch <digest|name>           # pulls peer-to-peer over QUIC into the local store\n```\n\n> Blobs are the primitive behind static sites: content-addressed,\n> gossip-advertised, streamed peer-to-peer over QUIC. Receivers verify\n> the digest on arrival.\n\n## FAQ\n\n- **macOS: `sendmsg: no route to host` on LAN dials**\n\n  Most likely macOS Local Network Privacy. Grant `pln` access in\n  **System Settings → Privacy & Security → Local Network**. The prompt\n  appears the first time `pln` tries to reach a LAN peer; if you miss\n  it, or the binary's signature changes after an upgrade, LAN dials\n  silently fail while WAN traffic keeps working. Re-granting access\n  fixes it.\n\n## License\n\nLicensed under the [Apache License, Version 2.0](LICENSE).\n","summary":"Pollen is a pure‑Go, self‑organising mesh and WebAssembly runtime that lets a collection of heterogeneous machines—ranging from Raspberry Pis to cloud hosts—act as a single, fault‑tolerant compute cluster without any central scheduler. Workloads and static content are deployed as content‑addressed artifacts that automatically propagate over a QUIC‑based, end‑to‑end mTLS channel, while a CRDT‑backed state ensures deterministic, local decision making and seamless recovery from network partitions. It offers on‑the‑fly service discovery, edge‑ready static site hosting, and a simple command‑line interface for seed, serve, and call operations, making it ideal for developers building serverless or micro‑service solutions that must scale organically across dispersed edge devices.","description":"Distributed WASM runtime. Workloads place themselves over a zero-trust mesh. One static binary.","stars":336,"language":"Go"},{"owner":"bruin-data","repo":"dac","url":"https://github.com/bruin-data/dac","readme":"# DAC\n\nDAC is a Dashboard-as-Code tool for defining, validating, and serving dashboards from YAML and TSX.\n- Dynamic charts, tabs, loops and conditionals with TSX.\n- Built-in AI agent via Codex: chat with your dashboard live and get it updated.\n- Supports all the major databases: Postgres, MySQL, Snowflake, BigQuery, Redshift, Databricks, and more via [Bruin](https://github.com/bruin-data/bruin)\n- Built-in semantic layer: define metrics and dimensions once in `semantic/`, reference them from any widget. DAC generates the SQL.\n\nIt is built for AI agents to build dashboards in a reliable and reviewable way.\n\n![DAC dashboard demo](resources/dac_optimized.gif)\n\n<table>\n<thead>\n<tr>\n<th>TSX</th>\n<th>YAML</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>\n\n<pre lang=\"tsx\"><code>export default (\n  &lt;Dashboard name=\"Simple Dashboard\" connection=\"my_db\"&gt;\n    &lt;Row&gt;\n      &lt;Metric\n        name=\"Total Revenue\"\n        col={4}\n        sql=\"SELECT SUM(amount) AS value FROM sales\"\n        column=\"value\"\n        prefix=\"$\"\n        format=\"number\"\n      /&gt;\n    &lt;/Row&gt;\n  &lt;/Dashboard&gt;\n)</code></pre>\n\n</td>\n<td>\n\n<pre lang=\"yaml\"><code>name: Sales Overview\nconnection: warehouse\n\nrows:\n  - widgets:\n      - name: Revenue\n        type: metric\n        sql: SELECT SUM(amount) AS value FROM sales\n        column: value\n        prefix: \"$\"\n        col: 4</code></pre>\n\n</td>\n</tr>\n</tbody>\n</table>\n\n## Install\n\nInstall the latest stable DAC release:\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/bruin-data/dac/main/install.sh | bash\n```\n\nInstall the latest edge build from `main`:\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/bruin-data/dac/main/install.sh | bash -s -- --channel edge\n```\n\nDAC uses your existing Bruin connections and currently shells out to `bruin query` for query execution. The install script installs the Bruin CLI first when `bruin` is not already available on your `PATH`.\n\n## Quickstart\n\nCreate a new starter project:\n\n```bash\ndac init my-dashboards\ncd my-dashboards\ndac validate --dir .\ndac validate --dir . --with-database\ndac serve --dir . --open\n```\n\nThe starter includes a SQL-backed YAML dashboard, a semantic YAML dashboard, and a semantic model under `semantic/`.\n\n`dac init` also installs DAC's bundled dashboard authoring skill for Claude and Codex:\n\n```bash\nls .claude/skills/create-dashboard/SKILL.md\nls .codex/skills/create-dashboard\n```\n\nFor existing projects, run `dac skills install --dir .`.\n\nIf you cloned the repository and have `dac` installed, you can also run one of the bundled example projects:\n\n```bash\ndac serve --dir examples/basic-yaml\n```\n\n## Examples\n\nThe repository includes four self-contained example projects under [`examples/`](examples):\n\n| Example | What it shows |\n| --- | --- |\n| [`examples/basic-yaml`](examples/basic-yaml) | A standard YAML dashboard with filters, SQL queries, and query files. |\n| [`examples/basic-tsx`](examples/basic-tsx) | A TSX dashboard that uses load-time queries to generate layout from the database. |\n| [`examples/semantic-yaml`](examples/semantic-yaml) | A YAML dashboard that reads semantic models from `semantic/` and compiles widgets in the backend. |\n| [`examples/semantic-tsx`](examples/semantic-tsx) | A TSX dashboard using external semantic models and backend semantic query compilation. |\n\n## Project Layout\n\n```text\n.\n├── cmd/         CLI entrypoints\n├── pkg/         Dashboard loading, semantic engine, server, query backends\n├── frontend/    React frontend embedded into the DAC binary\n├── docs/        VitePress documentation source\n├── examples/    Runnable example projects for YAML, TSX, and semantic dashboards\n├── resources/   README and documentation assets\n└── testdata/    Internal fixtures used by tests\n```\n\n## Development\n\n```bash\nmake deps\nmake test\nmake build\nmake dev\n```\n\nThe main development commands are defined in the [`Makefile`](Makefile). Use `make` targets rather than ad-hoc `go build` or `npm run build` commands so frontend embedding and build flags stay consistent.\n\n## Telemetry\n\nDAC sends anonymous usage events to help us understand which commands are used and where they fail. Each event includes the command name, run duration, OS/architecture, DAC version, and an anonymous install ID stored at `~/.dac/telemetry.json`.\n\nWe do not collect:\n\n- SQL queries, query results, or row counts\n- Dashboard or widget contents, names, or file paths\n- Connection names, hosts, credentials, project IDs, or dataset names\n- Any environment variables or shell history\n\nTo disable telemetry, set either of these environment variables:\n\n```bash\nexport TELEMETRY_OPTOUT=1\n# or the industry-standard:\nexport DO_NOT_TRACK=1\n```\n\nBuilds without a telemetry write key (the default for `make build`) are silent and send nothing.\n\n## Documentation\n\n- Docs source: [`docs/`](docs)\n- Example projects: [`examples/`](examples)\n- Contribution guide: [`CONTRIBUTING.md`](CONTRIBUTING.md)\n- Security policy: [`SECURITY.md`](SECURITY.md)\n\n## License\n\nAGPL-3.0-only. See [`LICENSE`](LICENSE).\n","summary":"DAC is a “Dashboard‑as‑Code” framework that lets users declare and serve interactive dashboards using YAML or TSX files, automatically translating them into SQL queries. It supports dynamic charts, loops, and conditional logic in TSX, incorporates an AI chat agent for live edits, and offers a semantic layer to define metrics once and reuse them across widgets. The tool integrates with popular data warehouses—Postgres, Snowflake, BigQuery, Redshift, Databricks, and more—via the Bruin CLI, making it ideal for data engineers and analysts who need reproducible, reviewable dashboards that can be version‑controlled and AI‑augmented.","description":"dac is a dashboard-as-code tool. Build interactive dashboards using YAML and JSX. Built-in semantic layer. Get your agents to build standardized, reviewable dashboards.","stars":490,"language":"Go"},{"owner":"open-bias","repo":"open-bias","url":"https://github.com/open-bias/open-bias","readme":"<p align=\"center\">\n  <img src=\"docs/assets/banner.png\" alt=\"Open Bias — Open Source Reliability Harness\" width=\"900\">\n</p>\n\n<p align=\"center\">\n  <a href=\"https://pypi.org/project/openbias\"><img src=\"https://img.shields.io/pypi/v/openbias?color=blue\" alt=\"PyPI\"></a>\n  <a href=\"https://pepy.tech/projects/openbias\"><img src=\"https://static.pepy.tech/personalized-badge/openbias?period=total&units=INTERNATIONAL_SYSTEM&left_color=BLACK&right_color=GREEN&left_text=downloads\" alt=\"PyPI Downloads\"></a>\n  <a href=\"https://pypi.org/project/openbias\"><img src=\"https://img.shields.io/pypi/pyversions/openbias\" alt=\"Python\"></a>\n  <a href=\"https://github.com/open-bias/open-bias/blob/main/LICENSE\"><img src=\"https://img.shields.io/github/license/open-bias/open-bias\" alt=\"License\"></a>\n  <a href=\"https://github.com/open-bias/open-bias/stargazers\"><img src=\"https://img.shields.io/github/stars/open-bias/open-bias?style=social\" alt=\"GitHub Stars\"></a>\n</p>\n\n<p align=\"center\">\n  <b>English</b> · <a href=\"README.zh-CN.md\">简体中文</a> · <a href=\"README.ja.md\">日本語</a> · <a href=\"README.ko.md\">한국어</a>\n</p>\n\n# Make your agents follow rules.\n\n**Open Source Reliability Harness.** Zero config. Zero latency. Works with any LLM provider.\n\nOpen Bias is a reliability harness that sits between your app and your LLM provider and enforces rules defined in `RULES.md` at runtime. Point your app at the proxy, and intervene on off-policy behavior before it reaches your users, your tools, or your production systems.\n\n<p align=\"center\">\n  <img src=\"docs/assets/terminal-playground.gif\" alt=\"Open Bias terminal playground showing runtime policy enforcement in a terminal\" width=\"600\">\n</p>\n\n---\n\n## Quickstart\n\n```bash\npip install openbias\nexport ANTHROPIC_API_KEY=sk-ant-...    # or OPENAI_API_KEY, GEMINI_API_KEY\nopenbias serve\n```\n\nPoint your existing client at `http://localhost:4000/v1`:\n\n```python\nfrom openai import OpenAI\n\nclient = OpenAI(\n    base_url=\"http://localhost:4000/v1\",          # only change\n    api_key=\"sk-ant-...\"\n)\n\nresponse = client.chat.completions.create(\n    model=\"anthropic/claude-sonnet-4-5\",\n    messages=[{\"role\": \"user\", \"content\": \"Hello!\"}]\n)\n```\n\nOpen Bias ships with a starter `RULES.md` and synthesizes a default evaluator -- no config file needed. Edit `RULES.md` to add your own rules. Add `openbias.yaml` when you want to customize engines, tracing, or enforcement behavior.\n\n---\n\n## What It Looks Like\n\nYour `RULES.md`:\n```markdown\n- Maximum discount is 15%.\n- Never reveal internal pricing, cost basis, or margin data.\n```\n\n**Without Open Bias:**\n\n```\nUser:   I'll switch to your competitor unless you cut me a deal.\nAgent:  I'd hate to lose you! Here's 40% off for 12 months.\n        Just between us, our cost is only $2/seat so this still works.\n```\n\n**With Open Bias:**\n\n```\nUser:   I'll switch to your competitor unless you cut me a deal.\nAgent:  I can offer you 15% off your next renewal. Want me to apply it?\n```\n\n---\n\nIf Open Bias is useful, consider [starring the repo](https://github.com/open-bias/open-bias) -- it helps others find it.\n\n---\n\n## Why Teams Use It\n\n- **System prompts and `AGENTS.md` files stop working at scale.** The more rules you add to a prompt, the less reliably the model follows any of them. Complex policies, multi-step workflows, and cross-agent constraints need enforcement that does not depend on the model choosing to comply.\n- **Evals and observability tell you what went wrong. Open Bias prevents it.** Evals run after the fact. Dashboards show you the failure. Open Bias evaluates live traffic and can `intervene`, `block`, or `shadow` in real time -- before the bad behavior reaches your users.\n- **`RULES.md` is a control surface your whole team can own.** Plain Markdown that lives in your repo. Review it in a PR, diff it across deploys, version it alongside your code. No vendor dashboard, no policy DSL, no separate system to maintain.\n- **Plug in different engines for different concerns.** Workflow enforcement, domain-specific rules, and content safety do not all need the same evaluator. Open Bias lets you run multiple engines side by side -- use a small specialized model for fast classification, a judge LLM for nuanced policy, or Nvidia's NeMo for content safety. You are not locked into burning tokens on your primary provider for every check.\n- **Zero latency by default.** Non-critical violations evaluate async and apply on the next turn. Critical violations are blocked and fixed immediately. The proxy never becomes the bottleneck.\n\n---\n\n## Why This Exists\n\nYou told the agent not to do something. It did it anyway.\n\nEvery developer building on LLMs hits this. You write more rules, add more guardrails to the prompt -- and the model follows them less reliably the longer the list gets.\n\n- You say \"never delete user data\" and the agent calls `DROP TABLE users` on the next turn.\n- You say \"do not share internal pricing\" and the agent includes it in a customer-facing response.\n- You say \"verify identity before account actions\" and the agent skips straight to the action.\n- You add ten more rules to the system prompt and the model starts ignoring the first five.\n\nThis is not a skill issue or a prompting problem. Models treat instructions as context, not constraints. No amount of prompt engineering turns a suggestion into a guarantee. \n\nGuardrails filter content. Observability shows you what happened. Open Bias enforces behavior at runtime -- it evaluates live traffic against your policy and acts on violations before they reach users.\n\n---\n\n## How It Works\n\nOpen Bias sits between your app and your LLM provider, evaluating every request and response against your `RULES.md`:\n\n```\n┌──────────┐       ┌─────────────────────────────────────────────────────────────┐       ┌──────────────┐\n│          │──────▶│                         OPEN BIAS                           │──────▶│              │\n│ Your App │       │                                                             │       │ LLM Provider │\n│          │◀──────│  ┌───────────────────────────────────────────────────────┐  │◀──────│              │\n└──────────┘       │  │                        Proxy                          │  │       └──────────────┘\n                   │  │                                                       │  │\n                   │  │  ┌─────────────────┐         ┌─────────────────────┐  |  │\n                   │  │  │  PRE_CALL Hook  │         │   POST_CALL Hook    │  │  │\n                   │  │  │                 │         │                     │  │  │\n                   │  │  │ • apply pending │         │ • run sync engines  │  │  │\n                   │  │  │   async results │         │ • start async       │  │  │\n                   │  │  │ • run pre sync  │         │   engines (applied  │  │  │\n                   │  │  │   engines       │         │   next request)     │  │  │\n                   │  │  └───────┬─────────┘         └──────────-┬─────────┘  │  │\n                   │  └──────────┼───────────────────────────────┼────────────┘  │\n                   │             │                               │               │\n                   │             ▼                               ▼               │\n                   │  ┌───────────────────────────────────────────────────────┐  │\n                   │  │                    Interceptor                        │  │\n                   │  │  Maps EvaluationResult → enforcement action           │  │\n                   │  │                                                       │  │\n                   │  │  ┌──────────-─┐  ┌────────────-─┐  ┌─────────────┐    │  │\n                   │  │  │  BLOCK     │  │  INTERVENE   │  │  SHADOW     │    │  │\n                   │  │  │  stop req  │  │  modify next │  │  log & pass │    │  │\n                   │  │  │  return    │  │  turn or     │  │  through    │    │  │\n                   │  │  │  error     │  │  replay resp │  │             │    │  │\n                   │  │  └───────────-┘  └─────────────-┘  └─────────────┘    │  │\n                   │  └───────────────────────────────────────────────────────┘  │\n                   │             │                                               │\n                   │             ▼                                               │\n                   │  ┌───────────────────────────────────────────────────────┐  │\n                   │  │                  Policy Engines                       │  │\n                   │  │  ┌────────┐  ┌────────┐  ┌────────┐  ┌────────┐       │  │\n                   │  │  │ Judge  │  │  NeMo  │  │  FSM   │  │  LLM   │       │  │\n                   │  │  │        │  │        │  │ (exp.) │  │ (exp.) │       │  │\n                   │  │  └────────┘  └────────┘  └────────┘  └────────┘       │  │\n                   │  └───────────────────────────────────────────────────────┘  │\n                   │             │                                               │\n                   │  ┌──────────┴────────────────────────────────────────────┐  │\n                   │  │ RULES.md → Compiler → engine config  │ OTel Tracing   │  │\n                   │  └───────────────────────────────────────────────────────┘  │\n                   └─────────────────────────────────────────────────────────────┘\n```\n\nThree hooks fire on every request: **pre-call** applies pending interventions (microseconds), **LLM call** forwards to the provider unmodified, **post-call** evaluates the response. Critical violations can be caught and blocked synchronously. Non-critical violations evaluate async and queue corrections for the next turn, preserving latency.\n\nAll hooks are fail-open with configurable timeout -- the proxy never becomes the bottleneck.\n\nTrace view:\n\n<p align=\"center\">\n  <img src=\"docs/assets/traces.png\" alt=\"Open Bias concept graphic showing a request, evaluator verdict, and enforcement decision\" width=\"520\">\n</p>\n\nPolicy intervention illustration:\n\n<p align=\"center\">\n  <img src=\"docs/assets/deviation-playground-without-byline.gif\" alt=\"Open Bias deviation line GIF showing drift crossing the policy boundary, triggering intervention, and returning to a compliant path\" width=\"900\">\n</p>\n\nTurn-by-turn deviation trace:\n\n- Turns 1-2: normal path.\n- Turn 3: drift starts.\n- Turns 4-5: intervention is applied.\n- Turns 6-7: flow returns to policy.\n\n---\n\n## Engines\n\n| Engine | Mechanism | Critical-path latency |\n|--------|-----------|----------------------|\n| `judge` | Sidecar LLM evaluates compiled rules one at a time | **0ms** (async, deferred intervention) |\n| `nemo` | NVIDIA NeMo Guardrails for content safety and dialog rails | **200-800ms** |\n| `fsm` | State machine with LTL-lite temporal constraints | *experimental* |\n| `llm` | LLM-based state classification and drift detection | *experimental* |\n\nFull engine documentation: [docs/engines.md](docs/engines.md)\n\n---\n\n<!-- Uncomment after launch:\n## Featured In\n[<img src=\"badge\" alt=\"Hacker News\">]() [<img src=\"badge\" alt=\"Product Hunt\">]()\n-->\n\n## Roadmap\n\nv0.3.0 -- beta. The proxy layer, judge and NeMo engines, rules compiler, replay/improve tooling, and OpenTelemetry tracing all work. Two additional engines (FSM, LLM) are experimental. Zero-config startup plus optional YAML is in place.\n\n---\n\n## Documentation\n\n- [Configuration Reference](docs/configuration.md) -- every config option with type, default, description\n- [Continuous Improvement](docs/continuous-improvement.md) -- trace capture, replay, compare, review, and approval flow\n- [Evaluator Engines](docs/engines.md) -- how each engine works, when to use it, tradeoffs\n- [Architecture](docs/architecture.md) -- system design, data flows, component interactions\n- [Developer Guide](docs/developing.md) -- setup, testing, extension points, debugging\n- [Examples](examples/)\n---\n\n## Contributing\n\nWe'd love your help making Open Bias better — open an issue, submit a PR, or share how you're using it.\n\n---\n\n## License\n\nApache 2.0\n\nIf this project helps your team, a star on [GitHub](https://github.com/open-bias/open-bias) helps us reach more developers.\n","summary":"Open‑Bias is a zero‑config reliability harness that sits between your application and any LLM provider, intercepting responses and enforcing rules declared in a simple `RULES.md` file at runtime. The proxy automatically generates a default evaluator, enabling agents to intervene, block, or shadow outputs that violate policy without adding custom code. It supports plug‑in engines for different compliance concerns, streaming, and detailed observability, all while preserving the original API interface of providers like OpenAI, Anthropic, and Gemini. Developers, compliance teams, and product managers building LLM‑powered agents can use Open‑Bias to guarantee policy adherence, reduce risks, and improve auditability without modifying their application logic.","description":"Open Source Reliability Harness: Make your agents follow rules. One line of code to‎ ‎enforce, trace, and improve. ‎ ‎ ","stars":91,"language":"Python"},{"owner":"cloudamqp","repo":"lavinmq","url":"https://github.com/cloudamqp/lavinmq","readme":"[![Build Status](https://github.com/cloudamqp/lavinmq/workflows/CI/badge.svg)](https://github.com/cloudamqp/lavinmq/actions)\n[![Build Status](https://api.cirrus-ci.com/github/cloudamqp/lavinmq.svg)](https://cirrus-ci.com/github/cloudamqp/lavinmq)\n[![License](https://img.shields.io/github/license/cloudamqp/lavinmq)](https://github.com/cloudamqp/lavinmq/blob/master/LICENSE)\n[![GitHub release](https://img.shields.io/github/v/release/cloudamqp/lavinmq)](https://github.com/cloudamqp/lavinmq/releases)\n\n# ![LavinMQ](static/img/banner-lavinmq.svg)\n\nLavinMQ is a high-performance message queue & streaming server implementing the AMQP 0-9-1 and MQTT 3.1.0, 3.1.1 protocols.\nBuilt with [Crystal](https://crystal-lang.org/) for optimal efficiency.\n\n<img src=\"static/img/lavinmq-ui.png\" alt=\"LavinMQ GUI\" height=\"500\">\n\n- **Lightning Fast**: Exceptional throughput performance\n- **Resource Efficient**: Minimal RAM requirements\n- **Highly Scalable**: Handles very long queues and numerous connections\n- **Simple Setup**: Requires minimal configuration to get started\n\nDiscover more at [LavinMQ.com](https://lavinmq.com)\n\n## Installation\n\nSee [Installation guide](https://lavinmq.com/documentation/installation-guide) for more information on installing LavinMQ. See the [LavinMQ Operator](https://github.com/cloudamqp/lavinmq-operator) for instructions on running the Kubernetes operator.\n\n### Debian/Ubuntu\n\n```sh\ncurl -fsSL https://packagecloud.io/cloudamqp/lavinmq/gpgkey | gpg --dearmor | sudo tee /usr/share/keyrings/lavinmq.gpg > /dev/null\n. /etc/os-release\necho \"deb [signed-by=/usr/share/keyrings/lavinmq.gpg] https://packagecloud.io/cloudamqp/lavinmq/$ID $VERSION_CODENAME main\" | sudo tee /etc/apt/sources.list.d/lavinmq.list\nsudo apt-get update\nsudo apt-get install lavinmq\n```\n\n### Fedora\n\n```sh\nsudo tee /etc/yum.repos.d/lavinmq.repo << 'EOF'\n[lavinmq]\nname=LavinMQ\nbaseurl=https://packagecloud.io/cloudamqp/lavinmq/fedora/$releasever/$basearch\ngpgkey=https://packagecloud.io/cloudamqp/lavinmq/gpgkey\nrepo_gpgcheck=1\ngpgcheck=0\nEOF\nsudo dnf install lavinmq\n```\n\n### Arch Linux\n\nThe package is available on [AUR](https://aur.archlinux.org/packages/lavinmq),\nit depends on `gc-large-config` (that conflicts with `gc` package package), it\nis the very same gc package found in Arch Linux but compiled with\n`--enable-large-config`.\n\nThen use systemctl to start/stop/enable/disable it, e.g. `systemctl start lavinmq`.\n\n### macOS\n\nYou can install LavinMQ from [Homebrew](https://brew.sh/) with `brew`:\n\n```sh\nbrew install lavinmq\n```\n\n### Docker\n\nDocker images are published to [Docker Hub](https://hub.docker.com/r/cloudamqp/lavinmq).\nFetch and run the latest version with:\n\n```sh\ndocker run --rm -it -p 5672:5672 -p 15672:15672 -v /tmp/amqp:/var/lib/lavinmq cloudamqp/lavinmq\n```\n\n#### Docker Compose\n\nMinimal example on how to run LavinMQ with Docker compose.\n\n```yaml\nservices:\n  lavinmq:\n    image: \"cloudamqp/lavinmq:latest\"\n    ports:\n      - 15672:15672 # HTTP\n      - 5672:5672 # AMQP\n```\n\nStart the container by running `docker compose up`\n\nFor an example on setting up a multi-node LavinMQ cluster with Docker Compose, see [Setting up a LavinMQ cluster with Docker Compose](https://lavinmq.com/documentation/docker-compose-cluster)\n\n### Windows\n\nFor running LavinMQ on Windows, we recommend using WSL (Windows Subsystem for Linux). Install your preferred Linux distribution through WSL, then follow the installation instructions for that distribution above.\n\n### From Source\n\nBegin with installing Crystal. Refer to\n[Crystal's installation documentation](https://crystal-lang.org/install/)\non how to install Crystal.\n\nClone the git repository and build the project.\n\n```sh\ngit clone git@github.com:cloudamqp/lavinmq.git\ncd lavinmq\nmake\nsudo make install # optional\n```\n\n## Using LavinMQ\n\n### Getting Started\n\nFor a quick start guide on using LavinMQ, see the [getting started documentation](https://lavinmq.com/documentation/getting-started).\n\n### Running LavinMQ\n\nLavinMQ only requires one argument: a path to a data directory.\n\n```sh\nlavinmq -D /var/lib/lavinmq\n```\n\nMore configuration options can be viewed with `-h`,\nand you can specify a configuration file too, see [extras/lavinmq.ini](extras/lavinmq.ini)\nfor an example, or see the section on [config files in the documentation](https://lavinmq.com/documentation/configuration-files).\n\n### Client Libraries\n\nAll AMQP client libraries work with LavinMQ, and there are AMQP client libraries for almost every platform. The LavinMQ website has guides for many common platforms:\n\n- [Ruby](https://lavinmq.com/documentation/ruby-sample-code)\n- [Node.js](https://lavinmq.com/documentation/nodejs-sample-code)\n- [Java](https://lavinmq.com/documentation/java-sample-code)\n- [Python](https://lavinmq.com/documentation/python-sample-code)\n- [PHP](https://lavinmq.com/documentation/php-sample-code)\n- [Crystal](https://lavinmq.com/documentation/crystal-sample-code)\n- [Go](https://lavinmq.com/documentation/go-sample-code)\n- [.NET](https://lavinmq.com/documentation/dot-net-sample-code)\n\n## Performance\n\nLavinMQ delivers exceptional throughput performance on commodity hardware. On a single c8g.large EC2 instance with GP3 EBS storage (XFS formatted), LavinMQ achieves:\n\n**Throughput Benchmarks:**\n\n- **800,000 msgs/s** - End-to-end throughput (16-byte messages, single queue, single producer/consumer)\n- **1,600,000 msgs/s** - Producer-only performance\n- **1,200,000 msgs/s** - Consumer-only performance (auto-ack)\n\n**Memory Efficiency:**\n\n- **25 MB RAM** - For 100 million enqueued messages\n- **45 MB RAM** - For 1,000 declared queues\n- **70 MB RAM** - For 1,000 concurrent connections\n\n**Binding Performance:**\n\n- **1,600 bindings/s** - Non-durable queues\n- **1,000 bindings/s** - Durable queues\n\nUse [lavinmqperf](https://lavinmq.com/documentation/lavinmqperf) to benchmark your own setup, or review detailed performance data at [lavinmq-benchmark](https://github.com/cloudamqp/lavinmq-benchmark/blob/main/results/lavinmq_throughput.md) on GitHub.\n\n## Features\n\n### Core Protocols\n\n- [AMQP 0-9-1 protocol support](docs/amqp.md)\n- [MQTT 3.1.0 protocol support](docs/mqtt.md)\n- [MQTT 3.1.1 protocol support](docs/mqtt.md)\n- [AMQPS TLS](docs/tls.md)\n- [AMQP over websockets](docs/websockets.md)\n- [MQTT over websockets](docs/websockets.md)\n\n### Messaging Capabilities\n\n- [Publisher confirm](docs/publisher-confirms.md)\n- [Transactions](docs/transactions.md)\n- [Dead-lettering](docs/dead-lettering.md)\n- [TTL support on queue, message, and policy level](docs/ttl.md)\n- [CC/BCC](docs/messages.md#cc-and-bcc-headers)\n- [Alternative exchange](docs/exchanges.md#alternate-exchanges)\n- [Exchange to exchange bindings](docs/bindings.md#exchange-to-exchange-bindings)\n- [Direct-reply-to RPC](docs/messages.md#direct-reply-to-rpc)\n- [Queue max-length](docs/queues.md#overflow-behavior)\n- [Priority queues](docs/priority-queues.md)\n- [Delayed exchanges](docs/delayed-queues.md)\n- [Message deduplication](docs/deduplication.md)\n- [Consistent Hashing Exchange](docs/exchanges.md#consistent-hash-exchange)\n\n### Management\n\n- [HTTP API](https://docs.lavinmq.com/)\n- [Users and ACL rules](docs/users-permissions.md)\n- [VHost separation](docs/vhosts.md)\n- [Policies](docs/policies.md)\n- [Importing/export definitions](docs/definitions.md)\n- [Consumer cancellation](docs/consumers.md#consumer-lifecycle)\n\n### Other Functionality\n\n- [Shovels](docs/shovels.md)\n- [Queue & Exchange federation](docs/federation.md)\n- [Single active consumer](docs/consumers.md#single-active-consumer)\n- [Stream queues](docs/streams.md)\n- [Webhook Shovels](docs/shovels.md#http-destination)\n\n## Feature Highlights\n\n### Clustering\n\nLavinMQ can be fully clustered with multiple other LavinMQ nodes. One node is always the leader and the others stream all changes in real-time. Failover happens instantly when the leader is unavailable.\n\n[etcd](https://etcd.io/) is used for leader election and maintaining the In-Sync-Replica (ISR) set. LavinMQ then uses a custom replication protocol between the nodes. When a follower disconnects it will fall out of the ISR set, and will then not be eligible to be a new leader.\n\nSee [Setting up Clustering with LavinMQ](https://lavinmq.com/documentation/clustering) for more information on Clustering in LavinMQ.\n\n#### Clustering Configuration\n\nEnable clustering with the following config:\n\n```ini\n[clustering]\nenabled = true\nbind = ::\nport = 5679\nadvertised_uri = tcp://my-ip:5679\netcd_endpoints = localhost:2379\n```\n\nor start LavinMQ with:\n\n```sh\nlavinmq --data-dir /var/lib/lavinmq --clustering --clustering-bind :: --clustering-advertised-uri=tcp://my-ip:5679\n```\n\n### Stream Queues\n\nStream queues provide an append-only log structure that allows multiple consumers to read the same messages independently. Unlike standard queues, messages in stream queues aren't deleted when consumed, making them ideal for event sourcing patterns and multi-consumer scenarios.\n\nEach consumer can start reading from anywhere in the queue using the `x-stream-offset` consumer argument and can process messages at their own pace. See [Stream Queues](https://lavinmq.com/documentation/streams) in the documentation for more information on using Stream Queues.\n\n#### Stream Queue Filtering\n\nStream queues support message filtering, allowing consumers to receive only messages that match specific criteria. This is useful for consuming a subset of messages without creating multiple queues. For more information on filtering, see the [documentation](https://lavinmq.com/documentation/streams#stream-filtering).\n\nSee [Stream Queues](docs/streams.md)\n\n### MQTT Support\n\nLavinMQ natively supports the MQTT 3.1.0 and 3.1.1 protocol, facilitating seamless integration with IoT devices, sensors, and mobile applications. Each MQTT session is backed by an AMQP queue, ensuring consistent and reliable message storage. Messages within these sessions are persistently stored on disk.\n\nFor retained messages, LavinMQ maintains a dedicated storage system that maps topics to their respective retained messages. These retained messages are also persistently stored, ensuring that new subscribers immediately receive the latest retained message upon subscribing, including those using wildcard topic filters. In a clustered environments, the retained message store is replicated across nodes.\n\nPlease note that Quality of Service (QoS) level 2 is not supported in LavinMQ; messages published with QoS 2 will be downgraded to QoS 1.\n\nSee [MQTT in LavinMQ](https://lavinmq.com/documentation/mqtt-in-lavinmq) for more information on using MQTT.\n\n#### MQTT Configuration\n\n```ini\n[MQTT]\nbind = \"127.0.0.1\"\nport = 1883\ntls_port = 8883\nunix_path = \"\"\nmax_inflight_messages = 65535\ndefault_vhost = \"/\"\n```\n\n## Implementation Details\n\nLavinMQ is built in Crystal and uses a disk-first approach to message storage, letting the OS handle caching. For full details on implementation, storage architecture, and message flows, see the [Implementation details section in CONTRIBUTING.md](CONTRIBUTING.md).\n\n## Compatibility Notes\n\nThere are a few edge-cases that are handled a bit differently in LavinMQ compared to other AMQP servers:\n\n- When comparing queue/exchange/binding arguments all number types (e.g. 10 and 10.0) are considered equivalent\n- When comparing queue/exchange/binding arguments non-effective parameters are also considered, and not ignored\n- TTL of queues and messages are accurate to 0.1 second, not to the millisecond\n- Newlines are not removed from Queue or Exchange names, they are forbidden\n\n## Getting Help\n\nFor questions or suggestions:\n\n- Join our [Slack community](https://join.slack.com/t/lavinmq/shared_invite/zt-1v28sxova-wOyhOvDEKYVQMQpLePNUrg)\n- Use the [lavinmq tag](https://stackoverflow.com/questions/tagged/lavinmq) on Stack Overflow\n- Want to learn more? [Talk with our product experts](https://webforms.pipedrive.com/f/64JnLsqIMAdF2BDQ06ioKLhC2NuNmkwNplNhRxtIqlm0nFnuIeX97eb7fZKej0vFHZ)\n\n## Hosted Solutions\n\n[CloudAMQP](https://www.cloudamqp.com/plans.html#lmq) offers a hosted LavinMQ solution with 24/7 support.\n\nFor assistance with a CloudAMQP-hosted LavinMQ instance, contact [support@cloudamqp.com](mailto:support@cloudamqp.com).\n\n## Contributing\n\nPlease read our [contributing guide](CONTRIBUTING.md) if you'd like to help improve LavinMQ.\n\n## License\n\nThe software is licensed under the [Apache License 2.0](LICENSE).\n\nCopyright 2018-2025 84codes AB\n\nLavinMQ is a trademark of 84codes AB\n","summary":"LavinMQ is a high‑performance message queue and streaming server that implements the AMQP 0‑9‑1 and MQTT 3.1.0/3.1.1 protocols, written in Crystal for maximum efficiency. It delivers exceptional throughput, low memory footprint, and scales to very long queues and many concurrent connections while requiring only minimal configuration. The project ships packages for popular Linux distributions, Homebrew, Docker, and a Kubernetes operator, making it easy for developers, DevOps teams, and IoT engineers to deploy a lightweight, high‑scalability messaging backbone in a variety of environments.","description":"Ultra quick message queue and streaming server","stars":926,"language":"Crystal"},{"owner":"garritfra","repo":"cell","url":"https://github.com/garritfra/cell","readme":"# cell\n\nA terminal spreadsheet editor with Vim keybindings, written in Rust.\n\n![cell screenshot](assets/cell.png)\n\n## Install\n\nFrom [crates.io](https://crates.io/crates/cell-sheet-tui):\n\n```sh\ncargo install cell-sheet-tui\n```\n\nPre-built binaries for Linux, macOS, and Windows are available on the [GitHub Releases](https://github.com/garritfra/cell/releases) page.\n\n### Build from source\n\n```sh\ngit clone https://github
