** | [SQLite](extensions/sqlite/) and [PostgreSQL](extensions/postgres/) extensions — embed Adam as SQL functions that query the same database |\n| **13 built-in tools** | File I/O, shell, calculator, SQL, web fetch/search, HTTP POST, memory, research, multi-agent |\n| **Long-term memory** | Hybrid BM25 + vector search via SQLite (sqlite-memory + sqlite-vector) |\n| **Session persistence** | Save/load conversations with UUIDv7 keys |\n| **Telegram bot** | Full-featured [Telegram integration](examples/telegram/) with text, voice, images, tools, and memory |\n| **Voice** | STT (Whisper cloud/local) + TTS (cloud/system) + full audio pipeline |\n| **Streaming** | Real-time token delivery via callback |\n| **Structured output** | `adam_run_json()` with validation and retry |\n| **Evolution loop** | Self-improving agent: iterate, score, refine strategy |\n| **Research mode** | Autonomous multi-iteration information gathering with report synthesis |\n| **Multi-agent** | Agent A invokes Agent B as a tool, with independent settings/tools |\n| **Guardrails** | Pre-send and post-receive validation callbacks |\n| **Response cache** | LRU hash table keyed on model + message history |\n| **History management** | Clone, summarize (LLM-based compression), token estimation |\n| **Thread pool** | Concurrent agent execution with job queue |\n| **Filesystem sandbox** | Tools restricted to explicitly allowed directories |\n| **Cross-platform** | macOS, Linux, Windows, iOS, Android, WASM (Emscripten) |\n| **Arena allocator** | Zero-leak per-iteration memory with automatic cleanup |\n\n## Build\n\n```bash\nmake deps          # Build llama.cpp, whisper.cpp (+ mbedtls/curl on Linux)\nmake all           # Build libadam.a\nmake test          # Build & run unit tests (ASan + UBSan)\nmake chat          # Interactive text chat (cloud API)\nmake chat GGUF=models/model.gguf  # Interactive text chat (local)\nmake vision GGUF=models/model.gguf MMPROJ=models/mmproj.gguf  # Local vision test\nmake talk          # Voice agent (cloud)\nmake talk LOCAL=1  # Voice agent (fully local)\nmake memory        # Memory system tests\nmake clean         # Remove all build artifacts\n```\n\n## API Reference\n\nFull API documentation with every function, type, and callback: **[API.md](API.md)**\n\n## Examples\n\n```c\nadam_settings_t *s = adam_create_settings();\nadam_settings_set_provider(s, ADAM_API_ANTHROPIC, api_key, \"claude-sonnet-4-20250514\");\n\nadam_history_t *h = adam_history_create();\nadam_run_result_t r = adam_run(s, h, \"Explain quantum entanglement simply.\");\nprintf(\"%s\\n\", r.final_response);\nadam_run_result_free(&r);\n\n// Continue the conversation — history carries forward\nr = adam_run(s, h, \"Can you give an analogy?\");\nprintf(\"%s\\n\", r.final_response);\nadam_run_result_free(&r);\n\nadam_history_destroy(h);\nadam_settings_destroy(s);\n```\n\nMore examples are available in the **[examples/](examples/)** directory:\n\n| Example | Description |\n|---------|-------------|\n| [simple-conversation](examples/simple-conversation/) | Multi-turn chat with a cloud API |\n| [tool-calling](examples/tool-calling/) | Register a custom tool and let the agent call it |\n| [local-model](examples/local-model/) | Run a local GGUF model via llama.cpp |\n| [local-vision](examples/local-vision/) | Image understanding with a local vision model + mmproj |\n| [google-gemini](examples/google-gemini/) | Use Google Gemini models |\n| [image-generation](examples/image-generation/) | Generate images with Gemini |\n| [sqlite-query](examples/sqlite-query/) | Natural language queries on any SQLite database |\n| [structured-json](examples/structured-json/) | Get validated JSON output with retry |\n| [memory](examples/memory/) | Long-term memory with hybrid BM25 + vector search |\n| [sessions](examples/sessions/) | Save and restore conversations |\n| [streaming](examples/streaming/) | Real-time token streaming via callback |\n| [voice](examples/voice/) | Speech-to-text + agent + text-to-speech pipeline |\n| [multi-agent](examples/multi-agent/) | Agent A delegates to Agent B as a tool |\n| [evolution](examples/evolution/) | Self-improving agent with scoring loop |\n| [research](examples/research/) | Autonomous multi-iteration research with report |\n| [filesystem-sandbox](examples/filesystem-sandbox/) | File and shell tools restricted to allowed directories |\n| [guardrails](examples/guardrails/) | Pre-send and post-receive validation |\n| [response-cache](examples/response-cache/) | LRU cache for repeated queries |\n| [thread-pool](examples/thread-pool/) | Concurrent agent execution |\n| [telegram](examples/telegram/) | Telegram bot with text, images, tools, and memory |\n| [wasm-chat](examples/wasm-chat/) | Browser-based chat UI via WebAssembly |\n| [full-agent](examples/full-agent/) | All features combined |\n\n## Database Extensions\n\nAdam can be embedded directly inside SQLite and PostgreSQL as a SQL extension. The agent can query the **same database** it's loaded in — ask questions in natural language, get answers from your data.\n\n```sql\n-- SQLite\n.load adam\n\n-- PostgreSQL\nCREATE EXTENSION adam;\n\n-- Configure (both)\nSELECT adam_config('provider', 'anthropic');\nSELECT adam_config('api_key', 'sk-ant-...');\n\n-- Ask about your data — the agent reads the schema and runs SQL\nSELECT adam_ask('How many users signed up last month?');\n-- → \"47 users signed up last month.\"\n\n-- Generate SQL without executing\nSELECT adam_sql('top 5 products by revenue');\n-- → \"SELECT p.name, SUM(oi.quantity * oi.price) AS revenue FROM ...\"\n```\n\n| Function | Description |\n|----------|-------------|\n| `adam_config(key, val)` | Configure provider, API key, model (persisted) |\n| `adam(msg)` | Stateless one-shot chat |\n| `adam_ask(msg)` | SQL-aware agent — reads schema, queries data, multi-turn |\n| `adam_sql(question)` | Generate SQL from natural language |\n| `adam_create_session()` | Create session (auto-created on first `adam_ask`) |\n| `adam_get_session()` | Get current session UUID |\n| `adam_clear_session()` | Clear session and history |\n\nSee **[extensions/sqlite/](extensions/sqlite/)** and **[extensions/postgres/](extensions/postgres/)** for build instructions.\n\n## Architecture\n\n```\nadam_run() loop:\n  build system prompt (identity + instructions + bootstrap files + memory + datetime)\n  -> check guardrails (on_before_send)\n  -> check cache\n  -> dispatch LLM (mock | local/llama.cpp | remote/HTTP)\n  -> check guardrails (on_after_receive)\n  -> if tool_calls: execute tools -> append results -> loop\n  -> if text: return final response -> auto-save session -> extract memory\n```\n\n**Platform abstraction**: macOS uses NSURLSession, Linux uses libcurl+mbedtls, WASM uses embedder-provided `http_fn` callback.\n\n**Memory management**: Arena allocators for per-iteration zero-copy work. malloc/free for long-lived structures. Arena-allocated strings are only valid within the current iteration.\n\n## Feature Gates\n\nDefine before `#include \"adam.h\"` to disable features:\n\n| Gate | Effect |\n|------|--------|\n| `ADAM_NO_CURL` | No libcurl (must provide `http_fn` callback) |\n| `ADAM_NO_LOCAL` | No llama.cpp (no local inference) |\n| `ADAM_NO_PTHREADS` | No thread pool, no voice thread |\n| `ADAM_NO_SQLITE` | No SQLite (no memory, sessions, or SQL tool) |\n| `ADAM_NO_VOICE` | No voice subsystem |\n| `ADAM_NO_FILESYSTEM` | No file_read/file_write/list_directory tools |\n| `ADAM_NO_SHELL` | No shell_exec tool |\n\n## Dependencies\n\nAll vendored as git submodules in `modules/`:\n\n| Module | Purpose |\n|--------|---------|\n| llama.cpp | Local LLM inference + GGML compute |\n| whisper.cpp | Local speech-to-text (shares ggml via symlink) |\n| miniaudio | Cross-platform audio I/O |\n| sqlite | Amalgamation build |\n| sqlite-memory | Hybrid BM25 + vector knowledge store |\n| sqlite-vector | Vector similarity search |\n| mbedtls | TLS (Linux only) |\n| curl | HTTP (Linux only) |\n\nmacOS uses system frameworks (Foundation, Security, Metal, AVFoundation, Accelerate) instead of curl/mbedtls.\n\n## License\n\nMIT\n","summary":"Adam is a C library that implements a full AI agent loop—including tool calling, memory, sessions, streaming, and structured output—within a single `#include`. It offers a unified interface to popular cloud providers (Anthropic, OpenAI, Google Gemini, etc.) and to local GGUF models via llama.cpp, with built‑in support for multimodal vision, image generation, and a robust set of 13 helper tools such as file I/O, shell execution, SQL queries, and web fetch. The library also ships SQLite and PostgreSQL extensions, a hybrid long‑term memory engine, multi‑agent composition, Telegram‑bot integration, and a secure file‑system sandbox, making it ideal for developers who need to embed advanced, cross‑platform AI agents in C/C++ applications or services.","description":"An embeddable cross-platform AI agent library written in C. Cloud and local LLMs, tool calling, long-term memory, voice, sessions, research mode, self-evolving loops. The SQLite of agent frameworks: small, portable, just works.","stars":60,"language":"C"},{"owner":"lsferreira42","repo":"nfsdiag","url":"https://github.com/lsferreira42/nfsdiag","readme":"# nfs-doctor\n\n`nfs-doctor` is a small command line tool written in C to help debug NFS servers from the client side.\n\nThe idea is simple: you give one IP or hostname, and the tool checks the things that usually break in NFS: network, rpcbind, NFS versions, mountd, exports, permissions, root squash, locking, stale handles and some basic performance.\n\nIt is not magic, and it will not replace a good server side analysis. But it helps a lot to understand if the problem is network, NFS config, permissions, UID/GID mapping, or something more strange.\n\n---\n\n## What this tool does\n\nToday `nfs-doctor` can do these checks:\n\n- test if `rpcbind` TCP port `111` is reachable\n- test if NFS TCP port `2049` is reachable\n- query the RPC service map from rpcbind (supports IPv6 fallback)\n- detect registered NFS, mountd, lockd/NLM and statd/NSM services\n- test NFS v2, v3 and v4 with RPC `NULLPROC` (including v4.1 and v4.2 hints)\n- test mountd v1, v2 and v3\n- optionally test RPC over UDP with `--udp`\n- enumerate exports using mountd\n- check client prerequisite daemons (nfs-client.target, rpc.gssd, nfs-idmapd)\n- detect Kerberos tickets and configuration with `--krb5`\n- mount exports automatically under `/tmp/nfsdoctor-*`\n- try NFS v4.2 first, then fallback to v4.1, v4, and v3\n- parse and verify effective mount options from `/proc/self/mountinfo`\n- capture RPC stats (retransmissions, auth refreshes) before and after tests\n- extract deep latency metrics from `/proc/self/mountstats`\n- run filesystem checks after mount (close-to-open consistency, special files, quotas)\n- test read/traverse permission\n- test directory listing\n- test POSIX ACLs, NFSv4 ACLs, generic xattrs, and SELinux contexts\n- test create/write/read/fsync when allowed (with configurable timeouts)\n- test advanced I/O operations: `copy_file_range`, `fallocate`, and `O_DIRECT`\n- test advisory locks with `fcntl`\n- detect practical `root_squash` behavior\n- simulate UID/GID access with `prctl` termination safety\n- simulate supplemental groups with `--groups`\n- run metadata latency test with create/rename/unlink\n- run stale file handle loop looking for `ESTALE`\n- check for pNFS layouts and NFSoRDMA connectivity\n- run external `fio` benchmarks alongside internal smoke tests\n- safely handle temporary files, mounts and folders using `O_NOFOLLOW`\n- perform safe audits with `--dry-run` and rate limiting (`--delay-ms`)\n- generate hierarchical JSON reports for automation\n- generate standalone HTML reports with inline CSS and Base64 (`--html`)\n- output colored text and progress bars on interactive terminals\n- run Docker fixture tests for regression checks\n\nBy default the output is compact. If you want all details, use `--verbose`.\n\n---\n\n## Important note\n\nNFS problems are very environment dependent. The result can change because of:\n\n- firewall rules\n- server export options\n- NFS version\n- kernel client state\n- UID/GID mapping\n- root squash\n- ACLs\n- SELinux/AppArmor on server\n- server load\n- stale file handles that only happen during real use\n\nSo, if the tool says no `ESTALE` happened, it means only that the tool did not reproduce it during the test window. It does not mean the problem can never happen.\n\n---\n\n## Build requirements\n\nOn Debian or Ubuntu:\n\n```sh\nsudo apt-get update\nsudo apt-get install -y build-essential pkg-config libtirpc-dev\n```\n\nOn Fedora/RHEL style distros:\n\n```sh\nsudo dnf install -y gcc make pkgconf-pkg-config libtirpc-devel\n```\n\nFor live mount tests you also need NFS client tools.\n\nDebian or Ubuntu:\n\n```sh\nsudo apt-get install -y nfs-common\n```\n\nFedora/RHEL style distros:\n\n```sh\nsudo dnf install -y nfs-utils\n```\n\n---\n\n## Build\n\nNormal build:\n\n```sh\nmake\n```\n\nClean and rebuild:\n\n```sh\nmake rebuild\n```\n\nSmall self-check:\n\n```sh\nmake check\n```\n\nInstall:\n\n```sh\nsudo make install\n```\n\nInstall in another prefix:\n\n```sh\nmake PREFIX=/opt/nfs-doctor install\n```\n\nUninstall:\n\n```sh\nsudo make uninstall\n```\n\nManual compile, if you want:\n\n```sh\ngcc -O2 -Wall -Wextra -I/usr/include/tirpc nfsdiag.c -ltirpc -o nfsdiag\n```\n\n---\n\n## Basic usage\n\nFull diagnostic:\n\n```sh\nsudo ./nfsdiag 192.168.1.10\n```\n\nVerbose mode:\n\n```sh\nsudo ./nfsdiag --verbose 192.168.1.10\n```\n\nOnly network and RPC checks, without mounting anything:\n\n```sh\n./nfsdiag --no-mount 192.168.1.10\n```\n\nTest only one export:\n\n```sh\nsudo ./nfsdiag --export /data 192.168.1.10\n```\n\nPass mount options:\n\n```sh\nsudo ./nfsdiag --mount-options soft,timeo=30,retrans=2 192.168.1.10\n```\n\nDo not create/write test files:\n\n```sh\nsudo ./nfsdiag --read-only 192.168.1.10\n```\n\nKeep the temp folder for manual inspection:\n\n```sh\nsudo ./nfsdiag --keep-temp 192.168.1.10\n```\n\n---\n\n## Output style\n\nDefault output is clean and short. For example, in a healthy server it can be something like:\n\n```text\nnfsdiag: 192.168.0.21\n[OK] 1 export(s) discovered\nsummary: ok=13 warn=0 fail=0\n```\n\nIf you want to see all probe steps, use:\n\n```sh\n./nfsdiag --verbose 192.168.0.21\n```\n\nWarnings and failures always appear in normal mode. Informational and low-level OK messages only appear in verbose mode.\n\n---\n\n## JSON output\n\nFor automation, use JSON.\n\nJSON to stdout, without human text mixed together:\n\n```sh\n./nfsdiag --json 192.168.1.10\n```\n\nJSON to file, keeping stdout empty:\n\n```sh\n./nfsdiag --json=report.json 192.168.1.10\n```\n\nThe JSON includes:\n\n- tool name\n- host\n- timestamp\n- system information (kernel, hostname, arch)\n- summary (ok, warn, fail)\n- options used\n- exports (hierarchical list of mount tests with performance metrics, ACLs, etc)\n- global events\n- recommendations\n\n---\n\n## HTML output\n\nFor human-readable reports that can be easily shared or attached to tickets, use HTML:\n\n```sh\n./nfsdiag --html=report.html 192.168.1.10\n```\n\nThe generated HTML file is fully standalone.\n\n---\n\n## UID/GID and permission tests\n\nSimulate one UID/GID:\n\n```sh\nsudo ./nfsdiag --uid 1000 --gid 1000 192.168.1.10\n```\n\nSimulate more than one identity:\n\n```sh\nsudo ./nfsdiag --uid 1000 --gid 1000 --uid 65534 --gid 65534 192.168.1.10\n```\n\nSimulate supplemental groups:\n\n```sh\nsudo ./nfsdiag --uid 1000 --gid 1000 --groups 10,20,30 192.168.1.10\n```\n\nThis is useful because many NFS problems are not really NFS protocol problems. Many times it is UID, GID, groups, ACL, or root squash.\n\n---\n\n## Performance and stale handle tests\n\nChange write/read test size:\n\n```sh\nsudo ./nfsdiag --bench-bytes 167772160 192.168.1.10\n```\n\nChange metadata latency iterations:\n\n```sh\nsudo ./nfsdiag --bench-iterations 500 192.168.1.10\n```\n\nChange stale handle loop:\n\n```sh\nsudo ./nfsdiag --stale-iterations 1000 192.168.1.10\n```\n\nRun benchmarks using `fio` instead of the internal C loop (requires `fio` installed):\n\n```sh\nsudo ./nfsdiag --bench-type=fio 192.168.1.10\n```\n\nThe performance test is only a smoke test. It is not a replacement for full benchmarking, though enabling `fio` provides more accurate storage baseline metrics.\n\n---\n\n## Safety options\n\nTimeout for external commands like `mount` and `umount`:\n\n```sh\nsudo ./nfsdiag --command-timeout 15 192.168.1.10\n```\n\nDelay between testing each export (rate limiting):\n\n```sh\nsudo ./nfsdiag --delay-ms 500 192.168.1.10\n```\n\nSimulate the tool execution without actually mounting or modifying anything:\n\n```sh\n./nfsdiag --dry-run 192.168.1.10\n```\n\nTry to isolate live mounts in a private mount namespace:\n\n```sh\nsudo ./nfsdiag --mount-namespace 192.168.1.10\n```\n\nThis needs root or `CAP_SYS_ADMIN`.\n\n---\n\n## Network/protocol options\n\nProbe UDP RPC too:\n\n```sh\n./nfsdiag --no-mount --udp 192.168.1.10\n```\n\nForce IPv4 direct TCP checks:\n\n```sh\n./nfsdiag --ipv4-only --no-mount 192.168.1.10\n```\n\nForce IPv6 direct TCP checks:\n\n```sh\n./nfsdiag --ipv6-only --no-mount nfs-server.example.com\n```\n\nDisable NFSv4 pseudo-root fallback:\n\n```sh\nsudo ./nfsdiag --no-nfs4-discovery 192.168.1.10\n```\n\nThe NFSv4 fallback is useful when the server is NFSv4-only and mountd is not available.\n\n---\n\n## Command line reference\n\n```text\nUsage: ./nfsdiag [OPTIONS] <server-ip-or-hostname>\n\nOptions:\n  -e, --export PATH          Test only this export\n  -o, --mount-options OPTS   Extra mount options\n      --no-mount             Run network/RPC checks only\n      --keep-temp            Do not remove /tmp/nfsdoctor-* after tests\n      --read-only            Do not create/write test files\n      --uid UID              Simulate access as UID\n      --gid GID              GID paired with last --uid\n      --groups G1,G2         Supplemental groups for simulation\n      --timeout SEC          Network/RPC timeout\n      --command-timeout SEC  Timeout for mount/umount commands\n      --fs-timeout SEC       Timeout for filesystem operations in benchmarks\n      --mount-namespace      Use private mount namespace when possible\n      --json[=PATH]          Write JSON report\n      --udp                  Probe RPC over UDP too\n      --ipv4-only            Force IPv4 direct TCP checks\n      --ipv6-only            Force IPv6 direct TCP checks\n      --no-nfs4-discovery    Disable NFSv4 pseudo-root fallback\n      --krb5                 Check Kerberos prerequisites (ticket, gssd)\n      --bench-iterations N   Metadata latency iterations\n      --stale-iterations N   ESTALE loop iterations\n      --bench-bytes BYTES    Bytes used in read/write smoke test\n  -v, --verbose              Show detailed output\n  -h, --help                 Show help\n```\n\n---\n\n## Exit codes\n\n- `0`: no warnings or failures\n- `1`: warning or failure found\n- `2`: usage error or local runtime error\n\nWarnings return `1` because in automation they usually need attention.\n\n---\n\n## Docker fixtures\n\nThe project has Docker fixtures to reproduce bad NFS situations.\n\nList fixtures:\n\n```sh\nmake docker-list\n```\n\nBuild all fixtures:\n\n```sh\nmake docker-build-all\n```\n\nBuild one fixture:\n\n```sh\nmake docker-build-read-only-export\n```\n\nRun automated fixture tests:\n\n```sh\nmake test-fixtures\n```\n\nRun only one test:\n\n```sh\nmake test-fixture-rpcbind-unreachable\n```\n\nSome tests need root because they do real NFS mounts from the host. If the host cannot run kernel NFS inside Docker, the test runner skips those cases instead of failing everything.\n\nThe current fixture set includes:\n\n- `rpcbind-unreachable`\n- `nfs-port-unreachable`\n- `rpc-map-missing-nfs`\n- `mountd-unavailable`\n- `empty-exports`\n- `mount-denied`\n- `permission-denied`\n- `acl-unsupported`\n- `identity-denied`\n- `read-only-export`\n- `root-squash`\n- `locking-missing`\n- `stale-handle`\n- `slow-performance`\n\n---\n\n## What was added in the last big update\n\nThis version has these improvements:\n\n1. fully modular C architecture\n2. hierarchical per-export JSON output\n3. timeouts for filesystem operations (`--fs-timeout`)\n4. robust FD leak prevention and `poll()` migration\n5. deep metrics via `/proc/self/mountstats` and `mountinfo`\n6. RPC stats monitoring (`/proc/net/rpc/nfs`) for retransmissions\n7. client daemon prerequisite checks (`rpcbind`, `nfs-client.target`, `idmapd`)\n8. Kerberos detection and support (`--krb5`, `gssd` checks)\n9. NFSv4 ACL detection (`system.nfs4_acl`)\n10. NFSv4.1 and NFSv4.2 cascading mount support\n11. real IPv6 RPC support\n\n---\n\n## Security notes\n\nBe careful when running against production exports.\n\nBy default the tool may create hidden `.nfsdoctor-*` files to test write/read behavior. If you do not want this, use:\n\n```sh\n--read-only\n```\n\nAlso, UID/GID simulation requires root because the tool uses `setgid`, `setgroups`, and `setuid` in child processes.\n\n---\n\n## Limitations\n\nSome things are impossible to guarantee from the client side:\n\n- `ESTALE` only appears if the handle becomes stale during the test\n- SELinux/AppArmor problems can look only like generic permission denied\n- ACL info depends on what the NFS client exposes\n- performance numbers are only smoke-test values\n- Docker NFS fixtures depend on host kernel and Docker privileges\n\nSo use this tool as a fast diagnostic helper, not as the only source of truth.\n","summary":"nfs-doctor is a command‐line NFS debugging tool written in C that probes a target server for the most common client‑side failures such as unreachable rpcbind, NFS ports, wrong export settings, UID/GID mapping and root‑squash. It runs a comprehensive suite of tests—ranging from RPC version queries and mount option verification to ACL checks, file‑handle validity, and even performance benchmarks via fio—while collecting detailed statistics and producing JSON or standalone HTML reports. The tool is designed for system administrators, DevOps engineers, and developers who need quick, reproducible diagnostics to determine whether NFS issues stem from networking, configuration, or permission problems.","description":"A nfs doctor application","stars":119,"language":"C"},{"owner":"meribold","repo":"btry","url":"https://github.com/meribold/btry","readme":"A battery status program for x86-64 Linux laptops in the form of a 307-byte ELF\nexecutable.\n\n## Usage\n\n    $ btry\n    30.6 Wh / 31.1 Wh (98%)\n\nSometimes there are no `energy_now` and `energy_full` files, but `charge_*` files instead\n(at least on my ThinkPad X220).  If this is the case, `btry` prints ampere hours instead\nof watt hours.\n\n    $ btry\n    2.2 Ah / 2.8 Ah (78%)\n\n## Installation\n\n    base64 -d <<< 'AAAAgAD//////////wA/kdbV/T4SKqi4gu7TNukZJeNdhjgGWjLCw6YYwm3tgKjiZLis8j\n    hz7+A+BEXQGjYrdisdU/fmh6I+bXFgKXsBP1Qihg6wueK0wKD1tL2vQRd8ZjmQi20OduGmiMyPyfsS2cSUUCK\n    SpQXtdHbQMRMn1UD6k/HrwFt3i+wzPNoG0tEHEZbJUTvdAVs0xS9PYrTTc4uSskePYWAK8t6VK/pmpItKsGnb\n    /qyGaIMl2/5TiqjHXTczFv3YkiNnJ7iqK8CtWhMwMlQxeyRuW3fpYgRKVPNKrX14kKobJSHZy4MuC9TE7lgYX\n    YJhBim5yRoO7wnYG3ezKX86Xvw/AFHGG8CTnD49szn/eHZAAA==' | unlzma > btry && chmod +x btry\n\n## Limitations\n\n* Anything that's not x86-64 and Linux is definitely not supported.\n* I don't know how standard/portable the `/sys/class/power_supply/BAT0` path used actually\n  is.\n* If neither an `energy_full` nor a `charge_full` file exists in\n  `/sys/class/power_supply/BAT0`, an infinite loop results.\n* Extra batteries (like in the ThinkPad T480) are ignored.\n\n## Build instructions\n\n### Linux on x86-64\n\n    make\n\n### Other platforms\n\nNo.\n\n## Notes\n\nWhen my ThinkPad X220 is plugged in at the time I wake it from suspend mode, I get the\n`charge_now` file.  When it is not plugged in I get the `energy_now` file.  At least I\nthink that's how it works.\n","summary":"btry is a tiny (307‑byte ELF) command‑line tool that reports battery charge on x86‑64 Linux laptops, displaying either watt‑hour or ampere‑hour information depending on the power‑supply files present. It reads the standard `/sys/class/power_supply/BAT0` directory, gracefully handling both `energy_*` and `charge_*` files, and outputs the current charge relative to the full capacity. The program is ideal for developers or system administrators needing a lightweight, portable utility to check battery status without installing extra dependencies or relying on larger tools.","description":"Battery info program for x86-64 Linux laptops in 307 bytes of machine code","stars":95,"language":"Assembly"},{"owner":"pthom","repo":"imgui_bundle","url":"https://github.com/pthom/imgui_bundle","readme":"# Dear ImGui Bundle\n\n> *Interactive Python & C++ apps for desktop, mobile, and web - powered by Dear ImGui.*\n>\n> Stop fighting GUI frameworks. Start building.\n>\n> [https:://imgui-bundle.pages.dev](https://imgui-bundle.pages.dev)\n\nDear ImGui Bundle is a framework built on top of [Dear ImGui](https://github.com/ocornut/imgui), for both C++ and Python. It comes with batteries included: plotting, Markdown, node editors, image inspection, and more.\n\n**See it in action:**\n\n*No install needed!*\n\n* Launch the [Interactive Explorer](https://imgui-bundle.pages.dev/explorer/): a full demonstration: showcases all libraries with browsable C++ and Python source. Acts as a living reference manual.\n* Open the [Playground](https://imgui-bundle.pages.dev/playground/): a live python sandbox with ready to use demos, based on pyodide.  Edit code, see results instantly.\n\n[![Dear ImGui Bundle Explorer](https://imgui-bundle.pages.dev/resources/bundle_explorer_vid.gif)](https://imgui-bundle.pages.dev/explorer/)\n\n## Key features\n\n- Cross-platform: Windows, macOS, Linux, iOS, Android, and WebAssembly.\n- C++ and Python APIs with very similar structure.\n- Integrated ecosystem:\n    - Dear ImGui (core widgets)\n    - ImPlot / ImPlot3D (2D and 3D plotting)\n    - ImmVision (image inspection)\n    - imgui-node-editor, ImGuizmo, file dialogs, knobs, spinners, toggles, command palette, and more.\n- Optional high-level runners:\n    - Hello ImGui: window, backend, docking, and assets management.\n    - ImmApp: easy activation of add-ons (ImPlot, Markdown, etc.).\n- Web-ready:\n    - C++ via Emscripten\n    - Python via Pyodide (online playground and deployable HTML templates)\n\n***\n\n\n### Documentation\n\nThe documentation is [available here](https://imgui-bundle.pages.dev/doc).\n\n\n### Community\n\nJoin the [Discord server](https://discord.gg/xkzpKMeYN3) for questions, showcase, and discussion (new!).\n\n### DeepWiki\n\n[![Ask DeepWiki](https://deepwiki.com/badge.svg)](https://deepwiki.com/pthom/imgui_bundle)\n\n_DeepWiki is an AI based doc where you can ask questions about Dear ImGui Bundle and get answers. It is trained on the full documentation and the source code of the Dear ImGui Bundle. Expect some inconsistencies, but it is still helpful._\n\n\n### Build status\n\n| OpenGL renderer | Python bindings | Alternative renderers | Mobile |\n|-----------------|-----------------|-----------------------|--------|\n| [![CppLib](https://github.com/pthom/imgui_bundle/actions/workflows/cpp_lib.yml/badge.svg?branch=main)](https://github.com/pthom/imgui_bundle/actions/workflows/cpp_lib.yml)<br>[![Emscripten](https://github.com/pthom/imgui_bundle/actions/workflows/emscripten.yml/badge.svg?branch=main)](https://github.com/pthom/imgui_bundle/actions/workflows/emscripten.yml) | [![Pip](https://github.com/pthom/imgui_bundle/actions/workflows/pip.yml/badge.svg?branch=main)](https://github.com/pthom/imgui_bundle/actions/workflows/pip.yml)<br>[![Wheels](https://github.com/pthom/imgui_bundle/actions/workflows/wheels.yml/badge.svg?branch=main)](https://github.com/pthom/imgui_bundle/actions/workflows/wheels.yml)<br>[![Pyodide](https://github.com/pthom/imgui_bundle/actions/workflows/pyodide.yml/badge.svg?branch=main)](https://github.com/pthom/imgui_bundle/actions/workflows/pyodide.yml)<br>[![CppLib_WithBindings](https://github.com/pthom/imgui_bundle/actions/workflows/cpp_lib_with_bindings.yml/badge.svg?branch=main)](https://github.com/pthom/imgui_bundle/actions/workflows/cpp_lib_with_bindings.yml) | [![Metal](https://github.com/pthom/imgui_bundle/actions/workflows/Metal.yml/badge.svg?branch=main)](https://github.com/pthom/imgui_bundle/actions/workflows/Metal.yml)<br>[![DirectX](https://github.com/pthom/imgui_bundle/actions/workflows/DirectX.yml/badge.svg?branch=main)](https://github.com/pthom/imgui_bundle/actions/workflows/DirectX.yml)<br>[![Vulkan](https://github.com/pthom/imgui_bundle/actions/workflows/Vulkan.yml/badge.svg?branch=main)](https://github.com/pthom/imgui_bundle/actions/workflows/Vulkan.yml) | [![iOS](https://github.com/pthom/imgui_bundle/actions/workflows/ios.yml/badge.svg?branch=main)](https://github.com/pthom/imgui_bundle/actions/workflows/ios.yml)<br>[![Android](https://github.com/pthom/imgui_bundle/actions/workflows/android.yml/badge.svg?branch=main)](https://github.com/pthom/imgui_bundle/actions/workflows/android.yml) |\n\n","summary":"Dear ImGui Bundle is a cross‑platform framework that extends Dear ImGui with a rich ecosystem of add‑ons such as ImPlot, ImGuizmo, a node editor, Markdown rendering, and image inspection, and it exposes virtually identical APIs for C++ and Python. The bundle ships ready‑to‑use high‑level runners like Hello ImGui and ImmApp, and can be compiled with OpenGL, Metal, DirectX, Vulkan, or WebAssembly via Emscripten, while Python bindings are packaged as wheels or run in browser through Pyodide. An interactive online explorer and live Python playground let developers prototype UI tools instantly, and the bundle includes a simple command palette, file dialogs, spinners, knobs, and a collection of widgets. It is ideal for developers and researchers who want to quickly build sophisticated desktop, mobile, or web applications with custom GUIs, data visualizations, and interactive editors without wrestling with low‑level framework plumbing.","description":"Interactive Python & C++ apps for desktop, mobile, and web - powered by Dear ImGui. Stop fighting GUI frameworks. Start building.","stars":1233,"language":"Python"},{"owner":"nooga","repo":"let-go","url":"https://github.com/nooga/let-go","readme":"<!--suppress ALL -->\n<p align=\"center\">\n<img src=\"meta/logo.png\" alt=\"Squishy loafer\" title=\"Squishy loafer of let-go\" />\n</p>\n\n![Tests](https://github.com/nooga/let-go/actions/workflows/go.yml/badge.svg)\n\n# let-go\n\nGreetings loafers! _(λ-gophers haha, get it?)_\n\nThis is a bytecode compiler and VM for a language closely resembling Clojure, a Clojure dialect, if you will.\nThe smallest and fastest-starting Clojure-family language in Go — a single ~10MB binary with ~7ms cold start.\n\n### Why let-go?\n\n- **Standalone executables** — compile your program into a single binary with `lg -b myapp main.lg`. No runtime needed, just distribute and run.\n- **WASM web apps** — compile your program to a self-contained HTML page with `lg -w outdir main.lg`. Full terminal emulation via xterm.js, runs in any browser. Deploy to GitHub Pages or open locally.\n- **Fast startup** — 7ms cold start. Pre-compiled bytecode (LGB format) makes boot near-instant even with a large standard library.\n- **Small footprint** — 10MB binary, 14MB idle memory. 7x smaller than Babashka, 30x smaller than JDK.\n- **Batteries included** — core.async channels, HTTP server/client, JSON, Transit, IO, Babashka pods, nREPL server.\n- **Go interop** — embed let-go in Go apps, map Go structs to records, call Go functions from let-go and vice versa.\n- **Broad Clojure compatibility** — macros, destructuring, protocols, records, multimethods, transducers, lazy seqs, persistent data structures, BigInts.\n\nHere are some nebulous goals in no particular order:\n\n- [x] Quality entertainment,\n- [ ] Making it legal to write Clojure at your Go dayjob,\n- [x] Implement as much of Clojure as possible — including persistent data types, true concurrency, transducers, core.async, and BigInts,\n- [x] Provide comfy two-way interop for arbitrary functions and types,\n- [x] AOT compilation — compile let-go programs to bytecode or standalone binaries,\n- [x] Boot the entire runtime in a single `requestAnimationFrame` and still have 10ms to spare at 60fps,\n- [x] Compile let-go programs to self-contained WASM web apps with terminal emulation,\n- [ ] nREPL server in WASM — connect Emacs/Calva to a let-go VM running in the browser via WebSocket,\n- [ ] Stretch goal: let-go bytecode -> Go translation.\n\nHere are the non goals:\n\n- Being a drop-in replacement for [clojure/clojure](https://github.com/clojure/clojure) at any point,\n- Being a linter/formatter/tooling for Clojure in general.\n\n## Feature overview\n\nlet-go aims to feel like day-to-day Clojure, not to be a drop-in replacement. Most idiomatic code reads,\nruns, and behaves the same — but a non-trivial Clojure project will likely need some adjustments before\nit runs unmodified. See [Known limitations](#known-limitations-and-divergence-from-clojure) below.\n\n### Clojure compatibility\n\nlet-go is tested against [jank-lang/clojure-test-suite](https://github.com/jank-lang/clojure-test-suite),\na cross-dialect compliance suite:\n\n**4696 / 4921 assertions pass (95.4%)** across 217 test files. The remaining gaps are mostly\nedge cases (overflow detection on `+`/`-`/`*`/`inc`/`dec`, BigInt promotion at the Long boundary, BigDecimal\nbehavior) and a handful of stub namespaces — see below. Workflow guide: [docs/clojure-test-suite.md](docs/clojure-test-suite.md).\n\n### Standard namespaces\n\n| Namespace            | Status                                                                                                          |\n| -------------------- | --------------------------------------------------------------------------------------------------------------- |\n| `clojure.core`       | Macros, destructuring, lazy seqs, transducers, protocols, records, multimethods, atoms, regex, metadata, BigInt |\n| `clojure.string`     | Full                                                                                                            |\n| `clojure.set`        | Full                                                                                                            |\n| `clojure.walk`       | `prewalk`, `postwalk`, `keywordize-keys`, `stringify-keys`, `walk`                                              |\n| `clojure.edn`        | `read`, `read-string`                                                                                           |\n| `clojure.pprint`     | `pprint`, `cl-format`                                                                                           |\n| `clojure.test`       | `deftest`, `is`, `testing`, `are`, fixtures                                                                     |\n| `clojure.core.async` | Channels, `go`/`go-loop`, `alts!`, `mult`/`pub`, `pipe`/`merge`/`split` (real goroutines, not IOC)              |\n| `io`                 | Polymorphic readers/writers, `slurp`/`spit`, lazy line-seq, encoding, URLs, `with-open`                         |\n| `http`               | Ring-style server + client, streaming responses                                                                 |\n| `json`               | `read-json`, `write-json` — float-preserving, record-aware                                                      |\n| `transit`            | transit+json codec with rolling cache                                                                           |\n| `os`                 | `sh`, `stat`, `ls`, `cwd`, `getenv`/`setenv`, `exit`, `os-name`, `arch`, `user-name`, `hostname`, separators    |\n| `System`             | JVM-shaped: `getProperty`, `getProperties`, `getenv`, `exit`, `lineSeparator`, `currentTimeMillis`, `nanoTime`. Exposes `let-go.version`, `let-go.commit`, `user.home`, `user.dir`, `os.name`, `os.arch`, etc. |\n| `syscall`            | Direct Linux syscalls (mount, unshare, mknod, prctl, capset, seccomp, AppArmor) for systems programming         |\n| `pods`               | Babashka pods over JSON / EDN / transit                                                                         |\n\n### Babashka pods\n\nlet-go supports [Babashka pods](https://github.com/babashka/pods) - standalone programs that expose namespaces over a binary protocol. This gives let-go access to the entire pod ecosystem: databases, AWS, Docker, file watching, and more.\n\n```clojure\n;; Load a pod (uses babashka's shared cache)\n(pods/load-pod 'org.babashka/go-sqlite3 \"0.3.13\")\n\n;; Use it like any other namespace\n(pod.babashka.go-sqlite3/execute! \"app.db\"\n  [\"create table users (id integer primary key, name text)\"])\n(pod.babashka.go-sqlite3/execute! \"app.db\"\n  [\"insert into users values (1, ?)\" \"Alice\"])\n(pod.babashka.go-sqlite3/query \"app.db\"\n  [\"select * from users\"])\n;; => [{:id 1 :name \"Alice\"}]\n```\n\n- `pods/load-pod` - load by name (PATH) or from babashka cache (symbol + version)\n- Supports JSON, EDN, and transit+json payload formats\n- Client-side code evaluation (pod-defined macros and wrappers)\n- Async streaming via `pods/invoke` with `:handlers` for callbacks\n- Shares `~/.babashka/pods/` cache - install pods with `bb`, use them from `lg`\n\nSee the [pod registry](https://github.com/babashka/pod-registry) for available pods. Install pods with babashka:\n\n```bash\nbb -e '(pods/load-pod (quote org.babashka/go-sqlite3) \"0.3.13\")'\n```\n\n### Go interop\n\n- `RegisterStruct[T]` — map Go structs to let-go records with cached field converters\n- `ToRecord[T]` / `ToStruct[T]` — zero-cost roundtrip for unmutated records\n- `BoxValue` auto-converts registered structs to records\n- Boxed Go values expose methods via `.method` interop syntax\n- `.field` access on records\n\n## Benchmarks\n\nBenchmarks compare let-go against [Babashka](https://github.com/babashka/babashka) (GraalVM native),\n[Joker](https://github.com/candid82/joker) (Go tree-walk interpreter), and Clojure on the JVM.\nEach benchmark is valid Clojure that runs unmodified on all runtimes.\nRun `benchmark/run.sh` to reproduce (requires `hyperfine`, `bb`, `clj`, `joker`).\n\n|                 | let-go         | babashka       | joker                    | clojure JVM   |\n| --------------- | -------------- | -------------- | ------------------------ | ------------- |\n| **Platform**    | Go bytecode VM | GraalVM native | Go tree-walk interpreter | JVM (HotSpot) |\n| **Binary size** | **10M**        | 68M            | 26M                      | 304M (JDK)    |\n| **Startup**     | **7ms**        | 20ms           | 12ms                     | 331ms         |\n| **Idle memory** | **14MB**       | 27MB           | 21MB                     | 92MB          |\n\n**Performance highlights** (Apple M1 Pro):\n\n- **Smallest footprint** — 7x smaller than Babashka, 30x smaller than the JDK\n- **Fastest startup** — 7ms with pre-compiled bytecode (fits in a `requestAnimationFrame`), 3x faster than Babashka, 2x faster than Joker, 48x faster than JVM\n- **Wins on short-lived tasks** — map/filter and transducer pipelines: **8ms** vs bb's 19ms (2.4x faster)\n- **Competitive on compute** — fib(35) within 4% of Babashka (1.98s vs 1.90s), loop-recur 1.8x faster\n- **Lowest memory** — 14MB for fib(35) vs bb's 77MB (5.4x less), 20MB for reduce 1M vs bb's 59MB (3x less)\n- **10x+ faster than Joker** on most compute benchmarks — bytecode VM vs tree-walk interpreter\n\nFull results with methodology: [benchmark/results.md](benchmark/results.md)\n\n## Known limitations and divergence from Clojure\n\n### Not implemented\n\n- **Refs / STM** — atoms + channels cover practical concurrency needs\n- **Agents** — use `go` blocks and channels instead\n- **Hierarchies** (`derive`, `underive`, `ancestors`, `descendants`, `parents`) — stub only; multimethod dispatch works, but `isa?` chains do not\n- **`with-precision`** — `BigDecimal` itself works (`M` literals, `bigdec`, `decimal?`, exact arithmetic), but `with-precision` is a no-op so explicit rounding control is missing\n- **Chunked sequences** — lazy seqs are unchunked (simpler, slightly different perf characteristics)\n- **Reader tagged literals** (`#inst`, `#uuid`)\n- **`deftype`** — use `defrecord` instead\n- **`reify`** — protocols can only be extended to named types\n- **Spec** — no `clojure.spec`\n- **`alter-var-root`** — vars are mutable but no `alter-var-root`\n- **Numeric overflow detection** — `+`/`-`/`*`/`inc`/`dec` wrap silently on int64 overflow rather than promoting to BigInt; use `+'`/`-'`/`*'` for explicit BigInt math\n- **`subseq` / `rsubseq`** — sorted collections themselves work (`sorted-map`, `sorted-set`, `sorted-map-by`, `sorted-set-by`, `rseq`), but range queries on them are not yet implemented\n\n### Known behavioral differences\n\n- **`concat*` (used internally by quasiquote) is eager** — the user-facing `concat` is lazy, matching Clojure\n- **All channel operations block** — `<!` and `<!!` are identical (Go channels are always blocking), same for `>!`/`>!!`\n- **`go` blocks are real goroutines** — no IOC (inversion of control) state machine like Clojure's core.async; this means they're cheaper but `go` blocks can call blocking ops directly\n- **No BigDecimal** — numeric tower is `int64` + `float64` + `BigInt` (no arbitrary-precision decimals)\n- **Regex is Go flavor** — `re2` syntax, not Java regex\n- **`letfn` uses atoms** internally for forward references — slight overhead vs Clojure's direct binding\n\n## Examples\n\nReal projects written in let-go:\n\n- [**xsofy**](https://github.com/nooga/xsofy) — a roguelike that runs in the browser and the terminal from the same source\n- [**lgcr**](https://github.com/nooga/lgcr) — a decent daemonless container runtime, built on the `syscall` namespace\n\nIn this repo:\n\n- [examples/](https://github.com/nooga/let-go/tree/main/examples) — small programs\n- [test/](https://github.com/nooga/let-go/tree/main/test) — `.lg` test files covering all features\n\n## Try online\n\nCheck out [this bare-bones online REPL](https://nooga.github.io/let-go/). It runs a WASM build of let-go in your browser!\n\n## Installation\n\n### Homebrew (macOS / Linux)\n\n```bash\nbrew tap nooga/let-go https://github.com/nooga/let-go\nbrew install let-go\n```\n\n### Download binary\n\nGrab a prebuilt binary from [Releases](https://github.com/nooga/let-go/releases) — available for Linux, macOS, and Windows on amd64/arm64.\n\n### From source\n\nRequires Go 1.22+.\n\n```bash\ngo install github.com/nooga/let-go@latest\n```\n\n### Usage\n\n```bash\nlg                                 # REPL\nlg -e '(+ 1 1)'                   # eval expression\nlg myfile.lg                       # run file\nlg -r myfile.lg                    # run file, then REPL\nlg -w outdir myfile.lg             # compile to WASM web app\n```\n\n### Compilation and distribution\n\nlet-go can compile programs to bytecode (`.lgb` files) and package them as standalone executables.\n\n**Compile to bytecode** — skips the reader/parser/compiler at load time:\n\n```bash\nlg -c app.lgb app.lg               # compile to bytecode\nlg app.lgb                          # run bytecode directly\n```\n\n**Create a standalone binary** — bundles the compiled bytecode into a self-contained executable:\n\n```bash\nlg -b myapp app.lg                  # compile + bundle into executable\n./myapp                             # runs anywhere, no lg needed\n```\n\nThe standalone binary is a copy of `lg` with your program's bytecode appended. It needs no external files or runtime — just copy it to another machine and run it.\n\n**Build a WASM web app** — compiles your program into a single HTML page that runs in the browser:\n\n```bash\nlg -w site app.lg                   # compile to web app\nopen site/index.html                # open in browser\n```\n\nThe output directory contains:\n- `index.html` — self-contained (~6MB, inlined WASM + wasm_exec.js, gzip-compressed)\n- `coi-serviceworker.js` — enables cross-origin isolation for interactive apps (needed on GitHub Pages)\n\nPrograms using the `term` namespace get full terminal emulation via xterm.js — ANSI colors, cursor positioning, raw keyboard input all work. The Go WASM runtime runs in a Web Worker with SharedArrayBuffer for blocking `term/read-key`.\n\nFor GitHub Pages deployment, just point Pages at the output directory. The service worker handles the required COOP/COEP headers automatically.\n\n**Detecting AOT compilation** — the `*compiling-aot*` var is `true` during `-c`, `-b`, and `-w` compilation, `false` at runtime. Use it to prevent side effects (like starting a server or game loop) from running at compile time:\n\n```clojure\n(defn -main []\n  (start-server))\n\n(when-not *compiling-aot*\n  (-main))\n```\n\n**Detecting WASM at runtime** - the `*in-wasm*` var is `true` when running inside a WASM web app, `false` in native mode. Use it to disable file I/O, adjust animation timing, or enable browser-specific behavior:\n\n```clojure\n(when-not *in-wasm*\n  (spit \"debug.log\" \"only in native mode\"))\n```\n\n### Building from source\n\n```bash\ngo run .                           # run from source\ngo build -ldflags=\"-s -w\" -o lg .  # ~9MB stripped binary\n```\n\n## Source paths\n\nBy default `lg` looks for namespaces under the current directory. To add\nextra directories use `-source-paths` flag or the `LG_SOURCE_PATHS` environment variable. \nBoth accept a list separated `:` on Unix, `;` on Windows. The flag wins over\nthe env var. The current directory is always prepended so project code\ntakes precedence.\n\n```bash\nlg -source-paths /path/to/libA:/path/to/libB script.lg\nLG_SOURCE_PATHS=/path/to/libA:/path/to/libB lg script.lg\n```\n\nThe same paths apply to script execution, `-c` (bytecode compile), `-b`\n(standalone bundle), and `-w` (WASM). Bundled binaries (`-b` output) honor\n`LG_SOURCE_PATHS` at runtime; the `-source-paths` flag is a\nbundle-build-time input.\n\n## nREPL\n\nlet-go includes an nREPL server compatible with CIDER (Emacs), Calva (VS Code), and Conjure (Neovim).\n\n```bash\nlg -n                              # start nREPL on default port (2137)\nlg -n -p 7888                      # start nREPL on port 7888\n```\n\nThe server writes `.nrepl-port` in the current directory so editors auto-discover it.\n\n**Supported ops:** `clone`, `close`, `eval`, `load-file`, `describe`, `completions`, `complete`, `info`, `lookup`, `ls-sessions`, `interrupt`\n\n**Emacs (CIDER):** `M-x cider-connect-clj`, host `localhost`, port from `.nrepl-port`\n\n**VS Code (Calva):** Open a let-go project — the included `.vscode/settings.json` registers a custom connect sequence. Use \"Calva: Start a Project REPL and Connect (Jack-In)\" and pick \"let-go\", or \"Calva: Connect to a Running REPL Server\" if the nREPL is already running.\n\n**Neovim (Conjure):** Should auto-connect when `.nrepl-port` exists\n\n## Embedding in Go\n\nlet-go embeds cleanly as a scripting layer for Go programs — define Go values and\nfunctions, hand them to the VM, and run user-supplied Clojure against your data.\nGo structs roundtrip as records, Go channels are first-class let-go channels, and\nGo functions are callable from let-go code.\n\n```go\nimport (\n    \"github.com/nooga/let-go/pkg/api\"\n    \"github.com/nooga/let-go/pkg/vm\"\n)\n\nc, _ := api.NewLetGo(\"myapp\")\n\n// Expose Go values and functions to let-go\nc.Def(\"x\", 42)\nc.Def(\"greet\", func(name string) string {\n    return \"Hello, \" + name\n})\n\nv, _ := c.Run(`(greet \"world\")`)\nfmt.Println(v) // \"Hello, world\"\n```\n\n**Struct ↔ Record roundtrip.** Registered structs become records on the let-go\nside. Unmutated values unbox back to the original Go type for free; mutated ones\ngo through `vm.ToStruct[T]`.\n\n```go\ntype Item struct{ Name string; Price float64; Qty int }\nvm.RegisterStruct[Item](\"myapp/Item\")\n\nc.Def(\"item\", Item{Name: \"Widget\", Price: 9.99, Qty: 5})\nc.Run(`(:name item)`)        // \"Widget\"\nc.Run(`(* (:price item) (:qty item))`) // 49.95\n\n// Define a let-go function that processes Go structs\nc.Run(`(defn total [it] (* (:price it) (:qty it)))`)\nv, _ := c.Run(`(total item)`) // 49.95\n```\n\n**Streaming via Go channels.** A Go `chan int` and a `vm.Chan` plug straight\ninto `go`/`<!`/`>!` — perfect for piping events through a user-supplied script.\n\n```go\ninch := make(chan int)\noutch := make(vm.Chan)\nc.Def(\"in\", inch)\nc.Def(\"out\", outch)\n\nc.Run(`(go (loop [i (<! in)]\n             (when i\n               (>! out (inc i))\n               (recur (<! in)))))`)\n```\n\nSee [`pkg/api/interop_test.go`](pkg/api/interop_test.go) for the full set of\nembedding examples (defs, structs, channels, function calls).\n\n## Testing\n\n```bash\ngo test ./... -count=1 -timeout 30s\n```\n\n---\n\n- Ever wanted a 20MB pure-Go JS runtime that typechecks and runs TypeScript? check my other project https://github.com/nooga/paserati\n\n[🤓 Follow me on X](https://x.com/MGasperowicz)\n[🐬 Check out monk.io](https://monk.io)\n","summary":"Let‑go is a bytecode compiler and virtual machine for a lightweight Clojure‑like language written in Go. It lets developers ship self‑contained binaries or self‑contained WebAssembly pages with optional terminal emulation, all while keeping the runtime under 10 MB and starting in just a few milliseconds. Key capabilities include core async, a rich standard library (HTTP, JSON, transit, BigInt, etc.), and seamless two‑way interop with Go code. The project is ideal for Go users who want the expressiveness of Clojure in a tiny, fast, and embeddable form.","description":"Almost Clojure written in Go.","stars":243,"language":"Go"},{"owner":"ReviewStage","repo":"stage-cli","url":"https://github.com/ReviewStage/stage-cli","readme":"<div align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/ReviewStage/stage-cli/main/assets/stage-mark.svg\" alt=\"Stage\" height=\"80\">\n  <h1>Stage</h1>\n  <p>AI-powered code review tool that organizes local code changes into logical chapters and points out what to review before you dive into the code.</p>\n</div>\n\n<p align=\"center\">\n  <a href=\"https://www.npmjs.com/package/stagereview\"><img src=\"https://img.shields.io/npm/v/stagereview.svg\" alt=\"npm version\"></a>\n  <a href=\"https://www.npmjs.com/package/stagereview\"><img src=\"https://img.shields.io/npm/dm/stagereview.svg\" alt=\"npm downloads\"></a>\n  <a href=\"https://github.com/ReviewStage/stage-cli/blob/main/LICENSE\"><img src=\"https://img.shields.io/npm/l/stagereview.svg\" alt=\"license\"></a>\n</p>\n\n---\n\nTry the full Stage experience with GitHub integration at [stagereview.app](https://stagereview.app).\n\n## Install\n\n```bash\nnpm install -g stagereview\n```\n\nThen add the skill to your agent:\n\n```bash\nnpx skills add ReviewStage/stage-cli\n```\n\n## Usage\n\nIn your AI agent, run:\n\n```\n/stage-chapters\n```\n\nThis organizes your local changes into reviewable chapters and opens a browser UI. Everything happens on your machine.\n\n<img width=\"1840\" height=\"1196\" alt=\"Stage CLI\" src=\"https://raw.githubusercontent.com/ReviewStage/stage-cli/main/assets/screenshot.png\" />\n\n## License\n\n[MIT](LICENSE)\n","summary":"Stage is an AI‑powered command‑line tool that automatically groups your local code changes into logical “chapters” and highlights what needs review before you dig into the code. It integrates with AI agents, running entirely on your machine, and launches a local browser UI where you can explore the structured review sections. Key features include automated chapter generation, review‑ready summaries, and a convenient CLI trigger (`/stage-chapters`). Developers, teams, and anyone working in an AI‑augmented code‑review workflow will find it useful for diving into changes more efficiently.","description":"A viewer for reviewing local code changes in small individual chapters. Works with any AI agent.","stars":132,"language":"TypeScript"},{"owner":"olivier-ls","repo":"php-fts","url":"https://github.com/olivier-ls/php-fts","readme":"# php-fts\n\n![Packagist Version](https://img.shields.io/packagist/v/ols/php-fts)\n![PHP Version](https://img.shields.io/packagist/dependency-v/ols/php-fts/php)\n![License](https://img.shields.io/github/license/olivier-ls/php-fts)\n![Downloads](https://img.shields.io/packagist/dt/ols/php-fts)\n\nA self-contained full-text search engine written in pure PHP.  \nNo extensions. No external services. No dependencies. Just files.\n\n---\n\n## Who is this for?\n\nphp-fts is designed for projects where deploying a dedicated search service is not an option — shared hosting, small VPS, or simply situations where you want to keep your stack minimal and portable.\n\nIf you have access to Elasticsearch, Meilisearch or Typesense and the infrastructure to run them, use those. They are more powerful and built for high-traffic, large-scale workloads.\n\nIf you don't — or if you'd rather not — php-fts gives you solid full-text search with ranked results, filters, and tolerant matching, with nothing to install and nothing to configure beyond a directory path.\n\n**It is a good fit if:**\n- You are on shared hosting (OVH, Infomaniak, o2switch, etc.)\n- You want zero infrastructure overhead\n- Your dataset is in the range of hundreds to tens of thousands of documents\n- You index offline or on a schedule, and serve searches at runtime\n\n**It is not a good fit if:**\n- You need real-time indexing under heavy concurrent write load\n- Your dataset is in the millions of documents\n- You need geo search or multi-tenant isolation\n\n---\n\n## Language support\n\nphp-fts is designed for **Western Latin languages** (French, English, Spanish, German, Portuguese, Italian, Dutch, and similar).\n\nThe tokenizer normalizes input by transliterating accented characters and common diacritics to their ASCII equivalents (`é`→`e`, `ü`→`u`, `ñ`→`n`, etc.), then indexes the result as trigrams.\n\n**This approach has limitations you should be aware of:**\n\n- **Non-Latin scripts** — Cyrillic, Arabic, CJK (Chinese, Japanese, Korean), Hebrew, Thai, and others are not supported. Characters outside the handled ranges are dropped during normalization, which means documents in those scripts will not be searchable.\n- **Some Latin languages** — Languages with more complex orthographies, such as Turkish, may not normalize correctly. For example, the Turkish dotless `ı` or the `ğ` are not handled.\n- **Unicode normalization** — Real-world input sometimes contains characters in NFD or NFKD form (e.g. diacritics encoded as separate combining characters). php-fts handles this: if the `ext-intl` extension is available, NFC normalization is applied before transliteration. Otherwise, combining diacritical marks are stripped directly. Either way, `fête` (NFD) is correctly indexed as `fete`.\n\nIf your content is primarily in Western European languages and ASCII-compatible, php-fts will work well. For multilingual or non-Latin content, a dedicated search engine with proper Unicode support is a better fit.\n\n---\n\n## Features\n\n- **Full-text search** with trigram indexing — tolerant to typos and partial matches\n- **BM25 + IDF scoring** — industry-standard relevance ranking (same algorithm as Lucene / Elasticsearch)\n- **Per-document score** — exposed in results, usable to build facet counts, sorting, or custom ranking\n- **Field boosting** — weight some fields (e.g. title) more than others\n- **Filters** — exact match, comparisons, range, `in`, `not in`, `contains` on array fields\n- **Combined AND / OR filtering** — flexible condition logic\n- **Bulk insertion** — up to 2.4× faster than individual inserts, single lock for the whole batch\n- **Soft delete** with tombstones — fast deletes, cleaned up on compaction\n- **Atomic update** — soft delete + re-insert in a single lock\n- **Compaction** — rebuilds index files cleanly, removes deleted documents\n- **Fragmentation monitoring** — know when to compact\n- **Binary file storage** — portable across servers, no rebuild needed\n- **O(1) trigram lookup** — fixed-size index (~810 KB), no tree traversal\n- **No extensions required** — runs on any standard PHP 8.1+ installation\n\n---\n\n## Requirements\n\n- PHP **8.1** or higher\n- Read/write access to a directory for index files\n- `ext-intl` — optional, but recommended for robust Unicode normalization\n\n---\n\n## Installation\n\n**Via Composer**\n\n```bash\ncomposer require ols/php-fts\n```\n\n**Manual install** — if you are not using Composer, copy the `src/` directory into your project and include the autoloader:\n\n```php\nrequire '/path/to/php-fts/src/autoload.php';\n```\n\n---\n\n## Quick start\n\n```php\nuse Ols\\PhpFts\\SearchEngine;\n\n$engine = new SearchEngine();\n$engine->open('./search_data');\n\n// Insert a document\n$docId = $engine->insert([\n    'title'       => 'Brown leather shoe',\n    'description' => 'Elegant city shoe in soft leather',\n    'price'       => 129.90,\n    'stock'       => 42,\n    'active'      => true,\n    'category'    => 'Shoes',\n    'brand'       => 'Adidas',\n    'tags'        => ['summer', 'luxury', 'city'],\n]);\n\n// Search\n$results = $engine->search('leather shoe', limit: 20, boosts: [\n    'title'       => 3.0,\n    'description' => 1.0,\n]);\n\nforeach ($results as $result) {\n    echo $result['document']['title'] . ' — score: ' . $result['score'] . PHP_EOL;\n}\n\n$engine->close();\n```\n\n---\n\n## API Reference\n\n### Open / Close\n\n```php\n$engine->open('./search_data');   // Creates directory and files if they don't exist\n$engine->close();                 // Flushes and closes all file handles\n```\n\n### Insert\n\n```php\n// Single document — returns the doc ID (binary offset, keep it if you need update/delete)\n$docId = $engine->insert([\n    'title'  => 'My product',\n    'price'  => 49.90,\n    'active' => true,\n    'tags'   => ['new', 'sale'],\n]);\n\n// Bulk insert — one lock for the entire batch, significantly faster\n$docIds = $engine->insertBulk([\n    ['title' => 'Product A', 'price' => 29.90],\n    ['title' => 'Product B', 'price' => 59.90],\n]);\n```\n\nSupported field types: `string`, `int`, `float`, `bool`, `array` of strings.\n\n### Search\n\n```php\n$results = $engine->search(\n    query:            'leather shoe',\n    limit:            20,\n    maxCandidates:    5000,\n    boosts:           ['title' => 3.0, 'description' => 1.0],\n    filters:          [...],\n    highlight:        false,\n    highlightOptions: [],\n);\n```\n\nEach result:\n\n```php\n[\n    'docId'    => 942222,   // document identifier\n    'score'    => 43.74,    // BM25+IDF relevance score, 0-100\n    'document' => [...],    // original document array\n]\n```\n\nThe `score` field is available on every result and can be used to build facet counts, custom sorting, or relevance thresholds.\n\n### Highlighting\n\nPass `highlight: true` to get a `highlights` field on each result, containing one snippet per string field. No overhead when disabled (default).\n\n```php\n$results = $engine->search('leather shoe', highlight: true, highlightOptions: [\n    'tags'    => ['<mark>', '</mark>'],  // wrapping tags (default: ['<mark>', '</mark>'])\n    'excerpt' => true,                  // return a snippet instead of the full field (default: true)\n    'window'  => 5,                     // number of context words around each match (default: 5)\n]);\n\n// $results[0]['highlights']['description']\n// => \"…elegant city shoe in soft <mark>leather</mark>…\"\n```\n\nWhen `excerpt` is `false`, the full field value is returned with all matches wrapped in the specified tags.\n\n### Filters\n\n```php\n$results = $engine->search('shoe', filters: [\n\n    'and' => [\n        ['field' => 'active',   'op' => '=',        'value' => true],\n        ['field' => 'stock',    'op' => '>',         'value' => 0],\n        ['field' => 'price',    'op' => '<=',        'value' => 300],\n        ['field' => 'category', 'op' => 'in',        'value' => ['Shoes', 'Sport']],\n        ['field' => 'tags',     'op' => 'contains',  'value' => 'luxury'],\n    ],\n\n    'or' => [\n        ['field' => 'brand', 'op' => '=', 'value' => 'Adidas'],\n        ['field' => 'brand', 'op' => '=', 'value' => 'Puma'],\n    ],\n\n]);\n```\n\nBoth `and` and `or` are optional, but at least one must be present.  \nWhen both are used: all AND conditions must pass **and** at least one OR condition must pass.  \nA document missing a filtered field is excluded from results.\n\n| Operator                  | Supported types          |\n|---------------------------|--------------------------|\n| `=` `!=`                  | int, float, bool, string |\n| `>` `>=` `<` `<=`         | int, float               |\n| `in` `not in`             | int, float, string       |\n| `contains` `not contains` | array (document field)   |\n\n### Update / Delete\n\n```php\n// Atomic update: soft delete + re-insert in a single lock\n$newDocId = $engine->update($docId, ['title' => 'Updated title', 'price' => 149.90]);\n\n// Soft delete (cleaned up on compaction)\n$engine->delete($docId);\n```\n\n### Maintenance\n\n```php\n$count = $engine->count();               // Number of live documents\n$rate  = $engine->fragmentationRate();   // Fragmentation percentage (0 = clean, 100 = all deleted)\n\nif ($engine->fragmentationRate() > 20) {\n    $engine->compact();                  // Rebuild index files, remove deleted documents\n}\n\n$engine->reset();                        // Wipe all index files and start fresh\n```\n\n---\n\n## Index files\n\n```\nsearch_data/\n  documents.bin    — serialized documents (JSON, binary format)\n  trigrams.bin     — fixed-size trigram index ~810 KB (37^3 entries, O(1) access)\n  postings.bin     — doc_id lists per trigram\n  tombstones.bin   — deleted doc_ids (cleared on compaction)\n```\n\nFiles are fully portable — copy them between servers without rebuilding.\n\n---\n\n## Scoring\n\nRelevance is computed using **BM25 + IDF**:\n\n- **BM25** — term frequency saturation (a word appearing 10x doesn't score 10x higher) and document length normalization. Parameters: k1 = 1.5, b = 0.75 (standard Lucene defaults).\n- **IDF** — a trigram present in every document contributes little; a rare trigram contributes a lot.\n- The final score is normalized between 0 and 100.\n\n---\n\n## Benchmark\n\nBenchmarks were run on two environments:\n\n- **Windows 11** — local machine, NVMe SSD, PHP 8.3\n- **Linux (OVH shared hosting)** — standard shared plan, PHP 8.3\n\n### Insertion\n\n| Volume | insert() Windows | insert() Linux | insertBulk() Windows | insertBulk() Linux |\n|--------|-----------------|----------------|----------------------|--------------------|\n| 1 000  | 5.3 s           | 7.3 s          | 3.0 s                | 3.0 s              |\n| 5 000  | —               | 33.5 s         | —                    | 14.8 s             |\n| 10 000 | 53.0 s          | 63.4 s         | 30.5 s               | 29.4 s             |\n| 50 000 | 282.2 s         | —              | 157.8 s              | —                  |\n\n> Insertion is an offline operation — indexing is typically done via a scheduled job, not at request time.  \n> Always prefer `insertBulk()` in production: it acquires a single lock for the entire batch and is consistently ~2x faster.\n\n### Index size\n\n| Volume  | Index size |\n|---------|------------|\n| 1 000   | 2.8 MB     |\n| 10 000  | 21.7 MB    |\n| 50 000  | 106.0 MB   |\n\n### Search — Linux shared hosting, 10 000 documents\n\n| Metric    | Value            |\n|-----------|------------------|\n| Median    | 3.2 ms           |\n| Average   | 4.9 ms           |\n| P95       | 12.5 ms          |\n| P99       | 22.9 ms          |\n| Min / Max | 1.3 ms / 37.1 ms |\n\n> 200 queries, 10 distinct queries in rotation (including typos and out-of-corpus queries).  \n> Measured with `hrtime()` on a live shared hosting environment under normal load.\n\n---\n\n## Example application\n\nThe gif below shows one possible use of php-fts — a product search interface with filters and ranked results, built on top of a fake shoe catalogue.\n\nIt is just an illustration. php-fts is an engine, not an interface. You can use it to power a product search, a documentation search, an admin filter, a CLI tool, or anything else that needs full-text matching over a set of documents.\n\nTo run it locally:\n\n```bash\nphp demo/seed.php\nphp -S localhost:8000 -t demo\n```\n\n![Demo](docs/demo.gif)\n\n> No database. No external service. The filters, scores, and result counts are all computed by the engine.\n\n---\n\n## License\n\nMIT — see [LICENSE](LICENSE).\n","summary":"php-fts is a self‑contained full‑text search engine written purely in PHP that requires no extensions or external services. It builds trigram indexes, applies BM25+IDF ranking, and supports field boosting, flexible filtering, bulk inserts, soft deletes, and index compaction, making it efficient for moderately sized data sets. The library is aimed at developers on shared hosting or small VPS deployments who cannot run a dedicated search stack and whose content is primarily in Western Latin languages. In these scenarios, php‑fts offers a lightweight, zero‑overhead solution for reliable, ranked search across hundreds to tens of thousands of documents.","description":"A self-contained full-text search engine in pure PHP. No extensions, no dependencies.","stars":98,"language":"PHP"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
