.com/garritfra/cell.git\ncd cell\ncargo build --release\n# Binary at target/release/cell\n```\n\n## Usage\n\n```sh\ncell                          # empty sheet\ncell data.csv                 # open CSV\ncell data.tsv                 # open TSV\ncell sheet.cell               # open native format\ncell data.psv --delimiter '|' # open with a custom field delimiter\ncat data.csv | cell           # read from stdin (pipe input)\n```\n\nTo explore an example sheet with formulas, ranges, and IF logic:\n\n```sh\ncell examples/demo.cell\n```\n\nThe CSV/TSV delimiter is auto-detected from file content; pass\n`--delimiter` to override. The native `.cell` format is auto-detected\nvia its `# cell v` magic header.\n\n## Headless mode\n\nFor shell pipelines, Makefiles, and CI, `cell` can read from and write to a\nfile without launching the TUI:\n\n```sh\ncell sales.cell --read A1                 # print one cell's computed value\ncell sales.cell --read B1:B10             # print a range as TSV\ncell sales.cell --eval '=SUM(B1:B10)'     # evaluate a formula (no save)\ncell sales.cell --write A1 42             # set a cell, recalc, save in place\ncell sales.cell --write A1 42 --write B1 7 # batch multiple writes into one save\ncell sales.cell --write Total '=SUM(B:B)' --read Total  # write a formula, then print it\ncat data.csv | cell --read A1             # read from stdin\ncell data.psv --delimiter '|' --read A1   # custom delimiter\n```\n\n- Cell references are 1-indexed and Excel-style (`A1`, `AA10`, `A1:B3`).\n- The `=` prefix on `--eval` is optional.\n- Writes whose value starts with `=` are stored as formulas; others are auto-typed (number vs text).\n- Operations apply in a fixed order per invocation: writes → save → reads → evals.\n- Errors print to stderr; the process exits non-zero on bad refs, parse errors, or missing files.\n- Stdin input supports CSV, TSV, and the native `.cell` format. The delimiter\n  is auto-detected; pass `--delimiter` to override (CSV/TSV only). `--write`\n  requires a file argument when reading from stdin.\n\n## Keybindings\n\nIf you know Vim, you know cell.\n\nAll motions and operators accept a `[count]` prefix (`5j`, `10G`, `3dd`,\n`4yy`, `2w`). Counts also work between an operator and its motion (`d3j`,\n`y2k`); outer and inner counts multiply (`5d2j` clears 10 rows). The\nin-progress count and operator render in the status line as you type.\n\n### Normal Mode\n\n#### Motion\n\n| Key                  | Action                                 |\n| -------------------- | -------------------------------------- |\n| `h` `j` `k` `l`      | Move cursor (one cell)                 |\n| `gg`                 | First row (or row N with `[count]gg`)  |\n| `G`                  | Last row (or row N with `[count]G`)    |\n| `0`                  | First column                           |\n| `$`                  | Last column                            |\n| `w` / `b`            | Next / previous non-empty cell in row  |\n| `Ctrl-D` / `Ctrl-U`  | Half-page down / up                    |\n| `Ctrl-F` / `Ctrl-B`  | Full page down / up                    |\n| `{` / `}`            | Previous / next block boundary in column |\n| `H` / `M` / `L`      | Cursor to top / middle / bottom of viewport |\n| `zz` / `zt` / `zb`   | Recenter / scroll-to-top / scroll-to-bottom around cursor |\n| `Ctrl-e` / `Ctrl-y`  | Scroll viewport one row without moving cursor |\n| `Ctrl-o` / `Ctrl-i` (or Tab) | Jump back / forward in jump list |\n\n#### Marks\n\n| Key            | Action                              |\n| -------------- | ----------------------------------- |\n| `m{a-z}`       | Set mark at cursor                  |\n| `'{a-z}`       | Jump to marked row (column 0)       |\n| `` `{a-z} ``   | Jump to exact marked cell           |\n\n#### Editing\n\n| Key                  | Action                                 |\n| -------------------- | -------------------------------------- |\n| `i` / `a` / `Enter`  | Edit cell (Insert mode)                |\n| `x`                  | Clear cell                             |\n| `dd`                 | Delete row (`[count]dd` for N rows)    |\n| `d{motion}`          | Clear cells along motion (`dj`, `d3l`, `dh`, `dk`) |\n| `yy`                 | Yank row (`[count]yy` for N rows)      |\n| `y{motion}`          | Yank cells along motion (`yj`, `y3l`, `yh`, `yk`) |\n| `p` / `P`            | Paste below / above                    |\n| `Ctrl-A` / `Ctrl-X`  | Increment / decrement number in cell (`[count]` accepted) |\n| `~`                  | Toggle case of first character, advance cursor |\n| `guu` / `gUU`        | Lowercase / uppercase entire cell      |\n| `g~~`                | Toggle case of every character in cell |\n| `.`                  | Repeat last change                     |\n| `u`                  | Undo                                   |\n| `Ctrl-R`             | Redo                                   |\n\n#### Selection & search\n\n| Key                   | Action                                              |\n| --------------------- | --------------------------------------------------- |\n| `v`                   | Visual selection                                    |\n| `V`                   | Visual line (full-row) selection                    |\n| `Ctrl-V`              | Visual block selection                              |\n| `gv`                  | Re-enter previous visual selection                  |\n| `/` / `?`             | Search forward / backward (incremental)             |\n| `n` / `N`             | Next / previous match                               |\n| `*` / `#`             | Search for current cell's value forward / backward  |\n| `f<char>` / `F<char>` | Jump to next / prev cell in row starting with `<char>` |\n| `;` / `,`             | Repeat last `f`/`F` (same / reversed direction)     |\n| `:`                   | Command mode                                        |\n\n### Insert Mode\n\nType to edit the cell. `ESC` or `Enter` confirms. Arrow keys, `Home`,\n`End`, `Backspace`, and `Delete` work as expected within the cell.\n\n### Visual Mode\n\nExtend the selection with `hjkl` (or `[count]j` etc.), then:\n\n| Key      | Action                                                   |\n| -------- | -------------------------------------------------------- |\n| `y`      | Yank selection                                           |\n| `d`      | Delete selection                                         |\n| `c`      | Change selection (clear and enter Insert mode)           |\n| `u` / `U` / `~` | Lowercase / uppercase / toggle case of selection (formula cells skipped) |\n| `Esc`    | Cancel selection                                         |\n\n### Commands\n\n\n| Command              | Action                                         |\n| -------------------- | ---------------------------------------------- |\n| `:w`                 | Save                                           |\n| `:w file.csv`        | Save as CSV                                    |\n| `:w file.cell`       | Save as native format                          |\n| `:w!`                | Force save (flatten formulas, override warnings) |\n| `:q`                 | Quit                                           |\n| `:q!`                | Quit without saving                            |\n| `:wq`                | Save and quit                                  |\n| `:e file`            | Open file                                      |\n| `:sort A asc`        | Sort by column A ascending                     |\n| `:sort B desc`       | Sort by column B descending                    |\n| `:set delimiter=\\|`   | Change CSV/TSV delimiter for the next save     |\n| `:help` / `:help <topic>` | Open the in-app help screen / jump to a topic |\n\nIn the `:` prompt, `↑` / `↓` cycle through previously executed commands.\n\n\n## Mouse support\n\nMouse support is **off by default** so the terminal's native text\nselection keeps working. Enable it at runtime with `:set mouse on`,\ndisable it with `:set mouse off`, or flip the current state with\n`:set mouse toggle`.\n\nWhen enabled:\n\n- **Left-click** on a cell moves the cursor.\n- **Click + drag** inside the grid selects a Visual range.\n- **Click + drag** on a column header selects whole columns.\n- **Click + drag** on a row header selects whole rows.\n- **Scroll wheel** scrolls the viewport (cursor stays put). Horizontal\n  scroll works when the terminal emits `ScrollLeft` / `ScrollRight`\n  (commonly bound to Shift + wheel).\n- **Double-click** a cell to enter Insert mode on it.\n- **Drag past the visible edge** auto-scrolls the viewport.\n\nTo copy a cell value out to your system clipboard while mouse mode is\non, hold your terminal's bypass modifier when clicking and dragging:\n\n| Terminal | Bypass |\n| --- | --- |\n| Linux terminals (gnome-terminal, alacritty, kitty, …) | Shift |\n| Windows Terminal | Shift |\n| macOS Terminal.app, iTerm2 | Option/Alt |\n| tmux / screen | configure per their docs |\n\n## Formulas\n\nFormulas start with `=` and support Excel-compatible syntax:\n\n```\n=A1+B1\n=SUM(A1:A10)\n=AVERAGE(B1:B5)\n=IF(A1>100, \"high\", \"low\")\n```\n\n### Supported Functions (v1)\n\n`SUM`, `AVERAGE`, `COUNT`, `MIN`, `MAX`, `IF`\n\nFormula compliance with the ODF (OpenDocument Formula) spec is tracked and will expand over time.\n\n## File Formats\n\n- **CSV/TSV** -- Opens and saves standard comma/tab-separated files. Formulas are flattened to their computed values on CSV export.\n- `**.cell`** -- Native format that preserves formulas. Plain text, human-readable, inspired by [sc-im](https://github.com/andmarti1424/sc-im).\n\nWhen saving a CSV that contains formulas, cell warns you and suggests saving as `.cell` instead. Use `:w!` to force a CSV save.\n\n## Comparison with sc-im\n\n[sc-im](https://github.com/andmarti1424/sc-im) is a battle-tested terminal spreadsheet built on the classic `sc` (Spreadsheet Calculator, 1981). It inspired cell's native `.cell` format. Here's how the two tools compare:\n\n| | cell | sc-im |\n| --- | --- | --- |\n| **Language / TUI** | Rust + ratatui | C + ncurses |\n| **Editing model** | True Vim modal editing (`i` → Insert, `ESC` → Normal) | Vim-inspired navigation; `=` to enter a value, `e`/`E` to edit |\n| **Formula syntax** | Excel-compatible (`=SUM(A1:A10)`, `=IF(...)`) | `@`-prefix style (`@sum(A1:A10)`, `@avg(...)`) |\n| **Built-in functions** | SUM, AVERAGE, COUNT, MIN, MAX, IF | Extensive (@sum, @avg, @min, @max, @abs, @sqrt, ...) |\n| **File formats** | CSV, TSV, `.cell` | CSV, TSV, XLSX/XLS/ODS import, Markdown export, `.sc` |\n| **Cell formatting** | not yet | Bold, italic, underline, RGB colors |\n| **Scripting** | Headless CLI mode (`--read` / `--write` / `--eval`, stdin pipe) | Lua scripting, external C modules, non-interactive mode |\n| **Charting** | not yet | GNUPlot integration |\n| **Windows support** | ✓ (pre-built binaries) | Limited |\n| **Clipboard** | Built-in | Requires tmux / xclip / pbpaste |\n| **Config file** | not yet | `~/.config/sc-im/scimrc` |\n\n### Choose cell if…\n\n- You want editing that works exactly like Vim (`i` to insert, `ESC` to return, `/` to search)\n- You prefer Excel-compatible formula syntax (`=SUM`, `=IF`, `=AVERAGE`)\n- You need a working binary on Windows without extra setup\n- You value a modern, memory-safe codebase with minimal dependencies\n\n### Choose sc-im if…\n\n- You need XLSX, ODS, or Markdown support right now\n- You need Lua scripting or GNUPlot charting right now\n- You need cell-level formatting (colors, bold, italic) right now\n- You want a highly configurable, feature-rich tool with decades of history behind it\n\n## Architecture\n\n```\ncell/\n  crates/\n    cell-sheet-core/    # Data model, formula engine, file I/O (no TUI dependency)\n    cell-sheet-tui/     # Ratatui rendering, Vim modes, event loop\n```\n\nThe core library is independent of the terminal UI and can be tested without a terminal.\n\n## Releasing\n\nReleases are automated with [release-plz](https://release-plz.dev/) from the\n[release workflow](.github/workflows/release.yml):\n\n- Pushes to `main` open or update a release PR with the next version and\n  changelog updates.\n- Merging the release PR publishes `cell-sheet-core` and `cell-sheet-tui` to\n  [crates.io](https://crates.io) via trusted publishing, creates the `vX.Y.Z`\n  tag, and creates a draft GitHub Release.\n- The same workflow run then builds binaries for Linux (x86_64, aarch64),\n  macOS (x86_64, aarch64), and Windows (x86_64), uploads archives and SHA256\n  checksums, and publishes the GitHub Release.\n\nSee [RELEASE.md](RELEASE.md) for maintainer instructions and failure handling.\n\n## Contributing\n\nContributions are welcome. See [CONTRIBUTING.md](CONTRIBUTING.md) for the\ndevelopment setup, project conventions, and pull request workflow.\n\n## License\n\n[MIT](LICENSE)","summary":"**cell** is a terminal‑based spreadsheet editor written in Rust that offers a familiar Vim‑style keyboard interface. It can load and edit CSV, TSV, PSV and a custom `.cell` format, supports spreadsheet formulas, ranges, and conditional logic, and works in both interactive and headless modes for piping and automation. The tool is ideal for power users, data analysts, and developers who prefer keyboard‑centric workflows and need to perform quick calculations or data manipulations in a lightweight terminal environment.","description":"A fast terminal spreadsheet editor with Vim keybindings","stars":278,"language":"Rust"},{"owner":"drio","repo":"unixmagic","url":"https://github.com/drio/unixmagic","readme":"# Unix Magic Poster Reference Tracker\n\nLive site: **[unixmagic.net](https://unixmagic.net)**\n\n![Unix Magic poster walkthrough](./unixmagic.desktop.v2.webp)\n\nA Hugo pipeline that catalogues and annotates every reference on the classic\nUSENIX UNIX Magic poster. The goal is a structured way to explore and\nunderstand each element of the poster — part reference, part love letter to\nearly Unix.\n\nThe UNIX Magic poster was created by *Gary Overacre* and published by UniTech\nSoftware, Inc. in the 1980s.\n\n- 📋 Marker [list](https://github.com/drio/unixmagic/issues/4) issue.\n\n### References\n- Hacker News [discussion (2025)](https://news.ycombinator.com/item?id=43019136).\n- Hacker News [discussion (2025, part 2)](https://news.ycombinator.com/item?id=47916769).\n- Hacker News [discussion (2021)](https://news.ycombinator.com/item?id=27029196).\n- Jan-Piet Mens [blog post](https://jpmens.net/2021/04/09/the-unix-magic-poster/).\n\n### Contributing\n\nContributions welcome. When adding an annotation, remember this is a chance to\ndig into the history behind what you're describing. Share what the component\nmeans to you, but also frame the explanation in the context of Unix's early\ndays: how did this functionality compare to other systems at the time? What\nmade it special? This project isn't just about explaining what things are,\nbut why they mattered — technically and culturally.\n\nBelow: the original poster, and a custom puzzle drio had made featuring the\nposter's artwork.\n\n<div align=\"center\">\n<img src=\"static/ump.webp\" width=\"400\">\n<img src=\"./static/puzzle.webp\" width=\"400\">\n</div>\n\n### The other posters\n\nGary also made two other posters that never quite landed the same way. I\nprefer \"UNIX Magic\", but here they are.\n\n<div align=\"center\">\n<img src=\"static/view.small.webp\" width=\"400\">\n<img src=\"static/feuds.small.webp\" width=\"400\">\n</div>\n","summary":"The Unix Magic Poster Reference Tracker is a Hugo‑based website that catalogs and annotates every reference found on Gary Overacre’s classic Unix Magic poster, providing a structured way to explore its historical and technical content. Core features include a searchable, annotated database of poster elements, contextual explanations tying each component back to its Unix era significance, and a user‑contributed issue list for adding new annotations. The project serves Unix historians, system designers, and hobbyists interested in early Unix culture and the evolution of operating system concepts. Its open‑source nature invites contributions from anyone eager to deepen the understanding of this iconic piece of computing heritage.","description":"Capturing all the details of the classic Usenix Unix poster.","stars":145,"language":"CSS"},{"owner":"hpennington","repo":"agentswift","url":"https://github.com/hpennington/agentswift","readme":"# AgentSwift\n\n[Download AgentSwift](https://github.com/hpennington/agentswift/raw/refs/heads/main/AgentSwift-0.2.4.zip)\nYou must install the dependencies listed below in order for the binary to work. See below for setup commands.\n\nDependencies:\n- Xcode\n- Xcode command line tools\n- xcodebuildmcp\n- openspec\n  \n\n![AgentSwift settings panel](screenshot2.png)\n\n![AgentSwift](screenshot.png)\n\nA native macOS app that runs an autonomous AI coding agent for Apple platform development. Describe what you want to build, and AgentSwift uses Claude to discover your project, implement changes, build, run, and validate — without you touching Xcode.\n\n## What it does\n\nAgentSwift drives a multi-phase agentic workflow:\n\n1. **Discover** — Claude inspects your Xcode project structure and schemes\n2. **Implement** — edits source files to match your request\n3. **Build** — runs xcodebuildmcp to compile\n4. **Launch / Validate** — boots the app on a simulator or macOS, runs UI automation to verify behavior\n5. **Archive** — marks the task complete\n\n## Requirements\n\n- macOS 26.1+\n- Xcode\n- Node.js / npm\n- An [Anthropic API key](https://console.anthropic.com)\n\n## Dependencies\n\nInstall these two CLIs before running the agent:\n\n### xcodebuildmcp\n\nProvides build, launch, and UI automation capabilities for Xcode projects.\n\n```bash\nnpm install -g xcodebuildmcp\n```\n\n### openspec\n\nTracks implementation specs across agent sessions.\n\n```bash\nnpm install -g @fission-ai/openspec\n```\n\n## Setup\n\n1. Build and run the app in Xcode.\n2. Open **Settings** and enter your Anthropic API key.\n3. Select a **Project Folder** (the root of your Xcode project).\n4. Optionally pick an **iOS Simulator** from the dropdown.\n5. Type what you want to build and press **Cmd+Return**.\n\nOn the first run the agent discovers your project's scheme and simulator target. Subsequent runs skip discovery and go straight to implementation.\n\n## Models\n\n| Model | Use when |\n|---|---|\n| Claude Opus 4.7 | Complex tasks, large codebases |\n| Claude Sonnet 4.6 | Faster iteration, lighter tasks |\n\n## Key behaviors\n\n- **Message queuing** — if you send a new message while the agent is running, the latest supersedes earlier ones\n- **Build caching** — scheme, project path, and simulator ID are extracted after the first build and reused automatically\n- **Error escalation** — the agent attempts one fix on a failure, then surfaces the error to you rather than looping\n\n## Architecture\n\n```\nAgentSwiftApp.swift    — app entry point\nContentView.swift      — UI, view models, agentic loop\nAnthropicService.swift — Anthropic API client (streaming SSE)\nToolExecutor.swift     — bash / read_file / write_file execution\nItem.swift             — chat message model\n```\n\nNo external Swift dependencies — pure SwiftUI + Foundation.\n","summary":"AgentSwift is a native macOS application that runs an autonomous AI coding agent for Apple platform development. It uses Claude to inspect an Xcode project, automatically edits source files to fulfill a user’s request, compiles with xcodebuildmcp, launches the app on a simulator or macOS, runs UI automation to validate and then marks the task complete. The tool supports a streamlined workflow with build caching, message queuing, and error escalation, and it can be set up with just Xcode, Node, and an Anthropic API key. This makes it especially useful for Swift/iOS developers who want to prototype, iterate, or modify Xcode projects without manually touching the IDE.","description":null,"stars":108,"language":"Swift"},{"owner":"kernalix7","repo":"winpodx","url":"https://github.com/kernalix7/winpodx","readme":"<div align=\"center\">\n\n<img src=\"CI.svg\" alt=\"winpodx\" width=\"320\">\n\n### Click an app. Word opens. That's it.\n\n<p>Native Linux windows for every Windows app — real icons, real <code>WM_CLASS</code>,<br>\npin-to-taskbar. FreeRDP RemoteApp + dockur/windows. Zero config.</p>\n\n<pre><code># Latest stable release (default)\ncurl -fsSL https://raw.githubusercontent.com/kernalix7/winpodx/main/install.sh | bash\n\n# Latest main (development)\ncurl -fsSL https://raw.githubusercontent.com/kernalix7/winpodx/main/install.sh | bash -s -- --main</code></pre>\n\n<a href=\"docs/images/demo.png\">\n  <img src=\"docs/images/demo.png\" alt=\"winpodx in action — Windows apps as native Linux windows on KDE\" width=\"720\">\n</a>\n\n<sub>Windows About / Performance Monitor / PowerShell each in their own Linux window, alongside the winpodx Apps grid.</sub>\n\n[![Beta](https://img.shields.io/badge/status-beta-orange?style=for-the-badge)](#status-beta)\n[![Latest](https://img.shields.io/github/v/release/kernalix7/winpodx?include_prereleases&style=for-the-badge&label=latest&color=2962FF)](https://github.com/kernalix7/winpodx/releases)\n\n[![license](https://img.shields.io/github/license/kernalix7/winpodx?style=flat-square&color=blue)](LICENSE)\n[![python](https://img.shields.io/badge/python-3.9%2B-3776AB?style=flat-square&logo=python&logoColor=white)](https://www.python.org/)\n[![tests](https://img.shields.io/badge/tests-411-2EA44F?style=flat-square)](#testing)\n[![CI](https://img.shields.io/github/actions/workflow/status/kernalix7/winpodx/ci.yml?branch=main&style=flat-square&label=CI)](https://github.com/kernalix7/winpodx/actions/workflows/ci.yml)\n[![stars](https://img.shields.io/github/stars/kernalix7/winpodx?style=flat-square&color=FFD93D&logo=github&logoColor=white)](https://github.com/kernalix7/winpodx/stargazers)\n[![downloads](https://img.shields.io/github/downloads/kernalix7/winpodx/total?style=flat-square&color=2EA44F)](https://github.com/kernalix7/winpodx/releases)\n\n###### Works on\n\n[![openSUSE](https://img.shields.io/badge/openSUSE-73BA25?style=flat-square&logo=opensuse&logoColor=white)](https://www.opensuse.org/)\n[![Fedora](https://img.shields.io/badge/Fedora-294172?style=flat-square&logo=fedora&logoColor=white)](https://fedoraproject.org/)\n[![Debian](https://img.shields.io/badge/Debian-A81D33?style=flat-square&logo=debian&logoColor=white)](https://www.debian.org/)\n[![Ubuntu](https://img.shields.io/badge/Ubuntu-E95420?style=flat-square&logo=ubuntu&logoColor=white)](https://ubuntu.com/)\n[![RHEL family](https://img.shields.io/badge/RHEL%20%2F%20Alma%20%2F%20Rocky-EE0000?style=flat-square&logo=redhat&logoColor=white)](https://www.redhat.com/)\n[![Arch (AUR pending)](https://img.shields.io/badge/Arch%20(AUR)-pending-lightgrey?style=flat-square&logo=archlinux&logoColor=white)](packaging/aur/README.md)\n[![NixOS](https://img.shields.io/badge/NixOS-5277C3?style=flat-square&logo=nixos&logoColor=white)](#install)\n\n<sub>**English** &nbsp;·&nbsp; [한국어](docs/README.ko.md) &nbsp;·&nbsp; [Quick start](#quick-start) &nbsp;·&nbsp; [Features](#key-features) &nbsp;·&nbsp; [CLI](#cli-reference) &nbsp;·&nbsp; [Multi-session](#multi-session-rdp)</sub>\n\n</div>\n\n---\n\n> ### Status: Beta\n> winpodx is in active development (v0.3.0). v0.3.0 ships a redesigned host→guest pipeline — bearer-authed HTTP agent on `127.0.0.1:8765` is now the default command channel, with FreeRDP RemoteApp kept as fallback. App launches no longer flash a PowerShell window. New `winpodx check` CLI + GUI Health card surface live pod / RDP / agent / round-trip / disk state. First install still takes ~5-10 minutes (Windows VM ISO download + Sysprep + OEM apply); `winpodx pod wait-ready --logs` shows live progress. Please file issues at <https://github.com/kernalix7/winpodx/issues> if something breaks.\n\n**No full-screen RDP.** Each Windows app becomes its own Linux window with its real icon — pinnable, alt-tabbable, file-associated. Drop into a full Windows desktop only when you actually want one (`winpodx app run desktop`).\n\nwinpodx runs a Windows container (via [dockur/windows](https://github.com/dockur/windows)) in the background and presents Windows apps as native Linux applications through FreeRDP RemoteApp, while a bearer-authed HTTP agent inside the guest handles the host→guest command channel without flashing a PowerShell window. No manual VM setup, no ISO downloads, no registry editing. **Near-zero external Python dependencies** (stdlib only on Python 3.11+; one pure-Python `tomli` fallback on 3.9/3.10).\n\n## Why winpodx?\n\nExisting tools for running Windows apps on Linux all have trade-offs:\n\n| | winapps | LinOffice | winboat | winpodx |\n|---|---|---|---|---|\n| Core tech | Any RDP-capable Windows host (cloud / physical / container) + FreeRDP | dockur + FreeRDP | dockur + FreeRDP | dockur (Podman) + FreeRDP + HTTP guest agent |\n| Setup | Manual (shell + config + RDP testing) | One-liner script | One-click GUI installer | **Zero-config** (auto on first launch) |\n| Interface | CLI only | CLI only | Electron GUI | **Qt6 GUI + CLI + tray** |\n| App scope | Any Windows app | Office only | Any Windows app | Any Windows app |\n| Language | Shell (86%) | Shell + Python | TypeScript / Vue / Go | **Python (100%)** |\n| Runtime deps | curl, dialog, git, netcat | Podman, FreeRDP | Electron, Docker/Podman, FreeRDP | **Python 3.9+, FreeRDP, Podman** |\n| Auto suspend / resume | No | No | Not documented | **Yes (idle timeout)** |\n| Password rotation | No | No | Not documented | **Yes (7-day, atomic)** |\n| HiDPI auto-detect | No | No | Not documented | **GNOME, KDE, Sway, Hyprland, Cinnamon, xrdb** |\n| Sound default | No | No | Yes (FreeRDP) | Yes (FreeRDP) |\n| Printer redirection default | No | No | Not documented | Yes (FreeRDP) |\n| USB drive auto-mapping | No | No | Smartcard passthrough | **Drive subfolders → drive letters via FileSystemWatcher** |\n| Discovery (auto-scan installed apps) | No | No | Yes | **Yes (Registry + Start Menu + UWP + choco/scoop)** |\n| Multi-session RDP | No | No | Not documented | **Yes (bundled rdprrap, up to 10)** |\n| Offline / air-gapped install | No | No | No | **Yes (`--source` + `--image-tar`)** |\n| License | MIT | AGPL-3.0 | MIT | MIT |\n\n> winboat is the closest peer in scope and was an inspiration. We focus on a different mix — stdlib-leaning Python + Qt6 instead of Electron, deeper auto-config (auto suspend, 7-day password rotation, multi-DE HiDPI), and an explicit air-gapped install path. Both projects build on dockur/windows; that ecosystem is bigger than any one app.\n\n## winpodx vs Wine\n\n**winpodx is not a Wine replacement.** Wine translates Windows API calls; winpodx runs the actual Windows OS in a container. The two solve different problems and many users have both installed.\n\n| When you need... | Use |\n|---|---|\n| Older Win32 apps, indie games, lightweight utilities | **Wine / Bottles / Lutris** |\n| GPU-accelerated games / 3D apps (DirectX 9 – 12) | **Wine** — DXVK / VKD3D give near-native frame rates. winpodx has no GPU passthrough by default; QEMU CPU rendering is much slower. (GPU passthrough via VFIO is a manual bring-your-own setup — not yet packaged.) |\n| Microsoft 365 with full Outlook + Teams + OneDrive integration | **winpodx** |\n| Adobe Creative Suite (Photoshop, Illustrator, Premiere, Lightroom) | winpodx — but heavy GPU effects will be CPU-bound (see GPU row above) |\n| Anti-cheat games (Valorant, EAC, BattlEye) | **TBD** — anti-cheats vary by VM-detection policy (Vanguard needs TPM 2.0 + no hypervisor, EAC mostly blocks VMs, VAC is lenient). Test before committing. |\n| DRM-heavy software / hardware dongle apps | **winpodx** |\n| Apps that ship kernel-mode drivers (some VPNs, security suites) | **winpodx** |\n| Banking / tax / government tools with regional certificates | **winpodx** |\n| Visual Studio, WinUI 3 / WinRT, .NET features Wine hasn't caught up to | **winpodx** |\n| IE-only legacy enterprise web apps | **winpodx** |\n| Anything where \"mostly works\" isn't acceptable | **winpodx** |\n\nWine wins on speed and on GPU when DXVK/VKD3D translate cleanly. winpodx wins on **100% Windows feature parity** for everything else — every app runs on a real Windows kernel, rendered into your Linux desktop as a native window via FreeRDP RemoteApp.\n\n## Key Features\n\n<table>\n<tr><td width=\"50%\">\n\n**Seamless App Windows**\n- RemoteApp (RAIL) renders each app as a native Linux window (no full desktop)\n- Per-app taskbar icons via `WM_CLASS` matching (`/wm-class:<stem>` + `StartupWMClass`)\n- File associations: double-click `.docx` in your file manager → Word opens\n- Multi-session RDP: bundled rdprrap auto-enables up to 10 independent sessions\n- RAIL prerequisites (`fDisabledAllowList=1` + `fInheritInitialProgram=1` + `MaxInstanceCount=10`) are set automatically during unattended install\n\n</td><td width=\"50%\">\n\n**Zero-Config Launch**\n- First app click auto-provisions everything: config, container, desktop entries\n- **Auto-discovery on first boot** — winpodx scans the running Windows guest and registers every installed app (Registry App Paths, Start Menu, UWP/MSIX, Chocolatey, Scoop) with the real binary's icon\n- Manual rescan any time via `winpodx app refresh` or the GUI Refresh button\n- Interactive setup wizard for advanced configuration\n\n</td></tr>\n<tr><td width=\"50%\">\n\n**Peripherals & Sharing**\n- **Clipboard**: Bidirectional copy-paste (text + images) enabled by default\n- **Sound**: RDP audio streaming (`/sound:sys:alsa`) enabled by default\n- **Printer**: Linux printers shared to Windows via RDP redirection (default)\n- **USB drives**: Linux mount tree shared as `\\\\tsclient\\media`; drives plugged after session start are still accessible as subfolders\n- **USB drive auto-mapping**: Windows-side FileSystemWatcher script auto-maps `\\\\tsclient\\media\\<USB>` subfolders to drive letters (E:, F:, ...)\n- **USB device passthrough**: `/usb:auto` is allowlisted but **not enabled by default** — opt in via `extra_flags` if your FreeRDP build ships the urbdrc plugin\n- **Home directory**: Shared as `\\\\tsclient\\home` (default)\n- **Desktop shortcuts**: Windows desktop auto-populated with `\\\\tsclient\\home` (\"Home\") and `\\\\tsclient\\media` (\"USB\") shortcuts during first boot\n\n**GPU acceleration:** not yet supported. dockur/windows runs under QEMU/KVM with software graphics — DirectX-heavy games and 3D apps will be CPU-bound. GPU passthrough via VFIO is feasible but not packaged. (See [winpodx vs Wine](#winpodx-vs-wine) — Wine + DXVK is the right tool when you need GPU.)\n\n</td><td width=\"50%\">\n\n**Automation & Security**\n- Auto suspend/resume: container pauses when idle, resumes on next launch\n- Password auto-rotation: 20-char cryptographic password, 7-day cycle with rollback\n- Smart DPI scaling: auto-detects from GNOME, KDE, Sway, Hyprland, Cinnamon, xrdb\n- Qt6 system tray + full Qt6 main window (Apps / Settings / Tools / Terminal pages)\n- Multi-backend: Podman (default), Docker, libvirt/KVM, manual RDP\n- Windows build pinned to 11 25H2 (`TargetReleaseVersionInfo=25H2`, 365-day feature-update defer)\n- Windows debloat: disable telemetry, ads, Cortana, search indexing, services (DiagTrack / dmwappushservice / WSearch / SysMain)\n- High-performance power plan + hibernation off + tzutil UTC + Cloudflare DNS\n- Time sync: force Windows clock resync after host sleep/wake\n- FreeRDP `extra_flags` allowlist (regex-validated) as the user-input safety boundary\n\n</td></tr>\n</table>\n\n## How It Works\n\n```\n                     ┌─────────────────────────────┐\n  Click \"Word\"       │     Linux Desktop (KDE,     │\n  in app menu  ───>  │     GNOME, Sway, ...)       │\n                     └──────────────┬──────────────┘\n                                    │\n                     ┌──────────────▼──────────────┐\n                     │         winpodx             │\n                     │  ┌─────────────────────┐    │\n                     │  │ auto-provision:     │    │\n                     │  │  config → password  │    │\n                     │  │  → container → RDP  │    │\n                     │  │  → desktop entries  │    │\n                     │  └─────────────────────┘    │\n                     └──────────────┬──────────────┘\n                                    │ FreeRDP RemoteApp\n                     ┌──────────────▼──────────────┐\n                     │   Windows Container (Podman)│\n                     │   ┌──────────────────────┐  │\n                     │   │  Word  Excel  PPT ...│  │\n                     │   │ multi-session/rdprrap│  │\n                     │   └──────────────────────┘  │\n                     │   127.0.0.1:3390 (TLS)      │\n                     └─────────────────────────────┘\n```\n\n## GUI\n\nLaunch with `winpodx gui`. The Qt6 main window has four pages:\n\n| Page | What it does |\n|------|--------------|\n| **Apps** | Grid / list view of installed app profiles, search + category filter, per-app launch with 3s cooldown, Add / Edit / Delete app profile dialogs |\n| **Settings** | RDP (user / IP / port / scale / DPI / password rotation) and Container (backend / CPU / RAM / idle timeout) in one screen |\n| **Tools** | Suspend / Resume / Full Desktop buttons, Clean Locks / Sync Time / Debloat, and a one-click Windows Update **enable / disable** toggle |\n| **Terminal** | Embedded shell limited to a command allowlist (`podman`, `docker`, `virsh`, `winpodx`, `xfreerdp`, `systemctl`, `journalctl`, `ss`, `ip`, `ping`, ...) with quick buttons (Status / Logs / Inspect / RDP Test / Clear) |\n| **Info** | Live **Health** card (pod / RDP / agent / OEM / disk / password age / app count) + System / Display / Dependencies / Pod / Config snapshot |\n\nThe system tray (`winpodx tray`) is a lighter-weight alternative — pod controls, app launcher submenu (top 20 + Full Desktop), maintenance submenu (Clean Locks / Sync Time / Suspend), and an optional idle-monitor thread.\n\n### Health checks\n\n`winpodx check` runs every probe used by the GUI Health card and prints a one-line verdict for each:\n\n```\n=== winpodx check ===\n\n  [OK  ] pod_running        running (ip=127.0.0.1)  (58ms)\n  [OK  ] rdp_port           127.0.0.1:3390 reachable  (0ms)\n  [OK  ] agent_health       version=0.2.2-rev4  (63ms)\n  [OK  ] oem_version        bundle=12  (3ms)\n  [OK  ] password_age       7d remaining (max_age=7d)  (0ms)\n  [OK  ] apps_discovered    41 app(s) in /home/.../discovered  (3ms)\n  [OK  ] disk_free          401.0/3725 GiB free  (0ms)\n\nOverall: OK\n```\n\nStatus legend: `OK` (green) / `WARN` (yellow — informational, exit 0) / `FAIL` (red — exit 1) / `SKIP` (grey — disabled by config). Use `--json` for machine-readable output.\n\n## Tech Stack\n\n| Layer | Technology |\n|-------|------------|\n| Language | Python 3.9+ (stdlib only on 3.11+; `tomli` fallback on 3.9/3.10) |\n| CLI | argparse (stdlib) |\n| GUI (optional) | PySide6 (Qt6) |\n| Config | TOML (stdlib `tomllib` on 3.11+ / `tomli` on 3.9/3.10; built-in writer) |\n| RDP | FreeRDP 3+ (xfreerdp, RemoteApp/RAIL) |\n| Guest agent | PowerShell `HttpListener` on `127.0.0.1:8765` (bearer auth, base64-encoded `/exec` payloads) |\n| Container | Podman / Docker ([dockur/windows](https://github.com/dockur/windows)) |\n| VM | libvirt / KVM |\n| CI | GitHub Actions (lint + test on 3.9-3.13 + pip-audit) |\n\n## Quick Start\n\n### Install\n\n**One-line install** (any supported Linux distro):\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/kernalix7/winpodx/main/install.sh | bash\n```\n\nDetects your distro, installs missing system dependencies (Podman, FreeRDP,\nKVM, Python 3.9+) with your confirmation, drops winpodx into\n`~/.local/bin/winpodx-app/`. The Windows-app menu populates automatically\nthe first time the pod boots — discovery scans your running Windows guest\nand registers every installed app with its real icon. No root required\nexcept for the dependency install step. Works on\nopenSUSE, Fedora, Debian/Ubuntu, RHEL-family, and Arch.\n\n> **Windows licensing.** dockur downloads a Windows ISO from Microsoft\n> at first pod boot. Your use of the resulting Windows guest is governed\n> by Microsoft's Software License Terms (the EULA shown on first\n> activation). winpodx does not redistribute Windows; it only orchestrates\n> the install on your machine. Bring your own Windows license key for\n> activation — Home / Pro / Enterprise are all supported by dockur.\n\nBy default the installer pins to the **latest published GitHub release**\n(currently `v0.1.9`). Pre-release / development versions stay opt-in.\n\n**Choose a version** — pass `--main` (or `--ref TAG`) for development\nbuilds, otherwise stick with the default release:\n\n```bash\n# Install the latest stable release (default)\ncurl -fsSL https://raw.githubusercontent.com/kernalix7/winpodx/main/install.sh | bash\n\n# Install the latest main HEAD (development; may be unstable)\ncurl -fsSL https://raw.githubusercontent.com/kernalix7/winpodx/main/install.sh | bash -s -- --main\n\n# Install a specific tag, branch, or commit\ncurl -fsSL https://raw.githubusercontent.com/kernalix7/winpodx/main/install.sh | bash -s -- --ref v0.1.9\n\n# Env-var equivalent (works under curl | bash without -s --)\nWINPODX_REF=main  curl -fsSL https://raw.githubusercontent.com/kernalix7/winpodx/main/install.sh | bash\nWINPODX_REF=v0.1.9 curl -fsSL https://raw.githubusercontent.com/kernalix7/winpodx/main/install.sh | bash\n```\n\n**Offline / air-gapped install** — the installer takes three optional flags\nfor machines with no registry / package-repo access:\n\n```bash\n# Copy winpodx from a local clone instead of git clone (also env: WINPODX_SOURCE)\n./install.sh --source /media/usb/winpodx\n\n# Preload the Windows image tar instead of fetching at first boot (env: WINPODX_IMAGE_TAR)\n./install.sh --image-tar /media/usb/windows-image.tar\n\n# Skip distro package install (env: WINPODX_SKIP_DEPS=1) — fails early if deps aren't present\n./install.sh --skip-deps\n\n# Everything at once:\n./install.sh --source /media/usb/winpodx --image-tar /media/usb/windows-image.tar --skip-deps\n```\n\nEnv vars are honored even under `curl | bash`, so\n`WINPODX_SKIP_DEPS=1 curl ... | bash` works.\n\n**Nix** — a flake is provided for NixOS / nix-on-any-distro users:\n\n```bash\n# Run directly without installing\nnix run github:kernalix7/winpodx\n\n# Install into your profile\nnix profile install github:kernalix7/winpodx\n\n# As a flake input\ninputs.winpodx.url = \"github:kernalix7/winpodx\";\n```\n\nThe wrapper bundles FreeRDP, podman / podman-compose, iproute2 and\nlibnotify, so the default podman backend works out of the box. The\ndocker and libvirt backends still require the respective tools to be\npresent on the host.\n\n**One-line uninstall** — `--confirm` or `--purge` is required under pipe\n(the interactive prompts can't read from a terminal while bash consumes\nstdin from curl):\n\n```bash\n# Remove winpodx files, keep the Windows container + its data\ncurl -fsSL https://raw.githubusercontent.com/kernalix7/winpodx/main/uninstall.sh | bash -s -- --confirm\n\n# Full wipe: container, volume, config, launcher, everything\ncurl -fsSL https://raw.githubusercontent.com/kernalix7/winpodx/main/uninstall.sh | bash -s -- --purge\n```\n\nPrefer a native package manager? Prebuilt RPM / `.deb` / AUR packages are\nattached to every [GitHub Release](https://github.com/kernalix7/winpodx/releases/latest)\n— openSUSE/Fedora RPMs from the\n[openSUSE Build Service (`home:Kernalix7/winpodx`)](https://build.opensuse.org/package/show/home:Kernalix7/winpodx),\nthe rest from GitHub Actions:\n\n**openSUSE Tumbleweed / Leap 15.6 / Leap 16.0 / Slowroll**\n\n```bash\nsudo zypper addrepo \\\n  https://download.opensuse.org/repositories/home:/Kernalix7/openSUSE_Tumbleweed/home:Kernalix7.repo\nsudo zypper refresh\nsudo zypper install winpodx\n```\n\nReplace `openSUSE_Tumbleweed` with `openSUSE_Leap_16.0`, `openSUSE_Leap_15.6`,\nor `openSUSE_Slowroll` as needed.\n\n**Fedora 42 / 43**\n\n```bash\nsudo dnf config-manager --add-repo \\\n  https://download.opensuse.org/repositories/home:/Kernalix7/Fedora_43/home:Kernalix7.repo\nsudo dnf install winpodx\n```\n\n**Debian 12 / 13, Ubuntu 24.04 / 25.04 / 25.10**\n\nDownload the matching `.deb` from the\n[latest release](https://github.com/Kernalix7/winpodx/releases/latest) and\ninstall:\n\n```bash\nsudo apt install ./winpodx_<version>_all_debian13.deb   # pick your flavor\n```\n\n**AlmaLinux / Rocky / RHEL 9 & 10**\n\nEPEL is required on el9 for `python3-tomli`. Download the matching `.rpm`\nfrom the [latest release](https://github.com/Kernalix7/winpodx/releases/latest)\nand install:\n\n```bash\nsudo dnf install epel-release                     # el9 only\nsudo dnf install ./winpodx-<version>-1.noarch.el9.rpm   # or .el10.rpm\n```\n\n**Arch Linux (AUR)**\n\n> Note: AUR publishing is wired up but pending a one-time maintainer setup\n> (see [`packaging/aur/README.md`](packaging/aur/README.md)). Once activated,\n> tag pushes publish automatically.\n\n```bash\nyay -S winpodx        # or:\nparu -S winpodx\n```\n\n**From source (development)**\n\n```bash\ngit clone https://github.com/kernalix7/winpodx.git\ncd winpodx\n./install.sh\n```\n\nThe source installer automatically:\n1. Detects your distro (openSUSE, Fedora, Ubuntu, Arch, ...)\n2. Installs missing dependencies (Podman, FreeRDP, KVM), asks before installing\n3. Copies winpodx to `~/.local/bin/winpodx-app/`\n4. Creates config and compose.yaml\n5. Auto-discovery (`winpodx app refresh`) fires on first pod boot to populate the menu\n\n### Launch\n\n```bash\nwinpodx app run word              # Launch Word\nwinpodx app run word ~/doc.docx   # Open a file\nwinpodx app run desktop           # Full Windows desktop\n```\n\nOr just click an app icon in your menu.\n\n### Manual Run (no install)\n\n```bash\ngit clone https://github.com/kernalix7/winpodx.git\ncd winpodx\nexport PYTHONPATH=\"$PWD/src\"\npython3 -m winpodx app run word\n```\n\n---\n\n## CLI Reference\n\n<details>\n<summary><b>Click to expand full CLI reference</b></summary>\n\n```bash\n# Apps\nwinpodx app list                  # List available apps\nwinpodx app run word              # Launch Word (auto-provisions on first run)\nwinpodx app run word ~/doc.docx   # Open a file in Word\nwinpodx app run desktop           # Full Windows desktop session\nwinpodx app install-all           # Register all apps in desktop menu\nwinpodx app sessions              # Show active sessions\nwinpodx app kill word             # Kill an active session\n\n# Pod management\nwinpodx pod start --wait          # Start and wait for RDP readiness\nwinpodx pod stop                  # Stop (warns about active sessions)\nwinpodx pod status                # Status with session count\nwinpodx pod restart\nwinpodx pod apply-fixes           # Re-apply Windows-side runtime fixes (idempotent)\nwinpodx pod sync-password         # Recover from password drift (cfg ↔ Windows)\nwinpodx pod multi-session on      # Toggle bundled rdprrap multi-session RDP\nwinpodx pod multi-session status\nwinpodx pod wait-ready --logs     # Wait for Windows first-boot with progress + container logs\n\n# Power management\nwinpodx power --suspend           # Pause container (free CPU, keep memory)\nwinpodx power --resume            # Resume paused container\n\n# Security\nwinpodx rotate-password           # Rotate Windows RDP password\n\n# Maintenance\nwinpodx cleanup                   # Remove Office lock files (~$*.*)\nwinpodx timesync                  # Force Windows time synchronization\nwinpodx debloat                   # Disable telemetry, ads, bloat\nwinpodx uninstall                 # Remove winpodx files (keeps container)\nwinpodx uninstall --purge         # Remove everything including config\n\n# System\nwinpodx setup                     # Interactive setup wizard\nwinpodx info                      # Display, dependencies, config diagnostics\nwinpodx check                     # Run all health probes (pod / RDP / agent / disk / …)\nwinpodx check --json              # Same probes, machine-readable JSON\nwinpodx gui                       # Launch Qt6 main window (Apps / Settings / Tools / Terminal)\nwinpodx tray                      # Launch Qt system tray icon\nwinpodx config show               # Show current config\nwinpodx config set rdp.scale 140  # Change a config value\nwinpodx config import             # Import existing winapps.conf\n```\n\n</details>\n\n## Peripherals & Sharing\n\n| Feature | How it works | Default |\n|---------|-------------|---------|\n| **Clipboard** | Bidirectional copy-paste via RDP (`+clipboard`) | Enabled |\n| **Sound** | Audio streaming via ALSA (`/sound:sys:alsa`) | Enabled |\n| **Printer** | Linux printers shared to Windows (`/printer`) | Enabled |\n| **Home directory** | Shared as `\\\\tsclient\\home` (`+home-drive`) | Enabled |\n| **USB drives** | Media folder shared as `\\\\tsclient\\media` (`/drive:media`); USB drives plugged in after session start are accessible as subfolders | Enabled |\n| **USB device passthrough** | Native USB redirection (`/usb:auto`) — requires FreeRDP urbdrc plugin | **Opt-in** (add to `extra_flags`) |\n| **USB drive mapping** | Windows-side script auto-maps USB subfolders to drive letters (E:, F:, ...) via FileSystemWatcher | Enabled |\n\n### USB Drive Flow\n\n```\nPlug in USB on Linux\n    │\n    ▼\nLinux mounts to /run/media/$USER/USBNAME\n    │\n    ▼\nFreeRDP shares as \\\\tsclient\\media\\USBNAME\n    │\n    ▼\nmedia_monitor.ps1 detects → net use E: \\\\tsclient\\media\\USBNAME\n    │\n    ▼\nWindows Explorer shows E: drive\n```\n\n## Configuration\n\nConfig file: `~/.config/winpodx/winpodx.toml` (auto-created, 0600 permissions)\n\n```toml\n[rdp]\nuser = \"User\"\npassword = \"\"                # Auto-generated random password\npassword_updated = \"\"        # ISO 8601 timestamp\npassword_max_age = 7         # Days before auto-rotation (0 = disable)\nip = \"127.0.0.1\"\nport = 3390\nscale = 100                  # Auto-detected from your DE\ndpi = 0                      # Windows DPI % (0 = auto)\nextra_flags = \"\"             # Additional FreeRDP flags (allowlisted)\n\n[pod]\nbackend = \"podman\"\nwin_version = \"11\"                               # 11 | 10 | ltsc10 | tiny11 | tiny10\ncpu_cores = 4\nram_gb = 4\nvnc_port = 8007\nauto_start = true                                # Start pod automatically when launching an app\nidle_timeout = 0                                 # Seconds before auto-suspend (0 = disabled)\nboot_timeout = 300                               # Seconds to wait for first-boot unattended install\nimage = \"docker.io/dockurr/windows:latest\"          # Container image (override for air-gapped mirror)\ndisk_size = \"64G\"                                # Virtual disk size passed to dockur\n```\n\n## App Profiles\n\nApp profiles are **metadata only**: they describe where a Windows app lives so winpodx can launch it through FreeRDP RemoteApp. The actual Windows application must be installed inside the Windows container.\n\n### Auto-discovery (default)\n\nStarting from v0.1.9 winpodx ships **no curated profile list**. The first time the Windows pod boots, the provisioner runs `winpodx app refresh` and that scans the running guest:\n\n- Registry `App Paths` (`HKLM` + `HKCU`)\n- Start Menu `.lnk` recursion (depth-capped)\n- UWP / MSIX packages via `Get-AppxPackage` + `AppxManifest.xml`\n- Chocolatey + Scoop shims\n\nFor each result it extracts the icon directly from the binary (or the package's logo asset for UWP) and writes the entry to `~/.local/share/winpodx/discovered/<slug>/`. Re-run any time:\n\n```bash\nwinpodx app refresh        # CLI\n# or click \"Refresh Apps\" on the GUI Apps page\n```\n\n<details>\n<summary><b>Adding a custom app profile manually</b></summary>\n\nUser-authored profiles live under `~/.local/share/winpodx/apps/` and override anything discovery finds with the same `name`:\n\n```bash\nmkdir -p ~/.local/share/winpodx/apps/myapp\ncat > ~/.local/share/winpodx/apps/myapp/app.toml << 'EOF'\nname = \"myapp\"\nfull_name = \"My Application\"\nexecutable = \"C:\\\\Program Files\\\\MyApp\\\\myapp.exe\"\ncategories = [\"Utility\"]\nmime_types = []\nEOF\n\nwinpodx app install myapp   # Register in desktop menu\n```\n\n</details>\n\n## Multi-Session RDP\n\nStock Windows Desktop editions limit RDP to one session per user; a second app\nwould otherwise reconnect and steal the first session. winpodx bundles\n[rdprrap](https://github.com/kernalix7/rdprrap) — a Rust reimplementation of\nRDPWrap — inside the package itself and installs it automatically during the\nWindows unattended install, so each RemoteApp window gets its own independent\nsession.\n\n**RAIL prerequisites.** RemoteApp itself requires three registry settings that\nwinpodx applies during unattended setup: `fDisabledAllowList=1` (enables\nRemoteApp publishing), `fInheritInitialProgram=1` (required for\n`/app:program:...` to launch the target executable instead of a shell), and\n`MaxInstanceCount=10` paired with `fSingleSessionPerUser=0` (lifts the\nsingle-session cap up to 10 concurrent RemoteApp windows). These are set\nregardless of whether rdprrap installs successfully — rdprrap is what makes\nthe sessions *independent*, but the registry keys are what make RemoteApp\nwork at all. After rdprrap install `TermService` is cycled so the wrapper\nDLL activates without a reboot.\n\n**Authentication channel.** NLA is disabled (`UserAuthentication=0`) so the\nFreeRDP command line can authenticate unattended from under\n`podman unshare --rootless-netns`, but `SecurityLayer=2` keeps the RDP\nchannel itself encrypted with TLS (so `/sec:tls /cert:ignore` against\n`127.0.0.1` is the full authenticated + encrypted path — no cleartext on the\nwire even though NLA is off).\n\n**Works fully offline.** The rdprrap zip ships inside winpodx's data directory\n(`config/oem/`) and is staged into `C:\\OEM\\` during the guest's first boot.\nsha256 is verified against a pin file before extraction. No network access is\nrequired at install time.\n\nInstall is one-shot: the patch is applied during dockur's unattended setup\nphase. If anything in that step fails (hash mismatch, extraction, installer\nerror), winpodx logs a warning and the guest stays in single-session mode —\napp launch never blocks on this step. A guest-side management channel\n(enable/disable/status after install) is planned for a later release.\n\n## Install / Uninstall\n\n```bash\n# From a cloned repo:\n./install.sh                # Install (detects distro, installs deps, registers apps)\n./uninstall.sh              # Uninstall (interactive, asks before each step)\n./uninstall.sh --confirm    # Uninstall (auto, keeps config)\n./uninstall.sh --purge      # Uninstall (removes everything including config)\n\n# Or one-liner (no clone needed):\ncurl -fsSL https://raw.githubusercontent.com/kernalix7/winpodx/main/install.sh   | bash\ncurl -fsSL https://raw.githubusercontent.com/kernalix7/winpodx/main/uninstall.sh | bash -s -- --confirm\ncurl -fsSL https://raw.githubusercontent.com/kernalix7/winpodx/main/uninstall.sh | bash -s -- --purge\n```\n\n**Uninstall only removes winpodx files.** It never touches:\n- Your Podman containers/volumes (Windows VM data)\n- System packages (podman, freerdp, python3)\n- Your home directory files\n\n## Project Structure\n\n```\nwinpodx/\n├── install.sh             # One-line installer (no pip)\n├── uninstall.sh           # Clean uninstaller\n├── src/winpodx/\n│   ├── cli/               # argparse commands (app, pod, config, setup, ...)\n│   ├── core/              # Config, RDP, pod lifecycle, provisioner, daemon\n│   ├── backend/           # Podman, Docker, libvirt, manual\n│   ├── desktop/           # .desktop entries, icons, MIME, tray, notifications\n│   ├── display/           # X11/Wayland detection, DPI scaling\n│   ├── gui/               # Qt6 main window, app dialog, theme\n│   └── utils/             # XDG paths, deps, TOML writer, winapps compat\n├── data/                  # winpodx GUI desktop entry + icon + config example\n├── config/oem/            # Windows OEM scripts (post-install)\n├── scripts/windows/       # PowerShell scripts (debloat, time sync, USB mapping, app discovery)\n├── .github/workflows/     # CI: lint + test + upstream update checker\n└── tests/                 # pytest test suite (411 tests)\n```\n\n## Supported Distros\n\n| Distro | Package Manager | Status |\n|--------|----------------|--------|\n| openSUSE Tumbleweed/Leap | zypper | Tested |\n| Fedora / RHEL / CentOS | dnf | Supported |\n| Ubuntu / Debian / Mint | apt | Supported |\n| Arch / Manjaro | pacman | Supported |\n\n## Testing\n\n```bash\n# From repo root (no install needed)\nexport PYTHONPATH=\"$PWD/src\"\npython3 -m pytest tests/ -v    # 411 tests\nruff check src/ tests/         # Lint\n```\n\n## Contributing\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for development setup and workflow.\n\n## Releasing & Packaging\n\nEach tag push (`v*.*.*`) publishes to all supported channels automatically:\n\n| Channel | Distros |\n|---------|---------|\n| RPM (openSUSE / Fedora / Slowroll) | Tumbleweed, Leap 15.6, Leap 16.0, Slowroll, Fedora 42/43 |\n| RPM (RHEL-family) | AlmaLinux 9 / 10 (also covers RHEL, Rocky, Oracle Linux 9/10) |\n| `.deb` | Debian 12 / 13, Ubuntu 24.04 / 25.04 / 25.10 |\n| AUR | Arch Linux (once activated — see [`packaging/aur/README.md`](packaging/aur/README.md)) |\n| `sdist` + `wheel` | PyPI-compatible source/binary distributions |\n\nMaintainer setup for each channel lives under [`packaging/`](packaging/):\n\n- [`packaging/obs/README.md`](packaging/obs/README.md) — openSUSE Build Service (RPM family).\n- [`packaging/aur/README.md`](packaging/aur/README.md) — Arch User Repository.\n- Debian/Ubuntu and AlmaLinux builds are self-contained in their respective GitHub Actions workflows and need no external setup.\n\n## Security\n\nFor security issues, follow the process in [SECURITY.md](SECURITY.md).\n\n## Star History\n\n<a href=\"https://star-history.com/#kernalix7/winpodx&Date\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=kernalix7/winpodx&type=Date&theme=dark\" />\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=kernalix7/winpodx&type=Date\" />\n    <img alt=\"Star History Chart\" src=\"https://api.star-history.com/svg?repos=kernalix7/winpodx&type=Date\" />\n  </picture>\n</a>\n\n## Support / 후원\n\nIf winpodx makes your Linux desktop a little nicer:\n\n[![Ko-fi](https://img.shields.io/badge/Ko--fi-F16061?logo=ko-fi&logoColor=white&style=for-the-badge)](https://ko-fi.com/kernalix7)\n[![Fairy](https://img.shields.io/badge/🧚_Fairy-EE6E73?style=for-the-badge&logoColor=white)](https://fairy.hada.io/@kernalix7)\n\nKo-fi for international card / PayPal payments; fairy.hada.io 는 국내 결제용.\nBug reports, PRs, and stars on the repo are equally appreciated and free —\n버그 리포트, PR, 별점도 환영합니다.\n\n## License\n\n[MIT](LICENSE) - Kim DaeHyun (kernalix7@kodenet.io)\n","summary":"Winpodx turns individual Windows applications into native Linux windows, allowing each app to appear with its real icon, task‑bar pinning, and file‑association support entirely from a Linux desktop. It achieves this by running a Windows VM that exposes RemoteApp sessions through a lightweight HTTP command channel, with FreeRDP and dockur/windows handling the remoting and splash‑screen logic. Installable with a single script, winpodx works on major Debian‑based, Fedora, openSUSE, Arch (AUR), and NixOS distributions and can run multiple sessions side‑by‑side, giving the feel of a true desktop when the user chooses. The solution is ideal for Linux users who need reliable, per‑application Windows access without the overhead of a full virtual desktop.","description":"Windows pod system for Linux","stars":278,"language":"Python"},{"owner":"lahfir","repo":"agent-desktop","url":"https://github.com/lahfir/agent-desktop","readme":"<h1 align=\"center\">AGENT DESKTOP</h1>\n\n<p align=\"center\">\n  <strong>OBSERVE. DECIDE. ACT.</strong>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/lahfir/agent-desktop/actions/workflows/ci.yml?query=branch%3Amain\"><img src=\"https://img.shields.io/github/actions/workflow/status/lahfir/agent-desktop/ci.yml?branch=main&style=for-the-badge\" alt=\"CI status\"></a>\n  <a href=\"https://github.com/lahfir/agent-desktop/releases\"><img src=\"https://img.shields.io/github/v/release/lahfir/agent-desktop?include_prereleases&style=for-the-badge\" alt=\"GitHub release\"></a>\n  <a href=\"https://www.npmjs.com/package/agent-desktop\"><img src=\"https://img.shields.io/npm/v/agent-desktop?label=npm&style=for-the-badge\" alt=\"npm version\"></a>\n  <a href=\"https://clawhub.ai/lahfir/agent-desktop\"><img src=\"https://img.shields.io/badge/ClawHub-skill-f97316?style=for-the-badge\" alt=\"ClawHub skill\"></a>\n  <a href=\"https://skills.sh/lahfir/agent-desktop/agent-desktop\"><img src=\"https://img.shields.io/badge/skills.sh-listed-8b5cf6?style=for-the-badge\" alt=\"skills.sh listing\"></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/badge/License-Apache--2.0-blue.svg?style=for-the-badge\" alt=\"Apache-2.0 License\"></a>\n</p>\n\n<p align=\"center\">\n  <img src=\"assets/Tutorial.gif\" alt=\"agent-desktop tutorial demo\" width=\"800\" />\n</p>\n\n**agent-desktop** is a native desktop automation CLI designed for AI agents, built with Rust. It gives structured access to any application through OS accessibility trees — no screenshots, no pixel matching, no browser required.\n\n## Architecture\n\n<p align=\"center\">\n  <img src=\"docs/architecture.png\" alt=\"agent-desktop architecture diagram\" width=\"800\" />\n</p>\n\n<a href=\"https://star-history.com/#lahfir/agent-desktop&Date\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=lahfir/agent-desktop&type=Date&theme=dark\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=lahfir/agent-desktop&type=Date\">\n    <img alt=\"Star history for lahfir/agent-desktop\" src=\"https://api.star-history.com/svg?repos=lahfir/agent-desktop&type=Date\">\n  </picture>\n</a>\n\n## Key Features\n\n- **Native Rust CLI**: Fast, single binary, no runtime dependencies\n- **C-ABI cdylib** (`libagent_desktop_ffi`): Load once from Python / Swift / Go / Ruby / Node / C instead of forking the CLI per call\n- **54 commands**: Observation, interaction, keyboard, mouse, notifications, clipboard, window management, plus a bundled `skills` doc loader\n- **Progressive skeleton traversal**: 78–96% token reduction on dense apps via shallow overview + targeted drill-down\n- **Snapshot & refs**: AI-optimized workflow using deterministic element references (`@e1`, `@e2`)\n- **AX-first interactions**: Every action exhausts pure accessibility API strategies before falling back to mouse events\n- **Structured JSON output**: Machine-readable responses with error codes and recovery hints\n- **Works with any app**: Finder, Safari, System Settings, Xcode, Slack — anything with an accessibility tree\n\n## Installation\n\n### npm (recommended)\n\n```bash\nnpm install -g agent-desktop        # downloads prebuilt binary automatically\n```\n\nOr without installing:\n\n```bash\nnpx agent-desktop snapshot --app Finder -i\n```\n\n### From source\n\n```bash\ngit clone https://github.com/lahfir/agent-desktop\ncd agent-desktop\ncargo build --release\ncp target/release/agent-desktop /usr/local/bin/\n```\n\nRequires Rust 1.78+ and macOS 13.0+.\n\n### Permissions\n\nmacOS requires Accessibility permission. Grant it in **System Settings > Privacy & Security > Accessibility** by adding your terminal app, or:\n\n```bash\nagent-desktop permissions --request   # trigger system dialog\n```\n\n## Language bindings (FFI)\n\nEvery GitHub Release ships a prebuilt C-ABI cdylib alongside the CLI tarballs. Hosts that need in-process calls (Python agents, Swift apps, Go services, Node tools, Ruby scripts, C/C++ code) `dlopen` the dylib and call the functions declared in `agent_desktop.h` — no fork-exec per command.\n\n| Platform             | Artifact |\n|----------------------|----------|\n| macOS arm64          | `agent-desktop-ffi-v<ver>-aarch64-apple-darwin.tar.gz` |\n| macOS x86_64         | `agent-desktop-ffi-v<ver>-x86_64-apple-darwin.tar.gz` |\n| Linux x86_64 (glibc) | `agent-desktop-ffi-v<ver>-x86_64-unknown-linux-gnu.tar.gz` |\n| Linux arm64  (glibc) | `agent-desktop-ffi-v<ver>-aarch64-unknown-linux-gnu.tar.gz` |\n| Windows x86_64 (MSVC)| `agent-desktop-ffi-v<ver>-x86_64-pc-windows-msvc.zip` |\n\nEach archive contains `lib/libagent_desktop_ffi.{dylib,so,dll}`, `include/agent_desktop.h`, `LICENSE`, and a short README. Verify the download with the release's `checksums.txt`:\n\n```bash\nshasum -a 256 -c checksums.txt\ngh attestation verify agent-desktop-ffi-v*.tar.gz --repo lahfir/agent-desktop   # Sigstore provenance\n```\n\nMinimal Python round-trip:\n\n```python\nimport ctypes\nlib = ctypes.CDLL(\"./lib/libagent_desktop_ffi.dylib\")\nlib.ad_adapter_create.restype = ctypes.c_void_p\nadapter = lib.ad_adapter_create()\n# ... call ad_list_apps / ad_get_tree / ad_execute_action, see docs below\nlib.ad_adapter_destroy(adapter)\n```\n\nFull consumer guide — error-handling contract, ownership rules, threading constraints, every entrypoint with Safety docs: [`skills/agent-desktop-ffi/`](skills/agent-desktop-ffi/).\n\n## Core Workflow for AI\n\nFor dense apps (Slack, VS Code, Notion), use **progressive skeleton traversal** to minimize token usage:\n\n```bash\n# 1. Shallow overview — depth-3 map, truncated containers show children_count\nagent-desktop snapshot --skeleton --app Slack -i --compact\n\n# 2. Drill into a region of interest (named containers get refs as drill targets)\nagent-desktop snapshot --root @e3 -i --compact\n\n# 3. Act on an element found in the drill-down\nagent-desktop click @e12\n\n# 4. Re-drill the same region to verify the state change\nagent-desktop snapshot --root @e3 -i --compact\n```\n\nFor simple apps, a full snapshot is fine:\n\n```bash\nagent-desktop snapshot --app Finder -i   # get interactive elements with refs\nagent-desktop click @e3                  # click a button by ref\nagent-desktop type @e5 \"quarterly report\"  # type into a text field\nagent-desktop press cmd+s               # keyboard shortcut\nagent-desktop snapshot -i               # re-observe after UI changes\n```\n\n```\nAgent loop:  snapshot → decide → act → snapshot → decide → act → ...\n```\n\n## Commands\n\n### Observation\n\n```bash\nagent-desktop snapshot --app Safari -i           # accessibility tree with refs\nagent-desktop snapshot --surface menu            # capture open menu\nagent-desktop screenshot --app Finder            # PNG screenshot\nagent-desktop find --role button --app TextEdit  # search by role, name, value, text\nagent-desktop get @e3 value                      # read element property\nagent-desktop is @e7 checked                     # check boolean state\nagent-desktop list-surfaces --app Notes          # list menus, sheets, popovers, alerts\n```\n\n### Interaction\n\n```bash\nagent-desktop click @e3                  # smart AX-first click (15-step chain)\nagent-desktop double-click @e3           # open files, select words\nagent-desktop triple-click @e3           # select lines/paragraphs\nagent-desktop right-click @e3            # context menu (returns menu tree inline)\nagent-desktop type @e5 \"hello world\"     # type text into element\nagent-desktop set-value @e5 \"new value\"  # set value directly via AX\nagent-desktop clear @e5                  # clear element value\nagent-desktop focus @e5                  # set keyboard focus\nagent-desktop select @e9 \"Option B\"      # select option in dropdown/list\nagent-desktop toggle @e12                # flip checkbox or switch\nagent-desktop check @e12                 # idempotent check\nagent-desktop uncheck @e12               # idempotent uncheck\nagent-desktop expand @e15                # expand disclosure/tree item\nagent-desktop collapse @e15              # collapse disclosure/tree item\nagent-desktop scroll @e1 down 3          # scroll (AX-first, 10-step chain)\nagent-desktop scroll-to @e20             # scroll element into view\n```\n\n### Keyboard\n\n```bash\nagent-desktop press cmd+s               # key combo\nagent-desktop press cmd+shift+z          # multi-modifier\nagent-desktop press escape               # single key\nagent-desktop key-down shift             # hold key\nagent-desktop key-up shift               # release key\n```\n\n### Mouse\n\n```bash\nagent-desktop hover @e3                  # move cursor to element\nagent-desktop hover --xy 500,300         # move cursor to coordinates\nagent-desktop drag @e3 --to @e8          # drag between elements\nagent-desktop drag --xy 100,200 --to-xy 400,200  # drag between coordinates\nagent-desktop mouse-click --xy 500,300   # click at coordinates\nagent-desktop mouse-down --xy 500,300    # press at coordinates\nagent-desktop mouse-up --xy 500,300      # release at coordinates\n```\n\n### App & Window Management\n\n```bash\nagent-desktop launch Safari              # launch app by name\nagent-desktop launch com.apple.Safari    # launch by bundle ID\nagent-desktop close-app Safari           # quit app\nagent-desktop close-app Safari --force   # force quit (SIGKILL)\nagent-desktop list-apps                  # list running GUI apps\nagent-desktop list-windows               # list visible windows\nagent-desktop list-windows --app Finder  # windows for specific app\nagent-desktop focus-window w-4521        # bring window to front\nagent-desktop resize-window w-4521 800 600  # resize\nagent-desktop move-window w-4521 100 100    # move\nagent-desktop minimize w-4521            # minimize\nagent-desktop maximize w-4521            # maximize\nagent-desktop restore w-4521             # restore\n```\n\n### Notifications *(macOS only)*\n\n```bash\nagent-desktop list-notifications                       # list all notifications\nagent-desktop list-notifications --app \"Slack\"         # filter by app\nagent-desktop list-notifications --text \"deploy\" --limit 5  # filter by text\nagent-desktop dismiss-notification 1                   # dismiss by index\nagent-desktop dismiss-all-notifications                # dismiss all\nagent-desktop dismiss-all-notifications --app \"Slack\"  # dismiss all from app\nagent-desktop notification-action 1 --action \"Reply\"   # click action button\n```\n\n### Clipboard\n\n```bash\nagent-desktop clipboard-get              # read clipboard text\nagent-desktop clipboard-set \"copied\"     # write to clipboard\nagent-desktop clipboard-clear            # clear clipboard\n```\n\n### Wait\n\n```bash\nagent-desktop wait 500                                       # sleep 500ms\nagent-desktop wait --element @e3 --timeout 5000              # wait for element\nagent-desktop wait --window \"Save\" --timeout 10000           # wait for window\nagent-desktop wait --text \"Loading complete\" --app Safari    # wait for text\nagent-desktop wait --menu --timeout 3000                     # wait for menu\n```\n\n### Batch\n\n```bash\nagent-desktop batch '[\n  {\"command\": \"click\", \"args\": {\"ref_id\": \"@e2\"}},\n  {\"command\": \"type\", \"args\": {\"ref_id\": \"@e5\", \"text\": \"hello\"}},\n  {\"command\": \"press\", \"args\": {\"combo\": \"return\"}}\n]' --stop-on-error\n```\n\n### System\n\n```bash\nagent-desktop status                     # platform, permission state\nagent-desktop permissions                # check accessibility permission\nagent-desktop permissions --request      # trigger system dialog\nagent-desktop version                    # version string\n```\n\n## Snapshot Options\n\n```bash\nagent-desktop snapshot [OPTIONS]\n```\n\n| Flag | Default | Description |\n|------|---------|-------------|\n| `--app <NAME>` | focused app | Filter to a specific application |\n| `--window-id <ID>` | - | Filter to a specific window |\n| `-i` / `--interactive-only` | off | Only include interactive elements |\n| `--compact` | off | Omit empty structural nodes |\n| `--include-bounds` | off | Include pixel bounds (x, y, width, height) |\n| `--max-depth <N>` | 10 | Maximum tree depth |\n| `--skeleton` | off | Shallow 3-level overview; truncated containers show `children_count` and get refs as drill targets |\n| `--root <REF>` | - | Start traversal from this ref; merges into existing refmap with scoped invalidation |\n| `--surface <TYPE>` | window | `window`, `focused`, `menu`, `menubar`, `sheet`, `popover`, `alert` |\n\n## JSON Output\n\nEvery command returns structured JSON:\n\n```json\n{\n  \"version\": \"1.0\",\n  \"ok\": true,\n  \"command\": \"click\",\n  \"data\": { \"action\": \"click\" }\n}\n```\n\nErrors include machine-readable codes and recovery hints:\n\n```json\n{\n  \"version\": \"1.0\",\n  \"ok\": false,\n  \"command\": \"click\",\n  \"error\": {\n    \"code\": \"STALE_REF\",\n    \"message\": \"Element at @e7 no longer matches the last snapshot\",\n    \"suggestion\": \"Run 'snapshot' to refresh refs, then retry\"\n  }\n}\n```\n\n### Error Codes\n\n| Code | Meaning |\n|------|---------|\n| `PERM_DENIED` | Accessibility permission not granted |\n| `ELEMENT_NOT_FOUND` | No element matched the ref or query |\n| `APP_NOT_FOUND` | Application not running or no windows |\n| `STALE_REF` | Ref is from a previous snapshot |\n| `ACTION_FAILED` | The OS rejected the action |\n| `TIMEOUT` | Wait condition expired |\n| `INVALID_ARGS` | Invalid argument values |\n\n### Exit Codes\n\n`0` success, `1` structured error (JSON on stdout), `2` argument parse error.\n\n## Ref System\n\n`snapshot` assigns refs to interactive elements in depth-first order: `@e1`, `@e2`, `@e3`, etc. Refs are valid until the next snapshot replaces them.\n\nInteractive roles that receive refs: `button`, `textfield`, `checkbox`, `link`, `menuitem`, `tab`, `slider`, `combobox`, `treeitem`, `cell`, `radiobutton`, `incrementor`, `menubutton`, `switch`, `colorwell`, `dockitem`.\n\nStatic elements (labels, groups, containers) appear in the tree for context but have no ref.\n\nStale ref recovery:\n\n```\nsnapshot → act → STALE_REF? → snapshot again → retry\n```\n\n## Platform Support\n\n| | macOS | Windows | Linux |\n|---|:---:|:---:|:---:|\n| Accessibility tree | **Yes** | Planned | Planned |\n| Click / type / keyboard | **Yes** | Planned | Planned |\n| Mouse input | **Yes** | Planned | Planned |\n| Screenshot | **Yes** | Planned | Planned |\n| Clipboard | **Yes** | Planned | Planned |\n| App & window management | **Yes** | Planned | Planned |\n| Notifications | **Yes** | Planned | Planned |\n\n## Development\n\n```bash\ncargo build                               # debug build\ncargo build --release                     # optimized (<15MB)\ncargo test --lib --workspace              # run tests\ncargo clippy --all-targets -- -D warnings # lint (must pass with zero warnings)\n```\n\n## License\n\nApache-2.0\n","summary":"**agent-desktop** is a lightweight, native Rust command-line tool that gives AI agents programmatic, accessibility‑tree‑based access to any macOS application—no screenshots or GUI scraping required. It ships as a single fast binary and a C‑ABI library, exposing over 50 commands for observing, interacting, typing, clicking, and managing windows, with structured JSON output and deterministic element references for robust automation. The tool is ideal for developers building autonomous agents, researchers automating desktop workflows, or anyone who needs reliable, language‑agnostic control over legacy or custom macOS apps.","description":"Native desktop automation CLI for AI agents. Control any application through OS accessibility trees with structured JSON output and deterministic element refs.","stars":598,"language":"Rust"},{"owner":"bschoepke","repo":"ableton-live-mcp","url":"https://github.com/bschoepke/ableton-live-mcp","readme":"Ever wanted to control Ableton with just your voice? Me too! I made this MCP server so I could just ask Codex to do anything in Ableton Live for me, while I was nap-trapped by my baby.\n\nUnlike other Ableton MCPs I tried, this one can do pretty much anything that is possible via Ableton's Object model; the agent can just eval arbitrary python that runs inside Ableton. It also has some tools defined for common tasks so those work faster and more reliably. I had Codex CLI optimize this for hours with the new `/goal` command to prioritize low end-to-end latency, high reliability, low token usage, while maintaining full flexibility.\n\nThings you can use it for: create MIDI clips, insert audio files, general Ableton questions (with this, your agent can see your whole live set), add tracks with different devices and effects, analyze harmony, analyze audio signals at any point in the signal chain, generate spectrograms, clip automation, setting up mastering or vocal processing chains, insert MIDI the agent finds from the web... it's very general purpose, I'm not sure what the limits are.\n\n## How to setup\n\nJust tell your AI agent (Codex, Claude Code, Cursor, Copilot, Gemini, etc.) to:\n\n`Set up the https://github.com/bschoepke/ableton-live-mcp MCP server for me`\n\nIt should work on Mac and Windows with recent Ableton versions, but I have only tested it on Ableton Live Suite 12.3.8 on macOS Tahoe.\n\nBack up your Live Set before using this. The MCP can edit your set directly and could corrupt it.\n\n## Demos\nHere are a couple examples of live sets made from scratch with Codex in just a few minutes, along with their prompts. After it makes something, you can ask for follow up changes.\n\n[![Ableton Live MCP demo](https://img.youtube.com/vi/8dRRrIY7NI0/maxresdefault.jpg)](https://youtu.be/8dRRrIY7NI0)\n\nhttps://www.youtube.com/watch?v=8dRRrIY7NI0\n\nThe chat messages I sent to Codex to make this:\n\n_in ableton, make a self reflective song, with audio vocals (via macos say) and chip tunes and 80's drum machines. should be a real edm banger_\n\nFollow up prompts:\n\n_i want midi for everything but vocals please, with ableton devices. not prerendered audio for instruments_\n\n_needs some fills_\n\n_and should hit way harder after \"3-2-1 i become the sound\"_\n\n_the vocals are squished too much (read too quickly), give them a little more length_\n\n_add some dynamics, the song is basically one volume. and some pumping side chain_\n\n_improve dynamics of the clap, seems a bit flat and indistinguished, want it harder after the 3-2-1 drop_\n\n_introduce a new element on a new track after the 3-2-1 drop, that comes in but then recedes before the final exit_\n\n_doesn't seem like the new thing has any notes_\n\n_the element is a bit muddy/indistinct. perhaps it needs simplification and more space, different instrument choice, i dunno_\n\n[![Ableton Live MCP piano demo](https://img.youtube.com/vi/cLCHEV1jWQo/maxresdefault.jpg)](https://youtu.be/cLCHEV1jWQo)\nhttps://youtu.be/cLCHEV1jWQo\n\nPrompt used to make this:\n\n_In Ableton, make a piano duet that tells the story of people debating the positive and negative merits of AI. The composition should be both beautiful and dynamic but surprising and fresh. Use Keyscape devices._\n\n## Built in Agent Audio Tap Max for Live device\nThe MCP includes an \"Agent Audio Tap\" Max for Live device that enables the agent to capture audio signals at any part of the signal processing chain. This gives the agent a full feedback loop for mixing and mastering tasks: it can capture audio signals for further processing with custom python, then tweak your Ableton devices, and then repeat.\n\nExample usage where I asked Codex to generate a spectrogram of two piano tracks I had:\n<img width=\"3768\" height=\"1028\" alt=\"piano_tracks_first10_spectrograms\" src=\"https://github.com/user-attachments/assets/6d2b6d9f-9a2c-4552-aa6c-91153de9df44\" />\n\n## Ideas\n\n- Control your external synthesizers and other hardware with the MCP\n- Ask it questions like \"why does my mix sound muddy?\" or \"how do I sidechain my bass track?\"\n- Ask it to do things like \"add a chord track that fits with my melody\" or \"give me a basic backing track for me to noodle on my guitar with\"\n- You can tell it use third party plugins (VSTs, audio units) like Serum and Keyscape\n- Tell your agent to incorporate your existing vocal samples, including asking it to trim silence and transcribe your audio samples before creatively incorporating them into your live set\n- Ask your agent to set up crazy user controlled DJ effects\n- Experiment with VJ plugins like Videosync to make music videos driven by your live set\n","summary":"Ableton‑Live‑MCP lets you control Ableton Live entirely through natural‑language prompts by speaking to any AI agent such as Codex or Claude. It exposes the full Python‑based object model of Live, allowing arbitrary script execution, automated clip creation, track and device management, and real‑time audio analysis with a built‑in “Agent Audio Tap” Max device. The system is optimized for low latency, high reliability, and minimal token usage, making it useful for music producers, live performers, and developers building intelligent music‑automation tools. Anyone who wants hands‑free, AI‑driven music production will benefit from this versatile MCP server.","description":"General-purpose MCP bridge for Ableton Live","stars":162,"language":"Python"},{"owner":"sslboard","repo":"throwaway","url":"https://github.com/sslboard/throwaway","readme":"# throwaway\n\nA Cloudflare Worker that detects disposable/temporary email domains and invalid TLDs, exposed as a fast JSON API. Ships 72K+ domains in a ~173KB binary bloom filter with one runtime dependency ([tldts](https://github.com/nicolo-ribaudo/tldts)), no external calls, pure edge compute. Includes a clean web UI at `/` for quick checks and `/llms.txt` for AI agent discovery.\n\n**Live deployment:** [throwaway.sslboard.com](https://throwaway.sslboard.com)\n\n[![Deploy to Cloudflare Workers](https://deploy.workers.cloudflare.com/button)](https://deploy.workers.cloudflare.com/?url=https://github.com/sslboard/throwaway)\n\n## Honest context\n\n**This project was written almost entirely by AI.** I needed a disposable-email checker for [SSLBoard](https://sslboard.com) (a free cybersecurity assessment tool) and I used Claude to build it. I'm sharing it as open source because the underlying approach (a binary bloom filter served from a Cloudflare Worker, no external calls) is genuinely useful and I haven't seen it done this way before.\n\nI understand the code, I can maintain it, and I'm happy to be accountable for it. But I'd rather be upfront than have someone dig through the commit history wondering why it looks the way it does.\n\n**Why I needed this:** About 22% of SSLBoard users sign up with a disposable email. That's not people protecting their privacy from a corporation. It's people scanning infrastructure they don't own, anonymously, with no way to follow up or hold anyone accountable. Blocking disposable addresses isn't anti-privacy; it's anti-abuse in a specific context where anonymity enables harm. Your use case may differ, and the tool is neutral: it just reports whether a domain is known-disposable.\n\n**Coverage gaps:** The domain list comes from [disposable/disposable](https://github.com/disposable/disposable), a community-maintained blocklist. It won't catch every disposable provider, especially newer ones. If you find a miss, [open an issue upstream](https://github.com/dispos
