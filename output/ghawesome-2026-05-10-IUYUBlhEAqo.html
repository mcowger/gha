able/disposable/issues) or submit a PR here with a regression test.\n\n## How It Works\n\nAt build time, `npm run build:filter` fetches the [disposable/disposable](https://github.com/disposable/disposable) list (72K+ entries) and compiles it into a **bloom filter** (a space-efficient probabilistic data structure). The filter is stored as a raw `.bin` file and loaded via Cloudflare Workers' [Data rule](https://developers.cloudflare.com/workers/wrangler/configuration/#rules) as an `ArrayBuffer` at module load time. No base64, no encoding overhead, zero decode cost.\n\nAt request time, [tldts](https://github.com/nicolo-ribaudo/tldts) parses the domain to determine whether the TLD is a real, ICANN-recognized public suffix. This catches addresses like `user@fake.notarealtld` that have no chance of receiving mail.\n\n### Bloom Filter Properties\n\n| Property            | Value                                    |\n| ------------------- | ---------------------------------------- |\n| Items               | ~72K domains                             |\n| Filter size         | ~173 KB                                  |\n| False positive rate | ~0.01% (1 in 10,000)                    |\n| False negatives     | **Zero**                                 |\n| Hash functions      | 10 (double-hashing from 2 cyrb53 hashes) |\n\n**On false positives:** At ~0.01%, a false positive means roughly 1 in 10,000 legitimate users gets incorrectly flagged. Bloom filters guarantee **zero false negatives**: a known-disposable domain will never slip through. But the false positive rate is real and depends on filter tuning. Whether that matters depends on your context. In B2C products (forums, messaging apps, consumer signups), anonymity is often a legitimate need, and blocking disposable domains works against your users. Throwaway is designed for B2B scenarios where verified identity is part of the value proposition. In SSLBoard's case, users perform internet-wide security scans that can look like attacks. A real email address creates accountability and gives us a way to follow up. A disposable address lets someone scan infrastructure they don't own with no trace. That's why the tradeoff is acceptable here, but it may not be for you.\n\n## API\n\n### `GET /`\n\nMinimal web UI with a single input field to check emails. Shows three verdicts: **LEGITIMATE**, **DISPOSABLE**, or **INVALID**.\n\n### `GET /check?email=user@domain.com`\n\nCheck a single email address.\n\n```json\n{\n\t\"email\": \"user@mailinator.com\",\n\t\"domain\": \"mailinator.com\",\n\t\"valid_tld\": true,\n\t\"disposable\": true\n}\n```\n\n### `GET /check?domain=mailinator.com`\n\nCheck a single domain.\n\n```json\n{ \"domain\": \"mailinator.com\", \"valid_tld\": true, \"disposable\": true }\n```\n\n### `POST /check`\n\nBatch check emails or domains.\n\n**Emails:**\n\n```json\n{\n\t\"emails\": [\"user@mailinator.com\", \"john@gmail.com\", \"test@fake.notarealtld\"]\n}\n```\n\nResponse:\n\n```json\n{\n\t\"results\": [\n\t\t{\n\t\t\t\"email\": \"user@mailinator.com\",\n\t\t\t\"domain\": \"mailinator.com\",\n\t\t\t\"valid_tld\": true,\n\t\t\t\"disposable\": true\n\t\t},\n\t\t{ \"email\": \"john@gmail.com\", \"domain\": \"gmail.com\", \"valid_tld\": true, \"disposable\": false },\n\t\t{\n\t\t\t\"email\": \"test@fake.notarealtld\",\n\t\t\t\"domain\": \"fake.notarealtld\",\n\t\t\t\"valid_tld\": false,\n\t\t\t\"disposable\": false\n\t\t}\n\t]\n}\n```\n\n**Domains:**\n\n```json\n{\n\t\"domains\": [\"mailinator.com\", \"gmail.com\"]\n}\n```\n\nResponse:\n\n```json\n{\n\t\"results\": [\n\t\t{ \"domain\": \"mailinator.com\", \"valid_tld\": true, \"disposable\": true },\n\t\t{ \"domain\": \"gmail.com\", \"valid_tld\": true, \"disposable\": false }\n\t]\n}\n```\n\n### `GET /stats`\n\nReturns filter metadata.\n\n```json\n{\n\t\"itemCount\": 121570,\n\t\"bitCount\": 2330512,\n\t\"hashCount\": 14,\n\t\"byteSize\": 291314,\n\t\"falsePositiveRate\": 0.0001\n}\n```\n\n### `GET /llms.txt`\n\nMachine-readable API documentation for AI agents. Plain text markdown.\n\n### Response Fields\n\n| Field        | Type    | Meaning                                                                                                 |\n| ------------ | ------- | ------------------------------------------------------------------------------------------------------- |\n| `valid_tld`  | boolean | `true` if the domain ends in a real ICANN-recognized TLD. `false` means the address can't receive mail. |\n| `disposable` | boolean | `true` if the domain is in the disposable-email blocklist. Only meaningful when `valid_tld` is `true`.  |\n\n### Decision Logic\n\n1. `valid_tld: false` → **reject** (domain is not real)\n2. `valid_tld: true` + `disposable: true` → **reject** (known throwaway provider)\n3. `valid_tld: true` + `disposable: false` → **accept** (looks legitimate)\n\n### Error Responses\n\nAll errors return `{\"error\": \"message\"}` with appropriate status codes:\n\n| Status | Meaning                            |\n| ------ | ---------------------------------- |\n| `400`  | Missing/invalid parameters or body |\n| `404`  | Unknown path                       |\n| `405`  | Unsupported HTTP method            |\n\n## Performance\n\n- **Synchronous**: no I/O, no external API calls, no KV lookups\n- **Microsecond responses**: bloom filter lookup is pure arithmetic\n- **Zero cold-start overhead**: filter loaded as a `Uint8Array` at module load time\n- **One runtime dependency**: `tldts` for TLD validation (bundled by Wrangler)\n\n## Deploy Your Own\n\n```bash\ngit clone <this-repo>\ncd throwaway-worker\nnpm install\nnpm run build:filter    # Generate bloom filter from disposable domain list\nnpm run dev             # Local development\nnpm run deploy          # Deploy to Cloudflare\n```\n\n### Requirements\n\n- A [Cloudflare account](https://dash.cloudflare.com/sign-up)\n- [Wrangler CLI](https://developers.cloudflare.com/workers/wrangler/) (installed as a dev dependency)\n\n### Regenerate the Filter\n\nIf you want to update the domain list:\n\n```bash\nnpm run build:filter\n```\n\nThis re-fetches the domain list from [disposable/disposable](https://github.com/disposable/disposable) and writes fresh `src/generated/filter.bin` and `src/generated/filter-meta.ts` files.\n\n## License\n\nMIT, by the people at [SSLBoard.com](https://sslboard.com)\n","summary":"Throwaway is a Cloudflare Worker that delivers an ultra‑fast JSON API for detecting disposable or temporary email domains and invalid TLDs, using a 173‑KB binary Bloom filter that contains over 72,000 known disposable domains and guarantees zero false negatives. It relies on a single dependency, `tldts`, for accurate top‑level‑domain parsing and makes no external calls, making it ideal for edge serve‑side validation. The service also includes a lightweight web UI at `/` for quick manual checks and a `/llms.txt` endpoint for AI‑agent discovery. B2B developers integrating user‑verification or abuse‑prevention into applications—such as security‑scan platforms, form‑based sign‑ups, or any service requiring reliable email validation—can deploy Throwaway with a single button.","description":"An open source Cloudflare Worker app and API to check if email addresses are throwaway/disposable or valid","stars":24,"language":"TypeScript"},{"owner":"FeSens","repo":"auto-arch-tournament","url":"https://github.com/FeSens/auto-arch-tournament","readme":"# auto-arch-tournament\n\nAn autonomous research loop pointed at a SystemVerilog RV32IM CPU. Each round\nthe agent proposes a microarchitectural hypothesis, implements it in an\nisolated git worktree, then runs it through riscv-formal + Verilator cosim +\n3-seed FPGA place-and-route. Only hypotheses that beat the current champion\non CoreMark/MHz get merged.\n\nThe repo is multi-core: every architecture lives under `cores/<name>/` with\nits own RTL, tests, log, and `core.yaml`. `make loop TARGET=<name>` runs the\nloop on one core at a time, on a dedicated `core-<name>` git branch inside\nits own worktree, so two cores can iterate in parallel without stomping each\nother.\n\n## What came out of it\n\n![CoreMark progress: green dots are accepted winners, orange are rejected, blue/purple bands group tournament rounds.](cores/v1/experiments/progress.png)\n\n73 hypotheses, 9h 51m wall-clock, on the run that produced `cores/v1/` from\n`cores/baseline/`. Locked baseline → champion went from\n**301 iter/s (2.23 CoreMark/MHz)** to **577 iter/s (2.91 CoreMark/MHz)** —\n+92% on fitness, +26% over VexRiscv's published 2.30 CoreMark/MHz, with\n40% fewer LUTs.\n\nThe 10 accepted winners, in order of merge:\n\n| Δt   | iter/s | CM/MHz | Fmax    | Hypothesis                                    |\n|------|--------|--------|---------|-----------------------------------------------|\n| 0.0h | 301.04 | 2.226  | 135 MHz | Baseline                                      |\n| 0.4h | 313.10 | 2.320  | 135 MHz | Backward-Branch Taken Predictor               |\n| 0.7h | 324.48 | 2.348  | 138 MHz | IF Direct-Jump Predictor                      |\n| 2.1h | 375.43 | 2.348  | 160 MHz | Cold Multi-Cycle DIV/REM Unit                 |\n| 2.7h | 397.55 | 2.366  | 168 MHz | One-Deep Store Retirement Slot                |\n| 3.5h | 422.77 | 2.366  | 179 MHz | Segmented RVFI Order Counter                  |\n| 3.8h | 472.96 | 2.891  | 164 MHz | Registered Lookahead I-Fetch Replay Predictor |\n| 4.0h | 505.65 | 2.891  | 175 MHz | Compressed Resetless I-Fetch Replay Tags      |\n| 5.3h | 529.35 | 2.891  | 183 MHz | RTL-Only Hot/Cold ALU Opcode Split            |\n| 6.1h | 577.76 | 2.908  | 199 MHz | Banked Registered I-Fetch Replay Predictor    |\n\nFull writeup: [docs/auto-arch-tournament-blog-post.md](docs/auto-arch-tournament-blog-post.md).\n\n## Setup\n\nmacOS only for now. One-time toolchain install:\n\n```\nbash setup.sh\n```\n\nFetches Verilator, OSS CAD Suite (yosys, nextpnr-himbaechel, sby, bitwuzla),\nthe riscv-none-elf cross compiler, and a few Python deps into `.toolchain/`.\nTools already on `$PATH` are detected and reused.\n\nYou'll also need a coding-agent CLI. Codex is the default; Claude Code works\ntoo — pass `AGENT=claude` to any orchestrator target.\n\n## Run the loop\n\nEvery core-touching command takes `TARGET=<name>`. The Makefile errors out\notherwise and lists the cores it found.\n\n```\nmake next TARGET=v1                        # one round, one slot — smoke test\nmake loop TARGET=v1 N=10                   # 10 rounds, sequential\nmake loop TARGET=v1 N=10 K=3               # 10 rounds, 3 parallel slots/round\nmake loop TARGET=v1 N=10 LUT=3000 COREMARK=400   # set per-target fitness goals\nmake loop TARGET=v1 N=10 AGENT=claude      # use Claude Code instead of Codex\nmake loop TARGET=mycore BASE=baseline N=10 # fork a new core from cores/baseline/\n\nmake report TARGET=v1                      # summary of cores/v1/experiments/log.jsonl\n```\n\nWhat `make loop TARGET=<name>` does:\n\n1. Creates `.worktrees/<name>/` on branch `core-<name>` if it doesn't exist\n   (subsequent runs reuse it). Re-execs make inside the worktree so two\n   parallel `make loop`s on different TARGETs don't collide on the git index.\n2. For each round:\n   - **Hypothesis agent** writes `cores/<name>/experiments/hypotheses/<id>.yaml`\n     against the JSON schema. The prompt sees: source RTL, recent log entries,\n     `LESSONS.md`, `CORE_PHILOSOPHY.md`, `core.yaml`.\n   - **Implementation agent** edits `cores/<name>/rtl/` (and optionally\n     `cores/<name>/test/test_*.py`) in a per-slot worktree.\n   - **Eval pipeline**: verilator lint → yosys synth → bench `make` → cosim\n     build → riscv-formal → Verilator cosim vs. Python ISS → 3-seed FPGA\n     P&R + CoreMark. Each step is gated; first failure short-circuits with\n     a `broken: <step>: <stderr tail>` outcome.\n   - **Scribe** distills one bullet into `cores/<name>/LESSONS.md` so the\n     next round's hypothesis agent reads what failed and why.\n3. The highest-fitness slot above the current champion merges into\n   `core-<name>`. Regressions / broken / placement-failed → worktree\n   destroyed, log entry written, next round.\n\nThe orchestrator never merges to `main`. Each core's evolution is one PR\ndiff: `git push -u origin core-<name> && gh pr create --base main`.\n\nTo opt out of the worktree wrap (run directly on the current branch):\n`make loop TARGET=v1 WORKTREE=`.\n\nOther useful targets — all accept `TARGET=`:\n\n```\nmake lint TARGET=v1          # verilator lint over cores/v1/rtl/\nmake test TARGET=v1          # cocotb unit tests under cores/v1/test/\nmake cosim TARGET=v1         # cosim alone (no orchestrator)\nmake formal TARGET=v1        # riscv-formal fast suite (ALTOPS — see CLAUDE.md)\nmake formal-deep TARGET=v1   # full formal suite WITHOUT ALTOPS — slow, real bitvector arithmetic\nmake fpga TARGET=v1          # FPGA eval alone (3-seed P&R + CoreMark)\nmake bench                   # build selftest.elf / coremark.elf (shared across cores)\nmake clean TARGET=v1         # nuke per-core build artifacts\nmake test-infra              # pytest under tools/ (no TARGET needed)\n```\n\nIf you SSH-sign your commits and run unattended, `tools/orchestrator.py`\nsets `commit.gpgsign=false` for its own subprocess tree so the loop\ndoesn't hang on a 1Password biometric prompt. Manual commits from your\nshell are unaffected.\n\n## Working with multiple cores\n\nThe repo holds multiple cores under `cores/<name>/`. Each has its own RTL,\ntests, experiment log, `core.yaml`, and `LESSONS.md`. The orchestrator runs\nagainst one core at a time.\n\n**Available cores on `main`:**\n- `cores/baseline/` — the original simple RV32IM 5-stage in-order core.\n  Universal seed for new cores.\n- `cores/v1/` — the evolved core from the historical run shown above\n  (branch prediction, banked I-fetch replay, hot/cold ALU split).\n\nOther cores live on their own `core-<name>` branches, not yet merged to\n`main` — that's the normal state for a core mid-evolution.\n\n**Forking a new core:**\n\n```\nmake loop TARGET=mycore BASE=baseline N=20 LUT=3000 COREMARK=400\n```\n\nThe orchestrator:\n1. Copies `cores/baseline/` → `cores/mycore/`.\n2. Re-runs the eval gates against the freshly-copied RTL to get a measured\n   `current:` block in `cores/mycore/core.yaml` — the first log entry.\n3. Iterates `N` rounds, with the LUT/CoreMark targets as Pareto goals.\n\nThe work lands on branch `core-mycore` in `.worktrees/mycore/`. To review\nor ship:\n\n```\ngit push -u origin core-mycore\ngh pr create --base main\n```\n\nThis is intentional: each core's evolution is one reviewable diff, and\nmultiple cores can iterate concurrently — `make loop TARGET=mini` and\n`make loop TARGET=maxperf` run side-by-side without colliding because each\nruns in its own worktree on its own branch.\n\n**Per-core artifacts** (under `cores/<name>/`):\n\n| File / dir              | Purpose                                                                     |\n|-------------------------|-----------------------------------------------------------------------------|\n| `rtl/*.sv`              | The design. The agent's playground.                                         |\n| `test/test_*.py`        | cocotb tests. The agent may add tests for new modules.                      |\n| `core.yaml`             | Declared targets + auto-updated `current:` (running champion's measured numbers). |\n| `CORE_PHILOSOPHY.md`    | Optional architect intent — injected verbatim into hypothesis prompts.      |\n| `LESSONS.md`            | Append-only one-line lessons from prior iterations (the scribe agent).      |\n| `experiments/log.jsonl` | Per-iteration outcomes: proposal + fitness numbers + verdict + lesson.      |\n| `experiments/progress.png` | Fitness chart over time.                                                 |\n\n## Philosophy\n\nThe orchestrator is hardcoded. The model never edits it. What the model\ncan touch is small and explicit:\n\n- `cores/<TARGET>/rtl/**` — any SystemVerilog file. Add modules, delete\n  modules, rename, restructure, rewrite from scratch. The only top-level\n  invariant is the I/O contract on `core.sv` (clock/reset, imem/dmem,\n  NRET=2 RVFI).\n- `cores/<TARGET>/test/test_*.py` — cocotb suites. Add tests for new modules.\n\nEverything else is off-limits. The path sandbox in `tools/orchestrator.py`\nrejects the round *before* any eval runs if the agent touched `formal/`,\n`tools/`, `fpga/`, `test/cosim/main.cpp`, the CRC table, or any sibling\ncore's directory. The agent doesn't get to soften its own grader.\n\nThe verifier does the heavy lifting:\n\n- **riscv-formal** — symbolic BMC against RV32IM: decode, traps, ordering,\n  liveness, M-ext discipline. ~105 checks at NRET=2.\n- **Verilator cosim** — random ~22% bus stalls, RVFI byte-identical against\n  a Python ISS on `selftest.elf` and `coremark.elf`.\n- **3-seed P&R** — yosys + nextpnr on a Gowin GW2A-LV18 (Tang Nano 20K).\n  Median Fmax × CoreMark iter/cycle = fitness. One seed is a coin flip;\n  three is comparable across rounds.\n- **CoreMark CRC validation** — the four canonical 2K-config CRCs.\n  CoreMark prints \"Correct operation validated.\" even when it isn't, so\n  the bench re-checks them itself.\n- **Path sandbox** — the agent cannot edit anything outside its target\n  core's `rtl/` and `test/test_*.py`.\n\nOf 73 hypotheses in the run shown above, 63 were rejected by the verifier.\nThat's the point.\n\nThe full contract — invariants, don't-touch list, what may change — is in\n[`CLAUDE.md`](CLAUDE.md). The I/O contract is in [`ARCHITECTURE.md`](ARCHITECTURE.md).\n\n## Why this exists\n\nKarpathy's [autoresearch](https://github.com/karpathy/autoresearch) showed\nan agent loop finding 20 training-time wins on a nanochat in two days. That\nworked because Python and gradient descent are the agent's home turf. This\nrepo asks whether the recipe generalizes when you point it somewhere it has\nno business being good at — SystemVerilog, formal verification, FPGA timing.\n\nIt does. But the loop isn't the moat — the loop is commodity. The artifact\nthat survived 10 wins past 63 rejections wasn't the agent; it was the\nverifier. That's the part that encodes what *correct* means in this domain.\nThe full argument is in the [blog post](docs/auto-arch-tournament-blog-post.md).\n\n## Layout\n\n```\ncores/                  # per-target architectures\n  <name>/\n    rtl/                # SystemVerilog sources (the design — agent-editable)\n    test/               # cocotb unit tests (agent-editable)\n    experiments/        # log.jsonl + progress.png + transient hypotheses/<id>.yaml\n    core.yaml           # declared targets + auto-updated current:\n    CORE_PHILOSOPHY.md  # optional architect intent (injected into prompts)\n    LESSONS.md          # append-only scribe output\n\nbench/programs/         # selftest.S, crt0.S, link.ld, EEMBC CoreMark — shared, off-limits\nformal/                 # riscv-formal wrapper, checks.cfg, run_all.sh — correctness contract\nfpga/                   # core_bench.sv, synth.tcl, nextpnr scripts, constraints — fitness contract\ntest/cosim/             # Verilator cosim harness (main.cpp + reference Python ISS)\ntools/                  # orchestrator, worktree manager, eval gates, scribe, plotting\nschemas/                # hypothesis + eval-result JSON schemas\ndocs/                   # design notes, blog post\n.worktrees/             # auto-created by `make loop`, one git worktree per TARGET\n```\n\n## Tech stack\n\n| Concern        | Tool                                                            |\n|----------------|-----------------------------------------------------------------|\n| RTL            | SystemVerilog (IEEE 1800-2017 synthesizable subset)             |\n| Sim            | Verilator ≥ 5.0                                                 |\n| Unit tests     | cocotb ≥ 1.8 (Python harness over Verilator)                    |\n| Formal         | YosysHQ riscv-formal (vendored submodule); sby + bitwuzla       |\n| Synth          | Yosys + `synth_gowin`                                           |\n| Place & route  | nextpnr-himbaechel (Gowin GW2A-LV18QN88C8/I7 = Tang Nano 20K)   |\n| Cross-compiler | xPack riscv-none-elf-gcc 15.x (symlinked to riscv32-unknown-elf)|\n| Orchestrator   | Python 3.11+, jsonschema, pyyaml, matplotlib                    |\n| Coding agent   | Codex CLI (default) or Claude Code (`AGENT=claude`)             |\n","summary":"auto‑arch‑tournament is an autonomous research loop that automatically improves a SystemVerilog‑based RV32IM CPU.  In each cycle a coding‑agent proposes a microarchitectural hypothesis, the implementation‑agent implements it in an isolated git worktree, and the updated design is verified with riscv‑formal, Verilator cosimulation, and FPGA place‑and‑route; only hypotheses that beat the current champion on CoreMark/MHz are merged.  The framework supports multiple independent cores under `cores/<name>/`, allows parallel loops on separate git branches, and tracks progress via structured logs and reports.  It is ideal for hardware designers, researchers, and hobbyists who want to experiment with automated architecture optimization and formal validation without manual engineering overhead.","description":null,"stars":113,"language":"VHDL"},{"owner":"kontext-dev","repo":"kontext-cli","url":"https://github.com/kontext-dev/kontext-cli","readme":"<div align=\"center\">\n\n<img src=\"assets/banner-cli.svg\" alt=\"Kontext CLI banner\" width=\"100%\" />\n\n<p><strong>Local guardrails and scoped credentials for AI coding agents.</strong></p>\n\n<p>\n  <a href=\"https://kontext.security\">Website</a>\n  ·\n  <a href=\"https://docs.kontext.security/getting-started/welcome\">Documentation</a>\n  ·\n  <a href=\"https://app.kontext.security\">Dashboard</a>\n  ·\n  <a href=\"https://discord.gg/gw9UpFUhyY\">Discord</a>\n</p>\n\n<p>\n  <a href=\"LICENSE\"><img alt=\"License: MIT\" src=\"https://img.shields.io/badge/license-MIT-152822?labelColor=0d1714\"></a>\n  <a href=\"https://github.com/kontext-security/kontext-cli/releases\"><img alt=\"Latest release\" src=\"https://img.shields.io/github/v/release/kontext-security/kontext-cli?color=152822&labelColor=0d1714\"></a>\n  <img alt=\"Built with Go\" src=\"https://img.shields.io/badge/Go-1.25-152822?labelColor=0d1714\">\n</p>\n\n</div>\n\n## What is Kontext CLI?\n\nKontext CLI is an open-source command-line tool that gives AI coding agents local guardrails, scoped credentials, and readable tool-call traces — without changing how developers work.\n\n**Why we built it:** Agents like Claude Code now run shell commands, edit code, open pull requests, and call provider APIs from your machine. Most of the time that is exactly what you want. Sometimes it is `rm -rf`, `gcloud sql databases delete prod`, `git push --force main`, or a command that leaks a secret before you notice, [like it happened here](https://x.com/lifeof_jer/status/2048103471019434248). The same agents also need credentials, and long-lived keys in `.env` files are the wrong primitive for autonomous tools.\n\n**How it works:** `kontext guard start` runs locally: it captures Claude Code tool calls, redacts them, scores risk, and shows risky actions in a local dashboard. `kontext start --agent claude` adds the hosted layer: provider connection, short-lived scoped credentials, and team-visible traces. Use Guard when you want local visibility first; use hosted mode when credentials and team governance matter too.\n\n## Quick Start\n\n```bash\nbrew install kontext-security/tap/kontext\nkontext guard start\nclaude\n```\n\nThat is it: local-only, no login, observe mode. The dashboard opens at `http://127.0.0.1:4765`.\n\nTo add short-lived credentials and team-visible traces, run `kontext start --agent claude` from a project with Claude Code installed.\n\n## Operating Modes\n\n| Mode | Command | Best for | Login required |\n| --- | --- | --- | --- |\n| Guard | `kontext guard start` | Local risk visibility, notifications, redacted local traces | No |\n| Hosted | `kontext start --agent claude` | Scoped credentials, shared traces, team governance | Yes |\n\n## What You Get\n\n| Capability | What it means |\n| --- | --- |\n| Local Guard mode | Watch Claude Code tool calls locally, score risk, and store redacted traces in SQLite. |\n| Observe-mode notifications | Surface `would ask` and `would deny` actions without blocking Claude Code. |\n| Local dashboard | Review sessions, commands, reasons, risk scores, and signals at `127.0.0.1:4765`. |\n| Scoped credentials | Replace hardcoded provider keys with short-lived tokens injected only for the active agent session. |\n| Managed env file | Keep provider placeholders in `.env.kontext` instead of raw secrets. |\n| Hosted connect | Connect missing user providers through a browser flow instead of leaking keys locally. |\n| Governed sessions | Stream PreToolUse, PostToolUse, and UserPromptSubmit events to Kontext in hosted mode. |\n| Native runtime | One small Go binary. Guard mode has an embedded dashboard; installed users do not need Node or Docker. |\n\n## Managed Credentials\n\nFor hosted sessions, the CLI creates `.env.kontext` locally:\n\n```dotenv\nGITHUB_TOKEN={{kontext:github}}\nLINEAR_API_KEY={{kontext:linear}}\n```\n\n`.env.kontext` stores provider placeholders, not long-lived provider keys. At runtime, hosted mode exchanges placeholders such as `{{kontext:github}}` for short-lived scoped credentials. Keep `.env.kontext` out of source control in repos that do not already ignore it. Literal values you add stay untouched.\n\n## Providers and Traces\n\nProvider setup and trace review live in the hosted dashboard at [app.kontext.security](https://app.kontext.security). Use the same account you used for `kontext login`.\n\n**Add providers**\n\n1. Open **Providers** in the dashboard.\n2. Add a built-in provider, such as GitHub or Linear, or create a custom provider.\n3. For built-in providers, configure allowed scopes and any provider-specific OAuth settings shown in the dashboard. For custom providers, choose end-user OAuth, end-user key, or organization key.\n4. Open **Applications** → **kontext-cli** → **Providers** and attach the providers the CLI application can use.\n5. Reference the provider handles in `.env.kontext`.\n\n**Check traces**\n\n1. Run `kontext start --agent claude`.\n2. Ask Claude Code to perform a tool-using task.\n3. Open **Traces** in the dashboard to inspect live hook events, tool calls, outcomes, user attribution, and session context.\n\n## Security\n\n- Guard mode is local-only by default: no login, no hosted API, no trace upload.\n- Guard mode stores redacted events in local SQLite and scores risk with local rules plus a local JSON Markov-chain model.\n- Hosted mode uses OIDC browser login with refresh tokens stored in the system keyring.\n- Hosted mode uses RFC 8693 token exchange for short-lived, provider-scoped runtime credentials.\n- Provider credentials stored in Kontext are encrypted at rest with AES-256-GCM.\n- Long-lived provider keys are not written to the project or agent config by Kontext.\n- Kontext captures tool events and outcomes. It does not capture LLM reasoning, token usage, or full conversation history.\n\n## Supported Agents\n\n| Agent | Guard mode | Hosted mode | Status |\n| --- | --- | --- | --- |\n| Claude Code | `kontext guard start` | `kontext start --agent claude` | Active |\n\nCursor, Copilot, and Codex support are planned, but they are not shipped in this repo yet.\n\n## Architecture\n\nGuard mode:\n\n```text\nkontext guard start\n  │\n  ├─ Hooks: generated Claude Code settings.json\n  │    │\n  │    ├─ PreToolUse        → kontext guard hook claude-code\n  │    ├─ PostToolUse       → kontext guard hook claude-code\n  │    └─ UserPromptSubmit  → kontext guard hook claude-code\n  │\n  ├─ Local daemon: 127.0.0.1:4765\n  ├─ Risk engine: deterministic rules + Markov-chain score\n  ├─ Store: local SQLite with redacted events\n  └─ Dashboard: embedded local web UI + notifications\n```\n\nHosted mode:\n\n```text\nkontext start --agent claude\n  │\n  ├─ Auth: OIDC refresh token from system keyring\n  ├─ ConnectRPC: CreateSession → governed session in dashboard\n  ├─ BootstrapCli: sync managed provider entries into .env.kontext\n  ├─ Token exchange: {{kontext:provider}} → short-lived credential\n  ├─ Sidecar: Unix socket server + heartbeat loop\n  ├─ Hooks: generated Claude Code settings.json\n  │    │\n  │    ├─ PreToolUse        → kontext hook → sidecar → ProcessHookEvent\n  │    ├─ PostToolUse       → kontext hook → sidecar → ProcessHookEvent\n  │    └─ UserPromptSubmit  → kontext hook → sidecar → ProcessHookEvent\n  │\n  └─ Exit: EndSession → credential expiry + temp file cleanup\n```\n\n## Useful Commands\n\n```bash\nkontext guard status      # show local Guard counters\nkontext guard dashboard   # open or print the local dashboard URL\nkontext guard doctor      # check daemon and Claude Code hook state\nkontext doctor            # inspect global Kontext CLI setup\nkontext start --verbose   # print redacted hosted-mode diagnostics\n```\n\n## Development\n\n```bash\ngo build -o bin/kontext ./cmd/kontext\ngo test ./...\ngo test -race ./...\ngo vet ./...\npnpm install --frozen-lockfile\npnpm build\nmake guard-e2e\n```\n\nGenerate protobuf code with:\n\n```bash\nbuf generate\n```\n\nService definitions live in [kontext-security/proto `agent.proto`](https://github.com/kontext-security/proto/blob/main/proto/kontext/agent/v1/agent.proto).\n\n## Community\n\n- Read [SUPPORT.md](SUPPORT.md) for support channels.\n- Read [CONTRIBUTING.md](CONTRIBUTING.md) before opening a contribution.\n- Kontext CLI is released under the [MIT License](LICENSE).\n","summary":"Kontext CLI is a command‑line utility that adds local guardrails and scoped credentials for AI coding agents such as Claude Code, allowing developers to monitor, score, and redact tool calls without altering their workflow. It offers a local “guard” mode that exposes tool‑call traces, risk scores, and a lightweight dashboard, as well as a hosted mode that supplies short‑lived credentials, shared traces, and team governance through a browser‑based provider connection. Teams and individual developers who rely on autonomous code‑generation tools can use Kontekst CLI to keep secrets out of code, observe potentially dangerous actions, and maintain auditability across projects.","description":"Open-source CLI for AI coding agents. Give your coding agents access to services without exposing keys.","stars":185,"language":"Go"},{"owner":"rocky-data","repo":"rocky","url":"https://github.com/rocky-data/rocky","readme":"<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/rocky-readme-dark.svg\" />\n    <img src=\"docs/rocky-readme-light.svg\" alt=\"Rocky\" />\n  </picture>\n</p>\n\n[![Engine CI](https://github.com/rocky-data/rocky/actions/workflows/engine-ci.yml/badge.svg)](https://github.com/rocky-data/rocky/actions/workflows/engine-ci.yml)\n[![Dagster CI](https://github.com/rocky-data/rocky/actions/workflows/dagster-ci.yml/badge.svg)](https://github.com/rocky-data/rocky/actions/workflows/dagster-ci.yml)\n[![VS Code CI](https://github.com/rocky-data/rocky/actions/workflows/vscode-ci.yml/badge.svg)](https://github.com/rocky-data/rocky/actions/workflows/vscode-ci.yml)\n[![License: Apache 2.0](https://img.shields.io/badge/License-Apache_2.0-blue.svg)](LICENSE)\n\n**Rocky** is a Rust-based control plane for warehouse SQL pipelines: branches, replay, column-level lineage, compile-time type safety, per-model cost attribution. Storage and compute stay with your warehouse — Databricks, Snowflake, BigQuery, or DuckDB. Apache 2.0.\n\n<p align=\"center\">\n  <img src=\"docs/public/demo-quickstart.gif\" alt=\"Rocky quickstart — create a project, compile, and run 3 models in under 15s\" width=\"900\" />\n</p>\n\n## Try it in 60 seconds\n\n```bash\n# macOS / Linux\ncurl -fsSL https://raw.githubusercontent.com/rocky-data/rocky/main/engine/install.sh | bash\n\n# Windows (PowerShell)\nirm https://raw.githubusercontent.com/rocky-data/rocky/main/engine/install.ps1 | iex\n```\n\n```bash\nrocky playground my-first-project\ncd my-first-project\nrocky compile && rocky test && rocky run\n```\n\nNo credentials needed — the playground runs end-to-end on local DuckDB.\n\n## See it in action\n\nEach demo below is a self-contained POC in [`examples/playground/pocs/`](examples/playground/) — `cd` in, run `./run.sh`, reproduce locally.\n\n### Detects schema drift the moment it happens\n\nA source column type changes upstream. On the next run, Rocky diffs source vs. target, drops the target, and recreates it. No silent data corruption, no dbt-style quiet divergence.\n\n<p align=\"center\">\n  <img src=\"docs/public/demo-drift-recover.gif\" alt=\"rocky run detects source type change and recreates the target\" width=\"900\" />\n</p>\n\n[POC — `02-performance/06-schema-drift-recover`](examples/playground/pocs/02-performance/06-schema-drift-recover/)\n\n### Enforces data contracts at compile time\n\nMissing required columns, protected columns being removed, or unsafe type changes surface as diagnostic codes (`E010`, `E013`) before a single row is written.\n\n<p align=\"center\">\n  <img src=\"docs/public/demo-data-contracts.gif\" alt=\"rocky compile flags E010 and E013 contract violations on broken_metrics\" width=\"900\" />\n</p>\n\n[POC — `01-quality/01-data-contracts-strict`](examples/playground/pocs/01-quality/01-data-contracts-strict/)\n\n### Named branches for risk-free experiments\n\nCreate a branch, run against it in an isolated schema, inspect, then drop or promote. Column-level lineage shows the downstream blast radius before you ship.\n\n<p align=\"center\">\n  <img src=\"docs/public/demo-branches-replay.gif\" alt=\"rocky branch create, run on branch, and trace column lineage downstream\" width=\"900\" />\n</p>\n\n[POC — `00-foundations/06-branches-replay-lineage`](examples/playground/pocs/00-foundations/06-branches-replay-lineage/)\n\n### Column-level lineage, not table-level\n\nTrace a single column from a downstream fact back through its aggregations, all the way to the seed. Blast-radius analysis without reading every model.\n\n<p align=\"center\">\n  <img src=\"docs/public/demo-column-lineage.gif\" alt=\"rocky lineage --column traces fct_revenue.total back to seeds.orders.amount\" width=\"900\" />\n</p>\n\n[POC — `06-developer-experience/01-lineage-column-level`](examples/playground/pocs/06-developer-experience/01-lineage-column-level/)\n\n### AI model generation with a compile-validate loop\n\nDescribe what you want in plain English. Rocky generates a Rocky DSL model, compiles it, and retries on parse failure — the `Attempts: 2` line shows the loop catching a first-pass error invisibly.\n\n<p align=\"center\">\n  <img src=\"docs/public/demo-ai-model-generation.gif\" alt=\"rocky ai generates a .rocky model from natural language intent, Attempts: 2\" width=\"900\" />\n</p>\n\n[POC — `03-ai/01-model-generation`](examples/playground/pocs/03-ai/01-model-generation/)\n\n### PR-time blast-radius with `rocky lineage-diff`\n\nCompare two git refs and get a per-changed-column readout of downstream consumers — pre-rendered Markdown drops straight into a GitHub PR comment. CODEOWNERS-style review tooling can't reach this granularity without a compiled engine.\n\n<p align=\"center\">\n  <img src=\"docs/public/demo-lineage-diff.gif\" alt=\"rocky lineage-diff main lists added and removed columns across two models with downstream consumers per change\" width=\"900\" />\n</p>\n\n[POC — `06-developer-experience/11-lineage-diff`](examples/playground/pocs/06-developer-experience/11-lineage-diff/)\n\n### Classify columns, mask by environment, gate CI\n\nTag PII columns in the model sidecar; bind tags to mask strategies in `[mask]` / `[mask.<env>]`. `rocky compliance --env prod --fail-on exception` exits 1 the moment a classified column has no resolved strategy — a one-line CI gate against accidentally-unmasked data.\n\n<p align=\"center\">\n  <img src=\"docs/public/demo-classification-masking.gif\" alt=\"rocky compliance rolls up classification tags to mask strategies; --fail-on exception exits 1, gating CI on unmasked PII\" width=\"900\" />\n</p>\n\n[POC — `04-governance/05-classification-masking-compliance`](examples/playground/pocs/04-governance/05-classification-masking-compliance/)\n\n### Incremental loads with persistent watermark state\n\n`strategy = \"incremental\"` plus a `timestamp_column` is all it takes. Rocky writes the high-water mark to the embedded state store; subsequent runs only `INSERT … WHERE timestamp > watermark`. Append 25 rows after a 500-row load — run 2 still finishes in 0.2s.\n\n<p align=\"center\">\n  <img src=\"docs/public/demo-incremental-watermark.gif\" alt=\"rocky run with incremental strategy: run 1 copies 500 rows; appended 25 rows; run 2 only copies the delta in 0.2s\" width=\"900\" />\n</p>\n\n[POC — `02-performance/01-incremental-watermark`](examples/playground/pocs/02-performance/01-incremental-watermark/)\n\n## Subprojects\n\n| Path | Artifact | Language | Description |\n|---|---|---|---|\n| [`engine/`](engine/) | `rocky` CLI binary | Rust | Core SQL transformation engine — 20-crate Cargo workspace |\n| [`integrations/dagster/`](integrations/dagster/) | `dagster-rocky` PyPI wheel | Python | Dagster resource and component wrapping the Rocky CLI |\n| [`editors/vscode/`](editors/vscode/) | Rocky VSIX | TypeScript | VS Code extension — LSP client + commands for AI features |\n| [`examples/playground/`](examples/playground/) | (config only) | TOML / SQL | Self-contained DuckDB sample pipeline used for smoke tests and benchmarks |\n\nEach subproject has its own README with detailed usage. The [`engine/README.md`](engine/README.md) is the canonical product reference for the Rocky CLI.\n\n## Adapters\n\n| Role | Adapter | Status | Notes |\n|------|---------|--------|-------|\n| Warehouse | Databricks | Production | SQL Statement API · Unity Catalog · `SHALLOW CLONE` for branches |\n| Warehouse | Snowflake | Beta | REST connector · zero-copy `CLONE` for branches · masking policies |\n| Warehouse | BigQuery | Beta | REST connector · `CREATE TABLE … COPY` for branches |\n| Warehouse | DuckDB | Local / Testing | Embedded · powers `rocky playground` (no credentials needed) |\n| Warehouse | Trino | Beta | REST `/v1/statement` polling client · Basic + JWT auth · Docker conformance harness behind `trino-conformance` feature |\n| Source | Fivetran | Production | REST connector + table discovery |\n| Source | Airbyte | Beta | Catalog discovery |\n| Source | Iceberg | Beta | REST catalog discovery of namespaces and tables |\n| Source | Manual | Production | Schema/table lists inline in `rocky.toml` |\n\nBuilding a warehouse Rocky doesn't ship in-tree (ClickHouse, Redshift, …)? See the [Adapter SDK guide](https://rocky-data.dev/guides/adapter-sdk/) and the [Rust-native skeleton POC](examples/playground/pocs/07-adapters/06-rust-native-adapter-skeleton/).\n\n## Building from source\n\n```bash\ngit clone https://github.com/rocky-data/rocky.git\ncd rocky\njust build       # builds engine + dagster wheel + vscode extension\njust test        # runs all test suites\njust lint        # cargo clippy/fmt + ruff + eslint\n```\n\n`just` is optional — you can also build each subproject directly. See [`CONTRIBUTING.md`](CONTRIBUTING.md) for per-subproject build commands.\n\n## Releases\n\nEach artifact is released independently using a tag-namespaced scheme:\n\n- `engine-v*` → Rocky CLI binary (cross-compiled, on GitHub Releases)\n- `dagster-v*` → `dagster-rocky` wheel\n- `vscode-v*` → Rocky VSIX\n\nSee [`CONTRIBUTING.md`](CONTRIBUTING.md#releases) for the full release flow.\n\n## Documentation\n\nFull documentation: **[rocky-data.dev](https://rocky-data.dev)** — concepts, guides, CLI reference, Dagster integration, adapter SDK.\n\n## Contributing\n\nSee [`CONTRIBUTING.md`](CONTRIBUTING.md). Before opening a PR, please read the cross-project change guidance — schema and DSL changes must update consumers atomically.\n\n## Sponsoring\n\nRocky is free and open source. If it saves your team time, consider [sponsoring the project](https://github.com/sponsors/hugocorreia90) so development can continue.\n\n## License\n\n[Apache 2.0](LICENSE)\n","summary":"Rocky is a Rust‑based control plane that orchestrates and verifies warehouse SQL pipelines, allowing you to define models, compile them, run them, and track lineage across your chosen warehouse (Databricks, Snowflake, BigQuery, or DuckDB). It offers features such as named branches and replay for safe experimentation, compile‑time data contract enforcement, automatic schema‑drift detection, column‑level lineage, and per‑model cost attribution. By providing a type‑safe DSL, plug‑in CI workflows, and a local “playground” that requires no credentials, Rocky caters to data engineers and analytics teams that need reliable, auditable, and cost‑aware data pipelines without leaving their warehouse.","description":"Rust SQL transformation engine with branches, replay, column-level lineage, compile-time type safety, and per-model cost attribution. Single static binary; adapters for Databricks, Snowflake, BigQuery, DuckDB. Apache 2.0.","stars":234,"language":"Rust"},{"owner":"49Agents","repo":"49Agents","url":"https://github.com/49Agents/49Agents","readme":"<p align=\"center\">\n  <img alt=\"49Agents\" src=\"https://github.com/user-attachments/assets/93d237b6-e1ec-40ea-aa30-6feb72ca6599\" height=\"120\" />\n</p>\n\n<h1 align=\"center\">49 Agents IDE</h1>\n\n<p align=\"center\">The first 2D agentic IDE. Open source.</p>\n\n<p align=\"center\"><strong>All agents. All terminals. All projects. All machines. One unified space.</strong></p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/49Agents/49Agents/stargazers\"><img src=\"https://img.shields.io/github/stars/49Agents/49Agents?style=flat\" alt=\"GitHub Stars\" /></a>\n  <a href=\"https://discord.gg/rkUbxYvGj\"><img src=\"https://img.shields.io/badge/Discord-Join-5865F2?logo=discord&logoColor=white\" alt=\"Discord\" /></a>\n  <a href=\"https://twitter.com/49agents\"><img src=\"https://img.shields.io/twitter/follow/49agents\" alt=\"Twitter Follow\" /></a>\n</p>\n\n<h1 align=\"center\">\n  Before\n</h1>\n\n<img width=\"100%\" alt=\"After — 49Agents\" src=\"https://github.com/user-attachments/assets/878b3926-e017-4ccc-9c54-315b647fd417\" />\n<h1 align=\"center\">\n  49\n</h1>\n<img width=\"100%\" alt=\"Before — terminal clutter\" src=\"https://github.com/user-attachments/assets/b06c8fe8-d1bf-432a-b935-bbf8376bd7ff\" />\n<h1 align=\"center\">\n</h1>\n<img width=\"1544\" height=\"832\" alt=\"diagram_with_pane_titles\" src=\"https://github.com/user-attachments/assets/52a68a3a-8d77-4612-bbb0-dbc43ca990dd\" />\n\n\n---\n\n| Before | 49 |\n|--------|--------------|\n| 14 terminal tabs | One zoomable canvas |\n| SSH into each machine | All machines, zero SSH |\n| Alt-tab to check Claude | Claude status on every pane |\n| Can't work from phone | Any device, anywhere |\n| Terminal-only, no files | Monaco editor on the canvas |\n| 🤷 | Git graph |\n| 🤷 | Interactive issue tables ([Beads](https://github.com/steveyegge/beads)) |\n| 🤷 | Permission notifications |\n| 🤷 | Markdown notes |\n\n---\n\n## Quick Start\n\n```bash\ngit clone https://github.com/49Agents/49Agents.git\ncd 49Agents\n./49ctl setup    # interactive setup (one time)\n./49ctl start    # start cloud server + agent\n```\n\nOpen `http://localhost:1071`. No account, no login, no token.\n\nDon't want to self-host? **[49agents.com](https://app.49agents.com)**\n![tutorial](https://github.com/user-attachments/assets/776a96c7-35ae-495a-8c15-ee847b3dcd57)\n\n\n---\n\n## Desktop App (macOS)\n\nDownload the latest `.dmg` from [GitHub Releases](https://github.com/49Agents/49Agents/releases/latest).\n\nAfter downloading, macOS will block the app because it is not notarized. Run this once to allow it:\n\n```bash\nxattr -cr /Applications/49Agents.app\n```\n\nThen open 49Agents normally. It runs as a tray icon — look for it in your menu bar.\n\nUpdates are delivered in-app: click the tray icon and choose **Check for Updates**.\n\n---\n\n## Features\n\n### Canvas and Workspace\n\n- [x] **Infinite canvas** — no tabs, no splits. Place panes anywhere on a zoomable surface\n- [x] **Drag, resize, arrange** — your workspace grows with your thinking, not your monitor\n- [x] **Zoom levels** — zoom out for the big picture, zoom in to focus\n- [x] **Persistent layout** — everything stays where you put it\n\n### Terminals\n\n- [x] **Real tmux sessions** via ttyd — full ANSI color, scrollback, your shell config\n- [x] **Broadcast input** — type once, send keystrokes to multiple terminals simultaneously\n\n### Multi-Machine\n\n- [x] **Zero SSH** — connect agents from any machine to one canvas\n- [x] **HUD overlay** — live CPU, RAM, and Claude API usage across all connected machines\n\n### Access\n\n- [x] **Any device** — laptop, tablet, phone. Same workspace, same layout\n- [x] **Tailscale / LAN / hosted relay** — works however you connect\n- [x] **Fully self-hosted** — the entire stack runs on your hardware\n- [x] **No data stored server-side** — terminal I/O is relayed, never persisted\n\n### Keyboard-First\n\n- [x] **Tab chords** for pane switching\n- [x] **WASD move mode** for spatial navigation\n- [x] **Shortcut numbers** (1–9) for instant pane focus\n- [x] **Broadcast mode** for multi-terminal input\n\n---\n\n## Architecture\n\n```\n┌──────────────┐    WSS    ┌──────────────┐    WSS    ┌──────────────┐\n│  🖥️ PC       │ ────────►│  ☁️ Relay    │ ◄──────── │  📱 Browser  │\n│  49-agent    │           │              │           │              │\n└──────────────┘           └──────────────┘           └──────────────┘\n                           Self-host or use\n                            49agents.com\n```\n\n<details>\n<summary>Multi-machine setup</summary>\n\n```\n┌──────────────┐                                         ┌──────────────┐\n│  🖥️ MacBook  │ ─── WSS ───┐                        ┌───│  📱 Phone   │\n│  49-agent    │             │                       │   │  Browser     │\n└──────────────┘             │                       │   └──────────────┘\n                             │   ┌──────────────┐    │\n┌──────────────┐             ├──►│  ☁️ Relay    │◄───┤   ┌──────────────┐\n│  🖥️ PC       │ ─── WSS ───┤   │              │     ├───│  💻 Laptop  │\n│  49-agent    │             │   │  Self-host   │    │   │  Browser     │\n└──────────────┘             │   │  or use      │    │   └──────────────┘\n                             │   │ 49agents.com │    │\n┌──────────────┐             │   └──────────────┘    │    ┌──────────────┐\n│  ☁️ Azure VM │ ─── WSS ───┘                        └───│  📱 Tablet   │\n│  49-agent    │                                          │  Browser     │\n└──────────────┘                                          └──────────────┘\n\n                  Each agent independently connects\n                   to the relay via WebSocket.\n                  No terminal data stored server-side.\n```\n\n</details>\n\n---\n\n## License\n\n[BSL 1.1](./LICENSE) — free for individuals and small teams. Converts to MIT on 2030-02-26.\n","summary":"49Agents is an open‑source, 2D agentic IDE that consolidates terminals, code editing, and project management onto a single infinite canvas. It lets users install “agents” on multiple machines, connect them without SSH, and interact with all processes from any device—including laptops, tablets, and phones—via a web or native app. Key features include drag‑and‑drop terminals, real‑time terminal multiplexing with broadcast input, a built‑in Monaco editor, Git graph visualization, and spatial keyboard shortcuts for fast navigation. Developers, dev‑ops teams, and power users working across distributed environments will benefit from its unified, keyboard‑first, zero‑config workspace that stays consistent whether on a local machine or a self‑hosted server.","description":"Open-source 2D IDE for managing AI agents in native CLIs, terminal, gits, beads issues, and files across multiple projects and machines. Self-host on a single machine via localhost OR host on a cluster via Tailscale OR connect to app.49agents.com (coming soon)","stars":244,"language":"JavaScript"},{"owner":"kanwas-ai","repo":"kanwas","url":"https://github.com/kanwas-ai/kanwas","readme":"<p align=\"center\">\n  <a href=\"https://kanwas.ai/\" target=\"_blank\">\n    <img src=\"./docs/images/logo.png\" alt=\"Kanwas\" height=\"80\" />\n  </a>\n</p>\n<p align=\"center\">\n  Shared context board for teams and agents\n</p>\n<p align=\"center\">\n  Try Kanwas for free at <a href=\"https://kanwas.ai/\">kanwas.ai</a>\n</p>\n\n# What's Kanwas?\n\nKanwas is a multiplayer workspace for AI work. Teams and an AI agent share the same documents, evidence, and decisions, with the agent's tool calls streaming into the same timeline everyone sees.\n\n![Kanwas canvas](./docs/images/hero.webp)\n\n## Who it's for\n\n- **Founders.** Turn a fundraising deck, customer interviews, MVP spec, and hiring plan into one canvas where the agent helps across all of them. Less context to keep in your head, more output across many fronts.\n- **Product managers.** Drop interview snippets, tickets, and competitor screenshots on a board; get a discovery readout and a PRD with every claim traceable to its source.\n- **Developers.** Pull a PM's spec, designs, and research onto a canvas; work with the agent to turn it into an implementation plan with tasks and acceptance criteria. Then `kanwas pull` the markdown into your repo and hand it to Claude Code, Codex, or whatever coding agent you use.\n- **Marketers.** Plan a launch with positioning, messaging, asset list, and timeline. The agent drafts copy variants you can compare side-by-side and iterate on with the team.\n- **Sales.** A reusable account board: research, comms history, stakeholder map, and proposal drafts. Each deal makes the template better.\n\n## Why teams use it\n\n- **Shared context that compounds.** Every decision and outcome makes the next board better than the last.\n- **Canvas + agent on one surface.** Work alongside AI over the same evidence, ideas, and trade-offs — transparent to everyone.\n- **Sharp deliverables in minutes.** Generate structured, execution-ready artifacts for every stage of the work.\n- **Your files, your repo.** Git-backed markdown filesystem with full version history. No vendor lock-in.\n\n## Quickstart\n\n### Prerequisites\n\n- Docker + Docker Compose\n- An Anthropic API key (and/or OpenAI API key)\n\n### Run it\n\n```bash\ngit clone https://github.com/kanwas-ai/kanwas.git\ncd kanwas\n\n# Env files — fill in API keys, APP_KEY, etc.\ncp .env.example .env\ncp backend/.env.example backend/.env\ncp yjs-server/.env.example yjs-server/.env\ncp frontend/.env.example frontend/.env\n\ndocker-compose --profile app up\n```\n\nOpen http://localhost:5173 and you're in.\n\nFor local development (hot reload, running services with `pnpm dev`) and the architectural walkthrough, see [`docs/SYSTEM_OVERVIEW.md`](./docs/SYSTEM_OVERVIEW.md).\n\n## CLI\n\n`kanwas` is a command-line tool for syncing a workspace with your local filesystem. Useful when you want to edit notes in your editor of choice, bulk-import markdown you already have on disk, or script workspace access from CI or another agent.\n\n### Install\n\n```bash\nnpm install -g @kanwas/cli\n```\n\n### Authenticate\n\n```bash\nkanwas login\n```\n\nOpens a browser tab to authorize the CLI. Auth is stored globally in `~/.kanwas/config.json`.\n\n### Edit a workspace locally\n\n```bash\nmkdir my-workspace && cd my-workspace\nkanwas pull            # interactive picker, downloads files into the current directory\n# ...edit files in your editor...\nkanwas push            # uploads local changes back to the workspace\n```\n\nAfter the first `pull`, the directory is bound to that workspace via `.kanwas.json`. Subsequent `pull` / `push` reuse it automatically.\n\n### Import markdown from disk\n\n```bash\nkanwas import ./notes                       # interactive workspace picker\nkanwas import ./notes --name \"My Workspace\" # non-interactive, by name\nkanwas import ./intro.md --id <uuid>        # single file, by ID\nkanwas import ./notes --dest research       # place imports under a subfolder\nkanwas import ./notes --overwrite           # replace files that already exist\n```\n\nWalks the source path, picks up every `.md` file (other files are skipped), preserves directory structure, and creates them in the target workspace.\n\n### List / script\n\n```bash\nkanwas workspaces             # list workspaces\nkanwas workspaces --json      # JSON output for scripting\nkanwas pull --id <uuid>       # non-interactive: pin to a specific workspace\nkanwas pull --name \"<name>\"   # non-interactive: by exact name\n```\n\nAll commands accept `--id` or `--name` to skip the interactive picker, which makes them safe to use from CI or wrapping agents.\n\nSource: [`cli/`](./cli) · npm: [`@kanwas/cli`](https://www.npmjs.com/package/@kanwas/cli)\n\n## Community\n\nQuestions, ideas, want to chat with the team?\n\n- 💬 [Kanwas Kollective on Slack](https://join.slack.com/t/kanwaskollective/shared_invite/zt-3vsln4mro-omqBG1gi1Kmc9fgzTHL7oQ)\n\n## Contributing\n\nWe'd love help. A few notes:\n\n- Read [`docs/SYSTEM_OVERVIEW.md`](./docs/SYSTEM_OVERVIEW.md) for the mental model and project-specific gotchas (especially around Yjs/BlockNote — clone semantics and transactions matter).\n- Open an issue before large changes so we can align on direction.\n- Run `pnpm format` and the relevant package's lint before opening a PR.\n- First-time contributors will be asked to sign our [Contributor License Agreement](./.github/CLA.md). The CLA bot will comment on your PR with a link and the signing phrase — you only need to sign once.\n\n## License\n\nKanwas is licensed under the [Apache License 2.0](./LICENSE).\n\n## Acknowledgements\n\nKanwas stands on the shoulders of [Yjs](https://github.com/yjs/yjs), [BlockNote](https://www.blocknotejs.org/), [AdonisJS](https://adonisjs.com/), [E2B](https://e2b.dev/), and many other great open-source projects.\n","summary":"Kanwas is an open‑source multiplayer workspace that lets teams and an AI agent collaborate over the same documents, evidence, and decisions, with the agent’s tool calls streaming into a shared timeline. It provides a Git‑backed markdown file system, a CLI for syncing local edits, and structured, execution‑ready artifacts that can be pulled straight into a project repository. The platform is aimed at founders, product managers, developers, marketers, and sales teams who want to turn research, spec, and copy into actionable deliverables with AI assistance while keeping all context visible and version‑controlled. By combining a canvas‑style interface with AI-driven insights, Kanwas helps teams iterate faster and produce sharper outputs in minutes.","description":"Kanwas — Shared context board for teams and agents","stars":587,"language":"TypeScript"},{"owner":"manojmallick","repo":"sigmap","url":"https://github.com/manojmallick/sigmap","readme":"<div align=\"center\">\n\n<img src=\"assets/logo.png\" alt=\"SigMap logo\" width=\"80\" height=\"80\" />\n\n# ⚡ SigMap\n\n**SigMap finds the right files before your AI answers.**\n\n[![npm version](https://img.shields.io/npm/v/sigmap?color=7c6af7&label=latest&logo=npm)](https://www.npmjs.com/package/sigmap)\n[![npm downloads](https://img.shields.io/npm/dt/sigmap?color=22c55e&label=downloads&logo=npm)](https://www.npmjs.com/package/sigmap)\n[![CI](https://github.com/manojmallick/sigmap/actions/workflows/ci.yml/badge.svg)](https://github.com/manojmallick/sigmap/actions/workflows/ci.yml)\n[![Zero deps](https://img.shields.io/badge/dependencies-zero-22c55e)](package.json)\n[![License: MIT](https://img.shields.io/badge/License-MIT-7c6af7.svg)](LICENSE)\n[![GitHub Stars](https://img.shields.io/github/stars/manojmallick/sigmap?style=flat&color=f59e0b&logo=github)](https://github.com/manojmallick/sigmap/stargazers)\n[![Star History Chart](https://api.star-history.com/svg?repos=manojmallick/sigmap&type=Date)](https://star-history.com/#manojmallick/sigmap&Date)\n[![Discover on ShyPD](https://img.shields.io/badge/ShyPD-Discover-7c6af7?logo=data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNiIgaGVpZ2h0PSIxNiIgdmlld0JveD0iMCAwIDE2IDE2Ij48Y2lyY2xlIGN4PSI4IiBjeT0iOCIgcj0iOCIgZmlsbD0id2hpdGUiLz48L3N2Zz4=&logoColor=7c6af7)](https://shypd.ai/tools/sigmap)\n\n</div>\n\n---\n\n## Try it now\n\n**No install required.** Run instantly on any machine:\n\n```bash\nnpx sigmap\nnpx sigmap ask \"Where is auth handled?\"\n```\n\nZero config. Zero dependencies. Under 10 seconds.\n\n---\n\n## What is SigMap?\n\nSigMap extracts function and class signatures from your codebase and feeds the right files — not the whole repo — to your AI.\n\nWorks with Copilot, Claude, Cursor, Windsurf, and any LLM.\n\n---\n\n## Why SigMap?\n\n- **80.0% hit@5** — right file found in top 5 results (vs 13.6% baseline)\n- **40–98% token reduction** — 2K–4K tokens instead of 80K+\n- **52.2% task success rate** — up from 10% without context\n- **1.68 prompts per task** — down from 2.84\n- **Works with any LLM** — no API key, no cloud, no accounts\n- **Zero npm dependencies** — `npx sigmap` on any machine\n\n---\n\n## Replace this with SigMap\n\n| Without SigMap | With SigMap |\n|---|---|\n| ❌ Guessing which files are relevant | ✅ Right file in context — 80% of the time |\n| ❌ Sending the full repo to your AI | ✅ Minimal context — only what matters |\n| ❌ Embeddings / vector DB required | ✅ Grounded answers, no infra needed |\n\n---\n\n## How it works\n\n```\nAsk → Rank → Context → Validate → Judge → Learn\n```\n\n1. **Ask** — `sigmap ask \"Where is auth handled?\"` — ranked file list\n2. **Rank** — TF-IDF scores every file against your query\n3. **Context** — writes compact signatures to your AI's context file\n4. **Validate** — `sigmap validate` — confirms right files are in scope\n5. **Judge** — `sigmap judge` — scores answer groundedness against context\n6. **Learn** — `sigmap weights` — boosts files that keep solving your tasks\n\n---\n\n## Benchmark\n\n```\nBenchmark : sigmap-v6.10-main\nDate      : 2026-05-05\n\nHit@5          : 80.0%   (baseline 13.6%  — 5.9× lift)\nPrompt reduction : 41.0%\nTask success   : 52.2%   (baseline 10%)\nPrompts / task : 1.68    (baseline 2.84)\nToken reduction: 40–98%  (avg 96.8% across 18 real repos)\n```\n\nMeasured on 90 coding tasks across 18 real public repos. No LLM API — fully reproducible.\n\n**Resources:**\n- [Full methodology →](https://manojmallick.github.io/sigmap/guide/benchmark.html)\n- [Benchmark suite (GitHub)](https://github.com/manojmallick/sigmap-benchmark-suite) — scripts, tasks, and raw data\n- [Benchmark data (Zenodo)](https://zenodo.org/records/19898842) — archived results for reproducibility\n\n<div align=\"center\">\n<img src=\"docs/comparison-chart.svg\" alt=\"SigMap benchmark — before vs after across 3 RAG quality metrics\" width=\"700\" />\n</div>\n\n---\n\n## Install\n\n**Try without installing:**\n\n```bash\nnpx sigmap\n```\n\n**Install globally:**\n\n```bash\nnpm install -g sigmap\n```\n\n**Install per-project:**\n\n```bash\nnpm install --save-dev sigmap\n```\n\n**Standalone binary** — no Node.js required:\n\n| Platform | Download |\n|---|---|\n| macOS Apple Silicon | [`sigmap-darwin-arm64`](https://github.com/manojmallick/sigmap/releases/latest/download/sigmap-darwin-arm64) |\n| macOS Intel | [`sigmap-darwin-x64`](https://github.com/manojmallick/sigmap/releases/latest/download/sigmap-darwin-x64) |\n| Linux x64 | [`sigmap-linux-x64`](https://github.com/manojmallick/sigmap/releases/latest/download/sigmap-linux-x64) |\n| Windows x64 | [`sigmap-win32-x64.exe`](https://github.com/manojmallick/sigmap/releases/latest/download/sigmap-win32-x64.exe) |\n\nEach binary ships with a `.sha256` checksum. [Verify a binary →](docs/readmes/binaries.md)\n\n**Volta:**\n\n```bash\nvolta install sigmap\n```\n\n---\n\n## Integrations\n\n**AI assistants — one run, all of them:**\n\n| Adapter | Output file | Used by |\n|---|---|---|\n| `copilot` | `.github/copilot-instructions.md` | GitHub Copilot |\n| `claude` | `CLAUDE.md` | Claude / Claude Code |\n| `cursor` | `.cursorrules` | Cursor |\n| `windsurf` | `.windsurfrules` | Windsurf |\n| `openai` | `.github/openai-context.md` | OpenAI models |\n| `gemini` | `.github/gemini-context.md` | Google Gemini |\n| `codex` | `AGENTS.md` | OpenAI Codex · OpenCode |\n\n```bash\nsigmap --adapter copilot   # default\nsigmap --adapter claude\nsigmap --adapter cursor\n```\n\n**IDE extensions:**\n\n| IDE | Install | Source | Features |\n|-----|---------|--------|----------|\n| **VS Code** | [Marketplace](https://marketplace.visualstudio.com/items?itemName=manojmallick.sigmap) · [Open VSX](https://open-vsx.org/extension/manojmallick/sigmap) | [github.com/manojmallick/sigmap-vscode](https://github.com/manojmallick/sigmap-vscode) | Status bar health grade, stale context alerts, one-click regen |\n| **JetBrains** | [Marketplace](https://plugins.jetbrains.com/plugin/31109-sigmap--ai-context-engine/) | [github.com/manojmallick/sigmap-jetbrains](https://github.com/manojmallick/sigmap-jetbrains) | IntelliJ IDEA, WebStorm, PyCharm, GoLand — tool window + actions |\n| **Neovim** | lazy.nvim / packer / vim-plug | [github.com/manojmallick/sigmap.nvim](https://github.com/manojmallick/sigmap.nvim) | `:SigMap`, `:SigMapQuery` float window, statusline widget |\n\n**MCP server** — 9 on-demand tools for Claude Code and Cursor:\n\n```bash\nsigmap --mcp\n```\n\n---\n\n## Try it\n\n```bash\n# 1. Generate context for your project\nnpx sigmap\n\n# 2. Ask a question — get ranked files\nsigmap ask \"Where is auth handled?\"\n\n# 3. Validate — confirm the right files are in scope\nsigmap validate --query \"auth login token\"\n\n# 4. Judge — score your AI's answer for groundedness\nsigmap judge --response response.txt --context .context/query-context.md\n\n# 5. Inspect health\nsigmap --health\n```\n\n---\n\n## Start guide\n\n| Who | Start here |\n|---|---|\n| 👶 **New** | [Quick start guide](docs/readmes/GETTING_STARTED.md) — setup in 60 seconds |\n| ⚡ **Daily** | `sigmap ask` / `sigmap validate` / `sigmap judge` |\n| 🧠 **Advanced** | [Context strategies](docs/readmes/CONTEXT_STRATEGIES.md) · [MCP setup](docs/readmes/MCP_SETUP.md) |\n| 🏢 **Teams** | [Config reference](https://manojmallick.github.io/sigmap/guide/config.html) · [CI setup](docs/readmes/ENTERPRISE_SETUP.md) |\n\n---\n\n## Docs\n\n**[manojmallick.github.io/sigmap](https://manojmallick.github.io/sigmap)**\n\n| Section | Link |\n|---|---|\n| CLI reference (32 commands) | [cli.html](https://manojmallick.github.io/sigmap/guide/cli.html) |\n| Benchmark methodology | [benchmark.html](https://manojmallick.github.io/sigmap/guide/benchmark.html) |\n| Config reference | [config.html](https://manojmallick.github.io/sigmap/guide/config.html) |\n| Roadmap | [roadmap.html](https://manojmallick.github.io/sigmap/guide/roadmap.html) |\n| 29 languages | [generalization.html](https://manojmallick.github.io/sigmap/guide/generalization.html) |\n\n---\n\n## Support\n\nIf SigMap saves you context or API spend, a ⭐ on [GitHub](https://github.com/manojmallick/sigmap) helps others find it.\n\n[Report an issue](https://github.com/manojmallick/sigmap/issues) · [Changelog](CHANGELOG.md)\n\n---\n\n## Contributing\n\nSigMap welcomes contributions! \n\n**Before submitting a PR:**\n1. Read [CONTRIBUTING.md](CONTRIBUTING.md)\n2. Check [Discussions → Announcements](../../discussions) for workflow setup\n3. Target the `develop` branch (not main)\n4. Follow the [contributor checklist](.github/CONTRIBUTOR_CHECKLIST.txt)\n\nSee [.github/PULL_REQUEST_TEMPLATE.md](.github/PULL_REQUEST_TEMPLATE.md) for the PR checklist. All contributors are credited in the CHANGELOG and release notes.\n\n---\n\n## Why not embeddings?\n\n| | Embeddings | SigMap |\n|---|:---:|:---:|\n| Vector DB required | ✅ | ❌ |\n| Infrastructure to run | ✅ | ❌ |\n| Drift over time | ✅ | ❌ |\n| Deterministic results | ❌ | ✅ |\n| Zero-config setup | ❌ | ✅ |\n| Works offline | ❌ | ✅ |\n\n- **No vector DB** — signatures are plain text files committed to your repo\n- **No infra** — runs locally, zero cloud dependencies\n- **No drift** — regenerating is `npx sigmap`, not a reindex pipeline\n- **Deterministic** — same input always produces same ranked output\n- **Faster** — TF-IDF ranking runs in milliseconds, no embeddings to compute\n\n---\n\n## 29 languages\n\nTypeScript · JavaScript · Python · Java · Kotlin · Go · Rust · C# · C/C++ · Ruby · PHP · Swift · Dart · Scala · Vue · Svelte · HTML · CSS/SCSS · YAML · Shell · SQL · GraphQL · Terraform · Protobuf · Dockerfile · TOML · XML · Properties · Markdown\n\nAll implemented with zero external dependencies.\n\n[Full language table →](https://manojmallick.github.io/sigmap/guide/generalization.html)\n\n---\n\n## License\n\nMIT © 2026 [Manoj Mallick](https://github.com/manojmallick) · Made in Amsterdam\n\n---\n\n<div align=\"center\">\n\n**[Docs](https://manojmallick.github.io/sigmap) · [Changelog](CHANGELOG.md) · [Roadmap](https://manojmallick.github.io/sigmap/roadmap.html) · [npm](https://www.npmjs.com/package/sigmap)**\n\n⭐ [Star on GitHub](https://github.com/manojmallick/sigmap) if SigMap saves you tokens.\n\n</div>\n","summary":"SigMap is a lightweight command‑line tool that automatically extracts function and class signatures from a codebase and supplies only the most relevant files to an AI assistant, dramatically reducing the amount of context sent to the model. It ranks files with TF‑IDF, writes concise signatures into the AI’s context, and includes validation and learning steps to improve precision over time, all without requiring any external dependencies or embeddings. Developers and teams working with Copilot, Claude, Cursor, Windsurf, or any LLM benefit from lower prompt counts, higher hit rates, and token savings, making AI‑assisted coding faster and more cost‑effective. The tool can be used instantly via `npx sigmap` or installed globally, making it ideal for quick experimentation or integration into CI workflows.","description":"97% token reduction for AI coding sessions — zero deps, 21 languages, MCP server","stars":332,"language":"JavaScript"},{"owner":"leox255","repo":"loopsy","url":"https://github.com/leox255/loopsy","readme":"# Loopsy\n\n**Your terminal, in your pocket.**\n\nControl Claude Code, Cursor, Codex, or any shell on your laptop from your phone. Maintainer-run public relay or self-host on Cloudflare Workers, your call.\n\n[![npm](https://img.shields.io/npm/v/loopsy.svg)](https://www.npmjs.com/package/loopsy)\n[![License: Apache 2.0](https://img.shields.io/badge/License-Apache_2.0-blue.svg)](LICENSE)\n`macOS` · `Linux` · `Windows`\n\n→ [loopsy.dev](https://loopsy.dev)\n\n---\n\n## Try it\n\n```bash\n# 1. Install on your laptop (any OS)\nnpm install -g loopsy\nloopsy init && loopsy start\n\n# 2. Pair your phone\nloopsy mobile pair\n# first run prompts for relay choice (public or your own self-hosted),\n# then prints the QR + 4-digit verification code\n```\n\nThat's the whole thing. Pick any agent, type or dictate, the laptop runs it.\n\n> **Public relay vs self-hosted.** `relay.loopsy.dev` is run by the loopsy\n> maintainers and is the default if you accept the consent prompt. Convenient,\n> but the relay terminates TLS, so the operator can read and modify your\n> terminal traffic. For full privacy, self-host:\n>\n> ```bash\n> npx @loopsy/deploy-relay                                       # ~30s, your Cloudflare account, free tier\n> loopsy mobile pair --relay-url https://<your>.workers.dev      # skip the public-relay consent\n> ```\n>\n> See the [trust model](#threat-model-read-this-first) before pairing on the public relay.\n\n## How it works\n\n```\n┌─────────────┐         ┌──────────────────────┐         ┌─────────┐\n│   Laptop    │◄──WSS──►│ Cloudflare Worker    │◄──WSS──►│  Phone  │\n│   loopsy    │         │ Durable Object       │         │  /app   │\n│   daemon    │         │ (your account)       │         │         │\n└─────────────┘         └──────────────────────┘         └─────────┘\n```\n\nThe daemon opens an outbound WebSocket to a small Cloudflare Worker. Your phone connects to the same Worker. The Worker splices the two together. No port forwarding, no public IP, no VPN.\n\nPair tokens are HMAC-signed, secrets are SHA-256 hashed at rest, and bearer tokens travel in `Sec-WebSocket-Protocol` headers — never query strings. Self-hosters keep all of that on their own Cloudflare account; the public `relay.loopsy.dev` is operated by the loopsy maintainers (see [trust model](#threat-model-read-this-first)).\n\n## What you get\n\n- **Real terminal.** Full PTY, ANSI, scrollback, resize. TUIs render properly.\n- **Persistent sessions.** Switch tabs, lock your phone, lose signal, pick up where you left off.\n- **Voice input.** Dictate via Web Speech API, edit before sending.\n- **Per-session auto-approve.** Opt in to skip confirmation prompts (`--dangerously-skip-permissions`, `-y`, `--full-auto`) on a per-session basis. Default: off, with a macOS confirmation dialog the first time.\n\n## Self-host the relay\n\n```bash\nnpx @loopsy/deploy-relay\n```\n\nThe CLI:\n1. Prompts for a worker name and optional custom domain.\n2. Generates a fresh `PAIR_TOKEN_SECRET` (32 random bytes).\n3. Runs `wrangler deploy` — opens your browser for OAuth on first run.\n4. Sets the secret via stdin (never appears on your clipboard or in process args).\n5. Saves the relay URL to `~/.loopsy/relay.json`.\n\nCloudflare Workers free tier covers personal use comfortably. SQLite-backed Durable Objects are also free-tier eligible.\n\n## Phone client\n\nThe web client at `/app` runs on iOS Safari and Android Chrome with no install. Native iOS & Android apps are in submission review.\n\n| Feature | Status |\n|---|---|\n| Web app (`/app`) | ✅ Live |\n| iOS / iPadOS native | ⏳ App Store review |\n| Android native | ⏳ Play Store review |\n\n## CLI\n\n### Phone control\n\n| Command | Description |\n|---|---|\n| `loopsy mobile pair [--ttl <seconds>]` | Issue a pair token. Prints QR + 4-digit verification code. |\n| `loopsy phone list` | List paired phones for this device. |\n| `loopsy phone revoke <id>` | Revoke a paired phone server-side. |\n| `loopsy relay configure <url>` | Point the daemon at a different relay. |\n\n### Daemon\n\n| Command | Description |\n|---|---|\n| `loopsy init` | Generate config + API key. |\n| `loopsy start` | Start the daemon. |\n| `loopsy stop` | Stop the daemon. |\n| `loopsy status` | Show daemon status. |\n| `loopsy doctor` | Health check across config, daemon, MCP, peers. |\n| `loopsy enable` | Auto-start on login (launchd / systemd / Task Scheduler). |\n| `loopsy disable` | Remove auto-start. |\n\n### Logs & keys\n\n| Command | Description |\n|---|---|\n| `loopsy logs [-f]` | View audit logs. |\n| `loopsy key show` | Show current API key. |\n| `loopsy key generate` | Rotate the API key. |\n\n## Agent-to-agent on a LAN\n\nThis is the original Loopsy. Phone control was built on top of it.\n\nRun a daemon on every machine you own. The daemons find each other on your local network via mDNS, you pair them once, and after that each machine exposes a small set of capabilities to the others: run a command, transfer a file, store and read shared key/value state, send and receive messages. Those same capabilities are also exposed to whatever AI coding agent you have installed (Claude Code, Codex CLI, Gemini CLI, Opencode) through MCP, so an agent on one machine can drive another machine directly.\n\n### Setup\n\n```bash\n# On every machine\nnpm i -g loopsy\nloopsy init\nloopsy start\n\n# Pair two machines\nloopsy pair                  # on machine A, prints a 6-digit code\nloopsy pair 192.168.1.50     # on machine B, paste the code\n```\n\nPairing uses ECDH (P-256) with a 6-digit short authentication string that you compare visually. After pairing, restart both daemons; the `loopsy_*` MCP tools become available to your AI coding agent automatically.\n\nIf mDNS doesn't reach (cross-subnet, locked-down corp networks), add a peer manually:\n\n```bash\nloopsy peers add 192.168.1.50\n```\n\n### MCP tools your agent gets\n\nWhen the Loopsy MCP server is wired into your agent, the agent gains:\n\n| Tool | What it does |\n|---|---|\n| `loopsy_list_peers` | Enumerate machines on the network with online/offline status. |\n| `loopsy_peer_status` | Health check a specific peer. |\n| `loopsy_execute` | Run a command on a remote machine. |\n| `loopsy_session_start` / `_stop` / `_list` / `_remove` | Long-lived PTY sessions on a peer. Spawn, poll, tear down. |\n| `loopsy_transfer_file` | Push a local file to a peer, or pull a peer's file. |\n| `loopsy_list_remote_files` | Browse a peer's filesystem (within configured allowed paths). |\n| `loopsy_context_set` / `_get` / `_list` / `_delete` | Shared key/value store on a peer. |\n| `loopsy_broadcast_context` | Same key/value, written to every online peer at once. |\n| `loopsy_send_message` | Protocol-compliant message to a peer's inbox, with envelope, outbox copy, TTL. |\n| `loopsy_check_inbox` | Pull pending messages addressed to this machine. |\n| `loopsy_check_ack` / `_ack_message` | Read receipts. |\n\n### What it actually looks like in practice\n\nA few real scenarios:\n\n- **Worker machine.** I have a Mac Studio sitting in another room. I tell Claude on my laptop, \"kick off the iOS build on kai and let me know when it finishes.\" Claude calls `loopsy_session_start` against kai with the build command, polls until it exits, and reports back. My laptop stays cool and responsive.\n- **Long-running agent tasks on bigger hardware.** Spawn a Claude session on the Mac Studio, hand it a multi-file refactor, walk away. Check in from your laptop or phone hours later via `loopsy_session_list` (or the iOS app's session picker).\n- **Multi-agent pipelines.** Agent on machine A writes results into `loopsy_context_set` under a known key. Agent on machine B polls `loopsy_context_get` and picks up the work. Both agents are blissfully unaware of each other's existence beyond the shared key/value protocol.\n- **Pair programming with another developer's machine.** They run `loopsy peers add <your_ip>`, paste API keys, and now both your agents can transfer files and share context.\n\n### Messaging protocol\n\nThere's a standard for AI agents to message each other across machines reliably (delivery, ACKs, retries). It uses the context store as the medium so any new machine can join without coordinating clients. Convention:\n\n| Pattern | Stored on | Purpose |\n|---|---|---|\n| `inbox:<recipient>:<msg_id>` | recipient's machine | message addressed to that peer |\n| `outbox:<msg_id>` | sender's machine | local copy of sent message |\n| `ack:<sender>` | sender's machine | last message id the recipient processed |\n\nFull envelope schema, polling intervals, TTL defaults, and the task queue protocol are in [AGENTS.md](AGENTS.md). It works the same whether there are 2 peers or 20.\n\n### LAN path security\n\nLAN agent-to-agent traffic does **not** go through the relay. Daemons talk directly over your local network. Bearer-auth on every request, API keys exchanged at pair time. If you want the daemon visible on the LAN you have to opt in (`loopsy start --lan`); the default is localhost-only.\n\n## Security\n\n### Threat model, read this first\n\nLoopsy is a control surface for your own machine, accessed by your own phone, routed through a relay you can self-host. Some sharp edges fall out of that:\n\n- **The relay can read your terminal content.** The phone↔daemon connection is TLS-protected on the wire, but TLS terminates at the relay (your own Cloudflare Worker if you self-host, or `relay.loopsy.dev` if you use the default). Whoever operates that relay can see every byte of PTY input and output, including any password you type at a `sudo` prompt or any secret a script echoes. End-to-end encryption between phone and daemon is on the v1.1 roadmap. Until then, **if you don't fully trust the relay operator, self-host with `@loopsy/deploy-relay` — it takes about 30 seconds.** Or skip the mobile path entirely and use only `loopsy shell` over the local Unix socket.\n\n- **A paired phone is a credential.** Anyone holding your unlocked phone with the Loopsy app installed can run commands on your machine. The app itself doesn't add a passcode beyond iOS's lock screen. If auto-approve is enabled for a session, that session can run `claude --dangerously-skip-permissions` (or the equivalent for Codex / Gemini), meaning the agent will edit files and run shell commands without asking. Auto-approve defaults OFF and requires your macOS user password to enable; revoke a phone with `loopsy phone revoke <id>` if you lose it.\n\n- **Auto-approve sends your macOS password through the relay** (TLS-encrypted, but visible at the relay). Only enable auto-approve on a relay you trust. Self-hosting is again the answer here.\n\n- **The pair URL is the pairing.** It contains a one-time pair token plus a 4-digit SAS code shown on your laptop. Anyone who sees the URL *and* the SAS within an hour can pair as a phone. Don't paste pair URLs into shared channels. The TTL is 1 hour on the public relay and 30 minutes by default for self-hosters.\n\n- **Default daemon binding is `127.0.0.1`.** The relay handles WAN access for mobile and the local Unix socket handles `loopsy shell`, so most installs don't need LAN exposure. If you want peer-to-peer over your local network, opt in with `loopsy start --lan` (or set `server.host: 0.0.0.0` in `~/.loopsy/config.yaml`) and make sure you trust the network.\n\n- **Custom commands pin arbitrary binaries.** Anyone with phone access can pin `/bin/sh -c '...'` to the picker as a one-tap shortcut. Same trust model as having the phone, but worth knowing if multiple people share a paired phone.\n\nWe ran a comprehensive `/cso` audit over the codebase. 23 findings, 20 closed, 3 deferred to v2 (E2E phone↔daemon encryption, forward secrecy, per-session ephemeral keys).\n\n### Hardening highlights\n\n- Bearer auth uses constant-time compare (`crypto.timingSafeEqual`).\n- 4-digit SAS verification on every pair. Defends against QR-leak / OCR-bot redeem races.\n- Phone secret is sent in the WebSocket subprotocol header, not the URL.\n- Secrets are SHA-256 hashed at rest in Durable Object storage.\n- Per-IP rate limit on `/device/register` (5/min) plus optional `REGISTRATION_SECRET`.\n- Per-phone auto-approve token, revocable with `loopsy phone revoke`.\n- npm provenance via Trusted Publisher (OIDC) on every release.\n- `pnpm audit --prod` clean. CI gates the publish on any high CVE.\n\nFor private security disclosure, open a security advisory on GitHub.\n\n## Configuration\n\nConfig: `~/.loopsy/config.yaml`. Generated by `loopsy init`.\n\n```yaml\nserver:\n  port: 19532\n  host: 127.0.0.1            # bind localhost only by default\nauth:\n  apiKey: <auto>\n  allowedKeys: {}\nrelay:\n  url: https://<your-relay>.workers.dev\nexecution:\n  denylist: [rm, rmdir, format, mkfs, dd, shutdown, reboot]\n  maxConcurrent: 10\ntransfer:\n  allowedPaths: [/Users/you]\n  deniedPaths: [/Users/you/.ssh, /Users/you/.gnupg]\nrateLimits:\n  execute: 30\n  transfer: 10\n  context: 60\n```\n\nData lives in `~/.loopsy/`:\n\n| Path | Purpose |\n|---|---|\n| `config.yaml` | Daemon configuration |\n| `context.json` | Local key-value store |\n| `peers.json` | Paired LAN peer registry |\n| `logs/audit.jsonl` | Request audit log |\n| `relay.json` | Last deployed relay URL (from `npx @loopsy/deploy-relay`) |\n\n## Project structu
