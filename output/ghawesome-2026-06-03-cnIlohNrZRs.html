<script id="project-data" type="application/json">[{"owner":"ChatTeach","repo":"Creative-Writing-Assistant","url":"https://github.com/ChatTeach/Creative-Writing-Assistant","readme":"# AI Assistant Chatbot\r\n\r\nThis project creates an AI-powered assistant chatbot using GPT4Free and interfaces it with a Gradio web UI for easy interaction.\r\n\r\n## Setup\r\n\r\n1. Clone the repository to your local machine.\r\n2. Install the required Python packages with `pip install -r requirements.txt`.\r\n3. Run the chatbot with `app.py`.\r\n\r\n## Usage\r\n\r\nAfter running the script, a Gradio interface will open in your default web browser. Type your questions or commands into the input box, and the chatbot will respond.\r\n\r\n## Contributing\r\n\r\nFeel free to fork the project, make changes, and submit pull requests if you have suggestions for improvements!\r\n","summary":"The Creative-Writing-Assistant is an AI-powered chatbot designed to provide an interactive, browser-based interface for users to generate text and receive writing assistance. By leveraging the GPT4Free library, the project offers a streamlined way to deploy a functional chatbot through a user-friendly Gradio web interface. This tool is ideal for developers or hobbyists looking to quickly prototype or host a local AI writing companion without the overhead of complex infrastructure.","description":"Creative Writing Assistant App using GPT4Free & Gradio","stars":12,"language":"Python"},{"owner":"xtekky","repo":"gpt4free","url":"https://github.com/xtekky/gpt4free","readme":"# GPT4Free (g4f)\n\n[![PyPI](https://img.shields.io/pypi/v/g4f)](https://pypi.org/project/g4f) [![Docker Hub](https://img.shields.io/badge/docker-hlohaus789%2Fg4f-blue)](https://hub.docker.com/r/hlohaus789/g4f) [![License: GPL v3](https://img.shields.io/badge/License-GPLv3-red.svg)](https://www.gnu.org/licenses/gpl-3.0.txt) [![PyPI Downloads](https://static.pepy.tech/personalized-badge/g4f?period=total&units=INTERNATIONAL_SYSTEM&left_color=GREY&right_color=GREEN&left_text=downloads)](https://pepy.tech/projects/g4f) ![GitHub Repo stars](https://img.shields.io/github/stars/xtekky/gpt4free)\n\n<p align=\"center\">\n  <img src=\"https://g4f.dev/docs/images/477107515-7f60c240-00fa-4c37-bf7f-ae5cc20906a1.png\" alt=\"GPT4Free logo\" height=\"200\" />\n</p>\n\n<p align=\"center\">\n  <span style=\"background: linear-gradient(45deg, #12c2e9, #c471ed, #f64f59); -webkit-background-clip: text; -webkit-text-fill-color: transparent;\">\n    <strong>Created by <a href=\"https://github.com/xtekky\">@xtekky</a>,<br> maintained by <a href=\"https://github.com/hlohaus\">@hlohaus</a></strong>\n  </span>\n</p>\n<p align=\"center\">\n<span>Support the project on</span>\n      <a href=\"https://github.com/sponsors/hlohaus\" target=\"_blank\" rel=\"noopener noreferrer\">\n        GitHub Sponsors\n      </a>\n      ❤️\n</p>\n<p align=\"center\">\nLive demo & docs: https://g4f.dev | Documentation: https://g4f.dev/docs\n</p>\n\n---\n\nGPT4Free (g4f) is a community-driven project that aggregates multiple accessible providers and interfaces to make working with modern LLMs and media-generation models easier and more flexible. GPT4Free aims to offer multi-provider support, local GUI, OpenAI-compatible REST APIs, and convenient Python and JavaScript clients — all under a community-first license.\n\nThis README is a consolidated, improved, and complete guide to installing, running, and contributing to GPT4Free.\n\nTable of contents\n- [What’s included](#whats-included)\n- [Quick links](#quick-links)\n- [Requirements & compatibility](#requirements--compatibility)\n- [Installation](#installation)\n  - [Docker (recommended)](#docker-recommended)\n  - [Slim Docker image](#slim-docker-image)\n  - [Windows (.exe)](#windows-exe)\n  - [Python (pip / from source / partial installs)](#python-pip--from-source--partial-installs)\n- [Running the app](#running-the-app)\n  - [GUI (web client)](#gui-web-client)\n  - [FastAPI / Interference API](#fastapi--interference-api)\n  - [CLI](#cli)\n  - [Optional provider login (desktop in container)](#optional-provider-login-desktop-in-container)\n- [Using the Python client](#using-the-python-client)\n  - [Synchronous text example](#synchronous-text-example)\n  - [Image generation example](#image-generation-example)\n  - [Async client example](#async-client-example)\n- [Using GPT4Free.js (browser JS client)](#using-gpt4freejs-browser-js-client)\n- [Providers & models (overview)](#providers--models-overview)\n- [Local inference & media](#local-inference--media)\n- [Configuration & customization](#configuration--customization)\n- [Running on smartphone](#running-on-smartphone)\n- [Interference API (OpenAI‑compatible)](#interference-api-openai-compatible)\n- [Examples & common patterns](#examples--common-patterns)\n- [Contributing](#contributing)\n  - [How to create a new provider](#how-to-create-a-new-provider)\n  - [How AI can help you write code](#how-ai-can-help-you-write-code)\n- [Security, privacy & takedown policy](#security-privacy--takedown-policy)\n- [Credits, contributors & attribution](#credits-contributors--attribution)\n- [Powered-by highlights](#powered-by-highlights)\n- [Changelog & releases](#changelog--releases)\n- [Manifesto / Project principles](#manifesto--project-principles)\n- [License](#license)\n- [Contact & sponsorship](#contact--sponsorship)\n- [Appendix: Quick commands & examples](#appendix-quick-commands--examples)\n\n---\n\n## What’s included\n- Python client library and async client.\n- Optional local web GUI.\n- FastAPI-based OpenAI-compatible API (Interference API).\n- Official browser JS client (g4f.dev distribution).\n- Docker images (full and slim).\n- Multi-provider adapters (LLMs, media providers, local inference backends).\n- Tooling for image/audio/video generation and media persistence.\n\n---\n\n## Quick links\n- Website & docs: https://g4f.dev | https://g4f.dev/docs  \n- PyPI: https://pypi.org/project/g4f  \n- Docker image: https://hub.docker.com/r/hlohaus789/g4f  \n- Releases: https://github.com/xtekky/gpt4free/releases  \n- Issues: https://github.com/xtekky/gpt4free/issues  \n- Community: Telegram (https://telegram.me/g4f_channel) · Discord News (https://discord.gg/5E39JUWUFa) · Discord Support (https://discord.gg/qXA4Wf4Fsm)\n\n---\n\n## Requirements & compatibility\n- Python 3.10+ recommended.\n- Google Chrome/Chromium for providers using browser automation.\n- Docker for containerized deployment.\n- Works on x86_64 and arm64 (slim image supports both).\n- Some provider adapters may require platform-specific tooling (Chrome/Chromium, etc.). Check provider docs for details.\n\n---\n\n## Installation\n\n### Docker (recommended)\n1. Install Docker: https://docs.docker.com/get-docker/\n2. Create persistent directories:\n   - Example (Linux/macOS):\n     ```bash\n     mkdir -p ${PWD}/har_and_cookies ${PWD}/generated_media\n     sudo chown -R 1200:1201 ${PWD}/har_and_cookies ${PWD}/generated_media\n     ```\n3. Pull image:\n   ```bash\n   docker pull hlohaus789/g4f\n   ```\n4. Run container:\n   ```bash\n   docker run -p 8080:8080 -p 7900:7900 \\\n     --shm-size=\"2g\" \\\n     -v ${PWD}/har_and_cookies:/app/har_and_cookies \\\n     -v ${PWD}/generated_media:/app/generated_media \\\n     hlohaus789/g4f:latest\n   ```\nNotes:\n- Port 8080 serves GUI/API; 7900 can expose a VNC-like desktop for provider logins (optional).\n- Increase --shm-size for heavier browser automation tasks.\n\n### Slim Docker image (x64 & arm64)\n```bash\nmkdir -p ${PWD}/har_and_cookies ${PWD}/generated_media\nchown -R 1000:1000 ${PWD}/har_and_cookies ${PWD}/generated_media\n\ndocker run \\\n  -p 1337:8080 -p 8080:8080 \\\n  -v ${PWD}/har_and_cookies:/app/har_and_cookies \\\n  -v ${PWD}/generated_media:/app/generated_media \\\n  hlohaus789/g4f:latest-slim\n```\nNotes:\n- The slim image can update the g4f package on startup and installs additional dependencies as needed.\n- In this example, the Interference API is mapped to 1337.\n\n### Windows Guide (.exe)\n\n👉 Check out the Windows launcher for GPT4Free:  \n🔗 [https://github.com/gpt4free/g4f.exe](https://github.com/gpt4free/g4f.exe) 🚀  \n\n1. Download the release artifact `g4f.exe.zip` from:\n   https://github.com/xtekky/gpt4free/releases/latest\n2. Unzip and run `g4f.exe`.\n3. Open GUI at: http://localhost:8080/chat/\n4. If Windows Firewall blocks access, allow the application.\n\n### Python Installation (pip / from source / partial installs)\n\nPrerequisites:\n- Python 3.10+ (https://www.python.org/downloads/)\n- Chrome/Chromium for some providers.\n\nInstall from PyPI (recommended):\n```bash\npip install -U g4f[all]\n```\n\nPartial installs\n- To install only specific functionality, use optional extras groups. See docs/requirements.md in the project docs.\n\nInstall from source:\n```bash\ngit clone https://github.com/xtekky/gpt4free.git\ncd gpt4free\npip install -r requirements.txt\npip install -e .\n```\n\nNotes:\n- Some features require Chrome/Chromium or other tools; follow provider-specific docs.\n\n---\n\n## Running the app\n\n### GUI (web client)\n- Run via Python:\n```python\nfrom g4f.gui import run_gui\nrun_gui()\n```\n- Or via CLI:\n```bash\npython -m g4f.cli gui --port 8080 --debug\n```\n- Open: http://localhost:8080/chat/\n\n### FastAPI / Interference API\n- Start FastAPI server:\n```bash\npython -m g4f --port 8080 --debug\n```\n- If using slim docker mapping, Interference API may be available at `http://localhost:1337/v1`\n- Swagger UI: `http://localhost:1337/docs`\n\n### CLI\n- Start GUI server:\n```bash\npython -m g4f.cli gui --port 8080 --debug\n```\n\n### MCP Server\nGPT4Free now includes a Model Context Protocol (MCP) server that allows AI assistants like Claude to access web search, scraping, and image generation capabilities.\n\n**Starting the MCP server (stdio mode):**\n```bash\n# Using g4f command\ng4f mcp\n\n# Or using Python module\npython -m g4f.mcp\n```\n\n**Starting the MCP server (HTTP mode):**\n```bash\n# Start HTTP server on port 8765\ng4f mcp --http --port 8765\n\n# Custom host and port\ng4f mcp --http --host 127.0.0.1 --port 3000\n```\n\nHTTP mode provides:\n- `POST http://localhost:8765/mcp` - JSON-RPC endpoint\n- `GET http://localhost:8765/health` - Health check\n\n**Configuring with Claude Desktop:**\n\nAdd to your `claude_desktop_config.json`:\n```json\n{\n  \"mcpServers\": {\n    \"gpt4free\": {\n      \"command\": \"python\",\n      \"args\": [\"-m\", \"g4f.mcp\"]\n    }\n  }\n}\n```\n\n**Available MCP Tools:**\n- `web_search` - Search the web using DuckDuckGo\n- `web_scrape` - Extract text content from web pages  \n- `image_generation` - Generate images from text prompts\n\nFor detailed MCP documentation, see [g4f/mcp/README.md](g4f/mcp/README.md)\n\n### Optional provider login (desktop within container)\n- Accessible at:\n  ```\n  http://localhost:7900/?autoconnect=1&resize=scale&password=secret\n  ```\n- Useful for logging into web-based providers to obtain cookies/HAR files.\n\n---\n\n## Using the Python client\n\nInstall:\n```bash\npip install -U g4f[all]\n```\n\nSynchronous text example:\n```python\nfrom g4f.client import Client\n\nclient = Client()\nresponse = client.chat.completions.create(\n    model=\"gpt-4o-mini\",\n    messages=[{\"role\": \"user\", \"content\": \"Hello, how are you?\"}],\n    web_search=False\n)\nprint(response.choices[0].message.content)\n```\nExpected:\n```\nHello! How can I assist you today?\n```\n\nImage generation example:\n```python\nfrom g4f.client import Client\n\nclient = Client()\nresponse = client.images.generate(\n    model=\"flux\",\n    prompt=\"a white siamese cat\",\n    response_format=\"url\"\n)\nprint(f\"Generated image URL: {response.data[0].url}\")\n```\n\nAsync client example:\n```python\nfrom g4f.client import AsyncClient\nimport asyncio\n\nasync def main():\n    client = AsyncClient()\n    response = await client.chat.completions.create(\n        model=\"gpt-4o-mini\",\n        messages=[{\"role\": \"user\", \"content\": \"Explain quantum computing briefly\"}],\n    )\n    print(response.choices[0].message.content)\n\nasyncio.run(main())\n```\n\nNotes:\n- See the full API reference for streaming, tool-calling patterns, and advanced options: https://g4f.dev/docs/client\n\n---\n\n## Using GPT4Free.js (browser JS client)\nUse the official JS client in the browser—no backend required.\n\nExample:\n```html\n<script type=\"module\">\n  import Client from 'https://g4f.dev/dist/js/client.js';\n\n  const client = new Client();\n  const result = await client.chat.completions.create({\n      model: 'gpt-4.1',  // Or \"gpt-4o\", \"deepseek-v3\", etc.\n      messages: [{ role: 'user', content: 'Explain quantum computing' }]\n  });\n  console.log(result.choices[0].message.content);\n<\/script>\n```\n\nNotes:\n- The JS client is distributed via the g4f.dev CDN for easy usage. Review CORS considerations and usage limits.\n\n---\n\n## Providers & models (overview)\n- GPT4Free integrates many providers including (but not limited to) OpenAI-compatible endpoints, PerplexityLabs, Gemini, MetaAI, Pollinations (media), and local inference backends.\n- Model availability and behavior depend on provider capabilities. See the providers doc for current, supported provider/model lists: https://g4f.dev/docs/providers-and-models\n\nProvider requirements may include:\n- API keys or tokens (for authenticated providers)\n- Browser cookies / HAR files for providers scraped via browser automation\n- Chrome/Chromium or headless browser tooling\n- Local model binaries and runtime (for local inference)\n\n---\n\n## Local inference & media\n- GPT4Free supports local inference backends. See [docs/local.md](https://github.com/gpt4free/g4f.dev/blob/main/docs/local.md) for supported runtimes and hardware guidance.\n- Media generation (image, audio, video) is supported through providers (e.g., Pollinations). See [docs/media.md](https://github.com/gpt4free/g4f.dev/blob/main/docs/media.md) for formats, options, and sample usage.\n\n---\n\n## Configuration & customization\n- Configure via environment variables, CLI flags, or config files. See [docs/config.md](https://github.com/gpt4free/g4f.dev/blob/main/docs/config.md).\n- To reduce install size, use partial requirement groups. See [docs/requirements.md](https://github.com/gpt4free/g4f.dev/blob/main/docs/requirements.md).\n- Provider selection: learn how to set defaults and override per-request at [docs/selecting_a_provider.md](https://github.com/gpt4free/g4f.dev/blob/main/docs/selecting_a_provider.md).\n- Persistence: HAR files, cookies, and generated media persist in mapped directories (e.g., har_and_cookies, generated_media).\n\n---\n\n## Running on smartphone\n- The web GUI is responsive and can be accessed from a phone by visiting your host IP:8080 or via a tunnel. See [docs/guides/phone.md](https://github.com/gpt4free/g4f.dev/blob/main/docs/guides/phone.md).\n\n---\n\n## Interference API (OpenAI‑compatible)\n- The Interference API enables OpenAI-like workflows routed through GPT4Free provider selection.\n- Docs: [docs/interference-api.md](https://github.com/gpt4free/g4f.dev/blob/main/docs/interference-api.md)\n- Default endpoint (example slim docker): `http://localhost:1337/v1`\n- Swagger UI: `http://localhost:1337/docs`\n\n---\n\n## Examples & common patterns\n- Streaming completions, stopping criteria, system messages, and tool-calling patterns are documented in:\n  - [docs/client.md](https://github.com/gpt4free/g4f.dev/blob/main/docs/client.md)\n  - [docs/async_client.md](https://github.com/gpt4free/g4f.dev/blob/main/docs/async_client.md)\n  - [docs/requests.md](https://github.com/gpt4free/g4f.dev/blob/main/docs/requests.md)\n- Integrations (LangChain, PydanticAI): [docs/pydantic_ai.md](https://github.com/gpt4free/g4f.dev/blob/main/docs/pydantic_ai.md)\n- Legacy examples: [docs/legacy.md](https://github.com/gpt4free/g4f.dev/blob/main/docs/legacy.md)\n\n---\n\n## Contributing\nContributions are welcome — new providers, features, docs, and fixes are appreciated.\n\nHow to contribute:\n1. Fork the repository.\n2. Create a branch for your change.\n3. Run tests and linters.\n4. Open a Pull Request with a clear description and tests/examples if applicable.\n\nRepository: https://github.com/xtekky/gpt4free\n\n### How to create a new provider\n- Read the guide: [docs/guides/create_provider.md](https://github.com/gpt4free/g4f.dev/blob/main/docs/guides/create_provider.md)\n- Typical steps:\n  - Implement a provider adapter in `g4f/Provider/`\n  - Add configuration and dependency notes\n  - Include tests and usage examples\n  - Respect third‑party code licenses and attribute appropriately\n\n### How AI can help you write code\n- See: [docs/guides/help_me.md](https://github.com/gpt4free/g4f.dev/blob/main/docs/guides/help_me.md) for prompt templates and workflows to accelerate development.\n\n---\n\n## Security, privacy & takedown policy\n- Do not store or share sensitive credentials. Use per-provider recommended security practices.\n- If your site appears in the project’s links and you want it removed, send proof of ownership to takedown@g4f.ai and it will be removed promptly.\n- For production, secure the server with HTTPS, authentication, and firewall rules. Limit access to provider credentials and cookie/HAR storage.\n\n---\n\n## Credits, contributors & attribution\n- Core creators: [@xtekky](https://github.com/xtekky) (original), maintained by [@hlohaus](https://github.com/hlohaus).\n- Full contributor graph: https://github.com/xtekky/gpt4free/graphs/contributors\n- Notable code inputs and attributions:\n  - `har_file.py` — input from [xqdoo00o/ChatGPT-to-API](https://github.com/xqdoo00o/ChatGPT-to-API)\n  - `PerplexityLabs.py` — input from [nathanrchn/perplexityai](https://github.com/nathanrchn/perplexityai)\n  - `Gemini.py` — input from [dsdanielpark/Gemini-API](https://github.com/dsdanielpark/Gemini-API) and [HanaokaYuzu/Gemini-API](https://github.com/HanaokaYuzu/Gemini-API)\n  - `MetaAI.py` — inspired by [meta-ai-api by Strvm](https://github.com/Strvm/meta-ai-api)\n  - `proofofwork.py` — input from [missuo/FreeGPT35](https://github.com/missuo/FreeGPT35)\n\nMany more contributors are acknowledged in the repository.\n\n---\n\n## Powered-by highlights\n- Pollinations AI — generative media: https://github.com/pollinations/pollinations\n- MoneyPrinter V2 — example project using GPT4Free: https://github.com/FujiwaraChoki/MoneyPrinterV2\n- For a full list of projects and sites using GPT4Free, see: [docs/powered-by.md](https://github.com/gpt4free/g4f.dev/blob/main/docs/powered-by.md)\n\n---\n\n## Changelog & releases\n- Releases and full changelog: https://github.com/xtekky/gpt4free/releases\n- Subscribe to Discord/Telegram for announcements.\n\n---\n\n## Manifesto / Project principles\nGPT4Free is guided by community principles:\n1. Open access to AI tooling and models.\n2. Collaboration across providers and projects.\n3. Opposition to monopolistic, closed systems that restrict creativity.\n4. Community-centered development and broad access to AI technologies.\n5. Promote innovation, creativity, and accessibility.\n\nhttps://g4f.dev/manifesto\n\n---\n\n## License\nThis program is licensed under the GNU General Public License v3.0 (GPLv3). See the full license: https://www.gnu.org/licenses/gpl-3.0.txt\n\nSummary:\n- You may redistribute and/or modify under the terms of GPLv3.\n- The program is provided WITHOUT ANY WARRANTY.\n\nCopyright notice\n```\nxtekky/gpt4free: Copyright (C) 2025 xtekky\n\nThis program is free software: you can redistribute it and/or modify\nit under the terms of the GNU General Public License as published by\nthe Free Software Foundation, either version 3 of the License, or\n(at your option) any later version.\n\nThis program is distributed in the hope that it will be useful,\nbut WITHOUT ANY WARRANTY; without even the implied warranty of\nMERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE.  See the\nGNU General Public License for more details.\n```\n\n---\n\n## Contact & sponsorship\n- Maintainers: https://github.com/hlohaus  \n- Sponsorship: https://github.com/sponsors/hlohaus  \n- Issues & feature requests: https://github.com/xtekky/gpt4free/issues  \n- Takedown requests: takedown@g4f.ai\n\n---\n\n## Appendix: Quick commands & examples\n\nInstall (pip):\n```bash\npip install -U g4f[all]\n```\n\nRun GUI (Python):\n```bash\npython -m g4f.cli gui --port 8080 --debug\n# or\npython -c \"from g4f.gui import run_gui; run_gui()\"\n```\n\nDocker (full):\n```bash\ndocker pull hlohaus789/g4f\ndocker run -p 8080:8080 -p 7900:7900 \\\n  --shm-size=\"2g\" \\\n  -v ${PWD}/har_and_cookies:/app/har_and_cookies \\\n  -v ${PWD}/generated_media:/app/generated_media \\\n  hlohaus789/g4f:latest\n```\n\nDocker (slim):\n```bash\ndocker run -p 1337:8080 -p 8080:8080 \\\n  -v ${PWD}/har_and_cookies:/app/har_and_cookies \\\n  -v ${PWD}/generated_media:/app/generated_media \\\n  hlohaus789/g4f:latest-slim\n```\n\nPython usage patterns:\n- `client.chat.completions.create(...)`\n- `client.images.generate(...)`\n- Async variants via `AsyncClient`\n\nDocs & deeper reading\n- Full docs: https://g4f.dev/docs  \n- Client API docs: https://g4f.dev/docs/client  \n- Async client docs: https://g4f.dev/docs/async_client  \n- Provider guides: https://g4f.dev/docs/providers  \n- Local inference: https://g4f.dev/docs/local\n\n---\n\nThank you for using and contributing to GPT4Free — together we make powerful AI tooling accessible, flexible, and community-driven.\n","summary":"GPT4Free (g4f) is a community-driven framework that aggregates various LLMs and media-generation providers into a unified, accessible interface. It offers a versatile toolset including a local web GUI, an OpenAI-compatible REST API, and dedicated client libraries for both Python and JavaScript. This project is ideal for developers and enthusiasts who want to integrate multiple AI models into their applications or workflows without the complexity of managing individual provider credentials.","description":"The official gpt4free repository | various collection of powerful language models | opus 4.6 gpt 5.3 kimi 2.5 deepseek v3.2 gemini 3","stars":66281,"language":"Python"},{"owner":"gradio-app","repo":"gradio","url":"https://github.com/gradio-app/gradio","readme":"<!-- DO NOT EDIT THIS FILE DIRECTLY. INSTEAD EDIT THE `readme_template.md` OR `guides/01_getting-started/01_quickstart.md` TEMPLATES AND THEN RUN `render_readme.py` SCRIPT. -->\n\n<div align=\"center\">\n<a href=\"https://gradio.app\">\n<img src=\"readme_files/gradio.svg\" alt=\"gradio\" width=350>\n</a>\n</div>\n\n<div align=\"center\">\n<span>\n<a href=\"https://www.producthunt.com/posts/gradio-5-0?embed=true&utm_source=badge-featured&utm_medium=badge&utm_souce=badge-gradio&#0045;5&#0045;0\" target=\"_blank\"><img src=\"https://api.producthunt.com/widgets/embed-image/v1/featured.svg?post_id=501906&theme=light\" alt=\"Gradio&#0032;5&#0046;0 - the&#0032;easiest&#0032;way&#0032;to&#0032;build&#0032;AI&#0032;web&#0032;apps | Product Hunt\" style=\"width: 150px; height: 54px;\" width=\"150\" height=\"54\" /></a>\n<a href=\"https://trendshift.io/repositories/2145\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/2145\" alt=\"gradio-app%2Fgradio | Trendshift\" style=\"width: 150px; height: 55px;\" width=\"150\" height=\"55\"/></a>\n</span>\n\n[![gradio-backend](https://github.com/gradio-app/gradio/actions/workflows/test-python.yml/badge.svg)](https://github.com/gradio-app/gradio/actions/workflows/test-python.yml)\n[![gradio-ui](https://github.com/gradio-app/gradio/actions/workflows/tests-js.yml/badge.svg)](https://github.com/gradio-app/gradio/actions/workflows/tests-js.yml) \n[![PyPI](https://img.shields.io/pypi/v/gradio)](https://pypi.org/project/gradio/)\n[![PyPI downloads](https://img.shields.io/pypi/dm/gradio)](https://pypi.org/project/gradio/)\n![Python version](https://img.shields.io/badge/python-3.10+-important)\n[![Twitter follow](https://img.shields.io/twitter/follow/gradio?style=social&label=follow)](https://twitter.com/gradio)\n\n[Website](https://gradio.app)\n| [Documentation](https://gradio.app/docs/)\n| [Guides](https://gradio.app/guides/)\n| [Getting Started](https://gradio.app/getting_started/)\n| [Examples](demo/)\n\n</div>\n\n<div align=\"center\">\n\nEnglish | [中文](readme_files/zh-cn#readme)\n\n</div>\n\n# Gradio: Build Machine Learning Web Apps — in Python\n\n\n\nGradio is an open-source Python package that allows you to quickly **build** a demo or web application for your machine learning model, API, or any arbitrary Python function. You can then **share** a link to your demo or web application in just a few seconds using Gradio's built-in sharing features. *No JavaScript, CSS, or web hosting experience needed!*\n\n<img src=\"https://huggingface.co/datasets/huggingface/documentation-images/resolve/main/gradio-guides/gif-version.gif\" style=\"padding-bottom: 10px\">\n\nIt just takes a few lines of Python to create your own demo, so let's get started 💫\n\n\n### Installation\n\n**Prerequisite**: Gradio requires [Python 3.10 or higher](https://www.python.org/downloads/).\n\n\nWe recommend installing Gradio using `pip`, which is included by default in Python. Run this in your terminal or command prompt:\n\n```bash\npip install --upgrade gradio\n```\n\n\n> [!TIP]\n > It is best to install Gradio in a virtual environment. Detailed installation instructions for all common operating systems <a href=\"https://www.gradio.app/main/guides/installing-gradio-in-a-virtual-environment\">are provided here</a>. \n\n### Building Your First Demo\n\nYou can run Gradio in your favorite code editor, Jupyter notebook, Google Colab, or anywhere else you write Python. Let's write your first Gradio app:\n\n\n```python\nimport gradio as gr\n\ndef greet(name, intensity):\n    return \"Hello, \" + name + \"!\" * int(intensity)\n\ndemo = gr.Interface(\n    fn=greet,\n    inputs=[\"text\", \"slider\"],\n    outputs=[\"text\"],\n    api_name=\"predict\"\n)\n\ndemo.launch()\n```\n\n\n\n> [!TIP]\n > We shorten the imported name from <code>gradio</code> to <code>gr</code>. This is a widely adopted convention for better readability of code. \n\nNow, run your code. If you've written the Python code in a file named `app.py`, then you would run `python app.py` from the terminal.\n\nThe demo below will open in a browser on [http://localhost:7860](http://localhost:7860) if running from a file. If you are running within a notebook, the demo will appear embedded within the notebook.\n\n![`hello_world_4` demo](demo/hello_world_4/screenshot.gif)\n\nType your name in the textbox on the left, drag the slider, and then press the Submit button. You should see a friendly greeting on the right.\n\n> [!TIP]\n > When developing locally, you can run your Gradio app in <strong>hot reload mode</strong>, which automatically reloads the Gradio app whenever you make changes to the file. To do this, simply type in <code>gradio</code> before the name of the file instead of <code>python</code>. In the example above, you would type: `gradio app.py` in your terminal. You can also enable <strong>vibe mode</strong> by using the <code>--vibe</code> flag, e.g. <code>gradio --vibe app.py</code>, which provides an in-browser chat that can be used to write or edit your Gradio app using natural language. Learn more in the <a href=\"https://www.gradio.app/guides/developing-faster-with-reload-mode\">Hot Reloading Guide</a>.\n\n\n**Understanding the `Interface` Class**\n\nYou'll notice that in order to make your first demo, you created an instance of the `gr.Interface` class. The `Interface` class is designed to create demos for machine learning models which accept one or more inputs, and return one or more outputs. \n\nThe `Interface` class has three core arguments:\n\n- `fn`: the function to wrap a user interface (UI) around\n- `inputs`: the Gradio component(s) to use for the input. The number of components should match the number of arguments in your function.\n- `outputs`: the Gradio component(s) to use for the output. The number of components should match the number of return values from your function.\n\nThe `fn` argument is very flexible -- you can pass *any* Python function that you want to wrap with a UI. In the example above, we saw a relatively simple function, but the function could be anything from a music generator to a tax calculator to the prediction function of a pretrained machine learning model.\n\nThe `inputs` and `outputs` arguments take one or more Gradio components. As we'll see, Gradio includes more than [30 built-in components](https://www.gradio.app/docs/gradio/introduction) (such as the `gr.Textbox()`, `gr.Image()`, and `gr.HTML()` components) that are designed for machine learning applications. \n\n> [!TIP]\n > For the `inputs` and `outputs` arguments, you can pass in the name of these components as a string (`\"textbox\"`) or an instance of the class (`gr.Textbox()`).\n\nIf your function accepts more than one argument, as is the case above, pass a list of input components to `inputs`, with each input component corresponding to one of the arguments of the function, in order. The same holds true if your function returns more than one value: simply pass in a list of components to `outputs`. This flexibility makes the `Interface` class a very powerful way to create demos.\n\nWe'll dive deeper into the `gr.Interface` on our series on [building Interfaces](https://www.gradio.app/main/guides/the-interface-class).\n\n### Sharing Your Demo\n\nWhat good is a beautiful demo if you can't share it? Gradio lets you easily share a machine learning demo without having to worry about the hassle of hosting on a web server. Simply set `share=True` in `launch()`, and a publicly accessible URL will be created for your demo. Let's revisit our example demo,  but change the last line as follows:\n\n```python\nimport gradio as gr\n\ndef greet(name):\n    return \"Hello \" + name + \"!\"\n\ndemo = gr.Interface(fn=greet, inputs=\"textbox\", outputs=\"textbox\")\n    \ndemo.launch(share=True)  # Share your demo with just 1 extra parameter 🚀\n```\n\nWhen you run this code, a public URL will be generated for your demo in a matter of seconds, something like:\n\n👉 &nbsp; `https://a23dsf231adb.gradio.live`\n\nNow, anyone around the world can try your Gradio demo from their browser, while the machine learning model and all computation continues to run locally on your computer.\n\nTo learn more about sharing your demo, read our dedicated guide on [sharing your Gradio application](https://www.gradio.app/guides/sharing-your-app).\n\n\n### An Overview of Gradio\n\nSo far, we've been discussing the `Interface` class, which is a high-level class that lets you build demos quickly with Gradio. But what else does Gradio include?\n\n#### Custom Demos with `gr.Blocks`\n\nGradio offers a low-level approach for designing web apps with more customizable layouts and data flows with the `gr.Blocks` class. Blocks supports things like controlling where components appear on the page, handling multiple data flows and more complex interactions (e.g. outputs can serve as inputs to other functions), and updating properties/visibility of components based on user interaction — still all in Python. \n\nYou can build very custom and complex applications using `gr.Blocks()`. For example, the popular image generation [Automatic1111 Web UI](https://github.com/AUTOMATIC1111/stable-diffusion-webui) is built using Gradio Blocks. We dive deeper into the `gr.Blocks` on our series on [building with Blocks](https://www.gradio.app/guides/blocks-and-event-listeners).\n\n#### Chatbots with `gr.ChatInterface`\n\nGradio includes another high-level class, `gr.ChatInterface`, which is specifically designed to create Chatbot UIs. Similar to `Interface`, you supply a function and Gradio creates a fully working Chatbot UI. If you're interested in creating a chatbot, you can jump straight to [our dedicated guide on `gr.ChatInterface`](https://www.gradio.app/guides/creating-a-chatbot-fast).\n\n#### The Gradio Python & JavaScript Ecosystem\n\nThat's the gist of the core `gradio` Python library, but Gradio is actually so much more! It's an entire ecosystem of Python and JavaScript libraries that let you build machine learning applications, or query them programmatically, in Python or JavaScript. Here are other related parts of the Gradio ecosystem:\n\n* [Gradio Python Client](https://www.gradio.app/guides/getting-started-with-the-python-client) (`gradio_client`): query any Gradio app programmatically in Python.\n* [Gradio JavaScript Client](https://www.gradio.app/guides/getting-started-with-the-js-client) (`@gradio/client`): query any Gradio app programmatically in JavaScript.\n* [Hugging Face Spaces](https://huggingface.co/spaces): the most popular place to host Gradio applications — for free!\n* [Server mode](https://www.gradio.app/guides/server-mode) (`gradio.Server`): build a custom frontend with Gradio's backend — queue, streaming, MCP, ZeroGPU, and Spaces hosting included.\n\n### What's Next?\n\nKeep learning about Gradio sequentially using the Gradio Guides, which include explanations as well as example code and embedded interactive demos. Next up: [let's dive deeper into the Interface class](https://www.gradio.app/guides/the-interface-class).\n\nOr, if you already know the basics and are looking for something specific, you can search the more [technical API documentation](https://www.gradio.app/docs/).\n\n\n### AI Coding Skills\n\nGradio provides a \"skill\" that enriches AI coding assistants (like Cursor, Claude Code, Codex, etc.) with Gradio-specific knowledge, so that they can build Gradio apps more effectively. This is especially useful when creating custom Gradio components or styling. Install the Gradio skill for your coding assistant with a single command:\n\n```bash\ngradio skills add --cursor   # or --claude, --codex, --opencode\n```\n\nUse `--global` to install at the user level (applies to all projects). Your skill will be automatically available for the particular coding agent.\n\nYou can also install a skill for a **specific Gradio Space**, which generates API usage docs (Python, JS, cURL) on the fly:\n\n```bash\ngradio skills add abidlabs/en2fr --cursor\n```\n\n## Questions?\n\nIf you'd like to report a bug or have a feature request, please create an [issue on GitHub](https://github.com/gradio-app/gradio/issues/new/choose). For general questions about usage, we are available on [our Discord server](https://discord.com/invite/feTf9x3ZSB) and happy to help.\n\nIf you like Gradio, please leave us a ⭐ on GitHub!\n\n## Open Source Stack\n\nGradio is built on top of many wonderful open-source libraries!\n\n[<img src=\"readme_files/huggingface_mini.svg\" alt=\"huggingface\" height=40>](https://huggingface.co)\n[<img src=\"readme_files/python.svg\" alt=\"python\" height=40>](https://www.python.org)\n[<img src=\"readme_files/fastapi.svg\" alt=\"fastapi\" height=40>](https://fastapi.tiangolo.com)\n[<img src=\"readme_files/encode.svg\" alt=\"encode\" height=40>](https://www.encode.io)\n[<img src=\"readme_files/svelte.svg\" alt=\"svelte\" height=40>](https://svelte.dev)\n[<img src=\"readme_files/vite.svg\" alt=\"vite\" height=40>](https://vitejs.dev)\n[<img src=\"readme_files/pnpm.svg\" alt=\"pnpm\" height=40>](https://pnpm.io)\n[<img src=\"readme_files/tailwind.svg\" alt=\"tailwind\" height=40>](https://tailwindcss.com)\n[<img src=\"readme_files/storybook.svg\" alt=\"storybook\" height=40>](https://storybook.js.org/)\n[<img src=\"readme_files/chromatic.svg\" alt=\"chromatic\" height=40>](https://www.chromatic.com/)\n\n## License\n\nGradio is licensed under the Apache License 2.0 found in the [LICENSE](LICENSE) file in the root directory of this repository.\n\n## Citation\n\nAlso check out the paper _[Gradio: Hassle-Free Sharing and Testing of ML Models in the Wild](https://arxiv.org/abs/1906.02569), ICML HILL 2019_, and please cite it if you use Gradio in your work.\n\n```\n@article{abid2019gradio,\n  title = {Gradio: Hassle-Free Sharing and Testing of ML Models in the Wild},\n  author = {Abid, Abubakar and Abdalla, Ali and Abid, Ali and Khan, Dawood and Alfozan, Abdulrahman and Zou, James},\n  journal = {arXiv preprint arXiv:1906.02569},\n  year = {2019},\n}\n```\n","summary":"Gradio is an open-source Python library designed to simplify the creation of interactive web applications for machine learning models, APIs, and arbitrary Python functions. It offers a user-friendly interface that allows developers to build functional web demos using only a few lines of code, completely eliminating the need for JavaScript, CSS, or complex web hosting configurations. This tool is ideal for data scientists, machine learning engineers, and researchers who want to quickly showcase, share, and gather feedback on their models with minimal development overhead.","description":"Build and share delightful machine learning apps, all in Python. 🌟 Star to support our work!","stars":42792,"language":"Python"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
