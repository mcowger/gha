L against a real agent\nOPENAI_API_KEY=your_key bun run packages/examples/chat/chat.ts\n```\n\nNearly every surface has a working example in [`packages/examples/`](packages/examples) — 30+ in total. Each one has its own README and runs independently. They are the fastest way to see the framework standing on its own. See [Examples](#examples) below for the highlights.\n\n> **About the partial clone.** `--filter=blob:none` gives you the full history but fetches file contents on demand — about 10× smaller. `git log`, branches, and `git checkout` work normally; `git blame` and `git log -p` will fetch on first use. To upgrade later: `git config --unset remote.origin.partialclonefilter && git fetch --refetch`. For one-off CI, `--depth=1 --single-branch` is even smaller.\n\n## Create a new project\n\nA project is a self-contained product workspace on top of the runtime: branded\napp shell, local eliza checkout, app plugin selection, platform config, and\ndeployment scripts. Two paths:\n\n**1. CLI scaffold (recommended).**\n\n```bash\nelizaos create my-app --template project\ncd my-app\nbun install\nbun run dev\n```\n\nThe project template lays out a full workspace with a local eliza checkout, default plugins (`plugin-sql`, `plugin-elizacloud`, `plugin-local-ai`, `plugin-ollama`), and a Vite + React UI you can edit immediately.\n\n**2. Copy a template directly.** [`packages/elizaos/templates/min-project/`](packages/elizaos/templates/min-project) is the smallest possible app — Vite + React UI, a runtime `Plugin` with one action, the `elizaos.app` metadata block in `package.json`, and a vitest smoke test. Read [`packages/elizaos/templates/min-project/SCAFFOLD.md`](packages/elizaos/templates/min-project/SCAFFOLD.md) for the placeholders to replace and the verification contract.\n\nFor first-party app plugin references, browse [`plugins/app-*`](plugins). A few starting points by complexity:\n\n- [`app-companion`](plugins/plugin-companion) — chat-first companion with a custom React UI.\n- [`app-browser`](plugins/app-browser) — agent-driven browser automation.\n- [`app-documents`](plugins/plugin-documents) — RAG over user documents (scoped global / owner-private / user-private / agent-private).\n- [`app-phone`](plugins/plugin-phone) — voice + telephony surface.\n- [`plugin-form`](plugins/plugin-form) — form-driven data collection.\n- [`app-task-coordinator`](plugins/plugin-task-coordinator) — multi-agent orchestration.\n- [`app-training`](plugins/plugin-training) — trajectory capture + native prompt optimization.\n\n## Create a new plugin\n\nA _plugin_ extends the runtime with actions, providers, or services — no UI required.\n\n```bash\nelizaos create my-plugin -t plugin\ncd my-plugin\nbun install\nbun run build\n```\n\nOr copy [`packages/elizaos/templates/min-plugin/`](packages/elizaos/templates/min-plugin) directly. See [`packages/elizaos/templates/min-plugin/SCAFFOLD.md`](packages/elizaos/templates/min-plugin/SCAFFOLD.md) for the contract.\n\nOnce typecheck, lint, and tests pass, publish to npm with the `elizaos` keyword. To request a curated listing, add an entry to [`packages/registry/entries/third-party`](packages/registry/entries/third-party) and open a pull request.\n\n## Examples\n\n[`packages/examples/`](packages/examples) — 30+ runnable references covering connectors, integrations, hosting targets, and gameplay. Each subdirectory is independently buildable and has its own README.\n\n| Category             | Examples                                                                                                                                                                                                                                                                                                           |\n| -------------------- | ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------ |\n| Conversational       | [`chat`](packages/examples/chat), [`discord`](packages/examples/discord), [`telegram`](packages/examples/telegram), [`farcaster`](packages/examples/farcaster), [`farcaster-miniapp`](packages/examples/farcaster-miniapp), [`twitter-xai`](packages/examples/twitter-xai), [`bluesky`](packages/examples/bluesky) |\n| Web frameworks       | [`next`](packages/examples/next), [`react`](packages/examples/react), [`html`](packages/examples/html), [`browser-extension`](packages/examples/browser-extension), [`rest-api`](packages/examples/rest-api)                                                                                                       |\n| Hosting / serverless | [`vercel`](packages/examples/vercel), [`cloudflare`](packages/examples/cloudflare), [`gcp`](packages/examples/gcp), [`aws`](packages/examples/aws), [`supabase`](packages/examples/supabase), [`convex`](packages/examples/convex)                                                                                 |\n| Protocols            | [`mcp`](packages/examples/mcp), [`a2a`](packages/examples/a2a)                                                                                                                                                                                                                                                     |\n| On-chain / trading   | [`polymarket`](packages/examples/polymarket), [`trader`](packages/examples/trader), [`lp-manager`](packages/examples/lp-manager)                                                                                                                                                                                   |\n| Fun / games          | [`tic-tac-toe`](packages/examples/tic-tac-toe), [`text-adventure`](packages/examples/text-adventure), [`game-of-life`](packages/examples/game-of-life), [`roblox`](packages/examples/roblox), [`elizagotchi`](packages/examples/elizagotchi)                                                                       |\n| Other                | [`autonomous`](packages/examples/autonomous), [`avatar`](packages/examples/avatar), [`code`](packages/examples/code), [`form`](packages/examples/form), [`moltbook`](packages/examples/moltbook), [`_plugin`](packages/examples/_plugin)                                                                           |\n\n## Benchmarks\n\n[`packages/benchmarks/`](packages/benchmarks) — 30+ evaluation suites for measuring agent capability. Each lives in its own subdirectory with its own harness and README.\n\n| Category           | Benchmarks                                                                                                                                                                                                                                                                                                                   |\n| ------------------ | ---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- |\n| General agent      | [`gaia`](packages/benchmarks/gaia), [`agentbench`](packages/benchmarks/agentbench), [`tau-bench`](packages/benchmarks/tau-bench), [`gauntlet`](packages/benchmarks/gauntlet), [`realm`](packages/benchmarks/realm), [`trust`](packages/benchmarks/trust), [`experience`](packages/benchmarks/experience)                     |\n| Coding             | [`swe_bench`](packages/benchmarks/swe_bench), [`bfcl`](packages/benchmarks/bfcl), [`mint`](packages/benchmarks/mint)                                                                                                                                                                                                         |\n| OS / desktop       | [`OSWorld`](packages/benchmarks/OSWorld), [`terminal-bench`](packages/benchmarks/terminal-bench)                                                                                                                                                                                                                             |\n| Web                | [`mind2web`](packages/benchmarks/mind2web), [`webshop`](packages/benchmarks/webshop)                                                                                                                                                                                                                                         |\n| On-chain / trading | [`HyperliquidBench`](packages/benchmarks/HyperliquidBench), [`solana`](packages/benchmarks/solana), [`evm`](packages/benchmarks/evm), [`vending-bench`](packages/benchmarks/vending-bench)                                                                                                                                   |\n| Voice / multimodal | [`voicebench`](packages/benchmarks/voicebench)                                                                                                                                                                                                                                                                               |\n| Specialized        | [`adhdbench`](packages/benchmarks/adhdbench), [`clawbench`](packages/benchmarks/clawbench), [`openclaw-benchmark`](packages/benchmarks/openclaw-benchmark), [`woobench`](packages/benchmarks/woobench), [`rlm-bench`](packages/benchmarks/rlm-bench), [`social-alpha`](packages/benchmarks/social-alpha)                     |\n| elizaOS-specific   | [`app-eval`](packages/benchmarks/app-eval), [`configbench`](packages/benchmarks/configbench), [`context-bench`](packages/benchmarks/context-bench), [`framework`](packages/benchmarks/framework), [`orchestrator`](packages/benchmarks/orchestrator), [`orchestrator_lifecycle`](packages/benchmarks/orchestrator_lifecycle) |\n\nThe runbook for orchestrator-driven benchmark runs is [`packages/benchmarks/ORCHESTRATOR_SUBAGENT_BENCHMARK_RUNBOOK.md`](packages/benchmarks/ORCHESTRATOR_SUBAGENT_BENCHMARK_RUNBOOK.md). The Eliza adapter that lets a benchmark drive an Eliza agent lives at [`packages/benchmarks/eliza-adapter`](packages/benchmarks/eliza-adapter). A combined results viewer is at [`packages/benchmarks/viewer`](packages/benchmarks/viewer).\n\n## Working in the monorepo\n\n```bash\nbun install            # workspace install\nbun run dev            # API + Vite UI for apps/app\nbun run build          # turbo build across the workspace\nbun run lint           # turbo lint across the workspace\nbun run test           # full test suite (packages/scripts/run-all-tests.mjs)\n```\n\nKey framework packages:\n\n- **[`@elizaos/core`](packages/core)** — runtime, types, agent loop. The package the framework starts and ends with.\n- **[`@elizaos/agent`](packages/agent)** — `AgentRuntime`, plugin loader, default plugin map.\n- **[`@elizaos/app-core`](packages/app-core)** — Express API + dashboard host that runs agents.\n- **[`elizaos`](packages/elizaos)** — the `elizaos` CLI: `create`, `info`, `upgrade`, `version`.\n- **[`@elizaos/prompts`](packages/prompts)** — shared prompt scaffolding.\n- **[`@elizaos/ui`](packages/ui)** — shared React component library.\n- **[`plugins/`](plugins)** — connectors and capabilities (Telegram, Discord, Farcaster, Twitter/X, browser, video, TEE, …).\n\n## Contributing\n\nContributions welcome. Open an issue before sending a non-trivial PR.\n\n- [Bug Report](.github/ISSUE_TEMPLATE/bug_report.md)\n- [Feature Request](.github/ISSUE_TEMPLATE/feature_request.md)\n\n## License\n\nMIT — see [LICENSE](LICENSE).\n\n## Contributors\n\n<a href=\"https://github.com/elizaos/eliza/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=elizaos/eliza\" alt=\"Eliza project contributors\" />\n</a>\n","summary":"elizaOS is an open-source, modular framework designed for building and deploying autonomous AI agents capable of tasks ranging from business automation to interactive gaming NPCs. The platform is model-agnostic and features extensive connectivity for popular platforms like Discord and Telegram, alongside a robust plugin system for custom functionality and document retrieval (RAG). By providing a powerful CLI and a professional web interface, it streamlines the full lifecycle of agent development and orchestration for developers looking to create sophisticated, multi-agent AI applications.","description":"Open source agentic operating system","stars":18504,"language":"TypeScript"},{"owner":"coleam00","repo":"bolt.new-any-llm","url":"https://github.com/coleam00/bolt.new-any-llm","readme":"# bolt.diy\n\n[![bolt.diy: AI-Powered Full-Stack Web Development in the Browser](./public/social_preview_index.jpg)](https://bolt.diy)\n\nWelcome to bolt.diy, the official open source version of Bolt.new, which allows you to choose the LLM that you use for each prompt! Currently, you can use OpenAI, Anthropic, Ollama, OpenRouter, Gemini, LMStudio, Mistral, xAI, HuggingFace, DeepSeek, Groq, Cohere, Together, Perplexity, Moonshot (Kimi), Hyperbolic, GitHub Models, Amazon Bedrock, and OpenAI-like providers - and it is easily extended to use any other model supported by the Vercel AI SDK! See the instructions below for running this locally and extending it to include more models.\n\n-----\nCheck the [bolt.diy Docs](https://stackblitz-labs.github.io/bolt.diy/) for more official installation instructions and additional information.\n\n-----\nAlso [this pinned post in our community](https://thinktank.ottomator.ai/t/videos-tutorial-helpful-content/3243) has a bunch of incredible resources for running and deploying bolt.diy yourself!\n\nWe have also launched an experimental agent called the \"bolt.diy Expert\" that can answer common questions about bolt.diy. Find it here on the [oTTomator Live Agent Studio](https://studio.ottomator.ai/).\n\nbolt.diy was originally started by [Cole Medin](https://www.youtube.com/@ColeMedin) but has quickly grown into a massive community effort to build the BEST open source AI coding assistant!\n\n## Table of Contents\n\n- [Join the Community](#join-the-community)\n- [Recent Major Additions](#recent-major-additions)\n- [Features](#features)\n- [Setup](#setup)\n- [Quick Installation](#quick-installation)\n- [Manual Installation](#manual-installation)\n- [Configuring API Keys and Providers](#configuring-api-keys-and-providers)\n- [Setup Using Git (For Developers only)](#setup-using-git-for-developers-only)\n- [Available Scripts](#available-scripts)\n- [Contributing](#contributing)\n- [Roadmap](#roadmap)\n- [FAQ](#faq)\n\n## Join the community\n\n[Join the bolt.diy community here, in the oTTomator Think Tank!](https://thinktank.ottomator.ai)\n\n## Project management\n\nBolt.diy is a community effort! Still, the core team of contributors aims at organizing the project in way that allows\nyou to understand where the current areas of focus are.\n\nIf you want to know what we are working on, what we are planning to work on, or if you want to contribute to the\nproject, please check the [project management guide](./PROJECT.md) to get started easily.\n\n## Recent Major Additions\n\n### ✅ Completed Features\n- **19+ AI Provider Integrations** - OpenAI, Anthropic, Google, Groq, xAI, DeepSeek, Mistral, Cohere, Together, Perplexity, HuggingFace, Ollama, LM Studio, OpenRouter, Moonshot, Hyperbolic, GitHub Models, Amazon Bedrock, OpenAI-like\n- **Electron Desktop App** - Native desktop experience with full functionality\n- **Advanced Deployment Options** - Netlify, Vercel, and GitHub Pages deployment\n- **Supabase Integration** - Database management and query capabilities\n- **Data Visualization & Analysis** - Charts, graphs, and data analysis tools\n- **MCP (Model Context Protocol)** - Enhanced AI tool integration\n- **Search Functionality** - Codebase search and navigation\n- **File Locking System** - Prevents conflicts during AI code generation\n- **Diff View** - Visual representation of AI-made changes\n- **Git Integration** - Clone, import, and deployment capabilities\n- **Expo App Creation** - React Native development support\n- **Voice Prompting** - Audio input for prompts\n- **Bulk Chat Operations** - Delete multiple chats at once\n- **Project Snapshot Restoration** - Restore projects from snapshots on reload\n\n### 🔄 In Progress / Planned\n- **File Locking & Diff Improvements** - Enhanced conflict prevention\n- **Backend Agent Architecture** - Move from single model calls to agent-based system\n- **LLM Prompt Optimization** - Better performance for smaller models\n- **Project Planning Documentation** - LLM-generated project plans in markdown\n- **VSCode Integration** - Git-like confirmations and workflows\n- **Document Upload for Knowledge** - Reference materials and coding style guides\n- **Additional Provider Integrations** - Azure OpenAI, Vertex AI, Granite\n\n## Features\n\n- **AI-powered full-stack web development** for **NodeJS based applications** directly in your browser.\n- **Support for 19+ LLMs** with an extensible architecture to integrate additional models.\n- **Attach images to prompts** for better contextual understanding.\n- **Integrated terminal** to view output of LLM-run commands.\n- **Revert code to earlier versions** for easier debugging and quicker changes.\n- **Download projects as ZIP** for easy portability and sync to a folder on the host.\n- **Integration-ready Docker support** for a hassle-free setup.\n- **Deploy directly** to **Netlify**, **Vercel**, or **GitHub Pages**.\n- **Electron desktop app** for native desktop experience.\n- **Data visualization and analysis** with integrated charts and graphs.\n- **Git integration** with clone, import, and deployment capabilities.\n- **MCP (Model Context Protocol)** support for enhanced AI tool integration.\n- **Search functionality** to search through your codebase.\n- **File locking system** to prevent conflicts during AI code generation.\n- **Diff view** to see changes made by the AI.\n- **Supabase integration** for database management and queries.\n- **Expo app creation** for React Native development.\n\n## Setup\n\nIf you're new to installing software from GitHub, don't worry! If you encounter any issues, feel free to submit an \"issue\" using the provided links or improve this documentation by forking the repository, editing the instructions, and submitting a pull request. The following instruction will help you get the stable branch up and running on your local machine in no time.\n\nLet's get you up and running with the stable version of Bolt.DIY!\n\n## Quick Installation\n\n[![Download Latest Release](https://img.shields.io/github/v/release/stackblitz-labs/bolt.diy?label=Download%20Bolt&sort=semver)](https://github.com/stackblitz-labs/bolt.diy/releases/latest) ← Click here to go to the latest release version!\n\n- Download the binary for your platform (available for Windows, macOS, and Linux)\n- **Note**: For macOS, if you get the error \"This app is damaged\", run:\n  ```bash\n  xattr -cr /path/to/Bolt.app\n  ```\n\n## Manual installation\n\n\n### Option 1: Node.js\n\nNode.js is required to run the application.\n\n1. Visit the [Node.js Download Page](https://nodejs.org/en/download/)\n2. Download the \"LTS\" (Long Term Support) version for your operating system\n3. Run the installer, accepting the default settings\n4. Verify Node.js is properly installed:\n   - **For Windows Users**:\n     1. Press `Windows + R`\n     2. Type \"sysdm.cpl\" and press Enter\n     3. Go to \"Advanced\" tab → \"Environment Variables\"\n     4. Check if `Node.js` appears in the \"Path\" variable\n   - **For Mac/Linux Users**:\n     1. Open Terminal\n     2. Type this command:\n        ```bash\n        echo $PATH\n        ```\n     3. Look for `/usr/local/bin` in the output\n\n## Running the Application\n\nYou have two options for running Bolt.DIY: directly on your machine or using Docker.\n\n### Option 1: Direct Installation (Recommended for Beginners)\n\n1. **Install Package Manager (pnpm)**:\n\n   ```bash\n   npm install -g pnpm\n   ```\n\n2. **Install Project Dependencies**:\n\n   ```bash\n   pnpm install\n   ```\n\n3. **Start the Application**:\n\n   ```bash\n   pnpm run dev\n   ```\n   \n### Option 2: Using Docker\n\nThis option requires Docker and is great when you want an isolated environment or to mirror the production image.\n\n#### Additional Prerequisite\n\n- Install Docker: [Download Docker](https://www.docker.com/)\n\n#### Steps\n\n1. **Prepare Environment Variables**\n\n   Copy the provided examples and add your provider keys:\n\n   ```bash\n   cp .env.example .env\n   cp .env.example .env.local\n   ```\n\n   The runtime scripts inside the container source `.env` and `.env.local`, so keep any API keys you need in one of those files.\n\n2. **Build an Image**\n\n   ```bash\n   # Development image (bind-mounts your local source when run)\n   pnpm run dockerbuild\n   # ≈ docker build -t bolt-ai:development -t bolt-ai:latest --target development .\n\n   # Production image (self-contained build artifacts)\n   pnpm run dockerbuild:prod\n   # ≈ docker build -t bolt-ai:production -t bolt-ai:latest --target bolt-ai-production .\n   ```\n\n3. **Run the Container**\n\n   ```bash\n   # Development workflow with hot reload\n   docker compose --profile development up\n\n   # Production-style container using composed services\n   docker compose --profile production up\n\n   # One-off production container (exposes the app on port 5173)\n   docker run --rm -p 5173:5173 --env-file .env.local bolt-ai:latest\n   ```\n\n   When the container starts it runs `pnpm run dockerstart`, which in turn executes `bindings.sh` to pass Cloudflare bindings through Wrangler. You can override this command in `docker-compose.yaml` if you need a different startup routine.\n\n### Option 3: Desktop Application (Electron)\n\nFor users who prefer a native desktop experience, bolt.diy is also available as an Electron desktop application:\n\n1. **Download the Desktop App**:\n   - Visit the [latest release](https://github.com/stackblitz-labs/bolt.diy/releases/latest)\n   - Download the appropriate binary for your operating system\n   - For macOS: Extract and run the `.dmg` file\n   - For Windows: Run the `.exe` installer\n   - For Linux: Extract and run the AppImage or install the `.deb` package\n\n2. **Alternative**: Build from Source:\n   ```bash\n   # Install dependencies\n   pnpm install\n\n   # Build the Electron app\n   pnpm electron:build:dist  # For all platforms\n   # OR platform-specific:\n   pnpm electron:build:mac   # macOS\n   pnpm electron:build:win   # Windows\n   pnpm electron:build:linux # Linux\n   ```\n\nThe desktop app provides the same full functionality as the web version with additional native features.\n\n## Configuring API Keys and Providers\n\nBolt.diy features a modern, intuitive settings interface for managing AI providers and API keys. The settings are organized into dedicated panels for easy navigation and configuration.\n\n### Accessing Provider Settings\n\n1. **Open Settings**: Click the settings icon (⚙️) in the sidebar to access the settings panel\n2. **Navigate to Providers**: Select the \"Providers\" tab from the settings menu\n3. **Choose Provider Type**: Switch between \"Cloud Providers\" and \"Local Providers\" tabs\n\n### Cloud Providers Configuration\n\nThe Cloud Providers tab displays all cloud-based AI services in an organized card layout:\n\n#### Adding API Keys\n1. **Select Provider**: Browse the grid of available cloud providers (OpenAI, Anthropic, Google, etc.)\n2. **Toggle Provider**: Use the switch to enable/disable each provider\n3. **Set API Key**:\n   - Click the provider card to expand its configuration\n   - Click on the \"API Key\" field to enter edit mode\n   - Paste your API key and press Enter to save\n   - The interface shows real-time validation with green checkmarks for valid keys\n\n#### Advanced Features\n- **Bulk Toggle**: Use \"Enable All Cloud\" to toggle all cloud providers at once\n- **Visual Status**: Green checkmarks indicate properly configured providers\n- **Provider Icons**: Each provider has a distinctive icon for easy identification\n- **Descriptions**: Helpful descriptions explain each provider's capabilities\n\n### Local Providers Configuration\n\nThe Local Providers tab manages local AI installations and custom endpoints:\n\n#### Ollama Configuration\n1. **Enable Ollama**: Toggle the Ollama provider switch\n2. **Configure Endpoint**: Set the API endpoint (defaults to `http://127.0.0.1:11434`)\n3. **Model Management**:\n   - View all installed models with size and parameter information\n   - Update models to latest versions with one click\n   - Delete unused models\n   - Install new models by entering model names\n\n#### Other Local Providers\n- **LM Studio**: Configure custom base URLs for LM Studio endpoints\n- **OpenAI-like**: Connect to any OpenAI-compatible API endpoint\n- **Auto-detection**: The system automatically detects environment variables for base URLs\n\n### Environment Variables vs UI Configuration\n\nBolt.diy supports both methods for maximum flexibility:\n\n#### Environment Variables (Recommended for Production)\nSet API keys and base URLs in your `.env.local` file:\n```bash\n# API Keys\nOPENAI_API_KEY=your_openai_key_here\nANTHROPIC_API_KEY=your_anthropic_key_here\n\n# Custom Base URLs\nOLLAMA_BASE_URL=http://127.0.0.1:11434\nLMSTUDIO_BASE_URL=http://127.0.0.1:1234\n```\n\n#### UI-Based Configuration\n- **Real-time Updates**: Changes take effect immediately\n- **Secure Storage**: API keys are stored securely in browser cookies\n- **Visual Feedback**: Clear indicators show configuration status\n- **Easy Management**: Edit, view, and manage keys through the interface\n\n### Provider-Specific Features\n\n#### OpenRouter\n- **Free Models Filter**: Toggle to show only free models when browsing\n- **Pricing Information**: View input/output costs for each model\n- **Model Search**: Fuzzy search through all available models\n\n#### Ollama\n- **Model Installer**: Built-in interface to install new models\n- **Progress Tracking**: Real-time download progress for model updates\n- **Model Details**: View model size, parameters, and quantization levels\n- **Auto-refresh**: Automatically detects newly installed models\n\n#### Search & Navigation\n- **Fuzzy Search**: Type-ahead search across all providers and models\n- **Keyboard Navigation**: Use arrow keys and Enter to navigate quickly\n- **Clear Search**: Press `Cmd+K` (Mac) or `Ctrl+K` (Windows/Linux) to clear search\n\n### Troubleshooting\n\n#### Common Issues\n- **API Key Not Recognized**: Ensure you're using the correct API key format for each provider\n- **Base URL Issues**: Verify the endpoint URL is correct and accessible\n- **Model Not Loading**: Check that the provider is enabled and properly configured\n- **Environment Variables Not Working**: Restart the application after adding new environment variables\n\n#### Status Indicators\n- 🟢 **Green Checkmark**: Provider properly configured and ready to use\n- 🔴 **Red X**: Configuration missing or invalid\n- 🟡 **Yellow Indicator**: Provider enabled but may need additional setup\n- 🔵 **Blue Pencil**: Click to edit configuration\n\n### Supported Providers Overview\n\n#### Cloud Providers\n- **OpenAI** - GPT-4, GPT-3.5, and other OpenAI models\n- **Anthropic** - Claude 3.5 Sonnet, Claude 3 Opus, and other Claude models\n- **Google (Gemini)** - Gemini 1.5 Pro, Gemini 1.5 Flash, and other Gemini models\n- **Groq** - Fast inference with Llama, Mixtral, and other models\n- **xAI** - Grok models including Grok-2 and Grok-2 Vision\n- **DeepSeek** - DeepSeek Coder and other DeepSeek models\n- **Mistral** - Mixtral, Mistral 7B, and other Mistral models\n- **Cohere** - Command R, Command R+, and other Cohere models\n- **Together AI** - Various open-source models\n- **Perplexity** - Sonar models for search and reasoning\n- **HuggingFace** - Access to HuggingFace model hub\n- **OpenRouter** - Unified API for multiple model providers\n- **Moonshot (Kimi)** - Kimi AI models\n- **Hyperbolic** - High-performance model inference\n- **GitHub Models** - Models available through GitHub\n- **Amazon Bedrock** - AWS managed AI models\n\n#### Local Providers\n- **Ollama** - Run open-source models locally with advanced model management\n- **LM Studio** - Local model inference with LM Studio\n- **OpenAI-like** - Connect to any OpenAI-compatible API endpoint\n\n> **💡 Pro Tip**: Start with OpenAI or Anthropic for the best results, then explore other providers based on your specific needs and budget considerations.\n\n## Setup Using Git (For Developers only)\n\nThis method is recommended for developers who want to:\n\n- Contribute to the project\n- Stay updated with the latest changes\n- Switch between different versions\n- Create custom modifications\n\n#### Prerequisites\n\n1. Install Git: [Download Git](https://git-scm.com/downloads)\n\n#### Initial Setup\n\n1. **Clone the Repository**:\n\n   ```bash\n   git clone -b stable https://github.com/stackblitz-labs/bolt.diy.git\n   ```\n\n2. **Navigate to Project Directory**:\n\n   ```bash\n   cd bolt.diy\n   ```\n\n3. **Install Dependencies**:\n\n   ```bash\n   pnpm install\n   ```\n\n4. **Start the Development Server**:\n   ```bash\n   pnpm run dev\n   ```\n\n5. **(OPTIONAL)** Switch to the Main Branch if you want to use pre-release/testbranch:\n   ```bash\n   git checkout main\n   pnpm install\n   pnpm run dev\n   ```\n  Hint: Be aware that this can have beta-features and more likely got bugs than the stable release\n\n>**Open the WebUI to test (Default: http://localhost:5173)**\n>   - Beginners: \n>     - Try to use a sophisticated Provider/Model like Anthropic with Claude Sonnet 3.x Models to get best results\n>     - Explanation: The System Prompt currently implemented in bolt.diy cant cover the best performance for all providers and models out there. So it works better with some models, then other, even if the models itself are perfect for >programming\n>     - Future: Planned is a Plugin/Extentions-Library so there can be different System Prompts for different Models, which will help to get better results\n\n#### Staying Updated\n\nTo get the latest changes from the repository:\n\n1. **Save Your Local Changes** (if any):\n\n   ```bash\n   git stash\n   ```\n\n2. **Pull Latest Updates**:\n\n   ```bash\n   git pull \n   ```\n\n3. **Update Dependencies**:\n\n   ```bash\n   pnpm install\n   ```\n\n4. **Restore Your Local Changes** (if any):\n   ```bash\n   git stash pop\n   ```\n\n#### Troubleshooting Git Setup\n\nIf you encounter issues:\n\n1. **Clean Installation**:\n\n   ```bash\n   # Remove node modules and lock files\n   rm -rf node_modules pnpm-lock.yaml\n\n   # Clear pnpm cache\n   pnpm store prune\n\n   # Reinstall dependencies\n   pnpm install\n   ```\n\n2. **Reset Local Changes**:\n   ```bash\n   # Discard all local changes\n   git reset --hard origin/main\n   ```\n\nRemember to always commit your local changes or stash them before pulling updates to avoid conflicts.\n\n---\n\n## Available Scripts\n\n- **`pnpm run dev`**: Starts the development server.\n- **`pnpm run build`**: Builds the project.\n- **`pnpm run start`**: Runs the built application locally using Wrangler Pages.\n- **`pnpm run preview`**: Builds and runs the production build locally.\n- **`pnpm test`**: Runs the test suite using Vitest.\n- **`pnpm run typecheck`**: Runs TypeScript type checking.\n- **`pnpm run typegen`**: Generates TypeScript types using Wrangler.\n- **`pnpm run deploy`**: Deploys the project to Cloudflare Pages.\n- **`pnpm run lint`**: Runs ESLint to check for code issues.\n- **`pnpm run lint:fix`**: Automatically fixes linting issues.\n- **`pnpm run clean`**: Cleans build artifacts and cache.\n- **`pnpm run prepare`**: Sets up husky for git hooks.\n- **Docker Scripts**:\n  - **`pnpm run dockerbuild`**: Builds the Docker image for development.\n  - **`pnpm run dockerbuild:prod`**: Builds the Docker image for production.\n  - **`pnpm run dockerrun`**: Runs the Docker container.\n  - **`pnpm run dockerstart`**: Starts the Docker container with proper bindings.\n- **Electron Scripts**:\n  - **`pnpm electron:build:deps`**: Builds Electron main and preload scripts.\n  - **`pnpm electron:build:main`**: Builds the Electron main process.\n  - **`pnpm electron:build:preload`**: Builds the Electron preload script.\n  - **`pnpm electron:build:renderer`**: Builds the Electron renderer.\n  - **`pnpm electron:build:unpack`**: Creates an unpacked Electron build.\n  - **`pnpm electron:build:mac`**: Builds for macOS.\n  - **`pnpm electron:build:win`**: Builds for Windows.\n  - **`pnpm electron:build:linux`**: Builds for Linux.\n  - **`pnpm electron:build:dist`**: Builds for all platforms.\n\n---\n\n## Contributing\n\nWe welcome contributions! Check out our [Contributing Guide](CONTRIBUTING.md) to get started.\n\n---\n\n## Roadmap\n\nExplore upcoming features and priorities on our [Roadmap](https://roadmap.sh/r/ottodev-roadmap-2ovzo).\n\n---\n\n## FAQ\n\nFor answers to common questions, issues, and to see a list of recommended models, visit our [FAQ Page](FAQ.md).\n\n\n# Licensing\n**Who needs a commercial WebContainer API license?**\n\nbolt.diy source code is distributed as MIT, but it uses WebContainers API that [requires licensing](https://webcontainers.io/enterprise) for production usage in a commercial, for-profit setting. (Prototypes or POCs do not require a commercial license.) If you're using the API to meet the needs of your customers, prospective customers, and/or employees, you need a license to ensure compliance with our Terms of Service. Usage of the API in violation of these terms may result in your access being revoked.\n# Test commit to trigger Security Analysis workflow\n","summary":"Bolt.diy is an open-source, AI-powered web development environment that serves as an extensible alternative to Bolt.new, allowing users to leverage a vast array of LLMs for full-stack coding tasks. The platform supports over 19 AI providers, including OpenAI, Anthropic, Ollama, and OpenRouter, while offering advanced features like native desktop integration, Git version control, and real-time diff views for code modifications. This tool is ideal for developers and hobbyists who want a flexible, community-driven coding assistant that provides deep control over which AI models drive their development workflow.","description":"Prompt, run, edit, and deploy full-stack web applications using any LLM you want!","stars":19424,"language":"TypeScript"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
