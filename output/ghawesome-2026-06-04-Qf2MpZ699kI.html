 that leverages Large Language Models to simulate artificial agents with distinct personalities, interests, and goals within customizable environments. By enabling these \"TinyPersons\" to interact and respond to specific prompts, the project provides powerful tools for synthetic data generation, focus group simulation, and automated feedback on product or advertising strategies. It is particularly well-suited for researchers, product managers, and software developers looking to gain behavioral insights, evaluate system performance, and enhance decision-making through realistic, simulated human perspectives.","description":"LLM-powered multiagent persona simulation for imagination enhancement and business insights.","stars":7469,"language":"Jupyter Notebook"},{"owner":"blacklanternsecurity","repo":"bbot","url":"https://github.com/blacklanternsecurity/bbot","readme":"[![bbot_banner](https://github.com/user-attachments/assets/f02804ce-9478-4f1e-ac4d-9cf5620a3214)](https://github.com/blacklanternsecurity/bbot)\n\n[![Python Version](https://img.shields.io/badge/python-3.9+-FF8400)](https://www.python.org) [![License](https://img.shields.io/badge/license-AGPLv3-FF8400.svg)](https://github.com/blacklanternsecurity/bbot/blob/dev/LICENSE) [![DEF CON Recon Village 2024](https://img.shields.io/badge/DEF%20CON%20Demo%20Labs-2023-FF8400.svg)](https://www.reconvillage.org/talks) [![PyPi Downloads](https://static.pepy.tech/personalized-badge/bbot?right_color=orange&left_color=grey)](https://pepy.tech/project/bbot) [![Ruff](https://img.shields.io/endpoint?url=https://raw.githubusercontent.com/astral-sh/ruff/main/assets/badge/v2.json)](https://github.com/astral-sh/ruff) [![Tests](https://github.com/blacklanternsecurity/bbot/actions/workflows/tests.yml/badge.svg?branch=stable)](https://github.com/blacklanternsecurity/bbot/actions?query=workflow%3A\"tests\") [![Codecov](https://codecov.io/gh/blacklanternsecurity/bbot/branch/dev/graph/badge.svg?token=IR5AZBDM5K)](https://codecov.io/gh/blacklanternsecurity/bbot) [![Discord](https://img.shields.io/discord/859164869970362439)](https://discord.com/invite/PZqkgxu5SA)\n\n### **BEE·bot** is a multipurpose scanner inspired by [Spiderfoot](https://github.com/smicallef/spiderfoot), built to automate your **Recon**, **Bug Bounties**, and **ASM**!\n\nhttps://github.com/blacklanternsecurity/bbot/assets/20261699/e539e89b-92ea-46fa-b893-9cde94eebf81\n\n_A BBOT scan in real-time - visualization with [VivaGraphJS](https://github.com/blacklanternsecurity/bbot-vivagraphjs)_\n\n## Installation\n\n```bash\n# stable version\npipx install bbot\n\n# bleeding edge (dev branch)\npipx install --pip-args '\\--pre' bbot\n```\n\n_For more installation methods, including [Docker](https://hub.docker.com/r/blacklanternsecurity/bbot), see [Getting Started](https://www.blacklanternsecurity.com/bbot/Stable/)_\n\n## Example Commands\n\n### 1) Subdomain Finder\n\nPassive API sources plus a recursive DNS brute-force with target-specific subdomain mutations.\n\n```bash\n# find subdomains of evilcorp.com\nbbot -t evilcorp.com -p subdomain-enum\n\n# passive sources only\nbbot -t evilcorp.com -p subdomain-enum -rf passive\n```\n\n<!-- BBOT SUBDOMAIN-ENUM PRESET EXPANDABLE -->\n\n<details>\n<summary><b><code>subdomain-enum.yml</code></b></summary>\n\n```yaml\ndescription: Enumerate subdomains via APIs, brute-force\n\nflags:\n  # enable every module with the subdomain-enum flag\n  - subdomain-enum\n\noutput_modules:\n  # output unique subdomains to TXT file\n  - subdomains\n\nconfig:\n  dns:\n    threads: 25\n    brute_threads: 1000\n  # put your API keys here\n  # modules:\n  #   github:\n  #     api_key: \"\"\n  #   chaos:\n  #     api_key: \"\"\n  #   securitytrails:\n  #     api_key: \"\"\n\n```\n\n</details>\n\n<!-- END BBOT SUBDOMAIN-ENUM PRESET EXPANDABLE -->\n\nBBOT consistently finds 20-50% more subdomains than other tools. The bigger the domain, the bigger the difference. To learn how this is possible, see [How It Works](https://www.blacklanternsecurity.com/bbot/Dev/how_it_works/).\n\n![subdomain-stats-ebay](https://github.com/blacklanternsecurity/bbot/assets/20261699/de3e7f21-6f52-4ac4-8eab-367296cd385f)\n\n### 2) Web Spider\n\n```bash\n# crawl evilcorp.com, extracting emails and other goodies\nbbot -t evilcorp.com -p spider\n```\n\n<!-- BBOT SPIDER PRESET EXPANDABLE -->\n\n<details>\n<summary><b><code>spider.yml</code></b></summary>\n\n```yaml\ndescription: Recursive web spider\n\nmodules:\n  - httpx\n\nblacklist:\n  # Prevent spider from invalidating sessions by logging out\n  - \"RE:/.*(sign|log)[_-]?out\"\n\nconfig:\n  web:\n    # how many links to follow in a row\n    spider_distance: 2\n    # don't follow links whose directory depth is higher than 4\n    spider_depth: 4\n    # maximum number of links to follow per page\n    spider_links_per_page: 25\n\n```\n\n</details>\n\n<!-- END BBOT SPIDER PRESET EXPANDABLE -->\n\n### 3) Email Gatherer\n\n```bash\n# quick email enum with free APIs + scraping\nbbot -t evilcorp.com -p email-enum\n\n# pair with subdomain enum + web spider for maximum yield\nbbot -t evilcorp.com -p email-enum subdomain-enum spider\n```\n\n<!-- BBOT EMAIL-ENUM PRESET EXPANDABLE -->\n\n<details>\n<summary><b><code>email-enum.yml</code></b></summary>\n\n```yaml\ndescription: Enumerate email addresses from APIs, web crawling, etc.\n\nflags:\n  - email-enum\n\noutput_modules:\n  - emails\n\n```\n\n</details>\n\n<!-- END BBOT EMAIL-ENUM PRESET EXPANDABLE -->\n\n### 4) Web Scanner\n\n```bash\n# run a light web scan against www.evilcorp.com\nbbot -t www.evilcorp.com -p web-basic\n\n# run a heavy web scan against www.evilcorp.com\nbbot -t www.evilcorp.com -p web-thorough\n```\n\n<!-- BBOT WEB-BASIC PRESET EXPANDABLE -->\n\n<details>\n<summary><b><code>web-basic.yml</code></b></summary>\n\n```yaml\ndescription: Quick web scan\n\ninclude:\n  - iis-shortnames\n\nflags:\n  - web-basic\n\n```\n\n</details>\n\n<!-- END BBOT WEB-BASIC PRESET EXPANDABLE -->\n\n<!-- BBOT WEB-THOROUGH PRESET EXPANDABLE -->\n\n<details>\n<summary><b><code>web-thorough.yml</code></b></summary>\n\n```yaml\ndescription: Aggressive web scan\n\ninclude:\n  # include the web-basic preset\n  - web-basic\n\nflags:\n  - web-thorough\n\n```\n\n</details>\n\n<!-- END BBOT WEB-THOROUGH PRESET EXPANDABLE -->\n\n### 5) Everything Everywhere All at Once\n\n```bash\n# everything everywhere all at once\nbbot -t evilcorp.com -p kitchen-sink --allow-deadly\n\n# roughly equivalent to:\nbbot -t evilcorp.com -p subdomain-enum cloud-enum code-enum email-enum spider web-basic paramminer dirbust-light web-screenshots --allow-deadly\n```\n\n<!-- BBOT KITCHEN-SINK PRESET EXPANDABLE -->\n\n<details>\n<summary><b><code>kitchen-sink.yml</code></b></summary>\n\n```yaml\ndescription: Everything everywhere all at once\n\ninclude:\n  - subdomain-enum\n  - cloud-enum\n  - code-enum\n  - email-enum\n  - spider\n  - web-basic\n  - paramminer\n  - dirbust-light\n  - web-screenshots\n  - baddns-intense\n\nconfig:\n  modules:\n    baddns:\n      enable_references: True\n\n```\n\n</details>\n\n<!-- END BBOT KITCHEN-SINK PRESET EXPANDABLE -->\n\n## How it Works\n\nClick the graph below to explore the [inner workings](https://www.blacklanternsecurity.com/bbot/Stable/how_it_works/) of BBOT.\n\n[![image](https://github.com/blacklanternsecurity/bbot/assets/20261699/e55ba6bd-6d97-48a6-96f0-e122acc23513)](https://www.blacklanternsecurity.com/bbot/Stable/how_it_works/)\n\n## Output Modules\n\n- [Neo4j](docs/scanning/output.md#neo4j)\n- [Teams](docs/scanning/output.md#teams)\n- [Discord](docs/scanning/output.md#discord)\n- [Slack](docs/scanning/output.md#slack)\n- [Postgres](docs/scanning/output.md#postgres)\n- [MySQL](docs/scanning/output.md#mysql)\n- [SQLite](docs/scanning/output.md#sqlite)\n- [Splunk](docs/scanning/output.md#splunk)\n- [Elasticsearch](docs/scanning/output.md#elasticsearch)\n- [CSV](docs/scanning/output.md#csv)\n- [JSON](docs/scanning/output.md#json)\n- [HTTP](docs/scanning/output.md#http)\n- [Websocket](docs/scanning/output.md#websocket)\n\n...and [more](docs/scanning/output.md)!\n\n## BBOT as a Python Library\n\n#### Synchronous\n```python\nfrom bbot.scanner import Scanner\n\nif __name__ == \"__main__\":\n    scan = Scanner(\"evilcorp.com\", presets=[\"subdomain-enum\"])\n    for event in scan.start():\n        print(event)\n```\n\n#### Asynchronous\n```python\nfrom bbot.scanner import Scanner\n\nasync def main():\n    scan = Scanner(\"evilcorp.com\", presets=[\"subdomain-enum\"])\n    async for event in scan.async_start():\n        print(event.json())\n\nif __name__ == \"__main__\":\n    import asyncio\n    asyncio.run(main())\n```\n\n<details>\n<summary><b>SEE: This Nefarious Discord Bot</b></summary>\n\nA [BBOT Discord Bot](https://www.blacklanternsecurity.com/bbot/Stable/dev/#discord-bot-example) that responds to the `/scan` command. Scan the internet from the comfort of your discord server!\n\n![bbot-discord](https://github.com/blacklanternsecurity/bbot/assets/20261699/22b268a2-0dfd-4c2a-b7c5-548c0f2cc6f9)\n\n</details>\n\n## Feature Overview\n\n- Support for Multiple Targets\n- Web Screenshots\n- Suite of Offensive Web Modules\n- NLP-powered Subdomain Mutations\n- Native Output to Neo4j (and more)\n- Automatic dependency install with Ansible\n- Search entire attack surface with custom YARA rules\n- Python API + Developer Documentation\n\n## Targets\n\nBBOT accepts an unlimited number of targets via `-t`. You can specify targets either directly on the command line or in files (or both!):\n\n```bash\nbbot -t evilcorp.com evilcorp.org 1.2.3.0/24 -p subdomain-enum\n```\n\nTargets can be any of the following:\n\n- DNS Name (`evilcorp.com`)\n- IP Address (`1.2.3.4`)\n- IP Range (`1.2.3.0/24`)\n- Open TCP Port (`192.168.0.1:80`)\n- URL (`https://www.evilcorp.com`)\n- Email Address (`bob@evilcorp.com`)\n- Organization (`ORG:evilcorp`)\n- Username (`USER:bobsmith`)\n- Filesystem (`FILESYSTEM:/tmp/asdf`)\n- Mobile App (`MOBILE_APP:https://play.google.com/store/apps/details?id=com.evilcorp.app`)\n\nFor more information, see [Targets](https://www.blacklanternsecurity.com/bbot/Stable/scanning/#targets-t). To learn how BBOT handles scope, see [Scope](https://www.blacklanternsecurity.com/bbot/Stable/scanning/#scope).\n\n## API Keys\n\nSimilar to Amass or Subfinder, BBOT supports API keys for various third-party services such as SecurityTrails, etc.\n\nThe standard way to do this is to enter your API keys in **`~/.config/bbot/bbot.yml`**. Note that multiple API keys are allowed:\n```yaml\nmodules:\n  shodan_dns:\n    api_key: 4f41243847da693a4f356c0486114bc6\n  c99:\n    # multiple API keys\n    api_key:\n      - 21a270d5f59c9b05813a72bb41707266\n      - ea8f243d9885cf8ce9876a580224fd3c\n      - 5bc6ed268ab6488270e496d3183a1a27\n  virustotal:\n    api_key: dd5f0eee2e4a99b71a939bded450b246\n  securitytrails:\n    api_key: d9a05c3fd9a514497713c54b4455d0b0\n```\n\nIf you like, you can also specify them on the command line:\n```bash\nbbot -c modules.virustotal.api_key=dd5f0eee2e4a99b71a939bded450b246\n```\n\nFor details, see [Configuration](https://www.blacklanternsecurity.com/bbot/Stable/scanning/configuration/).\n\n## Complete Lists of Modules, Flags, etc.\n\n- Complete list of [Modules](https://www.blacklanternsecurity.com/bbot/Stable/modules/list_of_modules/).\n- Complete list of [Flags](https://www.blacklanternsecurity.com/bbot/Stable/scanning/#list-of-flags).\n- Complete list of [Presets](https://www.blacklanternsecurity.com/bbot/Stable/scanning/presets_list/).\n    - Complete list of [Global Config Options](https://www.blacklanternsecurity.com/bbot/Stable/scanning/configuration/#global-config-options).\n    - Complete list of [Module Config Options](https://www.blacklanternsecurity.com/bbot/Stable/scanning/configuration/#module-config-options).\n\n## Documentation\n\n<!-- BBOT DOCS TOC -->\n- **User Manual**\n    - **Basics**\n        - [Getting Started](https://www.blacklanternsecurity.com/bbot/Stable/)\n        - [How it Works](https://www.blacklanternsecurity.com/bbot/Stable/how_it_works)\n        - [Comparison to Other Tools](https://www.blacklanternsecurity.com/bbot/Stable/comparison)\n    - **Scanning**\n        - [Scanning Overview](https://www.blacklanternsecurity.com/bbot/Stable/scanning/)\n        - **Presets**\n            - [Overview](https://www.blacklanternsecurity.com/bbot/Stable/scanning/presets)\n            - [List of Presets](https://www.blacklanternsecurity.com/bbot/Stable/scanning/presets_list)\n        - [Events](https://www.blacklanternsecurity.com/bbot/Stable/scanning/events)\n        - [Output](https://www.blacklanternsecurity.com/bbot/Stable/scanning/output)\n        - [Tips and Tricks](https://www.blacklanternsecurity.com/bbot/Stable/scanning/tips_and_tricks)\n        - [Advanced Usage](https://www.blacklanternsecurity.com/bbot/Stable/scanning/advanced)\n        - [Configuration](https://www.blacklanternsecurity.com/bbot/Stable/scanning/configuration)\n    - **Modules**\n        - [List of Modules](https://www.blacklanternsecurity.com/bbot/Stable/modules/list_of_modules)\n        - [Nuclei](https://www.blacklanternsecurity.com/bbot/Stable/modules/nuclei)\n        - [Custom YARA Rules](https://www.blacklanternsecurity.com/bbot/Stable/modules/custom_yara_rules)\n        - [Lightfuzz](https://www.blacklanternsecurity.com/bbot/Stable/modules/lightfuzz)\n    - **Misc**\n        - [Contribution](https://www.blacklanternsecurity.com/bbot/Stable/contribution)\n        - [Release History](https://www.blacklanternsecurity.com/bbot/Stable/release_history)\n        - [Troubleshooting](https://www.blacklanternsecurity.com/bbot/Stable/troubleshooting)\n- **Developer Manual**\n    - [Development Overview](https://www.blacklanternsecurity.com/bbot/Stable/dev/)\n    - [Setting Up a Dev Environment](https://www.blacklanternsecurity.com/bbot/Stable/dev/dev_environment)\n    - [BBOT Internal Architecture](https://www.blacklanternsecurity.com/bbot/Stable/dev/architecture)\n    - [How to Write a BBOT Module](https://www.blacklanternsecurity.com/bbot/Stable/dev/module_howto)\n    - [Unit Tests](https://www.blacklanternsecurity.com/bbot/Stable/dev/tests)\n    - [Discord Bot Example](https://www.blacklanternsecurity.com/bbot/Stable/dev/discord_bot)\n    - **Code Reference**\n        - [Scanner](https://www.blacklanternsecurity.com/bbot/Stable/dev/scanner)\n        - [Presets](https://www.blacklanternsecurity.com/bbot/Stable/dev/presets)\n        - [Event](https://www.blacklanternsecurity.com/bbot/Stable/dev/event)\n        - [Target](https://www.blacklanternsecurity.com/bbot/Stable/dev/target)\n        - [BaseModule](https://www.blacklanternsecurity.com/bbot/Stable/dev/basemodule)\n        - [BBOTCore](https://www.blacklanternsecurity.com/bbot/Stable/dev/core)\n        - [Engine](https://www.blacklanternsecurity.com/bbot/Stable/dev/engine)\n        - **Helpers**\n            - [Overview](https://www.blacklanternsecurity.com/bbot/Stable/dev/helpers/)\n            - [Command](https://www.blacklanternsecurity.com/bbot/Stable/dev/helpers/command)\n            - [DNS](https://www.blacklanternsecurity.com/bbot/Stable/dev/helpers/dns)\n            - [Interactsh](https://www.blacklanternsecurity.com/bbot/Stable/dev/helpers/interactsh)\n            - [Miscellaneous](https://www.blacklanternsecurity.com/bbot/Stable/dev/helpers/misc)\n            - [Web](https://www.blacklanternsecurity.com/bbot/Stable/dev/helpers/web)\n            - [Word Cloud](https://www.blacklanternsecurity.com/bbot/Stable/dev/helpers/wordcloud)\n<!-- END BBOT DOCS TOC -->\n\n## Contribution\n\nSome of the best BBOT modules were written by the community. BBOT is being constantly improved; every day it grows more powerful!\n\nWe welcome contributions. Not just code, but ideas too! If you have an idea for a new feature, please let us know in [Discussions](https://github.com/blacklanternsecurity/bbot/discussions). If you want to get your hands dirty, see [Contribution](https://www.blacklanternsecurity.com/bbot/Stable/contribution/). There you can find setup instructions and a simple tutorial on how to write a BBOT module. We also have extensive [Developer Documentation](https://www.blacklanternsecurity.com/bbot/Stable/dev/).\n\nThanks to these amazing people for contributing to BBOT! :heart:\n\n<p align=\"center\">\n<a href=\"https://github.com/blacklanternsecurity/bbot/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=blacklanternsecurity/bbot&max=500\">\n</a>\n</p>\n\nSpecial thanks to:\n\n- @TheTechromancer for creating BBOT\n- @liquidsec for his extensive work on BBOT's web hacking features, including [badsecrets](https://github.com/blacklanternsecurity/badsecrets) and [baddns](https://github.com/blacklanternsecurity/baddns)\n- Steve Micallef (@smicallef) for creating Spiderfoot\n- @kerrymilan for his Neo4j and Ansible expertise\n- @domwhewell-sage for his family of badass code-looting modules\n- @aconite33 and @amiremami for their ruthless testing\n- Aleksei Kornev (@alekseiko) for granting us ownership of the bbot Pypi repository <3\n","summary":"BBOT is a powerful, multipurpose reconnaissance scanner designed to automate workflows for bug bounty hunting, attack surface management, and security research. The tool features highly efficient subdomain enumeration, recursive web spidering, and email gathering capabilities, frequently outperforming similar tools by leveraging a mix of passive API sources and active brute-force techniques. It is an ideal solution for security professionals and bug bounty hunters who need to streamline complex discovery tasks and gain deeper visibility into a target's digital footprint.","description":"The recursive internet scanner for hackers. 🧡","stars":9841,"language":"Python"},{"owner":"milvus-io","repo":"milvus","url":"https://github.com/milvus-io/milvus","readme":"<img src=\"https://github.com/user-attachments/assets/51e33300-7f85-43ff-a05a-3a0317a961f3\" alt=\"milvus banner\">\n\n<div class=\"column\" align=\"middle\">\n  <a href=\"https://github.com/milvus-io/milvus/blob/master/LICENSE\"><img height=\"20\" src=\"https://img.shields.io/github/license/milvus-io/milvus\" alt=\"license\"/></a>\n  <a href=\"https://milvus.io/docs/install_standalone-docker.md\"><img src=\"https://img.shields.io/docker/pulls/milvusdb/milvus\" alt=\"docker-pull-count\"/></a>\n  <a href=\"https://milvus.io/docs/roadmap.md\"><img src=\"https://img.shields.io/badge/2025-roadmap-orange\" alt=\"fully-managed-milvus\"/></a>\n  <a href=\"https://cloud.zilliz.com/signup?utm_source=partner&utm_medium=referral&utm_campaign=2024-11-04_web_github-readme_global\"><img src=\"https://img.shields.io/badge/fully_managed-milvus-blue\" alt=\"fully-managed-milvus\"/></a>\n  <a href=\"https://milvus.io/docs/tutorials-overview.md\"><img src=\"https://img.shields.io/badge/tutorials-green\" alt=\"tutorials\"/></a>\n  <a href=\"https://milvus.io/slack\"><img src=\"https://img.shields.io/badge/Slack-%234A154B.svg?style=flat&logo=slack&logoColor=white\" alt=\"slack\"/></a>\n  <a href=\"https://discord.gg/mKc3R95yE5\"><img height=\"20\" src=\"https://img.shields.io/badge/Discord-%235865F2.svg?style=for-the-badge&logo=discord&logoColor=white\" alt=\"discord\"/></a>\n  <a href=\"https://x.com/milvusio\"><img src=\"https://img.shields.io/twitter/follow/milvusio\" alt=\"twitter\"/></a>\n</div>\n\n<div align=\"center\">\n<a href=\"https://trendshift.io/repositories/1026\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/1026\" alt=\"milvus-io%2Fmilvus | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/></a>\n</div>\n\n## What is Milvus?\n\n🐦 [Milvus](https://milvus.io/) is a high-performance vector database built for scale. It powers AI applications by efficiently organizing and searching vast amounts of unstructured data, such as text, images, and multi-modal information.\n\n🧑‍💻 Written in Go and C++, Milvus implements hardware acceleration for CPU/GPU to achieve best-in-class vector search performance. Thanks to its [fully-distributed and K8s-native architecture](https://milvus.io/docs/overview.md#What-Makes-Milvus-so-Scalable), Milvus can scale horizontally, handle tens of thousands of search queries on billions of vectors, and keep data fresh with real-time streaming updates. Milvus also supports [Standalone mode](https://milvus.io/docs/install_standalone-docker.md) for single machine deployment. [Milvus Lite](https://milvus.io/docs/milvus_lite.md) is a lightweight version good for quickstart in python with `pip install`.\n\nWant to use Milvus with zero setup? Try out [Zilliz Cloud ☁️](https://cloud.zilliz.com/signup?utm_source=partner&utm_medium=referral&utm_campaign=2024-11-04_web_github-readme_global) for free. Milvus is available as a fully managed service on Zilliz Cloud, with [Serverless](https://zilliz.com/serverless?utm_source=partner&utm_medium=referral&utm_campaign=2024-11-04_web_github-readme_global), [Dedicated](https://zilliz.com/cloud?utm_source=partner&utm_medium=referral&utm_campaign=2024-11-04_web_github-readme_global) and [BYOC](https://zilliz.com/bring-your-own-cloud?utm_source=partner&utm_medium=referral&utm_campaign=2024-11-04_web_github-readme_global) options available.\n\nFor questions about how to use Milvus, join the community on [Discord](https://discord.gg/33mfvwep3J) to get help. For reporting problems, file bugs and feature requests in GitHub [Issues](https://github.com/milvus-io/milvus/issues) or ask in [Discussions](https://github.com/milvus-io/milvus/discussions).\n\nThe Milvus open-source project is\nunder [LF AI & Data Foundation](https://lfaidata.foundation/projects/milvus/), distributed with [Apache 2.0](https://github.com/milvus-io/milvus/blob/master/LICENSE) License, with Zilliz as its major contributor.\n\n## Quickstart\n\n```python\n$ pip install -U pymilvus\n```\nThis installs `pymilvus`, the Python SDK for Milvus. Use `MilvusClient` to create a client:\n```python\nfrom pymilvus import MilvusClient\n```\n\n* You can also try Milvus Lite for quickstart by installing `pymilvus[milvus-lite]`. To create a local vector database, simply instantiate a client with a local file name for persisting data:\n\n  ```python\n  client = MilvusClient(\"milvus_demo.db\")\n  ```\n\n* You can also specify the credentials to connect to your deployed [Milvus server](https://milvus.io/docs/authenticate.md?tab=docker) or [Zilliz Cloud](https://docs.zilliz.com/docs/quick-start):\n\n  ```python\n  client = MilvusClient(\n    uri=\"<endpoint_of_self_hosted_milvus_or_zilliz_cloud>\",\n    token=\"<username_and_password_or_zilliz_cloud_api_key>\")\n  ```\n\nWith the client, you can create collection:\n```python\nclient.create_collection(\n    collection_name=\"demo_collection\",\n    dimension=768,  # The vectors we will use in this demo have 768 dimensions\n)\n```\n\nIngest data:\n```python\nres = client.insert(collection_name=\"demo_collection\", data=data)\n```\n\nPerform vector search:\n\n```python\nquery_vectors = embedding_fn.encode_queries([\"Who is Alan Turing?\", \"What is AI?\"])\nres = client.search(\n    collection_name=\"demo_collection\",  # target collection\n    data=query_vectors,  # a list of one or more query vectors, supports batch\n    limit=2,  # how many results to return (topK)\n    output_fields=[\"vector\", \"text\", \"subject\"],  # what fields to return\n)\n```\n\n## Why Milvus\n\nMilvus is designed to handle vector search at scale. It stores vectors, which are learned representations of unstructured data, together with other scalar data types such as integers, strings, and JSON objects. Users can conduct efficient vector search with metadata filtering or hybrid search. Here are why developers choose Milvus as the vector database for AI applications:\n\n**High Performance at Scale and High Availability**  \n  * Milvus features a [distributed architecture](https://milvus.io/docs/architecture_overview.md ) that separates [compute](https://milvus.io/docs/data_processing.md#Data-query) and [storage](https://milvus.io/docs/data_processing.md#Data-insertion). Milvus can horizontally scale and adapt to diverse traffic patterns, achieving optimal performance by independently increasing query nodes for read-heavy workload and data node for write-heavy workload. The stateless microservices on K8s allow [quick recovery](https://milvus.io/docs/coordinator_ha.md#Coordinator-HA) from failure, ensuring high availability. The support for [replicas](https://milvus.io/docs/replica.md) further enhances fault tolerance and throughput by loading data segments on multiple query nodes. See [benchmark](https://zilliz.com/vector-database-benchmark-tool) for performance comparison.\n\n\n**Support for Various Vector Index Types and Hardware Acceleration**  \n  * Milvus separates the system and core vector search engine, allowing it to support all major vector index types that are optimized for different scenarios, including HNSW, IVF, FLAT (brute-force), SCANN, and DiskANN, with [quantization-based](https://milvus.io/docs/index.md?tab=floating#IVFPQ) variations and [mmap](https://milvus.io/docs/mmap.md). Milvus optimizes vector search for advanced features such as [metadata filtering](https://milvus.io/docs/scalar_index.md#Scalar-Index) and [range search](https://milvus.io/docs/single-vector-search.md#Range-search). Additionally, Milvus implements hardware acceleration to enhance vector search performance and supports GPU indexing, such as NVIDIA's [CAGRA](https://github.com/rapidsai/cuvs).\n\n\n**Flexible Multi-tenancy and Hot/Cold Storage**\n  * Milvus supports [multi-tenancy](https://milvus.io/docs/multi_tenancy.md#Multi-tenancy-strategies) through isolation at database, collection, partition, or partition key level. The flexible strategies allow a single cluster to handle hundreds to millions of tenants, also ensures optimized search performance and flexible access control. Milvus enhances cost-effectiveness with hot/cold storage. Frequently accessed hot data can be stored in memory or on SSDs for better performance, while less-accessed cold data is kept on slower, cost-effective storage. This mechanism can significantly reduce costs while maintaining high performance for critical tasks.\n\n**Sparse Vector for Full Text Search and Hybrid Search**\n  * In addition to semantic search through dense vector, Milvus also natively supports [full text search](https://milvus.io/docs/full-text-search.md) with BM25 as well as learned sparse embeddings such as SPLADE and BGE-M3. Users can store sparse vectors and dense vectors in the same collection, and define functions to rerank results from multiple search requests. See examples of [Hybrid Search with semantic search + full text search](https://milvus.io/docs/full_text_search_with_milvus.md).\n\n**Data Security and Fine-grain Access Control**\n  * Milvus ensures data security by implementing mandatory user authentication, TLS encryption, and Role-Based Access Control (RBAC). User authentication ensures that only authorized users with valid credentials can access the database, while TLS encryption secures all communications within the network. Additionally, RBAC allows for fine-grained access control by assigning specific permissions to users based on their roles. These features make Milvus a robust and secure choice for enterprise applications, protecting sensitive data from unauthorized access and potential breaches.\n\nMilvus is trusted by AI developers to build applications such as text and image search, Retrieval-Augmented Generation (RAG), and recommendation systems. Milvus powers [many mission-critical businesses](https://milvus.io/use-cases) for startups and enterprises.\n\n## Demos and Tutorials\n\nHere is a selection of demos and tutorials to show how to build various types of AI applications made with Milvus:\n\nYou can explore a comprehensive [Tutorials Overview](https://milvus.io/docs/tutorials-overview.md) covering topics such as Retrieval-Augmented Generation (RAG), Semantic Search, Hybrid Search, Question Answering, Recommendation Systems, and various quick-start guides. These resources are designed to help you get started quickly and efficiently.\n\n| Tutorial | Use Case | Related Milvus Features |\n| -------- | -------- | --------- |\n| [Build RAG with Milvus](https://milvus.io/docs/build-rag-with-milvus.md) |  RAG | vector search |\n| [Advanced RAG Optimizations](https://milvus.io/docs/how_to_enhance_your_rag.md) | RAG | vector search, full text search |\n| [Full Text Search with Milvus](https://milvus.io/docs/full_text_search_with_milvus.md) | Text Search | full text search |\n| [Hybrid Search with Milvus](https://milvus.io/docs/hybrid_search_with_milvus.md) | Hybrid Search | hybrid search, multi vector, dense embedding, sparse embedding |\n| [Image Search with Milvus](https://milvus.io/docs/image_similarity_search.md) | Semantic Search | vector search, dynamic field |\n| [Multimodal Search using Multi Vectors](https://milvus.io/docs/multimodal_rag_with_milvus.md) | Semantic Search | multi vector, hybrid search |\n| [Movie Recommendation with Milvus](https://milvus.io/docs/movie_recommendation_with_milvus.md) | Recommendation System | vector search |\n| [Graph RAG with Milvus](https://milvus.io/docs/graph_rag_with_milvus.md) | RAG | graph search |\n| [Contextual Retrieval with Milvus](https://milvus.io/docs/contextual_retrieval_with_milvus.md) | Quickstart | vector search |\n| [Vector Visualization](https://milvus.io/docs/vector_visualization.md) | Quickstart | vector search |\n| [HDBSCAN Clustering with Milvus](https://milvus.io/docs/hdbscan_clustering_with_milvus.md) | Quickstart | vector search |\n| [Use ColPali for Multi-Modal Retrieval with Milvus](https://milvus.io/docs/use_ColPali_with_milvus.md) | Quickstart | vector search |\n\n<table>\n  <tr>\n    <td width=\"30%\">\n      <a href=\"https://milvus.io/milvus-demos\">\n        <img src=\"https://assets.zilliz.com/image_search_59a64e4f22.gif\" />\n      </a>\n    </td>\n    <td width=\"30%\">\n<a href=\"https://milvus.io/milvus-demos\">\n<img src=\"https://assets.zilliz.com/qa_df5ee7bd83.gif\" />\n</a>\n    </td>\n    <td width=\"30%\">\n<a href=\"https://milvus.io/milvus-demos\">\n<img src=\"https://assets.zilliz.com/mole_search_76f8340572.gif\" />\n</a>\n    </td>\n  </tr>\n  <tr>\n    <th>\n      <a href=\"https://milvus.io/milvus-demos\">Image Search</a>\n    </th>\n    <th>\n      <a href=\"https://milvus.io/milvus-demos\">RAG</a>\n    </th>\n    <th>\n      <a href=\"https://milvus.io/milvus-demos\">Drug Discovery</a>\n    </th>\n  </tr>\n</table>\n\n## Ecosystem and Integration\n   Milvus integrates with a comprehensive suite of [AI development tools](https://milvus.io/docs/integrations_overview.md), such as LangChain, LlamaIndex, OpenAI and HuggingFace, making it an ideal vector store for GenAI applications such as Retrieval-Augmented Generation (RAG). Milvus works with both open-source embedding models and embedding services, in text, image and video modalities. Milvus also provides a convenient utility [`pymilvus[model]`](https://milvus.io/docs/embeddings.md), users can use the simple wrapper code to transform unstructured data into vector embeddings and leverage reranking models for optimized search results. The Milvus ecosystem also includes [Attu](https://github.com/zilliztech/attu?tab=readme-ov-file#attu) for GUI-based administration, [Birdwatcher](https://milvus.io/docs/birdwatcher_overview.md) for system debugging, [Prometheus/Grafana](https://milvus.io/docs/monitor_overview.md) for monitoring, [Milvus CDC](https://milvus.io/docs/milvus-cdc-overview.md) for data synchronization, [VTS](https://github.com/zilliztech/vts?tab=readme-ov-file#vts) for data migration and data connectors for [Spark](https://milvus.io/docs/integrate_with_spark.md#Spark-Milvus-Connector-User-Guide), [Kafka](https://github.com/zilliztech/kafka-connect-milvus?tab=readme-ov-file#kafka-connect-milvus-connector), [Fivetran](https://fivetran.com/docs/destinations/milvus), and [Airbyte](https://milvus.io/docs/integrate_with_airbyte.md) to build search pipelines.\n\nCheck out https://milvus.io/docs/integrations_overview.md for more details.\n\n## Documentation\n\nFor guidance on installation, usage, deployment, and administration, check out [Milvus Docs](https://milvus.io/docs). For technical milestones and enhancement proposals, check out [issues on GitHub](https://github.com/milvus-io/milvus/issues).\n\n## Contributing\n\nThe Milvus open-source project accepts contributions from everyone. See [Guidelines for Contributing](https://github.com/milvus-io/milvus/blob/master/CONTRIBUTING.md) for details on submitting patches and the development workflow. See our [community repository](https://github.com/milvus-io/community) to learn about project governance and access more community resources.\n\n### Build Milvus from Source Code\n\nRequirements:\n\n* Linux systems (Ubuntu 20.04 or later recommended):\n  ```bash\n  Go: >= 1.21\n  CMake: >= 3.26.4 && CMake < 4\n  GCC: >= 11\n  Python: > 3.8 and  <= 3.11\n  ```\n\n* MacOS systems with x86_64 (Big Sur 11.5 or later recommended):\n  ```bash\n  Go: >= 1.21\n  CMake: >= 3.26.4 && CMake < 4\n  llvm: >= 15\n  Python: > 3.8 and  <= 3.11\n  ```\n\n* MacOS systems with Apple Silicon (Monterey 12.0.1 or later recommended):\n  ```bash\n  Go: >= 1.21 (Arch=ARM64)\n  CMake: >= 3.26.4 && CMake < 4\n  llvm: >= 15\n  Python: > 3.8 and  <= 3.11\n  ```\n\nClone Milvus repo and build.\n\n```bash\n# Clone github repository.\n$ git clone https://github.com/milvus-io/milvus.git\n\n# Install third-party dependencies.\n$ cd milvus/\n$ ./scripts/install_deps.sh\n\n# Compile Milvus.\n$ make\n```\n\nFor full instructions, see [developer's documentation](https://github.com/milvus-io/milvus/blob/master/DEVELOPMENT.md).\n\n## Community\n\nJoin the Milvus community on [Discord](https://discord.gg/8uyFbECzPX) to share your suggestions, advice, and questions with our engineering team.\n\nTo learn the latest news about Milvus, follow us on social media:\n\n- [X](https://twitter.com/milvusio)\n- [LinkedIn](https://www.linkedin.com/company/the-milvus-project)\n- [YouTube](https://www.youtube.com/channel/UCMCo_F7pKjMHBlfyxwOPw-g)\n- [Medium](https://medium.com/@milvusio)\n\nYou can also check out our [FAQ page](https://milvus.io/docs/performance_faq.md) to discover solutions or answers to your issues or questions, and subscribe to Milvus mailing lists:\n\n- [Technical Steering Committee](https://lists.lfai.foundation/g/milvus-tsc)\n- [Technical Discussions](https://lists.lfai.foundation/g/milvus-technical-discuss)\n- [Announcement](https://lists.lfai.foundation/g/milvus-announce)\n\n## Reference\n\nReference to cite when you use Milvus in a research paper:\n\n```\n@inproceedings{2021milvus,\n  title={Milvus: A Purpose-Built Vector Data Management System},\n  author={Wang, Jianguo and Yi, Xiaomeng and Guo, Rentong and Jin, Hai and Xu, Peng and Li, Shengjun and Wang, Xiangyu and Guo, Xiangzhou and Li, Chengming and Xu, Xiaohai and others},\n  booktitle={Proceedings of the 2021 International Conference on Management of Data},\n  pages={2614--2627},\n  year={2021}\n}\n\n@article{2022manu,\n  title={Manu: a cloud native vector database management system},\n  author={Guo, Rentong and Luan, Xiaofan and Xiang, Long and Yan, Xiao and Yi, Xiaomeng and Luo, Jigao and Cheng, Qianya and Xu, Weizhi and Luo, Jiarui and Liu, Frank and others},\n  journal={Proceedings of the VLDB Endowment},\n  volume={15},\n  number={12},\n  pages={3548--3561},\n  year={2022},\n  publisher={VLDB Endowment}\n}\n```\n<!-- Do not remove start of hero-bot -->\n<img src=\"https://img.shields.io/badge/all--contributors-432-orange\"><br>\n<a href=\"https://github.com/0xflotus\"><img src=\"https://avatars.githubusercontent.com/u/26602940?v=4\" width=\"30px\" /></a>\n<a href=\"https://github.com/404-P4rziv4L\"><img src=\"https://avatars.githubuser - Do not remove end of hero-bot -->\n","summary":"Milvus is a high-performance, open-source vector database designed to organize and search through vast amounts of unstructured data like text and images. Featuring a distributed, Kubernetes-native architecture, it leverages hardware acceleration to deliver efficient, real-time search capabilities across billions of vectors. This platform is ideal for developers and data engineers building scalable AI applications who require a flexible deployment model, ranging from lightweight local instances to fully managed cloud services.","description":"Milvus is a high-performance, cloud-native vector database built for scalable vector ANN search","stars":44618,"language":"Go"},{"owner":"windmill-labs","repo":"windmill","url":"https://github.com/windmill-labs/windmill","readme":"<p align=\"center\">\n  <a href=\"https://www.windmill.dev/\"><img src=\"./imgs/windmill-banner.png\" alt=\"windmill.dev\"></a>\n</p>\n\n<p align=center>\nOpen-source developer platform for internal code: APIs, background jobs, workflows and UIs. Self-hostable alternative to Retool, Pipedream, Superblocks and a simplified Temporal with autogenerated UIs and custom UIs to trigger workflows and scripts as internal apps.\n\n<p align=center>\nScripts are turned into sharable UIs automatically, and can be composed together into flows or used into richer apps built with low-code. Supported languages: Python, TypeScript, Go, Bash, SQL, GraphQL, PowerShell, Rust, and more.\n</p>\n\n<p align=\"center\">\n<a href=\"https://github.com/windmill-labs/windmill/blob/main/LICENSE-AGPL\" target=\"_blank\">\n    <img src=\"https://img.shields.io/badge/License-AGPLv3-blue.svg\" alt=\"Package version\">\n</a>\n<a href=\"https://github.com/windmill-labs/windmill/actions/workflows/docker-image.yml\" target=\"_blank\">\n    <img src=\"https://github.com/windmill-labs/windmill/actions/workflows/docker-image.yml/badge.svg\" alt=\"Docker Image CI\">\n</a>\n<a href=\"https://pypi.org/project/wmill\" target=\"_blank\">\n    <img src=\"https://img.shields.io/pypi/v/wmill?color=%2334D058&label=pypi%20package\" alt=\"Package version\">\n</a>\n</p>\n\n<p align=\"center\">\n<a href=\"https://img.shields.io/github/commit-activity/m/windmill-labs/windmill\" target=\"_blank\">\n    <img src=\"https://img.shields.io/github/commit-activity/m/windmill-labs/windmill\" alt=\"Commit activity\">\n</a>\n<a href=\"https://discord.gg/V7PM2YHsPB\" target=\"_blank\">\n  <img src=\"https://discordapp.com/api/guilds/930051556043276338/widget.png\" alt=\"Discord Shield\"/>\n</a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://app.windmill.dev\">Try it</a> - <a href=\"https://www.windmill.dev/\">Website</a> - <a href=\"https://www.windmill.dev/docs/intro/\">Docs</a> - <a href=\"https://discord.gg/V7PM2YHsPB\">Discord</a> - <a href=\"https://hub.windmill.dev\">Hub</a> - <a href=\"https://www.windmill.dev/docs/misc/contributing\">Contributor's guide</a>\n</p>\n\n# Windmill - Developer platform for APIs, background jobs, workflows and UIs\n\nWindmill is fully open-sourced (AGPLv3) and Windmill Labs offers dedicated instances and commercial support and licenses.\n\n![Windmill Diagram](./imgs/stacks.svg)\n\nhttps://github.com/user-attachments/assets/d80de1d9-64de-4d89-aacd-6df23fa81fc4\n\n- [Windmill - Developer platform for APIs, background jobs, workflows and UIs](#windmill---developer-platform-for-apis-background-jobs-workflows-and-uis)\n  - [Main Concepts](#main-concepts)\n  - [Show me some actual script code](#show-me-some-actual-script-code)\n  - [Local Development](#local-development)\n  - [Stack](#stack)\n  - [Fastest Self-Hostable Workflow Engine](#fastest-self-hostable-workflow-engine)\n  - [Security](#security)\n  - [Performance](#performance)\n  - [Architecture](#architecture)\n  - [How to self-host](#how-to-self-host)\n    - [Docker compose](#docker-compose)\n    - [Kubernetes (Helm charts)](#kubernetes-helm-charts)\n    - [Cloud providers](#cloud-providers)\n    - [OAuth, SSO \\& SMTP](#oauth-sso--smtp)\n    - [License](#license)\n    - [Integrations](#integrations)\n  - [Environment Variables](#environment-variables)\n  - [Run a local dev setup](#run-a-local-dev-setup)\n    - [Frontend only](#frontend-only)\n    - [Backend + Frontend](#backend--frontend)\n  - [Contributors](#contributors)\n  - [Copyright](#copyright)\n\n## Main Concepts\n\n1. Define a minimal and generic script in Python, TypeScript, Go or Bash that solves a specific task. The code can be defined in the provided Web IDE or synchronized with your own GitHub repo (e.g. through VS Code extension): [provided Web IDE](https://www.windmill.dev/docs/code_editor) or [synchronized with your own GitHub repo](https://www.windmill.dev/docs/advanced/cli/sync) (e.g. through [VS Code](https://www.windmill.dev/docs/cli_local_dev/vscode-extension) extension):\n\n![Step 1](./imgs/windmill-editor.png)\n\n2. Your scripts parameters are automatically parsed and [generate a frontend](https://www.windmill.dev/docs/core_concepts/auto_generated_uis).\n\n![Step 2](./imgs/windmill-run.png)\n\n![Step 3](./imgs/windmill-result.png)\n\n3. Make it [flow](https://www.windmill.dev/docs/flows/flow_editor)! You can chain your scripts or scripts made by the community shared on [WindmillHub](https://hub.windmill.dev).\n\n![Step 3](./imgs/windmill-flow.png)\n\n4. Build [complex UIs](https://www.windmill.dev/docs/apps/app_editor) on top of your scripts and flows.\n\n![Step 4](./imgs/windmill-builder.png)\n\nScripts and flows can be triggered by [schedules](https://www.windmill.dev/docs/core_concepts/scheduling), [webhooks](https://www.windmill.dev/docs/core_concepts/webhooks), [HTTP routes](https://www.windmill.dev/docs/core_concepts/http_routing), [Kafka](https://www.windmill.dev/docs/core_concepts/kafka_triggers), [WebSockets](https://www.windmill.dev/docs/core_concepts/websocket_triggers), [emails](https://www.windmill.dev/docs/core_concepts/email_triggers), and more.\n\nBuild your entire infra on top of Windmill!\n\n## Show me some actual script code\n\n```typescript\n//import any dependency  from npm\nimport * as wmill from \"windmill-client\";\nimport * as cowsay from \"cowsay@1.5.0\";\n\n// fill the type, or use the +Resource type to get a type-safe reference to a resource\ntype Postgresql = {\n  host: string;\n  port: number;\n  user: string;\n  dbname: string;\n  sslmode: string;\n  password: string;\n};\n\nexport async function main(\n  a: number,\n  b: \"my\" | \"enum\",\n  c: Postgresql,\n  d = \"inferred type string from default arg\",\n  e = { nested: \"object\" }\n  //f: wmill.Base64\n) {\n  const email = process.env[\"WM_EMAIL\"];\n  // variables are permissioned and by path\n  let variable = await wmill.getVariable(\"f/company-folder/my_secret\");\n  const lastTimeRun = await wmill.getState();\n  // logs are printed and always inspectable\n  console.log(cowsay.say({ text: \"hello \" + email + \" \" + lastTimeRun }));\n  await wmill.setState(Date.now());\n\n  // return is serialized as JSON\n  return { foo: d, variable };\n}\n```\n\n## Local Development\n\nWindmill supports multiple ways to develop locally and sync with your instance:\n\n| Tool | Description |\n|------|-------------|\n| **[CLI](https://www.windmill.dev/docs/advanced/cli)** | Sync scripts from local files or GitHub, run scripts/flows from the command line |\n| **[VS Code Extension](https://www.windmill.dev/docs/cli_local_dev/vscode-extension)** | Edit and test scripts & flows directly from VS Code / Cursor with full IDE support |\n| **[Git Sync](https://www.windmill.dev/docs/advanced/git_sync)** | Two-way sync between Windmill and your Git repository |\n| **[Claude Code](https://www.windmill.dev/docs/core_concepts/ai_generation)** | AI-assisted development with Claude for scripts, flows, and apps |\n\nhttps://github.com/user-attachments/assets/c541c326-e9ae-4602-a09a-1989aaded1e9\n\nYou can run scripts locally by passing the right environment variables for the `wmill` client library to fetch resources and variables from your instance. See [local development docs](https://www.windmill.dev/docs/advanced/local_development).\n\n## Stack\n\n- **Database**: Postgres (compatible with Aurora, Cloud SQL, Neon, Azure PostgreSQL)\n- **Backend**: Rust - stateless API servers and workers pulling jobs from a Postgres queue\n- **Frontend**: Svelte 5\n- **Sandboxing**: [nsjail](https://github.com/google/nsjail) and PID namespace isolation\n- **Runtimes**:\n  - TypeScript/JavaScript: Bun (default) and Deno\n  - Python: python3 with uv for dependency management\n  - Go, Bash, PowerShell, PHP, Rust, C#, Java, Ansible\n\n## Fastest Self-Hostable Workflow Engine\n\nWe have compared Windmill to other self-hostable workflow engines (Airflow,\nPrefect & Temporal) and Windmill is the most performant solution for both\nbenchmarks: one flow composed of 40 lightweight tasks & one flow composed of 10\nlong-running tasks.\n\nAll methodology & results on our\n[Benchmarks](https://www.windmill.dev/docs/misc/benchmarks/competitors#airflow-setup)\npage.\n\n![Fastest workflow engine](./imgs/fastest.png)\n\n## Security\n\n- **Sandboxing**: [nsjail](https://github.com/google/nsjail) for filesystem/resource isolation, and PID namespace isolation (enabled by default) to prevent jobs from accessing worker process memory\n- **Secrets**: One encryption key per workspace for credentials stored in Windmill's K/V store. We recommend encrypting the Postgres database as well.\n\nSee [Security documentation](https://www.windmill.dev/docs/advanced/security_isolation) for details.\n\n## Performance\n\nOnce a job started, there is no overhead compared to running the same script on\nthe node with its corresponding runner (Deno/Go/Python/Bash). The added latency\nfrom a job being pulled from the queue, started, and then having its result sent\nback to the database is ~50ms. A typical lightweight deno job will take around\n100ms total.\n\n## Architecture\n\n<p align=\"center\">\n\n<img src=\"./imgs/diagram.svg\">\n\n</p>\n\n## How to self-host\n\nFor detailed setup options, see [Self-Host documentation](https://www.windmill.dev/docs/advanced/self_host).\n\n### Docker compose\n\nDeploy Windmill with 3 files ([docker-compose.yml](./docker-compose.yml), [Caddyfile](./Caddyfile), [.env](./.env)):\n\n```bash\ncurl https://raw.githubusercontent.com/windmill-labs/windmill/main/docker-compose.yml -o docker-compose.yml\ncurl https://raw.githubusercontent.com/windmill-labs/windmill/main/Caddyfile -o Caddyfile\ncurl https://raw.githubusercontent.com/windmill-labs/windmill/main/.env -o .env\n\ndocker compose up -d\n```\n\nGo to http://localhost - default credentials: `admin@windmill.dev` / `changeme`\n\n**Using an external database**: Set `DATABASE_URL` in `.env` to point to your managed Postgres (AWS RDS, GCP Cloud SQL, Azure, Neon, etc.) and set db replicas to 0.\n\n### Kubernetes (Helm charts)\n\n```bash\nhelm repo add windmill https://windmill-labs.github.io/windmill-helm-charts/\nhelm install windmill-chart windmill/windmill --namespace=windmill --create-namespace\n```\n\nSee [windmill-helm-charts](https://github.com/windmill-labs/windmill-helm-charts) for configuration options.\n\n### Cloud providers\n\nWindmill works on AWS (EKS/ECS), GCP, Azure, Ubicloud, Fly.io, Render.com, Hetzner, Digital Ocean, and others. Rule of thumb: 1 worker per 1vCPU and 1-2 GB RAM.\n\n### OAuth, SSO & SMTP\n\nConfigure OAuth and SSO (Google Workspace, Microsoft/Azure, Okta) directly from the superadmin UI. [See documentation](https://www.windmill.dev/docs/misc/setup_oauth).\n\n### License\n\nThe Community Edition is free to use internally. For commercial redistribution or managed services, contact <sales@windmill.dev>. See [LICENSE](./LICENSE) and [Pricing](https://www.windmill.dev/pricing) for details.\n\nThe \"Community Edition\" of Windmill available in the docker images hosted under ghcr.io/windmill-labs/windmill and the github binary releases contains the files under the AGPLv3 and Apache 2 sources but also includes proprietary and non-public code and features which are not open source and under the following terms: Windmill Labs, Inc. grants a right to use all the features of the \"Community Edition\" for free without restrictions other than the limits and quotas set in the software and a right to distribute the community edition as is but not to sell, resell, serve Windmill as a managed service, modify or wrap under any form without an explicit agreement.\n\nThe binary compilable from source code in this repository without the \"enterprise\" feature flag is open-source under the [LICENSE-AGPLv3](https://github.com/windmill-labs/windmill/blob/main/LICENSE-AGPL) License terms and conditions.\n\nTo [re-expose directly any Windmill parts to your users](https://www.windmill.dev/docs/misc/white_labelling) as a feature of your product, with the exception of iframed public Windmill \"apps\", or to build a feature on top of \"Windmill Community Edition\" that you sell commercially or embed in a distributable product or binary, you must get a commercial license. Contact us at <sales@windmill.dev> if you have any questions. To do the same from the binary compiled from the source code in this repository without the \"enterprise\" feature flag, you must comply with the AGPLv3 license terms and conditions or get a commercial license from Windmill Labs, Inc.\n\nTo use Windmill \"Community Edition\" as is internally in your organization, or to use its APIs as is, you do NOT need a commercial license.\n\n### Integrations\n\nIn Windmill, integrations are referred to as [resources and resource types](https://www.windmill.dev/docs/core_concepts/resources_and_types). Each Resource has a Resource Type that defines the schema that the resource\nneeds to implement.\n\nOn self-hosted instances, you might want to import all the approved resource types from [WindmillHub](https://hub.windmill.dev). A setup script will prompt you to have it being synced automatically everyday.\n\n## Environment Variables\n\n| Environment Variable name           | Default                          | Description                                                                                                                                                                                        | Api Server/Worker/All |\n| ----------------------------------- | -------------------------------- | -------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- | --------------------- |\n| DATABASE_URL                        |                                  | The Postgres database url.                                                                                                                                                                         | All                   |\n| WORKER_GROUP                        | default                          | The worker group the worker belongs to and get its configuration pulled from                                                                                                                       | Worker                |\n| MODE                                | standalone                       | The mode if the binary. Possible values: standalone, worker, server, agent                                                                                                                         | All                   |\n| METRICS_ADDR                        | None                             | (ee only) The socket addr at which to expose Prometheus metrics at the /metrics path. Set to \"true\" to expose it on port 8001                                                                      | All                   |\n| JSON_FMT                            | false                            | Output the logs in json format instead of logfmt                                                                                                                                                   | All                   |\n| BASE_URL                            | http://localhost:8000            | The base url that is exposed publicly to access your instance. Is overriden by the instance settings if any.                                                                                       | Server                |\n| ZOMBIE_JOB_TIMEOUT                  | 30                               | The timeout after which a job is considered to be zombie if the worker did not send pings about processing the job (every server check for zombie jobs every 30s)                                  | Server                |\n| RESTART_ZOMBIE_JOBS                 | true                             | If true then a zombie job is restarted (in-place with the same uuid and some logs), if false the zombie job is failed                                                                              | Server                |\n| NATIVE_MODE                         | false                            | Enable native mode: sets NUM_WORKERS=8, rejects non-native jobs (nativets, postgresql, mysql, etc.)                                                                                                | Worker                |\n| SLEEP_QUEUE                         | 50                               | The number of ms to sleep in between the last check for new jobs in the DB. It is multiplied by NUM_WORKERS such that in average, for one worker instance, there is one pull every SLEEP_QUEUE ms. | Worker                |\n| KEEP_JOB_DIR                        | false                            | Keep the job directory after the job is done. Useful for debugging.                                                                                                                                | Worker                |\n| LICENSE_KEY (EE only)               | None                             | License key checked at startup for the Enterprise Edition of Windmill                                                                                                                              | Worker                |\n| SLACK_SIGNING_SECRET                | None                             | The signing secret of your Slack app. See [Slack documentation](https://api.slack.com/authentication/verifying-requests-from-slack)                                                                | Server                |\n| COOKIE_DOMAIN                       | None                             | The domain of the cookie. If not set, the cookie will be set by the browser based on the full origin                                                                                               | Server                |\n| DENO_PATH                           | /usr/bin/deno                    | The path to the deno binary.                                                                                                                                                                       | Worker                |\n| PYTHON_PATH                         |                                  | The path to the python binary if wanting to not have it managed by uv.                                                                                                                             | Worker                |\n| GO_PATH                             | /usr/bin/go                      | The path to the go binary.                                                                                                                                                                         | Worker                |\n| GOPRIVATE                           |                                  | The GOPRIVATE env variable to use private go modules                                                                                                                                               | Worker                |\n| GOPROXY                             |                                  | The GOPROXY env variable to use                                                                                                                                                                    | Worker                |\n| NETRC                               |                                  | The netrc content to use a private go registry                                                                                                                                                     | Worker                |\n| PY_CONCURRENT_DOWNLOADS             | 20                               | Sets the maximum number of in-flight concurrent python downloads that windmill will perform at any given time.                                                                                     | Worker                |\n| PATH                                | None                             | The path environment variable, usually inherited                                                                                                                                                   | Worker                |\n| HOME                                | None                             | The home directory to use for Go and Bash , usually inherited                                                                                                                                      | Worker                |\n| DATABASE_CONNECTIONS                | 50 (Server)/3 (Worker)           | The max number of connections in the database connection pool                                                                                                                                      | All                   |\n| SUPERADMIN_SECRET                   | None                             | A token that would let the caller act as a virtual superadmin superadmin@windmill.dev                                                                                                              | Server                |\n| TIMEOUT_WAIT_RESULT                 | 20                               | The number of seconds to wait before timeout on the 'run_wait_result' endpoint                                                                                                                     | Worker                |\n| QUEUE_LIMIT_WAIT_RESULT             | None                             | The number of max jobs in the queue before rejecting immediately the request in 'run_wait_result' endpoint. Takes precedence on the query arg. If none is specified, there are no limit.           | Worker                |\n| DENO_AUTH_TOKENS                    | None                             | Custom DENO_AUTH_TOKENS to pass to worker to allow the use of private modules                                                                                                                      | Worker                |\n| DISABLE_RESPONSE_LOGS               | false                            | Disable response logs                                                                                                                                                                              | Server                |\n| CREATE_WORKSPACE_REQUIRE_SUPERADMIN | true                             | If true, only superadmins can create new workspaces                                                                                                                                                | Server                |\n| MIN_FREE_DISK_SPACE_MB              | 15000                            | Minimum amount of free space on worker. Sends critical alert if worker has less free space.                                                                                                        | Worker                |\n| RUN_UPDATE_CA_CERTIFICATE_AT_START  | false                            | If true, runs CA certificate update command at startup before other initialization                                                                                                                 | All                   |\n| RUN_UPDATE_CA_CERTIFICATE_PATH      | /usr/sbin/update-ca-certificates | Path to the CA certificate update command/script to run when RUN_UPDATE_CA_CERTIFICATE_AT_START is true                                                                                            | All                   |\n\n## Run a local dev setup\n\nWe recommend using [Nix](./frontend/README_DEV.md#nix). See [./frontend/README_DEV.md](./frontend/README_DEV.md) for all options.\n\n### Frontend only\n\nUses the backend of <https://app.windmill.dev> with local frontend (hot-reload):\n\n```bash\ncd frontend\nnpm install\nnpm run generate-backend-client  # or generate-backend-client-mac on Mac\nnpm run dev\n```\n\nWindmill available at `http://localhost/`\n\n### Backend + Frontend\n\nSee the [./frontend/README_DEV.md](./frontend/README_DEV.md) file for all\nrunning options.\n\n1. Start a local Postgres database using for instance the `start-dev-db.sh` script which will make a database available at `postgres://postgres:changeme@localhost:5432/windmill`\n   Then run the migrations using the following command:\n   ```\n   cargo install sqlx-cli\n   env DATABASE_URL=<YOUR_DATABASE_URL> sqlx migrate run\n   ```\n   This will also avoid compile time issue with sqlx's `query!` macro.\n2. (optional, linux only) Install [nsjail](https://github.com/google/nsjail) and have it accessible in\n   your PATH\n3. Install bun, deno and python3 (+ any languages you want to use), have the bins at `/usr/bin/bun`,`/usr/bin/deno`, and\n   `/usr/local/bin/python3` or set the corresponding environment variables.\n4. (optional) Install the [lld linker](https://lld.llvm.org/)\n5. Go to `frontend/`:\n   1. `npm install`, `npm run generate-backend-client` then `REMOTE=http://localhost:8000 npm run dev`\n   2. You might need to set some extra heap space for the node runtime\n      `export NODE_OPTIONS=\"--max-old-space-size=4096\"`\n   3. Create an empty `frontend/build` folder using `mkdir frontend/build`\n6. Go to `backend/`:\n   1. `env DATABASE_URL=<YOUR_DATABASE_URL> RUST_LOG=info cargo run`\n   2. You can specify any feature flag you want to enable, for example `cargo run --features python` to enable the python executor.\n7. Windmill should be available at `http://localhost:3000`\n\n## Contributors\n\n<a href=\"https://github.com/windmill-labs/windmill/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=windmill-labs/windmill\" />\n</a>\n\n## Copyright\n\n© 2023-2026 Windmill Labs, Inc.\n","summary":"Windmill is an open-source developer platform designed to turn scripts written in languages like Python, TypeScript, Go, and SQL into shareable internal tools, APIs, and automated workflows. It provides a flexible environment where users can build complex background jobs and compose scripts into low-code applications with autogenerated or custom-built UIs. This platform is ideal for developers and teams looking for a self-hostable alternative to tools like Retool or Pipedream to streamline their internal operations and infrastructure management.","description":"Open-source developer platform to power your entire infra and turn scripts into webhooks, workflows and UIs. Fastest workflow engine (13x vs Airflow). Open-source alternative to Retool and Temporal.","stars":16643,"language":"HTML"},{"owner":"automatisch","repo":"automatisch","url":"https://github.com/automatisch/automatisch","readme":"# Automatisch - Open Source Zapier Alternative\n\n![Automatisch - Screenshot](https://user-images.githubusercontent.com/2501931/191562539-e42f6c34-03c7-4dc4-bcf9-7f9473a9c64f.png)\n\n🧐 Automatisch is a business automation tool that lets you connect different services like Twitter, Slack, and more to automate your business processes.\n\n💸 Automating your workflows doesn't have to be a difficult or expensive process. You also don't need any programming knowledge to use Automatisch.\n\n## Advantages\n\nThere are other existing solutions in the market, like Zapier and Integromat, so you might be wondering why you should use Automatisch.\n\n✅ One of the main benefits of using Automatisch is that it allows you to store your data on your own servers, which is essential for businesses that handle sensitive user information and cannot risk sharing it with external cloud services. This is especially relevant for industries such as healthcare and finance, as well as for European companies that must adhere to the General Data Protection Regulation (GDPR).\n\n🤓 Your contributions are vital to the development of Automatisch. As an open-source software, anyone can have an impact on how it is being developed.\n\n💙 No vendor lock-in. If you ever decide that Automatisch is no longer helpful for your business, you can switch to any other provider, which will be easier than switching from the one cloud provider to another since you have all data and flexibility.\n\n## Documentation\n\nThe official documentation can be found here: [https://automatisch.io/docs](https://automatisch.io/docs)\n\n## Installation\n\n```bash\n# Clone the repository\ngit clone https://github.com/automatisch/automatisch.git\n\n# Go to the repository folder\ncd automatisch\n\n# Start\ndocker compose up\n```\n\nYou can use `user@automatisch.io` email address and `sample` password to login to Automatisch. Please do not forget to change your email and password from the settings page.\n\nFor other installation types, you can check the [installation](https://automatisch.io/docs/guide/installation) guide.\n\n## Community Links\n\n- [Discord](https://discord.gg/dJSah9CVrC)\n- [Twitter](https://twitter.com/automatischio)\n\n## Support\n\nIf you have any questions or problems, please visit our GitHub issues page, and we'll try to help you as soon as possible.\n\n[https://github.com/automatisch/automatisch/issues](https://github.com/automatisch/automatisch/issues)\n\n## License\n\nAutomatisch Community Edition (Automatisch CE) is an open-source software with the [AGPL-3.0 license](LICENSE.agpl).\n\nAutomatisch Enterprise Edition (Automatisch EE) is a commercial offering with the [Enterprise license](LICENSE.enterprise).\n\nThe Automatisch repository contains both AGPL-licensed and Enterprise-licensed files. We maintain a single repository to make development easier.\n\nAll files that contain \".ee.\" in their name fall under the [Enterprise license](LICENSE.enterprise). All other files fall under the [AGPL-3.0 license](LICENSE.agpl).\n\nSee the [LICENSE](LICENSE) file for more information.\n","summary":"Automatisch is an open-source automation platform that allows users to connect various business services and streamline workflows without requiring any programming knowledge. By offering a self-hosted solution, the tool ensures that sensitive data remains under the user's control, providing a secure alternative for organizations in regulated industries like finance and healthcare. It is an ideal choice for businesses seeking to avoid vendor lock-in and maintain full ownership of their operational infrastructure.","description":"The open source Zapier alternative. Build workflow automation without spending time and money.","stars":13851,"language":"JavaScript"},{"owner":"haydenbleasel","repo":"next-forge","url":"https://github.com/haydenbleasel/next-forge","readme":"# ▲ / next-forge\n\n**Production-grade Turborepo template for Next.js apps.**\n\n<div>\n  <img src=\"https://img.shields.io/npm/dy/next-forge\" alt=\"\" />\n  <img src=\"https://img.shields.io/npm/v/next-forge\" alt=\"\" />\n  <img src=\"https://img.shields.io/github/license/vercel/next-forge\" alt=\"\" />\n</div>\n\n## Overview\n\n[next-forge](https://github.com/vercel/next-forge) is a production-grade [Turborepo](https://turborepo.com) template for [Next.js](https://nextjs.org/) apps. It's designed to be a comprehensive starting point for building SaaS applications, providing a solid, opinionated foundation with minimal configuration required.\n\nBuilt on a decade of experience building web applications, next-forge balances speed and quality to help you ship thoroughly-built products faster.\n\n### Philosophy\n\nnext-forge is built around five core principles:\n\n- **Fast** — Quick to build, run, deploy, and iterate on\n- **Cheap** — Free to start with services that scale with you\n- **Opinionated** — Integrated tooling designed to work together\n- **Modern** — Latest stable features with healthy community support\n- **Safe** — End-to-end type safety and robust security posture\n\n## Demo\n\nExperience next-forge in action:\n\n- [Web](https://demo.next-forge.com) — Marketing website\n- [App](https://app.demo.next-forge.com) — Main application\n- [Storybook](https://storybook.demo.next-forge.com) — Component library\n- [API](https://api.demo.next-forge.com/health) — API health check\n\n## Features\n\nnext-forge comes with batteries included:\n\n### Apps\n\n- **Web** — Marketing site built with Tailwind CSS and TWBlocks\n- **App** — Main application with authentication and database integration\n- **API** — RESTful API with health checks and monitoring\n- **Docs** — Documentation site powered by Mintlify\n- **Email** — Email templates with React Email\n- **Storybook** — Component development environment\n\n### Packages\n\n- **Authentication** — Powered by [Clerk](https://clerk.com)\n- **Database** — Type-safe ORM with migrations\n- **Design System** — Comprehensive component library with dark mode\n- **Payments** — Subscription management via [Stripe](https://stripe.com)\n- **Email** — Transactional emails via [Resend](https://resend.com)\n- **Analytics** — Web ([Google Analytics](https://developers.google.com/analytics)) and product ([Posthog](https://posthog.com))\n- **Observability** — Error tracking ([Sentry](https://sentry.io)), logging, and uptime monitoring ([BetterStack](https://betterstack.com))\n- **Security** — Application security ([Arcjet](https://arcjet.com)), rate limiting, and secure headers\n- **CMS** — Type-safe content management for blogs and documentation\n- **SEO** — Metadata management, sitemaps, and JSON-LD\n- **AI** — AI integration utilities\n- **Webhooks** — Inbound and outbound webhook handling\n- **Collaboration** — Real-time features with avatars and live cursors\n- **Feature Flags** — Feature flag management\n- **Cron** — Scheduled job management\n- **Storage** — File upload and management\n- **Internationalization** — Multi-language support\n- **Notifications** — In-app notification system\n\n## Getting Started\n\n### Prerequisites\n\n- Node.js 20+\n- [Bun](https://bun.sh) (or npm/yarn/pnpm)\n- [Stripe CLI](https://docs.stripe.com/stripe-cli) for local webhook testing\n\n### Installation\n\nCreate a new next-forge project:\n\n```sh\nnpx next-forge@latest init\n```\n\n### Setup\n\n1. Configure your environment variables\n2. Set up required service accounts (Clerk, Stripe, Resend, etc.)\n3. Run the development server\n\nFor detailed setup instructions, read the [documentation](https://www.next-forge.com/docs).\n\n## Structure\n\nnext-forge uses a monorepo structure managed by Turborepo:\n\n```\nnext-forge/\n├── apps/           # Deployable applications\n│   ├── web/        # Marketing website (port 3001)\n│   ├── app/        # Main application (port 3000)\n│   ├── api/        # API server\n│   ├── docs/       # Documentation\n│   ├── email/      # Email templates\n│   └── storybook/  # Component library\n└── packages/       # Shared packages\n    ├── design-system/\n    ├── database/\n    ├── auth/\n    └── ...\n```\n\nEach app is self-contained and independently deployable. Packages are shared across apps for consistency and maintainability.\n\n## Documentation\n\nFull documentation is available at [next-forge.com/docs](https://www.next-forge.com/docs), including:\n\n- Detailed setup guides\n- Package documentation\n- Migration guides for swapping providers\n- Deployment instructions\n- Examples and recipes\n\n## Contributing\n\nWe welcome contributions! See the [contributing guide](https://github.com/vercel/next-forge/blob/main/.github/CONTRIBUTING.md) for details.\n\n## Contributors\n\n<a href=\"https://github.com/vercel/next-forge/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=vercel/next-forge\" />\n</a>\n\nMade with [contrib.rocks](https://contrib.rocks).\n\n## License\n\nMIT\n","summary":"next-forge is a production-grade Turborepo template designed to provide a comprehensive, opinionated foundation for building scalable Next.js applications. It comes \"batteries-included\" with integrated tools for authentication, payments, database management, observability, and security, allowing developers to bypass complex setup configurations. By offering a robust monorepo structure with pre-configured apps and packages, it is an ideal starting point for SaaS founders and developers who want to prioritize speed, type safety, and maintainability.","description":"Production-grade Turborepo template for Next.js apps.","stars":7087,"language":"TypeScript"},{"owner":"ai16z","repo":"eliza","url":"https://github.com/ai16z/eliza","readme":"<div align=\"center\">\n  <img src=\"packages/shared/assets/banners/elizaos_banner.svg\" alt=\"elizaOS\" width=\"100%\" />\n  <h1>elizaOS</h1>\n  <p><strong>An open-source framework for building autonomous AI agents.</strong></p>\n</div>\n\n## ✨ What is Eliza?\n\nelizaOS is an all-in-one, extensible platform for building and deploying AI-powered applications. Whether you're creating sophisticated chatbots, autonomous agents for business process automation, or intelligent game NPCs, Eliza provides the tools you need to get started quickly and scale effectively.\n\nIt combines a modular architecture, a powerful CLI, and a rich web interface to give you full control over your agents' development, deployment, and management lifecycle.\n\nFor complete guides and API references, visit our official **[documentation](https://docs.elizaos.ai/)**.\n\n## 🚀 Key Features\n\n- 🔌 **Rich Connectivity**: Out-of-the-box connectors for Discord, Telegram, Farcaster, and more.\n- 🧠 **Model Agnostic**: Supports all major models, including OpenAI, Gemini, Anthropic, Llama, and Grok.\n- 🖥️ **Modern Web UI**: A professional dashboard for managing agents, groups, and conversations in real-time.\n- 🤖 **Multi-Agent Architecture**: Designed from the ground up for creating and orchestrating groups of specialized agents.\n- 📄 **Document Ingestion**: Easily ingest documents and allow agents to retrieve information and answer questions from your data (RAG).\n- 🛠️ **Highly Extensible**: Build your own functionality with a powerful plugin system.\n- 📦 **It Just Works**: A seamless setup and development experience from day one.\n\n> **Looking for plugins?** Browse the public plugin catalog at **[plugins.elizacloud.ai](https://plugins.elizacloud.ai)**. Community registry entries are maintained in this monorepo under [`packages/registry`](packages/registry), and npm packages with the `elizaos` keyword are discoverable without a registry entry.\n\n## Framework, Projects, And App Plugins\n\nelizaOS is a framework plus packages built on top of it. Knowing which layer\nyou're working with keeps projects, plugins, and app surfaces from getting\nmixed together.\n\n**The framework** is the runtime: `@elizaos/core`, the agent loop, the plugin model (actions, providers, services), the message/memory/state primitives, and the model-agnostic LLM layer. If you depend on `@elizaos/core` from your own code, you are using the framework.\n\n**A project** is a deployable product workspace built on the framework. A\ngenerated project owns its branded app shell, usually under `apps/app` inside\nthat project workspace.\n\n**An app plugin** is a runtime plugin that also contributes an app surface inside\nEliza. First-party app plugins live under [`plugins/app-*`](plugins), keep npm\nnames like `@elizaos/plugin-companion`, and are loaded by package name. They are\nplugins, not top-level repo applications.\n\nThe same split shows up in the directory tree:\n\n```\npackages/        ← framework and shared packages\n  core/          # @elizaos/core — runtime, types, agent loop\n  agent/         # @elizaos/agent — AgentRuntime + plugin loader\n  app-core/      # API + dashboard host\n  elizaos/       # the `elizaos` CLI\n  prompts/       # shared prompt scaffolding\n  ui/            # shared React component library\n  examples/      # standalone examples (chat, discord, mcp, ...)\n  benchmarks/    # evaluation suites (gaia, swe_bench, tau-bench, ...)\n\nplugins/         ← runtime plugins and app plugins\n  app-companion/ app-browser/ app-documents/ app-phone/\n  app-task-coordinator/ app-training/ plugin-form/ ...\n  plugin-discord/ plugin-openai/ plugin-sql/ ...\n\npackages/elizaos/templates/   ← CLI scaffolds + min-project / min-plugin for APP/PLUGIN create\n```\n\nA _plugin_ sits between the two: framework-shaped (registers actions/providers/services with the runtime) but shipped and consumed like a product. Community plugins are discovered from npm metadata and curated through the in-repo [`packages/registry`](packages/registry) catalog.\n\n## Pick your starting point\n\n| You want to…                                                  | Start here                                    |\n| ------------------------------------------------------------- | --------------------------------------------- |\n| Try an agent in 5 minutes                                     | [CLI quick start](#cli-quick-start)           |\n| Use the runtime from your own TypeScript code (no CLI, no UI) | [Standalone usage](#standalone-usage)         |\n| Build a new deployable product                                | [Create a new project](#create-a-new-project) |\n| Build a runtime plugin (action / provider / service)          | [Create a new plugin](#create-a-new-plugin)   |\n| See how others did it                                         | [Examples](#examples)                         |\n| Evaluate or benchmark an agent                                | [Benchmarks](#benchmarks)                     |\n| Read the docs                                                 | [docs.elizaos.ai](https://docs.elizaos.ai/)   |\n\n## CLI quick start\n\n**Prerequisites:** [Node.js v24+](https://nodejs.org/), [bun](https://bun.sh/docs/installation). On Windows, use [WSL 2](https://learn.microsoft.com/en-us/windows/wsl/install-manual).\n\n```bash\nbun add -g elizaos\nelizaos create my-first-agent --template project\ncd my-first-agent\n# add OPENAI_API_KEY=... to .env (or your provider's key)\nbun install\nbun run dev\n```\n\nThe generated project exposes the runtime scripts you'll use day-to-day: `bun run dev`, `bun run build`, `bun run test`, `bun run typecheck`, `bun run lint`, `bun run verify`. The `elizaos` CLI itself is intentionally minimal — its job is scaffolding (`elizaos create`) and template upgrades (`elizaos upgrade`). For a list of available templates, run `elizaos info`.\n\nFull reference: `elizaos --help` or `elizaos <command> --help`.\n\n## Local mock stack\n\nOne command boots the full local cloud stack with mocks (Hetzner + control-plane + cloud-api with `MOCK_REDIS` + PGlite, plus cloud-frontend):\n\n```bash\nbun run cloud:mock          # boot with existing PGlite data\nbun run cloud:mock:fresh    # wipe PGlite + re-run migrations first\n```\n\nPorts are auto-picked and printed in a ready banner; logs stream to `./.logs/<service>.log`. Pass `--help` to `bun scripts/cloud/mock-stack-up.mjs` for flags (skip individual services, pin ports, etc.). Ctrl+C tears the stack down in reverse order.\n\n## Standalone usage\n\nUse `@elizaos/core` directly — no CLI, no dashboard, just the runtime in your code.\n\n```bash\ngit clone --filter=blob:none https://github.com/elizaos/eliza.git\ncd eliza\nbun install\n\n# Interactive REP
