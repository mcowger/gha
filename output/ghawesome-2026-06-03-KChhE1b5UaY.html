<script id="project-data" type="application/json">[{"owner":"kyegomez","repo":"BitNet","url":"https://github.com/kyegomez/BitNet","readme":"[![Multi-Modality](agorabanner.png)](https://discord.gg/qUtxnK2NMf)\n\n# BitNet\n![bitnet](/bitnet.png)\nPyTorch Implementation of the linear methods and model from the paper \"BitNet: Scaling 1-bit Transformers for Large Language Models\"\n\n[Paper link:](https://arxiv.org/pdf/2310.11453.pdf)\n\nBitLinear = tensor -> layernorm -> Binarize -> abs max quantization -> dequant\n\n\"The implementation of the BitNet architecture is quite simple, requiring only the replacement of linear projections (i.e., nn.Linear in PyTorch) in the Transformer. \" -- BitNet is really easy to implement just swap out the linears with the BitLinear modules! \n\n## **NEWS**\n- **New Iteration** 🔥 There is an all-new iteration from the paper \"[The Era of 1-bit LLMs: All Large Language Models are in 1.58 Bits](https://arxiv.org/abs/2402.17764)\", we're implementing it now. Join the Agora discord and contribute! [Join Here](https://discord.gg/hFzevCjG8c)\n- **New Optimizations** The first `BitLinear` has been optimized and we now have a Bit Attention `BitMGQA` That implements BitLinear into the attention mechanism. Multi Grouped Query Attention is also widely recognized as the best attention for its fast decoding and long context handling, thanks to Frank for his easy to use implementation!\n- **BitLinear 1.5 Launch 🔥**: The new BitLinear 1.5 is still in progress 🔥 [Here is the file]() There are still some bugs like with the dequantization algorithm and we still need to replace the multiplication with elementwisw addition, if you could help with this, this would be amazing.\n- **NOTICE**: A model obviously needs to be finetuned from scratch to use BitLinear, just changing the linear methods in an already trained model isn't going to work. Finetune or train from scratch.\n\n## Appreciation\n- Dimitry, Nullonix for analysis and code review and revision\n- Vyom, for providing 4080 to train!\n\n## Installation\n```bash\npip3 install bitnet\n```\n\n## Usage\nWe have a vast selection of example scripts here and in the [examples folder:](/examples/), let me know if you want assistance with a use-case in the discord!\n\n\n### `BitLinear`\n- Example of the BitLinear layer which is the main innovation of the paper!\n```python\nimport torch\n\nfrom bitnet import BitLinear\n\n# Input\nx = torch.randn(10, 1000, 512)\n\n# BitLinear layer\nlayer = BitLinear(512, 400)\n\n# Output\ny = layer(x)\n\nprint(y)\n\n```\n\n### BitLinearNew\n```python\nimport torch\nfrom bitnet import BitLinearNew\n\n# Create a random tensor of shape (16, 10)\nx = torch.randn(16, 1000, 512)\n\n# Create an instance of the BitLinearNew class with input size 10, output size 20, and 2 groups\nlayer = BitLinearNew(\n    512,\n    20,\n)\n\n# Perform a forward pass through the BitLinearNew layer with input x\noutput = layer(x)\n\n# Print the output tensor\nprint(output)\nprint(output.shape)\n```\n----\n\n### `BitNetTransformer`\n- Fully implemented Transformer as described in the diagram with MHA, and BitFeedforwards\n- Can be utilized not just for text but for images and maybe even video or audio processing\n- Complete with residuals and skip connections for gradient flow\n\n```python\n# Import the necessary libraries\nimport torch\nfrom bitnet import BitNetTransformer\n\n# Create a random tensor of integers\nx = torch.randint(0, 20000, (1, 1024))\n\n# Initialize the BitNetTransformer model\nbitnet = BitNetTransformer(\n    num_tokens=20000,  # Number of unique tokens in the input\n    dim=1024,  # Dimension of the input and output embeddings\n    depth=6,  # Number of transformer layers\n    heads=8,  # Number of attention heads\n    ff_mult=4,  # Multiplier for the hidden dimension in the feed-forward network\n)\n\n# Pass the tensor through the transformer model\nlogits = bitnet(x)\n\n# Print the shape of the output\nprint(logits)\n\n```\n\n\n### `BitAttention`\nThis Attention has been modified to use BitLinear instead of the default linear projection. It's also using Multi-Grouped Query Attention instead of regular multi-head attention for faster decoding and longer context handling.\n\n```python\nimport torch\nfrom bitnet import BitMGQA\n\n# Create a random tensor of shape (1, 10, 512)\nx = torch.randn(1, 10, 512)\n\n# Create an instance of the BitMGQA model with input size 512, 8 attention heads, and 4 layers\ngqa = BitMGQA(512, 8, 4)\n\n# Pass the input tensor through the BitMGQA model and get the output and attention weights\nout, _ = gqa(x, x, x, need_weights=True)\n\n# Print the shapes of the output tensor and attention tensor\nprint(out)\n```\n\n### `BitFeedForward`\n- Feedforward as shown in the diagram with BitLinear and a GELU:\n- Linear -> GELU -> Linear\n- You can add dropouts, or layernorms, or other layers for a better ffn\n\n```python\nimport torch\nfrom bitnet import BitFeedForward\n\n# Create a random input tensor of shape (10, 512)\nx = torch.randn(10, 512)\n\n# Create an instance of the BitFeedForward class with the following parameters:\n# - input_dim: 512\n# - hidden_dim: 512\n# - num_layers: 4\n# - swish: True (use Swish activation function)\n# - post_act_ln: True (apply Layer Normalization after each activation)\n# - dropout: 0.1 (apply dropout with a probability of 0.1)\nff = BitFeedForward(512, 512, 4, swish=True, post_act_ln=True, dropout=0.1)\n\n# Apply the BitFeedForward network to the input tensor x\ny = ff(x)\n\n# Print the shape of the output tensor y\nprint(y)  # torch.Size([10, 512])\n```\n\n## Inference\n```python\nfrom bitnet import BitNetInference\n\nbitnet = BitNetInference()\nbitnet.load_model(\"../model_checkpoint.pth\")  # Download model\noutput_str = bitnet.generate(\"The dog jumped over the \", 512)\nprint(output_str)\n```\n\n## Huggingface Usage\n```python\nimport torch\nfrom transformers import AutoModelForSequenceClassification, AutoTokenizer\n\nfrom bitnet import replace_linears_in_hf\n\n# Load a model from Hugging Face's Transformers\nmodel_name = \"bert-base-uncased\"\ntokenizer = AutoTokenizer.from_pretrained(model_name)\nmodel = AutoModelForSequenceClassification.from_pretrained(model_name)\n\n# Replace Linear layers with BitLinear\nreplace_linears_in_hf(model)\n\n# Example text to classify\ntext = \"Replace this with your text\"\ninputs = tokenizer(\n    text, return_tensors=\"pt\", padding=True, truncation=True, max_length=512\n)\n\n# Perform inference\nmodel.eval()  # Set the model to evaluation mode\nwith torch.no_grad():\n    outputs = model(**inputs)\n    predictions = torch.nn.functional.softmax(outputs.logits, dim=-1)\n    print(predictions)\n\n# Process predictions\npredicted_class_id = predictions.argmax().item()\nprint(f\"Predicted class ID: {predicted_class_id}\")\n\n# Optionally, map the predicted class ID to a label, if you know the classification labels\n# labels = [\"Label 1\", \"Label 2\", ...]  # Define your labels corresponding to the model's classes\n# print(f\"Predicted label: {labels[predicted_class_id]}\")\n```\n\n\n## Drop in Replacement for Pytorch Models\n```python\nimport torch\nfrom torch import nn\nfrom bitnet import replace_linears_in_pytorch_model\n\n# Define a simple model\nmodel = nn.Sequential(\n    nn.Linear(10, 20),\n    nn.ReLU(),\n    nn.Linear(20, 30),\n)\n\nprint(\"Before replacement:\")\nprint(model)\n\n# Replace nn.Linear with BitLinear\nreplace_linears_in_pytorch_model(model)\n\nprint(\"After replacement:\")\nprint(model)\n\n# Now you can use the model for training or inference\n# For example, pass a random input through the model\ninput = torch.randn(1, 10)\noutput = model(input)\n```\n\n\n### Optimized Cuda Kernel\n`python setup.py build_ext --inplace`\n\n```python\nimport torch\nimport gemm_lowbit_ext  # This imports the compiled module\n\n# Example usage\na = torch.randn(10, 20, dtype=torch.half, device='cuda')  # Example tensor\nb = torch.randn(20, 30, dtype=torch.half, device='cuda')  # Example tensor\nc = torch.empty(10, 30, dtype=torch.half, device='cuda')  # Output tensor\n\nw_scale = 1.0  # Example scale factor\nx_scale = 1.0  # Example scale factor\n\n# Call the custom CUDA GEMM operation\ngemm_lowbit_ext.gemm_lowbit(a, b, c, w_scale, x_scale)\n\nprint(c)  # View the result\n\n```\n\n\n## `BitLora`\nImplementation of BitLora!\n\n```python\nimport torch\nfrom bitnet import BitLora\n\n# Random text tensor\nx = torch.randn(1, 12, 200)\n\n# Create an instance of the BitLora model\nmodel = BitLora(in_features=200, out_features=200, rank=4, lora_alpha=1)\n\n# Perform the forward pass\nout = model(x)\n\n# Print the shape of the output tensor\nprint(out.shape)\n```\n\n\n## BitMamba\n```python\nimport torch\nfrom bitnet import BitMamba\n\n# Create a tensor of size (2, 10) with random values between 0 and 100\nx = torch.randint(0, 100, (2, 10))\n\n# Create an instance of the BitMamba model with input size 512, hidden size 100, output size 10, and depth size 6\nmodel = BitMamba(512, 100, 10, 6, return_tokens=True)\n\n# Pass the input tensor through the model and get the output\noutput = model(x)\n\n# Print the output tensor\nprint(output)\n\n# Print the shape of the output tensor\nprint(output.shape)\n\n```\n\n## `BitMoE`\n\n```python\nimport torch\nfrom bitnet.bit_moe import BitMoE\n\n# Create input tensor\nx = torch.randn(2, 4, 8)\n\n# Create BitMoE model with specified input and output dimensions\nmodel = BitMoE(8, 4, 2)\n\n# Forward pass through the model\noutput = model(x)\n\n# Print the output\nprint(output)\n```\n\n\n### 1 Bit Vision Transformers\nThis idea came to me out of nowhere but it seems to be pretty fun, as you can leverage bitlinear for vision tasks for ultra-compression. It would be nice to train this on imagenet if you could make a script, we'll provide the compute. Then the next stage would be to train a join vision language model gpt-4o\n\n```python\nimport torch\nfrom bitnet import OneBitViT\n\n# Create an instance of the OneBitViT model\nv = OneBitViT(\n    image_size=256,\n    patch_size=32,\n    num_classes=1000,\n    dim=1024,\n    depth=6,\n    heads=16,\n    mlp_dim=2048,\n)\n\n# Generate a random image tensor\nimg = torch.randn(1, 3, 256, 256)\n\n# Pass the image through the OneBitViT model to get predictions\npreds = v(img)  # (1, 1000)\n\n# Print the predictions\nprint(preds)\n\n```\n\n# License\nMIT\n\n# Citation\n```bibtex\n@misc{2310.11453,\nAuthor = {Hongyu Wang and Shuming Ma and Li Dong and Shaohan Huang and Huaijie Wang and Lingxiao Ma and Fan Yang and Ruiping Wang and Yi Wu and Furu Wei},\nTitle = {BitNet: Scaling 1-bit Transformers for Large Language Models},\nYear = {2023},\nEprint = {arXiv:2310.11453},\n}\n\n```\n\n\n# Todo\n- [x] Double check BitLinear implementation and make sure it works exactly as in paper \n- [x] Implement training script for `BitNetTransformer`\n- [x] Train on Enwiki8, copy and past code and data from Lucidrains repos\n- [x] Benchmark performance\n- [x] Look into Straight Through Estimator for non-differentiable backprop\n- [x] Implement BitFeedForward\n- [x] Clean up codebase \n- [x] Add unit tests for each module\n- [x] Implement the new BitNet1.5b from the [paper](https://arxiv.org/abs/2402.17764)\n- [ ] Implement the BitNet15b in Cuda\n- [ ] Implement the low bit gemm cuda kernel ","summary":"BitNet provides a PyTorch implementation of the 1-bit Transformer architecture, designed to scale large language models through efficient binarized linear projections. By replacing standard linear layers with custom BitLinear modules, the library significantly optimizes computational efficiency, including advanced support for Multi-Grouped Query Attention to enhance decoding speed and context handling. This project is ideal for researchers and developers looking to experiment with low-precision, high-performance model architectures by training or fine-tuning models from scratch.","description":"Implementation of \"BitNet: Scaling 1-bit Transformers for Large Language Models\" in pytorch","stars":1936,"language":"Python"},{"owner":"embedchain","repo":"embedchain","url":"https://github.com/embedchain/embedchain","readme":"<p align=\"center\">\n  <a href=\"https://github.com/mem0ai/mem0\">\n    <img src=\"docs/images/banner-sm.png\" width=\"800px\" alt=\"Mem0 - The Memory Layer for Personalized AI\">\n  </a>\n</p>\n<p align=\"center\" style=\"display: flex; justify-content: center; gap: 20px; align-items: center;\">\n  <a href=\"https://trendshift.io/repositories/11194\" target=\"blank\">\n    <img src=\"https://trendshift.io/api/badge/repositories/11194\" alt=\"mem0ai%2Fmem0 | Trendshift\" width=\"250\" height=\"55\"/>\n  </a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://mem0.ai\">Learn more</a>\n  ·\n  <a href=\"https://mem0.dev/DiG\">Join Discord</a>\n  ·\n  <a href=\"https://mem0.dev/demo\">Demo</a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://mem0.dev/DiG\">\n    <img src=\"https://img.shields.io/badge/Discord-%235865F2.svg?&logo=discord&logoColor=white\" alt=\"Mem0 Discord\">\n  </a>\n  <a href=\"https://pepy.tech/project/mem0ai\">\n    <img src=\"https://img.shields.io/pypi/dm/mem0ai\" alt=\"Mem0 PyPI - Downloads\">\n  </a>\n  <a href=\"https://github.com/mem0ai/mem0\">\n    <img src=\"https://img.shields.io/github/commit-activity/m/mem0ai/mem0?style=flat-square\" alt=\"GitHub commit activity\">\n  </a>\n  <a href=\"https://pypi.org/project/mem0ai\" target=\"blank\">\n    <img src=\"https://img.shields.io/pypi/v/mem0ai?color=%2334D058&label=pypi%20package\" alt=\"Package version\">\n  </a>\n  <a href=\"https://www.npmjs.com/package/mem0ai\" target=\"blank\">\n    <img src=\"https://img.shields.io/npm/v/mem0ai\" alt=\"Npm package\">\n  </a>\n  <a href=\"https://www.ycombinator.com/companies/mem0\">\n    <img src=\"https://img.shields.io/badge/Y%20Combinator-S24-orange?style=flat-square\" alt=\"Y Combinator S24\">\n  </a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://mem0.ai/research\"><strong>📄 Benchmarking Mem0's token-efficient memory algorithm →</strong></a>\n</p>\n\n## New Memory Algorithm (April 2026)\n\n| Benchmark | Old | New  | Tokens  | Latency p50  |\n| --- | --- | --- | --- | --- |\n| **LoCoMo** | 71.4 | **91.6** | 7.0K  | 0.88s  |\n| **LongMemEval** | 67.8 | **94.8** | 6.8K  | 1.09s  |\n| **BEAM (1M)** | — | **64.1** | 6.7K  | 1.00s  |\n| **BEAM (10M)** | — | **48.6** | 6.9K  | 1.05s  |\n\nAll benchmarks run on the same production-representative model stack. Single-pass retrieval (one call, no agentic loops).\n\n**What changed:**\n- **Single-pass ADD-only extraction** -- one LLM call, no UPDATE/DELETE. Memories accumulate; nothing is overwritten.\n- **Agent-generated facts are first-class** -- when an agent confirms an action, that information is now stored with equal weight.\n- **Entity linking** -- entities are extracted, embedded, and linked across memories for retrieval boosting.\n- **Multi-signal retrieval** -- semantic, BM25 keyword, and entity matching scored in parallel and fused.\n- **Temporal Reasoning** -- time-aware retrieval that ranks the right dated instance for queries about current state, past events, and upcoming plans.\n\nSee the [migration guide](https://docs.mem0.ai/migration/oss-v2-to-v3) for upgrade instructions. The [evaluation framework](https://github.com/mem0ai/memory-benchmarks) is open-sourced so anyone can reproduce the numbers.\n\n## Research Highlights\n- **91.6 on LoCoMo** -- +20 points over the previous algorithm\n- **94.8 on LongMemEval** -- +27 points, with +53.6 on assistant memory recall\n- **64.1 on BEAM (1M)** -- production-scale memory evaluation at 1M tokens\n- [Read the full paper](https://mem0.ai/research)\n\n# Introduction\n\n[Mem0](https://mem0.ai) (\"mem-zero\") enhances AI assistants and agents with an intelligent memory layer, enabling personalized AI interactions. It remembers user preferences, adapts to individual needs, and continuously learns over time—ideal for customer support chatbots, AI assistants, and autonomous systems.\n\n### Key Features & Use Cases\n\n**Core Capabilities:**\n- **Multi-Level Memory**: Seamlessly retains User, Session, and Agent state with adaptive personalization\n- **Developer-Friendly**: Intuitive API, cross-platform SDKs, and a fully managed service option\n\n**Applications:**\n- **AI Assistants**: Consistent, context-rich conversations\n- **Customer Support**: Recall past tickets and user history for tailored help\n- **Healthcare**: Track patient preferences and history for personalized care\n- **Productivity & Gaming**: Adaptive workflows and environments based on user behavior\n\n## 🚀 Quickstart Guide <a name=\"quickstart\"></a>\n\n### Sign up as an agent\n\nAI agents can mint a working Mem0 API key in under five seconds — no email, no dashboard, no OTP. Four commands end-to-end:\n\n```bash\n# 1. Install\nnpm install -g @mem0/cli      # or: pip install mem0-cli\n\n# 2. Sign up as an agent (replace `claude-code` with your name)\nmem0 init --agent --agent-caller claude-code\n\n# 3. Add a memory\nmem0 add \"I am using mem0\"\n\n# 4. Search\nmem0 search \"am I using mem0\"\n```\n\nThe human owner can claim the account later with `mem0 init --email <their-email>` — same key, memories preserved. Full guide: [Sign up as an agent](https://docs.mem0.ai/platform/agent-signup).\n\n| | Library | Self-Hosted Server | Cloud Platform |\n|---|---------|-------------------|----------------|\n| **Best for** | Testing, prototyping | Teams running on their own infrastructure | Zero-ops production use |\n| **Setup** | `pip install mem0ai` | `docker compose up` | Sign up at [app.mem0.ai](https://app.mem0.ai?utm_source=oss&utm_medium=readme) |\n| **Dashboard** | -- | [Yes](https://docs.mem0.ai/open-source/setup) | Yes |\n| **Auth & API Keys** | -- | Yes | Yes |\n| **Advanced Features** | -- | Teasers | All included |\n\nJust testing? Use the library. Building for a team? Self-hosted. Want zero ops? Cloud.\n\n### Library (pip / npm)\n\n```bash\npip install mem0ai\n```\n\nFor enhanced hybrid search with BM25 keyword matching and entity extraction, install with NLP support:\n\n```bash\npip install mem0ai[nlp]\npython -m spacy download en_core_web_sm\n```\n\nInstall sdk via npm:\n\n```bash\nnpm install mem0ai\n```\n\n### Self-Hosted Server\n\n> **Note:** Self-hosted auth is on by default. Upgrading from a pre-auth build? Set `ADMIN_API_KEY`, register an admin through the wizard, or `AUTH_DISABLED=true` for local dev only. See [upgrade notes](https://docs.mem0.ai/open-source/setup#upgrade-notes).\n\n```bash\n# Recommended: one command — start the stack, create an admin, issue the first API key.\ncd server && make bootstrap\n\n# Manual: start the stack and finish setup via the browser wizard.\ncd server && docker compose up -d    # http://localhost:3000\n```\n\nSee the [self-hosted docs](https://docs.mem0.ai/open-source/overview) for configuration.\n\n### Cloud Platform\n\n1. Sign up on [Mem0 Platform](https://app.mem0.ai?utm_source=oss&utm_medium=readme)\n2. Embed the memory layer via SDK or API keys\n3. Using hosted Qdrant vectors? See the [Platform migration guide](https://docs.mem0.ai/migration/oss-to-platform) to import them into Mem0 Platform.\n\n### CLI\n\nManage memories from your terminal:\n\n```bash\nnpm install -g @mem0/cli   # or: pip install mem0-cli\n\nmem0 init\nmem0 add \"Prefers dark mode and vim keybindings\" --user-id alice\nmem0 search \"What does Alice prefer?\" --user-id alice\n```\n\nSee the [CLI documentation](https://docs.mem0.ai/platform/cli) for the full command reference.\n\n### Agent Skills\n\nTeach your AI coding assistant (Claude Code, Codex, Cursor, Windsurf, OpenCode, OpenClaw, and any tool that supports the skills standard) how to build with Mem0. Two categories:\n\n**Reference skills — always on** (SDK knowledge loaded into the assistant's context):\n\n```bash\nnpx skills add https://github.com/mem0ai/mem0 --skill mem0\nnpx skills add https://github.com/mem0ai/mem0 --skill mem0-cli\nnpx skills add https://github.com/mem0ai/mem0 --skill mem0-vercel-ai-sdk\n```\n\n**Pipeline skills — run on demand** (execute an end-to-end workflow in an existing repo):\n\n```bash\nnpx skills add https://github.com/mem0ai/mem0 --skill mem0-integrate\nnpx skills add https://github.com/mem0ai/mem0 --skill mem0-test-integration\n```\n\nUse `/mem0-integrate` to wire Mem0 into an existing repo via a test-first pipeline, then `/mem0-test-integration` to verify. See the [skills catalog](./skills/) or [Vibecoding with Mem0](https://docs.mem0.ai/vibecoding) for the full picture.\n\n### Basic Usage\n\nMem0 requires an LLM to function, with `gpt-5-mini` from OpenAI as the default. However, it supports a variety of LLMs; for details, refer to our [Supported LLMs documentation](https://docs.mem0.ai/components/llms/overview).\n\nMem0 uses `text-embedding-3-small` from OpenAI as the default embedding model. For best results with hybrid search (semantic + keyword + entity boosting), we recommend using at least [Qwen 600M](https://huggingface.co/Alibaba-NLP/gte-Qwen2-1.5B-instruct) or a comparable embedding model. See [Supported Embeddings](https://docs.mem0.ai/components/embedders/overview) for configuration details.\n\nFirst step is to instantiate the memory:\n\n```python\nfrom openai import OpenAI\nfrom mem0 import Memory\n\nopenai_client = OpenAI()\nmemory = Memory()\n\ndef chat_with_memories(message: str, user_id: str = \"default_user\") -> str:\n    # Retrieve relevant memories\n    relevant_memories = memory.search(query=message, filters={\"user_id\": user_id}, top_k=3)\n    memories_str = \"\\n\".join(f\"- {entry['memory']}\" for entry in relevant_memories[\"results\"])\n\n    # Generate Assistant response\n    system_prompt = f\"You are a helpful AI. Answer the question based on query and memories.\\nUser Memories:\\n{memories_str}\"\n    messages = [{\"role\": \"system\", \"content\": system_prompt}, {\"role\": \"user\", \"content\": message}]\n    response = openai_client.chat.completions.create(model=\"gpt-5-mini\", messages=messages)\n    assistant_response = response.choices[0].message.content\n\n    # Create new memories from the conversation\n    messages.append({\"role\": \"assistant\", \"content\": assistant_response})\n    memory.add(messages, user_id=user_id)\n\n    return assistant_response\n\ndef main():\n    print(\"Chat with AI (type 'exit' to quit)\")\n    while True:\n        user_input = input(\"You: \").strip()\n        if user_input.lower() == 'exit':\n            print(\"Goodbye!\")\n            break\n        print(f\"AI: {chat_with_memories(user_input)}\")\n\nif __name__ == \"__main__\":\n    main()\n```\n\nFor detailed integration steps, see the [Quickstart](https://docs.mem0.ai/quickstart) and [API Reference](https://docs.mem0.ai/api-reference).\n\n## 🔗 Integrations & Demos\n\n- **ChatGPT with Memory**: Personalized chat powered by Mem0 ([Live Demo](https://mem0.dev/demo))\n- **Browser Extension**: Store memories across ChatGPT, Perplexity, and Claude ([Chrome Extension](https://chromewebstore.google.com/detail/onihkkbipkfeijkadecaafbgagkhglop?utm_source=item-share-cb))\n- **Langgraph Support**: Build a customer bot with Langgraph + Mem0 ([Guide](https://docs.mem0.ai/integrations/langgraph))\n- **CrewAI Integration**: Tailor CrewAI outputs with Mem0 ([Example](https://docs.mem0.ai/integrations/crewai))\n\n## 📚 Documentation & Support\n\n- Full docs: https://docs.mem0.ai\n- Community: [Discord](https://mem0.dev/DiG) · [X (formerly Twitter)](https://x.com/mem0ai)\n- Contact: founders@mem0.ai\n\n## Citation\n\nWe now have a paper you can cite:\n\n```bibtex\n@article{mem0,\n  title={Mem0: Building Production-Ready AI Agents with Scalable Long-Term Memory},\n  author={Chhikara, Prateek and Khant, Dev and Aryan, Saket and Singh, Taranjeet and Yadav, Deshraj},\n  journal={arXiv preprint arXiv:2504.19413},\n  year={2025}\n}\n```\n\n## ⚖️ License\n\nApache 2.0 — see the [LICENSE](https://github.com/mem0ai/mem0/blob/main/LICENSE) file for details.\n","summary":"Mem0 serves as an intelligent memory layer designed to provide AI assistants and autonomous agents with long-term, personalized recall. The platform enables systems to learn user preferences and adapt to individual needs over time by leveraging advanced features like entity linking, temporal reasoning, and multi-signal retrieval. Developers building customer support chatbots, personalized AI assistants, or complex agentic systems will benefit from its intuitive API and its ability to maintain state across user interactions and sessions.","description":"Universal memory layer for AI Agents","stars":57471,"language":"Python"},{"owner":"daytonaio","repo":"daytona","url":"https://github.com/daytonaio/daytona","readme":"&nbsp;\n\n<div align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://github.com/daytonaio/daytona/raw/main/assets/images/Daytona-logotype-white.png\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://github.com/daytonaio/daytona/raw/main/assets/images/Daytona-logotype-black.png\">\n    <img alt=\"Daytona logo\" src=\"https://github.com/daytonaio/daytona/raw/main/assets/images/Daytona-logotype-black.png\" width=\"50%\">\n  </picture>\n</div>\n\n<h3 align=\"center\">\n  Run AI Code.\n  <br/>\n  Secure and Elastic Infrastructure for\n  Running Your AI-Generated Code.\n</h3>\n\n<p align=\"center\">\n    <a href=\"https://www.daytona.io/docs\"> Documentation </a>·\n    <a href=\"https://github.com/daytonaio/daytona/issues/new?assignees=&labels=bug&projects=&template=bug_report.md&title=%F0%9F%90%9B+Bug+Report%3A+\"> Report Bug </a>·\n    <a href=\"https://github.com/daytonaio/daytona/issues/new?assignees=&labels=enhancement&projects=&template=feature_request.md&title=%F0%9F%9A%80+Feature%3A+\"> Request Feature </a>·\n    <a href=\"https://go.daytona.io/slack\"> Join our Slack </a>·\n    <a href=\"https://x.com/daytonaio\"> Connect on X </a>\n</p>\n\n&nbsp;\n\nDaytona is a secure and elastic infrastructure runtime for AI-generated code execution and agent workflows. Our open-source platform provides [sandboxes](https://www.daytona.io/docs/sandboxes/), full composable computers with complete isolation, a dedicated kernel, filesystem, network stack, and allocated vCPU, RAM, and disk.\n\nSandboxes are the core component of the Daytona platform, spinning up in under 90ms from code to execution and running any code in Python, TypeScript, and JavaScript. Built on OCI/Docker compatibility, massive parallelization, and unlimited persistence, sandboxes deliver consistent, predictable environments for agent workflows.\n\nAgents and developers interact with sandboxes programmatically using the Daytona [SDKs](https://www.daytona.io/docs/#3-install-the-sdk), [API](https://www.daytona.io/docs/tools/api/#daytona/), and [CLI](https://www.daytona.io/docs/tools/cli/). Operations span sandbox lifecycle management, filesystem operations, process and code execution, and runtime configuration through base images, packages, and tooling. Our stateful environment [snapshots](https://www.daytona.io/docs/snapshots/) enable persistent agent operations across sessions, making Daytona the ideal foundation for AI agent architectures.\n\n## Features\n\nDaytona provides an extensive set of features and tools for interacting with sandboxes.\n\n- **Platform**: governance and operational controls for organizations standardizing on Daytona\n- **Sandboxes**: isolated full composable computers that execute workloads and retain state\n- **Agent tools**: programmatic capabilities for application code, agents, and integrations\n- **Human tools**: interfaces and remote sessions for interacting with sandboxes\n- **System tools**: platform-level hooks and controls for lifecycle events and network access\n\n| Platform                                                                   | Sandboxes                                                               | Agent tools                                                                       | Human tools                                                               | System tools                                                  |\n| :------------------------------------------------------------------------- | :---------------------------------------------------------------------- | :-------------------------------------------------------------------------------- | :------------------------------------------------------------------------ | :------------------------------------------------------------ |\n| [Organizations](https://www.daytona.io/docs/organizations/)                | [Environment](https://www.daytona.io/docs/configuration/)               | [Process & code execution](https://www.daytona.io/docs/process-code-execution/)   | [Dashboard](https://www.daytona.io/docs/getting-started#dashboard)        | [Webhooks](https://www.daytona.io/docs/webhooks/)             |\n| [API Keys](https://www.daytona.io/docs/api-keys/)                          | [Snapshots](https://www.daytona.io/docs/snapshots/)                     | [File system operations](https://www.daytona.io/docs/file-system-operations/)     | [Web terminal](https://www.daytona.io/docs/web-terminal/)                 | [Network limits](https://www.daytona.io/docs/network-limits/) |\n| [Limits](https://www.daytona.io/docs/limits/)                              | [Declarative builder](https://www.daytona.io/docs/declarative-builder/) | [Language server protocol](https://www.daytona.io/docs/language-server-protocol/) | [SSH access](https://www.daytona.io/docs/ssh-access/)                     |                                                               |\n| [Billing](https://www.daytona.io/docs/billing/)                            | [Volumes](https://www.daytona.io/docs/volumes/)                         | [Computer use](https://www.daytona.io/docs/computer-use/)                         | [VNC access](https://www.daytona.io/docs/vnc-access/)                     |                                                               |\n| [Audit logs](https://www.daytona.io/docs/audit-logs/)                      | [Regions](https://www.daytona.io/docs/regions/)                         | [MCP server](https://www.daytona.io/docs/mcp/)                                    | [VPN connection](https://www.daytona.io/docs/vpn-connections/)            |                                                               |\n| [OpenTelemetry](https://www.daytona.io/docs/experimental/otel-collection/) |                                                                         | [Git operations](https://www.daytona.io/docs/git-operations/)                     | [Preview](https://www.daytona.io/docs/preview/)                           |                                                               |\n| [Integrations](https://www.daytona.io/docs/guides/)                        |                                                                         | [Pseudo terminal (PTY)](https://www.daytona.io/docs/pty/)                         | [Custom preview proxy](https://www.daytona.io/docs/custom-preview-proxy/) |                                                               |\n| [Security exhibit](https://www.daytona.io/docs/security-exhibit/)          |                                                                         | [Log streaming](https://www.daytona.io/docs/log-streaming/)                       | [Playground](https://www.daytona.io/docs/playground/)                     |                                                               |\n\n## Architecture\n\nDaytona platform is organized into multiple plane components, each serving a specific purpose. A detailed overview of each component is available in the [architecture documentation](https://www.daytona.io/docs/architecture/).\n\n- **Interface plane**: provides client interfaces for interacting with Daytona\n- **Control plane**: orchestrates all sandbox operations\n- **Compute plane**: runs and manages sandbox instances\n\n### Applications\n\nRunnable applications and services for the Daytona platform. Each directory is a deployable or buildable component, available in the [apps](apps) directory.\n\n- [`api`](apps/api): NestJS-based RESTful service; primary entry point for all platform operations\n- [`cli`](apps/cli): Go command-line interface access to core features for interacting with sandboxes\n- [`daemon`](apps/daemon): code execution agent that runs inside each sandbox\n- [`dashboard`](apps/dashboard): web user interface for visual sandbox management\n- [`docs`](apps/docs): documentation content; website published to [daytona.io/docs](https://www.daytona.io/docs/)\n- [`otel-collector`](apps/otel-collector): trace and metric collection for Daytona SDK operations\n- [`proxy`](apps/proxy): reverse proxy for custom routing and preview URLs\n- [`runner`](apps/runner): compute nodes that power Daytona's compute plane and run sandboxes\n- [`snapshot-manager`](apps/snapshot-manager): orchestrates the creation of sandbox snapshots\n- [`ssh-gateway`](apps/ssh-gateway): standalone SSH gateway that accepts authenticated `ssh` connections\n\n### Client libraries\n\nClient libraries integrate the Daytona platform from application code through developer-facing SDKs backed by OpenAPI-generated REST clients and toolbox API clients. Each directory is a publishable package for a specific language or runtime, available in the [libs](libs) directory.\n\n#### Python\n\n```bash\npip install daytona\n```\n\nStandalone packages and libraries for interacting with Daytona using Python:\n\n> [`sdk-python`](libs/sdk-python) • [`api-client-python`](libs/api-client-python) • [`api-client-python-async`](libs/api-client-python-async) • [`toolbox-api-client-python`](libs/toolbox-api-client-python) • [`toolbox-api-client-python-async`](libs/toolbox-api-client-python-async)\n\n#### TypeScript\n\n```bash\nnpm install @daytona/sdk\n```\n\nStandalone packages and libraries for interacting with Daytona using TypeScript:\n\n> [`sdk-typescript`](libs/sdk-typescript) • [`api-client`](libs/api-client) • [`toolbox-api-client`](libs/toolbox-api-client)\n\n#### Ruby\n\n```bash\ngem install daytona\n```\n\nStandalone packages and libraries for interacting with Daytona using Ruby:\n\n> [`sdk-ruby`](libs/sdk-ruby) • [`api-client-ruby`](libs/api-client-ruby) • [`toolbox-api-client-ruby`](libs/toolbox-api-client-ruby)\n\n#### Go\n\n```bash\ngo get github.com/daytonaio/daytona/libs/sdk-go\n```\n\nStandalone packages and libraries for interacting with Daytona using Go:\n\n> [`sdk-go`](libs/sdk-go) • [`api-client-go`](libs/api-client-go) • [`toolbox-api-client-go`](libs/toolbox-api-client-go)\n\n#### Java\n\nGradle (`build.gradle.kts`):\n\n```kotlin\ndependencies {\n    implementation(\"io.daytona:sdk:0.1.0\")\n}\n```\n\nMaven (`pom.xml`):\n\n```xml\n<dependency>\n  <groupId>io.daytona</groupId>\n  <artifactId>sdk</artifactId>\n  <version>0.1.0</version>\n</dependency>\n```\n\nStandalone packages and libraries for interacting with Daytona using Java:\n\n> [`sdk-java`](libs/sdk-java) • [`api-client-java`](libs/api-client-java) • [`toolbox-api-client-java`](libs/toolbox-api-client-java)\n\n## Deployments\n\nDaytona is available as a managed service on [app.daytona.io](https://app.daytona.io). Daytona can run as a fully hosted service, as an open-source stack you operate, or in a hybrid setup where Daytona orchestrates sandboxes while execution happens on machines you manage.\n\n- [Open source deployment](https://www.daytona.io/docs/oss-deployment/): full local stack from the [`docker`](docker) directory using Docker Compose\n- [Customer managed compute](https://www.daytona.io/docs/runners/): custom regions and runner machines that operate Daytona sandboxes on your own compute infrastructure\n\n## Quick Start\n\n1. Create an account at [app.daytona.io](https://app.daytona.io)\n2. Generate an [API key](https://app.daytona.io/dashboard/keys)\n3. Create a sandbox\n\n### Python SDK\n\n```py\nfrom daytona import Daytona, DaytonaConfig\n\nconfig = DaytonaConfig(api_key=\"YOUR_API_KEY\")\ndaytona = Daytona(config)\nsandbox = daytona.create()\nresponse = sandbox.process.code_run('print(\"Hello World!\")')\nprint(response.result)\n```\n\n### Typescript SDK\n\n```jsx\nimport { Daytona } from \"@daytona/sdk\";\n\nconst daytona = new Daytona({ apiKey: \"YOUR_API_KEY\" });\nconst sandbox = await daytona.create();\nconst response = await sandbox.process.codeRun('print(\"Hello World!\")');\nconsole.log(response.result);\n```\n\n### Ruby SDK\n\n```ruby\nrequire 'daytona'\n\nconfig = Daytona::Config.new(api_key: 'YOUR_API_KEY')\ndaytona = Daytona::Daytona.new(config)\nsandbox = daytona.create\nresponse = sandbox.process.code_run(code: 'print(\"Hello World!\")')\nputs response.result\n```\n\n### Go SDK\n\n```go\npackage main\n\nimport (\n  \"context\"\n  \"fmt\"\n  \"github.com/daytonaio/daytona/libs/sdk-go/pkg/daytona\"\n  \"github.com/daytonaio/daytona/libs/sdk-go/pkg/types\"\n)\n\nfunc main() {\n  config := &types.DaytonaConfig{APIKey: \"YOUR_API_KEY\"}\n  client, _ := daytona.NewClientWithConfig(config)\n  ctx := context.Background()\n  sandbox, _ := client.Create(ctx, nil)\n  response, _ := sandbox.Process.ExecuteCommand(ctx, \"echo 'Hello World!'\")\n  fmt.Println(response.Result)\n}\n```\n\n### Java SDK\n\n```java\nimport io.daytona.sdk.Daytona;\nimport io.daytona.sdk.DaytonaConfig;\nimport io.daytona.sdk.Sandbox;\nimport io.daytona.sdk.model.ExecuteResponse;\n\npublic class Main {\n  public static void main(String[] args) {\n    DaytonaConfig config = new DaytonaConfig.Builder()\n        .apiKey(\"YOUR_API_KEY\")\n        .build();\n    try (Daytona daytona = new Daytona(config)) {\n      Sandbox sandbox = daytona.create();\n      ExecuteResponse response = sandbox.getProcess().executeCommand(\"echo 'Hello World!'\");\n      System.out.println(response.getResult());\n    }\n  }\n}\n```\n\n### API\n\n```bash\ncurl 'https://app.daytona.io/api/sandbox' \\\n  --request POST \\\n  --header 'Authorization: Bearer <YOUR_API_KEY>' \\\n  --header 'Content-Type: application/json' \\\n  --data '{}'\n```\n\n### CLI\n\n```bash\ndaytona create\n```\n\n## Development\n\n### Devcontainer (full environment)\n\nOpen this repository in a [devcontainer](https://containers.dev/)-compatible editor (VS Code, GitHub Codespaces) for a batteries-included setup with all languages, tools, and supporting services.\n\n### Nix (lightweight, agent-friendly)\n\nIf you prefer working outside the devcontainer — or are an AI agent executing build commands — use the Nix dev shells:\n\n```bash\n# Enter the full dev shell (Go + Node + Python + Ruby + JDK)\nnix develop\n\n# Or pick a language-specific shell\nnix develop .#go       # Go services & libs\nnix develop .#node     # TypeScript / Node.js apps & libs\nnix develop .#python   # Python SDKs & libs\nnix develop .#ruby     # Ruby SDKs & libs\nnix develop .#java     # Java SDKs & libs\n```\n\n**Prerequisites:** [Nix](https://nixos.org/download/) with flakes enabled (`experimental-features = nix-command flakes` in `~/.config/nix/nix.conf`).\n\nFor non-interactive / CI usage:\n\n```bash\nnix develop .#go --command bash -c \"go build ./...\"\n```\n\nOptional: Install [direnv](https://direnv.net/) + [nix-direnv](https://github.com/nix-community/nix-direnv) for automatic shell activation when you `cd` into the project.\n\nSee [`AGENTS.md`](AGENTS.md) for the full shell reference, project-to-shell mapping, and common commands.\n\n> **Note:** Supporting services (PostgreSQL, Redis, etc.) are still managed via `docker compose -f .devcontainer/docker-compose.yaml up`.\n\n---\n\n## Contributing\n\n> [!NOTE]\n> Daytona is Open Source under the [GNU AFFERO GENERAL PUBLIC LICENSE](LICENSE), and is the [copyright of its contributors](NOTICE). If you would like to contribute to the software, read the [Developer Certificate of Origin Version 1.1](https://developercertificate.org/) and the [contributing guide](CONTRIBUTING.md) to get started.\n","summary":"Daytona is an open-source infrastructure platform designed to provide secure, isolated, and elastic environments for executing AI-generated code and agent workflows. It utilizes composable sandboxes that feature dedicated kernels, filesystems, and network stacks, allowing for near-instant execution of Python, TypeScript, and JavaScript. By providing programmatic access via SDKs, APIs, and CLI tools, Daytona enables developers and AI agents to manage complex, persistent environments with ease. This platform is an ideal solution for organizations and developers who need a reliable, scalable foundation for building, testing, and running autonomous AI systems.","description":"Daytona is a Secure and Elastic Infrastructure for Running AI-Generated Code","stars":72504,"language":"TypeScript"},{"owner":"VAST-AI-Research","repo":"TripoSR","url":"https://github.com/VAST-AI-Research/TripoSR","readme":"# TripoSR <a href=\"https://huggingface.co/stabilityai/TripoSR\"><img src=\"https://img.shields.io/badge/%F0%9F%A4%97%20Model_Card-Huggingface-orange\"></a> <a href=\"https://huggingface.co/spaces/stabilityai/TripoSR\"><img src=\"https://img.shields.io/badge/%F0%9F%A4%97%20Gradio%20Demo-Huggingface-orange\"></a> <a href=\"https://huggingface.co/papers/2403.02151\"><img src=\"https://img.shields.io/badge/%F0%9F%A4%97%20Paper-Huggingface-orange\"></a> <a href=\"https://arxiv.org/abs/2403.02151\"><img src=\"https://img.shields.io/badge/Arxiv-2403.02151-B31B1B.svg\"></a> <a href=\"https://discord.gg/mvS9mCfMnQ\"><img src=\"https://img.shields.io/badge/Discord-%235865F2.svg?logo=discord&logoColor=white\"></a>\n\n<div align=\"center\">\n  <img src=\"figures/teaser800.gif\" alt=\"Teaser Video\">\n</div>\n\nThis is the official codebase for **TripoSR**, a state-of-the-art open-source model for **fast** feedforward 3D reconstruction from a single image, collaboratively developed by [Tripo AI](https://www.tripo3d.ai/) and [Stability AI](https://stability.ai/).\n<br><br>\nLeveraging the principles of the [Large Reconstruction Model (LRM)](https://yiconghong.me/LRM/), TripoSR brings to the table key advancements that significantly boost both the speed and quality of 3D reconstruction. Our model is distinguished by its ability to rapidly process inputs, generating high-quality 3D models in less than 0.5 seconds on an NVIDIA A100 GPU. TripoSR has exhibited superior performance in both qualitative and quantitative evaluations, outperforming other open-source alternatives across multiple public datasets. The figures below illustrate visual comparisons and metrics showcasing TripoSR's performance relative to other leading models. Details about the model architecture, training process, and comparisons can be found in this [technical report](https://arxiv.org/abs/2403.02151).\n\n<!--\n<div align=\"center\">\n  <img src=\"figures/comparison800.gif\" alt=\"Teaser Video\">\n</div>\n-->\n<p align=\"center\">\n    <img width=\"800\" src=\"figures/visual_comparisons.jpg\"/>\n</p>\n\n<p align=\"center\">\n    <img width=\"450\" src=\"figures/scatter-comparison.png\"/>\n</p>\n\n\nThe model is released under the MIT license, which includes the source code, pretrained models, and an interactive online demo. Our goal is to empower researchers, developers, and creatives to push the boundaries of what's possible in 3D generative AI and 3D content creation.\n\n## Getting Started\n### Installation\n- Python >= 3.8\n- Install CUDA if available\n- Install PyTorch according to your platform: [https://pytorch.org/get-started/locally/](https://pytorch.org/get-started/locally/) **[Please make sure that the locally-installed CUDA major version matches the PyTorch-shipped CUDA major version. For example if you have CUDA 11.x installed, make sure to install PyTorch compiled with CUDA 11.x.]**\n- Update setuptools by `pip install --upgrade setuptools`\n- Install other dependencies by `pip install -r requirements.txt`\n\n### Manual Inference\n```sh\npython run.py examples/chair.png --output-dir output/\n```\nThis will save the reconstructed 3D model to `output/`. You can also specify more than one image path separated by spaces. The default options takes about **6GB VRAM** for a single image input.\n\nIf you would like to output a texture instead of vertex colors, use the `--bake-texture` option. You may also use `--texture-resolution` to specify the resolution in pixels of the output texture.\n\nFor detailed usage of this script, use `python run.py --help`.\n\n### Local Gradio App\n```sh\npython gradio_app.py\n```\n\n## Troubleshooting\n> AttributeError: module 'torchmcubes_module' has no attribute 'mcubes_cuda'\n\nor\n\n> torchmcubes was not compiled with CUDA support, use CPU version instead.\n\nThis is because `torchmcubes` is compiled without CUDA support. Please make sure that \n\n- The locally-installed CUDA major version matches the PyTorch-shipped CUDA major version. For example if you have CUDA 11.x installed, make sure to install PyTorch compiled with CUDA 11.x.\n- `setuptools>=49.6.0`. If not, upgrade by `pip install --upgrade setuptools`.\n\nThen re-install `torchmcubes` by:\n\n```sh\npip uninstall torchmcubes\npip install git+https://github.com/tatsy/torchmcubes.git\n```\n\n## Citation\n```BibTeX\n@article{TripoSR2024,\n  title={TripoSR: Fast 3D Object Reconstruction from a Single Image},\n  author={Tochilkin, Dmitry and Pankratz, David and Liu, Zexiang and Huang, Zixuan and and Letts, Adam and Li, Yangguang and Liang, Ding and Laforte, Christian and Jampani, Varun and Cao, Yan-Pei},\n  journal={arXiv preprint arXiv:2403.02151},\n  year={2024}\n}\n```\n","summary":"TripoSR is a high-performance, open-source model developed by Tripo AI and Stability AI that enables near-instantaneous 3D reconstruction from a single input image. By leveraging a refined Large Reconstruction Model (LRM) architecture, it can generate high-quality 3D assets in under 0.5 seconds on an NVIDIA A100 GPU. This tool is ideal for researchers, developers, and digital creatives seeking an efficient, state-of-the-art solution for rapid 3D content generation and generative AI workflows.","description":"TripoSR: Fast 3D Object Reconstruction from a Single Image","stars":6564,"language":"Python"},{"owner":"dolphin-emu","repo":"dolphin","url":"https://github.com/dolphin-emu/dolphin","readme":"# Dolphin - A GameCube and Wii Emulator\n\n[Homepage](https://dolphin-emu.org/) | [Project Site](https://github.com/dolphin-emu/dolphin) | [Buildbot](https://dolphin.ci/) | [Forums](https://forums.dolphin-emu.org/) | [Wiki](https://wiki.dolphin-emu.org/) | [GitHub Wiki](https://github.com/dolphin-emu/dolphin/wiki) | [Issue Tracker](https://bugs.dolphin-emu.org/projects/emulator/issues) | [Coding Style](https://github.com/dolphin-emu/dolphin/blob/master/Contributing.md) | [Transifex Page](https://app.transifex.com/dolphinemu/dolphin-emu/dashboard/) | [Analytics](https://mon.dolphin-emu.org/)\n\nDolphin is an emulator for running GameCube and Wii games on Windows,\nLinux, macOS, and recent Android devices. It's licensed under the terms\nof the GNU General Public License, version 2 or later (GPLv2+).\n\nPlease read the [FAQ](https://dolphin-emu.org/docs/faq/) before using Dolphin.\n\n## System Requirements\n\n### Desktop\n\n* OS\n    * Windows (10 1903 or higher).\n    * Linux.\n    * macOS (11.0 Big Sur or higher).\n    * Unix-like systems other than Linux are not officially supported but might work.\n* Processor\n    * A CPU with SSE2 support.\n    * A modern CPU (3 GHz and Dual Core, not older than 2008) is highly recommended.\n* Graphics\n    * A reasonably modern graphics card (Direct3D 11.1 / OpenGL 3.3).\n    * A graphics card that supports Direct3D 11.1 / OpenGL 4.4 is recommended.\n\n### Android\n\n* OS\n    * Android (7.0 Nougat or higher).\n* Processor\n    * A processor with support for 64-bit applications (either ARMv8 or x86-64).\n* Graphics\n    * A graphics processor that supports OpenGL ES 3.0 or higher. Performance varies heavily with [driver quality](https://dolphin-emu.org/blog/2013/09/26/dolphin-emulator-and-opengl-drivers-hall-fameshame/).\n    * A graphics processor that supports standard desktop OpenGL features is recommended for best performance.\n\nDolphin can only be installed on devices that satisfy the above requirements. Attempting to install on an unsupported device will fail and display an error message.\n\n## Building for Windows\n\nUse the solution file `Source/dolphin-emu.sln` to build Dolphin on Windows.\nDolphin targets the latest MSVC shipped with Visual Studio or Build Tools.\nOther compilers might be able to build Dolphin on Windows but have not been\ntested and are not recommended to be used. Git and latest Windows SDK must be\ninstalled when building.\n\nMake sure to pull submodules before building:\n```sh\ngit submodule update --init --recursive\n```\n\nThe \"Release\" solution configuration includes performance optimizations for the best user experience but complicates debugging Dolphin.\nThe \"Debug\" solution configuration is significantly slower, more verbose and less permissive but makes debugging Dolphin easier.\n\n## Building for Linux and macOS\n\nDolphin requires [CMake](https://cmake.org/) for systems other than Windows. \nYou need a recent version of GCC or Clang with decent c++20 support. CMake will\ninform you if your compiler is too old.\nMany libraries are bundled with Dolphin and used if they're not installed on \nyour system. CMake will inform you if a bundled library is used or if you need\nto install any missing packages yourself. You may refer to the [wiki](https://github.com/dolphin-emu/dolphin/wiki/Building-for-Linux) for more information.\n\nMake sure to pull submodules before building:\n```sh\ngit submodule update --init --recursive\n```\n\n### macOS Build Steps:\n\nA binary supporting a single architecture can be built using the following steps: \n\n1. `mkdir build`\n2. `cd build`\n3. `cmake ..`\n4. `make -j $(sysctl -n hw.logicalcpu)`\n\nAn application bundle will be created in `./Binaries`.\n\nA script is also provided to build universal binaries supporting both x64 and ARM in the same\napplication bundle using the following steps:\n\n1. `mkdir build`\n2. `cd build`\n3. `python ../BuildMacOSUniversalBinary.py`\n4. Universal binaries will be available in the `universal` folder\n\nDoing this is more complex as it requires installation of library dependencies for both x64 and ARM (or universal library\nequivalents) and may require specifying additional arguments to point to relevant library locations. \nExecute BuildMacOSUniversalBinary.py --help for more details.  \n\n### Linux Global Build Steps:\n\nTo install to your system.\n\n1. `mkdir build`\n2. `cd build`\n3. `cmake ..`\n4. `make -j $(nproc)`\n5. `sudo make install`\n\n### Linux Local Build Steps:\n\nUseful for development as root access is not required.\n\n1. `mkdir Build`\n2. `cd Build`\n3. `cmake .. -DLINUX_LOCAL_DEV=true`\n4. `make -j $(nproc)`\n5. `ln -s ../../Data/Sys Binaries/`\n\n### Linux Portable Build Steps:\n\nCan be stored on external storage and used on different Linux systems.\nOr useful for having multiple distinct Dolphin setups for testing/development/TAS.\n\n1. `mkdir Build`\n2. `cd Build`\n3. `cmake .. -DLINUX_LOCAL_DEV=true`\n4. `make -j $(nproc)`\n5. `cp -r ../Data/Sys/ Binaries/`\n6. `touch Binaries/portable.txt`\n\n## Building for Android\n\nThese instructions assume familiarity with Android development. If you do not have an\nAndroid dev environment set up, see [AndroidSetup.md](AndroidSetup.md).\n\nMake sure to pull submodules before building:\n```sh\ngit submodule update --init --recursive\n```\n\nIf using Android Studio, import the Gradle project located in `./Source/Android`.\n\nAndroid apps are compiled using a build system called Gradle. Dolphin's native component,\nhowever, is compiled using CMake. The Gradle script will attempt to run a CMake build\nautomatically while building the Java code.\n\n## Uninstalling\n\nOn Windows, simply remove the extracted directory, unless it was installed with the NSIS installer,\nin which case you can uninstall Dolphin like any other Windows application.\n\nLinux users can run `cat install_manifest.txt | xargs -d '\\n' rm` as root from the build directory\nto uninstall Dolphin from their system.\n\nmacOS users can simply delete Dolphin.app to uninstall it.\n\nAdditionally, you'll want to remove the global user directory if you don't plan on reinstalling Dolphin.\n\n## Command Line Usage\n\n```\nUsage: Dolphin.exe [options]... [FILE]...\n\nOptions:\n  --version             show program's version number and exit\n  -h, --help            show this help message and exit\n  -u USER, --user=USER  User folder path\n  -m MOVIE, --movie=MOVIE\n                        Play a movie file\n  -e <file>, --exec=<file>\n                        Load the specified file\n  -n <16-character ASCII title ID>, --nand_title=<16-character ASCII title ID>\n                        Launch a NAND title\n  -C <System>.<Section>.<Key>=<Value>, --config=<System>.<Section>.<Key>=<Value>\n                        Set a configuration option\n  -s <file>, --save_state=<file>\n                        Load the initial save state\n  -d, --debugger        Show the debugger pane and additional View menu options\n  -l, --logger          Open the logger\n  -b, --batch           Run Dolphin without the user interface (Requires\n                        --exec or --nand-title)\n  -c, --confirm         Set Confirm on Stop\n  -v VIDEO_BACKEND, --video_backend=VIDEO_BACKEND\n                        Specify a video backend\n  -a AUDIO_EMULATION, --audio_emulation=AUDIO_EMULATION\n                        Choose audio emulation from [HLE|LLE]\n```\n\nAvailable DSP emulation engines are HLE (High Level Emulation) and\nLLE (Low Level Emulation). HLE is faster but less accurate whereas\nLLE is slower but close to perfect. Note that LLE has two submodes (Interpreter and Recompiler)\nbut they cannot be selected from the command line.\n\nAvailable video backends are \"D3D\" and \"D3D12\" (they are only available on Windows), \"OGL\", and \"Vulkan\".\nThere's also \"Null\", which will not render anything, and\n\"Software Renderer\", which uses the CPU for rendering and\nis intended for debugging purposes only.\n\n## DolphinTool Usage\n```\nusage: dolphin-tool COMMAND -h\n\ncommands supported: [convert, verify, header, extract]\n```\n\n```\nUsage: convert [options]... [FILE]...\n\nOptions:\n  -h, --help            show this help message and exit\n  -u USER, --user=USER  User folder path, required for temporary processing\n                        files.Will be automatically created if this option is\n                        not set.\n  -i FILE, --input=FILE\n                        Path to disc image FILE.\n  -o FILE, --output=FILE\n                        Path to the destination FILE.\n  -f FORMAT, --format=FORMAT\n                        Container format to use. Default is RVZ. [iso|gcz|wia|rvz]\n  -s, --scrub           Scrub junk data as part of conversion.\n  -b BLOCK_SIZE, --block_size=BLOCK_SIZE\n                        Block size for GCZ/WIA/RVZ formats, as an integer.\n                        Suggested value for RVZ: 131072 (128 KiB)\n  -c COMPRESSION, --compression=COMPRESSION\n                        Compression method to use when converting to WIA/RVZ.\n                        Suggested value for RVZ: zstd [none|zstd|bzip|lzma|lzma2]\n  -l COMPRESSION_LEVEL, --compression_level=COMPRESSION_LEVEL\n                        Level of compression for the selected method. Ignored\n                        if 'none'. Suggested value for zstd: 5\n```\n\n```\nUsage: verify [options]...\n\nOptions:\n  -h, --help            show this help message and exit\n  -u USER, --user=USER  User folder path, required for temporary processing\n                        files.Will be automatically created if this option is\n                        not set.\n  -i FILE, --input=FILE\n                        Path to disc image FILE.\n  -a ALGORITHM, --algorithm=ALGORITHM\n                        Optional. Compute and print the digest using the\n                        selected algorithm, then exit. [crc32|md5|sha1|rchash]\n```\n\n```\nUsage: header [options]...\n\nOptions:\n  -h, --help            show this help message and exit\n  -i FILE, --input=FILE\n                        Path to disc image FILE.\n  -b, --block_size      Optional. Print the block size of GCZ/WIA/RVZ formats,\nthen exit.\n  -c, --compression     Optional. Print the compression method of GCZ/WIA/RVZ\n                        formats, then exit.\n  -l, --compression_level\n                        Optional. Print the level of compression for WIA/RVZ\n                        formats, then exit.\n```\n\n```\nUsage: extract [options]...\n\nOptions:\n  -h, --help            show this help message and exit\n  -i FILE, --input=FILE\n                        Path to disc image FILE.\n  -o FOLDER, --output=FOLDER\n                        Path to the destination FOLDER.\n  -p PARTITION, --partition=PARTITION\n                        Which specific partition you want to extract.\n  -s SINGLE, --single=SINGLE\n                        Which specific file/directory you want to extract.\n  -l, --list            List all files in volume/partition. Will print the\n                        directory/file specified with --single if defined.\n  -q, --quiet           Mute all messages except for errors.\n  -g, --gameonly        Only extracts the DATA partition.\n```\n","summary":"Dolphin is a powerful, open-source emulator that allows users to play Nintendo GameCube and Wii games on Windows, Linux, macOS, and Android devices. It provides high-performance emulation across a wide range of hardware, offering a modern way to experience classic titles on contemporary systems. This project is ideal for gamers and retro-computing enthusiasts who want to preserve their game libraries and enjoy them with improved compatibility and performance.","description":"Dolphin is a GameCube / Wii emulator, allowing you to play games for these two platforms on PC with improvements.","stars":15092,"language":"C++"},{"owner":"NUS-HPC-AI-Lab","repo":"OpenDiT","url":"https://github.com/NUS-HPC-AI-Lab/OpenDiT","readme":"<p align=\"center\">\n<img width=\"55%\" alt=\"VideoSys\" src=\"./assets/figures/logo.png?raw=true\">\n</p>\n<h3 align=\"center\">\nAn easy and efficient system for video generation\n</h3>\n<p align=\"center\">| <a href=\"https://github.com/NUS-HPC-AI-Lab/VideoSys?tab=readme-ov-file#installation\">Quick Start</a> | <a href=\"https://github.com/NUS-HPC-AI-Lab/VideoSys?tab=readme-ov-file#usage\">Supported Models</a> | <a href=\"https://github.com/NUS-HPC-AI-Lab/VideoSys?tab=readme-ov-file#acceleration-techniques\">Accelerations</a> | <a href=\"https://discord.gg/WhPmYm9FeG\">Discord</a> | <a href=\"https://oahzxl.notion.site/VideoSys-News-42391db7e0a44f96a1f0c341450ae472?pvs=4\">Media</a> | <a href=\"https://huggingface.co/VideoSys\">HuggingFace Space</a> |\n</p>\n\n### Latest News 🔥\n- [2024/11] 🔥 <b>Propose Data-Centric Parallel (DCP) [[blog](https://oahzxl.github.io/DCP/)][[doc](./docs/dcp.md)], a simple and efficient method for variable sequences (<i>e.g., </i> videos) training</b>.\n- [2024/09] Support [CogVideoX](https://github.com/THUDM/CogVideo), [Vchitect-2.0](https://github.com/Vchitect/Vchitect-2.0) and [Open-Sora-Plan v1.2.0](https://github.com/PKU-YuanGroup/Open-Sora-Plan).\n- [2024/08] 🔥 Evole from [OpenDiT](https://github.com/NUS-HPC-AI-Lab/VideoSys/tree/v1.0.0) to <b>VideoSys: An easy and efficient system for video generation</b>.\n- [2024/08] 🔥 Release PAB paper: <b>[Real-Time Video Generation with Pyramid Attention Broadcast](https://arxiv.org/abs/2408.12588)</b>.\n- [2024/06] 🔥 Propose Pyramid Attention Broadcast (PAB) [[paper](https://arxiv.org/abs/2408.12588)][[blog](https://oahzxl.github.io/PAB/)][[doc](./docs/pab.md)], the first approach to achieve <b>real-time</b> DiT-based video generation, delivering <b>negligible quality loss</b> without <b>requiring any training</b>.\n- [2024/06] Support [Open-Sora-Plan](https://github.com/PKU-YuanGroup/Open-Sora-Plan) and [Latte](https://github.com/Vchitect/Latte).\n- [2024/03] 🔥 Propose Dynamic Sequence Parallel (DSP)[[paper](https://arxiv.org/abs/2403.10266)][[doc](./docs/dsp.md)], achieves **3x** speed for training and **2x** speed for inference in Open-Sora compared with sota sequence parallelism.\n- [2024/03] Support [Open-Sora](https://github.com/hpcaitech/Open-Sora).\n- [2024/02] 🎉 Release [OpenDiT](https://github.com/NUS-HPC-AI-Lab/VideoSys/tree/v1.0.0): An Easy, Fast and Memory-Efficent System for DiT Training and Inference.\n\n# About\n\nVideoSys is an open-source project that provides a user-friendly and high-performance infrastructure for video generation. This comprehensive toolkit will support the entire pipeline from training and inference to serving and compression.\n\nWe are committed to continually integrating cutting-edge open-source video models and techniques. Stay tuned for exciting enhancements and new features on the horizon!\n\n## Installation\n\nPrerequisites:\n\n- Python >= 3.10\n- PyTorch >= 1.13 (We recommend to use a >2.0 version)\n- CUDA >= 11.6\n\nWe strongly recommend using Anaconda to create a new environment (Python >= 3.10) to run our examples:\n\n```shell\nconda create -n videosys python=3.10 -y\nconda activate videosys\n```\n\nInstall VideoSys:\n\n```shell\ngit clone https://github.com/NUS-HPC-AI-Lab/VideoSys\ncd VideoSys\npip install -e .\n```\n\n\n## Usage\n\nVideoSys supports many diffusion models with our various acceleration techniques, enabling these models to run faster and consume less memory.\n\n<b>You can find all available models and their supported acceleration techniques in the following table. Click `Code` to see how to use them.</b>\n\n<table>\n    <tr>\n        <th rowspan=\"2\">Model</th>\n        <th rowspan=\"2\">Train</th>\n        <th rowspan=\"2\">Infer</th>\n        <th colspan=\"3\">Acceleration Techniques</th>\n    </tr>\n    <tr>\n        <th><a href=\"https://github.com/NUS-HPC-AI-Lab/VideoSys?tab=readme-ov-file#dyanmic-sequence-parallelism-dsp-paperdoc\">DSP</a></th>\n        <th><a href=\"https://github.com/NUS-HPC-AI-Lab/VideoSys?tab=readme-ov-file#pyramid-attention-broadcast-pab-blogdoc\">PAB</a></th>\n        <th><a href=\"https://github.com/NUS-HPC-AI-Lab/VideoSys?tab=readme-ov-file#pyramid-attention-broadcast-pab-blogdoc\">DCP</a></th>\n    </tr>\n    <tr>\n        <td>Vchitect [<a href=\"https://github.com/Vchitect/Vchitect-2.0\">source</a>]</td>\n        <td align=\"center\">/</td>\n        <td align=\"center\"><a href=\"./examples/inference/vchitect/sample.py\">Code</a></td>\n        <td align=\"center\">✅</td>\n        <td align=\"center\">✅</td>\n        <td align=\"center\">/</td>\n    </tr>\n    <tr>\n        <td>CogVideoX [<a href=\"https://github.com/THUDM/CogVideo\">source</a>]</td>\n        <td align=\"center\">🟡</td>\n        <td align=\"center\"><a href=\"./examples/inference/cogvideox/sample.py\">Code</a></td>\n        <td align=\"center\">/</td>\n        <td align=\"center\">✅</td>\n        <td align=\"center\">🟡</td>\n    </tr>\n    <tr>\n        <td>Latte [<a href=\"https://github.com/Vchitect/Latte\">source</a>]</td>\n        <td align=\"center\">/</td>\n        <td align=\"center\"><a href=\"./examples/inference/latte/sample.py\">Code</a></td>\n        <td align=\"center\">✅</td>\n        <td align=\"center\">✅</td>\n        <td align=\"center\">/</td>\n    </tr>\n    <tr>\n        <td>Open-Sora-Plan [<a href=\"https://github.com/PKU-YuanGroup/Open-Sora-Plan\">source</a>]</td>\n        <td align=\"center\">/</td>\n        <td align=\"center\"><a href=\"./examples/inference/open_sora_plan/sample.py\">Code</a></td>\n        <td align=\"center\">✅</td>\n        <td align=\"center\">✅</td>\n        <td align=\"center\">/</td>\n    </tr>\n    <tr>\n        <td>Open-Sora [<a href=\"https://github.com/hpcaitech/Open-Sora\">source</a>]</td>\n        <td align=\"center\"><a href=\"./examples/training/open_sora\">Code</a></td>\n        <td align=\"center\"><a href=\"./examples/inference/open_sora/sample.py\">Code</a></td>\n        <td align=\"center\">✅</td>\n        <td align=\"center\">✅</td>\n        <td align=\"center\">✅</td>\n    </tr>\n</table>\n\nYou can also find easy demo with HuggingFace Space <a href=\"https://huggingface.co/VideoSys\">[link]</a> and Gradio <a href=\"./gradio\">[link]</a>. 🟡 means work in progress.\n\n## Acceleration Techniques\n\n### Data-Centric Parallel (DCP) [[blog](https://oahzxl.github.io/DCP/)][[doc](./docs/dcp.md)]\n\n<!-- ![method](./assets/figures/dcp_overview.png) -->\n<p align=\"center\">\n    <img src=\"./assets/figures/dcp_overview.png\" alt=\"method\" height=\"300\">\n</p>\nData-Centric Parallel (DCP) is a simple but effective approach to accelerate distributed training of variable sequences. Unlike previous methods that fix training settings, DCP dyanmically adjusts parallelism and other configs driven by incoming data during runtime, achieving up to 2.1x speedup. As a ease-of-use method, DCP can enpower any video models and parallel methods with minimal code changes.\n\nSee its details [here](./docs/dcp.md).\n\n----\n\n### Pyramid Attention Broadcast (PAB) [[paper](https://arxiv.org/abs/2408.12588)][[blog](https://oahzxl.github.io/PAB/)][[doc](./docs/pab.md)]\n\n![method](./assets/figures/pab_method.png)\n\nPAB is the first approach to achieve <b>real-time</b> DiT-based video generation, delivering <b>lossless quality</b> without <b>requiring any training</b>. By mitigating redundant attention computation, PAB achieves up to 21.6 FPS with 10.6x acceleration, without sacrificing quality across popular DiT-based video generation models including [Open-Sora](https://github.com/hpcaitech/Open-Sora), [Latte](https://github.com/Vchitect/Latte) and [Open-Sora-Plan](https://github.com/PKU-YuanGroup/Open-Sora-Plan).\n\nSee its details [here](./docs/pab.md).\n\n----\n\n### Dyanmic Sequence Parallelism (DSP) [[paper](https://arxiv.org/abs/2403.10266)][[doc](./docs/dsp.md)]\n\n![dsp_overview](./assets/figures/dsp_overview.png)\n\nDSP is a novel, elegant and super efficient sequence parallelism for [Open-Sora](https://github.com/hpcaitech/Open-Sora), [Latte](https://github.com/Vchitect/Latte) and other multi-dimensional transformer architecture.\n\nIt achieves **3x** speed for training and **2x** speed for inference in Open-Sora compared with sota sequence parallelism ([DeepSpeed Ulysses](https://arxiv.org/abs/2309.14509)). For a 10s (80 frames) of 512x512 video, the inference latency of Open-Sora is:\n\n| Method | 1xH800 | 8xH800 (DS Ulysses) | 8xH800 (DSP) |\n| ------ | ------ | ------ | ------ |\n| Latency(s) | 106 | 45 | 22 |\n\nSee its details [here](./docs/dsp.md).\n\n\n## Contributing\n\nWe welcome and value any contributions and collaborations. Please check out [CONTRIBUTING.md](./CONTRIBUTING.md) for how to get involved.\n\n## Contributors\n\n<a href=\"https://github.com/NUS-HPC-AI-Lab/VideoSys/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=NUS-HPC-AI-Lab/VideoSys\"/>\n</a>\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/svg?repos=NUS-HPC-AI-Lab/VideoSys&type=Date)](https://star-history.com/#NUS-HPC-AI-Lab/VideoSys&Date)\n\n## Citation\n\n```\n@misc{videosys2024,\n  author={VideoSys Team},\n  title={VideoSys: An Easy and Efficient System for Video Generation},\n  year={2024},\n  publisher={GitHub},\n  url = {https://github.com/NUS-HPC-AI-Lab/VideoSys},\n}\n\n@misc{zhao2024pab,\n  title={Real-Time Video Generation with Pyramid Attention Broadcast},\n  author={Xuanlei Zhao and Xiaolong Jin and Kai Wang and Yang You},\n  year={2024},\n  eprint={2408.12588},\n  archivePrefix={arXiv},\n  primaryClass={cs.CV},\n  url={https://arxiv.org/abs/2408.12588},\n}\n\n@misc{zhao2024dsp,\n  title={DSP: Dynamic Sequence Parallelism for Multi-Dimensional Transformers},\n  author={Xuanlei Zhao and Shenggan Cheng and Chang Chen and Zangwei Zheng and Ziming Liu and Zheming Yang and Yang You},\n  year={2024},\n  eprint={2403.10266},\n  archivePrefix={arXiv},\n  primaryClass={cs.DC},\n  url={https://arxiv.org/abs/2403.10266},\n}\n\n@misc{zhao2024opendit,\n  author={Xuanlei Zhao, Zhongkai Zhao, Ziming Liu, Haotian Zhou, Qianli Ma, and Yang You},\n  title={OpenDiT: An Easy, Fast and Memory-Efficient System for DiT Training and Inference},\n  year={2024},\n  publisher={GitHub},\n  url={https://github.com/NUS-HPC-AI-Lab/VideoSys/tree/v1.0.0},\n}\n```\n","summary":"OpenDiT (via the VideoSys project) is an open-source, high-performance system for video generation built around diffusion models, aiming to make training and inference pipelines easier while improving speed and memory efficiency. It supports a wide range of video diffusion model architectures and integrates acceleration techniques such as sequence parallelism variants and attention-based methods to reduce compute/memory costs and enable faster real-time generation with minimal quality impact. The project also targets end-to-end workflows, extending beyond model execution to cover serving and compression. It’s a good fit for researchers and engineers who want to quickly prototype, train, or deploy state-of-the-art video generation models on modern GPU hardware without building the infrastructure from scratch.","description":"VideoSys: An easy and efficient system for video generation","stars":2023,"language":"Python"},{"owner":"usebruno","repo":"bruno","url":"https://github.com/usebruno/bruno","readme":"<br />\n<img src=\"assets/images/logo-transparent.png\" width=\"80\"/>\n\n### Bruno - Opensource IDE for exploring and testing APIs.\n\n[![GitHub version](https://badge.fury.io/gh/usebruno%2Fbruno.svg)](https://badge.fury.io/gh/usebruno%2Fbruno)\n[![CI](https://github.com/usebruno/bruno/actions/workflows/tests.yml/badge.svg?branch=main)](https://github.com/usebruno/bruno/actions/workflows/tests.yml)\n[![Commit Activity](https://img.shields.io/github/commit-activity/m/usebruno/bruno)](https://github.com/usebruno/bruno/pulse)\n[![X](https://img.shields.io/twitter/follow/use_bruno?style=social&logo=x)](https://twitter.com/use_bruno)\n[![Website](https://img.shields.io/badge/Website-Visit-blue)](https://www.usebruno.com)\n[![Download](https://img.shields.io/badge/Download-Latest-brightgreen)](https://www.usebruno.com/downloads)\n\n**English**\n| [Українська](docs/readme/readme_ua.md)\n| [Русский](docs/readme/readme_ru.md)\n| [Türkçe](docs/readme/readme_tr.md)\n| [Deutsch](docs/readme/readme_de.md)\n| [Français](docs/readme/readme_fr.md)\n| [Português (BR)](docs/readme/readme_pt_br.md)\n| [한국어](docs/readme/readme_kr.md)\n| [বাংলা](docs/readme/readme_bn.md)\n| [Español](docs/readme/readme_es.md)\n| [Italiano](docs/readme/readme_it.md)\n| [Română](docs/readme/readme_ro.md)\n| [Polski](docs/readme/readme_pl.md)\n| [简体中文](docs/readme/readme_cn.md)\n| [正體中文](docs/readme/readme_zhtw.md)\n| [العربية](docs/readme/readme_ar.md)\n| [日本語](docs/readme/readme_ja.md)\n| [ქართული](docs/readme/readme_ka.md)\n| [Nederlands](docs/readme/readme_nl.md)\n| [فارسی](docs/readme/readme_fa.md)\n\nBruno is a new and innovative API client, aimed at revolutionizing the status quo represented by Postman and similar tools out there.\n\nBruno stores your collections directly in a folder on your filesystem. We use a plain text markup language, Bru, to save information about API requests.\n\nYou can use Git or any version control of your choice to collaborate over your API collections.\n\nBruno is offline-only. There are no plans to add cloud-sync to Bruno, ever. We value your data privacy and believe it should stay on your device. Read our long-term vision [here](https://github.com/usebruno/bruno/discussions/269)\n\n[Download Bruno](https://www.usebruno.com/downloads)\n\n📢 Watch our recent talk at India FOSS 3.0 Conference [here](https://www.youtube.com/watch?v=7bSMFpbcPiY)\n\n![bruno](assets/images/landing-2-dark.png#gh-light-mode-only)\n![bruno](assets/images/landing-2-light.png#gh-dark-mode-only) <br /><br />\n\n## Commercial Versions ✨\n\nMajority of our features are free and open source.\nWe strive to strike a harmonious balance between [open-source principles and sustainability](https://github.com/usebruno/bruno/discussions/269)\n\nYou can explore our [paid versions](https://www.usebruno.com/pricing) to see if there are additional features that you or your team may find useful! <br/>\n\n## Table of Contents\n\n- [Installation](#installation)\n- [Features](#features)\n  - [Run across multiple platforms 🖥️](#run-across-multiple-platforms-%EF%B8%8F)\n  - [Collaborate via Git 👩‍💻🧑‍💻](#collaborate-via-git-%E2%80%8D%E2%80%8D)\n- [Important Links 📌](#important-links-)\n- [Showcase 🎥](#showcase-)\n- [Share Testimonials 📣](#share-testimonials-)\n- [Publishing to New Package Managers](#publishing-to-new-package-managers)\n- [Stay in touch 🌐](#stay-in-touch-)\n- [Trademark](#trademark)\n- [Contribute 👩‍💻🧑‍💻](#contribute-%E2%80%8D%E2%80%8D)\n- [Authors](#authors)\n- [License 📄](#license-)\n\n## Installation\n\nBruno is available as binary download [on our website](https://www.usebruno.com/downloads) for Mac, Windows and Linux.\n\nYou can also install Bruno via package managers like Homebrew, Chocolatey, Scoop, Snap, Flatpak and Apt.\n\n```sh\n# On Mac via Homebrew\nbrew install bruno\n\n# On Windows via Chocolatey\nchoco install bruno\n\n# On Windows via Scoop\nscoop bucket add extras\nscoop install bruno\n\n# On Windows via winget\nwinget install Bruno.Bruno\n\n# On Linux via Snap\nsnap install bruno\n\n# On Linux via Flatpak\nflatpak install com.usebruno.Bruno\n\n# On Arch Linux via AUR\nyay -S bruno\n\n# On Linux via Apt\nsudo mkdir -p /etc/apt/keyrings\nsudo apt update && sudo apt install gpg curl\ncurl -fsSL \"https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x9FA6017ECABE0266\" \\\n  | gpg --dearmor \\\n  | sudo tee /etc/apt/keyrings/bruno.gpg > /dev/null\nsudo chmod 644 /etc/apt/keyrings/bruno.gpg\necho \"deb [arch=amd64 signed-by=/etc/apt/keyrings/bruno.gpg] http://debian.usebruno.com/ bruno stable\" \\\n  | sudo tee /etc/apt/sources.list.d/bruno.list\nsudo apt update && sudo apt install bruno\n```\n\n## Features\n\n### Run across multiple platforms 🖥️\n\n![bruno](assets/images/run-anywhere.png) <br /><br />\n\n### Collaborate via Git 👩‍💻🧑‍💻\n\nOr any version control system of your choice\n\n![bruno](assets/images/version-control.png) <br /><br />\n\n## Important Links 📌\n\n- [Our Long Term Vision](https://github.com/usebruno/bruno/discussions/269)\n- [Roadmap](https://www.usebruno.com/roadmap)\n- [Documentation](https://docs.usebruno.com)\n- [Stack Overflow](https://stackoverflow.com/questions/tagged/bruno)\n- [Website](https://www.usebruno.com)\n- [Pricing](https://www.usebruno.com/pricing)\n- [Download](https://www.usebruno.com/downloads)\n\n## Showcase 🎥\n\n- [Testimonials](https://github.com/usebruno/bruno/discussions/343)\n- [Knowledge Hub](https://github.com/usebruno/bruno/discussions/386)\n- [Scriptmania](https://github.com/usebruno/bruno/discussions/385)\n\n## Share Testimonials 📣\n\nIf Bruno has helped you at work and your teams, please don't forget to share your [testimonials on our GitHub discussion](https://github.com/usebruno/bruno/discussions/343)\n\n## Publishing to New Package Managers\n\nPlease see [here](publishing.md) for more information.\n\n## Stay in touch 🌐\n\n[𝕏 (Twitter)](https://twitter.com/use_bruno) <br />\n[Website](https://www.usebruno.com) <br />\n[Discord](https://discord.com/invite/KgcZUncpjq) <br />\n[LinkedIn](https://www.linkedin.com/company/usebruno)\n\n## Trademark\n\n**Name**\n\n`Bruno` is a trademark held by [Anoop M D](https://www.helloanoop.com/)\n\n**Logo**\n\nThe logo is sourced from [OpenMoji](https://openmoji.org/library/emoji-1F436/). License: CC [BY-SA 4.0](https://creativecommons.org/licenses/by-sa/4.0/)\n\n## Contribute 👩‍💻🧑‍💻\n\nI am happy that you are looking to improve bruno. Please check out the [contributing guide](contributing.md)\n\nEven if you are not able to make contributions via code, please don't hesitate to file bugs and feature requests that needs to be implemented to solve your use case.\n\n## Authors\n\n<div align=\"center\">\n    <a href=\"https://github.com/usebruno/bruno/graphs/contributors\">\n        <img src=\"https://contrib.rocks/image?repo=usebruno/bruno\" />\n    </a>\n</div>\n\n## License 📄\n\n[MIT](license.md)\n","summary":"Bruno is an innovative, open-source API client designed as a privacy-focused alternative to tools like Postman. It uniquely stores API collections as plain-text files directly on your local filesystem, allowing developers to manage and collaborate on their requests using standard version control systems like Git. By operating as an offline-only application, Bruno ensures that sensitive data remains entirely on the user's device, making it an ideal choice for developers and teams who prioritize data security and local workflow integration.","description":"Opensource IDE For Exploring and Testing API's (lightweight alternative to Postman/Insomnia)","stars":44629,"language":"JavaScript"},{"owner":"qnguyen3","repo":"chat-with-mlx","url":"https://github.com/qnguyen3/chat-with-mlx","readme":"<div align=\"center\">\n\n# Chat with MLX 🧑‍💻\n\n[![version](https://badge.fury.io/py/chat-with-mlx.svg)](https://badge.fury.io/py/chat-with-mlx)\n[![downloads](https://img.shields.io/pypi/dm/chat-with-mlx)](https://pypistats.org/packages/chat-with-mlx)\n[![license](https://img.shields.io/pypi/l/chat-with-mlx)](https://github.com/qnguyen3/chat-with-mlx/blob/main/LICENSE.md)\n[![python-version](https://img.shields.io/pypi/pyversions/chat-with-mlx)](https://badge.fury.io/py/chat-with-mlx)\n</div>\n\nAn all-in-one Chat Playground using Apple MLX on Apple Silicon Macs.\n\n![chat_with_mlx](assets/Logo.png)\n\n## Features\n\n- **Privacy-enhanced AI**: Chat with your favourite models and data securely.\n- **MLX Playground**: Your all in one LLM Chat UI for Apple MLX\n- **Easy Integration**: Easy integrate any HuggingFace and MLX Compatible Open-Source Models.\n- **Default Models**: Llama-3, Phi-3, Yi, Qwen, Mistral, Codestral, Mixtral, StableLM (along with Dolphin and Hermes variants)\n\n## Installation and Usage\n\n### Easy Setup\n\n- Install Pip\n- Install: `pip install chat-with-mlx`\n\n### Manual Pip Installation\n\n```bash\ngit clone https://github.com/qnguyen3/chat-with-mlx.git\ncd chat-with-mlx\npython -m venv .venv\nsource .venv/bin/activate\npip install -e .\n```\n\n#### Manual Conda Installation\n\n```bash\ngit clone https://github.com/qnguyen3/chat-with-mlx.git\ncd chat-with-mlx\nconda create -n mlx-chat python=3.11\nconda activate mlx-chat\npip install -e .\n```\n\n#### Usage\n\n- Start the app: `chat-with-mlx`\n\n## Add Your Model\n\nPlease checkout the guide [HERE](ADD_MODEL.MD)\n\n## Known Issues\n\n- When the model is downloading by Solution 1, the only way to stop it is to hit `control + C` on your Terminal.\n- If you want to switch the file, you have to manually hit STOP INDEXING. Otherwise, the vector database would add the second document to the current database.\n- You have to choose a dataset mode (Document or YouTube) in order for it to work.\n- **Phi-3-small** can't do streaming in completions\n\n## Why MLX?\n\nMLX is an array framework for machine learning research on Apple silicon,\nbrought to you by Apple machine learning research.\n\nSome key features of MLX include:\n\n- **Familiar APIs**: MLX has a Python API that closely follows NumPy.  MLX\n   also has fully featured C++, [C](https://github.com/ml-explore/mlx-c), and\n   [Swift](https://github.com/ml-explore/mlx-swift/) APIs, which closely mirror\n   the Python API.  MLX has higher
