I-assisted workflows by streamlining codebase navigation and reducing the resource overhead of headless agents.","description":"Pre-indexed code knowledge graph for Claude Code, Codex, Gemini, Cursor, OpenCode, AntiGravity, Kiro, and Hermes Agent — fewer tokens, fewer tool calls, 100% local","stars":37759,"language":"TypeScript"},{"owner":"facebook","repo":"pyrefly","url":"https://github.com/facebook/pyrefly","readme":"# Pyrefly: A fast type checker and language server for Python with powerful IDE features\n\n[![pyrefly](https://img.shields.io/endpoint?url=https://pyrefly.org/badge.json)](https://github.com/facebook/pyrefly)\n[![PyPI](https://img.shields.io/pypi/v/pyrefly?color=blue&label=pypi)](https://pypi.python.org/pypi/pyrefly)\n[![VS Code](https://img.shields.io/badge/VS%20Code-Marketplace-blue)](https://marketplace.visualstudio.com/items?itemName=meta.pyrefly)\n[![Open VSX](https://img.shields.io/open-vsx/dt/meta/pyrefly?color=blue&label=Open%20VSX)](https://open-vsx.org/extension/meta/pyrefly)\n[![Discord](https://img.shields.io/badge/Discord-%235865F2.svg?logo=discord&logoColor=white)](https://discord.gg/Cf7mFQtW7W)\n[![License: MIT](https://img.shields.io/badge/License-MIT-blue.svg)](https://opensource.org/licenses/MIT)\n\nPyrefly is a type checker and language server for Python, which provides\nlightning-fast type checking along with IDE features such as code navigation,\nsemantic highlighting, and code completion. It is available as a\n[command-line tool](https://pyrefly.org/en/docs/installation/) and an extension\nfor popular IDEs and editors such as\n[VSCode](https://marketplace.visualstudio.com/items?itemName=meta.pyrefly),\n[Neovim](https://pyrefly.org/en/docs/IDE/#neovim),\n[Zed](https://zed.dev/extensions/pyrefly), and\n[more](https://pyrefly.org/en/docs/IDE/).\n\nSee the [Pyrefly website](https://pyrefly.org) for full documentation and how to\nadd Pyrefly to your editor of choice.\n\nPyrefly's current development status is [stable](https://github.com/facebook/pyrefly/releases/tag/1.0.0).\n\n### Key Features\n\n- **Fast.** Pyrefly checks over 1.85 million lines of code per second, type checking projects like PyTorch 15x faster than Mypy and Pyright. In the IDE, rechecks typically complete in under 10 milliseconds after saving a file.\n- **Production-proven at scale.** Pyrefly is the default type checker for Instagram's 20-million-line Python codebase at Meta, and has been adopted by large open source projects including PyTorch and JAX.\n- **Full-featured language server.** Code navigation, autocomplete, hover information, inlay hints, semantic highlighting, and more, with consistent results across the CLI and your editor of choice.\n- **Understands real-world Python.** Built-in support for frameworks like [Pydantic](https://pyrefly.org/en/docs/pydantic/) and [Django](https://pyrefly.org/en/docs/django/), with model validation, field types, and autocomplete that work out of the box.\n- **Adoption-ready.** Migrate from Mypy or Pyright with `pyrefly init`, silence existing errors with `pyrefly suppress`, and generate type annotations with `pyrefly infer`. Start with one file and expand at your own pace.\n\n### Getting Started\n\n- Try out pyrefly in your browser: [Sandbox](https://pyrefly.org/sandbox/)\n- Get the command-line tool: `pip install pyrefly`\n- Get the IDE extension: [IDE installation page](https://pyrefly.org/en/docs/IDE/)\n\n### Version Policy\n\nPyrefly releases new minor versions (`1.x.0`) monthly and patch versions in between\nas-needed for critical fixes. Pyrefly does *not* follow strict semantic versioning:\nminor versions contain more significant changes than patch versions, but any\nversion may introduce new type errors and other breaking changes. The\n[`pyrefly suppress`](https://pyrefly.org/en/docs/error-suppressions/) command can be used\nto easily silence errors when upgrading to a new version.\n\n## Getting Involved\n\nIf you have questions or would like to report a bug, please\n[create an issue](https://github.com/facebook/pyrefly/issues).\n\nSee our\n[contributing guide](https://github.com/facebook/pyrefly/blob/main/CONTRIBUTING.md)\nand\n[architecture overview](https://github.com/facebook/pyrefly/blob/main/ARCHITECTURE.md)\nfor information on how to contribute to Pyrefly.\n\nJoin our [Discord](https://discord.com/invite/Cf7mFQtW7W) to chat about Pyrefly\nand types. This is also where we hold biweekly office hours.\n","summary":"Pyrefly is a high-performance type checker and language server designed to provide near-instant feedback for large-scale Python codebases. It offers a comprehensive suite of IDE features, including advanced code navigation, intelligent autocomplete, and native support for complex frameworks like Pydantic and Django. By delivering exceptional speed and built-in migration tools, this project is ideal for developers and engineering teams working on massive projects who need to improve type safety without sacrificing workflow efficiency.","description":"A fast type checker and language server for Python","stars":6595,"language":"Rust"},{"owner":"vercel-labs","repo":"zerolang","url":"https://github.com/vercel-labs/zerolang","readme":"# zerolang\n\nzerolang is an experimental graph-first programming language where agents work with semantic program structure instead of raw source text.\n\nSource code is still the source of truth. The graph is the compiler-derived interface agents use to inspect and change programs with less guessing.\n\nThe current model:\n\n- Human-readable `.0` source stays reviewable, auditable, and durable.\n- The compiler derives a checked ProgramGraph from source.\n- Agents inspect graph facts such as node IDs, graph hashes, types, effects, ownership facts, capabilities, helper use, and module edges.\n- Agents can submit checked graph edits instead of only patching text ranges.\n- Where source rewriting is supported, the compiler validates the edit before writing source.\n\nDesign goals:\n\n- Token efficiency\n- Low memory usage\n- Fast startup\n- Fast builds\n- Low runtime latency\n- Zero dependencies\n\n> **Safety status**\n>\n> Security vulnerabilities should be expected. zerolang is not ready for production systems, sensitive data, or trusted infrastructure. Run and develop it in isolated, disposable environments.\n\n## Why Graph\n\nAgents can edit source text, but source text is a lossy interface for program understanding. A text patch has to guess which references are related, whether a range is stale, whether a call resolves to the intended function, and whether an edit preserved ownership, fallibility, effects, imports, and target constraints.\n\nThe ProgramGraph is zerolang's compiler-owned structure for that work. It is meant to give agents a map they can navigate in slices: start from a symbol, diagnostic, call, capability, module, or node ID, then ask for the surrounding semantic facts instead of loading unrelated source. That keeps context gathering focused while leaving source code as the durable artifact humans review.\n\nThe edit loop is also different. A graph edit can target `node #610c78bf` instead of a line range, require the inspected `graphHash`, require an expected field value, and let the compiler validate, lower, write, format, reparse, and check the result as one path. Refactors can be expressed as semantic operations such as renaming a function node or replacing a resolved callee, rather than search-and-replace over text followed by separate cleanup commands.\n\n## Source Text\n\n`.0` source is intentionally regular. The goal is source that behaves like durable data: easy to index, compare, format, audit, and regenerate, while still reading like normal code.\n\nA small program shows typed signatures, infix expressions, fallibility, and explicit capability passing:\n\n```zero\nfn answer() -> i32 {\n    return 40 + 2\n}\n\npub fn main(world: World) -> Void raises {\n    if answer() == 42 {\n        check world.out.write(\"math works\\n\")\n    }\n}\n```\n\nSource code remains the stored representation. ProgramGraph artifacts are derived inspection and interchange data, not the primary project files.\n\n## ProgramGraph\n\nAgents do not have to infer every fact from text. The compiler can expose the checked structure of a program directly:\n\n```bash\nzero graph dump examples/hello.0\n```\n\nExample output:\n\n```text\nzero-graph v1\norigin source-text\nmodule \"hello\"\nhash \"graph:b8a019041020df03\"\n\nnode #ea5ea1ca Function name:\"main\" type:\"Void\" public:true fallible:true\nnode #f9ce8b3e Param name:\"world\" type:\"World\"\nnode #421a4d4b MethodCall name:\"write\" type:\"Void\"\nnode #610c78bf Literal type:\"String\" value:\"hello from zero\\n\"\nedge #421a4d4b arg #610c78bf order:0\nedge #ea5ea1ca body #6c48dda8\n```\n\nThe graph gives agents explicit handles such as node IDs, graph hashes, resolved types, effects, ownership facts, capability facts, helper use, and module edges. The hash is a stale-context check; node IDs are edit targets for the graph that was inspected.\n\n## Checked Graph Edits\n\nFor supported canonical `.0` source, `zero graph patch` applies checked edits to the graph and rewrites source only after validation. The command is intended to collapse the normal agent loop of edit, format, reparse, check, and fix into a compiler-mediated operation:\n\n```bash\nzero graph patch examples/hello.0 \\\n  --expect-graph-hash graph:b8a019041020df03 \\\n  --op 'set node=\"#610c78bf\" field=\"value\" expect=\"hello from zero\\n\" value=\"hello graph\\n\"'\n```\n\nThis is different from a source-text patch. The operation targets a checked semantic node and field. The graph hash rejects stale context, and `expect` rejects the edit if the current field value is different from what the agent inspected.\n\n## Agent Workflow Interfaces\n\nThe compiler exposes the workflow through CLI commands with stable structured output.\n\n### Load Version-Matched Rules\n\nThe compiler ships skill text that matches the binary being used:\n\n```bash\nzero skills list\nzero skills get language\nzero skills get diagnostics\nzero skills get stdlib\n```\n\nPrint the language guide bundled with the compiler:\n\n```bash\nzero skills get language\n```\n\n### Inspect Compiler Facts\n\nCompiler state is exposed through structured command output instead of prose-only output. The important contract is the stable fields and repair identifiers; today the CLI exposes those fields with `--json`:\n\n```bash\nzero tokens --json examples/hello.0\nzero parse --json examples/hello.0\nzero check --json examples/hello.0\nzero graph dump examples/hello.0\nzero graph --json examples/systems-package\nzero size --json examples/point.0\n```\n\nThe structured contracts include diagnostic codes and spans, public symbols, import edges, target readiness, compile-time sandbox facts, retained helpers, graph hashes, node IDs, and size retention reasons.\n\n### Compiler-Native Contracts\n\nMost language ecosystems expose some of these facts through separate tools, editor protocols, or library APIs. zerolang keeps the agent-facing inspection and repair path in the compiler CLI.\n\nThe inspection and repair surfaces are compiler commands, not editor-only features or a separate analysis service:\n\n| Command | Contract |\n| --- | --- |\n| `zero skills get language` | Version-matched language rules bundled with the compiler binary. |\n| `zero check --json` | Diagnostics with code, span, expected/actual fields, fix safety, repair metadata, compile-time sandbox facts, target readiness, and safety facts. |\n| `zero parse --json` | A stable parse summary with declarations, function signatures, and body node kinds. |\n| `zero graph --json` | Modules, imports, public symbols, capabilities, effects, ownership facts, safety facts, helper use, and interface fingerprints. |\n| `zero graph dump` | Deterministic ProgramGraph text with graph hashes, node IDs, nodes, and edges. |\n| `zero graph patch` | Checked graph edits with graph-hash and field-value preconditions. |\n| `zero fix --plan --json` | Typed repair plans that describe proposed fixes without editing files. |\n| `zero size --json` | Retained helpers, size reasons, profile policy, safety facts, backend facts, and artifact budget data. |\n\n### Repair With Diagnostics\n\nA failing fixture reports a diagnostic with stable fields:\n\n```bash\nzero check --json conformance/check/fail/unknown-name.0\n```\n\nToday that output includes fields like:\n\n```json\n{\n  \"code\": \"NAM003\",\n  \"message\": \"unknown identifier 'message'\",\n  \"expected\": \"visible local, parameter, function, or builtin\",\n  \"actual\": \"no matching visible symbol\",\n  \"repair\": {\n    \"id\": \"declare-missing-symbol\"\n  }\n}\n```\n\nDiagnostics can be explained and turned into typed fix plans:\n\n```bash\nzero explain --json TYP009\nzero fix --plan --json examples/agent-repair-demo/broken.0\n```\n\nRun the repair demo:\n\n```bash\npnpm run agent:demo\n```\n\nSee `examples/agent-repair-demo/` for the broken fixture, suggested edit, fixed fixture, and scripted check-explain-plan-rerun flow.\n\n### Compatibility Policy\n\nzerolang is experimental and intentionally unstable. The repo prefers one current syntax and one formatted style over compatibility layers:\n\n```bash\nzero fmt --check examples/hello.0\nzero check --json examples/hello.0\n```\n\nThe project may make breaking changes to simplify the language, standard library, diagnostics, graph APIs, or inspection surfaces for agent use.\n\n## Quick Start\n\nInstall the latest release:\n\n```bash\ncurl -fsSL https://zerolang.ai/install.sh | bash\nexport PATH=\"$HOME/.zero/bin:$PATH\"\nzero --version\n```\n\nCheck a program:\n\n```bash\nzero check examples/hello.0\n```\n\nRun a small executable:\n\n```bash\nzero run examples/add.0\n```\n\nExpected output:\n\n```text\nmath works\n```\n\n## Common Commands\n\n```bash\nzero check examples/hello.0\nzero run examples/add.0\nzero build --emit exe --target linux-musl-x64 examples/add.0 --out .zero/out/add\nzero graph --json examples/systems-package\nzero size --json examples/point.0\nzero skills get zero --full\nzero doctor --json\n```\n\n## Validation\n\n```bash\npnpm run docs:test\npnpm run conformance\npnpm run native:test\npnpm run command-contracts\n```\n\nBenchmarks run locally by default:\n\n```bash\npnpm run bench\n```\n","summary":"Zerolang is an experimental programming language designed to optimize the interaction between AI agents and source code by utilizing a compiler-derived \"ProgramGraph\" rather than relying on raw text. By representing programs as structured semantic data, it allows agents to inspect and modify code through precise node IDs and validated operations, significantly reducing the errors associated with traditional text-based patching. This project is ideal for developers and researchers building AI-driven coding tools who require higher precision, faster context gathering, and built-in semantic verification for automated refactoring tasks.","description":"The programming language for agents","stars":4805,"language":"C"},{"owner":"Nomadcxx","repo":"opencode-cursor","url":"https://github.com/Nomadcxx/opencode-cursor","readme":"![header](docs/header.png)\n\n<p align=\"center\">\n  <img src=\"https://img.shields.io/badge/Linux-FCC624?style=for-the-badge&logo=linux&logoColor=black\" alt=\"Linux\" />\n  <img src=\"https://img.shields.io/badge/macOS-000000?style=for-the-badge&logo=apple&logoColor=white\" alt=\"macOS\" />\n  <img src=\"https://img.shields.io/badge/Windows-0078D6?style=for-the-badge&logo=windows&logoColor=white\" alt=\"Windows\" />\n</p>\n\nNo prompt limits. No broken streams. Full thinking + tool support in OpenCode. Your Cursor subscription, properly integrated.\n\n## Installation\n\n### Option A — One-line installer\n\n**Linux & macOS:**\n```bash\ncurl -fsSL https://raw.githubusercontent.com/Nomadcxx/opencode-cursor/main/install.sh | bash\n```\n\n**Windows:**\n```powershell\n# Windows installer coming soon.\n# In the meantime, use Option C (npm install):\nnpm install -g @rama_nigg/open-cursor\nopen-cursor install\n```\n\n<details>\n<summary><b>Option B</b> — Add to opencode.json</summary>\n\nAdd to `~/.config/opencode/opencode.json` (or `%USERPROFILE%\\.config\\opencode\\opencode.json` on Windows):\n\n```json\n{\n  \"plugin\": [\"@rama_nigg/open-cursor@latest\"],\n  \"provider\": {\n    \"cursor-acp\": {\n      \"name\": \"Cursor ACP\",\n      \"npm\": \"@ai-sdk/openai-compatible\",\n      \"options\": {\n        \"baseURL\": \"http://127.0.0.1:32124/v1\"\n      },\n      \"models\": {\n        \"cursor-acp/auto\":              { \"name\": \"Auto\" },\n\n        \"cursor-acp/claude-opus-4-7\":   { \"name\": \"Claude 4.7 Opus\" },\n        \"cursor-acp/claude-4.6-opus\":   { \"name\": \"Claude 4.6 Opus\" },\n        \"cursor-acp/claude-4.6-sonnet\": { \"name\": \"Claude 4.6 Sonnet\" },\n        \"cursor-acp/claude-4.5-opus\":   { \"name\": \"Claude 4.5 Opus\" },\n        \"cursor-acp/claude-4.5-sonnet\": { \"name\": \"Claude 4.5 Sonnet\" },\n        \"cursor-acp/claude-4.5-haiku\":  { \"name\": \"Claude 4.5 Haiku\" },\n        \"cursor-acp/claude-4-sonnet\":   { \"name\": \"Claude 4 Sonnet\" },\n\n        \"cursor-acp/gpt-5.5\":           { \"name\": \"GPT-5.5\" },\n        \"cursor-acp/gpt-5.4\":           { \"name\": \"GPT-5.4\" },\n        \"cursor-acp/gpt-5.4-mini\":      { \"name\": \"GPT-5.4 Mini\" },\n        \"cursor-acp/gpt-5.4-nano\":      { \"name\": \"GPT-5.4 Nano\" },\n        \"cursor-acp/gpt-5.3-codex\":     { \"name\": \"GPT-5.3 Codex\" },\n        \"cursor-acp/gpt-5.2\":           { \"name\": \"GPT-5.2\" },\n        \"cursor-acp/gpt-5.2-codex\":     { \"name\": \"GPT-5.2 Codex\" },\n        \"cursor-acp/gpt-5.1-codex\":     { \"name\": \"GPT-5.1 Codex\" },\n        \"cursor-acp/gpt-5.1-codex-max\": { \"name\": \"GPT-5.1 Codex Max\" },\n        \"cursor-acp/gpt-5.1-codex-mini\":{ \"name\": \"GPT-5.1 Codex Mini\" },\n        \"cursor-acp/gpt-5-mini\":        { \"name\": \"GPT-5 Mini\" },\n\n        \"cursor-acp/gemini-3.1-pro\":    { \"name\": \"Gemini 3.1 Pro\" },\n        \"cursor-acp/gemini-3-pro\":      { \"name\": \"Gemini 3 Pro\" },\n        \"cursor-acp/gemini-3-flash\":    { \"name\": \"Gemini 3 Flash\" },\n\n        \"cursor-acp/composer-2\":        { \"name\": \"Composer 2\" },\n        \"cursor-acp/composer-2-fast\":   { \"name\": \"Composer 2 Fast\" },\n        \"cursor-acp/composer-1.5\":      { \"name\": \"Composer 1.5\" },\n\n        \"cursor-acp/grok-4-20\":         { \"name\": \"Grok 4.20\" },\n        \"cursor-acp/kimi-k2.5\":         { \"name\": \"Kimi K2.5\" }\n      }\n    }\n  }\n}\n```\n\n> **Refresh anytime** with the bundled CLI:\n> ```bash\n> open-cursor sync-models                       # plain list\n> open-cursor sync-models --variants --compact  # group thinking / fast / -low/-high variants under each base\n> ```\n> The `--variants --compact` form is recommended — it folds dozens of `*-thinking-fast`, `*-high-fast`, etc. into a single entry per family with a `variants` map, and includes `cost` from the official Cursor pricing table so OpenCode TokenSpeed can render usage correctly. Direct `cursor-agent models` still works if you prefer the raw list.\n</details>\n\n<details>\n<summary><b>Option C</b> — npm global + CLI</summary>\n\n```bash\nnpm install -g @rama_nigg/open-cursor\nopen-cursor install\n```\n\nUpgrade: `npm update -g @rama_nigg/open-cursor`\n</details>\n\n<details>\n<summary><b>Option D</b> — Go TUI installer</summary>\n\n```bash\ngit clone https://github.com/Nomadcxx/opencode-cursor.git\ncd opencode-cursor\ngo build -o ./installer ./cmd/installer && ./installer\n```\n</details>\n\n<details>\n<summary><b>Option E</b> — LLM paste</summary>\n\n```\nInstall open-cursor for OpenCode: edit ~/.config/opencode/opencode.json, add \"@rama_nigg/open-cursor@latest\" to \"plugin\", add a \"cursor-acp\" provider with npm \"@ai-sdk/openai-compatible\" and a baseURL of http://127.0.0.1:32124/v1. Populate models by running `open-cursor sync-models --variants --compact` after install (or copy the model list from the README). Auth: `cursor-agent login`. Verify: `opencode models | grep cursor-acp`.\n```\n</details>\n\n<details>\n<summary><b>Option F</b> — Manual (from source)</summary>\n\n```bash\ngit clone https://github.com/Nomadcxx/opencode-cursor.git && cd opencode-cursor\nbun install && bun run build\nln -sf $(pwd)/dist/plugin-entry.js ~/.config/opencode/plugin/cursor-acp.js\n./scripts/sync-models.sh\n```\n\nAdd `\"cursor-acp\"` to the `plugin` array and reuse the provider block from Option B.\n</details>\n\n## Authentication\n\n```bash\nopencode auth login   # provider id: cursor-acp\ncursor-agent login    # direct\n```\n\n## Usage\n\n```bash\nopencode run \"your prompt\" --model cursor-acp/auto\nopencode run \"your prompt\" --model cursor-acp/sonnet-4.5\n```\n\n## MCP Tool Bridge\n\nAny MCP servers already configured in your `opencode.json` work automatically with cursor-acp models — no extra setup needed. The plugin discovers them at startup and injects usage instructions into the system prompt so the model calls them via cursor-agent's Shell tool.\n\n`mcptool` is a shell CLI, so opencode applies your `bash` permission rules to `mcptool call ...`. If you rely on MCP tools asking for confirmation, keep `bash` as `ask` or add explicit `ask`/`deny` rules for `mcptool call *`.\n\n```bash\nmcptool servers                                    # list discovered servers\nmcptool tools [server]                             # list available tools\nmcptool call hybrid-memory memory_stats            # call a tool manually\nmcptool call playwright browser_navigate '{\"url\":\"https://example.com\"}'\n```\n\nAny MCP server using stdio transport works. Tested with hybrid-memory, @modelcontextprotocol/server-filesystem, @playwright/mcp, and @modelcontextprotocol/server-everything.\n\n## Architecture\n\n```mermaid\nflowchart TB\n    OC[\"OpenCode\"] --> SDK[\"@ai-sdk/openai-compatible\"]\n    SDK -->|\"POST /v1/chat/completions\"| PROXY[\"open-cursor proxy :32124\"]\n    PROXY -->|\"spawn per request\"| AGENT[\"cursor-agent --output-format stream-json\"]\n    AGENT -->|\"HTTPS\"| CURSOR[\"Cursor API\"]\n    CURSOR --> AGENT\n\n    AGENT -->|\"assistant / thinking events\"| SSE[\"SSE content chunks\"]\n    AGENT -->|\"tool_call event\"| BOUNDARY[\"Provider boundary (v1 default)\"]\n    BOUNDARY --> COMPAT[\"Schema compat + alias normalization\"]\n    COMPAT --> GUARD[\"Tool-loop guard\"]\n    GUARD -->|\"emit tool_calls + finish_reason=tool_calls\"| SDK\n    SDK --> OC\n\n    OC -->|\"execute tool locally\"| TOOLRUN[\"OpenCode tool runtime\"]\n    TOOLRUN -->|\"next request includes role:tool result\"| SDK\n    SDK -->|\"TOOL_RESULT prompt block\"| AGENT\n\n    AGENT -->|\"Shell tool_call\"| MCPTOOL[\"mcptool CLI\"]\n    MCPTOOL -->|\"stdio\"| MCP[\"MCP Servers\"]\n    MCP --> MCPTOOL\n    MCPTOOL --> AGENT\n```\n\nDefault mode: `CURSOR_ACP_TOOL_LOOP_MODE=opencode`. Details: [docs/architecture/runtime-tool-loop.md](docs/architecture/runtime-tool-loop.md).\n\n## Alternatives\nTHERE is currently not a single perfect plugin for cursor in opencode, my advice is stick with what is the LEAST worst option for you.\n|                   |        open-cursor         | [yet-another-opencode-cursor-auth](https://github.com/Yukaii/yet-another-opencode-cursor-auth) | [opencode-cursor-auth](https://github.com/POSO-PocketSolutions/opencode-cursor-auth) | [cursor-opencode-auth](https://github.com/R44VC0RP/cursor-opencode-auth) |\n| ----------------- | :------------------------: | :--------------------------------------------------------------------------------------------: | :----------------------------------------------------------------------------------: | :----------------------------------------------------------------------: |\n| **Architecture**  | HTTP proxy via cursor-agent |                                       Direct Connect-RPC                                       |                             HTTP proxy via cursor-agent                              |                       Direct Connect-RPC/protobuf                        |\n| **Platform**      |   Linux, macOS, Windows    |                                      Linux, macOS                                           |                                     Linux, macOS                                     |                          macOS only (Keychain)                           |\n| **Max Prompt**    |   Unlimited (HTTP body)    |                                            Unknown                                             |                                   ~128KB (ARG_MAX)                                   |                                 Unknown                                  |\n| **Streaming**     |           ✓ SSE            |                                             ✓ SSE                                              |                                     Undocumented                                     |                                    ✓                                     |\n| **Error Parsing** |   ✓ (quota/auth/model)     |                                               ✗                                                |                                          ✗                                           |                              Debug logging                               |\n| **Installer**     |     ✓ TUI + one-liner      |                                               ✗                                                |                                          ✗                                           |                                    ✗                                     |\n| **OAuth Flow**    |  ✓ OpenCode integration    |                                            ✓ Native                                            |                                    Browser login                                     |                                 Keychain                                 |\n| **Tool Calling**  | ✓ OpenCode-owned loop |                                            ✓ Native                                            |                                    ✓ Experimental                                    |                                    ✗                                     |\n| **MCP Bridge**    | ✓ mcptool CLI (any MCP server) |                                               ✗                                                |                                          ✗                                           |                                    ✗                                     |\n| **Stability**     | Stable (uses official CLI) |                                          Experimental                                          |                                        Stable                                        |                               Experimental                               |\n| **Dependencies**  |     bun, cursor-agent      |                                              npm                                               |                                  bun, cursor-agent                                   |                               Node.js 18+                                |\n| **Port**          |           32124            |                                             18741                                              |                                        32123                                         |                                   4141                                   |\n\n## Troubleshooting\n\n- `fetch() URL is invalid` → `opencode auth login`\n- Model not responding → `cursor-agent login`\n- Quota exceeded → [cursor.com/settings](https://cursor.com/settings)\n- Auth failed → `CURSOR_ACP_LOG_LEVEL=debug opencode auth login cursor-acp`\n\nDebug logging: `CURSOR_ACP_LOG_LEVEL=debug opencode run \"your prompt\" --model cursor-acp/auto`\n\n## Roadmap\n\n```mermaid\nflowchart LR\n    P1[/Stabilise/] --> P2[/MCP Bridge/] --> P3[/Simplify/] --> P4[/ACP + MCP/]\n\n    style P1 fill:#264653,stroke:#1d3557,color:#fff\n    style P2 fill:#264653,stroke:#1d3557,color:#fff\n    style P3 fill:#495057,stroke:#343a40,color:#adb5bd\n    style P4 fill:#495057,stroke:#343a40,color:#adb5bd\n```\n\n[X] **Stabilise** — Clean up dead code, fix test isolation\n[X] **MCP Bridge** — Bridge MCP servers into Cursor models via `mcptool` CLI\n[ ] **Simplify** — Rip out serialisation layers\n[ ] **ACP + MCP** — Structured protocols end-to-end\n\n`Future Architecture` — Long-term direction is `OpenCode -> Cursor ACP -> MCP`, using official Cursor ACP as the backend. Currently deferred: Cursor ACP does not yet reliably propagate MCP servers during ACP session setup. See [docs/architecture/cursor-acp-mcp-future.md](docs/architecture/cursor-acp-mcp-future.md).\n\n## License\n\nBSD-3-Clause\n","summary":"OpenCode-Cursor is a utility that integrates your existing Cursor AI subscription into the OpenCode ecosystem, removing typical prompt limits and stream interruptions. By providing a bridge to Cursor’s model suite, it allows users to leverage advanced AI capabilities like Claude, GPT, and Gemini within a unified development environment. This project is ideal for power users who want to extend their Cursor subscription’s reach and maintain consistent, high-performance model access across their preferred tooling.","description":"Use Cursor Pro models in OpenCode via HTTP proxy with OAuth","stars":476,"language":"TypeScript"},{"owner":"temporalio","repo":"samples-java","url":"https://github.com/temporalio/samples-java","readme":"# Temporal Java SDK Samples\n\nThis repository contains samples that demonstrate various capabilities of \nTemporal using the [Java SDK](https://github.com/temporalio/sdk-java).\n\nIt contains the following modules:\n* [Core](/core): showcases many different SDK features.\n* [SpringBoot](/springboot): showcases SpringBoot autoconfig integration.\n* [SpringBoot Basic](/springboot-basic): Minimal sample showing SpringBoot autoconfig integration without any extra external dependencies.\n* [Spring AI](/springai): demonstrates the Temporal Spring AI integration — durable AI agents with chat models, tools, MCP servers, vector stores, and embeddings.\n\n## Learn more about Temporal and Java SDK\n\n- [Temporal Server repo](https://github.com/temporalio/temporal)\n- [Java SDK repo](https://github.com/temporalio/sdk-java)\n- [Java SDK Guide](https://docs.temporal.io/dev-guide/java)\n\n## Requirements\n\n- Java 17+\n- Local Temporal Server, easiest to get started would be using [Temporal CLI](https://github.com/temporalio/cli).\nFor more options see docs [here](https://docs.temporal.io/kb/all-the-ways-to-run-a-cluster).\n\n\n## Build and run tests\n\n1. Clone this repository:\n\n       git clone https://github.com/temporalio/samples-java\n       cd samples-java\n\n2. Build and run Tests\n\n       ./gradlew build\n\n## Running Samples:\n\nYou can run both \"Core\" and \"SpringBoot\" samples from the main samples project directory.\nDetails on how to run each sample can be found in following two sections.\nTo skip to SpringBoot samples click [here](#Running-SpringBoot-Samples).\n\n### Running \"Core\" samples\nSee the README.md file in each main sample directory for cut/paste Gradle command to run specific example.\n\n<!-- @@@SNIPSTART samples-java-readme-samples-directory -->\n\n#### Hello samples\n\n- [**Hello**](/core/src/main/java/io/temporal/samples/hello): This sample includes a number of individual Workflows that can be executed independently. Each one demonstrates something specific.\n\n    - [**HelloAccumulator**](/core/src/main/java/io/temporal/samples/hello/HelloAccumulator.java): Demonstrates a Workflow Definition that accumulates signals and continues as new.\n    - [**HelloActivity**](/core/src/main/java/io/temporal/samples/hello/HelloActivity.java): Demonstrates a Workflow Definition that executes a single Activity.\n    - [**HelloActivityRetry**](/core/src/main/java/io/temporal/samples/hello/HelloActivityRetry.java): Demonstrates how to Retry an Activity Execution.\n    - [**HelloActivityExclusiveChoice**](/core/src/main/java/io/temporal/samples/hello/HelloActivityExclusiveChoice.java): Demonstrates how to execute Activities based on dynamic input.\n    - [**HelloAsync**](/core/src/main/java/io/temporal/samples/hello/HelloAsync.java): Demonstrates how to execute Activities asynchronously and wait for them using Promises.\n    - [**HelloAwait**](/core/src/main/java/io/temporal/samples/hello/HelloAwait.java): Demonstrates how to use Await statement to wait for a condition.\n    - [**HelloParallelActivity**](/core/src/main/java/io/temporal/samples/hello/HelloParallelActivity.java): Demonstrates how to execute multiple Activities in parallel, asynchronously, and wait for them using `Promise.allOf`.\n    - [**HelloAsyncActivityCompletion**](/core/src/main/java/io/temporal/samples/hello/HelloAsyncActivityCompletion.java): Demonstrates how to complete an Activity Execution asynchronously.\n    - [**HelloAsyncLambda**](/core/src/main/java/io/temporal/samples/hello/HelloAsyncLambda.java): Demonstrates how to execute part of a Workflow asynchronously in a separate task (thread).\n    - [**HelloCancellationScope**](/core/src/main/java/io/temporal/samples/hello/HelloCancellationScope.java): Demonstrates how to explicitly cancel parts of a Workflow Execution.\n    - [**HelloCancellationScopeWithTimer**](/core/src/main/java/io/temporal/samples/hello/HelloCancellationScopeWithTimer.java): Demonstrates how to cancel activity when workflow timer fires and complete execution. This can prefered over using workflow run/execution timeouts.\n    - [**HelloDetachedCancellationScope**](/core/src/main/java/io/temporal/samples/hello/HelloDetachedCancellationScope.java): Demonstrates how to execute cleanup code after a Workflow Execution has been explicitly cancelled.\n    - [**HelloChild**](/core/src/main/java/io/temporal/samples/hello/HelloChild.java): Demonstrates how to execute a simple Child Workflow.\n    - [**HelloCron**](/core/src/main/java/io/temporal/samples/hello/HelloCron.java): Demonstrates how to execute a Workflow according to a cron schedule.\n    - [**HelloDynamic**](/core/src/main/java/io/temporal/samples/hello/HelloDynamic.java): Demonstrates how to use `DynamicWorkflow` and `DynamicActivity` interfaces.\n    - [**HelloEagerWorkflowStart**](/core/src/main/java/io/temporal/samples/hello/HelloEagerWorkflowStart.java): Demonstrates the use of a eager workflow start.\n    - [**HelloPeriodic**](/core/src/main/java/io/temporal/samples/hello/HelloPeriodic.java): Demonstrates the use of the Continue-As-New feature.\n    - [**HelloException**](/core/src/main/java/io/temporal/samples/hello/HelloException.java): Demonstrates how to handle exception propagation and wrapping.\n    - [**HelloLocalActivity**](/core/src/main/java/io/temporal/samples/hello/HelloLocalActivity.java): Demonstrates the use of a [Local Activity](https://docs.temporal.io/docs/jargon/mesh/#local-activity).\n    - [**HelloPolymorphicActivity**](/core/src/main/java/io/temporal/samples/hello/HelloPolymorphicActivity.java): Demonstrates Activity Definitions that extend a common interface.\n    - [**HelloQuery**](/core/src/main/java/io/temporal/samples/hello/HelloQuery.java): Demonstrates how to Query the state of a Workflow Execution.\n    - [**HelloSchedules**](/core/src/main/java/io/temporal/samples/hello/HelloSchedules.java): Demonstrates how to create and interact with a Schedule.\n    - [**HelloSignal**](/core/src/main/java/io/temporal/samples/hello/HelloSignal.java): Demonstrates how to send and handle a Signal.\n    - [**HelloSaga**](/core/src/main/java/io/temporal/samples/hello/HelloSaga.java): Demonstrates how to use the SAGA feature.\n    - [**HelloSearchAttributes**](/core/src/main/java/io/temporal/samples/hello/HelloSearchAttributes.java): Demonstrates how to add custom Search Attributes to Workflow Executions.\n    - [**HelloSideEffect**](/core/src/main/java/io/temporal/samples/hello/HelloSideEffect.java)**: Demonstrates how to implement a Side Effect.\n    - [**HelloUpdate**](/core/src/main/java/io/temporal/samples/hello/HelloUpdate.java): Demonstrates how to create and interact with an Update.\n    - [**HelloDelayedStart**](/core/src/main/java/io/temporal/samples/hello/HelloDelayedStart.java): Demonstrates how to use delayed start config option when starting a Workflow Executions.\n    - [**HelloSignalWithTimer**](/core/src/main/java/io/temporal/samples/hello/HelloSignalWithTimer.java): Demonstrates how to use collect signals for certain amount of time and then process last one. \n    - [**HelloWorkflowTimer**](/core/src/main/java/io/temporal/samples/hello/HelloWorkflowTimer.java): Demonstrates how we can use workflow timer to restrict duration of workflow execution instead of workflow run/execution timeouts.\n    - [**Auto-Heartbeating**](/core/src/main/java/io/temporal/samples/autoheartbeat/): Demonstrates use of Auto-heartbeating utility via activity interceptor. \n    - [**HelloSignalWithStartAndWorkflowInit**](/core/src/main/java/io/temporal/samples/hello/HelloSignalWithStartAndWorkflowInit.java): Demonstrates how WorkflowInit can be useful with SignalWithStart to initialize workflow variables.\n    - [**HelloStandaloneActivity**](/core/src/main/java/io/temporal/samples/hello/HelloStandaloneActivity.java): Demonstrates how to execute a Standalone Activity directly from an ActivityClient, without a Workflow.\n\n#### Scenario-based samples\n\n- [**File Processing Sample**](/core/src/main/java/io/temporal/samples/fileprocessing): Demonstrates how to route tasks to specific Workers. This sample has a set of Activities that download a file, processes it, and uploads the result to a destination. Any Worker can execute the first Activity. However, the second and third Activities must be executed on the same host as the first one.\n\n- [**Booking SAGA**](/core/src/main/java/io/temporal/samples/bookingsaga): Demonstrates Temporals take on the Camunda BPMN \"trip booking\" example.\n\n- [**Synchronous Booking SAGA**](/core/src/main/java/io/temporal/samples/bookingsyncsaga): Demonstrates low latency SAGA with potentially long compensations.\n\n- [**Money Transfer**](/core/src/main/java/io/temporal/samples/moneytransfer): Demonstrates the use of a dedicated Activity Worker.\n\n- [**Money Batch**](/core/src/main/java/io/temporal/samples/moneybatch): Demonstrates a situation where a single deposit should be initiated for multiple withdrawals. For example, a seller might want to be paid once per fixed number of transactions. This sample can be easily extended to perform a payment based on more complex criteria, such as at a specific time or an accumulated amount. The sample also demonstrates how to Signal the Workflow when it executes (*Signal with start*). If the Workflow is already executing, it just receives the Signal. If it is not executing, then the Workflow executes first, and then the Signal is delivered to it. *Signal with start* is a \"lazy\" way to execute Workflows when Signaling them.\n\n- [**Domain-Specific-Language - Define sequence of steps in JSON**](/core/src/main/java/io/temporal/samples/dsl): Demonstrates using domain specific language (DSL) defined in JSON to specify sequence of steps to be performed in our workflow.\n\n- [**Polling Services**](/core/src/main/java/io/temporal/samples/polling): Recommended implementation of an activity that needs to periodically poll an external resource waiting its successful completion\n\n- [**Heartbeating Activity Batch**](/core/src/main/java/io/temporal/samples/batch/heartbeatingactivity): Batch job implementation using a heartbeating activity.\n\n- [**Iterator Batch**](/core/src/main/java/io/temporal/samples/batch/iterator): Batch job implementation using the workflow iterator pattern.\n\n- [**Sliding Window Batch**](/core/src/main/java/io/temporal/samples/batch/slidingwindow): A batch implementation that maintains a configured number of child workflows during processing.\n\n- [**Safe Message Passing**](/core/src/main/java/io/temporal/samples/safemessagepassing): Safely handling concurrent updates and signals messages.\n\n- [**Custom Annotation**](/core/src/main/java/io/temporal/samples/customannotation): Demonstrates how to create a custom annotation using an interceptor.\n\n- [**Async Packet Delivery**](/core/src/main/java/io/temporal/samples/packetdelivery): Demonstrates running multiple execution paths async within single execution.\n\n- [**Worker Versioning**](/core/src/main/java/io/temporal/samples/workerversioning): Demonstrates how to use worker versioning to manage workflow code changes.\n\n- [**Environment Configuration**](/core/src/main/java/io/temporal/samples/envconfig):\nLoad client configuration from TOML files with programmatic overrides.\n\n#### API demonstrations\n\n- [**Async Untyped Child Workflow**](/core/src/main/java/io/temporal/samples/asyncuntypedchild): Demonstrates how to invoke an untyped child workflow async, that can complete after parent workflow is already completed.\n\n- [**Updatable Timer**](/core/src/main/java/io/temporal/samples/updatabletimer): Demonstrates the use of a helper class which relies on `Workflow.await` to implement a blocking sleep that can be updated at any moment.\n\n- [**Workflow Count Interceptor**](/core/src/main/java/io/temporal/samples/countinterceptor): Demonstrates how to create and register a simple Workflow Count Interceptor.\n\n- [**Workflow Retry On Signal Interceptor**](/core/src/main/java/io/temporal/samples/retryonsignalinterceptor): Demonstrates how to create and register an interceptor that retries an activity on a signal.\n\n- [**List Workflows**](/core/src/main/java/io/temporal/samples/listworkflows): Demonstrates the use of custom search attributes and ListWorkflowExecutionsRequest with custom queries.\n\n- [**Payload Converter - CloudEvents**](/core/src/main/java/io/temporal/samples/payloadconverter/cloudevents): Demonstrates the use of a custom payload converter for CloudEvents.\n\n- [**Payload Converter - Crypto**](/core/src/main/java/io/temporal/samples/payloadconverter/crypto): Demonstrates the use of a custom payload converter using jackson-json-crypto.\n\n- [**Async Child Workflow**](/core/src/main/java/io/temporal/samples/asyncchild): Demonstrates how to invoke a child workflow async, that can complete after parent workflow is already completed.\n\n- [**Terminate Workflow**](/core/src/main/java/io/temporal/samples/terminateworkflow): Demonstrates how to terminate a workflow using client API.\n\n- [**Get Workflow Results Async**](/core/src/main/java/io/temporal/samples/getresultsasync): Demonstrates how to start and get workflow results in async manner.\n\n- [**Per Activity Type Options**](/core/src/main/java/io/temporal/samples/peractivityoptions): Demonstrates how to set per Activity type options.\n\n- [**Configure WorkflowClient to use mTLS**](/core/src/main/java/io/temporal/samples/ssl): Demonstrates how to configure WorkflowClient when using mTLS.\n\n- [**Configure WorkflowClient to use API Key**](/core/src/main/java/io/temporal/samples/apikey): Demonstrates how to configure WorkflowClient when using API Keys.\n\n- [**Payload Codec**](/core/src/main/java/io/temporal/samples/encodefailures): Demonstrates how to use simple codec to encode/decode failure messages.\n\n- [**Exclude Workflow/ActivityTypes from Interceptors**](/core/src/main/java/io/temporal/samples/excludefrominterceptor): Demonstrates how to exclude certain workflow / activity types from interceptors.\n\n- [**Standalone Activities**](/core/src/main/java/io/temporal/samples/standaloneactivities): Demonstrates how to start, execute, list, and count Standalone Activities — Activities that run independently without a Workflow, using ActivityClient.\n\n#### SDK Metrics\n\n- [**Set up SDK metrics**](/core/src/main/java/io/temporal/samples/metrics): Demonstrates how to set up and scrape SDK metrics.\n\n#### Tracing Support\n\n- [**Set up OpenTracing and/or OpenTelemetry with Jaeger**](/core/src/main/java/io/temporal/samples/tracing): Demonstrates how to set up OpenTracing and/or OpenTelemetry and view traces using Jaeger.\n\n#### Encryption Support\n\n- [**Encrypted Payloads**](/core/src/main/java/io/temporal/samples/encryptedpayloads): Demonstrates how to use simple codec to encrypt and decrypt payloads.\n\n- [**AWS Encryption SDK**](/core/src/main/java/io/temporal/samples/keymanagementencryption/awsencryptionsdk): Demonstrates how to use the AWS Encryption SDK to encrypt and decrypt payloads with AWS KMS.\n\n#### Nexus Samples\n\n- [**Getting Started**](/core/src/main/java/io/temporal/samples/nexus): Demonstrates how to get started with Temporal and Nexus.\n\n- [**Mapping Multiple Arguments**](/core/src/main/java/io/temporal/samples/nexus): Demonstrates how map a Nexus operation to a Workflow that takes multiple arguments.\n\n- [**Cancellation**](/core/src/main/java/io/temporal/samples/nexuscancellation): Demonstrates how to cancel an async Nexus operation.\n\n- [**Context/Header Propagation**](/core/src/main/java/io/temporal/samples/nexuscontextpropagation): Demonstrates how to propagate context through Nexus operation headers.\n\n- [**Nexus Messaging**](/core/src/main/java/io/temporal/samples/nexusmessaging): Demonstrates how to send signal, update and query messages through Nexus.\n  This contains two samples, one sending messages to an existing workflow and a second that creates a workflow through Nexus\n  and sends messages to it.\n<!-- @@@SNIPEND -->\n\n### Running SpringBoot Samples\n\nThese samples use SpringBoot 2 by default. To switch to using SpringBoot 3 look at the [gradle.properties](gradle.properties) file\nand follow simple instructions there.\n\n1. Start SpringBoot from main repo dir:\n\n       ./gradlew :springboot:bootRun\n\nTo run the basic sample run\n\n       ./gradlew :springboot-basic:bootRun\n\n\n2. Navigate to [localhost:3030](http://localhost:3030)\n\n3. Select which sample you want to run\n\nMore info on each sample:\n- [**Hello**](/springboot/src/main/java/io/temporal/samples/springboot/hello): Invoke simple \"Hello\" workflow from a GET endpoint\n- [**SDK Metrics**](/springboot/src/main/java/io/temporal/samples/springboot/metrics): Learn how to set up SDK Metrics\n- [**Synchronous Update**](/springboot/src/main/java/io/temporal/samples/springboot/update): Learn how to use Synchronous Update feature with this purchase sample\n- [**Kafka Request / Reply**](/springboot/src/main/java/io/temporal/samples/springboot/kafka): Sample showing possible integration with event streaming platforms such as Kafka\n- [**Customize Options**](/springboot/src/main/java/io/temporal/samples/springboot/customize): Sample showing how to customize options such as WorkerOptions, WorkerFactoryOptions, etc (see options config [here](springboot/src/main/java/io/temporal/samples/springboot/customize/TemporalOptionsConfig.java))\n- [**Apache Camel Route**](/springboot/src/main/java/io/temporal/samples/springboot/camel): Sample showing how to start Workflow execution from a Camel Route\n- [**Custom Actuator Endpoint**](/springboot/src/main/java/io/temporal/samples/springboot/actuator): Sample showing how to create a custom Actuator endpoint that shows registered Workflow and Activity impls per task queue.\n\n#### Temporal Cloud\nTo run any of the SpringBoot samples in your Temporal Cloud namespace:\n\n1. Edit the [application-tc.yaml](/springboot/src/main/resources/application-tc.yaml) to set your namespace and client certificates.\n\n2. Start SpringBoot from main repo dir with the `tc` profile:\n\n       ./gradlew bootRun --args='--spring.profiles.active=tc'\n\n3. Follow the previous section from step 2\n\n### Running Spring AI Samples\n\nThe Spring AI samples demonstrate the [Temporal Spring AI integration](https://github.com/temporalio/sdk-java/tree/master/temporal-spring-ai), which makes Spring AI agents durable on Temporal — model calls run as Temporal Activities recorded in Workflow history, and tools are dispatched per their type so they fit Workflow execution.\n\nEach sample is its own Spring Boot application with an interactive CLI. Run from the main repo dir:\n\n       ./gradlew :springai:basic:bootRun\n       ./gradlew :springai:mcp:bootRun\n       ./gradlew :springai:multimodel:bootRun\n       ./gradlew :springai:rag:bootRun\n\nAll samples need an `OPENAI_API_KEY` environment variable; some need additional setup (see each sample's source for details).\n\nMore info on each sample:\n- [**Basic**](/springai/basic): Chat workflow with three tool flavors — activity-backed (`WeatherActivity`), plain workflow tools (`StringTools`), and `@SideEffectTool` (`TimestampTools`) — plus a `PromptChatMemoryAdvisor` for conversation history.\n- [**MCP**](/springai/mcp): Connects to a Model Context Protocol server and exposes its tools to the AI through Temporal activities. Defaults to the filesystem MCP server.\n- [**Multi-Model**](/springai/multimodel): Two providers in one workflow (OpenAI and Anthropic), per-model `ActivityOptions` overrides via a Spring bean, plus a route that exercises Anthropic's extended-thinking mode through provider-specific `ChatOptions` pass-through. Requires `ANTHROPIC_API_KEY` in addition to `OPENAI_API_KEY`.\n- [**RAG**](/springai/rag): Vector store + embeddings for retrieval-augmented generation. Add documents, then ask questions; the workflow searches the vector store and grounds the answer in the retrieved context.\n","summary":"The Temporal Java SDK Samples repository serves as a comprehensive educational resource for developers looking to master the Temporal platform using Java. It provides a modular suite of examples ranging from core workflow fundamentals like activity retries and asynchronous execution to advanced integrations with Spring Boot and Spring AI for building durable AI agents. This collection is an essential tool for software engineers and architects aiming to implement reliable, fault-tolerant distributed systems and complex stateful workflows in Java environments.","description":"Samples for working with the Temporal Java SDK","stars":248,"language":"Java"},{"owner":"bitsandbytes-foundation","repo":"bitsandbytes","url":"https://github.com/bitsandbytes-foundation/bitsandbytes","readme":"<p align=\"center\"><img src=\"https://avatars.githubusercontent.com/u/175231607?s=200&v=4\" alt=\"\"></p>\n<h1 align=\"center\">bitsandbytes</h1>\n<p align=\"center\">\n    <a href=\"https://github.com/bitsandbytes-foundation/bitsandbytes/main/LICENSE\"><img alt=\"License\" src=\"https://img.shields.io/github/license/bitsandbytes-foundation/bitsandbytes.svg?color=blue\"></a>\n    <a href=\"https://pepy.tech/project/bitsandbytes\"><img alt=\"Downloads\" src=\"https://static.pepy.tech/badge/bitsandbytes/month\"></a>\n    <a href=\"https://github.com/bitsandbytes-foundation/bitsandbytes/actions/workflows/tests-nightly.yml\"><img alt=\"Nightly Unit Tests\" src=\"https://img.shields.io/github/actions/workflow/status/bitsandbytes-foundation/bitsandbytes/tests-nightly.yml?logo=github&label=Nightly%20Tests\"></a>\n    <a href=\"https://github.com/bitsandbytes-foundation/bitsandbytes/releases\"><img alt=\"GitHub Release\" src=\"https://img.shields.io/github/v/release/bitsandbytes-foundation/bitsandbytes\"></a>\n    <a href=\"https://pypi.org/project/bitsandbytes/\"><img alt=\"PyPI - Python Version\" src=\"https://img.shields.io/pypi/pyversions/bitsandbytes\"></a>\n</p>\n\n`bitsandbytes` enables accessible large language models via k-bit quantization for PyTorch. We provide three main features for dramatically reducing memory consumption for inference and training:\n\n* 8-bit optimizers uses block-wise quantization to maintain 32-bit performance at a small fraction of the memory cost.\n* LLM.int8() or 8-bit quantization enables large language model inference with only half the required memory and without any performance degradation. This method is based on vector-wise quantization to quantize most features to 8-bits and separately treating outliers with 16-bit matrix multiplication.\n* QLoRA or 4-bit quantization enables large language model training with several memory-saving techniques that don't compromise performance. This method quantizes a model to 4-bits and inserts a small set of trainable low-rank adaptation (LoRA) weights to allow training.\n\nThe library includes quantization primitives for 8-bit & 4-bit operations, through `bitsandbytes.nn.Linear8bitLt` and `bitsandbytes.nn.Linear4bit` and 8-bit optimizers through `bitsandbytes.optim` module.\n\n## System Requirements\nbitsandbytes has the following minimum requirements for all platforms:\n\n* Python 3.10+\n* [PyTorch](https://pytorch.org/get-started/locally/) 2.4+\n  * _Note: While we aim to provide wide backwards compatibility, we recommend using the latest version of PyTorch for the best experience._\n\n#### Accelerator support:\n\n<small>Note: this table reflects the status of the current development branch. For the latest stable release, see the\n[document in the 0.49.2 tag](https://github.com/bitsandbytes-foundation/bitsandbytes/blob/0.49.2/README.md#accelerator-support).\n</small>\n\n##### Legend:\n🚧 = In Development,\n〰️ = Partially Supported,\n✅ = Supported,\n🐢 = Slow Implementation Supported,\n❌ = Not Supported\n\n<table>\n  <thead>\n    <tr>\n      <th>Platform</th>\n      <th>Accelerator</th>\n      <th>Hardware Requirements</th>\n      <th>LLM.int8()</th>\n      <th>QLoRA 4-bit</th>\n      <th>8-bit Optimizers</th>\n    </tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td colspan=\"6\">🐧 <strong>Linux, glibc >= 2.24</strong></td>\n    </tr>\n    <tr>\n      <td align=\"right\">x86-64</td>\n      <td>◻️ CPU</td>\n      <td>Minimum: AVX2<br>Optimized: AVX512F, AVX512BF16</td>\n      <td>✅</td>\n      <td>✅</td>\n      <td>✅</td>\n    </tr>\n    <tr>\n      <td></td>\n      <td>🟩 NVIDIA GPU <br><code>cuda</code></td>\n      <td>SM60+ minimum<br>SM75+ recommended</td>\n      <td>✅</td>\n      <td>✅</td>\n      <td>✅</td>\n    </tr>\n    <tr>\n      <td></td>\n      <td>🟥 AMD GPU <br><code>cuda</code></td>\n      <td>\n        CDNA: gfx90a, gfx942, gfx950<br>\n        RDNA: gfx1100, gfx1101, gfx1102, gfx1103, gfx1150, gfx1151, gfx1152, gfx1153, gfx1200, gfx1201\n      </td>\n      <td>✅</td>\n      <td>✅</td>\n      <td>✅</td>\n    </tr>\n    <tr>\n      <td></td>\n      <td>🟦 Intel GPU <br><code>xpu</code></td>\n      <td>\n        Data Center GPU Max Series<br>\n        Arc A-Series (Alchemist)<br>\n        Arc B-Series (Battlemage)\n      </td>\n      <td>✅</td>\n      <td>✅</td>\n      <td>✅</td>\n    </tr>\n    <tr>\n      <td></td>\n      <td>🟪 Intel Gaudi <br><code>hpu</code></td>\n      <td>Gaudi2, Gaudi3</td>\n      <td>✅</td>\n      <td>〰️</td>\n      <td>❌</td>\n    </tr>\n    <tr>\n      <td align=\"right\">aarch64</td>\n      <td>◻️ CPU</td>\n      <td></td>\n      <td>✅</td>\n      <td>✅</td>\n      <td>❌</td>\n    </tr>\n    <tr>\n      <td></td>\n      <td>🟩 NVIDIA GPU <br><code>cuda</code></td>\n      <td>SM75+</td>\n      <td>✅</td>\n      <td>✅</td>\n      <td>✅</td>\n    </tr>\n    <tr>\n      <td colspan=\"6\">🪟 <strong>Windows 11 / Windows Server 2022+</strong></td>\n    </tr>\n    <tr>\n      <td align=\"right\">x86-64</td>\n      <td>◻️ CPU</td>\n      <td>AVX2</td>\n      <td>✅</td>\n      <td>✅</td>\n      <td>✅</td>\n    </tr>\n    <tr>\n      <td></td>\n      <td>🟩 NVIDIA GPU <br><code>cuda</code></td>\n      <td>SM60+ minimum<br>SM75+ recommended</td>\n      <td>✅</td>\n      <td>✅</td>\n      <td>✅</td>\n    </tr>\n    <tr>\n      <td></td>\n      <td>🟥 AMD GPU <br><code>cuda</code></td>\n      <td>\n        RDNA: gfx1100, gfx1101, gfx1102,<br>\n        gfx1150, gfx1151,<br>\n        gfx1200, gfx1201\n      </td>\n      <td>✅</td>\n      <td>✅</td>\n      <td>✅</td>\n    </tr>\n    <tr>\n      <td></td>\n      <td>🟦 Intel GPU <br><code>xpu</code></td>\n      <td>\n        Arc A-Series (Alchemist) <br>\n        Arc B-Series (Battlemage)\n      </td>\n      <td>✅</td>\n      <td>✅</td>\n      <td>✅</td>\n    </tr>\n    <tr>\n      <td colspan=\"6\">🍎 <strong>macOS 14+</strong></td>\n    </tr>\n    <tr>\n      <td align=\"right\">arm64</td>\n      <td>◻️ CPU</td>\n      <td>Apple M1+</td>\n      <td>✅</td>\n      <td>✅</td>\n      <td>❌</td>\n    </tr>\n    <tr>\n      <td></td>\n      <td>⬜ Metal <br><code>mps</code></td>\n      <td>Apple M1+</td>\n      <td>🐢</td>\n      <td>🐢</td>\n      <td>❌</td>\n  </tbody>\n</table>\n\n## :book: Documentation\n* [Official Documentation](https://huggingface.co/docs/bitsandbytes/main)\n* 🤗 [Transformers](https://huggingface.co/docs/transformers/quantization/bitsandbytes)\n* 🤗 [Diffusers](https://huggingface.co/docs/diffusers/quantization/bitsandbytes)\n* 🤗 [PEFT](https://huggingface.co/docs/peft/developer_guides/quantization#quantize-a-model)\n\n## :heart: Sponsors\nThe continued maintenance and development of `bitsandbytes` is made possible thanks to the generous support of our sponsors. Their contributions help ensure that we can keep improving the project and delivering valuable updates to the community.\n\n<kbd><a href=\"https://hf.co\" target=\"_blank\"><img width=\"100\" src=\"https://huggingface.co/datasets/huggingface/brand-assets/resolve/main/hf-logo.svg\" alt=\"Hugging Face\"></a></kbd>\n&nbsp;\n<kbd><a href=\"https://intel.com\" target=\"_blank\"><img width=\"100\" src=\"https://avatars.githubusercontent.com/u/17888862?s=100&v=4\" alt=\"Intel\"></a></kbd>\n\n## License\n`bitsandbytes` is MIT licensed.\n\n## How to cite us\nIf you found this library useful, please consider citing our work:\n\n### QLoRA\n\n```bibtex\n@article{dettmers2023qlora,\n  title={Qlora: Efficient finetuning of quantized llms},\n  author={Dettmers, Tim and Pagnoni, Artidoro and Holtzman, Ari and Zettlemoyer, Luke},\n  journal={arXiv preprint arXiv:2305.14314},\n  year={2023}\n}\n```\n\n### LLM.int8()\n\n```bibtex\n@article{dettmers2022llmint8,\n  title={LLM.int8(): 8-bit Matrix Multiplication for Transformers at Scale},\n  author={Dettmers, Tim and Lewis, Mike and Belkada, Younes and Zettlemoyer, Luke},\n  journal={arXiv preprint arXiv:2208.07339},\n  year={2022}\n}\n```\n\n### 8-bit Optimizers\n\n```bibtex\n@article{dettmers2022optimizers,\n  title={8-bit Optimizers via Block-wise Quantization},\n  author={Dettmers, Tim and Lewis, Mike and Shleifer, Sam and Zettlemoyer, Luke},\n  journal={9th International Conference on Learning Representations, ICLR},\n  year={2022}\n}\n```\n","summary":"bitsandbytes is a lightweight PyTorch library designed to democratize large language model access by significantly reducing memory consumption through k-bit quantization. Its core capabilities include 8-bit optimizers, LLM.int8() inference, and QLoRA, which enables efficient 4-bit model training without compromising performance. This toolkit is essential for AI researchers and developers who need to run or fine-tune massive models on hardware with limited VRAM.","description":"Accessible large language models via k-bit quantization for PyTorch.","stars":8250,"language":"Python"},{"owner":"chorus-codes","repo":"chorus","url":"https://github.com/chorus-codes/chorus","readme":"<div align=\"center\">\n\n<img src=\"docs/images/logo.png\" alt=\"Chorus\" width=\"120\" />\n\n# Chorus\n\n**A second opinion (and a third) before you ship AI-written code — using the AI subscriptions you already pay for.**\n\n2–3 *different* AI tools review the same change in parallel, only green-lighting when they agree. Runs on your existing Claude Pro / ChatGPT Plus / Gemini Advanced — typical review costs **$0** out of pocket.\n\n[![CI](https://github.com/chorus-codes/chorus/actions/workflows/ci.yml/badge.svg)](https://github.com/chorus-codes/chorus/actions/workflows/ci.yml)\n[![npm](https://img.shields.io/npm/v/chorus-codes?color=22c55e)](https://www.npmjs.com/package/chorus-codes)\n[![License](https://img.shields.io/badge/license-Apache%202.0-blue)](./LICENSE)\n[![Status](https://img.shields.io/badge/status-v0.8.29-brightgreen)]()\n[![Node](https://img.shields.io/badge/node-%E2%89%A520-339933)]()\n\n[Website](https://chorus.codes) · [Roadmap](./ROADMAP.md) · [Issues](https://github.com/chorus-codes/chorus/issues)\n\n</div>\n\n---\n\n<div align=\"center\">\n\n<img src=\"docs/images/hero-demo.gif\" alt=\"Six AI reviewers streaming verdicts in parallel — Chorus running live\" width=\"800\" />\n\n**One AI writes. Three review. You ship only when they agree — using AI subscriptions you already pay for.**\n\n</div>\n\n---\n\n## The problem Chorus solves\n\n🤖 **AI coding tools are confident — and wrong about 5% of the time** in subtle ways that are hard to spot until production.\n\n🪞 **The model that wrote your code can't see its own blind spots.**\nAsking GPT to review GPT's work is theatre — same training, same biases.\n\n💸 **Multi-AI review on raw API keys gets expensive fast.**\nEvery diff × 3 reviewers × pay-per-token = real money. So nobody does it routinely.\n\n### Chorus fixes all three\n\n✅ **Different vendors review each other.**\nClaude writes, GPT and Gemini check it. Different blind spots cover each other. Disagreement = red flag *before* you merge.\n\n✅ **Uses your existing AI subscriptions.**\nYou're already paying for Claude Pro / ChatGPT Plus / Gemini Advanced (~$20/mo each). Chorus drives them headlessly through their CLIs — every multi-AI review costs **$0 out of pocket**, just counts against the quota you already have. Per-token API users save 10-100× vs running the same prompts directly.\n\n✅ **Local-first, zero markup.**\nYour code never reaches a new vendor. Chorus runs on your laptop, talks to the AI tools you already trust, and shuts up. Open source, Apache-2.0.\n\nThat's the whole pitch.\n\n---\n\n## Real moments where this matters\n\n🚨 **You asked Claude to write a `divide(a, b)` helper.**\nIt says \"looks correct!\" You ship. Production crashes at 2am because nobody handled `b = 0`.\n*With Chorus: GPT or Gemini would have flagged it in the review pass before you merged.*\n\n🔧 **You're refactoring a critical path.**\nYour AI rewrote 200 lines and says it's behaviour-equivalent. You're tired and skeptical.\n*Run it through Chorus. Three different AIs all saying \"yes, equivalent\" lets you sleep.*\n\n🏗️ **Big architectural call** — queue vs polling, sync vs async, this DB vs that one.\nWrite a paragraph, hit Chorus. *Three different models give you three angles you hadn't thought of.*\n\n📝 **Reviewing a 600-line PR.**\nYou're short on time. Paste the diff into Chorus. *Three reviewers spot the obvious bugs in 90 seconds. Your job becomes the 5% they couldn't catch.*\n\n⚔️ **Test-driven development where neither AI cheats.**\n*One AI writes tests blind to the code; another AI writes code to pass them.* Use the `red-green` template.\n\n🐛 **Hunting a flaky bug.**\nReproduces 1-in-20, no obvious pattern. Drop the failing test + suspect code into Chorus.\n*Each reviewer attacks the bug from a different angle — race? clock skew? off-by-one? — and you land on the cause faster than walking it alone.*\n\n---\n\n## Quick start\n\n```bash\nnpm i -g chorus-codes      # install (no sudo — see below)\nchorus init                # finds AI tools you already have, wires up MCP\nchorus start --ui          # opens http://localhost:5050\n```\n\nPaste a task. Hit submit. Watch the AIs argue.\n\n> **Don't `sudo npm install -g`** if you use nvm, fnm, asdf, or any per-user\n> Node manager. `sudo` writes to root's npm prefix (`/usr/local/...`) but\n> your `chorus` command resolves through your user prefix — the install\n> succeeds in a place PATH never sees, leaving you on a stale version.\n> If `npm install -g` errors with EACCES, set up an unprivileged prefix:\n> `npm config set prefix ~/.npm-global` then add `~/.npm-global/bin` to\n> your PATH.\n\nTo upgrade later: `chorus update`. The updater locates the running binary\nand writes to that exact install location, so it always lands where PATH\nexpects regardless of how you installed.\n\n### Or drive it from any AI CLI you already use\n\n`chorus init` registers Chorus as an MCP server with every CLI / IDE it detects (Claude Code, Codex, Gemini CLI, Cursor, Windsurf, Kimi, OpenCode). After that, just ask the assistant in plain English:\n\n```\n> Use chorus to review the staged diff against main\n> Ask chorus to run the architect-review template on src/payments/*.ts\n> chorus, get a second opinion on this function from claude + gemini\n```\n\n**Codex headless note:** `codex exec` blocks all MCP tool calls under any `approval_policy` setting. To use Chorus from `codex exec` (scripted / CI usage), pass `--dangerously-bypass-approvals-and-sandbox`. Interactive `codex` (TUI) prompts the user normally and works without that flag. (Tracked in [#16](https://github.com/chorus-codes/chorus/issues/16).)\n\nOr invoke a specific MCP tool directly — every CLI uses the same name (`chorus`) and exposes nine tools:\n\n| Tool | What it does |\n|---|---|\n| `create_chat` | Kick off a review (returns a `chatId` + URL) |\n| `wait_for_chat` | Block until the run reaches a terminal state |\n| `get_chat_status` | Poll a running chat without blocking |\n| `cancel_chat` / `resume_chat` | Stop or restart |\n| `list_templates` / `list_personas` | Discover what's available |\n| `invoke_persona` | Run a single persona (skip multi-reviewer fan-out) |\n| `list_blocked` | See chats that need human input |\n\nExample raw invocation (from any MCP client):\n\n```jsonc\n// tool: chorus.create_chat\n{\n  \"template\": \"code-review\",\n  \"work\": \"Review the staged diff vs main. Flag race conditions and missing tests.\"\n}\n// → { \"chatId\": \"abc123\", \"url\": \"http://localhost:5050/runs/abc123\", \"status\": \"reviewing\" }\n```\n\nStream results back into your editor, or open the URL to watch live.\n\n---\n\n**Requires** Node 20+ and at least *one* of these (you probably already have one):\n\n- Claude Code, Codex CLI, Gemini CLI, OpenCode, or Kimi CLI — uses your existing subscription, no extra cost\n- *or* an OpenRouter API key (one key, 200+ models, pay-per-use)\n\n<details>\n<summary><b>Don't have any of those?</b></summary>\n\n```bash\nnpm i -g @anthropic-ai/claude-code   # Anthropic — uses Claude Pro sub\nnpm i -g @openai/codex                # OpenAI — uses ChatGPT Plus sub\nnpm i -g @google/gemini-cli           # Google — uses Gemini Advanced sub\n```\n\nPick whichever vendor you already pay for. Or skip CLIs entirely and add an OpenRouter key in Settings after `chorus init`.\n\n</details>\n\n---\n\n## What it looks like\n\n<table>\n<tr>\n<td width=\"50%\" align=\"center\">\n<b>Live review</b><br/>\n<img src=\"docs/images/run-page.png\" alt=\"Three reviewers streaming verdicts in real-time\" width=\"100%\" /><br/>\n<sub>Each AI streams its thinking live as it reviews.</sub>\n</td>\n<td width=\"50%\" align=\"center\">\n<b>Verdict</b><br/>\n<img src=\"docs/images/verdict.png\" alt=\"Final converged verdict with merged diff\" width=\"100%\" /><br/>\n<sub>Agreement = green. Disagreement = retry with their feedback.</sub>\n</td>\n</tr>\n<tr>\n<td width=\"50%\" align=\"center\">\n<b>Templates</b><br/>\n<img src=\"docs/images/templates.png\" alt=\"Template editor\" width=\"100%\" /><br/>\n<sub>Pre-built review patterns. Make your own in YAML.</sub>\n</td>\n<td width=\"50%\" align=\"center\">\n<b>From inside Claude / Cursor</b><br/>\n<img src=\"docs/images/mcp.png\" alt=\"Claude Code calling Chorus\" width=\"100%\" /><br/>\n<sub>Any AI tool that speaks MCP can trigger a Chorus run.</sub>\n</td>\n</tr>\n</table>\n\n---\n\n## A real example\n\nYou ask Claude to write this:\n\n```js\nfunction divide(a, b) {\n  return a / b;\n}\n```\n\nSubmit to Chorus with the **Code Review** template (1 writer + 2 reviewers, both must agree to ship):\n\n| Step | What happens |\n|---|---|\n| 1. Claude writes | \"Looks correct to me!\" |\n| 2. GPT reviews in parallel | 🚨 *No type validation — `divide('a','b')` returns `NaN`* |\n| 3. Gemini reviews in parallel | 🚨 *Missing zero-check — `divide(1, 0)` returns `Infinity`* |\n| 4. Verdict | ❌ **REJECT** — both reviewers flagged real bugs |\n\nNow you know what to fix **before** you push.\n\n---\n\n## Templates: pre-built review patterns\n\nDon't figure out which AIs to use yourself. Pick a pattern that fits the moment:\n\n| Use this when... | Template |\n|---|---|\n| Pre-merge sanity check | `code-review` — 1 writer + 2 reviewers, both must agree |\n| Diagnosing a weird bug | `bug-diagnose` — one hypothesises, one challenges |\n| Big architectural call | `architect-review` — 3 different vendors critique your plan |\n| TDD where neither AI cheats | `red-green` — tests written blind to code |\n| Quick audit of a diff someone else wrote | `review-only` — paste, get 3 opinions, no writer |\n\nMake your own by dropping a YAML file in `~/.chorus/templates/`. Or duplicate one of the built-ins and tweak.\n\n<details>\n<summary><b>Custom template example</b></summary>\n\n```yaml\nid: security-pre-merge\nlabel: Security Pre-Merge\ndescription: Sentinel persona on every reviewer; everyone must approve.\nslots:\n  doer:\n    lineage: anthropic\n    model: claude-sonnet-4-6\n  reviewers:\n    - { lineage: openai,   model: codex,                 persona: sentinel }\n    - { lineage: google,   model: gemini-2.5-pro,        persona: sentinel }\n    - { lineage: opencode, model: opencode-go/kimi-k2.6, persona: sentinel }\nquorum:\n  type: unanimous\n```\n\n</details>\n\n---\n\n## Reviewer personas\n\nEach reviewer can wear a \"hat\" — a focus area Chorus prepends to their prompt:\n\n| Persona | What they look for |\n|---|---|\n| 🛡️ **Sentinel** | Security holes, auth bypass, injection |\n| 🗺️ **Cartographer** | Cross-platform issues (Windows vs Mac, browser support) |\n| 💰 **Accountant** | Cost regressions (extra DB queries, API calls) |\n| ⚡ **Profiler** | Performance regressions |\n| 🔍 **Inspector**, 📦 **Quartermaster**, 🛎️ **Concierge**, 🏛️ **Conservator**, 📚 **Librarian**, 🌐 **Translator** | …and more — see Personas page in cockpit |\n\nDifferent personas reviewing the same change = wider net.\n\n---\n\n## Why \"different vendors\" matters\n\nYou can run Chorus with three Claudes. We let you. But the value drops a lot.\n\nA second Claude reviewing the first Claude's work is theatre — same training, same blind spots. Mix vendors (Claude + GPT + Gemini) and you get genuinely different angles, because they were trained on different data with different biases.\n\nTemplates let you encode this: each reviewer slot has a `lineage` (anthropic / openai / google / opencode / moonshot). Built-in templates mix vendors automatically.\n\n---\n\n## What does it cost?\n\nTwo paths, depending on how you already pay for AI:\n\n**Using subscriptions** (Claude Pro / ChatGPT Plus / Gemini Advanced — ~$20/mo each)\nA typical review = **$0** out of pocket. Counts against the quota you already have.\n\n**Using API keys** (pay-per-use)\nA typical code-review run = **$0.30 to $1.50**, depending on diff size. If reviewers disagree and retry, 2–3× worst case.\n\nChorus adds **zero markup**. We don't see your tokens.\n\n---\n\n## Permissions & safety\n\nReviewers run on your machine. You decide how much trust to give them:\n\n| Mode | Read code | Write code | Network | When to use |\n|---|:---:|:---:|:---:|---|\n| 🔒 **Strict** | ✅ | ❌ | ❌ | Reviewing a diff you don't trust |\n| 📁 **Workspace** *(default)* | ✅ | ✅ inside chat dir | ❌ | Day-to-day |\n| 🔓 **Full** | ✅ | ✅ anywhere | ✅ | Personal machine, full trust |\n\nConfigure on first run, or anytime at *Settings → Permissions*.\n\n> **Trust model in plain English.** \"Workspace\" means the reviewer can write files inside its working directory and run scoped commands, but can't reach the internet or write outside the sandbox. \"Full\" means anything-goes — only enable on a personal machine you own. Run `chorus doctor` to verify each AI tool got the sandbox you set.\n\n---\n\n## Compared to other code-review tools\n\n| | **Chorus** | CodeRabbit | Greptile | Cursor Review | GitHub Copilot |\n|---|:---:|:---:|:---:|:---:|:---:|\n| Multiple AI vendors review the same change | ✅ | ❌ | ❌ | ❌ | ❌ |\n| Uses your existing AI subscriptions | ✅ | ❌ | ❌ | ❌ | ❌ |\n| Runs locally (your code never leaves your existing AI vendors) | ✅ | ❌ | ❌ | partial | ❌ |\n| Open source (modify + self-host) | ✅ Apache-2.0 | ❌ | ❌ | ❌ | ❌ |\n| Custom review patterns | ✅ | partial | ❌ | ❌ | ❌ |\n\n**The unique thing:** your code never goes to a new vendor. Chorus just orchestrates the AI tools you already use.\n\n---\n\n## Commands\n\n```bash\nchorus init             # one-time: detect + connect AI tools\nchorus start --ui       # boot + open browser\nchorus stop             # shut it down\nchorus status           # is it running?\nchorus doctor           # diagnose AI tool detection / sandbox issues\nchorus diagnose         # print a redacted diagnostic bundle for bug reports\n```\n\n---\n\n## Reporting bugs\n\nWhen something goes wrong, run:\n\n```bash\nchorus diagnose\n```\n\nIt prints a fenced markdown block with: chorus version, running daemon\nversion (and a **VERSION MISMATCH** flag if the CLI was upgraded but the\ndaemon hasn't been restarted), node + OS + arch, daemon health, DB\ncounts, CLI detection, the latest crash dump if any, and the last 50\nlines of `daemon.log`. Paste the block into a new issue at\n<https://github.com/chorus-codes/chorus/issues/new>.\n\nIf chorus crashes hard (uncaught exception during boot — common on\nolder Node + Windows combos), a self-contained crash log is written to\n`~/.chorus/crashes/<timestamp>.log`. Attach it to the issue.\n\n---\n\n## Telemetry\n\nChorus pings home once on startup and once every 24h. The payload is fixed:\n\n```json\n{\n  \"schema\": 1,\n  \"installId\": \"<random uuid>\",\n  \"version\": \"0.7.0\",\n  \"os\": \"linux\", \"arch\": \"x64\", \"node\": \"22\",\n  \"daemonUptimeSeconds\": 86400,\n  \"chatsLast24h\": 12\n}\n```\n\n**Never sent:** chat content, prompts, file paths, repo paths, model names, voice/template names, hostnames, IPs, API keys.\n\nTurn it off any of three ways:\n\n```bash\nexport CHORUS_TELEMETRY=0           # env var\ntouch ~/.chorus/no-telemetry        # touch-file\n# or click \"Off\" in cockpit Settings → Telemetry\n```\n\nThe install ID lives at `~/.chorus/install-id` — `rm` it for a fresh one.\n\n---\n\n## Roadmap\n\n- [x] **v0.5** — Daemon + cockpit + 4 AI vendors\n- [x] **v0.6** — MCP server, persona system\n- [x] **v0.7** — OpenRouter integration, voices table, real-time sidebar\n- [x] **v0.8** — Public launch + reliability hardening (diagnose, crash hook, fallback dedup)\n- [ ] **v0.9** — Multi-stage review (write → review → fix → re-review)\n- [ ] **v0.10** — Per-voice persona overrides + auto-disable on persistent voice failure\n- [ ] **v1.0** — Local-LLM adapter (Ollama / LM Studio / vLLM via OpenAI-compatible base URL)\n\nFull picture in [ROADMAP.md](./ROADMAP.md).\n\n---\n\n<details>\n<summary><b>How it works (under the hood)</b></summary>\n\n```mermaid\nflowchart TB\n    User([👤 You])\n    Cockpit[Cockpit<br/>:5050 · web UI]\n    Daemon[Chorus daemon<br/>:7707 · local server]\n    DB[(SQLite<br/>~/.chorus/chorus.db)]\n    MCP[MCP server<br/>for editor integrations]\n\n    Claude[🤖 Claude<br/>writer]\n    Codex[🦾 GPT<br/>reviewer]\n    Gemini[💎 Gemini<br/>reviewer]\n\n    User -->|paste task| Cockpit\n    Cockpit <-->|REST + live updates| Daemon\n    Daemon <--> DB\n    Daemon -->|spawn| Claude\n    Daemon -->|spawn| Codex\n    Daemon -->|spawn| Gemini\n    User -.->|\"call Chorus from your AI\"| MCP --> Daemon\n\n    classDef user fill:#fef3c7,stroke:#f59e0b,color:#000\n    classDef chorus fill:#dbeafe,stroke:#3b82f6,color:#000\n    classDef llm fill:#fce7f3,stroke:#ec4899,color:#000\n    class User user\n    class Daemon,Cockpit,MCP,DB chorus\n    class Claude,Codex,Gemini llm\n```\n\n**Three pieces:**\n\n- **Daemon** — small local server (port 7707) that spawns AI tools as subprocesses, parses their output, and tracks state in a SQLite database at `~/.chorus/chorus.db`.\n- **Cockpit** — the web UI at port 5050 (Next.js). Templates, chats, voices, settings.\n- **MCP server** — lets *other* AI tools (Claude Code, Cursor, etc.) call Chorus programmatically.\n\nEach AI runs as an isolated subprocess. Chorus reads their structured output (stream-JSON), compares against the template's quorum rule, and emits a verdict. Nothing leaves your machine except the calls to the AI vendors you already use.\n\nCode layout:\n- `src/daemon/` — Fastify server + agent shims (one per AI tool)\n- `src/app/` — Next.js cockpit\n- `src/mcp/` — JSON-RPC MCP server\n- `src/lib/db/` — schema + migrations\n\n</details>\n\n---\n\n## Contributing\n\nPRs welcome.\n\n```bash\ngit clone https://github.com/chorus-codes/chorus.git\ncd chorus && pnpm install\npnpm dev:daemon   # daemon on :7707\npnpm dev          # cockpit on :5050\npnpm test         # full suite\n```\n\nRead [`AGENTS.md`](./AGENTS.md) first — Next.js 16 has breaking changes from older versions. Coverage target on new code: 80%+.\n\nWe dogfood: PRs to Chorus go through Chorus before merging.\n\nSee [CONTRIBUTING.md](./CONTRIBUTING.md) for the full guide.\n\n---\n\n## Links\n\n- 🌐 Website: <https://chorus.codes>\n- 🗺️ Roadmap: [./ROADMAP.md](./ROADMAP.md)\n- 🐛 Issues: <https://github.com/chorus-codes/chorus/issues>\n- 💬 Discussions: <https://github.com/chorus-codes/chorus/discussions>\n- 🐦 X: [@ChorusCodes](https://x.com/ChorusCodes)\n\n---\n\n## License\n\n[Apache-2.0](./LICENSE). Use it however you want, including commercially.\n","summary":"Chorus is an automated code review tool that utilizes multiple AI models in parallel to identify potential bugs and oversights before code is merged. By having different AI vendors review each other's work, the tool effectively mitigates individual model blind spots and reduces the risk of shipping incorrect code. It is designed for developers who want to leverage their existing AI subscriptions—such as Claude Pro, ChatGPT Plus, or Gemini Advanced—to conduct rigorous, cost-free code reviews locally.","description":"Multi-LLM peer review for code decisions. Bring your own CLI; Chorus convenes 2-4 other LLMs to review the work before you ship.","stars":512,"language":"TypeScript"},{"owner":"noonghunna","repo":"club-3090","url":"https://github.com/noonghunna/club-3090","readme":"# club-3090\n\n**Recipes for serving LLMs locally on RTX 3090s.** Multi-engine (vLLM, llama.cpp, ik_llama), multi-model, model-agnostic by design.\n\nIf you have one or two RTX 3090s and want to run modern LLMs at home, in a homelab, or as a dev backend — this repo collects the working configs, patches, and benchmarks.\n\n> 🎯 **4090 or 5090 owner?** The composes run cross-rig — contributors have benched both with measured numbers: **[Can I use a 4090? →](docs/FAQ.md#can-i-use-a-4090-instead-of-a-3090)** · **[Can I use a 5090? →](docs/FAQ.md#can-i-use-a-5090)**. The tooling is calibrated for 3090s but the configs are class-aware; per-class gotchas (4090's tighter idle VRAM, 5090's 32 GB envelope) + cross-rig benchmark rows live in the FAQ.\n\n---\n\n## Quick start\n\n> 🪟 **On Windows?** These steps assume Linux/macOS. Set up **WSL2** first → **[docs/WSL_SETUP.md](docs/WSL_SETUP.md)** (start-to-finish). Native Windows runs only the *upstream* llama.cpp binary — none of this repo's tooling.\n\n```bash\n# 1. Clone the repo\ngit clone https://github.com/noonghunna/club-3090.git\ncd club-3090\n\n# Profile compatibility tooling requires PyYAML. Ubuntu LTS usually has it via\n# python3-yaml; otherwise run: python3 -m pip install pyyaml\n\n# 2. Pick/download + SHA-verify the model (interactive hardware-
