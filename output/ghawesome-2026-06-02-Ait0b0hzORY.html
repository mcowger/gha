.js Readable to an ArrayBuffer](https://bun.com/guides/streams/node-readable-to-arraybuffer)\n\n- Test\n  - [Spy on methods in `bun test`](https://bun.com/guides/test/spy-on)\n  - [Bail early with the Bun test runner](https://bun.com/guides/test/bail)\n  - [Mock functions in `bun test`](https://bun.com/guides/test/mock-functions)\n  - [Run tests in watch mode with Bun](https://bun.com/guides/test/watch-mode)\n  - [Use snapshot testing in `bun test`](https://bun.com/guides/test/snapshot)\n  - [Skip tests with the Bun test runner](https://bun.com/guides/test/skip-tests)\n  - [Using Testing Library with Bun](https://bun.com/guides/test/testing-library)\n  - [Update snapshots in `bun test`](https://bun.com/guides/test/update-snapshots)\n  - [Run your tests with the Bun test runner](https://bun.com/guides/test/run-tests)\n  - [Set the system time in Bun's test runner](https://bun.com/guides/test/mock-clock)\n  - [Set a per-test timeout with the Bun test runner](https://bun.com/guides/test/timeout)\n  - [Migrate from Jest to Bun's test runner](https://bun.com/guides/test/migrate-from-jest)\n  - [Write browser DOM tests with Bun and happy-dom](https://bun.com/guides/test/happy-dom)\n  - [Mark a test as a \"todo\" with the Bun test runner](https://bun.com/guides/test/todo-tests)\n  - [Re-run tests multiple times with the Bun test runner](https://bun.com/guides/test/rerun-each)\n  - [Generate code coverage reports with the Bun test runner](https://bun.com/guides/test/coverage)\n  - [import, require, and test Svelte components with bun test](https://bun.com/guides/test/svelte-test)\n  - [Set a code coverage threshold with the Bun test runner](https://bun.com/guides/test/coverage-threshold)\n  - [Selectively run tests concurrently with glob patterns](https://bun.com/guides/test/concurrent-test-glob)\n\n- Util\n  - [Generate a UUID](https://bun.com/guides/util/javascript-uuid)\n  - [Hash a password](https://bun.com/guides/util/hash-a-password)\n  - [Escape an HTML string](https://bun.com/guides/util/escape-html)\n  - [Get the current Bun version](https://bun.com/guides/util/version)\n  - [Upgrade Bun to the latest version](https://bun.com/guides/util/upgrade)\n  - [Encode and decode base64 strings](https://bun.com/guides/util/base64)\n  - [Compress and decompress data with gzip](https://bun.com/guides/util/gzip)\n  - [Sleep for a fixed number of milliseconds](https://bun.com/guides/util/sleep)\n  - [Detect when code is executed with Bun](https://bun.com/guides/util/detect-bun)\n  - [Check if two objects are deeply equal](https://bun.com/guides/util/deep-equals)\n  - [Compress and decompress data with DEFLATE](https://bun.com/guides/util/deflate)\n  - [Get the absolute path to the current entrypoint](https://bun.com/guides/util/main)\n  - [Get the directory of the current file](https://bun.com/guides/util/import-meta-dir)\n  - [Check if the current file is the entrypoint](https://bun.com/guides/util/entrypoint)\n  - [Get the file name of the current file](https://bun.com/guides/util/import-meta-file)\n  - [Convert a file URL to an absolute path](https://bun.com/guides/util/file-url-to-path)\n  - [Convert an absolute path to a file URL](https://bun.com/guides/util/path-to-file-url)\n  - [Get the absolute path of the current file](https://bun.com/guides/util/import-meta-path)\n  - [Get the path to an executable bin file](https://bun.com/guides/util/which-path-to-executable-bin)\n\n- WebSocket\n  - [Build a publish-subscribe WebSocket server](https://bun.com/guides/websocket/pubsub)\n  - [Build a simple WebSocket server](https://bun.com/guides/websocket/simple)\n  - [Enable compression for WebSocket messages](https://bun.com/guides/websocket/compression)\n  - [Set per-socket contextual data on a WebSocket](https://bun.com/guides/websocket/context)\n\n- Write file\n  - [Delete a file](https://bun.com/guides/write-file/unlink)\n  - [Write to stdout](https://bun.com/guides/write-file/stdout)\n  - [Write a file to stdout](https://bun.com/guides/write-file/cat)\n  - [Write a Blob to a file](https://bun.com/guides/write-file/blob)\n  - [Write a string to a file](https://bun.com/guides/write-file/basic)\n  - [Append content to a file](https://bun.com/guides/write-file/append)\n  - [Write a file incrementally](https://bun.com/guides/write-file/filesink)\n  - [Write a Response to a file](https://bun.com/guides/write-file/response)\n  - [Copy a file to another location](https://bun.com/guides/write-file/file-cp)\n  - [Write a ReadableStream to a file](https://bun.com/guides/write-file/stream)\n\n## Contributing\n\nRefer to the [Project > Contributing](https://bun.com/docs/project/contributing) guide to start contributing to Bun.\n\n## License\n\nRefer to the [Project > License](https://bun.com/docs/project/license) page for information about Bun's licensing.\n","summary":"Bun is an all-in-one JavaScript runtime and toolkit designed as a high-performance, drop-in replacement for Node.js. It features a fast execution engine, a built-in package manager, and a test runner, all consolidated into a single executable that significantly improves startup times and memory efficiency. Because it supports TypeScript and JSX out of the box with extensive Node.js compatibility, it is an ideal solution for developers looking to accelerate their existing JavaScript and TypeScript workflows without complex configuration.","description":"Incredibly fast JavaScript runtime, bundler, test runner, and package manager – all in one","stars":92738,"language":"Rust"},{"owner":"oxc-project","repo":"oxc","url":"https://github.com/oxc-project/oxc","readme":"<p align=\"center\">\n  <br>\n  <br>\n  <a href=\"https://oxc.rs\" target=\"_blank\" rel=\"noopener noreferrer\">\n    <picture>\n      <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://oxc.rs/oxc-light.svg\">\n      <source media=\"(prefers-color-scheme: light)\" srcset=\"https://oxc.rs/oxc-dark.svg\">\n      <img alt=\"Oxc logo\" src=\"https://oxc.rs/oxc-dark.svg\" height=\"60\">\n    </picture>\n  </a>\n  <br>\n  <br>\n  <br>\n</p>\n\n<div align=\"center\">\n\n[![MIT licensed][license-badge]][license-url]\n[![Build Status][ci-badge]][ci-url]\n[![Code Coverage][code-coverage-badge]][code-coverage-url]\n[![CodSpeed Badge](https://img.shields.io/endpoint?url=https://codspeed.io/badge.json)](https://codspeed.io/oxc-project/oxc)\n[![Sponsors][sponsors-badge]][sponsors-url]\n\n[![Discord chat][discord-badge]][discord-url]\n[![Playground][playground-badge]][playground-url]\n[![Website][website-badge]][website-url]\n\n</div>\n\n## ⚓ Oxc\n\n_/oʊ ɛks siː/_\n\nThe Oxidation Compiler is a collection of high-performance tools for JavaScript and TypeScript written in Rust.\n\nOxc is part of [VoidZero](https://voidzero.dev/)'s vision for a unified, high-performance toolchain for JavaScript. It powers [Rolldown](https://rolldown.rs) ([Vite]'s bundler) and enables the next generation of ultra-fast development tools that work seamlessly together.\n\nFor more information, check out our website at [oxc.rs](https://oxc.rs).\n\n<sub>\\* Oxidation is the chemical process that creates rust</sub>\n\n## 🙋 Who's using Oxc?\n\n[Rolldown] and [Nuxt] use Oxc for parsing. [Rolldown] also uses Oxc for transformation and minification. [Nova], [swc-node], and [knip] use [oxc_resolver][docs-resolver-url] for module resolution. [Preact], [Shopify], [ByteDance], and [Shopee] use oxlint for linting.\n\n[See more projects using Oxc →](https://oxc.rs/docs/guide/projects.html)\n\n## 🔧 Lint or Format a Codebase\n\n- **Lint**: [Oxlint](https://oxc.rs/docs/guide/usage/linter) — `npx oxlint@latest`\n- **Format**: [Oxfmt](https://oxc.rs/docs/guide/usage/formatter) — `npx oxfmt@latest`\n\n## 🧰 Build Tooling on Top of Oxc\n\n- Parse JavaScript and TypeScript: [Parser](https://oxc.rs/docs/guide/usage/parser)\n- Transform TypeScript, JSX, and modern JavaScript: [Transformer](https://oxc.rs/docs/guide/usage/transformer)\n- Minify JavaScript for production builds: [Minifier](https://oxc.rs/docs/guide/usage/minifier)\n- Resolve modules for JavaScript and TypeScript: [Resolver](https://oxc.rs/docs/guide/usage/resolver)\n\n## ✍️ Contribute\n\nCheck out some of the [good first issues](https://github.com/oxc-project/oxc/contribute) or ask us on [Discord][discord-url].\n\nSee [CONTRIBUTING.md](./CONTRIBUTING.md) for guidance, or read the complete [contributing guide on our website →](https://oxc.rs/docs/contribute/introduction.html)\n\nIf you are unable to contribute by code, you can still participate by:\n\n- Add a [GitHub Star](https://github.com/oxc-project/oxc/stargazers) to the project\n- Join us on [Discord][discord-url]\n- [Follow me on X](https://x.com/boshen_c) and post about this project\n\n## 📚 Other Resources\n\n- [Troubleshooting](https://oxc.rs/docs/guide/troubleshooting)\n- [Benchmarks](https://oxc.rs/docs/guide/benchmarks)\n- [Talks and media](https://oxc.rs/docs/guide/media)\n- [Team](https://oxc.rs/team)\n- [Endorsements](https://oxc.rs/endorsements)\n- [Releases](https://github.com/oxc-project/oxc/releases)\n\n## ❤ Who's [Sponsoring Oxc](https://github.com/sponsors/Boshen)?\n\n<p align=\"center\">\n  <a href=\"https://github.com/sponsors/Boshen\">\n    <img src=\"https://raw.githubusercontent.com/Boshen/sponsors/main/sponsors.svg\" alt=\"My sponsors\" />\n  </a>\n</p>\n\n## 📖 License\n\nOxc is free and open-source software licensed under the [MIT License](./LICENSE).\n\nThank you to [namespace.so](https://namespace.so) for powering our CI/CD pipelines with fast, free macOS and Linux runners.\n\nOxc ports or copies code from other open source projects, their licenses are listed in [**Third-party library licenses**](./THIRD-PARTY-LICENSE).\n\n[discord-badge]: https://img.shields.io/discord/1079625926024900739?logo=discord&label=Discord\n[discord-url]: https://discord.gg/9uXCAwqQZW\n[license-badge]: https://img.shields.io/badge/license-MIT-blue.svg\n[license-url]: https://github.com/oxc-project/oxc/blob/main/LICENSE\n[ci-badge]: https://github.com/oxc-project/oxc/actions/workflows/ci.yml/badge.svg?event=push&branch=main\n[ci-url]: https://github.com/oxc-project/oxc/actions/workflows/ci.yml?query=event%3Apush+branch%3Amain\n[code-coverage-badge]: https://codecov.io/gh/oxc-project/oxc/graph/badge.svg?token=FVHEH0BQLJ\n[code-coverage-url]: https://codecov.io/gh/oxc-project/oxc\n[sponsors-badge]: https://img.shields.io/github/sponsors/Boshen\n[sponsors-url]: https://github.com/sponsors/Boshen\n[playground-badge]: https://img.shields.io/badge/Playground-blue?color=9BE4E0\n[playground-url]: https://playground.oxc.rs/\n[website-badge]: https://img.shields.io/badge/Website-blue\n[website-url]: https://oxc.rs\n[docs-resolver-url]: https://docs.rs/oxc_resolver\n[rolldown]: https://rolldown.rs\n[vite]: https://vite.dev/\n[nuxt]: https://nuxt.com/\n[nova]: https://trynova.dev/\n[swc-node]: https://github.com/swc-project/swc-node\n[knip]: https://github.com/webpro/knip\n[preact]: https://preactjs.com/\n[shopify]: https://shopify.com/\n[bytedance]: https://www.bytedance.com/\n[shopee]: https://shopee.com/\n","summary":"The Oxidation Compiler (Oxc) is a collection of high-performance tools for JavaScript and TypeScript built in Rust, designed to serve as the foundation for the next generation of ultra-fast web development tooling. It offers a comprehensive suite of utilities, including a parser, transformer, minifier, module resolver, and a high-speed linter. By providing these low-level primitives, Oxc enables developers to build efficient, scalable toolchains that power modern projects like Vite’s bundler, Rolldown, and various enterprise-scale applications.","description":"⚓ A collection of high-performance JavaScript tools.","stars":21372,"language":"Rust"},{"owner":"ad-si","repo":"Coding-Flashcards","url":"https://github.com/ad-si/Coding-Flashcards","readme":"# Coding Flashcards\n\nOver 1000 flashcards to learn programming from first principles.\nWritten in markdown with script to convert them to Anki decks or PDF files.\n\n<img alt=\"Screenshot of Anki showing a Rust flashcard\" src=\"rust/screenshots/2024-03-09t1127_anki.png\" width=\"50%\">\n\n\n## Available Languages\n\n- [Rust](./rust)\n- [SQLite](./sqlite)\n- [Lua](./lua)\n- [C](./c)\n- [Godot](./godot)\n- [Wolfram Language](./wolfram-language)\n\n\n## Downloads\n\nPrebuilt Anki decks (`.apkg`) and PDFs for each language,\nas well as a combined deck containing all languages,\nare attached to every tagged release on the\n[releases page](https://github.com/ad-si/Coding-Flashcards/releases).\n","summary":"Coding-Flashcards is an open-source repository containing over 1,000 flashcards designed to help developers master programming languages through first principles. The project stores content in Markdown format and includes automated scripts to convert these cards into portable Anki decks or printable PDF files. It currently covers a diverse range of technologies, including Rust, SQLite, Lua, C, Godot, and the Wolfram Language. This resource is ideal for students and software engineers looking to reinforce their technical knowledge and improve memory retention through active recall.","description":"Over 1000 flashcards to learn Rust, SQLite, Lua, C, Godot, or Wolfram Language from first principles. Written in markdown with script to convert them to Anki decks or PDF files.","stars":734,"language":"Rust"},{"owner":"regent-vcs","repo":"re_gent","url":"https://github.com/regent-vcs/re_gent","readme":"<div align=\"center\">\n\n  <a href=\"https://github.com/regent-vcs/regent\">\n    <img\n      src=\"assets/regent-logo-dark.png\"\n      alt=\"re_gent\"\n      width=\"100%\"\n    />\n  </a>\n  <br />\n  <br />\n  <h1>Version Control for AI Agents</h1>\n  <p>\n    Track what your agent did, which prompt wrote each line, and inspect any step.\n  </p>\n\n[![Star on GitHub](https://img.shields.io/github/stars/regent-vcs/regent?style=for-the-badge&logo=github&color=gold)](https://github.com/regent-vcs/regent)\n[![Apache 2.0 License](https://img.shields.io/badge/License-Apache%202.0-blue?style=for-the-badge)](LICENSE)\n[![Go Version](https://img.shields.io/github/go-mod/go-version/regent-vcs/regent?style=for-the-badge&logo=go&logoColor=white&color=00ADD8)](go.mod)\n\n[![CI Status](https://img.shields.io/github/actions/workflow/status/regent-vcs/regent/ci.yml?style=for-the-badge&logo=githubactions&logoColor=white)](https://github.com/regent-vcs/regent/actions/workflows/ci.yml)\n[![Contributions Welcome](https://img.shields.io/badge/Contributions-Welcome-10b981?style=for-the-badge&logo=github)](CONTRIBUTING.md)\n[![Claude Code Compatible](https://img.shields.io/badge/Claude%20Code-Compatible-6366f1?style=for-the-badge&logo=anthropic&logoColor=white)](https://github.com/regent-vcs/regent) [![Codex Compatible](https://img.shields.io/badge/Codex-Compatible-10b981?style=for-the-badge&logo=openai&logoColor=white)](https://github.com/regent-vcs/regent) [![OpenCode Compatible](https://img.shields.io/badge/OpenCode-Compatible-ff6b35?style=for-the-badge)](https://github.com/regent-vcs/regent)\n[![Discord](https://img.shields.io/discord/1503732569622053004?style=for-the-badge&logo=discord&logoColor=white&color=5865F2)](https://discord.gg/Unf24KMh)\n\n</div>\n\n---\n\n## Quick Start\n\n```bash\n# Install via Homebrew (macOS/Linux)\nbrew tap regent-vcs/tap\nbrew install regent\n\n# Or via Go\ngo install github.com/regent-vcs/regent/cmd/rgt@latest\n\n# Initialize in your project\ncd your-project\nrgt init\n\n# Work with Claude Code, Codex, or OpenCode normally — activity is tracked automatically\n\n# See what happened\nrgt log\nrgt blame src/file.go:42\nrgt show <step-hash>\n```\n\nThat's it. Your agent activity is now auditable.\n\n---\n\n## Demo\n\n<div align=\"center\">\n \n\nhttps://github.com/user-attachments/assets/a19b7c56-2e3c-4f04-81a1-d8665e3963b8\n\n\n  <p><em>Every agent turn is automatically captured. No manual commits needed.</em></p>\n</div>\n\n---\n\n## What You Get\n\n### See what your agent actually did\n\n```bash\n$ rgt log\n\nStep a1b2c3d  |  2 min ago  |  Tool: Edit\n│ File: src/handler.go\n│ Added error handling to request handler\n│ + 5 lines, - 2 lines\n\nStep d4e5f6g  |  5 min ago  |  Tool: Write\n│ File: tests/handler_test.go\n│ Created unit tests for handler\n│ + 23 lines\n\nStep f8g9h0i  |  8 min ago  |  Tool: Bash\n│ Command: go mod tidy\n│ Cleaned up dependencies\n```\n\n### Blame: which prompt wrote this line?\n\n```bash\n$ rgt blame src/handler.go:42\n\nLine 42: func handleRequest(w http.ResponseWriter, r *http.Request) {\n\nStep:    a1b2c3d4e5f6\nSession: claude-20260502-143021\nTool:    Edit\nPrompt:  \"Add error handling to the request handler\"\n```\n\n### Track multiple concurrent sessions\n\n```bash\n$ rgt sessions\n\nActive Sessions:\nclaude_code:claude-20260502-143021  |  3 steps  |  Last: 2 min ago\ncodex_cli:codex-20260502-091534     |  7 steps  |  Last: 2 hours ago\n\n$ rgt log --session claude_code:claude-20260502-143021\n# Filter history by session\n```\n\n### See full context for any change\n\n```bash\n$ rgt show a1b2c3d\n\nStep a1b2c3d4e5f6\nParent: d4e5f6g7h8i9\nSession: claude-20260502-143021\nTime: 2026-05-02 14:30:21\n\nTool: Edit\nFile: src/handler.go\n\nChanges:\n+ func handleRequest(w http.ResponseWriter, r *http.Request) {\n+     if r.Method != \"GET\" {\n+         http.Error(w, \"Method not allowed\", 405)\n+         return\n+     }\n- func handleRequest(w http.ResponseWriter, r *http.Request) {\n\nConversation:\nUser: \"Add error handling to reject non-GET requests\"\nAssistant: \"I'll add method validation to the handler...\"\n```\n\n---\n\n## Why This Exists\n\nAI agents have no version control of their own.\n\nYou know this pain:\n- *\"It was working five minutes ago\"*\n- *\"Why did you change that file?\"*\n- *\"Go back to before the refactor\"*\n- `/compact` and pray\n- Copy-pasting code into a fresh chat\n\nThree primitives that should already exist:\n\n- **`rgt log`** — what did this session do?\n- **`rgt blame`** — which prompt wrote this line?\n- **`rgt show`** — inspect the full context for any step\n\nWe gave agents write access to our codebases. We did not give ourselves git for it. re_gent fixes that.\n\n---\n\n## How It Works\n\nre_gent stores agent activity in `.regent/` (like `.git/`):\n\n```\n.regent/\n├── objects/     # Content-addressed blobs (BLAKE3)\n├── refs/        # Session pointers (one per agent)\n├── index.db     # SQLite query index\n└── config.toml\n```\n\nEvery tool-using turn creates a **Step** — a content-addressed snapshot of what changed, why, and who asked:\n\n```go\nStep {\n  parent:      <previous-step-hash>\n  tree:        <workspace-snapshot>\n  causes:      [{ tool_name: \"Edit\", args: <input>, result: <output> }]\n  session_id:  \"claude_code:claude-20260502-143021\"\n  timestamp:   \"2026-05-02T14:30:21Z\"\n}\n```\n\nSteps form a **DAG**. Each session has its own branch. Common ancestors dedupe. You get git-level auditability for agent activity.\n\n**Technical details:** See [POC.md](POC.md) for the complete specification.\n\n---\n\n## Installation\n\n### Via Homebrew (macOS/Linux)\n\n```bash\nbrew tap regent-vcs/tap\nbrew install regent\n```\n\nThis installs the `rgt` command and automatically sets up shell completions for bash, zsh, and fish.\n\n### Via Go Install\n\n```bash\ngo install github.com/regent-vcs/regent/cmd/rgt@latest\n```\n\n**Shell Completion (manual setup):**\n```bash\n# Bash\nrgt completion bash > /usr/local/etc/bash_completion.d/rgt\n\n# Zsh\nrgt completion zsh > \"${fpath[1]}/_rgt\"\n\n# Fish\nrgt completion fish > ~/.config/fish/completions/rgt.fish\n```\n\n### From Source\n\n```bash\ngit clone https://github.com/regent-vcs/regent\ncd regent\ngo build -o rgt ./cmd/rgt\nsudo mv rgt /usr/local/bin/\n```\n\n### Binary Releases\n\nDownload pre-built binaries from [GitHub Releases](https://github.com/regent-vcs/regent/releases)\n\n---\n\n## Supported Tools\n\n| Tool | Status |\n|------|--------|\n| **Claude Code** | Fully supported |\n| **OpenAI Codex CLI** | Fully supported |\n| **OpenCode** | Fully supported |\n| Cursor, Cline, Continue | Planned |\n\nHooks auto-configure on `rgt init`. No manual setup required.\n\n---\n\n## Commands\n\n| Command | Description |\n|---------|-------------|\n| `rgt init` | Initialize `.regent/` in current directory |\n| `rgt log` | Show step history (supports `--session`, `-n`, `--json`, `--graph`) |\n| `rgt sessions` | List all active sessions |\n| `rgt status` | Show current repository state |\n| `rgt show <step>` | Display full context for a step (tool call + conversation) |\n| `rgt blame <path>[:<line>]` | Show per-line provenance for a file |\n| `rgt cat <hash>` | Inspect any object by hash |\n| `rgt version` | Print version information |\n| `rgt completion` | Generate shell completion scripts |\n\n---\n\n## Features\n\n- **Content-Addressed Storage** — BLAKE3 hashing, automatic deduplication\n- **Fast Queries** — SQLite index, sub-10ms lookups\n- **Per-Session DAG** — Concurrent sessions tracked as separate refs\n- **Conversation Tracking** — Survives `/compact` and `/clear`\n- **Hook-Driven** — Transparent Claude Code, Codex, and OpenCode integration\n- **Zero Configuration** — Hooks auto-configure on `rgt init`\n- **Concurrency-Safe** — CAS refs, ACID transactions\n- **Gitignore-Compatible** — `.regentignore` support\n\n---\n\n## Editor Integration\n\n### VSCode Extension\n\nGet inline blame annotations directly in your editor:\n\n```bash\n# From VSIX (Recommended)\n# Download the latest .vsix from:\n# https://github.com/regent-vcs/vscode-regent/releases\n# Then in VS Code: Extensions > ... > Install from VSIX...\n\n# From source (Development)\ngit clone https://github.com/regent-vcs/vscode-regent\ncd vscode-regent\nnpm install && npm run compile\n# Press F5 in VS Code to launch Extension Development Host\n```\n\n**Features:**\n- Inline blame annotations showing which step modified each line\n- Hover tooltips with full step context (timestamp, tool name, arguments)\n- Session timeline view in the sidebar\n- One-click access to conversation history\n\n**Requirements:** `rgt` CLI must be installed and `rgt init` run in your project.\n\n[View Extension Docs →](https://github.com/regent-vcs/vscode-regent)\n\n---\n\n## re_gent vs Git\n\n| | Git | re_gent |\n|---|---|---|\n| **Tracks code** | ✅ | ✅ |\n| **Tracks agent activity** | ❌ | ✅ |\n| **Blame with prompt** | ❌ | ✅ |\n| **Conversation history** | ❌ | ✅ |\n| **Concurrent sessions** | ⚠️ shared workspace conflicts | ✅ separate captured session refs |\n| **Purpose** | Developer VCS | Agent audit trail |\n\n**re_gent complements git, doesn't replace it.** Use both.\n\n---\n\n## Roadmap\n\nSee [ROADMAP.md](ROADMAP.md) for planned features including:\n- Non-destructive rewind and fork operations\n- Additional tool adapters (Cursor, Cline, Continue)\n- Session sharing and merge support\n- Garbage collection and integrity verification\n\n---\n\n## Contributing\n\nContributions welcome! See [CONTRIBUTING.md](CONTRIBUTING.md) for guidelines.\n\n**Quick Start:**\n- [QUICK_START.md](.github/QUICK_START.md) — 5-minute setup guide\n- [Good first issues](https://github.com/regent-vcs/regent/labels/good%20first%20issue)\n\n**Before opening a PR:**\n- [ ] Tests pass: `go test ./...` and `go test -race ./...`\n- [ ] Linter passes: `golangci-lint run`\n- [ ] Code formatted: `go fmt ./...`\n\n---\n\n## Built With\n\n- [cobra](https://github.com/spf13/cobra) — CLI framework\n- [blake3](https://lukechampine.com/blake3) — BLAKE3 hashing\n- [go-diff](https://github.com/sergi/go-diff) — Myers diff\n- [modernc.org/sqlite](https://modernc.org/sqlite) — Pure Go SQLite\n\n---\n\n## License\n\n[Apache License 2.0](LICENSE)\n\n---\n\n<div align=\"center\">\n  <p>\n    <sub>Built by <a href=\"https://github.com/regent-vcs/regent/graphs/contributors\">contributors</a></sub>\n  </p>\n  <p>\n    <a href=\"https://discord.gg/Unf24KMh\">Discord</a> •\n    <a href=\"https://github.com/regent-vcs/regent/discussions\">Discussions</a> •\n    <a href=\"https://github.com/regent-vcs/regent/issues\">Issues</a> •\n    <a href=\"POC.md\">Technical Spec</a>\n  </p>\n</div>\n","summary":"Re_gent is a specialized version control tool designed to bring observability and accountability to AI agent development by automatically tracking every action an agent takes. It provides developers with granular history, allowing them to inspect specific steps, identify which prompt triggered a particular code change, and manage multiple concurrent AI sessions seamlessly. This project is an ideal solution for engineers and AI researchers who need to debug, audit, and understand the decision-making process behind automated coding agents.","description":"Version-Control for AI coding agents.","stars":655,"language":"Go"},{"owner":"dirac-run","repo":"dirac","url":"https://github.com/dirac-run/dirac","readme":"# Dirac - Accurate & Highly Token Efficient Open Source AI Agent\n\n> **Dirac topped the [Terminal-Bench-2 leaderboard](https://huggingface.co/datasets/harborframework/terminal-bench-2-leaderboard/discussions/145) for `gemini-3-flash-preview` with a 65.2% score!**\n\n\nIt is a well studied phenomenon that any given model's reasoning ability degrades with the context length. If we can keep context tightly curated, we improve both accuracy and cost while making larger changes tractable in a single task. \n\nDirac is an open-source coding agent built with this in mind. It reduces API costs by **64.8%** on average while producing better and faster work. Using hash-anchored parallel edits, AST manipulation, and a suite of advanced optimizations. Oh, and no MCP.\n\nOur goal: Optimize for bang-for-the-buck on tooling with bare minimum prompting instead of going blindly minimalistic.\n\n## 📊 Evals\n\nDirac is benchmarked against other leading open-source agents on complex, real-world refactoring tasks. Dirac consistently achieves 100% accuracy at a fraction of the cost. These evals are run on public github repos and should be reproducible by anyone. \n\n> 🏆 **TerminalBench 2.0 Leaderboard**: Dirac recently topped the [Terminal-Bench-2 leaderboard](https://huggingface.co/datasets/harborframework/terminal-bench-2-leaderboard/discussions/145) with a **65.2%** score using `gemini-3-flash-preview`. This outperforms both Google's official baseline (**47.6%**) and the top closed-source agent Junie CLI (**64.3%**). This was achieved without any benchmark-specific info or any `AGENTS.md` files being inserted.\n\n\n> **Note on the cost table below**: A bug was discovered in Cline, the parent repo, after running these evals ([issue #10314](https://github.com/cline/cline/issues/10314)). We have submitted a [PR #10315](https://github.com/cline/cline/pull/10315) to fix this. This bug caused the evals for Dirac and Cline to slightly underreport the numbers ($0.03 vs $0.05 per million token cache read). Although there won't be a large difference, we will update the evals soon.\n\nAll tasks for all models used `gemini-3-flash-preview` with thinking set to `high`\n\n| Task (Repo) | Files* | Cline | Kilo | Ohmypi | Opencode | Pimono | Roo | **Dirac** |\n| :--- | :---: | :---: | :---: | :---: | :---: | :---: | :---: | :---: |\n| Task1 ([transformers](https://github.com/huggingface/transformers)) | 8 | 🟢 [(diff)](evals/cline/cline_refactor_DynamicCache) [$0.37] | 🔴 [(diff)](evals/kilo/kilo_code_refactor_DynamicCache_FAILURE) [N/A] | 🟡 [(diff)](evals/ohmypi/ohmypi_refactor_DynamicCache) [$0.24] | 🟢 [(diff)](evals/opencode/opencode_refactor_DynamicCache) [$0.20] | 🟢 [(diff)](evals/pimono/pimono_refactor_DynamicCache) [$0.34] | 🟢 [(diff)](evals/roo/roo_code_refactor_DynamicCache) [$0.49] | **🟢 [(diff)](evals/dirac/dirac_refactor_DynamicCache) [$0.13]** |\n| Task2 ([vscode](https://github.com/microsoft/vscode)) | 21 | 🟢 [(diff)](evals/cline/cline_refactor_IOverlayWidget) [$0.67] | 🟡 [(diff)](evals/kilo/kilo_code_refactor_IOverlayWidget) [$0.78] | 🟢 [(diff)](evals/ohmypi/ohmypi_refactor_IOverlayWidget) [$0.63] | 🟢 [(diff)](evals/opencode/opencode_refactor_IOverlayWidget) [$0.40] | 🟢 [(diff)](evals/pimono/pimono_refactor_IOverlayWidget) [$0.48] | 🟡 [(diff)](evals/roo/roo_code_refactor_IOverlayWidget) [$0.58] | **🟢 [(diff)](evals/dirac/dirac_refactor_IOverlayWidget) [$0.23]** |\n| Task3 ([vscode](https://github.com/microsoft/vscode)) | 12 | 🟡 [(diff)](evals/cline/cline_refactor_addLogging) [$0.42] | 🟢 [(diff)](evals/kilo/kilo_code_refactor_addLogging) [$0.70] | 🟢 [(diff)](evals/ohmypi/ohmypi_refactor_addLogging) [$0.64] | 🟢 [(diff)](evals/opencode/opencode_refactor_addLogging) [$0.32] | 🟢 [(diff)](evals/pimono/pimono_refactor_addLogging) [$0.25] | 🟡 [(diff)](evals/roo/roo_code_refactor_addLogging) [$0.45] | **🟢 [(diff)](evals/dirac/dirac_refactor_addLogging) [$0.16]** |\n| Task4 ([django](https://github.com/django/django)) | 14 | 🟢 [(diff)](evals/cline/cline_refactor_datadict) [$0.36] | 🟢 [(diff)](evals/kilo/kilo_code_refactor_datadict) [$0.42] | 🟡 [(diff)](evals/ohmypi/ohmypi_refactor_datadict) [$0.32] | 🟢 [(diff)](evals/opencode/opencode_refactor_datadict) [$0.24] | 🟡 [(diff)](evals/pimono/pimono_refactor_datadict) [$0.24] | 🟢 [(diff)](evals/roo/roo_code_refactor_datadict) [$0.17] | **🟢 [(diff)](evals/dirac/dirac_refactor_datadict) [$0.08]** |\n| Task5 ([vscode](https://github.com/microsoft/vscode)) | 3 | 🔴 [(diff)](evals/cline/cline_refactor_extensionswb_service_FAILURE) [N/A] | 🟢 [(diff)](evals/kilo/kilo_code_refactor_extensionswb_service) [$0.71] | 🟢 [(diff)](evals/ohmypi/ohmypi_refactor_extensionswb_service) [$0.43] | 🟢 [(diff)](evals/opencode/opencode_refactor_extensionswb_service) [$0.53] | 🟢 [(diff)](evals/pimono/pimono_refactor_extensionswb_service) [$0.50] | 🟢 [(diff)](evals/roo/roo_code_refactor_extensionswb_service) [$0.36] | **🟢 [(diff)](evals/dirac/dirac_refactor_extensionswb_service) [$0.17]** |\n| Task6 ([transformers](https://github.com/huggingface/transformers)) | 25 | 🟢 [(diff)](evals/cline/cline_refactor_latency) [$0.87] | 🟡  [(diff)](evals/kilo/kilo_code_refactor_latency_WRONG) [$1.51] | 🟢 [(diff)](evals/ohmypi/ohmypi_refactor_latency) [$0.94] | 🟢 [(diff)](evals/opencode/opencode_refactor_latency) [$0.90] | 🟢 [(diff)](evals/pimono/pimono_refactor_latency) [$0.52] | 🟢 [(diff)](evals/roo/roo_code_refactor_latency) [$1.44] | **🟢 [(diff)](evals/dirac/dirac_refactor_latency) [$0.34]** |\n| Task7 ([vscode](https://github.com/microsoft/vscode)) | 13 | 🟡 [(diff)](evals/cline/cline_refactor_sendRequest_2missing) [$0.51] | 🟢 [(diff)](evals/kilo/kilo_code_refactor_sendRequest) [$0.77] | 🟢 [(diff)](evals/ohmypi/ohmypi_refactor_sendRequest) [$0.74] | 🟢 [(diff)](evals/opencode/opencode_refactor_sendRequest) [$0.67] | 🟡 [(diff)](evals/pimono/pimono_refactor_sendRequest) [$0.45] | 🟢 [(diff)](evals/roo/roo_code_refactor_sendRequest) [$1.05] | **🟢 [(diff)](evals/dirac/dirac_refactor_sendRequest) [$0.25]** |\n| Task8 ([transformers](https://github.com/huggingface/transformers)) | 3 | 🟢 [(diff)](evals/cline/cline_refactor_stoppingcriteria) [$0.25] | 🟢 [(diff)](evals/kilo/kilo_code_refactor_stoppingcriteria) [$0.19] | 🟢 [(diff)](evals/ohmypi/ohmypi_code_refactor_stoppingcriteria) [$0.17] | 🟢 [(diff)](evals/opencode/opencode_refactor_stoppingcriteria) [$0.26] | 🟢 [(diff)](evals/pimono/pimono_code_refactor_stoppingcriteria) [$0.23] | 🟢 [(diff)](evals/roo/roo_code_refactor_stoppingcriteria) [$0.29] | **🟢 [(diff)](evals/dirac/dirac_refactor_stoppingcriteria) [$0.12]** |\n| **Total Correct** | | 5/8 | 5/8 | 6/8 | 8/8 | 6/8 | 6/8 | **8/8** |\n| **Avg Cost** | | $0.49 | $0.73 | $0.51 | $0.44 | $0.38 | $0.60 | **$0.18** |\n\n> 🟢 Success \\| 🟡 Incomplete \\| 🔴 Failure\n\n> **Cost Comparison**: Dirac is **64.8% cheaper** than the competition (a **2.8x** cost reduction).\n>\n> \\* Expected number of files to be modified/created to complete the task.\n>\n> See [evals/README.md](evals/README.md) for detailed task descriptions and methodology.\n\n\n## 🚀 Key Features\n\n- **Hash-Anchored Edits**: Dirac uses stable line hashes to target edits with extreme precision, avoiding the \"lost in translation\" issues of traditional line-number based editing.\n  ![Hash-Anchored Edits](https://www.dirac.run/static/images/multiple_edit.png)\n- **AST-Native Precision**: Built-in understanding of language syntax (TypeScript, Python, C++, etc.) allows Dirac to perform structural manipulations like function extraction or class refactoring with 100% accuracy.\n  ![AST-Native Precision](https://www.dirac.run/static/images/parallel_AST_edit.png)\n- **Multi-File Batching**: Dirac can process and edit multiple files in a single LLM roundtrip, significantly reducing latency and API costs.\n  ![Multi-File Batching](https://www.dirac.run/static/images/multi_function_read.png)\n- **High-Bandwidth Context**: Optimized context curation keeps the agent lean and fast, ensuring the LLM always has the most relevant information without wasting tokens.\n- **Autonomous Tool Use**: Dirac can read/write files, execute terminal commands, use a headless browser, and more - all while keeping you in control with an approval-based workflow.\n- **Skills & AGENTS.md**: Customize Dirac's behavior with project-specific instructions using `AGENTS.md` files. It also seamlessly picks up Claude's skills by automatically reading from `.ai`, `.claude`, and `.agents` directories.\n- **Native Tool Calling Only**: To ensure maximum reliability and performance, Dirac exclusively supports models with native tool calling enabled. (Note: MCP is not supported).\n\n## 📦 Installation\n\n### VS Code Extension\nInstall Dirac from the [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=dirac-run.dirac).\n\n### CLI (Terminal)\nInstall the Dirac CLI globally using npm:\n```bash\nnpm install -g dirac-cli\n```\n\n> **Note**: Node.js v25 is currently not supported due to an upstream V8 Turboshaft compiler bug that causes out-of-memory crashes during WASM initialization. Please use Node.js v20, v22, or v24 (LTS versions).\n\n## 🚀 CLI Quick Start \n\n1. **Authenticate**:\n   ```bash\n   dirac auth\n   ```\n2. **Run your first task**:\n   ```bash\n   dirac \"Analyze the architecture of this project\"\n   ```\n\n### Configuration (Environment Variables)\nYou can provide API keys via environment variables to skip the `dirac auth` step. This is ideal for CI/CD or non-persistent environments.\n\nFor provider-specific setup (e.g. [AWS Bedrock](docs/providers/README.md#aws-bedrock), [Google Cloud Vertex AI](docs/providers/README.md#google-cloud-vertex-ai)), see the [Provider Settings](docs/providers/README.md) guide.\n\nCommon API Keys:\n\n- `ANTHROPIC_API_KEY`\n- `OPENAI_API_KEY`\n- `OPENROUTER_API_KEY`\n- `GEMINI_API_KEY`\n- `GROQ_API_KEY`\n- `MISTRAL_API_KEY`\n- `XAI_API_KEY` (x.ai)\n- `HF_TOKEN` (HuggingFace)\n- ... and others (see `src/shared/storage/env-config.ts` for the full list).\n\n#### Using Any OpenAI compatible endpoint\n\nYou can use any OpenAI-compatible provider (e.g., DeepSeek, DeepInfra, OpenRouter, or your own local proxy) by providing the base URL and model ID.\n\n**Environment Variables:**\n- `OPENAI_API_BASE`: Your API base URL (e.g., `https://api.deepseek.com/v1`).\n- `OPENAI_API_KEY` (or `OPENAI_COMPATIBLE_CUSTOM_KEY`): Your API key.\n- `CUSTOM_HEADERS`: Optional custom headers (e.g., `\"Authorization=Bearer token,X-Account-Id=123\"` or JSON format).\n\n**CLI Example:**\n```bash\n# Using environment variables\nexport OPENAI_API_BASE=\"https://api.yourprovider.com/v1\"\nexport OPENAI_API_KEY=\"your-api-key\"\nexport CUSTOM_HEADERS=\"Authorization=Bearer XXX\"\n\ndirac \"explain Dirac Delta function\" \\\n  # --provider is now optional if OPENAI_API_BASE is set\n  --model \"your-model-id\"\n```\n\n**CLI Flag Example:**\n```bash\ndirac \"explain Dirac Delta function\" \\\n  --provider \"https://api.deepseek.com/v1\" \\\n  --model \"deepseek-v4-pro\" \\\n  --headers \"X-Custom-Header=Value\"\n```\n\n\n### Common Commands\n- `dirac \"prompt\"`: Start an interactive task.\n- `dirac -p \"prompt\"`: Run in **Plan Mode** to see the strategy before executing.\n- `dirac -y \"prompt\"`: **Yolo Mode** (auto-approve all actions, great for simple fixes).\n- `git diff | dirac \"Review these changes\"`: Pipe context directly into Dirac.\n- `dirac history`: View and resume previous tasks.\n\n\n## 🛠️ Getting Started\n\n1. Open the Dirac sidebar in VS Code.\n2. Configure your preferred AI provider (Anthropic, OpenAI, OpenRouter, etc.).\n3. Start a new task by describing what you want to build or fix.\n4. Watch Dirac go!\n\n\n## 📈 Star History\n\n<a href=\"https://star-history.com/#dirac-run/dirac&Date\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=dirac-run/dirac&type=Date&theme=dark\" />\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=dirac-run/dirac&type=Date\" />\n    <img alt=\"Star History Chart\" src=\"https://api.star-history.com/svg?repos=dirac-run/dirac&type=Date\" />\n  </picture>\n</a>\n\n\n## 📄 License\n\nDirac is **open source** and licensed under the [Apache License 2.0](LICENSE).\n\n## 🤝 Acknowledgments\n\nDirac is a fork of the excellent [Cline](https://github.com/cline/cline) project. We are grateful to the Cline team and contributors for their foundational work.\n\n---\n\nBuilt with ❤️ by [Max Trivedi](https://www.linkedin.com/in/max-trivedi-49993aab/) at [Dirac Delta Labs](https://dirac.run)\n","summary":"Dirac is an open-source AI coding agent engineered to maximize performance and reasoning accuracy by maintaining highly curated, context-efficient workflows. By utilizing advanced techniques such as hash-anchored parallel edits and AST manipulation, the project significantly reduces API costs while consistently outperforming top-tier benchmarks like Terminal-Bench 2.0. This tool is ideal for developers and engineers who require a cost-effective, high-accuracy autonomous agent capable of executing complex code refactoring tasks without the overhead of traditional prompt-heavy frameworks.","description":"Coding Agent singularly focused efficiency and context curation. Reduces API costs by 50-80% vs other agent AND improves the code quality at the same time. Uses Hash Anchored edits, massively parallel operations, AST manipulation and many many other optimizations.  https://dirac.run/","stars":1272,"language":"TypeScript"},{"owner":"bruin-data","repo":"dac","url":"https://github.com/bruin-data/dac","readme":"# DAC\n\nDAC is a Dashboard-as-Code tool for defining, validating, and serving dashboards from YAML and TSX.\n- Dynamic charts, tabs, loops and conditionals with TSX.\n- Built-in AI agent via Codex: chat with your dashboard live and get it updated.\n- Supports all the major databases: Postgres, MySQL, Snowflake, BigQuery, Redshift, Databricks, and more via [Bruin](https://github.com/bruin-data/bruin)\n- Built-in semantic layer: define metrics and dimensions once in `semantic/`, reference them from any widget. DAC generates the SQL.\n\nIt is built for AI agents to build dashboards in a reliable and reviewable way.\n\n![DAC dashboard demo](resources/dac_optimized.gif)\n\n<table>\n<thead>\n<tr>\n<th>TSX</th>\n<th>YAML</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>\n\n<pre lang=\"tsx\"><code>export default (\n  &lt;Dashboard name=\"Simple Dashboard\" connection=\"my_db\"&gt;\n    &lt;Row&gt;\n      &lt;Metric\n        name=\"Total Revenue\"\n        col={4}\n        sql=\"SELECT SUM(amount) AS value FROM sales\"\n        column=\"value\"\n        prefix=\"$\"\n        format=\"number\"\n      /&gt;\n    &lt;/Row&gt;\n  &lt;/Dashboard&gt;\n)</code></pre>\n\n</td>\n<td>\n\n<pre lang=\"yaml\"><code>name: Sales Overview\nconnection: warehouse\n\nrows:\n  - widgets:\n      - name: Revenue\n        type: metric\n        sql: SELECT SUM(amount) AS value FROM sales\n        column: value\n        prefix: \"$\"\n        col: 4</code></pre>\n\n</td>\n</tr>\n</tbody>\n</table>\n\n## Install\n\nInstall the latest stable DAC release:\n\n```bash\ncurl -LsSf https://getbruin.com/install/dac | sh\n```\n\nInstall the latest edge build from `main`:\n\n```bash\ncurl -LsSf https://getbruin.com/install/dac | sh -s -- --channel edge\n```\n\nDAC uses your existing Bruin connections and currently shells out to `bruin query` for query execution. The install script installs the Bruin CLI first when `bruin` is not already available on your `PATH`.\n\n## Quickstart\n\nCreate a new starter project:\n\n```bash\ndac init my-dashboards\ncd my-dashboards\ndac validate --dir .\ndac validate --dir . --with-database\ndac serve --dir . --open\n```\n\nThe starter includes a SQL-backed YAML dashboard, a semantic YAML dashboard, and a semantic model under `semantic/`.\n\n`dac init` also installs DAC's bundled dashboard authoring skill for Claude and Codex:\n\n```bash\nls .claude/skills/create-dashboard/SKILL.md\nls .codex/skills/create-dashboard\n```\n\nFor existing projects, run `dac skills install --dir .`.\n\nIf you cloned the repository and have `dac` installed, you can also run one of the bundled example projects:\n\n```bash\ndac serve --dir examples/basic-yaml\n```\n\n## Examples\n\nThe repository includes four self-contained example projects under [`examples/`](examples):\n\n| Example | What it shows |\n| --- | --- |\n| [`examples/basic-yaml`](examples/basic-yaml) | A standard YAML dashboard with filters, SQL queries, and query files. |\n| [`examples/basic-tsx`](examples/basic-tsx) | A TSX dashboard that uses load-time queries to generate layout from the database. |\n| [`examples/semantic-yaml`](examples/semantic-yaml) | A YAML dashboard that reads semantic models from `semantic/` and compiles widgets in the backend. |\n| [`examples/semantic-tsx`](examples/semantic-tsx) | A TSX dashboard using external semantic models and backend semantic query compilation. |\n\n## Project Layout\n\n```text\n.\n├── cmd/         CLI entrypoints\n├── pkg/         Dashboard loading, semantic engine, server, query backends\n├── frontend/    React frontend embedded into the DAC binary\n├── docs/        VitePress documentation source\n├── examples/    Runnable example projects for YAML, TSX, and semantic dashboards\n├── resources/   README and documentation assets\n└── testdata/    Internal fixtures used by tests\n```\n\n## Development\n\n```bash\nmake deps\nmake test\nmake build\nmake dev\n```\n\nThe main development commands are defined in the [`Makefile`](Makefile). Use `make` targets rather than ad-hoc `go build` or `npm run build` commands so frontend embedding and build flags stay consistent.\n\n## Telemetry\n\nDAC sends anonymous usage events to help us understand which commands are used and where they fail. Each event includes the command name, run duration, OS/architecture, DAC version, and an anonymous install ID stored at `~/.dac/telemetry.json`.\n\nWe do not collect:\n\n- SQL queries, query results, or row counts\n- Dashboard or widget contents, names, or file paths\n- Connection names, hosts, credentials, project IDs, or dataset names\n- Any environment variables or shell history\n\nTo disable telemetry, set either of these environment variables:\n\n```bash\nexport TELEMETRY_OPTOUT=1\n# or the industry-standard:\nexport DO_NOT_TRACK=1\n```\n\nBuilds without a telemetry write key (the default for `make build`) are silent and send nothing.\n\n## Documentation\n\n- Docs source: [`docs/`](docs)\n- Example projects: [`examples/`](examples)\n- Contribution guide: [`CONTRIBUTING.md`](CONTRIBUTING.md)\n- Security policy: [`SECURITY.md`](SECURITY.md)\n\n## License\n\nAGPL-3.0-only. See [`LICENSE`](LICENSE).\n","summary":"DAC is a Dashboard-as-Code tool that allows developers to define, validate, and serve interactive dashboards using either YAML or TSX. It features a built-in semantic layer for consistent metric definitions and integrates with major databases via the Bruin CLI to generate SQL dynamically. Additionally, the platform includes AI-agent support, enabling users to generate and update dashboard configurations through natural language prompts. This tool is ideal for data engineers and developers who require a version-controlled, reliable, and programmatic approach to dashboard management.","description":"DaC is a dashboard-as-code tool. Build interactive dashboards using YAML and JSX. Built-in semantic layer. Get your agents to build standardized, reviewable dashboards.","stars":692,"language":"Go"},{"owner":"open-bias","repo":"open-bias","url":"https://github.com/open-bias/open-bias","readme":"<p align=\"center\">\n  <img src=\"docs/assets/banner.png\" alt=\"Open Bias — Open Source Reliability Harness\" width=\"900\">\n</p>\n\n<p align=\"center\">\n  <a href=\"https://pypi.org/project/openbias\"><img src=\"https://img.shields.io/pypi/v/openbias?color=blue\" alt=\"PyPI\"></a>\n  <a href=\"https://pepy.tech/projects/openbias\"><img src=\"https://static.pepy.tech/personalized-badge/openbias?period=total&units=INTERNATIONAL_SYSTEM&left_color=BLACK&right_color=GREEN&left_text=downloads\" alt=\"PyPI Downloads\"></a>\n  <a href=\"https://pypi.org/project/openbias\"><img src=\"https://img.shields.io/pypi/pyversions/openbias\" alt=\"Python\"></a>\n  <a href=\"https://github.com/open-bias/open-bias/blob/main/LICENSE\"><img src=\"https://img.shields.io/github/license/open-bias/open-bias\" alt=\"License\"></a>\n  <a href=\"https://github.com/open-bias/open-bias/stargazers\"><img src=\"https://img.shields.io/github/stars/open-bias/open-bias?style=social\" alt=\"GitHub Stars\"></a>\n</p>\n\n<p align=\"center\">\n  <b>English</b> · <a href=\"README.zh-CN.md\">简体中文</a> · <a href=\"README.ja.md\">日本語</a> · <a href=\"README.ko.md\">한국어</a>\n</p>\n\n# Make your agents follow rules.\n\n**Open Source Reliability Harness.** Zero config. Zero latency. Works with any LLM provider.\n\nOpen Bias is a reliability harness that sits between your app and your LLM provider and enforces rules defined in `RULES.md` at runtime. Point your app at the proxy, and intervene on off-policy behavior before it reaches your users, your tools, or your production systems.\n\n<p align=\"center\">\n  <img src=\"docs/assets/terminal-playground.gif\" alt=\"Open Bias terminal playground showing runtime policy enforcement in a terminal\" width=\"600\">\n</p>\n\n---\n\n## Quickstart\n\n```bash\npip install openbias\nexport ANTHROPIC_API_KEY=sk-ant-...    # or OPENAI_API_KEY, GEMINI_API_KEY\nopenbias serve\n```\n\nPoint your existing client at `http://localhost:4000/v1`:\n\n```python\nfrom openai import OpenAI\n\nclient = OpenAI(\n    base_url=\"http://localhost:4000/v1\",          # only change\n    api_key=\"sk-ant-...\"\n)\n\nresponse = client.chat.completions.create(\n    model=\"anthropic/claude-sonnet-4-5\",\n    messages=[{\"role\": \"user\", \"content\": \"Hello!\"}]\n)\n```\n\nOpen Bias ships with a starter `RULES.md` and synthesizes a default evaluator -- no config file needed. Edit `RULES.md` to add your own rules. Add `openbias.yaml` when you want to customize engines, tracing, or enforcement behavior.\n\n---\n\n## What It Looks Like\n\nYour `RULES.md`:\n```markdown\n- Maximum discount is 15%.\n- Never reveal internal pricing, cost basis, or margin data.\n```\n\n**Without Open Bias:**\n\n```\nUser:   I'll switch to your competitor unless you cut me a deal.\nAgent:  I'd hate to lose you! Here's 40% off for 12 months.\n        Just between us, our cost is only $2/seat so this still works.\n```\n\n**With Open Bias:**\n\n```\nUser:   I'll switch to your competitor unless you cut me a deal.\nAgent:  I can offer you 15% off your next renewal. Want me to apply it?\n```\n\n---\n\nIf Open Bias is useful, consider [starring the repo](https://github.com/open-bias/open-bias) -- it helps others find it.\n\n---\n\n## Why Teams Use It\n\n- **System prompts and `AGENTS.md` files stop working at scale.** The more rules you add to a prompt, the less reliably the model follows any of them. Complex policies, multi-step workflows, and cross-agent constraints need enforcement that does not depend on the model choosing to comply.\n- **Evals and observability tell you what went wrong. Open Bias prevents it.** Evals run after the fact. Dashboards show you the failure. Open Bias evaluates live traffic and can `intervene`, `block`, or `shadow` in real time -- before the bad behavior reaches your users.\n- **`RULES.md` is a control surface your whole team can own.** Plain Markdown that lives in your repo. Review it in a PR, diff it across deploys, version it alongside your code. No vendor dashboard, no policy DSL, no separate system to maintain.\n- **Plug in different engines for different concerns.** Workflow enforcement, domain-specific rules, and content safety do not all need the same evaluator. Open Bias lets you run multiple engines side by side -- use a small specialized model for fast classification, a judge LLM for nuanced policy, or Nvidia's NeMo for content safety. You are not locked into burning tokens on your primary provider for every check.\n- **Zero latency by default.** Non-critical violations evaluate async and apply on the next turn. Critical violations are blocked and fixed immediately. The proxy never becomes the bottleneck.\n\n---\n\n## Why This Exists\n\nYou told the agent not to do something. It did it anyway.\n\nEvery developer building on LLMs hits this. You write more rules, add more guardrails to the prompt -- and the model follows them less reliably the longer the list gets.\n\n- You say \"never delete user data\" and the agent calls `DROP TABLE users` on the next turn.\n- You say \"do not share internal pricing\" and the agent includes it in a customer-facing response.\n- You say \"verify identity before account actions\" and the agent skips straight to the action.\n- You add ten more rules to the system prompt and the model starts ignoring the first five.\n\nThis is not a skill issue or a prompting problem. Models treat instructions as context, not constraints. No amount of prompt engineering turns a suggestion into a guarantee. \n\nGuardrails filter content. Observability shows you what happened. Open Bias enforces behavior at runtime -- it evaluates live traffic against your policy and acts on violations before they reach users.\n\n---\n\n## How It Works\n\nOpen Bias sits between your app and your LLM provider, evaluating every request and response against your `RULES.md`:\n\n```\n┌──────────┐       ┌─────────────────────────────────────────────────────────────┐       ┌──────────────┐\n│          │──────▶│                         OPEN BIAS                           │──────▶│              │\n│ Your App │       │                                                             │       │ LLM Provider │\n│          │◀──────│  ┌───────────────────────────────────────────────────────┐  │◀──────│              │\n└──────────┘       │  │                        Proxy                          │  │       └──────────────┘\n                   │  │                                                       │  │\n                   │  │  ┌─────────────────┐         ┌─────────────────────┐  |  │\n                   │  │  │  PRE_CALL Hook  │         │   POST_CALL Hook    │  │  │\n                   │  │  │                 │         │                     │  │  │\n                   │  │  │ • apply pending │         │ • run sync engines  │  │  │\n                   │  │  │   async results │         │ • start async       │  │  │\n                   │  │  │ • run pre sync  │         │   engines (applied  │  │  │\n                   │  │  │   engines       │         │   next request)     │  │  │\n                   │  │  └───────┬─────────┘         └──────────-┬─────────┘  │  │\n                   │  └──────────┼───────────────────────────────┼────────────┘  │\n                   │             │                               │               │\n                   │             ▼                               ▼               │\n                   │  ┌───────────────────────────────────────────────────────┐  │\n                   │  │                    Interceptor                        │  │\n                   │  │  Maps EvaluationResult → enforcement action           │  │\n                   │  │                                                       │  │\n                   │  │  ┌──────────-─┐  ┌────────────-─┐  ┌─────────────┐    │  │\n                   │  │  │  BLOCK     │  │  INTERVENE   │  │  SHADOW     │    │  │\n                   │  │  │  stop req  │  │  modify next │  │  log & pass │    │  │\n                   │  │  │  return    │  │  turn or     │  │  through    │    │  │\n                   │  │  │  error     │  │  replay resp │  │             │    │  │\n                   │  │  └───────────-┘  └─────────────-┘  └─────────────┘    │  │\n                   │  └───────────────────────────────────────────────────────┘  │\n                   │             │                                               │\n                   │             ▼                                               │\n                   │  ┌───────────────────────────────────────────────────────┐  │\n                   │  │                  Policy Engines                       │  │\n                   │  │  ┌────────┐  ┌────────┐  ┌────────┐  ┌────────┐       │  │\n                   │  │  │ Judge  │  │  NeMo  │  │  FSM   │  │  LLM   │       │  │\n                   │  │  │        │  │        │  │ (exp.) │  │ (exp.) │       │  │\n                   │  │  └────────┘  └────────┘  └────────┘  └────────┘       │  │\n                   │  └───────────────────────────────────────────────────────┘  │\n                   │             │                                               │\n                   │  ┌──────────┴────────────────────────────────────────────┐  │\n                   │  │ RULES.md → Compiler → engine config  │ OTel Tracing   │  │\n                   │  └───────────────────────────────────────────────────────┘  │\n                   └─────────────────────────────────────────────────────────────┘\n```\n\nThree hooks fire on every request: **pre-call** applies pending interventions (microseconds), **LLM call** forwards to the provider unmodified, **post-call** evaluates the response. Critical violations can be caught and blocked synchronously. Non-critical violations evaluate async and queue corrections for the next turn, preserving latency.\n\nAll hooks are fail-open with configurable timeout -- the proxy never becomes the bottleneck.\n\nTrace view:\n\n<p align=\"center\">\n  <img src=\"docs/assets/traces.png\" alt=\"Open Bias concept graphic showing a request, evaluator verdict, and enforcement decision\" width=\"520\">\n</p>\n\nPolicy intervention illustration:\n\n<p align=\"center\">\n  <img src=\"docs/assets/deviation-playground-without-byline.gif\" alt=\"Open Bias deviation line GIF showing drift crossing the policy boundary, triggering intervention, and returning to a compliant path\" width=\"900\">\n</p>\n\nTurn-by-turn deviation trace:\n\n- Turns 1-2: normal path.\n- Turn 3: drift starts.\n- Turns 4-5: intervention is applied.\n- Turns 6-7: flow returns to policy.\n\n---\n\n## Engines\n\n| Engine | Mechanism | Critical-path latency |\n|--------|-----------|----------------------|\n| `judge` | Sidecar LLM evaluates compiled rules one at a time | **0ms** (async, deferred intervention) |\n| `nemo` | NVIDIA NeMo Guardrails for content safety and dialog rails | **200-800ms** |\n| `fsm` | State machine with LTL-lite temporal constraints | *experimental* |\n| `llm` | LLM-based state classification and drift detection | *experimental* |\n\nFull engine documentation: [docs/engines.md](docs/engines.md)\n\n---\n\n<!-- Uncomment after launch:\n## Featured In\n[<img src=\"badge\" alt=\"Hacker News\">]() [<img src=\"badge\" alt=\"Product Hunt\">]()\n-->\n\n## Roadmap\n\nv0.4.1 -- beta. The proxy layer, multi-evaluator pipeline, judge and NeMo engines, rules compiler, replay/improve tooling, JSONL traces, and OpenTelemetry tracing all work. Two additional engines (FSM, LLM) are experimental. Zero-config startup plus optional YAML is in place.\n\n---\n\n## Documentation\n\n- [Configuration Reference](docs/configuration.md) -- every config option with type, default, description\n- [Continuous Improvement](docs/continuous-improvement.md) -- trace capture, replay, compare, review, and approval flow\n- [Evaluator Engines](docs/engines.md) -- how each engine works, when to use it, tradeoffs\n- [Architecture](docs/architecture.md) -- system design, data flows, component interactions\n- [Developer Guide](docs/developing.md) -- setup, testing, extension points, debugging\n- [Examples](examples/)\n---\n\n## Contributing\n\nWe'd love your help making Open Bias better — open an issue, submit a PR, or share how you're using it.\n\n---\n\n## License\n\nApache 2.0\n\nIf this project helps your team, a star on [GitHub](https://github.com/open-bias/open-bias) helps us reach more developers.\n","summary":"Open Bias is an open-source reliability harness that acts as a runtime proxy to enforce safety and behavioral rules for LLM applications. By intercepting model traffic, it allows developers to define and strictly implement policies via a simple Markdown interface, ensuring agents adhere to constraints before responses reach end users. This tool is ideal for developers and engineering teams who need to move beyond standard system prompts to achieve reliable, real-time control over complex, production-grade AI workflows.","description":"Open Source Reliability Harness: Make your agents follow rules. One line of code to‎ ‎enforce, trace, and improve. ‎ ‎ ","stars":123,"language":"Python"},{"owner":"Imbad0202","repo":"academic-research-skills","url":"https://github.com/Imbad0202/academic-research-skills","readme":"# Academic Research Skills for Claude Code\n\n[![Version](https://img.shields.io/badge/version-v3.10.0-blue)](https://github.com/Imbad0202/academic-research-skills/releases/tag/v3.10.0)\n[![License: CC BY-NC 4.0](https://img.shields.io/badge/license-CC%20BY--NC%204.0-lightgrey)](https://creativecommons.org/licenses/by-nc/4.0/)\n[![Sponsor](https://img.shields.io/badge/sponsor-Buy%20Me%20a%20Coffee-orange?logo=buy-me-a-coffee)](https://buymeacoffee.com/crucify020v)\n\n[简体中文版](README.zh-CN.md) | [繁體中文版](README.zh-TW.md) | [日本語版](README.ja-JP.md)\n\nA comprehensive suite of Claude Code skills for academic research, covering the full pipeline from research to publication.\n\n**Install in 30 seconds** (Claude Code CLI / VS Code / JetBrains, v3.7.0+):\n\n```text\n/plugin marketplace add Imbad0202/academic-research-skills\n/plugin install academic-research-skills\n```\n\nThen try `/ars-plan` to walk through your paper structure via Socratic dialogue, or jump to [Quick install](#quick-install) for prerequisites and the traditional symlink flow.\n\n> **AI is your copilot, not the pilot.** This tool won't write your paper for you. It handles the grunt work — hunting down references, formatting citations, verifying data, checking logical consistency — so you can focus on the parts that actually require your brain: defining the question, choosing the method, interpreting what the data means, and writing the sentence after \"I argue that.\"\n>\n> Unlike a humanizer, this tool doesn't help you hide the fact that you used AI. It helps you write better. Style Calibration learns your voice from past work. Writing Quality Check catches the patterns that make prose feel machine-generated. The goal is quality, not cheating.\n\n### Why human-in-the-loop, not full automation?\n\nLu et al. (2026, *Nature* 651:914-919) built **The AI Scientist** — the first fully autonomous AI research system to publish a paper through blind peer review at a top-tier ML venue (ICLR 2025 workshop, score 6.33/10 vs workshop average 4.87). Their Limitations section enumerates the failure modes that any fully-autonomous AI research pipeline inherits: implementation bugs, hallucinated results, shortcut reliance, bug-as-insight reframing, methodology fabrication, frame-lock, citation hallucinations.\n\nARS is built on the premise that **a human researcher augmented by AI avoids these failure modes better than either alone**. Stage 2.5 and Stage 4.5 integrity gates run a 7-mode blocking checklist (see [`academic-pipeline/references/ai_research_failure_modes.md`](academic-pipeline/references/ai_research_failure_modes.md)); the reviewer offers an opt-in calibration mode that measures its own FNR/FPR against a user-supplied gold set.\n\n[**Zhao et al.**](https://arxiv.org/abs/2605.07723) (2026-05) audited 111M references across 2.5M papers on arXiv, bioRxiv, SSRN, and PMC. Their conservative estimate is 146,932 hallucinated citations for 2025 alone, with an observed mid-2024 inflection; for the bioRxiv-to-PMC pairing they report 85.3% preprint-to-published persistence. The paper describes \"real citations deployed to support claims the cited references do not actually make\" as an open challenge. ARS v3.7.1 added trust-chain frontmatter for source provenance; v3.7.3 added locator infrastructure (three-layer citation anchors) for future claim-level audits and surfaces advisory risk signals at cite time (ARS labels the claim-faithfulness gap internally as \"L3\"; this is ARS terminology, not the paper's). v3.7.x is motivated by Zhao et al.'s corpus-scale findings; corpus-scale evaluation of ARS itself remains future work.\n\nv3.8 closes the second half of the L3 gap. v3.7.3 made every citation carry a locator anchor; v3.8 adds an opt-in audit pass (`ARS_CLAIM_AUDIT=1`) that fetches the cited source against each anchor and judges whether the claim is actually supported. Five new HIGH-WARN classes (claim-not-supported, negative-constraint-violation, fabricated-reference, anchorless, constraint-violation-uncited) gate-refuse output through the formatter terminal hard gate. Calibration is shipped as a 20-tuple gold set with FNR<0.15 + FPR<0.10 acceptance thresholds; ramp-on plan is deferred to post-calibration evidence per v3.8 spec §5.\n\nv3.3 was inspired by [**PaperOrchestra**](https://arxiv.org/abs/2604.05018) (Song, Song, Pfister & Yoon, 2026, Google): Semantic Scholar API verification, anti-leakage protocol, VLM figure verification, and score trajectory tracking.\n\n---\n\n## Architecture & pipeline\n\n**👉 [docs/ARCHITECTURE.md](docs/ARCHITECTURE.md)** — the full pipeline view: flow diagram, stage-by-stage matrix, data-access flow, skill dependency graph, quality gates, and mode list.\n\nThe architecture doc supersedes the sprawling pipeline description that used to live here. Everything about *what runs in which stage* now lives in one place.\n\n## Quick install\n\n**Prerequisites**\n\n- [Claude Code](https://docs.claude.com/en/docs/claude-code/setup) (latest; plugin packaging requires recent versions)\n- `ANTHROPIC_API_KEY` exported, or set on first `claude` run\n- *Optional:* Pandoc for DOCX, tectonic + Source Han Serif TC for APA 7.0 PDF (Markdown output works without either)\n\n**Plugin install (v3.7.0+, recommended):**\n\n```text\n/plugin marketplace add Imbad0202/academic-research-skills\n/plugin install academic-research-skills\n```\n\n**Verify it works:** run `/ars-plan` and describe a paper you're working on — ARS will start a Socratic dialogue to map out chapter structure. For a single-shot test instead, try `/ars-lit-review \"your topic\"`.\n\n**👉 [docs/SETUP.md](docs/SETUP.md)** — full guide: install Claude Code, set up API keys, optional Pandoc/tectonic for DOCX/PDF, cross-model verification (`ARS_CROSS_MODEL`), and five installation methods (Plugin, project skills, global skills, claude.ai Project, repo-cloned).\n\n**Using Codex CLI?** Install the sibling distribution instead: [`Imbad0202/academic-research-skills-codex`](https://github.com/Imbad0202/academic-research-skills-codex) — same workflow content, Codex-native packaging as a single `$academic-research-suite` skill with `ars-*` aliases.\n\n## Performance & cost\n\n**👉 [docs/PERFORMANCE.md](docs/PERFORMANCE.md)** — per-mode token budgets, full-pipeline estimate (~$4–6 for a 15k-word paper), and recommended Claude Code settings (Skip Permissions; Agent Team optional).\n\n## Guides & articles\n\n- [Academic Writing Shouldn't Be a Solo Act](https://open.substack.com/pub/edwardwu223235/p/academic-writing-shouldnt-be-a-solo?r=4dczl&utm_medium=ios) — full pipeline walkthrough (English)\n- [學術寫作不該是一個人的事：一套開源 AI 協作工具如何改變研究者的工作流](https://open.substack.com/pub/edwardwu223235/p/ai?r=4dczl&utm_medium=ios) — 完整使用指南（繁體中文）\n\n---\n\n## Features at a glance\n\n- **Deep Research** — 13-agent research team with Socratic guided mode, PRISMA systematic review, intent detection, dialogue health monitoring, optional cross-model DA, Semantic Scholar API verification.\n- **Academic Paper** — 12-agent paper writing with Style Calibration, Writing Quality Check, LaTeX hardening, visualization, revision coaching, citation conversion, anti-leakage protocol, and VLM figure verification.\n- **Academic Paper Reviewer** — 7-agent multi-perspective peer review with 0–100 quality rubrics (EIC + 3 dynamic reviewers + Devil's Advocate), concession threshold protocol, attack intensity preservation, optional cross-model DA critique / calibration, R&R traceability matrix, read-only constraint.\n- **Academic Pipeline** — 10-stage pipeline orchestrator with adaptive checkpoints, claim verification, Material Passport, optional `repro_lock`, optional cross-model integrity verification, mid-conversation reinforcement, and score trajectory tracking.\n- **Data Access Level Metadata** (v3.3.2+) — every skill declares `data_access_level` (`raw` / `redacted` / `verified_only`); enforced by `scripts/check_data_access_level.py`. Pattern adapted from Anthropic's automated-w2s-researcher (2026). See [`shared/ground_truth_isolation_pattern.md`](shared/ground_truth_isolation_pattern.md).\n- **Task Type Annotation** (v3.3.2+) — every skill declares `task_type` (`open-ended` or `outcome-gradable`). All current ARS skills are `open-ended`.\n- **Benchmark Report Schema** (v3.3.5+) — JSON Schema + lint for honest benchmark comparisons. See [`shared/benchmark_report_pattern.md`](shared/benchmark_report_pattern.md).\n- **Artifact Reproducibility Lockfile** (v3.3.5+) — optional `repro_lock` sub-block on Material Passport. **Configuration documentation, not replay guarantee** — LLM outputs are not byte-reproducible. See [`shared/artifact_reproducibility_pattern.md`](shared/artifact_reproducibility_pattern.md).\n\n---\n\n## Showcase: real pipeline output\n\nSee the complete artifacts from a real 10-stage pipeline run — peer review reports, integrity verification reports, and the final paper:\n\n**[Browse all pipeline artifacts →](examples/showcase/)**\n\n| Artifact | Description |\n|---|---|\n| [Final Paper (EN)](examples/showcase/full_paper_apa7.pdf) | APA 7.0 formatted, LaTeX-compiled |\n| [Final Paper (ZH)](examples/showcase/full_paper_zh_apa7.pdf) | Chinese version, APA 7.0 |\n| [Integrity Report — Pre-Review](examples/showcase/integrity_report_stage2.5.pdf) | Stage 2.5: caught 15 fabricated refs + 3 statistical errors |\n| [Integrity Report — Final](examples/showcase/integrity_report_stage4.5.pdf) | Stage 4.5: zero regressions confirmed |\n| [Peer Review Round 1](examples/showcase/stage3_review_report.pdf) | EIC + 3 Reviewers + Devil's Advocate |\n| [Re-Review](examples/showcase/stage3prime_rereview_report.pdf) | Verification after revisions |\n| [Peer Review Round 2](examples/showcase/stage3_review_report_r2.pdf) | Follow-up review |\n| [Response to Reviewers](examples/showcase/response_to_reviewers_r2.pdf) | Point-by-point author response |\n| [Post-Publication Audit Report](examples/showcase/post_publication_audit_2026-03-09.pdf) | Independent full-reference audit: found 21/68 issues missed by 3 rounds of integrity checks |\n\n---\n\n## Companion: Experiment Agent\n\nIf your research involves running experiments (code or human studies) before writing, the [Experiment Agent](https://github.com/Imbad0202/experiment-agent) skill fills the gap between ARS Stage 1 (RESEARCH) and Stage 2 (WRITE).\n\n```\nARS Stage 1 RESEARCH  →  RQ Brief + Methodology Blueprint\n        ↓\n  experiment-agent     →  run/manage experiments → validate results\n        ↓\nARS Stage 2 WRITE     →  write paper with verified experiment results\n```\n\n**What it does**: executes code experiments (Python, R, etc.) with real-time monitoring, manages human study protocols with IRB ethics checklist, interprets statistics with 11-type fallacy detection, and verifies reproducibility.\n\n**How to use together**: pause the ARS pipeline after Stage 1, run experiments in a separate experiment-agent session, then bring the results (with Material Passport) back to ARS Stage 2. ARS requires zero modification. See the [experiment-agent README](https://github.com/Imbad0202/experiment-agent) for setup instructions.\n\n---\n\n## Usage\n\n### Quick Start\n\n```\n# Start a full research pipeline\nYou: \"I want to write a research paper on AI's impact on higher education QA\"\n\n# Start with Socratic guidance\nYou: \"Guide my research on AI in educational evaluation\"\n\n# Write a paper with guided planning\nYou: \"Guide me through writing a paper on demographic decline\"\n\n# Review an existing paper\nYou: \"Review this paper\" (then provide the paper)\n\n# Check pipeline status\nYou: \"status\"\n```\n\n### Individual Skills\n\n#### Deep Research (7 modes)\n\n```\n\"Research the impact of AI on higher education\"       → full mode\n\"Give me a quick brief on X\"                          → quick mode\n\"Do a systematic review on X with PRISMA\"             → systematic-review mode\n\"Guide my research on X\"                              → socratic mode (guided)\n\"Fact-check these claims\"                             → fact-check mode\n\"Do a literature review on X\"                         → lit-review mode\n\"Review this paper's research quality\"                → review mode\n```\n\n#### Academic Paper (10 modes)\n\n```\n\"Write a paper on X\"                                  → full mode\n\"Guide me through writing a paper\"                    → plan mode (guided)\n\"Build a paper outline\"                               → outline-only mode\n\"I have a draft, here are reviewer comments\"          → revision mode\n\"Parse these reviewer comments into a roadmap\"        → revision-coach mode\n\"Write an abstract for this paper\"                    → abstract-only mode\n\"Turn this into a literature review paper\"            → lit-review mode\n\"Convert to LaTeX\" / \"Convert citations to IEEE\"      → format-convert mode\n\"Check citations\"                                     → citation-check mode\n\"Generate an AI disclosure statement for NeurIPS\"     → disclosure mode\n```\n\n#### Academic Paper Reviewer (6 modes)\n\n```\n\"Review this paper\"                                   → full mode (EIC + R1/R2/R3 + Devil's Advocate)\n\"Quick assessment of this paper\"                      → quick mode\n\"Guide me to improve this paper\"                      → guided mode\n\"Check the methodology\"                               → methodology-focus mode\n\"Verify the revisions\"                                → re-review mode\n\"Calibrate this reviewer against my gold set\"         → calibration mode\n```\n\n#### Academic Pipeline (Orchestrator)\n\n```\n\"I want to write a complete research paper\"           → full pipeline from Stage 1\n\"I already have a paper, review it\"                   → mid-entry at Stage 2.5 (integrity first)\n\"I received reviewer comments\"                        → mid-entry at Stage 4\n```\n\n> Pipeline ends with **Stage 6: Process Summary** — auto-generates a paper creation process record with 6-dimension Collaboration Quality Evaluation (1–100 scoring).\n\n### Supported Languages\n\n- **Traditional Chinese** (繁體中文) — default when user writes in Chinese\n- **English** — default when user writes in English\n- Bilingual abstracts (Chinese + English) for academic papers\n\n> **Using a different language?** Socratic mode (deep-research) and Plan mode (academic-paper) use **intent-based activation** — they detect the meaning of your request, not specific keywords. This means they work in **any language** without modification.\n>\n> However, the general `Trigger Keywords` section (which determines whether the skill is activated at all) still lists English and Traditional Chinese keywords. If you find the skill isn't activating reliably in your language, you can add your language's keywords to the `### Trigger Keywords` section in each `SKILL.md` file to improve matching confidence.\n\n### Supported Citation Formats\n\n- APA 7.0 (default, including Chinese citation rules)\n- Chicago (Notes & Author-Date)\n- MLA\n- IEEE\n- Vancouver\n\n### Supported Paper Structures\n\n- IMRaD (empirical research)\n- Thematic Literature Review\n- Theoretical Analysis\n- Case Study\n- Policy Brief\n- Conference Paper\n\n---\n\n## Skill Details\n\nPer-agent responsibilities and per-stage artifacts now live in [`docs/ARCHITECTURE.md`](docs/ARCHITECTURE.md). Version numbers are anchored here so release metadata stays in one place.\n\n### Deep Research (v2.9.4)\n\n13-agent research team. Modes: full, quick, review, lit-review, fact-check, socratic, systematic-review. Full agent roster and artifacts: see ARCHITECTURE.md §3.\n\n### Academic Paper (v3.2.0)\n\n12-agent paper writing pipeline. Modes: full, plan, outline-only, revision, revision-coach, abstract-only, lit-review, format-convert, citation-check, disclosure. Output: MD + DOCX (via Pandoc when available) + LaTeX (APA 7.0 `apa7` class / IEEE / Chicago) → PDF via tectonic. Full agent roster and per-phase responsibilities: see ARCHITECTURE.md §3.\n\n### Academic Paper Reviewer (v1.10.0)\n\n7-agent multi-perspective review with **0-100 quality rubrics**. Modes: full, re-review, quick, methodology-focus, guided, calibration. **Decision mapping:** ≥80 Accept, 65-79 Minor Revision, 50-64 Major Revision, <50 Reject. First-round review team vs. narrow re-review team boundary: see ARCHITECTURE.md §3 Stage 3 / Stage 3'.\n\n### Academic Pipeline (v3.10.0)\n\n10-stage orchestrator with integrity verification, two-stage review, Socratic coaching, and collaboration evaluation. Pipeline guarantees: every stage requires user confirmation checkpoint; integrity verification (Stage 2.5 + 4.5) cannot be skipped; R&R Traceability Matrix (Schema 11) independently verifies author revision claims. v3.4 added the Compliance Agent (PRISMA-trAIce + RAISE) at Stage 2.5 / 4.5. v3.5 adds the **Collaboration Depth Observer** (`collaboration_depth_agent`, advisory only — never blocks) at every FULL/SLIM checkpoint and at pipeline completion. MANDATORY integrity gates (2.5 / 4.5) explicitly skip the observer so compliance checks are not diluted. Based on Wang & Zhang (2026), IJETHE 23:11. Stage-by-stage matrix with agents, artifacts, and gates: see ARCHITECTURE.md §3.\n\n---\n\n## v3.0 Optimizations: What We Discovered About AI's Structural Limits\n\n### What happened\n\nWhile using ARS to write a reflection article about AI in higher education, I ran into three structural problems that no amount of prompt engineering could fix:\n\n1. **Frame-lock**: I asked the AI to run a devil's advocate debate against its own thesis. It did — four rounds, each more refined than the last. But every round stayed inside the frame I'd set. The DA attacked arguments, never premises. It never asked \"are we even discussing the right question?\" This is the same pattern that caused the 31% citation error rate in v2.7's stress test: the verifying AI and the generating AI share the same cognitive frame.\n\n2. **Sycophancy under pushback**: Every time I challenged the DA's attacks, it conceded too quickly. It retracted findings faster than it launched them. The model's training rewards conversational harmony — so \"the user pushed back\" was treated as evidence that the attack was wrong, when often it just meant the user was persistent.\n\n3. **Intent misdetection**: The Socratic Mentor kept trying to converge and produce deliverables (\"Want me to write this up?\") when I was still exploring. It couldn't distinguish \"the user wants a deep philosophical discussion\" from \"the user wants an RQ brief.\" Both look like engagement, but they need opposite AI behaviors.\n\n### What we changed (v3.0)\n\n**Devil's Advocate — Concession Threshold Protocol** (`deep-research` + `academic-paper-reviewer`)\n- DA must now score every rebuttal on a 1-5 scale before responding\n- Concession only allowed at score ≥4 (rebuttal directly addresses core attack with evidence)\n- Score ≤3: hold position and restate the original attack\n- Anti-sycophancy rules: no consecutive concessions, concession rate tracking, frame-lock detection after each checkpoint\n\n**Socratic Mentor — Intent Detection Layer** (`deep-research`)\n- Classifies user intent as exploratory vs. goal-oriented at dialogue start and every 3 turns\n- Exploratory mode: disables auto-convergence, raises max rounds to 60, prohibits \"want me to summarize?\" prompts\n- Goal-oriented mode: standard convergence behavior\n- Anti-premature-closure rules: in exploratory mode, the user decides when to stop\n\n**Socratic Mentor — Dialogue Health Indicator** (`deep-research`)\n- Silent self-assessment every 5 turns on three dimensions: persistent agreement, conflict avoidance, premature convergence\n- Auto-injects challenging questions when agreement pattern detected\n- Invisible to user (to prevent gaming), but log available for post-session review\n\n### Why this matters\n\nThese optimizations don't solve AI's structural limits — they make the limits visible and manageable. The DA will still eventually concede if pushed hard enough. The Socratic Mentor will still have some convergence bias. But now there are explicit checkpoints that slow down the sycophancy, force the DA to justify concessions, and prevent the Mentor from wrapping up before the user is ready.\n\nThe deeper lesson: AI literacy isn't about learning to use AI as a tool, following ethics rules, or fearing AI risks. It's about engaging AI deeply enough to discover its structural limits yourself — and your own thinking limits in the process.\n\n---\n\n## License\n\nThis work is licensed under [CC-BY-NC 4.0](https://creativecommons.org/licenses/by-nc/4.0/).\n\n**You are free to:**\n- Share — copy and redistribute the material\n- Adapt — remix, transform, and build upon the material\n\n**Under the following terms:**\n- **Attribution** — You must give appropriate credit\n- **NonCommercial** — You may not use the material for commercial purposes\n\n**Attribution format:**\n```\nBased on Academic Research Skills by Cheng-I Wu\nhttps://github.com/Imbad0202/academic-research-skills\n```\n\n---\n\n## Contributors\n\n**Cheng-I Wu** (吳政宜) — Author and maintainer\n\n**[aspi6246](https://github.com/aspi6246)** — Contributor. The v3.1 optimization was inspired by patterns from [Claude-Code-Skills-for-Academics](https://github.com/aspi6246/Claude-Code-Skills-for-Academics): read-only constraint pattern, anti-pattern codification as first-class design, cognitive framework approach (teaching \"how to think\" not just procedures), and lean skill size philosophy.\n\n**[mchesbro1](https://github.com/mchesbro1)** — Contributor. Originally proposed and drafted the IS Basket of 8 journals for `academic-paper-reviewer/references/top_journals_by_field.md` ([Issue #5](https://github.com/Imbad0202/academic-research-skills/issues/5)).\n\n**[cloudenochcsis](https://github.com/cloudenochcsis)** — Contributor. Extended the IS section from the *Basket of 8* to the full *Senior Scholars' Basket of 11* — adding *Decision Support Systems*, *Information & Management*, and *Information and Organization* ([Issue #7](https://github.com
