aware picker)\n#    (asks you which model, then where to put model weights — pick in-repo\n#     default, ~/models, or a custom path on a different drive. To skip prompts:\n#     `export MODEL_DIR=/path/to/models` and pass the model name. See FAQ.)\nbash scripts/setup.sh\n#    Or scripted:\n#      bash scripts/setup.sh qwen3.6-27b\n\n# 3. Pick a config + boot it (interactive wizard: asks model → GPUs → projects VRAM budget)\nbash scripts/launch.sh\n#    Or let the resolver pick for your model + hardware (.env pin ‖ curated default):\n#      bash scripts/launch.sh --variant qwen3.6-27b/default # YOUR default for this model\n#    Or skip the wizard with an explicit config:\n#      bash scripts/launch.sh --variant beellama/dflash     # single-card BLESSED default — code-fast (~100 code / 50 narr TPS), DFlash spec-dec (⚠️ unofficial multi-arch image; sm_89/120 unvalidated — see docs/INFERENCE_ENGINES.md)\n#      bash scripts/launch.sh --variant ik-llama/iq4ks-mtp  # single-card BALANCED alt — ~63/69 TPS, 200K ctx + vision, leanest VRAM (ik_llama IQK quant)\n#      bash scripts/launch.sh --variant llamacpp/default    # single-card cliff-immune ALT — 200K @ -ub 512, ~51/60 TPS\n#      bash scripts/launch.sh --variant llamacpp/mtp-vision # single-card 49K + MTP + vision\n#      bash scripts/launch.sh --variant vllm/dual           # dual-card 262K + vision (vLLM single-card paths blocked on #167)\n#    Or partial flags (wizard fills the rest):\n#      bash scripts/launch.sh --model qwen3.6-27b --gpus 0,1\n#      bash scripts/launch.sh --tp 2 --pp 1               # override vLLM parallelism\n#    See the variants this machine can run + the per-model defaults view\n#    (hardware-filtered by GPU count; add --all to see every variant):\n#      bash scripts/switch.sh --list          # runnable here\n#      bash scripts/switch.sh --list --all    # everything\n#    Pin your own default so bare `launch.sh` goes straight there:\n#      bash scripts/switch.sh --set-default ik-llama/iq4ks-mtp   # e.g. prefer the balanced ik-llama path over the beellama default; clear: --clear-default qwen3.6-27b\n\n# 4. Sanity test (launcher already printed this curl)\ncurl -sf http://localhost:8020/v1/chat/completions \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"model\":\"qwen3.6-27b-autoround\",\"messages\":[{\"role\":\"user\",\"content\":\"Capital of France?\"}],\"max_tokens\":200}'\n\n# 5. Run the canonical benchmark\nbash scripts/bench.sh\n\n# 6. Switch later without re-clicking through the wizard:\nbash scripts/switch.sh vllm/long-vision   # for example\n\n# 7. Keep your install up-to-date as the stack moves (Genesis pin bumps,\n#    new compose variants, vendored patch updates):\nbash scripts/update.sh\n```\n\n`launch.sh` calls `switch.sh` (down old, up new) and then `verify-full.sh` so you know it's serving cleanly before you point a client at it. See [`scripts/`](scripts/) for all helpers.\n\n> ⚠️ **Single-card long-context note:** Cliff 2 (GDN prefill OOM at >~50K single-prompt) is **open** on 24 GB single-card vLLM. Genesis v7.72.2 PN59 was intended as the fix but doesn't engage on chunked-prefill. **Workarounds:** [`vllm/dual`](docs/DUAL_CARD.md) (TP=2 escapes it) or [`llamacpp/default`](docs/SINGLE_CARD.md#bulletproof-no-cliffs) (different engine, no cliff). Full diagnosis at [`docs/CLIFFS.md`](docs/CLIFFS.md).\n\n---\n\n## TL;DR — what this is\n\n- **Two complementary routes** — pick by what your workload breaks on:\n  - 🏎 **vLLM dual** = max throughput. Up to **127 TPS code** (DFlash) or **4 concurrent streams @ 262K** (turbo). Full feature stack (vision · tools · MTP · streaming).\n  - 🛡 **llama.cpp single** = max robustness. Full **200K context** on one 3090 (max-safe — fills cleanly with margin; see [CLIFFS](docs/CLIFFS.md)). Stress-tested clean: no prefill cliffs, 25K-token tool returns work, 91K needle ladder passes. **~51 / 60 TPS** (Q4_K_M + MTP) — slower than vLLM dual but doesn't crash on real-world tool-using agents.\n- **Validated docker compose configs** for both routes — drop-in OpenAI-compatible API on `localhost:8020`\n- **Multi-engine**: vLLM (full features), llama.cpp (max ctx + robustness), ik_llama (best GGUF quants). _(SGLang was evaluated — currently blocked on Ampere; see [`docs/engines/SGLANG.md`](docs/engines/SGLANG.md).)_\n- **Model-agnostic**: today ships curated configs for Qwen3.6-27B and friends; structure scales as we add models\n- **Universal `pull`** (v0.8.0; extended in v0.8.2) — evaluate any safetensors HF repo, get an honest one-line fit verdict (`--recommend`), and when a pull hard-blocks, send the redacted diagnostic back in one consented step (`--submit-last`). Broader arch coverage each release. See [`docs/PULL.md`](docs/PULL.md)\n\n**New to local AI itself?** → [`docs/LOCAL_AI_PRIMER.md`](docs/LOCAL_AI_PRIMER.md) — plain-English: how hardware / engines / model sizes / quants fit together.\n**New here?** → [`docs/GETTING_STARTED.md`](docs/GETTING_STARTED.md) — 5-minute clone-to-curl path.\n**Already running, want to compare engines?** → [docs/engines/](docs/engines/)\n**Picking an engine** (vLLM / llama.cpp / ik_llama)? → [docs/INFERENCE_ENGINES.md](docs/INFERENCE_ENGINES.md)\n**Confused by quant names** (Q4_K_M vs IQ4_KS vs AWQ)? → [docs/QUANTIZATION.md](docs/QUANTIZATION.md)\n**Hardware questions** (4090, NVLink, power caps)? → [docs/HARDWARE.md](docs/HARDWARE.md)\n**Don't know what TPS / KV / MTP mean?** → [docs/GLOSSARY.md](docs/GLOSSARY.md)\n\n---\n\n## Pick your path\n\n| You have | Start here |\n|---|---|\n| **1× RTX 3090** | [`docs/SINGLE_CARD.md`](docs/SINGLE_CARD.md) — workload → config → quick start |\n| **2× RTX 3090** (PCIe / NVLink auto-detected) | [`docs/DUAL_CARD.md`](docs/DUAL_CARD.md) — workload → config → quick start |\n| **3+ GPUs** (any class — 4× 3090, 8× A6000, mixed) | [`docs/MULTI_CARD.md`](docs/MULTI_CARD.md) — TP scaling math, derivation from `dual.yml`, valid TP values |\n| **A model not in the supported list** / any HF safetensors repo | [`docs/PULL.md`](docs/PULL.md) — universal `pull` flow: evaluate against the KV math, honest about confidence |\n| Considering self-host vs cloud APIs | [`docs/COMPARISONS.md`](docs/COMPARISONS.md) — cost crossover + when each wins |\n\nEach hardware page lists every supported model with the working composes for that card count, plus measured TPS and per-workload pitfalls. Model-specific deep dives (quants, Genesis patches, engine internals) live under [`models/<name>/`](models/).\n\n---\n\n## Supported models\n\n| Model | Status | Card counts | Engines | Highlights |\n|---|---|---|---|---|\n| **[Qwen3.6-27B](models/qwen3.6-27b/)** | Production-ready ⭐ | 1× / 2× 3090 | vLLM ✅ · llama.cpp ✅ · ik_llama ✅ | Vision · tools · MTP n=3 · up to 262K ctx · vLLM dual = 89/127 TPS · llama.cpp single = 200K max-safe, no prefill cliffs · ik_llama IQ4_KS = ~60/69 TPS (fastest single-card) |\n| **[Gemma 4 31B](models/gemma-4-31b/)** | Production-ready | 1× ¹ / 2× 3090 | vLLM ✅ (dual) · llama.cpp ⚠️ (community fork; mainline blocked on FA hdim=512) | Vision · tools · MTP n=3 (Google official drafter) **OR** DFlash n=7 (z-lab drafter) · up to 262K ctx via INT8 PTH KV (PR [#40391](https://github.com/vllm-project/vllm/pull/40391) vendored) · MTP dual = 106/141 TPS at 32K, 95/126 at 262K · DFlash dual = 105/177 TPS at 32K (code-optimal) · **beellama.cpp = single-card default** ⭐ 47/88 TPS, 131–200K ctx, 109–114/150 8-pack ([discussion #239](https://github.com/noonghunna/club-3090/discussions/239)) |\n| **[Qwen3.6 35B-A3B](models/qwen3.6-35b-a3b/)** ⭐ NEW v0.7.3 | Production-ready (ik-llama single-card) · Preview (vLLM dual) | 1× / 2× 3090 | vLLM ✅ (preview) · ik_llama ✅ · llama.cpp ❌ | **MoE (256 experts × 8 active, ~3 B active params)** · vision · tools · **ik_llama `fit-mtp.yml` single-card (Mudler APEX I-Compact)** = 103/149 TPS at 196K, hermes 11/20 + aider 12/30 + cli 12/40 ([PR #243](https://github.com/noonghunna/club-3090/pull/243)) · vLLM preview dual = 182/177 TPS at 16K (no MTP, no TQ3, no Genesis) |\n| **[Gemma 4 26B-A4B](models/gemma-4-26b-a4b/)** ⭐ NEW v0.7.3 | Production via AWQ (Intel AutoRound INT4 blocked on Ampere) | 2× 3090 ² | vLLM ✅ (AWQ overlay) · llama.cpp ❌ | **MoE (128 experts × 8 active, ~4 B active params)** · vision · tools · AWQ dual = **139/139 TPS at 32K**, CV 0.2% / 0.0% |\n\n¹ Single-card Gemma 4 on Ampere 24 GB: vLLM + mainline llama.cpp are blocked (head_dim=512 FA wall, no Ampere FA kernel yet). The community **beellama.cpp** fork builds with `FA_ALL_QUANTS=ON` and runs cleanly on a single 3090 — 47/88 TPS, 100–150K ctx, 109/114 8-pack (validated 2026-05-27). 32 GB+ GPUs run the standard vLLM path (validated on RTX 5090 32 GB by [@apnar](https://github.com/noonghunna/club-3090/discussions/67#discussioncomment-16832042)).\n\n² Gemma 4 26B-A4B single-card not yet tested on Ampere; should fit on a 24 GB 3090 at modest context but the configs are dual-card-only today.\n\nMore models coming — they go under `models/<name>/` with the same internal pattern.\n\n---\n\n## Measured TPS at a glance\n\n![Qwen3.6-27B TPS by config](docs/img/performance.png)\n\nBench protocol: 3 warm + 5 measured runs. See [`scripts/bench.sh`](scripts/bench.sh) for methodology. Per-config details + run-by-run numbers + VRAM + AL/accept rates: [models/qwen3.6-27b/CHANGELOG.md](models/qwen3.6-27b/CHANGELOG.md).\n\n---\n\n## Benchmarks\n\nReproduce the numbers above on your own rig. All benchmarks run against the **currently-running** compose (boot one first via `launch.sh`).\n\n**Throughput (TPS)** — the canonical narrative + code bench (3 warmup + 5 measured per prompt):\n\n```bash\nbash scripts/bench.sh\n```\n\n**Behavioral quality** — tool-call correctness, instruction-following, structured output, etc. via `benchlocal-cli`:\n\n```bash\nbash scripts/quality-test.sh                          # --medium: 5 packs (default, ~15-25 min, no Docker)\nbash scripts/quality-test.sh --quick                  # 2 packs (~5-10 min, no Docker)\nbash scripts/quality-test.sh --full                   # 8 packs / 150 scenarios (~25-40 min, needs Docker)\nbash scripts/quality-test.sh --pack aider-polyglot-30 # a single named pack\nbash scripts/quality-test.sh --reasoning              # HE+/LCB/GPQA(gated)/GSM reasoning suite — separate from --full; code packs need Docker\n```\n\n**Full rebench (one model, everything)** — the canonical 5-step pipeline (`bench` → `verify-stress` → `quality-test --full` → `soak` → `aider-polyglot-30`), ~1.75-2 hr per leg. All artifacts land under `results/rebench/<tag>/`:\n\n```bash\nbash scripts/rebench-full.sh                      # auto-tag from MODEL\nbash scripts/rebench-full.sh --tag qwen-int8      # explicit tag\nbash scripts/rebench-full.sh --skip soak,aider    # skip phases (CSV)\nbash scripts/rebench-full.sh --resume             # resume an interrupted run (skip completed steps)\n\n# Endpoint-first mode (non-Docker engines: llama-swap, ramalama, raw llama-server, …):\nbash scripts/rebench-full.sh \\\n  --url http://HOST:PORT --model 'MODEL-NAME' --engine llama-cpp   # vllm|llama-cpp|sglang|other\n```\n\nRun `rebench-full.sh` twice on different models to assemble a matched-config head-to-head. Full test-pipeline reference: [`docs/QUALITY_TEST.md`](docs/QUALITY_TEST.md).\n\n---\n\n## Diagnostics\n\nWhen filing a bug, sharing cross-rig data, or replying to a triage thread, generate a paste-ready triage report — it captures hardware, OS, GPU, container runtime, stack version, and active container state as markdown. **Home paths, hostnames, usernames, and HF tokens are redacted by default**, so it's safe to paste into a public issue or discussion.\n\n```bash\n# Quick report (~2 sec) — hardware + stack + boot-log highlights\nbash scripts/report.sh\n\n# Capture the full cross-rig pass to a file, ready to paste into an issue/discussion\n# (~35 min — drop --full for a ~2 sec hardware-only capture)\nbash scripts/report.sh --full > my-rig.md\n\n# Add live test output (pick what the thread needs):\nbash scripts/report.sh --verify    # + verify-full.sh         (~1-2 min)\nbash scripts/report.sh --stress    # + verify-stress.sh 7/7   (~5-10 min)\nbash scripts/report.sh --soak      # + continuous soak        (~25 min) — catches Cliff 2b\nbash scripts/report.sh --bench     # + bench.sh TPS           (~3 min)\nbash scripts/report.sh --full      # ALL four — the canonical \"everything\" cross-rig pass (~35 min)\n\n# Internal sharing only (disable redaction):\nbash scripts/report.sh --no-redact\n```\n\n`--soak` is its own flag because a config can pass verify + stress + bench and still fail the multi-turn continuous soak (Cliff 2b at ~25K accumulated tokens) — soak is currently the only test that catches that agentic-workload failure mode. See [`docs/CLIFFS.md`](docs/CLIFFS.md).\n\n### If `launch.sh` / `switch.sh` won't boot — load a compose directly\n\nThe launcher scripts wrap the boot in a preflight (hardware / free-VRAM checks), `.env` parsing, and a Python-driven variant→compose registry. If any of those misfire — a false preflight failure, a CRLF/`.env` quirk on Windows, or missing PyYAML — bypass them and bring the compose up with plain Docker. Two escalations (assumes you've already downloaded the weights — Quick start step 2):\n\n```bash\n# 1. Skip ONLY the hardware / free-VRAM preflight (keeps .env + registry):\nbash scripts/switch.sh --force llamacpp/default\n\n# 2. Bypass the scripts entirely — boot the compose file with Docker directly.\n#    Set MODEL_DIR to wherever your weights live; -f points at the compose.\n#    Layout: models/<model>/<engine>/compose/<topology>/<quant>/<serving>.yml\n\n# single-card llama.cpp (cliff-immune fallback; no nightly/Genesis dependency) — serves on :8020\nMODEL_DIR=/path/to/models docker compose \\\n  -f models/qwen3.6-27b/llama-cpp/compose/single/unsloth-q4km/mtp.yml up -d\n\n# single-card ik_llama (fastest single-card path) — :8020\nMODEL_DIR=/path/to/models docker compose \\\n  -f models/qwen3.6-27b/ik-llama/compose/single/ubergarm-iq4ks/mtp.yml up -d\n\n# dual-card vLLM — :8010\nMODEL_DIR=/path/to/models docker compose \\\n  -f models/qwen3.6-27b/vllm/compose/dual/autoround-int4/fp8-mtp.yml up -d\n\n# verify it's serving (use the port from the comment above), then stop it the same way:\ncurl -s http://localhost:8020/v1/models | jq .\ndocker compose -f <the-same-compose-file> down\n```\n\n`MODEL_DIR` is the only env var you must set — it's mounted as `/models`, and defaults to the in-repo `models-cache/` if your weights live there. Everything else has a sane default baked in; each compose **header** documents its own overrides (`GGUF_FILE`, `CTX_SIZE`, `UBATCH_SIZE`, …) and the exact `docker compose` line. `bash scripts/switch.sh --list` lists the variants runnable on this machine (hardware-filtered by GPU count; `--all` shows every variant), and a successful `switch.sh` run prints the compose path it used — so you can always recover the `-f` target.\n\n> ⚠ Launching directly skips the preflight that catches under-VRAM / wrong-GPU-count mistakes. If the container exits, check `docker logs <container> 2>&1 | tail -50`.\n\n---\n\n## Repo layout\n\n```\nclub-3090/\n├── README.md                              this file — start here\n├── CHANGELOG.md                           cross-cutting changes (engine pin bumps, script updates)\n├── LICENSE                                Apache-2.0\n├── docs/\n│   ├── LOCAL_AI_PRIMER.md                 plain-English on-ramp: hardware / engines / sizes / quants\n│   ├── ARCHITECTURE.md                    how this stack thinks about LLM serving on 24 GB\n│   ├── HARDWARE.md                        Ampere SM 8.6+, NVLink note, 24 GB ceilings\n│   ├── WSL_SETUP.md                        Windows (WSL2) from-scratch setup walkthrough\n│   ├── GLOSSARY.md                        plain-language definitions (TPS / KV / MTP / TP / etc.)\n│   ├── UPSTREAM.md                        every upstream issue / PR we depend on or have filed\n│   ├── CLIFFS.md                          full synopsis of the prefill cliffs (root causes + fix landscape)\n│   ├── img/                               chart sources (performance.svg, vram-budget-{single,dual,combined}.svg) + PNG exports\n│   └── engines/                           cross-model engine comparison + per-engine deep dives\n│       ├── README.md                      decision tree, pros/cons matrix\n│       ├── VLLM.md                        vLLM general docs + tuning\n│       ├── LLAMA_CPP.md                   llama.cpp general docs + 262K recipe\n│       ├── IK_LLAMA.md                    advanced-quant engine (IQK quants, two-stage spec-dec)\n│       └── SGLANG.md                      blocked status + watch list\n├── models/\n│   └── qwen3.6-27b/                       all Qwen3.6-27B-specific stuff\n│       ├── README.md                      model overview + variants + recommendations\n│       ├── INTERNALS.md                   engineering rationale (Genesis, Marlin pad, DFlash, upstream tracker)\n│       ├── CHANGELOG.md                   model-specific dated history\n│       ├── vllm/\n│       │   ├── README.md                  \"vLLM recipes for Qwen3.6-27B\"\n│       │   ├── compose/<topology>/<quant>/  compose files (e.g. dual/autoround-int4/fp8-mtp.yml)\n│       │   └── patches/                   tolist_cudagraph + Marlin pad README + Genesis pointer\n│       ├── llama-cpp/\n│       │   ├── README.md                  \"llama.cpp composes for Qwen3.6-27B\"\n│       │   └── compose/single/unsloth-q4km/ mtp.yml + mtp-vision.yml + bounded-thinking.yml\n│       ├── ik-llama/\n│       │   └── compose/single/ubergarm-iq4ks/ mtp.yml + mtp-vision.yml + two-stage.yml (IQK quant)\n│       └── sglang/\n│           └── README.md                  blocked status — what would unblock it on this model\n├── scripts/                               shared, model-aware\n│   ├── setup.sh                           bash setup.sh <model> → preflight + downloads + verifies + Genesis\n│   ├── launch.sh                          interactive wizard: model → GPUs → KV projection → boots compose + verifies\n│   ├── switch.sh                          stateless variant switcher (bring down old, up new)\n│   ├── update.sh                          one-shot upgrade: git pull + re-pin Genesis + re-vendor patches\n│   ├── health.sh                          runtime health probe (KV %, MTP AL, recent TPS, errors)\n│   ├── preflight.sh                       sourceable lib: docker / GPU / disk / repo-drift / Genesis-pin checks\n│   ├── verify.sh                          quick smoke test (engine-aware via env)\n│   ├── verify-full.sh                     fast functional test (8 checks, ~1-2 min)\n│   ├── verify-stress.sh                   boundary-case stress test (longctx ladder + tool prefill OOM, ~5-10 min)\n│   ├── soak-test.sh                       runtime VRAM accretion / multi-turn agent traffic (~10-30 min, opt-in)\n│   ├── bench.sh                           canonical TPS bench\n│   └── report.sh                          paste-ready triage report (run before filing a bug or sharing bench numbers)\n└── tools/\n    └── charts/                            re-generate docs/img/* SVGs and PNG exports (matplotlib)\n        ├── gen-perf.py                    perf bar charts (combined + single + dual)\n        └── gen-vram.py                    VRAM stacked bars (combined + single + dual)\n```\n\n---\n\n## What you'll need\n\n| For any model on this stack | Notes |\n|---|---|\n| 1× or 2× NVIDIA RTX 3090 (24 GB each) | Larger Ampere/Ada cards (4090, A6000) work; smaller cards (12 GB) don't fit 27B-class models. |\n| Linux (Ubuntu 22.04+ tested) | macOS/Windows: vLLM is Linux + CUDA only. Llama.cpp works on macOS/Windows but recipes assume Linux paths. **On Windows? See [docs/WSL_SETUP.md](docs/WSL_SETUP.md)** for the from-scratch WSL2 walkthrough. |\n| Docker + NVIDIA Container Toolkit | For vLLM. llama.cpp works without Docker. |\n| NVIDIA driver 580.x+ | For CUDA 13 runtime in vLLM nightly. |\n| ~30 GB free disk | Per model. More for multiple models. |\n\nvLLM image pins live in `scripts/lib/profiles/engines/*.yml` and are exported\nby `scripts/launch.sh` / `scripts/switch.sh` as `VLLM_NIGHTLY_SHA`. Set\n`VLLM_IMAGE` to override the full image ref — e.g. to pin a specific upstream\nnightly, or to run a current image when a pinned nightly has been purged:\n\n```bash\nVLLM_IMAGE=vllm/vllm-openai:latest bash scripts/launch.sh --variant vllm/dual\n```\n\nSee [docs/HARDWARE.md](docs/HARDWARE.md) for hardware-specific notes (PCIe vs NVLink, power draw, etc.).\n\n---\n\n## How this is structured\n\n**Engines and hardware are general** — the docs in `docs/` apply across models. vLLM works the same way regardless of whether you're serving Qwen, GLM, or Llama; the engine docs cover that once.\n\n**Models are specific** — under `models/<name>/`, you find that model's quants, quirks, recommended configs, and engine-specific recipes. Adding a new model means adding a new subdir with the same internal pattern.\n\n**Scripts are shared but model-aware** — `bash scripts/setup.sh qwen3.6-27b` downloads the right model + clones the right patches. When we add another model, you'd run `bash scripts/setup.sh glm-4.6` and the same script handles it.\n\nThis separation keeps the stack maintainable as it grows. We don't want a model-specific README at the top; we want the top to be \"stack docs\" and the model details under their dedicated subdirs.\n\n---\n\n## Community\n\n- 💬 **[Discord](https://discord.gg/3t6UKFGhKw)** — casual chat, hardware questions, share what you're running. Use for synchronous Q&A.\n- 📋 **[GitHub Discussions](https://github.com/noonghunna/club-3090/discussions)** — async, searchable. Best for cross-rig benchmark drops, \"should I tune X\" type threads, and anything you want others to find via search.\n- 🐛 **[GitHub Issues](https://github.com/noonghunna/club-3090/issues)** — bug reports, regression repros, concrete asks. Triage ladder in [FAQ](docs/FAQ.md#before-symptom-matching--boot-the-simplest-stack-first) before filing.\n\n## Community projects\n\nProjects in the club-3090 ecosystem maintained outside this repo:\n\n- **[VykosX/club-3090-server](https://github.com/VykosX/club-3090-server)** — single-file installer adding a server-management layer on top of club-3090: browser admin panel on `:8008/admin`, OpenAI-compatible reverse proxy on `:8009` with multi-backend routing, GPU-aware multi-instance orchestration, fan/power controls, audit logs, and per-user API auth/quota. Headless Arch + Debian/Ubuntu friendly. Started 2026-05-05, AGPL-3.0; see [discussion #108](https://github.com/noonghunna/club-3090/discussions/108) for the announcement and current WIP status. **Not yet officially adopted** — listed here as a community pointer until it converges on a stable surface area.\n\nIf you've built something that integrates with club-3090 and you'd like a pointer added here, open a discussion.\n\n---\n\n## Migration history\n\n- **2026-04-28** — Repo created. Consolidates and supersedes:\n  - [`noonghunna/qwen36-27b-single-3090`](https://github.com/noonghunna/qwen36-27b-single-3090) (single-card recipe; archived for issue history)\n  - [`noonghunna/qwen36-dual-3090`](https://github.com/noonghunna/qwen36-dual-3090) (dual-card recipe; archived for issue history)\n\n  Old repos remain readable for existing issue threads, external links (Medium articles, Reddit posts), and historical context. New issues should be filed here.\n\nSee [CHANGELOG.md](CHANGELOG.md) for the merged dated history.\n\n---\n\n## Credits\n\nThe stack stands on a lot of shoulders:\n\n- **Qwen team** ([@Alibaba_Qwen](https://huggingface.co/Qwen)) — for the base models and the MTP head architecture\n- **[Lorbus](https://huggingface.co/Lorbus/Qwen3.6-27B-int4-AutoRound)** — for the AutoRound INT4 quant with preserved BF16 `mtp.fc` (the model this whole stack runs on)\n- **[Sandermage](https://github.com/Sandermage/genesis-vllm-patches)** — Genesis patch tree for TurboQuant + hybrid models on consumer Ampere; root-causing #40880 and shipping the v7.14 fix\n- **[vibhavagarwal5](https://github.com/vllm-project/vllm/pull/38479)** — TurboQuant landing PR + tracking issue #40069\n- **[vLLM project](https://github.com/vllm-project/vllm)** — the engine + active maintenance\n- **[llama.cpp](https://github.com/ggerganov/llama.cpp)** — the alternative engine path\n- **[Luce z-lab](https://github.com/luce-spec)** — DFlash N=5 draft model for Qwen3.6-27B\n- **Intel AutoRound** — quantization framework\n- **All cross-rig contributors** — [@ampersandru](https://github.com/ampersandru), [@walmis](https://github.com/walmis), [@3dluvr](https://github.com/3dluvr), and the Reddit / X local-LLM community for benchmark data and bug reports.\n\n---\n\n## License\n\nApache 2.0. Do what you want with it. If you get better numbers on your rig — open an issue. If you add a new model with working configs — open a PR.\n","summary":"Club-3090 provides a curated collection of configurations, patches, and deployment recipes designed to streamline running Large Language Models (LLMs) on local hardware. The project supports multiple inference engines—including vLLM, llama.cpp, and ik_llama—while remaining model-agnostic to ensure compatibility across diverse AI architectures. It is specifically optimized for RTX 3090 users, though it provides hardware-aware scaling for those utilizing 4090 or 5090 GPUs. This repository is an ideal resource for homelab enthusiasts and developers who need a reliable, benchmarked backend for hosting performant LLMs on consumer-grade hardware.","description":"Community recipes for serving LLMs on RTX 3090/4090/5090 CUDA gpus. Multi-engine (vLLM, llama.cpp, ik_llama) and model-agnostic. Currently shipping Qwen3.6-27B Qwen3.6 35B Gemma 4 26B Gemma 4 31B configs for 1× and 2× cards.","stars":1225,"language":"Python"},{"owner":"b-nnett","repo":"codex-plusplus","url":"https://github.com/b-nnett/codex-plusplus","readme":"# Codex++\n\nCodex++ lets you install local tweaks into the OpenAI Codex desktop app. Tweaks\ncan change UI, add settings pages, run main-process code, and use native\nOS-level features through the Codex++ bridge.\n[Join the Discord community](https://discord.gg/6bY6gGX36H).\n\n<img width=\"1413\" height=\"1016\" alt=\"Codex++ settings screenshot\" src=\"https://github.com/user-attachments/assets/ea0b2ffc-c30d-4f68-ae12-dd8d6a997b2f\" />\n\n> Unofficial project. Not affiliated with OpenAI. Use at your own risk.\n\n## TL;DR\n\nCodex++ patches your local Codex app so Codex loads a small Codex++ runtime on\nstartup.\n\nThat runtime lives in your user data directory, not inside Codex. It finds\ntweaks in a local `tweaks/` folder and loads them when Codex opens.\n\nThe app patch is tiny. Your tweaks, config, logs, backups, and runtime files\nstay outside the app bundle, so you can edit tweaks without rebuilding Codex.\n\nWhen Codex updates, the patch is usually removed. Codex++ installs a watcher\nthat notices this and re-applies the patch.\n\n1.0.0 adds cleaner patching, better debug output, Owl runtime detection,\nbrowser-host debugging, and native bridge support for AppKit, Metal, helper\nprocesses, and tweak-owned native modules.\n\n## Table Of Contents\n\n- [Install](#install)\n- [What Codex++ Is](#what-codex-is)\n- [How It Works](#how-it-works)\n- [Common Commands](#common-commands)\n- [Where Files Live](#where-files-live)\n- [Writing Tweaks](#writing-tweaks)\n- [Owl And Native Bridge](#owl-and-native-bridge)\n- [Browser Host Mode](#browser-host-mode)\n- [Updates And Recovery](#updates-and-recovery)\n- [Security](#security)\n- [More Docs](#more-docs)\n\n## Install\n\nAgentic install, from Codex:\n\n```text\nInspect and install this for me: https://github.com/b-nnett/codex-plusplus\nTell me where you install it and send me the local path for adding new tweaks.\n```\n\nHomebrew:\n\n```sh\nbrew install b-nnett/codex-plusplus/codexplusplus\ncodexplusplus install\n```\n\nGitHub source installer:\n\n```sh\ncurl -fsSL https://raw.githubusercontent.com/b-nnett/codex-plusplus/main/install.sh | bash\n```\n\nWindows PowerShell:\n\n```powershell\nirm https://raw.githubusercontent.com/b-nnett/codex-plusplus/main/install.ps1 | iex\n```\n\nBun:\n\n```sh\nbun install -g github:b-nnett/codex-plusplus\ncodexplusplus install\n```\n\nAfter install, launch Codex normally. Open Settings and look for the Codex++\nsection.\n\n## What Codex++ Is\n\nCodex++ is a tweak loader for Codex Desktop.\n\nIt gives you:\n\n- A local `tweaks/` folder.\n- A runtime that loads renderer and main-process tweaks.\n- A Codex++ Settings section inside Codex.\n- CLI tools for install, repair, update, debug, and tweak development.\n- A watcher that repairs Codex++ after Codex updates.\n- A public SDK for tweak authors.\n- Native bridge APIs for advanced macOS tweaks.\n\nIt does not replace Codex, proxy your account, or run a separate Codex clone.\nIt modifies your installed app so it can load local code.\n\n## How It Works\n\nInstall flow:\n\n1. Codex++ finds your Codex app.\n2. It backs up the unpatched app files.\n3. It patches Codex `app.asar` so a Codex++ loader runs first.\n4. It stages the Codex++ runtime in your user data directory.\n5. It re-signs the app when needed.\n6. It installs a watcher for future Codex updates.\n\nRuntime flow:\n\n1. You launch Codex.\n2. The Codex++ loader starts.\n3. The loader starts the Codex++ runtime from disk.\n4. Codex starts normally.\n5. Codex++ discovers enabled tweaks.\n6. Renderer tweaks run in Codex windows.\n7. Main-process tweaks run in the Codex main process.\n8. The Settings UI shows Codex++ pages and tweak controls.\n\n## Common Commands\n\n| Command | What it does |\n|---|---|\n| `codexplusplus install` | Patch Codex and install the runtime. |\n| `codexplusplus status` | Show installed version and patch state. |\n| `codexplusplus debug` | Show app path, runtime type, paths, open state, and bridge status. |\n| `codexplusplus repair` | Re-apply the patch after an app update or broken install. |\n| `codexplusplus update` | Update Codex++ from the latest GitHub release. |\n| `codexplusplus update-codex` | Prepare Codex for its official updater, then re-patch after restart. |\n| `codexplusplus doctor` | Diagnose signatures, integrity, permissions, and common failures. |\n| `codexplusplus safe-mode` | Disable all tweaks without deleting them. |\n| `codexplusplus safe-mode --off` | Leave safe mode. |\n| `codexplusplus uninstall` | Remove Codex++ and restore the app when safe. |\n| `codexplusplus uninstall --purge` | Also delete tweaks, config, logs, backups, and Codex++ user data. |\n\nTweak development commands:\n\n| Command | What it does |\n|---|---|\n| `codexplusplus create-tweak ./my-tweak` | Create a new tweak folder. |\n| `codexplusplus validate-tweak ./my-tweak` | Validate a tweak manifest and entry file. |\n| `codexplusplus dev ./my-tweak` | Link a local tweak into Codex++ for development. |\n\nSource checkout commands:\n\n```sh\nnpm run build\nnpm test\nnode packages/installer/dist/cli.js install\nnode packages/installer/dist/cli.js debug\n```\n\n## Where Files Live\n\nCodex++ keeps almost everything outside Codex.\n\n| Item | Location |\n|---|---|\n| Loader patch | Inside Codex `app.asar` |\n| Runtime | `<user-data-dir>/runtime/` |\n| Tweaks | `<user-data-dir>/tweaks/` |\n| Tweak data | `<user-data-dir>/tweak-data/` |\n| Config | `<user-data-dir>/config.json` |\n| State | `<user-data-dir>/state.json` |\n| Logs | `<user-data-dir>/log/` |\n| Backups | `<user-data-dir>/backup/` |\n\nDefault user data paths:\n\n| OS | Path |\n|---|---|\n| macOS | `~/Library/Application Support/codex-plusplus/` |\n| Windows | `%APPDATA%/codex-plusplus/` |\n| Linux | `$XDG_DATA_HOME/codex-plusplus/` or `~/.local/share/codex-plusplus/` |\n\nOn Windows Store installs, Codex++ also creates a writable managed app copy\nunder `%LOCALAPPDATA%/codex-plusplus/store-apps/`. Use the Codex++ shortcut for\nthat copy.\n\n## Writing Tweaks\n\nA tweak is a folder with a manifest and an entry file:\n\n```text\nmy-tweak/\n  manifest.json\n  index.js\n```\n\nMinimal `manifest.json`:\n\n```json\n{\n  \"id\": \"com.you.my-tweak\",\n  \"name\": \"My Tweak\",\n  \"version\": \"0.1.0\",\n  \"githubRepo\": \"you/my-tweak\",\n  \"description\": \"Adds a Codex++ settings page.\",\n  \"scope\": \"renderer\",\n  \"main\": \"index.js\"\n}\n```\n\nMinimal `index.js`:\n\n```js\nmodule.exports = {\n  start(api) {\n    api.settings.registerPage({\n      id: \"main\",\n      title: api.manifest.name,\n      render(root) {\n        root.textContent = \"Hello from Codex++.\";\n      },\n    });\n  },\n  stop() {},\n};\n```\n\nLocal dev loop:\n\n```sh\ncodexplusplus create-tweak ./my-tweak --id com.you.my-tweak --name \"My Tweak\"\ncodexplusplus validate-tweak ./my-tweak\ncodexplusplus dev ./my-tweak\n```\n\nFull docs are in [Writing Tweaks](./docs/WRITING-TWEAKS.md).\n\n## Owl And Native Bridge\n\nCurrent macOS Codex builds use Owl: a native app shell with Chromium and an\nElectron-compatible JavaScript runtime.\n\nCodex++ 1.0.0 detects Owl and reports capability status through:\n\n```sh\ncodexplusplus debug\n```\n\nTweak authors should use the Codex++ SDK, not raw Owl internals:\n\n- `api.codex.runtime.getInfo()`\n- `api.codex.runtime.getCapabilities()`\n- `api.codex.windows.*`\n- `api.codex.cdp.*`\n- `api.codex.native.*`\n\nNative bridge support includes:\n\n- Tweak-owned `.node` modules.\n- Objective-C++/N-API shims for Swift, AppKit, Metal, and MetalKit.\n- Native child panels.\n- Metal-backed child-window overlays.\n- Helper processes.\n\nStart with [Native Bridge](./docs/tweaks/native-bridge.md).\n\n## Browser Host Mode\n\nBrowser host mode opens the Codex React UI in a normal browser tab while a\nhidden Codex window provides the private app bridge:\n\n```sh\ncodexplusplus browser --port 8765\n```\n\nThen open:\n\n```text\nhttp://127.0.0.1:8765/\n```\n\nThis is useful for debugging and browser automation. It is experimental. The\nin-app browser uses iframe shims in this mode, so some websites may block\nembedding.\n\n## Updates And Recovery\n\nUpdate Codex++:\n\n```sh\ncodexplusplus update\n```\n\nRun the official Codex updater on macOS:\n\n```sh\ncodexplusplus update-codex\n```\n\nRepair Codex++:\n\n```sh\ncodexplusplus repair --force\n```\n\nDisable tweaks temporarily:\n\n```sh\ncodexplusplus safe-mode\n```\n\nRe-enable normal tweak loading:\n\n```sh\ncodexplusplus safe-mode --off\n```\n\nUninstall:\n\n```sh\ncodexplusplus uninstall\n```\n\nClean uninstall, including tweaks/config/logs/backups:\n\n```sh\ncodexplusplus uninstall --purge\n```\n\n## Security\n\nCodex++ runs local code inside your Codex desktop app. Install tweaks only from\nsources you trust.\n\nImportant details:\n\n- Codex++ does not silently update tweak files.\n- Tweak update checks link to GitHub Releases for review.\n- Native tweaks can run native code and need extra review.\n- Native bridge paths are restricted to files inside the tweak directory.\n- Tweak data APIs default to Codex++'s user data directory.\n\nSee [Security](./SECURITY.md).\n\n## More Docs\n\n- [Architecture](./docs/ARCHITECTURE.md)\n- [Troubleshooting](./docs/TROUBLESHOOTING.md)\n- [Writing Tweaks](./docs/WRITING-TWEAKS.md)\n- [Tweak API Reference](./docs/tweaks/api-reference.md)\n- [Manifest Reference](./docs/tweaks/manifest.md)\n- [Runtime And Lifecycle](./docs/tweaks/runtime-lifecycle.md)\n- [UI And DOM Patterns](./docs/tweaks/ui-and-dom.md)\n- [MCP Servers](./docs/tweaks/mcp.md)\n- [Owl Runtime Surface](./docs/OWL-RUNTIME.md)\n- [Owl Bridge Roadmap](./docs/OWL-BRIDGE-ROADMAP.md)\n\n## Contributors\n\n- [Alex Naidis (@TheCrazyLex)](https://github.com/TheCrazyLex) - macOS\n  permission hardening and sudo install handling.\n\n## License\n\nMIT.\n","summary":"Codex++ is a tweak loader for the OpenAI Codex desktop application that enables users to customize their experience by injecting local code into both the UI and the main process. By patching the application to load a runtime from a local directory, it allows for seamless modification of settings, the addition of new features, and the utilization of native OS-level capabilities through a dedicated bridge. This tool is ideal for developers and power users who want to extend the functionality of the Codex desktop app without the need to rebuild the entire application bundle.","description":"Codex++ tweak system for the Codex desktop app","stars":2718,"language":"JavaScript"},{"owner":"VectifyAI","repo":"OpenKB","url":"https://github.com/VectifyAI/OpenKB","readme":"<div align=\"center\">\n\n<a href=\"https://openkb.ai\">\n  <img src=\"https://docs.pageindex.ai/images/openkb.png\" alt=\"OpenKB (by PageIndex)\" />\n</a>\n\n# OpenKB — Open LLM Knowledge Base\n\n<p align=\"center\"><i>Scale to long documents&nbsp; • &nbsp;Reasoning-based retrieval&nbsp; • &nbsp;Native multi-modality&nbsp; • &nbsp;No Vector DB</i></p>\n\n</div>\n\n---\n\n# 📑 What is OpenKB\n\n**OpenKB (Open Knowledge Base)** is an open-source system (in CLI) that compiles raw documents into a structured, interlinked wiki-style knowledge base using LLMs, powered by [**PageIndex**](https://github.com/VectifyAI/PageIndex) for vectorless long document retrieval.\n\nThe idea is based on a [concept](https://x.com/karpathy/status/2039805659525644595) described by Andrej Karpathy: LLMs generate summaries, concept pages, and cross-references, all maintained automatically. Knowledge compounds over time instead of being re-derived on every query.\n\n### Why not traditional RAG?\n\nTraditional RAG rediscovers knowledge from scratch on every query. Nothing accumulates. OpenKB compiles knowledge once into a persistent wiki, then keeps it current. Cross-references already exist. Contradictions are flagged. Synthesis reflects everything consumed.\n\nOpenKB has two layers: a **wiki foundation** that compiles and maintains your knowledge, and **generators** (query / chat / Skill Factory) that turn it into useful output. See [Usage](#️-usage) for the full command list.\n\n# 🚀 Getting Started\n\n### Install\n\n```bash\npip install openkb\n```\n\n<details>\n<summary><i>Other install options</i></summary>\n\n- **Latest from GitHub:**\n\n  ```bash\n  pip install git+https://github.com/VectifyAI/OpenKB.git\n  ```\n\n- **Install from source** (editable, for development):\n\n  ```bash\n  git clone https://github.com/VectifyAI/OpenKB.git\n  cd OpenKB\n  pip install -e .\n  ```\n\n</details>\n\n### Quick Start\n\n```bash\n# 1. Create a directory for your knowledge base\nmkdir my-kb && cd my-kb\n\n# 2. Initialize the knowledge base\nopenkb init\n\n# 3. Add documents\nopenkb add paper.pdf\nopenkb add ~/papers/                            # Add a whole directory\nopenkb add https://arxiv.org/pdf/2509.11420     # Or fetch from a URL\n\n# 4. Ask a question\nopenkb query \"What are the main findings?\"\n\n# 5. Or chat interactively\nopenkb chat\n\n# 6. Or distill your wiki into a redistributable skill\nopenkb skill new my-expert \"Reason like an expert on <topic-from-your-docs>\"\n```\n\n### Set up your LLM\n\nOpenKB comes with [multi-LLM support](https://docs.litellm.ai/docs/providers) (e.g., OpenAI, Claude, Gemini) via [LiteLLM](https://github.com/BerriAI/litellm) (pinned to a [safe version](https://docs.litellm.ai/blog/security-update-march-2026)).\n\nSet your model during `openkb init`, or in [`.openkb/config.yaml`](#configuration), using `provider/model` LiteLLM format (like `anthropic/claude-sonnet-4-6`). OpenAI models can omit the prefix (like `gpt-5.4`).\n\nCreate a `.env` file with your LLM API key:\n\n```bash\nLLM_API_KEY=your_llm_api_key\n```\n\n# 🧩 How OpenKB Works\n\n### Architecture\n\n```\nraw/                              You drop files here\n │\n ├─ Short docs ──→ markitdown ──→ LLM reads full text\n │                                     │\n ├─ Long PDFs ──→ PageIndex ────→ LLM reads document trees\n │                                     │\n │                                     ▼\n │                         Wiki Compilation (using LLM)\n │                                     │\n ▼                                     ▼\nwiki/                                  │            ← the foundation\n ├── index.md            Knowledge base overview\n ├── log.md              Operations timeline\n ├── AGENTS.md           Wiki schema (LLM instructions)\n ├── sources/            Full-text conversions\n ├── summaries/          Per-document summaries\n ├── concepts/           Cross-document synthesis ← the good stuff\n ├── entities/           Specific named things (people, orgs, places, products)\n ├── explorations/       Saved query results\n └── reports/            Lint reports\n                                       │\n                ┌──────────────────────┼──────────────────────┐\n                ▼                      ▼                      ▼\n            query / chat         Skill Factory          (future)\n          (LLM answers from     openkb skill new       ppt / podcast /\n            the wiki)           → output/skills/        report / …\n                                + marketplace.json\n```\n\n### Short vs. Long Document Handling\n\n| | Short documents | Long documents (PDF ≥ 20 pages) |\n|---|---|---|\n| **Convert** | markitdown → Markdown | PageIndex → tree index + summaries |\n| **Images** | Extracted inline (pymupdf) | Extracted by PageIndex |\n| **LLM reads** | Full text | Document trees |\n| **Result** | summary + concepts | summary + concepts |\n\nShort docs are read in full by the LLM. Long PDFs are indexed by PageIndex into a hierarchical tree with summaries. The LLM reads the tree instead of the full text, enabling better retrieval from long documents.\n\n### Knowledge Compilation\n\nWhen you add a document, the LLM:\n\n1. Generates a **summary** page\n2. Reads existing **concept** and **entity** pages\n3. Creates or updates concepts with cross-document synthesis\n4. Creates or updates **entity** pages (people, orgs, places, products)\n5. Updates the **index** and **log**\n\nA single source might touch 10-15 wiki pages. Knowledge accumulates: each document enriches the existing wiki rather than sitting in isolation.\n\n# ⚙️ Usage\n\nOpenKB commands fall into two layers: the **wiki foundation** (compile + manage your knowledge) and **generators** (turn that wiki into useful output).\n\n## 🧱 Wiki Foundation — compile and maintain\n\n| Command | Description |\n|---|---|\n| `openkb init` | Initialize a new knowledge base (interactive) |\n| <code>openkb&nbsp;add&nbsp;&lt;file_or_dir_or_URL&gt;</code> | Add documents and compile to wiki. URL ingest auto-detects PDF (saved as `.pdf` → PageIndex / markitdown) vs HTML (trafilatura main-content extract → `.md`) |\n| <code>openkb&nbsp;remove&nbsp;&lt;doc&gt;</code> | Remove a document and clean up its wiki pages, images, registry, and PageIndex state (use `--dry-run` to preview, `--keep-raw` / `--keep-empty` to retain artifacts) |\n| <code>openkb&nbsp;recompile&nbsp;[&lt;doc&gt;]&nbsp;[--all]</code> | Re-run the current compile pipeline on already-indexed docs (e.g. to backfill the `entities/` layer) without re-indexing. Regenerates summaries and rewrites concept pages — manual edits are overwritten. Use `--dry-run` to preview, `--refresh-schema` to also update `wiki/AGENTS.md` |\n| `openkb watch` | Watch `raw/` and auto-compile new files |\n| `openkb lint` | Run structural + knowledge health checks |\n| `openkb list` | List indexed documents and concepts |\n| `openkb status` | Show knowledge base stats |\n| <code>openkb&nbsp;feedback&nbsp;[\"msg\"]</code> | File feedback by opening a prefilled GitHub issue (use `--type bug/feature/question` to tag the issue) |\n\n<!-- | `openkb lint --fix` | Auto-fix what it can | -->\n\n## ✨ Generators — turn the wiki into output\n\nA \"generator\" reads from the compiled wiki and produces something usable: an answer, a conversation, a skill folder. The wiki is the substrate; generators are the surfaces.\n\n| Command | Output |\n|---|---|\n| <code>openkb&nbsp;query&nbsp;\"question\"</code> | A grounded answer with citations (use `--save` to persist to `wiki/explorations/`) |\n| `openkb chat` | Interactive multi-turn session over the wiki (use `--resume`, `--list`, `--delete` to manage sessions) |\n| <code>openkb&nbsp;skill&nbsp;new&nbsp;&lt;name&gt;&nbsp;\"&lt;intent&gt;\"</code> | A redistributable Anthropic Skill at `<kb>/output/skills/<name>/` + auto-updated `marketplace.json` |\n| <code>openkb&nbsp;skill&nbsp;validate&nbsp;[name]</code> | Structural lint of compiled skills (frontmatter, file sizes, wikilinks, scripts/ stdlib check with `--strict`). Auto-runs at end of `skill new` |\n| <code>openkb&nbsp;skill&nbsp;eval&nbsp;&lt;name&gt;</code> | Trigger-accuracy evaluation — does the `description:` field actually fire? LLM generates eval prompts; grader LLM scores activation. `--save` persists the eval set |\n| <code>openkb&nbsp;skill&nbsp;history&nbsp;&lt;name&gt;</code> / <code>openkb&nbsp;skill&nbsp;rollback&nbsp;&lt;name&gt;</code> | Iteration workspace — every overwrite saves the previous version to `output/skills/<name>-workspace/iteration-N/` with a structural diff. Rollback restores any iteration |\n\n### Query & Chat — ask the wiki\n\n`openkb query \"...\"` answers a single question. `openkb chat` is interactive — each turn carries history, so you can dig into a topic without re-typing context. Both use the same underlying wiki and the same retrieval primitives (PageIndex for long docs, direct concept reads for short).\n\n```bash\nopenkb query \"What does the literature say about attention scaling?\"\n\nopenkb chat                       # start a new session\nopenkb chat --resume              # resume the most recent session\nopenkb chat --resume 20260411     # resume by id (unique prefix works)\nopenkb chat --list                # list all sessions\nopenkb chat --delete <id>         # delete a session\n```\n\nInside a chat, type `/` to access slash commands (Tab to complete):\n\n- `/help` — list available commands\n- `/status` — show knowledge base status\n- `/list` — list all documents\n- `/add <path>` — add a document or directory without leaving the chat\n- `/skill new <name> \"<intent>\"` — compile a skill from this chat (see below)\n- `/save [name]` — export the transcript to `wiki/explorations/`\n- `/clear` — start a fresh session (the current one stays on disk)\n- `/lint` — run knowledge base lint\n- `/exit` — exit (Ctrl-D also works)\n\n### 🛠 Skill Factory — *Drop in a book. Out comes a digital expert.*\n\nThe newest generator. `openkb skill new` distills any subset of your wiki into an [Anthropic Skill](https://docs.claude.com/en/docs/build-with-claude/skills) — a portable folder that **Claude Code, Codex CLI, Gemini CLI, and Cursor** all install and load natively. Drop in a book's worth of papers; out comes a specialist that other agents can call on.\n\n```bash\nopenkb skill new karpathy-thinking \\\n  \"Reason about transformers and attention in Karpathy's style\"\n```\n\nThis produces:\n\n```\n<kb>/output/skills/karpathy-thinking/\n├── SKILL.md                   # YAML frontmatter + when-to-use + approach\n├── references/                # depth material the agent loads on demand\n│   ├── methodology.md\n│   └── key-quotes.md\n└── (scripts/)                 # optional, only if intent implies computation\n```\n\n…plus an auto-updated `<kb>/.claude-plugin/marketplace.json` so the whole KB is one-line installable.\n\n**Install locally:**\n\n```bash\ncp -r output/skills/karpathy-thinking ~/.claude/skills/\n```\n\n**Share with others** — push your KB to GitHub, then anyone runs:\n\n```bash\nnpx skills@latest add <your-org>/<your-repo>\n```\n\n**Iterate from chat** — compilation is one-shot, but follow-up edits aren't. Inside `openkb chat`, you can refine without re-running the whole pipeline:\n\n```\n/skill new karpathy-thinking \"Reason about transformers like Karpathy\"\n[generation streams]\n> description is too generic, make it about transformer implementations specifically\n[agent edits SKILL.md frontmatter in place]\n```\n\n**Quality gates** — structural validation, trigger-accuracy + body-coverage evaluation, and full history/rollback:\n\n```bash\n# Lint structure (auto-runs at end of `skill new`)\nopenkb skill validate karpathy-thinking\nopenkb skill validate --strict          # treat warnings as failures\n\n# Does the description actually fire when it should?\nopenkb skill eval karpathy-thinking --save\n\n# History + rollback if a new iteration regresses\nopenkb skill history karpathy-thinking\nopenkb skill rollback karpathy-thinking --to 2\n```\n\n### Configuration\n\nSettings are initialized by `openkb init`, and stored in `.openkb/config.yaml`:\n\n```yaml\nmodel: gpt-5.4                   # LLM model (any LiteLLM-supported provider)\nlanguage: en                     # Wiki output language\npageindex_threshold: 20          # PDF pages threshold for PageIndex\n```\n\n`entity_types` (optional): a YAML list overriding the entity-type vocabulary used for entity pages; omit it to use the default `person`, `organization`, `place`, `product`, `work`, `event`, `other`.\n\nModel names use `provider/model` LiteLLM [format](https://docs.litellm.ai/docs/providers) (OpenAI models can omit the prefix):\n\n| Provider | Model example |\n|---|---|\n| OpenAI | `gpt-5.4` |\n| Anthropic | `anthropic/claude-sonnet-4-6` |\n| Gemini | `gemini/gemini-3.1-pro-preview` |\n\n### PageIndex Integration\n\nLong documents are challenging for LLMs due to context limits, context rot, and summarization loss.\n[PageIndex](https://github.com/VectifyAI/PageIndex) solves this with vectorless, reasoning-based retrieval — building a hierarchical tree index that lets LLMs reason over the index for context-aware retrieval.\n\nPageIndex runs locally by default using the [open-source version](https://github.com/VectifyAI/PageIndex), with no external dependencies required.\n\n#### Optional: Cloud Support\n\nFor large or complex PDFs, [PageIndex Cloud](https://docs.pageindex.ai/) can be used to access additional capabilities, including:\n\n- OCR support for scanned PDFs (via hosted VLM models)\n- Faster structure generation\n- Scalable indexing for large documents\n\nSet `PAGEINDEX_API_KEY` in your `.env` to enable cloud features:\n\n```\nPAGEINDEX_API_KEY=your_pageindex_api_key\n```\n\n### AGENTS.md\n\nThe `wiki/AGENTS.md` file defines wiki structure and conventions. It's the LLM's instruction manual for maintaining the wiki. Customize it to change how your wiki is organized.\n\nAt runtime, the LLM reads `AGENTS.md` from disk, so your edits take effect immediately.\n\n### Using with Obsidian\n\nOpenKB's wiki is a directory of Markdown files with `[[wikilinks]]`. Obsidian renders it natively.\n\n1. Open `wiki/` as an Obsidian vault\n2. Browse summaries, concepts, and explorations\n3. Use graph view to see knowledge connections\n4. Use Obsidian Web Clipper to add web articles to `raw/`\n\n### Using with Claude Code / Codex / Gemini CLI\n\nOpenKB ships a `SKILL.md` so any agent CLI can read your compiled wiki — no extra runtime, no MCP setup, just install the skill once.\n\n**Claude Code**:\n\n```\n/plugin marketplace add VectifyAI/OpenKB\n/plugin install openkb@vectify\n```\n\n**Gemini CLI**:\n\n```bash\ngemini skills install https://github.com/VectifyAI/OpenKB.git --path skills/openkb --consent\n```\n\n**OpenAI Codex CLI** (no marketplace command yet — manual symlink):\n\n```bash\ngit clone https://github.com/VectifyAI/OpenKB.git ~/openkb-src\nmkdir -p ~/.agents/skills\nln -s ~/openkb-src/skills/openkb ~/.agents/skills/openkb\n```\n\nThe skill is read-only — it won't run `openkb add`, `remove`, or `lint --fix` without you asking. See [`skills/openkb/SKILL.md`](skills/openkb/SKILL.md) for the full instruction set.\n\n# 🧭 Learn More\n\n### Compared to Karpathy's Approach\n\n| | Karpathy's workflow | OpenKB |\n|---|---|---|\n| Short documents | LLM reads directly | markitdown → LLM reads |\n| Long documents | Context limits, context rot | PageIndex tree index |\n| Supported formats | Web clipper → .md | PDF, Word, PPT, Excel, HTML, text, CSV, .md |\n| Wiki compilation | LLM agent | LLM agent (same) |\n| Q&A | Query over wiki | Wiki + PageIndex retrieval |\n\n### The Stack\n\n- [PageIndex](https://github.com/VectifyAI/PageIndex) — Vectorless, reasoning-based document indexing and retrieval\n- [markitdown](https://github.com/microsoft/markitdown) — Universal file-to-markdown conversion\n- [OpenAI Agents SDK](https://github.com/openai/openai-agents-python) — Agent framework (supports non-OpenAI models via LiteLLM)\n- [LiteLLM](https://github.com/BerriAI/litellm) — Multi-provider LLM gateway\n- [Click](https://click.palletsprojects.com/) — CLI framework\n- [watchdog](https://github.com/gorakhargosh/watchdog) — Filesystem monitoring\n\n### Roadmap\n\n- [ ] Extend long document handling to non-PDF formats\n- [ ] Scale to large document collections with nested folder support\n- [ ] Hierarchical concept (topic) indexing for massive knowledge bases\n- [ ] Database-backed storage engine\n- [ ] Web UI for browsing and managing wikis\n\n### Contributing\n\nContributions are welcome! Please submit a pull request, or open an [issue](https://github.com/VectifyAI/OpenKB/issues) for bugs or feature requests. For larger changes, consider opening an issue first to discuss the approach.\n\n### License\n\nApache 2.0. See [LICENSE](LICENSE).\n\n### Support Us\n\nIf you find OpenKB useful, please give us a star 🌟 — and check out [PageIndex](https://github.com/VectifyAI/PageIndex) too!  \n\n<div>\n\n[![Twitter](https://img.shields.io/badge/Twitter-000000?style=for-the-badge&logo=x&logoColor=white)](https://x.com/PageIndexAI)&ensp;\n[![LinkedIn](https://img.shields.io/badge/LinkedIn-0077B5?style=for-the-badge&logo=linkedin&logoColor=white)](https://www.linkedin.com/company/vectify-ai/)&ensp;\n[![Contact Us](https://img.shields.io/badge/Contact_Us-3B82F6?style=for-the-badge&logo=envelope&logoColor=white)](https://ii2abc2jejf.typeform.com/to/tK3AXl8T)\n\n</div>\n","summary":"OpenKB is an open-source command-line system that transforms raw documents into a structured, interlinked, wiki-style knowledge base using LLMs. By compiling knowledge once rather than relying on traditional retrieval-augmented generation (RAG), the project enables users to maintain a persistent, self-updating repository that compounds information over time. It features native multi-modality and vectorless long-document retrieval, making it an ideal tool for researchers, developers, and knowledge workers who need to synthesize and manage large volumes of complex data.","description":"OpenKB: Open LLM Knowledge Base","stars":1989,"language":"Python"},{"owner":"sandeco","repo":"reversa","url":"https://github.com/sandeco/reversa","readme":"# Reversa \n<small>by sandeco</small>\n\n**Turn legacy systems into executable specifications for AI agents.**\n\n> 📄 **Paper:** [Reversa: A Reverse Documentation Engineering Framework for Converting Legacy Software into Operational Specifications for AI Agents](https://arxiv.org/abs/2605.18684) — Macedo & da Costa, May 2026.\n\n[![Reversa paper](https://raw.githubusercontent.com/sandeco/reversa/main/docs/img/reversa-paper.png)](https://arxiv.org/abs/2605.18684)\n\n[![English Docs](https://img.shields.io/badge/DOCS-English-009c3b?style=for-the-badge&logo=material-for-mkdocs&logoColor=white&labelColor=2d2d2d)](https://sandeco.github.io/reversa/)<br>\n[![Português Docs](https://img.shields.io/badge/DOCS-Portugu%C3%AAs-ffcc00?style=for-the-badge&logo=material-for-mkdocs&logoColor=black&labelColor=2d2d2d)](https://sandeco.github.io/reversa/pt/)<br>\n[![Español Docs](https://img.shields.io/badge/DOCS-Espa%C3%B1ol-c60b1e?style=for-the-badge&logo=material-for-mkdocs&logoColor=white&labelColor=2d2d2d)](https://sandeco.github.io/reversa/es/)\n\nReversa is a specification reverse-engineering framework. Install it inside a legacy project and it coordinates a team of specialized AI agents to analyze the existing code and generate complete, traceable specifications ready for use by any coding agent.\n\n---\n\n![Reversa installer](https://raw.githubusercontent.com/sandeco/reversa/main/docs/img/reversa-installer.png)\n\n---\n\n## Why Reversa exists\n\nMost production systems carry years of accumulated knowledge: implicit business rules, undocumented architectural decisions, critical logic buried in code nobody wants to touch. That knowledge exists, but it's trapped.\n\nAI agents are transformative for creating and evolving software, but they depend on specifications to operate safely. For new systems, you write the spec and the agent executes. For legacy systems — or those built with pure vibe coding — there is no spec: the agent has no way of knowing what it cannot break.\n\n**Reversa is the bridge between the legacy system and AI agents.**\n\nIt analyzes the existing code, extracts accumulated knowledge (business rules, flows, module contracts, retroactive architectural decisions) and transforms everything into executable, traceable specifications ready for any coding agent.\n\nThe result is not documentation for humans to read. These are **operational contracts** that allow an agent to evolve the system with fidelity to what already exists.\n\n---\n\n## Installation\n\nIn the root of the legacy project:\n\n```bash\nnpx reversa install\n```\n\nThe installer will:\n1. Detect the AI engines present in the environment (Claude Code, Codex, Cursor, etc.)\n2. Ask which agents to install — all selected by default\n3. Collect project name, language, and preferences\n4. Copy agents to `.agents/skills/` (and `.claude/skills/` for Claude Code)\n5. Create the engine entry file (`CLAUDE.md`, `AGENTS.md`, etc.)\n6. Create the `.reversa/` structure with state, configuration, and plan\n7. Generate SHA-256 manifest for safe updates\n\n> Reversa **never deletes or modifies** existing files in your project.\n> Agents write only to `.reversa/` and the output folder (`_reversa_sdd/` by default).\n\n**Requirements:** Node.js 18+\n\n---\n\n> [!IMPORTANT]\n> ### 🔒 Guaranteed immutability of the legacy project\n>\n> The installer only creates new files (`CLAUDE.md`, `AGENTS.md`, `.agents/skills/`, etc.) and **never modifies or deletes any existing file** in your project. During analysis, agents operate under a strict and inviolable directive: **all writes are restricted to `.reversa/` and `_reversa_sdd/`** — no other file in your project is touched.\n\n> [!CAUTION]\n> ### 💾 Back up your project before starting\n>\n> Although Reversa never modifies your files, AI agents can make mistakes. **We strongly recommend:**\n>\n> 1. **Version the project in Git** — make sure all files are committed before starting the analysis\n> 2. **Have the repository on GitHub** (or GitLab, Bitbucket) — so you have a safe remote copy\n> 3. **Make a local copy of the folder** — a simple `cp -r my-project my-project-backup` protects against any unexpected event\n>\n> If something unexpected happens during analysis, you can restore the original state with `git restore .` or from the backup copy.\n\n> [!WARNING]\n> 🔑 **Reversa does not request, store, or transmit API keys from any LLM service.** All intelligence is delegated to the AI agent already present in your environment (Claude Code, Codex, Cursor, etc.) — no external authentication dependencies.\n\n---\n\n## How to use\n\nAfter installation, open the project in the AI agent and activate Reversa:\n\n```\n/reversa\n```\n\nFor engines without slash command support (like Codex):\n\n```\nreversa\n```\n\nReversa will introduce itself, create a personalized exploration plan, and coordinate the entire analysis. Progress is saved in `.reversa/state.json` at each checkpoint — if the session is interrupted, just type `reversa` to resume where you left off.\n\nFor other workflows, use the matching entry command:\n\n| Goal | Command |\n|------|---------|\n| Analyze an existing legacy and produce specs | `/reversa` |\n| Start a brand new project from a one-line idea | `/reversa-new` |\n| Evolve the system one feature at a time, from spec to code | `/reversa-forward` |\n| Rebuild the legacy on a modern stack | `/reversa-migrate` |\n| Render the extracted knowledge as an HTML mini-site | `/reversa-docs` |\n| Estimate effort and pricing on top of the specs | `/reversa-pricing-profile`, `/reversa-pricing-size`, `/reversa-pricing-estimate` |\n\nEach orchestrator pauses between agents and asks for `CONTINUAR` before advancing, so you stay in control of every step.\n\n---\n\n## How it works\n\nThe Discovery pipeline (`/reversa`) is the heart of the framework: a 5-phase sequence orchestrated by the **Reversa** agent.\n\n```\nReconnaissance  Excavation  Interpretation  Generation  Review\n    Scout       Archaeologist  Detective      Writer    Reviewer\n                                Architect\n```\n\nIndependent agents (run at any phase): **Visor**, **Data Master**, **Design System**, **Soul Extractor**, **Reconstructor**.\n\nOnce the specs exist, you can move forward in three directions, depending on the goal:\n\n```\nDiscovery (/reversa)\n        │\n        ├── /reversa-forward    Evolve the system from specs to code\n        ├── /reversa-migrate    Rebuild the legacy on a modern stack\n        └── /reversa-docs       Render specs as an HTML mini-site\n```\n\nFor a **greenfield** project (no legacy to extract), start with `/reversa-new` instead. It walks from a one-line idea to SDD specs and then hands off to `/reversa-forward`.\n\n---\n\n## Agents\n\nReversa organizes its agents in **six specialized Teams**. The Discovery Team (Reversa Agents Core) is always installed; the other five Teams are pre-checked in the installer and you can opt out of any of them.\n\n| Team | Purpose | Entry command |\n|------|---------|---------------|\n| **Reversa Agents Core** (Discovery) | Analyze the existing legacy and produce specs | `/reversa` |\n| **Code New Project Agents** | Start a new project (greenfield) from a one-line idea and produce specs | `/reversa-new` |\n| **Code Forward Agents** | Evolve the system from specs to running code, one feature at a time | `/reversa-forward` |\n| **Migration Agents** | Turn legacy specs into a rebuild plan for a modern stack | `/reversa-migrate` |\n| **Pricing and Size Agents** | Estimate effort, size and pricing on top of the specs | `/reversa-pricing-*` |\n| **Documentation Team** | Render the extracted knowledge as a self-contained HTML mini-site | `/reversa-docs` |\n\n### Discovery Team, required\n\nThese run the main `/reversa` pipeline.\n\n| Agent | Role |\n|-------|------|\n| **Reversa** | Central orchestrator. Coordinates all agents, saves checkpoints, guides the user |\n| **Scout** | Maps the surface: folder structure, languages, frameworks, dependencies, entry points |\n| **Archaeologist** | Deep module-by-module analysis: algorithms, control flows, data structures |\n| **Detective** | Extracts implicit business knowledge: rules, retroactive ADRs, state machines, permissions |\n| **Architect** | Synthesizes everything into C4 diagrams, full ERD, integration map, and technical debt |\n| **Writer** | Generates specifications as operational contracts with code traceability |\n\n### Discovery Team, optional (installed by default)\n\n| Agent | Role |\n|-------|------|\n| **Reviewer** | Reviews specs, finds inconsistencies, and validates gaps with the user |\n| **Visor** | Documents the interface from screenshots, without needing the system to be running |\n| **Data Master** | Complete database analysis: DDL, migrations, ORM, ERD, triggers, procedures |\n| **Design System** | Extracts design tokens: colors, typography, spacing, themes, and components |\n| **Soul Extractor** | Produces a single executive Spec (`soul.md`) with purpose, core entities and founding decisions, useful right after Scout |\n| **Agents Help** | Explains every Reversa agent with analogies, useful for newcomers |\n| **Reconstructor** | Generates a bottom-up reconstruction plan from the specs and implements one task at a time, preserving tokens. Activation: `/reversa-reconstructor` |\n\n### Code New Project Agents (greenfield)\n\nFor projects that do not exist yet. Activate with `/reversa-new` and the orchestrator drives the pipeline `Ideator → Researcher → Drafter → Spec SDD`, with a `CONTINUAR` checkpoint between agents. Final handoff suggests `/reversa-forward` to take the specs to code.\n\n| Agent | Role |\n|-------|------|\n| **Reversa New** | Orchestrator. Reads the initial brief, walks the pipeline, saves `newproject_progress` in `state.json` |\n| **Ideator** | Structured brainstorm with 6 divergent questions (root problem, value, alternatives, audience, success metrics, dangerous assumptions). Produces `_reversa_sdd/ideation.md` |\n| **Researcher** | Turns the raw audience into 1 to 3 structured personas with journeys. Produces `_reversa_sdd/personas.md` |\n| **Drafter** | Synthesizes ideation and personas into a complete PRD (problem, metrics, scope, non-goals, constraints, risks). Produces `_reversa_sdd/prd.md` |\n| **Spec SDD** | Decomposes the PRD into logical components and writes one SDD spec per component, with an automatic quality score. Vendored from the global `sdd-spec` skill. Produces `_reversa_sdd/sdd/*.md` |\n\n### Code Forward Agents (evolution)\n\nThe bridge from specs to running code. Pipeline: `requirements → clarify → quality → plan → to-do → audit → coding`. Use `/reversa-forward` as the entry point: it detects the **physical stage** of the active feature (by inspecting the artifacts on disk, not metadata) and suggests the next agent.\n\n| Agent | Role |\n|-------|------|\n| **Reversa Forward** | Orchestrator. Detects the physical stage and suggests the next skill. Never executes code itself |\n| **Requirements** | Turns a free-form idea into `requirements.md` anchored to the legacy, with `[DOUBT]` markers, gaps and glossary |\n| **Clarify** | Up to 5 targeted questions to resolve `[DOUBT]` markers in place |\n| **Quality** | Read-only auditor of writing clarity. Produces `requirements-audit.md` |\n| **Plan** | Translates requirements into a technical proposal expressed as a **delta over the legacy**. Produces `roadmap.md`, `investigation.md`, `data-delta.md`, `onboarding.md`, `interfaces/` |\n| **To-Do** | Decomposes the roadmap into atomic actions across five phases with stable IDs, dependencies and parallelism markers. Produces `actions.md` |\n| **Audit** | Read-only cross-check between requirements, roadmap and actions. Produces `audit/cross-check.md` |\n| **Coding** | Executes `actions.md`, flips checkboxes, writes `progress.jsonl`, `legacy-impact.md` and `regression-watch.md` |\n| **Principles** | Manages durable project rules (`principles.md`) and emits impact reports when they change |\n| **Resume** | Swaps the active feature with one from the `paused-features` queue |\n\n### Migration Team\n\nUse after `/reversa` when the goal is to rebuild the legacy on a modern stack. Activate with `/reversa-migrate`. Pipeline: `Paradigm Advisor → Curator → Strategist → Designer → Screen Translator → Inspector`, with a human review pause between agents. Every artifact lands in `_reversa_sdd/migration/`.\n\n| Agent | Role |\n|-------|------|\n| **Paradigm Advisor** | Detects the legacy paradigm, infers the target paradigm, forces a conscious user decision |\n| **Curator** | Decides rule by rule: MIGRATE, DISCARD or HUMAN DECISION |\n| **Strategist** | Evaluates Strangler Fig, Big Bang, Parallel Run, Branch by Abstraction and recommends one |\n| **Designer** | Drafts target architecture, domain model, data model and data migration plan |\n| **Screen Translator** | Translates legacy screens into executable specs in 2 phases (mode decision + spec generation), emitting golden files for the Inspector when an oracle is available |\n| **Inspector** | Defines how to prove the new system is behaviorally equivalent to the legacy, with Gherkin parity specs |\n\n### Pricing and Size Team\n\nThree agents on top of the specs to estimate effort, size and price. Activate with `/reversa-pricing-profile`, `/reversa-pricing-size` and `/reversa-pricing-estimate`.\n\n### Translators (input adapters)\n\nUse when the legacy \"code\" is not source code but a structured artifact like a visual workflow. Generates the SDD spec and prepares the state for the main pipeline to take over.\n\n| Agent | Role |\n|-------|------|\n| **N8N Translator** | Reads N8N workflows exported as JSON and produces SDD specs ready for Python reimplementation. Activated via `/reversa-n8n` |\n\n### Documentation Team (HTML mini-site)\n\nAfter discovery completes, this team turns the extracted knowledge into a self-contained HTML mini-site under `.reversa/documentation/`. Run `/reversa-docs` to orchestrate the full team, or activate any agent in isolation to regenerate only its pages.\n\n| Agent | Role |\n|-------|------|\n| **Reversa Docs** | Orchestrates the team, runs the 3-question interview, computes deterministic seed. Activated via `/reversa-docs` |\n| **Mapper** | Spatial structure: `arquitetura.html` (Code City 3D, Three.js), `modulos.html` (force-directed D3), `topologia.html` (legacy vs modern side-by-side) |\n| **Analyst** | Quantitative data: `metricas.html` (Highcharts treemap, sankey, histogram, columns), `timeline.html` (events from `.reversa/chronicle.md`) |\n| **Storyteller** | Narrative: `glossario.html` (client-side search), `deck.html` (6 to 10 navigable slides), `features/<spec>.html` (one per SDD spec) |\n| **Publisher** | Final integration: `index.html` with hero + unique generative seal, auto-discovery of auxiliary HTMLs from other agents, link validation, local telemetry |\n\nThe team brings 5 shared skills (`reversa-arquitetura-3d`, `reversa-selo-generativo`, `reversa-highcharts-visualizer`, `reversa-especialista-d3`, `reversa-image-prompt-json`) which are installed automatically alongside the team. The output is a static mini-site that opens via `file://` with no server required.\n\n---\n\n## What is generated\n\n```\n_reversa_sdd/\n├── inventory.md              # Project inventory\n├── dependencies.md           # Dependencies with versions\n├── code-analysis.md          # Technical analysis per module\n├── data-dictionary.md        # Data dictionary\n├── domain.md                 # Glossary and business rules\n├── state-machines.md         # State machines in Mermaid\n├── permissions.md            # Permission matrix\n├── architecture.md           # Architectural overview\n├── c4-context.md             # C4 Diagram: Context\n├── c4-containers.md          # C4 Diagram: Containers\n├── c4-components.md          # C4 Diagram: Components\n├── erd-complete.md           # Full ERD in Mermaid\n├── confidence-report.md      # Confidence report 🟢🟡🔴\n├── gaps.md                   # Identified gaps\n├── questions.md              # Questions for human validation\n├── sdd/                      # Specs per component\n│   └── [component].md\n├── openapi/                  # API specs (if applicable)\n├── user-stories/             # User stories (if applicable)\n├── adrs/                     # Retroactive architectural decisions\n├── flowcharts/               # Flowcharts in Mermaid\n├── sequences/                # Sequence diagrams\n├── ui/                       # Interface specs (Visor)\n├── database/                 # Database specs (Data Master)\n├── design-system/            # Design tokens (Design System)\n└── traceability/\n    ├── spec-impact-matrix.md # Which spec impacts which\n    └── code-spec-matrix.md   # Code file to corresponding spec\n```\n\nIn a greenfield run, `/reversa-new` adds the following on top of `_reversa_sdd/`:\n\n```\n_reversa_sdd/\n├── newproject-brief.md      # Initial brief (Reversa New)\n├── ideation.md              # Structured brainstorm (Ideator)\n├── personas.md              # Personas with journeys (Researcher)\n├── prd.md                   # Product Requirements Document (Drafter)\n└── sdd/\n    └── [component].md       # SDD specs with quality score (Spec SDD)\n```\n\nForward features land in a separate folder, `_reversa_forward/` by default:\n\n```\n_reversa_forward/\n└── <NNN>-<short-name>/      # One folder per feature\n    ├── requirements.md\n    ├── roadmap.md\n    ├── investigation.md\n    ├── data-delta.md\n    ├── onboarding.md\n    ├── interfaces/\n    ├── actions.md\n    ├── progress.jsonl\n    ├── legacy-impact.md\n    ├── regression-watch.md\n    └── audit/\n        ├── requirements-audit.md\n        └── cross-check.md\n```\n\nThe Documentation Team writes only inside `.reversa/documentation/` (HTML mini-site, fully offline).\n\n### Confidence scale\n\nEvery statement in the specs is marked with:\n\n| Mark | Meaning |\n|------|---------|\n| 🟢 CONFIRMED | Extracted directly from code — can be cited with file and line |\n| 🟡 INFERRED | Deduced from patterns — may be wrong |\n| 🔴 GAP | Not determinable from code — requires human validation |\n\n---\n\n## Supported engines\n\n| Engine | File created | Skills path | Activation |\n|--------|-------------|-------------|------------|\n| Claude Code ⭐ | `CLAUDE.md` | `.claude/skills/reversa-*/` and `.agents/skills/reversa-*/` | `/reversa` |\n| Codex ⭐ | `AGENTS.md` | `.agents/skills/reversa-*/` | `reversa` |\n| Cursor ⭐ | `.cursorrules` | `.agents/skills/reversa-*/` | `/reversa` |\n| Gemini CLI | `GEMINI.md` | `.agents/skills/reversa-*/` | `/reversa` |\n| Windsurf | `.windsurfrules` | `.agents/skills/reversa-*/` | `/reversa` |\n| Antigravity | `AGENTS.md` | `.agents/skills/reversa-*/` | `/reversa` |\n| Kiro | (none) | `.kiro/skills/reversa-*/` and `.agents/skills/reversa-*/` | `/reversa` |\n| Opencode | `AGENTS.md` | `.agents/skills/reversa-*/` | `reversa` |\n| Cline | `.clinerules` | `.agents/skills/reversa-*/` | `/reversa` |\n| Roo Code | `.roorules` | `.agents/skills/reversa-*/` | `/reversa` |\n| GitHub Copilot | `.github/copilot-instructions.md` | `.agents/skills/reversa-*/` | `/reversa` |\n| Aider | `CONVENTIONS.md` | `.agents/skills/reversa-*/` | `reversa` |\n| Amazon Q Developer | `.amazonq/rules/reversa.md` | `.agents/skills/reversa-*/` | `/reversa` |\n\n---\n\n## CLI commands\n\n```bash\nnpx reversa install      # Install Reversa in the project\nnpx reversa status       # Show current analysis state\nnpx reversa update       # Update agents to the latest version\nnpx reversa add-agent    # Add an agent to the project\nnpx reversa add-engine   # Add support for a new engine\nnpx reversa uninstall    # Remove Reversa from the project\n```\n\nThe `update` command detects files you modified via SHA-256 and never overwrites customizations.\nThe `uninstall` command removes only files created by Reversa — nothing from the legacy project is touched.\n\n---\n\n## Internal structure\n\n```\n.reversa/\n├── state.json          # Analysis state between sessions\n├── config.toml         # Project configuration\n├── config.user.toml    # Personal preferences (don't commit)\n├── plan.md             # Exploration plan (user-editable)\n├── version             # Installed version\n├── context/\n│   ├── surface.json    # Generated by Scout\n│   └── modules.json    # Generated by Archaeologist\n└── _config/\n    ├── manifest.yaml       # Installation metadata\n    └── files-manifest.json # SHA-256 hashes for safe updates\n\n.agents/skills/         # Universal skills (all compatible agents)\n.claude/skills/         # Mirror for Claude Code\n```\n\n---\n\n## Contributing\n\nContributions are welcome. Open an issue to discuss before submitting a PR.\n\n```bash\ngit clone https://github.com/sandeco/reversa.git\ncd reversa\nnpm install\n```\n\n---\n\n## License\n\nMIT — see [LICENSE](LICENSE) for details.\n","summary":"Reversa is a specification reverse-engineering framework designed to unlock the trapped knowledge within legacy codebases by converting them into executable, traceable specifications. By deploying a team of specialized AI agents to analyze existing business rules and architectural patterns, the tool generates operational contracts that allow modern AI agents to safely maintain and evolve older systems. This framework is ideal for engineering teams working on complex legacy software who want to empower AI development agents with a clear, reliable understanding of existing system constraints and logic.","description":"Transform legacy systems into executable specifications for AI coding agents","stars":1154,"language":"JavaScript"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
