<script id="project-data" type="application/json">[{"owner":"dotnet","repo":"skills","url":"https://github.com/dotnet/skills","readme":"# .NET Agent Skills\n\n[![Dashboard](https://github.com/dotnet/skills/actions/workflows/pages/pages-build-deployment/badge.svg)](https://dotnet.github.io/skills/)\n\nThis repository contains the .NET team's curated set of core skills and custom agents for coding agents. For information about the Agent Skills standard, see [agentskills.io](https://agentskills.io).\n\n[**📊 Dashboard**](https://dotnet.github.io/skills/) - Accuracy and efficiency scoring trends for contained plugins (https://dotnet.github.io/skills/)\n\n## What's Included\n\n| Plugin | Description |\n|--------|-------------|\n| [dotnet](plugins/dotnet/) | Collection of core .NET skills for handling common .NET coding tasks. |\n| [dotnet-data](plugins/dotnet-data/) | Skills for .NET data access and Entity Framework related tasks. |\n| [dotnet-diag](plugins/dotnet-diag/) | Skills for .NET performance investigations, debugging, and incident analysis. |\n| [dotnet-msbuild](plugins/dotnet-msbuild/) | Comprehensive MSBuild and .NET build skills: failure diagnosis, performance optimization, code quality, and modernization. |\n| [dotnet-nuget](plugins/dotnet-nuget/) | NuGet and .NET package management: dependency management and modernization. |\n| [dotnet-upgrade](plugins/dotnet-upgrade/) | Skills for migrating and upgrading .NET projects across framework versions, language features, and compatibility targets. |\n| [dotnet-maui](plugins/dotnet-maui/) | Skills for .NET MAUI development: environment setup, diagnostics, and troubleshooting. |\n| [dotnet-ai](plugins/dotnet-ai/) | AI and ML skills for .NET: technology selection, LLM integration, agentic workflows, RAG pipelines, MCP, and classic ML with ML.NET. |\n| [dotnet-template-engine](plugins/dotnet-template-engine/) | .NET Template Engine skills: template discovery, project scaffolding, and template authoring. |\n| [dotnet-test](plugins/dotnet-test/) | Skills for running, diagnosing, and migrating .NET tests: test execution, filtering, platform detection, and MSTest workflows. |\n| [dotnet-aspnet](plugins/dotnet-aspnet/) | ASP.NET Core web development skills including middleware, endpoints, real-time communication, and API patterns. |\n| [dotnet-blazor](plugins/dotnet-blazor/) | Skills for Blazor development: component authoring, interactivity, and web application patterns. |\n| [dotnet11](plugins/dotnet11/) | Skills for new .NET 11 APIs and language features. |\n\n## Installation\n\n### 🚀 Plugins - Copilot CLI / Claude Code\n\n1. Launch Copilot CLI or Claude Code\n2. Add the marketplace:\n   ```\n   /plugin marketplace add dotnet/skills\n   ```\n3. Install a plugin:\n   ```\n   /plugin install <plugin>@dotnet-agent-skills\n   ```\n4. Restart to load the new plugins\n5. View available skills:\n   ```\n   /skills\n   ```\n6. View available agents:\n   ```\n   /agents\n   ```\n7. Update plugin (on demand):\n   ```\n   /plugin update <plugin>@dotnet-agent-skills\n   ```\n\n### VS Code / VS Code Insiders (Preview)\n\n> [!IMPORTANT]  \n> VS Code plugin support is a preview feature and subject to change. You may need to enable it first.\n\n```jsonc\n// settings.json\n{\n  \"chat.plugins.enabled\": true,\n  \"chat.plugins.marketplaces\": [\"dotnet/skills\"]\n}\n```\n\nOnce configured, type `/plugins` in Copilot Chat or use the `@agentPlugins` filter in Extensions to browse and install plugins from the marketplace.\n\n### Cursor\n\nThis repository is a [Cursor plugin marketplace](https://cursor.com/docs/plugins). You can discover and install published plugins directly in Cursor:\n\n1. Open the marketplace panel in Cursor\n2. Search for `.NET` or browse [cursor.com/marketplace](https://cursor.com/marketplace)\n3. Install the desired plugins\n\nFor local development or unpublished changes, import plugins from a local checkout:\n\n1. Copy or symlink your local checkout to `~/.cursor/plugins/local/dotnet-agent-skills`\n2. Restart Cursor or run **Developer: Reload Window**\n\n### Codex CLI\n\nSkills in this repository follow the [agentskills.io](https://agentskills.io) open standard\nand are compatible with [OpenAI Codex](https://developers.openai.com/codex/skills).\n\nInstall individual skills using the `skill-installer` CLI with the GitHub URL:\n\n```bash\n$ skill-installer install https://github.com/dotnet/skills/tree/main/plugins/<plugin>/skills/<skill-name>\n```\n\n## Contributing\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for contribution guidelines and how to add a new plugin.\n\n## License\n\nSee [LICENSE](LICENSE) for details.\n","summary":"The .NET Agent Skills repository provides a curated library of specialized plugins designed to enhance the capabilities of AI coding agents through the standard Agent Skills framework. These plugins cover a wide spectrum of .NET development tasks, including project scaffolding, performance diagnostics, NuGet package management, framework migrations, and AI-integrated workflows. Software developers and engineers working within the .NET ecosystem will benefit from these tools by automating complex coding tasks and improving their overall productivity across environments like Copilot CLI, Cursor, and VS Code.","description":"Repository for skills to assist AI coding agents with .NET and C#","stars":3234,"language":"C#"},{"owner":"ChromeDevTools","repo":"chrome-devtools-mcp","url":"https://github.com/ChromeDevTools/chrome-devtools-mcp","readme":"# Chrome DevTools for agents\n\n[![npm chrome-devtools-mcp package](https://img.shields.io/npm/v/chrome-devtools-mcp.svg)](https://npmjs.org/package/chrome-devtools-mcp)\n\nChrome DevTools for agents (`chrome-devtools-mcp`) lets your coding agent (such as Antigravity, Claude, Cursor or Copilot)\ncontrol and inspect a live Chrome browser. It acts as a Model-Context-Protocol\n(MCP) server, giving your AI coding assistant access to the full power of\nChrome DevTools for reliable automation, in-depth debugging, and performance analysis.\nA [CLI](docs/cli.md) is also provided for use without MCP.\n\n## [Tool reference](./docs/tool-reference.md) | [Changelog](./CHANGELOG.md) | [Contributing](./CONTRIBUTING.md) | [Troubleshooting](./docs/troubleshooting.md) | [Design Principles](./docs/design-principles.md)\n\n## Key features\n\n- **Get performance insights**: Uses [Chrome\n  DevTools](https://github.com/ChromeDevTools/devtools-frontend) to record\n  traces and extract actionable performance insights.\n- **Advanced browser debugging**: Analyze network requests, take screenshots and\n  check browser console messages (with source-mapped stack traces).\n- **Reliable automation**. Uses\n  [puppeteer](https://github.com/puppeteer/puppeteer) to automate actions in\n  Chrome and automatically wait for action results.\n\n## Disclaimers\n\n`chrome-devtools-mcp` exposes content of the browser instance to the MCP clients\nallowing them to inspect, debug, and modify any data in the browser or DevTools.\nAvoid sharing sensitive or personal information that you don't want to share with\nMCP clients.\n\n`chrome-devtools-mcp` officially supports Google Chrome and [Chrome for Testing](https://developer.chrome.com/blog/chrome-for-testing/) only.\nOther Chromium-based browsers may work, but this is not guaranteed, and you may encounter unexpected behavior. Use at your own discretion.\nWe are committed to providing fixes and support for the latest version of [Extended Stable Chrome](https://chromiumdash.appspot.com/schedule).\n\nPerformance tools may send trace URLs to the Google CrUX API to fetch real-user\nexperience data. This helps provide a holistic performance picture by\npresenting field data alongside lab data. This data is collected by the [Chrome\nUser Experience Report (CrUX)](https://developer.chrome.com/docs/crux). To disable\nthis, run with the `--no-performance-crux` flag.\n\n## **Usage statistics**\n\nGoogle collects usage statistics (such as tool invocation success rates, latency, and environment information) to improve the reliability and performance of Chrome DevTools MCP.\n\nData collection is **enabled by default**. You can opt-out by passing the `--no-usage-statistics` flag when starting the server:\n\n```json\n\"args\": [\"-y\", \"chrome-devtools-mcp@latest\", \"--no-usage-statistics\"]\n```\n\nGoogle handles this data in accordance with the [Google Privacy Policy](https://policies.google.com/privacy).\n\nGoogle's collection of usage statistics for Chrome DevTools MCP is independent from the Chrome browser's usage statistics. Opting out of Chrome metrics does not automatically opt you out of this tool, and vice-versa.\n\nCollection is disabled if `CHROME_DEVTOOLS_MCP_NO_USAGE_STATISTICS` or `CI` env variables are set.\n\n## Update checks\n\nBy default, the server periodically checks the npm registry for updates and logs a notification when a newer version is available.\nYou can disable these update checks by setting the `CHROME_DEVTOOLS_MCP_NO_UPDATE_CHECKS` environment variable.\n\n## Requirements\n\n- [Node.js](https://nodejs.org/) [LTS](https://github.com/nodejs/Release#release-schedule) version.\n- [Chrome](https://www.google.com/chrome/) current stable version or newer.\n- [npm](https://www.npmjs.com/)\n\n## Getting started\n\nAdd the following config to your MCP client:\n\n```json\n{\n  \"mcpServers\": {\n    \"chrome-devtools\": {\n      \"command\": \"npx\",\n      \"args\": [\"-y\", \"chrome-devtools-mcp@latest\"]\n    }\n  }\n}\n```\n\n> [!NOTE]\n> Using `chrome-devtools-mcp@latest` ensures that your MCP client will always use the latest version of the Chrome DevTools MCP server.\n\nIf you are interested in doing only basic browser tasks, use the `--slim` mode:\n\n```json\n{\n  \"mcpServers\": {\n    \"chrome-devtools\": {\n      \"command\": \"npx\",\n      \"args\": [\"-y\", \"chrome-devtools-mcp@latest\", \"--slim\", \"--headless\"]\n    }\n  }\n}\n```\n\nSee [Slim tool reference](./docs/slim-tool-reference.md).\n\n### MCP Client configuration\n\n<details>\n  <summary>Amp</summary>\n  Follow https://ampcode.com/manual#mcp and use the config provided above. You can also install the Chrome DevTools MCP server using the CLI:\n\n```bash\namp mcp add chrome-devtools -- npx chrome-devtools-mcp@latest\n```\n\n</details>\n\n<details>\n  <summary>Antigravity</summary>\n\nTo use the Chrome DevTools MCP server follow the instructions from <a href=\"https://antigravity.google/docs/mcp\">Antigravity's docs</a> to install a custom MCP server. Add the following config to the MCP servers config:\n\n```bash\n{\n  \"mcpServers\": {\n    \"chrome-devtools\": {\n      \"command\": \"npx\",\n      \"args\": [\n        \"chrome-devtools-mcp@latest\",\n        \"--browser-url=http://127.0.0.1:9222\",\n        \"-y\"\n      ]\n    }\n  }\n}\n```\n\nThis will make the Chrome DevTools MCP server automatically connect to the browser that Antigravity is using. If you are not using port 9222, make sure to adjust accordingly.\n\nChrome DevTools MCP will not start the browser instance automatically using this approach because the Chrome DevTools MCP server connects to Antigravity's built-in browser. If the browser is not already running, you have to start it first by clicking the Chrome icon at the top right corner.\n\n</details>\n\n<details>\n  <summary>Claude Code</summary>\n\n**Install via CLI (MCP only)**\n\nUse the Claude Code CLI to add the Chrome DevTools MCP server (<a href=\"https://code.claude.com/docs/en/mcp\">guide</a>):\n\n```bash\nclaude mcp add chrome-devtools --scope user npx chrome-devtools-mcp@latest\n```\n\n**Install as a Plugin (MCP + Skills)**\n\n> [!NOTE]\n> If you already had Chrome DevTools MCP installed previously for Claude Code, make sure to remove it first from your installation and configuration files.\n\nTo install Chrome DevTools MCP with skills, add the marketplace registry in Claude Code:\n\n```sh\n/plugin marketplace add ChromeDevTools/chrome-devtools-mcp\n```\n\nThen, install the plugin:\n\n```sh\n/plugin install chrome-devtools-mcp@chrome-devtools-plugins\n```\n\nRestart Claude Code to have the MCP server and skills load (check with `/skills`).\n\n> [!TIP]\n> If the plugin installation fails with a `Failed to clone repository` error (e.g., HTTPS connectivity issues behind a corporate firewall), see the [troubleshooting guide](./docs/troubleshooting.md#claude-code-plugin-installation-fails-with-failed-to-clone-repository) for workarounds, or use the CLI installation method above instead.\n\n</details>\n\n<details>\n  <summary>Cline</summary>\n  Follow https://docs.cline.bot/mcp/configuring-mcp-servers and use the config provided above.\n</details>\n\n<details>\n  <summary>Codex</summary>\n  Follow the <a href=\"https://developers.openai.com/codex/mcp/#configure-with-the-cli\">configure MCP guide</a>\n  using the standard config from above. You can also install the Chrome DevTools MCP server using the Codex CLI:\n\n```bash\ncodex mcp add chrome-devtools -- npx chrome-devtools-mcp@latest\n```\n\n**On Windows 11**\n\nConfigure the Chrome install location and increase the startup timeout by updating `.codex/config.toml` and adding the following `env` and `startup_timeout_ms` parameters:\n\n```\n[mcp_servers.chrome-devtools]\ncommand = \"cmd\"\nargs = [\n    \"/c\",\n    \"npx\",\n    \"-y\",\n    \"chrome-devtools-mcp@latest\",\n]\nenv = { SystemRoot=\"C:\\\\Windows\", PROGRAMFILES=\"C:\\\\Program Files\" }\nstartup_timeout_ms = 20_000\n```\n\n</details>\n\n<details>\n  <summary>Command Code</summary>\n\nUse the Command Code CLI to add the Chrome DevTools MCP server (<a href=\"https://commandcode.ai/docs/mcp\">MCP guide</a>):\n\n```bash\ncmd mcp add chrome-devtools --scope user npx chrome-devtools-mcp@latest\n```\n\n</details>\n\n<details>\n  <summary>Copilot CLI</summary>\n\nStart Copilot CLI:\n\n```\ncopilot\n```\n\nStart the dialog to add a new MCP server by running:\n\n```\n/mcp add\n```\n\nConfigure the following fields and press `CTRL+S` to save the configuration:\n\n- **Server name:** `chrome-devtools`\n- **Server Type:** `[1] Local`\n- **Command:** `npx -y chrome-devtools-mcp@latest`\n\n</details>\n\n<details>\n  <summary>Copilot / VS Code</summary>\n\n**Install as a Plugin (Recommended)**\n\nThe easiest way to get up and running is to install `chrome-devtools-mcp` as an agent plugin.\nThis bundles the **MCP server** and all **skills** together, so your agent gets both the tools\nand the expert guidance it needs to use them effectively.\n\n1.  Open the **Command Palette** (`Cmd+Shift+P` on macOS or `Ctrl+Shift+P` on Windows/Linux).\n2.  Search for and run the **Chat: Install Plugin From Source** command.\n3.  Paste in our repository name: `ChromeDevTools/chrome-devtools-mcp`.\n\nThat's it! Your agent is now supercharged with Chrome DevTools capabilities.\n\n---\n\n**Install as an MCP Server (MCP only)**\n\n**Click the button to install:**\n\n[<img src=\"https://img.shields.io/badge/VS_Code-VS_Code?style=flat-square&label=Install%20Server&color=0098FF\" alt=\"Install in VS Code\">](https://vscode.dev/redirect/mcp/install?name=io.github.ChromeDevTools%2Fchrome-devtools-mcp&config=%7B%22command%22%3A%22npx%22%2C%22args%22%3A%5B%22-y%22%2C%22chrome-devtools-mcp%22%5D%2C%22env%22%3A%7B%7D%7D)\n\n[<img src=\"https://img.shields.io/badge/VS_Code_Insiders-VS_Code_Insiders?style=flat-square&label=Install%20Server&color=24bfa5\" alt=\"Install in VS Code Insiders\">](https://insiders.vscode.dev/redirect?url=vscode-insiders%3Amcp%2Finstall%3F%257B%2522name%2522%253A%2522io.github.ChromeDevTools%252Fchrome-devtools-mcp%2522%252C%2522config%2522%253A%257B%2522command%2522%253A%2522npx%2522%252C%2522args%2522%253A%255B%2522-y%2522%252C%2522chrome-devtools-mcp%2522%255D%252C%2522env%2522%253A%257B%257D%257D%257D)\n\n**Or install manually:**\n\nFollow the VS Code [MCP configuration guide](https://code.visualstudio.com/docs/copilot/chat/mcp-servers#_add-an-mcp-server) using the standard config from above, or use the CLI:\n\nFor macOS and Linux:\n\n```bash\ncode --add-mcp '{\"name\":\"io.github.ChromeDevTools/chrome-devtools-mcp\",\"command\":\"npx\",\"args\":[\"-y\",\"chrome-devtools-mcp\"],\"env\":{}}'\n```\n\nFor Windows (PowerShell):\n\n```powershell\ncode --add-mcp '{\"\"\"name\"\"\":\"\"\"io.github.ChromeDevTools/chrome-devtools-mcp\"\"\",\"\"\"command\"\"\":\"\"\"npx\"\"\",\"\"\"args\"\"\":[\"\"\"-y\"\"\",\"\"\"chrome-devtools-mcp\"\"\"]}'\n```\n\n</details>\n\n<details>\n  <summary>Cursor</summary>\n\n**Click the button to install:**\n\n[<img src=\"https://cursor.com/deeplink/mcp-install-dark.svg\" alt=\"Install in Cursor\">](https://cursor.com/en/install-mcp?name=chrome-devtools&config=eyJjb21tYW5kIjoibnB4IC15IGNocm9tZS1kZXZ0b29scy1tY3BAbGF0ZXN0In0%3D)\n\n**Or install manually:**\n\nGo to `Cursor Settings` -> `MCP` -> `New MCP Server`. Use the config provided above.\n\n</details>\n\n<details>\n  <summary>Factory CLI</summary>\nUse the Factory CLI to add the Chrome DevTools MCP server (<a href=\"https://docs.factory.ai/cli/configuration/mcp\">guide</a>):\n\n```bash\ndroid mcp add chrome-devtools \"npx -y chrome-devtools-mcp@latest\"\n```\n\n</details>\n\n<details>\n  <summary>Gemini CLI</summary>\nInstall the Chrome DevTools MCP server using the Gemini CLI.\n\n**Project wide:**\n\n```bash\n# Either MCP only:\ngemini mcp add chrome-devtools npx chrome-devtools-mcp@latest\n# Or as a Gemini extension (MCP+Skills):\ngemini extensions install --auto-update https://github.com/ChromeDevTools/chrome-devtools-mcp\n```\n\n**Globally:**\n\n```bash\ngemini mcp add -s user chrome-devtools npx chrome-devtools-mcp@latest\n```\n\nAlternatively, follow the <a href=\"https://github.com/google-gemini/gemini-cli/blob/main/docs/tools/mcp-server.md#how-to-set-up-your-mcp-server\">MCP guide</a> and use the standard config from above.\n\n</details>\n\n<details>\n  <summary>Gemini Code Assist</summary>\n  Follow the <a href=\"https://cloud.google.com/gemini/docs/codeassist/use-agentic-chat-pair-programmer#configure-mcp-servers\">configure MCP guide</a>\n  using the standard config from above.\n</details>\n\n<details>\n  <summary>JetBrains AI Assistant & Junie</summary>\n\nGo to `Settings | Tools | AI Assistant | Model Context Protocol (MCP)` -> `Add`. Use the config provided above.\nThe same way chrome-devtools-mcp can be configured for JetBrains Junie in `Settings | Tools | Junie | MCP Settings` -> `Add`. Use the config provided above.\n\n</details>\n\n<details>\n  <summary>Kiro</summary>\n\nIn **Kiro Settings**, go to `Configure MCP` > `Open Workspace or User MCP Config` > Use the configuration snippet provided above.\n\nOr, from the IDE **Activity Bar** > `Kiro` > `MCP Servers` > `Click Open MCP Config`. Use the configuration snippet provided above.\n\n</details>\n\n<details>\n  <summary>Katalon Studio</summary>\n\nThe Chrome DevTools MCP server can be used with <a href=\"https://docs.katalon.com/katalon-studio/studioassist/mcp-servers/setting-up-chrome-devtools-mcp-server-for-studioassist\">Katalon StudioAssist</a> via an MCP proxy.\n\n**Step 1:** Install the MCP proxy by following the <a href=\"https://docs.katalon.com/katalon-studio/studioassist/mcp-servers/setting-up-mcp-proxy-for-stdio-mcp-servers\">MCP proxy setup guide</a>.\n\n**Step 2:** Start the Chrome DevTools MCP server with the proxy:\n\n```bash\nmcp-proxy --transport streamablehttp --port 8080 -- npx -y chrome-devtools-mcp@latest\n```\n\n**Note:** You may need to pick another port if 8080 is already in use.\n\n**Step 3:** In Katalon Studio, add the server to StudioAssist with the following settings:\n\n- **Connection URL:** `http://127.0.0.1:8080/mcp`\n- **Transport type:** `HTTP`\n\nOnce connected, the Chrome DevTools MCP tools will be available in StudioAssist.\n\n</details>\n\n<details>\n  <summary>Mistral Vibe</summary>\n\nAdd in ~/.vibe/config.toml:\n\n```toml\n[[mcp_servers]]\nname = \"chrome-devtools\"\ntransport = \"stdio\"\ncommand = \"npx\"\nargs = [\"chrome-devtools-mcp@latest\"]\n```\n\n</details>\n\n<details>\n  <summary>OpenCode</summary>\n\nAdd the following configuration to your `opencode.json` file. If you don't have one, create it at `~/.config/opencode/opencode.json` (<a href=\"https://opencode.ai/docs/mcp-servers\">guide</a>):\n\n```json\n{\n  \"$schema\": \"https://opencode.ai/config.json\",\n  \"mcp\": {\n    \"chrome-devtools\": {\n      \"type\": \"local\",\n      \"command\": [\"npx\", \"-y\", \"chrome-devtools-mcp@latest\"]\n    }\n  }\n}\n```\n\n</details>\n\n<details>\n  <summary>Qoder</summary>\n\nIn **Qoder Settings**, go to `MCP Server` > `+ Add` > Use the configuration snippet provided above.\n\nAlternatively, follow the <a href=\"https://docs.qoder.com/user-guide/chat/model-context-protocol\">MCP guide</a> and use the standard config from above.\n\n</details>\n\n<details>\n  <summary>Qoder CLI</summary>\n\nInstall the Chrome DevTools MCP server using the Qoder CLI (<a href=\"https://docs.qoder.com/cli/using-cli#mcp-servers\">guide</a>):\n\n**Project wide:**\n\n```bash\nqodercli mcp add chrome-devtools -- npx chrome-devtools-mcp@latest\n```\n\n**Globally:**\n\n```bash\nqodercli mcp add -s user chrome-devtools -- npx chrome-devtools-mcp@latest\n```\n\n</details>\n\n<details>\n  <summary>Visual Studio</summary>\n\n**Click the button to install:**\n\n[<img src=\"https://img.shields.io/badge/Visual_Studio-Install-C16FDE?logo=visualstudio&logoColor=white\" alt=\"Install in Visual Studio\">](https://vs-open.link/mcp-install?%7B%22name%22%3A%22chrome-devtools%22%2C%22command%22%3A%22npx%22%2C%22args%22%3A%5B%22chrome-devtools-mcp%40latest%22%5D%7D)\n\n</details>\n\n<details>\n  <summary>Warp</summary>\n\nGo to `Settings | AI | Manage MCP Servers` -> `+ Add` to [add an MCP Server](https://docs.warp.dev/knowledge-and-collaboration/mcp#adding-an-mcp-server). Use the config provided above.\n\n</details>\n\n<details>\n  <summary>Windsurf</summary>\n  Follow the <a href=\"https://docs.windsurf.com/windsurf/cascade/mcp#mcp-config-json\">configure MCP guide</a>\n  using the standard config from above.\n</details>\n\n### Your first prompt\n\nEnter the following prompt in your MCP Client to check if everything is working:\n\n```\nCheck the performance of https://developers.chrome.com\n```\n\nYour MCP client should open the browser and record a performance trace.\n\n> [!NOTE]\n> The MCP server will start the browser automatically once the MCP client uses a tool that requires a running browser instance. Connecting to the Chrome DevTools MCP server on its own will not automatically start the browser.\n\n## Tools\n\nIf you run into any issues, checkout our [troubleshooting guide](./docs/troubleshooting.md).\n\n<!-- BEGIN AUTO GENERATED TOOLS -->\n\n- **Input automation** (10 tools)\n  - [`click`](docs/tool-reference.md#click)\n  - [`drag`](docs/tool-reference.md#drag)\n  - [`fill`](docs/tool-reference.md#fill)\n  - [`fill_form`](docs/tool-reference.md#fill_form)\n  - [`handle_dialog`](docs/tool-reference.md#handle_dialog)\n  - [`hover`](docs/tool-reference.md#hover)\n  - [`press_key`](docs/tool-reference.md#press_key)\n  - [`type_text`](docs/tool-reference.md#type_text)\n  - [`upload_file`](docs/tool-reference.md#upload_file)\n  - [`click_at`](docs/tool-reference.md#click_at)\n- **Navigation automation** (6 tools)\n  - [`close_page`](docs/tool-reference.md#close_page)\n  - [`list_pages`](docs/tool-reference.md#list_pages)\n  - [`navigate_page`](docs/tool-reference.md#navigate_page)\n  - [`new_page`](docs/tool-reference.md#new_page)\n  - [`select_page`](docs/tool-reference.md#select_page)\n  - [`wait_for`](docs/tool-reference.md#wait_for)\n- **Emulation** (2 tools)\n  - [`emulate`](docs/tool-reference.md#emulate)\n  - [`resize_page`](docs/tool-reference.md#resize_page)\n- **Performance** (3 tools)\n  - [`performance_analyze_insight`](docs/tool-reference.md#performance_analyze_insight)\n  - [`performance_start_trace`](docs/tool-reference.md#performance_start_trace)\n  - [`performance_stop_trace`](docs/tool-reference.md#performance_stop_trace)\n- **Network** (2 tools)\n  - [`get_network_request`](docs/tool-reference.md#get_network_request)\n  - [`list_network_requests`](docs/tool-reference.md#list_network_requests)\n- **Debugging** (8 tools)\n  - [`evaluate_script`](docs/tool-reference.md#evaluate_script)\n  - [`get_console_message`](docs/tool-reference.md#get_console_message)\n  - [`lighthouse_audit`](docs/tool-reference.md#lighthouse_audit)\n  - [`list_console_messages`](docs/tool-reference.md#list_console_messages)\n  - [`take_screenshot`](docs/tool-reference.md#take_screenshot)\n  - [`take_snapshot`](docs/tool-reference.md#take_snapshot)\n  - [`screencast_start`](docs/tool-reference.md#screencast_start)\n  - [`screencast_stop`](docs/tool-reference.md#screencast_stop)\n- **Memory** (5 tools)\n  - [`take_heapsnapshot`](docs/tool-reference.md#take_heapsnapshot)\n  - [`get_heapsnapshot_class_nodes`](docs/tool-reference.md#get_heapsnapshot_class_nodes)\n  - [`get_heapsnapshot_details`](docs/tool-reference.md#get_heapsnapshot_details)\n  - [`get_heapsnapshot_retainers`](docs/tool-reference.md#get_heapsnapshot_retainers)\n  - [`get_heapsnapshot_summary`](docs/tool-reference.md#get_heapsnapshot_summary)\n- **Extensions** (5 tools)\n  - [`install_extension`](docs/tool-reference.md#install_extension)\n  - [`list_extensions`](docs/tool-reference.md#list_extensions)\n  - [`reload_extension`](docs/tool-reference.md#reload_extension)\n  - [`trigger_extension_action`](docs/tool-reference.md#trigger_extension_action)\n  - [`uninstall_extension`](docs/tool-reference.md#uninstall_extension)\n- **Third-party** (2 tools)\n  - [`execute_3p_developer_tool`](docs/tool-reference.md#execute_3p_developer_tool)\n  - [`list_3p_developer_tools`](docs/tool-reference.md#list_3p_developer_tools)\n- **WebMCP** (2 tools)\n  - [`execute_webmcp_tool`](docs/tool-reference.md#execute_webmcp_tool)\n  - [`list_webmcp_tools`](docs/tool-reference.md#list_webmcp_tools)\n\n<!-- END AUTO GENERATED TOOLS -->\n\n## Configuration\n\nThe Chrome DevTools MCP server supports the following configuration option:\n\n<!-- BEGIN AUTO GENERATED OPTIONS -->\n\n- **`--autoConnect`/ `--auto-connect`**\n  If specified, automatically connects to a browser (Chrome 144+) running locally from the user data directory identified by the channel param (default channel is stable). Requires the remote debugging server to be started in the Chrome instance via chrome://inspect/#remote-debugging.\n  - **Type:** boolean\n  - **Default:** `false`\n\n- **`--browserUrl`/ `--browser-url`, `-u`**\n  Connect to a running, debuggable Chrome instance (e.g. `http://127.0.0.1:9222`). For more details see: https://github.com/ChromeDevTools/chrome-devtools-mcp#connecting-to-a-running-chrome-instance.\n  - **Type:** string\n\n- **`--wsEndpoint`/ `--ws-endpoint`, `-w`**\n  WebSocket endpoint to connect to a running Chrome instance (e.g., ws://127.0.0.1:9222/devtools/browser/<id>). Alternative to --browserUrl.\n  - **Type:** string\n\n- **`--wsHeaders`/ `--ws-headers`**\n  Custom headers for WebSocket connection in JSON format (e.g., '{\"Authorization\":\"Bearer token\"}'). Only works with --wsEndpoint.\n  - **Type:** string\n\n- **`--headless`**\n  Whether to run in headless (no UI) mode.\n  - **Type:** boolean\n  - **Default:** `false`\n\n- **`--executablePath`/ `--executable-path`, `-e`**\n  Path to custom Chrome executable.\n  - **Type:** string\n\n- **`--isolated`**\n  If specified, creates a temporary user-data-dir that is automatically cleaned up after the browser is closed. Defaults to false.\n  - **Type:** boolean\n\n- **`--userDataDir`/ `--user-data-dir`**\n  Path to the user data directory for Chrome. Default is $HOME/.cache/chrome-devtools-mcp/chrome-profile$CHANNEL_SUFFIX_IF_NON_STABLE\n  - **Type:** string\n\n- **`--channel`**\n  Specify a different Chrome channel that should be used. The default is the stable channel version.\n  - **Type:** string\n  - **Choices:** `canary`, `dev`, `beta`, `stable`\n\n- **`--logFile`/ `--log-file`**\n  Path to a file to write debug logs to. Set the env variable `DEBUG` to `*` to enable verbose logs. Useful for submitting bug reports.\n  - **Type:** string\n\n- **`--viewport`**\n  Initial viewport size for the Chrome instances started by the server. For example, `1280x720`. In headless mode, max size is 3840x2160px.\n  - **Type:** string\n\n- **`--proxyServer`/ `--proxy-server`**\n  Proxy server configuration for Chrome passed as --proxy-server when launching the browser. See https://www.chromium.org/developers/design-documents/network-settings/ for details.\n  - **Type:** string\n\n- **`--acceptInsecureCerts`/ `--accept-insecure-certs`**\n  If enabled, ignores errors relative to self-signed and expired certificates. Use with caution.\n  - **Type:** boolean\n\n- **`--experimentalPageIdRouting`/ `--experimental-page-id-routing`**\n  Whether to expose pageId on page-scoped tools and route requests by page ID (useful for concurrent agent sessions).\n  - **Type:** boolean\n\n- **`--experimentalDevtools`/ `--experimental-devtools`**\n  Whether to enable automation over DevTools targets\n  - **Type:** boolean\n\n- **`--experimentalVision`/ `--experimental-vision`**\n  Whether to enable coordinate-based tools such as click_at(x,y). Usually requires a computer-use model able to produce accurate coordinates by looking at screenshots.\n  - **Type:** boolean\n\n- **`--experimentalMemory`/ `--experimental-memory`**\n  Whether to enable experimental memory tools.\n  - **Type:** boolean\n\n- **`--experimentalStructuredContent`/ `--experimental-structured-content`**\n  Whether to output structured formatted content.\n  - **Type:** boolean\n\n- **`--experimentalIncludeAllPages`/ `--experimental-include-all-pages`**\n  Whether to include all kinds of pages such as webviews or background pages as pages.\n  - **Type:** boolean\n\n- **`--experimentalScreencast`/ `--experimental-screencast`**\n  Exposes experimental screencast tools (requires ffmpeg). Install ffmpeg https://www.ffmpeg.org/download.html and ensure it is available in the MCP server PATH.\n  - **Type:** boolean\n\n- **`--experimentalFfmpegPath`/ `--experimental-ffmpeg-path`**\n  Path to ffmpeg executable for screencast recording.\n  - **Type:** string\n\n- **`--categoryExperimentalWebmcp`/ `--category-experimental-webmcp`**\n  Set to true to enable debugging WebMCP tools. Requires Chrome 149+ with the following flags: `--enable-features=WebMCPTesting,DevToolsWebMCPSupport`\n  - **Type:** boolean\n\n- **`--chromeArg`/ `--chrome-arg`**\n  Additional arguments for Chrome. Only applies when Chrome is launched by chrome-devtools-mcp.\n  - **Type:** array\n\n- **`--ignoreDefaultChromeArg`/ `--ignore-default-chrome-arg`**\n  Explicitly disable default arguments for Chrome. Only applies when Chrome is launched by chrome-devtools-mcp.\n  - **Type:** array\n\n- **`--categoryEmulation`/ `--category-emulation`**\n  Set to false to exclude tools related to emulation.\n  - **Type:** boolean\n  - **Default:** `true`\n\n- **`--categoryPerformance`/ `--category-performance`**\n  Set to false to exclude tools related to performance.\n  - **Type:** boolean\n  - **Default:** `true`\n\n- **`--categoryNetwork`/ `--category-network`**\n  Set to false to exclude tools related to network.\n  - **Type:** boolean\n  - **Default:** `true`\n\n- **`--categoryExtensions`/ `--category-extensions`**\n  Set to true to include tools related to extensions. Note: This feature is currently only supported with a pipe connection. autoConnect, browserUrl, and wsEndpoint are not supported with this feature until 149 will be released.\n  - **Type:** boolean\n  - **Default:** `false`\n\n- **`--categoryExperimentalThirdParty`/ `--category-experimental-third-party`**\n  Set to true to enable third-party developer tools exposed by the inspected page itself\n  - **Type:** boolean\n  - **Default:** `false`\n\n- **`--performanceCrux`/ `--performance-crux`**\n  Set to false to disable sending URLs from performance traces to CrUX API to get field performance data.\n  - **Type:** boolean\n  - **Default:** `true`\n\n- **`--usageStatistics`/ `--usage-statistics`**\n  Set to false to opt-out of usage statistics collection. Google collects usage data to improve the tool, handled under the Google Privacy Policy (https://policies.google.com/privacy). This is independent from Chrome browser metrics. Disabled if `CHROME_DEVTOOLS_MCP_NO_USAGE_STATISTICS` or `CI` env variables are set.\n  - **Type:** boolean\n  - **Default:** `true`\n\n- **`--slim`**\n  Exposes a \"slim\" set of 3 tools covering navigation, script execution and screenshots only. Useful for basic browser tasks.\n  - **Type:** boolean\n\n- **`--redactNetworkHeaders`/ `--redact-network-headers`**\n  If true, redacts some of the network headers considered sensitive before returning to the client.\n  - **Type:** boolean\n  - **Default:** `false`\n\n<!-- END AUTO GENERATED OPTIONS -->\n\nPass them via the `args` property in the JSON configuration. For example:\n\n```json\n{\n  \"mcpServers\": {\n    \"chrome-devtools\": {\n      \"command\": \"npx\",\n      \"args\": [\n        \"chrome-devtools-mcp@latest\",\n        \"--channel=canary\",\n        \"--headless=true\",\n        \"--isolated=true\"\n      ]\n    }\n  }\n}\n```\n\n### Connecting via WebSocket with custom headers\n\nYou can connect directly to a Chrome WebSocket endpoint and include custom headers (e.g., for authentication):\n\n```json\n{\n  \"mcpServers\": {\n    \"chrome-devtools\": {\n      \"command\": \"npx\",\n      \"args\": [\n        \"chrome-devtools-mcp@latest\",\n        \"--wsEndpoint=ws://127.0.0.1:9222/devtools/browser/<id>\",\n        \"--wsHeaders={\\\"Authorization\\\":\\\"Bearer YOUR_TOKEN\\\"}\"\n      ]\n    }\n  }\n}\n```\n\nTo get the WebSocket endpoint from a running Chrome instance, visit `http://127.0.0.1:9222/json/version` and look for the `webSocketDebuggerUrl` field.\n\nYou can also run `npx chrome-devtools-mcp@latest --help` to see all available configuration options.\n\n## Concepts\n\n### Concurrent sessions\n\nMost MCP clients start one Chrome DevTools MCP server per conversation. If your\nclient shares a single server instance across concurrent agents or subagents,\nstart the server with `--experimentalPageIdRouting`. This exposes `pageId` on\npage-scoped tools so each agent can route tool calls to the tab it is working\nwith.\n\n```json\n{\n  \"mcpServers\": {\n    \"chrome-devtools\": {\n      \"command\": \"npx\",\n      \"args\": [\n        \"-y\",\n        \"chrome-devtools-mcp@latest\",\n        \"--experimentalPageIdRouting\"\n      ]\n    }\n  }\n}\n```\n\nIf you run multiple independent MCP client sessions and want each session to\nlaunch its own temporary Chrome profile, also pass `--isolated`. This avoids\nsharing the default Chrome DevTools MCP user data directory between those\nserver instances.\n\n### User data directory\n\n`chrome-devtools-mcp` starts a Chrome's stable channel instance using the following user\ndata directory:\n\n- Linux / macOS: `$HOME/.cache/chrome-devtools-mcp/chrome-profile-$CHANNEL`\n- Windows: `%HOMEPATH%/.cache/chrome-devtools-mcp/chrome-profile-$CHANNEL`\n\nThe user data directory is not cleared between runs and shared across\nall instances of `chrome-devtools-mcp`. Set the `isolated` option to `true`\nto use a temporary user data dir instead which will be cleared automatically after\nthe browser is closed.\n\n### Connecting to a running Chrome instance\n\nBy default, the Chrome DevTools MCP server will start a new Chrome instance with a dedicated profile. This might not be ideal in all situations:\n\n- If you would like to maintain the same application state when alternating between manual site testing and agent-driven testing.\n- When the MCP needs to sign into a website. Some accounts may prevent sign-in when the browser is controlled via WebDriver (the default launch mechanism for the Chrome DevTools MCP server).\n- If you're running your LLM inside a sandboxed environment, but you would like to connect to a Chrome instance that runs outside the sandbox.\n\nIn these cases, start Chrome first and let the Chrome DevTools MCP server connect to it. There are two ways to do so:\n\n- **Automatic connection (available in Chrome 144)**: best for sharing state between manual and agent-driven testing.\n- **Manual connection via remote debugging port**: best when running inside a sandboxed environment.\n\n#### Automatically connecting to a running Chrome instance\n\n**Step 1:** Set up remote debugging in Chrome\n\nIn Chrome (\\>= M144), do the following to set up remote debugging:\n\n1.  Navigate to `chrome://inspect/#remote-debugging` to enable remote debugging.\n2.  Follow the dialog UI to allow or disallow incoming debugging connections.\n\n**Step 2:** Configure Chrome DevTools MCP server to automatically connect to a running Chrome Instance\n\nTo connect the `chrome-devtools-mcp` server to the running Chrome instance, use\n`--autoConnect` command line argument for the MCP server.\n\nThe following code snippet is an example configuration for gemini-cli:\n\n```json\n{\n  \"mcpServers\": {\n    \"chrome-devtools\": {\n      \"command\": \"npx\",\n      \"args\": [\"chrome-devtools-mcp@latest\", \"--autoConnect\"]\n    }\n  }\n}\n```\n\n**Step 3:** Test your setup\n\nMake sure your browser is running. Open gemini-cli and run the following prompt:\n\n```none\nCheck the performance of https://developers.chrome.com\n```\n\n> [!NOTE]\n> The <code>autoConnect</code> option requires the user to start Chrome. If the user has multiple active profiles, the MCP server will connect to the default profile (as determined by Chrome). The MCP server has access to all open windows for the selected profile.\n\nThe Chrome DevTools MCP server will try to connect to your running Chrome\ninstance. It shows a dialog asking for user permission.\n\nClicking **Allow** results in the Chrome DevTools MCP server opening\n[developers.chrome.com](http://developers.chrome.com) and taking a performance\ntrace.\n\n#### Manual connection using port forwarding\n\nYou can connect to a running Chrome instance by using the `--browser-url` option. This is useful if you are running the MCP server in a sandboxed environment that does not allow starting a new Chrome instance.\n\nHere is a step-by-step guide on how to connect to a running Chrome instance:\n\n**Step 1: Configure the MCP client**\n\nAdd the `--browser-url` option to your MCP client configuration. The value of this option should be the URL of the running Chrome instance. `http://127.0.0.1:9222` is a common default.\n\n```json\n{\n  \"mcpServers\": {\n    \"chrome-devtools\": {\n      \"command\": \"npx\",\n      \"args\": [\n        \"chrome-devtools-mcp@latest\",\n        \"--browser-url=http://127.0.0.1:9222\"\n      ]\n    }\n  }\n}\n```\n\n**Step 2: Start the Chrome browser**\n\n> [!WARNING]\n> Enabling the remote debugging port opens up a debugging port on the running browser instance. Any application on your machine can connect to this port and control the browser. Make sure that you are not browsing any sensitive websites while the debugging port is open.\n\nStart the Chrome browser with the remote debugging port enabled. Make sure to close any running Chrome instances before starting a new one with the debugging port enabled. The port number you choose must be the same as the one you specified in the `--browser-url` option in your MCP client configuration.\n\nFor security reasons, [Chrome requires you to use a non-default user data directory](https://developer.chrome.com/blog/remote-debugging-port) when enabling the remote debugging port. You can specify a custom directory using the `--user-data-dir` flag. This ensures that your regular browsing profile and data are not exposed to the debugging session.\n\n**macOS**\n\n```bash\n/Applications/Google\\ Chrome.app/Contents/MacOS/Google\\ Chrome --remote-debugging-port=9222 --user-data-dir=/tmp/chrome-profile-stable\n```\n\n**Linux**\n\n```bash\n/usr/bin/google-chrome --remote-debugging-port=9222 --user-data-dir=/tmp/chrome-profile-stable\n```\n\n**Windows**\n\n```bash\n\"C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe\" --remote-debugging-port=9222 --user-data-dir=\"%TEMP%\\chrome-profile-stable\"\n```\n\n**Step 3: Test your setup**\n\nAfter configuring the MCP client and starting the Chrome browser, you can test your setup by running a simple prompt in your MCP client:\n\n```\nCheck the performance of https://developers.chrome.com\n```\n\nYour MCP client should connect to the running Chrome instance and receive a performance report.\n\nIf you hit VM-to-host port forwarding issues, see the “Remote debugging between virtual machine (VM) and host fails” section in [`docs/troubleshooting.md`](./docs/troubleshooting.md#remote-debugging-between-virtual-machine-vm-and-host-fails).\n\nFor more details on remote debugging, see the [Chrome DevTools documentation](https://developer.chrome.com/docs/devtools/remote-debugging/).\n\n### Debugging Chrome on Android\n\nPlease consult [these instructions](./docs/debugging-android.md).\n\n## Known limitations\n\nSee [Troubleshooting](./docs/troubleshooting.md).\n","summary":"The `chrome-devtools-mcp` project acts as a Model-Context-Protocol server that enables AI coding agents to control and inspect live Google Chrome instances. By leveraging Puppeteer and the Chrome DevTools protocol, it provides agents with advanced capabilities for reliable browser automation, network request analysis, and performance tracing. This tool is ideal for developers and AI enthusiasts who want to integrate sophisticated debugging and automated testing workflows directly into their AI-assisted coding environments.","description":"Chrome DevTools for coding agents","stars":42607,"language":"TypeScript"},{"owner":"rohitg00","repo":"ai-engineering-from-scratch","url":"https://github.com/rohitg00/ai-engineering-from-scratch","readme":"<p align=\"center\">\n  <img src=\"assets/banner.svg\" alt=\"AI Engineering from Scratch — reference manual banner\" width=\"100%\">\n</p>\n\n<p align=\"center\">\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/badge/license-MIT-1a1a1a?style=flat-square&labelColor=fafaf5\" alt=\"MIT License\"></a>\n  <a href=\"ROADMAP.md\"><img src=\"https://img.shields.io/badge/lessons-503-3553ff?style=flat-square&labelColor=fafaf5\" alt=\"503 lessons\"></a>\n  <a href=\"#contents\"><img src=\"https://img.shields.io/badge/phases-20-3553ff?style=flat-square&labelColor=fafaf5\" alt=\"20 phases\"></a>\n  <a href=\"https://github.com/rohitg00/ai-engineering-from-scratch/stargazers\"><img src=\"https://img.shields.io/github/stars/rohitg00/ai-engineering-from-scratch?style=flat-square&labelColor=fafaf5&color=3553ff\" alt=\"GitHub stars\"></a>\n  <a href=\"https://aiengineeringfromscratch.com\"><img src=\"https://img.shields.io/badge/web-aiengineeringfromscratch.com-3553ff?style=flat-square&labelColor=fafaf5\" alt=\"Website\"></a>\n</p>\n\n```\n░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒\n```\n\n> **84% of students already use AI tools. Only 18% feel prepared to use them\n> professionally.** This curriculum closes that gap.\n>\n> 503 lessons. 20 phases. ~320 hours. Python, TypeScript, Rust, Julia. Every lesson ships\n> a reusable artifact: a prompt, a skill, an agent, an MCP server. Free, open source, MIT.\n>\n> You don't just learn AI. You build it. End-to-end. By hand.\n\n## How this works\n\nMost AI material teaches in scattered pieces. A paper here, a fine-tuning post there, a\nflashy agent demo somewhere else. The pieces rarely line up. You ship a chatbot but can't\nexplain its loss curve. You hook a function to an agent but can't say what attention does\ninside the model that's calling it.\n\nThis curriculum is the spine. 20 phases, 503 lessons, four languages: Python, TypeScript,\nRust, Julia. Linear algebra at one end, autonomous swarms at the other. Every algorithm\ngets built from raw math first. Backprop. Tokenizer. Attention. Agent loop. By the time\nPyTorch shows up, you already know what it's doing under the hood.\n\nEach lesson runs the same loop: read the problem, derive the math, write the code, run\nthe test, keep the artifact. No five-minute videos, no copy-paste deploys, no hand-holding.\nFree, open source, and built to run on your own laptop.\n\n```\n░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒\n```\n\n## The shape of the curriculum\n\nTwenty phases stack on top of each other. Math is the floor. Agents and production are the roof.\nSkip ahead if you already know the lower layers, but don't skip and then wonder why something at\nthe top is breaking.\n\n```mermaid\n%%{init: {'theme':'base','themeVariables':{'primaryColor':'#fafaf5','primaryTextColor':'#1a1a1a','primaryBorderColor':'#3553ff','lineColor':'#3553ff','fontFamily':'JetBrains Mono','fontSize':'12px'}}}%%\nflowchart TB\n  P0[\"Phase 0 — Setup &amp; Tooling\"] --> P1[\"Phase 1 — Math Foundations\"]\n  P1 --> P2[\"Phase 2 — ML Fundamentals\"]\n  P2 --> P3[\"Phase 3 — Deep Learning Core\"]\n  P3 --> P4[\"Phase 4 — Vision\"]\n  P3 --> P5[\"Phase 5 — NLP\"]\n  P3 --> P6[\"Phase 6 — Speech &amp; Audio\"]\n  P3 --> P9[\"Phase 9 — RL\"]\n  P5 --> P7[\"Phase 7 — Transformers\"]\n  P7 --> P8[\"Phase 8 — GenAI\"]\n  P7 --> P10[\"Phase 10 — LLMs from Scratch\"]\n  P10 --> P11[\"Phase 11 — LLM Engineering\"]\n  P10 --> P12[\"Phase 12 — Multimodal\"]\n  P11 --> P13[\"Phase 13 — Tools &amp; Protocols\"]\n  P13 --> P14[\"Phase 14 — Agent Engineering\"]\n  P14 --> P15[\"Phase 15 — Autonomous Systems\"]\n  P15 --> P16[\"Phase 16 — Multi-Agent &amp; Swarms\"]\n  P14 --> P17[\"Phase 17 — Infrastructure &amp; Production\"]\n  P15 --> P18[\"Phase 18 — Ethics &amp; Alignment\"]\n  P16 --> P19[\"Phase 19 — Capstone Projects\"]\n  P17 --> P19\n  P18 --> P19\n```\n\n```\n░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒\n```\n\n## The shape of a lesson\n\nEach lesson lives in its own folder, with the same structure across the entire curriculum:\n\n```\nphases/<NN>-<phase-name>/<NN>-<lesson-name>/\n├── code/      runnable implementations (Python, TypeScript, Rust, Julia)\n├── docs/\n│   └── en.md  lesson narrative\n└── outputs/   prompts, skills, agents, or MCP servers this lesson produces\n```\n\nEvery lesson follows six beats. The *Build It / Use It* split is the spine — you implement the\nalgorithm from scratch first, then run the same thing through the production library. You\nunderstand what the framework is doing because you wrote the smaller version yourself.\n\n```mermaid\n%%{init: {'theme':'base','themeVariables':{'primaryColor':'#fafaf5','primaryTextColor':'#1a1a1a','primaryBorderColor':'#3553ff','lineColor':'#3553ff','fontFamily':'JetBrains Mono','fontSize':'13px'}}}%%\nflowchart LR\n  M[\"MOTTO<br/><sub>one-line core idea</sub>\"] --> Pr[\"PROBLEM<br/><sub>concrete pain</sub>\"]\n  Pr --> C[\"CONCEPT<br/><sub>diagrams &amp; intuition</sub>\"]\n  C --> B[\"BUILD IT<br/><sub>raw math, no frameworks</sub>\"]\n  B --> U[\"USE IT<br/><sub>same thing in PyTorch / sklearn</sub>\"]\n  U --> S[\"SHIP IT<br/><sub>prompt · skill · agent · MCP</sub>\"]\n```\n\n## Getting started\n\nThree ways in. Pick one.\n\n**Option A — read.** Open any completed lesson on\n[aiengineeringfromscratch.com](https://aiengineeringfromscratch.com) or expand a phase under\n[Contents](#contents). No setup, no cloning.\n\n**Option B — clone and run.**\n\n```bash\ngit clone https://github.com/rohitg00/ai-engineering-from-scratch.git\ncd ai-engineering-from-scratch\npython phases/01-math-foundations/01-linear-algebra-intuition/code/vectors.py\n```\n\n**Option C — find your level *(recommended)*.** Skip ahead intelligently. Inside Claude, Cursor, Codex, OpenClaw, Hermes, or any agent with the curriculum skills installed:\n\n```bash\n/find-your-level\n```\n\nTen questions. Maps your knowledge to a starting phase, builds a personalized path with hour\nestimates. After each phase:\n\n```bash\n/check-understanding 3        # quiz yourself on phase 3\nls phases/03-deep-learning-core/05-loss-functions/outputs/\n# ├── prompt-loss-function-selector.md\n# └── prompt-loss-debugger.md\n```\n\n### Prerequisites\n\n- You can write code (any language; Python helps).\n- You want to understand how AI **actually works**, not just call APIs.\n\n### Built-in agent skills (Claude, Cursor, Codex, OpenClaw, Hermes)\n\n| Skill | What it does |\n|---|---|\n| [`/find-your-level`](.claude/skills/find-your-level/SKILL.md) | Ten-question placement quiz. Maps your knowledge to a starting phase and produces a personalized path with hour estimates. |\n| [`/check-understanding <phase>`](.claude/skills/check-understanding/SKILL.md) | Per-phase quiz, eight questions, with feedback and specific lessons to review. |\n\n```\n░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒\n```\n\n## Every lesson ships something\n\nOther curricula end with *\"congratulations, you learned X.\"* Each lesson here ends with a\n**reusable tool** you can install or paste into your daily workflow.\n\n<table>\n<tr>\n<th align=\"left\" width=\"25%\"><img src=\"site/assets/figures/001-a-prompts.svg\" width=\"96\" height=\"96\" alt=\"FIG_001.A prompts\"/><br/><sub>FIG_001 · A</sub><br/><b>PROMPTS</b></th>\n<th align=\"left\" width=\"25%\"><img src=\"site/assets/figures/001-b-skills.svg\" width=\"96\" height=\"96\" alt=\"FIG_001.B skills\"/><br/><sub>FIG_001 · B</sub><br/><b>SKILLS</b></th>\n<th align=\"left\" width=\"25%\"><img src=\"site/assets/figures/001-c-agents.svg\" width=\"96\" height=\"96\" alt=\"FIG_001.C agents\"/><br/><sub>FIG_001 · C</sub><br/><b>AGENTS</b></th>\n<th align=\"left\" width=\"25%\"><img src=\"site/assets/figures/001-d-mcp-servers.svg\" width=\"96\" height=\"96\" alt=\"FIG_001.D MCP servers\"/><br/><sub>FIG_001 · D</sub><br/><b>MCP SERVERS</b></th>\n</tr>\n<tr>\n<td valign=\"top\">Paste into any AI assistant for expert-level help on a narrow task.</td>\n<td valign=\"top\">Drop into Claude, Cursor, Codex, OpenClaw, Hermes, or any agent that reads <code>SKILL.md</code>.</td>\n<td valign=\"top\">Deploy as autonomous workers — you wrote the loop yourself in Phase 14.</td>\n<td valign=\"top\">Plug into any MCP-compatible client. Built end-to-end in Phase 13.</td>\n</tr>\n</table>\n\n> Install the lot with `python3 scripts/install_skills.py`. Real tools, not homework.\n> By the end of the curriculum, you have a portfolio of 503 artifacts you actually\n> understand because you built them.\n\n### FIG_002 · A worked sample\n\nPhase 14, lesson 1: the agent loop. ~120 lines of pure Python, no dependencies.\n\n<table>\n<tr>\n<td valign=\"top\" width=\"50%\">\n\n**`code/agent_loop.py`** &nbsp; <sub><i>build it</i></sub>\n\n```python\ndef run(query, tools):\n    history = [user(query)]\n    for step in range(MAX_STEPS):\n        msg = llm(history)\n        if msg.tool_calls:\n            for call in msg.tool_calls:\n                result = tools[call.name](**call.args)\n                history.append(tool_result(call.id, result))\n            continue\n        return msg.content\n    raise StepLimitExceeded\n```\n\n</td>\n<td valign=\"top\" width=\"50%\">\n\n**`outputs/skill-agent-loop.md`** &nbsp; <sub><i>ship it</i></sub>\n\n```markdown\n---\nname: agent-loop\ndescription: ReAct-style loop for any tool list\nphase: 14\nlesson: 01\n---\n\nImplement a minimal agent loop that...\n```\n\n**`outputs/prompt-debug-agent.md`**\n\n```markdown\nYou are an agent debugger. Given the trace\nof an agent run, identify the step where\nthe agent went wrong and explain why...\n```\n\n</td>\n</tr>\n</table>\n\n```\n░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒\n```\n\n<a id=\"contents\"></a>\n\n## Contents\n\nTwenty phases. Click any phase to expand its lesson list.\n\n<a id=\"phase-0\"></a>\n### Phase 0: Setup & Tooling `12 lessons`\n> Get your environment ready for everything that follows.\n\n| # | Lesson | Type | Lang |\n|:---:|--------|:----:|------|\n| 01 | [Dev Environment](phases/00-setup-and-tooling/01-dev-environment/) | Build | Python |\n| 02 | [Git & Collaboration](phases/00-setup-and-tooling/02-git-and-collaboration/) | Learn | — |\n| 03 | [GPU Setup & Cloud](phases/00-setup-and-tooling/03-gpu-setup-and-cloud/) | Build | Python |\n| 04 | [APIs & Keys](phases/00-setup-and-tooling/04-apis-and-keys/) | Build | Python |\n| 05 | [Jupyter Notebooks](phases/00-setup-and-tooling/05-jupyter-notebooks/) | Build | Python |\n| 06 | [Python Environments](phases/00-setup-and-tooling/06-python-environments/) | Build | Shell |\n| 07 | [Docker for AI](phases/00-setup-and-tooling/07-docker-for-ai/) | Build | Docker |\n| 08 | [Editor Setup](phases/00-setup-and-tooling/08-editor-setup/) | Build | — |\n| 09 | [Data Management](phases/00-setup-and-tooling/09-data-management/) | Build | Python |\n| 10 | [Terminal & Shell](phases/00-setup-and-tooling/10-terminal-and-shell/) | Learn | — |\n| 11 | [Linux for AI](phases/00-setup-and-tooling/11-linux-for-ai/) | Learn | — |\n| 12 | [Debugging & Profiling](phases/00-setup-and-tooling/12-debugging-and-profiling/) | Build | Python |\n\n<details id=\"phase-1\">\n<summary><b>Phase 1 — Math Foundations</b> &nbsp;<code>22 lessons</code>&nbsp; <em>The intuition behind every AI algorithm, through code.</em></summary>\n<br/>\n\n| # | Lesson | Type | Lang |\n|:---:|--------|:----:|------|\n| 01 | [Linear Algebra Intuition](phases/01-math-foundations/01-linear-algebra-intuition/) | Learn | Python, Julia |\n| 02 | [Vectors, Matrices & Operations](phases/01-math-foundations/02-vectors-matrices-operations/) | Build | Python, Julia |\n| 03 | [Matrix Transformations & Eigenvalues](phases/01-math-foundations/03-matrix-transformations/) | Build | Python, Julia |\n| 04 | [Calculus for ML: Derivatives & Gradients](phases/01-math-foundations/04-calculus-for-ml/) | Learn | Python |\n| 05 | [Chain Rule & Automatic Differentiation](phases/01-math-foundations/05-chain-rule-and-autodiff/) | Build | Python |\n| 06 | [Probability & Distributions](phases/01-math-foundations/06-probability-and-distributions/) | Learn | Python |\n| 07 | [Bayes' Theorem & Statistical Thinking](phases/01-math-foundations/07-bayes-theorem/) | Build | Python |\n| 08 | [Optimization: Gradient Descent Family](phases/01-math-foundations/08-optimization/) | Build | Python |\n| 09 | [Information Theory: Entropy, KL Divergence](phases/01-math-foundations/09-information-theory/) | Learn | Python |\n| 10 | [Dimensionality Reduction: PCA, t-SNE, UMAP](phases/01-math-foundations/10-dimensionality-reduction/) | Build | Python |\n| 11 | [Singular Value Decomposition](phases/01-math-foundations/11-singular-value-decomposition/) | Build | Python, Julia |\n| 12 | [Tensor Operations](phases/01-math-foundations/12-tensor-operations/) | Build | Python |\n| 13 | [Numerical Stability](phases/01-math-foundations/13-numerical-stability/) | Build | Python |\n| 14 | [Norms & Distances](phases/01-math-foundations/14-norms-and-distances/) | Build | Python |\n| 15 | [Statistics for ML](phases/01-math-foundations/15-statistics-for-ml/) | Build | Python |\n| 16 | [Sampling Methods](phases/01-math-foundations/16-sampling-methods/) | Build | Python |\n| 17 | [Linear Systems](phases/01-math-foundations/17-linear-systems/) | Build | Python |\n| 18 | [Convex Optimization](phases/01-math-foundations/18-convex-optimization/) | Build | Python |\n| 19 | [Complex Numbers for AI](phases/01-math-foundations/19-complex-numbers/) | Learn | Python |\n| 20 | [The Fourier Transform](phases/01-math-foundations/20-fourier-transform/) | Build | Python |\n| 21 | [Graph Theory for ML](phases/01-math-foundations/21-graph-theory/) | Build | Python |\n| 22 | [Stochastic Processes](phases/01-math-foundations/22-stochastic-processes/) | Learn | Python |\n\n</details>\n\n<details id=\"phase-2\">\n<summary><b>Phase 2 — ML Fundamentals</b> &nbsp;<code>18 lessons</code>&nbsp; <em>Classical ML — still the backbone of most production AI.</em></summary>\n<br/>\n\n| # | Lesson | Type | Lang |\n|:---:|--------|:----:|------|\n| 01 | [What Is Machine Learning](phases/02-ml-fundamentals/01-what-is-machine-learning/) | Learn | Python |\n| 02 | [Linear Regression from Scratch](phases/02-ml-fundamentals/02-linear-regression/) | Build | Python |\n| 03 | [Logistic Regression & Classification](phases/02-ml-fundamentals/03-logistic-regression/) | Build | Python |\n| 04 | [Decision Trees & Random Forests](phases/02-ml-fundamentals/04-decision-trees/) | Build | Python |\n| 05 | [Support Vector Machines](phases/02-ml-fundamentals/05-support-vector-machines/) | Build | Python |\n| 06 | [KNN & Distance Metrics](phases/02-ml-fundamentals/06-knn-and-distances/) | Build | Python |\n| 07 | [Unsupervised Learning: K-Means, DBSCAN](phases/02-ml-fundamentals/07-unsupervised-learning/) | Build | Python |\n| 08 | [Feature Engineering & Selection](phases/02-ml-fundamentals/08-feature-engineering/) | Build | Python |\n| 09 | [Model Evaluation: Metrics, Cross-Validation](phases/02-ml-fundamentals/09-model-evaluation/) | Build | Python |\n| 10 | [Bias, Variance & the Learning Curve](phases/02-ml-fundamentals/10-bias-variance/) | Learn | Python |\n| 11 | [Ensemble Methods: Boosting, Bagging, Stacking](phases/02-ml-fundamentals/11-ensemble-methods/) | Build | Python |\n| 12 | [Hyperparameter Tuning](phases/02-ml-fundamentals/12-hyperparameter-tuning/) | Build | Python |\n| 13 | [ML Pipelines & Experiment Tracking](phases/02-ml-fundamentals/13-ml-pipelines/) | Build | Python |\n| 14 | [Naive Bayes](phases/02-ml-fundamentals/14-naive-bayes/) | Build | Python |\n| 15 | [Time Series Fundamentals](phases/02-ml-fundamentals/15-time-series/) | Build | Python |\n| 16 | [Anomaly Detection](phases/02-ml-fu -capstone-projects/51-literature-retrieval/) | D. Auto research | Python |\n| 52 | [Experiment Runner](phases/19-capstone-projects/52-experiment-runner/) | D. Auto research | Python |\n| 53 | [Result Evaluator](phases/19-capstone-projects/53-result-evaluator/) | D. Auto research | Python |\n| 54 | [Paper Writer](phases/19-capstone-projects/54-paper-writer/) | D. Auto research | Python |\n| 55 | [Critic Loop](phases/19-capstone-projects/55-critic-loop/) | D. Auto research | Python |\n| 56 | [Iteration Scheduler](phases/19-capstone-projects/56-iteration-scheduler/) | D. Auto research | Python |\n| 57 | [End-to-End Research Demo](phases/19-capstone-projects/57-end-to-end-research-demo/) | D. Auto research | Python |\n\n</details>\n\n```\n░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒\n```\n\n## The toolkit\n\nEvery lesson produces a reusable artifact. By the end you have:\n\n```\noutputs/\n├── prompts/      prompt templates for every AI task\n└── skills/       SKILL.md files for AI coding agents\n```\n\nInstall them with `npx skills add`. Plug them into Claude, Cursor, Codex,\nOpenClaw, Hermes, or any agent that reads a SKILL.md / AGENTS.md directory.\nReal tools, not homework.\n\n### Install every course skill into your agent\n\nThe repo ships 388 skills and 99 prompts under `phases/**/outputs/`.\n\n**Recommended: install via [skills.sh](https://skills.sh).** No clone, no Python,\ndetects your agent's skills directory automatically:\n\n```bash\nnpx skills add rohitg00/ai-engineering-from-scratch                       # every skill\nnpx skills add rohitg00/ai-engineering-from-scratch --skill agent-loop    # one skill\nnpx skills add rohitg00/ai-engineering-from-scratch --phase 14            # one phase\n```\n\n`skills` writes to whichever directory your agent picks up: `.claude/skills/`,\n`.cursor/skills/`, `.codex/skills/`, OpenClaw's skills folder, Hermes's bundle\npath, or any SKILL.md-aware tool. One command, every agent.\n\n**Advanced: offline / custom layout via `scripts/install_skills.py`.** Requires\ncloning the repo. Useful when you need tag filters, dry-runs, or a non-default\nlayout:\n\n```bash\npython3 scripts/install_skills.py <target>                                 # every skill, default --layout skills (nested)\npython3 scripts/install_skills.py <target> --layout skills                 # same as above, explicit\npython3 scripts/install_skills.py <target> --type all                      # skills + prompts + agents\npython3 scripts/install_skills.py <target> --phase 14                      # one phase only\npython3 scripts/install_skills.py <target> --tag rag                       # filter by tag\npython3 scripts/install_skills.py <target> --layout flat                   # flat files\npython3 scripts/install_skills.py <target> --dry-run                       # preview without writing\npython3 scripts/install_skills.py <target> --force                         # overwrite existing files\n```\n\n`<target>` is the skills directory for your agent (examples:\n`~/.claude/skills/`, `~/.cursor/skills/`, `~/.config/openclaw/skills/`,\n`.skills/`, or any path your agent reads).\n\nBy default the script refuses to overwrite an existing destination and exits\nwith code 1 after listing every colliding path. Use `--dry-run` to preview\ncollisions or `--force` to overwrite. Every non-dry-run run writes a\n`manifest.json` in the target with the full inventory grouped by type and\nphase. Pick the layout your agent reads:\n\n| `--layout`  | Path written |\n|---|---|\n| `skills`    | `<target>/<name>/SKILL.md` (nested convention, supported by Claude / Cursor / Codex / OpenClaw / Hermes) |\n| `by-phase`  | `<target>/phase-NN/<name>.md` |\n| `flat`      | `<target>/<name>.md` |\n\n### Drop the agent workbench into your own repo\n\nThe Phase 14 capstone ships a reusable Agent Workbench pack (AGENTS.md, schemas,\ninit / verify / handoff scripts). Scaffold it into any repo with:\n\n```bash\npython3 scripts/scaffold_workbench.py path/to/your-repo            # full pack + seeds\npython3 scripts/scaffold_workbench.py path/to/your-repo --minimal  # skip docs/\npython3 scripts/scaffold_workbench.py path/to/your-repo --dry-run  # preview only\npython3 scripts/scaffold_workbench.py path/to/your-repo --force    # overwrite\n```\n\nYou get the seven workbench surfaces wired up, a starter `task_board.json`,\nand a fresh `agent_state.json` at `schema_version: 1`. From there: edit the\ntask, edit `AGENTS.md`, run `scripts/init_agent.py`, hand the contract to\nyour agent. The pack source lives at\n`phases/14-agent-engineering/42-agent-workbench-capstone/outputs/agent-workbench-pack/`.\n\n### Browse the entire course as JSON\n\n`scripts/build_catalog.py` walks every phase, every lesson, every artifact on\ndisk and writes `catalog.json` at the repo root. One file, every course truth.\n\n```bash\npython3 scripts/build_catalog.py               # writes <repo>/catalog.json\npython3 scripts/build_catalog.py --stdout      # to stdout, do not touch repo\npython3 scripts/build_catalog.py --out path/to/file.json\n```\n\nThe catalog is filesystem-derived, not README-derived, so counts always match\nwhat is actually on disk. Use it for site builds, downstream tooling, or to\nverify the README counts have not drifted. Schema is documented at the top of\nthe script.\n\nA GitHub Action (`.github/workflows/curriculum.yml`) rebuilds `catalog.json`\non every PR and fails the build if the committed file is stale. After editing\nany lesson, run `python3 scripts/build_catalog.py` and commit the result, or\nCI will reject the PR. The same workflow runs `audit_lessons.py` in\nwarn-only mode (so existing drift does not block contributors).\n\n### Smoke-check every lesson's Python code\n\n`scripts/lesson_run.py` byte-compiles every `.py` file under each lesson's\n`code/` directory. Default mode is syntax-check only — no execution, no API\nkeys, no heavy ML deps required. Catches the regressions contributors\nintroduce most often (bad indentation, broken f-strings, stray edits).\n\n```bash\npython3 scripts/lesson_run.py                  # syntax-check the whole curriculum\npython3 scripts/lesson_run.py --phase 14       # one phase only\npython3 scripts/lesson_run.py --json           # JSON report on stdout\npython3 scripts/lesson_run.py --strict         # exit 1 if any lesson fails\npython3 scripts/lesson_run.py --execute        # actually run, 10s timeout per lesson\n```\n\n`--execute` runs each lesson's `code/main.py` (or the first `.py` file) with a\n10-second timeout. Lessons whose entry file starts with a `# requires: pkg1,\npkg2` comment listing non-stdlib deps are skipped with reason `needs <deps>`.\nThe script is opt-in and not wired into CI.\n\nStdlib only, Python 3.10+. Set `LINK_CHECK_SKIP=domain1,domain2` to override\nthe default skip-list (`twitter.com`, `x.com`, `linkedin.com`,\n`instagram.com`, `medium.com` — domains that aggressively block automated\nHEAD/GET).\n\n## Where to start\n\n| Background | Start at | Estimated time |\n|---|---|---|\n| New to programming and AI | Phase 0 — Setup | ~306 hours |\n| Know Python, new to ML | Phase 1 — Math Foundations | ~270 hours |\n| Know ML, new to deep learning | Phase 3 — Deep Learning Core | ~200 hours |\n| Know deep learning, want LLMs and agents | Phase 10 — LLMs from Scratch | ~100 hours |\n| Senior engineer, only want agent engineering | Phase 14 — Agent Engineering | ~60 hours |\n\n```\n░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒\n```\n\n## Why this matters now\n\n<table>\n<tr>\n<th align=\"left\" width=\"50%\"><sub>FIG_003 · A</sub><br/><b>THE INDUSTRY SIGNAL</b></th>\n<th align=\"left\" width=\"50%\"><sub>FIG_003 · B</sub><br/><b>FOUNDATIONAL PAPERS COVERED</b></th>\n</tr>\n<tr>\n<td valign=\"top\">\n\n> *\"The hottest new programming language is English.\"*<br/>\n> — **Andrej Karpathy** ([tweet](https://x.com/karpathy/status/1617979122625712128))\n\n> *\"Software engineering is being remade in front of our eyes.\"*<br/>\n> — **Boris Cherny**, creator of Claude Code\n\n> *\"Models will keep getting better. The skill that compounds is **knowing what to build**.\"*<br/>\n> — Industry consensus, 2026\n\n</td>\n<td valign=\"top\">\n\n- *Attention Is All You Need* — Vaswani et al., 2017 → [Phase 7](#phase-7)\n- *Language Models are Few-Shot Learners* (GPT-3) → [Phase 10](#phase-10)\n- *Denoising Diffusion Probabilistic Models* → [Phase 8](#phase-8)\n- *InstructGPT / RLHF* → [Phase 10](#phase-10)\n- *Direct Preference Optimization* → [Phase 10](#phase-10)\n- *Chain-of-Thought Prompting* → [Phase 11](#phase-11)\n- *ReAct: Reasoning + Acting in LLMs* → [Phase 14](#phase-14)\n- *Model Context Protocol* — Anthropic → [Phase 13](#phase-13)\n\n</td>\n</tr>\n</table>\n\n```\n░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒\n```\n\n## Contributing\n\n| Goal | Read |\n|---|---|\n| Contribute a lesson or fix | [CONTRIBUTING.md](CONTRIBUTING.md) |\n| Fork for your team or school | [FORKING.md](FORKING.md) |\n| Lesson template | [LESSON_TEMPLATE.md](LESSON_TEMPLATE.md) |\n| Track progress | [ROADMAP.md](ROADMAP.md) |\n| Glossary | [glossary/terms.md](glossary/terms.md) |\n| Code of conduct | [CODE_OF_CONDUCT.md](CODE_OF_CONDUCT.md) |\n\nBefore submitting a lesson, run the invariant check:\n\n```bash\npython3 scripts/audit_lessons.py           # full curriculum\npython3 scripts/audit_lessons.py --phase 14  # single phase\npython3 scripts/audit_lessons.py --json    # CI-friendly output\n```\n\nExit code is non-zero when any rule fails. Rules (L001–L010) validate directory\nshape, `docs/en.md` presence + H1, `code/` non-emptiness, `quiz.json` schema\n(rejects the legacy `q/choices/answer` keys that caused issue #102), and\nrelative links inside lesson docs.\n\n```\n░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒░░░▒▒▒\n```\n\n## Sponsor the work\n\ scratch.com</a> &nbsp;·&nbsp;\n  <a href=\"https://github.com/rohitg00/ai-engineering-from-scratch/issues/new/choose\">Report / Suggest</a>\n</sub>\n","summary":"AI Engineering from Scratch is a comprehensive, open-source curriculum designed to teach AI development by building foundational components from the ground up. Spanning 20 phases and 503 hands-on lessons, the project guides learners through the math and engineering behind topics ranging from linear algebra and neural networks to autonomous agent swarms and production infrastructure. It is ideal for developers and students who want to move beyond surface-level tool usage to achieve a deep, technical mastery of how modern AI systems function under the hood.","description":"Learn it. Build it. Ship it for others.","stars":27240,"language":"Python"},{"owner":"teng-lin","repo":"notebooklm-py","url":"https://github.com/teng-lin/notebooklm-py","readme":"# notebooklm-py\n<p align=\"left\">\n  <img src=\"https://raw.githubusercontent.com/teng-lin/notebooklm-py/main/notebooklm-py.png\" alt=\"notebooklm-py logo\" width=\"128\">\n</p>\n\n**A Comprehensive NotebookLM Skill & Unofficial Python API.** Full programmatic access to NotebookLM's features—including capabilities the web UI doesn't expose—via Python, CLI, and AI agents like Claude Code, Codex, and OpenClaw.\n\n[![PyPI version](https://img.shields.io/pypi/v/notebooklm-py.svg)](https://pypi.org/project/notebooklm-py/)\n[![Python Version](https://img.shields.io/badge/python-3.10%20%7C%203.11%20%7C%203.12%20%7C%203.13%20%7C%203.14-blue)](https://pypi.org/project/notebooklm-py/)\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](https://opensource.org/licenses/MIT)\n[![Tests](https://github.com/teng-lin/notebooklm-py/actions/workflows/test.yml/badge.svg)](https://github.com/teng-lin/notebooklm-py/actions/workflows/test.yml)\n<p>\n  <a href=\"https://trendshift.io/repositories/19116\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/19116\" alt=\"teng-lin%2Fnotebooklm-py | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/></a>\n</p>\n\n**Source & Development**: <https://github.com/teng-lin/notebooklm-py>\n\n> **⚠️ Unofficial Library - Use at Your Own Risk**\n>\n> This library uses **undocumented Google APIs** that can change without notice.\n>\n> - **Not affiliated with Google** - This is a community project\n> - **APIs may break** - Google can change internal endpoints anytime\n> - **Rate limits apply** - Heavy usage may be throttled\n>\n> Best for prototypes, research, and personal projects. See [Troubleshooting](docs/troubleshooting.md) for debugging tips.\n\n## What You Can Build\n\n🤖 **AI Agent Tools** - Integrate NotebookLM into Claude Code, Codex, and other LLM agents. Ships with a root [NotebookLM skill](SKILL.md) for GitHub and `npx skills add` discovery, local `notebooklm skill install` support for Claude Code and `.agents` skill directories, and repo-level Codex guidance in [`AGENTS.md`](AGENTS.md).\n\n📚 **Research Automation** - Bulk-import sources (URLs, PDFs, YouTube, Google Drive), run web/Drive research queries with auto-import, and extract insights programmatically. Build repeatable research pipelines.\n\n🎙️ **Content Generation** - Generate Audio Overviews (podcasts), videos, slide decks, quizzes, flashcards, infographics, data tables, mind maps, and study guides. Full control over formats, styles, and output.\n\n📥 **Downloads & Export** - Download all generated artifacts locally (MP3, MP4, PDF, PNG, CSV, JSON, Markdown). Export to Google Docs/Sheets. **Features the web UI doesn't offer**: batch downloads, quiz/flashcard export in multiple formats, mind map JSON extraction.\n\n## Three Ways to Use\n\n| Method | Best For |\n|--------|----------|\n| **Python API** | Application integration, async workflows, custom pipelines |\n| **CLI** | Shell scripts, quick tasks, CI/CD automation |\n| **Agent Integration** | Claude Code, Codex, LLM agents, natural language automation |\n\n## Features\n\n### Complete NotebookLM Coverage\n\n| Category | Capabilities |\n|----------|--------------|\n| **Notebooks** | Create, list, rename, delete |\n| **Sources** | URLs, YouTube, files (PDF, text, Markdown, Word, EPUB, audio, video, images), Google Drive, pasted text; refresh, get guide/fulltext |\n| **Chat** | Questions, conversation history, custom personas |\n| **Research** | Web and Drive research agents (fast/deep modes) with auto-import |\n| **Sharing** | Public/private links, user permissions (viewer/editor), view level control |\n\n### Content Generation (All Artifact Types)\n\n| Type | Options | Download Format |\n|------|---------|-----------------|\n| **Audio Overview** | 4 formats (deep-dive, brief, critique, debate), 3 lengths, 50+ languages | MP3/MP4 |\n| **Video Overview** | 3 formats (explainer, brief, cinematic), 9 visual styles, plus a dedicated `cinematic-video` CLI alias | MP4 |\n| **Slide Deck** | Detailed or presenter format, adjustable length; individual slide revision | PDF, PPTX |\n| **Infographic** | 3 orientations, 3 detail levels | PNG |\n| **Quiz** | Configurable quantity and difficulty | JSON, Markdown, HTML |\n| **Flashcards** | Configurable quantity and difficulty | JSON, Markdown, HTML |\n| **Report** | Briefing doc, study guide, blog post, or custom prompt | Markdown |\n| **Data Table** | Custom structure via natural language | CSV |\n| **Mind Map** | Interactive hierarchical visualization | JSON |\n\n### Beyond the Web UI\n\nThese features are available via API/CLI but not exposed in NotebookLM's web interface:\n\n- **Batch downloads** - Download all artifacts of a type at once\n- **Quiz/Flashcard export** - Get structured JSON, Markdown, or HTML (web UI only shows interactive view)\n- **Mind map data extraction** - Export hierarchical JSON for visualization tools\n- **Data table CSV export** - Download structured tables as spreadsheets\n- **Slide deck as PPTX** - Download editable PowerPoint files (web UI only offers PDF)\n- **Slide revision** - Modify individual slides with natural-language prompts\n- **Report template customization** - Append extra instructions to built-in format templates\n- **Save chat to notes** - Save Q&A answers or conversation history as notebook notes\n- **Source fulltext access** - Retrieve the indexed text content of any source\n- **Programmatic sharing** - Manage permissions without the UI\n- **Multi-account profiles** - Switch between Google accounts without re-authenticating\n- **Browser cookie import** - Reuse cookies from your existing browser session instead of driving Playwright\n\n## Installation\n\nThe full install guide — six personas (agent, end-user, library, headless, contributor, power-user), optional extras matrix, platform notes — lives in **[docs/installation.md](docs/installation.md)**.\n\n**Quickest start** (CLI users and AI agents):\n\n```bash\npip install \"notebooklm-py[browser]\"   # core + Playwright\nplaywright install chromium             # ~170 MB; no progress bar — be patient (30–90 s)\nnotebooklm login                        # opens browser for Google sign-in\nnotebooklm auth check --test --json     # verify: expect \"status\": \"ok\"\n```\n\n**As a library** (embedded in your app — no Playwright, no Chromium):\n\n```bash\npip install notebooklm-py               # ~10 MB; ship a pre-acquired storage_state.json\n```\n\nIf `playwright install chromium` fails on Linux with `TypeError: onExit is not a function`, see the [Linux workaround](docs/troubleshooting.md#linux). **Contributors:** see [CONTRIBUTING.md](CONTRIBUTING.md).\n\n## Quick Start\n\n<p align=\"center\">\n  <a href=\"https://asciinema.org/a/767284\" target=\"_blank\"><img src=\"https://asciinema.org/a/767284.svg\" width=\"600\" /></a>\n  <br>\n  <em>16-minute session compressed to 30 seconds</em>\n</p>\n\n### CLI\n\n```bash\n# 1. Authenticate (opens browser)\nnotebooklm login\n# Or use Microsoft Edge (for orgs that require Edge for SSO)\n# notebooklm login --browser msedge\n# Or reuse cookies from an already-logged-in browser session\n# notebooklm login --browser-cookies chrome\n# notebooklm login --browser-cookies 'chrome::Profile 1'  # one Chromium profile\n# (combine with --profile to populate a specific profile;\n#  use --account / --all-accounts after auth inspect when several\n#  Google accounts are signed in)\n\n# 2. Create a notebook and add sources\nnotebooklm create \"My Research\"\nnotebooklm use <notebook_id>\nnotebooklm source add \"https://en.wikipedia.org/wiki/Artificial_intelligence\"\nnotebooklm source add \"./paper.pdf\"\n\n# 3. Chat with your sources\nnotebooklm ask \"What are the key themes?\"\nnotebooklm ask --prompt-file ./long_question.txt  # Read question from file\n\n# 4. Generate content (use --prompt-file for long prompts)\nnotebooklm generate audio \"make it engaging\" --wait\nnotebooklm generate video --style whiteboard --wait\nnotebooklm generate cinematic-video \"documentary-style summary\" --wait\nnotebooklm generate quiz --difficulty hard\nnotebooklm generate flashcards --quantity more\nnotebooklm generate slide-deck\nnotebooklm generate infographic --orientation portrait\nnotebooklm generate mind-map\nnotebooklm generate data-table \"compare key concepts\"\n\n# 5. Download artifacts\nnotebooklm download audio ./podcast.mp3\nnotebooklm download video ./overview.mp4\nnotebooklm download cinematic-video ./documentary.mp4\nnotebooklm download quiz --format markdown ./quiz.md\nnotebooklm download flashcards --format json ./cards.json\nnotebooklm download slide-deck ./slides.pdf\nnotebooklm download infographic ./infographic.png\nnotebooklm download mind-map ./mindmap.json\nnotebooklm download data-table ./data.csv\n```\n\nOther useful CLI commands:\n\n```bash\nnotebooklm auth check --test         # Diagnose auth/cookie issues\nnotebooklm auth refresh --quiet      # One-shot cookie keepalive (for cron / launchd / systemd)\nnotebooklm auth refresh --browser-cookies chrome  # Re-extract and repair account routing\nnotebooklm auth inspect --browser 'chrome::Profile 1'  # Preview one Chromium profile\nnotebooklm agent show codex          # Print bundled Codex instructions\nnotebooklm agent show claude         # Print bundled Claude Code skill template\nnotebooklm language list             # List supported output languages\nnotebooklm metadata --json           # Export notebook metadata and sources\nnotebooklm share status              # Inspect sharing state\nnotebooklm source add-research \"AI\"  # Start web research and import sources\nnotebooklm skill status              # Check local agent skill installation\nnotebooklm profile list              # List all Google account profiles\nnotebooklm profile switch work       # Switch active account profile\n```\n\nUse `--prompt-file PATH` with `ask`, prompt-based `generate` commands, and `source add-research` when the text is too long for the shell command line. This reads prompt/query text from a file and is separate from `source add ./file.pdf`, which still uploads that file as a NotebookLM source.\n\n### Python API\n\n```python\nimport asyncio\nfrom notebooklm import NotebookLMClient\n\nasync def main():\n    async with NotebookLMClient.from_storage() as client:\n        # Create notebook and add sources\n        nb = await client.notebooks.create(\"Research\")\n        await client.sources.add_url(nb.id, \"https://example.com\", wait=True)\n\n        # Chat with your sources\n        result = await client.chat.ask(nb.id, \"Summarize this\")\n        print(result.answer)\n\n        # Generate content (podcast, video, quiz, etc.)\n        status = await client.artifacts.generate_audio(nb.id, instructions=\"make it fun\")\n        await client.artifacts.wait_for_completion(nb.id, status.task_id)\n        await client.artifacts.download_audio(nb.id, \"podcast.mp3\")\n\n        # Generate quiz and download as JSON\n        status = await client.artifacts.generate_quiz(nb.id)\n
