/strong></td>\n            <td align=\"right\"><strong>7.7× more RAM</strong></td>\n          </tr>\n          <tr>\n            <td><strong>Claude Code</strong></td>\n            <td align=\"right\"><strong>386.6 MB</strong></td>\n            <td align=\"right\"><strong>13.9× more RAM</strong></td>\n          </tr>\n          <tr>\n            <td><strong>Antigravity CLI</strong></td>\n            <td align=\"right\"><strong>243.7 MB</strong></td>\n            <td align=\"right\"><strong>8.8× more RAM</strong></td>\n          </tr>\n        </tbody>\n      </table>\n    </td>\n    <td width=\"24\"></td>\n    <td valign=\"top\" align=\"center\" width=\"50%\">\n      <strong>10 active sessions</strong>\n      <table>\n        <thead>\n          <tr>\n            <th>Tool</th>\n            <th>PSS</th>\n            <th>Comparison</th>\n          </tr>\n        </thead>\n        <tbody>\n          <tr>\n            <td><strong>jcode (local embedding off)</strong></td>\n            <td align=\"right\"><strong>117.0 MB</strong></td>\n            <td align=\"right\">baseline</td>\n          </tr>\n          <tr>\n            <td><strong>jcode</strong></td>\n            <td align=\"right\"><strong>260.8 MB</strong></td>\n            <td align=\"right\"><strong>2.2× more RAM</strong></td>\n          </tr>\n          <tr>\n            <td><strong>pi</strong></td>\n            <td align=\"right\"><strong>833.0 MB</strong></td>\n            <td align=\"right\"><strong>7.1× more RAM</strong></td>\n          </tr>\n          <tr>\n            <td><strong>Codex CLI</strong></td>\n            <td align=\"right\"><strong>334.8 MB</strong></td>\n            <td align=\"right\"><strong>2.9× more RAM</strong></td>\n          </tr>\n          <tr>\n            <td><strong>OpenCode</strong></td>\n            <td align=\"right\"><strong>3237.2 MB</strong></td>\n            <td align=\"right\"><strong>27.7× more RAM</strong></td>\n          </tr>\n          <tr>\n            <td><strong>GitHub Copilot CLI</strong></td>\n            <td align=\"right\"><strong>1756.5 MB</strong></td>\n            <td align=\"right\"><strong>15.0× more RAM</strong></td>\n          </tr>\n          <tr>\n            <td><strong>Cursor Agent</strong></td>\n            <td align=\"right\"><strong>1632.4 MB</strong></td>\n            <td align=\"right\"><strong>14.0× more RAM</strong></td>\n          </tr>\n          <tr>\n            <td><strong>Claude Code</strong></td>\n            <td align=\"right\"><strong>2300.6 MB</strong></td>\n            <td align=\"right\"><strong>19.7× more RAM</strong></td>\n          </tr>\n          <tr>\n            <td><strong>Antigravity CLI</strong></td>\n            <td align=\"right\"><strong>1021.2 MB</strong></td>\n            <td align=\"right\"><strong>8.7× more RAM</strong></td>\n          </tr>\n        </tbody>\n      </table>\n    </td>\n  </tr>\n</table>\n\n</div>\n\n### Time to first frame\n\n<div align=\"center\">\n\n| Tool | Time to first frame | Range | Comparison |\n|---|---:|---:|---:|\n| **jcode** | **14.0 ms** | 10.1–19.3 ms | baseline |\n| **Antigravity CLI** | **383.5 ms** | 363.1–415.4 ms | **27.4× slower** |\n| **pi** | **590.7 ms** | 369.6–934.8 ms | **42.2× slower** |\n| **Codex CLI** | **882.8 ms** | 742.3–1640.9 ms | **63.1× slower** |\n| **OpenCode** | **1035.9 ms** | 922.5–1104.4 ms | **74.0× slower** |\n| **GitHub Copilot CLI** | **1518.6 ms** | 1357.4–1826.8 ms | **108.5× slower** |\n| **Cursor Agent** | **1949.7 ms** | 1711.0–2104.8 ms | **139.3× slower** |\n| **Claude Code** | **3436.9 ms** | 2032.7–8927.2 ms | **245.5× slower** |\n\n</div>\n\nMeasured on this Linux machine across 10 interactive PTY launches.\n\n### Time to first input\n(time until typed probe text appears on the rendered screen; Antigravity uses its internal input-ready log marker because the sign-in screen suppresses probe echo.)\n<div align=\"center\">\n\n| Tool | Time to first input | Range | Comparison |\n|---|---:|---:|---:|\n| **jcode** | **48.7 ms** | 30.3–62.7 ms | baseline |\n| **Antigravity CLI** | **383.7 ms** | 363.4–415.7 ms | **7.9× slower** |\n| **pi** | **596.4 ms** | 373.9–955.2 ms | **12.2× slower** |\n| **Codex CLI** | **905.8 ms** | 760.1–1675.7 ms | **18.6× slower** |\n| **OpenCode** | **1047.9 ms** | 931.1–1116.9 ms | **21.5× slower** |\n| **GitHub Copilot CLI** | **1583.4 ms** | 1422.8–1880.0 ms | **32.5× slower** |\n| **Cursor Agent** | **1978.7 ms** | 1727.3–2130.0 ms | **40.6× slower** |\n| **Claude Code** | **3512.8 ms** | 2137.4–9002.0 ms | **72.2× slower** |\n\n</div>\n\nMeasured on this Linux machine across 10 interactive PTY launches. Antigravity CLI was unauthenticated for this run; its sign-in screen rendered normally and emitted an internal `CLI ready for user input` marker, but did not echo the typed probe.\n\n### Additional clients / memory scaling\n\n<div align=\"center\">\n\n| Tool | Extra PSS per added session | Comparison |\n|---|---:|---:|\n| **jcode (local embedding off)** | **~9.9 MB** | baseline |\n| **jcode** | **~10.4 MB** | **1.1× more RAM** |\n| **pi** | **~76.5 MB** | **7.7× more RAM** |\n| **Codex CLI** | **~21.6 MB** | **2.2× more RAM** |\n| **OpenCode** | **~318.4 MB** | **32.2× more RAM** |\n| **GitHub Copilot CLI** | **~158.1 MB** | **16.0× more RAM** |\n| **Cursor Agent** | **~157.5 MB** | **15.9× more RAM** |\n| **Claude Code** | **~212.7 MB** | **21.5× more RAM** |\n| **Antigravity CLI** | **~86.4 MB** | **8.7× more RAM** |\n\n</div>\nversions tested for this corrected memory rerun:\n\n- `jcode v0.9.1888-dev (be386f2)`\n- `pi 0.62.0`\n- `codex-cli 0.120.0`\n- `opencode 1.0.203`\n- `GitHub Copilot CLI 1.0.24` for the 1-session rerun, `GitHub Copilot CLI 1.0.27` for the 10-session rerun\n- `Cursor Agent 2026.04.08-a41fba1`\n- `Claude Code 2.1.86 (Claude Code)`\n- `Antigravity CLI 1.0.0`\n\n<div align=\"center\">\n\n  <a href=\"https://github.com/1jehuang/jcode/releases/download/readme-assets/jcode-performance-demo.mp4\">\n    <img src=\"https://github.com/1jehuang/jcode/releases/download/readme-assets/jcode-performance-demo.webp\" alt=\"jcode performance demonstration\" width=\"900\">\n  </a>\n\n  <p><em>jcode performance demonstration</em></p>\n\n</div>\n\n\n---\n\n## Memory (Agent memory)\n\nJcode embeds each turn/response as a semantic vector. Every turn does queries a graph of memories to efficiently find related memory entries via a cosine similarity check. The embedding hits are fed into the conversation, or optionally uses a memory sideagent which verifies the memories are relevant, and potentially does more work for information retreival before injecting into the conversation. This results in a human like memory system which allows the agent to automatically recall relevant information to the conversation without actively calling memory tools or being a token burner. \not \nTo have memories which are retrieved, they must also be extracted and stored. Every so often (semantic drift, K turns since last extraction, session end, etc), memories are extracted via a memory sideagent, and put into the memory graph. \n\nThe harness also provides explicit memory tools to allow the agent to actively search or store the memory without relying on a passive background process. The harness also provides session search for traditional RAG on previous sessions. \n\nMemories are automatically consolidated every so often via the ambient mode. This reorganizes, checks for staleness and conflicts, etc\n\n<div align=\"center\">\n\n  <a href=\"https://github.com/1jehuang/jcode/releases/download/readme-assets/jcode-memory-demo.mp4\">\n    <img src=\"https://github.com/1jehuang/jcode/releases/download/readme-assets/jcode-memory-demo.webp\" alt=\"jcode memory demonstration\" width=\"900\">\n  </a>\n\n  <p><em>jcode memory demonstration</em></p>\n\n</div>\n\n<!-- Memory demo media is hosted in the readme-assets release. -->\n\n---\n\n## UI: Side panels, Diagrams, Info Widgets, rendering, scrolling, alignment\n\nThe side panel is a place for auxiliary information. Tell your jcode agent to load a file into the side panel and see it update in real time, or tell your agent to write directly to the side panel, or use it as a diff viewer. The side panel (and chat) is able to render mermaid diagrams inline. \n<img width=\"2877\" height=\"1762\" alt=\"image\" src=\"https://github.com/user-attachments/assets/6c7bec81-ef3f-434d-8a7b-d55f8a54e5cf\" />\n\nTo make this possible, I created a new mermaid rendering library to render diagrams 1800x faster. It has no browser or Typescript dependency. See https://github.com/1jehuang/mermaid-rs-renderer\n\nTo show you important information without taking space away from the screen that could be used for responses, I developed info widgets. Info widgets will only ever take up the negative space on the screen to show you information, and will get out of the way if there isn't any. \n\nJcode can render at over a thousand fps. Your monitor will not have the refresh rate to show you, but this means you will not have silly flicker problems. \n\nThe custom scrollback implementation of jcode allows it to do much more than a native scrollback. However, it is a terminal-level limitation that I cannot have smooth, partial line scrolling with a custom scrollback. To fix this, I made my own terminal. Handterm https://github.com/1jehuang/handterm implements a native scroll api, and also happens to be very effiecent. This is a work in progress. Scrolling is still well implemented for normal terminals.\n\nJcode is left-aligned by default. You can switch to centered mode with the `Alt+C` hotkey, with the `/alignment` command, or in the config.\n\n---\n\n## Swarm\n\nSpawn two or more agents in the same repo, and they will automatically be managed by the server to allow native collaboration. When agent A edits a file that agent B has read (code shifting under its feet), the server notifies agent B. Agent B can ignore it if it is not relevant, or it can check the diff to make sure that it doesn't conflict. Each agent has messaging abilities, capable of DMing just one agent, broadcasting to all other agents hosted by the server, or just agents working in that repo. This allows you to spawn multiple sessions in the same repo, and have all conflicts automatically resolved.\n\n<div align=\"center\">\n\n  <a href=\"https://github.com/1jehuang/jcode/releases/download/readme-assets/swarm-demo.mp4\">\n    <img src=\"https://github.com/1jehuang/jcode/releases/download/readme-assets/jcode-swarm-demonstration.webp\" alt=\"jcode swarm demonstration\" width=\"900\">\n  </a>\n\n  <p><em>jcode swarm demonstration</em></p>\n\n</div>\n\nAgents are also able to spawn their own swarms autonomously. They have a swarm tool which allows them to spawn in their own teamates to accomplish tasks in parallel. Doing so turns the main agent into a coordinator and the spawned agents into workers. Groups of agents, their messaging channels, their completion statuses, etc are all automatically managed. This can be done headlessly or headed.\n\n---\n\n## OAuth and Providers\n\njcode works with subscription-backed OAuth flows and many provider integrations, so you can use the models you already pay for and still fall back to direct API providers when needed.\n\n### Supported built-in login flows\n\n- **Claude** (`jcode login --provider claude`)\n- **OpenAI / ChatGPT / Codex** (`jcode login --provider openai`)\n- **Google Gemini** (`jcode login --provider gemini`)\n- **GitHub Copilot** (`jcode login --provider copilot`)\n- **Azure OpenAI** (`jcode login --provider azure`)\n- **Alibaba Cloud Coding Plan** (`jcode login --provider alibaba-coding-plan`)\n- **Fireworks** (`jcode login --provider fireworks`)\n- **MiniMax** (`jcode login --provider minimax`)\n- **LM Studio** (`jcode login --provider lmstudio`)\n- **Ollama** (`jcode login --provider ollama`)\n- **Custom OpenAI-compatible endpoint** (`jcode login --provider openai-compatible`)\n\nFor custom OpenAI-compatible endpoints, jcode now prompts for the API base and supports local localhost servers without requiring an API key.\n\n### Config-file setup for self-hosted endpoints and MCP\n\nIf you prefer to configure things by editing files instead of using the login UI, jcode supports both a custom OpenAI-compatible endpoint config and MCP config files.\n\n#### OpenAI-compatible providers\n\nMany hosted services speak the standard OpenAI `/v1/chat/completions` API. jcode talks to them through one shared OpenAI-compatible provider, so you can use almost any such endpoint without waiting for a dedicated integration.\n\nThere are two ways to set one up:\n\n- **Built-in named profiles** — jcode ships ready-made profiles for several popular OpenAI-compatible services. Log in by id and jcode fills in the base URL and key environment variable for you:\n\n  ```bash\n  jcode login --provider <profile-id>\n  # for example:\n  jcode login --provider openrouter\n  jcode login --provider deepseek\n  jcode login --provider opencode      # OpenCode Zen\n  jcode login --provider moonshotai\n  ```\n\n  Built-in OpenAI-compatible profile ids include: `openrouter`, `deepseek`, `zai`, `kimi`, `moonshotai`, `opencode` (OpenCode Zen), `opencode-go`, `302ai`, `baseten`, `cortecs`, `huggingface`, `nebius`, `scaleway`, `stackit`, and `firmware`. Each profile only sets the endpoint and key variable; you still pick the model with `/model` (or `--model`). Run `jcode login` with no provider to see the interactive list.\n\n- **Any other endpoint** — point jcode at an arbitrary OpenAI-compatible API (hosted or local) with `jcode login --provider openai-compatible` or the scriptable `jcode provider add` command described below.\n\nUseful environment overrides for these endpoints:\n\n- `JCODE_STREAM_IDLE_TIMEOUT_SECS` — raise the streaming idle timeout (default 180s) for slow reasoning models that think silently before emitting tokens. Also settable as `[provider] stream_idle_timeout_secs` in `config.toml`.\n- Per-model `context_window` (alias `context_limit`) in a `[[providers.<name>.models]]` entry — set the context window when the endpoint has no usable `/v1/models` response, so jcode does not fall back to the generic 200k default.\n\nFor details on self-hosting, local runtimes, and the exact config file shape, see below.\n\n#### Self-hosted OpenAI-compatible endpoints, including vLLM\n\nFor agents and scripts, the preferred path is the one-shot provider profile command. It writes a named profile to `~/.jcode/config.toml`, stores secrets in jcode's private app config directory when requested, and prints exact run/validation commands:\n\n```bash\n# Secret-safe setup for a hosted OpenAI-compatible API.\nprintf '%s' \"$MY_API_KEY\" | jcode provider add my-api \\\n  --base-url https://llm.example.com/v1 \\\n  --model my-model-id \\\n  --api-key-stdin \\\n  --set-default \\\n  --json\n\n# Smoke test the profile.\njcode --provider-profile my-api auth-test --prompt 'Reply exactly JCODE_PROVIDER_SETUP_OK'\n\n# Use it directly.\njcode --provider-profile my-api run 'hello'\n```\n\nFor local servers that do not require auth:\n\n```bash\njcode provider add local-vllm \\\n  --base-url http://localhost:8000/v1 \\\n  --model Qwen/Qwen3-Coder-30B-A3B-Instruct \\\n  --no-api-key \\\n  --set-default\n```\n\nBuilt-in local profiles are available for the common desktop/local runtimes:\n\n```bash\n# Ollama: start the local server and install a model first.\nollama pull llama3.2\njcode login --provider ollama\njcode --provider ollama --model llama3.2 run 'hello'\n\n# LM Studio: start the Local Server, load a chat model, then use the exact\n# model identifier shown by LM Studio or by curl http://localhost:1234/v1/models.\njcode login --provider lmstudio\njcode --provider lmstudio --model '<model-id>' run 'hello'\n```\n\nOllama and LM Studio both expose OpenAI-compatible `/v1/models` and `/v1/chat/completions` endpoints. jcode uses streaming chat completions, function/tool calling, and OpenAI-style image content for vision-capable local models. If a local server requires a token, enter it during `jcode login` or create a named profile with `--api-key-stdin`.\n\nUseful flags:\n\n- `--api-key-env NAME`: reference an existing environment variable instead of storing a key.\n- `--api-key-stdin`: read and store a key without putting it in shell history.\n- `--context-window TOKENS`: persist the model context window for model selection and routing.\n- `--overwrite`: replace an existing profile of the same name.\n- `--model-catalog`: use the endpoint's `/models` response in addition to configured models.\n\nThe generated profile can also be edited manually in `~/.jcode/config.toml`:\n\n```toml\n[provider]\ndefault_provider = \"my-api\"\ndefault_model = \"my-model-id\"\n\n[providers.my-api]\ntype = \"openai-compatible\"\nbase_url = \"https://llm.example.com/v1\"\napi_key_env = \"JCODE_PROVIDER_MY_API_API_KEY\"\nenv_file = \"provider-my-api.env\"\ndefault_model = \"my-model-id\"\n\n[[providers.my-api.models]]\nid = \"my-model-id\"\ncontext_window = 128000\n```\n\nThe custom OpenAI-compatible provider reads overrides from environment variables or from an env file in jcode's app config directory. On Linux this is usually `~/.config/jcode/`, so the default file is usually:\n\n```text\n~/.config/jcode/openai-compatible.env\n```\n\nExample for a local or LAN vLLM server:\n\n```bash\nJCODE_OPENAI_COMPAT_API_BASE=http://192.168.1.50:8000/v1\nJCODE_OPENAI_COMPAT_DEFAULT_MODEL=Qwen/Qwen3-Coder-30B-A3B-Instruct\n# Optional if your server expects auth\nOPENAI_COMPAT_API_KEY=your-token-here\n```\n\nNotes:\n\n- `jcode login --provider openai-compatible` can create or update this for you.\n- Plain `http://` is accepted for `localhost` and private LAN IPs. Public remote HTTP is still rejected.\n- HTTPS endpoints work as usual.\n\n#### MCP config files\n\nMCP config is separate from `config.toml`.\n\nPrimary config files:\n\n- `~/.jcode/mcp.json` for global MCP servers\n- `.jcode/mcp.json` for project-local MCP servers\n\nCompatibility fallback:\n\n- `.claude/mcp.json`\n\nExample MCP config:\n\n```json\n{\n  \"servers\": {\n    \"filesystem\": {\n      \"command\": \"/path/to/mcp-server\",\n      \"args\": [\"--root\", \"/workspace\"],\n      \"env\": {},\n      \"shared\": true\n    }\n  }\n}\n```\n\nOn first run, jcode also tries to import MCP servers from `~/.claude/mcp.json` and `~/.codex/config.toml` if `~/.jcode/mcp.json` does not exist yet.\n\nFor headless or SSH sessions, OAuth-style providers support `jcode login --provider <provider> --no-browser` (alias: `--headless`) so jcode prints the auth URL/QR and falls back to manual code or callback paste instead of trying to launch a local browser.\n\nFor more scriptable remote flows, `claude`, `openai`, `gemini`, and `antigravity` also support a two-step pattern:\n\n```bash\n# Step 1: print a resumable auth URL\njcode login --provider openai --print-auth-url --json\n\n# Step 2: complete later with the callback URL or auth code\njcode login --provider openai --callback-url 'http://localhost:1455/auth/callback?...'\njcode login --provider gemini --auth-code '...'\n```\n\nAdditional scriptable cases:\n\n```bash\n# Copilot device flow: print URL + user code, then complete later\njcode login --provider copilot --print-auth-url --json\njcode login --provider copilot --complete\n\n# Gmail/Google OAuth after credentials are already configured\njcode login --provider google --print-auth-url --google-access-tier readonly\njcode login --provider google --callback-url 'http://127.0.0.1:8456?...'\n```\n\nPending scriptable login state is stored under `~/.jcode/pending-login/`, automatically expires, and stale entries are cleaned up when new scriptable logins start or resume.\n\nFor the built-in OpenAI login flow, jcode opens a local callback on\n`http://localhost:1455/auth/callback` by default.\n\n<img width=\"2877\" height=\"1762\" alt=\"Screenshot from 2026-04-02 14-28-51\" src=\"https://github.com/user-attachments/assets/530684c0-9d12-4363-aa0e-1b39a0d4e1be\" />\nThe above image is the first page of provider logins\n\n### Supported provider\n\n- **Native / first-party style providers:** `claude`, `openai`, `copilot`, `gemini`, `azure`, `alibaba-coding-plan`\n- **Aggregator / compatibility providers:** `openrouter`, `openai-compatible`\n- **Additional provider integrations:** `opencode`, `opencode-go`, `zai` / `kimi`, `302ai`, `baseten`, `cortecs`, `deepseek`, `firmware`, `huggingface`, `moonshotai`, `nebius`, `scaleway`, `stackit`, `groq`, `mistral`, `perplexity`, `togetherai`, `deepinfra`, `fireworks`, `minimax`, `xai`, `lmstudio`, `ollama`, `chutes`, `cerebras`, `cursor`, `antigravity`, `google`\n\nJcode also supports easy multi-account switching. Ran out of tokens on your first ChatGPT Pro subscription? /account and quickly switch to your second. \n\n---\n\n## Customizability / Self-Dev\n\nJcode is inventing a new form of customizability. One that doesn't limit you to what a plugin or extension can do. Tell your jcode agent to enter self dev mode, and it will start modifying its own source code. Jcode is optimized to iterate on itself. There is significant infrastructure around self developement, which allows it to edit, build, and test its own source code, then reload its own binary and continue work in your (potentially many) sessions, fully automatically. \n\nIt is reccomended that you use a frontier model for this. The jcode codebase is not a simple one, and weaker models can make subtle, breaking changes. GPT 5.5 or the latest available frontier model works well.\n\n<!-- Add self-dev demo thumbnail/video and fuller writeup here. -->\n\n---\n\n## Misc.\n\nThe devil is in the details. There are many undocumented optimizations and niceties that jcode implements. Some examples: \n\nAnthropic's Claude cache goes cold after 5 minutes. If you initiate Claude after these 5 minutes, you have a cache miss, potentially costing you lots of tokens. The ui warns you when the cache went cold, and notfies you if there was an unexpected cache miss. \n\njcode comes with instructions on how to set up Firefox Agent Bridge. Ask you agent to set it up, and then you will have browser automation in jcode as well. \n\nAgent grep is a grep tool I made for the jcode agent. It adds file strucuture information (ie the list of functions, their displacement, etc) to the grep return, so that the agent can infer more of what the file doesn without actually reading the file. It also implements a harness-level integration that adaptively truncates returns based on what the agent has already seen. This saves on context a lot. \n\nInputs are by default interleaved with the working agent. It sends the input as soon as it safely can without breaking the KV cache. Submit with shift enter instead, and it will send a queue send, and wait for the agent to fully finish its turn before sending.\n\nResume sessions from different harnesses. Claude code broke on you? Resume the session from jcode and continue where you left off. Session resume is supported for codex, claude code, opencode, and pi. \n\n<img width=\"2877\" height=\"1762\" alt=\"Screenshot from 2026-04-11 16-28-52\" src=\"https://github.com/user-attachments/assets/c2b383cf-2531-4217-85ae-6a863354dc97\" />\nimage of /Resume for codex sessions\n\n\nSkills are not all loaded on startup. The conversation is embedded as a semantic vector, and will automatically inject a skill if there is an embedding hit similar to memories. The agent has a skill tool for you to manually activate a skill at anytime. You may also activate via slash commands. \n\n---\n\n## iOS Application / Native OpenClaw\n\nA native iOS application version of jcode is coming soon. This will allow you to work with jcode on your personal machine's environment from your phone, via Tailscale. Openclaw like features will be bundled with this iOS application. \n\n---\n\n## Other planned features\n\nAgents dont like to commit in dirty git state with active changes. Git was clearly not built for multi-agent workflows, and git worktrees is not a good solution. Given this, I believe that is an opporunity for a new git like primitive to be born. \n\nBuild speed improvements: An incremental debug cargo build with cache enabled takes about 1 minute on my machine. The goal is 5-20 seconds. Refactors and crates seams should be able to make this happen. \n\n<!-- Add iOS / native OpenClaw preview and fuller writeup here. -->\n\n---\n\n<div align=\"center\">\n\n## Quick Start\n\n</div>\n\n```bash\n# Launch the TUI\njcode\n\n# Run a single command non-interactively\njcode run \"say hello\"\n\n# Resume a previous session by memorable name\njcode --resume fox\n\n# Run as a persistent background server, then attach more clients\njcode serve\njcode connect\n\n# Send voice input from your configured STT command\njcode dictate\n```\n\njcode supports interactive TUI use, non-interactive runs, persistent server/client workflows,\nand hotkey-friendly dictation without requiring a bundled speech-to-text stack.\n\n<div align=\"center\">\n\n  <a href=\"https://github.com/1jehuang/jcode/releases/download/readme-assets/workflow.mp4\">\n    <img src=\"https://github.com/1jehuang/jcode/releases/download/readme-assets/jcode-workflow-demonstration.webp\" alt=\"jcode workflow demonstration\" width=\"900\">\n  </a>\n\n  <p><em>jcode workflow demonstration</em></p>\n\n</div>\n\n---\n\n## Browser Automation\n\njcode includes a first-class built-in `browser` tool for browser control inside agent sessions.\n\nCurrent built-in backend:\n- Firefox via Firefox Agent Bridge\n\nCurrent built-in tool actions include:\n- `status`\n- `setup`\n- `open`\n- `snapshot`\n- `get_content`\n- `interactables`\n- `click`\n- `type`\n- `fill_form`\n- `select`\n- `wait`\n- `screenshot`\n- `eval`\n- `scroll`\n- `upload`\n- `press`\n\nQuick setup:\n\n```bash\njcode browser status\njcode browser setup\n```\n\nOnce setup is complete, the model can use the built-in `browser` tool directly. The UI also summarizes browser tool calls compactly, for example opening a URL, clicking a selector, or typing into a field without echoing sensitive typed text.\n\nNotes:\n- the provider/tool architecture is in place for additional backends\n- Firefox is the wired built-in backend today\n- Chrome bridge / remote debugging style providers can be added on top of the same browser tool later\n\n---\n\n## Further Reading\n\n- [Ambient Mode / OpenClaw](docs/AMBIENT_MODE.md)\n- [Browser Provider Protocol](docs/BROWSER_PROVIDER_PROTOCOL.md)\n- [Memory Architecture](docs/MEMORY_ARCHITECTURE.md)\n- [Swarm Architecture](docs/SWARM_ARCHITECTURE.md)\n- [Server Architecture](docs/SERVER_ARCHITECTURE.md)\n- [iOS Client Notes](docs/IOS_CLIENT.md)\n- [Safety System](docs/SAFETY_SYSTEM.md)\n- [Windows Notes](docs/WINDOWS.md)\n- [Wrappers and Shell Integration](docs/WRAPPERS.md)\n- [Refactoring Notes](docs/REFACTORING.md)\n\n---\n\n## Detailed Installation\n\n### Setup\n\nIf you want another agent to set up jcode for you, give it this prompt:\n\n```text\nSet up jcode on this machine for me.\n\n1. Detect the operating system, available package managers, and shell environment, then install jcode using the best matching command below instead of referring me somewhere else:\n\n   - macOS with Homebrew available:\n     brew tap 1jehuang/jcode\n     brew install jcode\n\n   - macOS or Linux via install script:\n     curl -fsSL https://raw.githubusercontent.com/1jehuang/jcode/master/scripts/install.sh | bash\n\n   - Windows PowerShell:\n     irm https://raw.githubusercontent.com/1jehuang/jcode/master/scripts/install.ps1 | iex\n\n   - From source if the above paths are not appropriate:\n     git clone https://github.com/1jehuang/jcode.git\n     cd jcode\n     cargo build --release\n     scripts/install_release.sh\n\n   - For local self-dev / refactor work on Linux x86_64, prefer:\n     scripts/dev_cargo.sh build --release -p jcode --bin jcode\n     scripts/dev_cargo.sh --print-setup\n     scripts/install_release.sh\n\n2. Verify that `jcode` is on my `PATH`.\n3. Launch `jcode` once in a new terminal window/session to confirm it starts successfully.\n4. Before attempting any interactive login flow, assess which providers are already available non-interactively and prefer those first. Check existing local credentials, config files, CLI sessions, and environment variables such as:\n   - Claude: `~/.jcode/auth.json`, `~/.claude/.credentials.json`, `~/.local/share/opencode/auth.json`, `ANTHROPIC_API_KEY`\n   - OpenAI: `~/.jcode/openai-auth.json`, `~/.codex/auth.json`, `OPENAI_API_KEY`\n   - Gemini: `~/.jcode/gemini_oauth.json`, `~/.gemini/oauth_creds.json`\n   - GitHub Copilot: existing auth under `~/.config/github-copilot/`\n   - Azure OpenAI: `~/.config/jcode/azure-openai.env`, `AZURE_OPENAI_*`, or an existing `az login`\n   - OpenRouter: `OPENROUTER_API_KEY`\n   - Fireworks: `~/.config/jcode/fireworks.env`, `FIREWORKS_API_KEY`\n   - MiniMax: `~/.config/jcode/minimax.env`, `MINIMAX_API_KEY`\n   - NVIDIA NIM: `~/.config/jcode/nvidia-nim.env`, `NVIDIA_API_KEY`\n   - Alibaba Cloud Coding Plan: existing jcode config/env if present\n5. Prefer whichever provider is already configured and verify it with `jcode auth-test --all-configured` or a provider-specific auth test when appropriate.\n6. Only if no usable provider is already configured, guide me through the minimal manual step needed:\n   - Claude: `jcode login --provider claude`\n   - GitHub Copilot: `jcode login --provider copilot`\n   - OpenAI: `jcode login --provider openai`\n   - Gemini: `jcode login --provider gemini`\n   - Azure OpenAI: `jcode login --provider azure`\n   - Fireworks: `jcode login --provider fireworks`\n   - MiniMax: `jcode login --provider minimax`\n   - NVIDIA NIM: `jcode login --provider nvidia-nim`\n   - Alibaba Cloud Coding Plan: `jcode login --provider alibaba-coding-plan`\n   - OpenRouter: help me set `OPENROUTER_API_KEY`\n   - Anthropic direct API: help me set `ANTHROPIC_API_KEY`\n7. After setup, run a simple smoke test with `jcode run \"say hello\"` and confirm it works.\n8. If I want browser automation, also check `jcode browser status`. If browser automation is not ready, run `jcode browser setup`, verify the built-in `browser` tool works, and explain any remaining manual step.\n9. Explain any manual step that still needs me, especially browser OAuth, device login, API key entry, or browser extension approval.\n```\n\nThis is intended to be a copy-paste bootstrap prompt for jcode itself or any other coding agent.\n\n### Quick Install\n\n```bash\n# macOS & Linux\ncurl -fsSL https://raw.githubusercontent.com/1jehuang/jcode/master/scripts/install.sh | bash\n```\n\nOn Termux, install the glibc runtime and `patchelf` first so the installer can\npatch the downloaded Linux binary to Termux's glibc dynamic linker and create a\nlauncher that avoids Termux's `LD_PRELOAD` shim:\n\n```bash\npkg install glibc patchelf\ncurl -fsSL https://raw.githubusercontent.com/1jehuang/jcode/master/scripts/install.sh | bash\n```\n\n```powershell\n# Windows (PowerShell)\nirm https://raw.githubusercontent.com/1jehuang/jcode/master/scripts/install.ps1 | iex\n```\n\n### macOS via Homebrew\n\n```bash\nbrew tap 1jehuang/jcode\nbrew install jcode\n```\n\n### From Source (all platforms)\n\n```bash\ngit clone https://github.com/1jehuang/jcode.git\ncd jcode\ncargo build --release\n```\n\nFor local self-dev / refactor work on Linux x86_64, prefer:\n\n```bash\nscripts/dev_cargo.sh build --release -p jcode --bin jcode\nscripts/dev_cargo.sh --print-setup\n```\n\nThat wrapper automatically uses `sccache` when available, prefers a fast\nworking local linker setup (`clang + lld`) instead of assuming every machine's\n`mold` configuration is valid, and can print the active linker/cache setup via\n`--print-setup` so slow-path builds are easier to diagnose.\n\nThen symlink to your PATH:\n\n```bash\nscripts/install_release.sh\n```\n\n### Platform Support\n\n| Platform | Status |\n|---|---|\n| **Linux** x86_64 / aarch64 | Fully supported |\n| **macOS** Apple Silicon & Intel | Supported |\n| **Windows** x86_64 | Supported (native + WSL2) |\n| **Termux** aarch64 / x86_64 | Supported with `pkg install glibc patchelf` |\n\n</div>\n","summary":"jcode is a high-performance, resource-efficient coding agent designed to support complex, multi-session software development workflows. It offers deep customizability and is engineered to maintain a minimal memory footprint, ensuring speed and scalability across various operating systems. This tool is ideal for developers who require a powerful, lightweight alternative to standard CLI coding agents for demanding, long-running programming tasks.","description":"Coding Agent Harness","stars":6831,"language":"Rust"},{"owner":"mattpocock","repo":"sandcastle","url":"https://github.com/mattpocock/sandcastle","readme":"<div align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://res.cloudinary.com/total-typescript/image/upload/v1775033787/readme-sandcastle-ondark_2x.png\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://res.cloudinary.com/total-typescript/image/upload/v1775033787/readme-sandcastle-onlight_2x.png\">\n    <img alt=\"Sandcastle\" src=\"https://res.cloudinary.com/total-typescript/image/upload/v1775033787/readme-sandcastle-onlight_2x.png\" height=\"200\" style=\"margin-bottom: 20px;\">\n  </picture>\n</div>\n\n## What Is Sandcastle?\n\nA TypeScript library for orchestrating AI coding agents in isolated sandboxes:\n\n1. You invoke agents with a single `sandcastle.run()`.\n2. Sandcastle handles sandboxing the agent with a configurable branch strategy.\n3. The commits made on the branches get merged back.\n\nSandcastle is provider-agnostic — it ships with built-in providers for Docker, Podman, and Vercel, and you can create your own. Great for parallelizing multiple AFK agents, creating review pipelines, or even just orchestrating your own agents.\n\n## Prerequisites\n\n- [Git](https://git-scm.com/)\n- A sandbox provider — Sandcastle needs an isolated environment to run agents in. Built-in options:\n  - [Docker Desktop](https://www.docker.com/) — most common for local development\n  - [Podman](https://podman.io/) — rootless alternative to Docker\n  - [Vercel](https://vercel.com/) — cloud-based Firecracker microVMs via `@vercel/sandbox`\n  - Or [create your own](#custom-sandbox-providers) using `createBindMountSandboxProvider` or `createIsolatedSandboxProvider`\n\n## Quick start\n\n1. Install the package:\n\n```bash\nnpm install --save-dev @ai-hero/sandcastle\n```\n\n2. Run `npx @ai-hero/sandcastle init`. This scaffolds a `.sandcastle` directory with all the files needed.\n\n```bash\nnpx @ai-hero/sandcastle init\n```\n\n3. Edit `.sandcastle/.env` and fill in your default values for `ANTHROPIC_API_KEY`. If you want to use your Claude subscription instead of an API key, see [#191](https://github.com/mattpocock/sandcastle/issues/191).\n\n```bash\ncp .sandcastle/.env.example .sandcastle/.env\n```\n\n4. Run the `.sandcastle/main.ts` (or `main.mts`) file with `npx tsx`\n\n```bash\nnpx tsx .sandcastle/main.ts\n```\n\n```typescript\n// 3. Run the agent via the JS API\nimport { run, claudeCode } from \"@ai-hero/sandcastle\";\nimport { docker } from \"@ai-hero/sandcastle/sandboxes/docker\";\n\nawait run({\n  agent: claudeCode(\"claude-opus-4-7\"),\n  sandbox: docker(), // or podman(), vercel(), or your own provider\n  promptFile: \".sandcastle/prompt.md\",\n});\n```\n\n## Sandbox Providers\n\nSandcastle uses a `SandboxProvider` to create isolated environments. The `sandbox` option on `run()`, `interactive()`, and `createSandbox()` accepts any provider, including `noSandbox()` — opt in to running the agent directly on the host when container isolation is undesired. Built-in providers:\n\n| Provider   | Import path                                | Type       | Accepted by                                 |\n| ---------- | ------------------------------------------ | ---------- | ------------------------------------------- |\n| Docker     | `@ai-hero/sandcastle/sandboxes/docker`     | Bind-mount | `run()`, `createSandbox()`, `interactive()` |\n| Podman     | `@ai-hero/sandcastle/sandboxes/podman`     | Bind-mount | `run()`, `createSandbox()`, `interactive()` |\n| Vercel     | `@ai-hero/sandcastle/sandboxes/vercel`     | Isolated   | `run()`, `createSandbox()`, `interactive()` |\n| No-sandbox | `@ai-hero/sandcastle/sandboxes/no-sandbox` | None       | `run()`, `createSandbox()`, `interactive()` |\n\nWorktree methods (`wt.run()`, `wt.interactive()`, `wt.createSandbox()`) accept the same providers as their top-level counterparts. `wt.interactive()` defaults to `noSandbox()` when no sandbox is specified.\n\n```typescript\nimport { docker } from \"@ai-hero/sandcastle/sandboxes/docker\";\nimport { podman } from \"@ai-hero/sandcastle/sandboxes/podman\";\nimport { vercel } from \"@ai-hero/sandcastle/sandboxes/vercel\";\nimport { noSandbox } from \"@ai-hero/sandcastle/sandboxes/no-sandbox\";\n\n// Docker, Podman, and Vercel are interchangeable in run() and createSandbox():\nawait run({\n  agent: claudeCode(\"claude-opus-4-7\"),\n  sandbox: docker(),\n  prompt: \"...\",\n});\n\n// No-sandbox runs the agent directly on the host — accepted by run(),\n// createSandbox(), and interactive(). Skips container isolation entirely:\nawait interactive({\n  agent: claudeCode(\"claude-opus-4-7\"),\n  sandbox: noSandbox(),\n  prompt: \"...\", // optional — omit to launch the TUI with no initial prompt\n  cwd: \"/path/to/other-repo\", // optional — defaults to process.cwd()\n});\n```\n\nYou can also [create your own provider](#custom-sandbox-providers) using `createBindMountSandboxProvider` or `createIsolatedSandboxProvider`.\n\n## API\n\nSandcastle exports a programmatic `run()` function for use in scripts, CI pipelines, or custom tooling. The examples below use `docker()`, but any `SandboxProvider` works in its place.\n\n```typescript\nimport { run, claudeCode } from \"@ai-hero/sandcastle\";\nimport { docker } from \"@ai-hero/sandcastle/sandboxes/docker\";\n\nconst result = await run({\n  agent: claudeCode(\"claude-opus-4-7\"),\n  sandbox: docker(),\n  promptFile: \".sandcastle/prompt.md\",\n});\n\nconsole.log(result.iterations.length); // number of iterations executed\nconsole.log(result.iterations); // per-iteration results with optional sessionId\nconsole.log(result.commits); // array of { sha } for commits created\nconsole.log(result.branch); // target branch name\n```\n\n### All options\n\n```typescript\nimport { run, claudeCode } from \"@ai-hero/sandcastle\";\nimport { docker } from \"@ai-hero/sandcastle/sandboxes/docker\";\n\nconst result = await run({\n  // Agent provider — required. Pass a model string to claudeCode().\n  // Optional second arg for provider-specific options like effort level.\n  agent: claudeCode(\"claude-opus-4-7\", { effort: \"high\" }),\n\n  // Sandbox provider — required. Any SandboxProvider works (docker, podman, vercel, or custom).\n  // Provider-specific config (like imageName, mounts) lives inside the provider factory call.\n  sandbox: docker({\n    imageName: \"sandcastle:local\",\n    // Optional: override the UID/GID used for --user flag (defaults to host UID/GID).\n    // Must match the UID baked into the image. Pre-flight check catches mismatches.\n    // containerUid: 1000,\n    // containerGid: 1000,\n    // Optional: mount host directories into the sandbox (e.g. package manager caches)\n    // hostPath supports absolute, tilde-expanded (~), and relative paths (resolved from cwd).\n    // sandboxPath supports absolute and relative paths (resolved from the sandbox repo directory).\n    mounts: [\n      { hostPath: \"~/.npm\", sandboxPath: \"/home/agent/.npm\", readonly: true },\n      { hostPath: \"data\", sandboxPath: \"data\" }, // mounts <cwd>/data → <sandbox-repo>/data\n    ],\n    // Optional: SELinux volume label — \"z\" (default, shared), \"Z\" (private), or false (none).\n    // No-op on non-SELinux systems (Docker Desktop on macOS/Windows, Linux without SELinux).\n    selinuxLabel: \"z\",\n    // Optional: provider-level env vars merged at launch time\n    env: { DOCKER_SPECIFIC: \"value\" },\n    // Optional: attach container to Docker network(s) — string or string[]\n    network: \"my-network\",\n    // Optional: add the container user to supplementary groups via --group-add.\n    // Accepts group names or numeric GIDs (e.g. for a bind-mounted Docker socket).\n    groups: [\"docker\", 999],\n    // Optional: expose host devices via --device. Each entry is a full device\n    // spec in host[:container[:permissions]] form (e.g. \"/dev/kvm\").\n    devices: [\"/dev/kvm\"],\n    // Optional: limit CPU resources via --cpus. Fractional values allowed (e.g. 1.5).\n    // cpus: 2,\n  }),\n\n  // Host repo directory — replaces process.cwd() as the anchor for\n  // .sandcastle/ artifacts (worktrees, logs, env, patches) and git operations.\n  // Relative paths resolve against process.cwd(). Defaults to process.cwd().\n  cwd: \"../other-repo\",\n\n  // Branch strategy — controls how the agent's changes relate to branches.\n  // Defaults to { type: \"head\" } for bind-mount and { type: \"merge-to-head\" } for isolated providers.\n  branchStrategy: { type: \"branch\", branch: \"agent/fix-42\" },\n\n  // Prompt source — provide one of these, not both.\n  // Note: promptFile resolves against process.cwd(), NOT cwd.\n  promptFile: \".sandcastle/prompt.md\", // path to a prompt file\n  // prompt: \"Fix issue #42 in this repo\", // OR an inline prompt string\n\n  // Values substituted for {{KEY}} placeholders in the prompt.\n  promptArgs: {\n    ISSUE_NUMBER: \"42\",\n  },\n\n  // Maximum number of agent iterations to run before stopping. Default: 1\n  maxIterations: 5,\n\n  // Display name for this run, shown as a prefix in log output.\n  name: \"fix-issue-42\",\n\n  // Lifecycle hooks grouped by where they run: host or sandbox.\n  hooks: {\n    host: {\n      onWorktreeReady: [{ command: \"cp .env.example .env\" }],\n      onSandboxReady: [{ command: \"echo setup done\" }],\n    },\n    sandbox: {\n      onSandboxReady: [{ command: \"npm install\" }],\n    },\n  },\n\n  // Host-relative file paths to copy into the sandbox before the container starts.\n  // Not supported with branchStrategy: { type: \"head\" }.\n  copyToWorktree: [\".env\"],\n\n  // Override default timeouts for built-in lifecycle steps.\n  // Unset keys keep their defaults.\n  timeouts: {\n    copyToWorktreeMs: 120_000, // default: 60_000\n    gitSetupMs: 30_000, // default: 10_000\n    commitCollectionMs: 60_000, // default: 30_000\n    mergeToHostMs: 60_000, // default: 30_000\n  },\n\n  // How to record progress. Default: write to a file under .sandcastle/logs/\n  logging: {\n    type: \"file\",\n    path: \".sandcastle/logs/my-run.log\",\n    // Optional: forward the agent's output stream to your own observability system.\n    // Fires for each text chunk and tool call the agent produces. Errors thrown\n    // by the callback are swallowed so a broken forwarder cannot kill the run.\n    onAgentStreamEvent: (event) => {\n      // event is { type: \"text\" | \"toolCall\", iteration, timestamp, ... }\n      myLogger.info(event);\n    },\n  },\n  // logging: { type: \"stdout\" }, // OR render an interactive UI in the terminal\n\n  // String (or array of strings) the agent emits to end the iteration loop early.\n  // Default: \"<promise>COMPLETE</promise>\"\n  completionSignal: \"<promise>COMPLETE</promise>\",\n\n  // Idle timeout in seconds — resets whenever the agent produces output. Default: 600 (10 minutes)\n  idleTimeoutSeconds: 600,\n\n  // Grace window in seconds after the agent emits a completion signal but\n  // before its process has exited (a \"hanging process\" — typically a spawned\n  // `gh`/git child or MCP server keeping stdout open). Resets on every\n  // subsequent output line so trailing data is still captured. Default: 60\n  completionTimeoutSeconds: 60,\n\n  // Structured output — extract a typed payload from the agent's stdout.\n  // Requires maxIterations === 1 and the tag must appear in the prompt.\n  // output: Output.object({ tag: \"result\", schema: z.object({ answer: z.number() }) }),\n  // output: Output.string({ tag: \"summary\" }),\n});\n\nconsole.log(result.iterations.length); // number of iterations executed\nconsole.log(result.completionSignal); // matched signal string, or undefined if none fired\nconsole.log(result.commits); // array of { sha } for commits created\nconsole.log(result.branch); // target branch name\n```\n\n### `createSandbox()` — reusable sandbox\n\nUse `createSandbox()` when you need to run multiple agents (or multiple rounds of the same agent) inside a single sandbox. It creates the sandbox once, and you call `sandbox.run()` as many times as you need. This avoids repeated container startup costs and keeps all runs on the same branch.\n\nUse `run()` instead when you only need a single one-shot invocation — it handles sandbox lifecycle automatically.\n\n#### Basic single-run usage\n\n```typescript\nimport { createSandbox, claudeCode } from \"@ai-hero/sandcastle\";\nimport { docker } from \"@ai-hero/sandcastle/sandboxes/docker\";\n\nawait using sandbox = await createSandbox({\n  branch: \"agent/fix-42\",\n  sandbox: docker(),\n});\n\nconst result = await sandbox.run({\n  agent: claudeCode(\"claude-opus-4-7\"),\n  prompt: \"Fix issue #42 in this repo.\",\n});\n\nconsole.log(result.commits); // [{ sha: \"abc123\" }]\n```\n\n#### Multi-run implement-then-review\n\n```typescript\nimport { createSandbox, claudeCode } from \"@ai-hero/sandcastle\";\nimport { docker } from \"@ai-hero/sandcastle/sandboxes/docker\";\n\nawait using sandbox = await createSandbox({\n  branch: \"agent/fix-42\",\n  sandbox: docker(),\n  hooks: { sandbox: { onSandboxReady: [{ command: \"npm install\" }] } },\n});\n\n// Step 1: implement\nconst implResult = await sandbox.run({\n  agent: claudeCode(\"claude-opus-4-7\"),\n  promptFile: \".sandcastle/implement.md\",\n  maxIterations: 5,\n});\n\n// Step 2: review on the same branch, same container\nconst reviewResult = await sandbox.run({\n  agent: claudeCode(\"claude-sonnet-4-6\"),\n  prompt: \"Review the changes and fix any issues.\",\n});\n```\n\nCommits from all `run()` calls accumulate on the same branch. The sandbox container stays alive between runs, so installed dependencies and build artifacts persist.\n\n#### Automatic cleanup with `await using`\n\n`await using` calls `sandbox.close()` automatically when the block exits. If the sandbox has uncommitted changes, the worktree is preserved on disk; if clean, both container and worktree are removed.\n\n#### Manual `close()` with `CloseResult`\n\n```typescript\nconst sandbox = await createSandbox({\n  branch: \"agent/fix-42\",\n  sandbox: docker(),\n});\n// ... run agents ...\nconst closeResult = await sandbox.close();\nif (closeResult.preservedWorktreePath) {\n  console.log(`Worktree preserved at ${closeResult.preservedWorktreePath}`);\n}\n```\n\n#### `CreateSandboxOptions`\n\n| Option           | Type            | Default         | Description                                                                                                         |\n| ---------------- | --------------- | --------------- | ------------------------------------------------------------------------------------------------------------------- |\n| `branch`         | string          | —               | **Required.** Explicit branch for the sandbox                                                                       |\n| `sandbox`        | SandboxProvider | —               | **Required.** Sandbox provider (e.g. `docker()`, `podman()`)                                                        |\n| `cwd`            | string          | `process.cwd()` | Host repo directory — relative paths resolve against `process.cwd()`                                                |\n| `hooks`          | SandboxHooks    | —               | Lifecycle hooks (`host.*`, `sandbox.*`) — run once at creation time                                                 |\n| `copyToWorktree` | string[]        | —               | Host-relative file paths to copy into the sandbox at creation time                                                  |\n| `timeouts`       | Timeouts        | —               | Override built-in lifecycle step timeouts (`copyToWorktreeMs`, `gitSetupMs`, `commitCollectionMs`, `mergeToHostMs`) |\n\n#### `Sandbox`\n\n| Property / Method       | Type                                                               | Description                                  |\n| ----------------------- | ------------------------------------------------------------------ | -------------------------------------------- |\n| `branch`                | string                                                             | The branch the sandbox is on                 |\n| `worktreePath`          | string                                                             | Host path to the worktree                    |\n| `run(options)`          | `(SandboxRunOptions) => Promise<SandboxRunResult>`                 | Invoke an agent inside the existing sandbox  |\n| `interactive(options)`  | `(SandboxInteractiveOptions) => Promise<SandboxInteractiveResult>` | Launch an interactive session in the sandbox |\n| `close()`               | `() => Promise<CloseResult>`                                       | Tear down the container and sandbox          |\n| `[Symbol.asyncDispose]` | `() => Promise<void>`                                              | Auto teardown via `await using`              |\n\n#### `SandboxRunOptions`\n\n| Option                     | Type               | Default                       | Description                                                                          |\n| -------------------------- | ------------------ | ----------------------------- | ------------------------------------------------------------------------------------ |\n| `agent`                    | AgentProvider      | —                             | **Required.** Agent provider (e.g. `claudeCode(\"claude-opus-4-7\")`)                  |\n| `prompt`                   | string             | —                             | Inline prompt (mutually exclusive with `promptFile`)                                 |\n| `promptFile`               | string             | —                             | Path to prompt file (mutually exclusive with `prompt`)                               |\n| `promptArgs`               | PromptArgs         | —                             | Key-value map for `{{KEY}}` placeholder substitution                                 |\n| `maxIterations`            | number             | `1`                           | Maximum iterations to run                                                            |\n| `completionSignal`         | string \\| string[] | `<promise>COMPLETE</promise>` | String(s) the agent emits to stop the iteration loop early                           |\n| `idleTimeoutSeconds`       | number             | `600`                         | Idle timeout in seconds — resets on each agent output event                          |\n| `completionTimeoutSeconds` | number             | `60`                          | Grace window after the completion signal is seen but the agent process hasn't exited |\n| `name`                     | string             | —                             | Display name for the run                                                             |\n| `logging`                  | object             | file (auto-generated)         | `{ type: 'file', path }` or `{ type: 'stdout' }`                                     |\n| `signal`                   | AbortSignal        | —                             | Cancels the run when aborted; handle stays usable afterward                          |\n\n#### `SandboxRunResult`\n\n| Field              | Type                | Description                                                        |\n| ------------------ | ------------------- | ------------------------------------------------------------------ |\n| `iterations`       | `IterationResult[]` | Per-iteration results (use `.length` for the count)                |\n| `completionSignal` | string?             | The matched completion signal string, or `undefined` if none fired |\n| `stdout`           | string              | Combined agent output from all iterations                          |\n| `commits`          | `{ sha }[]`         | Commits created during the run                                     |\n| `logFilePath`      | string?             | Path to the log file (only when logging to a file)                 |\n\n#### `CloseResult`\n\n| Field                   | Type    | Description                                                              |\n| ----------------------- | ------- | ------------------------------------------------------------------------ |\n| `preservedWorktreePath` | string? | Host path to the preserved worktree, set when it had uncommitted changes |\n\n### `createWorktree()` — independent worktree lifecycle\n\nUse `createWorktree()` when you need a worktree (git worktree) as an independent, first-class concept — separate from any sandbox. This is useful when you want to run an interactive session first and then hand the same worktree to a sandboxed AFK agent.\n\nOnly `branch` and `merge-to-head` strategies are accepted; `head` is a compile-time type error since it means no worktree.\n\nPass `cwd` to target a repo other than `process.cwd()`. Relative paths resolve against `process.cwd()`; absolute paths pass through. A `CwdError` is thrown if the path does not exist or is not a directory.\n\n```typescript\nimport { createWorktree } from \"@ai-hero/sandcastle\";\n\nawait using wt = await createWorktree({\n  branchStrategy: { type: \"branch\", branch: \"agent/fix-42\" },\n  copyToWorktree: [\"node_modules\"],\n  cwd: \"/path/to/other-repo\", // optional — defaults to process.cwd()\n});\n\nconsole.log(wt.worktreePath); // host path to the worktree\nconsole.log(wt.branch); // \"agent/fix-42\"\n\n// Run an interactive session in the worktree (defaults to noSandbox)\nawait wt.interactive({\n  agent: claudeCode(\"claude-opus-4-7\"),\n  prompt: \"Explore the codebase and understand the bug.\",\n});\n\n// Run an AFK agent in the worktree (sandbox is required)\nconst result = await wt.run({\n  agent: claudeCode(\"claude-opus-4-7\"),\n  sandbox: docker({ imageName: \"sandcastle:myrepo\" }),\n  prompt: \"Fix issue #42.\",\n  maxIterations: 3,\n});\nconsole.log(result.commits); // commits made during the run\n\n// Create a long-lived sandbox from the worktree\nimport { docker } from \"@ai-hero/sandcastle/sandboxes/docker\";\n\nawait using sandbox = await wt.createSandbox({\n  sandbox: docker(),\n  hooks: { sandbox: { onSandboxReady: [{ command: \"npm install\" }] } },\n});\n\n// sandbox.close() tears down the container only — the worktree stays\nawait sandbox.close();\n\n// wt.close() cleans up the worktree\n```\n\n`wt.close()` checks for uncommitted changes: if the worktree is dirty, it's preserved on disk; if clean, it's removed. `await using` calls `close()` automatically. The worktree persists after `run()`, `interactive()`, and `createSandbox()` complete, so you can hand it to another agent or inspect it.\n\n**Split ownership**: When a sandbox is created via `wt.createSandbox()`, `sandbox.close()` tears down the container only — the worktree remains. `wt.close()` is responsible for worktree cleanup. This differs from the top-level `createSandbox()`, where `sandbox.close()` owns both container and worktree.\n\n#### `CreateWorktreeOptions`\n\n| Option           | Type                   | Default | Description                                                                                                         |\n| ---------------- | ---------------------- | ------- | ------------------------------------------------------------------------------------------------------------------- |\n| `branchStrategy` | WorktreeBranchStrategy | —       | **Required.** `{ type: \"branch\", branch }` or `{ type: \"merge-to-head\" }`                                           |\n| `copyToWorktree` | string[]               | —       | Host-relative file paths to copy into the worktree at creation time                                                 |\n| `timeouts`       | Timeouts               | —       | Override built-in lifecycle step timeouts (`copyToWorktreeMs`, `gitSetupMs`, `commitCollectionMs`, `mergeToHostMs`) |\n\n#### `Worktree`\n\n| Property / Method        | Type                                                                  | Description                                         |\n| ------------------------ | --------------------------------------------------------------------- | --------------------------------------------------- |\n| `branch`                 | string                                                                | The branch the worktree is on                       |\n| `worktreePath`           | string                                                                | Host path to the worktree                           |\n| `run(options)`           | `(options: WorktreeRunOptions) => Promise<WorktreeRunResult>`         | Run an AFK agent in the worktree (sandbox required) |\n| `interactive(options)`   | `(options: WorktreeInteractiveOptions) => Promise<InteractiveResult>` | Run an interactive agent session in the worktree    |\n| `createSandbox(options)` | `(options: WorktreeCreateSandboxOptions) => Promise<Sandbox>`         | Create a long-lived sandbox backed by this worktree |\n| `close()`                | `() => Promise<CloseResult>`                                          | Clean up the worktree (preserves if dirty)          |\n| `[Symbol.asyncDispose]`  | `() => Promise<void>`                                                 | Auto cleanup via `await using`                      |\n\n#### `WorktreeInteractiveOptions`\n\n| Option       | Type                   | Default       | Description                                                                                       |\n| ------------ | ---------------------- | ------------- | ------------------------------------------------------------------------------------------------- |\n| `agent`      | AgentProvider          | —             | **Required.** Agent provider                                                                      |\n| `sandbox`    | AnySandboxProvider     | `noSandbox()` | Sandbox provider (defaults to no sandbox)                                                         |\n| `prompt`     | string                 | —             | Inline prompt (mutually exclusive with `promptFile`)                                              |\n| `promptFile` | string                 | —             | Path to prompt file                                                                               |\n| `name`       | string                 | —             | Optional session name                                                                             |\n| `hooks`      | SandboxHooks           | —             | Lifecycle hooks (`host.*`, `sandbox.*`)                                                           |\n| `promptArgs` | PromptArgs             | —             | Key-value map for `{{KEY}}` placeholder substitution                                              |\n| `env`        | Record<string, string> | —             | Environment variables to inject into the sandbox                                                  |\n| `signal`     | AbortSignal            | —             | Cancel the session when aborted. The worktree is preserved on disk. Rejects with `signal.reason`. |\n\n#### `WorktreeRunOptions`\n\n| Option                     | Type                   | Default | Description                                                                                                                          |\n| -------------------------- | ---------------------- | ------- | ------------------------------------------------------------------------------------------------------------------------------------ |\n| `agent`                    | AgentProvider          | —       | **Required.** Agent provider                                                                                                         |\n| `sandbox`                  | SandboxProvider        | —       | **Required.** Sandbox provider (AFK agents must be sandboxed)                                                                        |\n| `prompt`                   | string                 | —       | Inline prompt (mutually exclusive with `promptFile`)                                                                                 |\n| `promptFile`               | string                 | —       | Path to prompt file                                                                                                                  |\n| `maxIterations`            | number                 | 1       | Maximum iterations to run                                                                                                            |\n| `completionSignal`         | string \\| string[]     | —       | Substring(s) to stop the iteration loop early                                                                                        |\n| `idleTimeoutSeconds`       | number                 | 600     | Idle timeout in seconds                                                                                                              |\n| `completionTimeoutSeconds` | number                 | 60      | Grace window after completion signal is seen but agent process hasn't exited                                                         |\n| `name`                     | string                 | —       | Optional run name                                                                                                                    |\n| `logging`                  | LoggingOption          | file    | Logging mode                                                                                                                         |\n| `hooks`                    | SandboxHooks           | —       | Lifecycle hooks (`host.*`, `sandbox.*`)                                                                                              |\n| `promptArgs`               | PromptArgs             | —       | Key-value map for `{{KEY}}` placeholder substitution                                                                                 |\n| `env`                      | Record<string, string> | —       | Environment variables to inject into the sandbox                                                                                     |\n| `resumeSession`            | string                 | —       | Resume a prior session by ID for agents that support resume. Incompatible with `maxIterations > 1`. Session file must exist on host. |\n| `signal`                   | AbortSignal            | —       | Cancel the run when aborted. Kills the in-flight agent subprocess; the worktree is preserved on disk. Rejects with `signal.reason`.  |\n\n#### `WorktreeRunResult`\n\n| Property           | Type                | Description                                            |\n| ------------------ | ------------------- | ------------------------------------------------------ |\n| `iterations`       | `IterationResult[]` | Per-iteration results (use `.length` for the count)    |\n| `completionSignal` | string              | The matched completion signal, or undefined            |\n| `stdout`           | string              | Combined stdout output from all agent iterations       |\n| `commits`          | { sha: string }[]   | List of commits made by the agent during the run       |\n| `branch`           | string              | The branch name the agent worked on                    |\n| `logFilePath`      | string              | Path to the log file, if logging was drained to a file |\n\n#### `WorktreeCreateSandboxOptions`\n\n| Option           | Type            | Default | Description                                                                                                         |\n| ---------------- | --------------- | ------- | ------------------------------------------------------------------------------------------------------------------- |\n| `sandbox`        | SandboxProvider | —       | **Required.** Sandbox provider (e.g. `docker()`)                                                                    |\n| `hooks`          | SandboxHooks    | —       | Lifecycle hooks (`host.*`, `sandbox.*`)                                                                             |\n| `copyToWorktree` | string[]        | —       | Host-relative file paths to copy into the worktree at creation time                                                 |\n| `timeouts`       | Timeouts        | —       | Override built-in lifecycle step timeouts (`copyToWorktreeMs`, `gitSetupMs`, `commitCollectionMs`, `mergeToHostMs`) |\n\n## How it works\n\nSandcastle uses a **branch strategy** configured on the sandbox provider to control how the agent's changes relate to branches. There are three strategies:\n\n- **Head** (`{ type: \"head\" }`) — The agent writes directly to the host working directory. No worktree, no branch indirection. This is the default for bind-mount providers like `docker()`.\n- **Merge-to-head** (`{ type: \"merge-to-head\" }`) — Sandcastle creates a temporary branch in a git worktree. The agent works on the temp branch, and changes are merged back to HEAD when done. The temp branch is cleaned up after merge.\n- **Branch** (`{ type: \"branch\", branch: \"foo\" }`) — Commits land on an explicitly named branch in a git worktree. Re-running with the same branch reuses the existing worktree and fast-forwards it from `origin` when safe — see [ADR 0003](docs/adr/0003-reuse-worktree-by-default.md).\n\nFor bind-mount providers (like Docker), the worktree directory is bind-mounted into the container — the agent writes directly to the host filesystem through the mount, so no sync is needed.\n\nFrom your point of view, you just configure `branchStrategy: { type: 'branch', branch: 'foo' }` on `run()`, and get a commit on branch `foo` once it's complete. All 100% local.\n\n## Prompts\n\nSandcastle uses a flexible prompt system. You write the prompt, and the engine executes it — no opinions about workflow, task management, or context sources are imposed.\n\n### Prompt resolution\n\nYou must provide exactly one of:\n\n1. `prompt: \"inline string\"` — pass an inline prompt directly via `RunOptions`\n2. `promptFile: \"./path/to/prompt.md\"` — point to a specific file via `RunOptions`\n\n`prompt` and `promptFile` are mutually exclusive — providing both is an error. If neither is provided, `run()` throws an error asking you to supply one.\n\n**Inline prompts (`prompt: \"...\"`) are passed to the agent literally.** No `{{KEY}}` substitution, no `` !`command` `` expansion, no built-in `{{SOURCE_BRANCH}}` / `{{TARGET_BRANCH}}` injection. If you need values interpolated into an inline prompt, build the string in JavaScript (`` `Work on ${branch}…` ``). Passing `promptArgs` alongside an inline prompt is an error — switch to `promptFile` to use substitution.\n\nThe substitution and expansion features below apply **only** to prompts sourced from `promptFile`.\n\n> **Convention**: `sandcastle init` scaffolds `.sandcastle/prompt.md` and all templates explicitly reference it via `promptFile: \".sandcastle/prompt.md\"`. This is a convention, not an automatic fallback — Sandcastle does not read `.sandcastle/prompt.md` unless you pass it as `promptFile`.\n\n### Dynamic context with `` !`command` ``\n\nUse `` !`command` `` expressions in your prompt to pull in dynamic context. Each expression is replaced with the command's stdout before the prompt is sent to the agent. All expressions in a prompt run **in parallel** for faster expansion.\n\nCommands run **inside the sandbox** after `sandbox.onSandboxReady` hooks complete, so they see the same repo state the agent sees (including installed dependencies).\n\n```markdown\n# Open issues\n\n!`gh issue list --state open --label Sandcastle --json number,title,body,comments,labels --limit 100`\n\n# Recent commits\n\n!`git log --oneline -10`\n```\n\nIf any command exits with a non-zero code, the run fails immediately with an error.\n\n### Prompt arguments with `{{KEY}}`\n\nUse `{{KEY}}` placeholders in your prompt to inject values from the `promptArgs` option. This is useful for reusing the same prompt file across multiple runs with different parameters.\n\n```typescript\nimport { run } from \"@ai-hero/sandcastle\";\n\nawait run({\n  promptFile: \"./my-prompt.md\",\n  promptArgs: { ISSUE_NUMBER: 42, PRIORITY: \"high\" },\n});\n```\n\nIn the prompt file:\n\n```markdown\nWork on issue #{{ISSUE_NUMBER}} (priority: {{PRIORITY}}).\n```\n\nPrompt argument substitution runs on the host before shell expression expansion, so `{{KEY}}` placeholders inside `` !`command` `` expressions are replaced first:\n\n```markdown\n!`gh issue view {{ISSUE_NUMBER}} --json body -q .body`\n```\n\nA `{{KEY}}` placeholder with no matching prompt argument is an error. Unused prompt arguments produce a warning.\n\n`` !`command` `` expansion only runs on shell blocks written in the prompt file itself. Any `` !`…` `` pattern that appears inside an argument value is treated as inert text — it won't be executed against the host shell. This makes it safe to pass user-authored content (issue titles, PR descriptions, docs excerpts) through `promptArgs`.\n\n### Built-in prompt arguments\n\nSandcastle automatically injects two built-in prompt arguments into every prompt:\n\n| Placeholder         | Value                                                             |\n| ------------------- | ----------------------------------------------------------------- |\n| `{{SOURCE_BRANCH}}` | The branch the agent works on (determined by the branch strategy) |\n| `{{TARGET_BRANCH}}` | The host's active branch at `run()` time                          |\n\nUse them in your prompt without passing them via `promptArgs`:\n\n```markdown\nYou are working on {{SOURCE_BRANCH}}. When diffing, compare against {{TARGET_BRANCH}}.\n```\n\nPassing `SOURCE_BRANCH` or `TARGET_BRANCH` in `promptArgs` is an error — built-in prompt arguments cannot be overridden.\n\n### Early termination with `<promise>COMPLETE</promise>`\n\nWhen the agent outputs `<promise>COMPLETE</promise>`, the orchestrator stops the iteration loop early. This is a convention you document in your prompt for the agent to follow — the engine never injects it.\n\nThis is useful for task-based workflows where the agent should stop once it has finished, rather than running all remaining iterations.\n\nYou can override the default signal by passing `completionSignal` to `run()`. It accepts a single string or an array of strings:\n\n```ts\nawait run({\n  // ...\n  completionSignal: \"DONE\",\n});\n\n// Or pass multiple signals — the loop stops on the first match:\nawait run({\n  // ...\n  completionSignal: [\"TASK_COMPLETE\", \"TASK_ABORTED\"],\n});\n```\n\nTell the agent to output your chosen string(s) in the prompt, and the orchestrator will stop when it detects any of them. The matched signal is returned as `result.completionSignal`.\n\n#### Hanging processes after the completion signal\n\nThe agent process is expected to exit shortly after emitting the completion signal. When a child it spawned — a `gh`/git subprocess, a long-lived MCP server, etc. — inherits the agent's stdout pipe and keeps it open, the parent process can linger long past its logical end. Sandcastle would otherwise wait for the full `idleTimeoutSeconds` and fail with `AgentIdleTimeoutError`, throwing away the commits the agent already made.\n\nInstead, once the completion signal is observed in the output buffer, Sandcastle swaps in a short **completion timeout** (default 60 s). When it expires, the run resolves successfully with a warning that the process was hanging; `result.commits` and `result.completionSignal` are populated as if the process had exited cleanly. The timer resets on every subsequent output line, so trailing data emitted after the signal — token-usage events, terminal `result` events, a structured-output `<tag>` — is still captured.\n\nA clean process exit always wins the race, so healthy runs gain zero added latency. The completion timeout only matters when the process hangs.\n\nTune the window with `completionTimeoutSeconds`:\n\n```ts\nawait run({\n  // ...\n  completionTimeoutSeconds: 30, // shorter grace window\n});\n```\n\nThis is independent of `idleTimeoutSeconds`. They cover different phases: `idleTimeoutSeconds` runs **before** any signal is seen (genuinely stuck agent → fail); `completionTimeoutSeconds` runs **after** the signal is seen (hanging process → succeed with warning). See [ADR 0019](docs/adr/0019-completion-timeout-for-hanging-process.md).\n\n### Structured output\n\nUse `Output.object()` to extract a typed, schema-validated JSON payload from the agent's stdout. The agent emits its answer inside an XML tag you specify, and Sandcastle parses, validates, and returns it on `result.output`. The schema can be any [Standard Schema](https://standardschema.dev) validator — the examples below use [Zod](https://zod.dev), but Valibot, ArkType, and others work identically. See [ADR 0010](docs/adr/0010-structured-output.md) for design rationale.\n\n```ts\nimport { run, Output, claudeCode } from \"@ai-hero/sandcastle\";\nimport { docker } from \"@ai-hero/sandcastle/sandboxes/docker\";\nimport { z } from \"zod\";\n\nconst result = await run({\n  agent: claudeCode(\"claude-opus-4-7\"),\n  sandbox: docker(),\n  prompt: `Analyze the code, and output the result as JSON inside <result> tags.\n    The result must match this schema:\n    { summary: string; score: string }\n  `,\n  output: Output.object({\n    tag: \"result\",\n    schema: z.object({ summary: z.string(), score: z.number() }),\n  }),\n});\n\nconsole.log(result.output.summary); // typed as string\nconsole.log(result.output.score); // typed as number\n```\n\n`Output.string({ tag })` extracts the tag contents as a plain string (trimmed, no JSON parsing). Both helpers require `maxIterations` to be `1` (the default). The resolved prompt must contain the configured opening tag literal.\n\nWhen extraction or validation fails, `run()` throws a `StructuredOutputError`. Alongside `tag`, `rawMatched`, `cause`, `commits`, `branch`, and `preservedWorktreePath`, the error carries the `sessionId` (and `sessionFilePath`, when the session was captured) of the run that produced the bad output. You can resume that session to ask the agent to re-emit corrected output, without repeating the work:\n\n```ts\nimport { run, Output, StructuredOutputError } from \"@ai-hero/sandcastle\";\n\ntry {\n  return await run({ ...opts, output });\n} catch (e) {\n  if (e instanceof StructuredOutputError && e.sessionId) {\n    return await run({\n      ...opts,\n      output,\n      resumeSession: e.sessionId,\n      prompt: `Your previous output failed: ${e.message}. Re-emit it inside <${e.tag}> tags.`,\n    });\n  }\n  throw e;\n}\n```\n\n### Templates\n\n`sandcastle init` prompts you to choose a sandbox provider (Docker or Podman), an issue tracker (GitHub Issues, Beads, or Custom), and a template, which scaffolds a ready-to-use prompt and `main.mts` suited to a specific workflow. If your project's `package.json` has `\"type\": \"module\"`, the file will be named `main.ts` instead. Choosing **Custom** scaffolds the project in a deliberately broken-until-configured state plus a `.sandcastle/SETUP_ISSUE_TRACKER.md` prompt you feed to your coding agent, which wires up your own tracker by editing the scaffolded files in place. Five templates are available:\n\n| Template                       | Description                                                               |\n| ------------------------------ | ------------------------------------------------------------------------- |\n| `blank`                        | Bare scaffold — write your own prompt and orchestration                   |\n| `simple-loop`                  | Picks issues one by one and closes them                                   |\n| `sequential-reviewer`          | Implements issues one by one, with a code review step after each          |\n| `parallel-planner`             | Plans parallelizable issues, executes on separate branches, then merges   |\n| `parallel-planner-with-review` | Plans parallelizable issues, executes with per-branch review, then merges |\n\nSelect a template during `sandcastle init` when prompted, or re-run init in a fresh repo to try a different one.\n\n## CLI commands\n\n### `sandcastle init`\n\nScaffolds the `.sandcastle/` config directory and builds the container image. This is the first command you run in a new repo. You choose a sandbox provider (Docker or Podman) during init — selecting Podman writes a `Containerfile` instead of `Dockerfile` and uses `sandcastle podman build-image` for the build step.\n\nInit detects your host package manager (npm, pnpm, yarn, or bun) from a `packageManager` field or lockfile, defaulting to npm. Templates whose `main` file imports a host dependency — the planner templates import [Zod](https://zod.dev) for their `<plan>` output schema — prompt you to install it with that package manager when it isn't already in your `package.json`, so the first `npx tsx .sandcastle/main.ts` doesn't fail with `ERR_MODULE_NOT_FOUND`.\n\nEvery interactive prompt has a paired `--flag` so the entire init can run non-interactively (e.g. in CI or a scripted setup). When stdin is not a TTY and a required flag is missing, init fails fast with a clear error rather than wedging on a prompt.\n\n| Option                    | Required | Default                      | Description                                                                                                    |\n| ------------------------- | -------- | ---------------------------- | -------------------------------------------------------------------------------------------------------------- |\n| `--image-name`            | No       | `sandcastle:<repo-dir-name>` | Docker image name                                                                                              |\n| `--agent`                 | No       | Interactive prompt           | Agent to use (`claude-code`, `pi`, `codex`, `cursor`, `opencode`, `copilot`)                                   |\n| `--model`                 | No       | Agent's default model        | Model to use (e.g. `claude-sonnet-4-6`). Defaults to agent's default                                           |\n| `--sandbox`               | No       | Interactive prompt           | Sandbox provider to use (`docker`, `podman`)                                                                   |\n| `--template`              | No       | Interactive prompt           | Template to scaffold (e.g. `blank`, `simple-loop`)                                                             |\n| `--issue-tracker`         | No       | Interactive prompt           | Issue tracker to use (`github-issues`, `beads`, `custom`)                                                      |\n| `--create-label`          | No       | Interactive prompt           | `true` / `false` — whether to create the `Sandcastle` GitHub label (only with `--issue-tracker github-issues`) |\n| `--build-image`           | No       | Interactive prompt           | `true` / `false` — whether to build the sandbox ima
