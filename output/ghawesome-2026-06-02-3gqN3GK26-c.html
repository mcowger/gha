rk.en-US.avif\"\n        media=\"(prefers-color-scheme: dark)\"\n      />\n      <source\n        width=\"33%\"\n        srcset=\"./docs/content/public/assets/download-buttons/download-buttons.mobile.light.en-US.avif\"\n        media=\"(prefers-color-scheme: light), (prefers-color-scheme: no-preference)\"\n      />\n      <img width=\"33%\" src=\"./docs/content/public/assets/download-buttons/download-buttons.mobile.light.en-US.avif\" />\n    </picture>\n  </a>\n  <a href=\"https://airi.moeru.ai\">\n    <picture>\n      <source\n        width=\"33%\"\n        srcset=\"./docs/content/public/assets/download-buttons/download-buttons.browser.dark.en-US.png\"\n        media=\"(prefers-color-scheme: dark)\"\n      />\n      <source\n        width=\"33%\"\n        srcset=\"./docs/content/public/assets/download-buttons/download-buttons.browser.light.en-US.png\"\n        media=\"(prefers-color-scheme: light), (prefers-color-scheme: no-preference)\"\n      />\n      <img width=\"33%\" src=\"./docs/content/public/assets/download-buttons/download-buttons.browser.light.en-US.png\" />\n    </picture>\n  </a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://www.producthunt.com/products/airi?embed=true&utm_source=badge-featured&utm_medium=badge&utm_source=badge-airi\" target=\"_blank\"><img src=\"https://api.producthunt.com/widgets/embed-image/v1/featured.svg?post_id=993524&theme=neutral&t=1752696535380\" alt=\"AIRI - A&#0032;container&#0032;of&#0032;cyber&#0032;living&#0032;souls&#0044;&#0032;re&#0045;creation&#0032;of&#0032;Neuro&#0045;sama | Product Hunt\" style=\"width: 250px; height: 54px;\" width=\"250\" height=\"54\" /></a>\n  <a href=\"https://trendshift.io/repositories/14636\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/14636\" alt=\"moeru-ai%2Fairi | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/></a>\n</p>\n\n> Heavily inspired by [Neuro-sama](https://www.youtube.com/@Neurosama)\n\n> [!TIP]\n> On Windows, you can also install AIRI with [winget](https://learn.microsoft.com/windows/package-manager/winget/):\n>\n> ```powershell\n> winget install MoeruAI.AIRI\n> ```\n>\n> Or install AIRI with [Scoop](https://scoop.sh/):\n>\n> ```powershell\n> scoop bucket add airi https://github.com/moeru-ai/airi\n> scoop install airi/airi\n> ```\n>\n> On macOS, you can install AIRI with [Homebrew Cask](https://brew.sh/) without adding a custom tap:\n>\n> ```sh\n> brew install --cask airi\n> ```\n\n> [!WARNING]\n> **Attention:** We **do not** have any officially minted cryptocurrency or token associated with this project. Please check the information and proceed with caution.\n\n> [!NOTE]\n>\n> We've got a whole dedicated organization [@proj-airi](https://github.com/proj-airi) for all the sub-projects born from Project AIRI. Check it out!\n>\n> RAG, memory system, embedded database, icons, Live2D utilities, and more!\n\n> [!TIP]\n> We have a translation project on [Crowdin](https://crowdin.com/project/proj-airi). If you find any inaccurate translations, feel free to contribute improvements there.\n> <a href=\"https://crowdin.com/project/proj-airi\" target=\"_blank\" rel=\"nofollow\"><img style=\"width: 140px; height: 40px;\" src=\"https://badges.crowdin.net/badge/light/crowdin-on-dark.png\" srcset=\"https://badges.crowdin.net/badge/light/crowdin-on-dark.png 1x, https://badges.crowdin.net/badge/light/crowdin-on-dark@2x.png 2x\" alt=\"Crowdin | Agile localization for tech companies\" width=\"140\" height=\"40\" /></a>\n\nHave you dreamed about having a cyber living being (cyber waifu, digital pet) or digital companion that could play with and talk to you?\n\nWith the power of modern large language models like [ChatGPT](https://chatgpt.com) and famous [Claude](https://claude.ai), asking a virtual being to roleplay and chat with us is already easy enough for everyone. Platforms like [Character.ai (a.k.a. c.ai)](https://character.ai) and [JanitorAI](https://janitorai.com/) as well as local playgrounds like [SillyTavern](https://github.com/SillyTavern/SillyTavern) are already good-enough solutions for a chat based or visual adventure game like experience.\n\n> But, what about the abilities to play games? And see what you are coding at? Chatting while playing games, watching videos, and is capable of doing many other things.\n\nPerhaps you know [Neuro-sama](https://www.youtube.com/@Neurosama) already. She is currently the best virtual streamer capable of playing games, chatting, and interacting with you and the participants. Some also call this kind of being \"digital human.\" **Sadly, as it's not open sourced, you cannot interact with her after her live streams go offline**.\n\nTherefore, this project, AIRI, offers another possibility here: **let you own your digital life, cyber living, easily, anywhere, anytime**.\n\n## DevLogs We Posted & Recent Updates\n\n- [DevLog @ 2026.03.23](https://airi.moeru.ai/docs/en/blog/DevLog-2026.03.23/) on March 23, 2026\n- [DevLog @ 2026.03.14](https://airi.moeru.ai/docs/en/blog/DevLog-2026.03.14/) on March 14, 2026\n- [DevLog @ 2026.02.16](https://airi.moeru.ai/docs/en/blog/DevLog-2026.02.16/) on February 16, 2026\n- [DevLog @ 2026.01.01](https://airi.moeru.ai/docs/en/blog/DevLog-2026.01.01/) on January 1, 2026\n- [DevLog @ 2025.10.20](https://airi.moeru.ai/docs/en/blog/DevLog-2025.10.20/) on October 20, 2025\n- [DevLog @ 2025.08.05](https://airi.moeru.ai/docs/en/blog/DevLog-2025.08.05/) on August 5, 2025\n- [DevLog @ 2025.08.01](https://airi.moeru.ai/docs/en/blog/DevLog-2025.08.01/) on August 1, 2025\n- [DreamLog 0x1](https://airi.moeru.ai/docs/en/blog/dreamlog-0x1/) on June 16, 2025\n- ...more on [documentation site](https://airi.moeru.ai/docs/en/)\n\n## What's So Special About This Project?\n\nUnlike the other AI driven VTuber open source projects, アイリ was built with support of many Web technologies such as [WebGPU](https://www.w3.org/TR/webgpu/), [WebAudio](https://developer.mozilla.org/en-US/docs/Web/API/Web_Audio_API), [Web Workers](https://developer.mozilla.org/en-US/docs/Web/API/Web_Workers_API/Using_web_workers), [WebAssembly](https://webassembly.org/), [WebSocket](https://developer.mozilla.org/en-US/docs/Web/API/WebSocket), etc. from the first day.\n\n> [!TIP]\n> Worrying about the performance drop since we are using Web related technologies?\n>\n> Don't worry, while the Web browser version is meant to give an insight into how much we can push and do inside browsers and webviews, we will never fully rely on this. The desktop version of AIRI is capable of using native [NVIDIA CUDA](https://developer.nvidia.com/cuda-toolkit) and [Apple Metal](https://developer.apple.com/metal/) by default (thanks to HuggingFace & the beloved [candle](https://github.com/huggingface/candle) project), without any complex dependency management. Considering the tradeoff, it is partially powered by Web technologies for graphics, layouts, animations, and the WIP plugin system for everyone to integrate things.\n\nThis means that **アイリ is capable of running on modern browsers and devices** and even on mobile devices (already done with PWA support). This brings a lot of possibilities for us (the developers) to build and extend the power of アイリ VTuber to the next level, while still leaving the flexibility for users to enable features that require TCP connections or other non-Web technologies such as connecting to a Discord voice channel or playing Minecraft and Factorio with friends.\n\n> [!NOTE]\n>\n> We are still in the early stage of development where we are seeking out talented developers to join us and help us to make アイリ a reality.\n>\n> It's ok if you are not familiar with Vue.js, TypeScript, and devtools required for this project, you can join us as an artist, designer, or even help us to launch our first live stream.\n>\n> Even if you are a big fan of React, Svelte or even Solid, we welcome you. You can open a sub-directory to add features that you want to see in アイリ, or would like to experiment with.\n>\n> Fields (and related projects) that we are looking for:\n>\n> - Live2D modeller\n> - VRM modeller\n> - VRChat avatar designer\n> - Computer Vision\n> - Reinforcement Learning\n> - Speech Recognition\n> - Speech Synthesis\n> - ONNX Runtime\n> - Transformers.js\n> - vLLM\n> - WebGPU\n> - Three.js\n> - WebXR ([checkout the another project](https://github.com/moeru-ai/chat) we have under the @moeru-ai organization)\n>\n> **If you are interested, why not introduce yourself here? [Would like to join part of us to build AIRI?](https://github.com/moeru-ai/airi/discussions/33)**\n\n## Current Progress\n\nCapable of\n\n- [x] Brain\n  - [x] Play [Minecraft](https://www.minecraft.net)\n  - [x] Play [Factorio](https://www.factorio.com) (WIP, but [PoC and demo available](https://github.com/moeru-ai/airi-factorio))\n  - [x] Play [Kerbal Space Program](https://www.kerbalspaceprogram.com/) (announcement TBD)\n  - [ ] Co-play [Helldivers 2](https://www.playstation.com/en-hk/games/helldivers-2/pc/) (WIP)\n  - [x] Chat in [Telegram](https://telegram.org)\n  - [x] Chat in [Discord](https://discord.com)\n  - [ ] Memory\n    - [x] Pure in-browser database support (DuckDB WASM | `pglite`)\n    - [ ] Memory Alaya (WIP)\n  - [ ] Pure in-browser local (WebGPU) inference\n- [x] Ears\n  - [x] Audio input from browser\n  - [x] Audio input from [Discord](https://discord.com)\n  - [x] Client side speech recognition\n  - [x] Client side talking detection\n- [x] Mouth\n  - [x] [ElevenLabs](https://elevenlabs.io/) voice synthesis\n- [x] Body\n  - [x] VRM support\n    - [x] Control VRM model\n  - [x] VRM model animations\n    - [x] Auto blink\n    - [x] Auto look at\n    - [x] Idle eye movement\n  - [x] Live2D support\n    - [x] Control Live2D model\n  - [x] Live2D model animations\n    - [x] Auto blink\n    - [x] Auto look at\n    - [x] Idle eye movement\n\n## Development\n\n> For detailed instructions to develop this project, follow [CONTRIBUTING.md](./.github/CONTRIBUTING.md)\n\n> [!NOTE]\n> By default, `pnpm dev` will start the development server for the Stage Web (browser version). If you would\n> like to try developing the desktop version, please make sure you read [CONTRIBUTING.md](./.github/CONTRIBUTING.md)\n> to setup the environment correctly.\n\n```shell\npnpm i\npnpm dev\n```\n\n### Stage Web (Browser Version at [airi.moeru.ai](https://airi.moeru.ai))\n\n```shell\npnpm dev\n```\n\n### Stage Tamagotchi (Desktop Version)\n\n```shell\npnpm dev:tamagotchi\n```\n\nA Nix package for Tamagotchi is included. To run airi with Nix, first make sure to enable flakes, then run:\n\n```shell\nnix run github:moeru-ai/airi\n```\n\n#### NixOS\n\nElectron requires shared libraries that aren't in standard paths on NixOS. Use the FHS shell defined in `flake.nix`:\n\n```shell\nnix develop .#fhs\npnpm dev:tamagotchi\n```\n\n### Stage Pocket (Mobile Version)\n\nStart the development server for the capacitor:\n\n```shell\npnpm dev:pocket:ios --target <DEVICE_ID_OR_SIMULATOR_NAME>\n# Or\nCAPACITOR_DEVICE_ID_IOS=<DEVICE_ID_OR_SIMULATOR_NAME> pnpm dev:pocket:ios\n```\n\nYou can see the list of available devices and simulators by running `pnpm exec cap run ios --list`.\n\nIf you need to connect server channel on pocket in wireless mode, you need to start tamagotchi as root:\n\n```shell\nsudo pnpm dev:tamagotchi\n```\n\nThen enable secure websocket in tamagotchi `settings/connections`.\n\n### Documentation Site\n\n```shell\npnpm dev:docs\n```\n\n### Publish\n\nRun `bumpp` to update the monorepo version:\n\n```shell\nnpx bumpp --no-commit --no-tag\n```\n\n## Support of LLM API Providers (powered by [xsai](https://github.com/moeru-ai/xsai))\n\n- [x] [AIHubMix (recommended)](https://aihubmix.com/?aff=OOiX)\n- [x] [OpenRouter](https://openrouter.ai/)\n- [x] [vLLM](https://github.com/vllm-project/vllm)\n- [x] [SGLang](https://github.com/sgl-project/sglang)\n- [x] [Ollama](https://github.com/ollama/ollama)\n- [x] [302.AI (sponsored)](https://share.302.ai/514k2v)\n- [x] [OpenAI](https://platform.openai.com/docs/guides/gpt/chat-completions-api)\n  - [x] [Azure OpenAI API](https://learn.microsoft.com/en-us/azure/ai-services/openai/reference)\n- [x] [Anthropic Claude](https://anthropic.com)\n  - [ ] [AWS Claude](https://docs.anthropic.com/en/api/claude-on-amazon-bedrock) (PR welcome)\n- [x] [DeepSeek](https://www.deepseek.com/)\n- [x] [Qwen](https://help.aliyun.com/document_detail/2400395.html)\n- [x] [Google Gemini](https://developers.generativeai.google)\n- [x] [xAI](https://x.ai/)\n- [x] [Groq](https://wow.groq.com/)\n- [x] [Mistral](https://mistral.ai/)\n- [x] [Cloudflare Workers AI](https://developers.cloudflare.com/workers-ai/)\n- [x] [Together.ai](https://www.together.ai/)\n- [x] [Fireworks.ai](https://www.together.ai/)\n- [x] [Novita](https://www.novita.ai/)\n- [x] [Zhipu](https://bigmodel.cn)\n- [x] [SiliconFlow](https://cloud.siliconflow.cn/i/rKXmRobW)\n- [x] [Stepfun](https://platform.stepfun.com/)\n- [x] [Baichuan](https://platform.baichuan-ai.com)\n- [x] [Minimax](https://api.minimax.chat/)\n- [x] [Moonshot AI](https://platform.moonshot.cn/)\n- [x] [ModelScope](https://modelscope.cn/docs/model-service/API-Inference/intro)\n- [x] [Player2](https://player2.game/)\n- [x] [Tencent Cloud](https://cloud.tencent.com/document/product/1729)\n- [ ] [Sparks](https://www.xfyun.cn/doc/spark/Web.html) (PR welcome)\n- [ ] [Volcano Engine](https://www.volcengine.com/experience/ark?utm_term=202502dsinvite&ac=DSASUQY5&rc=2QXCA1VI) (PR welcome)\n- [x] [Xiaomi Mimo](https://platform.xiaomimimo.com)\n\n## Sub-projects Born from This Project\n\n- [Awesome AI VTuber](https://github.com/proj-airi/awesome-ai-vtuber): A curated list of AI VTubers and related projects\n- [`unspeech`](https://github.com/moeru-ai/unspeech): Universal endpoint proxy server for `/audio/transcriptions` and `/audio/speech`, like LiteLLM but for any ASR and TTS\n- [`hfup`](https://github.com/moeru-ai/hfup): tools to help on deploying, bundling to HuggingFace Spaces\n- [`xsai-transformers`](https://github.com/moeru-ai/xsai-transformers): Experimental [🤗 Transformers.js](https://github.com/huggingface/transformers.js) provider for [xsAI](https://github.com/moeru-ai/xsai).\n- [WebAI: Realtime Voice Chat](https://github.com/proj-airi/webai-realtime-voice-chat): Full example of implementing ChatGPT's realtime voice from scratch with VAD + STT + LLM + TTS.\n- [`@proj-airi/drizzle-duckdb-wasm`](https://github.com/moeru-ai/airi/tree/main/packages/drizzle-duckdb-wasm/README.md): Drizzle ORM driver for DuckDB WASM\n- [`@proj-airi/duckdb-wasm`](https://github.com/moeru-ai/airi/tree/main/packages/duckdb-wasm/README.md): Easy to use wrapper for `@duckdb/duckdb-wasm`\n- [AIRI Factorio](https://github.com/moeru-ai/airi-factorio): Allow AIRI to play Factorio.\n- [AIRI DomeKeeper](https://github.com/proj-airi/game-playing-ai-dome-keeper): Allow AIRI to play DomeKeeper.\n- [Factorio RCON API](https://github.com/nekomeowww/factorio-rcon-api): RESTful API wrapper for Factorio headless server console\n- [`autorio`](https://github.com/moeru-ai/airi-factorio/tree/main/packages/autorio): Factorio automation library\n- [`tstl-plugin-reload-factorio-mod`](https://github.com/moeru-ai/airi-factorio/tree/main/packages/tstl-plugin-reload-factorio-mod): Reload Factorio mod when developing\n- [Velin](https://github.com/luoling8192/velin): Use Vue SFC and Markdown to write easy to manage stateful prompts for LLM\n- [`demodel`](https://github.com/moeru-ai/demodel): Easily boost the speed of pulling your models and datasets from various of inference runtimes.\n- [`inventory`](https://github.com/moeru-ai/inventory): Centralized model catalog and default provider configurations backend service\n- [MCP Launcher](https://github.com/moeru-ai/mcp-launcher): Easy to use MCP builder & launcher for all possible MCP servers, just like Ollama for models!\n- [🥺 SAD](https://github.com/moeru-ai/sad): Documentation and notes for self-host and browser running LLMs.\n\n```mermaid\n%%{ ) --> Memory\n\n  style Core fill:#f9d4d4,stroke:#333,stroke-width:1px\n  style AIRI fill:#fcf7f7,stroke:#333,stroke-width:1px\n  style UI fill:#d4f9d4,stroke:#333,stroke-width:1px\n  style Stage fill:#d4f9d4,stroke:#333,stroke-width:1px\n  style UI_Components fill:#d4f9d4,stroke:#333,stroke-width:1px\n  style Server_Components fill:#d4e6f9,stroke:#333,stroke-width:1px\n  style Apps fill:#d4d4f9,stroke:#333,stroke-width:1px\n  style Factorio_Agent fill:#f9d4f2,stroke:#333,stroke-width:1px\n  style Minecraft_Agent fill:#f9d4f2,stroke:#333,stroke-width:1px\n\n  style DBDriver fill:#f9f9d4,stroke:#333,stroke-width:1px\n  style MemoryDriver fill:#f9f9d4,stroke:#333,stroke-width:1px\n  style DB1 fill:#f9f9d4,stroke:#333,stroke-width:1px\n  style Memory fill:#f9f9d4,stroke:#333,stroke-width:1px\n  style Memory_PGVector fill:#f9f9d4,stroke:#333,stroke-width:1px\n```\n\n## Similar Projects\n\n### Open sourced ones\n\n- [kimjammer/Neuro: A recreation of Neuro-Sama originally created in 7 days.](https://github.com/kimjammer/Neuro): very well completed implementation.\n- [SugarcaneDefender/z-waif](https://github.com/SugarcaneDefender/z-waif): Great at gaming, autonomous, and prompt engineering\n- [semperai/amica](https://github.com/semperai/amica/): Great at VRM, WebXR\n- [elizaOS/eliza](https://github.com/elizaOS/eliza): Great examples and software engineering on how to integrate agent into various of systems and APIs\n- [ardha27/AI-Waifu-Vtuber](https://github.com/ardha27/AI-Waifu-Vtuber): Great about Twitch API integrations\n- [InsanityLabs/AIVTuber](https://github.com/InsanityLabs/AIVTuber): Nice UI and UX\n- [IRedDragonICY/vixevia](https://github.com/IRedDragonICY/vixevia)\n- [t41372/Open-LLM-VTuber](https://github.com/t41372/Open-LLM-VTuber)\n- [PeterH0323/Streamer-Sales](https://github.com/PeterH0323/Streamer-Sales)\n\n### Non-open-sourced ones\n\n- https://clips.twitch.tv/WanderingCaringDeerDxCat-Qt55xtiGDSoNmDDr https://www.youtube.com/watch?v=8Giv5mupJNE\n- https://clips.twitch.tv/TriangularAthleticBunnySoonerLater-SXpBk1dFso21VcWD\n- https://www.youtube.com/@NOWA_Mirai\n\n## Project Status\n\n![Repobeats analytics image](https://repobeats.axiom.co/api/embed/a1d6fe2c13ea2bb53a5154435a71e2431f70c2ee.svg 'Repobeats analytics image')\n\n## Acknowledgements\n\n- [Reka UI](https://github.com/unovue/reka-ui): for designing the documentation site, the new landing page is based on this, as well as implementing a massive amount of UI components. (shadcn-vue is using Reka UI as the headless, do checkout!)\n- [pixiv/ChatVRM](https://github.com/pixiv/ChatVRM)\n- [josephrocca/ChatVRM-js: A JS conversion/adaptation of parts of the ChatVRM (TypeScript) code for standalone use in OpenCharacters and elsewhere](https://github.com/josephrocca/ChatVRM-js)\n- Design of UI and style was inspired by [Cookard](https://store.steampowered.com/app/2919650/Cookard/), [UNBEATABLE](https://store.steampowered.com/app/2240620/UNBEATABLE/), and [Sensei! I like you so much!](https://store.steampowered.com/app/2957700/_/), and artworks of [Ayame by Mercedes Bazan](https://dribbble.com/shots/22157656-Ayame) with [Wish by Mercedes Bazan](https://dribbble.com/shots/24501019-Wish)\n- [mallorbc/whisper_mic](https://github.com/mallorbc/whisper_mic)\n- [`xsai`](https://github.com/moeru-ai/xsai): Implemented a decent amount of packages to interact with LLMs and models, like [Vercel AI SDK](https://sdk.vercel.ai/) but way small.\n\n## Supporters\n\n<p align=\"center\">\n  <strong>Thank you for supporting Project AIRI through OpenCollective, Patreon, and Ko-fi.</strong>\n</p>\n\n<p align=\"center\">\n  <img src=\"./docs/content/public/assets/sponsors/sponsors.svg\" alt=\"Project AIRI supporters\" />\n</p>\n\n## Special Thanks\n\nSpecial thanks to all contributors for their contributions to Project AIRI ❤️\n\n<a href=\"https://github.com/moeru-ai/airi/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=moeru-ai/airi\" />\n</a>\n\n## Star History\n\n<a href=\"https://star-history.com/#moeru-ai/airi&Date\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=moeru-ai/airi&type=Date&theme=dark\" />\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=moeru-ai/airi&type=Date\" />\n    <img alt=\"Star History Chart\" src=\"https://api.star-history.com/svg?repos=moeru-ai/airi&type=Date\" />\n  </picture>\n</a>\n","summary":"Project AIRI acts as a \"soul container\" for AI-driven virtual characters, designed to bridge the gap between artificial intelligence and interactive digital personas. The platform enables users to create and manage dynamic, personalized AI waifus or virtual avatars that can interact within real-world environments. This project is ideal for developers, content creators, and enthusiasts looking to deploy and customize sophisticated, responsive AI characters for streaming or personal engagement.","description":"💖🧸 Self hosted, you-owned Grok Companion, a container of souls of waifu, cyber livings to bring them into our worlds, wishing to achieve Neuro-sama's altitude. Capable of realtime voice chat, Minecraft, Factorio playing. Web / macOS / Windows supported.","stars":40639,"language":"TypeScript"},{"owner":"aiming-lab","repo":"AutoResearchClaw","url":"https://github.com/aiming-lab/AutoResearchClaw","readme":"<p align=\"center\">\n  <img src=\"image/logo.png\" width=\"700\" alt=\"AutoResearchClaw Logo\">\n</p>\n\n<h2 align=\"center\"><b>Chat an Idea. Get a Paper. Autonomous, Collaborative & Self-Evolving.</b></h2>\n\n\n\n<p align=\"center\">\n  <b><i><font size=\"5\">Just chat with <a href=\"#openclaw-integration\">OpenClaw</a>: \"Research X\" → done.</font></i></b>\n</p>\n\n<p align=\"center\">\n  📄 <b>Our paper is on arXiv — come read it!</b> <a href=\"https://arxiv.org/abs/2605.20025\"><i>AutoResearchClaw: Self-Reinforcing Autonomous Research with Human-AI Collaboration</i></a>\n</p>\n\n<p align=\"center\">\n  <img src=\"image/framework_v2.png\" width=\"100%\" alt=\"AutoResearchClaw Framework\">\n</p>\n\n\n<p align=\"center\">\n  <a href=\"https://arxiv.org/abs/2605.20025\"><img src=\"https://img.shields.io/badge/arXiv-2605.20025-b31b1b?logo=arxiv&logoColor=white\" alt=\"arXiv\"></a>\n  <a href=\"https://huggingface.co/datasets/AIMING-Lab-UNC/ARC-Bench\"><img src=\"https://img.shields.io/badge/%F0%9F%A4%97%20Dataset-ARC--Bench-yellow\" alt=\"ARC-Bench on Hugging Face\"></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/badge/License-MIT-yellow.svg\" alt=\"MIT License\"></a>\n  <a href=\"https://python.org\"><img src=\"https://img.shields.io/badge/Python-3.11%2B-3776AB?logo=python&logoColor=white\" alt=\"Python 3.11+\"></a>\n  <a href=\"#testing\"><img src=\"https://img.shields.io/badge/Tests-2699%20passed-brightgreen?logo=pytest&logoColor=white\" alt=\"2699 Tests Passed\"></a>\n  <a href=\"https://github.com/aiming-lab/AutoResearchClaw\"><img src=\"https://img.shields.io/badge/GitHub-AutoResearchClaw-181717?logo=github\" alt=\"GitHub\"></a>\n  <a href=\"#openclaw-integration\"><img src=\"https://img.shields.io/badge/OpenClaw-Compatible-ff4444?logo=data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PHBhdGggZD0iTTEyIDJDNi40OCAyIDIgNi40OCAyIDEyczQuNDggMTAgMTAgMTAgMTAtNC40OCAxMC0xMFMxNy41MiAyIDEyIDJ6IiBmaWxsPSJ3aGl0ZSIvPjwvc3ZnPg==\" alt=\"OpenClaw Compatible\"></a>\n  <a href=\"https://discord.gg/u4ksqW5P\"><img src=\"https://img.shields.io/badge/Discord-Join%20Community-5865F2?logo=discord&logoColor=white\" alt=\"Discord\"></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"docs/README_CN.md\">🇨🇳 中文</a> ·\n  <a href=\"docs/README_JA.md\">🇯🇵 日本語</a> ·\n  <a href=\"docs/README_KO.md\">🇰🇷 한국어</a> ·\n  <a href=\"docs/README_FR.md\">🇫🇷 Français</a> ·\n  <a href=\"docs/README_DE.md\">🇩🇪 Deutsch</a> ·\n  <a href=\"docs/README_ES.md\">🇪🇸 Español</a> ·\n  <a href=\"docs/README_PT.md\">🇧🇷 Português</a> ·\n  <a href=\"docs/README_RU.md\">🇷🇺 Русский</a> ·\n  <a href=\"docs/README_AR.md\">🇸🇦 العربية</a>\n</p>\n\n<p align=\"center\">\n  <a href=\"docs/showcase/SHOWCASE.md\">🏆 Paper Showcase</a> · <a href=\"docs/HITL_GUIDE.md\">🧑‍✈️ Co-Pilot Guide</a> · <a href=\"docs/integration-guide.md\">📖 Integration Guide</a> · <a href=\"https://discord.gg/u4ksqW5P\">💬 Discord Community</a>\n</p>\n\n---\n\n<table>\n<tr>\n<td width=\"18%\">\n<a href=\"docs/showcase/SHOWCASE.md\"><img src=\"docs/showcase/thumbnails/paper_I_random_matrix-01.png\" width=\"120\" alt=\"Sample Paper\"/></a>\n</td>\n<td valign=\"middle\">\n<b>🏆 Generated Paper Showcase</b><br><br>\n<b>8 papers across 8 domains</b> — math, statistics, biology, computing, NLP, RL, vision, robustness — generated fully autonomously or with Human-in-the-Loop co-pilot guidance.<br><br>\n<a href=\"docs/showcase/SHOWCASE.md\"><img src=\"https://img.shields.io/badge/View_Full_Showcase_→-All_8_Papers-d73a49?style=for-the-badge\" alt=\"View Showcase\"></a>\n</td>\n</tr>\n</table>\n\n---\n\n> **🧪 We're looking for testers!** Try the pipeline with your own research idea — from any field — and [tell us what you think](docs/TESTER_GUIDE.md). Your feedback directly shapes the next version. **[→ Testing Guide](docs/TESTER_GUIDE.md)** | **[→ 中文测试指南](docs/TESTER_GUIDE_CN.md)** | **[→ 日本語テストガイド](docs/TESTER_GUIDE_JA.md)**\n\n---\n\n## 🔥 News\n- **[05/19/2026]** **v0.5.0** — **Multi-Domain Experiment Agents + ARC-Bench** — Two headline updates. **(1) Domain-specialist execution agents:** the experiment stage (Stages 10–13) now routes beyond the default ML sandbox to specialist agents per field — **high-energy physics** (ColliderAgent: Lagrangian → FeynRules → MadGraph5 → Delphes via the Magnus cloud), **biology** (COBRApy genome-scale metabolic modelling), and **statistics** (simulation-study agent), with a generic Docker executor covering chemistry/materials. The pipeline auto-selects the right executor from the research domain. **(2) ARC-Bench:** a **55-topic** open-ended autonomous-research benchmark spanning **ML (25), HEP (10), quantum (10), biology (7), and statistics (3)** — each topic ships a manifest (research question + conditions + metrics + datasets) and a rubric for graded scoring, all under [`experiments/arc_bench/`](experiments/arc_bench/), and also released on [🤗 Hugging Face](https://huggingface.co/datasets/AIMING-Lab-UNC/ARC-Bench). **[→ Domain Integration Guide](docs/DOMAIN_INTEGRATION_GUIDE.md)**\n- **[04/01/2026]** **v0.4.0** — **Human-in-the-Loop Co-Pilot System** — AutoResearchClaw is no longer purely autonomous. New HITL system adds 6 intervention modes (`full-auto`, `gate-only`, `checkpoint`, `step-by-step`, `co-pilot`, `custom`), per-stage policies, and deep human-AI collaboration. Includes: Idea Workshop for hypothesis co-creation, Baseline Navigator for experiment design review, Paper Co-Writer for collaborative drafting, SmartPause (confidence-driven dynamic intervention), ALHF intervention learning, anti-hallucination claim verification, cost budget guardrails, pipeline branching for parallel hypothesis exploration, and CLI commands (`attach`/`status`/`approve`/`reject`/`guide`). **[→ Full HITL Guide](docs/HITL_GUIDE.md)**\n- **[03/30/2026]** **Flexible Skill Loading** — AutoResearchClaw now supports loading open-source and custom skills from any discipline to further enhance your research experience. 20 pre-loaded skills are included as ready-to-use references, covering scientific writing, experiment design, chemistry, biology, and more — including an [A-Evolve](https://github.com/A-EVO-Lab/a-evolve) agentic evolution skill contributed by the community. Load your own via `researchclaw skills install` or drop a `SKILL.md` into `.claude/skills/`. See [Skills Library](#-skills-library).\n- **[03/22/2026]** [v0.3.2](https://github.com/aiming-lab/AutoResearchClaw/releases/tag/v0.3.2) — **Cross-Platform Support + Major Stability** — AutoResearchClaw now runs on any ACP-compatible agent backend (Claude Code, Codex CLI, Copilot CLI, Gemini CLI, Kimi CLI) and supports messaging platforms (Discord, Telegram, Lark, WeChat) via OpenClaw bridge. New CLI-agent code generation backend delegates Stages 10 & 13 to external CLI agents with budget control and timeout management. Also includes anti-fabrication system (VerifiedRegistry + experiment diagnosis & repair loop), 100+ bug fixes, modular executor refactoring, `--resume` auto-detection, LLM retry hardening, and community-reported fixes.\n\n<details>\n<summary>Earlier releases</summary>\n\n- **[03/18/2026]** [v0.3.1](https://github.com/aiming-lab/AutoResearchClaw/releases/tag/v0.3.1) — **OpenCode Beast Mode + Community Contributions** — New \"Beast Mode\" routes complex code generation to [OpenCode](https://github.com/anomalyco/opencode) with automatic complexity scoring and graceful fallback. Added Novita AI provider support, thread-safety hardening, improved LLM output parsing robustness, and 20+ bug fixes from community PRs and internal audit.\n- **[03/17/2026]** [v0.3.0](https://github.com/aiming-lab/AutoResearchClaw/releases/tag/v0.3.0) — **MetaClaw Integration** — AutoResearchClaw now supports [MetaClaw](https://github.com/aiming-lab/MetaClaw) cross-run learning: pipeline failures → structured lessons → reusable skills, injected into all 23 stages. **+18.3%** robustness in controlled experiments. Opt-in (`metaclaw_bridge.enabled: true`), fully backward-compatible. See [Integration Guide](#-metaclaw-integration).\n- **[03/16/2026]** [v0.2.0](https://github.com/aiming-lab/AutoResearchClaw/releases/tag/v0.2.0) — Three multi-agent subsystems (CodeAgent, BenchmarkAgent, FigureAgent), hardened Docker sandbox with network-policy-aware execution, 4-round paper quality audit (AI-slop detection, 7-dim review scoring, NeurIPS checklist), and 15+ bug fixes from production runs.\n- **[03/15/2026]** [v0.1.0](https://github.com/aiming-lab/AutoResearchClaw/releases/tag/v0.1.0) — We release AutoResearchClaw: a fully autonomous 23-stage research pipeline that turns a single research idea into a conference-ready paper. No human intervention required.\n\n</details>\n\n---\n\n## ⚡ One Command. One Paper.\n\n```bash\n# Fully autonomous — no human intervention\npip install -e . && researchclaw setup && researchclaw init && researchclaw run --topic \"Your research idea here\" --auto-approve\n\n# Co-Pilot mode — collaborate with AI at key decision points\nresearchclaw run --topic \"Your research idea here\" --mode co-pilot\n```\n\n\n---\n\n## 🤔 What Is This?\n\n**You think it. AutoResearchClaw writes it. You guide the key decisions.**\n\nDrop a research topic — get back a full academic paper with real literature from OpenAlex, Semantic Scholar & arXiv, hardware-aware sandbox experiments (GPU/MPS/CPU auto-detected), statistical analysis, multi-agent peer review, and conference-ready LaTeX targeting NeurIPS/ICML/ICLR. Run it fully autonomous, or use **Co-Pilot mode** to guide the AI at critical decision points — choose research directions, review experiment designs, and co-write the paper. No hallucinated references.\n\n<table>\n<tr><td>📄</td><td><code>paper_draft.md</code></td><td>Full academic paper (Introduction, Related Work, Method, Experiments, Results, Conclusion)</td></tr>\n<tr><td>📐</td><td><code>paper.tex</code></td><td>Conference-ready LaTeX (NeurIPS / ICLR / ICML templates)</td></tr>\n<tr><td>📚</td><td><code>references.bib</code></td><td>Real BibTeX references from OpenAlex, Semantic Scholar and arXiv — auto-pruned to match inline citations</td></tr>\n<tr><td>🔍</td><td><code>verification_report.json</code></td><td>4-layer citation integrity + relevance verification (arXiv, CrossRef, DataCite, LLM)</td></tr>\n<tr><td>🧪</td><td><code>experiment runs/</code></td><td>Generated code + sandbox results + structured JSON metrics</td></tr>\n<tr><td>📊</td><td><code>charts/</code></td><td>Auto-generated condition comparison charts with error bars and confidence intervals</td></tr>\n<tr><td>📝</td><td><code>reviews.md</code></td><td>Multi-agent peer review with methodology-evidence consistency checks</td></tr>\n<tr><td>🧬</td><td><code>evolution/</code></td><td>Self-learning lessons extracted from each run</td></tr>\n<tr><td>📦</td><td><code>deliverables/</code></td><td>All final outputs in one folder — compile-ready for Overleaf</td></tr>\n</table>\n\nThe pipeline runs **end-to-end** — fully autonomous or with human-in-the-loop collaboration. When experiments fail, it self-heals. When hypotheses don't hold, it pivots. When citations are fake, it kills them. When you want to steer, it pauses and listens.\n\n🌍 **Run it anywhere.** AutoResearchClaw isn't locked to a single platform. Use it standalone via CLI, plug it into [OpenClaw](https://github.com/openclaw/openclaw), or wire it up through any ACP-compatible agent — 🤖 Claude Code, 💻 Codex CLI, 🐙 Copilot CLI, ♊ Gemini CLI, 🌙 Kimi CLI, you name it. And because OpenClaw bridges to messaging platforms, you can kick off a full research run from 💬 Discord, ✈️ Telegram, 🐦 Lark (飞书), 💚 WeChat, or wherever your team already hangs out. One topic in, one paper out — no matter where you type it.\n\n---\n\n## 🚀 Quick Start\n\n```bash\n# 1. Clone & install\ngit clone https://github.com/aiming-lab/AutoResearchClaw.git\ncd AutoResearchClaw\npython3 -m venv .venv && source .venv/bin/activate\npip install -e .\n\n# 2. Setup (interactive — installs OpenCode beast mode, checks Docker/LaTeX)\nresearchclaw setup\n\n# 3. Configure\nresearchclaw init          # Interactive: choose LLM provider, creates config.arc.yaml\n# Or manually: cp config.researchclaw.example.yaml config.arc.yaml\n\n# 4. Run\nexport OPENAI_API_KEY=\"sk-...\"\nresearchclaw run --config config.arc.yaml --topic \"Your research idea\" --auto-approve\n```\n\nOutput → `artifacts/rc-YYYYMMDD-HHMMSS-<hash>/deliverables/` — compile-ready LaTeX, BibTeX, experiment code, charts.\n\n<details>\n<summary>📝 Minimum required config</summary>\n\n```yaml\nproject:\n  name: \"my-research\"\n\nresearch:\n  topic: \"Your research topic here\"\n\nllm:\n  base_url: \"https://api.openai.com/v1\"\n  api_key_env: \"OPENAI_API_KEY\"\n  primary_model: \"gpt-4o\"\n  fallback_models: [\"gpt-4o-mini\"]\n\nexperiment:\n  mode: \"sandbox\"\n  sandbox:\n    python_path: \".venv/bin/python\"\n```\n\n</details>\n\n---\n\n## 🧠 What Makes It Different\n\n| Capability | How It Works |\n|-----------|-------------|\n| **🧑‍✈️ Co-Pilot Mode** | 6 intervention modes — from fully autonomous to step-by-step. Guide the AI at critical decisions (hypotheses, baselines, paper writing) or let it run free. SmartPause auto-detects when human input would help. |\n| **🔄 PIVOT / REFINE Loop** | Stage 15 autonomously decides: PROCEED, REFINE (tweak params), or PIVOT (new direction). Artifacts auto-versioned. |\n| **🤖 Multi-Agent Debate** | Hypothesis generation, result analysis, and peer review each use structured multi-perspective debate. |\n| **🧬 Self-Learning** | Lessons extracted per run (decision rationale, runtime warnings, metric anomalies) with 30-day time-decay. Future runs learn from past mistakes. |\n| **📚 Knowledge Base** | Every run builds structured KB across 6 categories (decisions, experiments, findings, literature, questions, reviews). |\n| **🛡️ Sentinel Watchdog** | Background quality monitor: NaN/Inf detection, paper-evidence consistency, citation relevance scoring, anti-fabrication guard. |\n| **🔍 Claim Verification** | Inline fact-checking: extracts claims from AI-generated text and cross-references against collected literature. Flags ungrounded citations and fabricated numbers. |\n| **🌿 Branch Exploration** | Fork the pipeline to explore multiple research directions simultaneously, compare results side-by-side, and merge the best path forward. |\n\n---\n\n## 🦞 OpenClaw Integration\n\n<table>\n<tr>\n\n**AutoResearchClaw is an [OpenClaw](https://github.com/openclaw/openclaw)-compatible service.** Install it in OpenClaw and launch autonomous research with a single message — or use it standalone via CLI, Claude Code, or any AI coding assistant.\n\n</tr>\n</table>\n\n### 🚀 Use with OpenClaw (Recommended)\n\nIf you already use [OpenClaw](https://github.com/openclaw/openclaw) as your AI assistant:\n\n```\n1️⃣  Share the GitHub repo URL with OpenClaw\n2️⃣  OpenClaw auto-reads RESEARCHCLAW_AGENTS.md → understands the pipeline\n3️⃣  Say: \"Research [your topic]\"\n4️⃣  Done — OpenClaw clones, installs, configures, runs, and returns results\n```\n\n**That's it.** OpenClaw handles `git clone`, `pip install`, config setup, and pipeline execution automatically. You just chat.\n\n<details>\n<summary>💡 What happens under the hood</summary>\n\n1. OpenClaw reads `RESEARCHCLAW_AGENTS.md` → learns the research orchestrator role\n2. OpenClaw reads `README.md` → understands installation and pipeline structure\n3. OpenClaw copies `config.researchclaw.example.yaml` → `config.yaml`\n4. Asks for your LLM API key (or uses your environment variable)\n5. Runs `pip install -e .` + `researchclaw run --topic \"...\" --auto-approve`\n6. Returns the paper, LaTeX, experiments, and citations\n\n</details>\n\n### 🔌 OpenClaw Bridge (Advanced)\n\nFor deeper integration, AutoResearchClaw includes a **bridge adapter system** with 6 optional capabilities:\n\n```yaml\n# config.arc.yaml\nopenclaw_bridge:\n  use_cron: true              # ⏰ Scheduled research runs\n  use_message: true           # 💬 Progress notifications (Discord/Slack/Telegram)\n  use_memory: true            # 🧠 Cross-session knowledge persistence\n  use_sessions_spawn: true    # 🔀 Spawn parallel sub-sessions for concurrent stages\n  use_web_fetch: true         # 🌐 Live web search during literature review\n  use_browser: false          # 🖥️ Browser-based paper collection\n```\n\nEach flag activates a typed adapter protocol. When OpenClaw provides these capabilities, the adapters consume them without code changes. See [`docs/integration-guide.md`](docs/integration-guide.md) for full details.\n\n### ACP (Agent Client Protocol)\n\nAutoResearchClaw can use **any ACP-compatible coding agent** as its LLM backend — no API keys required. The agent communicates via [acpx](https://github.com/openclaw/acpx), maintaining a single persistent session across all 23 pipeline stages.\n\n| Agent | Command | Notes |\n|-------|---------|-------|\n| Claude Code | `claude` | Anthropic |\n| Codex CLI | `codex` | OpenAI |\n| Copilot CLI | `gh` | GitHub |\n| Gemini CLI | `gemini` | Google |\n| OpenCode | `opencode` | SST |\n| Kimi CLI | `kimi` | Moonshot |\n\n```yaml\n# config.yaml — ACP example\nllm:\n  provider: \"acp\"\n  acp:\n    agent: \"claude\"   # Any ACP-compatible agent CLI command\n    cwd: \".\"          # Working directory for the agent\n  # No base_url or api_key needed — the agent handles its own auth.\n```\n\n```bash\n# Just run — the agent uses its own credentials\nresearchclaw run --config config.yaml --topic \"Your research idea\" --auto-approve\n```\n\n### 🛠️ Other Ways to Run\n\n| Method | How |\n|--------|-----|\n| **Standalone CLI** | `researchclaw run --topic \"...\" --auto-approve` (autonomous) or `--mode co-pilot` (collaborative) |\n| **Python API** | `from researchclaw.pipeline import Runner; Runner(config).run()` |\n| **Claude Code** | Reads `RESEARCHCLAW_CLAUDE.md` — just say *\"Run research on [topic]\"* |\n| **Copilot CLI** | `researchclaw run --topic \"...\"` with `llm.acp.agent: \"gh\"` |\n| **OpenCode** | Reads `.claude/skills/` — same natural language interface |\n| **Any AI CLI** | Provide `RESEARCHCLAW_AGENTS.md` as context → agent auto-bootstraps |\n\n---\n\n## 🔬 Pipeline: 23 Stages, 8 Phases\n\n```\nPhase A: Research Scoping          Phase E: Experiment Execution\n  1. TOPIC_INIT                      12. EXPERIMENT_RUN\n  2. PROBLEM_DECOMPOSE               13. ITERATIVE_REFINE  ← self-healing\n\nPhase B: Literature Discovery      Phase F: Analysis & Decision\n  3. SEARCH_STRATEGY                 14. RESULT_ANALYSIS    ← multi-agent\n  4. LITERATURE_COLLECT  ← real API  15. RESEARCH_DECISION  ← PIVOT/REFINE\n  5. LITERATURE_SCREEN   [gate]\n  6. KNOWLEDGE_EXTRACT               Phase G: Paper Writing\n                                     16. PAPER_OUTLINE\nPhase C: Knowledge Synthesis         17. PAPER_DRAFT\n  7. SYNTHESIS                       18. PEER_REVIEW        ← evidence check\n  8. HYPOTHESIS_GEN    ← debate      19. PAPER_REVISION\n\nPhase D: Experiment Design         Phase H: Finalization\n  9. EXPERIMENT_DESIGN   [gate]      20. QUALITY_GATE      [gate]\n 10. CODE_GENERATION                 21. KNOWLEDGE_ARCHIVE\n 11. RESOURCE_PLANNING               22. EXPORT_PUBLISH     ← LaTeX\n                                     23. CITATION_VERIFY    ← relevance check\n```\n\n> **Gate stages** (5, 9, 20) pause for human approval or auto-approve with `--auto-approve`. On rejection, the pipeline rolls back.\n\n> **Co-Pilot mode** (`--mode co-pilot`): Deep human-AI collaboration at Stages 7-8 (Idea Workshop), Stage 9 (Baseline Navigator), and Stages 16-17 (Paper Co-Writer). Other stages auto-execute with SmartPause monitoring.\n\n> **Decision loops**: Stage 15 can trigger REFINE (→ Stage 13) or PIVOT (→ Stage 8), with automatic artifact versioning.\n\n<details>\n<summary>📋 What Each Phase Does</summary>\n\n| Phase | What Happens |\n|-------|-------------|\n| **A: Scoping** | LLM decomposes the topic into a structured problem tree with research questions |\n| **A+: Hardware** | Auto-detects GPU (NVIDIA CUDA / Apple MPS / CPU-only), warns if local hardware is limited, adapts code generation accordingly |\n| **B: Literature** | Multi-source search (OpenAlex → Semantic Scholar → arXiv) for real papers, screens by relevance, extracts knowledge cards |\n| **C: Synthesis** | Clusters findings, identifies research gaps, generates testable hypotheses via multi-agent debate |\n| **D: Design** | Designs experiment plan, generates hardware-aware runnable Python (GPU tier → package selection), estimates resource needs |\n| **E: Execution** | Runs experiments in sandbox, detects NaN/Inf and runtime bugs, self-heals code via targeted LLM repair |\n| **F: Analysis** | Multi-agent analysis of results; autonomous PROCEED / REFINE / PIVOT decision with rationale |\n| **G: Writing** | Outlines → section-by-section drafting (5,000-6,500 words) → peer reviews (with methodology-evidence consistency) → revises with length guard |\n| **H: Finalization** | Quality gate, knowledge archival, LaTeX export with conference template, citation integrity + relevance verification |\n\n</details>\n\n---\n\n## ✨ Key Features\n\n| Feature | Description |\n|---------|------------|\n| **📚 Multi-Source Literature** | Real papers from OpenAlex, Semantic Scholar & arXiv — query expansion, deduplication, circuit breaker with graceful degradation |\n| **🔍 4-Layer Citation Verification** | arXiv ID check → CrossRef/DataCite DOI → Semantic Scholar title match → LLM relevance scoring. Hallucinated refs auto-removed. |\n| **🖥️ Hardware-Aware Execution** | Auto-detects GPU (NVIDIA CUDA / Apple MPS / CPU-only) and adapts code generation, imports, and experiment scale accordingly |\n| **🦾 OpenCode Beast Mode** | Complex experiments auto-routed to [OpenCode](https://github.com/anomalyco/opencode) — generates multi-file projects with custom architectures, training loops, and ablation studies. Install via `researchclaw setup`. |\n| **🧪 Sandbox Experiments** | AST-validated code, immutable harness, NaN/Inf fast-fail, self-healing repair, iterative refinement (up to 10 rounds), partial result capture |\n| **📝 Conference-Grade Writing** | NeurIPS/ICML/ICLR templates, section-by-section drafting (5,000-6,500 words), anti-fabrication guard, revision length guard, anti-disclaimer enforcement |\n| **📐 Template Switching** | `neurips_2025`, `iclr_2026`, `icml_2026` — Markdown → LaTeX with math, tables, figures, cross-refs, `\\cite{}` |\n| **🛡️ Anti-Fabrication** | VerifiedRegistry enforces ground-truth experiment data in papers. Auto-diagnoses failed experiments and repairs them before writing. Unverified numbers sanitized. |\n| **🚦 Quality Gates** | 3 human-in-the-loop gates (Stages 5, 9, 20) with rollback. Skip with `--auto-approve`. |\n| **🧑‍✈️ HITL Co-Pilot** | 6 intervention modes with per-stage policies. Idea Workshop, Baseline Navigator, Paper Co-Writer for deep collaboration. SmartPause, cost guardrails, escalation policies, and intervention learning for production safety. CLI/WebSocket/MCP adapters. |\n| **💰 Cost Guardrails** | Budget monitoring with configurable threshold alerts (50%/80%/100%). Pipeline auto-pauses when cost exceeds budget. |\n| **🔐 Reproducibility** | SHA256 checksums for all stage artifacts. Immutable manifests for verification. Multi-level undo with versioned snapshots. |\n\n---\n\n## 🧑‍✈️ Human-in-the-Loop Co-Pilot\n\n**AutoResearchClaw v0.4.0 introduces a complete Human-in-the-Loop (HITL) system** that transforms the pipeline from purely autonomous to a human-AI collaborative research engine. Choose your level of involvement:\n\n### Intervention Modes\n\n| Mode | Command | What It Does |\n|------|---------|-------------|\n| **Full Auto** | `--auto-approve` | Original behavior — no human intervention |\n| **Gate Only** | `--mode gate-only` | Pause at 3 gate stages (5, 9, 20) for approval |\n| **Checkpoint** | `--mode checkpoint` | Pause at each phase boundary (8 checkpoints) |\n| **Co-Pilot** | `--mode co-pilot` | Deep collaboration at critical stages, auto elsewhere |\n| **Step-by-Step** | `--mode step-by-step` | Pause after every stage — learn the pipeline |\n| **Express** | `--mode express` | Quick review — only 3 most critical gates |\n| **Custom** | `--mode custom` | Define per-stage policies via `stage_policies` config |\n\n### Co-Pilot Workflow(updated Apr 13, added experiment to prove the best)\n\n```\nYou: researchclaw run --topic \"Quantum noise as neural network regularization\" --mode co-pilot\n\nPipeline runs Stages 1-7 automatically...\n\n  ┌─────────────────────────────────────────────────────────────┐\n  │  HITL | Stage 08: HYPOTHESIS_GEN                            │\n  │  Post-stage review                                          │\n  │                                                             │\n  │  Hypotheses mentioned: 3                                    │\n  │  Novelty score: 0.72 (moderate)                             │\n  │                                                             │\n  │  [a] Approve  [r] Reject  [e] Edit  [c] Collaborate         │\n  │  [i] Inject guidance  [v] View output  [q] Abort            │\n  └─────────────────────────────────────────────────────────────┘\n\nYou: c  (start collaborative chat)\nYou: Hypothesis 3 is interesting but needs Dropout/Label Smoothing as baselines\nAI:  Updated — added Dropout, Label Smoothing, MixUp, CutMix as baselines...\nYou: approve\n\nPipeline continues with your refined hypothesis...\n```\n\n### CLI Commands\n\n```bash\n# Start with HITL mode\nresearchclaw run --topic \"...\" --mode co-pilot\n\n# Attach to a paused pipeline (from another terminal)\nresearchclaw attach artifacts/rc-2026-xxx\n\n# Check pipeline and HITL status\nresearchclaw status artifacts/rc-2026-xxx\n\n# Approve/reject from another terminal or script\nresearchclaw approve artifacts/rc-2026-xxx --message \"LGTM\"\nresearchclaw reject artifacts/rc-2026-xxx --reason \"Missing key baseline\"\n\n# Inject guidance for a stage (even before it runs)\nresearchclaw guide artifacts/rc-2026-xxx --stage 9 --message \"Use ResNet-50 as primary baseline\"\n```\n\n### Key Capabilities\n\n| Feature | Description |\n|---------|------------|\n| **Idea Workshop** | Brainstorm, evaluate, and refine hypotheses collaboratively (Stage 7-8) |\n| **Baseline Navigator** | AI suggests baselines + human adds/removes + reproducibility checklist (Stage 9) |\n| **Paper Co-Writer** | Section-by-section drafting with human editing and AI polishing (Stage 16-19) |\n| **SmartPause** | Confidence-driven dynamic pausing — auto-detects when human input would help |\n| **Claim Verification** | Inline fact-checking against collected literature — flags ungrounded claims |\n| **Cost Guardrails** | Budget monitoring with 50%/80%/100% threshold alerts |\n| **Intervention Learning** | ALHF — learns from your review patterns to optimize future pause decisions |\n| **Branch Exploration** | Fork pipeline to explore multiple hypotheses, compare, merge the best |\n| **Escalation Policy** | Tiered notification (terminal → Slack → email → auto-halt) when unattended |\n| **3 Adapters** | CLI (terminal), WebSocket (web dashboard), MCP (external agents) |\n\n### Configuration\n\n```yaml\n# config.arc.yaml\nhitl:\n  enabled: true\n  mode: co-pilot                     # full-auto | gate-only | checkpoint | co-pilot | custom\n  cost_budget_usd: 50.0              # Pause when cost exceeds budget (0 = no limit)\n\n  notifications:\n    on_pause: true\n    on_quality_drop: true\n    channels: [\"terminal\"]            # terminal | slack | webhook\n\n  timeouts:\n    default_human_timeout_sec: 86400  # 24h default wait\n    auto_proceed_on_timeout: false\n\n  collaboration:\n    max_chat_turns: 50\n    save_chat_history: true\n\n  # Per-stage custom policies (optional, for 'custom' mode)\n  stage_policies:\n    8: { require_approval: true, enable_collaboration: true }\n    9: { require_approval: true, allow_edit_output: true }\n```\n\n### Backward Compatibility\n\n- **Default: OFF.** Without `hitl.enabled: true` or `--mode`, the pipeline behaves exactly as before.\n- **`--auto-approve` still works.** It overrides HITL mode.\n- **All 2,699 existing tests pass** with HITL code present.\n\n---\n\n## 🧠 MetaClaw Integration\n\n**AutoResearchClaw + [MetaClaw](https://github.com/aiming-lab/MetaClaw) = A pipeline that learns from every run.**\n\nMetaClaw adds **cross-run knowledge transfer** to AutoResearchClaw. When enabled, the pipeline automatically captures lessons from failures and warnings, converts them into reusable skills, and injects those skills into all 23 pipeline stages on subsequent runs — so the same mistakes are never repeated.\n\n### How It Works\n\n```\nRun N executes → failures/warnings captured as Lessons\n                      ↓\n          MetaClaw Lesson → Skill conversion\n                      ↓\n          arc-* Skill files stored in ~/.metaclaw/skills/\n                      ↓\nRun N+1 → build_overlay() injects skills into every LLM prompt\n                      ↓\n          LLM avoids known pitfalls → higher quality, fewer retries\n```\n\n### Quick Setup\n\n```bash\n# 1. Install MetaClaw (if not already)\npip install metaclaw\n\n# 2. Enable in your config\n```\n\n```yaml\n# config.arc.yaml\nmetaclaw_bridge:\n  enabled: true\n  proxy_url: \"http://localhost:30000\"        # MetaClaw proxy (optional)\n  skills_dir: \"~/.metaclaw/skills\"          # Where skills are stored\n  fallback_url: \"https://api.openai.com/v1\" # Direct LLM fallback\n  fallback_api_key: \"\"                      # API key for fallback URL\n  lesson_to_skill:\n    enabled: true\n    min_severity: \"warning\"                 # Convert warnings + errors\n    max_skills_per_run: 3\n```\n\n```bash\n# 3. Run as usual — MetaClaw works transparently\nresearchclaw run --config config.arc.yaml --topic \"Your idea\" --auto-approve\n```\n\nAfter each run, check `~/.metaclaw/skills/arc-*/SKILL.md` to see the skills your pipeline has learned.\n\n### Experiment Results\n\nIn controlled A/B experiments (same topic, same LLM, same configuration):\n\n| Metric | Baseline | With MetaClaw | Improvement |\n|--------|----------|---------------|-------------|\n| Stage retry rate | 10.5% | 7.9% | **-24.8%** |\n| Refine cycle count | 2.0 | 1.2 | **-40.0%** |\n| Pipeline stage completion | 18/19 | 19/19 | **+5.3%** |\n| Overall robustness score (composite) | 0.714 | 0.845 | **+18.3%** |\n\n> Composite robustness score is a weighted average of stage completion rate (40%), retry reduction (30%), and refine cycle efficiency (30%).\n\n### Backward Compatibility\n\n- **Default: OFF.** If `metaclaw_bridge` is absent or `enabled: false`, the pipeline behaves exactly as before.\n- **No new dependencies.** MetaClaw is optional — the core pipeline works without it.\n- **All 2,699 existing tests pass** with the integration code present.\n\n---\n\n## 🧩 Skills Library\n\nAutoResearchClaw now supports loading **open-source and custom skills** to further enhance your research experience. We also ship with **20 pre-loaded built-in skills** (scientific writing, literature search, chemistry, biology, and more) as ready-to-use references, offering a high degree of flexibility out of the box. Disable any skill by adding `enabled: false` to its frontmatter.\n\n**Sample built-in skills:**\n\n| Category | Skill | Description |\n|----------|-------|-------------|\n| **Writing** | `scientific-writing` | IMRAD structure, citation formatting, reporting guidelines |\n| **Domain** | `chemistry-rdkit` | Molecular analysis, SMILES, fingerprints, drug discovery |\n| **Experiment** | `literature-search` | Systematic review, PRISMA methodology |\n\n> See all 20 skills with `researchclaw skills list`.\n\n### Load Your Own Skills\n\n```bash\n# Option 1: Install a skill (persists across projects)\nresearchclaw skills install /path/to/my-skill/\n\n# Option 2: Drop a SKILL.md into the project\nmkdir -p .claude/skills/my-custom-skill\n# Then create a SKILL.md with YAML frontmatter (name, description, trigger-keywords, applicable-stages)\n\n# Option 3: Configure shared skill directories in config.arc.yaml\n# skills:\n#   custom_dirs:\n#     - /path/to/team-shared-skills\n```\n\n### Using Skills\n\nSkills are loaded and injected into LLM prompts automatically — no manual activation needed. Use the CLI to inspect:\n\n```bash\nresearchclaw skills list               # Show all loaded skills with sources\nresearchclaw skills validate ./my-skill # Check SKILL.md format\n```\n\nBrowse community skills: [K-Dense-AI/claude-scientific-skills](https://github.com/K-Dense-AI/claude-scientific-skills) (150+ scientific skills across multiple disciplines).\n\n---\n\n## ⚙️ Configuration Reference\n\n<details>\n<summary>Click to expand full configuration reference</summary>\n\n```yaml\n# === Project ===\nproject:\n  name: \"my-research\"              # Project identifier\n  mode: \"docs-first\"               # docs-first | semi-auto | full-auto\n\n# === Research ===\nresearch:\n  topic: \"...\"                     # Research topic (required)\n  domains: [\"ml\", \"nlp\"]           # Research domains for literature search\n  daily_paper_count: 8             # Target papers per search query\n  quality_threshold: 4.0           # Minimum quality score for papers\n\n# === Runtime ===\nruntime:\n  timezone: \"America/New_York\"     # For timestamps\n  max_parallel_tasks: 3            # Concurrent experiment limit\n  approval_timeout_hours: 12       # Gate stage timeout\n  retry_limit: 2                   # Retry count on stage failure\n\n# === LLM ===\nllm:\n  provider: \"openai-compatible\"    # openai | openrouter | deepseek | minimax | acp | openai-compatible\n  base_url: \"https://...\"          # API endpoint (required for openai-compatible)\n  api_key_env: \"OPENAI_API_KEY\"    # Env var for API key (required for openai-compatible)\n  api_key: \"\"                      # Or hardcode key here\n  primary_model: \"gpt-4o\"          # Primary model\n  fallback_models: [\"gpt-4o-mini\"] # Fallback chain\n  s2_api_key: \"\"                   # Semantic Scholar API key (optional, higher rate limits)\n  acp:                             # Only used when provider: \"acp\"\n    agent: \"claude\"                # ACP agent CLI command (claude, codex, gemini, etc.)\n    cwd: \".\"                       # Working directory for the agent\n\n# === Experiment ===\nexperiment:\n  mode: \"sandbox\"                  # simulated | sandbox | docker | ssh_remote\n  time_budget_sec: 300             # Max execution time per run (default: 300s)\n  max_iterations: 10               # Max optimization iterations\n  metric_key: \"val_loss\"           # Primary metric name\n  metric_direction: \"minimize\"     # minimize | maximize\n  sandbox:\n    python_path: \".venv/bin/python\"\n    gpu_required: false\n    allowed_imports: [math, random, json, csv, numpy, torch, sklearn]\n    max_memory_mb: 4096\n  docker:\n    image: \"researchclaw/experiment:latest\"\n    network_policy: \"setup_only\"   # none | setup_only | pip_only | full\n    gpu_enabled: true\n    memory_limit_mb: 8192\n    auto_install_deps: true        # Auto-detect imports → requirements.txt\n  ssh_remote:\n    host: \"\"                       # GPU server hostname\n    gpu_ids: []                    # Available GPU IDs\n    remote_workdir: \"/tmp/researchclaw_experiments\"\n  opencode:                          # OpenCode Beast Mode (auto-installed via `researchclaw setup`)\n    enabled: true                    # Master switch (default: true)\n    auto: true                       # Auto-trigger without confirmation (default: true)\n    complexity_threshold: 0.2        # 0.0-1.0 — higher = only trigger on complex experiments\n    model: \"\"                        # Override model (empty = use llm.primary_model)\n    timeout_sec: 600                 # Max seconds for OpenCode generation\n    max_retries: 1                   # Retry count on failure\n    workspace_cleanup: true          # Remove temp workspace after collection\n  code_agent:                        # CodeAgent v2 — multi-phase code generation\n    enabled: true                    # Use CodeAgent instead of legacy single-prompt codegen\n    architecture_planning: true      # Generate deep implementation blueprint before coding\n    sequential_generation: true      # Generate files one-by-one following dependency DAG\n    hard_validation: true            # AST-based validation gates (blocks identical ablations, hardcoded metrics)\n    hard_validation_max_repairs: 2   # Max repair attempts when validation fails\n    exec_fix_max_iterations: 3       # Execution-in-the-loop fix attempts\n    exec_fix_timeout_sec: 60         # Timeout per exec-fix attempt\n  benchmark_agent:                   # BenchmarkAgent — automated dataset & baseline selection\n    enabled: true                    # Enable 4-agent benchmark pipeline (Surveyor→Selector→Acquirer→Validator)\n    enable_hf_search: true           # Search HuggingFace Datasets\n    enable_web_search: true          # Search Google Scholar for benchmarks\n    tier_limit: 2                    # Dataset tier filtering (1=small/cached, 2=medium, 3=large)\n    min_benchmarks: 1                # Minimum datasets required\n    min_baselines: 2                 # Minimum baseline methods required\n  figure_agent:                      # FigureAgent — academic figure generation\n    enabled: true                    # Enable 5-agent figure pipeline (Planner→CodeGen→Renderer→Critic→Integrator)\n    min_figures: 3                   # Minimum figures to generate\n    max_figures: 8                   # Maximum figures\n    max_iterations: 3                # Critic-driven refinement iterations\n    dpi: 300                         # Output resolution\n    strict_mode: false               # Fail pipeline if figure generation fails\n  repair:                            # Anti-fabrication experiment repair\n    enabled: true                    # Auto-diagnose and repair failed experiments\n    max_cycles: 3                    # Repair retry loops\n    min_completion_rate: 0.5         # >=50% conditions must complete to proceed\n    min_conditions: 2                # At least 2 conditions for valid experiment\n    use_opencode: true               # Route repairs through OpenCode Beast Mode\n\n# === Web Search (Optional) ===\nweb_search:\n  enabled: true                      # Enable web-augmented literature search\n  tavily_api_key_env: \"TAVILY_API_KEY\"  # Tavily API key env var (optional)\n  enable_scholar: true               # Google Scholar search\n  enable_pdf_extraction: true        # Extract text from PDFs\n  max_web_results: 10                # Max web results per query\n\n# === Export ===\nexport:\n  target_conference: \"neurips_2025\"  # neurips_2025 | iclr_2026 | icml_2026\n  authors: \"Anonymous\"\n  bib_file: \"references\"\n\n# === Prompts ===\nprompts:\n  custom_file: \"\"                  # Path to custom prompts YAML (empty = defaults)\n\n# === HITL Co-Pilot (NEW in v0.4.0) ===\nhitl:\n  enabled: false                     # Set to true to enable HITL\n  mode: co-pilot                     # full-auto | gate-only | checkpoint | step-by-step | co-pilot | custom\n  cost_budget_usd: 0.0              # Cost limit in USD (0 = no limit)\n  notifications:\n    on_pause: true                   # Notify when pipeline pauses\n    on_quality_drop: true            # Notify on quality issues\n    channels: [\"terminal\"]           # terminal | slack | webhook\n  timeouts:\n    default_human_timeout_sec: 86400 # Wait up to 24h for human input\n    auto_proceed_on_timeout: false   # If true, auto-approve on timeout\n  collaboration:\n    max_chat_turns: 50               # Max turns per collaboration session\n    save_chat_history: true          # Persist chat logs\n  stage_policies: {}                 # Per-stage overrides (for 'custom' mode)\n\n# === Security ===\nsecurity:\n  hitl_required_stages: [5, 9, 20] # Stages requiring human approval\n  allow_publish_without_approval: false\n  redact_sensitive_logs: true\n\n# === Knowledge Base ===\nknowledge_base:\n  backend: \"markdown\"              # markdown | obsidian\n  root: \"docs/kb\"\n\n# === Notifications ===\nnotifications:\n  channel: \"console\"               # console | discord | slack\n  target: \"\"\n\n# === MetaClaw Bridge (Optional) ===\nmetaclaw_bridge:\n  enabled: false                   # Set to true to enable cross-run learning\n  proxy_url: \"http://localhost:30000\"  # MetaClaw proxy URL\n  skills_dir: \"~/.metaclaw/skills\" # Where arc-* skills are stored\n  fallback_url: \"\"                 # Direct LLM fallback when proxy is down\n  fallback_api_key: \"\"             # API key for fallback endpoint\n  lesson_to_skill:\n    enabled: true                  # Auto-convert lessons to skills\n    min_severity: \"warning\"        # Minimum severity to convert\n    max_skills_per_run: 3          # Max new skills per pipeline run\n  prm:                             # Process Reward Model quality gate (optional)\n    enabled: false                 # Use LLM-as-judge to score stage outputs\n    model: \"gpt-5.4\"              # PRM judge model\n    votes: 3                       # Majority vote count\n    gate_stages: [5, 9, 15, 20]   # Stages to apply PRM gates\n\n# === OpenClaw Bridge ===\nopenclaw_bridge:\n  use_cron: false                  # Scheduled research runs\n  use_message: false               # Progress notifications\n  use_memory: false                # Cross-session knowledge persistence\n  use_sessions_spawn: false        # Spawn parallel sub-sessions\n  use_web_fetch: false             # Live web search\n  use_browser: false               # Browser-based paper collection\n```\n\n</details>\n\n---\n\n## 🔭 HEP-ph Physics Mode (collider_agent)\n\nWhen `project.profile=hep_ph` and `experiment.mode=collider_agent`, the\npipeline routes Stage 12 through ColliderAgent (Lagrangian → FeynRules →\nMadGraph5 → figures via Magnus cloud) instead of the default Python ML\nsandbox.\n\n### Mid-stage HITL\n\nStage 10 (CODE_GENERATION) becomes a HITL gate. The pipeline pauses with\n`collider_plan.md` open in `$EDITOR` so you can review or edit the physics\nprompt before ColliderAgent runs. Reject sends control back to Stage 9\n(EXPERIMENT_DESIGN); the hypothesis from Stage 8 stays intact.\n\n### Incremental experiments (`--incremental-experiment`)\n\nTo **add new mass points or analyses to a completed run** without redoing\nthe heavy simulation, re-launch with `--incremental-experiment` and either\n`--from-stage CODE_GENERATION` (also edit the prompt) or\n`--from-stage EXPERIMENT_RUN` (reuse existing prompt):\n\n```bash\npython -m researchclaw run --profile hep_ph --output artifacts/<run_id> \\\n    --from-stage CODE_GENERATION --incremental-experiment\n```\n\nThe Stage 12 sandbox will:\n\n1. Snapshot the existing `stage-12/` tree to `stage-12_v{N}/`.\n2. Save the previous `collider_plan.md` as `collider_plan.prev.md`.\n3. Build `workspace_manifest.json` listing reusable artifacts.\n4. Send ColliderAgent a three-part prompt:\n   `CONTINUATION CONTEXT` + `PRIOR PLAN` + your new delta.\n5. Merge ColliderAgent's new `results.json` with the snapshot's prior one\n   (metrics: new wins on collisions, old-only kept; artifact lists:\n   concat + dedupe). The merge is recorded in `incremental_merge.json`.\n\nStage 13 then promotes the merged state to `experiment_final/` as before.\n\n> Note: re-entering at Stage 13 alone is a no-op in collider mode and will\n> NOT run any new physics — Stage 13 is a `shutil.copy2` passthrough.\n> PIVOT (Stage 15 decision) intentionally remains destructive because\n> changing the hypothesis makes prior events invalid.\n\n---\n\n## 🙏 Acknowledgments\n\nInspired by:\n\n- 🔬 [AI Scientist](https://github.com/SakanaAI/AI-Scientist) (Sakana AI) — Automated research pioneer\n- 🧠 [AutoResearch](https://github.com/karpathy/autoresearch) (Andrej Karpathy) — End-to-end research automation\n- 🌐 [FARS](https://analemma.ai/blog/introducing-fars/) (Analemma) — Fully Automated Research System\n\n---\n\n## 📄 License\n\nMIT — see [LICENSE](LICENSE) for details.\n\n---\n\n## 📌 Citation\n\nIf you find AutoResearchClaw useful, please cite:\n\n```bibtex\n@misc{liu2026autoresearchclawselfreinforcingautonomousresearch,\n      title={AutoResearchClaw: Self-Reinforcing Autonomous Research with Human-AI Collaboration},\n      author={Jiaqi Liu and Shi Qiu and Mairui Li and Bingzhou Li and Haonian Ji and Siwei Han and Xinyu Ye and Peng Xia and Zihan Dong and Congyu Zhang and Letian Zhang and Guiming Chen and Haoqin Tu and Xinyu Yang and Lu Feng and Xujiang Zhao and Haifeng Chen and Jiawei Zhou and Xiao Wang and Weitong Zhang and Hongtu Zhu and Yun Li and Jieru Mei and Hongliang Fei and Jiaheng Zhang and Linjie Li and Linjun Zhang and Yuyin Zhou and Sheng Wang and Caiming Xiong and James Zou and Zeyu Zheng and Cihang Xie and Mingyu Ding and Huaxiu Yao},\n      year={2026},\n      eprint={2605.20025},\n      archivePrefix={arXiv},\n      primaryClass={cs.AI},\n      url={https://arxiv.org/abs/2605.20025},\n}\n```\n\n<p align=\"center\">\n  <sub>Built with 🦞 by the AutoResearchClaw team</sub>\n</p>\n","summary":"AutoResearchClaw is an autonomous research framework designed to generate academic papers by simply processing a user's research idea. It leverages domain-specialized experiment agents and a self-evolving workflow to handle complex research tasks, either through fully automated execution or human-in-the-loop collaborative guidance. This tool is ideal for researchers, students, and academics who want to streamline the experimental, analytical, and drafting phases of their scholarly work.","description":"Fully autonomous & self-evolving research from idea to paper. Chat an Idea. Get a Paper. 🦞","stars":13106,"language":"Python"},{"owner":"twentyhq","repo":"twenty","url":"https://github.com/twentyhq/twenty","readme":"<p align=\"center\">\n  <a href=\"https://www.twenty.com\">\n    <img src=\"./packages/twenty-website/public/images/core/logo.svg\" width=\"100px\" alt=\"Twenty logo\" />\n  </a>\n</p>\n\n<h2 align=\"center\" >The #1 Open-Source CRM</h2>\n\n<p align=\"center\"><a href=\"https://twenty.com\"><img src=\"./packages/twenty-website/public/images/readme/globe-icon.svg\" width=\"12\" height=\"12\"/> Website</a> · <a href=\"https://docs.twenty.com\"><img src=\"./packages/twenty-website/public/images/readme/book-icon.svg\" width=\"12\" height=\"12\"/> Documentation</a> · <a href=\"https://github.com/orgs/twentyhq/projects/1\"><img src=\"./packages/twenty-website/public/images/readme/map-icon.svg\" width=\"12\" height=\"12\"/> Roadmap </a> · <a href=\"https://discord.gg/cx5n4Jzs57\"><img src=\"./packages/twenty-website/public/images/readme/discord-icon.svg\" width=\"12\" height=\"12\"/> Discord</a> · <a href=\"https://www.figma.com/file/xt8O9mFeLl46C5InWwoMrN/Twenty\"><img src=\"./packages/twenty-website/public/images/readme/figma-icon.webp\"  width=\"12\" height=\"12\"/>  Figma</a></p>\n\n<p align=\"center\">\n  <a href=\"https://www.twenty.com\">\n    <picture>\n      <source media=\"(prefers-color-scheme: dark)\" srcset=\"./packages/twenty-website/public/images/readme/github-cover-dark.webp\" />\n      <source media=\"(prefers-color-scheme: light)\" srcset=\"./packages/twenty-website/public/images/readme/github-cover-light.webp\" />\n      <img src=\"./packages/twenty-website/public/images/readme/github-cover-light.webp\" alt=\"Twenty banner\" />\n    </picture>\n  </a>\n</p>\n\n<br />\n\n# Why Twenty\n\nTwenty gives technical teams the building blocks for a custom CRM that meets complex business needs and quickly adapts as the business evolves. Twenty is the CRM you build, ship, and version like the rest of your stack.\n\n<a href=\"https://twenty.com/resources/why-twenty\"><img src=\"./packages/twenty-website/public/images/readme/star-icon.svg\" width=\"14\" height=\"14\"/> Learn more about why we built Twenty</a>\n\n<br />\n\n# Installation\n\n### <img src=\"./packages/twenty-website/public/images/readme/globe-icon.svg\" width=\"14\" height=\"14\"/> Cloud\n\nThe fastest way to get started. Sign up at [twenty.com](https://twenty.com) and spin up a workspace in under a minute, with no infrastructure to manage and always up to date.\n\n### <img src=\"./packages/twenty-website/public/images/readme/book-icon.svg\" width=\"14\" height=\"14\"/> Build an app\n\nScaffold a new app with the Twenty CLI:\n\n```bash\nnpx create-twenty-app my-app\n```\n\nDefine objects, fields, and views as code:\n\n```ts\nimport { defineObject, FieldType } from 'twenty-sdk/define';\n\nexport default defineObject({\n  nameSingular: 'deal',\n  namePlural: 'deals',\n  labelSingular: 'Deal',\n  labelPlural: 'Deals',\n  fields: [\n    { name: 'name', label: 'Name', type: FieldType.TEXT },\n    { name: 'amount', label: 'Amount', type: FieldType.CURRENCY },\n    { name: 'closeDate', label: 'Close Date', type: FieldType.DATE_TIME },\n  ],\n});\n```\n\nThen ship it to your workspace:\n\n```bash\nnpx twenty app:publish --private\n```\n\nSee the [app development guide](https://docs.twenty.com/developers/extend/apps/getting-started) for objects, views, agents, and logic functions.\n\n### <img src=\"./packages/twenty-website/public/images/readme/rocket-icon.svg\" width=\"14\" height=\"14\"/> Self-hosting\n\nRun Twenty on your own infrastructure with [Docker Compose](https://docs.twenty.com/developers/self-host/capabilities/docker-compose), or contribute locally via the [local setup guide](https://docs.twenty.com/developers/contribute/capabilities/local-setup).\n\n<br />\n<br />\n\n# Everything you need\n\nTwenty gives you the building blocks of a modern CRM (objects, views, workflows, and agents) and lets you extend them as code. Here's a tour of what's in the box.\n\nWant to go deeper? Read the <a href=\"https://docs.twenty.com/user-guide/introduction\"><img src=\"./packages/twenty-website/public/images/readme/planner-icon.svg\" width=\"14\" height=\"14\"/> User Guide</a> for product walkthroughs, or the <a href=\"https://docs.twenty.com\"><img src=\"./packages/twenty-website/public/images/readme/book-icon.svg\" width=\"14\" height=\"14\"/> Documentation</a> for developer reference.\n\n<table align=\"center\">\n  <tr>\n    <td width=\"50%\">\n      <picture>\n        <source media=\"(prefers-color-scheme: dark)\" srcset=\"./packages/twenty-website/public/images/readme/v2-build-apps-dark.webp\" />\n        <source media=\"(prefers-color-scheme: light)\" srcset=\"./packages/twenty-website/public/images/readme/v2-build-apps-light.webp\" />\n        <img src=\"./packages/twenty-website/public/images/readme/v2-build-apps-light.webp\" alt=\"Create your apps\" />\n      </picture>\n      <p align=\"center\"><a href=\"https://docs.twenty.com/developers/extend/apps/getting-started\"><img src=\"./packages/twenty-website/public/images/readme/code-icon.svg\" width=\"16\" height=\"16\"/> Learn more about apps in doc</a></p>\n    </td>\n    <td width=\"50%\">\n      <picture>\n        <source media=\"(prefers-color-scheme: dark)\" srcset=\"./packages/twenty-website/public/images/readme/v2-version-control-dark.webp\" />\n        <source media=\"(prefers-color-scheme: light)\" srcset=\"./packages/twenty-website/public/images/readme/v2-version-control-light.webp\" />\n        <img src=\"./packages/twenty-website/public/images/readme/v2-version-control-light.webp\" alt=\"Stay on top with version control\" />\n      </picture>\n      <p align=\"center\"><a href=\"https://docs.twenty.com/developers/extend/apps/publishing\"><img src=\"./packages/twenty-website/public/images/readme/monitor-icon.svg\" width=\"16\" height=\"16\"/> Learn more about version control in doc</a></p>\n    </td>\n  </tr>\n  <tr>\n    <td width=\"50%\">\n      <picture>\n        <source media=\"(prefers-color-scheme: dark)\" srcset=\"./packages/twenty-website/public/images/readme/v2-all-tools-dark.webp\" />\n        <source media=\"(prefers-color-scheme: light)\" srcset=\"./packages/twenty-website/public/images/readme/v2-all-tools-light.webp\" />\n        <img src=\"./packages/twenty-website/public/images/readme/v2-all-tools-light.webp\" alt=\"All the tools you need to build anything\" />\n      </picture>\n      <p align=\"center\"><a href=\"https://docs.twenty.com/developers/extend/apps/building\"><img src=\"./packages/twenty-website/public/images/readme/rocket-icon.svg\" width=\"16\" height=\"16\"/> Learn more about primitives in doc</a></p>\n    </td>\n    <td width=\"50%\">\n      <picture>\n        <source media=\"(prefers-color-scheme: dark)\" srcset=\"./packages/twenty-website/public/images/readme/v2-tools-dark.webp\" />\n        <source media=\"(prefers-color-scheme: light)\" srcset=\"./packages/twenty-website/public/images/readme/v2-tools-light.webp\" />\n        <img src=\"./packages/twenty-website/public/images/readme/v2-tools-light.webp\" alt=\"Customize your layouts\" />\n      </picture>\n      <p align=\"center\"><a href=\"https://docs.twenty.com/user-guide/layout/overview\"><img src=\"./packages/twenty-website/public/images/readme/planner-icon.svg\" width=\"16\" height=\"16\"/> Learn more about layouts in doc</a></p>\n    </td>\n  </tr>\n  <tr>\n    <td width=\"50%\">\n      <picture>\n        <source media=\"(prefers-color-scheme: dark)\" srcset=\"./packages/twenty-website/public/images/readme/v2-ai-agents-dark.webp\" />\n        <source media=\"(prefers-color-scheme: light)\" srcset=\"./packages/twenty-website/public/images/readme/v2-ai-agents-light.webp\" />\n        <img src=\"./packages/twenty-website/public/images/readme/v2-ai-agents-light.webp\" alt=\"AI agents and chats\" />\n      </picture>\n      <p align=\"center\"><a href=\"https://docs.twenty.com/user-guide/ai/overview\"><img src=\"./packages/twenty-website/public/images/readme/message-icon.svg\" width=\"16\" height=\"16\"/> Learn more about AI in doc</a></p>\n    </td>\n    <td width=\"50%\">\n      <picture>\n        <source media=\"(prefers-color-scheme: dark)\" srcset=\"./packages/twenty-website/public/images/readme/v2-crm-tools-dark.webp\" />\n        <source media=\"(prefers-color-scheme: light)\" srcset=\"./packages/twenty-website/public/images/readme/v2-crm-tools-light.webp\" />\n        <img src=\"./packages/twenty-website/public/images/readme/v2-crm-tools-light.webp\" alt=\"Plus all the tools of a good CRM\" />\n      </picture>\n      <p align=\"center\"><a href=\"https://docs.twenty.com/user-guide/introduction\"><img src=\"./packages/twenty-website/public/images/readme/star-icon.svg\" width=\"16\" height=\"16\"/> Learn more about CRM features in doc</a></p>\n    </td>\n  </tr>\n</table>\n\n<br />\n\n# Stack\n\n- <a href=\"https://www.typescriptlang.org/\"><img src=\"./packages/twenty-website/public/images/readme/stack-typescript.svg\" width=\"14\" height=\"14\"/> TypeScript</a>\n- <a href=\"https://nx.dev/\"><img src=\"./packages/twenty-website/public/images/readme/stack-nx.svg\" width=\"14\" height=\"14\"/> Nx</a>\n- <a href=\"https://nestjs.com/\"><img src=\"./packages/twenty-website/public/images/readme/stack-nestjs.svg\" width=\"14\" height=\"14\"/> NestJS</a>, with <a href=\"https://bullmq.io/\">BullMQ</a>, <a href=\"https://www.postgresql.org/\"><img src=\"./packages/twenty-website/public/images/readme/stack-postgresql.svg\" width=\"14\" height=\"14\"/> PostgreSQL</a>, <a href=\"https://redis.io/\"><img src=\"./packages/twenty-website/public/images/readme/stack-redis.svg\" width=\"14\" height=\"14\"/> Redis</a>\n- <a href=\"https://reactjs.org/\"><img src=\"./packages/twenty-website/public/images/readme/stack-react.svg\" width=\"14\" height=\"14\"/> React</a>, with <a href=\"https://jotai.org/\">Jotai</a>, <a href=\"https://linaria.dev/\">Linaria</a> and <a href=\"https://lingui.dev/\">Lingui</a>\n\n\n\n# Thanks\n\n<p align=\"center\">\n  <a href=\"https://www.chromatic.com/\"><img src=\"./packages/twenty-website/public/images/readme/chromatic.webp\" height=\"28\" alt=\"Chromatic\" /></a>\n  &nbsp;&nbsp;&nbsp;&nbsp;\n  <a href=\"https://greptile.com\"><img src=\"./packages/twenty-website/public/images/readme/greptile.webp\" height=\"28\" alt=\"Greptile\" /></a>\n  &nbsp;&nbsp;&nbsp;&nbsp;\n  <a href=\"https://sentry.io/\"><img src=\"./packages/twenty-website/public/images/readme/sentry.webp\" height=\"28\" alt=\"Sentry\" /></a>\n  &nbsp;&nbsp;&nbsp;&nbsp;\n  <a href=\"https://crowdin.com/\"><img src=\"./packages/twenty-website/public/images/readme/crowdin.webp\" height=\"28\" alt=\"Crowdin\" /></a>\n</p>\n\n  Thanks to these amazing services that we use and recommend for UI testing (Chromatic), code review (Greptile), catching bugs (Sentry) and translating (Crowdin).\n\n\n# Join the Community\n\n<p><a href=\"https://github.com/twentyhq/twenty\"><img src=\"./packages/twenty-website/public/images/readme/star-icon.svg\" width=\"12\" height=\"12\"/> Star the repo</a> · <a href=\"https://discord.gg/cx5n4Jzs57\"><img src=\"./packages/twenty-website/public/images/readme/discord-icon.svg\" width=\"12\" height=\"12\"/> Discord</a> · <a href=\"https://github.com/twentyhq/twenty/discussions\"><img src=\"./packages/twenty-website/public/images/readme/message-icon.svg\" width=\"12\" height=\"12\"/> Feature requests</a> · <a href=\"https://github.com/orgs/twentyhq/projects/1/views/35\"><img src=\"./packages/twenty-website/public/images/readme/rocket-icon.svg\" width=\"12\" height=\"12\"/> Releases</a> · <a href=\"https://twitter.com/twentycrm\"><img src=\"./packages/twenty-website/public/images/readme/x-icon.svg\" width=\"12\" height=\"12\"/> X</a> · <a href=\"https://www.linkedin.com/company/twenty/\"><img src=\"./packages/twenty-website/public/images/readme/linkedin-icon.svg\" width=\"12\" height=\"12\"/> LinkedIn</a> · <a href=\"https://twenty.crowdin.com/twenty\"><img src=\"./packages/twenty-website/public/images/readme/language-icon.svg\" width=\"12\" height=\"12\"/> Crowdin</a> · <a href=\"https://github.com/twentyhq/twenty/contribute\"><img src=\"./packages/twenty-website/public/images/readme/code-icon.svg\" width=\"12\" height=\"12\"/> Contribute</a></p>\n","summary":"Twenty is an open-source CRM designed to provide technical teams with the foundational building blocks for a highly customizable customer relationship management system. It allows developers to define objects, fields, and workflows as code, enabling the platform to be shipped and versioned like any other component of a moder
