Claude Code configuration for vulnerabilities, misconfigurations, and injection risks.\n\n```bash\n# Quick scan (no install needed)\nnpx ecc-agentshield scan\n\n# Auto-fix safe issues\nnpx ecc-agentshield scan --fix\n\n# Deep analysis with three Opus 4.6 agents\nnpx ecc-agentshield scan --opus --stream\n\n# Generate secure config from scratch\nnpx ecc-agentshield init\n```\n\n**What it scans:** CLAUDE.md, settings.json, MCP configs, hooks, agent definitions, and skills across 5 categories — secrets detection (14 patterns), permission auditing, hook injection analysis, MCP server risk profiling, and agent config review.\n\n**The `--opus` flag** runs three Claude Opus 4.6 agents in a red-team/blue-team/auditor pipeline. The attacker finds exploit chains, the defender evaluates protections, and the auditor synthesizes both into a prioritized risk assessment. Adversarial reasoning, not just pattern matching.\n\n**Output formats:** Terminal (color-graded A-F), JSON (CI pipelines), Markdown, HTML. Exit code 2 on critical findings for build gates.\n\nUse `/security-scan` in Claude Code to run it, or add to CI with the [GitHub Action](https://github.com/affaan-m/agentshield).\n\n[GitHub](https://github.com/affaan-m/agentshield) | [npm](https://www.npmjs.com/package/ecc-agentshield)\n\n### Continuous Learning v2\n\nThe instinct-based learning system automatically learns your patterns:\n\n```bash\n/instinct-status        # Show learned instincts with confidence\n/instinct-import <file> # Import instincts from others\n/instinct-export        # Export your instincts for sharing\n/evolve                 # Cluster related instincts into skills\n```\n\nSee `skills/continuous-learning-v2/` for full documentation.\nKeep `continuous-learning/` only when you explicitly want the legacy v1 Stop-hook learned-skill flow.\n\n---\n\n## Requirements\n\n### Claude Code CLI Version\n\n**Minimum version: v2.1.0 or later**\n\nThis plugin requires Claude Code CLI v2.1.0+ due to changes in how the plugin system handles hooks.\n\nCheck your version:\n```bash\nclaude --version\n```\n\n### Important: Hooks Auto-Loading Behavior\n\n> WARNING: **For Contributors:** Do NOT add a `\"hooks\"` field to `.claude-plugin/plugin.json`. This is enforced by a regression test.\n\nClaude Code v2.1+ **automatically loads** `hooks/hooks.json` from any installed plugin by convention. Explicitly declaring it in `plugin.json` causes a duplicate detection error:\n\n```\nDuplicate hooks file detected: ./hooks/hooks.json resolves to already-loaded file\n```\n\n**History:** This has caused repeated fix/revert cycles in this repo ([#29](https://github.com/affaan-m/ECC/issues/29), [#52](https://github.com/affaan-m/ECC/issues/52), [#103](https://github.com/affaan-m/ECC/issues/103)). The behavior changed between Claude Code versions, leading to confusion. We now have a regression test to prevent this from being reintroduced.\n\n---\n\n## Installation\n\n### Option 1: Install as Plugin (Recommended)\n\nThe easiest way to use this repo - install as a Claude Code plugin:\n\n```bash\n# Add this repo as a marketplace\n/plugin marketplace add https://github.com/affaan-m/ECC\n\n# Install the plugin\n/plugin install ecc@ecc\n```\n\nOr add directly to your `~/.claude/settings.json`:\n\n```json\n{\n  \"extraKnownMarketplaces\": {\n    \"ecc\": {\n      \"source\": {\n        \"source\": \"github\",\n        \"repo\": \"affaan-m/ECC\"\n      }\n    }\n  },\n  \"enabledPlugins\": {\n    \"ecc@ecc\": true\n  }\n}\n```\n\nThis gives you instant access to all commands, agents, skills, and hooks.\n\n> **Note:** The Claude Code plugin system does not support distributing `rules` via plugins ([upstream limitation](https://code.claude.com/docs/en/plugins-reference)). You need to install rules manually:\n>\n> ```bash\n> # Clone the repo first\n> git clone https://github.com/affaan-m/ECC.git\n> cd ECC\n>\n> # Option A: User-level rules (applies to all projects)\n> mkdir -p ~/.claude/rules/ecc\n> cp -r rules/common ~/.claude/rules/ecc/\n> cp -r rules/typescript ~/.claude/rules/ecc/   # pick your stack\n> cp -r rules/python ~/.claude/rules/ecc/\n> cp -r rules/golang ~/.claude/rules/ecc/\n> cp -r rules/php ~/.claude/rules/ecc/\n>\n> # Option B: Project-level rules (applies to current project only)\n> mkdir -p .claude/rules/ecc\n> cp -r rules/common .claude/rules/ecc/\n> cp -r rules/typescript .claude/rules/ecc/     # pick your stack\n> ```\n\n---\n\n### Option 2: Manual Installation\n\nIf you prefer manual control over what's installed:\n\n```bash\n# Clone the repo\ngit clone https://github.com/affaan-m/ECC.git\ncd ECC\n\n# Copy agents to your Claude config\ncp agents/*.md ~/.claude/agents/\n\n# Copy rules directories (common + language-specific)\nmkdir -p ~/.claude/rules/ecc\ncp -r rules/common ~/.claude/rules/ecc/\ncp -r rules/typescript ~/.claude/rules/ecc/   # pick your stack\ncp -r rules/python ~/.claude/rules/ecc/\ncp -r rules/golang ~/.claude/rules/ecc/\ncp -r rules/php ~/.claude/rules/ecc/\ncp -r rules/arkts ~/.claude/rules/ecc/\n\n# Copy skills first (primary workflow surface)\n# Recommended (new users): core/general skills only\nmkdir -p ~/.claude/skills/ecc\ncp -r .agents/skills/* ~/.claude/skills/ecc/\ncp -r skills/search-first ~/.claude/skills/ecc/\n\n# Optional: add niche/framework-specific skills only when needed\n# for s in django-patterns django-tdd laravel-patterns springboot-patterns quarkus-patterns; do\n# cp -r skills/$s ~/.claude/skills/ecc/\n# done\n\n# Optional: keep maintained slash-command compatibility during migration\nmkdir -p ~/.claude/commands\ncp commands/*.md ~/.claude/commands/\n\n# Retired shims live in legacy-command-shims/commands/.\n# Copy individual files from there only if you still need old names such as /tdd.\n```\n\n#### Install hooks\n\nDo not copy the raw repo `hooks/hooks.json` into `~/.claude/settings.json` or `~/.claude/hooks/hooks.json`. That file is plugin/repo-oriented and is meant to be installed through the ECC installer or loaded as a plugin, so raw copying is not a supported manual install path.\n\nUse the installer to install only the Claude hook runtime so command paths are rewritten correctly:\n\n```bash\n# macOS / Linux\nbash ./install.sh --target claude --modules hooks-runtime\n```\n\n```powershell\n# Windows PowerShell\npwsh -File .\\install.ps1 --target claude --modules hooks-runtime\n```\n\nThat writes resolved hooks to `~/.claude/hooks/hooks.json` and leaves any existing `~/.claude/settings.json` untouched.\n\nIf you installed ECC via `/plugin install`, do not copy those hooks into `settings.json`. Claude Code v2.1+ already auto-loads plugin `hooks/hooks.json`, and duplicating them in `settings.json` causes duplicate execution and cross-platform hook conflicts.\n\nWindows note: the Claude config directory is `%USERPROFILE%\\\\.claude`, not `~/claude`.\n\n#### Configure MCPs\n\nClaude plugin installs intentionally do not auto-enable ECC's bundled MCP server definitions. This avoids overlong plugin MCP tool names on strict third-party gateways while keeping manual MCP setup available.\n\nUse Claude Code's `/mcp` command or CLI-managed MCP setup for live Claude Code server changes. Use `/mcp` for Claude Code runtime disables; Claude Code persists those choices in `~/.claude.json`.\n\nFor repo-local MCP access, copy desired MCP server definitions from `mcp-configs/mcp-servers.json` into a project-scoped `.mcp.json`.\n\nIf you already run your own copies of ECC-bundled MCPs, set:\n\n```bash\nexport ECC_DISABLED_MCPS=\"github,context7,exa,playwright,sequential-thinking,memory\"\n```\n\nECC-managed install and Codex sync flows will skip or remove those bundled servers instead of re-adding duplicates. `ECC_DISABLED_MCPS` is an ECC install/sync filter, not a live Claude Code toggle.\n\n**Important:** Replace `YOUR_*_HERE` placeholders with your actual API keys.\n\n---\n\n## Key Concepts\n\n### Agents\n\nSubagents handle delegated tasks with limited scope. Example:\n\n```markdown\n---\nname: code-reviewer\ndescription: Reviews code for quality, security, and maintainability\ntools: [\"Read\", \"Grep\", \"Glob\", \"Bash\"]\nmodel: opus\n---\n\nYou are a senior code reviewer...\n```\n\n### Skills\n\nSkills are the primary workflow surface. They can be invoked directly, suggested automatically, and reused by agents. ECC still ships maintained `commands/` during migration, while retired short-name shims live under `legacy-command-shims/` for explicit opt-in only. New workflow development should land in `skills/` first.\n\n```markdown\n# TDD Workflow\n\n1. Define interfaces first\n2. Write failing tests (RED)\n3. Implement minimal code (GREEN)\n4. Refactor (IMPROVE)\n5. Verify 80%+ coverage\n```\n\n### Hooks\n\nHooks fire on tool events. Example - warn about console.log:\n\n```json\n{\n  \"matcher\": \"tool == \\\"Edit\\\" && tool_input.file_path matches \\\"\\\\\\\\.(ts|tsx|js|jsx)$\\\"\",\n  \"hooks\": [{\n    \"type\": \"command\",\n    \"command\": \"#!/bin/bash\\ngrep -n 'console\\\\.log' \\\"$file_path\\\" && echo '[Hook] Remove console.log' >&2\"\n  }]\n}\n```\n\n### Rules\n\nRules are always-follow guidelines, organized into `common/` (language-agnostic) + language-specific directories:\n\n```\nrules/\n  common/          # Universal principles (always install)\n  typescript/      # TS/JS specific patterns and tools\n  python/          # Python specific patterns and tools\n  golang/          # Go specific patterns and tools\n  swift/           # Swift specific patterns and tools\n  php/             # PHP specific patterns and tools\n  arkts/           # HarmonyOS / ArkTS patterns and constraints\n```\n\nSee [`rules/README.md`](rules/README.md) for installation and structure details.\n\n---\n\n## Which Agent Should I Use?\n\nNot sure where to start? Use this quick reference. Skills are the canonical workflow surface; maintained slash entries stay available for command-first workflows.\n\n| I want to... | Use this surface | Agent used |\n|--------------|-----------------|------------|\n| Plan a new feature | `/ecc:plan \"Add auth\"` | planner |\n| Design system architecture | `/ecc:plan` + architect agent | architect |\n| Write code with tests first | `tdd-workflow` skill | tdd-guide |\n| Review code I just wrote | `/code-review` | code-reviewer |\n| Fix a failing build | `/build-fix` | build-error-resolver |\n| Run end-to-end tests | `e2e-testing` skill | e2e-runner |\n| Find security vulnerabilities | `/security-scan` | security-reviewer |\n| Remove dead code | `/refactor-clean` | refactor-cleaner |\n| Update documentation | `/update-docs` | doc-updater |\n| Review Go code | `/go-review` | go-reviewer |\n| Review Python code | `/python-review` | python-reviewer |\n| Review F# code | *(invoke `fsharp-reviewer` directly)* | fsharp-reviewer |\n| Review TypeScript/JavaScript code | *(invoke `typescript-reviewer` directly)* | typescript-reviewer |\n| Develop HarmonyOS apps | *(invoke `harmonyos-app-resolver` directly)* | harmonyos-app-resolver |\n| Audit database queries | *(auto-delegated)* | database-reviewer |\n| Review production ML changes | `mle-workflow` skill + `mle-reviewer` agent | mle-reviewer |\n\n### Common Workflows\n\nSlash forms below are shown where they remain part of the maintained command surface. Retired short-name shims such as `/tdd` and `/eval` live in `legacy-command-shims/` for explicit opt-in only.\n\n**Starting a new feature:**\n```\n/ecc:plan \"Add user authentication with OAuth\"\n                                              → planner creates implementation blueprint\ntdd-workflow skill                            → tdd-guide enforces write-tests-first\n/code-review                                  → code-reviewer checks your work\n```\n\n**Fixing a bug:**\n```\ntdd-workflow skill                            → tdd-guide: write a failing test that reproduces it\n                                              → implement the fix, verify test passes\n/code-review                                  → code-reviewer: catch regressions\n```\n\n**Preparing for production:**\n```\n/security-scan                                → security-reviewer: OWASP Top 10 audit\ne2e-testing skill                             → e2e-runner: critical user flow tests\n/test-coverage                                → verify 80%+ coverage\n```\n\n---\n\n## FAQ\n\n<details>\n<summary><b>How do I check which agents/commands are installed?</b></summary>\n\n```bash\n/plugin list ecc@ecc\n```\n\nThis shows all available agents, commands, and skills from the plugin.\n</details>\n\n<details>\n<summary><b>My hooks aren't working / I see \"Duplicate hooks file\" errors</b></summary>\n\nThis is the most common issue. **Do NOT add a `\"hooks\"` field to `.claude-plugin/plugin.json`.** Claude Code v2.1+ automatically loads `hooks/hooks.json` from installed plugins. Explicitly declaring it causes duplicate detection errors. See [#29](https://github.com/affaan-m/ECC/issues/29), [#52](https://github.com/affaan-m/ECC/issues/52), [#103](https://github.com/affaan-m/ECC/issues/103).\n</details>\n\n<details>\n<summary><b>Can I use ECC with Claude Code on a custom API endpoint or model gateway?</b></summary>\n\nYes. ECC does not hardcode Anthropic-hosted transport settings. It runs locally through Claude Code's normal CLI/plugin surface, so it works with:\n\n- Anthropic-hosted Claude Code\n- Official Claude Code gateway setups using `ANTHROPIC_BASE_URL` and `ANTHROPIC_AUTH_TOKEN`\n- Compatible custom endpoints that speak the Anthropic API Claude Code expects\n\nMinimal example:\n\n```bash\nexport ANTHROPIC_BASE_URL=https://your-gateway.example.com\nexport ANTHROPIC_AUTH_TOKEN=your-token\nclaude\n```\n\nIf your gateway remaps model names, configure that in Claude Code rather than in ECC. ECC's hooks, skills, commands, and rules are model-provider agnostic once the `claude` CLI is already working.\n\nOfficial references:\n- [Claude Code LLM gateway docs](https://docs.anthropic.com/en/docs/claude-code/llm-gateway)\n- [Claude Code model configuration docs](https://docs.anthropic.com/en/docs/claude-code/model-config)\n\n</details>\n\n<details>\n<summary><b>My context window is shrinking / Claude is running out of context</b></summary>\n\nToo many MCP servers eat your context. Each MCP tool description consumes tokens from your 200k window, potentially reducing it to ~70k. SessionStart context is capped at 8000 characters by default; lower it with `ECC_SESSION_START_MAX_CHARS=4000` or disable it with `ECC_SESSION_START_CONTEXT=off` for local-model or low-context setups.\n\n**Fix:** Disable unused MCPs from Claude Code with `/mcp`. Claude Code writes those runtime choices to `~/.claude.json`; `.claude/settings.json` and `.claude/settings.local.json` are not reliable toggles for already-loaded MCP servers.\n\nKeep under 10 MCPs enabled and under 80 tools active.\n</details>\n\n<details>\n<summary><b>Can I use only some components (e.g., just agents)?</b></summary>\n\nYes. Use Option 2 (manual installation) and copy only what you need:\n\n```bash\n# Just agents\ncp agents/*.md ~/.claude/agents/\n\n# Just rules\nmkdir -p ~/.claude/rules/ecc/\ncp -r rules/common ~/.claude/rules/ecc/\n```\n\nEach component is fully independent.\n</details>\n\n<details>\n<summary><b>Does this work with Cursor / OpenCode / Codex / Antigravity / GitHub Copilot?</b></summary>\n\nYes. ECC is cross-platform:\n- **Cursor**: Pre-translated configs in `.cursor/`. See [Cursor IDE Support](#cursor-ide-support).\n- **Gemini CLI**: Experimental project-local support via `.gemini/GEMINI.md` and shared installer plumbing.\n- **OpenCode**: Full plugin support in `.opencode/`. See [OpenCode Support](#opencode-support).\n- **Codex**: First-class support for both macOS app and CLI, with adapter drift guards and SessionStart fallback. See PR [#257](https://github.com/affaan-m/ECC/pull/257).\n- **GitHub Copilot (VS Code)**: Instruction and prompt layer via `.github/copilot-instructions.md`, `.vscode/settings.json`, and `.github/prompts/`. See [GitHub Copilot Support](#github-copilot-support).\n- **Antigravity**: Tightly integrated setup for workflows, skills, and flattened rules in `.agent/`. See [Antigravity Guide](docs/ANTIGRAVITY-GUIDE.md).\n- **JoyCode / CodeBuddy**: Project-local selective install adapters for commands, agents, skills, and flattened rules. See [JoyCode Adapter Guide](docs/JOYCODE-GUIDE.md).\n- **Qwen CLI**: Home-directory selective install adapter for commands, agents, skills, rules, and Qwen config. See [Qwen CLI Adapter Guide](docs/QWEN-GUIDE.md).\n- **Zed**: Project-local selective install adapter for `.zed/settings.json`, flattened rules, commands, agents, and skills.\n- **Non-native harnesses**: Manual fallback path for Grok and similar interfaces. See [Manual Adaptation Guide](docs/MANUAL-ADAPTATION-GUIDE.md).\n- **Claude Code**: Native — this is the primary target.\n</details>\n\n<details>\n<summary><b>How do I contribute a new skill or agent?</b></summary>\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md). The short version:\n1. Fork the repo\n2. Create your skill in `skills/your-skill-name/SKILL.md` (with YAML frontmatter)\n3. Or create an agent in `agents/your-agent.md`\n4. Submit a PR with a clear description of what it does and when to use it\n</details>\n\n---\n\n## Running Tests\n\nThe plugin includes a comprehensive test suite:\n\n```bash\n# Run all tests\nnode tests/run-all.js\n\n# Run individual test files\nnode tests/lib/utils.test.js\nnode tests/lib/package-manager.test.js\nnode tests/hooks/hooks.test.js\n```\n\n---\n\n## Contributing\n\n**Contributions are welcome and encouraged.**\n\nThis repo is meant to be a community resource. If you have:\n- Useful agents or skills\n- Clever hooks\n- Better MCP configurations\n- Improved rules\n\nPlease contribute! See [CONTRIBUTING.md](CONTRIBUTING.md) for guidelines.\n\n### Ideas for Contributions\n\n- Language-specific skills (Rust, C#, Kotlin, Java) — Go, Python, Perl, Swift, TypeScript, and HarmonyOS/ArkTS already included\n- Framework-specific configs (Rails, FastAPI) — Django, NestJS, Spring Boot, and Laravel already included\n- DevOps agents (Kubernetes, Terraform, AWS, Docker)\n- Testing strategies (different frameworks, visual regression)\n- Domain-specific knowledge (ML, data engineering, mobile)\n\n### Community Ecosystem Notes\n\nThese are not bundled with ECC and are not audited by this repo, but they are worth knowing about if you are exploring the broader Claude Code skills ecosystem:\n\n- [claude-seo](https://github.com/AgriciDaniel/claude-seo) — SEO-focused skill and agent collection\n- [claude-ads](https://github.com/AgriciDaniel/claude-ads) — Ad-audit and paid-growth workflow collection\n- [claude-cybersecurity](https://github.com/AgriciDaniel/claude-cybersecurity) — Security-oriented skill and agent collection\n\n---\n\n## Cursor IDE Support\n\nECC provides Cursor IDE support with hooks, rules, agents, skills, commands, and MCP configs adapted for Cursor's project layout.\n\n### Quick Start (Cursor)\n\n```bash\n# macOS/Linux\n./install.sh --target cursor typescript\n./install.sh --target cursor python golang swift php\n```\n\n```powershell\n# Windows PowerShell\n.\\install.ps1 --target cursor typescript\n.\\install.ps1 --target cursor python golang swift php\n```\n\n### What's Included\n\n| Component | Count | Details |\n|-----------|-------|---------|\n| Hook Events | 15 | sessionStart, beforeShellExecution, afterFileEdit, beforeMCPExecution, beforeSubmitPrompt, and 10 more |\n| Hook Scripts | 16 | Thin Node.js scripts delegating to `scripts/hooks/` via shared adapter |\n| Rules | 34 | 9 common (alwaysApply) + 25 language-specific (TypeScript, Python, Go, Swift, PHP) |\n| Agents | 48 | `.cursor/agents/ecc-*.md` when installed; prefixed to avoid collisions with user or marketplace agents |\n| Skills | Shared + Bundled | `.cursor/skills/` for translated additions |\n| Commands | Shared | `.cursor/commands/` if installed |\n| MCP Config | Shared | `.cursor/mcp.json` if installed |\n\n### Cursor Loading Notes\n\nECC does not install root `AGENTS.md` into `.cursor/`. Cursor treats nested `AGENTS.md` files as directory context, so copying ECC's repo identity into a host project would pollute that project.\n\nCursor-native loading behavior can vary by Cursor build. ECC installs agents as `.cursor/agents/ecc-*.md`; if your Cursor build does not expose project agents, those files still work as explicit reference definitions instead of hidden global prompt context.\n\n### Hook Architecture (DRY Adapter Pattern)\n\nCursor has **more hook events than Claude Code** (20 vs 8). The `.cursor/hooks/adapter.js` module transforms Cursor's stdin JSON to Claude Code's format, allowing existing `scripts/hooks/*.js` to be reused without duplication.\n\n```\nCursor stdin JSON → adapter.js → transforms → scripts/hooks/*.js\n                                              (shared with Claude Code)\n```\n\nKey hooks:\n- **beforeShellExecution** — Blocks dev servers outside tmux (exit 2), git push review\n- **afterFileEdit** — Auto-format + TypeScript check + console.log warning\n- **beforeSubmitPrompt** — Detects secrets (sk-, ghp_, AKIA patterns) in prompts\n- **beforeTabFileRead** — Blocks Tab from reading .env, .key, .pem files (exit 2)\n- **beforeMCPExecution / afterMCPExecution** — MCP audit logging\n\n### Rules Format\n\nCursor rules use YAML frontmatter with `description`, `globs`, and `alwaysApply`:\n\n```yaml\n---\ndescription: \"TypeScript coding style extending common rules\"\nglobs: [\"**/*.ts\", \"**/*.tsx\", \"**/*.js\", \"**/*.jsx\"]\nalwaysApply: false\n---\n```\n\n---\n\n## Codex macOS App + CLI Support\n\nECC provides **first-class Codex support** for both the macOS app and CLI, with a reference configuration, Codex-specific AGENTS.md supplement, and shared skills.\n\n### Quick Start (Codex App + CLI)\n\n```bash\n# Run Codex CLI in the repo — AGENTS.md and .codex/ are auto-detected\ncodex\n\n# Automatic setup: sync ECC assets (AGENTS.md, skills, MCP servers) into ~/.codex\nnpm install && bash scripts/sync-ecc-to-codex.sh\n# or: pnpm install && bash scripts/sync-ecc-to-codex.sh\n# or: yarn install && bash scripts/sync-ecc-to-codex.sh\n# or: bun install && bash scripts/sync-ecc-to-codex.sh\n\n# Or manually: copy the reference config to your home directory\ncp .codex/config.toml ~/.codex/config.toml\n```\n\nThe sync script safely merges ECC MCP servers into your existing `~/.codex/config.toml` using an **add-only** strategy — it never removes or modifies your existing servers. Run with `--dry-run` to preview changes, or `--update-mcp` to force-refresh ECC servers to the latest recommended config.\n\nFor Context7, ECC uses the canonical Codex section name `[mcp_servers.context7]` while still launching the `@upstash/context7-mcp` package. If you already have a legacy `[mcp_servers.context7-mcp]` entry, `--update-mcp` migrates it to the canonical section name.\n\nCodex macOS app:\n- Open this repository as your workspace.\n- The root `AGENTS.md` is auto-detected.\n- `.codex/config.toml` and `.codex/agents/*.toml` work best when kept project-local.\n- The reference `.codex/config.toml` intentionally does not pin `model` or `model_provider`, so Codex uses its own current default unless you override it.\n- Optional: copy `.codex/config.toml` to `~/.codex/config.toml` for global defaults; keep the multi-agent role files project-local unless you also copy `.codex/agents/`.\n\n### What's Included\n\n| Component | Count | Details |\n|-----------|-------|---------|\n| Config | 1 | `.codex/config.toml` — top-level approvals/sandbox/web_search, MCP servers, notifications, profiles |\n| AGENTS.md | 2 | Root (universal) + `.codex/AGENTS.md` (Codex-specific supplement) |\n| Skills | 32 | `.agents/skills/` — SKILL.md + agents/openai.yaml per skill |\n| MCP Servers | 6 | GitHub, Context7, Exa, Memory, Playwright, Sequential Thinking (7 with Supabase via `--update-mcp` sync) |\n| Profiles | 2 | `strict` (read-only sandbox) and `yolo` (full auto-approve) |\n| Agent Roles | 3 | `.codex/agents/` — explorer, reviewer, docs-researcher |\n\n### Skills\n\nSkills at `.agents/skills/` are auto-loaded by Codex:\n\nCanonical Anthropic skills such as `claude-api`, `frontend-design`, and `skill-creator` are intentionally not re-bundled here. Install those from [`anthropics/skills`](https://github.com/anthropics/skills) when you want the official versions.\n\n| Skill | Description |\n|-------|-------------|\n| agent-introspection-debugging | Debug agent behavior, routing, and prompt boundaries |\n| agent-sort | Sort agent catalogs and assignment surfaces |\n| api-design | REST API design patterns |\n| article-writing | Long-form writing from notes and voice references |\n| backend-patterns | API design, database, caching |\n| brand-voice | Source-derived writing style profiles from real content |\n| bun-runtime | Bun as runtime, package manager, bundler, and test runner |\n| coding-standards | Universal coding standards |\n| content-engine | Platform-native social content and repurposing |\n| crosspost | Multi-platform content distribution across X, LinkedIn, Threads |\n| deep-research | Multi-source research with synthesis and source attribution |\n| dmux-workflows | Multi-agent orchestration using tmux pane manager |\n| documentation-lookup | Up-to-date library and framework docs via Context7 MCP |\n| e2e-testing | Playwright E2E tests |\n| eval-harness | Eval-driven development |\n| everything-claude-code | Development conventions and patterns for the project |\n| exa-search | Neural search via Exa MCP for web, code, company research |\n| fal-ai-media | Unified media generation for images, video, and audio |\n| frontend-patterns | React/Next.js patterns |\n| frontend-slides | HTML presentations, PPTX conversion, visual style exploration |\n| investor-materials | Decks, memos, models, and one-pagers |\n| investor-outreach | Personalized outreach, follow-ups, and intro blurbs |\n| market-research | Source-attributed market and competitor research |\n| mcp-server-patterns | Build MCP servers with Node/TypeScript SDK |\n| nextjs-turbopack | Next.js 16+ and Turbopack incremental bundling |\n| product-capability | Translate product goals into scoped capability maps |\n| security-review | Comprehensive security checklist |\n| strategic-compact | Context management |\n| tdd-workflow | Test-driven development with 80%+ coverage |\n| verification-loop | Build, test, lint, typecheck, security |\n| video-editing | AI-assisted video editing workflows with FFmpeg and Remotion |\n| x-api | X/Twitter API integration for posting and analytics |\n\n### Key Limitation\n\nCodex does **not yet provide Claude-style hook execution parity**. ECC enforcement there is instruction-based via `AGENTS.md`, optional `model_instructions_file` overrides, and sandbox/approval settings.\n\n### Multi-Agent Support\n\nCurrent Codex builds support stable multi-agent workflows.\n\n- Enable `features.multi_agent = true` in `.codex/config.toml`\n- Define roles under `[agents.<name>]`\n- Point each role at a file under `.codex/agents/`\n- Use `/agent` in the CLI to inspect or steer child agents\n\nECC ships three sample role configs:\n\n| Role | Purpose |\n|------|---------|\n| `explorer` | Read-only codebase evidence gathering before edits |\n| `reviewer` | Correctness, security, and missing-test review |\n| `docs_researcher` | Documentation and API verification before release/docs changes |\n\n---\n\n## Zed Support\n\nECC provides Zed project support through a conservative `.zed` adapter for project-local settings, flattened rules, agents, commands, and skills.\n\n```bash\n./install.sh --profile minimal --target zed\n```\n\n```powershell\n.\\install.ps1 --profile minimal --target zed\n```\n\nThe adapter writes ECC-managed files under `.zed/` and keeps BYOK/OpenRouter credentials out of the repo. Configure Zed account or API keys through Zed's own settings UI or your local user settings.\n\n---\n\n## OpenCode Support\n\nECC provides **full OpenCode support** including plugins and hooks.\n\n### Quick Start\n\n```bash\n# Install OpenCode\nnpm install -g opencode\n\n# Run in the repository root\nopencode\n```\n\nThe configuration is automatically detected from `.opencode/opencode.json`.\n\n### Feature Parity\n\n| Feature | Claude Code         | OpenCode | Status |\n|---------|---------------------|----------|--------|\n| Agents | PASS: 63 agents     | PASS: 12 agents | **Claude Code leads** |\n| Commands | PASS: 79 commands   | PASS: 35 commands | **Claude Code leads** |\n| Skills | PASS: 249 skills    | PASS: 37 skills | **Claude Code leads** |\n| Hooks | PASS: 8 event types | PASS: 11 events | **OpenCode has more!** |\n| Rules | PASS: 29 rules      | PASS: 13 instructions | **Claude Code leads** |\n| MCP Servers | PASS: 14 servers    | PASS: Full | **Full parity** |\n| Custom Tools | PASS: Via hooks     | PASS: 6 native tools | **OpenCode is better** |\n\n### Hook Support via Plugins\n\nOpenCode's plugin system is MORE sophisticated than Claude Code with 20+ event types:\n\n| Claude Code Hook | OpenCode Plugin Event |\n|-----------------|----------------------|\n| PreToolUse | `tool.execute.before` |\n| PostToolUse | `tool.execute.after` |\n| Stop | `session.idle` |\n| SessionStart | `session.created` |\n| SessionEnd | `session.deleted` |\n\n**Additional OpenCode events**: `file.edited`, `file.watcher.updated`, `message.updated`, `lsp.client.diagnostics`, `tui.toast.show`, and more.\n\n### Maintained Slash Entries\n\n| Command | Description |\n|---------|-------------|\n| `/plan` | Create implementation plan |\n| `/code-review` | Review code changes |\n| `/build-fix` | Fix build errors |\n| `/refactor-clean` | Remove dead code |\n| `/learn` | Extract patterns from session |\n| `/checkpoint` | Save verification state |\n| `/quality-gate` | Run the maintained verification gate |\n| `/update-docs` | Update documentation |\n| `/update-codemaps` | Update codemaps |\n| `/test-coverage` | Analyze coverage |\n| `/go-review` | Go code review |\n| `/go-test` | Go TDD workflow |\n| `/go-build` | Fix Go build errors |\n| `/python-review` | Python code review (PEP 8, type hints, security) |\n| `/multi-plan` | Multi-model collaborative planning |\n| `/multi-execute` | Multi-model collaborative execution |\n| `/multi-backend` | Backend-focused multi-model workflow |\n| `/multi-frontend` | Frontend-focused multi-model workflow |\n| `/multi-workflow` | Full multi-model development workflow |\n| `/pm2` | Auto-generate PM2 service commands |\n| `/sessions` | Manage session history |\n| `/skill-create` | Generate skills from git |\n| `/instinct-status` | View learned instincts |\n| `/instinct-import` | Import instincts |\n| `/instinct-export` | Export instincts |\n| `/evolve` | Cluster instincts into skills |\n| `/promote` | Promote project instincts to global scope |\n| `/projects` | List known projects and instinct stats |\n| `/prune` | Delete expired pending instincts (30d TTL) |\n| `/learn-eval` | Extract and evaluate patterns before saving |\n| `/setup-pm` | Configure package manager |\n| `/harness-audit` | Audit harness reliability, eval readiness, and risk posture |\n| `/loop-start` | Start controlled agentic loop execution pattern |\n| `/loop-status` | Inspect active loop status and checkpoints |\n| `/quality-gate` | Run quality gate checks for paths or entire repo |\n| `/model-route` | Route tasks to models by complexity and budget |\n\n### Plugin Installation\n\n**Option 1: Use directly**\n```bash\ncd ECC\nopencode\n```\n\n**Option 2: Install as npm package**\n```bash\nnpm install ecc-universal\n```\n\nThen add to your `opencode.json`:\n```json\n{\n  \"plugin\": [\"ecc-universal\"]\n}\n```\n\nThat npm plugin entry enables ECC's published OpenCode plugin module (hooks/events and plugin tools).\nIt does **not** automatically add ECC's full command/agent/instruction catalog to your project config.\n\nFor the full ECC OpenCode setup, either:\n- run OpenCode inside this repository, or\n- copy the bundled `.opencode/` config assets into your project and wire the `instructions`, `agent`, and `command` entries in `opencode.json`\n\n### Documentation\n\n- **Migration Guide**: `.opencode/MIGRATION.md`\n- **OpenCode Plugin README**: `.opencode/README.md`\n- **Consolidated Rules**: `.opencode/instructions/INSTRUCTIONS.md`\n- **LLM Documentation**: `llms.txt` (complete OpenCode docs for LLMs)\n\n---\n\n## GitHub Copilot Support\n\nECC provides **GitHub Copilot support** for VS Code via Copilot Chat's native instruction and prompt file system — no extra tooling required.\n\n### What's Included\n\n| Component | File | Purpose |\n|-----------|------|---------|\n| Core instructions | `.github/copilot-instructions.md` | Always-loaded rules: coding style, security, testing, git workflow |\n| VS Code settings | `.vscode/settings.json` | Per-task instruction files for code gen, test gen, review, and commit messages |\n| Plan prompt | `.github/prompts/plan.prompt.md` | Phased implementation planning |\n| TDD prompt | `.github/prompts/tdd.prompt.md` | Red-Green-Improve cycle |\n| Code review prompt | `.github/prompts/code-review.prompt.md` | Quality and security review |\n| Security review prompt | `.github/prompts/security-review.prompt.md` | Deep OWASP-aligned security analysis |\n| Build fix prompt | `.github/prompts/build-fix.prompt.md` | Systematic build and CI error resolution |\n| Refactor prompt | `.github/prompts/refactor.prompt.md` | Dead code cleanup and simplification |\n\n### Quick Start (GitHub Copilot)\n\nThe files are already in place — open any repo that contains this project and GitHub Copilot Chat will automatically pick up `.github/copilot-instructions.md`.\nThe committed `.vscode/settings.json` enables `chat.promptFiles` so VS Code can load the reusable prompts from `.github/prompts/`.\n\nTo use the workflow prompts in Copilot Chat:\n1. Open the Copilot Chat panel in VS Code.\n2. Click the **paperclip / attach** icon and select **Prompt...**, or type `/` and choose a prompt.\n3. Select the prompt (e.g. `plan`, `tdd`, `code-review`).\n\n### How It Works\n\nGitHub Copilot in VS Code reads two types of files automatically:\n\n- **`.github/copilot-instructions.md`** — repository-level instructions, always injected into every Copilot Chat request. Contains ECC's core coding standards, security checklist, testing requirements, and git workflow.\n- **`.github/prompts/*.prompt.md`** — reusable prompt files users invoke on demand. Each prompt walks Copilot through a specific ECC workflow (plan → TDD → review → ship).\n\nThe **`.vscode/settings.json`** adds per-task instruction overlays so Copilot receives the right context depending on whether you are generating code, writing tests, reviewing a selection, or drafting a commit message.\n\n### Feature Coverage\n\n| ECC Feature | Copilot equivalent |\n|-------------|-------------------|\n| Coding standards | Always-on via `copilot-instructions.md` |\n| Security checklist | Always-on + `security-review` prompt |\n| Testing / TDD | Always-on + `tdd` prompt |\n| Implementation planning | `plan` prompt |\n| Code review | `code-review` prompt |\n| Build error resolution | `build-fix` prompt |\n| Refactoring | `refactor` prompt |\n| Commit message format | Per-task instruction in `settings.json` |\n| Hooks / automation | Not supported (Copilot has no hook system) |\n| Agents / delegation | Not supported (Copilot has no subagent API) |\n\n### Limitations\n\nGitHub Copilot does not have a hook system or a subagent API, so ECC's hook automations (auto-format, TypeScript check, session persistence, dev-server guard) and agent delegation are unavailable. The instruction and prompt layer still brings the full ECC coding philosophy — standards, security, TDD, and workflow — into every Copilot Chat session.\n\n---\n\n## Cross-Tool Feature Parity\n\nECC is the **first plugin to maximize every major AI coding tool**. Here's how each harness compares:\n\n| Feature | Claude Code           | Cursor IDE | Codex CLI | OpenCode | GitHub Copilot |\n|---------|-----------------------|------------|-----------|----------|----------------|\n| **Agents** | 63                    | Shared (AGENTS.md) | Shared (AGENTS.md) | 12 | N/A |\n| **Commands** | 79                    | Shared | Instruction-based | 35 | 6 prompts |\n| **Skills** | 249                   | Shared | 10 (native format) | 37 | Via instructions |\n| **Hook Events** | 8 types               | 15 types | None yet | 11 types | None |\n| **Hook Scripts** | 20+ scripts           | 16 scripts (DRY adapter) | N/A | Plugin hooks | N/A |\n| **Rules** | 34 (common + lang)    | 34 (YAML frontmatter) | Instruction-based | 13 instructions | 1 always-on file |\n| **Custom Tools** | Via hooks             | Via hooks | N/A | 6 native tools | N/A |\n| **MCP Servers** | 14                    | Shared (mcp.json) | 7 (auto-merged via TOML parser) | Full | N/A |\n| **Config Format** | settings.json         | hooks.json + rules/ | config.toml | opencode.json | copilot-instructions.md + settings.json |\n| **Context File** | CLAUDE.md + AGENTS.md | AGENTS.md | AGENTS.md | AGENTS.md | copilot-instructions.md |\n| **Secret Detection** | Hook-based            | beforeSubmitPrompt hook | Sandbox-based | Hook-based | Instruction-based |\n| **Auto-Format** | PostToolUse hook      | afterFileEdit hook | N/A | file.edited hook | N/A |\n| **Version** | Plugin | Plugin | Reference config | 2.0.0-rc.1 | Instruction layer |\n\n**Key architectural decisions:**\n- **AGENTS.md** at root is the universal cross-tool file (read by Claude Code, Cursor, Codex, and OpenCode — GitHub Copilot uses `.github/copilot-instructions.md` instead)\n- **DRY adapter pattern** lets Cursor reuse Claude Code's hook scripts without duplication\n- **Skills format** (SKILL.md with YAML frontmatter) works across Claude Code, Codex, and OpenCode\n- Codex's lack of hooks is compensated by `AGENTS.md`, optional `model_instructions_file` overrides, and sandbox permissions\n\n---\n\n## Background\n\nI've been using Claude Code since the experimental rollout. Won the Anthropic x Forum Ventures hackathon in Sep 2025 with [@DRodriguezFX](https://x.com/DRodriguezFX) — built [zenith.chat](https://zenith.chat) entirely using Claude Code.\n\nThese configs are battle-tested across multiple production applications.\n\n---\n\n## Token Optimization\n\nClaude Code usage can be expensive if you don't manage token consumption. These settings significantly reduce costs without sacrificing quality.\n\n### Recommended Settings\n\nAdd to `~/.claude/settings.json`:\n\n```json\n{\n  \"model\": \"sonnet\",\n  \"env\": {\n    \"MAX_THINKING_TOKENS\": \"10000\",\n    \"CLAUDE_AUTOCOMPACT_PCT_OVERRIDE\": \"50\"\n  }\n}\n```\n\n| Setting | Default | Recommended | Impact |\n|---------|---------|-------------|--------|\n| `model` | opus | **sonnet** | ~60% cost reduction; handles 80%+ of coding tasks |\n| `MAX_THINKING_TOKENS` | 31,999 | **10,000** | ~70% reduction in hidden thinking cost per request |\n| `CLAUDE_AUTOCOMPACT_PCT_OVERRIDE` | 95 | **50** | Compacts earlier — better quality in long sessions |\n| `ECC_CONTEXT_MONITOR_COST_WARNINGS` | on | **off for subscription users** | Suppresses agent-facing API-rate estimate warnings while keeping context/scope/loop warnings |\n\nSwitch to Opus only when you need deep architectural reasoning:\n```\n/model opus\n```\n\n### Daily Workflow Commands\n\n| Command | When to Use |\n|---------|-------------|\n| `/model sonnet` | Default for most tasks |\n| `/model opus` | Complex architecture, debugging, deep reasoning |\n| `/clear` | Between unrelated tasks (free, instant reset) |\n| `/compact` | At logical task breakpoints (research done, milestone complete) |\n| `/cost` | Monitor token spending during session |\n\nIf you use a Claude subscription and the context monitor's API-rate estimates are not useful, set `ECC_CONTEXT_MONITOR_COST_WARNINGS=off`. This only suppresses the agent-facing cost warnings; it does not disable context exhaustion, scope, or loop warnings.\n\n### Strategic Compaction\n\nThe `strategic-compact` skill (included in this plugin) suggests `/compact` at logical breakpoints instead of relying on auto-compaction at 95% context. See `skills/strategic-compact/SKILL.md` for the full decision guide.\n\n**When to compact:**\n- After research/exploration, before implementation\n- After completing a milestone, before starting the next\n- After debugging, before continuing feature work\n- After a failed approach, before trying a new one\n\n**When NOT to compact:**\n- Mid-implementation (you'll lose variable names, file paths, partial state)\n\n### Context Window Management\n\n**Critical:** Don't enable all MCPs at once. Each MCP tool description consumes tokens from your 200k window, potentially reducing it to ~70k.\n\n- Keep under 10 MCPs enabled per project\n- Keep under 80 tools active\n- Use `/mcp` to disable unused Claude Code MCP servers; those runtime choices persist in `~/.claude.json`\n- Use `ECC_DISABLED_MCPS` only to filter ECC-generated MCP configs during install/sync flows\n\n### Agent Teams Cost Warning\n\nAgent Teams spawns multiple context windows. Each teammate consumes tokens independently. Only use for tasks where parallelism provides clear value (multi-module work, parallel reviews). For simple sequential tasks, subagents are more token-efficient.\n\n---\n\n## WARNING: Important Notes\n\n### Token Optimization\n\nHitting daily limits? See the **[Token Optimization Guide](docs/token-optimization.md)** for recommended settings and workflow tips.\n\nQuick wins:\n\n```json\n// ~/.claude/settings.json\n{\n  \"model\": \"sonnet\",\n  \"env\": {\n    \"MAX_THINKING_TOKENS\": \"10000\",\n    \"CLAUDE_AUTOCOMPACT_PCT_OVERRIDE\": \"50\",\n    \"CLAUDE_CODE_SUBAGENT_MODEL\": \"haiku\"\n  }\n}\n```\n\nUse `/clear` between unrelated tasks, `/compact` at logical breakpoints, and `/cost` to monitor spending.\n\n### Customization\n\nThese configs work for my workflow. You should:\n1. Start with what resonates\n2. Modify for your stack\n3. Remove what you don't use\n4. Add your own patterns\n\n---\n\n## Community Projects\n\nProjects built on or inspired by ECC:\n\n| Project | Description |\n|---------|-------------|\n| [EVC](https://github.com/SaigonXIII/evc) | Marketing agent workspace — 42 commands for content operators, brand governance, and multi-channel publishing. [Visual overview](https://saigonxiii.github.io/evc). |\n| [trading-skills](https://github.com/VictorVVedtion/trading-skills) | 68 trading-themed Claude Code skills with pre-trade review prompts and risk gates inspired by market operators. |\n\nBuilt something with ECC? Open a PR to add it here.\n\n---\n\n## Sponsors\n\nThis project is free and open source. Sponsors help keep it maintained and growing.\n\n[**Become a Sponsor**](https://github.com/sponsors/affaan-m) | [Sponsor Tiers](SPONSORS.md) | [Sponsorship Program](SPONSORING.md)\n\n---\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/svg?repos=affaan-m/ECC&type=Date)](https://star-history.com/#affaan-m/ECC&Date)\n\n---\n\n## Links\n\n- **Shorthand Guide (Start Here):** [The Shorthand Guide to Everything Claude Code](https://x.com/affaanmustafa/status/2012378465664745795)\n- **Longform Guide (Advanced):** [The Longform Guide to Everything Claude Code](https://x.com/affaanmustafa/status/2014040193557471352)\n- **Security Guide:** [Security Guide](./the-security-guide.md) | [Thread](https://x.com/affaanmustafa/status/2033263813387223421)\n- **Follow:** [@affaanmustafa](https://x.com/affaanmustafa)\n\n---\n\n## License\n\nMIT - Use freely, modify as needed, contribute back if you can.\n\n---\n\n**Star this repo if it helps. Read both guides. Build something great.**\n","summary":"ECC serves as a harness-native operator system designed to standardize and enhance agentic workflows across multiple platforms, including Cursor, Claude Code, and GitHub Copilot. It provides a comprehensive suite of production-ready tools, such as advanced memory optimization, security scanning, and specialized skill sets that enable agents to perform more complex, multi-harness engineering tasks. This project is an ideal solution for developers and organizations looking to integrate robust, consistent intelligence into their existing AI coding environments to improve productivity and workflow reliability.","description":"The agent harness performance optimization system. Skills, instincts, memory, security, and research-first development for Claude Code, Codex, Opencode, Cursor and beyond.","stars":203288,"language":"JavaScript"},{"owner":"Leonxlnx","repo":"taste-skill","url":"https://github.com/Leonxlnx/taste-skill","readme":"<p align=\"center\">\n  <img src=\"assets/readme-banner.png\" alt=\"Taste Skill - Anti-slop Agent Skills for premium frontends\" width=\"100%\" />\n</p>\n\n# Taste Skill\n\n<p align=\"center\">\n  <em>The Anti-Slop Frontend Framework for AI Agents</em>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://tasteskill.dev\" title=\"Taste Skill - tasteskill.dev\">\n    <img src=\"assets/taste-skill-logo.webp\" width=\"80\" height=\"80\" alt=\"Taste Skill\" />\n  </a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://tasteskill.dev\">\n    <img src=\"https://img.shields.io/badge/OPEN-tasteskill.dev-%23a855f7?style=for-the-badge&labelColor=%230f172a\" alt=\"Open tasteskill.dev\" />\n  </a>\n</p>\n\nPortable **Agent Skills** that upgrade AI-built interfaces: stronger layout, typography, motion, and spacing instead of boilerplate-looking UIs. This repo also includes **image-generation skills** for reference boards (web, mobile, brand kits). Pair them with **ChatGPT Images** or similar generators, then hand the frames to Codex, Cursor, or Claude Code for implementation.\n\n<p align=\"center\">\n<a href=\"https://github.com/Leonxlnx/taste-skill/stargazers\"><img src=\"https://img.shields.io/github/stars/Leonxlnx/taste-skill?style=for-the-badge&logo=github&labelColor=1e293b&color=fbbf24\" alt=\"GitHub stars\"/></a>\n<a href=\"LICENSE\"><img src=\"https://img.shields.io/badge/License-MIT-fbbf24?style=for-the-badge&labelColor=1e293b\" alt=\"MIT License\"/></a>\n<a href=\"#installing\"><img src=\"https://img.shields.io/badge/Tools-Codex%20%C2%B7%20Cursor%20%C2%B7%20Claude-111827?style=for-the-badge&labelColor=1e293b\" alt=\"Supported agents\"/></a>\n<a href=\"https://www.tasteskill.dev/changelog\"><img src=\"https://img.shields.io/badge/Changelog-Latest-059669?style=for-the-badge&labelColor=1e293b\" alt=\"Changelog on tasteskill.dev\"/></a>\n</p>\n\n## Disclaimer\n\nTaste Skill has no official token, coin, or crypto project. Any token using my name, image, or project is unaffiliated and not endorsed by me.\n\n<p align=\"center\"><sub><a href=\"#disclaimer\">Disclaimer</a> · <a href=\"#installing\">Install</a> · <a href=\"#skills\">Skills</a> · <a href=\"#settings-taste-skill-only\">Settings</a> · <a href=\"#examples\">Examples</a> · <a href=\"#support-the-project\">Sponsor</a> · <a href=\"#research\">Research</a> · <a href=\"#common-questions\">FAQ</a> · <a href=\"#license\">License</a></sub></p>\n\n## Feedback & Contributions\n\nWe would love your feedback. Suggestions and bug reports:\n\n- Open a Pull Request or Issue on GitHub  \n- DM [@lexnlin](https://x.com/lexnlin) or [@blueemi99](https://x.com/blueemi99)  \n- Email us at [hello@tasteskill.dev](mailto:hello@tasteskill.dev)\n\n## Installing\n\nThe [`npx skills add`](https://github.com/vercel-labs/agent-skills) CLI scans the `skills/` folder in this repo, so **all skills below (code and image-generation) install the same way.**\n\n```bash\nnpx skills add https://github.com/Leonxlnx/taste-skill\n```\n\nInstall a single skill by its **install name** (the `name:` field inside the SKILL frontmatter, not the folder name):\n\n```bash\nnpx skills add https://github.com/Leonxlnx/taste-skill --skill \"design-taste-frontend\"\n```\n\nYou can also copy any `SKILL.md` into your project or paste it into ChatGPT / Codex conversations.\n\n### Updating from the previous version\n\nThe default `taste-skill` (install name `design-taste-frontend`) is now **v2 (experimental)**, a substantial rewrite of the original v1. If you already have v1 installed, just re-run the install command and you will be upgraded:\n\n```bash\nnpx skills add https://github.com/Leonxlnx/taste-skill --skill \"design-taste-frontend\"\n```\n\nThe install name did not change, so no script updates are needed. The newer SKILL.md replaces the older one in place.\n\nIf you depend on the exact behavior of v1 and want to pin to it explicitly:\n\n```bash\nnpx skills add https://github.com/Leonxlnx/taste-skill --skill \"design-taste-frontend-v1\"\n```\n\nSee [CHANGELOG.md](CHANGELOG.md) for the full v1 to v2 diff and the rationale.\n\n## Skills\n\nEach skill does one job; you do not need all of them at once. **Implementation skills** output code. **Image-generation skills** output reference images only.\n\nThe `Install name` column is the exact value you pass to `--skill`.\n\n| Skill (folder) | Install name | Description |\n| --- | --- | --- |\n| **taste-skill** | `design-taste-frontend` | 🆕 **v2 (experimental)** - substantial rewrite of the default skill. Reads the brief, infers the design language, tunes three dials (VARIANCE / MOTION / DENSITY). Brief inference, design-system map, hard em-dash ban, canonical GSAP code skeletons, redesign-audit protocol, strict pre-flight check. Actively iterating toward v2.0.0 stable. |\n| **taste-skill-v1** | `design-taste-frontend-v1` | The original v1 of taste-skill, preserved for projects depending on its exact behavior. Use only if the v2 default breaks something specific in your workflow. |\n| **gpt-tasteskill** | `gpt-taste` | Stricter variant for GPT/Codex: higher layout variance, stronger GSAP direction, aggressive anti-slop. |\n| **image-to-code-skill** | `image-to-code` | Image-first pipeline: generate site references, analyze them, then implement the frontend to match. |\n| **redesign-skill** | `redesign-existing-projects` | Existing projects: audit the UI first, then fix layout, spacing, hierarchy, styling. |\n| **soft-skill** | `high-end-visual-design` | Polished, calm, expensive UI with softer contrast, whitespace, premium fonts, spring motion. |\n| **output-skill** | `full-output-enforcement` | When the model ships half-finished work: full output, no placeholder comments. |\n| **minimalist-skill** | `minimalist-ui` | Editorial product UI (Notion/Linear vibes), restrained palette, crisp structure. |\n| **brutalist-skill** | `industrial-brutalist-ui` | Hard mechanical language: Swiss type, sharp contrast, experimental layout. |\n| **stitch-skill** | `stitch-design-taste` | Google Stitch-compatible rules, including optional `DESIGN.md` export format. |\n\n### Image generation skills\n\nThese produce design images only (no code). Use with ChatGPT Images, Codex image mode, or any agent that generates images.\n\n| Skill (folder) | Install name | Description |\n| --- | --- | --- |\n| **imagegen-frontend-web** | `imagegen-frontend-web` | Website comps: hero, landing, multi-section with strong typography, spacing, anti-slop art direction. |\n| **imagegen-frontend-mobile** | `imagegen-frontend-mobile` | Mobile screens and flows: iOS/Android/cross-platform, mockups, readable type, coherent sets. |\n| **brandkit** | `brandkit` | Brand-kit boards: logo directions, palettes, type, identity applications across categories. |\n\n### Which one should I use?\n\n- Start with **taste-skill** for the safest general default. (Now v2 experimental - see what changed in the [CHANGELOG](CHANGELOG.md).)\n- If you depend on the exact behavior of the original taste-skill, install **taste-skill-v1** instead. \n- Use **gpt-taste** when you want the stricter GPT/Codex-oriented rules and motion/layout enforcement. \n- Use **image-to-code-skill** for image → analyze → code website workflows. \n- Use **redesign-skill** to improve an existing codebase instead of greenfield styling. \n- Add **soft-skill**, **minimalist-skill**, or **brutalist-skill** when the visual direction is already chosen. \n- Add **output-skill** if the agent keeps truncating output. \n- Use **imagegen-frontend-web**, **imagegen-frontend-mobile**, or **brandkit** when the deliverable is **images** (comps, flows, identity boards), then pass results to your coding agent.\n\n### Image-first tip\n\nFor **image-to-code-skill**, state the pipeline in the prompt, e.g.: `follow the skill: generate images, then analyze, then code`.\n\n### ChatGPT Images and Codex\n\nAttach or paste **`imagegen-frontend-web`**, **`imagegen-frontend-mobile`**, or **`brandkit`** and ask for the frames you need, then feed the renders to Codex, Cursor, or Claude Code. Use **image-to-code-skill** when you want one workflow that both generates references and implements the site in code.\n\n## Settings (taste-skill only)\n\nNumbers at the top of the file are 1-10 dials:\n\n- **DESIGN_VARIANCE**: Layout experimentation (lower: centered/clean · higher: asymmetric/modern).\n- **MOTION_INTENSITY**: Animation depth (lower: hover · higher: scroll/magnetic).\n- **VISUAL_DENSITY**: Information per viewport (lower: spacious · higher: dense dashboards).\n\n## Examples\n\nCreated with taste-skill:\n\n<p>\n  <img src=\"examples/floria-top.webp\" width=\"400\" />\n  <img src=\"examples/floria-bottom.webp\" width=\"400\" />\n</p>\n\n## Support the project\n\nIf Taste Skill helps you, consider sponsoring:\n\n[Sponsor on GitHub](https://github.com/sponsors/Leonxlnx)\n\n### Current Sponsors\n\n<a href=\"https://github.com/dnakov\"><img src=\"https://github.com/dnakov.png\" width=\"40\" height=\"40\" style=\"border-radius:50%\" alt=\"dnakov\" title=\"dnakov\" /></a>\n<a href=\"https://github.com/AkramReshad\"><img src=\"https://github.com/AkramReshad.png\" width=\"40\" height=\"40\" style=\"border-radius:50%\" alt=\"AkramReshad\" title=\"AkramReshad\" /></a>\n<a href=\"https://github.com/ajmalaksar25\"><img src=\"https://github.com/ajmalaksar25.png\" width=\"40\" height=\"40\" style=\"border-radius:50%\" alt=\"ajmalaksar25\" title=\"ajmalaksar25\" /></a>\n<a href=\"https://github.com/krikkkk\"><img src=\"https://github.com/krikkkk.png\" width=\"40\" height=\"40\" style=\"border-radius:50%\" alt=\"krikkkk\" title=\"krikkkk\" /></a>\n<a href=\"https://github.com/navanchauhan\"><img src=\"https://github.com/navanchauhan.png\" width=\"40\" height=\"40\" style=\"border-radius:50%\" alt=\"navanchauhan\" title=\"navanchauhan\" /></a>\n<a href=\"https://github.com/robinebers\"><img src=\"https://github.com/robinebers.png\" width=\"40\" height=\"40\" style=\"border-radius:50%\" alt=\"robinebers\" title=\"robinebers\" /></a>\n<a href=\"https://github.com/JKc66\"><img src=\"https://github.com/JKc66.png\" width=\"40\" height=\"40\" style=\"border-radius:50%\" alt=\"JKc66\" title=\"JKc66\" /></a>\n<a href=\"https://github.com/u2393696078-rgb\"><img src=\"https://github.com/u2393696078-rgb.png\" width=\"40\" height=\"40\" style=\"border-radius:50%\" alt=\"u2393696078-rgb\" title=\"u2393696078-rgb\" /></a>\n<a href=\"https://github.com/a-human-created-this\"><img src=\"https://github.com/a-human-created-this.png\" width=\"40\" height=\"40\" style=\"border-radius:50%\" alt=\"a-human-created-this\" title=\"a-human-created-this\" /></a>\n<a href=\"https://github.com/AtharvaJaiswal005\"><img src=\"https://github.com/AtharvaJaiswal005.png\" width=\"40\" height=\"40\" style=\"border-radius:50%\" alt=\"AtharvaJaiswal005\" title=\"AtharvaJaiswal005\" /></a>\n<a href=\"https://github.com/ghughes7\"><img src=\"https://github.com/ghughes7.png\" width=\"40\" height=\"40\" style=\"border-radius:50%\" alt=\"ghughes7\" title=\"ghughes7\" /></a>\n<a href=\"https://github.com/mccun934\"><img src=\"https://github.com/mccun934.png\" width=\"40\" height=\"40\" style=\"border-radius:50%\" alt=\"mccun934\" title=\"mccun934\" /></a>\n\n<p align=\"center\">\n <a href=\"https://www.star-history.com/leonxlnx/taste-skill\">\n  <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/badge?repo=Leonxlnx/taste-skill&theme=dark\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/badge?repo=Leonxlnx/taste-skill\" />\n   <img alt=\"Star History Rank\" src=\"https://api.star-history.com/badge?repo=Leonxlnx/taste-skill\" />\n  </picture>\n </a>\n</p>\n\n## Research\n\nBackground writing that shaped these skills lives in [`research/`](research/).\n\n## Common Questions\n\n**How is this different from other AI design skills?**  \nMultiple specialized variants, adjustable dials in key skills, anti-repetition rules informed by dedicated research. All are framework agnostic across major coding agents.\n\n**Does it work with React, Vue, Svelte?**  \nYes. Rules target design intent, not a single framework API.\n\n**What is SKILL.md?**  \nA portable instruction file agents can load automatically; install via `npx skills add` or by copying into a repo or conversation.\n\n**Do image-generation skills install with `npx skills add`?**  \nYes. They live under `skills/` alongside the code skills so the same CLI discovers them.\n\n## License\n\n[MIT License](LICENSE) · Copyright (c) 2026 Leonxlnx\n","summary":"Taste Skill is a frontend framework designed to elevate AI-generated interfaces by providing refined design standards for layout, typography, motion, and spacing. The project offers a collection of portable Agent Skills and image-generation references that can be integrated into existing development workflows to move beyond generic, boilerplate-heavy outputs. It is ideally suited for developers and AI agents using tools like Cursor, Claude Code, or Codex who want to improve the aesthetic and functional quality of the code they produce.","description":"Taste-Skill - gives your AI good taste. stops the AI from generating boring, generic slop ","stars":31594,"language":"Shell"},{"owner":"Chachamaru127","repo":"claude-code-harness","url":"https://github.com/Chachamaru127/claude-code-harness","readme":"# Claude Code Harness\n\n<p align=\"center\">\n  <img src=\"docs/images/claude-harness-logo-with-text.png\" alt=\"Claude Harness\" width=\"400\">\n</p>\n\n<p align=\"center\">\n  <strong>Plan. Work. Review. Ship.</strong><br>\n  <em>A disciplined delivery loop for Claude Code, with bounded paths for Codex and OpenCode.</em>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/Chachamaru127/claude-code-harness/releases/latest\"><img src=\"https://img.shields.io/github/v/release/Chachamaru127/claude-code-harness?display_name=tag&sort=semver\" alt=\"Latest Release\"></a>\n  <a href=\"LICENSE.md\"><img src=\"https://img.shields.io/badge/License-MIT-green.svg\" alt=\"License\"></a>\n  <a href=\"docs/CLAUDE_CODE_COMPATIBILITY.md\"><img src=\"https://img.shields.io/badge/Claude_Code-v2.1+-purple.svg\" alt=\"Claude Code\"></a>\n  <img src=\"https://img.shields.io/badge/Skills-5_Verbs-orange.svg\" alt=\"Skills\">\n  <img src=\"https://img.shields.io/badge/Core-Go_Native-00ADD8.svg\" alt=\"Go Core\">\n</p>\n\n<p align=\"center\">\n  English | <a href=\"README_ja.md\">日本語</a>\n</p>\n\n<p align=\"center\">\n  <img src=\"docs/images/readme/hero-operating-loop-en.png\" alt=\"Claude Code Harness operating loop: Spec, Plan, Work, Review, Release\" width=\"900\">\n</p>\n\nClaude Code is powerful, but raw agent work drifts: plans live in chat, tests\nbecome optional, review happens too late, and release evidence gets rebuilt by\nmemory. Harness turns that into one repeatable operating path.\n\nAfter install, the default changes from \"ask the agent to code\" to:\n\n1. write the spec and plan,\n2. implement only the approved slice,\n3. verify the result,\n4. review independently,\n5. package evidence for PR or release.\n\n## Quickstart\n\nNew users should start from the tool they already use. Existing users should\nrun the migration report before cleanup or reinstall.\n\n| Path | Start |\n|---|---|\n| New user | [Tool-first onboarding](docs/onboarding/index.md) |\n| Existing user | [Migration check](docs/onboarding/migration.md) |\n| Claude Code fast path | [Install in 30 seconds](#install-in-30-seconds) |\n| Trigger proof | [Skill trigger gate](docs/onboarding/skill-trigger-acceptance.md) |\n\n## Install in 30 Seconds\n\n```bash\nclaude\n/plugin marketplace add Chachamaru127/claude-code-harness\n/plugin install claude-code-harness@claude-code-harness-marketplace\n/harness-setup\n```\n\nNext command: run `/harness-plan` with one small request.\n\n```bash\n/harness-plan Improve the README onboarding flow\n```\n\n## First 15 Minutes\n\n1. Install through your tool route.\n2. Run `/harness-setup` or the equivalent setup script.\n3. Run `/harness-plan` with a small request; Harness writes the `spec.md` and\n   `Plans.md` drafts for you to check. Small typo, docs, and status updates stay\n   lightweight.\n4. Approve the generated contract or reply with the correction you want.\n5. Run the smallest approved task, for example `/harness-work 1.1.1`.\n6. Run `/harness-review` and keep the verification output.\n\nYour job is not to hand-write the plan. It is to approve or correct the\ngenerated contract before execution continues.\n\n## How It Works\n\nHarness adds a source-of-truth loop around agent work.\nThe 5 verb skills keep that surface small: plan, work, review, sync, release.\n\n1. You describe the outcome in normal language.\n2. `/harness-plan` drafts or updates `spec.md` and `Plans.md` with scope,\n   acceptance criteria, unknowns, and stop conditions.\n3. Non-trivial planning records `team_validation_mode` and validates the plan\n   through team/sub-agent or manual-pass perspectives for spec/Plans alignment,\n   memory reuse, product fit, security fit, and works-in-practice.\n4. Harness treats those files as the source of truth. Data the agent has not\n   seen stays `unknown` instead of being silently invented.\n5. `/harness-work` implements the approved slice with TDD and verification.\n6. `/harness-review` separates review from implementation.\n7. `/harness-release` packages only verified evidence.\n\n## Commands\n\n| Command | What happens inside |\n|---------|---------------------|\n| `/harness-setup` | Installs project guidance, command surfaces, hooks, and checks so the workflow starts from one known baseline. |\n| `/harness-plan` | Turns intent into `spec.md` and `Plans.md`, including scope, acceptance criteria, dependencies, unknowns, stop conditions, and non-trivial planning validation. |\n| `/harness-work` | Executes one approved task or range, adds tests when required, runs verification, and keeps work inside the plan. |\n| `/harness-work all` | Runs the approved plan through implementation and review paths; use after the plan is clear and the repo baseline is known. |\n| `/harness-review` | Reviews the result separately from implementation and treats major findings as blockers. |\n| `/harness-release` | Checks release readiness, CHANGELOG/tag boundaries, and evidence packaging after implementation and review are complete. |\n| `bin/harness doctor --migration-report` | Inventories old plugin caches, Codex skills, OpenCode files, symlinks, and memory state without deleting data. |\n\n## Basic Workflow\n\n| Stage | Output | Gate |\n|-------|--------|------|\n| Investigate | Evidence and unknowns | Do not promote unobserved data into claims. |\n| Plan | `spec.md` + `Plans.md` | User approves or corrects the generated contract. |\n| Work | Code and tests | TDD required when the task says so. |\n| Review | Independent verdict | Major findings block completion. |\n| PR | Evidence pack | PR ready is not release ready. |\n| Release | Tag/release artifacts | Release preflight must pass on the release path. |\n\n## Install By Tool\n\n| Tool | Tier | Route |\n|---|---|---|\n| Claude Code | `supported` | Claude plugin marketplace, then `/harness-setup`. |\n| Codex CLI | `internal-compatible` | `scripts/setup-codex.sh --user`; direct plugin smoke is tracked separately. |\n| Codex app | `candidate` | Candidate smoke only; do not reuse Codex CLI proof. |\n| OpenCode | `internal-compatible` | `scripts/setup-opencode.sh`; runtime parity is not claimed. |\n| Cursor | `internal-compatible` | `scripts/setup-cursor.sh` real-directory local install; top support tier still gated on workflow smoke. |\n| GitHub Copilot CLI | `candidate` | Manual profile research only. |\n| Antigravity CLI | `future/unsupported` | No end-user install route in this phase. |\n\n## Existing User Migration\n\nRun `bin/harness doctor --migration-report` before changing an existing setup.\nThe report inventories stale Claude plugin caches, duplicate Codex skills, old\nsymlinks, OpenCode backup paths, and harness-mem state without deleting\nanything.\n\n## Support Boundary\n\nHarness can describe candidate paths, but it does not inherit support claims\nfrom Superpowers, Hermes Agent, or any other project. A host only moves up when\nHarness has its own bootstrap, trigger, runtime, and release evidence.\n\n`not_observed != absent`: missing local proof means \"not proven here\", not\n\"impossible\" and not \"supported\".\n\n## Requirements\n\n- Claude Code v2.1+ for the supported Claude path.\n- A project repository with write access for local setup.\n- No Node.js is required for the Go-native guardrail engine.\n- Optional [harness-mem](https://github.com/Chachamaru127/harness-mem) for\n  cross-session memory when configured and healthy.\n\n## Advanced\n\nUse these after the basic trigger path is visible.\n\n| Capability | What it adds | Boundary |\n|------------|--------------|----------|\n| Breezing | Planner/Critic/Worker style team execution for larger task lists. | Still gated by plan quality and review. |\n| Codex companion review | Schema-backed Codex second opinion through `scripts/codex-companion.sh`. | Raw `codex exec` is not the Harness companion path. |\n| OpenCode bootstrap | Mirrors Harness guidance into OpenCode-compatible surfaces. | Real runtime parity is not claimed. |\n| harness-mem | Project-scoped memory and recall across sessions. | Optional companion; purge remains explicit. |\n\n## Documentation\n\n| Resource | Description |\n|----------|-------------|\n| [Tool-first onboarding](docs/onboarding/index.md) | Where to start by host tool. |\n| [Install routes](docs/onboarding/install.md) | Per-tool setup and support-tier boundaries. |\n| [Migration check](docs/onboarding/migration.md) | Existing-user impact, compatibility, and rollback path. |\n| [Skill trigger gate](docs/onboarding/skill-trigger-acceptance.md) | How install success is verified. |\n| [Capability matrix](docs/tool-capability-matrix.md) | Supported, internal-compatible, candidate, and unsupported host claims. |\n| [Claude Code Compatibility](docs/CLAUDE_CODE_COMPATIBILITY.md) | Current Claude Code requirements and compatibility notes. |\n| [Cursor Integration](docs/CURSOR_INTEGRATION.md) | Cursor handoff boundary and internal-compatible adapter notes. |\n| [Distribution Scope](docs/distribution-scope.md) | Included vs compatibility vs development-only paths. |\n| [Hardening parity](docs/hardening-parity.md) | Runtime safety differences between Claude hooks and Codex gates. |\n| [Work All Evidence Pack](docs/evidence/work-all.md) | Success/failure verification contract for full-plan execution. |\n| [Changelog](CHANGELOG.md) | User-facing version history. |\n\n## Contributing\n\nIssues and PRs welcome. See [CONTRIBUTING.md](CONTRIBUTING.md).\n\n## Acknowledgments\n\n- [AI Masao](https://note.com/masa_wunder) - Hierarchical skill design\n- [Beagle](https://github.com/beagleworks) - Test tampering prevention patterns\n\n## License\n\nMIT License. See [LICENSE.md](LICENSE.md).\n","summary":"Claude Code Harness provides a structured delivery framework for Claude Code to prevent agentic task drift by enforcing a disciplined workflow of planning, implementation, verification, and release. By implementing a standardized five-verb operating loop, the project ensures that coding tasks are grounded in verifiable specifications and evidence-based reviews rather than fragmented chat logs. It is designed for software developers and teams who want to maintain high standards of rigor, traceability, and documentation while leveraging AI-assisted coding tools.","description":"Claude Code Dedicated Development Harness - Achieving High-Quality Development Through an Autonomous Plan→Work→Review Cycle","stars":2519,"language":"Shell"},{"owner":"Axorax","repo":"awesome-free-apps","url":"https://github.com/Axorax/awesome-free-apps","readme":"<p align=\"center\">\n    <img alt=\"Logo\" src=\"./.github/afa.png\">\n</p>\n\n<p align=\"center\"><a href=\"./filter/windows-only.md\">Windows Only</a> — <a href=\"./filter/macOS-only.md\">macOS Only</a> — <a href=\"./filter/linux-only.md\">Linux Only</a> — <a href=\"./filter/open-source-only.md\">Open-source Only</a> — <a href=\"./filter/recommended-only.md\">Recommended Only</a></p>\n<p align=\"center\"><a href=\"./MOBILE.md\">Mobile version</a> — <a href=\"./filter/android-only.md\">Android Only</a> — <a href=\"./filter/iOS-only.md\">iOS Only</a></p>\n\n| Icon | Meaning              | Icon | Meaning                       |\n|------|----------------------|------|-------------------------------|\n| 🪟   | Available on Windows | 🟢   | Open-source (Repository Link) |\n| 🍎   | Available on macOS   | ⭐   | Recommended by us             |\n| 🐧   | Available on Linux   |      |                               |\n\n> [!IMPORTANT]\n> Maintaining this project requires a lot of time. [**Donate to support me!**](https://patreon.com/axorax) ❤️\n>\n> Want to add something? [contributing.md](contributing.md) <br>\n> Want to become a maintainer? [Help maintain the project](https://github.com/Axorax/awesome-free-apps/issues/28)\n>\n> **Looking for the mobile version of this list?** -> [MOBILE.md](MOBILE.md)\n\n## Contents\n\n<!-- AF-TOC : Tuesday, May 26, 2026 at 07:53:21 AM UTC -->\n\n- [Audio](#audio)\n  - [Audio Players](#audio-players)\n  - [Audio Recording](#audio-recording)\n  - [DJ Software](#dj-software)\n  - [Music Notation](#music-notation)\n  - [Music Production](#music-production)\n- [Browsers](#browsers)\n- [Communication](#communication)\n  - [Messaging](#messaging)\n  - [Email Clients](#email-clients)\n- [Compression and Archiving](#compression-and-archiving)\n- [Customize](#customize)\n  - [System Customization](#system-customization)\n  - [Wallpaper Tools](#wallpaper-tools)\n- [Data Management](#data-management)\n  - [Copy and Move](#copy-and-move)\n  - [Sync and Clone](#sync-and-clone)\n- [Developer Tools](#developer-tools)\n  - [API Development](#api-development)\n  - [Database](#database)\n  - [Network Analysis](#network-analysis)\n  - [Game Engines](#game-engines)\n  - [Virtualization](#virtualization)\n- [Documents](#documents)\n  - [Office Suites](#office-suites)\n  - [E-book](#e-book)\n  - [PDF Tools](#pdf-tools)\n- [Note Taking](#note-taking)\n- [Text Editors](#text-editors)\n- [Download Managers](#download-managers)\n- [Games](#games)\n  - [Cloud Gaming](#cloud-gaming)\n- [Mobile Emulators](#mobile-emulators)\n- [Other Emulators](#other-emulators)\n- [Graphics Tools](#graphics-tools)\n- [3D Modeling and Animation](#3d-modeling-and-animation)\n- [Security](#security)\n  - [Antivirus](#antivirus)\n  - [Password Managers](#password-managers)\n  - [Ad & Tracker Blocking](#ad-tracker-blocking)\n- [Image Viewers](#image-viewers)\n- [Remote Access](#remote-access)\n- [Video](#video)\n  - [Video Editors](#video-editors)\n  - [Video Players](#video-players)\n  - [Video Streaming and Recording](#video-streaming-and-recording)\n  - [Video Converters and Compressors](#video-converters-and-compressors)\n- [VPN and Proxy Tools](#vpn-and-proxy-tools)\n- [Utility](#utility)\n  - [Clipboard Management](#clipboard-management)\n  - [Metadata](#metadata)\n  - [Window Management](#window-management)\n  - [File Management](#file-management)\n  - [Application Management](#application-management)\n  - [Screenshot](#screenshot)\n  - [Space Visualizer](#space-visualizer)\n  - [Trackpad](#trackpad)\n\n<!-- AF-END -->\n\n## Audio\n\n- [FXSound](https://fxsound.com) - Boost sound quality, volume, and bass. Has a beautiful modern UI. 🪟 🟢 ⭐\n- [JACK Audio](https://jackaudio.org) - Audio server for routing and mixing sound between programs. 🪟 🍎 🐧\n- [EarTrumpet](https://eartrumpet.app) - Advanced volume control for Windows, offering app-specific audio management. 🪟\n- [Ambie](https://github.com/jenius-apps/ambie) - Use white noise, nature sounds, & more to boost your productivity. 🪟 🟢\n- [BlackHole](https://github.com/ExistentialAudio/BlackHole) - Virtual audio loopback driver for routing audio between macOS applications. 🍎 🟢\n\n### Audio Players\n\n- [Foobar2000](https://foobar2000.org) - Lightweight and highly customizable audio player with support for many formats. 🪟 🍎 ⭐\n- [Audacious](https://github.com/audacious-media-player/audacious) - Lightweight audio player for simple music playback. 🪟 🐧 🟢\n- [Karafun](https://karafun.com) - Collection of karaoke songs across multiple genres. Play your own CDG files or use downloads from YouTube. 🪟\n- [MusicBee](https://getmusicbee.com) - Feature-rich music player and manager. 🪟\n- [Strawberry Music Player](https://strawberrymusicplayer.org) - Music player for organizing and playing your audio collection. 🪟 🍎 🐧\n\n### Audio Recording\n\n- [Audacity](https://audacityteam.org/download) - Audio editor for recording and editing sounds. 🪟 🍎 🐧 🟢 ⭐\n- [Ocenaudio](https://ocenaudio.com) - Easy-to-use audio editor for recording and analyzing sounds. 🪟 🍎 🐧\n- [Wavosaur](https://www.wavosaur.com) - Simple audio editor for recording, editing, and processing sound. 🪟\n\n### DJ Software\n\n- with encryption and compression. 🪟 🐧 🟢\n- [The Unarchiver](https://theunarchiver.com) - Simple tool for extracting ZIP, RAR, ISO, and other formats. 🍎\n- [Unarchive One](https://cleanerone.trendmicro.com/unarchiver-one/?utm_source=github&utm_medium=referral&utm_campaign=githubproject) - Multi-format decompression tool with QuickLook integration. 🍎\n- [Keka](https://www.keka.io) - File archiver for compressing and extracting common archive formats. 🍎\n\n## Customize\n\n### System Customization\n\n- [Winaero](https://winaerotweaker.com) - All-in-one app for tuning Windows settings. 🪟\n- [Windhawk](https://windhawk.net) - Customization marketplace for Windows and programs. 🪟 [🟢](https://github.com/ramensoftware/windhawk)\n- [HideVolumeOSD](https://github.com/UnlimitedStack/HideVolumeOSD) - Hides the Windows volume bar. 🪟 [🟢](https://github.com/UnlimitedStack/HideVolumeOSD)\n- [ExplorerPatcher](https://github.com/valinet/ExplorerPatcher) - Restores and enhances the classic taskbar and system elements. 🪟 [🟢](https://github.com/valinet/ExplorerPatcher)\n- [Flow Launcher](https://flowlauncher.com) - Quick file search and app launcher like Spotlight. 🪟 [🟢](https://github.com/Flow-Launcher/Flow.Launcher)\n- [ModernFlyouts](https://modernflyouts-community.github.io) - Replaces default flyouts with customizable modern ones. 🪟 [🟢](https://github.com/ModernFlyouts-Community/ModernFlyouts)\n- [Hidden Bar](https://github.com/dwarvesf/hidden) - Simple app to organize and declutter your menu bar. 🍎 [🟢](https://github.com/dwarvesf/hidden)\n- [MacPilot](https://koingosw.com/products/macpilot) - Unlock hidden settings and system tweaks. 🍎\n- [noMeiryoUI](https://github.com/Tatsu-syo/noMeiryoUI) - Tools to freely change system fonts. 🪟 [🟢](https://github.com/Tatsu-syo/noMeiryoUI)\n- [TaskbarX](https://chrisandriessen.nl/taskbarx) - Personalize the taskbar with center alignment, transparency, and animations. 🪟\n- [TinkerTool](https://bresink.com/osx/TinkerTool.html) - Utility for enabling hidden system preferences. 🍎\n- [Sizer](https://brianapps.net/sizer) - Resize any window to a predefined size. 🪟\n- [Sophia Script for Windows](https://github.com/farag2/Sophia-Script-for-Windows) - The most powerful PowerShell module for fine-tuning Windows showing how Windows can be configured without making any harm to it. 🪟 [🟢](https://github.com/farag2/Sophia-Script-for-Windows)\n- [RetroBar](https://github.com/dremin/RetroBar) - Classic Windows 95, 98, Me, 2000, XP, Vista taskbar for modern versions of Windows. 🪟 [🟢](https://github.com/dremin/RetroBar)\n- [SaneBar](https://sanebar.com) - Menu bar icon manager and organizer. Local-only alternative to Bartender. 🍎 [🟢](https://github.com/sane-apps/SaneBar)\n- [SaneClick](https://saneclick.com) - Finder toolbar customizer for adding quick actions. 🍎 [🟢](https://github.com/sane-apps/SaneClick)\n- [Thaw](https://github.com/stonerl/Thaw) - Menu bar manager for hiding, arranging, and customizing menu bar items. 🍎 [🟢](https://github.com/stonerl/Thaw)\n\n### Wallpaper Tools\n\n- [Lively Wallpaper](https://rocksdanister.com/lively) - Tool to set animated and interactive wallpapers. 🪟 🟢 ⭐\n- [Rainmeter](https://rainmeter.net) - Desktop customization tool offering widgets, skins, and live stats. 🪟 🟢 ⭐\n- [Komorebi](https://github.com/cheesecakeufo/komorebi) - Animated wallpaper manager. 🐧 🟢\n- [Plash](https://sindresorhus.com/plash) - App to set websites as wallpapers. 🍎 🟢\n- [ScreenPlay](https://github.com/kelteseth/ScreenPlay) - Wallpaper and widget engine. 🪟 🐧 🟢\n- [Variety](https://github.com/varietywalls/variety) - Wallpaper changer with features for downloading and managing wallpapers. 🐧 🟢\n- [WinDynamicDesktop](https://github.com/t1m0thyj/WinDynamicDesktop) - Port of macOS Mojave Dynamic Desktop feature to Windows. 🪟 🟢\n- [Sucrose](https://github.com/Taiizor/Sucrose) - Versatile wallpaper engine bringing life to your desktop with a wide range of interactive themes. 🪟 🟢\n\n## Data Management\n\n### Copy and Move\n\ p, Cargo). 🍎 [🟢](https://github.com/bysiber/cleardisk)\n- [DiskSavvy](https://disksavvy.com) - Disk space analyzer with various reporting and filtering options. 🪟\n- [Filelight](https://kde.org/applications/utilities/org.kde.filelight) - Visualizer with a circular sunburst chart. 🪟 🍎 🐧\n- [JDiskReport](https://www.jgoodies.com/freeware/jdiskreport) - Tool for visualizing disk usage with a variety of charts and graphs. 🪟 🐧\n- [SpaceSniffer](http://www.uderzo.it/main_products/space_sniffer) - Identify large files and folders with an intuitive tree map. 🪟\n- [TreeSize Free](https://jam-software.com/treesize_free) - Visualizes disk space usage in a tree-like structure for easy file management. 🪟\n\n### Trackpad\n\n- [MiddleDrag](https://middledrag.app) - Three-finger trackpad gestures for middle-click and middle-drag on macOS. 🍎 [🟢](https://github.com/NullPointerDepressiveDisorder/MiddleDrag)\n- [LinearMouse](https://linearmouse.app) - Mouse and trackpad utility for pointer acceleration, scrolling, button mapping, and per-device settings. 🍎 [🟢](https://github.com/linearmouse/linearmouse)\n- [Mos](https://mos.caldis.me) - Mouse utility for smooth scrolling and independent scroll direction settings on macOS. 🍎 [🟢](https://github.com/Caldis/Mos)\n","summary":"Awesome-free-apps is a comprehensive, curated repository that aggregates high-quality, free software across a wide variety of categories including audio, development, graphics, and productivity. The project features intuitive filtering options that allow users to sort software by operating system compatibility, open-source status, and community recommendations. This resource is an invaluable tool for developers, power users, and everyday computer owners seeking reliable, cost-effective software alternatives for Windows, macOS, Linux, and mobile platforms.","description":"Curated list of the best free apps for PC and mobile","stars":6418,"language":"JavaScript"},{"owner":"moeru-ai","repo":"airi","url":"https://github.c
