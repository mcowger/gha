    await client.artifacts.wait_for_completion(nb.id, status.task_id)\n        await client.artifacts.download_quiz(nb.id, \"quiz.json\", output_format=\"json\")\n\n        # Generate mind map and export\n        result = await client.artifacts.generate_mind_map(nb.id)\n        await client.artifacts.download_mind_map(nb.id, \"mindmap.json\")\n\nasyncio.run(main())\n```\n\n### Agent Setup\n\n**Option 1 — CLI install**:\n\n```bash\nnotebooklm skill install\n```\n\nInstalls the skill into `~/.claude/skills/notebooklm` and `~/.agents/skills/notebooklm`.\n\n**Option 2 — `npx` install** (via the open skills ecosystem):\n\n```bash\nnpx skills add teng-lin/notebooklm-py\n```\n\nFetches the canonical [SKILL.md](SKILL.md) directly from GitHub.\n\n\n## Documentation\n\n- **[CLI Reference](docs/cli-reference.md)** - Complete command documentation\n- **[Python API](docs/python-api.md)** - Full API reference\n- **[Configuration](docs/configuration.md)** - Storage and settings\n- **[Release Guide](docs/releasing.md)** - Release checklist and packaging verification\n- **[Troubleshooting](docs/troubleshooting.md)** - Common issues and solutions\n- **[API Stability](docs/stability.md)** - Versioning policy and stability guarantees\n\n### For Contributors\n\n- **[Architecture](docs/architecture.md)** - Architectural overview and design principles\n- **[Development Guide](docs/development.md)** - Architecture, testing, and releasing\n- **[RPC Development](docs/rpc-development.md)** - Protocol capture and debugging\n- **[RPC Reference](docs/rpc-reference.md)** - Payload structures\n- **[Changelog](CHANGELOG.md)** - Version history and release notes\n- **[Security](SECURITY.md)** - Security policy and credential handling\n\n## Platform Support\n\n| Platform | Status | Notes |\n|----------|--------|-------|\n| **macOS** | ✅ Tested | Primary development platform |\n| **Linux** | ✅ Tested | Fully supported |\n| **Windows** | ✅ Tested | Tested in CI |\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/image?repos=teng-lin/notebooklm-py&type=timeline&legend=top-left)](https://www.star-history.com/?repos=teng-lin%2Fnotebooklm-py&type=timeline&legend=top-left)\n\n## License\n\nMIT License. See [LICENSE](LICENSE) for details.\n","summary":"notebooklm-py is an unofficial Python library and CLI tool that provides comprehensive, programmatic access to Google's NotebookLM features. It enables users to automate research pipelines, bulk-import various source types, and generate a wide array of multimedia artifacts like audio overviews, slide decks, and infographics. This project is ideal for developers and researchers who want to integrate NotebookLM into custom AI agents, CI/CD workflows, or automated content generation systems.","description":"Unofficial Python API and agentic skill for Google NotebookLM. Full programmatic access to NotebookLM's features—including capabilities the web UI doesn't expose—via Python, CLI, and AI agents like Claude Code, Codex, and OpenClaw.","stars":15725,"language":"Python"},{"owner":"can1357","repo":"oh-my-pi","url":"https://github.com/can1357/oh-my-pi","readme":"<p align=\"center\">\n  <img src=\"https://github.com/can1357/oh-my-pi/blob/main/assets/hero.png?raw=true\" alt=\"omp\">\n</p>\n\n<p align=\"center\">\n  <strong>A coding agent with the IDE wired in.</strong>\n  <strong><a href=\"https://omp.sh\">omp.sh</a></strong>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://www.npmjs.com/package/@oh-my-pi/pi-coding-agent\"><img src=\"https://img.shields.io/npm/v/@oh-my-pi/pi-coding-agent?style=flat&colorA=222222&colorB=CB3837\" alt=\"npm version\"></a>\n  <a href=\"https://github.com/can1357/oh-my-pi/blob/main/packages/coding-agent/CHANGELOG.md\"><img src=\"https://img.shields.io/badge/changelog-keep-E05735?style=flat&colorA=222222\" alt=\"Changelog\"></a>\n  <a href=\"https://github.com/can1357/oh-my-pi/actions\"><img src=\"https://img.shields.io/github/actions/workflow/status/can1357/oh-my-pi/ci.yml?style=flat&colorA=222222&colorB=3FB950\" alt=\"CI\"></a>\n  <a href=\"https://github.com/can1357/oh-my-pi/blob/main/LICENSE\"><img src=\"https://img.shields.io/github/license/can1357/oh-my-pi?style=flat&colorA=222222&colorB=58A6FF\" alt=\"License\"></a>\n  <a href=\"https://www.typescriptlang.org\"><img src=\"https://img.shields.io/badge/TypeScript-3178C6?style=flat&colorA=222222&logo=typescript&logoColor=white\" alt=\"TypeScript\"></a>\n  <a href=\"https://www.rust-lang.org\"><img src=\"https://img.shields.io/badge/Rust-DEA584?style=flat&colorA=222222&logo=rust&logoColor=white\" alt=\"Rust\"></a>\n  <a href=\"https://bun.sh\"><img src=\"https://img.shields.io/badge/runtime-Bun-f472b6?style=flat&colorA=222222\" alt=\"Bun\"></a>\n  <a href=\"https://discord.gg/4NMW9cdXZa\"><img src=\"https://img.shields.io/badge/Discord-5865F2?style=flat&colorA=222222&logo=discord&logoColor=white\" alt=\"Discord\"></a>\n</p>\n\n<p align=\"center\">\n  Fork of <a href=\"https://github.com/badlogic/pi-mono\">Pi</a> by <a href=\"https://github.com/mariozechner\">@mariozechner</a> \n</p>\n\nThe most capable agent surface that ships. Continuously tuned by real-world use — complete out of the box, open all the way down.\n\n**40+** providers · **32** built-in tools · **13** lsp ops · **27** dap ops · **~27k** lines of Rust core.\n\n## Install\n\n**macOS · Linux**\n\n```sh\ncurl -fsSL https://omp.sh/install | sh\n```\n\n**Bun (recommended)**\n\n```sh\nbun install -g @oh-my-pi/pi-coding-agent\n```\n\n**Windows (PowerShell)**\n\n```powershell\nirm https://omp.sh/install.ps1 | iex\n```\n\n**Pinned versions (mise)**\n\n```sh\nmise use -g github:can1357/oh-my-pi\n```\n\nmacOS · Linux · Windows · bun ≥ 1.3.14\n\n### Shell completions\n\n`omp` generates its own completion scripts for **bash**, **zsh**, and **fish** from the live command/flag metadata, so they never drift from the actual CLI. Subcommands, flags, and enum values complete statically; model names (`--model`, `--smol`, `--slow`, `--plan`) resolve against the bundled model catalog and `--resume` against your on-disk sessions.\n\n```sh\n# zsh — add to ~/.zshrc (or write the output into a file on your $fpath)\neval \"$(omp completions zsh)\"\n\n# bash — add to ~/.bashrc\neval \"$(omp completions bash)\"\n\n# fish\nomp completions fish > ~/.config/fish/completions/omp.fish\n```\n\n## Every tool, _benchmaxxed_.\n\nEdits that land on the first attempt. Reads that summarize files instead of dumping their content. Searches that return instantly. Pick any model — omp will get it right.\n\n| model            | metric       | what                                                                  |\n| ---------------- | ------------ | --------------------------------------------------------------------- |\n| Grok Code Fast 1 | 6.7% → 68.3% | Tenfold lift the moment the edit format stops eating the model alive. |\n| Gemini 3 Flash   | +5 pp        | Over str_replace — beats Google's own best attempt at the format.     |\n| Grok 4 Fast      | −61% tokens  | Output collapses once the retry loop on bad diffs disappears.         |\n| MiniMax          | 2.1×         | Pass rate more than doubles. Same weights, same prompt.               |\n\n- `read` : summarized snippets · ideal defaults · selector hit rate\n- `search` : fastest in the west\n- `lsp` : everything your IDE knows, the agent knows\n- `prompts` : adjusted relentlessly for each model\n\n[Read the full post ↗](https://blog.can.ac/2026/02/12/the-harness-problem/)\n\n## The Pi _you love_, with **batteries included**.\n\nOriginally built on [Mario Zechner](https://github.com/mariozechner)'s wonderful [Pi](https://github.com/badlogic/pi-mono), omp adds everything you're missing.\n\n### 01 · Code execution w/ tool-calling\n\nMost harnesses give the agent a Python sandbox and call it done. Ours runs persistent Python and a Bun worker, and either kernel can call back into the agent's own tools — read, search, task — over a loopback bridge. The agent loads a CSV with tool.read from inside Python, charts it from JavaScript, and never leaves the cell.\n\n![omp TUI: a single eval session with `[1/2] pandas describe` (Python) printing a real DataFrame.describe() table, followed by `[2/2] top scorer` (JavaScript) running a reduce. Footer: 'Both kernels ran in one session.'](https://omp.sh/captures/eval.webp)\n\n### 02 · LSP wired into every write\n\nAsk for a rename and you get a rename. The call goes through workspace/willRenameFiles, so re-exports, barrel files, and aliased imports update before the file moves. Everything your IDE knows, the agent knows.\n\n![omp TUI: `LSP references` returns five hits across three files for the symbol `formatBytes`, then `LSP rename` applies the change with edits to format.ts/report.ts/cli.ts, then a `Search formatBytes 0 matches` confirmation. Final line: 'Rename complete. Five edits across three files…'.](https://omp.sh/captures/lsp.webp)\n\n### 03 · Drives a real debugger\n\nA C binary segfaults: the agent attaches lldb, steps to the bad pointer, reads the frame. A Go service hangs: it attaches dlv and walks the goroutines. A Python process is wedged: debugpy, pause, inspect, evaluate. Most agents are still sprinkling print statements.\n\n![omp TUI: a live lldb-dap session against a native binary at /tmp/omp-native/demo. Adapter=lldb-dap, Status=stopped, Frame=xorshift32, Instruction pointer 0x10000055C, Location demo.c:6:10. Debug scopes and Debug variables cards show locals (x = 57351) and the agent confirms the math: x went from 7 → 57351 (= 7 ^ (7<<13)).](https://omp.sh/clips/dap-poster.webp)\n\n_[Watch the capture ↗](https://omp.sh/clips/dap.mp4)_\n\n### 04 · Time-traveling stream rules\n\nYour rules sit dormant until the model goes off-script. A regex match aborts the stream mid-token, injects the rule as a system reminder, and retries from the same point. You get course-correction without paying context tax on every turn. Injections survive compaction, so the fix sticks.\n\n![omp TUI: agent reading src.rs and about to write Box::leak when the request aborts (red `Error: Request was aborted`), an amber `⚠ Injecting rule: box-leak` card injects the rule body `Don't reach for Box::leak in production code paths`, and the agent then course-corrects by proposing `Arc<str>` and asking the user to confirm.](https://omp.sh/clips/ttsr-poster.webp)\n\n_[Watch the capture ↗](https://omp.sh/clips/ttsr.mp4)_\n\n### 05 · First-class subagents\n\nSplit a job across workers and get typed results back. task fans out into isolated worktrees, each worker runs its own tool surface, and the final yield is a schema-validated object the parent reads directly. No prose to parse, no merge conflicts between siblings, no orphaned edits.\n\n![omp TUI showing `task` spawning two subagents `ComponentsExports` and `RoutesExports`, the constraints block requiring an IRC DM between peers, the per-subagent status cards with cost and duration, and a final Findings section listing both exports plus an honest 'IRC coordination note' about a one-sided handshake.](https://omp.sh/clips/irc-poster.webp)\n\n_[Watch the capture ↗](https://omp.sh/clips/irc.mp4)_\n\n### 06 · Read a pdf on arxiv, why not?\n\nweb_search chains fourteen ranked providers and hands whatever URLs it finds straight to read. Arxiv PDFs, GitHub pages, Stack Overflow threads come back as structured markdown with anchors intact — the same tool surface you use on local files. Cite, follow, quote, never lose where you came from.\n\n![omp TUI: web_search returns 10 ranked Perplexity sources for inference-time compute scaling, the agent picks an arxiv paper, calls read https://arxiv.org/pdf/2604.10739v1, and summarizes the paper's headline result with real numbers.](https://omp.sh/clips/web-poster.webp)\n\n_[Watch the capture ↗](https://omp.sh/clips/web.mp4)_\n\n### 07 · Unapologetically native. Even on Windows.\n\nOther agents shell out to rg, grep, find, and bash. On many machines those binaries don't exist, and on the ones where they do, every call costs a fork-exec round-trip. omp links the real implementations into the process. ripgrep, glob, find: in-process. brush is the bash, with sessions that survive across calls. The same omp binary runs on macOS, Linux, and Windows — no WSL bridge.\n\n### 08 · Code review with priorities and a verdict\n\nGet a clear verdict on whether the change ships, with every issue ranked P0 through P3 and scored for confidence. /review spawns dedicated reviewer subagents that sweep branches, single commits, or uncommitted work in parallel. You tackle what blocks release first; nothing important hides in a wall of prose.\n\n### 09 · Hashline: edit by content hash\n\nPerfect edits, fewer tokens. The model points at anchors instead of retyping the lines it wants to change, so whitespace battles and string-not-found loops just stop happening. Edit a stale file and the anchors diverge — we reject the patch before it corrupts anything. Grok 4 Fast spends 61% fewer output tokens on the same work.\n\n### 10 · GitHub is just another filesystem\n\nOther harnesses bolt on gh_issue_view, gh_pr_view, gh_search — each with its own parameters the agent has to learn and you have to debug. We skipped that. read already handles paths; PRs are paths. One interface to teach the model, one surface to keep correct.\n\n### 11 · Hindsight: memory the agent curates\n\nThe agent remembers your codebase between sessions. It writes facts mid-run with retain, pulls them back with recall, and compresses each session into a mental model that loads on the first turn of the next one. Project-scoped by default, so what it learns about this repo stays with this repo.\n\n### 12 · ACP: editor-drivable agent\n\nRun omp inside Zed and you get the same agent you drive from the terminal — reading the buffer you're actually looking at, writing through the editor's save path, spawning shells in the editor's terminal. Destructive tools pause for a permission prompt you can answer once and forget. No bridge, no plugin, no second brain to keep in sync.\n\n### 13 · Inherits what your other tools already wrote\n\nEvery other agent ships an importer and expects you to convert. omp reads the eight formats already on disk in their native shape — Cursor MDC, Cline .clinerules, Codex AGENTS.md, Copilot applyTo, and the rest. No migration script, no YAML-to-TOML port, no \"supported subset\" footnotes. The config your team wrote last quarter still works tonight.\n\n### 14 · omp commit: atomic splits, validated messages\n\nomp reads the working tree through git-overview, git-file-diff, and git-hunk, then splits unrelated changes into atomic commits ordered by their dependencies. Cycles are rejected before anything is written. Source files score above tests, docs, and configs, so the headline commit is the one that matters. Lock files are excluded from analysis entirely.\n\n### 15 · Read PRs. _Walk skills._ Pull JSON out of subagents.\n\nTen internal schemes — `pr://`, `issue://`, `agent://`, `skill://`, `rule://`, and the rest — resolve transparently inside every FS-shaped tool the agent already calls. `read pr://1428` returns the same shape as `read src/foo.ts`. `search` walks a diff like a directory. `agent://<id>/findings.0.path` pulls a field out of a subagent's output by path.\n\n![omp TUI reading pr://can1357/oh-my-pi/1063 and then /diff/1, showing hunk headers, added lines, and a [MODIFIED] (+12 -0) summary.](https://omp.sh/captures/pr.webp)\n\n### 16 · Conflict resolution, made easy.\n\nEach merge conflict becomes one URL. The agent writes `@theirs`, `@ours`, or `@base` to `conflict://N` and the file resolves cleanly. Bulk form: `conflict://*`.\n\n![omp TUI: ✓ Read src/session.ts (⚠ 1 conflict), then ✓ Write conflict://1 · 1 line with content @theirs, then a confirmation 'Resolved.'](https://omp.sh/clips/conflict-poster.webp)\n\n_[Watch the capture ↗](https://omp.sh/clips/conflict.mp4)_\n\n### 17 · Preview, then accept.\n\n`ast_edit` returns a _(proposed)_ card with the replacement count. The change is staged. The agent calls `resolve` with a reason; the TUI turns it into an **Accept** card and the disk move happens — atomic, all or nothing.\n\n![omp TUI: ✓ AST Edit: console.log($X) (proposed) 3 replacements · 1 file, then ✓ Accept: 3 replacements in 1 file (AST Edit), followed by 'Applied 3 replacements in src/auth.ts.'](https://omp.sh/clips/codemod-poster.webp)\n\n_[Watch the capture ↗](https://omp.sh/clips/codemod.mp4)_\n\n### 18 · Drives a _real browser_. _Or your Slack?_\n\nStealth's on by default, so pages see a normal user instead of a headless bot. The same API drives any Electron app in place — point it at Slack and the agent reads your DMs the way it reads the web.\n\n![omp TUI driving the browser tool against DuckDuckGo](https://omp.sh/captures/browser.webp)\n\n## Whatever the task needs, _it's already in the box_.\n\n32 tools live in the same namespace as `read` and `bash`. Pin the active set with `--tools read,edit,bash,…` and the rest stay hidden but indexed — `search_tool_bm25` pulls them back in mid-session when `tools.discoveryMode` says so.\n\n**Files & search**\n\n- `read` — files, dirs, archives, SQLite, PDFs, notebooks, URLs, and internal `://` schemes through one path.\n- `write` — create or overwrite a file, archive entry, or SQLite row.\n- `edit` — hashline patches with content-hash anchors and stale-anchor recovery.\n- `ast_edit` — structural rewrites previewed before apply, via ast-grep.\n- `ast_grep` — structural code queries over 50+ tree-sitter grammars.\n- `search` — regex over files, globs, and internal URLs.\n- `find` — glob-based path lookup; reach for `search` when you need content matches.\n\n**Runtime**\n\n- `bash` — workspace shell, with optional PTY or background-job dispatch.\n- `eval` — persistent Python and JavaScript cells with shared prelude and tool re-entry.\n- `ssh` — one remote command against a configured host.\n\n**Code intelligence**\n\n- `lsp` — diagnostics, navigation, symbols, renames, code actions, raw requests.\n- `debug` — drive a DAP session — breakpoints, stepping, threads, stack, variables.\n\n**Coordination**\n\n- `task` — fan out subagents in parallel, optionally workspace-isolated.\n- `irc` — short prose between live agents in this process.\n- `todo_write` — ordered mutations over the session todo list with phase tracking.\n- `job` — wait on or cancel background jobs.\n- `ask` — structured follow-up questions for interactive runs.\n\n**Outside the box**\n\n- `browser` — Puppeteer tabs over headless Chromium or CDP-attached apps.\n- `web_search` — one query across configured providers, returning answer plus citations.\n- `github` — GitHub CLI ops — repo, PR, issues, code search, Actions run-watch.\n- `generate_image` — generate or edit raster images via Gemini image models.\n- `inspect_image` — vision-model analysis of a local image file.\n- `render_mermaid` — Mermaid source to terminal-friendly ASCII or PNG.\n\n**Memory & state**\n\n- `checkpoint` — mark conversation state for a later collapse-and-report.\n- `rewind` — prune exploratory context, keep a concise report.\n- `retain` — queue durable facts into the active Hindsight bank.\n- `recall` — search the Hindsight bank for raw memories.\n- `reflect` — ask Hindsight to synthesize an answer over the bank.\n\n**Misc**\n\n- `resolve` — apply or discard a queued preview action.\n- `search_tool_bm25` — BM25 over the hidden tool index; activates top matches mid-session.\n\nSetting-gated, off by default: `github`, `inspect_image`, `render_mermaid`, `checkpoint`, `rewind`, `search_tool_bm25`, `retain`, `recall`, `reflect`. Flip them on once, scoped per project.\n\n[Full reference →](https://omp.sh/docs/tools)\n\n## Forty-plus providers, hundreds of models, _one /model away_.\n\nRoles route work by intent. `default` for normal turns. `smol` for cheap subagent fan-out. `slow` for deep reasoning. `plan` for plan mode. `commit` for changelogs. Override at launch with `--smol`, `--slow`, or `--plan`; cycle through the configured models for the active role with `Ctrl+P`. Swap the active model mid-session with the `/model` slash command.\n\nAuth tags below: `oauth` signs in with your provider account, `plan` routes through a coding-plan subscription, `local` runs against a local server with the key optional.\n\n### Frontier APIs\n\nDirect APIs and gateways. Mix providers per role.\n\nAnthropic `oauth` · OpenAI · OpenAI Codex `oauth` · Google Gemini · Google Antigravity `oauth` · xAI · Mistral · Groq · Cerebras · Fireworks · Together · Hugging Face · NVIDIA · OpenRouter · Synthetic · Vercel AI Gateway · Cloudflare AI Gateway · Wafer Serverless · Perplexity `oauth`\n\n### Coding plans\n\nSubscription-routed. `/login` attaches the session.\n\nCursor `oauth` · GitHub Copilot `oauth` · GitLab Duo · Kimi Code `plan` · Moonshot · MiniMax Coding Plan `plan` · MiniMax Coding Plan CN `plan` · Alibaba Coding Plan `plan` · Qwen Portal · Z.AI / GLM Coding Plan `plan` · Xiaomi MiMo · Qianfan · NanoGPT · Venice · Kilo · ZenMux · Wafer Pass `plan` · OpenCode Go · OpenCode Zen\n\n### Run it yourself\n\nOpenAI-compatible `/v1/models`. Local instances skip the key.\n\nOllama `local` · Ollama Cloud · LM Studio `local` · llama.cpp `local` · vLLM `local` · LiteLLM\n\n### Four knobs that make routing useful\n\n- **Custom providers** — Declare anything that speaks `openai-completions`, `openai-responses`, `openai-codex-responses`, `azure-openai-responses`, `anthropic-messages`, `google-generative-ai`, or `google-vertex` in `~/.omp/agent/models.yml`.\n- **Fallback chains** — Per-role chains under `retry.fallbackChains`. When the primary throws 429s or hits a quota wall, the next entry takes the rest of the turn — restored on cooldown.\n- **Path-scoped roles** — Nest `paths:` under `modelRoles` to pin a heavier `default` on one repo without touching the global config. Closest path wins.\n- **Round-robin credentials** — Stack API keys per provider and the runtime rotates with session affinity and per-credential backoff. Useful when one key would burn its quota by lunch.\n\nFull provider & routing reference at [omp.sh/docs/providers](https://omp.sh/docs/providers).\n\n## Fourteen backends. _One tool the agent already knows_.\n\n`web_search` is built in, not bolted on. `auto` walks a fourteen-provider chain; pin one by name if you already pay for it. Behind every hit, site-aware extraction turns GitHub, registries, arXiv, Stack Overflow, and docs into structured markdown — anchors and link targets survive.\n\n### Search providers\n\nFourteen backends. Pin one, or let `auto` walk the chain in order.\n\n| provider     | auth                   |\n| ------------ | ---------------------- |\n| `auto`       | chain                  |\n| `exa`        | `EXA_API_KEY` (or mcp) |\n| `brave`      | `BRAVE_API_KEY`        |\n| `jina`       | `JINA_API_KEY`         |\n| `kimi`       | `MOONSHOT_API_KEY`     |\n| `zai`        | `ZAI_API_KEY`          |\n| `anthropic`  | oauth                  |\n| `perplexity` | `PERPLEXITY_API_KEY`   |\n| `gemini`     | oauth                  |\n| `codex`      | oauth                  |\n| `tavily`     | `TAVILY_API_KEY`       |\n| `parallel`   | `PARALLEL_API_KEY`     |\n| `kagi`       | `KAGI_API_KEY`         |\n| `synthetic`  | `SYNTHETIC_API_KEY`    |\n| `searxng`    | self-hosted            |\n\n### Specialised handlers\n\nThe agent gets structured content, not stripped HTML.\n\n- **Code hosts** — github, gitlab\n- **Package registries** — npm, PyPI, crates.io, Hex, Hackage, NuGet, Maven, RubyGems, Packagist, pub.dev, Go packages\n- **Research sources** — arxiv, semantic scholar\n- **Forums** — stack overflow, reddit, hn\n- **Docs** — mdn, readthedocs, docs.rs\n\nPages convert to markdown with link structure intact. The agent can cite, follow, and quote without losing anchors.\n\n### Security databases\n\nVuln lookups answer with vendor data, not blog summaries.\n\n- **NVD** — national vulnerability database\n- **OSV** — open source vuln feed\n- **CISA KEV** — known exploited vulns\n\n[`web_search` reference ↗](https://omp.sh/docs/tools#web_search)\n\n## Roughly **~27,000** lines of Rust, doing the work other harnesses shell out for.\n\nThree crates, one platform-tagged N-API addon. Search, shell, AST, highlight, PTY, image decode, BPE counting — all in-process on the libuv pool. No fork/exec on the hot path.\n\n- Crates: `pi-natives`, `pi-shell`, `pi-ast`\n- Platforms: `linux-x64`, `linux-arm64`, `darwin-x64`, `darwin-arm64`, `win32-x64`\n\nThe table below is a per-module breakdown that intentionally omits glue and tests.\n\n| Module     | What it does                                                                         | Powered by                                |  ~LoC |\n| ---------- | ------------------------------------------------------------------------------------ | ----------------------------------------- | ----: |\n| shell      | Embedded bash · persistent sessions · timeout/abort · custom builtins                | brush-shell (vendored)                    | 3,700 |\n| grep       | Regex search · parallel/sequential · glob & type filters · fuzzy find                | grep-regex · grep-searcher                | 1,900 |\n| keys       | Kitty keyboard protocol with xterm fallback · PHF perfect-hash lookup                | phf                                       | 1,490 |\n| text       | ANSI-aware width · truncation · column slicing · SGR-preserving wrap                 | unicode-width · segmentation              | 1,450 |\n| summarize  | Tree-sitter structural source summaries with elision controls                        | tree-sitter · ast-grep-core               | 1,040 |\n| ast        | ast-grep pattern matching and structural rewrites                                    | ast-grep-core                             | 1,000 |\n| fs_cache   | Mtime-keyed file cache shared by read · grep · lsp                                   | in-tree                                   |   840 |\n| highlight  | Syntax highlighting · 11 semantic categories · 30+ aliases                           | syntect                                   |   470 |\n| pty        | Native PTY allocation for sudo · ssh interactive prompts                             | portable-pty                              |   455 |\n| glob       | Discovery with glob · type filters · mtime sort · gitignore respect                  | ignore · globset                          |   410 |\n| workspace  | Workspace walker with gitignore + AGENTS.md discovery in one pass                    | ignore · git2                             |   385 |\n| appearance | Mode 2031 + native macOS dark/light via CoreFoundation FFI                           | core-foundation                           |   270 |\n| power      | macOS power-assertion API for idle/system/display-sleep prevention                   | IOKit FFI                                 |   270 |\n| task       | Blocking work on libuv thread pool · cancellation · timeout · profiling              | tokio · napi                              |   260 |\n| fd         | Filesystem walker for find-tool replacement                                          | ignore                                    |   250 |\n| iso        | Workspace isolation shim · apfs · btrfs · zfs · reflink · overlayfs · projfs · rcopy | pi-iso (PAL)                              |   245 |\n| prof       | Circular buffer profiler with folded-stack and SVG flamegraph output                 | inferno                                   |   240 |\n| ps         | Cross-platform process-tree kill and descendant listing                              | libc · libproc · CreateToolhelp32Snapshot |   195 |\n| image      | Decode/encode PNG · JPEG · WebP · GIF · resize with 5 filters                        | image                                     |   190 |\n| clipboard  | Text copy and image read from system clipboard · no xclip/pbcopy                     | arboard                                   |    80 |\n| tokens     | O200k / Cl100k BPE token counting · both tables embedded                             | tiktoken-rs                               |    65 |\n| html       | HTML to Markdown with optional content cleaning                                      | html-to-markdown-rs                       |    50 |\n\n## Four entry points: _interactive_, _one-shot_, RPC, and ACP.\n\nSame engine, four wrappers. `omp` runs the TUI. `omp -p` answers a single prompt and exits. The Node SDK embeds the session in your process. `omp --mode rpc` and `omp acp` hand the wheel to another program over stdio.\n\n### Interactive — when in doubt, the agent asks\n\nThe TUI is the default surface. Tool calls render as cards, edits preview before they land, and ambiguity routes through the `ask` tool — a structured option picker the agent can call mid-turn. The keyboard handles the rest.\n\nThe same prompt cards surface over ACP, so editors get the picker without writing one.\n\n![omp TUI: the ask tool renders an option picker with three choices, a (Recommended) badge on the first, and 'up/down navigate · enter select · esc cancel' footer.](https://omp.sh/captures/ask.webp)\n\n### SDK — embed in Node\n\n`@oh-my-pi/pi-coding-agent`\n\nNode and TypeScript hosts pull the engine in directly. The package exposes `ModelRegistry`, `SessionManager`, `createAgentSession`, and `discoverAuthStorage`; the session emits typed events you subscribe to.\n\n```ts\nimport { ModelRegistry, SessionManager, createAgentSession, discoverAuthStorage } from \"@oh-my-pi/pi-coding-agent\";\n\nconst auth = await discoverAuthStorage();\nconst models = new ModelRegistry(auth);\nawait models.refresh();\n\nconst { session } = await createAgentSession({\n\tsessionManager: SessionManager.inMemory(),\n\tauthStorage: auth,\n\tmodelRegistry: models,\n});\nawait session.prompt(\"list .ts files\");\n```\n\n### RPC — drive over stdio\n\n`omp --mode rpc`\n\nFor non-Node embedders, or when you want process isolation. NDJSON commands in, response and event frames out. `--mode rpc-ui` adds tool cards, selectors, and dialogs as `extension_ui_request` frames the host must answer.\n\n```\n$ omp --mode rpc --no-session\n> {\"id\":\"r1\",\"type\":\"prompt\",\"message\":\"list .ts files\"}\n< {\"id\":\"r1\",\"type\":\"response\", ...}\n> {\"id\":\"r2\",\"type\":\"set_model\",\"provider\":\"anthropic\",\"modelId\":\"sonnet-4.5\"}\n> {\"id\":\"r3\",\"type\":\"abort\"}\n```\n\n### ACP — speak to editors\n\n`omp acp`\n\nThe [Agent Client Protocol](https://github.com/zed-industries/agent-client-protocol) over JSON-RPC. When the editor advertises capabilities, tool I/O routes through it and writes are gated by `session/request_permission`.\n\n| omp tool                      | ACP route                           |\n| ----------------------------- | ----------------------------------- |\n| `bash`                        | `terminal/create + terminal/output` |\n| `read`                        | `fs/read_text_file`                 |\n| `write`                       | `fs/write_text_file`                |\n| `edit, ast_edit, write, bash` | `session/request_permission`        |\n\nFull reference: [omp.sh/docs/sdk](https://omp.sh/docs/sdk).\n\n## A harness worth keeping is one you _don't_ outgrow.\n\nPick it up at **[omp.sh](https://omp.sh)**.\n\nomp is a fork of [Pi](https://github.com/badlogic/pi-mono) by [Mario Zechner](https://github.com/mariozechner), rewritten as a coding-first surface: sessions, subagents, slash commands, extensions — all TypeScript, all MIT, all on [GitHub](https://github.com/can1357/oh-my-pi). Shape it from config, hook it from outside, or read the source when you need to.\n\n### Primitives\n\nAn extension is a TypeScript module. Same tool API, same slash-command registry, same hotkey table, same TUI primitives the built-ins use. Nothing is reserved.\n\n### Discovery\n\nOn first run omp inherits whatever is already on disk: rules, skills, and MCP servers from `.claude`, `.cursor`, `.windsurf`, `.gemini`, `.codex`, `.cline`, `.github/copilot`, and `.vscode`. No migration script.\n\n### Extensibility\n\nAsk omp to write the piece you're missing, then `/reload-plugins`. Keep it local, ship it in a `marketplace`, or publish it to npm.\n\n## Philosophy\n\nomp is a fork of [pi-mono](https://github.com/badlogic/pi-mono) by [Mario Zechner](https://github.com/mariozechner), extended with a batteries-included coding workflow.\n\nKey ideas:\n\n- Keep interactive terminal-first UX for real coding work\n- Include practical built-ins (tools, sessions, branching, subagents, extensibility)\n- Make advanced behavior configurable rather than hidden\n\n---\n\n## Development\n\n### Debug Command\n\n`/debug` opens tools for debugging, reporting, and profiling.\n\nFor architecture and contribution guidelines, see [packages/coding-agent/DEVELOPMENT.md](packages/coding-agent/DEVELOPMENT.md).\n\n---\n\n## Monorepo Packages\n\n| Package                                                   | Description                                                                |\n| --------------------------------------------------------- | -------------------------------------------------------------------------- |\n| **[@oh-my-pi/pi-ai](packages/ai)**                        | Multi-provider LLM client with streaming and model/provider integration    |\n| **[@oh-my-pi/pi-agent-core](packages/agent)**             | Agent runtime with tool calling and state management                       |\n| **[@oh-my-pi/pi-coding-agent](packages/coding-agent)**    | Interactive coding agent CLI and SDK                                       |\n| **[@oh-my-pi/pi-tui](packages/tui)**                      | Terminal UI library with differential rendering                            |\n| **[@oh-my-pi/pi-natives](packages/natives)**              | N-API bindings for grep, shell, image, text, syntax highlighting, and more |\n| **[@oh-my-pi/omp-stats](packages/stats)**                 | Local observability dashboard for AI usage statistics                      |\n| **[@oh-my-pi/pi-utils](packages/utils)**                  | Shared utilities (logging, streams, dirs/env/process helpers)              |\n| **[@oh-my-pi/swarm-extension](packages/swarm-extension)** | Swarm orchestration extension package                                      |\n\n### Rust Crates\n\n| Crate                                                         | Description                                                                                         |\n| ------------------------------------------------------------- | --------------------------------------------------------------------------------------------------- |\n| **[pi-natives](crates/pi-natives)**                           | Core Rust native addon (N-API `cdylib`) used by `@oh-my-pi/pi-natives`; aggregates the crates below |\n| **[pi-shell](crates/pi-shell)**                               | Embedded shell / PTY / process management split out of `pi-natives` (wraps `brush-*`)               |\n| **[pi-ast](crates/pi-ast)**                                   | tree-sitter-based code summarizer and AST utilities (50+ language grammars)                         |\n| **[pi-iso](crates/pi-iso)**                                   | Task isolation backend resolver: APFS clones, btrfs/zfs reflinks, overlayfs, projfs, rcopy          |\n| **[brush-core-vendored](crates/brush-core-vendored)**         | Vendored fork of [brush-shell](https://github.com/reubeno/brush) for embedded bash execution        |\n| **[brush-builtins-vendored](crates/brush-builtins-vendored)** | Vendored bash builtins (cd, echo, test, printf, read, export, etc.)                                 |\n\n---\n\n## License\n\nMIT. See [LICENSE](LICENSE).\n\n© 2025 Mario Zechner  \n© 2025-2026 Can Bölük\n\n_made for terminals that stay open_\n\n- [omp.sh](https://omp.sh)\n- [GitHub](https://github.com/can1357/oh-my-pi)\n- [Changelog](https://github.com/can1357/oh-my-pi/blob/main/packages/coding-agent/CHANGELOG.md)\n- [npm](https://www.npmjs.com/package/@oh-my-pi/pi-coding-agent)\n- [Discord](https://discord.gg/4NMW9cdXZa)\n- [MIT](https://github.com/can1357/oh-my-pi/blob/main/LICENSE)\n","summary":"Oh My Pi is a highly capable, open-source coding agent designed to provide a comprehensive, IDE-integrated development experience. It features a robust architecture built on a high-performance Rust core, offering support for over 40 AI providers and an extensive suite of built-in LSP and DAP tools. By optimizing edit formats and search capabilities, the project ensures high success rates across various models, making it an ideal solution for developers seeking an efficient, out-of-the-box autonomous coding assistant.","description":"⌥  AI Coding agent for the terminal — hash-anchored edits, optimized tool harness, LSP, Python, browser, subagents, and more","stars":9908,"language":"TypeScript"},{"owner":"multica-ai","repo":"multica","url":"https://github.com/multica-ai/multica","readme":"<p align=\"center\">\n  <img src=\"docs/assets/banner.jpg\" alt=\"Multica — humans and agents, side by side\" width=\"100%\">\n</p>\n\n<div align=\"center\">\n\n<picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/assets/logo-dark.svg\">\n  <source media=\"(prefers-color-scheme: light)\" srcset=\"docs/assets/logo-light.svg\">\n  <img alt=\"Multica\" src=\"docs/assets/logo-light.svg\" width=\"50\">\n</picture>\n\n# Multica\n\n**Your next 10 hires won't be human.**\n\nThe open-source managed agents platform.<br/>\nTurn coding agents into real teammates — assign tasks, track progress, compound skills.\n\n[![CI](https://github.com/multica-ai/multica/actions/workflows/ci.yml/badge.svg)](https://github.com/multica-ai/multica/actions/workflows/ci.yml)\n[![GitHub stars](https://img.shields.io/github/stars/multica-ai/multica?style=flat)](https://github.com/multica-ai/multica/stargazers)\n\n[Website](https://multica.ai) · [Cloud](https://multica.ai) · [X](https://x.com/MulticaAI) · [Self-Hosting](SELF_HOSTING.md) · [Contributing](CONTRIBUTING.md)\n\n**English | [简体中文](README.zh-CN.md)**\n\n</div>\n\n## What is Multica?\n\nMultica turns coding agents into real teammates. Assign issues to an agent like you'd assign to a colleague — they'll pick up the work, write code, report blockers, and update statuses autonomously.\n\nNo more copy-pasting prompts. No more babysitting runs. Your agents show up on the board, participate in conversations, and compound reusable skills over time. Think of it as open-source infrastructure for managed agents — vendor-neutral, self-hosted, and designed for human + AI teams. Works with **Claude Code**, **Codex**, **GitHub Copilot CLI**, **OpenClaw**, **OpenCode**, **Hermes**, **Gemini**, **Pi**, **Cursor Agent**, **Kimi**, and **Kiro CLI**.\n\nFor larger teams, Squads add a stable routing layer: assign work to a group led by an agent, and the leader delegates to the right member.\n\n<p align=\"center\">\n  <img src=\"docs/assets/hero-screenshot.png\" alt=\"Multica board view\" width=\"800\">\n</p>\n\n## Why \"Multica\"?\n\nMultica — **Mul**tiplexed **I**nformation and **C**omputing **A**gent.\n\nThe name is a nod to Multics, the pioneering operating system of the 1960s that introduced time-sharing — letting multiple users share a single machine as if each had it to themselves. Unix was born as a deliberate simplification of Multics: one user, one task, one elegant philosophy.\n\nWe think the same inflection is happening again. For decades, software teams have been single-threaded — one engineer, one task, one context switch at a time. AI agents change that equation. Multica brings time-sharing back, but for an era where the \"users\" multiplexing the system are both humans and autonomous agents.\n\nIn Multica, agents are first-class teammates. They get assigned issues, report progress, raise blockers, and ship code — just like their human colleagues. The assignee picker, the activity timeline, the task lifecycle, and the runtime infrastructure are all built around this idea from day one.\n\nLike Multics before it, the bet is on multiplexing: a small team shouldn't feel small. With the right system, two engineers and a fleet of agents can move like twenty.\n\n## Features\n\nMultica manages the full agent lifecycle: from task assignment to execution monitoring to skill reuse.\n\n- **Agents as Teammates** — assign to an agent like you'd assign to a colleague. They have profiles, show up on the board, post comments, create issues, and report blockers proactively.\n- **Squads** — group agents (and humans) under a leader agent and assign work to the *squad*. The leader decides who should pick it up, so routing stays stable as the team grows. `@FrontendTeam` instead of `@alice-or-bob-or-carol`.\n- **Autonomous Execution** — set it and forget it. Full task lifecycle management (enqueue, claim, start, complete/fail) with real-time progress streaming via WebSocket.\n- **Autopilots** — schedule recurring work for agents. Cron triggers, webhooks, or manual runs — each autopilot creates the issue and routes it to an agent automatically, so daily standups, weekly reports, and periodic audits run themselves.\n- **Reusable Skills** — every solution becomes a reusable skill for the whole team. Deployments, migrations, code reviews — skills compound your team's capabilities over time.\n- **Unified Runtimes** — one dashboard for all your compute. Local daemons and cloud runtimes, auto-detection of available CLIs, real-time monitoring.\n- **Multi-Workspace** — organize work across teams with workspace-level isolation. Each workspace has its own agents, issues, and settings.\n\n---\n\n## Quick Install\n\n### macOS / Linux (Homebrew - recommended)\n\n```bash\nbrew install multica-ai/tap/multica\n```\n\nUse `brew upgrade multica-ai/tap/multica` to keep the CLI current.\n\n### macOS / Linux (install script)\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/multica-ai/multica/main/scripts/install.sh | bash\n```\n\nUse this if Homebrew is not available. The script installs the Multica CLI on macOS and Linux by using Homebrew when it is on `PATH`, otherwise it downloads the binary directly.\n\n### Windows (PowerShell)\n\n```powershell\nirm https://raw.githubusercontent.com/multica-ai/multica/main/scripts/install.ps1 | iex\n```\n\nThen configure, authenticate, and start the daemon in one command:\n\n```bash\nmultica setup          # Connect to Multica Cloud, log in, start daemon\n```\n\n> **Self-hosting?** Add `--with-server` to deploy a full Multica server on your machine:\n>\n> ```bash\n> curl -fsSL https://raw.githubusercontent.com/multica-ai/multica/main/scripts/install.sh | bash -s -- --with-server\n> multica setup self-host\n> ```\n>\n> This pulls the official Multica images from GHCR (latest stable by default). Requires Docker. See the [Self-Hosting Guide](SELF_HOSTING.md) for details.\n> If the selected GHCR tag has not been published yet, fall back to `make selfhost-build` from a checkout.\n\n---\n\n## Getting Started\n\n### 1. Set up and start the daemon\n\n```bash\nmultica setup           # Configure, authenticate, and start the daemon\n```\n\nThe daemon runs in the background and auto-detects agent CLIs (`claude`, `codex`, `copilot`, `openclaw`, `opencode`, `hermes`, `gemini`, `pi`, `cursor-agent`, `kimi`, `kiro-cli`, `agy`) on your PATH.\n\n### 2. Verify your runtime\n\nOpen your workspace in the Multica web app. Navigate to **Settings → Runtimes** — you should see your machine listed as an active **Runtime**.\n\n> **What is a Runtime?** A Runtime is a compute environment that can execute agent tasks. It can be your local machine (via the daemon) or a cloud instance. Each runtime reports which agent CLIs are available, so Multica knows where to route work.\n\n### 3. Create an agent\n\nGo to **Settings → Agents** and click **New Agent**. Pick the runtime you just connected and choose a provider (Claude Code, Codex, GitHub Copilot CLI, OpenClaw, OpenCode, Hermes, Gemini, Pi, Cursor Agent, Kimi, Kiro CLI, or Antigravity). Give your agent a name — this is how it will appear on the board, in comments, and in assignments.\n\n### 4. Assign your first task\n\nCreate an issue from the board (or via `multica issue create`), then assign it to your new agent. The agent will automatically pick up the task, execute it on your runtime, and report progress — just like a human teammate.\n\n---\n\n## CLI\n\nThe `multica` CLI connects your local machine to Multica — authenticate, manage workspaces, and run the agent daemon.\n\n| Command | Description |\n|---------|-------------|\n| `multica login` | Authenticate (opens browser) |\n| `multica daemon start` | Start the local agent runtime |\n| `multica daemon status` | Check daemon status |\n| `multica setup` | One-command setup for Multica Cloud (configure + login + start daemon) |\n| `multica setup self-host` | Same, but for self-hosted deployments |\n| `multica workspace list` | List your workspaces (current is marked with `*`) |\n| `multica workspace switch <id\\|slug>` | Switch the default workspace for this profile |\n| `multica issue list` | List issues in your workspace |\n| `multica issue create` | Create a new issue |\n| `multica update` | Update to the latest version |\n\nSee the [CLI and Daemon Guide](CLI_AND_DAEMON.md) for the full command reference.\n\n---\n\n## Architecture\n\n```\n┌──────────────┐     ┌──────────────┐     ┌──────────────────┐\n│   Next.js    │────>│  Go Backend  │────>│   PostgreSQL     │\n│   Frontend   │<────│  (Chi + WS)  │<────│   (pgvector)     │\n└──────────────┘     └──────┬───────┘     └──────────────────┘\n                            │\n                     ┌──────┴───────┐\n                     │ Agent Daemon │  runs on your machine\n                     └──────────────┘  (Claude Code, Codex, GitHub Copilot CLI,\n                                        OpenCode, OpenClaw, Hermes, Gemini,\n                                        Pi, Cursor Agent, Kimi, Kiro CLI)\n```\n\n| Layer | Stack |\n|-------|-------|\n| Frontend | Next.js 16 (App Router) |\n| Backend | Go (Chi router, sqlc, gorilla/websocket) |\n| Database | PostgreSQL 17 with pgvector |\n| Agent Runtime | Local daemon executing Claude Code, Codex, GitHub Copilot CLI, OpenClaw, OpenCode, Hermes, Gemini, Pi, Cursor Agent, Kimi, or Kiro CLI |\n\n## Development\n\nFor contributors working on the Multica codebase, see the [Contributing Guide](CONTRIBUTING.md).\n\n**Prerequisites:** [Node.js](https://nodejs.org/) v20+, [pnpm](https://pnpm.io/) v10.28+, [Go](https://go.dev/) v1.26+, [Docker](https://www.docker.com/)\n\n```bash\nmake dev\n```\n\n`make dev` auto-detects your environment (main checkout or worktree), creates the env file, installs dependencies, sets up the database, runs migrations, and starts all services.\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for the full development workflow, worktree support, testing, and troubleshooting.\n\nAn iOS mobile client lives in [`apps/mobile/`](apps/mobile/) — see its [README](apps/mobile/README.md) for how to build it onto your own iPhone.\n","summary":"Multica is an open-source managed platform designed to integrate autonomous coding agents into software development teams as first-class teammates. The platform enables users to assign tasks directly to agents, utilize \"Squads\" for intelligent task routing, and monitor progress through a centralized board that tracks agent activity and skill compounding. It is highly interoperable, supporting a wide range of popular AI models and CLI tools, making it an ideal infrastructure for engineering teams looking to scale their productivity by effectively managing human and AI collaboration.","description":"The open-source managed agents platform. Turn coding agents into real teammates — assign tasks, track progress, compound skills.","stars":34791,"language":"TypeScript"},{"owner":"Lum1104","repo":"Understand-Anything","url":"https://github.com/Lum1104/Understand-Anything","readme":"<h1 align=\"center\">Understand Anything</h1>\n\n<p align=\"center\">\n  <strong>Turn any codebase, knowledge base, or docs into an interactive knowledge graph you can explore, search, and ask questions about.</strong>\n  <br />\n  <em>Works with Claude Code, Codex, Cursor, Copilot, Gemini CLI, and more.</em>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://trendshift.io/repositories/23482\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/23482\" alt=\"Lum1104%2FUnderstand-Anything | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"README.md\">English</a> | <a href=\"READMEs/README.zh-CN.md\">简体中文</a> | <a href=\"READMEs/README.zh-TW.md\">繁體中文</a> | <a href=\"READMEs/README.ja-JP.md\">日本語</a> | <a href=\"READMEs/README.ko-KR.md\">한국어</a> | <a href=\"READMEs/README.es-ES.md\">Español</a> | <a href=\"READMEs/README.tr-TR.md\">Türkçe</a> | <a href=\"READMEs/README.ru-RU.md\">Русский</a>\n</p>\n\n<p align=\"center\">\n  <a href=\"#-quick-start\"><img src=\"https://img.shields.io/badge/Quick_Start-blue\" alt=\"Quick Start\" /></a>\n  <a href=\"https://github.com/Lum1104/Understand-Anything/blob/main/LICENSE\"><img src=\"https://img.shields.io/badge/License-MIT-yellow\" alt=\"License: MIT\" /></a>\n  <a href=\"https://docs.anthropic.com/en/docs/claude-code\"><img src=\"https://img.shields.io/badge/Claude_Code-8A2BE2\" alt=\"Claude Code\" /></a>\n  <a href=\"#codex\"><img src=\"https://img.shields.io/badge/Codex-000000\" alt=\"Codex\" /></a>\n  <a href=\"#vs-code--github-copilot\"><img src=\"https://img.shields.io/badge/Copilot-24292e\" alt=\"Copilot\" /></a>\n  <a href=\"#copilot-cli\"><img src=\"https://img.shields.io/badge/Copilot_CLI-24292e\" alt=\"Copilot CLI\" /></a>\n  <a href=\"#gemini-cli\"><img src=\"https://img.shields.io/badge/Gemini_CLI-4285F4\" alt=\"Gemini CLI\" /></a>\n  <a href=\"#opencode\"><img src=\"https://img.shields.io/badge/OpenCode-38bdf8\" alt=\"OpenCode\" /></a>\n  <a href=\"#mistral-vibe-cli\"><img src=\"https://img.shields.io/badge/Vibe_CLI-7c3aed\" alt=\"Vibe CLI\" /></a>\n  <a href=\"#trae\"><img src=\"https://img.shields.io/badge/Trae-7e22ce\" alt=\"Trae\" /></a>\n  <a href=\"https://understand-anything.com\"><img src=\"https://img.shields.io/badge/Homepage-d4a574\" alt=\"Homepage\" /></a>\n  <a href=\"https://understand-anything.com/demo/\"><img src=\"https://img.shields.io/badge/Live_Demo-00c853\" alt=\"Live Demo\" /></a>\n</p>\n\n<p align=\"center\">\n  <img src=\"assets/hero.png\" alt=\"Understand Anything — Turn any codebase into an interactive knowledge graph\" width=\"800\" />\n</p>\n\n<p align=\"center\">\n  <strong>💬 <a href=\"https://discord.gg/pydat66RY\">Join the Discord community &rarr;</a></strong>\n  <br />\n  <em>Ask questions, share what you've built, get help from the community.</em>\n</p>\n\n---\n\n**You just joined a new team. The codebase is 200,000 lines of code. Where do you even start?**\n\nUnderstand Anything is a [Claude Code Plugin](https://code.claude.com/docs/en/plugins-reference#plugins-reference) that analyzes your project with a multi-agent pipeline, builds a knowledge graph of every file, function, class, and dependency, then gives you an interactive dashboard to explore it all visually. Stop reading code blind. Start seeing the big picture.\n\n> **The goal isn't a graph that wows you with how complex your codebase is — it's a graph that quietly teaches you how every piece fits together.**\n\n---\n\n## ✨ Features\n\n> [!NOTE]\n> **Want to skip the reading?** Try the [live demo](https://understand-anything.com/demo/) in our [homepage](https://understand-anything.com/) — a fully interactive dashboard you can pan, zoom, search, and explore right in your browser.\n\n### Explore the structural graph\n\nNavigate your codebase as an interactive knowledge graph — every file, function, and class is a node you can click, search, and explore. Select any node to see plain-English summaries, relationships, and guided tours.\n\n### Understand business logic\n\nSwitch to the domain view and see how your code maps to real business processes — domains, flows, and steps laid out as a horizontal graph.\n\n### Analyze knowledge bases\n\nPoint `/understand-knowledge` at a [Karpathy-pattern LLM wiki](https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f) and get a force-directed knowledge graph with community clustering. The deterministic parser extracts wikilinks and categories from `index.md`, then LLM agents discover implicit relationships, extract entities, and surface claims — turning your wiki into a navigable graph of interconnected ideas.\n\n<table>\n  <tr>\n    <td width=\"50%\" valign=\"top\">\n      <h3>🧭 Guided Tours</h3>\n      <p>Auto-generated walkthroughs of the architecture, ordered by dependency. Learn the codebase in the right order.</p>\n    </td>\n    <td width=\"50%\" valign=\"top\">\n      <h3>🔍 Fuzzy & Semantic Search</h3>\n      <p>Find anything by name or by meaning. Search \"which parts handle auth?\" and get relevant results across the graph.</p>\n    </td>\n  </tr>\n  <tr>\n    <td width=\"50%\" valign=\"top\">\n      <h3>📊 Diff Impact Analysis</h3>\n      <p>See which parts of the system your changes affect before you commit. Understand ripple effects across the codebase.</p>\n    </td>\n    <td width=\"50%\" valign=\"top\">\n      <h3>🎭 Persona-Adaptive UI</h3>\n      <p>The dashboard adjusts its detail level based on who you are — junior dev, PM, or power user.</p>\n    </td>\n  </tr>\n  <tr>\n    <td width=\"50%\" valign=\"top\">\n      <h3>🏗️ Layer Visualization</h3>\n      <p>Automatic grouping by architectural layer — API, Service, Data, UI, Utility — with color-coded legend.</p>\n    </td>\n    <td width=\"50%\" valign=\"top\">\n      <h3>📚 Language Concepts</h3>\n      <p>12 programming patterns (generics, closures, decorators, etc.) explained in context wherever they appear.</p>\n    </td>\n  </tr>\n</table>\n\n---\n\n## 🚀 Quick Start\n\n### 1. Install the plugin\n\n```bash\n/plugin marketplace add Lum1104/Understand-Anything\n/plugin install understand-anything\n```\n\n### 2. Analyze your codebase\n\n```bash\n/understand\n```\n\nA multi-agent pipeline scans your project, extracts every file, function, class, and dependency, then builds a knowledge graph saved to `.understand-anything/knowledge-graph.json`.\n\n**Localized output:** Use `--language` to generate content in your preferred language:\n\n```bash\n# Generate Chinese content (知识图节点描述和 Dashboard UI)\n/understand --language zh\n\n# Supported languages: en (default), zh, zh-TW, ja, ko, ru\n```\n\nThe `--language` parameter affects:\n- Node summaries and descriptions in the knowledge graph\n- Dashboard UI labels, buttons, and tooltips\n- Guided tour explanations\n\n### 3. Explore the dashboard\n\n```bash\n/understand-dashboard\n```\n\nAn interactive web dashboard opens with your codebase visualized as a graph — color-coded by architectural layer, searchable, and clickable. Select any node to see its code, relationships, and a plain-English explanation.\n\n### 4. Keep learning\n\n```bash\n# Ask anything about the codebase\n/understand-chat How does the payment flow work?\n\n# Analyze impact of your current changes\n/understand-diff\n\n# Deep-dive into a specific file or function\n/understand-explain src/auth/login.ts\n\n# Generate an onboarding guide for new team members\n/understand-onboard\n\n# Extract business domain knowledge (domains, flows, steps)\n/understand-domain\n\n# Analyze a Karpathy-pattern LLM wiki knowledge base\n/understand-knowledge ~/path/to/wiki\n\n# Re-run anytime — incremental by default (only re-analyzes changed files)\n/understand\n\n# Auto-update on every commit via a post-commit hook\n/understand --auto-update\n\n# Scope to a subdirectory (for huge monorepos)\n/understand src/frontend\n```\n\n---\n\n## 🌐 Multi-Platform Installation\n\nUnderstand-Anything works across multiple AI coding platforms.\n\n### Claude Code (Native)\n\n```bash\n/plugin marketplace add Lum1104/Understand-Anything\n/plugin install understand-anything\n```\n\n### One-line install (Codex / OpenCode / OpenClaw / Antigravity / Gemini CLI / Pi Agent / Vibe CLI / VS Code Copilot / Hermes / Cline / KIMI CLI / Trae)\n\n**macOS / Linux:**\n```bash\ncurl -fsSL https://raw.githubusercontent.com/Lum1104/Understand-Anything/main/install.sh | bash\n# or skip the prompt by passing the platform:\ncurl -fsSL https://raw.githubusercontent.com/Lum1104/Understand-Anything/main/install.sh | bash -s codex\n```\n\n**Windows (PowerShell):**\n```powershell\niwr -useb https://raw.githubusercontent.com/Lum1104/Understand-Anything/main/install.ps1 | iex\n```\n\nThe installer clones the repo to `~/.understand-anything/repo` and creates the right symlinks for the chosen platform. Restart your CLI/IDE afterwards.\n\n- Supported `<platform>` values: `gemini`, `codex`, `opencode`, `pi`, `openclaw`, `antigravity`, `vibe`, `vscode`, `hermes`, `cline`, `kimi`, `trae`\n- Update later: `./install.sh --update`\n- Uninstall: `./install.sh --uninstall <platform>`\n\n### Cursor\n\nCursor auto-discovers the plugin via `.cursor-plugin/plugin.json` when this repo is cloned. No manual installation needed — just clone and open in Cursor.\n\nIf auto-discovery doesn't pick it up, install it manually: open **Cursor Settings → Plugins**, paste `https://github.com/Lum1104/Understand-Anything` into the search field, and add it from there.\n\n### VS Code + GitHub Copilot\n\nVS Code with GitHub Copilot (v1.108+) auto-discovers the plugin via `.copilot-plugin/plugin.json` when this repo is cloned. No manual installation needed — just clone and open in VS Code.\n\nFor personal skills (available across all projects), run the `install.sh` above with the `vscode` platform.\n\n### Copilot CLI\n\n```bash\ncopilot plugin install Lum1104/Understand-Anything:understand-anything-plugin\n```\n\n### Platform Compatibility\n\n| Platform | Status | Install Method |\n|----------|--------|----------------|\n| Claude Code | ✅ Native | Plugin marketplace |\n| Cursor | ✅ Supported | Auto-discovery |\n| VS Code + GitHub Copilot | ✅ Supported | Auto-discovery |\n| Copilot CLI | ✅ Supported | Plugin install |\n| Codex | ✅ Supported | `install.sh codex` |\n| OpenCode | ✅ Supported | `install.sh opencode` |\n| OpenClaw | ✅ Supported | `install.sh openclaw` |\n| Antigravity | ✅ Supported | `install.sh antigravity` |\n| Gemini CLI | ✅ Supported | `install.sh gemini` |\n| Pi Agent | ✅ Supported | `install.sh pi` |\n| Vibe CLI | ✅ Supported | `install.sh vibe` |\n| Hermes | ✅ Supported | `install.sh hermes` |\n| Cline | ✅ Supported | `install.sh cline` |\n| KIMI CLI | ✅ Supported | `install.sh kimi` |\n| Trae | ✅ Supported | `install.sh trae` |\n\n---\n\n## 📦 Share the Graph with Your Team\n\nThe graph is just JSON — **commit it once, and teammates skip the pipeline**. Good for onboarding, PR reviews, and docs-as-code.\n\n> **Example:** [GoogleCloudPlatform/microservices-demo (fork)](https://github.com/Lum1104/microservices-demo) — Go / Java / Python / Node reference with a committed graph.\n\n**What to commit:** everything in `.understand-anything/` *except* `intermediate/` and `diff-overlay.json` (those are local scratch).\n\n```gitignore\n.understand-anything/intermediate/\n.understand-anything/diff-overlay.json\n```\n\n**Keep it fresh:** enable `/understand --auto-update` — a post-commit hook incrementally patches the graph so each commit lands with a matching graph. Or re-run `/understand` manually before releases.\n\n**Large graphs (10 MB+):** track with **git-lfs**.\n\n```bash\ngit lfs install\ngit lfs track \".understand-anything/*.json\"\ngit add .gitattributes .understand-anything/\n```\n\n---\n\n## 🔧 Under the Hood\n\n### Tree-sitter + LLM hybrid\n\nStatic analysis and LLMs do what each does best:\n\n- **Tree-sitter (deterministic)** — parses source into a concrete syntax tree and extracts structural facts: imports, exports, function/class definitions, call sites, inheritance. Pre-resolved into an `importMap` during the scan phase and passed to file-analyzers so they don't re-derive imports from source. Same input → same output, every run. Also powers fingerprint-based change detection for incremental updates.\n- **LLM (semantic)** — reads the parsed structure alongside the original source to produce what parsers can't: plain-English summaries, tags, architectural layer assignments, business-domain mapping, guided tours, language concept callouts.\n\nThis split is why the graph is reproducible on the structural side (the same code always yields the same edges) while still capturing intent on the semantic side (what a file is *for*, not just what it imports).\n\n### Multi-Agent Pipeline\n\nThe `/understand` command orchestrates 5 specialized agents, and `/understand-domain` adds a 6th:\n\n| Agent | Role |\n|-------|------|\n| `project-scanner` | Discover files, detect languages and frameworks |\n| `file-analyzer` | Extract functions, classes, imports; produce graph nodes and edges |\n| `architecture-analyzer` | Identify architectural layers |\n| `tour-builder` | Generate guided learning tours |\n| `graph-reviewer` | Validate graph completeness and referential integrity (runs inline by default; use `--review` for full LLM review) |\n| `domain-analyzer` | Extract business domains, flows, and process steps (used by `/understand-domain`) |\n| `article-analyzer` | Extract entities, claims, and implicit relationships from wiki articles (used by `/understand-knowledge`) |\n\nFile analyzers run in parallel (up to 5 concurrent, 20-30 files per batch). Supports incremental updates — only re-analyzes files that changed since the last run.\n\n---\n\n## 🎥 Community\n\nA community-made walkthrough by **Better Stack**.\n\n<p align=\"center\">\n  <a href=\"https://www.youtube.com/watch?v=VmIUXVlt7_I\"><img src=\"https://img.youtube.com/vi/VmIUXVlt7_I/maxresdefault.jpg\" alt=\"Community walkthrough by Better Stack — watch on YouTube\" width=\"480\" /></a>\n  <br />\n  <em><a href=\"https://www.youtube.com/watch?v=VmIUXVlt7_I\">Watch on YouTube &rarr;</a></em>\n</p>\n\nMade a video, blog post, or tutorial? Open an issue or PR — happy to feature it here.\n\n---\n\n## 🤝 Contributing\n\nContributions are welcome! Here's how to get started:\n\n1. Fork the repository\n2. Create a feature branch (`git checkout -b feature/my-feature`)\n3. Run the tests (`pnpm --filter @understand-anything/core test`)\n4. Commit your changes and open a pull request\n\nPlease open an issue first for major changes so we can discuss the approach.\n\n---\n\n<p align=\"center\">\n  <strong>Stop reading code blind. Start understanding everything.</strong>\n</p>\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=Lum1104%2FUnderstand-Anything&type=date&legend=top-left\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/image?repos=Lum1104/Understand-Anything&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/image?repos=Lum1104/Understand-Anything&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/image?repos=Lum1104/Understand-Anything&type=date&legend=top-left\" />\n </picture>\n</a>\n\n<p align=\"center\">\n  <em>Thanks to everyone who's used and contributed — knowing this saves people time is what made it worth building.</em>\n</p>\n\n<p align=\"center\">\n  MIT License &copy; <a href=\"https://github.com/Lum1104\">Lum1104</a>\n</p>\n","summary":"Understand Anything is a sophisticated tool that transforms complex codebases, documentation, and knowledge bases into interactive, visual knowledge graphs. By utilizing a multi-agent pipeline, it maps files, functions, and dependencies to provide users with an intuitive dashboard that clarifies structural relationships and underlying business logic. This project is highly beneficial for developers, technical leads, and onboarding team members who need to quickly grasp the architecture of large or unfamiliar software projects without manually parsing thousands of lines of code.","description":"Graphs that teach > graphs that impress. Turn any code into an interactive knowledge graph you can explore, search, and ask questions about. Works with Claude Code, Codex, Cursor, Copilot, Gemini CLI, and more.","stars":49887,"language":"TypeScript"},{"owner":"harry0703","repo":"MoneyPrinterTurbo05","url":"https://github.com/harry0703/MoneyPrinterTurbo05","readme":null,"summary":null,"description":null,"stars":null,"language":null,"error":"No README found"},{"owner":"affaan-m","repo":"ECC","url":"https://github.com/affaan-m/ECC","readme":"**Language:** English | [Português (Brasil)](docs/pt-BR/README.md) | [简体中文](README.zh-CN.md) | [繁體中文](docs/zh-TW/README.md) | [日本語](docs/ja-JP/README.md) | [한국어](docs/ko-KR/README.md) | [Türkçe](docs/tr/README.md) | [Русский](docs/ru/README.md) | [Tiếng Việt](docs/vi-VN/README.md) | [ไทย](docs/th/README.md) | [Deutsch](docs/de-DE/README.md)\n\n# ECC\n\n![ECC - the harness-native operator system for agentic work](assets/hero.png)\n\n[![Stars](https://img.shields.io/github/stars/affaan-m/ECC?style=flat)](https://github.com/affaan-m/ECC/stargazers)\n[![Forks](https://img.shields.io/github/forks/affaan-m/ECC?style=flat)](https://github.com/affaan-m/ECC/network/members)\n[![Contributors](https://img.shields.io/github/contributors/affaan-m/ECC?style=flat)](https://github.com/affaan-m/ECC/graphs/contributors)\n[![npm ecc-universal](https://img.shields.io/npm/dw/ecc-universal?label=ecc-universal%20weekly%20downloads&logo=npm)](https://www.npmjs.com/package/ecc-universal)\n[![npm ecc-agentshield](https://img.shields.io/npm/dw/ecc-agentshield?label=ecc-agentshield%20weekly%20downloads&logo=npm)](https://www.npmjs.com/package/ecc-agentshield)\n[![GitHub App Install](https://img.shields.io/badge/GitHub%20App-150%20installs-2ea44f?logo=github)](https://github.com/marketplace/ecc-tools)\n[![License](https://img.shields.io/badge/license-MIT-blue.svg)](LICENSE)\n![Shell](https://img.shields.io/badge/-Shell-4EAA25?logo=gnu-bash&logoColor=white)\n![TypeScript](https://img.shields.io/badge/-TypeScript-3178C6?logo=typescript&logoColor=white)\n![Python](https://img.shields.io/badge/-Python-3776AB?logo=python&logoColor=white)\n![Go](https://img.shields.io/badge/-Go-00ADD8?logo=go&logoColor=white)\n![Java](https://img.shields.io/badge/-Java-ED8B00?logo=openjdk&logoColor=white)\n![Perl](https://img.shields.io/badge/-Perl-39457E?logo=perl&logoColor=white)\n![Markdown](https://img.shields.io/badge/-Markdown-000000?logo=markdown&logoColor=white)\n\n> **182K+ stars** | **28K+ forks** | **170+ contributors** | **12+ language ecosystems** | **Cross-harness agent workflows**\n\n---\n\n<div align=\"center\">\n\n**Language / 语言 / 語言 / Dil / Язык / Ngôn ngữ**\n\n[**English**](README.md) | [Português (Brasil)](docs/pt-BR/README.md) | [简体中文](README.zh-CN.md) | [繁體中文](docs/zh-TW/README.md) | [日本語](docs/ja-JP/README.md) | [한국어](docs/ko-KR/README.md)\n | [Türkçe](docs/tr/README.md) | [Русский](docs/ru/README.md) | [Tiếng Việt](docs/vi-VN/README.md) | [ไทย](docs/th/README.md) | [Deutsch](docs/de-DE/README.md)\n\n</div>\n\n---\n\n**The harness-native operator system for agentic work. Built from real-world multi-harness engineering workflows.**\n\nNot just configs. A complete system: skills, instincts, memory optimization, continuous learning, security scanning, and research-first development. Production-ready agents, skills, hooks, rules, MCP configurations, and legacy command shims evolved over 10+ months of intensive daily use building real products.\n\nWorks across **Codex**, **Claude Code**, **Cursor**, **OpenCode**, **Gemini**, **Zed**, **GitHub Copilot**, and other AI agent harnesses.\n\nECC v2.0.0-rc.1 adds the public Hermes operator story on top of that reusable layer: start with the [Hermes setup guide](docs/HERMES-SETUP.md), then review the [rc.1 release notes](docs/releases/2.0.0-rc.1/release-notes.md) and [cross-harness architecture](docs/architecture/cross-harness.md).\n\n---\n\n<table>\n<tr>\n<td width=\"25%\" align=\"center\">\n  <a href=\"https://ecc.tools/pricing\">\n    <strong> ECC Pro</strong><br />\n    <sub>Private repos · GitHub App · $19/seat/mo</sub>\n  </a>\n</td>\n<td width=\"25%\" align=\"center\">\n  <a href=\"https://github.com/sponsors/affaan-m\">\n    <strong> Sponsor</strong><br />\n    <sub>Fund the OSS · From $5/mo</sub>\n  </a>\n</td>\n<td width=\"25%\" align=\"center\">\n  <a href=\"https://github.com/affaan-m/ECC/discussions\">\n    <strong>Community</strong>\n    <br />\n    <sub>Discussions · Q&amp;A · Show & Tell</sub>\n  </a>\n</td>\n<td width=\"25%\" align=\"center\">\n  <a href=\"https://github.com/apps/ecc-tools\">\n    <strong> GitHub App</strong><br />\n    <sub>Install · PR audits · Free tier</sub>\n  </a>\n</td>\n</tr>\n</table>\n\n<sub>**OSS stays free.** This repo is MIT-licensed forever. ECC Pro is the hosted GitHub App for private repos. <a href=\"https://github.com/sponsors/affaan-m\">Sponsors</a> and <a href=\"https://ecc.tools/pricing\">Pro subscribers</a> fund the work — that's why a single maintainer ships weekly across 7 harnesses.</sub>\n\n---\n\n## The Guides\n\nThis repo is the raw code only. The guides explain everything.\n\n<table>\n<tr>\n<td width=\"33%\">\n<a href=\"https://x.com/affaanmustafa/status/2012378465664745795\">\n<img src=\"./assets/images/guides/shorthand-guide.png\" alt=\"The Shorthand Guide to ECC\" />\n</a>\n</td>\n<td width=\"33%\">\n<a href=\"https://x.com/affaanmustafa/status/2014040193557471352\">\n<img src=\"./assets/images/guides/longform-guide.png\" alt=\"The Longform Guide to ECC\" />\n</a>\n</td>\n<td width=\"33%\">\n<a href=\"https://x.com/affaanmustafa/status/2033263813387223421\">\n<img src=\"./assets/images/security/security-guide-header.png\" alt=\"The Shorthand Guide to Everything Agentic Security\" />\n</a>\n</td>\n</tr>\n<tr>\n<td align=\"center\"><b>Shorthand Guide</b><br/>Setup, foundations, philosophy. <b>Read this first.</b></td>\n<td align=\"center\"><b>Longform Guide</b><br/>Token optimization, memory persistence, evals, parallelization.</td>\n<td align=\"center\"><b>Security Guide</b><br/>Attack vectors, sandboxing, sanitization, CVEs, AgentShield.</td>\n</tr>\n</table>\n\n| Topic | What You'll Learn |\n|-------|-------------------|\n| Token Optimization | Model selection, system prompt slimming, background processes |\n| Memory Persistence | Hooks that save/load context across sessions automatically |\n| Continuous Learning | Auto-extract patterns from sessions into reusable skills |\n| Verification Loops | Checkpoint vs continuous evals, grader types, pass@k metrics |\n| Parallelization | Git worktrees, cascade method, when to scale instances |\n| Subagent Orchestration | The context problem, iterative retrieval pattern |\n\n---\n\n## What's New\n\n### v2.0.0-rc.1 — Surface Refresh, Operator Workflows, and ECC 2.0 Alpha (Apr 2026)\n\n- **Dashboard GUI** — New Tkinter-based desktop application (`ecc_dashboard.py` or `npm run dashboard`) with dark/light theme toggle, font customization, and project logo in header and taskbar.\n- **Public surface synced to the live repo** — metadata, catalog counts, plugin manifests, and install-facing docs now match the actual OSS surface: 63 agents, 249 skills, and 79 legacy command shims.\n- **Operator and outbound workflow expansion** — `brand-voice`, `social-graph-ranker`, `connections-optimizer`, `customer-billing-ops`, `ecc-tools-cost-audit`, `google-workspace-ops`, `project-flow-ops`, and `workspace-surface-audit` round out the operator lane.\n- **Media and launch tooling** — `manim-video`, `remotion-video-creation`, and upgraded social publishing surfaces make technical explainers and launch content part of the same system.\n- **Framework and product surface growth** — `nestjs-patterns`, richer Codex/OpenCode install surfaces, and expanded cross-harness packaging keep the repo usable beyond Claude Code alone.\n- **Itô prediction-market skill pack** — `ito-market-intelligence`, `ito-basket-compare`, `ito-trade-planner`, `ito-data-atlas-agent`, `prediction-market-oracle-research`, and `prediction-market-risk-review` add public, non-advisory market/basket workflows while keeping live Itô API access gated and separate from ECC Tools billing.\n- **Optimization skill pack** — `parallel-execution-optimizer`, `benchmark-optimization-loop`, `data-throughput-accelerator`, `latency-critical-systems`, and `recursive-decision-ledger` turn repeated speed/recursion prompts into bounded benchmark, throughput, and decision-ledger workflows.\n- **ECC 2.0 alpha is in-tree** — the Rust control-plane prototype in `ecc2/` now builds locally and exposes `dashboard`, `start`, `sessions`, `status`, `stop`, `resume`, and `daemon` commands. It is usable as an alpha, not yet a general release.\n- **Operator status snapshots** — `ecc status --markdown --write status.md` turns the local state store into a portable handoff covering readiness, active sessions, skill-run health, install health, pending governance events, and linked work items from Linear/GitHub/handoffs. Use `ecc work-items upsert ...` for manual entries, `ecc work-items sync-github --repo owner/repo` for PR/issue queue state, and `ecc status --exit-code` to fail automation when readiness needs attention.\n- **Ecosystem hardening** — AgentShield, ECC Tools cost controls, billing portal work, and website refreshes continue to ship around the core plugin instead of drifting into separate silos.\n\n### v1.9.0 — Selective Install & Language Expansion (Mar 2026)\n\n- **Selective install architecture** — Manifest-driven install pipeline with `install-plan.js` and `install-apply.js` for targeted component installation. State store tracks what's installed and enables incremental updates.\n- **6 new agents** — `typescript-reviewer`, `pytorch-build-resolver`, `java-build-resolver`, `java-reviewer`, `kotlin-reviewer`, `kotlin-build-resolver` expand language coverage to 10 languages.\n- **New skills** — `pytorch-patterns` for deep learning workflows, `documentation-lookup` for API reference research, `bun-runtime` and `nextjs-turbopack` for modern JS toolchains, plus 8 operational domain skills and `mcp-server-patterns`.\n- **Session & state infrastructure** — SQLite state store with query CLI, session adapters for structured recording, skill evolution foundation for self-improving skills.\n- **Orchestration overhaul** — Harness audit scoring made deterministic, orchestration status and launcher compatibility hardened, observer loop prevention with 5-layer guard.\n- **Observer reliability** — Memory explosion fix with throttling and tail sampling, sandbox access fix, lazy-start logic, and re-entrancy guard.\n- **12 language ecosystems** — New rules for Java, PHP, Perl, Kotlin/Android/KMP, C++, and Rust join existing TypeScript, Python, Go, and common rules.\n- **Community contributions** — Korean and Chinese translations, biome hook optimization, video processing skills, operational skills, PowerShell installer, Antigravity IDE support.\n- **CI hardening** — 19 test failure fixes, catalog count enforcement, install manifest validation, and full test suite green.\n\n### v1.8.0 — Harness Performance System (Mar 2026)\n\n- **Harness-first release** — ECC is now explicitly framed as an agent harness performance system, not just a config pack.\n- **Hook reliability overhaul** — SessionStart root fallback, Stop-phase session summaries, and script-based hooks replacing fragile inline one-liners.\n- **Hook runtime controls** — `ECC_HOOK_PROFILE=minimal|standard|strict` and `ECC_DISABLED_HOOKS=...` for runtime gating without editing hook files.\n- **New harness commands** — `/harness-audit`, `/loop-start`, `/loop-status`, `/quality-gate`, `/model-route`.\n- **NanoClaw v2** — model routing, skill hot-load, session branch/search/export/compact/metrics.\n- **Cross-harness parity** — behavior tightened across Claude Code, Cursor, OpenCode, and Codex app/CLI.\n- **997 internal tests passing** — full suite green after hook/runtime refactor and compatibility updates.\n\n### v1.7.0 — Cross-Platform Expansion & Presentation Builder (Feb 2026)\n\n- **Codex app + CLI support** — Direct `AGENTS.md`-based Codex support, installer targeting, and Codex docs\n- **`frontend-slides` skill** — Zero-dependency HTML presentation builder with PPTX conversion guidance and strict viewport-fit rules\n- **5 new generic business/content skills** — `article-writing`, `content-engine`, `market-research`, `investor-materials`, `investor-outreach`\n- **Broader tool coverage** — Cursor, Codex, and OpenCode support tightened so the same repo ships cleanly across all major harnesses\n- **992 internal tests** — Expanded validation and regression coverage across plugin, hooks, skills, and packaging\n\n### v1.6.0 — Codex CLI, AgentShield & Marketplace (Feb 2026)\n\n- **Codex CLI support** — New `/codex-setup` command generates `codex.md` for OpenAI Codex CLI compatibility\n- **7 new skills** — `search-first`, `swift-actor-persistence`, `swift-protocol-di-testing`, `regex-vs-llm-structured-text`, `content-hash-cache-pattern`, `cost-aware-llm-pipeline`, `skill-stocktake`\n- **AgentShield integration** — `/security-scan` skill runs AgentShield directly from Claude Code; 1282 tests, 102 rules\n- **GitHub Marketplace** — ECC Tools GitHub App live at [github.com/marketplace/ecc-tools](https://github.com/marketplace/ecc-tools) with free/pro/enterprise tiers\n- **30+ community PRs merged** — Contributions from 30 contributors across 6 languages\n- **978 internal tests** — Expanded validation suite across agents, skills, commands, hooks, and rules\n\n### v1.4.1 — Bug Fix (Feb 2026)\n\n- **Fixed instinct import content loss** — `parse_instinct_file()` was silently dropping all content after frontmatter (Action, Evidence, Examples sections) during `/instinct-import`. ([#148](https://github.com/affaan-m/ECC/issues/148), [#161](https://github.com/affaan-m/ECC/pull/161))\n\n### v1.4.0 — Multi-Language Rules, Installation Wizard & PM2 (Feb 2026)\n\n- **Interactive installation wizard** — New `configure-ecc` skill provides guided setup with merge/overwrite detection\n- **PM2 & multi-agent orchestration** — 6 new commands (`/pm2`, `/multi-plan`, `/multi-execute`, `/multi-backend`, `/multi-frontend`, `/multi-workflow`) for managing complex multi-service workflows\n- **Multi-language rules architecture** — Rules restructured from flat files into `common/` + `typescript/` + `python/` + `golang/` directories. Install only the languages you need\n- **Chinese (zh-CN) translations** — Complete translation of all agents, commands, skills, and rules (80+ files)\n- **GitHub Sponsors support** — Sponsor the project via GitHub Sponsors\n- **Enhanced CONTRIBUTING.md** — Detailed PR templates for each contribution type\n\n### v1.3.0 — OpenCode Plugin Support (Feb 2026)\n\n- **Full OpenCode integration** — 12 agents, 24 commands, 16 skills with hook support via OpenCode's plugin system (20+ event types)\n- **3 native custom tools** — run-tests, check-coverage, security-audit\n- **LLM documentation** — `llms.txt` for comprehensive OpenCode docs\n\n### v1.2.0 — Unified Commands & Skills (Feb 2026)\n\n- **Python/Django support** — Django patterns, security, TDD, and verification skills\n- **Java Spring Boot skills** — Patterns, security, TDD, and verification for Spring Boot\n- **Session management** — `/sessions` command for session history\n- **Continuous learning v2** — Instinct-based learning with confidence scoring, import/export, evolution\n\nSee the full changelog in [Releases](https://github.com/affaan-m/ECC/releases).\n\n---\n\n## Quick Start\n\nGet u
