new agents (risk_of_bias, meta_analysis, monitoring); PRISMA protocol/report templates; Socratic convergence criteria (4 signals + auto-end); Quick Mode Selection Guide\n- **academic-paper v2.4**: 2 new agents (visualization, revision_coach); revision tracking template with 4 status types; citation format conversion (APA↔Chicago↔MLA↔IEEE↔Vancouver); statistical visualization standards; Socratic convergence criteria; revision recovery example; **LaTeX output hardening** — mandatory `apa7` document class, text justification fix (`ragged2e` + `etoolbox`), table column width formula, bilingual abstract centering, standardized font stack (Times New Roman + Source Han Serif TC VF + Courier New), PDF via tectonic only\n- **academic-paper-reviewer v1.4**: Quality rubrics with 0-100 scoring and behavioral indicators; decision mapping (≥80 Accept, 65-79 Minor, 50-64 Major, <50 Reject); Quick Mode Selection Guide\n- **academic-pipeline v2.6**: Adaptive checkpoint system (FULL/SLIM/MANDATORY); Phase E Claim Verification in integrity checks; Material Passport for mid-entry provenance; cross-skill mode advisor (14 scenarios); team collaboration protocol; enhanced handoff schemas (9 schemas); integrity failure recovery example\n\n### v2.4 / v1.3 (2026-03-08)\n- **academic-pipeline v2.4**: New Stage 6 PROCESS SUMMARY — auto-generates structured paper creation process record (MD → LaTeX → PDF, bilingual); mandatory final chapter: **Collaboration Quality Evaluation** with 6 dimensions scored 1–100 (Direction Setting, Intellectual Contribution, Quality Gatekeeping, Iteration Discipline, Delegation Efficiency, Meta-Learning), honest feedback, and improvement recommendations; pipeline expanded from 9 to 10 stages\n\n### v2.3 / v1.3 (2026-03-08)\n- **academic-pipeline v2.3**: Stage 5 FINALIZE now prompts for formatting style (APA 7.0 / Chicago / IEEE); PDF must compile from LaTeX via `tectonic` (no HTML-to-PDF); APA 7.0 uses `apa7` document class (`man` mode) with XeCJK for bilingual CJK cademic-paper-reviewer v1.0 (6 agents, 4 modes including guided)\n- academic-pipeline v1.0 (orchestrator)\n","summary":"Imbad0202/academic-research-skills is a comprehensive set of “Claude Code” skills designed to support the full academic research workflow, from planning and outlining through reference gathering, citation formatting, data checking, and logic/argument consistency checks. It emphasizes human-in-the-loop integrity rather than fully autonomous publishing, using stage-based “integrity gates” and optional calibration/audit modes to reduce common AI failure modes like hallucinated citations or unsupported claims. It also includes quality-focused writing assistance such as style calibration to your voice and checks that flag patterns associated with machine-like prose. This project is well-suited for researchers, students, and academic writers who want AI acceleration while maintaining rigor and traceability for sources and claims.","description":"Academic Research Skills for Claude Code: research → write → review → revise → finalize","stars":27186,"language":"Python"},{"owner":"decolua","repo":"9router","url":"https://github.com/decolua/9router","readme":"<div align=\"center\">\n  <img src=\"./images/9router.png?1\" alt=\"9Router Dashboard\" width=\"800\"/>\n  \n  # 9Router - FREE AI Router & Token Saver\n  \n  **Never stop coding. Save 20-40% tokens with RTK + auto-fallback to FREE & cheap AI models.**\n  \n  **Connect All AI Code Tools (Claude Code, Cursor, Antigravity, Copilot, Codex, Gemini, OpenCode, Cline, OpenClaw...) to 40+ AI Providers & 100+ Models.**\n  \n  [![npm](https://img.shields.io/npm/v/9router.svg)](https://www.npmjs.com/package/9router)\n  [![Downloads](https://img.shields.io/npm/dm/9router.svg)](https://www.npmjs.com/package/9router)\n  [![Docker Pulls](https://img.shields.io/docker/pulls/decolua/9router.svg?logo=docker&label=Docker%20pulls)](https://hub.docker.com/r/decolua/9router)\n  [![GHCR](https://img.shields.io/badge/GHCR-decolua%2F9router-blue?logo=github)](https://github.com/decolua/9router/pkgs/container/9router)\n  [![License](https://img.shields.io/npm/l/9router.svg)](https://github.com/decolua/9router/blob/main/LICENSE)\n\n  <a href=\"https://trendshift.io/repositories/22628\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/22628\" alt=\"decolua%2F9router | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/></a>\n  \n  [🚀 Quick Start](#-quick-start) • [💡 Features](#-key-features) • [📖 Setup](#-setup-guide) • [🌐 Website](https://9router.com)\n\n  [🇻🇳 Tiếng Việt](./i18n/README.vi.md) • [🇨🇳 中文](./i18n/README.zh-CN.md) • [🇯🇵 日本語](./i18n/README.ja-JP.md)\n</div>\n\n---\n\n## 🤔 Why 9Router?\n\n**Stop wasting money, tokens and hitting limits:**\n\n- ❌ Subscription quota expires unused every month\n- ❌ Rate limits stop you mid-coding\n- ❌ Tool outputs (git diff, grep, ls...) burn tokens fast\n- ❌ Expensive APIs ($20-50/month per provider)\n- ❌ Manual switching between providers\n\n**9Router solves this:**\n\n- ✅ **RTK Token Saver** - Auto-compress tool_result content, save 20-40% tokens per request\n- ✅ **Maximize subscriptions** - Track quota, use every bit before reset\n- ✅ **Auto fallback** - Subscription → Cheap → Free, zero downtime\n- ✅ **Multi-account** - Round-robin between accounts per provider\n- ✅ **Universal** - Works with Claude Code, Codex, Cursor, Cline, any CLI tool\n\n---\n\n## 🔄 How It Works\n\n```\n┌─────────────┐\n│  Your CLI   │  (Claude Code, Codex, OpenClaw, Cursor, Cline...)\n│   Tool      │\n└──────┬──────┘\n       │ http://localhost:20128/v1\n       ↓\n┌─────────────────────────────────────────────┐\n│           9Router (Smart Router)            │\n│  • RTK Token Saver (cut tool_result tokens) │\n│  • Format translation (OpenAI ↔ Claude)     │\n│  • Quota tracking                           │\n│  • Auto token refresh                       │\n└──────┬──────────────────────────────────────┘\n       │\n       ├─→ [Tier 1: SUBSCRIPTION] Claude Code, Codex, GitHub Copilot\n       │   ↓ quota exhausted\n       ├─→ [Tier 2: CHEAP] GLM ($0.6/1M), MiniMax ($0.2/1M)\n       │   ↓ budget limit\n       └─→ [Tier 3: FREE] Kiro, OpenCode Free, Vertex ($300 credits)\n\nResult: Never stop coding, minimal cost + 20-40% token savings via RTK\n```\n\n---\n\n## ⚡ Quick Start\n\n**1. Install globally:**\n\n```bash\nnpm install -g 9router\n9router\n```\n\n🎉 Dashboard opens at `http://localhost:20128`\n\n**2. Connect a FREE provider (no signup needed):**\n\nDashboard → Providers → Connect **Kiro AI** (free Claude unlimited) or **OpenCode Free** (no auth) → Done!\n\n**3. Use in your CLI tool:**\n\n```\nClaude Code/Codex/OpenClaw/Cursor/Cline Settings:\n  Endpoint: http://localhost:20128/v1\n  API Key: [copy from dashboard]\n  Model: kr/claude-sonnet-4.5\n```\n\n**That's it!** Start coding with FREE AI models.\n\n**Alternative: run from source (this repository):**\n\nThis repository package is private (`9router-app`), so source/Docker execution is the expected local development path.\n\n```bash\ncp .env.example .env\nnpm install\nPORT=20128 NEXT_PUBLIC_BASE_URL=http://localhost:20128 npm run dev\n```\n\nProduction mode:\n\n```bash\nnpm run build\nPORT=20128 HOSTNAME=0.0.0.0 NEXT_PUBLIC_BASE_URL=http://localhost:20128 npm run start\n```\n\nDefault URLs:\n- Dashboard: `http://localhost:20128/dashboard`\n- OpenAI-compatible API: `http://localhost:20128/v1`\n\n---\n\n## Video Guides\n\n<div align=\"center\">\n\n<table>\n  <tr>\n    <td align=\"center\" width=\"320\">\n      <a href=\"https://www.youtube.com/watch?v=raEyZPg5xE0\">\n        <img src=\"https://img.youtube.com/vi/raEyZPg5xE0/maxresdefault.jpg\" alt=\"9Router Setup Tutorial\" width=\"300\"/>\n      </a><br/>\n      <b>🇺🇸 English</b><br/>\n      <sub>9Router + Claude Code FREE Setup<br/>by <a href=\"https://www.youtube.com/@BuildAIWithHamid\">Build AI With Hamid</a></sub>\n    </td>\n    <td align=\"center\" width=\"320\">\n      <a href=\"  src=\"./public/providers/groq.png\" width=\"50\" alt=\"Groq\"/><br/>\n        <sub>Groq</sub>\n      </td>\n      <td align=\"center\" width=\"100\">\n        <img src=\"./public/providers/xai.png\" width=\"50\" alt=\"xAI\"/><br/>\n        <sub>xAI</sub>\n      </td>\n      <td align=\"center\" width=\"100\">\n        <img src=\"./public/providers/mistral.png\" width=\"50\" alt=\"Mistral\"/><br/>\n        <sub>Mistral</sub>\n      </td>\n      <td align=\"center\" width=\"100\">\n        <img src=\"./public/providers/perplexity.png\" width=\"50\" alt=\"Perplexity\"/><br/>\n        <sub>Perplexity</sub>\n      </td>\n    </tr>\n    <tr>\n      <td align=\"center\" width=\"100\">\n        <img src=\"./public/providers/together.png\" width=\"50\" alt=\"Together\"/><br/>\n        <sub>Together AI</sub>\n      </td>\n      <td align=\"center\" width=\"100\">\n        <img src=\"./public/providers/fireworks.png\" width=\"50\" alt=\"Fireworks\"/><br/>\n        <sub>Fireworks</sub>\n      </td>\n      <td align=\"center\" width=\"100\">\n        <img src=\"./public/providers/cerebras.png\" width=\"50\" alt=\"Cerebras\"/><br/>\n        <sub>Cerebras</sub>\n      </td>\n      <td align=\"center\" width=\"100\">\n        <img src=\"./public/providers/cohere.png\" width=\"50\" alt=\"Cohere\"/><br/>\n        <sub>Cohere</sub>\n      </td>\n      <td align=\"center\" width=\"100\">\n        <img src=\"./public/providers/nvidia.png\" width=\"50\" alt=\"NVIDIA\"/><br/>\n        <sub>NVIDIA</sub>\n      </td>\n      <td align=\"center\" width=\"100\">\n        <img src=\"./public/providers/siliconflow.png\" width=\"50\" alt=\"SiliconFlow\"/><br/>\n        <sub>SiliconFlow</sub>\n      </td>\n    </tr>\n  </table>\n  <p><i>...and 20+ more providers including Nebius, Chutes, Hyperbolic, and custom OpenAI/Anthropic compatible endpoints</i></p>\n</div>\n\n---\n\n## 💡 Key Features\n\n| Feature | What It Does | Why It Matters |\n|---------|--------------|----------------|\n| 🚀 **RTK Token Saver** ([RTK](https://github.com/rtk-ai/rtk) ⭐40K) | Compress tool outputs (`git diff`, `grep`, `ls`, `tree`...) before sending to LLM | Save **20-40% input tokens** per request |\n| 🪨 **Caveman Mode** ([Caveman](https://github.com/JuliusBrussee/caveman) ⭐52K) | Inject caveman-speak prompt → LLM replies terse, technical substance preserved | Save **up to 65% output tokens** |\n| 🎯 **Smart 3-Tier Fallback** | Auto-route: Subscription → Cheap → Free | Never stop coding, zero downtime |\n| 📊 **Real-Time Quota Tracking** | Live token count + reset countdown | Maximize subscription value |\n| 🔄 **Format Translation** | OpenAI ↔ Claude ↔ Gemini ↔ Cursor ↔ Kiro ↔ Vertex | Works with any CLI tool |\n| 👥 **Multi-Account Support** | Multiple accounts per provider | Load balancing + redundancy |\n| 🔄 **Auto Token Refresh** | OAuth tokens refresh automatically | No manual re-login needed |\n| 🎨 **Custom Combos** | Create unlimited model combinations | Tailor fallback to your needs |\n| 📝 **Request Logging** | Debug mode with full request/response logs | Troubleshoot issues easily |\n| 💾 **Cloud Sync** | Sync config across devices | Same setup everywhere |\n| 📊 **Usage Analytics** | Track tokens, cost, trends over time | Optimize spending |\n| 🌐 **Deploy Anywhere** | Localhost, VPS, Docker, Cloudflare Workers | Flexible deployment options |\n\n<details>\n<summary><b>📖 Feature Details</b></summary>\n\n### 🚀 RTK Token Saver\n\nTool outputs (`git diff`, `grep`, `find`, `ls`, `tree`, log dumps...) often eat 30-50% of your prompt budget. RTK detects them and applies smart, lossless compression **before** the request hits the LLM:\n\n- **Filters:** `git-diff`, `git-status`, `grep`, `find`, `ls`, `tree`, `dedup-log`, `smart-truncate`, `read-numbered`, `search-list`\n- **Auto-detect:** No config needed — RTK peeks the first 1KB of each `tool_result` and picks the right filter.\n- **Safe by design:** If a filter fails, throws, or makes output bigger, RTK silently keeps the original text. Errors never break your request.\n- **Universal:** Works across all formats (OpenAI, Claude, Gemini, Cursor, Kiro, OpenAI Responses) because it runs **before** any format translation.\n- **Default ON:** Toggle anytime in Dashboard → Endpoint settings.\n\n```\nWithout RTK: 47K tokens sent to LLM\nWith RTK:    28K tokens sent to LLM   (40% saved · same context · same answer)\n```\n\n### 🎯 Smart 3-Tier Fallback\n\nCreate combos with automatic fallback:\n\n```\nCombo: \"my-coding-stack\"\n  1. cc/claude-opus-4-6        (your subscription)\n  2. glm/glm-4.7               (cheap backup, $0.6/1M)\n  3. if/kimi-k2-thinking       (free fallback)\n\n→ Auto switches when quota runs out or errors occur\n```\n\n### 📊 Real-Time Quota Tracking\n\n- Token consumption per provider\n- Reset countdown (5-hour, daily, weekly)\n- Cost estimation for paid tiers\n- Monthly spending reports\n\n### 🔄 Format Translation\n\nSeamless translation between formats:\n- **OpenAI** ↔ **Claude** ↔ **Gemini** ↔ **Cursor** ↔ **Kiro** ↔ **Vertex** ↔ **Antigravity** ↔ **Ollama** ↔ **OpenAI Responses**\n- Your CLI tool sends OpenAI format → 9Router translates → Provider receives native format\n- Works with any tool that supports custom OpenAI endpoints\n\n### 👥 Multi-Account Support\n\n- Add multiple accounts per provider\n- Auto round-robin or priority-based routing\n- Fallback to next account when one hits quota\n\n### 🔄 Auto Token Refresh\n\n- OAuth tokens automatically refresh before expiration\n- No manual re-authentication needed\n- Seamless experience across all providers\n\n### 🎨 Custom Combos\n\n- Create unlimited model combinations\n- Mix subscription, cheap, and free tiers\n- Name your combos for easy access\n- Share combos across devices with Cloud Sync\n\n### 📝 Request Logging\n\n- Enable debug mode for full request/response logs\n- Track API calls, headers, and payloads\n- Troubleshoot integration issues\n- Export logs for analysis\n\n### 💾 Cloud Sync\n\n- Sync providers, combos, and settings across devices\n- Automatic background sync\n- Secure encrypted storage\n- Access your setup from anywhere\n\n#### Cloud Runtime Notes\n\n- Prefer server-side cloud variables in production:\n  - `BASE_URL` (internal callback URL used by sync scheduler)\n  - `CLOUD_URL` (cloud sync endpoint base)\n- `NEXT_PUBLIC_BASE_URL` and `NEXT_PUBLIC_CLOUD_URL` are still supported for compatibility/UI, but server runtime now prioritizes `BASE_URL`/`CLOUD_URL`.\n- Cloud sync requests now use timeout + fail-fast behavior to avoid UI hanging when cloud DNS/network is unavailable.\n\n### 📊 Usage Analytics\n\n- Track token usage per provider and model\n- Cost estimation and spending trends\n- Monthly reports and insights\n- Optimize your AI spending\n\n> **💡 IMPORTANT - Understanding Dashboard Costs:**\n> \n> The \"cost\" displayed in Usage Analytics is **for tracking and comparison purposes only**. \n> 9Router itself **never charges** you anything. You only pay providers directly (if using paid services).\n> \n> **Example:** If your dashboard shows \"$290 total cost\" while using iFlow models, this represents \n> what you would have paid using paid APIs directly. Your actual cost = **$0** (iFlow is free unlimited).\n> \n> Think of it as a \"savings tracker\" showing how much you're saving by using free models or \n> routing through 9Router!\n\n### 🌐 Deploy Anywhere\n\n- 💻 **Localhost** - Default, works offline\n- ☁️ **VPS/Cloud** - Share across devices\n- 🐳 **Docker** - One-command deployment\n- 🚀 **Cloudflare Workers** - Global edge network\n\n</details>\n\n---\n\n## 💰 Pricing at a Glance\n\n| Tier | Provider | Cost | Quota Reset | Best For |\n|------|----------|------|-------------|----------|\n| **🚀 TOKEN SAVER** | **RTK (built-in)** | **FREE** | Always on | **Save 20-40% tokens on EVERY request** |\n| **💳 SUBSCRIPTION** | Claude Code (Pro/Max) | $20-200/mo | 5h + weekly | Already subscribed |\n| | Codex (Plus/Pro) | $20-200/mo | 5h + weekly | OpenAI users |\n| | GitHub Copilot | $10-19/mo | Monthly | GitHub users |\n| | Cursor IDE | $20/mo | Monthly | Cursor users |\n| **💰 CHEAP** | GLM-5.1 / GLM-4.7 | $0.6/1M | Daily 10AM | Budget backup |\n| | MiniMax M2.7 | $0.2/1M | 5-hour rolling | Cheapest option |\n| | Kimi K2.5 | $9/mo flat | 10M tokens/mo | Predictable cost |\n| **🆓 FREE** | Kiro AI | $0 | Unlimited | Claude 4.5 + GLM-5 + MiniMax free |\n| | OpenCode Free | $0 | Unlimited | No auth, auto-fetch models |\n| | Vertex AI | $300 credits | New GCP accounts | Gemini 3 Pro + DeepSeek + GLM-5 |\n\n**💡 Pro Tip:** RTK + Kiro AI + OpenCode Free combo = **$0 cost + 20-40% token savings**!\n\n---\n\n### 📊 Understanding 9Router Costs & Billing\n\n**9Router Billing Reality:**\n\n✅ **9Router software = FREE forever** (open source, never charges)  \n✅ **Dashboard \"costs\" = Display/tracking only** (not actual bills)  \n✅ **You pay providers directly** (subscriptions or API fees)  \n✅ **FREE providers stay FREE** (iFlow, Kiro, Qwen = $0 unlimited)  \n❌ **9Router never sends invoices** or charges your card\n\n**How Cost Display Works:**\n\nThe dashboard shows **estimated costs** as if you were using paid APIs directly. This is **not billing** - it's a comparison tool to show your savings.\n\n**Example Scenario:**\n```\nDashboard Display:\n• Total Requests: 1,662\n• Total Tokens: 47M\n• Display Cost: $290\n\nReality Check:\n• Provider: iFlow (FREE unlimited)\n• Actual Payment: $0.00\n• What $290 Means: Amount you SAVED by using free models!\n```\n\n**Payment Rules:**\n- **Subscription providers** (Claude Code, Codex): Pay them directly via their websites\n- **Cheap providers** (GLM, MiniMax): Pay them directly, 9Router just routes\n- **FREE providers** (iFlow, Kiro, Qwen): Genuinely free forever, no hidden charges\n- **9Router**: Never charges anything, ever\n\n---\n\n## 🎯 Use Cases\n\n### Case 1: \"I have Claude Pro subscription\"\n\n**Problem:** Quota expires unused, rate limits during heavy coding\n\n**Solution:**\n```\nCombo: \"maximize-claude\"\n  1. cc/claude-opus-4-7        (use subscription fully)\n  2. glm/glm-5.1               (cheap backup when quota out)\n  3. kr/claude-sonnet-4.5      (free emergency fallback)\n\nMonthly cost: $20 (subscription) + ~$5 (backup) = $25 total\nvs. $20 + hitting limits = frustration\n```\n\n### Case 2: \"I want zero cost\"\n\n**Problem:** Can't afford subscriptions, need reliable AI coding\n\n**Solution:**\n```\nCombo: \"free-forever\"\n  1. kr/claude-sonnet-4.5      (Claude 4.5 free unlimited)\n  2. kr/glm-5                  (GLM-5 free via Kiro)\n  3. oc/<auto>                 (OpenCode Free, no auth)\n\nMonthly cost: $0\nQuality: Production-ready models + RTK saves 20-40% tokens\n```\n\n### Case 3: \"I need 24/7 coding, no interruptions\"\n\n**Problem:** Deadlines, can't afford downtime\n\n**Solution:**\n```\nCombo: \"always-on\"\n  1. cc/claude-opus-4-7        (best quality)\n  2. cx/gpt-5.5                (second subscription)\n  3. glm/glm-5.1               (cheap, resets daily)\n  4. minimax/MiniMax-M2.7      (cheapest, 5h reset)\n  5. kr/claude-sonnet-4.5      (free unlimited)\n\nResult: 5 layers of fallback = zero downtime\nMonthly cost: $20-200 (subscriptions) + $10-20 (backup)\n```\n\n### Case 4: \"I want FREE AI in OpenClaw\"\n\n**Problem:** Need AI assistant in messaging apps (WhatsApp, Telegram, Slack...), completely free\n\n**Solution:**\n```\nCombo: \"openclaw-free\"\n  1. kr/claude-sonnet-4.5      (Claude 4.5 free)\n  2. kr/glm-5                  (GLM-5 free)\n  3. kr/MiniMax-M2.5           (MiniMax free)\n\nMonthly cost: $0\nAccess via: WhatsApp, Telegram, Slack, Discord, iMessage, Signal...\n```\n\n---\n\n## ❓ Frequently Asked Questions\n\n<details>\n<summary><b>📊 Why does my dashboard show high costs?</b></summary>\n\nThe dashboard tracks your token usage and displays **estimated costs** as if you were using paid APIs directly. This is **not actual billing** - it's a reference to show how much you're saving by using free models or existing subscriptions through 9Router.\n\n**Example:**\n- **Dashboard shows:** \"$290 total cost\"\n- **Reality:** You're using iFlow (FREE unlimited)\n- **Your actual cost:** **$0.00**\n- **What $290 means:** Amount you **saved** by using free models instead of paid APIs!\n\nThe cost display is a \"savings tracker\" to help you understand your usage patterns and optimization opportunities.\n\n</details>\n\n<details>\n<summary><b>💳 Will I be charged by 9Router?</b></summary>\n\n**No.** 9Router is free, open-source software that runs on your own computer. It never charges you anything.\n\n**You only pay:**\n- ✅ **Subscription providers** (Claude Code $20/mo, Codex $20-200/mo) → Pay them directly on their websites\n- ✅ **Cheap providers** (GLM, MiniMax) → Pay them directly, 9Router just routes your requests\n- ❌ **9Router itself** → **Never charges anything, ever**\n\n9Router is a local proxy/router. It doesn't have your credit card, can't send invoices, and has no billing system. It's completely free software.\n\n</details>\n\n<details>\n<summary><b>🆓 Are FREE providers really unlimited?</b></summary>\n\n**Yes!** The current FREE providers (Kiro, OpenCode Free, Vertex) are genuinely free with **no hidden charges**.\n\nThese are free services offered by those respective companies:\n- **Kiro AI**: Free unlimited Claude 4.5 + GLM-5 + MiniMax via AWS Builder ID / Google / GitHub OAuth\n- **OpenCode Free**: No-auth passthrough proxy, models auto-fetched from `opencode.ai/zen/v1/models`\n- **Vertex AI**: $300 free credits for new Google Cloud accounts (90 days)\n\n9Router just routes your requests to them - there's no \"catch\" or future billing. They're truly free services, and 9Router makes them easy to use with fallback support.\n\n**Discontinued free tiers (no longer recommended):**\n- ❌ **iFlow**: Was free unlimited, now changed to paid (2026)\n- ❌ **Qwen Code**: Free OAuth tier discontinued by Alibaba on 2026-04-15\n- ❌ **Gemini CLI**: Still works, but using it with non-CLI tools (Claude, Codex, Cursor...) may result in account bans — only use if you stick to Gemini CLI itself\n\n</details>\n\n<details>\n<summary><b>💰 How do I minimize my actual AI costs?</b></summary>\n\n**Free-First Strategy:**\n\n1. **Start with 100% free combo:**\n   ```\n   1. gc/gemini-3-flash (180K/month free from Google)\n   2. if/kimi-k2-thinking (unlimited free from iFlow)\n   3. qw/qwen3-coder-plus (unlimited free from Qwen)\n   ```\n   **Cost: $0/month**\n\n2. **Add cheap backup** only if you need it:\n   ```\n   4. glm/glm-4.7 ($0.6/1M tokens)\n   ```\n   **Additional cost: Only pay for what you actually use**\n\n3. **Use subscription providers last:**\n   - Only if you already have them\n   - 9Router helps maximize their value through quota tracking\n\n**Result:** Most users can operate at $0/month using only free tiers!\n\n</details>\n\n<details>\n<summary><b>📈 What if my usage suddenly spikes?</b></summary>\n\n9Router's smart fallback prevents surprise charges:\n\n**Scenario:** You're on a coding sprint and blow through your quotas\n\n**Without 9Router:**\n- ❌ Hit rate limit → Work stops → Frustration\n- ❌ Or: Accidentally rack up huge API bills\n\n**With 9Router:**\n- ✅ Subscription hits limit → Auto-fallback to cheap tier\n- ✅ Cheap tier gets expensive → Auto-fallback to free tier\n- ✅ Never stop coding → Predictable costs\n\n**You're in control:** Set spending limits per provider in dashboard, and 9Router respects them.\n\n</details>\n\n---\n\n## 📖 Setup Guide\n\n<details>\n<summary><b>🔐 Subscription Providers (Maximize Value)</b></summary>\n\n### Claude Code (Pro/Max)\n\n```bash\nDashboard → Providers → Connect Claude Code\n→ OAuth login → Auto token refresh\n→ 5-hour + weekly quota tracking\n\nModels:\n  cc/claude-opus-4-7\n  cc/claude-opus-4-6\n  cc/claude-sonnet-4-6\n  cc/claude-haiku-4-5-20251001\n```\n\n**Pro Tip:** Use Opus for complex tasks, Sonnet for speed. 9Router tracks quota per model!\n\n### OpenAI Codex (Plus/Pro)\n\n```bash\nDashboard → Providers → Connect Codex\n→ OAuth login (port 1455)\n→ 5-hour + weekly reset\n\nModels:\n  cx/gpt-5.5\n  cx/gpt-5.4\n  cx/gpt-5.3-codex\n  cx/gpt-5.2-codex\n```\n\n### GitHub Copilot\n\n```bash\nDashboard → Providers → Connect GitHub\n→ OAuth via GitHub\n→ Monthly reset (1st of month)\n\nModels:\n  gh/gpt-5.4\n  gh/claude-opus-4.7\n  gh/claude-sonnet-4.6\n  gh/gemini-3.1-pro-preview\n  gh/grok-code-fast-1\n```\n\n### Cursor IDE\n\n```bash\nDashboard → Providers → Connect Cursor\n→ OAuth login\n→ Monthly subscription\n\nModels:\n  cu/claude-4.6-opus-max\n  cu/claude-4.5-sonnet-thinking\n  cu/gpt-5.3-codex\n```\n\n</details>\n\n<details>\n<summary><b>💰 Cheap Providers (Backup)</b></summary>\n\n### GLM-5.1 / GLM-4.7 (Daily reset, $0.6/1M)\n\n1. Sign up: [Zhipu AI](https://open.bigmodel.cn/)\n2. Get API key from Coding Plan\n3. Dashboard → Add API Key:\n   - Provider: `glm`\n   - API Key: `your-key`\n\n**Use:** `glm/glm-5.1`, `glm/glm-5`, `glm/glm-4.7`\n\n**Pro Tip:** Coding Plan offers 3× quota at 1/7 cost! Reset daily 10:00 AM.\n\n### MiniMax M2.7 (5h reset, $0.20/1M)\n\n1. Sign up: [MiniMax](https://www.minimax.io/)\n2. Get API key\n3. Dashboard → Add API Key\n\n**Use:** `minimax/MiniMax-M2.7`, `minimax/MiniMax-M2.5`\n\n**Pro Tip:** Cheapest option for long context (1M tokens)!\n\n### Kimi K2.5 ($9/month flat)\n\n1. Subscribe: [Moonshot AI](https://platform.moonshot.ai/)\n2. Get API key\n3. Dashboard → Add API Key\n\n**Use:** `kimi/kimi-k2.5`, `kimi/kimi-k2.5-thinking`\n\n**Pro Tip:** Fixed $9/month for 10M tokens = $0.90/1M effective cost!\n\n</details>\n\n<details>\n<summary><b>🆓 FREE Providers (Recommended)</b></summary>\n\n### Kiro AI (Claude 4.5 + GLM-5 + MiniMax FREE)\n\n```bash\nDashboard → Connect Kiro\n→ AWS Builder ID, AWS IAM Identity Center, Google, or GitHub\n→ Unlimited usage\n\nModels:\n  kr/claude-sonnet-4.5\n  kr/claude-haiku-4.5\n  kr/glm-5\n  kr/MiniMax-M2.5\n  kr/qwen3-coder-next\n  kr/deepseek-3.2\n```\n\n**Pro Tip:** Best free option for Claude. No API key, no payment, fully unlimited.\n\n### OpenCode Free (No auth, auto-fetch models)\n\n```bash\nDashboard → Connect OpenCode Free\n→ No login required (passthrough proxy)\n→ Models auto-fetched from opencode.ai/zen/v1/models\n```\n\n**Pro Tip:** Fastest setup. Just connect and start coding.\n\n### Vertex AI ($300 free credits for new GCP accounts)\n\n```bash\nDashboard → Connect Vertex AI\n→ Upload Google Cloud Service Account JSON\n→ Enable Vertex AI API in your GCP project\n\nModels:\n  vertex/gemini-3.1-pro-preview\n  vertex/gemini-3-flash-preview\n  vertex/gemini-2.5-flash\n\nVertex Partner (Anthropic / DeepSeek / GLM / Qwen via Vertex):\n  vertex-partner/glm-5-maas\n  vertex-partner/deepseek-v3.2-maas\n  vertex-partner/qwen3-next-80b-a3b-thinking-maas\n```\n\n**Pro Tip:** New Google Cloud accounts get $300 credits free for 90 days. Plenty for daily coding.\n\n</details>\n\n<details>\n<summary><b>🎨 Create Combos</b></summary>\n\n### Example 1: Maximize Subscription → Cheap Backup\n\n```\nDashboard → Combos → Create New\n\nName: premium-coding\nModels:\n  1. cc/claude-opus-4-7 (Subscription primary)\n  2. glm/glm-5.1 (Cheap backup, $0.6/1M)\n  3. minimax/MiniMax-M2.7 (Cheapest fallback, $0.20/1M)\n\nUse in CLI: premium-coding\n\nMonthly cost example (100M tokens):\n  80M via Claude (subscription): $0 extra\n  15M via GLM: $9\n  5M via MiniMax: $1\n  Total: $10 + your subscription\n```\n\n### Example 2: Free-Only (Zero Cost)\n\n```\nName: free-combo\nModels:\n  1. kr/claude-sonnet-4.5 (Claude 4.5 free unlimited)\n  2. kr/glm-5 (GLM-5 free via Kiro)\n  3. vertex/gemini-3.1-pro-preview ($300 free credits)\n\nCost: $0 forever (+ 20-40% token savings via RTK)!\n```\n\n</details>\n\n<details>\n<summary><b>🔧 CLI Integration</b></summary>\n\n### Cursor IDE\n\n```\nSettings → Models → Advanced:\n  OpenAI API Base URL: http://localhost:20128/v1\n  OpenAI API Key: [from 9router dashboard]\n  Model: cc/claude-opus-4-7\n```\n\nOr use combo: `premium-coding`\n\n### Claude Code\n\nEdit `~/.claude/config.json`:\n\n```json\n{\n  \"anthropic_api_base\": \"http://localhost:20128/v1\",\n  \"anthropic_api_key\": \"your-9router-api-key\"\n}\n```\n\n### Codex CLI\n\n```bash\nexport OPENAI_BASE_URL=\"http://localhost:20128\"\nexport OPENAI_API_KEY=\"your-9router-api-key\"\n\ncodex \"your prompt\"\n```\n\n### OpenClaw\n\n**Option 1 — Dashboard (recommended):**\n\n```\nDashboard → CLI Tools → OpenClaw → Select Model → Apply\n```\n\n**Option 2 — Manual:** Edit `~/.openclaw/openclaw.json`:\n\n```json\n{\n  \"agents\": {\n    \"defaults\": {\n      \"model\": {\n        \"primary\": \"9router/kr/claude-sonnet-4.5\"\n      }\n    }\n  },\n  \"models\": {\n    \"providers\": {\n      \"9router\": {\n        \"baseUrl\": \"http://127.0.0.1:20128/v1\",\n        \"apiKey\": \"sk_9router\",\n        \"api\": \"openai-completions\",\n        \"models\": [\n          {\n            \"id\": \"kr/claude-sonnet-4.5\",\n            \"name\": \"Claude Sonnet 4.5 (Kiro Free)\"\n          }\n        ]\n      }\n    }\n  }\n}\n```\n\n> **Note:** OpenClaw only works with local 9Router. Use `127.0.0.1` instead of `localhost` to avoid IPv6 resolution issues.\n\n### Cline / Continue / RooCode\n\n```\nProvider: OpenAI Compatible\nBase URL: http://localhost:20128/v1\nAPI Key: [from dashboard]\nModel: cc/claude-opus-4-7\n```\n\n</details>\n\n<details>\n<summary><b>🚀 Deployment</b></summary>\n\n### VPS Deployment\n\n```bash\n# Clone and install\ngit clone https://github.com/decolua/9router.git\ncd 9router\nnpm install\nnpm run build\n\n# Configure\nexport JWT_SECRET=\"your-secure-secret-change-this\"\nexport INITIAL_PASSWORD=\"your-password\"\nexport DATA_DIR=\"/var/lib/9router\"\nexport PORT=\"20128\"\nexport HOSTNAME=\"0.0.0.0\"\nexport NODE_ENV=\"production\"\nexport NEXT_PUBLIC_BASE_URL=\"http://localhost:20128\"\nexport NEXT_PUBLIC_CLOUD_URL=\"https://9router.com\"\nexport API_KEY_SECRET=\"endpoint-proxy-api-key-secret\"\nexport MACHINE_ID_SALT=\"endpoint-proxy-salt\"\n\n# Start\nnpm run start\n\n# Or use PM2\nnpm install -g pm2\npm2 start npm --name 9router -- start\npm2 save\npm2 startup\n```\n\n### Docker\n\nPublished images (multi-platform `linux/amd64` + `linux/arm64`):\n- Docker Hub: [`decolua/9router`](https://hub.docker.com/r/decolua/9router)\n- GHCR: [`ghcr.io/decolua/9router`](https://github.com/decolua/9router/pkgs/container/9router)\n\n**Quick start (use published image):**\n\n```bash\ndocker run -d \\\n  --name 9router \\\n  -p 20128:20128 \\\n  -v \"$HOME/.9router:/app/data\" \\\n  -e DATA_DIR=/app/data \\\n  decolua/9router:latest\n```\n\n→ Open http://localhost:20128\n\n**Build from source (dev):**\n\n```bash\ngit clone https://github.com/decolua/9router.git\ncd 9router/app\ndocker build -t 9router .\ndocker run -d --name 9router -p 20128:20128 \\\n  -v \"$HOME/.9router:/app/data\" -e DATA_DIR=/app/data 9router\n```\n\n**Container defaults:**\n- `PORT=20128`\n- `HOSTNAME=0.0.0.0`\n\n**Useful commands:**\n\n```bash\ndocker logs -f 9router\ndocker restart 9router\ndocker stop 9router && docker rm 9router\ndocker pull decolua/9router:latest   # update to latest\n```\n\n**Data persistence:** `$HOME/.9router/db/data.sqlite` on host ↔ `/app/data/db/data.sqlite` in container.\n\n### Environment Variables\n\n| Variable | Default | Description |\n|----------|---------|-------------|\n| `JWT_SECRET` | Auto-generated (`~/.9router/jwt-secret`) | JWT signing secret for dashboard auth cookie (override to share across instances) |\n| `INITIAL_PASSWORD` | `123456` | First login password when no saved hash exists |\n| `DATA_DIR` | `~/.9router` | Main app data location (SQLite at `$DATA_DIR/db/data.sqlite`) |\n| `PORT` | framework default | Service port (`20128` in examples) |\n| `HOSTNAME` | framework default | Bind host (Docker defaults to `0.0.0.0`) |\n| `NODE_ENV` | runtime default | Set `production` for deploy |\n| `BASE_URL` | `http://localhost:20128` | Server-side internal base URL used by cloud sync jobs |\n| `CLOUD_URL` | `https://9router.com` | Server-side cloud sync endpoint base URL |\n| `NEXT_PUBLIC_BASE_URL` | `http://localhost:3000` | Backward-compatible/public base URL (prefer `BASE_URL` for server runtime) |\n| `NEXT_PUBLIC_CLOUD_URL` | `https://9router.com` | Backward-compatible/public cloud URL (prefer `CLOUD_URL` for server runtime) |\n| `API_KEY_SECRET` | `endpoint-proxy-api-key-secret` | HMAC secret for generated API keys |\n| `MACHINE_ID_SALT` | `endpoint-proxy-salt` | Salt for stable machine ID hashing |\n| `ENABLE_REQUEST_LOGS` | `false` | Enables request/response logs under `logs/` |\n| `AUTH_COOKIE_SECURE` | `false` | Force `Secure` auth cookie (set `true` behind HTTPS reverse proxy) |\n| `REQUIRE_API_KEY` | `false` | Enforce Bearer API key on `/v1/*` routes (recommended for internet-exposed deploys) |\n| `HTTP_PROXY`, `HTTPS_PROXY`, `ALL_PROXY`, `NO_PROXY` | empty | Optional outbound proxy for upstream provider calls |\n\nNotes:\n- Lowercase proxy variables are also supported: `http_proxy`, `https_proxy`, `all_proxy`, `no_proxy`.\n- `.env` is not baked into Docker image (`.dockerignore`); inject runtime config with `--env-file` or `-e`.\n- On Windows, `APPDATA` can be used for local storage path resolution.\n- `INSTANCE_NAME` appears in older docs/env templates, but is currently not used at runtime.\n\n### Runtime Files and Storage\n\n- Main app state: `${DATA_DIR}/db/data.sqlite` (SQLite — providers, combos, aliases, keys, settings, usage history)\n- Auto backups: `${DATA_DIR}/db/backups/`\n- Optional request/translator logs: `<repo>/logs/...` when `ENABLE_REQUEST_LOGS=true`\n- Both `${DATA_DIR}` and `~/.9router` resolve to the same location in a Docker container — the symlink `/root/.9router -> /app/data` is created at build time.\n\n</details>\n\n---\n\n## 📊 Available Models\n\n<details>\n<summary><b>View all available models</b></summary>\n\n**Claude Code (`cc/`)** - Pro/Max:\n- `cc/claude-opus-4-7`\n- `cc/claude-opus-4-6`\n- `cc/claude-sonnet-4-6`\n- `cc/claude-sonnet-4-5-20250929`\n- `cc/claude-haiku-4-5-20251001`\n\n**Codex (`cx/`)** - Plus/Pro:\n- `cx/gpt-5.5`\n- `cx/gpt-5.4`\n- `cx/gpt-5.3-codex`\n- `cx/gpt-5.2-codex`\n- `cx/gpt-5.1-codex-max`\n\n**GitHub Copilot (`gh/`)**:\n- `gh/gpt-5.4`\n- `gh/claude-opus-4.7`\n- `gh/claude-sonnet-4.6`\n- `gh/gemini-3.1-pro-preview`\n- `gh/grok-code-fast-1`\n\n**Cursor (`cu/`)** - Subscription:\n- `cu/claude-4.6-opus-max`\n- `cu/claude-4.5-sonnet-thinking`\n- `cu/gpt-5.3-codex`\n- `cu/kimi-k2.5`\n\n**GLM (`glm/`)** - $0.6/1M:\n- `glm/glm-5.1`\n- `glm/glm-5`\n- `glm/glm-4.7`\n\n**MiniMax (`minimax/`)** - $0.2/1M:\n- `minimax/MiniMax-M2.7`\n- `minimax/MiniMax-M2.5`\n\n**Kimi (`kimi/`)** - $9/mo flat:\n- `kimi/kimi-k2.5`\n- `kimi/kimi-k2.5-thinking`\n\n**Kiro (`kr/`)** - FREE unlimited:\n- `kr/claude-sonnet-4.5`\n- `kr/claude-haiku-4.5`\n- `kr/glm-5`\n- `kr/MiniMax-M2.5`\n- `kr/qwen3-coder-next`\n- `kr/deepseek-3.2`\n\n**OpenCode Free (`oc/`)** - FREE no-auth:\n- Auto-fetched from `opencode.ai/zen/v1/models`\n\n**Vertex AI (`vertex/`)** - $300 free credits:\n- `vertex/gemini-3.1-pro-preview`\n- `vertex/gemini-3-flash-preview`\n- `vertex/gemini-2.5-flash`\n- `vertex-partner/glm-5-maas`\n- `vertex-partner/deepseek-v3.2-maas`\n\n</details>\n\n---\n\n## 🐛 Troubleshooting\n\n**\"Language model did not provide messages\"**\n- Provider quota exhausted → Check dashboard quota tracker\n- Solution: Use combo fallback or switch to cheaper tier\n\n**Rate limiting**\n- Subscription quota out → Fallback to GLM/MiniMax\n- Add combo: `cc/claude-opus-4-7 → glm/glm-5.1 → kr/claude-sonnet-4.5`\n\n**OAuth token expired**\n- Auto-refreshed by 9Router\n- If issues persist: Dashboard → Provider → Reconnect\n\n**High costs**\n- Enable RTK in Dashboard → Endpoint settings (default ON, saves 20-40% tokens)\n- Check usage stats in Dashboard\n- Switch primary model to GLM/MiniMax\n- Use free tier (Kiro, OpenCode Free, Vertex) for non-critical tasks\n\n**Dashboard opens on wrong port**\n- Set `PORT=20128` and `NEXT_PUBLIC_BASE_URL=http://localhost:20128`\n\n**First login not working**\n- Check `INITIAL_PASSWORD` in `.env`\n- If unset, fallback password is `123456`\n\n**No request logs under `logs/`**\n- Set `ENABLE_REQUEST_LOGS=true`\n\n---\n\n## 🛠️ Tech Stack\n\n- **Runtime**: Node.js 20+\n- **Framework**: Next.js 16\n- **UI**: React 19 + Tailwind CSS 4\n- **Database**: SQLite (better-sqlite3 / node:sqlite / sql.js fallback)\n- **Streaming**: Server-Sent Events (SSE)\n- **Auth**: OAuth 2.0 (PKCE) + JWT + API Keys\n\n---\n\n## 📝 API Reference\n\n### Chat Completions\n\n```bash\nPOST http://localhost:20128/v1/chat/completions\nAuthorization: Bearer your-api-key\nContent-Type: application/json\n\n{\n  \"model\": \"cc/claude-opus-4-6\",\n  \"messages\": [\n    {\"role\": \"user\", \"content\": \"Write a function to...\"}\n  ],\n  \"stream\": true\n}\n```\n\n### List Models\n\n```bash\nGET http://localhost:20128/v1/models\nAuthorization: Bearer your-api-key\n\n→ Returns all models + combos in OpenAI format\n```\n\n## 📧 Support\n\n- **Website**: [9router.com](https://9router.com)\n- **GitHub**: [github.com/decolua/9router](https://github.com/decolua/9router)\n- **Issues**: [github.com/decolua/9router/issues](https://github.com/decolua/9router/issues)\n\n---\n\n## 👥 Contributors\n\nThanks to all contributors who helped make 9Router better!\n\n[![Contributors](https://contrib.rocks/image?repo=decolua/9router&max=150&columns=15&anon=1&v=20260309)](https://github.com/decolua/9router/graphs/contributors)\n\n---\n\n## 📊 Star Chart\n\n[![Star Chart](https://starchart.cc/decolua/9router.svg?variant=adaptive)](https://starchart.cc/decolua/9router)\n\n\n\n## 🔀 Forks\n\n**[OmniRoute](https://github.com/diegosouzapw/OmniRoute)** — A full-featured TypeScript fork of 9Router. Adds 36+ providers, 4-tier auto-fallback, multi-modal APIs (images, embeddings, audio, TTS), circuit breaker, semantic cache, LLM evaluations, and a polished dashboard. 368+ unit tests. Available via npm and Docker.\n\n---\n\n## 🙏 Acknowledgments\n\nBuilt on the shoulders of giants:\n\n- **[CLIProxyAPI](https://github.com/router-for-me/CLIProxyAPI)** — original Go implementation that inspired this JavaScript port.\n- **[RTK](https://github.com/rtk-ai/rtk)** ![Stars](https://img.shields.io/github/stars/rtk-ai/rtk?style=flat&color=yellow) — Rust token-saver. 9Router ports its compression pipeline to JS → **−20-40% input tokens** on every request.\n- **[Caveman](https://github.com/JuliusBrussee/caveman)** ![Stars](https://img.shields.io/github/stars/JuliusBrussee/caveman?style=flat&color=yellow) by **[@JuliusBrussee](https://github.com/JuliusBrussee)** — viral *\"why use many token when few token do trick\"*. 9Router adapts its prompt → **−65% output tokens**.\n\nHuge thanks to these authors — without their work, 9Router's token-saving features wouldn't exist. ⭐ them on GitHub!\n\n---\n\n## 📄 License\n\nMIT License - see [LICENSE](LICENSE) for details.\n\n---\n\n<div align=\"center\">\n  <sub>Built with ❤️ for developers who code 24/7</sub>\n</div>\n","summary":"9router is a “smart” AI router and token-saving proxy that lets you connect popular AI coding tools (such as Claude Code, Cursor, Copilot/Codex, Cline, and other CLI-based agents) to many AI providers and models through a single endpoint. It reduces cost by using an RTK token saver that auto-compresses tool outputs, and it helps prevent interruptions by tracking provider quota and automatically failing over from paid subscriptions to cheaper options and then to free tiers. It also supports multi-account and round-robin routing to maximize usage across accounts and providers. Developers and teams using multiple AI coding assistants or expensive model APIs who want lower spend, fewer rate-limit interruptions, and seamless provider switching would benefit most.","description":"Unlimited FREE AI coding. Connect Claude Code, Codex, Cursor, Cline, Copilot, Antigravity to FREE Claude/GPT/Gemini via 40+ providers. Auto-fallback, RTK -40% tokens, never hit limits.","stars":16281,"language":"JavaScript"},{"owner":"webiny","repo":"webiny-js","url":"https://github.com/webiny/webiny-js","readme":"<p align=\"center\">\n  <img src=\"./docs/static/webiny-logo.svg\" width=\"350\">\n</p>\n\n<p align=\"center\">\n  AI-programmable CMS for enterprises hosting on AWS\n</p>\n\n<p align=\"center\">\n    <a href=\"https://github.com/webiny/webiny-js/actions\"><img src=\"https://img.shields.io/github/actions/workflow/status/webiny/webiny-js/push.yml\" alt=\"Build Status\"></a>\n    <a href=\"https://www.npmjs.com/package/@webiny/cli\"><img src=\"https://img.shields.io/npm/dt/@webiny/cli.svg\" alt=\"Total Downloads\"></a>\n    <a href=\"https://github.com/webiny/webiny-js/releases\"><img src=\"https://img.shields.io/github/v/release/webiny/webiny-js\" alt=\"Latest Release\"></a>\n    <a href=\"https://github.com/webiny/webiny-js/blob/master/LICENSE\"><img src=\"https://img.shields.io/badge/license-MIT-green.svg\" alt=\"License\"></a>\n</p>\n\n# About Webiny\n\nOpen-source content platform. Self-hosted on AWS serverless. Built as a TypeScript framework you extend with code, not a closed product you configure through a UI.\n\nRuns on Lambda, DynamoDB, S3, and CloudFront inside your own AWS account. Scales automatically. No servers to manage. Infrastructure provisioned via IaC (Pulumi) in a single `deploy` command.\n\nUsed in production by teams managing hundreds of millions of content records, petabytes of assets, and thousands of editors — including Amazon, Emirates, Fortune 500 companies, government agencies, and SaaS platforms that white-label Webiny inside their own products.\n\n[Documentation](https://www.webiny.com/docs) · [Learn Webiny Course](https://www.webiny.com/learn) · [Community Slack](https://www.webiny.com/slack)\n\n---\n\n## What's Inside\n\n![Webiny Headless CMS](<https://www.webiny.com/_next/image?url=https%3A%2F%2Fd3ifp5fffz13jc.cloudfront.net%2Ffiles%2F6970b24992482400025a77b4%2FCMSModel(3).png%3Foriginal&w=3840&q=75>)\n\n**Headless CMS** — Custom content models, GraphQL API, field-level permissions, localization, versioning. Models can be defined through the admin UI or in code via the framework.\n\n![Webiny Website Builder](https://www.webiny.com/_next/image?url=https%3A%2F%2Fd3ifp5fffz13jc.cloudfront.net%2Ffiles%2F6971fe95a148300002b2bffb%2FWebsiteBuilder-Featureimage.png%3Foriginal&w=3840&q=75)\n\n**Website Builder** — Visual drag-and-drop page editor with a Next.js SDK. Render pages through your own frontend (Vercel, CloudFront, wherever). Create custom page elements with React components.\n\n![Webiny Website Builder](https://www.webiny.com/_next/image?url=%2Fimages%2Fapp-showcase%2Ffile-manager.png&w=3840&q=75)\n**File Manager** — Digital asset management with CDN delivery, folder structure, tagging, search. Integrated into CMS and Website Builder.\n\n**Publishing Workflows** — Multi-step content approval with draft states, reviewer assignments, scheduled publishing, and audit trails.\n\n**Multi-Tenancy** — Native tenant isolation (data, users, assets, permissions) from a single deployment. One instance can host thousands of tenants. Tenants are created and managed programmatically via GraphQL API. Supports hierarchical tenant structures (Root → Brand → Market, Root → Client → Site, etc.).\n\n**Webiny Framework** — TypeScript framework with lifecycle hooks, dependency injection, GraphQL schema extensions, admin UI extension points, and infrastructure extensions. This is the core — it's what makes Webiny programmable rather than just configurable.\n\n---\n\n## Architecture\n\n```\n┌─────────────────────────────────────────────────────┐\n│                    Your AWS Account                  │\n│                                                      │\n│  ┌──────────┐  ┌──────────┐  ┌─────┐  ┌──────────┐ │\n│  │  Lambda   │  │ DynamoDB │  │ S3  │  │CloudFront│ │\n│  │ (API +   │  │ (Content │  │(Assets)│ │  (CDN)  │ │\n│  │  business │  │  storage) │  │     │  │          │ │\n│  │  logic)   │  │          │  │     │  │          │ │\n│  └──────────┘  └──────────┘  └─────┘  └──────────┘ │\n│                                                      │\n│  Optional: OpenSearch (full-text search at scale)    │\n│  Optional: VPC deployment, multi-AZ, custom config   │\n│                                                      │\n│  All provisioned automatically via Pulumi IaC         │\n└─────────────────────────────────────────────────────┘\n```\n\n**Stack:** TypeScript, React, GraphQL, Node.js, Pulumi, AWS serverless services.\n\n**What you control:** Everything. The IaC templates are open-source. Modify Lambda memory, add CloudWatch alarms, change VPC configuration, add custom AWS resources — it's your infrastructure.\n\n**What you don't manage:** Servers. Patching. Scaling. Capacity planning. That's the point of serverless.\n\n---\n\n## Quick Start\n\n**Prerequisites:** Node.js 22+, Yarn, AWS account with programmatic access.\n\n```bash\nnpx create-webiny-project my-project\ncd my-project\nyarn webiny deploy\n```\n\nFirst deploy takes 5–15 minutes (AWS provisioning). After that, you get an admin panel URL. Create your first admin account, and you're in.\n\n**Local development:**\n\n```bash\nyarn webiny watch admin  # React dev server on localhost:3001\nyarn webiny watch api    # Local Lambda execution environment\n```\n\n**New team member onboarding:**\n\n```bash\ngit clone <your-repo>\nyarn\n# Ready to develop\n```\n\n---\n\n## AI-Assisted Development\n\n![Webiny - MCP AI Assisted Development](https://image.mux.com/VAFZGdrkqL6HskOokDtEBkDnHUstqzTgkwgps59nEtE/animated.gif?width=640)\n\nWebiny ships with an **MCP server** and **AI skills** that give AI coding agents (Claude Code, Cursor, Kiro, etc.) deep context about the platform's architecture, extension points, and patterns.\n\nThis means you can ask an AI agent to:\n\n- Create content models with specific field types and validation\n- Build lifecycle hooks that trigger on content events\n- Extend the GraphQL API with custom queries and business logic\n- Scaffold admin UI extensions with React components\n- Wire integrations with external systems via lifecycle events\n- Set up multi-tenant configurations programmatically\n\nThe AI produces code that follows Webiny's actual patterns because the MCP server gives it real knowledge of the framework — not generic guesses.\n\n**Why this works better on Webiny than most platforms:** The framework is strongly typed with explicit extension points. AI-generated code either fits the type system or it doesn't compile. There's no ambiguous plugin API where the AI has to guess. Types enforce correctness.\n\n**Getting started with the MCP server:**\n\n```bash\n# The MCP server runs locally inside your Webiny project\n# Connect it to your AI coding tool of choice\n# See docs for tool-specific setup instructions\n```\n\n→ [AI-Assisted Development Guide](https://www.webiny.com/docs/build-with-ai/ai-assisted-development)\n\n---\n\n## Extending Webiny\n\nAll customization happens in the `extensions/` folder and is registered in `webiny.config.tsx`. Four extension types:\n\n**API Extensions** — Custom GraphQL schemas, resolvers, lifecycle hooks, business logic.\n\n```typescript\n// extensions/NotifyOnPublish.ts — Example: send Slack notification when content is published\nclass NotifyOnPublish implements CmsLifecycleHook.Interface {\n  constructor(private slackService: SlackService.Interface) {}\n\n  async afterPublish(params: AfterPublishParams): Promise<void> {\n    await this.slackService.notify(`Content published: ${params.entry.title}`);\n  }\n}\n```\n\n**Admin Extensions** — Custom UI components, white-label branding, new views, tenant-specific themes. Standard React — use any patterns and libraries you already know.\n\n**Infrastructure Extensions** — Modify AWS resources via Pulumi. Add Lambda functions, S3 buckets, CloudWatch alarms, or change existing resource configuration.\n\n**CLI Extensions** — Custom commands for deployment workflows, data migrations, code generators.\n\n→ [Extensions Guide](https://www.webiny.com/docs/core-concepts/extensions)\n\n---\n\n## When to Use Webiny\n\n- You need a self-hosted CMS and don't want to run servers\n- You need multi-tenancy as a first-class primitive, not a workaround\n- You want to extend the CMS with real code (TypeScript), not just configuration\n- You need to embed a CMS inside your own product (white-label)\n- Data ownership and compliance requirements rule out SaaS CMS\n- You want AI agents to be able to build on your content platform effectively\n- You're on AWS (or planning to be)\n\n## When Not to Use Webiny\n\n**Be honest with yourself about these:**\n\n- **Simple sites or blogs.** Webiny is built for complex projects. If you need a blog with 10 pages, use something simpler.\n- **Not on AWS.** Webiny only runs on AWS. No GCP, no Azure, no on-prem. If that's a dealbreaker, it's a dealbreaker.\n- **No TypeScript/React skills on the team.** The entire extension model is TypeScript and React. If your team works in a different stack and doesn't want to adopt these, Webiny won't be a good fit.\n- **You want a no-code, plug-and-play SaaS CMS.** Webiny is a platform for developers to build on. If you want zero development involvement, this isn't it.\n\n---\n\n## Licensing\n\n**Community Edition** — MIT license. Free forever. Includes Headless CMS, Website Builder, File Manager.\n\n**Business Edition** — Commercial license starting at $79/mo. Adds RBAC, multi-tenancy, publishing workflows.\n\n**Enterprise Edition** — Custom pricing. Adds SSO, audit logs, team management, priority support, managed hosting option.\n\nAll plans: unlimited content entries, pages, assets, API calls, roles, and workflows. No per-seat pricing traps. No API metering.\n\n→ [Pricing Details](https://www.webiny.com/pricing)\n\n---\n\n## Project Structure\n\n```\nmy-webiny-project/\n  extensions/          # Your custom code lives here\n  public/              # Admin app static assets\n  webiny.config.tsx    # Project configuration (React components, type-safe)\n  package.json\n  tsconfig.json\n```\n\nSingle `package.json`. Single `tsconfig.json`. Configuration in `webiny.config.tsx` uses React components for type safety and IDE auto-completion.\n\n---\n\n## Key Commands\n\n```bash\nnpx create-webiny-project <name>    # Create new project\nyarn webiny deploy                   # Deploy to AWS\nyarn webiny deploy core api          # Deploy specific apps\nyarn webiny watch admin              # Local admin dev server\nyarn webiny watch api                # Local Lambda dev environment\nyarn webiny info                     # Show endpoints and URLs\nyarn webiny destroy                  # Tear down all AWS resources\n```\n\n---\n\n## Resources\n\n- **[Learn Webiny Course](https://www.webiny.com/learn)** — Structured course covering architecture, extensions, deployment, and AI-assisted development\n- **[Documentation](https://www.webiny.com/docs)** — Full reference docs\n- **[Community Slack](https://www.webiny.com/slack)** — Community chat\n- **[Website Builder Next.js Starter](https://github.com/webiny/website-builder-nextjs)** — Starter kit for rendering Webiny pages with Next.js\n\n---\n\n## Contributing\n\nWe welcome contributions. See [CONTRIBUTING.md](docs/CONTRIBUTING.md) for guidelines.\n\nBefore opening a PR, please check existing issues or start a discussion — it helps us give you better guidance and avoids duplicate work.\n","summary":"Webiny is an open-source, self-hosted content platform that serves as an enterprise-ready headless CMS and website builder running on AWS serverless infrastructure. It’s built as a TypeScript framework you extend with code, providing capabilities like custom content models, a GraphQL API with permissions, localization and versioning, visual page editing with a Next.js SDK, digital asset management, and multi-step publishing workflows with audit trails. Webiny also supports native multi-tenancy (isolated data/users/assets per tenant) from a single deployment and can scale to very large content and asset volumes. It benefits enterprises and platform teams that need programmable CMS/website tooling on their own AWS accounts, including organizations offering white-labeled experiences.","description":"Open-source, self-hosted CMS platform on AWS serverless (Lambda, DynamoDB, S3). TypeScript framework with multi-tenancy, lifecycle hooks, GraphQL API, and AI-assisted development via MCP server. Built for developers at large organizations.","stars":7984,"language":"TypeScript"},{"owner":"alyssaxuu","repo":"node-av","url":"https://github.com/alyssaxuu/node-av","readme":"<p align=\"center\">\n  <img src=\"https://github.com/seydx/node-av/blob/main/docs/logo.png?raw=true\" width=\"250px\">\n</p>\n\n# NodeAV\n\n[![npm version](https://img.shields.io/npm/v/node-av.svg)](https://www.npmjs.com/package/node-av)\n[![npm downloads](https://img.shields.io/npm/dt/node-av.svg)](https://www.npmjs.com/package/node-av)\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](https://opensource.org/licenses/MIT)\n[![TypeScript](https://img.shields.io/badge/TypeScript-Ready-blue.svg)](https://www.typescriptlang.org/)\n[![FFmpeg](https://img.shields.io/badge/FFmpeg-8.1-green.svg)](https://ffmpeg.org)\n[![Platform](https://img.shields.io/badge/platform-Windows%20(MSVC%20%7C%20MinGW)%20%7C%20macOS%20%7C%20Linux-lightgrey.svg)](https://github.com/seydx/node-av)\n\nNative Node.js bindings for FFmpeg with full TypeScript support - including type-safe options (autocomplete + validation) for every codec, format, filter, and bitstream filter, generated from FFmpeg's own metadata. Provides direct access to FFmpeg's C APIs through N-API. Includes both raw FFmpeg bindings for full control and higher-level abstractions. Automatic resource management via Disposable pattern, hardware acceleration support and prebuilt binaries for Windows, Linux, and macOS.\n\n📚 **[Documentation](https://seydx.github.io/node-av)**\n\n## Table of Contents\n\n- [Installation](#installation)\n- [Quick Start](#quick-start)\n  - [Low-Level API](#low-level-api)\n  - [High-Level API](#high-level-api)\n  - [Pipeline API](#pipeline-api)\n- [Hardware Acceleration](#hardware-acceleration)\n  - [Auto-Detection](#auto-detection)\n  - [Specific Hardware](#specific-hardware)\n- [Stream Processing](#stream-processing)\n  - [From Files or Network](#from-files-or-network)\n  - [From Buffers](#from-buffers)\n  - [Raw Media Processing](#raw-media-processing)\n- [Device Capture](#device-capture)\n- [FFmpeg Binary Access](#ffmpeg-binary-access)\n- [Resource Management](#resource-management)\n- [Imports and Tree Shaking](#imports-and-tree-shaking)\n- [Key Features](#key-features)\n- [Performance](#performance)\n  - [Benchmarks](#benchmarks)\n  - [Sync vs Async Operations](#sync-vs-async-operations)\n- [Memory Safety Considerations](#memory-safety-considerations)\n- [Electron](#electron)\n- [Examples](#examples)\n- [Prebuilt Binaries](#prebuilt-binaries)\n- [Troubleshooting](#troubleshooting)\n- [License](#license)\n- [Contributing](#contributing)\n- [Support](#support)\n- [See Also](#see-also)\n\n## Installation\n\n```bash\nnpm install node-av\n```\n\n## Quick Start\n\n### Low-Level API\n\nDirect access to FFmpeg's C APIs with minimal abstractions. Perfect when you need full control over FFmpeg functionality.\n\n```typescript\nimport { AVERROR_EOF, AVMEDIA_TYPE_VIDEO } from 'node-av/constants';\nimport { Codec, CodecContext, FFmpegError, FormatContext, Frame, Packet, Rational } from 'node-av/lib';\n\n// Open input file\nawait using ifmtCtx = new FormatContext();\n\nlet ret = await ifmtCtx.openInput('input.mp4');\nFFmpegError.throwIfError(ret, 'Could not open input file');\n\nret = await ifmtCtx.findStreamInfo();\nFFmpegError.throwIfError(ret, 'Could not find stream info');\n\n// Find video stream\nconst videoStreamIndex = ifmtCtx.findBestStream(AVMEDIA_TYPE_VIDEO);\nconst videoStream = ifmtCtx.streams?.[videoStreamIndex];\n\nif (!videoStream) {\n  throw new Error('No video stream found');\n}\n\n// Create codec\nconst codec = Codec.findDecoder(videoStream.codecpar.codecId);\nif (!codec) {\n  throw new Error('Codec not found');\n}\n\n// Allocate codec context for the decoder\nusing decoderCtx = new CodecContext();\ndecoderCtx.allocContext3(codec);\n\nret = decoderCtx.parametersToContext(videoStream.codecpar);\nFFmpegError.throwIfError(ret, 'Could not copy codec parameters to decoder context');\n\n// Open decoder context\nret = await decoderCtx.open2(codec, null);\nFFmpegError.throwIfError(ret, 'Could not open codec');\n\n// Process packets\nusing packet = new Packet();\npacket.alloc();\n\nusing frame = new Frame();\nframe.alloc();\n\nwhile (true) {\n  let ret = await ifmtCtx.readFrame(packet);\n  if (ret < 0) {\n    break;\n  }\n\n  if (packet.streamIndex === videoStreamIndex) {\n    // Send packet to decoder\n    ret = await decoderCtx.sendPacket(packet);\n    if (ret < 0 && ret !== AVERROR_EOF) {\n      FFmpegError.throwIfError(ret, 'Error sending packet to decoder');\n    }\n\n    // Receive decoded frames\n    while (true) {\n      const ret = await decoderCtx.receiveFrame(frame);\n      if (ret === AVERROR_EOF || ret < 0) {\n        break;\n      }\n\n      console.log(`Decoded frame ${frame.pts}, size: ${frame.width}x${frame.height}`);\n\n      // Process frame data...\n    }\n  }\n\n  packet.unref();\n}\n```\n\n### High-Level API\n\nHigher-level abstractions for common tasks like decoding, encoding, filtering, and transcoding. Easier to use while still providing access to low-level details when needed.\n\n```typescript\nimport { Decoder, Demuxer, Encoder, HardwareContext, Muxer } from 'node-av/api';\nimport { FF_ENCODER_LIBX264 } from 'node-av/constants';\n\n// Open Demuxer\nawait using input = await Demuxer.open('input.mp4');\n\n// Get video stream\nconst videoStream = input.video()!;\n\n// Optional, setup hardware acceleration\nusing hw = HardwareContext.auto();\n\n// Create decoder\nusing decoder = await Decoder.create(videoStream, {\n  hardware: hw, // Optional, use hardware acceleration if available\n});\n\n// Create encoder\nusing encoder = await Encoder.create(FF_ENCODER_LIBX264, {\n  decoder, // Optional, copy settings from decoder\n});\n\n// Open Muxer\nawait using output = await Muxer.open('output.mp4', {\n  input, // Optional, used to copy global headers and metadata\n});\n\n// Add stream to output\nconst outputIndex = output.addStream(encoder, {\n  inputStream: videoStream, // Optional, copy settings from input stream\n});\n\n// Create processing generators\nconst inputGenerator = input.packets(videoStream.index);\nconst decoderGenerator = decoder.frames(inputGenerator);\nconst encoderGenerator = encoder.packets(decoderGenerator);\n\n// Process packets\nfor await (using packet of encoderGenerator) {\n  await output.writePacket(packet, outputIndex);\n}\n\n// Done\n```\n\n### Pipeline API\n\nA simple way to chain together multiple processing steps like decoding, filtering, encoding, and muxing.\n\n```typescript\nimport { Decoder, Demuxer, Encoder, HardwareContext, Muxer, pipeline } from 'node-av/api';\nimport { FF_ENCODER_LIBX264 } from 'node-av/constants';\n\n// Simple transcode pipeline: input → decoder → encoder → output\n\n// Open Demuxer\nawait using input = await Demuxer.open('input.mp4');\n\n// Get video stream\nconst videoStream = input.video()!;\n\n// Optional, setup hardware acceleration\nusing hw = HardwareContext.auto();\n\n// Create decoder\nusing decoder = await Decoder.create(videoStream, {\n  hardware: hw, // Optional, use hardware acceleration if available\n});\n\n// Create encoder\nusing encoder = await Encoder.create(FF_ENCODER_LIBX264, {\n  decoder, // Optional, copy settings from decoder\n});\n\n// Open Muxer\nawait using output = await Muxer.open('output.mp4', {\n  input, // Optional, used to copy global headers and metadata\n});\n\nconst control = pipeline(input, decoder, encoder, output);\nawait control.completion;\n```\n\n## Hardware Acceleration\n\nThe library supports all hardware acceleration methods available in FFmpeg. The specific hardware types available depend on your FFmpeg build and system configuration.\n\n### Auto-Detection\n\n```typescript\nimport { HardwareContext } from 'node-av/api';\nimport { FF_ENCODER_LIBX264 } from 'node-av/constants';\n\n// Automatically detect best available hardware\nconst hw = HardwareContext.auto();\nconsole.log(`Using hardware: ${hw.deviceTypeName}`);\n\n// Use with decoder\nconst decoder = await Decoder.create(stream, {\n  hardware: hw\n});\n\n// Use with encoder (use hardware-specific codec)\nconst encoderCodec = hw?.getEncoderCodec('h264') ?? FF_ENCODER_LIBX264;\nconst encoder = await Encoder.create(encoderCodec, {\n  decoder,\n});\n```\n\n### Specific Hardware\n\n```typescript\nimport { AV_HWDEVICE_TYPE_CUDA, AV_HWDEVICE_TYPE_VAAPI } from 'node-av/constants';\n\n// Use specific hardware type\nconst cuda = HardwareContext.create(AV_HWDEVICE_TYPE_CUDA);\nconst vaapi = HardwareContext.create(AV_HWDEVICE_TYPE_VAAPI, '/dev/dri/renderD128');\n```\n\n## Stream Processing\n\n### From Files or Network\n\n```typescript\nconst media = await Demuxer.open('input.mp4');\n\n// or\n\nconst media = await Demuxer.open('rtsp://example.com/stream');\n```\n\n### From Buffers\n\n```typescript\nimport { readFile } from 'fs/promises';\n\nconst buffer = await readFile('input.mp4');\nconst media = await Demuxer.open(buffer);\n```\n\n### Custom I/O Callbacks\n\n```typescript\nimport type { IOInputCallbacks, IOOutputCallbacks } from 'node-av/api';\n\n// Custom input source\nconst inputCallbacks: IOInputCallbacks = {\n  read: (size: number) => {\n    // Read from your custom source\n    return buffer; // or null for EOF\n  },\n  seek: (offset: bigint, whence: number) => {\n    // Seek in your custom source\n    return newPosition;\n  }\n};\n\nawait using input = await Demuxer.open(inputCallbacks, {\n  format: 'mp4'\n});\n```\n\n### Raw Media Processing\n\n```typescript\n// Raw video input\nconst rawVideo = await Demuxer.open({\n  type: 'video',\n  input: 'input.yuv',\n  width: 1280,\n  height: 720,\n  pixelFormat: AV_PIX_FMT_YUV420P,\n  frameRate: { num: 30, den: 1 }\n});\n\n// Raw audio input\nconst rawAudio = await Demuxer.open({\n  type: 'audio',\n  input: 'input.pcm',\n  sampleRate: 48000,\n  channels: 2,\n  sampleFormat: AV_SAMPLE_FMT_S16\n}, {\n  format: 's16le'\n});\n```\n\n## Device Capture\n\nCapture video, audio, and screen content directly from system devices. Platform-specific formats are handled automatically.\n\n```typescript\nimport { DeviceAPI } from 'node-av/api';\n\n// List devices and query capabilities\nconst devices = await DeviceAPI.list();\nconst modes = await DeviceAPI.modes(devices.find(d => d.type === 'video')!.name);\n\n// Camera\nawait using camera = await DeviceAPI.openCamera({ videoDevice: 0, width: 1280, height: 720, frameRate: 30 });\n\n// Microphone\nawait using mic = await DeviceAPI.openMicrophone({ audioDevice: 0, sampleRate: 48000, channels: 2 });\n\n// Combined video + audio (macOS/Windows)\nawait using device = await DeviceAPI.openDevice({ videoDevice: 0, audioDevice: 0, width: 1280, height: 720, frameRate: 30 });\n\n// Screen capture\nawait using screen = await DeviceAPI.openScreen({ frameRate: 30, drawMouse: true });\n\n// Screen capture with system audio (macOS 13.0+)\nawait using screen2 = await DeviceAPI.openScreen({\n  frameRate: 30,\n  avfoundation: { captureSystemAudio: true, audioSampleRate: 48000, audioChannels: 2 },\n});\n```\n\n| Platform | Video | Audio | Screen |\n|----------|-------|-------|--------|\n| macOS | AVFoundation | AVFoundation | AVFoundation (ScreenCaptureKit) |\n| Linux | V4L2 | ALSA | x11grab |\n| Windows | DirectShow | DirectShow | GDIGrab |\n\n## FFmpeg Binary Access\n\nNeed direct access to the FFmpeg binary? The library provides an easy way to get FFmpeg binaries that automatically downloads and manages platform-specific builds.\n\n```typescript\nimport { ffmpegPath, isFfmpegAvailable } from 'node-av/ffmpeg';\nimport { execFile } from 'node:child_process';\nimport { promisify } from 'node:util';\n\nconst execFileAsync = promisify(execFile);\n\n// Check if FFmpeg binary is available\nif (isFfmpegAvailable()) {\n  console.log('FFmpeg binary found at:', ffmpegPath());\n\n  // Use FFmpeg binary directly\n  const { stdout } = await execFileAsync(ffmpegPath(), ['-version']);\n  console.log(stdout);\n} else {\n  console.log('FFmpeg binary not available - install may have failed');\n}\n\n// Direct usage example\nasync function convertVideo(input: string, output: string) {\n  const args = [\n    '-i', input,\n    '-c:v', 'libx264',\n    '-crf', '23',\n    '-c:a', 'aac',\n    output\n  ];\n\n  await execFileAsync(ffmpegPath(), args);\n}\n```\n\nThe FFmpeg binary is automatically downloaded during installation from GitHub releases and matches the same build used by the native bindings.\n\n## Resource Management\n\nThe library supports automatic resource cleanup using the Disposable pattern:\n\n```typescript\n// Automatic cleanup with 'using'\n{\n  await using media = await Demuxer.open('input.mp4');\n  using decoder = await Decoder.create(media.video());\n  // Resources automatically cleaned up at end of scope\n}\n\n// Manual cleanup\nconst media = await Demuxer.open('input.mp4');\ntry {\n  // Process media\n} finally {\n  await media.close();\n}\n```\n\n## Imports and Tree Shaking\n\nThe library provides multiple entry points for optimal tree shaking:\n\n```typescript\n// High-Level API only - Recommended for most use cases\nimport { Demuxer, Muxer, Decoder, Encoder } from 'node-av/api';\n\n// Low-Level API only - Direct FFmpeg bindings\nimport { FormatContext, CodecContext, Frame, Packet } from 'node-av/lib';\n\n// Constants only - When you just need FFmpeg constants\nimport { AV_PIX_FMT_YUV420P, AV_CODEC_ID_H264 } from 'node-av/constants';\n\n// Channel layouts only - For audio channel configurations\nimport { AV_CHANNEL_LAYOUT_STEREO, AV_CHANNEL_LAYOUT_5POINT1 } from 'node-av/layouts';\n\n// Default export - Includes everything\nimport * as ffmpeg from 'node-av';\n```\n\n## Key Features\n\nBeyond basic transcoding, NodeAV provides advanced media processing capabilities:\n\n**Fully Typed FFmpeg Options**\nEvery FFmpeg option is typed - across codecs, formats, ~580 filters, and bitstream filters. Keys autocomplete, enum values are validated, and typos become compile-time errors, all generated directly from FFmpeg's `AVOption` metadata (including each option's description and a link to the FFmpeg docs as JSDoc). No more grepping the FFmpeg docs for flag names.\n\n**Speech Recognition with Whisper**\nIntegrate automatic speech-to-text transcription using OpenAI's Whisper model through the whisper.cpp implementation. The library handles automatic model downloading from HuggingFace, supports multiple model sizes (tiny, base, small, medium, large) for different accuracy/performance tradeoffs, and provides hardware-accelerated inference through Metal (macOS), Vulkan (cross-platform), or OpenCL backends. Transcription results include precise timestamps and can be processed in real-time from any audio source.\n\n**Advanced Video Filtering with FilterComplexAPI**\nBuild sophisticated video processing pipelines using FFmpeg's complete filter ecosystem. The FilterComplexAPI provides direct access to complex filtergraphs with multiple inputs and outputs, enabling advanced operations like picture-in-picture overlays, multi-stream composition (side-by-side, grid layouts), real-time video effects, and custom processing chains. All filters support hardware acceleration where available, and filter configurations can be dynamically constructed based on runtime requirements.\n\n**Browser Streaming**\nStream any media source directly to web browsers through fragmented MP4 (fMP4) or WebRTC protocols. The library can process inputs from RTSP cameras, local files, network streams, or custom sources and package them for browser consumption with minimal latency. Complete examples demonstrate both Media Source Extensions (MSE) based playback for on-demand content and WebRTC integration for real-time streaming scenarios.\n\n**RTSP Backchannel / Talkback**\nImplements bidirectional RTSP communication for IP camera integration. The library provides native support for RTSP backchannel streams, enabling audio transmission to camera devices. Transport is handled automatically with support for both TCP (interleaved mode) and UDP protocols, with proper RTP packet formatting and stream synchronization.\n\nSee the [Examples](#examples) section for complete implementations.\n\n## Performance\n\nNodeAV executes all media operations directly through FFmpeg's native C libraries. The Node.js bindings add minimal overhead - mostly just the JavaScript-to-C boundary crossings. During typical operations like transcoding or filtering, most processing time is spent in FFmpeg's optimized C code.\n\n### Benchmarks\n\nPerformance comparison with FFmpeg CLI (4K 60fps, 30s test files on Apple M3 Max):\n\n| Operation | FFmpeg CLI (FPS) | node-av (FPS) | FFmpeg CLI (Time) | node-av (Time) | Diff |\n|-----------|------------------|---------------|-------------------|----------------|------|\n| SW H.264 Transcode | 96 fps | 96 fps | 18.7s | 18.7s | ≈0% |\n| SW H.265 Transcode | 40 fps | 41 fps | 44.5s | 43.7s | **+1.5%** |\n| HW H.264 Transcode | 55 fps | 55 fps | 33.0s | 32.8s | **+0.5%** |\n| Stream Copy (Remux) | 48k fps | 31k fps | 38ms | 106ms | -35% |\n\n**Memory Usage:**\n| Operation | FFmpeg CLI | node-av | Difference |\n|-----------|-----------|---------|------------|\n| H.264 Transcode (4K) | 3.6 GB | 3.4 GB | **-5%** |\n| Stream Copy | 28 MB | 1 MB | **-96%** |\n\n📊 **[Full benchmark results](https://github.com/seydx/node-av/tree/main/BENCHMARK.md)**\n\n### Sync vs Async Operations\n\nEvery async method in NodeAV has a corresponding synchronous variant with the `Sync` suffix:\n\n- **Async methods** (default) - Non-blocking operations using N-API's AsyncWorker. Methods like `decode()`, `encode()`, `read()`, `packets()` return Promises or AsyncGenerators.\n\n- **Sync methods** - Direct FFmpeg calls without AsyncWorker overhead. Same methods with `Sync` suffix: `decodeSync()`, `encodeSync()`, `readSync()`, `packetsSync()`.\n\nThe key difference: Async methods don't block the Node.js event loop, allowing other operations to run concurrently. Sync methods block until completion but avoid AsyncWorker overhead, making them faster for sequential processing.\n\n## Memory Safety Considerations\n\nNodeAV provides direct bindings to FFmpeg's C APIs, which work with raw memory pointers. The high-level API adds safety abstractions and automatic resource management, but incorrect usage can still cause crashes. Common issues include mismatched video dimensions, incompatible pixel formats, or improper frame buffer handling. The library validates parameters where possible, but can't guarantee complete memory safety without limiting functionality. When using the low-level API, pay attention to parameter consistency, resource cleanup, and format compatibility. Following the documented patterns helps avoid memory-related issues.\n\n## Electron\n\nNodeAV fully supports Electron applications. The prebuilt binaries are ABI-compatible with Electron, so no native rebuild is required during packaging. Both the native bindings and the bundled FFmpeg CLI binaries work seamlessly within Electron's main process.\n\nNodeAV also supports Electron's [offscreen rendering with shared textures](https://www.electronjs.org/docs/latest/tutorial/offscreen-rendering), enabling zero-copy GPU texture import for hardware-accelerated encoding. See the [Electron Builder](https://github.com/seydx/node-av/tree/main/examples/electron/builder) and [Electron Forge](https://github.com/seydx/node-av/tree/main/examples/electron/forge) examples for complete implementations.\n\nIf you encounter module resolution errors like `Cannot find module 'lib/binary-stream'`, add this override to your project's `package.json`:\n\n```json\n{\n  \"overrides\": {\n    \"@shinyoshiaki/binary-data\": \"npm:@seydx/binary-data@0.6.2\"\n  }\n}\n```\n\n## Examples\n\n| Example | FFmpeg | Low-Level API | High-Level API |\n|---------|--------|---------------|----------------|\n| `browser-fmp4` | | | [✓](https://github.com/seydx/node-av/tree/main/examples/browser/fmp4) |\n| `browser-webrtc` | | | [✓](https://github.com/seydx/node-av/tree/main/examples/browser/webrtc) |\n| `electron-builder` | | | [✓](https://github.com/seydx/node-av/tree/main/examples/electron/builder) |\n| `electron-forge` | | | [✓](https://github.com/seydx/node-av/tree/main/examples/electron/forge) |\n| `api-abort-signal` | | | [✓](https://github.com/seydx/node-av/tree/main/examples/api-abort-signal.ts) |\n| `api-bitstream-filter` | | | [✓](https://github.com/seydx/node-av/tree/main/examples/api-bitstream-filter.ts) |\n| `api-dash` | | | [✓](https://github.com/seydx/node-av/tree/main/examples/api-dash.ts) |\n| `api-device-capture` | | | [✓](https://github.com/seydx/node-av/tree/main/examples/api-device-capture.ts) |\n| `api-encode-decode` | | | [✓](https://github.com/seydx/node-av/tree/main/examples/api-encode-decode.ts) |\n| `api-filter-complex` | | | [✓](https://github.com/seydx/node-av/tree/main/examples/api-filter-complex.ts) |\n| `api-filter-complex-grid` | | | [✓](https://github.com/seydx/node-av/tree/main/examples/api-filter-complex-grid.ts) |\n| `api-filter-complex-typed` | | | [✓](https://github.com/seydx/node-av/tree/main/examples/api-filter-complex-typed.ts) |\n| `api-fmp4` | | | [✓](https://github.com/seydx/node-av/tree/main/examples/api-fmp4.ts) |\n| `api-frame-extract` | | | [✓](https://github.com/seydx/node-av/tree/main/examples/api-frame-extract.ts) |\n| `api-hw-codecs` | | | [✓](https://github.com/seydx/node-av/  | | [✓](https://github.com/seydx/node-av/tree/main/examples/api-sw-transcode.ts) |\n| `api-whisper-subtitles` | | | [✓](https://github.com/seydx/node-av/tree/main/examples/api-whisper-subtitles.ts) |\n| `api-whisper-transcribe` | | | [✓](https://github.com/seydx/node-av/tree/main/examples/api-whisper-transcribe.ts) |\n| `frame-utils` | | [✓](https://github.com/seydx/node-av/tree/main/examples/frame-utils.ts) | |\n| `avio-read-callback` | [✓](https://github.com/FFmpeg/FFmpeg/tree/master/doc/examples/avio_read_callback.c) | [✓](https://github.com/seydx/node-av/tree/main/examples/avio-read-callback.ts) | |\n| `avio-async-read-callback` | | [✓](https://github.com/seydx/node-av/tree/main/examples/avio-async-read-callback.ts) | |\n| `decode-audio` | [✓](https://github.com/FFmpeg/FFmpeg/tree/master/doc/examples/decode_audio.c) | [✓](https://github.com/seydx/node-av/tree/main/examples/decode-audio.ts) | |\n| `decode-filter-audio` | [✓](https://github.com/FFmpeg/FFmpeg/tree/master/doc/examples/decode_filter_audio.c) | [✓](https://github.com/seydx/node-av/tree/main/examples/decode-filter-audio.ts) | |\n| `decode-filter-video` | [✓](https://github.com/FFmpeg/FFmpeg/tree/master/doc/examples/decode_filter_video.c) | [✓](https://github.com/seydx/node-av/tree/main/examples/decode-filter-video.ts) | |\n| `decode-video` | [✓](https://github.com/FFmpeg/FFmpeg/tree/master/doc/examples/decode_video.c) | [✓](https://github.com/seydx/node-av/tree/main/examples/decode-video.ts) | |\n| `demux-decode` | [✓](https://github.com/FFmpeg/FFmpeg/tree/master/doc/examples/demux_decode.c) | [✓](https://github.com/seydx/node-av/tree/main/examples/demux-decode.ts) | |\n| `encode-audio` | [✓](https://github.com/FFmpeg/FFmpeg/tree/master/doc/examples/encode_audio.c) | [✓](https://github.com/seydx/node-av/tree/main/examples/encode-audio.ts) | |\n| `encode-video` | [✓](https://github.com/FFmpeg/FFmpeg/tree/master/doc/examples/encode_video.c) | [✓](https://github.com/seydx/node-av/tree/main/examples/encode-video.ts) | |\n| `ffprobe-metadata` | | [✓](https://github.com/seydx/node-av/tree/main/examples/ffprobe-metadata.ts) | |\n| `filter-audio` | [✓](https://github.com/FFmpeg/FFmpeg/tree/master/doc/examples/filter_audio.c) | [✓](https://github.com/seydx/node-av/tree/main/examples/filter-audio.ts) | |\n| `hw-decode` | [✓](https://github.com/FFmpeg/FFmpeg/tree/master/doc/examples/hw_decode.c) | [✓](https://github.com/seydx/node-av/tree/main/examples/hw-decode.ts) | |\n| `hw-encode` | | [✓](https://github.com/seydx/node-av/tree/main/examples/hw-encode.ts) | |\n| `hw-transcode` | | [✓](https://github.com/seydx/node-av/tree/main/examples/hw-transcode.ts) | |\n| `qsv-decode` | [✓](https://github.com/FFmpeg/FFmpeg/blob/master/doc/examples/qsv_decode.c) | | |\n| `qsv-transcode` | [✓](https://github.com/FFmpeg/FFmpeg/blob/master/doc/examples/qsv_transcode.c) | | |\n| `vaapi-encode` | [✓](https://github.com/FFmpeg/FFmpeg/blob/master/doc/examples/vaapi_encode.c) | | |\n| `vaapi-transcode` | [✓](https://github.com/FFmpeg/FFmpeg/blob/master/doc/examples/vaapi_transcode.c) | | |\n| `mux` | [✓](https://github.com/FFmpeg/FFmpeg/tree/master/doc/examples/mux.c) | [✓](https://github.com/seydx/node-av/tree/main/examples/mux.ts) | |\n| `remux` | [✓](https://github.com/FFmpeg/FFmpeg/tree/master/doc/examples/remux.c) | [✓](https://github.com/seydx/node-av/tree/main/examples/remux.ts) | |\n| `resample-audio` | [✓](https://github.com/FFmpeg/FFmpeg/tree/master/doc/examples/resample_audio.c) | [✓](https://github.com/seydx/node-av/tree/main/examples/resample-audio.ts) | |\n| `rtsp-stream-info` | | [✓](https://github.com/seydx/node-av/tree/main/examples/rtsp-stream-info.ts) | |\n| `scale-video` | [✓](https://github.com/FFmpeg/FFmpeg/tree/master/doc/examples/scale_video.c) | [✓](https://github.com/seydx/node-av/tree/main/examples/scale-video.ts) | |\n| `show-metadata` | [✓](https://github.com/FFmpeg/FFmpeg/tree/master/doc/examples/show_metadata.c) | [✓](https://github.com/seydx/node-av/tree/main/examples/show-metadata.ts) | |\n| `transcode-aac` | [✓](https://github.com/FFmpeg/FFmpeg/tree/master/doc/examples/transcode_aac.c) | [✓](https://github.com/seydx/node-av/tree/main/examples/transcode-aac.ts) | |\n| `transcode` | [✓](https://github.com/FFmpeg/FFmpeg/tree/master/doc/examples/transcode.c) | [✓](https://github.com/seydx/node-av/tree/main/examples/transcode.ts) | |\n\n## Prebuilt Binaries\n\nPrebuilt binaries are available for multiple platforms:\n\n- **macOS**: x64, ARM64\n- **Linux**: x64, ARM64\n- **Windows**: x64, ARM64 (automatic MSVC/MinGW selection)\n\n## Troubleshooting\n\n### Hardware Acceleration on Linux (Intel/VAAPI)\n\nFor hardware-accelerated video processing with Intel GPUs on Linux, you need to install specific system packages. The FFmpeg binaries included with this library are built with **libva 2.20**, which requires **Ubuntu 24.04+** or **Debian 13+** as minimum OS versions.\n\n#### Installation Steps\n\n1. **Add Kisak-Mesa PPA** (recommended for newer Mesa versions with better hardware support):\n\n```bash\nsudo add-apt-repository ppa:kisak/kisak-mesa\nsudo apt update\n```\n\n2. **Install required packages**:\n\n```bash\nsudo apt install libmfx-gen1.2 mesa-va-drivers mesa-vulkan-drivers libva2 libva-drm2 vainfo libvulkan1 vulkan-tools\n```\n\nAfter installation, verify hardware acceleration is working:\n\n```bash\n# Check VAAPI support\nvainfo\n\n# Check Vulkan support\nvulkaninfo\n\n# Should show available profiles and entrypoints for your Intel GPU\n```\n\n**Note**: If you're running an older Ubuntu version (< 24.04) or Debian version (< 13), you'll need to upgrade your OS to use hardware acceleration with this library.\n\n## License\n\nThis project is licensed under the MIT License. See the LICENSE file for details.\n\n**Important**: FFmpeg itself is licensed under LGPL/GPL. Please ensure compliance with FFmpeg's license terms when using this library. The FFmpeg libraries themselves retain their original licenses, and this wrapper li
