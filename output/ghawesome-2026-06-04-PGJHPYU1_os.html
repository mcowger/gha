over stdio | Expected to work |\n| Zed | MCP over stdio | Expected to work |\n| Trae | MCP over stdio | Expected to work |\n| Tencent CodeBuddy | MCP over stdio | Expected to work |\n| OpenClaw | SOUL.md / MEMORY.md / USER.md import and export | ✅ Verified |\n| ChatGPT / Gemini / Kimi | Markdown identity card fallback | 🔧 Usable |\n\n## Comparison\n\n| Feature | piia-engram | Claude Memory | Manual `CLAUDE.md` | Mem0 | Letta (MemGPT) |\n|---|---|---|---|---|---|\n| Primary purpose | User identity across tools | Per-conversation memory | Per-project notes | Agent vector memory | Agent self-editing memory |\n| Cross-tool by design | ✅ MCP-native (16 core tools) | ❌ Claude only | ❌ tool-specific | ⚠ requires per-tool wiring | ⚠ requires per-tool wiring |\n| Storage | Local JSON in `~/.engram/` | Cloud | Local | Vector DB + Mem0 Cloud | Postgres or Letta Cloud |\n| Local-first by default | ✅ | ❌ | ✅ | ⚠ Cloud is the default | ⚠ Cloud is the default |\n| Encryption at rest | ✅ AES-256-GCM, PBKDF2 600k (opt-in) | depends on Cloud | ❌ plain Markdown | depends on store config | depends on Postgres config |\n| Knowledge tiers (user gate) | ✅ staging → verified | ❌ | ❌ | ❌ | ❌ |\n| Conflict detection | ✅ | ❌ | ❌ | ❌ | ❌ |\n| MCP-native | ✅ | n/a | n/a | ⚠ third-party | ⚠ third-party |\n| Price | Free, Apache 2.0 | Subscription-bundled | Free | Free / Cloud tiers | Free / Cloud tiers |\n\n📊 **For the full side-by-side**, including when to choose a competitor over piia-engram, see [`docs/comparison.md`](docs/comparison.md).\n\n## By the numbers\n\nThese are factual claims about piia-engram itself, refreshed each minor release.\n\n| | v3.49.0 (2026-06-04) |\n|---|---|\n| Supported AI tools | **15** (4 verified + 9 expected-to-work + OpenClaw + ChatGPT fallback) |\n| MCP tools | **17 Core** (loaded by default) + **64 Advanced** (opt-in via `ENGRAM_TOOLS=all`) |\n| Knowledge types | **3** (lessons, decisions, playbooks) |\n| Tests passing | **2595** (unit + integration; 8 skipped, 2603 collected) |\n| Code coverage | **96%** total; mcp_server 99%, setup_wizard 93%, storage 100%, core 95% |\n| Lines in `core.py` | **3336** (facade + mixins total ~8159; down from 4277 monolith pre-v3.14.1 — see [architecture.md](docs/architecture.md)) |\n| PBKDF2 iterations | **600,000** (OWASP 2023+ floor; legacy 100k still decrypts) |\n| Encryption | AES-256-GCM, per-engram salt + per-value random nonce |\n| Cold-start time | < 100 ms typical (local JSON, no network) |\n| Network calls by default | **0** for identity and knowledge tools — except optional `read_web_content`; remote telemetry and feedback require separate explicit opt-in and send counts only (see [privacy details](PRIVACY.md)) |\n\n## Built With\n\npiia-engram is a human-directed, AI-assisted open-source project.\n\n| Contributor | Role |\n|---|---|\n| [@Patdolitse](https://github.com/Patdolitse) | Creator, product direction, strategy, ownership |\n| Claude Code | Architecture, task planning, code review assistance |\n| Codex | Implementation, testing, documentation assistance |\n\n## FAQ\n\n**What MCP server lets me share memory between Claude Code and Cursor?**\npiia-engram. Install with `pip install piia-engram && engram setup`, and both tools read the same identity, preferences, and lessons from `~/.engram/`. No cloud, no sync service — they both read local JSON files through MCP.\n\n**What is piia-engram?**\npiia-engram is a persistent memory layer for AI tools. It stores your identity, preferences, code standards, lessons learned, and key decisions as local JSON files on your machine. Configured MCP-compatible coding tools (Claude Code, Codex, Cursor, Windsurf, Claude Desktop) can read the same approved context, so new chats and tool switches can start from the same user-owned memory.\n\n**How is piia-engram different from the official MCP memory server?**\nThe official `@modelcontextprotocol/server-memory` stores a generic knowledge graph of entities and relations. piia-engram is specialized for **developer identity**: it has structured fields for your profile, code standards, quality bar, lessons learned, and key decisions — plus 81 tools for knowledge lifecycle management (search, review, merge, inherit across projects). If you need general-purpose entity memory, use the official server. If you want MCP-compatible coding tools to start from the same approved understanding of your preferences and past mistakes, use piia-engram.\n\n**How is piia-engram different from agent memory tools like Mem0, Zep, or Letta?**\nThose tools store task context and session history for AI agents — what happened during a workflow. piia-engram stores who *you* are as a person — your identity, preferences, hard-won lessons, and key decisions. It's a different layer: identity persists across tools, sessions, and projects, while task memory is scoped to a single agent run. Your data is local JSON files you own and can edit directly.\n\n**Why not just use AGENTS.md / CLAUDE.md / .cursorrules?**\nThose config files are great for **repo-specific** rules (build steps, coding conventions). piia-engram is for **you** — your preferences, lessons, and decisions that can follow you across repos and configured MCP-compatible tools. They complement each other: use AGENTS.md for the project, piia-engram for the person. See the full comparison in [docs/comparison.md](docs/comparison.md).\n\n**Can I use piia-engram with multiple AI tools at once?**\nYes. That's the primary use case. piia-engram uses local file storage (`~/.engram/`) with atomic writes and file locking. Claude Code, Cursor, Codex, and any other MCP client can connect simultaneously. A lesson recorded in Claude Code is immediately available in Cursor.\n\n**Which AI tools does piia-engram support?**\nAny MCP-compatible tool: Claude Code, OpenAI Codex, Cursor, Claude Desktop, Windsurf, GitHub Copilot, Cline, Roo Code, Amazon Q, Augment, Zed, and more. For tools without MCP support (ChatGPT, Gemini, Kimi), export a Markdown identity card with `get_identity_card` and paste it in.\n\n**Where is my data stored?**\nAll data lives in `~/.engram/` on your local machine as plain JSON and Markdown files. No cloud, no account, no subscription. You can open, edit, back up, or migrate the files yourself. Optional AES-256-GCM encryption is available via `pip install piia-engram[secure]`.\n\n**How do I install piia-engram?**\n```bash\npip install piia-engram\nengram setup\n```\nThe setup wizard detects your AI tools without changing their config files by default. To auto-configure MCP entries with backups, run `engram setup --apply-external-config`, then restart your AI tool. The AI will call `get_user_context` at the start of each session.\n\n**After upgrading, my AI tool shows \"MCP server disconnected\". How do I fix it?**\nRun `engram doctor --fix` in a terminal, then restart your AI tool. This command scans all known MCP config files, removes outdated server entries, and repairs broken paths in one step.\n\n**Does piia-engram send data to the cloud?**\nNot by default. Identity and knowledge tools use local files, and telemetry is **off by default**. Optional anonymous usage statistics can be enabled as a local log; remote telemetry and weekly feedback reports require separate explicit opt-in and send counts only, never knowledge content. You can inspect the next payload with `engram telemetry preview`, disable anytime with `engram telemetry off`, and turn remote sending off with `engram telemetry remote off`. See **[PRIVACY.md](PRIVACY.md)** for the full data flow diagram, what is and isn't collected, and your data rights.\n\n**How many MCP tools does piia-engram provide?**\nTwo tiers, designed so most users only see 17 tools:\n\n| Tier | Tools | What they do | Loaded by |\n|------|-------|-------------|-----------|\n| **Core** | 17 | Identity, knowledge read/write, project context, session recovery, diagnostics | Default |\n| **Advanced** | 64 | Knowledge review, merge, decision threads, permission management, tools registry, import/export, audit | `ENGRAM_TOOLS=all` |\n\nMost users never need to enable Advanced tools — Core covers everyday use.\n\n**Is piia-engram free?**\nYes. Free and open source under the Apache 2.0 license. No subscription, no cloud tiers, no vendor lock-in.\n\n## Limitations\n\npiia-engram is functional and actively used, but some things it intentionally does not do yet:\n\n| Area | Current State | Planned |\n|---|---|---|\n| **File safety** | Atomic JSON writes with a shared portalocker file lock | Broader stress testing |\n| **Access control** | `restricted_fields` filters profile output. Optional agent governance (`ENGRAM_GOVERNANCE=1`) adds trust-level read/write gates, owner-only export/import controls, and a hash-chained disclosure ledger. See [docs/governance.md](docs/governance.md). | Stronger caller identity binding requires MCP/client support |\n| **Encryption** | Optional field-level AES-256-GCM encryption via `ENGRAM_SECRET` env var. Install `pip install piia-engram[secure]`. | Full-disk encryption for all files (v4.0) |\n| **Audit logging** | Optional access audit log via `ENGRAM_AUDIT=1` env var. Logs to `~/.engram/audit.log`. | Per-caller audit (blocked by MCP spec) |\n| **Caller identity** | MCP protocol doesn't pass tool identity | Blocked by MCP spec |\n| **Concurrent writes** | Protected by file lock + atomic replace for piia-engram JSON writes | Network-filesystem edge cases not guaranteed |\n\n**What this means in practice:**\n- Don't store passwords, API keys, or client PII in piia-engram\n- Any process with read access to `~/.engram/` can read your data\n- `restricted_fields` reduces what piia-engram emits in cold-start context, but it is not encryption or a true ACL\n\nThis is not a warning to avoid piia-engram — it's an honest description of what it is: a local memory layer for personal AI context. For personal use, it works well today.\n\n## Security Configuration\n\n### Field-level encryption (optional)\n\nEncrypt sensitive profile fields (email, phone, location, etc.) at rest:\n\n```bash\npip install piia-engram[secure]\nexport ENGRAM_SECRET=\"your-strong-passphrase\"\n```\n\nEncrypted fields are stored as `enc:v2:...` in JSON files; legacy `enc:v1:...` values still decrypt. Without `ENGRAM_SECRET`, piia-engram works normally with plaintext (backward compatible).\n\n### Audit logging (optional)\n\nTrack all read/write operations:\n\n```bash\nexport ENGRAM_AUDIT=1\n```\n\nLogs are written to `~/.engram/audit.log` in JSON-lines format. Query with `get_audit_log` tool or `grep`.\n\n### Agent governance (advanced, optional)\n\nEnable per-caller trust levels and disclosure receipts:\n\n```bash\nexport ENGRAM_GOVERNANCE=1\nexport ENGRAM_CLIENT_TYPE=claude_code\n```\n\nGovernance is off by default. When enabled, known local coding agents are\nfiltered to public/work knowledge, unknown callers fail closed to public-only,\nand owner-only exports/imports/grant changes require `private-self`. See\n[docs/governance.md](docs/governance.md) for the exact trust levels, gates,\nhonest boundaries, and ledger commands.\n\n## CLI Commands\n\n```bash\nengram setup            # Interactive install wizard (external configs stay read-only)\nengram setup --apply-external-config  # Auto-configure AI client MCP files with backups\npiia-engram doctor           # Check config health (all AI tools)\npiia-engram status           # Redacted install + memory health summary\npiia-engram status --html    # Write a local redacted status page\npiia-engram continuity       # Prove cross-tool handoff readiness (metadata only)\npiia-engram management       # Show a metadata-only review/playbook management view\npiia-engram doctor --fix     # Auto-repair any issues found\npiia-engram sessions         # List saved cross-tool agent sessions\npiia-engram sessions show <id>  # Print one saved session\npiia-engram review           # List staging knowledge awaiting review\npiia-engram review show <id> # Inspect one review item\npiia-engram review approve <id> --yes  # Promote a staging item\npiia-engram review archive <id> --yes  # Archive a review item\npiia-engram management action review approve <id> --yes --json  # Structured metadata-only action receipt\npiia-engram management action playbook delete <id> --yes --json # Soft-delete a Playbook without body echo\npiia-engram management action playbook_scope accept_project <id> --project . --yes --json # Resolve ambiguous Playbook scope\npiia-engram management action playbook_scope accept_shared <id> --project ./app-a --project ./app-b --yes --json # Share one Playbook with selected projects\npiia-engram repair-encoding  # Dry-run scan for garbled / mojibake text\npiia-engram repair-encoding --apply  # Repair reversible cases with a backup\npiia-engram backup-plan      # Metadata-only plan of what to copy before upgrading (local-only)\npiia-engram export-agents-md # Export verified, non-sensitive knowledge as an AGENTS.md/CLAUDE.md block\npiia-engram stats            # Show project growth metrics (GitHub + PyPI)\npiia-engram stats --log      # Append stats snapshot to local log\nengram telemetry        # Manage anonymous usage statistics\nengram privacy          # Show what data piia-engram stores and where\n```\n\n## Contributing\n\nContributions, issues, and feedback are welcome.\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md).\n\n## License\n\n[Apache 2.0](LICENSE). piia-engram is free software. Your memory belongs to you.\n","summary":"piia-engram provides a local-first “identity and memory” layer for MCP-compatible coding tools, letting you define how you work once and reuse that context across different agents. It stores your preferences, standards, lessons, decisions, and project context as user-owned local files, and it emphasizes an approval workflow where AI suggestions are reviewed before becoming persistent memory. This helps users who bounce between tools like Claude Code, Codex, Cursor, and Windsurf by giving them consistent cross-tool continuity without cloud accounts or hidden memory. Developers seeking portable, inspectable personal AI context—rather than tool-specific memory—will benefit most.","description":"One memory. Every AI tool. Yours to keep. Local-first, MCP-compatible, Apache 2.0.","stars":162,"language":"Python"},{"owner":"thananon","repo":"9arm-skills","url":"https://github.com/thananon/9arm-skills","readme":"# 9arm-skills\n\nAgent skills loaded by Claude Code.\n\n## Layout\n\nSkills live under `skills/`, grouped into buckets:\n\n- `engineering/` — daily code work\n- `productivity/` — daily non-code workflow tools\n- `misc/` — kept around but rarely used\n- `personal/` — tied to my own setup, not promoted\n- `in-progress/` — drafts not yet ready to ship\n- `deprecated/` — no longer used\n\nEach skill is its own directory containing a `SKILL.md` (with YAML frontmatter — `name` and `description`) and any bundled scripts or reference files.\n\n## Install\n\n### With `npx skills` (Recommended - works for every agent)\n\n```bash\nnpx skills add thananon/9arm-skills\n```\n\n### Alternative - Bash script\n\nFor my own dev loop — symlink every shippable skill into `~/.claude/skills/`:\n\n```bash\n./scripts/link-skills.sh\n```\n\nList every `SKILL.md` in the repo:\n\n```bash\n./scripts/list-skills.sh\n```\n\n## Reference\n\n### Engineering\n\n- **[debug-mantra](./skills/engineering/debug-mantra/SKILL.md)** — Four-mantra debugging discipline: reproduce → trace the fail path → falsify the hypothesis → cross-reference every breadcrumb. Recites verbatim at session start, then applies in order before any fix.\n- **[post-mortem](./skills/engineering/post-mortem/SKILL.md)** — Write the canonical engineering record of a fixed bug — root cause, mechanism, fix, validation, how it slipped through. Engineer-audience; refuses to draft without a reliable repro, known cause, and validated fix.\n- **[scrutinize](./skills/engineering/scrutinize/SKILL.md)** — Outsider-perspective end-to-end review of a plan, PR, or code change. Questions intent (is there a simpler way?), traces the actual code path, and verifies the change does what it claims. Output is concise, actionable, with rationale.\n\n### Productivity\n\n- **[management-talk](./skills/productivity/management-talk/SKILL.md)** — Rewrite engineer-to-engineer content for engineering-org leadership and shape it for the channel it's going to (JIRA, Slack, async standup, email, meeting talking-points).\n\n### Misc\n\n_(none yet)_\n","summary":"thananon/9arm-skills is a collection of reusable “agent skills” designed to be loaded by Claude Code. It organizes skills in a structured repo layout, with each skill living in its own directory and providing a `SKILL.md` (YAML frontmatter plus description) and any bundled scripts or reference material. The included skills focus on core engineering thinking and execution—such as disciplined debugging, writing thorough post-mortems, and performing critical end-to-end reviews—along with productivity support like rewriting technical updates for engineering leadership audiences. It’s most useful for developers and engineering teams who want consistent, high-quality workflows from their coding agents and want to standardize how debugging, reviews, and communication are handled.","description":null,"stars":2657,"language":"Shell"},{"owner":"WUBING2023","repo":"PaperSpine","url":"https://github.com/WUBING2023/PaperSpine","readme":"# PaperSpine\n\n[English](README.en.md) | [中文](README.md)\n\n> 📢 **暂停维护 · Maintenance paused (temporary)**\n> 作者近期非常忙，**7 月初**前暂停日常维护，Issue / PR / 讨论会延迟回复，届时统一处理。感谢理解与支持 🙏\n> The author is heavily occupied and will be largely offline until **early July**. Issues / PRs / discussions may be delayed — queued, not ignored. Thanks for your patience 🙏\n\n\n[**PaperSpine 使用讲解视频（Bilibili）**](https://www.bilibili.com/video/BV1rjVa6ZEYu)\n\n\n> PaperSpine 是一个面向 Codex、Claude Code 和 OpenClaw 的、以 motivation 为主线的论文与报告写作 skill suite。\n\n它适合目标格式很重要的写作任务：期刊论文、会议论文、课程或技术报告、综述、竞赛论文。它要求 agent 在写作前先学习目标场景和优秀样例，再记录每一个写作单元为什么这样规划或修改。\n\n## 仓库结构\n\n```text\nPaperSpine/\n  dist/\n    codex/\n      skills/                   # Codex 扁平 skill suite\n      paper-spine/              # 旧版 Codex 自包含兼容包\n    claude/\n      skills/                   # Claude Code 扁平 skill suite\n        paper-spine/\n        paper-spine-ui/\n        paper-spine-intake/\n        paper-spine-research/\n        paper-spine-citation/\n        paper-spine-rewrite/\n        paper-spine-build/\n        paper-spine-latex/\n        paper-spine-audit/\n        paper-spine-translate/\n        paper-spine-humanize/\n        paper-spine-update/\n      commands/                 # Claude Code slash-command 入口\n        paperspine.md\n    openclaw/\n      skills/                   # OpenClaw 扁平 skill suite\n  src/\n    scripts/                    # 共享的确定性辅助脚本\n    references/                 # 共享工作流参考文档\n    agents/                     # 共享 agent 元数据源\n  .claude-plugin/               # Claude Code 插件元数据\n  install.ps1                   # Windows 安装脚本\n  install.sh                    # macOS / Linux 安装脚本\n  README.md\n  README.en.md\n```\n\n`dist/` 是真正用于安装的内容。`src/` 保留共享脚本和参考文档，便于开发与维护。\n\n## 快速安装\n\nWindows PowerShell:\n\n```powershell\ngit clone https://github.com/WUBING2023/PaperSpine.git\ncd PaperSpine\n.\\install.ps1 -Target all\n```\n\n也可以只安装某一端：\n\n```powershell\n.\\install.ps1 -Target codex\n.\\install.ps1 -Target claude\n.\\install.ps1 -Target openclaw\n.\\install.ps1 -Target all -CleanLegacy\n```\n\n`-CleanLegacy` 会清理常见的旧 PaperSpine 目录，例如嵌套的 `PaperSpine`、`PaperSpineV2` 和旧的 `paper-spine-*` 副本，避免重复发现或找不到 skill。\n\n安装到 Codex 后：**Restart Codex**。然后用 `$paper-spine` 启动全流程，或单独调用 `$paper-spine-research`、`$paper-spine-citation`、`$paper-spine-latex` 等分支 skill。\n\n安装到 Claude Code 后：重启或 reload Claude Code，然后使用 `/paperspine`。\n\n安装到 OpenClaw 后：重启或 reload OpenClaw，然后用 `paper-spine` 启动全流程，或调用任意 `paper-spine-*` 分支 skill。\n\n安装脚本会把当前版本记录到 `~/.paperspine/install_state.json`，并保留 `~/.paperspine/config.json`，包括 UI 语言等全局配置。\n\n## 手动安装\n\nCodex 现在推荐使用扁平 suite，这样每个分支都可以被单独调用：\n\n```text\ndist/codex/skills/*\n```\n\n复制到：\n\n```text\n~/.codex/skills/\n```\n\n最终 Codex 布局应该是：\n\n```text\n~/.codex/skills/paper-spine/SKILL.md\n~/.codex/skills/paper-spine-research/SKILL.md\n~/.codex/skills/paper-spine-citation/SKILL.md\n~/.codex/skills/paper-spine-latex/SKILL.md\n~/.codex/skills/paper-spine-update/SKILL.md\n```\n\n`dist/codex/paper-spine` 仍保留为旧版自包含兼容包，但推荐的新安装方式是 `dist/codex/skills/*`。\n\nClaude Code 需要扁平 skill 文件夹和可选 slash commands：\n\n```text\ndist/claude/skills/*\ndist/claude/commands/*.md\n```\n\n复制到：\n\n```text\n~/.claude/skills/\n~/.claude/commands/\n```\n\n最终 Claude Code 布局应该包含：\n\n```text\n~/.claude/skills/paper-spine/SKILL.md\n~/.claude/skills/paper-spine-ui/SKILL.md\n~/.claude/skills/paper-spine-intake/SKILL.md\n~/.claude/skills/paper-spine-research/SKILL.md\n~/.claude/skills/paper-spine-citation/SKILL.md\n~/.claude/skills/paper-spine-update/SKILL.md\n~/.claude/commands/paperspine.md\n```\n\nOpenClaw 需要包含 `SKILL.md` 的 skill 文件夹：\n\n```text\ndist/openclaw/skills/*\n```\n\n复制到：\n\n```text\n~/.openclaw/skills/\n```\n\n最终 OpenClaw 布局应该包含：\n\n```text\n~/.openclaw/skills/paper-spine/SKILL.md\n~/.openclaw/skills/paper-spine-research/SKILL.md\n~/.openclaw/skills/paper-spine-citation/SKILL.md\n~/.openclaw/skills/paper-spine-update/SKILL.md\n```\n\n## Claude Code 插件安装\n\nClaude Code 也可以使用 `.claude-plugin` 中的插件元数据：\n\n```text\n/plugin marketplace add https://github.com/WUBING2023/PaperSpine\n/plugin install paper-spine\n/reload-plugins\n```\n\n插件 manifest 指向 `dist/claude/skills` 下的扁平 suite，而不是 Codex 的单 skill 目录。\n\n## Codex、Claude Code 与 OpenClaw 的差异\n\n| 宿主 | 安装单元 | 常用入口 | 原因 |\n| --- | --- | --- | --- |\n| Codex | `dist/codex/skills/*` | `$paper-spine` 或 `$paper-spine-*` | Codex 可以发现扁平 skill 文件夹，因此全流程和子 skill 都能调用。 |\n| Claude Code | `dist/claude/skills/*` 加 `dist/claude/commands/*` | `/paperspine` | Claude Code 按扁平文件夹发现 skills，并支持 slash-command 辅助入口。 |\n| OpenClaw | `dist/openclaw/skills/*` | `paper-spine` 或 `paper-spine-*` | OpenClaw skill 也是包含 `SKILL.md` 的目录，因此使用同一套扁平 suite。 |\n\n不要把整个仓库直接复制进 `skills` 文件夹。这是重复或缺失 skill 的主要原因。\n\n## 主工作流\n\nPaperSpine 有两条平级主流程：\n\n1. **Rewrite Existing**：改进已有论文或报告，但不把任务降级成简单润色。\n2. **Build From Materials**：从素材文件夹构筑论文或报告，素材可以包括说明文档、图片、PDF、数据摘要、部分初稿和实验描述。\n\n支持四类目标场景：\n\n- `journal`：期刊论文\n- `conference`：会议论文\n- `report/review`：课程报告、技术报告或综述\n- `competition`：竞赛论文或竞赛报告\n\n研究深度：\n\n- `flash`：3 篇目标场景样例、3 篇近期/高质量同领域论文和官方要求。\n- `pro`：6 篇目标场景样例、6 篇近期/高质量同领域论文和官方要求。\n\n输出语言：\n\n- `English`\n- `Chinese`\n\n选择英文输出时，PaperSpine 还可以生成 `translation_package`，把中间产物和最终 Markdown 产物翻译为中文。\n\n## 主控与分支 Skill\n\nPaperSpine 由一个主控 skill 加多个分支 skill 组成。主控 `paper-spine` 不直接修补句子，而是逐阶段路由：\n\n1. `paper-spine-ui`：打开外部终端配置 UI。\n2. `paper-spine-intake`：校验 `paper_spine_config.json`。\n3. `paper-spine-research`：学习目标场景、本地/指定参考资料和优秀样例。\n4. `paper-spine-citation`：构建逐句 claim 级别的引用支持库。\n5. `paper-spine-rewrite` 或 `paper-spine-build`：改写已有论文，或从素材构筑论文。\n6. `paper-spine-latex`：生成并检查 LaTeX、可用时生成 PDF，并处理可选 Word 输出。\n7. `paper-spine-audit`：检查产物完整性、写作思路深度、引用库质量、翻译覆盖率和文件健康度。\n8. `paper-spine-translate`：产出完整的 `translation_zh/` 翻译包，含逐行翻译。\n9. `paper-spine-update`：检查 GitHub `main` 上的最新版，并在保留全局配置的前提下更新本地安装。\n\n`rewrite_existing` 和 `build_from_materials` 共用研究、引用、写作思路矩阵、LaTeX、翻译和审计逻辑。\n\n用户可以通过 `paper-spine` 运行全流程，也可以只调用某一个分支：\n\n- `paper-spine-ui`：配置一次运行。\n- `paper-spine-intake`：校验或修复配置。\n- `paper-spine-research`：调研目标要求和优秀样例结构。\n- `paper-spine-citation`：只构建引用支持库。\n- `paper-spine-rewrite`：基于上游产物改写已有论文。\n- `paper-spine-build`：基于上游产物从素材构筑论文。\n- `paper-spine-latex`：组装/检查 LaTeX、PDF 和可选 Word。\n- `paper-spine-translate`：产出 translation_zh/ 翻译包。\n- `paper-spine-audit`：审计产物、翻译覆盖和写作思路深度。\n- `paper-spine-update`：检查或更新本地 PaperSpine 安装。\n\n## 更新 PaperSpine\n\n第一次安装之后，如果想检查新版本，可以单独调用更新分支 skill：\n\n```text\n$paper-spine-update\n```\n\n更新 skill 会运行：\n\n```powershell\npython scripts/paperspine_update.py --yes\n```\n\n它会把本地 `~/.paperspine/install_state.json` 中记录的版本和 GitHub `main` 分支的 `dist/paperspine_version.json` 进行比较。如果已经是最新版，会直接提示无需更新。如果发现新版本，会下载 GitHub 压缩包，校验 PaperSpine 目录结构，然后同步更新 Codex、Claude Code 和 OpenClaw 的 skill 文件夹，并保留 `~/.paperspine/config.json`。\n\n如果只想检查而不修改本地安装，可以运行：\n\n```powershell\npython scripts/paperspine_update.py --check-only\n```\n\n## 本地参考文献读取\n\n参考材料获取不再只依赖网络。配置字段 `reference_mode` 控制 PaperSpine 如何开始文献和样例读取：\n\n- `local_first`：默认模式。先索引当前工作文件夹中的参考材料，再按需进行网络补充。\n- `specified_paths`：只索引 `reference_paths` 中指定的文件夹或文件，再按任务需要补充。\n- `web`：用户没有本地参考材料时使用网络收集。\n\n本地参考路径会写入：\n\n```text\npaper_rewriting_output/reference_materials/source_index.md\n```\n\n辅助脚本：\n\n```powershell\npython src/scripts/reference_inventory.py . --output-dir paper_rewriting_output --mode local_first\n```\n\nPaperSpine 可以读取用户提供的 PDF、下载论文、BibTeX/RIS、模板、笔记、学校或竞赛文档。它不能绕过付费墙或私有数据库权限。\n\n## 引用支持库\n\n`paper-spine-citation` 会生成：\n\n```text\npaper_rewriting_output/citation_support_bank.md\n```\n\n它和优秀论文学习是两件事。样例论文用于学习结构和写法；引用支持库用于为 Introduction、Related Work、Discussion、局限性、应用背景等位置提供可选择的候选引用。\n\n默认行为：\n\n- `citation_target_count`: `20`\n- 候选池：`citation_target_count * 3`，默认是 `60`\n- 近期论文目标：约 `80%` 候选应来自近三年；在 2026 年，简单阈值是 2023 年及以后\n- 每一行候选都必须包含参考文献/BibTeX 风格信息、年份、来源，以及一两句可以支撑正文论述的句子\n\n检查引用库：\n\n```powershell\npython src/scripts/citation_bank_check.py paper_rewriting_output/citation_support_bank.md --target-count 20 --markdown\n```\n\n## 配置 UI\n\nClaude Code 推荐使用：\n\n```text\n/paperspine\n```\n\n当宿主终端允许时，这个命令会自动启动 PaperSpine intake UI。兜底方式是 Python wizard：\n\n```powershell\npython src/scripts/intake_wizard.py\n```\n\n配置完成后会生成：\n\n```text\npaper_rewriting_output/paper_spine_config.json\npaper_rewriting_output/paper_spine_config.md\n```\n\n## 关键产物\n\n一次完整运行不应该只有最终论文，而应该留下完整的可审计写作轨迹：\n\n```text\npaper_rewriting_output/\n  paper_spine_config.json\n  paper_spine_config.md\n  reference_materials/\n    source_index.md\n  research_dossier.md\n  exemplar_learning_dossier.md\n  style_profile.md\n  sota_gap_map.md\n  motivation_options_after_research.md\n  citation_support_bank.md\n  confirmed_motivation.md\n  source_inventory.md\n  evidence_bank.md\n  figure_asset_map.md\n  claim_register.md\n  section_blueprints.md\n  writing_rationale_matrix.md\n  rewrite_matrix.md\n  logic_transfer_audit.md\n  latex_report.md\n  final_artifact_manifest.md\n  final_paper/\n    main.tex\n    references.bib\n    figures/\n    paper.docx              # 可选 Word 输出\n    paper.pdf               # 本机有 LaTeX 编译器时生成\n  translation_package/       # 英文输出时可选\n```\n\n最核心产物是 `writing_rationale_matrix.md`。它必须按照真实论文或报告结构逐单元解释：该单元承担什么功能，如何服务确认后的 motivation，学习了哪些 SOTA 或目标场景样例，使用了哪些证据，最终文本应通过什么检查。\n\n`citation_support_bank.md` 是第二个重要推理产物。它让每个候选引用在进入正文前，都先绑定到一个具体句子级 claim。\n\n## 检查命令\n\n检查产物完整性：\n\n```powershell\npython src/scripts/artifact_check.py paper_rewriting_output --markdown --write\n```\n\n复制到 skill 内部后，也可能以这种形式出现：\n\n```powershell\npython scripts/artifact_check.py paper_rewriting_output --markdown --write\n```\n\n检查 LaTeX：\n\n```powershell\npython src/scripts/latex_guard.py paper_rewriting_output/final_paper/main.tex --markdown\n```\n\n检查 Word：\n\n```powershell\npython src/scripts/word_guard.py paper_rewriting_output/final_paper/paper.docx --markdown\n```\n\n检查本地参考材料索引：\n\n```powershell\npython src/scripts/reference_inventory.py . --output-dir paper_rewriting_output --mode local_first\n```\n\n检查引用候选覆盖：\n\n```powershell\npython src/scripts/citation_bank_check.py paper_rewriting_output/citation_support_bank.md --target-count 20 --markdown\n```\n\n运行项目测试：\n\n```powershell\npython -m unittest discover -s tests\n```\n\n## PaperSpine 试图避免的问题\n\n- 只改句子，不改论文逻辑。\n- 把期刊、会议、课程报告、综述、竞赛论文都按同一种风格写。\n- 没确认 motivation 就开始写。\n- 添加没有证据支撑的 claim。\n- 只输出 `main.tex`，但不解释为什么这样设计文章。\n- 用户要求翻译包时，只翻译一部分中间产物。\n\n## License\n\nMIT License. See [LICENSE](LICENSE).\n\n---\n\n**独立下载:** [paper-spine-humanize](https://github.com/WUBING2023/PaperSpine/tree/main/dist/claude/skills/paper-spine-humanize) — 自包含降 AI 检测率技能，无需完整套件即可独立使用。\n","summary":"PaperSpine 是一个面向 Codex、Claude Code 和 OpenClaw 的论文与报告写作 skill suite，以“motivation”为主线，帮助 agent 在动笔前先学习目标写作场景与优秀样例，并在写作过程中解释与记录每个单元为何要这样规划或修改。它覆盖期刊论文、会议论文、课程/技术报告、综述以及竞赛论文等需要规范结构与渐进打磨的任务类型，并提供分支式的研究、引用、改写、排版（LaTeX）与更新等工作流能力。对需要让写作型 AI 形成稳定、可复用论文写作流程的研究者、学生与技术写作者特别有帮助。仓库同时提供面向不同平台的安装/部署方式，便于按需启用全流程或单独调用各模块。","description":"PaperSpine is a motivation-driven skill for learning from strong academic papers, building a paper’s central argument, and rewriting manuscripts through evidence-aware blueprints, revision matrices, and LaTeX-safe audits.","stars":2086,"language":"Python"},{"owner":"virgiliojr94","repo":"book-to-skill","url":"https://github.com/virgiliojr94/book-to-skill","readme":"<h1 align=\"center\">📚 book-to-skill</h1>\n\n<p align=\"center\">\n  <strong>Turn any technical book, document folder, or collection of sources into a unified Claude Code skill — ready to study, reference, and use while you work.</strong>\n</p>\n\n<p align=\"center\">\n  <img src=\"https://img.shields.io/badge/Claude_Code-Skill-blueviolet?style=for-the-badge\" alt=\"Claude Code Skill\">\n  <img src=\"https://img.shields.io/badge/PDF%20%E2%80%A2%20EPUB%20%E2%80%A2%20DOCX%20%E2%80%A2%20MD%20%E2%80%A2%20HTML%20%E2%80%A2%20RTF%20%E2%80%A2%20MOBI-supported-green?style=for-the-badge\" alt=\"Formats supported\">\n  <img src=\"https://img.shields.io/badge/effort-high-orange?style=for-the-badge\" alt=\"Effort: high\">\n  <img src=\"https://img.shields.io/badge/License-MIT-blue?style=for-the-badge\" alt=\"MIT License\">\n</p>\n\n<p align=\"center\">\n  <a href=\"#-why\">Why</a> ·\n  <a href=\"#-what-it-generates\">What it generates</a> ·\n  <a href=\"#-usage\">Usage</a> ·\n  <a href=\"#-requirements\">Requirements</a> ·\n  <a href=\"#-how-it-works\">How it works</a> ·\n  <a href=\"#-faq\">FAQ</a> ·\n  <a href=\"#-install\">Install</a>\n</p>\n\n---\n\n## 🤔 Why\n\nYou buy a great technical book. You read it once. Three months later you can't remember chapter 7 existed.\n\nThe usual workarounds don't help:\n- 📄 \"Let me just search the PDF\" → you get a list of pages, not answers\n- 🧠 \"I'll ask Claude about this book\" → it either hallucinates or says it doesn't have the content\n- 📝 \"I'll take notes as I read\" → you end up with a 200-line doc you never open again\n\n**book-to-skill solves this by turning the book into a structured skill Claude loads on demand.**\n\nOnce installed, you just type `/your-book-slug replication` and Claude reads the right chapter and answers from the actual content. No hallucination. No digging through PDFs. The book becomes part of your workflow.\n\n---\n\n## 📦 What it generates\n\nRunning `/book-to-skill your-book.pdf` (or a folder, glob, or list of files) creates a full skill at `~/.claude/skills/<slug>/`:\n\n| File | Purpose | Size |\n|------|---------|------|\n| `SKILL.md` | Core mental models + chapter index | ~4,000 tokens |\n| `chapters/ch01-*.md` … | One file per chapter, loaded on-demand | ~1,000 tokens each |\n| `glossary.md` | Every key term, alphabetically sorted with chapter refs | ~1,500 tokens |\n| `patterns.md` | All techniques, algorithms, and design patterns | ~2,000 tokens |\n| `cheatsheet.md` | Decision tables and quick-reference rules | ~1,000 tokens |\n\n**Chapter files are loaded on-demand** — they don't count against the skill budget until you ask about that topic.\n\n---\n\n## 🚀 Usage\n\n```\n/book-to-skill <path-to-document-folder-or-glob>... [skill-name-slug]\n```\n\nSupported document formats: PDF, EPUB, DOCX, TXT, Markdown, reStructuredText, AsciiDoc, HTML, RTF, MOBI/AZW/AZW3.\n\n**Examples:**\n\n```bash\n# Process several files together into a unified skill\n/book-to-skill ~/papers/paper1.pdf ~/notes/export.txt unified-research\n\n# Process all supported files in a folder together\n/book-to-skill ~/workspace/project-docs/ project-knowledge\n\n# Process files matching a glob pattern\n/book-to-skill \"~/books/*.epub\" my-library\n\n# Update/fold new material into an existing skill folder\n/book-to-skill ~/articles/new-paper.pdf ~/.claude/skills/project-knowledge\n```\n\nAfter the skill is created, use it like any other Claude Code skill:\n\n```bash\n/designing-data-intensive-apps                  # load core mental models\n/designing-data-intensive-apps replication      # find and explain a topic\n/designing-data-intensive-apps ch05             # dive into chapter 5\n/designing-data-intensive-apps \"what chapters do you have?\"\n```\n\n---\n\n## 🔧 Requirements\n\nThe extractor tries tools in order per format and uses the first available. If nothing is installed, it tells you which command to run. Plain text, Markdown, reStructuredText and AsciiDoc need no extra deps.\n\n**PDF — choose by book type:**\n\n| Book type | Tool | Install | Speed |\n|-----------|------|---------|-------|\n| Text-heavy (prose, few tables) | `pdftotext` (poppler) | `sudo apt install poppler-utils` | ⚡ instant |\n| Text-heavy fallback | `PyPDF2` | `pip3 install PyPDF2` | ⚡ instant |\n| Text-heavy fallback | `pdfminer.six` | `pip3 install pdfminer.six` | ⚡ instant |\n| **Technical (code, tables, formulas)** | **`docling`** | `pip3 install docling` | ~1.5s/page |\n\n> Before extraction begins, the skill asks you whether the book is **technical** or **text-heavy** and picks the right tool automatically. Docling preserves markdown tables and code blocks; pdftotext is faster for prose-only books.\n\n**EPUB:**\n\n| Tool | Install | Quality |\n|------|---------|---------|\n| `ebooklib` + `beautifulsoup4` | `pip3 install ebooklib beautifulsoup4` | ⭐⭐⭐ Best |\n| stdlib `zipfile` | built-in — no install needed | ⭐⭐ Always available |\n\n**Other formats:**\n\n| Format | Tool | Install |\n|--------|------|---------|\n| DOCX | `python-docx` (fallback: stdlib ZIP/XML) | `pip3 install python-docx` |\n| HTML | `beautifulsoup4` (fallback: stdlib `html.parser`) | `pip3 install beautifulsoup4` |\n| RTF | `striprtf` (fallback: regex) | `pip3 install striprtf` |\n| MOBI / AZW / AZW3 | Calibre `ebook-convert` (external app, not pip) | https://calibre-ebook.com/download |\n| TXT / Markdown / reStructuredText / AsciiDoc | built-in | — |\n\n---\n\n## ⚙️ How it works\n\n```\nOne file · a folder · a glob · a list of paths\n     │\n     ▼\nStep 1.5 — \"Technical or text-heavy book?\"\n     │\n     ├── technical → Docling  (tables + code blocks as markdown, ~1.5s/page)\n     └── text      → pdftotext → PyPDF2 → pdfminer  (instant)\n     │\n     ▼\nscripts/extract.py <paths…> --mode <technical|text>\n  per source: PDF → pdftotext/Docling · EPUB → ebooklib → stdlib zipfile · DOCX/HTML/RTF/…\n  (one bad source is skipped with a warning; the rest still process)\n     │\n     ├── /tmp/book_skill_work/full_text.txt   (all sources merged, with source markers)\n     └── /tmp/book_skill_work/metadata.json   (aggregated stats + per-source array)\n               │\n               ▼\n          Claude analyzes structure\n          (title, author, chapters, ToC — spanning all sources)\n          ── or, if targeting an existing skill: folds new content in (Mode 4)\n               │\n               ▼\n          Generates per-chapter summaries  (800–1,200 tokens each)\n          technical → includes Code Examples + Reference Tables sections\n          Generates glossary, patterns, cheatsheet\n          Generates master SKILL.md with core mental models\n               │\n               ▼\n          ~/.claude/skills/<slug>/  ✅ written\n          /tmp/book_skill_work/     🗑️  cleaned up\n```\n\n**Extraction benchmark** (103-page technical book, CPU only):\n\n| Method | Time | Tokens | Tables | Code blocks |\n|--------|------|--------|--------|-------------|\n| pdftotext | 0.1s | 27K | 0 | 0 |\n| Docling | 164s | 27K (+1.2%) | 48 | 36 |\n\n<details>\n<summary>Design principles (click to expand)</summary>\n\n1. **Density over completeness** — a 1,000-token summary beats a 10,000-token excerpt\n2. **Practitioner voice** — \"Use X when Y\", not \"The book explains X\"\n3. **Front-loaded SKILL.md** — compaction keeps the first ~5,000 tokens; the most important content comes first\n4. **On-demand chapters** — the topic index tells Claude which file to read; chapters load only when needed\n5. **Never raw text** — always synthesize, summarize, extract signal from the source\n\n</details>\n\n---\n\n## ❓ FAQ\n\n**\"Can't I just dump the PDF/EPUB into my Claude project context?\"**\n\nYou can — but every conversation will burn that token budget upfront. A 400-page book is ~200K tokens. With a skill, only the chapters relevant to your question load. The rest stays on disk until you need it.\n\nMore importantly: raw text injection is retrieval. A skill is reasoning. When you load a chapter file, Claude isn't searching for keyword matches — it's working with pre-extracted named frameworks, principles, and mental models structured for application, not for reading.\n\n---\n\n**\"Isn't this just RAG?\"**\n\nRAG works at query time: chunk the book → embed everything → find similar vectors → inject into prompt. It's optimized for \"find me the part that talks about X.\"\n\nbook-to-skill works at compile time: one deep analysis run extracts the author's actual frameworks, names them, describes when to use each, captures the anti-patterns. The output is structure the author spent years building — not a similarity search over their sentences.\n\nRAG answers: *\"here are chunks close to your query.\"*  \nA skill answers: *\"here are the 12 frameworks this author built, ready to reason with.\"*\n\nFor searching across 50+ books, RAG wins. For going deep on one book and using its frameworks while you work, a skill wins.\n\n---\n\n**\"Popular books are already in Claude's training data. Why bother?\"**\n\nFor widely-known books (Clean Code, DDIA, Pragmatic Programmer), Claude has general knowledge — but it's compressed, averaged across the entire internet's discussion of the book, and may hallucinate specific quotes or chapter locations.\n\nbook-to-skill works from your actual copy. Every framework name, every anti-pattern list, every chapter number is grounded in the text you provided. No training data drift, no hallucinated chapter titles.\n\nIt also shines for books Claude doesn't know at all: niche technical references, internal company documentation, recent publications, translated works.\n\n---\n\n**\"NotebookLM handles multiple books better.\"**\n\nAbsolutely true — if your workflow is \"I have 80 separate books and I want to search across all of them,\" NotebookLM is the right tool.\n\nbook-to-skill is built for a different job: you want to go deep on a specific topic or library, having multiple related documents (papers, chapters, notes) folded into a single unified skill, and even updating it over time as new material arrives! This integrates your customized knowledge base right into your coding or writing workflow, rather than in a separate browser tab.\n\n---\n\n## 📥 Install\n\nCopy this into your Claude Code session:\n\n```\nInstall book-to-skill: https://raw.githubusercontent.com/virgiliojr94/book-to-skill/master/SKILL.md\n```\n\nOr manually using standard `git clone` (ensures modular engine files are fetched correctly):\n\n```bash\ngit clone https://github.com/virgiliojr94/book-to-skill.git ~/.claude/skills/book-to-skill\n```\n\nThen in any Claude Code session:\n\n```bash\n/book-to-skill ~/path/to/your-book.pdf\n# or\n/book-to-skill ~/path/to/your-book.epub\n```\n\n---\n\n## 📁 Repository structure\n\n```\nbook-to-skill/\n├── SKILL.md              # Skill definition + step-by-step instructions\n├── scripts/\n│   ├── extract.py        # Thin entrypoint wrapper\n│   └── extractor/        # Modular extraction package\n│       ├── __init__.py\n│       ├── config.py     # Extensions, paths, dependency constants\n│       ├── dependencies.py\n│       ├── exceptions.py # ExtractionError (per-source failures, batch-safe)\n│       ├── utils.py      # CLI parsing, multi-source resolution, runner\n│       └── parsers/      # Format-specific parsers (pdf, epub, docx, html, rtf, calibre, text)\n├── tests/\n│   └── test_extractor.py # Test suite (multi-source, batch resilience, EPUB, parsers)\n└── README.md             # This file\n```\n\n---\n\n## License\n\nMIT\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=virgiliojr94%2Fbook-to-skill&type=date&legend=top-left\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=virgiliojr94/book-to-skill&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=virgiliojr94/book-to-skill&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=virgiliojr94/book-to-skill&type=date&legend=top-left\" />\n </picture>\n</a>\n","summary":"book-to-skill turns technical books and document collections (PDF/EPUB/DOCX/TXT/MD/reStructuredText/AsciiDoc/HTML/RTF/MOBI, including folders, globs, and lists) into a structured Claude Code “skill” that preserves the source content. It generates a reusable skill package with a core SKILL.md plus per-chapter markdown files, a glossary, patterns, and a cheatsheet, with chapter content loaded on demand to avoid wasting the skill budget. Instead of searching PDFs manually or asking Claude without the text present, you can query with commands like `/your-book-slug replication` or dive into specific chapters for accurate, source-grounded answers. This is most useful for researchers, engineers, students, and anyone who wants to study, reference, and operationalize large technical materials as part of their day-to-day workflow.","description":"Turn any technical book PDF into a Claude Code skill — ready to study, reference, and use while you work.","stars":4147,"language":"Python"},{"owner":"anysearch-ai","repo":"anysearch-skill","url":"https://github.com/anysearch-ai/anysearch-skill","readme":"# AnySearch Skill\n\nUnified real-time search engine skill for AI agents. Supports general web search, vertical domain search, parallel batch search, and full-page content extraction.\n\n## Download & Install\n\n### For AI Agents\n\nIf your agent platform supports a skill marketplace/store, search for **anysearch** and install from there. Otherwise, download and install manually:\n\n```bash\n# Download (pin to a specific release version)\ncurl -L -o anysearch-skill.zip https://github.com/anysearch-ai/anysearch-skill/archive/refs/heads/main.zip\n# or: wget -O anysearch-skill.zip https://github.com/anysearch-ai/anysearch-skill/archive/refs/heads/main.zip\n\n# Verify integrity (replace with actual checksum from the release page)\n# sha256sum anysearch-skill.zip\n\n# Unzip\nunzip anysearch-skill.zip\n\n# Move to your agent's skill directory (example paths below, adjust for your agent)\n# Claude Code:    mv anysearch-skill ~/.claude/skills/anysearch\n# OpenCode:       mv anysearch-skill ~/.config/opencode/skills/anysearch\n# Cursor/Windsurf: mv anysearch-skill <project>/.skills/anysearch\n# Generic:        mv anysearch-skill <your_agent_skill_dir>/anysearch\n# Shared agents:  mv anysearch-skill ~/.agents/skills/anysearch\n```\n\n`~/.agents/skills/` is a useful shared install location when multiple AI tools read from the same skill directory, including Codex, Cursor, and OpenClaw personal agent skills.\n\n### For Humans\n\n1. Download the zip: https://github.com/anysearch-ai/anysearch-skill/archive/refs/heads/main.zip\n2. Unzip to your agent's skill directory\n3. Configure API key (see below)\n4. Run the entry test to verify installation\n\n## API Key Configuration\n\nAn API key is **optional but strongly recommended**. Without a key, you can still use all search features via anonymous access, but with **lower rate limits and quota**.\n\n### How to configure\n\nCopy the example env file and fill in your key:\n\n```bash\ncp .env.example .env\n# Edit .env and set: ANYSEARCH_API_KEY=<your_api_key_here>\n```\n\nOr set the environment variable directly:\n\n```bash\nexport ANYSEARCH_API_KEY=<your_api_key_here>   # Linux/macOS\nset ANYSEARCH_API_KEY=<your_api_key_here>       # Windows CMD\n$env:ANYSEARCH_API_KEY=\"<your_api_key_here>\"    # Windows PowerShell\n```\n\n### Get an API Key\n\nVisit https://anysearch.com/console/api-keys to sign up and create a free API key.\n\nKey priority order: `--api_key` CLI flag > `.env` file > environment variable > anonymous\n\n## Post-Install Verification\n\nAfter installation, probe the platform and run the entry test:\n\n### Step 1: Detect available runtime\n\nRun these checks in order. The first success determines the active CLI:\n\n```bash\n# Check Python (recommended)\npython --version   # Need >= 3.6, requires `requests` library\npython3 --version  # Need >= 3.6, requires `requests` library\n# Check Node.js (alternative)\nnode --version     # Need >= 12, no external dependencies\n# Check Shell (fallback)\n# Windows: PowerShell 5.1+ / Linux/macOS: bash 4+\n```\n\nPriority: **Python > Node.js > Shell**\n\nImportant: do not assume `python` exists. On many macOS systems, the correct executable is `python3`. Check both `python` and `python3`; if either works, Python is available.\n\n### Step 2: Run entry test (probe all available runtimes)\n\nRun the `doc` command with **each available** runtime to verify the skill works, and observe which runs without errors or warnings:\n\n```bash\n# Python\npython <skill_dir>/scripts/anysearch_cli.py doc\n\n# Python 3 fallback (common on macOS)\npython3 <skill_dir>/scripts/anysearch_cli.py doc\n\n# Node.js (if available)\nnode <skill_dir>/scripts/anysearch_cli.js doc\n\n# PowerShell (Windows)\npowershell -ExecutionPolicy Bypass -File <skill_dir>/scripts/anysearch_cli.ps1 doc\n\n# Bash (Linux/macOS)\nbash <skill_dir>/scripts/anysearch_cli.sh doc\n```\n\nFor each runtime, record whether the command succeeded and any errors/warnings encountered. The runtime that completes without errors and produces the cleanest output is the recommended runtime for this environment.\n\n### Step 3: Persist recommended runtime to configuration file\n\nBased on the entry test results, write the recommended runtime to `<skill_dir>/runtime.conf`:\n\n```bash\necho \"Runtime: <RUNTIME>\" > <skill_dir>/runtime.conf\necho \"Command: <COMMAND>\" >> <skill_dir>/runtime.conf\n```\n\nExample for Python:\n\n```bash\necho \"Runtime: Python\" > <skill_dir>/runtime.conf\necho \"Command: python <skill_dir>/scripts/anysearch_cli.py\" >> <skill_dir>/runtime.conf\n```\n\nExample for Python 3:\n\n```bash\necho \"Runtime: Python\" > <skill_dir>/runtime.conf\necho \"Command: python3 <skill_dir>/scripts/anysearch_cli.py\" >> <skill_dir>/runtime.conf\n```\n\nExample for Node.js:\n\n```bash\necho \"Runtime: Node.js\" > <skill_dir>/runtime.conf\necho \"Command: node <skill_dir>/scripts/anysearch_cli.js\" >> <skill_dir>/runtime.conf\n```\n\nExample for PowerShell:\n\n```bash\necho \"Runtime: PowerShell\" > <skill_dir>/runtime.conf\necho \"Command: powershell -ExecutionPolicy Bypass -File <skill_dir>/scripts/anysearch_cli.ps1\" >> <skill_dir>/runtime.conf\n```\n\nExample for Bash:\n\n```bash\necho \"Runtime: Bash\" > <skill_dir>/runtime.conf\necho \"Command: bash <skill_dir>/scripts/anysearch_cli.sh\" >> <skill_dir>/runtime.conf\n```\n\n**Important:** Runtime preferences are stored in `runtime.conf`, NOT in SKILL.md. The agent reads `runtime.conf` on skill load to determine the active CLI. If the file is missing or corrupted, the agent falls back to the Platform Detection procedure in SKILL.md. If `runtime.conf` already exists, replace it instead of appending.\n\n### Routine agent usage\n\nAfter `runtime.conf` exists, agents should use the stored `Command` directly for routine calls instead of running `doc` before every search. For example, if `runtime.conf` contains `Command: python3 <skill_dir>/scripts/anysearch_cli.py`, use:\n\n```bash\npython3 <skill_dir>/scripts/anysearch_cli.py search \"query\" --max_results 5\npython3 <skill_dir>/scripts/anysearch_cli.py batch_search --queries '[{\"query\":\"q1\",\"max_results\":5},{\"query\":\"q2\",\"max_results\":5}]'\npython3 <skill_dir>/scripts/anysearch_cli.py extract \"https://example.com/page\"\npython3 <skill_dir>/scripts/anysearch_cli.py extract --url \"https://example.com/page\"\n```\n\n`extract` output is already Markdown. Do not pass `--format markdown`, `--format json`, or `--markdown`; the extract command only accepts the URL positional argument or `--url`/`-u`. If a subcommand argument is unclear or fails, run `<command> <subcommand> --help` for that subcommand rather than the full `doc` command.\n\n### Step 4 (optional): Test a real search\n\n```bash\npython <skill_dir>/scripts/anysearch_cli.py search \"hello world\" --max_results 1\n```\n\nIf your system does not provide `python`, use:\n\n```bash\npython3 <skill_dir>/scripts/anysearch_cli.py search \"hello world\" --max_results 1\n```\n\nA successful JSON response confirms the API connection is working.\n\n## File Structure\n\n```\nanysearch/\n├── .env.example              # API key configuration template\n├── .env                      # Your API key (gitignored, create from .env.example)\n├── runtime.conf              # Detected runtime preferences (gitignored)\n├── runtime.conf.example      # Runtime configuration template\n├── SKILL.md                  # Skill definition for AI agents\n├── README.md                 # This file\n└── scripts/\n    ├── anysearch_cli.py       # Python CLI\n    ├── anysearch_cli.js       # Node.js CLI\n    ├── anysearch_cli.ps1      # PowerShell CLI\n    └── anysearch_cli.sh       # Bash CLI\n```\n","summary":"anysearch-ai/anysearch-skill provides a unified, real-time search “skill” that AI agents can use for both general web search and vertical, domain-specific search. It also supports parallel batch searching and full-page content extraction, making it useful for research, summarization, and retrieval-augmented workflows. The project is designed to be installed into popular agent environments or used manually, with optional API key support to improve rate limits and quota. It’s a good fit for developers and teams building AI agents that need reliable search and content fetching without implementing their own search integration.","description":"Unified real-time search engine skill for AI agents. ","stars":2390,"language":"Python"},{"owner":"Nutlope","repo":"hallmark","url":"https://github.com/Nutlope/hallmark","readme":"# Hallmark\n\n**A design skill for Claude Code, Cursor, and Codex that refuses to look AI-generated.**\n\n[Live demo →](https://www.usehallmark.com) &nbsp;·&nbsp; twenty themes &nbsp;·&nbsp; four verbs &nbsp;·&nbsp; press `T` to cycle.\n\nMade by Together AI.\n\n<p align=\"center\">\n  <img src=\"site/OG-hallmark.png\" alt=\"Hallmark, a design skill that refuses to look AI-generated\" />\n</p>\n\nHallmark picks a macrostructure for the brief, dresses it in one of twenty themes, runs fifty-seven slop-test gates plus a pre-emit self-critique, and refuses the on-distribution defaults every LLM was trained into. Two pages by Hallmark for two different briefs feel like different sites, not colour-swaps of the same template.\n\n---\n\n## Four verbs\n\n| Verb | What it does |\n| --- | --- |\n| *(default)* | Build new UI. Picks a macrostructure, applies the rule-set, runs the slop test before handing back. |\n| `hallmark audit <target>` | Score existing code against the anti-patterns. Punch list, no edits. |\n| `hallmark redesign <target>` | Throw out the structure, keep copy + IA + brand, rebuild with a different fingerprint. |\n| `hallmark study <screenshot \\| URL>` | Extract the **DNA** from a design you admire: macrostructure, type-pairing, colour anchor. Refuses pixel-clones and paid templates. Optionally emits a portable `design.md` for handoff to other AI tools. |\n\n---\n\n## Different briefs, different shapes\n\nEach generated from a different brief. The skill picks the theme, structure, and craft to fit each one, not from a template.\n\n<table>\n  <tr>\n    <td width=\"25%\"><a href=\"https://www.usehallmark.com/examples/hum-07/\"><img src=\"docs/screenshots/hero-hum-07.jpg\" alt=\"Bubble guided sourdough app hero\" /></a></td>\n    <td width=\"25%\"><a href=\"https://www.usehallmark.com/examples/cobalt-01/\"><img src=\"docs/screenshots/hero-cobalt-01.jpg\" alt=\"Distil content-extraction API hero\" /></a></td>\n    <td width=\"25%\"><a href=\"https://www.usehallmark.com/examples/carnival-01/\"><img src=\"docs/screenshots/hero-carnival-01.jpg\" alt=\"Cold Snap record-label EP hero\" /></a></td>\n    <td width=\"25%\"><a href=\"https://www.usehallmark.com/examples/lumen-01/\"><img src=\"docs/screenshots/hero-lumen-01.jpg\" alt=\"Cinder AI reasoning tool hero\" /></a></td>\n  </tr>\n  <tr>\n    <td><b>Bubble</b><br/><sub>Sourdough app · Hum</sub></td>\n    <td><b>Distil</b><br/><sub>Extraction API · Cobalt</sub></td>\n    <td><b>Cold Snap</b><br/><sub>Record label · Carnival</sub></td>\n    <td><b>Cinder</b><br/><sub>AI tool · Lumen</sub></td>\n  </tr>\n  <tr>\n    <td><a href=\"https://www.usehallmark.com/examples/custom-03/\"><img src=\"docs/screenshots/hero-custom-03.jpg\" alt=\"Ferns and Fathom tea menu hero\" /></a></td>\n    <td><a href=\"https://www.usehallmark.com/examples/garden-01/\"><img src=\"docs/screenshots/hero-garden-01.jpg\" alt=\"Hollowback Apiary honey farm hero\" /></a></td>\n    <td><a href=\"https://www.usehallmark.com/examples/riso-01/\"><img src=\"docs/screenshots/hero-riso-01.jpg\" alt=\"Off-Register risograph print fair hero\" /></a></td>\n    <td><a href=\"https://www.usehallmark.com/examples/press-01/\"><img src=\"docs/screenshots/hero-press-01.jpg\" alt=\"Press Quaternary type studio hero\" /></a></td>\n  </tr>\n  <tr>\n    <td><b>Ferns &amp; Fathom</b><br/><sub>Tea menu · Custom</sub></td>\n    <td><b>Hollowback Apiary</b><br/><sub>Honey farm · Garden</sub></td>\n    <td><b>Off-Register</b><br/><sub>Print fair · Riso</sub></td>\n    <td><b>Press Quaternary</b><br/><sub>Type studio · Custom</sub></td>\n  </tr>\n  <tr>\n    <td><a href=\"https://www.usehallmark.com/examples/tally/\"><img src=\"docs/screenshots/hero-tally.jpg\" alt=\"Tally SaaS product page hero\" /></a></td>\n    <td><a href=\"https://www.usehallmark.com/examples/wayfare/\"><img src=\"docs/screenshots/hero-wayfare.jpg\" alt=\"Wayfare travel booking hero\" /></a></td>\n    <td><a href=\"https://www.usehallmark.com/examples/najm/\"><img src=\"docs/screenshots/hero-najm.jpg\" alt=\"NAJM Moroccan fashion brand hero\" /></a></td>\n    <td><a href=\"https://www.usehallmark.com/examples/hyperlane/\"><img src=\"docs/screenshots/hero-hyperlane.jpg\" alt=\"Hyperlane developer infrastructure hero\" /></a></td>\n  </tr>\n  <tr>\n    <td><b>Tally</b><br/><sub>SaaS · modern-minimal</sub></td>\n    <td><b>Wayfare</b><br/><sub>Travel · atmospheric</sub></td>\n    <td><b>NAJM</b><br/><sub>Fashion brand</sub></td>\n    <td><b>Hyperlane</b><br/><sub>Dev infrastructure</sub></td>\n  </tr>\n</table>\n\nEach page is self-contained HTML + CSS, stamped with its macrostructure in the CSS comment. Browse the full set at [usehallmark.com](https://www.usehallmark.com) or under [`site/_tests/`](site/_tests/).\n\n---\n\n## Custom <sup>NEW</sup>\n\nWhen a brief carries creative intent that no catalog theme fits, Hallmark switches to **Custom** and designs the page from scratch: a made-to-measure palette, type, and layout. Same 57 slop-test gates, no template underneath.\n\n<table>\n  <tr>\n    <td width=\"50%\"><a href=\"https://www.usehallmark.com/examples/custom-02/\"><img src=\"docs/screenshots/hero-custom-02.jpg\" alt=\"The Cascadia Nightjar sleeper-train ticket hero\" /></a></td>\n    <td width=\"50%\"><a href=\"https://www.usehallmark.com/examples/custom-04/\"><img src=\"docs/screenshots/hero-custom-04.jpg\" alt=\"The Mend Assembly repair-café broadsheet hero\" /></a></td>\n  </tr>\n  <tr>\n    <td><b>The Cascadia Nightjar</b><br/><sub>Sleeper-train ticket · Custom</sub></td>\n    <td><b>The Mend Assembly</b><br/><sub>Repair-café broadsheet · Custom</sub></td>\n  </tr>\n</table>\n\nIt stays a quiet branch; vanilla briefs never see it. The protocol lives in [`custom-theme.md`](skills/hallmark/references/custom-theme.md).\n\n---\n\n## Install\n\n```\nnpx skills add nutlope/hallmark\n```\n\nRe-run any time to update. Or copy [`SKILL.md`](skills/hallmark/SKILL.md) + [`references/`](skills/hallmark/references/) into:\n\n- **Claude Code**: `~/.claude/skills/hallmark/`\n- **Cursor**: `.cursor/rules/hallmark.mdc` (body of `SKILL.md`, no frontmatter)\n- **Codex**: `~/.codex/skills/hallmark/` (personal) or `.codex/skills/hallmark/` (project-scoped)\n\nThe rule-set lives in [`SKILL.md`](skills/hallmark/SKILL.md) and [`references/`](skills/hallmark/references/). Worked examples in [`docs/recipes.md`](docs/recipes.md) and [`docs/study-examples.md`](docs/study-examples.md).\n\n---\n\n## Licence\n\nMIT. Use it, fork it, ship it.\n","summary":"Hallmark is a “design skill” for Claude Code, Cursor, and Codex that generates UI layouts intended to look human-made and not template-like or AI-generated. It uses a configurable set of macrostructures and themes, running multiple anti-“slop” validation gates and a self-critique before producing output, with functionality designed to avoid the uniform patterns LLMs commonly default to. The project includes commands to build new UI from briefs, audit existing UI for anti-patterns without making edits, redesign while preserving copy/IA/brand, and study an admired design to extract its “DNA” (optionally exporting a portable `design.md`). It’s most useful for teams and designers/developers who want faster, more distinctive landing pages and product UI that still feel craft-driven rather than generic.","description":"Anti-AI-slop design skill for Claude Code, Cursor, and Codex.","stars":2670,"language":"CSS"},{"owner":"jherrodthomas","repo":"automotive-skills-suite","url":"https://github.com/jherrodthomas/automotive-skills-suite","readme":"<div align=\"center\">\n\n# Automotive Engineering Suite\n\n**152 installable Claude skills covering automotive safety, cybersecurity, quality, communication, diagnostics, AUTOSAR, calibration, MBSE, SysML, and V&V**\n\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](LICENSE)\n[![Skills](https://img.shields.io/badge/Skills-152-blue)](skills/)\n[![Standards](https://img.shields.io/badge/Standards-ISO%2026262%20%7C%2021434%20%7C%2021448%20%7C%20IATF%2016949%20%7C%20ASPICE%20%7C%20AUTOSAR%20%7C%20ISO%2014229%20%7C%20SysML-green)]()\n[![Chain](https://img.shields.io/badge/Chain-Builder%20%2B%20Reviewer%20pairs-orange)]()\n[![Made for](https://img.shields.io/badge/Made%20for-Claude-purple)](https://claude.com)\n\nEvery artifact-producing skill is paired with a confirmation reviewer. Reviewer outputs include a visual dashboard with KPI tiles, charts, and findings tables.\n\n[Quickstart](#quickstart) · [The Chain](#the-chain) · [Skills](#skills) · [Standards](#standards-covered) · [Why](#why)\n\n</div>\n\n---\n\n## What this is\n\nA curated set of 76 builder skills + 76 matching confirmation reviewer skills that automate the structured xlsx deliverables required across the automotive engineering lifecycle:\n\n- **ISO 26262** functional safety (concept → HW → SW → safety case)\n- **ISO/SAE 21434** cybersecurity (TARA → goals → concept → architecture → IR plan)\n- **ISO 21448 SOTIF** for ADAS/AV (analysis → triggering conditions → validation strategy)\n- **AIAG-VDA quality** (APQP → DFMEA → PFMEA → Control Plan → PPAP)\n- **Automotive SPICE** (assessment → gap analysis → improvement → evidence)\n- **Communication protocols** (DBC / LDF / ARXML / FlexRay / Automotive Ethernet / K-Matrix / bus load / gateway routing)\n- **Diagnostics** (UDS / DTC catalog / CDD / ODX / DEM)\n- **AUTOSAR** (Classic SWC, Composition, BSW, RTE; Adaptive applications)\n- **Calibration** (A2L / DCM / cross-supplier exchange)\n- **MBSE** (ARCADIA model architecture, requirements allocation, system context)\n- **SysML** (block diagram, requirement diagram, activity diagram, state machine)\n- **V&V** (verification plan, validation plan, test case catalog, traceability matrix, V&V execution report)\n- **Chain-integrated program management** (risk register, gate review, WP roll-up, change impact, lessons learned)\n- **Continuous improvement** (8D, 5-Why, fishbone, MSA Gauge R&R, SPC)\n\nEach skill is an installable `.skill` file. The chain is the moat — every downstream skill consumes the upstream skill's xlsx output as a stable file-format contract.\n\n## Quickstart\n\n1. Download the skill you need from `skills/` (or the full bundle from Releases)\n2. Click \"Save skill\" in Cowork / Claude Desktop to install\n3. Trigger by phrasing — every skill declares its triggering description in its frontmatter\n\n```bash\n# Example: install the HARA builder, then ask Claude\n\"Build a HARA for a new ECU project — Electronic Stability Control\"\n```\n\n## The chain\n\n```\nItem Definition → Safety Plan → DIA\n        ↓\n      HARA → FSC → TSC\n        ↓                ↓\n   HW Lane         SW Lane\n   ↓ ↓ ↓ ↓         ↓ ↓ ↓ ↓\nHW-SR  Arch  HSI  FMEDA   SW-SR  Arch  FMEA  HSI\n        ↓                ↓\n            Safety Case (capstone)\n\nParallel chains:\nTARA → CS Goals → CS Concept → CS Architecture → IR Plan + Secure Coding   (ISO/SAE 21434)\nSOTIF Analysis → Triggering Conditions → Validation Strategy                  (ISO 21448)\nAPQP Plan → DFMEA → PFMEA → Control Plan → PPAP Package                       (IATF 16949)\nASPICE Assessment → Gap Analysis → Improvement Plan → Process Evidence        (ASPICE PAM)\n```\n\nEvery box above has a builder skill AND a matching reviewer skill.\n\n## Skills\n\n### Foundation (3 builder/reviewer pairs)\n| Skill | Standard |\n|-------|----------|\n| `item-definition-builder` + reviewer | ISO 26262-3 §5 |\n| `safety-plan-builder` + reviewer | ISO 26262-2 §6 |\n| `dia-builder` + reviewer | ISO 26262-8 §5 |\n\n### ISO 26262 Concept Phase (3 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `hara-builder` + reviewer | Hazard Analysis with 14 malfunction guide words and Cartesian (function × malfunction × environment) |\n| `fsc-builder` + reviewer | FTA per safety goal with visual fault tree rendering, FSR derivation, ASIL decomposition |\n| `tsc-builder` + reviewer | HW-TSR/SW-TSR with safety mechanisms, HSI scaffold, system FMEA, DFA, draw.io architecture diagram |\n\n### ISO 26262 HW Lane (4 pairs, Part 5)\n| Skill | What it produces |\n|-------|------------------|\n| `hw-safety-reqs-builder` + reviewer | HW Safety Requirements derived from HW-TSRs |\n| `hw-architecture-builder` + reviewer | Refined HW architecture (PCB / IC / package) with safety mechanism allocation |\n| `hsi-builder` + reviewer | Contract-grade HW-SW Interface with C header generation |\n| `fmeda-builder` + reviewer | Formula-driven SPFM/LFM/PMHF with auto-verification against per-ASIL targets |\n\n### ISO 26262 SW Lane (4 pairs, Part 6)\n| Skill | What it produces |\n|-------|------------------|\n| `sw-arch-builder` + reviewer | SW architecture with RTOS, scheduling, MPU partitioning, MISRA targets |\n| `sw-sr-builder` + reviewer | SW Safety Requirements with verification methods per ASIL |\n| `sw-fmea-builder` + reviewer | Software FMEA with qualitative residual risk per ASIL threshold |\n| `sw-hsis-builder` + reviewer | SW-side HSI with handler functions and C header |\n\n### ISO 26262 Capstone\n| Skill | What it produces |\n|-------|------------------|\n| `safety-case-builder` + reviewer | GSN-style argument pulling evidence from all upstream artifacts |\n\n### ISO/SAE 21434 Cybersecurity (6 pairs, UN R155 mandated)\n| Skill | What it produces |\n|-------|------------------|\n| `tara-builder` + reviewer | Threat Analysis with STRIDE coverage and Risk Value lookup |\n| `cs-goals-builder` + reviewer | Cybersecurity Goals with CAL assignment |\n| `cs-concept-builder` + reviewer | CSR derivation per cybersecurity property |\n| `cs-architecture-builder` + reviewer | Cryptographic inventory, key management, secure boot chain |\n| `incident-response-plan-builder` + reviewer | PSIRT plan with UN R155 / ENISA / NHTSA notification deadlines |\n| `secure-coding-guidelines-builder` + reviewer | CERT C + MISRA Amendment 1 + AUTOSAR C++14 secure subset |\n\n### ISO 21448 SOTIF (3 pairs, ADAS / AV)\n| Skill | What it produces |\n|-------|------------------|\n| `sotif-analysis-builder` + reviewer | ODD, performance limitations, scenario quadrant classification |\n| `triggering-conditions-builder` + reviewer | Environmental / sensor / road / road-user / system / driver triggering conditions |\n| `sotif-validation-strategy-builder` + reviewer | Real-world / simulation / proving ground / field monitoring campaign |\n\n### AIAG-VDA Quality (5 pairs, IATF 16949)\n| Skill | What it produces |\n|-------|------------------|\n| `apqp-plan-builder` + reviewer | 5-phase product quality plan with gate reviews |\n| `dfmea-builder` + reviewer | Design FMEA per AIAG-VDA 2019 (Action Priority replaces RPN) |\n| `pfmea-builder` + reviewer | Process FMEA per AIAG-VDA 2019 |\n| `control-plan-builder` + reviewer | Production Control Plan with SPC / 100% / mistake-proofing / audit |\n| `ppap-package-builder` + reviewer | 18-element PPAP submission with PSW |\n\n### Automotive SPICE (4 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `aspice-assessment-builder` + reviewer | Per-process Capability Level scoring per PAM 3.1 |\n| `aspice-gap-analysis-builder` + reviewer | Gaps to target CL with severity classification |\n| `aspice-improvement-plan-builder` + reviewer | Improvement roadmap with KPIs |\n| `aspice-process-evidence-builder` + reviewer | Per-process evidence package |\n\n### Continuous Improvement (5 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `8d-problem-solving-builder` + reviewer | 8D method (D1-D8) for warranty / customer complaint |\n| `5-why-builder` + reviewer | 5-Why root cause analysis |\n| `fishbone-builder` + reviewer | Ishikawa (6Ms) cause-and-effect with auto-Mermaid diagram |\n| `msa-gage-rr-builder` + reviewer | AIAG MSA 4th edition with Anova-based Gauge R&R |\n| `spc-chart-builder` + reviewer | SPC with Cpk capability and Western Electric / Nelson rules |\n\n### Communication protocols (8 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `dbc-builder` + reviewer | Vector DBC (CAN database) with messages, signals, ECUs, multiplexed groups |\n| `ldf-builder` + reviewer | LIN Description File per ISO 17987 / LIN 2.2A |\n| `arxml-system-builder` + reviewer | AUTOSAR system extract (ECUs, system mappings, comm stack, port interfaces) |\n| `communication-matrix-builder` + reviewer | K-Matrix across CAN / CAN FD / LIN / FlexRay / Automotive Ethernet |\n| `bus-load-analysis-builder` + reviewer | Bandwidth utilization with worst-case and fault-injection scenarios |\n| `gateway-routing-builder` + reviewer | Cross-bus signal / PDU / frame routing with latency and security rules |\n| `flexray-config-builder` + reviewer | FlexRay cluster config per ISO 17458 (static + dynamic segments) |\n| `automotive-ethernet-builder` + reviewer | 100BASE-T1 / 1000BASE-T1 with SOME/IP, AVB, TSN, VLAN |\n\n### Diagnostics (5 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `uds-services-builder` + reviewer | UDS service catalog per ISO 14229-1 with DIDs, RIDs, security access |\n| `dtc-catalog-builder` + reviewer | DTC catalog per ISO 14229 / SAE J2012 with snapshots, extended data |\n| `cdd-builder` + reviewer | Vector CANdela diagnostic database authoring |\n| `odx-builder` + reviewer | ODX per ISO 22901-1 with base / derived variants and PDU library |\n| `dem-config-builder` + reviewer | AUTOSAR DEM config with debounce, healing, NvM, OBD freeze frame |\n\n### AUTOSAR (5 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `autosar-swc-builder` + reviewer | AUTOSAR Classic SWC with ports, runnables, events, exclusive areas |\n| `autosar-composition-builder` + reviewer | Composition SWC with assembly + delegation connectors |\n| `autosar-bsw-config-builder` + reviewer | BSW config: MCAL, ECU Abstraction, Service Layer, Complex Drivers |\n| `autosar-rte-mapping-builder` + reviewer | RTE mapping: signal-to-port, runnable-to-task, exclusive area binding |\n| `autosar-adaptive-app-builder` + reviewer | AUTOSAR Adaptive app + service + machine manifests, ara::com / ara::exec |\n\n### Calibration (3 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `a2l-builder` + reviewer | A2L per ASAM MCD-2 MC v1.7 (characteristics, measurements, conversions) |\n| `dcm-builder` + reviewer | ETAS DCM dataset for cross-tool calibration value exchange |\n| `calibration-data-exchange-builder` + reviewer | OEM ↔ Tier-1 calibration ownership and exchange agreement |\n\n### MBSE (3 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `mbse-model-architecture-builder` + reviewer | ARCADIA-style operational / system / logical / physical layers |\n| `mbse-requirements-allocation-builder` + reviewer | Requirements decomposition with satisfy / derive / verify relationships |\n| `mbse-system-context-builder` + reviewer | System boundary, actors, use cases, stakeholder needs |\n\n### SysML (4 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `sysml-block-diagram-builder` + reviewer | BDD / IBD with blocks, parts, ports, connectors, item flows |\n| `sysml-requirement-diagram-builder` + reviewer | Requirement blocks with derive / satisfy / verify / refine relationships |\n| `sysml-activity-diagram-builder` + reviewer | Activities, control / object flows, decision / fork / join, swim-lanes |\n| `sysml-state-machine-builder` + reviewer | States, transitions with guards / effects, regions, history pseudo-states |\n\n### V&V (5 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `verification-plan-builder` + reviewer | Verification Plan per ISO 26262-8 §9 / IEEE 1012 |\n| `validation-plan-builder` + reviewer | Item Validation Plan per ISO 26262-4 §9 |\n| `test-case-catalog-builder` + reviewer | Test cases with preconditions, inputs, expected outputs, traceability |\n| `traceability-matrix-builder` + reviewer | Bidirectional RTM with coverage analysis and orphan identification |\n| `vv-execution-report-builder` + reviewer | V&V campaign report with defects, coverage, residual risk acceptance |\n\n### Chain-integrated program management (5 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `safety-program-risk-register-builder` + reviewer | Programmatic risks affecting safety case delivery |\n| `safety-gate-review-builder` + reviewer | ISO 26262 phase-gate reviews with Go / Conditional / No-Go |\n| `wp-status-rollup-builder` + reviewer | Work product completion roll-up across the safety lifecycle |\n| `change-impact-analysis-builder` + reviewer | Change impact across HARA / FSC / TSC / HW-SW reqs / tests |\n| `lessons-learned-builder` + reviewer | Lessons learned register per ISO 26262-2 §5 / IATF 16949 |\n\n## Standards covered\n\nISO 26262:2018 · ISO/SAE 21434:2021 · ISO 21448:2022 · IATF 16949:2016 · AIAG APQP 2nd edition · AIAG-VDA FMEA Handbook 2019 · AIAG PPAP 4th edition · AIAG MSA 4th edition · AIAG SPC 2nd edition · AIAG Control Plan · ASPICE PAM 3.1 / 4.0 · UN R155 · UN R156 · CERT C Secure Coding · MISRA C:2012 + Amendment 1 · AUTOSAR C++14 · AUTOSAR Classic R22-11 · AUTOSAR Adaptive R22-11 · ISO 14229-1 (UDS) · SAE J2012 (DTCs) · ISO 22901-1 (ODX) · ISO 11898 (CAN) · ISO 17987 (LIN) · ISO 17458 (FlexRay) · IEEE 100BASE-T1 / 1000BASE-T1 · ASAM MCD-2 MC (A2L) · OMG SysML 1.6 / 2.0 · INCOSE Systems Engineering Handbook · IEEE 1012 (V&V)\n\n## Why\n\nEvery automotive program ships an avalanche of structured deliverables. Most teams maintain them in xlsx, painstakingly hand-edited, with low audit-trail consistency and high re-keying overhead between phases. This suite turns each phase into a builder + reviewer pair where:\n\n- The **builder** produces the structured xlsx output from a JSON input plus the upstream artifact\n- The **reviewer** runs a confirmation-measures checklist on the builder's output and produces a visual dashboard with KPIs, charts, and findings\n\nThe chain compounds because phases hand off via stable xlsx contracts. A change upstream (HARA) automatically propagates to every downstream skill that consumes it (FSC → TSC → FMEDA → Safety Case).\n\n## Common patterns across the suite\n\n- All builder outputs use a consistent NAVY/Calibri styling palette with ASIL/CAL color coding\n- All reviewer outputs include visual dashboards (KPI tiles, pie chart, compliance bar, stacked rating breakdown by section, findings table)\n- Many reviewers auto-verify quantitative thresholds:\n  - **FMEDA**: SPFM / LFM / PMHF vs ASIL target\n  - **PPAP**: Cpk vs threshold (1.33 standard, 1.67 special characteristics)\n  - **SW FMEA**: residual risk vs ASIL threshold\n  - **MSA**: Gauge R&R % vs AIAG threshold\n  - **SPC**: Cpk vs target\n- Reviewers never modify source artifacts — gaps land in Recommended Actions\n- Every builder is paired with a reviewer for confirmation-measures compliance\n\n## Repo structure\n\n```\nautomotive-skills-suite/\n├── skills/                      # 152 .skill bundles, install individually\n├── README.md\n└── LICENSE\n```\n\n## Installation\n\nEach `.skill` file in `skills/` is independently installable. Skills declare triggering descriptions in their frontmatter, so the agent picks them up based on user phrasing (e.g., \"build me a HARA\" triggers `hara-builder`).\n\n## License\n\nMIT — see LICENSE file.\n\n---\n\n<div align=\"center\">\n\nBuilt with Claude. Designed for automotive safety, cybersecurity, and quality engineers shipping real programs.\n\n</div>\n","summary":"jherrodthomas/automotive-skills-suite is a curated bundle of installable Claude “skills” that automate the creation of structured automotive engineering deliverables in spreadsheet (xlsx) form. It provides 76 builder skills with matching confirmation reviewer skills, and covers major standards and workflows across functional safety (ISO 26262), cybersecurity (ISO/SAE 21434), SOTIF (ISO 21448), quality (AIAG-VDA, IATF 16949), Automotive SPICE, as well as AUTOSAR, diagnostics, calibration, MBSE/SysML, and V&V. The skills are designed to chain together so downstream tasks consume upstream outputs via a stable file-format contract, with reviewer dashboards that summarize KPIs, charts, and findings. This is best suited for automotive safety, cybersecurity, systems, and quality teams—especially those that need consistent documentation and audit-ready evidence across the engineering lifecycle.","description":"100+ installable Claude skills covering Engineering areas such as, ISO 26262 functional safety, ISO/SAE 21434 cybersecurity, ISO 21448 SOTIF, AIAG-VDA quality (APQP/PPAP/FMEA), Automotive SPICE, and continuous improvement tools — every builder paired with a confirmation reviewer.","stars":1615,"language":null}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
