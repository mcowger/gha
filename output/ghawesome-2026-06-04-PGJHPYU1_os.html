<script id="project-data" type="application/json">[{"owner":"microsoft","repo":"markitdown","url":"https://github.com/microsoft/markitdown","readme":"# MarkItDown\n\n[![PyPI](https://img.shields.io/pypi/v/markitdown.svg)](https://pypi.org/project/markitdown/)\n![PyPI - Downloads](https://img.shields.io/pypi/dd/markitdown)\n[![Built by AutoGen Team](https://img.shields.io/badge/Built%20by-AutoGen%20Team-blue)](https://github.com/microsoft/autogen)\n\n> [!IMPORTANT]\n> MarkItDown performs I/O with the privileges of the current process. Like open() or requests.get(), it will access resources that the process itself can access. Sanitize your inputs in untrusted environments, and call the narrowest `convert_*` function needed for your use case (e.g., `convert_stream()`, or `convert_local()`). See the [Security Considerations](#security-considerations) section of the documentation for more information.\n\nMarkItDown is a lightweight Python utility for converting various files to Markdown for use with LLMs and related text analysis pipelines. To this end, it is most comparable to [textract](https://github.com/deanmalmgren/textract), but with a focus on preserving important document structure and content as Markdown (including: headings, lists, tables, links, etc.) While the output is often reasonably presentable and human-friendly, it is meant to be consumed by text analysis tools -- and may not be the best option for high-fidelity document conversions for human consumption.\n\nMarkItDown currently supports the conversion from:\n\n- PDF\n- PowerPoint\n- Word\n- Excel\n- Images (EXIF metadata and OCR)\n- Audio (EXIF metadata and speech transcription)\n- HTML\n- Text-based formats (CSV, JSON, XML)\n- ZIP files (iterates over contents)\n- Youtube URLs\n- EPubs\n- ... and more!\n\n## Why Markdown?\n\nMarkdown is extremely close to plain text, with minimal markup or formatting, but still\nprovides a way to represent important document structure. Mainstream LLMs, such as\nOpenAI's GPT-4o, natively \"_speak_\" Markdown, and often incorporate Markdown into their\nresponses unprompted. This suggests that they have been trained on vast amounts of\nMarkdown-formatted text, and understand it well. As a side benefit, Markdown conventions\nare also highly token-efficient.\n\n## Prerequisites\nMarkItDown requires Python 3.10 or higher. It is recommended to use a virtual environment to avoid dependency conflicts.\n\nWith the standard Python installation, you can create and activate a virtual environment using the following commands:\n\n```bash\npython -m venv .venv\nsource .venv/bin/activate\n```\n\nIf using `uv`, you can create a virtual environment with:\n\n```bash\nuv venv --python=3.12 .venv\nsource .venv/bin/activate\n# NOTE: Be sure to use 'uv pip install' rather than just 'pip install' to install packages in this virtual environment\n```\n\nIf you are using Anaconda, you can create a virtual environment with:\n\n```bash\nconda create -n markitdown python=3.12\nconda activate markitdown\n```\n\n## Installation\n\nTo install MarkItDown, use pip: `pip install 'markitdown[all]'`. Alternatively, you can install it from the source:\n\n```bash\ngit clone git@github.com:microsoft/markitdown.git\ncd markitdown\npip install -e 'packages/markitdown[all]'\n```\n\n## Usage\n\n### Command-Line\n\n```bash\nmarkitdown path-to-file.pdf > document.md\n```\n\nOr use `-o` to specify the output file:\n\n```bash\nmarkitdown path-to-file.pdf -o document.md\n```\n\nYou can also pipe content:\n\n```bash\ncat path-to-file.pdf | markitdown\n```\n\n### Optional Dependencies\nMarkItDown has optional dependencies for activating various file formats. Earlier in this document, we installed all optional dependencies with the `[all]` option. However, you can also install them individually for more control. For example:\n\n```bash\npip install 'markitdown[pdf, docx, pptx]'\n```\n\nwill install only the dependencies for PDF, DOCX, and PPTX files.\n\nAt the moment, the following optional dependencies are available:\n\n* `[all]` Installs all optional dependencies\n* `[pptx]` Installs dependencies for PowerPoint files\n* `[docx]` Installs dependencies for Word files\n* `[xlsx]` Installs dependencies for Excel files\n* `[xls]` Installs dependencies for older Excel files\n* `[pdf]` Installs dependencies for PDF files\n* `[outlook]` Installs dependencies for Outlook messages\n* `[az-doc-intel]` Installs dependencies for Azure Document Intelligence\n* `[az-content-understanding]` Installs dependencies for Azure Content Understanding\n* `[audio-transcription]` Installs dependencies for audio transcription of wav and mp3 files\n* `[youtube-transcription]` Installs dependencies for fetching YouTube video transcription\n\n### Plugins\n\nMarkItDown also supports 3rd-party plugins. Plugins are disabled by default. To list installed plugins:\n\n```bash\nmarkitdown --list-plugins\n```\n\nTo enable plugins use:\n\n```bash\nmarkitdown --use-plugins path-to-file.pdf\n```\n\nTo find available plugins, search GitHub for the hashtag `#markitdown-plugin`. To develop a plugin, see `packages/markitdown-sample-plugin`.\n\n#### markitdown-ocr Plugin\n\nThe `markitdown-ocr` plugin adds OCR support to PDF, DOCX, PPTX, and XLSX converters, extracting text from embedded images using LLM Vision — the same `llm_client` / `llm_model` pattern that MarkItDown already uses for image descriptions. No new ML libraries or binary dependencies required.\n\n**Installation:**\n\n```bash\npip install markitdown-ocr\npip install openai  # or any OpenAI-compatible client\n```\n\n**Usage:**\n\nPass the same `llm_client` and `llm_model` you would use for image descriptions:\n\n```python\nfrom markitdown import MarkItDown\nfrom openai import OpenAI\n\nmd = MarkItDown(\n    enable_plugins=True,\n    llm_client=OpenAI(),\n    llm_model=\"gpt-4o\",\n)\nresult = md.convert(\"document_with_images.pdf\")\nprint(result.text_content)\n```\n\nIf no `llm_client` is provided the plugin still loads, but OCR is silently skipped and the standard built-in converter is used instead.\n\nSee [`packages/markitdown-ocr/README.md`](packages/markitdown-ocr/README.md) for detailed documentation.\n\n### Azure Content Understanding\n\n[Azure Content Understanding](https://learn.microsoft.com/azure/ai-services/content-understanding/) provides higher-quality conversion with structured field extraction (YAML front matter), multi-modal support (documents, images, audio, video), and configurable analyzers.\n\nInstall: `pip install 'markitdown[az-content-understanding]'`\n\n#### When to use Content Understanding\n\nContent Understanding is ideal when you need capabilities beyond what built-in or Document Intelligence converters provide:\n\n- **Audio and video files** — CU is the only option for video, and the higher-quality cloud option for audio. Built-in converters have no video support and only basic audio transcription.\n- **Structured field extraction** — [Prebuilt](https://learn.microsoft.com/azure/ai-services/content-understanding/concepts/prebuilt-analyzers) or [custom-built](https://learn.microsoft.com/azure/ai-services/content-understanding/how-to/customize-analyzer-content-understanding-studio?tabs=portal) analyzers extract domain-specific fields (invoice amounts, receipt dates, contract clauses) serialized as YAML front matter. Neither built-in nor Doc Intel integration exposes fields.\n- **Higher-quality document extraction** — Cloud-based layout analysis and OCR for scanned PDFs, complex tables, and multi-page documents.\n- **Single API for all modalities** — One `cu_endpoint` handles documents, images, audio, and video with automatic analyzer routing.\n\n| Capability | Built-in converters | Azure Document Intelligence | Azure Content Understanding |\n|------------|---------------------|-----------------------------|-----------------------------|\n| Document conversion | Offline, format-specific extraction | Cloud layout extraction | Cloud multimodal extraction |\n| Structured fields | Not available | Not exposed by this integration | YAML front matter from analyzer fields |\n| Custom analyzers | Not available | Not configurable in this integration | Supported with `cu_analyzer_id` |\n| Audio and video | Basic audio, no video | Not supported | Audio and video analyzers |\n| Cost | Local compute only | Billable Azure API calls | Billable Azure API calls |\n\n**CLI:**\n\n```bash\nmarkitdown path-to-file.pdf --use-cu --cu-endpoint \"<content_understanding_endpoint>\"\n```\n\n**Python API:**\n\n```python\nfrom markitdown import MarkItDown\n\n# Zero-config — auto-selects analyzer per file type\nmd = MarkItDown(cu_endpoint=\"<content_understanding_endpoint>\")\nresult = md.convert(\"report.pdf\")   # documents → prebuilt-documentSearch\nresult = md.convert(\"meeting.mp4\")  # video → prebuilt-videoSearch\nresult = md.convert(\"call.wav\")     # audio → prebuilt-audioSearch\nprint(result.markdown)\n```\n\n**With a custom analyzer** (for domain-specific field extraction):\n\n```python\nmd = MarkItDown(\n    cu_endpoint=\"<content_understanding_endpoint>\",\n    cu_analyzer_id=\"my-invoice-analyzer\",\n)\nresult = md.convert(\"invoice.pdf\")\nprint(result.markdown)\n# Output includes YAML front matter with extracted fields:\n# ---\n# contentType: document\n# fields:\n#   VendorName: CONTOSO LTD.\n#   InvoiceDate: '2019-11-15'\n# ---\n# <!-- page 1 -->\n# ...\n```\n\nWhen `cu_analyzer_id` is set, the converter automatically scopes it to compatible file types based on the analyzer's modality. Incompatible types (e.g., audio files with a document analyzer) auto-route to default prebuilt analyzers.\n\n**Cost note:** Each `convert()` call for a CU-routed format is a billable Azure API call. Use `cu_file_types` to restrict which formats route to CU:\n\n```python\nfrom markitdown.converters import ContentUnderstandingFileType\n\nmd = MarkItDown(\n    cu_endpoint=\"<content_understanding_endpoint>\",\n    cu_file_types=[ContentUnderstandingFileType.PDF],  # only PDFs use CU\n)\n```\n\nMore information about Azure Content Understanding can be found [here](https://learn.microsoft.com/azure/ai-services/content-understanding/).\n\n### Azure Document Intelligence\n\nTo use Microsoft Document Intelligence for conversion:\n\n```bash\nmarkitdown path-to-file.pdf -o document.md -d -e \"<document_intelligence_endpoint>\"\n```\n\nMore information about how to set up an Azure Document Intelligence Resource can be found [here](https://learn.microsoft.com/en-us/azure/ai-services/document-intelligence/how-to-guides/create-document-intelligence-resource?view=doc-intel-4.0.0)\n\n### Python API\n\nBasic usage in Python:\n\n```python\nfrom markitdown import MarkItDown\n\nmd = MarkItDown(enable_plugins=False) # Set to True to enable plugins\nresult = md.convert(\"test.xlsx\")\nprint(result.text_content)\n```\n\nDocument Intelligence conversion in Python:\n\n```python\nfrom markitdown import MarkItDown\n\nmd = MarkItDown(docintel_endpoint=\"<document_intelligence_endpoint>\")\nresult = md.convert(\"test.pdf\")\nprint(result.text_content)\n```\n\nTo use Large Language Models for image descriptions (currently only for pptx and image files), provide `llm_client` and `llm_model`:\n\n```python\nfrom markitdown import MarkItDown\nfrom openai import OpenAI\n\nclient = OpenAI()\nmd = MarkItDown(llm_client=client, llm_model=\"gpt-4o\", llm_prompt=\"optional custom prompt\")\nresult = md.convert(\"example.jpg\")\nprint(result.text_content)\n```\n\n### Docker\n\n```sh\ndocker build -t markitdown:latest .\ndocker run --rm -i markitdown:latest < ~/your-file.pdf > output.md\n```\n\n## Contributing\n\nThis project welcomes contributions and suggestions. Most contributions require you to agree to a\nContributor License Agreement (CLA) declaring that you have the right to, and actually do, grant us\nthe rights to use your contribution. For details, visit https://cla.opensource.microsoft.com.\n\nWhen you submit a pull request, a CLA bot will automatically determine whether you need to provide\na CLA and decorate the PR appropriately (e.g., status check, comment). Simply follow the instructions\nprovided by the bot. You will only need to do this once across all repos using our CLA.\n\nThis project has adopted the [Microsoft Open Source Code of Conduct](https://opensource.microsoft.com/codeofconduct/).\nFor more information see the [Code of Conduct FAQ](https://opensource.microsoft.com/codeofconduct/faq/) or\ncontact [opencode@microsoft.com](mailto:opencode@microsoft.com) with any additional questions or comments.\n\n### How to Contribute\n\nYou can help by looking at issues or helping review PRs. Any issue or PR is welcome, but we have also marked some as 'open for contribution' and 'open for reviewing' to help facilitate community contributions. These are of course just suggestions and you are welcome to contribute in any way you like.\n\n<div align=\"center\">\n\n|            | All                                                          | Especially Needs Help from Community                                                                                                      |\n| ---------- | ------------------------------------------------------------ | ----------------------------------------------------------------------------------------------------------------------------------------- |\n| **Issues** | [All Issues](https://github.com/microsoft/markitdown/issues) | [Issues open for contribution](https://github.com/microsoft/markitdown/issues?q=is%3Aissue+is%3Aopen+label%3A%22open+for+contribution%22) |\n| **PRs**    | [All PRs](https://github.com/microsoft/markitdown/pulls)     | [PRs open for reviewing](https://github.com/microsoft/markitdown/pulls?q=is%3Apr+is%3Aopen+label%3A%22open+for+reviewing%22)              |\n\n</div>\n\n### Running Tests and Checks\n\n- Navigate to the MarkItDown package:\n\n  ```sh\n  cd packages/markitdown\n  ```\n\n- Install `hatch` in your environment and run tests:\n\n  ```sh\n  pip install hatch  # Other ways of installing hatch: https://hatch.pypa.io/dev/install/\n  hatch shell\n  hatch test\n  ```\n\n  (Alternative) Use the Devcontainer which has all the dependencies installed:\n\n  ```sh\n  # Reopen the project in Devcontainer and run:\n  hatch test\n  ```\n\n- Run pre-commit checks before submitting a PR: `pre-commit run --all-files`\n\n### Security Considerations\n\nMarkItDown performs I/O with the privileges of the current process. Like `open()` or `requests.get()`, it will access resources that the process itself can access. \n\n**Sanitize your inputs:** Do not pass untrusted input directly to MarkItDown. If any part of the input may be controlled by an untrusted user or system, such as in hosted or server-side applications, it must be validated and restricted before calling MarkItDown. Depending on your environment, this may include restricting file paths, limiting URI schemes and network destinations, and blocking access to private, loopback, link-local, or metadata-service addresses. \n\n**Call only the conversion method you need:** Prefer the narrowest conversion API that fits your use case. MarkItDown's `convert()` method is intentionally permissive and can handle local files, remote URIs, and byte streams. If your application only needs to read local files, call `convert_local()` instead. If you need more control over URI fetching, call `requests.get()` yourself and pass the response object to `convert_response()`. For maximum control, open a stream to the input you want converted and call `convert_stream()`.\n\n### Contributing 3rd-party Plugins\n\nYou can also contribute by creating and sharing 3rd party plugins. See `packages/markitdown-sample-plugin` for more details.\n\n## Trademarks\n\nThis project may contain trademarks or logos for projects, products, or services. Authorized use of Microsoft\ntrademarks or logos is subject to and must follow\n[Microsoft's Trademark & Brand Guidelines](https://www.microsoft.com/en-us/legal/intellectualproperty/trademarks/usage/general).\nUse of Microsoft trademarks or logos in modified versions of this project must not cause confusion or imply Microsoft sponsorship.\nAny use of third-party trademarks or logos are subject to those third-party's policies.\n","summary":"MarkItDown is a lightweight Python utility that converts many common document and media formats into Markdown so the resulting text can be used directly in LLM and text-analysis workflows. It aims to preserve the structure and content of files—such as headings, lists, tables, and links—making the Markdown output more suitable for machine consumption than for perfect human-facing fidelity. The project supports inputs like PDFs, Office documents (Word/Excel/PowerPoint), images (with EXIF metadata and OCR), audio (with transcription), HTML, CSV/JSON/XML, ZIP archives, EPUBs, and YouTube URLs. It’s best suited for developers building ingestion pipelines, RAG systems, or automated analysis that need consistent, LLM-friendly Markdown from heterogeneous sources, with optional format-specific dependencies to control what you can convert.","description":"Python tool for converting files and office documents to Markdown.","stars":143984,"language":"Python"},{"owner":"EveryInc","repo":"compound-engineering-plugin","url":"https://github.com/EveryInc/compound-engineering-plugin","readme":"# Compound Engineering\n\n[![Build Status](https://github.com/EveryInc/compound-engineering-plugin/actions/workflows/ci.yml/badge.svg)](https://github.com/EveryInc/compound-engineering-plugin/actions/workflows/ci.yml)\n[![npm](https://img.shields.io/npm/v/@every-env/compound-plugin)](https://www.npmjs.com/package/@every-env/compound-plugin)\n\nAI skills and agents that make each unit of engineering work easier than the last.\n\n## Philosophy\n\n**Each unit of engineering work should make subsequent units easier -- not harder.**\n\nTraditional development accumulates technical debt. Every feature adds complexity. Every bug fix leaves behind a little more local knowledge that someone has to rediscover later. The codebase gets larger, the context gets harder to hold, and the next change becomes slower.\n\nCompound engineering inverts this. 80% is in planning and review, 20% is in execution:\n\n- Plan thoroughly before writing code with `/ce-brainstorm` and `/ce-plan`\n- Review to catch issues and calibrate judgment with `/ce-code-review` and `/ce-doc-review`\n- Codify knowledge so it is reusable with `/ce-compound`\n- Keep quality high so future changes are easy\n\nThe point is not ceremony. The point is leverage. A good brainstorm makes the plan sharper. A good plan makes execution smaller. A good review catches the pattern, not just the bug. A good compound note means the next agent does not have to learn the same lesson from scratch.\n\n**Learn more**\n\n- [Full component reference](plugins/compound-engineering/README.md) - all agents and skills\n- [Compound engineering: how Every codes with agents](https://every.to/chain-of-thought/compound-engineering-how-every-codes-with-agents)\n- [The story behind compounding engineering](https://every.to/source-code/my-ai-had-already-fixed-the-code-before-i-saw-it)\n\n## Workflow\n\n`/ce-strategy` is upstream of the loop -- it captures the product's target problem, approach, persona, metrics, and tracks as a short durable anchor at `STRATEGY.md`. Ideate, brainstorm, and plan read it as grounding when present, so strategy choices flow into feature conception, prioritization, and spec.\n\nThe core loop is: brainstorm the requirements, plan the implementation, work through the plan, review the result, compound the learning, then repeat with better context.\n\nUse `/ce-ideate` before the loop when you want the agent to generate and critique bigger ideas before choosing one to brainstorm. It produces a ranked ideation artifact, not requirements, plans, or code.\n\n| Skill | Purpose |\n|-------|---------|\n| `/ce-strategy` | Create or maintain `STRATEGY.md` -- the product's target problem, approach, persona, key metrics, and tracks. Read as grounding by ideate, brainstorm, and plan |\n| `/ce-ideate` | Optional big-picture ideation: generate and critically evaluate grounded ideas, then route the strongest one into brainstorming |\n| `/ce-brainstorm` | Interactive Q&A to think through a feature or problem and write a right-sized requirements doc before planning |\n| `/ce-plan` | Turn feature ideas into detailed implementation plans |\n| `/ce-work` | Execute plans with worktrees and task tracking |\n| `/ce-debug` | Systematically reproduce failures, trace root cause, and implement fixes |\n| `/ce-code-review` | Multi-agent code review before merging |\n| `/ce-compound` | Document learnings to make future work easier |\n| `/ce-product-pulse` | Generate a single-page, time-windowed pulse report on usage, performance, errors, and followups. Saves to `docs/pulse-reports/` |\n\n`/ce-product-pulse` is the read-side companion -- a time-windowed report on what users actually experienced and how the product performed over a given window (24h, 7d, etc.), saved to `docs/pulse-reports/` so past pulses form a browseable timeline of user outcomes. The next strategy update and the next brainstorm get real signal to anchor to.\n\nEach cycle compounds: brainstorms sharpen plans, plans inform future plans, reviews catch more issues, patterns get documented.\n\n## Quick Example\n\nA typical cycle starts by turning a rough idea into a requirements doc, then planning from that doc before handing execution to `/ce-work`:\n\n```text\n/ce-brainstorm \"make background job retries safer\"\n/ce-plan docs/brainstorms/background-job-retry-safety-requirements.md\n/ce-work\n/ce-code-review\n/ce-compound\n```\n\nFor a focused bug investigation:\n\n```text\n/ce-debug \"the checkout webhook sometimes creates duplicate invoices\"\n/ce-code-review\n/ce-compound\n```\n\n## Getting Started\n\nAfter installing, run `/ce-setup` in any project. It checks your environment, installs missing tools, and bootstraps project config.\n\nThe `compound-engineering` plugin currently ships 37 skills and 51 agents. See the [full component reference](plugins/compound-engineering/README.md) for the complete inventory.\n\n---\n\n## Install\n\n### Claude Code\n\n```text\n/plugin marketplace add EveryInc/compound-engineering-plugin\n/plugin install compound-engineering\n```\n\n### Cursor\n\nIn Cursor Agent chat, install from the plugin marketplace:\n\n```text\n/add-plugin compound-engineering\n```\n\nOr search for \"compound engineering\" in the plugin marketplace.\n\n### Codex\n\nThree steps: register the marketplace, install the agent set, then install the plugin through Codex's TUI.\n\n1. **Register the marketplace with Codex:**\n\n   ```bash\n   codex plugin marketplace add EveryInc/compound-engineering-plugin\n   ```\n\n2. **Install the Compound Engineering agents** (Codex's plugin spec does not register custom agents yet):\n\n   ```bash\n   bunx @every-env/compound-plugin install compound-engineering --to codex\n   ```\n\n3. **Install the plugin through Codex's TUI:** launch `codex`, run `/plugins`, find the **Compound Engineering** marketplace, select the **compound-engineering** plugin, and choose **Install**. Restart Codex after install completes. Codex's CLI can register marketplaces, but it does not currently expose a plugin-install subcommand for plugins from an added marketplace -- the `/plugins` TUI install is required for CE skills.\n\nAll three steps are needed. The marketplace registration plus TUI install handles skills; the Bun step adds the review, research, and workflow agents that skills like `$ce-code-review`, `$ce-plan`, and `$ce-work` spawn in Codex. Without the agent step, delegating skills will report missing agents.\n\nFor a non-default Codex profile, run every Codex-related step against the same `CODEX_HOME`. This example installs CE into a `work` profile:\n\n```bash\nCODEX_HOME=\"$HOME/.codex/profiles/work\" codex plugin marketplace add EveryInc/compound-engineering-plugin\nCODEX_HOME=\"$HOME/.codex/profiles/work\" bunx @every-env/compound-plugin install compound-engineering --to codex\nCODEX_HOME=\"$HOME/.codex/profiles/work\" codex\n```\n\nInside Codex, run `/plugins`, select **Compound Engineering**, then install **compound-engineering**. The marketplace step only makes the plugin available; the TUI install is what activates the native CE skills for that profile.\n\nFor local development from this checkout, register the current worktree and use the local CLI:\n\n```bash\nCODEX_HOME=\"$HOME/.codex/profiles/work\" codex plugin marketplace add \"$PWD\"\nCODEX_HOME=\"$HOME/.codex/profiles/work\" bun run src/index.ts install ./plugins/compound-engineering --to codex\nCODEX_HOME=\"$HOME/.codex/profiles/work\" codex\n```\n\n> **Heads up:** once Codex's native plugin spec supports custom agents, the Bun agent step goes away. The TUI install alone will be sufficient.\n\nIf you previously used the Bun-only Codex install, back up stale CE artifacts before switching:\n\n```bash\nbunx @every-env/compound-plugin cleanup --target codex\n```\n\n### GitHub Copilot\n\nFor **VS Code Copilot Agent Plugins**:\n\n1. Run `Chat: Install Plugin from Source` from the VS Code command palette\n2. Use `EveryInc/compound-engineering-plugin` for the repo\n3. Select `compound-engineering` when VS Code shows the plugins in this repository\n\nFor **Copilot CLI**, use:\n\nInside Copilot CLI:\n\n```text\n/plugin marketplace add EveryInc/compound-engineering-plugin\n/plugin install compound-engineering@compound-engineering-plugin\n```\n\nFrom a shell with the `copilot` binary:\n\n```bash\ncopilot plugin marketplace add EveryInc/compound-engineering-plugin\ncopilot plugin install compound-engineering@compound-engineering-plugin\n```\n\nCopilot CLI reads the existing Claude-compatible plugin manifests, so no separate Bun install step is needed.\n\nIf you previously used the old Bun Copilot install, back up stale CE artifacts before switching to the native plugin:\n\n```bash\nbunx @every-env/compound-plugin cleanup --target copilot\n```\n\n### Factory Droid\n\nFrom a shell with the `droid` binary:\n\n```bash\ndroid plugin marketplace add https://github.com/EveryInc/compound-engineering-plugin\ndroid plugin install compound-engineering@compound-engineering-plugin\n```\n\nDroid uses `plugin@marketplace` plugin IDs; here `compound-engineering` is the plugin and `compound-engineering-plugin` is the marketplace name. Droid installs the existing Claude Code-compatible plugin and translates the format automatically, so no Bun install step is needed.\n\nIf you previously used the old Bun Droid install, back up stale CE artifacts before switching to the native plugin:\n\n```bash\nbunx @every-env/compound-plugin cleanup --target droid\n```\n\n### Qwen Code\n\n```bash\nqwen extensions install EveryInc/compound-engineering-plugin:compound-engineering\n```\n\nQwen Code installs Claude Code-compatible plugins directly from GitHub and converts the plugin format during install, so no Bun install step is needed.\n\nIf you previously used the old Bun Qwen install, back up stale CE artifacts before switching to the native extension:\n\n```bash\nbunx @every-env/compound-plugin cleanup --target qwen\n```\n\n### OpenCode, Pi, Gemini, and Kiro\n\nThis repo includes a Bun/TypeScript installer that converts the Compound Engineering plugin to OpenCode, Pi, Gemini CLI, and Kiro CLI.\n\n```bash\nbunx @every-env/compound-plugin install compound-engineering --to opencode\nbunx @every-env/compound-plugin install compound-engineering --to pi\nbunx @every-env/compound-plugin install compound-engineering --to gemini\nbunx @every-env/compound-plugin install compound-engineering --to kiro\n```\n\n**Pi prerequisites.** Pi does not ship a native subagent primitive, so the Pi install depends on [nicobailon/pi-subagents](https://github.com/nicobailon/pi-subagents) (required) and recommends [edlsh/pi-ask-user](https://github.com/edlsh/pi-ask-user) for richer blocking user questions:\n\n```bash\npi install npm:pi-subagents    # required — provides the `subagent` tool used by skills that dispatch parallel agents\npi install npm:pi-ask-user     # recommended — provides the `ask_user` tool; skills fall back to numbered options in chat when it is missing\n```\n\nTo auto-detect custom-install targets and install to all:\n\n```bash\nbunx @every-env/compound-plugin install compound-engineering --to all\n```\n\nThe custom install targets run CE legacy cleanup during install. To run cleanup manually for a specific target:\n\n```bash\nbunx @every-env/compound-plugin cleanup --target codex\nbunx @every-env/compound-plugin cleanup --target opencode\nbunx @every-env/compound-plugin cleanup --target pi\nbunx @every-env/compound-plugin cleanup --target gemini\nbunx @every-env/compound-plugin cleanup --target kiro\nbunx @every-env/compound-plugin cleanup --target copilot   # old Bun installs only\nbunx @every-env/compound-plugin cleanup --target droid     # old Bun installs only\nbunx @every-env/compound-plugin cleanup --target qwen      # old Bun installs only\nbunx @every-env/compound-plugin cleanup --target windsurf  # deprecated legacy installs only\n```\n\nCleanup moves known CE artifacts into a `compound-engineering/legacy-backup/` directory under the target root.\n\n---\n\n## Local Development\n\n```bash\nbun install\nbun test\nbun run release:validate\n```\n\n### From your local checkout\n\nFor active development -- edits to the plugin source are reflected immediately.\n\n**Claude Code** -- add a shell alias so your local copy loads alongside your normal plugins:\n\n```bash\nalias cce='claude --plugin-dir ~/Code/compound-engineering-plugin/plugins/compound-engineering'\n```\n\nRun `cce` instead of `claude` to test your changes. Your production install stays untouched.\n\n**Codex and other targets** -- run the local CLI against your checkout:\n\n```bash\n# from the repo root\nbun run src/index.ts install ./plugins/compound-engineering --to codex\n\n# same pattern for other targets\nbun run src/index.ts install ./plugins/compound-engineering --to opencode\n```\n\n### From a pushed branch\n\nFor testing someone else's branch or your own branch from a worktree, without switching checkouts. Uses `--branch` to clone the branch to a deterministic cache directory.\n\n> **Unpushed local branches**: If the branch exists only in a local worktree and has not been pushed, point `--plugin-dir` directly at the worktree path instead (e.g. `claude --plugin-dir /path/to/worktree/plugins/compound-engineering`).\n\n**Claude Code** -- use `plugin-path` to get the cached clone path:\n\n```bash\n# from the repo root\nbun run src/index.ts plugin-path compound-engineering --branch feat/new-agents\n# Output:\n#   claude --plugin-dir ~/.cache/compound-engineering/branches/compound-engineering-feat~new-agents/plugins/compound-engineering\n```\n\nThe cache path is deterministic. Re-running updates the checkout to the latest commit on that branch.\n\n**Codex, OpenCode, and other targets** -- pass `--branch` to `install`:\n\n```bash\n# from the repo root\nbun run src/index.ts install compound-engineering --to codex --branch feat/new-agents\n\n# works with any target\nbun run src/index.ts install compound-engineering --to opencode --branch feat/new-agents\n\n# combine with --also for multiple targets\nbun run src/index.ts install compound-engineering --to codex --also opencode --branch feat/new-agents\n```\n\nBoth features use the `COMPOUND_PLUGIN_GITHUB_SOURCE` env var to resolve the repository, defaulting to `https://github.com/EveryInc/compound-engineering-plugin`.\n\n### Shell aliases\n\nAdd to `~/.zshrc` or `~/.bashrc`. All aliases use the local CLI so there is no dependency on npm publishing. `plugin-path` prints just the path to stdout, so it composes with `$()`.\n\n```bash\nCE_REPO=~/Code/compound-engineering-plugin\n\nce-cli() { bun run \"$CE_REPO/src/index.ts\" \"$@\"; }\n\n# --- Local checkout (active development) ---\nalias cce='claude --plugin-dir $CE_REPO/plugins/compound-engineering'\n\ncodex-ce() {\n  ce-cli install \"$CE_REPO/plugins/compound-engineering\" --to codex \"$@\"\n}\n\n# --- Pushed branch (testing PRs, worktree workflows) ---\nccb() {\n  claude --plugin-dir \"$(ce-cli plugin-path compound-engineering --branch \"$1\")\" \"${@:2}\"\n}\n\ncodex-ceb() {\n  ce-cli install compound-engineering --to codex --branch \"$1\" \"${@:2}\"\n}\n```\n\nUsage:\n\n```bash\ncce                              # local checkout with Claude Code\ncodex-ce                         # install local checkout to Codex\nccb feat/new-agents              # test a pushed branch with Claude Code\nccb feat/new-agents --verbose    # extra flags forwarded to claude\ncodex-ceb feat/new-agents        # install a pushed branch to Codex\n```\n\nCodex installs keep generated plugin skills isolated under `~/.codex/skills/compound-engineering/` and do not write new files into `~/.agents`. The installer removes old CE-managed `.agents/skills` symlinks when it can prove they point back to CE's Codex-managed store, which prevents stale Codex installs from shadowing Copilot's native plugin install.\n\n## Troubleshooting\n\n### Codex skills work but review or research delegation fails\n\nRun the agent install step:\n\n```bash\nbunx @every-env/compound-plugin install compound-engineering --to codex\n```\n\nNative Codex plugin install handles skills. The Bun step installs the custom agents those skills delegate to.\n\n### Codex shows stale or duplicate CE skills\n\nBack up old Bun-installed artifacts before switching to the native Codex plugin flow:\n\n```bash\nbunx @every-env/compound-plugin cleanup --target codex\n```\n\n### Copilot, Droid, or Qwen loads stale CE skills\n\nBack up old Bun-installed artifacts before using the native plugin path:\n\n```bash\nbunx @every-env/compound-plugin cleanup --target copilot\nbunx @every-env/compound-plugin cleanup --target droid\nbunx @every-env/compound-plugin cleanup --target qwen\n```\n\n## Limitations\n\nCodex native plugin install currently handles skills, not custom agents. The documented Bun followup is required until Codex supports agents in its native plugin spec.\n\nOpenCode, Pi, Gemini, and Kiro installs are converter-backed and may change as those target formats evolve.\n\nRelease versions are owned by release automation. Routine feature PRs should not hand-bump plugin or marketplace manifest versions.\n\n## FAQ\n\n### Do I need Bun for Claude Code?\n\nNo. Claude Code installs directly from the plugin marketplace. Bun is only needed for converter-backed targets, Codex's current agent followup, local development, and cleanup of old converted installs.\n\n### Why does Codex need a separate Bun step?\n\nCodex's native plugin flow installs skills from the Codex plugin manifest. It does not currently install the custom reviewer, researcher, and workflow agents that Compound Engineering skills delegate to. The Bun step fills that gap.\n\n### Where do I see all available skills and agents?\n\nRead the [Compound Engineering plugin README](plugins/compound-engineering/README.md). It lists the current skill and agent inventory.\n\n### Where is release history?\n\nGitHub Releases are the canonical release-notes surface. The root [`CHANGELOG.md`](CHANGELOG.md) points to that history.\n\n## About Contributions\n\n*About Contributions:* Please don't take this the wrong way, but I do not accept outside contributions for any of my projects. I simply don't have the mental bandwidth to review anything, and it's my name on the thing, so I'm responsible for any problems it causes; thus, the risk-reward is highly asymmetric from my perspective. I'd also have to worry about other \"stakeholders,\" which seems unwise for tools I mostly make for myself for free. Feel free to submit issues, and even PRs if you want to illustrate a proposed fix, but know I won't merge them directly. Instead, I'll have Claude or Codex review submissions via `gh` and independently decide whether and how to address them. Bug reports in particular are welcome. Sorry if this offends, but I want to avoid wasted time and hurt feelings. I understand this isn't in sync with the prevailing open-source ethos that seeks community contributions, but it's the only way I can move at this velocity and keep my sanity.\n\n## License\n\n[MIT](LICENSE)\n","summary":"EveryInc/compound-engineering-plugin provides an AI-agent workflow for “compound engineering,” aiming to make each engineering task produce reusable context so future changes get easier instead of harder. It centers on a loop of interactive brainstorming and planning, execution with tracked work, systematic debugging, multi-agent code and documentation review, and capturing learnings via a “compounding” step. Optional helpers like `/ce-strategy` to maintain a durable `STRATEGY.md` anchor and `/ce-product-pulse` to generate time-windowed product outcome reports help teams ground decisions in both internal intent and observed user results. This is best for engineers and teams using AI-assisted development who want more consistent specs, higher-quality reviews, and accumulated knowledge that future agents and developers can reuse.","description":"Official Compound Engineering plugin for Claude Code, Codex, Cursor, and more","stars":19707,"language":"TypeScript"},{"owner":"colbymchenry","repo":"codegraph","url":"https://github.com/colbymchenry/codegraph","readme":"<div align=\"center\">\n\n# CodeGraph\n\n### Supercharge Claude Code, Cursor, Codex, OpenCode, Hermes Agent, Gemini, Antigravity, and Kiro with Semantic Code Intelligence\n\n**~16% cheaper · ~58% fewer tool calls · 100% local**\n\n### [Documentation & Website →](https://colbymchenry.github.io/codegraph/)\n\n[![npm version](https://img.shields.io/npm/v/@colbymchenry/codegraph.svg)](https://www.npmjs.com/package/@colbymchenry/codegraph)\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](https://opensource.org/licenses/MIT)\n[![Self-contained](https://img.shields.io/badge/Node.js-bundled%20%C2%B7%20none%20required-brightgreen.svg)](https://nodejs.org/)\n\n[![Windows](https://img.shields.io/badge/Windows-supported-blue.svg)](#supported-platforms)\n[![macOS](https://img.shields.io/badge/macOS-supported-blue.svg)](#supported-platforms)\n[![Linux](https://img.shields.io/badge/Linux-supported-blue.svg)](#supported-platforms)\n\n[![Claude Code](https://img.shields.io/badge/Claude_Code-supported-blueviolet.svg)](#supported-agents)\n[![Cursor](https://img.shields.io/badge/Cursor-supported-blueviolet.svg)](#supported-agents)\n[![Codex](https://img.shields.io/badge/Codex-supported-blueviolet.svg)](#supported-agents)\n[![opencode](https://img.shields.io/badge/opencode-supported-blueviolet.svg)](#supported-agents)\n[![Hermes Agent](https://img.shields.io/badge/Hermes_Agent-supported-blueviolet.svg)](#supported-agents)\n[![Gemini](https://img.shields.io/badge/Gemini-supported-blueviolet.svg)](#supported-agents)\n[![Antigravity](https://img.shields.io/badge/Antigravity-supported-blueviolet.svg)](#supported-agents)\n[![Kiro](https://img.shields.io/badge/Kiro-supported-blueviolet.svg)](#supported-agents)\n\n</div>\n\n## Get Started\n\n### 1. Install the CLI\n\n**No Node.js required** — one command grabs the right build for your OS:\n\n```bash\n# macOS / Linux\ncurl -fsSL https://raw.githubusercontent.com/colbymchenry/codegraph/main/install.sh | sh\n\n# Windows (PowerShell)\nirm https://raw.githubusercontent.com/colbymchenry/codegraph/main/install.ps1 | iex\n```\n\nAlready have Node? Use npm instead (works on any version):\n\n```bash\nnpm i -g @colbymchenry/codegraph\n```\n\n<sub>CodeGraph bundles its own runtime — nothing to compile, no native build, works the same everywhere. The installer puts `codegraph` on your PATH but **doesn't change your current shell** — open a new terminal before the next step so the command resolves.</sub>\n\n### 2. Wire up your agent(s)\n\nIn a **new terminal**, run the installer to connect CodeGraph to the agents you use:\n\n```bash\ncodegraph install\n```\n\n<sub>Detects and auto-configures Claude Code, Cursor, Codex CLI, opencode, Hermes Agent, Gemini CLI, Antigravity IDE, and Kiro — wiring the CodeGraph MCP server into each. **This is the step that connects CodeGraph to your agent;** installing the CLI in step 1 does not do it on its own. (Shortcut: `npx @colbymchenry/codegraph` downloads and runs this in one go.)</sub>\n\n### 3. Initialize each project\n\n```bash\ncd your-project\ncodegraph init -i\n```\n\n<sub>`codegraph init` just creates the local `.codegraph/` index directory; adding `-i` (`--index`) also builds the initial graph in the same step. Without `-i`, run `codegraph index` afterwards to populate it.</sub>\n\n<div align=\"center\">\n\n![1_C_VYnhpys0UHrOuOgpgoyw](https://github.com/user-attachments/assets/f168182f-4d9a-44e0-94d7-08d018cc8a3a)\n\n</div>\n\n### Uninstall\n\nChanged your mind? One command removes CodeGraph from every agent it configured:\n\n```bash\ncodegraph uninstall\n```\n\n<sub>Reverses the installer — strips CodeGraph's MCP server config, instructions, and permissions from each configured agent. Your project indexes (`.codegraph/`) are left untouched; remove those per-project with `codegraph uninit`. Use `--target` to remove from specific agents, or `--yes` to run non-interactively.</sub>\n\n---\n\n## Why CodeGraph?\n\nWhen Claude Code explores a codebase, it spawns **Explore agents** that scan files with grep, glob, and Read — consuming tokens on every tool call.\n\n**CodeGraph gives those agents a pre-indexed knowledge graph** — symbol relationships, call graphs, and code structure. Agents query the graph instantly instead of scanning files.\n\n### Benchmark Results\n\nTested across **7 real-world open-source codebases** spanning 7 languages, comparing an agent (Claude Code, headless) answering one architecture question **with** and **without** CodeGraph. Each cell is the savings at the **median of 4 runs per arm**. _Re-validated on Opus 4.8 (2026-06-02), on the current build (`codegraph_explore` as the primary tool)._\n\n> **Average: 16% cheaper · 47% fewer tokens · 22% faster · 58% fewer tool calls**\n\n| Codebase | Language | Cost | Tokens | Time | Tool calls |\n|----------|----------|------|--------|------|------------|\n| **VS Code** | TypeScript · ~10k files | 18% cheaper | 64% fewer | 11% faster | 81% fewer |\n| **Excalidraw** | TypeScript · ~640 | even | 25% fewer | 27% faster | 40% fewer |\n| **Django** | Python · ~3k | 8% cheaper | 60% fewer | 13% faster | 77% fewer |\n| **Tokio** | Rust · ~790 | even | 38% fewer | 18% faster | 57% fewer |\n| **OkHttp** | Java · ~645 | 25% cheaper | 54% fewer | 31% faster | 50% fewer |\n| **Gin** | Go · ~110 | 19% cheaper | 23% fewer | 24% faster | 44% fewer |\n| **Alamofire** | Swift · ~110 | 40% cheaper | 64% fewer | 33% faster | 58% fewer |\n\nCodeGraph cuts **tokens, tool calls, and wall-clock time on every repo** — across small, medium, and large codebases — and answers them with **near-zero file reads**, while the no-CodeGraph agent spends its budget on grep/find/Read discovery. `codegraph_explore` shows the answer in full — the mechanism plus the exact methods you asked about, even when they're buried in a multi-thousand-line file — while collapsing redundant interchangeable implementations to signatures, so the response is sized to the *answer* rather than the file count. **Cost stays flat-to-cheaper everywhere** — largest on the small repos (Alamofire, OkHttp), roughly break-even on the most response-heavy ones (Excalidraw, Tokio), where CodeGraph trades the no-CodeGraph agent's many small grep/read round-trips for a few large, cache-heavy tool responses.\n\n<details>\n<summary><strong>Per-repo breakdown — WITH vs WITHOUT (median of 4)</strong></summary>\n\n**VS Code** · ~10k files\n| Metric | WITH cg | WITHOUT cg | Δ |\n|---|---|---|---|\n| Time | 1m 59s | 2m 13s | 11% faster |\n| File Reads | 0 | 9 | −9 |\n| Grep/Bash | 0 | 11 | −11 |\n| Tool calls | 4 | 21 | 81% fewer |\n| Total tokens | 640k | 1.79M | 64% fewer |\n| Cost | $0.68 | $0.83 | 18% cheaper |\n\n**Excalidraw** · ~640 files\n| Metric | WITH cg | WITHOUT cg | Δ |\n|---|---|---|---|\n| Time | 1m 32s | 2m 6s | 27% faster |\n| File Reads | 0 | 7 | −7 |\n| Grep/Bash | 1 | 8 | −7 |\n| Tool calls | 9 | 15 | 40% fewer |\n| Total tokens | 1.27M | 1.69M | 25% fewer |\n| Cost | $0.78 | $0.78 | even |\n\n**Django** · ~3k files\n| Metric | WITH cg | WITHOUT cg | Δ |\n|---|---|---|---|\n| Time | 1m 43s | 1m 58s | 13% faster |\n| File Reads | 0 | 9 | −9 |\n| Grep/Bash | 0 | 5 | −5 |\n| Tool calls | 3 | 13 | 77% fewer |\n| Total tokens | 559k | 1.41M | 60% fewer |\n| Cost | $0.57 | $0.62 | 8% cheaper |\n\n**Tokio** · ~790 files\n| Metric | WITH cg | WITHOUT cg | Δ |\n|---|---|---|---|\n| Time | 1m 55s | 2m 20s | 18% faster |\n| File Reads | 0 | 8 | −8 |\n| Grep/Bash | 0 | 6 | −6 |\n| Tool calls | 6 | 14 | 57% fewer |\n| Total tokens | 1.08M | 1.73M | 38% fewer |\n| Cost | $0.82 | $0.82 | even |\n\n**OkHttp** · ~645 files\n| Metric | WITH cg | WITHOUT cg | Δ |\n|---|---|---|---|\n| Time | 1m 1s | 1m 29s | 31% faster |\n| File Reads | 0 | 4 | −4 |\n| Grep/Bash | 2 | 6 | −4 |\n| Tool calls | 5 | 10 | 50% fewer |\n| Total tokens | 502k | 1.10M | 54% fewer |\n| Cost | $0.41 | $0.55 | 25% cheaper |\n\n**Gin** · ~110 files\n| Metric | WITH cg | WITHOUT cg | Δ |\n|---|---|---|---|\n| Time | 1m 14s | 1m 37s | 24% faster |\n| File Reads | 1 | 6 | −5 |\n| Grep/Bash | 1 | 2 | −1 |\n| Tool calls | 5 | 9 | 44% fewer |\n| Total tokens | 651k | 847k | 23% fewer |\n| Cost | $0.46 | $0.57 | 19% cheaper |\n\n**Alamofire** · ~110 files\n| Metric | WITH cg | WITHOUT cg | Δ |\n|---|---|---|---|\n| Time | 1m 35s | 2m 21s | 33% faster |\n| File Reads | 0 | 9 | −9 |\n| Grep/Bash | 0 | 4 | −4 |\n| Tool calls | 5 | 12 | 58% fewer |\n| Total tokens | 766k | 2.10M | 64% fewer |\n| Cost | $0.57 | $0.95 | 40% cheaper |\n\n</details>\n\n<details>\n<summary><strong>Full benchmark details</strong></summary>\n\n**Methodology.** Each arm is `claude -p` (Claude Opus 4.8) run headlessly against the repo with `--strict-mcp-config`: **WITH** = CodeGraph's MCP server enabled, **WITHOUT** = an empty MCP config. Built-in Read/Grep/Bash stay available to both. Same question per repo, **4 runs per arm, median reported**. Cost = the run's `total_cost_usd`; Tokens = total tokens processed (input incl. cached + output); Time = wall-clock; Tool calls = every tool invocation, including those inside any sub-agents the model spawns. Repos cloned at `--depth 1` and indexed by the same CodeGraph build that served them. Re-validated 2026-06-02 on the current build. These numbers are lower than the prior Opus 4.7 validation — not a CodeGraph regression but a stronger native baseline: Opus 4.8 greps/reads efficiently on the main thread instead of fanning out into large Explore-subagent sweeps, so the no-CodeGraph arm is leaner than it used to be. Per-repo numbers move run-to-run with how hard the without-arm thrashes (the median-of-4 smooths it, but tails remain — e.g. Django's without-arm hit $2.71/14m one batch).\n\n**Queries:**\n| Codebase | Query |\n|----------|-------|\n| VS Code | \"How does the extension host communicate with the main process?\" |\n| Excalidraw | \"How does Excalidraw render and update canvas elements?\" |\n| Django | \"How does Django's ORM build and execute a query from a QuerySet?\" |\n| Tokio | \"How does tokio schedule and run async tasks on its runtime?\" |\n| OkHttp | \"How does OkHttp process a request through its interceptor chain?\" |\n| Gin | \"How does gin route requests through its middleware chain?\" |\n| Alamofire | \"How does Alamofire build, send, and validate a request?\" |\n\n**Why CodeGraph wins:** with the index available, the agent answers directly — usually one `codegraph_explore` returns the relevant source — and stops, usually with zero file reads. Without it, the agent spends most of its budget on discovery (find/ls/grep) before reading the right code. CodeGraph only helps when queried *directly*, so its instructions steer agents to answer directly rather than delegate exploration to file-reading sub-agents — otherwise a sub-agent reads files regardless and CodeGraph becomes overhead.\n\n</details>\n\n---\n\n## Key Features\n\n| | |\n|---|---|\n| **Smart Context Building** | One tool call returns entry points, related symbols, and code snippets — no expensive exploration agents |\n| **Full-Text Search** | Find code by name instantly across your entire codebase, powered by FTS5 |\n| **Impact Analysis** | Trace callers, callees, and the full impact radius of any symbol before making changes |\n| **Always Fresh** | File watcher uses native OS events (FSEvents/inotify/ReadDirectoryChangesW) with debounced auto-sync — the graph stays current as you code, zero config |\n| **20+ Languages** | TypeScript, JavaScript, Python, Go, Rust, Java, C#, PHP, Ruby, C, C++, Objective-C, Swift, Kotlin, Dart, Lua, Luau, Svelte, Liquid, Pascal/Delphi |\n| **Framework-aware Routes** | Recognizes web-framework routing files and links URL patterns to their handlers across 14 frameworks |\n| **Mixed iOS / React Native / Expo** | Closes cross-language flows that static parsing misses: Swift ↔ ObjC bridging, React Native legacy bridge + TurboModules + Fabric view components, native → JS event emitters, Expo Modules |\n| **100% Local** | No data leaves your machine. No API keys. No external services. SQLite database only |\n\n<details>\n<summary><strong>How auto-syncing works — and why you don't need to run <code>codegraph sync</code> manually</strong></summary>\n\nWhen your agent (Claude Code, Cursor, Codex, opencode) launches `codegraph serve --mcp`, three layers keep the index in step with your code — and make sure the agent never gets a silent wrong answer in the brief window between an edit and the next sync:\n\n1. **File watcher with debounced auto-sync.** A native FSEvents / inotify / ReadDirectoryChangesW watcher captures every source-file create / modify / delete and triggers a re-index after a debounce window (default `2000ms`, tunable via `CODEGRAPH_WATCH_DEBOUNCE_MS`, clamped to `[100ms, 60s]`). Bursts of edits collapse into a single sync.\n\n2. **Per-file staleness banner.** During the brief debounce window, MCP tool responses that would reference a still-pending file prepend a `⚠️` banner naming it and telling the agent to `Read` it directly. Pending files NOT referenced by the response surface as a small footer instead. Either way, the agent gets an explicit signal — validated with Claude Code, where the agent literally says \"Reading the file directly for the live content\" before opening it.\n\n3. **Connect-time catch-up.** When the MCP server (re)connects, codegraph runs a fast `(size, mtime)` + content-hash reconciliation against the working tree before answering the first query — so edits made while no MCP server was running (a `git pull` from the terminal, edits from another editor, a previous agent session that exited) get absorbed on the next session's first tool call.\n\n```\nagent writes src/Widget.ts\n  → watcher fires (<100ms)\n  → debounce (default 2s)\n  → sync; Widget.ts is in the index\n  → next agent query sees it\n```\n\n**Verify any time** with `codegraph_status` (via MCP) or `codegraph status` (CLI). If anything is pending, you'll see a `### Pending sync:` section naming the files and their edit age.\n\nThe handful of cases where manual `codegraph sync` makes sense: the watcher is disabled (sandboxed environments, or `CODEGRAPH_NO_DAEMON=1`), or you're scripting against the index outside an agent session and want a pre-flight sync at the start of your script.\n\n→ Full deep-dive in [Guides → Indexing a Project](https://colbymchenry.github.io/codegraph/guides/indexing/#stay-fresh-automatically).\n\n</details>\n\n---\n\n## Framework-aware Routes\n\nCodeGraph detects web-framework routing files and emits `route` nodes linked by `references` edges to their handler classes or functions. Querying callers of a view/controller now surfaces the URL pattern that binds it.\n\n| Framework | Shapes recognized |\n|---|---|\n| **Django** | `path()`, `re_path()`, `url()`, `include()` in `urls.py` (CBV `.as_view()`, dotted paths) |\n| **Flask** | `@app.route('/path', methods=[...])`, blueprint routes |\n| **FastAPI** | `@app.get(...)`, `@router.post(...)`, all standard methods |\n| **Express** | `app.get(...)`, `router.post(...)` with middleware chains |\n| **NestJS** | `@Controller` + `@Get/@Post/...`, GraphQL `@Resolver` + `@Query/@Mutation`, `@MessagePattern`/`@EventPattern`, `@SubscribeMessage` |\n| **Laravel** | `Route::get()`, `Route::resource()`, `Controller@action`, tuple syntax |\n| **Drupal** | `*.routing.yml` routes (`_controller`, `_form`, entity handlers); `hook_*` implementations in `.module`/`.theme`/`.install`/`.inc` |\n| **Rails** | `get '/x', to: 'users#index'`, hash-rocket `=>` syntax |\n| **Spring** | `@GetMapping`, `@PostMapping`, `@RequestMapping` on methods |\n| **Gin / chi / gorilla / mux** | `r.GET(...)`, `router.HandleFunc(...)` |\n| **Axum / actix / Rocket** | `.route(\"/x\", get(handler))` |\n| **ASP.NET** | `[HttpGet(\"/x\")]` attributes on action methods |\n| **Vapor** | `app.get(\"x\", use: handler)` |\n| **React Router** / **SvelteKit** | Route component nodes |\n\n---\n\n## Mixed iOS / React Native / Expo bridging\n\nReal iOS and React Native codebases live across multiple languages — a Swift caller invokes an Objective-C selector that's been auto-bridged, a JS file calls into a native module via the React Native bridge, a JSX component delegates to a native view manager. Static tree-sitter extraction stops at each language boundary. CodeGraph bridges them so `trace`, `callers`, `callees`, and `impact` connect end-to-end across the gap.\n\n| Boundary | JS / Swift side | Native side | How |\n|---|---|---|---|\n| **Swift → ObjC** | Swift `obj.foo(bar:)` | ObjC selector `-fooWithBar:` | `@objc` auto-bridging rules (including init/property/protocol forms) + Cocoa preposition prefixes (`With`/`For`/`By`/`In`/`On`/`At`/…) |\n| **ObjC → Swift** | ObjC `[obj fooWithBar:]` | Swift `@objc func foo(bar:)` | Reverse-bridge name candidates; verifies `@objc` exposure from source |\n| **React Native legacy bridge** | JS `NativeModules.X.fn(...)` | ObjC `RCT_EXPORT_METHOD` / `RCT_REMAP_METHOD` · Java/Kotlin `@ReactMethod` | Parses macro/annotation declarations to build a JS-name → native-method map |\n| **React Native TurboModules** | JS `import M from './NativeM'; M.fn(...)` | Native impl matching the Codegen spec | Treats the `Native<X>.ts` spec interface as ground truth |\n| **RN native → JS events** | JS `new NativeEventEmitter(...).addListener('e', cb)` | ObjC `[self sendEventWithName:@\"e\" body:...]` · Swift `sendEvent(withName: \"e\", ...)` · Java/Kotlin `.emit(\"e\", ...)` | Synthesized cross-language event channel keyed by literal event name |\n| **Expo Modules** | JS `requireNativeModule('X').fn(...)` | Swift / Kotlin `Module { Name(\"X\"); AsyncFunction(\"fn\") { ... } }` | Parses the Expo DSL literals; synthetic method nodes resolve via existing name-match |\n| **Fabric view components** | JSX `<MyView prop={v}/>` | TS Codegen spec + native impl class | Spec → `component` node; convention-based name+suffix lookup (`View`/`ComponentView`/`Manager`/`ViewManager`) bridges to native |\n| **Legacy Paper view managers** | JSX `<MyView prop={v}/>` | ObjC `RCT_EXPORT_VIEW_PROPERTY` · Java/Kotlin `@ReactProp` | Same as Fabric — Paper-era declarations also produce `component` + `property` nodes |\n\n**Validated on real codebases** (small + medium + large for each bridge):\n\n| Bridge | Small | Medium | Large |\n|---|---|---|---|\n| Swift ↔ ObjC | [Charts](https://github.com/danielgindi/Charts) | [realm-swift](https://github.com/realm/realm-swift) | [Wikipedia-iOS](https://github.com/wikimedia/wikipedia-ios) |\n| RN legacy bridge | [AsyncStorage](https://github.com/react-native-async-storage/async-storage) | [react-native-svg](https://github.com/software-mansion/react-native-svg) | [react-native-firebase](https://github.com/invertase/react-native-firebase) |\n| RN native → JS events | [RNGeolocation](https://github.com/Agontuk/react-native-geolocation-service) | — | react-native-firebase |\n| Expo Modules | expo-haptics | expo-camera | expo SDK sweep (7 packages) |\n| Fabric / Paper views | [react-native-segmented-control](https://github.com/react-native-segmented-control/segmented-control) | [react-native-screens](https://github.com/software-mansion/react-native-screens) | [react-native-skia](https://github.com/Shopify/react-native-skia) |\n\nEach bridge emits edges tagged `provenance:'heuristic'` with `metadata.synthesizedBy:` set to a stable channel name (e.g. `swift-objc-bridge`, `rn-event-channel`, `fabric-native-impl`, `expo-module-extract`), so the agent can tell at a glance how a hop got into the graph.\n\n---\n\n## Quick Start\n\n### 1. Run the Installer\n\n```bash\nnpx @colbymchenry/codegraph\n```\n\nThe installer will:\n- Ask which agent(s) to configure — auto-detects installed ones from: **Claude Code**, **Cursor**, **Codex CLI**, **opencode**, **Hermes Agent**, **Gemini CLI**, **Antigravity IDE**, **Kiro**\n- Prompt to install `codegraph` on your PATH (so agents can launch the MCP server)\n- Ask whether configs apply to all your projects or just this one\n- Write each chosen agent's MCP server config (the codegraph usage guide is delivered by the MCP server itself, so no instructions file is added to `CLAUDE.md` / `AGENTS.md` / etc.)\n- Set up auto-allow permissions when Claude Code is one of the targets\n- Initialize your current project (local installs only)\n\n**Non-interactive (scripting / CI):**\n\n```bash\ncodegraph install --yes                              # auto-detect agents, install global\ncodegraph install --target=cursor,claude --yes       # explicit target list\ncodegraph install --target=auto --location=local     # detected agents, project-local\ncodegraph install --print-config codex               # print snippet, no file writes\n```\n\n| Flag | Values | Default |\n|---|---|---|\n| `--target` | `auto`, `all`, `none`, or csv (`claude,cursor,...`) | prompt |\n| `--location` | `global`, `local` | prompt |\n| `--yes` | (boolean) | prompt every step |\n| `--no-permissions` | (boolean) skip Claude auto-allow list | permissions on |\n| `--print-config <id>` | dump snippet for one agent and exit | — |\n\n### 2. Restart Your Agent\n\nRestart your agent (Claude Code / Cursor / Codex CLI / opencode / Hermes Agent / Gemini CLI / Antigravity IDE / Kiro) for the MCP server to load.\n\n### 3. Initialize Projects\n\n```bash\ncd your-project\ncodegraph init -i\n```\n\nBuilds the per-project knowledge graph index. A single global `codegraph install` works in every project you open — no need to re-run the installer per project.\n\nThat's it — your agent will use CodeGraph tools automatically when a `.codegraph/` directory exists.\n\n<details>\n<summary><strong>Manual Setup (Alternative)</strong></summary>\n\n**Install globally:**\n```bash\nnpm install -g @colbymchenry/codegraph\n```\n\n**Add to `~/.claude.json`:**\n```json\n{\n  \"mcpServers\": {\n    \"codegraph\": {\n      \"type\": \"stdio\",\n      \"command\": \"codegraph\",\n      \"args\": [\"serve\", \"--mcp\"]\n    }\n  }\n}\n```\n\n**Add to `~/.claude/settings.json` (optional, for auto-allow):**\n```json\n{\n  \"permissions\": {\n    \"allow\": [\n      \"mcp__codegraph__codegraph_search\",\n      \"mcp__codegraph__codegraph_explore\",\n      \"mcp__codegraph__codegraph_callers\",\n      \"mcp__codegraph__codegraph_callees\",\n      \"mcp__codegraph__codegraph_impact\",\n      \"mcp__codegraph__codegraph_node\",\n      \"mcp__codegraph__codegraph_status\",\n      \"mcp__codegraph__codegraph_files\"\n    ]\n  }\n}\n```\n\n</details>\n\n<details>\n<summary><strong>Agent Tool Guidance</strong></summary>\n\nCodeGraph's MCP server delivers its usage guidance to your agent **automatically**, in the MCP `initialize` response — there's no instructions file to manage and nothing is added to your `CLAUDE.md` / `AGENTS.md` / `GEMINI.md`. In short, it tells the agent to:\n\n- **Answer structural questions directly with CodeGraph** — it *is* the pre-built index, so a grep/read loop just repeats work it already did. Treat the returned source as already read.\n- **Pick the tool by intent:** `codegraph_explore` for almost anything — \"how does X work\", a flow/\"how does X reach Y\", or surveying an area (one call returns the relevant symbols' source grouped by file); `codegraph_search` to just locate a symbol; `codegraph_callers`/`codegraph_callees` to walk call flow; `codegraph_impact` before editing; `codegraph_node` for one specific symbol's full source (it returns every overload for an ambiguous name).\n- **Trust the results — don't re-verify with grep**, and check the staleness banner after edits.\n- If `.codegraph/` doesn't exist yet, offer to run `codegraph init -i`.\n\nThe exact text is `src/mcp/server-instructions.ts` — the single source of truth.\n\n</details>\n\n---\n\n## How It Works\n\n```\n┌───────────────────────────────────────────────────────────────────┐\n│                            Claude Code                            │\n│                                                                   │\n│   \"How does a request reach the database?\"                        │\n│       calls CodeGraph tools directly — no Explore sub-agent       │\n│                                 │                                 │\n└─────────────────────────────────┬─────────────────────────────────┘\n                                  │\n                                  ▼\n┌───────────────────────────────────────────────────────────────────┐\n│                        CodeGraph MCP Server                       │\n│                                                                   │\n│       explore · search · callers · callees · impact · node        │\n│                                 │                                 │\n│                                 ▼                                 │\n│                       SQLite knowledge graph                      │\n│          symbols · edges · files · FTS5 full-text search          │\n└───────────────────────────────────────────────────────────────────┘\n```\n\n1. **Extraction** — [tree-sitter](https://tree-sitter.github.io/) parses source code into ASTs. Language-specific queries extract nodes (functions, classes, methods) and edges (calls, imports, extends, implements).\n\n2. **Storage** — Everything goes into a local SQLite database (`.codegraph/codegraph.db`) with FTS5 full-text search.\n\n3. **Resolution** — After extraction, references are resolved: function calls → definitions, imports → source files, class inheritance, and framework-specific patterns.\n\n4. **Auto-Sync** — The MCP server watches your project using native OS file events. Changes are debounced (2-second quiet window), filtered to source files only, and incrementally synced. The graph stays fresh as you code — no configuration needed.\n\n---\n\n## CLI Reference\n\n```bash\ncodegraph                         # Run interactive installer\ncodegraph install                 # Run installer (explicit)\ncodegraph uninstall               # Remove CodeGraph from your agents (inverse of install)\ncodegraph init [path]             # Initialize in a project (--index to also index)\ncodegraph uninit [path]           # Remove CodeGraph from a project (--force to skip prompt)\ncodegraph index [path]            # Full index (--force to re-index, --quiet for less output)\ncodegraph sync [path]             # Incremental update\ncodegraph status [path]           # Show statistics\ncodegraph query <search>          # Search symbols (--kind, --limit, --json)\ncodegraph files [path]            # Show file structure (--format, --filter, --max-depth, --json)\ncodegraph callers <symbol>        # Find what calls a function/method (--limit, --json)\ncodegraph callees <symbol>        # Find what a function/method calls (--limit, --json)\ncodegraph impact <symbol>         # Analyze what code is affected by changing a symbol (--depth, --json)\ncodegraph affected [files...]     # Find test files affected by changes (see below)\ncodegraph serve --mcp             # Start MCP server\n```\n\n### `codegraph affected`\n\nTraces import dependencies transitively to find which test files are affected by changed source files.\n\n```bash\ncodegraph affected src/utils.ts src/api.ts         # Pass files as arguments\ngit diff --name-only | codegraph affected --stdin   # Pipe from git diff\ncodegraph affected src/auth.ts --filter \"e2e/*\"     # Custom test file pattern\n```\n\n| Option | Description | Default |\n|--------|-------------|---------|\n| `--stdin` | Read file list from stdin | `false` |\n| `-d, --depth <n>` | Max dependency traversal depth | `5` |\n| `-f, --filter <glob>` | Custom glob to identify test files | auto-detect |\n| `-j, --json` | Output as JSON | `false` |\n| `-q, --quiet` | Output file paths only | `false` |\n\n**CI/hook example:**\n\n```bash\n#!/usr/bin/env bash\nAFFECTED=$(git diff --name-only HEAD | codegraph affected --stdin --quiet)\nif [ -n \"$AFFECTED\" ]; then\n  npx vitest run $AFFECTED\nfi\n```\n\n---\n\n## MCP Tools\n\nWhen running as an MCP server, CodeGraph exposes these tools to Claude Code:\n\n| Tool | Purpose |\n|------|---------|\n| `codegraph_explore` | **Primary.** Answer almost any question in one call — \"how does X work\", a flow (\"how does X reach Y\"), or surveying an area — returning the relevant symbols' verbatim source grouped by file, plus a relationship map and blast radius. Surfaces dynamic-dispatch hops (callbacks, React re-render, interface→impl) grep can't follow. |\n| `codegraph_search` | Find symbols by name across the codebase |\n| `codegraph_callers` | Find what calls a function |\n| `codegraph_callees` | Find what a function calls |\n| `codegraph_impact` | Analyze what code is affected by changing a symbol |\n| `codegraph_node` | Get one specific symbol's details + full source (returns every overload for an ambiguous name) |\n| `codegraph_files` | Get indexed file structure (faster than filesystem scanning) |\n| `codegraph_status` | Check index health and statistics |\n\n---\n\n## Library Usage\n\nCodeGraph can be embedded directly. The npm package re-exports its programmatic\nAPI, so both `import` and `require` resolve the `CodeGraph` class in your own\nprocess — handy for embedding it in an app (e.g. an Electron main process).\n\n```typescript\nimport CodeGraph from '@colbymchenry/codegraph';\n// CommonJS works too:\n//   const { CodeGraph } = require('@colbymchenry/codegraph');\n\nconst cg = await CodeGraph.init('/path/to/project');\n// Or: const cg = await CodeGraph.open('/path/to/project');\n\nawait cg.indexAll({\n  onProgress: (p) => console.log(`${p.phase}: ${p.current}/${p.total}`)\n});\n\nconst results = cg.searchNodes('UserService');\nconst callers = cg.getCallers(results[0].node.id);\nconst context = await cg.buildContext('fix login bug', { maxNodes: 20, includeCode: true, format: 'markdown' });\nconst impact = cg.getImpactRadius(results[0].node.id, 2);\n\ncg.watch();   // auto-sync on file changes\ncg.unwatch(); // stop watching\ncg.close();\n```\n\nLower-level building blocks are exported from the same entry point for callers\nthat drive the graph directly: `DatabaseConnection`, `QueryBuilder`,\n`getDatabasePath`, `initGrammars` / `loadGrammarsForLanguages`, and `FileLock`.\n\n**Embedding requirements**\n\n- Install from npm (`npm i @colbymchenry/codegraph`) so the matching\n  per-platform package — which carries the compiled library and its\n  dependencies — is fetched alongside the shim.\n- The API runs on **your** runtime, so it needs **Node 22.5+** for the built-in\n  `node:sqlite` (Electron qualifies when its bundled Node is 22.5+). The CLI and\n  MCP server are unaffected — they run on the self-contained bundled runtime.\n- TypeScript types ship with the package. As with any Node-targeting library,\n  keep `@types/node` available and `skipLibCheck: true` (the common default).\n\n---\n\n## Configuration\n\nThere isn't any — CodeGraph is zero-config, with **no config file** to write or\nkeep in sync. Language support is automatic from the file extension; there's\nnothing to wire up per language.\n\nWhat it skips out of the box:\n\n- **Dependency, build, and cache directories** — `node_modules`, `vendor`,\n  `dist`, `build`, `target`, `.venv`, `Pods`, `.next`, and the like across every\n  [supported stack](#supported-languages) — so the graph is your code, not\n  third-party noise. This holds even with no `.gitignore`.\n- **Anything in your `.gitignore`** — honored in git repos via git, and in\n  non-git projects by reading `.gitignore` directly (root and nested).\n- **Files larger than 1 MB** — generated bundles, minified JS, vendored blobs.\n\nTo keep something else out, add it to `.gitignore`. To pull a default-excluded\ndirectory back **in** (say you really do want a vendored dependency indexed),\nadd a negation — `!vendor/`. The defaults apply uniformly, so committing a\ndependency or build directory doesn't force it into the graph; the `.gitignore`\nnegation is the explicit opt-in.\n\n## Supported Platforms\n\nEvery release ships a self-contained build (bundled Node runtime — nothing to\ncompile) for all three desktop OSes, on both Intel/AMD (x64) and ARM (arm64):\n\n| Platform | Architectures | Install |\n|----------|---------------|---------|\n| Windows | x64, arm64 | PowerShell installer or npm |\n| macOS | x64, arm64 | shell installer or npm |\n| Linux | x64, arm64 | shell installer or npm |\n\nSee [Get Started](#get-started) for the one-line install commands.\n\n## Supported Agents\n\nThe interactive installer auto-detects and configures each of these — wiring up\nthe MCP server (which delivers its own usage guidance, so no instructions file\nis written):\n\n- **Claude Code**\n- **Cursor**\n- **Codex CLI**\n- **opencode**\n- **Hermes Agent**\n- **Gemini CLI**\n- **Antigravity IDE**\n- **Kiro**\n\n## Supported Languages\n\n| Language | Extension | Status |\n|----------|-----------|--------|\n| TypeScript | `.ts`, `.tsx` | Full support |\n| JavaScript | `.js`, `.jsx`, `.mjs` | Full support |\n| Python | `.py` | Full support |\n| Go | `.go` | Full support |\n| Rust | `.rs` | Full support |\n| Java | `.java` | Full support |\n| C# | `.cs` | Full support |\n| PHP | `.php` | Full support |\n| Ruby | `.rb` | Full support |\n| C | `.c`, `.h` | Full support |\n| C++ | `.cpp`, `.hpp`, `.cc` | Full support |\n| Objective-C | `.m`, `.mm`, `.h` | Partial support (classes, protocols, methods, `@property`, `#import`, message sends; `.mm` ObjC++ may parse incompletely) |\n| Swift | `.swift` | Full support |\n| Kotlin | `.kt`, `.kts` | Full support |\n| Scala | `.scala`, `.sc` | Full support (classes, traits, methods, type aliases, Scala 3 enums) |\n| Dart | `.dart` | Full support |\n| Svelte | `.svelte` | Full support (script extraction, Svelte 5 runes, SvelteKit routes) |\n| Vue | `.vue` | Full support (script + script-setup extraction, Nuxt page/API/middleware routes) |\n| Liquid | `.liquid` | Full support |\n| Pascal / Delphi | `.pas`, `.dpr`, `.dpk`, `.lpr` | Full support (classes, records, interfaces, enums, DFM/FMX form files) |\n| Lua | `.lua` | Full support (functions, methods with receivers, local variables, `require` imports, call edges) |\n| Luau | `.luau` | Full support (everything in Lua, plus `type`/`export type` aliases, typed signatures, and Roblox instance-path `require`) |\n\n## Troubleshooting\n\n**\"CodeGraph not initialized\"** — Run `codegraph init` in your project directory first.\n\n**Indexing is slow** — Check that `node_modules` and other large directories are excluded. Use `--quiet` to reduce output overhead.\n\n**MCP hits `database is locked`** — current builds shouldn't: CodeGraph bundles its own Node runtime and uses Node's built-in `node:sqlite` in WAL mode, where concurrent reads never block on a writer. If you still see it:\n\n- **You're on an old (pre-0.9) install.** Reinstall to get the bundled runtime — `curl -fsSL https://raw.githubusercontent.com/colbymchenry/codegraph/main/install.sh | sh` (macOS/Linux), `irm https://raw.githubusercontent.com/colbymchenry/codegraph/main/install.ps1 | iex` (Windows), or `npm i -g @colbymchenry/codegraph@latest`.\n- **`codegraph status` shows `Journal:` other than `wal`** — WAL couldn't be enabled on this filesystem (common on network shares and WSL2 `/mnt`), so reads can block on writes. Move the project (with its `.codegraph/` folder) onto a local disk.\n\n**MCP server not connecting** — Ensure the project is initialized/indexed, verify the path in your MCP config, and check that `codegraph serve --mcp` works from the command line.\n\n**Missing symbols** — The MCP server auto-syncs on save (wait a couple seconds). Run `codegraph sync` manually if needed. Check that the file's language is supported and isn't inside a `.gitignore`d or default-excluded directory (e.g. `node_modules`, `dist`).\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=colbymchenry%2Fcodegraph&type=date&legend=top-left\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=colbymchenry/codegraph&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=colbymchenry/codegraph&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=colbymchenry/codegraph&type=date&legend=top-left\" />\n </picture>\n</a>\n\n## License\n\nMIT\n\n---\n\n<div align=\"center\">\n\n**Made for AI coding agents — Claude Code, Cursor, Codex CLI, opencode, Hermes Agent, Gemini CLI, Antigravity IDE, and Kiro**\n\n[Report Bug](https://github.com/colbymchenry/codegraph/issues) · [Request Feature](https://github.com/colbymchenry/codegraph/issues)\n\n</div>\n","summary":"CodeGraph is a local CLI and MCP server that adds “semantic code intelligence” to popular AI coding agents and IDE assistants, including Claude Code, Cursor, Codex, opencode, Hermes Agent, Gemini CLI, Antigravity, and Kiro. It helps these tools understand your repository more effectively by building and maintaining a per-project `.codegraph/` index/graph via commands like `codegraph init` and `codegraph index`, while integrating automatically through `codegraph install`. The project is designed for developers and teams who want more accurate code navigation and fewer tool calls from AI coding workflows, while keeping everything running locally and lowering cost. It’s especially useful if you rely heavily on agent-based coding and want the agent to have a richer, repository-aware context.","description":"Pre-indexed code knowledge graph for Claude Code, Codex, Gemini, Cursor, OpenCode, AntiGravity, Kiro, and Hermes Agent — fewer tokens, fewer tool calls, 100% local","stars":40695,"language":"TypeScript"},{"owner":"mattpocock","repo":"skills","url":"https://github.com/mattpocock/skills","readme":"<p>\n  <a href=\"https://www.aihero.dev/s/skills-newsletter\">\n    <picture>\n      <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://res.cloudinary.com/total-typescript/image/upload/v1777382277/skills-repo-dark_2x.png\">\n      <source media=\"(prefers-color-scheme: light)\" srcset=\"https://res.cloudinary.com/total-typescript/image/upload/v1777382277/skill-repo-light_2x.png\">\n      <img alt=\"Skills\" src=\"https://res.cloudinary.com/total-typescript/image/upload/v1777382277/skill-repo-light_2x.png\" width=\"369\">\n    </picture>\n  </a>\n</p>\n\n# Skills For Real Engineers\n\n[![skills.sh](https://skills.sh/b/mattpocock/skills)](https://skills.sh/mattpocock/skills)\n\nMy agent skills that I use every day to do real engineering - not vibe coding.\n\nDeveloping real applications is hard. Approaches like GSD, BMAD, and Spec-Kit try to help by owning the process. But while doing so, they take away your control and make bugs in the process hard to resolve.\n\nThese skills are designed to be small, easy to adapt, and composable. They work with any model. They're based on decades of engineering experience. Hack around with them. Make them your own. Enjoy.\n\nIf you want to keep up with changes to these skills, and any new ones I create, you can join ~60,000 other devs on my newsletter:\n\n[Sign Up To The Newsletter](https://www.aihero.dev/s/skills-newsletter)\n\n## Quickstart (30-second setup)\n\n1. Run the skills.sh installer:\n\n```bash\nnpx skills@latest add mattpocock/skills\n```\n\n2. Pick the skills you want, and which coding agents you want to install them on. **Make sure you select `/setup-matt-pocock-skills`**.\n\n3. Run `/setup-matt-pocock-skills` in your agent. It will:\n   - Ask you which issue tracker you want to use (GitHub, Linear, or local files)\n   - Ask you what labels you apply to tickets when you triage them (`/triage` uses labels)\n   - Ask you where you want to save any docs we create\n\n4. Bam - you're ready to go.\n\n## Why These Skills Exist\n\nI built these skills as a way to fix common failure modes I see with Claude Code, Codex, and other coding agents.\n\n### #1: The Agent Didn't Do What I Want\n\n> \"No-one knows exactly what they want\"\n>\n> David Thomas & Andrew Hunt, [The Pragmatic Programmer](https://www.amazon.co.uk/Pragmatic-Programmer-Anniversary-Journey-Mastery/dp/B0833F1T3V)\n\n**The Problem**. The most common failure mode in software development is misalignment. You think the dev knows what you want. Then you see what they've built - and you realize it didn't understand you at all.\n\nThis is just the same in the AI age. There is a communication gap between you and the agent. The fix for this is a **grilling session** - getting the agent to ask you detailed questions about what you're building.\n\n**The Fix** is to use:\n\n- [`/grill-me`](./skills/productivity/grill-me/SKILL.md) - for non-code uses\n- [`/grill-with-docs`](./skills/engineering/grill-with-docs/SKILL.md) - same as [`/grill-me`](./skills/productivity/grill-me/SKILL.md), but adds more goodies (see below)\n\nThese are my most popular skills. They help you align with the agent before you get started, and think deeply about the change you're making. Use them _every_ time you want to make a change.\n\n### #2: The Agent Is Way Too Verbose\n\n> With a ubiquitous language, conversations among developers and expressions of the code are all derived from the same domain model.\n>\n> Eric Evans, [Domain-Driven-Design](https://www.amazon.co.uk/Domain-Driven-Design-Tackling-Complexity-Software/dp/0321125215)\n\n**The Problem**: At the start of a project, devs and the people they're building the software for (the domain experts) are usually speaking different languages.\n\nI felt the same tension with my agents. Agents are usually dropped into a project and asked to figure out the jargon as they go. So they use 20 words where 1 will do.\n\n**The Fix** for this is a shared language. It's a document that helps agents decode the jargon used in the project.\n\n<details>\n<summary>\nExample\n</summary>\n\nHere's an example [`CONTEXT.md`](https://github.com/mattpocock/course-video-manager/blob/076a5a7a182db0fe1e62971dd7a68bcadf010f1c/CONTEXT.md), from my `course-video-manager` repo. Which one is easier to read?\n\n- **BEFORE**: \"There's a problem when a lesson inside a section of a course is made 'real' (i.e. given a spot in the file system)\"\n- **AFTER**: \"There's a problem with the materialization cascade\"\n\nThis concision pays off session after session.\n\n</detail
