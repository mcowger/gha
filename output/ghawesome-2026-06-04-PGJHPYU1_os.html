brary does not change those terms. See [FFmpeg License](https://ffmpeg.org/legal.html) for details.\n\n## Contributing\n\nContributions are welcome! Please read [CONTRIBUTING.md](https://github.com/seydx/node-av/tree/main/CONTRIBUTING.md) for development setup, code standards, and contribution guidelines before submitting pull requests.\n\n## Support\n\nFor issues and questions, please use the GitHub issue tracker.\n\n## See Also\n\n- [FFmpeg Documentation](https://ffmpeg.org/documentation.html)\n- [FFmpeg Doxygen](https://ffmpeg.org/doxygen/trunk/)\n- [Jellyfin FFmpeg](https://github.com/seydx/jellyfin-ffmpeg)\n- [FFmpeg MSVC](https://github.com/seydx/ffmpeg-msvc-prebuilt)\n\n## Star History\n\n<picture>\n  <source\n    media=\"(prefers-color-scheme: dark)\"\n    srcset=\"\n      https://api.star-history.com/svg?repos=seydx/node-av&type=Date&theme=dark\n    \"\n  />\n  <source\n    media=\"(prefers-color-scheme: light)\"\n    srcset=\"\n      https://api.star-history.com/svg?repos=seydx/node-av&type=Date\n    \"\n  />\n  <img\n    alt=\"Star History Chart\"\n    src=\"https://api.star-history.com/svg?repos=seydx/node-av&type=Date\"\n  />\n</picture>\n","summary":"NodeAV is a TypeScript-first Node.js library that provides native bindings to FFmpeg via N-API, giving JavaScript access to FFmpeg’s C APIs with full control or higher-level abstractions. It generates type-safe options with autocomplete and validation for codecs, formats, filters, and bitstream filters from FFmpeg metadata, and includes automatic resource management through a Disposable pattern plus hardware acceleration support with prebuilt binaries for Windows, Linux, and macOS. The project supports stream and device processing workflows, including media operations from files, network sources, and buffers. It’s a strong fit for developers building video/audio processing services or Electron/back-end applications that need reliable FFmpeg performance while benefiting from TypeScript type safety.","description":"FFmpeg bindings for Node.js. Features both low-level and high-level APIs, full hardware acceleration, TypeScript support, and modern async patterns","stars":2,"language":null},{"owner":"anomalyco","repo":"models.dev","url":"https://github.com/anomalyco/models.dev","readme":"<p align=\"center\">\n  <a href=\"https://models.dev\">\n    <picture>\n      <source srcset=\"./logo-dark.svg\" media=\"(prefers-color-scheme: dark)\">\n      <source srcset=\"./logo-light.svg\" media=\"(prefers-color-scheme: light)\">\n      <img src=\"./logo-light.svg\" alt=\"Models.dev logo\">\n    </picture>\n  </a>\n</p>\n\n---\n\n[Models.dev](https://models.dev) is a comprehensive open-source database of AI model specifications, pricing, and capabilities.\n\nThere's no single database with information about all the available AI models. We started Models.dev as a community-contributed project to address this. We also use it internally in [opencode](https://opencode.ai).\n\n## API\n\nYou can access this data through an API.\n\n```bash\ncurl https://models.dev/api.json\n```\n\nUse the **Model ID** field to do a lookup on any model; it's the identifier used by [AI SDK](https://ai-sdk.dev/).\n\nProvider-agnostic model metadata is available separately:\n\n```bash\ncurl https://models.dev/models.json\n```\n\nUse this for facts about the model itself, independent of where it is served. If you need both provider endpoints and model-only metadata in one response:\n\n```bash\ncurl https://models.dev/catalog.json\n```\n\n### Logos\n\nProvider logos are available as SVG files:\n\n```bash\ncurl https://models.dev/logos/{provider}.svg\n```\n\nReplace `{provider}` with the **Provider ID** (e.g., `anthropic`, `openai`, `google`). If we don't have a provider's logo, a default logo is served instead.\n\n## Contributing\n\nThe data is stored in the repo as TOML files; organized by provider and model. The logo is stored as an SVG. This is used to generate this page and power the API.\n\nWe need your help keeping the data up to date.\n\n### Adding Model Metadata\n\nModel-only facts live in `models/`, using the same path-style IDs as provider models. For example, `models/openai/gpt-5.toml` defines metadata for the underlying GPT-5 model, while `providers/openai/models/gpt-5.toml` defines OpenAI-specific serving details such as pricing.\n\nUse model metadata for provider-agnostic facts:\n\n- `name`, `family`, `release_date`, `last_updated`, `knowledge`\n- `attachment`, `reasoning`, `tool_call`, `structured_output`, `temperature`\n- `[limit]` defaults like context, input, and output token limits\n- `[modalities]` defaults\n- `open_weights`, `license`, `links`, `weights`, and `benchmarks`\n\nExample:\n\n```toml\nname = \"GPT-5\"\nfamily = \"gpt\"\nrelease_date = \"2025-08-07\"\nlast_updated = \"2025-08-07\"\nattachment = true\nreasoning = true\ntemperature = false\ntool_call = true\nstructured_output = true\nopen_weights = false\n\n[limit]\ncontext = 400_000\ninput = 272_000\noutput = 128_000\n\n[modalities]\ninput = [\"text\", \"image\"]\noutput = [\"text\"]\n\n[[benchmarks]]\nname = \"Benchmark Name\"\nscore = 72.5\nmetric = \"accuracy\"\nsource = \"https://example.com/results\"\n\n[[weights]]\nlabel = \"Model weights\"\nurl = \"https://huggingface.co/example/model\"\nformat = \"safetensors\"\n```\n\nProvider TOMLs can inherit these facts with `base_model` and then keep only provider-specific fields or overrides:\n\n```toml\nbase_model = \"openai/gpt-5\"\n\n[cost]\ninput = 1.25\noutput = 10.00\ncache_read = 0.125\n\n[limit]\ncontext = 200_000 # optional provider override\noutput = 32_000\n```\n\nProvider fields win over model metadata during generation. Use this when the underlying model is the same but a provider serves it with different context limits, modalities, features, or pricing.\n\n### Adding a New Provider Model\n\nTo add a new model, start by checking if the provider already exists in the `providers/` directory. If not, then:\n\n#### 1. Create a Provider\n\nIf the provider isn't already in `providers/`:\n\n1. Create a new folder in `providers/` with the provider's ID. For example, `providers/newprovider/`.\n2. Add a `provider.toml` with the provider details:\n\n   ```toml\n   name = \"Provider Name\"\n   npm = \"@ai-sdk/provider\" # AI SDK Package name\n   env = [\"PROVIDER_API_KEY\"] # Environment Variable keys used for auth\n   doc = \"https://example.com/docs/models\" # Link to provider's documentation\n   ```\n\n   If the provider doesn’t publish an npm package but exposes an OpenAI-compatible endpoint, set the npm field accordingly and include the base URL:\n\n   ```toml\n   npm = \"@ai-sdk/openai-compatible\" # Use OpenAI-compatible SDK\n   api = \"https://api.example.com/v1\" # Required with openai-compatible\n   ```\n\n#### 2. Add a Logo (optional)\n\nTo add a logo for the provider:\n\n1. Add a `logo.svg` file to the provider's directory (e.g., `providers/newprovider/logo.svg`)\n2. Use SVG format with no fixed size or colors - use `currentColor` for fills/strokes\n\nExample SVG structure:\n\n```svg\n<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"currentColor\">\n  <!-- Logo paths here -->\n</svg>\n```\n\n#### 3. Add a Model Definition\n\nCreate a new TOML file in the provider's `models/` directory where the filename is the model ID.\n\nIf the model ID contains `/`, use subfolders. For example, for the model ID `openai/gpt-5`, create a folder `openai/` and place a file named `gpt-5.toml` inside it.\n\n```toml\nname = \"Model Display Name\"\nattachment = true           # or false - supports file attachments\nreasoning = false           # or true - supports reasoning / chain-of-thought\ntool_call = true            # or false - supports tool calling\nstructured_output = true    # or false - supports a dedicated structured output feature\ntemperature = true          # or false - supports temperature control\nknowledge = \"2024-04\"       # Knowledge-cutoff date\nrelease_date = \"2025-02-19\" # First public release date\nlast_updated = \"2025-02-19\" # Most recent update date\nopen_weights = true         # or false  - model’s trained weights are publicly available\n\n[cost]\ninput = 3.00                # Cost per million input tokens (USD)\noutput = 15.00              # Cost per million output tokens (USD)\nreasoning = 15.00           # Cost per million reasoning tokens (USD)\ncache_read = 0.30           # Cost per million cached read tokens (USD)\ncache_write = 3.75          # Cost per million cached write tokens (USD)\ninput_audio = 1.00          # Cost per million audio input tokens (USD)\noutput_audio = 10.00        # Cost per million audio output tokens (USD)\n\n[limit]\ncontext = 400_000           # Maximum context window (tokens)\ninput = 272_000             # Maximum input tokens\noutput = 8_192              # Maximum output tokens\n\n[modalities]\ninput = [\"text\", \"image\"]   # Supported input modalities\noutput = [\"text\"]           # Supported output modalities\n\n[interleaved]\nfield = \"reasoning_content\" # Name of the interleaved field \"reasoning_content\" or \"reasoning_details\"\n```\n\n#### 3a. Reuse Model Metadata with `base_model`\n\nFor wrapper providers that mirror an existing model, prefer referencing the model-only metadata instead of duplicating provider-agnostic fields.\n\nUse `base_model` when the provider serves the same underlying model and only provider-specific fields differ.\n\n```toml\nbase_model = \"anthropic/claude-opus-4-6\"\n\n[cost]\ninput = 5.00\noutput = 25.00\n```\n\nRules:\n\n- `base_model` must point to a TOML file in `models/` using `<provider>/<model-id>`.\n- You can override any top-level model field locally.\n- If you override a nested table like `[cost]`, `[limit]`, or `[modalities]`, include the full values needed for that table.\n- `base_model_omit` is optional and removes inherited model metadata fields after local overrides are merged. Use dot-path strings, for example `base_model_omit = [\"limit.input\"]`.\n- `id` still comes from the filename; do not add it to the TOML.\n\nUse `base_model` when the wrapper model is materially the same as the source model and only differs by provider-specific pricing, limits, modalities, provider request shape, or lifecycle flags.\n\nSync and generator scripts should preserve existing `base_model` / `base_model_omit` fields when updating provider TOMLs. Do not use legacy `[extends]` tables.\n\n#### 4. Submit a Pull Request\n\n1. Fork this repo\n2. Create a new branch with your changes\n3. Add your provider and/or model files\n4. Open a PR with a clear description\n\n### Validation\n\nThere's a GitHub Action that will automatically validate your submission against our schema to ensure:\n\n- All required fields are present\n- Data types are correct\n- Values are within acceptable ranges\n- TOML syntax is valid\n\nWhen moving existing provider fields into model metadata, compare generated output before and after the change:\n\n```bash\nbun run compare:migrations\n```\n\nThis prints a diff for each changed model TOML so you can confirm the generated JSON only changed where you intended.\n\n### Schema Reference\n\nModels must conform to the following schema, as defined in `packages/core/src/schema.ts`.\n\n**Provider Schema:**\n\n- `name`: String - Display name of the provider\n- `npm`: String - AI SDK Package name\n- `env`: String[] - Environment variable keys used for auth\n- `doc`: String - Link to the provider's documentation\n- `api` _(optional)_: String - OpenAI-compatible API endpoint. Required only when using `@ai-sdk/openai-compatible` as the npm package\n\n**Model Schema:**\n\n- `name`: String — Display name of the model\n- `attachment`: Boolean — Supports file attachments\n- `reasoning`: Boolean — Supports reasoning / chain-of-thought\n- `tool_call`: Boolean - Supports tool calling\n- `structured_output` _(optional)_: Boolean — Supports structured output feature\n- `temperature` _(optional)_: Boolean — Supports temperature control\n- `knowledge` _(optional)_: String — Knowledge-cutoff date in `YYYY-MM` or `YYYY-MM-DD` format\n- `release_date`: String — First public release date in `YYYY-MM` or `YYYY-MM-DD`\n- `last_updated`: String — Most recent update date in `YYYY-MM` or `YYYY-MM-DD`\n- `open_weights`: Boolean - Indicate the model's trained weights are publicly available\n- `interleaved` _(optional)_: Boolean or Object — Supports interleaved reasoning. Use `true` for general support or an object with `field` to specify the format\n- `interleaved.field`: String — Name of the interleaved field (`\"reasoning_content\"` or `\"reasoning_details\"`)\n- `cost.input`: Number — Cost per million input tokens (USD)\n- `cost.output`: Number — Cost per million output tokens (USD)\n- `cost.reasoning` _(optional)_: Number — Cost per million reasoning tokens (USD)\n- `cost.cache_read` _(optional)_: Number — Cost per million cached read tokens (USD)\n- `cost.cache_write` _(optional)_: Number — Cost per million cached write tokens (USD)\n- `cost.input_audio` _(optional)_: Number — Cost per million audio input tokens, if billed separately (USD)\n- `cost.output_audio` _(optional)_: Number — Cost per million audio output tokens, if billed separately (USD)\n- `limit.context`: Number — Maximum context window (tokens)\n- `limit.input`: Number — Maximum input tokens\n- `limit.output`: Number — Maximum output tokens\n- `modalities.input`: Array of strings — Supported input modalities (e.g., [\"text\", \"image\", \"audio\", \"video\", \"pdf\"])\n- `modalities.output`: Array of strings — Supported output modalities (e.g., [\"text\"])\n- `status` _(optional)_: String — Supported status:\n  - `alpha` - Indicate the model is in alpha testing\n  - `beta` - Indicate the model is in beta testing\n  - `deprecated` - Indicate the model is no longer served by the provider's public API\n\n### Examples\n\nSee existing providers in the `providers/` directory for reference:\n\n- `providers/anthropic/` - Anthropic Claude models\n- `providers/openai/` - OpenAI GPT models\n- `providers/google/` - Google Gemini models\n\n### Working on frontend\n\nMake sure you have [Bun](https://bun.sh/) installed.\n\n```bash\n$ bun install\n$ cd packages/web\n$ bun run dev\n```\n\nAnd it'll open the frontend at http://localhost:3000\n\n### Manual testing with opencode\n\nYou can manually check provider changes with opencode by:\n\n```bash\n$ bun install\n$ cd packages/web\n$ bun run build\n$ OPENCODE_MODELS_PATH=\"dist/_api.json\" opencode\n```\n\n### Questions?\n\nOpen an issue if you need help or have questions about contributing.\n\n---\n\nModels.dev is created by the maintainers of [SST](https://sst.dev).\n\n**Join our community** [Discord](https://sst.dev/discord) | [YouTube](https://www.youtube.com/c/sst-dev) | [X.com](https://x.com/SST_dev)\n","summary":"Models.dev is an open-source database that curates AI model specifications, including pricing, capabilities, and metadata that would otherwise be scattered across providers. It exposes the dataset via multiple provider-agnostic and combined JSON endpoints and also provides SVG provider logos for easier UI integration. The repository stores model facts in TOML and supports inheritance so provider-specific serving details (like context limits or pricing) can override shared model metadata. This project is well-suited for developers building model catalogs, choosing models in apps, or anyone who needs a single, up-to-date source of truth for AI model capabilities and costs.","description":"An open-source database of AI models.","stars":4631,"language":"TypeScript"},{"owner":"ColeMurray","repo":"background-agents","url":"https://github.com/ColeMurray/background-agents","readme":"# Background Agents: Open-Inspect\n\nAn open-source background agents coding system inspired by\n[Ramp's Inspect](https://builders.ramp.com/post/why-we-built-our-background-agent).\n\n## Overview\n\nOpen-Inspect provides a hosted background coding agent that can:\n\n- Work on tasks in the background while you focus on other things\n- Access full development environments (Node.js, Python, git, browser automation, VS Code)\n- Connect from anywhere — web UI, Slack, GitHub PRs, Linear issues, or webhooks\n- Enable multiplayer sessions where multiple people can collaborate in real time\n- Create PRs with proper commit attribution to the prompting user\n- Run on a schedule — cron jobs, Sentry alerts, and webhook-triggered automations\n- Spawn parallel sub-tasks that work in separate sandboxes simultaneously\n- Use your choice of AI model — Anthropic Claude, OpenAI Codex (via ChatGPT subscription), or\n  OpenCode Zen\n\n## Security Model (Single-Tenant Only)\n\n> **Important**: This system is designed for **single-tenant deployment only**, where all users are\n> trusted members of the same organization with access to the same repositories.\n\n### How It Works\n\nThe system uses a shared GitHub App installation for git operations (clone, fetch, push). The\ncontrol plane mints short-lived installation tokens server-side and brokers them to sandboxes\nthrough the git credential helper on demand. This means:\n\n- **All users share the same GitHub App credentials** - The GitHub App must be installed on your\n  organization's repositories, and any user of the system can access any repo the App has access to\n- **No per-user repository access validation** - The system does not verify that a user has\n  permission to access a specific repository before creating a session\n- **User OAuth tokens are used for PR creation** - PRs are created using the user's GitHub OAuth\n  token, ensuring proper attribution and that users can only create PRs on repos they have write\n  access to\n\n### Token Architecture\n\n| Token Type         | Purpose                                | Scope                            |\n| ------------------ | -------------------------------------- | -------------------------------- |\n| GitHub App Token   | Brokered git clone/fetch/push auth     | All repos where App is installed |\n| User OAuth Token   | Create PRs, user info                  | Repos user has access to         |\n| Sandbox Auth Token | Sandbox-to-control-plane session calls | Single session                   |\n| WebSocket Token    | Real-time session auth                 | Single session                   |\n\n### Why Single-Tenant Only\n\nThis architecture follows\n[Ramp's Inspect design](https://builders.ramp.com/post/why-we-built-our-background-agent), which was\nbuilt for internal use where all employees are trusted and have access to company repositories.\n\n**For multi-tenant deployment**, you would need:\n\n- Per-tenant GitHub App installations\n- Access validation at session creation\n- Tenant isolation in the data model\n\n### Deployment Recommendations\n\n1. **Deploy behind your organization's SSO/VPN** - Ensure only authorized employees can access the\n   web interface\n2. **Install GitHub App only on intended repositories** - The App's installation scope defines what\n   the system can access\n3. **Use GitHub's repository selection** - When installing the App, select specific repositories\n   rather than \"All repositories\"\n\n## Architecture\n\n```\n                                    ┌──────────────────┐\n                                    │     Clients      │\n                                    │ ┌──────────────┐ │\n                                    │ │  Web / Slack │ │\n                                    │ │ GitHub / Lin.│ │\n                                    │ │   Webhooks   │ │\n                                    │ └──────────────┘ │\n                                    └────────┬─────────┘\n                                             │\n                                             ▼\n┌────────────────────────────────────────────────────────────────────┐\n│                     Control Plane (Cloudflare)                     │\n│  ┌──────────────────────────────────────────────────────────────┐  │\n│  │                   Durable Objects (per session)              │  │\n│  │  ┌─────────┐  ┌─────────┐  ┌─────────┐  ┌───────────────┐    │  │\n│  │  │ SQLite  │  │WebSocket│  │  Event  │  │   GitHub      │    │  │\n│  │  │   DB    │  │   Hub   │  │ Stream  │  │ Integration   │    │  │\n│  │  └─────────┘  └─────────┘  └─────────┘  └───────────────┘    │  │\n│  └──────────────────────────────────────────────────────────────┘  │\n│  ┌──────────────────────────────────────────────────────────────┐  │\n│  │              D1 Database (repo-scoped secrets)               │  │\n│  └──────────────────────────────────────────────────────────────┘  │\n└────────────────────────────────┬───────────────────────────────────┘\n                                 │\n                                 ▼\n┌────────────────────────────────────────────────────────────────────┐\n│                      Data Plane (Modal)                            │\n│  ┌──────────────────────────────────────────────────────────────┐  │\n│  │                     Session Sandbox                          │  │\n│  │  ┌───────────┐  ┌───────────┐  ┌───────────┐                 │  │\n│  │  │ Supervisor│──│  OpenCode │──│   Bridge  │─────────────────┼──┼──▶ Control Plane\n│  │  └───────────┘  └───────────┘  └───────────┘                 │  │\n│  │                      │                                       │  │\n│  │              Full Dev Environment                            │  │\n│  │      (Node.js, Python, git, agent-browser)                   │  │\n│  └──────────────────────────────────────────────────────────────┘  │\n└────────────────────────────────────────────────────────────────────┘\n```\n\n## Packages\n\n| Package                                 | Description                                 |\n| --------------------------------------- | ------------------------------------------- |\n| [modal-infra](packages/modal-infra)     | Modal sandbox infrastructure                |\n| [control-plane](packages/control-plane) | Cloudflare Workers + Durable Objects        |\n| [web](packages/web)                     | Next.js web client                          |\n| [slack-bot](packages/slack-bot)         | Slack integration (sessions from messages)  |\n| [github-bot](packages/github-bot)       | GitHub integration (auto-review, @mention)  |\n| [linear-bot](packages/linear-bot)       | Linear integration (issue → coding session) |\n| [shared](packages/shared)               | Shared types and utilities                  |\n\n## Getting Started\n\nFor a practical setup guide (local + contributor + deployment paths), start with\n**[docs/SETUP_GUIDE.md](docs/SETUP_GUIDE.md)**.\n\nSee **[docs/GETTING_STARTED.md](docs/GETTING_STARTED.md)** for deployment instructions.\n\nTo understand the architecture and core concepts, read\n**[docs/HOW_IT_WORKS.md](docs/HOW_IT_WORKS.md)**.\n\nTo set up recurring scheduled tasks, see **[docs/AUTOMATIONS.md](docs/AUTOMATIONS.md)**.\n\n## Key Features\n\n### Fast Startup\n\nSessions start near-instantly through multiple layers of warming:\n\n- **Filesystem snapshots** — After each prompt, sandbox state is saved; follow-up sessions restore\n  instead of re-cloning\n- **Pre-built repo images** — Toggle per-repo in Settings; rebuilt every 30 minutes with latest\n  commits and dependencies\n- **Proactive warming** — Sandbox begins spinning up as soon as you start typing, before you hit\n  Enter\n\n### Multiplayer Sessions\n\nMultiple users can collaborate in the same session:\n\n- Presence indicators show who's active\n- Prompts are attributed to their authors in git commits\n- Real-time streaming to all connected clients\n\n### Commit Attribution\n\nCommits are attributed to the user who sent the prompt:\n\n```typescript\n// Configure git identity per prompt\nawait configureGitIdentity({\n  name: author.scmName,\n  email: author.scmEmail,\n});\n```\n\n### Multi-Provider Model Support\n\nChoose the AI model that fits your task, with per-session reasoning effort controls:\n\n| Provider     | Models                                                               |\n| ------------ | -------------------------------------------------------------------- |\n| Anthropic    | Claude Haiku 4.5, Sonnet 4.5/4.6, Opus 4.5/4.6/4.7                   |\n| OpenAI       | GPT 5.2, GPT 5.4, GPT 5.5, GPT 5.2 Codex, 5.3 Codex, 5.3 Codex Spark |\n| OpenCode Zen | Kimi K2.5, MiniMax M2.5, GLM 5 (opt-in)                              |\n\nOpenAI models work with your existing ChatGPT subscription via OAuth — no separate API key needed.\nSee **[docs/OPENAI_MODELS.md](docs/OPENAI_MODELS.md)** for setup instructions.\n\n### Client Integrations\n\nInteract with agents from wherever your team already works:\n\n- **Web UI** — Full session management with real-time streaming, model/reasoning selectors, terminal\n  panel, and multiplayer presence\n- **Slack Bot** — @mention or DM to start a session; replies thread back with results. Per-user\n  model and branch preferences via App Home. See [Slack integration](docs/integrations/SLACK.md)\n- **GitHub Bot** — Auto-review on PR open or respond to @mentions in PR comments. Configurable\n  per-repo. See [GitHub integration](docs/integrations/GITHUB.md)\n- **Linear Bot** — Mention or assign the agent on an issue to start a coding session, post progress\n  activities, and link the resulting PR. See [Linear integration](docs/integrations/LINEAR.md)\n- **Webhooks** — Trigger sessions from any external system via authenticated HTTP POST\n\n### Automations\n\nSchedule recurring tasks or react to external events — no human in the loop:\n\n- **Cron schedules** — Hourly, daily, weekly, monthly, or custom 5-field cron with timezone support\n- **Sentry alerts** — Auto-triage on new errors, regressions, or critical metric alerts\n- **Inbound webhooks** — JSONPath condition filters to gate which payloads spawn sessions\n- Auto-pause after 3 consecutive failures, manual trigger button, full run history\n\nSee **[docs/AUTOMATIONS.md](docs/AUTOMATIONS.md)** for setup instructions.\n\n### Sandbox Environment\n\nEvery session runs in an isolated Modal sandbox with a full development environment:\n\n- **Pre-installed:** Node.js 22, Python 3.12, Bun, git, GitHub CLI, build-essential\n- **Browser automation:** agent-browser CLI with headless Chromium for screenshots, visual diffs,\n  and UI verification\n- **Code-server:** Optional browser-based VS Code connected to the session workspace\n- **Web terminal:** ttyd-powered terminal accessible from the session UI\n- **Port tunneling:** Expose up to 10 dev server ports via encrypted tunnels. URLs are available\n  in-sandbox at `/workspace/.tunnels.env` before `.openinspect/start.sh` runs\n  ([details](docs/HOW_IT_WORKS.md#tunnel-urls-inside-the-sandbox))\n- **Repo secrets:** AES-256-GCM encrypted, scoped per-repo or globally, injected as env vars at\n  spawn time. Supports bulk `.env` paste import\n\n### Sub-Task Spawning\n\nAgents can decompose work into parallel child sessions:\n\n- `spawn-task` creates a child session in its own sandbox and returns immediately\n- Parent continues working while children run in parallel on separate branches\n- `get-task-status` and `cancel-task` for coordination\n- Depth limits and per-repo guardrails enforced\n\n### Repository Lifecycle Scripts\n\nRepositories can define two optional startup scripts under `.openinspect/`:\n\n```bash\n# .openinspect/setup.sh (provisioning)\n#!/bin/bash\nnpm install\npip install -r requirements.txt\n```\n\n```bash\n# .openinspect/start.sh (runtime startup)\n#!/bin/bash\ndocker compose up -d postgres redis\n```\n\n- `setup.sh` runs for image builds and fresh sessions\n- `setup.sh` is skipped for repo-image and snapshot-restore starts\n- `setup.sh` failures are non-fatal for fresh sessions, but fatal in image build mode\n- `start.sh` runs for every non-build session startup (fresh, repo-image, snapshot-restore)\n- `start.sh` failures are strict: if present and it fails, session startup fails\n- Default timeouts:\n  - `SETUP_TIMEOUT_SECONDS` (default `300`)\n  - `START_TIMEOUT_SECONDS` (default `120`)\n- Both hooks receive `OPENINSPECT_BOOT_MODE` (`build`, `fresh`, `repo_image`, `snapshot_restore`)\n- Git operations in hooks can authenticate to other private repos on the configured SCM host when\n  the shared installation has access\n\n## License\n\nMIT\n\n## Credits\n\nInspired by [Ramp's Inspect](https://builders.ramp.com/post/why-we-built-our-background-agent) and\nbuilt with:\n\n- [Modal](https://modal.com) - Cloud sandbox infrastructure\n- [Cloudflare Workers](https://workers.cloudflare.com) - Edge computing\n- [OpenCode](https://opencode.ai) - Coding agent runtime\n- [Next.js](https://nextjs.org) - Web framework\n","summary":"Open-Inspect (ColeMurray/background-agents) is an open-source, hosted “background coding agent” system inspired by Ramp’s Inspect, designed to let you delegate development tasks to an AI that keeps working while you focus elsewhere. It provides full dev environments with tools like Node.js, Python, git, browser automation, and VS Code-style access, and can connect through a web UI, Slack, GitHub PR/Linear issues, or webhooks, including scheduled and event-driven runs. The agent can collaborate in real time with multiple people, spawn parallel subtasks in separate sandboxes, and open PRs with commit attribution to the prompting user, using configurable model providers such as Claude or OpenAI. It’s best suited for teams with trusted, shared access—because it currently supports single-tenant deployment only and relies on a shared GitHub App installation rather than per-user repo access validation.","description":"An open-source background agents coding system","stars":1883,"language":"TypeScript"},{"owner":"raindrop-ai","repo":"workshop","url":"https://github.com/raindrop-ai/workshop","readme":"<p align=\"center\">\n  <img src=\"./docs/assets/workshop-hero.png\" alt=\"Workshop: the local debugger your agent is missing.\" width=\"100%\">\n</p>\n\n# Raindrop Workshop\n\n**The local debugger your agent is missing.** Watch your agent think locally,\nthe moment it happens: every token, every tool call, every decision.\n\nGive Claude Code the power to read your traces, write evals against your\ncodebase, and fix what's broken.\n\n## Install\n\nOne command. This is all you need to install and run Workshop. There is\nnothing to clone and nothing to build.\n\n```bash\ncurl -fsSL https://raindrop.sh/install | bash\n```\n\n> **Using an AI coding agent?** Tell it to run the command above. Do **not**\n> clone or build from source just to try Workshop; that path is only for\n> people developing Workshop itself.\n\n## Instrument your agent\n\nOpen your coding agent of choice in your repository and run:\n\n```text\n/instrument-agent\n```\n\nThis will instrument your agent with Raindrop tracing and open Workshop in your browser.\n\nThat's it. Traces stream into the UI the moment your agent runs.\n\n## What it does\n\n- **Live streamed traces.** Every token, tool call, and span streams into\n  Workshop as it happens. No polling, no refreshing.\n- **Coding-agent integration.** Claude Code reads your traces, writes evals\n  against your codebase, and fixes what's broken.\n- **Self-healing eval loop.** Claude writes the eval, runs your agent, sees the\n  failure, fixes the code, and re-runs until every assertion passes.\n- **Local replay.** `/setup-agent-replay` scaffolds an HTTP endpoint that replays a\n  production trace against your real agent code.\n\n## Raindrop Cloud\n\nWorkshop is the local debugger. **Raindrop Cloud** is the hosted product:\nproduction observability for your AI features at\n[app.raindrop.ai](https://app.raindrop.ai). The same `raindrop` binary connects\nyour project to it, with no local daemon involved.\n\nConnect a project to the cloud:\n\n```bash\nraindrop cloud setup\n```\n\nThis signs you in (opening a browser the first time; see `raindrop login`\nbelow), writes your org's `RAINDROP_WRITE_KEY` to `./.env`, and installs the\nhosted MCP server plus the cloud skills (`raindrop-setup`,\n`raindrop-investigate`) into your AI coding agents. Then run `/raindrop-setup`\ninside your agent to instrument your app, and events stream to\n[app.raindrop.ai](https://app.raindrop.ai).\n\nSign-in is handled separately and reused across projects:\n\n```bash\nraindrop login    # OAuth sign-in; caches credentials in ~/.raindrop\nraindrop logout   # clear stored credentials\n```\n\n`raindrop cloud setup` calls `login` for you only when you are not already\nsigned in, so day-to-day you just run `cloud setup`.\n\nWhen you run `raindrop setup` interactively, it also offers to set up Raindrop\nCloud as an optional last step. Decline to stay Workshop-only, or accept to sign\nin and connect the project. Non-interactive runs (CI, piped scripts) never\nprompt; use `raindrop cloud setup` or the `--cloud` one-liner for those.\n\nTo undo a cloud install, run `raindrop cloud uninstall`. It removes the hosted\nMCP server and the cloud skills from your agents and clears the cloud install\nregistry, leaving your local Workshop install untouched. Add `--wipe` to also\nremove `RAINDROP_WRITE_KEY` from `./.env`.\n\n### One-line cloud install\n\nThe install one-liner takes a `--cloud` flag that connects the project to\nRaindrop Cloud instead of starting the local daemon:\n\n```bash\ncurl -fsSL https://raindrop.sh/install | bash -s -- --cloud\n```\n\nWithout `--cloud` the installer runs `raindrop setup` and the local Workshop\ndaemon (the default above). With `--cloud` it runs `raindrop cloud setup` and\nstarts no daemon. Local Workshop and Raindrop Cloud coexist: they use distinct\nMCP server names (`workshop` vs `raindrop`) and separate install registries, so\nneither overwrites the other.\n\n## Compatible with everything\n\n- **Languages:** TypeScript, Python, Go, Rust\n- **SDKs:** Vercel AI SDK, OpenAI Agents SDK, Anthropic SDK, Claude Agent SDK,\n  LangChain, LangGraph, CrewAI, Mastra, Pydantic AI, DSPy, Google ADK, Strands,\n  Agno, Deep Agents\n- **Providers:** AWS Bedrock, Azure OpenAI, Vertex AI\n- **Coding agents:** Claude Code, Codex, Devin, Cursor, OpenCode\n\n## Configuration\n\n| Env var | Purpose | Default |\n| --- | --- | --- |\n| `RAINDROP_WORKSHOP_PORT` | HTTP + WS port | `5899` |\n| `RAINDROP_WORKSHOP_DB_PATH` | SQLite database file | `~/.raindrop/raindrop_workshop.db` |\n| `RAINDROP_LOCAL_DEBUGGER` | SDK-side: where to mirror traces | unset |\n\n## CLI\n\n```bash\nraindrop workshop          # start and open UI\nraindrop workshop setup    # write .env, then start and open\nraindrop workshop status   # check health\nraindrop workshop reset    # delete local DB after confirmation\nraindrop update            # update the binary\n\nraindrop login             # sign in to Raindrop cloud (OAuth)\nraindrop logout            # clear stored credentials\nraindrop cloud setup       # connect this project to Raindrop cloud (no daemon)\nraindrop cloud uninstall   # remove the cloud MCP + skills from your agents\n```\n\n## Build from source (contributors only)\n\n> You only need this if you're hacking on Workshop itself. **To use Workshop,\n> run the [install command](#install) above. You do not need to clone or build\n> from source.**\n\n```bash\ngit clone https://github.com/raindrop-ai/workshop.git\ncd workshop\nbun install\nbun run dev\n```\n\n`bun run dev` starts the local Workshop daemon and Vite UI. Open\n`http://localhost:5899` after it starts.\n\n## License\n\nMIT.\n","summary":"Raindrop Workshop is a local “debugger” for AI coding agents that lets you watch an agent’s reasoning in real time, including every token, tool call, and decision span. It instruments your existing agent with a single command, streams traces directly into a browser UI as execution happens, and supports a tight eval-driven workflow where an agent can write and rerun tests until assertions pass. It also offers local replay of production traces against your real code, plus an optional Raindrop Cloud mode for hosted observability. Developers building or maintaining AI coding workflows—especially those using Claude Code or similar agents—will benefit from faster diagnosis and iteration when tools, prompts, or integrations break.","description":"Give your coding agent the power to write and run agent evals.","stars":854,"language":"TypeScript"},{"owner":"Sayhi-bzb","repo":"Agent-HTML","url":"https://github.com/Sayhi-bzb/Agent-HTML","readme":"# Agent-HTML\n\n[中文](./README.zh-CN.md)\n\nAgent-HTML is an AI-native artifact workspace for turning generated HTML into\nstructured, editable, and previewable documents. It combines a block editor,\nruntime preview, theme controls, and agent feedback loops so HTML output can be\nreviewed and revised like a living artifact instead of a static answer.\n\n![Edit HTML like Notion](./public/block-dnd.gif)\n\nEdit HTML like Notion.\n\n## What It Does\n\n- Edit generated HTML through draggable blocks instead of raw source only.\n- Preview structured artifacts such as Kanban boards, timelines, and responsive\n  layout compositions.\n- Tune presentation with built-in themes, custom themes, and aspect-ratio aware\n  preview controls.\n- Keep humans and agents in the same loop for review, feedback, and iteration.\n\n## Preview\n\n### Block Editing\n\nMove generated UI as blocks, with drag handles and drop placement that make\nartifact editing feel closer to a page builder than a static HTML preview.\n\n![Block drag and drop](./public/block-dnd.gif)\n\n### Structured Components\n\nAgent-HTML is designed for artifact-shaped output: dashboards, boards, reports,\nbriefs, and other reviewable surfaces.\n\n<table>\n  <tr>\n    <td width=\"50%\">\n      <strong>Kanban</strong><br />\n      <img src=\"./public/components3-kanban.gif\" alt=\"Kanban component artifact\" />\n    </td>\n    <td width=\"50%\">\n      <strong>Charts</strong><br />\n      <img src=\"./public/components2-chart.gif\" alt=\"Chart components rendered from data\" />\n    </td>\n  </tr>\n  <tr>\n    <td width=\"50%\">\n      <strong>Image and table</strong><br />\n      <img src=\"./public/components3-img%26table.gif\" alt=\"Image and table component composition\" />\n    </td>\n    <td width=\"50%\">\n    </td>\n  </tr>\n</table>\n\n### Themes\n\nSwitch between built-in themes and keep the same underlying artifact structure.\n\n![Theme switching](./public/theme.gif)\n\n### Agent Collaboration\n\nReview the artifact, point at what needs to change, and keep iteration close to\nthe preview.\n\n![Interact with agent](./public/interact%20with%20agent.gif)\n\n## Documents\n\n- [Agent instructions](./AGENTS.md): content routes for product, engineering,\n  design, and reference documentation.\n\n## Development\n\n```bash\nnpm run dev\n```\n\nUseful checks:\n\n```bash\nnpm run test\nnpm run typecheck\nnpm run lint\n```\n\n## License\n\nLicense terms vary by package. See the root [`LICENSE`](./LICENSE) and\npackage-level license files for details. Short version: check the folder you\nuse.\n\n## Thanks To\n\n- [shadcn/ui](https://shadcn-ui.com/) for the UI components.\n- [linux.do](https://linux.do/) for community feedback and discussion.\n","summary":"Agent-HTML is an AI-native workspace for turning generated HTML into structured, editable “living artifacts” with interactive preview. It lets users edit HTML through a Notion-like block editor with drag-and-drop placement, supports artifact-shaped outputs such as Kanban boards, timelines, dashboards, and responsive compositions, and includes theme controls plus aspect-ratio-aware preview. The project is designed for teams and builders who want to review and iteratively refine AI-generated web content with both human and agent feedback loops rather than treating the result as a static answer. It will benefit product, engineering, design, and documentation workflows where HTML needs to be quickly inspected, adjusted, and presented consistently.","description":"You don't need a chat ui but a canvas with ai.","stars":559,"language":"TypeScript"},{"owner":"aurorascharff","repo":"ClickLight","url":"https://github.com/aurorascharff/ClickLight","readme":"# ClickLight\n\nA small macOS menu bar app that highlights your clicks during live demos, screen sharing, UX reviews, and other moments where people need to follow what you are doing.\n\nScreen recorders like Screen Studio and CleanShot can add click effects after the fact. ClickLight is for the live moment itself, when you need the audience to see exactly when you clicked without interrupting your flow.\n\n## Demo\n\nhttps://github.com/user-attachments/assets/d00d36ea-dd80-4cf4-a0f6-f3bf4b132138\n\n## Use Cases\n\n- Live product demos where viewers need to follow exactly what you clicked\n- UX reviews where the delay between click and response matters (the original motivation for ClickLight)\n- Bug reports where a recording should show both the action and the app behavior\n- Tutorials, workshops, and conference talks where pointer movement alone is easy to miss\n- Pairing with a larger macOS pointer so clicks stay visible in live demos and recordings\n\n## Install\n\nWith Homebrew:\n\n```bash\nbrew tap aurorascharff/clicklight https://github.com/aurorascharff/ClickLight\nbrew install --cask aurorascharff/clicklight/clicklight\n```\n\nHomebrew installs are updated with `brew upgrade --cask clicklight`.\n\nPrefer not to use Homebrew? Download `ClickLight.zip` from [GitHub Releases](https://github.com/aurorascharff/ClickLight/releases).\n\n> **Manual install**\n> If you want to build ClickLight from source or iterate on it locally, use [Manual Install](docs/MANUAL_INSTALL.md).\n\n## Features\n\n- Click highlights across macOS apps\n- Separate visuals for press, release, right-click, and drag\n- Optional laser pointer mode with fading freehand strokes while dragging\n- Optional live keyboard shortcut display pinned to the bottom of the screen by default, with pointer-following placement and sizes through XL available\n- Local daily click activity chart with a resettable seven-day history\n- Optional daily click count in the menu bar\n- Dedicated settings window with presets, sliders, optional menu sections, and a sidebar preview pad with Randomize\n- Custom color picker in Settings\n- Menu-bar quick presets for size, duration, intensity, and color\n- Customizable status-bar menu sections for hiding optional controls you do not use\n- One default ClickLight toggle shortcut, with optional shortcuts for other actions\n- Optional compact menu-bar icon\n- Test pulse for verifying overlay behavior\n- Native Swift/AppKit app\n- No Xcode project required\n\n## Keyboard Shortcuts\n\nClickLight includes one default global shortcut for quick toggles during demos. Other actions can be assigned shortcuts in Settings if you want them.\n\n| Shortcut | Action |\n| --- | --- |\n| `Control + Option + Command + L` | Toggle ClickLight on/off |\n| Not set by default | Toggle Laser Pointer Mode |\n| Not set by default | Toggle Press |\n| Not set by default | Toggle Release |\n| Not set by default | Toggle Right Click |\n| Not set by default | Toggle Middle Click |\n| Not set by default | Toggle Drag |\n| Not set by default | Randomize Colors |\n| Not set by default | Toggle Live Keyboard Shortcuts |\n\nAll shortcuts can be changed or disabled in Settings.\n\n## Permissions\n\nClickLight requires Accessibility permission to detect clicks outside its own menu-bar app. You will be prompted on first launch, or grant it manually in:\n\n**System Settings -> Privacy & Security -> Accessibility**\n\nThe optional Live Keyboard Shortcuts display additionally requires **Input Monitoring**, because macOS protects keyboard input separately from mouse clicks.\n\nAfter enabling permission, quit ClickLight from the menu bar and reopen it.\n\nTip: for recorded demos or presentations, pair ClickLight with a larger macOS pointer in **System Settings -> Accessibility -> Display -> Pointer**.\n\n## Modify It\n\nClickLight is personal software: one small presentation annoyance, fixed directly. The project is intentionally small so you or an agent can change it without much ceremony.\n\nStart with [Local Development](docs/LOCAL_DEVELOPMENT.md).\n\n## Contributing\n\nContributions are welcome. See [CONTRIBUTING.md](CONTRIBUTING.md) for setup, testing, and pull request guidance. Please report security issues privately as described in [SECURITY.md](SECURITY.md).\n\n## Releasing\n\nReleases are signed, notarized, published to GitHub Releases, and followed by a reviewed metadata pull request for Homebrew and Sparkle updates.\n\nSee [Releasing](docs/RELEASING.md). What's new is tracked in [GitHub Releases](https://github.com/aurorascharff/ClickLight/releases).\n\n## Uninstall\n\n```bash\nbrew uninstall --cask clicklight\n```\n\nTo remove ClickLight preferences too:\n\n```bash\nbrew uninstall --cask --zap clicklight\n```\n\n> **Manual uninstall**\n> If you installed ClickLight manually from source, use [Remove Manual Install](docs/MANUAL_INSTALL.md#remove-manual-install).\n\n## License\n\nMIT. See [LICENSE](LICENSE).\n","summary":"ClickLight is a small macOS menu bar app that visually highlights your mouse clicks in real time during live demos, screen sharing, UX reviews, and other situations where viewers need to see exactly when you clicked. It overlays distinct effects for press, release, right-click, and drag, with optional laser-pointer mode for fading freehand strokes and optional live on-screen keyboard shortcut display. You can also customize colors, sizes, durations, intensity, and use menu bar presets and shortcuts to quickly control what’s shown. It’s best for presenters, UX researchers, workshop/tutorial hosts, and anyone recording or demonstrating interactive behavior who wants clearer audience feedback without disrupting their workflow.","description":"A macOS menu bar app that highlights your clicks for demos, recordings, UX reviews, and better click visibility.","stars":260,"language":"Swift"},{"owner":"Patdolitse","repo":"piia-engram","url":"https://github.com/Patdolitse/piia-engram","readme":"<!-- mcp-name: io.github.Patdolitse/piia-engram -->\n<div align=\"center\">\n\n<img src=\"assets/social_preview.png\" alt=\"piia-engram — persistent AI memory across tools\" width=\"640\">\n\n# piia-engram\n\n### Local identity and memory for MCP-compatible coding tools.\n\n### AI suggests lessons and decisions. You approve what becomes durable.\n\n**Tell AI once how you work. piia-engram stores your identity, standards, lessons, decisions, and project context as local files you own. Claude Code, Codex, Cursor, Windsurf, and MCP-compatible tools can start from the same approved context. No cloud account, no vendor lock-in, no hidden memory you cannot inspect.**\n\n`cross-tool memory` | `local-first` | `Claude Code` | `Codex` | `Cursor` | `Windsurf` | `MCP`\n\n[ENGLISH](README.md) | [中文](README.zh-CN.md)\n\n[![License: Apache 2.0](https://img.shields.io/badge/License-Apache%202.0-blue.svg)](LICENSE)\n[![Python 3.10+](https://img.shields.io/badge/Python-3.10%2B-blue.svg)](https://python.org)\n[![MCP Compatible](https://img.shields.io/badge/MCP-Compatible-purple.svg)](https://modelcontextprotocol.io)\n[![PyPI](https://img.shields.io/pypi/v/piia-engram)](https://pypi.org/project/piia-engram/)\n[![Downloads](https://img.shields.io/pypi/dm/piia-engram)](https://pypi.org/project/piia-engram/)\n\n**Listed in:**\n[![Official MCP Registry](https://img.shields.io/badge/listed_in-MCP_Registry-green?logo=modelcontextprotocol)](https://registry.modelcontextprotocol.io)\n[![awesome-mcp-servers](https://img.shields.io/badge/listed_in-awesome--mcp--servers-orange?logo=awesome-lists)](https://github.com/punkpeye/awesome-mcp-servers)\n[![awesome-agents](https://img.shields.io/badge/listed_in-awesome--agents-orange?logo=awesome-lists)](https://github.com/kyrolabs/awesome-agents)\n[![Awesome-MCP-ZH](https://img.shields.io/badge/listed_in-Awesome--MCP--ZH-orange?logo=awesome-lists)](https://github.com/yzfly/Awesome-MCP-ZH)\n\n[![piia-engram MCP server](https://glama.ai/mcp/servers/@Patdolitse/piia-engram/badge)](https://glama.ai/mcp/servers/@Patdolitse/piia-engram)\n[![piia-engram on LobeHub](https://lobehub.com/badge/mcp/patdolitse-piia-engram)](https://lobehub.com/mcp/patdolitse-piia-engram)\n\n</div>\n\n---\n\n> **TL;DR:** piia-engram is a local-first personal AI identity layer. It helps multiple coding agents start from the same understanding of you: your preferences, quality bar, lessons learned, decisions, and project context. It is not an agent memory database; it is the user-owned layer above your tools.\n\n**Why not just use native memory?** Claude Code, Codex, Cursor, and Windsurf are adding their own memories and rules. Those are useful, but they are scoped to one tool or workspace. piia-engram gives you one portable identity layer above them: local files you own, AI-proposed knowledge you review, and context that can follow you across tools.\n\n**Trust model in four lines:**\n\n- **No cloud account:** install with `pip`, keep the core store on your machine.\n- **Local files:** identity and knowledge live under `~/.engram/` as JSON/Markdown.\n- **User approval:** AI suggestions land in review before becoming verified memory.\n- **Documented boundaries:** see [Trust model](docs/trust.md), [Privacy](PRIVACY.md), and [Security](SECURITY.md).\n\nWant a safe public walkthrough? See the [cross-tool continuity demo](docs/cross-tool-continuity-demo.md).\n\n---\n\n## Install\n\n```bash\npip install piia-engram && engram setup\n```\n\nThe wizard auto-detects your AI tools — Claude Code, Cursor, Codex, Claude Desktop — in read-only mode, previews your identity card, and only writes external client config when you explicitly opt in. Restart your configured tool; the first conversation already knows you. ([full walkthrough ↓](#quick-start-30-seconds))\n\n---\n\n**Your AI forgets you every time you switch tools or start a new chat.** piia-engram fixes the handoff.\n\nEvery time you open a new chat window, switch from Claude Code to Codex, update your AI tool, or move into a different project, you're back to zero:\n\n- your communication preferences — gone\n- your code standards and quality bar — forgotten\n- which mistakes you've already learned from — lost\n- why you made that architecture decision last month — erased\n\nThis happens because AI memory today is locked inside each platform. It belongs to the tool, not to you. The tool updates, resets, or gets replaced — and your context disappears with it.\n\n**piia-engram gives you a personal identity layer that lives on your machine, independent of any AI tool.** You tell it once who you are, how you work, and what you've learned. MCP-compatible tools can read the same approved context. New chat, new tool, new version — your identity stays portable.\n\n> **piia-engram is not an agent memory database.** Tools like Mem0, Zep, and Letta store task context and session history for AI agents. piia-engram stores *who you are as a person* — your identity, preferences, hard-won lessons, and key decisions. It's a different layer: not what happened in a task, but who is behind every task.\n\n## Why piia-engram?\n\n| Without piia-engram | With piia-engram |\n|---|---|\n| New chat window = start from zero | Every conversation already knows you |\n| AI tool updates and your preferences vanish | Your identity lives on your machine, survives any update |\n| Switching tools loses accumulated context | Claude Code, Codex, and Cursor read the same memory |\n| Past mistakes get repeated | Lessons learned follow you across tools and sessions |\n| Memory is locked inside one product | Data stays local, editable, and portable |\n\n## Who Uses piia-engram\n\npiia-engram is built for developers who use multiple AI coding tools and are tired of re-explaining themselves.\n\n**If you switch between Claude Code, Codex, and Cursor** — your code standards, architecture decisions, and hard-won lessons reset every time. piia-engram makes every tool start from the same understanding of who you are.\n\n**If you open 10+ AI chat windows a week** — each one starts from zero. piia-engram lets each conversation start from the same approved identity and knowledge context.\n\n**If you've lost preferences after a tool update** — your identity lives on your machine, not inside any platform. Updates, resets, and migrations don't touch your memory.\n\n<details>\n<summary><strong>Other use cases</strong></summary>\n\n**Investment analysts**\nDecisions get made but reasoning gets lost. piia-engram stores the full reasoning chain so six months later, \"why did I pass on that?\" has a real answer — and your analytical framework travels with you across every new analysis.\n\n**System architects**\nArchitecture decisions need context: what you chose, what you ruled out, and why. piia-engram keeps living Architecture Decision Records that travel with you across companies and projects, queryable by any AI tool.\n\n**Backend developers**\nAPI quirks, integration gotchas, performance trade-offs — tacit knowledge that normally lives in your head and resets when you change jobs. piia-engram turns it into a searchable library that persists across everything.\n\n**Frontend and design**\nDesign philosophy rarely gets documented in a way AI tools can use. piia-engram stores your real standards, UX lessons from real users, and the reasoning behind component decisions — so every project starts where your last one ended.\n\n**Vibe coders**\nYou build with AI and move fast. The problem: every new session your AI starts from scratch — different style choices, inconsistent patterns, re-explaining the same preferences. piia-engram makes every tool consistent from session one: your stack, your patterns, your voice, already there.\n\n</details>\n\n## What piia-engram Stores\n\nAll data lives under `~/.engram/` as plain JSON and Markdown files you can open, edit, back up, or migrate yourself.\n\n- **Identity**: who you are, how you communicate, what languages you prefer\n- **Quality standards**: your code review bar, test coverage expectations, what you refuse to ship\n- **Preferences**: coding style, AI behavior, how you like explanations\n- **Trust boundaries**: which fields to keep private, what tools can access\n- **Project snapshots**: context for ongoing work, captured and reloadable\n- **Lessons learned**: mistakes, surprises, things that worked and didn't\n- **Key decisions**: what you chose, what you ruled out, and why\n- **Domain knowledge**: reusable insights across projects and tools\n\n## What piia-engram Does (Beyond Storage)\n\nMost memory tools are passive — you put things in, they give them back. piia-engram is also active.\n\n**Knowledge inheritance across projects**  \nDescribe a new project in plain text. `get_knowledge_inheritance` returns a curated starter pack of the most relevant lessons and decisions from everything you have ever worked on. Your tenth project benefits from all nine before it — one tool call away.\n\n**Passive knowledge capture**  \nPaste a session summary into `extract_session_insights` and piia-engram extracts and stores the lessons and decisions. No manual note-taking. Knowledge accumulates through normal AI conversations.\n\n**Works with tools that do not support MCP**  \nChatGPT, Gemini, Kimi — `get_identity_card` exports a ready-to-paste Markdown identity card. Your context travels even to tools that cannot connect directly.\n\n**Automatic playbook extraction**  \nFinish a multi-step workflow — release to PyPI, deploy to Cloudflare, publish to MCP Registry — and piia-engram detects it at session end. It generates a structured draft playbook (steps, pitfalls, trigger keywords) and saves it to a staging area. Next time you do the same task, the AI finds the playbook and follows it, skipping the mistakes you already solved. No manual recording required — Engram starts the draft, you confirm, AI completes. See [Playbook Auto-Extraction](#playbook-auto-extraction) below.\n\n**Local tools registry**  \nAI tools constantly search for local programs, runtimes, and CLIs. `register_tool` records what's installed and where; `find_tool` retrieves it instantly. No more `which python` every session — the environment map persists across tools and conversations.\n\n**Knowledge health and discovery**  \n`get_knowledge_overview` surfaces stale lessons (not reviewed in 30+ days), computes a 0–100 health score across four dimensions (freshness, quality, coverage, cleanliness), and flags gaps worth revisiting. `suggest_merges` scans your entire knowledge base for near-duplicates and returns actionable merge commands. `link_knowledge` connects related lessons and decisions into a navigable knowledge graph.\n\n## Quick Start (30 seconds)\n\n```bash\npip install piia-engram\nengram setup\n```\n\nThe setup wizard will:\n1. Detect your Python environment\n2. Let you choose the Engram data folder (`~/.engram`, another drive, or a custom path)\n3. Detect your AI tools in read-only mode without changing their external config files\n4. Walk you through seed knowledge (role, tech stack, language)\n5. Smart-import rules from your existing `CLAUDE.md` / `.cursorrules` files\n6. In advanced mode (`engram setup --advanced`), show your optional privacy preferences (cross-tool sync, anonymous statistics)\n7. **Preview your AI identity card** — immediate proof of value\n\nIf the MCP client is already configured, restart your AI tool after setup. If it is not configured yet, add the MCP entry manually or run the explicit opt-in command below. The first connected conversation will call `get_user_context` automatically — your AI already knows you.\n\nTo let Engram update Claude/Codex/Cursor/Zed MCP config files for you, run:\n\n```bash\nengram setup --apply-external-config\n```\n\nExternal config writes are explicit opt-in and create backups under the selected Engram data folder.\n\nCheck health anytime:\n```bash\nengram status        # redacted install + memory health summary\nengram status --html # write a local redacted status page\nengram continuity    # metadata-only proof that cross-tool handoff is ready\nengram management    # metadata-only review/playbook management view\nengram doctor        # diagnose all tools\nengram doctor --fix  # auto-repair issues + inject missing instructions\nengram repair-encoding        # dry-run scan for garbled / mojibake text\nengram repair-encoding --apply  # repair reversible cases with a backup\n```\n\n`engram continuity` is metadata-only: it reports saved-session counts, contributing tools, resume-brief readiness, and aggregate context-load / wrap-up signals without printing memory bodies, raw telemetry events, session IDs, or local paths.\n\nFor a machine-readable synthetic loop proof, run:\n\n```bash\npython demos/cross_tool_continuity_demo.py --json\n```\n\n`engram continuity` reports readiness metadata. The demo JSON proves an isolated write -> resume -> search -> provenance loop using synthetic data only.\n\nFor broader release evidence, run the synthetic MCIC benchmark:\n\n```bash\npython demos/mcic_benchmark.py --json\n```\n\nMCIC v1 contains 10 purpose-labeled continuity scenarios covering explicit\nrecall, implicit personalization signals, false-premise guard signals, public\naction boundaries, version-chain HEAD selection, negative control, and\nprovenance. Its claim is narrow: Engram makes the right signal available to the\nnext client; live model compliance still needs separate A/B testing.\n\n### Configure for Your AI Tool\n\n<details open>\n<summary><strong>Claude Code</strong></summary>\n\n```bash\n# Guided setup; external client configs stay read-only by default\nengram setup\n# Explicit opt-in if you want Engram to write the client config with backups\nengram setup --apply-external-config\n# Or manual:\nclaude mcp add piia-engram -- piia-engram-mcp\n```\n\n</details>\n\n<details>\n<summary><strong>Cursor</strong></summary>\n\nAdd to `~/.cursor/mcp.json`:\n```json\n{\n  \"mcpServers\": {\n    \"piia-engram\": {\n      \"command\": \"piia-engram-mcp\",\n      \"args\": [\"--transport\", \"stdio\"]\n    }\n  }\n}\n```\n\nCompatible fallback if console scripts are not on `PATH`:\n```json\n{\n  \"command\": \"python\",\n  \"args\": [\"-m\", \"piia_engram.mcp_server\"]\n}\n```\n\n</details>\n\n<details>\n<summary><strong>Codex (OpenAI)</strong></summary>\n\nAdd to `~/.codex/mcp.json`:\n```json\n{\n  \"mcpServers\": {\n    \"piia-engram\": {\n      \"command\": \"python\",\n      \"args\": [\"-m\", \"piia_engram.mcp_server\"]\n    }\n  }\n}\n```\n\n> **Plugin manifest note (Codex CLI 0.130.0+)**: piia-engram ships a `.claude-plugin/plugin.json` whose schema is also recognized by Codex CLI. Native one-command plugin install via Codex's marketplace flow isn't supported yet (Codex expects a multi-plugin marketplace manifest at the repo root, which would conflict with the single-plugin manifest used by other tools). For now, configure Codex via the `~/.codex/mcp.json` snippet above — it's the supported path and works on every Codex version.\n\n</details>\n\n<details>\n<summary><strong>Claude Desktop</strong></summary>\n\nAdd to `claude_desktop_config.json`:\n```json\n{\n  \"mcpServers\": {\n    \"piia-engram\": {\n      \"command\": \"python\",\n      \"args\": [\"-m\", \"piia_engram.mcp_server\"]\n    }\n  }\n}\n```\n\n</details>\n\n<details>\n<summary><strong>Windsurf / Copilot / Cline / Other MCP clients</strong></summary>\n\nAny tool that supports MCP over stdio works. Use this config:\n```json\n{\n  \"mcpServers\": {\n    \"piia-engram\": {\n      \"command\": \"python\",\n      \"args\": [\"-m\", \"piia_engram.mcp_server\"]\n    }\n  }\n}\n```\n\nFor tools without MCP support (ChatGPT, Gemini, Kimi): run `get_identity_card` in any MCP tool and paste the exported Markdown card into your chat.\n\n</details>\n\n<details>\n<summary><strong>Domestic AI IDEs — Trae / CodeBuddy / Tongyi Lingma / Comate / Qoder</strong></summary>\n\n`engram setup` detects **Trae** (`~/.trae/mcp.json`) and **Tencent CodeBuddy** (`~/.codebuddy/mcp.json`) without changing those files by default. To let Engram write those standard `mcpServers` files for you, run `engram setup --apply-external-config`; the previous file is backed up under your selected Engram data folder first.\n\n**Tongyi Lingma (通义灵码), Baidu Comate (文心快码), and Qoder** manage MCP servers through their in-app MCP panel (or a project-level config), so the wizard can't write them for you. Open the tool's MCP settings and paste:\n```json\n{\n  \"mcpServers\": {\n    \"piia-engram\": {\n      \"command\": \"python\",\n      \"args\": [\"-m\", \"piia_engram.mcp_server\"]\n    }\n  }\n}\n```\n\nZero-install alternative (no prior `pip install` needed) — set `\"command\": \"uvx\"` and `\"args\": [\"--from\", \"piia-engram\", \"piia-engram-mcp\"]`. They all speak the same standard MCP-over-stdio protocol.\n\n</details>\n\n### See It in Action\n\n```\nYou  → \"Help me refactor this auth module\"\n\n# WITHOUT piia-engram: AI starts from scratch\nAI   → \"What language? What framework? What's your testing preference?\"\n\n# WITH piia-engram: AI already knows you\nAI   → \"Based on your preference for pytest + 90% coverage, and your\n        lesson about always separating auth middleware from business\n        logic (from the March incident), here's my approach...\"\n```\n\nAfter setup, run `engram doctor` to verify everything is connected:\n\n```\n$ engram doctor\n\n  Detected 3 AI tool(s):\n    [ok] Claude Code — Engram configured\n    [ok] Cursor — Engram configured\n    [ok] Codex — Engram configured\n\n  [ok] All configured tools look healthy.\n\n  ── Functional Checks ──\n    [ok] piia_engram.core importable\n    [ok] Engram initialized (~/.engram)\n    [ok] Identity loaded (role: Senior Backend Developer)\n    [ok] quick_context.md ready (4096 bytes)\n    [ok] MCP server: 17 tools registered\n\n  -- Terminal encoding --\n\n    [ok] stdout/stderr: utf-8 / utf-8\n    [ok] PYTHONIOENCODING not set (stdout/stderr already UTF-8)\n    [ok] Runtime encodings: preferred=UTF-8, filesystem=utf-8\n\n  -- Config Integrity --\n\n    [ok] MCP configs: 3/13 files found, 3 configured\n    [ok] Instruction files: 3/4 found, 3 fresh\n    [ok] Project rule files: 1 found\n    [ok] Shared instructions: 1 found\n    [ok] Claude hooks: 4/4 registered\n    [ok] Report is metadata-only (hashes + counts; no rule bodies)\n\n  -- Continuity --\n\n    [--] No saved agent sessions yet\n         Run an AI session, then wrap up or stop the tool to create one.\n    [ok] Resume brief builds (2 section(s))\n```\n\n\n## Upgrading\n\n```bash\npip install --upgrade piia-engram\n```\n\nAfter upgrading, piia-engram automatically migrates any stale MCP configs the next time its server starts (stdio mode). If your AI tool still shows an \"MCP disconnected\" error after restarting, run:\n\n```bash\npiia-engram doctor        # show what's wrong\npiia-engram doctor --fix  # auto-repair and fix in one step\n```\n\nThen restart the affected AI tool. The doctor command checks Claude Code, Cursor, Codex, Windsurf, Claude Desktop, and community-supported MCP config locations, removes outdated server entries, and prints a metadata-only config integrity summary.\n\n## Remote Deployment\n\nRun piia-engram on your own server and connect from anywhere.\n\n### Server Setup\n\n```bash\n# Install with remote support\npip install piia-engram[remote]\n\n# Generate an auth token\npython -c \"import secrets; print(secrets.token_urlsafe(32))\"\n# Save the output, e.g. \"abc123...\"\n\n# Start in SSE mode\nENGRAM_AUTH_TOKEN=abc123... python -m piia_engram.mcp_server --transport sse --host 0.0.0.0 --port 8767\n```\n\n### Client Config (Claude Code)\n\n```json\n{\n  \"mcpServers\": {\n    \"piia-engram\": {\n      \"url\": \"http://your-server:8767/sse\",\n      \"headers\": {\n        \"Authorization\": \"Bearer abc123...\"\n      }\n    }\n  }\n}\n```\n\n### Client Config (Cursor)\n\n```json\n{\n  \"mcpServers\": {\n    \"piia-engram\": {\n      \"url\": \"http://your-server:8767/sse\",\n      \"headers\": {\n        \"Authorization\": \"Bearer abc123...\"\n      }\n    }\n  }\n}\n```\n\n**Security notes:**\n- Always use HTTPS in production, behind nginx or caddy with TLS.\n- The auth token protects your identity data. Keep it secret.\n- Default bind is `127.0.0.1` for localhost only. Use `0.0.0.0` only behind a reverse proxy.\n- Set `ENGRAM_CORS_ORIGINS` to restrict cross-origin access (e.g. `https://your-domain.com`).\n- Data stays on your server and never touches third-party clouds.\n\n## MCP Tools\n\npiia-engram ships 81 MCP tools. By default, only the 17 **Tier-1 Core** tools are loaded to keep the AI's context clean. To unlock all 81 tools, add `ENGRAM_TOOLS=all` to your MCP config:\n\n```json\n{\n  \"mcpServers\": {\n    \"piia-engram\": {\n      \"command\": \"python\",\n      \"args\": [\"-m\", \"piia_engram.mcp_server\"],\n      \"env\": { \"ENGRAM_TOOLS\": \"all\" }\n    }\n  }\n}\n```\n\n**Startup sync:** Engram reconciles memories/config snippets from local AI tools when an MCP server starts. By default this runs in the background so stdio clients can initialize quickly. Set `ENGRAM_MCP_STARTUP_SYNC=eager` to restore synchronous startup sync, or `ENGRAM_MCP_STARTUP_SYNC=off` to skip startup sync for latency-sensitive test arms. `ENGRAM_EPHEMERAL=1` also skips startup sync and migration work in container/ephemeral clients.\n\n### Tier-1 Core (17 tools — daily workflow)\n\n| Tool | Purpose |\n|---|---|\n| `get_user_context` | **Startup** — Load identity + knowledge at session start (supports `token_budget` for context size control) |\n| `wrap_up_session` | **Session end** — Save insights + sync at session end |\n| `memory_store` | **Writeback** — Unified write endpoint: routes to add_lesson / add_decision / add_playbook by `kind` |\n| `add_lesson` | Store a reusable lesson learned |\n| `add_decision` | Record a key decision with reasoning |\n| `add_playbook` | Record an operational playbook (multi-step procedure with trigger keywords) |\n| `search_knowledge` | **Retrieval** — Search lessons, decisions, and playbooks (supports `filters_json` for domain/tier/date filtering) |\n| `get_relevant_knowledge` | Find knowledge relevant to current project |\n| `get_recall` | Return one structured identity + recent activity + relevant knowledge recall payload |\n| `get_identity_card` | Export Markdown identity card for non-MCP tools |\n| `update_identity` | Update profile, preferences, or quality standards |\n| `get_project_context` | Read a saved project snapshot |\n| `save_project_snapshot` | Persist project state for future sessions |\n| `get_recent_context` | Recover lost session context after restart |\n| `get_daily_log` | Read a human-friendly project timeline for a day |\n| `get_resume_brief` | Build a cross-session/cross-tool resume brief |\n| `doctor` | Run memory system self-diagnosis |\n\n### Tier-2 Advanced (64 tools — knowledge management, review, governance, import/export)\n\n<details>\n<summary>Click to expand full tool list</summary>\n\n| Tool | Purpose |\n|---|---|\n| `register_tool` | Register a local tool, runtime, or CLI to the environment map |\n| `find_tool` | Look up a registered tool by name |\n| `list_tools` | List all registered tools (optionally filter by category) |\n| `save_agent_context` | Save AI session checkpoint (also runs automatically) |\n| `list_agent_sessions` | Browse saved session records across tools |\n| `refresh_quick_context` | Refresh local `quick_context.md` snapshot for offline/cross-tool use |\n| `get_profile` | Read user profile (safe=true by default) |\n| `get_work_style` | Read work style preferences |\n| `get_preferences` | Read communication and workflow preferences |\n| `get_trust_boundaries` | Read data access boundaries |\n| `get_quality_standards` | Read quality expectations |\n| `get_playbooks` | List saved operational playbooks |\n| `get_playbook` | Get full content of a single playbook by ID |\n| `get_recent_playbooks` | List playbooks by most recent use |\n| `update_playbook` | Update playbook steps, triggers, or other fields |\n| `archive_playbook` | Archive a playbook that is no longer used |\n| `prepare_playbook_execution` | Generate an executable plan with parameter substitution |\n| `update_execution_step` | Mark a step as completed, skipped, or failed |\n| `get_execution_status` | View current execution progress of a playbook |\n| `get_lessons` | List reusable lessons learned |\n| `get_decisions` | List key decisions and reasons |\n| `get_domains` | Read domain experience stats |\n| `get_knowledge_inheritance` | Build cross-project knowledge starter pack |\n| `list_projects` | List saved project snapshots |\n| `extract_session_insights` | Extract lessons and decisions from session text |\n| `bulk_add_knowledge` | Add multiple lessons or decisions in one call |\n| `ingest_notes` | Parse free-form notes into structured knowledge |\n| `update_knowledge` | Update a lesson or decision by ID |\n| `archive_knowledge` | Archive a lesson or decision by ID |\n| `review_knowledge` | Mark a knowledge item as reviewed |\n| `merge_knowledge` | Merge a duplicate into the primary item |\n| `link_knowledge` | Create a bidirectional link between items |\n| `unlink_knowledge` | Remove a bidirectional knowledge link |\n| `get_knowledge_overview` | Knowledge digest, health report, stale checks |\n| `get_related_knowledge` | Follow links between knowledge items |\n| `find_similar_knowledge` | Find similar items by content |\n| `suggest_merges` | Scan for near-duplicates with actionable merge commands |\n| `classify_legacy_playbooks` | Dry-run project/global/shared scope suggestions for older Playbooks |\n| `apply_legacy_playbook_scope_suggestions` | Apply high-confidence legacy Playbook scope suggestions after confirmation |\n| `rollback_playbook_scope_migration` | Roll back the latest Playbook scope migration |\n| `get_playbook_scope_review_queue` | List ambiguous Playbooks that need manual scope review |\n| `resolve_playbook_scope_review` | Accept global, project, or shared scope for one Playbook review item |\n| `list_playbooks_for_management` | List Playbooks for management, including archived/deleted metadata |\n| `delete_playbook` | Soft-delete a Playbook after confirmation |\n| `restore_playbook` | Restore an archived or deleted Playbook |\n| `get_stale_knowledge` | List items that need review |\n| `export_knowledge_report` | Export a readable Markdown knowledge report |\n| `request_outline_review` | Generate an interactive HTML review page |\n| `apply_review` | Process review results (promote/archive staging items) |\n| `export_engram` | Export a full backup |\n| `import_engram` | Import a backup; use `dry_run=True` first for a metadata-only merge/conflict preview |\n| `export_engram_to_openclaw` | Export OpenClaw-compatible files |\n| `import_engram_from_openclaw` | Import OpenClaw-compatible files |\n| `read_web_content` | Read webpage via local Reader service |\n| `get_audit_log` | Get recent audit log entries |\n| `start_project` | Start a project with inherited knowledge |\n| `add_relation` | Create a typed, directed relation between knowledge items (decision threads) |\n| `remove_relation` | Remove a typed relation (undo of add_relation) |\n| `get_decision_thread` | Reconstruct how a decision evolved step by step |\n| `get_decision_history` | Query the full revision history of a decision by question text |\n| `get_permission_profile` | View all callers' trust levels and access boundaries |\n| `set_caller_trust` | Set or change a caller's trust level |\n| `revoke_caller` | Revoke a caller's future access (forward-only) |\n| `export_feedback_report` | Generate an anonymous beta feedback report |\n\n</details>\n\n## Playbook Auto-Extraction\n\npiia-engram can detect multi-step workflows you complete during a session and automatically draft structured playbooks — no manual recording required.\n\n### How It Works\n\n1. **Detection** — When you call `wrap_up_session` or `save_agent_context`, piia-engram scans for procedural workflow signals: checkpoint steps, action verbs, and trigger keywords.\n2. **Draft generation** — If a workflow is detected, a playbook draft is created with steps, pitfalls, trigger keywords, and preconditions. Sensitive information (API keys, tokens, absolute paths) is automatically redacted before storage.\n3. **Staging** — The draft is saved to a staging area, never auto-promoted to verified. You review and confirm before it becomes a trusted playbook.\n4. **Reuse** — Next time an AI tool encounters a similar task, `search_knowledge` matches the trigger keywords and returns the playbook. The AI follows the proven steps instead of improvising.\n\n### Design Philosophy: Engram Starts, You Confirm, AI Completes\n\nPlaybook auto-extraction is not fully automatic. piia-engram detects the workflow and generates a rough draft — but the draft stays in staging until you explicitly confirm it. Once confirmed, AI tools can refine and follow the playbook autonomously. This keeps humans in the loop for quality control while eliminating the manual work of writing operational procedures.\n\n### Confidence Levels\n\n| Level | Signal | AI Behavior |\n|---|---|---|\n| **high** | 3+ checkpoint steps from `save_agent_context` | AI notifies you: \"Detected a reusable workflow, draft playbook generated.\" |\n| **medium** | Text-based detection (trigger keywords + action verbs) | AI saves silently to staging, no notification. |\n\n### Sensitive Info Redaction\n\nBefore any draft is stored, piia-engram automatically redacts:\n- API keys and tokens (`Bearer`, `sk-`, `ghp_`, etc.)\n- Absolute file paths (Windows and Unix)\n- Email addresses\n- Environment variable secrets\n\n### Kill Switch\n\nUsers can disable or re-enable playbook auto-extraction at any time:\n\n- **Disable:** Tell your AI \"关闭 playbook\" / \"stop playbook\" / \"disable playbook auto-extraction\"\n- **Enable:** Tell your AI \"开启 playbook\" / \"start playbook\" / \"enable playbook auto-extraction\"\n\nThe AI calls `update_identity(field=\"preferences\", ...)` to toggle `playbook_auto_extract`. Default is **enabled**.\n\n### Manual Playbook Creation\n\nYou can always create playbooks manually with `add_playbook`, regardless of the auto-extraction setting. The kill switch only affects automatic detection during `wrap_up_session`.\n\n## Data Layout\n\n```text\n~/.engram/\n|-- schema_version.json\n|-- identity/\n|   |-- profile.json\n|   |-- preferences.json\n|   |-- quality_standards.json\n|   `-- trust_boundaries.json\n|-- knowledge/\n|   |-- lessons.json\n|   |-- decisions.json\n|   `-- domains.json\n|-- playbooks/\n|   |-- _index.json\n|   `-- {playbook_id}.json\n|-- tools/\n|   `-- registry.json\n|-- projects/\n|   `-- {project_id}.json\n|-- contexts/\n|   `-- {tool_name}/\n|       `-- {session_id}.md\n|-- exports/\n`-- compat/\n    `-- openclaw/\n```\n\n### Own & export your data\n\nEverything lives in local JSON you own — inspect, edit, back up, or delete it\ndirectly. Three explicit export paths, each with a different boundary:\n\n| Want | Tool | What it includes |\n|------|------|------------------|\n| A portable card to paste into ChatGPT/Gemini/Kimi | `get_identity_card` | Curated Markdown: who you are, how you work, recent verified lessons/decisions. Excludes raw config-file knowledge and caps recent items. |\n| A readable knowledge report | `export_knowledge_report` | Active lessons/decisions grouped by domain/month (Markdown). |\n| A full local backup | `export_engram` / `import_engram(dry_run=True)` / `engram import <backup.json>` | The whole store as JSON. Treat the file as sensitive — it is a complete backup, including staging and labelled items. Preview imports first to see add/skip/conflict counts without writing data. |\n| OpenClaw files | `export_engram_to_openclaw` | SOUL.md / MEMORY.md / USER.md. |\n| A committable AGENTS.md/CLAUDE.md digest | `engram export-agents-md` | **Verified, non-sensitive** lessons/decisions only, as a summary block. Staging and sensitive items are excluded by construction; refuses to overwrite an existing file. |\n\nExports are **owner-gated** when `ENGRAM_GOVERNANCE=1` (see\n[docs/governance.md](docs/governance.md)). There is no cloud copy and no hidden memory:\nwhat you export is exactly what is on your disk.\n\n**Local data sovereignty.** Backup and restore cover *only* the Engram directory\n— `engram backup-plan` prints a metadata-only list of what to copy before an\nupgrade (it reads no stored knowledge bodies and never reaches outside the\nEngram root). For JSON backups, `import_engram(..., dry_run=True)` or\n`engram import <backup.json>` returns a metadata-only merge plan with\nadd/skip/conflict counts before any write; `--apply --yes` is required to mutate\nthe local store. Same-summary lessons and same-question decisions with divergent\nsemantic fields are previewed as version-chain candidates; they are materialized\nonly when the owner explicitly runs\n`engram import <backup.json> --apply --yes --materialize-version-chain`. Engram\nnever backs up, modifies, or deletes files in your project folders.\nSee [docs/runbooks/setup-upgrade-safety.md](docs/runbooks/setup-upgrade-safety.md).\n\n## Supported Tools\n\n| Tool | Integration | Confidence |\n|---|---|---|\n| Claude Code | MCP over stdio | ✅ Verified |\n| Codex | MCP over stdio | ✅ Verified |\n| Cursor | MCP over stdio | ✅ Verified |\n| Claude Desktop | MCP over stdio | ✅ Verified |\n| Windsurf | MCP over stdio | Expected to work |\n| GitHub Copilot | MCP over stdio | Expected to work |\n| Cline | MCP over stdio | Expected to work |\n| Roo Code | MCP over stdio | Expected to work |\n| Amazon Q | MCP over stdio | Expected to work |\n| Augment | MCP
