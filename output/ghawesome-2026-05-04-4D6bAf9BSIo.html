yperframes-cache/` so they don't clutter the file workspace, daemon dispatches `npx hyperframes render` to dodge the macOS sandbox-exec / Puppeteer hang, only the final `.mp4` lands as a project chip), authors the composition, and ships an MP4. Catalog block thumbnails © HeyGen, served from their CDN; the OSS framework itself is Apache-2.0.\n\n> **Also wired but not surfaced as templates yet:** Kling 2.0 / 1.6 / 1.5, Veo 3 / Veo 2, Sora 2 / Sora 2-Pro (via Fal), MiniMax video-01 — all live in `VIDEO_MODELS` ([`apps/web/src/media/models.ts`](apps/web/src/media/models.ts)). Suno v5 / v4.5, Udio v2, Lyria 2 (music) and gpt-4o-mini-tts, MiniMax TTS (speech) cover the audio surface. Templates for these are open contributions — drop a JSON into `prompt-templates/video/` or `prompt-templates/audio/` and it shows up in the picker.\n\n## Beyond chat — what else ships\n\nThe chat / artifact loop gets the spotlight, but a handful of less-visible capabilities are already wired and worth knowing before you compare OD to anything else:\n\n- **Claude Design ZIP import.** Drop an export from claude.ai onto the welcome dialog. `POST /api/import/claude-design` extracts it into a real `.od/projects/<id>/`, opens the entry file as a tab, and stages a continue-where-Anthropic-left-off prompt for your local agent. No re-prompting, no \"ask the model to re-create what we just had\". ([`apps/daemon/src/server.ts`](apps/daemon/src/server.ts) — `/api/import/claude-design`)\n- **Multi-provider BYOK proxy.** `POST /api/proxy/{anthropic,openai,azure,google}/stream` takes `{ baseUrl, apiKey, model, messages }`, builds the provider-specific upstream request, normalizes SSE chunks into `delta/end/error`, and rejects loopback / link-local / RFC1918 destinations to head off SSRF. OpenAI-compatible covers OpenAI, Azure AI Foundry `/openai/v1`, DeepSeek, Groq, MiMo, OpenRouter, and self-hosted vLLM; Azure OpenAI adds deployment URL + `api-version`; Google uses Gemini `:streamGenerateContent`.\n- **User-saved templates.** Once you like a render, `POST /api/templates` snapshots the HTML + metadata into the SQLite `templates` table. The next project picks it from a \"your templates\" row in the picker — same surface as the shipped 31, but yours.\n- **Tab persistence.** Every project remembers its open files and active tab in the `tabs` table. Reopen the project tomorrow and the workspace looks exactly the way you left it.\n- **Artifact lint API.** `POST /api/artifacts/lint` runs structural checks on a generated artifact (broken `<artifact>` framing, missing required side files, stale palette tokens) and returns findings the agent can read back into its next turn. The five-dim self-critique uses this to ground its score in real evidence, not vibes.\n- **Sidecar protocol + desktop automation.** Daemon, web, and desktop processes carry typed five-field stamps (`app · mode · namespace · ipc · source`) and expose a JSON-RPC IPC channel at `/tmp/open-design/ipc/<namespace>/<app>.sock`. `tools-dev inspect desktop status \\| eval \\| screenshot` drives that channel, so headless E2E works against a real Electron shell without bespoke harnesses ([`packages/sidecar-proto/`](packages/sidecar-proto/), [`apps/desktop/src/main/`](apps/desktop/src/main/)).\n- **Windows-friendly spawning.** Every adapter that would otherwise blow `CreateProcess`'s ~32 KB argv limit on long composed prompts (Codex, Gemini, OpenCode, Cursor Agent, Qwen, Pi) feeds the prompt over stdin instead. Claude Code and Copilot keep `-p`; the daemon falls back to a temp prompt-file when even that overflows.\n- **Per-namespace runtime data.** `OD_DATA_DIR` and `--namespace` give you fully isolated `.od/`-style trees, so Playwright, beta channels, and your real projects never share a SQLite file.\n\n## Anti-AI-slop machinery\n\nThe whole machinery below is the [`huashu-design`](https://github.com/alchaincyf/huashu-design) playbook, ported into OD's prompt-stack and made enforceable per-skill via the side-file pre-flight. Read [`apps/web/src/prompts/discovery.ts`](apps/web/src/prompts/discovery.ts) for the live wording:\n\n- **Question form first.** Turn 1 is `<question-form>` only — no thinking, no tools, no narration. The user chooses defaults at radio speed.\n- **Brand-spec extraction.** When the user attaches a screenshot or URL, the agent runs a five-step protocol (locate · download · grep hex · codify `brand-spec.md` · vocalise) before writing CSS. **Never guesses brand colors from memory.**\n- **Five-dim critique.** Before emitting `<artifact>`, the agent silently scores its output 1–5 across philosophy / hierarchy / execution / specificity / restraint. Anything under 3/5 is a regression — fix and rescore. Two passes is normal.\n- **P0/P1/P2 checklist.** Every skill ships a `references/checklist.md` with hard P0 gates. The agent must pass P0 before emitting.\n- **Slop blacklist.** Aggressive purple gradients, generic emoji icons, rounded card with left-border accent, hand-drawn SVG humans, Inter as a *display* face, invented metrics — explicitly forbidden in the prompt.\n- **Honest placeholders > fake stats.** When the agent doesn't have a real number, it writes `—` or a labelled grey block, not \"10× faster\".\n\n## Comparison\n\n| Axis | [Claude Design][cd] (Anthropic) | [Open CoDesign][ocod] | **Open Design** |\n|---|---|---|---|\n| License | Closed | MIT | **Apache-2.0** |\n| Form factor | Web (claude.ai) | Desktop (Electron) | **Web app + local daemon** |\n| Deployable on Vercel | ❌ | ❌ | **✅** |\n| Agent runtime | Bundled (Opus 4.7) | Bundled ([`pi-ai`][piai]) | **Delegated to user's existing CLI** |\n| Skills | Proprietary | 12 custom TS modules + `SKILL.md` | **31 file-based [`SKILL.md`][skill] bundles, droppable** |\n| Design system | Proprietary | `DESIGN.md` (v0.2 roadmap) | **`DESIGN.md` × 129 systems shipped** |\n| Provider flexibility | Anthropic only | 7+ via [`pi-ai`][piai] | **12 CLI adapters + OpenAI-compatible BYOK proxy** |\n| Init question form | ❌ | ❌ | **✅ Hard rule, turn 1** |\n| Direction picker | ❌ | ❌ | **✅ 5 deterministic directions** |\n| Live todo progress + tool stream | ❌ | ✅ | **✅** (UX pattern from open-codesign) |\n| Sandboxed iframe preview | ❌ | ✅ | **✅** (pattern from open-codesign) |\n| Claude Design ZIP import | n/a | ❌ | **✅ `POST /api/import/claude-design` — keep editing where Anthropic left off** |\n| Comment-mode surgical edits | ❌ | ✅ | 🟡 partial — preview element comments + chat attachments; surgical patch reliability still in progress |\n| AI-emitted tweaks panel | ❌ | ✅ | 🚧 roadmap — dedicated chat-side panel UX is not implemented yet |\n| Filesystem-grade workspace | ❌ | partial (Electron sandbox) | **✅ Real cwd, real tools, persisted SQLite (projects · conversations · messages · tabs · templates)** |\n| 5-dim self-critique | ❌ | ❌ | **✅ Pre-emit gate** |\n| Artifact lint | ❌ | ❌ | **✅ `POST /api/artifacts/lint` — findings fed back to the agent** |\n| Sidecar IPC + headless desktop | ❌ | ❌ | **✅ Stamped processes + `tools-dev inspect desktop status \\| eval \\| screenshot`** |\n| Export formats | Limited | HTML / PDF / PPTX / ZIP / Markdown | **HTML / PDF / PPTX (agent-driven) / ZIP / Markdown** |\n| PPT skill reuse | N/A | Built-in | **[`guizang-ppt-skill`][guizang] drops in (default for deck mode)** |\n| Minimum billing | Pro / Max / Team | BYOK | **BYOK — paste any OpenAI-compatible `baseUrl`** |\n\n[cd]: https://x.com/claudeai/status/2045156267690213649\n[ocod]: https://github.com/OpenCoworkAI/open-codesign\n[piai]: https://github.com/mariozechner/pi-ai\n[acd]: https://github.com/VoltAgent/awesome-claude-design\n[guizang]: https://github.com/op7418/guizang-ppt-skill\n[skill]: https://docs.anthropic.com/en/docs/claude-code/skills\n\n## Supported coding agents\n\nAuto-detected from `PATH` on daemon boot. No config required. Streaming dispatch lives in [`apps/daemon/src/agents.ts`](apps/daemon/src/agents.ts) (`AGENT_DEFS`); per-CLI parsers live alongside it. Models are populated either by probing `<bin> --list-models` / `<bin> models` / ACP handshake, or from a curated fallback list when the CLI doesn't expose a list.\n\n| Agent | Bin | Stream format | Argv shape (composed prompt path) |\n|---|---|---|---|\n| [Claude Code](https://docs.anthropic.com/en/docs/claude-code) | `claude` | `claude-stream-json` (typed events) | `claude -p <prompt> --output-format stream-json --verbose [--include-partial-messages] [--add-dir …] --permission-mode bypassPermissions` |\n| [Codex CLI](https://github.com/openai/codex) | `codex` | `json-event-stream` + `codex` parser | `codex exec --json --skip-git-repo-check --full-auto [-C cwd] [--model …] [-c model_reasoning_effort=…] -` (prompt on stdin) |\n| Devin for Terminal | `devin` | `acp-json-rpc` | `devin --permission-mode dangerous --respect-workspace-trust false acp` |\n| [Gemini CLI](https://github.com/google-gemini/gemini-cli) | `gemini` | `json-event-stream` + `gemini` parser | `GEMINI_CLI_TRUST_WORKSPACE=true gemini --output-format stream-json --yolo [--model …]` (prompt on stdin) |\n| [OpenCode](https://opencode.ai/) | `opencode` | `json-event-stream` + `opencode` parser | `opencode run --format json --dangerously-skip-permissions [--model …] -` (prompt on stdin) |\n| [Cursor Agent](https://www.cursor.com/cli) | `cursor-agent` | `json-event-stream` + `cursor-agent` parser | `cursor-agent --print --output-format stream-json --stream-partial-output --force --trust [--workspace cwd] [--model …] -` (prompt on stdin) |\n| [Qwen Code](https://github.com/QwenLM/qwen-code) | `qwen` | `plain` (raw stdout chunks) | `qwen --yolo [--model …] -` (prompt on stdin) |\n| [GitHub Copilot CLI](https://github.com/features/copilot/cli) | `copilot` | `copilot-stream-json` (typed events) | `copilot -p <prompt> --allow-all-tools --output-format json [--model …] [--add-dir …]` |\n| [Hermes](https://github.com/eqlabs/hermes) | `hermes` | `acp-json-rpc` (Agent Client Protocol) | `hermes acp --accept-hooks` |\n| Kimi CLI | `kimi` | `acp-json-rpc` | `kimi acp` |\n| [Kiro CLI](https://kiro.dev) | `kiro-cli` | `acp-json-rpc` | `kiro-cli acp` |\n| [Mistral Vibe CLI](https://github.com/mistralai/mistral-vibe) | `vibe-acp` | `acp-json-rpc` | `vibe-acp` |\n| [Pi](https://github.com/mariozechner/pi-ai) | `pi` | `pi-rpc` (stdio JSON-RPC) | `pi --mode rpc --no-session [--model …] [--thinking …]` (prompt sent as RPC `prompt` command) |\n| **Multi-provider BYOK** | n/a | SSE normalization | `POST /api/proxy/{provider}/stream` → Anthropic / OpenAI-compatible / Azure OpenAI / Gemini; SSRF-guarded against loopback / link-local / RFC1918 |\n\nAdding a new CLI is one entry in [`apps/daemon/src/agents.ts`](apps/daemon/src/agents.ts). Streaming format is one of `claude-stream-json`, `copilot-stream-json`, `json-event-stream` (with a per-CLI `eventParser`), `acp-json-rpc`, `pi-rpc`, or `plain`.\n\n## References & lineage\n\nEvery external project this repo borrows from. Each link goes to the source so you can verify the provenance.\n\n| Project | Role here |\n|---|---|\n| [`Claude Design`][cd] | The closed-source product this repo is the open-source alternative to. |\n| [**`alchaincyf/huashu-design`**](https://github.com/alchaincyf/huashu-design) | The design-philosophy core. Junior-Designer workflow, the 5-step brand-asset protocol, anti-AI-slop checklist, 5-dimensional self-critique, and the \"5 schools × 20 design philosophies\" library behind our direction picker — all distilled into [`apps/web/src/prompts/discovery.ts`](apps/web/src/prompts/discovery.ts) and [`apps/web/src/prompts/directions.ts`](apps/web/src/prompts/directions.ts). |\n| [**`op7418/guizang-ppt-skill`**][guizang] | Magazine-web-PPT skill bundled verbatim under [`skills/guizang-ppt/`](skills/guizang-ppt/) with original LICENSE preserved. Default for deck mode. P0/P1/P2 checklist culture borrowed for every other skill. |\n| [**`multica-ai/multica`**](https://github.com/multica-ai/multica) | The daemon + adapter architecture. PATH-scan agent detection, local daemon as the only privileged process, agent-as-teammate worldview. We adopt the model; we do not vendor the code. |\n| [**`OpenCoworkAI/open-codesign`**][ocod] | The first open-source Claude-Design alternative and our closest peer. UX patterns adopted: streaming-artifact loop, sandboxed-iframe preview (vendored React 18 + Babel), live agent panel (todos + tool calls + interruptible), five-format export list (HTML/PDF/PPTX/ZIP/Markdown), local-first storage hub, `SKILL.md` taste-injection, and the first pass of comment-mode preview annotations. UX patterns still on our roadmap: full surgical-edit reliability and AI-emitted tweaks panel. **We deliberately do not vendor [`pi-ai`][piai]** — open-codesign bundles it as the agent runtime; we delegate to whichever CLI the user already has. |\n| [`VoltAgent/awesome-claude-design`][acd] / [`awesome-design-md`][acd2] | Source of the 9-section `DESIGN.md` schema and 70 product systems imported via [`scripts/sync-design-systems.ts`](scripts/sync-design-systems.ts). |\n| [`bergside/awesome-design-skills`][ads] | Source of 57 design skills added directly as normalized `DESIGN.md` files under `design-systems/`. |\n| [`farion1231/cc-switch`](https://github.com/farion1231/cc-switch) | Inspiration for symlink-based skill distribution across multiple agent CLIs. |\n| [Claude Code skills][skill] | The `SKILL.md` convention adopted verbatim — any Claude Code skill drops into `skills/` and is picked up by the daemon. |\n\nLong-form provenance write-up — what we take from each, what we deliberately don't — lives at [`docs/references.md`](docs/references.md).\n\n## Roadmap\n\n- [x] Daemon + agent detection (12 CLI adapters) + skill registry + design-system catalog\n- [x] Web app + chat + question form + 5-direction picker + todo progress + sandboxed preview\n- [x] 31 skills + 72 design systems + 5 visual directions + 5 device frames\n- [x] SQLite-backed projects · conversations · messages · tabs · templates\n- [x] Multi-provider BYOK proxy (`/api/proxy/{anthropic,openai,azure,google}/stream`) with SSRF guard\n- [x] Claude Design ZIP import (`/api/import/claude-design`)\n- [x] Sidecar protocol + Electron desktop with IPC automation (STATUS / EVAL / SCREENSHOT / CONSOLE / CLICK / SHUTDOWN)\n- [x] Artifact lint API + 5-dim self-critique pre-emit gate\n- [ ] Comment-mode surgical edits — partial shipped: preview element comments and chat attachments; reliable targeted patching remains in progress\n- [ ] AI-emitted tweaks panel UX — not implemented yet\n- [ ] Vercel + tunnel deployment recipe (Topology B)\n- [ ] One-command `npx od init` to scaffold a project with `DESIGN.md`\n- [ ] Skill marketplace (`od skills install <github-repo>`) and `od skill add | list | remove | test` CLI surface (drafted in [`docs/skills-protocol.md`](docs/skills-protocol.md), implementation pending)\n- [ ] Packaged Electron build out of `apps/packaged/`\n\nPhased delivery → [`docs/roadmap.md`](docs/roadmap.md).\n\n## Status\n\nThis is an early implementation — the closed loop (detect → pick skill + design system → chat → parse `<artifact>` → preview → save) runs end-to-end. The prompt stack and skill library are where most of the value lives, and they're stable. The component-level UI is shipping daily.\n\n## Star us\n\n<p align=\"center\">\n  <a href=\"https://github.com/nexu-io/open-design\"><img src=\"docs/assets/star-us.png\" alt=\"Star Open Design on GitHub — github.com/nexu-io/open-design\" width=\"100%\" /></a>\n</p>\n\nIf this saved you thirty minutes — give it a ★. Stars don't pay rent, but they tell the next designer, agent, and contributor that this experiment is worth their attention. One click, three seconds, real signal: [github.com/nexu-io/open-design](https://github.com/nexu-io/open-design).\n\n## Contributing\n\nIssues, PRs, new skills, and new design systems are all welcome. The highest-leverage contributions are usually one folder, one Markdown file, or one PR-sized adapter:\n\n- **Add a skill** — drop a folder into [`skills/`](skills/) following the [`SKILL.md`][skill] convention.\n- **Add a design system** — drop a `DESIGN.md` into [`design-systems/<brand>/`](design-systems/) using the 9-section schema.\n- **Wire up a new coding-agent CLI** — one entry in [`apps/daemon/src/agents.ts`](apps/daemon/src/agents.ts).\n\nFull walkthrough, bar-for-merging, code style, and what we don't accept → [`CONTRIBUTING.md`](CONTRIBUTING.md) ([Deutsch](CONTRIBUTING.de.md), [Français](CONTRIBUTING.fr.md), [简体中文](CONTRIBUTING.zh-CN.md)).\n\n## Contributors\n\nThanks to everyone who has helped move Open Design forward — through code, docs, feedback, new skills, new design systems, or even a sharp issue. Every real contribution counts, and the wall below is the easiest way to say so out loud.\n\n<a href=\"https://github.com/nexu-io/open-design/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=nexu-io/open-design&cache_bust=2026-05-04\" alt=\"Open Design contributors\" />\n</a>\n\nIf you've shipped your first PR — welcome. The [`good-first-issue`](https://github.com/nexu-io/open-design/labels/good-first-issue) label is the entry point.\n\n## Repository activity\n\n<picture>\n  <img alt=\"Open Design — repository metrics\" src=\"docs/assets/github-metrics.svg\" />\n</picture>\n\nThe SVG above is regenerated daily by [`.github/workflows/metrics.yml`](.github/workflows/metrics.yml) using [`lowlighter/metrics`](https://github.com/lowlighter/metrics). Trigger a manual refresh from the **Actions** tab if you want it sooner; for richer plugins (traffic, follow-up time), add a `METRICS_TOKEN` repository secret with a fine-grained PAT.\n\n## Star History\n\n<a href=\"https://star-history.com/#nexu-io/open-design&Date\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=nexu-io/open-design&type=Date&theme=dark&cache_bust=2026-05-04\" />\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=nexu-io/open-design&type=Date&cache_bust=2026-05-04\" />\n    <img alt=\"Open Design star history\" src=\"https://api.star-history.com/svg?repos=nexu-io/open-design&type=Date&cache_bust=2026-05-04\" />\n  </picture>\n</a>\n\nIf the curve bends up, that's the signal we look for. ★ this repo to push it.\n\n## Credits\n\nThe HTML PPT Studio family of skills — the master [`skills/html-ppt/`](skills/html-ppt/) and the per-template wrappers under [`skills/html-ppt-*/`](skills/) (15 full-deck templates, 36 themes, 31 single-page layouts, 27 CSS animations + 20 canvas FX, the keyboard runtime, and the magnetic-card presenter mode) — are integrated from the open-source project [`lewislulu/html-ppt-skill`](https://github.com/lewislulu/html-ppt-skill) (MIT). The upstream LICENSE ships in-tree at [`skills/html-ppt/LICENSE`](skills/html-ppt/LICENSE) and authorship credit goes to [@lewislulu](https://github.com/lewislulu). Each per-template Examples card (`html-ppt-pitch-deck`, `html-ppt-tech-sharing`, `html-ppt-presenter-mode`, `html-ppt-xhs-post`, …) delegates authoring guidance to the master skill so the upstream's prompt → output behavior is preserved end-to-end when you click **Use this prompt**.\n\nThe magazine / horizontal-swipe deck flow under [`skills/guizang-ppt/`](skills/guizang-ppt/) is integrated from [`op7418/guizang-ppt-skill`](https://github.com/op7418/guizang-ppt-skill) (MIT). Authorship credit goes to [@op7418](https://github.com/op7418).\n\n## License\n\nApache-2.0. The bundled `skills/guizang-ppt/` retains its original [LICENSE](skills/guizang-ppt/LICENSE) (MIT) and authorship attribution to [op7418](https://github.com/op7418). The bundled `skills/html-ppt/` retains its original [LICENSE](skills/html-ppt/LICENSE) (MIT) and authorship attribution to [lewislulu](https://github.com/lewislulu).\n","summary":"Open Design is an open‑source alternative to Anthropic’s Claude Design that lets users create design artifacts locally or on a web deployment while retaining full control over the underlying tools and data. It automatically detects up to 13 AI coding‑agent CLIs on a user’s PATH and coordinates them through 31 composable “skills” spread across 72 brand‑grade design systems, enabling everything from component generation to layout design. Designed with a BYOK philosophy, it can even run a self‑hosted OpenAI‑compatible proxy when no CLI is available, ensuring a truly local‑first workflow. Designers, product teams, and developers who need a customizable, vendor‑agnostic design automation stack will find this modular, agent‑powered framework especially useful.","description":"🎨 Local-first, open-source alternative to Anthropic's Claude Design. ⚡ 19 Skills · ✨ 71 brand-grade Design Systems 🖼 Generate web · desktop · mobile prototypes · slides · images · videos · HyperFrames 📦 Sandboxed preview · HTML/PDF/PPTX/MP4 export 🤖 Runs on Claude Code / Codex / Cursor / Gemini / OpenCode / Qwen / Copilot / Hermes / Kimi CLI.","stars":23200,"language":"TypeScript"},{"owner":"b-nnett","repo":"codex-plusplus","url":"https://github.com/b-nnett/codex-plusplus","readme":"# Codex++\n\n[Join the Discord Community!](https://discord.gg/6bY6gGX36H)\n\nA tweak system for the [Codex](https://chatgpt.com/codex) desktop app. Inject custom features, fix UI bugs, and add a tweak manager — without rebuilding the app.\n\n> **Status:** ~~alpha~~ Beta! Confirmed working on both macOS & Windows. Expect bugs, especially around auto-updating and new Codex updates. PRs welcome.\n\n<img width=\"1413\" height=\"1016\" alt=\"Screenshot 2026-04-28 at 19 42 56\" src=\"https://github.com/user-attachments/assets/ea0b2ffc-c30d-4f68-ae12-dd8d6a997b2f\" />\n\n## What it does\n\n`codex-plusplus` patches your local Codex.app installation so a small **loader** runs on startup. The loader pulls a **runtime** from your user directory, which discovers and loads **tweaks** (small ESM modules with a manifest + `start/stop` lifecycle). The runtime injects a \"Tweaks\" tab into Codex's settings UI so you can enable, disable, and configure tweaks in-app.\n\nEverything beyond the one-time install patch lives **outside** the app bundle, so iterating on tweaks is just save-and-reload.\n\n## Install\n\nAgentic Install (via Codex):\n\n```sh\nInspect & install this for me: https://github.com/b-nnett/codex-plusplus, tell me where you install it and send me the local path for me to add new tweaks.\n```\n\nBun:\n\n```sh\nbun install -g github:b-nnett/codex-plusplus\ncodexplusplus install\n```\n\nSource bootstrap (macOS / Linux):\n\n```sh\ncurl -fsSL https://raw.githubusercontent.com/b-nnett/codex-plusplus/main/install.sh | bash\n```\n\nWindows PowerShell:\n\n```powershell\nirm https://raw.githubusercontent.com/b-nnett/codex-plusplus/main/install.ps1 | iex\n```\n\nThat's it. The installer:\n\n1. Locates your Codex.app (`/Applications/Codex.app`, `%LOCALAPPDATA%/codex/...`, etc.).\n2. Backs it up to `~/.codex-plusplus/backup/`.\n3. Patches `app.asar` to require our loader.\n4. Recomputes the asar header SHA-256 and writes it into `Info.plist` (`ElectronAsarIntegrity`).\n5. Flips `EnableEmbeddedAsarIntegrityValidation` in the Electron Framework binary as a belt-and-suspenders.\n6. Re-signs the app ad-hoc on macOS (`codesign --force --deep --sign -`).\n7. Installs a launch agent / login item that detects app updates and re-runs `repair --quiet`.\n8. Installs the default tweak set from their latest GitHub releases unless `--no-default-tweaks` is passed.\n\nThe watcher also runs hourly through the GitHub-installed local CLI. If a newer Codex++ GitHub release is available, it downloads the release, rebuilds the local CLI/runtime, and runs `repair` so the runtime in your user directory is refreshed without replacing tweak code. You can turn this off from Settings → Codex Plus Plus → Config.\n\nAfter source-bootstrap install, the installer adds `codexplusplus` and `codex-plusplus`\nto a writable PATH directory when possible. Use `codexplusplus` for day-to-day commands:\n\n```sh\ncodexplusplus status\ncodexplusplus repair\ncodexplusplus update\n```\n\n`codexplusplus update` downloads the latest Codex++ GitHub release, rebuilds it, and runs\n`repair`. If the command is not on PATH yet, rerun the source bootstrap once.\nUse `codexplusplus update --ref main` only when you intentionally want the current development branch instead of the latest release.\n\nTo revert:\n\n```sh\ncodexplusplus uninstall\n```\n\nOther commands: `status`, `doctor`, `repair`, `tweaks list`, `tweaks open` (opens user tweaks dir).\n\n### Updating Codex on macOS\n\nCodex++ modifies and ad-hoc signs `Codex.app`, so Sparkle cannot safely install an\nofficial Codex update while the app is patched. Use:\n\n```sh\ncodexplusplus update-codex\n```\n\nThis restores a Developer ID signed Codex.app for the official updater. After\nCodex updates and restarts, the watcher re-applies Codex++ to the new app.\n\nDefault tweaks currently installed on first run:\n\n- `co.bennett.custom-keyboard-shortcuts` from `b-nnett/codex-plusplus-keyboard-shortcuts`\n- `co.bennett.ui-improvements` from `b-nnett/codex-plusplus-bennett-ui`\n\n## Writing a tweak\n\nA tweak is a folder under `<user-data-dir>/tweaks/` with:\n\n```\nmy-tweak/\n├── manifest.json\n└── index.js            # or .mjs / .ts (transpiled by runtime)\n```\n\n```json\n{\n  \"id\": \"com.you.my-tweak\",\n  \"name\": \"My Tweak\",\n  \"version\": \"0.1.0\",\n  \"githubRepo\": \"you/my-tweak\",\n  \"author\": \"you\",\n  \"description\": \"Adds a button.\",\n  \"minRuntime\": \"0.1.0\"\n}\n```\n\n```ts\nimport type { Tweak } from \"@codex-plusplus/sdk\";\n\nexport default {\n  start(api) {\n    api.settings.register({\n      id: \"my-tweak\",\n      title: \"My Tweak\",\n      render: (root) => {\n        root.innerHTML = `<button>hi</button>`;\n      },\n    });\n    api.log.info(\"started\");\n  },\n  stop() {},\n} satisfies Tweak;\n```\n\nSee [`docs/WRITING-TWEAKS.md`](./docs/WRITING-TWEAKS.md) for the full API.\n\n## Tweak updates\n\nEvery tweak manifest must include `githubRepo` in `owner/repo` form. Codex++ checks GitHub Releases for each installed tweak at most once per day and shows **Update Available** in Settings → Tweaks when a newer semver release exists.\n\nCodex++ does **not** auto-update tweaks. The manager links to the GitHub release so users can review the diff, release notes, and repository before manually replacing local tweak files.\n\nSee [`SECURITY.md`](./SECURITY.md) for the security model and reporting policy.\n\n## How it works (TL;DR)\n\n| Thing | Location |\n|---|---|\n| Loader stub | `Codex.app/Contents/Resources/app.asar` (entry replaced with `loader.cjs`) |\n| Runtime | `<user-data-dir>/runtime/` (auto-installed, hot-reloadable) |\n| Tweaks | `<user-data-dir>/tweaks/` |\n| Config | `<user-data-dir>/config.json` |\n| Backup | `<user-data-dir>/backup/` |\n\n`<user-data-dir>` per-OS:\n\n- macOS: `~/Library/Application Support/codex-plusplus/`\n- Linux: `$XDG_DATA_HOME/codex-plusplus/` (default `~/.local/share/codex-plusplus/`)\n- Windows: `%APPDATA%/codex-plusplus/`\n\nSee [`docs/ARCHITECTURE.md`](./docs/ARCHITECTURE.md) for details.\n\n## Legal\n\nThis is an unofficial project. Not affiliated with OpenAI. Modifying Codex.app violates its code signature; on macOS you may need to allow the re-signed app on first launch. Auto-updates from Sparkle overwrite the patch, so `codex-plusplus` installs a watcher that re-applies it.\n\nUse at your own risk.\n\nMIT.\n","summary":"Codex++ is a tweak system for the Codex desktop application that patches the app to inject a loader and runtime, enabling custom ESM‑module tweaks to be loaded at launch. It adds a “Tweaks” tab to Codex’s settings where users can enable, disable, and configure changes to the UI or add new features, all while keeping tweak code outside the app bundle for fast iteration. The installer backs up the original app, applies the patch, sets up a launch daemon, and can automatically repair or update the environment when Codex or Codex++ receives new releases. Codex++ targets power users and developers who wish to extend or customize their Codex experience without rebuilding the entire application.","description":"Codex++ tweak system for the Codex desktop app","stars":887,"language":"TypeScript"},{"owner":"bedriyan","repo":"medkit-app","url":"https://github.com/bedriyan/medkit-app","readme":"# medkit\n\nBrowser-based ER + polyclinic clinical training simulator. You play the doctor: new patients arrive at triage, you talk to them in real time, order tests, treat, disposition. An attending physician (Claude Opus 4.7) watches and grades your decisions.\n\n> Hackathon submission. Cases are plausible but synthetic — no clinical claims.\n\n---\n\n## About\n\nMedkit is a voice-first AI patient simulator for medical students and newly graduated doctors. You take the history, order labs, read imaging, diagnose, and prescribe — talking to AI patients in real time. After each session, an attending grader powered by Claude Opus 4.7 marks your communication, history-taking, and clinical reasoning, citing published guidelines (NICE, ESC, AHA, GINA, GOLD) from a curated registry so the grading can't fabricate sources.\n\nThe format is modelled on OSCE training with standardised patients, which works well but is expensive, scheduled rarely, requires physical attendance, and isn't available in many countries — leaving most trainees globally with little or no access. Medkit makes the same kind of practice available on demand in the browser.\n\nBuilt in three days for the Opus 4.7 hackathon by a medical-doctor-turned-software-engineer ([@bedriyan](https://github.com/bedriyan)), using Claude Code with Opus 4.7.\n\n---\n\n## What's inside\n\n| Layer | Tech |\n|---|---|\n| Frontend | React 18 + TypeScript + Vite, Three.js (`@react-three/fiber`, `@react-three/drei`) |\n| Voice transport | LiveKit Cloud (WebRTC) via `livekit-client` |\n| Voice worker | Python `livekit-agents` — Deepgram Nova-3 STT → Claude Haiku 4.5 → Cartesia Sonic-2 TTS |\n| HTTP backend | FastAPI on `127.0.0.1:8787` — Managed Agents proxy + LiveKit JWT mint |\n| Attending grader | Claude **Opus 4.7** as a Managed Agent (`medkit-attending`) |\n| State | Single `Store` class with `useSyncExternalStore` (no Redux/Zustand) |\n\nTwo flows:\n- **ER** — multiple beds, real-time voice with each patient, tests resolve over simulated minutes.\n- **Polyclinic** — one outpatient at a time, tests resolve instantly.\n\n---\n\n## Prerequisites\n\n- **Node.js 22+** (TS files are run natively via type-stripping)\n- **Python 3.11+**\n- A modern browser with mic permission (Chrome/Edge recommended for WebRTC)\n\n---\n\n## API keys you'll need\n\nAll keys are server-side only — the browser never sees them. Get one of each:\n\n| Service | What it does | Where to get it | Free tier? |\n|---|---|---|---|\n| **Anthropic** | Powers the attending grader (Opus 4.7) and patient voice persona (Haiku 4.5) | https://console.anthropic.com → API Keys | Pay-as-you-go, no free tier |\n| **LiveKit Cloud** | Real-time WebRTC transport between browser ↔ voice worker | https://cloud.livekit.io → create project → Settings → Keys (gives `URL`, `API Key`, `API Secret`) | Yes — generous free tier |\n| **Deepgram** | Streaming speech-to-text inside the voice worker | https://console.deepgram.com → API Keys | Yes — $200 free credit |\n| **Cartesia** | Streaming text-to-speech inside the voice worker | https://play.cartesia.ai → API Keys | Yes — free credit on signup |\n\n---\n\n## Setup\n\n### 1. Frontend\n\n```bash\nnpm install\n```\n\n### 2. Backend (two separate venvs)\n\nThe FastAPI server and the LiveKit voice worker have very different dependency trees, so they each get their own venv.\n\n```bash\ncd backend\n\n# FastAPI server — small (FastAPI + Anthropic + livekit-api)\npython -m venv .venv\n.venv/Scripts/python -m pip install -r requirements.txt\n\n# Voice worker — larger (livekit-agents + Deepgram/Cartesia/Silero plugins)\npython -m venv .venv-voice\n.venv-voice/Scripts/python -m pip install -r voice_agent_requirements.txt\n```\n\n> On macOS/Linux replace `.venv/Scripts/python` with `.venv/bin/python`.\n\n### 3. Configure secrets\n\n```bash\ncp backend/.env.example backend/.env.local\n```\n\nFill in `backend/.env.local`:\n\n```env\nANTHROPIC_API_KEY=sk-ant-...\nLIVEKIT_URL=wss://your-project.livekit.cloud\nLIVEKIT_API_KEY=APIxxxx\nLIVEKIT_API_SECRET=...\nDEEPGRAM_API_KEY=...\nCARTESIA_API_KEY=...\n\n# Leave these blank on first run — see \"Bootstrap the Managed Agent\" below\nMEDKIT_AGENT_ID=\nMEDKIT_ENV_ID=\n```\n\n### 4. Bootstrap the Managed Agent (one-time)\n\nStart the FastAPI server, then create the persistent attending agent:\n\n```bash\nbackend/.venv/Scripts/python backend/server.py\n# In another terminal:\ncurl -X POST http://127.0.0.1:8787/agent/bootstrap\n```\n\nThe response contains an `agent_id` and `environment_id`. Paste them back into `backend/.env.local` as `MEDKIT_AGENT_ID` / `MEDKIT_ENV_ID` and **restart the server**. Subsequent runs are no-ops.\n\n---\n\n## Run (three terminals)\n\n```bash\n# Terminal 1 — frontend\nnpm run dev\n# Vite serves http://localhost:5173\n\n# Terminal 2 — FastAPI backend\nbackend/.venv/Scripts/python backend/server.py\n# Listens on http://127.0.0.1:8787 (proxied by Vite at /agent/* and /voice/*)\n\n# Terminal 3 — LiveKit voice worker\nbackend/.venv-voice/Scripts/python backend/voice_agent.py dev\n# Logs \"registered worker\" once connected to LiveKit Cloud\n```\n\nAll three must be up for voice. The frontend works without the worker — you'll just lose real-time voice (text chat still works).\n\nOpen http://localhost:5173 and grant microphone permission when prompted.\n\n---\n\n## Useful scripts\n\n```bash\nnpm run build      # tsc + vite build\nnpm run preview    # preview production build\nnpm run verify     # deterministic invariants over src/data/* — run after editing cases/tests/treatments\nnpm run test       # custom-tools + loop-commands tests\n```\n\n---\n\n## Project layout\n\n```\nsrc/\n  game/               # Store, types, single source of truth\n  data/               # Patients, tests, treatments, medications, guidelines (pure data)\n  components/         # React UI\n  components/three/   # Three.js scenes (ER room, polyclinic)\n  voice/              # LiveKit conversation + persona builders\n  agents/             # Managed Agent client + custom-tool UI renderer\nbackend/\n  server.py           # FastAPI: Managed Agents proxy + /voice/token\n  voice_agent.py      # LiveKit Agents worker (Deepgram → Haiku → Cartesia)\n.claude/skills/       # Authoring skills (patient generator, rubric author, guideline curator, ...)\nscripts/verify/       # Deterministic data-integrity checks\n```\n\n---\n\n## Model routing\n\n| Call | Model | Why |\n|---|---|---|\n| Patient voice persona | Haiku 4.5 | Fast, cheap, good enough for in-character reply |\n| `medkit-attending` grading | **Opus 4.7** | Clinical reasoning, precision matters |\n\n---\n\n## Notes\n\n- **Group policy on Windows:** scripts call `node node_modules/<pkg>/bin/<entry>.js` instead of the `.bin` shims because some corporate machines block `.exe` wrappers under `node_modules/`. Keep this pattern when adding new scripts.\n- **Prompt caching is on** in the patient-persona path — set `cache_control: { type: 'ephemeral' }` on system prompts when you add new Claude calls.\n- **Out of scope:** multi-agent handoffs, persistent user accounts, anything claiming clinical accuracy.\n\n---\n\n## License\n\nPrivate — hackathon submission. Not licensed for redistribution.\n","summary":"Medkit is a browser‑based emergency‑room and outpatient clinic simulator that lets medical trainees converse with AI patients, order virtual tests, and manage diagnoses in real time. It uses LiveKit for WebRTC voice, Deepgram for speech‑to‑text, Cartesia for text‑to‑speech, and an Anthropic Claude Opus 4.7 grader that cites real guidelines to evaluate history‑taking, communication, and clinical reasoning. The platform offers two modes—an ER flow with multiple simultaneous patients and a steady‑state polyclinic flow—mirroring OSCE training while delivering instant, on‑demand practice. It is especially useful for medical students, new graduates, and institutions that need affordable, scalable, and geographically accessible clinical skills training.","description":"A voice-first AI patient simulator bringing the future of medical education to your browser, built with Claude Opus 4.7.","stars":205,"language":"TypeScript"},{"owner":"CatsJuice","repo":"medal-forge","url":"https://github.com/CatsJuice/medal-forge","readme":"# Medal Forge\n\nA focused Next.js prototype for turning uploaded SVG files into simple 3D medal, badge, and metal plate models.\n\n## What works now\n\n- Upload or paste an SVG design.\n- Preview direct SVG layer extrusion.\n- Save works locally in IndexedDB and load saved works from the sidebar.\n- Export the current work as JSON, including the original SVG source.\n- Select shapes from the layer list with Cmd/Ctrl-click multi-select, Shift-click range select, Cmd/Ctrl+A select all, and Esc clear.\n- Adjust per-shape thickness, bevel, material, color, precision, visibility, and front/back height offset.\n- Reset selected colors back to the original SVG color.\n- Export a GLB model and copy a React/Three code snippet.\n\n## Run\n\n```bash\nnpm install\nnpm run dev\n```\n","summary":"Medal Forge is a lightweight Next.js prototype that transforms uploaded SVG files into simple 3D medal, badge, or metal plate models. It lets users upload or paste SVGs, preview their extrusion, fine‑tune shape properties like thickness, bevel, color, and material, and organize layers with multi‑select tools. The application saves projects to IndexedDB, exports them as JSON or GLB files, and even generates a React/Three.js snippet for integrating the model into a web app. Designers, UX artists, and prototype developers who need quick 3D representations of vector artwork will find this tool useful.","description":null,"stars":249,"language":"TypeScript"},{"owner":"sandeco","repo":"reversa","url":"https://github.com/sandeco/reversa","readme":"# Reversa \n<small>by sandeco</small>\n\n**Turn legacy systems into executable specifications for AI agents.**\n\n[![English Docs](https://img.shields.io/badge/DOCS-English-009c3b?style=for-the-badge&logo=material-for-mkdocs&logoColor=white&labelColor=2d2d2d)](https://sandeco.github.io/reversa/)<br>\n[![Português Docs](https://img.shields.io/badge/DOCS-Portugu%C3%AAs-ffcc00?style=for-the-badge&logo=material-for-mkdocs&logoColor=black&labelColor=2d2d2d)](https://sandeco.github.io/reversa/pt/)<br>\n[![Español Docs](https://img.shields.io/badge/DOCS-Espa%C3%B1ol-c60b1e?style=for-the-badge&logo=material-for-mkdocs&logoColor=white&labelColor=2d2d2d)](https://sandeco.github.io/reversa/es/)\n\nReversa is a specification reverse-engineering framework. Install it inside a legacy project and it coordinates a team of specialized AI agents to analyze the existing code and generate complete, traceable specifications ready for use by any coding agent.\n\n---\n\n## Why Reversa exists\n\nMost production systems carry years of accumulated knowledge: implicit business rules, undocumented architectural decisions, critical logic buried in code nobody wants to touch. That knowledge exists, but it's trapped.\n\nAI agents are transformative for creating and evolving software, but they depend on specifications to operate safely. For new systems, you write the spec and the agent executes. For legacy systems — or those built with pure vibe coding — there is no spec: the agent has no way of knowing what it cannot break.\n\n**Reversa is the bridge between the legacy system and AI agents.**\n\nIt analyzes the existing code, extracts accumulated knowledge (business rules, flows, module contracts, retroactive architectural decisions) and transforms everything into executable, traceable specifications ready for any coding agent.\n\nThe result is not documentation for humans to read. These are **operational contracts** that allow an agent to evolve the system with fidelity to what already exists.\n\n---\n\n## Installation\n\nIn the root of the legacy project:\n\n```bash\nnpx reversa install\n```\n\nThe installer will:\n1. Detect the AI engines present in the environment (Claude Code, Codex, Cursor, etc.)\n2. Ask which agents to install — all selected by default\n3. Collect project name, language, and preferences\n4. Copy agents to `.agents/skills/` (and `.claude/skills/` for Claude Code)\n5. Create the engine entry file (`CLAUDE.md`, `AGENTS.md`, etc.)\n6. Create the `.reversa/` structure with state, configuration, and plan\n7. Generate SHA-256 manifest for safe updates\n\n> Reversa **never deletes or modifies** existing files in your project.\n> Agents write only to `.reversa/` and the output folder (`_reversa_sdd/` by default).\n\n**Requirements:** Node.js 18+\n\n---\n\n> [!IMPORTANT]\n> ### 🔒 Guaranteed immutability of the legacy project\n>\n> The installer only creates new files (`CLAUDE.md`, `AGENTS.md`, `.agents/skills/`, etc.) and **never modifies or deletes any existing file** in your project. During analysis, agents operate under a strict and inviolable directive: **all writes are restricted to `.reversa/` and `_reversa_sdd/`** — no other file in your project is touched.\n\n> [!CAUTION]\n> ### 💾 Back up your project before starting\n>\n> Although Reversa never modifies your files, AI agents can make mistakes. **We strongly recommend:**\n>\n> 1. **Version the project in Git** — make sure all files are committed before starting the analysis\n> 2. **Have the repository on GitHub** (or GitLab, Bitbucket) — so you have a safe remote copy\n> 3. **Make a local copy of the folder** — a simple `cp -r my-project my-project-backup` protects against any unexpected event\n>\n> If something unexpected happens during analysis, you can restore the original state with `git restore .` or from the backup copy.\n\n> [!WARNING]\n> 🔑 **Reversa does not request, store, or transmit API keys from any LLM service.** All intelligence is delegated to the AI agent already present in your environment (Claude Code, Codex, Cursor, etc.) — no external authentication dependencies.\n\n---\n\n## How to use\n\nAfter installation, open the project in the AI agent and activate Reversa:\n\n```\n/reversa\n```\n\nFor engines without slash command support (like Codex):\n\n```\nreversa\n```\n\nReversa will introduce itself, create a personalized exploration plan, and coordinate the entire analysis. Progress is saved in `.reversa/state.json` at each checkpoint — if the session is interrupted, just type `reversa` to resume where you left off.\n\n---\n\n## How it works\n\nReversa uses a 5-phase pipeline orchestrated by the **Reversa** agent:\n\n```\nReconnaissance  Excavation  Interpretation  Generation  Review\n    Scout       Archaeologist  Detective      Writer    Reviewer\n                                Architect\n```\n\nIndependent agents (run at any phase): **Visor**, **Data Master**, **Design System**, **Tracer**\n\n---\n\n## Agents\n\n### Required\n\n| Agent | Role |\n|-------|------|\n| **Reversa** | Central orchestrator. Coordinates all agents, saves checkpoints, guides the user |\n| **Scout** | Maps the surface: folder structure, languages, frameworks, dependencies, entry points |\n| **Archaeologist** | Deep module-by-module analysis: algorithms, control flows, data structures |\n| **Detective** | Extracts implicit business knowledge: rules, retroactive ADRs, state machines, permissions |\n| **Architect** | Synthesizes everything into C4 diagrams, full ERD, integration map, and technical debt |\n| **Writer** | Generates specifications as operational contracts with code traceability |\n\n### Optional (installed by default)\n\n| Agent | Role |\n|-------|------|\n| **Reviewer** | Reviews specs, finds inconsistencies, and validates gaps with the user |\n| **Tracer** | Dynamic analysis: resolves gaps via logs, tracing, and real data (read-only) |\n| **Visor** | Documents the interface from screenshots — without needing the system to be running |\n| **Data Master** | Complete database analysis: DDL, migrations, ORM, ERD, triggers, procedures |\n| **Design System** | Extracts design tokens: colors, typography, spacing, themes, and components |\n| **Chronicler** | Documents code changes during development sessions |\n\n---\n\n## What is generated\n\n```\n_reversa_sdd/\n├── inventory.md              # Project inventory\n├── dependencies.md           # Dependencies with versions\n├── code-analysis.md          # Technical analysis per module\n├── data-dictionary.md        # Data dictionary\n├── domain.md                 # Glossary and business rules\n├── state-machines.md         # State machines in Mermaid\n├── permissions.md            # Permission matrix\n├── architecture.md           # Architectural overview\n├── c4-context.md             # C4 Diagram: Context\n├── c4-containers.md          # C4 Diagram: Containers\n├── c4-components.md          # C4 Diagram: Components\n├── erd-complete.md           # Full ERD in Mermaid\n├── confidence-report.md      # Confidence report 🟢🟡🔴\n├── gaps.md                   # Identified gaps\n├── questions.md              # Questions for human validation\n├── dynamic.md                # Dynamic analysis findings (Tracer)\n├── sdd/                      # Specs per component\n│   └── [component].md\n├── openapi/                  # API specs (if applicable)\n├── user-stories/             # User stories (if applicable)\n├── adrs/                     # Retroactive architectural decisions\n├── flowcharts/               # Flowcharts in Mermaid\n├── sequences/                # Sequence diagrams\n├── ui/                       # Interface specs (Visor)\n├── database/                 # Database specs (Data Master)\n├── design-system/            # Design tokens (Design System)\n└── traceability/\n    ├── spec-impact-matrix.md # Which spec impacts which\n    └── code-spec-matrix.md   # Code file to corresponding spec\n```\n\n### Confidence scale\n\nEvery statement in the specs is marked with:\n\n| Mark | Meaning |\n|------|---------|\n| 🟢 CONFIRMED | Extracted directly from code — can be cited with file and line |\n| 🟡 INFERRED | Deduced from patterns — may be wrong |\n| 🔴 GAP | Not determinable from code — requires human validation |\n\n---\n\n## Supported engines\n\n| Engine | File created | Skills path | Activation |\n|--------|-------------|-------------|------------|\n| Claude Code ⭐ | `CLAUDE.md` | `.claude/skills/reversa-*/` and `.agents/skills/reversa-*/` | `/reversa` |\n| Codex ⭐ | `AGENTS.md` | `.agents/skills/reversa-*/` | `reversa` |\n| Cursor ⭐ | `.cursorrules` | `.agents/skills/reversa-*/` | `/reversa` |\n| Gemini CLI | `GEMINI.md` | `.agents/skills/reversa-*/` | `/reversa` |\n| Windsurf | `.windsurfrules` | `.agents/skills/reversa-*/` | `/reversa` |\n| Antigravity | `AGENTS.md` | `.agents/skills/reversa-*/` | `/reversa` |\n| Kiro | (none) | `.kiro/skills/reversa-*/` and `.agents/skills/reversa-*/` | `/reversa` |\n| Opencode | `AGENTS.md` | `.agents/skills/reversa-*/` | `reversa` |\n| Cline | `.clinerules` | `.agents/skills/reversa-*/` | `/reversa` |\n| Roo Code | `.roorules` | `.agents/skills/reversa-*/` | `/reversa` |\n| GitHub Copilot | `.github/copilot-instructions.md` | `.agents/skills/reversa-*/` | `/reversa` |\n| Aider | `CONVENTIONS.md` | `.agents/skills/reversa-*/` | `reversa` |\n| Amazon Q Developer | `.amazonq/rules/reversa.md` | `.agents/skills/reversa-*/` | `/reversa` |\n\n---\n\n## CLI commands\n\n```bash\nnpx reversa install      # Install Reversa in the project\nnpx reversa status       # Show current analysis state\nnpx reversa update       # Update agents to the latest version\nnpx reversa add-agent    # Add an agent to the project\nnpx reversa add-engine   # Add support for a new engine\nnpx reversa uninstall    # Remove Reversa from the project\n```\n\nThe `update` command detects files you modified via SHA-256 and never overwrites customizations.\nThe `uninstall` command removes only files created by Reversa — nothing from the legacy project is touched.\n\n---\n\n## Internal structure\n\n```\n.reversa/\n├── state.json          # Analysis state between sessions\n├── config.toml         # Project configuration\n├── config.user.toml    # Personal preferences (don't commit)\n├── plan.md             # Exploration plan (user-editable)\n├── version             # Installed version\n├── context/\n│   ├── surface.json    # Generated by Scout\n│   └── modules.json    # Generated by Archaeologist\n└── _config/\n    ├── manifest.yaml       # Installation metadata\n    └── files-manifest.json # SHA-256 hashes for safe updates\n\n.agents/skills/         # Universal skills (all compatible agents)\n.claude/skills/         # Mirror for Claude Code\n```\n\n---\n\n## Contributing\n\nContributions are welcome. Open an issue to discuss before submitting a PR.\n\n```bash\ngit clone https://github.com/sandeco/reversa.git\ncd reversa\nnpm install\n```\n\n---\n\n## License\n\nMIT — see [LICENSE](LICENSE) for details.\n","summary":"Reversa is a reverse‑engineering framework that turns legacy projects into executable, traceable specifications for AI agents, ensuring the original code stays untouched. By deploying a set of specialized agents within a code base, it automatically extracts business rules, architectural decisions, and module contracts and packages them as operational contracts that any coding agent can safely consume. The resulting specifications are not just documentation— they act as an execution contract that lets AI models evolve the system without breaking existing behavior. Developers and teams maintaining or modernizing long‑running codebases benefit most, as Reversa provides a secure bridge between legacy code and emerging AI‑powered development workflows.","description":"Transform legacy systems into executable specifications for AI coding agents","stars":555,"language":"JavaScript"},{"owner":"aattaran","repo":"deepclaude","url":"https://github.com/aattaran/deepclaude","readme":"# deepclaude\n\nUse Claude Code's autonomous agent loop with **DeepSeek V4 Pro**, **OpenRouter**, or any Anthropic-compatible backend. Same UX, 17x cheaper.\n\n![Remote control running DeepSeek V4 Pro in the browser](screenshots/remote-control-deepseek.png)\n\n## What this does\n\nClaude Code is the best autonomous coding agent — but it costs $200/month with usage caps. DeepSeek V4 Pro scores 96.4% on LiveCodeBench and costs $0.87/M output tokens.\n\n**deepclaude** swaps the brain while keeping the body:\n\n```\nYour terminal\n  +-- Claude Code CLI (tool loop, file editing, bash, git - unchanged)\n        +-- API calls -> DeepSeek V4 Pro ($0.87/M) instead of Anthropic ($15/M)\n```\n\nEverything works: file reading, editing, bash execution, subagent spawning, autonomous multi-step coding loops. The only difference is which model thinks.\n\n## Quick start (2 minutes)\n\n### 1. Get a DeepSeek API key\n\nSign up at [platform.deepseek.com](https://platform.deepseek.com), add $5 credit, copy your API key.\n\n### 2. Set environment variables\n\n**Windows (PowerShell):**\n```powershell\nsetx DEEPSEEK_API_KEY \"sk-your-key-here\"\n```\n\n**macOS/Linux:**\n```bash\necho 'export DEEPSEEK_API_KEY=\"sk-your-key-here\"' >> ~/.bashrc\nsource ~/.bashrc\n```\n\n### 3. Install\n\n**Windows:**\n```powershell\n# Copy the script to a directory in your PATH\nCopy-Item deepclaude.ps1 \"$env:USERPROFILE\\.local\\bin\\deepclaude.ps1\"\n\n# Or add the repo directory to PATH\nsetx PATH \"$env:PATH;C:\\path\\to\\deepclaude\"\n```\n\n**macOS/Linux:**\n```bash\nchmod +x deepclaude.sh\nsudo ln -s \"$(pwd)/deepclaude.sh\" /usr/local/bin/deepclaude\n```\n\n### 4. Use it\n\n```bash\ndeepclaude                  # Launch Claude Code with DeepSeek V4 Pro\ndeepclaude --status         # Show available backends and keys\ndeepclaude --backend or     # Use OpenRouter (cheapest, $0.44/M input)\ndeepclaude --backend fw     # Use Fireworks AI (fastest, US servers)\ndeepclaude --backend anthropic  # Normal Claude Code (when you need Opus)\ndeepclaude --cost           # Show pricing comparison\ndeepclaude --benchmark      # Latency test across all providers\ndeepclaude --switch ds      # Switch backend mid-session (no restart)\n```\n\n## How it works\n\nClaude Code reads these environment variables to determine where to send API calls:\n\n| Variable | What it does |\n|---|---|\n| `ANTHROPIC_BASE_URL` | API endpoint (default: api.anthropic.com) |\n| `ANTHROPIC_AUTH_TOKEN` | API key for the backend |\n| `ANTHROPIC_DEFAULT_OPUS_MODEL` | Model name for Opus-tier tasks |\n| `ANTHROPIC_DEFAULT_SONNET_MODEL` | Model name for Sonnet-tier tasks |\n| `ANTHROPIC_DEFAULT_HAIKU_MODEL` | Model name for Haiku-tier (subagents) |\n| `CLAUDE_CODE_SUBAGENT_MODEL` | Model for spawned subagents |\n\n**deepclaude** sets these per-session (not permanently), launches Claude Code, then restores your original settings on exit.\n\n## Supported backends\n\n| Backend | Flag | Input/M | Output/M | Servers | Notes |\n|---|---|---|---|---|---|\n| **DeepSeek** (default) | `--backend ds` | $0.44 | $0.87 | China | Auto context caching (120x cheaper on repeat turns) |\n| **OpenRouter** | `--backend or` | $0.44 | $0.87 | US | Cheapest, lowest latency from US/EU |\n| **Fireworks AI** | `--backend fw` | $1.74 | $3.48 | US | Fastest inference |\n| **Anthropic** | `--backend anthropic` | $3.00 | $15.00 | US | Original Claude Opus (for hard problems) |\n\n### Setup per backend\n\n**DeepSeek** (default - just needs `DEEPSEEK_API_KEY`):\n```bash\nsetx DEEPSEEK_API_KEY \"sk-...\"           # Windows\nexport DEEPSEEK_API_KEY=\"sk-...\"         # macOS/Linux\n```\n\n**OpenRouter** (optional):\n```bash\nsetx OPENROUTER_API_KEY \"sk-or-...\"      # Windows\nexport OPENROUTER_API_KEY=\"sk-or-...\"    # macOS/Linux\n```\n\n**Fireworks AI** (optional):\n```bash\nsetx FIREWORKS_API_KEY \"fw_...\"          # Windows\nexport FIREWORKS_API_KEY=\"fw_...\"        # macOS/Linux\n```\n\n## Cost comparison\n\n| Usage level | Anthropic Max | deepclaude (DeepSeek) | Savings |\n|---|---|---|---|\n| Light (10 days/mo) | $200/mo (capped) | ~$20/mo | 90% |\n| Heavy (25 days/mo) | $200/mo (capped) | ~$50/mo | 75% |\n| With auto loops | $200/mo (capped) | ~$80/mo | 60% |\n\nDeepSeek's automatic context caching makes agent loops extremely cheap - after the first request, the system prompt and file context are cached at $0.004/M (vs $0.44/M uncached).\n\n## What works and what doesn't\n\n### Works\n- File reading, writing, editing (Read/Write/Edit tools)\n- Bash/PowerShell execution\n- Glob and Grep search\n- Multi-step autonomous tool loops\n- Subagent spawning\n- Git operations\n- Project initialization (`/init`)\n- Thinking mode (enabled by default)\n\n### Doesn't work or degraded\n| Feature | Reason |\n|---|---|\n| Image/vision input | DeepSeek's Anthropic endpoint doesn't support images |\n| Parallel tool use | Supported by DeepSeek (up to 128 per call), but Claude Code sends tools sequentially by default |\n| MCP server tools | Not supported through compatibility layer |\n| Prompt caching savings | DeepSeek has its own caching (automatic), but Anthropic's `cache_control` is ignored |\n\n### Intelligence difference\n- **Routine tasks** (80% of work): DeepSeek V4 Pro is comparable to Claude Opus\n- **Complex reasoning** (20%): Claude Opus is stronger - switch with `--backend anthropic`\n\n## Live switching (no restart)\n\nSwitch between Anthropic and DeepSeek **mid-session** - from inside Claude Code itself. No restart, no terminal commands. Just type a slash command.\n\n**In Claude Code terminal:**\n\n![/deepseek in Claude Code CLI](screenshots/terminal%20for%20terminal%20embed2.PNG)\n\n**In Claude Code VS Code extension:**\n\n![/deepseek in VS Code extension](screenshots/terminal%20for%20vscode%20embed2.PNG)\n\n### How it works\n\nThe proxy runs on `localhost:3200` and intercepts all API calls. A control endpoint (`/_proxy/mode`) lets you switch the active backend instantly:\n\n```\nClaude Code -> localhost:3200 (proxy)\n                 |\n                 +-- /_proxy/mode POST -> switch backend\n                 +-- /_proxy/status GET -> current backend + uptime\n                 +-- /_proxy/cost GET -> token usage + cost savings\n                 |\n                 +-- /v1/messages -> active backend (DeepSeek/OpenRouter/Anthropic)\n                 +-- everything else -> Anthropic (passthrough)\n```\n\n### Option 1: Slash commands (recommended)\n\nAdd these files to `~/.claude/commands/`:\n\n**`deepseek.md`:**\n```\nSwitch the model proxy to DeepSeek. Run this command silently and report the result:\ncurl -sX POST http://127.0.0.1:3200/_proxy/mode -d \"backend=deepseek\"\nIf successful, say: \"Switched to DeepSeek.\"\n```\n\n**`anthropic.md`:**\n```\nSwitch the model proxy back to Anthropic. Run this command silently and report the result:\ncurl -sX POST http://127.0.0.1:3200/_proxy/mode -d \"backend=anthropic\"\nIf successful, say: \"Switched to Anthropic.\"\n```\n\n**`openrouter.md`:**\n```\nSwitch the model proxy to OpenRouter. Run this command silently and report the result:\ncurl -sX POST http://127.0.0.1:3200/_proxy/mode -d \"backend=openrouter\"\nIf successful, say: \"Switched to OpenRouter.\"\n```\n\nThen type `/deepseek`, `/anthropic`, or `/openrouter` in any Claude Code session to switch instantly.\n\n### Option 2: CLI flag\n\n```bash\ndeepclaude --switch deepseek    # or: ds, or, fw, anthropic\ndeepclaude -s anthropic\n```\n\n### Option 3: VS Code keyboard shortcuts\n\nAdd to `.vscode/tasks.json`:\n```json\n{\n  \"version\": \"2.0.0\",\n  \"tasks\": [\n    {\n      \"label\": \"Proxy: Switch to DeepSeek\",\n      \"type\": \"shell\",\n      \"command\": \"Invoke-RestMethod -Uri http://127.0.0.1:3200/_proxy/mode -Method Post -Body 'backend=deepseek'\",\n      \"presentation\": { \"reveal\": \"always\" },\n      \"problemMatcher\": []\n    },\n    {\n      \"label\": \"Proxy: Switch to Anthropic\",\n      \"type\": \"shell\",\n      \"command\": \"Invoke-RestMethod -Uri http://127.0.0.1:3200/_proxy/mode -Method Post -Body 'backend=anthropic'\",\n      \"presentation\": { \"reveal\": \"always\" },\n      \"problemMatcher\": []\n    }\n  ]\n}\n```\n\nThen bind in `keybindings.json`:\n```json\n{ \"key\": \"ctrl+alt+d\", \"command\": \"workbench.action.tasks.runTask\", \"args\": \"Proxy: Switch to DeepSeek\" },\n{ \"key\": \"ctrl+alt+a\", \"command\": \"workbench.action.tasks.runTask\", \"args\": \"Proxy: Switch to Anthropic\" }\n```\n\n### Cost tracking\n\nThe proxy tracks token usage and calculates savings vs Anthropic pricing:\n\n```bash\ncurl -s http://127.0.0.1:3200/_proxy/cost\n```\n\nReturns:\n```json\n{\n  \"backends\": {\n    \"deepseek\": {\n      \"input_tokens\": 125000,\n      \"output_tokens\": 45000,\n      \"requests\": 12,\n      \"cost\": 0.0941,\n      \"anthropic_equivalent\": 1.05\n    }\n  },\n  \"total_cost\": 0.0941,\n  \"anthropic_equivalent\": 1.05,\n  \"savings\": 0.9559\n}\n```\n\n## VS Code / Cursor integration\n\nAdd terminal profiles so you can launch deepclaude from the IDE:\n\n**Settings > JSON:**\n```json\n{\n  \"terminal.integrated.profiles.windows\": {\n    \"DeepSeek Agent\": {\n      \"path\": \"powershell.exe\",\n      \"args\": [\"-ExecutionPolicy\", \"Bypass\", \"-NoExit\", \"-File\", \"C:\\\\path\\\\to\\\\deepclaude.ps1\"]\n    }\n  }\n}\n```\n\nOr on macOS/Linux:\n```json\n{\n  \"terminal.integrated.profiles.linux\": {\n    \"DeepSeek Agent\": {\n      \"path\": \"/usr/local/bin/deepclaude\"\n    }\n  }\n}\n```\n\n## Remote control (`--remote`)\n\nOpen a Claude Code session in any browser - with DeepSeek as the brain:\n\n```bash\ndeepclaude --remote                # Remote control + DeepSeek\ndeepclaude --remote -b or          # Remote control + OpenRouter\ndeepclaude --remote -b anthropic   # Remote control + Anthropic (normal)\n```\n\nThis prints a `https://claude.ai/code/session_...` URL you can open on your phone, tablet, or any browser.\n\n### How it works\n\nRemote control needs Anthropic's bridge for the WebSocket connection, but model calls can go elsewhere. deepclaude starts a local proxy that splits the traffic:\n\n```\nclaude remote-control\n  +-- Bridge WebSocket -> wss://bridge.claudeusercontent.com (Anthropic, hardcoded)\n  +-- Model API calls  -> http://localhost:3200 (proxy)\n                            +-- /v1/messages -> DeepSeek ($0.87/M)\n                            +-- everything else -> Anthropic (passthrough)\n```\n\n### Prerequisites\n- Must be logged into Claude Code: `claude auth login`\n- Must have a claude.ai subscription (the bridge is Anthropic infrastructure)\n- Node.js 18+ (for the proxy)\n\nThe proxy starts automatically and stops when the session ends. See [proxy/README.md](proxy/README.md) for technical details.\n\n## License\n\nMIT\n","summary":"deepclaude lets users run the Apache‑licensed Claude Code autonomous coding agent with alternative, lower‑cost LLM back‑ends such as DeepSeek V4 Pro, OpenRouter, or Fireworks AI while preserving the original terminal UX and file‑editing, bash‑execution, and sub‑agent capabilities. It swaps the API calls via environment variables, allows mid‑session backend switching, and includes command‑line options for cost comparison, latency benchmarking, and backend selection, all without modifying the underlying agent loop. The result is a 17‑fold price reduction compared to Anthropic’s official Claude Code and access to fast, region‑specific inference servers. Developers and AI practitioners who rely on Claude Code for autonomous coding yet need tighter budgets will benefit most from this lightweight stub that keeps the same functionality while slashing expenses.","description":"Use Claude Code's autonomous agent loop with DeepSeek V4 Pro, OpenRouter, or any Anthropic-compatible backend. Same UX, 17x cheaper.","stars":906,"language":"JavaScript"},{"owner":"VectifyAI","repo":"OpenKB","url":"https://github.com/VectifyAI/OpenKB","readme":"<div align=\"center\">\n\n<a href=\"https://openkb.ai\">\n  <img src=\"https://docs.pageindex.ai/images/openkb.png\" alt=\"OpenKB (by PageIndex)\" />\n</a>\n\n# OpenKB — Open LLM Knowledge Base\n\n<p align=\"center\"><i>Scale to long documents&nbsp; • &nbsp;Reasoning-based retrieval&nbsp; • &nbsp;Native multi-modality&nbsp; • &nbsp;No Vector DB</i></p>\n\n</div>\n\n---\n\n# 📑 What is OpenKB\n\n**OpenKB (Open Knowledge Base)** is an open-source system (in CLI) that compiles raw documents into a structured, interlinked wiki-style knowledge base using LLMs, powered by [**PageIndex**](https://github.com/VectifyAI/PageIndex) for vectorless long document retrieval.\n\nThe idea is based on a [concept](https://x.com/karpathy/status/2039805659525644595) described by Andrej Karpathy: LLMs generate summaries, concept pages, and cross-references, all maintained automatically. Knowledge compounds over time instead of being re-derived on every query.\n\n### Why not traditional RAG?\n\nTraditional RAG rediscovers knowledge from scratch on every query. Nothing accumulates. OpenKB compiles knowledge once into a persistent wiki, then keeps it current. Cross-references already exist. Contradictions are flagged. Synthesis reflects everything consumed.\n\n### Features\n\n- **Broad format support** — PDF, Word, Markdown, PowerPoint, HTML, Excel, text, and more via markitdown\n- **Scale to long documents** — Long and complex documents are handled via [PageIndex](https://github.com/VectifyAI/PageIndex) tree indexing, enabling accurate, vectorless long-context retrieval\n- **Native multi-modality** — Retrieves and understands figures, tables, and images, not just text\n- **Compiled Wiki** — LLM manages and compiles your documents into summaries, concept pages, and cross-links, all kept in sync\n- **Query** — Ask questions (one-off) against your wiki. The LLM navigates your compiled knowledge to answer\n- **Interactive Chat** — Multi-turn conversations with persisted sessions you can resume across runs\n- **Lint** — Health checks find contradictions, gaps, orphans, and stale content\n- **Watch mode** — Drop files into `raw/`, wiki updates automatically\n- **Obsidian compatible** — Wiki is plain `.md` files with `[[wikilinks]]`. Open in Obsidian for graph view and browsing\n\n# 🚀 Getting Started\n\n### Install\n\n```bash\npip install openkb\n```\n\n<details>\n<summary><i>Other install options</i></summary>\n\n- **Latest from GitHub:**\n\n  ```bash\n  pip install git+https://github.com/VectifyAI/OpenKB.git\n  ```\n\n- **Install from source** (editable, for development):\n\n  ```bash\n  git clone https://github.com/VectifyAI/OpenKB.git\n  cd OpenKB\n  pip install -e .\n  ```\n\n</details>\n\n### Quick Start\n\n```bash\n# 1. Create a directory for your knowledge base\nmkdir my-kb && cd my-kb\n\n# 2. Initialize the knowledge base\nopenkb init\n\n# 3. Add documents\nopenkb add paper.pdf\nopenkb add ~/papers/  # Add a whole directory\n\n# 4. Ask a question\nopenkb query \"What are the main findings?\"\n\n# 5. Or chat interactively\nopenkb chat\n```\n\n### Set up your LLM\n\nOpenKB comes with [multi-LLM support](https://docs.litellm.ai/docs/providers) (e.g., OpenAI, Claude, Gemini) via [LiteLLM](https://github.com/BerriAI/litellm) (pinned to a [safe version](https://docs.litellm.ai/blog/security-update-march-2026)).\n\nSet your model during `openkb init`, or in [`.openkb/config.yaml`](#configuration), using `provider/model` LiteLLM format (like `anthropic/claude-sonnet-4-6`). OpenAI models can omit the prefix (like `gpt-5.4`).\n\nCreate a `.env` file with your LLM API key:\n\n```bash\nLLM_API_KEY=your_llm_api_key\n```\n\n# 🧩 How OpenKB Works\n\n### Architecture\n\n```\nraw/                              You drop files here\n │\n ├─ Short docs ──→ markitdown ──→ LLM reads full text\n │                                     │\n ├─ Long PDFs ──→ PageIndex ────→ LLM reads document trees\n │                                     │\n │                                     ▼\n │                         Wiki Compilation (using LLM)\n │                                     │\n ▼                                     ▼\nwiki/\n ├── index.md            Knowledge base overview\n ├── log.md              Operations timeline\n ├── AGENTS.md           Wiki schema (LLM instructions)\n ├── sources/            Full-text conversions\n ├── summaries/          Per-document summaries\n ├── concepts/           Cross-document synthesis ← the good stuff\n ├── explorations/       Saved query results\n └── reports/            Lint reports\n```\n\n### Short vs. Long Document Handling\n\n| | Short documents | Long documents (PDF ≥ 20 pages) |\n|---|---|---|\n| **Convert** | markitdown → Markdown | PageIndex → tree index + summaries |\n| **Images** | Extracted inline (pymupdf) | Extracted by PageIndex |\n| **LLM reads** | Full text | Document trees |\n| **Result** | summary + concepts | summary + concepts |\n\nShort docs are read in full by the LLM. Long PDFs are indexed by PageIndex into a hierarchical tree with summaries. The LLM reads the tree instead of the full text, enabling better retrieval from long documents.\n\n### Knowledge Compilation\n\nWhen you add a document, the LLM:\n\n1. Generates a **summary** page\n2. Reads existing **concept** pages\n3. Creates or updates concepts with cross-document synthesis\n4. Updates the **index** and **log**\n\nA single source might touch 10-15 wiki pages. Knowledge accumulates: each document enriches the existing wiki rather than sitting in isolation.\n\n# ⚙️ Usage\n\n### Commands\n\n| Command | Description |\n|---|---|\n| `openkb init` | Initialize a new knowledge base (interactive) |\n| <code>openkb&nbsp;add&nbsp;&lt;file_or_dir&gt;</code> | Add documents and compile to wiki |\n| <code>openkb&nbsp;query&nbsp;\"question\"</code> | Ask a question over the knowledge base (use `--save` to save the answer to `wiki/explorations/`) |\n| `openkb chat` | Start an interactive multi-turn chat (use `--resume`, `--list`, `--delete` to manage sessions) |\n| `openkb watch` | Watch `raw/` and auto-compile new files |\n| `openkb lint` | Run structural + knowledge health checks |\n| `openkb list` | List indexed documents and concepts |\n| `openkb status` | Show knowledge base stats |\n\n<!-- | `openkb lint --fix` | Auto-fix what it can | -->\n\n### Interactive Chat\n\n`openkb chat` opens an interactive chat session over your wiki knowledge base. Unlike the one-shot `openkb query`, each turn carries the conversation history, so you can dig into a topic without re-typing context.\n\n```bash\nopenkb chat                       # start a new session\nopenkb chat --resume              # resume the most recent session\nopenkb chat --resume 20260411     # resume by id (unique prefix works)\nopenkb chat --list                # list all sessions\nopenkb chat --delete <id>         # delete a session\n```\n\nInside a chat, type `/` to access slash commands (Tab to complete):\n\n- `/help` — list available commands\n- `/status` — show knowledge base status\n- `/list` — list all documents\n- `/add <path>` — add a document or directory without leaving the chat\n- `/save [name]` — export the transcript to `wiki/explorations/`\n- `/clear` — start a fresh session (the current one stays on disk)\n- `/lint` — run knowledge base lint\n- `/exit` — exit (Ctrl-D also works)\n\n### Configuration\n\nSettings are initialized by `openkb init`, and stored in `.openkb/config.yaml`:\n\n```yaml\nmodel: gpt-5.4                   # LLM model (any LiteLLM-supported provider)\nlanguage: en                     # Wiki output language\npageindex_threshold: 20          # PDF pages threshold for PageIndex\n```\n\nModel names use `provider/model` LiteLLM [format](https://docs.litellm.ai/docs/providers) (OpenAI models can omit the prefix):\n\n| Provider | Model example |\n|---|---|\n| OpenAI | `gpt-5.4` |\n| Anthropic | `anthropic/claude-sonnet-4-6` |\n| Gemini | `gemini/gemini-3.1-pro-preview` |\n\n### PageIndex Integration\n\nLong documents are challenging for LLMs due to context limits, context rot, and summarization loss.\n[PageIndex](https://github.com/VectifyAI/PageIndex) solves this with vectorless, reasoning-based retrieval — building a hierarchical tree index that lets LLMs reason over the index for context-aware retrieval.\n\nPageIndex runs locally by default using the [open-source version](https://github.com/VectifyAI/PageIndex), with no external dependencies required.\n\n#### Optional: Cloud Support\n\nFor large or complex PDFs, [PageIndex Cloud](https://docs.pageindex.ai/) can be used to access additional capabilities, including:\n\n- OCR support for scanned PDFs (via hosted VLM models)\n- Faster structure generation\n- Scalable indexing for large documents\n\nSet `PAGEINDEX_API_KEY` in your `.env` to enable cloud features:\n\n```\nPAGEINDEX_API_KEY=your_pageindex_api_key\n```\n\n### AGENTS.md\n\nThe `wiki/AGENTS.md` file defines wiki structure and conventions. It's the LLM's instruction manual for maintaining the wiki. Customize it to change how your wiki is organized.\n\nAt runtime, the LLM reads `AGENTS.md` from disk, so your edits take effect immediately.\n\n### Using with Obsidian\n\nOpenKB's wiki is a directory of Markdown files with `[[wikilinks]]`. Obsidian renders it natively.\n\n1. Open `wiki/` as an Obsidian vault\n2. Browse summaries, concepts, and explorations\n3. Use graph view to see knowledge connections\n4. Use Obsidian Web Clipper to add web articles to `raw/`\n\n# 🧭 Learn More\n\n### Compared to Karpathy's Approach\n\n| | Karpathy's workflow | OpenKB |\n|---|---|---|\n| Short documents | LLM reads directly | markitdown → LLM reads |\n| Long documents | Context limits, context rot | PageIndex tree index |\n| Supported formats | Web clipper → .md | PDF, Word, PPT, Excel, HTML, text, CSV, .md |\n| Wiki compilation | LLM agent | LLM agent (same) |\n| Q&A | Query over wiki | Wiki + PageIndex retrieval |\n\n### The Stack\n\n- [PageIndex](https://github.com/VectifyAI/PageIndex) — Vectorless, reasoning-based document indexing and retrieval\n- [markitdown](https://github.com/microsoft/markitdown) — Universal file-to-markdown conversion\n- [OpenAI Agents SDK](https://github.com/openai/openai-agents-python) — Agent framework (supports non-OpenAI models via LiteLLM)\n- [LiteLLM](https://github.com/BerriAI/litellm) — Multi-provider LLM gateway\n- [Click](https://click.palletsprojects.com/) — CLI framework\n- [watchdog](https://github.com/gorakhargosh/watchdog) — Filesystem monitoring\n\n### Roadmap\n\n- [ ] Extend long document handling to non-PDF formats\n- [ ] Scale to large document collections with nested folder support\n- [ ] Hierarchical concept (topic) indexing for massive knowledge bases\n- [ ] Database-backed storage engine\n- [ ] Web UI for browsing and managing wikis\n\n### Contributing\n\nContributions are welcome! Please submit a pull request, or open an [issue](https://github.com/VectifyAI/OpenKB/issues) for bugs or feature requests. For larger changes, consider opening an issue first to discuss the approach.\n\n### License\n\nApache 2.0. See [LICENSE](LICENSE).\n\n### Support Us\n\nIf you find OpenKB useful, please give us a star 🌟 — and check out [PageIndex](https://github.com/VectifyAI/PageIndex) too!  \n\n<div>\n\n[![Twitter](https://img.shields.io/badge/Twitter-000000?style=for-the-badge&logo=x&logoColor=white)](https://x.com/PageIndexAI)&ensp;\n[![LinkedIn](https://img.shields.io/badge/LinkedIn-0077B5?style=for-the-badge&logo=linkedin&logoColor=white)](https://www.linkedin.com/company/vectify-ai/)&ensp;\n[![Contact Us](https://img.shields.io/badge/Contact_Us-3B82F6?style=for-the-badge&logo=envelope&logoColor=white)](https://ii2abc2jejf.typeform.com/to/tK3AXl8T)\n\n</div>\n","summary":"OpenKB is an open‑source command‑line tool that turns raw documents into a persistent, wiki‑style knowledge base by using LLMs to generate summaries, concept pages, and cross‑links—all stored as Markdown files. It supports a wide range of formats including PDFs, Word, HTML, and images, and leverages PageIndex’s tree‑based indexing to enable accurate, vector‑less retrieval of long documents while handling tables and figures natively. Users can query the compiled knowledge, engage in multi‑turn chats, run lint checks for contradictions, and keep the wiki up‑to‑date via watch mode, making it ideal for researchers, technical writers, and teams that need a continually refreshed, searchable repository of complex documents. The output is Obsidian‑compatible, letting readers browse the knowledge graph visually.","description":"OpenKB: Open LLM Knowledge Base","stars":1330,"language":"Python"},{"owner":"alejandrobalderas","repo":"claude-code-from-source","url":"https://github.com/alejandrobalderas/claude-code-from-source","readme":"# Claude Code from Source\n\n**Architecture, Patterns & Internals of Anthropic's AI Coding Agent**\n\n<p align=\"center\">\n  <img src=\"./web/public/cover.jpg\" alt=\"Claude Code from Source — Book Cover\" width=\"400\" />\n  <br/><br/>\n  <a href=\"https://claude-code-from-source.com\"><strong>Read online at claude-code-from-source.com</strong></a>\n</p>\n\n---\n\n> **This repository is purely educational.** It contains no source code from Claude Code — not a single line. Every code block is original pseudocode written to illustrate architectural patterns. The goal is to help engineers understand how production AI agents are built, not to reproduce or redistribute proprietary software.\n\n---\n\nWhen Anthropic shipped Claude Code on npm, the `.js.map` source maps contained a `sourcesContent` field with the full original TypeScript. This book is the result of studying that architecture and distilling the patterns, trade-offs, and design decisions into a technical narrative that any engineer can learn from.\n\n**18 chapters across 7 parts.** ~400 pages in print equivalent.\n\nEvery chapter has layered depth: a narrative flow for technical leaders, deep-dive sections for implementers, and an **\"Apply This\"** closing that extracts transferable patterns you can steal for your own systems. Diagrams use [Mermaid](https://mermaid.js.org/) and render natively on GitHub.\n\n---\n\n## Who This Is For\n\n- **Senior engineers building agentic systems** — steal the patterns, understand the trade-offs, implement in your own stack\n- **Technical leaders evaluating architectures** — follow the narrative without reading every code block\n- **Anyone curious about how production AI tools actually work** under the hood\n\n---\n\n## Table of Contents\n\n### Part I: Foundations\n*Before the agent can think, the process must exist.*\n\n| # | Chapter | What You'll Learn |\n|---|---------|-------------------|\n| 1 | [The Architecture of an AI Agent](./book/ch01-architecture.md) | The 6 key abstractions, data flow, permission system, build system |\n| 2 | [Starting Fast — The Bootstrap Pipeline](./book/ch02-bootstrap.md) | 5-phase init, module-level I/O parallelism, trust boundary |\n| 3 | [State — The Two-Tier Architecture](./book/ch03-state.md) | Bootstrap singleton, AppState store, sticky latches, cost tracking |\n| 4 | [Talking to Claude — The API Layer](./book/ch04-api-layer.md) | Multi-provider client, prompt cache, streaming, error recovery |\n\n### Part II: The Core Loop\n*The heartbeat of the agent: stream, act, observe, repeat.*\n\n| # | Chapter | What You'll Learn |\n|---|---------|-------------------|\n| 5 | [The Agent Loop](./book/ch05-agent-loop.md) | query.ts deep dive, 4-layer compression, error recovery, token budgets |\n| 6 | [Tools — From Definition to Execution](./book/ch06-tools.md) | Tool interface, 14-step pipeline, permission system |\n| 7 | [Concurrent Tool Execution](./book/ch07-concurrency.md) | Partition algorithm, streaming executor, speculative execution |\n\n### Part III: Multi-Agent Orchestration\n*One agent is powerful. Many agents working together are transformative.*\n\n| # | Chapter | What You'll Learn |\n|---|---------|-------------------|\n| 8 | [Spawning Sub-Agents](./book/ch08-sub-agents.md) | AgentTool, 15-step runAgent lifecycle, built-in agent types |\n| 9 | [Fork Agents and the Prompt Cache](./book/ch09-fork-agents.md) | Byte-identical prefix trick, cache sharing, cost optimization |\n| 10 | [Tasks, Coordination, and Swarms](./book/ch10-coordination.md) | Task state machine, coordinator mode, swarm messaging |\n\n### Part IV: Persistence and Intelligence\n*An agent without memory makes the same mistakes forever.*\n\n| # | Chapter | What You'll Learn |\n|---|---------|-------------------|\n| 11 | [Memory — Learning Across Conversations](./book/ch11-memory.md) | File-based memory, 4-type taxonomy, LLM recall, staleness |\n| 12 | [Extensibility — Skills and Hooks](./book/ch12-extensibility.md) | Two-phase skill loading, lifecycle hooks, snapshot security |\n\n### Part V: The Interface\n*Everything the user sees passes through this layer.*\n\n| # | Chapter | What You'll Learn |\n|---|---------|-------------------|\n| 13 | [The Terminal UI](./book/ch13-terminal-ui.md) | Custom Ink fork, rendering pipeline, double-buffer, pools |\n| 14 | [Input and Interaction](./book/ch14-input-interaction.md) | Key parsing, keybindings, chord support, vim mode |\n\n### Part VI: Connectivity\n*The agent reaches beyond localhost.*\n\n| # | Chapter | What You'll Learn |\n|---|---------|-------------------|\n| 15 | [MCP — The Universal Tool Protocol](./book/ch15-mcp.md) | 8 transports, OAuth for MCP, tool wrapping |\n| 16 | [Remote Control and Cloud Execution](./book/ch16-remote.md) | Bridge v1/v2, CCR, upstream proxy |\n\n### Part VII: Performance Engineering\n*Making it all fast enough that humans don't notice the machinery.*\n\n| # | Chapter | What You'll Learn |\n|---|---------|----
