<script id="project-data" type="application/json">[{"owner":"GENEXIS-AI","repo":"chromex","url":"https://github.com/GENEXIS-AI/chromex","readme":"# Chromex\n\n[![CI](https://github.com/GENEXIS-AI/chromex/actions/workflows/ci.yml/badge.svg)](https://github.com/GENEXIS-AI/chromex/actions/workflows/ci.yml)\n[![License: MIT](https://img.shields.io/badge/license-MIT-blue.svg)](./LICENSE)\n[![GitHub stars](https://img.shields.io/github/stars/GENEXIS-AI/chromex?style=social)](https://github.com/GENEXIS-AI/chromex/stargazers)\n[![English](https://img.shields.io/badge/readme-English-111827.svg)](./README.md)\n[![한국어](https://img.shields.io/badge/readme-한국어-2563eb.svg)](./readmes/README.ko.md)\n[![日本語](https://img.shields.io/badge/readme-日本語-dc2626.svg)](./readmes/README.ja.md)\n[![简体中文](https://img.shields.io/badge/readme-简体中文-16a34a.svg)](./readmes/README.zh-CN.md)\n\nChromex is a Chrome MV3 side-panel assistant that connects Chrome to Codex through a local native bridge. It helps users work with the current page, selected tabs, uploaded files, voice input, images, and browser workflows while keeping credentials out of extension storage.\n\nPublished by **GenexisAI CHOI**.\n\n![Chromex browser side-panel assistant](./assets/chromex-hero.png)\n\n## What It Does\n\n- Chat with the current webpage, selected open tabs, screenshots, uploaded files, PDFs, Office files, images, and browser history when requested.\n- Summarize and compare page content, YouTube videos, news articles, research pages, PDFs, and arXiv papers.\n- Edit or generate images through Codex image workflows with local output handling.\n- Use voice transcription, live voice mode, page-aware suggestions, custom profiles, and optional Codex skills.\n- Run browser-control workflows through Chrome content scripts with visible in-page activity indicators.\n\n## Install From Source\n\nUse the source checkout or [`chromex-public-source.zip`](https://github.com/GENEXIS-AI/chromex/releases/latest/download/chromex-public-source.zip):\n\n```bash\ngit clone https://github.com/GENEXIS-AI/chromex.git\ncd chromex\nnpm install\nnpm run build\nnode scripts/install-native-host.mjs\n```\n\nThen close every Chrome window, reopen Chrome, open `chrome://extensions`, enable **Developer mode**, select **Load unpacked**, and choose:\n\n```text\npackages/extension/dist\n```\n\nImportant: run `npm install`, `npm run build`, and `install-native-host.mjs` from the `chromex` source folder that contains `package.json`. If Windows reports `ENOENT Could not read package.json`, you are in the wrong folder.\n\n### Windows Local Bridge Setup\n\nOn Windows, install Node.js 20 LTS or newer, then install and verify the Codex CLI first:\n\n```powershell\nnpm install -g @openai/codex\ncodex --version\n```\n\nUse the npm install path above even if `winget install Codex -s msstore` fails. `0x8a15005e: The server certificate did not match any of the expected values` is a Windows Store / TLS certificate-chain problem outside Chromex, not a Chromex install step.\n\nThen use **PowerShell** from the `chromex` source folder:\n\n```powershell\nnpm install\nnpm run build\nnode scripts/install-native-host.mjs --browser=chrome\n```\n\nThen open `chrome://extensions`, click **Reload** on Chromex, and press **Check connection** in the Chromex side panel.\n\nIf the side panel still says the local bridge is waiting:\n\n1. Confirm Chromex is loaded from `packages/extension/dist`.\n2. Copy the extension ID shown on the Chromex card in `chrome://extensions`.\n3. Re-run the installer with that ID:\n\n```powershell\nnode scripts/install-native-host.mjs <extension-id> --browser=chrome\n```\n\nThe expected public release ID is `menmlhahmendmkiicbjihgjhppkgaeom`. If Chrome shows a different ID, use the ID shown in Chrome.\n\nIf login fails with `Failed to start codex app-server`, Chromex can reach the local bridge but cannot start the Codex CLI. Re-run `codex --version`. If Windows cannot find it, set the optional Codex binary path to `%APPDATA%\\npm\\codex.cmd`, or set the folder to `%APPDATA%\\npm`. Do not put your workspace folder in the Codex binary field; the workspace folder and Codex executable path are separate settings.\n\nTo force executable detection on Windows:\n\n```powershell\nnpm install -g @openai/codex\nwhere codex\ncodex --version\n```\n\nIf `where codex` prints `C:\\Users\\<you>\\AppData\\Roaming\\npm\\codex.cmd`, open Chromex settings and set the optional Codex binary path to `%APPDATA%\\npm\\codex.cmd`, save, close every Chrome window, reopen Chrome, and press **Check connection**.\n\n## Runtime Boundary\n\nChromex uses this boundary:\n\n```text\nChrome Extension -> Native Messaging Host -> Local Bridge -> codex app-server\n```\n\nThe source tree is organized as:\n\n- `packages/extension`: Chrome MV3 side-panel extension\n- `packages/bridge`: local bridge daemon for Codex app-server and multimodal workflows\n- `packages/native-host`: Chrome Native Messaging relay\n- `packages/shared`: shared types, policies, profiles, and helpers\n\n## Language Support\n\nChromex follows the browser language automatically by default. Users can also choose a language in **Settings > General > App UI language**.\n\nThe extension ships Chrome `_locales` entries for English, Korean, Japanese, Chinese, Arabic, French, German, Spanish, Portuguese, Hindi, Vietnamese, Thai, Turkish, Ukrainian, and many other Chrome-compatible locales. Model responses are instructed to follow the selected UI language unless the user asks for another language.\n\n## Security And Privacy Defaults\n\n- The extension does not store raw OpenAI API keys, OAuth tokens, or ChatGPT session tokens in Chrome extension storage.\n- Codex OAuth / ChatGPT login is handled through the local Codex app-server flow.\n- API-key login is an optional local fallback and is never used automatically without user confirmation.\n- Page content, tab data, screenshots, browser history, microphone input, and browser actions are used only for user-requested workflows.\n- `history`, `tabs`, screen capture, microphone, and site access are requested only when a feature needs them.\n- Conversation history is session-only by default. Persistent local chat history is opt-in.\n- Native-host child processes and workspace hooks run with a reduced environment allowlist.\n- Generated image originals, temporary uploads, and diagnostics are handled by the local bridge.\n\nRead [SECURITY.md](./SECURITY.md) and [PRIVACY.md](./PRIVACY.md) before publishing or deploying a modified build.\n\n## Features\n\n- Persistent MV3 side panel with chat-first UX.\n- Automatic routing for page, file, image, history, voice, and browser-control requests.\n- `@` picker for selecting one or more open tabs.\n- `/` picker for profile selection.\n- Attachments for images, text, PDF, DOCX, CSV, TSV, XLSX, and XLSM.\n- Read strategy policy for DOM, vision, hybrid, and site-adapter workflows.\n- Site-aware suggestions for YouTube, news, research, mail, collaboration, notes, task tools, shopping, travel, and Korean work services.\n- YouTube adapter with current timestamp context and seek actions.\n- Non-destructive image editing for uploaded images, page images, or visible screen captures.\n- Markdown rendering with code blocks, tables, links, and copy controls.\n- Optional Codex skills loaded from a user's local `.codex/skills/*/SKILL.md` only when enabled.\n\n## Development\n\n```bash\nnpm install\nnpm run typecheck\nnpm run test\nnpm run build\nnpm run release:audit\n```\n\nOptional browser smoke test:\n\n```bash\nnpm run smoke\n```\n\nIf no compatible browser exists, install the Playwright Chromium runtime:\n\n```bash\nnpm run smoke:install-browser\n```\n\nThe built extension is emitted to:\n\n```text\npackages/extension/dist\n```\n\n## Release Management\n\nChromex uses normal open-source release history from `0.1.1` onward. Versioning, pull request flow, and release checklist are documented in [RELEASE.md](./RELEASE.md).\n\n## Troubleshooting\n\n- **Native host missing or forbidden**: run `npm run build`, then `node scripts/install-native-host.mjs --browser=chrome`, reload the extension in `chrome://extensions`, and check Chromex onboarding/system status. If Chrome shows a different extension ID, run `node scripts/install-native-host.mjs <extension-id> --browser=chrome`.\n- **Codex executable is not detected**: run `npm install -g @openai/codex`, `where codex`, and `codex --version`. If needed, set the optional Codex binary path in Chromex to `%APPDATA%\\npm\\codex.cmd`, save, fully restart Chrome, and press **Check connection**.\n- **Model list does not load**: confirm the native bridge is connected, then sign in through the app-server-backed login flow.\n- **Page context is unavailable**: open Chromex from the target tab or approve the Chrome site permission prompt when the workflow requests access.\n- **Chrome still shows old UI**: run `npm run build`, reload the extension card, and confirm Chrome is loading `packages/extension/dist`.\n- **Browser smoke test fails because no browser exists**: run `npm run smoke:install-browser`, then `npm run smoke`.\n\n## License\n\nMIT. See [LICENSE](./LICENSE).\n\n## Star History\n\n<a href=\"https://www.star-history.com/#GENEXIS-AI/chromex&Date\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=GENEXIS-AI/chromex&type=Date&theme=dark\" />\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=GENEXIS-AI/chromex&type=Date\" />\n    <img alt=\"Star History Chart\" src=\"https://api.star-history.com/svg?repos=GENEXIS-AI/chromex&type=Date\" />\n  </picture>\n</a>\n","summary":"Chromex is a Chrome MV3 side‑panel assistant that links the browser to the Codex AI model through a local native bridge, keeping any credentials off‑extension. It lets users chat about the current page, selected tabs, screenshots, PDFs, office files, images, and browser history, and can summarize, compare or generate content from those sources. Additional capabilities include voice transcription, live voice mode, image workflows, and browser‑control scripts that appear as in‑page indicators, all configurable with custom profiles or optional Codex skills. The tool is ideal for developers, researchers, writers, and anyone who wants instant AI‑powered insight and editing within the browser without exposing secrets to the web.","description":"A Codex-powered Chrome side-panel assistant for page context, tabs, voice, and image workflows.","stars":807,"language":"TypeScript"},{"owner":"darrylmorley","repo":"whatcable","url":"https://github.com/darrylmorley/whatcable","readme":"# WhatCable\n\n> **What can this USB-C cable actually do?**\n\nA small macOS menu bar app that tells you, in plain English, what each USB-C cable plugged into your Mac can actually do, and **why your Mac might be charging slowly**.\n\nUSB-C hides a lot under one connector. Anything from a USB 2.0 charge-only cable to a 240W / 40 Gbps Thunderbolt 4 cable, all looking identical in your drawer. macOS already exposes the relevant info via IOKit; WhatCable surfaces it as a friendly menu bar popover.\n\n[![Latest release](https://img.shields.io/github/v/release/darrylmorley/whatcable)](https://github.com/darrylmorley/whatcable/releases/latest)\n[![Platform](https://img.shields.io/badge/platform-macOS%2014%2B-blue)](https://github.com/darrylmorley/whatcable)\n[![License: MIT](https://img.shields.io/badge/license-MIT-green)](LICENSE)\n\n![WhatCable popover](docs/screenshot.png)\n\n## What it shows\n\nPer port, in plain English:\n\n- **At-a-glance headline:** Thunderbolt / USB4, USB device, Charging only, Slow USB / charge-only cable, Nothing connected\n- **Charging diagnostic:** when something's plugged in, a banner identifies the bottleneck:\n  - *\"Cable is limiting charging speed\"* (cable rated below the charger)\n  - *\"Charging at 30W (charger can do up to 96W)\"* (Mac is asking for less, e.g. battery near full)\n  - *\"Charging well at 96W\"* (everything matches)\n- **Cable e-marker info:** the cable's actual speed (USB 2.0, 5 / 10 / 20 / 40 / 80 Gbps), current rating (3 A / 5 A up to 60W / 100W / 240W), and the chip's vendor\n- **Charger PDO list:** every voltage profile the charger advertises (5V / 9V / 12V / 15V / 20V…) with the currently negotiated profile highlighted in real time\n- **Connected device identity:** vendor name and product type, decoded from the PD Discover Identity response\n- **Attached USB devices:** storage, hubs, and peripherals listed under the physical port they're plugged into, with their negotiated speed\n- **Active transports:** USB 2 / USB 3 / Thunderbolt / DisplayPort\n- **⌥-click** the menu bar icon (or flip the toggle in Settings) to reveal the underlying IOKit properties for engineers\n\nClick the **gear icon** in the popover header to open Settings, where you can:\n\n- Hide empty ports\n- Launch at login\n- Run as a regular Dock app instead of a menu bar icon\n- Get notifications when cables are connected or disconnected\n\nRight-click the menu bar icon for **Refresh**, a **Keep window open** toggle (handy for screenshots and demos), **Check for Updates…**, **About**, **WhatCable on GitHub**, and **Quit**.\n\n## Install\n\nDownload the latest `WhatCable.zip` from the [Releases page](https://github.com/darrylmorley/whatcable/releases/latest), unzip, and drag `WhatCable.app` to `/Applications`.\n\nThe app is universal (Apple silicon + Intel), signed with a Developer ID, and notarised by Apple, so there are no Gatekeeper warnings.\n\nRequires macOS 14 (Sonoma) or later. Apple Silicon only. On Intel Macs, the USB-C ports are driven by Intel Titan Ridge / JHL9580 Thunderbolt 3 controllers, and the USB-PD state and cable e-marker data WhatCable depends on are not exposed through any public IOKit accessor.\n\n> **Note:** The manual install gives you the menu bar app only. The `whatcable` CLI is bundled inside the `.app` and is not on your PATH by default. If you want to use it from the shell, see the [Command-line interface](#command-line-interface) section below for the one-line symlink. Or install via Homebrew, which sets up the CLI automatically.\n\n### Homebrew\n\n```bash\nbrew tap darrylmorley/whatcable\nbrew install --cask whatcable\n```\n\nThis installs the menu bar app and symlinks the `whatcable` CLI into your PATH.\n\n## Command-line interface\n\nA `whatcable` binary ships alongside the menu bar app, driven by the same diagnostic engine:\n\n```bash\nwhatcable                # human-readable summary of every port\nwhatcable --json         # structured JSON, pipe into jq\nwhatcable --watch        # stream updates as cables come and go (Ctrl+C to exit)\nwhatcable --raw          # include underlying IOKit properties\nwhatcable --version\nwhatcable --help\n```\n\nIf you installed the `.app` manually rather than via Homebrew, the CLI lives at `WhatCable.app/Contents/Helpers/whatcable`. Symlink it into your PATH if you want it on the shell:\n\n```bash\nln -s /Applications/WhatCable.app/Contents/Helpers/whatcable /usr/local/bin/whatcable\n```\n\nThe Homebrew install does this for you automatically.\n\n## How it works\n\nWhatCable reads four families of IOKit services. No entitlements, no private APIs, no helper daemons:\n\n| Service | What it gives us |\n| --- | --- |\n| `AppleHPMInterfaceType10/11/12` (M3-era) and `AppleTCControllerType10/11` (M1 / M2) | Per-port state: connection, transports, plug orientation, e-marker presence. `Type11` is what M2 MacBook Air uses for its MagSafe 3 port. |\n| `IOPortFeaturePowerSource` | Full PDO list from the connected source, with the live \"winning\" PDO |\n| `IOPortTransportComponentCCUSBPDSOP` | PD Discover Identity VDOs for SOP (port partner) and SOP' (cable e-marker) |\n| XHCI controller subtree | Each connected USB device is paired to its physical port via the XHCI port node's `UsbIOPort` registry path, falling back to a bus-index derived from the controller's `locationID` upper byte and the port's `hpm` SPMI ancestor on machines that don't expose `UsbIOPort`. |\n\nCable speed and power decoding follow the USB Power Delivery 3.x spec.\n\n## Build from source\n\n```bash\nswift run WhatCable          # menu bar app\nswift run whatcable-cli      # CLI\n```\n\nRequires Swift 5.9 (Xcode 15+).\n\n## Build a distributable .app\n\n```bash\n./scripts/build-app.sh\n```\n\nProduces a universal `dist/WhatCable.app` (arm64 + x86_64) and `dist/WhatCable.zip`.\n\n**Modes:**\n\n| Configuration | Result |\n| --- | --- |\n| No `.env` | Ad-hoc signed. Works locally; Gatekeeper warns on other Macs. |\n| `.env` with `DEVELOPER_ID` | Developer ID signed + hardened runtime. |\n| `.env` with `DEVELOPER_ID` + `NOTARY_PROFILE` | Full notarisation + stapled ticket. Gatekeeper-clean for everyone. |\n\n**Cutting a release:**\n\n```bash\n# write release-notes/v0.5.3.md first, then:\n./scripts/release.sh 0.5.3\n```\n\nThe wrapper does the whole pipeline: bumps the version, runs build-app.sh\n(which builds, signs, notarises, smoke-tests, and bumps the local cask),\ntags and pushes the commit, creates the GitHub release with the notes\nfile, verifies the uploaded asset's sha matches the local zip, copies the\nnotes into the tap, and pushes the tap. Use `--dry-run` first to validate\nstate. Requires `gh` (auth'd) and the env vars from `.env.example`.\n\n**One-time setup for full notarisation:**\n\n```bash\n# 1. Find your signing identity\nsecurity find-identity -v -p codesigning\n\n# 2. Store notarytool credentials in the keychain\nxcrun notarytool store-credentials \"WhatCable-notary\" \\\n    --apple-id \"you@example.com\" \\\n    --team-id \"ABCDE12345\" \\\n    --password \"<app-specific-password>\"   # generate at appleid.apple.com\n\n# 3. Create your .env from the template\ncp .env.example .env\n# ...and fill in DEVELOPER_ID\n```\n\n## Caveats\n\n- **Cable e-marker info only appears for cables that carry one.** Most USB-C cables under 60 W are unmarked. Any Thunderbolt / USB4 cable, any 5 A / 100 W+ cable, and most quality data cables will be e-marked.\n- **WhatCable trusts the e-marker.** The cable speed, current rating, and vendor are read straight from the chip in the cable's plug. Counterfeit or mis-flashed cables can advertise capabilities they don't actually deliver, and there's no way for software to verify what's inside the jacket. If a cable claims 240W / 40 Gbps but performs poorly, the chip is lying, not WhatCable.\n- **PD spec coverage:** the decoder targets PD 3.0 / 3.1. PD 3.2 EPR variants may need tweaks once we see real data.\n- **Vendor name lookup is bundled but not exhaustive:** common cable, charger, hub, dock, and storage vendors are recognised; others fall back to the hex VID.\n- **macOS only.** iOS sandboxing makes USB-C e-marker access much harder.\n- **Apple Silicon only.** Intel Macs route USB-C through Intel Thunderbolt 3 controllers (Titan Ridge / JHL9580). Apple's IOKit driver for those chips does not expose the USB-PD negotiation state or the cable e-marker VDOs, so there's no path to surface the same information on Intel hardware.\n- **Not on the App Store.** App Sandbox blocks the IOKit reads we depend on.\n\n## Contributing\n\nIssues and PRs welcome. The code is small and tries to stay readable. Start at [`Sources/WhatCable/ContentView.swift`](Sources/WhatCable/ContentView.swift) for the UI, [`Sources/WhatCableCore/PortSummary.swift`](Sources/WhatCableCore/PortSummary.swift) for the plain-English logic, or [`Sources/WhatCableCore/PDVDO.swift`](Sources/WhatCableCore/PDVDO.swift) for the bit-twiddling. The diagnostic engine lives in `WhatCableCore`, which is shared by the menu bar app and the `whatcable` CLI in `Sources/WhatCableCLI/`.\n\n## Credits\n\nBuilt by [Darryl Morley](https://github.com/darrylmorley).\n\nInspired by every time someone has asked \"*is this cable any good?*\".\n","summary":"WhatCable is a lightweight macOS menu‑bar utility that decodes the hidden capabilities of every USB‑C cable plugged into a Mac, translating raw IOKit data into an easy‑to‑read synopsis of power delivery, data speed, and connected device identity. It displays real‑time charging diagnostics, cable e‑marker specifications, charger voltage profiles, attached USB devices, and active transports, while offering settings to hide empty ports, launch at login, or inspect raw IOKit properties; the same engine is exposed via a command‑line interface for JSON output and scripting. Power users, Mac owners with multiple USB‑C accessories, and engineering teams benefit from quickly diagnosing slow charging, verifying Thunderbolt/USB‑4 performance, and debugging USB‑C hardware right from the system tray or terminal.","description":"macOS menu bar app that tells you, in plain English, what each USB-C cable plugged into your Mac can actually do","stars":1628,"language":"Swift"},{"owner":"stripe","repo":"link-cli","url":"https://github.com/stripe/link-cli","readme":"# Link CLI\n\nLink CLI lets agents get secure, one-time-use payment credentials from a Link wallet — so they can complete purchases on your behalf without ever storing your real card details.\n\n## Installation\n\n```bash\nnpm i -g @stripe/link-cli\n```\n\nOr run directly with `npx`:\n\n```bash\nnpx @stripe/link-cli\n```\n\nYou can install the skill via `npx skills add stripe/link-cli`.\n\n### MCP Server\n\nLink CLI can also run as a local MCP server. Add the following to your MCP client config (`.mcp.json`, etc.)\n\n```json\n{\n  \"mcpServers\": {\n    \"link\": {\n      \"command\": \"npx\",\n      \"args\": [\"@stripe/link-cli\", \"--mcp\"]\n    }\n  }\n}\n```\n\n## Quickstart\n\n### Login\n\nThe `link-cli` requires a Link account. You can log in to your existing one or [register online](https://app.link.com).\n\n```bash\nlink-cli auth login\n```\n\nYou'll receive a verification URL and a short phrase. Visit the URL, log in to your Link account, and enter the phrase to approve the connection.\n\n### List payment methods\n\n```bash\nlink-cli payment-methods list\n```\n\nReturns the cards and bank accounts saved to your Link account. Use the `id` field as `payment_method_id` in the next step. If you have no payment methods, you can [add new ones in Link](https://app.link.com/wallet).\n\n### Create a spend request\n\nTo request a secure, one-time payment credential from your Link wallet, you create a spend request. You specify a payment method in your account, as well as some merchant details, line items, and amounts.\n\n```bash\nlink-cli spend-request create \\\n  --payment-method-id csmrpd_xxx \\\n  --merchant-name \"Stripe Press\" \\\n  --merchant-url \"https://press.stripe.com\" \\\n  --context \"Purchasing 'Working in Public' from press.stripe.com. The user initiated this purchase through the shopping assistant.\" \\\n  --amount 3500 \\\n  --line-item \"name:Working in Public,unit_amount:3500,quantity:1\" \\\n  --total \"type:total,display_text:Total,amount:3500\" \\\n  --request-approval\n```\n\nThe `--request-approval` flag triggers a push notification (or email) to the user for approval, then polls until the request is approved or denied.\n\nUsers can easily approve requests with the [Link app](https://link.com/download).\n\n#### Line items and totals\n\n`--line-item` and `--total` use repeatable `key:value` format.\n\n**`--line-item` keys:** `name` (required), `quantity`, `unit_amount`, `description`, `sku`, `url`, `image_url`, `product_url`\n\n```bash\n--line-item \"name:Running Shoes,unit_amount:12000,quantity:1,description:Trail runners\"\n```\n\n**`--total` keys:** `type` (required), `display_text` (required), `amount` (required)\n\n```bash\n--total \"type:subtotal,display_text:Subtotal,amount:12000\" \\\n--total \"type:total,display_text:Total,amount:12000\"\n```\n\n#### Credential types\n\nBy default, a spend request provisions a virtual card. For merchants that support the [Machine Payments Protocol](https://mpp.dev) (HTTP 402) and the Stripe payment method, you can instead include `--credential-type \"shared_payment_token\"`. \n\n### Execute payment\n\nThe approved spend request includes a `card` object with `number`, `cvc`, `exp_month`, `exp_year`, `billing_address`, and `valid_until`. Enter these into the merchant's checkout form. \n\n```bash\nlink-cli spend-request retrieve lsrq_001 --format json\n```\nBy default, retrieving a spend request will not include card details. Use the `--include=card` to see unmasked card details.\n\nFor agent polling, pass `--interval` and optionally `--max-attempts`:\n\n```bash\nlink-cli spend-request retrieve lsrq_001 --interval 2 --max-attempts 150 --format json\n```\n\nPolling exits successfully only after the request reaches a terminal status such as `approved`, `denied`, or `expired`. If polling reaches `--timeout` or exhausts `--max-attempts` while the request is still non-terminal, the command exits non-zero with `code: \"POLLING_TIMEOUT\"` so callers do not treat a still-pending request as complete.\n\nIf the merchant supports MPP, use `link-cli mpp pay` instead:\n\n```bash\nlink-cli mpp pay https://climate.stripe.dev/api/contribute \\\n  --spend-request-id lsrq_001 \\\n  --method POST \\\n  --data '{\"amount\":100}' \\\n  --format json\n```\n\n## Advanced\n\n### Authentication\n\n```bash\nlink-cli auth login --client-name \"Claude Code\" --format json   # identify the connecting agent\nlink-cli auth status --format json                               # check auth status\nlink-cli auth logout --format json                               # disconnect\n```\n\nWhen `--client-name` is provided, the name is shown in the Link app when the user approves the connection — e.g. `Claude Code on my-macbook` instead of `link-cli on my-macbook`.\n\n`auth status --format json` includes an `update` field when a newer version is available:\n\n```json\n{\n  \"authenticated\": true,\n  \"update\": {\n    \"current_version\": \"0.1.2\",\n    \"latest_version\": \"0.2.0\",\n    \"update_command\": \"npm install -g @stripe/link-cli\"\n  }\n}\n```\n\nSet `NO_UPDATE_NOTIFIER=1` to suppress update checks (e.g. in CI).\n\n### Spend request lifecycle\n\nA spend request moves through: **create** → **request approval** → **approved** (with credentials).\n\n**Required fields for create:** `payment_method_id`, `merchant_name`, `merchant_url`, `context`, `amount`\n\n**Constraints:** `context` must be at least 100 characters; `amount` must not exceed 50000 (cents); `currency` must be a 3-letter ISO code.\n**Test mode:** Pass `--test` to create testmode credentials (uses test card `4242424242424242`). Useful for development and integration testing without using real payment methods.\n\n```bash\n# Update before approval\nlink-cli spend-request update lsrq_001 \\\n  --merchant-url https://press.stripe.com/working-in-public \\\n  --format json\n\n# Request approval separately (alternative to create --request-approval)\nlink-cli spend-request request-approval lsrq_001 --format json\n\n# Retrieve at any time (includes card credentials once approved)\nlink-cli spend-request retrieve lsrq_001 --format json\n```\n\n### Output formats\n\nAll commands accept `--format json` for structured JSON output. Other formats: `yaml`, `md`, `jsonl`, `toon` (default). Errors are returned as JSON with `code` and `message` fields, with exit code 1.\n\n### MPP\n\nUse `mpp pay` to complete purchases on merchants that use the [Machine Payments Protocol](https://mpp.dev). The spend request must use `credential_type: \"shared_payment_token\"` and be approved. The SPT is one-time-use — if payment fails, create a new spend request.\n\n```bash\nlink-cli mpp pay https://climate.stripe.dev/api/contribute \\\n  --spend-request-id lsrq_001 \\\n  --method POST \\\n  --data '{\"amount\":100}' \\\n  --header \"X-Custom: value\" \\\n  --format json\n```\n\nUse `mpp decode` to validate a raw `WWW-Authenticate` header and extract the `network_id` needed for `shared_payment_token` spend requests:\n\n```bash\nlink-cli mpp decode \\\n  --challenge 'Payment id=\"ch_001\", realm=\"merchant.example\", method=\"stripe\", intent=\"charge\", request=\"...\"' \\\n  --format json\n```\n\n### Environment variables\n\n| Variable | Effect |\n|----------|--------|\n| `LINK_API_BASE_URL` | Override the API base URL |\n| `LINK_AUTH_BASE_URL` | Override the auth base URL |\n| `LINK_HTTP_PROXY` | Route all requests through an HTTP proxy (requires `undici`) |\n\n## Onboard\n\nRun the guided setup flow — authenticates, checks payment methods, shows the app download QR, and walks through both demo flows:\n\n```bash\nlink-cli onboard\n```\n\n## Demo\n\nRun an interactive demo of both Link payment flows (always uses test mode — no real charges):\n\n```bash\nlink-cli demo              # shows menu to choose flow\nlink-cli demo --only-card  # virtual card flow only\nlink-cli demo --only-spt   # machine payment (SPT) flow only\n```\n\n## Development\n\n```bash\npnpm install\npnpm run build\npnpm run link-cli --help\n```\n\nWatch mode:\n\n```bash\npnpm run dev\n```\n\nRun tests:\n\n```bash\npnpm run test\n```\n\nType-check and lint:\n\n```bash\npnpm run typecheck\npnpm biome check .\n```\n\n## Releasing\n\nThis project uses [Changesets](https://github.com/changesets/changesets) to manage versioning and publishing. Only `@stripe/link-cli` is published to npm — internal packages (`@stripe/link-sdk`, `@stripe/link-typescript-config`) are ignored by changesets.\n\n### Add a changeset\n\nWhen you make a user-facing change, add a changeset before merging:\n\n```bash\npnpm changeset\n```\n\nFollow the prompts to select the package (`@stripe/link-cli`) and the semver bump type (patch, minor, or major). This creates a markdown file in `.changeset/` describing the change.\n\n### Version\n\nOnce changesets have accumulated on `main`, create a version PR:\n\n```bash\npnpm changeset version\n```\n\nThis consumes all pending changesets, bumps the version in `packages/cli/package.json`, and updates `CHANGELOG.md`.\n\n### Publish\n\nAfter the version PR is merged:\n\n```bash\npnpm run build\npnpm changeset publish\n```\n\nThis publishes `@stripe/link-cli` to npm. CI also runs `pnpm --filter @stripe/link-cli publish --dry-run --no-git-checks` on every push to `main` to verify the package is publishable.\n","summary":"Link CLI is a command‑line tool that allows agents to obtain secure, one‑time payment credentials from a Link wallet, enabling them to complete purchases on behalf of users without exposing real card details. The tool supports authentication, listing stored payment methods, creating spend requests with customizable merchant data, line items, totals, and credential types, and polling for approval before retrieving temporary card data for checkout. It also offers Machine Payments Protocol integration for merchants that support MPP. Developers and service agents who need to process payments on behalf of customers while maintaining PCI‑compliance and user privacy will benefit from this lightweight, scriptable interface.","description":"Let your agents spend on your behalf. Your payment credentials are never exposed. You approve every purchase.","stars":438,"language":"TypeScript"},{"owner":"1weiho","repo":"open-slide","url":"https://github.com/1weiho/open-slide","readme":"<img width=\"1280\" height=\"640\" alt=\"open-slide github cover\" src=\"https://github.com/user-attachments/assets/02f5e6d7-12a7-4a8e-88e7-ae8770a96584\" />\n\n# open-slide\n\n**The slide framework built for agents.** Describe your deck in natural language — your coding agent writes the React. open-slide handles the canvas, scaling, navigation, hot reload, and present mode so the agent can focus on content.\n\nEvery slide renders into a fixed **1920 × 1080** canvas. Pages are arbitrary React components, not a constrained DSL.\n\n```bash\nnpx @open-slide/cli init my-slide\n```\n\n## Why open-slide\n\nSlides are visual code. Agents are great at writing code. open-slide is the missing runtime that turns \"make slides about X\" into a polished, presentable deck — without you ever leaving the chat.\n\n## Highlights\n\n### 🤖 Agent-native authoring\n\nWorks with any coding agent (Claude Code, Codex, Cursor, …). The scaffolder ships with built-in skills:\n\n- **`/create-slide`** — drafts a deck end-to-end. Asks four scoping questions (topic & aesthetic, page count, text density, motion vs. static), picks an id, plans the structure, and writes the pages.\n- **`/slide-authoring`** — the technical reference for the 1920 × 1080 canvas, type scale, palette, and layout rules. The agent reads this before writing.\n\nFrom a one-line prompt to a polished deck, no boilerplate.\n\n### 🎯 In-browser inspector\n\nClick any element in the dev server and attach a comment — *\"make this red\"*, *\"change to 'Open Slide Rocks'\"*, *\"shrink the headline\"*. Comments are persisted as `@slide-comment` markers in source. Run `/apply-comments` and the agent applies every pending edit, then clears the markers.\n\nThe loop: present → click to comment → `/apply-comments` → repeat.\n\n### 🖼️ Assets manager + svgl logo search\n\nManage images, videos, and fonts per deck through a built-in assets panel. Search and drop in any brand logo via the integrated [svgl](https://svgl.app/) catalogue — no more hunting for SVGs.\n\n### 🎬 Professional present mode\n\nFullscreen playback with keyboard navigation, plus a **presenter mode** with current/next slide preview, speaker notes, and a timer. Built for the stage, not just the browser tab.\n\n### 📦 Export to static HTML & PDF\n\nOne command exports your deck as a self-contained static HTML site or a print-ready PDF. Share without a server.\n\n### 📁 Slide manager\n\nOrganise decks into folders with custom emoji and drag-and-drop to reorder. Useful once you've built more than three decks and need to find anything.\n\n### 🚀 Deploy-friendly\n\nOutputs a plain static build — one-click deploy to Vercel, Cloudflare Pages, Zeabur, Netlify, or any static host. No server, no runtime, no lock-in.\n\n## Get started\n\n```bash\nnpx @open-slide/cli init my-slide\ncd my-slide\npnpm dev\n```\n\nThe scaffolded workspace ships with agent skills preconfigured for Claude Code. From there you drive the deck through your agent — or edit `slides/<id>/index.tsx` directly. See [CLAUDE.md](CLAUDE.md) for the hard rules.\n\n## Repo layout\n\nThis repo is a pnpm + Turbo monorepo.\n\n| Path | Description |\n| --- | --- |\n| [packages/core](packages/core) | `@open-slide/core` — runtime (home page, slide viewer, present mode, inspector), Vite plugin, and the `open-slide` dev/build/preview CLI. |\n| [packages/cli](packages/cli) | `@open-slide/cli` — `npx @open-slide/cli init` scaffolder. Generates a minimal workspace where Vite/React/tsconfig stay hidden inside core. |\n| [apps/demo](apps/demo) | Example workspace that consumes `@open-slide/core` via `workspace:*`. Used for local development of the framework. |\n\n## Development\n\n```bash\npnpm install\npnpm dev      # runs the demo against the local @open-slide/core\npnpm build    # builds all packages\npnpm check    # type-checks all packages\npnpm lint     # lints via biome\n```\n\n## Support\n\nIf open-slide has been useful to you, consider supporting development:\n\n[![ko-fi](https://ko-fi.com/img/githubbutton_sm.svg)](https://ko-fi.com/D1D11YPUP1)\n\n## License\n\nMIT\n","summary":"open-slide is a slide framework that lets agents write React code to create polished presentations, handling rendering, navigation, hot‑reload, and present mode so the agent can focus on content. It offers agent‑native authoring with built‑in skill commands, an in‑browser inspector for quick edits, an integrated asset manager, and a full‑screen presenter mode with notes and timer. The framework supports exporting static HTML or PDF decks, lightweight deployment to any static host, and a file‑based slide manager for organizing multiple decks. It is ideal for developers and designers who want to generate and edit slide decks programmatically through AI agents.","description":"A slide framework built for agents.","stars":859,"language":"TypeScript"},{"owner":"EvanBacon","repo":"serve-sim","url":"https://github.com/EvanBacon/serve-sim","readme":"# serve-sim\n\nThe `npx serve` of Apple Simulators. \n\nHost your simulator for use with Agent tools like Codex, Cursor, or Claude Desktop — locally, over your LAN, or host on a remote mac and tunnel anywhere. \n\n```sh\nnpx serve-sim\n# → Preview at http://localhost:3200\n```\n\nhttps://github.com/user-attachments/assets/fbf890f4-c8c7-4684-82be-d677b8a188f8\n\n`serve-sim` spawns a small Swift helper that captures the simulator's framebuffer via `simctl io`, exposes it as an MJPEG stream + WebSocket control channel, and serves a React preview UI on top. It works with any booted iOS Simulator — no Xcode plugin, no instrumentation in your app.\n\n## Features \n\n- Full 60 FPS video stream in the browser.\n- Swipe from the bottom to go home.\n- gestures like pinch to zoom by holding the option key.\n- Simulator logs are forwarded to the browser for browser-use MCP tools to read from.\n- Drag and drop videos and images to add them to the simulator device. \n- Keyboard commands and hot keys are forwarded to the simulator, including CMD+SHIFT+H to go home.\n- Apple Watch, iPad, and iOS support.\n\n## Why?\n\nHosted simulators can be hard to test, `serve-sim` enables you to test the hosted infra locally first for faster iteration. When you're ready to host a simulator remotely, simply tunnel the served URL and users can interact with the simulator as if it were running locally on their device.\n\nI develop the Expo framework, but this tool is completely agnostic to React Native and can be used for any iOS interaction you need.\n\n## Install\n\nRequires macOS with Xcode command line tools (`xcrun simctl`) and Node.js 18+. `bun` is **not** required to run the CLI.\n\n## CLI\n\n```\nserve-sim [device...]                 Start preview server (default: localhost:3200)\nserve-sim --no-preview [device...]    Stream in foreground without a preview server\nserve-sim gesture '<json>' [-d udid]  Send a touch gesture\nserve-sim button [name] [-d udid]     Send a button press (default: home)\nserve-sim rotate <orientation> [-d udid]\n                                      portrait | portrait_upside_down |\n                                      landscape_left | landscape_right\nserve-sim ca-debug <option> <on|off> [-d udid]\n                                      Toggle a CoreAnimation debug flag\n                                      (blended|copies|misaligned|offscreen|slow-animations)\nserve-sim memory-warning [-d udid]    Simulate a memory warning\n\nOptions:\n  -p, --port <port>   Starting port (preview default: 3200, stream default: 3100)\n  -d, --detach        Spawn helper and exit (daemon mode)\n  -q, --quiet         JSON-only output\n      --no-preview    Skip the web UI; stream in foreground only\n      --list [device] List running streams\n      --kill [device] Kill running stream(s)\n```\n\n### Examples\n\n```sh\nserve-sim                              # auto-detect booted sim, open preview\nserve-sim \"iPhone 16 Pro\"              # target a specific device\nserve-sim --detach                     # start a background helper, return JSON\nserve-sim --list                       # show running streams\nserve-sim --kill                       # stop all helpers\n```\n\nMultiple booted simulators are supported — pass several device names, or leave it empty to attach to all of them.\n\n## Connectors\n\n`serve-sim` can be used with dev servers, browser, and AI editors for more seamless integration.\n\n### Claude Code Desktop\n\nCreate a `.claude/launch.json` and define a server:\n\n```json\n{\n  \"version\": \"0.0.1\",\n  \"configurations\": [\n    {\n      \"name\": \"ios\",\n      \"runtimeExecutable\": \"npx\",\n      \"runtimeArgs\": [\"serve-sim\"],\n      \"port\": 3200,\n    }\n  ]\n}\n```\n\n### Expo\n\nAutomatically start the serve-sim process with `npx expo start` and access the URL at `http://localhost:8081/.sim`.\n\nFirst, customize the `metro.config.js` file (`bunx expo customize`):\n\n```js\n// Learn more https://docs.expo.io/guides/customizing-metro\nconst { getDefaultConfig } = require(\"expo/metro-config\");\nconst connect = require(\"connect\");\nconst { simMiddleware } = require(\"serve-sim/middleware\");\n\n/** @type {import('expo/metro-config').MetroConfig} */\nconst config = getDefaultConfig(__dirname);\n\nconfig.server = config.server || {};\nconst originalEnhanceMiddleware = config.server.enhanceMiddleware;\nconfig.server.enhanceMiddleware = (metroMiddleware, server) => {\n  const middleware = originalEnhanceMiddleware\n    ? originalEnhanceMiddleware(metroMiddleware, server)\n    : metroMiddleware;\n  const app = connect();\n  app.use(simMiddleware({ basePath: \"/.sim\" }));\n  app.use(middleware);\n  return app;\n};\n\nmodule.exports = config;\n```\n\n## Embed in your dev server\n\n`serve-sim/middleware` is a Connect-style middleware that mounts the same preview UI inside your existing dev server (Metro, Vite, Next, plain Express, etc.). Run `serve-sim --detach` once to start the streaming helper, then add the middleware:\n\n```ts\nimport { simMiddleware } from \"serve-sim/middleware\";\n\napp.use(simMiddleware({ basePath: \"/.sim\" }));\n// → preview HTML at /.sim\n// → state JSON  at /.sim/api\n// → SSE logs    at /.sim/logs\n```\n\nThe middleware reads the helper's state from `$TMPDIR/serve-sim/` and forwards the user's browser to the live MJPEG + WebSocket endpoints. CORS is wide-open on the helper, so the page renders without a proxy.\n\n## How it works\n\n```\n┌──────────────┐   simctl io   ┌─────────────────┐  MJPEG / WS  ┌─────────┐\n│ iOS Simulator│ ────────────► │ serve-sim-bin   │ ───────────► │ Browser │\n└──────────────┘   (Swift)     │ (per-device)    │              └─────────┘\n                               └─────────────────┘\n                                       ▲\n                                  state file in\n                                $TMPDIR/serve-sim/\n                                       ▲\n                               ┌──────────────────┐\n                               │ serve-sim CLI /  │\n                               │ middleware       │\n                               └──────────────────┘\n```\n\nThe Swift helper (`bin/serve-sim-bin`) is a tiny standalone binary — no Xcode dependency at runtime. The CLI embeds it via `bun build --compile`, so installing the npm package is enough.\n\n## Development\n\n```sh\nbun install\nbun run --filter serve-sim build         # build the JS bundles\nbun run --filter serve-sim build:swift   # rebuild the Swift helper\nbun run --filter serve-sim dev           # watch mode\n```\n\n## License\n\nApache-2.0\n","summary":"serve‑sim turns an Apple iOS, iPad, or Watch Simulator into a web‑based playground that streams its framebuffer at 60 FPS and exposes controls via WebSocket. The tool launches a minimal Swift helper to capture the simulator screen, forwards logs and gestural input, and serves a React UI providing pinch‑to‑zoom, drag‑and‑drop media, and keyboard shortcuts. It works locally or over a LAN, and can be tunneled for remote agents such as Codex, Cursor, or Claude Desktop, making it ideal for developers who need to preview or interact with a simulator from anywhere without binding Xcode or running an app.","description":"The `npx serve` of Apple Simulators.","stars":601,"language":"TypeScript"},{"owner":"pluk-inc","repo":"md-preview.app","url":"https://github.com/pluk-inc/md-preview.app","readme":"<h1 align=\"center\">Markdown Preview</h1>\n\n<p align=\"center\">\n  <img src=\"docs/app-icon.png\" width=\"128\" alt=\"App icon\" />\n</p>\n\n<p align=\"center\">\n  A fast, native macOS app for reading Markdown files.\n</p>\n\n<p align=\"center\"><img alt=\"Platform\" src=\"https://img.shields.io/badge/platform-macOS%2015%2B-blue\" />&nbsp;<img alt=\"Swift\" src=\"https://img.shields.io/badge/swift-6.0-orange\" />&nbsp;<img alt=\"License\" src=\"https://img.shields.io/github/license/pluk-inc/md-preview.app\" />&nbsp;<img alt=\"Latest release\" src=\"https://img.shields.io/github/v/release/pluk-inc/md-preview.app\" /></p>\n\n---\n\n> Drop a `.md` on the icon (or set Markdown Preview as your default handler) and get a clean, scrollable preview with a real document outline — no Electron, no browser tab.\n\n## Installation\n\n```sh\nbrew install --cask pluk-inc/tap/markdown-preview\n```\n\nOr grab the latest signed and notarized DMG from the [Releases](https://github.com/pluk-inc/md-preview.app/releases) page.\n\n## Screenshots\n\n<p align=\"center\">\n  <img src=\"docs/screenshot-main.png\" width=\"820\" alt=\"Main window with document outline sidebar\" />\n</p>\n\n<p align=\"center\">\n  <em>Quick Look preview — spacebar a <code>.md</code> in Finder:</em>\n</p>\n\n<p align=\"center\">\n  <img src=\"docs/screenshot-quicklook.png\" width=\"640\" alt=\"Quick Look preview from Finder\" />\n</p>\n\n## Features\n\n- **Native rendering** — `WKWebView` pipeline backed by [swift-markdown](https://github.com/swiftlang/swift-markdown), with heading anchors and link handling.\n- **Mermaid diagrams** — fenced `mermaid` code blocks render as diagrams in both the app and Quick Look previews, using a bundled renderer so previews work offline without a CDN request.\n- **Math equations** — LaTeX inline (`$x_1 + x_2$`), display (`$$\\int_0^1 x^2\\,dx$$`), and fenced `math` blocks render with a bundled KaTeX. Selecting a rendered formula and copying yields the original LaTeX source (via the official `copy-tex` extension).\n- **Document outline** — sidebar TOC that mirrors your headings; click to jump.\n- **Inspector panel** — toggleable side panel with file metadata.\n- **In-document search** — toolbar search field plus standard <kbd>⌘F</kbd> / <kbd>⌘G</kbd> / <kbd>⌘⇧G</kbd> for next/previous match.\n- **Open With** — switch to your real editor (VS Code, Cursor, Zed, Sublime, BBEdit, Nova, CotEditor, TextMate, MacVim, Xcode, TextEdit) without leaving the preview. The list filters to apps that actually declare an editor role for Markdown, and remembers your pick.\n- **Share = copy the source** — the share toolbar feeds the picker the Markdown text itself, so **Copy** writes the raw source to the clipboard (great for pasting into ChatGPT / Claude), and Mail, Messages, and Notes get the content in the body instead of a file URL.\n- **Quick Look extension** — system-wide `.md` previews from Finder spacebar, Spotlight, and Mail attachments without launching the app.\n- **Default handler** — offers to register itself as the default `.md` opener on first launch.\n\n## Mermaid example\n\nDrop a fenced `mermaid` block in any document and it renders inline:\n\n```mermaid\nflowchart TD\n    MD[Markdown file] --> Parse[swift-markdown]\n    Parse --> Detect{Mermaid<br/>fence?}\n    Detect -- yes --> Render[mermaid.min.js]\n    Detect -- no --> Web[WKWebView]\n    Render --> Web\n    Web --> Out[App / Quick Look]\n```\n\n## Supported file types\n\n`.md`, `.markdown`, `.mdown`, `.txt`\nUTI: `net.daringfireball.markdown`\n\n## Requirements\n\n- macOS 15 or later\n- Apple Silicon or Intel\n\n## Building from source\n\n```sh\ngit clone git@github.com:pluk-inc/md-preview.app.git\ncd md-preview.app\nopen md-preview.xcodeproj\n```\n\nBuild and run the `md-preview` scheme. Swift Package Manager will resolve [Sparkle](https://github.com/sparkle-project/Sparkle) and [swift-markdown](https://github.com/swiftlang/swift-markdown) on first build.\n\n## Project layout\n\n```\nmd-preview/         Main app target (AppKit, WKWebView)\nquick-look/         Quick Look extension (.appex)\nscripts/            Release & rollback automation\nVersion.xcconfig    Marketing & build version (single source of truth)\nappcast.xml         Sparkle update feed\n```\n\n## Releasing\n\nReleases are driven by [Amore](http://amore.computer/) — it handles building, code signing, notarization, DMG creation, S3 upload, and Sparkle appcast publishing in one shot.\n\nBump `MARKETING_VERSION` and `CURRENT_PROJECT_VERSION` in `Version.xcconfig`, then:\n\n```sh\n./scripts/release.sh\n```\n\nUse `./scripts/rollback-release.sh` to revert the appcast pointer if a release misbehaves.\n\n## Contributing\n\nPull requests are welcome. For larger changes, please open an issue first to discuss what you'd like to change.\n\n1. Fork the repo and create your branch from `main`.\n2. Run the app and verify the change end-to-end (UI changes need a manual smoke test — there's no UI test suite yet).\n3. Keep PRs focused; one logical change per PR.\n4. Match the existing Swift style (no formatter is enforced; mirror nearby code).\n\n## Acknowledgments\n\n- [swift-markdown](https://github.com/swiftlang/swift-markdown) — Markdown parser (Apple, cmark-gfm-backed)\n- [Mermaid](https://mermaid.js.org/) — bundled diagram renderer for `mermaid` fenced code blocks\n- [KaTeX](https://katex.org/) — bundled math typesetter for inline `$…$`, display `$$…$$`, and ` ```math ` blocks\n- [Sparkle](https://sparkle-project.org) — Auto-update framework\n- [Amore](http://amore.computer/) — macOS release automation (signing, notarization, DMG, hosting, appcast)\n\n## License\n\n[MIT](LICENSE)\n","summary":"Markdown Preview is a lightweight, native macOS application for instantly rendering Markdown files directly on the desktop. It uses Swift’s native `WKWebView` pipeline powered by `swift‑markdown` to display clean, scrollable documents, complete with a sidebar table of contents, search, and the ability to open the file in any installed Markdown editor. The app adds advanced features such as Mermaid diagram rendering, LaTeX math support via bundled KaTeX, a share menu that copies raw Markdown, and a Quick Look extension so you can preview notes from Finder or Mail without launching the app. Ideal for writers, developers, and anyone who edits or shares Markdown, it improves workflow by eliminating the need for web‑based previews or editor switches.","description":"A simple Markdown viewer for reading .md files","stars":379,"language":"Swift"},{"owner":"i12bp8","repo":"TagTinker","url":"https://github.com/i12bp8/TagTinker","readme":"# TagTinker V2.1\n\n<p align=\"center\">\n  <strong>Infrared ESL Research Toolkit for Flipper Zero</strong><br>\n  <sub>Protocol study • Signal analysis • Digital Art</sub>\n</p>\n\n<p align=\"center\">\n  <img alt=\"License: GPL-3.0\" src=\"https://img.shields.io/badge/License-GPL--3.0-blue.svg\">\n  <img alt=\"Platform: Flipper Zero\" src=\"https://img.shields.io/badge/Platform-Flipper%20Zero-black.svg\">\n  <a href=\"https://i12bp8.github.io/TagTinker/\"><img alt=\"Image Prep\" src=\"https://img.shields.io/badge/Image%20Prep-Open%20in%20browser-a78bfa?logo=github\"></a>\n</p>\n\n<p align=\"center\">\n  <strong><a href=\"https://i12bp8.github.io/TagTinker/\">→ Launch the TagTinker Image Prep web app ←</a></strong>\n</p>\n\n<img alt=\"Demo Image\"  src=\"https://raw.githubusercontent.com/i12bp8/TagTinker/refs/heads/main/tagtinkerdemo.jpg\">\n\n## Overview\n\nTagTinker is a Flipper Zero app for exploring infrared electronic shelf-label (ESL) protocols. It allows you to transmit custom images and text to supported graphics tags. A companion **web image preparer** runs entirely in the browser and lets you drop, dither and download Flipper-ready BMPs without any install.\n\nAs the Flipper Zero team notes:\n> \"FYI: this is pure infrared signal, same that you use in TV remotes. The whole security was relying on obscurity of protocol.\"\n\nThis tool is built for IoT security curiosity, learning about obscure protocols, and displaying digital art on e-ink hardware.\n\n> [!WARNING]\n> **Hardware Warning:** Many infrared ESL tags store their firmware, address, and display data in volatile RAM to save cost and energy. If you remove the battery or let it fully discharge, the tag will lose all programming and become unresponsive (\"dead\"). It usually cannot be recovered without the original base station.\n\n## Features\n\n- **TagTinker Flipper App:** High-performance, zero-allocation RLE streaming IR engine.\n- **TagTinker Image Prep (web):** Single-file, dependency-free HTML page that lists every supported tag profile, runs a full image pipeline (tone, contrast, detail, sharpen, dither, photo-grade Oklab 3-colour quantisation) and exports a Flipper-ready BMP. Hosted at **[i12bp8.github.io/TagTinker](https://i12bp8.github.io/TagTinker/)** (source: `web-image-prep/`).\n- **Drop-folder image flow:** Drop a prepared BMP into `apps_data/tagtinker/dropped/` on the Flipper SD card, then open `Targeted Payloads → <tag> → Set Image` and pick it. The Flipper rescales any BMP on the fly so a single file can target any tag and any page.\n- **NFC Tag Scan:** Instantly identify ESL targets by scanning their NFC tag — no manual barcode entry needed.\n- **WiFi Plugins (optional):** Plug a Flipper WiFi Dev Board (ESP32-S2) into the GPIO header to unlock live, network-rendered tag designs — crypto price cards, weather tiles, identicons, and more — auto-discovered by the FAP. New plugins live entirely on the cloud worker; the Flipper firmware never has to be re-flashed to add one.\n<img alt=\"image\" src=\"https://raw.githubusercontent.com/i12bp8/TagTinker/refs/heads/main/PXL_20260427_092219442.jpg\" />\n\n- Display text, custom images, and test-patterns.\n- Support for monochrome and accent-color (red/yellow) graphics tags.\n\n## Getting Started\n\n1. Build the Flipper app from this repository and install it via `ufbt`. The first launch creates `apps_data/tagtinker/dropped/` on your SD card.\n2. Open **[i12bp8.github.io/TagTinker](https://i12bp8.github.io/TagTinker/)** in any browser, pick your tag profile, drop an image, tweak, and download the BMP.\n3. Copy the BMP into `apps_data/tagtinker/dropped/` on the SD card (over `qFlipper`, USB MTP, or whatever you use).\n4. On the Flipper open `Targeted Payloads → <your tag> → Set Image`, pick the BMP, choose a page, send.\n\n## FAQ\n\n**Does this require a Flipper Zero?**\n\nNo, not at all! You can do this with less than $5 worth of microcontroller hardware (like an ESP32 and an IR LED). The Flipper Zero just happens to be my favorite security research tool, which is why I built the app for this platform.\n\n**Where is the `.fap` release?**\n\nThe Flipper app is source-first. Build the `.fap` yourself from this repository with `ufbt` so it matches your firmware and local toolchain.\n\n**What if it crashes or behaves oddly?**\n\nIf you are using a custom firmware branch, custom asset packs, or a heavily modified device setup, start by testing from a clean baseline firmware.\n\n## Credits & Background\n\nThis project is deeply indebted to the incredible public reverse-engineering work by **furrtek**. \nTo understand the underlying protocol, signal structure, and history, please read his research:\n- **Furrtek’s ESL research:** [https://www.furrtek.org/?a=esl](https://www.furrtek.org/?a=esl)\n- **PrecIR reference implementation:** [https://github.com/furrtek/PrecIR](https://github.com/furrtek/PrecIR)\n\nNFC tag decoding contributed by **7h30th3r0n3**.  \n\n## Disclaimer\n\n> [!CAUTION]\n> **STRICTLY PROHIBITED FOR ILLEGAL USE**\n> \n> TagTinker is an independent project intended **strictly** for educational research, security curiosity, and displaying digital art on hardware that **you legally own**. \n> \n> Under no circumstances is this software allowed to be used for illegal activities. You are strictly prohibited from using TagTinker to alter retail displays, modify electronic shelf labels in stores, interfere with third-party infrastructure, or cause any form of vandalism or financial harm. \n> \n> The creator of TagTinker assumes absolutely no liability for any misuse of this software. By using this software, you agree to take full responsibility for your actions and use it responsibly and legally.\n\n## License\n\nLicensed under the **GNU General Public License v3.0** (GPL-3.0). See the [`LICENSE`](LICENSE) file for details.\n","summary":"TagTinker is a Flipper Zero application that lets users probe and control infrared electronic‑shelf‑label (ESL) tags by sending custom text or images over IR. It bundles a fast RLE IR engine, a browser‑based image‑prep tool that dither‑stages photos into Flipper‑ready BMPs, and optional Wi‑Fi plugins that enable network‑rendered tag content. The workflow hinges on dropping prepared BMPs to the Flipper’s SD card, selecting a target tag (even via NFC scan), and transmitting the payload to any supported monochrome or color ESL. The toolkit is aimed at IoT security researchers, makers, and digital‑art creators who want an easy, install‑free method to experiment with obscure ESL protocols and display custom artwork on e‑ink hardware.","description":"Flipper Zero app for ESL research using IR. All based on https://www.furrtek.org/?a=esl","stars":1304,"language":"C"},{"owner":"willchen96","repo":"mike","url":"https://github.com/willchen96/mike","readme":"# Mike\n\nOpen-source release containing the Mike frontend and backend.\n\n## Contents\n\n- `frontend/` - Next.js application\n- `backend/` - Express API, Supabase access, document processing, and migrations\n- `backend/migrations/000_one_shot_schema.sql` - one-shot Supabase schema for fresh databases\n\n## Setup\n\nInstall dependencies:\n\n```bash\nnpm install --prefix backend\nnpm install --prefix frontend\n```\n\nCreate local env files from the examples:\n\n```bash\ncp backend/.env.example backend/.env\ncp frontend/.env.local.example frontend/.env.local\n```\n\nRun `backend/migrations/000_one_shot_schema.sql` in the Supabase SQL editor for a fresh database.\n\nStart the backend:\n\n```bash\nnpm run dev --prefix backend\n```\n\nStart the frontend:\n\n```bash\nnpm run dev --prefix frontend\n```\n\nOpen `http://localhost:3000`.\n\n## Required Services\n\n- Supabase Auth and Postgres\n- S3-compatible object storage, such as Cloudflare R2\n- At least one supported model provider key, depending on which models you enable\n- LibreOffice for DOC/DOCX to PDF conversion\n\n## Checks\n\n```bash\nnpm run build --prefix backend\nnpm run build --prefix frontend\nnpm run lint --prefix frontend\n```\n\n## License\n\nAGPL-3.0-only. See `LICENSE`.\n","summary":"Mike is a full-stack open‑source application that combines a Next.js front end with an Express API to offer a unified workflow for document processing, model inference, and data storage. It integrates tightly with Supabase for authentication, Postgres, and migrations, uses S3‑compatible object storage for assets, and supports LibreOffice conversions for DOC/DOCX to PDF. The platform is designed for developers and teams building AI‑powered document management solutions who need a ready‑to‑run stack that can be quickly deployed on cloud providers with Supabase and R2‑style storage.","description":"OSS AI Legal Platform","stars":1957,"language":"TypeScript"},{"owner":"Kianmhz","repo":"GooseRelayVPN","url":"https://github.com/Kianmhz/GooseRelayVPN","readme":"# GooseRelayVPN\n\n[![GitHub](https://img.shields.io/badge/GitHub-GooseRelayVPN-blue?logo=github)](https://github.com/kianmhz/GooseRelayVPN)\n\n**[🇮🇷 راهنمای فارسی (Persian)](README_FA.md)**\n\nA SOCKS5 VPN that tunnels **raw TCP** through a Google Apps Script web app to your own small VPS exit server. To anything on the network path your client only ever talks TLS to a Google IP with `SNI=www.google.com`. Everything in flight is AES-256-GCM encrypted end-to-end — Google never sees plaintext and never holds the key.\n\n> **How it works in simple terms:** Your browser/app talks SOCKS5 to this tool on your computer. The tool wraps every TCP byte in AES-GCM frames and posts them through a Google-facing HTTPS connection to a free Apps Script web app you control. The Apps Script forwards those bytes verbatim to your own VPS, which decrypts and opens the real connection. To the firewall/filter it looks like you're just talking to Google.\n\n> ⚠️ **You need a small VPS for the exit server.** Unlike pure-Apps-Script proxies, this project tunnels raw TCP — anything SOCKS5 can carry — so a real `net.Dial` has to happen somewhere. A small $4/month VPS is plenty. In exchange you can tunnel SSH, IMAP, custom protocols, anything — not just HTTP.\n\n## Support This Project\n\nIf you like this project, please consider starring it on GitHub (⭐). It helps the project get discovered.\n\nYou can also support the project financially:\n\n- TRX / USDT TRC20:\n  `TSxg2WAXYnkoR2UiUTzCxbmqNARAt91aqB`\n- BNB / USDT BEP20:\n  `0xe7b48d8fd5fbbb4e3fa9a06723a62a88585139ea`\n- TON:\n  `UQDBzJqzJ5e7uZFPrmarTRSGGbD1UoFK2q5_jWh4D2nnNdUB`\n\n## Important Notes\n\n- Never share `tunnel_key` with anyone. Anyone with this key can use your tunnel/VPS as if they are you.\n- A server with public internet access is required. Your exit server must be reachable from Google Apps Script.\n- Each Google Apps Script deployment ID has a quota of about 20,000 executions per day, and the quota resets around 10:30 AM Iran time (GMT+3:30).\n- You do not need to install a local MITM certificate in this project. The certificate setup in `MasterHttpRelayVPN` is for that project's architecture and is not required here.\n- This project was inspired by the idea in the main repository: https://github.com/masterking32/MasterHttpRelayVPN\n\n---\n\n## Disclaimer\n\nGooseRelayVPN is provided for educational, testing, and research purposes only.\n\n- **Provided without warranty:** This software is provided \"AS IS\", without express or implied warranty, including merchantability, fitness for a particular purpose, and non-infringement.\n- **Limitation of liability:** The developers and contributors are not responsible for any direct, indirect, incidental, consequential, or other damages resulting from the use of this project.\n- **User responsibility:** Running this project outside controlled test environments may affect networks, accounts, or connected systems. You are solely responsible for installation, configuration, and use.\n- **Legal compliance:** You are responsible for complying with all local, national, and international laws and regulations before using this software.\n- **Google services compliance:** If you use Google Apps Script with this project, you are responsible for complying with Google's Terms of Service, acceptable-use rules, quotas, and platform policies. Misuse may lead to suspension of your Google account or deployment.\n- **License terms:** Use, copying, distribution, and modification are governed by the repository license. Any use outside those terms is prohibited.\n\n---\n\n## How It Works\n\n```\nBrowser/App\n  -> SOCKS5  (127.0.0.1:1080)\n  -> Zstd-compressed + AES-256-GCM frame batches\n  -> HTTPS to a Google edge IP   (SNI=www.google.com, Host=script.google.com)\n  -> Apps Script doPost()        (dumb forwarder, never sees plaintext)\n  -> Your VPS :8443/tunnel       (decrypts, demuxes by session_id, dials target)\n  <- Same path in reverse via long-polling\n```\n\nYour application sends TCP bytes through the SOCKS5 listener on your computer. The client groups them into batches of frames, **Zstandard-compresses** each batch (for compressible traffic such as plain HTTP or JSON APIs this reduces the body size by up to 65%, keeping you further from Apps Script's daily quota limits), then seals the whole batch under a single **AES-256-GCM** envelope and POSTs it over a domain-fronted HTTPS connection to your Apps Script web app. The Apps Script is a ~30-line script that forwards the body verbatim to your VPS — it never decrypts and the AES key never touches Google. Your VPS decrypts, dials the real target, and pumps bytes back along the same path. The filter sees only TLS to Google.\n\n---\n\n## Step-by-Step Setup Guide\n\n### Step 1: Get an VPS\n\nYou need a Linux VPS with a public IP. Any provider works.\n\n### Step 2: Get the binaries\n\nYou need two separate programs:\n- **`goose-client`** — runs on **your own computer**. This is what you run every day.\n- **`goose-server`** — runs on **your VPS**. You set it up once and leave it running.\n\n**Option A — Download a pre-built release (recommended):**\n\n1. Go to the [Releases page](https://github.com/kianmhz/GooseRelayVPN/releases).\n2. Download the right archive for your OS:\n   - Windows: `GooseRelayVPN-client-vX.Y.Z-windows-amd64.zip`\n   - macOS (Intel): `GooseRelayVPN-client-vX.Y.Z-darwin-amd64.tar.gz`\n   - macOS (M1/M2/M3): `GooseRelayVPN-client-vX.Y.Z-darwin-arm64.tar.gz`\n   - Linux: `GooseRelayVPN-client-vX.Y.Z-linux-amd64.tar.gz`\n   - Android / Termux (arm64): `GooseRelayVPN-client-vX.Y.Z-android-arm64.tar.gz`\n3. For the **server**, SSH into your VPS and download the binary for your server OS:\n   - **Linux (most common):**\n     ```bash\n     wget https://github.com/kianmhz/GooseRelayVPN/releases/latest/download/GooseRelayVPN-server-vX.Y.Z-linux-amd64.tar.gz\n     tar -xzf GooseRelayVPN-server-vX.Y.Z-linux-amd64.tar.gz\n     ```\n   - **Windows Server:** download `GooseRelayVPN-server-vX.Y.Z-windows-amd64.zip` from the Releases page and extract it to a folder such as `C:\\goose-relay\\`. See Step 8 (Windows) below for service setup.\n\n   (Replace `vX.Y.Z` with the latest version number from the Releases page.)\n\n> 💡 **If the Releases page doesn't open**, you can download directly using these links (replace `vX.Y.Z` with the latest version):\n> - **Client — Windows:** `https://github.com/Kianmhz/GooseRelayVPN/releases/download/vX.Y.Z/GooseRelayVPN-client-vX.Y.Z-windows-amd64.zip`\n> - **Client — macOS (Apple Silicon):** `https://github.com/Kianmhz/GooseRelayVPN/releases/download/vX.Y.Z/GooseRelayVPN-client-vX.Y.Z-darwin-arm64.tar.gz`\n> - **Client — macOS (Intel):** `https://github.com/Kianmhz/GooseRelayVPN/releases/download/vX.Y.Z/GooseRelayVPN-client-vX.Y.Z-darwin-amd64.tar.gz`\n> - **Client — Linux:** `https://github.com/Kianmhz/GooseRelayVPN/releases/download/vX.Y.Z/GooseRelayVPN-client-vX.Y.Z-linux-amd64.tar.gz`\n> - **Client — Android/Termux:** `https://github.com/Kianmhz/GooseRelayVPN/releases/download/vX.Y.Z/GooseRelayVPN-client-vX.Y.Z-android-arm64.tar.gz`\n> - **Server — Linux:** `https://github.com/Kianmhz/GooseRelayVPN/releases/download/vX.Y.Z/GooseRelayVPN-server-vX.Y.Z-linux-amd64.tar.gz`\n\n**Option B — Build from source (Go 1.22+) — not recommended, may be unstable:**\n\n```bash\ngit clone https://github.com/kianmhz/GooseRelayVPN.git\ncd GooseRelayVPN\ngo build -o goose-client ./cmd/client\ngo build -o goose-server ./cmd/server\n```\n\n### Step 3: Generate a secret key\n\nRun this once:\n\n```bash\nopenssl rand -hex 32\n```\n\nCopy the 64-character string it prints. You'll use the **same value** in both the client and server configs. Keep it secret — anyone with this key can use your tunnel.\n\n### Step 4: Configure\n\nCopy the example configs:\n\n```bash\ncp client_config.example.json client_config.json\ncp server_config.example.json server_config.json\n```\n\nOpen both files and paste your key into the `tunnel_key` field. Leave `script_keys` empty for now.\n\n`client_config.json`:\n\n```json\n{\n  \"socks_host\":  \"127.0.0.1\",\n  \"socks_port\":  1080,\n  \"google_host\": \"216.239.38.120\",\n  \"sni\":         \"www.google.com\",\n  \"script_keys\": [\"PASTE_DEPLOYMENT_ID\"],\n  \"tunnel_key\":  \"PASTE_OUTPUT_OF_GEN_KEY\"\n}\n```\n\n`server_config.json`:\n\n```json\n{\n  \"server_host\": \"0.0.0.0\",\n  \"server_port\": 8443,\n  \"tunnel_key\":  \"SAME_VALUE_AS_CLIENT\"\n}\n```\n\n### Step 5: Set up the Google Apps Script\n\nThis is the free Google-side piece that hides your traffic.\n\n1. Go to [Google Apps Script](https://script.google.com/) and sign in.\n2. Click **New project**.\n3. Delete the default code and paste everything from [`apps_script/Code.gs`](apps_script/Code.gs).\n4. Change this line to your VPS IP:\n   ```javascript\n   const VPS_URL = 'http://YOUR.VPS.IP:8443/tunnel';\n   ```\n5. Click **Deploy → New deployment** → set type to **Web app**.\n6. Set **Execute as:** Me and **Who has access:** Anyone.\n7. Click **Deploy**. A dialog appears showing the **Deployment ID**. Copy that value and paste it into `script_keys`.\n8. Paste that ID into `script_keys` in `client_config.json`.\n\n> ⚠️ Every time you edit `Code.gs` you must create a **new deployment** (Deploy → **New deployment**) and update `script_keys`. Just saving the code is not enough.\n\n### Step 6: Open port 8443 on your VPS firewall\n\nThe server needs port 8443 to be reachable from the internet. On your VPS run:\n\n```bash\nsudo ufw allow 8443/tcp\n```\n\nThen verify it works from your own computer (replace with your real VPS IP):\n\n```bash\ncurl http://YOUR.VPS.IP:8443/healthz\n```\n\nYou should get an empty response with HTTP 200. If `curl` times out or refuses, also check your **cloud provider's firewall** (called \"Security Groups\" on AWS/Hetzner, \"Firewall Rules\" on DigitalOcean/Vultr, etc.) and add an inbound rule for TCP port 8443.\n\n### Step 7: Start the server on your VPS\n\nOn your VPS, run the server binary:\n\n**Linux:**\n```bash\n./goose-server -config server_config.json\n```\n\n**Windows Server:**\n```cmd\n.\\goose-server.exe -config server_config.json\n```\n\nYou should see it print the listening address and the healthz/tunnel URLs. Leave this terminal open, or set up the systemd/NSSM service (Step 8) to keep it running after reboots.\n\n### Step 8: Keep the server running after reboot (systemd)\n\nIf you want the exit server to start automatically after a VPS reboot, create a systemd service.\n\nRun on your VPS:\n\n```bash\nsudo nano /etc/systemd/system/goose-relay.service\n```\n\nPaste this (adjust the path if your binary is in a different location):\n\n```ini\n[Unit]\nDescription=GooseRelayVPN exit server\nAfter=network.target\n\n[Service]\nType=simple\nWorkingDirectory=/root\nExecStart=/root/goose-server -config /root/server_config.json\nRestart=always\nRestartSec=3\nStandardOutput=journal\nStandardError=journal\n\n[Install]\nWantedBy=multi-user.target\n```\n\nThen run:\n\n```bash\nsudo systemctl daemon-reload\nsudo systemctl enable goose-relay\nsudo systemctl start goose-relay\nsudo systemctl status goose-relay --no-pager\n```\n\n### Step 8 (Windows): Keep the server running after reboot (NSSM)\n\nIf your VPS runs **Windows Server**, use [NSSM](https://nssm.cc) (Non-Sucking Service Manager) to register `goose-server` as a Windows service instead of systemd. The `goose-server.exe` binary is a plain Go binary — no installer needed.\n\n**1. Open port 8443 in Windows Firewall** (run as Administrator in Command Prompt):\n```cmd\nnetsh advfirewall firewall add rule name=\"GooseRelayVPN\" protocol=TCP dir=in localport=8443 action=allow\n```\nAlso add an inbound TCP/8443 rule in your cloud provider's firewall panel (Security Groups / Firewall Rules).\n\n**2. Download NSSM** from https://nssm.cc/download, extract it, and note the path to `nssm.exe` (e.g. `C:\\nssm\\win64\\nssm.exe`).\n\n**3. Register and start the service** (run as Administrator):\n```cmd\nC:\\nssm\\win64\\nssm.exe install GooseRelayVPN \"C:\\goose-relay\\goose-server.exe\"\nC:\\nssm\\win64\\nssm.exe set GooseRelayVPN AppParameters \"-config C:\\goose-relay\\server_config.json\"\nC:\\nssm\\win64\\nssm.exe set GooseRelayVPN AppDirectory \"C:\\goose-relay\"\nC:\\nssm\\win64\\nssm.exe set GooseRelayVPN Start SERVICE_AUTO_START\nC:\\nssm\\win64\\nssm.exe start GooseRelayVPN\n```\n\n**4. Verify it is running:**\n```cmd\nC:\\nssm\\win64\\nssm.exe status GooseRelayVPN\ncurl http://YOUR.VPS.IP:8443/healthz\n```\n\nTo stop or uninstall later:\n```cmd\nC:\\nssm\\win64\\nssm.exe stop GooseRelayVPN\nC:\\nssm\\win64\\nssm.exe remove GooseRelayVPN confirm\n```\n\n### Step 9: Run the client on your computer\n\n```bash\n./goose-client -config client_config.json\n```\n\nYou should see output like this:\n\n```\nCLIENT  INFO    GooseRelayVPN client starting\nCLIENT  INFO    SOCKS5 proxy: socks5://127.0.0.1:1080\nCLIENT  INFO    pre-flight OK: relay healthy, AES key matches end-to-end\nCLIENT  INFO    ready: local SOCKS5 is listening on 127.0.0.1:1080\n```\n\nThe **pre-flight check** runs automatically at startup and verifies that Apps Script is reachable, the VPS is up, and the AES key matches. If it fails, the message tells you what went wrong.\n\nNow set your browser to use SOCKS5 proxy `127.0.0.1:1080`:\n\n- **Firefox:** Settings → Network Settings → Manual proxy → SOCKS5 host `127.0.0.1` port `1080`. Check **Proxy DNS when using SOCKS v5**.\n- **Chrome/Edge:** Use an extension like FoxyProxy or SwitchyOmega.\n- **System-wide on macOS/Linux:** Set SOCKS5 in network settings.\n\n---\n\n## Android Setup (Termux)\n\nThe Android client runs inside [Termux](https://termux.dev) — there is no APK. Follow these steps:\n\n**1. Install and set up Termux:**\n```bash\napt update && apt upgrade -y\npkg install wget tar -y\n```\n\n**2. Download and extract the client:**\n```bash\nwget https://github.com/Kianmhz/GooseRelayVPN/releases/latest/download/GooseRelayVPN-client-v1.4.1-android-arm64.tar.gz\ntar -xzvf GooseRelayVPN-client-v1.4.1-android-arm64.tar.gz\ncd GooseRelayVPN-client-v1.4.1-android-arm64/\nchmod +x goose-client\n```\n\n**3. Create your config:**\n```bash\ncp client_config.example.json client_config.json\nnano client_config.json\n```\nFill in your `script_keys` and `tunnel_key`, then save with Ctrl+X.\n\n**4. Run the client:**\n```bash\n./goose-client -config client_config.json\n```\n\nWhen you see `ready: local SOCKS5 is listening on 127.0.0.1:1080` it's working.\n\n**5. Connect your apps:**\n\nUse a SOCKS5-aware app to route traffic through `127.0.0.1:1080`. [NekoBox](https://github.com/MatsuriDayo/NekoBoxForAndroid) and [v2rayNG](https://github.com/2dust/v2rayNG) both work well:\n- Add a SOCKS5 proxy pointing to `127.0.0.1:1080`\n- In **per-app settings**, enable the proxy for the apps you want and **exclude Termux** from the VPN so the tunnel itself stays connected\n\n---\n\n## LAN Sharing (Optional)\n\nBy default the client listens on `127.0.0.1:1080` so only your computer can use it. To share with other devices on your local network, set `socks_host` to `0.0.0.0` in `client_config.json` and restart.\n\n> ⚠️ **Security note:** Anyone on your LAN can then proxy through your tunnel and consume your Apps Script quota. Only do this on trusted networks.\n\n---\n\n## Increase capacity with multiple deployments (recommended)\n\nThe **~20,000 calls/day quota applies per Google account**, not per deployment or project — all deployments under the same account share one quota pool. The client polls about once per second when idle, so a single deployment can sustain steady use, but heavy days hit the cap. Real-time apps like **Telegram or X can drain the quota within a few hours** due to constant polling. To go beyond that, deploy `Code.gs` across **different Google accounts** and put all the Deployment IDs into `script_keys`:\n\n```json\n{\n  \"script_keys\": [\n    \"FIRST_DEPLOYMENT_ID\",\n    \"SECOND_DEPLOYMENT_ID\",\n    \"THIRD_DEPLOYMENT_ID\"\n  ]\n}\n```\n\nWhat the client does for you automatically:\n\n- **Round-robin** across all configured deployments.\n- **Health-aware blacklist** — if one starts failing, the client backs off from it (3 s, 6 s, 12 s, … up to ~48 s) and keeps using the others.\n- **Same-poll failover** — if a poll fails on one deployment, the same payload is retried on another within the same poll cycle, so no traffic is lost during transient quota or 5xx events.\n\n> 💡 All deployments must use **the same `tunnel_key`** because they all forward to the same VPS, which only has one AES key. You don't need to change anything on the VPS when you add more deployments.\n\n> 💡 You can paste either just the Deployment ID (the part between `/s/` and `/exec`) or the full `/exec` URL — the client extracts the ID either way.\n\n> ⚠️ **Recommended range: 3–4 deployment IDs.** More is not always better — each key adds 3 concurrent poll workers, and going too high creates unnecessary load on Google's infrastructure without meaningful speed gains. Stick to 3–4 for reliable, stable performance.\n\n---\n\n## Configuration\n\n### Client (`client_config.json`)\n\n| Field | Default | What it does |\n|---|---|---|\n| `socks_host` | `127.0.0.1` | Host/IP for the local SOCKS5 listener. Set to `0.0.0.0` for LAN sharing. |\n| `socks_port` | `1080` | Port for the local SOCKS5 listener. |\n| `google_host` | `216.239.38.120` | Google edge IP/host to dial (port is fixed to `443`). |\n| `sni` | `www.google.com` | SNI presented during the TLS handshake. Accepts a single string or an array — `[\"www.google.com\", \"mail.google.com\", \"accounts.google.com\"]` — where each SNI host gets its own connection and throttle bucket, which can multiply available bandwidth in regions that rate-limit per domain name. |\n| `script_keys` | — | Array of Apps Script Deployment IDs (no full URL needed). One ID is required; add more to increase throughput and quota — each ID spawns 3 concurrent poll workers and adds ~20,000 req/day quota. **Recommended: 3–4 IDs.** Going higher adds load without meaningful gains. |\n| `tunnel_key` | — | 64-char hex AES-256 key. Must match the server byte-for-byte. |\n| `socks_user` | *(optional)* | SOCKS5 username (RFC 1929). When set, clients must authenticate or the connection is rejected. Must be paired with `socks_pass` — set both or neither. |\n| `socks_pass` | *(optional)* | SOCKS5 password paired with `socks_user`. |\n| `coalesce_step_ms` | `0` (off) | Adaptive uplink coalescing. Set it to a positive number to make the first kick of a burst of TX operations wait a little for more operations; each new operation resets the timer. This trades a bit of latency for fewer Apps Script calls. A good starting range is 20-40 ms. Set it to `0` to turn coalescing off. The internal safety cap is derived automatically from this value. |\n\n### Server (`server_config.json`)\n\n| Field | Default | What it does |\n|---|---|---|\n| `server_host` | `0.0.0.0` | Host/IP where the exit server binds. |\n| `server_port` | `8443` | Port where the exit server listens. Must be reachable from Google's network. |\n| `tunnel_key` | — | 64-char hex AES-256 key. Must match the client. |\n| `upstream_proxy` | *(optional)* | Route all outbound connections through a local SOCKS5 proxy. Useful when your VPS datacenter IP is blocked by certain sites. Set to `socks5://127.0.0.1:40000` to use Cloudflare WARP (DNS is resolved by the proxy, so target sites see the Cloudflare IP instead of your VPS IP). Leave empty or omit to dial directly. |\n| `debug_timing` | `false` | When `true`, logs per-session DNS and TCP dial latency so you can pinpoint where time is going. |\n\n---\n\n## Updating the Apps Script forwarder\n\nIf you change `Code.gs` — for example to point at a new VPS IP — you must create a **new deployment** in the Apps Script editor (Deploy → **New deployment**, not just \"Manage deployments\"). Saving alone does nothing; the live `/exec` URL serves the published version. After redeploying, update `script_keys` in `client_config.json`.\n\n---\n\n## Architecture\n\n```\n┌─────────┐   ┌──────────────┐   ┌──────────────┐   ┌─────────────┐   ┌──────────┐\n│ Browser │──►│ goose-client │──►│ Google edge  │──►│ Apps Script │──►│  Your    │──► Internet\n│  / App  │◄──│  (SOCKS5)    │◄──│ TLS, fronted │◄──│  doPost()   │◄──│  VPS     │◄──\n└─────────┘   └──────────────┘   └──────────────┘   └─────────────┘   └──────────┘\n              AES-256-GCM         SNI=www.google     dumb forwarder    decrypt +\n              session multiplex   Host=script.…      no plaintext      net.Dial\n```\n\nKey invariants:\n\n- **Authentication = AES-GCM tag.** No shared password, no certificates. Frames that fail `Open()` are dropped silently
