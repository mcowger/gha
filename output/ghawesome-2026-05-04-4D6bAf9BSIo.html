ets/data/commands.it.json` in the same PR.\n3. If translations are not added yet, the command still appears in FR/IT with an `EN` badge until translated.\n\n---\n\n## 📚 Categories\n\n| # | Category | Commands |\n|---|----------|----------|\n| 1 | ⚙️ Setup & Config | 7 |\n| 2 | 📁 Starting a Repo | 4 |\n| 3 | 🔄 Basic Workflow | 11 |\n| 4 | 🌿 Branching | 17 |\n| 5 | ☁️ Remote (GitHub) | 13 |\n| 6 | ↩️ Undo & Fix | 11 |\n| 7 | 📦 Stash | 7 |\n| 8 | 🏷️ Tags | 6 |\n| 9 | 🔍 History & Diff | 18 |\n| 10 | 🧹 Cleanup & Maintenance | 8 |\n| 11 | 🌲 Worktrees | 8 |\n| 12 | 🚀 Advanced Branching | 5 |\n\n---\n\n## 🚀 Quick Start\n\n### Option 1 — Use the live website\nJust visit: **[abdosorour7.github.io/git-commands-cheatsheet](https://abdosorour7.github.io/git-commands-cheatsheet)**\n\n### Option 2 — Run locally\n```bash\ngit clone https://github.com/abdosorour7/git-commands-cheatsheet.git\ncd git-commands-cheatsheet\n```\n\nOpen `index.html` first (double-click it, or open it in your browser).\n\nIf the page works, you are done.\n\nIf commands do not load (browser blocks `file://` JSON loading), run a local server:\n\n```bash\npython -m http.server 8080\n```\n\nThen open: **http://localhost:8080**\n\nIf Python is not installed, use one of these alternatives:\n\n```bash\n# Option A (Node.js)\nnpx serve .\n\n# Option B (VS Code extension)\nUse \"Live Server\" and open the project root\n```\n\nYou can still open `index.html` directly, but some browsers may block local JSON loading over `file://`.\n\nNo build tools required for local development.\n\n---\n\n## 🧱 Project Structure\n\n```text\ngit-commands-cheatsheet/\n├─ index.html\n├─ assets/\n│  ├─ css/\n│  │  └─ styles.css\n│  ├─ data/\n│  │  ├─ commands.en.json   ← English (canonical source of truth)\n│  │  ├─ commands.it.json   ← Italian translations\n│  │  ├─ commands.fr.json   ← French translations\n│  │  └─ ui.json            ← UI strings for all locales\n│  └─ js/\n│     ├─ app.js\n│     └─ modules/\n│        ├─ data-loader.js\n│        ├─ i18n.js\n│        ├─ interactions.js\n│        ├─ render.js\n│        └─ state.js\n└─ README.md\n```\n\n---\n\n## 🌟 Support This Project\n\n- ⭐ Star the repository if it helped you\n- 🍴 Fork it and customize your own version\n- 📣 Share it with teammates or in dev communities\n- 🐛 Open issues for mistakes or missing commands\n\n---\n\n## 🤝 Contributing\n\nContributions are warmly welcome and highly appreciated.\n\n- ➕ Add useful missing Git commands\n- 📝 Improve command descriptions and examples\n- 🎨 Suggest UI/UX improvements\n- 🧪 Help improve quality and consistency\n\nOpen an issue or PR directly and include clear details/screenshots when relevant.\n\n---\n\n## 📄 License\n\nMIT © [abdosorour7](https://github.com/abdosorour7) — free to use, share, and modify.\n\n---\n\n<div align=\"center\">\n\nIf this helped you, please consider giving it a ⭐ — it helps others discover it!\n\n***I’m not primarily a web developer — I just build practical tools that solve real developer problems.***\n\nBuilt with thoughtful AI assistance.\n\n---\n\n**Made with ❤️ for the developer community**\n\n</div>\n\n","summary":"The Git Commands Cheatsheet is a lightweight, static web app that provides a quick‑reference guide to over 115 Git commands split into 12 workflow categories. It offers instant, real‑time search, one‑click copy, and a dark terminal‑style theme, while highlighting dangerous commands and supporting English, Italian, and French with a persistent language switcher. The project is built without frameworks, using plain HTML, CSS, and vanilla JavaScript for fast loading and easy maintenance. It is ideal for developers at any experience level who need a portable, multilingual Git reference that can be extended or contributed to through simple JSON edits.","description":"The ultimate Git Commands Cheatsheet: searchable, copy-ready, and organized for real-world developer workflows.","stars":125,"language":"JavaScript"},{"owner":"tgies","repo":"klattsch","url":"https://github.com/tgies/klattsch","readme":"# klattsch\n\nA primitive parallel-formant speech synthesizer in the browser. Late-70s / early-80s tier (Votrax, SAM).\n\nThe name is a portmanteau of *Klatt* (Dennis Klatt, the formant-synth pioneer) and *Klatsch* (German for gossip / casual chat).\n\n[**Live demo**](https://tgies.github.io/klattsch/)\n\n[**Commercial support**](#commercial-support) - integration consulting from the author\n\n## What it does\n\nYou type a phoneme string in [ARPABET](https://en.wikipedia.org/wiki/ARPABET), with optional directives, and the computer says it.\n\n```\nHH AH L OW                        hello, default voice\nb140 HH AH L OW                   higher voice\nbA3 HH AH L OW                    higher voice (note name)\nAY+15 D IH D                      \"I did\" with a rising contour\nD IH D DH AE(+40) T               \"did THAT\" with a transient pitch ornament on AE\nr200 bC#4 ( HH AH ) ( L OW )      sung syllables, one note per group\n```\n\nSee the in-app `syntax help` panel for the full directive table.\n\n## Installation\n\n```bash\nnpm install klattsch\n```\n\nThe same package works as a CLI, as an importable engine in Node, and as an embeddable engine + AudioWorklet in the browser. Zero runtime dependencies.\n\n## Usage\n\n### CLI\n\nRender a phoneme string straight to a WAV file:\n\n```bash\nnpx klattsch \"HH AH L OW\" hello.wav\n```\n\n### Node / `OfflineAudioContext`\n\n```js\nimport { compileString, FormantSynth, encodeWav } from 'klattsch';\n\nconst sampleRate = 48000;\nconst { schedule, totalMs } = compileString('HH AH L OW');\nconst synth = new FormantSynth({ sampleRate, schedule });\nconst buf = new Float32Array(Math.ceil(totalMs * sampleRate / 1000));\nsynth.process(buf);\n\nconst { bytes } = encodeWav(buf, sampleRate);\n// write bytes to a .wav file\n```\n\n### Browser with a bundler (Vite, webpack, esbuild, Rollup)\n\n```js\nimport { compileString } from 'klattsch';\nimport workletUrl from 'klattsch/formant-worklet.js?url';\n\nconst ctx = new AudioContext();\nawait ctx.audioWorklet.addModule(workletUrl);\nconst node = new AudioWorkletNode(ctx, 'formant-processor');\nnode.connect(ctx.destination);\n\nconst { schedule } = compileString('HH AH L OW');\nnode.port.postMessage({ type: 'schedule', schedule });\n```\n\n### Browser without a bundler (CDN)\n\n```html\n<script type=\"module\">\n  import { compileString } from 'https://esm.sh/klattsch';\n\n  const ctx = new AudioContext();\n  await ctx.audioWorklet.addModule('https://esm.sh/klattsch/formant-worklet.js');\n  const node = new AudioWorkletNode(ctx, 'formant-processor');\n  node.connect(ctx.destination);\n\n  const { schedule } = compileString('HH AH L OW');\n  node.port.postMessage({ type: 'schedule', schedule });\n<\/script>\n```\n\n## How it works\n\n- **Excitation:** voiced source is a Rosenberg-style glottal pulse with a tunable open / closed quotient (`g` / \"effort\") and unvoiced source is xorshift noise. These are crossfaded by each phoneme's `voicing` parameter, with optional aspiration noise mixed in.\n- **Filtering:** three parallel bandpass biquads for each formant.\n- **Prosody:** the sequencer compiles phoneme strings into a time-stamped schedule of formant targets.\n- **Voice character:** vibrato (depth + rate), aspiration / breathiness, spectral tilt, and glottal effort are all controllable.\n\n## References\n\n- Klatt, D. H. (1980). *Software for a cascade/parallel formant synthesizer.*\n- Hillenbrand et al. (1995). *Acoustic characteristics of American English vowels.*\n- Rosenberg, A. E. (1971). *Effect of glottal pulse shape on the quality of natural vowels.*\n- Robinson, R. Bristow-Johnson. *Audio EQ Cookbook.*\n\n## See also\n\n- [**libadlmidi-js**](https://github.com/libadlmidi-js/libadlmidi-js) - WebAssembly build of libADLMIDI, an OPL3 FM synthesis library with AudioWorklet integration. Where klattsch does parallel-formant *vocal-tract* synthesis, libadlmidi-js does FM-operator synthesis: the sound of early-80s arcade boards and AdLib cards. Includes [oplsfxr](https://libadlmidi-js.github.io/examples/oplsfxr.html), a sfxr-style sound effect generator.\n\n## Built with klattsch\n\n- [**klattsch-sing**](https://sing.wasthatzero.net/) - a piano-roll sequencer for speech-based singing synthesis. Draw notes, type words or phonemes, render to WAV. Supports MIDI import, quantization, tempo + time signature, demo songs, and a custom KSP project file format. Built on the klattsch npm package.\n\n## Commercial Support\n\n`klattsch` is built and maintained by [Tony Gies](https://github.com/tgies). For studios, indie developers, and agencies integrating klattsch into a shipped product, consulting is available through his consultancy, Crash United, LLC.\n\n### Support Offerings\n\n| Service | Description |\n|---------|-------------|\n| **Game / app integration** | Wiring klattsch into your engine (Unity, Godot, web, Electron, Flutter), with dialog-system glue and tooling for non-programmer collaborators (writers, sound designers) |\n| **Custom character voices** | Crafting a recognizable voice signature for a specific character: formant tuning, prosody templates, phoneme calibration, voice tests against scripted dialogue |\n| **Audio pipeline work** | Routing klattsch through your DSP graph: mixing with music, ducking, environmental effects (reverb, distortion, radio filtering), multi-voice ensembles, dynamic vocal sizing |\n| **Language / phoneme expansion** | Non-English phoneme tables, alternate transcription formats, custom symbol sets for stylized worlds (alien races, fantasy languages, in-universe scripts) |\n| **Performance tuning** | Real-time constraints (game audio thread, low-latency targets), WASM/Rust ports, embedded or constrained-runtime targets |\n| **Custom DSP features** | Cascade synthesis, additional formants, LPC pre-filtering, vocoder modes, custom synth extensions beyond the included parallel-resonator engine |\n| **Priority bug fixes** | Reported issues triaged and patched ahead of the public queue, with backports to your pinned version |\n| **Workshops / talks** | Formant synthesis, retro speech tech, or DSP fundamentals for your team |\n\nFor pricing, scoping, or anything not listed above, email **[support@crashunited.com](mailto:support@crashunited.com)** to discuss your project.\n\n### Sponsorship\n\nTo support ongoing development without a formal contract, [GitHub Sponsors](https://github.com/sponsors/tgies) or [Ko-fi](https://ko-fi.com/crashunited) are the simplest paths.\n\n## License\n\nMIT &copy; Tony Gies\n","summary":"Klagtʹchs is a lightweight, browser‑based parallel‑formant speech synthesizer that turns ARPABET phoneme strings into spoken audio. It offers a flexible syntax for controlling pitch, formant trajectories, vibrato, breathiness, and other voice properties, and can be run as a CLI, in Node, or as an embeddable AudioWorklet with zero runtime dependencies. The engine’s simple API lets developers generate WAV files, drive real‑time synthesis in web audio, or integrate the formant model into other projects. It is ideal for educators, hobbyists, and developers who need a deterministic, low‑complexity speech synthesis solution for demos, retro‐style vocal effects, or research controls.","description":"primitive parallel-formant speech synth in the browser","stars":202,"language":"JavaScript"},{"owner":"zhouxiyu1997","repo":"friendmaker","url":"https://github.com/zhouxiyu1997/friendmaker","readme":"# Friend Maker\n\n[中文说明](#中文说明) | [English](#english)\n\n![License](https://img.shields.io/badge/license-GPL--3.0--or--later-blue.svg)\n![Platform](https://img.shields.io/badge/platform-macOS%20%7C%20Windows-black.svg)\n![Hardware](https://img.shields.io/badge/hardware-ESP32--WROOM--32-orange.svg)\n![Status](https://img.shields.io/badge/status-alpha-yellow.svg)\n\n<p>\n  <a href=\"docs/media/demo-video.mp4\">\n    <img src=\"docs/media/demo-real-device.jpeg\" alt=\"Friend Maker real device demo on Nintendo Switch\" width=\"760\" />\n  </a>\n</p>\n\n<p>\n  <img src=\"docs/media/ui-studio-page.png\" alt=\"Friend Maker studio page for image import, preview, brush size, color modes, and serial execution\" width=\"32%\" />\n  <img src=\"docs/media/ui-firmware-page.png\" alt=\"Friend Maker firmware flashing page with PlatformIO integration\" width=\"32%\" />\n  <img src=\"docs/media/ui-controller-page.png\" alt=\"Friend Maker controller test page with connection status and button testing\" width=\"32%\" />\n</p>\n\n## 中文说明\n\n`朋友制作器` 是一个面向 `macOS / Windows + ESP32-WROOM-32 / ESP-32S` 的自动绘制工具。  \n它会将图片转换成像素网格和手柄动作脚本，再通过 ESP32 模拟 Switch Pro Controller 输入，在游戏画板中自动完成绘制。当前版本主要面向《朋友收集：梦想生活》与 `Tomodachi Life` 的绘图场景。\n\n这个项目已经历过多轮迭代，当前 README 以最新的 `桌面端四页工作流` 为准：\n\n- `刷入固件`\n- `手柄测试`\n- `调试测速`\n- `脚本生成 / 恢复绘制`\n\n当前最推荐的体验路线仍然是 `单色绘制` 和 `官方色绘制`。  \n`自定义多色` 已经开放测试入口，但稳定性仍弱于前两条主线，当前仍属于 `测试阶段 / 实验能力`。\n\n关键词：`Friend Maker`、`朋友制作器`、`Tomodachi Life`、`朋友收集：梦想生活`、`Nintendo Switch auto draw`、`ESP32 Pro Controller emulator`、`pixel art drawing automation`、`Bluetooth Classic HID`。\n\n### 平台支持\n\n- 支持桌面端一键安装启动：`macOS`\n- 支持桌面端一键安装启动：`Windows x64`\n- 暂不支持：`Windows ARM64`\n- 暂未正式支持：`Linux`\n\n当前版本已经提供：\n\n- `macOS / Windows x64` 的桌面端安装包，安装后可直接启动\n- `macOS` 的 `Start Friend Maker.command` 一键启动脚本，作为仓库版备用方式\n- `Windows` 的 `Install Friend Maker.cmd` 一键安装脚本与手动启动流程，作为仓库版备用方式\n\n参考文档：\n\n- [macOS / Windows 试用说明](docs/user-trial-guide.md)\n- [Windows 安装说明](docs/setup-windows.md)\n\n### 演示\n\n- [查看演示视频](docs/media/demo-video.mp4)\n\n### 项目功能\n\n- 导入 `PNG / JPG / SVG` 图片，并生成绘制预览\n- 支持 `1 / 3 / 7 / 13 / 19 / 27` 六种画笔大小\n- 支持 `单色绘制`、`官方色绘制`，以及 `自定义多色（测试中）`\n- 支持 `256x256` 脚本坐标画布工作流\n- 支持异形图纸模板裁切与模板预览\n- 支持 `自动扣背景`，适合白底、浅灰底、棋盘格假透明图\n- 通过带 `SEQ <session> <seq>` 去重帧的串口协议将绘制脚本逐条发送给 ESP32，并等待 `ACK`\n- 在界面中完成脚本生成、固件刷写、手柄连接、按钮测试与调试测速，以及暂停、继续和中断绘制\n- 支持本地恢复任务：暂停、中断、异常或应用重启后，仍可从恢复点继续\n\n### 整体架构\n\n```text\n图片输入\n  -> 像素化 / 量化 / 路径规划\n  -> 指令脚本\n  -> 串口 ACK 发送\n  -> ESP32-WROOM-32\n  -> Bluetooth Classic HID\n  -> Nintendo Switch\n  -> 游戏内画布绘制\n```\n\n### 当前主流程\n\n当前最稳定、也是文档默认采用的使用顺序：\n\n1. `刷入固件`\n2. `手柄测试`\n3. `调试测速`\n4. `脚本生成`\n\n对应的实际动作是：\n\n1. 在 `刷入固件` 页更新推荐固件并确认串口正常\n2. 在 `手柄测试` 页完成蓝牙连接、按钮和方向测试\n3. 在 `调试测速` 页优先调 `inputDelay`，再微调 `buttonPressDuration`，先把稳定性跑出来\n4. 回到 `脚本生成` 页导入图片、检查预览并正式开始绘制\n\n### 当前版本定位\n\n- 当前主线已经从早期的“手工脚本 + 命令行试验”迭代到“桌面端闭环工作流”\n- README 默认描述 `桌面端安装包 / 桌面端页面` 的最新行为\n- 与绘图质量和成功率直接相关的能力，会优先以 `输入稳定性` 和 `恢复能力` 为准\n- `inputDelay` 更像稳定性旋钮，`buttonPressDuration` 更像力度旋钮；建议先调稳定，再看速度\n- `自定义多色` 虽然可见、可测试，但暂时不建议作为首次试用路线\n\n### 绘制模式\n\n#### 单色绘制\n\n- 深色像素会被绘制\n- 浅色像素会保留为空白\n- 适合黑白图、轮廓图与简单像素素材\n\n#### 官方色绘制\n\n- 会量化到游戏内置的 `7 x 12` 官方色盘\n- 当前支持 `8 / 16 / 32 / 64 / 84` 色量化档位\n- 当前按游戏原始 `9` 个色盘槽位的默认颜色起步\n\n#### 自定义多色（测试中）\n\n- 会先把图片自动量化成多种颜色，再按批次写入右侧 `9` 个自定义色槽\n- 当前更适合颜色数量较少、结构较简单的图片\n- 这是仍在继续打磨的实验路线，稳定性与容错性暂时弱于 `单色绘制` 和 `官方色绘制`\n- 首次试用时，更推荐先用 `单色绘制` 或 `官方色绘制` 验证整体链路\n\n### 运行要求\n\n#### 硬件\n\n- Mac 或 Windows 电脑\n- `ESP32-WROOM-32 / ESP-32S` 开发板\n  常见写法如 `ESP32 DevKitC` 或 `NodeMCU-32S` 兼容板通常也可以；建议选择带 `USB` 串口、可直接刷机的版本，并尽量避开 `ESP32-C3 / ESP32-S3 / ESP32-C6` 这类只有 `BLE` 或当前不属于本项目主线支持范围的型号\n- Nintendo Switch\n- 可传输数据的 USB 线\n\n#### 软件\n\n- 如果你使用 `桌面端安装包`，不需要预先手动安装 `Node.js`、`npm` 或 `PlatformIO`，但首次准备 `PlatformIO` 需要联网\n- 如果你使用 `仓库版备用流程`，建议准备 `Node.js 20+`、`npm 10+`、`PlatformIO Core 6+`\n\n### 快速开始\n\n#### 桌面端一键安装启动（推荐）\n\n当前推荐优先使用桌面端安装包：\n\n- `macOS`：安装 `.dmg` 后直接启动 `Friend Maker`\n- `Windows x64`：运行安装包 `.exe` 后直接启动 `Friend Maker`\n\n首次使用请注意：\n\n- 如果 `刷入固件` 页提示没有 `PlatformIO`，点击 `准备 PlatformIO`\n- 这一步需要联网；如果应用提示缺少 `Python`，允许下载仅供 `Friend Maker` 使用的本地 Python 运行环境即可\n- 初次刷入固件可能需要 `5 分钟左右`，请耐心等待\n- 不要安装在中文目录下\n- 如果你是 `Windows` 用户，且串口设备列表为空、检查不到 `ESP32`，在 `PlatformIO` 就绪后先尝试 `安装 CP210x 驱动（优先）`，仍无效果再尝试 `安装 CH340/CH341 驱动（备选）`\n- `Windows ARM64` 当前不在支持范围内；这类设备市场占有率约 `1%`，我们手头也没有设备可测，欢迎有能力的朋友提交 PR 补充支持\n\n#### 仓库版备用流程\n\n路径说明：\n\n- 将 `/path/to/friendmaker` 替换为你自己的本地项目目录\n- 将 `<your-serial-port>` 替换为你自己的串口设备，例如 macOS 上的 `/dev/cu.usbserial-0001` 或 Windows 上的 `COM3`\n- 如果 `pio` 已经在 shell 的 `PATH` 中，可以直接使用 `pio ...`\n- 如果没有，请使用完整的 PlatformIO 路径\n- macOS 路径：`~/.platformio/penv/bin/pio`\n- Windows 路径：`%USERPROFILE%\\\\.platformio\\\\penv\\\\Scripts\\\\pio.exe`\n\n#### macOS 仓库版一键启动（备用）\n\n你现在可以通过下面两种方式启动应用：\n\n- 双击 [`Start Friend Maker.command`](./Start%20Friend%20Maker.command)\n- 或运行下面的命令：\n\n```bash\ncd /path/to/friendmaker\n./Start\\ Friend\\ Maker.command\n```\n\n这个启动器会：\n\n- 检测 `Node.js`、`npm`、`Python 3` 和 `PlatformIO`\n- 在缺失时尝试自动安装所需软件\n- 在需要时自动安装项目依赖\n- 启动本地 Web UI\n- 自动打开 `http://127.0.0.1:4307`\n\n补充说明：\n\n- 如果缺少 `Homebrew`，启动器会询问是否安装\n- 第一次安装软件时，终端可能会请求输入系统密码\n- 使用过程中请保持终端窗口开启\n\n#### Windows 仓库版一键安装（备用）\n\n你现在可以通过下面两种方式完成安装：\n\n- 双击 [`Install Friend Maker.cmd`](./Install%20Friend%20Maker.cmd)\n- 或在 `CMD` / `PowerShell` 中运行：\n\n```bat\ncd C:\\path\\to\\friendmaker\nInstall Friend Maker.cmd\n```\n\n这个安装脚本会：\n\n- 检测 `Node.js`、`npm`、`Python 3` 和 `PlatformIO`\n- 在检测到 `winget` 时尝试自动安装缺失的软件\n- 自动执行 `npm install`\n- 自动执行 `npm run check`\n- 如果安装失败，用中文提示当前问题\n\n补充说明：\n\n- 如果系统里没有 `winget`，请先安装或更新 `App Installer`\n- 如果自动安装失败，可以直接参考 [Windows 安装说明](docs/setup-windows.md) 走原本的手动安装流程\n- 这个脚本负责安装，当前 Windows 仍然需要手动运行 `npm run ui:dev` 启动网页\n\n#### 1. 安装依赖\n\n```bash\ncd /path/to/friendmaker\nnpm install\n```\n\n#### 2. 检查项目\n\n```bash\nnpm run check\n```\n\n#### 3. 刷入固件\n\n```bash\ncd /path/to/friendmaker/firmware/esp32\n~/.platformio/penv/bin/pio run -e esp32dev_wireless -t upload\n```\n\nWindows 示例：\n\n```powershell\ncd C:\\path\\to\\friendmaker\\firmware\\esp32\n$env:USERPROFILE\\.platformio\\penv\\Scripts\\pio.exe run -e esp32dev_wireless -t upload --upload-port COM3\n```\n\n如果刷固件时开发板一直进不去下载模式，可以尝试按住实体板上的 `BOOT` 键，再重新刷入。\n\n#### 4. 启动网页界面\n\n```bash\ncd /path/to/friendmaker\nnpm run ui:dev\n```\n\n打开：\n\n```text\nhttp://127.0.0.1:4307\n```\n\n### 开始绘制前必须确认\n\n这 3 条是试用时最容易漏掉的前提：\n\n1. Switch 中的画笔大小要和网页当前选择一致\n2. 开始绘制前，画笔和光标必须停在画布中心\n3. 如果使用官方色绘制，保持游戏默认的 `9` 个色盘槽位颜色即可\n\n补充约束：\n\n- 当前绘图与恢复流程都只支持“重新进入绘图页后，从画布中心继续”这一个起点假设\n- 不要把画布理解成可以稳定“撞到左上角再归零”的有边界平面；游戏主画布当前没有可依赖的左上角复位语义\n- 如果文档里提到“归左上”或“左上角起点”，那只适用于色盘或颜色编辑页内部的导航建模，不适用于绘图画布光标恢复\n\n### 自动扣背景\n\n如果素材是下面这些类型：\n\n- 白底 PNG\n- 浅灰底 PNG\n- 棋盘格“假透明”图片\n\n可以在脚本生成页的预览模块中启用 `自动扣背景`。\n\n补充说明：\n\n- 真正带透明通道的 PNG 不需要开启\n- `自动扣背景` 是边缘背景识别，不是 AI 抠图\n- 对角色、物品与像素素材通常已经够用\n\n### 网页模块\n\n#### 脚本生成\n\n- 导入图片\n- 选择画笔大小\n- 选择单色、官方色或自定义多色（测试中）\n- 选择模板、缩放和位置，并检查预览\n- 生成预览与命令\n- 查看官方色盘预览、统计信息与执行状态\n- 一键开始绘制\n- 暂停、中断或异常后会在本地保留恢复任务；如果应用在暂停期间被关闭，下次启动后该任务也会自动转成可恢复状态\n- 可以从恢复点继续，也可以手动放弃已经不需要的恢复记录\n- 如果“正在中断绘制”长时间卡住，页面会出现应急按钮，用于强制清除当前卡住状态\n\n#### 刷入固件\n\n- 枚举串口\n- 当前主线支持的固件目标环境为：`ESP32-WROOM-32 / ESP-32S` 与 `NodeMCU-32S`\n- 调用本机 PlatformIO\n- 编译并刷入 ESP32 固件\n- Windows 下可在页面内直接安装 `CP210x` 或 `CH340/CH341` 串口驱动\n- 返回刷写结果与滚动日志\n\n#### 手柄测试\n\n- 连接手柄\n- 重置手柄蓝牙\n- 如果连接手柄连不上，先点击 `重置手柄蓝牙`，再点击 `连接手柄`\n- 如果还是连不上，可以按一下实体板上的 `EN` 键重启开发板，再重新点击 `连接手柄`\n- 如果还是连不上，回到 `刷入固件` 页重新刷一次固件后再试\n- 单步测试按钮、方向键与摇杆，并可选择摇杆步数\n- 支持 `Home`、`Capture`、`LS`、`RS` 和 `L+R 配对` 等单独动作测试\n- 查看 HID 连接状态\n- 支持手动断开串口\n- 发送自定义测试命令并查看滚动日志\n\n### 仓库结构\n\n```text\napps/desktop/src\n  app/               绘制计划生成\n  cli/               CLI 参数解析\n  config/            默认配置与官方色表\n  image/             图片缩放、量化、预览与扣背景\n  path/              路径生成与轻量优化\n  protocol/          指令对象与序列化\n  serial/            串口枚举与 ACK 发送\n  web/               本地网页工作台\n\nfirmware/esp32\n  src/               ESP32 固件与蓝牙控制器实现\n\nprofiles/            示例 profile\nexamples/            演示图片与示例命令\ndocs/                开发与试用文档\ndocs/media/          README 展示图片与视频\n```\n\n### 文档\n\n- [docs/user-trial-guide.md](docs/user-trial-guide.md)：给试用者的启动与使用说明\n- [docs/development-manual.md](docs/development-manual.md)：当前开发手册与已知规则\n- [docs/setup-mac.md](docs/setup-mac.md)\n- [docs/arrival-checklist.md](docs/arrival-checklist.md)\n- [docs/wiring.md](docs/wiring.md)\n\n### 当前限制\n\n- Switch 连接和绘图流程仍然依赖固定场景假设\n- `自定义多色` 仍在测试阶段，当前整体稳定性明显弱于 `单色绘制` 和 `官方色绘制`\n- 自定义颜色自动调色和长流程容错还不稳定，当前更推荐 `官方色绘制`\n- 第一优先级仍然是输入稳定性，而不是绘制速度\n\n### 当前状态\n\n当前仓库已经具备可试用的闭环：\n\n```text\n网页刷入固件\n  -> 测试手柄连接\n  -> 导入图片\n  -> 像素化 / 量化 / 扣背景\n  -> 生成命令脚本\n  -> 串口 ACK 发送\n  -> ESP32 协议解析\n  -> Bluetooth Classic Switch 控制器输出\n  -> 游戏内绘制\n```\n\n### 许可证\n\n本仓库采用 **GPL-3.0-or-later** 开源协议。  \n完整协议内容请查看 [LICENSE](LICENSE)。\n\n当前 `firmware/esp32` 中的 Switch 蓝牙兼容实现，引入并改写自 [UARTSwitchCon](https://github.com/nullstalgia/UARTSwitchCon) 的思路与代码路径，因此当前仓库采用 GPL 以保持许可证一致。\n\n### 作者与来源\n\n- 来源作者：小红书作者 `惜羽拓麻镇`\n- 如果你公开转发、转载或分享这个项目，建议注明作者名称 `惜羽拓麻镇`\n- 建议同时附上原始发布地址\n\n## English\n\n`Friend Maker` is an automatic drawing toolkit for `macOS / Windows + ESP32-WROOM-32 / ESP-32S`.  \nIt converts images into pixel grids and controller action scripts, then uses an ESP32 to emulate Switch Pro Controller input and draw automatically on the in-game canvas. The current version is primarily tailored for drawing workflows in `Tomodachi Life` and 《朋友收集：梦想生活》.\n\nThe project has already gone through many iterations, and this README now follows the latest `desktop four-page workflow`:\n\n- `Firmware Flash`\n- `Controller Test`\n- `Timing Tune / Benchmark`\n- `Script Studio / Recovery`\n\nThe recommended paths are still `mono drawing` and `official palette drawing`.  \n`Custom multicolor` is now exposed for testing, but it is still less stable than those two main paths and should be treated as an `experimental / testing-stage` feature.\n\nKeywords: `Friend Maker`, `Tomodachi Life`, `Nintendo Switch auto draw`, `ESP32 Pro Controller emulator`, `pixel art drawing automation`, `Bluetooth Classic HID`.\n\n### Compatibility\n\n- Desktop app one-click install and launch supported: `macOS`\n- Desktop app one-click install and launch supported: `Windows x64`\n- Not supported yet: `Windows ARM64`\n- Not officially supported yet: `Linux`\n\nThe current version already provides:\n\n- desktop installers for `macOS / Windows x64`, with direct app launch after install\n- the `Start Friend Maker.command` launcher for the repo-based macOS fallback flow\n- the `Install Friend Maker.cmd` installer and manual startup flow for the repo-based Windows fallback path\n\nReference documents:\n\n- [macOS / Windows Trial Guide](docs/user-trial-guide.md)\n- [Windows Setup Guide](docs/setup-windows.md)\n\n### Showcase\n\n- [Watch demo video](docs/media/demo-video.mp4)\n\n### What It Does\n\n- Import `PNG / JPG / SVG` images and generate drawing previews\n- Support six brush sizes: `1 / 3 / 7 / 13 / 19 / 27`\n- Support `mono drawing`, `official palette drawing`, and `custom multicolor (testing)`\n- Use a `256x256` script-coordinate canvas workflow\n- Support irregular drawing templates and template-aware preview cropping\n- Support `automatic background removal` for white, light gray, and fake transparency checkerboard backgrounds\n- Send drawing commands to the ESP32 over a `SEQ <session> <seq>` deduplicating serial protocol and wait for `ACK`\n- Handle script generation, firmware flashing, controller connection, button testing, timing tuning, and benchmark actions from the shared app interface\n- Preserve local recovery jobs so paused, interrupted, failed, or restarted sessions can still be resumed from a recovery point\n\n### Architecture\n\n```text\nImage input\n  -> Pixelization / Quantization / Path planning\n  -> Command script\n  -> Serial ACK sender\n  -> ESP32-WROOM-32\n  -> Bluetooth Classic HID\n  -> Nintendo Switch\n  -> In-game canvas drawing\n```\n\n### Current Workflow\n\nThe most stable workflow, and the one used by the documentation by default, is:\n\n1. `Flash firmware`\n2. `Test controller`\n3. `Tune timing`\n4. `Generate script`\n\nThe practical actions are:\n\n1. Update the recommended firmware in the `Firmware Flash` page and confirm the serial port works\n2. Complete Bluetooth connection, button tests, and direction tests in the `Controller Test` page\n3. In the `Timing Tune / Benchmark` page, increase `inputDelay` first, then fine-tune `buttonPressDuration` until the link feels stable\n4. Return to the `Script Studio` page, import an image, review the preview, and start drawing\n\n### Current Product Focus\n\n- The main path has evolved from early command-line experiments into a desktop-app-centered closed loop\n- This README describes the latest packaged desktop app and page flow by default\n- Features that affect success rate are prioritized around `input stability` and `recovery`\n- `inputDelay` behaves more like a stability knob, while `buttonPressDuration` behaves more like a press-strength knob; tune for stability first, speed second\n- `Custom multicolor` is available for testing, but it is still not the recommended first-run path\n\n### Drawing Modes\n\n#### Mono Drawing\n\n- Dark pixels are drawn\n- Light pixels are left blank\n- Suitable for black-and-white images, outline art, and simple pixel assets\n\n#### Official Palette Drawing\n\n- Quantizes colors into the built-in `7 x 12` official palette\n- Currently supports `8 / 16 / 32 / 64 / 84` quantization levels\n- Starts from the game's default colors for the `9` palette slots\n\n#### Custom Multicolor (Testing)\n\n- Automatically quantizes the image into multiple colors, then writes them into the right-side `9` custom palette slots in batches\n- Currently works best on images with fewer colors and simpler structure\n- This path is still experimental, and its stability and tolerance are weaker than `mono drawing` and `official palette drawing`\n- For a first successful run, `mono drawing` or `official palette drawing` is still the safer recommendation\n\n### Requirements\n\n#### Hardware\n\n- A Mac or Windows computer\n- An `ESP32-WROOM-32 / ESP-32S` development board\n  Common labels such as `ESP32 DevKitC` or `NodeMCU-32S` compatible boards are usually fine; prefer versions with a built-in `USB` serial interface that can be flashed directly, and avoid `ESP32-C3 / ESP32-S3 / ESP32-C6` variants because they are BLE-only or not part of the current main supported path for this project\n- Nintendo Switch\n- A USB cable that supports data transfer\n\n#### Software\n\n- If you use the packaged desktop app, you do not need to preinstall `Node.js`, `npm`, or `PlatformIO`, but the first `PlatformIO` setup requires network access\n- If you use the repo-based fallback flow, prepare `Node.js 20+`, `npm 10+`, and `PlatformIO Core 6+`\n\n### Quick Start\n\n#### Desktop app one-click install and launch (recommended)\n\nThe preferred path is now the packaged desktop app:\n\n- `macOS`: install the `.dmg`, then launch `Friend Maker`\n- `Windows x64`: run the installer `.exe`, then launch `Friend Maker`\n\nFirst-use notes:\n\n- if the `Firmware Flash` page says `PlatformIO` is missing, click `Prepare PlatformIO`\n- this step needs network access; if the app says `Python` is missing, allow it to download an app-local Python runtime for Friend Maker\n- the first firmware flash may take around `5 minutes`, so please wait patiently\n- do not install under a non-English path\n- if you are on `Windows` and no serial port appears for the `ESP32`, prepare `PlatformIO` first, then try `Install CP210x Driver` before `Install CH340/CH341 Driver`\n- `Windows ARM64` is not in the current support scope; its market share is only about `1%`, we do not have hardware to validate it, and PRs are welcome if you want to add support\n\n#### Repo-based fallback flow\n\nPath notes:\n\n- Replace `/path/to/friendmaker` with your own local project directory\n- Replace `<your-serial-port>` with your own serial device, such as `/dev/cu.usbserial-0001` on macOS or `COM3` on Windows\n- If `pio` is already in your shell `PATH`, you can use `pio ...` directly\n- Otherwise, use the full PlatformIO path\n- macOS path: `~/.platformio/penv/bin/pio`\n- Windows path: `%USERPROFILE%\\\\.platformio\\\\penv\\\\Scripts\\\\pio.exe`\n\n#### Repo-based one-click launch on macOS\n\nYou can now start the app in either of these ways:\n\n- double-click [`Start Friend Maker.command`](./Start%20Friend%20Maker.command)\n- or run:\n\n```bash\ncd /path/to/friendmaker\n./Start\\ Friend\\ Maker.command\n```\n\nThis launcher will:\n\n- detect `Node.js`, `npm`, `Python 3`, and `PlatformIO`\n- try to install missing software automatically\n- install project dependencies automatically when needed\n- start the local web UI\n- open `http://127.0.0.1:4307` automatically\n\nNotes:\n\n- if `Homebrew` is missing, the launcher will ask whether it should be installed\n- the Terminal may ask for your password during first-time software installation\n- keep the Terminal window open while using the app\n\n#### Repo-based one-click install on Windows\n\nYou can now install the project in either of these ways:\n\n- double-click [`Install Friend Maker.cmd`](./Install%20Friend%20Maker.cmd)\n- or run in `CMD` / `PowerShell`:\n\n```bat\ncd C:\\path\\to\\friendmaker\nInstall Friend Maker.cmd\n```\n\nThis installer will:\n\n- detect `Node.js`, `npm`, `Python 3`, and `PlatformIO`\n- try to install missing software automatically when `winget` is available\n- run `npm install`\n- run `npm run check`\n- show Chinese error messages if installation fails\n\nNotes:\n\n- if `winget` is missing, install or update `App Installer` first\n- if the automatic install fails, switch to the original manual flow in [Windows Setup Guide](docs/setup-windows.md)\n- this script handles installation only; on Windows you still start the web UI manually with `npm run ui:dev`\n\n#### 1. Install dependencies\n\n```bash\ncd /path/to/friendmaker\nnpm install\n```\n\n#### 2. Type check\n\n```bash\nnpm run check\n```\n\n#### 3. Flash firmware\n\n```bash\ncd /path/to/friendmaker/firmware/esp32\n~/.platformio/penv/bin/pio run -e esp32dev_wireless -t upload\n```\n\nWindows example:\n\n```powershell\ncd C:\\path\\to\\friendmaker\\firmware\\esp32\n$env:USERPROFILE\\.platformio\\penv\\Scripts\\pio.exe run -e esp32dev_wireless -t upload --upload-port COM3\n```\n\n#### 4. Start the web UI\n\n```bash\ncd /path/to/friendmaker\nnpm run ui:dev\n```\n\nOpen:\n\n```text\nhttp://127.0.0.1:4307\n```\n\n### Before Drawing\n\nThese are the three most commonly missed prerequisites:\n\n1. The brush size in Switch must match the current selection in the web UI\n2. Before drawing starts, the brush and cursor must be positioned at the canvas center\n3. If you use official palette drawing, keep the game's default colors for the `9` palette slots\n\nAdditional constraint:\n\n- The current drawing and recovery flow supports only one restart assumption: after re-entering the drawing page, resume from the canvas center\n- Do not model the drawing canvas as a bounded plane that can reliably reset by pushing into the top-left corner; the in-game canvas does not currently expose a dependable top-left reset semantic\n- If any document mentions \"top-left reset\" or a \"top-left starting point\", that applies only to palette or color-editor navigation models, not to drawing-cursor recovery on the canvas\n\n### Automatic Background Removal\n\nIf your source image is one of the following:\n\n- a white-background PNG\n- a light-gray-background PNG\n- a checkerboard fake-transparency image\n\nyou can enable `automatic background removal` in the preview module of the script generation page.\n\nNotes:\n\n- Real transparent PNG files do not need this option\n- `Automatic background removal` uses edge-background detection, not AI cutout\n- It is usually sufficient for characters, props, and pixel-art materials\n\n### Web UI Pages\n\n#### Script Studio\n\n- Import images\n- Choose brush size\n- Choose mono drawing, official palette drawing, or custom multicolor (testing)\n- Choose template, scale, and position, then review the preview\n- Generate previews and command scripts\n- Review official palette previews, statistics, and execution status\n- Start drawing with one click\n- Preserve local recovery jobs after pause, stop, or failure; if the app closes while paused, the next launch will still surface that job as recoverable\n- Resume from a saved recovery point, or discard recovery records you no longer need\n- If the stop flow stays stuck for too long, the page exposes an emergency action to forcibly clear the stuck execution state\n\n#### Firmware Flash\n\n- Enumerate serial ports\n- The current main supported firmware targets are `ESP32-WROOM-32 / ESP-32S` and `NodeMCU-32S`\n- Call the local PlatformIO installation\n- Build and flash the ESP32 firmware\n- Install `CP210x` or `CH340/CH341` serial drivers directly from the page on Windows\n- Return flash results and scrollable logs\n\n#### Controller Test\n\n- Connect the controller\n- Reset Controller Bluetooth\n- If the controller does not connect, click `Reset Controller Bluetooth` first and then `Connect the controller`\n- If it still does not connect, reflash the firmware and try again\n- Test buttons, D-pad, and stick movement step by step, with selectable stick step sizes\n- Test standalone actions such as `Home`, `Capture`, `LS`, `RS`, and `L+R` pairing\n- Inspect HID connection status\n- Disconnect the serial session manually when needed\n- Send custom test commands and review scrollable logs\n\n### Repository Layout\n\n```text\napps/desktop/src\n  app/               Draw plan generation\n  cli/               CLI argument parsing\n  config/            Default config and official palette tables\n  image/             Image resizing, quantization, preview, and background removal\n  path/              Path generation and lightweight optimization\n  protocol/          Command objects and serialization\n  serial/            Serial enumeration and ACK sending\n  web/               Local web workspace\n\nfirmware/esp32\n  src/               ESP32 firmware and Bluetooth controller implementation\n\nprofiles/            Example profiles\nexamples/            Demo images and sample commands\ndocs/                Development and trial documents\ndocs/media/          README images and videos\n```\n\n### Documentation\n\n- [docs/user-trial-guide.md](docs/user-trial-guide.md): startup and usage guide for trial users\n- [docs/development-manual.md](docs/development-manual.md): current development manual and known rules\n- [docs/setup-mac.md](docs/setup-mac.md)\n- [docs/arrival-checklist.md](docs/arrival-checklist.md)\n- [docs/wiring.md](docs/wiring.md)\n\n### Current Limitations\n\n- The Switch connection and drawing workflow still depend on fixed scenario assumptions\n- `Custom multicolor` is still in the testing stage, and its overall stability is clearly weaker than `mono drawing` and `official palette drawing`\n- Automatic custom-color tuning and long-run fault tolerance are not stable yet, so `official palette drawing` is still the recommended color path\n- The highest priority is still input stability, not drawing speed\n\n### Development Status\n\nThe repository already provides a usable end-to-end loop:\n\n```text\nFlash firmware in the web UI\n  -> test controller connection\n  -> import image\n  -> pixelization / quantization / background removal\n  -> generate command script\n  -> serial ACK sender\n  -> ESP32 protocol parser\n  -> Bluetooth Classic Switch controller output\n  -> in-game drawing\n```\n\n### License\n\nThis repository is licensed under **GPL-3.0-or-later**.  \nSee [LICENSE](LICENSE) for the full license text.\n\nThe Switch Bluetooth compatibility implementation under `firmware/esp32` borrows from and adapts ideas and code paths from [UARTSwitchCon](https://github.com/nullstalgia/UARTSwitchCon), so this repository follows GPL to keep the license compatible.\n\n### Attribution\n\n- Original author source: Xiaohongshu creator `惜羽拓麻镇`\n- If you publicly repost, mirror, or share this project, it is recommended that you credit `惜羽拓麻镇`\n- It is also recommended that you include the original publication link\n","summary":"Friend Maker is a macOS/Windows desktop tool that turns PNG, JPG or SVG images into scripted drawing commands and streams them via an ESP32‑powered Switch‑Pro‑Controller emulator, allowing pixel art to be painted automatically in titles such as “Tomodachi Life.”  It offers multiple brush sizes, monochrome, official‑palette and experimental multi‑color modes, as well as image preview, layout cropping and background removal.  The bundled workflow includes firmware flashing, Bluetooth controller testing, speed‑tuning and script playback, all accessible from a single interface.  Ideal for Switch players who want a quick, repeatable way to create pixel‑perfect drawings on in‑game canvases.","description":"Friend Maker is a macOS/Windows toolkit for turning images into pixel grids and ESP32 controller scripts, enabling automatic drawing on Nintendo Switch in Tomodachi Life and related workflows.","stars":208,"language":"TypeScript"},{"owner":"noonghunna","repo":"club-3090","url":"https://github.com/noonghunna/club-3090","readme":"# club-3090\n\n**Recipes for serving LLMs locally on RTX 3090s.** Multi-engine (vLLM, llama.cpp, SGLang), multi-model, model-agnostic by design.\n\nIf you have one or two RTX 3090s and want to run modern LLMs at home, in a homelab, or as a dev backend — this repo collects the working configs, patches, and benchmarks.\n\n---\n\n## TL;DR — what this is\n\n- **Two complementary routes** — pick by what your workload breaks on:\n  - 🏎 **vLLM dual** = max throughput. Up to **127 TPS code** (DFlash) or **4 concurrent streams @ 262K** (turbo). Full feature stack (vision · tools · MTP · streaming).\n  - 🛡 **llama.cpp single** = max robustness. Full **262K context** on one 3090. Stress-tested clean: no prefill cliffs, 25K-token tool returns work, 90K needle ladder passes. Slower (~21 TPS) but doesn't crash on real-world tool-using agents.\n- **Validated docker compose configs** for both routes — drop-in OpenAI-compatible API on `localhost:8020`\n- **Multi-engine**: vLLM (full features), llama.cpp (max ctx + robustness), SGLang (currently blocked, watch list)\n- **Model-agnostic**: today ships configs for Qwen3.6-27B; structure scales as we add models\n\n**First time here?** → [Models](#supported-models) — pick yours.\n**Already running, want to compare engines?** → [docs/engines/](docs/engines/)\n**Hardware questions** (does this work on a 4090, do I need NVLink)? → [docs/HARDWARE.md](docs/HARDWARE.md)\n**Don't know what TPS / KV / MTP mean?** → [docs/GLOSSARY.md](docs/GLOSSARY.md)\n\n---\n\n## Pick your path\n\n| You have | Start here |\n|---|---|\n| **1× RTX 3090** | [`docs/SINGLE_CARD.md`](docs/SINGLE_CARD.md) — workload → config → quick start |\n| **2× RTX 3090** (PCIe / no NVLink) | [`docs/DUAL_CARD.md`](docs/DUAL_CARD.md) — workload → config → quick start |\n| **3+ GPUs** (any class — 4× 3090, 8× A6000, mixed) | [`docs/MULTI_CARD.md`](docs/MULTI_CARD.md) — TP scaling math, derivation from `dual.yml`, valid TP values |\n| Considering self-host vs cloud APIs | [`docs/COMPARISONS.md`](docs/COMPARISONS.md) — cost crossover + when each wins |\n\nEach hardware page lists every supported model with the working composes for that card count, plus measured TPS and per-workload pitfalls. Model-specific deep dives (quants, Genesis patches, engine internals) live under [`models/<name>/`](models/).\n\n---\n\n## Supported models\n\n| Model | Status | Card counts | Engines | Highlights |\n|---|---|---|---|---|\n| **[Qwen3.6-27B](models/qwen3.6-27b/)** | Production-ready ⭐ | 1× / 2× 3090 | vLLM ✅ · llama.cpp ✅ · SGLang ❌ blocked | Vision · tools · MTP n=3 · up to 262K ctx · vLLM dual = 89/127 TPS · llama.cpp single = full 262K, no prefill cliffs |\n\nMore models coming. The repo structure scales — when we add Qwen3.5-27B / GLM-4.6 / etc., they go under `models/<name>/` with the same internal pattern.\n\n---\n\n## Measured TPS at a glance\n\n![Qwen3.6-27B TPS by config](docs/img/performance.png)\n\nBench protocol: 3 warm + 5 measured runs of the canonical narrative + code prompts. Substrate: vLLM nightly `0.20.1rc1.dev16+g7a1eb8ac2` + Genesis v7.69 dev tip (commit `2db18df`), with local backports `patch_inputs_embeds_optional.py` (vllm#35975) and `patch_tolist_cudagraph.py`. llama.cpp mainline `0d0764dfd`, RTX 3090 sm_86 PCIe-only at 230 W. Per-config details + run-by-run numbers + VRAM + AL/accept rates: [models/qwen3.6-27b/CHANGELOG.md](models/qwen3.6-27b/CHANGELOG.md) (per-model history) and [scripts/bench.sh](scripts/bench.sh) (canonical bench).\n\n---\n\n## Quick start (for the current model — Qwen3.6-27B on vLLM)\n\n```bash\n# 1. Clone the repo\ngit clone https://github.com/noonghunna/club-3090.git\ncd club-3090\n\n# 2. Download + SHA-verify the model (~20 GB; clones Genesis patches too)\nbash scripts/setup.sh qwen3.6-27b\n\n# 3. Pick a config + boot it (interactive wizard — asks engine / cards / workload)\nbash scripts/launch.sh\n#    Or skip the wizard:\n#      bash scripts/launch.sh --variant vllm/default      # single-card chat (recommended)\n#      bash scripts/launch.sh --variant vllm/dual         # dual-card 262K + vision\n#      bash scripts/launch.sh --variant llamacpp/default  # single-card 262K, no cliffs\n#    See all variants:\n#      bash scripts/switch.sh --list\n\n# 4. Sanity test (launcher already printed this curl)\ncurl -sf http://localhost:8020/v1/chat/completions \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"model\":\"qwen3.6-27b-autoround\",\"messages\":[{\"role\":\"user\",\"content\":\"Capital of France?\"}],\"max_tokens\":200}'\n\n# 5. Run the canonical benchmark\nbash scripts/bench.sh\n\n# 6. Switch later without re-clicking through the wizard:\nbash scripts/switch.sh vllm/long-vision   # for example\n\n# 7. Keep your install up-to-date as the stack moves (Genesis pin bumps,\n#    new compose variants, vendored patch updates):\nbash scripts/update.sh\n#   - bails if your tree has uncommitted edits (commit or stash first)\n#   - git pull --ff-only origin master, then re-runs setup.sh\n#   - tells you to restart your container via switch.sh after — so you can\n#     A/B old-vs-new before bringing the new variant up\n#   launch.sh + switch.sh also soft-warn at boot when your checkout is\n#   behind origin/master, so you'll usually find out before you ask.\n```\n\n`launch.sh` calls `switch.sh` (down old, up new) and then `verify-full.sh` so you know it's serving cleanly before you point a client at it. See [`scripts/`](scripts/) for all helpers.\n\nFor client snippets — Python (`openai` SDK + raw `requests`), TypeScript / Node, plus connection settings for Open WebUI, Cline, Cursor, and other OpenAI-compat clients — see [`docs/EXAMPLES.md`](docs/EXAMPLES.md). Common questions (\"can I use a 4090?\", \"why MTP not EAGLE?\", \"why not Ollama?\", \"what's a prefill cliff?\") have answers in [`docs/FAQ.md`](docs/FAQ.md). Trying to decide self-host vs cloud APIs vs other local options? [`docs/COMPARISONS.md`](docs/COMPARISONS.md). Want to contribute numbers, bug repros, or new variants? [`CONTRIBUTING.md`](CONTRIBUTING.md). Tracking the upstream issues and PRs we depend on or have filed? [`docs/UPSTREAM.md`](docs/UPSTREAM.md).\n\n**Hit an issue or want to share bench numbers?** Run `bash scripts/report.sh > my-rig.md` (add `--full` for the canonical \"everything\" pass: rig + verify-full + verify-stress 7/7 + SOAK_MODE=continuous + bench, ~35 min) and paste into the [bug](https://github.com/noonghunna/club-3090/issues/new?template=bug-report.yml) or [bench](https://github.com/noonghunna/club-3090/issues/new?template=numbers-from-your-rig.yml) issue template — single command captures everything we'd otherwise ask for individually.\n\nFor llama.cpp (different engine, different recipe — useful for max context on single-card):\n```bash\ncd models/qwen3.6-27b/llama-cpp && cat README.md\n```\n\n---\n\n## Repo layout\n\n```\nclub-3090/\n├── README.md                              this file — start here\n├── CHANGELOG.md                           cross-cutting changes (engine pin bumps, script updates)\n├── LICENSE                                Apache-2.0\n├── docs/\n│   ├── ARCHITECTURE.md                    how this stack thinks about LLM serving on 24 GB\n│   ├── HARDWARE.md                        Ampere SM 8.6+, NVLink note, 24 GB ceilings\n│   ├── GLOSSARY.md                        plain-language definitions (TPS / KV / MTP / TP / etc.)\n│   ├── UPSTREAM.md                        every upstream issue / PR we depend on or have filed\n│   ├── CLIFFS.md                          full synopsis of the prefill cliffs (root causes + fix landscape)\n│   ├── img/                               chart sources (performance.svg, vram-budget-{single,dual,combined}.svg) + PNG exports\n│   └── engines/                           cross-model engine comparison + per-engine deep dives\n│       ├── README.md                      decision tree, pros/cons matrix\n│       ├── VLLM.md                        vLLM general docs + tuning\n│       ├── LLAMA_CPP.md                   llama.cpp general docs + 262K recipe\n│       └── SGLANG.md                      blocked status + watch list\n├── models/\n│   └── qwen3.6-27b/                       all Qwen3.6-27B-specific stuff\n│       ├── README.md                      model overview + variants + recommendations\n│       ├── INTERNALS.md                   model-specific bugs (DeltaNet cliffs, Genesis patches, MTP head, Marlin pad)\n│       └── INTERNALS.md                   engineering rationale (Genesis, Marlin pad, DFlash)\n│       ├── CHANGELOG.md                   model-specific dated history\n│       ├── vllm/\n│       │   ├── README.md                  \"vLLM recipes for Qwen3.6-27B\"\n│       │   ├── compose/                   docker-compose files (single-card + dual-card variants)\n│       │   └── patches/                   tolist_cudagraph + Marlin pad README + Genesis pointer\n│       ├── llama-cpp/\n│       │   ├── README.md                  \"llama.cpp recipes for Qwen3.6-27B\"\n│       │   └── recipes/                   single-card 65K + 262K-max-ctx + dual-card recipes\n│       └── sglang/\n│           └── README.md                  blocked status — what would unblock it on this model\n├── scripts/                               shared, model-aware\n│   ├── setup.sh                           bash setup.sh <model> → preflight + downloads + verifies + Genesis\n│   ├── launch.sh                          interactive wizard: cards → workload → boots compose + verifies\n│   ├── switch.sh                          stateless variant switcher (bring down old, up new)\n│   ├── update.sh                          one-shot upgrade: git pull + re-pin Genesis + re-vendor patches\n│   ├── health.sh                          runtime health probe (KV %, MTP AL, recent TPS, errors)\n│   ├── preflight.sh                       sourceable lib: docker / GPU / disk / repo-drift / Genesis-pin checks\n│   ├── verify.sh                          quick smoke test (engine-aware via env)\n│   ├── verify-full.sh                     fast functional test (8 checks, ~1-2 min)\n│   ├── verify-stress.sh                   boundary-case stress test (longctx ladder + tool prefill OOM, ~5-10 min)\n│   ├── soak-test.sh                       runtime VRAM accretion / multi-turn agent traffic (~10-30 min, opt-in)\n│   ├── bench.sh                           canonical TPS bench\n│   └── report.sh                          paste-ready triage report (run before filing a bug or sharing bench numbers)\n└── tools/\n    └── charts/                            re-generate docs/img/* SVGs and PNG exports (matplotlib)\n        ├── gen-perf.py                    perf bar charts (combined + single + dual)\n        └── gen-vram.py                    VRAM stacked bars (combined + single + dual)\n```\n\n---\n\n## What you'll need\n\n| For any model on this stack | Notes |\n|---|---|\n| 1× or 2× NVIDIA RTX 3090 (24 GB each) | Larger Ampere/Ada cards (4090, A6000) work; smaller cards (12 GB) don't fit 27B-class models. |\n| Linux (Ubuntu 22.04+ tested) | macOS/Windows: vLLM is Linux + CUDA only. Llama.cpp works on macOS/Windows but recipes assume Linux paths. |\n| Docker + NVIDIA Container Toolkit | For vLLM. llama.cpp works without Docker. |\n| NVIDIA driver 580.x+ | For CUDA 13 runtime in vLLM nightly. |\n| ~30 GB free disk | Per model. More for multiple models. |\n\nSee [docs/HARDWARE.md](docs/HARDWARE.md) for hardware-specific notes (PCIe vs NVLink, power draw, etc.).\n\n---\n\n## How this is structured\n\n**Engines and hardware are general** — the docs in `docs/` apply across models. vLLM works the same way regardless of whether you're serving Qwen, GLM, or Llama; the engine docs cover that once.\n\n**Models are specific** — under `models/<name>/`, you find that model's quants, quirks, recommended configs, and engine-specific recipes. Adding a new model means adding a new subdir with the same internal pattern.\n\n**Scripts are shared but model-aware** — `bash scripts/setup.sh qwen3.6-27b` downloads the right model + clones the right patches. When we add another model, you'd run `bash scripts/setup.sh glm-4.6` and the same script handles it.\n\nThis separation keeps the stack maintainable as it grows. We don't want a model-specific README at the top; we want the top to be \"stack docs\" and the model details under their dedicated subdirs.\n\n---\n\n## Migration history\n\n- **2026-04-28** — Repo created. Consolidates and supersedes:\n  - [`noonghunna/qwen36-27b-single-3090`](https://github.com/noonghunna/qwen36-27b-single-3090) (single-card recipe; archived for issue history)\n  - [`noonghunna/qwen36-dual-3090`](https://github.com/noonghunna/qwen36-dual-3090) (dual-card recipe; archived for issue history)\n\n  Old repos remain readable for existing issue threads, external links (Medium articles, Reddit posts), and historical context. New issues should be filed here.\n\nSee [CHANGELOG.md](CHANGELOG.md) for the merged dated history.\n\n---\n\n## Credits\n\nThe stack stands on a lot of shoulders:\n\n- **Qwen team** ([@Alibaba_Qwen](https://huggingface.co/Qwen)) — for the base models and the MTP head architecture\n- **[Lorbus](https://huggingface.co/Lorbus/Qwen3.6-27B-int4-AutoRound)** — for the AutoRound INT4 quant with preserved BF16 `mtp.fc` (the model this whole stack runs on)\n- **[Sandermage](https://github.com/Sandermage/genesis-vllm-patches)** — Genesis patch tree for TurboQuant + hybrid models on consumer Ampere; root-causing #40880 and shipping the v7.14 fix\n- **[vibhavagarwal5](https://github.com/vllm-project/vllm/pull/38479)** — TurboQuant landing PR + tracking issue #40069\n- **[vLLM project](https://github.com/vllm-project/vllm)** — the engine + active maintenance\n- **[llama.cpp](https://github.com/ggerganov/llama.cpp)** — the alternative engine path\n- **[Luce z-lab](https://github.com/luce-spec)** — DFlash N=5 draft model for Qwen3.6-27B\n- **Intel AutoRound** — quantization framework\n- **All cross-rig contributors** — [@ampersandru](https://github.com/ampersandru), [@walmis](https://github.com/walmis), [@3dluvr](https://github.com/3dluvr), and the Reddit / X local-LLM community for benchmark data and bug reports.\n\n---\n\n## License\n\nApache 2.0. Do what you want with it. If you get better numbers on your rig — open an issue. If you add a new model with working configs — open a PR.\n","summary":"Club‑3090 provides ready‑to‑run Docker Compose configurations for deploying large language models on one or more RTX 3090 GPUs, supporting multiple engines (vLLM, llama.cpp, SGLang) and a variety of models such as Qwen 3.6‑27B. It offers two paths—high‑throughput vLLM dual setups or high‑context llama.cpp single setups—complete with benchmarks, configuration wizards, and documentation for scaling across 3+ GPUs. The project is aimed at researchers, hobbyists, and dev‑ops in homelabs who want to run modern LLMs locally with minimal friction and reliable performance.","description":"Community recipes for serving LLMs on RTX 3090. Multi-engine (vLLM, llama.cpp, SGLang) and model-agnostic. Currently shipping Qwen3.6-27B configs for 1× and 2× cards.","stars":482,"language":"Python"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
