---------------|\n| 17 | [Performance — Every Millisecond and Token Counts](./book/ch17-performance.md) | Startup, context window, prompt cache, rendering, search |\n| 18 | [Epilogue — What We Learned](./book/ch18-epilogue.md) | The 5 architectural bets, what transfers, where agents are heading |\n\n---\n\n## The 10 Patterns That Make It Work\n\nIf you read nothing else:\n\n1. **AsyncGenerator as agent loop** — yields Messages, typed Terminal return, natural backpressure and cancellation\n2. **Speculative tool execution** — start read-only tools during model streaming, before the response completes\n3. **Concurrent-safe batching** — partition tools by safety, run reads in parallel, serialize writes\n4. **Fork agents for cache sharing** — parallel children share byte-identical prompt prefixes, saving ~95% input tokens\n5. **4-layer context compression** — snip, microcompact, collapse, autocompact — each lighter than the next\n6. **File-based memory with LLM recall** — Sonnet side-query selects relevant memories, not keyword matching\n7. **Two-phase skill loading** — frontmatter only at startup, full content on invocation\n8. **Sticky latches for cache stability** — once a beta header is sent, never unset mid-session\n9. **Slot reservation** — 8K default output cap, escalate to 64K on hit (saves context in 99% of requests)\n10. **Hook config snapshot** — freeze at startup to prevent runtime injection attacks\n\n---\n\n## How This Book Was Made\n\nThe source was extracted from npm source maps. 36 AI agents analyzed nearly two thousand TypeScript files in four phases:\n\n1. **Exploration**: 6 parallel agents read every file in the source tree\n2. **Analysis**: 12 agents wrote 494KB of raw technical documentation\n3. **Writing**: 15 agents rewrote everything from scratch as narrative chapters\n4. **Review & Revision**: 3 editorial reviewers produced 900 lines of feedback; 3 revision agents applied all fixes\n\nThe entire process — from source extraction to final revised book — took approximately 6 hours.\n\n---\n\n## Disclaimer\n\n**This repository does not contain any source code from Claude Code.** All code blocks are original pseudocode using different variable names, written to illustrate architectural patterns. No proprietary prompt text, internal constants, or exact function implementations are included. This project exists purely for educational purposes — to help engineers understand the design patterns behind production AI coding agents.\n\nThe \"NO'REILLY\" cover is a parody/meme for illustrative purposes only. This project has no affiliation with O'Reilly Media. The crab is just a crab.\n\nThis is an independent analysis. Claude Code is a product of Anthropic. This book is not affiliated with, endorsed by, or sponsored by Anthropic.\n","summary":"The \"Claude Code from Source\" repository is an educational book that dissects the architecture, patterns, and internal design of Anthropic’s Claude Code AI agent using original pseudocode rather than proprietary code. It spans 18 chapters in seven sections, covering foundations, the core agent loop, multi‑agent orchestration, persistence, and extensibility, with narrative flow, deep‑dive technical sections, and actionable “Apply This” takeaways. Diagrams are written in Mermaid and render directly on GitHub, and the text is organized to benefit senior engineers building agentic systems, technical leaders evaluating architectures, and anyone curious about production AI tooling.","description":"Architecture, patterns & internals of Anthropic's AI coding agent — reverse-engineered from source maps","stars":1863,"language":"TypeScript"},{"owner":"QwenLM","repo":"FlashQLA","url":"https://github.com/QwenLM/FlashQLA","readme":"<p align=\"center\">\n    <img src=\"https://qianwen-res.oss-cn-beijing.aliyuncs.com/flashqla/flashqla.png\" width=\"1000\"/>\n<p>\n\n<p align=\"center\">|&nbsp&nbsp 📜 <a href=\"https://qwen.ai/blog?id=flashqla\">Blog</a>&nbsp&nbsp |</p>\n\n## Introduction\n\nFlashQLA is a high-performance linear attention kernel library built on [TileLang](https://github.com/tile-ai/tilelang). FlashQLA applies **reasonable operator fusion and performance optimization** to the forward and backward passes of GDN Chunked Prefill, achieving **2-3× forward speedup** and **2× backward speedup** over the FLA Triton kernel across multiple scenarios on NVIDIA Hopper. The efficiency gains are particularly pronounced in pretraining scenarios and edge-side agentic inference.\n\nKey features:\n\n1.**Gate-driven automatic intra-card context parallelism**. By exploiting the exponential decay property of the GDN gate, FlashQLA automatically enables intra-card CP under TP, long-sequence, and small-head-count settings, improving GPU SM utilization.\n\n2.**Hardware-friendly algebraic reformulation**. We reformulate the forward and backward flows of GDN Chunked Prefill to a certain extent, effectively reducing Tensor Core, CUDA Core, and SFU overhead without sacrificing numerical precision.\n\n3.**TileLang fused warp-specialized kernels**. Rather than following the step-by-step decomposition into independent kernels, nor fusing the entire computation flow into a single kernel, we take CP and backward requirements into account, use TileLang to build several key fused kernels, and manually implement warpgroup specialization to overlap data movement, Tensor Core computation, and CUDA Core computation.\n\n## Requirements\n\n- SM90 or above\n- CUDA 12.8 or above\n- PyTorch 2.8 or above\n\n## Installation\n\n```bash\ngit clone https://github.com/QwenLM/FlashQLA.git\ncd FlashQLA\npip install -v .\n```\n\n## Usage\n\n### High-level API\n\n```python\nimport torch\nfrom flash_qla import chunk_gated_delta_rule\n\no, final_state = chunk_gated_delta_rule(\n    q=q,          # [B, T, H_q, K]\n    k=k,          # [B, T, H_q, K]\n    v=v,          # [B, T, H_v, V]\n    g=g,          # [B, T, H_v]\n    beta=beta,    # [B, T, H_v]\n    scale=scale,\n    initial_state=initial_state,   # optional, [B, H_v, K, V]\n    output_final_state=True,\n    cu_seqlens=cu_seqlens,         # optional, for variable-length sequences\n)\n```\n\n### Low-level API\n\nFor separate forward and backward calls:\n\n```python\nfrom flash_qla import chunk_gated_delta_rule_fwd, chunk_gated_delta_rule_bwd\n\n# Forward\ng, A, o, h, final_state = chunk_gated_delta_rule_fwd(\n    q, k, v, g, beta, scale=scale, initial_state=h0, cu_seqlens=cu_seqlens\n)\n\n# Backward\ndq, dk, dv, db, dg, dh0 = chunk_gated_delta_rule_bwd(\n    q, k, v, g, beta, A, do, dht=dht, scale=scale, initial_state=h0, cu_seqlens=cu_seqlens\n)\n```\n\n## Tests\n\n```bash\n# require flash linear attention for comparison\npip install flash_linear_attention==0.5.0\n\ncd tests\npython test_gdr.py --set develop\npython test_gdr.py --set varlen --num-heads 32\npython test_gdr.py --set profile --num-heads 32\npython test_gdr.py --set product --ref-dtype float32 --num-heads 32\n```\n\n## Benchmark\n\nWe benchmarked FlashQLA against the FLA Triton and FlashInfer baseline (FLA 0.5.0, Triton 3.5.1, FlashInfer 0.6.9, TileLang 0.1.8) on the head configurations used by the Qwen3.5 / Qwen3.6 family h_k,v \\in {64, 48, 32, 24, 16, 8}, corresponding to TP1 through TP8.\n\n<p align=\"center\">\n    <img src=\"https://qianwen-res.oss-cn-beijing.aliyuncs.com/flashqla/fwd_bwd_latency_comparison.png\" width=\"1000\"/>\n<p>\n\nSpecifically, the forward (FWD) benchmarks measure single-kernel latency for different models and TP settings under varying batch lengths, while the backward (BWD) benchmarks examine the relationship between total token count within a batch and latency during a single update step.\n\nMore detail in [benchmark_results_H200.txt](./benchmark/benchmark_results_H200.txt).\n\n```bash\n# require flash linear attention and flashinfer for comparison\npip install flash_linear_attention==0.5.0 flashinfer-python==0.6.9\n\ncd benchmark\npython bench_gated_delta_rule.py\n```\n\n## Acknowledge\n\nFlashQLA is inspired by [Flash Linear Attention](https://github.com/fla-org/flash-linear-attention), [TileLang](https://github.com/tile-ai/tilelang) and [FlashInfer](https://github.com/flashinfer-ai/flashinfer/) projects.\n\n## License\n\nFlashQLA is released under the MIT License.\n\n## Citation\n\n```bibtex\n@misc{flashqla2025,\n    title={FlashQLA: Flash Qwen Linear Attention},\n    author={Zhang, Chengruidong and Lin, Xi and Jiang, Huiqiang and Wang, Zekun and Li, Xiao and Cao, Yizhong and Zhuang, Bohan and Men, Rui and Zhang, Jianwei and Zheng, Bo and Lin, Junyang and Liu, Dayiheng and Zhou, Jingren},\n    year={2026},\n    publisher={GitHub},\n    howpublished={\\url{https://github.com/QwenLM/FlashQLA}},\n}\n```\n","summary":"FlashQLA is a high‑performance linear‑attention kernel library built with TileLang that accelerates the forward and backward passes of GDN‑chunked prefill, delivering 2–3× faster inference and 2× faster training compared to existing Triton kernels on NVIDIA Hopper GPUs. It automatically enables intra‑card context parallelism, rewrites core computations to reduce CUDA Core and Tensor Core overhead, and fuses warp‑specialized kernels to overlap data movement with computation. The library targets users working on large‑scale language models—particularly those that use gated delta rule attention—who need efficient, reproducible kernels for training and edge‑side inference on modern GPUs.","description":"high-performance linear attention kernel library built on TileLang","stars":421,"language":"Python"},{"owner":"t8y2","repo":"dbx","url":"https://github.com/t8y2/dbx","readme":"<div align=\"center\">\n  <img src=\"docs/logo.png\" width=\"80\" />\n  <h1>DBX</h1>\n  <p>Open-source, lightweight, cross-platform database management tool.</p>\n  <p>\n    <a href=\"https://github.com/t8y2/dbx/releases\"><img src=\"https://img.shields.io/github/v/release/t8y2/dbx?label=version\" /></a>\n    <a href=\"https://github.com/t8y2/dbx/releases\"><img src=\"https://img.shields.io/github/downloads/t8y2/dbx/total\" /></a>\n    <a href=\"https://github.com/t8y2/dbx/blob/main/LICENSE\"><img src=\"https://img.shields.io/github/license/t8y2/dbx\" /></a>\n    <a href=\"https://github.com/t8y2/dbx/graphs/contributors\"><img src=\"https://img.shields.io/github/contributors/t8y2/dbx\" /></a>\n    <a href=\"https://linux.do\"><img src=\"https://img.shields.io/badge/community-LINUX%20DO-blue\" /></a>\n    <a href=\"#community\"><img src=\"https://img.shields.io/badge/WeChat%20%7C%20QQ-Join%20Group-brightgreen\" /></a>\n  </p>\n  <p>\n    <img src=\"https://img.shields.io/badge/MySQL-4479A1?logo=mysql&logoColor=white\" />\n    <img src=\"https://img.shields.io/badge/PostgreSQL-4169E1?logo=postgresql&logoColor=white\" />\n    <img src=\"https://img.shields.io/badge/SQLite-003B57?logo=sqlite&logoColor=white\" />\n    <img src=\"https://img.shields.io/badge/Redis-DC382D?logo=redis&logoColor=white\" />\n    <img src=\"https://img.shields.io/badge/MongoDB-47A248?logo=mongodb&logoColor=white\" />\n    <img src=\"https://img.shields.io/badge/DuckDB-FFF000?logo=duckdb&logoColor=black\" />\n    <img src=\"https://img.shields.io/badge/ClickHouse-FFCC01?logo=clickhouse&logoColor=black\" />\n    <img src=\"https://img.shields.io/badge/SQL%20Server-CC2927?logo=microsoftsqlserver&logoColor=white\" />\n    <img src=\"https://img.shields.io/badge/Oracle-F80000?logo=oracle&logoColor=white\" />\n    <img src=\"https://img.shields.io/badge/MariaDB-003545?logo=mariadb&logoColor=white\" />\n    <img src=\"https://img.shields.io/badge/TiDB-DC150B?logo=tidb&logoColor=white\" />\n  </p>\n  <p>\n    English | <a href=\"README.zh-CN.md\">简体中文</a>\n  </p>\n</div>\n\n## Features\n\n- **Multi-database** — MySQL, PostgreSQL, SQLite, Redis, MongoDB, DuckDB, ClickHouse, SQL Server, Oracle, MariaDB, TiDB, OceanBase, openGauss, GaussDB, KingBase, Vastbase, GoldenDB\n- **Schema browser** — Databases, schemas, tables, columns, indexes, foreign keys, triggers, with sidebar search & pin\n- **Query editor** — CodeMirror 6 with syntax highlighting, SQL autocomplete (tables & columns), Cmd+Enter execution, selected SQL execution, SQL formatting\n- **AI SQL assistant** — Natural language to SQL, explain, optimize, fix errors (Claude / OpenAI)\n- **Data grid** — Virtual-scrolled table with inline editing, sorting, search, pagination, column resize, row numbers, zebra stripes\n- **Export** — CSV, JSON, Markdown\n- **File preview** — Drag & drop Parquet, CSV, JSON files to preview data instantly (powered by DuckDB)\n- **Redis browser** — Key pattern search, value viewer for all data types (String, Hash, List, Set, ZSet, Stream)\n- **MongoDB browser** — Document CRUD with pagination, direct URL connection (Atlas, replica sets)\n- **Query history** — Persistent history with search, restore, one-click copy\n- **Safety** — Confirmation dialog for DROP / DELETE / TRUNCATE / ALTER\n- **Auto-reconnect** — Transparent retry on connection loss\n- **SSH tunnel** — Key and password authentication\n- **Connection colors** — Color-coded connections for visual identification\n- **Auto-update** — Built-in update checker with release notifications\n- **Dark mode** — Native title bar theme sync\n- **i18n** — English & 简体中文\n- **Tiny** — ~15 MB installer (no bundled Chromium)\n\n## AI Agent Integration (MCP)\n\nDBX provides an [MCP server](mcp/) that lets AI coding agents query your databases using connections already configured in DBX.\n\n```bash\nnpx @dbx-app/mcp-server\n```\n\nAdd to your `.mcp.json`:\n\n```json\n{\n  \"mcpServers\": {\n    \"dbx\": { \"command\": \"npx\", \"args\": [\"-y\", \"@dbx-app/mcp-server\"] }\n  }\n}\n```\n\nWorks with Claude Code, Cursor, Windsurf, and any MCP-compatible agent. Supports listing connections, browsing tables, executing SQL, and opening tables directly in DBX's UI.\n\nSee the [MCP server README](mcp/README.md) for details.\n\n## Screenshot\n\n<div align=\"center\">\n  <img src=\"docs/screenshot.png\" width=\"800\" />\n  <p>\n    <img src=\"docs/screenshot-connections.jpg\" width=\"395\" />\n    <img src=\"docs/screenshot-ai.jpg\" width=\"395\" />\n  </p>\n</div>\n\n## Install\n\nDownload the latest release from the [Releases](https://github.com/t8y2/dbx/releases) page.\n\n**Homebrew (macOS):**\n\n```bash\nbrew install --cask t8y2/tap/dbx\n```\n\n**Scoop (Windows):**\n\n```bash\nscoop bucket add dbx https://github.com/t8y2/scoop-bucket\nscoop install dbx\n```\n\n### macOS Note\n\nDBX is not signed with an Apple Developer certificate. On first launch, macOS will block the app. To fix this:\n\n```bash\nxattr -cr /Applications/DBX.app\n```\n\nOr: **System Settings → Privacy & Security → Open Anyway**.\n\n## Getting Started\n\n### Prerequisites\n\n- [Node.js](https://nodejs.org/) >= 18\n- [pnpm](https://pnpm.io/)\n- [Rust](https://www.rust-lang.org/tools/install) >= 1.77\n\n### Development\n\n```bash\npnpm install\npnpm tauri dev\n```\n\n### Build\n\n```bash\npnpm tauri build\n```\n\nThe installer will be in `src-tauri/target/release/bundle/`.\n\n## Tech Stack\n\n| Layer     | Technology                                                                                                                                                                                                       |\n| --------- | ---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- |\n| Framework | [Tauri 2](https://tauri.app/)                                                                                                                                                                                    |\n| Frontend  | [Vue 3](https://vuejs.org/) + TypeScript                                                                                                                                                                         |\n| UI        | [shadcn-vue](https://www.shadcn-vue.com/) + Tailwind CSS                                                                                                                                                         |\n| Editor    | [CodeMirror 6](https://codemirror.net/)                                                                                                                                                                          |\n| Backend   | Rust + [sqlx](https://github.com/launchbadge/sqlx) / [tiberius](https://github.com/prisma/tiberius) / [redis-rs](https://github.com/redis-rs/redis-rs) / [mongodb](https://github.com/mongodb/mongo-rust-driver) |\n\n## Community\n\n[![LINUX DO](https://img.shields.io/badge/LINUX%20DO-Community-blue)](https://linux.do)\n\n|                     WeChat Group                      |                     QQ Group                      |\n| :---------------------------------------------: | :-----------------------------------------: |\n| <img src=\"docs/wechat-group.jpg\" width=\"200\" /> | <img src=\"docs/qq-group.jpg\" width=\"200\" /> |\n\n## Contributors\n\n<a href=\"https://github.com/t8y2/dbx/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=t8y2/dbx&v=2\" />\n</a>\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=t8y2%2Fdbx&type=date&legend=top-left\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=t8y2/dbx&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=t8y2/dbx&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=t8y2/dbx&type=date&legend=top-left\" />\n </picture>\n</a>\n\n## License\n\n[MIT](LICENSE)\n","summary":"DBX is a lightweight, cross‑platform database management tool that supports an extensive list of data stores such as MySQL, PostgreSQL, SQLite, Redis, MongoDB, DuckDB, ClickHouse, SQL Server, Oracle, MariaDB, TiDB, and more. It offers a feature‑rich interface that includes a schema browser, code‑editor with autocomplete and formatting, AI‑powered SQL assistance (Claude/OpenAI), a virtual‑scrolled data grid with inline editing, export options, and dedicated browsers for Redis and MongoDB. The application also provides conveniences like auto‑reconnect, SSH tunneling, connection color coding, dark mode, and a built‑in update checker, while keeping the installer minimal at roughly 15 MB. DBX is ideal for developers, database administrators, and data analysts who need a small yet powerful tool to manage multiple database types from a single, fast UI.","description":"15MB，lightweight, cross-platform database client. Supports MySQL, PostgreSQL, SQLite, Redis, MongoDB, DuckDB, ClickHouse, SQL Server and more.","stars":824,"language":"Vue"},{"owner":"Tommy-yw","repo":"RunbookHermes","url":"https://github.com/Tommy-yw/RunbookHermes","readme":"# RunbookHermes\n\n**Hermes-native AIOps Agent for payment incident response, evidence-driven root-cause analysis, approval-gated remediation, and runbook learning.**\n\nRunbookHermes is built by adapting the official **Hermes Agent** runtime into a production-oriented incident-response system. It keeps Hermes Agent's strengths—runtime loop, provider routing, tool system, memory, context engine, skills, gateway, and safety boundaries—and specializes them for AIOps workflows such as payment-system failures, observability evidence collection, approval, checkpoint, rollback, recovery verification, and runbook knowledge accumulation.\n\n> RunbookHermes is not a separate toy dashboard beside Hermes Agent. It is a Hermes-native vertical extension: Hermes provides the agent foundation; RunbookHermes adds the incident-response domain layer.\n\n---\n\n## Product Screenshots\n\nThe screenshots below show the current RunbookHermes Web Console. Put these images under `docs/assets/` and keep the file names consistent with the Markdown paths.\n\n### AIOps Console Overview\n\n![AIOps Console Overview](docs/assets/overview.png)\n\nThe overview page shows the high-level AIOps control plane: incident count, pending approvals, generated skills, critical services, recommended operation flow, current capability boundaries, and a live monitoring preview.\n\n### Realtime Monitoring System\n\n![Realtime Monitoring System](docs/assets/monitoring-overview.png)\n\nThe monitoring page provides a multi-dimensional service health view for `payment-service`, `coupon-service`, and `order-service`, including HTTP status signals, QPS, p95 latency, service topology, backend mode, and deployment state.\n\n![Monitoring Logs and Trace Signals](docs/assets/monitoring-signals.png)\n\nThe lower section of the monitoring page shows log signals and trace signals. This is where RunbookHermes connects observability data to incident diagnosis instead of relying only on model guesses.\n\n### Incident Command Center\n\n![Incident Command Center](docs/assets/incidents.png)\n\nThe incident list page normalizes incidents created from Web, Alertmanager, Feishu, WeCom, or API entry points. It shows service, status, severity, root cause, creation time, and quick incident creation actions.\n\n### Incident Detail: Evidence and Executive Summary\n\n![Incident Evidence](docs/assets/incident-evidence.png)\n\nThe incident detail page displays evidence cards from metrics, logs, and traces, plus an executive summary with root cause, recommended action, evidence IDs, confidence, and approval status.\n\n### Incident Detail: Root Cause and Model-Assisted Summary\n\n![Incident Root Cause](docs/assets/incident-root-cause.png)\n\nThe root-cause tab separates deterministic evidence from optional model-assisted explanation. The model summary is only enabled when a model provider is configured.\n\n### Incident Detail: Actions, Approvals, and Checkpoints\n\n![Incident Actions](docs/assets/incident-actions.png)\n\nRisky actions are not executed blindly. RunbookHermes places write or destructive actions behind approval, checkpoint, dry-run, controlled execution, and recovery verification.\n\n### Incident Detail: Timeline\n\n![Incident Timeline](docs/assets/incident-timeline.png)\n\nThe timeline records the full incident lifecycle, including incident creation, evidence collection, hypothesis generation, action planning, checkpoint creation, approval request, approval decision, skill generation, and execution result.\n\n### Incident Detail: Generated Runbook Skill\n\n![Generated Runbook Skill](docs/assets/incident-skill.png)\n\nAfter an incident is processed, RunbookHermes can turn the operational experience into a reusable runbook skill. This is how incident handling becomes accumulated operational knowledge rather than a one-off response.\n\n### Approval Center\n\n![Approval Center](docs/assets/approval-center.png)\n\nThe approval center is the human-in-the-loop safety gate. Operators can review the action, risk level, checkpoint, and payload before approving or rejecting execution.\n\n### Digests and Skills\n\n![Digests and Skills](docs/assets/digests-skills.png)\n\nThe digest page summarizes recent incidents, high-frequency faults, and generated runbook skills, making RunbookHermes useful for both incident response and operational review.\n\n### Integration Readiness and Interface Status\n\n![Settings and Interface Status](docs/assets/settings-interface-status.png)\n\nThe settings page shows whether model, observability, execution, Feishu, WeCom, and other production integration interfaces are configured. It also documents the environment variables needed to connect real systems.\n\n---\n\n## Why RunbookHermes\n\nMost AI Agent projects stop at chat, retrieval, or simple workflow automation. Real incident response requires much more:\n\n* reliable evidence collection from monitoring, logs, traces, and deployments;\n* context compression so models reason over evidence instead of raw log noise;\n* memory that remembers useful operational experience without stuffing every history item into the prompt;\n* tools that are governed by schemas, allowlists, and safety policies;\n* approval and checkpoint before risky production actions;\n* recovery verification after remediation;\n* runbook skill generation so successful operations become reusable knowledge.\n\nRunbookHermes was created to turn Hermes Agent into this kind of incident-response agent.\n\n---\n\n## What RunbookHermes Inherits from Hermes Agent\n\nRunbookHermes is valuable because it is not built from scratch as a simple rule engine. It is based on Hermes Agent's architecture and adapts those capabilities into the AIOps domain.\n\n| Hermes Agent capability   | RunbookHermes adaptation                                                                                                         |\n| ------------------------- | -------------------------------------------------------------------------------------------------------------------------------- |\n| Agent runtime / loop      | Used as the core agent foundation for the `runbook-hermes` profile.                                                              |\n| Provider / model routing  | Keeps Hermes-style model provider flexibility and adds OpenAI-compatible model-summary integration for incident analysis.        |\n| Tool system               | Adds incident-response tools for Prometheus, Loki, Jaeger/Trace, deploy history, approval, rollback, and recovery verification.  |\n| Memory provider           | Adds `IncidentMemory` for service profiles, incident summaries, team preferences, and skill index.                               |\n| Context engine            | Adds `EvidenceStack`, an evidence-centric context engine for alert, evidence, hypotheses, actions, and final answer compression. |\n| Skills                    | Adds runbook skills such as payment HTTP 503 triage and common incident triage.                                                  |\n| Gateway architecture      | Adds Alertmanager, Feishu, WeCom, and Web/API entry paths for incident workflows.                                                |\n| Safety boundary           | Adds approval, checkpoint, dry-run, controlled execution, and recovery verification around risky actions.                        |\n| Execution backend concept | Adds local reference rollback plus production executor interfaces such as `custom_http`, Kubernetes, and Argo CD style adapters. |\n\nThe goal is not to clone every Hermes feature into a dashboard. The goal is to preserve Hermes Agent's strengths and turn them into an operationally meaningful AIOps system.\n\n---\n\n## Core Capabilities\n\n### 1. Incident Intake\n\nRunbookHermes can receive incident signals through multiple entry points:\n\n* Web Console\n* Alertmanager webhook\n* Feishu event and card callback shells\n* WeCom event and card callback shells\n* Hermes profile entry via `runbook-hermes`\n* API endpoints for incident creation and replay\n\nAll entries are normalized into an incident command so different sources can flow into the same agent workflow.\n\n### 2. Evidence Collection\n\nRunbookHermes collects evidence from:\n\n* Prometheus metrics\n* Loki logs\n* Jaeger / Trace backend\n* deployment records\n* service-specific profiles\n* prior incident summaries\n* runbook skills\n\nThe current code includes real adapter interfaces and a local reference payment environment for validating the integration path.\n\n### 3. EvidenceStack Context Engine\n\nIncident response produces too much raw context: logs, metric samples, traces, tool outputs, deployment records, approvals, and timelines. RunbookHermes does not dump all of that into the prompt.\n\nInstead, `EvidenceStack` organizes context into:\n\n* alert summary\n* key evidence\n* hypotheses\n* action plan\n* final answer\n\nIt keeps evidence IDs and summaries, while avoiding large raw logs and trace payloads in the long-running reasoning context.\n\n### 4. IncidentMemory\n\nRunbookHermes uses a domain-specific memory provider for incident response.\n\nIt remembers stable operational knowledge such as:\n\n* service profiles;\n* team preferences;\n* incident summaries;\n* recurring root causes;\n* generated runbook skills;\n* approval requirements for risky actions.\n\nIt does not treat memory as “save the whole chat history.” It is designed to recall the right operational facts at the right time.\n\n### 5. Model-Assisted Analysis\n\nRunbookHermes supports model-assisted incident summaries through OpenAI-compatible endpoints.\n\nThe model is used to improve analysis readability and operator-facing summaries, while the evidence chain and safety gates remain explicit.\n\nTypical model-assisted outputs:\n\n* incident summary;\n* most likely root cause explanation;\n* evidence chain explanation;\n* operator-facing action summary;\n* postmortem draft material.\n\n### 6. Approval-Gated Remediation\n\nRunbookHermes treats destructive actions as controlled operations.\n\nHigh-risk actions such as rollback, restart, or configuration mutation should pass through:\n\n1. action policy check;\n2. approval request;\n3. checkpoint creation;\n4. dry-run;\n5. controlled execution;\n6. recovery verification;\n7. audit timeline.\n\nThis is one of the main reasons RunbookHermes is built on a Hermes-style safety boundary instead of being a simple script runner.\n\n### 7. Realtime Monitoring Dashboard\n\nThe Web Console includes a realtime monitoring view for:\n\n* service health matrix;\n* HTTP 503 / 504 / 429 signals;\n* p95 latency;\n* QPS;\n* log signals;\n* trace signals;\n* deployment status;\n* topology view;\n* backend status for Prometheus, Loki, Trace, Deploy, model, Feishu, WeCom, and controlled execution.\n\n---\n\n## Repository Layout\n\n```text\nrunbook-hermes/\n├── agent/                              # Hermes Agent upstream runtime code\n├── gateway/                            # Hermes upstream gateway foundation\n├── hermes_cli/                         # Hermes CLI components\n├── profiles/runbook-hermes/            # RunbookHermes Hermes profile and persona\n├── plugins/runbook-hermes/             # RunbookHermes tool plugin\n├── plugins/memory/incident_memory/     # IncidentMemory provider\n├── plugins/context_engine/evidence_stack/ # EvidenceStack context engine\n├── runbook_hermes/                     # RunbookHermes domain logic\n├── apps/runbook_api/                   # FastAPI Web/API service\n├── web/static/                         # Web Console pages\n├── integrations/observability/         # Prometheus / Loki / Trace / Deploy adapters\n├── toolservers/observability_mcp/      # Observability toolserver boundary\n├── skills/runbooks/                    # Runbook skills\n├── demo/payment_system/                # Local reference payment environment\n├── data/payment_demo/                  # Reference deploy state and runtime version\n├── data/runbook_mock/                  # Mock observability data for local fallback\n├── scripts/                            # Validation and smoke scripts\n└── docs/                               # Architecture, deployment, integration, operations docs\n```\n\n---\n\n## Deployment Modes\n\nRunbookHermes should be understood as one merged codebase:\n\n```text\nHermes Agent upstream source\n+ RunbookHermes AIOps extension layer\n= RunbookHermes\n```\n\nYou do **not** deploy “official Hermes Agent first” and then deploy RunbookHermes as a separate unrelated app. You deploy the merged RunbookHermes repository and run the entry points you need.\n\n### Mode A: Web/API Only\n\nUse this mode to inspect the Web Console, incident pages, approvals, monitoring UI, settings, and API surface.\n\n```bash\nset PYTHONPATH=.\npython -m uvicorn apps.runbook_api.app.main:app --host 127.0.0.1 --port 8000\n```\n\nOpen:\n\n```text\nhttp://127.0.0.1:8000/web/index.html\nhttp://127.0.0.1:8000/web/monitoring.html\nhttp://127.0.0.1:8000/web/incidents.html\nhttp://127.0.0.1:8000/web/approvals.html\nhttp://127.0.0.1:8000/docs\n```\n\n### Mode B: Local Reference Payment Environment\n\nUse this mode to validate the full incident-response path with a local payment system and observability stack.\n\n```bash\ncd demo/payment_system\ndocker compose up --build\n```\n\nThis starts a local reference environment containing:\n\n* payment-service\n* order-service\n* coupon-service\n* MySQL\n* Redis\n* Prometheus\n* Loki\n* Promtail\n* Jaeger\n* Grafana\n\nThen configure RunbookHermes to use real local observability adapters:\n\n```bash\nset OBS_BACKEND=real\nset DEPLOY_BACKEND=demo_file\nset TRACE_BACKEND=jaeger\nset TRACE_PROVIDER_KIND=jaeger\nset ROLLBACK_BACKEND_KIND=demo_file\nset RUNBOOK_CONTROLLED_EXECUTION_ENABLED=true\n\nset PROMETHEUS_BASE_URL=http://127.0.0.1:9090\nset LOKI_BASE_URL=http://127.0.0.1:3100\nset TRACE_BASE_URL=http://127.0.0.1:16686\n\nset DEMO_DEPLOY_STATE_FILE=data/payment_demo/deployments.json\nset DEMO_VERSION_FILE=data/payment_demo/runtime/payment-service-version.txt\n```\n\nStart the Web/API service:\n\n```bash\nset PYTHONPATH=.\npython -m uvicorn apps.runbook_api.app.main:app --host 127.0.0.1 --port 8000\n```\n\nGenerate reference traffic:\n\n```bash\ncd demo/payment_system\npython scripts/generate_traffic.py --fault PAYMENT_503_AFTER_DEPLOY --requests 60\npython scripts/generate_traffic.py --fault COUPON_504_TIMEOUT --requests 40\npython scripts/generate_traffic.py --fault ORDER_429_RATE_LIMIT --requests 40\n```\n\nThese scenarios are not the final goal. They are a local reference environment for proving how RunbookHermes connects to real systems.\n\n### Mode C: Production-Oriented Deployment\n\nIn a production-oriented deployment, RunbookHermes should run as a set of services:\n\n```text\n[Alertmanager]\n     |\n     v\n[RunbookHermes API / Gateway]\n     |\n     +--> Hermes Agent Runner with runbook-hermes profile\n     +--> Model Provider\n     +--> Prometheus\n     +--> Loki\n     +--> Jaeger / Tempo\n     +--> Deploy / Rollback System\n     +--> Feishu / WeCom\n     +--> Incident Store\n     +--> Redis / Queue\n     +--> Audit Log\n```\n\nRecommended production components:\n\n* `runbookhermes-api`: FastAPI Web/API and webhook service;\n* `runbookhermes-agent`: Hermes runner using `runbook-hermes` profile;\n* `incident-store`: SQLite / MySQL / PostgreSQL, replacing local JSON store;\n* `redis`: queue / cache / approval state support;\n* `model-provider`: OpenAI-compatible or internal model endpoint;\n* `observability`: Prometheus, Loki, Jaeger / Tempo;\n* `messaging`: Feishu / WeCom callbacks;\n* `executor`: controlled remediation adapter such as custom HTTP, Kubernetes, or Argo CD.\n\n---\n\n## Where Do I Chat with the Agent?\n\nRunbookHermes has different interaction surfaces.\n\n### 1. Hermes CLI / Agent Profile\n\nFor direct agent interaction:\n\n```bash\nhermes --profile runbook-hermes\n```\n\nUse this when you want the Hermes-native conversation loop.\n\nExample prompt:\n\n```text\npayment-service HTTP 503 is rising after release. Please collect evidence first, then explain the most likely root cause and propose a safe action plan.\n```\n\n### 2. Web Console\n\nThe Web Console is not primarily a chat UI. It is the operator control plane:\n\n* incident list;\n* realtime monitoring;\n* evidence cards;\n* RCA results;\n* action plans;\n* approvals;\n* checkpoints;\n* recovery verification;\n* generated skills;\n* model-assisted summaries.\n\n### 3. Feishu / WeCom\n\nFeishu and WeCom adapters are intended for production messaging integration:\n\n* create incident from message or alert;\n* show RCA card;\n* approve or reject risky action;\n* link back to Web Console.\n\n### 4. Alertmanager / API\n\nAlertmanager and API entry points are designed for system-to-agent incident intake.\n\n---\n\n## Model Provider Setup\n\nRunbookHermes can use an OpenAI-compatible endpoint for model-assisted summaries.\n\nExample with OpenRouter or any compatible model provider:\n\n```bash\nset RUNBOOK_MODEL_ENABLED=true\nset RUNBOOK_MODEL_BASE_URL=https://openrouter.ai/api/v1\nset RUNBOOK_MODEL_API_KEY=your_api_key\nset RUNBOOK_MODEL_NAME=your_model_name\n```\n\nModel output is used for readable incident summaries and operator-facing explanations. Evidence collection, approval boundaries, and remediation policies remain explicit and inspectable.\n\n---\n\n## Observability Integration\n\nConfigure real observability backends:\n\n```bash\nset OBS_BACKEND=real\nset PROMETHEUS_BASE_URL=http://prometheus.example.com\nset LOKI_BASE_URL=http://loki.example.com\nset TRACE_BACKEND=jaeger\nset TRACE_PROVIDER_KIND=jaeger\nset TRACE_BASE_URL=http://jaeger.example.com\n```\n\nRunbookHermes uses these adapters:\n\n* `integrations/observability/prometheus_backend.py`\n* `integrations/observability/loki_backend.py`\n* `integrations/observability/trace_backend.py`\n* `integrations/observability/deploy_backend.py`\n\n---\n\n## Feishu / WeCom Integration\n\nRunbookHermes includes gateway shells for Feishu and WeCom.\n\nFeishu environment variables:\n\n```bash\nset FEISHU_APP_ID=\nset FEISHU_APP_SECRET=\nset FEISHU_VERIFICATION_TOKEN=\nset FEISHU_ENCRYPT_KEY=\nset FEISHU_CALLBACK_BASE_URL=\nset FEISHU_BOT_WEBHOOK_URL=\nset FEISHU_BOT_SECRET=\n```\n\nWeCom environment variables:\n\n```bash\nset WECOM_CORP_ID=\nset WECOM_AGENT_ID=\nset WECOM_SECRET=\nset WECOM_TOKEN=\nset WECOM_ENCODING_AES_KEY=\nset WECOM_CALLBACK_BASE_URL=\n```\n\nProduction use requires public callback routing, signature verification, encryption handling, permission setup, and card callback validation.\n\n---\n\n## Controlled Remediation\n\nRunbookHermes is designed around safe production execution, not blind automation.\n\nSupported remediation boundary:\n\n```text\naction policy\n→ approval\n→ checkpoint\n→ dry-run\n→ controlled execution\n→ recovery verification\n→ audit timeline\n```\n\nLocal reference execution is available through the payment reference environment. Production execution should be connected through a controlled executor:\n\n```bash\nset ACTION_EXECUTION_BACKEND=custom_http\nset ACTION_EXECUTION_API_BASE_URL=https://executor.example.com\nset ACTION_EXECUTION_API_TOKEN=your_token\nset ACTION_EXECUTION_TIMEOUT_SECONDS=5\n```\n\nOther possible executor types:\n\n* Kubernetes controlled API\n* Argo CD\n* Argo Rollouts\n* internal release platform\n* custom HTTP remediation gateway\n\n---\n\n## Validation\n\nRun validation scripts from the repository root:\n\n```bash\nset PYTHONPATH=.\npython -S scripts/runbook_validate.py\npython -S scripts/runbook_gateway_smoke.py\npython -S scripts/runbook_no_legacy_imports.py\npython -S scripts/runbook_monitoring_validate.py\npython -S scripts/runbook_stage8_validate.py\n```\n\n---\n\n## Current Status\n\nRunbookHermes currently provides:\n\n* Hermes-native RunbookHermes profile;\n* incident-response tool plugin;\n* IncidentMemory provider;\n* EvidenceStack context engine;\n* Web Console and monitoring dashboard;\n* local reference payment environment;\n* Prometheus / Loki / Jaeger adapter layer;\n* Feishu / WeCom gateway shells;\n* model-assisted summary shell;\n* approval + checkpoint + controlled local rollback;\n* production-oriented executor interfaces.\n\nRecommended next hardening steps:\n\n* replace local JSON store with SQLite / MySQL / PostgreSQL;\n* add Memory Browser page;\n* add Skill Forge page;\n* complete Feishu / WeCom production callback verification;\n* connect a real model provider;\n* connect a real production deploy / rollback executor;\n* add Kubernetes / Docker Compose production deployment manifests;\n* add RBAC and audit persistence.\n\n---\n\n## Roadmap\n\nSee [ROADMAP.md](ROADMAP.md).\n\nHigh-level roadmap:\n\n* v0.1: Hermes-native incident-response foundation\n* v0.2: stronger memory, skill, and monitoring UI\n* v0.3: production observability integrations\n* v0.4: Feishu / WeCom production messaging workflow\n* v0.5: controlled Kubernetes / Argo remediation reference\n* v1.0: production reference architecture\n\n---\n\n## Acknowledgements\n\nRunbookHermes is built on top of **Hermes Agent** by Nous Research.\n\nThis project preserves the Hermes Agent foundation and adds an AIOps / incident-response layer for payment-system troubleshooting, observability integration, approval-gated remediation, and runbook learning.\n\nThe upstream Hermes README and release notes are kept under `docs/upstream/` for attribution and reference.\n\n---\n\n## License\n\nThis repository preserves the upstream Hermes Agent license. See [LICENSE](LICENSE).\n\nRunbookHermes additions follow the same repository license unless otherwise stated.\n\n","summary":"RunbookHermes extends Open AI’s Hermes agent into a production‑ready AIOps platform that automates payment‑service incident response. It stitches real‑time observability data—metrics, logs, traces—into evidence‑driven root‑cause analysis, then orchestrates remediation steps that must pass approval gates, checkpoints, and rollback checks before execution. The system also captures every incident as a reusable runbook skill, letting teams continually learn and formalize operational knowledge. DevOps and incident‑response teams building reliable payment, order, or coupon microservices can use it to reduce manual triage, safeguard destructive changes, and build a growing library of verified runbooks.","description":"Hermes-native AIOps agent for evidence-driven incident response, approval-gated remediation, and runbook learning.","stars":488,"language":"Python"},{"owner":"techjarves","repo":"OpenClaude-Portable","url":"https://github.com/techjarves/OpenClaude-Portable","readme":"# OpenClaude — Portable AI Coding Agent\n\n> **Run a full-featured AI coding agent from a USB drive or any folder — no installation required.**\n> Plug in. Launch. Code. Take it anywhere.\n\n[![License: MIT](https://img.shields.io/badge/License-MIT-blue.svg)](LICENSE)\n[![Platform](https://img.shields.io/badge/platform-Windows%20%7C%20Linux%20%7C%20macOS-lightgrey.svg)]()\n\n\n**🎥 Watch the Setup & Demo Video:** [https://youtu.be/9Dh3kKWFFjg](https://youtu.be/9Dh3kKWFFjg)\n\n[![OpenClaude Portable Demo](https://img.youtube.com/vi/9Dh3kKWFFjg/maxresdefault.jpg)](https://youtu.be/9Dh3kKWFFjg)\n\n---\n\n## What Is This?\n\n**OpenClaude Multi-Platform** is a fully portable AI coding agent powered by the open-source [OpenClaude](https://github.com/gitlawb/openclaude) engine. It bundles a self-contained Node.js runtime, a smart system-prompt proxy for local models, and a web-based dashboard — all configurable from a single `START.bat` (Windows) or `start.sh` (Linux/macOS).\n\nEverything runs strictly inside the project folder. No files are written to the host machine.\n\n---\n\n## Key Features\n\n| Feature | Details |\n|---|---|\n| **7 AI Providers** | NVIDIA NIM · DeepSeek · OpenRouter · Google Gemini · Anthropic Claude · OpenAI · Ollama (offline) |\n| **Zero Footprint** | All data, keys, and logs stay inside `data/` — nothing touches the host system |\n| **Local Speed Proxy** | Trims system prompts by up to 90% before sending to Ollama, dramatically improving response time on CPU-only hardware |\n| **Auto-Update Cache** | Checks for engine updates once per day (skips the network call on repeat launches) |\n| **Session Resume** | Resume any interrupted session with `RESUME.bat <session-id>` |\n| **Web Dashboard** | ChatGPT-style browser UI with agent mode, tool cards, and thinking visualisation |\n| **Limitless Mode** | Optional full-autonomy mode — the agent runs without asking for approval |\n| **Cross-Platform** | Shared `data/` folder works across Windows, Linux, and macOS |\n\n---\n\n## Quick Start\n\n### Windows\n```\n.\\START.bat\n```\nOn first run it automatically downloads Node.js (~25 MB) and the OpenClaude engine (~5 MB), then walks you through provider selection. Every subsequent launch skips setup and goes straight to the menu.\n\n### Linux / macOS\n```bash\nchmod +x start.sh\n./start.sh\n```\n\n> **First-time setup requires internet.** After that, only API calls need a connection (or none at all if you use Ollama offline mode).\n\n---\n\n## Project Structure\n\n```\nOpenClaude-Multi-Platform/\n│\n├── START.bat                  Windows entry point — handles everything\n├── start.sh                   Linux/macOS entry point\n├── RESUME.bat                 Resume a previous session by ID (Windows)\n│\n├── data/                      All persistent data (shared across platforms)\n│   ├── ai_settings.env        Active provider, model, and API key\n│   ├── openclaude/            Session history and agent memory\n│   ├── ollama/                Local Ollama binary and model storage\n│   └── proxy.log              Speed proxy activity log (silent background)\n│\n├── engine/                    Node.js runtime + OpenClaude npm package\n│   ├── node-win-x64/          Bundled Node.js (Windows)\n│   └── node_modules/\n│       └── @gitlawb/openclaude/\n│\n├── tools/                     Helper scripts\n│   ├── local-proxy.js         System-prompt trimming proxy for local models\n│   ├── setup_local_models.ps1 Ollama model downloader (Windows)\n│   ├── setup_local_models.sh  Ollama model downloader (Linux/macOS)\n│   ├── Change_Provider.bat    Switch AI provider or API key (Windows)\n│   ├── change_provider.sh     Switch AI provider or API key (Linux/macOS)\n│   ├── Open_Dashboard.bat     Launch web dashboard (Windows)\n│   ├── open_dashboard.sh      Launch web dashboard (Linux/macOS)\n│   └── Setup_Local_Models.bat Wrapper launcher for local model setup\n│\n└── dashboard/                 Web dashboard UI\n    ├── server.mjs             Dashboard Node.js server\n    └── index.html             Chat interface\n```\n\n---\n\n## Main Menu Options\n\nWhen you run `START.bat`, you are presented with:\n\n```\n1) Launch AI       — Normal Mode      (asks before writing files or running commands)\n2) Limitless Mode  — Auto-executes    (fully autonomous, no approval prompts)\n3) Open Dashboard  — Web UI at http://localhost:3000\n4) Change Provider — Switch model or API key\n5) Setup Offline   — Download local Ollama models\n```\n\nThe menu auto-selects **Normal Mode** after 10 seconds if no key is pressed.\n\n\n\n\n## Supported AI Providers\n\n| Provider | Cost | API Key |\n|---|---|---|\n| **NVIDIA NIM** | Free tier (1 000 credits/month) | [build.nvidia.com](https://build.nvidia.com) |\n| **DeepSeek** | Paid API | [platform.deepseek.com](https://platform.deepseek.com) |\n| **OpenRouter** | Free + paid models | [openrouter.ai](https://openrouter.ai) |\n| **Google Gemini** | Free tier available | [aistudio.google.com](https://aistudio.google.com) |\n| **Anthropic Claude** | Paid | [console.anthropic.com](https://console.anthropic.com) |\n| **OpenAI** | Paid | [platform.openai.com](https://platform.openai.com) |\n| **Ollama** | Free, fully offline | [ollama.com](https://ollama.com) |\n\n---\n\n## Local Model Performance (Ollama)\n\nRunning a local model on CPU or USB 2.0 is inherently slower than a cloud API. The built-in **speed proxy** (`tools/local-proxy.js`) intercepts every request and trims the OpenClaude system prompt from ~10 000 tokens down to ~300 tokens before it reaches Ollama.\n\n**Typical result:** first-token latency drops from 60–120 s to 5–20 s on CPU-only hardware.\n\nProxy activity is logged silently to `data/proxy.log` — it never writes to the terminal.\n\n**Recommended models for CPU inference:**\n\n| Model | Size | Speed |\n|---|---|---|\n| `gemma3:1b` | ~800 MB | Fastest |\n| `qwen2.5:1.5b` | ~1 GB | Fast |\n| `phi3:mini` | ~2.3 GB | Moderate |\n\n> For best performance, copy `data/ollama/` to your local SSD if USB 2.0 read speeds are the bottleneck.\n\n---\n\n## Security & Privacy\n\n- **Zero Footprint** — `XDG_CONFIG_HOME`, `XDG_DATA_HOME`, and `CLAUDE_CONFIG_DIR` are all redirected to `data/`, keeping the host system clean.\n- **No Telemetry** — Nothing is sent anywhere except your chosen AI provider.\n- **API Key Safety** — Keys are stored only in `data/ai_settings.env` on your drive.\n- **Approval Mode** — In Normal Mode the agent asks before any file write or shell command.\n\n---\n\n## System Requirements\n\n| Platform | Requirement |\n|---|---|\n| **Windows** | Windows 10 or later — Node.js is bundled, nothing else needed |\n| **Linux** | `curl` (pre-installed on most distros) |\n| **macOS** | `curl` (pre-installed) |\n\n**Disk space:** ~150 MB for Node.js + engine. Local Ollama models require additional space (800 MB–8 GB depending on model).\n\n---\n\n## Troubleshooting\n\n| Symptom | Fix |\n|---|---|\n| `Node.js not found` | Run `START.bat` first — it downloads Node automatically |\n| `EADDRINUSE: port 11435` | The speed proxy from a previous session is still running. Restart `START.bat` — it kills it automatically |\n| `openclaude: dist/cli.mjs not found` | The engine install was interrupted. Pull the latest launcher and run `START.bat` again; it will repair incomplete installs automatically |\n| `npm error could not determine executable to run` | Pull the latest launcher. The app now runs the verified bundled OpenClaude binary instead of falling back to `npx` |\n| `Claude Code on Windows requires git-bash` | Pull the latest launcher and run `START.bat` again; it installs/repairs bundled GitPortable and adds Git Bash to the launch environment |\n| `'D_ARGS' is not recognized` | Old version of START.bat with nested if-blocks. Pull the latest version |\n| Ollama response is very slow | Use a smaller model (`gemma3:1b`), or copy models to a local SSD |\n| API key rejected | Verify your key at the provider's website; re-run option 4 to update it |\n| Port 3000 already in use | The dashboard is already running — open `http://localhost:3000` directly |\n| `openclaude` not found in PowerShell | Use `.\\RESUME.bat <session-id>` instead of calling `openclaude` directly |\n\n---\n\n## License\n\nMIT — use it, fork it, ship it.\n","summary":"OpenClaude Portable is a lightweight, all‑in‑one AI coding agent that runs entirely from a folder or USB stick without any installation on the host PC. It bundles a node runtime, the Open Claude engine and a web‑based chat UI, supporting seven cloud providers and an offline Ollama model while keeping all keys, logs and session data inside its own data folder. The tool trims system prompts for local inference, offers session resumption, auto‑updates, and a “limitless” no‑approval mode, making it quick to deploy and use. Developers, data scientists, and hobbyists who need on‑demand, cross‑platform AI coding support—especially those who prefer no‑trace or offline usage—will find it particularly valuable.","description":"Run Claude Code from a USB drive on any PC — no installation required.","stars":332,"language":"HTML"},{"owner":"laramint","repo":"laravel-brain","url":"https://github.com/laramint/laravel-brain","readme":"<p align=\"center\">\n  <img src=\"art/banner.png\" alt=\"Laravel Brain\" width=\"300px\"/>\n</p>\n\n<p align=\"center\">\n  <strong>Visualize your Laravel application's full request lifecycle as an interactive graph.</strong><br/>\n  Understand how routes, controllers, services, models, jobs, events, commands, and channels connect — in seconds.\n</p>\n\n<p align=\"center\">\n  <img src=\"https://img.shields.io/badge/Laravel-9%20%7C%2010%20%7C%2011%20%7C%2012%20%7C%2013-red?style=flat-square&logo=laravel\" alt=\"Laravel\"/>\n  <img src=\"https://img.shields.io/badge/PHP-8.0%2B-777BB4?style=flat-square&logo=php\" alt=\"PHP\"/>\n  <img src=\"https://img.shields.io/badge/license-MIT-green?style=flat-square\" alt=\"License\"/>\n  <img src=\"https://img.shields.io/badge/Sponsor-GitHub-EA4AAA?style=flat-square&logo=github-sponsors\" alt=\"Sponsor\"/>\n</p>\n\n---\n\n## What is LaraMint\\LaravelBrain?\n\nLaraMint\\LaravelBrain is a developer tool that analyzes your Laravel codebase and renders an interactive node graph of your application's architecture. It traces every route through its controller, services, repositories, models, jobs, events, Artisan commands, scheduled tasks, and broadcast channels — giving you a bird's-eye view of the entire application without reading a single line of code.\n\n## Features\n\n- **Full lifecycle tracing** — Follows every route from HTTP verb → controller → service → repository → model → events/jobs\n- **Artisan command discovery** — Maps class-based commands, closure commands from `routes/console.php`, and Kernel-registered commands\n- **Scheduler tracing** — Visualizes scheduled tasks (`command`, `job`, `call`) with their frequency\n- **Broadcast channel mapping** — Discovers class-based and closure channels from `routes/channels.php`\n- **DB query tracing** — Surfaces Eloquent and raw queries per method\n- **Fat-class detection** — Flags controllers and services with more than 300 lines or 10 methods\n- **Interactive graph** — Dark/light theme, accent-colored nodes, and interactive edges\n- **Per-route tabs** — Each route gets its own isolated subgraph tab\n- **Middleware mapping** — Shows which middleware guards each route\n- **Model relationships** — Displays `hasMany`, `belongsTo`, and other Eloquent relations\n- **Method flowcharts** — See internal flow as a step-by-step diagram with a large modal popup view\n- **Source viewer** — Read the actual source file inline or in a focused popup\n- **Export** — Export any graph as PNG or Mermaid diagram\n- **Multiple layouts** — Hierarchical (dagre), force-directed (cose-bilkent), breadth-first, circle, grid\n- **Watch mode** — Auto-rescans on PHP file changes\n- **Route stress test** — From a selected **route** node, run concurrent HTTP load against that endpoint (via [`laramint/laravel-stress`](https://github.com/LaraMint/laravel-stress)): configure request count, concurrency, headers, and body; see timing percentiles and throughput in the sidebar. While a run is active, the graph highlights the route and animates packets along the request path.\n\n## Requirements\n\n- PHP 8.0+\n- Laravel 9, 10, 11, 12, or 13\n- Composer\n\n## Installation\n\nInstall as a dev dependency (it's a development tool, not needed in production):\n\n```bash\ncomposer require --dev laramint/laravel-brain\n```\n\nLaravel will auto-discover the service provider. No manual registration needed.\n\n## Usage\n\n### Scan your project\n\n```bash\nphp artisan brain:scan\n```\n\nThis analyzes your entire codebase and writes the graph data to `storage/app/laravel-brain/`. When complete it prints the URL to open:\n\n```\n  LaraMint\\LaravelBrain — analyzing project...\n  Path: /your/project\n\n  Scanning routes, controllers, models and call chains...\n\n  Done! Open the viewer at: http://localhost:8000/_laravel-brain\n```\n\n### Watch mode\n\nRe-scan automatically whenever a PHP file changes:\n\n```bash\nphp artisan brain:scan --watch\nphp artisan brain:scan --watch --interval=5   # poll every 5 seconds (default: 3)\n```\n\n### Open the viewer\n\nNavigate to `/_laravel-brain` in your browser while your Laravel app is running (e.g. via `php artisan serve`).\n\nThe viewer is served entirely through your existing Laravel routes — no separate server process needed.\n\n## How It Works\n\n```\nphp artisan brain:scan\n        │\n        ├─ RouteAnalyzer      → scans all files in routes/**/*.php\n        ├─ MiddlewareAnalyzer → reads Kernel.php or bootstrap/app.php\n        ├─ ControllerAnalyzer → resolves controller classes + methods\n        ├─ MethodTracer       → deep-traces call chains (services, repos, models)\n        ├─ ModelAnalyzer      → extracts Eloquent relationships\n        ├─ QueryTracer        → surfaces DB queries per method\n        ├─ ConsoleAnalyzer    → discovers Artisan commands and scheduled tasks\n        ├─ ChannelAnalyzer    → discovers broadcast channels\n        └─ GraphBuilder       → assembles nodes + edges, flags fat classes\n                │\n                └─ Writes JSON → storage/app/laravel-brain/\n\nGET /_laravel-brain\n        │\n        └─ BrainController → serves the React SPA + graph JSON via Laravel routes\n```\n\n### Route discovery\n\nLaravelBrain recursively scans your entire `routes/` directory — not just `web.php` and `api.php`. Any PHP file under `routes/**` is analyzed, including versioned files like `routes/v1/users.php` or module-specific files like `routes/modules/admin.php`.\n\n### Call chain tracing\n\nFrom each controller action, the tracer follows:\n- Direct method calls to injected services/repositories\n- Static calls (`MyService::method()`)\n- Job dispatches (`dispatch(new SendEmail(...))`)\n- Event dispatches (`event(new OrderPlaced(...))`)\n\nThis produces the full edge list used to build the graph.\n\n## Graph Node Types\n\n| Node | Accent Color | Represents |\n|------|-------------|------------|\n| Route | Green | HTTP endpoint (`GET /users`) |\n| Middleware | Orange | Middleware applied to route |\n| Controller | Blue | Controller class |\n| Action | Light Blue | Controller method |\n| Service | Purple | Service or helper class |\n| Repository | Purple (subtype) | Repository class |\n| Model | Red | Eloquent model |\n| Event | Yellow | Laravel event |\n| Job | Slate | Queued job |\n| Command | Teal | Artisan command |\n| Schedule | Teal | Scheduled task entry |\n| Channel | Indigo | Broadcast channel |\n\n## Viewer Shortcuts\n\n| Action | How |\n|--------|-----|\n| Zoom | Scroll wheel |\n| Pan | Click + drag on canvas |\n| Inspect node | Click any node |\n| View source | Click a node → Source tab in sidebar |\n| Source Popup | Click ⤢ in source section to open focused view |\n| View flowchart | Click a class node → Flow tab |\n| Flowchart Popup | Click ⤢ in flow section to open large view |\n| Filter by type | Filter panel on the left |\n| Fit all nodes | Toolbar → Fit button |\n| Export PNG | Toolbar → PNG button |\n| Export Mermaid | Toolbar → Mermaid button |\n| Toggle theme | Toolbar → ☀️ / 🌙 button |\n| Stress test a route | Click a **route** node → open **Stress Test** in the sidebar → set options → **Run** |\n\n## Routes Registered\n\nThe package registers the following routes in your application (all under the `/_laravel-brain` prefix):\n\n```\nGET /_laravel-brain                 → Interactive graph viewer (SPA)\nGET /_laravel-brain/api/source      → Returns PHP source file content\nPOST /_laravel-brain/api/stress-test        → Starts a stress-test job (or returns sync result)\nGET  /_laravel-brain/api/stress-test/{id}  → Polls background job status/results\nGET /_laravel-brain/assets/*        → Serves frontend static assets\nGET /_laravel-brain/.graph-*.json   → Serves graph data written by the scan\n```\n\nStress testing uses [`laramint/laravel-stress`](https://github.com/LaraMint/laravel-stress), which is installed automatically as a dependency of this package. Allowed target hosts are enforced in `src/Http/Controllers/BrainController.php`.\n\n## Output Files\n\nAfter running `brain:scan`, the following files are written to `storage/app/laravel-brain/`:\n\n```\n.graph-manifest.json   — Tab manifest (list of all route tabs)\n.graph-all.json        — Full combined graph (all routes)\n.graph-{tab-id}.json   — Per-route subgraph (one per route)\n```\n\nThese files are regenerated on every scan and are safe to gitignore:\n\n```gitignore\nstorage/app/laravel-brain/\n```\n\n## Security\n\nThe `/_laravel-brain` routes are only registered in the `local` environment by default. Since it's a `require-dev` dependency, it will not be present in production builds (`composer install --no-dev`).\n\nIf you do install it in a non-production environment accessible over a network, consider protecting the routes with middleware.\n\n## Contributing\n\nPull requests are welcome. For major changes, please open an issue first to discuss what you'd like to change.\n\n```bash\ngit clone https://github.com/LaraMint/laravel-brain\ncd laravel-brain\ncomposer install\ncd frontend && npm install && npm run dev\n```\n\nTests:\n\n```bash\ncomposer test\n```\n\n## License\n\nMIT — see [LICENSE](LICENSE) for details.\n","summary":"LaraMint Laravel‑Brain visualizes a Laravel application’s entire request lifecycle as an interactive graph, automatically mapping routes, controllers, services, repositories, models, jobs, events, commands, scheduled tasks, broadcast channels, and middleware. It offers features such as lifecycle tracing, artisan command and scheduler discovery, db‑query surfacing, fat‑class detection, per‑route tabs, source viewing, exportable PNG/mermaid diagrams, multiple graph layouts, and a watch mode that rescans on code changes. The tool also integrates a route‑stress test that runs concurrent HTTP loads from a selected node, displaying performance metrics in real time. This makes it ideal for Laravel developers and teams seeking a quick, visual overview of their codebase, to identify complexity, uncover hidden dependencies, and optimize performance.","description":"Visualize your Laravel request lifecycle as an interactive graph","stars":189,"language":"PHP"},{"owner":"Dhravya","repo":"webpull","url":"https://github.com/Dhravya/webpull","readme":"# webpull\n\nPull any public docs site into local markdown files.\n\n```\n$ webpull https://docs.example.com\n\n  ⚡ webpull · 16 workers\n  docs.example.com → ./docs.example.com\n\n  ●●●·●●●●·●●●●●●●·\n  ├─ ✓ getting-started/installation.md\n  ├─ ✓ api/authentication.md\n  ├─ ✓ guides/deployment.md\n  █████████████░░░░░░░ 68% 102/150 · 6p/s · 17.2s\n```\n\n## Install\n\n```bash\nbun install -g webpull\n```\n\n## Usage\n\n```\nwebpull <url> [options]\n\nOptions:\n  -o, --out <dir>   Output directory (default: ./<hostname>)\n  -m, --max <n>     Max pages to pull (default: 500)\n```\n\n## Examples\n\n```bash\n# Pull React docs\nwebpull https://react.dev/reference\n\n# Custom output dir, limit to 100 pages\nwebpull https://docs.python.org -o ./python-docs -m 100\n```\n\n## How it works\n\n1. **Discovers pages** via sitemap.xml, nav link extraction, or link crawling\n2. **Fetches in parallel** using a worker pool sized to your CPU cores\n3. **Converts to markdown** using [Defuddle](https://github.com/nichochar/defuddle) for intelligent content extraction\n4. **Writes to disk** preserving the URL path structure with YAML frontmatter\n\nEach markdown file includes metadata:\n\n```yaml\n---\ntitle: \"Getting Started\"\nurl: \"https://docs.example.com/getting-started\"\n---\n```\n\n## Requirements\n\n- [Bun](https://bun.sh) runtime\n\n## License\n\nMIT\n","summary":"webpull is a lightweight CLI tool that downloads any public documentation website and converts every page into a local Markdown file, preserving the original URL hierarchy and embedding useful metadata. It discovers content through sitemaps, navigation links, or crawling, then fetches pages concurrently with a worker pool and converts them using Defuddle for accurate text extraction. Users can customize the output directory and limit the number of pages, and the resulting files include YAML front‑matter containing titles and source URLs. This makes it ideal for developers, documentation teams, or power users who need searchable, offline copies of online docs.","description":"instantly pull a website down as a clean directory locally","stars":175,"language":"TypeScript"},{"owner":"sean-brydon","repo":"devl.dev","url":"https://github.com/sean-brydon/devl.dev","readme":"# devl.dev\n<img width=\"1200\" height=\"630\" alt=\"og\" src=\"https://github.com/user-attachments/assets/35c5aa90-d18e-401b-be1e-9634fe38e488\" />\n\nA scratch pad for playing with UI ideas built on cossUI primitives and my personal designs over the last two years. The components here are not perfect, not complete. This is just my workspace and design pad of POC i have for app ideas or designs. \n\n## Layout\n\n```\n.\n├── apps/\n│   └── www         →  TanStack Start app — the whole product (port 4000)\n└── packages/\n    └── ui          →  coss-ui components (55), Tailwind v4 + Base UI\n```\n\nNo backend, no auth, no database, no marketing site. Just the showcase.\n\n## Scripts\n\n```bash\nnpm run dev          # start the scratchpad on :4000\nnpm run typecheck    # tsc -b across workspaces\nnpm run build        # build all workspaces\nnpm run lint         # lint all workspaces\nnpm run registry     # rebuild the design registry\nnpm run snapshot     # capture design snapshots\n```\n\n## How designs are organised\n\n- `apps/www/src/lib/designs.ts` — single source of truth for categories and the designs in each.\n- `apps/www/src/components/wireframe-icons.tsx` — mini SVG wireframes used as folder icons on the index.\n- `apps/www/src/pages/showcase/` — the showcased designs (one component per design).\n- `apps/www/src/pages/showcase/registry.tsx` — maps `(category, design-slug) → component`.\n\nA design lives at `/c/<category>/<design-slug>`.\n\n### Adding a new design\n\n1. Add the showcase component in `apps/www/src/pages/showcase/<my-design>.tsx`.\n2. Register it in `apps/www/src/pages/showcase/registry.tsx` under the right category.\n3. Add a `{ slug, title, blurb }` entry to that category in `apps/www/src/lib/designs.ts`.\n\n### Adding a new category\n\n1. Add the wireframe SVG to `wireframe-icons.tsx`.\n2. Add the category to `CATEGORIES` in `designs.ts` (and to the `CategorySlug` union).\n3. Optionally add a `SHOWCASES[<slug>]` entry in `registry.tsx`.\n","summary":"devl.dev is a personal workspace that lets the author prototype UI concepts using a custom coss‑UI component set built on Tailwind v4 and Base UI, all hosted in a TanStack Start app ran on port 4000. The project exposes a design registry that organizes reusable components by category, offers a showcase routing system that renders a single component per design, and ships with helper scripts for building, linting, type‑checking, and capturing design snapshots. While it contains no backend, auth, or database, it provides an isolated sandbox for quickly tweaking layouts or experimenting with new visual ideas. Front‑end developers, UI designers, or design‑system creators can use it to test patterns, iterate on mockups, and gather feedback prior to committing components to production.","description":null,"stars":157,"language":"TypeScript"},{"owner":"crafter-station","repo":"petdex","url":"https://github.com/crafter-station/petdex","readme":"# Petdex\n\nPetdex is a public gallery for Codex-compatible animated pets.\n\n## Features\n\n- Browse approved pet packs\n- Preview every animation state\n- Download individual ZIP packages\n- Download the full gallery pack\n- Validate and submit community pet packages in the browser\n\n## Development\n\n```bash\nbun install\nbun dev\n```\n\n## Production\n\n```bash\nbun run build\n```\n\nPet packages live under `public/pets`, and downloadable archives are generated under `public/packs`.\n","summary":"Petdex is a public gallery that hosts Codex‑compatible animated pet packages, allowing users to browse and view every animation state of approved pet packs. It offers on‑the‑fly preview of each state, and lets visitors download individual ZIP files or the entire gallery collection, with all archives generated under `public/packs`. Built for Codex developers and animators, the site also features a browser‑based validator that lets community members submit new pet packages for review. Anyone creating or using Codex pets can quickly discover, test, and acquire ready‑made animations directly through the repository.","description":"Public gallery of animated Codex pets","stars":223,"language":"TypeScript"},{"owner":"duane1024","repo":"l123","url":"https://github.com/duane1024/l123","readme":"# l123\n\n**A Lotus 1-2-3–style terminal spreadsheet with modern Excel compatibility.**\n\nl123 recreates the classic DOS-era spreadsheet experience — slash menus,\nthree-line control panel, keyboard-first workflows, WYSIWYG icon panel,\nand all — on top of a modern formula engine with native `.xlsx`\nround-trip.\n\nIts interaction model targets **Lotus 1-2-3 Release 3.4a for DOS**\n(1993). Its compute and I/O layers are Rust, IronCalc, and UTF-8.\n\n![l123 running in iTerm](docs/iterm-screenshot.png)\n\n---\n\n## ✦ Status\n\nActively developed. Tracking the milestone plan in\n[`docs/PLAN.md`](docs/PLAN.md):\n\n| Milestone | Scope | State |\n|---|---|---|\n| M0 | Grid, pointer nav, workspace bring-up | ✅ done |\n| M1 | Control panel, modes, first-char input | ✅ done |\n| M2 | Engine wire-up, formulas, recalc | ✅ done |\n| M3 | Menu system and MVP slash commands | ✅ done |\n| M4 | `.xlsx` and CSV round-trip | ✅ done |\n| M5 | 3D sheets, GROUP, named ranges, undo | ✅ done |\n| M6 | Printing (ASCII, PDF, line-printer) and Range Search | ✅ done |\n| M7 | Graphs: 7 chart types, F10 view, SVG/PNG save | ✅ done |\n| M8 | R3.4 WYSIWYG icon panel with mouse support | ✅ done |\n| M9 | Macros: `/X`, `{BRANCH}`, `{IF}`, Learn | ✅ done |\n| M10 | Polish: startup splash, context help, themes | 🚧 in progress |\n\nAPI, keybindings, and file paths may still change before v1.0.\n\n---\n\n## ✦ Install\n\n### Homebrew (macOS / Linux)\n\n```bash\nbrew install duane1024/l123/l123\n```\n\nOr tap once and install by name:\n\n```bash\nbrew tap duane1024/l123\nbrew install l123\n```\n\nUpgrade later with `brew upgrade l123`.\n\n### From source\n\nRequires Rust stable (pinned via `rust-toolchain.toml`).\n\n```bash\ngit clone git@github.com:duane1024/l123.git\ncd l123\ncargo build --release\n./target/release/l123            # or: cargo run -p l123\n```\n\nOpen an existing workbook:\n\n```bash\nl123 financials.xlsx\n```\n\nInspect or initialize configuration:\n\n```bash\nl123 config            # show effective settings and their sources\nl123 config --init     # write a sample ~/.l123/L123.CNF\n```\n\nSee [`docs/CONFIG.md`](docs/CONFIG.md) for the full list of keys and\nenvironment variables.\n\n---\n\n## ✦ Keyboard, the short version\n\nThe keyboard *is* the product.\n\n| Key | What it does |\n|---|---|\n| `/` | Open the slash menu |\n| First letter | Descend into a menu item (no `Enter` needed) |\n| Arrows / `Tab` | Move pointer; during entry, commit-and-move |\n| `Enter` | Commit cell entry |\n| `Esc` | Back out one level (menu, prompt, POINT anchor) |\n| `Ctrl-Break` | Abort to READY from anywhere |\n| `.` (in POINT) | Cycle which corner of the range is anchored |\n| `F1` | Context help |\n| `F2` | Edit current cell |\n| `F3` | List named ranges |\n| `F4` | Cycle `$` absoluteness in a reference |\n| `F5` | GOTO cell |\n| `F9` | Recalculate |\n| `F10` | Full-screen graph view |\n| `Alt-F4` | Undo |\n| `Ctrl-PgUp` / `Ctrl-PgDn` | Previous / next sheet |\n\nMouse is supported for the WYSIWYG icon panel (17 icons, R3.4a layout).\n\nFormulas use 1-2-3 syntax: `@SUM(A1..A5)`, not `=SUM(A1:A5)`. The `@`\nsigil and `..` separator are required. `#AND#`, `#OR#`, `#NOT#` are the\nlogical operators.\n\nFirst character typed in READY decides label vs. value: digits and\n`+ - . ( @ # $` start a value; anything else starts a label (with an\nauto-inserted `'` prefix). `\"` = right-align, `^` = center, `\\-` fills the\ncell with dashes.\n\n---\n\n## ✦ What works today\n\n- Three-line control panel with live mode indicator\n- 13 modes (READY, LABEL, VALUE, EDIT, POINT, MENU, FILES, NAMES, HELP,\n  ERROR, WAIT, FIND, STAT)\n- Full slash-menu tree: every path in `docs/MENU.md` is reachable; MVP\n  leaves execute, non-MVP leaves show \"Not implemented yet\" in line 3\n- `/Worksheet`, `/Range`, `/Copy`, `/Move`, `/File`, `/Quit` MVP slices\n- `.xlsx` round-trip through IronCalc; `.csv` import and export\n- 3D workbooks: `A..IV` sheets, `A:B3..C:D5` ranges, GROUP mode\n- Named ranges, `@` function MVP set (see `docs/SPEC.md` §15)\n- Command-journal undo, toggleable via `/WGD Other Undo`\n- Multi-file sessions (`/File Open Before|After`, Ctrl-End navigation)\n- `/Print File` to ASCII, PDF, or line-printer output; headers, footers,\n  margins, page-length, formatted / unformatted / as-displayed /\n  cell-formulas modes; `|` in first column hides rows from print\n- `/Range Search Formulas|Labels|Both` Find and Replace\n- `/Graph` tree: Line, Bar, XY, Stack, Pie, HLCO, Mixed; Titles, Legend,\n  Scale, Grid, Color/B&W, Data-Labels\n- F10 / `/Graph View` full-screen rendering with Unicode bar + line\n  output; Kitty / iTerm2 / Sixel image support via ratatui-image\n- `/Graph Save` to SVG (and plotters PNG output for all chart types)\n- R3.4a WYSIWYG icon panel: all 17 icons, mouse-wired\n- Startup splash screen\n- Column-width options (`/WGC`, range-level set/reset)\n\n## ✦ Coming\n\n- Context help (F1), CRT themes, LMBCS compose key (M10, active)\n- `/Data` tree: Fill, Sort, Query, Table, Distribution, Regression, Parse\n- Macros: `/X`, `{BRANCH}`, `{IF}`, `{MENUBRANCH}`, `/Worksheet Learn`\n- `.wk3` read-only import (values)\n\n---\n\n## ✦ Architecture\n\nRust workspace, strict layering:\n\n```\nl123-core  ← types only, zero external deps\n  ↑\nl123-parse, l123-menu\n  ↑\nl123-engine           (wraps IronCalc behind a trait)\n  ↑\nl123-cmd, l123-io, l123-graph, l123-print\n  ↑\nl123-ui               (ratatui + crossterm; engine-agnostic)\n  ↑\nl123                  (binary)\n```\n\nIronCalc is behind the `Engine` trait so it can be swapped. 1-2-3 formula\nsyntax (`@SUM`, `..`, `#AND#`) is translated to Excel syntax in\n`l123-parse` before it reaches the engine. The UI never sees IronCalc\ntypes.\n\n---\n\n## ✦ Authenticity contract\n\nl123 makes two promises (`docs/SPEC.md` §1):\n\n1. An experienced 1-2-3 R3.4a user can drive l123 cold, without reading\n   anything.\n2. Files round-trip cleanly to and from `.xlsx`.\n\nSPEC §20 enumerates the behaviors — three-line control panel, menu\naccelerators, POINT anchor semantics, first-char rule, `@` sigil, format\ntags, commit-on-arrow, WYSIWYG icon panel, and so on — that the project\nfails if it misses. Every item in the contract has at least one\nacceptance transcript under `tests/acceptance/`.\n\n---\n\n## ✦ Development\n\nStrict red / green / refactor. Conventions live in [`CLAUDE.md`](CLAUDE.md).\n\n```bash\ncargo test --workspace                                  # all tests\ncargo test -p l123-ui --test acceptance                 # keystroke transcripts\ncargo clippy --workspace --all-targets -- -D warnings   # lint\ncargo fmt --all                                         # format\n```\n\nAcceptance transcripts are `.tsv` files describing keystrokes in and\nscreen state out; see `tests/acceptance/README.md` for the directive\nsyntax. Every UI-visible change lands with a transcript.\n\nCanonical docs (treat as sources of truth):\n\n- [`docs/SPEC.md`](docs/SPEC.md) — what l123 *is*\n- [`docs/PLAN.md`](docs/PLAN.md) — milestones and risk register\n- [`docs/MENU.md`](docs/MENU.md) — the complete menu tree\n\nIf code and doc disagree, fix the doc first.\n\n---\n\n## ✦ Non-goals\n\n- Not a DOS emulator. No INT21h, no code pages. Strings are UTF-8.\n- Not a visual homage. Functional fidelity, not CRT nostalgia. (Green /\n  amber themes are a stretch goal, not the point.)\n- Not a macro player for existing `.WK3` files. Read-only `.WK3` import\n  is a stretch goal; write is not planned.\n- Not a reimplementation of the 1-2-3 compute core. IronCalc does that.\n- Not aimed at Lotus 1-2-3 for Windows or SmartSuite. Release 3.4a for\n  DOS only.\n\n---\n\n## ✦ Philosophy\n\nSpreadsheets didn't get worse — they just got heavier.\n\nl123 brings back the speed, clarity, and keyboard-driven precision of\nearly spreadsheet software, without sacrificing compatibility with modern\nworkflows.\n\n---\n\n## ✦ Why?\n\nBecause the `/` key was never the problem.\n\n---\n\n## ✦ License\n\nLicensed under the MIT License. See [`LICENSE`](LICENSE).\n","summary":"l123 is a terminal‑based spreadsheet that recreates the classic Lotus 1‑2‑3 Release 3.4a DOS experience while using a modern Rust‑powered engine (IronCalc) for native `.xlsx` and CSV round‑trip. Its interface centers on slash menus, a WYSIWYG icon panel, and a keyboard‑first workflow, supporting 3‑D sheets, named ranges, macros, undo, and a full set of 7 chart types with SVG/PNG export. The project is ideal for retro computing fans, power‑users who prefer command‑line interaction, and developers needing a lightweight yet feature‑rich spreadsheet for scripting or documentation.","description":null,"stars":114,"language":"Rust"},{"owner":"abdosorour7","repo":"git-commands-cheatsheet","url":"https://github.com/abdosorour7/git-commands-cheatsheet","readme":"<div align=\"center\">\n\n# 🧠 Git Commands Cheatsheet\n\n### A fast, searchable, professional reference for Git commands\n\n[![Live Demo](https://img.shields.io/badge/🌐_Live_Demo-Visit_Site-00ff9d?style=for-the-badge&labelColor=0a0e17)](https://abdosorour7.github.io/git-commands-cheatsheet) <!-- [![Stars](https://img.shields.io/github/stars/abdosorour7/git-commands-cheatsheet?style=for-the-badge&color=ffd166&labelColor=0a0e17)](https://github.com/abdosorour7/git-commands-cheatsheet/stargazers) --> [![PRs Welcome](https://img.shields.io/badge/PRs-welcome-00cfff?style=for-the-badge&labelColor=0a0e17)](https://github.com/abdosorour7/git-commands-cheatsheet/issues)\n\n<br/>\n\n**115 commands · 12 categories · Data-driven · Fast search · Copy-ready**\n\n<br/>\n\n![Preview of the cheatsheet UI](https://raw.githubusercontent.com/abdosorour7/git-commands-cheatsheet/main/preview.png)\n\n</div>\n\n---\n\n## 🚀 Why This Repo\n\n- Built for speed: open, search, copy, and move on\n- Covers real daily Git workflows, not just basic commands\n- Designed to be contributor-friendly and easy to expand\n- Clean UI that is readable for long sessions\n\n---\n\n## ✨ Features\n\n- ✨ **Multilingual** — Switch between English 🇬🇧, Italian 🇮🇹, and French 🇫🇷 with the language switcher; your choice is remembered across visits\n- 🔍 **Instant search** — filter any command or description in real time\n- 📋 **One-click copy** — click any command to copy it to your clipboard\n- 🗂️ **12 categories** — organized from Setup to Advanced Branching\n- ⚠️ **Danger warnings** — destructive commands are clearly marked\n- ⌨️ **Keyboard shortcut** — press `/` to focus search instantly\n- 📱 **Fully responsive** — works great on mobile and desktop\n- 🌙 **Dark terminal theme** — easy on the eyes, built for developers\n- 🧩 **Modular architecture** — separate data, rendering, state, and interactions\n\n---\n\n## 🏗️ Architecture\n\nThis project uses a clean static architecture with no framework and no build requirement.\n\n- **`index.html`**: page shell and semantic structure\n- **`assets/css/styles.css`**: visual design, layout, responsive styles\n- **`assets/data/commands.en.json`**: English command data (canonical source of truth)\n- **`assets/data/commands.it.json`**: Italian translations\n- **`assets/data/commands.fr.json`**: French translations\n- **`assets/data/ui.json`**: all UI strings keyed by locale (`en`, `it`, `fr`)\n- **`assets/js/app.js`**: app bootstrap and orchestration\n- **`assets/js/modules/`**:\n  - `data-loader.js` for data fetching (accepts a `lang` param, loads `commands.{lang}.json`)\n  - `render.js` for UI rendering\n  - `state.js` for filtering/state logic\n  - `interactions.js` for copy, keyboard, and scroll behavior\n  - `i18n.js` for language switching, UI string application, and `localStorage` persistence\n\nThis keeps the app easy to maintain, easy to extend, and contributor-friendly.\n\n> **Adding a new language:** create `assets/data/commands.{lang}.json` (translate `title`, `searchDescription`, and `descriptionHtml` fields — leave `command`, `key`, `icon`, `color`, `codeHtml` as-is), add the locale's UI strings to `assets/data/ui.json`, and add a button to the `#lang-switcher` in `index.html`. Translation files can be partial: any missing commands automatically fall back to English at runtime.\n\n### ➕ Adding a new command\n\n1. Add the command to `assets/data/commands.en.json` (required, source of truth).\n2. Optionally add translated entries in `assets/data/commands.fr.json` and `ass
