sh\n# Clone\ngit clone https://github.com/wisher567/Portpal.git\ncd portpal\n\n# Install & Run\nnpm install\nnpm run tauri dev\n```\n\n> **Note:** The app will launch with Vite HMR — you can freely edit React components and observe changes instantly alongside the Rust backend watcher.\n\n---\n\n## 🎯 Supported Frameworks\n\nPortPal auto-detects these frameworks out-of-the-box:\n\n| Port | Framework | Color |\n|------|-----------|-------|\n| 3000 | React | 🔵 Cyan |\n| 4200 | Angular | 🔴 Red |\n| 5173 | Vite | 🟣 Purple |\n| 4000 | Node.js | 🟢 Green |\n| 8000 | Django | 🟢 Emerald |\n| 8080 | HTTP | 🟡 Amber |\n| 5432 | Postgres | 🔵 Steel Blue |\n| 6379 | Redis | 🔴 Crimson |\n| 3306 | MySQL | 🔵 Blue |\n| 27017 | MongoDB | 🟢 Forest |\n| 1420 | Tauri | 🟡 Gold |\n\n---\n\n## 🏗️ Architecture\n\n| Layer | Technology |\n|-------|-----------|\n| **Runtime** | [Tauri 2](https://tauri.app) — Rust backend, native webview |\n| **Frontend** | React 19 + TypeScript + Vite 7 |\n| **Visualization** | D3.js v7 — Force-directed graph simulation |\n| **Styling** | Vanilla CSS — Custom Glassmorphism |\n| **Port Engine** | Custom native scanner via `sysinfo` + standard OS tools |\n| **Data Pipelines**| Singleton thread-safe event logger `lazy_static` |\n\n---\n\n## 🤝 Contributing\n\nContributions are heavily welcomed to make PortPal even more intelligent.\n\n1. **Fork** the repository\n2. **Create** a feature branch: `git checkout -b feat/amazing-feature`\n3. **Commit** your changes: `git commit -m 'Add amazing feature'`\n4. **Push** to the branch: `git push origin feat/amazing-feature`\n5. **Open** a Pull Request\n\n### Roadmap & Ideas\n- 🌐 Expanding supported framework signatures\n- 🎨 Theme customization & light mode support\n- 📦 Homebrew/Winget verification\n- 🧪 Expanding unit and integration tests\n\n---\n\n## 📄 License\n\nThis project is licensed under the **MIT License** — see the [LICENSE](LICENSE) file for details.\n\n---\n\n<div align=\"center\">\n\n**If PortPal saved you from one more `EADDRINUSE`, give it a ⭐**\n\nMade with 🦀 Rust + ⚛️ React + 💜 by [wisher](https://github.com/wisher567)\n\n</div>\n","summary":" PortPal is a native cross-platform desktop application that serves as a developer command center for monitoring and managing local network ports, eliminating the tedious need for manual `netstat` and `lsof` commands. It provides real-time visibility into active connections with automatic framework detection, interactive D3.js network topology visualization, traffic sparklines, and one-click kill or restart capabilities for processes. The tool features historical event logging, smart project context awareness through configuration files, and system tray integration to silently alert users of conflicts without disrupting their workflow. Built for modern developers juggling multiple local servers, PortPal transforms the frustration of resolving \"address already in use\" errors into an intuitive visual dashboard experience.","description":"See exactly what’s using your ports — and kill it in one click.","stars":196,"language":"TypeScript"},{"owner":"debpalash","repo":"OmniVoice-Studio","url":"https://github.com/debpalash/OmniVoice-Studio","readme":"<div align=\"center\">\n  <img src=\"frontend/public/favicon.svg\" alt=\"OmniVoice Logo\" width=\"120\" />\n  <h1>OmniVoice Studio</h1>\n  <p><b>Your Local Cinematic AI Dubbing Studio</b></p>\n  <p>\n    <a href=\"#-features\">Features</a> •\n    <a href=\"#-getting-started\">Getting Started</a> •\n    <a href=\"#%EF%B8%8F-roadmap\">Roadmap</a> •\n    <a href=\"#-changelog\">Changelog</a>\n  </p>\n</div>\n\n<br/>\n\n<div align=\"center\">\n  <img src=\"preview.png\" alt=\"OmniVoice Studio Interface Demo\" width=\"100%\"/>\n  <br/>\n  <i>The timeline-based cinematic dubbing and workspace UI.</i>\n</div>\n\n---\n\nLocal, full-stack voice generation and cinematic dubbing. **No API keys. No cloud. Just run it.** Built on the open-source [OmniVoice](https://github.com/k2-fsa/OmniVoice) 600-language zero-shot diffusion model.\n\n## ✨ Features\n\n- 🎬 **Video Dubbing** — transcribe, translate, re-voice, and mux back into MP4 with selective track export.\n- 🎧 **Vocal Isolation** — built-in `demucs` automatically splits speech from music, keeping original background audio perfectly preserved.\n- 🧬 **Voice Cloning & Design** — Clone specific voices from just a 3-second audio clip, or design completely new studio profiles with tags like `female, british accent, excited`.\n- ⚡ **Cross-Platform Native Execution** — Auto-detects and accelerates inference using Apple Silicon (MPS), NVIDIA (CUDA), AMD (ROCm), or standard CPU.\n- 🔊 **Per-Segment Mixing** — Fine-grained volume/gain control per dubbed segment (0–200%) for broadcast-quality audio balancing.\n- ⌨️ **Keyboard-Driven Workflow** — `⌘+Enter` to generate, `⌘+S` to save, `⌘+Z`/`⌘+Shift+Z` for undo/redo.\n- 📡 **Live Model Telemetry** — Real-time CPU/RAM/VRAM stats + model warm-up indicator (idle → loading → ready).\n\n<br/>\n\n\n## 🚀 Getting Started\n\nThe easiest way to run OmniVoice Studio locally or on a cloud VM is via Docker. Our environment utilizes an optimized `pytorch/pytorch` configuration which seamlessly enables zero-config GPU passthrough if your host supports it.\n\n### Option 1: One-Click Docker (Recommended)\n\n```bash\ngit clone https://github.com/debpalash/OmniVoice-Studio.git\ncd OmniVoice-Studio\n\ndocker compose up --build -d\n```\nThat's it! Open [http://localhost:8000](http://localhost:8000) in your browser.\n\n> [!TIP]\n> **Windows/WSL Users:** Make sure your NVIDIA drivers are up to date. Docker Desktop automatically passes GPU capabilities to this container!\n> **Cloud VMs (AWS, RunPod):** The image inherently supports CUDA 12.1. As long as `nvidia-container-toolkit` is installed on your host, `--gpus all` binds natively.\n\n### Option 2: Local Development Setup\n\nQuickly get OmniVoice Studio running natively on your hardware if you want to develop or modify code.\n**Prerequisites:** Ensure `ffmpeg` is installed on your system.\nInstall standard modern web tooling: [Bun](https://bun.sh/) and [uv](https://docs.astral.sh/uv/getting-started/installation/).\n\n```bash\ngit clone https://github.com/debpalash/OmniVoice-Studio.git\ncd OmniVoice-Studio\n\n# Boot the Backend\nuv sync\nuv run uvicorn backend.main:app\n\n# Boot the Frontend (in a separate terminal)\nbun install\nbun run dev\n```\n\nOmniVoice Studio launches exactly two micro-services:\n\n| Service | Protocol | Details |\n|---|---|---|\n| **Frontend** | `http://localhost:5173` | The real-time React UI — spanning cloning, design, and audio workspace. |\n| **Backend** | `http://localhost:8000` | The FastAPI server handling model inference, translation pipelines, transcriber tasks. |\n\n> [!NOTE]\n> **First run optimization:** Model weights (approx. 1.2 GB) automatically download from HuggingFace the first time you execute a generation sequence. Subsequent launches trigger instantly from cache. *(Tip: Set `HF_TOKEN` in your environment for faster, authenticated downloads!)*\n\n---\n\n## 🗺️ Roadmap\n\nThe studio is highly functional today, but we are aggressively expanding. Watch the roadmap to see what's shipping next:\n\n### 🌟 Completed Milestones\n- [x] Zero-shot voice cloning & complex voice design.\n- [x] Full video cinematic dubbing pipeline (transcribe → translate → synthesize → mux).\n- [x] Vocal isolation utilizing demucs alongside background audio retention.\n- [x] Embedded waveform timeline editor for micro-segment-level audio manipulation.\n- [x] Live system telemetry tracking (CPU, RAM, GPU VRAM usage).\n- [x] Targeted multi-speaker diarization — auto-assign unique voice profiles per active speaker.\n- [x] Studio project persistence — save, load, and cache multi-track projects seamlessly via local SQLite.\n- [x] Production SRT/VTT subtitle export packaged alongside the dubbed `.mp4` video output.\n- [x] Selective track export — choose exactly which language tracks (Original, DE, ES, etc.) to include in final MP4.\n- [x] Per-segment volume/gain control with real-time mixing (0–200%).\n- [x] Undo/redo system for all segment edits with 50-action history depth.\n- [x] Keyboard shortcuts: `⌘+Enter` generate, `⌘+S` save, `⌘+Z`/`⌘+Shift+Z` undo/redo.\n- [x] Drag-and-drop file uploads for both video and clone audio sources.\n- [x] Model warm-up indicator with live status pill (idle/loading/ready).\n- [x] Confirmation dialogs for all destructive actions (delete project/history/profile).\n- [x] UI preferences persistence (sidebar state, zoom, active tab) across sessions.\n- [x] Polished glassmorphism design system with micro-animations, focus rings, and custom scrollbars.\n\n### 🔨 Upcoming Features\n- [x] **Real Speaker Diarization** — ML-based diarization via pyannote.audio for true multi-speaker identification.\n- [x] **A/B Voice Comparison** — Side-by-side voice audition for casting decisions.\n- [x] **Scene-Aware Dubbing** — FFmpeg scene detection to auto-split segments at visual cuts.\n- [x] **Lip-Sync Scoring** — Analyze dubbed audio duration against original speaker timing with color-coded badges.\n- [x] **Batch Processing** — Centralized async task queue ensuring sequential GPU execution with reconnectable SSE streams.\n- [x] **Advanced Export Suite** — VTT subtitles, per-segment WAV ZIP, compressed MP3, and stem export (vocals + background separate).\n- [x] **Streaming TTS** — Chunked WAV streaming with progressive download and auto-playback.\n- [ ] **Native Desktop Applications** — Dedicated client apps for macOS, Windows, and Linux.\n- [x] **One-Click Deployment** — Docker image packages engineered for zero-config GPU passthrough.\n\n---\n\n## 📝 Changelog\n\n### v1.2.0 — The Production Polish Update\n\n- **Selective Track Export:** Choose exactly which audio tracks to include in the final MP4. Uncheck Original, keep only German — get a single-track export. Full per-track checkbox UI with dynamic FFmpeg stream index remapping.\n- **Undo/Redo System:** Full `⌘+Z` / `⌘+Shift+Z` undo/redo for all segment edits (text, voice, volume, delete). 50-action deep history stack.\n- **Per-Segment Volume Control:** Inline gain slider (0–200%) per segment row in the dub table. Backend applies gain during audio assembly with safe clamping.\n- **Keyboard Shortcuts:** `⌘+Enter` to generate, `⌘+S` to save project. Browser default overrides prevented.\n- **Model Status Indicator:** Live status pill in the header showing model warm-up state (idle → loading → ready). New `/model/status` backend endpoint.\n- **Drag-and-Drop Everywhere:** Video upload already supported drop — now clone audio upload does too, with pink highlight on hover.\n- **Confirmation Dialogs:** All destructive actions (delete project, profile, history item, clear all history) now require confirmation.\n- **Session Persistence:** Sidebar collapsed state, active tab, and zoom level now persist across browser sessions via localStorage.\n- **CSS Design System Overhaul:** Anti-aliased text, input focus glow rings, button hover shimmer, progress bar shimmer animation, fade-in on history items, selection color branding, Firefox scrollbar support, `tabular-nums` for timestamp columns.\n- **AudioContext Pooling:** `playPing()` synthesis notification reuses a single AudioContext instead of creating one per call (browsers cap at ~6).\n\n### v1.1.0 — The Cinematic Studio Update\n\n- **The Cinematic Studio Interface:** Exhaustively re-engineered the UI to prioritize a high-density, real-estate optimized workflow featuring a dynamic UI zoom scalar (`Small`, `Normal`, `Max`). We minimized dead space and overhauled the widget layout keeping crucial tuning metrics immediately accessible.\n- **Multi-Track Timeline:** Deeply integrated a multi-layered waveform sequence interface supporting precision audio segment positioning, unmuted live preview playback, localized track timing, and unconstrained draggable positioning manipulation.\n- **Persistent Local Projects:** Put a complete stop to ephemeral state loss. All workspace metrics are successfully wrapped into `Projects` logged directly within a native embedded `SQLite` database. Workflows reliably survive browser shutdowns or server API reboots.\n- **AI Cast Diarization:** Dropped in an offline `Pyannote` + `WhisperX` fusion pipeline evaluating multi-speaker metadata and categorizing overlapping, distinct speakers. Rapidly \"cast\" clone overrides seamlessly over complex dialogue tracks.\n- **Polishing & Asset Control:** Cleaned cross-stack filename parsing and exported media rendering via `ffmpeg`, stabilizing codec dependencies, and deployed a unified custom `OmniVoice Studio` scalable aesthetic asset system.\n\n<br/>\n\n## ⭐ Star History\n\n<div align=\"center\">\n  <a href=\"https://star-history.com/#debpalash/OmniVoice-Studio&Date\">\n    <picture>\n      <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=debpalash/OmniVoice-Studio&type=Date&theme=dark\" />\n      <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=debpalash/OmniVoice-Studio&type=Date\" />\n      <img alt=\"Star History Chart\" src=\"https://api.star-history.com/svg?repos=debpalash/OmniVoice-Studio&type=Date&theme=dark\" width=\"100%\" />\n    </picture>\n  </a>\n</div>\n\n<br/>\n\n<div align=\"center\">\n  Contributions and conceptual ideas are greatly appreciated — open an issue or submit a PR.\n</div>\n","summary":" OmniVoice Studio is a self-hosted, full-stack cinematic dubbing platform that enables local AI voice generation and video dubbing without cloud dependencies or API keys. Leveraging the open-source OmniVoice 600-language diffusion model, it features zero-shot voice cloning from 3-second samples, automatic vocal isolation, per-segment audio mixing, and keyboard-driven timeline editing. The application automatically detects and accelerates inference across Apple Silicon, NVIDIA CUDA, and AMD ROCm hardware, deploying easily via Docker or native development environments. It targets filmmakers, content creators, and localization teams requiring broadcast-quality dubbing with complete data privacy and offline functionality.","description":"A Cinematic audio dubbing, Cloning and voice generation studio","stars":351,"language":"Python"},{"owner":"arietan","repo":"lite-edit","url":"https://github.com/arietan/lite-edit","readme":"# LiteEdit\n\nThe fastest way to open, browse, and quick-edit code on macOS — a native editor under 1 MB, built entirely with Swift and AppKit.\n\n[![macOS 13+](https://img.shields.io/badge/macOS-13%2B-blue)](https://arietan.github.io/lite-edit/)\n[![Swift 5.9](https://img.shields.io/badge/Swift-5.9-orange)](https://arietan.github.io/lite-edit/)\n[![License: MIT](https://img.shields.io/badge/License-MIT-green)](LICENSE)\n[![Download DMG](https://img.shields.io/github/v/release/arietan/lite-edit?label=Download&color=blue)](https://github.com/arietan/lite-edit/releases/latest)\n\n**[Website](https://arietan.github.io/lite-edit/)** · **[Download](https://github.com/arietan/lite-edit/releases/latest)** · **[Source](https://github.com/arietan/lite-edit)**\n\n---\n\n## Screenshots\n\n![LiteEdit — Main Editor](screenshots/main-editor.png)\n\n*Syntax highlighting, sidebar file tree, tabbed editing, line numbers, and status bar — all in under 1 MB.*\n\n<details>\n<summary>Quick Open (Cmd+P)</summary>\n\n![Quick Open](screenshots/quick-open.png)\n\n</details>\n\n<details>\n<summary>Find & Replace (Cmd+F)</summary>\n\n![Find & Replace](screenshots/find-replace.png)\n\n</details>\n\n---\n\n## Who This Is For\n\nLiteEdit is for macOS developers who want a **fast, zero-overhead editor** alongside their main IDE. Use it when you want to:\n\n- **Open a repo instantly** — browse code and read through files without waiting for VS Code to load\n- **Make quick edits** — fix a typo, tweak a config, update a script, and close\n- **Review files** — read through Markdown, JSON, YAML, or logs with syntax highlighting and zero lag\n- **Stay in flow** — keep a snappy editor open for side tasks while your IDE handles the heavy project\n\n### Who This Is Not For\n\nLiteEdit is not trying to replace VS Code, Xcode, or Sublime Text. If you need extensions, LSP, integrated terminals, or Git UI, use those. LiteEdit is the tool you reach for when you want to **open, read, edit, and move on — in seconds**.\n\n---\n\n## Why LiteEdit?\n\nMost code editors ship hundreds of megabytes of bundled runtimes, web engines, and frameworks before you even open a file. LiteEdit takes the opposite approach: a single native binary under 1 MB that launches instantly and uses minimal resources.\n\n### Size Comparison\n\n| Editor | App Size | RAM at Idle | Runtime |\n|---|---|---|---|\n| **LiteEdit** | **< 1 MB** | **~20 MB** | Native (AppKit) |\n| Sublime Text | ~40 MB | ~90–140 MB | Native (C++) |\n| VS Code | ~400 MB | ~226+ MB | Electron (Chromium + Node.js) |\n\nThe entire app — editor, syntax highlighter, file explorer, session persistence — compiles to a single sub-megabyte binary from ~3,000 lines of Swift. Zero dependencies. Zero frameworks. Just `swift build`.\n\n### What Makes It Different\n\n- **Instant launch** — no runtime to bootstrap, opens in milliseconds\n- **Native macOS citizen** — built on AppKit and TextKit, uses system text rendering, respects macOS conventions\n- **Single binary** — no `node_modules`, no embedded Chromium, no support files\n- **Session persistence** — remembers your folder, open tabs, cursor positions, and window state across restarts\n- **Multi-cursor editing** — VS Code-style Cmd+Shift+L to rename across a file in one shot\n\n---\n\n## Features\n\n- **Syntax highlighting** for 20+ languages (Swift, Python, JS/TS, Rust, Go, C/C++, Java, HTML, CSS, JSON, YAML, SQL, and more)\n- **Tabbed editing** with Cmd+W to close, Cmd+click for new tab\n- **Sidebar file explorer** with folder tree navigation\n- **Find & Replace** with regex support and match count\n- **Quick Open** (Cmd+P) for fast file switching\n- **Session persistence** — reopens your folder, files, cursor positions, and window state on relaunch\n- **Line numbers** with current-line highlighting\n- **Status bar** showing cursor position and detected language\n\n### Keyboard Shortcuts\n\n| Shortcut | Action |\n|---|---|\n| Cmd+N | New file |\n| Cmd+O | Open file |\n| Cmd+Shift+O | Open folder |\n| Cmd+S | Save |\n| Cmd+Shift+S | Save as |\n| Cmd+W | Close tab |\n| Cmd+F | Find & Replace |\n| Cmd+G | Go to line |\n| Cmd+P | Quick Open |\n| Cmd+B | Toggle sidebar |\n| Option+Up/Down | Move line up/down |\n| Cmd+Shift+K | Delete current line |\n| Cmd+Shift+L | Select all occurrences (multi-cursor edit) |\n\n---\n\n## Install\n\nDownload the latest DMG from the [Releases page](https://github.com/arietan/lite-edit/releases/latest), open it, and drag LiteEdit to Applications.\n\n> **macOS Gatekeeper note:** Because the app is not signed with an Apple Developer certificate, macOS may show *\"LiteEdit is damaged and can't be opened.\"* This is a false positive — run the command below to clear the quarantine flag, or install via Homebrew which handles it automatically:\n>\n> ```bash\n> xattr -rd com.apple.quarantine /Applications/LiteEdit.app\n> ```\n\n**Or install with Homebrew** (no quarantine issue):\n\n```bash\nbrew install arietan/lite-edit/lite-edit\n```\n\n## Build from Source\n\nRequires **Xcode Command Line Tools** and **macOS 13+**.\n\n```bash\n# Build and package the .app bundle\nbash build.sh\n\n# Run directly\nopen LiteEdit.app\n\n# Or install to /Applications\ncp -r LiteEdit.app /Applications/\n\n# Or create a DMG installer\nbash create-dmg.sh\n```\n\n## Project Structure\n\n```\nlite-edit/\n├── Package.swift\n├── build.sh\n├── Sources/LiteEdit/\n│   ├── main.swift                          # App entry point\n│   ├── AppDelegate.swift                   # Menu bar, app lifecycle\n│   ├── MainWindowController.swift          # Window, tabs, session persistence\n│   ├── EditorViewController.swift          # Text view, find/replace, cursor\n│   ├── EditorViewController+Shortcuts.swift # Line move, delete, multi-edit\n│   ├── SidebarViewController.swift         # File tree explorer\n│   ├── SyntaxHighlighter.swift             # Regex-based highlighting\n│   ├── Document.swift                      # File model\n│   ├── TabBarView.swift                    # Tab strip\n│   ├── FindBarView.swift                   # Find/replace bar\n│   ├── StatusBarView.swift                 # Bottom status bar\n│   ├── LineNumberView.swift                # Gutter with line numbers\n│   ├── QuickOpenPanel.swift                # Cmd+P fuzzy file picker\n│   ├── RecentItems.swift                   # Recent files/folders\n│   └── Theme.swift                         # Colors and fonts\n└── .gitignore\n```\n\n## Contributing\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for guidelines on how to contribute.\n\n## License\n\n[MIT](LICENSE)\n","summary":" LiteEdit is a native macOS code editor built entirely with Swift and AppKit, delivering a complete editing environment in a sub-megabyte binary without Electron or web dependencies. It features syntax highlighting for over 20 languages, tabbed editing with session persistence, a sidebar file explorer, Quick Open file switching, regex-enabled find and replace, and multi-cursor editing capabilities. Designed as a lightweight companion for macOS developers, it serves those who need to instantly browse repositories or make quick configuration fixes without waiting for heavier IDEs to load. The editor launches in milliseconds with minimal memory usage, making it ideal for reading code, tweaking scripts, and maintaining workflow momentum alongside primary development tools.","description":"A lightweight, fast code editor for macOS — built with Swift and AppKit","stars":129,"language":"Swift"},{"owner":"TristanH","repo":"wikiwise","url":"https://github.com/TristanH/wikiwise","readme":"# Wikiwise\n\nA native macOS app that turns any folder of markdown files into a browsable, publishable wiki — maintained by your coding agent.\n\n**[Download for macOS](https://github.com/TristanH/wikiwise/releases/latest/download/Wikiwise-macOS.dmg)** (Apple Silicon + Intel, signed and notarized)\n\nBased on [Andrej Karpathy's llm-wiki pattern](https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f): instead of RAG, the LLM incrementally builds and maintains a persistent, interlinked wiki. You add sources; the agent reads them, writes summary pages, cross-references everything, and keeps it all consistent. The wiki compounds with every source you add.\n\n## How it works\n\n1. **Create a wiki** — Wikiwise scaffolds the folder structure, build tools, and agent skills\n2. **Open your agent** — use the built-in terminal or your own (Claude Code, Codex, Cursor)\n3. **Add sources** — paste URLs, import from Readwise, or point at existing files\n4. **Read and explore** — browse the compiled wiki with search, backlinks, and graph visualization\n\nThe agent does the grunt work: summarizing, cross-referencing, filing, and bookkeeping. You curate sources, ask questions, and think about what it all means.\n\n## Building\n\nRequires macOS 14+ and Swift 5.10+.\n\n```\ngit clone https://github.com/TristanH/wikiwise.git\ncd wikiwise\nswift build\n.build/arm64-apple-macosx/debug/Wikiwise\n```\n\n## Architecture\n\n- **SwiftUI** macOS app built with SwiftPM (no Xcode project)\n- **JavaScriptCore** compiler turns markdown into styled HTML pages\n- **SwiftTerm** embedded terminal for running coding agents\n- **FSEvents** file watcher for live recompilation\n- Wiki scaffold includes Claude Code skills for ingest, lint, and Readwise import\n\n## Wiki structure\n\nEach wiki folder is self-contained:\n\n```\nmy-wiki/\n  raw/            # immutable source documents\n  wiki/           # agent-maintained markdown pages\n    sources/      # one summary per ingested source\n    home.md       # human entry point\n    index.md      # agent catalog\n    log.md        # chronological record\n  site/           # build tools + compiled output\n    build.js      # the wiki compiler\n    style.css     # the wiki theme\n    out/           # compiled HTML (gitignored)\n  .claude/        # agent skills and settings\n  CLAUDE.md       # wiki schema\n  llm-wiki.md     # Karpathy's pattern (reference)\n```\n\nSee [`Sources/Wikiwise/Resources/scaffold/`](Sources/Wikiwise/Resources/scaffold/) for the full template — this is what gets copied when you create a new wiki, including the schema (`CLAUDE.md`), agent skills, and seed pages.\n\n## License\n\nGPLv3 — see [LICENSE](LICENSE)\n","summary":" Wikiwise is a native macOS application that transforms folders of Markdown files into browsable, interlinked wikis maintained by AI coding agents. Following Andrej Karpathy's llm-wiki pattern, it replaces traditional retrieval-augmented generation with a compounding knowledge base where agents incrementally summarize sources, cross-reference entries, and maintain consistency across the wiki. The app provides scaffolding tools, a built-in terminal for agent interaction, support for importing content from URLs and Readwise, and compilation features that generate styled HTML with search and graph visualization. It serves researchers, writers, and developers seeking to build persistent, AI-curated knowledge bases that grow more valuable as new sources are added.","description":null,"stars":184,"language":"HTML"},{"owner":"browser-use","repo":"video-use","url":"https://github.com/browser-use/video-use","readme":"<p align=\"center\">\n  <img src=\"static/video-use-banner.png\" alt=\"video-use\" width=\"100%\">\n</p>\n\n# video-use\n\nIntroducing **video-use** — edit videos with Claude Code. 100% open source.\n\nDrop raw footage in a folder, chat with Claude Code, get `final.mp4` back. Works for any content — talking heads, montages, tutorials, travel, interviews — without presets or menus.\n\n## What it does\n\n- **Cuts out filler words** (`umm`, `uh`, false starts) and dead space between takes\n- **Auto color grades** every segment (warm cinematic, neutral punch, or any custom ffmpeg chain)\n- **30ms audio fades** at every cut so you never hear a pop\n- **Burns subtitles** in your style — 2-word UPPERCASE chunks by default, fully customizable\n- **Generates animation overlays** via [Manim](https://www.manim.community/), [Remotion](https://www.remotion.dev/), or PIL — spawned in parallel sub-agents, one per animation\n- **Self-evaluates the rendered output** at every cut boundary before showing you anything\n- **Persists session memory** in `project.md` so next week's session picks up where you left off\n\n## Get started\n\n```bash\n# 1. Clone and symlink into Claude Code's skills directory\ngit clone https://github.com/browser-use/video-use\ncd video-use\nln -s \"$(pwd)\" ~/.claude/skills/video-use\n\n# 2. Install deps\npip install -e .\nbrew install ffmpeg           # required\nbrew install yt-dlp            # optional, for downloading online sources\n\n# 3. Add your ElevenLabs API key\ncp .env.example .env\n$EDITOR .env                   # ELEVENLABS_API_KEY=...\n```\n\nThen point Claude Code at a folder of raw takes:\n\n```bash\ncd /path/to/your/videos\nclaude\n```\n\nAnd in the session:\n\n> edit these into a launch video\n\nIt inventories the sources, proposes a strategy, waits for your OK, then produces `edit/final.mp4` next to your sources. All outputs live in `<videos_dir>/edit/` — the skill directory stays clean.\n\n## How it works\n\nThe LLM never watches the video. It **reads** it — through two layers that together give it everything it needs to cut with word-boundary precision.\n\n<p align=\"center\">\n  <img src=\"static/timeline-view.svg\" alt=\"timeline_view composite — filmstrip + speaker track + waveform + word labels + silence-gap cut candidates\" width=\"100%\">\n</p>\n\n**Layer 1 — Audio transcript (always loaded).** One ElevenLabs Scribe call per source gives word-level timestamps, speaker diarization, and audio events (`(laughter)`, `(applause)`, `(sigh)`). All takes pack into a single ~12KB `takes_packed.md` — the LLM's primary reading view.\n\n```\n## C0103  (duration: 43.0s, 8 phrases)\n  [002.52-005.36] S0 Ninety percent of what a web agent does is completely wasted.\n  [006.08-006.74] S0 We fixed this.\n```\n\n**Layer 2 — Visual composite (on demand).** `timeline_view` produces a filmstrip + waveform + word labels PNG for any time range. Called only at decision points — ambiguous pauses, retake comparisons, cut-point sanity checks.\n\n> Naive approach: 30,000 frames × 1,500 tokens = **45M tokens of noise**.\n> Video Use: **12KB text + a handful of PNGs**.\n\nSame idea as browser-use giving an LLM a structured DOM instead of a screenshot — but for video.\n\n## Pipeline\n\n```\nTranscribe ──> Pack ──> LLM Reasons ──> EDL ──> Render ──> Self-Eval\n                                                              │\n                                                              └─ issue? fix + re-render (max 3)\n```\n\nThe self-eval loop runs `timeline_view` on the _rendered output_ at every cut boundary — catches visual jumps, audio pops, hidden subtitles. You see the preview only after it passes.\n\n## Design principles\n\n1. **Text + on-demand visuals.** No frame-dumping. The transcript is the surface.\n2. **Audio is primary, visuals follow.** Cuts come from speech boundaries and silence gaps.\n3. **Ask → confirm → execute → self-eval → persist.** Never touch the cut without strategy approval.\n4. **Zero assumptions about content type.** Look, ask, then edit.\n5. **12 hard rules, artistic freedom elsewhere.** Production-correctness is non-negotiable. Taste isn't.\n\nSee [`SKILL.md`](./SKILL.md) for the full production rules and editing craft.\n","summary":" Video-use is an open-source AI-powered video editing tool that enables users to edit raw footage through natural language conversations with Claude Code, eliminating the need for traditional timeline interfaces. It processes video by transcribing audio into structured text with word-level timestamps and speaker diarization, allowing the LLM to make precise cuts based on speech patterns while consulting visual composites only when necessary for decision-making. The system automatically handles technical details like removing filler words, color grading, audio fades, subtitle burning, and animation overlays, then self-evaluates the rendered output at every cut boundary to catch errors before delivery. Content creators producing interviews, tutorials, or talking-head videos benefit most from this workflow, as it transforms editing from a manual frame-by-frame process into a simple conversational task requiring no preset templates or complex menus.","description":null,"stars":1553,"language":"Python"},{"owner":"mpiorowski","repo":"late-sh","url":"https://github.com/mpiorowski/late-sh","readme":"# late.sh\n\n> A cozy terminal clubhouse for developers. Lofi beats, casual games, chat, and tech news, all via SSH.\n\n```bash\nssh late.sh\n```\n\n`late.sh` is a terminal-first social app: real-time chat, music, games, news, profiles, and a shared always-on space you can enter from any SSH client.\n\n## Status\n\nThis repository is the main codebase for `late.sh`.\n\n- The project is open for source reading, local development, audits, and contributions.\n- The public hosted `late.sh` service remains the canonical deployment.\n- The code is source-available, not OSI open source, during the FSL protection period.\n\nRead the details in [LICENSE](LICENSE), the plain-English policy in [LICENSING.md](LICENSING.md), and contribution rules in [CONTRIBUTING.md](CONTRIBUTING.md).\n\n## What It Includes\n\n- SSH TUI with dashboard, chat, profile, news, and arcade screens\n- Real-time global chat and shared activity feed\n- Audio streaming via Icecast/Liquidsoap with browser and CLI pairing\n- Terminal games including 2048, Sudoku, Nonograms, Minesweeper, and Solitaire\n- Web frontend for landing, connect flow, and paired-client experiences\n- Companion CLI for local audio playback and synced visualizer data\n\n## Workspace\n\nThis is a Rust workspace with four crates:\n\n| Crate | Role |\n|-------|------|\n| `late-cli` | Companion CLI for local audio playback, paired controls, and visualizer sync |\n| `late-core` | Shared domain code, database layer, migrations, and infrastructure helpers |\n| `late-ssh` | SSH server and terminal UI application |\n| `late-web` | Web server, landing page, connect flow, and browser pairing |\n\nThe stack is backed by PostgreSQL, Icecast, and Liquidsoap.\n\n## Quick Start\n\nTry the live service:\n\n```bash\nssh late.sh\n```\n\nRun it yourself (requires Docker):\n\n```bash\ngit clone https://github.com/mpiorowski/late-sh\ncd late-sh\nmake start\n```\n\nThen connect to your local instance:\n\n```bash\nssh localhost -p 2222\n```\n\nThat's it. Postgres, Icecast, and Liquidsoap all come up automatically.\n\n## Companion CLI\n\nInstall the companion CLI for local audio playback and synced visualizer:\n\nmacOS / Linux:\n\n```bash\ncurl -fsSL https://cli.late.sh/install.sh | bash\n```\n\nWindows PowerShell (x64):\n\n```powershell\nirm https://cli.late.sh/install.ps1 | iex\n```\n\nOr build it from source:\n\n```bash\nmise install        # optional — sets up the expected Rust toolchain\ncargo build --release --bin late\n```\n\n## Local Development\n\nFor development without Docker wrapping the Rust builds, you can run the\ninfrastructure in Docker and the apps natively:\n\n```bash\ndocker compose up -d postgres icecast liquidsoap\ncargo run -p late-ssh\ncargo run -p late-web\n```\n\nLocal host development can use Cargo's normal defaults, including the standard\nrepo-local `target/` directory. The `/app/target` path is only for Docker/dev\ncontainers.\n\n```bash\nexport CARGO_HOME=$HOME/.cargo\n```\n\nUse `mise install` to get the expected Rust toolchain, `mold` linker, and\n`cargo-nextest`.\n\n## Verification\n\nRun before opening a PR:\n\n```bash\nmake check\n```\n\nThis runs `cargo fmt --check`, `cargo clippy`, and `cargo nextest`.\nSome integration tests require Docker via testcontainers.\n\n## Contributing\n\nContributions are welcome, but read the project policy first:\n\n- [CONTRIBUTING.md](CONTRIBUTING.md)\n- [LICENSING.md](LICENSING.md)\n- [LICENSE](LICENSE)\n\nThis repository uses DCO sign-off for commits:\n\n```bash\ngit commit -s\n```\n\nIf you distribute a fork, do not present it as the official `late.sh` service or use the project branding as your own.\n\n## More Context\n\n- [CONTEXT.md](CONTEXT.md) — architecture, invariants, and working context. Written for LLMs — feed this to your AI editor for best results.\n- [CONTRIBUTING.md](CONTRIBUTING.md) — workflow, test rules, module patterns, and AI-assisted development tips.\n- [THEME.md](THEME.md) — how to contribute a new built-in SSH theme via PR.\n- [late-cli/README.md](late-cli/README.md) — CLI-specific usage and behavior.\n","summary":" late.sh is a terminal-first social platform accessible via SSH that transforms any command-line interface into a cozy digital clubhouse where developers can engage in real-time global chat, stream lofi music, play arcade games like 2048 and Sudoku, and browse tech news. Built as a Rust workspace comprising separate crates for its SSH TUI server, web frontend, core services, and a companion CLI for local audio playback, it supports both the publicly hosted instance (reachable via `ssh late.sh`) and self-hosted deployments using Docker with PostgreSQL and Icecast. The project creates a unique always-on space for developers seeking low-distraction community interaction, casual entertainment, and ambient music without leaving their terminal environment.","description":"A cozy terminal clubhouse for developers. Lofi beats, casual games, chat, and tech news, all via SSH.","stars":310,"language":"Rust"},{"owner":"Aryagm","repo":"dflash-mlx","url":"https://github.com/Aryagm/dflash-mlx","readme":"# dflash-mlx\n\n**DFlash implementation for Apple Silicon, using MLX.**\n\n![Benchmarks](assets/benchmark-chart.png)\n\nhttps://github.com/user-attachments/assets/e7a78bca-1a62-42eb-ba75-da32b3b3ad40\n\n## Quick start\n\n```bash\ngit clone https://github.com/aryagm/dflash-mlx.git && cd dflash-mlx\nuv sync\n\nuv run dflash-mlx --max-new-tokens 128\n```\n\nDefaults to Qwen3-4B BF16. First run downloads the target and draft checkpoints into the Hugging Face cache, which is roughly 12 GB for the default pair. Pass `--target-model` and `--draft-model` to override. `dflash-mlx-chat` for interactive chat, `--json` for machine-readable output. Benchmark history is opt-in with `--history` or `--history-file`.\n\n```python\nfrom dflash_mlx import DFlashGenerator\n\n# First run also downloads the default Qwen3-4B target and DFlash draft weights.\nrunner = DFlashGenerator()\nresult = runner.generate(\"Write a quicksort in Python.\", max_new_tokens=128)\nprint(result.text)\n```\n\n## Supported models\n\n| Target | Draft |\n|---|---|\n| `mlx-community/Qwen3-4B-bf16` (default) | `z-lab/Qwen3-4B-DFlash-b16` |\n| `mlx-community/Qwen3.5-4B-MLX-bf16` | `z-lab/Qwen3.5-4B-DFlash` |\n\nQwen3.5 support is functional but incomplete. It is not as fast as the Qwen3 path today because Qwen3.5 uses a more complicated hybrid attention stack with recurrent linear-attention state, so exact partial-block acceptance needs custom cache rollback and currently has weaker long-generation acceptance.\n\nUpstream DFlash has checkpoints for Llama 3.1, Qwen3 Coder, Kimi-K2.5, GPT-OSS, and more in the [Hugging Face collection](https://huggingface.co/collections/z-lab/dflash). Adding a new family starts with an adapter in `dflash_mlx/adapters.py` &mdash; see [ADDING_MODELS.md](ADDING_MODELS.md).\n\n## Benchmarks\n\nFull run details, acceptance stats, and quantized comparisons:\n- [benchmarks/qwen3-results.md](benchmarks/qwen3-results.md) &mdash; headline Qwen3 results\n- [benchmarks/qwen35-results.md](benchmarks/qwen35-results.md) &mdash; archived Qwen3.5 runs\n\n## How it works\n\n[DFlash](https://arxiv.org/abs/2602.06036) trains a small block-diffusion model to propose multiple tokens at once. The target verifies them in a single forward pass and accepts the longest correct prefix &mdash; identical output, fewer forward passes, higher throughput.\n\nThe original DFlash targets CUDA. `dflash-mlx` is a native MLX port for Apple Silicon. MLX has no speculative-decoding primitives, so every piece of the draft/verify loop had to be built from scratch on top of Metal:\n\n- **Hidden-state extraction from the target.** DFlash's drafter conditions on intermediate layer activations, not just logits. We hook into specific Qwen layers and surface those tensors without breaking the standard forward path or the KV cache, so a single target pass gives us both verification logits and the hidden states the next draft block needs.\n\n- **Parallel block proposal.** The draft model runs a block-diffusion denoising loop to propose several tokens at once. This runs entirely on the GPU with its own cache, sharing tokenization and positional context with the target.\n\n- **Single-pass batched verification.** Every proposed block is verified in one target forward pass. The target's logits are compared greedily against the draft's samples; we accept the longest matching prefix plus one bonus correction token, which is what makes the output bit-for-bit identical to plain target decoding.\n\n- **Per-layer KV cache rollback on rejection.** When the target rejects the tail of a proposal, the KV cache has to be rewound to the exact accepted length &mdash; per layer, because Qwen3.5 mixes full attention, sliding-window attention, and recurrent linear-attention state, and each has its own cache shape and rollback rule. Plain MLX caches don't expose this; we extend them.\n\n- **Pluggable adapters.** Target-specific concerns (layer ids to tap, cache types, stop tokens, chat template) are isolated in `dflash_mlx/adapters.py`. The core draft/verify loop is architecture-agnostic, so adding a new family is one adapter file rather than a rewrite.\n\n- **Warm-path throughput engineering.** MLX kernel compilation, lazy evaluation, and graph caching all affect the numbers. The bench CLI separates warmup from measurement and pins evaluation points so the reported tok/s reflects steady-state Metal performance, not first-run overhead.\n\n## Citation\n\n```bibtex\n@article{chen2026dflash,\n  title   = {DFlash: Block Diffusion for Flash Speculative Decoding},\n  author  = {Chen, Jian and Liang, Yesheng and Liu, Zhijian},\n  journal = {arXiv preprint arXiv:2602.06036},\n  year    = {2026}\n}\n```\n\n## License\n\nMIT\n","summary":" This project implements DFlash speculative decoding for Apple Silicon devices using MLX, accelerating large language model inference by employing a lightweight block-diffusion draft model to propose multiple tokens that the target model verifies in a single forward pass. The implementation features custom Metal-based components including hidden-state extraction, parallel block proposal, and per-layer KV cache rollback to handle complex attention mechanisms, supporting models like Qwen3 and Qwen3.5 through pluggable adapters. Developers and researchers running compatible models on Apple Silicon can use the provided command-line tools or Python API to achieve significantly faster text generation while maintaining outputs identical to standard decoding.","description":"Exact speculative decoding on Apple Silicon, powered by MLX.","stars":328,"language":"Python"},{"owner":"NatiCha","repo":"bunwv","url":"https://github.com/NatiCha/bunwv","readme":"# bunwv\n\n[![npm](https://img.shields.io/npm/v/@naticha/bunwv)](https://www.npmjs.com/package/@naticha/bunwv)\n[![platform](https://img.shields.io/badge/platform-macOS%20%7C%20Linux%20%7C%20Windows-lightgrey)](https://github.com/naticha/bunwv)\n[![Bun](https://img.shields.io/badge/bun-%3E%3D1.3.12-orange)](https://bun.sh)\n[![License: MIT](https://img.shields.io/badge/License-MIT-blue.svg)](LICENSE)\n\n![bunwv demo](https://github.com/user-attachments/assets/c09a565a-0031-4698-9e09-6c7c9c222da9)\n\nHeadless browser automation CLI for [Bun](https://bun.sh), powered by `Bun.WebView`. Cross-platform: WebKit on macOS (default, zero dependencies), Chrome on macOS/Linux/Windows.\n\nA persistent daemon keeps a browser instance alive so page state — DOM, modals, forms, auth, cookies — survives across commands. Designed **agent-first**: every action verb is silent on success, errors are JSON on stderr with stable exit codes, and event/console buffers are cursor-pulled. Built for AI coding assistants (Claude Code, Cursor, etc.) driving the browser through discrete tool calls.\n\n## Install\n\n```bash\nbun install -g @naticha/bunwv\n```\n\nRequires Bun v1.3.12+. On macOS, uses the native WebKit engine by default (zero dependencies). On Linux and Windows, automatically uses Chrome/Chromium (must be installed).\n\n### AI Coding Assistant Skill\n\n```bash\nbunx skills add naticha/bunwv\n# or\nnpx skills add naticha/bunwv\n```\n\nOr install directly in Claude Code:\n\n```\n/plugin marketplace add naticha/bunwv\n/plugin install bunwv@naticha/bunwv\n```\n\nThis installs the skill file that teaches AI assistants how to use bunwv for browser testing.\n\n## Quick Start\n\n```bash\nbunwv start                                  # start the daemon\nbunwv navigate http://localhost:3000         # go to a page\nbunwv screenshot                             # writes /tmp/bunwv-screenshot-<session>.png, prints the path\nbunwv click --selector \"button.submit\"       # click an element (auto-waits)\nbunwv type \"hello world\"                     # type into focused element\nbunwv evaluate \"document.title\"              # run JS in the page, JSON-literal result\nbunwv close                                  # stop the daemon\n```\n\n## Agent-first contract\n\n- **Successful action verbs print nothing on stdout and exit 0.** `click`, `type`, `navigate`, `press`, `scroll`, `scroll-to`, `clear`, `submit`, `resize`, `back`/`forward`/`reload`, `close`, `exists`, `wait-for`, `wait-for-gone`, `cdp-subscribe`, `cdp-unsubscribe` are all silent. Read verbs (`status`, `evaluate`, `events`, `console`, `cdp`, `cdp-subscriptions`, `screenshot`, `sessions`) print their result.\n- **Stable exit codes**: `0` ok, `1` generic, `2` usage, `3` timeout, `4` element-not-found, `5` daemon-unreachable, `6` batch-partial.\n- **Errors are JSON on stderr**: `{ok:false, error, exitCode}`. Branch on the exit code, not stderr text.\n- **Error-level console auto-surfaces.** If the page logs `console.error`/`console.warn` while a verb runs, `{\"console\":[…]}` is written to stderr alongside the verb's response.\n- **`--json` global flag** wraps any command's output as `{ok, data?, error?, exitCode}`.\n- **Flexible flags**: `--flag value`, `--flag=value`, repeated flags (e.g. `--mod Shift --mod Control`), and flags before or after the command all work.\n- **`BUNWV_SESSION` env var** replaces `--session <name>` when set.\n\n## Commands\n\n### Session\n\n| Command | Description |\n|---|---|\n| `start [--width N] [--height N] [--data-store PATH] [--idle-timeout ms] [--backend webkit\\|chrome] [--chrome-path PATH] [--chrome-argv '[json]'] [--chrome-url <ws>] [--chrome-stdout inherit\\|ignore] [--chrome-stderr inherit\\|ignore] [--webkit-stdout inherit\\|ignore] [--webkit-stderr inherit\\|ignore] [--url <initial>]` | Start the daemon (default 1920x1080, 30min idle timeout) |\n| `close [--all]` | Stop this session, or every running session with `--all` |\n| `status` | Terse: `<url> \\| <title> \\| <idle\\|loading> \\| pending=<n>`. `--json` for `loading`, `pendingEvents`, `cursor`, `cdpSubscriptions` |\n| `sessions` | List all running sessions |\n\n### Navigation\n\n| Command | Description |\n|---|---|\n| `navigate <url>` | Navigate to a URL (silent) |\n| `back` / `forward` / `reload` | History + refresh (silent) |\n\n### Interaction\n\n| Command | Description |\n|---|---|\n| `click --selector <css>` | Click an element by CSS selector (auto-waits for actionability, `isTrusted: true`) |\n| `click --text <text>` | Click an element by visible text. `--text-match exact\\|contains\\|regex` (default: trimmed contains) |\n| `click --at <x,y>` | Click at coordinates (no actionability wait) |\n| `click ... [--button left\\|right\\|middle] [--count 1\\|2\\|3] [--mod Shift] [--mod Control] [--mod Alt] [--mod Meta] [--timeout ms]` | Modifiers, mouse button, click count, actionability timeout |\n| `exists <selector>` | Silent probe. Exit 0 present, 4 missing |\n| `type <text>` | Type text into the focused element |\n| `press <key> [--mod Shift] [--mod Control] ...` | Press a key with optional modifiers (case-sensitive per Bun.WebView) |\n| `clear <selector>` | Clear an input/textarea (React-compatible native setter) |\n| `submit [--form <sel>] [--button <text>]` | Submit a form via `requestSubmit()` (React-compatible) |\n| `scroll <dx> <dy>` | Scroll by wheel event |\n| `scroll-to <selector> [--block start\\|center\\|end\\|nearest] [--timeout ms]` | Scroll element into view |\n\n### Inspection\n\n| Command | Description |\n|---|---|\n| `screenshot [--format png\\|jpeg\\|webp] [--quality 0-100] [--encoding blob\\|buffer\\|base64\\|shmem] [--out <path>\\|-]` | Capture the viewport. Default: writes `/tmp/bunwv-screenshot-<session>.png` and prints the path |\n| `evaluate <expr>` | Evaluate JS in the page. Always prints the JSON-literal result (auto-wraps statements in an IIFE) |\n| `console [--clear] [--since <seq>]` | Captured page console output. Terse: `<seq> [<level>] <message>`. `\\n`/`\\r` escaped. `--json` for raw messages + cursor |\n| `events [--since <seq>]` | Navigation events + subscribed CDP events since the cursor. 1000 entries / 10 MB LRU cap |\n| `cdp <method> [--params '{}']` | Raw Chrome DevTools Protocol call (Chrome backend only) |\n| `cdp-subscribe <CDP.event> [<CDP.event> ...]` | Subscribe one or more CDP events into the `events` buffer |\n| `cdp-unsubscribe <CDP.event> [<CDP.event> ...]` | Unsubscribe |\n| `cdp-subscriptions` | List active subscriptions |\n| `resize <w> <h>` | Resize the viewport |\n\n### Waiting\n\n| Command | Description |\n|---|---|\n| `wait-for <selector>` | Wait until element appears (default 10s) |\n| `wait-for --url <substring>` / `--title <substring>` | Wait for URL or title to contain a substring |\n| `wait-for-gone <selector> \\| --url <substr> \\| --title <substr>` | Symmetric removal wait |\n| `wait-for ... [--timeout ms]` | Override the 10s default |\n\n### Batch\n\n| Command | Description |\n|---|---|\n| `batch [--file <path>] [--keep-going]` | Read NDJSON from stdin (or a file), each line a JSON array of args. Runs all lines in one Bun process, emits one NDJSON envelope per command. Outer flags like `--session` inherit into each line |\n\nAll commands accept `--json`, `--session <name>` (or `BUNWV_SESSION` env var), and the flexible flag syntax.\n\n## Sessions\n\nSessions are named and isolated. Each runs its own daemon on a separate Unix socket. Sockets and PID files are `chmod 0600`, so other local users can't drive your session.\n\n```bash\nbunwv start                          # \"default\" session\nbunwv start --session staging        # separate \"staging\" session\nBUNWV_SESSION=staging bunwv navigate http://staging:3000\nbunwv sessions                       # list running sessions\nbunwv close --session staging        # stop one session\nbunwv close --all                    # stop every running session\n```\n\n**Auto-shutdown** — daemons exit after 30 minutes of inactivity. Override with `--idle-timeout`:\n\n```bash\nbunwv start --idle-timeout 3600000   # 1 hour\nbunwv start --idle-timeout 0         # never\n```\n\n**Reuse detection** — starting an existing session reports its current state and exits 0:\n\n```\n$ bunwv start\nReusing existing session \"default\" (PID: 12345)\n  URL:   http://localhost:3000/dashboard\n```\n\n**Persistent auth** — use `--data-store` to preserve cookies/localStorage across daemon restarts:\n\n```bash\nbunwv start --data-store ./bunwv-session\n```\n\n## Working with React\n\nTwo commands are specifically designed for React apps:\n\n**`clear`** — clears input fields using the native value setter and dispatches React-compatible events. Keyboard-based clearing (`Cmd+A`, `Backspace`) does not reliably update React state.\n\n```bash\nbunwv clear \"input[name='email']\"\nbunwv click --selector \"input[name='email']\"\nbunwv type \"new-value@example.com\"\n```\n\n**`submit`** — submits forms via `form.requestSubmit()`, which properly triggers React form handlers. JS `.click()` produces `isTrusted: false` events that many React forms ignore.\n\n```bash\nbunwv submit --button \"Save Changes\"\nbunwv wait-for-gone \"[role='dialog']\"\n```\n\n## Console Capture\n\nPage `console.log`, `console.error`, etc. are captured into a cursor-based ring buffer (1000 entries). `console.error`/`console.warn` entries that fire **during a verb** are auto-surfaced to that verb's stderr as `{\"console\":[…]}` — the agent sees failures without a second call.\n\nPull the buffer explicitly:\n\n```bash\nbunwv console                        # terse: \"<seq> [<level>] <message>\"\nbunwv console --clear                # print, then clear\nbunwv console --since 42             # only entries with seq > 42\nbunwv --json console                 # {messages, cursor, truncated?, oldest?}\n```\n\nAdvance `--since` using the max `seq` you saw (first field of each line). Use `--json` when you need raw multi-line messages or the truncation signal.\n\n## Events & CDP\n\n`onNavigated`, `onNavigationFailed`, and any subscribed CDP events land in a shared ring buffer (1000 entries / 10 MB LRU):\n\n```bash\nbunwv events --since 0               # full buffer\nbunwv events --since 42              # new events only\n```\n\nIf the buffer evicted older entries, the response includes `\"truncated\":true,\"oldest\":<seq>`.\n\n### Chrome backend & CDP\n\nmacOS defaults to WebKit; Linux/Windows auto-use Chrome. Override on any platform:\n\n```bash\nbunwv start --backend chrome\nbunwv start --backend webkit                                # macOS only\nbunwv start --chrome-path /path/to/chromium\nbunwv start --chrome-argv '[\"--headless=new\"]'              # extra flags\nbunwv start --chrome-url ws://127.0.0.1:9222/devtools/...   # attach to a running Chrome\n```\n\nRaw CDP calls and subscriptions (Chrome only):\n\n```bash\nbunwv cdp \"Page.getLayoutMetrics\"\nbunwv cdp \"Runtime.evaluate\" --params '{\"expression\": \"1+1\"}'\n\nbunwv cdp \"Network.enable\"\nbunwv cdp-subscribe Network.responseReceived Network.requestWillBeSent\nbunwv navigate https://example.com\nbunwv events --since 0\nbunwv cdp-unsubscribe Network.responseReceived Network.requestWillBeSent\n```\n\n## Batch mode\n\n`bunwv batch` runs many commands in a single Bun process, eliminating per-command startup cost. Each stdin line is a JSON array of args; each response is an NDJSON envelope on stdout.\n\n```bash\ncat <<'EOF' | bunwv batch --session staging --keep-going\n[\"navigate\",\"http://localhost:3000/login\"]\n[\"click\",\"--selector\",\"input[name='email']\"]\n[\"type\",\"me@example.com\"]\n[\"press\",\"Tab\"]\n[\"type\",\"hunter2\"]\n[\"submit\",\"--button\",\"Sign In\"]\n[\"wait-for\",\"--url\",\"/dashboard\"]\n[\"screenshot\"]\nEOF\n```\n\n`--keep-going` runs the full list even if one line fails; the process exits `6` (batch-partial) on any failure, `0` on full success. Without `--keep-going`, batch stops at the first failure and returns that line's exit code.\n\n## How It Works\n\n```\n┌──────────┐     Unix Socket      ┌───────────────┐    Bun.WebView    ┌──────────────┐\n│  bunwv   │ ──── HTTP POST ────▶ │    daemon     │ ─────── API ────▶ │ WebKit macOS │\n│   CLI    │ ◀─── JSON/bytes ──── │ (background)  │ ◀──────────────── │ Chrome Linux │\n└──────────┘  /tmp/bunwv-*.sock   └───────────────┘                   │   / Windows  │\n                                                                      └──────────────┘\n```\n\n- The daemon spawns on `bunwv start` and listens on a Unix socket (owner-only, `chmod 0600`).\n- Each CLI command sends one HTTP request to the daemon and exits — no long-lived connections.\n- The daemon owns a single `Bun.WebView` instance.\n- All selector/coordinate input is dispatched as **native events** (`isTrusted: true`); selector-based methods auto-wait for actionability (attached, visible, stable, unobscured).\n- Navigation and CDP events are buffered with monotonic `seq` cursors so agents can poll for what's new since their last turn.\n\n## AI Assistant Integration\n\nbunwv is designed for AI coding assistants that can't see a browser. The typical workflow:\n\n1. **Navigate** to a page\n2. **Screenshot** — the assistant Reads the PNG to \"see\" the page\n3. **Decide** what to do based on the screenshot\n4. **Act** — `click`, `type`, `submit`\n5. **Wait** — `wait-for` a selector, URL, or title change\n6. **Screenshot** again to verify\n7. **Repeat**\n\nThe Claude Code skill (`skills/bunwv/SKILL.md`) documents these patterns end-to-end, including batch mode, React form handling, error recovery via exit codes, and cursor-based event/console polling.\n\n## License\n\nMIT\n","summary":" bunwv is a headless browser automation CLI built exclusively for the Bun runtime that maintains persistent browser sessions through a background daemon, allowing page state—including DOM, cookies, and authentication—to survive across discrete commands. It supports cross-platform operation using native WebKit on macOS or Chrome on Linux and Windows, and implements an \"agent-first\" contract where successful actions remain silent while errors return as structured JSON with stable exit codes. Designed primarily for AI coding assistants like Claude Code and Cursor, it enables reliable programmatic browser control through tool calls, though it also serves developers needing scriptable, stateful web automation without the overhead of repeatedly launching new browser instances.","description":null,"stars":149,"language":"TypeScript"},{"owner":"Lcharvol","repo":"MacSift","url":"https://github.com/Lcharvol/MacSift","readme":"<div align=\"center\">\n\n<img src=\"docs/images/icon-512.png\" width=\"120\" alt=\"MacSift\">\n\n# MacSift\n\n**A transparent disk cleaner for macOS Tahoe.**\n\nSee exactly what's taking up space, group it by the app that owns it,\nand move everything to the Trash — never permanent deletion.\n\n**[Website](https://lcharvol.github.io/MacSift/) · [Download latest](https://github.com/Lcharvol/MacSift/releases/latest/download/MacSift.zip) · [Release notes](https://github.com/Lcharvol/MacSift/releases/latest)**\n\n</div>\n\n---\n\n## Why another disk cleaner?\n\nCommercial Mac cleaners all have the same problem: you press a big button\nand they \"clean\" a few gigabytes you never see. You trust them by default.\nIf anything important disappears, it's already gone.\n\nMacSift is the opposite:\n\n- Everything you're about to delete is listed, grouped, and labeled.\n- Selected items go to the **Trash**, not `rm -rf`. Finder restores anything\n  until you empty it.\n- **Dry run is on by default** for first-time users.\n- Destructive actions require an explicit confirmation; deletions above 10&nbsp;GB\n  show an extra warning.\n- Zero network calls. Zero telemetry. 100 tests, all green.\n- Every scan completion and cleanup run is written to\n  `~/Library/Logs/MacSift/macsift.log` so you can audit what the app did\n  without a debugger.\n\n## Install\n\n### Option A — Homebrew (one command)\n\n```bash\nbrew tap Lcharvol/macsift\nbrew install --cask macsift\n```\n\nThe tap lives at [Lcharvol/homebrew-macsift](https://github.com/Lcharvol/homebrew-macsift).\nSince MacSift isn't notarized yet, the cask's `postflight` strips the\n`com.apple.quarantine` attribute automatically — you can double-click\nthe installed `MacSift.app` without the right-click → Open dance.\n\nUpgrade later with `brew upgrade --cask macsift`. Uninstall with\n`brew uninstall --cask --zap macsift` to also remove settings and logs.\n\n### Option B — Download the release\n\n1. Download [**MacSift.zip**](https://github.com/Lcharvol/MacSift/releases/latest/download/MacSift.zip) (1.5&nbsp;MB, Apple Silicon).\n2. Unzip and **drag `MacSift.app` into `/Applications`** before opening it.\n   Gatekeeper treats apps inside `~/Downloads` more strictly, so moving it\n   first avoids an extra warning.\n3. **First launch:** right-click (or Control-click) `MacSift.app` in\n   `/Applications` → **Open** → confirm the second dialog.\n\n   On macOS Sequoia (15) and later, the right-click trick no longer\n   bypasses Gatekeeper on its own. If you see *\"Apple could not verify\n   'MacSift.app' is free of malware\"*, open **System Settings → Privacy\n   &amp; Security**, scroll to the bottom, and click **Open Anyway**\n   next to the MacSift entry. Relaunch the app — you'll be prompted\n   once more, then every subsequent launch is silent.\n\n   Gatekeeper asks because the app is ad-hoc signed, not notarized\n   (no paid Apple Developer account). Building from source (Option B)\n   is the workaround if you'd rather not go through this.\n4. Grant **Full Disk Access** in System Settings → Privacy &amp; Security →\n   Full Disk Access.\n\n### Option C — Build from source\n\nSame binary, verified from the source tree.\n\n```bash\ngit clone https://github.com/Lcharvol/MacSift.git\ncd MacSift\n./build-app.sh && open MacSift.app\n```\n\nThe build script produces a signed `.app` bundle in one step. macOS 26\n(Tahoe), Apple Silicon, and the Xcode 26 command-line tools are required.\n\n## What it does\n\n- **Scans** `~/Library/Caches`, `~/Library/Logs`, `~/Library/Application Support`,\n  `/tmp`, `/private/var/log`, and your entire home directory for large files.\n- **Detects** Time Machine local snapshots and iOS device backups (device\n  name + date read from `Info.plist`).\n- **Classifies** every file into one of eleven categories:\n  Caches · Logs · Temporary Files · Unused App Data · Large Files ·\n  Time Machine Snapshots · iOS Backups · **Xcode Junk** · **Dev Caches** ·\n  **Old Downloads** · **Mail Attachments**.\n- **Groups** by owning app. `~/Library/Caches/com.apple.Safari/*` — 15,000\n  files — shows up as a single **Safari** row. One decision, not fifteen thousand.\n- **Orphan detection** — `Application Support` folders are only flagged as\n  `.appData` if their owning app is no longer installed in `/Applications`.\n- **Inspector panel** with Reveal in Finder, Quick Look, Copy Path, and\n  a live preview of the top 5 largest files in any selected group.\n- **Moves to Trash** via `FileManager.trashItem`. Never a permanent delete.\n\n## Keyboard shortcuts\n\n| Shortcut | Action |\n|----------|--------|\n| `⌘R` | Start / restart scan |\n| `⌘.` | Cancel scan |\n| `⌘A` | Select all safe items |\n| `⌘⇧A` | Deselect all |\n| `Esc` | Dismiss cleaning preview |\n\nDrop any folder on the window to scan just that folder.\n\n## Safety at the engine level\n\n- `/System`, `/usr`, `/bin`, `/sbin` are **hard-blocked** in `CleaningEngine`\n  before any delete call — not just hidden in the UI.\n- Application Support folders that belong to still-installed apps are\n  never surfaced.\n- Dry run is **on** by default for new installs (`AppState.init` seeds it\n  to `true`).\n- The cleaning flow can't be triggered without passing through\n  `CleaningPreviewView` and an explicit confirmation alert.\n- Selection is stored as a `Set<String>` of SHA-256 file-id hashes so that\n  a re-scan preserves your selection of files that still exist — and drops\n  selections whose files are gone.\n\nIf you'd rather verify than trust, the engine is ~120 lines:\n[`MacSift/Services/CleaningEngine.swift`](MacSift/Services/CleaningEngine.swift).\n\n## Architecture\n\nStrict MVVM. Pure SwiftPM project — no `.xcodeproj`, no Xcode GUI needed.\n\n```\nMacSift/\n├── App/          # MacSiftApp @main, AppState\n├── Models/       # FileCategory, ScannedFile, ScanResult, FileGroup — all Sendable value types\n├── Services/     # DiskScanner, CategoryClassifier, FileGrouper, CleaningEngine,\n│                   TimeMachineService, ExclusionManager\n├── ViewModels/   # ScanViewModel, CleaningViewModel — @MainActor, @Published\n├── Views/        # SwiftUI views. Prefer plain values over VM observation.\n└── Utilities/    # FileSize+Formatting, FileDescriptions, BundleNames, Permissions\n```\n\nThe detailed conventions, performance rules, and debugging lessons are in\n[`CLAUDE.md`](CLAUDE.md) — read that before touching the file list or the\nscanner.\n\n## Development\n\n```bash\nswift build                              # type-check\nswift test                               # 100 tests across 16 suites\nswift test --filter FileGrouper          # run one suite\n./build-app.sh                           # build the .app bundle\n./build-app.sh release                   # release-optimized build\n```\n\nGitHub Actions runs `swift test` on every push to `main` (see\n[`.github/workflows/test.yml`](.github/workflows/test.yml)).\n\n## Known limitations\n\n- **Apple Silicon only.** No Intel build in the current release.\n- **Gatekeeper asks once on first launch** because the app is ad-hoc signed\n  rather than notarized — distributing a notarized binary requires a paid\n  Apple Developer account. Building from source (Option B) is the workaround\n  if you'd rather not trust a pre-built binary.\n- **Dock icon** renders slightly smaller than first-party Tahoe apps because\n  legacy `.icns` icons aren't the new Icon Composer asset format.\n- **Time Machine snapshot deletion** can require admin privileges. If\n  `tmutil deletelocalsnapshots` fails, the cleaning report shows the exact\n  `sudo` command to run in Terminal.\n\n## Uninstall\n\nEasiest way: open **Settings → Uninstall MacSift…** inside the app.\nThat single button:\n\n- erases every MacSift preference (mode, dry-run, threshold, exclusions,\n  lifetime counters)\n- deletes the audit log at `~/Library/Logs/MacSift`\n- removes any `MacSift-<version>.zip` cached update zips and their\n  extracted folders from `~/Downloads`\n- moves `MacSift.app` itself to the Trash\n- quits the app\n\nThe one thing MacSift can't undo for you is the **Full Disk Access\ngrant** — that's managed by macOS's TCC and only you can revoke it, in\nSystem Settings → Privacy & Security → Full Disk Access.\n\nIf you'd rather do it by hand from Terminal:\n\n```bash\n# Quit the app, then:\nrm -rf /Applications/MacSift.app\n\n# Clean up persisted preferences + exclusion list\ndefaults delete com.macsift.app\n\n# Optional: remove the local audit log\nrm -rf ~/Library/Logs/MacSift\n\n# Optional: remove any downloaded update zips\nrm -f ~/Downloads/MacSift-*.zip\nrm -rf ~/Downloads/MacSift-*\n```\n\nMacSift writes to exactly three places on disk — its UserDefaults\ndomain, `~/Library/Logs/MacSift/macsift.log` (capped at ~500 KB), and\nupdate zips in `~/Downloads`. No keychain entries, no LaunchAgents, no\n`~/Library/Application Support/MacSift` folder. Nothing else to clean.\n\n## License\n\nMIT. See [`LICENSE`](LICENSE). Fork it, learn from it, ship your own\nversion — just keep the copyright notice. The cleaning engine in\nparticular is worth reading even if you don't plan to use the app.\n","summary":" MacSift is a transparent disk cleaning utility for macOS that reveals exactly which files are consuming space, grouped by their owning application, before any deletion occurs. Unlike commercial alternatives that operate as black boxes, it defaults to dry-run mode, moves selections to the Trash rather than permanently deleting them, and requires explicit confirmation for destructive actions. The application functions entirely offline without telemetry, maintains comprehensive audit logs, and includes extra safeguards for large deletions exceeding 10 GB. It serves macOS users who prioritize visibility and control over their storage management, offering a trustworthy open-source alternative to opaque automated cleaning tools.","description":"Transparent macOS disk cleaner — groups files by app, moves to Trash (never permanent). SwiftUI + Liquid Glass, built for macOS Tahoe.","stars":134,"language":"Swift"},{"owner":"dgr8akki","repo":"nano-ffmpeg","url":"https://github.com/dgr8akki/nano-ffmpeg","readme":"<p align=\"center\">\n  <br>\n  <strong>nano-ffmpeg</strong>\n  <br>\n  <em>Every ffmpeg feature. Zero flags to remember.</em>\n  <br><br>\n  <a href=\"https://nano-ffmpeg.vercel.app\">Website</a> &bull;\n  <a href=\"#quick-start\">Quick Start</a> &bull;\n  <a href=\"#install\">Install</a> &bull;\n  <a href=\"#features\">Features</a> &bull;\n  <a href=\"#usage\">Usage</a> &bull;\n  <a href=\"#cli-options\">CLI Options</a> &bull;\n  <a href=\"#operations\">Operations</a> &bull;\n  <a href=\"#keybindings\">Keybindings</a> &bull;\n  <a href=\"#releasing\">Releasing</a> &bull;\n  <a href=\"#contributing\">Contributing</a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/dgr8akki/nano-ffmpeg/actions/workflows/ci.yml\"><img src=\"https://img.shields.io/github/actions/workflow/status/dgr8akki/nano-ffmpeg/ci.yml?branch=main&label=CI\" alt=\"CI\"></a>\n  <a href=\"https://github.com/dgr8akki/nano-ffmpeg/releases/latest\"><img src=\"https://img.shields.io/github/v/release/dgr8akki/nano-ffmpeg?sort=semver\" alt=\"Latest release\"></a>\n  <a href=\"go.mod\"><img src=\"https://img.shields.io/github/go-mod/go-version/dgr8akki/nano-ffmpeg\" alt=\"Go version\"></a>\n  <a href=\"#license\"><img src=\"https://img.shields.io/github/license/dgr8akki/nano-ffmpeg\" alt=\"License\"></a>\n</p>\n\n---\n\nnano-ffmpeg wraps the full power of ffmpeg in a beautiful, keyboard-driven terminal dashboard. No more googling flags. Browse your files, pick what you want to do, tweak settings with presets, and watch a live progress bar while it encodes.\n\nBuilt for people who know they need ffmpeg but can't remember how to use it.\n\n```\n╭─────────────────────────────────────────────────────────────────────╮\n│  nano-ffmpeg > Home                                                 │\n├─────────────────────────────────────────────────────────────────────┤\n│                                                                     │\n│  ╭──────────────────────────────────────────────────────────────╮   │\n│  │  ffmpeg 8.1                                                  │   │\n│  │  497 codecs  |  231 encoders  |  234 formats  |  489 filters │   │\n│  │  HW Accel: videotoolbox                                      │   │\n│  ╰──────────────────────────────────────────────────────────────╯   │\n│                                                                     │\n│  RECENT FILES                                                       │\n│     interview.mp4    ~/Videos                                       │\n│     concert.mkv      ~/Downloads                                    │\n│                                                                     │\n│  OPERATIONS                                                         │\n│   > Convert Format     Change container or codec                    │\n│     Extract Audio      Strip video, keep audio                      │\n│     Resize / Scale     Change resolution                            │\n│     Trim / Cut         Cut segments by time                         │\n│     Compress           Reduce file size                             │\n│     ...                                                             │\n│                                                                     │\n├─────────────────────────────────────────────────────────────────────┤\n│  ↑↓ Navigate   Enter Select   q Quit   ? Help                      │\n╰─────────────────────────────────────────────────────────────────────╯\n```\n\n## Quick Start\n\nIf you already have `ffmpeg` and `ffprobe` on your `PATH`:\n\n```bash\n# macOS (Homebrew tap -- also pulls ffmpeg-full):\nbrew install dgr8akki/tap/nano-ffmpeg\nnano-ffmpeg\n```\n\n```powershell\n# Windows (Scoop -- pulls ffmpeg from the extras bucket):\nscoop bucket add extras\nscoop bucket add nano-ffmpeg https://github.com/dgr8akki/scoop-bucket\nscoop install nano-ffmpeg\nnano-ffmpeg\n```\n\n```bash\n# Any Go toolchain:\ngo install github.com/dgr8akki/nano-ffmpeg@latest\nnano-ffmpeg\n```\n\nJump straight into a specific file without clicking through the file picker:\n\n```bash\nnano-ffmpeg -d ~/Videos/interview.mp4\n```\n\nThe TUI takes you from there: pick an operation, tweak the pre-filled defaults, hit Enter. See [Usage](#usage) for the full flow and [CLI Options](#cli-options) for every flag.\n\n## Features\n\n**Core**\n- 12 ffmpeg operations accessible through guided, multi-screen workflows\n- Pre-filled defaults for every operation so you can hit Enter without thinking about flags\n- Command preview on every settings screen -- see the exact `ffmpeg` command before it runs\n- Trim pre-fills the input's total duration; Stabilize automatically falls back to `deshake` if `vidstab` isn't in your ffmpeg build\n\n**Progress Tracking**\n- Gradient progress bar (green-to-cyan) with percentage\n- Real-time stats: elapsed, ETA (smoothed over rolling window), speed, FPS, bitrate, frames, output size\n- Braille-dot spinner for indeterminate operations (stream copy, concat)\n- Scrollable live log of raw ffmpeg output\n- Cancel with confirmation (`Esc` > `y`)\n\n**File Handling**\n- Built-in file browser with directory navigation\n- Path input mode (toggle with `/`) for when you know exactly where your file is\n- Inline `ffprobe` metadata preview: codec, resolution, framerate, audio, duration, size\n- Recent files list on the home screen\n\n**Intelligence**\n- Capability detection: probes your ffmpeg build on startup and reports codec/format/filter/HW-accel counts on the Home screen\n- Hardware acceleration detection: shows available accelerators (VideoToolbox, NVENC, VAAPI) on Home (note: detected accelerators are not yet applied to encode commands -- see `docs/future_scope.md`)\n- Human-readable error translation: converts cryptic ffmpeg errors into actionable messages\n- Capability cache at `~/.config/nano-ffmpeg/capabilities.json` (invalidated on version change)\n\n**Polish**\n- Context-sensitive help overlay (`?` on any screen)\n- Persistent config: recent files, preferences at `~/.config/nano-ffmpeg/config.json`\n- Responsive layout with 80x24 minimum terminal size detection\n- Keyboard-first design with vim-style navigation (`j`/`k`)\n\n## Requirements\n\n- **ffmpeg** and **ffprobe** installed and available in `$PATH`\n- For full Stabilize support (`vidstabdetect`/`vidstabtransform`), use an ffmpeg build with `libvidstab` (Homebrew: `ffmpeg-full`)\n- Go 1.22+ (for building from source)\n- Terminal: 80x24 minimum\n\n### Installing ffmpeg\n\n```bash\n# macOS\nbrew install ffmpeg-full\n\n# macOS (minimal build, Stabilize falls back to deshake)\nbrew install ffmpeg\n\n# Ubuntu / Debian\nsudo apt install ffmpeg\n\n# Fedora\nsudo dnf install ffmpeg\n\n# Arch\nsudo pacman -S ffmpeg\n\n# Windows (Scoop, recommended -- matches what nano-ffmpeg pulls in)\nscoop bucket add extras\nscoop install extras/ffmpeg\n\n# Windows (winget)\nwinget install ffmpeg\n\n# Windows (Chocolatey)\nchoco install ffmpeg\n```\n\n## Install\n\n**Homebrew -- macOS / Linux (recommended):**\n\n```bash\nbrew install dgr8akki/tap/nano-ffmpeg\n```\n\nThe Homebrew tap installs `ffmpeg-full` as a dependency so Stabilize, thumbnails, etc. work out of the box.\n\n**Scoop -- Windows (recommended):**\n\n```powershell\nscoop bucket add extras\nscoop bucket add nano-ffmpeg https://github.com/dgr8akki/scoop-bucket\nscoop install nano-ffmpeg\n```\n\nThe Scoop manifest declares `extras/ffmpeg` as a dependency, so Scoop pulls ffmpeg/ffprobe for you. Installs are user-scope (no admin prompt).\n\n**Arch Linux (AUR):**\n\n```bash\nyay -S nano-ffmpeg\n```\n\n**Download binary:**\n\nGrab a prebuilt binary from [GitHub Releases](https://github.com/dgr8akki/nano-ffmpeg/releases/latest) for your platform (macOS, Linux, Windows).\n\n**Go install:**\n\n```bash\ngo install github.com/dgr8akki/nano-ffmpeg@latest\n```\n\n**Build from source:**\n\n```bash\ngit clone https://github.com/dgr8akki/nano-ffmpeg.git\ncd nano-ffmpeg\ngo build -o nano-ffmpeg .\n./nano-ffmpeg\n```\n\n## Usage\n\nRun with no arguments to open the TUI:\n\n```bash\nnano-ffmpeg\n```\n\nThe TUI guides you through the full flow:\n\n```\nHome  -->  File Picker  -->  Operations  -->  Settings  -->  Progress  -->  Result\n                                                                              |\n                                                                         Back to Home\n```\n\n1. **Home** -- See your ffmpeg version, capabilities, and recent files. Pick an operation.\n2. **File Picker** -- Browse to your file or type a path. See metadata inline.\n3. **Operations** -- Choose what to do (convert, compress, trim, etc.).\n4. **Settings** -- Configure with pre-filled defaults. See the ffmpeg command live.\n5. **Progress** -- Watch encoding with a live progress bar, ETA, and stats.\n6. **Result** -- See output path, before/after size comparison. Do another or quit.\n\nAll flags are optional; see [CLI Options](#cli-options) for the full list and examples.\n\n## CLI Options\n\n| Flag | Short | Value | Description |\n|------|-------|-------|-------------|\n| `--theme` | `-t` | `dark` \\| `light` | Theme override for this run. Without the flag, the theme from `~/.config/nano-ffmpeg/config.json` is used. |\n| `--dir` | `-d` | `<directory>` | Open the File Picker pre-focused on this directory. |\n| `--dir` | `-d` | `<file>` | Skip the File Picker and jump straight to Operations with this file preloaded (the file is probed and added to the recent-files list). |\n| `--version` | -- | -- | Print the version and exit. |\n| `--help` | `-h` | -- | Print usage and exit. |\n\nExamples:\n\n```bash\n# Force a theme for a single run\nnano-ffmpeg --theme light\nnano-ffmpeg -t dark\n\n# Open the File Picker at a folder\nnano-ffmpeg -d ~/Videos\n\n# Skip the File Picker entirely\nnano-ffmpeg -d ~/Videos/interview.mp4\n```\n\n## Operations\n\n| Operation | What it does | Key settings |\n|-----------|-------------|--------------|\n| **Convert Format** | Change container/codec | MP4, MKV, WebM, AVI, MOV; H.264, H.265, AV1, VP9; CRF quality, preset speed, audio codec |\n| **Extract Audio** | Strip video, keep audio track | MP3, AAC, FLAC, WAV, OGG, Opus; bitrate presets (64k-320k) |\n| **Resize / Scale** | Change output height | 4K, 1080p, 720p, 480p, 360p; H.264 or H.265 (aspect ratio field is shown but currently has no effect -- see `docs/future_scope.md`) |\n| **Trim / Cut** | Cut segments by time | Start/end time (end pre-filled from ffprobe); lossless cut (stream copy) toggle |\n| **Compress** | Reduce file size | CRF quality; H.264/H.265/AV1; preset speed (the Two-Pass toggle is shown but currently inert -- see `docs/future_scope.md`) |\n| **Merge / Concat** | Join multiple files in the same folder with the same extension | Alphabetical order; stream copy or re-encode to H.264/AAC |\n| **Add Subtitles** | Burn-in or embed existing subtitle streams from the input | Picks a subtitle track from the input file; font/size/position customization is not yet exposed |\n| **Create GIF** | Animated GIF from video | 10/15/24 fps; width presets; palette optimization (only GIF output today; WebP planned) |\n| **Extract Thumbnails** | Grab frames as images (PNG) | Single frame at a timestamp, 4x4 contact sheet, or every 5 seconds |\n| **Watermark** | Overlay a solid white color box | 5-position grid (corners + center), opacity, size presets (image and text overlays planned) |\n| **Audio Adjustments** | Normalize, volume, fade | loudnorm, dB boost/reduce, fade in/out, remove audio |\n| **Video Filters** | Stabilize, deinterlace, speed, rotate, flip | vidstab (or deshake fallback), yadif, 2x/0.5x speed, rotate 90°, horizontal/vertical flip |\n\n## Progress Screen\n\n```\n  input.mkv  -->  input_compressed.mp4\n\n  ████████████████████████████░░░░░░░░░░░░  63.4%\n\n  Elapsed   00:01:23        Frames    4,521\n  ETA       00:00:48        Size      142.3 MB\n  Speed     2.3x            Bitrate   8241 kbps\n  FPS       54.2\n  \n  ╭─ Live Log ─────────────────────────────────────────────╮\n  │ frame= 4521 fps=54.2 q=28.0 size= 148736kB time=...   │\n  │ frame= 4548 fps=54.1 q=28.0 size= 149120kB time=...   │\n  ╰────────────────────────────────────────────────────────╯\n```\n\n- Progress bar gradient: green (0%) to cyan (100%)\n- ETA smoothed with rolling average over last 5 updates (no jitter)\n- Braille spinner (`⠋⠙⠹⠸⠼⠴⠦⠧⠇⠏`) for indeterminate operations\n- Cancel with `Esc` > confirm with `y`\n\n## Keybindings\n\n### Global\n\n| Key | Action |\n|-----|--------|\n| `q` | Quit |\n| `Ctrl+C` | Force quit |\n| `?` | Toggle help overlay |\n\n### Navigation\n\n| Key | Action |\n|-----|--------|\n| `↑` / `k` | Move up |\n| `↓` / `j` | Move down |\n| `Enter` | Select / confirm / execute |\n| `Esc` | Go back one screen |\n\n### File Picker\n\n| Key | Action |\n|-----|--------|\n| `Enter` | Open directory / select file |\n| `Backspace` | Go to parent directory |\n| `/` | Toggle path input mode |\n\n### Settings\n\n| Key | Action |\n|-----|--------|\n| `←` / `→` | Change field value (select/toggle) or move the text cursor |\n| Typing | Edit text fields (Start Time, End Time, Duration, Timestamp) |\n| `Enter` | Execute the ffmpeg command |\n\n### Progress\n\n| Key | Action |\n|-----|--------|\n| `Esc` | Cancel (with confirmation) |\n| `y` / `n` | Confirm or deny cancellation |\n\n## Configuration\n\nConfig is stored at `~/.config/nano-ffmpeg/config.json`:\n\n```json\n
