corn/tree/tci-emscripten)\n\nFriends helped with feedback:\n- [@Lakr233](https://github.com/Lakr233)\n\n","summary":" SideImpactor is a browser-based tool for signing and installing iOS IPA files, enabling users to pair devices via WebUSB, authenticate with their Apple Developer account, and deploy applications directly from a web page without desktop software dependencies. The project leverages WebAssembly to run native signing tools—including zsign for re-signing, OpenSSL for cryptographic operations, and libcurl for Apple API communication—within the browser, supported by a React frontend and an optional Cloudflare Workers backend. It is designed for developers and power users seeking a cross-platform, self-hostable alternative to traditional macOS-based sideloading workflows, with deployment options including Docker and local development via Bun.","description":"pure frontend ipa signing page.","stars":440,"language":"JavaScript"},{"owner":"indragiek","repo":"GHFS","url":"https://github.com/indragiek/GHFS","readme":"# GHFS\n\nGHFS is a macOS application that mounts your GitHub repositories as a read-only virtual filesystem using [FSKit](https://developer.apple.com/documentation/fskit). Browse repository contents as if they were local directories — repositories are cloned on demand, and file reads are served from the GitHub API while the clone completes in the background.\n\n<p align=\"center\">\n  <img width=\"365\" height=\"213\" src=\"./images/menubar.png\" alt=\"GHFS Menubar UI\">\n</p>\n\n**Key features:**\n\n- Self-contained, no external dependencies required (macFUSE, git, gh, etc.)\n- Mount-time repository discovery from your GitHub account, plus opt-in public repository search\n- On-demand repository cloning with automatic background refresh of cloned repositories\n\n## System Requirements\n\n- macOS 26.4 or later\n- Xcode (for building from source)\n\n## Installation\n\nThe easiest way to use GHFS is to download a prebuilt binary from the [latest release](https://github.com/indragiek/GHFS/releases/latest) on GitHub. Open the downloaded `.dmg` and drag `GHFS.app` into your Applications folder. Releases are signed with a Developer ID certificate and notarized by Apple.\n\nIf you'd rather build from source, see [Building](#building) below.\n\n## Building\n\n### Credentials setup\n\nA source build needs a `Credentials.xcconfig` file containing your GitHub OAuth app credentials (so GHFS can authenticate users) and your Apple Developer Team ID (so Xcode can sign the app and the FSKit extension). Prebuilt binaries ship with all of these baked in, so this step only applies when building from source.\n\nStart by copying the template:\n\n```sh\ncp Credentials.xcconfig.template Credentials.xcconfig\n```\n\n`Credentials.xcconfig` is gitignored. The OAuth values are consumed at build time by a Run Script phase that generates `GeneratedSecrets.swift` — the app will fatal-error on launch if any OAuth value is missing or still set to the placeholder. The Team ID flows into `DEVELOPMENT_TEAM` via the project's base configuration, so a missing or wrong value will cause code-signing to fail at build time.\n\nThen fill in the three values as described below.\n\n#### `GHFS_OAUTH_CLIENT_ID` and `GHFS_OAUTH_CLIENT_SECRET`\n\n1. Go to <https://github.com/settings/developers> → **OAuth Apps** → **New OAuth App**.\n2. Fill in the form:\n   - **Application name**: anything you like, e.g. `GHFS (local build)`\n   - **Homepage URL**: any valid URL\n   - **Authorization callback URL**: `ghfs://oauth-callback` — must match exactly. This is the custom URL scheme the app listens on for the OAuth redirect.\n   - Leave **Enable Device Flow** unchecked.\n3. Click **Register application**. On the next page, note the **Client ID**, then click **Generate a new client secret** to create a client secret. Copy the secret immediately — GitHub will only show it once.\n4. Paste the two values into `Credentials.xcconfig`:\n\n   ```\n   GHFS_OAUTH_CLIENT_ID = <your client id>\n   GHFS_OAUTH_CLIENT_SECRET = <your client secret>\n   ```\n\n#### `GHFS_DEVELOPMENT_TEAM`\n\nThis is your 10-character Apple Developer Team ID. You need an Apple Developer account (free or paid) signed into Xcode; the free tier is sufficient for local development.\n\nTo find your Team ID, either:\n\n- Sign in at <https://developer.apple.com/account> → **Membership details**. The **Team ID** is listed there.\n- Or, from the terminal with an active signing identity in your keychain:\n\n  ```sh\n  security find-identity -v -p codesigning\n  ```\n\n  The parenthesized suffix on each `Apple Development: …` / `Developer ID Application: …` line is your Team ID.\n\nPaste it into `Credentials.xcconfig`:\n\n```\nGHFS_DEVELOPMENT_TEAM = <your 10-character team id>\n```\n\n### Build\n\nBuild the app using the provided build script:\n\n```sh\nScripts/build.sh\n```\n\nThe built app is placed in `out/GHFS.app`. The script also handles code signing validation and FSKit extension registration.\n\n### Options\n\n| Flag | Description |\n|---|---|\n| `--debug` | Build with Debug configuration (default) |\n| `--release` | Build with Release configuration |\n| `--run` | Launch the app after building and tail logs |\n| `--log-level LEVEL` | Set log level for log stream: `default`, `info`, `debug` |\n\nOn the first build, libgit2 is compiled from source automatically (one-time setup).\n\n## Running Tests\n\nRun the integration test suite:\n\n```sh\nScripts/test.sh\n```\n\nTests exercise the live GHFS mount against the GitHub API and verify behavior via post-run log analysis. The test runner builds the app, launches it, waits for the filesystem to mount, and runs `swift test` against it.\n\n### Options\n\n| Flag | Description |\n|---|---|\n| `--skip-build` | Skip the build step (use if the app is already built and mounted) |\n| `--clone-trigger MODE` | Run only with the given initial clone trigger mode (`onFileRead` or `onDirectoryListing`). If omitted, both modes run sequentially. |\n\n### Prerequisites\n\nBefore running tests, ensure:\n\n1. The FSKit extension is enabled in **System Settings > Login Items & Extensions > By Category > File System Extensions** (enable \"GHFS”).\n2. You have completed onboarding (signed in with GitHub).\n\n![Extension Settings](./images/extension_settings.png)\n\n## Settings\n\nGHFS provides the following settings and repository-selection controls in the app's Settings window:\n\n| Setting | Description | Default |\n|---|---|---|\n| **Mount on Startup** | Automatically mount the filesystem when GHFS launches | On |\n| **Launch on Login** | Start GHFS automatically when you log in | Off |\n| **Hide Dock Icon** | Hide the GHFS icon from the Dock | On |\n| **Mount Path** | Directory where the filesystem is mounted | `~/ghfs` |\n| **Initial Clone Trigger** | When to start cloning a repo — on first file read, or when the repo folder is listed | On file read |\n| **Refresh Interval** | How often to re-fetch each cloned repository's working tree from the remote | 24 hours |\n| **Refresh Trigger** | When a cloned-repository refresh runs after the interval elapses — immediately, on directory listing, or on file read | On file read |\n| **Repository Selection** | User repositories are enabled by default and can be disabled individually or in bulk; public repositories can be searched and enabled individually | User repos enabled, public repos disabled |\n\n## License\n\nThis project is licensed under the MIT License. See [LICENSE.md](LICENSE.md) for details.\n\n## Developer\n\nCreated by [Indragie Karunaratne](mailto:i@indragie.com)\n","summary":" GHFS is a macOS application that mounts GitHub repositories as a read-only virtual filesystem using Apple's FSKit framework, allowing users to browse repository contents as if they were local directories without requiring external dependencies like macFUSE, git, or the GitHub CLI. It serves file reads directly from the GitHub API while cloning repositories on demand in the background, featuring automatic discovery of your GitHub repos, optional public repository search, and background refresh capabilities. The self-contained app requires macOS 26.4 or later and authenticates via OAuth to provide seamless access to remote code. It is ideal for developers who need quick, filesystem-level access to GitHub repositories without the overhead of manual cloning or managing additional command-line tools.","description":"Mount GitHub repositories as a virtual read-only macOS filesystem","stars":310,"language":"Swift"},{"owner":"KurtGokhan","repo":"tegaki","url":"https://github.com/KurtGokhan/tegaki","readme":"# Tegaki\n\n**Handwriting animation for any font**\n\nTegaki (手書き) turns any font into animated handwriting.\nNo manual path authoring. No native dependencies. Just pick a font.\n\n[![npm](https://img.shields.io/npm/v/tegaki)](https://www.npmjs.com/package/tegaki)\n[![license](https://img.shields.io/npm/l/tegaki)](https://github.com/KurtGokhan/tegaki/blob/main/LICENSE)\n\n<br clear=\"both\" />\n\n<p align=\"center\">\n  <img src=\"media/hello-world.svg\" alt=\"Hello World handwriting animation\" width=\"500\" />\n</p>\n\n---\n\n## Quick Start\n\n**1. Install**\n\n```bash\nnpm install tegaki\n```\n\n**2. Use** (React example)\n\n```tsx\nimport { TegakiRenderer } from 'tegaki';\nimport caveat from 'tegaki/fonts/caveat';\n\nfunction App() {\n  return (\n    <TegakiRenderer font={caveat} style={{ fontSize: '48px' }}>\n      Hello World\n    </TegakiRenderer>\n  );\n}\n```\n\nThat's it. The text draws itself stroke by stroke with natural timing.\n\n## Framework Support\n\nTegaki works with all major frameworks:\n\n```tsx\nimport { TegakiRenderer } from 'tegaki/react';   // React\nimport { TegakiRenderer } from 'tegaki/svelte';  // Svelte\nimport { TegakiRenderer } from 'tegaki/vue';     // Vue\nimport { TegakiRenderer } from 'tegaki/solid';   // SolidJS\n```\n\n```astro\n---\nimport TegakiRenderer from 'tegaki/astro';       // Astro\n---\n```\n\n```ts\nimport { TegakiEngine } from 'tegaki/core';      // Vanilla JS\nimport { registerTegakiElement } from 'tegaki/wc'; // Web Components\n```\n\n## Built-in Fonts\n\nFour handwriting fonts are bundled and ready to use:\n\n- **Caveat** — `tegaki/fonts/caveat`\n- **Italianno** — `tegaki/fonts/italianno`\n- **Tangerine** — `tegaki/fonts/tangerine`\n- **Parisienne** — `tegaki/fonts/parisienne`\n\nFor other fonts, use the [interactive generator](https://gkurt.com/tegaki/generator/) to create a custom bundle.\n\n## Documentation\n\nVisit **[gkurt.com/tegaki](https://gkurt.com/tegaki)** for full documentation:\n\n- [Getting Started](https://gkurt.com/tegaki/getting-started/)\n- [Framework Guides](https://gkurt.com/tegaki/frameworks/react/) (React, Svelte, Vue, SolidJS, Astro, Web Components, Vanilla)\n- [Generating Fonts](https://gkurt.com/tegaki/guides/generating/)\n- [API Reference](https://gkurt.com/tegaki/api/renderer/)\n\n## License\n\n[MIT](LICENSE)\n","summary":" Tegaki is a JavaScript library that transforms any font into animated handwriting, rendering text stroke-by-stroke with natural timing without requiring manual path authoring or native dependencies. It offers broad framework support including React, Svelte, Vue, SolidJS, Astro, Web Components, and vanilla JavaScript, along with four built-in handwriting fonts and the ability to generate custom font bundles. Developers looking to add dynamic handwriting effects to web applications can use Tegaki to create self-drawing text animations with minimal setup by simply selecting a font and wrapping text in the provided renderer component.","description":"Handwriting animation for the web. Supports any font or text.","stars":2076,"language":"TypeScript"},{"owner":"xataio","repo":"xata","url":"https://github.com/xataio/xata","readme":"<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://xata.io/images/xata-brand-assets/logo-wordmark/logo-wordmark-dark-mode.svg\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://xata.io/images/xata-brand-assets/logo-wordmark/logo-wordmark-light-mode.svg\">\n    <img width=\"400\" alt=\"Xata\" src=\"https://xata.io/images/xata-brand-assets/logo-wordmark/logo-wordmark-dark-mode.svg\">\n  </picture>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/xataio/xata/blob/main/LICENSE\"><img src=\"https://img.shields.io/badge/License-Apache_2.0-green\" alt=\"License - Apache 2.0\"></a>&nbsp;\n  <a href=\"https://twitter.com/xata\"><img src=\"https://img.shields.io/badge/@xata-6c47ff?label=Follow&logo=x\" alt=\"X (formerly Twitter) Follow\" /> </a>\n  <a href=\"https://bsky.app/profile/xata.io\"><img src=\"https://img.shields.io/badge/@xata-6c47ff?label=Follow&logo=bluesky\" alt=\"Bluesky Follow\" /> </a>\n  <a href=\"https://www.youtube.com/@xataio\"><img src=\"https://img.shields.io/badge/@xataio-6c47ff?label=Youtube&logo=youtube\" alt=\"Youtube Subscribe\" /> </a>\n</p>\n\n# Xata - Open-source Postgres platform with CoW branching\n\nXata is a pure open-source, cloud-native, platform for self-hosting a large number of Postgres instances on top of Kubernetes, offering the following functionality (and more) built in:\n\n- Fast branching using Copy-on-Write at the storage level. You can “copy” TB of data in a matter of seconds\n- Scale-to-zero functionality (remove compute instance on inactivity, add it back automatically on connections)\n- Auto-scaling of the compute nodes, bin-packing them for cost efficiency\n- High-availability / Read-replicas with automatic failover\n- Upgrades, configuration edits, scale up/down with minimal downtime via switchover\n- Separation of storage and compute as well as local storage if preferred\n- PITR backups to object storage\n- Serverless driver (SQL over HTTP/websockets)\n- REST APIs and CLI for managing all “control-plane” operations, authenticated with API keys. API Keys support granular RBAC.\n\nIt is stable, actively developed, and used in production at large scale already. It is powering the [Xata Cloud](https://xata.io) service, which we recommend if you prefer a managed service.\n\n## Use cases\n\nThere are two major use cases for self-hosting the Xata open source platform:\n\n- create your own internal Postgres-as-a-Service for your company. In this case Xata provides a more opinionated and more feature-rich solution than using a K8s operator directly.\n- create preview, testing, and dev environments. By taking advantage of the copy-on-write storage and automatic scale-to-zero functionality, you can create “copies” of Postgres instances with TB of data  in a matter of seconds and with incredible cost efficiency.\n\n**When NOT to use Xata open source**\n\n- If you just need a single Postgres instance. Xata is running on top of a Kubernetes cluster and would be overkill in that case. You can either simply self-host Postgres on your own, or use a managed Postgres service, like Xata Cloud.\n- If you want to create a public Postgres-as-a-Service to offer to end customers. While the license allows this use case (nor do we have any intention to change it in the future), we don’t recommend using it like this because we have kept closed-source some security features related to adversarial multi-tenancy. If you’d like to build a self-hosted PGaaS to offer to end customers, please contact us, likely the Xata BYOC offering is right for you.\n\n<p align=\"center\">\n    <img src=\"images/xata-oss-diagram.png\" alt=\"Xata OSS architecture diagram\" width=\"750\">\n</p>\n\nXata is built on top of two key open-source cloud-native technologies:\n\n- [CloudNativePG](https://github.com/cloudnative-pg/cloudnative-pg) is a Postgres operator for Kubernetes. It handles most of the typical production concerns: high-availability, failover/switchover, upgrades, connection pooling, backups, etc.\n- [OpenEBS](https://github.com/openebs/openebs), is a a cloud native storage project, offering both local storage (i.e. local NVMe disks) as well as a replicated storage engine (Mayastor - NVMe-of).\n\nOn top of these two, the Xata platform adds:\n\n- **SQL gateway**, responsible for routing, ip filtering, waking up scaled-to-zero clusters, serving the serverless driver over HTTP/websockets, etc.\n- **Branch operator** managing all resources related to a branch.\n- **clusters** and **projects** services which form the control-plane and serve the REST APIs.\n- **Auth service**, based on Keycloak.\n- **CLI** that makes use of the REST API.\n- **Scale-to-zero CNPG plugin** for automatically hibernating branches on inactivity.\n\nFor more details about the Xata architecture, see [this blog post](https://xata.io/blog/open-source-postgres-branching-copy-on-write).\n\n## Quick start guide & development\n\nTo run locally, you need the following prerequisites:\n- Docker\n- [Kind](https://github.com/kubernetes-sigs/kind)\n- [Tilt](https://github.com/tilt-dev/tilt)\n\n**Step 1:** create kind cluster\n\n```bash\nkind create cluster --wait 10m\n```\n\n**Step 2:** deploy via tilt\n\n```bash\ntilt up\n```\n\nWait until all resources are up. This might take a long time when you run it for the first time, because it needs to download all the required images. Next time you start it, it should be much quicker.\n\n**Step 3:** install and authenticate the xata CLI:\n\n```bash\n# Install CLI\ncurl -fsSL https://xata.io/install.sh | bash\n\n# Authenticate to a local profile. Sign in with email dev@xata.tech and password Xata1234!\nxata auth login --profile local --env local --force\n\n# Set the profile\nxata auth switch local\n```\n\n**Step 4:** Create the first project and branch\n\n```bash\n# Create project and main branch\n$ xata project create --name my-project\n\n# Create a child branch\n$ xata branch create\n```\n\n## License\n\nApache 2\n\n## Getting help\n\nIf you are considering adopting Xata in your organization, we'd love to hear from you and help you. Please open either a [GitHub discussion](https://github.com/xataio/xata/discussions) or contact us by [email](mailto:info@xata.io).\n","summary":" Xata is an open-source, cloud-native platform for self-hosting PostgreSQL at scale on Kubernetes, enabling organizations to manage numerous database instances with enterprise-grade reliability and operational features. Its core capabilities include storage-level Copy-on-Write branching for instant multi-terabyte database clones, automatic scale-to-zero to optimize costs, high availability with automatic failover, and serverless SQL access over HTTP. The platform is particularly valuable for engineering teams building internal Database-as-a-Service offerings or requiring rapid, cost-effective provisioning of ephemeral development, testing, and preview environments. Built atop CloudNativePG and OpenEBS, it provides a production-ready alternative to managed services for organizations requiring sophisticated, self-hosted Postgres infrastructure.","description":"Open source, cloud native, Postgres platform with copy-on-write branching and scale-to-zero","stars":639,"language":"Go"},{"owner":"WeaveMindAI","repo":"weft","url":"https://github.com/WeaveMindAI/weft","readme":"# Weft\n\n> **Building in public, two months in.** Weft is young. The language, the type system, and the durable executor are the stable parts. The node catalog is small and intentionally opinionated (a few dozen nodes across LLM, code, communication, flow, storage, and triggers). The long-term vision is to let projects define their own nodes fluently in the language itself, but that is still ahead. If you are evaluating it for production, treat it as a foundation to build on, not a finished product. Breaking changes are expected while the shape is still settling; they will be announced, and migration notes will come with them.\n>\n> **Note on the docs.** This README, `DESIGN.md`, `CONTRIBUTING.md`, `CODE_OF_CONDUCT.md`, and most of the prose around the project were written fast to get the open source release out the door. They may sound a bit AI-generated in places. If you have the time and taste to rewrite any of them more cleanly, please do. A PR that improves the writing is as welcome as one that fixes a bug.\n\n**A programming language for AI systems.**\n\nIn 2026, real software calls LLMs, spins up databases, waits for humans, browses the web, coordinates agents. Where are those primitives? You are still importing libraries and writing plumbing for things that should be one line.\n\nWeft is a language where LLMs, humans, APIs, and infrastructure are base ingredients. You wire them together, the compiler checks the architecture, and you get a visual graph of your program automatically. No plumbing.\n\n- **First-class humans.** Pause mid-program, send a form to a human, wait days, resume exactly where you left off. One node. No webhooks, no polling, no state management.\n- **Recursively foldable.** Any group of nodes collapses into a single node with a described interface. A 100-node system still looks like 5 blocks at the top level.\n- **Typed end to end.** Generics, unions, type variables, null propagation. The compiler catches missing connections, type mismatches, and broken architecture before anything runs.\n- **Durable execution.** Programs survive crashes and restarts via [Restate](https://restate.dev). A human approval that takes three days is the same code as one that takes three seconds.\n- **Built-in nodes.** LLM, Code, HTTP, Human Query, Gate, Template, Discord, Slack, Telegram, WhatsApp, Email, X, Postgres, Memory, Apollo, Web Search, and more, the end goal will be to allow AI to build custom node on the fly using the langauge features (this is not the case right now).\n- **Two native views.** Same program, rendered as dense code for AI builders and as a graph for humans. Edit either, the other updates. Nothing is bolted on.\n\nRead the full story: [The Future of Programming (and Why I'm Building a New Language)](https://weavemind.ai/blog/future-of-programming).\n\nFull documentation: [weavemind.ai/docs](https://weavemind.ai/docs).\n\nJoin the community on [Discord](https://discord.com/invite/FGwNu6mDkU).\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=WeaveMindAI%2Fweft&type=date&legend=top-left\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=WeaveMindAI/weft&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=WeaveMindAI/weft&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=WeaveMindAI/weft&type=date&legend=top-left\" />\n </picture>\n</a>\n\n---\n\n## Quick start\n\n### Prerequisites\n\n- [Docker](https://docs.docker.com/get-docker/) for PostgreSQL\n- [Node.js](https://nodejs.org/)\n- macOS only: `brew install bash` (Bash 4+ required).\n\nRust, Restate, and pnpm are installed automatically if missing.\n\n### Run\n\n```bash\ngit clone https://github.com/WeaveMindAI/weft.git\ncd weft\ncp .env.example .env\n# Edit .env to add your API keys (OpenRouter, Tavily, etc.)\n\n# Terminal 1: backend (auto-installs deps, starts PostgreSQL, Restate, all services)\n./dev.sh server\n\n# Terminal 2: dashboard\n./dev.sh dashboard\n```\n\nOpen http://localhost:5173 and build your first project. A tour of the dashboard and a walkthrough of the language live in the [Getting Started](https://weavemind.ai/docs/hello-world) guide.\n\n### VS Code\n\nFrom the parent workspace, run the **Dev Local All** task to start both the server and the dashboard in split terminals.\n\n### API keys\n\nAll keys are optional. Nodes that need one show a clear error at run time if the key is missing.\n\n```bash\nOPENROUTER_API_KEY=     # LLM nodes (OpenRouter)\nTAVILY_API_KEY=         # Web Search nodes\nELEVENLABS_API_KEY=     # Speech-to-Text nodes\nAPOLLO_API_KEY=         # Apollo enrichment nodes\nDISCORD_BOT_TOKEN=      # Discord nodes\n```\n\nPostgreSQL is auto-provisioned via Docker. No manual database setup.\n\n---\n\n## A tiny Weft program\n\n```weft\n# Project: Poem Generator\n# Description: Writes a short poem about any topic\n\ntopic = Text {\n  label: \"Topic\"\n  value: \"the silence between stars\"\n}\n\nllm_config = LlmConfig {\n  label: \"Config\"\n  model: \"anthropic/claude-sonnet-4.6\"\n  systemPrompt: \"Write a short, beautiful poem (4-6 lines) about the given topic.\"\n  temperature: \"0.8\"\n}\n\npoet = LlmInference -> (response: String) {\n  label: \"Poet\"\n}\npoet.prompt = topic.value\npoet.config = llm_config.config\n\noutput = Debug { label: \"Poem\" }\noutput.data = poet.response\n```\n\nFour nodes, four edges. The LLM takes a topic and a config, writes a poem, the Debug node displays it. The compiler already validated every connection and every type before this paragraph finished loading.\n\nFor the full language, start with [Nodes](https://weavemind.ai/docs/nodes), [Connections](https://weavemind.ai/docs/connections), and [Types](https://weavemind.ai/docs/types).\n\n---\n\n## Project layout\n\n```\nweft/\n├── catalog/                # Node definitions (source of truth)\n│   ├── ai/                 #   LLM config and inference\n│   ├── code/               #   Python execution\n│   ├── communication/      #   Discord, Slack, Telegram, WhatsApp, Email, X\n│   ├── data/               #   Text, Number, Dict, List, Pack/Unpack\n│   ├── enrichment/         #   Apollo, Web Search, Speech-to-Text\n│   ├── flow/               #   Gate, Human Query/Trigger\n│   ├── storage/            #   Postgres\n│   └── triggers/           #   Cron, webhooks, polling\n├── crates/\n│   ├── weft-core/          # Type system, Weft compiler, executor, Restate objects\n│   ├── weft-nodes/         # Node trait, registry, node runner binary\n│   ├── weft-api/           # REST API (triggers, files, infra, usage)\n│   └── weft-orchestrator/  # Restate services and Axum project executor\n├── dashboard/              # Web UI (SvelteKit + Svelte 5)\n├── extension/              # Browser extension for human-in-the-loop (WXT)\n├── scripts/\n│   └── catalog-link.sh     # Links catalog/ into crates and dashboard (run by dev.sh)\n├── init-db.sh              # PostgreSQL container setup\n├── cleanup.sh              # Stop services and reset state\n└── dev.sh                  # Development entry point\n```\n\n### How nodes work\n\nThe `catalog/` directory is the source of truth for every node. Each node is a folder with two files:\n\n- `backend.rs`: the Rust implementation (the `Node` trait).\n- `frontend.ts`: the dashboard UI definition (ports, config fields, icon).\n\n`scripts/catalog-link.sh` (run automatically by `dev.sh`) symlinks these into the Rust crate and the dashboard. The `inventory` crate auto-discovers every node at startup. Adding a new node is two files in one folder. The walkthrough is in [CONTRIBUTING.md](./CONTRIBUTING.md).\n\n---\n\n## Development\n\n```bash\n./dev.sh server       # Backend (Restate + orchestrator + API + node runner)\n./dev.sh dashboard    # Frontend (SvelteKit dev server)\n./dev.sh all          # Both (server in background, dashboard in foreground)\n./dev.sh extension    # Build browser extension\n\n./cleanup.sh                # Stop everything, clean Restate data + DB\n./cleanup.sh --no-db        # Stop everything but keep database\n./cleanup.sh --services     # Just stop services\n./cleanup.sh --db-destroy   # Remove PostgreSQL container entirely\n```\n\n### Infrastructure nodes\n\nNodes like Postgres Database provision real Kubernetes resources. For local development with infrastructure nodes:\n\n```bash\n# Install kind (local K8s)\ncurl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.31.0/kind-$(uname -s | tr '[:upper:]' '[:lower:]')-amd64\nchmod +x ./kind && sudo mv ./kind /usr/local/bin/kind\n\n# Run with local K8s\nINFRASTRUCTURE_TARGET=local ./dev.sh server\n```\n\nInfrastructure is optional. Projects that do not use infrastructure nodes do not need Kubernetes at all.\n\n### Building without Docker\n\nThe `.sqlx` directory is committed, so `cargo build` and `cargo test` work without a running database:\n\n```bash\ncargo build          # works without PostgreSQL\ncargo test           # works without PostgreSQL\n```\n\n---\n\n## Where to go next\n\n- **Use Weft.** Build your first project: [Getting Started](https://weavemind.ai/docs/hello-world).\n- **Learn the language.** Start with [Nodes](https://weavemind.ai/docs/nodes), [Connections](https://weavemind.ai/docs/connections), [Types](https://weavemind.ai/docs/types), [Groups](https://weavemind.ai/docs/groups), [Parallel Processing](https://weavemind.ai/docs/parallel).\n- **Understand the architecture.** [DESIGN.md](./DESIGN.md) lays out the principles that guide every decision in the language.\n- **See what's coming.** [ROADMAP.md](./ROADMAP.md) lists the directions we are exploring.\n- **Contribute.** [CONTRIBUTING.md](./CONTRIBUTING.md) walks through the dev loop, the repo layout, and how to add a node.\n- **Report a security issue.** [SECURITY.md](./SECURITY.md).\n- **Ask a question, share a project, argue with me.** [Discord](https://discord.com/invite/FGwNu6mDkU).\n\n---\n\n## License\n\n[O'Saasy License](./LICENSE). MIT with a SaaS restriction: you can use, modify, and self-host freely, but you cannot offer it as a competing hosted service. See [osaasy.dev](https://osaasy.dev/).\n\nCopyright © 2026 Quentin Feuillade--Montixi.\n","summary":" Weft is an early-stage programming language purpose-built for AI systems, treating LLMs, human interactions, APIs, and infrastructure as native primitives rather than external dependencies. It combines end-to-end static typing, durable execution that survives crashes and long waits for human input, and a unique dual-view interface allowing developers to edit programs as either dense code or auto-generated visual graphs. Ideal for builders creating complex workflows that blend automated AI agents with human approvals and external services, though it currently remains a foundation-in-progress with a limited but expanding node catalog.","description":"A programming language for AI systems","stars":881,"language":"Rust"},{"owner":"Jakubantalik","repo":"border-beam","url":"https://github.com/Jakubantalik/border-beam","readme":"# border-beam\n\nAnimated border beam effect for React. A lightweight component that adds a traveling glow animation around any element — cards, buttons, inputs, or search bars.\n\n## Install\n\n```bash\nnpm install border-beam\n```\n\n## Quick start\n\n```tsx\nimport { BorderBeam } from 'border-beam';\n\nfunction App() {\n  return (\n    <BorderBeam>\n      <div style={{ padding: 32, borderRadius: 16, background: '#1d1d1d' }}>\n        Your content here\n      </div>\n    </BorderBeam>\n  );\n}\n```\n\nThe component wraps your content and overlays the animated beam effect. It auto-detects the `border-radius` of the first child element.\n\n## Sizes\n\nThree built-in size presets control the glow intensity and animation style:\n\n```tsx\n<BorderBeam size=\"md\">  {/* Full border glow (default) */}\n  <Card />\n</BorderBeam>\n\n<BorderBeam size=\"sm\">  {/* Compact glow for small elements */}\n  <IconButton />\n</BorderBeam>\n\n<BorderBeam size=\"line\">  {/* Bottom-only traveling glow */}\n  <SearchBar />\n</BorderBeam>\n```\n\n## Color variants\n\nFour color palettes are available:\n\n```tsx\n<BorderBeam colorVariant=\"colorful\" />  {/* Rainbow spectrum (default) */}\n<BorderBeam colorVariant=\"mono\" />      {/* Grayscale */}\n<BorderBeam colorVariant=\"ocean\" />     {/* Blue-purple tones */}\n<BorderBeam colorVariant=\"sunset\" />    {/* Orange-yellow-red tones */}\n```\n\nAll variants except `mono` animate through a hue-shift cycle.\n\n## Theme\n\nAdapts beam colors for dark or light backgrounds:\n\n```tsx\n<BorderBeam theme=\"dark\" />   {/* Dark background (default) */}\n<BorderBeam theme=\"light\" />  {/* Light background */}\n<BorderBeam theme=\"auto\" />   {/* Detects system preference */}\n```\n\n## Strength\n\nControl the overall intensity of the effect without affecting the wrapped content:\n\n```tsx\n<BorderBeam strength={0.7}>  {/* 70% intensity */}\n  <Card />\n</BorderBeam>\n```\n\n`strength` accepts a value from `0` (invisible) to `1` (full intensity, default).\n\n## Play / pause\n\nToggle the animation on and off with smooth fade transitions:\n\n```tsx\nconst [active, setActive] = useState(true);\n\n<BorderBeam active={active} onDeactivate={() => console.log('faded out')}>\n  <Card />\n</BorderBeam>\n```\n\n## Props\n\n| Prop | Type | Default | Description |\n|------|------|---------|-------------|\n| `children` | `ReactNode` | — | Content to wrap |\n| `size` | `'sm' \\| 'md' \\| 'line'` | `'md'` | Size/type preset |\n| `colorVariant` | `'colorful' \\| 'mono' \\| 'ocean' \\| 'sunset'` | `'colorful'` | Color palette |\n| `theme` | `'dark' \\| 'light' \\| 'auto'` | `'dark'` | Background adaptation |\n| `strength` | `number` | `1` | Effect opacity (0–1), only affects the beam layers |\n| `duration` | `number` | `1.96` / `2.4` | Animation cycle duration in seconds |\n| `active` | `boolean` | `true` | Whether the animation is playing |\n| `borderRadius` | `number` | auto-detected | Custom border radius in px |\n| `brightness` | `number` | `1.3` | Glow brightness multiplier |\n| `saturation` | `number` | `1.2` | Glow saturation multiplier |\n| `hueRange` | `number` | `30` | Hue rotation range in degrees |\n| `staticColors` | `boolean` | `false` | Disable hue-shift animation |\n| `className` | `string` | — | Additional class on the wrapper |\n| `style` | `CSSProperties` | — | Additional inline styles on the wrapper |\n| `onActivate` | `() => void` | — | Called when fade-in completes |\n| `onDeactivate` | `() => void` | — | Called when fade-out completes |\n\nAll standard `HTMLDivElement` attributes are also forwarded to the wrapper.\n\n## How it works\n\n`BorderBeam` renders a wrapper `<div>` with:\n\n- **`::after`** — the beam stroke (conic gradient masked to the border)\n- **`::before`** — inner glow layer\n- **`[data-beam-bloom]`** — outer bloom/glow child div\n\nAll effect layers are absolutely positioned and use `pointer-events: none`, so they never interfere with your content. Animations use CSS `@property` for smooth GPU-accelerated transitions.\n\n## Project structure\n\n```\nborder-beam/\n├── src/\n│   ├── index.ts          # Public exports\n│   ├── BorderBeam.tsx     # React component\n│   ├── types.ts           # TypeScript type definitions\n│   └── styles.ts          # CSS generation engine\n├── demo/                  # Vite + React demo site\n├── dist/                  # Built output (ESM + CJS + types)\n├── package.json\n├── LICENSE\n└── README.md\n```\n\n## Requirements\n\n- React 18+\n- Modern browser with CSS `@property` support (Chrome 85+, Safari 15.4+, Firefox 128+)\n\n## Accessibility\n\nThe effect layers are purely decorative and use `pointer-events: none`. They do not affect keyboard navigation or screen readers. The component respects `prefers-reduced-motion` when implemented by the consumer.\n\n## License\n\n[MIT](./LICENSE)\n","summary":" Border-beam is a React component that adds an animated traveling glow effect around any UI element, such as cards, buttons, or input fields, by wrapping content with an overlay that does not interfere with user interactions. It offers customizable presets for size and color palette—including rainbow, monochrome, ocean, and sunset themes—along with automatic border-radius detection and controls for animation strength, duration, and play state. Developers looking to enhance their React applications with lightweight, GPU-accelerated visual flair can use this component to create attention-grabbing borders without complex custom CSS.","description":"Animated border beam effect for React","stars":543,"language":"TypeScript"},{"owner":"Manavarya09","repo":"design-extract","url":"https://github.com/Manavarya09/design-extract","readme":"<p align=\"center\">\n  <img src=\"website/public/logo-specimen.svg\" alt=\"designlang — reads a website the way a developer reads a stylesheet\" width=\"900\">\n</p>\n\n<p align=\"center\">\n  <a href=\"https://www.npmjs.com/package/designlang\"><img src=\"https://img.shields.io/npm/v/designlang?color=0A0908&labelColor=F3F1EA&label=npm\" alt=\"npm version\"></a>\n  <a href=\"https://github.com/Manavarya09/design-extract/blob/main/LICENSE\"><img src=\"https://img.shields.io/github/license/Manavarya09/design-extract?color=0A0908&labelColor=F3F1EA\" alt=\"license\"></a>\n  <a href=\"https://nodejs.org\"><img src=\"https://img.shields.io/node/v/designlang?color=0A0908&labelColor=F3F1EA\" alt=\"node version\"></a>\n  <a href=\"https://designlang.manavaryasingh.com/\"><img src=\"https://img.shields.io/badge/website-live-FF4800?labelColor=F3F1EA\" alt=\"website\"></a>\n</p>\n\n---\n\n<p align=\"center\">\n  <img src=\"designlang.png\" alt=\"designlang in action\" width=\"100%\">\n</p>\n\n**designlang** crawls any website with a headless browser, extracts every computed style from the live DOM, and generates **8 output files** — including an AI-optimized markdown file, visual HTML preview, Tailwind config, React theme, shadcn/ui theme, Figma variables, W3C design tokens, and CSS custom properties.\n\nBut unlike every other tool out there, it also extracts **layout patterns** (grids, flexbox, containers), captures **responsive behavior** across 4 breakpoints, records **interaction states** (hover, focus, active), scores **WCAG accessibility**, and lets you **compare multiple brands** or **sync live sites to local tokens**.\n\n## Quick Start\n\n```bash\nnpx designlang https://stripe.com\n```\n\nGet everything at once:\n\n```bash\nnpx designlang https://stripe.com --full\n```\n\n## What You Get (8 Files)\n\n| File | What it is |\n|------|------------|\n| `*-design-language.md` | AI-optimized markdown — feed it to any LLM to recreate the design |\n| `*-preview.html` | Visual report with swatches, type scale, shadows, a11y score |\n| `*-design-tokens.json` | [W3C Design Tokens](https://design-tokens.github.io/community-group/format/) format |\n| `*-tailwind.config.js` | Drop-in Tailwind CSS theme |\n| `*-variables.css` | CSS custom properties |\n| `*-figma-variables.json` | Figma Variables import (with dark mode support) |\n| `*-theme.js` | React/CSS-in-JS theme (Chakra, Stitches, Vanilla Extract) |\n| `*-shadcn-theme.css` | shadcn/ui globals.css variables |\n\nThe markdown output has **19 sections**: Color Palette, Typography, Spacing, Border Radii, Box Shadows, CSS Custom Properties, Breakpoints, Transitions & Animations, Component Patterns (with full CSS snippets), Layout System, Responsive Design, Interaction States, Accessibility (WCAG 2.1), Gradients, Z-Index Map, SVG Icons, Font Files, Image Style Patterns, and Quick Start.\n\nIn v7 a companion `*-mcp.json` file is also written alongside the 8 outputs so that `designlang mcp` can serve regions, components, and health data from disk on later invocations. Opting into `--platforms <csv>` additively emits `ios/`, `android/`, `flutter/`, and/or `wordpress-theme/` directories in the output folder, and `--emit-agent-rules` adds a `.cursor/`, `.claude/`, `CLAUDE.md.fragment`, and `agents.md` set.\n\n## Install\n\n```bash\n# Use directly (no install needed)\nnpx designlang https://example.com\n\n# Or install globally\nnpm install -g designlang\n\n# As an agent skill (Claude Code, Cursor, Codex, 40+ agents)\nnpx skills add Manavarya09/design-extract\n```\n\n## What Makes This Different\n\nMost design extraction tools give you colors and fonts. That's it. designlang fills 5 market gaps that no other tool addresses:\n\n### 1. Layout System Extraction\n\nExtracts the structural skeleton — grid column patterns, flex direction usage, container widths, gap values, and justify/align patterns.\n\n```\nLayout: 55 grids, 492 flex containers\n```\n\nEvery other tool gives you the paint. designlang gives you the architecture.\n\n### 2. Responsive Multi-Breakpoint Capture\n\nCrawls the site at 4 viewports (mobile, tablet, desktop, wide) and maps exactly what changes:\n\n```bash\ndesignlang https://vercel.com --responsive\n```\n\n```\nResponsive: 4 viewports, 3 breakpoint changes\n  375px → 768px: Nav visibility hidden → visible, Hamburger shown → hidden\n  768px → 1280px: Max grid columns 1 → 3, H1 size 32px → 48px\n```\n\nNo other tool captures how the design *adapts*, just how it looks at one size.\n\n### 3. Interaction State Capture\n\nProgrammatically hovers and focuses interactive elements, capturing the actual style transitions:\n\n```bash\ndesignlang https://stripe.com --interactions\n```\n\n```css\n/* Button Hover */\nbackground-color: rgb(83, 58, 253) → rgb(67, 47, 202);\nbox-shadow: none → 0 4px 12px rgba(83, 58, 253, 0.4);\n\n/* Input Focus */\nborder-color: rgb(200, 200, 200) → rgb(83, 58, 253);\noutline: none → 2px solid rgb(83, 58, 253);\n```\n\n### 4. Live Site Sync\n\nTreat the deployed site as your source of truth, not Figma:\n\n```bash\ndesignlang sync https://stripe.com --out ./src/tokens\n```\n\nDetects design changes and auto-updates your local `design-tokens.json`, `tailwind.config.js`, and `variables.css`.\n\n### 5. Multi-Brand Comparison\n\nCompare N brands side-by-side:\n\n```bash\ndesignlang brands stripe.com vercel.com github.com linear.app\n```\n\nGenerates a matrix with color overlap analysis, typography comparison, spacing systems, and accessibility scores. Outputs both `brands.md` and `brands.html`.\n\n### 6. Clone Command\n\nGenerate a working Next.js app with the extracted design applied:\n\n```bash\ndesignlang clone https://stripe.com\ncd cloned-design && npm install && npm run dev\n```\n\nOne command → a running app with the site's colors, fonts, spacing, and component patterns.\n\n### 7. Design System Scoring\n\nRate any site's design quality across 7 categories:\n\n```bash\ndesignlang score https://vercel.com\n```\n\n```\n  68/100  Grade: D\n\n  Color Discipline     ██████████░░░░░░░░░░ 50\n  Typography           ██████████████░░░░░░ 70\n  Spacing System       ████████████████░░░░ 80\n  Shadows              ██████████░░░░░░░░░░ 50\n  Border Radii         ████████░░░░░░░░░░░░ 40\n  Accessibility        ███████████████████░ 94\n  Tokenization         ████████████████████ 100\n```\n\n### 8. Watch Mode\n\nMonitor a site for design changes:\n\n```bash\ndesignlang watch https://stripe.com --interval 60\n```\n\nChecks hourly and alerts when colors, fonts, or accessibility scores change.\n\n### 9. Apply Command (NEW in v5)\n\nExtract a site's design and write tokens directly into your project — auto-detects your framework:\n\n```bash\ndesignlang apply https://stripe.com --dir ./my-app\n```\n\nDetects Tailwind, shadcn/ui, or plain CSS and writes to the right config files automatically.\n\n### 10. Auth Extraction (NEW in v5)\n\nExtract from authenticated or protected pages with cookies and custom headers:\n\n```bash\ndesignlang https://internal-app.com --cookie \"session=abc123\" --header \"Authorization:Bearer token\"\n```\n\n### 11. Gradient Extraction (NEW in v5)\n\nDetects all CSS gradients — type (linear/radial/conic), direction, color stops, and classifies them as subtle, brand, bold, or complex.\n\n### 12. Z-Index Map (NEW in v5)\n\nBuilds a layer hierarchy from all z-index values, groups them into layers (base, sticky, dropdown, modal, etc.), and flags z-index wars or excessive values (>9999).\n\n### 13. SVG Icon Extraction (NEW in v5)\n\nFinds and deduplicates all inline SVGs, classifies them by size and style (outline/solid/duotone), and extracts the icon color palette.\n\n### 14. Font File Detection (NEW in v5)\n\nIdentifies every font source — Google Fonts, self-hosted, CDN, or system — and generates ready-to-use `@font-face` CSS.\n\n### 15. Image Style Patterns (NEW in v5)\n\nDetects image aspect ratios, border treatments, filters, and classifies patterns like avatar, hero, thumbnail, and gallery.\n\n### 16. Dark Mode Diffing (NEW in v5)\n\nCompare light and dark mode side-by-side — see exactly which colors change and which CSS variables are overridden:\n\n```bash\ndesignlang https://vercel.com --dark\n```\n\n### 17. MCP Server (NEW in v7)\n\nOne-command integration with any MCP-aware AI agent (Cursor, Claude Code, Windsurf, and more):\n\n```bash\ndesignlang mcp --output-dir ./design-extract-output\n```\n\nLaunches a stdio JSON-RPC server that exposes the extracted design as MCP resources and tools.\n\n**Resources:**\n\n- `designlang://tokens/primitive` — primitive token layer\n- `designlang://tokens/semantic` — semantic token layer (with DTCG alias references)\n- `designlang://regions` — classified page regions (nav, hero, pricing, etc.)\n- `designlang://components` — reusable component clusters with variants\n- `designlang://health` — CSS health audit\n\n**Tools:**\n\n- `search_tokens` — query tokens by name, value, or type\n- `find_nearest_color` — snap any color to the nearest palette token\n- `get_region` — fetch a classified region by name\n- `get_component` — fetch a component cluster by id\n- `list_failing_contrast_pairs` — list every WCAG-failing fg/bg pair with remediation suggestions\n\n### 18. Multi-Platform Output (NEW in v7)\n\nEmit iOS SwiftUI, Android Compose, Flutter, and WordPress block-theme files in a single run, in addition to the default web output:\n\n```bash\ndesignlang https://stripe.com --platforms all\n```\n\nResulting tree:\n\n```\ndesign-extract-output/\n├── stripe-com-*.{md,json,css,js,html}    (default web output)\n├── ios/\n│   └── DesignTokens.swift\n├── android/\n│   ├── Theme.kt\n│   ├── colors.xml\n│   └── dimens.xml\n├── flutter/\n│   └── design_tokens.dart               (+ buildDesignlangTheme())\n└── wordpress-theme/\n    ├── theme.json\n    ├── style.css\n    ├── functions.php\n    ├── index.php\n    └── templates/index.html\n```\n\nValues for `--platforms` are any comma-separated subset of `web,ios,android,flutter,wordpress,all`. The flag is additive — the default web output is always emitted.\n\n### 19. Agent Rules Emitter (NEW in v7)\n\nWrite agent-facing rule files generated from the resolved semantic tokens:\n\n```bash\ndesignlang https://stripe.com --emit-agent-rules\n```\n\nWrites:\n\n- `.cursor/rules/designlang.mdc` — Cursor rule\n- `.claude/skills/designlang/SKILL.md` — Claude Code skill\n- `CLAUDE.md.fragment` — snippet you can paste into your project's CLAUDE.md\n- `agents.md` — generic, vendor-neutral agent guidance\n\nEach file is templated from the semantic layer of the extracted token set, so the agent sees real token names and values — not placeholders.\n\n### 20. Stack + Tailwind Fingerprint (NEW in v7)\n\nAutomatic framework, utility-class, and analytics detection surfaced on `design.stack`:\n\n- **Framework**: Next.js, Nuxt, Gatsby, Remix, Astro, Shopify, WordPress, Framer, Webflow, and more.\n- **Tailwind**: when Tailwind is in use, records utility-class frequency so you see which utilities drive the design.\n- **Analytics**: inventory of analytics scripts — GA4, Plausible, PostHog, Segment, Mixpanel, Amplitude, and friends.\n\n### 21. CSS Health Audit (NEW in v7)\n\nA dedicated audit pass surfaced on `design.cssHealth`:\n\n- Specificity graph (distribution, hotspots)\n- `!important` count\n- Duplicate declarations\n- Unused CSS via the Playwright Coverage API\n- `@keyframes` catalog\n- Vendor-prefix audit\n\nAlso contributes a `cssHealth` dimension to the overall design score.\n\n### 22. Chrome Extension (NEW in v7.1)\n\nA Manifest-v3 popup lives in [`chrome-extension/`](chrome-extension/). One click on any tab opens `designlang.manavaryasingh.com` with the URL prefilled — no copy-paste, no context switch. There is also a **Copy CLI** button that puts `npx designlang <url>` in your clipboard.\n\n- **Permissions:** `activeTab` only, plus host access to the hosted extractor.\n- **Install:** toggle developer mode at `chrome://extensions`, click *Load unpacked*, pick the `chrome-extension/` folder.\n- **Firefox + Edge** work with the same MV3 manifest.\n\n### 23. Better Auth + Network Control (NEW in v7.1)\n\nExtracting from authenticated, self-signed, or non-default environments now takes one flag:\n\n- **`--cookie-file <path>`** — loads cookies from JSON array, Playwright `storageState.json`, or Netscape `cookies.txt` (browser extensions, curl exports). Merges cleanly with the existing `--cookie name=value` flag.\n- **`--insecure`** — ignore HTTPS/SSL certificate errors for self-signed dev servers, corporate staging, or MITM tools.\n- **`--user-agent <ua>`** — override the browser User-Agent string.\n\n```bash\ndesignlang https://staging.internal --cookie-file ./session.json --insecure\n```\n\n## All Features\n\n| Feature | Flag / Command | Description |\n|---------|---------------|-------------|\n| Base extraction | `designlang <url>` | Colors, typography, spacing, shadows, radii, CSS vars, breakpoints, animations, components |\n| Layout system | automatic | Grid patterns, flex usage, container widths, gap values |\n| Accessibility | automatic | WCAG 2.1 contrast ratios for all fg/bg pairs |\n| Design scoring | automatic | 7-category quality rating (A-F) with actionable issues |\n| Gradients | automatic | Gradient type, direction, stops, classification |\n| Z-index map | automatic | Layer hierarchy, z-index wars detection |\n| SVG icons | automatic | Deduplicated icons, size/style classification, color palette |\n| Font files | automatic | Source detection (Google/self-hosted/CDN/system), @font-face CSS |\n| Image styles | automatic | Aspect ratios, shapes, filters, pattern classification |\n| Dark mode | `--dark` | Extracts dark color scheme + light/dark diff |\n| Auth pages | `--cookie`, `--cookie-file`, `--header` | Extract from authenticated/protected pages; cookie files in JSON / Playwright storageState / Netscape formats |\n| Self-signed / dev TLS | `--insecure` | Ignore HTTPS/SSL certificate errors |\n| User-Agent override | `--user-agent <ua>` | Set a custom User-Agent string |\n| Chrome extension | `chrome-extension/` | One-click handoff from any tab, MV3, `activeTab` only |\n| Multi-page | `--depth <n>` | Crawl N internal pages; emits shared-vs-per-route token reconciliation (`*-tokens-shared.json`, `*-tokens-routes/<slug>.json`, `*-routes-report.md`) |\n| Screenshots | `--screenshots` | Capture buttons, cards, inputs, nav, hero, full page |\n| Responsive | `--responsive` | Crawl at 4 viewports, map breakpoint changes |\n| Interactions | `--interactions` | Capture hover/focus/active state transitions |\n| Auto-interact | `--deep-interact` | Scroll, open menus/modals/accordions, hover CTAs before extraction |\n| Everything | `--full` | Enable screenshots + responsive + interactions + deep-interact |\n| Apply | `designlang apply <url>` | Auto-detect framework and write tokens to your project |\n| Clone | `designlang clone <url>` | Generate a working Next.js starter with extracted design |\n| Score | `designlang score <url>` | Rate design quality with visual bar chart breakdown |\n| Watch | `designlang watch <url>` | Monitor for design changes on interval |\n| Diff | `designlang diff <A> <B>` | Compare two sites (MD + HTML) |\n| Multi-brand | `designlang brands <urls...>` | N-site comparison matrix |\n| Sync | `designlang sync <url>` | Update local tokens from live site |\n| History | `designlang history <url>` | Track design changes over time |\n| MCP server | `designlang mcp` | Expose extraction as MCP resources + tools |\n| Multi-platform | `--platforms <csv>` | Emit iOS / Android / Flutter / WordPress outputs |\n| Agent rules | `--emit-agent-rules` | Cursor, Claude Code, generic agent rule files |\n| Stack fingerprint | automatic | Framework + Tailwind + analytics detection |\n| CSS health | automatic | Specificity, !important, unused CSS, keyframes |\n| A11y remediation | automatic | Nearest palette color passing AA / AAA for every failing pair |\n| Semantic regions | automatic | nav / hero / pricing / testimonials / cta / footer classification |\n| Reusable components | automatic | DOM subtree + style-vector clustering with variants |\n| DTCG tokens | default | W3C Design Tokens v1 with semantic + composite layers (`--tokens-legacy` for pre-v7) |\n\n## Full CLI Reference\n\n```\ndesignlang <url> [options]\n\nOptions:\n  -o, --out <dir>         Output directory (default: ./design-extract-output)\n  -n, --name <name>       Output file prefix (default: derived from URL)\n  -w, --width <px>        Viewport width (default: 1280)\n  --height <px>           Viewport height (default: 800)\n  --wait <ms>             Wait after page load for SPAs (default: 0)\n  --dark                  Also extract dark mode styles\n  --depth <n>             Internal pages to crawl (default: 0)\n  --screenshots           Capture component screenshots\n  --responsive            Capture at multiple breakpoints\n  --interactions          Capture hover/focus/active states\n  --deep-interact         Auto-interact pass (scroll, menus, modals, accordions, hover CTAs)\n  --full                  Enable all captures (implies --deep-interact)\n  --cookie <cookies...>   Cookies for authenticated pages (name=value)\n  --cookie-file <path>    Load cookies from JSON / storageState / Netscape cookies.txt\n  --header <headers...>   Custom headers (name:value)\n  --user-agent <ua>       Override the browser User-Agent string\n  --insecure              Ignore HTTPS/SSL certificate errors (self-signed, dev, proxies)\n  --selector <css>        Only extract from elements matching this CSS selector (e.g. \".pricing-card\")\n  --system-chrome         Use the system Chrome install instead of the bundled Chromium (skips 150MB download)\n  --json                  Print full extraction as JSON to stdout (for piping into other tools)\n  --framework <type>      Only generate specific theme (react, shadcn)\n  --platforms <csv>       Additional platforms: web,ios,android,flutter,wordpress,all (additive)\n  --emit-agent-rules      Emit Cursor / Claude Code / CLAUDE.md / agents.md rule files\n  --tokens-legacy         Emit pre-v7 flat design-tokens.json shape (backward compat)\n  --no-history            Skip saving to history\n  --verbose               Detailed progress output\n\nCommands:\n  apply <url>             Extract and apply design directly to your project\n  clone <url>             Generate a working Next.js starter from extracted design\n  score <url>             Rate design quality (7 categories, A-F, bar chart)\n  watch <url>             Monitor for design changes on interval\n  diff <urlA> <urlB>      Compare two sites' design languages\n  brands <urls...>        Multi-brand comparison matrix\n  sync <url>              Sync local tokens with live site\n  history <url>           View design change history\n  mcp                     Launch stdio MCP server (--output-dir <dir>)\n```\n\n## Example Output\n\nRunning `designlang https://vercel.com --full`:\n\n```\n  designlang\n  https://vercel.com\n\n  Output files:\n  ✓ vercel-com-design-language.md (32.6KB)\n  ✓ vercel-com-design-tokens.json (5.6KB)\n  ✓ vercel-com-tailwind.config.js (3.4KB)\n  ✓ vercel-com-variables.css (18.6KB)\n  ✓ vercel-com-preview.html (31.8KB)\n  ✓ vercel-com-figma-variables.json (12.4KB)\n  ✓ vercel-com-theme.js (1.4KB)\n  ✓ vercel-com-shadcn-theme.css (477B)\n  ✓ screenshots/button.png\n  ✓ screenshots/card.png\n  ✓ screenshots/nav.png\n  ✓ screenshots/hero.png\n  ✓ screenshots/full-page.png\n\n  Summary:\n  Colors: 27 unique colors\n  Fonts: Geist, Geist Mono\n  Spacing: 18 values (base: 2px)\n  Shadows: 11 unique shadows\n  Radii: 10 unique values\n  Breakpoints: 45 breakpoints\n  Components: 11 types detected (with CSS snippets)\n  CSS Vars: 407 custom properties\n  Layout: 55 grids, 492 flex containers\n  Gradients: 4 unique gradients\n  Z-Index: 8 layers mapped\n  Icons: 23 unique SVGs\n  Font Files: 4 font sources detected\n  Images: 6 style patterns\n  Responsive: 4 viewports, 3 breakpoint changes\n  Interactions: 8 state changes captured\n  A11y: 94% WCAG score (7 failing pairs)\n  Design Score: 68/100 (D) — 4 issues\n```\n\n## How It Works\n\n1. **Crawl** — Launches headless Chromium via Playwright, waits for network idle and fonts\n2. **Extract** — Single `page.evaluate()` walks up to 5,000 DOM elements collecting 25+ computed style properties, layout data, inline SVGs, font sources, and image metadata\n3. **Process** — 17 extractor modules parse, deduplicate, cluster, and classify the raw data (including gradients, z-index layers, icons, fonts, and image patterns)\n4. **Format** — 8 formatter modules generate output files\n5. **Score** — Accessibility extractor calculates WCAG contrast ratios for all color pairs\n6. **Capture** — Optional: screenshots, responsive viewport crawling, interaction state recording\n\n## Install Everywhere\n\ndesignlang ships surfaces beyond the CLI:\n\n| Surface | Path | Description |\n|---------|------|-------------|\n| **CLI** | `npx designlang <url>` | Main entry point. |\n| **VS Code extension** | [`vscode-extension/`](vscode-extension/) | \"Extract design from URL\" command + auto-inject into workspace. |\n| **Raycast extension** | [`raycast-extension/`](raycast-extension/) | Extract, score, and \"copy CLI command\" from Raycast. |\n| **Figma plugin** | [`figma-plugin/`](figma-plugin/) | Paste a URL inside Figma, get a full Variables collection. |\n| **GitHub Action** | [`github-action/`](github-action/) | \"Design regression guard\" — diffs tokens on every PR and comments. |\n| **Chrome extension** | [`chrome-extension/`](chrome-extension/) | One-click handoff from any tab (MV3, `activeTab` only). |\n| **MCP server** | `npx designlang mcp` | Exposes the extracted design as MCP resources + tools for Cursor, Claude Code, Windsurf, etc. See [`docs/MCP-REGISTRY.md`](docs/MCP-REGISTRY.md). |\n\n## Agent Skill\n\nWorks with **Claude Code, Cursor, Codex, and 40+ AI coding agents** via the skills ecosystem:\n\n```bash\nnpx skills add Manavarya09/design-extract\n```\n\nIn Claude Code, use `/extract-design <url>`.\n\n## Website\n\n**[design-extract-beta.vercel.app](https://design-extract-beta.vercel.app)** — the brutalist product page.\n\n## Contributing\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md). PRs welcome!\n\n## License\n\n[MIT](LICENSE) - Manav Arya Singh\n","summary":" designlang is a CLI tool that uses a headless browser to crawl websites and extract comprehensive design systems from the live DOM, producing eight output formats including AI-ready markdown, Tailwind configurations, React themes, Figma variables, and W3C-standard design tokens. It goes beyond simple color and font extraction to capture layout patterns like grids and flexbox, responsive behavior across breakpoints, interaction states, and WCAG accessibility scores while supporting brand comparisons and live site synchronization. Ideal for developers rebuilding existing interfaces, design system architects, and teams leveraging AI agents, it also offers multi-platform exports for iOS, Android, Flutter, and WordPress alongside integrations for shadcn/ui and popular code editors.","description":"Extract any website's complete design system with one command. DTCG tokens, semantic+primitive+composite, MCP server for Claude Code/Cursor/Windsurf, multi-platform emitters (iOS SwiftUI, Android Compose, Flutter, WordPress), Tailwind v4, Figma variables, shadcn/ui, CSS health audit, WCAG remediation, Chrome extension. MIT, Playwright, Node 20+.","stars":1092,"language":"JavaScript"},{"owner":"immanuwell","repo":"dockerfile-roast","url":"https://github.com/immanuwell/dockerfile-roast","readme":"![](media/dockerfile-image.png)\n\n![](media/screenshot-1.png)\n\n# droast\n\na dockerfile linter that actually has opinions. it catches bad practices and tells you about them in the least diplomatic way possible.\n\nthink of it as code review from a senior dev who's seen too many prod incidents and has stopped being polite about it.\n\n## install\n\n**one-liner** (macOS and Linux, detects Homebrew automatically):\n\n```bash\ncurl -fsL ewry.net/droast/install.sh | sh\n```\n\n**Homebrew** (macOS and Linux):\n\n```bash\nbrew tap immanuwell/droast https://github.com/immanuwell/homebrew-droast.git\nbrew install immanuwell/droast/droast\n```\n\n**from source:**\n\n```bash\ncargo install dockerfile-roast\n```\n\nor grab a prebuilt binary from the releases page if you'd rather not wait for the rust compiler to do its thing.\n\n## usage\n\n```bash\n# the basics\ndroast Dockerfile\n\n# lint an entire project\ndroast **/Dockerfile\n\n# boring mode (no roasts, just facts)\ndroast --no-roast Dockerfile\n\n# only care about real problems\ndroast --min-severity warning Dockerfile\n\n# disagree with a rule? valid, we respect it\ndroast --skip DF001,DF012 Dockerfile\n\n# ci-friendly output\ndroast --format github Dockerfile    # github actions annotations\ndroast --format json Dockerfile      # machine-readable\ndroast --format compact Dockerfile   # one line per finding\n```\n\n## github action\n\nadd droast to any repo in 5 lines:\n\n```yaml\n- uses: immanuwell/dockerfile-roast@1.0.0\n```\n\nfull example (`.github/workflows/lint.yml`):\n\n```yaml\nname: Lint Dockerfiles\n\non: [push, pull_request]\n\njobs:\n  droast:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - uses: immanuwell/dockerfile-roast@1.0.0\n```\n\nfindings show up as inline annotations on the PR diff. no configuration required.\n\navailable inputs (all optional):\n\n| input | default | description |\n|-------|---------|-------------|\n| `files` | `Dockerfile` | file(s) or glob to lint |\n| `min-severity` | `info` | `info`, `warning`, or `error` |\n| `skip` | — | comma-separated rule IDs to ignore |\n| `no-roast` | `false` | technical output only, no jokes |\n| `no-fail` | `false` | advisory mode — never blocks the build |\n| `image-tag` | `latest` | pin to a specific droast release, e.g. `1.0.0` |\n\nexample with options:\n\n```yaml\n- uses: immanuwell/dockerfile-roast@1.0.0\n  with:\n    files: '**/Dockerfile'\n    min-severity: warning\n    skip: DF012,DF022\n    no-fail: true        # report findings but don't block the PR\n```\n\n## docker\n\npull from ghcr and use immediately, no install needed:\n\n```bash\n# lint a Dockerfile in the current directory\ndocker run --rm -v \"$(pwd)/Dockerfile\":/Dockerfile ghcr.io/immanuwell/droast /Dockerfile\n\n# lint any file, anywhere\ndocker run --rm -v /path/to/your/Dockerfile:/Dockerfile ghcr.io/immanuwell/droast /Dockerfile\n\n# pass flags as usual\ndocker run --rm -v \"$(pwd)/Dockerfile\":/Dockerfile ghcr.io/immanuwell/droast \\\n    --no-roast --min-severity warning /Dockerfile\n```\n\nor build locally from source:\n\n```bash\ndocker build -t droast .\ndocker run --rm -v \"$(pwd)/Dockerfile\":/Dockerfile droast /Dockerfile\n```\n\nthe image is published automatically to `ghcr.io/immanuwell/droast` on every release tag.\n\n## shell completions\n\nadd this once, never mistype `--min-severity` again:\n\n```bash\n# bash — add to .bashrc\nsource <(droast completion bash)\n\n# zsh — add to .zshrc\ndroast completion zsh > ~/.zfunc/_droast\n\n# fish — add to config.fish\ndroast completion fish | source\n```\n\n## what it catches\n\n63 rules, ngl thats a lot. run `droast --list-rules` for the full breakdown.\n\n<!-- BEGIN RULES -->\n<details>\n<summary>all 63 rules</summary>\n\n```\n  Available Rules\n\n  ID       DESCRIPTION\n  ──────────────────────────────────────────────────────────────────────\n  DF001    Use specific base image tags instead of 'latest'\n  DF002    Do not run as root\n  DF011    Use multi-stage builds to reduce image size\n  DF013    Avoid storing secrets in ENV variables\n  DF014    Avoid hardcoding passwords or tokens in ARG/ENV\n  DF020    Set explicit non-root USER\n  DF003    Combine RUN commands to reduce layers\n  DF004    Clean apt/yum/apk cache in the same RUN layer\n  DF005    Pin package versions for reproducibility\n  DF006    Avoid ADD for local files; prefer COPY\n  DF007    Do not copy the entire build context (COPY . .)\n  DF008    Use WORKDIR instead of inline cd commands\n  DF009    Use absolute paths in WORKDIR\n  DF010    Avoid using sudo inside containers\n  DF012    Set HEALTHCHECK for long-running services\n  DF017    Use ENTRYPOINT with CMD for flexible images\n  DF018    Avoid using shell form for ENTRYPOINT\n  DF019    Do not use deprecated MAINTAINER; use LABEL instead\n  DF022    Specify EXPOSE for documented ports\n  DF023    Avoid multiple FROM without aliases (unintended multistage)\n  DF024    Avoid using :latest in FROM even with aliases\n  DF025    Use JSON array syntax for CMD/ENTRYPOINT\n  DF026    Avoid recursive COPY from root\n  DF030    Avoid using pip without --no-cache-dir\n  DF031    Avoid npm install without ci/--production for prod images\n  DF032    Set PYTHONDONTWRITEBYTECODE and PYTHONUNBUFFERED for Python images\n  DF033    Use .dockerignore to exclude unnecessary files\n  DF034    Avoid chmod 777 — overly permissive\n  DF035    Avoid using curl without --fail flags\n  DF036    Avoid Dockerfile with no CMD or ENTRYPOINT\n  DF015    Avoid using apt-get without -y flag\n  DF016    Use --no-install-recommends with apt-get\n  DF021    Avoid wget|sh pipe patterns (execute remote code)\n  DF027    Do not use yum without -y flag\n  DF028    Cache-bust apt-get update\n  DF029    Avoid apk add without --no-cache\n  DF037    Dockerfile must begin with FROM, ARG, or a comment\n  DF038    Multiple CMD instructions — only the last one takes effect\n  DF039    Multiple ENTRYPOINT instructions — only the last one takes effect\n  DF040    EXPOSE port must be in valid range 0-65535\n  DF041    Multiple HEALTHCHECK instructions — only the last one applies\n  DF042    FROM stage aliases must be unique\n  DF043    zypper install without non-interactive flag\n  DF044    Avoid zypper dist-upgrade in Dockerfiles\n  DF045    Run zypper clean after zypper install\n  DF046    Run dnf clean all after dnf install\n  DF047    Run yum clean all after yum install\n  DF048    COPY with multiple sources requires destination to end with /\n  DF049    COPY --from must reference a previously defined stage\n  DF050    COPY --from cannot reference the current stage\n  DF051    Pin versions in pip install\n  DF052    Pin versions in apk add\n  DF053    Pin versions in gem install\n  DF054    Pin versions in go install with @version\n  DF055    Run yarn cache clean after yarn install\n  DF056    Use wget --progress=dot:giga to avoid bloated build logs\n  DF057    Set -o pipefail before RUN commands that use pipes\n  DF058    Use either wget or curl consistently, not both\n  DF059    Use apt-get or apt-cache instead of apt in scripts\n  DF060    Avoid running pointless interactive commands inside containers\n  DF061    Do not use --platform in FROM unless required\n  DF062    ENV variable must not reference itself in the same statement\n  DF063    COPY to relative destination requires WORKDIR to be set first\n  DF064    useradd without -l flag may create excessively large images\n\n  Use --skip DF001,DF002 to suppress specific rules.\n  Use --min-severity warning to hide INFO findings.\n```\n\n</details>\n<!-- END RULES -->\n\nthe greatest hits:\n\n| rule | crime |\n|------|-------|\n| DF001 | `FROM ubuntu:latest` — pick an actual tag |\n| DF002 | running explicitly as root |\n| DF004 | apt cache left in the image (you made a trash can) |\n| DF011 | shipping the entire build toolchain to prod |\n| DF013 | secrets in ENV vars (in your layers. forever. congrats) |\n| DF021 | `curl \\| sh` — no. |\n| DF028 | split `apt-get update` + install in separate RUN layers |\n| DF034 | `chmod 777` somewhere in there |\n| DF037 | instruction before FROM (invalid Dockerfile) |\n| DF039 | multiple ENTRYPOINT instructions |\n| DF046 | dnf install without cache cleanup |\n| DF051 | pip install without version pins |\n| DF057 | pipe in RUN without `set -o pipefail` |\n| DF059 | `apt` used instead of `apt-get` in scripts |\n| DF063 | COPY to relative path with no WORKDIR set |\n\nrule categories: base images · security · package managers · layer hygiene · instruction quality · service quality · python/node specifics\n\n## exit codes\n\n`0` = clean (or `--no-fail`), `1` = errors found.\n\n`--no-fail` is useful for advisory CI runs where you want the output but dont want to block the build yet.\n\n## license\n\nMIT. do whatever.\n","summary":" Dockerfile-roast (droast) is an opinionated Dockerfile linter that enforces container best practices through 63 detection rules, delivering deliberately blunt \"roasts\" rather than gentle warnings when it encounters anti-patterns like using 'latest' tags, running as root, or hardcoding secrets. It supports multiple installation methods including Homebrew, Cargo, and Docker, offers CI-friendly output formats such as GitHub Actions annotations and JSON, and includes a ready-to-use GitHub Action for automated linting in pull requests. Developers and DevOps teams seeking rigorous Dockerfile standards with a humorous twist will find it useful for eliminating bad practices in both local development and continuous integration pipelines.","description":"a dockerfile linter that actually has opinions 🔥","stars":278,"language":"Rust"},{"owner":"Pawandeep-prog","repo":"Snapframe","url":"https://github.com/Pawandeep-prog/Snapframe","readme":"<p align=\"center\">\n  <img src=\"public/logo.png\" width=\"128\" height=\"128\" alt=\"Snapframe Logo\" style=\"border-radius: 24px;\" />\n</p>\n\n# Snapframe 🖼️\n\nA professional web-based screenshot builder designed for app developers and designers. Create stunning, marketing-ready screenshots for your apps with ease.\n\n<p align=\"center\">\n  <a href=\"https://pawandeep-prog.github.io/Snapframe/\" target=\"_blank\">\n    <img src=\"https://img.shields.io/badge/Try%20it%20Live-GitHub%20Pages-blue?style=for-the-badge&logo=github\" alt=\"Live Demo\" />\n  </a>\n  <img src=\"https://img.shields.io/badge/Chrome-Supported-brightgreen?style=for-the-badge&logo=googlechrome\" alt=\"Chrome Supported\" />\n  <img src=\"https://img.shields.io/badge/Firefox-Known%20Issues-orange?style=for-the-badge&logo=firefox\" alt=\"Firefox Known Issues\" />\n</p>\n\n<p align=\"center\">\n  <img src=\"public/thumbnail.jpg\" alt=\"Snapframe Editor\" style=\"border-radius: 12px; max-width: 100%;\" />\n</p>\n\n![Snapframe Demo](public/snapframe_video.mp4)\n\n## ✨ Features\n\n- **Professional Templates**: Choose from curated themes or create your own custom styles.\n- **Device Frames**: High-quality device mockups (iPhone, etc.) to showcase your app in context.\n- **Per-Slide Theming**: Customize individual slides or apply global themes across your entire project.\n- **Dynamic Text Blocks**: Add professional typography with customizable layouts and positioning.\n- **Real-time Preview**: See your changes instantly as you edit.\n- **High-Quality Export**: Export your screenshots as PNG, JPG, or a compressed ZIP archive for all resolutions.\n- **Undo/Redo Support**: Full history management to iterate quickly without fear.\n- **Offline First**: Fast and responsive UI with local state management.\n- **JSON Editor**: Build entire screenshot sets programmatically — paste JSON directly and see a live preview side by side. Perfect for AI-assisted workflows.\n\n## 🚀 Tech Stack\n\n- **Framework**: [React 19](https://react.dev/)\n- **Build Tool**: [Vite](https://vitejs.dev/)\n- **Styling**: [Tailwind CSS 4](https://tailwindcss.com/)\n- **State Management**: [Zustand](https://github.com/pmndrs/zustand)\n- **Icons**: [Lucide React](https://lucide.dev/)\n- **Export Engine**: `html-to-image` & `jszip`\n\n## 🤖 JSON Editor & AI Workflow\n\nThe **JSON Editor** (toolbar → `JSON` button) lets you create and edit projects entirely in JSON — no clicking through the UI required.\n\n**Split-panel interface:**\n- **Left** — editable JSON with live validation and a status bar showing error details\n- **Right** — live `ScreenshotCard` preview that updates as you type, with slide navigation for multi-slide projects\n\n**Typical AI-powered flow:**\n1. Open the JSON Editor and click **Copy** to grab the current project JSON\n2. Paste it into Claude, ChatGPT, or any AI tool with a prompt like:\n   > *\"Add 3 slides for a meditation app using a calm green theme\"*\n3. Paste the AI response back into the editor — the live preview updates instantly\n4. Click **Apply & Close** to load it into the project, then export as usual\n\nSee [`JSON_SCHEMA.md`](JSON_SCHEMA.md) for the full field reference, all valid values, and copy-paste examples.\n\n---\n\n## ⚠️ Browser Compatibility\n\n| Browser | Status |\n|---------|--------|\n| Chrome | Fully supported |\n| Firefox | Known rendering issues — investigation in progress |\n\n## 🌐 Live Demo\n\nNo install needed — just open it in your browser:\n\n**[https://pawandeep-prog.github.io/Snapframe/](https://pawandeep-prog.github.io/Snapframe/)**\n\n## 🛠️ Local Setup\n\nGetting started with Snapframe locally is simple:\n\n1. **Clone the repository:**\n   ```bash\n   git clone https://github.com/Pawandeep-prog/Snapframe.git\n   cd Snapframe\n   ```\n\n2. **Install dependencies:**\n   ```bash\n   npm install\n   ```\n\n3. **Run the development server:**\n   ```bash\n   npm run dev\n   ```\n\n4. **Open in browser:**\n   Navigate to `http://localhost:5173`\n\n## 📦 Building for Production\n\nTo create an optimized production build:\n\n```bash\nnpm run build\n```\n\nThe output will be in the `dist/` directory.\n\n## 📄 License\n\nThis project is licensed under the MIT License - see the [LICENSE](LICENSE) file for details.\n\n---\n\nBuilt with ❤️ by [Pawandeep Singh](https://github.com/Pawandeep-prog)\n","summary":" Snapframe is a web-based screenshot builder that helps app developers and designers create professional, marketing-ready app screenshots with ease. It offers device mockups, customizable templates, dynamic text blocks, and real-time preview capabilities, along with export options including PNG, JPG, and compressed ZIP archives. A standout feature is its JSON editor, which enables users to programmatically build screenshot sets and integrate AI-assisted workflows by editing JSON directly alongside a live preview. The tool runs entirely in the browser with offline-first architecture and is best supported on Chrome, making it ideal for quickly generating polished app store assets without complex design software.","description":"Local Screenshot generator for play store and app store","stars":169,"language":"TypeScript"},{"owner":"wisher567","repo":"Portpal","url":"https://github.com/wisher567/Portpal","readme":"<div align=\"center\">\n\n![PortPal — Developer Port Manager](https://raw.githubusercontent.com/wisher567/Portpal/main/assets/hero.png)\n\n# ⚡ PortPal\n\n**Know what's running. Kill what's blocking. See how it's connected.**\n\nA blazing-fast, native desktop dashboard built for modern developers. Stop playing detective with `netstat` and `lsof`. PortPal watches your ports, tracks traffic, and visualizes network topology — so you can just write code.\n\n[![Windows](https://img.shields.io/badge/Windows-0078D6?style=for-the-badge&logo=windows&logoColor=white)](https://github.com/wisher567/Portpal/releases)\n[![macOS](https://img.shields.io/badge/macOS-000000?style=for-the-badge&logo=apple&logoColor=white)](https://github.com/wisher567/Portpal/releases)\n[![Linux](https://img.shields.io/badge/Linux-FCC624?style=for-the-badge&logo=linux&logoColor=black)](https://github.com/wisher567/Portpal/releases)\n[![Built with Tauri](https://img.shields.io/badge/Built_with-Tauri_2-FFC131?style=for-the-badge&logo=tauri&logoColor=white)](https://tauri.app)\n[![Stars](https://img.shields.io/github/stars/wisher567/Portpal?style=social)](https://github.com/wisher567/Portpal)\n\n![PortPal App Interaction Demo](https://raw.githubusercontent.com/wisher567/Portpal/main/assets/gif.gif)\n\n</div>\n\n---\n\n## 🤔 The Problem\n\nEvery developer knows the pain:\n\n```text\nError: listen EADDRINUSE: address already in use :::3000\n```\n\nYou open a project and *something* is already squatting on the port. Now you're hunting for PIDs and copy-pasting kill commands. Every. Single. Time.\n\n**PortPal ends that.**\n\n---\n\n## ✨ What's New in v0.2? (The Dashboard Era)\n\nWe've evolved from a simple port list to a full **Developer Command Center**:\n\n- 📈 **Traffic Sparklines:** Watch real-time connection activity with beautiful, animated SVG mini-charts natively embedded in your metrics.\n- 📋 **Historical Event Logging:** A dedicated logs page tracks every process start, stop, and connection spike along with timestamps and framework contexts.\n- 📦 **Categorized Services:** PortPal automatically groups active ports into cleanly contained UI cards by project and framework.\n- 🗂️ **Dev vs. System Isolation:** Quickly filter ports by 'Dev Frameworks' or 'Other System Apps', complete with a *Kill All* panic button.\n- 🎨 **Windowless Chrome:** Frameless application design with integrated native UI controls for a hyper-modern feel.\n\n---\n\n## 🚀 Core Features\n\n### 🔍 Real-Time Port Dashboard\nSee every listening port on your machine at a glance — process name, PID, connections, framework detection, and project identification. \n\n### ⚡ One-Click Control\nHover over any port and click **✕** to kill it instantly. If PortPal knows the start command, hit **↻** to restart it directly in a new terminal. Dead processes show a \"stopped\" badge with a persistent restart button.\n\n### 🗺️ Interactive Port Map (D3.js Topology)\nThe crown jewel of PortPal. A D3.js-powered network topology visualization that shows precisely how your services are communicating.\n\n<div align=\"center\">\n![Port Map — Interactive Network Topology](https://raw.githubusercontent.com/wisher567/Portpal/main/assets/portmap.png)\n</div>\n\n- **Drag & Collide** simulation for physical manipulation\n- **Scroll** to zoom in and navigate\n- **Node Caching & Real-time updates** without screen flickering\n- **Framework-colored nodes** and connection metrics\n\n### 🔔 System Tray Intelligence\nPortPal lives quietly in your system tray:\n- **Traffic light icon** immediately alerts you to conflicts and statuses\n- A background thread quietly builds a historical log of all backend activity while the window is closed\n\n### 🧠 Smart Detection Engine\nPortPal isn't just a basic `netstat` wrapper — it understands what you build:\n- **Framework Detection** — Recognizes React, Vite, Angular, Django, Node, and more via default ports.\n- **Project Context** — Crawls for `package.json`, `Cargo.toml`, or `go.mod` to name your running servers.\n\n---\n\n## 📥 Installation\n\n### Download\n\n<table>\n<tr>\n<td align=\"center\"><b>🪟 Windows</b></td>\n<td align=\"center\"><b>🍎 macOS</b></td>\n<td align=\"center\"><b>🐧 Linux</b></td>\n</tr>\n<tr>\n<td align=\"center\">\n<a href=\"https://github.com/wisher567/Portpal/releases/latest\"><code>.msi</code> installer</a><br/>\n<a href=\"https://github.com/wisher567/Portpal/releases/latest\"><code>.exe</code> setup</a>\n</td>\n<td align=\"center\">\n<a href=\"https://github.com/wisher567/Portpal/releases/latest\"><code>.dmg</code> Apple Silicon</a><br/>\n<a href=\"https://github.com/wisher567/Portpal/releases/latest\"><code>.dmg</code> Intel</a>\n</td>\n<td align=\"center\">\n<a href=\"https://github.com/wisher567/Portpal/releases/latest\"><code>.deb</code> / <code>.AppImage</code></a>\n</td>\n</tr>\n</table>\n\n### Build from Source\n\n#### Prerequisites\n\n| Tool | Version | Install |\n|------|---------|---------|\n| **Node.js** | ≥ 18 | [nodejs.org](https://nodejs.org) |\n| **Rust** | ≥ 1.70 | [rustup.rs](https://rustup.rs) |\n| **Tauri CLI** | v2 | Included |\n\n#### Quick Start (Dev Environment)\n\n```ba
