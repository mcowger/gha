 models with ≥40 layers where the M=16 specialization amortizes over enough layers to beat stock `mx.quantized_matmul` end-to-end. Opt-in override via `DFLASH_VERIFY_LINEAR={0,1}`.\n- **Numerical coherence**: bf16-sensitive paths, including recurrent state replay and small projections, are stabilized across speculative cycles so accepted tokens stay consistent.\n\n## Benchmarks\n\n| Model | Tokens | Baseline | DFlash | Speedup | Acceptance |\n|-------|--------|----------|--------|---------|------------|\n| Qwen3.5-4B | 1024 | 53.80 tok/s | 182.87 tok/s | 3.40x | 86.43% |\n| Qwen3.5-4B | 2048 | 53.90 tok/s | 188.70 tok/s | 3.49x | 87.70% |\n| Qwen3.5-4B | 4096 | 53.49 tok/s | 195.84 tok/s | 3.66x | 88.35% |\n| Qwen3.5-4B | 8192 | 53.28 tok/s | 160.51 tok/s | 3.02x | 87.30% |\n| Qwen3.5-9B | 1024 | 30.95 tok/s | 135.34 tok/s | 4.37x | 89.55% |\n| Qwen3.5-9B | 2048 | 30.70 tok/s | 113.00 tok/s | 3.65x | 89.16% |\n| Qwen3.5-9B | 4096 | 30.56 tok/s | 94.59 tok/s | 3.06x | 88.31% |\n| Qwen3.5-9B | 8192 | 29.43 tok/s | 66.94 tok/s | 2.22x | 86.67% |\n| Qwen3.5-27B-4bit | 1024 | 33.55 tok/s | 79.02 tok/s | 2.37x | 90.04% |\n| Qwen3.5-27B-4bit | 2048 | 33.10 tok/s | 70.21 tok/s | 2.12x | 89.60% |\n| Qwen3.5-27B-4bit | 4096 | 31.47 tok/s | 55.68 tok/s | 1.77x | 88.38% |\n| Qwen3.5-27B-4bit | 8192 | 33.88 tok/s | 45.29 tok/s | 1.34x | 85.97% |\n| Qwen3.5-35B-A3B-4bit | 1024 | 143.03 tok/s | 248.85 tok/s | 1.76x | 89.26% |\n| Qwen3.5-35B-A3B-4bit | 2048 | 141.43 tok/s | 255.01 tok/s | 1.81x | 89.75% |\n| Qwen3.5-35B-A3B-4bit | 4096 | 141.49 tok/s | 216.47 tok/s | 1.53x | 88.50% |\n| Qwen3.5-35B-A3B-4bit | 8192 | 138.59 tok/s | 170.39 tok/s | 1.22x | 86.41% |\n| Qwen3.6-35B-A3B-4bit | 1024 | 138.26 tok/s | 300.33 tok/s | 2.20x | 91.02% |\n| Qwen3.6-35B-A3B-4bit | 2048 | 139.03 tok/s | 252.93 tok/s | 1.82x | 89.60% |\n| Qwen3.6-35B-A3B-4bit | 4096 | 134.50 tok/s | 208.40 tok/s | 1.56x | 88.43% |\n| Qwen3.6-35B-A3B-4bit | 8192 | 133.20 tok/s | 177.45 tok/s | 1.33x | 87.01% |\n\n### Methodology\n\nHardware: Apple M5 Max, 64GB unified memory. MLX 0.31.1 from the stock pip install.\n\nProtocol: stock `mlx_lm.stream_generate` on a pristine target model vs stock MLX plus the local DFlash runtime, measured sequentially. `3` repeats, median reported, `60s` cooldown between measured runs.\n\nGeneration: prompt `\"The function $f$ satisfies the functional equation \\[ f(x) + f(y) = f(x + y) - xy - 1 \\] for all real numbers $x$ and $y$. If $f(1) = 1$, then find all integers $n$ such that $f(n) = n$. Enter all such integers, separated by commas. Please reason step by step, and put your final answer within \\boxed{}.\"` with chat templates enabled by default and post-prefill tok/s as the primary metric.\n\nFull per-run JSON reports are available in [`benchmark/results/`](benchmark/results/).\n\n## Install\n\n```bash\npip install dflash-mlx\n\n# or with pipx\npipx install dflash-mlx\n```\n\n`dflash-serve` wraps `mlx_lm.server` for full OpenAI-compatible serving semantics, including tools, reasoning, and streaming, while using the DFlash runtime as the generation engine.\n\n## Quick start\n\n```bash\nPROMPT='The function $f$ satisfies the functional equation \\[ f(x) + f(y) = f(x + y) - xy - 1 \\] for all real numbers $x$ and $y$. If $f(1) = 1$, then find all integers $n$ such that $f(n) = n$. Enter all such integers, separated by commas. Please reason step by step, and put your final answer within \\boxed{}.'\n\n# Generate — draft auto-resolved\ndflash --model Qwen/Qwen3.5-9B --prompt \"$PROMPT\"\n\n# Explicit draft model\ndflash --model Qwen/Qwen3.5-9B --draft z-lab/Qwen3.5-9B-DFlash --prompt \"$PROMPT\"\n\n# Server\ndflash-serve --model Qwen/Qwen3.5-9B --port 8000\n\n# Disable visible thinking/reasoning on models that support it\ndflash-serve --model Qwen/Qwen3.5-9B --port 8000 \\\n  --chat-template-args '{\"enable_thinking\": false}'\n\n# Raise the DFlash fallback threshold for longer prompts\ndflash-serve --model mlx-community/Qwen3.5-35B-A3B-4bit --port 8000 \\\n  --chat-template-args '{\"enable_thinking\": false}' \\\n  --dflash-max-ctx 16384\n\n# Benchmark\ndflash-benchmark --model Qwen/Qwen3.5-9B --draft z-lab/Qwen3.5-9B-DFlash \\\n  --prompt \"$PROMPT\" --max-tokens 1024 --repeat 3\n\n# Live demo — baseline vs DFlash side-by-side\nPYTHONPATH=. python3 -m examples.demo --mode dflash \\\n  --target-model Qwen/Qwen3.5-9B --draft-model z-lab/Qwen3.5-9B-DFlash \\\n  --prompt \"$PROMPT\" --max-tokens 2048\n```\n\n- Compatible with Open WebUI, Continue, OpenCode, aider, and other OpenAI-compatible clients\n- Streaming SSE support\n- `dflash-serve` requires a supported DFlash draft model (auto-detected from the registry or passed explicitly with `--draft`)\n\n## Tested models\n\nAny model with a DFlash draft on HuggingFace should work.\n\nOptimized for Qwen3.5 / Qwen3.6 models (hybrid GatedDeltaNet + attention architecture). Qwen3 (pure attention) models work, but without the precision benefits of tape-replay rollback.\n\n| Target | Draft |\n|--------|-------|\n| [Qwen/Qwen3.5-4B](https://huggingface.co/Qwen/Qwen3.5-4B) | [z-lab/Qwen3.5-4B-DFlash](https://huggingface.co/z-lab/Qwen3.5-4B-DFlash) |\n| [Qwen/Qwen3.5-9B](https://huggingface.co/Qwen/Qwen3.5-9B) | [z-lab/Qwen3.5-9B-DFlash](https://huggingface.co/z-lab/Qwen3.5-9B-DFlash) |\n| [mlx-community/Qwen3.5-27B-4bit](https://huggingface.co/mlx-community/Qwen3.5-27B-4bit) | [z-lab/Qwen3.5-27B-DFlash](https://huggingface.co/z-lab/Qwen3.5-27B-DFlash) |\n| [mlx-community/Qwen3.5-35B-A3B-4bit](https://huggingface.co/mlx-community/Qwen3.5-35B-A3B-4bit) | [z-lab/Qwen3.5-35B-A3B-DFlash](https://huggingface.co/z-lab/Qwen3.5-35B-A3B-DFlash) |\n| [mlx-community/Qwen3.6-35B-A3B-4bit](https://huggingface.co/mlx-community/Qwen3.6-35B-A3B-4bit) | [z-lab/Qwen3.6-35B-A3B-DFlash](https://huggingface.co/z-lab/Qwen3.6-35B-A3B-DFlash) |\n\nModels without a matching DFlash draft are rejected. Pass `--draft` explicitly if you want to override the registry.\n\n## Features\n\n- **Auto draft resolution** — no manual `--draft` flag needed\n- **Streaming** — token-by-token output in the CLI and server\n- **Chat templates** — enabled by default\n- **Recurrent rollback** — `RecurrentRollbackCache` keeps GatedDeltaNet state coherent across speculative verify and rollback\n- **Verify-specialized int4 qmm kernel** — custom M=16 Metal kernel auto-enabled on MoE and dense ≥40-layer targets; falls back to stock `mx.quantized_matmul` everywhere else\n\n## Roadmap\n\n- Sustained acceptance at 4096+ tokens — draft KV cache window scaling and long-context verify optimization\n- Draft model distillation and compression for faster draft forward\n\n## Citation\n\n```bibtex\n@misc{chen2026dflash,\n  title={DFlash: Block Diffusion for Flash Speculative Decoding},\n  author={Jian Chen and Yesheng Liang and Zhijian Liu},\n  year={2026},\n  eprint={2602.06036},\n  archivePrefix={arXiv},\n  primaryClass={cs.CL},\n  url={https://arxiv.org/abs/2602.06036}\n}\n```\n\n## License\n\nMIT\n","summary":" dflash-mlx implements block diffusion speculative decoding (DFlash) for Apple Silicon, using the MLX framework to accelerate large language model inference through parallel token drafting and verification. A lightweight draft model generates 16 tokens simultaneously via block diffusion, which the target model verifies in a single forward pass to guarantee lossless output where every emitted token is validated. The implementation features custom Metal kernels for tape-replay rollback, long-context attention, and optimized quantized matrix multiplication to maintain efficiency across extended sequences. Researchers and developers running LLMs on Macs can achieve 2–4× speedups over standard autoregressive generation without compromising output quality.","description":"Lossless DFlash speculative decoding for MLX on Apple Silicon","stars":521,"language":"Python"},{"owner":"h4ckf0r0day","repo":"obscura","url":"https://github.com/h4ckf0r0day/obscura","readme":"<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/h4ckf0r0day/obscura/main/assets/icon.png\" alt=\"Obscura\" width=\"80\" />\n</p>\n\n<h2 align=\"center\">Obscura</h1>\n\n<p align=\"center\">\n  <strong>The open-source headless browser for AI agents and web scraping.</strong><br>\n  Lightweight, stealthy, and built in Rust.\n</p>\n\n---\n\nObscura is a headless browser engine written in Rust, built for web scraping and AI agent automation. It runs real JavaScript via V8, supports the Chrome DevTools Protocol, and acts as a drop-in replacement for headless Chrome with Puppeteer and Playwright.\n\n### Why Obscura over headless Chrome?\n\nDesigned for automation at scale, not desktop browsing.\n\n| Metric       | Obscura      | Headless Chrome |\n|--------------|--------------|------------------|\n| Memory       | **30 MB**    | 200+ MB          |\n| Binary size  | **70 MB**    | 300+ MB          |\n| Anti-detect  | **Built-in** | None          |\n| Page load    | **85 ms**    | ~500 ms          |\n| Startup      | **Instant**  | ~2s              |\n| Puppeteer    | **Yes**      | Yes              |\n| Playwright   | **Yes**      | Yes              |\n\n## Install\n\n### Download\n\nGrab the latest binary from [Releases](https://github.com/h4ckf0r0day/obscura/releases):\n\n```bash\n# Linux x86_64\ncurl -LO https://github.com/h4ckf0r0day/obscura/releases/latest/download/obscura-x86_64-linux.tar.gz\ntar xzf obscura-x86_64-linux.tar.gz\n./obscura fetch https://example.com --eval \"document.title\"\n\n# macOS Apple Silicon\ncurl -LO https://github.com/h4ckf0r0day/obscura/releases/latest/download/obscura-aarch64-macos.tar.gz\ntar xzf obscura-aarch64-macos.tar.gz\n\n# macOS Intel\ncurl -LO https://github.com/h4ckf0r0day/obscura/releases/latest/download/obscura-x86_64-macos.tar.gz\ntar xzf obscura-x86_64-macos.tar.gz\n\n# Windows\nDownload the `.zip` from the releases page and extract it manually.\n```\n\nSingle binary. No Chrome, no Node.js, no dependencies.\n\n### Build from source\n\n```bash\ngit clone https://github.com/h4ckf0r0day/obscura.git\ncd obscura\ncargo build --release\n\n# With stealth mode (anti-detection + tracker blocking)\ncargo build --release --features stealth\n```\n\nRequires Rust 1.75+ ([rustup.rs](https://rustup.rs)). First build takes ~5 min (V8 compiles from source, cached after).\n\n## Quick Start\n\n### Fetch a page\n\n```bash\n# Get the page title\nobscura fetch https://example.com --eval \"document.title\"\n\n# Extract all links\nobscura fetch https://example.com --dump links\n\n# Render JavaScript and dump HTML\nobscura fetch https://news.ycombinator.com --dump html\n\n# Wait for dynamic content\nobscura fetch https://example.com --wait-until networkidle0\n```\n\n### Start the CDP server\n\n```bash\nobscura serve --port 9222\n\n# With stealth mode (anti-detection + tracker blocking)\nobscura serve --port 9222 --stealth\n```\n\n### Scrape in parallel\n\n```bash\nobscura scrape url1 url2 url3 ... \\\n  --concurrency 25 \\\n  --eval \"document.querySelector('h1').textContent\" \\\n  --format json\n```\n\n## Puppeteer / Playwright\n\n### Puppeteer\n\n```bash\nnpm install puppeteer-core\n```\n\n```javascript\nimport puppeteer from 'puppeteer-core';\n\nconst browser = await puppeteer.connect({\n  browserWSEndpoint: 'ws://127.0.0.1:9222/devtools/browser',\n});\n\nconst page = await browser.newPage();\nawait page.goto('https://news.ycombinator.com');\n\nconst stories = await page.evaluate(() =>\n  Array.from(document.querySelectorAll('.titleline > a'))\n    .map(a => ({ title: a.textContent, url: a.href }))\n);\nconsole.log(stories);\n\nawait browser.disconnect();\n```\n\n### Playwright\n\n```bash\nnpm install playwright-core\n```\n\n```javascript\nimport { chromium } from 'playwright-core';\n\nconst browser = await chromium.connectOverCDP({\n  endpointURL: 'ws://127.0.0.1:9222',\n});\n\nconst page = await browser.newContext().then(ctx => ctx.newPage());\nawait page.goto('https://en.wikipedia.org/wiki/Web_scraping');\nconsole.log(await page.title());\n\nawait browser.close();\n```\n\n### Form submission & login\n\n```javascript\nawait page.goto('https://quotes.toscrape.com/login');\nawait page.evaluate(() => {\n  document.querySelector('#username').value = 'admin';\n  document.querySelector('#password').value = 'admin';\n  document.querySelector('form').submit();\n});\n// Obscura handles the POST, follows the 302 redirect, maintains cookies\n```\n\n## Benchmarks\n\nPage load:\n\n| Page | Obscura | Chrome |\n|------|---------|--------|\n| Static HTML | **51 ms** | ~500 ms |\n| JS + XHR + fetch | **84 ms** | ~800 ms |\n| Dynamic scripts | **78 ms** | ~700 ms |\n\n## Stealth Mode\n\nEnable with `--features stealth`.\n\n### Anti-fingerprinting\n- Per-session fingerprint randomization (GPU, screen, canvas, audio, battery)\n- Realistic `navigator.userAgentData` (Chrome 145, high-entropy values)\n- `event.isTrusted = true` for dispatched events\n- Hidden internal properties (`Object.keys(window)` safe)\n- Native function masking (`Function.prototype.toString()` → `[native code]`)\n- `navigator.webdriver = undefined` (matches real Chrome)\n\n### Tracker Blocking\n- 3,520 domains blocked\n- Blocks analytics, ads, telemetry, and fingerprinting scripts\n- Prevents trackers from loading entirely\n- Enabled automatically with `--stealth`\n\n## CDP API\n\nObscura implements the Chrome DevTools Protocol for Puppeteer/Playwright compatibility.\n\n| Domain | Methods |\n|--------|---------|\n| **Target** | createTarget, closeTarget, attachToTarget, createBrowserContext, disposeBrowserContext |\n| **Page** | navigate, getFrameTree, addScriptToEvaluateOnNewDocument, lifecycleEvents |\n| **Runtime** | evaluate, callFunctionOn, getProperties, addBinding |\n| **DOM** | getDocument, querySelector, querySelectorAll, getOuterHTML, resolveNode |\n| **Network** | enable, setCookies, getCookies, setExtraHTTPHeaders, setUserAgentOverride |\n| **Fetch** | enable, continueRequest, fulfillRequest, failRequest (live interception) |\n| **Storage** | getCookies, setCookies, deleteCookies |\n| **Input** | dispatchMouseEvent, dispatchKeyEvent |\n| **LP** | getMarkdown (DOM-to-Markdown conversion) |\n## CLI Reference\n\n### `obscura serve`\n\nStart a CDP WebSocket server.\n\n| Flag | Default | Description |\n|------|---------|-------------|\n| `--port` | `9222` | WebSocket port |\n| `--proxy` | — | HTTP/SOCKS5 proxy URL |\n| `--stealth` | off | Enable anti-detection + tracker blocking |\n| `--workers` | `1` | Number of parallel worker processes |\n| `--obey-robots` | off | Respect robots.txt |\n\n### `obscura fetch <URL>`\n\nFetch and render a single page.\n\n| Flag | Default | Description |\n|------|---------|-------------|\n| `--dump` | `html` | Output: `html`, `text`, or `links` |\n| `--eval` | — | JavaScript expression to evaluate |\n| `--wait-until` | `load` | Wait: `load`, `domcontentloaded`, `networkidle0` |\n| `--selector` | — | Wait for CSS selector |\n| `--stealth` | off | Anti-detection mode |\n| `--quiet` | off | Suppress banner |\n\n### `obscura scrape <URL...>`\n\nScrape multiple URLs in parallel with worker processes.\n\n| Flag | Default | Description |\n|------|---------|-------------|\n| `--concurrency` | `10` | Parallel workers |\n| `--eval` | — | JS expression per page |\n| `--format` | `json` | Output: `json` or `text` |\n\n## License\n\nApache 2.0\n\n---\n","summary":" Obscura is a lightweight, Rust-based headless browser engine designed for high-scale web scraping and AI agent automation. It executes real JavaScript through V8, supports the Chrome DevTools Protocol, and serves as a drop-in replacement for Puppeteer and Playwright while consuming only 30MB of memory and 70MB of disk space compared to 200MB+ and 300MB+ respectively for headless Chrome. With built-in anti-detection capabilities, near-instant startup times, and a single self-contained binary that requires no Chrome or Node.js dependencies, Obscura is ideal for developers and organizations running automated browser tasks at scale where efficiency, stealth, and resource optimization are critical.","description":"The headless browser for AI agents and web scraping","stars":342,"language":"Rust"},{"owner":"shanselman","repo":"PeekDesktop","url":"https://github.com/shanselman/PeekDesktop","readme":"# PeekDesktop 👀\n\n**Click empty desktop wallpaper (or empty taskbar area) to reveal your desktop — just like macOS Sonoma.**\n\nPeekDesktop brings macOS Sonoma's \"click wallpaper to reveal desktop\" feature to Windows 10 and 11. By default it uses Explorer's native **Show Desktop** behavior, and it also includes an optional **Fly Away** experimental style plus tray toggles for **Require Double-Click** and **Peek on Taskbar Click**. Click or drag desktop icons normally without accidentally triggering peek. When you're done, click any window, the taskbar, or the wallpaper again and everything comes right back where it was.\n\n<p align=\"center\">\n  <img src=\"img/demo.gif\" alt=\"PeekDesktop demo showing windows minimizing when you click the wallpaper\" width=\"900\" />\n</p>\n\n## Download\n\n📥 **[Download the latest release](https://github.com/shanselman/PeekDesktop/releases/latest)**\n\n| File | Platform |\n|------|----------|\n| `PeekDesktop-vX.Y-win-x64.zip` | Intel/AMD (most PCs) |\n| `PeekDesktop-vX.Y-win-arm64.zip` | ARM64 (Surface Pro X, Snapdragon, etc.) |\n\nNo installer needed. Download the zip, extract it, and run `PeekDesktop.exe`. Release builds are **self-contained**, so you do not need to install .NET separately. It lives in your system tray and can notify you when a newer GitHub Release is available.\n\n## Documentation\n\n- **[Engineering Deep Dive](Docs/PeekDesktop-Engineering-Deep-Dive.md)** - architecture, shell internals, experiments, debugging workflow, undocumented API notes, and release tradeoffs\n\n## How It Works\n\n1. **Click empty desktop wallpaper or empty taskbar area** (not an icon or taskbar button) -> your desktop is revealed\n2. **Stay on the desktop** -> click or drag icons, right-click, and rearrange things while windows stay hidden\n3. **Click any app, the taskbar, or empty wallpaper again** -> all windows restore to exactly where they were\n\nThat's it. It just works.\n\n## Peek Styles\n\n- **Show Desktop (Explorer)** — the default and recommended mode. Uses Explorer's native Show Desktop behavior.\n- **Fly Away (Experimental)** — animates windows offscreen. Fun but has known quirks with external window management (Win+D, taskbar). Use for the visual flair, but know it can get confused if the shell changes window state behind its back.\n\n### Under the Hood\n\nPeekDesktop uses lightweight Windows APIs:\n\n- **`SetWindowsHookEx(WH_MOUSE_LL)`** — low-level mouse hook to detect desktop clicks\n- **`WindowFromPoint`** — identifies the window under your cursor\n- **MSAA hit-testing (`AccessibleObjectFromPoint`)** — distinguishes empty wallpaper from desktop icons\n- **UI Automation hit-testing** — classifies empty taskbar space without firing on Start, pinned apps, or tray buttons\n- **Taskbar Show Desktop button click** — primary path, immune to keyboard remapping (PowerToys, etc.)\n- **Win+D `SendInput`** — fallback if taskbar button is unavailable\n- **`EnumWindows` + `WINDOWPLACEMENT`** — captures exact position and state (including maximized) of every window\n- **`SetWinEventHook(EVENT_SYSTEM_FOREGROUND)`** — watches for when you switch back to an app\n- **`SetWindowPlacement`** — restores windows to their exact previous positions\n\nNo admin rights required. Uses < 5 MB RAM idle.\n\n## System Tray\n\nRight-click the tray icon for options:\n\n- ✅ **Enabled** — toggle the peek feature on/off\n- 🔁 **Start with Windows** — launch automatically at login\n- 🖱️ **Require Double-Click** — optionally require a double-click on the desktop to trigger peek\n- 🎮 **Pause While Gaming / Full-Screen** — on by default for exclusive full-screen and known gaming fullscreen apps\n- 📌 **Peek on Taskbar Click** — optionally trigger peek from empty taskbar space\n- 👀 **Peek Style** — switch between Explorer and fly-away modes\n- ℹ️ **About** — version info\n- ⬇️ **Check for Updates** — see if a newer version is out and open the download page\n- ❌ **Exit** — quit PeekDesktop\n\nWhen Windows is in dark mode, the tray menu also follows the system theme when supported by the OS.\n\n## What's New\n\n- **Small Native AOT single-file builds** for both x64 and ARM64\n- **Peek on Taskbar Click** — optional trigger from empty taskbar space\n- **Dark tray menu support** — follows Windows dark mode when available\n- **Taskbar button Show Desktop** — bypasses keyboard remappers (PowerToys Keyboard Manager, etc.)\n- **Pause While Gaming / Full-Screen** — avoids interference during gaming sessions\n- **Require Double-Click** — optional double-click trigger for desktop peek\n- **Auto-update notifications** via GitHub Releases\n\n## macOS Sonoma vs PeekDesktop\n\n| Feature | macOS Sonoma | PeekDesktop |\n|---------|-------------|-------------|\n| Click wallpaper to peek | ✅ | ✅ |\n| Restore on app click | ✅ | ✅ |\n| Restore on second wallpaper click | ✅ | ✅ |\n| Clicking/dragging icons does not trigger peek | ✅ | ✅ |\n| Desktop icons accessible | ✅ | ✅ |\n| Exact window position restore | ✅ | ✅ |\n| System tray control | ❌ | ✅ |\n| Multi-monitor support | ✅ | ✅ |\n| Start with OS | Login Items | ✅ Registry |\n| Smooth animation | ✅ | Fly Away mode |\n\n## Build from Source\n\n**Requirements:** [.NET 10 SDK](https://dotnet.microsoft.com/download/dotnet/10.0)\n\n```bash\ngit clone https://github.com/shanselman/PeekDesktop.git\ncd PeekDesktop\ndotnet build src/PeekDesktop/PeekDesktop.csproj\n```\n\n### Run it\n\n```bash\ndotnet run --project src/PeekDesktop/PeekDesktop.csproj\n```\n\n### Publish a self-contained single-file exe\n\n```bash\n# For Intel/AMD\ndotnet publish src/PeekDesktop/PeekDesktop.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true\n\n# For ARM64\ndotnet publish src/PeekDesktop/PeekDesktop.csproj -c Release -r win-arm64 --self-contained -p:PublishSingleFile=true\n```\n\n### Release packaging\n\nRelease builds use **.NET Native AOT** — the exe is a fully native binary with no .NET runtime dependency. Current releases ship as self-contained single-file executables for both x64 and ARM64. Earlier experiments also used [PublishAotCompressed](https://github.com/MichalStrehovsky/PublishAotCompressed) (LZMA), but current builds favor compatibility and predictable startup behavior.\n\n## Architecture\n\n```\nsrc/PeekDesktop/\n├── Program.cs             # Entry point, single-instance mutex\n├── DesktopPeek.cs         # Core state machine (Idle ↔ Peeking)\n├── MouseHook.cs           # WH_MOUSE_LL global mouse hook\n├── FocusWatcher.cs        # EVENT_SYSTEM_FOREGROUND monitor\n├── WindowTracker.cs       # Enumerate, minimize, and restore windows\n├── DesktopDetector.cs     # Identify desktop windows, icons, taskbar\n├── Win32MessageLoop.cs    # Win32 message loop + TaskbarCreated recovery\n├── Win32TrayIcon.cs       # Shell_NotifyIcon wrapper\n├── Win32Menu.cs           # Win32 popup menu wrapper\n├── Win32Icon.cs           # Programmatic icon via CreateIconIndirect\n├── WinHttp.cs             # WinHTTP wrapper (replaces HttpClient)\n├── TrayIcon.cs            # Tray icon business logic + menu wiring\n├── AppUpdater.cs          # GitHub release update checker (via WinHTTP)\n├── AppDiagnostics.cs      # Logging via Trace/DebugView\n├── Settings.cs            # Hand-written UTF-8 JSON persistence + autostart\n└── NativeMethods.cs       # Win32 P/Invoke declarations\n```\n\n## Contributing\n\nPRs welcome! Current status and next ideas:\n\n- [x] Click empty wallpaper to peek\n- [x] Click empty taskbar area to peek (opt-in)\n- [x] Restore on app click or taskbar click\n- [x] Restore on a second wallpaper click\n- [x] Clicking or dragging desktop icons does **not** start peek\n- [x] Right-click desktop icons while peeking (context menus stay open)\n- [x] Desktop icons remain usable while peeking\n- [x] Exact window positions are restored\n- [x] GitHub release-based update checks\n- [x] Works with PowerToys Keyboard Manager (keyboard remapping)\n- [ ] Smooth minimize/restore animations (slide/fade)\n- [ ] Hotkey support (e.g., `Ctrl+F12` to toggle peek)\n- [ ] Per-monitor peek (only minimize windows on the clicked monitor)\n- [ ] Exclude specific apps from being minimized\n\n## .NET Native AOT — The Size Journey 💾\n\nPeekDesktop is a showcase for how small a .NET Native AOT application can get. Starting from a standard WinForms app, we systematically eliminated every managed framework dependency until the binary was pure Win32 P/Invoke — then compressed it to fit on a floppy disk.\n\n| Version | Binary Size | What Changed |\n|---------|------------|--------------|\n| v0.4.5 | ~65 MB | Self-contained .NET (no AOT) |\n| v0.5.0 | 17.5 MB | Enabled Native AOT |\n| v0.6.0 | 4.2 MB | Dropped WinForms — pure Win32 P/Invoke for tray icon, menus, message loop |\n| v0.6.1 | 2.3 MB | Replaced `HttpClient` with OS-native WinHTTP (`winhttp.dll`) |\n| v0.7.2 | 1.88 MB | Eliminated JSON source generator, `System.Reflection`, `Process.Start` |\n| v0.7.2 + LZMA | **~564 KB** | **LZMA compression via [PublishAotCompressed](https://github.com/MichalStrehovsky/PublishAotCompressed)** |\n\n**What's left in the 1.88 MB (pre-compression)?**\n- ~1.2 MB — .NET Native AOT runtime (GC, threading, exception handling, type system)\n- ~0.4 MB — `Utf8JsonReader`/`Utf8JsonWriter` + async task machinery\n- ~0.2 MB — App code, P/Invoke stubs, string literals\n- ~0.08 MB — PE headers and metadata\n\n**Key techniques:**\n- **No WinForms, no System.Drawing** — `Shell_NotifyIcon`, `CreatePopupMenu`, `TrackPopupMenuEx`, `MessageBoxW`, `CreateIconIndirect` via P/Invoke\n- **No HttpClient** — `WinHttpOpen`/`WinHttpSendRequest` uses the OS HTTP+TLS stack at zero binary cost\n- **No JSON source generator** — hand-written `Utf8JsonReader`/`Utf8JsonWriter` for the two tiny JSON shapes we need\n- **No System.Reflection** — PE version resources read via `GetFileVersionInfoExW` P/Invoke\n- **No managed delegates for WndProc** — `UnmanagedCallersOnly` function pointers avoid marshaling overhead\n- **`OptimizationPreference=Size`** + `InvariantGlobalization` + stripped diagnostics\n\nSpecial thanks to [Michal Strehovský](https://github.com/MichalStrehovsky) — the architect of .NET Native AOT — whose [PR #5](https://github.com/shanselman/PeekDesktop/pull/5) inspired the final round of optimizations that eliminated the JSON source generator, reflection, and managed delegates. When the person who *built* the AOT compiler optimizes your app, you pay attention. 🙏\n\n## License\n\n[MIT](LICENSE)\n","summary":" PeekDesktop brings macOS Sonoma's \"click to reveal desktop\" feature to Windows 10 and 11, allowing users to instantly minimize all windows by clicking empty desktop wallpaper or taskbar space, then restore them to their exact previous positions—including maximized states—with a subsequent click. The lightweight, portable utility requires no installation, administrative privileges, or .NET runtime, consuming under 5 MB of RAM while offering system tray controls for double-click requirements, automatic gaming mode pausing, and two peek styles: native Explorer \"Show Desktop\" behavior or an experimental \"Fly Away\" animation. Using Windows accessibility APIs to distinguish empty wallpaper from desktop icons, it prevents accidental triggers while enabling normal file manipulation during peek mode. It is ideal for Windows users seeking efficient, mouse-driven access to desktop files without relying on keyboard shortcuts like Win+D.","description":"Click your desktop to peek at it - just like macOS Sonoma.","stars":315,"language":"C#"},{"owner":"HKUDS","repo":"Vibe-Trading","url":"https://github.com/HKUDS/Vibe-Trading","readme":"<p align=\"center\">\n  <b>English</b> | <a href=\"README_zh.md\">中文</a> | <a href=\"README_ja.md\">日本語</a> | <a href=\"README_ko.md\">한국어</a> | <a href=\"README_ar.md\">العربية</a>\n</p>\n\n<p align=\"center\">\n  <img src=\"assets/icon.png\" width=\"120\" alt=\"Vibe-Trading Logo\"/>\n</p>\n\n<h1 align=\"center\">Vibe-Trading: Your Personal Trading Agent</h1>\n\n<p align=\"center\">\n  <b>One Command to Empower Your Agent with Comprehensive Trading Capabilities</b>\n</p>\n\n<p align=\"center\">\n  <img src=\"https://img.shields.io/badge/Python-3.11%2B-3776AB?style=flat&logo=python&logoColor=white\" alt=\"Python\">\n  <img src=\"https://img.shields.io/badge/Backend-FastAPI-009688?style=flat\" alt=\"FastAPI\">\n  <img src=\"https://img.shields.io/badge/Frontend-React%2019-61DAFB?style=flat&logo=react&logoColor=white\" alt=\"React\">\n  <a href=\"https://pypi.org/project/vibe-trading-ai/\"><img src=\"https://img.shields.io/pypi/v/vibe-trading-ai?style=flat&logo=pypi&logoColor=white\" alt=\"PyPI\"></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/badge/License-MIT-yellow?style=flat\" alt=\"License\"></a>\n  <br>\n  <img src=\"https://img.shields.io/badge/Skills-71-orange\" alt=\"Skills\">\n  <img src=\"https://img.shields.io/badge/Swarm_Presets-29-7C3AED\" alt=\"Swarm\">\n  <img src=\"https://img.shields.io/badge/Tools-27-0F766E\" alt=\"Tools\">\n  <img src=\"https://img.shields.io/badge/Data_Sources-5-2563EB\" alt=\"Data Sources\">\n  <br>\n  <a href=\"https://github.com/HKUDS/.github/blob/main/profile/README.md\"><img src=\"https://img.shields.io/badge/Feishu-Group-E9DBFC?style=flat-square&logo=feishu&logoColor=white\" alt=\"Feishu\"></a>\n  <a href=\"https://github.com/HKUDS/.github/blob/main/profile/README.md\"><img src=\"https://img.shields.io/badge/WeChat-Group-C5EAB4?style=flat-square&logo=wechat&logoColor=white\" alt=\"WeChat\"></a>\n  <a href=\"https://discord.gg/2vDYc2w5\"><img src=\"https://img.shields.io/badge/Discord-Join-7289DA?style=flat-square&logo=discord&logoColor=white\" alt=\"Discord\"></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"#-key-features\">Features</a> &nbsp;&middot;&nbsp;\n  <a href=\"#-demo\">Demo</a> &nbsp;&middot;&nbsp;\n  <a href=\"#-what-is-vibe-trading\">What Is It</a> &nbsp;&middot;&nbsp;\n  <a href=\"#-get-started\">Get Started</a> &nbsp;&middot;&nbsp;\n  <a href=\"#-cli-reference\">CLI</a> &nbsp;&middot;&nbsp;\n  <a href=\"#-api-server\">API</a> &nbsp;&middot;&nbsp;\n  <a href=\"#-mcp-plugin\">MCP</a> &nbsp;&middot;&nbsp;\n  <a href=\"#-project-structure\">Structure</a> &nbsp;&middot;&nbsp;\n  <a href=\"#-roadmap\">Roadmap</a> &nbsp;&middot;&nbsp;\n  <a href=\"#-contributing\">Contributing</a> &nbsp;&middot;&nbsp;\n  <a href=\"#contributors\">Contributors</a>\n</p>\n\n<p align=\"center\">\n  <a href=\"#-get-started\"><img src=\"assets/pip-install.svg\" height=\"45\" alt=\"pip install vibe-trading-ai\"></a>\n</p>\n\n---\n\n## 📰 News\n\n- **2026-04-19** 📦 **v0.1.5**: Published to PyPI & ClawHub. `python-multipart` CVE floor bump, 5 new MCP tools wired (`analyze_trade_journal` + 4 shadow-account tools), `pattern_recognition` → `pattern` registry fix, Docker dep parity, SKILL manifest synced (22 MCP tools / 71 skills).\n- **2026-04-18** 👥 **Shadow Account**: Extract your strategy rules from a broker journal → backtest the shadow across markets → 8-section HTML/PDF report showing exactly how much you leave on the table (rule violations, early exits, missed signals, counterfactual trades). 4 new tools, 1 skill, 32 tools total. Trade Journal + Shadow Account samples now live in the web UI welcome screen.\n- **2026-04-17** 📊 **Trade Journal Analyzer + Universal File Reader**: Upload broker exports (同花顺/东财/富途/generic CSV) → auto trading profile (holding days, win rate, PnL ratio, drawdown) + 4 bias diagnostics (disposition effect, overtrading, chasing momentum, anchoring). `read_document` now dispatches PDF, Word, Excel, PowerPoint, images (OCR), and 40+ text formats behind one unified call.\n\n<details>\n<summary>Earlier news</summary>\n\n- **2026-04-16** 🧠 **Agent Harness**: Persistent cross-session memory, FTS5 session search, self-evolving skills (full CRUD), 5-layer context compression, read/write tool batching. 27 tools, 107 new tests.\n- **2026-04-15** 🤖 **Z.ai + MiniMax**: Z.ai provider ([#35](https://github.com/HKUDS/Vibe-Trading/pull/35)), MiniMax temperature fix + model update ([#33](https://github.com/HKUDS/Vibe-Trading/pull/33)). 13 providers.\n- **2026-04-14** 🔧 **MCP Stability**: Fixed backtest tool `Connection closed` error on stdio transport ([#32](https://github.com/HKUDS/Vibe-Trading/pull/32)).\n- **2026-04-13** 🌐 **Cross-Market Composite Backtest**: New `CompositeEngine` backtests mixed-market portfolios (e.g. A-shares + crypto) with shared capital pool and per-market rules. Also fixed swarm template variable fallback and frontend timeout.\n- **2026-04-12** 🌍 **Multi-Platform Export**: `/pine` exports strategies to TradingView (Pine Script v6), TDX (通达信/同花顺/东方财富), and MetaTrader 5 (MQL5) in one command.\n- **2026-04-11** 🛡️ **Reliability & DX**: `vibe-trading init` .env bootstrap ([#19](https://github.com/HKUDS/Vibe-Trading/pull/19)), preflight checks, runtime data-source fallback, hardened backtest engine. Multi-language README ([#21](https://github.com/HKUDS/Vibe-Trading/pull/21)).\n- **2026-04-10** 📦 **v0.1.4**: Docker fix ([#8](https://github.com/HKUDS/Vibe-Trading/issues/8)), `web_search` MCP tool, 12 LLM providers, `akshare`/`ccxt` deps. Published to PyPI and ClawHub.\n- **2026-04-09** 📊 **Backtest Wave 2**: ChinaFutures, GlobalFutures, Forex, Options v2 engines. Monte Carlo, Bootstrap CI, Walk-Forward validation.\n- **2026-04-08** 🔧 **Multi-market backtest** with per-market rules, Pine Script v6 export, 5 data sources with auto-fallback.\n\n</details>\n\n---\n\n## 💡 What Is Vibe-Trading?\n\nVibe-Trading is an AI-powered multi-agent finance workspace that turns natural language requests into executable trading strategies, research insights, and portfolio analysis across global markets.\n\n### Key Capabilities:\n• **Natural Language → Strategy** — Describe an idea; the agent writes, tests, and exports trading code<br>\n• **5 Data Sources, Zero Config** — A-shares, HK/US, crypto, futures & forex with automatic fallback<br>\n• **29 Expert Teams** — Pre-built multi-agent swarm workflows for investment, trading & risk<br>\n• **Cross-Session Memory** — Remembers preferences and insights; creates & evolves reusable skills<br>\n• **7 Backtest Engines** — Cross-market composite testing with statistical validation & 4 optimizers<br>\n• **Multi-Platform Export** — One-click to TradingView, TDX (通达信/同花顺), and MetaTrader 5\n\n---\n\n## ✨ Key Features\n\n<table width=\"100%\">\n  <tr>\n    <td align=\"center\" width=\"25%\" valign=\"top\">\n      <img src=\"assets/scene-research.png\" height=\"150\" alt=\"Research\"/><br>\n      <h3>🔍 DeepResearch for Trading</h3>\n      <img src=\"https://img.shields.io/badge/71_Skills-FF6B6B?style=for-the-badge&logo=bookstack&logoColor=white\" alt=\"Skills\" /><br><br>\n      <div align=\"left\" style=\"font-size: 4px;\">\n        • 71 specialist skills with persistent cross-session memory<br>\n        • Self-evolving: agent creates & refines workflows from experience<br>\n        • 5-layer context compression — no info lost in long sessions<br>\n        • Natural-language task routing across all finance domains\n      </div>\n    </td>\n    <td align=\"center\" width=\"25%\" valign=\"top\">\n      <img src=\"assets/scene-swarm.png\" height=\"150\" alt=\"Swarm\"/><br>\n      <h3>🐝 Swarm Intelligence</h3>\n      <img src=\"https://img.shields.io/badge/29_Trading_Teams-4ECDC4?style=for-the-badge&logo=hive&logoColor=white\" alt=\"Swarm\" /><br><br>\n      <div align=\"left\">\n        • 29 out-of-the-box trading team presets<br>\n        • DAG-based multi-agent orchestration<br>\n        • Real-time streaming dashboard with live agent status<br>\n        • FTS5 session search across all past conversations\n      </div>\n    </td>\n    <td align=\"center\" width=\"25%\" valign=\"top\">\n      <img src=\"assets/scene-backtest.png\" height=\"150\" alt=\"Backtest\"/><br>\n      <h3>📊 Cross-Market Backtest</h3>\n      <img src=\"https://img.shields.io/badge/5_Data_Sources-FFD93D?style=for-the-badge&logo=bitcoin&logoColor=black\" alt=\"Backtest\" /><br><br>\n      <div align=\"left\">\n        • A-shares, HK/US equities, crypto, futures & forex<br>\n        • 7 market engines + composite cross-market engine with shared capital pool<br>\n        • Statistical validation: Monte Carlo, Bootstrap CI, Walk-Forward<br>\n        • 15+ performance metrics & 4 optimizers\n      </div>\n    </td>\n    <td align=\"center\" width=\"25%\" valign=\"top\">\n      <img src=\"assets/scene-quant.png\" height=\"150\" alt=\"Quant\"/><br>\n      <h3>🧮 Quant Analysis Toolkit</h3>\n      <img src=\"https://img.shields.io/badge/Quant_Tools-C77DFF?style=for-the-badge&logo=wolfram&logoColor=white\" alt=\"Quant\" /><br><br>\n      <div align=\"left\">\n        • Factor IC/IR analysis & quantile backtesting<br>\n        • Black-Scholes pricing & full Greeks calculation<br>\n        • Technical pattern recognition & detection<br>\n        • Portfolio optimization via MVO/Risk Parity/BL\n      </div>\n    </td>\n  </tr>\n</table>\n\n## 71 Skills across 7 Categories\n\n- 📊 71 specialized finance skills organized into 7 categories\n- 🌐 Complete coverage from traditional markets to crypto & DeFi\n- 🔬 Comprehensive capabilities spanning data sourcing to quantitative research\n\n| Category | Skills | Examples |\n|----------|--------|----------|\n| Data Source | 6 | `data-routing`, `tushare`, `yfinance`, `okx-market`, `akshare`, `ccxt` |\n| Strategy | 17 | `strategy-generate`, `cross-market-strategy`, `technical-basic`, `candlestick`, `ichimoku`, `elliott-wave`, `smc`, `multi-factor`, `ml-strategy` |\n| Analysis | 15 | `factor-research`, `macro-analysis`, `global-macro`, `valuation-model`, `earnings-forecast`, `credit-analysis` |\n| Asset Class | 9 | `options-strategy`, `options-advanced`, `convertible-bond`, `etf-analysis`, `asset-allocation`, `sector-rotation` |\n| Crypto | 7 | `perp-funding-basis`, `liquidation-heatmap`, `stablecoin-flow`, `defi-yield`, `onchain-analysis` |\n| Flow | 7 | `hk-connect-flow`, `us-etf-flow`, `edgar-sec-filings`, `financial-statement`, `adr-hshare` |\n| Tool | 8 | `backtest-diagnose`, `report-generate`, `pine-script`, `doc-reader`, `web-reader` |\n\n## 29 Agent Swarm Team Presets\n\n- 🏢 29 ready-to-use agent teams\n- ⚡ Pre-configured finance workflows\n- 🎯 Investment, trading & risk management presets\n\n| Preset | Workflow |\n|--------|----------|\n| `investment_committee` | Bull/bear debate → risk review → PM final call |\n| `global_equities_desk` | A-share + HK/US + crypto researcher → global strategist |\n| `crypto_trading_desk` | Funding/basis + liquidation + flow → risk manager |\n| `earnings_research_desk` | Fundamental + revision + options → earnings strategist |\n| `macro_rates_fx_desk` | Rates + FX + commodity → macro PM |\n| `quant_strategy_desk` | Screening + factor research → backtest → risk audit |\n| `technical_analysis_panel` | Classic TA + Ichimoku + harmonic + Elliott + SMC → consensus |\n| `risk_committee` | Drawdown + tail risk + regime review → sign-off |\n| `global_allocation_committee` | A-shares + crypto + HK/US → cross-market allocation |\n\n<sub>Plus 20+ additional specialist presets — run vibe-trading --swarm-presets to explore all.\n\n</sub>\n\n### 🎬 Demo\n\n<div align=\"center\">\n<table>\n<tr>\n<td width=\"50%\">\n\nhttps://github.com/user-attachments/assets/4e4dcb80-7358-4b9a-92f0-1e29612e6e86\n\n</td>\n<td width=\"50%\">\n\nhttps://github.com/user-attachments/assets/3754a414-c3ee-464f-b1e8-78e1a74fbd30\n\n</td>\n</tr>\n<tr>\n<td colspan=\"2\" align=\"center\"><sub>☝️ Natural-language backtest & multi-agent swarm debate — Web UI + CLI</sub></td>\n</tr>\n</table>\n</div>\n\n---\n\n## 🚀 Quick Started\n\n### One-line install (PyPI)\n\n```bash\npip install vibe-trading-ai\n```\n\n> **Package name vs commands:** The PyPI package is `vibe-trading-ai`. Once installed, you get three commands:\n>\n> | Command | Purpose |\n> |---------|---------|\n> | `vibe-trading` | Interactive CLI / TUI |\n> | `vibe-trading serve` | Launch FastAPI web server |\n> | `vibe-trading-mcp` | Start MCP server (for Claude Desktop, OpenClaw, Cursor, etc.) |\n\n```bash\nvibe-trading init              # interactive .env setup\nvibe-trading                   # launch CLI\nvibe-trading serve --port 8899 # launch web UI\nvibe-trading-mcp               # start MCP server (stdio)\n```\n\n### Or choose a path\n\n| Path | Best for | Time |\n|------|----------|------|\n| **A. Docker** | Try it now, zero local setup | 2 min |\n| **B. Local install** | Development, full CLI access | 5 min |\n| **C. MCP plugin** | Plug into your existing agent | 3 min |\n| **D. ClawHub** | One command, no cloning | 1 min |\n\n### Prerequisites\n\n- An **LLM API key** from any supported provider — or run locally with **Ollama** (no key needed)\n- **Python 3.11+** for Path B\n- **Docker** for Path A\n\n> **Supported LLM providers:** OpenRouter, OpenAI, DeepSeek, Gemini, Groq, DashScope/Qwen, Zhipu, Moonshot/Kimi, MiniMax, Xiaomi MIMO, Z.ai, Ollama (local). See `.env.example` for config.\n\n> **Tip:** All markets work without any API keys thanks to automatic fallback. yfinance (HK/US), OKX (crypto), and AKShare (A-shares, US, HK, futures, forex) are all free. Tushare token is optional — AKShare covers A-shares as a free fallback.\n\n### Path A: Docker (zero setup)\n\n```bash\ngit clone https://github.com/HKUDS/Vibe-Trading.git\ncd Vibe-Trading\ncp agent/.env.example agent/.env\n# Edit agent/.env — uncomment your LLM provider and set API key\ndocker compose up --build\n```\n\nOpen `http://localhost:8899`. Backend + frontend in one container.\n\n### Path B: Local install\n\n```bash\ngit clone https://github.com/HKUDS/Vibe-Trading.git\ncd Vibe-Trading\npython -m venv .venv\n\n# Activate\nsource .venv/bin/activate          # Linux / macOS\n# .venv\\Scripts\\Activate.ps1       # Windows PowerShell\n\npip install -e .\ncp agent/.env.example agent/.env   # Edit — set your LLM provider API key\nvibe-trading                       # Launch interactive TUI\n```\n\n<details>\n<summary><b>Start web UI (optional)</b></summary>\n\n```bash\n# Terminal 1: API server\nvibe-trading serve --port 8899\n\n# Terminal 2: Frontend dev server\ncd frontend && npm install && npm run dev\n```\n\nOpen `http://localhost:5899`. The frontend proxies API calls to `localhost:8899`.\n\n**Production mode (single server):**\n\n```bash\ncd frontend && npm run build && cd ..\nvibe-trading serve --port 8899     # FastAPI serves dist/ as static files\n```\n\n</details>\n\n### Path C: MCP plugin\n\nSee [MCP Plugin](#-mcp-plugin) section below.\n\n### Path D: ClawHub (one command)\n\n```bash\nnpx clawhub@latest install vibe-trading --force\n```\n\nThe skill + MCP config is downloaded into your agent's skills directory. See [ClawHub install](#-mcp-plugin) for details.\n\n---\n\n## 🧠 Environment Variables\n\nCopy `agent/.env.example` to `agent/.env` and uncomment the provider block you want. Each provider needs 3-4 variables:\n\n| Variable | Required | Description |\n|----------|:--------:|-------------|\n| `LANGCHAIN_PROVIDER` | Yes | Provider name (`openrouter`, `deepseek`, `groq`, `ollama`, etc.) |\n| `<PROVIDER>_API_KEY` | Yes* | API key (`OPENROUTER_API_KEY`, `DEEPSEEK_API_KEY`, etc.) |\n| `<PROVIDER>_BASE_URL` | Yes | API endpoint URL |\n| `LANGCHAIN_MODEL_NAME` | Yes | Model name (e.g. `deepseek/deepseek-v3.2`) |\n| `TUSHARE_TOKEN` | No | Tushare Pro token for A-share data (falls back to AKShare) |\n| `TIMEOUT_SECONDS` | No | LLM call timeout, default 120s |\n\n<sub>* Ollama does not require an API key.</sub>\n\n**Free data (no key needed):** A-shares via AKShare, HK/US equities via yfinance, crypto via OKX, 100+ crypto exchanges via CCXT. The system automatically selects the best available source for each market.\n\n### 🎯 Recommended Models\n\nVibe-Trading is a tool-heavy agent — skills, backtests, memory, and swarms all flow through tool calls. Model choice directly decides whether the agent *uses* its tools or fabricates answers from training data.\n\n| Tier | Examples | When to use |\n|------|----------|-------------|\n| **Best** | `anthropic/claude-opus-4.7`, `anthropic/claude-sonnet-4.6`, `openai/gpt-5.4`, `google/gemini-3.1-pro-preview` | Complex swarms (3+ agents), long research sessions, paper-grade analysis |\n| **Sweet spot** (default) | `deepseek/deepseek-v3.2`, `x-ai/grok-4.20`, `z-ai/glm-5.1`, `moonshotai/kimi-k2.5`, `qwen/qwen3-max-thinking` | Daily driver — reliable tool-calling at ~1/10 the cost |\n| **Avoid for agent use** | `*-nano`, `*-flash-lite`, `*-coder-next`, small / distilled variants | Tool-calling is unreliable — the agent will appear to \"answer from memory\" instead of loading skills or running backtests |\n\nThe default `agent/.env.example` ships with `deepseek/deepseek-v3.2` — the cheapest option in the sweet-spot tier.\n\n---\n\n## 🖥 CLI Reference\n\n```bash\nvibe-trading               # interactive TUI\nvibe-trading run -p \"...\"  # single run\nvibe-trading serve         # API server\n```\n\n<details>\n<summary><b>Slash commands inside TUI</b></summary>\n\n| Command | Description |\n|---------|-------------|\n| `/help` | Show all commands |\n| `/skills` | List all 71 finance skills |\n| `/swarm` | List 29 swarm team presets |\n| `/swarm run <preset> [vars_json]` | Run a swarm team with live streaming |\n| `/swarm list` | Swarm run history |\n| `/swarm show <run_id>` | Swarm run details |\n| `/swarm cancel <run_id>` | Cancel a running swarm |\n| `/list` | Recent runs |\n| `/show <run_id>` | Run details + metrics |\n| `/code <run_id>` | Generated strategy code |\n| `/pine <run_id>` | Export indicators (TradingView + TDX + MT5) |\n| `/trace <run_id>` | Full execution replay |\n| `/continue <run_id> <prompt>` | Continue a run with new instructions |\n| `/sessions` | List chat sessions |\n| `/settings` | Show runtime config |\n| `/clear` | Clear screen |\n| `/quit` | Exit |\n\n</details>\n\n<details>\n<summary><b>Single run & flags</b></summary>\n\n```bash\nvibe-trading run -p \"Backtest BTC-USDT MACD strategy, last 30 days\"\nvibe-trading run -p \"Analyze AAPL momentum\" --json\nvibe-trading run -f strategy.txt\necho \"Backtest 000001.SZ RSI\" | vibe-trading run\n```\n\n```bash\nvibe-trading -p \"your prompt\"\nvibe-trading --skills\nvibe-trading --swarm-presets\nvibe-trading --swarm-run investment_committee '{\"topic\":\"BTC outlook\"}'\nvibe-trading --list\nvibe-trading --show <run_id>\nvibe-trading --code <run_id>\nvibe-trading --pine <run_id>           # Export indicators (TradingView + TDX + MT5)\nvibe-trading --trace <run_id>\nvibe-trading --continue <run_id> \"refine the strategy\"\nvibe-trading --upload report.pdf\n```\n\n</details>\n\n---\n\n## 🌐 API Server\n\n```bash\nvibe-trading serve --port 8899\n```\n\n| Method | Endpoint | Description |\n|--------|----------|-------------|\n| `GET` | `/runs` | List runs |\n| `GET` | `/runs/{run_id}` | Run details |\n| `GET` | `/runs/{run_id}/pine` | Multi-platform indicator export |\n| `POST` | `/sessions` | Create session |\n| `POST` | `/sessions/{id}/messages` | Send message |\n| `GET` | `/sessions/{id}/events` | SSE event stream |\n| `POST` | `/upload` | Upload PDF/file |\n| `GET` | `/swarm/presets` | List swarm presets |\n| `POST` | `/swarm/runs` | Start swarm run |\n| `GET` | `/swarm/runs/{id}/events` | Swarm SSE stream |\n\nInteractive docs: `http://localhost:8899/docs`\n\n---\n\n## 🔌 MCP Plugin\n\nVibe-Trading exposes 17 MCP tools for any MCP-compatible client. Runs as a stdio subprocess — no server setup needed. **16 of 17 tools work with zero API keys** (HK/US/crypto). Only `run_swarm` needs an LLM key.\n\n<details>\n<summary><b>Claude Desktop</b></summary>\n\nAdd to `claude_desktop_config.json`:\n\n```json\n{\n  \"mcpServers\": {\n    \"vibe-trading\": {\n      \"command\": \"vibe-trading-mcp\"\n    }\n  }\n}\n```\n\n</details>\n\n<details>\n<summary><b>OpenClaw</b></summary>\n\nAdd to `~/.openclaw/config.yaml`:\n\n```yaml\nskills:\n  - name: vibe-trading\n    command: vibe-trading-mcp\n```\n\n</details>\n\n<details>\n<summary><b>Cursor / Windsurf / other MCP clients</b></summary>\n\n```bash\nvibe-trading-mcp                  # stdio (default)\nvibe-trading-mcp --transport sse  # SSE for web clients\n```\n\n</details>\n\n**MCP tools exposed (17):** `list_skills`, `load_skill`, `backtest`, `factor_analysis`, `analyze_options`, `pattern_recognition`, `get_market_data`, `web_search`, `read_url`, `read_document`, `read_file`, `write_file`, `list_swarm_presets`, `run_swarm`, `get_swarm_status`, `get_run_result`, `list_runs`.\n\n<details>\n<summary><b>Install from ClawHub (one command)</b></summary>\n\n```bash\nnpx clawhub@latest install vibe-trading --force\n```\n\n> `--force` is required because the skill references external APIs, which triggers VirusTotal's automated scan. The code is fully open-source and safe to inspect.\n\nThis downloads the skill + MCP config into your agent's skills directory. No cloning needed.\n\nBrowse on ClawHub: [clawhub.ai/skills/vibe-trading](https://clawhub.ai/skills/vibe-trading)\n\n</details>\n\n<details>\n<summary><b>OpenSpace — self-evolving skills</b></summary>\n\nAll 71 finance skills are published on [open-space.cloud](https://open-space.cloud) and evolve autonomously through OpenSpace's self-evolution engine.\n\nTo use with OpenSpace, add both MCP servers to your agent config:\n\n```json\n{\n  \"mcpServers\": {\n    \"openspace\": {\n      \"command\": \"openspace-mcp\",\n      \"toolTimeout\": 600,\n      \"env\": {\n        \"OPENSPACE_HOST_SKILL_DIRS\": \"/path/to/vibe-trading/agent/src/skills\",\n        \"OPENSPACE_WORKSPACE\": \"/path/to/OpenSpace\"\n      }\n    },\n    \"vibe-trading\": {\n      \"command\": \"vibe-trading-mcp\"\n    }\n  }\n}\n```\n\nOpenSpace will auto-discover all 71 skills, enabling auto-fix, auto-improve, and community sharing. Search for Vibe-Trading skills via `search_skills(\"finance backtest\")` in any OpenSpace-connected agent.\n\n</details>\n\n---\n\n## 📁 Project Structure\n\n<details>\n<summary><b>Click to expand</b></summary>\n\n```\nVibe-Trading/\n├── agent/                          # Backend (Python)\n│   ├── cli.py                      # CLI entrypoint — interactive TUI + subcommands\n│   ├── api_server.py               # FastAPI server — runs, sessions, upload, swarm, SSE\n│   ├── mcp_server.py               # MCP server — 17 tools for OpenClaw / Claude Desktop\n│   │\n│   ├── src/\n│   │   ├── agent/                  # ReAct agent core\n│   │   │   ├── loop.py             #   5-layer compression + read/write tool batching\n│   │   │   ├── context.py          #   system prompt + auto-recall from persistent memory\n│   │   │   ├── skills.py           #   skill loader (71 bundled + user-created via CRUD)\n│   │   │   ├── tools.py            #   tool base class + registry\n│   │   │   ├── memory.py           #   lightweight workspace state per run\n│   │   │   ├── frontmatter.py      #   shared YAML frontmatter parser\n│   │   │   └── trace.py            #   execution trace writer\n│   │   │\n│   │   ├── memory/                 # Cross-session persistent memory\n│   │   │   └── persistent.py       #   file-based memory (~/.vibe-trading/memory/)\n│   │   │\n│   │   ├── tools/                  # 27 auto-discovered agent tools\n│   │   │   ├── backtest_tool.py    #   run backtests\n│   │   │   ├── remember_tool.py    #   cross-session memory (save/recall/forget)\n│   │   │   ├── skill_writer_tool.py #  skill CRUD (save/patch/delete/file)\n│   │   │   ├── session_search_tool.py # FTS5 cross-session search\n│   │   │   ├── swarm_tool.py       #   launch swarm teams\n│   │   │   ├── web_search_tool.py  #   DuckDuckGo web search\n│   │   │   └── ...                 #   bash, file I/O, factor analysis, options, etc.\n│   │   │\n│   │   ├── skills/                 # 71 finance skills in 7 categories (SKILL.md each)\n│   │   ├── swarm/                  # Swarm DAG execution engine\n│   │   ├── session/                # Multi-turn chat + FTS5 session search\n│   │   └── providers/              # LLM provider abstraction\n│   │\n│   ├── backtest/                   # Backtest engines\n│   │   ├── engines/                #   7 engines + composite cross-market engine + options_portfolio\n│   │   ├── loaders/                #   5 sources: tushare, okx, yfinance, akshare, ccxt\n│   │   │   ├── base.py             #   DataLoader Protocol\n│   │   │   └── registry.py         #   Registry + auto-fallback chains\n│   │   └── optimizers/             #   MVO, equal vol, max div, risk parity\n│   │\n│   └── config/swarm/               # 29 swarm preset YAML definitions\n│\n├── frontend/                       # Web UI (React 19 + Vite + TypeScript)\n│   └── src/\n│       ├── pages/                  #   Home, Agent, RunDetail, Compare\n│       ├── components/             #   chat, charts, layout\n│       └── stores/                 #   Zustand state management\n│\n├── Dockerfile                      # Multi-stage build\n├── docker-compose.yml              # One-command deploy\n├── pyproject.toml                  # Package config + CLI entrypoint\n└── LICENSE                         # MIT\n```\n\n</details>\n\n---\n\n## 🏛 Ecosystem\n\nVibe-Trading is part of the **[HKUDS](https://github.com/HKUDS)** agent ecosystem:\n\n<table>\n  <tr>\n    <td align=\"center\" width=\"25%\">\n      <a href=\"https://github.com/HKUDS/ClawTeam\"><b>ClawTeam</b></a><br>\n      <sub>Agent Swarm Intelligence</sub>\n    </td>\n    <td align=\"center\" width=\"25%\">\n      <a href=\"https://github.com/HKUDS/nanobot\"><b>NanoBot</b></a><br>\n      <sub>Ultra-Lightweight Personal AI Assistant</sub>\n    </td>\n    <td align=\"center\" width=\"25%\">\n      <a href=\"https://github.com/HKUDS/CLI-Anything\"><b>CLI-Anything</b></a><br>\n      <sub>Making All Software Agent-Native</sub>\n    </td>\n    <td align=\"center\" width=\"25%\">\n      <a href=\"https://github.com/HKUDS/OpenSpace\"><b>OpenSpace</b></a><br>\n      <sub>Self-Evolving AI Agent Skills</sub>\n    </td>\n  </tr>\n</table>\n\n---\n\n## 🗺 Roadmap\n\n> We ship in phases. Items move to [Issues](https://github.com/HKUDS/Vibe-Trading/issues) when work begins.\n\n| Phase | Feature | Status |\n|-------|---------|--------|\n| **Agent Harness** | Persistent cross-session memory (remember / recall / forget) | **Done** |\n| | Self-evolving skills — agent creates, patches, and deletes its own workflows | **Done** |\n| | FTS5 cross-session search across all past conversations | **Done** |\n| | 5-layer context compression (micro → collapse → auto → manual → iterative) | **Done** |\n| | Read/write tool batching — parallel execution for readonly tools | **Done** |\n| **Next Up** | Autonomous research loop — agent iterates hypotheses overnight | In Progress |\n| | IM integration (Slack / Telegram / WeChat) | Planned |\n| **Analysis & Viz** | Options volatility surface & Greeks 3D visualization | Planned |\n| | Cross-asset correlation heatmap with rolling window & clustering | Planned |\n| | Benchmark comparison in CLI backtest output | Planned |\n| **Skills & Presets** | Dividend Analysis skill | Planned |\n| | ESG / Sustainable Investing swarm preset | Planned |\n| **Portfolio & Optimization** | Advanced portfolio optimizer: leverage, sector caps, turnover constraints | Planned |\n| **Future** | Strategy marketplace (share & discover) | Exploring |\n| | Live data streaming via WebSocket | Exploring |\n\n---\n\n## Contributing\n\nWe welcome contributions! See [CONTRIBUTING.md](CONTRIBUTING.md) for guidelines.\n\n**Good first issues** are tagged with [`good first issue`](https://github.com/HKUDS/Vibe-Trading/issues?q=is%3Aissue+is%3Aopen+label%3A%22good+first+issue%22) — pick one and get started.\n\nWant to contribute something bigger? Check the [Roadmap](#-roadmap) above and open an issue to discuss before starting.\n\n---\n\n## Contributors\n\nThanks to everyone who has contributed to Vibe-Trading!\n\n<a href=\"https://github.com/HKUDS/Vibe-Trading/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=HKUDS/Vibe-Trading\" />\n</a>\n\n---\n\n## Disclaimer\n\nVibe-Trading is for research, simulation, and backtesting only. It is not investment advice and it does not execute live trades. Past performance does not guarantee future results.\n\n## License\n\nMIT License — see [LICENSE](LICENSE)\n\n---\n\n<p align=\"center\">\n  Thanks for visiting <b>Vibe-Trading</b> ✨\n</p>\n<p align=\"center\">\n  <img src=\"https://visitor-badge.laobi.icu/badge?page_id=HKUDS.Vibe-Trading&style=flat\" alt=\"visitors\"/>\n</p>\n","summary":" Vibe-Trading is an AI-powered personal trading agent framework that enables users to deploy comprehensive trading capabilities through a single command. The platform features specialized tools for analyzing trade journals from major brokers, backtesting strategies via shadow accounts that expose performance gaps, and universal document reading capabilities, all supported by over 70 trading skills and MCP plugin integration. Built with FastAPI and React with persistent cross-session memory and self-evolving capabilities, it is installable via PyPI as `vibe-trading-ai`. This tool is designed for quantitative traders and investors seeking to automate performance analysis, identify behavioral biases, and optimize trading strategies through AI-driven insights.","description":"\"Vibe-Trading: Your Personal Trading Agent\"","stars":2211,"language":"Python"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
