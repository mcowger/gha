<script id="project-data" type="application/json">[{"owner":"vercel-labs","repo":"wterm","url":"https://github.com/vercel-labs/wterm","readme":"# wterm\n\nA terminal emulator for the web.\n\nwterm (\"dub-term\") renders to the DOM — native text selection, copy/paste, find, and accessibility come for free. The core is written in Zig and compiled to WASM for near-native performance.\n\n## Packages\n\n| Package | Description |\n|---|---|\n| [`@wterm/core`](packages/@wterm/core) | Headless WASM bridge + WebSocket transport |\n| [`@wterm/dom`](packages/@wterm/dom) | DOM renderer, input handler — vanilla JS terminal |\n| [`@wterm/react`](packages/@wterm/react) | React component + `useTerminal` hook (TypeScript) |\n| [`@wterm/just-bash`](packages/@wterm/just-bash) | In-browser Bash shell powered by just-bash |\n| [`@wterm/markdown`](packages/@wterm/markdown) | Render Markdown in the terminal |\n\n## Features\n\n- **Zig + WASM core** — VT100/VT220/xterm escape sequence parser compiled to a ~12 KB `.wasm` binary (release build)\n- **DOM rendering** — native text selection, clipboard, browser find, and screen reader support\n- **Dirty-row tracking** — only touched rows are re-rendered each frame via `requestAnimationFrame`\n- **Themes** — CSS custom properties with built-in Default, Solarized Dark, Monokai, and Light themes\n- **Alternate screen buffer** — `vim`, `less`, `htop`, and similar apps work correctly\n- **Scrollback history** — configurable ring buffer\n- **24-bit color** — full RGB SGR support\n- **Auto-resize** — `ResizeObserver`-based terminal resizing\n- **WebSocket transport** — connect to a PTY backend with binary framing and reconnection\n\n## Development\n\n### Prerequisites\n\n- [Zig](https://ziglang.org/) 0.16.0+\n- [Node.js](https://nodejs.org/) 20+\n- [pnpm](https://pnpm.io/) 10+\n- [portless](https://github.com/vercel-labs/portless) — `npm i -g portless`\n\n### Setup\n\n```bash\npnpm install\n```\n\n### Build the WASM binary\n\n```bash\nzig build\n```\n\nFor a release build:\n\n```bash\nzig build -Doptimize=ReleaseSmall\n```\n\n### Build all packages\n\n```bash\npnpm build\n```\n\n### Run the vanilla demo\n\nServe the `web/` directory with any static file server:\n\n```bash\ncd web && python3 -m http.server 8000\n```\n\n### Run the Next.js example\n\nAll dev servers use [portless](https://github.com/vercel-labs/portless) to avoid hardcoded ports. Each app is served at a `.localhost` URL (e.g. `nextjs-example.wterm.localhost`).\n\n```bash\ncp web/wterm.wasm examples/nextjs/public/\npnpm --filter nextjs dev\n```\n\n### Run Zig tests\n\n```bash\nzig build test\n```\n\n## License\n\nApache-2.0\n","summary":" wterm is a web-based terminal emulator that renders directly to the DOM, enabling native browser features like text selection, copy-paste, and screen reader accessibility without canvas limitations. Its core is written in Zig and compiled to a compact ~12KB WebAssembly binary, delivering near-native performance while parsing VT100/VT220/xterm escape sequences. The project offers both vanilla JavaScript and React component packages, along with WebSocket transport for connecting to backend PTYs, themes, and full 24-bit color support. It suits developers building browser-based terminal applications who require accessibility compliance, modern web standards integration, and efficient rendering performance.","description":"A terminal emulator for the web","stars":2100,"language":"TypeScript"},{"owner":"andrewjiang","repo":"palantir-for-family-trips","url":"https://github.com/andrewjiang/palantir-for-family-trips","readme":"# Family Trip Command Center\n\n> A Palantir-ish dashboard for a very non-Palantir problem: getting a few families to Pine Mountain Lake and Yosemite without losing the plot.\n\nInstead of a normal trip planner, this repo treats a long weekend like an operation: convoy routes, arrival windows, mission launches, meal logistics, family checklists, and a giant map that makes everything feel more serious than it needs to be.\n\n![Family Trip Command Center dashboard overview](docs/dashboard-overview.png)\n\n## What It Does\n\n- Tracks multiple families arriving from different cities.\n- Simulates driving routes, convoy departures, and day-by-day timeline playback.\n- Organizes the trip into itinerary, stay, meals, activities, expenses, and family views.\n- Presents the whole thing as a dark, command-center-style dashboard because that is more fun than a spreadsheet.\n\n## Screens\n\n### Mission launch overlay\n\n![Mission launch overlay](docs/mission-launch.png)\n\n### Activity planning surface\n\n![Activity planning screen](docs/activity-board.png)\n\n### Meal logistics surface\n\n![Meal planning screen](docs/meals-planner.png)\n\n## Why This Exists\n\nBecause “three families are trying to get to the same cabin” is already a systems problem.\n\nThe repo is intentionally overbuilt for a small real-life use case. That is the point. It is a fun UI experiment, a trip-planning toy, and a mildly absurd attempt to make a family weekend feel like a live operations room.\n\n## Stack\n\n- React 19\n- Vite\n- Google Maps JavaScript API\n- Lucide icons\n- Framer Motion\n\n## Running It Locally\n\n```bash\nnpm install\ncp .env.example .env\nnpm run dev\n```\n\nOpen `http://127.0.0.1:5173` or whatever Vite prints.\n\n## Environment\n\nFor the full map experience, add a browser Maps key to `.env`:\n\n```bash\nVITE_GOOGLE_MAPS_API_KEY=your_browser_maps_key_here\n```\n\nOptional:\n\n```bash\nVITE_GOOGLE_MAP_ID=your_optional_google_map_id\n```\n\nWithout a key, the app still renders its UI but the live Google map layer will not fully initialize.\n\n## Data / Privacy\n\nThe trip data in this repo is intentionally sanitized for public sharing.\n\n- Family names are demo names.\n- The basecamp address is generalized.\n- Access instructions, Wi-Fi, host details, and other private trip notes are removed.\n\nIf you publish this with your own Google Maps key, usage is billed to your Google Cloud project.\n\n## Repo Notes\n\n- State is stored locally in the browser.\n- The project is optimized for desktop and large-screen dashboard vibes.\n- The UI intentionally leans dense, dramatic, and slightly over-the-top.\n\n## If You Want To Hack On It\n\nGood places to start:\n\n- `src/App.jsx` for the main shell, timeline, and overlays\n- `src/CommandMap.jsx` for route rendering, playback, and map behavior\n- `src/tripModel.js` for the seeded trip document and helper logic\n\n## Status\n\nBuilt for fun. Surprisingly usable. Not pretending to be enterprise software.\n","summary":" This project is a React-based trip coordination dashboard that reimagines multi-family vacation planning through the lens of a tactical operations center, complete with dark-themed command center visuals and live map integrations. It enables groups to simulate convoy routes, track arrival windows across different cities, coordinate meal logistics, and playback day-by-day timelines through an intentionally dramatic interface built with React 19, Vite, and Google Maps. Ideal for organizers managing complex group travel involving multiple vehicles and families, it replaces traditional spreadsheets with an immersive, \"mission control\" experience that makes logistics feel like a collaborative operation rather than administrative work.","description":"A Palantir-ish dashboard for family trip planning.","stars":672,"language":"JavaScript"},{"owner":"CITGuru","repo":"openduck","url":"https://github.com/CITGuru/openduck","readme":"# OpenDuck\n\nAn open-source implementation of the ideas pioneered by [MotherDuck](https://motherduck.com) — differential storage, hybrid (dual) execution, and transparent remote databases for DuckDB — available for anyone to run, extend, and build on.\n\nMotherDuck showed that DuckDB can work beautifully in the cloud: `ATTACH 'md:mydb'`, and remote tables appear local. Queries split transparently across your laptop and the cloud. Storage is layered and snapshot-based. OpenDuck takes those architectural ideas — [differential storage](https://motherduck.com/blog/differential-storage-building-block-for-data-warehouse/), [dual execution](https://motherduck.com/videos/bringing-duckdb-to-the-cloud-dual-execution-explained/), the attach-based UX — and makes them open. Open protocol, open backend, open extension.\n\n```python\nimport duckdb\n\ncon = duckdb.connect(config={\"allow_unsigned_extensions\": \"true\"})\ncon.execute(\"LOAD '/path/to/openduck.duckdb_extension';\")\ncon.execute(\"ATTACH 'openduck:mydb?endpoint=http://localhost:7878&token=xxx' AS cloud;\")\n\ncon.sql(\"SELECT * FROM cloud.users\").show()                    # remote, transparent\ncon.sql(\"SELECT * FROM local.t JOIN cloud.t2 ON ...\").show()   # hybrid, one query\n```\n\n## What OpenDuck does\n\n### Differential storage\n\nAppend-only layers with PostgreSQL metadata. DuckDB sees a normal file; OpenDuck persists data as immutable sealed layers addressable from object storage. Snapshots give you consistent reads. One serialized write path, many concurrent readers.\n\n### Hybrid (dual) execution\n\nA single query can run partly on your machine and partly on a remote worker. The gateway splits the plan, labels each operator `LOCAL` or `REMOTE`, and inserts bridge operators at the boundaries. Only intermediate results cross the wire.\n\n```\n[LOCAL]  HashJoin(l.id = r.id)\n  [LOCAL]  Scan(products)          ← your laptop\n  [LOCAL]  Bridge(R→L)\n    [REMOTE] Scan(sales)           ← remote worker\n```\n\n### DuckDB-native catalog\n\nThe extension implements DuckDB's `StorageExtension` and `Catalog` interfaces. Remote tables are first-class catalog entries, they participate in JOINs, CTEs, and the optimizer like local tables.\n\n### Open protocol\n\nOpenDuck's protocol is intentionally minimal and defined in [`execution.proto`](proto/openduck/v1/execution.proto). The data plane is two RPCs: one to execute a query and stream Arrow IPC batches back, another to cancel a running execution. Two additional RPCs handle worker lifecycle (registration and heartbeat) so the gateway can route queries by database affinity and compute context.\n\nBecause the protocol is open and simple, you're not locked into a single backend. Any service that speaks gRPC and returns Arrow can serve as an OpenDuck-compatible backend. Run the included Rust gateway, replace it with your own implementation, or plug in an entirely different execution engine — the client and extension don't care what's on the other side.\n\n## Architecture\n\n```\n┌─────────────────────────────────────────────┐\n│  DuckDB process (client)                    │\n│                                             │\n│  LOAD openduck                              │\n│  ATTACH 'openduck:mydb' AS cloud            │\n│                                             │\n│  ┌─────────────────────────────────────┐    │\n│  │ OpenDuckCatalog                     │    │\n│  │  └─ OpenDuckSchemaEntry             │    │\n│  │      └─ OpenDuckTableEntry (users)  │    │\n│  │      └─ OpenDuckTableEntry (events) │    │\n│  └──────────────┬──────────────────────┘    │\n│                 │ gRPC + Arrow IPC          │\n└─────────────────┼───────────────────────────┘\n                  │\n      ┌───────────▼───────────┐\n      │  Gateway (Rust)       │\n      │  - token auth         │\n      │  - worker registry    │\n      │  - affinity routing   │     ┌──────────────┐\n      │  - plan splitting     │────▶│  Worker 1    │\n      │  - backpressure       │◀────│  (DuckDB)    │\n      │                       │     │  RegisterWorker\n      │                       │     └──────────────┘\n      │                       │     ┌──────────────┐\n      │                       │────▶│  Worker N    │\n      │                       │◀────│  (DuckDB)    │\n      │                       │     │  Heartbeat   │\n      └───────────────────────┘     └──────────────┘\n              │\n    ┌─────────┴─────────┐\n    ▼                   ▼\n┌──────────┐    ┌──────────────┐\n│ Postgres │    │ Object store │\n│ metadata │    │ sealed layers│\n└──────────┘    └──────────────┘\n```\n\n## Quick start\n\n### 1. Build the backend\n\n```bash\ncargo build --workspace\n```\n\n### 2. Build the DuckDB extension\n\nThe openduck extension is not yet published to DuckDB's extension repository, so you need to build it from source. See [`extensions/openduck/README.md`](extensions/openduck/README.md) for full prerequisites (vcpkg, bison on macOS).\n\n```bash\ncd extensions/openduck && make\n```\n\nThis produces the loadable binary at:\n\n```\nextensions/openduck/build/release/extension/openduck/openduck.duckdb_extension\n```\n\n### 3. Start the server\n\n```bash\nexport OPENDUCK_TOKEN=your-token\ncargo run -p openduck -- -d mydb --token your-token\n```\n\n### 4. Connect\n\nBecause the extension is unsigned, every DuckDB connection needs `allow_unsigned_extensions` enabled and an explicit `LOAD` with the full path to the built binary.\n\n**Python (DuckDB SDK directly):**\n\n```python\nimport duckdb\n\ncon = duckdb.connect(config={\"allow_unsigned_extensions\": \"true\"})\ncon.execute(\"LOAD 'extensions/openduck/build/release/extension/openduck/openduck.duckdb_extension';\")\ncon.execute(\"ATTACH 'openduck:mydb?endpoint=http://localhost:7878&token=your-token' AS cloud;\")\n\ncon.sql(\"SELECT * FROM cloud.users LIMIT 10\").show()\n```\n\nYou can also set `OPENDUCK_EXTENSION_PATH` to avoid hard-coding the path:\n\n```bash\nexport OPENDUCK_EXTENSION_PATH=extensions/openduck/build/release/extension/openduck/openduck.duckdb_extension\n```\n\n**Python (openduck wrapper — auto-detects the local build):**\n\n```bash\npip install -e clients/python\nexport OPENDUCK_TOKEN=your-token\n```\n\n```python\nimport openduck\n\ncon = openduck.connect(\"mydb\")\ncon.sql(\"SELECT 1 AS x\").show()\n```\n\nThe wrapper finds the extension automatically from the build tree or `OPENDUCK_EXTENSION_PATH`.\n\n**CLI:**\n\n```bash\nduckdb -unsigned -c \"\n  LOAD 'extensions/openduck/build/release/extension/openduck/openduck.duckdb_extension';\n  ATTACH 'openduck:mydb?token=your-token' AS cloud;\n  SELECT * FROM cloud.users LIMIT 10;\n\"\n```\n\n**Rust:**\n\n```rust\nuse duckdb::Connection;\n\nlet conn = Connection::open_in_memory()?;\nconn.execute_batch(r\"\n    SET allow_unsigned_extensions = true;\n    LOAD 'extensions/openduck/build/release/extension/openduck/openduck.duckdb_extension';\n    ATTACH 'openduck:mydb?endpoint=http://localhost:7878&token=xxx' AS cloud;\n\")?;\n\nlet mut stmt = conn.prepare(\"SELECT * FROM cloud.users LIMIT 10\")?;\n```\n\n> **Note:** Once the extension is published to the DuckDB extension repository, `INSTALL openduck; LOAD openduck;` will work without building from source or enabling unsigned extensions.\n\nSee [`examples/python/duckdb_sdk_ducklake.py`](examples/python/duckdb_sdk_ducklake.py) for a comprehensive walkthrough including DuckLake integration and hybrid local+remote queries.\n\n## Layout\n\n```\ncrates/\n  exec-gateway/     Gateway — auth, worker registry, routing, hybrid plan splitting\n  exec-worker/      Worker — embedded DuckDB, Arrow IPC streaming\n  exec-proto/       Protobuf/tonic codegen + shared auth module\n  openduck-cli/     Unified CLI (openduck [default]|gateway|worker|query|cancel|status|snapshot|gc)\n  openduck-metrics/ OpenTelemetry metrics (optional OTLP exporter)\n  diff-core/        Core types and StorageBackend trait\n  diff-metadata/    Postgres metadata repo, GC, PgStorageBackend\n  diff-layer-fs/    Append-only on-disk segment files\n  diff-blob/        Sealed layer upload to S3-compatible object storage\n  diff-bridge/      C ABI static library for the DuckDB extension\n  diff-fuse/        Linux FUSE adapter over StorageBackend\n\nextensions/\n  openduck/         DuckDB C++ extension (StorageExtension + Catalog)\n\nclients/\n  python/           openduck Python package (pip install -e clients/python)\n\nproto/\n  openduck/v1/      Protocol definition (execution.proto)\n\n```\n\n## OpenDuck vs MotherDuck\n\nMotherDuck is a commercial cloud service. OpenDuck is an open-source project inspired by its architecture.\n\n\n|                          | MotherDuck            | OpenDuck                                 |\n| ------------------------ | --------------------- | ---------------------------------------- |\n| **What**                 | Managed cloud service | Self-hosted open-source                  |\n| **Attach scheme**        | `md:`                 | `openduck:` / `od:`                      |\n| **Auth**                 | `motherduck_token`    | `OPENDUCK_TOKEN`                         |\n| **Differential storage** | Proprietary           | Open (Postgres metadata + object store)  |\n| **Hybrid execution**     | Proprietary planner   | Open (gateway + plan splitting)          |\n| **Protocol**             | Private wire format   | Open gRPC + Arrow IPC                    |\n| **Backend**              | MotherDuck's cloud    | Anything implementing `ExecutionService` |\n| **Extension**            | Bundled in DuckDB     | Separate loadable extension              |\n\n\nOpenDuck is not wire-compatible with MotherDuck. It reimplements the same architectural ideas as an open protocol.\n\n## OpenDuck vs Arrow Flight SQL\n\nArrow Flight SQL is a generic database protocol — \"JDBC/ODBC over Arrow.\" OpenDuck is a DuckDB-specific system with a narrower scope but deeper integration.\n\n\n|                      | Arrow Flight SQL                | OpenDuck                                     |\n| -------------------- | ------------------------------- | -------------------------------------------- |\n| **Scope**            | Any SQL database                | DuckDB-specific                              |\n| **Integration**      | Separate client driver          | DuckDB StorageExtension + Catalog            |\n| **Catalog**          | Server-side (`GetTables`, etc.) | Extension-side (DuckDB catalog entries)      |\n| **Execution**        | Full query on server            | Hybrid — split across local and remote       |\n| **Protocol surface** | ~15 RPCs                        | 4 RPCs (2 data plane + 2 worker lifecycle)   |\n| **Plan format**      | SQL only                        | SQL (M2), structured plan IR (M3)            |\n| **Optimizer**        | Client-side, unaware            | DuckDB optimizer sees remote tables natively |\n\n\n## OpenDuck vs DuckLake\n\nOpenDuck doesn't replace DuckLake — you use them together. They operate at different layers entirely.\n\nDuckLake is a **lakehouse catalog**: it manages tables as Parquet files in object storage with transactional metadata in Postgres (or SQLite/DuckDB). It decides *where data lives* and *how tables are organized*.\n\nOpenDuck is a **storage and execution layer** for DuckDB's own compute engine. It provides differential storage (append-only layers with snapshot isolation), hybrid query execution (split a single query across local and remote), and transparent remote attach (`ATTACH 'openduck:mydb'`).\n\nIf you're using DuckLake but still fall back to a `.duckdb` file for things DuckLake doesn't support yet (e.g. indexes, full-text search, or workloads that need DuckDB-native storage), OpenDuck makes that file concurrency-safe with snapshot isolation. And when you want to query a DuckLake catalog running on a remote server, OpenDuck is the transport — a worker backed by DuckLake serves queries over gRPC, and clients attach via the openduck extension without knowing or caring what the backend storage is.\n\n|                      | DuckLake                              | OpenDuck                                    |\n| -------------------- | ------------------------------------- | ------------------------------------------- |\n| **Layer**            | Catalog (table → Parquet in S3)       | Storage + execution (DuckDB file I/O, gRPC) |\n| **What it manages**  | Table metadata, Parquet data files    | DuckDB pages, layers, snapshots             |\n| **Concurrency**      | Parquet files are immutable           | Snapshot isolation on `.duckdb` files        |\n| **Remote access**    | Not built-in                          | `ATTACH 'openduck:...'` + hybrid execution  |\n| **Together**         | DuckLake catalog on a remote worker → OpenDuck streams results to the client |\n\n\n## Acknowledgments\n\nOpenDuck's architecture draws heavily from MotherDuck's published work on [differential storage](https://motherduck.com/blog/differential-storage-building-block-for-data-warehouse/), [dual execution](https://motherduck.com/videos/bringing-duckdb-to-the-cloud-dual-execution-explained/), and [cloud-native DuckDB](https://motherduck.com/duckdb-book-summary-chapter7/). Credit to the MotherDuck team for pioneering these ideas.\n\n## License\n\nMIT","summary":" OpenDuck is an open-source implementation of MotherDuck's cloud-native DuckDB architecture, enabling users to transparently query remote databases alongside local data through a simple ATTACH command. It combines differential storage with immutable, snapshot-based layers, hybrid execution that splits queries between local and remote workers to minimize data transfer, and a minimal open protocol using gRPC and Arrow IPC that ensures no vendor lock-in. By implementing native DuckDB catalog extensions, remote tables participate seamlessly in joins, CTEs, and query optimization as first-class citizens. This project benefits developers and data teams seeking scalable, cloud-based analytical databases with full infrastructure control, open standards, and the flexibility to swap or customize backend implementations.","description":"Distributed DuckDB - dual execution and differential storage","stars":468,"language":"Rust"},{"owner":"VonHoltenCodes","repo":"SlowBooks-Pro-2026","url":"https://github.com/VonHoltenCodes/SlowBooks-Pro-2026","readme":"# Slowbooks Pro 2026\r\n\r\n**A personal bookkeeping application \"decompiled\" from the ashes of QuickBooks 2003 Pro.**\r\n\r\nFree and open source. Runs on Windows, macOS, and Linux. No Intuit activation servers required.\r\n\r\n**Get started:** `docker compose up` — see **[INSTALL.md](INSTALL.md)** for all install options.\r\n\r\n![Slowbooks Pro 2026 — Splash Screen](screenshots/splash.png)\r\n\r\n---\r\n\r\n## The Story\r\n\r\nI ran QuickBooks 2003 Pro for 14 years for side business invoicing and bookkeeping. Then the hard drive died. Intuit's activation servers have been dead since ~2017, so the software can't be reinstalled. The license I paid for is worthless.\r\n\r\nSo I built my own replacement. I transferred all my data from the old .QBW file using IIF export/import.\r\n\r\nThe codebase is annotated with \"decompilation\" comments referencing `QBW32.EXE` offsets, Btrieve table layouts, and MFC class names — a tribute to the software that served me well for 14 years before its maker decided it should stop working.\r\n\r\n**This is a clean-room reimplementation.** No Intuit source code was available or used.\r\n\r\n---\r\n\r\n## Features\r\n\r\n### Invoicing & Payments (Accounts Receivable)\r\n- **Invoices** — Create, edit, duplicate, void, mark as sent, email as PDF. Auto-numbering, auto due-date from terms, dynamic line items with running totals. Print/PDF generation via WeasyPrint. Inline customer creation from invoice form\r\n- **Estimates** — Full estimate workflow with convert-to-invoice (deep-copies all fields and line items). Inline customer creation from estimate form\r\n- **Payments** — Record payments with allocation across multiple invoices. Auto-updates invoice balances and status (draft/sent/partial/paid). Void payments with reversing journal entries\r\n- **Recurring Invoices** — Schedule automatic invoice generation (weekly/monthly/quarterly/yearly) with manual \"Generate Now\" or cron script\r\n- **Batch Payments** — Apply payments to multiple invoices across multiple customers in a single transaction\r\n- **Credit Memos** — Issue credits against customers, apply to invoices to reduce balance due. Proper reversing journal entries\r\n- **Quick Entry Mode** — Batch invoice entry for paper invoice backlog. Save & Next (Ctrl+Enter) with running log\r\n\r\n![Invoices with IRS Pub 583 Mock Data](screenshots/invoices.png)\r\n\r\n### Accounts Payable\r\n- **Purchase Orders** — Non-posting documents to vendors with auto-numbering, convert-to-bill workflow\r\n- **Bills** — Enter vendor bills (AP mirror of invoices). Track payables with status progression (draft/unpaid/partial/paid/void). Vendor default expense account pre-fill (account resolution: explicit → item → vendor default → global fallback)\r\n- **Bill Payments** — Pay vendor bills with allocation. Journal: DR AP, CR Bank\r\n- **AP Aging Report** — Outstanding payables grouped by vendor with 30/60/90 day buckets\r\n\r\n### Double-Entry Accounting\r\n- **Manual Journal Entries** — Full CRUD for manual journal entries with dynamic line rows, running debit/credit totals, balance indicator, and void with reversing entries\r\n- **Auto Journal Entries** — Every invoice, payment, bill, and payroll run automatically creates balanced journal entries. Void creates reversing entries\r\n- **Chart of Accounts** — 39+ seeded accounts (Contractor template), 6 account types (asset, liability, equity, income, COGS, expense)\r\n- **Closing Date Enforcement** — Prevent modifications to transactions before a configurable closing date with optional password protection\r\n- **Audit Log** — Automatic logging of all create/update/delete operations with old/new value tracking via SQLAlchemy event hooks\r\n- **Account Balances** — Updated in real-time as transactions post\r\n\r\n### Payroll\r\n- **Employees** — Full employee records with pay type (hourly/salary), pay rate, filing status, allowances\r\n- **Pay Runs** — Create pay runs with automatic withholding calculations: Federal (progressive brackets), State (5% flat), Social Security (6.2%), Medicare (1.45%)\r\n- **Process Payroll** — Creates journal entries: DR Wage Expense, CR Federal Withholding, CR State Withholding, CR SS Payable, CR Medicare Payable, CR Bank\r\n- Tax calculations are approximate — disclaimer included. Verify with a tax professional\r\n\r\n### Banking\r\n- **Bank Accounts** — Register view with deposits and withdrawals\r\n- **Check Register** — Filtered bank transaction view with running balance, payment/deposit columns, sorted by date\r\n- **Make Deposits** — Move funds from Undeposited Funds to a bank account. Select pending payments, choose target account, create deposit\r\n- **Credit Card Charges** — Enter credit card charges as expenses (DR Expense, CR Credit Card Payable). Dedicated charge entry form with vendor, amount, and expense category\r\n- **Check Printing** — Generate check PDFs in standard 3-per-page format (stub/stub/check) with payee, amount in words, memo, and signature line\r\n- **Bank Reconciliation** — Full workflow: enter statement balance, toggle cleared items, validate difference = $0, complete\r\n- **OFX/QFX Import** — Import bank transactions from OFX/QFX files with FITID dedup, preview before import, auto-match by amount/date\r\n\r\n### Reports & Tax\r\n- **QuickBooks-style period selector** — All reports support preset periods (This Month, This Quarter, This/Last Year, Year to Date, Custom Date) with live refresh\r\n- **Profit & Loss** — Income vs expenses for any date range\r\n- **Balance Sheet** — Assets, liabilities, and equity as of any date\r\n- **A/R Aging** — Outstanding receivables grouped by customer with 30/60/90 day buckets\r\n- **A/P Aging** — Outstanding payables grouped by vendor with 30/60/90 day buckets\r\n- **Sales Tax** — Tax collected by invoice with taxable/non-taxable breakdowns. Pay Sales Tax feature records payments to government (DR Sales Tax Payable, CR Bank)\r\n- **General Ledger** — All journal entries grouped by account with debit/credit totals\r\n- **Income by Customer** — Sales totals per customer with invoice counts\r\n- **Customer Statements** — PDF statement with invoice/payment history and running balance\r\n- **Schedule C (Tax)** — Generate Schedule C data from P&L with configurable account-to-tax-line mappings. Export as CSV\r\n\r\n### Dashboard\r\n- Company Snapshot with Total Receivables, Overdue Invoices, Active Customers, Total Payables\r\n- **AR Aging Bar Chart** — Color-coded stacked bar (Current/30/60/90+ days)\r\n- **Monthly Revenue Trend** — Bar chart showing last 12 months of invoiced revenue\r\n- Recent invoices and payments tables\r\n- Bank balances at a glance\r\n\r\n![Dashboard — Light Mode](screenshots/dashboard-light.png)\r\n\r\n![Dashboard — Dark Mode](screenshots/dashboard-dark.png)\r\n\r\n### Online Payments\r\n- **Stripe Checkout** — Accept online payments via Stripe's hosted checkout page. Customers click \"Pay Online\" in emailed invoices, pay on Stripe, and the payment auto-records with journal entries (DR Undeposited Funds, CR A/R)\r\n- **Public Payment Page** — Standalone `/pay/{token}` page (no login required) shows invoice summary with \"Pay with Stripe\" button. Supports light/dark mode\r\n- **Copy Payment Link** — One-click copy of the public payment URL from the invoice view modal\r\n- **Webhook Handler** — Idempotent Stripe webhook processes `checkout.session.completed` events with signature verification\r\n- **Setup Guide** — See **[SETUP_STRIPE.md](SETUP_STRIPE.md)**\r\n\r\n### QuickBooks Online Integration\r\n- **OAuth 2.0** — Connect to QuickBooks Online via Intuit's OAuth Authorization Code flow with automatic token refresh\r\n- **Import from QBO** — Pull accounts, customers, vendors, items, invoices, and payments from QBO with dependency-ordered import and duplicate detection\r\n- **Export to QBO** — Push Slowbooks data to QBO with entity type mapping and ID tracking\r\n- **ID Mapping** — `qbo_mappings` table tracks QBO ID ↔ Slowbooks ID per entity for dedup and re-sync\r\n- **Setup Guide** — See **[SETUP_QBO.md](SETUP_QBO.md)**\r\n\r\n![QuickBooks Online Integration](screenshots/qbo-integration.png)\r\n\r\n### Communication & Export\r\n- **Invoice Email** — Send invoices as PDF attachments via SMTP with configurable email settings. Includes \"Pay Online\" button when Stripe is enabled\r\n- **CSV Import/Export** — Import/export customers, vendors, items, invoices, and chart of accounts as CSV\r\n- **Print Preview** — Browser print dialog for invoices and estimates via dedicated HTML preview endpoints. Native OS print dialog with \"Save as PDF\" option\r\n- **Print-Optimized PDF** — Enhanced invoice PDF template with company logo support\r\n- **IIF Import/Export** — Full QuickBooks 2003 Pro interoperability (see below)\r\n\r\n### System & Administration\r\n- **Dark Mode** — Toggle between QB2003 Blue theme and dark mode (Alt+D or toolbar button). Persists in localStorage\r\n- **Backup/Restore** — Create and download PostgreSQL backups from the settings page\r\n- **Multi-Company** — Support for multiple company databases, switchable from UI\r\n- **Global Search** — Unified server-side search across customers, vendors, items, invoices, estimates, and payments\r\n\r\n### UI\r\n- Authentic QB2003 \"Default Blue\" skin with navy/gold color palette (+ dark mode)\r\n- Splash screen with build info and decompilation provenance\r\n- Windows XP-era toolbar, sidebar navigator with icons, status bar\r\n- Keyboard shortcuts: `Alt+N` (new invoice), `Alt+P` (payment), `Alt+Q` (quick entry), `Alt+H` (home), `Alt+D` (dark mode), `Ctrl+S` (save modal form), `Ctrl+K` (search), `Escape` (close modal)\r\n- No frameworks — vanilla HTML/CSS/JS single-page app\r\n- 29 SPA routes, 28 sidebar nav links\r\n\r\n### QuickBooks 2003 Pro Interoperability\r\n- **IIF Export** — Export all Slowbooks data (accounts, customers, vendors, items, invoices, payments, estimates) as .iif files importable into QB2003 via File > Utilities > Import > IIF Files\r\n- **IIF Import** — Parse and import .iif files exported from QB2003 with duplicate detection and per-row error handling\r\n- **Validation** — Pre-flight validation of .iif files before import (checks structure, account types, balanced transactions)\r\n- **Date Range Filtering** — Export invoices and payments for specific date ranges\r\n- **Round-Trip Safe** — Export from Slowbooks, re-import into Slowbooks — deduplication prevents double-entry\r\n\r\n### Utilities\r\n- **Backup Script** — `scripts/backup.sh` — pg_dump with gzip compression, keeps last 30 backups\r\n- **Recurring Invoice Cron** — `scripts/run_recurring.py` — Standalone script for generating due recurring invoices\r\n- **IRS Mock Data** — `scripts/seed_irs_mock_data.py` — Seeds realistic test data from IRS Publication 583 (Henry Brown's Auto Body Shop: 8 customers, 13 vendors, 10 invoices, 5 payments, 3 estimates)\r\n\r\n---\r\n\r\n## Tech Stack\r\n\r\n| Component | Technology |\r\n|-----------|-----------|\r\n| Backend | Python 3.12 + FastAPI (35 routers, 160+ routes) |\r\n| Database | PostgreSQL 16 + SQLAlchemy 2.0 |\r\n| Migrations | Alembic |\r\n| Frontend | Vanilla HTML/CSS/JS (no framework) |\r\n| PDF | WeasyPrint 60.2 + Jinja2 |\r\n| Bank Import | ofxparse (OFX/QFX) |\r\n| Payments | Stripe Checkout (hosted) |\r\n| QBO Sync | python-quickbooks + intuit-oauth (OAuth 2.0) |\r\n| Port | 3001 |\r\n\r\n---\r\n\r\n## Quick Start\r\n\r\n### Docker (Windows, macOS, Linux)\r\n\r\n```bash\r\ngit clone https://github.com/VonHoltenCodes/SlowBooks-Pro-2026.git\r\ncd SlowBooks-Pro-2026\r\ndocker compose up\r\n```\r\n\r\nOpen **http://localhost:3001**. That's it — PostgreSQL, migrations, and seed data are handled automatically.\r\n\r\n### Native Install (Linux)\r\n\r\n```bash\r\ngit clone https://github.com/VonHoltenCodes/SlowBooks-Pro-2026.git\r\ncd SlowBooks-Pro-2026\r\npip install -r requirements.txt\r\n\r\n# Create database\r\nsudo -u postgres psql -c \"CREATE USER bookkeeper WITH PASSWORD 'bookkeeper'\"\r\nsudo -u postgres psql -c \"CREATE DATABASE bookkeeper OWNER bookkeeper\"\r\n\r\ncp .env.example .env\r\nalembic upgrade head\r\npython3 scripts/seed_database.py\r\npython3 run.py\r\n```\r\n\r\nOpen **http://localhost:3001**.\r\n\r\nSee **[INSTALL.md](INSTALL.md)** for detailed instructions, macOS native install, demo data, and troubleshooting.\r\n\r\n### Backup\r\n\r\n```bash\r\n./scripts/backup.sh\r\n# Backs up to ~/bookkeeper-backups/ with gzip compression\r\n# Keeps the 30 most recent backups\r\n```\r\n\r\n---\r\n\r\n## Project Structure\r\n\r\n```\r\nSlowBooks-Pro-2026/\r\n├── .env.example              # Environment config template\r\n├── requirements.txt          # Python dependencies (14 packages)\r\n├── run.py                    # Uvicorn entry point (port 3001)\r\n├── alembic.ini               # Alembic config\r\n├── alembic/                  # Database migrations\r\n├── app/\r\n│   ├── main.py               # FastAPI app + 35 routers (160+ routes)\r\n│   ├── config.py             # Environment-based settings\r\n│   ├── database.py           # SQLAlchemy engine + session\r\n│   ├── models/               # 30+ SQLAlchemy models\r\n│   │   ├── accounts.py       # Chart of Accounts (self-referencing)\r\n│   │   ├── contacts.py       # Customers + Vendors\r\n│   │   ├── items.py          # Products, services, materials, labor\r\n│   │   ├── invoices.py       # Invoices + line items\r\n│   │   ├── estimates.py      # Estimates + line items\r\n│   │   ├── payments.py       # Payments + allocations\r\n│   │   ├── transactions.py   # Journal entries (double-entry core)\r\n│   │   ├── banking.py        # Bank accounts, transactions, reconciliations\r\n│   │   ├── settings.py       # Key-value company settings\r\n│   │   ├── audit.py          # Audit log\r\n│   │   ├── purchase_orders.py # Purchase orders + lines\r\n│   │   ├── bills.py          # Bills + lines + payments + allocations\r\n│   │   ├── credit_memos.py   # Credit memos + lines + applications\r\n│   │   ├── recurring.py      # Recurring invoices + lines\r\n│   │   ├── email_log.py      # Email delivery log\r\n│   │   ├── tax.py            # Tax category mappings\r\n│   │   ├── backups.py        # Backup records\r\n│   │   ├── companies.py      # Multi-company records\r\n│   │   ├── payroll.py        # Employees, pay runs, pay stubs\r\n│   │   └── qbo_mapping.py    # QBO ↔ Slowbooks ID mappings\r\n│   ├── schemas/              # Pydantic request/response models\r\n│   ├── routes/               # FastAPI routers (35 routers)\r\n│   ├── services/\r\n│   │   ├── accounting.py     # Double-entry journal entry engine\r\n│   │   ├── audit.py          # SQLAlchemy after_flush audit hooks\r\n│   │   ├── closing_date.py   # Closing date enforcement guard\r\n│   │   ├── payroll_service.py # Withholding calculations\r\n│   │   ├── recurring_service.py # Recurring invoice generation\r\n│   │   ├── email_service.py  # SMTP email delivery\r\n│   │   ├── csv_export.py     # CSV export (5 entity types)\r\n│   │   ├── csv_import.py     # CSV import with error handling\r\n│   │   ├── ofx_import.py     # OFX/QFX bank feed parser\r\n│   │   ├── tax_export.py     # Schedule C data + CSV export\r\n│   │   ├── backup_service.py # pg_dump/pg_restore wrapper\r\n│   │   ├── company_service.py # Multi-company DB management\r\n│   │   ├── iif_export.py     # IIF export (8 export functions)\r\n│   │   ├── iif_import.py     # IIF parser + import + validation\r\n│   │   ├── pdf_service.py    # WeasyPrint PDF generation\r\n│   │   ├── stripe_service.py # Stripe Checkout + webhook verification\r\n│   │   ├── qbo_service.py    # QBO OAuth + token management + client factory\r\n│   │   ├── qbo_import.py     # Import 6 entity types from QBO\r\n│   │   └── qbo_export.py     # Export 6 entity types to QBO\r\n│   ├── templates/            # Jinja2 templates (PDF, email)\r\n│   ├── seed/                 # Chart of Accounts seed data\r\n│   └── static/\r\n│       ├── css/\r\n│       │   ├── style.css     # QB2003 \"Default Blue\" skin\r\n│       │   └── dark.css      # Dark mode CSS overrides\r\n│       └── js/               # SPA router, API wrapper, 27 page modules\r\n├── scripts/\r\n│   ├── seed_database.py      # Seed the Chart of Accounts\r\n│   ├── seed_irs_mock_data.py # IRS Pub 583 mock data\r\n│   ├── run_recurring.py      # Cron script for recurring invoices\r\n│   └── backup.sh             # PostgreSQL backup with rotation\r\n├── screenshots/              # README images\r\n└── index.html                # SPA shell (27 script tags)\r\n```\r\n\r\n---\r\n\r\n## Database Schema\r\n\r\n36 tables with a double-entry accounting foundation:\r\n\r\n| Table | Purpose |\r\n|-------|---------|\r\n| `accounts` | Chart of Accounts — asset, liability, equity, income, expense, COGS |\r\n| `customers` | Customer contacts with billing/shipping addresses |\r\n| `vendors` | Vendor contacts |\r\n| `items` | Product/service/material/labor items with rates |\r\n| `invoices` | Invoice headers with status tracking |\r\n| `invoice_lines` | Invoice line items |\r\n| `estimates` | Estimate headers |\r\n| `estimate_lines` | Estimate line items |\r\n| `payments` | Payment records |\r\n| `payment_allocations` | Maps payments to invoices (many-to-many) |\r\n| `transactions` | Journal entry headers |\r\n| `transaction_lines` | Journal entry splits (debit OR credit) |\r\n| `bank_accounts` | Bank accounts linked to COA |\r\n| `bank_transactions` | Bank register entries (with OFX import fields) |\r\n| `reconciliations` | Bank reconciliation sessions |\r\n| `settings` | Company settings key-value store |\r\n| `audit_log` | Automatic change tracking for all entities |\r\n| `purchase_orders` | Purchase order headers |\r\n| `purchase_order_lines` | PO line items with received quantities |\r\n| `bills` | Vendor bills (AP mirror of invoices) |\r\n| `bill_lines` | Bill line items with expense account tracking |\r\n| `bill_payments` | Bill payment records |\r\n| `bill_payment_allocations` | Maps bill payments to bills |\r\n| `credit_memos` | Customer credit memos |\r\n| `credit_memo_lines` | Credit memo line items |\r\n| `credit_applications` | Maps credit memos to invoices |\r\n| `recurring_invoices` | Recurring invoice templates |\r\n| `recurring_invoice_lines` | Recurring invoice line items |\r\n| `email_log` | Email delivery history |\r\n| `tax_category_mappings` | Account-to-tax-line mappings for Schedule C |\r\n| `backups` | Backup file records |\r\n| `companies` | Multi-company database list |\r\n| `employees` | Employee records for payroll |\r\n| `pay_runs` | Pay run headers with totals |\r\n| `pay_stubs` | Individual pay stubs with withholding breakdowns |\r\n| `qbo_mappings` | QBO ID ↔ Slowbooks ID mapping for sync deduplication |\r\n\r\n---\r\n\r\n## API\r\n\r\nAll endpoints under `/api/`. Swagger docs at `/docs`. 160+ routes across 35 routers.\r\n\r\n### Core (Original)\r\n| Endpoint | Methods | Description |\r\n|----------|---------|-------------|\r\n| `/api/dashboard` | GET | Company snapshot stats |\r\n| `/api/dashboard/charts` | GET | AR aging buckets + monthly revenue trend |\r\n| `/api/settings` | GET, PUT | Company settings |\r\n| `/api/settings/test-email` | POST | Send SMTP test email |\r\n| `/api/search` | GET | Unified search across all entities |\r\n| `/api/accounts` | GET, POST, PUT, DELETE | Chart of Accounts CRUD |\r\n| `/api/customers` | GET, POST, PUT, DELETE | Customer management |\r\n| `/api/vendors` | GET, POST, PUT, DELETE | Vendor management |\r\n| `/api/items` | GET, POST, PUT, DELETE | Items & services |\r\n| `/api/invoices` | GET, POST, PUT | Invoice CRUD with line items |\r\n| `/api/invoices/{id}/pdf` | GET | Generate invoice PDF |\r\n| `/api/invoices/{id}/void` | POST | Void with reversing journal entry |\r\n| `/api/invoices/{id}/send` | POST | Mark invoice as sent |\r\n| `/api/invoices/{id}/email` | POST | Email invoice as PDF attachment |\r\n| `/api/invoices/{id}/duplicate` | POST | Duplicate invoice as new draft |\r\n| `/api/invoices/{id}/print-preview` | GET | Browser print preview (HTML) |\r\n| `/api/estimates` | GET, POST, PUT | Estimate CRUD with line items |\r\n| `/api/estimates/{id}/convert` | POST | Convert estimate to invoice |\r\n| `/api/estimates/{id}/print-preview` | GET | Browser print preview (HTML) |\r\n| `/api/payments` | GET, POST | Record payments with invoice allocation |\r\n| `/api/payments/{id}/void` | POST | Void payment with reversing journal entry |\r\n| `/api/banking/accounts` | GET, POST, PUT | Bank account management |\r\n| `/api/banking/transactions` | GET, POST | Bank register entries |\r\n| `/api/banking/reconciliations` | GET, POST | Reconciliation sessions |\r\n\r\n### Accounts Payable\r\n| Endpoint | Methods | Description |\r\n|----------|---------|-------------|\r\n| `/api/purchase-orders` | GET, POST, PUT | Purchase order CRUD |\r\n| `/api/purchase-orders/{id}/convert-to-bill` | POST | Convert PO to bill |\r\n| `/api/bills` | GET, POST, PUT | Bill CRUD with line items |\r\n| `/api/bills/{id}/void` | POST | Void bill |\r\n| `/api/bill-payments` | POST | Pay vendor bills with allocation |\r\n| `/api/credit-memos` | GET, POST | Credit memo CRUD |\r\n| `/api/credit-memos/{id}/apply` | POST | Apply credit to invoices |\r\n\r\n### Productivity\r\n| Endpoint | Methods | Description |\r\n|----------|---------|-------------|\r\n| `/api/recurring` | GET, POST, PUT, DELETE | Recurring invoice templates |\r\n| `/api/recurring/generate` | POST | Generate due recurring invoices |\r\n| `/api/batch-payments` | POST | Batch payment application |\r\n\r\n### Payroll\r\n| Endpoint | Methods | Description |\r\n|----------|---------|-------------|\r\n| `/api/employees` | GET, POST, PUT | Employee CRUD |\r\n| `/api/payroll` | GET, POST | Pay run CRUD |\r\n| `/api/payroll/{id}/process` | POST | Process pay run (creates journal entries) |\r\n\r\n### Banking & Deposits\r\n| Endpoint | Methods | Description |\r\n|----------|---------|-------------|\r\n| `/api/banking/check-register` | GET | Check register with running balance |\r\n| `/api/deposits/pending` | GET | Pending deposits in Undeposited Funds |\r\n| `/api/deposits` | GET, POST | Create deposits (move funds to bank) |\r\n| `/api/cc-charges` | GET, POST | Credit card charge entry |\r\n| `/api/checks/print` | GET | Generate check PDF (3-per-page format) |\r\n\r\n### Journal Entries\r\n| Endpoint | Methods | Description |\r\n|----------|---------|-------------|\r\n| `/api/journal` | GET, POST | Manual journal entry CRUD |\r\n| `/api/journal/{id}` | GET | Get journal entry with lines |\r\n| `/api/journal/{id}/void` | POST | Void with reversing entry |\r\n\r\n### Reports & Tax\r\n| Endpoint | Methods | Description |\r\n|----------|---------|-------------|\r\n| `/api/reports/profit-loss` | GET | P&L report |\r\n| `/api/reports/balance-sheet` | GET | Balance sheet |\r\n| `/api/reports/ar-aging` | GET | Accounts receivable aging |\r\n| `/api/reports/ap-aging` | GET | Accounts payable aging |\r\n| `/api/reports/sales-tax` | GET | Sales tax collected |\r\n| `/api/reports/sales-tax/pay` | POST | Record sales tax payment to government |\r\n| `/api/reports/general-ledger` | GET | All journal entries by account |\r\n| `/api/reports/income-by-customer` | GET | Sales totals per customer |\r\n| `/api/tax/schedule-c` | GET | Schedule C data from P&L |\r\n| `/api/tax/schedule-c/csv` | GET | Schedule C CSV export |\r\n\r\n### Import/Export\r\n| Endpoint | Methods | Description |\r\n|----------|---------|-------------|\r\n| `/api/iif/export/all` | GET | Export everything as .iif |\r\n| `/api/iif/import` | POST | Import .iif file |\r\n| `/api/csv/export/{type}` | GET | Export entities as CSV |\r\n| `/api/csv/import/{type}` | POST | Import CSV file |\r\n| `/api/bank-import/preview` | POST | Preview OFX/QFX transactions |\r\n| `/api/bank-import/import/{id}` | POST | Import OFX/QFX into bank account |\r\n\r\n### QuickBooks Online\r\n| Endpoint | Methods | Description |\r\n|----------|---------|-------------|\r\n| `/api/qbo/auth-url` | GET | Generate Intuit OAuth authorization URL |\r\n| `/api/qbo/callback` | GET | OAuth redirect handler (stores tokens) |\r\n| `/api/qbo/disconnect` | POST | Clear stored QBO tokens |\r\n| `/api/qbo/status` | GET | Connection status (never returns raw tokens) |\r\n| `/api/qbo/import` | POST | Import all entity types from QBO |\r\n| `/api/qbo/import/{entity}` | POST | Import single entity type |\r\n| `/api/qbo/export` | POST | Export all entity types to QBO |\r\n| `/api/qbo/export/{entity}` | POST | Export single entity type |\r\n\r\n### Online Payments\r\n| Endpoint | Methods | Description |\r\n|----------|---------|-------------|\r\n| `/pay/{token}` | GET | Public payment page (no auth) |\r\n| `/api/stripe/create-checkout-session` | POST | Create Stripe Checkout session |\r\n| `/api/stripe/webhook` | POST | Stripe webhook handler |\r\n| `/api/stripe/payment-link/{id}` | GET | Get public payment URL for invoice |\r\n\r\n### System\r\n| Endpoint | Methods | Description |\r\n|----------|---------|-------------|\r\n| `/api/audit` | GET | Audit log viewer |\r\n| `/api/backups` | GET, POST | Backup management |\r\n| `/api/backups/{id}/download` | GET | Download backup file |\r\n| `/api/companies` | GET, POST | Multi-company management |\r\n| `/api/uploads/logo` | POST | Upload company logo |\r\n\r\n---\r\n\r\n## QuickBooks 2003 Pro — IIF Interoperability\r\n\r\nSlowbooks can exchange data with QuickBooks 2003 Pro via **Intuit Interchange Format (IIF)** — a tab-delimited text format that QB2003 uses for file-based import/export.\r\n\r\n![QuickBooks Interop Page](screenshots/iif-interop.png)\r\n\r\n### Exporting from Slowbooks to QB2003\r\n\r\n1. Navigate to **QuickBooks Interop** in the sidebar\r\n2. Click **Export All Data** (or export individual sections)\r\n3. For invoices/payments, optionally set a date range\r\n4. Save the `.iif` file\r\n5. In QuickBooks 2003: **File > Utilities > Import > IIF Files** and select the file\r\n\r\n**What gets exported:**\r\n\r\n| Section | IIF Header | Fields |\r\n|---------|-----------|--------|\r\n| Chart of Accounts | `!ACCNT` | Name, type (BANK/AR/AP/INC/EXP/EQUITY/COGS/etc.), number, description |\r\n| Customers | `!CUST` | Name, company, address, phone, email, terms, tax ID |\r\n| Vendors | `!VEND` | Name, address, phone, email, terms, tax ID |\r\n| Items | `!INVITEM` | Name, type (SERV/PART/OTHC), description, rate, income account |\r\n| Invoices | `!TRNS/!SPL` | Customer, date, line items, amounts, tax, terms |\r\n| Payments | `!TRNS/!SPL` | Customer, date, amount, deposit account, invoice allocation |\r\n| Estimates | `!TRNS/!SPL` | Customer, date, line items (non-posting) |\r\n\r\n### Importing from QB2003 to Slowbooks\r\n\r\n1. In QuickBooks 2003: **File > Utilities > Export > Lists to IIF Files**\r\n2. In Slowbooks: navigate to **QuickBooks Interop**\r\n3. Drag and drop the `.iif` file (or click to browse)\r\n4. Click **Validate** — checks structure, account types, and balanced transactions\r\n5. If validation passes, click **Import**\r\n\r\nThe importer handles:\r\n- Automatic account type mapping (QB's 14 types → Slowbooks' 6 types)\r\n- Parent:Child colon-separated account names\r\n- Duplicate detection (skips records that already exist by name or document number)\r\n- Per-row error collection (a bad row won't abort the entire import)\r\n- Windows-1252 and UTF-8 encoded files\r\n\r\n### IIF Format Reference\r\n\r\nIIF is tab-delimited with `\\r\\n` line endings. Header rows start with `!`. Transaction blocks use `TRNS`/`SPL`/`ENDTRNS` grouping. Sign convention: TRNS amount is positive (debit), SPL amounts are negative (credits), and they must sum to zero.\r\n\r\n```\r\n!TRNS\tTRNSTYPE\tDATE\tACCNT\tNAME\tAMOUNT\tDOCNUM\r\n!SPL\tTRNSTYPE\tDATE\tACCNT\tNAME\tAMOUNT\tDOCNUM\r\n!ENDTRNS\r\nTRNS\tINVOICE\t01/15/2026\tAccounts Receivable\tJohn E. Marks\t444.96\t2001\r\nSPL\tINVOICE\t01/15/2026\tService Income\tJohn E. Marks\t-438.00\t2001\r\nSPL\tINVOICE\t01/15/2026\tSales Tax Payable\tJohn E. Marks\t-6.96\t2001\r\nENDTRNS\r\n```\r\n\r\n### Account Type Mapping\r\n\r\n| Slowbooks Type | IIF Types (by account number range) |\r\n|---------------|--------------------------------------|\r\n| Asset | `BANK` (1000-1099), `AR` (1100), `OCASSET` (1101-1499), `FIXASSET` (1500-1999) |\r\n| Liability | `AP` (2000), `OCLIAB` (2001-2499), `LTLIAB` (2500+) |\r\n| Equity | `EQUITY` |\r\n| Income | `INC` |\r\n| Expense | `EXP` |\r\n| COGS | `COGS` |\r\n\r\n### Sample Data\r\n\r\nThe `scripts/seed_irs_mock_data.py` script populates Slowbooks with test data from **IRS Publication 583** (Rev. December 2024) — \"Starting a Business and Keeping Records.\" The sample business is **Henry Brown's Auto Body Shop**, a sole proprietorship with:\r\n\r\n- 8 customers (John E. Marks, Patricia Davis, Robert Garcia, Thompson & Sons, etc.)\r\n- 13 vendors from the IRS check disbursements journal (Auto Parts Inc., ABC Auto Paint, Baker's Fender Co., etc.)\r\n- 8 service/material items (Body Repair, Paint & Finish, Dent Removal, Frame Alignment, etc.)\r\n- 10 invoices totaling $3,631.31 with 1.59% sales tax\r\n- 5 payments totaling $1,498.00\r\n- 3 pending estimates\r\n- All with proper double-entry journal entries\r\n\r\n```bash\r\npython3 scripts/seed_irs_mock_data.py\r\n```\r\n\r\n---\r\n\r\n## License\r\n\r\n**Source Available — Free for personal and enterprise use. No commercial resale.**\r\n\r\nYou can use, modify, and run Slowbooks Pro for any personal, educational, or internal business purpose. You cannot sell it or offer it as a paid service. See [LICENSE](LICENSE) for full terms.\r\n\r\n---\r\n\r\n## Acknowledgments\r\n\r\n- 14 years of QuickBooks 2003 Pro (1 license, $199.95, 2003 dollars)\r\n- IDA Pro and the reverse engineering community\r\n- The Pervasive PSQL documentation that nobody else has read since 2005\r\n- Every small business owner who lost software they paid for when activation servers died\r\n\r\n---\r\n\r\n## Contributors\r\n\r\n- [VonHoltenCodes](https://github.com/VonHoltenCodes) — Creator\r\n- [jake-378](https://github.com/jake-378) — Backup UI fixes, report period selectors, invoice terms autofill, date validation fixes\r\n- [WC3D](https://github.com/WC3D) — Jinja2 XSS security fix\r\n\r\n*Built by [VonHoltenCodes](https://github.com/VonHoltenCodes) with [Claude Code](https://claude.ai/code) as co-author.*\r\n","summary":" SlowBooks Pro 2026 is a free, open-source accounting application designed as a modern replacement for QuickBooks 2003 Pro, offering comprehensive double-entry bookkeeping, invoicing, accounts payable, payroll processing, and financial reporting without requiring proprietary activation servers. The cross-platform software runs on Windows, macOS, and Linux through Docker or native installation, featuring automated journal entries, recurring invoicing, audit logging, and closing date enforcement to maintain data integrity. It benefits small business owners, freelancers, and contractors who seek a vendor-lock-in-free accounting solution that ensures perpetual access to their financial data and operations regardless of external service discontinuations.","description":"Personal bookkeeping app - a QuickBooks 2003 Pro replacement, decompiled from the ashes of QBW32.EXE. Free for personal and enterprise use.","stars":150,"language":"Python"},{"owner":"AgentSeal","repo":"codeburn","url":"https://github.com/AgentSeal/codeburn","readme":"<p align=\"center\">\n  <img src=\"https://cdn.jsdelivr.net/gh/getagentseal/codeburn@main/assets/logo.png\" alt=\"CodeBurn\" width=\"120\" />\n</p>\n\n<h1 align=\"center\">CodeBurn</h1>\n\n<p align=\"center\">See where your AI coding tokens go.</p>\n\n<p align=\"center\">\n  <a href=\"https://www.npmjs.com/package/codeburn\"><img src=\"https://img.shields.io/npm/v/codeburn.svg\" alt=\"npm version\" /></a>\n  <a href=\"https://www.npmjs.com/package/codeburn\"><img src=\"https://img.shields.io/npm/dt/codeburn.svg\" alt=\"total downloads\" /></a>\n  <a href=\"https://github.com/getagentseal/codeburn/blob/main/LICENSE\"><img src=\"https://img.shields.io/npm/l/codeburn.svg\" alt=\"license\" /></a>\n  <a href=\"https://github.com/getagentseal/codeburn\"><img src=\"https://img.shields.io/badge/node-%3E%3D20-brightgreen.svg\" alt=\"node version\" /></a>\n</p>\n\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/getagentseal/codeburn/main/assets/dashboard.jpg\" alt=\"CodeBurn TUI dashboard\" width=\"620\" />\n</p>\n\nBy task type, tool, model, MCP server, and project. Supports **Claude Code**, **Codex** (OpenAI), **Cursor**, **OpenCode**, **Pi**, and **GitHub Copilot** with a provider plugin system. Tracks one-shot success rate per activity type so you can see where the AI nails it first try vs. burns tokens on edit/test/fix retries. Interactive TUI dashboard with gradient charts, responsive panels, and keyboard navigation. Native macOS menubar app in `mac/`. CSV/JSON export.\n\nWorks by reading session data directly from disk. No wrapper, no proxy, no API keys. Pricing from LiteLLM (auto-cached, all models supported).\n\n## Install\n\n```bash\nnpm install -g codeburn\n```\n\nOr run without installing:\n\n```bash\nnpx codeburn\n```\n\n### Requirements\n\n- Node.js 20+\n- Claude Code (`~/.claude/projects/`), Codex (`~/.codex/sessions/`), Cursor, OpenCode, Pi (`~/.pi/agent/sessions/`), and/or GitHub Copilot (`~/.copilot/session-state/`)\n- For Cursor/OpenCode support: `better-sqlite3` is installed automatically as an optional dependency\n\n## Usage\n\n```bash\ncodeburn                        # interactive dashboard (default: 7 days)\ncodeburn today                  # today's usage\ncodeburn month                  # this month's usage\ncodeburn report -p 30days       # rolling 30-day window\ncodeburn report -p all          # every recorded session\ncodeburn report --from 2026-04-01 --to 2026-04-10  # exact date range\ncodeburn report --format json   # full dashboard data as JSON\ncodeburn report --refresh 60    # auto-refresh every 60s (default: 30s)\ncodeburn status                 # compact one-liner (today + month)\ncodeburn status --format json\ncodeburn export                 # CSV with today, 7 days, 30 days\ncodeburn export -f json         # JSON export\ncodeburn optimize               # find waste, get copy-paste fixes\ncodeburn optimize -p week       # scope the scan to last 7 days\n```\n\nArrow keys switch between Today / 7 Days / 30 Days / Month / All Time. Press `q` to quit, `1` `2` `3` `4` `5` as shortcuts, `c` to open model comparison. The dashboard auto-refreshes every 30 seconds by default (`--refresh 0` to disable). The dashboard also shows average cost per session and the five most expensive sessions across all projects.\n\n### JSON output\n\n`report`, `today`, and `month` support `--format json` to output the full dashboard data as structured JSON to stdout:\n\n```bash\ncodeburn report --format json             # 7-day JSON report\ncodeburn today --format json              # today's data as JSON\ncodeburn month --format json              # this month as JSON\ncodeburn report -p 30days --format json   # 30-day window\n```\n\nThe JSON includes all dashboard panels: overview (cost, calls, sessions, cache hit %), daily breakdown, projects (with `avgCostPerSession`), models with token counts, activities with one-shot rates, core tools, MCP servers, and shell commands. Pipe to `jq` for filtering:\n\n```bash\ncodeburn report --format json | jq '.projects'\ncodeburn today --format json | jq '.overview.cost'\n```\n\nFor the lighter `status --format json` (today + month totals only) or file-based exports (`export -f json`), see above.\n\n## Providers\n\nCodeBurn auto-detects which AI coding tools you use. If multiple providers have session data on disk, press `p` in the dashboard to toggle between them.\n\n```bash\ncodeburn report                      # all providers combined (default)\ncodeburn report --provider claude    # Claude Code only\ncodeburn report --provider codex     # Codex only\ncodeburn report --provider cursor    # Cursor only\ncodeburn report --provider opencode  # OpenCode only\ncodeburn report --provider pi        # Pi only\ncodeburn report --provider copilot   # GitHub Copilot only\ncodeburn today --provider codex      # Codex today\ncodeburn export --provider claude    # export Claude data only\n```\n\nThe `--provider` flag works on all commands: `report`, `today`, `month`, `status`, `export`.\n\n### Project filtering\n\nFilter results by project name (case-insensitive substring match). Both flags are repeatable:\n\n```bash\ncodeburn report --project myapp                  # show only projects matching \"myapp\"\ncodeburn report --exclude myapp                  # show everything except \"myapp\"\ncodeburn report --exclude myapp --exclude tests  # exclude multiple projects\ncodeburn month --project api --project web       # include multiple projects\ncodeburn export --project inventory              # export only \"inventory\" project data\n```\n\nThe `--project` and `--exclude` flags work on all commands and can be combined with `--provider`.\n\n### Date range filtering\n\nBeyond the preset periods, specify an exact window with `--from` and `--to` (`YYYY-MM-DD`, local time):\n\n```bash\ncodeburn report --from 2026-04-01 --to 2026-04-10   # explicit window\ncodeburn report --from 2026-04-01                    # this date through today\ncodeburn report --to 2026-04-10                      # earliest data through this date\ncodeburn report --from 2026-04-01 --to 2026-04-10 --format json\n```\n\nEither flag alone is valid. Inverted or malformed dates exit with a clear error. In the TUI, the custom range sets the initial load only -- pressing `1`-`5` switches back to predefined periods.\n\n### Supported providers\n\n| Provider | Data location | Status |\n|----------|--------------|--------|\n| Claude Code | `~/.claude/projects/` | Supported |\n| Claude Desktop | `~/Library/Application Support/Claude/local-agent-mode-sessions/` | Supported |\n| Codex (OpenAI) | `~/.codex/sessions/` | Supported |\n| Cursor | `~/Library/Application Support/Cursor/User/globalStorage/state.vscdb` | Supported |\n| OpenCode | `~/.local/share/opencode/` (SQLite) | Supported |\n| Pi | `~/.pi/agent/sessions/` | Supported |\n| GitHub Copilot | `~/.copilot/session-state/` | Supported (output tokens only) |\n| Amp | -- | Planned (provider plugin system) |\n\nCodex tool names are normalized to match Claude's conventions (`exec_command` shows as `Bash`, `read_file` as `Read`, etc.) so the activity classifier and tool breakdown work across providers.\n\nCursor reads token usage from its local SQLite database. Since Cursor's \"Auto\" mode hides the actual model used, costs are estimated using Sonnet pricing (labeled \"Auto (Sonnet est.)\" in the dashboard). The Cursor view shows a **Languages** panel (extracted from code blocks) instead of Core Tools/Shell/MCP panels, since Cursor does not log individual tool calls. First run on a large Cursor database may take up to a minute; results are cached and subsequent runs are instant.\n\nGitHub Copilot only logs output tokens in its session state, so Copilot cost rows sit below actual API cost. The model is tracked via `session.model_change` events; messages before the first model change are skipped to avoid silent misattribution.\n\n### Adding a provider\n\nThe provider plugin system makes adding a new provider a single file. Each provider implements session discovery, JSONL parsing, tool normalization, and model display names. See `src/providers/codex.ts` for an example.\n\n## Currency\n\nBy default, costs are shown in USD. To display in a different currency:\n\n```bash\ncodeburn currency GBP          # set to British Pounds\ncodeburn currency AUD          # set to Australian Dollars\ncodeburn currency JPY          # set to Japanese Yen\ncodeburn currency              # show current setting\ncodeburn currency --reset      # back to USD\n```\n\nAny [ISO 4217 currency code](https://en.wikipedia.org/wiki/ISO_4217#List_of_ISO_4217_currency_codes) is supported (162 currencies). Exchange rates are fetched from [Frankfurter](https://www.frankfurter.app/) (European Central Bank data, free, no API key) and cached for 24 hours at `~/.cache/codeburn/`. Config is stored at `~/.config/codeburn/config.json`.\n\nThe currency setting applies everywhere: dashboard, status bar, menu bar widget, CSV/JSON exports, and JSON API output.\n\nThe menu bar widget includes a currency picker with 17 common currencies. For any currency not listed, use the CLI command above.\n\n## Menu Bar\n\n<img src=\"https://cdn.jsdelivr.net/gh/getagentseal/codeburn@main/assets/menubar-0.8.0.png\" alt=\"CodeBurn macOS menubar app\" width=\"420\" />\n\n```bash\nnpx codeburn menubar\n```\n\nOne command: downloads the latest `.app`, installs into `~/Applications`, and launches it. Re-run with `--force` to reinstall. Native Swift + SwiftUI app lives in `mac/` (see `mac/README.md` for build details). Shows today's cost with a flame icon, opens a popover with agent tabs, period switcher (Today / 7 Days / 30 Days / Month / All), Trend / Forecast / Pulse / Stats / Plan insights, activity and model breakdowns, optimize findings, and CSV/JSON export. Refreshes live via FSEvents plus a 15-second poll.\n\n## What it tracks\n\n**13 task categories** classified from tool usage patterns and user message keywords. No LLM calls, fully deterministic.\n\n| Category | What triggers it |\n|---|---|\n| Coding | Edit, Write tools |\n| Debugging | Error/fix keywords + tool usage |\n| Feature Dev | \"add\", \"create\", \"implement\" keywords |\n| Refactoring | \"refactor\", \"rename\", \"simplify\" |\n| Testing | pytest, vitest, jest in Bash |\n| Exploration | Read, Grep, WebSearch without edits |\n| Planning | EnterPlanMode, TaskCreate tools |\n| Delegation | Agent tool spawns |\n| Git Ops | git push/commit/merge in Bash |\n| Build/Deploy | npm build, docker, pm2 |\n| Brainstorming | \"brainstorm\", \"what if\", \"design\" |\n| Conversation | No tools, pure text exchange |\n| General | Skill tool, uncategorized |\n\n**Breakdowns**: daily cost chart, per-project, per-model (Opus/Sonnet/Haiku/GPT-5/GPT-4o/Gemini), per-activity with one-shot rate, core tools, shell commands, MCP servers.\n\n**One-shot rate**: For categories that involve code edits, CodeBurn detects edit/test/fix retry cycles (Edit -> Bash -> Edit patterns). The 1-shot column shows the percentage of edit turns that succeeded without retries. Coding at 90% means the AI got it right first try 9 out of 10 times.\n\n**Pricing**: Fetched from [LiteLLM](https://github.com/BerriAI/litellm) model prices (auto-cached 24h at `~/.cache/codeburn/`). Handles input, output, cache write, cache read, and web search costs. Fast mode multiplier for Claude. Hardcoded fallbacks for all Claude and GPT-5 models to prevent fuzzy matching mispricing.\n\n## Reading the dashboard\n\nCodeBurn surfaces the data, you read the story. A few patterns worth knowing:\n\n| Signal you see | What it might mean |\n|---|---|\n| Cache hit < 80% | System prompt or context isn't stable, or caching not enabled |\n| Lots of `Read` calls per session | Agent re-reading same files, missing context |\n| Low 1-shot rate (Coding 30%) | Agent struggling with edits, retry loops |\n| Opus 4.6 dominating cost on small turns | Overpowered model for simple tasks |\n| `dispatch_agent` / `task` heavy | Sub-agent fan-out, expected or excessive |\n| No MCP usage shown | Either you don't use MCP servers, or your config is broken |\n| Bash dominated by `git status`, `ls` | Agent exploring instead of executing |\n| Conversation category dominant | Agent talking instead of doing |\n\nThese are starting points, not verdicts. A 60% cache hit on a single experimental session is fine. A persistent 60% cache hit across weeks of work is a config issue.\n\n## Optimize\n\nOnce you know what to look for, `codeburn optimize` scans your sessions and your `~/.claude/` setup for the most common waste patterns and hands back exact, copy-paste fixes. It never writes to your files.\n\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/getagentseal/codeburn/main/assets/optimize.jpg\" alt=\"CodeBurn optimize output\" width=\"720\" />\n</p>\n\n```bash\ncodeburn optimize                       # scan the last 30 days\ncodeburn optimize -p today              # today only\ncodeburn optimize -p week               # last 7 days\ncodeburn optimize --provider claude     # restrict to one provider\n```\n\n**What it detects**\n\n- Files Claude re-reads across sessions (same content, same context, over and over)\n- Low Read:Edit ratio (editing without reading leads to retries and wasted tokens)\n- Wasted bash output (uncapped `BASH_MAX_OUTPUT_LENGTH`, trailing noise)\n- Unused MCP servers still paying their tool-schema overhead every session\n- Ghost agents, skills, and slash commands defined in `~/.claude/` but never invoked\n- Bloated `CLAUDE.md` files (with `@-import` expansion counted)\n- Cache creation overhead and junk directory reads\n\nEach finding shows the estimated token and dollar savings plus a ready-to-paste fix: a `CLAUDE.md` line, an environment variable, or a `mv` command to archive unused items. Findings are ranked by urgency (impact weighted against observed waste) and rolled up into an A-F setup health grade. Repeat runs classify each finding as new, improving, or resolved against a 48-hour recent window.\n\nYou can also open it inline from the dashboard: press `o` when a finding count appears in the status bar, `b` to return.\n\n## Compare\n\nSide-by-side model comparison across any two models in your session data. Pick any pair and see how they stack up on real usage from your own sessions.\n\n```bash\ncodeburn compare                        # interactive model picker (default: all time)\ncodeburn compare -p week                # last 7 days\ncodeburn compare -p today               # today only\ncodeburn compare --provider claude      # Claude Code sessions only\n```\n\nOr press `c` in the dashboard to enter compare mode. Arrow keys switch periods, `b` to return.\n\n**Metrics compared**\n\n| Section | Metric | What it measures |\n|---------|--------|-----------------|\n| Performance | One-shot rate | Edits that succeed without retries |\n| Performance | Retry rate | Average retries per edit turn |\n| Performance | Self-correction | Turns where the model corrected its own mistake |\n| Efficiency | Cost / call | Average cost per API call |\n| Efficiency | Cost / edit | Average cost per edit turn |\n| Efficiency | Output tok / call | Average output tokens per call |\n| Efficiency | Cache hit rate | Proportion of input from cache |\n\n**Per-category one-shot rates.** Breaks down one-shot success by task category (Coding, Debugging, Feature Dev, etc.) so you can see where each model excels or struggles.\n\n**Working style.** Compares delegation rate (agent spawns), planning rate (TaskCreate, TaskUpdate, TodoWrite usage), average tools per turn, and fast mode usage.\n\nAll metrics are computed from your local session data. No LLM calls, fully deterministic.\n\n## How it reads data\n\n**Claude Code** stores session transcripts as JSONL at `~/.claude/projects/<sanitized-path>/<session-id>.jsonl`. Each assistant entry contains model name, token usage (input, output, cache read, cache write), tool_use blocks, and timestamps.\n\n**Codex** stores sessions at `~/.codex/sessions/YYYY/MM/DD/rollout-*.jsonl` with `token_count` events containing per-call and cumulative token usage, and `function_call` entries for tool tracking.\n\n**Cursor** stores session data in a SQLite database at `~/Library/Application Support/Cursor/User/globalStorage/state.vscdb` (macOS), `~/.config/Cursor/User/globalStorage/state.vscdb` (Linux), or `%APPDATA%/Cursor/User/globalStorage/state.vscdb` (Windows). Token counts are in `cursorDiskKV` table entries with `bubbleId:` key prefix. Requires `better-sqlite3` (installed as optional dependency). Parsed results are cached at `~/.cache/codeburn/cursor-results.json` and auto-invalidate when the database changes.\n\n**OpenCode** stores sessions in SQLite databases at `~/.local/share/opencode/opencode*.db`. CodeBurn queries the `session`, `message`, and `part` tables read-only, extracts token counts and tool usage, and recalculates cost using the LiteLLM pricing engine. Falls back to OpenCode's own cost field for models not in our pricing data. Subtask sessions (`parent_id IS NOT NULL`) are excluded to avoid double-counting. Supports multiple channel databases and respects `XDG_DATA_HOME`.\n\n**Pi** stores sessions as JSONL at `~/.pi/agent/sessions/<sanitized-cwd>/*.jsonl`. Each assistant message carries token usage (input, output, cacheRead, cacheWrite) plus inline `toolCall` content blocks. CodeBurn extracts token counts, normalizes Pi's lowercase tool names to the standard set (`bash` -> `Bash`, `dispatch_agent` -> `Agent`), and pulls bash commands from `toolCall.arguments.command` for the shell breakdown.\n\nCodeBurn reads these files, deduplicates messages (by API message ID for Claude, by cumulative token cross-check for Codex, by conversation/timestamp for Cursor, by session+message ID for OpenCode, by responseId for Pi), filters by date range per entry, and classifies each turn.\n\n## Environment variables\n\n| Variable | Description |\n|----------|-------------|\n| `CLAUDE_CONFIG_DIR` | Override Claude Code data directory (default: `~/.claude`) |\n| `CODEX_HOME` | Override Codex data directory (default: `~/.codex`) |\n\n## Project structure\n\n```\nsrc/\n  cli.ts          Commander.js entry point\n  dashboard.tsx   Ink TUI (React for terminals)\n  parser.ts       JSONL reader, dedup, date filter, provider orchestration\n  models.ts       LiteLLM pricing, cost calculation\n  classifier.ts   13-category task classifier\n  compare-stats.ts Model comparison engine (metrics, category breakdown, working style)\n  types.ts        Type definitions\n  format.ts       Text rendering (status bar)\n  menubar-json.ts Payload builder consumed by the native macOS menubar app in mac/\n  export.ts       CSV/JSON multi-period export\n  config.ts       Config file management (~/.config/codeburn/)\n  currency.ts     Currency conversion, exchange rates, Intl formatting\n  sqlite.ts       SQLite adapter (lazy-loads better-sqlite3)\n  cursor-cache.ts Cursor result cache (file-based, auto-invalidating)\n  providers/\n    types.ts      Provider interface definitions\n    index.ts      Provider registry (lazy-loads Cursor, OpenCode)\n    claude.ts     Claude Code session discovery\n    codex.ts      Codex session discovery and JSONL parsing\n    cursor.ts     Cursor SQLite parsing, language extraction\n    opencode.ts   OpenCode SQLite session discovery and parsing\n    pi.ts         Pi agent JSONL session discovery and parsing\n```\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=getagentseal%2Fcodeburn&type=date&legend=top-left\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=getagentseal/codeburn&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=getagentseal/codeburn&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=getagentseal/codeburn&type=date&legend=top-left\" />\n </picture>\n</a>\n\n## License\n\nMIT\n\n## Credits\n\nInspired by [ccusage](https://github.com/ryoppippi/ccusage) and [CodexBar](https://github.com/nicklama/codexbar). Pricing data from [LiteLLM](https://github.com/BerriAI/litellm). Exchange rates from [Frankfurter](https://www.frankfurter.app/).\n\nBuilt by [AgentSeal](https://agentseal.org).\n","summary":" CodeBurn is a CLI tool and dashboard that helps developers track and analyze token usage and costs across multiple AI coding assistants including Claude Code, GitHub Copilot, Cursor, and others. By reading session data directly from local disk without requiring API keys or proxies, it provides granular insights into spending by project, model, and activity type while tracking one-shot success rates versus costly retry loops. The tool features an interactive terminal UI with gradient charts, a native macOS menubar app, and export options to CSV or JSON for further analysis. Developers who rely heavily on AI pair programmers can use CodeBurn to identify inefficiencies, optimize their workflow, and understand exactly where their AI token budgets are being spent.","description":"See where your AI coding tokens go. Interactive TUI dashboard for Claude Code, Codex, and Cursor cost observability.","stars":2880,"language":"TypeScript"},{"owner":"Aniket-508","repo":"termcn","url":"https://github.com/Aniket-508/termcn","readme":"<h1 align=\"center\">termcn</h1>\n\n<p align=\"center\">\n  Free & open-source, ready-to-use, customizable terminal UI components for React.<br/>\n  Zero config. One command setup. Built on <a href=\"https://github.com/vadimdemedes/ink\">Ink</a>, works seamlessly with <a href=\"https://ui.shadcn.com/\">shadcn/ui</a>.\n</p>\n\n<p align=\"center\">\n  <a href=\"https://termcn.dev/docs\">Get Started</a> ·\n  <a href=\"https://termcn.dev/docs/installation\">Installation</a> ·\n  <a href=\"https://termcn.dev/docs/components\">Components</a>\n</p>\n\n<br />\n\n<p align=\"center\">\n  <img src=\"public/og.png\" alt=\"termcn banner\" />\n</p>\n\n## Features\n\n- 🎨 **Theme-aware** — Automatically adapts to your chosen terminal theme\n- 🎯 **Zero config** — Works out of the box with sensible defaults\n- 📦 **shadcn/ui compatible** — Uses the same registry format and CLI\n- ⌨️ **Ink powered** — Full access to Ink's powerful terminal rendering\n- 🧩 **Composable** — Build complex terminal UIs with simple, declarative components\n- 📊 **Charts & Data** — Bar charts, line charts, gauges, heat maps, and more\n- 🤖 **AI Components** — Chat messages, tool approvals, streaming text, and thinking blocks\n- 🎮 **Navigation** — Command palettes, tabs, menus, sidebars, and pagination\n\n## Contributing\n\nContributions are welcome! Please feel free to submit a Pull Request.\n\n1. Fork the repository\n2. Create your feature branch (`git checkout -b feature/amazing-feature`)\n3. Commit your changes (`git commit -m 'Add some amazing feature'`)\n4. Push to the branch (`git push origin feature/amazing-feature`)\n5. Open a Pull Request\n\n## License\n\n[MIT](LICENSE)\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=Aniket-508%2Ftermcn&type=date&legend=top-left\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=Aniket-508/termcn&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=Aniket-508/termcn&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=Aniket-508/termcn&type=date&legend=top-left\" />\n </picture>\n</a>\n","summary":" Termcn provides ready-to-use, customizable terminal UI components for React, built on the Ink framework and compatible with the shadcn/ui registry format. It requires zero configuration to set up and automatically adapts to terminal themes, offering components ranging from data visualizations like charts and gauges to AI-specific elements such as chat messages and streaming text. The library also includes navigation primitives including command palettes, tabs, and sidebars for building complex terminal interfaces. React developers creating command-line tools or terminal applications can leverage termcn to rapidly construct rich, interactive TUIs without dealing with low-level terminal rendering details.","description":"Beautiful terminal UI components, built on Ink. 100% Free, Zero config, one command setup.","stars":301,"language":"TypeScript"},{"owner":"lbr77","repo":"SideImpactor","url":"https://github.com/lbr77/SideImpactor","readme":"# Side Impactor\n\nBrowser-based IPA signing and installation. Pair an iOS device over WebUSB, sign with your Apple Developer account, and install — all from a single web page.\n\n## Quick Start\n\n```bash\nbun install --ignore-scripts\nbun run dev\n```\n\nOpen `http://localhost:5173`.\n\n## Project Structure\n\n| Path | Purpose |\n|---|---|\n| `frontend/` | React + Tailwind SPA (Vite) |\n| `backend/` | Cloudflare Workers relay |\n| `dependencies/webmuxd/` | WebUSB usbmux/lockdown protocol library |\n| `wasm/openssl/` | OpenSSL WASM (TLS + pair record generation) |\n| `wasm/libcurl-wasm/` | libcurl WASM (Apple API HTTP via WISP proxy) |\n| `wasm/zsign-wasm/` | zsign WASM (IPA re-signing) |\n| `scripts/` | WASM native build scripts (Rust + Emscripten) |\n\n## Build\n\n```bash\n# WASM dist bundles (copies pre-built src→dist, no compiler needed)\nbun run build:wasm:dist\n\n# Frontend production build (runs wasm:dist automatically)\nbun run build:frontend\n\n# Full WASM recompile from source (requires Rust, Emscripten, precompiled OpenSSL)\nbun run build:wasm\n```\n\n## Docker\n\n```bash\nbun run build:wasm:dist   # ensure WASM dists exist\ndocker build -t sideload-web .\ndocker run -p 3000:3000 sideload-web\n```\n\n## Cloudflare\n\n```bash\ncd backend\nbun run deploy\n```\n\n## Test\n\n```bash\nbun run test            # webmuxd unit tests\nbun run test:frontend   # frontend vitest suite (141 tests)\n```\n\n## Credits\n\nProjects referenced:\n- [libimobiledevice](https://github.com/libimobiledevice/libimobiledevice)\n- [webmuxd](https://github.com/hack-different/webmuxd)\n- [zsign](https://github.com/nicehash/zsign)\n- [AltSign](https://github.com/rileytestut/AltSign/)\n- [AltStore](https://github.com/altstoreio/AltStore)\n- [openssl-wasm](https://github.com/nicehash/openssl-wasm)\n- [anisette-js](https://github.com/lbr77/anisette-js)\n- [unicorn](https://github.com/lbr77/uni
