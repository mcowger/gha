h at preflight.** `check_pack_health.py` runs 18 checks\n  including `build_manifest.py --verify` — any modified / missing /\n  untracked file is flagged.\n- **Upgrade refusal.** `upgrade.py --apply` sha-verifies every pack\n  source BEFORE copying into a project. A tampered\n  `security-reviewer.md` is REFUSED and never enters `.cursor/`:\n  ```\n  ! REFUSED  agents/review/security-reviewer.md: manifest expected\n             5d731c6b..., actual 4b5c2283... -- possible supply-chain tampering\n  ```\n- **Install-extras verification.** `install_extras.py` — the\n  on-demand specialist installer — inherits the same supply-chain\n  guard.\n- **Post-install anchor.** `.cursor/pack-manifest.json` records\n  sha256 of every installed pack-owned file so\n  `verify_integration.py` can detect someone editing `gate-stop.sh`\n  or `qa-verifier.md` locally to weaken enforcement.\n- **Snapshot + rollback.** `upgrade.py --apply` takes a tarball\n  snapshot to `.cursor/.integration-snapshots/` before touching\n  anything; `upgrade.py --rollback` restores from the latest.\n\n### Prompt-injection scanner\n\nAgents are copy-pasted into `.cursor/agents/` and become part of the\norchestrator's prompt context. A hostile body can silently subvert\nevery session. `scan_agent_safety.py` runs a heuristic regex pass\nover every agent markdown for four classes of hostile content:\n\n| Class              | Examples |\n|--------------------|----------|\n| Override           | \"ignore previous instructions\", jailbreak markers |\n| Exfil              | Secret leak attempts, `~/.ssh/id_rsa` access, reveal-system-prompt probes |\n| Remote exec        | `curl \\| bash`, base64-decode-exec, pastebin / ngrok / webhook.site callbacks |\n| Policy subversion  | \"skip qa-verifier\", \"always approve silently\" |\n\nRuns on the pack catalogue in CI and on installed `.cursor/agents/`\nafter integration. Exit 1 on any error-severity hit. False-positive\nguards built in for legitimate MITRE ATT&CK threat documentation.\n\n---\n\n## Supported IDE integrations\n\nHarmonist ships converters for 11 AI coding assistants. Run\n`./agents/scripts/convert.sh --tool <name>` to regenerate the\ntarget-specific artifacts, then `./agents/scripts/install.sh` to\nplace them in the right spots.\n\n| Tool              | Surface produced                                         |\n|-------------------|----------------------------------------------------------|\n| **Cursor**        | `.cursor/agents/*.md` + `.cursor/rules/*.mdc` + hooks    |\n| **Claude Code**   | Project-scoped agent definitions                         |\n| **GitHub Copilot**| Custom instruction file                                  |\n| **Windsurf**      | `.windsurfrules`                                         |\n| **Aider**         | `CONVENTIONS.md`                                         |\n| **Kimi**          | `agents-orchestrator/system.md`                          |\n| **Qwen**          | Agent directory format                                   |\n| **Gemini CLI**    | Extension manifest + skills                              |\n| **OpenCode**      | Per-agent markdown                                       |\n| **OpenClaw**      | IDENTITY.md per agent                                    |\n| **Antigravity**   | Skill format                                             |\n\nAdd `--thin` to install the essentials-only variant of each persona\nagent (~38% fewer body lines across the pool, which matters in\ncontext-constrained sessions). See [`agents/SCHEMA.md`](agents/SCHEMA.md)\nfor the `## Deep Reference` convention that makes thin mode possible.\n\n---\n\n## Key scripts\n\n| Script                              | What it does                                                                   |\n|-------------------------------------|--------------------------------------------------------------------------------|\n| `check_pack_health.py`              | 18 preflight checks (version, manifest, lint, migrator idempotency, etc.)     |\n| `lint_agents.py`                    | Validate every agent against Schema v2 — 0 errors required                    |\n| `build_index.py`                    | Regenerate `agents/index.json` (routing table)                                |\n| `build_manifest.py`                 | Regenerate `MANIFEST.sha256` (supply-chain anchor)                            |\n| `integrate.py`                      | Full integration into a target project                                        |\n| `upgrade.py`                        | Roll an integrated project forward to a newer pack version, with snapshots   |\n| `install_extras.py`                 | Add specialists to `.cursor/agents/` by slug, role bundle, or tag — sha-verified |\n| `verify_integration.py`             | Objective post-integration audit — what's missing, what's customised         |\n| `scan_agent_safety.py`              | Prompt-injection / exfil scanner for catalogue + installed agents            |\n| `scan_memory_leaks.py`              | Audit git history for accidentally-committed memory files                    |\n| `scan_rules_conflicts.py`           | Detect phantom slugs, duplicate-purpose rules, protocol contradictions       |\n| `insert_deep_ref_marker.py`         | Add `## Deep Reference` cut point to long persona agents                     |\n| `extract_essentials.py`             | Produce the thin variant of a persona agent                                  |\n| `report_usage.py`                   | Render local agent-usage telemetry; recommend dead-balance removal           |\n\nFull script index: [`agents/scripts/`](agents/scripts/).\n\n---\n\n## Documentation\n\n| File | Purpose |\n|------|---------|\n| [`AGENTS.md`](AGENTS.md) | Orchestrator template — protocol, hook phases, memory, resilience. Copied into every integrated project and customized to the project's domain. |\n| [`GUIDE_EN.md`](GUIDE_EN.md) | Condensed walkthrough for first-time users. |\n| [`integration-prompt.md`](integration-prompt.md) | The one-shot prompt to paste into Cursor Agent mode for fully automated integration. |\n| [`agents/SCHEMA.md`](agents/SCHEMA.md) | Frontmatter contract (Schema v2) every agent file must satisfy. |\n| [`agents/STYLE.md`](agents/STYLE.md) | How agent bodies should read — canonical shapes, anti-patterns, retrofit checklist. |\n| [`agents/TAGS.md`](agents/TAGS.md) | Curated tag vocabulary (253 tags organized by layer). |\n| [`memory/SCHEMA.md`](memory/SCHEMA.md) | Memory entry schema (v1), correlation-ID format, validation rules. |\n| [`CONTRIBUTING.md`](CONTRIBUTING.md) | How to contribute, PR checklist, release process. |\n| [`SECURITY.md`](SECURITY.md) | Vulnerability reporting policy, scope, response timelines. |\n| [`CODE_OF_CONDUCT.md`](CODE_OF_CONDUCT.md) | Community standards. |\n| [`CHANGELOG.md`](CHANGELOG.md) | Release history in Keep-a-Changelog format. |\n| [`playbooks/`](playbooks/) | Optional NEXUS 7-phase lifecycle with phase-specific runbooks for startups, enterprises, incident response, and marketing campaigns. |\n\n---\n\n## Testing\n\nThe enforcement layer, memory CLI, and every script ship with\nexhaustive test coverage. `430+ test assertions` across hooks, memory,\nand shell-based integration suites — all green in CI on every push.\n\n| Suite                              | Assertions | Covers                                              |\n|------------------------------------|-----------:|-----------------------------------------------------|\n| Hook tests                         |         30 | All 5 phases, capability scoping, loop-limit, incident surfacing, cross-platform runner parity |\n| Memory tests                       |         29 | Append, validate, search, rotate, dedupe, migrations, secret patterns |\n| Integration + upgrade + install_extras  |        90+ | End-to-end integration, snapshots, rollback, on-demand specialist install |\n| Supply-chain integrity             |         23 | MANIFEST verification, tampered-source refusal, pack-manifest tracking |\n| 15 other script suites             |        250+| lint, extract, freshness, rules-conflicts, memory-privacy, telemetry, project-context, regression detection, py-guard sync, smoke test, etc. |\n\nRun the full regression locally:\n\n```bash\npython3 agents/scripts/check_pack_health.py       # 18 preflight checks\nbash hooks/tests/run-hook-tests.sh                # 30 scenarios\nbash memory/tests/run-memory-tests.sh             # 29 scenarios\nfor t in agents/scripts/test_*.sh; do bash \"$t\"; done  # 17 more suites\n```\n\n---\n\n## FAQ\n\n### Is this another LangChain / AutoGen / CrewAI alternative?\n\nNo. Those are **frameworks you build an agentic application on top of**\n— they provide abstractions for chaining LLM calls, tool use, and\norchestration logic.\n\nHarmonist is **a pack you drop into an existing project** to make your\nAI assistant follow a protocol. It doesn't replace your app's runtime;\nit installs next to your code and intercepts how the coding assistant\n(Cursor, Claude Code, Copilot, etc.) interacts with your project.\n\nThe two can coexist. Harmonist governs the *coding workflow*; a\nLangChain / AutoGen / CrewAI app is something the workflow might\n*produce*.\n\n### Why mechanical enforcement instead of prompt guidance?\n\nBecause prompt guidance is advisory and AI models treat it that way.\n\"Always run QA before marking done\" in a prompt is aspirational. A\nstop hook that refuses to let the turn finish until QA ran is a\ncontract. We chose contracts.\n\n### Does it work without Cursor?\n\nYes. Cursor is the primary integration because of its subagent and\nhooks support, but the pack ships adapters for 10 other tools (see\n[Supported IDE integrations](#supported-ide-integrations)). The\nenforcement layer is strongest with Cursor; in other tools it falls\nback to convention-plus-validation.\n\n### Can I customize the protocol?\n\nYes, and you should. The project-level `AGENTS.md` is the canonical\nsource for your domain's invariants, stack, modules, and resilience\npolicies. The orchestrator gives *it* precedence over any persona\nagent body. Persona agents adapt to your rules; your rules don't\nadapt to personas.\n\nPack-owned sections of `AGENTS.md` are delimited by\n`<!-- pack-owned -->` markers and upgrade-replaced by `upgrade.py`.\nEverything outside those markers is yours — untouched by upgrades.\n\n### Is telemetry enabled by default? What does it collect?\n\nLocal telemetry is enabled by default. It records per-agent\ninvocation counts, session counts, and gate-allow / PROTOCOL-SKIP\ncounters to `.cursor/telemetry/agent-usage.json`. **Nothing is\nuploaded anywhere — it's a local file, gitignored, and readable in\nplain JSON.**\n\nDisable completely by setting `telemetry_enabled: false` in\n`.cursor/hooks/config.json`.\n\n### Why 186 agents? Isn't that too many?\n\nMost projects activate 10–20 specialists for their actual working\nroles. The other ~170 are available but invisible — filtered out by\nthe `domains × roles × tags` intersection during routing. A TON\nblockchain project never sees WeChat or Xiaohongshu marketing\nagents. A Web SaaS never sees Solidity or ZK specialists.\n\nThe size of the catalogue is an **asset**, not a cost — it means when\nyour project grows into a new role (adds marketing, adds support,\npivots to a new platform), the specialists are already curated and\nvetted. Install them on demand with:\n```bash\npython3 agents/scripts/install_extras.py --role marketing\n```\n\n### How do I add my own agent?\n\nSee [`agents/STYLE.md`](agents/STYLE.md) for the canonical persona\ntemplate and [`agents/SCHEMA.md`](agents/SCHEMA.md) for the\nfrontmatter contract. Create the file under the right category\ndirectory, run `python3 agents/scripts/lint_agents.py` to validate,\nregenerate the index (`build_index.py`) and manifest\n(`build_manifest.py`), and commit.\n\n### What's the license and who owns the code?\n\nMIT — [see LICENSE](LICENSE). Copyright © 2026 GammaLab.\nFree to use, modify, fork, and ship commercial products built on\ntop of.\n\n### I found a security issue. Where do I report it?\n\nOpen a **private security advisory** via the repository's Security\ntab — see [`SECURITY.md`](SECURITY.md). Do not open a public issue\nfor security-sensitive reports.\n\n---\n\n## Contributing\n\nHarmonist welcomes contributions that raise the bar:\n\n- **New agents** for domains not yet covered.\n- **Tighter enforcement** in the hooks.\n- **New integrations** for AI assistants we don't support yet.\n- **Documentation** that helps someone go from \"I just heard of this\"\n  to \"I integrated it into a real project\" faster.\n\nBefore opening a PR, read [`CONTRIBUTING.md`](CONTRIBUTING.md). For\nnon-trivial work, **open an issue first** to align on approach. Drive-\nby reformatting will be closed; content-driven PRs will be reviewed\nquickly.\n\n---\n\n## Security\n\n- Private vulnerability reports: see [`SECURITY.md`](SECURITY.md).\n- Supply-chain audit: run `python3 agents/scripts/check_pack_health.py`\n  after every `git pull`.\n- Community standards: [`CODE_OF_CONDUCT.md`](CODE_OF_CONDUCT.md).\n\n---\n\n## License\n\nHarmonist is released under the [MIT License](LICENSE) —\n**Copyright © 2026 GammaLab**. Free for commercial use, modification,\nand distribution.\n\n---\n\n## About GammaLab\n\n[**GammaLab**](https://gammalab.ae) is a technology company working on\nrobotics, artificial intelligence, and machine cognition. Harmonist\nis our first open-source release — a tool we built to enforce\nengineering discipline in AI-assisted development, and one we use\ndaily across our own internal projects.\n\nIf you ship production code with AI assistance and you care about\nmaking that code safe, auditable, and aligned with your project's\nactual rules — Harmonist is for you.\n\n- **Website:** [gammalab.ae](https://gammalab.ae)\n- **GitHub:** [@GammaLabTechnologies](https://github.com/GammaLabTechnologies)\n- **Contact:** Open an issue for public discussion; use the\n  repository's Security tab for private reports.\n\n---\n\n<div align=\"center\">\n\n**If Harmonist helps you ship safer AI-assisted code,\nstar the repository — it's the cheapest signal you can send\nthe maintainers that this work matters.** ⭐\n\nMade with engineering discipline by [GammaLab](https://gammalab.ae).\n\n</div>\n","summary":"Harmonist is an open‑source framework that orchestrates multiple AI coding assistants—such as Cursor, Claude, Copilot, and Aider—while enforcing project‑specific protocols mechanically, not by tactic prompts. It hooks into IDE actions to validate that every proposed code change meets rules like required reviews, memory updates, and supply‑chain checks, preventing a model from completing a turn that violates these constraints. The library ships with a catalog of 186 predefined agents, structured memory validation, and supply‑chain integrity tooling, all implemented with only Python’s standard library and no external services. It is ideal for developers and teams who need lightweight, auditable workflow governance on a local laptop without the overhead of enterprise runtimes.","description":"Portable AI agent orchestration with mechanical protocol enforcement. 186 agents, zero runtime dependencies.","stars":1253,"language":"Python"},{"owner":"russellromney","repo":"honker","url":"https://github.com/russellromney/honker","readme":"<h1 align=\"center\">\n  <img src=\"assets/honker-logo.png\" width=\"120\" alt=\"\" /><br/>honker\n</h1>\n\n`honker` is a SQLite extension + language bindings that add Postgres-style `NOTIFY`/`LISTEN` semantics to SQLite, with built-in durable pub/sub, task queue, and event streams, without client polling or a daemon/broker. Any language that can `SELECT load_extension('honker')` gets the same features.\n\nhonker ships as a [Rust crate](https://crates.io/crates/honker) (`honker`, plus `honker-core`/`honker-extension`), a [SQLite loadable extension](#sqlite-extension-any-sqlite-39-client), and language packages: Python (`honker`), Node (`@russellthehippo/honker-node`), Bun (`@russellthehippo/honker-bun`), Ruby (`honker`), Go, Elixir, C++, .NET / C#, and JVM / Kotlin packages. The on-disk layout is defined once in Rust; every binding is a thin wrapper around the loadable extension.\n\nSee [Binding support](BINDINGS.md) for the current truth table: which\nbindings have typed queue/stream/listen/scheduler APIs, which ones have\npackaged-install proof, and what CI actually proves.\n\n`honker` works by replacing application-level polling with a single-digit-µs `PRAGMA data_version` read on the database every 1ms, achieving push-like semantics and cross-process notifications with single-digit-millisecond delivery.\n\nSome bindings expose experimental watcher backends, such as mmap of\n`<db>-shm` in WAL mode or kernel file events. AUTO backend modes stay\nconservative and use `PRAGMA data_version`. The stable semantics stay\nthe same: wake on committed updates, ignore rolled-back work, and\nre-read SQLite state after every wake.\n\n> Experimental. API may change.\n\nSQLite is increasingly the database for shipped projects. Those inevitably require pubsub and a task queue. The usual answer is \"add Redis + Celery.\" That works, but it introduces a second datastore with its own backup story, a dual-write problem between your business table and the queue, and the operational overhead of running a broker.\n\nhonker takes the approach that if SQLite is the primary datastore, the queue should live in the same file. That means `INSERT INTO orders` and `queue.enqueue(...)` commit in the same transaction. Rollback drops both. The queue is just rows in a table with a partial index.\n\nPrior art:  [`pg_notify`](https://www.postgresql.org/docs/current/sql-notify.html) (fast triggers, no retry/visibility), [Huey](https://github.com/coleifer/huey) (SQLite-backed Python), [pg-boss](https://github.com/timgit/pg-boss) and [Oban](https://github.com/sorentwo/oban) (the Postgres-side gold standards we're chasing on SQLite). If you already run Postgres, use those, as they are excellent.\n\n## At a glance\n\n```python\nimport honker\n\ndb = honker.open(\"app.db\")\nemails = db.queue(\"emails\")\n\n# Enqueue\nemails.enqueue({\"to\": \"alice@example.com\"})\n\n# Consume (worker process)\nasync for job in emails.claim(\"worker-1\"):\n    send(job.payload)\n    job.ack()\n```\n\nAny enqueue can be atomic with a business write. Rollback drops both.\n\n```python\nwith db.transaction() as tx:\n    tx.execute(\"INSERT INTO orders (user_id) VALUES (?)\", [42])\n    emails.enqueue({\"to\": \"alice@example.com\"}, tx=tx)\n```\n\n## Features\n\nToday:\n\n- Notify/listen across processes on one `.db` file\n- Work queues with retries, priority, delayed jobs, and a dead-letter table\n- Any send can be atomic with your business write (commit together or roll back together)\n- Single-digit millisecond cross-process reaction time, no polling\n- Handler timeouts, declarative retries with exponential backoff\n- Delayed jobs, task expiration, named locks, rate-limiting\n- Time-trigger scheduling with a leader-elected scheduler:\n  5-field cron, 6-field cron, and `@every <n><unit>`. Schedules are\n  addressable rows you can `pause`, `resume`, `update`, `list`, and\n  `unschedule` from any process or binding.\n- Cancel a pending or in-flight job by id (`queue.cancel(id)`); read\n  any job's row via `queue.get_job(id)`.\n- Opt-in task result storage (`enqueue` returns an id, worker persists the\n  return value, caller awaits `queue.wait_result(id)`)\n- Durable streams with per-consumer offsets and configurable flush interval\n- SQLite loadable extension so any SQLite client can read the same tables\n- Bindings: Python, Node.js, Rust, Go, Ruby, Bun, Elixir, .NET / C#,\n  Java/JVM, and Kotlin\n- Works inside an ORM-owned SQLite connection. SQLAlchemy, SQLModel,\n  Django, Drizzle, Kysely, sqlx, GORM, ActiveRecord, Ecto, Hibernate,\n  jOOQ, MyBatis, Exposed ([guide](https://honker.dev/guides/orm/))\n\nDeliberately not built: task pipelines/chains/groups/chords, multi-writer replication, workflow orchestration with DAGs.\n\n## Quick start \n\n### Python: queue (durable at-least-once work)\n\n```bash\npip install honker\n```\n\n```python\nimport honker\ndb = honker.open(\"app.db\")\nemails = db.queue(\"emails\")\n\nwith db.transaction() as tx:\n    tx.execute(\"INSERT INTO orders (user_id) VALUES (?)\", [42])\n    emails.enqueue({\"to\": \"alice@example.com\"}, tx=tx)   # atomic with order\n\n# Then in a worker, do: \nasync for job in emails.claim(\"worker-1\"):               # wakes on updates or due deadlines\n    try:\n        send(job.payload); job.ack()\n    except Exception as e:\n        job.retry(delay_s=60, error=str(e))\n```\n\n`claim()` is an async iterator. Each iteration is one `claim_batch(worker_id, 1)`. Wakes on any database update, or when the next claim-relevant deadline arrives (`run_at` for delayed jobs, or `claim_expires_at` for reclaims). Falls back to a 5 s paranoia poll only if the update watcher can't fire. For batched work, call `claim_batch(worker_id, n)` explicitly and ack with `queue.ack_batch(ids, worker_id)`. Defaults: visibility 300 s.\n\n### Python: tasks (Huey-style decorators)\n\nIf you want a function call to turn into an enqueued job without wrapping `queue.enqueue` by hand:\n\n```python\n@emails.task(retries=3, timeout_s=30)\ndef send_email(to: str, subject: str) -> dict:\n    ...\n    return {\"sent_at\": time.time()}\n\n# Caller\nr = send_email(\"alice@example.com\", \"Hi\")   # enqueues, returns a TaskResult\nprint(r.get(timeout=10))                    # blocks until worker runs it\n```\n\nWorker side, either in-process or as its own process:\n\n```bash\npython -m honker worker myapp.tasks:db --queue=emails --concurrency=4\n```\n\nAuto-name is `{module}.{qualname}` (Huey/Celery convention). Explicit names with `@emails.task(name=\"...\")` are recommended in prod so renames don't orphan pending jobs. Periodic tasks use `@emails.periodic_task(crontab(\"0 3 * * *\"))`. Full details in [`packages/honker/examples/tasks.py`](packages/honker/examples/tasks.py).\n\n### Python: stream (durable pub/sub)\n\n```python\nstream = db.stream(\"user-events\")\n\nwith db.transaction() as tx:\n    tx.execute(\"UPDATE users SET name=? WHERE id=?\", [name, uid])\n    stream.publish({\"user_id\": uid, \"change\": \"name\"}, tx=tx)\n\nasync for event in stream.subscribe(consumer=\"dashboard\"):\n    await push_to_browser(event)\n```\n\nEach named consumer tracks its own offset in the `_honker_stream_consumers` table. `subscribe` replays rows past the saved offset, then transitions to live delivery on commit wake. The iterator auto-saves offset at most every 1000 events or every 1 second (whichever first) so a high-throughput stream doesn't hammer the single-writer slot. Override with `save_every_n=` / `save_every_s=`, or set both to 0 to disable auto-save and call `stream.save_offset(consumer, offset, tx=tx)` yourself (atomic with whatever you just did in that tx). At-least-once: a crash re-delivers in-flight events up to the last flushed offset.\n\n### Python: notify (ephemeral pub/sub)\n\n```python\nasync for n in db.listen(\"orders\"):\n    print(n.channel, n.payload)\n\nwith db.transaction() as tx:\n    tx.execute(\"INSERT INTO orders (id, total) VALUES (?, ?)\", [42, 99.99])\n    tx.notify(\"orders\", {\"id\": 42})\n```\n\nListeners attach at current `MAX(id)`; history is not replayed. Use `db.stream()` if you need durable replay. The notifications table is not auto-pruned. Call `db.prune_notifications(older_than_s=…, max_keep=…)` from a scheduled task. Task payloads have to be valid JSON so a Python writer and Node reader can share a channel.\n\n### Node.js\n\n```js\nconst { open } = require('@russellthehippo/honker-node');\nconst db = open('app.db');\n\n// Atomic: business write + notify commit together\nconst tx = db.transaction();\ntx.execute('INSERT INTO orders (id) VALUES (?)', [42]);\ntx.notify('orders', { id: 42 });\ntx.commit();\n\n// updateEvents wakes on any commit to the db.\nconst ev = db.updateEvents();\nlet lastSeen = 0;\nwhile (running) {\n  await ev.next();\n  const rows = db.query(\n    'SELECT id, payload FROM _honker_notifications WHERE id > ? ORDER BY id',\n    [lastSeen],\n  );\n  for (const row of rows) {\n    handle(JSON.parse(row.payload));\n    lastSeen = row.id;\n  }\n}\n```\n\nCurrent cross-language direct proof runs on every platform:\nPython -> Node wake through Node `updateEvents()`, and Node -> Python\nlistener wake through Python `listen()`.\n\n### Java / JVM\n\n```java\nimport dev.honker.*;\n\ntry (Database db = Honker.open(\"app.db\")) {\n    Queue emails = db.queue(\"emails\");\n    long id = emails.enqueue(\"{\\\"to\\\":\\\"alice@example.com\\\"}\");\n\n    Job job = emails.claimOne(\"worker-1\").orElseThrow();\n    sendEmail(job.payloadJson());\n    job.ack();\n\n    emails.saveResult(id, \"{\\\"ok\\\":true}\");\n    emails.waitResultAsync(id, WaitOptions.timeout(Duration.ofSeconds(10)))\n        .thenAccept(this::handleResult);\n}\n```\n\nThe JVM binding keeps JSON-library choice out of the core jar. Bring\nJackson, Gson, Moshi, JSON-B, or a hand-written mapper by implementing\n`JsonCodec<T>`:\n\n```java\nJsonCodec<Email> emailJson = new JsonCodec<>() {\n    public String encode(Email value) {\n        try {\n            return mapper.writeValueAsString(value);\n        } catch (Exception e) {\n            throw new RuntimeException(e);\n        }\n    }\n\n    public Email decode(String json) {\n        try {\n            return mapper.readValue(json, Email.class);\n        } catch (Exception e) {\n            throw new RuntimeException(e);\n        }\n    }\n};\n\ntry (Database db = Honker.open(\"app.db\")) {\n    TypedQueue<Email> emails = db.queue(\"emails\").typed(emailJson);\n    emails.enqueue(new Email(\"alice@example.com\"));\n\n    TypedJob<Email> job = emails.claimOne(\"worker-1\").orElseThrow();\n    sendEmail(job.payload());\n    job.ack();\n}\n```\n\nJava handles are `AutoCloseable`, and worker/listener/subscriber\noptions accept executors so application frameworks can own thread\npools and shutdown.\n\n### Kotlin\n\n```kotlin\nhonker(\"app.db\").use { db ->\n    val emails = db.queue(\"emails\")\n    emails.enqueueJson(\"\"\"{\"to\":\"alice@example.com\"}\"\"\")\n\n    emails.asFlow(\"worker-1\").collect { job ->\n        sendEmail(job.payloadJson())\n        job.ack()\n    }\n}\n```\n\nKotlin adds coroutine-friendly wrappers without duplicating the JVM\nruntime:\n\n```kotlin\ndb.listen(\"orders\")\n    .asFlow()\n    .collect { notification -> println(notification.payloadJson) }\n\ndb.stream(\"user-events\")\n    .asFlow()\n    .collect { event -> push(event.payloadJson) }\n\nval result = task.enqueueJson().await(Duration.ofSeconds(10))\n```\n\nTyped helpers use the same `JsonCodec<T>` seam:\n\n```kotlin\nval emailJson = object : JsonCodec<Email> {\n    override fun encode(value: Email) = mapper.writeValueAsString(value)\n    override fun decode(json: String) = mapper.readValue(json, Email::class.java)\n}\n\ndb.queue(\"emails\").enqueue(Email(\"alice@example.com\"), emailJson)\nval job = db.queue(\"emails\").asFlow(\"worker-1\").first()\nsendEmail(job.decode(emailJson))\njob.ack()\n```\n\n### SQLite extension (any SQLite 3.9+ client)\n\n```sql\n.load ./libhonker_ext\nSELECT honker_bootstrap();\nINSERT INTO _honker_live (queue, payload) VALUES ('emails', '{\"to\":\"alice\"}');\nSELECT honker_claim_batch('emails', 'worker-1', 32, 300);    -- JSON array\nSELECT honker_ack_batch('[1,2,3]', 'worker-1');              -- DELETEs; returns count\nSELECT honker_sweep_expired('emails');                       -- count moved to dead\nSELECT honker_lock_acquire('backup', 'me', 60);              -- 1 = got it, 0 = held\nSELECT honker_lock_release('backup', 'me');                  -- 1 = released\nSELECT honker_rate_limit_try('api', 10, 60);                 -- 1 = under, 0 = at limit\nSELECT honker_rate_limit_sweep(3600);                        -- drop windows >1h old\nSELECT honker_cron_next_after('0 3 * * *', unixepoch());     -- 5-field cron\nSELECT honker_cron_next_after('*/2 * * * * *', unixepoch()); -- 6-field cron\nSELECT honker_cron_next_after('@every 5s', unixepoch());     -- interval schedule\nSELECT honker_scheduler_register('nightly', 'backups',\n  '0 3 * * *', '\"go\"', 0, NULL);                         -- register periodic task\nSELECT honker_scheduler_register('fast', 'backups',\n  '@every 5s', '\"go\"', 0, NULL);                         -- interval schedule\nSELECT honker_scheduler_tick(unixepoch());                   -- JSON: fires due\nSELECT honker_scheduler_soonest();                           -- min next_fire_at\nSELECT honker_scheduler_unregister('nightly');               -- 1 = deleted\nSELECT honker_queue_next_claim_at('emails');                 -- next run_at / reclaim deadline\nSELECT honker_stream_publish('orders', 'k', '{\"id\":42}');    -- returns offset\nSELECT honker_stream_read_since('orders', 0, 1000);          -- JSON array\nSELECT honker_stream_save_offset('worker', 'orders', 42);    -- monotonic upsert\nSELECT honker_stream_get_offset('worker', 'orders');         -- offset or 0\nSELECT honker_result_save(42, '{\"ok\":true}', 3600);          -- save w/ 1h TTL\nSELECT honker_result_get(42);                                -- value or NULL\nSELECT honker_result_sweep();                                -- prune expired\nSELECT notify('orders', '{\"id\":42}');\n```\n\nThe extension shares `_honker_live`, `_honker_dead`, and `_honker_notifications` with the Python binding, so a Python worker can claim jobs any other language pushed via the extension. Schema compatibility is pinned by `tests/test_extension_interop.py`.\n\n## Design\n\nThis repo includes the `honker` SQLite loadable extension and bindings\nfor Python, Node, Rust, Go, Ruby, Bun, Elixir, C++, .NET / C#,\nJava/JVM, and Kotlin.\n\nFor most applications, [SQLite alone is sufficient](https://www.epicweb.dev/why-you-should-probably-be-using-sqlite). There are already great libraries that leverage SQLite for durable messaging. [Huey](https://github.com/coleifer/huey) is the one honker draws the most from. This project is inspired by it and seeks to do something similar across languages and frameworks by moving package logic into a SQLite extension.\n\nFor Postgres-backed apps, [`pg_notify`](https://www.postgresql.org/docs/current/sql-notify.html) + [pg-boss](https://github.com/timgit/pg-boss) or [Oban](https://hexdocs.pm/oban/) is the equivalent. This library is for apps where SQLite is the primary datastore.\n\nThe extension has three primitives that tie it together: ephemeral pub/sub (`notify()`), durable pub/sub with per-consumer offsets (`stream()`), at-least-once work queue (`queue()`). All three are INSERTs inside your transaction, which lets a task \"send\" be atomic with your business write, and rollback drops everything.\n\nThe explicit goal is to do `NOTIFY`/`LISTEN` semantics without application-level polling, to achieve single-digit ms reaction time. If you use your app's existing SQLite file containing business logic, it will notify workers on every commit to the database. This means that most triggers will not result in anything happening: instead, workers just read the message/queue with no result. This \"overtriggering\" is on purpose and is the tradeoff for push-like semantics and fast reaction time.\n\n### WAL is the recommended default\n\nThe language bindings default to `journal_mode = WAL` because it gives concurrent readers with one writer and efficient fsync batching (`wal_autocheckpoint = 10000`). Other journal modes (DELETE, TRUNCATE, MEMORY) still work. The wake path is `PRAGMA data_version`, which increments on every commit in every journal mode and is visible across processes. What you lose in non-WAL modes is WAL's concurrent-read-while-writing property; correctness and cross-process wake do not depend on WAL.\n\n- One `.db` is the entire system (plus `.db-wal` / `.db-shm` sidecars if you've opted into WAL). You get every benefit of SQLite (embedded, local, durable, snapshot-able) that your app already uses.\n- Claim is one `UPDATE … RETURNING` via a partial index; ack is one `DELETE`. One writer at a time no matter the journal mode; concurrent readers come with WAL.\n- We poll `PRAGMA data_version` every 1 ms to detect commits from any connection in any journal mode. The counter increments on every commit and on checkpoint, so WAL truncation, journal-file comings-and-goings, and exact-size collisions are all handled correctly.\n- SQLite has no wire protocol. Consumers must initiate reads; server-push is impossible. Wake signal = counter increment → `SELECT`.\n- Transactions are cheap, so jobs, events, and notifications are rows in the caller's open `with db.transaction()` block in an \"outbox\"-type pattern.\n- We use `PRAGMA data_version` instead of `stat(2)` on the WAL file or kernel watchers (`FSEvents`/`inotify`/`kqueue`). `data_version` is a monotonic counter incremented by SQLite on every commit by any connection: it handles WAL truncation, clock skew, and rolled-back transactions correctly. Kernel watchers drop same-process writes on macOS, and `stat(2)` on `(size, mtime)` misses commits when the WAL is truncated then grows back to the same size. `PRAGMA data_version` works identically on Linux/macOS/Windows at ~1 ms granularity for negligible CPU. Cost: ~3.5 µs per query, ~3.5 ms/sec total at 1 kHz.\n- Single machine, single writer. SQLite's locking is designed for a single host. Two servers writing one `.db` over NFS will corrupt it. Shard by file, or switch to Postgres.\n\n### In-memory databases are not supported\n\nHonker does not support SQLite in-memory database filenames such as `:memory:`, `file::memory:?cache=shared`, or `file:<name>?mode=memory&cache=shared`. Bare `:memory:` creates a separate database per connection, which would split Honker's writer, readers, and update watcher across different databases. SQLite's shared-memory URI forms can share state across multiple connections, but only inside one process, so they do not exercise Honker's cross-process worker/listener contract.\n\nFor tests and feature environments, use a temporary file-backed `.db`. It is still cheap and disposable, but it preserves the same SQLite locking, wake, crash/reopen, and multi-process semantics that Honker relies on in production.\n\n## Architecture\n\n### Wake path\n\n- One PRAGMA-poll thread per `Database`, queries `data_version` every 1 ms\n- Counter change → fan out a tick to each subscriber's bounded channel\n- Each subscriber runs `SELECT … WHERE id > last_seen` against a partial index, yields rows, returns to wait\n- 100 subscribers = 1 poll thread\n- Idle listeners run zero SQL queries\n\nIdle cost is a single `PRAGMA data_version` query per millisecond per database. Listener count scales for free because the wake signal is a SQLite counter read instead of a polling query.\n\n`SharedUpdateWatcher` (in `honker-core`) owns the poll thread and fans out to N subscribers via bounded `SyncSender<()>` channels keyed by subscriber id. Each `db.update_events()` call registers a subscriber and returns a handle whose `Drop` auto-unsubscribes, so a dropped listener causes the bridge thread's `rx.recv() -> Err` and exits cleanly.\n\n### Wake backend (advanced)\n\nPolling is the default. It's the only backend shipped in published wheels. Two opt-in alternatives exist behind Cargo features for source builds: kernel filesystem events, and an mmap read of SQLite's WAL index. Builds without the requested feature reject `kernel` / `shm` explicitly instead of silently substituting polling. Both experimental backends can give lower idle CPU or faster wakes, but they can also miss wakes or fire wakes you didn't ask for. All three watch for the database file being swapped under them; if that happens they shut down loudly — every subscriber sees an error from `update_events()` instead of hanging.\n\nBinding support is tracked in [BINDINGS.md](BINDINGS.md). All maintained\nbindings route blocking wake waits through the same `honker-core`\nwatcher, either in-process or through the shared extension ABI.\n\nOne thing changed for everyone, no opt-in needed: the polling backend now keeps its connection through transient `SQLITE_BUSY` / `SQLITE_LOCKED` errors during commits. Before, it would drop and reconnect, which could miss wakes on non-WAL journal modes (DELETE / TRUNCATE / PERSIST). Now it just retries the next tick.\n\nFull reference — when to pick which, source-build flags, recovery patterns, what we haven't tested yet — at [docs › Watcher backends](https://honker.dev/reference/watcher-backends/).\n\n### Queue schema\n\n- `_honker_live`: pending + processing rows\n- Partial index: `(queue, priority DESC, run_at, id) WHERE state IN ('pending','processing')`\n- Claim = one `UPDATE … RETURNING` via that index\n- Ack = one `DELETE`\n- Retry-exhausted → `_honker_dead` (never scanned by claim path)\n\nPartial-index on state means the claim hot path is bounded by the *working-set* size rather than the *history* size. A queue with 100k dead rows claims as fast as a queue with zero.\n\n### Claim iterator\n\n- `async for job in q.claim(id)` yields one job at a time via `claim_batch(id, 1)`\n- `Job.ack()` is one `DELETE` in its own transaction. Return is an honest bool: `True` iff the claim was still valid, `False` if the visibility window elapsed and another worker reclaimed.\n- Wakes on database update from any process, or when the next `run_at` /\n  reclaim deadline arrives; a 5 s paranoia poll is the only fallback.\n\nFor batched work, call `claim_batch(worker_id, n)` directly and ack with `queue.ack_batch(ids, worker_id)`. The library doesn't hide batching behind the iterator. The per-tx cost and the at-most-once visibility semantics are easier to reason about when the API doesn't try to be clever.\n\n### Transactional coupling\n\n- `notify()` is a SQL scalar function registered on the writer connection\n- INSERTs into `_honker_notifications` under the caller's open tx\n- `queue.enqueue(…, tx=tx)` and `stream.publish(…, tx=tx)` do the same\n- Rollback drops the job/event/notification with the rest of the tx\n\nThis is the transactional outbox pattern, by default, without a library to install. Business write and side-effect enqueue commit or roll back together. There is no separate dispatch table and no separate dispatcher process: the side-effect row *is* the committed row, and any process watching the db picks it up within ~1 ms.\n\n### Over-triggering quickly is better than over-triggering from polling\n\n- A `data_version` change wakes *every* subscriber on that `Database`, not just the ones whose channel committed\n- Each wasted wake = one indexed SELECT (microseconds)\n- A missed wake = a silent correctness bug\n\nThe library prefers waking ten listeners that don't care over missing one that does. Channel filtering happens in the `SELECT` path instead of the trigger notification. [Many small queries are efficient in SQLite](https://www.sqlite.org/np1queryprob.html).\n\n### Retention\n\n- Queue jobs persist until ack; retry-exhausted rows move to `_honker_dead`\n- Stream events persist; each named consumer tracks its own offset\n- Notify is fire-and-forget and not auto-pruned\n\nThe caller chooses retention per primitive. `db.prune_notifications(older_than_s=…, max_keep=…)` is a tool you invoke. This keeps retention policy visible in the caller's code instead of inherited from a library default.\n\n## Crash recovery\n\n- Rollback drops jobs/events/notifications with your business write (SQLite ACID).\n- SIGKILL mid-tx is safe. SQLite's atomic-commit rollback on next open leaves no stale state (WAL or rollback journal, depending on mode). Verified in `tests/test_crash_recovery.py` (subprocess killed pre-COMMIT, `PRAGMA integrity_check == 'ok'`, fresh notifies still flow).\n- If a worker crashes mid-job, the claim expires after `visibility_timeout_s` (default 300 s) and another worker reclaims. `attempts` increments. After `max_attempts` (default 3), the row moves to `_honker_dead`.\n- Listeners offline during a prune miss the pruned events. For durable replay, use `db.stream()`, which tracks per-consumer offsets.\n\n## Wiring into your web framework\n\nHonker ships no framework plugins. API is small and the integration is a few lines of glue:\n\n```python\n# FastAPI: enqueue in a request, run workers via lifespan.\n@app.on_event(\"startup\")\nasync def _start_workers():\n    async def worker_loop():\n        async for job in db.queue(\"emails\").claim(\"worker\"):\n            await honker._worker.run_task(\n                job, send_email, timeout=30, retries=3, backoff=2.0\n            )\n    app.state._worker = asyncio.create_task(worker_loop())\n\n@app.post(\"/orders\")\nasync def create_order(order: dict):\n    with db.transaction() as tx:\n        tx.execute(\"INSERT INTO orders (user_id) VALUES (?)\", [order[\"user_id\"]])\n        db.queue(\"emails\").enqueue({\"to\": order[\"email\"]}, tx=tx)\n    return {\"ok\": True}\n```\n\nSSE endpoints are ~30 lines of `async def stream(...): yield f\"data: ...\\n\\n\"` over `db.listen(channel)` or `db.stream(name).subscribe(...)`. For Django/Flask, run the worker as a dedicated CLI process (same pattern as Celery/RQ).\n\n### Using an ORM (SQLAlchemy, Django, Drizzle, Hibernate, jOOQ, Exposed, …)\n\nLoad `libhonker_ext` on your ORM's connection and call the SQL functions inside the ORM's own transaction. The enqueue commits atomically with your business write.\n\n```python\n# SQLAlchemy\n@event.listens_for(engine, \"connect\")\ndef _load_honker(conn, _):\n    conn.enable_load_extension(True)\n    conn.load_extension(\"/path/to/libhonker_ext\")\n    conn.execute(\"SELECT honker_bootstrap()\")\n\nwith Session(engine) as s, s.begin():\n    s.add(Order(user_id=42))\n    s.execute(text(\"SELECT honker_enqueue(:q, :p, NULL, NULL, 0, 3, NULL)\"),\n              {\"q\": \"emails\", \"p\": '{\"to\":\"alice@example.com\"}'})\n```\n\nFor JVM ORMs, use the ORM-owned JDBC connection inside the ORM\ntransaction. Configure sqlite-jdbc with extension loading enabled, load\nthe extension once per connection, then enqueue with SQL where the\nbusiness write happens.\n\n```java\n// Hibernate / JPA\nentityManager.unwrap(Session.class).doWork(conn -> {\n    try (PreparedStatement stmt = conn.prepareStatement(\n        \"SELECT honker_enqueue(?, ?, NULL, NULL, 0, 3, NULL)\"\n    )) {\n        stmt.setString(1, \"emails\");\n        stmt.setString(2, \"{\\\"to\\\":\\\"alice@example.com\\\"}\");\n        stmt.executeQuery().close();\n    }\n});\n```\n\n```kotlin\n// jOOQ\nctx.transaction { cfg ->\n    val tx = DSL.using(cfg)\n    tx.insertInto(ORDERS).set(ORDERS.USER_ID, 42).execute()\n    tx.fetchValue(\n        \"SELECT honker_enqueue(?, ?, NULL, NULL, 0, 3, NULL)\",\n        \"emails\",\n        \"\"\"{\"to\":\"alice@example.com\"}\"\"\",\n    )\n}\n```\n\n```kotlin\n// Exposed\ntransaction {\n    Orders.insert { it[userId] = 42 }\n    exec(\n        \"SELECT honker_enqueue('emails', '{\\\"to\\\":\\\"alice@example.com\\\"}', NULL, NULL, 0, 3, NULL)\"\n    )\n}\n```\n\nWorkers run as a separate process using `honker.open(\"app.db\")` or\n`Honker.open(\"app.db\")`. The commit watcher wakes on commits from any\nconnection to the file. See [Using with an ORM](https://honker.dev/guides/orm/)\nfor Django, SQLModel, Drizzle, Kysely, sqlx, GORM, ActiveRecord, Ecto,\na typed-payload `TypedQueue[T]` wrapper pattern for SQLModel/Pydantic,\nand the Prisma caveat.\n\n## Performance\n\nHandles thousands of messages per second on a modern laptop, with cross-process wake latency bounded by the 1 ms poll cadence (~1–2 ms median on M-series). Run `bench/wake_latency_bench.py` and `bench/real_bench.py` to measure on your hardware.\n\n## Development\n\nLayout:\n\n```\nhonker-core/              # Rust rlib shared across all bindings (in-tree, published on crates.io)\nhonker-extension/         # SQLite loadable extension (cdylib, published on crates.io)\npackages/\n  honker/                 # Python package (PyO3 cdylib + Queue/Stream/Outbox/Scheduler)\n  honker-node/            # napi-rs Node.js binding\n  honker-rs/              # ergonomic Rust wrapper\n  honker-go/              # Go binding\n  honker-ruby/            # Ruby binding\n  honker-bun/             # Bun binding\n  honker-ex/              # Elixir binding\n  honker-cpp/             # C++ binding\n  honker-dotnet/          # .NET / C# binding\n  honker-jvm/             # JVM / Java-compatible binding\n  honker-kotlin/          # Kotlin convenience wrapper\ntests/                    # integration tests (cross-package)\nbench/                    # benches\nsite/                     # honker.dev (Astro)                [git submodule]\n```\n\nThe maintained language bindings live in-tree so one feature can update\ncore behavior, docs, tests, and binding surfaces together. The core\nengine is still Rust (`honker-core` + `honker-extension`); the language\npackages are first-class wrappers published independently to their\necosystems. `site/` remains a separate docs-site submodule.\n\n```bash\nmake test                   # default: rust + python + node (fast, ~10s)\nmake test-python-slow       # soak + real-time cron tests (~2 min)\nmake test-jvm               # JVM binding tests\nmake test-kotlin            # JVM + Kotlin wrapper tests\nmake test-jvm-consumer       # clean Maven consumer + packaged native proof\nmake test-all               # everything including slow marks\n\nmake build                  # PyO3 maturin develop + loadable extension\n\npython bench/wake_latency_bench.py --samples 500\npython bench/real_bench.py --workers 4 --enqueuers 2 --seconds 15\npython bench/ext_bench.py\n```\n\n### Coverage\n\nOne-time: `make install-coverage-deps` (installs `coverage.py` + `cargo-llvm-cov`).\n\n```bash\nmake coverage               # both HTML reports into coverage/\nmake coverage-python        # honker python paths\nmake coverage-rust          # honker-core Rust unit tests\n```\n\nPython coverage reflects the full honker test suite (~92% of `packages/honker/`). Rust coverage reflects only `cargo test`. Many `honker_ops.rs` paths (`honker_enqueue`, `honker_claim_batch`, etc.) are only exercised via the Python test suite and won't show up in the Rust report. Combined cross-language coverage is non-trivial (LLVM profile-data merging across PyO3 boundaries) and is deferred.\n\n## License\n\nApache 2.0. See [LICENSE](LICENSE).\n","summary":"**Summary**\n\nhonker extends SQLite with durable pub/sub and task‑queue semantics similar to PostgreSQL’s `NOTIFY`/`LISTEN`, allowing any process that can load the extension to publish and consume events atomically with ordinary database writes. It supports notifications across processes within a single file, a feature‑rich queue with retries, priorities, delays, dead‑letter handling, and a leader‑elected scheduler with cron syntax, all delivered in single‑digit millisecond latency without polling. The project is wrapped in a Rust core and offers bindings for Python, Node, Ruby, Go, Elixir, C++, .NET, and Kotlin, making it ideal for developers who ship applications using SQLite and need an internal, single‑datastore task queue or event system without adding Redis or another broker.","description":"SQLite extension + bindings for Postgres NOTIFY/LISTEN semantics with durable queues, streams, pub/sub, and scheduler","stars":978,"language":"Python"},{"owner":"thClaws","repo":"thClaws","url":"https://github.com/thClaws/thClaws","readme":"# thClaws 🦞\n\n> **Open-source Agent Harness Platform** — a native AI agent workspace that codes, automates, remembers, and coordinates. Runs on your own machine. Sovereign by design.\n\nthClaws is a **native-Rust AI agent workspace** that runs locally on your machine. Not just coding — it edits code, automates workflows, searches your knowledge bases, and coordinates teams of agents, all in one binary. You tell it what you want in natural language; it reads your files, runs commands, uses tools, and talks back to you while it works.\n\n[![License: MIT OR Apache-2.0](https://img.shields.io/badge/license-MIT%20OR%20Apache--2.0-blue.svg)](#license)\n[![Platform: macOS · Windows · Linux](https://img.shields.io/badge/platform-macOS%20·%20Windows%20·%20Linux-lightgrey.svg)](#installation)\n[![Built with Rust](https://img.shields.io/badge/built%20with-Rust-orange.svg)](https://www.rust-lang.org/)\n\n---\n\n## See it work\n\nThree tabs, one binary — captured from a live thClaws session looking at its own source.\n\n<table>\n  <tr>\n    <td width=\"33%\" align=\"center\">\n      <a href=\"docs/img/screen-files.webp\"><img src=\"docs/img/screen-files.webp\" alt=\"thClaws Files tab — landing-page source open in the editor with file tree\" /></a><br/>\n      <strong>Files</strong><br/>\n      <sub>preview · edit · browse — codemirror + tiptap</sub>\n    </td>\n    <td width=\"33%\" align=\"center\">\n      <a href=\"docs/img/screen-terminal.webp\"><img src=\"docs/img/screen-terminal.webp\" alt=\"thClaws Terminal tab — REPL session with ASCII banner\" /></a><br/>\n      <strong>Terminal</strong><br/>\n      <sub>raw REPL · slash commands · ANSI tool output</sub>\n    </td>\n    <td width=\"33%\" align=\"center\">\n      <a href=\"docs/img/screen-chat.webp\"><img src=\"docs/img/screen-chat.webp\" alt=\"thClaws Chat tab — conversational interface answering a product question\" /></a><br/>\n      <strong>Chat</strong><br/>\n      <sub>conversational · markdown render · tool indicators</sub>\n    </td>\n  </tr>\n</table>\n\n---\n\n## Three interfaces, one binary\n\n- **Desktop GUI** (`thclaws`) — a native window with Terminal, Chat, Files, and optional Team tabs.\n- **CLI REPL** (`thclaws --cli`) — an interactive terminal prompt for SSH, headless servers, or when you want zero GUI overhead.\n- **Non-interactive mode** (`thclaws -p \"prompt\"`) — runs a single turn and exits. Handy for scripts, CI pipelines, and shell one-liners.\n\n---\n\n## What makes it different\n\n- **Multi-provider.** Anthropic, OpenAI, Gemini, Alibaba DashScope, OpenRouter, Ollama (local and Anthropic-compatible), Agentic Press, plus a generic **OpenAI-compatible** slot (`oai/*`) for LiteLLM / Portkey / Helicone / vLLM / internal proxies — auto-detected by model name prefix. Switch mid-session with `/model` or swap the whole provider with `/provider`.\n\n- **Any knowledge worker, not just engineers.** Chat tab for researchers, PMs, ops, legal, marketing, finance — natural-language prompts, file access, knowledge-base lookup, drafting. Terminal tab for engineers who want the raw REPL. Same engine, same sessions, same config — different preferred surface.\n\n- **Open standards, not a walled garden.** Built on the conventions the agent-tooling industry is converging on, not bespoke formats you have to learn only for us. [Model Context Protocol](https://modelcontextprotocol.io/) for tool servers. [`AGENTS.md`](https://agents.md) for project instructions — the vendor-neutral standard adopted by Google, OpenAI, Factory, Sourcegraph, and Cursor. `SKILL.md` with YAML frontmatter for packaged workflows. Your configuration is portable between thClaws, other agents that speak the same standards, and whatever comes next.\n\n- **Skills.** Reusable expert workflows packaged as a directory with `SKILL.md` plus optional scripts. The agent picks the right skill automatically when a request matches the `whenToUse` trigger, or you can invoke one explicitly as `/<skill-name>`. Install from a git URL or `.zip` archive with `/skill install`.\n\n- **MCP servers.** Plug in tools built by third parties — GitHub, filesystems, databases, browsers, Slack, and more. Both stdio and HTTP Streamable transports, with OAuth 2.1 + PKCE for protected servers. Add one with `/mcp add` or ship a `.mcp.json` in your project.\n\n- **Plugin system.** Skills + commands + agent definitions + MCP servers bundled under a single manifest, installable from git or `.zip`. One install, one uninstall, one version to pin — ideal for sharing a team's extensions.\n\n- **Memory & project instructions.** Drop an `AGENTS.md` (or `CLAUDE.md`) in your repo — thClaws walks up from `cwd` and injects every match into the system prompt. A persistent memory store holds longer-lived facts the agent has learned about you, classified as `user` / `feedback` / `project` / `reference` and stored as markdown you can read, edit, or commit.\n\n- **Knowledge bases (KMS).** Per-project and per-user wikis the agent can search and read on demand. Drop markdown pages under `.thclaws/kms/<name>/pages/`, give each a one-line entry in `index.md`, and the agent gets a table of contents every turn plus `KmsRead` / `KmsSearch` tools. No embeddings — grep + read, following Andrej Karpathy's LLM-wiki pattern.\n\n- **Agent orchestration.** Delegate subtasks to isolated sub-agents via the `Task` tool — each gets its own tool registry and can recurse up to 3 levels deep. Scale further with **Agent Teams**: multiple thClaws processes coordinating through a shared mailbox and task queue, each in its own tmux pane and optional git worktree. One agent writes your backend while a teammate builds the frontend in parallel, lead merges the branches when both are done.\n\n- **Settings as one file.** Every knob — permission mode, thinking budget, allowed/disallowed tools, provider endpoints, KMS attachments — lives in `.thclaws/settings.json` (project) or `~/.config/thclaws/settings.json` (user). API keys go in the OS keychain by default (macOS Keychain / Windows Credential Manager / Linux Secret Service) with `.env` fallback for CI.\n\n- **Safety first.** A filesystem sandbox scopes file tools to the working directory. Destructive shell commands are flagged before execution. You approve every mutating tool call unless you've opted into auto-approve.\n\n- **Offline-capable.** Ollama (native and Anthropic-compatible) lets you run entirely against a local model — no cloud round-trip, no API key.\n\n- **Deploy what you build.** Ship the landing pages, web apps, APIs, and AI agents you create through [Agentic Press Hosting](https://agentic-press.com) (partnered with SIS Cloud Service and Artech.Cloud) — or any other host you prefer. Schedule agents on cron, respond to webhooks, stream from public URLs. The deploy flow ships as a plugin (`/plugin install …-deploy`), so hosts are swappable; the client never locks you in.\n\n- **Shell escape.** Prefix any REPL line with `!` to run a shell command directly — no tokens, no approval prompt, no agent round-trip (`! git status`, `! ls`, etc.).\n\n---\n\n## Installation\n\n### Pre-built binaries\n\nDownload the latest release for your platform from the [Releases page](https://github.com/thClaws/thClaws/releases) or from [thclaws.ai/downloads](https://thclaws.ai/downloads.html).\n\nSupported: macOS (Apple Silicon & Intel), Windows (x86_64 & ARM64), Linux (x86_64 & ARM64).\n\n#### Linux runtime dependencies\n\nThe Linux GUI binary links against the Wayland and webkit2gtk client libraries at runtime. Most desktop distros (Ubuntu Desktop, Fedora Workstation, etc.) ship them by default. **Headless servers** (cloud VMs, AWS EC2, Docker images without a display) typically don't — `thclaws` will fail at startup with `error while loading shared libraries: libwayland-client.so.0`.\n\nTwo options on a headless box:\n\n**(a) Use CLI mode** — no GUI deps required:\n\n```sh\nthclaws --cli                       # interactive REPL\nthclaws -p \"what does src/main.rs do?\"  # one-shot\n```\n\n**(b) Install the GUI deps** — only if you actually want to run the webview:\n\n```sh\n# Debian / Ubuntu\nsudo apt install libwayland-client0 libwebkit2gtk-4.1-0 libsoup-3.0-0\n\n# Fedora / RHEL\nsudo dnf install wayland libsoup3 webkit2gtk4.1\n```\n\n### Build from source\n\n**Prerequisites:** Rust 1.85+, Node.js 20+, pnpm 9+.\n\n```sh\ngit clone https://github.com/thClaws/thClaws.git\ncd thClaws\n\n# Build frontend (React + Vite, bundled as a single HTML file)\ncd frontend && pnpm install && pnpm build && cd ..\n\n# Build Rust (CLI + GUI)\ncargo build --release --features gui --bin thclaws\n\n# Run\n./target/release/thclaws          # GUI\n./target/release/thclaws --cli    # CLI\n./target/release/thclaws -p \"what does src/main.rs do?\"  # one-shot\n```\n\n---\n\n## Quick start\n\n```sh\n# First run: pick a secrets backend (OS keychain or .env) when prompted\nthclaws\n\n# Configure a provider (inside the REPL)\n❯ /provider anthropic\n❯ /model claude-sonnet-4-6\n\n# Or try OpenRouter for 300+ models via one key\n❯ /provider openrouter\n❯ /model openrouter/anthropic/claude-sonnet-4-6\n\n# Drop an AGENTS.md or CLAUDE.md in your repo — it's read automatically\n\n# Useful slash commands\n❯ /help         # list everything\n❯ /models       # list available models for the current provider\n❯ /kms          # list attached knowledge bases\n❯ /skill install https://github.com/anthropics/skills.git\n❯ /mcp add github https://mcp.github.com\n❯ ! git status  # shell escape\n```\n\n---\n\n## Configuration\n\nthClaws reads settings in this precedence order (higher wins):\n\n1. CLI flags\n2. `.thclaws/settings.json` (project)\n3. `~/.config/thclaws/settings.json` (user)\n4. `~/.claude/settings.json` (fallback location)\n5. Compiled-in defaults\n\nOpen-standard files are honored directly:\n\n- `CLAUDE.md` / `AGENTS.md` — system prompt additions, walked up from `cwd`\n- `.thclaws/skills/` / `.claude/skills/` — skill catalog\n- `.thclaws/agents/` / `.claude/agents/` — subagent definitions\n- `.mcp.json` / `.thclaws/mcp.json` — MCP server configuration\n- `.thclaws-plugin/plugin.json` / `.claude-plugin/plugin.json` — plugin manifest\n\nAPI keys are **never stored in config files** — only in the OS keychain (default) or `.env`.\n\n---\n\n## Documentation\n\n- **Official site** — [thclaws.ai](https://thclaws.ai)\n- **Full user manual** — [thclaws.ai/manual](https://thclaws.ai/manual) *(soon)* or the [`user-manual/`](https://github.com/thClaws/user-manual) companion repo. 24 chapters covering every feature plus 7 walkthrough case studies (static site deploy, Node.js reservation site, news-aggregation agent, etc.).\n- [Contributing](CONTRIBUTING.md) — dev setup, PR flow, commit style\n- [Changelog](CHANGELOG.md) — version history\n- [Code of Conduct](CODE_OF_CONDUCT.md) — Contributor Covenant 2.1\n- [Security](SECURITY.md) — vulnerability disclosure\n\nFor books, training, and commercial deployment, see [agentic-press.com](https://agentic-press.com).\n\n---\n\n## License\n\nDual-licensed under either:\n\n- [MIT License](LICENSE-MIT)\n- [Apache License 2.0](LICENSE-APACHE)\n\nat your option. Contributions are accepted under the same dual license.\n\n---\n\n## About\n\nthClaws is developed by **ThaiGPT Co., Ltd.** and published under a dual MIT/Apache-2.0 license. The client is free and open source forever. Enterprise Edition, hosting, and support are commercial offerings — see [agentic-press.com](https://agentic-press.com) or contact [jimmy@thaigpt.com](mailto:jimmy@thaigpt.com).\n\nBuilt in Thailand. Meant for the world.\n","summary":"thClaws is a native‑Rust AI agent platform that runs locally on macOS, Windows, and Linux, allowing users to code, edit files, automate workflows, and coordinate teams of agents from a single binary. It offers a desktop GUI, an interactive REPL, and a non‑interactive mode, and supports multiple LLM providers (Anthropic, OpenAI, Gemini, Ollama, and more) along with an open‑AI‑compatible slot, while adhering to industry‑wide standards like Model Context Protocol and AGENTS.md. Users can extend the agent with reusable “skills” packaged in simple directories, automatically invoked by triggers or manually by command. The tool is useful for developers, researchers, product managers, legal and marketing professionals, and any knowledge worker who wants a sovereign, plug‑in‑friendly AI workspace that combines chat, terminal, and file editing.","description":"Open-source agent harness platform. Native Rust, multi-provider, runs on your own machine. Sovereign by design.","stars":734,"language":"Rust"},{"owner":"alash3al","repo":"stash","url":"https://github.com/alash3al/stash","readme":"# Stash\n\n**Your AI has amnesia. We fixed it.**\n\nEvery LLM starts every conversation from zero. Stash gives your agent persistent memory — it remembers, recalls, consolidates, and learns across sessions. No more explaining yourself from scratch.\n\nOpen source. Self-hosted. Works with any MCP-compatible agent.\n\n## Quick Start\n\n```bash\ngit clone https://github.com/alash3al/stash.git\ncd stash\ncp .env.example .env   # edit with your API key + model\ndocker compose up\n```\n\nThat's it. Postgres + pgvector, migrations, MCP server with background consolidation — all in one command.\n\n## MCP Client Setup\n\nAfter `docker compose up`, Stash exposes an MCP server over SSE at:\n\n```\nhttp://localhost:8080/sse\n```\n\nPoint any MCP-compatible client at that URL. Example configs:\n\n**Cursor** — `~/.cursor/mcp.json`\n```json\n{\n  \"mcpServers\": {\n    \"stash\": {\n      \"url\": \"http://localhost:8080/sse\"\n    }\n  }\n}\n```\n\n**Claude Desktop** — `claude_desktop_config.json`\n```json\n{\n  \"mcpServers\": {\n    \"stash\": {\n      \"url\": \"http://localhost:8080/sse\"\n    }\n  }\n}\n```\n\n**OpenCode** — `~/.config/opencode/config.json`\n```json\n{\n  \"mcp\": {\n    \"stash\": {\n      \"type\": \"remote\",\n      \"url\": \"http://localhost:8080/sse\",\n      \"enabled\": true\n    }\n  }\n}\n```\n\n**Windsurf** — `~/.codeium/windsurf/mcp_config.json`\n```json\n{\n  \"mcpServers\": {\n    \"stash\": {\n      \"url\": \"http://localhost:8080/sse\"\n    }\n  }\n}\n```\n\nWorks with any agent that supports MCP over SSE — Claude Desktop, Cursor, Windsurf, Cline, Continue, OpenAI Agents, Ollama, OpenRouter, and more.\n\n## What It Does\n\nStash is a cognitive layer between your AI agent and the world. Episodes become facts. Facts become relationships. Relationships become patterns. Patterns become wisdom.\n\nAn 8-stage consolidation pipeline turns raw observations into structured knowledge — facts, relationships, causal links, goal tracking, failure patterns, hypothesis verification, and confidence decay. Each stage only processes new data since the last run.\n\n## Learn More\n\n**[alash3al.github.io/stash →](https://alash3al.github.io/stash/)**\n\n## License\n\nApache 2.0\n","summary":"Stash gives large language‑model agents persistent memory by remembering, recalling, consolidating, and learning across sessions, turning raw observations into structured facts, relationships, and patterns. It runs as a self‑hosted MCP server that supports any agent using MCP over SSE, with a Postgres+pgvector backend, Docker‑compose setup, and an eight‑stage consolidation pipeline that adds causal links, goal tracking, failure patterns, hypothesis checks, and confidence decay. The system is ideal for developers and enterprises building or extending chat‑based assistants, code generation tools, or analytics agents that need to maintain context without starting from scratch each session.","description":"Stash — persistent memory layer for AI agents. Episodes, facts, and working context stored in Postgres. MCP server included. Self-hosted, single binary, no cloud required.","stars":642,"language":"Go"},{"owner":"chekusu","repo":"wanman","url":"https://github.com/chekusu/wanman","readme":"# wanman\n\n**English** | [中文](README.zh.md) | [日本語](README.ja.md)\n\nAgent Matrix framework — run a supervised network of Claude Code or Codex agents that collaborate on your machine.\n\nwanman is an open-source local-mode agent matrix framework. Runs a supervised network of Claude Code or Codex agents on your machine, coordinated through a JSON-RPC supervisor.\n\n## About wanman\n\nThe name wanman comes from the Japanese [ワンマン電車 / one-man train](https://en.wikipedia.org/wiki/One-person_operation): a train operated by one driver without a conductor. wanman's design goal is similar in spirit: the human user steps back into an observer role and watches the agent matrix run automatically from every angle.\n\n[wanman.ai](https://wanman.ai/) provides the fully automated 24/7 sandbox edition of wanman, running for free on [Sandbank Cloud](https://cloud.sandbank.dev/)'s sandbox cloud.\n\n## What it does\n\n- Coordinates multiple agents (CEO, dev, devops, marketing, feedback, etc.) through an async message bus with steer/follow-up priorities.\n- Runs each agent as a real Claude Code or Codex CLI subprocess — you bring your own CLI auth, wanman orchestrates spawning, prompting, and lifecycle.\n- Isolates every agent in a per-agent worktree and per-agent `$HOME`, so agents never mutate your dirty checkout or shell profile.\n- Is CLI-first: everything is scriptable, observable, and reproducible through `wanman` commands and a JSON-RPC supervisor.\n\n[wanman.ai](https://wanman.ai/) adds hosted-only capabilities:\n- Isolates each agent runtime group in its own sandbox environment, supporting large-scale, high-concurrency task execution.\n- Dynamically configures agent roles, including automatically extracting roles from high-quality agent role catalogs on the internet.\n- Supports dynamic skill self-evolution.\n- Supports db9-powered global search and story retrieval.\n\n## Quickstart\n\n```bash\n# Prerequisites: Node 20+, pnpm 9+, git, a logged-in Claude Code or Codex CLI.\ngit clone git@github.com:chekusu/wanman.git wanman.dev\ncd wanman.dev\npnpm install\npnpm build\n\n# Run from source; no npm package publish is required.\npnpm --filter @wanman/cli exec wanman takeover /path/to/any/git/repo\n```\n\nIf you want a single-file CLI bundle instead:\n\n```bash\npnpm --filter @wanman/cli standalone\nnode packages/cli/dist/wanman.mjs takeover /path/to/any/git/repo\n```\n\nIf `wanman` is already on your `PATH`, you can also run `wanman takeover .` from inside the target repository.\n\nSee [`docs/quickstart.md`](docs/quickstart.md) for the full walkthrough.\n\n## CLI commands\n\n| Command | What it does |\n|---------|--------------|\n| `wanman send <agent> <msg>` | Send a message to an agent (`--steer` interrupts the target). |\n| `wanman recv [--agent <name>]` | Receive and mark pending messages as delivered. |\n| `wanman agents` | List registered agents and their current states. |\n| `wanman context get` / `context set` | Read or write shared key/value context. |\n| `wanman escalate <msg>` | Escalate to the CEO agent. |\n| `wanman task …` | Manage the task pool: `create`, `list`, `get`, `update`, `done`. Supports `--after` dependencies. |\n| `wanman initiative …` | Manage long-lived initiatives: `create`, `list`, `get`, `update`. |\n| `wanman capsule …` | Manage change capsules: `create`, `list`, `mine`, `get`, `update`. |\n| `wanman artifact …` | Store and retrieve structured artifacts: `put`, `list`, `get`. |\n| `wanman hypothesis …` | Track hypotheses with status transitions: `create`, `list`, `update`. |\n| `wanman watch` | Live-stream supervisor and agent activity. |\n| `wanman run <goal>` | Start a matrix against a one-shot goal. |\n| `wanman takeover <path>` | Take over an existing git repo with the full agent matrix. |\n| `wanman skill:check [path]` | Validate that skill docs reference only real CLI commands. |\n\nRun `wanman --help` for the full, current list.\n\n## Architecture\n\n```\n+----------------+          +--------------------+          +-----------------+\n|  wanman CLI    |  JSON    |  Supervisor        |  spawn   |  Agent process  |\n|  (host shell)  | ---RPC-->|  (local process)   | -------> |  (Claude/Codex) |\n|                |  /rpc    |  message/context/  |          |  per-agent $HOME|\n|                |          |  task/artifact     |          |  per-agent wt   |\n+----------------+          +--------------------+          +-----------------+\n                                    |                              |\n                                    v                              v\n                           +--------------------+        +-----------------+\n                           |  files + SQLite    |        |  worktree       |\n                           +--------------------+        +-----------------+\n```\n\n- `wanman <subcommand>` speaks JSON-RPC 2.0 to a Supervisor process.\n- The Supervisor owns the message store, context store, task pool, artifact store, and spawns one child process per agent.\n- Each agent child is a local Claude Code or Codex subprocess bound to a per-agent worktree and isolated `$HOME`.\n\nDeep dive: [`docs/architecture.md`](docs/architecture.md).\n\n## Configuration\n\n| Env var | Meaning |\n|---------|---------|\n| `WANMAN_URL` | Supervisor HTTP URL for the CLI (default `http://localhost:3120`). |\n| `WANMAN_AGENT_NAME` | Identifies the current agent; used as default sender/receiver inside agent processes. |\n| `WANMAN_RUNTIME` | `claude` (default) or `codex` — selects the per-agent CLI adapter. |\n| `WANMAN_MODEL`, `WANMAN_CODEX_MODEL`, `WANMAN_CODEX_REASONING_EFFORT` | Per-runtime model overrides. |\n| `WANMAN_CODEX_FAST` | When set, biases the Codex adapter toward lower-latency defaults. |\n| `WANMAN_SKILL_SNAPSHOTS_DIR` | Override where the runtime materializes skill-activation snapshots (default: sibling of the shared-skills dir, falling back to `$TMPDIR/wanman-skill-snapshots`). |\n\nAn optional `@sandbank.dev/db9` brain adapter can be attached for cross-run memory — see [`docs/architecture.md`](docs/architecture.md#brain--persistence).\n\n## Agent configs\n\nAgent definitions live in a single JSON file:\n\n```json\n{\n  \"agents\": [\n    { \"name\": \"echo\", \"lifecycle\": \"24/7\", \"model\": \"standard\", \"systemPrompt\": \"...\" },\n    { \"name\": \"ping\", \"lifecycle\": \"on-demand\", \"model\": \"standard\", \"systemPrompt\": \"...\" }\n  ],\n  \"dbPath\": \".wanman/wanman.db\",\n  \"port\": 3120,\n  \"workspaceRoot\": \".wanman/agents\"\n}\n```\n\nEach agent entry has:\n- `name` — unique identifier used on the message bus.\n- `lifecycle` — `24/7` (continuous respawn loop), `on-demand` (idle until triggered), or `idle_cached` (idle until triggered, but the prior Claude `session_id` is preserved across triggers via `claude --resume` so context survives idle periods). **`idle_cached` is Claude-only**: pairing it with `runtime: codex` (or `WANMAN_RUNTIME=codex`) is rejected at startup since Codex has no equivalent resume mechanism in this runtime.\n- `model` — usually an abstract tier (`high` or `standard`); the runtime adapter maps it to Claude or Codex defaults, with environment overrides available.\n- `systemPrompt` — baked-in persona/mission; agents also auto-discover shared skill files at `~/.claude/skills/`.\n- Optional `cron`, `events`, and `tools` fields — see the architecture doc for the full schema.\n\n## Testing\n\n```bash\npnpm typecheck\npnpm test\npnpm exec vitest run --coverage --coverage.reporter=text-summary --coverage.reporter=json-summary --coverage.exclude='**/dist/**'\n```\n\nThe current coverage target is at least 90% line coverage. The latest verified local run reports `Lines: 90.17%`; the machine-readable summary is written to `coverage/coverage-summary.json`.\n\n## Project structure\n\n```\nwanman.dev/\n  packages/\n    cli/                 wanman CLI (send/recv/task/artifact/run/takeover/...)\n    core/                Shared types, JSON-RPC protocol, skills (core/skills/)\n    host-sdk/            Host-side SDK for embedding wanman into other tools\n    runtime/             Supervisor, agent process manager, SQLite stores, adapters\n  docs/                  Architecture and quickstart guides\n```\n\nShared skills shipped today (`packages/core/skills/`):\n- `artifact-naming`, `artifact-quality` — conventions for agent-produced artifacts.\n- `cross-validation` — CEO consistency checks across agent outputs.\n- `research-methodology` — market/data research methodology.\n- `wanman-cli` — CLI command reference consumed by agents at runtime.\n- `workspace-conventions` — file-system conventions inside agent workspaces.\n\n## Further reading\n\n- [Quickstart](docs/quickstart.md) — first-run walkthrough against any git repo.\n- [Architecture](docs/architecture.md) — agent lifecycle, JSON-RPC, stores, adapters.\n- [Contributing](CONTRIBUTING.md) — tests, typecheck, commit conventions.\n\n## License\n\nApache-2.0 — see [LICENSE](LICENSE).\n","summary":"wanman is an open‑source, local‑mode framework that orchestrates a supervised network of Claude Code or Codex agents on your own machine. It coordinates roles such as CEO, developer, dev‑ops and marketing through an async JSON‑RPC message bus, spawning each agent in its own isolated worktree and `$HOME` so the host remains untouched. The CLI‑first design lets users script, observe, and reproduce all interactions, while built‑in features like goal execution, task and initiative management, and artifact storage give a full workflow engine. Developers, AI researchers, and teams looking to run autonomous, role‑based agent collaborations without cloud dependence will benefit most from wanman.","description":"wanman is an open-source agent matrix runtime inspired by Japanese one-man trains. It lets human users step back into an observer role while local agent runtimes coordinate autonomous multi-agent workflows, task execution, and artifacts.","stars":501,"language":"TypeScript"},{"owner":"deepseek-ai","repo":"TileKernels","url":"https://github.com/deepseek-ai/TileKernels","readme":"# Tile Kernels\n\nOptimized GPU kernels for LLM operations, built with [TileLang](https://github.com/tile-ai/tilelang). TileLang is a domain-specific language for expressing high-performance GPU kernels in Python, featuring easy migration, agile development, and automatic optimization.\n\nMost kernels in this project approach the limit of hardware performance regarding the compute intensity and memory bandwidth. Some of them have already been used in internal training and inference scenarios. However, they do not represent best practices and we are actively working on improving the code quality and documentation.\n\n## Features\n\n- **Gating** — Top-k expert selection and scoring for Mixture of Experts routing\n- **MoE Routing** — Token-to-expert mapping, fused expansion/reduction and weight normalization\n- **Quantization** — Per-token, per-block, and per-channel FP8/FP4/E5M6 casting with fused SwiGLU+quantization ops\n- **Transpose** — Batched transpose operations\n- **Engram** — Engram gating kernels with fused RMSNorm, forward/backward passes and weight gradient reduction\n- **Manifold HyperConnection** — Hyper-connection kernels including Sinkhorn normalization and mix splitting/application\n- **Modeling** — High-level `torch.autograd.Function` wrappers composing low-level kernels into trainable layers (engram gate, mHC pipeline)\n\n## Requirements\n\n- Python 3.10 or higher\n- PyTorch 2.10 or higher\n- TileLang 0.1.9 or higher\n- NVIDIA SM90 or SM100 architecture GPU\n- CUDA Toolkit 13.1 or higher\n\n## Installation\n\n### Install a local development version\n\n```bash\npip install -e \".[dev]\"\n```\n\n### Install a release version\n\n```bash\npip install tile-kernels\n```\n\n## Testing\n\nTests using pytest:\n\n### Test single test file\n\n```bash\npytest tests/transpose/test_transpose.py -n 4 # Correctness only with 4 workers\npytest tests/transpose/test_transpose.py --run-benchmark # Correctness + Benchmarking\n```\n\n### Pressure test\n\n```bash\nTK_FULL_TEST=1 pytest -n 4 --count 2\n```\n\n## Project Structure\n\n```txt\ntile_kernels/\n├── moe/        # Mixture of Experts routing related kernels\n├── quant/      # FP8/FP4/E5M6 quantization\n├── transpose/  # Batched transpose\n├── engram/     # Engram gating kernels\n├── mhc/        # Manifold HyperConnection kernels\n├── modeling/   # High-level autograd modeling layers (engram, mHC)\n├── torch/      # PyTorch reference implementations\n└── testing/    # Test and benchmark utilities\n```\n\n## Acknowledgement\n\nThis project is built on [TileLang](https://github.com/tile-ai/tilelang). Thanks and respect to the developers!\n\n## License\n\nThis code repository is released under [the MIT License](LICENSE).\n\n## Citation\n\n```bibtex\n@misc{tilekernels,\n      title={TileKernels},\n      author={Xiangwen Wang, Chenhao Xu, Huanqi Cao, Rui Tian, Weilin Zhao, Kuai Yu and Chenggang Zhao},\n      year={2026},\n      publisher = {GitHub},\n      howpublished = {\\url{https://github.com/deepseek-ai/TileKernels}},\n}\n```\n","summary":"TileKernels delivers highly‑optimized GPU kernels for large‑language‑model workloads, built with the TileLang DSL to combine Python expressiveness with hardware‑level performance. It contains a suite of kernels for Mixture‑of‑Experts routing, token‑wise gating, FP8/FP4/E5M6 quantization, batched transposes, Engram gating, and Manifold HyperConnection, plus `torch.autograd.Function` wrappers that assemble these kernels into trainable layers. The library targets researchers and developers building production LLM systems who need compute‑intensive, low‑latency operations on NVIDIA GPUs, while allowing rapid prototyping and automatic optimization through TileLang.","description":"A kernel library written in tilelang","stars":1428,"language":"Python"},{"owner":"hiteshchoudhary","repo":"gitbackup","url":"https://github.com/hiteshchoudhary/gitbackup","readme":"# GitBackup\n\nA desktop application to back up all your GitHub repositories locally and optionally to cloud storage (AWS S3 / Cloudflare R2).\n\n![Electron](https://img.shields.io/badge/Electron-35-47848F?logo=electron&logoColor=white)\n![React](https://img.shields.io/badge/React-19-61DAFB?logo=react&logoColor=white)\n![TypeScript](https://img.shields.io/badge/TypeScript-5-3178C6?logo=typescript&logoColor=white)\n![License](https://img.shields.io/badge/License-MIT-green)\n\n## Features\n\n- **One-click GitHub backup** — Enter your Personal Access Token and back up all repositories with full code and branches\n- **Smart incremental updates** — First run clones everything; subsequent runs only fetch changes\n- **Flexible repo selection** — Filter by owned, organization, starred, forked, or collaborator repositories\n- **Cloud storage support** — Upload compressed `.tar.gz` archives to AWS S3 or Cloudflare R2\n- **Scheduled backups** — Set daily, weekly, or monthly automatic backups with system tray support\n- **Rate limit aware** — Handles GitHub API pagination and rate limits for accounts with 200-300+ repos\n- **Concurrent processing** — Configurable parallelism (1-10 repos at a time) for faster backups\n- **Real-time progress** — Detailed per-repo status tracking with live log viewer\n- **Secure** — Token stored encrypted locally, cleaned from git remote URLs after operations\n\n## Screenshots\n\n### Setup\nConfigure your GitHub token, backup folder, and optional cloud storage with a guided setup flow.\n\n### Repositories\nBrowse and select repositories with filters for owned, org, starred, forked, and collaborator repos.\n\n### Backup\nMonitor real-time progress with per-repo status, progress bars, and a detailed log viewer.\n\n## Download\n\nDownload the latest version for your platform from the [Releases](https://github.com/hiteshchoudhary/gitbackup/releases/latest) page.\n\n| Platform | File | Notes |\n|----------|------|-------|\n| **macOS** | `GitBackup-x.x.x.dmg` | Open the `.dmg` and drag GitBackup to Applications. On first launch, right-click → Open to bypass Gatekeeper. |\n| **Windows** | `GitBackup-Setup-x.x.x.exe` | Run the installer. Windows Defender may show a warning — click \"More info\" → \"Run an
