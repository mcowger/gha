<script id="project-data" type="application/json">[{"owner":"earthtojake","repo":"text-to-cad","url":"https://github.com/earthtojake/text-to-cad","readme":"<div align=\"center\">\n\n<img src=\".assets/text-to-cad-demo.gif\" alt=\"Demo of the text-to-cad harness generating and previewing CAD geometry\" width=\"100%\">\n\n<br>\n\n# ⚙ Open Source Text to CAD Harness ⚙\n\nAn open source harness for generating 3D models with your favorite coding agent\n\n[Demo project](https://text-to-cad.earthtojake.com)\n\n[![GitHub stars](https://img.shields.io/github/stars/earthtojake/text-to-cad?style=for-the-badge&logo=github&label=Stars)](https://github.com/earthtojake/text-to-cad/stargazers)\n[![GitHub forks](https://img.shields.io/github/forks/earthtojake/text-to-cad?style=for-the-badge&logo=github&label=Forks)](https://github.com/earthtojake/text-to-cad/network/members)\n[![License: MIT](https://img.shields.io/badge/License-MIT-blue?style=for-the-badge)](LICENSE)\n[![Follow @soft_servo](https://img.shields.io/badge/Follow-%40soft__servo-000000?style=for-the-badge&logo=x)](https://x.com/soft_servo)\n[![Python](https://img.shields.io/badge/Python-3.11+-3776AB?style=for-the-badge&logo=python&logoColor=white)](.agents/skills/cad/requirements.txt)\n[![build123d](https://img.shields.io/badge/build123d-CAD-00A676?style=for-the-badge)](https://github.com/gumyr/build123d)\n[![OCP](https://img.shields.io/badge/OCP-OpenCascade-2F80ED?style=for-the-badge)](.agents/skills/cad/requirements.txt)\n[![STEP](https://img.shields.io/badge/STEP-Export-4A5568?style=for-the-badge)](.agents/skills/cad/SKILL.md)\n[![STL](https://img.shields.io/badge/STL-Export-4A5568?style=for-the-badge)](.agents/skills/cad/SKILL.md)\n[![3MF](https://img.shields.io/badge/3MF-Export-4A5568?style=for-the-badge)](.agents/skills/cad/SKILL.md)\n[![URDF](https://img.shields.io/badge/URDF-Robots-6B46C1?style=for-the-badge)](.agents/skills/urdf/SKILL.md)\n[![Robot Motion](https://img.shields.io/badge/Robot%20Motion-IK%20%2B%20Planning-6B46C1?style=for-the-badge)](.agents/skills/robot-motion/SKILL.md)\n[![Node.js](https://img.shields.io/badge/Node.js-CAD%20Explorer-339933?style=for-the-badge&logo=node.js&logoColor=white)](.agents/skills/cad/explorer/package.json)\n[![React](https://img.shields.io/badge/React-18-61DAFB?style=for-the-badge&logo=react&logoColor=111111)](.agents/skills/cad/explorer/package.json)\n[![Vite](https://img.shields.io/badge/Vite-7-646CFF?style=for-the-badge&logo=vite&logoColor=white)](.agents/skills/cad/explorer/package.json)\n\n</div>\n\n## ✨ Features\n\n- **Generate** - Create source-controlled CAD models with coding agents like Codex and Claude Code.\n- **Export** - Produce STEP, STL, 3MF, DXF, GLB, topology data, and URDF robot descriptions.\n- **Browse** - Inspect generated geometry in CAD Explorer.\n- **Reference** - Copy stable `@cad[...]` references so agents can make precise follow-up edits.\n- **Review** - Render quick review images for fast checks during an iteration loop.\n- **Reproduce** - Edit source files first, then regenerate explicit targets.\n- **Local** - Run the harness and CAD Explorer locally with no backend to host.\n\n## 🧰 Bundled Skills\n\nThis harness vendors file-targeted skills for CAD, robot-description, robot-motion, and manufacturing-preflight work. Use the bundled copies here for local CAD projects, or use the dedicated repositories when installing the skills outside this harness.\n\n- **CAD Skill** - STEP, STL, 3MF, DXF, GLB/topology, render images, and `@cad[...]` geometry references. [Bundled skill](.agents/skills/cad/SKILL.md) · [Standalone repo](https://github.com/earthtojake/cad-skill)\n- **URDF Skill** - Generated URDF XML, robot links, joints, limits, validation, and mesh references. [Bundled skill](.agents/skills/urdf/SKILL.md) · [Standalone repo](https://github.com/earthtojake/urdf-skill)\n- **Robot Motion Skill** - ROS 2/MoveIt setup, CAD Explorer motion artifacts, inverse kinematics, path planning, and motion-server testing for existing URDFs. [Bundled skill](.agents/skills/robot-motion/SKILL.md)\n\nSkills live canonically under `.agents/skills` for Codex. Claude Code compatibility is provided by per-skill symlinks in `.claude/skills`.\n\n## 📸 Screenshots\n\n<table>\n  <tr>\n    <td width=\"33%\">\n      <a href=\"./.assets/text-to-cad-demo.gif\">\n        <img src=\"./.assets/text-to-cad-demo.gif\" alt=\"CAD skill demo showing generated geometry in CAD Explorer\" width=\"100%\">\n      </a>\n      <a href=\"./.agents/skills/cad/SKILL.md\"><strong>CAD</strong></a>\n    </td>\n    <td width=\"33%\">\n      <a href=\"./.assets/urdf-demo.gif\">\n        <img src=\"./.assets/urdf-demo.gif\" alt=\"URDF skill demo showing robot description output in CAD Explorer\" width=\"100%\">\n      </a>\n      <a href=\"./.agents/skills/urdf/SKILL.md\"><strong>URDF</strong></a>\n    </td>\n    <td width=\"33%\">\n      <a href=\"./.assets/robot-motion-demo.gif\">\n        <img src=\"./.assets/robot-motion-demo.gif\" alt=\"Robot Motion skill demo showing inverse kinematics in CAD Explorer\" width=\"100%\">\n      </a>\n      <a href=\"./.agents/skills/robot-motion/SKILL.md\"><strong>Robot Motion</strong></a>\n    </td>\n  </tr>\n</table>\n\n## 🔁 Workflow\n\n1. **Describe** - Tell your agent about the part, assembly, fixture, robot, or mechanism you want.\n2. **Edit** - Let your coding agent update repo-local CAD source files.\n3. **Regenerate** - Create explicit STEP, STL, 3MF, DXF, GLB, or URDF targets.\n4. **Inspect** - Open CAD Explorer to review the generated model.\n5. **Reference** - Copy `@cad[...]` handles when you want geometry-aware edits.\n6. **Commit** - Save the source and generated artifacts together once the model is ready.\n\n## 🧪 Benchmarks\n\nThe repo stores `.assets/**` through Git LFS and excludes that tree from default LFS pulls so lightweight clones do not fetch GIF assets or benchmark detail pages. To hydrate only the benchmark assets locally, run:\n\n```bash\ngit lfs pull --include=\".assets/benchmarks/**\"\n```\n\n<table>\n  <thead>\n    <tr>\n      <th>#</th>\n      <th>Target</th>\n      <th>Prompt</th>\n      <th>Output</th>\n    </tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td>1</td>\n      <td><a href=\".assets/benchmarks/01-rectangular-calibration-block.md\">Rectangular calibration block with four holes</a></td>\n      <td>Create a centered 100 x 60 x 20 mm block with four 8 mm vertical through-holes. Add only a 2 mm chamfer on the top outer perimeter.</td>\n      <td><img src=\".assets/benchmarks/benchmark_01_rectangular_calibration_block.gif\" alt=\"Rectangular calibration block orbit gif\" width=\"220\"></td>\n    </tr>\n    <tr>\n      <td>2</td>\n      <td><a href=\".assets/benchmarks/02-circular-flange.md\">Circular flange with bolt-hole pattern</a></td>\n      <td>Create an 80 mm diameter, 10 mm thick circular flange with a 30 mm central through-bore. Add six 6 mm through-holes on a 60 mm bolt circle and fillet the outside circular edges.</td>\n      <td><img src=\".assets/benchmarks/benchmark_02_circular_flange.gif\" alt=\"Circular flange orbit gif\" width=\"220\"></td>\n    </tr>\n    <tr>\n      <td>3</td>\n      <td><a href=\".assets/benchmarks/03-l-bracket.md\">L-bracket with gussets and two hole directions</a></td>\n      <td>Create an L-bracket from a base plate and rear vertical plate. Add vertical base holes, horizontal back-plate holes, two triangular gussets, and a filleted base/back transition.</td>\n      <td><img src=\".assets/benchmarks/benchmark_03_l_bracket.gif\" alt=\"L-bracket orbit gif\" width=\"220\"></td>\n    </tr>\n    <tr>\n      <td>4</td>\n      <td><a href=\".assets/benchmarks/04-stepped-shaft-keyway.md\">Stepped shaft with keyway</a></td>\n      <td>Create a 120 mm shaft along X with 20/30/20 mm diameter stepped sections. Add end chamfers and a shallow rectangular keyway on top of the middle section.</td>\n      <td><img src=\".assets/benchmarks/benchmark_04_stepped_shaft_keyway.gif\" alt=\"Stepped shaft orbit gif\" width=\"220\"></td>\n    </tr>\n    <tr>\n      <td>5</td>\n      <td><a href=\".assets/benchmarks/05-open-top-electronics-enclosure.md\">Open-top electronics enclosure with bosses</a></td>\n      <td>Create a hollow open-top enclosure with 3 mm walls and floor. Add four internal standoffs with centered blind holes and 2 mm outside vertical corner fillets.</td>\n      <td><img src=\".assets/benchmarks/benchmark_05_open_top_electronics_enclosure.gif\" alt=\"Open-top electronics enclosure orbit gif\" width=\"220\"></td>\n    </tr>\n    <tr>\n      <td>6</td>\n      <td><a href=\".assets/benchmarks/06-clevis-bracket-lightening-cutouts.md\">Aerospace-style clevis bracket with lightening cutouts</a></td>\n      <td>Create a symmetric clevis bracket with a base plate, two rounded lugs, base mounting holes, and a horizontal lug bore. Add triangular lightening cutouts, reinforcing ribs, and rounded transitions.</td>\n      <td><img src=\".assets/benchmarks/benchmark_06_clevis_bracket_lightening_cutouts.gif\" alt=\"Clevis bracket orbit gif\" width=\"220\"></td>\n    </tr>\n    <tr>\n      <td>7</td>\n      <td><a href=\".assets/benchmarks/07-radial-engine-cylinder.md\">Radial-engine-style cylinder with cooling fins</a></td>\n      <td>Create a vertical engine-cylinder form with a central barrel, 12 cooling fins, a base flange, and a top cap. Add a 35 degree angled spark-plug boss with a coaxial through-hole.</td>\n      <td><img src=\".assets/benchmarks/benchmark_07_radial_engine_cylinder.gif\" alt=\"Radial-engine-style cylinder orbit gif\" width=\"220\"></td>\n    </tr>\n    <tr>\n      <td>8</td>\n      <td><a href=\".assets/benchmarks/08-centrifugal-impeller.md\">Centrifugal impeller with backward-curved blades</a></td>\n      <td>Create a centrifugal impeller with a backplate, hub, and through-bore. Add 12 fused backward-curved blades sweeping about 45 degrees from root to tip.</td>\n      <td><img src=\".assets/benchmarks/benchmark_08_centrifugal_impeller.gif\" alt=\"Centrifugal impeller orbit gif\" width=\"220\"></td>\n    </tr>\n    <tr>\n      <td>9</td>\n      <td><a href=\".assets/benchmarks/09-spiral-staircase.md\">Spiral staircase with helical handrail</a></td>\n      <td>Create a miniature spiral staircase with a central column, base disk, and 20 rising wedge treads. Add a one-revolution helical handrail and vertical balusters at the tread outer ends.</td>\n      <td><img src=\".assets/benchmarks/benchmark_09_spiral_staircase.gif\" alt=\"Spiral staircase orbit gif\" width=\"220\"></td>\n    </tr>\n    <tr>\n      <td>10</td>\n      <td><a href=\".assets/benchmarks/10-planetary-gear-stage.md\">Simplified planetary gear stage</a></td>\n      <td>Create a flat planetary gear assembly with separate sun, planet, ring, carrier, and pin bodies. Use simplified trapezoidal teeth and place three planets around the sun on a 42 mm radius circle.</td>\n      <td><img src=\".assets/benchmarks/benchmark_10_planetary_gear_stage.gif\" alt=\"Planetary gear stage orbit gif\" width=\"220\"></td>\n    </tr>\n  </tbody>\n</table>\n\n## 🚀 Quick Start\n\nClone the repo:\n\n```bash\ngit clone https://github.com/earthtojake/text-to-cad.git\ncd text-to-cad\n```\n\nInstall Python CAD dependencies:\n\n```bash\npython3.11 -m venv .venv\n./.venv/bin/python -m pip install --upgrade pip\n./.venv/bin/pip install -r .agents/skills/cad/requirements.txt\n```\n\nInstall other bundled skill requirements only when you need those workflows:\n\n```bash\n./.venv/bin/pip install -r .agents/skills/urdf/requirements.txt\n```\n\nInstall CAD Explorer dependencies:\n\n```bash\nnpm --prefix .agents/skills/cad/explorer install\n```\n\nRun the local CAD Explorer from the project directory you want to scan:\n\n```bash\nnpm --prefix .agents/skills/cad/explorer run dev\n```\n\nThen open [http://localhost:4178](http://localhost:4178).\n\nFor root-aware agent workflows across multiple projects, ask CAD Explorer to\nreuse a matching server or start one on a free port:\n\n```bash\nnpm --prefix .agents/skills/cad/explorer run dev:ensure -- --file STEP/sample_part.step\n```\n\nThen open the URL printed by the command.\n","summary":"earthtojake/text‑to‑cad is an open‑source harness that lets developers generate, modify, and inspect 3‑D CAD models directly from textual prompts using coding agents such as Codex or Claude. It supports a wide array of workflows—creating source‑controlled geometry, exporting STEP, STL, 3MF, DXF and URDF robot descriptions, rendering quick review images, and providing stable `@cad[…]` references for precise follow‑up edits. The bundled CAD, robot‑motion, and manufacturing skills, along with a local, no‑backend CAD Explorer, make it useful for software engineers, product designers, and robotics integrators who need rapid, reproducible CAD content and robot‑kinematics support.","description":"An open source harness for generating CAD models","stars":1833,"language":"JavaScript"},{"owner":"openclaw","repo":"clawsweeper","url":"https://github.com/openclaw/clawsweeper","readme":"# 🦞🧹 ClawSweeper\n\nClawSweeper is the conservative maintenance bot for OpenClaw repositories. It\nkeeps the backlog reviewed, keeps maintainer-visible GitHub comments tidy, and\nturns narrow trusted findings into guarded repair or automerge work.\n\nThe current production targets are `openclaw/openclaw`, `openclaw/clawhub`, and\nself-review for `openclaw/clawsweeper`.\n\nAt a high level ClawSweeper:\n\n- reviews open issues and pull requests on a schedule and on exact GitHub events\n- writes one durable markdown report per item in generated state\n- syncs one marker-backed public review comment per issue or PR, edited in place\n- closes only unchanged, high-confidence, policy-allowed proposals\n- routes maintainer commands such as `@clawsweeper review`,\n  `@clawsweeper fix`, `@clawsweeper autofix`, and `@clawsweeper automerge`\n- repairs opted-in PRs through a bounded Codex review/fix loop before merge\n- can open guarded implementation PRs for strict, reproducible bug issues\n- reviews code-bearing commits that land on target `main` branches\n- publishes dashboard, audit, repair, and activity state to\n  `openclaw/clawsweeper-state`\n\nClawSweeper is not a generic auto-close bot. Review is proposal-only, apply is\nguarded, Codex never gets write credentials during review, and every GitHub\nmutation is rechecked against live target state immediately before it happens.\n\n## Capabilities\n\n### Issue and PR Reviews\n\nScheduled runs scan open issues and pull requests, while target repositories can\nforward exact issue/PR events with `repository_dispatch` for low-latency\none-item reviews. Each review writes\n`records/<repo-slug>/items/<number>.md` with the decision, evidence, proposed\nmaintainer-facing comment, runtime metadata, and GitHub snapshot hash.\n\nClawSweeper syncs one marker-backed public review comment per item and edits it\nin place instead of posting repeated comments. If a review starts before a\ncompleted comment exists, it first posts a short status placeholder, then\nreplaces that same comment with the final review. Pull request comments include\nhidden verdict/action markers so trusted repair and automerge flows can continue\nwithout scraping visible prose. See\n[`docs/pr-review-comments.md`](docs/pr-review-comments.md).\n\n### Apply and State\n\nApply mode re-fetches live GitHub state, checks labels, maintainer authorship,\npaired issue/PR state, snapshot drift, and repository profile rules before\ncommenting or closing anything. Closed or already-closed reports move to\n`records/<repo-slug>/closed/<number>.md`; reopened archived items move back to\n`items/` as stale work.\n\nGenerated state lives in `openclaw/clawsweeper-state`: durable `records/`,\n`jobs/`, `results/`, audit output, workflow status JSON, repair ledgers, and the\nrendered dashboard. This repository stays focused on source, workflows, docs,\nand tests.\n\n### Repair and Automerge\n\nMaintainer commands can opt PRs into `autofix` or `automerge`, dispatch a fresh\nexact-head review, and run a bounded Codex review/fix loop. Codex handles the\ncode repair and local validation loop; deterministic executor steps own every\nGitHub mutation, branch push, label update, and final merge gate.\n\nAutomerge waits for exact-head review, required checks, mergeability, and policy\ngates. If repair was needed, the mutable status comment records each review,\nrepair, re-review, and merge step with timing and links. The final merge result\nsummarizes both the original PR change and any ClawSweeper fixups.\n\nFor issues, strict bug reviews that are high-confidence reproducible, do not\nalready have a linked PR, and do not require feature/config expansion can\ndispatch Codex to open one guarded implementation PR labeled\n`clawsweeper:autogenerated`.\n\n### Commit Reviews\n\nPush events on target `main` branches can dispatch to\n`.github/workflows/commit-review.yml`. The workflow expands the commit range,\nskips non-code-only commits cheaply, starts one Codex worker per code-bearing\ncommit, and writes `records/<repo-slug>/commits/<sha>.md`.\n\nCommit reports are the source of truth. Optional target commit Check Runs are\ndisabled by default and can be enabled per run or repository. Reports with\n`result: findings` can dispatch to repair intake when the finding is narrow,\nnon-security, and still relevant on latest `main`.\n\n### Operations\n\nRepository-specific rules live in `src/repository-profiles.ts`, so OpenClaw,\nClawHub, and ClawSweeper can share the same engine while keeping different apply\nlimits. Both review and repair lanes support manual workflow dispatch, reruns,\nand backfills. `pnpm commit-reports -- --since 24h`, `--findings`,\n`--non-clean`, `--repo`, and `--author` query flat per-SHA commit storage\nwithout date buckets.\n\n## Guardrails\n\nClawSweeper may propose a close only when the item is clearly one of these:\n\n- implemented on current `main`\n- not reproducible on current `main`\n- better suited for ClawHub skill/plugin work than core\n- duplicate or superseded by a canonical issue/PR\n- concrete but not actionable in this source repo\n- incoherent enough that no action can be taken\n- stale issue older than 60 days with too little data to verify\n\nMaintainer-authored items are never auto-closed. Everything else stays open.\nIssues with an open PR that references them using GitHub closing syntax such as\n`Fixes #123` stay open until that PR merges or is closed.\nOpen issue/PR pairs from the same author stay open together unless the paired\nitem is already resolved or a maintainer explicitly asks to close one side.\n\nRepository profiles can further narrow apply. ClawHub and ClawSweeper self-review\nare intentionally stricter: they review issues and PRs, but apply may close only\nPRs where current `main` already implements the proposed change with\nsource-backed evidence.\n\n## Maintainer Commands\n\nMaintainers can steer ClawSweeper from target-repo issue and PR comments. The\npreferred form is `@clawsweeper ...`. The router also accepts\n`@clawsweeper[bot] ...`, `@openclaw-clawsweeper ...`,\n`@openclaw-clawsweeper[bot] ...`, and legacy slash aliases such as\n`/clawsweeper ...`, `/review`, `/automerge`, `/auto merge`, and\n`/autoclose <reason>`.\n\nCommon commands:\n\n```text\n@clawsweeper status\n@clawsweeper re-review\n@clawsweeper review\n@clawsweeper fix ci\n@clawsweeper address review\n@clawsweeper rebase\n@clawsweeper autofix\n@clawsweeper automerge\n@clawsweeper approve\n@clawsweeper explain\n@clawsweeper stop\n@clawsweeper why did automerge stop here?\n```\n\n- `status` and `explain` post a short target summary.\n- `review` and `re-review` dispatch a fresh ClawSweeper issue/PR review without\n  starting repair.\n- Command status replies are marker-backed and edited in place per\n  issue/PR, intent, and head SHA. The visible badge is one lobster plus the\n  current state: `👀` for acknowledgement, `🧹` for review, `🔧` for repair, and\n  `✅` for completed/paused work.\n- Freeform `@clawsweeper ...` mentions dispatch a read-only assist review that\n  answers the maintainer request in the next ClawSweeper comment. Action-looking\n  prose still maps through existing safe markers and deterministic gates.\n- `fix ci`, `address review`, and `rebase` dispatch the repair worker only for\n  ClawSweeper PRs or PRs already opted into `clawsweeper:autofix` or\n  `clawsweeper:automerge`.\n- `autofix` labels an open PR, creates or reuses the adopted job, dispatches\n  review, and enters the bounded review/fix loop without merging.\n- `automerge` labels an open PR, creates or reuses the adopted job, dispatches\n  review, and enters the bounded review/fix/merge loop. Draft PRs are fix-only\n  until GitHub marks them ready for review.\n- User-facing OpenClaw `fix`, `feat`, and `perf` automerge PRs must include a\n  `CHANGELOG.md` entry before ClawSweeper will merge them.\n- Security-sensitive findings can be repaired only after explicit\n  `autofix`/`automerge` opt-in; ClawSweeper still will not merge until a later\n  exact-head review is clean.\n- `approve` lets a maintainer clear a ClawSweeper human-review pause and merge\n  only after the normal exact-head, checks, mergeability, and gate checks pass.\n- `stop` removes repair-loop labels, adds `clawsweeper:human-review`, and makes\n  older automerge/autofix comments ineligible to continue. `/autoclose <reason>`\n  closes the item and bounded linked same-repo targets with an explicit\n  maintainer reason.\n\nOnly maintainers are accepted. The router checks repository collaborator\npermission (`admin`, `maintain`, or `write`) and falls back to trusted\n`author_association` values when permission lookup is unavailable. Contributor\ncommands are ignored without a reply. Scheduled comment routing is dry unless\n`CLAWSWEEPER_COMMENT_ROUTER_EXECUTE=1`; workflow dispatch with `execute=true`\ncan be used for one-off live routing.\n\n## Dashboard\n\nLive dashboard and generated state: https://github.com/openclaw/clawsweeper-state\n\n## How It Works\n\nClawSweeper is split into four operational lanes:\n\n- review lane: scheduled and event-driven issue/PR reviews, durable reports, and\n  public review comment sync\n- apply lane: guarded close/comment mutations, audit, reconcile, and state\n  publishing\n- repair lane: maintainer-command routing, autofix, automerge, issue\n  implementation PRs, and repair result publishing\n- commit review lane: main-branch commit dispatch, cheap code/non-code\n  classification, one Codex review worker per code-bearing commit, and optional\n  target commit checks\n\n### Scheduler\n\nThe issue/PR scheduler decides what to scan and how often. New and active items\nget more attention; older quiet items fall back to a slower cadence. Detailed\nscheduling, capacity, and monitoring behavior is documented in\n[`docs/scheduler.md`](docs/scheduler.md).\n\n- hot/new and recently active items are checked hourly, with a 5-minute intake\n  schedule for the newest queue edge\n- target repositories can forward issue and PR events with\n  `repository_dispatch`; those exact item runs use a dedicated single job to\n  review one item, sync the durable comment, and apply only safe close\n  proposals for that same item\n- pull requests and issues younger than 30 days are checked daily once they\n  leave the hot window\n- older inactive issues are checked weekly\n- apply wakes every 15 minutes and exits quickly when there are no unchanged\n  high-confidence close proposals\n\n### Review Lane\n\nReview is proposal-only. It never closes items.\n\n- A planner scans open issues and PRs, then assigns exact item numbers to shards.\n- Manual runs can pass `item_number` or comma-separated `item_numbers` to review\n  exact Audit Health findings without scanning for a normal batch.\n- Each shard checks out the selected target repository at `main`.\n- Codex reviews with `gpt-5.5`, high reasoning, the default service tier, and a\n  10-minute per-item timeout.\n- Each item becomes a flat report under\n  `records/<repo-slug>/items/<number>.md` with the decision, evidence,\n  Codex `/review`-style PR findings, suggested comment, runtime metadata, and\n  GitHub snapshot hash.\n- High-confidence allowed close decisions become `proposed_close`.\n- After publish, the lane checks the selected items' single marker-backed Codex\n  review comment. Missing comments and missing metadata are synced immediately;\n  existing comments are refreshed only when stale, currently weekly.\n- PR review comments keep the top-level note concise, put source links and full\n  evidence in collapsed details, and use hidden verdict/action markers for the\n  trusted ClawSweeper repair loop; see\n  [`docs/pr-review-comments.md`](docs/pr-review-comments.md).\n\n### Apply Lane\n\nApply reads existing reports and mutates GitHub only when the stored review is\nstill valid.\n\n- Updates the single marker-backed Codex automated review comment in place.\n- Closes only unchanged high-confidence proposals.\n- Reuses the review comment when closing; no duplicate close comment.\n- Moves closed or already-closed reports to\n  `records/<repo-slug>/closed/<number>.md`.\n- Moves reopened archived reports back to the repo’s `items/` folder as stale.\n- Commits checkpoints and machine-readable status during long runs.\n\nApply wakes every 15 minutes, no-ops when there are no unchanged\nhigh-confidence close proposals, and narrows scheduled runs to the currently\neligible proposal list so idle runs do not scan unrelated keep-open records.\nIt defaults to all item kinds, no age floor, a 2-second close delay, and 50\nfresh closes per checkpoint. If it reaches the requested limit, it queues\nanother apply run with the same settings.\n\nExact event runs skip the bulk planner, shard matrix, artifact upload, and\nseparate publish job. They still use the same review and apply code paths, but\nonly for the selected item number and only with immediate-safe reasons enabled\nby default: `implemented_on_main` and `duplicate_or_superseded`.\n`stale_insufficient_info` is never applied to young items; apply requires those\nissue reports to be at least 30 days old unless a manual run explicitly changes\nthe threshold.\n\nThe external state dashboard is fleet-scoped. Each configured repository gets\nits own record folder, status JSON, audit state, cadence counts, and recent\nactivity section. The state repo aggregates those repository snapshots so event\nruns from one repo do not hide the state of another.\n\nThere is still one deterministic apply path for writes. Review can propose and\nsync stale public review comments, but closing remains guarded by apply so a\nfresh GitHub snapshot, labels, maintainer-authorship, and unchanged item state\nare checked immediately before mutation.\n\n### Repair Lane\n\nRepair starts from maintainer intent or trusted ClawSweeper review metadata. The\ncomment router accepts commands from target repositories, validates maintainer\npermissions, updates one mutable command/status comment, and dispatches the\nappropriate repair job.\n\n- `autofix` and `automerge` adopt the PR branch and run exact-head review before\n  making changes.\n- If review or CI finds actionable issues, Codex rebases, addresses PR review\n  comments, fixes CI, runs the requested validation, and returns a structured\n  repair artifact.\n- The deterministic executor applies the artifact, pushes only after validation,\n  re-dispatches exact-head review, and waits for required checks.\n- `automerge` merges only after review verdict, checks, mergeability, changelog,\n  security, maintainer stop/approve state, and repository policy gates pass.\n- Issue implementation is narrower: only strict, reproducible bugs with no\n  linked PR and no feature/config expansion can open a generated PR.\n\nRepair internals are documented in\n[`docs/repair/README.md`](docs/repair/README.md), and the automerge state\nmachine is documented in\n[`docs/repair/automerge-flow.md`](docs/repair/automerge-flow.md).\n\n### Commit Review Lane\n\nCommit review is intentionally separate from issue/PR cleanup. It never closes\nitems, writes comments, or fixes code.\n\n- Target repositories forward `push` events from `main` with\n  `repository_dispatch`.\n- Manual runs can pass `commit_sha`, optional `before_sha`, optional\n  `additional_prompt`, `enabled`, and `create_checks`.\n- The receiver verifies the selected commits are reachable from `origin/main`.\n- Before selecting and reviewing commits, the receiver waits 60 seconds by\n  default (`CLAWSWEEPER_COMMIT_REVIEW_SETTLE_SECONDS=60`) so a push range has\n  time to settle across GitHub and the runner.\n- The plan job expands ranges, pages large backfills at GitHub's matrix limit,\n  and classifies each commit before Codex starts.\n- Pure documentation, changelog, README/license, and asset-only commits get a\n  skipped report without spending Codex time.\n- Mixed commits and code-bearing commits start one Codex worker per commit. The\n  worker checks out current target `main` and reviews the selected commit by\n  SHA/range instead of detaching the whole repository at that commit.\n- Codex is prompted to read beyond the diff: changed files, callers/callees,\n  runtime entry points, adjacent tests/docs, dependency manifests, release\n  notes, advisories, web sources, and focused live tests when useful.\n- Each commit writes exactly one report at\n  `records/<repo-slug>/commits/<40-char-sha>.md`.\n- Reruns overwrite the same report, including reruns with an\n  `additional_prompt`.\n- Report results are `nothing_found`, `findings`, `inconclusive`, `failed`, or\n  `skipped_non_code`.\n- Optional GitHub Checks use the `ClawSweeper Commit Review` name on the target\n  commit. Clean or skipped reports are green; high-confidence high/critical\n  findings fail; lower-severity, inconclusive, and failed reviews are neutral.\n- Finding reports are dispatched to the repair intake when\n  `CLAWSWEEPER_COMMIT_FINDINGS_ENABLED` is not `false`. ClawSweeper owns\n  the audit log and any repair PR.\n\nUse `pnpm commit-reports -- --since 24h` to review recent reports and add\n`--findings`, `--non-clean`, `--repo`, or `--author` to narrow the list. The\nstorage stays flat so a rerun can overwrite exactly one file for a commit\nwithout rediscovering a date bucket.\n\n### Safety Model\n\n- Maintainer-authored items are excluded from automated closes.\n- Protected labels block close proposals.\n- Open PRs with GitHub closing references block issue closes until the PR is\n  resolved.\n- Open same-author issue/PR pairs block one-sided closes.\n- Codex runs without GitHub write tokens.\n- Issue/PR event jobs create target write and report-push credentials only after\n  Codex exits.\n- Commit review workers give Codex only a read-scoped target token as `GH_TOKEN`\n  so it can inspect mentioned issues, PRs, workflow runs, and commit metadata.\n- Commit write/check credentials are created only after Codex exits.\n- CI makes the target checkout read-only for reviews.\n- Reviews fail if Codex leaves tracked or untracked changes behind.\n- Snapshot changes block apply unless the only change is the bot’s own review\n  comment.\n- Commit Check Runs are optional and disabled by default.\n\n### Audit\n\n`pnpm run audit` compares live GitHub state with generated records without moving\nfiles. It reports missing open records, archived open records, stale records,\nduplicates, protected-label proposed closes, and stale review-status records.\nProtected proposed closes are reported only for active repo `items/` records\nbecause archived repo `closed/` records are historical and cannot be applied.\nMissing open records are classified as eligible, maintainer-authored, protected,\nor recently created so strict audit mode can flag actionable drift without\ntreating expected queue lag or excluded items as failures.\nUse `--update-dashboard` to publish the latest audit state under\n`results/audit/` in `openclaw/clawsweeper-state` without making every normal\nstatus update scan all open GitHub items. The state repo renders reviewable\nfindings such as missing eligible records, reopened archived records, and stale\nreviews from that state. The\nworkflow refreshes audit state on a separate six-hour schedule, and it can be run\nmanually with `audit_dashboard=true`. The read-only audit lane covers\n`openclaw/openclaw`, `openclaw/clawhub`, and `openclaw/clawsweeper`; it falls\nback to public workflow-token reads when the ClawSweeper App token is not\navailable for a target.\n\n## Local Run\n\nRequires Node 24.\n\nIssue/PR sweeper:\n\n```bash\nsource ~/.profile\ncorepack enable\npnpm install\npnpm run build\npnpm run plan -- --target-repo openclaw/openclaw --batch-size 5 --shard-count 100 --max-pages 250 --codex-model gpt-5.5 --codex-reasoning-effort high\npnpm run review -- --target-repo openclaw/openclaw --target-dir ../openclaw --batch-size 5 --max-pages 250 --artifact-dir artifacts/reviews --codex-model gpt-5.5 --codex-reasoning-effort high --codex-timeout-ms 600000\npnpm run apply-artifacts -- --target-repo openclaw/openclaw --artifact-dir artifacts/reviews --skip-dashboard\npnpm run audit -- --target-repo openclaw/openclaw --max-pages 250 --sample-limit 25 --update-dashboard\npnpm run reconcile -- --target-repo openclaw/openclaw --dry-run\n```\n\nApply unchanged proposals later:\n\n```bash\nsource ~/.profile\ncorepack enable\npnpm run apply-decisions -- --target-repo openclaw/openclaw --limit 20 --apply-kind all --skip-dashboard\n```\n\nSync durable review comments without closing:\n\n```bash\nsource ~/.profile\ncorepack enable\npnpm run apply-decisions -- --target-repo openclaw/openclaw --sync-comments-only --comment-sync-min-age-days 7 --processed-limit 1000 --limit 0 --skip-dashboard\n```\n\nList commit reports:\n\n```bash\nsource ~/.profile\ncorepack enable\npnpm run build\npnpm commit-reports -- --since 24h\npnpm commit-reports -- --since 24h --findings\npnpm commit-reports -- --repo openclaw/openclaw --author steipete --since 7d\n```\n\nManually rerun commit review through GitHub Actions:\n\n```bash\ngh workflow run commit-review.yml \\\n  --repo openclaw/clawsweeper \\\n  --ref main \\\n  -f target_repo=openclaw/openclaw \\\n  -f commit_sha=<commit-sha> \\\n  -f before_sha=<parent-or-range-start-sha> \\\n  -f create_checks=false \\\n  -f enabled=true \\\n  -f additional_prompt='Optional extra review focus.'\n```\n\nOmit `before_sha` for a single-commit review. Pass `before_sha` to review the\nhistoric range `before_sha..commit_sha`.\n\nManual review runs are proposal-only. Use `apply_existing=true` to apply unchanged\nproposals later. Scheduled apply runs process both issues and pull requests by\ndefault, subject to the selected repository profile; pass `target_repo`,\n`apply_kind=issue`, or `apply_kind=pull_request` to narrow a manual run.\n\nScheduled runs cover the configured product profiles. `openclaw/openclaw` runs\nnormal backfill every 5 minutes with up to 80 review shards when due backlog\nexists; `openclaw/clawhub` runs on offset review/apply/audit crons so its\nreports live under `records/openclaw-clawhub/` without colliding with default\nrepo records. `openclaw/clawsweeper` has a scheduled read-only audit row and is\navailable for manual and event self-review smoke tests. Broad hot-intake sweeps\ncap scheduled fan-out at 50 one-item shards per run; exact event reviews still\nuse one shard.\n\nTarget repositories can opt into event-level latency by installing the\ndispatcher workflow in [docs/target-dispatcher.md](docs/target-dispatcher.md).\nThe dispatcher sends `repository_dispatch` events to this repository with the\ntarget repo and exact item number; ClawSweeper then runs one event job that\nreviews, comments, and checks immediate safe apply instead of waiting for the\nnext hot-intake cron or bulk publish lane.\n\nTarget repositories can opt into main-branch commit review with\n[docs/commit-dispatcher.md](docs/commit-dispatcher.md). That dispatcher sends\npush ranges to this repository, where ClawSweeper expands the range and writes\none commit report per SHA.\n\n## Checks\n\n```bash\npnpm run check\npnpm run oxformat\n```\n\n`oxformat` is an alias for `oxfmt`; there is no separate `oxformat` pnpm package.\nThe `CI` GitHub Actions workflow uses the latest Node release and runs\n`pnpm run check` on pushes, pull requests, and manual dispatches. The check gate\nincludes the full test suite, a strict changed-surface coverage threshold, and a\nfull compiled-repo coverage ratchet.\n\n## GitHub Actions Setup\n\nRequired secrets:\n\n- `OPENAI_API_KEY`: OpenAI API key used by the per-job local Codex Responses\n  proxy. Codex subprocesses inherit only the proxy-backed `CODEX_HOME`, not the\n  raw API key.\n- `CLAWSWEEPER_APP_CLIENT_ID`: public GitHub App client ID for `clawsweeper`.\n  Currently `Iv23liOECG0slfuhz093`.\n- `CLAWSWEEPER_APP_PRIVATE_KEY`: private key for `clawsweeper`; plan/review\n  jobs use a short-lived GitHub App installation token for read-heavy target API\n  calls, commit review uses a read-scoped target token while Codex runs, and\n  apply/comment-sync/check jobs use the app token for comments, closes, and\n  optional checks.\n  Keep App credentials scoped to the `actions/create-github-app-token` step.\n  Review shards run Codex over attacker-controlled issue/PR text, so\n  `codexEnv()` also strips these App variables before spawning Codex.\n\nToken flow:\n\n- Review and repair jobs create an isolated per-run `CODEX_HOME`, start a local\n  Responses proxy from `OPENAI_API_KEY`, write proxy-only Codex config there,\n  and run Codex without OpenAI or Codex token environment variables.\n- ClawSweeper uses the `clawsweeper` GitHub App token for read-heavy target\n  context.\n- Apply mode uses the same app token for review comments and closes, so GitHub\n  attributes mutations to the app bot account instead of a PAT user.\n- Commit review passes Codex only a read-scoped target token as `GH_TOKEN` for\n  issue/PR/workflow/commit hydration, then creates write/check credentials only\n  after Codex exits.\n- The ClawSweeper GitHub App commits generated reports back to\n  `openclaw/clawsweeper-state`.\n\nRequired `clawsweeper` app permissions:\n\n- Contents: read/write, for report commits, repair branches, and repository\n  dispatch inputs that need a contents-scoped installation token.\n- Issues: read/write, for issue comments, labels, closes, and maintainer command\n  authorization context.\n- Pull requests: read/write, for PR comments, labels, merge readiness, repair PRs,\n  and guarded automerge.\n- Workflows: write, for adopted automerge repairs that need to rebase or update\n  source branches containing `.github/workflows/*` changes.\n- Actions: read/write on `openclaw/clawsweeper`, for run cancellation, manual\n  dispatch, self-heal, and commit-review continuations.\n- Checks: write on target repositories when commit Check Runs should be\n  published.\n\nClawSweeper no longer falls back to PAT-based write tokens. If the GitHub App\ninstallation does not grant the requested permission set, the workflow fails at\ntoken creation instead of silently switching identity.\n\nTarget repository setup:\n\n- install the issue/PR dispatcher from\n  [docs/target-dispatcher.md](docs/target-dispatcher.md) for exact item event\n  reviews\n- install the commit dispatcher from\n  [docs/commit-dispatcher.md](docs/commit-dispatcher.md) for `main` commit\n  reviews\n- set `CLAWSWEEPER_COMMIT_REVIEW_ENABLED=false` to disable commit dispatch\n  without code changes\n- set `CLAWSWEEPER_COMMIT_REVIEW_CREATE_CHECKS=true` only if commit Check Runs\n  should be published\n- optionally set `CLAWSWEEPER_COMMIT_REVIEW_SETTLE_SECONDS=0` for manual\n  backfills where the target commit range is already settled; the default is\n  `60`\n","summary":"ClawSweeper is a conservative maintenance bot for OpenClaw repositories that automates the review, cleanup, and repair of issues and pull requests while keeping changes transparent to maintainers. It regularly scans open work items, generates durable markdown reports, and syncs a single marker‑backed review comment that is updated in place; it can automatically apply trusted fixes or merge proposals after a bounded Codex review/fix loop and can create guarded implementation PRs for high‑confidence bugs. ClawSweeper also monitors commit pushes to main branches, runs targeted code‑bearing reviews, and publishes a comprehensive state dashboard to a dedicated repository. The tool is ideal for OpenClaw maintainers and anyone managing multiple GitHub projects who need reliable, policy‑compliant automation for reviews, repairs, and gated merges.","description":"ClawSweeper scans all issues and PRs and suggest what we can close, and why. It runs every PR / Issue once a week.","stars":1533,"language":"JavaScript"},{"owner":"tashfeenahmed","repo":"freellmapi","url":"https://github.com/tashfeenahmed/freellmapi","readme":"<div align=\"center\">\n\n# FreeLLMAPI\n\n**One OpenAI-compatible endpoint. Eleven free LLM providers. ~1B+ tokens per month.**\n\nAggregate the free tiers from Google, Groq, Cerebras, SambaNova, NVIDIA, Mistral, OpenRouter, GitHub Models, Cohere, Cloudflare, and Z.ai (Zhipu) behind a single `/v1/chat/completions` endpoint. Keys are stored encrypted. A router picks the best available model for each request, falls over to the next provider when one is rate-limited, and tracks per-key usage so you stay under every free-tier cap.\n\n[![CI](https://github.com/tashfeenahmed/freellmapi/actions/workflows/ci.yml/badge.svg)](https://github.com/tashfeenahmed/freellmapi/actions/workflows/ci.yml)\n[![License: MIT](https://img.shields.io/badge/License-MIT-green.svg)](./LICENSE)\n[![PRs Welcome](https://img.shields.io/badge/PRs-welcome-brightgreen.svg)](#contributing)\n\n![Fallback chain with per-provider token budget](repo-assets/fallback-chain.png)\n\n</div>\n\n---\n\n## Contents\n\n- [Why this exists](#why-this-exists)\n- [Supported providers](#supported-providers)\n- [Features](#features)\n- [Not yet supported](#not-yet-supported)\n- [Quick start](#quick-start)\n- [Using the API](#using-the-api)\n- [Screenshots](#screenshots)\n- [How it works](#how-it-works)\n- [Limitations](#limitations)\n- [Contributing](#contributing)\n- [Terms of Service review](#terms-of-service-review)\n- [Disclaimer](#disclaimer)\n\n## Why this exists\n\nEvery serious AI lab now offers a free tier — a few million tokens a month, a few thousand requests a day. On its own each tier is a toy. Stacked together, they add up to roughly **1.3 billion tokens per month** of working inference capacity, across dozens of models from small-and-fast to reasonably capable.\n\nThe problem is that stacking them by hand is painful: fourteen different SDKs, fourteen different rate limits, fourteen places a request can fail. FreeLLMAPI collapses that into one OpenAI-compatible endpoint. Point any OpenAI client library at your local server, and it routes transparently across whichever providers you've added keys for.\n\n## Supported providers\n\n<table>\n<tr>\n<td align=\"center\" width=\"180\"><a href=\"https://ai.google.dev\"><b>Google</b><br/>Gemini 2.5 Flash · 3.x previews</a></td>\n<td align=\"center\" width=\"180\"><a href=\"https://groq.com\"><b>Groq</b><br/>Llama 3.3, Llama 4, GPT-OSS, Qwen3</a></td>\n<td align=\"center\" width=\"180\"><a href=\"https://cerebras.ai\"><b>Cerebras</b><br/>Qwen3 235B</a></td>\n<td align=\"center\" width=\"180\"><a href=\"https://cloud.sambanova.ai\"><b>SambaNova</b><br/>DeepSeek V3.x · Llama 4 · Gemma 3</a></td>\n</tr>\n<tr>\n<td align=\"center\"><a href=\"https://mistral.ai\"><b>Mistral</b><br/>Large 3 · Medium 3.5 · Codestral · Devstral</a></td>\n<td align=\"center\"><a href=\"https://openrouter.ai\"><b>OpenRouter</b><br/>19 free-tier models</a></td>\n<td align=\"center\"><a href=\"https://github.com/marketplace/models\"><b>GitHub Models</b><br/>GPT-4.1 · GPT-4o</a></td>\n<td align=\"center\"><a href=\"https://developers.cloudflare.com/workers-ai\"><b>Cloudflare</b><br/>Kimi K2 · GLM-4.7 · GPT-OSS · Granite 4</a></td>\n</tr>\n<tr>\n<td align=\"center\"><a href=\"https://cohere.com\"><b>Cohere</b><br/>Command R+ · Command-A (trial)</a></td>\n<td align=\"center\"><a href=\"https://docs.z.ai\"><b>Z.ai (Zhipu)</b><br/>GLM-4.5 · GLM-4.7 Flash</a></td>\n<td align=\"center\"><a href=\"https://build.nvidia.com\"><b>NVIDIA</b><br/>NIM (disabled by default)</a></td>\n<td align=\"center\"><i>Adding another? See <a href=\"#contributing\">Contributing</a>.</i></td>\n</tr>\n</table>\n\n## Features\n\n- **OpenAI-compatible** — `POST /v1/chat/completions` and `GET /v1/models` work with the official OpenAI SDKs and any OpenAI-compatible client (LangChain, LlamaIndex, Continue, Hermes, etc.). Just change `base_url`.\n- **Streaming and non-streaming** — Server-Sent Events for `stream: true`, JSON response otherwise. Every provider adapter implements both.\n- **Tool calling** — OpenAI-style `tools` / `tool_choice` requests are passed through, and assistant `tool_calls` + `tool` role follow-up messages round-trip across providers.\n- **Automatic fallover** — If the chosen provider returns a 429, 5xx, or times out, the router skips it, puts the key on a short cooldown, and retries on the next model in your fallback chain (up to 20 attempts).\n- **Per-key rate tracking** — RPM, RPD, TPM, and TPD counters per `(platform, model, key)` so the router always picks a key that's under its caps.\n- **Sticky sessions** — Multi-turn conversations keep talking to the same model for 30 minutes to avoid the hallucination spike that comes from mid-conversation model switches.\n- **Encrypted key storage** — API keys are encrypted with AES-256-GCM before hitting SQLite; decryption happens in-memory just before a request.\n- **Unified API key** — Clients authenticate to your proxy with a single `freellmapi-…` bearer token. You never expose upstream provider keys to your apps.\n- **Health checks** — Periodic probes mark keys as `healthy`, `rate_limited`, `invalid`, or `error` so the router skips dead ones automatically.\n- **Admin dashboard** — React + Vite UI to manage keys, reorder the fallback chain, inspect analytics, and run prompts in a playground. Dark mode included.\n- **Analytics** — Per-request logging with latency, token counts, success rate, and per-provider breakdowns.\n- **Deploys to a Raspberry Pi** — Runs happily on a Pi 4 under PM2 behind nginx. ~40 MB RSS at idle.\n\n## Not yet supported\n\nThe scope is deliberately narrow. If a feature isn't on this list and isn't below, assume it isn't there yet.\n\n- **Embeddings** (`/v1/embeddings`)\n- **Image generation** (`/v1/images/*`)\n- **Audio / speech** (`/v1/audio/*`)\n- **Vision / multimodal inputs** — message content is text-only\n- **Legacy completions** (`/v1/completions`) — only the chat endpoint is implemented\n- **Moderation** (`/v1/moderations`)\n- **`n > 1`** (multiple completions per request)\n- **Per-user billing / multi-tenant auth** — single-user by design\n\nPRs that add any of these are very welcome. See [Contributing](#contributing).\n\n## Quick start\n\n**Prerequisites:** Node.js 20+, npm.\n\n```bash\ngit clone https://github.com/tashfeenahmed/freellmapi.git\ncd freellmapi\nnpm install\n\n# Generate an encryption key for at-rest key storage\ncp .env.example .env\necho \"ENCRYPTION_KEY=$(node -e \"console.log(require('crypto').randomBytes(32).toString('hex'))\")\" >> .env\n\n# Start server + dashboard together\nnpm run dev\n```\n\nOpen http://localhost:5173 (the Vite dev UI), add your provider keys on the **Keys** page, reorder the **Fallback Chain** to taste, and grab your unified API key from the **Keys** page header. That unified key is what you point your OpenAI SDK at.\n\nFor a production build:\n\n```bash\nnpm run build\nnode server/dist/index.js     # server + dashboard both served on :3001\n```\n\n## Using the API\n\nAny OpenAI-compatible client works. Examples:\n\n**Python**\n\n```python\nfrom openai import OpenAI\n\nclient = OpenAI(\n    base_url=\"http://localhost:3001/v1\",\n    api_key=\"freellmapi-your-unified-key\",\n)\n\nresp = client.chat.completions.create(\n    model=\"auto\",  # let the router pick; or specify e.g. \"gemini-2.5-flash\"\n    messages=[{\"role\": \"user\", \"content\": \"Summarise the fall of Rome in one sentence.\"}],\n)\nprint(resp.choices[0].message.content)\nprint(\"Routed via:\", resp.headers.get(\"x-routed-via\"))\n```\n\n**curl**\n\n```bash\ncurl http://localhost:3001/v1/chat/completions \\\n  -H \"Authorization: Bearer freellmapi-your-unified-key\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"model\": \"auto\",\n    \"messages\": [{\"role\": \"user\", \"content\": \"hi\"}]\n  }'\n```\n\n**Streaming**\n\n```python\nstream = client.chat.completions.create(\n    model=\"auto\",\n    messages=[{\"role\": \"user\", \"content\": \"Stream me a haiku about SQLite.\"}],\n    stream=True,\n)\nfor chunk in stream:\n    print(chunk.choices[0].delta.content or \"\", end=\"\", flush=True)\n```\n\n**Tool calling**\n\nPass OpenAI-style `tools` and `tool_choice`; the assistant response round-trips back through the proxy exactly like the OpenAI API. Multi-step flows (assistant `tool_calls` → `tool` role follow-up → final answer) work across every provider the router can reach.\n\n```python\ntools = [{\n    \"type\": \"function\",\n    \"function\": {\n        \"name\": \"get_weather\",\n        \"description\": \"Get current weather for a city.\",\n        \"parameters\": {\n            \"type\": \"object\",\n            \"properties\": {\"city\": {\"type\": \"string\"}},\n            \"required\": [\"city\"],\n        },\n    },\n}]\n\n# 1. Model asks for a tool call\nfirst = client.chat.completions.create(\n    model=\"auto\",\n    messages=[{\"role\": \"user\", \"content\": \"What's the weather in Karachi?\"}],\n    tools=tools,\n    tool_choice=\"required\",\n)\ncall = first.choices[0].message.tool_calls[0]\n\n# 2. You execute the tool, feed the result back\nfinal = client.chat.completions.create(\n    model=\"auto\",\n    messages=[\n        {\"role\": \"user\", \"content\": \"What's the weather in Karachi?\"},\n        first.choices[0].message,\n        {\"role\": \"tool\", \"tool_call_id\": call.id, \"content\": '{\"temp_c\": 32, \"cond\": \"sunny\"}'},\n    ],\n    tools=tools,\n)\nprint(final.choices[0].message.content)\n```\n\nWorks with `stream=True` as well — you'll get `delta.tool_calls` chunks followed by a `finish_reason: \"tool_calls\"` close. Under the hood, OpenAI-compatible providers (Groq, Cerebras, SambaNova, Mistral, OpenRouter, GitHub Models, HuggingFace, Cloudflare, Cohere compat) get the request passed through; Gemini requests get translated into Google's `functionDeclarations` / `functionResponse` shape and the response is translated back.\n\nEvery response carries an `X-Routed-Via: <platform>/<model>` header so you can see which provider actually served each call. If a request fell over between providers, you'll also see `X-Fallback-Attempts: N`.\n\n## Screenshots\n\n### Keys\n\nManage provider credentials and grab the unified API key your apps connect with. Each key shows a status dot and when it was last health-checked.\n\n![Keys page](repo-assets/keys.png)\n\n### Playground\n\nSend a chat completion through the router and see which provider served it, with the model ID and latency printed right on the message.\n\n![Playground page](repo-assets/playground.png)\n\n### Analytics\n\nRequest volume, success rate, tokens in and out, average latency, and per-provider breakdowns over 24h / 7d / 30d windows.\n\n![Analytics page](repo-assets/analytics.png)\n\n## How it works\n\n```\n┌──────────────────┐   Bearer freellmapi-…   ┌─────────────────────────┐\n│  OpenAI SDK /    │ ──────────────────────▶ │  Express proxy (:3001)  │\n│  curl / any      │ ◀────────────────────── │  /v1/chat/completions   │\n│  OpenAI client   │      streamed tokens    └────────────┬────────────┘\n└──────────────────┘                                      │\n                                                          ▼\n                             ┌────────────────────────────────────────────────┐\n                             │  Router                                        │\n                             │   1. Pick highest-priority model that          │\n                             │      (a) has a healthy key and                 │\n                             │      (b) is under all its rate limits.         │\n                             │   2. Decrypt key, call provider SDK.           │\n                             │   3. On 429/5xx → cooldown + retry next model. │\n                             └────────────────────────────────────────────────┘\n                                          │\n   ┌──────────────┬────────────┬──────────┴─────────┬─────────────┬──────────┐\n   ▼              ▼            ▼                    ▼             ▼          ▼\n Google         Groq        Cerebras           OpenRouter        HF       …10 more\n```\n\n- **Router** (`server/src/services/router.ts`) — picks a model per request.\n- **Rate-limit ledger** (`server/src/services/ratelimit.ts`) — in-memory RPM/RPD/TPM/TPD counters backed by SQLite, with cooldowns on 429s.\n- **Provider adapters** (`server/src/providers/*.ts`) — one file per provider, implementing the `Provider` base class: `chatCompletion()` and `streamChatCompletion()`.\n- **Health service** (`server/src/services/health.ts`) — periodic probe keeps key status fresh.\n- **Dashboard** (`client/`) — React + Vite + shadcn/ui admin surface.\n- **Storage** — SQLite (`better-sqlite3`) with AES-256-GCM envelope encryption for keys.\n\n## Limitations\n\nStacking free tiers has real trade-offs. Be honest with yourself about them:\n\n- **No frontier models.** The free-tier catalog tops out around Llama 3.3 70B, GLM-4.5, Qwen 3 Coder, and Gemini 2.5 Pro. You will not get GPT-5 or Claude Opus class reasoning through this. For hard problems, pay for a real API.\n- **Intelligence degrades as the day progresses.** Your top-ranked models (usually Gemini 2.5 Pro, GPT-4o via GitHub Models) have the lowest daily caps. Once they hit their limits, the router falls down your priority chain to smaller/weaker models. Expect the effective intelligence of the endpoint to drop in the late hours of each day — then reset at UTC midnight.\n- **Latency is highly variable.** Cerebras and Groq are extremely fast; others are not. You get whichever one is available.\n- **Free tiers can change without notice.** Providers regularly tighten, loosen, or remove free tiers. When that happens you'll see 429s or auth errors until you update the catalog. Re-seed scripts live in `server/src/scripts/`.\n- **No SLA, by definition.** If you need reliability, use a paid provider with a contract.\n- **Local-first.** There's no multi-tenant auth. Run this for yourself; don't expose it to the internet.\n\n## Contributing\n\nContributors very welcome! Good first PRs:\n\n- **Add a provider** — copy `server/src/providers/openai-compat.ts` as a template, wire it into `server/src/providers/index.ts`, seed its models in `server/src/db/index.ts`, add a test in `server/src/__tests__/providers/`.\n- **Add an endpoint** — embeddings, images, moderations. The provider base class can grow new methods; adapters declare which they support.\n- **Improve the router** — cost-aware routing (cheapest-healthy-fastest tradeoffs), better latency-weighted priority, regional pinning.\n- **Dashboard polish** — charts on the Analytics page, key rotation UX, batch import of keys from `.env`.\n- **Docs** — more examples, client library snippets for Go/Rust/etc., a deployment recipe for Docker or Fly.\n\n**Development loop:**\n\n```bash\nnpm install\nnpm run dev      # server on :3001, dashboard on :5173, both with HMR\nnpm test         # vitest — 75 tests across providers, routes, router, ratelimit\n```\n\nPRs should include a test, keep the existing test suite green, and match the `.editorconfig` / tsconfig defaults already in the repo. Issues and discussions are open.\n\n### Contributors\n\nThanks to everyone who's helped improve FreeLLMAPI:\n\n- [@moaaz12-web](https://github.com/moaaz12-web) — tool-calling support across providers (#3)\n- [@lukasulc](https://github.com/lukasulc) — better-sqlite3 bump to fix npm install on Node 24+ (#12)\n- [@VinhPhamAI](https://github.com/VinhPhamAI) — root `.env` PORT now propagates to server + Vite dev proxy + UI base URL (#27)\n\n## Terms of Service review\n\nA self-hosted, single-user, personal-use setup was re-reviewed against each provider's ToS (May 2026). Summary:\n\n| Provider | Verdict | Notes |\n|---|---|---|\n| Google Gemini | ⚠️ Caution | March 2026 ToS narrows scope to *\"professional or business purposes, not for consumer use\"* — a self-hosted developer proxy is still defensible, but the clause is new. |\n| Groq | ✅ Likely OK | GroqCloud Services Agreement permits Customer Application integration. |\n| Cerebras | ✅ Likely OK | Permitted; explicitly forbids selling/transferring API keys. |\n| Mistral | ✅ Likely OK | APIs allowed for personal/internal business use. |\n| OpenRouter | ✅ Likely OK | April 2026 ToS sharpens the no-resale / no-competing-service clause; private single-user proxy still fine. |\n| SambaNova | ⚠️ Ambiguous | EULA §1.5(c) blocks resale and \"service bureau\" use; single-user with no third-party access is fine. |\n| Cloudflare Workers AI | ⚠️ Ambiguous | No anti-proxy clause; covered by general Self-Serve Subscription Agreement. |\n| NVIDIA NIM | ⚠️ Caution | Trial ToS §1.2 / §1.4: *\"evaluation only, not production.\"* Disabled in default catalog. |\n| GitHub Models | ⚠️ Caution | Free tier explicitly scoped to *\"experimentation\"* and *\"prototyping.\"* |\n| Cohere | ❌ Avoid | Terms §14 still forbids *\"personal, family or household purposes.\"* |\n| Zhipu (open.bigmodel.cn) | ✅ Likely OK | Personal/non-commercial research carve-out still in the platform docs. |\n| Z.ai (api.z.ai) | ⚠️ Caution | New row — Singapore entity (distinct from Zhipu CN). §III.3(l) anti-traffic-redirect clause could plausibly be read against a proxy; no explicit personal-use carve-out. |\n| Ollama Cloud | ✅ Likely OK | New row — Free plan permits cloud-model access (1 concurrent, 5-hour session caps). No anti-proxy / anti-resale clauses found. *(Integration tracked in #14.)* |\n\nRules of thumb that keep most providers happy: **one account per provider**, **no reselling**, **no sharing your endpoint with other humans**, **don't hammer a free tier as a paid production backend**. This is informational, not legal advice — read each provider's ToS and make your own call.\n\nRemoved since the April 2026 review: Hugging Face, Moonshot, and MiniMax direct integrations were dropped from the catalog (HF — tool-call format issues; Moonshot — moved to paid only; MiniMax — superseded by the OpenRouter `minimax/minimax-m2.5:free` route).\n\n## Disclaimer\n\n**This project is for personal experimentation and learning, not production.** Free tiers exist so developers can prototype against them; they aren't a stable, supported inference substrate and shouldn't be treated as one. If you build something real on top of FreeLLMAPI, swap in a paid API before you ship. Your relationship with each upstream provider is governed by the terms you accepted when you created your account — those terms still apply when the traffic is proxied through this project, and you're responsible for complying with them.\n\n## License\n\n[MIT](./LICENSE)\n","summary":"FreeLLMAPI aggregates the free tiers of more than a dozen large‑language‑model providers—Google, Groq, Mistral, OpenRouter, GitHub Models, and others—under a single **OpenAI‑compatible** `/v1/chat/completions` endpoint, making it possible to switch providers automatically, fall back when rate‑limited, and monitor usage against each key’s quota. The router supports both streaming and non‑streaming calls, passes through OpenAI‑style tool‑calling logic, and stores API keys encrypted on disk. Developers and researchers who rely on the generous free capacities of these services can point any OpenAI‑compatible SDK to the local server, simplifying deployment and increasing effective token throughput by stacking dozens of free tiers into a single, seamless interface.","description":"OpenAI-compatible proxy that aggregates free-tier keys from ~14 AI providers with automatic failover. For personal experimentation only.","stars":819,"language":"TypeScript"},{"owner":"GammaLabTechnologies","repo":"harmonist","url":"https://github.com/GammaLabTechnologies/harmonist","readme":"<div align=\"center\">\n\n# Harmonist\n\n### Portable AI agent orchestration with mechanical protocol enforcement\n\n*A drop-in multi-agent framework for Cursor, Claude Code, Copilot, Windsurf, Aider, and other AI coding assistants.*\n\n[![GitHub stars](https://img.shields.io/github/stars/GammaLabTechnologies/harmonist?style=flat&logo=github&color=yellow)](https://github.com/GammaLabTechnologies/harmonist/stargazers)\n[![CI](https://github.com/GammaLabTechnologies/harmonist/actions/workflows/ci.yml/badge.svg)](https://github.com/GammaLabTechnologies/harmonist/actions/workflows/ci.yml)\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](LICENSE)\n[![Python 3.9+](https://img.shields.io/badge/python-3.9+-blue.svg)](https://www.python.org/downloads/)\n[![Version 1.0.0](https://img.shields.io/badge/version-1.0.0-brightgreen.svg)](CHANGELOG.md)\n[![Agents: 186](https://img.shields.io/badge/agents-186-purple.svg)](agents/index.json)\n[![Tests: 430+](https://img.shields.io/badge/tests-430+-success.svg)](#testing)\n[![Stdlib only](https://img.shields.io/badge/dependencies-stdlib%20only-lightgrey.svg)](#requirements)\n\n**Built and maintained by [GammaLab](https://gammalab.ae) · [@GammaLabTechnologies](https://github.com/GammaLabTechnologies)**\n\n</div>\n\n---\n\nMost AI coding frameworks trust the language model to follow the\nrules. Harmonist **refuses to let it skip them**. Every code-changing\nturn is gated by hooks that check whether the required reviewers ran,\nwhether memory was updated, and whether the supply chain of every\nshipped file is intact. If the checks fail, the turn doesn't complete —\nno matter how confidently the model claims it's done.\n\nThis is the first open-source agent framework where **protocol\nenforcement is a mechanical gate, not a polite request in a prompt**.\n\n---\n\n## Table of contents\n\n- [Why Harmonist exists](#why-harmonist-exists)\n- [What makes it different](#what-makes-it-different)\n- [Requirements](#requirements)\n- [Quick start](#quick-start)\n- [Architecture](#architecture)\n- [The 186-agent catalogue](#the-186-agent-catalogue)\n- [Mechanical enforcement](#mechanical-enforcement)\n- [Structured validated memory](#structured-validated-memory)\n- [Supply-chain integrity](#supply-chain-integrity)\n- [Supported IDE integrations](#supported-ide-integrations)\n- [Key scripts](#key-scripts)\n- [Documentation](#documentation)\n- [Testing](#testing)\n- [FAQ](#faq)\n- [Contributing](#contributing)\n- [Security](#security)\n- [License](#license)\n- [About GammaLab](#about-gammalab)\n\n---\n\n## Why Harmonist exists\n\nAI coding assistants have a structural problem that prompt engineering\nalone cannot fix.\n\n**The problem:** every serious engineering workflow has non-negotiable\nrules — \"no floating-point for money\", \"run QA before merging\", \"every\nexternal call retries with idempotency keys\", \"security review before\ntouching auth code\". An LLM can be *told* to follow them, but there is\nno mechanism forcing it to. It can agree, move on, and silently skip\nthe step. On a good day you notice. On a bad day the bug ships.\n\n**The current landscape** is split between two imperfect answers:\n\n- **Thin agent frameworks** (LangChain, CrewAI, AutoGen, MetaGPT and\n  many others) give you orchestration primitives but leave enforcement\n  to the prompt. The model can always override its own protocol.\n- **Heavy enterprise platforms** promise governance through separate\n  runtimes, databases, and vendor lock-in — but need infrastructure to\n  install, don't work on a solo developer's laptop, and can't be\n  audited file-by-file.\n\n**Harmonist takes a different stance.** Protocol enforcement is\nimplemented as IDE-level hooks — concrete shell and Python scripts that\nobserve every subagent dispatch, every file edit, every session stop.\nWhen the rules the project declared aren't met, the `stop` hook\nreturns a `followup_message` to the AI and refuses to allow the turn\nto complete. The model can't argue with that; it's a state machine on\ndisk.\n\nNo runtime. No database. No vendor lock-in. Just markdown, stdlib\nPython, and bash — sitting next to your code, doing one job\ncorrectly.\n\n---\n\n## What makes it different\n\nSeven concrete, checkable properties — each one addresses a gap that\nother open-source agent frameworks leave open.\n\n### 1. Mechanical protocol enforcement via IDE hooks\n\nThe `stop` hook in `.cursor/hooks/` parses subagent dispatch markers\nfrom the session, checks whether `qa-verifier` ran, whether any\nrequired reviewer was missing, whether `session-handoff.md` was\nupdated, and returns a structured `followup_message` if the turn\nis incomplete. `loop_limit: 3` caps retries. On exhaustion, an\nincident is recorded and surfaced in the next session. **The AI\nliterally cannot ship a code change that skipped review.**\n\n### 2. Supply-chain verification of agent definitions\n\nEvery shipped file is hashed in `MANIFEST.sha256`. `upgrade.py`\nsha-verifies each source *before* copying into a project. A tampered\n`security-reviewer.md` (say, one that returns `approve` for\neverything) is REFUSED — it never enters the project. `install_extras.py`\ninherits the same guard for on-demand specialist installs. This is\nthe first OSS agent catalogue with paranoid-level supply-chain\nposture.\n\n### 3. Memory correlation IDs that the LLM cannot forge\n\nEvery memory entry has a `correlation_id` of the form\n`<session_id>-<task_seq>` generated by the hooks at session start\n(`<unix-seconds><pid4>` — collision-safe across parallel sessions).\nThe LLM reads the active ID via CLI; it never writes the ID itself.\nThis means the linkage between a `state` entry, a `decision`, and a\n`pattern` from the same task is **cryptographically ordered** from\nthe hook's perspective — not trusted to the model.\n\n### 4. Schema-validated memory with secret-pattern scanning\n\n`memory.py append` is the only supported write path. It validates\nevery entry against a YAML schema (`memory/SCHEMA.md`), rejects\nduplicates, and scans the body for ~30 classes of secrets: AWS\naccess keys, GitHub PATs, Stripe tokens, Slack webhooks, GCP service\naccounts, Azure connection strings, Telegram bot tokens, Discord\ntokens, Heroku/Postmark UUIDs (context-scoped), generic high-entropy\ntokens with `secret:` prefixes, and DB connection strings with\nembedded credentials. Placeholder fences (`${VAR}`, `<NAME>`) suppress\nthe scan so your templates still write cleanly.\n\n### 5. 186 curated domain specialists, not one generic \"coder\"\n\nHarmonist's catalogue is not a handful of roles. It's **186 curated\nspecialists** across 16 categories: blockchain-security-auditor for\nSolidity audits, zk-steward for zero-knowledge circuits, visionos-\nspatial-engineer for Apple Vision Pro, wechat-mini-program-developer\nand xiaohongshu-specialist for the China market, laravel-livewire-\nspecialist for PHP, roblox-systems-scripter for Roblox Luau, 30+\nmarketing agents from SEO to Douyin, finance / sales / product /\nsupport / academic coverage. The orchestrator picks by\n`domains × roles × tags`, not by hard-coded slug lists.\n\n### 6. Integration-as-a-prompt\n\nThere is no installer binary. Integration happens by pasting\n`integration-prompt.md` into a Cursor Agent-mode session. The AI\nreads the prompt, analyzes the project, asks the user which `roles`\nwill be active (engineering / design / product / marketing / sales /\nsupport / finance / testing / academic), selects the right\nspecialists from `agents/index.json`, and wires everything up —\nincluding writing a project-specific `AGENTS.md` with domain-tailored\ninvariants. The AI integrates itself.\n\n### 7. Zero runtime dependencies, cross-platform parity\n\nNo npm, no Docker, no LangChain, no vector database. **Pure Python\nstdlib + bash.** The enforcement runtime has two implementations —\nPOSIX `.sh` scripts for macOS / Linux / WSL, and a pure-Python\n`hook_runner.py` for native Windows — and both paths are exercised\nagainst identical test scenarios. 430+ test assertions in CI keep\nthem bit-for-bit compatible.\n\n---\n\n## Requirements\n\n- **Python 3.9+** — every script ships with a version guard; older\n  interpreters exit with a per-OS install hint.\n- **Bash 3.2+** for POSIX shell paths (macOS default works). On native\n  Windows, the pure-Python `hook_runner.py` takes over; no WSL or Git\n  Bash required.\n- **Git** for version tracking.\n- **An AI coding assistant that supports subagent dispatch** — Cursor\n  is the primary integration; Claude Code, Copilot, Windsurf, Aider,\n  Kimi, Qwen, Gemini CLI, OpenCode, OpenClaw, and Antigravity are all\n  supported via adapters.\n- **No third-party Python dependencies** — stdlib only. No npm, no\n  Docker, no LangChain, no vector database.\n\n---\n\n## Quick start\n\n### Option 1 — Integrate via Cursor (recommended)\n\n```bash\n# 1. Clone into the root of your project\ncd your-project/\ngit clone https://github.com/GammaLabTechnologies/harmonist.git\n\n# 2. Open the project in Cursor, switch to Agent mode\n# 3. Paste the contents of harmonist/integration-prompt.md\n# 4. Follow the AI's walkthrough — it will ask about your\n#    project's domain and roles, then wire everything up.\n# 5. Start a NEW chat when integration is done.\n```\n\nThat's it. The AI reads `harmonist/agents/index.json`, picks the\nright specialists for your stack, writes a domain-specific\n`AGENTS.md`, bootstraps `.cursor/memory/`, installs the enforcement\nhooks, and records the integration state in\n`.cursor/pack-version.json`.\n\n### Option 2 — Integrate via CLI (no Cursor needed)\n\n```bash\ncd your-project/\ngit clone https://github.com/GammaLabTechnologies/harmonist.git\npython3 harmonist/agents/scripts/integrate.py --pack harmonist --project .\n```\n\n### Option 3 — Manual integration\n\nSee [`GUIDE_EN.md`](GUIDE_EN.md) for the step-by-step manual path.\n\n---\n\n## Architecture\n\n```\n                     ┌────────────────────────────┐\n                     │        AGENTS.md           │\n                     │      Orchestrator          │\n                     │                            │\n                     │  Protocol · Hook Phases    │\n                     │  Invariants · Memory       │\n                     └─────────────┬──────────────┘\n                                   │  reads\n                                   ▼\n                     ┌────────────────────────────┐\n                     │   agents/index.json        │   ← generated\n                     │                            │\n                     │   by category · by tag     │   ← routing table\n                     │   186 entries              │\n                     └─────────────┬──────────────┘\n                                   │  routes to\n            ┌──────────────────────┼──────────────────────┐\n            ▼                      ▼                      ▼\n     ┌──────────────┐      ┌──────────────┐      ┌──────────────┐\n     │ orchestration│      │   review     │      │   persona    │\n     │ (scout,      │      │ (strict,     │      │ (engineering,│\n     │  repo-map)   │      │  readonly)   │      │  design, …)  │\n     └──────────────┘      └──────────────┘      └──────────────┘\n                                   │                      │\n            ┌──────────────────────┴──────────────────────┐\n            ▼                                             ▼\n     ┌──────────────┐                             ┌──────────────┐\n     │ Review gates │                             │   .cursor/   │\n     │              │                             │   memory/    │\n     │ qa · sec     │                             │              │\n     │ sre · perf   │                             │ session      │\n     │ regression   │                             │ decisions    │\n     └──────────────┘                             │ patterns     │\n                                                  └──────────────┘\n```\n\n### How it works\n\n1. **Single unified pool.** Every agent lives at\n   `agents/<category>/<slug>.md` with the same [Schema v2](agents/SCHEMA.md)\n   frontmatter. One schema, one catalogue.\n2. **Data-driven routing.** The orchestrator never hard-codes slugs.\n   It extracts task tags (\"payments\", \"react\", \"solidity\"),\n   intersects with `agents/index.json`, filters by the project's\n   declared `domains` and `roles`, and picks the right specialist.\n3. **Protocol tiers by metadata.** `protocol: strict` agents\n   (orchestration + review) are mandatory gates that run on triggers.\n   `protocol: persona` agents are free-form specialists with domain\n   depth.\n4. **Hook-observed execution.** `sessionStart`, `afterFileEdit`,\n   `subagentStart`, `subagentStop`, and `stop` hooks track the full\n   lifecycle. The `stop` hook is the gate.\n5. **Persistent memory.** Between sessions, state / decisions /\n   patterns live under `.cursor/memory/`, linked by correlation IDs.\n   The next session reads the last three state snapshots and three\n   decisions before planning.\n\n---\n\n## The 186-agent catalogue\n\nEvery count below is mirrored from `agents/index.json` and verified by\n`check_pack_health.py` — the table and the index cannot drift.\n\n| Category            | Count | Protocol | Focus                                               |\n|---------------------|-------|----------|-----------------------------------------------------|\n| `orchestration`     |   2   | strict   | Scout before implementation, route to right agent   |\n| `review`            |   6   | strict   | Readonly reviewers — security, quality, QA, SRE, regression, a11y |\n| `engineering`       |  46   | persona  | Backend, frontend, DevOps, data, AI, embedded, Solidity, LLM eval |\n| `design`            |   8   | persona  | UI/UX, brand, accessibility, visual storytelling    |\n| `testing`           |   8   | persona  | QA, performance, API testing, evidence collection   |\n| `product`           |   5   | persona  | Product management, sprints, feedback, trends       |\n| `project-management`|   7   | persona  | Planning, studio production, coordination           |\n| `marketing`         |  30   | persona  | Growth, SEO, content, social, Douyin/WeChat/Xiaohongshu |\n| `paid-media`        |   7   | persona  | PPC, tracking, campaign audits                      |\n| `sales`             |   8   | persona  | Outbound, deals, discovery, proposals               |\n| `finance`           |   6   | persona  | FPA, bookkeeping, tax, investments                  |\n| `support`           |   5   | persona  | Customer support, compliance, analytics             |\n| `academic`          |   5   | persona  | Research, psychology, history, anthropology         |\n| `game-development`  |  20   | persona  | Unity, Unreal, Godot, Roblox, Blender               |\n| `spatial-computing` |   6   | persona  | visionOS, WebXR, Metal, XR interaction              |\n| `specialized`       |  17   | persona  | Blockchain audit, MCP builder, Salesforce, ZK, niche |\n\nEach agent carries structured frontmatter: `description`, `tags`,\n`domains`, `distinguishes_from` (near-peers), `disambiguation`\n(one-line \"when to pick this over X\"), `version`, and `updated_at`.\nThe orchestrator reads all of this for tie-breaking when multiple\ncandidates match a task's tags.\n\n---\n\n## Mechanical enforcement\n\nThe enforcement layer is what separates Harmonist from a \"nice prompt\npack\". It lives in `hooks/` and gets installed into `.cursor/hooks/`\nat integration time.\n\n### Five hook phases\n\n| Phase              | What happens                                                                |\n|--------------------|-----------------------------------------------------------------------------|\n| `sessionStart`     | Bootstrap correlation_id, inject last 3 state / decision memory entries, warn about prior incidents |\n| `afterFileEdit`    | Record every write to session state for the stop gate                       |\n| `subagentStart`    | Parse `AGENT: <slug>` marker, credit the reviewer, enforce `readonly` capability scoping |\n| `subagentStop`     | Record verdict, update telemetry                                            |\n| `stop`             | **The gate.** Verify reviewers ran, memory updated, protocol satisfied. Return `followup_message` if not. |\n\n### What the stop gate actually checks\n\nIf the session touched any file outside ignored patterns:\n\n1. At least one `category: review` agent was invoked via Task.\n2. Specifically `qa-verifier` was invoked.\n3. `.cursor/memory/session-handoff.md` was updated during the session.\n\nIf any check fails, the hook returns `followup_message` telling the AI\nexactly what's missing. `loop_limit: 3` caps retries. On exhaustion,\nthe incident is persisted to `.cursor/hooks/.state/incidents.json`\nand surfaced in the next session as an unmissable banner.\n\n### PROTOCOL-SKIP escape hatch\n\nFor genuinely trivial turns (typo fix in a comment, markdown\nrewording), the AI can emit `PROTOCOL-SKIP: <reason>` to bypass\nthe gate. The hook logs it. If the skip rate crosses a threshold\n(default `> 25%` of all completions, min 5 skips), the next session\nstarts with a warning about abuse. Easy to opt out of cleanly;\nhard to abuse quietly.\n\n---\n\n## Structured validated memory\n\nMemory is a contract, not free-form markdown. Every entry is a YAML\nblock delimited by `<!-- memory-entry:start -->` /\n`<!-- memory-entry:end -->` with required fields: `id`,\n`correlation_id`, `at`, `kind`, `status`, `author`, `summary`.\n\nThree files with explicit roles:\n\n| File                    | `kind`     | Purpose                              |\n|-------------------------|------------|--------------------------------------|\n| `session-handoff.md`    | `state`    | Project state snapshot. Latest = authoritative. |\n| `decisions.md`          | `decision` | Append-only architectural decisions. |\n| `patterns.md`           | `pattern`  | Lessons learned — what worked, what didn't. |\n\n### CLI as the only write path\n\n```bash\npython3 .cursor/memory/memory.py append \\\n  --file session-handoff --kind state --status done \\\n  --summary \"Integrated Stripe webhook handler\" \\\n  --tags payments,backend \\\n  --body-file /tmp/handoff-body.md\n```\n\nThe CLI:\n\n- Generates `id` and `at` deterministically.\n- Reads the active `correlation_id` from the hooks (not from the LLM).\n- Validates the entry against `memory/SCHEMA.md` before writing.\n- Scans the body for ~30 secret patterns and rejects leaks.\n- Refuses duplicates unless `--allow-duplicate`.\n\n### Search, rotate, dedupe\n\n```bash\npython3 .cursor/memory/memory.py search --tag payments\npython3 .cursor/memory/memory.py latest --file session-handoff --n 5\npython3 .cursor/memory/memory.py rotate --keep-last 50\n```\n\nThe `rotate` verb archives older entries to a sibling `.archive.md`\nfile while keeping the last N live. Both archive and live pass the\nvalidator.\n\n---\n\n## Supply-chain integrity\n\nEvery shipped file has a sha256 entry in `MANIFEST.sha256`. This buys:\n\n- **Pack healt
