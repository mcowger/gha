 — over 62% of LLM-generated test assertions were incorrect across HumanEval evaluation of four LLMs. *Source: [\"Test-Driven Development for Code Generation\" (arXiv 2402.13521)](https://arxiv.org/pdf/2402.13521), §3.2.* Both `evanflow-tdd` and the overseer review explicitly check whether a one-character bug in the implementation would still let the assertion pass.\n- **Five Failure Modes pass** in iterate + overseer review — hallucinated actions, scope creep, cascading errors, context loss, tool misuse. *Source: synthesized from the DAPLab failure patterns paper above.*\n- **Context drift watch** — `evanflow-compact` triggers at clean phase boundaries and on drift symptoms (re-asking settled questions, contradicting earlier decisions). *Source: nearly 65% of enterprise AI failures in 2025 were attributed to context drift or memory loss during multi-step reasoning, not raw context exhaustion — see [Alex Merced, \"Context Management Strategies for OpenCode\" (March 2026)](https://datalakehousehub.com/blog/2026-03-context-management-opencode/).*\n- **Never auto-commit, never auto-stage** — opinion, not research. Came from running the loop on real projects: every time the agent decided to integrate, it integrated wrong.\n- **No skill tax** — opinion. Skills are tools, not a tollbooth.\n\n---\n\n## The Skill Set\n\n### Default Loop (5 skills)\n\n| Skill | Purpose |\n|---|---|\n| `evanflow-brainstorming` | Clarify intent, propose 2–3 approaches with embedded grill (stress-test). Mockup quick-mode for visual-only requests. |\n| `evanflow-writing-plans` | File structure first, bite-sized tasks, embedded grill. Step 2.5 offers `evanflow-coder-overseer` if the plan is parallelizable. |\n| `evanflow-executing-plans` | Task-by-task with inline verification. Step 0 re-offers parallel path. Hands off to iterate, then STOPS. |\n| `evanflow-tdd` | Vertical-slice TDD. One test → one impl → repeat. Behavior through public interface. Assertion-correctness warning. |\n| `evanflow-iterate` | Self-review loop after implementation. Re-read diff, fix issues, run quality checks, screenshot UI (via headless Chromium). Five Failure Modes checklist. Hard cap of 5 iterations. |\n\n### Special-Purpose (8 skills)\n\n| Skill | Purpose |\n|---|---|\n| `evanflow-go` | **Single entry point.** Say \"let's evanflow this\" and it walks the whole loop. |\n| `evanflow-glossary` | Extract canonical domain terms into `CONTEXT.md`. Flag ambiguities and synonyms. |\n| `evanflow-improve-architecture` | Surface refactor opportunities via the deletion test + deep-modules vocabulary. |\n| `evanflow-design-interface` | \"Design it twice\" — spawn 3+ parallel sub-agents with radically different constraints, compare on depth/simplicity/efficiency. |\n| `evanflow-debug` | Root-cause discipline. Hypothesis stated explicitly, embedded grill before fixing, failing test first. |\n| `evanflow-review` | Both halves of code review (giving + receiving). Don't capitulate to feedback you can't justify. |\n| `evanflow-prd` | Synthesize a PRD from existing context. For substantial new features. |\n| `evanflow-qa` | Conversational bug discovery → issue draft. Asks before filing. |\n\n### Cross-Cutting (1 skill)\n\n| Skill | Purpose |\n|---|---|\n| `evanflow-compact` | Long-session context management. Strategies for proactive summarization at clean boundaries. Drift symptoms checklist. |\n\n### Meta (1 skill)\n\n| Skill | Purpose |\n|---|---|\n| `evanflow` | The index. Shared vocabulary + when to invoke each `evanflow-*` skill. |\n\n### Custom Subagents (2)\n\nIn `agents/` — invoked via `Agent` tool with `subagent_type:` parameter:\n\n| Subagent | Tool restrictions | Purpose |\n|---|---|---|\n| `evanflow-coder` | Read, Edit, Write, Glob, Grep, Bash, TodoWrite | Implementation subagent for `evanflow-coder-overseer`. Tools + system prompt prevent git ops, out-of-scope edits, value hallucination. |\n| `evanflow-overseer` | Read, Grep, Glob (no Edit/Write/Bash) | Read-only review subagent. Tools physically enforce \"report findings, never fix.\" |\n\n### Bundled Hook\n\n`hooks/block-dangerous-git.sh` — PreToolUse hook that blocks destructive git ops (`git push`, `git reset --hard`, `git clean -f`, `git branch -D`, `git checkout .`, `git restore .`). Auto-activates with the plugin install path.\n\n---\n\n## Hard Rules (apply to every skill)\n\n1. **Never auto-commit, never auto-stage, never auto-finish.** Every git write op requires you to explicitly ask in the current turn.\n2. **Never invent values.** File paths, env vars, IDs, function names, library APIs — if unsure, the agent stops and asks.\n3. **No skill tax.** Ad-hoc questions don't require a skill invocation. Skills are tools, not a tollbooth.\n4. **No forced spec/plan paths.** Files live where you want them.\n5. **Verify before claiming done.** Quality checks (typecheck, lint, test) run before any \"done\" report.\n\n---\n\n## Requirements\n\n- **[Claude Code](https://claude.com/claude-code)** (any recent version)\n- **Bash** — for the bundled hook script (Linux, macOS, or Windows + WSL)\n- **`jq`** — used by the hook script to parse Claude's JSON tool input. Install via `apt install jq`, `brew install jq`, or your platform's package manager. **If `jq` is missing, the guardrail hook fails silently and dangerous git ops are NOT blocked.**\n\nOptional but recommended:\n\n- **`chromium`** or `google-chrome` — for `evanflow-iterate`'s visual verification of UI changes (`chromium --headless --screenshot=...`). Falls back gracefully if missing — the skill flags it and asks you to verify visually.\n\n---\n\n## Installation\n\nThree paths, in priority order. All three end with the same skill set in your `.claude/skills/`. The plugin path additionally auto-wires the guardrail hook.\n\n### Path 1 — Claude Code Plugin Marketplace (recommended)\n\nThis is the cleanest install. Skills, agents, AND the guardrail hook all activate automatically.\n\n```\n/plugin marketplace add evanklem/evanflow\n/plugin install evanflow@evanflow\n```\n\nRestart Claude Code (or `/reload-plugins`). Skills appear namespaced as `/evanflow:evanflow-go`, `/evanflow:evanflow-tdd`, etc. Auto-invocation via \"let's evanflow this\" still works regardless of namespace.\n\nTo uninstall: `/plugin uninstall evanflow@evanflow`.\n\n### Path 2 — `npx skills@latest add` CLI\n\nWorks against any GitHub repo with `SKILL.md`-shaped folders. Installs skills only — **does not install the guardrail hook or custom subagents** (you'd add those manually if you want them).\n\n```bash\n# Install all 16 skills at once\nnpx skills@latest add evanklem/evanflow -s '*' -y\n\n# Or install individual skills\nnpx skills@latest add evanklem/evanflow/evanflow-go\nnpx skills@latest add evanklem/evanflow/evanflow-tdd\n# ...\n```\n\nThis places skills under `~/.claude/skills/` (global) or `.claude/skills/` (project, auto-detected).\n\n### Path 3 — Manual Copy\n\nFor users who want full control, no CLI dependencies.\n\n```bash\ngit clone https://github.com/evanklem/evanflow.git\ncd evanflow\n\n# Skills (project-level — adjust to ~/.claude/skills/ for global)\nmkdir -p .claude/skills\ncp -r skills/* .claude/skills/\n\n# Agents (custom subagents used by evanflow-coder-overseer)\nmkdir -p .claude/agents\ncp agents/*.md .claude/agents/\n\n# Git guardrails hook (optional but recommended)\nmkdir -p .claude/hooks\ncp hooks/block-dangerous-git.sh .claude/hooks/\nchmod +x .claude/hooks/block-dangerous-git.sh\n```\n\nThen register the hook in your `.claude/settings.json`:\n\n```json\n{\n  \"hooks\": {\n    \"PreToolUse\": [\n      {\n        \"matcher\": \"Bash\",\n        \"hooks\": [\n          {\n            \"type\": \"command\",\n            \"command\": \"\\\"$CLAUDE_PROJECT_DIR\\\"/.claude/hooks/block-dangerous-git.sh\"\n          }\n        ]\n      }\n    ]\n  }\n}\n```\n\nOptionally, paste `examples/CLAUDE.md.snippet` into your project's `CLAUDE.md` to brief Claude about EvanFlow's conventions.\n\n### Verify Any Install Path\n\nRestart Claude Code. Try saying:\n\n> \"Let's evanflow this — I want to add a small feature that does X.\"\n\n`evanflow-go` should fire and walk you through the loop. To verify the guardrail hook (paths 1 and 3 only): try `git reset --hard HEAD` from the Bash tool — it should be blocked with \"BLOCKED: ... matches dangerous pattern\".\n\n---\n\n## Customization\n\nEvery skill has a clear structure with a `## Hard Rules` section. To adapt to your project:\n\n- **Replace `<frontend>` and `<backend>` placeholders** in skills like `evanflow-writing-plans` with your actual paths if you find yourself answering the same question repeatedly.\n- **Document your project's quality checks** in your `CLAUDE.md` — exact `typecheck`, `lint`, and `test` commands. The skills reference these abstractly.\n- **Adapt the visual verification step** in `evanflow-iterate` if you don't have `chromium` available — substitute `google-chrome --headless` or another tool.\n- **Edit the cohesion contract template** in `evanflow-coder-overseer` to match your project's conventions (your authentication middleware name, your DB write helper, etc.).\n\nThe skills are designed to be edited. Treat them as starting points, not gospel.\n\nIf you fork to make a vendor-specific variant (your-name-flow), great — that's the spirit.\n\n---\n\n## How EvanFlow Works End-to-End\n\n```\nYou say: \"let's evanflow this — I want to add a feature that does X\"\n           │\n           ▼\n       evanflow-go (the conductor)\n           │\n           ├─ Phase 0: Restate idea, scope check\n           ├─ Phase 1: evanflow-brainstorming (CHECKPOINT: design approval)\n           ├─ Phase 2: evanflow-writing-plans (CHECKPOINT: plan approval)\n           │            └─ Step 2.5: parallelization check\n           ├─ Phase 3: evanflow-executing-plans (sequential)\n           │            OR\n           │            evanflow-coder-overseer (parallel)\n           │              ├─ contract with named tests + integration tests\n           │              ├─ RED checkpoint (all coders write failing tests, orchestrator verifies)\n           │              ├─ GREEN phase (vertical-slice TDD per coder)\n           │              ├─ per-coder overseers (review, never fix)\n           │              └─ integration overseer (runs touchpoint tests)\n           ├─ Phase 4: evanflow-iterate (5x cap, Five Failure Modes pass)\n           └─ Phase 5: STOP. Report what was done. Await your direction.\n```\n\nCross-cutting: `evanflow-compact` runs at clean boundaries when context gets heavy.\n\nSpecial-purpose skills (`evanflow-debug`, `evanflow-improve-architecture`, `evanflow-design-interface`, `evanflow-glossary`, `evanflow-prd`, `evanflow-qa`, `evanflow-review`) are pulled in mid-flow when relevant.\n\n---\n\n## Repository Structure\n\n```\n.\n├── .claude-plugin/\n│   ├── plugin.json          — plugin identity (name, description, version)\n│   └── marketplace.json     — marketplace manifest (lists EvanFlow as one bundled plugin)\n├── skills/                  — 16 SKILL.md folders\n│   ├── evanflow/\n│   ├── evanflow-go/\n│   ├── evanflow-brainstorming/\n│   ... (etc)\n├── agents/                  — 2 custom subagent definitions\n│   ├── evanflow-coder.md\n│   └── evanflow-overseer.md\n├── hooks/\n│   ├── hooks.json           — auto-activated when plugin installs\n│   └── block-dangerous-git.sh\n├── examples/\n│   └── CLAUDE.md.snippet    — for the manual-copy install path\n├── docs/\n│   └── skills-audit.md      — verdict on all 38 candidate skills considered\n├── README.md\n└── LICENSE                  — MIT\n```\n\n---\n\n## Credits\n\nEvanFlow synthesizes ideas from:\n\n- **[mattpocock/skills](https://github.com/mattpocock/skills)** by Matt Pocock — vertical-slice TDD, deep modules, deletion test, design-it-twice, ubiquitous language, grill-me, caveman.\n- **[superpowers](https://github.com/obra/superpowers)** by Jesse Vincent — verification-before-completion, code review patterns, parallel agent dispatch, finishing-a-development-branch (the 4-option presentation).\n- **[git-guardrails-claude-code](https://github.com/mattpocock/skills/tree/main/git-guardrails-claude-code)** — bundled in `hooks/` (script copied verbatim). Original by Matt Pocock.\n\nIndustry research informing the design:\n\n- Anthropic's [2026 Agentic Coding Trends Report](https://resources.anthropic.com/hubfs/2026%20Agentic%20Coding%20Trends%20Report.pdf?hsLang=en)\n- [9 Critical Failure Patterns of Coding Agents (DAPLab, Columbia)](https://daplab.cs.columbia.edu/general/2026/01/08/9-critical-failure-patterns-of-coding-agents.html)\n- [Test-Driven Development for Code Generation](https://arxiv.org/pdf/2402.13521) (arXiv 2402.13521) — assertion-correctness findings\n\n---\n\n## License\n\nMIT. See [LICENSE](LICENSE).\n\n---\n\n## Contributing\n\nIssues and pull requests welcome. EvanFlow is opinionated by design — proposals to add ceremony or auto-actions will be politely declined. Proposals to **further reduce** ceremony, sharpen rules, or add evidence-backed improvements are very welcome.\n","summary":"EvanFlow is a structured, AI‑augmented iterative feedback loop that guides development from brainstorming to a finished feature while embedding test‑driven development at every stage. It orchestrates a sequence of skills—brainstorm, plan, execute with vertical‑slice TDD, and iteration—while inserting checkpoints for user approval; it never auto‑commits or forces ceremonies, keeping the developer in control. For larger tasks it can spawn parallel “coder” and “overseer” subagents that enforce interface contracts through integration tests. Developers working on medium to large codebases who value disciplined, TDD‑centric AI assistance and rigorous checkpoints will benefit most from EvanFlow.","description":"A TDD-driven iterative feedback loop for software development. 16 cohesive Claude Code skills walk an idea from brainstorm → plan → execute → iterate, with checkpoints throughout.","stars":381,"language":"Shell"},{"owner":"jameesy","repo":"foundry-vault","url":"https://github.com/jameesy/foundry-vault","readme":"![Foundry](docs/header.png)\n\n# Foundry\n\nA personal knowledge vault maintained by Claude. You collect sources. Claude compiles them into a wiki of concepts, connections, and open questions.\n\nBased on [Andrej Karpathy's LLM wiki pattern](https://x.com/karpathy/status/2039805659525644595): raw source documents go in, an LLM incrementally compiles them into concept articles with backlinks, and the wiki becomes a rich substrate for Q&A and further research.\n\n## Quick start\n\n1. **Clone this repo** and open it in [Obsidian](https://obsidian.md)\n2. **Install Claude Code** — [claude.ai/code](https://claude.ai/code) (or your preferred agent!)\n3. **Drop something into `inbox/`** — a URL, a web clipping (via [Obsidian Web Clipper](https://obsidian.md/clipper)), a PDF, or pasted text\n4. **Run `/foundry-ingest`** — Claude processes everything in the inbox into clean source notes\n5. **Run `/foundry-compile`** — Claude scans for un-compiled sources and builds concept articles when themes recur across 2+ sources\n6. **Run `/foundry-ask`** followed by a question — Claude researches your question across the vault and writes a report\n\nThat's it. Drop, ingest, compile. The vault grows itself.\n\n## How it works\n\n### Three layers\n\n| Directory | Purpose | Who writes |\n|---|---|---|\n| `inbox/` | Staging for unprocessed drops | You |\n| `sources/` | One atomic note per article, paper, or transcript | Claude |\n| `wiki/` | Concept articles, people pages, query reports, index, and log | Claude |\n\n### The contract\n\nYou curate what goes in. Claude writes and maintains the derived layer. The separation matters — your taste decides what's worth keeping; Claude does the synthesis work that humans can't sustain at scale.\n\n### The 2-source rule\n\nClaude won't create a concept article from a single source. Themes are logged as **candidates** in `wiki/_meta/index.md` until a second independent source confirms the pattern. This prevents the wiki from filling up with speculative one-offs.\n\n### What compounds\n\n- **Sources** build the raw material\n- **Concepts** crystallise when themes recur\n- **Queries** (`/foundry-ask`) produce research reports that get filed back into the wiki — so questions add up over time\n- **Research threads** emerge as clusters of 3+ concepts sharing keywords\n\n## The four commands\n\n| Command | What it does |\n|---|---|\n| `/foundry-ingest` | Process inbox into source notes |\n| `/foundry-compile` | Build or extend concept articles from un-compiled sources |\n| `/foundry-ask` | Research a question across the vault |\n| `/foundry-lint` | Health-check: stats, orphans, keyword drift |\n\n## Companion vault (optional)\n\nIf you already keep personal notes (a commonplace, Zettelkasten, or notes folder), you can point Claude at it as a read-only companion. Claude will cross-reference your notes when compiling but never write into them. See `CLAUDE.md` for setup.\n\n## Customisation\n\n- **Areas**: Edit the `#area/` taxonomy in `CLAUDE.md` to match your interests\n- **Keywords**: Managed in `wiki/_meta/index.md` — add new ones as your reading grows\n- **Obsidian theme**: The `.obsidian/` config is included with a clean setup. Swap themes or plugins as you like\n- **Voice**: Concept articles are written as sharp foundations for *your* writing, not finished essays. Adjust the voice instructions in `CLAUDE.md` if you want a different tone\n\n## What's included\n\nThis template ships with two example sources and one example concept to show the structure:\n\n- `sources/LLM Knowledge Bases (Karpathy).md` — the post that inspired this vault pattern\n- `sources/What Matters in the Age of AI Is Taste.md` — on taste as the human differentiator in AI-augmented work\n- `wiki/Two-layer knowledge systems.md` — a concept article compiled from both sources\n- `wiki/Andrej Karpathy.md` — an example people page\n\nDelete these and clear `wiki/_meta/index.md` once you've seen how they work, or keep them as seeds for your own vault.\n\n## Schema\n\nEverything Claude needs to know is in `CLAUDE.md`. That file is the single source of truth for how the vault operates. Read it if you want to understand or modify the rules.\n\n---\n\nBuilt with [Claude Code](https://claude.ai/code) and [Obsidian](https://obsidian.md).\n","summary":"Foundry is an automated personal knowledge vault that uses Claude and Obsidian to turn raw reading material into a structured wiki of concepts, connections, and research reports. New sources are dropped into an inbox, then ingested into clean source notes, and an LLM compiles recurring themes into concept articles only when corroborated by at least two independent sources. Users can query the vault with `/foundry‑ask` to generate research reports, and the system includes health‑check and linting commands to keep the knowledge base tidy. The tool is ideal for independent researchers, writers, and knowledge‑workers who want a scalable, self‑growing repository of ideas without manual curation.","description":"An agentic Obsidian vault: you curate, Claude compiles.","stars":81,"language":null},{"owner":"systalyze","repo":"utilyze","url":"https://github.com/systalyze/utilyze","readme":"# Utilyze\n\nUtilyze measures how efficiently your GPU is doing useful work, not just whether it's busy. It runs live against your workload with negligible overhead.\n\n![utlz in action](./assets/utlz.png)\n\nStandard tools like `nvidia-smi` and `nvtop` only check whether a kernel is running on the GPU. They can show 100% while your workload is using a tiny fraction of the hardware's real capacity. \n\nUtilyze reads GPU performance counters directly to show what's actually being used, and provides an estimate of how far you can push utilization given a workload, model, and hardware. To learn more, read [our blog post](https://systalyze.com/utilyze).\n\nUtilyze is created by [Systalyze](https://systalyze.com).\n\n**Read this in other languages:** [中文](./README.zh-CN.md)\n\n## Requirements\n\n- Linux amd64 (arm64 support coming soon)\n- NVIDIA Ampere or newer GPU (A100, H100, H200, B200, RTX 3000+)\n- CUDA Toolkit 11.0+\n- `sudo` or `CAP_SYS_ADMIN` (see below), or privileged container\n\n## Installation\n\n```bash\n# macOS/Linux\ncurl -sSfL https://systalyze.com/utilyze/install.sh | sh\n\n# Windows\niex (curl.exe -L https://systalyze.com/utilyze/install.ps1 | Out-String)\n```\n\nFor macOS and Windows versions, **Utilyze acts as a client for another Utilyze process running on a remote Linux machine with profiling capabilities.** These do not require root nor any native libraries. On Windows, you may need to add an exception to executable path for Windows Defender and then reinstall Utilyze:\n\n```powershell\nAdd-MpPreference -ExclusionPath <INSTALL_DIR>\niex (curl.exe -L https://systalyze.com/utilyze/install.ps1 | Out-String)\n```\n\nUtilyze will likely require root for profiling capabilities depending on your host configuration (see below) and will prompt you for your password during installation to install it system-wide.\n\nIf CUPTI 12+ is not found, `utlz` will prompt you to install the latest release from PyPI on first run.\n\n## Usage\n\nOn a Linux machine with profiling capabilities, you can:\n```bash\n# monitor all GPUs for SOL metrics\nsudo utlz\n\n# monitor specific GPUs\nsudo utlz --devices 0,2\n\n# show discovered inference server endpoints per GPU\nsudo utlz --endpoints\n```\nThis starts a WebSocket server that listens for connections from other Utilyze processes on port 8079 by default. Further instances will automatically connect to the same server.\n\nOn a macOS/Windows machine, you can connect to a running server with:\n```bash\nutlz --connect <SERVER_URL>\n```\n\nNote that a single device ID can only be monitored by a single instance of `utlz`. This is due to the way NVIDIA's Perf SDK API handles device access.\n\n### Attainable SOL\n\nUtilyze discovers running inference servers to detect which model is loaded on each GPU. It computes an attainable compute SOL ceiling (your realistic peak given that model and hardware).\n\nCurrently Utilyze only supports vLLM as a backend, with more (e.g. SGLang) coming soon. We are expanding model and hardware coverage over time; at present we support a subset of models on H100-80G and A100-80G GPUs within a node (up to 8 GPUs).\n\nTo enable this, Utilyze anonymously sends GPU configuration data to Systalyze's servers. Disable with `UTLZ_DISABLE_METRICS=1`.\n\n### Running without sudo\n\nBy default, NVIDIA restricts GPU profiling counters to admin users. To allow non-root access, disable the restriction on the host and reboot:\n\n```bash\necho 'options nvidia NVreg_RestrictProfilingToAdminUsers=0' | sudo tee /etc/modprobe.d/nvidia-profiling.conf\nsudo reboot\n```\n\nAfter this, `utlz` can run without sudo. If `utlz` warns about missing capabilities, you can disable the warning via `UTLZ_DISABLE_PROFILING_WARNING=1` (see Options).\n\n### Options\n\nFlags (most have environment variable equivalents):\n\n- `--endpoints`: show discovered inference server endpoints per GPU\n- `--devices` / `UTLZ_DEVICES`: monitor specific GPUs (comma-separated list of device IDs)\n- `--log` / `UTLZ_LOG`: a file to write logs to (default: no logging)\n- `--log-level` / `UTLZ_LOG_LEVEL`: set the log level (default: `INFO`, other options: `DEBUG`, `WARN`, `ERROR`)\n- `--version`: show the version\n\nEnvironment variables only:\n\n- `UTLZ_DISABLE_PROFILING_WARNING`: disable the warning about GPU profiling capabilities on startup\n- `UTLZ_BACKEND_URL`: set the backend URL for Systalyze's roofline SOL metrics API (default: `https://api.systalyze.com/v1/utilyze`)\n- `UTLZ_DISABLE_METRICS`: disable workload detection and Systalyze roofline SOL metrics API\n\n## Build from source\n\nTo build from source you'll need:\n\n- Go 1.25+ for the CLI\n- Docker for building the native library with wide compatibility\n- CUDA Toolkit (13.1 is linked against by default but can be set via `CUDA_VERSION`)\n\n```bash\n# build the native library and the CLI\nmake all\n\n# build and package the native library via Docker\nmake dist-tarball-docker\n\n# build the CLI only\nmake utlz\n```\n\nThere is experimental support for ARM64 builds using the sbsa-linux CUDA target.\n","summary":"Utilyze provides a real‑time view of how efficiently a GPU is performing useful work by reading NVIDIA performance counters directly, rather than simply reporting whether a kernel is running. It calculates attainable theoretical utilization ceilings (SOL) for current workloads, models, and hardware, and can automatically discover inference servers such as vLLM to estimate realistic performance limits. The tool runs on Linux with CUDA 11+ and NVIDIA Ampere or newer GPUs, offering a lightweight profiling daemon that can be connected to from macOS or Windows clients. Engineers and researchers who need to diagnose GPU under‑utilization in deep‑learning pipelines or validate model scaling will find Utilyze particularly valuable.","description":null,"stars":274,"language":"Go"},{"owner":"mendrik-private","repo":"sqv","url":"https://github.com/mendrik-private/sqv","readme":"# sqview\n\n**sqview** is a keyboard-first terminal viewer for SQLite databases. It is built for fast table browsing, in-place editing, filtering, sorting, and foreign-key navigation without leaving the terminal.\n\n<img width=\"2874\" height=\"1593\" alt=\"image\" src=\"https://github.com/user-attachments/assets/c4e6ffbb-f28f-40fe-892c-0abf9f2fc5d0\" />\n<br/>\n<img width=\"2874\" height=\"1593\" alt=\"image\" src=\"https://github.com/user-attachments/assets/43446fd9-01b1-4856-999a-2a59e59fb183\" />\n\n## Highlights\n\n- Fast virtual scrolling for large tables\n- Rich cell editors for text, enums, dates, datetimes, and foreign keys\n- Per-column filters, sorting, and alphabet jump navigation\n- Export current views to CSV, JSON, or SQL\n- Read-only mode for safe inspection\n\n## Install\n\n### Debian/Ubuntu package\n\nDownload the latest Debian package from GitHub Releases and install it directly:\n\n```bash\ntmp_deb=\"$(mktemp /tmp/sqview-linux-amd64.XXXXXX.deb)\"\ncurl -fL --retry 5 --retry-all-errors --retry-delay 2 -o \"$tmp_deb\" \\\n  https://github.com/mendrik-private/sqv/releases/latest/download/sqview-linux-amd64.deb\nchmod 0644 \"$tmp_deb\"\nsudo apt install \"$tmp_deb\"\nrm -f \"$tmp_deb\"\n```\n\nThis installs the `sqview` package and the `sqview` command, avoiding the `sqv` name collision with Ubuntu's OpenPGP tool.\n\n### Release binary\n\nDownload the latest Linux binary archive from GitHub Releases and install it into `/usr/local/bin`:\n\n```bash\ncurl -fL --retry 5 --retry-all-errors --retry-delay 2 -o sqview-linux-x86_64.tar.gz \\\n  https://github.com/mendrik-private/sqv/releases/latest/download/sqview-linux-x86_64.tar.gz\ntar -xzf sqview-linux-x86_64.tar.gz\nsudo install -m 0755 sqview /usr/local/bin/sqview\n```\n\n### From source\n\n```bash\ncargo install --path . --bin sqview\n```\n\nOr run directly from the checkout:\n\n```bash\ncargo run --release -- path/to/database.db\n```\n\nUse the built-in help to inspect the current CLI surface:\n\n```bash\nsqview --help\nsqview --version\n```\n\n## Usage\n\n```text\nsqview [OPTIONS] <DB_PATH>\nsqview check-terminal\nsqview paths\n```\n\n- `DB_PATH`: path to a SQLite database, or `:memory:`\n- `--readonly`: disable writes\n- `--no-watch`: disable automatic external refresh when the database file changes\n- `check-terminal`: print detected terminal capabilities\n- `paths`: print the config, data, and filter-state paths used by sqview\n\n## Keybindings\n\n### Navigation\n\n| Key | Action |\n|-----|--------|\n| `↑ ↓ ← →` / `h j k l` | Move focused cell |\n| `Home` / `End` | First / last column in row |\n| `Ctrl-Home` / `Ctrl-End` | First / last cell in table |\n| `PgUp` / `PgDn` / `Ctrl-↑` / `Ctrl-↓` | Scroll one viewport |\n| `Mouse wheel` | Scroll rows |\n| `Shift-wheel` | Scroll columns |\n| `Click cell` | Focus cell |\n\n### Editing\n\n| Key | Action |\n|-----|--------|\n| `Enter` | Open the focused cell picker/editor |\n| `Alt-Enter` | Insert a newline in the direct text editor |\n| `e` | Open the focused cell in the direct editor |\n| `n` | Set the focused cell to `NULL` when allowed |\n| `Esc` | Close popup |\n| `Ctrl-Enter` | Save an inserted row from the staged row editor |\n| `i` | Insert row in a staged editor, then validate on save |\n| `d` | Delete row |\n| `Ctrl-z` | Undo last write |\n\n### Filtering, sorting, and other actions\n\n| Key | Action |\n|-----|--------|\n| `s` | Cycle sort on focused column |\n| `f` | Open filter popup for focused column |\n| `Shift-F` | Clear filters |\n| `j` | Jump through a foreign key |\n| `Backspace` | Jump back |\n| `Ctrl-b` | Toggle sidebar |\n| `Ctrl-Shift-P` | Command palette |\n| `Ctrl-Q` | Quit |\n\n## Configuration\n\nConfiguration is read from:\n\n```text\n$XDG_CONFIG_HOME/sqview/config.toml\n```\n\nExisting `sqv` config and filter state directories are still used automatically when present, so current users do not need to migrate anything immediately.\n\nExample:\n\n```toml\nnerd_font = true\n```\n\n## Development\n\n### Local validation\n\n```bash\ncargo fmt\ncargo clippy -- -D warnings\ncargo test\n```\n\n### Release pipeline\n\nGitHub Actions provides:\n\n1. **CI** on pushes and pull requests: format check, clippy, and tests\n2. **Tagged releases** on `v*` tags:\n    - build the release binary\n    - build a Debian package\n    - publish GitHub Release assets\n3. **Manual releases** from the Actions tab:\n    - use the selected branch's `Cargo.toml` version as the release tag\n    - create or update the matching GitHub Release for that commit\n\nTo cut a release:\n\n```bash\ngit tag v0.1.5\ngit push origin v0.1.5\n```\n","summary":"sqview is a keyboard‑first terminal application for exploring SQLite databases, allowing users to browse, edit, filter, and sort tables directly in the console. It offers fast virtual scrolling for large tables, rich in‑place editors for text, enums, dates, and foreign keys, per‑column filtering and sorting, and a sidebar for foreign‑key navigation, plus export to CSV, JSON, or SQL. The tool is lightweight with minimal dependencies, easily installable via Debian packages, binary releases, or Cargo, and supports a read‑only mode for safe inspection. It is ideal for developers, system administrators, or data analysts who need a fast, scriptable way to inspect or edit SQLite data without leaving the terminal.","description":"sqlite3 viewer","stars":136,"language":"Rust"},{"owner":"julianmemberstack","repo":"marko","url":"https://github.com/julianmemberstack/marko","readme":"# [Marko](https://askmarko.xyz/)\n\nA grumpy senior code reviewer for [Claude Code](https://docs.claude.com/en/docs/claude-code) and [Codex](https://github.com/openai/codex). He reviews your changes, tells you what's wrong, and never suggests fixes.\n\nMore at **[askmarko.xyz](https://askmarko.xyz/)**.\n\n```\n**Verdict:** bad\n\nThree concurrency bugs and a log line leaking PII.\n\n1. `src/worker.ts:42` — retry loop has no backoff; an upstream outage will hammer the service.\n2. `src/worker.ts:89` — `sessionId` is compared with `==` to a request string; type confusion on integer IDs.\n3. `src/auth.ts:14` — full email logged at info; move to debug or redact.\n4. `src/queue.ts:110` — inner `flush()` is not awaited; writes can be dropped on shutdown.\n```\n\n## What he does\n\n- Reviews your current `git diff`, branch diff, or recent edits.\n- Returns a one-word verdict: **`catastrophe` / `bad` / `mediocre` / `ok`**.\n- Lists concrete, `file:line`-anchored gripes that a coding agent can act on directly.\n- Never suggests fixes. Never softens. Never pads. \"ok\" is the ceiling and it is rare.\n\nThe point is signal-to-noise. A review that ends \"LGTM, ship it\" contains no information. Marko's does.\n\n## Install\n\nOne command, installs for both tools:\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/julianmemberstack/marko/main/install.sh | bash\n```\n\nFlags:\n\n```bash\n# Just one tool\ncurl -fsSL https://raw.githubusercontent.com/julianmemberstack/marko/main/install.sh | bash -s -- --claude-only\ncurl -fsSL https://raw.githubusercontent.com/julianmemberstack/marko/main/install.sh | bash -s -- --codex-only\n```\n\nOr manually:\n\n- **Claude Code:** copy `SKILL.md` to `~/.claude/skills/marko/SKILL.md`\n- **Codex:** copy `codex/marko.md` to `~/.codex/prompts/marko.md`\n\n## Use\n\n### Claude Code\n\nAddress him by name. Natural language triggers the skill:\n\n- `marko?`\n- `what do you think marko?`\n- `hey marko, take a look`\n- `marko thoughts on this branch?`\n\nHe picks what to review in this order: uncommitted `git diff` → branch diff → recently edited files → asks you.\n\nYou will need to restart your Claude Code session once after install so the new skill is picked up.\n\n### Codex\n\nType `/marko` in a session. Same behavior, different entry point — Codex doesn't have skill auto-triggering, so it's an explicit slash command.\n\n### Periodic reviews\n\nWant Marko watching while you work? In Claude Code:\n\n```\n/loop 10m marko?\n```\n\nOr wire a `Stop` hook in `~/.claude/settings.json` so he chimes in after every turn.\n\n## How it works\n\nMarko is a prompt, not a tool. The repo contains two files:\n\n- `SKILL.md` — the Claude Code skill. Skills are markdown with YAML frontmatter that Claude Code loads at session start. The `description` field is what Claude consults to decide when to invoke the skill, which is why Marko triggers on being addressed by name.\n- `codex/marko.md` — the Codex custom prompt. Plain markdown injected into the conversation when you type `/marko`.\n\nThe two files contain the same instructions with minor framing differences (third-person \"Marko does X\" vs. second-person \"you do X\") so each tool's invocation model reads naturally.\n\n## Design\n\nA few deliberate choices that make Marko actually useful instead of just funny:\n\n- **No praise inflation.** \"ok\" means the code is actually good. This is the point of the whole exercise — a verdict is only information if it distinguishes good from bad.\n- **No suggested fixes.** Forces each complaint to stand on its own. Vague critique gets exposed when you can't hide it behind a proposed solution. Also keeps the output short.\n- **`file:line` anchors on every gripe.** The output is designed to be consumed by another agent (Claude Code, Codex) that then fixes the issues. Vague complaints are useless for that; concrete ones are actionable.\n- **Few words.** A reviewer who writes three paragraphs per gripe is not reviewing, they are performing.\n- **No caricature.** The \"grumpy senior engineer\" persona exists to strip out flattery and verbosity. No accent, no stereotypes, no theatre.\n\n## Uninstall\n\n```bash\nrm -rf ~/.claude/skills/marko ~/.codex/prompts/marko.md\n```\n\n## License\n\nMIT. See [LICENSE](./LICENSE).\n","summary":"Marko is a no‑fluff, grumpy code‑reviewer assistant for Claude Code and Codex that examines your recent changes and delivers a concise verdict—one of “catastrophe,” “bad,” “mediocre,” or “ok”—along with concrete file:line‑anchored complaints. It pulls the latest `git diff` or branch diff automatically, refuses to suggest fixes, and is invoked either by addressing Marko in natural language or via a `/marko` slash command. The project is lightweight to install with a single curl script, supports periodic reviews, and is ideal for developers who want quick, actionable feedback without the marketing noise typical of automated review tools.","description":"Marko — a grumpy senior code reviewer for Claude Code and Codex. Verdict, concrete gripes, no praise inflation, no suggested fixes.","stars":91,"language":"Shell"},{"owner":"kiwifs","repo":"kiwifs","url":"https://github.com/kiwifs/kiwifs","readme":"<p align=\"center\">\n  <img src=\"kiwifs.png\" alt=\"KiwiFS\" width=\"200\" />\n</p>\n\n<h1 align=\"center\">KiwiFS</h1>\n\n<p align=\"center\">\n  <strong>Knowledge filesystem agents can write to, search, query, and trust.</strong>\n</p>\n\n<p align=\"center\">\n  Agents write with <code>cat</code>. Humans read in a wiki. Git versions everything. One binary, zero config.\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/kiwifs/kiwifs/actions/workflows/ci.yml\"><img src=\"https://github.com/kiwifs/kiwifs/actions/workflows/ci.yml/badge.svg\" alt=\"CI\"></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/badge/license-BSL--1.1-blue\" alt=\"License: BSL 1.1\"></a>\n  <a href=\"https://github.com/kiwifs/kiwifs\"><img src=\"https://img.shields.io/badge/go-1.25-00ADD8?logo=go&logoColor=white\" alt=\"Go 1.25\"></a>\n  <a href=\"https://github.com/kiwifs/kiwifs\"><img src=\"https://img.shields.io/badge/single_binary-yes-green\" alt=\"Single Binary\"></a>\n  <a href=\"https://github.com/kiwifs/kiwifs\"><img src=\"https://img.shields.io/badge/PRs-welcome-brightgreen\" alt=\"PRs Welcome\"></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://kiwifs.mintlify.app\">Docs</a> · <a href=\"FAQ.md\">FAQ</a> · <a href=\"ROADMAP.md\">Roadmap</a> · <a href=\"CONTRIBUTING.md\">Contributing</a>\n</p>\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/kiwifs/kiwifs/main/install.sh | sh\nkiwifs init --root ./knowledge && kiwifs serve --root ./knowledge\n# Open http://localhost:3333\n```\n\n**Or with Docker:**\n\n```bash\ndocker run -p 3333:3333 -v ./knowledge:/data ameliaanhlam/kiwifs\n```\n\n---\n\n## The problem\n\nKnowledge filesystems for agents are an emerging primitive — but files are just files. Or are they?\n\nCurrent solutions fall into one of these camps:\n\n- **Database tables pretending to be files** — no search, no versioning, no human interface. You get `read()` and `write()`, nothing else.\n- **Read-only retrieval layers** — agents can search but can't write. The filesystem is a one-way mirror.\n- **Flat markdown logs** — no structure, no queries, no importance scoring. The naive approach everyone outgrows.\n- **Ephemeral sandboxes** — agent dies, files die. No persistence across sessions.\n- **Proprietary SaaS** — locked to a vendor's ecosystem. Can't self-host, can't extend.\n\nA real knowledge filesystem needs to be all of these at once:\n\n- **Writable** — agents write with `cat`, `echo`, `curl`, or MCP tools. Not read-only, not API-only.\n- **Searchable** — full-text (BM25) and semantic (vector) over the same files.\n- **Queryable** — structured queries over typed metadata, not just keyword matching.\n- **Trustworthy** — every write is a Git commit. Immutable audit trail. Crash recovery. Blame.\n- **Human-readable** — a web UI with wiki links, backlinks, and graph view. Not pgAdmin.\n\nKiwiFS is all five.\n\n```\nAGENT                              HUMAN\n─────                              ─────\ncat /kiwi/pages/auth.md            Web UI (like Obsidian Publish\ngrep -r \"timeout\" /kiwi/             + Notion's block editor)\necho \"# Report\" > /kiwi/r.md      wiki links, graph view, search\n\n       ↕                                ↕\n     ┌──────────────────────────────────────┐\n     │         Markdown files in folders    │\n     │         (the single source of truth) │\n     └──────────────────────────────────────┘\n       ↕                ↕              ↕\n    Git versioning   FTS5 + vector   SSE events\n    (audit trail)    (search index)  (live updates)\n```\n\n## Why files, not a database\n\nThis is the core design decision. Every other choice follows from it.\n\n**Files are the only format that is simultaneously human-readable, agent-native, and tool-agnostic.** `cat file.md` works in every shell, every container, every sandbox, every CI pipeline. No driver. No connection string. No SDK. The agent doesn't need to learn your API — it already knows the filesystem from training data.\n\nA Postgres table is invisible to both agents and humans without custom tooling. A JSON blob requires parsing. A proprietary format requires a client library. Markdown files require nothing.\n\nBut raw files alone aren't enough. You need versioning, search, concurrency control, a web UI. KiwiFS layers database-like guarantees **on top of** files:\n\n| Need | How KiwiFS solves it |\n|---|---|\n| **Versioning** | Git — every write is an atomic commit. Crash recovery, blame, diff, point-in-time restore. |\n| **Search** | SQLite FTS5 (BM25 ranked) + pluggable vector search. Rebuildable from files anytime. |\n| **Concurrency** | Optimistic locking via ETags (git blob hash). Standard HTTP `If-Match` / `409 Conflict`. |\n| **Structured queries** | Frontmatter → SQLite `file_meta` table. Query by field, sort, filter. |\n| **Audit trail** | Git commit log. SHA-1 hash chain. Tamper = broken chain. |\n| **Real-time sync** | SSE broadcast on every write/delete. UI updates live. |\n\nThe files are the truth. Everything else is a derivative index you can rebuild.\n\n> **\"I already have this in Postgres.\"**\n>\n> Postgres stores your data. KiwiFS makes it *accessible* — to agents via `cat`/`grep`/NFS/S3, to humans via a web UI with wiki links and graph view, to auditors via `git blame`. If your agent's knowledge lives in Postgres, your humans need a custom UI to review it, your agents need SQL to query it, and you have no audit trail. KiwiFS gives you all three interfaces over the same files.\n\n## The LLM Wiki pattern\n\nKiwiFS implements [Karpathy's LLM Wiki](https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f) as production infrastructure. The pattern: raw sources in, compiled wiki out, agent maintains it over time.\n\n```bash\nkiwifs init --template knowledge\n```\n\n```\nknowledge/\n├── SCHEMA.md          # Structure and frontmatter conventions\n├── index.md           # Auto-maintained table of contents\n├── log.md             # Append-only chronological record\n├── pages/             # Durable knowledge — one page per concept, entity, or topic\n├── episodes/          # Per-session episodic notes (consolidate into pages over time)\n└── .kiwi/\n    └── playbook.md    # Agent-readable operation guide (MCP tool sequences)\n```\n\nEvery template ships with two agent-facing documents:\n- **`SCHEMA.md`** — structure, directory layout, frontmatter field tables\n- **`.kiwi/playbook.md`** — step-by-step MCP tool sequences for each operation\n\nThe agent calls `kiwi_context` on connect to receive both documents plus the current index in one call. Operations from the playbook:\n\n- **Ingest** — process a new source, create/update pages, update index + log\n- **Query** — search the wiki to answer a question\n- **Remember** — save episodic observations during a session\n- **Consolidate** — merge episodes into durable pages\n- **Lint** — audit for orphan pages, broken links, stale content\n\nOther templates: `wiki`, `runbook`, `research`, or start blank with `kiwifs init`.\n\n---\n\n## Features\n\n### Web UI\n\nEmbedded in the binary via `go:embed`. No separate frontend deploy, no Node runtime. Obsidian's knowledge features (wiki links, backlinks, graph view) with a Notion-style block editor.\n\n- **WYSIWYG editor** — block-based (BlockNote), drag handles, 15+ block types, slash commands\n- **`[[Wiki links]]` + backlinks** — type `[[auth]]`, resolves to `pages/authentication.md`. Backlinks panel shows \"linked from 3 pages.\" This is Obsidian's core feature — notes are connected, not isolated.\n- **Knowledge graph** — visual map of all pages and their connections (Sigma.js + ForceAtlas2). Same organic clustering as Obsidian's graph view.\n- **Cmd+K search** — full-text with highlighted matches\n- **Breadcrumbs** — `Knowledge > Pages > Authentication`\n- **Table of contents** — auto-generated, sticky sidebar, scroll tracking\n- **Inline comments** — select text, add annotation. Stored in `.kiwi/comments/`, not in the markdown\n- **Dark mode** — toggle a CSS class\n- **Themeable** — CSS variables, Tailwind-based, drop into any shadcn/ui project\n\nBuilt on shadcn/ui + Radix. Accessible. Beautiful by default. Fully customizable.\n\n### Agent interface\n\nWhen your agent has a real filesystem mount:\n\n```bash\ncat /kiwi/pages/authentication.md\ngrep -r \"timeout\" /kiwi/\nls /kiwi/pages/\necho \"# New finding\" > /kiwi/pages/finding-042.md\n```\n\nWhen a real mount isn't available, agents use the REST API or MCP tools instead.\n\n### MCP (Model Context Protocol)\n\n```bash\nkiwifs mcp --root ~/knowledge          # stdio (default), in-process, no server needed\nkiwifs mcp --root ~/knowledge --http   # Streamable HTTP transport on :8080\nkiwifs mcp --remote http://host:3333   # proxy to a running KiwiFS server\n```\n\n21 tools: `kiwi_context`, `kiwi_read`, `kiwi_write`, `kiwi_search`, `kiwi_tree`, `kiwi_query_meta`, `kiwi_delete`, `kiwi_bulk_write`, `kiwi_rename`, `kiwi_query`, `kiwi_aggregate`, `kiwi_import`, `kiwi_export`, `kiwi_analytics`, `kiwi_memory_report`, `kiwi_view_refresh`, `kiwi_health_check`, `kiwi_changes`, `kiwi_append`, `kiwi_search_semantic`, `kiwi_backlinks`. Plus resources (`kiwi://schema`, `kiwi://file/{path}`, `kiwi://tree/{path}`).\n\n**Claude Desktop / Cursor:**\n```json\n{\n  \"mcpServers\": {\n    \"kiwifs\": {\n      \"command\": \"kiwifs\",\n      \"args\": [\"mcp\", \"--root\", \"/path/to/knowledge\"]\n    }\n  }\n}\n```\n\n### Search (three tiers)\n\n```bash\nkiwifs serve --search grep      # Tier 1: zero deps, exact match\nkiwifs serve --search sqlite    # Tier 2: SQLite FTS5, BM25 ranked (default)\nkiwifs serve                    # Tier 2 + vector: enable [search.vector] in config.toml\n```\n\n```\nGET /api/kiwi/search?q=payment+timeout           → BM25 ranked results\nGET /api/kiwi/search?q=\"connection reset\" AND ws  → boolean + phrase search\nPOST /api/kiwi/search/semantic                    → vector similarity search\n```\n\nVector search is pluggable — mix any embedder with any vector store:\n\n| Embedder | Vector Store |\n|---|---|\n| OpenAI, Ollama, Cohere, Vertex AI, Bedrock, custom HTTP | sqlite-vec (default), Qdrant, pgvector, Pinecone, Weaviate, Milvus |\n\nDefault (sqlite-vec + OpenAI) needs one env var and zero infrastructure. For fully offline setups: Ollama + sqlite-vec, everything runs locally.\n\n### Git versioning\n\nEvery write is an atomic git commit. Users never see Git — the API abstracts it.\n\n```\nGET /api/kiwi/versions?path=pages/auth.md      → commit history\nGET /api/kiwi/diff?path=auth.md&from=a1b&to=c3d → unified diff\nGET /api/kiwi/blame?path=pages/auth.md          → per-line attribution\n```\n\nWhat Git gives you for free: crash recovery, immutable audit trail (SHA-1 hash chain), point-in-time restore, tamper detection, replication via `git push`.\n\n### Access protocols\n\nEvery protocol flows through the same storage layer. Every write — regardless of how it enters — gets a git commit, a search index update, and an SSE broadcast.\n\n```\n┌─────────────────────────────────────────┐\n│              KiwiFS Server              │\n│                                         │\n│  REST API  │  NFS   │  S3    │ WebDAV   │\n│   :3333    │ :2049  │ :3334  │  :3335   │\n│            └────┬───┘        │          │\n│       ──────────┴────────────┘          │\n│    Storage → Git → Index → SSE          │\n└─────────────────────────────────────────┘\n```\n\n| Protocol | Use case | Example |\n|---|---|---|\n| **REST API** | Web frontend, scripts | `curl localhost:3333/api/kiwi/file?path=index.md` |\n| **MCP** | AI agents (Claude, Cursor, custom) | `kiwifs mcp --root ~/knowledge` |\n| **NFS** | Docker, Kubernetes (native mount, no FUSE, no privileged) | `docker run --mount type=nfs,...` |\n| **S3** | Backup, data pipelines, any tool that \"supports S3\" | `aws s3 sync s3://knowledge/ /backup/` |\n| **WebDAV** | Windows mapped drives, legacy tools | Map Network Drive in Explorer |\n| **FUSE** | Developer workstations, remote mount as local folder | `kiwifs mount --remote http://server:3333 ~/kiwi` |\n\n### Structured metadata\n\nFrontmatter from every markdown file is mirrored into a SQLite table. Query it:\n\n```\nGET /api/kiwi/meta?where=$.status=published&where=$.priority=high&sort=$.updated&order=desc\n```\n\n### DataView Query Language (DQL)\n\nA query language for your knowledge base — think Obsidian Dataview, but server-side:\n\n```bash\nkiwifs query 'TABLE title, status, priority FROM \"pages\" WHERE status = \"draft\" SORT priority DESC'\n```\n\n```\nGET /api/kiwi/query?q=TABLE title, status FROM \"pages\" WHERE priority = \"high\"\n```\n\nSupports `TABLE`, `LIST`, `COUNT`, `DISTINCT` queries with `WHERE`, `SORT`, `GROUP BY`, `FLATTEN`, and implicit fields (`_path`, `_updated`, `_size`). Expressions, functions, and boolean logic all work.\n\n**Computed views** — markdown files with `kiwi-view: true` in frontmatter auto-refresh their body from a DQL query:\n\n```bash\nkiwifs view create --query 'TABLE title, status FROM \"pages\"' --output views/pages.md\nkiwifs view refresh   # re-run all view queries\n```\n\n### Aggregation\n\nSQL-style aggregates over frontmatter fields:\n\n```bash\nkiwifs aggregate --group status --calc count,avg:priority\n```\n\n```\nGET /api/kiwi/query/aggregate?group_by=status&calc=count,avg:priority\n```\n\nFunctions: `count`, `avg`, `sum`, `min`, `max`. Optional `--where` filters and `--path-prefix` scoping.\n\n### Computed frontmatter\n\nDefine expressions in config that are evaluated at index time and stored as virtual frontmatter fields:\n\n```toml\n# .kiwi/config.toml\n[dataview]\ncomputed_fields.age_days = \"days_since(updated)\"\ncomputed_fields.is_long = \"len(body) > 5000\"\ncomputed_fields.priority_score = \"priority * 10 + len(tags)\"\n```\n\nThese fields appear in DQL queries and meta API responses alongside real frontmatter.\n\n### Data import\n\nBulk-import data from 18 sources into your knowledge base. Each row becomes a markdown file with structured frontmatter:\n\n```bash\nkiwifs import --from postgres --dsn \"postgres://...\" --table users --root ./knowledge\nkiwifs import --from csv --path data.csv --root ./knowledge\nkiwifs import --from json --url https://api.example.com/data --root ./knowledge\n```\n\n| Category | Sources |\n|---|---|\n| **Databases** | PostgreSQL, MySQL, SQLite, MongoDB, DynamoDB, Redis, Elasticsearch |\n| **Files** | CSV, JSON, JSONL, YAML, Excel |\n| **SaaS** | Notion, Airtable, Google Sheets, Confluence |\n| **Knowledge** | Obsidian vaults, Firebase/Firestore |\n\nFeatures: idempotent upserts (re-importing skips unchanged rows), `--dry-run`, `--columns` filtering, `--primary-key` control, `_source` / `_source_id` tracking in frontmatter.\n\n### Data export\n\nExport your knowledge base to machine-readable formats for ML pipelines, backups, or analysis:\n\n```bash\nkiwifs export --format jsonl --output knowledge.jsonl\nkiwifs export --format csv --include-embeddings --output dataset.csv\n```\n\n```\nGET /api/kiwi/export?format=jsonl&include_content=true&include_embeddings=true\n```\n\nFormats: JSONL, CSV. Optional: `--include-content` (full markdown body), `--include-links` (wiki link graph), `--include-embeddings` (vector embeddings), `--columns` filtering. Writes a `.schema.json` sidecar when exporting embeddings.\n\n### Analytics dashboard\n\nKnowledge health metrics at a glance:\n\n```bash\nkiwifs analytics                     # text summary\nkiwifs analytics --format json       # structured output\n```\n\n```\nGET /api/kiwi/analytics → { total_pages, stale_pages, orphans, broken_links, ... }\nGET /api/kiwi/health-check?path=pages/auth.md    → per-page health\n```\n\nReports: total pages, stale page count + paths, orphan pages, broken links, empty pages, pages without frontmatter, link coverage percentage, recently updated pages.\n\n### Provenance tracking\n\nKnow which agent run produced which knowledge:\n\n```bash\ncurl -X PUT localhost:3333/api/kiwi/file?path=report.md \\\n  -H \"X-Actor: agent:exec_abc\" \\\n  -H \"X-Provenance: run:run-249\" \\\n  -d \"# Run 249 Report...\"\n```\n\nKiwiFS injects `derived-from` into the frontmatter automatically. Query later: \"show me every page produced by run-249.\"\n\n### Episodic and central memory\n\nModel **per-run / episodic** notes separately from **semantic** concept pages, and use frontmatter `merged-from` to record which episodes were consolidated into a page. Run `kiwifs memory report` to list episodic files that are not yet referenced from any `merged-from` (for CI, dashboards, and merge jobs). Conventions, `[memory]` config, and a Go API live in [docs/MEMORY.md](docs/MEMORY.md).\n\n### Multi-space\n\nOne server, multiple independent knowledge bases:\n\n```\nGET /api/kiwi/{space}/tree\nGET /api/kiwi/{space}/file?path=...\n```\n\nEach space has its own root directory, git repo, search index. Spaces map to NFS exports and S3 buckets.\n\n### Real-time events\n\n```\nGET /api/kiwi/events → SSE stream\n\nevent: write\ndata: {\"path\":\"pages/finding-042.md\",\"actor\":\"agent:exec_abc\"}\n```\n\nUI updates live when knowledge changes. No polling.\n\n### Permalinks\n\nSet `public_url` in config and every API response includes stable, shareable URLs:\n\n```\nhttps://wiki.mycompany.com/page/pages/authentication.md\n```\n\n- **SPA deep linking** — `/page/{path}` routes via HTML5 history (no `#` fragments)\n- **Wiki link resolution** — `[[auth]]` resolves to the full permalink URL for external contexts (Slack, PR comments, exports)\n- **X-Permalink header** — every file read returns the permalink in the response header\n- **`KIWI_PUBLIC_URL` env var** — override config for Docker/CI without editing TOML\n\n### Knowledge health\n\nBuilt-in janitor scans your knowledge base for quality issues:\n\n- **Stale page detection** — pages not reviewed within a configurable window (default 90 days)\n- **Contradiction finder** — pages with conflicting claims on the same topic\n- **Trust-ranked search** — pages marked `status: verified` or `source-of-truth: true` rank higher\n- **Scheduled scans** — background janitor runs on a configurable interval (default 24h)\n- **Share links** — password-protected public access to specific pages (bcrypt-hashed)\n\n### CLI\n\nEvery feature is accessible via `kiwifs <command>`:\n\n| Command | What it does |\n|---|---|\n| `kiwifs serve` | Start the server (REST API + web UI + optional NFS/S3/WebDAV) |\n| `kiwifs init` | Scaffold a knowledge base from a template (`knowledge`, `wiki`, `runbook`, `research`, or `blank`) |\n| `kiwifs mcp` | Start a Model Context Protocol server (for Claude, Cursor, etc.) |\n| `kiwifs query` | Run a DQL query against the local index |\n| `kiwifs import` | Bulk-import from 18 data sources (Postgres, CSV, Notion, etc.) |\n| `kiwifs export` | Export knowledge base to JSONL or CSV |\n| `kiwifs aggregate` | Run SQL aggregates (count, avg, sum, min, max) over frontmatter |\n| `kiwifs analytics` | Knowledge health dashboard (stale, orphans, broken links) |\n| `kiwifs view` | Manage computed views (create, refresh, list) |\n| `kiwifs mount` | FUSE-mount a remote KiwiFS server as a local folder |\n| `kiwifs reindex` | Rebuild search indexes from files (FTS5 + vector + metadata) |\n| `kiwifs lint` | Validate knowledge base (orphan pages, broken links, missing frontmatter) |\n| `kiwifs backup` | Push to a git remote for off-site backup |\n| `kiwifs restore` | Clone from a git remote and rebuild indexes |\n| `kiwifs janitor` | Run a knowledge health scan (stale pages, contradictions, orphans) |\n| `kiwifs memory` | Report episodic vs `merged-from` coverage (see [docs/MEMORY.md](docs/MEMORY.md)) |\n\nAll commands support `--help` for full flag reference.\n\n---\n\n## Quickstart\n\n### 1. Install\n\n```bash\n# One-line install (macOS / Linux)\ncurl -fsSL https://raw.githubusercontent.com/kiwifs/kiwifs/main/install.sh | sh\n```\n\nOr run with Docker:\n\n```bash\ndocker run -v ./knowledge:/data -p 3333:3333 ameliaanhlam/kiwifs\n```\n\nOr build from source (requires Go 1.25+ and Node.js 20+):\n\n```bash\ngit clone https://github.com/kiwifs/kiwifs.git && cd kiwifs\ncd ui && npm install && npm run build && cd ..\ngo build -o kiwifs .\n```\n\n### 2. Initialize\n\n```bash\nkiwifs init --template knowledge --root ./knowledge\n# Creates SCHEMA.md, index.md, log.md, pages/, episodes/, .kiwi/playbook.md\n```\n\n### 3. Serve\n\n```bash\nkiwifs serve --root ./knowledge\n# REST API on :3333, web UI at http://localhost:3333\n```\n\n### 4. Write from an agent\n\n```bash\n# Via filesystem (if mounted):\necho \"# Authentication\\n\\nOAuth2 + JWT...\" > ./knowledge/pages/auth.md\n\n# Via API:\ncurl -X PUT 'localhost:3333/api/kiwi/file?path=pages/auth.md' \\\n  -H \"X-Actor: my-agent\" \\\n  -d \"# Authentication\\n\\nOAuth2 + JWT...\"\n```\n\n### 5. Browse in the web UI\n\nOpen `http://localhost:3333`. See `pages/auth.md` rendered as a styled page with wiki links, backlinks, and table of contents.\n\n---\n\n## Configuration\n\n```toml\n# .kiwi/config.toml\n\n[server]\nport = 3333\nhost = \"0.0.0.0\"\npublic_url = \"https://wiki.mycompany.com\"  # enables permalinks\n\n[storage]\nroot = \"/data/knowledge\"\n\n[search]\nengine = \"sqlite\"                # grep | sqlite\n\n[search.vector]\nenabled = true\n# Optional: lower for small CPUs/local embedders, default is 5.\nworker_count = 1\n\n[search.vector.embedder]\nprovider = \"ollama\"              # openai | ollama | cohere | bedrock | vertex | http\nmodel = \"nomic-embed-text\"\n# Optional for Ollama: Go duration string, default is 30s.\ntimeout = \"120s\"\n\n[search.vector.store]\nprovider = \"sqlite-vec\"          # sqlite-vec | qdrant | pgvector | pinecone | weaviate | milvus\n\n[versioning]\nstrategy = \"git\"                 # git | cow | none\n\n[memory]\n# episodes_path_prefix = \"episodes/\"   # optional; default episodes/\n\n[auth]\ntype = \"none\"                    # none | apikey | perspace | oidc\n```\n\nCLI flags override config: `kiwifs serve --port 4000 --search sqlite --versioning git`.\n\n---\n\n## Deployment\n\n### Docker\n\n```bash\n# Pull from Docker Hub\ndocker run -v ./knowledge:/data -p 3333:3333 ameliaanhlam/kiwifs\n\n# Or build locally\ndocker build -t kiwifs .\ndocker run -v ./knowledge:/data -p 3333:3333 kiwifs\n```\n\n### Docker Compose (with vector search)\n\nFor vector search with pgvector, add a pgvector sidecar alongside KiwiFS. Configure `[search.vector.store] provider = \"pgvector\"` in `.kiwi/config.toml`.\n\n### Embedded in your app (Go library)\n\n```go\nimport \"github.com/kiwifs/kiwifs/pkg/kiwi\"\n\nsrv, err := kiwi.New(\"/data/knowledge\", kiwi.WithSearch(\"sqlite\"))\nif err != nil { log.Fatal(err) }\ndefer srv.Close()\n\n// Mount as an HTTP handler alongside your own routes\nmux.Handle(\"/knowledge/\", http.StripPrefix(\"/knowledge\", srv.Handler()))\n\n// Or run standalone\nlog.Fatal(srv.ListenAndServe(\":3333\"))\n```\n\n### With NFS (Docker / Kubernetes)\n\n```bash\nkiwifs serve --root /data/knowledge --nfs --nfs-port 2049\n```\n\n```yaml\n# Kubernetes PersistentVolume\napiVersion: v1\nkind: PersistentVolume\nspec:\n  nfs:\n    server: kiwifs.internal\n    path: /\n```\n\n---\n\n## REST API\n\n```\nGET    /health                              → {\"status\":\"ok\"}\n\nGET    /api/kiwi/tree?path=                 → directory tree (JSON)\nGET    /api/kiwi/file?path=                 → raw markdown + ETag\nPUT    /api/kiwi/file?path=                 → write + git commit + re-index\nDELETE /api/kiwi/file?path=                 → delete + git commit\nPOST   /api/kiwi/bulk                       → multi-file write, one commit\nPOST   /api/kiwi/rename                     → atomic rename ({\"from\":\"...\",\"to\":\"...\"})\nPOST   /api/kiwi/file/append?path=          → append content to file\n\nGET    /api/kiwi/changes?since=&limit=      → git-based change feed\nGET    /api/kiwi/search?q=                  → full-text search (BM25)\nPOST   /api/kiwi/search/semantic            → vector search\n\nGET    /api/kiwi/versions?path=             → git log for file\nGET    /api/kiwi/version?path=&version=     → content at commit\nGET    /api/kiwi/diff?path=&from=&to=       → unified diff\nGET    /api/kiwi/blame?path=                → per-line attribution\n\nGET    /api/kiwi/meta?where=$.field=val     → structured query over frontmatter\nGET    /api/kiwi/backlinks?path=            → pages that link to this page\nGET    /api/kiwi/toc?path=                  → heading outline\nGET    /api/kiwi/events                     → SSE stream\nPOST   /api/kiwi/resolve-links             → resolve [[wiki-links]] to permalinks\n\nGET    /api/kiwi/stale                      → pages past their review date\nGET    /api/kiwi/contradictions             → pages with conflicting claims\nGET    /api/kiwi/search/verified            → trust-ranked search (verified pages boosted)\nGET    /api/kiwi/janitor                    → knowledge health scan\nGET    /api/kiwi/memory/report              → episodic vs merged-from coverage (JSON)\n\nGET    /api/kiwi/query?q=                   → DQL query (TABLE, LIST, COUNT, DISTINCT)\nGET    /api/kiwi/query/aggregate            → aggregation (count, avg, sum, min, max)\nPOST   /api/kiwi/view/refresh              → refresh computed views\nPOST   /api/kiwi/import                    → bulk import from data source\nGET    /api/kiwi/export                    → export to JSONL/CSV stream\nGET    /api/kiwi/analytics                 → knowledge health dashboard\nGET    /api/kiwi/health-check?path=        → per-page health metrics\nGET    /api/kiwi/context                   → schema + playbook + index in one call\n\nPOST   /api/kiwi/share                     → create a share link (password-protected)\nGET    /api/kiwi/share                     → list active share links\nDELETE /api/kiwi/share/:id                 → revoke a share link\n\nPOST   /api/kiwi/assets                     → upload binary asset (images, PDFs)\n```\n\nWrites accept `X-Actor` (git attribution), `X-Provenance` (lineage tracking), and `If-Match` (optimistic locking — 409 on conflict).\n\n---\n\n## Design principles\n\n1. **Files are the source of truth.** Every artifact is a plain markdown file. No proprietary format. Delete the search index — the files remain. `cat file.md` always works.\n\n2. **Two interfaces, one truth.** The web UI and the agent filesystem read/write the same files. No sync. No eventual consistency. One folder, two ways to access it.\n\n3. **Search is derivative.** The FTS5 index, the vector index, the metadata table — all rebuildable from files. `kiwifs reindex` and you're back. The folder is the truth, never the index.\n\n4. **Storage-agnostic.** KiwiFS depends on `open()`, `read()`, `write()`, `listdir()`. It doesn't care if the folder is on a laptop SSD, NFS, EFS, JuiceFS, or a FUSE-mounted S3 bucket.\n\n5. **Git as the WAL.** Instead of building a custom write-ahead log, every write is a git commit. Crash recovery, audit trail, tamper detection, replication — all for free.\n\n6. **Embeddable.** The Go library (`pkg/kiwi`) lets you embed KiwiFS in any Go application. The web UI components (`<KiwiTree />`, `<KiwiPage />`, `<KiwiEditor />`, `<KiwiSearch />`) are built for future standalone use as an npm package.\n\n---\n\n## POSIX compliance\n\nKiwiFS stores real files on a real filesystem — not blobs in a database. The degree of POSIX compliance depends on the access path:\n\n| Access path | POSIX level | Notes |\n|---|---|---|\n| **Direct filesystem** | Full | Real files, crash-safe atomic writes, mmap works |\n| **NFS mount** | Near-full | Userspace NFSv3, symlinks, open-unlink, advisory locking, stable handles across restarts |\n| **FUSE mount** | Near-full | Remote FUSE client, symlinks, directory rename, sub-second mtime, O_APPEND |\n| **WebDAV** | Partial | MOVE/COPY/MKCOL/DELETE, buffered writes with spill-to-disk |\n| **REST API** | N/A | HTTP semantics (ETag concurrency, not POSIX) |\n| **S3 API** | N/A | S3-compatible, not POSIX |\n| **MCP** | N/A | Tool calls, not file ops |\n\n### What works\n\n| POSIX semantic | NFS | FUSE | How |\n|---|---|---|---|\n| **Atomic writes** | Yes | Yes | `write → fsync → rename(tmp, target) → fsync(dir)` — the gold-standard crash-safe pattern |\n| **rename(2)** | Yes | Yes | Files via pipeline (atomic); directories via bulk endpoint |\n| **O_APPEND** | Yes | Yes | FUSE fetches existing content on open, writes at correct EOF offset |\n| **O_TRUNC / ftruncate** | Yes | Yes | NFS `Truncate()` with 64MB bounds; FUSE `Setattr` with `FATTR_SIZE` |\n| **Symlinks** | Yes | Yes | Real `os.Symlink` on NFS; `Content-Type: application/x-symlink` on FUSE + REST |\n| **readlink** | Yes | Yes | NFS via `os.Readlink`; FUSE via `/api/kiwi/readlink`; REST API endpoint |\n| **Open-then-delete** | Yes | — | NFS defers deletion until last file handle closes (POSIX unlink semantics) |\n| **fsync** | Yes | Yes | NFS `Sync()` pushes through pipeline; FUSE `Fsync()` PUTs to server |\n| **Sub-second mtime** | — | Yes | FUSE `Getattr` reports `Mtimensec` from `Last-Modified` header |\n| **Advisory locking** | Yes | — | NFS has process-local `Lock()`/`Unlock()` per file handle |\n| **Directory rename** | Yes | Yes | FUSE calls `/api/kiwi/rename-dir`; NFS uses `os.Rename` + bulk re-index |\n| **readdir** | Yes | Yes | Both hide internal dirs (`.git`, `.kiwi`) |\n| **stat** | Yes | Yes | Size, mode, mtime — real values, not synthetic |\n| **EFBIG on oversize** | Yes | Yes | 64MB `maxFileSize` limit returns proper errno / HTTP error |\n| **mmap** | — | Passthrough | Works on NFS mount (kernel handles it); FUSE is over HTTP so no kernel mmap |\n| **Path safety** | Yes | Yes | `GuardPath` blocks traversal, null bytes, control chars, 255-byte segment limit |\n\n### Concurrency & durability\n\n- **Optimistic locking** — ETags (content hash). Writes with `If-Match` headers get HTTP 409 on conflict. `If-Match: *` is handled per RFC 7232 §3.1.\n- **Serialized writes** — the pipeline serializes all writes through a single mutex, so concurrent writers are safely queued regardless of protocol.\n- **Single-instance guard** — `flock(2)` on `.kiwi/server.lock` prevents two servers from sharing the same data directory (SQLite + git corruption).\n- **Crash recovery** — stale `index.lock` files are cleaned by a background watcher (10s interval, 60s threshold). Git subprocesses receive SIGTERM before SIGKILL, giving them a chance to release locks.\n- **Line-ending integrity** — `core.autocrlf=false` + `* -text` in `.gitattributes` ensures ETags always match raw content. Writes to `.gitattributes` are blocked by the API.\n- **Frontmatter bomb protection** — YAML frontmatter blocks exceeding 64KB are silently treated as empty (headings still extracted).\n- **Stable NFS handles** — file handles are derived from `SHA-256(namespaceUUID + path)`, surviving server restarts. No more ESTALE.\n\n### What is intentionally not supported\n\n| POSIX semantic | Why |\n|---|---|\n| **Hard links** | Would break git versioning (one blob, multiple paths) |\n| **chmod / chown** | No user/group model — auth is API-key / OIDC, not POSIX uid/gid |\n| **POSIX ACLs** | Same reason — access control is at the HTTP/space level |\n| **Extended attributes (xattr)** | Frontmatter serves the same purpose |\n| **Distributed locking** | Locks are process-local; use `If-Match` for cross-client concurrency |\n\n---\n\n## How it compares\n\n| | KiwiFS | agent-vfs | ChromaFS | Obsidian | Outline | Confluence |\n|---|---|---|---|---|---|---|\n| **Writable** (agents can create/update) | Yes | Yes | No (read-only) | Local only | API only | No |\n| **Agent-native** (`cat`/`grep`/NFS) | Yes | Virtual only | Read-only | Local only | API only | No |\n| **Web UI** (Notion-like) | Yes | No | No | Desktop | Yes | Yes |\n| **Versioned** (git audit trail) | Yes | No | No | No | Limited | Plugin ($$$) |\n| **Searchable** (FTS + vector) | Yes | No | Chroma | Plugins | Yes | Yes |\n| **Query language** (DQL) | Yes | No | No | Plugin | No | No |\n| **Data import** (18 sources) | Yes | No | No | No | API | No |\n| **Export** (JSONL/CSV + embeddings) | Yes | No | No | No | Markdown | PDF only |\n| **Single binary** | Yes | No | No | No | No | No (SaaS) |\n| **Embeddable** (Go library) | Yes | No | No | No | No | No |\n| **Self-hosted** | Yes | Yes | Yes | N/A | Yes | No |\n| **Files are the truth** | Yes | DB is truth | DB is truth | Yes | Postgres | Proprietary DB |\n\n---\n\n## Who this is for\n\n**AI agent builders** — Give your agent persistent, searchable memory it accesses with `cat`. Users browse the same files in a web UI with wiki links and graph view. Knowledge compounds across sessions instead of vanishing.\n\n**Teams replacing Confluence / Notion** — Obsidian's file-first philosophy with a web UI anyone on your team can use. `git clone` your entire wiki. Self-hosted. No vendor lock-in.\n\n**Compliance-heavy industries** — Every change is a git commit with SHA-1 hash chain. Immutable audit trail. `git blame` for per-line attribution. An auditor can verify with standard tools.\n\n**DevOps / platform teams** — Runbooks that agents update after every incident. Humans review in the UI. No more docs that rot after three months.\n\n---\n\n## Architecture\n\n```\n┌──────────────────────────────────────────────────────────┐\n│  KiwiFS                                    single Go binary\n│                                                          │\n│  ┌────────────────────────────────────────────────────┐  │\n│  │  Web UI (embedded via go:embed)                    │  │\n│  │  shadcn/ui · BlockNote · react-markdown · Sigma.js │  │\n│  └────────────────────┬───────────────────────────────┘  │\n│                       │                                  │\n│  ┌────────────────────▼───────────────────────────────┐  │\n│  │  Access: REST :3333 · NFS :2049 · S3 :3334 · WebDAV│  │\n│  └────────────────────┬───────────────────────────────┘  │\n│                       │                                  │\n│  ┌────────────────────▼───────────────────────────────┐  │\n│  │  Core                                              │  │\n│  │  Storage · Git versioning · FTS5 + Vector search   │  │\n│  │  Watcher (fsnotify) · SSE events · Schema/lint     │  │\n│  └────────────────────┬───────────────────────────────┘  │\n│                       │                                  │\n│  ┌────────────────────▼───────────────────────────────┐  │\n│  │  .git/ (audit WAL)  ·  .kiwi/state/ (indexes)      │  │\n│  └────────────────────┬───────────────────────────────┘  │\n│                       │                                  │\n│  ┌────────────────────▼───────────────────────────────┐  │\n│  │  Filesystem: local · NFS · EFS · JuiceFS · FUSE-S3 │  │\n│  └────────────────────────────────────────────────────┘  │\n└──────────────────────────────────────────────────────────┘\n```\n\n---\n\n## Inspired by\n\n- **[PocketBase](https://pocketbase.io)** — single Go binary, zero config, just works. KiwiFS brings the same philosophy to knowledge infrastructure.\n- **[Obsidian](https://obsidian.md)** — files are the database. Wiki links. Graph view. KiwiFS is Obsidian for the web — plus an agent interface and an API.\n- **[Karpathy's LLM Wiki](https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f)** — raw sources in, compiled wiki out, agent maintains it. KiwiFS is the production runtime for this pattern.\n- **[Mintlify ChromaFS](https://www.mintlify.com/blog/how-we-built-a-virtual-filesystem-for-our-assistant)** — the filesystem is the best agent interface. Agents already know `cat`/`grep`/`ls`.\n- **[Confluence](https://www.atlassian.com/software/confluence)** / **[Notion](https://notion.so)** — great UIs, but your content is locked in their database. KiwiFS gives you the editing experience without the lock-in.\n\n## License\n\n[Business Source License 1.1](LICENSE) — free to use, self-host, and modify. The only restriction: you can't offer KiwiFS as a commercial hosted service. Each release converts to Apache 2.0 after 4 years.\n\nIf you want to offer KiwiFS as a managed service or need a commercial license, [get in touch](mailto:amelia.anh.lam@gmail.com).\n\n\"KiwiFS\" and the KiwiFS logo are trademarks of the KiwiFS Authors. See [LICENSE](LICENSE) for trademark usage guidelines.\n\n## Contributors\n\n<a href=\"https://github.com/kiwifs/kiwifs/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=kiwifs/kiwifs&columns=6&max=20&v=2\" width=\"200\" />\n</a>\n","summary":"KiwiFS is a single‑binary, zero‑config knowledge filesystem that lets both agents and humans create, version, search, and interact with markdown files using ordinary shell commands. It stores every write as a Git commit, providing an immutable audit trail while indexing content with full‑text BM25 and semantic vectors for fast retrieval and structured queries over metadata. A web UI offers wiki‑style browsing, graph views, and backlinks, making the same files readable by people without any extra tooling. The tool is ideal for DevOps, continuous‑integration pipelines, and knowledge‑ops teams that need a self‑hosted, API‑agnostic workspace for agent‑generated content and human‑friendly collaboration.","description":"Knowledge filesystem agents can write to, search, query, and trust.","stars":433,"language":"Go"},{"owner":"Beever-AI","repo":"beever-atlas","url":"https://github.com/Beever-AI/beever-atlas","readme":"<h1 align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"web/public/logo-white.svg\" />\n    <img src=\"web/public/logo-primary.svg\" alt=\"\" height=\"48\" align=\"absmiddle\" />\n  </picture>\n  &nbsp;Beever Atlas\n</h1>\n\n<div align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"assets/banner-dark.png\" />\n    <img src=\"assets/banner.png\" alt=\"Beever Atlas — LLM-first Wiki Knowledge Base\" width=\"85%\" />\n  </picture>\n</div>\n\n<h3 align=\"center\">\n  Turn your team's Slack, Discord, Teams &amp; Mattermost chats<br>\n  into a self-maintaining wiki — automatically.\n</h3>\n\n<p align=\"center\">\n  <a href=\"https://docs.beever.ai/atlas\"><img src=\"https://img.shields.io/badge/DOCS-docs.beever.ai/atlas-FFC107?style=for-the-badge&labelColor=4A4A4A\" alt=\"Docs\" /></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/badge/LICENSE-Apache_2.0-7CB342?style=for-the-badge&labelColor=4A4A4A\" alt=\"License Apache 2.0\" /></a>\n  <a href=\"https://beever.ai\"><img src=\"https://img.shields.io/badge/BUILT_BY-BEEVER.AI-15404E?style=for-the-badge&labelColor=4A4A4A\" alt=\"Built by Beever.ai\" /></a>\n  <a href=\"https://google.github.io/adk-docs/\"><img src=\"https://img.shields.io/badge/BUILT_WITH-Google_ADK-FF6F00?style=for-the-badge&labelColor=4A4A4A\" alt=\"Built with Google ADK\" /></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://discord.gg/VshBCUUX\"><img src=\"https://img.shields.io/badge/DISCORD-Join_Community-5865F2?style=for-the-badge&labelColor=4A4A4A&logo=discord&logoColor=white\" alt=\"Join our Discord\" /></a>\n  <a href=\"https://x.com/Beever_AI\"><img src=\"https://img.shields.io/badge/X-@Beever__AI-000000?style=for-the-badge&labelColor=4A4A4A&logo=x&logoColor=white\" alt=\"Follow us on X\" /></a>\n  <a href=\"https://beever.ai/\"><img src=\"https://img.shields.io/badge/WEBSITE-beever.ai-15404E?style=for-the-badge&labelColor=4A4A4A\" alt=\"beever.ai\" /></a>\n</p>\n\n---\n\nBeever Atlas pulls the conversations your team already has on Slack, Discord, Microsoft Teams, and Mattermost, extracts atomic facts, deduplicates them, and clusters them into topic pages with citations. A graph store links the people, decisions, and projects mentioned across channels. Ask questions in natural language and get answers cited back to the source messages — through the dashboard, or through MCP into Claude Code and Cursor.\n\nIf you want a knowledge base that grows on its own from the chats your team already has, this is it.\n\n---\n\n## ✨ Features in action\n\nSix short clips — connect a workspace, sync history, watch memory build, browse the auto-generated wiki, ask questions, plug external AI agents in via MCP.\n\n<table>\n  <tr>\n    <td width=\"33%\" align=\"center\" valign=\"top\">\n      <strong>Multi-Platform</strong><br><br>\n      <img src=\"assets/clips/multi-platform.gif\" alt=\"Multi-platform connections demo\" width=\"100%\"><br>\n      Connect Slack, Discord, Teams, Mattermost, or file imports. One bot, every workspace.\n    </td>\n    <td width=\"33%\" align=\"center\" valign=\"top\">\n      <strong>Message Sync</strong><br><br>\n      <img src=\"assets/clips/sync.gif\" alt=\"Channel sync demo\" width=\"100%\"><br>\n      Pull channel history on demand or on a schedule. Resumable and rate-limit aware.\n    </td>\n    <td width=\"33%\" align=\"center\" valign=\"top\">\n      <strong>Memory Ingestion</strong><br><br>\n      <img src=\"assets/clips/memory.gif\" alt=\"Memory ingestion pipeline demo\" width=\"100%\"><br>\n      6-stage ADK pipeline distils messages into atomic facts, entities, and relationships.\n    </td>\n  </tr>\n  <tr>\n    <td width=\"33%\" align=\"center\" valign=\"top\">\n      <strong>LLM Wiki</strong><br><br>\n      <img src=\"assets/clips/wiki.gif\" alt=\"LLM wiki browsing demo\" width=\"100%\"><br>\n      Auto-maintained wiki per channel — overview, topics, people, decisions, citations.\n    </td>\n    <td width=\"33%\" align=\"center\" valign=\"top\">\n      <strong>QA Agent</strong><br><br>\n      <img src=\"assets/clips/qa.gif\" alt=\"QA agent answering demo\" width=\"100%\"><br>\n      Streams cited answers over SSE. Smart router picks semantic or graph per question.\n    </td>\n    <td width=\"33%\" align=\"center\" valign=\"top\">\n      <strong>MCP Server</strong><br><br>\n      <img src=\"assets/clips/mcp.gif\" alt=\"MCP server querying from Claude Code demo\" width=\"100%\"><br>\n      Plug Claude Code / Cursor into your knowledge base — 16 tools, per-agent auth.\n    </td>\n  </tr>\n</table>\n\n---\n\n## 🏗️ Architecture\n\nConversations from any supported platform flow into a unified ingestion pipeline that produces two complementary memory systems — a **3-tier semantic store** (channel / topic / atomic fact) for fast hybrid search, and a **graph store** that extracts entities and their relationships. Those memories fuel two consumer surfaces: the **LLM Wiki** (distilled, auto-maintained) and **QA Agents** (served through the dashboard directly, or through **MCP** into Claude Code / Cursor).\n\n<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"assets/architecture-dark.png\" />\n    <img src=\"assets/architecture.png\" alt=\"Beever Atlas architecture — chat platforms → memory ingestion → 3-tier semantic memory + graph memory → LLM Wiki and QA Agent → Dashboard and MCP clients\" width=\"60%\" />\n  </picture>\n</p>\n\n<p align=\"center\"><em>From chat platforms to MCP agents — one ingestion path, two memory systems, two delivery surfaces.</em></p>\n\nUnder the hood, three services (backend, bot, frontend) are backed by four data stores (Weaviate, Neo4j, MongoDB, Redis). See the [architecture overview](https://docs.beever.ai/atlas/concepts/architecture) on the documentation site for the full design — component responsibilities, dual-memory internals, and the smart query router.\n\n---\n\n## 💡 Why Wiki-First RAG?\n\nMost RAG systems answer questions by retrieving raw message snippets and feeding them straight to an LLM. Beever Atlas takes a different approach: it continuously distils conversations into a structured, auto-maintained wiki — with topic pages, entity graphs, decisions, and citations — before any query is issued. When you ask a question, the retrieval layer works against clean, deduplicated knowledge rather than noisy chat history. This means answers are more consistent, citations are t
