yway\". |\n| **Linux** | `GitBackup-x.x.x.AppImage` | Make it executable: `chmod +x GitBackup-*.AppImage` then run it. |\n\n> **Prerequisite:** [Git](https://git-scm.com/) must be installed on your system. GitBackup uses it to clone and update repositories.\n\n### Creating a GitHub Token\n\nYou'll need a Personal Access Token to connect your account:\n\n1. Go to [github.com/settings/tokens](https://github.com/settings/tokens)\n2. Click **Personal access tokens** → **Tokens (classic)**\n3. Click **Generate new token (classic)**\n4. Select scopes: `repo` (full access) and `read:org` (for org repos)\n5. Click **Generate token** and paste it into the app\n\nFine-grained tokens also work — grant **Repository access → All repositories**.\n\n## Building from Source\n\n### Prerequisites\n\n- [Node.js](https://nodejs.org/) 18+\n- [Git](https://git-scm.com/) installed and available in PATH\n\n### Installation\n\n```bash\ngit clone https://github.com/hiteshchoudhary/gitbackup.git\ncd gitbackup\nnpm install\n```\n\n### Development\n\n```bash\nnpm run dev\n```\n\nThis starts the Vite dev server with hot reload and launches the Electron app.\n\n### Build & Package\n\n```bash\n# Build for current platform\nnpm run package\n\n# Platform-specific builds\nnpm run package:mac\nnpm run package:win\nnpm run package:linux\n```\n\nPackaged apps are output to the `release/` directory.\n\n## How It Works\n\n1. **Authenticate** — Paste your GitHub PAT. The app validates it and fetches your account info.\n2. **Select repos** — Choose filters (owned, org, starred, etc.) and fetch your repository list. Select which repos to back up.\n3. **Choose backup folder** — Pick a local directory. Repos are cloned as `owner/repo-name/` with all branches.\n4. **Configure cloud (optional)** — Add AWS S3 or Cloudflare R2 credentials. Each repo is archived as an individual `.tar.gz` and uploaded.\n5. **Run backup** — Click Start. The app clones new repos and fetches updates for existing ones, compresses archives, and uploads to cloud — all with configurable concurrency.\n6. **Schedule (optional)** — Set up daily/weekly/monthly automatic backups. The app runs in the system tray.\n\n## Project Structure\n\n```\ngitbackup/\n├── electron/                    # Main process (Node.js)\n│   ├── main.ts                  # App window, tray, lifecycle\n│   ├── preload.ts               # Secure IPC bridge\n│   ├── tray.ts                  # System tray\n│   ├── ipc/                     # IPC handlers\n│   ├── services/\n│   │   ├── github.service.ts    # GitHub API (Octokit)\n│   │   ├── git.service.ts       # Clone & update repos\n│   │   ├── compress.service.ts  # tar.gz archiving\n│   │   ├── cloud.service.ts     # S3/R2 uploads\n│   │   ├── backup-orchestrator.ts  # Core backup pipeline\n│   │   └── scheduler.service.ts    # Cron scheduling\n│   └── store/store.ts           # Encrypted settings\n├── src/                         # Renderer process (React)\n│   ├── pages/                   # Setup, Repos, Backup, Settings\n│   ├── components/              # UI components\n│   └── hooks/                   # IPC & state hooks\n└── resources/                   # App icons\n```\n\n## Tech Stack\n\n| Layer | Technology |\n|-------|-----------|\n| Framework | Electron 35 |\n| Frontend | React 19 + Tailwind CSS |\n| Language | TypeScript 5 |\n| Bundler | Vite 8 |\n| GitHub API | @octokit/rest |\n| Git | simple-git |\n| Cloud | AWS SDK v3 (S3-compatible, works with R2) |\n| Storage | electron-store (encrypted) |\n| Scheduling | node-cron |\n| Packaging | electron-builder |\n\n## Configuration\n\nAll settings are persisted locally in encrypted storage. No data is sent to any third-party service other than GitHub API and your configured cloud storage.\n\n| Setting | Description |\n|---------|-------------|\n| GitHub Token | PAT with `repo` + `read:org` scopes |\n| Backup Path | Local directory for cloned repos |\n| Cloud Provider | None, AWS S3, or Cloudflare R2 |\n| Schedule | Daily / Weekly / Monthly + time |\n| Concurrency | 1-10 parallel repo operations |\n\n## License\n\nMIT\n\n---\n\nA [chaicode.com](https://chaicode.com) product\n","summary":"GitBackup is an Electron desktop app that lets users back up all of their GitHub repositories locally—optionally archiving them to AWS S3 or Cloudflare R2—in a single click. It supports smart incremental updates, customizable filtering (owned, org, starred, etc.), concurrent processing, and scheduled runs with a system‑tray notifier, all while handling API rate limits and encrypting the Personal Access Token. The interface provides real‑time status and log viewing so users can track progress repo‑by‑repo. Developers, sysadmins, or power users who need dependable, automation‑friendly backups of large GitHub accounts will find this tool especially valuable.","description":"It was personal script but now it is a complete desktop application to take backup of your github account","stars":305,"language":"TypeScript"},{"owner":"actuallyepic","repo":"background-computer-use","url":"https://github.com/actuallyepic/background-computer-use","readme":"# BackgroundComputerUse\n\nLocal macOS computer-use API for controlling native apps, browser windows, and multi-window desktop workflows without taking over the user's pointer.\n\nThe runtime exposes a loopback HTTP API, reads window screenshots and Accessibility state, and dispatches clicks, scrolling, text, key presses, secondary actions, and window motion against target windows. It uses macOS Accessibility, Screen Recording, and native/private window-event APIs.\n\nAt rough parity with OpenAI Codex Computer Use plugin \n\n[![BackgroundComputerUse demo](cover.png)](https://youtu.be/RmB5Ontqb3Y)\n\n[Watch the demo](https://youtu.be/RmB5Ontqb3Y)\n\n## Start\n\n```bash\n./script/start.sh\n```\n\nThe script builds the Swift package, creates/signs a `.app` bundle, installs it to `~/Applications/BackgroundComputerUse.app`, launches it, waits for the runtime manifest, prints the active local URL, and calls `/v1/bootstrap`.\n\nRuntime metadata is written to:\n\n```text\n$TMPDIR/background-computer-use/runtime-manifest.json\n```\n\nThe manifest includes `baseURL`, permission status, bootstrap instructions, and route summaries. Agents should read this file instead of assuming a fixed port.\n\n## Signing And Permissions\n\nSince the app requires accessibility + screenshot permissions, you need to sign (self-sign ok) the app after building \n\nmacOS permissions attach to the signed app bundle, not to an arbitrary command-line binary. Launch development builds through:\n\n```bash\n./script/start.sh\n```\n\nor:\n\n```bash\n./script/build_and_run.sh run\n```\n\nIf no signing identity is configured, `script/build_and_run.sh` calls `script/bootstrap_signing_identity.sh` to create a local development code-signing identity in:\n\n```text\n~/Library/Keychains/background-computer-use-dev.keychain-db\n```\n\nYou can override signing with:\n\n```bash\nBACKGROUND_COMPUTER_USE_SIGNING_IDENTITY=\"Developer ID Application: ...\"\n./script/start.sh\n```\n\nIf `/v1/bootstrap` reports missing permissions, grant them in System Settings and relaunch the app through the script.\n\n## Swift Package Usage\n\nThe package also exposes a direct Swift API for callers that do not need the loopback server:\n\nDepend on the `BackgroundComputerUseKit` library product, then import the `BackgroundComputerUse` module:\n\n```swift\nimport BackgroundComputerUse\n\nlet runtime = BackgroundComputerUseRuntime()\nlet apps = runtime.listApps()\nlet windows = try runtime.listWindows(.init(app: \"Safari\"))\n```\n\nDirect package calls default to `visualCursor: .disabled`, so action methods do not start the virtual cursor overlay or wait for cursor animation before dispatching. Existing action verification and post-action rereads still run.\n\nTarget factories validate the same shape as the HTTP JSON decoder and throw for invalid display indexes or empty node identifiers.\n\nEnable the visual cursor explicitly when you want the same cursor choreography used by the app runtime:\n\n```swift\nlet runtime = BackgroundComputerUseRuntime(\n    options: .init(visualCursor: .enabled)\n)\n```\n\nmacOS permissions attach to the signed host application. The bundled HTTP runtime keeps using the stable `xyz.dubdub.backgroundcomputeruse` app identity from `script/build_and_run.sh`; direct package consumers should use their own stable signed app identity if they need Accessibility or Screen Recording permissions.\n\n## API Flow\n\n1. `GET /v1/bootstrap`\n2. Check `permissions` and `instructions.ready`.\n3. `GET /v1/routes`\n4. `POST /v1/list_apps`\n5. `POST /v1/list_windows`\n6. `POST /v1/get_window_state`\n7. Act with `/v1/click`, `/v1/scroll`, `/v1/type_text`, `/v1/press_key`, `/v1/set_value`, `/v1/perform_secondary_action`, `/v1/drag`, `/v1/resize`, or `/v1/set_window_frame`.\n8. Read state again.\n\nFor visual work, request screenshots with `imageMode: \"path\"` or `imageMode: \"base64\"` and inspect them whenever possible. The AX tree is useful for semantic targeting, but screenshots are the visual ground truth; AX state and verifier summaries can lag, omit visual-only state, or be incomplete in some apps.\n\n## Routes\n\n`GET /v1/routes` is the self-documenting API catalog. It returns each route's method, path, summary, request schema, and response schema.\n\nAction responses omit verbose implementation `notes` by default. Add `\"debug\": true` to action requests when you want transport/planner notes for debugging.\n\nCore routes:\n\n- `GET /health`\n- `GET /v1/bootstrap`\n- `GET /v1/routes`\n- `POST /v1/list_apps`\n- `POST /v1/list_windows`\n- `POST /v1/get_window_state`\n- `POST /v1/click`\n- `POST /v1/scroll`\n- `POST /v1/perform_secondary_action`\n- `POST /v1/drag`\n- `POST /v1/resize`\n- `POST /v1/set_window_frame`\n- `POST /v1/type_text`\n- `POST /v1/press_key`\n- `POST /v1/set_value`\n\n## Minimal Curl\n\n```bash\nBASE=\"$(python3 - <<'PY'\nimport json, os\npath = os.path.join(os.environ[\"TMPDIR\"], \"background-computer-use\", \"runtime-manifest.json\")\nprint(json.load(open(path))[\"baseURL\"])\nPY\n)\"\n\ncurl -s \"$BASE/v1/bootstrap\" | python3 -m json.tool\ncurl -s \"$BASE/v1/routes\" | python3 -m json.tool\ncurl -s -X POST \"$BASE/v1/list_apps\" -H 'content-type: application/json' -d '{}' | python3 -m json.tool\n```\n\n## State And Actions\n\nRead a window:\n\n```bash\ncurl -s -X POST \"$BASE/v1/list_windows\" \\\n  -H 'content-type: application/json' \\\n  -d '{\"app\":\"Safari\"}' | python3 -m json.tool\n\ncurl -s -X POST \"$BASE/v1/get_window_state\" \\\n  -H 'content-type: application/json' \\\n  -d '{\"window\":\"WINDOW_ID\",\"imageMode\":\"path\",\"maxNodes\":6500}' | python3 -m json.tool\n```\n\nClick by semantic target:\n\n```bash\ncurl -s -X POST \"$BASE/v1/click\" \\\n  -H 'content-type: application/json' \\\n  -d '{\"window\":\"WINDOW_ID\",\"target\":{\"kind\":\"display_index\",\"value\":12},\"clickCount\":1,\"imageMode\":\"path\"}' | python3 -m json.tool\n```\n\nClick by screenshot coordinate:\n\n```bash\ncurl -s -X POST \"$BASE/v1/click\" \\\n  -H 'content-type: application/json' \\\n  -d '{\"window\":\"WINDOW_ID\",\"x\":240,\"y\":180,\"clickCount\":2,\"imageMode\":\"path\"}' | python3 -m json.tool\n```\n\nType into a text target:\n\n```bash\ncurl -s -X POST \"$BASE/v1/type_text\" \\\n  -H 'content-type: application/json' \\\n  -d '{\"window\":\"WINDOW_ID\",\"target\":{\"kind\":\"display_index\",\"value\":4},\"text\":\"hello\",\"focusAssistMode\":\"focus_and_caret_end\",\"imageMode\":\"path\"}' | python3 -m json.tool\n```\n\nUse the optional `cursor` object on action routes to show an on-screen agent cursor:\n\n```json\n{\"id\":\"agent-1\",\"name\":\"Agent\",\"color\":\"#20C46B\"}\n```\n\nCursors are session-based. Reuse the same `cursor.id` across related actions to move the same on-screen cursor continuously; use different IDs for independent agents or lanes.\n\n## License\n\nMIT\n\n---\n\ncrafted by [cam](https://x.com/financialvice) and [anupam](https://x.com/anupambatra_) | [dubdubdub labs](https://www.dubdubdub.xyz/)\n","summary":"BackgroundComputerUse is a local macOS runtime that exposes a loopback HTTP API for automating native apps, browsers, and multi‑window workflows without hijacking the user’s pointer. It leverages macOS Accessibility, Screen Recording, and private window‑event APIs to list apps and windows, take screenshots, and perform actions such as clicks, scrolls, key presses, text entry, and window manipulation. Developers building AI agents, automation scripts, or desktop‑assistant tooling can use the HTTP interface or the embedded Swift library to control the system programmatically, benefitting from the runtime’s robust permission handling and visual‑cursor choreography. The project aims to provide a functional parity with OpenAI’s Computer Use plugin for macOS users.","description":null,"stars":194,"language":"Swift"},{"owner":"nakagami","repo":"grdpwasm","url":"https://github.com/nakagami/grdpwasm","readme":"# grdpwasm\n\nA web-based RDP client built with Go WebAssembly and [grdp](https://github.com/nakagami/grdp).\nConnect to a Windows Remote Desktop server directly from your browser — no plugins required.\n\n## Architecture\n\n```\nBrowser (WASM) ──WebSocket──► proxy (Go) ──TCP──► RDP Server\n```\n\nBecause browsers cannot open raw TCP sockets, a lightweight Go proxy server bridges\nWebSocket connections from the browser to the RDP server's TCP port.\n\n## Requirements\n\n- Go 1.24 or later\n- A reachable RDP server (Windows or any RDP-compatible host)\n\n## Build\n\n```bash\ngit clone https://github.com/nakagami/grdpwasm.git\ncd grdpwasm\nmake all\n```\n\n`make all` produces:\n\n| Output | Description |\n|---|---|\n| `static/main.wasm` | Go WASM binary (runs in the browser) |\n| `static/wasm_exec.js` | Go runtime JS support file |\n| `proxy/proxy` | WebSocket-to-TCP proxy + static file server |\n\n## Run\n\n```bash\nmake serve\n# or equivalently:\n./proxy/proxy -listen :8080 -static static\n```\n\nThen open **http://localhost:8080** in your browser.\n\n### Proxy options\n\n| Flag | Default | Description |\n|---|---|---|\n| `-listen` | `:8080` | Address and port to listen on |\n| `-static` | `static` | Directory to serve static files from |\n\n## Usage\n\n1. Open `http://localhost:8080` in a browser.\n2. Fill in the connection form:\n   - **Host** — hostname or IP address of the RDP server\n   - **Port** — RDP port (default `3389`)\n   - **Domain** — Windows domain (leave blank for local accounts)\n   - **User** — username\n   - **Password** — password\n   - **Width / Height** — initial desktop resolution\n3. Click **Connect**.\n4. The remote desktop appears in the canvas. Click the canvas to capture keyboard focus.\n5. Click **Disconnect** to end the session.\n\n## Keyboard & Mouse\n\nAll standard keyboard input is forwarded to the remote desktop via RDP scan codes.\nMouse move, button clicks, and scroll wheel are fully supported.\n\n> **Note:** The browser tab must have focus for keyboard events to be forwarded.\n> Click inside the canvas area if keys stop responding.\n\n## Audio\n\nRemote audio is streamed via RDPSND and played through the browser's Web Audio API\n(PCM 44100 Hz, stereo, 16-bit signed little-endian).\n\n## Security notes\n\n- The proxy accepts connections from any origin. Run it only on a trusted network\n  or add authentication before exposing it to the internet.\n- Credentials are transmitted from the browser to the proxy over WebSocket.\n  Use HTTPS/WSS (put the proxy behind a TLS-terminating reverse proxy such as\n  nginx or Caddy) when accessing it over an untrusted network.\n\n## Development\n\n```\nmake wasm       # rebuild only the WASM binary\nmake proxy      # rebuild only the proxy server\nmake wasm_exec  # refresh wasm_exec.js from the local Go toolchain\nmake clean      # remove all build artifacts\n```\n\n## License\n\nGPLv3 — see [grdp LICENSE](https://github.com/nakagami/grdp/blob/master/LICENSE).\n","summary":"grdpwasm is a browser‑based Remote Desktop Protocol client built with Go WebAssembly that lets you connect to Windows or any RDP‑compatible server directly from a web browser without requiring plugins. It uses a lightweight Go proxy to bridge WebSocket traffic from the browser to the RDP server’s TCP port, and supports full keyboard, mouse, and remote audio via RDPSND. The build produces a static WASM binary and a small proxy executable that can be served with HTTPS for secure, authenticated access. This project is particularly useful for system administrators, developers, and IT support personnel who need quick, plugin‑free RDP support on any device that can run a modern web browser.","description":null,"stars":261,"language":"HTML"},{"owner":"machinarii","repo":"hypervibe","url":"https://github.com/machinarii/hypervibe","readme":"<img src=\"banner.png\" alt=\"HyperVibe — a walkie-talkie for Claude Code\">\n\n# HyperVibe V0.1\n\nOne-handed vibe coding using Apple TV remote, customizable buttons and gestures.\n\nGrab a remote, push to talk, and vibe-code with Claude Code without breaking flow.\n\n<img src=\"demo.gif\" alt=\"HyperVibe demo\" width=\"70%\">\n\nTested with the 1st-gen Siri Remote (Model A1513). Support for Xbox Adaptive Joystick coming soon.\n\n> **Experimental release.** For now, HyperVibe ships as an experiment — there is no pre-built binary. You'll have to build the app bundle yourself (see [Building](#building)). Your mileage may vary.\n\n---\n\n## Features\n\n### Buttons\n\nEach physical Siri Remote button is independently assignable via the menu bar.\n\n<img src=\"siri-remote-button-mapping-default.png\" alt=\"Default Siri Remote button mapping\" width=\"50%\">\n\n<img src=\"screenshot-button-mapping.png\" alt=\"Button Mappings menu screenshot\" width=\"70%\">\n\n**Default Button Mapping (Customizable):**\n- Menu → Esc\n- TV → Ctrl + C\n- Siri → Space (Claude voice dictation)\n- Play/Pause → Enter\n- Volume Up → Up arrow\n- Volume Down → Down arrow\n\n| Action | Behavior |\n|---|---|\n| Play/pause button | Enter (submit prompt) |\n| Volume up button | Up arrow |\n| Volume down button | Down arrow |\n| Menu button | Esc (Navigate back) |\n| TV button | Control + C (cancel prompt) |\n| Trackpad click | Left mouse click |\n| Siri/mic button | Space on hold (Claude voice dictation must be enabled) |\n\n**Hold-Capable Buttons:** Push-to-talk actions require buttons that emit both press and release HID events. Only Play/Pause, Volume Up, Volume Down, and Siri buttons allow for both events. Also this button can trigger right command or option key for other dictation apps like [VoiceInk](https://github.com/Beingpax/VoiceInk).\n\n\n### Swipe Gestures\n\nFour independently configurable single-finger swipe directions on the trackpad surface. Detection is velocity-gated: **distance ≥ 35%** of trackpad, **duration < 350 ms**, **dominant axis ≥ 2×** the other. Slow drags continue to move the cursor; only deliberate flicks trigger actions.\n\n<img src=\"siri-remote-gesture-mapping.png\" alt=\"Siri Remote swipe gesture mapping\" width=\"50%\">\n\n<img src=\"screenshot-swipe-mapping.png\" alt=\"Swipe Gestures menu screenshot\" width=\"70%\">\n\n**Default Gesture Mapping (Customizable):**\n- Swipe Up → `/usage`\n- Swipe Down → `/compact`\n- Swipe Left → `/model`\n- Swipe Right → Mode Switching (Shift + Tab)\n\nAssignable actions:\n\n- **Arrow keys (direction-matched)**: \"Left: Navigate Left\" offered only on Swipe Left; \"Right: Navigate Right\" offered only on Swipe Right.\n- **Mode Switching (Shift + Tab)** — toggle between normal / plan / auto-accept modes in Claude Code.\n- **`ultrathink`** — inserts the keyword (with trailing space) into the prompt.\n- **Slash commands**: `/btw`, `/compact`, `/config`, `/context`, `/effort`, `/init`, `/model`, `/remote-control`, `/schedule`, `/tasks`, `/usage`.\n- **None**.\n\n**Trailing-space policy.** Commands that typically take an argument (`/btw`, `/schedule`, `ultrathink`) are typed with a trailing space so you can keep typing. Commands that stand alone or open an interactive picker (`/compact`, `/config`, `/context`, `/effort`, `/init`, `/model`, `/remote-control`, `/tasks`, `/usage`) are typed without a trailing space.\n\n**Enter is never sent** — gestures type the command but leave Enter for the user, so the command can be reviewed, edited, or augmented with arguments.\n\n### Other Trackpad Inputs\n\n- **Cursor movement** via single-finger drag\n- **Two-finger scroll** (natural-scroll direction, configurable scale)\n- **Tap-to-click** on the trackpad surface\n- **Drag** by holding the trackpad click and moving\n\n### Persistence\n\nButton mappings and swipe mappings are saved to UserDefaults (`buttonMappings`, `swipeMappings`) and survive restarts. Schema versioning handles future upgrades (`buttonMappingsSchema`).\n\n### Safety\n\n- **Stuck-key prevention.** If the remote disconnects while a push-to-talk key is held, HyperVibe releases the virtual key automatically.\n- **Stale-hold self-heal.** If a release HID event is ever missed, the next press closes the stale hold before opening a new one.\n- **HID seize.** On connect, HyperVibe seizes the remote at the HID level so macOS no longer also sees media key events from it — no double-dispatch (e.g., to iTunes/Music), no system funk sound on unhandled keys.\n\n---\n\n## Building\n\n### Prerequisites\n\n- macOS 11 (Big Sur) or later\n- Xcode Command Line Tools: `xcode-select --install`\n\n### Build\n\n```bash\n./build.sh\n```\n\nThis runs a single `swiftc` invocation over all the project's Swift files, linking IOKit, CoreGraphics, AudioToolbox, Carbon, AppKit, and the private MultitouchSupport framework via a bridging header. No Xcode project is required.\n\n---\n\n## Installing and Running\n\n1. Build and bundle: `./build.sh && ./create_app_bundle.sh`\n2. Move `HyperVibe.app` to `/Applications` (optional but helps icon caching)\n3. Launch it (`open HyperVibe.app`)\n4. Grant permissions in **System Settings → Privacy & Security**:\n   - **Accessibility** (for posting keyboard/mouse events)\n   - **Input Monitoring** (for reading HID events)\n   - **Bluetooth** (to communicate with the remote)\n5. Pair the Siri Remote via **System Settings → Bluetooth** if it isn't already paired\n6. Use the menu-bar walkie-talkie glyph to access Button Mappings and Swipe Gestures\n\n> ⚠️ **Important:** You must explicitly add **HyperVibe.app** to **System Settings → Privacy & Security → Input Monitoring** (click the **+** button and select the app). Without this, HyperVibe may not properly intercept HID events/media keys, which means vol up and down buttons and play/pause buttons will trigger volume change and triggering of Apple Music.\n\nA diagnostic log is written to `/tmp/hypervibe.log` (NSLog is redacted under hardened runtime, so HyperVibe uses file-based logging).\n\n---\n\n### Why two paths for the same button?\n\nA physical Siri Remote press can arrive two ways:\n\n1. **HID (seized)** — `RemoteInputHandler` reads raw HID input.\n2. **AVRCP → NX_SYSDEFINED** — Bluetooth media-key events `MediaKeyInterceptor` catches via an event tap.\n\nBoth paths converge on the same button mapping through a 200 ms debounce (static `lastProcessedButton`/`lastProcessedTime` on `RemoteInputHandler`), so a press fires the mapped action exactly once regardless of which path delivers it first.\n\n### The NX_SYSDEFINED hack (media keys)\n\nmacOS has no public API for synthesizing or intercepting media keys (Play/Pause, Next, Previous, Volume, Mute). Both `MediaKeyInterceptor` and `MediaController` rely on the same undocumented `NSSystemDefined` event format used internally by the Human Interface Device stack:\n\n- **Event type** `NX_SYSDEFINED` (raw value `14`) with **subtype `8`**.\n- **Key code and state packed into `data1`** as a bitfield: `(nxKeyCode << 16) | (keyState << 8)`, where `0xA` = key down and `0xB` = key up.\n- **Magic `modifierFlags`** (`0xa00` for down, `0xb00` for up) mirror the state nibble — real media key events arrive with these flags, and some consumers (e.g. Music.app) won't accept posted events without them.\n\n`MediaKeyInterceptor` installs a **`.cghidEventTap`** at `.headInsertEventTap` so it sees `NX_SYSDEFINED` events *before* the system dispatcher routes them to Music/iTunes/etc. — a session-level tap would arrive too late. It then manually unpacks `data1` to recover the key code and down/up state. The tap is automatically re-enabled on `tapDisabledByTimeout`, `tapDisabledByUserInput`, and `NSWorkspace.didWakeNotification`, because macOS silently disables event taps across sleep/wake and input stalls.\n\n`MediaController` goes the other way: it **fabricates** matching `NSSystemDefined` events via `NSEvent.otherEvent(...)` with the same magic flags, subtype, and `data1` packing, then posts the underlying `CGEvent` to the session tap. A **`usleep(50_000)`** gap between the down and up events is required — without the 50 ms pause, macOS coalesces or drops the pair and the media key is ignored.\n\nThis is the standard reverse-engineered technique (originally surfaced in projects like SPMediaKeyTap and Noteify), but it is entirely undocumented and can change without notice in any macOS release.\n\n---\n\n## Caveats\n\n- Uses Apple's **private `MultitouchSupport` framework** — not App Store compatible; Apple may change or remove this API in future macOS releases.\n- **NX_SYSDEFINED media-key synthesis and interception is undocumented** — relies on magic modifier-flag values (`0xa00`/`0xb00`), subtype `8`, and a manual `data1` bitfield layout. Apple could break this in any release.\n\n### Long-term direction: Xbox Adaptive Joystick\n\nBetween the private `MultitouchSupport` framework and the undocumented `NX_SYSDEFINED` plumbing, the Siri Remote path is built on two proprietary, reverse-engineered interfaces that Apple can break at any time. HyperVibe may migrate its primary input to the **Xbox Adaptive Joystick**, which speaks standard USB HID / GameController.framework and avoids every proprietary hazard above. That gives a more permanent, App Store–viable foundation — and, as a bonus, a genuinely accessible input device — while the Siri Remote support remains as a best-effort path for users who already own one.\n- Tested on **Siri Remote 1st-gen (A1513, product ID `0x266`)**. Button HID codes are a superset likely to cover the 2nd-gen Siri Remote (A2540) as well, but its click-ring directional presses and dedicated Mute button are not yet mapped in `identifyButton`.\n- Ad-hoc signing ties TCC permission grants to the exact binary hash — rebuilds may require re-approval in System Settings.\n\n---\n\n## Credits\n\n **Fork & improvements.** HyperVibe is built on top of [Remotastic](https://github.com/lauschue/Remotastic) by [@lauschue](https://github.com/lauschue), which provided the foundational Siri-Remote HID handling, MultitouchSupport integration, and menu-bar scaffolding. HyperVibe extends it with configurable Claude Code workflows, keyboard shortcuts, push-to-talk and swipe gesture.\n- Icons from [The Noun Project](https://thenounproject.com/):\n  - [Arrow Up by Dayeong Kim](https://thenounproject.com/icon/arrow-up-6066125/)\n  - [Microphone by Alvida](https://thenounproject.com/icon/microphone-8162320/)\n  - [Radio by Kiran Shastry](https://thenounproject.com/icon/radio-2338991/)","summary":"HyperVibe turns an Apple TV remote into a hands‑free, one‑handed “walkie‑talkie” controller for Claude Code, letting users push‑to‑talk, navigate, and invoke slash commands without breaking their coding flow. It offers fully customizable button assignments, velocity‑gated swipe gestures mapped to Claude shortcuts, and trackpad‑based cursor movements, scrolls and clicks—all forward‑compatible with Push‑to‑Talk and voice‑dictation apps. The app preserves user‑defined mappings across restarts via UserDefaults, and includes safety features to prevent stuck keys if the remote disconnects mid‑press. Developers who frequent Claude Code and prefer a fluid, low‑latency input method—especially those using an Apple TV remote or Xbox Adaptive Joystick—will benefit most from this experimental tool.","description":"One-handed vibe coding using Apple TV Remote, customizable buttons and gestures.","stars":130,"language":"Swift"},{"owner":"browser-use","repo":"bux","url":"https://github.com/browser-use/bux","readme":"# Browser Use Box ♞\n\n<img src=\"docs/hero.jpg\" alt=\"Browser Use Box hero\" width=\"100%\" />\n\n\n## Your 24/7 Claude Code agent with a real browser, on any box you own.\n\nRent any $5 VPS (Hetzner, DigitalOcean, Mac mini, Raspberry Pi — anything that runs Ubuntu), point one install script at it, and text your agent from anywhere.\n\n```\n$ curl -fsSL https://raw.githubusercontent.com/browser-use/bux/main/install.sh \\\n    | sudo BROWSER_USE_API_KEY=bu_xxx bash\n```\n\nThree minutes from a blank VPS to *\"hey claude, check my email and summarize the unread ones\"* via Telegram.\n\n## Setup prompt\n\nPaste into Claude Code (on your laptop) and it will set up your VPS for you:\n\n```text\nSet up https://github.com/browser-use/bux on my remote box.\n\nSSH into it (I'll paste the host below), run install.sh with my BROWSER_USE_API_KEY, and optionally wire up a Telegram bot if I give you a token from @BotFather. Read install.md first. After the install completes, verify the services are running (systemctl is-active bux-browser-keeper bux-ttyd), then become the `bux` user and run `claude /login` so I can complete the OAuth flow. Once logged in, test the setup by asking claude to visit https://browser-use.com and report the page title.\n```\n\n## What you get\n\n- **Claude Code** logged in and always on\n- A real **Chromium** session via [browser-harness](https://github.com/browser-use/browser-harness) — cookies persist, logins stick\n- A **Telegram bot** so you can text your agent — pass `TG_BOT_TOKEN=xxx` to the installer to enable\n- A **web terminal** bound to localhost for when SSH is too much\n- When claude hits a login wall / 2FA / CAPTCHA, it hands you a **live view URL** and waits — no credential-stuffing, no brittle workarounds\n\n## Requirements\n\n- **A box** — Ubuntu 22.04+ with ≥2GB RAM. A $5/mo VPS is fine.\n- **[Browser Use Cloud API key](https://cloud.browser-use.com/new-api-key)** — free tier: 3 concurrent browsers, proxies, CAPTCHA solving.\n- An Anthropic API key *or* Claude Max subscription (claude asks on first `/login`).\n- *(optional)* A Telegram bot token from [@BotFather](https://t.me/BotFather).\n\n## How it works\n\n```\n  telegram ──►  telegram_bot.py ─┐\n                                 ├──► claude -p  ──► browser-harness ──► BU Cloud\n  browser  ──►  ttyd ────────────┘         │            (cdp over wss)\n                                           ▼\n                                  /home/bux (persistent state)\n```\n\nThree small services under systemd. Agent state lives in `/home/bux`, so reboots keep your cookies, skills, and chat history.\n\n## Docs\n\n- [install.md](install.md) — full install guide, troubleshooting, recipes\n- [agent/CLAUDE.md](agent/CLAUDE.md) — the context claude loads on every session\n- [docs/recipes/](docs/recipes/) — provider-specific deploy notes\n\n## Managed offering\n\nIf you'd rather not run your own VPS: [cloud.browser-use.com](https://cloud.browser-use.com) provisions a box for you in ~60s — same software, zero setup, one-command `bux up` via a Claude Code skill.\n\n## Contributing\n\nPRs welcome — **[deploy recipes](docs/recipes/)** are the highest-leverage contribution (one `.md` per provider). Bug fixes and docs tweaks equally welcome.\n\n## License\n\nMIT. See [LICENSE](LICENSE).\n","summary":"Bux installs a permanently‑running Claude agent on any Ubuntu‑compatible VPS, giving you a real Chromium browser that retains cookies and login states. The agent is reachable through a lightweight web terminal, systemd services, or an optional Telegram bot so you can issue commands from anywhere and get live web‑view URLs when authentication hurdles appear. It makes web‑automation, remote browsing, and email summarisation as simple as sending a text to Claude, thanks to its integration with Browser‑Use Cloud for CDP connections. The setup is ideal for developers, AI hobbyists, or small teams who want a low‑cost, self‑hosted, browser‑backed AI assistant that remains online 24/7.","description":"A 24/7 Claude Code agent with Browser Harness, on any box you own.","stars":302,"language":"Python"},{"owner":"saltpi","repo":"Aria.X","url":"https://github.com/saltpi/Aria.X","readme":"# AriaX\n\nEnglish | [简体中文](README_zh.md)\n\n![AriaX Screenshot 1](images/screenshot1.png)\n\n---\n\n## AriaX: The Ultimate Download Manager for Apple Users\n\nAriaX is a modern, high-performance download manager designed specifically for the Apple ecosystem (macOS & iOS). Built with **SwiftUI**, it offers a seamless, native experience that combines the industrial-strength power of `aria2` with the elegance of modern Apple design.\n\n![AriaX Screenshot 2](images/screenshot2.png)\n\n### Why AriaX?\n\n*   **Native & Modern**: Fully crafted with SwiftUI for a smooth, responsive interface that feels like a part of the OS.\n*   **Zero Configuration (Full Version)**: Includes a built-in, pre-configured `aria2` engine. Download and start immediately—no terminal required.\n*   **Hybrid Power**: Whether you want to manage local downloads or control a remote NAS/Server via JSON-RPC, AriaX handles both with ease.\n*   **Deep Integration**: \n    *   **Safari Extension**: Official extension to send tasks to AriaX with one click.\n    *   **Smart URL Scheme**: Integrate with third-party apps using `ariax://`.\n*   **Globalized**: Fully localized in 10+ languages including English, Simplified/Traditional Chinese, Japanese, German, and French.\n*   **Dual Versions**: \n    *   **AriaX (Full)**: Includes the built-in engine, distributed via DMG.\n    *   **AriaX Lite**: A lightweight remote controller available on the Mac App Store.\n\n### Installation\n\n1.  **AriaX (Standard/Full)**: Download the latest `.dmg` from our official distribution channel. This version contains the integrated download core.\n2.  **AriaX Lite**: Search for \"AriaX\" on the **Mac App Store**. Best for users who already have a running `aria2` service on another device.\n\n### Browser Integration\n\nEnable the official Safari Extension for the best experience:\n1.  Open **AriaX** -> **Settings** -> **Browser Integration**.\n2.  Click **Enable Safari Extension**.\n3.  In Safari Settings, check the **AriaX Extension**.\n4.  Right-click any link to see \"Download with AriaX\".\n\n### Privacy & Security\n\nAriaX is designed with privacy in mind. We do not collect your download history or server credentials. All data is stored locally on your device or within your private iCloud container if syncing is enabled.\n\n### License & Credits\n\n- **Aria2Helper**: This component is open-source and licensed under the [GNU GPLv2](Aria2Helper/LICENSE).\n- **aria2**: The core engine [aria2](https://github.com/aria2/aria2) is licensed under GNU GPLv2.\n- **AriaNg**: The web interface is based on [AriaNg](https://github.com/mayswind/AriaNg), which is licensed under the MIT License.\n\n---\n\n© 2026 AriaX. All rights reserved.\n","summary":"AriaX is a high‑performance download manager for macOS and iOS that embeds the industrial‑strength aria2 engine inside a native SwiftUI interface, allowing users to start downloads without any terminal setup. It offers zero‑configuration “full” builds with a built‑in aria2 server, a lightweight remote‑control Lite edition, Safari extension integration, a custom URL scheme, and support for local or remote NAS/ server control via JSON‑RPC. The app is fully localized in over ten languages and can sync data through iCloud, making it ideal for Apple users who need a modern, feature‑rich downloader that works seamlessly across desktop and mobile devices.","description":"AriaX: The Ultimate Download Manager for Apple Users","stars":195,"language":"C++"},{"owner":"thedrmaker","repo":"DrPasswords","url":"https://github.com/thedrmaker/DrPasswords","readme":"# Dr. Passwords 🔐\n\n<p align=\"center\">\n  <img src=\"assets/device.jpg\" width=\"300\"/>\n</p>\n\n<p align=\"center\">\n  <b>A physical open-source password manager built with ESP32-S3</b>\n</p>\n\n---\n\n## 🎬 Watch the video\n\n[![Watch the video](https://img.youtube.com/vi/tpA8L6P6DDg/0.jpg)](https://www.youtube.com/watch?v=tpA8L6P6DDg)\n\n---\n\n## 🚀 Features\n\n- 🔐 Store passwords locally (no cloud)\n- ⌨️ Type passwords automatically (HID keyboard emulation)\n- 👤 Username / Password / Username+TAB+Password modes\n- 🔢 Built-in TOTP (2FA) generator\n- 📟 On-device UI (screen + buttons)\n- ⚙️ Settings page (add / edit / delete passwords)\n- 🔑 Generate strong random passwords\n- 🌐 Wi-Fi assisted time sync for TOTP\n\n---\n\n## 🧠 Concept\n\nThis project is inspired by **hardware crypto wallets**.\n\nInstead of trusting cloud services, your passwords are stored in a **physical device** that you control.\n\n---\n\n## 🛠️ Hardware\n\n### Main board\n- ESP32-S3 (recommended)\n\n### Optional parts\n- RTC module (for offline time keeping)\n- Compact USB adapter (for flash-drive style form factor)\n\n---\n\n### 🔗 Components & Links\n\n| Component | Link |\n|----------|------|\n| LILYGO ESP32-S3 | [Buy here](https://s.click.aliexpress.com/e/_c3U8wX7j) |\n| RTC Module | [Buy here](https://s.click.aliexpress.com/e/_c4W6CP4H) |\n| USB-C to USB-C Adapter | [Buy here](https://s.click.aliexpress.com/e/_c4nUhoEV) |\n| USB-C to USB-A Adapter | [Buy here](https://s.click.aliexpress.com/e/_c43FLfM9) |\n\n---\n\n> 💡 Some links may be affiliate links that help support the project.\n\n---\n\n## ⚡ How it works\n\n### 🔐 Password Mode\n- Select account\n- Device types:\n  - username\n  - password\n  - both automatically\n\n### 🔢 TOTP Mode\n- Generates 2FA codes (like Google Authenticator)\n- Works based on time + secret key\n- Can auto-type the code via USB\n\n### ⚙️ Settings Mode\n- Connect to device Wi-Fi\n- Open local page\n- Add / edit / delete accounts\n- Generate passwords\n\n---\n\n## 📦 Status\n\n**Version 1 (Prototype)**\n\nMore features coming soon 👇\n\n---\n\n## 🔮 Roadmap\n\n- [ ] Bluetooth HID support\n- [ ] Encrypted storage\n- [ ] Backup & restore\n- [ ] Fingerprint / local unlock\n- [ ] Better UI/UX\n- [ ] Hardware improvements\n\n---\n\n## ⚠️ Important Notice\n\nThis project is for **educational and personal use only**.\n\n❌ Selling this project is NOT allowed  \n❌ Commercial use is NOT allowed  \n\n✅ Only the original creator (**Dr. Maker**) has the right to commercialize this project.\n\n---\n\n## ❤️ Support the project\n\nIf you like this project and want to support its development:\n\n[![Support me](https://img.shields.io/badge/Support-PayPal-blue?style=for-the-badge&logo=paypal)](https://paypal.com/ncp/payment/CRE2CT9J2JJRQ)\n\n\n---\n\n## 🤝 Contributing\n\nThis is an open-source project — let’s build it together!\n\nYou can help by:\n- improving the code\n- suggesting features\n- improving UI/UX\n- enhancing security\n- testing on different devices\n\n---\n\n## 👨‍💻 Author\n\n**Dr. Maker**\n\n---\n\n## 📄 License\n\nThis project uses a custom non-commercial license.  \nCommercial use and selling are not allowed.\n\nSee the [LICENSE](LICENSE) file for details.\n","summary":"DrPasswords is a physical, open‑source password manager that runs on an ESP32‑S3 and stores credentials locally on a small device, eliminating reliance on cloud services. It automatically types usernames, passwords, or combination entries via USB HID, includes a built‑in TOTP generator for two‑factor authentication, and offers an on‑device UI for managing accounts and generating strong passwords. The project is ideal for privacy‑conscious users who want a tamper‑proof, self‑contained credential storage solution that can be integrated into their workflow without exposing data to third‑party servers.","description":"Open-source physical password manager built with ESP32-S3 with HID typing and TOTP support.","stars":147,"language":"C++"},{"owner":"intave","repo":"intave","url":"https://github.com/intave/intave","readme":"\n![Intave](docs/assets/hero_banner.png \"Intave\")\n\n\nIntave is an enterprise anticheat plugin for Minecraft servers in development since 2016.\nAfter almost a decade of use on the world's largest Minecraft servers\nand shutting down in mid-2025, we now decided to give back to the community by making Intave source-available to everyone.\n\n## Downloads\n- [Nightly Build](https://github.com/intave/intave/releases/download/nightly/Intave.jar)\n- [Modrinth](https://modrinth.com/plugin/intave)\n- [Auto Loader](https://github.com/intave/loader/releases/download/v1.0.0/IntaveLoader.jar)\n\n## General\n\nUnlike traditional module-based anticheats, Intave accurately simulates player movement, client-side entity and block\ndata to detect even the smallest manipulations. Through this approach, Intave successfully prevents any kind of combat,\nmovement and interaction exploits, such as speed/fly cheats or reaching beyond the 3.0 block range.\n\nAdditionally, Intave provides heuristic checks to counter aimbot, auto-clicker, timer, placement, block breaking,\ninventory\nand many other cheats that cannot be detected by solely simulating client logic.\n\nFor more information, see the documentation of Intave's\nchecks [here](https://docs.intave.ac/mechanics/checks-01-overview.html).\n\n## Development\n\n### Setup\n\n1. Clone the project: `git clone https://github.com/intave/intave.git`.\n2. Open the project as Gradle project; wait a few minutes for IntelliJ to index and build the\n   project.\n\n### Testing\n\nChoose one of the `intave/run_X.X.X` gradle tasks corresponding to the Minecraft server version\nyou want to test. Intave is then automatically installed on that server. In case of Intave failing to download\nProtocolLib, make sure you manually install ProtocolLib on the server by moving it into the `plugins` directory.\n\nBy doing so, you can run the plugin directly in the IDE. Breakpoints and hotswapping is\nenabled!\nWe use [this IntelliJ plugin](https://plugins.jetbrains.com/plugin/14832-single-hotswap) for efficient hotswapping, which\ncan swap method contents that don't have an indy lambda or anonymous class.\n\n## Contributing\n\nWe accept contributions to the project, but please make sure to read the [contributing guidelines](docs/CONTRIBUTING.md) before doing so.\nFor a high-level overview of the project organization, see [this document](docs/STRUCTURE.md).\nA cheatsheet can be found [here](docs/CHEATSHEET.md) to quickly find your way around the codebase, contributions welcome!\nOur block system is briefly outlined in [this document](docs/BLOCK_SYSTEM.md).\nIf you have any questions, feel free to get in touch with us on [Discord](https://intave.ac/go/discord).\n\n## License\nWe want to make Intave completely free and open, available for everyone, indefinitely.\nHowever, we don't want you or others to take this work, rebrand it and sell it as their own creation.\nWe've seen this happen multiple times with other anticheats, and we explicitly forbid this kind of behavior.\nStill, we want to allow Minecraft servers commercial use of Intave and\nthe ability to modify and adapt it to their needs, as long as they don't sell it as a product or publish it.\nTherefore, we decided to use the [Polyform Perimeter License 1.0.0](LICENSE.md),\nprohibiting any form of competitive use.\nWe also want to encourage everyone to contribute back to the project instead of creating their personal spin-offs,\nmaking the project better for everyone instead of fragmenting the community and development efforts.\nThis also technically means Intave isn't actually \"open-source\", but \"source-available\" for everyone to use and modify, but not to sell,\nrebrand as their own or mix into their own product or project, no matter the respective licenses.\nIn case of source stealing or commercial redistribution we will be issuing DMCA takedowns and in blatant cases we will go \nthe extra mile to bring legal action against you, we are not joking about this.\nPlease note that Intave uses third-party libraries, which are licensed under their respective licenses and\nmay not be covered by the Polyform Perimeter License.\n","summary":"Intave is an enterprise‑grade anti‑cheat plugin for Minecraft servers that has been battle‑tested on the world’s largest communities. It works by faithfully simulating player movement and client‑side entity/block data, allowing it to catch even the tiniest manipulation of combat, movement, and interaction mechanics, while also running heuristic checks for aimbot, auto‑clicker, timer, and other hidden exploits. The project is supplied with nightly builds, a lightweight loader, and a full Gradle‑based development environment that supports hot‑swapping, making it attractive to server operators who need a robust, customizable defence that can be tweaked without reselling. Open‑source contributors and advanced administrators benefit from its transparent codebase, comprehensive documentation, and the ability to extend or modify its behaviour before releasing a new Minecraft server version.","description":"Intave is an enterprise, high-performance anticheat for Minecraft built on years of experience protecting the world's largest servers ","stars":224,"language":"Java"},{"owner":"Jakubantalik","repo":"transitions.dev","url":"https://github.com/Jakubantalik/transitions.dev","readme":"# Transitions.dev\n\nTransitions.dev is an interactive collection of reusable CSS transitions. Each card on the index page demonstrates a different interaction pattern and ships a copy-ready, portable CSS snippet for each.\n\nLive site: https://transitions.dev/\n\n## Transitions\n\n| # | Name | What it shows |\n|---|------|---------------|\n| 1 | **Card resize** | Smooth card resize transition. |\n| 2 | **Number pop-in** | Digit flip with blur and stagger. |\n| 3 | **Notification badge** | Diagonal slide with spring pop-in. |\n| 4 | **Text states swap** | Text swap transition with blur. |\n| 5 | **Menu dropdown** | Origin-aware open / close transition. |\n| 6 | **Modal open / close** | Modal transition with scale. |\n| 7 | **Panel reveal** | Panel open / close transition. |\n| 8 | **Page side-by-side** | Forward / back page transition. |\n| 9 | **Icon swap** | Scale and blur icon swap. |\n\nEach card has a copy button that emits a self-contained CSS snippet: semantic CSS custom properties on `:root`, the transition rules namespaced under `t-*` classes, and a `@media (prefers-reduced-motion: reduce)` guard — so you can paste the snippet into any project and apply it to any component without pulling in demo-specific markup or sizing.\n\n## Files\n\n- `index.html` — main showcase page with all nine transitions and per-card \"copy CSS\" buttons.\n- `assets/` — icons, favicons, and the social-share OG image.\n- `site.webmanifest`, `robots.txt`, `sitemap.xml` — PWA/SEO metadata.\n\n## Run locally\n\n```bash\npython3 -m http.server 8765\n```\n\nThen open http://127.0.0.1:8765/.\n","summary":"Transitions.dev is an interactive showcase of nine reusable CSS transition patterns, each displayed on a dedicated card that demonstrates a distinct interaction such as card resizing, number flip, or modal opening. Every card provides a ready‑to‑copy CSS snippet that includes semantic custom properties, namespaced `t-*` classes, and a `prefers-reduced-motion` guard, allowing developers to drop the code into any project without extra markup. The site’s clean, copy‑button interface makes it easy for front‑end engineers and UI designers to experiment with and integrate modern, performance‑friendly animations into their components.","description":"Collection of the most essential transitions for web apps that you can just copy and paste into any project. ","stars":513,"language":"HTML"},{"owner":"sweriko","repo":"ai4anim-webgpu","url":"https://github.com/sweriko/ai4anim-webgpu","readme":"# ai4anim-webgpu\n\nA TypeScript three.js WebGPU inference port of the biped + quadruped neural-motion-matching demos from [facebookresearch/ai4animationpy](https://github.com/facebookresearch/ai4animationpy) by [Paul Starke](https://github.com/paulstarke) and [Sebastian Starke](https://github.com/sebastianstarke).\n\n**Live demo:** [motionsynth.sweriko.com](https://motionsynth.sweriko.com)\n\n<img width=\"1375\" height=\"773\" alt=\"image\" src=\"https://github.com/user-attachments/assets/ac3abd00-18ba-4e70-97be-1c96e9805598\" />\n\n\n## What it does\n\n- Runs the upstream biped + quadruped neural networks directly in the browser\n- Batched compute: one dispatch per prediction tick across every active agent, with mixed-precision matmul kernels (fp16 weights, fp32 accumulator).\n- All agents share a single instanced `SkinnedMesh`\n- basic controll interface\n\n## setup\n\n```bash\nnpm install\nnpm run dev     \n```\n\n## Attribution & license\n\nThis is a derivative work of AI4AnimationPy. See [`NOTICE`](./NOTICE) for full attribution and [`LICENSE`](./LICENSE) for the license terms (CC BY-NC 4.0 — non-commercial use only). The \"ai4anim-\" prefix is descriptive; this project is not affiliated with or endorsed by Meta or the original authors.\n","summary":"ai4anim‑webgpu ports Facebook’s AI4Animation neural‑motion‑matching demos (biped and quadruped) to the browser using TypeScript and Three.js with WebGPU. It runs the full inference pipeline client‑side, dispatching batched mixed‑precision matrix multiplications per tick so that many agents share a single instanced SkinnedMesh for efficient rendering. The bundle also exposes a simple control interface and a live demo showcase. It’s ideal for animators, game developers, or researchers who want instant, GPU‑accelerated neural animation directly in a web page without a server backend.","description":null,"stars":225,"language":"TypeScript"},{"owner":"stainlu","repo":"hermes-labyrinth","url":"https://github.com/stainlu/hermes-labyrinth","readme":"# Hermes Labyrinth\n\n[![Live demo](https://img.shields.io/badge/demo-live-f0ede4?style=flat-square)](https://stainlu.github.io/hermes-labyrinth/)\n[![Version](https://img.shields.io/github/v/tag/stainlu/hermes-labyrinth?style=flat-square)](https://github.com/stainlu/hermes-labyrinth/releases)\n[![License: MIT](https://img.shields.io/badge/license-MIT-blue.svg?style=flat-square)](./LICENSE)\n[![Smoke tested](https://img.shields.io/badge/smoke-tested-3a6a3a?style=flat-square)](#verification)\n[![Hermes Agent](https://img.shields.io/badge/Hermes-Agent-14130f?style=flat-square)](https://github.com/NousResearch/hermes-agent)\n\nRead-only observability for [Hermes Agent](https://github.com/NousResearch/hermes-agent).\n\nHermes Labyrinth turns autonomous work into a map of crossings: prompts, tool\ncalls, tool results, failures, model switches, subagents, approvals, memory\nhits, redactions, context compression, cron runs, and exportable evidence.\n\nIt is not a chat UI. It is a black-box recorder for agents moving through\nunknown work.\n\n![Hermes Labyrinth dashboard screenshot](./screenshot.png)\n\n## Demo\n\n- Live demo: https://stainlu.github.io/hermes-labyrinth/\n- Current release: [`v0.1.3`](https://github.com/stainlu/hermes-labyrinth/releases/tag/v0.1.3)\n- Hermes Agent: https://github.com/NousResearch/hermes-agent\n\nThe public demo is static and uses mocked Hermes state so it can run on GitHub\nPages. The installable dashboard plugin reads local Hermes state through Hermes\ndashboard plugin routes.\n\n## Highlights\n\n- **Journey index**: recent CLI, dashboard, gateway, cron, and delegated work.\n- **Labyrinth map**: ordered crossings through a selected agent journey.\n- **Inspector**: input, output, duration, status, evidence, and guideposts for\n  a selected crossing.\n- **Guideposts**: generated observations backed by local evidence.\n- **Skill atlas**: effective skills plus shadowed overrides and true\n  duplicate diagnostics.\n- **Cron gate**: scheduled autonomy, next runs, last failures, and workdirs.\n- **Model ferry**: model/provider transitions across sessions.\n- **Reports**: redacted Markdown and JSON exports for one journey.\n\n## Install\n\nInstall into the Hermes user plugin directory:\n\n```bash\nmkdir -p ~/.hermes/plugins\ngit clone https://github.com/stainlu/hermes-labyrinth.git ~/.hermes/plugins/hermes-labyrinth\n```\n\nStart the dashboard after installing:\n\n```bash\nhermes dashboard\n```\n\nIf the dashboard was already running, fully stop and restart it after a first\ninstall or after updating `dashboard/plugin_api.py`. The frontend plugin list\ncan be rescanned, but Python API routes are mounted during dashboard startup.\nIf the Labyrinth tab shows a backend/API diagnostic, restart the dashboard and\ncheck the dashboard startup logs for plugin API import errors.\n\nRescan is only for refreshing discovered frontend manifests/assets in the\ncurrent dashboard process:\n\n```bash\ncurl http://127.0.0.1:9119/api/dashboard/plugins/rescan\n```\n\nOpen the dashboard and select the `Labyrinth` tab.\n\nOptional theme scaffold:\n\n```bash\nmkdir -p ~/.hermes/dashboard-themes\ncp ~/.hermes/plugins/hermes-labyrinth/theme/hermes-labyrinth.yaml ~/.hermes/dashboard-themes/\n```\n\n## Safe Docker PoC\n\nFor Docker-based Hermes installs, test Labyrinth against a dedicated Hermes\nhome first. Do not mount a production profile with live provider, OAuth,\nwebhook, Discord, Telegram, or deployment tokens until the redaction smoke test\nbelow passes.\n\nPin a known commit instead of tracking `main` blindly:\n\n```bash\nmkdir -p ~/.hermes/plugins\ngit clone https://github.com/stainlu/hermes-labyrinth.git ~/.hermes/plugins/hermes-labyrinth\ncd ~/.hermes/plugins/hermes-labyrinth\ngit checkout <reviewed-tag-or-commit>\n```\n\nMount the host Hermes home into the dashboard container using the same path the\ndashboard expects for user plugins. Keep the dashboard bound to localhost or a\nprivate network while evaluating trace data.\n\nBefore production use:\n\n- create a test journey containing dummy API keys, webhook secrets, OAuth\n  tokens, and tool outputs\n- inspect the Labyrinth UI\n- inspect `/reports/<journey_id>.json`\n- inspect `/reports/<journey_id>.md`\n- confirm dummy secrets are absent from every surface\n\nRollback is just plugin disable/remove plus a dashboard restart or rescan:\n\n```bash\nhermes plugins disable hermes-labyrinth\nrm -rf ~/.hermes/plugins/hermes-labyrinth\ncurl http://127.0.0.1:9119/api/dashboard/plugins/rescan\n```\n\nUse a full dashboard restart when rollback or update changes Python API files;\nrescan alone cannot unmount or remount FastAPI routes in the current process.\n\n## Data Policy\n\nHermes Labyrinth is read-only by design.\n\n- It does not start, stop, resume, mutate, or create Hermes sessions.\n- Secret redaction is applied to journey summaries, previews, and reports.\n- If the Hermes core redactor cannot be loaded or throws, Labyrinth fails\n  closed and shows `[redaction unavailable]` instead of raw trace text.\n- Unknown fields stay unknown.\n- Reports are generated from local Hermes state.\n- The public demo uses sample data and should not be treated as live telemetry.\n\n## Verification\n\n```bash\nnpm test\n```\n\n`npm test` runs:\n\n- reproducible build checks for `dashboard/dist` and `index.html`\n- frontend JavaScript parse checks\n- backend Python parse checks\n- API normalization fixture tests, including numeric Hermes timestamps\n- packed-artifact and dead-control regressions\n- headless Chrome smoke coverage for map modes, route changes, search,\n  dataset switching, and the threshold filter\n\nTo smoke-test the deployed Pages build:\n\n```bash\nnpm run smoke:live\n```\n\n## Development\n\n```bash\nnpm run build\nnpm run check\nnpm run smoke\n```\n\n`dashboard/dist/` is generated from `src/parts/*.js` and `src/labyrinth.css`.\n`index.html` is generated from `src/demo/index.html` with content-hash query\nstrings on the local JS/CSS assets. These files are checked in because Hermes\ndashboard plugins and GitHub Pages are loaded directly from built static files.\n\n## Repository Layout\n\n```text\n.\n├── dashboard/\n│   ├── manifest.json        # Hermes dashboard plugin manifest\n│   ├── plugin_api.py        # Read-only API over local Hermes state\n│   └── dist/                # Generated dashboard plugin bundle\n├── docs/\n│   ├── CONCEPT.md\n│   ├── DESIGN_BRIEF.md\n│   └── FUNCTIONAL_SPEC.md\n├── scripts/\n│   ├── build-plugin.mjs     # Builds dashboard/dist and index.html from src\n│   ├── smoke-demo.mjs       # Browser smoke test for the public demo\n│   ├── test-plugin-api.py   # Fixture tests for API normalization helpers\n│   └── verify.mjs           # Local verification checks\n├── src/\n│   ├── demo/                # GitHub Pages demo source\n│   ├── parts/               # Ordered frontend source chunks\n│   └── labyrinth.css        # Frontend CSS source\n├── theme/\n│   └── hermes-labyrinth.yaml\n├── index.html               # Generated GitHub Pages demo\n├── screenshot.png           # README screenshot\n└── package.json             # Build/check/smoke scripts\n```\n\n## Architecture\n\n```text\nHermes local state\n  ├─ state.db sessions/messages\n  ├─ skills directories\n  └─ cron config\n        ↓\ndashboard/plugin_api.py\n        ↓\n/api/plugins/hermes-labyrinth/*\n        ↓\nsrc/parts/*.js + src/labyrinth.css\n        ↓ npm run build\ndashboard/dist/*\n        ↓\nHermes dashboard tab: Labyrinth\n```\n\n## API Surface\n\n```text\nGET /api/plugins/hermes-labyrinth/health\nGET /api/plugins/hermes-labyrinth/journeys\nGET /api/plugins/hermes-labyrinth/journeys/{journey_id}\nGET /api/plugins/hermes-labyrinth/journeys/{journey_id}/crossings\nGET /api/plugins/hermes-labyrinth/skills\nGET /api/plugins/hermes-labyrinth/cron\nGET /api/plugins/hermes-labyrinth/guideposts\nGET /api/plugins/hermes-labyrinth/reports/{journey_id}.json\nGET /api/plugins/hermes-labyrinth/reports/{journey_id}.md\n```\n\n`/skills` returns effective `skills`, expected `shadowed` overrides, true\n`duplicates`, and scan `errors` separately so normal user-over-bundled\noverrides do not hide real filesystem problems.\n\n## Project Status\n\n`v0.1.3` is a hackathon preview that is stable enough to demo and install as a\nread-only dashboard plugin. The public demo and main UI flows are covered by\nbrowser smoke tests; full Hermes dashboard integration tests are still on the\nroadmap.\n\nSee [Known Limitations](./KNOWN_LIMITATIONS.md), [Roadmap](./ROADMAP.md), and\n[Changelog](./CHANGELOG.md).\n","summary":"Hermes Labyrinth is a read‑only observability dashboard that records the inner workings of the Hermes Agent, turning autonomous interactions into a detailed map of prompts, tool calls, failures, model switches, approvals, and more. It offers a journey index, order‑preserving labyrinth map, an inspector for each crossing, guideposts with evidence, a skill atlas, and cron and model‑ferry views, plus redacted Markdown and JSON export of a single journey. The tool is designed for developers and researchers building or debugging Hermes‑based agents, providing them with a comprehensive audit trail and visual analysis of agent behavior without the need for a chat UI.","description":"Read-only observability plugin for Hermes Agent: journeys, crossings, guideposts, and reports.","stars":252,"language":"HTML"},{"owner":"EmGi96","repo":"TrailPrint3D","url":"https://github.com/EmGi96/TrailPrint3D","readme":"# TrailPrint3D\n\nA Blender addon that turns GPS trails and geographic data into 3D-printable miniature maps.\n\n[TrailPrint3D.com](https://www.trailprint3d.com)\n\n[Slightly outdated Video Tutorial](https://www.youtube.com/watch?v=2NzwC3188HY&t=242s)\n\n## Features\n\n### Map Generation\n- Import a GPX file and generate a 3D map around your trail\n- Three generation modes: **Single Trail**, **Multi-Trail chain** *(Premium)*, **Terrain** *(Premium)*\n- Terrain generation from custom map bounds (center + radius, two corner points, or a blank tile)\n- Configurable shape: circle, square (with independent width/height), ellipse (with aspect ratio), hexagon, octagon, medal\n- Elevation scaling, path thickness, and single-color-mode for clean single-material prints\n\n### Terrain Elements\nAutomatically fetches and renders geographic data from OpenStreetMap:\n- Water (ponds, small rivers, big rivers)\n- Ocean\n- Forests, Scree, Glaciers\n- Farmland, Greenspaces\n- City boundaries\n- Buildings (3D, experimental)\n- Roads (major, primary, and small streets)\n\n### Post-Processing\n- **Color Mountains** — assigns material zones by elevation threshold\n- **Contour Lines** — adds printable contour line geometry\n- **Magnet Holes** — drills holes for magnets (configurable diameter/depth)\n- **Dovetail Cutouts** — adds dovetail joints for tiling maps\n- **Bottom Mark** — engraves a mark on the bottom face\n- **SVG / Text Import** — imports SVG outlines or custom text as 3D objects\n- **Pin Placement** — places a pin at GPS coordinates; pin on city name *(Premium)*\n- **Heightmap Import** *(Premium)* — imports a 2D image as a heightmap\n\n\n### Export\n- Export to **STL**, **OBJ**, and **3MF** (3mf is using the [3MF Addon by Clonephaze](https://github.com/Clonephaze/3MF-Blender-Add-on---Maintained))\n- Configurable default export folder in addon preferences\n- Optional auto-export after generation\n\n\n## Requirements\n\n- Blender **4.5** or newer (Version 5.1 recommended for best stability)\n- Internet connection for elevation and map data APIs\n- (Optional) OpenTopography API key — free at [portal.opentopography.org](https://portal.opentopography.org)\n- (Optional) [3MF Addon by Clonephaze](https://github.com/Clonephaze/3MF-Blender-Add-on---Maintained) for 3MF export\n\n## Installation\n\n1. Download the latest release zip (or from https://trailprint3d.com).\n2. In Blender, go to **Edit → Preferences → Add-ons → Install**.\n3. Select the downloaded zip and enable **TrailPrint3D**.\n4. If not visible, Press \"N\" on your Keyboard to open the Sidebar. Navigate to the\n   TrailPrint3D Tab in the Sidebar\n\nVideo Tutorial for the Installation:\nhttps://youtu.be/qfpxZbYOvvk\n\n\n## Data Sources\n\n| Data | Provider | Used for |\n| Elevation (SRTM & others) | [OpenTopoData](https://www.opentopodata.org) | Terrain height |\n| Elevation (SRTM/NASA) | [Open-Elevation](https://open-elevation.com) | Terrain height |\n| Elevation tiles | [Terrain Tiles / Mapzen](https://registry.opendata.aws/terrain-tiles/) | Terrain height |\n| Elevation (high-res datasets) | [OpenTopography](https://opentopography.org) | Terrain height (API key required) |\n| Water, forests, roads, buildings, cities | [Overpass API](https://overpass-api.de) | Map elements |\n| Geographic data | [OpenStreetMap contributors](https://www.openstreetmap.org/copyright) | Underlying map data |\n\n## License\n\nCopyright (C) 2026 EmGi.\nReleased under the [GNU General Public License](https://www.gnu.org/licenses/gpl-3.0.html).\nModels generated by this addon may be used commercially.\n","summary":"TrailPrint3D is a Blender add‑on that transforms GPS trails and geographic data into ready‑to‑print miniature maps, allowing users to import GPX files and generate 3‑D landscapes that include terrain elevation, water, forests, roads, and even 3‑D buildings sourced from OpenStreetMap. It offers a range of generation modes (single trail, multi‑trail chain, and terrain), shape options, elevation scaling, and advanced post‑processing tools such as color‑by‑elevation, contour lines, magnet holes, dovetail joints, and custom pin placement, with additional premium features like city‑pin placement and height‑map import. The add‑on outputs STL, OBJ, or 3MF files and can automatically export after creation, making it ideal for 3‑D printing enthusiasts, map hobbyists, and anyone who wants to produce detailed, low‑scale terrain models for displays or gameplay.","description":null,"stars":170,"language":"Python"},{"owner":"wxtsky","repo":"byob","url":"https://github.com/wxtsky/byob","readme":"<div align=\"center\">\n\n<img src=\"assets/logo.svg\" alt=\"byob\" width=\"120\"/>\n\n# byob\n\n**Bring Your Own Browser** — let your AI assistant use the Chrome you already have open.\n\n[![License: MIT](https://img.shields.io/badge/license-MIT-22c55e.svg)](LICENSE) [![MCP](https://img.shields.io/badge/MCP-stdio-0a0a0a.svg)](https://modelcontextprotocol.io) [![Chrome MV3](https://img.shields.io/badge/Chrome-MV3-f59e0b.svg)](https://developer.chrome.com/docs/extensions/mv3/intro/) [![v0.3](https://img.shields.io/badge/v0.3-ready-22c55e.svg)](CHANGELOG.md)\n\n**English** · [中文](README.zh-CN.md)\n\n</div>\n\n---\n\nbyob is a local MCP server that lets AI coding tools (Claude Code, Cursor, Cline, Windsurf, etc.) directly control **your real Chrome** — the one where you're already logged into everything.\n\n```\n\"read my Twitter timeline and summarize the top 5 posts\"\n\"google 'mcp protocol spec', click the first result, read the page\"\n\"take a screenshot of example.com\"\n\"grab my GitHub session cookie so I can curl with it\"\n\"open my Gmail tab and tell me how many unread\"\n```\n\n|  | WebFetch | Headless Puppeteer | **byob** |\n|---|:-:|:-:|:-:|\n| Sees logged-in pages | ❌ | ⚠️ manual cookie copy | ✅ already logged in |\n| Passes bot detection | ❌ | ❌ | ✅ real human browser |\n| Setup time | 0 | hours | **~5 min** |\n| Cloud cost | free | $$ | free |\n\n---\n\n## Install\n\n### Quick install (recommended)\n\n```sh\ncurl -fsSL https://raw.githubusercontent.com/wxtsky/byob/main/install.sh | bash\n```\n\nThe script checks prerequisites (Node.js ≥ 20, bun, Chrome), clones the repo, builds everything, and walks you through MCP registration interactively. If bun is not installed, it offers to install it for you.\n\n> Set `BYOB_INSTALL_DIR` to change the install location (default: `~/byob`).\n\n### Manual install\n\n<details>\n<summary>Prefer to do it yourself?</summary>\n\nRequires **Node.js ≥ 20**, **bun**, **Chrome**, and any MCP-compatible AI tool.\n\n```sh\ngit clone https://github.com/wxtsky/byob\ncd byob\nbun install\nbun run setup\n```\n\n</details>\n\n`bun run setup` walks through the install interactively:\n\n1. Pick output language (English / 中文)\n2. Generates a unique extension key for you\n3. Builds the Chrome extension\n4. Writes the config that lets Chrome talk to byob\n5. Prompts you to multi-select your AI tools, then registers each one (CLI tools via their `mcp add` command, JSON-config tools by writing the config file directly)\n\nAfter the script finishes, three manual steps remain:\n\n### Step 2 — Load extension in Chrome\n\nOpen `chrome://extensions` in Chrome.\n\n1. Top-right → turn ON **Developer mode**\n2. Top-left → click **Load unpacked**\n3. Select the folder printed in your terminal, something like:\n   ```\n   /your/path/to/byob/packages/extension/output/chrome-mv3\n   ```\n\n### Step 3 — Restart Chrome\n\n**Quit Chrome completely** (`⌘Q` on Mac / close all windows on Windows), then reopen.\n\n> Closing a single tab or window is not sufficient — Chrome only reads the Native Messaging config at startup.\n\n### Step 4 — (Reference) Manual MCP registration\n\nThe setup script registers your selected tools automatically. The block below is for reference only — use it if you skipped the prompt or want to register a different tool later:\n\n<details open>\n<summary><b>Claude Code</b></summary>\n\n```sh\nclaude mcp add byob -s user -- /path/to/tsx /path/to/byob-mcp.ts\n```\n\nTo enable `browser_eval`, add `-e BYOB_ALLOW_EVAL=1` after `-s user`.\n\n</details>\n\n<details>\n<summary><b>Codex CLI</b></summary>\n\n```sh\ncodex mcp add byob -- /path/to/tsx /path/to/byob-mcp.ts\n```\n\n</details>\n\n<details>\n<summary><b>Cursor</b></summary>\n\nAdd to `.cursor/mcp.json` (project) or `~/.cursor/mcp.json` (global):\n\n```json\n{\n  \"mcpServers\": {\n    \"byob\": {\n      \"command\": \"/path/to/tsx\",\n      \"args\": [\"/path/to/byob-mcp.ts\"]\n    }\n  }\n}\n```\n\n</details>\n\n<details>\n<summary><b>Windsurf</b></summary>\n\nAdd to `~/.codeium/windsurf/mcp_config.json` (same JSON format as Cursor):\n\n```json\n{\n  \"mcpServers\": {\n    \"byob\": {\n      \"command\": \"/path/to/tsx\",\n      \"args\": [\"/path/to/byob-mcp.ts\"]\n    }\n  }\n}\n```\n\n</details>\n\n<details>\n<summary><b>Cline (VS Code)</b></summary>\n\nOpen Cline sidebar → MCP Servers → Configure, then add (same JSON format):\n\n```json\n{\n  \"mcpServers\": {\n    \"byob\": {\n      \"command\": \"/path/to/tsx\",\n      \"args\": [\"/path/to/byob-mcp.ts\"]\n    }\n  }\n}\n```\n\n</details>\n\n> The actual paths are printed by the setup script. The examples above use shortened paths for readability.  \n> To enable `browser_eval`, add `\"env\": { \"BYOB_ALLOW_EVAL\": \"1\" }` to the config (or `-e BYOB_ALLOW_EVAL=1` for CLI tools).\n\n### Step 5 — Wait for setup to confirm the bridge is online\n\nAfter you finish steps 2 and 3 (load the extension and ⌘Q-restart Chrome), **setup auto-detects the bridge coming online** and prints `✓ bridge online`. The installation is complete — open a new session in your AI tool and try _\"use byob to read ...\"_.\n\nIf you exited setup early with Ctrl+C, or want to check the state later:\n\n```sh\nbun run doctor\n```\n\n`bun run doctor` prints actionable fixes under every `✗` (e.g. \"⌘Q-restart Chrome\", \"extension ID mismatch\", etc.).\n\n---\n\n## Tools\n\n| Tool | What it does |\n|---|---|\n| `browser_read` | Open a page, scroll through, read all text |\n| `browser_read_markdown` | Same, returns clean markdown (no nav/ads) |\n| `browser_extract_table` | Pull `<table>` elements as JSON |\n| `browser_get_console_logs` | Snapshot console.log / warn / error |\n| `browser_start_record_network` | Start recording HTTP + WebSocket traffic |\n| `browser_stop_record_network` | Stop recording, export JSON or HAR |\n| `browser_screenshot` | Screenshot → saved to disk |\n| `browser_download_images` | Download all images from a page |\n| `browser_click` | Click a button or link |\n| `browser_type` | Type into an input (optionally press Enter) |\n| `browser_press_key` | Send a keyboard key (Enter, Escape, F5, ArrowDown, ...) |\n| `browser_hover` | Hover the mouse over an element to trigger tooltips/menus |\n| `browser_select` | Choose an option in a native `<select>` |\n| `browser_scroll` | Scroll to top/bottom, an element, or a Y coordinate |\n| `browser_get_html` | Get raw HTML of an element or the whole page |\n| `browser_get_cookies` | Export cookies for `curl` / scripts |\n| `browser_navigate` | Open a URL in a new or existing tab |\n| `browser_go_back` | Go back one step in browser history |\n| `browser_go_forward` | Go forward one step in browser history |\n| `browser_wait_for` | Wait for an element to appear |\n| `browser_list_tabs` | List all open tabs |\n| `browser_switch_tab` | Switch to a tab |\n| `browser_close_tab` | Close a tab by tabId |\n| `browser_eval` | Run JavaScript on the page (off by default) |\n| `browser_set_cookies` | Write a cookie via `chrome.cookies.set` (CHIPS-aware). |\n| `browser_print_pdf` | Save current page as PDF (default `~/.byob/pdfs/`). |\n| `browser_get_storage` | Read `localStorage` / `sessionStorage` for an origin. |\n| `browser_get_performance` | Page Web Vitals + navigation timing. |\n| `browser_upload_file` | Upload local files to `<input type=\"file\">`. |\n| `browser_intercept_start` | Start a stateful request-interception session. |\n| `browser_intercept_stop` | Stop a `browser_intercept_start` session and return hit stats. |\n| `browser_drag` | Drag the mouse from one point to another (linear interpolation). |\n| `browser_emulate_device` | Emulate mobile/tablet viewport / DPR / touch / UA. |\n\n17 of these tools support `framePath` to reach into nested iframes (including cross-origin).\n\nFull schemas: [`shared/src/schemas.ts`](shared/src/schemas.ts)\n\n---\n\n## How it works\n\n```\nAI tool → byob-mcp → byob-bridge → Chrome extension → your tab\n         (stdio)    (Unix socket) (Native Messaging) (Chrome DevTools Protocol)\n```\n\nAll communication stays local. No data leaves your machine. When Chrome closes, all byob processes exit automatically.\n\n---\n\n## Everyday commands\n\n```sh\nbun run setup      # install or re-install\nbun run doctor     # check what's working\nbun run bridges    # list running bridge processes\nbun run logs       # tail the bridge log\nbun run unsetup    # remove everything\n```\n\nAll run from the byob repo root.\n\n---\n\n## Reliability\n\n- **End-to-end cancellation.** `Ctrl+C` propagates through the entire chain (MCP → bridge → extension → Chrome), cleanly detaching all debug sessions.\n- **DevTools conflict handling.** If DevTools is open on a tab, `browser_eval` automatically falls back to `chrome.scripting.executeScript`.\n- **Sleep/wake recovery.** After a laptop sleep cycle, byob resets all debug sessions so the next call starts from a clean state.\n\n---\n\n## Security\n\n- `browser_eval` is **off by default** — enable with `BYOB_ALLOW_EVAL=1`. Every call logs + notifies.\n- `chrome://`, `file://`, Google/MS/Apple login pages are blocked by default.\n- Each install gets a unique extension key — no collisions.\n- Socket files are `0600`, dirs are `0700`. Other users can't see them.\n- **Zero outbound network traffic.** No analytics, no pings, no crash reports.\n- Chrome displays a \"byob is debugging this browser\" banner on active tabs. This is a Chrome security feature and cannot be suppressed.\n\n---\n\n## Troubleshooting\n\n| Symptom | Cause | Fix |\n|---|---|---|\n| `No live bridge` | Chrome not running or extension disabled | Check `chrome://extensions` |\n| `cdp_attach_failed` | DevTools open on that tab | Close DevTools |\n| `url_forbidden` | URL on the blocklist | See Security section |\n| `extension_not_connected` | Extension lost connection | Reload at `chrome://extensions` |\n| Nothing works after install | Chrome was not fully restarted | Quit Chrome completely (`⌘Q`) and reopen |\n\nRun `bun run doctor` for detailed diagnostics on which step failed.\n\n---\n\n## Platform notes\n\n| Platform | Auto | Manual |\n|---|---|---|\n| **macOS** | Auto-registers selected MCP tools | Open `chrome://extensions` and load the unpacked extension |\n| **Windows** | Same + writes Native Messaging host to registry | Same as macOS |\n| **Linux** | Auto-registers selected MCP tools | Same as macOS |\n\n---\n\n## More\n\n- [Changelog](CHANGELOG.md)\n- [Contributing](CONTRIBUTING.md)\n- [Design notes](docs/superpowers/specs/2026-04-25-byob-design.md)\n- [Test checklist](docs/e2e-checklist.md)\n\nMIT licensed. byob has broad access to your browser — only use it on machines and accounts you own.\n","summary":"byob is a local MCP server that bridges AI coding assistants—such as Claude Code, Cursor, and Windsurf—to the Chrome browser you already use, allowing the assistant to interact with pages you’re logged into as if you were a human. It provides a Chrome MV3 extension that communicates via native messaging, enabling actions like browsing search results, taking screenshots, or extracting session cookies without bot‑detection failures. With a quick installation script that completes the setup in about five minutes and no cloud cost, developers who rely on AI auto‑completion or web‑automation can instantly control their own Chrome environment from the terminal or code editor. The project is ideal for programmers, researchers, and any workflow that needs direct, authenticated browser access from a model‑driven tool.","description":"Bring Your Own Browser — let your AI agent use the Chrome you already have open","stars":109,"language":"TypeScript"},{"owner":"evanklem","repo":"evanflow","url":"https://github.com/evanklem/evanflow","readme":"# EvanFlow\n\n**A TDD-driven iterative feedback loop for software development with Claude Code.**\n\n16 cohesive skills + 2 custom subagents walk an idea from brainstorm through implementation, with checkpoints throughout where you stay in control. One entry point: say *\"let's evanflow this\"* and the orchestrator runs the loop.\n\n```\nbrainstorm → plan → execute (vertical-slice TDD per task) → iterate → STOP\n                    └─ sequential, or parallel coder/overseer\n```\n\nTDD is not a separate phase after execute — it's the discipline *inside* each code-writing task. Execute is the harness (task tracking, blockers, quality checks); `evanflow-tdd` is what runs inside any task that produces production code.\n\nThe loop is **conductor, not autopilot**: real checkpoints at design approval, plan approval, and after iteration. The agent stops short of every git operation and waits for your direction. No auto-commits. No forced ceremony. No \"must invoke a skill\" tax.\n\n---\n\n## Quick Install\n\nThe **recommended** path — Claude Code's plugin marketplace:\n\n```\n/plugin marketplace add evanklem/evanflow\n/plugin install evanflow@evanflow\n```\n\nRestart, then try:\n\n> \"Let's evanflow this — I want to add a small feature that does X.\"\n\n`evanflow-go` fires and walks the loop. The git-guardrails hook auto-activates with the plugin (no settings.json edit needed). Skills appear under the `evanflow:` namespace (e.g., `/evanflow:evanflow-go`).\n\nSee [Installation](#installation) below for two alternative paths.\n\n---\n\n## What Makes It a Feedback Loop\n\nThe loop is built around **discipline that compounds across iterations**, not single-shot generation. Every step has a checkpoint that gates the next:\n\n- **Brainstorm** clarifies intent, proposes 2–3 approaches with embedded grill (stress-test) → you approve the design\n- **Plan** maps file structure first (deep modules, deletion test) → you approve the plan\n- **Execute** runs task-by-task with inline verification → blockers stop the loop and surface to you. Inside each code-writing task, **TDD** is the discipline (not a separate phase that comes after).\n- **TDD** is vertical-slice only and **per-cycle full RED → GREEN → REFACTOR**: one failing test → minimal impl → refactor *while the test you just wrote is still fresh as your safety net* → next test. Refactor is not deferred to the end. Tests verify behavior through public interfaces, so they survive refactors\n- **Iterate** re-reads the diff with fresh eyes, runs quality checks, screenshots UI changes, and runs against a Five Failure Modes checklist (hallucinated actions, scope creep, cascading errors, context loss, tool misuse). Hard cap of 5 iterations\n- **STOP.** Report. Await your direction. The agent never auto-commits, never auto-stages, never proposes a PR\n\nFor plans with 3+ truly independent units, the loop forks into a **parallel coder/overseer orchestration**: one coder per unit (using vertical-slice TDD with a RED checkpoint), one overseer per coder (read-only review subagent that can't modify code), plus an integration overseer that runs named integration tests at every touchpoint. The integration tests *are* the executable contract — interfaces can't drift if both sides have to satisfy the same passing test.\n\n## Hard Rules Baked Into the Loop\n\nEach rule below cites the source it came from. If a citation is missing, the rule is opinion from running the loop on real projects, not research — labeled as such.\n\n- **Never invent values** — file paths, env vars, IDs, function names, library APIs. If unsure, the agent stops and asks. *Source: action-hallucination is the top failure mode in [DAPLab/Columbia \"9 Critical Failure Patterns of Coding Agents\"](https://daplab.cs.columbia.edu/general/2026/01/08/9-critical-failure-patterns-of-coding-agents.html).*\n- **Assertion-correctness warning**
