raceable to source messages, and the wiki itself becomes a useful artifact your team can browse independently of the Q&A interface. The dual-memory architecture (semantic + graph) lets the query router pick the right retrieval strategy per question, keeping latency low and context precise.\n\n<div align=\"center\">\n  <img src=\"assets/wiki-preview.png\" alt=\"Beever Atlas wiki view — auto-generated overview with concept map, topics, FAQ, glossary, and resources, built from Slack messages\" width=\"85%\" />\n</div>\n<p align=\"center\"><em>A live auto-generated channel wiki: overview, concept map, topics, FAQ, glossary — distilled from 246 Slack messages, not hand-written.</em></p>\n\n### The inspiration: LLMs read wikis, not chat logs\n\nThe per-channel wiki concept is directly inspired by [Andrej Karpathy's observation](https://x.com/karpathy/status/2039805659525644595) that LLMs are far better at reasoning over curated, encyclopedic content (books, docs, wikis) than over raw conversational transcripts. Chat history is noisy, redundant, temporally scattered, and full of implicit context that only humans resolve. A wiki, by contrast, is the *already-distilled* form of that knowledge — deduplicated, structured, citation-bearing, and organised by topic rather than by timestamp.\n\nBeever Atlas operationalises this insight: every synced channel gets its own **auto-generated, continuously-updated wiki** — sections for topics, entities, decisions, open questions, and timelines — rebuilt incrementally as new messages arrive. The QA agent retrieves against this wiki first, falling back to raw messages only when a fact hasn't been distilled yet.\n\n### What this unlocks in practice\n\n- **Better answers, fewer hallucinations** — retrieval operates on fact-dense prose with explicit entity relationships, not on fragmented turn-by-turn chat.\n- **Traceable citations** — every wiki claim links back to the source messages that produced it, so answers are auditable all the way down to the original Slack/Discord/Teams thread.\n- **A browsable artifact, not just a Q&A box** — the wiki is useful *on its own*. New teammates onboarding to a channel can read the distilled wiki instead of scrolling three months of history.\n- **Cheaper inference at query time** — the expensive distillation work happens once, at ingestion. Queries hit compact, pre-digested context instead of re-summarising raw logs on every request.\n- **Graph-aware reasoning** — the entity graph built alongside the wiki lets the query router answer relational questions (\"who worked on X with Y?\") that pure vector RAG struggles with.\n\nFor a detailed comparison with other LLM knowledge tools, see [the comparison page](https://docs.beever.ai/atlas/comparison) on the documentation site.\n\n---\n\n## 🚀 Quick Start\n\nBeever Atlas ships as a Docker Compose stack (backend + bot + web + 4 datastores). You can try a seeded demo in 30 seconds with zero keys, then pick one of **three deployment options** to install it for real.\n\n### 1. Get the code\n\n```bash\ngit clone https://github.com/beever-ai/beever-atlas.git\ncd beever-atlas\n```\n\n### 2. Try the demo first (optional, no keys needed for seeding)\n\n```bash\nmake demo\n```\n\n`make demo` brings up the full stack pre-loaded with a public Wikipedia corpus (Ada Lovelace + Python history). Seeding uses pre-computed fixtures — no API keys required. Asking questions via `/api/ask` needs a free-tier `GOOGLE_API_KEY` because the QA agent calls Gemini. See [demo/README.md](demo/README.md) for curl examples.\n\nSkip this step if you're ready to install for real.\n\n### 3. Before you start: get your API keys\n\nTwo free keys are required before installing. Both offer generous free tiers — enough to sync a small team's channels for testing.\n\n| Key | Purpose | Where to get it |\n|---|---|---|\n| `GOOGLE_API_KEY` | Gemini — extraction, entity graph, answers | [aistudio.google.com/apikey](https://aistudio.google.com/apikey) |\n| `JINA_API_KEY` | Jina v4 embeddings (2048-dim) for semantic search | [jina.ai/api-dashboard](https://jina.ai/api-dashboard/) |\n\nOptional (skip unless you know you need them):\n\n| Key | What it enables |\n|---|---|\n| `TAVILY_API_KEY` | External web search when QA retrieval confidence is low — [tavily.com](https://tavily.com/) |\n| Slack / Discord / Teams bot tokens | **Configured via the web UI after setup**, not `.env` — the bot stores platform credentials encrypted in MongoDB |\n\n> **Tip:** Keep the two required keys handy before you start. Option 1 prompts for them interactively; Options 2 and 3 need them pasted into `.env`.\n\n### 4. Choose a deployment option\n\n| Option | When to use | Time to \"up\" |\n|---|---|---|\n| **1. One-line install** (recommended) | You want the fastest path to a running stack. | ~2 min first run |\n| **2. Manual Docker** | CI/CD, ops environments, or when you want explicit control over every step. | ~3 min first run |\n| **3. Local development** | Active contributors who need hot-reload on backend and frontend. | varies |\n\n### Option 1 — One-line install (recommended)\n\n```bash\n./atlas\n```\n\nThe `atlas` installer walks you through a guided 4-step checklist:\n\n1. **Required LLM keys** — prompts for `GOOGLE_API_KEY` (Gemini) and `JINA_API_KEY` (embeddings); press Enter to skip either.\n2. **Optional integrations** — Tavily web search, Ollama, MCP server for Claude Code / Cursor.\n3. **Graph backend** — Neo4j (default) or skip.\n4. **Auth tokens** — keep dev defaults or rotate now.\n\nUnder the hood it verifies `docker` + `docker compose`, copies `.env.example` → `.env` (preserves your values on re-run, `chmod 600`), auto-generates `CREDENTIAL_MASTER_KEY` (64 hex) and `WEAVIATE_API_KEY` (32 hex), runs a port-conflict preflight, launches the stack via `docker compose up -d --build --force-recreate --remove-orphans`, and polls `/api/health` before printing the ready card.\n\nWhen you see **\"Beever Atlas is ready\"**, open **[http://localhost:3000](http://localhost:3000)**.\n\nFor CI or unattended installs — skip prompts, pre-seed keys from shell env:\n\n```bash\nGOOGLE_API_KEY=... JINA_API_KEY=... ./atlas --non-interactive\n```\n\nRe-running `./atlas` on an existing stack is idempotent.\n\n### Option 2 — Manual Docker\n\nFull control, step-by-step.\n\n```bash\ncp .env.example .env\n```\n\nOpen `.env` and fill in the two required keys:\n\n```env\nGOOGLE_API_KEY=your_gemini_key\nJINA_API_KEY=your_jina_key\n```\n\nGenerate two required secrets and paste them into `.env`:\n\n```bash\n# CREDENTIAL_MASTER_KEY — AES-256-GCM key for stored platform credentials (64 hex chars)\npython -c \"import secrets; print(secrets.token_hex(32))\"\n\n# WEAVIATE_API_KEY — auth between backend and Weaviate (required by docker-compose)\npython -c \"import secrets; print(secrets.token_hex(16))\"\n```\n\nLaunch:\n\n```bash\ndocker compose up -d --build\n```\n\nOpen **[http://localhost:3000](http://localhost:3000)**.\n\n**Services started:**\n\n| Service | Port | Description |\n|---|---|---|\n| Web (nginx) | `:3000` | React dashboard |\n| Backend | `:8000` | FastAPI + ADK agents |\n| Bot | `:3001` | Platform bridge (Slack / Discord / Teams) |\n| Weaviate | `:8080` | Semantic memory |\n| Neo4j | `:7474` / `:7687` | Graph memory |\n| MongoDB | `:27017` | State + wiki cache |\n| Redis | `:6380` | Sessions (internal `:6379`) |\n\nFirst run takes 2–3 minutes while images build and databases initialize. Subsequent runs start in seconds.\n\n### Option 3 — Local development\n\nDatabases in Docker, app services native for hot-reload.\n\n**Prerequisites:** Python 3.12+ with [uv](https://docs.astral.sh/uv/), Node.js 20+\n\n```bash\ncp .env.example .env\n# Fill in GOOGLE_API_KEY, JINA_API_KEY, CREDENTIAL_MASTER_KEY, WEAVIATE_API_KEY (same as Option 2)\n\n# Start just the databases\ndocker compose up -d weaviate neo4j mongodb redis\n\n# Backend (terminal 1)\nuv sync\nuv run uvicorn beever_atlas.server.app:app --reload --port 8000\n\n# Bot (terminal 2)\ncd bot && npm install && npm run dev\n\n# Web (terminal 3) — Vite dev server with HMR\ncd web && npm install && npm run dev\n```\n\nOpen **[http://localhost:5173](http://localhost:5173)** (the Vite dev port — **not** `:3000`).\n\nThe Vite dev server proxies `/api/*` to `http://localhost:8000` (configured via `VITE_API_URL`).\n\n### Before going to production\n\n`.env.example` defaults are tuned for local testing. Before any real deploy, rotate the secrets that ship with placeholder values and flip the environment flag:\n\n| What to change | Why | How |\n|---|---|---|\n| `BEEVER_API_KEYS`, `BEEVER_ADMIN_TOKEN` | Ship as `dev-key-change-me` / `dev-admin-change-me` — public placeholders | `python -c \"import secrets; print(secrets.token_hex(24))\"` per token |\n| `BRIDGE_API_KEY` | Shared secret between backend and bot; blank by default, required outside local dev | Same `secrets.token_hex(24)` |\n| `VITE_BEEVER_API_KEY`, `VITE_BEEVER_ADMIN_TOKEN` | Vite bakes these into the web bundle at build time — must mirror the rotated backend values above | Copy the rotated `BEEVER_API_KEYS` / `BEEVER_ADMIN_TOKEN` values |\n| `NEO4J_PASSWORD` + password half of `NEO4J_AUTH` | Dev password is public in this repo | Pick a strong password; both values must match |\n| `BEEVER_ENV=production` | Enables fail-fast startup that rejects every dev default above | Flip the value in `.env` |\n\nOption 1 (`./atlas`) handles all of this through the **\"Rotate auth tokens\"** prompt in step 4 of the checklist — answer **Y** and the installer generates random tokens and mirrors the VITE_* values for you. If you used Option 2 or 3, you can re-run `./atlas` on the existing `.env`, skip every other prompt with Enter, and only accept the rotation prompt.\n\n### 5. Open the dashboard\n\nNavigate to the URL for your chosen option:\n\n- **Options 1 & 2** → **[http://localhost:3000](http://localhost:3000)**\n- **Option 3** → **[http://localhost:5173](http://localhost:5173)**\n\nFrom there:\n\n- **Real mode** (default, `ADAPTER_MOCK=false`): connect a workspace in **Settings → Connections** — Slack / Discord / Teams tokens are entered through the UI, not `.env`.\n- **Mock mode** (`ADAPTER_MOCK=true`): uses fixture data — opt in for local UI iteration without platform credentials.\n\n### 6. Sync a channel\n\nFrom the dashboard: **Connections → Add Workspace → Select channels → Sync**.\n\nOr via API (auto-extracts your bearer token from `.env`):\n\n```bash\ncurl -X POST http://localhost:8000/api/channels/C12345/sync \\\n  -H \"Authorization: Bearer $(grep -E '^BEEVER_API_KEYS=' .env | cut -d= -f2 | cut -d, -f1)\"\n```\n\n### MCP server (for external AI agents)\n\nBeever Atlas exposes a curated MCP (Model Context Protocol) server at `/mcp` for AI agents like Claude Code and Cursor. This allows external code assistants to query your team's knowledge base without using the dashboard.\n\nSee [docs/mcp-server.md](docs/mcp-server.md) for:\n- **Tool catalog** — 16 tools for discovery, retrieval, graph traversal, and long-running operations\n- **Auth setup** — generating and managing `BEEVER_MCP_API_KEYS`\n- **Client configuration** — ready-to-use `.mcp.json` templates for Claude Code and Cursor\n- **Rate limits** — principal-keyed limits to prevent one agent from throttling others\n\nQuick example (Claude Code):\n```json\n{\n  \"mcpServers\": {\n    \"beever-atlas\": {\n      \"url\": \"https://atlas.example.com/mcp\",\n      \"transport\": \"streamable-http\",\n      \"headers\": {\n        \"Authorization\": \"Bearer ${BEEVER_MCP_KEY}\"\n      }\n    }\n  }\n}\n```\n\n### Common commands\n\n```bash\ndocker compose up -d                     # Start in background\ndocker compose logs -f beever-atlas      # Tail backend logs\ndocker compose down                      # Stop (keeps data)\ndocker compose down -v                   # Stop and DELETE all indexed data\nmake demo                                # Full stack + seeded demo corpus\nmake docker-up                           # Shortcut for `docker compose up -d`\n```\n\n---\n\n## 🔒 Privacy & Telemetry\n\nBeever Atlas collects no telemetry. No usage data, error reports, or analytics are sent anywhere by default. All LLM calls go through API keys you configure in your own `.env`, and all data stays in the databases you control.\n\n---\n\n## 📐 API Stability\n\nAll `/api/*` endpoints are **UNSTABLE** in 0.1.0. v0.2.0 will introduce a `/api/v1/*` prefix; clients pinning current paths will break. See [SECURITY.md](SECURITY.md).\n\n---\n\n## 💬 Community & Contact\n\n- **Discord**: [discord.gg/VshBCUUX](https://discord.gg/VshBCUUX) — get help, share what you're building, talk to the team\n- **X / Twitter**: [@Beever_AI](https://x.com/Beever_AI) — release notes, posts, announcements\n- **Website**: [beever.ai](https://beever.ai/) — about the company and other projects\n- **GitHub Discussions**: [github.com/Beever-AI/beever-atlas/discussions](https://github.com/Beever-AI/beever-atlas/discussions) — longer-form questions and ideas\n\nCommercial support, partnerships, or press: `tech@beever.ai`.\n\n---\n\n## 📜 License\n\n[Apache License 2.0](LICENSE) © 2026 Beever Atlas contributors. Third-party attributions in [NOTICE](NOTICE).\n\nSecurity policy: [SECURITY.md](SECURITY.md) | Community standards: [CODE_OF_CONDUCT.md](CODE_OF_CONDUCT.md)\n\n","summary":"Beever Atlas automatically transforms the day‑to‑day conversations of a team’s Slack, Discord, Teams or Mattermost channels into a continuously updated, LLM‑driven knowledge base. It pulls chat history, runs a multi‑stage extraction pipeline to distill messages into atomic facts and relationships, deduplicates them, and builds topic pages complete with citations, while a graph store connects people, decisions, and projects across channels. Team members can query the wiki in natural language from the dashboard or via MCP into Claude Code and Cursor, receiving answers that reference the original messages. Developers, product managers, and any organization that wants a self‑maintaining, searchable internal wiki built from existing chat data will benefit from this architecture.","description":"Your First LLM-Wiki Conversation Knowledge Base","stars":243,"language":"Python"},{"owner":"jasonkneen","repo":"openclicky","url":"https://github.com/jasonkneen/openclicky","readme":"# OpenClicky\n\nOpenClicky is a native macOS menu-bar companion by Jason Kneen. It provides push-to-talk voice help, screen-aware responses, a cursor overlay for pointing at UI elements, and an Agent Mode dashboard for coding, research, writing, and automation tasks.\n\nOpenClicky uses local configuration only. There is no Google login requirement and no hosted key-sync flow.\n\n## Requirements\n\n- macOS 14.2 or newer\n- Xcode with the macOS SDK\n- A signing team configured in Xcode for local runs\n- Local API keys supplied outside the repository\n\n## Repository Layout\n\n- `leanring-buddy.xcodeproj` and `leanring-buddy/` contain the macOS app target.\n- `leanring-buddyTests/` contains focused app tests.\n- `leanring-buddyUITests/` contains UI test scaffolding.\n- `AppResources/OpenClicky/` contains bundled model instructions, skills, wiki seed, Codex runtime, and completion audio.\n- `appcast.xml`, `clicky-demo.gif`, and `dmg-background.png` support distribution and release packaging.\n- `docs/APP_UPDATES.md` documents the Sparkle update feed and direct-distribution release flow.\n\nThe legacy `leanring-buddy` folder and scheme names are kept for project continuity. The product, bundle display name, and app identity are OpenClicky.\n\n## Secrets\n\nDo not commit API keys to this repository.\n\nOpenClicky can read local secrets from:\n\n- the in-app Settings fields\n- launch environment variables\n- a secrets file at `~/.config/openclicky/secrets.env`\n- a custom file path set with `OPENCLICKY_SECRETS_FILE`\n\nSupported values:\n\n```sh\nANTHROPIC_API_KEY=your_anthropic_key\nELEVENLABS_API_KEY=your_elevenlabs_key\nELEVENLABS_VOICE_ID=your_elevenlabs_voice_id\nOPENAI_API_KEY=your_openai_or_codex_key\n```\n\nGoogle Workspace access is intentionally handled through local tooling, not OpenClicky-hosted Google login or key sync. See [Google Workspace via gogcli](#google-workspace-via-gogcli).\n\nRecommended local setup:\n\n```sh\nmkdir -p ~/.config/openclicky\nchmod 700 ~/.config/openclicky\n$EDITOR ~/.config/openclicky/secrets.env\nchmod 600 ~/.config/openclicky/secrets.env\n```\n\nThe repo `.gitignore` excludes `.env` and `.env.local`, but the app no longer reads repo-local `.env` files. Keep secrets outside the project directory.\n\n## Build And Run\n\nOpen the project in Xcode:\n\n```sh\nopen leanring-buddy.xcodeproj\n```\n\nIn Xcode:\n\n1. Select the `leanring-buddy` scheme.\n2. Select the OpenClicky app target.\n3. Set your signing team.\n4. Run the app with `Cmd+R`.\n5. Grant Accessibility, Microphone, and Screen Recording permissions when macOS asks.\n\nDo not use terminal `xcodebuild` for permission testing. macOS TCC permissions are tied to the signed app identity and install path, and throwaway command-line builds can cause permission loops.\n\n## Development Verification\n\nFor a lightweight syntax check that does not disturb macOS permissions, run `swiftc -parse` over the changed source files. Avoid launching unsigned or temporary build products for permission testing.\n\nThe external-control bridge can be checked with:\n\n```sh\nscripts/test-external-control-bridge.sh\n```\n\nThe script performs Swift parse/typecheck checks, verifies the local bridge, exercises MCP descriptors, screenshot capture, captions, secondary cursors, SSE events, and confirms that primary cursor guidance uses OpenClicky's native choreography without warping the real system pointer.\n\n## External Control Bridge\n\nOpenClicky exposes a local-only control bridge for agents and other trusted local apps:\n\n```text\nhttp://127.0.0.1:32123\n```\n\nThe bridge is intentionally non-invasive. It drives OpenClicky's overlay, screenshots, and TTS, but does not start dictation, submit prompts, create new agent sessions, or mutate the normal OpenClicky conversation state.\n\nUseful endpoints:\n\n- `GET /health` checks bridge status.\n- `GET /mcp/tools` lists MCP-style tool descriptors.\n- `POST /cursor` points with the primary OpenClicky cursor, or creates one secondary marker with `mode: \"secondary\"`.\n- `POST /cursors` shows multiple temporary secondary markers at once.\n- `POST /caption` shows a short caption near a coordinate or the current cursor.\n- `POST /screenshot` captures local screenshots with display-frame metadata for locating UI.\n- `POST /speak` speaks through OpenClicky's TTS without entering voice mode.\n- `POST /clear` clears bridge-created overlay elements.\n- `GET /events` streams server-sent bridge events.\n\nPrimary cursor behavior matters: default `/cursor` uses OpenClicky's existing smooth pointing choreography, the same behavior used by voice prompts like \"show me the Apple menu\". The OpenClicky triangle zips to the target, shows the caption, and returns to the real pointer. It should not warp the macOS pointer and should not draw a duplicate primary cursor.\n\nSecondary cursors are explicit temporary markers. Use them for multi-point explanations, alternatives, or screen-tour overlays. They automatically disappear after `durationMs` or can be cleared with `/clear`.\n\nExample primary pointer cue:\n\n```sh\ncurl -s -X POST http://127.0.0.1:32123/cursor \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"x\":640,\"y\":520,\"caption\":\"Click this menu\",\"durationMs\":4500}'\n```\n\nExample simultaneous multi-marker cue:\n\n```sh\ncurl -s -X POST http://127.0.0.1:32123/cursors \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"durationMs\":4500,\"cursors\":[{\"x\":640,\"y\":520,\"caption\":\"Editor\",\"accentHex\":\"#60A5FA\"},{\"x\":900,\"y\":520,\"caption\":\"Logs\",\"accentHex\":\"#F59E0B\"}]}'\n```\n\nExample screenshot-to-pointer workflow:\n\n```sh\ncurl -s -X POST http://127.0.0.1:32123/screenshot \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"focused\":false}'\n\ncurl -s -X POST http://127.0.0.1:32123/cursor \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"x\":1180,\"y\":760,\"caption\":\"Use this button\"}'\n```\n\nBundled agent skills for this bridge live in `AppResources/OpenClicky/OpenClickyBundledSkills/`:\n\n- `google-workspace-gogcli`: local Google Workspace access through `gogcli` for Gmail, Calendar, Drive, Docs, Sheets, Slides, Chat, Contacts, Tasks, Admin, Groups, and related Google services.\n- `openclicky-screen-control`: quick point, caption, screenshot, speak, and clear commands.\n- `openclicky-screen-tour`: recordable visual tours with multiple simultaneous markers, area-focused overlays, speech, and primary cursor choreography.\n\n## Google Workspace via gogcli\n\nOpenClicky can connect agents to Google Workspace through the local [`gogcli`](https://github.com/steipete/gogcli) command, installed as `gog`. This keeps Google authentication local to the user's machine and avoids adding hosted OAuth, Google login, or cloud key sync to OpenClicky.\n\nIf gogcli uses the encrypted file keyring, OpenClicky agents need the same keyring password non-interactively. Put it in `~/.config/openclicky/secrets.env` as `GOG_KEYRING_PASSWORD=...`, or migrate gogcli to the macOS Keychain backend. If Google's OAuth screen says \"Clicky\", that branding comes from the local OAuth client stored in `~/Library/Application Support/gogcli/credentials.json`; replace it with an OpenClicky-owned Desktop OAuth client to change the consent-screen app name.\n\nInstall on macOS:\n\n```sh\nbrew install gogcli\n```\n\nCheck status from OpenClicky Settings → Google, or from the terminal:\n\n```sh\nscripts/check-gogcli-workspace.sh\n```\n\nOr manually:\n\n```sh\ngog --version\ngog auth status --json\ngog auth list\n```\n\nInitial setup requires a Google Cloud Desktop OAuth client JSON owned by the user or their Workspace organization. Store it in gogcli, not in this repository:\n\n```sh\ngog auth credentials ~/Downloads/client_secret_....json\n```\n\nAuthorize with least-privilege scopes for the services needed:\n\n```sh\n# Read-only Gmail + Drive example\ngog auth add you@example.com --services gmail,drive --gmail-scope readonly --drive-scope readonly\n\n# Calendar + Tasks read-only example\ngog auth add you@example.com --services calendar,tasks --readonly\n```\n\nFor Workspace-specific clients/domains:\n\n```sh\ngog --client work auth credentials ~/Downloads/work-client.json --domain example.com\ngog auth alias set work you@example.com\n```\n\nCommon read commands:\n\n```sh\ngog gmail search 'newer_than:7d' --account work --json\ngog calendar events --account work --json\ngog drive search \"name contains 'proposal'\" --account work --json\ngog contacts search 'Jane Doe' --account work --json\n```\n\nWrite actions such as sending email, posting Chat messages, modifying Drive files, changing calendar events, contacts, groups, or admin state should only run after explicit user intent. The bundled `google-workspace-gogcli` skill documents safe usage patterns for agents.\n\n## Swift SDK Embedding (Windowed)\n\nFor Swift hosts that want an in-window OpenClicky instance that is separate from the OS-level menu-bar companion, use `OpenClickySDKSession` from `leanring-buddy/OpenClickySDK.swift`.\n\nExample:\n\n```swift\nimport SwiftUI\n\nlet sdk = OpenClickySDKSession(mode: .embeddedWindow)\n\n// In app startup\nsdk.start()\n\n// In SwiftUI\nvar body: some View {\n    sdk.makePanelView(actions: .init(\n        onPanelDismiss: { /* dismiss host panel */ },\n        onQuit: { /* close host window if needed */ }\n    ))\n}\n\n// Send input\nsdk.submitTextPrompt(\"Summarize this page\")\n```\n\nThe host can either use SDK actions for Settings/HUD/Memory, or keep them no-op and route that experience separately.\n\nSee [OpenClicky SDK Integration Guide](docs/OpenClickySDKIntegration.md) for step-by-step host app integration instructions.\n\n## Direct Updates\n\nOpenClicky uses Sparkle for direct-distribution OTA updates. Installed builds check the signed `appcast.xml` feed from this repository's `main` branch, then download and install signed release DMGs from GitHub Releases. See [docs/APP_UPDATES.md](docs/APP_UPDATES.md) for the release checklist and appcast item template.\n\n## Credits And Upstream Work\n\nOpenClicky is maintained by [Jason Kneen](https://github.com/jasonkneen).\n\nThis project builds on the original open-source Clicky work:\n\n- Original project: [farzaa/clicky](https://github.com/farzaa/clicky)\n- Original creator: Farza, GitHub [@farzaa](https://github.com/farzaa), X [@FarzaTV](https://x.com/farzatv)\n\nOpenClicky has also incorporated ideas and implementation patterns from these forks:\n\n- [@danpeg](https://github.com/danpeg)'s [danpeg/clicky](https://github.com/danpeg/clicky), reviewed locally as `clicky-teach`, for tutor-mode direction and idle observation behavior.\n- [@milind-soni](https://github.com/milind-soni)'s [milind-soni/tiptour-macos](https://github.com/milind-soni/tiptour-macos), for developer-menu/debug tooling patterns and related teaching-assistant UX ideas.\n\n## License\n\nMIT. Copyright 2026 Jason Kneen. Portions are derived from or informed by the upstream MIT-licensed projects credited above.\n","summary":"OpenClicky is a native macOS menu‑bar application that augments productivity with voice assistance, screen‑aware responses, and a visual cursor overlay for pointing at UI elements, coupled with an Agent Mode dashboard for coding, research, writing, and automation. It requires only local configuration and API keys, avoiding any Google login or server synchronization. Key capabilities include push‑to‑talk voice help, real‑time screenshot and captioning, a local control bridge for external apps, and an overlay cursor that can be manipulated via HTTP endpoints. The tool is ideal for developers, researchers, writers, and automation enthusiasts who need an unobtrusive, voice‑powered helper that runs entirely on their machine.","description":"openclicky -- the open source version of clicky","stars":190,"language":"Swift"},{"owner":"jay-sahnan","repo":"signal","url":"https://github.com/jay-sahnan/signal","readme":"<div align=\"center\">\n\n<!-- Drop your logo at public/signal-logo.png (or .svg) and reference it here -->\n<!-- <img src=\"./public/signal-logo.png\" alt=\"Signal\" width=\"140\" /> -->\n\n# Signal\n\n### Open-source AI sales intelligence and outreach automation.\n\n**The open alternative to Clay, Apollo, and Outreach — run it on your own keys.**\n\n[![License: AGPL v3](https://img.shields.io/badge/License-AGPL_v3-blue.svg)](./LICENSE)\n[![PRs Welcome](https://img.shields.io/badge/PRs-welcome-brightgreen.svg)](./.github/CONTRIBUTING.md)\n[![Built with Claude](https://img.shields.io/badge/Built%20with-Claude-d97757.svg)](https://www.anthropic.com/claude)\n[![Stars](https://img.shields.io/github/stars/jay-sahnan/signal?style=social)](https://github.com/jay-sahnan/signal/stargazers)\n\n🌐 [Website](https://github.com/jay-sahnan/signal) &nbsp;·&nbsp;\n📚 [Docs](./docs) &nbsp;·&nbsp;\n🏗️ [Architecture](./docs/architecture.md) &nbsp;·&nbsp;\n⚡ [Quick start](#-quick-start) &nbsp;·&nbsp;\n💬 [Discussions](../../discussions)\n\n<br />\n\n<!-- Drop a hero screenshot or GIF at docs/assets/hero.png and uncomment: -->\n<!-- <img src=\"./docs/assets/hero.png\" alt=\"Signal workspace\" width=\"860\" /> -->\n\n</div>\n\n---\n\nSignal watches the web for buying signals (hiring changes, funding news, product launches, review shifts), enriches the companies and contacts behind them, drafts personalized outreach, and runs multi-step email sequences — all from a single chat-first workspace.\n\nIt's built for teams that want a CRM-adjacent tool they can read, fork, self-host, and extend. Instead of paying per seat for a black-box SaaS, run Signal on your own Supabase + Anthropic keys and own the pipeline end to end.\n\n> 🧪 Signal is designed for single-tenant self-hosting — one Supabase project per team. See [architecture.md](./docs/architecture.md#multi-tenancy) before deploying for multiple independent teams.\n\n> ⚠️ **Upgrading from a pre-Clerk version?** Auth has migrated from Supabase Auth to Clerk (Supabase remains the data layer). **Take a `pg_dump` first — this migration is destructive and not reversible.** It **wipes all user-owned data** (`campaigns`, `chats`, `user_profile`, `api_usage`, `user_settings`, `email_drafts`, `sent_emails`, `sequences`, plus user-authored `email_skills`) — old Supabase user UUIDs don't map to Clerk IDs. Built-in seed data and shared pools (`organizations`, `people`, `signals`) survive. Sign up for a free Clerk account ([10k MAU free](https://clerk.com/pricing)) and run `pnpm setup` to wire it up. See [docs/setup.md § Clerk](./docs/setup.md#4-clerk-auth) and [`supabase/migrations/20260427000000_clerk_auth_migration.sql`](./supabase/migrations/20260427000000_clerk_auth_migration.sql) if you need a custom backfill.\n\n<br />\n\n## ✨ Features\n\n- 🛰️ **Signals engine** — authorable \"recipes\" that watch companies and surface buying triggers.\n- 💬 **Campaign workspace** — chat-driven interface backed by Claude to research, shortlist, and draft.\n- 🔎 **Contact enrichment** — pulls LinkedIn, GitHub, and company pages into a single profile.\n- ✉️ **Outreach sequences** — multi-step emails via AgentMail with open / reply tracking.\n- 🤖 **Browser automation** — Browserbase + Stagehand for the long tail of sites without APIs.\n- 🔐 **Own your data** — Postgres + RLS on your Supabase; bring your own LLM keys.\n\n<!-- Drop product GIFs here to mimic Postiz's feature grid. Example:\n<div align=\"center\">\n  <img src=\"./docs/assets/signals.gif\" width=\"48%\" />\n  <img src=\"./docs/assets/workspace.gif\" width=\"48%\" />\n  <img src=\"./docs/assets/sequences.gif\" width=\"48%\" />\n  <img src=\"./docs/assets/enrichment.gif\" width=\"48%\" />\n</div>\n-->\n\n<br />\n\n## 🛠️ Tech stack\n\n- **Framework** — Next.js 16 (App Router) + React 19 + TypeScript\n- **Database** — Supabase (Postgres + Auth + RLS)\n- **AI** — Anthropic Claude via `@ai-sdk/anthropic` and the Vercel AI SDK\n- **Automation** — Browserbase + Stagehand for browser tasks\n- **Email** — AgentMail for send / reply / open tracking\n- **Jobs** — QStash (Upstash) for scheduled signal runs\n- **UI** — Tailwind CSS 4, shadcn/ui\n- **Testing** — Vitest, Playwright\n\n<br />\n\n## 🚀 Quick start\n\nYou'll need **Node 20+**, **Docker**, the **Supabase CLI**, a **Supabase project** (hosted or local), and an **Anthropic API key**.\n\n```bash\ngit clone https://github.com/jay-sahnan/signal.git\ncd signal\ncorepack enable      # activates the pinned pnpm version\npnpm install\npnpm setup           # interactive: prompts for required keys, runs migrations\npnpm dev             # http://localhost:3000\n```\n\nPrefer to configure by hand? Follow [`docs/setup.md`](./docs/setup.md).\n\n<br />\n\n## 🐳 Self-host with Docker\n\n```bash\ncp .env.example .env\n# fill in SUPABASE_URL + ANTHROPIC_API_KEY at minimum\ndocker compose up -d\n```\n\nSignal does not bundle Supabase in the compose file — bring your own (hosted Supabase project or local `supabase start`). See [`docs/setup.md`](./docs/setup.md) for the full walkthrough.\n\n<br />\n\n## 🤝 Contributing\n\nIssues and PRs welcome. Start with [`.github/CONTRIBUTING.md`](./.github/CONTRIBUTING.md). AI-assisted PRs are fine — we build with Claude ourselves.\n\nLooking for somewhere to start? Filter issues by [`good first issue`](../../labels/good%20first%20issue).\n\n<br />\n\n## 💬 Community\n\n- 🐛 [Issues](../../issues) — bug reports and feature requests\n- 💡 [Discussions](../../discussions) — questions, ideas, show & tell\n- 🔒 [Security](./.github/SECURITY.md) — vulnerability disclosure\n\n<br />\n\n<br /><br />\n\n## 📄 License\n\n[AGPL-3.0](./LICENSE) with an optional enterprise carve-out for files explicitly tagged. See the license file for details.\n","summary":"Signal is an open‑source AI‑driven sales intelligence platform that monitors the web for buying signals such as hiring spikes, funding rounds, or product launches, enriches company and contact data, drafts personalized outreach, and runs multi‑step email sequences—all within a chat‑first interface. It leverages Claude for conversational research, pulls in LinkedIn and GitHub data for enrichment, and uses Browserbase, Stagehand, and AgentMail for automation and email tracking. Sales teams, outreach specialists, and small SaaS companies can self‑host Signal on their own Supabase and Anthropic keys to keep full ownership of their data and avoid per‑seat SaaS pricing.","description":null,"stars":216,"language":"TypeScript"},{"owner":"Amansingh-afk","repo":"milli.nvim","url":"https://github.com/Amansingh-afk/milli.nvim","readme":"# milli.nvim\n\nAnimated ASCII splash screens for Neovim. Ships with 24 bundled splashes, and lets you drop in your own from any image or GIF. Works with dashboard-nvim, alpha-nvim, snacks.nvim, mini.starter, or raw `VimEnter`.\n\n![demo](demo.gif)\n\n## Contents\n\n- [Bundled splashes](#bundled-splashes)\n- [Install](#install)\n- [Quick start](#quick-start)\n- [Using your own splash](#using-your-own-splash) ← bring any image or GIF\n- [Dashboard integrations](#dashboard-integrations)\n  - [dashboard-nvim](#dashboard-nvim)\n  - [alpha-nvim](#alpha-nvim)\n  - [snacks.nvim](#snacksnvim)\n  - [mini.starter](#ministarter)\n  - [No plugin (raw VimEnter)](#no-plugin-raw-vimenter)\n- [Previewing](#previewing)\n- [API](#api)\n- [Requirements](#requirements)\n- [License](#license)\n\n## Bundled splashes\n\n<table>\n<tr>\n<td align=\"center\"><b>aiface</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/aiface.gif\" width=\"380\"></td>\n<td align=\"center\"><b>attackontitan</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/attackontitan.gif\" width=\"380\"></td>\n<td align=\"center\"><b>aurora</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/aurora.gif\" width=\"380\"></td>\n</tr>\n<tr>\n<td align=\"center\"><b>badge</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/badge.gif\" width=\"380\"></td>\n<td align=\"center\"><b>blackhole</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/blackhole.gif\" width=\"380\"></td>\n<td align=\"center\"><b>cactus</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/cactus.gif\" width=\"380\"></td>\n</tr>\n<tr>\n<td align=\"center\"><b>catwoman</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/catwoman.gif\" width=\"380\"></td>\n<td align=\"center\"><b>chrome</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/chrome.gif\" width=\"380\"></td>\n<td align=\"center\"><b>dancer</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/dancer.gif\" width=\"380\"></td>\n</tr>\n<tr>\n<td align=\"center\"><b>dancerramp</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/dancerramp.gif\" width=\"380\"></td>\n<td align=\"center\"><b>finger</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/finger.gif\" width=\"380\"></td>\n<td align=\"center\"><b>fire</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/fire.gif\" width=\"380\"></td>\n</tr>\n<tr>\n<td align=\"center\"><b>flyingcat</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/flyingcat.gif\" width=\"380\"></td>\n<td align=\"center\"><b>flyingdragon</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/flyingdragon.gif\" width=\"380\"></td>\n<td align=\"center\"><b>ididnot</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/ididnot.gif\" width=\"380\"></td>\n</tr>\n<tr>\n<td align=\"center\"><b>lighningtornado</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/lighningtornado.gif\" width=\"380\"></td>\n<td align=\"center\"><b>lights</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/lights.gif\" width=\"380\"></td>\n<td align=\"center\"><b>retrocircle</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/retrocircle.gif\" width=\"380\"></td>\n</tr>\n<tr>\n<td align=\"center\"><b>robot</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/robot.gif\" width=\"380\"></td>\n<td align=\"center\"><b>shader</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/shader.gif\" width=\"380\"></td>\n<td align=\"center\"><b>shadertwo</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/shadertwo.gif\" width=\"380\"></td>\n</tr>\n<tr>\n<td align=\"center\"><b>skeleton</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/skeleton.gif\" width=\"380\"></td>\n<td align=\"center\"><b>skullone</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/skullone.gif\" width=\"380\"></td>\n<td align=\"center\"><b>skullthree</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/skullthree.gif\" width=\"380\"></td>\n</tr>\n<tr>\n<td align=\"center\"><b>skulltwo</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/skulltwo.gif\" width=\"380\"></td>\n<td align=\"center\"><b>spaceship</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/spaceship.gif\" width=\"380\"></td>\n<td align=\"center\"><b>spinner</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/spinner.gif\" width=\"380\"></td>\n</tr>\n<tr>\n<td align=\"center\"><b>vibecat</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/vibecat.gif\" width=\"380\"></td>\n<td align=\"center\"><b>vibecattwo</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/vibecattwo.gif\" width=\"380\"></td>\n<td></td>\n</tr>\n</table>\n\n## Install\n\n**lazy.nvim:**\n```lua\n{ \"amansingh-afk/milli.nvim\", lazy = false }\n```\n\n**packer.nvim:**\n```lua\nuse \"amansingh-afk/milli.nvim\"\n```\n\n## Quick start\n\n```lua\n-- preview any bundled splash in a scratch buffer\n:MilliPreview fire\n\n-- or wire into your dashboard\nrequire(\"milli\").dashboard({ splash = \"fire\", loop = true })\n```\n\nList bundled splash names:\n```lua\n:lua print(vim.inspect(require(\"milli\").list()))\n```\n\nFor dashboard-nvim / alpha-nvim / snacks.nvim / mini.starter wiring, see [Dashboard integrations](#dashboard-integrations).\n\n## Using your own splash\n\n> Powered by [**milli**](https://github.com/Amansingh-afk/milli) - the ASCII engine behind this plugin. [⭐ Star it on GitHub](https://github.com/Amansingh-afk/milli) if you find it useful.\n\nThe 29 bundled splashes are a starting point. Bring any image or GIF you want - a custom logo, mascot, anything - and it becomes a splash in four steps.\n\n**1. Install the CLI** ([@amansingh-afk/milli](https://www.npmjs.com/package/@amansingh-afk/milli)):\n\n```bash\nnpm install -g @amansingh-afk/milli\n```\n\n**2. Generate `frames.lua` from any image / GIF:**\n\n```bash\nmilli export mycat.gif ./out -t lua -w 60 --no-bg\n```\n\nUseful flags:\n- `-w 60` - width in columns; tune to taste\n- `--no-bg` - drop background color (cleaner on dashboards)\n- `-m braille` - braille mode for higher-detail line art\n\n**3. Copy `frames.lua` into your Neovim config:**\n\n```bash\nmkdir -p ~/.config/nvim/lua/milli/splashes\ncp out/frames.lua ~/.config/nvim/lua/milli/splashes/mycat.lua\n```\n\nNeovim's runtimepath auto-discovers `~/.config/nvim/lua/`, so this file becomes a sibling to the plugin's bundled splashes - findable by the same machinery, tab-completable in `:MilliPreview`.\n\n**4. Use it - same API as any bundled splash:**\n\n```lua\nrequire(\"milli\").dashboard({ splash = \"mycat\", loop = true })\n```\n\nPreview it first:\n```\n:MilliPreview mycat\n```\n\n### Custom module path (advanced)\n\nIf you don't want to piggyback on the `milli.splashes` namespace (e.g. you organize splashes under a dotfiles module), drop the file anywhere on runtimepath and reference it by Lua module path:\n\n```lua\n-- ~/.config/nvim/lua/mydots/splashes/mycat.lua\nrequire(\"milli\").dashboard({ module = \"mydots.splashes.mycat\", loop = true })\n```\n\nWorks with every preset - `splash = \"name\"` for bundled/user-local, `module = \"path.to.mod\"` for custom namespaces.\n\n## Dashboard integrations\n\nPick your dashboard plugin. Each preset (`dashboard`, `alpha`, `snacks`, `starter`, `vimenter`) works identically with bundled or custom splashes.\n\n### dashboard-nvim\n\n```lua\nreturn {\n  \"nvimdev/dashboard-nvim\",\n  event = \"VimEnter\",\n  dependencies = { \"amansingh-afk/milli.nvim\" },\n  opts = function()\n    local splash = require(\"milli\").load({ splash = \"finger\" })\n    return {\n      theme = \"doom\",\n      config = {\n        header = splash.frames[1],         -- seed header with frame 0\n        center = {\n          { icon = \"  \", desc = \"Find File\", key = \"f\", action = \"Telescope find_files\" },\n          { icon = \"  \", desc = \"Quit\",      key = \"q\", action = \"qa\" },\n        },\n      },\n    }\n  end,\n  config = function(_, opts)\n    require(\"dashboard\").setup(opts)\n    require(\"milli\").dashboard({ splash = \"finger\", loop = true })\n  end,\n}\n```\n\n### alpha-nvim\n\n```lua\nrequire(\"milli\").alpha({ splash = \"fire\", loop = true })\n```\n\n### snacks.nvim\n\n```lua\nreturn {\n  \"folke/snacks.nvim\",\n  priority = 1000,\n  lazy = false,\n  dependencies = { \"amansingh-afk/milli.nvim\" },\n  opts = function()\n    local splash = require(\"milli\").load({ splash = \"fire\" })\n    return {\n      dashboard = {\n        enabled = true,\n        preset = {\n          header = table.concat(splash.frames[1], \"\\n\"),\n        },\n        sections = {\n          { section = \"header\", padding = 1 },\n          { section = \"keys\",   gap = 1, padding = 1 },\n          { section = \"startup\" },\n        },\n      },\n    }\n  end,\n  config = function(_, opts)\n    require(\"snacks\").setup(opts)\n    require(\"milli\").snacks({ splash = \"fire\", loop = true })\n  end,\n}\n```\n\n`preset.header` seeds frame 0 of the splash as snacks's default header so milli's anchor-search can locate the buffer position to animate over. The splash name in `preset.header` and in `require(\"milli\").snacks({ splash = ... })` must match.\n\n### mini.starter\n\n```lua\nrequire(\"milli\").starter({ splash = \"fire\", loop = true })\n```\n\n### No plugin (raw VimEnter)\n\n```lua\nrequire(\"milli\").vimenter({ splash = \"fire\", loop = true })\n```\n\n## Previewing\n\n```\n:MilliPreview <name>\n```\n\nOpens a scratch buffer, plays the splash in a loop. `q` or `<Esc>` dismisses. Tab-completes against bundled splashes and any you've dropped into `~/.config/nvim/lua/milli/splashes/`. Run `:MilliPreview` with no arg to list what's available.\n\n## API\n\n```lua\nrequire(\"milli\").play(buf, opts)       -- paint/animate into buf\nrequire(\"milli\").load(opts)            -- return the data table\nrequire(\"milli\").list()                -- array of all discovered splash names\n\nrequire(\"milli\").dashboard(opts)       -- autocmd preset for dashboard-nvim\nrequire(\"milli\").alpha(opts)           -- alpha-nvim\nrequire(\"milli\").snacks(opts)          -- snacks.nvim\nrequire(\"milli\").starter(opts)         -- mini.starter\nrequire(\"milli\").vimenter(opts)        -- raw VimEnter\n```\n\n### `opts`\n\n```lua\n{\n  splash = \"fire\",     -- bundled or user-local splash name, OR\n  module = \"mysplash\", -- require path to an external splash module, OR\n  data = { ... },      -- the data table directly\n  loop = true,         -- repeat forever (default: false - play once)\n}\n```\n\nA plain string is sugar for `{ splash = <string> }`. So `require(\"milli\").dashboard(\"fire\")` works.\n\n## Requirements\n\n- Neovim 0.10+ (extmarks, namespaces)\n- `termguicolors` enabled (`vim.opt.termguicolors = true`)\n\n## Why extmarks, not ANSI escapes?\n\nNeovim buffers strip ANSI. Colors are applied via extmarks + per-color highlight groups generated on demand. The groups are keyed on quantized fg/bg so a truecolor splash doesn't blow through Neovim's highlight-group cap (E849).\n\n## License\n\nMIT.\n","summary":"milli.nvim is a Neovim plugin that displays animated ASCII splash screens whenever the editor starts. It ships with 24 pre‑bundled splashes and lets users drop in any image or GIF to use as a custom banner, all of which can be shown with popular dashboard plugins or even on a raw `VimEnter`. The plugin’s lightweight API supports previewing and easy integration across many startup dashboards. It’s ideal for developers, sysadmins, or power‑users who want a visually engaging, customizable splash screen for their Neovim environment.","description":" Animated ASCII splash screens for Neovim. 29 bundled splashes + bring your own via the   milli CLI / web playground.","stars":219,"language":"Lua"},{"owner":"sigcli","repo":"sigcli","url":"https://github.com/sigcli/sigcli","readme":"# Sigcli\n\n**Sign in your way. AI works on your behalf.**\n\n<p align=\"center\">\n  <img src=\"website/public/demo.gif\" alt=\"sig demo\" width=\"720\" />\n</p>\n\nAI agents need access to your work systems — Jira, wikis, calendars, internal APIs. But passing credentials through shell history, environment variables, and agent context windows is a security nightmare.\n\n**sig** handles browser SSO, encrypts credentials at rest, and injects them into any process — so your agents authenticate without ever seeing secrets.\n\n```bash\nnpm install -g @sigcli/cli\n```\n\n## Quick Start\n\n```bash\nsig init                              # create ~/.sig/config.yaml\nsig login https://jira.example.com    # authenticate via browser SSO — once\n\n# now your AI agent can work on your behalf:\nsig request https://jira.example.com/rest/api/2/myself\nsig request https://jira.example.com/rest/api/2/search --method POST --body '{\"jql\":\"assignee=currentUser()\"}'\n```\n\n## Why sig\n\n- **Browser SSO** — signs in through a real browser. Works with any website, any login flow.\n- **Encrypted at rest** — AES-256-GCM encryption. Every access is audit-logged.\n- **Declarative config** — define what to extract (cookies, localStorage, tokens) and how to apply them to requests.\n- **Multi-provider** — inject credentials from multiple systems in a single command.\n- **MITM proxy** — agents set `HTTP_PROXY` and credentials are injected transparently. Zero-trust.\n- **AI-native** — stable CLI with predictable exit codes and JSON output. Built for agents.\n\n## How It Works\n\n```\nYou log in once               sig extracts & encrypts           AI agent operates\nin your browser         -->   credentials locally          -->  on your behalf\n(any SSO/login flow)          (~/.sig/credentials/)             (sig request / sig proxy)\n```\n\n**sig login** opens a real browser to the provider's entry URL. You log in normally — SSO, MFA, SAML, anything. Once authenticated, sig extracts credentials (cookies, localStorage tokens) based on your config's `extract[]` rules, encrypts them with AES-256-GCM, and stores them locally. When your agent needs to make a request, `apply[]` rules control how credentials are injected into HTTP headers, body, or query params.\n\n## Provider Configuration\n\nMost enterprise/SSO sites work with zero config. Public sites need a bit more. Here's the progression from simple to advanced:\n\n### 1. Zero config (auto-provision)\n\nFor SSO-protected internal tools, just run:\n\n```bash\nsig login https://jira.example.com\n```\n\nsig opens a real browser, you log in, and it writes config automatically:\n\n```yaml\n# ~/.sig/config.yaml (auto-generated)\njira-example:\n    domains:\n        - jira.example.com\n    entryUrl: https://jira.example.com/\n    strategy: browser\n    extract:\n        - from: cookies\n          as: session\n          match: '*'\n    apply:\n        - in: header\n          name: Cookie\n          value: '${session}'\n```\n\n### 2. Adding `required` cookies\n\nPublic sites set tracking cookies to **all visitors**. Without `required`, sig can't tell auth cookies from junk. Add `required` to validate:\n\n```yaml\nbilibili:\n    domains:\n        - www.bilibili.com\n    entryUrl: https://www.bilibili.com/\n    strategy: browser\n    required:\n        - cookie.SESSDATA\n        - cookie.bili_jct\n    extract:\n        - from: cookies\n          as: cookie\n          match: '*'\n    apply:\n        - in: header\n          name: Cookie\n          value: '${cookie}'\n```\n\nWhen required cookies are missing, sig falls back from headless to your real browser where you're logged in.\n\n| Site        | Required Cookies               |\n| ----------- | ------------------------------ |\n| Bilibili    | `SESSDATA`, `bili_jct`         |\n| Reddit      | `reddit_session`, `token_v2`   |\n| X (Twitter) | `ct0`, `auth_token`            |\n| YouTube     | `SAPISID`, `__Secure-3PAPISID` |\n| LinkedIn    | `JSESSIONID`, `li_at`          |\n| V2EX        | `A2`                           |\n| Zhihu       | `z_c0`                         |\n\n### 3. Multiple domains\n\nSome sites use multiple domains (e.g. x.com migrated from twitter.com). List all domains so sig captures cookies from both:\n\n```yaml\nx:\n    domains:\n        - x.com\n        - twitter.com\n    entryUrl: https://x.com/\n    strategy: browser\n    networkProxy: socks5://127.0.0.1:3333\n    required:\n        - cookie.ct0\n        - cookie.auth_token\n    extract:\n        - from: cookies\n          as: cookie\n          match: '*'\n    apply:\n        - in: header\n          name: Cookie\n          value: '${cookie}'\n```\n\n### 4. localStorage extraction (advanced)\n\nSome apps store tokens in localStorage instead of cookies. Use `from: localStorage` with `match` (key pattern) and `jsonPath` (nested field):\n\n```yaml\napp-slack:\n    domains:\n        - your-org.enterprise.slack.com\n    entryUrl: https://app.slack.com/client/YOUR_TEAM_ID\n    strategy: browser\n    required:\n        - session.d\n        - xoxc-token\n    extract:\n        - from: cookies\n          as: session\n          match: '*'\n        - from: localStorage\n          as: xoxc-token\n          match: localConfig_v2\n          jsonPath: teams.YOUR_TEAM_ID.token\n    apply:\n        - in: header\n          name: Cookie\n          value: '${session}'\n        - in: header\n          name: Authorization\n          value: 'Bearer ${xoxc-token}'\n```\n\nFull guide with debugging tips at **[sigcli.ai](https://sigcli.ai)**.\n\n## AI Agent Skills\n\nPre-built Python scripts that let AI agents operate 14+ web services — email, chat, forums, video platforms, social networks, and more. Each skill includes scripts + documentation that agents read and execute autonomously.\n\n<p align=\"center\">\n  <img src=\"pitch/x-demo.gif\" alt=\"X (Twitter) skill: search and reply from your terminal\" width=\"720\" />\n</p>\n\nInstall skills to your coding agent (Claude Code, Cursor, Windsurf, Cline):\n\n```bash\nnpx @sigcli/skills            # install skills to your coding agent\n```\n\nSee the [full skills catalog](skills/README.md) for details.\n\n## Documentation\n\nFull docs, configuration, SDK, and AI agent integration guide at **[sigcli.ai](https://sigcli.ai)**.\n\n## License\n\n[MIT](LICENSE)\n","summary":"Sigcli is a CLI tool that lets AI agents access internal systems securely by handling browser‑based authentication once and then injecting the necessary credentials into any HTTP request without exposing secrets. It supports automatic extraction of cookies, localStorage tokens, and other auth artifacts, encrypts them with AES‑256‑GCM, and applies them to headers, body or query parameters via declarative rules, even across multiple providers. The tool also offers a zero‑trust MITM proxy, audit logging, and a simple “request” command so agents can perform API calls predictably in JSON. Developers building AI automation, integrations, or internal tooling who need secure, reusable authentication will find Sigcli a convenient solution.","description":"The authentication CLI & Proxy for AI agents. Give agents access, not your credentials.","stars":199,"language":"TypeScript"},{"owner":"machinepulse-ai","repo":"world2agent","url":"https://github.com/machinepulse-ai/world2agent","readme":"![Welcome to World2Agent](https://world2agent.ai/assets/readme-banner.png)\n\n<p align=\"center\">\n  <i>Agents can't act on what they can't perceive.</i>\n</p>\n\n<p align=\"center\">\n  <a href=\"./LICENSE\"><img src=\"https://img.shields.io/badge/License-Apache%202.0-blue.svg\" alt=\"License\" /></a>\n  <a href=\"https://www.npmjs.com/org/world2agent\"><img src=\"https://img.shields.io/badge/npm-%40world2agent-red\" alt=\"npm\" /></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://world2agent.ai\">Website</a> ·\n  <a href=\"#quick-start\">Quick Start</a> ·\n  <a href=\"#sensors\">Sensors</a> ·\n  <a href=\"https://world2agent.ai/hub\">SensorHub</a> ·\n  <a href=\"./docs\">Docs</a> ·\n  <a href=\"#community\">Community</a>\n</p>\n\n<!-- Concept Video -->\n<p align=\"center\">\n  <a href=\"https://world2agent.ai/assets/promo-w2a.mp4\">\n    Watch the W2A Concept Video\n  </a>\n</p>\n\n<p align=\"center\">\n  <img src=\"https://world2agent.ai/assets/github-star.gif\" width=\"600\" alt=\"star\" />\n</p>\n\n***\n\n## What is World2Agent?\n\nWorld2Agent (W2A) is an open protocol that standardizes how AI agents perceive the real world. Install a sensor, your agent gets structured, real-time data. Swap sensors freely — they all speak the same schema.\n\nW2A isn't a product. It's an open protocol and an invitation. We built the first sensors — the real breakthroughs will come from the community.\n\n→ [Why W2A? Full story](./docs/why-w2a.md)\n\n## Architecture\n\n**World → Sensor → Agent**\n\nSensors watch data sources and emit structured data following W2A Protocol. Your agent receives signals and decides what to do.\n\n![World2Agent system architecture](./docs/images/system-architecture.png)\n\n→ [Signal format spec](./docs/signal-format.md) · [Architecture deep dive](./docs/architecture.md)\n\n## Quick Start\n\nW2A ships with native [agent-runtime plugins](https://github.com/machinepulse-ai/world2agent-plugins) for Claude Code, Hermes, and OpenClaw — pick whichever runtime you already use.\n\n### Claude Code\n\nIn an active session, install the `world2agent` plugin:\n\n```\n/plugin marketplace add machinepulse-ai/world2agent-plugins\n/plugin install world2agent@world2agent-plugins\n/reload-plugins\n```\n\nAdd a sensor — for example, Hacker News stories, frontier AI lab posts:\n\n```\n/world2agent:sensor-add @world2agent/sensor-hackernews\n/world2agent:sensor-add @quill-io/sensor-frontier-ai-news\n```\n\nRestart Claude Code with the plugin channel loaded so sensor signals flow into your session:\n\n```bash\nclaude --dangerously-load-development-channels plugin:world2agent@world2agent-plugins\n```\n\n### Hermes\n\nInstall the bridge once:\n\n```bash\nnpm install -g @world2agent/hermes-sensor-bridge\nhermes skills install machinepulse-ai/world2agent-plugins/hermes-sensor-bridge/skills/world2agent-manage\n```\n\nIn an interactive `hermes` session, describe the intent in natural language or use the slash form — the agent handles npm install, `SETUP.md` Q&A, webhook subscription, and subprocess startup:\n\n```\n/world2agent-manage add @world2agent/sensor-hackernews\n```\n\n> First time only: the agent will ask you to restart `hermes gateway` once after it enables the webhook platform. Every install after that is seamless.\n\nEach signal triggers a fresh `AIAgent.run_conversation()` against the generated handler skill.\n\n### OpenClaw\n\nThree steps:\n\n```bash\nnpm install -g @world2agent/openclaw-sensor-bridge\nopenclaw skills install world2agent-manage\n```\n\nThen send this in your OpenClaw chat:\n\n```\nUse world2agent-manage skill install @quill-io/sensor-frontier-ai-news\n```\n\nThe skill walks the SETUP.md Q&A, generates a handler skill, registers the sensor, and starts the supervisor. Subsequent signals each trigger a fresh `/hooks/agent` call against the handler.\n\n> First time only: the bridge writes a managed `hooks` block into `~/.openclaw/openclaw.json` (auto-generates `hooks.token` if absent) and asks you to run `openclaw gateway restart` once. A timestamped backup of the original config is kept next to the file. Every install after that is seamless.\n\nIf you have a paired chat platform (Feishu, iMessage, Telegram, …) configured via `<PLATFORM>_HOME_CHANNEL` in `~/.openclaw/.env`, replies are auto-pushed to that chat by default.\n\n---\n\n→ Browse the full catalog on [SensorHub](https://world2agent.ai/hub).\n\n> **Security — install only sensors you trust.** A sensor's signals drive what your agent perceives and does, so an untrusted sensor is effectively an untrusted instruction source. Stick to open-source sensors from authors you trust, and review the code first.\n\n**Integrating W2A into your own agent system?** See the [developer quick start](./docs/quick-start.md#option-2-code--sdk--sensor) for the SDK code path.\n\n→ [Full guide](./docs/quick-start.md) · [Multi-sensor](./docs/multi-sensor.md) · [SensorHub](./docs/sensorhub.md)\n\n## Sensors\n\n### [SensorHub](https://world2agent.ai/hub)\n\n**SensorHub is the catalog of every W2A sensor** — official and community-built, organized by what each one perceives (markets, news, production alerts, weather, AI labs, …). Browse it to see what's available, view each sensor's signal schema, and grab the one-line install command. **Looking for a sensor? Start here.**\n\nEvery sensor is a standard npm package — `npm search w2a-sensor` works as a fallback if you prefer the raw view.\n\n→ [SensorHub guide](./docs/sensorhub.md)\n\n### Missing a sensor?\n\n[Build your own](./docs/build-a-sensor.md) in ~50 lines. The `build-w2a-sensor` skill walks an AI coding agent through discovery, signal design, scaffolding, and the install recipe — install it with:\n\n```bash\nnpx skills add https://github.com/machinepulse-ai/world2agent/skills/build-w2a-sensor\n```\n\nOnce it's ready, ship it to npm:\n\n```bash\nnpm publish\n```\n\nThat's it — your sensor is now installable by anyone, anywhere.\n\n## Roadmap\n\n* **Graph layer** — compose and enrich signals from multiple sensors before they reach your agent. → [RFC](./docs/rfc-graph.md)\n\n## Contributing\n\n* 🔧 **Build a sensor** — `npm publish` and it's live\n\n* 🐛 **Report bugs** — [open an issue](https://github.com/machinepulse-ai/world2agent/issues)\n\n* 💡 **Suggest a sensor** — [Discussions](https://github.com/machinepulse-ai/world2agent/discussions)\n\n→ [Contributing guide](./docs/CONTRIBUTING.md)\n\n## Community\n\n[Website](https://machinepulse.ai/) · [X / Twitter](https://x.com/MachinePulse_AI) · [YouTube](https://youtube.com/@MachinePulse_AI) · [Discord](https://discord.gg/hDjaD8pX)\n\n<!-- Star History — uncomment after launch -->\n<!-- [![Star History Chart](https://api.star-history.com/svg?repos=machinepulse-ai/world2agent&type=Date)](https://star-history.com/#machinepulse-ai/world2agent&Date) -->\n\n## License\n\n[Apache 2.0](./LICENSE)\n\n***\n\n<p align=\"center\">\n  Built by <a href=\"https://machinepulse.ai\">MachinePulse</a> · Open source, open protocol, open invitation.\n</p>\n","summary":"World2Agent (W2A) is an open protocol that standardizes how AI agents receive structured, real‑time data from the world through interchangeable sensors. The platform ships with native agent‑runtime plugins for Claude Code, Hermes, and OpenClaw, enabling users to add, configure, and swap sensors—such as Hacker News or AI lab feeds—without rewriting data schemas. By automating sensor setup, webhook management, and skill generation, W2A lets developers and researchers build perceptive agents that can adapt to new data sources instantly. Anyone creating AI‑powered applications that need consistent, up‑to‑date inputs—whether it’s a conversational assistant, monitoring system, or automated workflow—will gain from W2A’s plug‑and‑play sensor ecosystem.","description":"World2Agent(W2A) is an open protocol that standardizes how Al agents perceive the real world.","stars":1269,"language":"TypeScript"},{"owner":"asekachov","repo":"Markie","url":"https://github.com/asekachov/Markie","readme":"# Markie\n\nA tiny menu-bar app for jotting down a line and having it land in the right file — no app switch, no save dialog, no friction.\n\n**[⬇︎ Download Markie for macOS](https://github.com/asekachov/Markie/releases/latest/download/Markie.dmg)**.\n\nYou point Markie at the few files you actually use (a daily log, a notes file, a running todo list, whatever), give each one a hotkey, and you're done. Hit the hotkey, type, press return — the line shows up at the bottom of the file. That's the whole idea.\n\n<img width=\"2560\" height=\"1440\" alt=\"Frame 1948754415\" src=\"https://github.com/user-attachments/assets/d677614c-cf4b-42fe-806a-5adf44be46c1\" />\n\n\n## Install\n\n1. [**Download Markie.dmg**](https://github.com/asekachov/Markie/releases/latest/download/Markie.dmg).\n2. Open the DMG and drag **Markie** into your **Applications** folder.\n3. Launch it. Markie sits in the menu bar — look for the small grid icon on the right side.\n\nRequires macOS 26.1 or later.\n\n## How to use it\n\n**Set up a file.** From the menu bar, open Markie's settings and add any plain-text or Markdown file. Optionally give it an alias and a hotkey of your own.\n\n**Capture a thought.** Press the hotkey. A small panel slides in, focused and ready. Type whatever you want to save.\n\n**Send it on its way.**\n\n| Shortcut | What it does |\n|---|---|\n| ⌘ ↩ | Append the line to the file |\n| ⌘ ⇧ ↩ | Prepend (write at the top instead) |\n| ⌘ ⌥ ↩ | Append, then open the file |\n| ⌘ O | Just open the file |\n| ⎋ | Cancel and dismiss |\n\n**Switch files.** Press ⇥ to open a list of all your files; arrow keys + return to pick one.\n\n**Todo mode.** Mark a file as todo-style and new lines come out as checklist items.\n\nThat's it. Markie stays out of the way until you need it, and gets out of the way the moment you're done.\n\n## Updates\n\nMarkie checks for new versions on its own. When one's available it'll quietly offer to install it on launch — no maintenance on your end.\n\n## Releases\n\nSee [the Releases page](https://github.com/asekachov/Markie/releases) for what's new in each version.\n\n---\n\n*This README was generated by [Claude Code](https://claude.com/claude-code).*\n","summary":"Markie is a lightweight macOS menu‑bar app that lets you quickly jot a line and append it to a selected text or Markdown file without leaving your current context. By assigning hotkeys to each file, users can type a note, hit return, and instantly append (or prepend) the line, open the file, or switch between files—all via simple shortcuts. The app supports a todo mode that prefixes lines as checklist items and automatically checks for and installs updates. It’s ideal for writers, developers, and anyone who maintains daily logs or todo lists and wants frictionless, no‑app‑switch note capture.","description":"Markie — quick-add panel for macOS. Public release feed (DMGs + Sparkle appcast).","stars":227,"language":null}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
