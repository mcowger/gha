<script id="project-data" type="application/json">[{"owner":"DS4SD","repo":"docling","url":"https://github.com/DS4SD/docling","readme":"<p align=\"center\">\n  <a href=\"https://github.com/docling-project/docling\">\n    <img loading=\"lazy\" alt=\"Docling\" src=\"https://github.com/docling-project/docling/raw/main/docs/assets/docling_processing.png\" width=\"100%\"/>\n  </a>\n</p>\n\n# Docling\n\n<p align=\"center\">\n  <a href=\"https://trendshift.io/repositories/17240\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/17240\" alt=\"DS4SD%2Fdocling | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/></a>\n</p>\n\n[![arXiv](https://img.shields.io/badge/arXiv-2408.09869-b31b1b.svg)](https://arxiv.org/abs/2408.09869)\n[![Docs](https://img.shields.io/badge/docs-live-brightgreen)](https://docling-project.github.io/docling/)\n[![PyPI version](https://img.shields.io/pypi/v/docling)](https://pypi.org/project/docling/)\n[![PyPI - Python Version](https://img.shields.io/pypi/pyversions/docling)](https://pypi.org/project/docling/)\n[![uv](https://img.shields.io/endpoint?url=https://raw.githubusercontent.com/astral-sh/uv/main/assets/badge/v0.json)](https://github.com/astral-sh/uv)\n[![Ruff](https://img.shields.io/endpoint?url=https://raw.githubusercontent.com/astral-sh/ruff/main/assets/badge/v2.json)](https://github.com/astral-sh/ruff)\n[![Pydantic v2](https://img.shields.io/endpoint?url=https://raw.githubusercontent.com/pydantic/pydantic/main/docs/badge/v2.json)](https://pydantic.dev)\n[![prek](https://img.shields.io/badge/prek-enabled-brightgreen)](https://pypi.org/project/prek/)\n[![License MIT](https://img.shields.io/github/license/docling-project/docling)](https://opensource.org/licenses/MIT)\n[![PyPI Downloads](https://static.pepy.tech/badge/docling/month)](https://pepy.tech/projects/docling)\n[![Docling Actor](https://apify.com/actor-badge?actor=vancura/docling&fpr=docling)](https://apify.com/vancura/docling)\n[![Chat with Dosu](https://dosu.dev/dosu-chat-badge.svg)](https://app.dosu.dev/097760a8-135e-4789-8234-90c8837d7f1c/ask?utm_source=github)\n[![Discord](https://img.shields.io/discord/1399788921306746971?color=6A7EC2&logo=discord&logoColor=ffffff)](https://docling.ai/discord)\n[![OpenSSF Best Practices](https://www.bestpractices.dev/projects/10101/badge)](https://www.bestpractices.dev/projects/10101)\n[![LF AI & Data](https://img.shields.io/badge/LF%20AI%20%26%20Data-003778?logo=linuxfoundation&logoColor=fff&color=0094ff&labelColor=003778)](https://lfaidata.foundation/projects/)\n\n## What is Docling ?\n\nDocling simplifies document processing, parsing diverse formats — including advanced PDF understanding — and providing seamless integrations with the gen AI ecosystem.\n\n## Features\n\n- 🗂️ Parsing of [multiple document formats][supported_formats] incl. PDF, DOCX, PPTX, XLSX, HTML, WAV, MP3, WebVTT, email formats (EML, MSG), images (PNG, TIFF, JPEG, ...), LaTeX, plain text, and more\n- 📑 Advanced PDF understanding incl. page layout, reading order, table structure, code, formulas, image classification, and more\n- 🧬 Unified, expressive [DoclingDocument][docling_document] representation format\n- ↪️ Various [export formats][supported_formats] and options, including Markdown, HTML, WebVTT, [DocTags](https://arxiv.org/abs/2503.11576) and lossless JSON\n- 📜 Support of several application-specifc XML schemas incl. [USPTO](https://www.uspto.gov/patents) patents, [JATS](https://jats.nlm.nih.gov/) articles, and [XBRL](https://www.xbrl.org/) financial reports.\n- 🔒 Local execution capabilities for sensitive data and air-gapped environments\n- 🤖 Plug-and-play [integrations][integrations] incl. LangChain, LlamaIndex, Crew AI & Haystack for agentic AI\n- 🔍 Extensive OCR support for scanned PDFs and images\n- 👓 Support of several Visual Language Models ([GraniteDocling](https://huggingface.co/ibm-granite/granite-docling-258M))\n- 🎙️ Audio support with Automatic Speech Recognition (ASR) models\n- 🔌 Connect to any agent using the [MCP server](https://docling-project.github.io/docling/usage/mcp/)\n- 💻 Simple and convenient CLI\n\n### What's new\n\n- 📤 Structured [information extraction][extraction] \\[🧪 beta\\]\n- 📑 New layout model (**Heron**) by default, for faster PDF parsing\n- 🔌 [MCP server](https://docling-project.github.io/docling/usage/mcp/) for agentic applications\n- 💼 Parsing of XBRL (eXtensible Business Reporting Language) documents for financial reports\n- 📧 Parsing of email files (`.eml`, `.msg`)\n- 💬 Parsing of WebVTT (Web Video Text Tracks) files and export to WebVTT format\n- 💬 Parsing of LaTeX files\n- 📝 Parsing of plain-text files (`.txt`, `.text`) and Markdown supersets (`.qmd`, `.Rmd`)\n- 📝 Chart understanding (Barchart, Piechart, LinePlot): converting them into tables, code or adding detailed descriptions\n\n### Coming soon\n\n- 📝 Metadata extraction, including title, authors, references & language\n- 📝 Complex chemistry understanding (Molecular structures)\n\n## Quickstart\n\n### 1. Install\n\n```bash\npip install docling\n```\n\n> **Note:** Python 3.9 support was dropped in docling version 2.70.0. Please use Python 3.10 or higher.\n\nWorks on macOS, Linux and Windows environments. Both x86_64 and arm64 architectures.\n\nMore [detailed installation instructions](https://docling-project.github.io/docling/installation/) are available in the docs.\n\n## 2. Convert a document (CLI)\n\n```bash\ndocling https://arxiv.org/pdf/2206.01062\n```\n\nThis generates a .md file in the current directory containing structured document content.\n\nYou can also use 🥚[GraniteDocling](https://huggingface.co/ibm-granite/granite-docling-258M) and other VLMs via Docling CLI:\n\n```bash\ndocling --pipeline vlm --vlm-model granite_docling https://arxiv.org/pdf/2206.01062\n```\n\n## 3. Python usage (recommended)\n\n```python\nfrom docling.document_converter import DocumentConverter\n\nsource = \"https://arxiv.org/pdf/2408.09869\"  # document per local path or URL\nconverter = DocumentConverter()\nresult = converter.convert(source)\nprint(result.document.export_to_markdown())  # output: \"## Docling Technical Report[...]\"\n```\n\nMore advanced [usage](https://docling-project.github.io/docling/usage/) and [configuration](https://docling-project.github.io/docling/installation/) options.\n\n## Documentation\n\nCheck out Docling's [documentation](https://docling-project.github.io/docling/), for details on\ninstallation, usage, concepts, recipes, extensions, and more.\n\n## Examples\n\nGo hands-on with our [examples](https://docling-project.github.io/docling/examples/),\ndemonstrating how to address different application use cases with Docling.\n\n## Integrations\n\nTo further accelerate your AI application development, check out Docling's native\n[integrations](https://docling-project.github.io/docling/integrations/) with popular frameworks\nand tools.\n\n## Get help and support\n\nPlease feel free to connect with us using the [discussion section](https://github.com/docling-project/docling/discussions).\n\n## Technical report\n\nFor more details on Docling's inner workings, check out the [Docling Technical Report](https://arxiv.org/abs/2408.09869).\n\n## Contributing\n\nPlease read [Contributing to Docling](https://github.com/docling-project/docling/blob/main/CONTRIBUTING.md) for details.\n\n## References\n\nIf you use Docling in your projects, please consider citing the following:\n\n```bib\n@techreport{Docling,\n  author = {Deep Search Team},\n  month = {8},\n  title = {Docling Technical Report},\n  url = {https://arxiv.org/abs/2408.09869},\n  eprint = {2408.09869},\n  doi = {10.48550/arXiv.2408.09869},\n  version = {1.0.0},\n  year = {2024}\n}\n```\n\n## License\n\nThe Docling codebase is under MIT license.\nFor individual model usage, please refer to the model licenses found in the original packages.\n\n## LF AI & Data\n\nDocling is hosted as a project in the [LF AI & Data Foundation](https://lfaidata.foundation/projects/).\n\n### IBM ❤️ Open Source AI\n\nThe project was started by the AI for knowledge team at IBM Research Zurich.\n\n[supported_formats]: https://docling-project.github.io/docling/usage/supported_formats/\n[docling_document]: https://docling-project.github.io/docling/concepts/docling_document/\n[integrations]: https://docling-project.github.io/docling/integrations/\n[extraction]: https://docling-project.github.io/docling/examples/extraction/\n","summary":"Docling is a comprehensive document processing library designed to parse, analyze, and convert a wide array of file formats, ranging from PDFs and office documents to audio and image files. It features advanced capabilities such as intelligent layout analysis, table structure extraction, and robust OCR, allowing users to export data into structured formats like Markdown, HTML, and JSON. By offering local execution support and seamless plug-and-play integrations with popular AI frameworks like LangChain and LlamaIndex, it is an ideal tool for developers and data scientists building RAG pipelines or agentic AI applications.","description":"Get your documents ready for gen AI","stars":60927,"language":"Python"},{"owner":"timescale","repo":"pgai","url":"https://github.com/timescale/pgai","readme":"\n<p align=\"center\">\n    <img height=\"200\" src=\"docs/images/pgai_logo.png#gh-dark-mode-only\" alt=\"pgai\"/>\n    <img height=\"200\" src=\"docs/images/pgai_white.png#gh-light-mode-only\" alt=\"pgai\"/>\n</p>\n\n<div align=center>\n\n<h3>Power your RAG and Agentic applications with PostgreSQL</h3>\n\n<div>\n  <a href=\"https://github.com/timescale/pgai/tree/main/docs\"><strong>Docs</strong></a> ·\n  <a href=\"https://discord.gg/KRdHVXAmkp\"><strong>Join the pgai Discord!</strong></a> ·\n  <a href=\"https://tsdb.co/gh-pgai-signup\"><strong>Try timescale for free!</strong></a> ·\n  <a href=\"https://github.com/timescale/pgai/releases\"><strong>Changelog</strong></a>\n</div>\n</div>\n<br/>\n\n<h1> As of February 2026, this project is no longer being maintained or supported. </h1>\n\nA Python library that transforms PostgreSQL into a robust, production-ready retrieval engine for RAG and Agentic applications.\n\n- 🔄 **Automatically create and synchronize vector embeddings** from PostgreSQL data and S3 documents. Embeddings update automatically as data changes.\n\n- 🤖 **[Semantic Catalog](/docs/semantic_catalog/README.md): Enable natural language to SQL with AI**. Automatically generate database descriptions and power text-to-SQL for agentic applications. \n\n- 🔍 Powerful vector and semantic search with pgvector and pgvectorscale.\n\n- 🛡️ Production-ready out-of-the-box: Supports batch processing for efficient embedding generation, with built-in handling for model failures, rate limits, and latency spikes.\n\n- 🐘 Works with any PostgreSQL database, including Timescale Cloud, Amazon RDS, Supabase and more.\n\n\n**Basic Architecture**:\nThe system consists of an application you write, a PostgreSQL database, and stateless vectorizer workers. The application defines a vectorizer configuration to embed data from sources like PostgreSQL or S3. The workers read this configuration, processes the data queue into embeddings and chunked text, and writes the results back. The application then queries this data to power RAG and semantic search.\n\nThe key strength of this architecture lies in its resilience: data modifications made by the application are decoupled from the embedding process, ensuring that failures in the embedding service do not affect the core data operations.\n    \n<div align=center>\n<img height=\"400\" src=\"docs/images/pgai_architecture.png\" alt=\"Pgai Architecture: application, database, vectorizer worker\">\n\n\n</div>\n\n### install \n\nFirst, install the pgai package.\n\n```bash\npip install pgai\n```              \n\nThen, install the pgai database components. You can do this from the terminal using the CLI or in your Python application code using the pgai python package.\n```\n# from the cli\npgai install -d <database-url>\n\n# or from the python package, often done as part of your application setup\nimport pgai\npgai.install(DB_URL)\n```\n\nIf you are not on Timescale Cloud you will also need to run the pgai vectorizer worker. Install the dependencies for it via:\n```bash\npip install \"pgai[vectorizer-worker]\"\n```\n\nIf you are using the [semantic catalog](/docs/semantic_catalog/README.md), you will need to run:\n\n```bash\npip install \"pgai[semantic-catalog]\"\n```\n\n\n# Quick Start\n\nThis quickstart demonstrates how pgai Vectorizer enables semantic search and RAG over PostgreSQL data by automatically creating and synchronizing embeddings as data changes.\n\n**Looking for text-to-SQL?** Check out the [Semantic Catalog quickstart](/docs/semantic_catalog/README.md) to transform natural language questions into SQL queries.\n\nThe key \"secret sauce\" of pgai Vectorizer is its declarative approach to\nembedding generation. Simply define your pipeline and let Vectorizer handle the\noperational complexity of keeping embeddings in sync, even when embedding\nendpoints are unreliable. You can define a simple version of the pipeline as\nfollows:\n\n```sql\nCREATE TABLE IF NOT EXISTS wiki (\n    id INTEGER PRIMARY KEY GENERATED ALWAYS AS IDENTITY,\n    url TEXT NOT NULL,\n    title TEXT NOT NULL,\n    text TEXT NOT NULL\n)\n\nSELECT ai.create_vectorizer(\n     'wiki'::regclass,\n     loading => ai.loading_column(column_name=>'text'),\n     destination => ai.destination_table(target_table=>'wiki_embedding_storage'),\n     embedding => ai.embedding_openai(model=>'text-embedding-ada-002', dimensions=>'1536')\n    )\n```\n\nThe vectorizer will automatically create embeddings for all the rows in the\n`wiki` table, and, more importantly, will keep the embeddings synced with the\nunderlying data as it changes.  **Think of it almost like declaring an index** on\nthe `wiki` table, but instead of the database managing the index datastructure\nfor you, the Vectorizer is managing the embeddings. \n\n## Running the quick start\n\n**Prerequisites:**\n- A PostgreSQL database ([docker instructions](https://docs.timescale.com/self-hosted/latest/install/installation-docker/)).\n- An OpenAI API key (we use openai for embedding in the quick start, but you can use [multiple providers](#supported-embedding-models)).\n\nCreate a `.env` file with the following:\n\n```\nOPENAI_API_KEY=<your-openai-api-key>\nDB_URL=<your-database-url>\n```\n\nYou can download the full [python code](examples/quickstart/main.py) and [requirements.txt](examples/quickstart/requirements.txt) from the quickstart example and run it in the same directory as the `.env` file.\n\n<details>\n<summary>Click here for a bash script to run the quickstart</summary>\n\n```bash\ncurl -O https://raw.githubusercontent.com/timescale/pgai/main/examples/quickstart/main.py\ncurl -O https://raw.githubusercontent.com/timescale/pgai/main/examples/quickstart/requirements.txt\npython -m venv venv\nsource venv/bin/activate\npip install -r requirements.txt\npython main.py\n```\n</details>\nSample output:\n\n<details>\n<summary>Click to expand sample output</summary>\n\n```\nSearch results 1:\n[WikiSearchResult(id=7,\n                  url='https://en.wikipedia.org/wiki/Aristotle',\n                  title='Aristotle',\n                  text='Aristotle (;  Aristotélēs, ; 384–322\\xa0BC) was an '\n                       'Ancient Greek philosopher and polymath. His writings '\n                       'cover a broad range of subjects spanning the natural '\n                       'sciences, philosophy, linguistics, economics, '\n                       'politics, psychology and the arts. As the founder of '\n                       'the Peripatetic school of philosophy in the Lyceum in '\n                       'Athens, he began the wider Aristotelian tradition that '\n                       'followed, which set the groundwork for the development '\n                       'of modern science.\\n'\n                       '\\n'\n                       \"Little is known about Aristotle's life. He was born in \"\n                       'the city of Stagira in northern Greece during the '\n                       'Classical period. His father, Nicomachus, died when '\n                       'Aristotle was a child, and he was brought up by a '\n                       \"guardian. At 17 or 18 he joined Plato's Academy in \"\n                       'Athens and remained there till the age of 37 (). '\n                       'Shortly after Plato died, Aristotle left Athens and, '\n                       'at the request of Philip II of Macedon, tutored his '\n                       'son Alexander the Great beginning in 343 BC. He '\n                       'established a library in the Lyceum which helped him '\n                       'to produce many of his hundreds of books on papyru',\n                  chunk='Aristotle (;  Aristotélēs, ; 384–322\\xa0BC) was an '\n                        'Ancient Greek philosopher and polymath. His writings '\n                        'cover a broad range of subjects spanning the natural '\n                        'sciences, philosophy, linguistics, economics, '\n                        'politics, psychology and the arts. As the founder of '\n                        'the Peripatetic school of philosophy in the Lyceum in '\n                        'Athens, he began the wider Aristotelian tradition '\n                        'that followed, which set the groundwork for the '\n                        'development of modern science.',\n                  distance=0.22242502364217387)]\nSearch results 2:\n[WikiSearchResult(id=41,\n                  url='https://en.wikipedia.org/wiki/pgai',\n                  title='pgai',\n                  text='pgai is a Python library that turns PostgreSQL into '\n                       'the retrieval engine behind robust, production-ready '\n                       'RAG and Agentic applications. It does this by '\n                       'automatically creating vector embeddings for your data '\n                       'based on the vectorizer you define.',\n                  chunk='pgai is a Python library that turns PostgreSQL into '\n                        'the retrieval engine behind robust, production-ready '\n                        'RAG and Agentic applications. It does this by '\n                        'automatically creating vector embeddings for your '\n                        'data based on the vectorizer you define.',\n                  distance=0.13639101792546204)]\nRAG response:\nThe main thing pgai does right now is generating vector embeddings for data in PostgreSQL databases based on the vectorizer defined by the user, enabling the creation of robust RAG and Agentic applications.\n```\n</details>\n\n\n## Code walkthrough\n\n### Install the pgai database components\n\nPgai requires a few catalog tables and functions to be installed into the database. This is done using the `pgai.install` function, which will install the necessary components into the `ai` schema of the database.\n\n```python\npgai.install(DB_URL)\n```\n\n### Create the vectorizer\n\nThis defines the vectorizer, which tells the system how to create the embeddings from the `text` column in the `wiki` table. The vectorizer creates a view `wiki_embedding` that we can query for the embeddings (as we'll see below).\n\n```python\nasync def create_vectorizer(conn: psycopg.AsyncConnection):\n    async with conn.cursor() as cur:    \n        await cur.execute(\"\"\"\n            SELECT ai.create_vectorizer(\n                'wiki'::regclass,\n                if_not_exists => true,\n                loading => ai.loading_column(column_name=>'text'),\n                embedding => ai.embedding_openai(model=>'text-embedding-ada-002', dimensions=>'1536'),\n                destination => ai.destination_table(view_name=>'wiki_embedding')\n            )\n        \"\"\")   \n    await conn.commit()\n```\n\n### Run the vectorizer worker\n\n\nIn this example, we run the vectorizer worker once to create the embeddings for the existing data.\n\n```python\nworker = Worker(DB_URL, once=True)\nworker.run()\n```\n\nIn a real application, we would not call the worker manually like this every time we want to create the embeddings. Instead, we would run the worker in the background and it would run continuously, polling for work from the vectorizer. \n\nYou can run the worker in the background from the application, the cli, or docker. See the [vectorizer worker](/docs/vectorizer/worker.md) documentation for more details.\n\n\n### Search the wiki articles using semantic search\n\nThis is standard pgvector semantic search in PostgreSQL. The search is performed against the `wiki_embedding` view, which is created by the vectorizer and includes all the columns from the `wiki` table plus the `embedding` column and the chunk text. This function returns both the entire `text` column from the `wiki` table and smaller chunks of the text that are most relevant to the query.\n\n\n```python\n@dataclass\nclass WikiSearchResult:\n    id: int\n    url: str\n    title: str\n    text: str\n    chunk: str\n    distance: float\n\nasync def _find_relevant_chunks(client: AsyncOpenAI, query: str, limit: int = 1) -> List[WikiSearchResult]:\n    # Generate embedding for the query using OpenAI's API\n    response = await client.embeddings.create(\n        model=\"text-embedding-ada-002\",\n        input=query,\n        encoding_format=\"float\",\n    )\n    \n    embedding = np.array(response.data[0].embedding)\n    \n    # Query the database for the most similar chunks using pgvector's cosine distance operator (<=>)\n    async with pool.connection() as conn:\n        async with conn.cursor(row_factory=class_row(WikiSearchResult)) as cur:\n            await cur.execute(\"\"\"\n                SELECT w.id, w.url, w.title, w.text, w.chunk, w.embedding <=> %s as distance\n                FROM wiki_embedding w\n                ORDER BY distance\n                LIMIT %s\n            \"\"\", (embedding, limit))\n            \n            return await cur.fetchall()\n```\n\n### Insert a new article into the wiki table\n\nThis code is notable for what it is not doing. This is a simple insert of a new article into the `wiki` table. We did not need to do anything different to create the embeddings, the vectorizer worker will take care of updating the embeddings as the data changes.\n\n```python\ndef insert_article_about_pgai(conn: psycopg.AsyncConnection):\n    async with conn.cursor(row_factory=class_row(WikiSearchResult)) as cur:\n        await cur.execute(\"\"\"\n            INSERT INTO wiki (url, title, text) VALUES\n            ('https://en.wikipedia.org/wiki/pgai', 'pgai', 'pgai is a Python library that turns PostgreSQL into the retrieval engine behind robust, production-ready RAG and Agentic applications. It does this by automatically creating vector embeddings for your data based on the vectorizer you define.')\n        \"\"\")\n    await conn.commit() \n```\n\n### Perform RAG with the LLM\n\nThis code performs RAG with the LLM. It uses the `_find_relevant_chunks` function defined above to find the most relevant chunks of text from the `wiki` table and then uses the LLM to generate a response.\n\n```python\n    query = \"What is the main thing pgai does right now?\"\n    relevant_chunks = await _find_relevant_chunks(client, query)\n    context = \"\\n\\n\".join(\n        f\"{chunk.title}:\\n{chunk.text}\" \n        for chunk in relevant_chunks\n    )\n    prompt = f\"\"\"Question: {query}\n\nPlease use the following context to provide an accurate response:   \n\n{context}\n\nAnswer:\"\"\"\n\n    response = await client.chat.completions.create({\n        model: \"gpt-4o-mini\",\n        messages: [{ role: \"user\", content: prompt }],\n    })\n    print(\"RAG response:\")\n    print(response.choices[0].message.content)\n```\n\n## Next steps\n\n\n### More RAG and Vectorization Examples  \n- [FastAPI + psycopg quickstart](/examples/simple_fastapi_app/README.md)\n- [Vectorizer overview](/docs/vectorizer/overview.md) and [worker documentation](/docs/vectorizer/worker.md)\n- [Vectorizer API reference](/docs/vectorizer/api-reference.md)\n\n### Text-to-SQL with Semantic Catalog\n- **[Semantic Catalog Quickstart](/docs/semantic_catalog/README.md)** - Learn how to use the semantic catalog to translate natural language to SQL for agentic applications.\n\n\n# Features \n\nOur pgai Python library lets you work with embeddings generated from your data:\n\n* Automatically create and sync vector embeddings for your data using the [vectorizer](/docs/vectorizer/overview.md).\n* [Load data](/docs/vectorizer/api-reference.md#loading-configuration) from a column in your table or from a file, s3 bucket, etc.\n* Create multiple embeddings for the same data with different models and parameters for testing and experimentation.\n* [Customize](#a-configurable-vectorizer-pipeline) how your embedding pipeline parses, chunks, formats, and embeds your data.\n\nYou can use the vector embeddings to:\n- [Perform semantic search](/docs/vectorizer/overview.md#query-an-embedding) using pgvector.\n- Implement Retrieval Augmented Generation (RAG)\n- Perform high-performance, cost-efficient ANN search on large vector workloads with [pgvectorscale](https://github.com/timescale/pgvectorscale), which complements pgvector.\n\n\n**Text-to-SQL with Semantic Catalog:** Transform natural language into accurate SQL queries. The semantic catalog generates database descriptions automatically, lets a human in the loop review and improve the descriptions and stores SQL examples and business facts. This enables LLMs to understand your schema and data context. See the [semantic catalog](/docs/semantic_catalog/README.md) for more details.\n\nWe also offer a [PostgreSQL extension](/projects/extension/README.md) that can perform LLM model calling directly from SQL. This is often useful for use cases like classification, summarization, and data enrichment on your existing data.\n\n## A configurable vectorizer pipeline\n\nThe vectorizer is designed to be flexible and customizable. Each vectorizer defines a pipeline for creating embeddings from your data. The pipeline is defined by a series of components that are applied in sequence to the data:\n\n- **[Loading](/docs/vectorizer/api-reference.md#loading-configuration):** First, you define the source of the data to embed. It can be the data stored directly in a column of the source table or a URI referenced in a column of the source table that points to a file, s3 bucket, etc.\n- **[Parsing](/docs/vectorizer/api-reference.md#parsing-configuration):** Then, you define the way the data is parsed if it is a non-text document such as a PDF, HTML, or markdown file.\n- **[Chunking](/docs/vectorizer/api-reference.md#chunking-configuration):** Next, you define the way text data is split into chunks.\n- **[Formatting](/docs/vectorizer/api-reference.md#formatting-configuration):** Then, for each chunk, you define the way the data is formatted before it is sent for embedding. For example, you can add the title of the document as the first line of the chunk.\n- **[Embedding](/docs/vectorizer/api-reference.md#embedding-configuration):** Finally, you specify the LLM provider, model, and the parameters to be used when generating the embeddings.\n\n## Supported embedding models\n\nThe following models are supported for embedding:\n\n- [Ollama](/docs/vectorizer/api-reference.md#aiembedding_ollama)\n- [OpenAI](/docs/vectorizer/api-reference.md#aiembedding_openai)\n- [Voyage AI](/docs/vectorizer/api-reference.md#aiembedding_voyageai)\n- [Cohere](/docs/vectorizer/api-reference.md#aiembedding_litellm)\n- [Huggingface](/docs/vectorizer/api-reference.md#aiembedding_litellm)\n- [Mistral](/docs/vectorizer/api-reference.md#aiembedding_litellm)\n- [Azure OpenAI](/docs/vectorizer/api-reference.md#aiembedding_litellm)\n- [AWS Bedrock](/docs/vectorizer/api-reference.md#aiembedding_litellm)\n- [Vertex AI](/docs/vectorizer/api-reference.md#aiembedding_litellm)\n\n## The devil is in the error handling\n\nSimply creating vector embeddings is easy and straightforward. The challenge is\nthat LLMs are somewhat unreliable and the endpoints exhibit intermittent\nfailures and/or degraded performance. A critical part of properly handling\nfailures is that your primary data-modification operations (INSERT, UPDATE,\nDELETE) should not be dependent on the embedding operation. Otherwise, your\napplication will be down every time the endpoint is slow or fails and your user\nexperience will suffer.\n\nNormally, you would need to implement a custom MLops pipeline to properly handle\nendpoint failures. This commonly involves queuing system like Kafka, specialized\nworkers, and other infrastructure for handling the queue and retrying failed\nrequests. This is a lot of work and it is easy to get wrong.\n\nWith pgai, you can skip all that and focus on building your application because\nthe vectorizer is managing the embeddings for you. We have built in queueing and\nretry logic to handle the various failure modes you can encounter. Because we do\nthis work in the background, the primary data modification operations are not\ndependent on the embedding operation. This is why pgai is production-ready out of the box.\n\nMany specialized vector databases create embeddings for you. However, they typically fail when embedding endpoints are down or degraded, placing the burden of error handling and retries back on you.\n\n \n# Resources\n## Why we built it\n- [Vector Databases Are the Wrong Abstraction](https://www.timescale.com/blog/vector-databases-are-the-wrong-abstraction/)\n- [pgai: Giving PostgreSQL Developers AI Engineering Superpowers](http://www.timescale.com/blog/pgai-giving-postgresql-developers-ai-engineering-superpowers)\n\n## Quick start guides\n- [Semantic Catalog (Text-to-SQL)](/docs/semantic_catalog/README.md) - Learn how to use the semantic catalog to improve the translation of natural language to SQL for agentic applications.\n- [The vectorizer quick start above](#quick-start)\n- [Quick start with OpenAI](/docs/vectorizer/quick-start-openai.md)\n- [Quick start with VoyageAI](/docs/vectorizer/quick-start-voyage.md)\n\n## Tutorials about pgai vectorizer\n- [How to Automatically Create & Update Embeddings in PostgreSQL—With One SQL Query](https://www.timescale.com/blog/how-to-automatically-create-update-embeddings-in-postgresql/)\n- [video] [Auto Create and Sync Vector Embeddings in 1 Line of SQL](https://www.youtube.com/watch?v=ZoC2XYol6Zk)\n- [Which OpenAI Embedding Model Is Best for Your RAG App With Pgvector?](https://www.timescale.com/blog/which-openai-embedding-model-is-best/)\n- [Which RAG Chunking and Formatting Strategy Is Best for Your App With Pgvector](https://www.timescale.com/blog/which-rag-chunking-and-formatting-strategy-is-best/)\n- [Parsing All the Data With Open-Source Tools: Unstructured and Pgai](https://www.timescale.com/blog/parsing-all-the-data-with-open-source-tools-unstructured-and-pgai/)\n\n\n## Contributing\nWe welcome contributions to pgai! See the [Contributing](/CONTRIBUTING.md) page for more information.\n\n\n## Get involved\n\npgai is still at an early stage. Now is a great time to help shape the direction of this project;\nwe are currently deciding priorities. Have a look at the [list of features](https://github.com/timescale/pgai/issues) we're thinking of working on.\nFeel free to comment, expand the list, or hop on the Discussions forum.\n\nTo get started, take a look at [how to contribute](./CONTRIBUTING.md)\nand [how to set up a dev/test environment](./DEVELOPMENT.md).\n\n## About Timescale\n\nTimescale is a PostgreSQL database company. To learn more visit the [timescale.com](https://www.timescale.com).\n\nTimescale Cloud is a high-performance, developer focused, cloud platform that provides PostgreSQL services\nfor the most demanding AI, time-series, analytics, and event workloads. Timescale Cloud is ideal for production applications and provides high availability, streaming backups, upgrades over time, roles and permissions, and great security.\n\n[pgai-plpython]: https://github.com/postgres-ai/postgres-howtos/blob/main/0047_how_to_install_postgres_16_with_plpython3u.md\n[asdf-postgres]: https://github.com/smashedtoatoms/asdf-postgres\n[asdf]: https://github.com/asdf-vm/asdf\n[python3]: https://www.python.org/downloads/\n[pip]: https://pip.pypa.io/en/stable/installation/#supported-methods\n[plpython3u]: https://www.postgresql.org/docs/current/plpython.html\n[pgvector]: https://github.com/pgvector/pgvector\n[pgvector-install]: https://github.com/pgvector/pgvector?tab=readme-ov-file#installation\n[python-virtual-environment]: https://packaging.python.org/en/latest/tutorials/installing-packages/#creating-and-using-virtual-environments\n[create-a-new-service]: https://console.cloud.timescale.com/dashboard/create_services\n[just]: https://github.com/casey/just\n","summary":"pgai is a Python library designed to transform PostgreSQL into a production-ready engine for Retrieval-Augmented Generation (RAG) and agentic applications. It features an automated vectorizer that synchronizes embeddings from your database or S3, alongside a semantic catalog that facilitates natural language-to-SQL generation. This tool is ideal for developers who need a resilient, out-of-the-box solution to manage complex embedding pipelines and semantic search directly within their existing PostgreSQL infrastructure.","description":"A suite of tools to develop RAG, semantic search, and other AI applications more easily with PostgreSQL","stars":5800,"language":"PLpgSQL"},{"owner":"kolbytn","repo":"mindcraft","url":"https://github.com/kolbytn/mindcraft","readme":"<h1 align=\"center\">🧠mindcraft⛏️</h1>\n<h1 align=\"center\">\n  <a href=\"https://trendshift.io/repositories/9163\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/9163\" alt=\"kolbytn%2Fmindcraft | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/></a>\n</h1>\n\n<p align=\"center\">Crafting minds for Minecraft with LLMs and <a href=\"https://prismarinejs.github.io/mineflayer/#/\">Mineflayer!</a></p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/mindcraft-bots/mindcraft/blob/main/FAQ.md\">FAQ</a> | \n  <a href=\"https://discord.gg/mp73p35dzC\">Discord Support</a> | \n  <a href=\"https://www.youtube.com/watch?v=gRotoL8P8D8\">Video Tutorial</a> | \n  <a href=\"https://kolbynottingham.com/mindcraft/\">Blog Post</a> | \n  <a href=\"https://mindcraft-minecollab.github.io/index.html\">Paper Website</a> | \n  <a href=\"https://github.com/mindcraft-bots/mindcraft/blob/main/minecollab.md\">MineCollab</a>\n</p>\n\n> [!Caution]\nDo not connect this bot to public servers with coding enabled. This project allows an LLM to write/execute code on your computer. The code is sandboxed, but still vulnerable to injection attacks. Code writing is disabled by default, you can enable it by setting `allow_insecure_coding` to `true` in `settings.js`. Ye be warned.\n\n# Getting Started\n## Requirements\n\n- [Minecraft Java Edition](https://www.minecraft.net/en-us/store/minecraft-java-bedrock-edition-pc) (up to v1.21.11, recommend v1.21.6)\n- [Node.js Installed](https://nodejs.org/) (Node v18 or v20 LTS recommended. Node v24+ may cause issues with native dependencies)\n- At least one API key from a supported API provider. See [supported APIs](#model-customization). OpenAI is the default.\n\n> [!Important]\n> If installing node on windows, ensure you check `Automatically install the necessary tools`\n>\n> If you encounter `npm install` errors on macOS, see the [FAQ](FAQ.md#common-issues) for troubleshooting native module build issues\n\n## Install and Run\n\n1. Make sure you have the requirements above.\n\n2. Download the [latest release](https://github.com/mindcraft-bots/mindcraft/releases/latest) and unzip it, or clone the repository.\n\n3. Rename `keys.example.json` to `keys.json` and fill in your API keys (you only need one). The desired model is set in `andy.json` or other profiles. For other models refer to the table below.\n\n4. In terminal/command prompt, run `npm install` from the installed directory\n\n5. Start a minecraft world and open it to LAN on localhost port `55916`\n\n6. Run `node main.js` from the installed directory\n\nIf you encounter issues, check the [FAQ](https://github.com/mindcraft-bots/mindcraft/blob/main/FAQ.md) or find support on [discord](https://discord.gg/mp73p35dzC). We are currently not very responsive to github issues. To run tasks please refer to [Minecollab Instructions](minecollab.md#installation)\n\n\n# Configuration\n## Model Customization\n\nYou can configure project details in `settings.js`. [See file.](settings.js)\n\nYou can configure the agent's name, model, and prompts in their profile like `andy.json`. The model can be specified with the `model` field, with values like `model: \"gemini-2.5-pro\"`. You will need the correct API key for the API provider you choose. See all supported APIs below.\n\n<details>\n<summary><strong>⭐ VIEW SUPPORTED APIs ⭐</strong></summary>\n\n| API Name | Config Variable| Docs |\n|------|------|------|\n| `openai` | `OPENAI_API_KEY` | [docs](https://platform.openai.com/docs/models) |\n| `google` | `GEMINI_API_KEY` | [docs](https://ai.google.dev/gemini-api/docs/models/gemini) |\n| `anthropic` | `ANTHROPIC_API_KEY` | [docs](https://docs.anthropic.com/claude/docs/models-overview) |\n| `xai` | `XAI_API_KEY` | [docs](https://docs.x.ai/docs) |\n| `deepseek` | `DEEPSEEK_API_KEY` | [docs](https://api-docs.deepseek.com/) |\n| `ollama` (local) | n/a | [docs](https://ollama.com/library) |\n| `qwen` | `QWEN_API_KEY` | [Intl.](https://www.alibabacloud.com/help/en/model-studio/developer-reference/use-qwen-by-calling-api)/[cn](https://help.aliyun.com/zh/model-studio/getting-started/models) |\n| `mistral` | `MISTRAL_API_KEY` | [docs](https://docs.mistral.ai/getting-started/models/models_overview/) |\n| `replicate` | `REPLICATE_API_KEY` | [docs](https://replicate.com/collections/language-models) |\n| `groq` (not grok) | `GROQCLOUD_API_KEY` | [docs](https://console.groq.com/docs/models) |\n| `huggingface` | `HUGGINGFACE_API_KEY` | [docs](https://huggingface.co/models) |\n| `novita` | `NOVITA_API_KEY` | [docs](https://novita.ai/model-api/product/llm-api?utm_source=github_mindcraft&utm_medium=github_readme&utm_campaign=link) |\n| `openrouter` | `OPENROUTER_API_KEY` | [docs](https://openrouter.ai/models) |\n| `glhf` | `GHLF_API_KEY` | [docs](https://glhf.chat/user-settings/api) |\n| `hyperbolic` | `HYPERBOLIC_API_KEY` | [docs](https://docs.hyperbolic.xyz/docs/getting-started) |\n| `vllm` | n/a | n/a |\n| `cerebras` | `CEREBRAS_API_KEY` | [docs](https://inference-docs.cerebras.ai/introduction) |\n| `mercury` | `MERCURY_API_KEY` | [docs](https://www.inceptionlabs.ai/) |\n\n</details>\n\nFor more comprehensive model configuration and syntax, see [Model Specifications](#model-specifications).\n\nFor local models we support [ollama](https://ollama.com/) and we provide our own finetuned models for you to use. \nTo install our models, install ollama and run the following terminal command:\n```bash\nollama pull sweaterdog/andy-4:micro-q8_0 && ollama pull embeddinggemma\n```\n\n## Online Servers\nTo connect to online servers your bot will need an official Microsoft/Minecraft account. You can use your own personal one, but will need another account if you want to connect too and play with it. To connect, change these lines in `settings.js`:\n```javascript\n\"host\": \"111.222.333.444\",\n\"port\": 55920,\n\"auth\": \"microsoft\",\n\n// rest is same...\n```\n> [!Important]\n> The bot's name in the profile.json must exactly match the Minecraft profile name! Otherwise the bot will spam talk to itself.\n\nTo use different accounts, Mindcraft will connect with the account that the Minecraft launcher is currently using. You can switch accounts in the launcher, then run `node main.js`, then switch to your main account after the bot has connected.\n\n## Tasks\n\nTasks automatically start the bot with a prompt and a goal item to acquire or blueprint to construct. To run a simple task that involves collecting 4 oak_logs run \n\n`node main.js --task_path tasks/basic/single_agent.json --task_id gather_oak_logs`\n\nHere is an example task json format: \n\n```\n{\n    \"gather_oak_logs\": {\n      \"goal\": \"Collect at least four logs\",\n      \"initial_inventory\": {\n        \"0\": {\n          \"wooden_axe\": 1\n        }\n      },\n      \"agent_count\": 1,\n      \"target\": \"oak_log\",\n      \"number_of_target\": 4,\n      \"type\": \"techtree\",\n      \"max_depth\": 1,\n      \"depth\": 0,\n      \"timeout\": 300,\n      \"blocked_actions\": {\n        \"0\": [],\n        \"1\": []\n      },\n      \"missing_items\": [],\n      \"requires_ctable\": false\n    }\n}\n```\n\nThe `initial_inventory` is what the bot will have at the start of the episode, `target` refers to the target item and `number_of_target` refers to the number of target items the agent needs to collect to successfully complete the task. \n\nIf you want more optimization and automatic launching of the minecraft world, you will need to follow the instructions in [Minecollab Instructions](minecollab.md#installation)\n\n## Docker Container\n\nIf you intend to `allow_insecure_coding`, it is a good idea to run the app in a docker container to reduce risks of running unknown code. This is strongly recommended before connecting to remote servers, although still does not guarantee complete safety.\n\n```bash\ndocker build -t mindcraft . && docker run --rm --add-host=host.docker.internal:host-gateway -p 8080:8080 -p 3000-3003:3000-3003 -e SETTINGS_JSON='{\"auto_open_ui\":false,\"profiles\":[\"./profiles/gemini.json\"],\"host\":\"host.docker.internal\"}' --volume ./keys.json:/app/keys.json --name mindcraft mindcraft\n```\nor simply\n```bash\ndocker-compose up --build\n```\n\nWhen running in docker, if you want the bot to join your local minecraft server, you have to use a special host address `host.docker.internal` to call your localhost from inside your docker container. Put this into your [settings.js](settings.js):\n\n```javascript\n\"host\": \"host.docker.internal\", // instead of \"localhost\", to join your local minecraft from inside the docker container\n```\n\nTo connect to an unsupported minecraft version, you can try to use [viaproxy](services/viaproxy/README.md)\n\n# Bot Profiles\n\nBot profiles are json files (such as `andy.json`) that define:\n\n1. Bot backend LLMs to use for talking, coding, and embedding.\n2. Prompts used to influence the bot's behavior.\n3. Examples help the bot perform tasks.\n\n## Model Specifications\n\nLLM models can be specified simply as `\"model\": \"gpt-5.4\"`, or more specifically with `\"{api}/{model}\"`, like `\"openrouter/google/gemini-2.5-pro\"`. See all supported APIs [here](#model-customization).\n\nThe `model` field can be a string or an object. A model object must specify an `api`, and optionally a `model`, `url`, and additional `params`. You can also use different models/providers for chatting, coding, vision, embedding, and voice synthesis. See the example below.\n\n```json\n\"model\": {\n  \"api\": \"openai\",\n  \"model\": \"gpt-5.4\",\n  \"url\": \"https://api.openai.com/v1/\",\n  \"params\": {\n    \"max_tokens\": 1000,\n    \"temperature\": 1\n  }\n},\n\"code_model\": {\n  \"api\": \"openai\",\n  \"model\": \"gpt-5.4-mini\",\n  \"url\": \"https://api.openai.com/v1/\"\n},\n\"vision_model\": {\n  \"api\": \"openai\",\n  \"model\": \"gpt-5.4\",\n  \"url\": \"https://api.openai.com/v1/\"\n},\n\"embedding\": {\n  \"api\": \"openai\",\n  \"url\": \"https://api.openai.com/v1/\",\n  \"model\": \"text-embedding-3-small\"\n},\n\"speak_model\": \"openai/tts-1/echo\"\n```\n\n`model` is used for chat, `code_model` is used for newAction coding, `vision_model` is used for image interpretation, `embedding` is used to embed text for example selection, and `speak_model` is used for voice synthesis. `model` will be used by default for all other models if not specified. Not all APIs support embeddings, vision, or voice synthesis.\n\nAll apis have default models and urls, so those fields are optional. The `params` field is optional and can be used to specify additional parameters for the model. It accepts any key-value pairs supported by the api. Is not supported for embedding models.\n\n## Embedding Models\n\nEmbedding models are used to embed and efficiently select relevant examples for conversation and coding.\n\nSupported Embedding APIs: `openai`, `google`, `replicate`, `huggingface`, `novita`\n\nIf you try to use an unsupported model, then it will default to a simple word-overlap method. Expect reduced performance. We recommend using supported embedding APIs.\n\n## Voice Synthesis Models\n\nVoice synthesis models are used to narrate bot responses and specified with `speak_model`. This field is parsed differently than other models and only supports strings formatted as `\"{api}/{model}/{voice}\"`, like `\"openai/tts-1/echo\"`. We only support `openai` and `google` for voice synthesis.\n\n## Specifying Profiles via Command Line\n\nBy default, the program will use the profiles specified in `settings.js`. You can specify one or more agent profiles using the `--profiles` argument: `node main.js --profiles ./profiles/andy.json ./profiles/jill.json`\n\n\n# Contributing\n\nWe welcome contributions to the project! We are generally less responsive to github issues, and more responsive to pull requests. Join the [discord](https://discord.gg/mp73p35dzC) for more active support and direction.\n\nWhile AI generated code is allowed, please vet it carefully. Submitting tons of sloppy code and documentation actively harms development.\n\n## Patches\n\nSome of the node modules that we depend on have bugs in them. To add a patch, change your local node module file and run `npx patch-package [package-name]`\n\n## Development Team\nThanks to all who contributed to the project, especially the official development team: [@MaxRobinsonTheGreat](https://github.com/MaxRobinsonTheGreat), [@kolbytn](https://github.com/kolbytn), [@icwhite](https://github.com/icwhite), [@Sweaterdog](https://github.com/Sweaterdog), [@Ninot1Quyi](https://github.com/Ninot1Quyi), [@riqvip](https://github.com/riqvip), [@uukelele-scratch](https://github.com/uukelele-scratch), [@mrelmida](https://github.com/mrelmida)\n\n\n## Citation:\nThis work is published in the paper [Collaborating Action by Action: A Multi-agent LLM Framework for Embodied Reasoning](https://arxiv.org/abs/2504.17950). Please use this citation if you use this project in your research:\n```\n@article{mindcraft2025,\n  title = {Collaborating Action by Action: A Multi-agent LLM Framework for Embodied Reasoning},\n  author = {White*, Isadora and Nottingham*, Kolby and Maniar, Ayush and Robinson, Max and Lillemark, Hansen and Maheshwari, Mehul and Qin, Lianhui and Ammanabrolu, Prithviraj},\n  journal = {arXiv preprint arXiv:2504.17950},\n  year = {2025},\n  url = {https://arxiv.org/abs/2504.17950},\n}\n```\n\n## Contributors\n\nThanks to everyone who has submitted issues on and off Github, made suggestions, and generally helped make this a better project.\n\n![Contributors](https://contrib.rocks/image?repo=mindcraft-bots/mindcraft)\n","summary":"Mindcraft is an open-source framework that integrates Large Language Models (LLMs) with the Mineflayer library to create autonomous, intelligent agents for Minecraft. By leveraging various AI providers or local models, the project enables bots to perform complex tasks, interact with the game world, and even execute code within a sandboxed environment. This tool is ideal for developers and AI enthusiasts looking to experiment with agentic behavior, autonomous task planning, and LLM-driven gameplay in a simulated environment.","description":"Minecraft AI with LLMs+Mineflayer","stars":5309,"language":"JavaScript"},{"owner":"siyuan-note","repo":"siyuan","url":"https://github.com/siyuan-note/siyuan","readme":"<p align=\"center\">\n<img alt=\"SiYuan\" src=\"https://b3log.org/images/brand/siyuan-128.png\">\n<br>\n<em>Refactor your thinking</em>\n<br><br>\n<a title=\"Build Status\" target=\"_blank\" href=\"https://github.com/siyuan-note/siyuan/actions/workflows/ci.yml\"><img src=\"https://img.shields.io/github/actions/workflow/status/siyuan-note/siyuan/cd.yml?style=flat-square\"></a>\n<a title=\"Releases\" target=\"_blank\" href=\"https://github.com/siyuan-note/siyuan/releases\"><img src=\"https://img.shields.io/github/release/siyuan-note/siyuan.svg?style=flat-square&color=9CF\"></a>\n<a title=\"Downloads\" target=\"_blank\" href=\"https://github.com/siyuan-note/siyuan/releases\"><img src=\"https://img.shields.io/github/downloads/siyuan-note/siyuan/total.svg?style=flat-square&color=blueviolet\"></a>\n<br>\n<a title=\"Docker Pulls\" target=\"_blank\" href=\"https://hub.docker.com/r/b3log/siyuan\"><img src=\"https://img.shields.io/docker/pulls/b3log/siyuan.svg?style=flat-square&color=green\"></a>\n<a title=\"Docker Image Size\" target=\"_blank\" href=\"https://hub.docker.com/r/b3log/siyuan\"><img src=\"https://img.shields.io/docker/image-size/b3log/siyuan.svg?style=flat-square&color=ff96b4\"></a>\n<a title=\"Hits\" target=\"_blank\" href=\"https://github.com/siyuan-note/siyuan\"><img src=\"https://hits.b3log.org/siyuan-note/siyuan.svg\"></a>\n<br>\n<a title=\"AGPLv3\" target=\"_blank\" href=\"https://www.gnu.org/licenses/agpl-3.0.txt\"><img src=\"http://img.shields.io/badge/license-AGPLv3-orange.svg?style=flat-square\"></a>\n<a title=\"Code Size\" target=\"_blank\" href=\"https://github.com/siyuan-note/siyuan\"><img src=\"https://img.shields.io/github/languages/code-size/siyuan-note/siyuan.svg?style=flat-square&color=yellow\"></a>\n<a title=\"GitHub Pull Requests\" target=\"_blank\" href=\"https://github.com/siyuan-note/siyuan/pulls\"><img src=\"https://img.shields.io/github/issues-pr-closed/siyuan-note/siyuan.svg?style=flat-square&color=FF9966\"></a>\n<br>\n<a title=\"GitHub Commits\" target=\"_blank\" href=\"https://github.com/siyuan-note/siyuan/commits/master\"><img src=\"https://img.shields.io/github/commit-activity/m/siyuan-note/siyuan.svg?style=flat-square\"></a>\n<a title=\"Last Commit\" target=\"_blank\" href=\"https://github.com/siyuan-note/siyuan/commits/master\"><img src=\"https://img.shields.io/github/last-commit/siyuan-note/siyuan.svg?style=flat-square&color=FF9900\"></a>\n<br><br>\n<a title=\"Twitter\" target=\"_blank\" href=\"https://twitter.com/b3logos\"><img alt=\"Twitter Follow\" src=\"https://img.shields.io/twitter/follow/b3logos?label=Follow&style=social\"></a>\n<a title=\"Discord\" target=\"_blank\" href=\"https://discord.gg/dmMbCqVX7G\"><img alt=\"Chat on Discord\" src=\"https://img.shields.io/discord/808152298789666826?label=Discord&logo=Discord&style=social\"></a>\n<br><br>\n<a href=\"https://trendshift.io/repositories/3949\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/3949\" alt=\"siyuan-note%2Fsiyuan | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/></a>\n</p>\n\n<p align=\"center\">\n<b>English</b>\n| <a href=\"README_zh_CN.md\">中文</a>\n| <a href=\"README_ja_JP.md\">日本語</a>\n| <a href=\"README_tr_TR.md\">Türkçe</a>\n</p>\n\n---\n\n## Table of Contents\n\n* [💡 Introduction](#-introduction)\n* [🔮 Features](#-features)\n* [🏗️ Architecture and Ecosystem](#-architecture-and-ecosystem)\n* [🌟 Star History](#-star-history)\n* [🗺️ Roadmap](#️-roadmap)\n* [🚀 Download Setup](#-download-setup)\n  * [App Market](#app-market)\n  * [Installation Package](#installation-package)\n  * [Package Manager](#package-manager)\n  * [Docker Hosting](#docker-hosting)\n  * [Unraid Hosting](#unraid-hosting)\n  * [TrueNAS Hosting](#TrueNAS-hosting)\n  * [Insider Preview](#insider-preview)\n* [🏘️ Community](#️-community)\n* [🛠️ Development Guide](#️-development-guide)\n* [❓ FAQ](#-faq)\n  * [How does SiYuan store data?](#how-does-siyuan-store-data)\n  * [Does it support data synchronization through a third-party sync disk?](#does-it-support-data-synchronization-through-a-third-party-sync-disk)\n  * [Is SiYuan open source?](#is-siyuan-open-source)\n  * [How to upgrade to a new version?](#how-to-upgrade-to-a-new-version)\n  * [What if some blocks (such as paragraph blocks in list items) cannot find the block icon?](#what-if-some-blocks-such-as-paragraph-blocks-in-list-items-cannot-find-the-block-icon)\n  * [What should I do if the data repo key is lost?](#what-should-i-do-if-the-data-repo-key-is-lost)\n  * [Do I need to pay for it?](#do-i-need-to-pay-for-it)\n* [🙏 Acknowledgement](#-acknowledgement)\n  * [Contributors](#contributors)\n\n---\n\n## 💡 Introduction\n\nSiYuan is a privacy-first personal knowledge management system, support fine-grained block-level reference and Markdown\nWYSIWYG.\n\nWelcome to [SiYuan English Discussion Forum](https://liuyun.io) to learn more.\n\n![feature0.png](https://b3logfile.com/file/2025/11/feature0-GfbhEqf.png)\n\n![feature51.png](https://b3logfile.com/file/2025/11/feature5-1-7DJSfEP.png)\n\n## 🔮 Features\n\nMost features are free, even for commercial use.\n\n* Content block\n  * Block-level reference and two-way links\n  * Custom attributes\n  * SQL query embed\n  * Protocol `siyuan://`\n* Editor\n  * Block-style\n  * Markdown WYSIWYG\n  * List outline\n  * Block zoom-in\n  * Million-word large document editing\n  * Mathematical formulas, charts, flowcharts, Gantt charts, timing charts, staffs, etc.\n  * Web clipping\n  * PDF Annotation link\n* Export\n  * Block ref and embed\n  * Standard Markdown with assets\n  * PDF, Word and HTML\n  * Copy to WeChat MP, Zhihu and Yuque\n* Database\n  * Table view\n* Flashcard spaced repetition\n* AI writing and Q/A chat via OpenAI API\n* Tesseract OCR \n* Multi-tab, drag and drop to split screen\n* Template snippet\n* JavaScript/CSS snippet\n* Android/iOS/HarmonyOS App\n* Docker deployment\n* [API](https://github.com/siyuan-note/siyuan/blob/master/API.md)\n* Community marketplace\n\nSome features are only available to paid members, for more details please refer to [Pricing](https://b3log.org/siyuan/en/pricing.html).\n\n## 🏗️ Architecture and Ecosystem\n\n![SiYuan Arch](https://b3logfile.com/file/2023/05/SiYuan_Arch-Sgu8vXT.png \"SiYuan Arch\")\n\n| Project                                                  | Description           | Forks                                                                           | Stars                                                                                | \n|----------------------------------------------------------|-----------------------|---------------------------------------------------------------------------------|--------------------------------------------------------------------------------------|\n| [lute](https://github.com/88250/lute)                    | Editor engine         | ![GitHub forks](https://img.shields.io/github/forks/88250/lute)                 | ![GitHub Repo stars](https://img.shields.io/github/stars/88250/lute)                 |\n| [chrome](https://github.com/siyuan-note/siyuan-chrome)   | Chrome/Edge extension | ![GitHub forks](https://img.shields.io/github/forks/siyuan-note/siyuan-chrome)  | ![GitHub Repo stars](https://img.shields.io/github/stars/siyuan-note/siyuan-chrome)  |\n| [bazaar](https://github.com/siyuan-note/bazaar)          | Community marketplace | ![GitHub forks](https://img.shields.io/github/forks/siyuan-note/bazaar)         | ![GitHub Repo stars](https://img.shields.io/github/stars/siyuan-note/bazaar)         |\n| [dejavu](https://github.com/siyuan-note/dejavu)          | Data repo             | ![GitHub forks](https://img.shields.io/github/forks/siyuan-note/dejavu)         | ![GitHub Repo stars](https://img.shields.io/github/stars/siyuan-note/dejavu)         |\n| [petal](https://github.com/siyuan-note/petal)            | Plugin API            | ![GitHub forks](https://img.shields.io/github/forks/siyuan-note/petal)          | ![GitHub Repo stars](https://img.shields.io/github/stars/siyuan-note/petal)          |\n| [android](https://github.com/siyuan-note/siyuan-android) | Android App           | ![GitHub forks](https://img.shields.io/github/forks/siyuan-note/siyuan-android) | ![GitHub Repo stars](https://img.shields.io/github/stars/siyuan-note/siyuan-android) |\n| [ios](https://github.com/siyuan-note/siyuan-ios)         | iOS App               | ![GitHub forks](https://img.shields.io/github/forks/siyuan-note/siyuan-ios)     | ![GitHub Repo stars](https://img.shields.io/github/stars/siyuan-note/siyuan-ios)     |\n| [harmony](https://github.com/siyuan-note/siyuan-harmony) | HarmonyOS App         | ![GitHub forks](https://img.shields.io/github/forks/siyuan-note/siyuan-harmony) | ![GitHub Repo stars](https://img.shields.io/github/stars/siyuan-note/siyuan-harmony) |\n| [riff](https://github.com/siyuan-note/riff)              | Spaced repetition     | ![GitHub forks](https://img.shields.io/github/forks/siyuan-note/riff)           | ![GitHub Repo stars](https://img.shields.io/github/stars/siyuan-note/riff)           |\n\n## 🌟 Star History\n\n<a href=\"https://star-history.com/#siyuan-note/siyuan&Date\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=siyuan-note/siyuan&type=Date&theme=dark\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=siyuan-note/siyuan&type=Date\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/svg?repos=siyuan-note/siyuan&type=Date\" />\n </picture>\n</a>\n\n## 🗺️ Roadmap\n\n* [SiYuan development plan and progress](https://github.com/orgs/siyuan-note/projects/1)\n* [SiYuan changelog](CHANGELOG.md)\n\n## 🚀 Download Setup\n\nIt is recommended to give priority to installing through the application market on the desktop and mobile, so that you can upgrade the version with one click in the future.\n\n### App Market\n\nMobile:\n\n* [App Store](https://apps.apple.com/us/app/siyuan/id1583226508)\n* [Google Play](https://play.google.com/store/apps/details?id=org.b3log.siyuan)\n* [F-Droid](https://f-droid.org/packages/org.b3log.siyuan)\n\nDesktop:\n\n* [Microsoft Store](https://apps.microsoft.com/detail/9p7hpmxp73k4)\n\n### Installation Package\n\n* [B3log](https://b3log.org/siyuan/en/download.html)\n* [GitHub](https://github.com/siyuan-note/siyuan/releases)\n\n### Package Manager\n\n#### `siyuan`\n\n[![Packaging status](https://repology.org/badge/vertical-allrepos/siyuan.svg)](https://repology.org/project/siyuan/versions)\n\n#### `siyuan-note`\n\n[![Packaging status](https://repology.org/badge/vertical-allrepos/siyuan-note.svg)](https://repology.org/project/siyuan-note/versions)\n\n### Docker Hosting\n\n<details>\n<summary>Docker Deployment</summary>\n\n#### Overview\n\nThe easiest way to serve SiYuan on a server is to deploy it through Docker.\n\n* Image name `b3log/siyuan`\n* [Image URL](https://hub.docker.com/r/b3log/siyuan)\n\n#### File structure\n\nThe overall program is located under `/opt/siyuan/`, which is basically the structure under the resources folder of the Electron installation package:\n\n* appearance: icon, theme, languages\n* guide: user guide document\n* stage: interface and static resources\n* kernel: kernel program\n\n#### Entrypoint\n\nThe entry point is set when building the Docker image: `ENTRYPOINT [\"/opt/siyuan/entrypoint.sh\"]`. This script allows changing the `PUID` and `PGID` of the user that will run inside the container. This is especially relevant to solve permission issues when mounting directories from the host. The `PUID` (User ID) and `PGID` (Group ID) can be passed as environment variables, making it easier to ensure correct permissions when accessing host-mounted directories.\n\nUse the following parameters when running the container with `docker run b3log/siyuan`:\n\n* `--workspace`: Specifies the workspace folder path, mounted to the container via `-v` on the host\n* `--accessAuthCode`: Specifies the access authorization code\n\nMore parameters can be found using `--help`. Here’s an example of a startup command with the new environment variables:\n\n```bash\ndocker run -d \\\n  -v workspace_dir_host:workspace_dir_container \\\n  -p 6806:6806 \\\n  -e PUID=1001 -e PGID=1002 \\\n  b3log/siyuan \\\n  --workspace=workspace_dir_container \\\n  --accessAuthCode=xxx\n```\n\n* `PUID`: Custom user ID (optional, defaults to `1000` if not provided)\n* `PGID`: Custom group ID (optional, defaults to `1000` if not provided)\n* `workspace_dir_host`: The workspace folder path on the host\n* `workspace_dir_container`: The path of the workspace folder in the container, as specified in `--workspace`\n  * In alternative, it's possible to set the path via the `SIYUAN_WORKSPACE_PATH` env variable. The commandline will always have the priority, if both are set\n* `accessAuthCode`: Access authorization code (please **be sure to modify**, otherwise anyone can access your data)\n  * In alternative, it's possible to set the auth code via the `SIYUAN_ACCESS_AUTH_CODE` env variable. The commandline will always have the priority, if both are set\n  * To disable the Access authorization code set the env variable `SIYUAN_ACCESS_AUTH_CODE_BYPASS=true`\n\nTo simplify things, it is recommended to configure the workspace folder path to be consistent on the host and container, such as having both `workspace_dir_host` and `workspace_dir_container` configured as `/siyuan/workspace`. The corresponding startup command would be:\n\n```bash\ndocker run -d \\\n  -v /siyuan/workspace:/siyuan/workspace \\\n  -p 6806:6806 \\\n  -e PUID=1001 -e PGID=1002 \\\n  b3log/siyuan \\\n  --workspace=/siyuan/workspace/ \\\n  --accessAuthCode=xxx\n```\n\n#### Docker Compose\n\nFor users running Siyuan with Docker Compose, the environment variables `PUID` and `PGID` can be passed to customize the user and group IDs. Here's an example of a Docker Compose configuration:\n\n```yaml\nversion: \"3.9\"\nservices:\n  main:\n    image: b3log/siyuan\n    command: ['--workspace=/siyuan/workspace/', '--accessAuthCode=${AuthCode}']\n    ports:\n      - 6806:6806\n    volumes:\n      - /siyuan/workspace:/siyuan/workspace\n    restart: unless-stopped\n    environment:\n      # A list of time zone identifiers can be found at https://en.wikipedia.org/wiki/List_of_tz_database_time_zones\n      - TZ=${YOUR_TIME_ZONE}\n      - PUID=${YOUR_USER_PUID}  # Customize user ID\n      - PGID=${YOUR_USER_PGID}  # Customize group ID\n```\n\nIn this setup:\n\n* `PUID` and `PGID` are set dynamically and passed to the container\n* If these variables are not provided, the default `1000` will be used\n\nBy specifying `PUID` and `PGID` in the environment, you avoid the need to explicitly set the `user` directive (`user: '1000:1000'`) in the compose file. The container will dynamically adjust the user and group based on these environment variables at startup.\n\n#### User Permissions\n\nIn the image, the `entrypoint.sh` script ensures the creation of the `siyuan` user and group with the specified `PUID` and `PGID`. Therefore, when the host creates a workspace folder, pay attention to setting the user and group ownership of the folder to match the `PUID` and `PGID` you plan to use. For example:\n\n```bash\nchown -R 1001:1002 /siyuan/workspace\n```\n\nIf you use custom `PUID` and `PGID` values, the entrypoint script will ensure that the correct user and group are created inside the container, and ownership of mounted volumes will be adjusted accordingly. There’s no need to manually pass `-u` in `docker run` or `docker-compose` as the environment variables will handle the customization.\n\n#### Hidden port\n\nUse NGINX reverse proxy to hide port 6806, please note:\n\n* Configure WebSocket reverse proxy `/ws`\n\n#### Note\n\n* Be sure to confirm the correctness of the mounted volume, otherwise the data will be lost after the container is deleted\n* Do not use URL rewriting for redirection, otherwise there may be problems with authentication, it is recommended to configure a reverse proxy\n* If you encounter permission issues, verify that the `PUID` and `PGID` environment variables match the ownership of the mounted directories on your host system\n\n#### Limitations\n\n* Does not support desktop and mobile application connections, only supports use on browsers\n* Export to PDF, HTML and Word formats is not supported\n* Import Markdown file is not supported\n\n</details>\n\n### Unraid Hosting\n\n<details>\n<summary>Unraid Deployment</summary>\n\nNote: First run `chown -R 1000:1000 /mnt/user/appdata/siyuan` in the terminal\n\nTemplate reference:\n\n```\nWeb UI: 6806\nContainer Port: 6806\nContainer Path: /home/siyuan\nHost path: /mnt/user/appdata/siyuan\nPUID: 1000\nPGID: 1000\nPublish parameters: --accessAuthCode=******(Access authorization code)\n```\n\n</details>\n\n### TrueNAS Hosting\n\n<details>\n<summary>TrueNAS Deployment</summary>\n\nNote: First run below commands in the TrueNAS Shell. please update `Pool_1/Apps_Data/siyuan to match your dataset for Apps.\n\n```shell\nzfs create Pool_1/Apps_Data/siyuan\nchown -R 1001:1002 /mnt/Pool_1/Apps_Data/siyuan\nchmod 755 /mnt/Pool_1/Apps_Data/siyuan\n```\n\nNavigate to Apps - DiscoverApps - More Options(on top right, besies Custom App) - Install via YAML\n\nTemplate reference:\n\n```yaml\nservices:\n  siyuan:\n    image: b3log/siyuan\n    container_name: siyuan\n    command: ['--workspace=/siyuan/workspace/', '--accessAuthCode=2222']\n    ports:\n      - 6806:6806\n    volumes:\n      - /mnt/Pool_1/Apps_Data/siyuan:/siyuan/workspace  # Adjust to your dataset path \n    restart: unless-stopped\n    environment:\n      - TZ=America/Los_Angeles  # Replace with your timezone if needed\n      - PUID=1001\n      - PGID=1002\n```\n\n</details>\n\n### Insider Preview\n\nWe release insider preview before major updates, please visit [https://github.com/siyuan-note/insider](https://github.com/siyuan-note/insider).\n\n## 🏘️ Community\n\n* [English Discussion Forum](https://liuyun.io)\n* [User community summary](https://liuyun.io/article/1687779743723)\n* [Awesome SiYuan](https://github.com/siyuan-note/awesome)\n\n## 🛠️ Development Guide\n\nSee [Development Guide](https://github.com/siyuan-note/siyuan/blob/master/.github/CONTRIBUTING.md).\n\n## ❓ FAQ\n\n### How does SiYuan store data?\n\nThe data is saved in the workspace folder, in the workspace data folder:\n\n* `assets` is used to save all inserted assets\n* `emojis` is used to save emoji images\n* `snippets` is used to save code snippets\n* `storage` is used to save query conditions, layouts and flashcards, etc.\n* `templates` is used to save template snippets\n* `widgets` is used to save widgets\n* `plugins` is used to save plugins\n* `public` is used to save public data\n* The rest of the folders are the notebook folders created by the user, files with the suffix of `.sy` in the notebook folder are used to save the document data, and the data format is JSON\n\n### Does it support data synchronization through a third-party sync disk?\n\nData synchronization through third-party synchronization disks is not supported, otherwise data may be corrupted.\n\nAlthough it does not support third-party sync disks, it supports connect with third-party cloud storage (Member's privileges).\n\nIn addition, you can also consider manually exporting and importing data to achieve data synchronization:\n\n* Desktop: <kbd>Settings</kbd> - <kbd>Export</kbd> - <kbd>Export Data</kbd> / <kbd>Import Data</kbd>\n* Mobile: <kbd>Right column</kbd> - <kbd>About</kbd> - <kbd>Export Data</kbd> / <kbd>Import Data</kbd>\n\n### Is SiYuan open source?\n\nSiYuan is completely open source, and contributions are welcome:\n\n* [User Interface and Kernel](https://github.com/siyuan-note/siyuan)\n* [Android](https://github.com/siyuan-note/siyuan-android)\n* [iOS](https://github.com/siyuan-note/siyuan-ios)\n* [HarmonyOS](https://github.com/siyuan-note/siyuan-harmony)\n* [Chrome Clipping Extension](https://github.com/siyuan-note/siyuan-chrome)\n\nFor more details, please refer to [Development Guide](https://github.com/siyuan-note/siyuan/blob/master/.github/CONTRIBUTING.md).\n\n### How to upgrade to a new version?\n\n* If installed via app store, please update via app store\n* If it is installed through the installation package on the desktop, you can open the option of <kbd>Settings</kbd> - <kbd>About</kbd> - <kbd>Automatically download update installation package</kbd>, so that SiYuan will automatically download The latest version of the installation package and prompts to install\n* If it is installed by manual installation package, please download the installation package again to install\n\nYou can <kbd>Check update</kbd> in <kbd>Settings</kbd> - <kbd>About</kbd> - <kbd>Current Version</kbd>, or pay attention to [Official Download](https://b3log.org/siyuan/en/download.html) or [GitHub Releases](https://github.com/siyuan-note/siyuan/releases) to get the new version.\n\n### What if some blocks (such as paragraph blocks in list items) cannot find the block icon?\n\nThe first sub-block under the list item is the block icon omitted. You can move the cursor into this block and trigger its block menu with <kbd>Ctrl+/</kbd> .\n\n### What should I do if the data repo key is lost?\n\n* If the data repo key is correctly initialized on multiple devices before, the key is the same on all devices and can be set in <kbd>Settings</kbd> - <kbd>About</kbd> - <kbd>Data repo key</kbd> - <kbd>Copy key string</kbd> retrieve\n* If it has not been configured correctly before (for example, the keys on multiple devices are inconsistent) or all devices are unavailable and the key string cannot be obtained, you can reset the key by following the steps below:\n\n  1. Manually back up the data, you can use <kbd>Export Data</kbd> or directly copy the <kbd>workspace/data/</kbd> folder on the file system\n  2. <kbd>Settings</kbd> - <kbd>About</kbd> - <kbd>Data rep key</kbd> - <kbd>Reset data repo</kbd>\n  3. Reinitialize the data repo key. After initializing the key on one device, other devices import the key\n  4. The cloud uses the new synchronization directory, the old synchronization directory is no longer available and can be deleted\n  5. The existing cloud snapshots are no longer available and can be deleted\n\n### Do I need to pay for it?\n\nMost features are free, even for commercial use.\n\nMember's privileges can only be used after payment, please refer to [Pricing](https://b3log.org/siyuan/en/pricing.html).\n\n## 🙏 Acknowledgement\n\nThe birth of SiYuan is inseparable from many open source projects and contributors, please refer to the project source code kernel/go.mod, app/package.json and project homepage.\n\nThe growth of SiYuan is inseparable from user feedback and promotion, thank you for everyone's help to SiYuan ❤️\n\n### Contributors\n\nWelcome to join us and contribute code to SiYuan together.\n\n<a href=\"https://github.com/siyuan-note/siyuan/graphs/contributors\">\n   <img src=\"https://contrib.rocks/image?repo=siyuan-note/siyuan\" />\n</a>\n","summary":"SiYuan is a privacy-first, open-source note-taking application designed to facilitate structured thinking through block-based content management. It offers robust features such as local-first storage, Markdown support, knowledge graph visualization, and extensive customization through an integrated app market. This platform is ideal for power users, researchers, and knowledge workers who require a flexible, self-hosted, and secure environment to organize complex information and personal workflows.","description":"A privacy-first, self-hosted, fully open source personal knowledge management software, written in typescript and golang.","stars":44250,"language":"TypeScript"},{"owner":"karthink","repo":"gptel","url":"https://github.com/karthink/gptel","readme":"#+title: gptel: A simple LLM client for Emacs\n\n[[https://elpa.nongnu.org/nongnu/gptel.html][file:https://elpa.nongnu.org/nongnu/gptel.svg]]\n[[https://elpa.nongnu.org/nongnu-devel/gptel.html][file:https://elpa.nongnu.org/nongnu-devel/gptel.svg]]\n[[https://stable.melpa.org/#/gptel][file:https://stable.melpa.org/packages/gptel-badge.svg]]\n[[https://melpa.org/#/gptel][file:https://melpa.org/packages/gptel-badge.svg]]\n\ngptel is a simple Large Language Model chat client for Emacs, with support for multiple models and backends.  It works in the spirit of Emacs, available at any time and uniformly in any buffer.\n\n*General usage*: ([[https://www.youtube.com/watch?v=bsRnh_brggM][YouTube Demo]])\n\nhttps://user-images.githubusercontent.com/8607532/230516812-86510a09-a2fb-4cbd-b53f-cc2522d05a13.mp4\n\nhttps://user-images.githubusercontent.com/8607532/230516816-ae4a613a-4d01-4073-ad3f-b66fa73c6e45.mp4\n\n*In-place usage*\n\n#+html: <p align=\"center\">\nhttps://github.com/user-attachments/assets/cec11aec-52f6-412e-9e7a-9358e8b9b1bf\n#+html: </p>\n\n*Tool use*\n\n#+html: <p align=\"center\">\nhttps://github.com/user-attachments/assets/5f993659-4cfd-49fa-b5cd-19c55766b9b2\n#+html: </p>\n\n#+html: <p align=\"center\">\nhttps://github.com/user-attachments/assets/8f57c20b-e1b0-4d86-b972-f46fb90ae1e7\n#+html: </p>\n\nSee also [[https://youtu.be/g1VMGhC5gRU][this youtube demo (2 minutes)]] by Armin Darvish.\n\n# *Media support*\n\n# #+html: <p align=\"center\">\n# https://github.com/user-attachments/assets/1fd947e1-226b-4be2-bc68-7b22b2e3215f\n# #+html: </p>\n\n# *Multi-LLM support demo*:\n\n# https://github-production-user-asset-6210df.s3.amazonaws.com/8607532/278854024-ae1336c4-5b87-41f2-83e9-e415349d6a43.mp4\n\n------\n\n- Interact with LLMs from anywhere in Emacs (any buffer, shell, minibuffer, wherever).\n- LLM responses are in Markdown or Org markup.\n- Supports multiple independent conversations, one-off ad hoc interactions and anything in between.\n- Supports tool-use to equip LLMs with agentic capabilities.\n- Supports Model Context Protocol (MCP) integration using [[https://github.com/lizqwerscott/mcp.el][mcp.el]].\n- Supports multi-modal input (include images, documents).\n- Supports \"reasoning\" content in LLM responses.\n- Save chats as regular Markdown/Org/Text files and resume them later.\n- Edit your previous prompts or LLM responses when continuing a conversation. These will be fed back to the model.\n- Supports introspection, so you can see /exactly/ what will be sent.  Inspect and modify queries before sending them.\n- Pause multi-stage requests at an intermediate stage and resume them later.\n- Don't like gptel's workflow? Use it to create your own for any supported model/backend with a [[https://github.com/karthink/gptel/wiki/Defining-custom-gptel-commands][simple API]].\n\ngptel uses Curl if available, but falls back to the built-in url-retrieve to work without external dependencies.\n\n** Contents :toc:\n  - [[#installation][Installation]]\n    - [[#straight][Straight]]\n    - [[#manual][Manual]]\n    - [[#doom-emacs][Doom Emacs]]\n    - [[#spacemacs][Spacemacs]]\n  - [[#setup][Setup]]\n    - [[#openai][OpenAI]]\n    - [[#other-llm-backends][Other LLM backends]]\n      - [[#optional-securing-api-keys-with-authinfo][(Optional) Securing API keys with =authinfo=]]\n      - [[#optional-reading-api-keys-from-environment-variables][(Optional) Reading API keys from environment variables]]\n      - [[#openai-chatgpt-pluspro-subscription][OpenAI (ChatGPT plus/pro subscription)]]\n      - [[#azure][Azure]]\n      - [[#gpt4all][GPT4All]]\n      - [[#ollama][Ollama]]\n      - [[#open-webui][Open WebUI]]\n      - [[#gemini][Gemini]]\n      - [[#llamacpp-or-llamafile][Llama.cpp or Llamafile]]\n      - [[#kagi-fastgpt--summarizer][Kagi (FastGPT & Summarizer)]]\n      - [[#togetherai][together.ai]]\n      - [[#anyscale][Anyscale]]\n      - [[#perplexity][Perplexity]]\n      - [[#anthropic-claude][Anthropic (Claude)]]\n      - [[#groq][Groq]]\n      - [[#mistral-le-chat][Mistral Le Chat]]\n      - [[#openrouter][OpenRouter]]\n      - [[#privategpt][PrivateGPT]]\n      - [[#deepseek][DeepSeek]]\n      - [[#sambanova-deepseek][Sambanova (Deepseek)]]\n      - [[#cerebras][Cerebras]]\n      - [[#github-models][Github Models]]\n      - [[#novita-ai][Novita AI]]\n      - [[#xai][xAI]]\n      - [[#aiml-api][AI/ML API]]\n      - [[#github-copilotchat][GitHub CopilotChat]]\n      - [[#aws-bedrock][AWS Bedrock]]\n      - [[#moonshot-kimi][Moonshot (Kimi)]]\n  - [[#usage][Usage]]\n    - [[#in-any-buffer][In any buffer:]]\n    - [[#in-a-dedicated-chat-buffer][In a dedicated chat buffer:]]\n      - [[#including-media-images-documents-or-plain-text-files-with-requests][Including media (images, documents or plain-text files) with requests]]\n      - [[#save-and-restore-your-chat-sessions][Save and restore your chat sessions]]\n    - [[#setting-options-backend-model-request-parameters-system-prompts-and-more][Setting options (backend, model, request parameters, system prompts and more)]]\n    - [[#include-more-context-with-requests][Include more context with requests]]\n    - [[#handle-reasoning-content][Handle \"reasoning\" content]]\n    - [[#tool-use][Tool use]]\n      - [[#defining-gptel-tools][Defining gptel tools]]\n      - [[#selecting-tools][Selecting tools]]\n      - [[#llm-tool-collections][LLM tool collections]]\n      - [[#model-context-protocol-mcp-integration][Model Context Protocol (MCP) integration]]\n    - [[#rewrite-refactor-or-fill-in-a-region][Rewrite, refactor or fill in a region]]\n    - [[#extra-org-mode-conveniences][Extra Org mode conveniences]]\n    - [[#introspection-examine-debug-or-modify-requests][Introspection (examine, debug or modify requests)]]\n  - [[#faq][FAQ]]\n    - [[#chat-buffer-ui][Chat buffer UI]]\n      - [[#i-want-the-window-to-scroll-automatically-as-the-response-is-inserted][I want the window to scroll automatically as the response is inserted]]\n      - [[#i-want-the-cursor-to-move-to-the-next-prompt-after-the-response-is-inserted][I want the cursor to move to the next prompt after the response is inserted]]\n      - [[#i-want-to-change-the-formatting-of-the-prompt-and-llm-response][I want to change the formatting of the prompt and LLM response]]\n      - [[#how-does-gptel-distinguish-between-user-prompts-and-llm-responses][How does gptel distinguish between user prompts and LLM responses?]]\n    - [[#transient-menu-behavior][Transient menu behavior]]\n      - [[#i-want-to-set-gptel-options-but-only-for-this-buffer][I want to set gptel options but only for this buffer]]\n      - [[#i-want-the-transient-menu-options-to-be-saved-so-i-only-need-to-set-them-once][I want the transient menu options to be saved so I only need to set them once]]\n      - [[#using-the-transient-menu-leaves-behind-extra-windows][Using the transient menu leaves behind extra windows]]\n      - [[#can-i-change-the-transient-menu-key-bindings][Can I change the transient menu key bindings?]]\n      - [[#doom-emacs-sending-a-query-from-the-gptel-menu-fails-because-of-a-key-conflict-with-org-mode][(Doom Emacs) Sending a query from the gptel menu fails because of a key conflict with Org mode]]\n    - [[#miscellaneous][Miscellaneous]]\n      - [[#i-want-to-use-gptel-in-a-way-thats-not-supported-by-gptel-send-or-the-options-menu][I want to use gptel in a way that's not supported by =gptel-send= or the options menu]]\n      - [[#chatgpt-i-get-the-error-http2-429-you-exceeded-your-current-quota][(ChatGPT) I get the error \"(HTTP/2 429) You exceeded your current quota\"]]\n      - [[#why-another-llm-client][Why another LLM client?]]\n  - [[#additional-configuration][Additional Configuration]]\n    - [[#option-presets][Option presets]]\n      - [[#applying-presets-to-requests-a
