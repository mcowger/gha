|\n| *Chat UI options*              |                                                                |\n|--------------------------------+----------------------------------------------------------------|\n| =gptel-default-mode=           | Major mode for dedicated chat buffers.                         |\n| =gptel-highlight-methods=      | Response highlighting used by =gptel-highlight-mode=           |\n| =gptel-prompt-prefix-alist=    | Text inserted before queries.                                  |\n| =gptel-response-prefix-alist=  | Text inserted before responses.                                |\n| =gptel-track-response=         | Distinguish between user messages and LLM responses?           |\n| =gptel-track-media=            | Send text, images or other media from links?                   |\n| =gptel-markdown-validate-link= | Function to validate links to include with queries             |\n| =gptel-confirm-tool-calls=     | Confirm all tool calls?                                        |\n| =gptel-include-tool-results=   | Include tool results in the LLM response?                      |\n| =gptel-use-header-line=        | Display status messages in header-line (default) or minibuffer |\n| =gptel-display-buffer-action=  | Placement of the gptel chat buffer.                            |\n|--------------------------------+----------------------------------------------------------------|\n\n|-------------------------------+-------------------------------------------------------|\n| *Org mode UI options*         |                                                       |\n|-------------------------------+-------------------------------------------------------|\n| =gptel-org-branching-context= | Make each outline path a separate conversation branch |\n| =gptel-org-ignore-elements=   | Ignore parts of the buffer when sending a query       |\n| =gptel-org-validate-link=     | Function to validate links to include with queries    |\n|-------------------------------+-------------------------------------------------------|\n\n|------------------------------------+-------------------------------------------------------------|\n| *Hooks for customization*          |                                                             |\n|------------------------------------+-------------------------------------------------------------|\n| =gptel-save-state-hook=            | Runs before saving the chat state to a file on disk         |\n| =gptel-prompt-transform-functions= | Runs in a temp buffer to transform text before sending      |\n| =gptel-post-request-hook=          | Runs immediately after dispatching a =gptel-request=.       |\n| =gptel-pre-response-hook=          | Runs before inserting the LLM response into the buffer      |\n| =gptel-post-response-functions=    | Runs after inserting the full LLM response into the buffer  |\n| =gptel-post-stream-hook=           | Runs after each streaming insertion                         |\n| =gptel-pre-tool-call-functions=    | Runs before each tool call, can block or modify it          |\n| =gptel-post-tool-call-functions=   | Runs after each tool call, can block or modify results      |\n| =gptel-context-wrap-function=      | To include additional context formatted your way            |\n| =gptel-rewrite-default-action=     | Automatically diff, ediff, merge or replace refactored text |\n| =gptel-post-rewrite-functions=     | Runs after a =gptel-rewrite= request succeeds               |\n|------------------------------------+-------------------------------------------------------------|\n\n#+html: </details>\n\n*** Option presets\n\nIf you use several LLMs for different tasks with accompanying system prompts (instructions) and tool configurations, manually adjusting =gptel= settings each time can become tedious.  Presets are a bundle of gptel settings -- such as the model, backend, system message, and enabled tools -- that you can switch to at once.\n\nOnce defined, presets can be applied from gptel's transient menu:\n\n#+html: <img src=\"https://github.com/user-attachments/assets/e0cf6a32-d999-4138-8369-23512f5e9311\" align=\"center\" />\n#+html: <br>\n\nTo define a preset, use the =gptel-make-preset= function, which takes a name and keyword-value pairs of settings.\n\nPresets can be used to set individual options.  Here is an example of a preset to set the system message (and do nothing else):\n#+begin_src emacs-lisp\n(gptel-make-preset 'explain\n  :system \"Explain what this code does to a novice programmer.\")\n#+end_src\n\nMore generally, you can specify a bundle of options:\n#+begin_src emacs-lisp\n(gptel-make-preset 'gpt4coding                       ;preset name, a symbol\n  :description \"A preset optimized for coding tasks\" ;for your reference\n  :backend \"Claude\"                     ;gptel backend or backend name\n  :model 'claude-3-7-sonnet-20250219.1\n  :system \"You are an expert coding assistant. Your role is to provide high-quality code solutions, refactorings, and explanations.\"\n  :tools '(\"read_buffer\" \"modify_buffer\")) ;gptel tools or tool names\n#+end_src\n\nBesides a couple of special keys (=:description=, =:parents= to inherit other presets), there is no predefined list of keys.  Instead, the key =:foo= corresponds to setting =gptel-foo= (preferred) or =gptel--foo=.  So the preset can include the value of any gptel option.  For example, the following preset sets =gptel-temperature=, =gptel-use-context= and =gptel-context=, a list of files to include as context:\n\n#+begin_src emacs-lisp\n(gptel-make-preset 'proofreader\n  :description \"Preset for proofreading tasks\"\n  :backend \"ChatGPT\"\n  :model 'gpt-4.1-mini\n  :tools '(\"read_buffer\" \"spell_check\" \"grammar_check\")\n  :use-context 'system                                ;sets gptel-use-context\n  :context '(\"./.grammar_rules.md\" \"./jargonfile.md\") ;sets gptel-context\n  :temperature 0.2)                                   ;sets gptel-temperature\n#+end_src\n\nSwitching to a preset applies the specified settings without affecting other settings.  Depending on the scope option (~=~ in gptel's transient menu), presets can be applied globally, buffer-locally or for the next request only.\n\n**** Applying presets to requests automatically\n\nYou can apply a preset to a /single/ query by including =@preset-name= in the prompt, where =preset-name= is the name of the preset.  (The =oneshot= scope option in gptel's transient menus is another way to do this, [[id:748cbc00-0c92-4705-8839-619b2c80e566][see the FAQ.]])\n\nFor example, if you have a preset named =websearch= defined which includes tools for web access and search:\n#+begin_src emacs-lisp\n(gptel-make-preset 'websearch\n  :description  \"Haiku with basic web search capability.\"\n  :backend      \"Claude\"\n  :model        'claude-3-5-haiku-20241022\n  :tools        '(\"search_web\" \"read_url\" \"get_youtube_meta\"))\n#+end_src\n\nThe following query is sent with this preset applied:\n\n#+begin_quote\n@websearch Are there any 13\" e-ink monitors on the market?  Create a\ntable comparing them, sourcing specs and reviews from online sources.\nAlso do the same for \"transreflective-LCD\" displays -- I'm not sure\nwhat exactly they're called but they're comparable to e-ink.\n#+end_quote\n\nThis =@preset-name= cookie only applies to the final user turn of the coversation that is sent.  So the presence of the cookie in past messages/turns is not significant. \n\nThe =@preset-name= cookie can be anywhere in the prompt.  For example:\n#+begin_quote\n<long piece of text>\n\nWhat do you make of the above description, @proofreader?\n#+end_quote\n\nIn chat buffers this prefix will be offered as a completion and fontified, making it easy to use and spot.\n\n** Alternatives\n\nOther LLM clients for Emacs include\n\n*Libraries*:\n\n- [[https://github.com/ahyatt/llm][llm]]: llm provides a uniform API across language model providers for building LLM clients in Emacs, and is intended as a library for use by package authors.  For similar scripting purposes, gptel provides the command =gptel-request=.\n\n*Chat clients*:\n\n- [[https://github.com/s-kostyaev/ellama][Ellama]]: A full-fledged LLM client built on llm, that supports many LLM providers (Ollama, Open AI, Vertex, GPT4All and more).  Its usage differs from gptel in that it provides separate commands for dozens of common tasks, like general chat, summarizing code/text, refactoring code, improving grammar, translation and so on.\n- [[https://github.com/xenodium/chatgpt-shell][chatgpt-shell]]: comint-shell based interaction with ChatGPT.  Also supports DALL-E, executable code blocks in the responses, and more.\n- [[https://github.com/rksm/org-ai][org-ai]]: Interaction through special =#+begin_ai ... #+end_ai= Org-mode blocks.  Also supports DALL-E, querying ChatGPT with the contents of project files, and more.\n- [[https://github.com/yibie/superchat][Superchat]]: A Claude Code style chat UI for gptel in Emacs, focusing on making structured prompts and file‑grounded conversations effortless.\n\nThere are several more: [[https://github.com/iwahbe/chat.el][chat.el]], [[https://github.com/stuhlmueller/gpt.el][gpt.el]], [[https://github.com/AnselmC/le-gpt.el][le-gpt]], [[https://github.com/stevemolitor/robby][robby]].\n\n*Coding agents*:\n\n- [[https://github.com/manzaltu/claude-code-ide.el][claude-code-ide]] and [[https://github.com/stevemolitor/claude-code.el][claude-code.el]]: Emacs interfaces to Claude Code.\n- [[https://github.com/xenodium/agent-shell][agent-shell]]: Emacs interface to various coding agents, like Claude Code, Gemini, Codex, Opencode, Goose and more.\n- [[https://github.com/MatthewZMD/aidermacs][Aidermacs]] and [[https://github.com/tninja/aider.el][aider.el]]: Emacs interfaces to [[https://aider.chat/][Aider]].\n\n*Completion at point*:\n\n- [[https://github.com/copilot-emacs/copilot.el][copilot.el]]: Code completion using Copilot.\n- [[https://github.com/milanglacier/minuet-ai.el][Minuet]]: Code-completion using LLM. Supports fill-in-the-middle (FIM) completion for compatible models such as DeepSeek and Codestral.\n\n*** Packages using gptel\n\ngptel is a general-purpose package for chat and ad-hoc LLM interaction.  The following packages use gptel to provide additional or specialized functionality:\n\n*Lookup helpers*: Calling gptel quickly for one-off interactions\n\n- [[https://github.com/karthink/gptel-quick][gptel-quick]]: Quickly look up the region or text at point.\n\n*Task-driven workflows*: Different interfaces to specify tasks for LLMs.\n\nThese differ from full \"agentic\" use in that the interactions are \"one-shot\", not chained.\n\n- [[https://github.com/dolmens/gptel-aibo/][gptel-aibo]]: A writing assistant system built on top of gptel.\n- [[https://github.com/daedsidog/evedel][Evedel]]: Instructed LLM Programmer/Assistant.\n- [[https://github.com/lanceberge/elysium][Elysium]]: Request AI-generated changes as you code.\n- [[https://github.com/ISouthRain/gptel-watch][gptel-watch]]: Automatically call gptel when typing lines that indicate intent.\n\n*Agentic use*: Use LLMs as agents, with tool-use\n\n- [[https://github.com/kmontag/macher][Macher]]: Project-aware multi-file LLM editing for Emacs.\n- [[https://github.com/karthink/gptel-agent][gptel-agent]]: Tools, presets and configuration for general agentic LLM use.\n\n*Text completion*\n\n- [[https://github.com/JDNdeveloper/gptel-autocomplete][gptel-autocomplete]]: Inline completions using gptel.\n\n*Integration with major-modes*\n\n- [[https://github.com/jwiegley/ob-gptel][ob-gptel]]: Org-babel backend for running gptel queries.\n- [[https://github.com/kamushadenes/ai-blog.el][ai-blog.el]]: Streamline generation of blog posts in Hugo.\n- [[https://github.com/lakkiy/gptel-commit][gptel-commit]]: Generate commit messages using gptel.\n- [[https://github.com/douo/magit-gptcommit][magit-gptcommit]]: Generate commit messages within magit-status Buffer using gptel.\n- [[https://github.com/ragnard/gptel-magit/][gptel-magit]]: Generate commit messages for magit using gptel.\n- [[https://github.com/ArthurHeymans/gptel-forge-prs][gptel-forge-prs]]: Generate pull request message for forge using gptel.\n\n*Chat interface addons*\n\n- [[https://github.com/rob137/Corsair][Corsair]]: Helps gather text to populate LLM prompts for gptel.\n- [[https://github.com/ultronozm/ai-org-chat.el][ai-org-chat]]: Provides branching conversations in Org buffers using gptel.  Note that gptel includes this feature as well (see =gptel-org-branching-context=), but requires a recent version of Org mode 9.7 or later to be installed.\n\n*Integration with other packages*\n\n- [[https://github.com/armindarvish/consult-omni][consult-omni]]: Versatile multi-source search package.  It includes gptel as one of its many sources.\n\n*gptel configuration management*\n\n- [[https://github.com/jwiegley/gptel-prompts][gptel-prompts]]: System prompt manager for gptel.\n\n** COMMENT Older Breaking Changes\n\n- =gptel-post-response-hook= has been renamed to =gptel-post-response-functions=, and functions in this hook are now called with two arguments: the start and end buffer positions of the response.  This should make it easy to act on the response text without having to locate it first.\n\n- Possible breakage, see #120: If streaming responses stop working for you after upgrading to v0.5, try reinstalling gptel and deleting its native comp eln cache in =native-comp-eln-load-path=.\n\n- The user option =gptel-host= is deprecated.  If the defaults don't work for you, use =gptel-make-openai= to customize server settings.\n\n- =gptel-api-key-from-auth-source= now searches for the API key using the host address for the active LLM backend, /i.e./ \"api.openai.com\" when using ChatGPT.  You may need to update your =~/.authinfo=.\n\n** Acknowledgments\n\n- [[https://github.com/felipeochoa][Felipe Ochoa]] and [[https://github.com/akssri][akssri]] for adding AWS Bedrock support to gptel.\n- [[https://github.com/jwiegley][John Wiegley]] for the design of gptel's presets and gptel-request's async pipeline, but also for loads of general feedback and advice.\n- [[https://github.com/pabl0][Henrik Ahlgren]] for a keen eye to detail and polish applied to gptel's UI.\n- [[https://github.com/psionic-k][psionic-k]] for extensive testing of the tool use feature and the design of gptel's in-buffer tool use records.\n- [[https://github.com/jdtsmith][JD Smith]] for feedback and code assistance with gptel-menu's redesign\n- [[https://github.com/meain][Abin Simon]] for extensive feedback on improving gptel's directives and UI.\n- [[https://github.com/algal][Alexis Gallagher]] and [[https://github.com/d1egoaz][Diego Alvarez]] for fixing a nasty multi-byte bug with =url-retrieve=.\n- [[https://github.com/tarsius][Jonas Bernoulli]] for the Transient library.\n- [[https://github.com/daedsidog][daedsidog]] for adding context support to gptel.\n- [[https://github.com/Aquan1412][Aquan1412]] for adding PrivateGPT support to gptel.\n- [[https://github.com/r0man][r0man]] for improving gptel's Curl integration.\n\n# Local Variables:\n# toc-org-max-depth: 4\n# eval: (and (fboundp 'toc-org-mode) (toc-org-mode 1))\n# End:\n","summary":"gptel is a versatile LLM client for Emacs that allows users to interact with various AI models directly from any buffer, shell, or minibuffer. It supports a wide range of backends, including OpenAI, Ollama, and Anthropic, while providing advanced features like tool use, multi-modal input, and persistent chat sessions formatted in Markdown or Org. By enabling users to inspect, modify, and resume conversations seamlessly, this tool is ideal for Emacs power users seeking a highly integrated, customizable, and efficient way to incorporate AI into their existing text-editing workflow.","description":"A simple, extensible LLM client for Emacs","stars":3357,"language":"Emacs Lisp"},{"owner":"fishaudio","repo":"fish-speech","url":"https://github.com/fishaudio/fish-speech","readme":"<div align=\"center\">\n<h1>Fish Speech</h1>\n\n**English** | [简体中文](docs/README.zh.md) | [Portuguese](docs/README.pt-BR.md) | [日本語](docs/README.ja.md) | [한국어](docs/README.ko.md) | [العربية](docs/README.ar.md) | [Español](docs/README.es.md)  <br>\n\n<a href=\"https://www.producthunt.com/products/fish-speech?embed=true&utm_source=badge-top-post-badge&utm_medium=badge&utm_source=badge-fish&#0045;audio&#0045;s1\" target=\"_blank\"><img src=\"https://api.producthunt.com/widgets/embed-image/v1/top-post-badge.svg?post_id=1023740&theme=light&period=daily&t=1761164814710\" alt=\"Fish&#0032;Audio&#0032;S1 - Expressive&#0032;Voice&#0032;Cloning&#0032;and&#0032;Text&#0045;to&#0045;Speech | Product Hunt\" style=\"width: 250px; height: 54px;\" width=\"250\" height=\"54\" /></a>\n<a href=\"https://trendshift.io/repositories/7014\" target=\"_blank\">\n    <img src=\"https://trendshift.io/api/badge/repositories/7014\" alt=\"fishaudio%2Ffish-speech | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/>\n</a>\n<br>\n</div>\n<br>\n\n<div align=\"center\">\n    <img src=\"https://count.getloli.com/get/@fish-speech?theme=asoul\" /><br>\n</div>\n\n<br>\n\n<div align=\"center\">\n    <a target=\"_blank\" href=\"https://discord.gg/Es5qTB9BcN\">\n        <img alt=\"Discord\" src=\"https://img.shields.io/discord/1214047546020728892?color=%23738ADB&label=Discord&logo=discord&logoColor=white&style=flat-square\"/>\n    </a>\n    <a target=\"_blank\" href=\"https://hub.docker.com/r/fishaudio/fish-speech\">\n        <img alt=\"Docker\" src=\"https://img.shields.io/docker/pulls/fishaudio/fish-speech?style=flat-square&logo=docker\"/>\n    </a>\n    <a target=\"_blank\" href=\"https://pd.qq.com/s/bwxia254o\">\n      <img alt=\"QQ Channel\" src=\"https://img.shields.io/badge/QQ-blue?logo=tencentqq\">\n    </a>\n</div>\n\n<div align=\"center\">\n    <a target=\"_blank\" href=\"https://huggingface.co/fishaudio/s2-pro\">\n        <img alt=\"HuggingFace Model\" src=\"https://img.shields.io/badge/🤗%20-models-orange\"/>\n    </a>\n    <a target=\"_blank\" href=\"https://fish.audio/blog/fish-audio-open-sources-s2/\">\n        <img alt=\"Fish Audio Blog\" src=\"https://img.shields.io/badge/Blog-Fish_Audio_S2-1f7a8c?style=flat-square&logo=readme&logoColor=white\"/>\n    </a>\n    <a target=\"_blank\" href=\"https://arxiv.org/abs/2603.08823\">\n        <img alt=\"Paper | Technical Report\" src=\"https://img.shields.io/badge/Paper-Technical_Report-b31b1b?style=flat-square\"/>\n    </a>\n</div>\n\n> [!IMPORTANT]\n> **License Notice**  \n> This codebase and its associated model weights are released under **[FISH AUDIO RESEARCH LICENSE](LICENSE)**. Please refer to [LICENSE](LICENSE) for more details. We will take action against any violation of the license.\n\n> [!WARNING]\n> **Legal Disclaimer**  \n> We do not hold any responsibility for any illegal usage of the codebase. Please refer to your local laws about DMCA and other related laws.\n\n## Quick Start\n\n### For Human\n\nHere are the official documents for Fish Audio S2, follow the instructions to get started easily.\n\n- [Installation](https://speech.fish.audio/install/)\n- [Command Line Inference](https://speech.fish.audio/inference/#command-line-inference)\n- [WebUI Inference](https://speech.fish.audio/inference/#webui-inference)\n- [Server Inference](https://speech.fish.audio/server/)\n- [Docker Setup](https://speech.fish.audio/install/#docker-setup)\n\n> [!IMPORTANT]\n> **For SGLang server, please read [SGLang-Omni README](https://github.com/sgl-project/sglang-omni/blob/main/sglang_omni/models/fishaudio_s2_pro/README.md).**\n>\n> **For vLLM Omni server, please read [vLLM-Omni Fish Speech S2 Pro Recipe](https://github.com/vllm-project/vllm-omni/blob/main/recipes/fishaudio/Fish-Speech-S2-Pro.md) and the [User Guide](https://github.com/vllm-project/vllm-omni/blob/main/docs/user_guide/examples/online_serving/text_to_speech.md#fish-speech-s2-pro).**\n\n### For LLM Agent\n\n```\nInstall and configure Fish-Audio S2 by following the instructions here: https://speech.fish.audio/install/\n```\n\n## Fish Audio S2 Pro\n**State-of-the-art multilingual text-to-speech (TTS) system, redefining the boundaries of voice generation.**\n\nFish Audio S2 Pro is the most advanced multimodal model developed by [Fish Audio](https://fish.audio/). Trained on over **10 million hours** of audio data covering more than **80 languages**, S2 Pro combines a **Dual-Autoregressive (Dual-AR)** architecture with reinforcement learning (RL) alignment to generate speech that is exceptionally natural, realistic, and emotionally rich, leading the competition among both open-source and closed-source systems.\n\nThe core strength of S2 Pro lies in its support for **sub-word level** fine-grained control of prosody and emotion using natural language tags (e.g., `[whisper]`, `[excited]`, `[angry]`), while natively supporting multi-speaker and multi-turn conversation generation.\n\nVisit the [Fish Audio website](https://fish.audio/) for a live playground, or read our [technical report](https://arxiv.org/abs/2603.08823) and [blog post](https://fish.audio/blog/fish-audio-open-sources-s2/) for more details.\n\n### Model Variants\n\n| Model | Size | Availability | Description |\n|------|------|-------------|-------------|\n| S2-Pro | 4B parameters | [HuggingFace](https://huggingface.co/fishaudio/s2-pro) | Full-featured flagship model with maximum quality and stability |\n\nMore details of the model can be found in the [technical report](https://arxiv.org/abs/2411.01156).\n\n## Benchmark Results\n\n| Benchmark | Fish Audio S2 |\n|------|------|\n| Seed-TTS Eval — WER (Chinese) | **0.54%** (best overall) |\n| Seed-TTS Eval — WER (English) | **0.99%** (best overall) |\n| Audio Turing Test (with instruction) | **0.515** posterior mean |\n| EmergentTTS-Eval — Win Rate | **81.88%** (highest overall) |\n| Fish Instruction Benchmark — TAR | **93.3%** |\n| Fish Instruction Benchmark — Quality | **4.51 / 5.0** |\n| Multilingual (MiniMax Testset) — Best WER | **11 of 24** languages |\n| Multilingual (MiniMax Testset) — Best SIM | **17 of 24** languages |\n\nOn Seed-TTS Eval, S2 achieves the lowest WER among all evaluated models including closed-source systems: Qwen3-TTS (0.77/1.24), MiniMax Speech-02 (0.99/1.90), Seed-TTS (1.12/2.25). On the Audio Turing Test, 0.515 surpasses Seed-TTS (0.417) by 24% and MiniMax-Speech (0.387) by 33%. On EmergentTTS-Eval, S2 achieves particularly strong results in paralinguistics (91.61% win rate), questions (84.41%), and syntactic complexity (83.39%).\n\n## Highlights\n\n<img src=\"./docs/assets/totalability.png\" width=200%>\n\n### Fine-Grained Inline Control via Natural Language\n\nS2 Pro brings unprecedented \"soul\" to speech. Using simple `[tag]` syntax, you can precisely embed emotional instructions at any position in the text.\n- **15,000+ Unique Tags Supported**: Not limited to fixed presets; S2 supports **free-form text descriptions**. Try `[whisper in small voice]`, `[professional broadcast tone]`, or `[pitch up]`.\n- **Rich Emotion Library**:\n  `[pause]` `[emphasis]` `[laughing]` `[inhale]` `[chuckle]` `[tsk]` `[singing]` `[excited]` `[laughing tone]` `[interrupting]` `[chuckling]` `[excited tone]` `[volume up]` `[echo]` `[angry]` `[low volume]` `[sigh]` `[low voice]` `[whisper]` `[screaming]` `[shouting]` `[loud]` `[surprised]` `[short pause]` `[exhale]` `[delight]` `[panting]` `[audience laughter]` `[with strong accent]` `[volume down]` `[clearing throat]` `[sad]` `[moaning]` `[shocked]`\n\n### Innovative Dual-Autoregressive (Dual-AR) Architecture\n\nS2 Pro adopts a master-slave Dual-AR architecture consisting of a decoder-only transformer and an RVQ audio codec (10 codebooks, ~21 Hz):\n\n- **Slow AR (4B parameters)**: Operates along the time axis, predicting the primary semantic codebook.\n- **Fast AR (400M parameters)**: Generates the remaining 9 residual codebooks at each time step, reconstructing exquisite acoustic details.\n\nThis asymmetric design achieves peak audio fidelity while significantly boosting inference speed.\n\n### Reinforcement Learning (RL) Alignment\n\nS2 Pro utilizes **Group Relative Policy Optimization (GRPO)** for post-training alignment. We use the same model suite for data cleaning and annotation directly as Reward Models, perfectly resolving the distribution mismatch between pre-training data and post-training objectives.\n- **Multi-Dimensional Reward Signals**: Comprehensively evaluates semantic accuracy, instruction adherence, acoustic preference scoring, and timbre similarity to ensure every second of generated speech feels intuitive to humans.\n\n### Extreme Streaming Performance (Powered by SGLang)\n\nAs the Dual-AR architecture is structurally isomorphic to standard LLMs, S2 Pro natively supports all SGLang inference acceleration features, including Continuous Batching, Paged KV Cache, CUDA Graph, and RadixAttention-based Prefix Caching.\n\n**Performance on a single NVIDIA H200 GPU:**\n- **Real-Time Factor (RTF)**: 0.195\n- **Time-to-First-Audio (TTFA)**: ~100 ms\n- **Extreme Throughput**: 3,000+ acoustic tokens/s while maintaining RTF < 0.5\n\n### Robust Multilingual Support\n\nS2 Pro supports over 80 languages without requiring phonemes or language-specific preprocessing:\n\n- **Tier 1**: Japanese (ja), English (en), Chinese (zh)\n- **Tier 2**: Korean (ko), Spanish (es), Portuguese (pt), Arabic (ar), Russian (ru), French (fr), German (de)\n- **Global Coverage**: sv, it, tr, no, nl, cy, eu, ca, da, gl, ta, hu, fi, pl, et, hi, la, ur, th, vi, jw, bn, yo, xsl, cs, sw, nn, he, ms, uk, id, kk, bg, lv, my, tl, sk, ne, fa, af, el, bo, hr, ro, sn, mi, yi, am, be, km, is, az, sd, br, sq, ps, mn, ht, ml, sr, sa, te, ka, bs, pa, lt, kn, si, hy, mr, as, gu, fo, etc.\n\n### Native Multi-Speaker Generation\n\n<img src=\"./docs/assets/chattemplate.png\" width=200%>\n\nFish Audio S2 allows users to upload reference audio containing multiple speakers, and the model processes each speaker's features via the `<|speaker:i|>` token. You can then control the model's performance via speaker ID tokens, enabling a single generation to include multiple speakers. There is no longer a need to upload separate reference audio for each individual speaker.\n\n### Multi-Turn Generation\n\nThanks to the expansion of the model context, our model can now leverage previous information to improve the expressiveness of subsequent generated content, thereby increasing the naturalness of the dialogue.\n\n### Rapid Voice Cloning\n\nFish Audio S2 supports accurate voice cloning using short reference samples (typically 10-30 seconds). The model captures timbre, speaking style, and emotional tendencies, producing realistic and consistent cloned voices without additional fine-tuning.\nFor SGLang Server usage, please refer to the [SGLang-Omni README](https://github.com/sgl-project/sglang-omni/blob/main/sglang_omni/models/fishaudio_s2_pro/README.md).\n\n---\n\n## Credits\n\n- [VITS2 (daniilrobnikov)](https://github.com/daniilrobnikov/vits2)\n- [Bert-VITS2](https://github.com/fishaudio/Bert-VITS2)\n- [GPT VITS](https://github.com/innnky/gpt-vits)\n- [MQTTS](https://github.com/b04901014/MQTTS)\n- [GPT Fast](https://github.com/pytorch-labs/gpt-fast)\n- [GPT-SoVITS](https://github.com/RVC-Boss/GPT-SoVITS)\n- [Qwen3](https://github.com/QwenLM/Qwen3)\n\n## Tech Report\n```bibtex\n@misc{fish-speech-v1.4,\n      title={Fish-Speech: Leveraging Large Language Models for Advanced Multilingual Text-to-Speech Synthesis},\n      author={Shijia Liao and Yuxuan Wang and Tianyu Li and Yifan Cheng and Ruoyi Zhang and Rongzhi Zhou and Yijin Xing},\n      year={2024},\n      eprint={2411.01156},\n      archivePrefix={arXiv},\n      primaryClass={cs.SD},\n      url={https://arxiv.org/abs/2411.01156},\n}\n\n@misc{liao2026fishaudios2technical,\n      title={Fish Audio S2 Technical Report}, \n      author={Shijia Liao and Yuxuan Wang and Songting Liu and Yifan Cheng and Ruoyi Zhang and Tianyu Li and Shidong Li and Yisheng Zheng and Xingwei Liu and Qingzheng Wang and Zhizhuo Zhou and Jiahua Liu and Xin Chen and Dawei Han},\n      year={2026},\n      eprint={2603.08823},\n      archivePrefix={arXiv},\n      primaryClass={cs.SD},\n      url={https://arxiv.org/abs/2603.08823}, \n}\n```\n","summary":"Fish Speech is an advanced open-source framework designed for high-quality, expressive text-to-speech synthesis and voice cloning. It leverages state-of-the-art multilingual models, such as the Fish Audio S2 Pro, to provide robust inference capabilities through command-line, WebUI, and server-based deployments. The project is specifically tailored for developers, researchers, and audio engineers who require highly realistic and adaptable speech generation for diverse applications.","description":"SOTA Open Source TTS","stars":30657,"language":"Python"},{"owner":"louislam","repo":"uptime-kuma","url":"https://github.com/louislam/uptime-kuma","readme":"<div align=\"center\" width=\"100%\">\n    <img src=\"./public/icon.svg\" width=\"128\" alt=\"Uptime Kuma Logo\" />\n</div>\n\n# Uptime Kuma\n\nUptime Kuma is an easy-to-use self-hosted monitoring tool.\n\n<a target=\"_blank\" href=\"https://github.com/louislam/uptime-kuma\"><img src=\"https://img.shields.io/github/stars/louislam/uptime-kuma?style=flat\" /></a> <a target=\"_blank\" href=\"https://hub.docker.com/r/louislam/uptime-kuma\"><img src=\"https://img.shields.io/docker/pulls/louislam/uptime-kuma\" /></a> <a target=\"_blank\" href=\"https://hub.docker.com/r/louislam/uptime-kuma\"><img src=\"https://img.shields.io/docker/v/louislam/uptime-kuma/2?label=docker%20image%20ver.\" /></a> <a target=\"_blank\" href=\"https://github.com/louislam/uptime-kuma\"><img src=\"https://img.shields.io/github/last-commit/louislam/uptime-kuma\" /></a> <a target=\"_blank\" href=\"https://opencollective.com/uptime-kuma\"><img src=\"https://opencollective.com/uptime-kuma/total/badge.svg?label=Open%20Collective%20Backers&color=brightgreen\" /></a>\n[![GitHub Sponsors](https://img.shields.io/github/sponsors/louislam?label=GitHub%20Sponsors)](https://github.com/sponsors/louislam) <a href=\"https://weblate.kuma.pet/projects/uptime-kuma/uptime-kuma/\">\n<img src=\"https://weblate.kuma.pet/widgets/uptime-kuma/-/svg-badge.svg\" alt=\"Translation status\" />\n</a>\n\n<img src=\"https://user-images.githubusercontent.com/1336778/212262296-e6205815-ad62-488c-83ec-a5b0d0689f7c.jpg\" width=\"700\" alt=\"Uptime Kuma Dashboard Screenshot\" />\n\n## 🥔 Live Demo\n\nTry it!\n\nDemo Server (Location: Frankfurt - Germany): <https://demo.kuma.pet/start-demo>\n\nIt is a temporary live demo, all data will be deleted after 10 minutes. Sponsored by [Uptime Kuma Sponsors](https://github.com/louislam/uptime-kuma#%EF%B8%8F-sponsors).\n\n## ⭐ Features\n\n- Monitoring uptime for HTTP(s) / TCP / HTTP(s) Keyword / HTTP(s) Json Query / Websocket / Ping / DNS Record / Push / Steam Game Server / Docker Containers\n- Fancy, Reactive, Fast UI/UX\n- Notifications via Telegram, Discord, Gotify, Slack, Pushover, Email (SMTP), and [90+ notification services, click here for the full list](https://github.com/louislam/uptime-kuma/tree/master/src/components/notifications)\n- 20-second intervals\n- [Multi Languages](https://github.com/louislam/uptime-kuma/tree/master/src/lang)\n- Multiple status pages\n- Map status pages to specific domains\n- Ping chart\n- Certificate info\n- Proxy support\n- 2FA support\n\n## 🔧 How to Install\n\n### 🐳 Docker Compose\n\n```bash\nmkdir uptime-kuma\ncd uptime-kuma\ncurl -o compose.yaml https://raw.githubusercontent.com/louislam/uptime-kuma/master/compose.yaml\ndocker compose up -d\n```\n\nUptime Kuma is now running on all network interfaces (e.g. http://localhost:3001 or http://your-ip:3001).\n\n> [!WARNING]\n> File Systems like **NFS** (Network File System) are **NOT** supported. Please map to a local directory or volume.\n\n### 🐳 Docker Command\n\n```bash\ndocker run -d --restart=always -p 3001:3001 -v uptime-kuma:/app/data --name uptime-kuma louislam/uptime-kuma:2\n```\n\nUptime Kuma is now running on all network interfaces (e.g. http://localhost:3001 or http://your-ip:3001).\n\nIf you want to limit exposure to localhost only:\n\n```bash\ndocker run ... -p 127.0.0.1:3001:3001 ...\n```\n\n### 💪🏻 Non-Docker\n\nRequirements:\n\n- Platform\n  - ✅ Major Linux distros such as Debian, Ubuntu, Fedora and ArchLinux etc.\n  - ✅ Windows 10 (x64), Windows Server 2012 R2 (x64) or higher\n  - ❌ FreeBSD / OpenBSD / NetBSD\n  - ❌ Replit / Heroku\n- [Node.js](https://nodejs.org/en/download/) >= 20.4\n- [Git](https://git-scm.com/downloads)\n- [pm2](https://pm2.keymetrics.io/) - For running Uptime Kuma in the background\n\n```bash\ngit clone https://github.com/louislam/uptime-kuma.git\ncd uptime-kuma\nnpm run setup\n\n# Option 1. Try it\nnode server/server.js\n\n# (Recommended) Option 2. Run in the background using PM2\n# Install PM2 if you don't have it:\nnpm install pm2 -g && pm2 install pm2-logrotate\n\n# Start Server\npm2 start server/server.js --name uptime-kuma\n```\n\nUptime Kuma is now running on all network interfaces (e.g. http://localhost:3001 or http://your-ip:3001).\n\nMore useful PM2 Commands\n\n```bash\n# If you want to see the current console output\npm2 monit\n\n# If you want to add it to startup\npm2 startup && pm2 save\n```\n\n### Advanced Installation\n\nIf you need more options or need to browse via a reverse proxy, please read:\n\n<https://github.com/louislam/uptime-kuma/wiki/%F0%9F%94%A7-How-to-Install>\n\n## 🆙 How to Update\n\nPlease read:\n\n<https://github.com/louislam/uptime-kuma/wiki/%F0%9F%86%99-How-to-Update>\n\n## 🆕 What's Next?\n\nI will assign requests/issues to the next milestone.\n\n<https://github.com/louislam/uptime-kuma/milestones>\n\n## ❤️ Sponsors\n\nThank you so much! (GitHub Sponsors will be updated manually. OpenCollective sponsors will be updated automatically, the list will be cached by GitHub though. It may need some time to be updated)\n\n<img src=\"https://uptime.kuma.pet/sponsors?v=6\" alt=\"Uptime Kuma Sponsors\" />\n\n## 🖼 More Screenshots\n\nLight Mode:\n\n<img src=\"https://uptime.kuma.pet/img/light.jpg\" width=\"512\" alt=\"Uptime Kuma Light Mode Screenshot of how the Dashboard looks\" />\n\nStatus Page:\n\n<img src=\"https://user-images.githubusercontent.com/1336778/134628766-a3fe0981-0926-4285-ab46-891a21c3e4cb.png\" width=\"512\" alt=\"Uptime Kuma Status Page Screenshot\" />\n\nSettings Page:\n\n<img src=\"https://louislam.net/uptimekuma/2.jpg\" width=\"400\" alt=\"Uptime Kuma Settings Page Screenshot\" />\n\nTelegram Notification Sample:\n\n<img src=\"https://louislam.net/uptimekuma/3.jpg\" width=\"400\" alt=\"Uptime Kuma Telegram Notification Sample Screenshot\" />\n\n## Motivation\n\n- I was looking for a self-hosted monitoring tool like \"Uptime Robot\", but it is hard to find a suitable one. One of the closest ones is statping. Unfortunately, it is not stable and no longer maintained.\n- Wanted to build a fancy UI.\n- Learn Vue 3 and vite.js.\n- Show the power of Bootstrap 5.\n- Try to use WebSocket with SPA instead of a REST API.\n- Deploy my first Docker image to Docker Hub.\n\nIf you love this project, please consider giving it a ⭐.\n\n## 🗣️ Discussion / Ask for Help\n\n⚠️ For any general or technical questions, please don't send me an email, as I am unable to provide support in that manner. I will not respond if you ask questions there.\n\nI recommend using Google, GitHub Issues, or Uptime Kuma's subreddit for finding answers to your question. If you cannot find the information you need, feel free to ask:\n\n- [GitHub Issues](https://github.com/louislam/uptime-kuma/issues)\n- [Subreddit (r/UptimeKuma)](https://www.reddit.com/r/UptimeKuma/)\n\nMy Reddit account: [u/louislamlam](https://reddit.com/u/louislamlam)\nYou can mention me if you ask a question on the subreddit.\n\n## Contributions\n\n### Create Pull Requests\n\nPull requests are awesome.\nTo keep reviews fast and effective, please make sure you’ve [read our pull request guidelines](https://github.com/louislam/uptime-kuma/blob/master/CONTRIBUTING.md#can-i-create-a-pull-request-for-uptime-kuma).\n\n### Test Pull Requests\n\nThere are a lot of pull requests right now, but I don't have time to test them all.\n\nIf you want to help, you can check this:\n<https://github.com/louislam/uptime-kuma/wiki/Test-Pull-Requests>\n\n### Test Beta Version\n\nCheck out the latest beta release here: <https://github.com/louislam/uptime-kuma/releases>\n\n### Bug Reports / Feature Requests\n\nIf you want to report a bug or request a new feature, feel free to open a [new issue](https://github.com/louislam/uptime-kuma/issues).\n\n### Translations\n\nIf you want to translate Uptime Kuma into your language, please visit [Weblate Readme](https://github.com/louislam/uptime-kuma/blob/master/src/lang/README.md).\n\n### Spelling & Grammar\n\nFeel free to correct the grammar in the documentation or code.\nMy mother language is not English and my grammar is not that great.\n","summary":"Uptime Kuma is a self-hosted, open-source monitoring tool designed to provide a fast and reactive interface for tracking service uptime. It supports a wide array of monitoring types, including HTTP(s), TCP, DNS, and Docker containers, while offering integration with over 90 notification services to keep users alerted. With its easy deployment options via Docker or Node.js, it is an ideal solution for system administrators, developers, and hobbyists looking to maintain reliable visibility over their infrastructure.","description":"A fancy self-hosted monitoring tool","stars":87617,"language":"JavaScript"},{"owner":"yamadashy","repo":"repomix","url":"https://github.com/yamadashy/repomix","readme":"<div align=\"center\" markdown=\"1\">\n   <sup>Special thanks to:</sup>\n   <br>\n   <br>\n   <a href=\"https://go.warp.dev/repomix\">\n      <img alt=\"Warp sponsorship\" width=\"400\" src=\"https://raw.githubu s](https://img.shields.io/coderabbit/prs/github/yamadashy/repomix?utm_source=oss&utm_medium=github&utm_campaign=yamadashy%2Frepomix&labelColor=171717&color=FF570A&link=https%3A%2F%2Fcoderabbit.ai&label=CodeRabbit+Reviews)](https://coderabbit.ai)\n[![Sponsors](https://img.shields.io/github/sponsors/yamadashy?logo=github)](https://github.com/sponsors/yamadashy)\n[![Discord](https://badgen.net/discord/online-members/wNYzTwZFku?icon=discord&label=discord)](https://discord.gg/wNYzTwZFku)\n\n[![DeepWiki](https://img.shields.io/badge/DeepWiki-yamadashy%2Frepomix-blue.svg?logo=data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACwAAAAyCAYAAAAnWDnqAAAAAXNSR0IArs4c6QAAA05JREFUaEPtmUtyEzEQhtWTQyQLHNak2AB7ZnyXZMEjXMGeK/AIi+QuHrMnbChYY7MIh8g01fJoopFb0uhhEqqcbWTp06/uv1saEDv4O3n3dV60RfP947Mm9/SQc0ICFQgzfc4CYZoTPAswgSJCCUJUnAAoRHOAUOcATwbmVLWdGoH//PB8mnKqScAhsD0kYP3j/Yt5LPQe2KvcXmGvRHcDnpxfL2zOYJ1mFwrryWTz0advv1Ut4CJgf5uhDuDj5eUcAUoahrdY/56ebRWeraTjMt/00Sh3UDtjgHtQNHwcRGOC98BJEAEymycmYcWwOprTgcB6VZ5JK5TAJ+fXGLBm3FDAmn6oPPjR4rKCAoJCal2eAiQp2x0vxTPB3ALO2CRkwmDy5WohzBDwSEFKRwPbknEggCPB/imwrycgxX2NzoMCHhPkDwqYMr9tRcP5qNrMZHkVnOjRMWwLCcr8ohBVb1OMjxLwGCvjTikrsBOiA6fNyCrm8V1rP93iVPpwaE+gO0SsWmPiXB+jikdf6SizrT5qKasx5j8ABbHpFTx+vFXp9EnYQmLx02h1QTTrl6eDqxLnGjporxl3NL3agEvXdT0WmEost648sQOYAeJS9Q7bfUVoMGnjo4AZdUMQku50McDcMWcBPvr0SzbTAFDfvJqwLzgxwATnCgnp4wDl6Aa+Ax283gghmj+vj7feE2KBBRMW3FzOpLOADl0Isb5587h/U4gGvkt5v60Z1VLG8BhYjbzRwyQZemwAd6cCR5/XFWLYZRIMpX39AR0tjaGGiGzLVyhse5C9RKC6ai42ppWPKiBagOvaYk8lO7DajerabOZP46Lby5wKjw1HCRx7p9sVMOWGzb/vA1hwiWc6jm3MvQDTogQkiqIhJV0nBQBTU+3okKCFDy9WwferkHjtxib7t3xIUQtHxnIwtx4mpg26/HfwVNVDb4oI9RHmx5WGelRVlrtiw43zboCLaxv46AZeB3IlTkwouebTr1y2NjSpHz68WNFjHvupy3q8TFn3Hos2IAk4Ju5dCo8B3wP7VPr/FGaKiG+T+v+TQqIrOqMTL1VdWV1DdmcbO8KXBz6esmYWYKPwDL5b5FA1a0hwapHiom0r/cKaoqr+27/XcrS5UwSMbQAAAABJRU5ErkJggg==)](https://deepwiki.com/yamadashy/repomix)\n<!-- DeepWiki badge generated by https://deepwiki.ryoppippi.com/ -->\n\n📦 Repomix is a powerful tool that packs your entire repository into a single, AI-friendly file.  \nIt is perfect for when you need to feed your codebase to Large Language Models (LLMs) or other AI tools like Claude,\nChatGPT, DeepSeek, Perplexity, Gemini, Gemma, Llama, Grok, and more.\n\nPlease consider sponsoring me.\n\n[![Sponsor](.github/assets/github-like-sponsor-button.svg)](https://github.com/sponsors/yamadashy)\n\n[![Sponsors](https://cdn.jsdelivr.net/gh/yamadashy/sponsor-list/sponsors/sponsors.png)](https://github.com/sponsors/yamadashy)\n\n## 🏆 Open Source Awards Nomination\n\nWe're honored! Repomix has been nominated for the **Powered by AI** category at the [JSNation Open Source Awards 2025](https://osawards.com/javascript/).\n\nThis wouldn't have been possible without all of you using and supporting Repomix. Thank you!\n\n## 🎉 New: Repomix Website & Discord Community!\n\n- Try Repomix in your browser at [repomix.com](https://repomix.com/)\n- Join our [Discord Server](https://discord.gg/wNYzTwZFku) for support and discussion\n\n**We look forward to seeing you there!**\n\n## 🌟 Features\n\n- **AI-Optimized**: Formats your codebase in a way that's easy for AI to understand and process.\n- **Token Counting**: Provides token counts for each file and the entire repository, useful for LLM context limits.\n- **Simple to Use**: You need just one command to pack your entire repository.\n- **Customizable**: Easily configure what to include or exclude.\n- **Git-Aware**: Automatically respects your `.gitignore`, `.ignore`, and `.repomixignore` files.\n- **Security-Focused**: Incorporates [Secretlint](https://github.com/secretlint/secretlint) for robust security checks to detect and prevent inclusion of sensitive information.\n- **Code Compression**: The `--compress` option uses [Tree-sitter](https://github.com/tree-sitter/tree-sitter) to extract key code elements, reducing token count while preserving structure.\n\n## 🚀 Quick Start\n\n### Using the CLI Tool `>_`\n\nYou can try Repomix instantly in your project directory without installation:\n\n```bash\nnpx repomix@latest\n```\n\nOr install globally for repeated use:\n\n```bash\n# Install using npm\nnpm install -g repomix\n\n# Alternatively using yarn\nyarn global add repomix\n\n# Alternatively using bun\nbun add -g repomix\n\n# Alternatively using Homebrew (macOS/Linux)\nbrew install repomix\n\n# Then run in any project directory\nrepomix\n```\n\nThat's it! Repomix will generate a `repomix-output.xml` file in your current directory, containing your entire\nrepository in an AI-friendly format.\n\nYou can then send this file to an AI assistant with a prompt like:\n\n```\nThis file contains all the files in the repository combined into one.\nI want to refactor the code, so please review it first.\n```\n\n![Repomix File Usage 1](website/client/src/public/images/docs/repomix-file-usage-1.png)\n\nWhen you propose specific changes, the AI might be able to generate code accordingly. With features like Claude's\nArtifacts, you could potentially output multiple files, allowing for the generation of multiple interdependent pieces of\ncode.\n\n![Repomix File Usage 2](website/client/src/public/images/docs/repomix-file-usage-2.png)\n\nHappy coding! 🚀\n\n### Using The Website 🌐\n\nWant to try it quickly? Visit the official website at [repomix.com](https://repomix.com). Simply enter your repository\nname, fill in any optional details, and click the **Pack** button to see your generated output.\n\n#### Available Options\n\nThe website offers several convenient features:\n\n- Customizable output format (XML, Markdown, or Plain Text)\n- Instant token count estimation\n- Much more!\n\n### Using The Browser Extension 🧩\n\nGet instant access to Repomix directly from any GitHub repository! Our Chrome extension adds a convenient \"Repomix\" button to GitHub repository pages.\n\n![Repomix Browser Extension](website/client/src/public/images/docs/browser-extension.png)\n\n#### Install\n- Chrome Extension: [Repomix - Chrome Web Store](https://chromewebstore.google.com/detail/repomix/fimfamikepjgchehkohedilpdigcpkoa)\n- Firefox Add-on: [Repomix - Firefox Add-ons](https://addons.mozilla.org/firefox/addon/repomix/)\n\n#### Features\n- One-click access to Repomix for any GitHub repository\n- More exciting features coming soon!\n\n### Using The VSCode Extension ⚡️\n\nA community-maintained VSCode extension called [Repomix Runner](https://marketplace.visualstudio.com/items?itemName=DorianMassoulier.repomix-runner) (created by [massdo](https://github.com/massdo)) lets you run Repomix right inside your editor with just a few clicks. Run it on any folder, manage outputs seamlessly, and control everything through VSCode's intuitive interface. \n\nWant your output as a file or just the content? Need automatic cleanup? This extension has you covered. Plus, it works smoothly with your existing repomix.config.json.\n\nTry it now on the [VSCode Marketplace](https://marketplace.visualstudio.com/items?itemName=DorianMassoulier.repomix-runner)!\nSource code is available on [GitHub](https://github.com/massdo/repomix-runner).\n\n### Alternative Tools 🛠️\n\nIf you're using Python, you might want to check out `Gitingest`, which is better suited for Python ecosystem and data\nscience workflows:\nhttps://github.com/cyclotruc/gitingest\n\n## 📊 Usage\n\nTo pack your entire repository:\n\n```bash\nrepomix\n```\n\nTo pack a specific directory:\n\n```bash\nrepomix path/to/directory\n```\n\nTo pack specific files or directories\nusing [glob patterns](https://github.com/mrmlnc/fast-glob?tab=readme-ov-file#pattern-syntax):\n\n```bash\nrepomix --include \"src/**/*.ts,**/*.md\"\n```\n\nTo exclude specific files or directories:\n\n```bash\nrepomix --ignore \"**/*.log,tmp/\"\n```\n\nTo pack a remote repository:\n\n```bash\nrepomix --remote https://github.com/yamadashy/repomix\n\n# You can also use GitHub shorthand:\nrepomix --remote yamadashy/repomix\n\n# You can specify the branch name, tag, or commit hash:\nrepomix --remote https://github.com/yamadashy/repomix --remote-branch main\n\n# Or use a specific commit hash:\nrepomix --remote https://github.com/yamadashy/repomix --remote-branch 935b695\n\n# Another convenient way is specifying the branch's URL\nrepomix --remote https://github.com/yamadashy/repomix/tree/main\n\n# Commit's URL is also supported\nrepomix --remote https://github.com/yamadashy/repomix/commit/836abcd7335137228ad77feb28655d85712680f1\n\n```\n\nTo pack files from a file list (pipe via stdin):\n\n```bash\n# Using find command\nfind src -name \"*.ts\" -type f | repomix --stdin\n\n# Using git to get tracked files\ngit ls-files \"*.ts\" | repomix --stdin\n\n# Using grep to find files containing specific content\ngrep -l \"TODO\" **/*.ts | repomix --stdin\n\n# Using ripgrep to find files with specific content\nrg -l \"TODO|FIXME\" --type ts | repomix --stdin\n\n# Using ripgrep (rg) to find files\nrg --files --type ts | repomix --stdin\n\n# Using sharkdp/fd to find files\nfd -e ts | repomix --stdin\n\n# Using fzf to select from all files\nfzf -m | repomix --stdin\n\n# Interactive file selection with fzf\nfind . -name \"*.ts\" -type f | fzf -m | repomix --stdin\n\n# Using ls with glob patterns\nls src/**/*.ts | repomix --stdin\n\n# From a file containing file paths\ncat file-list.txt | repomix --stdin\n\n# Direct input with echo\necho -e \"src/index.ts\\nsrc/utils.ts\" | repomix --stdin\n```\n\nThe `--stdin` option allows you to pipe a list of file paths to Repomix, giving you ultimate flexibility in selecting which files to pack.\n\nWhen using `--stdin`, the specified files are effectively added to the include patterns. This means that the normal include and ignore behavior still applies - files specified via stdin will still be excluded if they match ignore patterns.\n\n> [!NOTE]\n> When using `--stdin`, file paths can be relative or absolute, and Repomix will automatically handle path resolution and deduplication.\n\nTo include git logs in the output:\n\n```bash\n# Include git logs with default count (50 commits)\nrepomix --include-logs\n\n# Include git logs with specific commit count\nrepomix --include-logs --include-logs-count 10\n\n# Combine with diffs for comprehensive git context\nrepomix --include-logs --include-diffs\n```\n\nThe git logs include commit dates, messages, and file paths for each commit, providing valuable context for AI analysis of code evolution and development patterns.\n\nTo compress the output:\n\n```bash\nrepomix --compress\n\n# You can also use it with remote repositories:\nrepomix --remote yamadashy/repomix --compress\n```\n\nTo initialize a new configuration file (`repomix.config.json`):\n\n```bash\nrepomix --init\n```\n\nOnce you have generated the packed file, you can use it with Generative AI tools like ChatGPT, DeepSeek, Perplexity, Gemini, Gemma, Llama, Grok, and more.\n\n### Docker Usage 🐳\n\nYou can also run Repomix using Docker.  \nThis is useful if you want to run Repomix in an isolated environment or prefer using containers.\n\nBasic usage (current directory):\n\n```bash\ndocker run -v .:/app -it --rm ghcr.io/yamadashy/repomix\n```\n\nTo pack a specific directory:\n\n```bash\ndocker run -v .:/app -it --rm ghcr.io/yamadashy/repomix path/to/directory\n```\n\nProcess a remote repository and output to a `output` directory:\n\n```bash\ndocker run -v ./output:/app -it --rm ghcr.io/yamadashy/repomix --remote https://github.com/yamadashy/repomix\n```\n\n### Prompt Examples\n\nOnce you have generated the packed file with Repomix, you can use it with AI tools like ChatGPT, DeepSeek, Perplexity, Gemini, Gemma, Llama, Grok, and more.\nHere are some example prompts to get you started:\n\n#### Code Review and Refactoring\n\nFor a comprehensive code review and refactoring suggestions:\n\n```\nThis file contains my entire codebase. Please review the overall structure and suggest any improvements or refactoring opportunities, focusing on maintainability and scalability.\n```\n\n#### Documentation Generation\n\nTo generate project documentation:\n\n```\nBased on the codebase in this file, please generate a detailed README.md that includes an overview of the project, its main features, setup instructions, and usage examples.\n```\n\n#### Test Case Generation\n\nFor generating test cases:\n\n```\nAnalyze the code in this file and suggest a comprehensive set of unit tests for the main functions and classes. Include edge cases and potential error scenarios.\n```\n\n#### Code Quality Assessment\n\nEvaluate code quality and adherence to best practices:\n\n```\nReview the codebase for adherence to coding best practices and industry standards. Identify areas where the code could be improved in terms of readability, maintainability, and efficiency. Suggest specific changes to align the code with best practices.\n```\n\n#### Library Overview\n\nGet a high-level understanding of the library\n\n```\nThis file contains the entire codebase of library. Please provide a comprehensive overview of the library, including its main purpose, key features, and overall architecture.\n```\n\nFeel free to modify these prompts based on your specific needs and the capabilities of the AI tool you're using.\n\n### Community Discussion\n\nCheck out our [community discussion](https://github.com/yamadashy/repomix/discussions/154) where users share:\n\n- Which AI tools they're using with Repomix\n- Effective prompts they've discovered\n- How Repomix has helped them\n- Tips and tricks for getting the most out of AI code analysis\n\nFeel free to join the discussion and share your own experiences! Your insights could help others make better use of\nRepomix.\n\n### Output File Format\n\nRepomix generates a single file with clear separators between different parts of your codebase.  \nTo enhance AI comprehension, the output file begins with an AI-oriented explanation, making it easier for AI models to\nunderstand the context and structure of the packed repository.\n\n#### XML Format (default)\n\nThe XML format structures the content in a hierarchical manner:\n\n```xml\nThis file is a merged representation of the entire codebase, combining all repository files into a single document.\n\n<file_summary>\n  (Metadata and usage AI instructions)\n</file_summary>\n\n<directory_structure>\nsrc/\ncli/\ncliOutput.ts\nindex.ts\n\n(...remaining directories)\n</directory_structure>\n\n<files>\n<file path=\"src/index.js\">\n  // File contents here\n</file>\n\n(...remaining files)\n</files>\n\n<instruction>\n(Custom instructions from `output.instructionFilePath`)\n</instruction>\n```\n\nFor those interested in the potential of XML tags in AI contexts:  \nhttps://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/use-xml-tags\n\n> When your prompts involve multiple components like context, instructions, and examples, XML tags can be a\n> game-changer. They help Claude parse your prompts more accurately, leading to higher-quality outputs.\n\nThis means that the XML output from Repomix is not just a different format, but potentially a more effective way to feed\nyour codebase into AI systems for analysis, code review, or other tasks.\n\n#### Markdown Format\n\nTo generate output in Markdown format, use the `--style markdown` option:\n\n```bash\nrepomix --style markdown\n```\n\nThe Markdown format structures the content in a hierarchical manner:\n\n````markdown\nThis file is a merged representation of the entire codebase, combining all repository files into a single document.\n\n# File Summary\n\n(Metadata and usage AI instructions)\n\n# Repository Structure\n\n```\nsrc/\n  cli/\n    cliOutput.ts\n    index.ts\n```\n\n(...remaining directories)\n\n# Repository Files\n\n## File: src/index.js\n\n```\n// File contents here\n```\n\n(...remaining files)\n\n# Instruction\n\n(Custom instructions from `output.instructionFilePath`)\n````\n\nThis format provides a clean, readable structure that is both human-friendly and easily parseable by AI systems.\n\n#### JSON Format\n\nTo generate output in JSON format, use the `--style json` option:\n\n```bash\nrepomix --style json\n```\n\nThe JSON format structures the content as a hierarchical JSON object with camelCase property names:\n\n```json\n{\n  \"fileSummary\": {\n    \"generationHeader\": \"This file is a merged representation of the entire codebase, combined into a single document by Repomix.\",\n    \"purpose\": \"This file contains a packed representation of the entire repository's contents...\",\n    \"fileFormat\": \"The content is organized as follows...\",\n    \"usageGuidelines\": \"- This file should be treated as read-only...\",\n    \"notes\": \"- Some files may have been excluded based on .gitignore, .ignore, and .repomixignore rules...\"\n  },\n  \"userProvidedHeader\": \"Custom header text if specified\",\n  \"directoryStructure\": \"src/\\n  cli/\\n    cliOutput.ts\\n    index.ts\\n  config/\\n    configLoader.ts\",\n  \"files\": {\n    \"src/index.js\": \"// File contents here\",\n    \"src/utils.js\": \"// File contents here\"\n  },\n  \"instruction\": \"Custom instructions from instructionFilePath\"\n}\n```\n\nThis format is ideal for:\n- **Programmatic processing**: Easy to parse and manipulate with JSON libraries\n- **API integration**: Direct consumption by web services and applications  \n- **AI tool compatibility**: Structured format for machine learning and AI systems\n- **Data analysis**: Straightforward extraction of specific information using tools like `jq`\n\n##### Working with JSON Output Using `jq`\n\nThe JSON format makes it easy to extract specific information programmatically:\n\n```bash\n# List all file paths\ncat repomix-output.json | jq -r '.files | keys[]'\n\n# Count total number of files\ncat repomix-output.json | jq '.files | keys | length'\n\n# Extract specific file content\ncat repomix-output.json | jq -r '.files[\"README.md\"]'\ncat repomix-output.json | jq -r '.files[\"src/index.js\"]'\n\n# Find files by extension\ncat repomix-output.json | jq -r '.files | keys[] | select(endswith(\".ts\"))'\n\n# Get files containing specific text\ncat repomix-output.json | jq -r '.files | to_entries[] | select(.value | contains(\"function\")) | .key'\n\n# Extract directory structure\ncat repomix-output.json | jq -r '.directoryStructure'\n\n# Get file summary information\ncat repomix-output.json | jq '.fileSummary.purpose'\ncat repomix-output.json | jq -r '.fileSummary.generationHeader'\n\n# Extract user-provided header (if exists)\ncat repomix-output.json | jq -r '.userProvidedHeader // \"No header provided\"'\n\n# Create a file list with sizes\ncat repomix-output.json | jq -r '.files | to_entries[] | \"\\(.key): \\(.value | length) characters\"'\n```\n\n#### Plain Text Format\n\nTo generate output in plain text format, use the `--style plain` option:\n\n```bash\nrepomix --style plain\n```\n\n```text\nThis file is a merged representation of the entire codebase, combining all repository files into a single document.\n\n================================================================\nFile Summary\n================================================================\n(Metadata and usage AI instructions)\n\n================================================================\nDirectory Structure\n================================================================\nsrc/\n  cli/\n    cliOutput.ts\n    index.ts\n  config/\n    configLoader.ts\n\n(...remaining directories)\n\n================================================================\nFiles\n================================================================\n\n================\nFile: src/index.js\n================\n// File contents here\n\n================\nFile: src/utils.js\n================\n// File contents here\n\n(...remaining files)\n\n================================================================\nInstruction\n================================================================\n(Custom instructions from `output.instructionFilePath`)\n```\n\n### Command Line Options\n\n#### Basic Options\n- `-v, --version`: Show version information and exit\n\n#### CLI Input/Output Options\n\n| Option | Description |\n|--------|-------------|\n| `--verbose` | Enable detailed debug logging (shows file processing, token counts, and configuration details) |\n| `--quiet` | Suppress all console output except errors (useful for scripting) |\n| `--stdout` | Write packed output directly to stdout instead of a file (suppresses all logging) |\n| `--stdin` | Read file paths from stdin, one per line (specified files are processed directly) |\n| `--copy` | Copy the generated output to system clipboard after processing |\n| `--token-count-tree [threshold]` | Show file tree with token counts; optional threshold to show only files with ≥N tokens (e.g., `--token-count-tree 100`) |\n| `--top-files-len <number>` | Number of largest files to show in summary (default: `5`) |\n\n#### Repomix Output Options\n\n| Option | Description |\n|--------|-------------|\n| `-o, --output <file>` | Output file path (default: `repomix-output.xml`, use `\"-\"` for stdout) |\n| `--style <style>` | Output format: `xml`, `markdown`, `json`, or `plain` (default: `xml`) |\n| `--parsable-style` | Escape special characters to ensure valid XML/Markdown (needed when output contains code that breaks formatting) |\n| `--compress` | Extract essential code structure (classes, functions, interfaces) using Tree-sitter parsing |\n| `--output-show-line-numbers` | Prefix each line with its line number in the output |\n| `--no-file-summary` | Omit the file summary section from output |\n| `--no-directory-structure` | Omit the directory tree visualization from output |\n| `--no-files` | Generate metadata only without file contents (useful for repository analysis) |\n| `--remove-comments` | Strip all code comments before packing |\n| `--remove-empty-lines` | Remove blank lines from all files |\n| `--truncate-base64` | Truncate long base64 data strings to reduce output size |\n| `--header-text <text>` | Custom text to include at the beginning of the output |\n| `--instruction-file-path <path>` | Path to file containing custom instructions to include in output |\n| `--split-output <size>` | Split output into multiple numbered files (e.g., `repomix-output.1.xml`); size like `500kb`, `2mb`, or `1.5mb` |\n| `--include-empty-directories` | Include folders with no files in directory structure |\n| `--include-full-directory-structure` | Show complete directory tree in output, including files not matched by `--include` patterns |\n| `--no-git-sort-by-changes` | Don't sort files by git change frequency (default: most changed files first) |\n| `--include-diffs` | Add git diff section showing working tree and staged changes |\n| `--include-logs` | Add git commit history with messages and changed files |\n| `--include-logs-count <count>` | Number of recent commits to include with `--include-logs` (default: `50`) |\n\n#### File Selection Options\n\n| Option | Description |\n|--------|-------------|\n| `--include <patterns>` | Include only files matching these glob patterns (comma-separated, e.g., `\"src/**/*.js,*.md\"`) |\n| `-i, --ignore <patterns>` | Additional patterns to exclude (comma-separated, e.g., `\"*.test.js,docs/**\"`) |\n| `--no-gitignore` | Don't use `.gitignore` rules for filtering files |\n| `--no-dot-ignore` | Don't use `.ignore` rules for filtering files |\n| `--no-default-patterns` | Don't apply built-in ignore patterns (`node_modules`, `.git`, build dirs, etc.) |\n\n#### Remote Repository Options\n\n| Option | Description |\n|--------|-------------|\n| `--remote <url>` | Clone and pack a remote repository (GitHub URL or `user/repo` format) |\n| `--remote-branch <name>` | Specific branch, tag, or commit to use (default: repository's default branch) |\n| `--remote-trust-config` | Trust and load config files from remote repositories (disabled by default for security) |\n\n#### Configuration Options\n\n| Option | Description |\n|--------|-------------|\n| `-c, --config <path>` | Use custom config file instead of `repomix.config.json` |\n| `--init` | Create a new `repomix.config.json` file with defaults |\n| `--global` | With `--init`, create config in home directory instead of current directory |\n\n#### Security Options\n- `--no-security-check`: Skip scanning for sensitive data like API keys and passwords\n\n#### Token Count Options\n- `--token-count-encoding <encoding>`: Tokenizer model for counting: o200k_base (GPT-4o), cl100k_base (GPT-3.5/4), etc. (default: o200k_base)\n\n#### MCP\n- `--mcp`: Run as Model Context Protocol server for AI tool integration\n\n#### Agent Skills Generation\n\n| Option | Description |\n|--------|-------------|\n| `--skill-generate [name]` | Generate Claude Agent Skills format output to `.claude/skills/<name>/` directory (name auto-generated if omitted) |\n| `--skill-output <path>` | Specify skill output directory path directly (skips location prompt) |\n| `-f, --force` | Skip all confirmation prompts (e.g., skill directory overwrite) |\n\n#### Examples\n\n```bash\n# Basic usage\nrepomix\n\n# Custom output\nrepomix -o output.xml --style xml\n\n# Output to stdout\nrepomix --stdout > custom-output.txt\n\n# Send output to stdout, then pipe into another command (for example, simonw/llm)\nrepomix --stdout | llm \"Please explain what this code does.\"\n\n# Custom output with compression\nrepomix --compress\n\n# Process specific files\nrepomix --include \"src/**/*.ts\" --ignore \"**/*.test.ts\"\n\n# Split output into multiple files (max size per part)\nrepomix --split-output 20mb\n\n# Remote repository with branch\nrepomix --remote https://github.com/user/repo/tree/main\n\n# Remote repository with commit\nrepomix --remote https://github.com/user/repo/commit/836abcd7335137228ad77feb28655d85712680f1\n\n# Remote repository with shorthand\nrepomix --remote user/repo\n```\n\n### Updating Repomix\n\nTo update a globally installed Repomix:\n\n```bash\n# Using npm\nnpm update -g repomix\n\n# Using yarn\nyarn global upgrade repomix\n\n# Using bun\nbun update -g repomix\n```\n\nUsing `npx repomix` is generally more convenient as it always uses the latest version.\n\n### Remote Repository Processing\n\nRepomix supports processing remote Git repositories without the need for manual cloning. This feature allows you to\nquickly analyze any public Git repository with a single command.\n\nTo process a remote repository, use the `--remote` option followed by the repository URL:\n\n```bash\nrepomix --remote https://github.com/yamadashy/repomix\n```\n\nYou can also use GitHub's shorthand format:\n\n```bash\nrepomix --remote yamadashy/repomix\n```\n\nYou can specify the branch name, tag, or commit hash:\n\n```bash\n# Using --remote-branch option\nrepomix --remote https://github.com/yamadashy/repomix --remote-branch main\n\n# Using branch's URL\nrepomix --remote https://github.com/yamadashy/repomix/tree/main\n```\n\nOr use a specific commit hash:\n\n```bash\n# Using --remote-branch option\nrepomix --remote https://github.com/yamadashy/repomix --remote-branch 935b695\n\n# Using commit's URL\nrepomix --remote https://github.com/yamadashy/repomix/commit/836abcd7335137228ad77feb28655d85712680f1\n```\n\n> [!NOTE]\n> For security, config files (`repomix.config.*`) in remote repositories are not loaded by default. This prevents untrusted repositories from executing code via config files. Your global config and CLI options are still applied. To trust a remote repository's config, use `--remote-trust-config` or set `REPOMIX_REMOTE_TRUST_CONFIG=true`.\n>\n> When using `--config` with `--remote`, an absolute path is required (e.g., `--config /home/user/repomix.config.json`).\n\n### Code Compression\n\nThe `--compress` option utilizes [Tree-sitter](https://github.com/tree-sitter/tree-sitter) to perform intelligent code extraction, focusing on essential function and class signatures while removing implementation details. This can help reduce token count while retaining important structural information.\n\n```bash\nrepomix --compress\n```\n\nFor example, this code:\n\n```typescript\nimport { ShoppingItem } from './shopping-item';\n\n/**\n * Calculate the total price of shopping items\n */\nconst calculateTotal = (\n  items: ShoppingItem[]\n) => {\n  let total = 0;\n  for (const item of items) {\n    total += item.price * item.quantity;\n  }\n  return total;\n}\n\n// Shopping item interface\ninterface Item {\n  name: string;\n  price: number;\n  quantity: number;\n}\n```\n\nWill be compressed to:\n\n```typescript\nimport { ShoppingItem } from './shopping-item';\n⋮----\n/**\n * Calculate the total price of shopping items\n */\nconst calculateTotal = (\n  items: ShoppingItem[]\n) => {\n⋮----\n// Shopping item interface\ninterface Item {\n  name: string;\n  price: number;\n  quantity: number;\n}\n```\n\n> [!NOTE]\n> This is an experimental feature that we'll be actively improving based on user feedback and real-world usage\n\n### Token Count Optimization\n\nUnderstanding your codebase's token distribution is crucial for optimizing AI interactions. Use the `--token-count-tree` option to visualize token usage across your project:\n\n```bash\nrepomix --token-count-tree\n```\n\nThis displays a hierarchical view of your codebase with token counts:\n\n```\n🔢 Token Count Tree:\n────────────────────\n└── src/ (70,925 tokens)\n    ├── cli/ (12,714 tokens)\n    │   ├── actions/ (7,546 tokens)\n    │   └── reporters/ (990 tokens)\n    └── core/ (41,600 tokens)\n        ├── file/ (10,098 tokens)\n        └── output/ (5,808 tokens)\n```\n\nYou can also set a minimum token threshold to focus on larger files:\n\n```bash\nrepomix --token-count-tree 1000  # Only show files/directories with 1000+ tokens\n```\n\nThis helps you:\n- **Identify token-heavy files** that might exceed AI context limits\n- **Optimize file selection** using `--include` and `--ignore` patterns  \n- **Plan compression strategies** by targeting the largest contributors\n- **Balance content vs. context** when preparing code for AI analysis\n\n### Splitting Output for Large Codebases\n\nWhen working with large codebases, the packed output may exceed file size limits imposed by some AI tools (e.g., Google AI Studio's 1MB limit). Use `--split-output` to automatically split the output into multiple files:\n\n```bash\nrepomix --split-output 1mb\n```\n\nThis generates numbered files like:\n- `repomix-output.1.xml`\n- `repomix-output.2.xml`\n- `repomix-output.3.xml`\n\nSize can be specified with units: `500kb`, `1mb`, `2mb`, `1.5mb`, etc. Decimal values are supported.\n\n> [!NOTE]\n> Files are grouped by top-level directory to maintain context. A single file or directory will never be split across multiple output files.\n\n### MCP Server Integration\n\nRepomix supports the [Model Context Protocol (MCP)](https://modelcontextprotocol.io), allowing AI assistants to directly interact with your codebase. When run as an MCP server, Repomix provides tools that enable AI assistants to package local or remote repositories for analysis without requiring manual file preparation.\n\n```bash\nrepomix --mcp\n```\n\n#### Configuring MCP Servers\n\nTo use Repomix as an MCP server with AI assistants like Claude, you need to configure the MCP settings:\n\n**For VS Code:**\n\nYou can install the Repomix MCP server in VS Code using one of these methods:\n\n1. **Using the Install Badge:**\n\n  [![Install in VS Code](https://img.shields.io/badge/VS_Code-Install_Server-0098FF?style=flat-square&logo=visualstudiocode&logoColor=white)](https://insiders.vscode.dev/redirect/mcp/install?name=repomix&config=%7B%22command%22%3A%22npx%22%2C%22args%22%3A%5B%22-y%22%2C%22repomix%22%2C%22--mcp%22%5D%7D)\n  [![Install in VS Code Insiders](https://img.shields.io/badge/VS_Code_Insiders-Install_Server-24bfa5?style=flat-square&logo=visualstudiocode&logoColor=white)](https://insiders.vscode.dev/redirect/mcp/install?name=repomix&config=%7B%22command%22%3A%22npx%22%2C%22args%22%3A%5B%22-y%22%2C%22repomix%22%2C%22--mcp%22%5D%7D&quality=insiders)\n\n2. **Using the Command Line:**\n\n  ```bash\n  code --add-mcp '{\"name\":\"repomix\",\"command\":\"npx\",\"args\":[\"-y\",\"repomix\",\"--mcp\"]}'\n  ```\n\n  For VS Code Insiders:\n  ```bash\n  code-insiders --add-mcp '{\"name\":\"repomix\",\"command\":\"npx\",\"args\":[\"-y\",\"repomix\",\"--mcp\"]}'\n  ```\n\n**For Cline (VS Code extension):**\n\nEdit the `cline_mcp_settings.json` file:\n```json\n{\n  \"mcpServers\": {\n    \"repomix\": {\n      \"command\": \"npx\",\n      \"args\": [\n        \"-y\",\n        \"repomix\",\n        \"--mcp\"\n      ]\n    }\n  }\n}\n```\n\n**For Cursor:**\n\nIn Cursor, add a new MCP server from `Cursor Settings` > `MCP` > `+ Add new global MCP server` with a configuration similar to Cline.\n\n**For Claude Desktop:**\n\nEdit the `claude_desktop_config.json` file with similar configuration to Cline's config.\n\n**For Claude Code:**\n\nTo configure Repomix as an MCP server in [Claude Code](https://docs.anthropic.com/en/docs/claude-code/overview), use the following command:\n\n```bash\nclaude mcp add repomix -- npx -y repomix --mcp\n```\n\nAlternatively, you can use the official Repomix plugins (see [Claude Code Plugins](#claude-code-plugins) section below).\n\n**Using Docker instead of npx:**\n\nYou can use Docker as an alternative to npx for running Repomix as an MCP server:\n\n```json\n{\n  \"mcpServers\": {\n    \"repomix-docker\": {\n      \"command\": \"docker\",\n      \"args\": [\n        \"run\",\n        \"-i\",\n        \"--rm\",\n        \"ghcr.io/yamadashy/repomix\",\n        \"--mcp\"\n      ]\n    }\n  }\n}\n```\n\nOnce configured, your AI assistant can directly use Repomix's capabilities to analyze codebases without manual file preparation, making code analysis workflows more efficient.\n\n#### Available MCP Tools\n\nWhen running as an MCP server, Repomix provides the following tools:\n\n1. **pack_codebase**: Package a local code directory into a consolidated XML file for AI analysis\n  - Parameters:\n    - `directory`: Absolute path to the directory to pack\n    - `compress`: (Optional, default: false) Enable Tree-sitter compression to extract essential code signatures and structure while removing implementation details. Reduces token usage by ~70% while preserving semantic meaning. Generally not needed since grep_repomix_output allows incremental content retrieval. Use only when you specifically need the entire codebase content for large repositories.\n    - `includePatterns`: (Optional) Specify files to include using fast-glob patterns. Multiple patterns can be comma-separated (e.g., \"**/*.{js,ts}\", \"src/**,docs/**\"). Only matching files will be processed.\n    - `ignorePatterns`: (Optional) Specify additional files to exclude using fast-glob patterns. Multiple patterns can be comma-separated (e.g., \"test/**,*.spec.js\", \"node_modules/**,dist/**\"). These patterns supplement .gitignore, .ignore, and built-in exclusions.\n    - `topFilesLength`: (Optional, default: 10) Number of largest files by size to display in the metrics summary for codebase analysis.\n\n2. **attach_packed_output**: Attach an existing Repomix packed output file for AI analysis\n  - Parameters:\n    - `path`: Path to a directory containing repomix-output.xml or direct path to a packed repository XML file\n    - `topFilesLength`: (Optional, default: 10) Number of largest files by size to display in the metrics summary\n  - Features:\n    - Accepts either a directory containing a repomix-output.xml file or a direct path to an XML file\n    - Registers the file with the MCP server and returns the same structure as the pack_codebase tool\n    - Provides secure access to existing packed outputs without requiring re-processing\n    - Useful for working with previously generated packed repositories\n\n3. **pack_remote_repository**: Fetch, clone, and package a GitHub repository into a consolidated XML file for AI analysis\n  - Parameters:\n    - `remote`: GitHub repository URL or user/repo format (e.g., \"yamadashy/repomix\", \"https://github.com/user/repo\", or \"https://github.com/user/repo/tree/branch\")\n    - `compress`: (Optional, default: false) Enable Tree-sitter compression to extract essential code signatures and structure while removing implementation details. Reduces token usage by ~70% while preserving semantic meaning. Generally not needed since grep_repomix_output allows incremental content retrieval. Use only when you specifically need the entire codebase content for large repositories.\n    - `includePatterns`: (Optional) Specify files to include using fast-glob patterns. Multiple patterns can be comma-separated (e.g., \"**/*.{js,ts}\", \"src/**,docs/**\"). Only matching files will be processed.\n    - `ignorePatterns`: (Optional) Specify additional files to exclude using fast-glob patterns. Multiple patterns can be comma-separated (e.g., \"test/**,*.spec.js\", \"node_modules/**,dist/**\"). These patterns supplement .gitignore, .ignore, and built-in exclusions.\n    - `topFilesLength`: (Optional, default: 10) Number of largest files by size to display in the metrics summary for codebase analysis.\n\n4. **read_repomix_output**: Read the contents of a Repomix-generated output file. Supports partial reading with line range specification for large files.\n  - Parameters:\n    - `outputId`: ID of the Repomix output file to read\n    - `startLine`: (Optional) Starting line number (1-based, inclusive). If not specified, reads from beginning.\n    - `endLine`: (Optional) Ending line number (1-based, inclusive). If not specified, reads to end.\n  - Features:\n    - Specifically designed for web-based environments or sandboxed applications\n    - Retrieves the content of previously generated outputs using their ID\n    - Provides secure access to packed codebase without requiring file system access\n    - Supports partial reading for large files\n\n5. **grep_repomix_output**: Search for patterns in a Repomix output file using grep-like functionality with JavaScript RegExp syntax\n  - Parameters:\n    - `outputId`: ID of the Repomix output file to search\n    - `pattern`: Search pattern (JavaScript RegExp regular expression syntax)\n    - `contextLines`: (Optional, default: 0) Number of context lines to show before and after each match. Overridden by beforeLines/afterLines if specified.\n    - `beforeLines`: (Optional) Number of context lines to show before each match (like grep -B). Takes precedence over contextLines.\n    - `afterLines`: (Optional) Number of context lines to show after each match (like grep -A). Takes precedence over contextLines.\n    - `ignoreCase`: (Optional, default: false) Perform case-insensitive matching\n  - Features:\n    - Uses JavaScript RegExp syntax for powerful pattern matching\n    - Supports context lines for better understanding of matches\n    - Allows separate control of before/after context lines\n    - Case-sensitive and case-insensitive search options\n\n6. **file_system_read_file**: Read a file from the local file system using an absolute path. Includes built-in security validation to detect and prevent access to files containing sensitive information.\n  - Parameters:\n    - `path`: Absolute path to the file to read\n  - Security features:\n    - Implements security validation using [Secretlint](https://github.com/secretlint/secretlint)\n    - Prevents access to files containing sensitive information (API keys, passwords, secrets)\n    - Validates absolute paths to prevent directory traversal attacks\n\n7. **file_system_read_directory**: List the contents of a directory using an absolute path. Returns a formatted list showing files and subdirectories with clear indicators.\n  - Parameters:\n    - `path`: Absolute path to the directory to list\n  - Features:\n    - Shows files and directories with clear indicators (`[FILE]` or `[DIR]`)\n    - Provides safe directory traversal with proper error handling\n    - Validates paths and ensures they are absolute\n    - Useful for exploring project structure and understanding codebase organization\n\n### Claude Code Plugins\n\nRepomix provides official plugins for [Claude Code](https://docs.anthropic.com/en/docs/claude-code/overview) that integrate seamlessly with the AI-powered development environment.\n\n#### Installation\n\n**1. Add the Repomix plugin marketplace:**\n\n```text\n/plugin marketplace add yamadashy/repomix\n```\n\n**2. Install plugins:**\n\n```text\n# Install MCP server plugin (recommended foundation)\n/plugin install repomix-mcp@repomix\n\n# Install commands plugin (extends functionality)\n/plugin install repomix-commands@repomix\n\n# Install repository explorer plugin (AI-powered analysis)\n/plugin install repomix-explorer@repomix\n```\n\n**Note**: The `repomix-mcp` plugin is recommended as a foundation. The `repomix-commands` plugin provides convenient slash commands, while `repomix-explorer` adds AI-powered analysis capabilities. While you can install them independently, using all three provides the most comprehensive experience.\n\n**Alternatively, use the interactive plugin installer:**\n\n```text\n/plugin\n```\n\nThis will open an interactive interface where you can browse and install available plugins.\n\n#### Available Plugins\n\n**1. repomix-mcp** (MCP Server Plugin)\n\nFoundation plugin that provides AI-powered codebase analysis through MCP server integration.\n\n**Features:**\n- Pack local and remote repositories\n- Search through packed outputs\n- Read files with built-in security scanning (Secretlint)\n- Automatic Tree-sitter compression (~70% token reduction)\n\n**2. repomix-commands** (Slash Commands Plugin)\n\nProvides convenient slash commands for quick operations with natural language support.\n\n**Available Commands:**\n- `/repomix-commands:pack-local` - Pack local codebase with various options\n- `/repomix-commands:pack-remote` - Pack and analyze remote GitHub repositories\n\n**Example usage:**\n```text\n/repomix-commands:pack-local\nPack this project as markdown with compression\n\n/repo
