ap.","stars":481,"language":"Python"},{"owner":"Dispatcharr","repo":"Dispatcharr","url":"https://github.com/Dispatcharr/Dispatcharr","readme":"# ЁЯОм Dispatcharr тАФ Your Ultimate IPTV & Stream Management Companion\n\n<p align=\"center\">\n  <img src=\"https://github.com/Dispatcharr/Dispatcharr/blob/main/frontend/src/images/logo.png?raw=true\" height=\"200\" alt=\"Dispatcharr Logo\" />\n</p>\n\n---\n\n## ЁЯУЦ What is Dispatcharr?\n\nDispatcharr (pronounced like \"dispatcher\") is an **open-source powerhouse** for managing IPTV streams, EPG data, and VOD content with elegance and control.\\\nBorn from necessity and built with passion, it started as a personal project by **[OkinawaBoss](https://github.com/OkinawaBoss)** and evolved with contributions from legends like **[dekzter](https://github.com/dekzter)**, **[SergeantPanda](https://github.com/SergeantPanda)** and **Bucatini**.\n\n> Think of Dispatcharr as the \\*arr family's IPTV cousin тАФ simple, smart, and designed for streamers who want reliability and flexibility.\n\n---\n\n## ЁЯОп What Can I Do With Dispatcharr?\n\nDispatcharr empowers you with complete IPTV control. Here are some real-world scenarios:\n\nЁЯТб **Consolidate Multiple IPTV Sources**\\\nCombine streams from multiple providers into a single interface. Manage, filter, and organize thousands of channels with ease.\n\nЁЯУ║ **Integrate with Media Centers**\\\nUse HDHomeRun emulation to add virtual tuners to **Plex**, **Emby**, or **Jellyfin**. They'll discover Dispatcharr as a live TV source and can record programs directly to their own DVR libraries.\n\nЁЯУб **Create a Personal TV Ecosystem**\\\nMerge live TV channels with custom EPG guides. Generate XMLTV schedules or use auto-matching to align channels with existing program data. Export as M3U, Xtream Codes API, or HDHomeRun device.\n\nЁЯФз **Transcode & Optimize Streams**\\\nConfigure output profiles with FFmpeg transcoding to optimize streams for different clients тАФ reduce bandwidth, standardize formats, or add audio normalization.\n\nЁЯФР **Centralize VPN Access**\\\nRun Dispatcharr through a VPN container (like Gluetun) so all streams route through a single VPN connection. Your clients access geo-blocked content without needing individual VPNs, reducing bandwidth overhead and simplifying network management.\n\nЁЯЪА **Monitor & Manage in Real-Time**\\\nTrack active streams, client connections, and bandwidth usage with live statistics. Monitor buffering events and stream quality. Automatic failover keeps viewers connected when streams failтАФseamlessly switching to backup sources without interruption.\n\nЁЯСе **Share Access Safely**\\\nCreate multiple user accounts with granular permissions. Share streams via M3U playlists or Xtream Codes API while controlling which users access which channels, profiles, or features. Network-based access restrictions available for additional security.\n\nЁЯФМ **Extend with Plugins**\\\nBuild custom integrations using Dispatcharr's robust plugin system. Automate tasks, connect to external services, or add entirely new workflows.\n\n---\n\n## тЬи Why You'll Love Dispatcharr\n\nтЬЕ **Stream Proxy & Relay** тАФ Intercept and proxy IPTV streams with real-time client management\\\nтЬЕ **M3U & Xtream Codes** тАФ Import, filter, and organize playlists with multiple backend support\\\nтЬЕ **EPG Matching & Generation** тАФ Auto-match EPG to channels or generate custom TV guides\\\nтЬЕ **Video on Demand** тАФ Stream movies and TV series with rich metadata and IMDB/TMDB integration\\\nтЬЕ **Multi-Format Output** тАФ Export as M3U, XMLTV EPG, Xtream Codes API, or HDHomeRun device\\\nтЬЕ **Real-Time Monitoring** тАФ Live connection stats, bandwidth tracking, and automatic failover\\\nтЬЕ **Stream Profiles** тАФ Configure different stream profiles for various clients and bandwidth requirements\\\nтЬЕ **Flexible Streaming Backends** тАФ VLC, FFmpeg, Streamlink, or custom backends for transcoding and streaming\\\nтЬЕ **Multi-User & Access Control** тАФ Granular permissions and network-based access restrictions\\\nтЬЕ **Plugin System** тАФ Extend functionality with custom plugins for automation and integrations\\\nтЬЕ **Fully Self-Hosted** тАФ Total control, no third-party dependencies\n\n---\n\n# Screenshots\n\n<div align=\"center\">\n  <img src=\"docs/images/channels.png\" alt=\"Channels\" width=\"750\"/>\n  <img src=\"docs/images/guide.png\" alt=\"TV Guide\" width=\"750\"/>\n  <img src=\"docs/images/stats.png\" alt=\"Stats & Monitoring\" width=\"750\"/>\n  <img src=\"docs/images/m3u-epg-manager.png\" alt=\"M3U & EPG Manager\" width=\"750\"/>\n  <img src=\"docs/images/vod-library.png\" alt=\"VOD Library\" width=\"750\"/>\n  <img src=\"docs/images/settings.png\" alt=\"Settings\" width=\"750\"/>\n</div>\n\n---\n\n## ЁЯЫая╕П Troubleshooting & Help\n\n- **General help?** Visit [Dispatcharr Docs](https://dispatcharr.github.io/Dispatcharr-Docs/)\n- **Community support?** Join our [Discord](https://discord.gg/Sp45V5BcxU)\n\n---\n\n## ЁЯЪА Get Started in Minutes\n\n### ЁЯР│ Quick Start with Docker (Recommended)\n\n```bash\ndocker pull ghcr.io/dispatcharr/dispatcharr:latest\ndocker run -d \\\n  -p 9191:9191 \\\n  --name dispatcharr \\\n  -v dispatcharr_data:/data \\\n  ghcr.io/dispatcharr/dispatcharr:latest\n```\n\n> Customize ports and volumes to fit your setup.\n\n---\n\n### ЁЯРЛ Docker Compose Options\n\n| Use Case                    | File                                                    | Description                                                                                                   |\n| --------------------------- | ------------------------------------------------------- | ------------------------------------------------------------------------------------------------------------- |\n| **All-in-One Deployment**   | [docker-compose.aio.yml](docker/docker-compose.aio.yml) | тнР Recommended! A simple, all-in-one solution тАФ everything runs in a single container for quick setup.        |\n| **Modular Deployment**      | [docker-compose.yml](docker/docker-compose.yml)         | Separate containers for Dispatcharr, Celery, Redis, and Postgres тАФ perfect if you want more granular control. |\n| **Development Environment** | [docker-compose.dev.yml](docker/docker-compose.dev.yml) | Developer-friendly setup with pre-configured ports and settings for contributing and testing.                 |\n\n---\n\n### ЁЯЫая╕П Building from Source\n\n> тЪая╕П **Warning**: Not officially supported тАФ but if you're here, you know what you're doing!\n\nIf you are running a Debian-based OS, use the `debian_install.sh` script. For other OS, contribute a script and weтАЩll add it!\n\n---\n\n## ЁЯдЭ Want to Contribute?\n\nWe welcome **PRs, issues, ideas, and suggestions**!\n\n- Prior to contributing, please read the [CONTRIBUTING.md](https://github.com/Dispatcharr/Dispatcharr/blob/main/CONTRIBUTING.md)\n\n> Whether it's writing docs, squashing bugs, or building new features, your contribution matters! ЁЯЩЛ\n\n---\n\n## ЁЯУЪ Documentation & Roadmap\n\n- ЁЯУЦ **Documentation:** [Dispatcharr Docs](https://dispatcharr.github.io/Dispatcharr-Docs/)\n\n**Upcoming Features (in no particular order):**\n\n- ЁЯОм **VOD Management Enhancements** тАФ Granular metadata control and cleanup of unwanted VOD content\n- ЁЯУБ **Media Library** тАФ Import local files and serve them over XC API\n- ЁЯСе **Enhanced User Management** тАФ Customizable XC API output per user account\n- ЁЯФД **Output Stream Profiles** тАФ Different clients with different stream profiles (bandwidth control, quality tiers)\n- ЁЯФМ **Fallback Videos** тАФ Automatic fallback content when channels are unavailable\n\n---\n\n## тЭдя╕П Shoutouts\n\nA huge thank you to all the incredible open-source projects and libraries that power Dispatcharr. We stand on the shoulders of giants!\n\n---\n\n## тЬЙя╕П Connect With Us\n\nHave a question? Want to suggest a feature? Just want to say hi?\\\nтЮбя╕П **[Open an issue](https://github.com/Dispatcharr/Dispatcharr/issues)** or reach out on [Discord](https://discord.gg/Sp45V5BcxU).\n\n---\n\n## ЁЯТЦ Support Dispatcharr\n\n[![Dispatcharr Open Collective](https://opencollective.com/dispatcharr/tiers/badge.svg)](https://opencollective.com/dispatcharr/contribute)\n\nOpen Collective provides a transparent way for anyone who finds value in Dispatcharr to support things like:\nтАв Infrastructure costs (Domains, Servers, etc.)\nтАв Apple Developer Program and Google Play Developer accounts\nтАв Helping contributors dedicate more time to improving the project\n\nSupport is completely optional, and Dispatcharr will always remain free and open-source.\n\n[Contribute here](https://opencollective.com/dispatcharr/contribute)\n\n---\n\n## тЪЦя╕П License & Legal\n\nDispatcharr is licensed under **GNU AGPL v3.0**: For full license details, see [LICENSE](https://www.gnu.org/licenses/agpl-3.0.html).\n\nDispatcharr is a trademark of the Dispatcharr project. Use of the Dispatcharr name or logo requires permission from the maintainers.\n\n---\n\n### ЁЯЪА _Happy Streaming! The Dispatcharr Team_\n","summary":"Dispatcharr is an openтАСsource IPTV and VOD management platform that consolidates multiple stream sources, provides robust EPG handling, and offers full control over playback and transcoding. It can emulate HDHomeRun tuners for Plex, Emby, or Jellyfin, generate XMLTV guides, export playlists in M3U or Xtream Codes formats, and route all traffic through a single VPN to simplify geoтАСaccess. RealтАСtime monitoring, automatic failover, and fineтАСgrained user permissions make it suitable for home media centers, small streaming operations, and techтАСsavvy enthusiasts who need a selfтАСhosted, secure, and extensible stream manager. Plugins further let developers tailor the system to custom workflows or external services.","description":null,"stars":3157,"language":"JavaScript"},{"owner":"cogwheel0","repo":"conduit","url":"https://github.com/cogwheel0/conduit","readme":"<h1 align=\"center\">Conduit</h1>\n\n<p align=\"center\">\n  <img\n    src=\"assets/icons/icon.png\"\n    alt=\"Conduit icon\"\n    width=\"96\"\n    height=\"96\"\n  />\n</p>\n\n<p align=\"center\">\n  <strong>The native Open WebUI client for iOS and Android.</strong>\n</p>\n\n<p align=\"center\">\n  <img\n    alt=\"Latest Release\"\n    src=\"https://img.shields.io/github/v/release/cogwheel0/conduit?display_name=tag&color=0A84FF\"\n  />\n  <img\n    alt=\"GitHub all downloads\"\n    src=\"https://img.shields.io/github/downloads/cogwheel0/conduit/total?style=flat-square&label=Downloads&logo=github&color=111827\"\n  />\n  <img\n    alt=\"License: GPL-3.0\"\n    src=\"https://img.shields.io/badge/License-GPL%203.0-16A34A\"\n  />\n</p>\n\n<p align=\"center\">\n  <a href=\"https://play.google.com/store/apps/details?id=app.cogwheel.conduit\">\n    <img\n      src=\"docs/store-badges/google.webp\"\n      alt=\"Get it on Google Play\"\n      height=\"56\"\n    />\n  </a>\n  <a\n    href=\"https://apps.apple.com/us/app/conduit-open-webui-client/id6749840287\"\n  >\n    <img\n      src=\"docs/store-badges/apple.webp\"\n      alt=\"Download on the App Store\"\n      height=\"56\"\n    />\n  </a>\n</p>\n\n<p align=\"center\">\n  <sub>OSS support and project momentum</sub>\n</p>\n\n<p align=\"center\">\n      <a href=\"https://vercel.com/blog/vercel-open-source-program-fall-2025-cohort#conduit\">\n        <img\n          alt=\"Vercel OSS Program\"\n          src=\"https://vercel.com/oss/program-badge.svg\"\n          height=\"25\"\n        />\n      </a>\n      <br></br>\n      <a href=\"https://trendshift.io/repositories/15397\" target=\"_blank\">\n        <img\n          src=\"https://trendshift.io/api/badge/repositories/15397\"\n          alt=\"cogwheel0%2Fconduit | Trendshift\"\n          height=\"56\"\n        />\n      </a>\n</p>\n\n<p align=\"center\">\n  <a href=\"#why-conduit\">Why Conduit</a> |\n  <a href=\"#feature-snapshot\">Feature Snapshot</a> |\n  <a href=\"#screenshots\">Screenshots</a> |\n  <a href=\"#quickstart\">Quickstart</a> |\n  <a href=\"#build-from-source\">Build from Source</a> |\n  <a href=\"#architecture\">Architecture</a>\n</p>\n\n<p align=\"center\">\n  <img\n    src=\"docs/screenshots/conduit-demo.gif\"\n    alt=\"Conduit demo\"\n    width=\"360\"\n  />\n</p>\n\n## Why Conduit\n\nOpen WebUI is excellent on the desktop, but mobile usually breaks down at the\nedges: authentication, streaming stability, sharing content into a prompt, and\nworking quickly from the home screen. Conduit is built to close that gap with a\nnative client that respects self-hosted deployments and still feels polished\nenough for daily use.\n\n## Feature Snapshot\n\n| Area | Included |\n| --- | --- |\n| Chat | Real-time streaming, model selection, temporary chats, conversation search, and folder management |\n| AI workflows | File and image uploads, multimodal prompts, server-side tools, saved prompts with variables, model-specific toggle filters, and optional web search or image generation when supported by your server |\n| Authentication | Username and password, LDAP, JWT, custom headers, SSO/OAuth, and reverse proxy login flows |\n| Productivity | Notes with autosave, AI-generated titles, AI enhancement, audio attachments, channels with threads and reactions when enabled by the server, and sharing from other apps |\n| Rendering | Syntax-highlighted code, LaTeX, Mermaid, Chart.js, citations, follow-up suggestions, reasoning blocks, tool-call details, and code execution rendering |\n| Mobile UX | Voice input, full voice-call mode, home screen widgets, app quick actions, clipboard image paste, haptics, and adaptive Material/Cupertino UI |\n| Personalization | Light, dark, and system themes plus a localized interface across 10 supported locales |\n| Privacy | Native secure storage, no third-party analytics or ads, and no developer-operated backend relaying your data |\n\n## Built for Self-Hosted Reality\n\n- Handles direct Open WebUI sign-in as well as OAuth and SSO providers exposed\n  by your deployment.\n- Works with reverse proxy setups such as `oauth2-proxy`, Authelia,\n  Authentik, Pangolin, and Cloudflare Tunnel by capturing the right cookies and\n  session state on-device.\n- Supports custom headers during connection setup for environments that depend\n  on keys like `X-API-Key`, `Authorization`, or organization routing headers.\n- Keeps credentials in Keychain or Keystore instead of plain-text local\n  storage.\n- Uses WebSocket-backed streaming for fast token-by-token responses and better\n  long-running chat reliability.\n- Surfaces optional server capabilities such as notes, channels, web search,\n  and image generation only when your Open WebUI deployment exposes them.\n\n## Assistant Output That Holds Up on Mobile\n\nConduit renders more than plain chat bubbles. The app includes native Flutter\nsurfaces for:\n\n- syntax-highlighted code blocks with copy and preview affordances\n- Mermaid diagrams and Chart.js embeds\n- LaTeX and math rendering\n- expandable reasoning, tool-call, and code-execution sections\n- inline citations, source cards, and follow-up suggestions\n\n## Platform Integrations\n\n- Home screen widgets on iOS and Android with new chat, microphone, camera,\n  photos, and clipboard entry points\n- App quick actions for starting a new chat or jumping straight into voice call\n- iOS App Intents and Shortcuts for opening chat, sending text, URLs, images,\n  and starting a voice call\n- Share-sheet ingestion and clipboard image paste to move content into a prompt\n  without manual file juggling\n\n## Screenshots\n\n| Chat | Models | Navigation | Settings |\n| --- | --- | --- | --- |\n| <img src=\"docs/screenshots/1.png\" alt=\"Conduit conversation screen\" width=\"200\" /> | <img src=\"docs/screenshots/2.png\" alt=\"Conduit model selection screen\" width=\"200\" /> | <img src=\"docs/screenshots/3.png\" alt=\"Conduit navigation screen\" width=\"200\" /> | <img src=\"docs/screenshots/4.png\" alt=\"Conduit settings screen\" width=\"200\" /> |\n\n## Quickstart\n\nIf you just want to use Conduit, install it from the App Store or Google Play,\nconnect it to your Open WebUI server, and sign in with the auth flow your\ndeployment already exposes.\n\n1. Launch Conduit.\n2. Enter the base URL for your Open WebUI instance.\n3. Add any required custom headers.\n4. Sign in with username and password, LDAP, JWT, SSO, or proxy auth.\n5. Pick a model and start chatting.\n\nFeatures such as channels, notes, web search, image generation, and toggle\nfilters appear when they are available on the connected server.\n\n## Build from Source\n\n### Requirements\n\n- A recent Flutter SDK with Dart `3.8` or newer\n- Java 17 for Android builds\n- Android 7.0+ (API 24) or iOS 16.0+\n- An Open WebUI instance for normal usage\n- Xcode for iOS builds or Android Studio / Android SDK for Android builds\n\n### Run locally\n\n```bash\ngit clone https://github.com/cogwheel0/conduit.git\ncd conduit\nflutter pub get\ndart run build_runner build --delete-conflicting-outputs\nflutter run -d ios\n# or\nflutter run -d android\n```\n\n### Developer checks\n\n```bash\nflutter pub get\ndart run build_runner build --delete-conflicting-outputs\ndart run custom_lint\nflutter test\n```\n\n### Release builds\n\n```bash\n# Android\nflutter build apk --release\nflutter build appbundle --release\n\n# iOS\nflutter build ios --release\n```\n\n## Localization\n\nConduit currently ships localized UI strings for English, German, Spanish,\nFrench, Italian, Korean, Dutch, Russian, Simplified Chinese, and Traditional\nChinese.\n\n## Architecture\n\nConduit is a Flutter application organized around feature modules and shared\nplatform services. It uses Riverpod 3 with code generation for state management\nand GoRouter for navigation, with persistent local storage and secure\ncredential handling built into the core layer.\n\n### Stack\n\n- Flutter for the UI layer\n- Riverpod 3 and `riverpod_generator` for state and dependency wiring\n- GoRouter for navigation\n- Dio plus socket transport for API and streaming\n- Hive and shared preferences for local persistence\n- Flutter Secure Storage for credentials\n\n### Project layout\n\n```text\nlib/\n  core/         auth, routing, models, persistence, platform services\n  features/\n    auth/       server setup, login, SSO, and proxy auth\n    chat/       conversations, attachments, tools, streaming, voice call\n    channels/   channel browsing and messaging\n    navigation/ chat shell, drawer, and responsive navigation\n    notes/      note editor and AI-assisted note workflows\n    profile/    theme, preferences, and app customization\n    prompts/    prompt helpers and prompt variable UI\n    tools/      tool integration surfaces\n  shared/       reusable widgets, theme tokens, and task infrastructure\n```\n\n<details>\n<summary>Platform permissions</summary>\n\n- Android asks for internet, microphone, camera, and file access for chat,\n  voice input, attachments, and image capture.\n- iOS requests microphone, speech recognition, camera, and photo library access\n  for voice and attachment workflows.\n\n</details>\n\n<details>\n<summary>Troubleshooting</summary>\n\n- If streaming stalls, verify WebSocket support is enabled on your Open WebUI\n  deployment. The upstream guidance requires\n  `ENABLE_WEBSOCKET_SUPPORT=\"true\"`.\n- If iOS device builds fail, run `cd ios && pod install` and confirm signing is\n  configured in Xcode.\n- If Android builds fail, confirm your Java and Gradle toolchain, then try\n  `flutter clean`.\n- If code generation fails, rerun\n  `dart run build_runner build --delete-conflicting-outputs`.\n\n</details>\n\n## Security and Privacy\n\n- Preferences stay on-device and credentials use platform secure storage.\n- Conduit does not include third-party analytics or advertising SDKs.\n- Diagnostic logging is local and transient, and Conduit does not relay your\n  data through developer-operated backend infrastructure.\n- Additional details are documented in [PRIVACY_POLICY.md](PRIVACY_POLICY.md).\n\n## Contributing\n\nConduit is actively developed and feedback is welcome.\n\n- Report bugs in [GitHub Issues](https://github.com/cogwheel0/conduit/issues).\n- Start product and feature discussions in\n  [GitHub Discussions](https://github.com/cogwheel0/conduit/discussions).\n- Share deployment notes, questions, or ideas in\n  [GitHub Discussions](https://github.com/cogwheel0/conduit/discussions).\n\nAt the moment, unsolicited pull requests are not the primary contribution path.\nOpen an issue or discussion first so changes can line up with the current\nroadmap.\n\n## Enterprise and White-Label\n\nIf you need private distribution, internal deployment support, or a custom\nenterprise/white-label build, open a discussion or contact the maintainer\nthrough the repository.\n\n## Support\n\nIf Conduit is useful to you, you can support ongoing development through\n[GitHub Sponsors](https://github.com/sponsors/cogwheel0) or\n[Buy Me a Coffee](https://www.buymeacoffee.com/cogwheel0).\n\n## License\n\nConduit is released under the [GPL-3.0 License](LICENSE).\n\nConduit is an independent client and is not affiliated with Open WebUI.\n","summary":"Conduit is a native mobile client that brings the full range of OpenтАпWebUIтАЩs chat and AIтАСworkflow capabilities to iOS and Android. It supports realтАСtime streaming, multimodal prompts, file and image uploads, syntaxтАСhighlighted code, LaTeX, and a suite of productivity tools such as notes, audio attachments, and homeтАСscreen widgets, while offering robust authentication optionsтАФincluding SSO, LDAP, JWT, OAuth, and reverseтАСproxy login. Designed for users of selfтАСhosted OpenтАпWebUI deployments and developers needing reliable, privacyтАСfocused mobile access, Conduit provides an adaptive Material/Cupertino UI, AIтАСgenerated titles, multilingual localization, and no thirdтАСparty analytics or ads, ensuring a polished dailyтАСuse experience for working with openтАСsource AI models on the go.","description":"Mobile (iOS/Android) client for OpenWebUI. Chat with your selfтАСhosted AI.","stars":1368,"language":"Dart"},{"owner":"pocket-id","repo":"pocket-id","url":"https://github.com/pocket-id/pocket-id","readme":"# <div align=\"center\"><img  src=\"https://github.com/user-attachments/assets/4ceb2708-9f29-4694-b797-be833efce17d\" width=\"100\"/> </br>Pocket ID</div>\n\nPocket ID is a simple OIDC provider that allows users to authenticate with their passkeys to your services.\n\nтЖТ Try out the [Demo](https://demo.pocket-id.org)\n\n<img src=\"https://github.com/user-attachments/assets/1e99ba44-76da-4b47-9b8a-dbe9b7f84512\" width=\"1200\"/>\n\nThe goal of Pocket ID is to be a simple and easy-to-use. There are other self-hosted OIDC providers like [Keycloak](https://www.keycloak.org/) or [ORY Hydra](https://www.ory.sh/hydra/) but they are often too complex for simple use cases.\n\nAdditionally, what makes Pocket ID special is that it only supports [passkey](https://www.passkeys.io/) authentication, which means you donтАЩt need a password. Some people might not like this idea at first, but I believe passkeys are the future, and once you try them, youтАЩll love them. For example, you can now use a physical Yubikey to sign in to all your self-hosted services easily and securely.\n\n## Setup\n\nPocket ID can be set up in multiple ways. The easiest and recommended way is to use Docker.\n\nVisit the [documentation](https://docs.pocket-id.org) for the setup guide and more information.\n\n## Contribute\n\nYou're very welcome to contribute to Pocket ID! Please follow the [contribution guide](/CONTRIBUTING.md) to get started.\n","summary":"Pocket ID is a lightweight OIDC provider that enables users to log into selfтАСhosted services using passkey authentication, eliminating the need for passwords. It offers a minimalistic configuration compared to heavier solutions like Keycloak or ORY Hydra, making it easy to deployтАФespecially via DockerтАФand quick to set up. With support for hardware tokens such as Yubikeys, Pocket ID provides a secure, futureтАСproof login method ideal for developers and organizations who want a straightforward, passwordтАСless authentication layer for their own applications.","description":"A simple and easy-to-use OIDC provider that allows users to authenticate with their passkeys to your services.","stars":7547,"language":"Go"},{"owner":"AgentsMesh","repo":"AgentsMesh","url":"https://github.com/AgentsMesh/AgentsMesh","readme":"<p align=\"center\">\n  <img src=\"docs/images/logo.svg\" alt=\"AgentsMesh\" height=\"60\" />\n</p>\n\n<h3 align=\"center\">Where teams scale beyond headcount.</h3>\n\n<p align=\"center\">\n  The AI Agent Workforce Platform.<br/>\n  Give every team member an AI agent squad тАФ assign tasks, track progress, and let them collaborate autonomously.\n</p>\n\n<p align=\"center\">\n  <a href=\"https://agentsmesh.ai\">Website</a> ┬╖\n  <a href=\"https://agentsmesh.ai/docs\">Docs</a> ┬╖\n  <a href=\"#quick-start\">Quick Start</a> ┬╖\n  <a href=\"https://discord.gg/3RcX7VBbH9\">Discord</a> ┬╖\n  <a href=\"https://www.linkedin.com/company/agentsmesh\">LinkedIn</a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/AgentsMesh/AgentsMesh/actions/workflows/ci.yml\"><img src=\"https://github.com/AgentsMesh/AgentsMesh/actions/workflows/ci.yml/badge.svg?branch=main\" alt=\"CI\" /></a>\n  <a href=\"https://github.com/AgentsMesh/AgentsMesh/blob/main/LICENSE\"><img src=\"https://img.shields.io/badge/license-BSL--1.1-blue\" alt=\"License\" /></a>\n  <a href=\"https://hub.docker.com/u/agentsmesh\"><img src=\"https://img.shields.io/badge/docker-hub-blue?logo=docker\" alt=\"Docker Hub\" /></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://youtu.be/VaXImaly3dM\">\n    <img src=\"https://img.youtube.com/vi/VaXImaly3dM/maxresdefault.jpg\" alt=\"AgentsMesh Demo Video\" width=\"720\" />\n  </a>\n</p>\n\n---\n\n## What is AgentsMesh?\n\nAgentsMesh is **The AI Agent Workforce Platform** тАФ where teams scale beyond headcount. Instead of running agents one-at-a-time on your local machine, AgentsMesh lets you spin up **remote AI workstations (AgentPods)**, coordinate **multi-agent collaboration** through channels and pod bindings, and track everything via integrated **task management** тАФ all from a single web console.\n\nIndividual productivity has peaked. The next frontier is organizational. AgentsMesh turns AI agents from solo tools into a coordinated workforce.\n\n**BYOK (Bring Your Own Key)** тАФ You provide your own AI API keys. No usage caps. Full cost control.\n\n## Features\n\n- **AgentPod** тАФ Remote AI workstations with web terminal, Git worktree isolation, and real-time streaming. Run multiple concurrent pods.\n- **Multi-Agent Collaboration** тАФ Coordinate agents through channels and pod bindings. Visualize the collaboration topology in real-time.\n- **Task Management** тАФ Kanban board with ticket-pod binding, progress tracking, and MR/PR integration.\n- **Self-Hosted Runners** тАФ Deploy runners on your own infrastructure. Your code never leaves your environment.\n- **Multi-Agent Support** тАФ Claude Code, Codex CLI, Gemini CLI, Aider, OpenCode, and any custom terminal-based agent.\n- **Multi-Git Provider** тАФ GitLab, GitHub, and Gitee integration.\n- **Multi-Tenant** тАФ Organization > Team > User hierarchy with row-level isolation.\n- **Enterprise Ready** тАФ SSO, RBAC, audit logs, air-gapped deployment support.\n\n## Getting Started\n\nThe fastest way to use AgentsMesh is through our hosted service at **[agentsmesh.ai](https://agentsmesh.ai)** тАФ sign up, connect your Git provider, and start running agents in minutes.\n\n### 1. Install the Runner\n\nThe Runner is a lightweight daemon that runs on your machine and executes AI agents locally. Your code stays on your infrastructure.\n\n```bash\ncurl -fsSL https://agentsmesh.ai/install.sh | sh\n```\n\n> See the [Runner README](runner/) for more installation options (deb, rpm, Windows, etc.)\n\n### 2. Login\n\n```bash\nagentsmesh-runner login\n```\n\nThis opens your browser to authenticate. For headless environments (SSH, remote server):\n\n```bash\nagentsmesh-runner login --headless\n```\n\nFor self-hosted deployments, add `--server`:\n\n```bash\nagentsmesh-runner login --server https://your-server.com\n```\n\n### 3. Run\n\n```bash\nagentsmesh-runner run\n```\n\nOr install as a system service for always-on operation:\n\n```bash\nagentsmesh-runner service install\nagentsmesh-runner service start\n```\n\nOnce the runner is online, create an **AgentPod** from the web console and start coding with your AI agents.\n\n## Architecture\n\nAgentsMesh separates **control plane** from **data plane** тАФ orchestration commands travel through gRPC with mTLS, while terminal I/O streams through a Relay cluster.\n\n<p align=\"center\">\n  <img src=\"docs/images/architecture.svg\" alt=\"AgentsMesh Architecture\" width=\"680\" />\n</p>\n\n| Component | Description |\n|-----------|-------------|\n| **Backend** | Go API server тАФ auth, org/team management, pod lifecycle, task management |\n| **Web** | Next.js frontend тАФ dashboard, web terminal, kanban, topology visualization |\n| **Relay** | Terminal relay cluster тАФ low-latency WebSocket pub/sub between runners and browsers |\n| **Runner** | Self-hosted Go daemon тАФ connects to Backend (gRPC+mTLS) and Relay (WebSocket), runs AI agents in isolated PTY sandboxes |\n| **Web-Admin** | Internal admin console тАФ user/org/runner management, audit logs |\n\n## Quick Start\n\n### One-Command Setup (Docker)\n\n```bash\ngit clone https://github.com/AgentsMesh/AgentsMesh.git\ncd AgentsMesh/deploy/dev\n./dev.sh\n```\n\nThis starts the full stack: PostgreSQL, Redis, MinIO, Backend, Relay, Traefik, and a local Next.js frontend with hot reload.\n\n**Access:**\n\n| Service | URL |\n|---------|-----|\n| Web Console | http://localhost:3000 |\n| API | http://localhost:80/api |\n\n**Test Accounts:**\n\n| Role | Email | Password |\n|------|-------|----------|\n| User | dev@agentsmesh.local | devpass123 |\n| Admin | admin@agentsmesh.local | adminpass123 |\n\n> Ports are dynamically allocated per worktree. Check `deploy/dev/.env` for actual values.\n\n<details>\n<summary><strong>Manual Setup</strong></summary>\n\n**Prerequisites:** Go 1.24+, Node.js 20+, pnpm, Docker\n\n```bash\n# 1. Start infrastructure\ncd deploy/dev && ./dev.sh\n\n# 2. Backend (auto-starts in Docker with hot reload)\ndocker compose logs -f backend\n\n# 3. Frontend (local with Turbopack)\ncd web && pnpm install && pnpm dev\n```\n\n</details>\n\n<details>\n<summary><strong>Production Deployment</strong></summary>\n\nDocker images are published to Docker Hub on every push to `main`:\n\n```\nagentsmesh/backend:sha-xxxxxxx\nagentsmesh/web:sha-xxxxxxx\nagentsmesh/web-admin:sha-xxxxxxx\nagentsmesh/relay:sha-xxxxxxx\n```\n\nTagged releases (`v*`) get semver tags:\n\n```\nagentsmesh/backend:1.0.0\nagentsmesh/backend:1.0\n```\n\nSee [deploy/selfhost/](deploy/selfhost/) for self-hosted deployment guide.\n\n</details>\n\n## Supported Agents\n\n| Agent | Provider | Description |\n|-------|----------|-------------|\n| [Claude Code](https://docs.anthropic.com/en/docs/agents-and-tools/claude-code/overview) | Anthropic | Autonomous AI coding agent |\n| [Codex CLI](https://github.com/openai/codex) | OpenAI | OpenAI's code generation CLI |\n| [Gemini CLI](https://github.com/google-gemini/gemini-cli) | Google | Google Gemini CLI |\n| [Aider](https://github.com/Aider-AI/aider) | Open Source | AI pair programming in the terminal |\n| [OpenCode](https://github.com/opencode-ai/opencode) | Open Source | Open source AI coding tool |\n| Custom | Any | Any terminal-based agent |\n\n## Tech Stack\n\n| Layer | Technology |\n|-------|-----------|\n| Backend | Go (Gin + GORM) |\n| Frontend | Next.js (App Router) + TypeScript + Tailwind CSS |\n| Database | PostgreSQL + Redis |\n| Storage | MinIO (S3-compatible) |\n| API | REST + gRPC (bidirectional streaming) |\n| Security | mTLS for runner connections, JWT for web auth |\n| Real-time | gRPC streaming (Runner тЖФ Backend), WebSocket (Relay тЖФ Browser) |\n| Reverse Proxy | Traefik |\n\n## Project Structure\n\n```\nAgentsMesh/\nтФЬтФАтФА backend/          # Go API server\nтФЬтФАтФА web/              # Next.js frontend\nтФЬтФАтФА web-admin/        # Admin console (Next.js)\nтФЬтФАтФА runner/           # Self-hosted runner daemon (Go)\nтФЬтФАтФА relay/            # Terminal relay server (Go)\nтФЬтФАтФА proto/            # Protocol Buffers definitions\nтФЬтФАтФА ci/               # CI Dockerfiles\nтФЬтФАтФА deploy/\nтФВ   тФЬтФАтФА dev/          # Docker Compose dev environment\nтФВ   тФФтФАтФА selfhost/     # Self-hosted deployment guide\nтФФтФАтФА docs/             # Architecture docs and RFCs\n```\n\n## Contributing\n\nWe welcome contributions! See [CONTRIBUTING.md](CONTRIBUTING.md) for guidelines.\n\n- [Code of Conduct](CODE_OF_CONDUCT.md)\n- [Security Policy](SECURITY.md)\n\n## License\n\n[Business Source License 1.1](LICENSE) (BSL-1.1)\n\n- **Change Date:** 2030-02-28\n- **Change License:** GPL-2.0-or-later\n\nThe BSL allows you to use, copy, and modify the software for non-production purposes. Production use requires a commercial license until the change date, after which the software becomes available under GPL-2.0-or-later. See [LICENSE](LICENSE) for the full terms and additional use grant.\n","summary":"AgentsMesh is an AI Agent Workforce Platform that lets teams deploy remote AI workstations (AgentPods), coordinate multiтАСagent collaboration, and monitor progress through a single web console. It provides features such as realтАСtime terminal access, Kanban task tracking with PR/MR integration, and crossтАСagent task delegation via channels and pod bindings. The platform supports a wide range of terminalтАСbased agents, multiple Git providers, and can be selfтАСhosted for full data control. Its enterpriseтАСgrade security, multiтАСtenant structure, and scalable workload handling make it ideal for software teams and organizations looking to augment their workforce with autonomous AI agents.","description":"The AI Agent Workforce Platform тАФ where teams scale beyond headcount. Give every team member an AI agent squad.","stars":1613,"language":"Go"},{"owner":"markrai","repo":"scrumboy","url":"https://github.com/markrai/scrumboy","readme":"<p align=\"center\">\n  <img width=\"372\" src=\"internal/httpapi/web/githublogo.png\" alt=\"scrumboy logo\" />\n  <br />\n  <img src=\"https://img.shields.io/badge/version-v3.12.0-blue\" alt=\"version\" />\n  <a href=\"LICENSE\">\n    <img src=\"https://img.shields.io/badge/license-AGPL--v3-orange\" alt=\"license\" />\n  </a>\n</p>\n\n#### Self-hosted project management & issue-tracking solution + instant shareable & customizable boards + realtime collaboration, automation, API access and MCP-compatible client support\n\n\n<img width=\"2975\" height=\"1078\" alt=\"image\" src=\"internal/httpapi/web/github_preview.jpg\" />\n\n## Table of contents\n\n- [Quick Start](#quick-start)\n  - [Run with Docker](#run-with-docker)\n  - [Run from source](#run-from-source)\n- [Optional Configuration](#optional-configuration)\n  - [Environment variables](#environment-variables)\n  - [Encryption key (optional)](#encryption-key-optional)\n  - [OIDC / SSO login (optional)](#oidc--sso-login-optional)\n  - [TLS / HTTPS (optional)](#tls--https-optional)\n  - [PWA / Web Push (optional)](#pwa--web-push-optional)\n  - [Frontend build note](#frontend-build-note)\n- [Why Scrumboy?](#why-scrumboy)\n- [Who is this for?](#who-is-this-for)\n- [Modes](#modes)\n- [Features](#features)\n- [Integrations & API Access](#integrations--api-access)\n  - [MCP (JSON-RPC) for AI agents](#mcp-json-rpc-for-ai-agents)\n  - [Webhooks (outbound HTTP)](#webhooks-outbound-http)\n- [Config](#config)\n- [Roles](#roles)\n  - [System roles (instance-wide)](#system-roles-instance-wide)\n  - [Project roles (per project)](#project-roles-per-project)\n- [Export scope](#export-scope)\n- [Import modes](#import-modes)\n- [Code layout (reference)](#code-layout-reference)\n- [Documentation](#documentation)\n- [License and Contributions](#license-and-contributions)\n\n## Quick Start\n\nRuns in seconds. No setup required.\n\nNo `.env` file, TLS certificates, or encryption key are required to start the app.\n\n### Run with Docker\n\n```bash\ndocker compose up --build\n```\n\nOpen [http://localhost:8080](http://localhost:8080).\n\n### Run from source\n\n```bash\ngo run ./cmd/scrumboy\n```\n\nOpen [http://localhost:8080](http://localhost:8080).\n\n## Optional Configuration\n\n### Environment variables\n\nNote: `scrumboy.env` is not a standard KEY=value file - it contains only the raw encryption key on a single line.\n\n- The app does **not** automatically load `.env` files.\n- On Linux/macOS, export variables manually (for example: `export SCRUMBOY_ENCRYPTION_KEY=...`).\n- Windows helper scripts load `scrumboy.env` automatically.\n\n### Encryption key (optional)\n\n- `SCRUMBOY_ENCRYPTION_KEY` is **not** required for basic startup.\n- It is required for:\n  - 2FA\n  - Password reset flows\n- If an existing database already has 2FA-enabled users, startup fails without this key.\n\nGenerate a key with: `openssl rand -base64 32`\n\n### OIDC / SSO login (optional)\n\nScrumboy supports OpenID Connect for single sign-on with any standards-compliant provider (Keycloak, Authentik, Auth0, Entra ID, etc.). OIDC is enabled by setting all four required environment variables:\n\n| Variable | Description |\n|----------|-------------|\n| `SCRUMBOY_OIDC_ISSUER` | Issuer URL (e.g. `https://auth.example.com/realms/main`) |\n| `SCRUMBOY_OIDC_CLIENT_ID` | OAuth client ID |\n| `SCRUMBOY_OIDC_CLIENT_SECRET` | Confidential client secret |\n| `SCRUMBOY_OIDC_REDIRECT_URL` | Full callback URL registered at IdP (e.g. `https://scrumboy.example.com/api/auth/oidc/callback`) |\n\nOptional:\n\n| Variable | Description |\n|----------|-------------|\n| `SCRUMBOY_OIDC_LOCAL_AUTH_DISABLED` | Set to `true` to disable local password login when OIDC is configured (SSO-only mode) |\n\nLocal password authentication remains available by default alongside OIDC. After successful OIDC login, the user receives a standard Scrumboy session cookie. The IdP must return a verified email (`email_verified: true`). HTTPS is recommended when using OIDC to ensure session cookies are `Secure`.\n\nSee [`docs/oidc.md`](docs/oidc.md) for full setup details, constraints, and troubleshooting.\n\n### TLS / HTTPS (optional)\n\n- TLS is optional.\n- HTTPS is enabled only when both `SCRUMBOY_TLS_CERT` and `SCRUMBOY_TLS_KEY` files exist.\n- Otherwise, the server runs on HTTP by default.\n\n### PWA / Web Push (optional)\n\nInstall the app from the browser for a standalone window and better mobile UX. **Background assignment alerts** use the **Web Push API** with **VAPID** keys on the server. When both keys are set, signed-in clients attempt to subscribe automatically (browser permission may be prompted). Details and subscriber contact semantics: **[`docs/pwa.md`](docs/pwa.md)**.\n\n### Frontend build note\n\nThe Docker image and `go run` embed prebuilt assets under `internal/httpapi/web/dist`. If they are missing, build them:\n\n```bash\ncd internal/httpapi/web\nnpm install\nnpx tsc\n```\n\nThen run `docker compose up --build` or `go run ./cmd/scrumboy` again from the repository root.\n\n\n# Why Scrumboy?\n\nSimplicity of a light Kanban, with the power of structured systems: Roles, sprints, audit trails & customizable workflows - without being locked into SaaS tools. \n\n\n# Who is this for?\n\n- self-hosted & privacy-focused community\n- small to medium-sized teams & solo builders\n\n# Modes\n\n- **Full** (`SCRUMBOY_MODE=full`, default): Auth can be enabled. First user via bootstrap; then login/session. Backup/export, tags, multi-project. Projects can be user-owned (project_members) or anonymous (shareable by URL): `/anon` (or `/temp`) creates a throwaway board and redirects to `/{slug}`.\n\n- **Anonymous** (`SCRUMBOY_MODE=anonymous`): No auth. Landing at `/`; live deployment at: https://scrumboy.com/\n\n\n# Features\n\n- Custom Workflows: You can create any combination of workflow you want, per project, with user-defined \"Done\" lane.\n\n- Realtime SSE enabled boards for instant multi-user actions.\n\n- **Webhooks (API-only, full mode):** Register URLs per project so Scrumboy can POST JSON when subscribed domain events fire (e.g. `todo.assigned`). For your own automations, not in-app or browser notifications. See [Integrations](#integrations--api-access).\n\n- Customizable Tags: Users can inherit and customize tag colors.\n\n- Advanced filtering: Search todos based on text or tags.\n\n- Sprints: create, activate, close; sprint filter on board; default sprint weeks (1 or 2) per project.\n\n- Authentication & 2FA: TOTP supported when `SCRUMBOY_ENCRYPTION_KEY` is set.\n\n- Audit trail: append-only `audit_events` table; todo/member/project/link actions logged (see `docs/AUDIT_TRAIL.md`).\n\n- Backup: export/import JSON; merge or replace; scope full or single project (see store backup logic).\n\n- PWA: Excellent UX for mobile users.\n\n- Anonymous shareable boards can be created in both Full & Anonymous deployments.\n\n---\n\n## Integrations & API Access\n\nScrumboy supports API access tokens for automation, integrations, and programmatic MCP access (legacy HTTP and JSON-RPC - see below). Full MCP guide for developers and agents: [`docs/mcp.md`](docs/mcp.md).\n\nYou can create a token from the API and use it to call MCP endpoints directly - no browser session or cookies required.\n\n**Create a token (requires login session):**\n\n```bash\ncurl -b cookies.txt -X POST http://localhost:8080/api/me/tokens \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-Scrumboy: 1\" \\\n  -d '{\"name\":\"cli\"}'\n```\n\nResponse includes a one-time token (starts with sb_).\n\nUse it with MCP:\n\n```bash\ncurl -X POST http://localhost:8080/mcp \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer sb_your_token_here\" \\\n  -d '{\"tool\":\"projects.list\",\"input\":{}}'\n```\n\n### MCP (JSON-RPC) for AI agents\n\nScrumboy exposes a **Model Context Protocol (MCP) compatible JSON-RPC endpoint** for AI agents (Claude, etc.) and MCP-compatible clients.\n\n**Endpoint:** `POST /mcp/rpc`\n\nThis is separate from the `/mcp` HTTP endpoint above and follows **JSON-RPC 2.0** (`initialize`, `tools/list`, `tools/call`, etc.). See **[`docs/mcp.md`](docs/mcp.md)** for tools, auth, response shapes, and examples; **[`API.md`](API.md)** for the full HTTP/MCP behavior reference.\n\n#### Example: `initialize`\n\n```bash\ncurl -X POST http://localhost:8080/mcp/rpc \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{}}'\n```\n\n#### Example: list tools\n\n```bash\ncurl -X POST http://localhost:8080/mcp/rpc \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"jsonrpc\":\"2.0\",\"id\":2,\"method\":\"tools/list\",\"params\":{}}'\n```\n\n#### Example: call a tool\n\n```bash\ncurl -X POST http://localhost:8080/mcp/rpc \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer sb_your_token_here\" \\\n  -d '{\n    \"jsonrpc\":\"2.0\",\n    \"id\":3,\n    \"method\":\"tools/call\",\n    \"params\":{\n      \"name\":\"todos.create\",\n      \"arguments\":{\n        \"projectSlug\":\"my-project\",\n        \"title\":\"Created via MCP\"\n      }\n    }\n  }'\n```\n\n**Notes**\n\n- Compatible with MCP clients that support **HTTP JSON-RPC** to this URL.\n- Some MCP clients expect **stdio**-based servers - those are **not** supported here.\n- Authentication works via **session cookie** or **Bearer** token (same rules as `/mcp`).\n\nThis enables:\n\n- CLI usage\n- CI/CD automation\n- AI agents and MCP clients (use **`POST /mcp/rpc`** for JSON-RPC; **`POST /mcp`** remains available for the legacy `{ \"tool\", \"input\" }` envelope)\n- Scripting/integrations without login flows\n\n### Webhooks (outbound HTTP)\n\nScrumboy can **POST JSON to URLs you register** when certain events occur. This is for **server-side integrations** (your script, gateway, queue worker, etc.). It does **not** add notifications inside the Scrumboy UI; live boards still update via **SSE** as before.\n\n- **Availability:** **Full mode only** (endpoints are disabled in anonymous mode).\n- **Who can configure:** Project **maintainers**, via the HTTP API only - there is **no settings screen** for webhooks yet.\n- **API:** `POST /api/webhooks` (create), `GET /api/webhooks` (list yours), `DELETE /api/webhooks/{id}` - same session cookie / CSRF header rules as other mutating `/api/*` calls.\n- **Events:** Subscribe to specific types (e.g. `todo.assigned`) or `*` for all delivered types. The set may grow over time; unused types in your list are harmless.\n- **Security:** Optional per-webhook **secret**; when set, requests include an `X-Scrumboy-Signature` header (`sha256=` HMAC of the raw JSON body).\n- **Semantics:** Best-effort delivery with retries on failure; not a durable external queue - design for idempotent receivers using the event `id` in the JSON body.\n\nExample create (replace cookie / project id / URL):\n\n```bash\ncurl -b cookies.txt -X POST http://localhost:8080/api/webhooks \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-Scrumboy: 1\" \\\n  -d '{\"projectId\":1,\"url\":\"https://example.com/scrumboy-hook\",\"events\":[\"todo.assigned\"],\"secret\":\"optional-shared-secret\"}'\n```\n\n\n# Config\n\nEnv vars and defaults are defined in `internal/config/config.go`. ResolveDataDir uses `DATA_DIR` and `SQLITE_PATH` as documented there.\nNone of these are required for basic startup.\n\n| Variable | Default (from code) |\n|----------|---------------------|\n| `BIND_ADDR` | `:8080` |\n| `DATA_DIR` | `./data` |\n| `SQLITE_PATH` | (empty; then `$DATA_DIR/app.db`) |\n| `SQLITE_BUSY_TIMEOUT_MS` | `30000` |\n| `SQLITE_JOURNAL_MODE` | `WAL` |\n| `SQLITE_SYNCHRONOUS` | `FULL` |\n| `MAX_REQUEST_BODY_BYTES` | `1048576` (1 MiB) |\n| `SCRUMBOY_MODE` | `full` (or `anonymous`) |\n| `SCRUMBOY_ENCRYPTION_KEY` | (empty) - **Required for 2FA.** Base64-encoded 32-byte key. Generate with `openssl rand -base64 32`. Without it, 2FA setup returns 503. |\n| `SCRUMBOY_TLS_CERT` | `./cert.pem` - TLS cert for HTTPS |\n| `SCRUMBOY_TLS_KEY` | `./key.pem` - TLS key for HTTPS |\n| `SCRUMBOY_INTRANET_IP` | `192.168.1.250` - LAN IP to log for intranet access |\n| `SCRUMBOY_VAPID_PUBLIC_KEY` | (empty) - **Web Push.** VAPID public key (URL-safe base64). Required together with private key for PWA background assignment notifications and for post-login auto-subscribe in the SPA. |\n| `SCRUMBOY_VAPID_PRIVATE_KEY` | (empty) - VAPID private key (URL-safe base64). |\n| `SCRUMBOY_VAPID_SUBSCRIBER` | (empty) - Contact for VAPID JWT `sub` (not tied to IdP). Use a **plain email** (e.g. `ops@example.com`); the server adds `mailto:`. Or set a full `mailto:...` or `https://...` URL explicitly. If unset, a built-in default is used. |\n| `SCRUMBOY_DEBUG_PUSH` | (empty) - Set to `1` to log push send/prune on the server. |\n\n`docker-compose.yml` overrides some of these (e.g. `SQLITE_BUSY_TIMEOUT_MS=5000`).\n\n---\n\n# Roles\n\nIn **full mode**, access is governed by two separate role systems. System roles do not grant project access; project access comes only from project membership.\n\n### System roles (instance-wide)\n\n| Role   | Who has it | Allowed actions |\n|--------|------------|------------------|\n| **Owner** | Bootstrap (first) user; can be assigned by another owner | List all users; create users (admin-only API); update any userтАЩs system role (owner/admin/user); delete users (except cannot delete the last owner). |\n| **Admin** | Assigned by an owner | List all users; create users. Cannot change system roles or delete users. |\n| **User**  | Default for new users; assigned by owner | No system-level user management. Access to projects only via project membership. |\n\n\n### Project roles (per project)\n\nA user must be a member of a project to access it; system role alone does not grant access.\n\n| Role          | View board & todos | Create/edit/move/delete todos | Edit body when assigned | Manage members | Delete project | Tag delete/color (project-scoped) |\n|---------------|--------------------|-------------------------------|--------------------------|----------------|----------------|-----------------------------------|\n| **Maintainer**| тЬУ                  | тЬУ                             | тЬУ                        | тЬУ              | тЬУ              | тЬУ (maintainer)                    |\n| **Contributor**| тЬУ                 | -                             | тЬУ (body only)            | -              | -              | -                                 |\n| **Viewer**    | тЬУ                  | -                             | -                        | -              | -              | -                                 |\n\n- **View** (board, backlog, burndown, charts, etc.): Any project role (Viewer or above).\n- **Create/edit/move/delete todos, assign, sprints**: Maintainer only. Contributor cannot create, delete, move, or assign; cannot edit title, tags, sprint, or estimation.\n- **Edit body when assigned**: Contributor can edit the body field only when the todo is assigned to them. Maintainer has full edit.\n- **Manage members** (add/remove members, change role): Maintainer only.\n- **Delete project**: Maintainer only.\n- **Delete/update tag** (project-scoped tags): Maintainer only. User-owned tags: owner of the tag or maintainer in all projects where the tag is used.\n- **Create tags**: Contributor or Maintainer.\n\nTemporary/anonymous boards (shareable by URL, no auth) do not use project roles; anyone with the link can view and edit. New Todo and drag-and-drop are enabled for anonymous boards.\n\n---\n\n\n# Export scope\n\n- **Full**: All projects the user can access (full mode: projects where the user is a member, or temporary boards they created; anonymous mode: not applicable for full export).\n- **Single project**: One board/project only (e.g. current board in anonymous mode).\n\n# Import modes\n\nWhen importing a backup JSON, you choose how it is applied:\n\n| Mode | Description |\n|------|-------------|\n| **Replace** | Replace all: delete every project in your current export scope, then create projects from the backup. Effect is тАЬnuke and restoreтАЭ so the instance matches the backup. Not available in anonymous mode. |\n| **Merge** | Merge/update: for each project in the backup, match by slug. If a project with that slug exists (and you have access), update its todos, tags, and links to match the backup; otherwise create a new project. In anonymous mode, merge behaves like Create Copy (all projects are created as new). |\n| **Create copy** | Create copy: create new projects for every project in the backup. Slugs are made unique (e.g. `name-imported-2`), so nothing is overwritten; you get duplicates. |\n\nIn **anonymous mode**, full-scope import is not allowed; you can only import into the current board (todos and tags are added to that board).\n\n---\n\n# Code layout (reference)\n\n- `cmd/scrumboy`: main server entrypoint. Other `cmd/*` are utilities (tagcheck, tagrecover, dbquery, slugfix).\n- `internal/config`: env-based config.\n- `internal/version`: app and export format version.\n- `internal/db`: SQLite open/options (PRAGMAs from config).\n- `internal/migrate`: DB migrations.\n- `internal/store`: data model and persistence (projects, todos, tags, auth, backup, ordering, memberships, audit, links, sprints, workflows, etc.).\n- `internal/httpapi`: HTTP server, routing, auth cookies, SPA serve, embedded web FS.\n- `internal/httpapi/web`: frontend (TS, CSS, HTML); built with `npx tsc` in `internal/httpapi/web`; output under `web/dist` and embedded by server.\n\nInvariants (e.g. canonical URL `/{slug}`, no UI links to `/p/{id}`) are enforced in code and tests; see `internal/httpapi` and `internal/store` for the authoritative behavior.\n\n---\n\n# Documentation\n\n- **MCP (HTTP tools + JSON-RPC):** [`docs/mcp.md`](docs/mcp.md) - tool catalog, auth, legacy vs `/mcp/rpc`, examples (agents & automation). See also [`API.md`](API.md) for exhaustive MCP HTTP detail.\n- **PWA / Web Push (VAPID):** [`docs/pwa.md`](docs/pwa.md) - keys, subscriber contact, post-login auto-subscribe when VAPID is configured, Settings opt-out, tradeoffs.\n- **Roles and permissions:** `docs/ROLES_AND_PERMISSIONS.md` - project roles, backend authorization, anonymous boards.\n- **Audit trail:** `docs/AUDIT_TRAIL.md` - action vocabulary, event model, integration points.\n\n---\n\n# License and Contributions\n\nScrumboy is licensed under the **GNU Affero General Public License v3** (AGPL v3). See [LICENSE](LICENSE) for the full text.\n\n**Contributing:** Contributors must sign the [Contributor License Agreement (CLA)](CLA.md) before contributions are accepted. See [CONTRIBUTING.md](CONTRIBUTING.md) for setup, build, and pull request guidelines.\n\nScrumboy is an independent open-source project and is not affiliated with, sponsored by, or endorsed by Scrum.org, Scrum Alliance, Inc., or any other organization associated with Scrum training or certification. Any reference to \"scrum\" is made solely to describe the project management methodology that the software is intended to support. We hope you will тЭдя╕П it as much as we do!","summary":"Scrumboy is an openтАСsource, selfтАСhosted projectтАСmanagement platform that turns issue tracking into an instant, shareable KanbanтАСstyle board with realтАСtime collaboration, automation, and a rich API. It includes roleтАСbased permissions, OIDC/SSO support, optional encryption for 2FA, webhooks, a JSONтАСRPC MCP interface for AI agents, and can be deployed in seconds via Docker or run directly from source. The solution is ideal for developers, product managers, and organizations that need a fully selfтАСhosted, customizable workflow tool or APIтАСdriven integration layer without relying on proprietary cloud services.","description":"a self-hosted project management & Kanban solution + Instant shareable boards","stars":203,"language":"Go"},{"owner":"dannycandle","repo":"bookbag","url":"https://github.com/dannycandle/bookbag","readme":"# Bookbag\n![Book Bag mockup](./readme-assets/bookbag-mockup.png)\n\n## About\n\nBookbag is a fork of [Calibre-Web](https://github.com/janeczku/calibre-web) that incorporates a complete redesign of the user interface. It is fully self-hostable and has no user tracking or telemetry.\n\n## Features\n![Instant Loads](./readme-assets/instant.gif)\n- **Instant Filters, Search, Sort, and Resize:** Instantly sort, search, filter, and resize book covers.\n- **Advanced Search:** Search using any combination of metadata.\n- **Advanced Settings:** One page with instantly applied settings.\n- **Easy Setup Wizard:** First-time setup wizard to create admin account and create/upload book library.\n- **Advanced Web Reader:** Font, text size, themes, line height, justification, & columns.\n- **One-Time-Password Flow:** For password resets and public registrations.\n- **Most of what Calibre-Web Includes:** Retains features such as Kobo Sync, email to ereader, magic links, ldap & oauth, etc., although many need further testing.\n\n\n## Planned Future Updates (Dates TBD):\n- **Responsive Design** (In progress)\n- **Magic Shelves** (In progress)\n- **Dark Mode** (In progress)\n- **Bulk Editing**\n- **Author's Page**\n- **Audiobooks**\n- **Auto-ingest**\n- **Metadata Automation**\n- **Deduplication**\n- **Free eBook Discovery**\n- **Ebook upload sanitation (for security)**\n- **Website**\n\n## Change log\nv0.1.2: Shelves fully implemented. Create/edit/delete from books grid. Create/AddBook from book details page.\nv0.1.1: Use backend for filters & search, builds now support amd64.\nv0.1.0: Initial release. Base features implemented with redesign.\n\n## Install via Docker\n1. Download docker-compose.yml from this repo.\n2. In the file, replace \"PATH/FOR/YOUR/LIBRARY/FOLDER\" (stores metadata.db and book files) and \"PATH/FOR/YOUR/CONFIG/FOLDER\" (stores app.db and other install-specific files) with the paths you want. Map your desired port to container port 8084.\n3. Run `docker compose up -d`\n\n> тЪая╕П While I have tested bookbag for release 0.1.0, I still advise against using it on a public server or as your primary book server. There may be vulnerabilities and bugs that prevent normal use. Bookbag is still in early development and is offered as-is.\n\n## First-Time User Setup\nFollow the setup wizard after starting the server.\n1. Create admin account.\n2. If you are bringing your own metadata.db, choose \"Bring my own\". You can then upload your metadata.db file. The book files themselves must still be manually placed in the folder your metadata.db expects, usually the same folder as the metadata.db file (/books in container, ./books for dev environments).\n3. If you want to start with a fresh (empty) library, choose \"Start fresh\". A new metadata.db file with a unique uuid is created.\n4. It is recommended you go to the settings page and set up email so you can easily reset passwords, etc.\n\n## Set up a development environment\n### 1. Clone repository\n\n`git clone https://codeberg.org/bookbag/bookbag.git && cd bookbag`\n\n### 2. Install system dependencies*\n\n- **Debian 13:** `sudo apt install -y python3-dev gcc g++ libffi-dev libmagic-dev libxml2-dev libxslt1-dev imagemagick libmagickwand-dev libldap2-dev libsasl2-dev unrar-free`\n\n- **Fedora 43:** `sudo dnf install -y python3-devel gcc gcc-c++ openssl-devel cyrus-sasl-devel libffi-devel libxml2-devel libxslt-devel ImageMagick ImageMagick-devel openldap-devel`\n\n- **MacOS:** `xcode-select --install` and `brew install python libmagic imagemagick libxml2 libxslt libffi openssl`\n\n*These are general guidelines, package names and requirements may vary based on your system. If you are missing system dependencies, pip installs in step 3 may fail.\n\n### 3. Create venv and install python packages\n\nLinux\n```\npython -m venv venv\nsource venv/bin/activate\npip install -r requirements.txt -r optional-requirements.txt\n```\n\nMacOS\n```\n$(brew --prefix python@3.14)/bin/python3 -m venv venv\nsource venv/bin/activate\npip install -r requirements.txt -r optional-requirements.txt\n```\n\nIf builds in this stage fail, it is likely that you are missing a system dependency, go back to step 2.\n\n### 4. Define environment\n`echo \"BOOKBAG_LIBRARY_PATH=/FULL/PATH/TO/PROJECT/books\" > .env`\n\n### 5. Start server in debug mode\n\n`FLASK_DEBUG=1 python cps.py`\n\n## License\n\nBookbag is a fork of [Calibre-Web](https://github.com/janeczku/calibre-web) and is licensed under the [GPL v3 License](LICENSE).\n\nMany thanks to the following projects:\n- [Calibre-Web](https://github.com/janeczku/calibre-web) тАФ [GPL v3](LICENSE)\n- [Inter](https://github.com/rsms/inter) тАФ [SIL Open Font License 1.1](cps/static/fonts/Inter/OFL.txt)\n- [Comfortaa](https://github.com/alexeiva/comfortaa) тАФ [SIL Open Font License 1.1](cps/static/fonts/Comfortaa/OFL.txt)\n- [Phosphor Icons](https://phosphoricons.com/) тАФ [MIT License](LICENSE-PHOSPHOR-ICONS.txt)","summary":"Bookbag is a selfтАСhosted, privacyтАСfocused fork of CalibreтАСWeb that brings a completely redesigned user interface while keeping core ebookтАСmanagement features. It offers instant filtering, search, and resizing of book covers, an advanced metadata search, a singleтАСpage settings hub, a setup wizard, and a customizable web reader with font, theme, and layout controls. The platform retains key CalibreтАСWeb functions such as Kobo sync, emailтАСtoтАСeтАСreader, magic links, LDAP, and OAuth, and is built for easy Docker deployment. Ideal for home media enthusiasts, small libraries, or anyone wanting a modern, telemetryтАСfree ebook server.","description":"Fork of Calibre-Web Focused on UI and UX improvements.","stars":49,"language":"Python"},{"owner":"Portabase","repo":"portabase","url":"https://github.com/Portabase/portabase","readme":"<br />\n<div align=\"center\">\n  <a href=\"https://portabase.io\">\n    <img src=\"/.github/assets/logo.png\" alt=\"Logo\" width=\"80\" height=\"80\">\n  </a>\n\n<h3 align=\"center\">Portabase</h3>\n\n  <p align=\"center\" style=\"margin-top: 20px; font-style: italic;\">\n  <i>Portabase is a tool designed to simplify the backup and restoration of your database instances. It integrates seamlessly with <a href=\"https://github.com/Portabase/agent-rust\">Portabase agents</a> for managing operations securely and efficiently.</i>\n  </p>\n\n\n[![License: Apache](https://img.shields.io/badge/License-apache-yellow.svg)](LICENSE)\n[![Docker Pulls](https://img.shields.io/docker/pulls/portabase/portabase?color=brightgreen)](https://hub.docker.com/r/portabase/portabase)\n[![Helm Chart](https://img.shields.io/badge/Helm-Kubernetes-326ce5?logo=helm&logoColor=white)](https://github.com/Portabase/portabase/pkgs/container/charts%2Fportabase)\n[![Platform](https://img.shields.io/badge/platform-linux%20%7C%20macos%20%7C%20windows-lightgrey)](https://github.com/Portabase/portabase)\n[![Support Portabase](https://img.shields.io/badge/Support-Portabase-orange)](https://www.buymeacoffee.com/portabase)\n\n[![PostgreSQL](https://img.shields.io/badge/PostgreSQL-336791?logo=postgresql&logoColor=white)](https://www.postgresql.org/)\n[![MySQL](https://img.shields.io/badge/MySQL-4479A1?logo=mysql&logoColor=white)](https://www.mysql.com/)\n[![MariaDB](https://img.shields.io/badge/MariaDB-003545?logo=mariadb&logoColor=white)](https://mariadb.org/)\n[![SQLite](https://img.shields.io/badge/-SQLite-blue?logo=sqlite&logoColor=white)](https://sqlite.org/)\n[![Redis](https://img.shields.io/badge/Redis-DC382D?style=flat&logo=Redis&logoColor=white)](https://redis.io/)\n[![MongoDB](https://img.shields.io/badge/-MongoDB-13aa52?logo=mongodb&logoColor=white)](https://www.mongodb.com/)\n[![Valkey](https://img.shields.io/badge/Valkey-6284fc?style=flat&logo=Valkey&logoColor=white)](https://valkey.io/)\n[![Firebird](https://img.shields.io/badge/Firebird-f55b14?style=flat&logo=Firebird&logoColor=white)](https://firebirdsql.org/)\n\n[![Self Hosted](https://img.shields.io/badge/self--hosted-yes-brightgreen)](https://github.com/Portabase/portabase)\n[![Open Source](https://img.shields.io/badge/open%20source-тЭдя╕П-red)](https://github.com/Portabase/portabase)\n\n[![NextJS][NextJS]][NextJS-url]\n[![BetterAuth][BetterAuth]][BetterAuth-url]\n[![Drizzle][Drizzle]][Drizzle-url]\n[![ShadcnUI][ShadcnUI]][ShadcnUI-url]\n[![Docker][Docker]][Docker-url]\n\n  <p>\n    <strong>\n        <a href=\"https://portabase.io\">Website</a> тАв\n        <a href=\"https://portabase.io/docs\">Documentation</a> тАв\n        <a href=\"https://www.youtube.com/watch?v=nSTzT27GgAg\">Demo</a> тАв\n        <a href=\"https://portabase.io/docs/dashboard/setup\">Installation</a> тАв\n        <a href=\"https://github.com/Portabase/portabase/issues/new?labels=bug&template=bug-report---.md\">Report Bug</a> тАв\n        <a href=\"https://github.com/Portabase/portabase/issues/new?labels=enhancement&template=feature-request---.md\">Request Feature</a>\n    </strong>\n  </p>\n\n![portabase-dashboard](https://github.com/user-attachments/assets/8f2c69d6-f1f9-4b80-b51c-01f6f13b9b62)\n\n\n</div>\n\n## Installation\n\nYou have 4 ways to install Portabase:\n\n- Automated CLI (recommended) - [details](https://portabase.io/docs/dashboard/setup#cli)\n- Docker Run - [details](https://portabase.io/docs/dashboard/setup#docker)\n- Docker Compose setup - [details](https://portabase.io/docs/dashboard/setup#docker-compose)\n- Kubernetes with Helm [details](https://portabase.io/docs/dashboard/setup#helm)\n- Development setup - [details](https://portabase.io/docs/dashboard/setup#development)\n\n**Ensure Docker is installed on your machine before getting started.**\n\n## Supported databases\n\n| Engine             | Support    | Supported Versions            | Restore |\n|:-------------------|:-----------|:------------------------------|:--------|\n| **PostgreSQL**     | тЬЕ Stable   | 12, 13, 14, 15, 16, 17 and 18 | Yes     |\n| **MySQL**          | тЬЕ Stable   | 5.7, 8 and 9                  | Yes     |\n| **MariaDB**        | тЬЕ Stable   | 10 and 11                     | Yes     |\n| **MongoDB**        | тЬЕ Stable   | 4, 5, 6, 7 and 8              | Yes     |\n| **SQLite**         | тЬЕ Stable   | 3.x                           | Yes     |\n| **Redis**          | тЬЕ Stable   | 2.8+                          | No      |\n| **Valkey**         | тЬЕ Stable   | 7.2+                          | No      |\n| **Firebird**       | тЬЕ Stable   | 3.0, 4.0, 5.0                 | Yes     |\n| **MSSQL Server**   | тЭМ Ongoing  | -                             | Yes     |\n\nSee the [Database Servers documentation](https://portabase.io/docs/agent/db) for version-specific backup and restore details.\n\n## Contributors\n\n[![Contributors](https://contrib.rocks/image?repo=Portabase/portabase)](https://github.com/Portabase/portabase/graphs/contributors)\n\n[![\"Support Portabase\"](https://www.buymeacoffee.com/assets/img/custom_images/orange_img.png)](https://www.buymeacoffee.com/portabase)\n\n## License\n\nDistributed under the Apache License. See `LICENSE.txt` for more details.\n\n\n[Docker]: https://img.shields.io/badge/Docker-2496ED?logo=docker&logoColor=fff&style=for-the-badge\n\n[NextJS]: https://img.shields.io/badge/next.js-000000?style=for-the-badge&logo=nextdotjs&logoColor=white\n\n[BetterAuth]: https://img.shields.io/badge/Better%20Auth-FFF?logo=betterauth&logoColor=000&style=for-the-badge\n\n[Drizzle]: https://img.shields.io/badge/Drizzle-111?style=for-the-badge&logo=Drizzle&logoColor=c5f74f\n\n[ShadcnUI]: https://img.shields.io/badge/shadcn/ui-000000?style=for-the-badge&logo=shadcn/ui&logoColor=white\n\n[NextJS-url]: https://nextjs.org/\n\n[BetterAuth-url]: https://www.better-auth.com/\n\n[Drizzle-url]: https://orm.drizzle.team/\n\n[ShadcnUI-url]: https://ui.shadcn.com/\n\n[Docker-url]: https://www.docker.com/\n","summary":"Portabase is a selfтАСhosted backup and restoration platform that streamlines backup workflows across a wide range of database engines, from PostgreSQL and MySQL to Redis and MongoDB. It offers an intuitive dashboard, automated CLI utilities, Docker, DockerтАСCompose, and Helm charts, making deployment straightforward on Linux, macOS, or Windows. Key capabilities include scheduled backups, secure agent integration, and instant restore operations for supported engines. The tool is ideal for database administrators, developers, and DevOps teams who need a reliable, openтАСsource solution for managing database backups in production or development environments.","description":"Portabase - Database backup & restore tool for PostgreSQL, MySQL, MariaDB, Firebird SQL, SQLite, MongoDB, Redis and Valkey (more engines coming soon ЁЯЪА)","stars":733,"language":"TypeScript"},{"owner":"CodeWithCJ","repo":"SparkyFitness","url":"https://github.com/CodeWithCJ/SparkyFitness","readme":"<div align=\"right\">\n  <details>\n    <summary >ЁЯМР Language</summary>\n    <div>\n      <div align=\"right\">\n        <p><a href=\"https://openaitx.github.io/view.html?user=CodeWithCJ&project=SparkyFitness&lang=en\">English</a></p>\n        <p><a href=\"https://openaitx.github.io/view.html?user=CodeWithCJ&project=SparkyFitness&lang=zh-CN\">чоАф╜Уф╕нцЦЗ</a></p>\n        <p><a href=\"https://openaitx.github.io/view.html?user=CodeWithCJ&project=SparkyFitness&lang=zh-TW\">ч╣БщлФф╕нцЦЗ</a></p>\n        <p><a href=\"https://openaitx.github.io/view.html?user=CodeWithCJ&project=SparkyFitness&lang=ja\">цЧецЬмшкЮ</a></p>\n        <p><a href=\"https://openaitx.github.io/view.html?user=CodeWithCJ&project=SparkyFitness&lang=ko\">эХЬъ╡ньЦ┤</a></p>\n        <p><a href=\"https://openaitx.github.io/view.html?user=CodeWithCJ&project=SparkyFitness&lang=hi\">рд╣рд┐рдиреНрджреА</a></p>\n        <p><a href=\"https://openaitx.github.io/view.html?user=CodeWithCJ&project=SparkyFitness&lang=th\">р╣Др╕Чр╕в</a></p>\n        <p><a href=\"https://openaitx.github.io/view.html?user=CodeWithCJ&project=SparkyFitness&lang=fr\">Fran├зais</a></p>\n        <p><a href=\"https://openaitx.github.io/view.html?user=CodeWithCJ&project=SparkyFitness&lang=de\">Deutsch</a></p>\n        <p><a href=\"https://openaitx.github.io/view.html?user=CodeWithCJ&project=SparkyFitness&lang=es\">Espa├▒ol</a></p>\n        <p><a href=\"https://openaitx.github.io/view.html?user=CodeWithCJ&project=SparkyFitness&lang=it\">Italiano</a></p>\n        <p><a href=\"https://openaitx.github.io/view.html?user=CodeWithCJ&project=SparkyFitness&lang=ru\">╨а╤Г╤Б╤Б╨║╨╕╨╣</a></p>\n        <p><a href=\"https://openaitx.github.io/view.html?user=CodeWithCJ&project=SparkyFitness&lang=pt\">Portugu├кs</a></p>\n        <p><a href=\"https://openaitx.github.io/view.html?user=CodeWithCJ&project=SparkyFitness&lang=nl\">Nederlands</a></p>\n        <p><a href=\"https://openaitx.github.io/view.html?user=CodeWithCJ&project=SparkyFitness&lang=pl\">Polski</a></p>\n        <p><a href=\"https://openaitx.github.io/view.html?user=CodeWithCJ&project=SparkyFitness&lang=ar\">╪з┘Д╪╣╪▒╪и┘К╪й</a></p>\n        <p><a href=\"https://openaitx.github.io/view.html?user=CodeWithCJ&project=SparkyFitness&lang=fa\">┘Б╪з╪▒╪│█М</a></p>\n        <p><a href=\"https://openaitx.github.io/view.html?user=CodeWithCJ&project=SparkyFitness&lang=tr\">T├╝rk├зe</a></p>\n        <p><a href=\"https://openaitx.github.io/view.html?user=CodeWithCJ&project=SparkyFitness&lang=vi\">Tiс║┐ng Viс╗Зt</a></p>\n        <p><a href=\"https://openaitx.github.io/view.html?user=CodeWithCJ&project=SparkyFitness&lang=id\">Bahasa Indonesia</a></p>\n      </div>\n    </div>\n  </details>\n</div>\n\n# SparkyFitness\n\nA self-hosted, privacy-first alternative to MyFitnessPal. Track nutrition, exercise, body metrics, and health data while keeping full control of your data.\n\n![Screenshot](docs/public/web_screenshot.png)\n\nSparkyFitness is a self-hosted fitness tracking platform made up of:\n\n- A backend server (API + data storage)\n- A web-based frontend\n- Native mobile apps for iOS and Android\n\nIt stores and manages health data on infrastructure you control, without relying on third party services.\n\n## Core Features\n\n- Nutrition, exercise, hydration, sleep, fasting, mood and body measurement tracking\n- Goal setting and daily check-ins\n- Interactive charts and long-term reports\n- Multiple user profiles and family access\n- Light and dark themes\n- OIDC, TOTP, Passkey, MFA etc.\n\n## Health & Device Integrations\n\nSparkyFitness can sync data from multiple health and fitness platforms:\n\n- **Apple Health** (iOS)\n- **Google Health Connect** (Android)\n- **Fitbit**\n- **Garmin Connect**\n- **Withings**\n- **Polar Flow** (partially tested)\n- **Hevy** (not tested)\n- **OpenFoodFacts**\n- **USDA**\n- **Fatsecret**\n- **Nutritioninx**\n- **Mealie**\n- **Tandoor**\n- **Strava** (partially tested)\n\nIntegrations automatically sync activity data such as steps, workouts, and sleep, along with health metrics like weight and body measurements, to your SparkyFitness server.\n\n## Optional AI Features (Beta)\n\nSparkyAI provides a conversational interface for logging data and reviewing progress.\n\n- Log food, exercise, body stats, and steps via chat\n- Upload food images for automatic meal logging\n- Retains conversation history for follow ups\n\nNote: AI features are currently in beta.\n\n## Quick Start (Server)\n\nGet a SparkyFitness server running in minutes using Docker Compose.\n\n```bash\n# 1. Create a new folder\nmkdir sparkyfitness && cd sparkyfitness\n\n# 2. Download Docker files only\ncurl -L -o docker-compose.yml https://github.com/CodeWithCJ/SparkyFitness/releases/latest/download/docker-compose.prod.yml\ncurl -L -o .env https://github.com/CodeWithCJ/SparkyFitness/releases/latest/download/default.env.example\n\n# 3. (Optional) Edit .env to customize database credentials, ports, etc.\n\n# 4. Start the app\ndocker compose pull && docker compose up -d\n\n# Access application at http://localhost:8080\n```\n\n\n## ЁЯОе Video Tutorial\n\n[![Watch the video](https://img.youtube.com/vi/B13IiL2DeQc/maxresdefault.jpg)](https://www.youtube.com/watch?v=B13IiL2DeQc)\n\nQuick 2-minute tutorial showing how to install SparkyFitness (self-hosted fitness tracker).\n\n\n## Documentation\n\nFor full installation guides, configuration options, and development docs, please visit our [Documentation Site](https://codewithcj.github.io/SparkyFitness/).\n\n### Quick Links\n\n- **[Installation Guide](https://codewithcj.github.io/SparkyFitness/install/docker-compose)** - Deployment and configurations\n- **[Features Overview](https://codewithcj.github.io/SparkyFitness/features)** - Complete feature documentation\n- **[Development Workflow](https://codewithcj.github.io/SparkyFitness/developer/getting-started)** - Developer guide and contribution process\n- **[iOS App Info](https://github.com/CodeWithCJ/SparkyFitness/wiki/Apple-Health-Integration)** and **[Android App Info](https://github.com/CodeWithCJ/SparkyFitness/wiki/Android-Mobile-App)**\n\n### Need Help?\n\n- Post in Github issues/discussion.\n- For faster response and get help from other community memebers **[Join our Discord](https://discord.gg/vcnMT5cPEA)**\n\n## Star History\n\n<a href=\"https://star-history.com/#CodeWithCJ/SparkyFitness&Date\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=CodeWithCJ/SparkyFitness&type=Date&theme=dark\" />\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=CodeWithCJ/SparkyFitness&type=Date\" />\n    <img alt=\"Star History Chart\" src=\"https://api.star-history.com/svg?repos=CodeWithCJ/SparkyFitness&type=Date\" width=\"100%\" />\n  </picture>\n</a>\n\n## Translations\n\n**[Weblate Translations](https://hosted.weblate.org/engage/sparkyfitness)**\n\n<a href=\"https://hosted.weblate.org/engage/sparkyfitness/\">\n<img src=\"https://hosted.weblate.org/widget/sparkyfitness/sparkyfitness-translations/multi-auto.svg\" alt=\"Translation status\" />\n</a>\n\n## Repository activity\n\n![Alt](https://repobeats.axiom.co/api/embed/828203d3070ff56c8873c727b6873b684c4ed399.svg \"Repobeats analytics image\")\n\n## Contributors\n\n<a href=\"https://github.com/CodeWithCJ/SparkyFitness/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=CodeWithCJ/SparkyFitness\" width=\"100%\"/>\n</a>\n\n## тЪая╕П Known Issues / Beta Features тЪая╕П\n\nSparkyFitness is under active development.\nBreaking changes may occur between releases.\n\n- Auto-updating containers is not recommended\n- Always review release notes before upgrading\n\nThe following features are currently in beta and may not have been thoroughly tested. Expect potential bugs or incomplete functionality:\n\n- AI Chatbot\n- Family & Friends access\n- API documentation\n","summary":"SparkyFitness is a selfтАСhosted, privacyтАСfirst fitness tracker that lets users log nutrition, exercise, hydration, sleep, mood, fasting, and body measurements without relying on thirdтАСparty services. It includes a full stack of a backend API, a web frontend, and native iOS/Android apps, offering goal setting, daily checkтАСins, interactive charts, longтАСterm reports, family profiles, and strong authentication options such as OIDC, TOTP, and passkeys. The platform can automatically sync data from popular health servicesтАФincluding Apple Health, Google Health Connect, Fitbit, and Garmin ConnectтАФand from food databases like USDA and OpenFoodFacts. PrivacyтАСconscious health practitioners, fitness apps developers, and users who prefer to keep all their health data on personal infrastructure will benefit most from this openтАСsource solution.","description":"SparkyFitness: Built for Families. Powered by AI. Track food, fitness, water, and health тАФ together.","stars":3241,"language":"TypeScript"},{"owner":"jeffvli","repo":"feishin","url":"https://github.com/jeffvli/feishin","readme":"<img src=\"assets/icons/icon.png\" alt=\"logo\" title=\"feishin\" align=\"right\" height=\"60px\" width=\"60px\" />\n\n# Feishin\n\n  <p align=\"center\">\n    <a href=\"https://github.com/jeffvli/feishin/blob/main/LICENSE\">\n      <img src=\"https://img.shields.io/github/license/jeffvli/feishin?style=flat-square&color=brightgreen\"\n      alt=\"License\">\n    </a>\n      <a href=\"https://github.com/jeffvli/feishin/releases\">\n      <img src=\"https://img.shields.io/github/v/release/jeffvli/feishin?style=flat-square&color=blue\"\n      alt=\"Release\">\n    </a>\n    <a href=\"https://github.com/jeffvli/feishin/releases\">\n      <img src=\"https://img.shields.io/github/downloads/jeffvli/feishin/total?style=flat-square&color=orange\"\n      alt=\"Downloads\">\n    </a>\n  </p>\n  <p align=\"center\">\n    <a href=\"https://discord.gg/FVKpcMDy5f\">\n      <img src=\"https://img.shields.io/discord/922656312888811530?color=black&label=discord&logo=discord&logoColor=white\"\n      alt=\"Discord\">\n    </a>\n    <a href=\"https://matrix.to/#/#sonixd:matrix.org\">\n      <img src=\"https://img.shields.io/matrix/sonixd:matrix.org?color=black&label=matrix&logo=matrix&logoColor=white\"\n      alt=\"Matrix\">\n    </a>\n  </p>\n\n---\n\nRewrite of [Sonixd](https://github.com/jeffvli/sonixd).\n\n## Features\n\n- [x] MPV player backend\n- [x] Web player backend\n- [x] Modern UI\n- [x] Scrobble playback to your server\n- [x] Smart playlist editor (Navidrome)\n- [x] Synchronized and unsynchronized lyrics support\n- [ ] [Request a feature](https://github.com/jeffvli/feishin/issues) or [view taskboard](https://github.com/users/jeffvli/projects/5/views/1)\n\n## Screenshots\n\n<a href=\"./media/preview_full_screen_player.png\"><img src=\"./media/preview_full_screen_player.png\" width=\"49.5%\"/></a> <a href=\"./media/preview_album_artist_detail.png\"><img src=\"./media/preview_album_artist_detail.png\" width=\"49.5%\"/></a> <a href=\"./media/preview_album_detail.png\"><img src=\"./media/preview_album_detail.png\" width=\"49.5%\"/></a> <a href=\"./media/preview_smart_playlist.png\"><img src=\"./media/preview_smart_playlist.png\" width=\"49.5%\"/></a>\n\n## Getting Started\n\n### Desktop (recommended)\n\nDownload the [latest desktop client](https://github.com/jeffvli/feishin/releases). The desktop client is the recommended way to use Feishin. It supports both the MPV and web player backends, as well as includes built-in fetching for lyrics.\n\n#### macOS Notes\n\nIf you're using a device running macOS 12 (Monterey) or higher, [check here](https://github.com/jeffvli/feishin/issues/104#issuecomment-1553914730) for instructions on how to remove the app from quarantine.\n\nFor media keys to work, you will be prompted to allow Feishin to be a Trusted Accessibility Client. After allowing, you will need to restart Feishin for the privacy settings to take effect.\n\n#### Linux Notes\n\nFeishin is available in [Flathub](https://flathub.org/en/apps/org.jeffvli.feishin).\n\nAlternatively, you can install it as an Appimage.\nWe provide a small install script to download the latest `.AppImage`, make it executable, and also download the icons required by Desktop Environments.\nFinally, it generates a `.desktop` file to add Feishin to your Application Launcher.\n\nSimply run the installer like this:\n\n```sh\ndir=/your/application/directory\ncurl 'https://raw.githubusercontent.com/jeffvli/feishin/refs/heads/development/install-feishin-appimage' | sh -s -- \"$dir\"\n```\n\nThe script also has an option to add launch arguments to run Feishin in native Wayland mode. Note that this is experimental in Elect
