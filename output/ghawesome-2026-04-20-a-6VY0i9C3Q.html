eeds Not Working:** Ensure RSS feed URLs are valid and accessible\n* **Email Auth Failed:** Use a **Google App Password**, not your main password. Ensure 2FA is enabled\n* **Calendar Not Showing Events:** Verify iCal URL is correct. Check that events exist in the date range\n* **Weather Wrong:** Check `config.json` Lat/Long via UI location search feature\n\n---\n","summary":" PC-1 (Paper Console 1) is a self-hosted thermal printer that delivers daily information like news, weather, puzzles, and personal notes onto physical paper without requiring screens or subscriptions. Built with quality materials including walnut, brass, and archival-grade paper, the device features a rotary dial and push button interface for selecting from configurable channels such as email, RSS feeds, sudoku, and system monitoring. Users control the open-source software via a web interface to customize content sources using their own API keys, while a mock mode allows testing the logic without hardware. This project appeals to hobbyists and minimalists seeking a tangible, distraction-free alternative to digital displays for consuming daily information.","description":"A small, self-hosted thermal printer for news, weather, puzzles, email, and more.","stars":254,"language":"Python"},{"owner":"Cirx08","repo":"WeddingShare","url":"https://github.com/Cirx08/WeddingShare","readme":"# WeddingShare\n\n<br />![Banner](rebranding_banner.png)\n\n## WeddingShare is Rebranding to Memtly\n\nDue to high demand from non-wedding events `WeddingShare` is rebranding to `Memtly`.\n\n### Where can I find the new repository?\n\nTo  check out the new look please visit the new repository at - [Memtly.Community](https://github.com/Memtly/Memtly.Community)\n\n### Why are we rebranding?\nWe're doing this to be more generic whilst also taking  the opportunity to restructure and upgrade  the frontend and backend.\n\nFor a full list of rebrand reasons you can visit:\n\nhttps://docs.memtly.com/docs/intro#why-rebrand--rename\n\n## Memtly.Community\n\nhttps://github.com/Memtly/Memtly.Community","summary":" WeddingShare is an event photo sharing platform currently rebranding to Memtly in order to support memory collection for diverse gatherings beyond weddings. It provides a full-stack solution with dedicated frontend and backend components for creating collaborative albums where attendees can share photos from celebrations. The platform benefits event organizers and guests seeking a centralized, private space to collect and view memories from weddings, parties, and other social occasions. Active development has moved to the Memtly.Community repository, where the codebase is being restructured and upgraded to accommodate this expanded scope.","description":"A place for guests to view and drop pictures of the big day","stars":869,"language":"C#"},{"owner":"whwangovo","repo":"pyre-code","url":"https://github.com/whwangovo/pyre-code","readme":"[English](./README.md) | [中文](./README_CN.md)\n\n<p align=\"center\">\n  <h1 align=\"center\">🔥 Pyre Code</h1>\n  <p align=\"center\">\n    Implement the internals of modern AI systems from scratch — Transformers, vLLM, TRL, and beyond.\n  </p>\n  <p align=\"center\">\n    <em>Read the paper, then write the code. No GPU required.</em>\n  </p>\n  <p align=\"center\">\n    <a href=\"https://star-history.com/#whwangovo/pyre-code&Date\">\n      <img src=\"https://img.shields.io/github/stars/whwangovo/pyre-code?style=social\" alt=\"GitHub stars\" />\n    </a>\n  </p>\n</p>\n\n---\n\n## 🧠 What is Pyre Code?\n\n68 problems. You write the implementation, a local grading service runs the tests, you see what broke. That's it.\n\nThe problems cover what's actually inside Transformers, vLLM, TRL, and diffusion models — attention variants, training tricks, inference kernels, alignment algorithms. No GPU needed.\n\n### Who is this for?\n\n- **Preparing for ML interviews** — practice implementing core components under test, not just reading about them\n- **Learning by building** — if you learn best by writing code rather than watching lectures, this is your gym\n- **Deepening your understanding** — you've used `nn.MultiheadAttention`, now write it yourself\n\n### Features\n\n- **Browser editor** — Monaco with Python syntax highlighting, no IDE setup\n- **Instant feedback** — submit and see pass/fail per test case in seconds\n- **Reference solutions** — compare after your own attempt\n- **Progress tracking** — solved count and attempt history, persisted across sessions\n- **AI Help** — optional AI-powered hints via any OpenAI-compatible API (configure in `.env` or per-user in the UI)\n- **Fully local** — nothing leaves your machine (unless you opt into AI Help)\n\n### Tech Stack\n\n| Layer        | Technology                                                                           |\n| ------------ | ------------------------------------------------------------------------------------ |\n| Frontend     | Next.js + Monaco Editor + Tailwind CSS                                               |\n| Backend      | FastAPI grading service                                                              |\n| Judge Engine | [torch_judge](https://github.com/duoan/TorchCode) — executes and validates submissions |\n| Storage      | SQLite (progress tracking)                                                           |\n\n---\n\n## 📢 News\n\n- **[2026/04/13]** Submission history — review all your past attempts per problem.\n- **[2026/04/10]** AI Help — optional AI-powered hints via any OpenAI-compatible API. 🔥\n- **[2026/04/10]** Print output capture — `print()` statements now show in test results.\n- **[2026/04/09]** 68 problems covering Transformers, vLLM, TRL, diffusion models, and more. 🔥\n- **[2026/04/09]** Initial release of Pyre Code 🎉\n\n---\n\n## 🚀 Getting Started\n\n### Prerequisites\n\n- Python 3.11+\n- Node.js 18+\n\n### Installation\n\n**Option A — one-liner (recommended)**\n\n```bash\ngit clone https://github.com/whwangovo/pyre-code.git\ncd pyre-code\n./setup.sh\nnpm run dev\n```\n\n`setup.sh` automatically creates a `.venv` Python environment (prefers `uv`, falls back to `python3 -m venv`), installs all dependencies, then prints the start command.\n\nWhen `.venv` exists, `npm run dev` prefers that project-local Python automatically. If `.venv` is missing, it falls back to the current shell's `python`.\n\n**Option B — conda**\n\n```bash\ngit clone https://github.com/whwangovo/pyre-code.git\ncd pyre-code\nconda create -n pyre python=3.11 -y && conda activate pyre\npip install -e \".[dev]\"\nnpm install\nnpm run dev   # run with conda env activated\n```\n\n**Option C — manual (venv)**\n\n```bash\ngit clone https://github.com/whwangovo/pyre-code.git\ncd pyre-code\n\n# create a Python env — pick one:\nuv venv --python 3.11 .venv && source .venv/bin/activate && uv pip install -e \".[dev]\"\n# or: python3 -m venv .venv && source .venv/bin/activate && pip install -e \".[dev]\"\n\nnpm install\nnpm run dev\n```\n\nEither way, once running:\n\n- **Grading service** → `http://localhost:8000`\n- **Web app** → `http://localhost:3000`\n\n**Option D — Docker**\n\n```bash\ngit clone https://github.com/whwangovo/pyre-code.git\ncd pyre-code\ndocker compose up --build\n```\n\nOpen `http://localhost:3000`. Progress is persisted in a Docker volume. Run `docker compose down -v` to reset.\n\n### AI Help (optional)\n\nTo enable server-side AI hints, copy `web/.env.example` to `web/.env` and fill in:\n\n```bash\nAI_HELP_BASE_URL=https://api.openai.com/v1\nAI_HELP_API_KEY=sk-...\nAI_HELP_MODEL=gpt-4o-mini\n```\n\nAny OpenAI-compatible endpoint works (OpenAI, Anthropic via proxy, Ollama, etc.). Users can also configure their own API key in the UI if no server-side config is set.\n\n---\n\n## 📋 Problem Set\n\n68 problems organized by category:\n\n| Category | Problems |\n|---|---|\n| **Fundamentals** | ReLU, Softmax, GELU, SwiGLU, Dropout, Embedding, Linear, Kaiming Init, Linear Regression |\n| **Normalization** | LayerNorm, BatchNorm, RMSNorm |\n| **Attention** | Scaled Dot-Product, Multi-Head, Causal, Cross, GQA, Sliding Window, Linear, Flash, Differential, MLA |\n| **Position Encoding** | Sinusoidal PE, RoPE, ALiBi, NTK-aware RoPE |\n| **Architecture** | SwiGLU MLP, GPT-2 Block, ViT Patch, ViT Block, Conv2D, Max Pool, Depthwise Conv, MoE, MoE Load Balance |\n| **Training** | Adam, Cosine LR, Gradient Clipping, Gradient Accumulation, Mixed Precision, Activation Checkpointing |\n| **Distributed** | Tensor Parallel, FSDP, Ring Attention |\n| **Inference** | KV Cache, Top-k Sampling, Beam Search, Speculative Decoding, BPE, INT8 Quantization, Paged Attention |\n| **Loss & Alignment** | Cross Entropy, Label Smoothing, Focal Loss, Contrastive Loss, DPO, GRPO, PPO, Reward Model |\n| **Diffusion & DiT** | Noise Schedule, DDIM Step, Flow Matching, adaLN-Zero |\n| **Adaptation** | LoRA, QLoRA |\n| **Reasoning** | MCTS, Multi-Token Prediction |\n| **SSM** | Mamba SSM |\n\n### Learning Paths\n\nPick one based on what you're working toward:\n\n| Path | Problems | Description |\n|---|---|---|\n| **Transformer Internals** | 12 | Activations → Normalization → Attention → GPT-2 Block |\n| **Attention & Position Encoding** | 13 | Every attention variant + RoPE, ALiBi, NTK-RoPE |\n| **Train a GPT from Scratch** | 15 | Embeddings → architecture → loss → optimizer → training tricks |\n| **Inference & Distributed Training** | 9 | KV cache, quantization, sampling, tensor parallel, FSDP |\n| **Alignment & Agent Reasoning** | 6 | Reward model → DPO → GRPO → PPO → MCTS |\n| **Vision Transformer Pipeline** | 7 | Conv → patch embedding → ViT block |\n| **Diffusion Models & DiT** | 5 | Noise schedule → DDIM → flow matching → adaLN-Zero |\n| **LLM Frontier Architectures** | 7 | GQA, Differential Attention, MLA, MoE, Multi-Token Prediction |\n\n```\nNot sure where to start?\n\nFundamentals ──→ Transformer Internals ──→ Train a GPT from Scratch\n                       │                          │\n                       ▼                          ▼\n              Attention & Position       Inference & Distributed\n                       │                          │\n                       ▼                          ▼\n              LLM Frontier Archs         Alignment & Reasoning\n                       │\n               ┌───────┴───────┐\n               ▼               ▼\n     Vision Transformer   Diffusion & DiT\n```\n\n---\n\n## ⚙️ Configuration\n\n| Variable                | Default                   | Description                           |\n| ----------------------- | ------------------------- | ------------------------------------- |\n| `GRADING_SERVICE_URL` | `http://localhost:8000` | Grading service URL                   |\n| `DB_PATH`             | `./data/pyre.db`   | SQLite database for progress tracking |\n\nSet in `web/.env.local` to override.\n\n---\n\n## 📁 Project Structure\n\n```\npyre/\n├── web/                  # Next.js frontend\n│   ├── src/app/          # Pages and API routes\n│   ├── src/components/   # UI components\n│   └── src/lib/          # Utilities, problem data\n├── grading_service/      # FastAPI backend\n├── torch_judge/          # Judge engine (problem definitions + test runner)\n└── package.json          # Dev scripts (runs frontend + backend concurrently)\n```\n\n---\n\n## 🤝 Contributing\n\nContributions are welcome! Here are some ways you can help:\n\n- **Submit a new problem** — open a PR with the problem definition and test cases in `torch_judge/`\n- **Report a bug** — [open an issue](https://github.com/whwangovo/pyre-code/issues) with steps to reproduce\n- **Fix a bug** — fork, fix, and submit a PR\n- **Improve docs** — typos, clarifications, translations\n\nPlease open an issue first for larger changes so we can discuss the approach.\n\n---\n\n## ⭐ Star History\n\n![GitHub stars](https://img.shields.io/github/stars/whwangovo/pyre-code?style=social)\n\n[![Star History Chart](https://api.star-history.com/svg?repos=whwangovo/pyre-code&type=Date)](https://star-history.com/#whwangovo/pyre-code&Date)\n\n---\n\n## 🙏 Acknowledgements\n\nProblem set and judge engine based on [TorchCode](https://github.com/duoan/TorchCode) by [duoan](https://github.com/duoan), licensed under MIT.\n\n---\n\n## 📄 License\n\nDistributed under the MIT License. See [LICENSE](LICENSE) for more information.\n","summary":" Pyre Code is a local, browser-based coding platform featuring 68 hands-on problems that challenge users to implement core AI components—such as Transformers, vLLM, and diffusion models—from scratch without requiring GPUs. It combines a Monaco editor with a FastAPI grading service that delivers instant test feedback, tracks progress via SQLite, and offers optional AI hints through OpenAI-compatible APIs. Ideal for developers preparing for ML interviews or those who learn best by building, it serves as an interactive gym for mastering the low-level internals of modern machine learning systems through direct implementation rather than passive study.","description":"A self-hosted ML coding practice platform. 68 problems from ReLU to flow matching — attention, training, RLHF, diffusion, and more. Instant feedback in the browser.","stars":824,"language":"Python"},{"owner":"ethereal-squirrel","repo":"devourer-reader-server","url":"https://github.com/ethereal-squirrel/devourer-reader-server","readme":"# Devourer (Server)\n\nA library server providing a highly performant system to archive, scan and catalog your books, manga, comics and audiobooks.\n\nV2 is a fundamental rebuild of the server architecture and tooling, moving from Node.js to Go in order to get around... far too many packaging issues.\n\n> **Important:** Upon running the server for the first time, make note of the automatically generated username, password, and API key printed to the console. You'll need these to connect with a client.\n\n## Features\n\n- A fast library server written in Go.\n- Simple REST API for all client interactions.\n- SQLite-powered storage with WAL mode for concurrency.\n- Supports multiple users with role-based access control.\n- Retrieves relevant cover images and generates preview images for each archive.\n- Automatically retrieves metadata from various providers.\n- Supports libraries and collections. A library is a repository of audiobooks, books or comics/manga; collections exist within libraries.\n- Built-in SPA client served at `/client`.\n- File system watcher for automatic library updates.\n- Supports Windows, Linux and Mac.\n\n### Manga / Comic Features\n\n- Supports `.zip`, `.cbz`, `.rar`, `.cbr`, `.7z`, and `.cb7` archives.\n- Streams selected archives back to the client.\n\n### Book Features\n\n- Supports EPUB and PDF. Support for other formats to follow shortly.\n- OPDS 1.2 support for e-reader compatibility.\n- Import existing libraries from Calibre.\n\n### Audiobook Features\n\n- Supports many audio formats.\n\n---\n\n## Binary Releases\n\nSee the [Releases page](#).\n\n---\n\n## Manual Install\n\n1. Ensure you have [Go 1.24+](https://go.dev/dl/) installed.\n2. Clone this repository and `cd` into the `server` folder.\n3. Build the binary:\n   ```\n   make build\n   ```\n4. Run the server:\n   ```\n   ./bin/devourer serve\n   ```\n\n### Build Targets\n\n| Command | Description |\n|---|---|\n| `make build` | Build for the current platform |\n| `make build-windows` | Build for Windows x64 |\n| `make build-linux` | Build for Linux x64 |\n| `make build-linux-arm64` | Build for Linux ARM64 |\n| `make build-macos-arm` | Build for macOS ARM64 |\n| `make docker` | Build Docker image |\n| `make clean` | Remove build output |\n\n---\n\n## Docker\n\nA `Dockerfile` and `docker-compose.yml` are provided. The container exposes port `9024`.\n\n```yaml\nvolumes:\n  - ./data:/app/data\n  - ./assets:/app/assets\n  - /path/to/media:/media\n```\n\n---\n\n## Configuration\n\nThe server is configured via environment variables:\n\n| Variable | Default | Description |\n|---|---|---|\n| `PORT` | `9024` | HTTP port |\n| `DATABASE_PATH` | `./devourer.db` | Path to SQLite database file |\n| `ASSETS_PATH` | `./assets` | Path to static assets directory |\n| `CLIENT_PATH` | `./client` | Path to SPA client directory |\n| `PLUGINS_PATH` | `./plugins` | Path to metadata provider plugins |\n| `MIGRATIONS_DIR` | `./migrations` | Path to database migration files |\n| `UPLOAD_MAX_SIZE_MB` | `1024` | Maximum upload file size in MB |\n| `UPLOAD_ALLOWED_EXTS` | See below | Comma-separated list of allowed extensions |\n\n**Default allowed extensions:** `epub`, `pdf`, `mobi`, `docx`, `doc`, `rtf`, `html`, `txt`, `cbz`, `cbr`, `zip`, `rar`, `7z`, `cb7`\n\n---\n\n## How To Use\n\nThe server exposes a REST API on port `9024`. Or, use the Devourer client application, which is designed to work with this server.\n\n> **Note:** Most endpoints require authentication via a Bearer token in the `Authorization` header. Exceptions are noted below.\n\n---\n\n## API Endpoints\n\n### System\n\n| Method | Endpoint | Description | Auth |\n|---|---|---|---|\n| `GET` | `/` | Root endpoint | No |\n| `GET` | `/version` | Returns API version | No |\n| `GET` | `/health` | Health check | No |\n| `GET` | `/status` | Server status | Yes |\n\n---\n\n### Authentication & Users\n\n#### `POST /login`\nAuthenticate and receive a JWT token. Subject to rate limiting.\n\n```json\n{ \"username\": \"user\", \"password\": \"password\" }\n```\n\n#### `POST /users`\nCreate a new user account.\n\n```json\n{ \"username\": \"user\", \"password\": \"password\", \"role\": \"user\" }\n```\n\nRequired role: `create_user`\n\n#### `GET /users`\nList all user accounts.\n\n#### `GET /roles`\nGet the current authenticated user's roles and permissions.\n\n#### `PATCH /user/:id`\nEdit a user's role or password.\n\nParameters: `id` — user ID\n\n#### `DELETE /user/:id`\nDelete a user account.\n\nParameters: `id` — user ID\n\n---\n\n### Library Management\n\n#### `GET /libraries`\nGet a list of all libraries.\n\n#### `POST /libraries`\nCreate a new library.\n\n```json\n{\n  \"name\": \"Manga\",\n  \"path\": \"D:/Manga\",\n  \"type\": \"manga\",\n  \"metadata\": {\n    \"provider\": \"jikan\",\n    \"apiKey\": \"optional\"\n  }\n}\n```\n\nRequired role: `manage_library`\n\n#### `GET /library/:id`\nRetrieve details for the specified library.\n\nParameters: `id` — library ID\n\n#### `PATCH /library/:id`\nUpdate library details.\n\nParameters: `id` — library ID\nRequired role: `manage_library`\n\n#### `DELETE /library/:id`\nDelete the specified library and all its content.\n\nParameters: `id` — library ID\nRequired role: `manage_library`\n\n#### `POST /library/:id/scan`\nTrigger a scan of the specified library for new content.\n\nParameters: `id` — library ID\nRequired role: `add_file`\n\n#### `GET /library/:id/scan`\nRetrieve the current scan status for the specified library.\n\nParameters: `id` — library ID\n\n#### `GET /recently-read`\nGet recently read items across all libraries.\n\n---\n\n### Collections\n\n#### `GET /library/:id/collections`\nList all collections in a library.\n\nParameters: `id` — library ID\n\n#### `POST /library/:id/collections`\nCreate a new collection.\n\n```json\n{ \"name\": \"Action Manga\" }\n```\n\nParameters: `id` — library ID\nRequired role: `manage_collections`\n\n#### `GET /library/:id/collections/:collectionId`\nRetrieve a specific collection.\n\nParameters: `id` — library ID, `collectionId` — collection ID\n\n#### `DELETE /collections/:collectionId`\nDelete a collection.\n\nParameters: `collectionId` — collection ID\nRequired role: `manage_collections`\n\n#### `PATCH /collections/:collectionId/:fileId`\nAdd a file to a collection.\n\nParameters: `collectionId` — collection ID, `fileId` — file ID\nRequired role: `manage_collections`\n\n#### `DELETE /collections/:collectionId/:fileId`\nRemove a file from a collection.\n\nParameters: `collectionId` — collection ID, `fileId` — file ID\nRequired role: `manage_collections`\n\n---\n\n### Series Management\n\n#### `GET /series/:libraryId/:seriesId`\nRetrieve details for a series.\n\nParameters: `libraryId`, `seriesId`\n\n#### `GET /series/:libraryId/:seriesId/files`\nList all files within a series.\n\nParameters: `libraryId`, `seriesId`\n\n#### `PATCH /series/:libraryId/:seriesId/metadata`\nUpdate series metadata.\n\nParameters: `libraryId`, `seriesId`\nRequired role: `edit_metadata`\n\n#### `PATCH /series/:libraryId/:seriesId/cover`\nUpdate the series cover image. Accepts a multipart file upload.\n\nParameters: `libraryId`, `seriesId`\nRequired role: `edit_metadata`\n\n#### `PUT /series`\nCreate a new manga/comic series.\n\n```json\n{ \"title\": \"One Piece\", \"path\": \"One Piece\" }\n```\n\nRequired role: `add_file`\n\n---\n\n### File Management\n\n#### `PUT /book/:libraryId`\nUpload a book to a library. Accepts a standard multipart form file upload.\n\nParameters: `libraryId`\nRequired role: `add_file`\n\n#### `PUT /series/:libraryId/:seriesId/file`\nUpload a file to a manga/comic series. Accepts a standard multipart form file upload.\n\nParameters: `libraryId`, `seriesId`\nRequired role: `add_file`\n\n#### `GET /file/:libraryId/:id`\nRetrieve details for a file.\n\nParameters: `libraryId`, `id` — file ID\n\n#### `GET /stream/:libraryId/:id`\nStream or download a file. This endpoint does not require authentication.\n\nParameters: `libraryId`, `id` — file ID\n\n#### `POST /file/:libraryId/:id/scan`\nRescan a file to extract or refresh metadata.\n\nParameters: `libraryId`, `id` — file ID\n\n#### `POST /file/:libraryId/:id/mark-as-read`\nMark the specified file as read.\n\nParameters: `libraryId`, `id` — file ID\n\n#### `DELETE /file/:libraryId/:id/mark-as-read`\nMark the specified file as unread.\n\nParameters: `libraryId`, `id` — file ID\n\n#### `POST /file/page-event`\nUpdate reading progress for a file.\n\n```json\n{ \"fileId\": 1, \"page\": 5, \"libraryId\": 1 }\n```\n\n---\n\n### Ratings\n\n#### `POST /rate/:libraryId/:entityId`\nRate a series or file on a scale of 0–5.\n\nParameters: `libraryId`, `entityId` — series or file ID\n\n```json\n{ \"rating\": 4 }\n```\n\n---\n\n### Tags\n\n#### `GET /tag/:libraryId/:entityId`\nList all user-defined tags for an entity.\n\nParameters: `libraryId`, `entityId`\n\n#### `POST /tag/:libraryId/:entityId`\nCreate a tag on an entity.\n\nParameters: `libraryId`, `entityId`\n\n```json\n{ \"tag\": \"favourite\" }\n```\n\n#### `DELETE /tag/:libraryId/:entityId/:tag`\nRemove a tag from an entity.\n\nParameters: `libraryId`, `entityId`, `tag` — tag name\n\n---\n\n### Metadata\n\n#### `GET /metadata/providers`\nList all available metadata providers.\n\n#### `POST /metadata/search`\nSearch for metadata using a specific provider.\n\n```json\n{ \"provider\": \"jikan\", \"by\": \"title\", \"value\": \"One Piece\" }\n```\n\n---\n\n### Calibre Migration\n\n#### `POST /migrate/calibre`\nImport an existing Calibre library into Devourer. Runs asynchronously.\n\n```json\n{ \"path\": \"/path/to/calibre/library\", \"name\": \"My Books\", \"provider\": \"googlebooks\" }\n```\n\n---\n\n### Images\n\n#### `GET /cover-image/:libraryId/:entityId`\nRetrieve the cover image for a series or file.\n\nParameters: `libraryId`, `entityId` — series or file ID\n\n#### `GET /preview-image/:libraryId/:seriesId/:entityId`\nRetrieve the preview image for a specific file.\n\nParameters: `libraryId`, `seriesId`, `entityId` — file ID\n\n---\n\n### OPDS 1.2\n\nThe server provides full OPDS 1.2 support for e-reader compatibility (Kobo, Kindle, etc.).\n\n| Method | Endpoint | Description |\n|---|---|---|\n| `GET` | `/opds/v1.2/catalog` | OPDS catalog root |\n| `GET` | `/opds/v1.2/libraries` | List all libraries as OPDS feed |\n| `GET` | `/opds/v1.2/library/:libraryId` | OPDS feed for a specific library |\n| `GET` | `/opds/v1.2/library/:libraryId/search` | Search within a library (`?q=term`) |\n| `GET` | `/opds/v1.2/library/:libraryId/book/:bookId` | Single book OPDS entry |\n\n---\n\n## Command Line Interface\n\nThe server binary supports the following subcommands:\n\n### `serve`\nStart the HTTP server and file watcher.\n\n```\n./devourer serve\n```\n\n### `create-library`\nCreate a new library and trigger an initial scan.\n\n```\n./devourer create-library --name \"My Manga\" --path \"D:/Manga\" --type manga --provider jikan\n./devourer create-library --name \"My Books\" --path \"D:/Books\" --type book --provider googlebooks --api-key YOUR_KEY\n```\n\n| Flag | Required | Description |\n|---|---|---|\n| `--name` | Yes | Display name for the library |\n| `--path` | Yes | Absolute path to the library folder |\n| `--type` | Yes | Library type: `book` or `manga` |\n| `--provider` | Yes | Metadata provider: `jikan`, `googlebooks`, `comicvine`, `openlibrary` |\n| `--api-key` | No | API key for the provider (required for `comicvine`) |\n\n### `scan-library`\nTrigger a manual scan of an existing library.\n\n```\n./devourer scan-library --id 1\n```\n\n### `scan-status`\nCheck the scan status of a library.\n\n```\n./devourer scan-status --id 1\n```\n\n### `reset-password`\nReset the password for a user account.\n\n```\n./devourer reset-password --username admin --password newpassword\n```\n\n### `migrate-calibre`\nImport an existing Calibre library.\n\n```\n./devourer migrate-calibre --path \"D:/CalibreLibrary\" --name \"My Books\" --provider googlebooks\n```\n\n---\n\n## Metadata Providers\n\nProviders are loaded from JSON plugin configs in `./plugins/providers/`. The following providers are included:\n\n| Provider | ID | Use For |\n|---|---|---|\n| Jikan (MyAnimeList) | `jikan` | Manga |\n| Google Books | `googlebooks` | Books |\n| Open Library | `openlibrary` | Books |\n| ComicVine | `comicvine` | Comics (API key required) |\n\n---\n\n## User Roles\n\n| Role | Permissions |\n|---|---|\n| `admin` | All permissions |\n| `moderator` | `add_file`, `delete_file`, `edit_metadata`, `manage_collections` |\n| `upload` | `add_file` |\n| `user` | Read-only |\n\n**Available permissions:** `is_admin`, `add_file`, `delete_file`, `edit_metadata`, `manage_library`, `manage_collections`, `create_user`\n","summary":" Devourer is a fast, self-hosted library server written in Go that organizes and catalogs digital collections of books, comics, manga, and audiobooks. It provides a REST API, SQLite storage with concurrency support, automatic metadata retrieval, and multi-user role-based access, while supporting diverse file formats from EPUB and PDF to comic archives and audio files. With features like OPDS 1.2 e-reader compatibility, Calibre library import, a built-in web client, and cross-platform support, it is ideal for digital media collectors who need a robust, centralized solution to manage and stream their archives.","description":"A management server for manga, books and comics.","stars":73,"language":"JavaScript"},{"owner":"SimonBlancoE","repo":"discographic","url":"https://github.com/SimonBlancoE/discographic","readme":"<div align=\"center\">\n\n# Discographic\n\n**Centro de mando autohospedado para tu colección de vinilos.**\n\nSincroniza tus discos de Discogs, explora estadísticas, puntúa y anota todo, y exporta pósteres u hojas de cálculo desde una sola app que puedes ejecutar en tu ordenador o servidor.\n\n**English version:** [Read in English](./README.en.md)\n\n[![MIT License](https://img.shields.io/badge/license-MIT-blue.svg)](LICENSE)\n[![Docker](https://img.shields.io/badge/docker-ready-2496ED.svg?logo=docker&logoColor=white)](https://docs.docker.com/get-docker/)\n[![Node.js](https://img.shields.io/badge/node-%3E%3D18-339933.svg?logo=node.js&logoColor=white)](https://nodejs.org/)\n[![SQLite](https://img.shields.io/badge/database-SQLite-003B57.svg?logo=sqlite&logoColor=white)](https://www.sqlite.org/)\n\n<br />\n<br />\n\n<img src=\"docs/screenshots/dashboard-hero.webp\" alt=\"Panel principal de Discographic con gráficas y estadísticas de la colección\" width=\"900\" />\n\n<br />\n<br />\n\n*Pensado para coleccionistas que quieren un panel rápido y personal para su colección de discos*\n\n</div>\n\n## ¿Qué es?\n\nDiscographic es una aplicación web autohospedada para explorar y gestionar tu colección de Discogs de una forma realmente útil en el día a día.\n\nEn lugar de limitarse a mostrar una lista de lanzamientos, ofrece un panel real, un navegador de colección con búsqueda, un muro visual de portadas, exportaciones, notas, valoraciones y una caché local para que la app siga siendo rápida una vez sincronizada tu biblioteca. Funciona muy bien para una sola persona, pero también tiene sentido para un pequeño grupo de amigos compartiendo la misma instancia.\n\n## ¿Por qué usarlo?\n\n- **Tus datos se quedan contigo** — todo se cachea localmente en SQLite.\n- **Fácil de ejecutar** — con Docker Compose estás dentro.\n- **Pensado para coleccionistas, no solo CRUD** — gráficas, seguimiento de valor, filtros, notas, exportaciones y generación de pósteres.\n- **Interfaz en español e inglés** — la aplicación es bilingüe.\n- **Listo para varios usuarios** — cada usuario conecta su propia cuenta de Discogs y solo ve su propia colección.\n\n## Vista rápida\n\n<table>\n  <tr>\n    <td width=\"50%\" valign=\"top\">\n      <img src=\"docs/screenshots/collection.webp\" alt=\"Navegador de colección con filtros y edición en línea\" width=\"100%\" />\n      <p><strong>Navegador de colección</strong><br />Busca, filtra, ordena, puntúa, anota y exporta tus discos.</p>\n    </td>\n    <td width=\"50%\" valign=\"top\">\n      <img src=\"docs/screenshots/wall.webp\" alt=\"Muro de portadas y generador de pósteres\" width=\"100%\" />\n      <p><strong>Muro de portadas</strong><br />Convierte tu colección en un muro visual o en un póster de alta resolución.</p>\n    </td>\n  </tr>\n</table>\n\n## Qué incluye\n\n- **Panel principal** — totales de la colección, valor estimado, gráficas y vistas tipo leaderboard.\n- **Navegador de colección** — búsqueda, filtros, ordenación, puntuaciones en línea y notas.\n- **Páginas de detalle** — tracklist, metadatos y exportación en PNG.\n- **Muro de portadas** — generación fluida de pósteres hasta 7200px.\n- **Importación / Exportación** — compatibilidad con Excel y CSV.\n- **Logros** — desbloqueables por niveles e insignias ocultas.\n- **Selector aleatorio** — para cuando quieres que la app elija el disco de esta noche.\n\n## Inicio rápido\n\nSi solo quieres ponerla en marcha, este es el camino.\n\n### 1. Arranca con Docker\n\nNecesitas tener [Docker](https://docs.docker.com/get-docker/) instalado.\n\n```bash\ngit clone https://github.com/SimonBlancoE/discographic.git\ncd discographic\ndocker compose up -d\n```\n\nDespués abre **http://localhost:3800** en tu navegador.\n\n### Ephemeral manual test instance\n\nIf you want a throwaway instance for QA with seeded users and no persistent data:\n\n```bash\nnpm run test:instance:start -- --host 127.0.0.1 --port 3801\n```\n\nThat command starts a disposable Docker instance with these users already created:\n\n- **Admin** — `admin-demo` / `demo12345`\n- **User** — `user-demo` / `demo12345`\n\nAll data lives in memory only. When you finish testing, destroy everything with:\n\n```bash\nnpm run test:instance:stop -- --host 127.0.0.1 --port 3801\n```\n\n### 2. Crea tu primer usuario\n\nEn el primer arranque, Discographic te pedirá crear una cuenta de administrador.\n\n### 3. Conecta tu cuenta de Discogs\n\nDespués de iniciar sesión:\n\n1. Abre **Settings**\n2. Introduce tu usuario de Discogs\n3. Pega tu token personal de acceso\n4. Ejecuta **Sync with Discogs**\n\n### 4. Consigue tu token de Discogs\n\n1. Ve a [discogs.com/settings/developers](https://www.discogs.com/settings/developers)\n2. Haz clic en **Generate new token**\n3. Cópialo dentro de Discographic\n\nEso es todo lo que la aplicación necesita para leer tu colección y sincronizar datos como puntuaciones y notas de vuelta a Discogs.\n\n### Cómo detenerla o reiniciarla después\n\n```bash\ndocker compose down\ndocker compose up -d\n```\n\nTus datos se conservan en el volumen de Docker.\n\n### Cómo actualizar a una nueva versión\n\n```bash\ngit pull\ndocker compose up -d --build\n```\n\nTu base de datos y tus portadas cacheadas se conservan — viven en un volumen de Docker separado de la imagen. Si la nueva versión necesita cambios en la base de datos, se aplican solos al arrancar.\n\n## Desarrollo local\n\nSi quieres trabajar en el código en vez de solo ejecutar la aplicación:\n\n```bash\nnpm install\n```\n\nNecesitas dos terminales:\n\n```bash\n# Terminal 1 — servidor API\nnpm run server\n\n# Terminal 2 — servidor Vite con hot reload\nnpm run dev\n```\n\n- Frontend: http://localhost:5173\n- Backend: http://localhost:3800\n\n### Variables de entorno\n\nCopia `.env.example` a `.env` si quieres sobrescribir los valores por defecto:\n\n```env\nHOST_IP=127.0.0.1                         # IP de bind de Docker (usa tu IP LAN para exponerlo)\nPORT=3800                                 # Puerto de la API\nSESSION_SECRET=change-this-in-production  # Secreto para firmar cookies\nCOOKIE_SECURE=false                       # Ponlo en true detrás de HTTPS\n```\n\nLas credenciales de Discogs **no** se configuran con variables de entorno. Cada usuario las añade dentro de la propia app.\n\n## Stack técnico\n\n| Capa | Tecnología |\n|---|---|\n| Frontend | React 18, Vite, Tailwind CSS |\n| Backend | Node.js, Express |\n| Base de datos | SQLite vía better-sqlite3 |\n| Gráficas | Recharts |\n| Procesado de imágenes | Sharp |\n| Empaquetado | Docker multi-stage build |\n\n## Estructura del proyecto\n\n```text\nsrc/          Frontend React (pages, components, hooks, context)\nserver/       API Express, SQLite, cliente de Discogs y rutas\nshared/       Utilidades y textos i18n compartidos entre frontend y backend\npublic/       Recursos estáticos\ndata/         Datos en ejecución — base SQLite y portadas cacheadas (gitignored)\ndocs/         Capturas usadas en el README\n```\n\n## Solución de problemas\n\n**`better-sqlite3` o `sharp` fallan al instalar**\n\nAmbos paquetes usan binarios nativos. En Linux puede que necesites `build-essential` y `python3`. En macOS, instala las Xcode command line tools. La imagen Docker evita este problema por completo.\n\n**El puerto 3800 ya está en uso**\n\nCambia el puerto en `.env` o en `docker-compose.yml`.\n\n**La primera sincronización tarda bastante**\n\nEs normal en colecciones grandes. Discogs aplica rate limiting a la API, así que la sincronización inicial puede tardar varios minutos. Las siguientes sincronizaciones son mucho más rápidas.\n\n**Las portadas van lentas la primera vez**\n\nLas miniaturas se almacenan en caché localmente. La primera generación del muro o del póster es la lenta; después mejora mucho.\n\n## Licencia\n\n[MIT](LICENSE)\n","summary":" Discographic is a self-hosted web application that serves as a command center for vinyl record collectors, synchronizing with Discogs to provide a fast, private dashboard for managing physical collections locally. Unlike basic listing tools, it offers rich visualization features including statistical dashboards, a searchable collection browser, high-resolution poster generation from cover art, and support for personal notes and ratings, all cached in a local SQLite database for optimal performance. The application supports multiple users with isolated collections, runs easily via Docker Compose, and includes data export capabilities to Excel and CSV formats. It is designed for individual collectors or small groups seeking a bilingual (Spanish/English), privacy-focused alternative to cloud-based collection management.","description":"DiscoGraphic is a self-hosted Discogs companion that turns your collection into a richer workspace: faster browsing, deeper stats, safer bulk edits, filtered Excel export/import, and visual tools like cover mosaics and posters.","stars":17,"language":"JavaScript"},{"owner":"gitroomhq","repo":"postiz-app","url":"https://github.com/gitroomhq/postiz-app","readme":"<p align=\"center\">\n  <a href=\"https://postiz.com/\" target=\"_blank\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://github.com/user-attachments/assets/765e9d72-3ee7-4a56-9d59-a2c9befe2311\">\n    <img alt=\"Postiz Logo\" src=\"https://github.com/user-attachments/assets/f0d30d70-dddb-4142-8876-e9aa6ed1cb99\" width=\"280\"/>\n  </picture>\n  </a>\n</p>\n\n<p align=\"center\">\n<a href=\"https://opensource.org/license/agpl-v3\">\n  <img src=\"https://img.shields.io/badge/License-AGPL%203.0-blue.svg\" alt=\"License\">\n</a>\n</p>\n\n<h3 align=\"center\"><strong><a href=\"https://github.com/gitroomhq/postiz-agent\">NEW: check out Postiz agent CLI! perfect for OpenClaw and other agents</a></strong></h3>\n<div align=\"center\">\n  <strong>\n  <h2>Your ultimate AI social media scheduling tool</h2><br />\n  <a href=\"https://postiz.com\">Postiz</a>: An alternative to: Buffer.com, Hypefury, Twitter Hunter, etc...<br /><br />\n  </strong>\n  Postiz offers everything you need to manage your social media posts,<br />build an audience, capture leads, and grow your business.\n</div>\n\n<div class=\"flex\" align=\"center\">\n  <br />\n  <img alt=\"Instagram\" src=\"https://postiz.com/svgs/socials/Instagram.svg\" width=\"32\">\n  <img alt=\"Youtube\" src=\"https://postiz.com/svgs/socials/Youtube.svg\" width=\"32\">\n  <img alt=\"Dribbble\" src=\"https://postiz.com/svgs/socials/Dribbble.svg\" width=\"32\">\n  <img alt=\"Linkedin\" src=\"https://postiz.com/svgs/socials/Linkedin.svg\" width=\"32\">\n  <img alt=\"Reddit\" src=\"https://postiz.com/svgs/socials/Reddit.svg\" width=\"32\">\n  <img alt=\"TikTok\" src=\"https://postiz.com/svgs/socials/TikTok.svg\" width=\"32\">\n  <img alt=\"Facebook\" src=\"https://postiz.com/svgs/socials/Facebook.svg\" width=\"32\">\n  <img alt=\"Pinterest\" src=\"https://postiz.com/svgs/socials/Pinterest.svg\" width=\"32\">\n  <img alt=\"Threads\" src=\"https://postiz.com/svgs/socials/Threads.svg\" width=\"32\">\n  <img alt=\"X\" src=\"https://postiz.com/svgs/socials/X.svg\" width=\"32\">\n  <img alt=\"Slack\" src=\"https://postiz.com/svgs/socials/Slack.svg\" width=\"32\">\n  <img alt=\"Discord\" src=\"https://postiz.com/svgs/socials/Discord.svg\" width=\"32\">\n  <img alt=\"Mastodon\" src=\"https://postiz.com/svgs/socials/Mastodon.svg\" width=\"32\">\n  <img alt=\"Bluesky\" src=\"https://postiz.com/svgs/socials/Bluesky.svg\" width=\"32\">\n</div>\n\n<p align=\"center\">\n  <br />\n  <a href=\"https://docs.postiz.com\" rel=\"dofollow\"><strong>Explore the docs »</strong></a>\n  <br />\n\n  <br />\n  <a href=\"https://youtube.com/@postizofficial\" rel=\"dofollow\"><strong>Watch the YouTube Tutorials»</strong></a>\n  <br />\n</p>\n\n<p align=\"center\">\n  <a href=\"https://platform.postiz.com\">Register</a>\n  ·\n  <a href=\"https://discord.postiz.com\">Join Our Discord (devs only)</a>\n  ·\n  <a href=\"https://docs.postiz.com/public-api\">Public API</a><br />\n</p>\n<p align=\"center\">\n  <a href=\"https://www.npmjs.com/package/@postiz/node\">NodeJS SDK</a>\n  ·\n  <a href=\"https://www.npmjs.com/package/n8n-nodes-postiz\">N8N custom node</a>\n  ·\n  <a href=\"https://apps.make.com/postiz\">Make.com integration</a>\n</p>\n\n<br /><br />\n\n## 🔌 See the leading Postiz features\n\n<p align=\"center\">\n  <a href=\"https://www.youtube.com/watch?v=BdsCVvEYgHU\" target=\"_blank\">\n    <img alt=\"Postiz\" src=\"https://github.com/user-attachments/assets/8b9b7939-da1a-4be5-95be-42c6fce772de\" />\n  </a>\n</p>\n\n## ✨ Features\n\n| ![Image 1](https://github.com/user-attachments/assets/a27ee220-beb7-4c7e-8c1b-2c44301f82ef) | ![Image 2](https://github.com/user-attachments/assets/eb5f5f15-ed90-47fc-811c-03ccba6fa8a2) |\n| ------------------------------------------------------------------------------------------- | ------------------------------------------------------------------------------------------- |\n| ![Image 3](https://github.com/user-attachments/assets/d51786ee-ddd8-4ef8-8138-5192e9cfe7c3) | ![Image 4](https://github.com/user-attachments/assets/91f83c89-22f6-43d6-b7aa-d2d3378289fb) |\n\n### Our Sponsors\n\n| Sponsor |                                  Logo                                   | Description     |\n|---------|:-----------------------------------------------------------------------:|-----------------|\n| [Hostinger](https://www.hostinger.com/vps/docker/postiz?ref=postiz) | <img src=\".github/sponsors/hostinger.png\" alt=\"Hostinger\" width=\"500\"/> | Hostinger is on a mission to make online success possible for anyone – from developers to aspiring bloggers and business owners |\n| [Virlo](https://dev.virlo.ai/?ref=postiz) | <img src=\"https://github.com/user-attachments/assets/25182598-5344-45fc-b9cd-e4cfa16aabfd\" alt=\"Virlo\" width=\"500\"/> | Virlo is the #1 social media trend spotting and all-in-one GTM tool for teams leveraging short-form video |\n\n\n\n# Intro\n\n- Schedule all your social media posts (many AI features)\n- Measure your work with analytics.\n- Collaborate with other team members to exchange or buy posts.\n- Invite your team members to collaborate, comment, and schedule posts.\n- At the moment there is no difference between the hosted version to the self-hosted version\n- Perfect for automation (API) with platforms like N8N, Make.com, Zapier, etc.\n\n## Tech Stack\n\n- Pnpm workspaces (Monorepo)\n- NextJS (React)\n- NestJS\n- Prisma (Default to PostgreSQL)\n- Temporal\n- Resend (email notifications)\n\n## Quick Start\n\nTo have the project up and running, please follow the [Quick Start Guide](https://docs.postiz.com/quickstart)\n\n## Sponsor Postiz\n\nWe now give a few options to Sponsor Postiz:\n- Just a donation: You like what we are building, and want to buy us some coffees so we can build faster.\n- Main Repository: Get your logo with a backlink from the main Postiz repository. Postiz has almost 3m downloads and 20k views per month.\n- Main Repository + Website: Get your logo on the central repository and the main website. Here are some metrics: - Website has 20k hits per month + 65 DR (strong backlink) - Repository has 20k hits per month + Almost 3m docker downloads.\n\nLink: https://opencollective.com/postiz\n\n## Postiz Compliance\n\n- Postiz is an open-source, self-hosted social media scheduling tool that supports platforms like X (formerly Twitter), Bluesky, Mastodon, Discord, and others.\n- Postiz hosted service uses official, platform-approved OAuth flows.\n- Postiz does not automate or scrape content from social media platforms.\n- Postiz does not collect, store, or proxy API keys or access tokens from users.\n- Postiz never ask users to paste API keys into our hosted product.\n- Postiz Users always authenticate directly with the social platform (e.g., X, Discord, etc.), ensuring platform compliance and data privacy.\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/svg?repos=gitroomhq/postiz-app&type=date&legend=top-left)](https://www.star-history.com/#gitroomhq/postiz-app&type=date&legend=top-left)\n\n## License\n\nThis repository's source code is available under the [AGPL-3.0 license](LICENSE).\n\n<br /><br /><br />\n\n<p align=\"center\">\n  <a href=\"https://www.g2.com/products/postiz/take_survey\" target=\"blank\"><img alt=\"g2\" src=\"https://github.com/user-attachments/assets/892cb74c-0b49-4589-b2f5-fbdbf7a98f66\" /></a>\n</p>\n","summary":" Postiz is an open-source, AI-powered social media scheduling and management platform that serves as an alternative to commercial tools like Buffer and Hypefury, helping businesses schedule content and grow their audience across major networks including Instagram, LinkedIn, X, TikTok, and Bluesky. Beyond its core scheduling capabilities, it offers extensive developer integrations through a public API, Node.js SDK, and support for automation platforms like N8N and Make.com, along with a dedicated CLI agent for advanced workflows. This makes it ideal for marketing teams seeking centralized social media management as well as developers building custom automation solutions.","description":"📨 The ultimate social media scheduling tool, with a bunch of AI  🤖","stars":29039,"language":"TypeScript"},{"owner":"SapphoSys","repo":"chiri","url":"https://github.com/SapphoSys/chiri","readme":"<div align=\"center\">\n  <div style=\"display:flex;flex-direction:column;gap:15px;align-items:center;\">\n    <img src=\"./public/icon.png\" width=\"100\" />\n    <h1>Chiri</h1>\n  </div>\n\n  <p>🍃 A (work in progress) cross-platform CalDAV compatible task management app.</p>\n\n  <!-- header badges start -->\n  [![GitHub Repo stars][header-repo-stars-badge]][repo-stars]\n  &nbsp;[![Total downloads][header-repo-total-downloads-badge]][repo-releases]\n  &nbsp;[![Ko-fi donation link][header-donate-kofi-badge]][donate-kofi]\n  &nbsp;[![Liberapay donation link][header-donate-liberapay-badge]][donate-liberapay]\n  &nbsp;[![GitHub License][header-repo-license-badge]][repo-license]\n  <!-- header badges end -->\n\n  ![A screenshot of Chiri, a cross-platform CalDAV compatible task management app. The sidebar shows the \"RustiCal (chloe)\" account with the \"Albums to listen to\" calendar selected. The tasks are music albums that I plan on listening to, ranging from \"Revengeseekerz by Jane Remover\" and \"Hearth Room by Frost Children\" to \"girl EDM by Ninajirachi\" and \"10,000 gecs by 100 gecs\".][header-screenshot]\n</div>\n\n## Disclaimer\n> [!IMPORTANT]  \n> Though the app is functional, it is currently still in active development so you might encounter bugs here and there.  \nIf you do, [file a bug report][header-repo-issues-link] and let me know.\n\n# Download\nYou can download pre-built binaries of the application for each platform by clicking on one of the following links.\n\n<!-- download badges start -->\n[<img src=\"./.github/assets/download/windows_msi_x64.png\" width=\"200\">][release-windows-msi-x64]\n[<img src=\"./.github/assets/download/windows_msi_arm.png\" width=\"200\">][release-windows-msi-arm]\n[<img src=\"./.github/assets/download/macos_dmg_applesilicon.png\" width=\"200\">][release-macos-dmg-applesilicon]\n[<img src=\"./.github/assets/download/macos_dmg_intel.png\" width=\"200\">][release-macos-dmg-intel]\n[<img src=\"./.github/assets/download/linux_deb_x86_64.png\" width=\"200\">][release-linux-deb-x86_64]\n[<img src=\"./.github/assets/download/linux_deb_arm.png\" width=\"200\">][release-linux-deb-arm]\n[<img src=\"./.github/assets/download/linux_rpm_x86_64.png\" width=\"200\">][release-linux-rpm-x86_64]\n[<img src=\"./.github/assets/download/linux_rpm_arm.png\" width=\"200\">][release-linux-rpm-arm]\n<!-- download badges end -->\n\n> [!NOTE]  \n> Flatpak and AppImage support is planned in a future release.\n\n<details>\n<summary>Instructions for Arch Linux</summary>\n\n## Arch Linux\nChiri is available on the AUR (Arch User Repository) in two variants:\n\n### Building from source\n```bash\nyay -S chiri # or `paru -S chiri`\n\n# Or manually\ngit clone https://aur.archlinux.org/chiri.git\ncd chiri\nmakepkg -si\n```\n\n### Pre-built binary (faster installation)\n```bash\nyay -S chiri-bin # or `paru -S chiri-bin`\n\n# Or manually\ngit clone https://aur.archlinux.org/chiri-bin.git\ncd chiri-bin\nmakepkg -si\n```\n</details>\n\n<details>\n<summary>Instructions for Nix / NixOS</summary>\n\n## Nix / NixOS\nChiri is available for Nix, NixOS, and nix-darwin as a flake. A pre-built binary is also available.\n\n### Flake\n> Until the app is officially published to `nixpkgs`, you'll have to use a flake input for the time being.\n\nAdd `chiri` as an input to your `flake.nix` file.\n```nix\n{\n  inputs = {\n    # ... other inputs ...\n    chiri = {\n      url = \"github:SapphoSys/chiri\";\n      inputs.nixpkgs.follows = \"nixpkgs\";\n    };\n    # ... other inputs ...\n  };\n}\n```\n\n### Examples\n<details>\n  <summary>NixOS</summary>\n\n  ```nix\n  # flake.nix\n  {\n    inputs = {\n      nixpkgs.url = \"github:NixOS/nixpkgs/nixos-unstable\";\n      chiri = {\n        url = \"github:SapphoSys/chiri\";\n        inputs.nixpkgs.follows = \"nixpkgs\";\n      };\n    };\n    outputs = { nixpkgs, chiri, ... }: {\n      nixosConfigurations.your-hostname = nixpkgs.lib.nixosSystem {\n        system = \"x86_64-linux\"; # Or \"aarch64-linux\"\n        modules = [\n          {\n            environment.systemPackages = [\n              chiri.packages.x86_64-linux.default\n              # Or \"chiri.packages.x86_64-linux.bin\" for a pre-built binary\n            ];\n          }\n          # ... etc\n        ];\n      };\n    };\n  }\n  ```\n</details>\n\n<details>\n  <summary>Home Manager</summary>\n\n  ```nix\n  { pkgs, inputs, ... }:\n  {\n    home.packages = [\n      inputs.chiri.packages.${pkgs.system}.default\n      # Or \"inputs.chiri.packages.${pkgs.system}.bin\" for a pre-built binary\n    ];\n  }\n  ```\n</details>\n\n<details>\n  <summary>macOS (nix-darwin)</summary>\n  \n  ```nix\n  # flake.nix\n  {\n    inputs = {\n      nixpkgs.url = \"github:NixOS/nixpkgs/nixos-unstable\";\n      darwin = {\n        url = \"github:LnL7/nix-darwin\";\n        inputs.nixpkgs.follows = \"nixpkgs\";\n      };\n      chiri = {\n        url = \"github:SapphoSys/chiri\";\n        inputs.nixpkgs.follows = \"nixpkgs\";\n      };\n    };\n    outputs = { nixpkgs, darwin, chiri, ... }: {\n      darwinConfigurations.your-macbook = darwin.lib.darwinSystem {\n        system = \"aarch64-darwin\"; # Or \"x86_64-darwin\"\n        modules = [\n          {\n            environment.systemPackages = [\n              chiri.packages.aarch64-darwin.default\n              # Or \"chiri.packages.aarch64-darwin.bin\" for a pre-built binary\n            ];\n          }\n        ];\n      };\n    };\n  }\n  ```\n</details>\n</details>\n\n# Support\nIf you found Chiri useful, please consider donating! \n\nI work on Chiri during my free time as a student, so every amount, however small, helps with rent and food costs. Thank you :)\n\n<!-- donation badges start -->\n[<img src=\"./.github/assets/donate/ko-fi.png\" width=\"264\">][donate-kofi]\n[<img src=\"./.github/assets/donate/liberapay.png\" width=\"264\">][donate-liberapay]\n<!-- donation badges end -->\n\n# Compatibility\nDoes the app work on other CalDAV servers or CalDAV-compatible clients that are not listed here? [Please let me know by filing an issue](https://github.com/SapphoSys/chiri/issues/new)!\n\n## Servers\n| Server              | Support |\n| ------------------- | ------- |\n| Nextcloud Tasks     | ✅      |\n| Baikal              | ✅      |\n| Radicale            | ✅      |\n| RustiCal            | ✅      |\n| Fastmail            | ✅      |\n\n## Clients\n| Client              | Support |\n| ------------------- | ------- |\n| DAVx⁵               | ✅      |\n| Apple Reminders     | ✅      |\n| Tasks.org           | ✅      |\n| jtx Board           | ✅      |\n\n# License\nChiri is licensed under the [<span aria-hidden=\"true\">&nearr;</span> zlib/libpng][repo-license] license.\n\n[donate-kofi]: https://ko-fi.com/solelychloe\n[donate-liberapay]: https://liberapay.com/chloe\n\n[header-donate-kofi-badge]: https://img.shields.io/badge/donate-kofi-f5c2e7?style=plastic&logo=kofi&logoColor=f5c2e7&labelColor=18181b&cacheSeconds=1000\n[header-donate-liberapay-badge]: https://img.shields.io/badge/donate-liberapay-f5c2e7?style=plastic&logo=liberapay&logoColor=f5c2e7&labelColor=18181b&cacheSeconds=1000\n[header-repo-license-badge]: https://img.shields.io/github/license/SapphoSys/chiri?style=plastic&labelColor=18181b&color=f5c2e7&cacheSeconds=1000\n[header-repo-stars-badge]: https://img.shields.io/github/stars/SapphoSys/chiri?style=plastic&logo=github&logoColor=f5c2e7&labelColor=18181b&color=f5c2e7&cacheSeconds=1000\n[header-repo-total-downloads-badge]: https://img.shields.io/github/downloads/SapphoSys/chiri/total?style=plastic&logo=hack-the-box&logoColor=f5c2e7&label=downloads&labelColor=18181b&color=f5c2e7&cacheSeconds=1000\n\n[header-repo-issues-link]: https://github.com/SapphoSys/chiri/issues\n[header-screenshot]: https://raw.githubusercontent.com/SapphoSys/chiri/refs/heads/master/.github/assets/screenshot.png\n\n[release-windows-msi-x64]: https://github.com/SapphoSys/chiri/releases/download/app-v0.8.1/chiri_0.8.1_x64_en-US.msi\n[release-windows-msi-arm]: https://github.com/SapphoSys/chiri/releases/download/app-v0.8.1/chiri_0.8.1_arm64_en-US.msi\n[release-macos-dmg-applesilicon]: https://github.com/SapphoSys/chiri/releases/download/app-v0.8.1/chiri_0.8.1_aarch64.dmg\n[release-macos-dmg-intel]: https://github.com/SapphoSys/chiri/releases/download/app-v0.8.1/chiri_0.8.1_x64.dmg\n[release-linux-deb-x86_64]: https://github.com/SapphoSys/chiri/releases/download/app-v0.8.1/chiri_0.8.1_amd64.deb\n[release-linux-deb-arm]: https://github.com/SapphoSys/chiri/releases/download/app-v0.8.1/chiri_0.8.1_arm64.deb\n[release-linux-rpm-x86_64]: https://github.com/SapphoSys/chiri/releases/download/app-v0.8.1/chiri-0.8.1-1.x86_64.rpm\n[release-linux-rpm-arm]: https://github.com/SapphoSys/chiri/releases/download/app-v0.8.1/chiri-0.8.1-1.aarch64.rpm\n\n[repo-license]: https://github.com/SapphoSys/chiri/blob/master/LICENSE\n[repo-releases]: https://github.com/SapphoSys/chiri/releases\n[repo-stars]: https://github.com/SapphoSys/chiri/stargazers\n","summary":" Chiri is a cross-platform task management application that supports CalDAV synchronization, allowing users to manage tasks seamlessly across Windows, macOS, and Linux while maintaining compatibility with standard calendar servers. Though still under active development, the project offers pre-built binaries for multiple architectures alongside package manager integrations for Arch Linux (AUR) and Nix. It is designed for users seeking an interoperable, decentralized alternative to proprietary task managers that can sync with existing CalDAV-compatible services and infrastructure.","description":"🍃 A (work in progress) cross-platform CalDAV compatible task management app.","stars":187,"language":"TypeScript"},{"owner":"chr0nzz","repo":"traefik-manager","url":"https://github.com/chr0nzz/traefik-manager","readme":"> [!NOTE]\n> **v1 Beta is now available** - try the new Static Config editor and more. [Join the beta →](https://beta-tm.xyzlab.dev/beta)\n\n<div align=\"center\">\n\n<img src=\"docs/public/images/icon.png\" width=\"128\" height=\"128\" alt=\"Traefik Manager\">\n\n# Traefik Manager\n\n**A clean, self-hosted web UI for managing your Traefik reverse proxy.**\n\nAdd routes, manage middlewares, monitor services, and view TLS certificates - all without touching a YAML file by hand.\n\n[![Docker Image](https://img.shields.io/badge/ghcr.io-chr0nzz%2Ftraefik--manager-blue?logo=docker&logoColor=white)](https://github.com/chr0nzz/traefik-manager/pkgs/container/traefik-manager)\n[![License](https://img.shields.io/badge/license-GPL--3.0-blue)](LICENSE)\n[![Version](https://img.shields.io/github/v/release/chr0nzz/traefik-manager)](https://github.com/chr0nzz/traefik-manager/releases)\n[![Docs](https://img.shields.io/badge/docs-github.io-blue)](https://traefik-manager.xyzlab.dev/)\n[![Mobile App](https://img.shields.io/badge/mobile-traefik--manager--mobile-green?logo=android&logoColor=white)](https://github.com/chr0nzz/traefik-manager-mobile)\n\n</div>\n<div align=\"center\">\n<sub>Built for homelabbers who love Traefik but hate editing YAML at 2am.</sub>\n</div>\n\n---\n\n## Interface Gallery\n\n<details>\n<summary><b>Initial Setup Workflow</b></summary>\n<table>\n<tr>\n<td width=\"33%\">\n<a href=\"docs/public/images/dark-setup-temp-pass-1.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-setup-temp-pass-1.png\">\n  <img src=\"docs/public/images/light-setup-temp-pass-1.png\" alt=\"Step 1 – Temporary password\" />\n</picture></a>\n<br /><b>1. Temporary password</b>\n</td>\n<td width=\"33%\">\n<a href=\"docs/public/images/dark-setup-welcome-2.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-setup-welcome-2.png\">\n  <img src=\"docs/public/images/light-setup-welcome-2.png\" alt=\"Step 2 – Welcome\" />\n</picture></a>\n<br /><b>2. Welcome</b>\n</td>\n<td width=\"33%\">\n<a href=\"docs/public/images/dark-setup-conn-dom-3.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-setup-conn-dom-3.png\">\n  <img src=\"docs/public/images/light-setup-conn-dom-3.png\" alt=\"Step 3 – Connection &amp; domains\" />\n</picture></a>\n<br /><b>3. Connection &amp; domains</b>\n</td>\n</tr>\n<tr>\n<td>\n<a href=\"docs/public/images/dark-setup-opt-tabs-4.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-setup-opt-tabs-4.png\">\n  <img src=\"docs/public/images/light-setup-opt-tabs-4.png\" alt=\"Step 4 – Optional tabs\" />\n</picture></a>\n<br /><b>4. Optional tabs</b>\n</td>\n<td>\n<a href=\"docs/public/images/dark-setup-set-pass-5.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-setup-set-pass-5.png\">\n  <img src=\"docs/public/images/light-setup-set-pass-5.png\" alt=\"Step 5 – Set password\" />\n</picture></a>\n<br /><b>5. Set password</b>\n</td>\n<td></td>\n</tr>\n</table>\n</details>\n\n<details>\n<summary><b>Dashboard</b></summary>\n<p align=\"center\">\n<a href=\"docs/public/images/dark-dashboard.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-dashboard.png\">\n  <img src=\"docs/public/images/light-dashboard.png\" width=\"48%\" alt=\"Dashboard\" />\n</picture></a>\n<a href=\"docs/public/images/dark-dashboard-compact.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-dashboard-compact.png\">\n  <img src=\"docs/public/images/light-dashboard-compact.png\" width=\"48%\" alt=\"Dashboard – compact stats\" />\n</picture></a>\n</p>\n<p align=\"center\">\n<a href=\"docs/public/images/dark-dashboard-no-widgets.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-dashboard-no-widgets.png\">\n  <img src=\"docs/public/images/light-dashboard-no-widgets.png\" width=\"32%\" alt=\"Dashboard – no widgets\" />\n</picture></a>\n<a href=\"docs/public/images/dark-dashboard-edit-group.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-dashboard-edit-group.png\">\n  <img src=\"docs/public/images/light-dashboard-edit-gorup.png\" width=\"32%\" alt=\"Dashboard – edit group\" />\n</picture></a>\n<a href=\"docs/public/images/dark-dashboard-edit-route.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-dashboard-edit-route.png\">\n  <img src=\"docs/public/images/light-dashboard-edit%20route.png\" width=\"32%\" alt=\"Dashboard – edit route card\" />\n</picture></a>\n</p>\n</details>\n\n<details>\n<summary><b>Routes</b></summary>\n<table>\n<tr>\n<td width=\"33%\">\n<a href=\"docs/public/images/dark-routes.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-routes.png\">\n  <img src=\"docs/public/images/light-routes.png\" alt=\"Routes overview\" />\n</picture></a>\n<br /><b>Overview</b>\n</td>\n<td width=\"33%\">\n<a href=\"docs/public/images/dark-route-details.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-route-details.png\">\n  <img src=\"docs/public/images/light-route-details.png\" alt=\"Route details\" />\n</picture></a>\n<br /><b>Details</b>\n</td>\n<td width=\"33%\">\n<a href=\"docs/public/images/dark-route-edit.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-route-edit.png\">\n  <img src=\"docs/public/images/light-route-edit.png\" alt=\"Route edit\" />\n</picture></a>\n<br /><b>Edit</b>\n</td>\n</tr>\n<tr>\n<td>\n<a href=\"docs/public/images/dark-route-add-http.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-route-add-http.png\">\n  <img src=\"docs/public/images/light-route-add-http.png\" alt=\"Add HTTP route\" />\n</picture></a>\n<br /><b>Add HTTP</b>\n</td>\n<td>\n<a href=\"docs/public/images/dark-route-add-tcp.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-route-add-tcp.png\">\n  <img src=\"docs/public/images/light-route-add-tcp.png\" alt=\"Add TCP route\" />\n</picture></a>\n<br /><b>Add TCP</b>\n</td>\n<td>\n<a href=\"docs/public/images/dark-route-add-udp.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-route-add-udp.png\">\n  <img src=\"docs/public/images/light-route-add-udp.png\" alt=\"Add UDP route\" />\n</picture></a>\n<br /><b>Add UDP</b>\n</td>\n</tr>\n</table>\n</details>\n\n<details>\n<summary><b>Services</b></summary>\n<p align=\"center\">\n<a href=\"docs/public/images/dark-services.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-services.png\">\n  <img src=\"docs/public/images/light-services.png\" width=\"48%\" alt=\"Services\" />\n</picture></a>\n<a href=\"docs/public/images/dark-services-details.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-services-details.png\">\n  <img src=\"docs/public/images/light-services-details.png\" width=\"48%\" alt=\"Service details\" />\n</picture></a>\n</p>\n</details>\n\n<details>\n<summary><b>Middlewares</b></summary>\n<table>\n<tr>\n<td>\n<a href=\"docs/public/images/dark-middleware.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-middleware.png\">\n  <img src=\"docs/public/images/light-middleware.png\" alt=\"Middlewares\" />\n</picture></a>\n<br /><b>List</b>\n</td>\n<td>\n<a href=\"docs/public/images/dark-middleware-edit.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-middleware-edit.png\">\n  <img src=\"docs/public/images/light-middleware-edit.png\" alt=\"Edit middleware\" />\n</picture></a>\n<br /><b>Edit</b>\n</td>\n<td>\n<a href=\"docs/public/images/dark-middleware-add.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-middleware-add.png\">\n  <img src=\"docs/public/images/light-middleware-add.png\" alt=\"Add middleware\" />\n</picture></a>\n<br /><b>Add</b>\n</td>\n</tr>\n</table>\n</details>\n\n<details>\n<summary><b>Plugins & Certificates</b></summary>\n<p align=\"center\">\n<a href=\"docs/public/images/dark-plugins.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-plugins.png\">\n  <img src=\"docs/public/images/light-plugins.png\" width=\"32%\" alt=\"Plugins\" />\n</picture></a>\n<a href=\"docs/public/images/dark-plugins-details.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-plugins-details.png\">\n  <img src=\"docs/public/images/light-plugins-details.png\" width=\"32%\" alt=\"Plugin details\" />\n</picture></a>\n<a href=\"docs/public/images/dark-certs.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-certs.png\">\n  <img src=\"docs/public/images/light-certs.png\" width=\"32%\" alt=\"Certificates\" />\n</picture></a>\n</p>\n</details>\n\n<details>\n<summary><b>Docker Provider</b></summary>\n<p align=\"center\">\n<a href=\"docs/public/images/dark-docker.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-docker.png\">\n  <img src=\"docs/public/images/light-docker.png\" width=\"48%\" alt=\"Docker routes\" />\n</picture></a>\n<a href=\"docs/public/images/dark-docker-details.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-docker-details.png\">\n  <img src=\"docs/public/images/light-docker-details.png\" width=\"48%\" alt=\"Docker route details\" />\n</picture></a>\n</p>\n</details>\n\n<details>\n<summary><b>Route Map</b></summary>\n<p align=\"center\">\n<a href=\"docs/public/images/dark-route-map.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-route-map.png\">\n  <img src=\"docs/public/images/light-route-map.png\" width=\"48%\" alt=\"Route Map\" />\n</picture></a>\n<a href=\"docs/public/images/dark-route-map-hover.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-route-map-hover.png\">\n  <img src=\"docs/public/images/light-route-map-hover.png\" width=\"48%\" alt=\"Route Map – hover highlight\" />\n</picture></a>\n</p>\n</details>\n\n<details>\n<summary><b>Logs</b></summary>\n<p align=\"center\">\n<a href=\"docs/public/images/dark-logs.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-logs.png\">\n  <img src=\"docs/public/images/light-logs.png\" width=\"80%\" alt=\"Logs\" />\n</picture></a>\n</p>\n</details>\n\n<details>\n<summary><b>Settings</b></summary>\n<table>\n<tr>\n<td width=\"33%\">\n<a href=\"docs/public/images/dark-settins-auth.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-settins-auth.png\">\n  <img src=\"docs/public/images/light-settings-auth.png\" alt=\"Settings – auth\" />\n</picture></a>\n<br /><b>Authentication</b>\n</td>\n<td width=\"33%\">\n<a href=\"docs/public/images/dark-settins-connections.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-settins-connections.png\">\n  <img src=\"docs/public/images/light-settings-connections.png\" alt=\"Settings – connections\" />\n</picture></a>\n<br /><b>Connections</b>\n</td>\n<td width=\"33%\">\n<a href=\"docs/public/images/dark-settins-routes.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-settins-routes.png\">\n  <img src=\"docs/public/images/light-settings-routes.png\" alt=\"Settings – routes\" />\n</picture></a>\n<br /><b>Routes Config</b>\n</td>\n</tr>\n<tr>\n<td>\n<a href=\"docs/public/images/dark-settins-system.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-settins-system.png\">\n  <img src=\"docs/public/images/light-settings-system.png\" alt=\"Settings – system\" />\n</picture></a>\n<br /><b>System</b>\n</td>\n<td>\n<a href=\"docs/public/images/dark-settins-backups.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-settins-backups.png\">\n  <img src=\"docs/public/images/light-settings-backups.png\" alt=\"Settings – backups\" />\n</picture></a>\n<br /><b>Backups</b>\n</td>\n<td>\n<a href=\"docs/public/images/dark-settins-ui.png\" target=\"_blank\"><picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/public/images/dark-settins-ui.png\">\n  <img src=\"docs/public/images/light-settings-ui.png\" alt=\"Settings – UI\" />\n</picture></a>\n<br /><b>UI Preferences</b>\n</td>\n</tr>\n</table>\n</details>\n\n---\n\n## Features\n\n**Routing & Middleware**\n- Add, edit, delete, and **enable/disable** HTTP, TCP, and UDP routes - no YAML editing required\n- **Multiple domains per route** - select any combination of your configured domains; generates multi-host Traefik rules (`Host(\\`sub.d1\\`) || Host(\\`sub.d2\\`)`)\n- **Per-service insecureSkipVerify** - checkbox adds a named `serversTransport` for backends with self-signed certs (Proxmox, Kasm, etc.); yellow TLS skip badge shown on route cards\n- Create middlewares with built-in templates (Basic Auth, Forward Auth, Redirect, Strip Prefix)\n- **Multi-config file support** - mount several dynamic config files with `CONFIG_DIR` or `CONFIG_PATHS`; a dropdown selects which file each route or middleware is saved to; **create new files on the fly** when `CONFIG_DIR` is set\n- Timestamped backups before every change; one-click restore from Settings\n\n**Live Dashboard**\n- Real-time stats: router counts, service health, entrypoints, Traefik version\n- Provider tabs: Docker, Kubernetes, Swarm, Nomad, ECS, Consul Catalog, Redis, etcd, Consul KV, ZooKeeper, HTTP Provider, File - all API-based, no extra mounts\n- **Filter live services** by protocol (HTTP/TCP/UDP) and provider (docker, file, kubernetes…)\n- **List view toggle** on Routes, Middlewares, and Services tabs - switch between card grid and compact table\n\n**Visualizations** *(optional, toggle in Settings)*\n- **Dashboard tab** - routes grouped by category (Media, Monitoring, Infrastructure, etc.) with app icons sourced from [selfh.st/icons](https://selfh.st/icons/), cached locally, and per-card editing (display name, icon override, group override)\n- **Route Map tab** - 4-column topology view (Entry Points - Routes - Middlewares - Services) with Bezier curve connections, hover-to-highlight, and route tooltips\n\n**System Monitoring** *(optional file mounts)*\n- **Certs** - `acme.json` certificates with expiry tracking\n- **Plugins** - plugins from your static `traefik.yml`\n- **Logs** - parsed access log cards showing method, status, path, IP, service, and duration; click any card for a full detail panel with all fields and the raw log line\n- **Configurable file paths** - set `acme.json`, access log, and static config paths from **Settings → File Paths** without a container restart; UI setting takes priority over env vars\n\n**Security**\n- bcrypt passwords (cost 12), CSRF protection, session management with session fixation protection\n- Optional TOTP 2FA · 7-day remember me · configurable inactivity timeout\n- Auto-generated password on first start · CLI recovery with `flask reset-password`\n- **OIDC / SSO** - sign in with Keycloak, Google, Authentik, or any OIDC-compliant provider alongside password login; access restricted to specific emails or groups; client secret stored encrypted at rest\n- **Per-device API keys** - up to 10 named keys (e.g. \"My Phone\"), each independently revocable via `X-Api-Key` header\n- **Rate limiting** on login and auth endpoints (Flask-Limiter)\n- **Atomic config writes** - crash-safe YAML saves via temp file + rename\n- **Encrypted OTP secret** - TOTP seed encrypted at rest with Fernet\n\n\n---\n\n## Mobile App\n\n**traefik-manager-mobile** is a React Native companion app for managing Traefik Manager from your phone. Requires **Traefik Manager v0.6.0 or higher**.\n\n|          |                                                                                                |\n| ----------| ------------------------------------------------------------------------------------------------|\n| Repo     | [github.com/chr0nzz/traefik-manager-mobile](https://github.com/chr0nzz/traefik-manager-mobile) |\n| Download | [Latest release](https://github.com/chr0nzz/traefik-manager-mobile/releases/latest)            |\n| Beta     | [Sign up to beta test on Google Play](https://forms.gle/csituqc92sreNooZ8)                     |\n| Auth     | Per-device API key - generate one in **Settings → Authentication → App / Mobile API Keys**     |\n\nFeatures: browse routes, middlewares, and services · enable/disable routes · add and edit routes and middlewares (12 middleware templates) · multiple domains per route · per-service insecureSkipVerify · backend scheme + pass host header controls · multi-config file picker · edit mode for bulk actions · system light/dark theme.\n\n---\n\n## Quick Start\n\n**One-liner installer** - installs Traefik + Traefik Manager together, or Traefik Manager on its own via Docker or a native Linux service:\n\n```bash\ncurl -fsSL https://get-traefik.xyzlab.dev | bash\n```\n\n**Manual Docker Compose:**\n\n```yaml\nservices:\n  traefik-manager:\n    image: ghcr.io/chr0nzz/traefik-manager:latest\n    container_name: traefik-manager\n    restart: unless-stopped\n    ports:\n      - \"5000:5000\"\n    environment:\n      - COOKIE_SECURE=false\n    volumes:\n      - /path/to/traefik/dynamic.yml:/app/config/dynamic.yml\n      - /path/to/traefik-manager/config:/app/config\n      - /path/to/traefik-manager/backups:/app/backups\n```\n\n```bash\ndocker compose up -d\n```\n\nOpen **http://your-server:5000** - the setup wizard will guide you through the rest.\n\n---\n\n## Deployment\n\n| Runtime                                                                                                              | Guide                                                                                                                 |\n| ----------------------------------------------------------------------------------------------------------------------| -----------------------------------------------------------------------------------------------------------------------|\n| <img src=\"https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/windows-terminal.png\" width=\"20\" height=\"20\"> Installer | [One-liner: full stack, TM-only Docker, TM-only Linux service](https://traefik-manager.xyzlab.dev/traefik-stack.html) |\n| <img src=\"https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/docker.png\" width=\"20\" height=\"20\"> Docker              | [Docker Compose setup, networking, behind Traefik](https://traefik-manager.xyzlab.dev/docker.html)                    |\n| <img src=\"https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/podman.png\" width=\"20\" height=\"20\"> Podman              | [Rootless, Quadlet/systemd, SELinux labels](https://traefik-manager.xyzlab.dev/podman.html)                           |\n| <img src=\"https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/linux.png\" width=\"20\" height=\"20\"> Linux                | [Native Python + systemd, no container required](https://traefik-manager.xyzlab.dev/linux.html)                       |\n| <img src=\"https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/unraid.png\" width=\"20\" height=\"20\"> Unraid              | [Community Applications template, networking, multi-config](https://traefik-manager.xyzlab.dev/unraid.html)           |\n\n---\n\n## Documentation\n\nFull documentation at **[traefik-manager.xyzlab.dev](https://traefik-manager.xyzlab.dev/)**\n\n|                                                                           |                                                       |\n| ---------------------------------------------------------------------------| -------------------------------------------------------|\n| [Get Started](https://traefik-manager.xyzlab.dev/guide.html)              | Deployment guides for Docker, Podman, and Linux       |\n| [Traefik Stack](https://traefik-manager.xyzlab.dev/traefik-stack.html)    | One-liner installer guide                             |\n| [Configuration](https://traefik-manager.xyzlab.dev/manager-yml.html)      | `manager.yml` reference                               |\n| [Environment Variables](https://traefik-manager.xyzlab.dev/env-vars.html) | `CONFIG_DIR`, `CONFIG_PATHS`, auth, domains, and more |\n| [Security](https://traefik-manager.xyzlab.dev/security.html)              | API keys, sessions, CSRF, rate limits, and hardening  |\n| [API Reference](https://traefik-manager.xyzlab.dev/api.html)              | REST API for integrations and the mobile app          |\n| [OIDC / SSO](https://traefik-manager.xyzlab.dev/oidc.html)                | OIDC setup, provider examples, and access control     |\n| [Mobile App](https://traefik-manager.xyzlab.dev/mobile.html)              | Android companion app setup and features              |\n| [Reset Password](https://traefik-manager.xyzlab.dev/reset-password.html)  | CLI reset, TOTP recovery, manual reset                |\n| [UI Examples](https://traefik-manager.xyzlab.dev/ui-examples.html)        | Screenshots and walkthroughs                          |\n| [Provider Tabs](https://traefik-manager.xyzlab.dev/tab-docker.html)                      | Docker, Kubernetes, Swarm, Nomad, ECS, and more       |\n\n---\n\n## Tech Stack\n\n| Layer     | Technology                                    |\n| -----------| -----------------------------------------------|\n| Backend   | Python 3.11 · Flask · Gunicorn                |\n| Config    | ruamel.yaml (preserves comments)              |\n| Auth      | bcrypt · pyotp (TOTP) · Flask sessions · CSRF · Flask-Limiter · Fernet |\n| Frontend  | Vanilla JS · Tailwind CSS · Phosphor Icons    |\n| Container | Docker · Alpine Linux                         |\n\n---\n\n## Contributing\n\nPull requests are welcome. For larger changes please open an issue first.\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=chr0nzz%2Ftraefik-manager&type=date&legend=top-left\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/image?repos=chr0nzz/traefik-manager&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/image?repos=chr0nzz/traefik-manager&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/image?repos=chr0nzz/traefik-manager&type=date&legend=top-left\" />\n </picture>\n</a>\n\n## License\n\n[GPL-3.0](LICENSE)\n","summary":" Traefik Manager is a self-hosted web interface that eliminates the need for manual YAML editing when configuring Traefik reverse proxy deployments. It provides an intuitive dashboard for adding routes, managing middlewares, monitoring service health, and viewing TLS certificates through a visual interface rather than command-line configuration. Designed specifically for homelabbers and self-hosting enthusiasts who want to simplify their infrastructure management, the tool also offers a companion mobile app and new static configuration editing capabilities in its beta release. By abstracting Traefik's complexity into a clean UI, it enables users to manage reverse proxy settings efficiently without touching configuration files directly.","description":"A clean, self-hosted web UI for managing your Traefik reverse proxy.","stars":321,"language":"HTML"},{"owner":"HabiRabbu","repo":"Musicseerr","url":"https://github.com/HabiRabbu/Musicseerr","readme":"<div align=\"center\">\n\n<img src=\"Images/logo_wide.png\" alt=\"MusicSeerr\" width=\"400\" />\n\n[![License: AGPL-3.0](https://img.shields.io/badge/license-AGPL--3.0-blue.svg)](LICENSE)\n[![Docker](https://img.shields.io/badge/docker-ghcr.io-blue?logo=docker)](https://github.com/habirabbu/musicseerr/pkgs/container/musicseerr)\n[![Docker Hub](https://img.shields.io/badge/docker-hub-blue?logo=docker&logoColor=white)](https://hub.docker.com/r/habirabbu/musicseerr)\n[![Discord](https://img.shields.io/discord/1356702267809808404?label=discord&logo=discord&logoColor=white)](https://discord.gg/B5suDg7gu2)\n[![Docs](https://img.shields.io/badge/docs-musicseerr.com-blue)](https://musicseerr.com/)\n\n[![ko-fi](https://ko-fi.com/img/githubbutton_sm.svg)](https://ko-fi.com/M4M41URGJO)\n\n</div>\n\n---\n\nMusicSeerr is a self-hosted music request and discovery app built around [Lidarr](https://lidarr.audio/). Search the full MusicBrainz catalogue, request albums, stream music from Jellyfin, Navidrome, Plex, or your local library, discover new albums based on your listening history, and scrobble everything to ListenBrainz and Last.fm. The whole thing runs as a single Docker container with a web UI for all configuration.\n\n---\n\n## Screenshots\n\n<i
