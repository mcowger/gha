ron and therefore not officially supported. If you want to use it, run this instead:\n\n```sh\ndir=/your/application/directory\ncurl 'https://raw.githubusercontent.com/jeffvli/feishin/refs/heads/development/install-feishin-appimage' | sh -s -- \"$dir\" wayland-native\n```\n\nIt also provides a simple uninstall routine, removing the downloaded files:\n\n```sh\ndir=/your/application/directory\ncurl 'https://raw.githubusercontent.com/jeffvli/feishin/refs/heads/development/install-feishin-appimage' | sh -s -- \"$dir\" remove\n```\n\nThe entry should show up in your Application Launcher immediately. If it does not, simply log out, wait 10 seconds, and log back in. Your Desktop Environment may alternatively provide a way to reload entries.\n\n### Web and Docker\n\nVisit [https://feishin.vercel.app](https://feishin.vercel.app) to use the hosted web version of Feishin. The web client only supports the web player backend.\n\nFeishin is also available as a Docker image. The images are hosted via `ghcr.io` and are available to view [here](https://github.com/jeffvli/feishin/pkgs/container/feishin). You can run the container using the following commands:\n\n```bash\n# Run the latest version\ndocker run --name feishin -p 9180:9180 ghcr.io/jeffvli/feishin:latest\n\n# Build the image locally\ndocker build -t feishin .\ndocker run --name feishin -p 9180:9180 feishin\n```\n\n#### Docker Compose\n\nTo install via Docker Compose, use the following snippet. This also works on Portainer.\n\n```yaml\nservices:\n    feishin:\n        container_name: feishin\n        image: 'ghcr.io/jeffvli/feishin:latest'\n        restart: unless-stopped\n        environment:\n            - SERVER_NAME=jellyfin # pre-defined server name\n            - SERVER_LOCK=true # When true AND name/type/url are set, only username/password can be toggled\n            - SERVER_TYPE=jellyfin # the allowed types are: jellyfin, navidrome, subsonic. These values are case insensitive\n            - SERVER_URL= # http://address:port or https://address:port\n            - REMOTE_URL= # http://address or https://address\n            - LEGACY_AUTHENTICATION=false # When SERVER_LOCK is true, sets the legacy (plaintext) authentication flag for Subsonic/OpenSubsonic servers\n            - ANALYTICS_DISABLED=true # Set to true to disable Umami analytics tracking\n        ports:\n            - 9180:9180\n            # Alternatively, to restrict to only localhost, - 127.0.0.1:9180:8190\n```\n\n### Configuration\n\n1. Upon startup you will be greeted with a prompt to select the path to your MPV binary. If you do not have MPV installed, you can download it [here](https://mpv.io/installation/) or install it using any package manager supported by your OS. After inputting the path, restart the app.\n\n2. After restarting the app, you will be prompted to select a server. Click the `Open menu` button and select `Manage servers`. Click the `Add server` button in the popup and fill out all applicable details. You will need to enter the full URL to your server, including the protocol and port if applicable (e.g. `https://navidrome.my-server.com` or `http://192.168.0.1:4533`).\n\n- **Navidrome** - For the best experience, select \"Save password\" when creating the server and configure the `SessionTimeout` setting in your Navidrome config to a larger value (e.g. 72h).\n    - **Linux users** - The default password store uses `libsecret`. `kwallet4/5/6` are also supported, but must be explicitly set in Settings > Window > Passwords/secret store.\n\n3. _Optional_ - If you want to host Feishin on a subpath (not `/`), then pass in the following environment variable: `PUBLIC_PATH=PATH`. For example, to host on `/feishin`, pass in `PUBLIC_PATH=/feishin`.\n\n4. _Optional_ - To hard code the server url, pass the following environment variables: `SERVER_NAME`, `SERVER_TYPE` (one of `jellyfin` or `navidrome` or `subsonic`), `SERVER_URL`. To prevent users from changing these settings, pass `SERVER_LOCK=true`. This can only be set if all three of the previous values are set. When `SERVER_LOCK=true`, you can also set `LEGACY_AUTHENTICATION=true` or `LEGACY_AUTHENTICATION=false` to configure the legacy authentication flag for the server (only applicable for Subsonic/OpenSubsonic servers).\n\n5. _Optional_ - If your server uses a separate public-facing URL than what integrating applications use internally to communicate with your server, such as a separate Navidrome `ShareURL`, set `REMOTE_URL` to said public-facing URL.\n\n6. _Optional_ - To disable Umami analytics tracking in the Docker/web version, set the environment variable `ANALYTICS_DISABLED=true`. When enabled, the analytics script will not be loaded and all tracking will be disabled.\n\n7. _Optional_ - App settings (theme, language, sidebar options, etc.) can be overridden with environment variables on first run. The variables use the `FS_` prefix (e.g. `FS_GENERAL_THEME=defaultDark`, `FS_GENERAL_LANGUAGE=de`). See [the settings environment variable documentation](docs/ENV_SETTINGS.md) for the full list.\n\n## FAQ\n\n### MPV is either not working or is rapidly switching between pause/play states\n\nFirst thing to do is check that your MPV binary path is correct. Navigate to the settings page and re-set the path and restart the app. If your issue still isn't resolved, try reinstalling MPV. Known working versions include `v0.35.x` and `v0.36.x`. `v0.34.x` is a known broken version.\n\n### What music servers does Feishin support?\n\nFeishin supports any music server that implements a [Navidrome](https://www.navidrome.org/), [Jellyfin](https://jellyfin.org/), or [OpenSubsonic compatible](https://opensubsonic.netlify.app/) API.\n\n- [Navidrome](https://github.com/navidrome/navidrome)\n- [Jellyfin](https://github.com/jellyfin/jellyfin)\n- [OpenSubsonic](https://opensubsonic.netlify.app/) compatible servers, such as...\n    - [Airsonic-Advanced](https://github.com/airsonic-advanced/airsonic-advanced)\n    - [Ampache](https://ampache.org)\n    - [Astiga](https://asti.ga/)\n    - [Funkwhale](https://www.funkwhale.audio/)\n    - [Gonic](https://github.com/sentriz/gonic)\n    - [LMS](https://github.com/epoupon/lms)\n    - [Nextcloud Music](https://apps.nextcloud.com/apps/music)\n    - [Supysonic](https://github.com/spl0k/supysonic)\n    - [Qm-Music](https://github.com/chenqimiao/qm-music)\n    - More (?)\n\n- [Plex](https://www.plex.tv/media-server-downloads)\n    - [Feishin fork by lux032](https://github.com/lux032/feishin) - Plex is not natively supported. Use the fork by lux032 to use Plex with Feishin.\n\n\n### I have the issue \"The SUID sandbox helper binary was found, but is not configured correctly\" on Linux\n\nThis happens when you have user (unprivileged) namespaces disabled (`sysctl kernel.unprivileged_userns_clone` returns 0). You can fix this by either enabling unprivileged namespaces, or by making the `chrome-sandbox` Setuid.\n\n```bash\nchmod 4755 chrome-sandbox\nsudo chown root:root chrome-sandbox\n```\n\nUbuntu 24.04 specifically introduced breaking changes that affect how namespaces work. Please see https://discourse.ubuntu.com/t/ubuntu-24-04-lts-noble-numbat-release-notes/39890#:~:text=security%20improvements%20 for possible fixes.\n\n## Development\n\nBuilt and tested using Node `v23.11.0`.\n\nThis project is built off of [electron-vite](https://github.com/alex8088/electron-vite)\n\n- `pnpm run dev` - Start the development server\n- `pnpm run dev:watch` - Start the development server in watch mode (for main / preload HMR)\n- `pnpm run start` - Starts the app in production preview mode\n- `pnpm run build` - Builds the app for desktop\n- `pnpm run build:electron` - Build the electron app (main, preload, and renderer)\n- `pnpm run build:remote` - Build the remote app (remote)\n- `pnpm run build:web` - Build the standalone web app (renderer)\n- `pnpm run package` - Package the project\n- `pnpm run package:dev` - Package the project for development locally\n- `pnpm run package:linux` - Package the project for Linux locally\n- `pnpm run package:mac` - Package the project for Mac locally\n- `pnpm run package:win` - Package the project for Windows locally\n- `pnpm run publish:linux` - Publish the project for Linux\n- `pnpm run publish:linux:beta` - Publish the project for Linux (beta channel)\n- `pnpm run publish:linux-arm64` - Publish the project for Linux ARM64\n- `pnpm run publish:linux-arm64:beta` - Publish the project for Linux ARM64 (beta channel)\n- `pnpm run publish:mac` - Publish the project for Mac\n- `pnpm run publish:mac:beta` - Publish the project for Mac (beta channel)\n- `pnpm run publish:win` - Publish the project for Windows\n- `pnpm run publish:win:beta` - Publish the project for Windows (beta channel)\n- `pnpm run typecheck` - Type check the project\n- `pnpm run typecheck:node` - Type check the project with tsconfig.node.json\n- `pnpm run typecheck:web` - Type check the project with tsconfig.web.json\n- `pnpm run lint` - Lint the project\n- `pnpm run lint:fix` - Lint the project and fix linting errors\n- `pnpm run i18next` - Generate i18n files\n\n## Translation\n\nThis project uses [Weblate](https://hosted.weblate.org/projects/feishin/) for translations. If you would like to contribute, please visit the link and submit a translation.\n\n## License\n\n[GNU General Public License v3.0 ┬й](https://github.com/jeffvli/feishin/blob/dev/LICENSE)\n","summary":"Feishin is an ElectronтАСbased music player built as a modern rewrite of Sonixd, designed for users who stream or manage music libraries on servers such as Navidrome. It supports both MPV and web player backends, offers a polished UI, realтАСtime lyric display, smart playlist editing, and the ability to scrobble playback to your own scrobbleтАСtracking server. The application runs on macOS, Windows, Linux (via Flatpak or AppImage) and is ideal for power users wanting a featureтАСrich, crossтАСplatform client that integrates tightly with their selfтАСhosted music stack.","description":"A modern self-hosted music player.","stars":7996,"language":"TypeScript"},{"owner":"terry90","repo":"soulbeet","url":"https://github.com/terry90/soulbeet","readme":"# Soulbeet\n\n[![Docker Pulls](https://img.shields.io/docker/pulls/docccccc/soulbeet)](https://hub.docker.com/r/docccccc/soulbeet)\n[![Docker Image Size](https://img.shields.io/docker/image-size/docccccc/soulbeet)](https://hub.docker.com/r/docccccc/soulbeet/tags)\n[![Docker Image Version](https://img.shields.io/docker/v/docccccc/soulbeet)](https://hub.docker.com/r/docccccc/soulbeet/tags)\n\n[![GitHub Actions Workflow Status](https://img.shields.io/github/actions/workflow/status/terry90/soulbeet/image-build-push.yml)](https://github.com/terry90/soulbeet/actions)\n[![GitHub License](https://img.shields.io/github/license/terry90/soulbeet)](https://github.com/terry90/soulbeet)\n[![GitHub Repo stars](https://img.shields.io/github/stars/terry90/soulbeet)](https://github.com/terry90/soulbeet)\n\nSoulbeet is a self-hosted music downloader, library manager, and discovery engine. Search for music, download it, and let the app handle everything else: finding the best source, tagging, organizing, and keeping your library clean. Connect your scrobble history and Soulbeet will find new music for you automatically.\n\nScreenshots: [here](./screenshots)\n\n## Features\n\n- **Search & Download**: Find albums and tracks, hit download. Soulbeet picks the best available source from Soulseek, downloads it, tags it with beets, and puts it in your library. No manual file management.\n- **Music Discovery**: Soulbeet analyzes your Last.fm and ListenBrainz history, finds new music through track similarity, artist exploration, collaborative filtering, and genre discovery, downloads the best candidates, and pushes playlists to your Navidrome server. Fully automatic.\n- **Three Discovery Profiles**: Conservative (close to what you know), Balanced, or Adventurous (unfamiliar territory). Run one or all three, each with its own playlist.\n- **Rate & Keep**: Listen in Navidrome. 3+ stars promotes a track to your permanent library, 1 star deletes it. Unrated tracks expire and get replaced with fresh picks.\n- **Multi-user**: Private or shared folders. Each user gets their own discovery profiles, scrobble credentials, and preferences.\n- **Multiple Metadata Providers**: MusicBrainz (albums) or Last.fm (single tracks), selectable per user.\n\n## How It Works\n\nYou search, you click download. Behind the scenes:\n\n1. **Soulbeet** finds the best source on Soulseek, downloads it through **slskd**, tags and organizes it with **beets**, and puts it in your library.\n2. **Navidrome** picks up the new files and makes them streamable.\n3. For discovery: **Last.fm / ListenBrainz** feed your listening history into the recommendation engine, which finds new tracks, downloads them, and pushes playlists to Navidrome.\n\n## Self-Hosting with Docker\n\nThe recommended way to run Soulbeet is via Docker Compose. This ensures all dependencies (like `beets` and `python`) are correctly set up.\n\n**Compatibility:** The Docker image supports both **AMD64** and **ARM64** architectures.\n\n### Prerequisites\n\n-   Docker & Docker Compose (or podman-compose)\n\n### Quick Start\n\n1.  Create a `docker-compose.yml` file:\n\n```yaml\nservices:\n  soulbeet:\n    image: docker.io/docccccc/soulbeet:latest\n    restart: unless-stopped\n    ports:\n      - 9765:9765\n    environment:\n      - DATABASE_URL=sqlite:/data/soulbeet.db\n      - DOWNLOAD_PATH=/downloads\n      - SECRET_KEY=change-me-in-production\n      - NAVIDROME_URL=http://navidrome:4533\n      # Optional\n      - BEETS_CONFIG=/config/config.yaml\n    volumes:\n      - ./data:/data\n      - /path/to/slskd/downloads:/downloads\n      - /path/to/music:/music\n    depends_on:\n      - slskd\n      - navidrome\n\n  navidrome:\n    image: deluan/navidrome:latest\n    ports:\n      - \"4533:4533\"\n    environment:\n      - ND_MUSICFOLDER=/music\n    volumes:\n      - ./navidrome-data:/data\n      - /path/to/music:/music\n\n  slskd:\n    image: slskd/slskd\n    environment:\n      - SLSKD_REMOTE_CONFIGURATION=true\n    volumes:\n      - ./slskd-config:/app/slskd.conf.d\n      - /path/to/slskd/downloads:/app/downloads\n    ports:\n      - \"5030:5030\"\n```\n\n2.  **Important**: The `/downloads` volume must match between `slskd` and `soulbeet` so Soulbeet can see the files `slskd` downloaded. The `/music` volume must match between `soulbeet` and `navidrome` so Navidrome can see the organized library.\n\n3.  Run:\n\n```bash\ndocker-compose up -d\n```\n\n### Initial Setup\n\n1.  Open `http://localhost:9765` and log in with your **Navidrome credentials**.\n2.  In **Settings > Config**, connect slskd (URL + API key). [How to get an slskd API key](https://github.com/slskd/slskd/blob/master/docs/config.md#yaml-24).\n3.  In **Settings > Library**, add your music folders (e.g. `/music`).\n4.  That's it. Search for something and download it.\n\nFor discovery (optional): add your Last.fm API key and/or ListenBrainz token in Settings > Library, enable discovery on a folder, pick your profiles, and hit Generate.\n\n## Configuration\n\n### Environment Variables\n\n| Variable | Description | Default |\n|----------|-------------|---------|\n| `DATABASE_URL` | Connection string for SQLite | `sqlite:soulbeet.db` |\n| `DOWNLOAD_PATH` | Path where slskd saves downloads | `/downloads` |\n| `SECRET_KEY` | Encryption key for tokens and credentials | |\n| `NAVIDROME_URL` | Your Navidrome server URL | |\n| `BEETS_CONFIG` | Path to custom beets config file | `beets_config.yaml` |\n| `BEETS_ALBUM_MODE` | Enable album import mode (see below) | `false` |\n\n**Note**: slskd URL and API key are configured through the web UI (Settings > Config) and stored in the database. Scrobble credentials (Last.fm API key, ListenBrainz token) are configured per-user in Settings > Library.\n\n### Beets Configuration\n\nSoulbeet uses `beets` to import music. You can mount a custom `config.yaml` to `/config/config.yaml` (or wherever you point `BEETS_CONFIG` to) to customize how beets behaves (plugins, naming formats, etc.).\n\nDefault `beet import` flags used:\n-   `-q`: Quiet mode (no user interaction)\n-   `-s`: Singleton mode (Default behavior unless `BEETS_ALBUM_MODE` is set)\n-   `-l [library_path]`: Library database path (per-folder)\n-   `-d [target_path]`: Import to the specific folder selected in the web UI.\n\n### Library Management\n\n**Important**: Each music folder you configure in Soulbeet has its own beets database (`.beets_library.db`) stored at the root of that folder. This enables:\n\n- Per-folder duplicate detection\n- Independent library management for each user/folder\n- Cross-library duplicate detection\n\n#### Interacting with Your Library\n\nEach user can have multiple libraries. Each library is a folder that contains music files and a `.beets_library.db` file. This database is used to avoid duplicate tracks within the same library.\n\nSince we use different databases, we can't directly compare tracks across libraries. However, we can use the `beets` CLI to interact with each library individually. This way you can add tracks outside of Soulbeet but keep them in sync with your library.\n\nTo manually interact with a library (list tracks, modify tags, remove items, etc.), use the `beet` CLI with the `-l` flag pointing to the folder's database:\n\n```bash\n# List all tracks in a library\nbeet -l /music/Person1/.beets_library.db ls\n```\n\nIf using Docker, run these commands inside the container:\n```bash\ndocker exec -it <container_name> beet -l /music/Person1/.beets_library.db ls\n```\n\nFor more beets commands, see the [beets documentation](https://beets.readthedocs.io/en/stable/reference/cli.html).\n\n#### Album Mode (`BEETS_ALBUM_MODE`)\n\nBy setting `BEETS_ALBUM_MODE=true`, Soulbeet will attempt to group downloaded files by their parent directory and import them as an album instead of singletons.\n\nThis flag is only needed when you want album tags on your tracks. E.g: `albumartist` `mb_albumid` and so on..\n\n**Important for Album Mode:**\nSince `beets` is run in quiet mode (`-q`), it will skip any imports that require user intervention (e.g., if the metadata doesn't match confidently). To ensure partial albums or less popular releases are imported correctly, you **must** configure your `beets_config.yaml` to be more permissive.\n\nRecommended additions to your `beets_config.yaml` for Album Mode:\n\n```yaml\nimport:\n  # quiet_fallback: asis # Optional: If no strong match, import with existing tags instead of skipping\n  timid: no\n\nmatch:\n  strong_rec_thresh: 0.10  # Lower threshold to accept less confident matches\n  max_rec:\n    missing_tracks: strong\n    unmatched_tracks: strong\n  distance_weights:\n    missing_tracks: 0.1  # Reduce weight (I think default is 0.9) to penalize less for missing tracks, improving the overall score.\n    # unmatched_tracks: 0.2  # Optional: Similar for extra tracks.\n```\n\n*Note: Tweaking `strong_rec_thresh` and other matching parameters increases the risk of incorrect tags, but is necessary for fully automated imports of obscure or partial albums.*\n\n### Discovery Setup\n\nDiscovery generates personalized playlists from your scrobble history and pushes them to Navidrome. Here's how to set it up.\n\n#### Navidrome Configuration\n\n1. **Enable ReportRealPath** for the Soulbeet player. Go to your Navidrome instance > Settings > Players (e.g. `https://your-navidrome/app/#/player`), find the Soulbeet player entry, and enable \"Report Real Path\". Without this, rating sync and auto-delete cannot resolve file paths.\n\n2. Your Soulbeet folder paths must point to the same physical directories that Navidrome's music library uses. The mount paths inside each container can differ (e.g. Soulbeet at `/music`, Navidrome at `/media/music`), as long as they map to the same files on the host.\n\n#### Soulbeet Configuration\n\n1. Go to **Settings > Library** in the Soulbeet web UI\n2. Add your **Last.fm API key** and/or **ListenBrainz username + token**\n3. **Enable Discovery** on a folder and pick your profiles (Conservative, Balanced, Adventurous)\n4. Optionally customize playlist names for each profile\n5. Hit **Generate** to run the first batch\n\n#### How It Works\n\n- Discovery creates a `Discovery/` directory inside your chosen folder, with subdirectories per profile (e.g., `Discovery/Balanced/`, `Discovery/Adventurous/`).\n- Tracks are downloaded from Soulseek, imported via beets into the profile subdirectory, and tagged properly.\n- A smart playlist is created in Navidrome (via the native API) for each profile, filtered by the folder path. The playlist auto-updates as Navidrome scans new files.\n- Every 6 hours, an automation task syncs ratings, creates playlists if missing, and regenerates expired discovery batches.\n\n#### Auto-Delete\n\nWhen enabled (Settings > Library > Auto-delete), 1-star tracks are deleted from disk during rating sync. This requires ReportRealPath to be enabled in Navidrome so Soulbeet receives the actual file path. For shared folders (multiple users), a track is only deleted if the average rating across all users is 1 or below.\n\n## Development\n\n1.  Install Rust and `dioxus_cli`.\n2.  Run the tailwind watcher:\n    ```bash\n    ./css.sh\n    ```\n3.  Run the app:\n    ```bash\n    dx serve --platform web\n    ```\n\n## Roadmap\n\n- Reduce friction: fewer clicks between \"I want this\" and \"it's in my library\"\n- Play preview on album track list before downloading\n- Smarter Soulseek search (better source ranking, automatic fallback between providers)\n","summary":"Soulbeet is a selfтАСhosted solution that searches, downloads, tags, and organizes music from the Soulseek network, then streams it through Navidrome. It also analyses your scrobble history from Last.fm or ListenBrainz to automatically generate discovery playlists across conservative, balanced, and adventurous profiles, with ratingтАСbased retention that promotes or removes tracks. The application supports multiple users with private or shared folders and lets each user select metadata providers and discovery settings. ItтАЩs ideal for music enthusiasts who want a clean, fully automated library without manual file handling.","description":"Automated music downloader and manager integrating Slskd and Beets.","stars":532,"language":"Rust"},{"owner":"voidmind-io","repo":"voidllm","url":"https://github.com/voidmind-io/voidllm","readme":"# VoidLLM\n\n[![CI](https://github.com/voidmind-io/voidllm/actions/workflows/ci.yml/badge.svg)](https://github.com/voidmind-io/voidllm/actions/workflows/ci.yml)\n[![codecov](https://codecov.io/gh/voidmind-io/voidllm/graph/badge.svg?token=1OCK31RDMG)](https://codecov.io/gh/voidmind-io/voidllm)\n[![Go Report Card](https://goreportcard.com/badge/github.com/voidmind-io/voidllm)](https://goreportcard.com/report/github.com/voidmind-io/voidllm)\n[![Artifact Hub](https://img.shields.io/endpoint?url=https://artifacthub.io/badge/repository/voidllm)](https://artifacthub.io/packages/search?repo=voidllm)\n[![OpenSSF Scorecard](https://api.securityscorecards.dev/projects/github.com/voidmind-io/voidllm/badge)](https://securityscorecards.dev/viewer/?uri=github.com/voidmind-io/voidllm)\n[![Snyk](https://snyk.io/test/github/voidmind-io/voidllm/badge.svg)](https://snyk.io/test/github/voidmind-io/voidllm)\n[![Release](https://img.shields.io/github/v/release/voidmind-io/voidllm)](https://github.com/voidmind-io/voidllm/releases/latest)\n[![Go](https://img.shields.io/github/go-mod/go-version/voidmind-io/voidllm)](go.mod)\n[![License: BSL 1.1](https://img.shields.io/badge/License-BSL_1.1-blue.svg)](LICENSE)\n\n**A privacy-first LLM proxy and AI gateway for teams that take control seriously.**\n\nVoidLLM is a self-hosted LLM proxy that sits between your applications and LLM providers - OpenAI, Anthropic, Azure, Ollama, vLLM, or any custom endpoint. It gives you organization-wide access control, API key management, usage tracking, rate limiting, and multi-deployment load balancing. One Go binary, sub-2ms proxy overhead, zero knowledge of your prompts.\n\n![VoidLLM Dashboard](docs/screenshots/VoidLLM-Dashboard.jpg)\n\n<details>\n<summary>More screenshots</summary>\n\n![Usage Analytics](docs/screenshots/VoidLLM-Usage.jpg)\n![API Keys](docs/screenshots/VoidLLM-Keys.jpg)\n![Playground](docs/screenshots/VoidLLM-Playground.jpg)\n\n</details>\n\n> **Privacy-First by Design:** VoidLLM is a zero-knowledge LLM proxy - it never stores, logs, or persists any prompt or response content. Not as a setting you can toggle - by architecture. Only metadata is tracked: who made the request, which model, how many tokens, how long it took. Your data stays yours.\n\n---\n\n## Why VoidLLM?\n\n| Problem | How VoidLLM solves it |\n|---|---|\n| Teams share raw API keys in Slack | Virtual keys with org/team/user scoping and RBAC |\n| No visibility into who's spending what | Per-key, per-team, per-org usage tracking + cost estimation |\n| One runaway script burns the monthly budget | Rate limits + token budgets enforced by the proxy at every level |\n| Switching providers means changing every app | Model aliases - clients call `default`, the proxy routes it anywhere |\n| Provider goes down, everything breaks | Multi-deployment load balancing with automatic failover |\n| Existing proxies log your prompts | Zero-knowledge proxy architecture - content never touches disk |\n\n## Quick Start\n\n```bash\n# Generate required keys\nexport VOIDLLM_ADMIN_KEY=$(openssl rand -base64 32)\nexport VOIDLLM_ENCRYPTION_KEY=$(openssl rand -base64 32)\n\n# Start the LLM proxy with Docker\ndocker run -p 8080:8080 \\\n  -e VOIDLLM_ADMIN_KEY -e VOIDLLM_ENCRYPTION_KEY \\\n  -v $(pwd)/voidllm.yaml:/etc/voidllm/voidllm.yaml:ro \\\n  -v voidllm_data:/data \\\n  ghcr.io/voidmind-io/voidllm:latest\n```\n\n### Binary (no Docker needed)\n\nDownload the latest binary for your platform from the [releases page](https://github.com/voidmind-io/voidllm/releases/latest):\n\n```bash\n# Linux\ncurl -sL https://github.com/voidmind-io/voidllm/releases/latest/download/voidllm-linux-amd64.tar.gz | tar xz\nexport VOIDLLM_ADMIN_KEY=$(openssl rand -base64 32)\nexport VOIDLLM_ENCRYPTION_KEY=$(openssl rand -base64 32)\n./voidllm\n```\n\nAvailable for: Linux (amd64, arm64), Windows (amd64, arm64), macOS (amd64, arm64).\n\nOn first start, VoidLLM prints your credentials to stdout:\n\n```\n========================================\n BOOTSTRAP COMPLETE - COPY THESE NOW\n========================================\n  API Key:    vl_uk_a3f2...\n  Email:      admin@voidllm.local\n  Password:   <random>\n========================================\n```\n\nOpen `http://localhost:8080`, log in with the email and password above, and start proxying. The API key is used for SDK calls (`Authorization: Bearer vl_uk_...`). These credentials are shown once - save them.\n\n### One-Click Deploy\n\n[![Deploy on Railway](https://railway.com/button.svg)](https://railway.com/deploy/wild-pure?referralCode=fw9l7c)\n\nKeys are auto-generated. Open the URL Railway gives you and start adding models.\n\n```bash\n# Your apps just point at the proxy instead of the provider\ncurl http://localhost:8080/v1/chat/completions \\\n  -H \"Authorization: Bearer vl_uk_...\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"model\":\"default\",\"messages\":[{\"role\":\"user\",\"content\":\"hello\"}]}'\n```\n\nAny OpenAI-compatible SDK works out of the box - just change the base URL to your VoidLLM proxy.\n\n## Features\n\n| Feature | Details |\n|---|---|\n| OpenAI-compatible proxy | `/v1/chat/completions`, embeddings, images, audio, streaming |\n| Multi-provider routing | OpenAI, Anthropic, Azure, Ollama, vLLM, any custom endpoint |\n| Load balancing | Round-robin, least-latency, weighted, priority across deployments |\n| Automatic failover | Retry on 5xx/timeout, circuit breakers, health-aware routing |\n| Web UI | Dashboard, playground, API keys, teams, models, usage, settings |\n| RBAC | Org > Team > User > Key hierarchy, 4 roles |\n| Rate limits | Requests per minute/day, most-restrictive-wins across levels |\n| Token budgets | Daily/monthly limits, real-time enforcement |\n| Usage tracking | Tokens, cost, duration, TTFT per request |\n| Model aliases | Clients call `default`, you control where it routes |\n| MCP gateway | Proxy external MCP servers with access control and session management |\n| Code Mode | WASM-sandboxed JS for multi-tool orchestration |\n| Prometheus metrics | Latency, tokens, active streams, routing, health |\n| Database | SQLite (default) or PostgreSQL |\n| Deployment | Docker, Helm chart, graceful shutdown |\n| | |\n| **Pro ($49/mo)** | **Everything above, plus:** |\n| Cost reports | Model breakdown, daily trends |\n| Usage export | CSV download |\n| Data retention | Extended |\n| Support | Priority email |\n| | |\n| **Enterprise ($149/mo)** | **Everything in Pro, plus:** |\n| SSO / OIDC | Google, Azure AD, Okta, Keycloak, any provider |\n| Per-org SSO | Each organization gets its own Identity Provider |\n| Auto-provisioning | Users created from allowed email domains |\n| Group sync | OIDC groups mapped to VoidLLM teams |\n| Audit logs | Every admin action, filterable API + UI |\n| OpenTelemetry | OTLP/gRPC export, request ID correlation |\n| Support | Dedicated Slack |\n\n**Founding Member ($999 one-time):** All Enterprise features, lifetime license, Product Advisory Board, direct founder access. Limited spots.\n\nFlat pricing - no per-user fees, no per-request charges. Self-hosted on your infrastructure.\n\n---\n\n## MCP Gateway\n\nVoidLLM is an [MCP](https://modelcontextprotocol.io) gateway - it exposes built-in management tools and proxies requests to external MCP servers with access control, usage tracking, and automatic session management.\n\n### Built-in Tools\n\n| Tool | Description |\n|---|---|\n| `list_models` | List models with health status (RBAC-scoped) |\n| `get_model_health` | Health status for a specific model or deployment |\n| `get_usage` | Usage stats for your key/team/org |\n| `list_keys` | API keys visible to you |\n| `create_key` | Create a temporary API key |\n| `list_deployments` | Deployment details (system_admin only) |\n\n### External MCP Servers\n\nRegister external MCP servers via the Admin UI or API. VoidLLM proxies tool calls through `/api/v1/mcp/:alias` with scoped access control (global, org, or team level), automatic session management, usage tracking, and Prometheus metrics.\n\n### Code Mode\n\nCode Mode lets LLMs write JavaScript that orchestrates multiple MCP tool calls in a single execution - instead of one tool call per LLM turn. The JS runs in a WASM-sandboxed QuickJS runtime with no filesystem, no network, and no host access. Reduces token usage by 30-80%.\n\n```yaml\nmcp:\n  code_mode:\n    enabled: true\n    pool_size: 8          # concurrent WASM runtimes\n    memory_limit_mb: 16   # per execution\n    timeout: 30s          # per execution\n    max_tool_calls: 50    # per execution\n```\n\nCode Mode exposes three tools on `/api/v1/mcp`:\n\n| Tool | Description |\n|---|---|\n| `list_servers` | Discover available MCP servers and tool counts |\n| `search_tools` | Find tools by keyword across all servers |\n| `execute_code` | Run JS with MCP tools as `await tools.alias.toolName(args)` |\n\nTypeScript type declarations are auto-generated from tool schemas and included in the `execute_code` description, so LLMs see available tools and argument types at `tools/list` time.\n\nAdmins can block specific tools from Code Mode via the per-tool blocklist API and UI.\n\n### IDE Setup\n\n```json\n{\n  \"mcpServers\": {\n    \"voidllm\": {\n      \"type\": \"http\",\n      \"url\": \"http://your-voidllm-instance:8080/api/v1/mcp\",\n      \"headers\": { \"Authorization\": \"Bearer vl_uk_your_key\" }\n    }\n  }\n}\n```\n\nThis connects your IDE (Claude Code, Cursor, Windsurf) to the Code Mode endpoint. Management tools (list_models, get_usage, etc.) are available at `/api/v1/mcp/voidllm`. External MCP servers at `/api/v1/mcp/:alias`.\n\n### Known Limitations\n\n- **SSE transport not supported** - MCP servers using the deprecated SSE protocol (pre 2025-03-26 spec) are auto-detected and deactivated. Use servers that support Streamable HTTP.\n- **No OAuth for upstream MCP servers** - servers requiring per-user OAuth (Jira, Slack, Google) are not yet supported. API key and header auth work.\n- **Single instance only** - Code Mode's WASM runtime pool is in-memory. Multi-pod deployments require Redis support (coming soon).\n\n---\n\n## Documentation\n\n**[Full documentation](docs/index.md)** | **[Blog](https://voidllm.ai/blog)** | **[FAQ](https://voidllm.ai/faq)**\n\n| Topic | Guide |\n|---|---|\n| Getting Started | [Quick Start](docs/getting-started.md) |\n| Configuration | [All YAML settings](docs/configuration.md) |\n| Docker | [Docker deployment](docs/deployment/docker.md) |\n| Kubernetes | [Helm chart](docs/deployment/kubernetes.md) |\n| Providers | [OpenAI, Anthropic, Azure, Ollama, vLLM](docs/models/providers.md) |\n| Load Balancing | [Strategies, failover, circuit breakers](docs/models/load-balancing.md) |\n| MCP Gateway | [Overview](docs/mcp/overview.md) - [Servers](docs/mcp/servers.md) - [Code Mode](docs/mcp/code-mode.md) - [IDE Setup](docs/mcp/ide-integration.md) |\n| RBAC | [Roles and permissions](docs/security/rbac.md) |\n| Privacy | [Zero-knowledge architecture](docs/security/privacy.md) |\n| API Reference | [Endpoints and error codes](docs/api/overview.md) |\n| Enterprise | [License](docs/enterprise/license.md) - [SSO](docs/enterprise/sso.md) - [Audit](docs/enterprise/audit.md) - [OTel](docs/enterprise/otel.md) - [Pricing](docs/enterprise/pricing.md) |\n| Troubleshooting | [Common issues](docs/troubleshooting.md) |\n\n## Configuration\n\n```yaml\nserver:\n  proxy:\n    port: 8080\n\nmodels:\n  # Single endpoint\n  - name: dolphin-mistral\n    provider: ollama\n    base_url: http://localhost:11434/v1\n    timeout: 30s\n    aliases: [default]\n    pricing:\n      input_per_1m: 0.15\n      output_per_1m: 0.60\n\n  # Load balanced - multiple deployments with failover\n  - name: gpt-4o\n    strategy: round-robin\n    aliases: [smart]\n    deployments:\n      - name: azure-east\n        provider: azure\n        base_url: https://eastus.openai.azure.com\n        api_key: ${AZURE_EAST_KEY}\n        azure_deployment: gpt-4o\n        priority: 1\n      - name: openai-fallback\n        provider: openai\n        base_url: https://api.openai.com/v1\n        api_key: ${OPENAI_KEY}\n        priority: 2\n\nmcp_servers:\n  - name: AWS Knowledge\n    alias: aws\n    url: https://knowledge-mcp.global.api.aws\n    auth_type: none\n\nsettings:\n  admin_key: ${VOIDLLM_ADMIN_KEY}\n  encryption_key: ${VOIDLLM_ENCRYPTION_KEY}\n  mcp:\n    code_mode:\n      enabled: true\n```\n\nSupported providers: `openai` ┬╖ `anthropic` ┬╖ `azure` ┬╖ `vllm` ┬╖ `ollama` ┬╖ `custom`\n\nEnvironment variables are interpolated with `${VAR}` syntax. Secrets never hardcoded.\n\n## Deployment\n\n### Docker Compose\n\n```bash\ncp voidllm.yaml.example voidllm.yaml\nexport VOIDLLM_ADMIN_KEY=$(openssl rand -base64 32)\nexport VOIDLLM_ENCRYPTION_KEY=$(openssl rand -base64 32)\ndocker-compose up\n```\n\n### Kubernetes (Helm)\n\n```bash\nhelm install voidllm chart/voidllm/ \\\n  --set secrets.adminKey=$(openssl rand -base64 32) \\\n  --set secrets.encryptionKey=$(openssl rand -base64 32) \\\n  --set config.models[0].name=my-model \\\n  --set config.models[0].provider=ollama \\\n  --set config.models[0].base_url=http://ollama:11434/v1\n```\n\nPostgreSQL and Redis are available as optional subcharts for production deployments.\n\n### From Source\n\n```bash\n# Prerequisites: Go 1.23+, Node 20+\ncd ui && npm ci && npm run build && cd ..\ngo run ./cmd/voidllm --config voidllm.yaml\n```\n\n## Privacy\n\nThis is not a feature toggle. It's an architectural decision that makes VoidLLM a privacy-first LLM proxy.\n\n- **No request body** in logs, DB, or any persistent storage\n- **No response body** in logs, DB, or any persistent storage\n- **No prompt caching** - content passes through memory only\n- **Usage events** contain only: who (key/org/team), what (model), how much (tokens/cost)\n- There is no `enable_content_logging` option. It doesn't exist.\n- Designed to support GDPR compliance - no personal data in prompts is stored or processed\n\n## CLI Tools\n\n```bash\n# Bidirectional database migration\nvoidllm migrate --from sqlite:///data/voidllm.db --to postgres://user:pass@host/db\n\n# License management (for Enterprise)\nvoidllm license verify < license.jwt\n```\n\n## License\n\n[Business Source License 1.1](LICENSE) - source available, self-hosting permitted,\ncompeting hosted services prohibited. Converts to Apache 2.0 four years after each release.\n\n---\n\nBuilt by [VoidMind](https://voidmind.io) ┬╖ [voidllm.ai](https://voidllm.ai)\n\nThis project was built with significant assistance from AI (Claude by Anthropic).\n","summary":"VoidLLM is a selfтАСhosted, privacyтАСfirst proxy that sits between your applications and any LLM providerтАФOpenAI, Anthropic, Azure, Ollama, or custom endpointsтАФand routes requests with minimal overhead. It empowers teams with granular API key scoping, RBAC, usage tracking, token budgeting, and rate limiting, while offering multiтАСdeployment load balancing for high availability. By never persisting or logging prompts, only metadata such as requestor, model, and token count are retained, keeping your data fully under your control. Organizations needing tight cost oversight, secure key management, and effortless provider switching can deploy VoidLLM via a single Go binary or Docker image.","description":"Privacy-first LLM proxy and AI gateway тАФ load balancing, multi-provider routing, API key management, usage tracking, rate limiting. Self-hosted. Zero knowledge of your prompts.","stars":59,"language":"Go"},{"owner":"papra-hq","repo":"papra","url":"https://github.com/papra-hq/papra","readme":"<p align=\"center\">\n<picture>\n    <source srcset=\"./.github/icon-dark.png\" media=\"(prefers-color-scheme: light)\">\n    <source srcset=\"./.github/icon-light.png\" media=\"(prefers-color-scheme: dark)\">\n    <img src=\"./.github/icon-dark.png\" alt=\"Header banner\">\n</picture>\n</p>\n\n<h1 align=\"center\">\n  Papra - Document management platform\n</h1>\n<p align=\"center\">\n  Minimalistic document management and archiving platform.\n</p>\n\n<p align=\"center\">\n  <a href=\"https://demo.papra.app\">Demo</a>\n  <span>&nbsp;&nbsp;тАв&nbsp;&nbsp;</span>\n  <a href=\"https://docs.papra.app\">Docs</a>\n  <span>&nbsp;&nbsp;тАв&nbsp;&nbsp;</span>\n  <a href=\"https://docs.papra.app/self-hosting/using-docker\">Self-hosting</a>\n  <span>&nbsp;&nbsp;тАв&nbsp;&nbsp;</span>\n  <a href=\"https://github.com/orgs/papra-hq/projects/2\">Roadmap</a>\n  <span>&nbsp;&nbsp;тАв&nbsp;&nbsp;</span>\n  <a href=\"https://papra.app/discord\">Discord</a>\n  <!-- <span>&nbsp;&nbsp;тАв&nbsp;&nbsp;</span>\n  <a href=\"https://dashboard.papra.app\">Managed instance</a> -->\n</p>\n\n## Introduction\n\n**Papra** is a minimalistic document management and archiving platform. It is designed to be simple to use and accessible to everyone. Papra is a platform for long-term document storage and management, like a digital archive for your documents.\n\nForget about that receipt of that gift you bought for your friend last year, or that warranty for your new phone. With Papra, you can easily store, forget, and retrieve your documents whenever you need them.\n\nA live demo of the platform is available at [demo.papra.app](https://demo.papra.app) (no backend, client-side local storage only).\n\n[![Papra](./.github/papra-screenshot.png)](https://demo.papra.app)\n\n## Project Status\n\nPapra is under active development, the core functionalities are stable and usable. With lots of features and improvements added regularly.\n\nFeedback and bug reports are highly appreciated to help us improve the platform.\n\n## Features\n\n- **Document management**: Upload, store, and manage your documents in one place.\n- **Organizations**: Create organizations to manage documents with family, friends, or colleagues.\n- **Search**: Quickly search for documents with full-text search.\n- **Authentication**: User accounts and authentication.\n- **Dark Mode**: A dark theme for those late-night document management sessions.\n- **Responsive Design**: Works on all devices, from desktops to mobile phones.\n- **Open Source**: The project is open-source and free to use.\n- **Self-hosting**: Host your own instance of Papra using Docker or other methods.\n- **Tags**: Organize your documents with tags.\n- **Email ingestion**: Send/forward emails to a generated address to automatically import documents.\n- **Content extraction**: Automatically extract text from images or scanned documents for search.\n- **Tagging Rules**: Automatically tag documents based on custom rules.\n- **Folder ingestion**: Automatically import documents from a folder.\n- **CLI**: Manage your documents from the command line.\n- **API, SDK and webhooks**: Build your own applications on top of Papra.\n- **i18n**: Support for multiple languages.\n- _Coming soon:_ **Document sharing**: Share documents with others.\n- _Coming soon:_ **Document requests**: Generate upload links for people to add documents.\n- _Coming maybe one day:_ **Mobile app**: Access and upload documents on the go.\n- _Coming maybe one day:_ **Desktop app**: Access and upload documents from your computer.\n- _Coming maybe one day:_ **Browser extension**: Upload documents from your browser.\n- _Coming maybe one day:_ **AI**: Use AI to help you manage or tag your documents.\n\n## Support\n\nPapra is a free and open-source project, but it is not free to run and develop. If you want to support the project, you can become a sponsor on [GitHub Sponsors](https://github.com/sponsors/corentinth) or [Buy me a coffee](https://buymeacoffee.com/cthmsst).\nIf you are a company, you can also [contact me](https://papra.app/contact) to discuss a sponsorship.\n\n## Self-hosting\n\nPapra is dedicated to providing a simple yet highly configurable self-hosting experience. Our lightweight Docker image (<200MB) is compatible with multiple architectures including x86, ARM64, and ARMv7.\n\nFor a quick start, simply run the following command:\n\n```bash\ndocker run -d --name papra -p 1221:1221 ghcr.io/papra-hq/papra:latest\n```\n\nPlease refer to the [self-hosting documentation](https://docs.papra.app/self-hosting/using-docker) for more information and configuration options.\n\n## Contributing\n\nContributions are welcome! Please refer to the [`CONTRIBUTING.md`](./CONTRIBUTING.md) file for guidelines on how to get started, report issues, and submit pull requests.\nYou can find easy-to-pick-up tasks with the [`good first issue`](https://github.com/papra-hq/papra/issues?q=sort%3Aupdated-desc%20is%3Aissue%20is%3Aopen%20label%3A%22good%20first%20issue%22) or [`PR welcome`](https://github.com/papra-hq/papra/issues?q=sort%3Aupdated-desc%20is%3Aissue%20is%3Aopen%20label%3A%22good%20first%20issue%22) labels.\n\n## License\n\nThis project is licensed under the AGPL-3.0 License - see the [LICENSE](./LICENSE) file for details.\n\n## Community\n\nJoin the community on [Papra's Discord server](https://papra.app/discord) to discuss the project, ask questions, or get help.\n\n## Credits\n\nThis project is crafted with тЭдя╕П by [Corentin Thomasset](https://corentin.tech).\nIf you find this project helpful, please consider [supporting my work](https://buymeacoffee.com/cthmsst).\n\n## Acknowledgements\n\n### Stack\n\nPapra would not have been possible without the following open-source projects:\n\n- **Frontend**\n  - **[SolidJS](https://www.solidjs.com)**: A declarative JavaScript library for building user interfaces.\n  - **[Shadcn Solid](https://shadcn-solid.com/)**: UI components library for SolidJS based on Shadcn designs.\n  - **[UnoCSS](https://unocss.dev/)**: An instant on-demand atomic CSS engine.\n  - **[Tabler Icons](https://tablericons.com/)**: A set of open-source icons.\n  - And other dependencies listed in the **[client package.json](./apps/papra-client/package.json)**\n- **Backend**\n  - **[HonoJS](https://hono.dev/)**: A small, fast, and lightweight web framework for building APIs.\n  - **[Drizzle](https://orm.drizzle.team/)**: A simple and lightweight ORM for Node.js.\n  - **[Better Auth](https://better-auth.com/)**: A simple and lightweight authentication library for Node.js.\n  - **[CadenceMQ](https://github.com/papra-hq/cadence-mq)**: A self-hosted-friendly job queue for Node.js, made by Papra.\n  - And other dependencies listed in the **[server package.json](./apps/papra-server/package.json)**\n- **Documentation**\n  - **[Astro](https://astro.build)**: A great static site generator.\n  - **[Starlight](https://starlight.astro.build)**: A module for Astro that provides a starting point for building documentation websites.\n  - **[HiDeoo/starlight-theme-rapide](https://github.com/HiDeoo/starlight-theme-rapide)**: A theme for Starlight.\n- **Project**\n  - **[PNPM Workspaces](https://pnpm.io/workspaces)**: A monorepo management tool.\n  - **[Github Actions](https://github.com/features/actions)**: For CI/CD.\n- **Infrastructure**\n  - **[Cloudflare Pages](https://pages.cloudflare.com/)**: For static site hosting.\n  - **[Fly.io](https://fly.io/)**: For backend hosting.\n  - **[Turso](https://turso.tech/)**: For production database.\n\n### Inspiration\n\nThis project would not have been possible without the inspiration and work of others. Here are some projects that inspired me:\n\n- **[Paperless-ngx](https://paperless-ngx.com/)**: A full-featured document management system.\n\n## Sponsors\n\nShout-out to our current sponsors:\n![GitHub Sponsors](https://cdn.jsdelivr.net/gh/papra-hq/static/assets/sponsors.svg)\n","summary":"Papra is a minimalistic document management and archiving platform aimed at longтАСterm file storage, letting users easily upload, tag, and retrieve documents. It supports organizationтАСbased access, fullтАСtext search, automatic content extraction from images, email and folder ingestion, CLI management, and exposes an API/SDK/webhooks for developers, all wrapped in a responsive, darkтАСmodeтАСready UI. The service is openтАСsource and selfтАСhostable via Docker, making it attractive to individuals, families, small teams, and anyone who wants a lowтАСmaintenance archive that can be extended programmatically.","description":"The minimalistic document archiving platform.","stars":4264,"language":"TypeScript"},{"owner":"Pouzor","repo":"homelable","url":"https://github.com/Pouzor/homelable","readme":"# Homelable\n\nHomelable is a self-hosted infrastructure visualization solution. It provides a network scanning feature to accelerate the identification of machines and services deployed on your local infrastructure.\n\nHomelable also offers a healthcheck system (WIP) through multiple methods (ping/TCP, /health API, etc.) to get a global overview of online/offline services.\n\nYou can also select some pre-built design styles, or personalize each device in your diagram.\n\nIf you just like the design, you can only run the frontend and export your design as PNG.\n\n\n---\n\n## Screenshots\n\n<p align=\"center\">\n  <img src=\"docs/homelable1.png\" alt=\"Homelable canvas overview\" width=\"100%\" />\n  <img src=\"docs/homelable2.png\" alt=\"Homelable node detail\" width=\"100%\" />\n  <img src=\"docs/homelable3.png\" alt=\"Homelable sidebar and scan\" width=\"48%\" />\n  <img src=\"docs/homelable4.png\" alt=\"Homelable edit pannel\" width=\"48%\" />\n</p>\n\n---\n\n## Installation\n\nDocker, Proxmox LXC, build from source, configuration, and development setup are all covered in **[INSTALLATION.md](./INSTALLATION.md)**.\n\n---\n\n## Network Scanner\n\nThe scanner runs `nmap -sV --open` on your configured CIDR ranges and populates a **Pending Devices** queue. From the sidebar you can then approve (adds a node to the canvas), hide, or ignore each discovered device.\n\n### Triggering a scan\n\nTo save you time when mapping your infrastructure, Homlable can scan your network and report all the services it detects. It can also identify them, saving you even more time.\nClick **Scan Network** in the sidebar. The Scan History tab opens automatically and refreshes every 3 seconds until the scan completes.\n\n### macOS / root privileges\n\nSome nmap scan types (SYN scan, OS detection) require root. If the scan fails with a permissions error, run it manually with sudo using the included script:\n\n```bash\ncd backend\nsudo python ../scripts/run_scan.py 192.168.1.0/24\n\n# Multiple ranges:\nsudo python ../scripts/run_scan.py 192.168.1.0/24 10.0.0.0/24\n```\n\nResults are written directly to the database and appear as Pending Devices in the UI without restarting the backend.\n\n> On Linux the backend process itself can be given the `NET_RAW` capability instead of running as root:\n> ```bash\n> sudo setcap cap_net_raw+ep $(which nmap)\n> ```\n\n---\n\n## Node Check Methods\n\nHomelable continuously monitors your nodes and displays their live status (online / offline / unknown) directly on the canvas. Each node can be configured with an independent check method suited to the service it runs.\n\n| Method | Description |\n|--------|-------------|\n| `ping` | ICMP ping |\n| `http` | GET request, success if status < 500 |\n| `https` | GET with TLS verify |\n| `tcp` | TCP connect (target: `host:port`) |\n| `ssh` | TCP connect to port 22 |\n| `prometheus` | GET `/metrics` |\n| `health` | GET `/health` |\n\n---\n\n## Live View (read-only public canvas)\n\nLive View lets you share a read-only snapshot of your canvas with anyone on your network тАФ no login required. It is disabled by default.\n\n### Activation\n\nAdd LIVEVIEW_KEY to your .env:\n\n`LIVEVIEW_KEY=your-secret-key`\n\n\nThen restart the backend:\n\n`docker compose restart backend`\n\n### Usage\n\nUse this URL to view your canvas:\n\nhttp://<your-homelab-ip>/view?key=your-secret-key\n\nThe page shows your canvas in pan/zoom-only mode тАФ no editing, no credentials needed. Clicking a node that has an IP opens it in a new tab.\n\n---\n\n## MCP Server (AI Integration) (optionnal)\n\nHomelable can exposes a [Model Context Protocol](https://modelcontextprotocol.io) server so any MCP-compatible AI client (Claude Code, Claude Desktop, Open WebUIтАж) can read your homelab topology and act on it.\n\n### What the AI can do\n\n| | Action |\n|---|---|\n| **Read** | List all nodes, edges, full canvas, pending devices, scan history |\n| **Write** | Add / update / delete nodes and edges, trigger a network scan, approve or hide discovered devices |\n\n### Setup\n\n**1. Add the keys to your `.env`:**\n\n```env\n# Authenticates AI clients (Claude Code, etc.) тЖТ MCP server\nMCP_API_KEY=mcp_sk_changeme\n\n# Authenticates MCP server тЖТ backend (internal Docker network only, never exposed)\nMCP_SERVICE_KEY=svc_changeme\n\n# Generate both with:\n# python3 -c \"import secrets; print(secrets.token_hex(32))\"\n```\n\nNo plain-text passwords involved тАФ `AUTH_PASSWORD_HASH` is only used for the web UI login.\n\n**2. Start the MCP service:**\n\n```bash\ndocker compose up -d mcp\n# MCP server is now listening on http://<your-homelab-ip>:8001\n```\n\n**3. Configure your AI client:**\n\n**Claude Code** тАФ run this command in your terminal:\n```bash\nclaude mcp add --transport sse homelable http://<your-homelab-ip>:8001/mcp \\\n  --header \"X-API-Key: mcp_sk_yourkey\"\n```\n\nOr add it manually to `~/.claude.json`:\n```json\n{\n  \"mcpServers\": {\n    \"homelable\": {\n      \"type\": \"sse\",\n      \"url\": \"http://<your-homelab-ip>:8001/mcp\",\n      \"headers\": {\n        \"X-API-Key\": \"mcp_sk_yourkey\"\n      }\n    }\n  }\n}\n```\n\n**Claude Desktop** тАФ edit `~/Library/Application Support/Claude/claude_desktop_config.json` (macOS) or `%APPDATA%\\Claude\\claude_desktop_config.json` (Windows):\n```json\n{\n  \"mcpServers\": {\n    \"homelable\": {\n      \"type\": \"sse\",\n      \"url\": \"http://<your-homelab-ip>:8001/mcp\",\n      \"headers\": {\n        \"X-API-Key\": \"mcp_sk_yourkey\"\n      }\n    }\n  }\n}\n```\n\n### Example prompts\n\n- *\"What nodes are currently offline?\"*\n- *\"Add a new LXC container named `pihole` at 192.168.1.5, connected to my switch.\"*\n- *\"Trigger a network scan on 192.168.1.0/24 and show me the pending devices.\"*\n- *\"Show me the full canvas topology.\"*\n\n### Security\n\n- The MCP server is **not** intended to be exposed to the internet тАФ keep port 8001 firewalled to your LAN.\n- Rotate the key any time by updating `MCP_API_KEY` in `.env` and restarting: `docker compose restart mcp`.\n- The MCP server communicates with the backend over the internal Docker network тАФ the backend API is never directly exposed to MCP clients.\n\n---\n","summary":"Homelable is a selfтАСhosted infrastructure visualization platform that automatically discovers devices and services on your network, populates a diagram, and continually reports their health status. It uses nmap to scan configured CIDR ranges, lets you approve or ignore findings, and offers a variety of check methods (ping, HTTP/HTTPS, TCP/SSH, Prometheus, health endpoints) to mark nodes online or offline in realтАСtime. Users can customize the canvas with preтАСbuilt styles or edit details, export designs as PNG, or share a readтАСonly Live View over the local network. The tool is ideal for homeтАСlab owners, network admins, or hobbyists who want an interactive, upтАСtoтАСdate map of their home infrastructure with optional AI integration via MCP.","description":"Self-hosted homelab infrastructure visualizer тАФ interactive network diagram with live status monitoring","stars":1230,"language":"TypeScript"},{"owner":"roflcoopter","repo":"viseron","url":"https://github.com/roflcoopter/viseron","readme":"<div align=\"center\">\n    <a href=\"https://github.com/roflcoopter/viseron\">\n        <img width=\"150\" height=\"150\" src=\"docs/static/img/viseron-logo.svg\">\n    </a>\n    <br>\n    <h1>Viseron</h1>\n    <p>\n        Self-hosted, local only NVR and AI Computer Vision software.\n    </p>\n    <p>\n        With features such as object detection, motion detection, face recognition and more, it gives you the power to keep an eye on your home, office or any other place you want to monitor.\n    </p>\n    <h1></h1>\n    <br>\n</div>\n\n# Getting started\n\nGetting started is easy! You simply spin up a Docker container and edit the configuration file using the built in web interface.\n\nHead over to the [documentation](https://viseron.netlify.app) and follow the instructions on how to get started.\n\n# Components\n\nViserons functionality is enabled by [components](https://viseron.netlify.app/docs/documentation/configuration#components).\n\nYou can find all the available components by using the [Component Explorer](https://viseron.netlify.app/components-explorer/).\n\n# Contributing\n\nContributors to the project are very much appreciated.\nSee the [contribution guidelines](https://viseron.netlify.app/docs/contributing) on how to get started.\n\nSome things you can help with:\n\n- Implement an open feature request or issue from the [issue tracker](https://github.com/roflcoopter/viseron/issues)\n- Improve the documentation\n- Answer questions in issues or [discussions](https://github.com/roflcoopter/viseron/discussions)\n\nYou can also use the links below to sponsor Viseron or make a one time donation.\n\n<a href=\"https://github.com/sponsors/roflcoopter\" target=\"_blank\"><img src=\"docs/static/img/sponsor_button.png\" alt=\"Sponsor\" style=\"height: 37px !important;width: 170px !important;box-shadow: 0px 3px 2px 0px rgba(190, 190, 190, 0.5) !important;-webkit-box-shadow: 0px 3px 2px 0px rgba(190, 190, 190, 0.5)\" ></a>\n<a href=\"https://www.buymeacoffee.com/roflcoopter\" target=\"_blank\"><img src=\"https://www.buymeacoffee.com/assets/img/custom_images/orange_img.png\" alt=\"Buy Me A Coffee\" style=\"height: 41px !important;width: 174px !important;box-shadow: 0px 3px 2px 0px rgba(190, 190, 190, 0.5) !important;-webkit-box-shadow: 0px 3px 2px 0px rgba(190, 190, 190, 0.5) !important;\" ></a>\n","summary":"Viseron is a selfтАСhosted, localтАСonly network video recorder that adds AIтАСpowered computerтАСvision capabilities to standard IP cameras. It offers builtтАСin object and motion detection, face recognition, and extensible component architecture for custom workflows. Users can deploy it quickly in a Docker container and configure features through a web interface, making it ideal for privacyтАСconscious homeowners or small offices that need reliable, onтАСpremises monitoring. The project encourages community contributions and documentation enhancements, welcoming anyone who wants to extend or improve its surveillance features.","description":"Self-hosted, local only NVR and AI Computer Vision software.  With features such as object detection, motion detection, face recognition and more, it gives you the power to keep an eye on your home, office or any other place you want to monitor.","stars":2797,"language":"Python"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = 'тШЕ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
</body>
