mg src=\"Images/HomePage.png\" alt=\"Home page with trending artists, popular albums, and personalized recommendations\" width=\"100%\" />\n<img src=\"Images/ArtistPage.png\" alt=\"Artist detail page with biography, discography, and similar artists\" width=\"100%\" />\n<img src=\"Images/AlbumPage.png\" alt=\"Album detail page with tracklist, playback controls, and request button\" width=\"100%\" />\n<img src=\"Images/DiscoverPage.png\" alt=\"Discover page with personalized album recommendations\" width=\"100%\" />\n\n<details>\n<summary>More screenshots</summary>\n\n<img src=\"Images/SearchPage.png\" alt=\"Search results for artists and albums\" width=\"100%\" />\n<img src=\"Images/LibraryPage.png\" alt=\"Library overview with statistics and recent additions\" width=\"100%\" />\n<img src=\"Images/PlaylistPage.png\" alt=\"Playlist with tracklist and playback controls\" width=\"100%\" />\n<img src=\"Images/DiscoverQueue.png\" alt=\"Discover queue with album recommendations to request or skip\" width=\"100%\" />\n<img src=\"Images/LocalFilesPage.png\" alt=\"Local files library with format and storage stats\" width=\"100%\" />\n<img src=\"Images/NavidromePage.png\" alt=\"Navidrome library view\" width=\"100%\" />\n<img src=\"Images/YoutubePage.png\" alt=\"YouTube linked albums for streaming\" width=\"100%\" />\n<img src=\"Images/ProfilePage.png\" alt=\"User profile with connected services and library stats\" width=\"100%\" />\n\n</details>\n\n---\n\n## Quick Start\n\nYou need Docker and a running [Lidarr](https://lidarr.audio/) instance with an API key.\n\n### 1. Create a docker-compose.yml\n\nImages are available on [GHCR](https://github.com/habirabbu/musicseerr/pkgs/container/musicseerr) and [Docker Hub](https://hub.docker.com/r/habirabbu/musicseerr). Swap the image tag if you prefer Docker Hub (`habirabbu/musicseerr:latest`).\n\n```yaml\nservices:\n  musicseerr:\n    image: ghcr.io/habirabbu/musicseerr:latest\n    container_name: musicseerr\n    environment:\n      - PUID=1000            # Run `id` on your host to find your user/group ID\n      - PGID=1000\n      - PORT=8688\n      - TZ=Etc/UTC           # Your timezone, e.g. Europe/London, America/New_York\n    ports:\n      - \"8688:8688\"\n    volumes:\n      - ./config:/app/config  # Persistent app configuration\n      - ./cache:/app/cache    # Cover art and metadata cache\n      # Optional: mount your music library for local file playback.\n      # The left side should match the root folder Lidarr uses.\n      # The right side (/music) must match \"Music Directory Path\" in Settings > Local Files.\n      # - /path/to/music:/music:ro\n    restart: unless-stopped\n    healthcheck:\n      test: [\"CMD\", \"curl\", \"-f\", \"http://localhost:8688/health\"]\n      interval: 30s\n      timeout: 10s\n      start_period: 15s\n      retries: 3\n```\n\n### 2. Start it\n\n```bash\ndocker compose up -d\n```\n\n### 3. Configure\n\nOpen [http://localhost:8688](http://localhost:8688) and head to Settings. Add your Lidarr URL and API key, then connect whichever streaming and discovery services you use.\n\n---\n\n## Recommended Stack\n\nMusicSeerr is designed to work with Lidarr. If you're putting together a music stack from scratch, this combination covers most needs:\n\n| Service | Role |\n|-|-|\n| [Lidarr](https://lidarr.audio/) (nightly recommended) | Library management, download orchestration |\n| [slskd](https://github.com/slskd/slskd) | Soulseek download client |\n| [Tubifarry](https://github.com/Tubifarry/Tubifarry) | YouTube-based download client for Lidarr |\n\nLidarr is the only requirement. slskd and Tubifarry are optional but between them they cover most music sourcing needs. For playback, connect Jellyfin, Navidrome, Plex, or mount your music folder directly into the container.\n\n---\n\n## Features\n\n### Search and Request\n\nSearch the full MusicBrainz catalogue for any artist or album. Request an album and Lidarr handles the download. A persistent queue tracks all requests, and you can browse pending and fulfilled requests on a dedicated page with retry and cancel support.\n\n### Built-in Player\n\nMusicSeerr has a full audio player that supports multiple playback sources per track:\n\n- Jellyfin, with configurable codec (AAC, MP3, FLAC, Opus, and others) and bitrate. Playback events are reported back to Jellyfin automatically.\n- Navidrome, streaming via the Subsonic API.\n- Plex Media Server, with direct-play audio streaming and native Plex scrobbling. Supports multi-library setups.\n- Local files, served directly from a mounted music directory.\n- YouTube, for previewing albums you haven't downloaded yet. Links can be auto-generated or set manually.\n\nThe player supports queue management, shuffle, seek, volume control, and a 10-band equalizer with presets.\n\n### Discovery\n\nThe home page shows trending artists, popular albums, recently added items, genre quick-links, weekly exploration playlists from ListenBrainz, and \"Because You Listened To\" carousels personalized to your history.\n\nThe discover page goes further with a recommendation queue drawn from similar artists, library gaps, fresh releases, global charts, and your listening patterns across ListenBrainz and Last.fm. Each album can be expanded to show the full tracklist and artwork before you decide to request or skip it.\n\nYou can also browse by genre, view trending and popular charts over different time ranges, and see your own top albums.\n\n### Library\n\nBrowse your Lidarr-managed library by artist or album with search, filtering, sorting, and pagination. View recently added albums and library statistics. Remove albums directly from the UI.\n\nJellyfin, Navidrome, Plex, and local file sources each get their own library view with play, shuffle, and queue actions.\n\n### Scrobbling\n\nEvery track you play can be scrobbled to ListenBrainz and Last.fm simultaneously. Both are toggled independently in settings. A \"now playing\" update goes out when a track starts, and a scrobble is submitted when it finishes.\n\n### Playlists\n\nCreate playlists from any mix of Jellyfin, Navidrome, Plex, local, and YouTube tracks. Reorder by dragging, set custom cover art, and play everything through the same player.\n\n### Profile\n\nSet a display name and avatar, view connected services, and check your library statistics from a profile page.\n\n---\n\n## Integrations\n\n| Service | What it does |\n|-|-|\n| [Lidarr](https://lidarr.audio/) | Download management and library syncing |\n| [MusicBrainz](https://musicbrainz.org/) | Artist and album metadata, release search |\n| [Cover Art Archive](https://coverartarchive.org/) | Album artwork |\n| [TheAudioDB](https://www.theaudiodb.com/) | Artist and album images (fanart, banners, logos, CD art) |\n| [Wikidata](https://www.wikidata.org/) | Artist descriptions and external links |\n| [Jellyfin](https://jellyfin.org/) | Audio streaming and library browsing |\n| [Navidrome](https://www.navidrome.org/) | Audio streaming via Subsonic API |\n| [Plex](https://www.plex.tv/) | Audio streaming and library browsing via Plex Media Server |\n| [ListenBrainz](https://listenbrainz.org/) | Listening history, discovery, scrobbling, weekly playlists |\n| [Last.fm](https://www.last.fm/) | Scrobbling and listen tracking |\n| YouTube | Album playback when no local copy exists |\n| Local files | Direct playback from a mounted music directory |\n\nAll integrations are configured through the web UI. No config files or environment variables needed beyond the basics listed below.\n\n---\n\n## Configuration\n\nMusicSeerr stores its config in `config/config.json` inside the mapped config volume. Everything is managed through the UI.\n\n### Environment Variables\n\n| Variable | Default | Description |\n|-|-|-|\n| `PUID` | `1000` | User ID for file ownership inside the container |\n| `PGID` | `1000` | Group ID for file ownership inside the container |\n| `PORT` | `8688` | Port the application listens on |\n| `TZ` | `Etc/UTC` | Container timezone |\n\nRun `id` on your host to find your PUID and PGID values.\n\n> **Unraid / NAS users:** Unraid defaults to `nobody:users` (PUID=99, PGID=100). If you see `chown: Operation not permitted` at startup, your volume mount is on a filesystem that rejects ownership changes (FUSE/shfs, NFS, CIFS). The container skips `chown` when the directories and their contents are already writable, so this is usually fine as long as the host paths are owned by the correct UID:GID.\n\n### In-App Settings\n\n| Setting | Location |\n|-|-|\n| Lidarr URL, API key, profiles, root folder, sync frequency | Settings > Lidarr |\n| Jellyfin URL and API key | Settings > Jellyfin |\n| Navidrome URL and credentials | Settings > Navidrome |\n| Plex URL, token (OAuth or manual), music libraries, scrobble toggle | Settings > Plex |\n| Local files directory path | Settings > Local Files |\n| ListenBrainz username and token | Settings > ListenBrainz |\n| Last.fm API key, secret, and OAuth session | Settings > Last.fm |\n| YouTube API key | Settings > YouTube |\n| Scrobbling toggles per service | Settings > Scrobbling |\n| Home page layout preferences | Settings > Preferences |\n| AudioDB settings and cache TTLs | Settings > Advanced |\n\n### Setting Up Last.fm\n\n1. Register an app at [last.fm/api/account/create](https://www.last.fm/api/account/create) to get an API key and shared secret.\n2. Enter them in Settings > Last.fm.\n3. Click Authorise and follow the redirect. You'll be returned to MusicSeerr automatically.\n\n### Setting Up ListenBrainz\n\n1. Copy your user token from [listenbrainz.org/profile](https://listenbrainz.org/profile/).\n2. Enter your username and token in Settings > ListenBrainz.\n\n### TheAudioDB\n\nAudioDB provides richer artist and album artwork from a fast CDN. It's enabled by default with the free public API key, which is rate-limited to 30 requests per minute. Premium keys from [theaudiodb.com](https://www.theaudiodb.com/) unlock higher limits.\n\nUnder Settings > Advanced, you can toggle AudioDB on or off, switch between direct CDN loading and proxied loading (for privacy), enable name-based search fallback for niche artists, and adjust cache TTLs.\n\n---\n\n## Playback Sources\n\n### Jellyfin\n\nAudio is transcoded on the Jellyfin server and streamed to the browser. Supported codecs include AAC, MP3, Opus, FLAC, Vorbis, ALAC, WAV, and WMA. Bitrate is configurable between 32 kbps and 320 kbps. Playback start, progress, and stop events are reported back to Jellyfin.\n\n### Local Files\n\nMount your music directory into the container and MusicSeerr serves files directly. The mount path inside the container must match the Music Directory Path set in Settings > Local Files.\n\n```yaml\nvolumes:\n  - /path/to/your/music:/music:ro\n```\n\n### Navidrome\n\nConnect your Navidrome instance under Settings > Navidrome.\n\n### Plex\n\nConnect Plex under Settings > Plex. You can sign in with Plex OAuth or paste in a token yourself. Once you're connected, choose the music libraries you want to include. If you pick more than one, MusicSeerr merges them into a single library view.\n\nTracks play directly from Plex with no server-side transcoding. The MusicSeerr backend proxies the stream so your Plex token never reaches the browser.\n\nPlex scrobbling is on by default. Turn it off in Settings > Plex or from the library page if you'd rather rely on Last.fm and ListenBrainz instead.\n\n### YouTube\n\nAlbums can be linked to a YouTube URL and played inline. This is useful for listening to albums before you've downloaded them. Links can be auto-generated with a YouTube API key or added manually.\n\nA note on reliability: YouTube playback depends on the embedded player, which can be finicky. It works best in a browser where you're signed into YouTube, and VPNs tend to cause issues. Treat it as a convenience for previewing albums rather than a primary playback source.\n\n---\n\n## Volumes and Persistence\n\n| Container path | Purpose |\n|-|-|\n| `/app/config` | Application config (`config.json`) |\n| `/app/cache` | Cover art cache, metadata cache, SQLite databases |\n| `/music` (optional) | Music library root for local file playback |\n\nMap both `/app/config` and `/app/cache` to persistent host directories so they survive container restarts.\n\n---\n\n## API\n\nInteractive API docs (Swagger UI) are available at `/api/v1/docs` on your MusicSeerr instance.\n\nA health check endpoint is at `/health`.\n\n---\n\n## Development\n\nSee the [CONTRIBUTING](CONTRIBUTING.md) guide for instructions on setting up a development environment, running tests, and submitting contributions.\n\n---\n\n## Support\n\nDocumentation is at [musicseerr.com](https://musicseerr.com/).\n\nFor questions, help, or just to chat, join the [Discord](https://discord.gg/B5suDg7gu2). Bug reports and feature requests go on [GitHub Issues](https://github.com/habirabbu/musicseerr/issues).\n\nIf you find MusicSeerr useful, consider supporting development:\n\n[![ko-fi](https://ko-fi.com/img/githubbutton_sm.svg)](https://ko-fi.com/M4M41URGJO)\n\n---\n\n## License\n\n[GNU Affero General Public License v3.0](LICENSE)\n","summary":" MusicSeerr is a self-hosted music request and discovery platform built to integrate with Lidarr, enabling users to search the MusicBrainz catalogue, request albums, and stream music from Jellyfin, Navidrome, Plex, or local libraries. It provides personalized album recommendations based on listening history and supports scrobbling to ListenBrainz and Last.fm, all deployed as a single Docker container with a web-based configuration interface. This tool is ideal for media server enthusiasts who use Lidarr and want a unified solution to discover new music, manage requests, and access their audio libraries across multiple streaming sources.","description":null,"stars":397,"language":"Python"},{"owner":"docmost","repo":"docmost","url":"https://github.com/docmost/docmost","readme":"<div align=\"center\">\n    <h1><b>Docmost</b></h1>\n    <p>\n        Open-source collaborative wiki and documentation software.\n        <br />\n        <a href=\"https://docmost.com\"><strong>Website</strong></a> | \n        <a href=\"https://docmost.com/docs\"><strong>Documentation</strong></a> |\n        <a href=\"https://twitter.com/DocmostHQ\"><strong>Twitter / X</strong></a>\n    </p>\n</div>\n<br />\n\n## Getting started\n\nTo get started with Docmost, please refer to our [documentation](https://docmost.com/docs) or try our [cloud version](https://docmost.com/pricing) .\n\n## Features\n\n- Real-time collaboration\n- Diagrams (Draw.io, Excalidraw and Mermaid)\n- Spaces\n- Permissions management\n- Groups\n- Comments\n- Page history\n- Search\n- File attachments\n- Embeds (Airtable, Loom, Miro and more)\n- Translations (10+ languages)\n\n### Screenshots\n\n<p align=\"center\">\n<img alt=\"home\" src=\"https://docmost.com/screenshots/home.png\" width=\"70%\">\n<img alt=\"editor\" src=\"https://docmost.com/screenshots/editor.png\" width=\"70%\">\n</p>\n\n### License\nDocmost core is licensed under the open-source AGPL 3.0 license.  \nEnterprise features are available under an enterprise license (Enterprise Edition).  \n\nAll files in the following directories are licensed under the Docmost Enterprise license defined in `packages/ee/License`.\n  - apps/server/src/ee\n  - apps/client/src/ee\n  - packages/ee\n\n### Contributing\n\nSee the [development documentation](https://docmost.com/docs/self-hosting/development)\n\n## Thanks\nSpecial thanks to;\n\n<img width=\"100\" alt=\"Crowdin\" src=\"https://github.com/user-attachments/assets/a6c3d352-e41b-448d-b6cd-3fbca3109f07\" />\n\n[Crowdin](https://crowdin.com/) for providing access to their localization platform.\n\n\n<img width=\"48\" alt=\"Algolia-mark-square-white\" src=\"https://github.com/user-attachments/assets/6ccad04a-9589-4965-b6a1-d5cb1f4f9e94\" />\n\n[Algolia](https://www.algolia.com/) for providing full-text search to the docs.\n\n","summary":" Docmost is an open-source collaborative wiki and documentation platform designed for team knowledge management, offering real-time editing, integrated diagramming tools, granular permissions, and spaces for organizing content. The software supports file attachments, page history, multi-language translations, and embeds for external services like Airtable and Miro, making it a comprehensive solution for building internal knowledge bases. While the core functionality is available under the AGPL 3.0 license for self-hosting, additional enterprise features are offered under a commercial license. Teams and organizations seeking a self-hosted alternative to proprietary documentation tools such as Notion or Confluence will benefit from its extensive feature set and collaborative capabilities.","description":"Docmost is an open-source collaborative wiki and documentation software. It is an open-source alternative to Confluence and Notion.","stars":19870,"language":"TypeScript"},{"owner":"badlogic","repo":"jot","url":"https://github.com/badlogic/jot","readme":"# jot\n\nhttps://github.com/user-attachments/assets/542c333c-c26e-4f04-a5bb-2cf4131e60f3\n\nMinimal self-hosted collaborative markdown editor with inline comment threads. Built for humans and agents.\n\n## Quick Start\n\n```bash\nnpm install -g @mariozechner/jot\njot serve\n```\n\nOpen `http://localhost:3210`. Set the owner password on first visit.\n\n## Features\n\n- Collaborative real-time editing (multiple tabs, multiple users)\n- Remote cursors with names\n- Inline comment threads anchored to text selections\n- Threaded replies, resolve/reopen\n- Share notes with configurable access (view, comment, edit)\n- CLI for humans and agents (owner API keys or share links)\n- Agent setup modal with copy-paste instructions\n- Dark and light theme\n- Mobile support\n- `.md` files on disk (derived from collaborative state)\n\n## Server\n\n```bash\nnpm install -g @mariozechner/jot\njot serve                    # port 3210, data in ./data\njot serve --port=8080        # custom port\njot serve --data=/var/jot    # custom data dir\n```\n\n## Docker\n\n```bash\ncd docker\nbash control.sh start\n```\n\n## Sharing\n\nClick the share icon in the editor to configure access:\n\n- **Not shared** (default)\n- **View only**: read-only preview\n- **View & comment**: preview with comment threads\n- **Edit & comment**: full collaborative editor with comments\n\nEach note has a stable share URL (`/s/<id>`). Anyone with the link gets the configured level of access, both in the browser and via the CLI. Toggle access without changing the link.\n\n## CLI\n\nThe CLI works in two modes depending on how you register.\n\n### Owner mode\n\nThe instance owner creates API keys from the settings gear on the landing page. An API key grants full access to all notes.\n\n```bash\njot register myserver https://jot.example.com <api-key>\njot myserver list\njot myserver search \"query\"\njot myserver read <note-id>\njot myserver create \"My note\"\njot myserver edit <note-id> '[{\"oldText\":\"foo\",\"newText\":\"bar\"}]'\njot myserver comment <note-id> \"quoted text\" \"comment body\"\njot myserver reply <note-id> <thread-id> <message-id> \"reply\"\njot myserver resolve <note-id> <thread-id>\njot myserver reopen <note-id> <thread-id>\njot myserver edit-comment <note-id> <message-id> \"new body\"\njot myserver delete-comment <note-id> <message-id>\njot myserver delete-thread <note-id> <thread-id>\njot myserver update <note-id> title \"New title\"\njot myserver delete <note-id>\n```\n\n### Shared mode\n\nAnyone with a share link can use it to register. No API key needed. The link itself is the credential, and access depends on what the owner configured (view, comment, or edit). This works for both humans and their agents. Humans can use the link in the browser for better UX.\n\n```bash\njot register shared https://jot.example.com/s/abc123\njot shared read\njot shared edit '[{\"oldText\":\"foo\",\"newText\":\"bar\"}]'\njot shared comment \"quoted text\" \"comment body\" --name=\"My Agent\"\njot shared reply <thread-id> <message-id> \"reply\" --name=\"My Agent\"\n```\n\n### Agent integration\n\nClick the robot icon in the editor or on a shared note to get copy-paste CLI instructions. The instructions are pre-filled with the instance URL and note ID. Hand them to your agent and it can read, edit, and comment on the note.\n\n## Data\n\n```\ndata/\n  auth.json\n  notes/\n    <id>.md\n    <id>.json\n```\n\nThe `.md` files are derived from the collaborative editing state stored in the `.json` sidecar. The JSON is the source of truth. The markdown files are written for convenience (grep, backup, external tooling).\n\n## HTTP API\n\nAll owner endpoints require `Authorization: Bearer <api-key>`.\n\n| Method | Endpoint                              | Description                         |\n| ------ | ------------------------------------- | ----------------------------------- |\n| GET    | `/api/notes?q=<query>`                | List/search notes                   |\n| POST   | `/api/notes`                          | Create note                         |\n| GET    | `/api/notes/:id`                      | Read note                           |\n| PUT    | `/api/notes/:id`                      | Update title, markdown, shareAccess |\n| DELETE | `/api/notes/:id`                      | Delete note                         |\n| POST   | `/api/notes/:id/edit`                 | Apply text edits                    |\n| POST   | `/api/notes/:id/threads`              | Create comment thread               |\n| POST   | `/api/notes/:id/threads/:tid/replies` | Reply to thread                     |\n| PATCH  | `/api/notes/:id/threads/:tid`         | Resolve/reopen thread               |\n| DELETE | `/api/notes/:id/threads/:tid`         | Delete thread                       |\n| PATCH  | `/api/notes/:id/messages/:mid`        | Edit comment                        |\n| DELETE | `/api/notes/:id/messages/:mid`        | Delete comment                      |\n| GET    | `/api/keys`                           | List API keys                       |\n| POST   | `/api/keys`                           | Create API key                      |\n| DELETE | `/api/keys/:id`                       | Delete API key                      |\n\nShare endpoints (no auth, access controlled by `shareAccess`):\n\n| Method | Endpoint                               | Description                    |\n| ------ | -------------------------------------- | ------------------------------ |\n| GET    | `/api/share/:sid`                      | Read shared note               |\n| GET    | `/api/share/:sid/note`                 | Read shared note (lightweight) |\n| POST   | `/api/share/:sid/edit`                 | Edit (requires edit access)    |\n| POST   | `/api/share/:sid/threads`              | Create comment                 |\n| POST   | `/api/share/:sid/threads/:tid/replies` | Reply                          |\n| POST   | `/api/share/:sid/render`               | Render markdown to HTML        |\n\n## License\n\nMIT\n","summary":" Jot is a minimal self-hosted collaborative markdown editor designed for both humans and AI agents, featuring real-time multi-user editing and inline comment threads anchored to text selections. It offers granular sharing controls allowing owners to configure view, comment, or edit access via stable URLs, alongside a comprehensive CLI that supports both owner API keys and share-based authentication for programmatic access. The platform stores data as markdown files on disk while maintaining collaborative state, making it ideal for teams seeking a lightweight, self-hosted documentation solution that seamlessly integrates human collaboration with automated agent workflows.","description":"Minimal self-hosted markdown editor with inline comment threads","stars":283,"language":"JavaScript"},{"owner":"byrongamatos","repo":"slopsmith","url":"https://github.com/byrongamatos/slopsmith","readme":"# Slopsmith\n\nA self-contained web application for browsing, playing, and practicing Rocksmith 2014 Custom DLC (CDLC). Runs entirely in Docker — no local dependencies required.\n\n[![Video Overview](https://img.youtube.com/vi/f_XTS9tVeaU/maxresdefault.jpg)](https://www.youtube.com/watch?v=f_XTS9tVeaU)\n\n> **Looking for a desktop app?** [Slopsmith Desktop](https://github.com/byrongamatos/slopsmith-desktop) is a standalone native app for non-technical users — no Docker required. It includes everything in the web version plus a built-in audio engine with VST3/AU/LV2 plugin hosting, Neural Amp Modeler (NAM) for amp simulation, cabinet IR loading, and automatic tone switching that changes your signal chain as tones change during a song.\n\n![Library](docs/library.png)\n![Player](docs/player.png)\n\n## Features\n\n### Library Browser\n- **Grid View** — album art cards with arrangement badges, tuning, lyrics indicator\n- **Artist/Album Tree View** — hierarchical browser with letter filter (A-Z), expandable artist and album groups\n- **Search** — filter by song title, artist, or album name\n- **Sort** — by artist, title, recently added, or tuning\n- **Favorites** — mark songs with a heart, browse favorites in a dedicated view\n- **Edit Metadata** — update song title, artist, album, and album art directly from the library\n- **Retune to E Standard** — pitch-shift songs in Eb/D/C#/C Standard to E Standard with one click\n\n### Note Highway Player\nA real-time canvas-based note highway that renders Rocksmith arrangements as they would appear in the game.\n\n**Note rendering:**\n- Fret-positioned notes with string colors (red, orange, blue, orange, green, purple)\n- Open string bars spanning the highway\n- Chord brackets connecting chord notes with chord name labels\n- Sustain tails that stay visible until the sustain finishes\n\n**Techniques:**\n- Bends with curved arrows and labels (1/2, full, 1-1/2, 2)\n- Unison bends with dashed connector and \"U\" label\n- Slides (diagonal arrow)\n- Hammer-ons / Pull-offs / Taps (H/P/T labels)\n- Palm mutes (PM label)\n- Tremolo (wavy line)\n- Accents (> marker)\n- Harmonics (diamond shape)\n- Pinch harmonics (diamond + PH label)\n\n**Additional features:**\n- Synced lyrics display (phrase-based, multi-row, karaoke highlighting) — toggleable\n- Dynamic anchor zoom — fret range adjusts smoothly, looks ahead at upcoming notes\n- Arrangement switcher — switch between Lead, Rhythm, Bass during playback\n- Speed control — continuous slider from 0.25x to 1.50x\n- Volume control\n\n### Practice Tools\n- **A-B Looping** — set start (A) and end (B) points to repeat a section\n- **Saved Loops** — name and save multiple loop sections per song, persisted across sessions\n- **4-Count Click** — tempo-matched metronome count-in (1-2-3-4) before each loop repetition\n- **Rewind Effect** — highway smoothly rewinds to the loop start point\n\n### CDLC Creation\n- **Create from Guitar Pro Tab** — search Ultimate Guitar for GP3/GP4/GP5 tabs and convert them to playable CDLC with MIDI audio (available as a plugin)\n\n### Compatibility\n- Supports both **custom CDLC** (from CustomsForge, etc.) and **official Rocksmith DLC**\n- Official DLC: automatically converts SNG binary files to XML via built-in RsCli tool\n- Reads arrangement names from manifest JSON (accurate Lead/Rhythm/Bass identification)\n\n### Scalability\n- **In-memory PSARC scanning** — reads metadata without writing to disk\n- **Parallel scanning** — 8-thread metadata extraction\n- **Server-side pagination and search** — SQLite-backed, handles 80,000+ songs\n- **Non-blocking scan** — browse already-scanned songs while import continues in background\n\n## Quick Start\n\n### Prerequisites\n- [Docker](https://docs.docker.com/get-docker/) and [Docker Compose](https://docs.docker.com/compose/install/)\n\n### Run\n\n1. Clone the repository:\n   ```bash\n   git clone https://github.com/byrongamatos/slopsmith.git\n   cd slopsmith\n   ```\n\n2. Set your DLC folder path and start:\n   ```bash\n   DLC_PATH=/path/to/your/Rocksmith2014/dlc docker compose up -d\n   ```\n\n3. Open http://localhost:8000 in your browser.\n\nOn first launch, the app scans your DLC folder and imports metadata. A progress banner shows at the bottom of the screen. The library is usable while the scan runs.\n\n### Configuration\n\n- **DLC Folder** — set in Settings or via the `DLC_PATH` environment variable\n- **Default Arrangement** — choose Lead, Rhythm, or Bass as the default when opening songs (Settings)\n\n### Docker Compose Example\n\n```yaml\nservices:\n  web:\n    build: .\n    ports:\n      - \"8000:8000\"\n    volumes:\n      # Mount your Rocksmith DLC folder\n      - /path/to/Rocksmith2014/dlc:/dlc\n      # Persistent config, cache, and favorites\n      - slopsmith-config:/config\n      # Optional: mount plugins for development\n      # - ./plugins:/app/plugins\n    environment:\n      - DLC_DIR=/dlc\n      - CONFIG_DIR=/config\n\nvolumes:\n  slopsmith-config:\n```\n\n## Windows 11 install tutorial\n\nhttps://youtu.be/bIz8pbTFiV8\n\n## Plugins\n\nSlopsmith supports a plugin system for extending functionality. Plugins can add navigation links, screens, settings sections, and API routes — all discovered automatically at startup.\n\n### Installing a Plugin\n\nDrop the plugin folder into the `plugins/` directory (or mount it as a Docker volume):\n\n```\nplugins/\n  my_plugin/\n    plugin.json\n    routes.py\n    screen.html\n    screen.js\n    settings.html  (optional)\n```\n\nThen restart the container. The plugin's nav link, screen, and settings will appear automatically.\n\n### Plugin Structure\n\nEach plugin requires a `plugin.json` manifest:\n\n```json\n{\n  \"id\": \"my_plugin\",\n  \"name\": \"My Plugin\",\n  \"version\": \"1.0.0\",\n  \"nav\": {\n    \"label\": \"My Feature\",\n    \"screen\": \"my-screen\"\n  },\n  \"screen\": \"screen.html\",\n  \"script\": \"screen.js\",\n  \"settings\": { \"html\": \"settings.html\" },\n  \"routes\": \"routes.py\"\n}\n```\n\n| Field      | Required | Description                                                      |\n|------------|----------|------------------------------------------------------------------|\n| id         | Yes      | Unique identifier, used in API paths                             |\n| name       | Yes      | Display name                                                     |\n| nav        | No       | Navigation link with label and screen ID                         |\n| screen     | No       | HTML file for the plugin screen content                          |\n| script     | No       | JavaScript file loaded after the screen is injected              |\n| settings   | No       | Object with html field pointing to a settings HTML fragment      |\n| routes     | No       | Python module with a setup(app, context) function for API routes |\n\n### Plugin API Routes\n\nThe `routes.py` module must export a `setup(app, context)` function:\n\n```python\ndef setup(app, context):\n    config_dir = context[\"config_dir\"]    # Path to config directory\n    get_dlc_dir = context[\"get_dlc_dir\"]  # Function returning DLC Path\n    meta_db = context[\"meta_db\"]          # MetadataDB instance\n    extract_meta = context[\"extract_meta\"] # Function to extract PSARC metadata\n\n    @app.get(\"/api/plugins/my_plugin/search\")\n    def search(q: str):\n        # Your logic here\n        return {\"results\": []}\n```\n\nRoutes are registered under `/api/plugins/{plugin_id}/` to avoid conflicts.\n\n### Plugin Frontend\n\n- `screen.html` — HTML fragment (no `<html>` or `<body>` tags). Injected into a `<div class=\"screen\">` container.\n- `screen.js` — JavaScript loaded after the HTML. Has access to all core functions (`showScreen()`, `esc()`, `formatTime()`, etc.).\n- `settings.html` — HTML fragment injected into the Settings page.\n\n### Available Plugins\n\n| Plugin | Description | Install |\n|--------|-------------|---------|\n| [Create from Tab](https://github.com/byrongamatos/slopsmith-plugin-ug) | Search Ultimate Guitar for GP tabs and convert to playable CDLC | `git clone ...slopsmith-plugin-ug.git ultimate_guitar` |\n| [Import Tab](https://github.com/byrongamatos/slopsmith-plugin-tabimport) | Drag and drop Guitar Pro files to create CDLC | `git clone ...slopsmith-plugin-tabimport.git tab_import` |\n| [Practice Journal](https://github.com/byrongamatos/slopsmith-plugin-practice) | Auto-track practice time, speed, loops. Dashboard with charts | `git clone ...slopsmith-plugin-practice.git practice_journal` |\n| [Setlist Builder](https://github.com/byrongamatos/slopsmith-plugin-setlist) | Create ordered playlists with sequential playback | `git clone ...slopsmith-plugin-setlist.git setlist` |\n| [Metronome](https://github.com/byrongamatos/slopsmith-plugin-metronome) | Audible click and visual beat flash synced to song tempo | `git clone ...slopsmith-plugin-metronome.git metronome` |\n| [Tone Player](https://github.com/byrongamatos/slopsmith-plugin-tones) | View amp/pedal/cab signal chains with Rocksmith gear artwork | `git clone ...slopsmith-plugin-tones.git tones` |\n| [Fretboard View](https://github.com/byrongamatos/slopsmith-plugin-fretboard) | Live fretboard overlay showing active notes in real-time | `git clone ...slopsmith-plugin-fretboard.git fretboard` |\n| [Tab View](https://github.com/byrongamatos/slopsmith-plugin-tabview) | Scrolling guitar tablature notation via alphaTab | `git clone ...slopsmith-plugin-tabview.git tab_view` |\n| [MIDI Amp Control](https://github.com/byrongamatos/slopsmith-plugin-midi) | Auto-switch amp/modeler presets via MIDI on tone changes | `git clone ...slopsmith-plugin-midi.git midi_amp` |\n| [Section Map](https://github.com/byrongamatos/slopsmith-plugin-sectionmap) | Color-coded song structure minimap with clickable navigation | `git clone ...slopsmith-plugin-sectionmap.git section_map` |\n| [RS1 Extractor](https://github.com/byrongamatos/slopsmith-plugin-rs1extract) | Extract RS1 compatibility songs into individual CDLCs | `git clone ...slopsmith-plugin-rs1extract.git rs1_extract` |\n| [Base Game Extractor](https://github.com/byrongamatos/slopsmith-plugin-discextract) | Extract on-disc base game songs from songs.psarc into individual CDLCs | `git clone ...slopsmith-plugin-discextract.git disc_extract` |\n| [3D Highway](https://github.com/byrongamatos/slopsmith-plugin-3dhighway) | Three.js 3D perspective highway view as an alternative to the 2D canvas | `git clone ...slopsmith-plugin-3dhighway.git 3dhighway` |\n| [Arrangement Editor](https://github.com/byrongamatos/slopsmith-plugin-editor) | DAW-like visual editor for creating and editing CDLC note charts | `git clone ...slopsmith-plugin-editor.git editor` |\n| [Profile Import](https://github.com/byrongamatos/slopsmith-plugin-profileimport) | Import play counts, favorites, and scores from Rocksmith profiles | `git clone ...slopsmith-plugin-profileimport.git profileimport` |\n| [MIDI Capo](https://github.com/masc0t/slopsmith-plugin-midi-capo) | MIDI capo control for real-time transposition | `git clone ...slopsmith-plugin-midi-capo.git midi_capo` |\n| [Note Detection](https://github.com/byrongamatos/slopsmith-plugin-notedetect) | Real-time pitch detection and scoring against highway notes | `git clone ...slopsmith-plugin-notedetect.git note_detect` |\n| [Find More CDLC](https://github.com/masc0t/slopsmith-plugin-find-more) | Search for more CDLC by the same artist | `git clone ...slopsmith-plugin-find-more.git find_more` |\n| [Piano Highway](https://github.com/byrongamatos/slopsmith-plugin-piano) | Scrolling piano/keyboard view for Keys arrangements with MIDI input | `git clone ...slopsmith-plugin-piano.git piano` |\n| [Studio](https://github.com/byrongamatos/slopsmith-plugin-studio) | Collaborative band recording and multi-track mixing | `git clone ...slopsmith-plugin-studio.git studio` |\n| [Drum Highway](https://github.com/byrongamatos/slopsmith-plugin-drums) | Lane-based drum highway with MIDI drum pad input and built-in sounds | `git clone ...slopsmith-plugin-drums.git drums` |\n| [Split Screen](https://github.com/topkoa/slopsmith-plugin-splitscreen) | 2-4 highway panels side-by-side for multi-arrangement practice | `git clone ...slopsmith-plugin-splitscreen.git splitscreen` |\n| [Sloppak Converter](https://github.com/topkoa/slopsmith-plugin-sloppak-converter) | Convert PSARC to .sloppak with Demucs stem splitting | `git clone ...slopsmith-plugin-sloppak-converter.git sloppak_converter` |\n| [Stems Mixer](https://github.com/topkoa/slopsmith-plugin-stems) | Per-stem mute/volume controls for .sloppak songs | `git clone ...slopsmith-plugin-stems.git stems` |\n| [Invert Highway](https://github.com/masc0t/slopsmith-plugin-invert-highway) | Flip the highway note direction | `git clone ...slopsmith-plugin-invert-highway.git invert_highway` |\n| [Jumping Tab](https://github.com/renanboni/slopsmith-plugin-jumpingtab) | Yousician-style 2D horizontal tab with trajectory arcs and hopping ball | `git clone ...slopsmith-plugin-jumpingtab.git jumpingtab` |\n| [Lyrics Sync](https://github.com/byrongamatos/slopsmith-plugin-lyrics-sync) | Generate synced LRC lyrics from text + vocals stem via Whisper alignment | `git clone ...slopsmith-plugin-lyrics-sync.git lyrics_sync` |\n| [NAM Tone Engine](https://github.com/byrongamatos/slopsmith-plugin-nam-tone) | In-browser amp modeling with NAM WASM, cabinet IRs, tone auto-switching | `git clone ...slopsmith-plugin-nam-tone.git nam_tone` |\n\nInstall any plugin by cloning it into your `plugins/` directory and restarting:\n\n```bash\ncd plugins\ngit clone https://github.com/byrongamatos/slopsmith-plugin-ug.git ultimate_guitar\ndocker compose restart\n```\n\n## Tech Stack\n\n- **Backend**: Python / FastAPI / SQLite / WebSocket\n- **Frontend**: Vanilla JS / Canvas 2D / Tailwind CSS (CDN)\n- **PSARC**: Custom AES-CFB-128 decryptor with in-memory reading\n- **SNG Compiler**: F# CLI tool wrapping [Rocksmith2014.NET](https://github.com/iminashi/Rocksmith2014.NET)\n- **Audio**: vgmstream (WEM decode) / FFmpeg / FluidSynth (MIDI render) / rubberband (pitch shift)\n- **Docker**: Self-contained image with all dependencies\n\n## Running tests\n\nCore library modules have a small pytest suite (pure functions only — no fixtures, no Docker). To run it locally:\n\n```bash\npip install -r requirements.txt -r requirements-test.txt\npytest\n```\n\nCI runs the same suite on every push and PR against `main` (see `.github/workflows/tests.yml`). Contributions adding tests are welcome — the current targets are `lib/tunings.py` and `lib/song.py`; natural follow-ups would be the pure helpers in `lib/sloppak_convert.py` and the tempo/tick math in `lib/gp2rs.py`.\n\n## License\n\nMIT\n","summary":" Slopsmith is a self-contained, Dockerized web application that enables Rocksmith 2014 players to browse, play, and practice Custom DLC (CDLC) without installing local dependencies. It provides a feature-rich library manager with metadata editing and search, a real-time canvas-based note highway renderer that displays guitar techniques and synchronized lyrics, and practice tools including variable speed control and persistent A-B looping sections. The system supports both custom and official DLC, can generate new CDLC from Guitar Pro tabs, and scales efficiently to handle massive libraries exceeding 80,000 songs. This tool is ideal for guitarists seeking a browser-based practice environment with advanced learning features and the flexibility of self-hosted deployment.","description":"Self-contained Docker web app for browsing, playing, and practicing Rocksmith 2014 CDLC","stars":141,"language":"Python"},{"owner":"linkwarden","repo":"linkwarden","url":"https://github.com/linkwarden/linkwarden","readme":"<div align=\"center\">\n  <img src=\"./assets/logo.png\" width=\"100px\" />\n  <h1>Linkwarden</h1>\n  <h3>Bookmarks, Evolved</h3>\n\n<a href=\"https://trendshift.io/repositories/4006\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/4006\" alt=\"linkwarden%2Flinkwarden | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/></a>\n\n<a href=\"https://discord.com/invite/CtuYV47nuJ\"><img src=\"https://img.shields.io/discord/1117993124669702164?logo=discord&style=flat\" alt=\"Discord\"></a>\n<a href=\"https://twitter.com/LinkwardenHQ\"><img src=\"https://img.shields.io/twitter/follow/linkwarden\" alt=\"Twitter\"></a> <a href=\"https://news.ycombinator.com/item?id=43856801\"><img src=\"https://img.shields.io/badge/Hacker%20News-301-%23FF6600\"></img></a>\n\n<a href=\"https://github.com/linkwarden/linkwarden/releases\"><img alt=\"GitHub release\" src=\"https://img.shields.io/github/v/release/linkwarden/linkwarden\"></a>\n<a href=\"https://crowdin.com/project/linkwarden\">\n<img src=\"https://badges.crowdin.net/linkwarden/localized.svg\" alt=\"Crowdin\" /></a>\n<a href=\"https://opencollective.com/linkwarden\"><img src=\"https://img.shields.io/opencollective/all/linkwarden\" alt=\"Open Collective\"></a>\n\n</div>\n\n<div align='center'>\n\n[« LAUNCH DEMO »](https://demo.linkwarden.app)\n\n[Cloud](https://cloud.linkwarden.app) · [Website](https://linkwarden.app) · [Features](https://github.com/linkwarden/linkwarden#features) · [Docs](https://docs.linkwarden.app)\n\n<img src=\"./assets/home.png\" />\n\n</div>\n\n## Intro & motivation\n\n**Linkwarden is a self-hosted, open-source collaborative bookmark manager to collect, read, annotate, and fully preserve what matters, all in one place.**\n\nThe objective is to organize useful webpages and articles you find across the web in one place, and since useful webpages can go away (see the inevitability of [Link Rot](https://en.wikipedia.org/wiki/Link_rot)), Linkwarden also saves a copy of each webpage as a Screenshot and PDF, ensuring accessibility even if the original content is no longer available.\n\nIn addition to preservation, Linkwarden provides a user-friendly reading and annotation experience that blends the simplicity of a “read-it-later” tool with the reliability of a web archive. Whether you’re highlighting key ideas, jotting down thoughts, or revisiting content long after it’s disappeared from the web, Linkwarden keeps your knowledge accessible and organized.\n\nLinkwarden is also designed with collaboration in mind, enabling you to share links with the public and/or collaborate seamlessly with multiple users.\n\n> [!TIP]  \n> Our official [Cloud](https://linkwarden.app/#pricing) offering provides the simplest way to begin using Linkwarden and it's the preferred choice for many due to its time-saving benefits. <br> Your subscription supports our hosting infrastructure and ongoing development. <br> Alternatively, if you prefer self-hosting Linkwarden, you can do so by following our [Installation documentation](https://docs.linkwarden.app/self-hosting/installation).\n\n## Features\n\n- 📸 Auto capture a screenshot, PDF, and single html file of each webpage\n- 📖 Reader view of the webpage, with the ability to highlight and annotate text\n- 🏛️ Send your webpage to Wayback Machine ([archive.org](https://archive.org)) for a snapshot (optional)\n- ✨ Local AI Tagging to automatically tag your links based on their content (optional)\n- 📂 Organize links by collection, sub-collection, name, description and multiple tags\n- 👥 Collaborate on gathering links in a collection\n- 🎛️ Customize the permissions of each member\n- 🌐 Share your collected links and preserved formats with the world\n- 📱 Native iOS and android mobile apps\n- 🔍 Full text search, filter and sort for easy retrieval\n- 🌓 Dark/Light mode support\n- 🧩 Browser extension (star it [here](https://github.com/linkwarden/browser-extension)!)\n- 🔄 Browser Synchronization (using [Floccus](https://floccus.org)!)\n- ⬆️ Upload from SingleFile (check out the [guide](https://docs.linkwarden.app/Usage/upload-from-singlefile))\n- 🔐 SSO integration (Enterprise and Self-hosted users only)\n- 🍎 iOS Shortcut to save links to Linkwarden\n- 🔑 API keys\n- ✅ Bulk actions\n- 👥 User administration\n- 🌐 Support for other languages (i18n)\n- 📁 Image and PDF uploads\n- 🎨 Custom icons for links and collections\n- 🔔 RSS feed subscription\n- ✨ And many more features (literally!)\n\n## Get Our Official Mobile App\n\n<img src=\"./assets/mobile_apps.png\" alt=\"Different screens (iPad, Pixel, and iPhone)\" width=\"400\" />\n\n> [!IMPORTANT]\n> To use the app you’ll first need a Linkwarden account.\n\nTo create an account, you can choose between:\n\n- [**Linkwarden Cloud**](https://linkwarden.app/#pricing) – instant setup, and your subscription directly supports ongoing development.\n- [**Self-hosted Linkwarden**](https://docs.linkwarden.app/self-hosting/installation) – free, but you’ll need to deploy and maintain a Linkwarden instance on a server.\n\nAfter creating an account, download the app from your preferred store:\n\n[![Download on the App Store](./assets/app_store.png)](https://apps.apple.com/app/linkwarden/id6752550960)\n[![Get it on Google Play](./assets/google_play.png)](https://play.google.com/store/apps/details?id=app.linkwarden)\n\n(To get the app as an APK outside Google Play, check out our [builds](https://github.com/linkwarden/builds) repository.)\n\n## Like what we're doing? Give us a Star ⭐\n\n![Star Us](https://raw.githubusercontent.com/linkwarden/linkwarden/main/assets/star_repo.gif)\n\n## We're building our Community 🌐\n\nJoin and follow us in the following platforms to stay up to date about the most recent features and for support:\n\n<a href=\"https://discord.com/invite/CtuYV47nuJ\"><img src=\"https://img.shields.io/discord/1117993124669702164?logo=discord&style=flat\" alt=\"Discord\"></a>\n\n<a href=\"https://twitter.com/LinkwardenHQ\"><img src=\"https://img.shields.io/twitter/follow/linkwarden\" alt=\"Twitter\"></a>\n\n<a href=\"https://fosstodon.org/@linkwarden\"><img src=\"https://img.shields.io/mastodon/follow/110748840237143200?domain=https%3A%2F%2Ffosstodon.org\" alt=\"Mastodon\"></a>\n\n## Suggestions\n\nWe _usually_ go after the [popular suggestions](https://github.com/linkwarden/linkwarden/issues?q=is%3Aissue%20is%3Aopen%20sort%3Areactions-%2B1-desc). Feel free to open a [new issue](https://github.com/linkwarden/linkwarden/issues/new?assignees=&labels=enhancement&projects=&template=feature_request.md&title=) to suggest one - others might be interested too! :)\n\n## Roadmap\n\nMake sure to check out our [public roadmap](https://github.com/orgs/linkwarden/projects/1).\n\n## Community Projects\n\nHere are some community-maintained projects that are built around Linkwarden:\n\n- [My Links](https://apps.apple.com/ca/app/my-links-for-linkwarden/id6504573402) - iOS and MacOS Apps, maintained by [JGeek00](https://github.com/JGeek00).\n- [LinkDroid](https://fossdroid.com/a/linkdroid-for-linkwarden.html) - Android App with share sheet integration, [source code](https://github.com/Dacid99/LinkDroid-for-Linkwarden).\n- [LinkGuardian](https://github.com/Elbullazul/LinkGuardian) - An Android client for Linkwarden. Built with Kotlin and Jetpack compose.\n- [StarWarden](https://github.com/rtuszik/starwarden) - A browser extension to save your starred GitHub repositories to Linkwarden.\n\n## Development\n\nIf you want to contribute, Thanks! Start by choosing one of our [popular suggestions](https://github.com/linkwarden/linkwarden/issues?q=is%3Aissue%20is%3Aopen%20sort%3Areactions-%2B1-desc), just please stay in touch with [@daniel31x13](https://github.com/daniel31x13) before starting.\n\n# Translations\n\nIf you want to help us translate Linkwarden to your language, please check out our [Crowdin page](https://crowdin.com/project/linkwarden) and start translating. We would love to have your help!\n\nTo start translating a new language, please create an issue so we can set it up for you. New languages will be added once they reach at least 50% translation completion.\n\n<a href=\"https://crowdin.com/project/linkwarden\">\n<img src=\"https://badges.crowdin.net/linkwarden/localized.svg\" alt=\"Crowdin\" /></a>\n\n## Security\n\nIf you found a security vulnerability, please do **not** create a public issue, instead send an email to [security@linkwarden.app](mailto:security@linkwarden.app) stating the vulnerability. Thanks!\n\n## Support <3\n\nOther than using our official [Cloud](https://linkwarden.app/#pricing) offering, any [donations](https://opencollective.com/linkwarden) are highly appreciated as well!\n\nHere are the other ways to support/cheer this project:\n\n- Starring this repository.\n- Joining us on [Discord](https://discord.com/invite/CtuYV47nuJ).\n- Referring Linkwarden to a friend.\n\nIf you did any of the above, Thanksss! Otherwise thanks.\n\n## Thanks to All the Contributors 💪\n\nHuge thanks to these guys for spending their time helping Linkwarden grow. They rock! ⚡️\n\n<img src=\"https://contributors-img.web.app/image?repo=linkwarden/linkwarden\" alt=\"Contributors\"/>\n","summary":" Linkwarden is a self-hosted, open-source bookmark manager that permanently preserves web content by automatically archiving webpages as screenshots and PDFs, ensuring access even if original sources disappear. It combines read-it-later functionality with annotation tools for highlighting and note-taking, AI-powered auto-tagging, and collaborative features that enable teams to organize links into shared collections with customizable permissions. Researchers, knowledge workers, and teams who need reliable, long-term access to web resources—and prefer data ownership through self-hosting or managed cloud options—will find it particularly valuable.","description":"⚡️⚡️⚡️ Self-hosted collaborative bookmark manager to collect, read, annotate, and fully preserve what matters, all in one place.","stars":18053,"language":"TypeScript"},{"owner":"unslothai","repo":"unsloth","url":"https://github.com/unslothai/unsloth","readme":"<h1 align=\"center\" style=\"margin:0;\">\n  <a href=\"https://unsloth.ai/docs\"><picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://raw.githubusercontent.com/unslothai/unsloth/main/images/STUDIO%20WHITE%20LOGO.png\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://raw.githubusercontent.com/unslothai/unsloth/main/images/STUDIO%20BLACK%20LOGO.png\">\n    <img alt=\"Unsloth logo\" src=\"https://raw.githubusercontent.com/unslothai/unsloth/main/images/STUDIO%20BLACK%20LOGO.png\" height=\"60\" style=\"max-width:100%;\">\n  </picture></a>\n</h1>\n<h3 align=\"center\" style=\"margin: 0; margin-top: 0;\">\nRun and train AI models with a unified local interface.\n</h3>\n\n<p align=\"center\">\n  <a href=\"#-features\">Features</a> •\n  <a href=\"#-quickstart\">Quickstart</a> •\n  <a href=\"#-free-notebooks\">Notebooks</a> •\n  <a href=\"https://unsloth.ai/docs\">Documentation</a> •\n  <a href=\"https://www.reddit.com/r/unsloth/\">Reddit</a>\n</p>\n <a href=\"https://unsloth.ai/docs/new/studio\">\n<img alt=\"unsloth studio ui homepage\" src=\"https://raw.githubusercontent.com/unslothai/unsloth/main/studio/frontend/public/studio%20github%20landscape%20colab%20display.png\" style=\"max-width: 100%; margin-bottom: 0;\"></a>\n\nUnsloth Studio (Beta) lets you run and train text, [audio](https://unsloth.ai/docs/basics/text-to-speech-tts-fine-tuning), [embedding](https://unsloth.ai/docs/new/embedding-finetuning), [vision](https://unsloth.ai/docs/basics/vision-fine-tuning) models on Windows, Linux and macOS.\n\n## ⭐ Features\nUnsloth provides several key features for both inference and training:\n### Inference\n* **Search + download + run models** including GGUF, LoRA adapters, safetensors\n* **Export models**: [Save or export](https://unsloth.ai/docs/new/studio/export) models to GGUF, 16-bit safetensors and other formats.\n* **Tool calling**: Support for [self-healing tool calling](https://unsloth.ai/docs/new/studio/chat#auto-healing-tool-calling) and web search\n* **[Code execution](https://unsloth.ai/docs/new/studio/chat#code-execution)**: lets LLMs test code in Claude artifacts and sandbox environments\n* [Auto-tune inference parameters](https://unsloth.ai/docs/new/studio/chat#auto-parameter-tuning) and customize chat templates.\n* We work directly with teams behind [gpt-oss](https://docs.unsloth.ai/new/gpt-oss-how-to-run-and-fine-tune#unsloth-fixes-for-gpt-oss), [Qwen3](https://www.reddit.com/r/LocalLLaMA/comments/1kaodxu/qwen3_unsloth_dynamic_ggufs_128k_context_bug_fixes/), [Llama 4](https://github.com/ggml-org/llama.cpp/pull/12889), [Mistral](models/tutorials/devstral-how-to-run-and-fine-tune.md), [Gemma 1-3](https://news.ycombinator.com/item?id=39671146), and [Phi-4](https://unsloth.ai/blog/phi4), where we’ve fixed bugs that improve model accuracy.\n* Upload images, audio, PDFs, code, DOCX and more file types to chat with.\n### Training\n* Train and RL **500+ models** up to **2x faster** with up to **70% less VRAM**, with no accuracy loss.\n* Custom Triton and mathematical **kernels**. See some collabs we did with [PyTorch](https://unsloth.ai/docs/get-started/reinforcement-learning-rl-guide/fp8-reinforcement-learning) and [Hugging Face](https://unsloth.ai/docs/new/faster-moe).\n* **Data Recipes**: [Auto-create datasets](https://unsloth.ai/docs/new/studio/data-recipe) from **PDF, CSV, DOCX** etc. Edit data in a visual-node workflow.\n* **[Reinforcement Learning](https://unsloth.ai/docs/get-started/reinforcement-learning-rl-guide)** (RL): The most efficient [RL](https://unsloth.ai/docs/get-started/reinforcement-learning-rl-guide) library, using **80% less VRAM** for GRPO, [FP8](https://unsloth.ai/docs/get-started/reinforcement-learning-rl-guide/fp8-reinforcement-learning) etc.\n* Supports full fine-tuning, RL, pretraining, 4-bit, 16-bit and, FP8 training.\n* **Observability**: Monitor training live, track loss and GPU usage and customize graphs.\n* [Multi-GPU](https://unsloth.ai/docs/basics/multi-gpu-training-with-unsloth) training is supported, with major improvements coming soon.\n\n## ⚡ Quickstart\nUnsloth can be used in two ways: through **[Unsloth Studio](https://unsloth.ai/docs/new/studio/)**, the web UI, or through **Unsloth Core**, the code-based version. Each has different requirements.\n\n### Unsloth Studio (web UI)\nUnsloth Studio (Beta) works on **Windows, Linux, WSL** and **macOS**.\n\n* **CPU:** Supported for Chat and Data Recipes currently\n* **NVIDIA:** Training works on RTX 30/40/50, Blackwell, DGX Spark, Station and more\n* **macOS:** Currently supports chat and Data Recipes. **MLX training** is coming very soon\n* **AMD:** Chat + Data works. Train with [Unsloth Core](#unsloth-core-code-based). Studio support is out soon.\n* **Coming soon:** Training support for Apple MLX, AMD, and Intel.\n* **Multi-GPU:** Available now, with a major upgrade on the way\n\n#### macOS, Linux, WSL:\n```bash\ncurl -fsSL https://unsloth.ai/install.sh | sh\n```\n#### Windows:\n```powershell\nirm https://unsloth.ai/install.ps1 | iex\n```\n\n#### Launch\n```bash\nunsloth studio -H 0.0.0.0 -p 8888\n```\n\n#### Update\nTo update, use the same install commands as above. Or run (does not work on Windows):\n```bash\nunsloth studio update\n```\n\n#### Docker\nUse our [Docker image](https://hub.docker.com/r/unsloth/unsloth) ```unsloth/unsloth``` container. Run:\n```bash\ndocker run -d -e JUPYTER_PASSWORD=\"mypassword\" \\\n  -p 8888:8888 -p 8000:8000 -p 2222:22 \\\n  -v $(pwd)/work:/workspace/work \\\n  --gpus all \\\n  unsloth/unsloth\n  ```\n\n#### Developer, Nightly, Uninstall\nTo see developer, nightly and uninstallation etc. instructions, see [advanced installation](#-advanced-installation).\n\n### Unsloth Core (code-based)\n#### Linux, WSL:\n```bash\ncurl -LsSf https://astral.sh/uv/install.sh | sh\nuv venv unsloth_env --python 3.13\nsource unsloth_env/bin/activate\nuv pip install unsloth --torch-backend=auto\n```\n#### Windows:\n```powershell\nwinget install -e --id Python.Python.3.13\nwinget install --id=astral-sh.uv  -e\nuv venv unsloth_env --python 3.13\n.\\unsloth_env\\Scripts\\activate\nuv pip install unsloth --torch-backend=auto\n```\nFor Windows, `pip install unsloth` works only if you have PyTorch installed. Read our [Windows Guide](https://unsloth.ai/docs/get-started/install/windows-installation).\nYou can use the same Docker image as Unsloth Studio.\n\n#### AMD, Intel:\nFor RTX 50x, B200, 6000 GPUs: `uv pip install unsloth --torch-backend=auto`. Read our guides for: [Blackwell](https://unsloth.ai/docs/blog/fine-tuning-llms-with-blackwell-rtx-50-series-and-unsloth) and [DGX Spark](https://unsloth.ai/docs/blog/fine-tuning-llms-with-nvidia-dgx-spark-and-unsloth). <br>\nTo install Unsloth on **AMD** and **Intel** GPUs, follow our [AMD Guide](https://unsloth.ai/docs/get-started/install/amd) and [Intel Guide](https://unsloth.ai/docs/get-started/install/intel).\n\n## 📒 Free Notebooks\n\nTrain for free with our notebooks. You can use our new [free Unsloth Studio notebook](https://colab.research.google.com/github/unslothai/unsloth/blob/main/studio/Unsloth_Studio_Colab.ipynb) to run and train models for free in a web UI.\nRead our [guide](https://unsloth.ai/docs/get-started/fine-tuning-llms-guide). Add dataset, run, then deploy your trained model.\n\n| Model | Free Notebooks | Performance | Memory use |\n|-----------|---------|--------|----------|\n| **Gemma 4 (E2B)**      | [▶️ Start for free](https://colab.research.google.com/github/unslothai/notebooks/blob/main/nb/Gemma4_(E2B)-Vision.ipynb)               | 1.5x faster | 50% less |\n| **Qwen3.5 (4B)**      | [▶️ Start for free](https://colab.research.google.com/github/unslothai/notebooks/blob/main/nb/Qwen3_5_(4B)_Vision.ipynb)               | 1.5x faster | 60% less |\n| **gpt-oss (20B)**      | [▶️ Start for free](https://colab.research.google.com/github/unslothai/notebooks/blob/main/nb/gpt-oss-(20B)-Fine-tuning.ipynb)               | 2x faster | 70% less |\n| **Qwen3.5 GSPO**      | [▶️ Start for free](https://colab.research.google.com/github/unslothai/notebooks/blob/main/nb/Qwen3_5_(4B)_Vision_GRPO.ipynb)               | 2x faster | 70% less |\n| **gpt-oss (20B): GRPO**      | [▶️ Start for free](https://colab.research.google.com/github/unslothai/notebooks/blob/main/nb/gpt-oss-(20B)-GRPO.ipynb)               | 2x faster | 80% less |\n| **Qwen3: Advanced GRPO**      | [▶️ Start for free](https://colab.research.google.com/github/unslothai/notebooks/blob/main/nb/Qwen3_(4B)-GRPO.ipynb)               | 2x faster | 70% less |\n| **embeddinggemma (300M)**    | [▶️ Start for free](https://colab.research.google.com/github/unslothai/notebooks/blob/main/nb/EmbeddingGemma_(300M).ipynb)               | 2x faster | 20% less |\n| **Mistral Ministral 3 (3B)**      | [▶️ Start for free](https://colab.research.google.com/github/unslothai/notebooks/blob/main/nb/Ministral_3_VL_(3B)_Vision.ipynb)               | 1.5x faster | 60% less |\n| **Llama 3.1 (8B) Alpaca**      | [▶️ Start for free](https://colab.research.google.com/github/unslothai/notebooks/blob/main/nb/Llama3.1_(8B)-Alpaca.ipynb)               | 2x faster | 70% less |\n| **Llama 3.2 Conversational**      | [▶️ Start for free](https://colab.research.google.com/github/unslothai/notebooks/blob/main/nb/Llama3.2_(1B_and_3B)-Conversational.ipynb)               | 2x faster | 70% less |\n| **Orpheus-TTS (3B)**     | [▶️ Start for free](https://colab.research.google.com/github/unslothai/notebooks/blob/main/nb/Orpheus_(3B)-TTS.ipynb)               | 1.5x faster | 50% less |\n\n- See all our notebooks for: [Kaggle](https://github.com/unslothai/notebooks?tab=readme-ov-file#-kaggle-notebooks), [GRPO](https://unsloth.ai/docs/get-started/unsloth-notebooks#grpo-reasoning-rl-notebooks), [TTS](https://unsloth.ai/docs/get-started/unsloth-notebooks#text-to-speech-tts-notebooks), [embedding](https://unsloth.ai/docs/new/embedding-finetuning) & [Vision](https://unsloth.ai/docs/get-started/unsloth-notebooks#vision-multimodal-notebooks)\n- See [all our models](https://unsloth.ai/docs/get-started/unsloth-model-catalog) and [all our notebooks](https://unsloth.ai/docs/get-started/unsloth-notebooks)\n- See detailed documentation for Unsloth [here](https://unsloth.ai/docs)\n\n## 🦥 Unsloth News\n- **Gemma 4**: Run and train Google’s new models directly in Unsloth Studio! [Blog](https://unsloth.ai/docs/models/gemma-4)\n- **Introducing Unsloth Studio**: our new web UI for running and training LLMs. [Blog](https://unsloth.ai/docs/new/studio)\n- **Qwen3.5** - 0.8B, 2B, 4B, 9B, 27B, 35-A3B, 112B-A10B are now supported. [Guide + notebooks](https://unsloth.ai/docs/models/qwen3.5/fine-tune)\n- Train **MoE LLMs 12x faster** with 35% less VRAM - DeepSeek, GLM, Qwen and gpt-oss. [Blog](https://unsloth.ai/docs/new/faster-moe)\n- **Embedding models**: Unsloth now supports ~1.8-3.3x faster embedding fine-tuning. [Blog](https://unsloth.ai/docs/new/embedding-finetuning) • [Notebooks](https://unsloth.ai/docs/get-started/unsloth-notebooks#embedding-models)\n- New **7x longer context RL** vs. all other setups, via our new batching algorithms. [Blog](https://unsloth.ai/docs/new/grpo-long-context)\n- New RoPE & MLP **Triton Kernels** & **Padding Free + Packing**: 3x faster training & 30% less VRAM. [Blog](https://unsloth.ai/docs/new/3x-faster-training-packing)\n- **500K Context**: Training a 20B model with >500K context is now possible on an 80GB GPU. [Blog](https://unsloth.ai/docs/blog/500k-context-length-fine-tuning)\n- **FP8 & Vision RL**: You can now do FP8 & VLM GRPO on consumer GPUs. [FP8 Blog](https://unsloth.ai/docs/get-started/reinforcement-learning-rl-guide/fp8-reinforcement-learning) • [Vision RL](https://unsloth.ai/docs/get-started/reinforcement-learning-rl-guide/vision-reinforcement-learning-vlm-rl)\n- **gpt-oss** by OpenAI: Read our [RL blog](https://unsloth.ai/docs/models/gpt-oss-how-to-run-and-fine-tune/gpt-oss-reinforcement-learning), [Flex Attention](https://unsloth.ai/docs/models/gpt-oss-how-to-run-and-fine-tune/long-context-gpt-oss-training) blog and [Guide](https://unsloth.ai/docs/models/gpt-oss-how-to-run-and-fine-tune).\n\n## 📥 Advanced Installation\nThe below advanced instructions are for Unsloth Studio. For Unsloth Core advanced installation, [view our docs](https://unsloth.ai/docs/get-started/install/pip-install#advanced-pip-installation).\n#### Developer installs: macOS, Linux, WSL:\n```bash\ngit clone https://github.com/unslothai/unsloth\ncd unsloth\n./install.sh --local\nunsloth studio -H 0.0.0.0 -p 8888\n```\nThen to update :\n```bash\nunsloth studio update\n```\n\n#### Developer installs: Windows PowerShell:\n```powershell\ngit clone https://github.com/unslothai/unsloth.git\ncd unsloth\nSet-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass\n.\\install.ps1 --local\nunsloth studio -H 0.0.0.0 -p 8888\n```\nThen to update :\n```bash\nunsloth studio update\n```\n\n#### Nightly: MacOS, Linux, WSL:\n```bash\ngit clone https://github.com/unslothai/unsloth\ncd unsloth\ngit checkout nightly\n./install.sh --local\nunsloth studio -H 0.0.0.0 -p 8888\n```\nThen to launch every time:\n```bash\nunsloth studio -H 0.0.0.0 -p 8888\n```\n\n#### Nightly: Windows:\nRun in Windows Powershell:\n```bash\ngit clone https://github.com/unslothai/unsloth.git\ncd unsloth\ngit checkout nightly\nSet-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass\n.\\install.ps1 --local\nunsloth studio -H 0.0.0.0 -p 8888\n```\nThen to launch every time:\n```bash\nunsloth studio -H 0.0.0.0 -p 8888\n```\n\n#### Uninstall\nYou can uninstall Unsloth Studio by deleting its install folder usually located under `$HOME/.unsloth/studio` on Mac/Linux/WSL and `%USERPROFILE%\\.unsloth\\studio` on Windows. Using the `rm -rf` commands will **delete everything**, including your history, cache:\n\n* ​ **MacOS, WSL, Linux:** `rm -rf ~/.unsloth/studio`\n* ​ **Windows (PowerShell):** `Remove-Item -Recurse -Force \"$HOME\\.unsloth\\studio\"`\n\nFor more info, [see our docs](https://unsloth.ai/docs/new/studio/install#uninstall).\n\n#### Deleting model files\n\nYou can delete old model files either from the bin icon in model search or by removing the relevant cached model folder from the default Hugging Face cache directory. By default, HF uses:\n\n* ​ **MacOS, Linux, WSL:** `~/.cache/huggingface/hub/`\n* ​ **Windows:** `%USERPROFILE%\\.cache\\huggingface\\hub\\`\n\n## 💚 Community and Links\n| Type                                                                                                                                      | Links                                                                          |\n| ----------------------------------------------------------------------------------------------------------------------------------------- | ------------------------------------------------------------------------------ |\n| <img width=\"16\" src=\"https://cdn.prod.website-files.com/6257adef93867e50d84d30e2/66e3d80db9971f10a9757c99_Symbol.svg\" />  **Discord**                       | [Join Discord server](https://discord.com/invite/unsloth)                          |\n| <img width=\"15\" src=\"https://redditinc.com/hs-fs/hubfs/Reddit%20Inc/Brand/Reddit_Logo.png\" />  **r/unsloth Reddit**                       | [Join Reddit community](https://reddit.com/r/unsloth)                          |\n| 📚 **Documentation & Wiki**                                                                                                               | [Read Our Docs](https://unsloth.ai/docs)                                       |\n| <img width=\"13\" src=\"https://upload.wikimedia.org/wikipedia/commons/0/09/X_(formerly_Twitter)_logo_late_2025.svg\" />  **Twitter (aka X)** | [Follow us on X](https://twitter.com/unslothai)                                |\n| 🔮 **Our Models**                                                                                                                         | [Unsloth Catalog](https://unsloth.ai/docs/get-started/unsloth-model-catalog)   |\n| ✍️ **Blog**                                                                                                                               | [Read our Blogs](https://unsloth.ai/blog)                                      |\n\n### Citation\n\nYou can cite the Unsloth repo as follows:\n```bibtex\n@software{unsloth,\n  author = {Daniel Han, Michael Han and Unsloth team},\n  title = {Unsloth},\n  url = {https://github.com/unslothai/unsloth},\n  year = {2023}\n}\n```\nIf you trained a model with 🦥Unsloth, you can use this cool sticker!   <img src=\"https://raw.githubusercontent.com/unslothai/unsloth/main/images/made with unsloth.png\" width=\"200\" align=\"center\" />\n\n### License\nUnsloth uses a dual-licensing model of Apache 2.0 and AGPL-3.0. The core Unsloth package remains licensed under **[Apache 2.0](https://github.com/unslothai/unsloth?tab=Apache-2.0-1-ov-file)**, while certain optional components, such as the Unsloth Studio UI are licensed under the open-source license **[AGPL-3.0](https://github.com/unslothai/unsloth?tab=AGPL-3.0-2-ov-file)**.\n\nThis structure helps support ongoing Unsloth development while keeping the project open source and enabling the broader ecosystem to continue growing.\n\n### Thank You to\n- The [llama.cpp library](https://github.com/ggml-org/llama.cpp) that lets users run and save models with Unsloth\n- The Hugging Face team and their libraries: [transformers](https://github.com/huggingface/transformers) and [TRL](https://github.com/huggingface/trl)\n- The Pytorch and [Torch AO](https://github.com/unslothai/unsloth/pull/3391) team for their contributions\n- NVIDIA for their [NeMo DataDesigner](https://github.com/NVIDIA-NeMo/DataDesigner) library and their contributions\n- And of course for every single person who has contributed or has used Unsloth!\n","summary":" Unsloth is a unified local platform for running and training AI models that enables users to deploy and fine-tune over 500 large language models, vision, audio, and embedding models on Windows, Linux, and macOS with up to 2x faster training speeds and 70% less VRAM consumption. The platform offers comprehensive inference capabilities including model downloading, GGUF and safetensors support, tool calling, code execution in sandboxed environments, and multimodal chat with documents, alongside advanced training features such as reinforcement learning with 80% VRAM reduction, automated dataset creation from PDFs and spreadsheets, and real-time training observability. Optimized for both researchers and practitioners working with models like Llama, Qwen, Mistral, and GPT-OSS, Unsloth provides an accessible Studio interface and custom computational kernels that eliminate accuracy loss while dramatically reducing hardware requirements for local AI development.","description":"Unsloth Studio is a web UI for training and running open models like Gemma 4, Qwen3.5, DeepSeek, gpt-oss locally.","stars":62220,"language":"Python"},{"owner":"olalie","repo":"tapmap","url":"https://github.com/olalie/tapmap","readme":"# TapMap\n\n![TapMap demo](docs/images/demo.gif)\n\n**See where your computer connects on a live world map.**\n\nTapMap inspects local socket data, enriches IP addresses with geolocation, and visualizes the locations on an interactive map.\n\nIt uses:\n\n- `psutil` (Windows and Linux) or `lsof` (macOS) to read active network connections\n- MaxMind GeoLite2 databases for IP geolocation  \n- Dash and Plotly to render an interactive world map  \n\nArchitecture: local socket scan → IP extraction → GeoIP lookup → map rendering.\n\nTapMap runs entirely on your own machine.  \nIt is not a firewall or a full security suite.  \nIt makes network activity visible on a world map and easy to inspect with hover and click.\n\nTapMap can also run in Docker on Linux, with limited process visibility.\n\n---\n\n## Documentation\n\nFull documentation, including API reference and platform behavior notes:\n\n    https://olalie.github.io/tapmap/\n\n---\n\n## Download & run\n\nDownload the latest version from the  \n[Releases page](https://github.com/olalie/tapmap/releases)\n\nAvailable builds:\n\n- Windows (zip)\n- Linux (zip)\n- macOS (zip)\n\nTested on Windows 11, Ubuntu, and macOS (Apple Silicon).\n\nNo installation required. Download, extract, and run.\n\nStart TapMap:\n\n    ./tapmap\n\nOn Windows, double-click `tapmap.exe`.\n\nOn Linux, you may need:\n\n    chmod +x tapmap\n\nPlatform notes:\n\n- Linux uses `xdg-open` for the **Open data folder** action\n- macOS uses `open`\n\n---\n\n## Command line\n\n    tapmap --help\n\n    tapmap --version\n    tapmap -v\n\n---\n\n## Windows SmartScreen\n\nWindows may show a SmartScreen warning the first time you run TapMap.  \nThis is normal for new applications that are not digitally signed.\n\nTo start the program:\n\n1. Click **More info**.  \n2. Click **Run anyway**.\n\n---\n\n## macOS security warning\n\nmacOS may block the app the first time you run TapMap.\nThis is normal for unsigned applications.\n\nTo start the program:\n\n1. Try to open the app.\n2. Open **System Settings → Privacy & Security**.\n3. Click **Open anyway** for TapMap.\n\nYou may be asked to confirm once more.\n\nAlternatively, you can remove the warning using Terminal:\n\n    xattr -d com.apple.quarantine tapmap\n\n---\n\n## How it runs\n\nTapMap runs locally and opens in your browser.\n\nThe web interface runs on a local server at:\n\n    http://127.0.0.1:8050/\n\nIf it does not open automatically, enter the address manually in your browser.\n\nThe default port is defined by `SERVER_PORT` in `config.py`.\n\nThe port can be overridden using the environment variable `TAPMAP_PORT`.\n\nExamples:\n\nLinux / macOS:\n\n    TAPMAP_PORT=8060 python tapmap.py\n\nPowerShell:\n\n    $env:TAPMAP_PORT=\"8060\"\n    python tapmap.py\n    \n---\n\n## GeoIP databases (required for map locations)\n\nTapMap uses local MaxMind GeoLite2 databases for geolocation.  \nThe databases are not included in the download.\n\nTapMap works without these files, but map locations will not be displayed.\n\nRequired files:\n\n- GeoLite2-City.mmdb  \n- GeoLite2-ASN.mmdb  \n\nDownload is free from MaxMind, but requires an account and acceptance of license terms:\n\n```\nhttps://dev.maxmind.com/geoip/geolite2-free-geolocation-data\n```\n\nAfter downloading:\n\n1. Start TapMap.  \n2. Open the **data folder** from the app.  \n3. Copy the `.mmdb` files into that folder.  \n4. Click **Recheck GeoIP databases**.\n\nUpdate recommendation: download updated databases regularly, for example monthly.  \nRedistribution is subject to the MaxMind license terms.\n\n---\n\n## What TapMap shows\n\n- Services your computer connects to  \n- Their approximate locations on a world map  \n- Nearby clusters highlighted visually  \n- Unmapped public services with missing geolocation   \n- Established LAN and LOCAL services  \n- Local open ports (TCP LISTEN and UDP bound)  \n\nAll data is collected locally on your machine.\n\n---\n\n## Why TapMap\n\nMost computers communicate with dozens of remote systems every day.  \nYou usually cannot see them.\n\nTapMap makes these connections visible within seconds.\n\n- See unexpected connections  \n- Understand where traffic goes  \n- Get a quick overview of network activity  \n\nUnexpected connections may indicate misconfiguration, background services, or unwanted software.\n\n---\n\n## Interface\n\n![TapMap features](docs/images/features.gif)\n\n### Main view\n![Main view](docs/images/main-view.png)\n\n### Actions menu\n![Actions menu](docs/images/actions-menu.png)\n\n### Unmapped services\n![Unmapped services](docs/images/unmapped-services.png)\n\n### Open ports\n![Open ports](docs/images/open-ports.png)\n\n### About\n![About](docs/images/about.png)\n\n---\n\n## Keyboard controls\n\n| Key | Action |\n|-----|--------|\n| U   | Unmapped public services |\n| L   | Established LAN/LOCAL services |\n| O   | Open ports |\n| T   | Show cache in terminal |\n| C   | Clear cache |\n| R   | Recheck GeoIP databases |\n| H   | Help |\n| A   | About |\n| ESC | Close window |\n\n---\n\n## Privacy\n\n- TapMap runs locally.  \n- No connection data is sent anywhere.  \n- Geolocation uses local MaxMind databases.  \n- If `MY_LOCATION = \"auto\"`, TapMap makes a small request to detect your public IP.  \n- To detect offline status, TapMap performs short connection checks to 1.1.1.1 and 8.8.8.8.\n\n---\n\n## Configuration\n\nTapMap reads settings from `config.py`.\n\nCommon settings:\n\n- `SERVER_PORT`\n- `MY_LOCATION`\n- `POLL_INTERVAL_MS`\n- `COORD_PRECISION`\n- `ZOOM_NEAR_KM`\n\n`SERVER_PORT` defines the default port used by the local Dash server.\n\nThe port can be overridden at runtime using the environment variable `TAPMAP_PORT`.\n\n---\n\n## Build from source\n\nRequirements:\n\n- Python 3.10+\n\nInstall dependencies:\n\n```\npip install -r requirements.txt\n```\n\nRun:\n\n```\npython tapmap.py\n```\n\nRun tests:\n\n```\npytest\n```\n\n---\n\n## Docker (Linux)\n\nTapMap can run in Docker on Linux hosts.\n\n### Requirements\n\n- Linux host\n- Docker installed\n- GeoLite2 `.mmdb` files\n\n### Setup\n\nPlace the GeoLite2 database files in:\n\n    docker-data/\n\n### Run\n\n    docker compose -f compose.linux.yaml up --build\n\nThe server binds to 0.0.0.0 by default in Docker.\n\nOverride in compose if needed:\n\n    TAPMAP_HOST: \"127.0.0.1\"\n\nOpen in browser on the host:\n\n    http://127.0.0.1:8050\n\nIf you access the app from another machine, use the host IP address instead.\n\n### Notes\n\n- Docker provides full TCP and UDP socket data\n- Process information may be unavailable in Docker mode, depending on host security policies\n- Requires Linux host (not supported on Docker Desktop for Windows or macOS)\n\nProcess visibility in Docker depends on host security policies.\n\nOn Ubuntu with the default Docker AppArmor profile (`docker-default`), `SYS_PTRACE` alone was not sufficient.\n\nIn this setup, process names became available with:\n\n    --cap-add=SYS_PTRACE\n    --security-opt apparmor=unconfined\n\nBehavior may vary across systems.\n\n---\n\n## Docker Hub\n\nTapMap can run directly from Docker Hub without cloning the repository.\n\n### Setup\n\nCreate a local data folder:\n\n    mkdir -p ~/tapmap-data\n\nPlace the GeoLite2 database files in that folder:\n\n- GeoLite2-City.mmdb\n- GeoLite2-ASN.mmdb\n\n### Run\n\n    docker run --rm \\\n      --network host \\\n      --pid host \\\n      -v ~/tapmap-data:/data \\\n      -e TAPMAP_IN_DOCKER=1 \\\n      olalie/tapmap:latest\n\nThe server binds to 0.0.0.0 by default in Docker.\n\nTo override the bind address:\n\n    -e TAPMAP_HOST=127.0.0.1\n\nOpen in browser on the host:\n\n    http://127.0.0.1:8050\n\nIf you access the app from another machine, use the host IP address instead.\n\n### Notes\n\n- The mounted folder is used as the container data directory (`/data`)\n- Process information may be unavailable in Docker mode, depending on host security policies\n- Requires Linux host (not supported on Docker Desktop for Windows or macOS)\n\n---\n\n## Support the project\n\nTapMap is free and open source.\n\nIf you find it useful, consider supporting the project:\n\n- Buy Me a Coffee  \n  https://www.buymeacoffee.com/olalie  \n\n- PayPal  \n  https://www.paypal.com/donate/?hosted_button_id=ELLXBK9BY8EDU  \n\nYou can also give the project a star on GitHub.\n\n---\n\n## License\n\nMIT License\n\n---\n\n## Acknowledgements\n\nThanks to @TechnVision for raising the configurable port use case.\n\nThanks to @desrod for suggesting a solution for configurable port support.\n\nThanks to @hugalafutro for suggesting optional SYS_PTRACE support for process visibility on Linux.\n","summary":" TapMap is a local network visualization tool that maps your computer's active internet connections onto an interactive world map in real-time. By scanning socket data with psutil or lsof and enriching IP addresses using MaxMind GeoLite2 databases, it reveals the geographic destinations of your traffic through a browser-based interface without transmitting data externally. It benefits privacy-conscious users and security enthusiasts who want to inspect connection patterns, identify unexpected remote services, or understand where their data travels geographically. Available as standalone executables for Windows, Linux, and macOS, TapMap serves those seeking transparent network visibility rather than functioning as a complete firewall or security suite.","description":"See where your computer connects on a live world map.","stars":480,"language":"Python"},{"owner":"Dispatcharr","repo":"Dispatcharr","url":"https://github.com/Dispatcharr/Dispatcharr","readme":"# 🎬 Dispatcharr — Your Ultimate IPTV & Stream Management Companion\n\n<p align=\"center\">\n  <img src=\"https://github.com/Dispatcharr/Dispatcharr/blob/main/frontend/src/images/logo.png?raw=true\" height=\"200\" alt=\"Dispatcharr Logo\" />\n</p>\n\n---\n\n## 📖 What is Dispatcharr?\n\nDispatcharr (pronounced like \"dispatcher\") is an **open-source powerhouse** for managing IPTV streams, EPG data, and VOD content with elegance and control.\\\nBorn from necessity and built with passion, it started as a personal project by **[OkinawaBoss](https://github.com/OkinawaBoss)** and evolved with contributions from legends like **[dekzter](https://github.com/dekzter)**, **[SergeantPanda](https://github.com/SergeantPanda)** and **Bucatini**.\n\n> Think of Dispatcharr as the \\*arr family's IPTV cousin — simple, smart, and designed for streamers who want reliability and flexibility.\n\n---\n\n## 🎯 What Can I Do With Dispatcharr?\n\nDispatcharr empowers you with complete IPTV control. Here are some real-world scenarios:\n\n💡 **Consolidate Multiple IPTV Sources**\\\nCombine streams from multiple providers into a single interface. Manage, filter, and organize thousands of channels with ease.\n\n📺 **Integrate with Media Centers**\\\nUse HDHomeRun emulation to add virtual tuners to **Plex**, **Emby**, or **Jellyfin**. They'll discover Dispatcharr as a live TV source and can record programs di
