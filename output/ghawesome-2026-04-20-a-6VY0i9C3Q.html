<script id="project-data" type="application/json">[{"owner":"cloudflare","repo":"agentic-inbox","url":"https://github.com/cloudflare/agentic-inbox","readme":"<div align=\"center\">\n  <h1>Agentic Inbox</h1>\n  <p><em>A self-hosted email client with an AI agent, running entirely on Cloudflare Workers</em></p>\n</div>\n\nAgentic Inbox lets you send, receive, and manage emails through a modern web interface -- all powered by your own Cloudflare account. Incoming emails arrive via [Cloudflare Email Routing](https://developers.cloudflare.com/email-routing/), each mailbox is isolated in its own [Durable Object](https://developers.cloudflare.com/durable-objects/) with a SQLite database, and attachments are stored in [R2](https://developers.cloudflare.com/r2/).\n\nAn **AI-powered Email Agent** can read your inbox, search conversations, and draft replies -- built with the [Cloudflare Agents SDK](https://developers.cloudflare.com/agents/) and [Workers AI](https://developers.cloudflare.com/workers-ai/).\n\n![Agentic Inbox screenshot](./demo_app.png)\n\n\nRead the blog post to learn more about Cloudflare Email Service and how to use it with the Agents SDK, MCP, and from the Wrangler CLI: [Email for Agents](https://blog.cloudflare.com/email-for-agents/).\n\n## How to setup\n\n**Important**: Clicking the 'Deploy to Cloudflare' button is only one part of the setup. You must follow the **After deploying** steps as well. For a full step-by-step guide with screenshots, refer to this comment: \nhttps://github.com/cloudflare/agentic-inbox/issues/4#issuecomment-4269118513\n\n### To set up\n\n1. Deploy to Cloudflare. The deploy flow will automatically provision R2, Durable Objects, and Workers AI. You'll be prompted for **DOMAINS**, which is the domain (yourdomain.com) you want to receive emails for (email@yourdomain.com).\n\n     [![Deploy to Cloudflare](https://deploy.workers.cloudflare.com/button)](https://deploy.workers.cloudflare.com/?url=https://github.com/cloudflare/agentic-inbox)\n\n2. **Configure Cloudflare Access** -- Enable [one-click Cloudflare Access](https://developers.cloudflare.com/changelog/post/2025-10-03-one-click-access-for-workers/) on your Worker under Settings > Domains & Routes. The modal will show your `POLICY_AUD` and `TEAM_DOMAIN` values. `TEAM_DOMAIN` can be either your Access team URL or the full `.../cdn-cgi/access/certs` URL. **You must set these as secrets for your Worker.**\n3. **Set up Email Routing** -- In the Cloudflare dashboard, go to your domain > Email Routing and create a catch-all rule that forwards to this Worker\n4. **Enable Email Service** -- The worker needs the `send_email` binding to send outbound emails. See [Email Service docs](https://developers.cloudflare.com/email-routing/email-workers/send-email-workers/)\n5. **Create a mailbox** -- Visit your deployed app and create a mailbox for any address on your domain (e.g. `hello@example.com`)\n\n### Troubleshooting Access\n\n1. If you see `Invalid or expired Access token`, that usually means `POLICY_AUD` or `TEAM_DOMAIN` secrets are incorrect.\n   * Resolution: [turn Access off and back on for the Worker to get the Access modal again](https://developers.cloudflare.com/changelog/post/2025-10-03-one-click-access-for-workers/), then reset your Worker secrets to the latest `POLICY_AUD` and `TEAM_DOMAIN` values shown there.\n2. If you see `Cloudflare Access must be configured in production`, this application is intentionally enforcing Cloudflare Access so your inbox is not exposed to anyone on the internet.\n   * Resolution: enable Access using [one-click Cloudflare Access for Workers](https://developers.cloudflare.com/changelog/post/2025-10-03-one-click-access-for-workers/), then set the `POLICY_AUD` and `TEAM_DOMAIN` Worker secrets from the modal values.\n\n## Features\n\n- **Full email client** — Send and receive emails via Cloudflare Email Routing with a rich text composer, reply/forward threading, folder organization, search, and attachments\n- **Per-mailbox isolation** — Each mailbox runs in its own Durable Object with SQLite storage and R2 for attachments\n- **Built-in AI agent** — Side panel with 9 email tools for reading, searching, drafting, and sending\n- **Auto-draft on new email** — Agent automatically reads inbound emails and generates draft replies, always requiring explicit confirmation before sending\n- **Configurable and persistent** — Custom system prompts per mailbox, persistent chat history, streaming markdown responses, and tool call visibility\n\n## Stack\n\n- **Frontend:** React 19, React Router v7, Tailwind CSS, Zustand, TipTap, `@cloudflare/kumo`\n- **Backend:** Hono, Cloudflare Workers, Durable Objects (SQLite), R2, Email Routing\n- **AI Agent:** Cloudflare Agents SDK (`AIChatAgent`), AI SDK v6, Workers AI (`@cf/moonshotai/kimi-k2.5`), `react-markdown` + `remark-gfm`\n- **Auth:** Cloudflare Access JWT validation (required outside local development)\n\n## Getting Started\n\n```bash\nnpm install\nnpm run dev\n```\n\n### Configuration\n\n1. Set your domain in `wrangler.jsonc`\n2. Create an R2 bucket named `agentic-inbox`: `wrangler r2 bucket create agentic-inbox`\n\n### Deploy\n\n```bash\nnpm run deploy\n```\n\n## Prerequisites\n\n- Cloudflare account with a domain\n- [Email Routing](https://developers.cloudflare.com/email-routing/) enabled for receiving\n- [Email Service](https://developers.cloudflare.com/email-service/) enabled for sending\n- [Workers AI](https://developers.cloudflare.com/workers-ai/) enabled (for the agent)\n- [Cloudflare Access](https://developers.cloudflare.com/cloudflare-one/policies/access/) configured for deployed/shared environments (required in production)\n\nAny user who passes the shared Cloudflare Access policy can access all mailboxes in this app by design. This includes the MCP server at `/mcp` -- external AI tools (Claude Code, Cursor, etc.) connected via MCP can operate on any mailbox by passing a `mailboxId` parameter. There is no per-mailbox authorization; the Cloudflare Access policy is the single trust boundary.\n\n## Architecture\n\n```\n┌──────────────┐     ┌──────────────────┐     ┌─────────────────┐\n│   Browser    │────>│  Hono Worker     │────>│  MailboxDO      │\n│  React SPA   │     │  (API + SSR)     │     │  (SQLite + R2)  │\n│  Agent Panel │     │                  │     └─────────────────┘\n└──────┬───────┘     │  /agents/* ──────┼────>┌─────────────────┐\n       │             │                  │     │  EmailAgent DO  │\n       │ WebSocket   │                  │     │  (AIChatAgent)  │\n       └─────────────┤                  │     │  9 email tools  │\n                     │                  │────>│  Workers AI     │\n                     └──────────────────┘     └─────────────────┘\n```\n\n## License\n\nApache 2.0 -- see [LICENSE](LICENSE).\n","summary":" Agentic Inbox is a self-hosted email client that combines traditional email management with AI assistance, running entirely on Cloudflare's serverless infrastructure including Workers, Durable Objects, and R2 storage. It enables users to send, receive, and organize emails through a modern web interface while leveraging an AI agent—built with the Cloudflare Agents SDK—to read messages, search conversations, and draft replies. Each mailbox runs in isolated Durable Objects with SQLite databases, ensuring data separation and scalability without managing servers. This solution is ideal for developers and organizations seeking a customizable, AI-powered email platform that deploys seamlessly within the Cloudflare ecosystem.","description":"A self-hosted email client with an AI agent, running entirely on Cloudflare Workers","stars":765,"language":"TypeScript"},{"owner":"Freika","repo":"dawarich","url":"https://github.com/Freika/dawarich","readme":"# 🌍 Dawarich: Your Self-Hostable Location History Tracker\n\n[![Discord](https://dcbadge.limes.pink/api/server/pHsBjpt5J8)](https://discord.gg/pHsBjpt5J8) | [![ko-fi](https://ko-fi.com/img/githubbutton_sm.svg)](https://ko-fi.com/H2H3IDYDD) | [![Patreon](https://img.shields.io/endpoint.svg?url=https%3A%2F%2Fshieldsio-patreon.vercel.app%2Fapi%3Fusername%3Dfreika%26type%3Dpatrons&style=for-the-badge)](https://www.patreon.com/freika)\n\n---\n\n## Screenshots\n\n![Map](screenshots/map.png)\n*Map View*\n\n![Insights](screenshots/insights.png)\n*Insights Page*\n\n![Family](screenshots/family.png)\n*Family Page*\n\n![Stats](screenshots/stats.png)\n*Statistics Overview*\n\n![Trips](screenshots/trips.png)\n*Trips page*\n\n---\n\n## About Dawarich\n\nIf you're looking for Dawarich Cloud, where everything is managed for you, check out [Dawarich Cloud](https://dawarich.app).\n\n**Dawarich** is a self-hostable web app designed to replace Google Timeline (aka Google Location History).\nIt enables you to:\n\n- Track your location history.\n- Visualize your data on an interactive map.\n- Create trips and analyze your travel history.\n- Share your location with family members.\n- Integrate with photo management apps like Immich and Photoprism to visualize geotagged photos.\n- Import your location history from Google Maps Timeline, OwnTracks, GPX, GeoJSON and some other sources\n- Explore statistics like the number of countries and cities visited, total distance traveled, and more!\n- Share your location with family members.\n\n**Changelog**: Find the latest updates [here](CHANGELOG.md).\n\n**Contribute**: See [CONTRIBUTING.md](CONTRIBUTING.md) for how to contribute to Dawarich.\n---\n\n## ⚠️ Disclaimer\n\n### Updating strategy\n\n- **DO NOT UPDATE AUTOMATICALLY**: Read release notes before updating. Automatic updates may break your setup.\n- **Under active development**: Expect frequent updates, bugs, and breaking changes.\n- **Do not delete your original data** after importing into Dawarich.\n- **Backup before updates**: Always [backup your data](https://dawarich.app/docs/tutorials/backup-and-restore) before upgrading.\n- **Stay up-to-date**: Make sure you're running the latest version for the best experience.\n\n---\n\n## 🧭 Supported Location Tracking\n\nYou can track your location with the following apps:\n\n- 💫 [Dawarich for iOS](https://dawarich.app/docs/dawarich-for-ios/)\n- 🤖 [Dawarich for Android](https://dawarich.app/docs/dawarich-for-android/)\n- 🗺️ [Dawarich Community](https://github.com/sunstep/dawarich-android) (Android)\n- 🌍 [Overland](https://dawarich.app/docs/tutorials/track-your-location#overland)\n- 🛰️ [OwnTracks](https://dawarich.app/docs/tutorials/track-your-location#owntracks)\n- 🧭 [GPSLogger](https://dawarich.app/docs/tutorials/track-your-location#gps-logger)\n- 📱 [PhoneTrack](https://dawarich.app/docs/tutorials/track-your-location#phonetrack)\n- 🏡 [Home Assistant](https://dawarich.app/docs/tutorials/track-your-location#home-assistant)\n\nSimply install one of the supported apps on your device and configure it to send location updates to your Dawarich instance.\n\n---\n\n## How to Start Dawarich Locally\n\n1. Clone the repository.\n2. Run the following command to start the app:\n   ```bash\n   docker compose -f docker/docker-compose.yml up\n   ```\n3. Access the app at `http://localhost:3000`.\n\n**To stop the app**, press `Ctrl+C`.\n\nYou can use default values or create a `.env` file based on `.env.example` to customize your setup.\n\n---\n\n## How to Install Dawarich\n\n- **[Docker Setup](https://dawarich.app/docs/intro#setup-your-dawarich-instance)**\n- **[Synology](https://dawarich.app/docs/tutorials/platforms/synology)**\n\n**Default Credentials**\n- **Username**: `demo@dawarich.app`\n- **Password**: `password`\nFeel free to change them in the account settings.\n\n---\n\n## Features\n\n### Location Tracking\n- Track your live location using one of the [supported apps](#-supported-location-tracking).\n\n### Location History Visualization\n- View your historical data on a map with customizable layers:\n  - Heatmap\n  - Points\n  - Lines between points\n  - Fog of War\n\n### Family Sharing\n- Share your location with family members.\n- View locations of family members on the map (with their consent).\n- Each family member can enable or disable location sharing individually.\n\n### Areas\n- Draw areas on the map so Dawarich could suggest your visits there.\n\n### Visits (Beta)\n- Dawarich can suggest places you've visited and allow you to confirm or reject them.\n\n### Statistics\n- Analyze your travel history: number of countries/cities visited, distance traveled, and time spent, broken down by year and month.\n\n### Insights\n\n- Get insights about your location history, like \"Your most visited place is home, with 120 visits\", or \"You spent 30 days in Paris in 2024\".\n\n### Days in country\n\n- See how many days you've spent in each country. Useful for tax residency purposes or just to see where you spend most of your time.\n\n### Trips\n- Create a trip to visualize your travels between two points in time. You'll be able to see the route, distance, and time spent, and also add notes to your trip. If you have Immich or Photoprism integration, you'll also be able to see photos from your trips!\n\n### Integrations\n- Provide credentials for Immich or Photoprism (or both!) and Dawarich will automatically import geodata from your photos.\n- You'll also be able to visualize your photos on the map!\n\n### Import Your Data\n- Import from various sources:\n  - Google Maps Timeline\n  - OwnTracks\n  - Strava\n  - Immich\n  - GPX/GeoJSON files\n  - Photos’ EXIF data\n\n### Export Your Data\n- Export your data to GeoJSON or GPX formats.\n\n---\n\n## 📚 Guides and Tutorials\n\n- [Set up Reverse Proxy](https://dawarich.app/docs/tutorials/reverse-proxy)\n- [Import Google Takeout](https://dawarich.app/docs/tutorials/import-existing-data#sources-of-data)\n- [Track Location with Overland](https://dawarich.app/docs/tutorials/track-your-location#overland)\n- [Track Location with OwnTracks](https://dawarich.app/docs/tutorials/track-your-location#owntracks)\n- [Export Your Data](https://dawarich.app/docs/tutorials/export-your-data)\n\nMore guides available in the [Docs](https://dawarich.app/docs/intro).\n\n---\n\n## Environment Variables\n\nCheck the documentation on the [website](https://dawarich.app/docs/environment-variables-and-settings) for detailed information about environment variables and settings.\n\n---\n\n## Star History\n\nAs you could probably guess, I like statistics.\n\n<a href=\"https://star-history.com/#Freika/dawarich&Date\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=Freika/dawarich&type=Date&theme=dark\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=Freika/dawarich&type=Date\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/svg?repos=Freika/dawarich&type=Date\" />\n </picture>\n</a>\n","summary":" Dawarich is a self-hostable web application designed as a privacy-focused alternative to Google Timeline, enabling users to track, visualize, and maintain full ownership of their location history. The platform supports importing data from various sources including Google Maps, OwnTracks, and GPX files, while offering interactive map visualizations, trip analysis, family location sharing, and statistics on travel patterns. It integrates with photo management tools like Immich and Photoprism and supports real-time tracking through multiple companion apps for iOS, Android, and other platforms. This solution is ideal for privacy-conscious individuals and families seeking to self-host their location data without relying on third-party cloud services.","description":"Your favorite self-hostable alternative to Google Timeline (Google Location History)","stars":8726,"language":"Ruby"},{"owner":"super-productivity","repo":"super-productivity","url":"https://github.com/super-productivity/super-productivity","readme":"<a href=\"https://super-productivity.com/\"><img alt=\"Banner\" src=\"docs/screens/banner.png\"/></a>\n\n< 4cae-8ba3-4474-bc2c-13e7765c2dd1\" alt=\"animated\"/></a>\n</p>\n\n## :computer: Downloads & Install\n<p align=\"center\">\n  <a href='https://flathub.org/apps/com.super_productivity.SuperProductivity' target=\"_blank\"> <img alt='Get it on Flathub'src='https://flathub.org/api/badge?locale=en' height=\"30\"/></a>\n  <a href=\"https://snapcraft.io/superproductivity\" target=\"_blank\"><img alt=\"Get it from the Snap Store\" src=\"https://snapcraft.io/static/images/badges/en/snap-store-black.svg\" height=\"30\"/></a>\n  <a href='//www.microsoft.com/store/apps/9NHFVG8361TW?cid=storebadge&ocid=badge' target=\"_blank\"><img src='https://developer.microsoft.com/store/badges/images/English_get-it-from-MS.png' alt='English badge' height=\"30\"/></a>\n  <a href='//play.google.com/store/apps/details?id=com.superproductivity.superproductivity' target=\"_blank\"><img src='docs/screens/google-play-badge.svg' alt='Play Store Badge' height=\"30\"/></a>\n  <a href='//f-droid.org/en/packages/com.superproductivity.superproductivity' target=\"_blank\"><img src='https://f-droid.org/assets/fdroid-logo-text_S0MUfk_FsnAYL7n2MQye-34IoSNm6QM6xYjDnMqkufo=.svg' alt='F-Droid Badge' height=\"30\"/></a>\n  <a href='http://apps.obtainium.imranr.dev/redirect.html?r=obtainium://add/https://github.com/super-productivity/super-productivity/releases'><img src='https://raw.githubusercontent.com/ImranR98/Obtainium/main/assets/graphics/badge_obtainium.png' alt='Obtanium Badge' height=\"30\"/></a>\n  <a href='//apps.apple.com/app/super-productivity/id1482572463?l=en' target=\"_blank\"><img src='docs/screens/app-store-badge.svg' alt='App Store Badge' height=\"30\"/></a>\n</p>\n\n<p align=\"center\">\n  <strong>For all current downloads, package links, and platform-specific notes:\n  <a href=\"https://github.com/super-productivity/super-productivity/wiki/2.01-Downloads-and-Install\" target=\"_blank\">\n    check the wiki</strong>.<br/>\n    <img\n      src=\"docs/screens/get-it-on-github.webp\"\n      alt=\"Get it on GitHub\"\n      height=\"120\"\n    />\n  </a>\n</p>\n\n<hr>\n<div style=\"height:20px;\"></div>\n\n<p align=\"center\">\n  <a href=\"https://bank.gov.ua/en/news/all/natsionalniy-bank-vidkriv-rahunok-dlya-gumanitarnoyi-dopomogi-ukrayintsyam-postrajdalim-vid-rosiyskoyi-agresiyi\" target=\"_blank\">\n    <img\n      src=\"https://upload.wikimedia.org/wikipedia/commons/4/49/Flag_of_Ukraine.svg\"\n      alt=\"Ukraine Flag\"\n      height=\"120\"\n    /><br/>\n    <strong>Humanitarian Aid for Ukraine</strong><br/>\n    Support humanitarian relief via the official National Bank of Ukraine account.\n  </a>\n</p>\n\n<hr>\n\n## :heavy_check_mark: Features\n\n- **Keep organized and focused!** Plan and categorize your tasks using sub-tasks, projects and tags and color code them as needed.\n- Use **timeboxing** and **track your time**. Create time sheets and work summaries in a breeze to easily export them to your company's time tracking system.\n- Helps you to **establish healthy & productive habits**:\n  - A **break reminder** reminds you when it's time to step away.\n  - The **anti-procrastination feature** helps you gain perspective when you really need to.\n  - Need some extra focus? A **Pomodoro timer** is also always at hand.\n  - **Collect personal metrics** to see, which of your work routines need adjustments.\n- Integrate with **Jira**, **Trello**, **GitHub**, **GitLab**, **Gitea**, **OpenProject**, **Linear**, **ClickUp** and **Azure DevOps**. Auto import tasks assigned to you, plan the details locally, automatically create work logs, and get notified immediately, when something changes.\n- Basic **CalDAV** integration.\n- Back up and synchronize your data across multiple devices with **Dropbox** and **WebDAV** support\n- Attach context information to tasks and projects. Create **notes**, attach **files** or create **project-level bookmarks** for links, files, and even commands.\n- Super Productivity **respects your privacy** and **does NOT collect any data** and there are no user accounts or registration. **You decide where you store your data!**\n- It's **free** and **open source** and always will be.\n\nAnd much more!\n\n<a href=\"https://youtu.be/_mvMXWLsL-8\"><img alt=\"Work View with global links\" src=\"docs/screens/screen_standard.png\" width=\"100%\"></a>\n\n## :book: Documentation\n\nFull guides and reference material live in the **[wiki](https://github.com/super-productivity/super-productivity/wiki)**. Quick links: [First steps](https://github.com/super-productivity/super-productivity/wiki/1.01-First-Steps), [Reference index](https://github.com/super-productivity/super-productivity/wiki/3.00-Reference), [How-To index](https://github.com/super-productivity/super-productivity/wiki/2.00-How_To).\n\n## :question: How to use it\n\nIf you need some help, [this article on dev.to is the best place to start](https://dev.to/johannesjo/getting-started-with-super-productivity-2791).\n\nIf you prefer, there is also a (long) [YouTube video available](https://www.youtube.com/watch?v=VoF2_RSdNXA).\n\nThere is another [article](https://dev.to/johannesjo/the-prioritising-scheme-how-to-eat-the-frog-with-super-productivity-mlk) on how I implement the 'eat the frog' prioritizing scheme in the app.\n\n[If you have further questions, please refer to the discussions page](https://github.com/super-productivity/super-productivity/discussions).\n\nFor a structured walkthrough (web app, install, next steps), see **[First steps (wiki)](https://github.com/super-productivity/super-productivity/wiki/1.01-First-Steps)**.\n\n**Keyboard shortcuts** and **short-syntax** for new tasks are maintained in the wiki: **[Keyboard shortcuts](https://github.com/super-productivity/super-productivity/wiki/3.03-Keyboard-Shortcuts)**, **[Short syntax](https://github.com/super-productivity/super-productivity/wiki/3.04-Short-Syntax)**.\n\n## :globe_with_meridians: Web Version\n\nCheck out the web version even though it is a bit limited: Time tracking only works if the app is open and for idle time tracking to work, the chrome extension must be installed.\n\nIf you want the Jira integration and idle time tracking to work, you also have to download and install the [Super Productivity Chrome Extension](https://chrome.google.com/webstore/detail/super-productivity/ljkbjodfmekklcoibdnhahlaalhihmlb).\n\nMore detail: **[Web app vs desktop (wiki)](https://github.com/super-productivity/super-productivity/wiki/3.05-Web-App-vs-Desktop)**.\n\n## Community\n\nThe development of Super Productivity is driven by a wonderful community of users and contributors. Thank you all so much for your support!\n\n<p>\n  :eyes:\n  <a href='https://github.com/super-productivity/awesome-super-productivity'>\n    Check out our awesome curated list of community-created resources about Super Productivity\n  </a>\n</p>\n\n### :hearts: Contributing\n\nIf you want to get involved, please check out the [CONTRIBUTING.md](CONTRIBUTING.md)\n\nThere are several ways to help.\n\n1. **Spread the word:** More users mean more people testing and contributing to the app which in turn means better stability and possibly more and better features. You can vote for Super Productivity on [Slant](https://www.slant.co/topics/14021/viewpoints/7/~productivity-tools-for-linux~super-productivity), [Product Hunt](https://www.producthunt.com/posts/super-productivity), [Softpedia](https://www.softpedia.com/get/Office-tools/Diary-Organizers-Calendar/Super-Productivity.shtml) or on [AlternativeTo](https://alternativeto.net/software/super-productivity/), you can [tweet about it](https://twitter.com/intent/tweet?text=I%20like%20Super%20Productivity%20%20https%3A%2F%2Fsuper-productivity.com), share it on [LinkedIn](http://www.linkedin.com/shareArticle?mini=true&url=https://super-productivity.com&title=I%20like%20Super%20Productivity&), [reddit](http://www.reddit.com/submit?url=https%3A%2F%2Fsuper-productivity.com&title=I%20like%20Super%20Productivity) or any of your favorite social media platforms. Every little bit helps!\n\n2. **Provide a Pull Request:** Here is a list of [the most popular community requests](https://github.com/super-productivity/super-productivity/issues?q=is%3Aissue+is%3Aopen+sort%3Areactions-%2B1-desc) and here some info on **[how to run the development build](https://github.com/super-productivity/super-productivity/wiki/2.11-Run-the-Development-Server)** (wiki).\n   Please make sure that you're following the [commit message format](.github/CONTRIBUTING.md#commit-message-format) and to also include the issue number in your commit message, if you're fixing a particular issue (e.g.: `feat: add nice feature #31`).\n\n3. **[Answer questions](https://github.com/super-productivity/super-productivity/discussions)**: You know the answer to another user's problem? Share your knowledge!\n\n4. **[Provide your opinion](https://github.com/super-productivity/super-productivity/issues?q=is%3Aissue+is%3Aopen+sort%3Areactions-%2B1-desc+label%3A%22community+feedback+wanted%22):** Some community suggestions are controversial. Your input might be helpful and if it is just an up- or down-vote.\n\n5. **[Provide a more refined UI spec for existing feature requests](https://github.com/super-productivity/super-productivity/issues?q=is%3Aissue+is%3Aopen+label%3A%22needs+concept+and%2For+ui+spec%22)**\n\n6. **[Report bugs](https://github.com/super-productivity/super-productivity/issues/new)**\n\n7. **[Make a feature or improvement request](https://github.com/super-productivity/super-productivity/issues/new)**: Something can be done better? Something essential missing? Let us know!\n\n8. **[Translations](https://github.com/super-productivity/super-productivity/tree/master/src/assets/i18n), Icons, etc.**: You don't have to be a programmer to help. Many of the translations could use some love. Guide: **[Contribute translations (wiki)](https://github.com/super-productivity/super-productivity/wiki/2.18-Contribute-Translations)**.\n\n[//]: # '[![inlang status badge](https://badge.inlang.com/?url=github.com/super-productivity/super-productivity)](https://fink.inlang.com/github.com/super-productivity/super-productivity?ref=badge)'\n[//]: #\n[//]: # 'You can use the Fink Localization Editor to edit, lint, and add translations for different languages. [Contribute via fink Guide](https://inlang.com/g/6ddyhpoi).'\n\n9. **[Sponsor the project](https://github.com/sponsors/johannesjo)**\n\n10. **[Create custom plugins](docs/plugin-development.md)**: Extend Super Productivity with your own features and integrations by developing custom plugins. Overview: **[Develop a plugin (wiki)](https://github.com/super-productivity/super-productivity/wiki/2.15-Develop-a-Plugin)**.\n\n### Special Thanks to our Sponsors!!!\n\nRecently support for Super Productivity has been growing! A big thank you to all our sponsors, especially the ones below!\n\n- <p>\n      Agentic AI Quality Engineering via:&nbsp;\n      <a href=\"https://www.testmuai.com/?utm_medium=sponsor&utm_source=superproductivity\" target=\"_blank\">\n        <picture>\n            <source srcset=\"https://super-productivity.com/_astro/test-mu-log-dark.Dy0yXuJ7.svg\" media=\"(prefers-color-scheme: dark)\" />\n            <img src=\"https://super-productivity.com/_astro/test-mu-log-light.CehEzLCt.svg\" style=\"vertical-align: middle;\" width=\"150\" height=\"30\" alt=\"TestMu AI\" />\n        </picture>\n      </a>\n  </p>\n\n_(If you are, intend to or have been a sponsor and want to be shown here, [please let me know](mailto:contact@super-productivity.com)!)_\n\n### Code Signing\n\nWindows binaries are signed. Free code signing is provided by [SignPath.io](https://signpath.io?utm_source=foundation&utm_medium=github&utm_campaign=super-productivity), certificate by [SignPath Foundation](https://signpath.org?utm_source=foundation&utm_medium=github&utm_campaign=super-productivity).\n\n## Running the development server\n\nSee the wiki: **[Run the development server](https://github.com/super-productivity/super-productivity/wiki/2.11-Run-the-Development-Server)**, **[Package the app](https://github.com/super-productivity/super-productivity/wiki/2.12-Package-the-App)**, **[Build for Android](https://github.com/super-productivity/super-productivity/wiki/2.14-Build-for-Android)**.\n\n## Run as Docker Container\n\nSee the wiki: **[Run with Docker (wiki)](https://github.com/super-productivity/super-productivity/wiki/2.13-Run-with-Docker)**.\n\n## Custom themes (desktop only)\n\nSee the wiki: **[Theming (wiki)](https://github.com/super-productivity/super-productivity/wiki/3.09-Theming)**, **[User data (wiki)](https://github.com/super-productivity/super-productivity/wiki/3.06-User-Data)**.\n\n## Custom WebDAV Syncing\n\nSee the wiki: **[User data (wiki)](https://github.com/super-productivity/super-productivity/wiki/3.06-User-Data)**, **[Managing your data (wiki)](https://github.com/super-productivity/super-productivity/wiki/4.23-Managing-Your-Data)**.\n\n## Automatic Backups\n\nSee the wiki: **[User data (wiki)](https://github.com/super-productivity/super-productivity/wiki/3.06-User-Data)**, **[Restore data from backup (wiki)](https://github.com/super-productivity/super-productivity/wiki/2.02-Restore-Data-From-Backup)**.\n\n## User Data Folder\n\nSee the wiki: **[User data (wiki)](https://github.com/super-productivity/super-productivity/wiki/3.06-User-Data)**, **[Other (wiki)](https://github.com/super-productivity/super-productivity/wiki/3.99-Other)**.\n","summary":" Super Productivity is an advanced, open-source todo list application that combines task management with timeboxing and time tracking capabilities. It integrates with external services such as Jira, GitHub, and calendar applications to import and synchronize tasks across workflows. Available as a web application and on desktop and mobile platforms, it caters to professionals who need sophisticated productivity tools. The app is especially beneficial for developers and project managers seeking to track time spent on specific tasks while maintaining connectivity with their existing project ecosystems.","description":"Super Productivity is an advanced todo list app with integrated Timeboxing and time tracking capabilities. It also comes with integrations for Jira, GitLab, GitHub and Open Project.","stars":18738,"language":"TypeScript"},{"owner":"stirling-image","repo":"stirling-image","url":"https://github.com/stirling-image/stirling-image","readme":"<p align=\"center\">\n  <img src=\"social-preview.png\" width=\"800\" alt=\"ashim — A Self Hosted Image Manipulator\">\n</p>\n\n<p align=\"center\">\n  <a href=\"https://hub.docker.com/r/ashimhq/ashim\"><img src=\"https://img.shields.io/docker/v/ashimhq/ashim?label=Docker%20Hub&logo=docker\" alt=\"Docker Hub\"></a>\n  <a href=\"https://github.com/orgs/ashim-hq/packages/container/package/ashim\"><img src=\"https://img.shields.io/badge/GHCR-ghcr.io%2Fashim--hq%2Fashim-blue?logo=github\" alt=\"GHCR\"></a>\n  <a href=\"https://github.com/ashim-hq/ashim/actions\"><img src=\"https://img.shields.io/github/actions/workflow/status/ashim-hq/ashim/ci.yml?label=CI\" alt=\"CI\"></a>\n  <a href=\"https://github.com/ashim-hq/ashim/blob/main/LICENSE\"><img src=\"https://img.shields.io/badge/License-AGPLv3-blue\" alt=\"License\"></a>\n  <a href=\"https://github.com/ashim-hq/ashim/stargazers\"><img src=\"https://img.shields.io/github/stars/ashim-hq/ashim?style=social\" alt=\"Stars\"></a>\n</p>\n\n![ashim - Dashboard](images/dashboard.png)\n\n## Key Features\n\n- **45+ image tools** - Resize, crop, compress, convert, watermark, color adjust, vectorize, create GIFs, find duplicates, generate passport photos, and more\n- **Local AI** - Remove backgrounds, upscale images, restore and colorize old photos, erase objects, blur faces, enhance faces, extract text (OCR). All on your hardware - no internet required\n- **Pipelines** - Chain tools into reusable workflows. Batch process up to 200 images at once\n- **REST API** - Every tool available via API with API key auth. Interactive docs at `/api/docs`\n- **Single container** - One `docker run`, no Redis, no Postgres, no external services\n- **Multi-arch** - Runs on AMD64 and ARM64 (Intel, Apple Silicon, Raspberry Pi)\n- **Your data stays yours** - No telemetry, no tracking, no external calls. Images never leave your machine\n\n## Quick Start\n\n```bash\ndocker run -d --name ashim -p 1349:1349 -v ashim-data:/data ghcr.io/ashim-hq/ashim:latest\n```\nOpen http://localhost:1349 in your browser.\n\n<details>\n<summary><sub>Have an NVIDIA GPU? Click here for GPU acceleration.</sub></summary>\n<br>\n\nAdd `--gpus all` for GPU-accelerated background removal, upscaling, and OCR:\n\n```bash\ndocker run -d --name ashim -p 1349:1349 --gpus all -v ashim-data:/data ghcr.io/ashim-hq/ashim:latest\n```\n\n> Requires an NVIDIA GPU and [Container Toolkit](https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/latest/install-guide.html). Falls back to CPU if no GPU is found. See [Docker Tags](https://ashim-hq.github.io/ashim/guide/docker-tags) for benchmarks and Docker Compose examples.\n\n</details>\n\n**Default credentials:**\n\n| Field    | Value   |\n|----------|---------|\n| Username | `admin` |\n| Password | `admin` |\n\nYou will be asked to change your password on first login.\n\nFor Docker Compose, persistent storage, and other setup options, see the [Getting Started Guide](https://ashim-hq.github.io/ashim/guide/getting-started). For GPU acceleration and tag details, see [Docker Tags](https://ashim-hq.github.io/ashim/guide/docker-tags).\n\n## Documentation\n\n- [Getting Started](https://ashim-hq.github.io/ashim/guide/getting-started)\n- [Configuration](https://ashim-hq.github.io/ashim/guide/configuration)\n- [REST API](https://ashim-hq.github.io/ashim/api/rest)\n- [Architecture](https://ashim-hq.github.io/ashim/guide/architecture)\n- [Developer Guide](https://ashim-hq.github.io/ashim/guide/developer)\n- [Translation Guide](https://ashim-hq.github.io/ashim/guide/translations)\n\n## Feedback\n\nFound a bug or have a feature idea? Open a [GitHub Issue](https://github.com/ashim-hq/ashim/issues). We don't accept pull requests, but your feedback directly shapes the project. See [CONTRIBUTING.md](CONTRIBUTING.md) for details.\n\n<!-- TODO: Add sponsorship links once Ko-fi and GitHub Sponsors are set up -->\n\n## License\n\nThis project is dual-licensed under the [AGPLv3](LICENSE) and a commercial license.\n\n- **AGPLv3 (free):** You may use, modify, and distribute this software under the AGPLv3. If you run a modified version as a network service, you must make your source code available under the AGPLv3. This applies to personal use, open-source projects, and any use that complies with AGPLv3 terms.\n- **Commercial license (paid):** For use in proprietary software or SaaS products where AGPLv3 source-disclosure is not suitable, a commercial license is available. [Contact us](mailto:ashim.hq@gmail.com) for pricing and terms.\n","summary":" ashim is a self-hosted, all-in-one image manipulation platform that provides over 45 editing tools and local AI capabilities—including background removal, upscaling, and OCR—without requiring internet connectivity or external services. It offers both a web interface and a comprehensive REST API with API key authentication, allowing users to chain operations into reusable pipelines and batch process up to 200 images simultaneously. Deployed as a single Docker container with no external dependencies like Redis or PostgreSQL, it supports both AMD64 and ARM64 architectures and ensures complete data privacy by processing everything locally. This makes it ideal for privacy-conscious individuals, developers building image-processing workflows, and organizations needing secure, self-managed media manipulation infrastructure.","description":"A Self Hosted Image Manipulator - 45+ tools, local AI, and pipelines in a single Docker container. No cloud, no telemetry. Your images never leave your machine. ","stars":828,"language":"TypeScript"},{"owner":"xaspx","repo":"hermes-control-interface","url":"https://github.com/xaspx/hermes-control-interface","readme":"# Hermes Control Interface\n\nA self-hosted web dashboard for the [Hermes AI agent](https://github.com/NousResearch/hermes-agent) stack. Manage terminals, files, sessions, cron jobs, token analytics, multi-agent gateways, and team access — all behind a password gate.\n\n**Stack:** Vanilla JS + Vite · Node.js · Express · WebSocket · xterm.js\n**Version:** 3.4.0\n\n---\n\n## Highlights\n\n> **Chat via Gateway API** — Real-time streaming, tool call cards with JSON viewer, session resume, stop button, multi-profile support. Auto-fallback to CLI.\n\n> **RBAC v2** — 28 permissions across 12 groups. Admin, viewer, or custom roles per user.\n\n> **Multi-Agent Gateway** — Start/stop/configure multiple Hermes profiles. Real-time logs. Systemd service management.\n\n> **Token Analytics** — Track sessions, messages, tokens, cost by model, platform, and time range.\n\n> **Security Hardened** — Command injection fixes, CSRF on 21 endpoints, dynamic CORS, security audit report (18 findings addressed).\n\n---\n\n## Screenshots\n\n### Navigation — 8 Pages\n\n**Home · Agents · Usage · Skills · Chat · Logs · Maintenance · Files**\n\n### Dark Mode\n\n| Home | Agents |\n|------|--------|\n| ![Home](docs/screenshots/dark/01-home.png) | ![Agents](docs/screenshots/dark/02-agents.png) |\n\n| Chat | Usage & Analytics |\n|------|------------------|\n| ![Chat](docs/screenshots/dark/chat.png) | ![Usage](docs/screenshots/dark/03-usage.png) |\n\n| Skills Hub | Maintenance |\n|------------|-------------|\n| ![Skills](docs/screenshots/dark/04-skills.png) | ![Maintenance](docs/screenshots/dark/05-maintenance.png) |\n\n| File Explorer | Agent Dashboard |\n|---------------|----------------|\n| ![Files](docs/screenshots/dark/06-files.png) | ![Dashboard](docs/screenshots/dark/07-agent-dashboard.png) |\n\n| Agent Gateway | Agent Sessions |\n|---------------|----------------|\n| ![Gateway](docs/screenshots/dark/09-agent-gateway.png) | ![Sessions](docs/screenshots/dark/08-agent-sessions.png) |\n\n| Agent Config | Agent Memory |\n|---------------|--------------|\n| ![Config](docs/screenshots/dark/10-agent-config.png) | ![Memory](docs/screenshots/dark/11-agent-memory.png) |\n\n| Agent Skills | Agent Cron |\n|--------------|------------|\n| ![Skills](docs/screenshots/dark/12-agent-skills.png) | ![Cron](docs/screenshots/dark/13-agent-cron.png) |\n\n### Light Mode\n\n| Home | Agents | Skills Hub |\n|------|--------|------------|\n| ![Home](docs/screenshots/light/01-home.png) | ![Agents](docs/screenshots/light/02-agents.png) | ![Skills](docs/screenshots/light/04-skills.png) |\n\n| Gateway | Memory |\n|---------|--------|\n| ![Gateway](docs/screenshots/light/09-agent-gateway.png) | ![Memory](docs/screenshots/light/11-agent-memory.png) |\n\n---\n\n## Features\n\n### 🔐 Authentication\n\n- Single password login (configurable via `HERMES_CONTROL_PASSWORD`)\n- bcrypt password hashing (cost factor 10)\n- CSRF tokens on all mutating requests\n- Conditional Secure cookie flag (auto-detects HTTPS)\n- Rate limiting: 5 failed logins per 15 minutes per IP\n- Multi-user support with role-based access control (RBAC)\n\n---\n\n### 🏠 Home Dashboard\n\nSystem overview at a glance:\n- **System Health**: CPU usage, RAM usage, Disk usage, Uptime\n- **Agent Overview**: active model, provider, gateway status, configured API keys, active platforms\n- **Gateway Status**: per-profile running/stopped indicators\n- **Token Usage (7d)**: sessions count, messages, total tokens, estimated cost, models used, platforms breakdown, top tools\n\n---\n\n### 🤖 Agents — Multi-Agent Management\n\nManage all Hermes profiles from one place:\n- List all profiles with status badge (running/stopped) and active model\n- Create new profile\n- Clone existing profile\n- Delete profile\n- Set default profile\n- Start/Stop/Restart gateway per profile\n- Quick gateway log viewer\n\n---\n\n### 💬 Chat — Revamped Interface\n\nThe chat interface got a full overhaul in v3.3.0:\n\n**Tool Call Cards**\n- Each tool call displayed as a collapsible card\n- Shows tool name, status (running/success/error), and execution time\n- Expand to see full JSON input/output\n- Collapsed by default for clean output\n\n**Session Sidebar**\n- List of past chat sessions with timestamps\n- Resume any session with one click\n- New chat button for fresh session\n- Shows active model tag\n\n**Clean Output**\n- Banner suppression (`-Q` flag) for noise-free responses\n- Auto-detects both new (`session_id:`) and legacy (`Session:`) session ID formats\n- `--continue \"\"` (empty) creates new session\n- Bare `--continue` resumes last session\n\n**Session Management**\n- Rename sessions\n- Delete sessions\n- Export session transcript\n\n---\n\n### 📊 Usage & Analytics — Token Insights\n\nFull breakdown of LLM usage:\n- **Time Range**: Today, 7d, 30d, 90d filters\n- **Agent Filter**: per-profile or all combined\n- **Overview Cards**: total sessions, messages, tokens, cost, active hours\n- **Models Table**: per-model breakdown — sessions count, total tokens, avg tokens/session\n- **Platforms Table**: per-platform breakdown (CLI, Telegram, WhatsApp, etc.)\n- **Top Tools**: most called tools with call counts and success rates\n\n---\n\n### 🛠️ Agent Detail — Per-Agent Management\n\nSix-tab interface for deep agent configuration:\n\n#### Dashboard Tab\n- Agent identity: name, model, provider\n- Gateway service status\n- Quick token usage summary\n- Active platforms\n\n#### Sessions Tab\n- List all sessions for this profile\n- Search by keyword\n- Rename session\n- Delete session\n- Export session (JSON format)\n- Resume session in CLI (one click)\n\n#### Gateway Tab\n- Start/Stop/Restart gateway service\n- Real-time log stream (WebSocket)\n- Systemd service management (for non-root users: `hermes-gateway-<profile>`)\n- Gateway configuration panel\n\n#### Config Tab\n- 13 categories, 80+ settings\n- Structured form editor with labeled fields\n- Raw YAML editor toggle\n- Reset to defaults per category\n- Apply changes with validation\n\n#### Memory Tab\n- Dynamic memory provider panel\n- Provider options: Built-in MEMORY.md, Honcho (self-hosted), External providers\n- Honcho status: connected/disconnected\n- Memory usage stats\n\n#### Cron Tab\n- List all scheduled jobs for this profile\n- Create new cron job with schedule presets (hourly, daily, weekly, custom cron expression)\n- Pause/Resume scheduled jobs\n- Run job immediately (on-demand)\n- Edit/Delete cron jobs\n- Next run time display\n\n---\n\n### 📦 Skills Marketplace\n\nBrowse and manage installed Hermes skills:\n- Grouped by category (devops, mlops, creative, etc.)\n- Shows skill name, description snippet, source (builtin/local), trust level\n- Search and filter skills\n- Install new skills from the Hermes skills registry\n- Check for updates\n- Uninstall skills\n\n---\n\n### 🔧 Maintenance — System Administration\n\nFull admin panel:\n- **Doctor**: Run diagnostics — detects common issues, auto-fix where possible\n- **Dump**: Generate debug summary (system info, config, recent logs)\n- **Update**: Update Hermes agent to latest version\n- **Backup**: Download all Hermes data as a zip file\n- **Import**: Restore from backup zip\n- **HCI Restart**: Restart the Control Interface web server from UI (no SSH needed)\n- **Users** (NEW in v3.3.0): Create/edit/delete users, assign roles, manage permissions\n- **Auth**: View provider status (OpenRouter, Nous Portal, etc.), add/remove API keys\n- **Audit**: Timestampped activity log — who did what and when\n\n---\n\n### 📁 File Explorer\n\nSplit-view file editor:\n- **Left panel**: Directory tree browser\n- **Right panel**: Text editor with syntax highlighting\n- **Save**: Write changes back to disk\n- **Secure**: Paths scoped to `~/.hermes`, traversal attacks prevented\n- **Multiple roots**: Configurable via `HERMES_CONTROL_ROOTS`\n\n---\n\n### 💻 Terminal\n\nReal browser-based terminal:\n- Full PTY via node-pty + xterm.js over WebSocket\n- Touch-friendly controls (↑↓␣↵) for mobile\n- Fullscreen toggle\n- Auto-cleanup flow: Ctrl+C → clear → ready for next command\n- Rate limited: 30 commands/minute per IP\n\n---\n\n### 🔔 Notifications\n\n- Bell icon with unread count badge (top-right)\n- Dropdown panel with notification list\n- Dismiss individual or clear all\n- Sources: system alerts (disk/RAM/CPU), gateway events, session CRUD, user management\n- Persistent: stored in `~/.hermes/hci-notifications.json`\n\n---\n\n### 🎨 Theme\n\n- **Dark mode** (default): `#0b201f` background, `#dccbb5` foreground, `#7c945c` accent\n- **Light mode**: `#e4ebdf` background, `#0b201f` foreground, `#2e6fb0` accent\n- Toggle via header button\n- Preference persisted in localStorage\n- Login page: themed background image with overlay\n\n---\n\n### 🔒 Security\n\n- **Multi-user RBAC**: 28 permissions across 12 groups\n- **Roles**: `admin` (full access), `viewer` (read-only), `custom` (your choice)\n- **bcrypt** password hashing (cost factor 10)\n- **CSRF tokens** on all mutating requests\n- **Secure cookie** flag (auto-detects HTTPS)\n- **WebSocket origin** verification (exact match)\n- **Input sanitization**: strict regex on all user inputs (profiles, sessions, titles, filenames)\n- **Path traversal prevention** in file explorer\n- **Rate limiting**: login (5 failed/15min), terminal exec (30/min)\n- **XSS protection**: all dynamic values escaped in rendered HTML\n- **Admin gate**: critical endpoints (`/api/plugins`, etc.) require admin role\n- **Token cleanup**: automatic session token cleanup every 15 minutes\n- **Unhandled exception handlers**: `unhandledRejection` + `uncaughtException` caught and logged\n\nSee full security audit: [docs/SECURITY_AUDIT.md](docs/SECURITY_AUDIT.md)\n\n---\n\n## Where HCI Can Be Installed\n\nHCI runs as a single Node.js process — any server environment that supports Node.js works.\n\n| Environment | Status | Notes |\n|---|---|---|\n| Local Linux server | ✅ | Full support |\n| VPS (DigitalOcean, Hetzner, AWS EC2, Linode, etc.) | ✅ | Recommended for production |\n| macOS | ✅ | Works |\n| WSL2 (Windows Subsystem for Linux) | ✅ | Full support |\n| Raspberry Pi (arm64) | ✅ | Works |\n| Docker / Podman | ⚠️ | Works but not officially supported |\n| Shared hosting | ❌ | Requires Node.js + WebSocket + PTY support |\n| Browser-only (no server) | ❌ | Requires Node.js backend |\n\n---\n\n## Requirements\n\n| Requirement | Minimum | Recommended |\n|---|---|---|\n| Node.js | v18+ | v20 LTS |\n| RAM | 512 MB | 1 GB+ |\n| Disk | 200 MB | 500 MB+ |\n| OS | Linux / macOS / WSL2 | Ubuntu 22.04 LTS |\n| Hermes Agent | v0.3.x | Latest |\n| Build tools | python3, make, g++ | For node-pty native module |\n\n**Dependencies** (installed via `npm install`):\n- `express` — HTTP server\n- `ws` — WebSocket\n- `node-pty` — PTY support (requires build tools)\n- `xterm.js` — Terminal emulator in browser\n- `bcrypt` — Password hashing\n- `cookie-parser`, `dotenv`, `js-yaml`, etc.\n\n---\n\n## Installation Methods\n\n### Manual (Recommended)\n\n```bash\n# 1. Clone\ngit clone https://github.com/xaspx/hermes-control-interface.git\ncd hermes-control-interface\n\n# 2. Install dependencies\nnpm install\n\n# 3. Configure\ncp .env.example .env\n# Edit .env and set:\n#   HERMES_CONTROL_PASSWORD=your-secure-password\n#   HERMES_CONTROL_SECRET=$(openssl rand -hex 32)\n\n# 4. Build frontend\nnpm run build\n\n# 5. Start\nnpm start\n```\n\nAccess at `http://localhost:10272` (default PORT).\n\n### Systemd Service (Production)\n\n```bash\n# Use the provided gateway service script as reference\nbash scripts/setup-gateway-service.sh\n```\n\nOr create a simple systemd unit:\n\n```ini\n# /etc/systemd/system/hermes-control.service\n[Unit]\nDescription=Hermes Control Interface\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/path/to/hermes-control-interface\nExecStart=/usr/bin/node server.js\nRestart=always\n\n[Install]\nWantedBy=multi-user.target\n```\n\n```bash\nsudo systemctl enable hermes-control\nsudo systemctl start hermes-control\n```\n\n---\n\n\n## Environment Variables\n\n| Variable | Required | Description |\n|---|---|---|\n| `HERMES_CONTROL_PASSWORD` | Yes | Login password |\n| `HERMES_CONTROL_SECRET` | Yes | CSRF + internal auth secret |\n| `PORT` | No | Server port (default: 10272) |\n| `HERMES_CONTROL_HOME` | No | Hermes home dir (default: ~/.hermes) |\n| `HERMES_CONTROL_ROOTS` | No | File explorer roots (JSON array) |\n| `HERMES_PROJECTS_ROOT` | No | Projects directory |\n\n---\n\n## Reset Password Without Dashboard Access\n\nIf you can't log in to the dashboard, reset the password via CLI:\n\n**Option 1 — Edit .env directly**\n```bash\n# SSH into your server\nnano ~/.hermes/.env\n# Change HERMES_CONTROL_PASSWORD=your-new-password\n\n# Restart\nsudo systemctl restart hermes-control\n# or: pkill node; npm start &\n```\n\n**Option 2 — Generate bcrypt hash via Node.js**\n```bash\nnode -e \"const bcrypt=require('bcrypt'); bcrypt.hash(require('crypto').randomBytes(24).toString('hex'), 10).then(h=>console.log('HERMES_CONTROL_PASSWORD='+h))\"\n# Copy the output to .env, then restart\n```\n\n**Key point:** `.env` is the source of truth. Dashboard access = server access. If you lose access to both, you must have server/SSH access to reset.\n\n---\n\n## Architecture\n\n```\nsrc/                    # Vite source (ES modules)\n├── index.html          # Entry point\n├── js/main.js          # App logic (~4800 lines, modular sections)\n├── css/\n│   ├── theme.css       # Color palette (dark/light)\n│   ├── layout.css      # Topbar, modals, dropdowns, sidebar\n│   └── components.css  # Cards, tables, forms, editor, file explorer\n├── public/\n│   └── favicon.svg     # Served unhashed\n└── assets/             # SVG icons\n\ndist/                   # Vite build output (served by Express)\nserver.js               # Express + WebSocket + PTY + API (~2300 lines)\nauth.js                 # Multi-user auth + RBAC (bcrypt, sessions, permissions)\n```\n\n---\n\n## Development\n\n```bash\n# Edit source in src/\nnpx vite build\n\n# Restart (never in foreground — use detached)\nkill $(lsof -t -i:10272) 2>/dev/null\nnohup node server.js &>/dev/null & disown\n```\n\n---\n\n## API\n\n100+ endpoints covering:\n- **Auth**: login, logout, session management, setup\n- **Users**: CRUD, role assignment, permission management, reset password\n- **Sessions**: list, rename, delete, export, resume\n- **Profiles**: list, create, clone, delete, use, gateway control\n- **Chat**: send message, stream response, tool calls\n- **Cron**: list, create, pause, resume, run, remove\n- **Config**: read, write, YAML parsing, reset\n- **Memory**: provider-specific panels (MEMORY.md, honcho, external)\n- **Skills**: list, parse, search, install, uninstall, check updates\n- **Files**: list, read, write, save (scoped to Hermes home)\n- **System**: health, insights, usage analytics, doctor, dump, update, backup\n- **Notifications**: list, dismiss, clear\n- **Plugins**: admin-only plugin management\n- **Terminal**: exec command via PTY\n- **Audit**: activity log\n\nSee `docs/API.md` for full reference.\n\n---\n\n## Security Audit\n\nFull audit report: [docs/SECURITY_AUDIT.md](docs/SECURITY_AUDIT.md)\n**Score: 7.0/10** — Production-ready.\n\nIssues found and fixed in v3.3.0:\n- XSS in home cards (`loadHomeCards()`) — fixed with `escapeHtml()`\n- Missing admin gate on plugins API — fixed\n- Terminal exec rate limit — 30 commands/minute per IP\n- Token cleanup interval — now runs every 15 minutes\n\n---\n\n## Updating HCI\n\n```bash\n# 1. Pull latest code\ncd /root/projects/hermes-control-interface\ngit pull origin main\n\n# 2. Install dependencies (if package.json changed)\nnpm install\n\n# 3. Rebuild frontend\nnpm run build\n\n# 4. Restart production server\nkill $(lsof -t -i :10272) 2>/dev/null\nnohup node server.js &>/dev/null & disown\n```\n\nOr use the HCI UI: **Maintenance → HCI Restart** (restarts from browser).\n\n**Non-root users:** Replace `/root/projects` with your user's project directory.\nIf running via systemd, use `sudo systemctl restart hermes-control`.\n\n---\n\n## Changelog\n\n### v3.4.0 (2026-04-19)\n\n**⚡ Chat Revamp (CLI → Gateway API):**\n- **Gateway API chat:** Full rewrite from CLI subprocess to Gateway API (`/v1/responses`) — real-time SSE streaming, structured events, no more waiting for full response\n- **Tool call cards:** Collapsible cards with JSON viewer for tool results (collapsed by default)\n- **Session resume:** Auto via `X-Hermes-Session-Id` header — conversations persist across page reloads\n- **Stop button:** Cancel running streams mid-response\n- **Multi-profile support:** All profiles (default/soci/cuan/david) work via Gateway API with auto port discovery\n- **CLI fallback:** Automatic fallback to CLI if gateway is down\n- **Session list:** Sorted by last activity, filter by source type (Telegram/Discord/API/CLI/Cron)\n- **Mobile UX:** Auto-hide sidebar on session select, responsive header, opaque topbar\n\n**🔒 Security (CRITICAL + HIGH):**\n- **Command injection fixed:** Skills uninstall/update endpoints use `execHermes()` + strict regex `^[\\w.\\-]+$` validation\n- **CSRF protection:** 21 admin endpoints now require `requireCsrf` (user mgmt, config, keys, skills, HCI update/rollback/restart, backup, doctor, profiles)\n- **Gateway API key:** Dynamic from `~/.hermes/config.yaml` (removed hardcoded `'hci-gateway-2026'` from source)\n- **Dynamic CORS origins:** `cors_origins` no longer hardcoded — supports `HCI_CORS_ORIGINS` env var, auto-detect from request, or localhost defaults\n- **`escapeHtml()` fix:** Added `\"` and `'` escaping to prevent XSS via HTML attributes\n- **Debug CSRF logging removed:** Partial tokens no longer logged to console\n- **18-item security audit report** (SECURITY_AUDIT.md)\n\n**🧹 Maintenance:**\n- ~270 lines dead code removed (unused functions, duplicate endpoints, redundant imports, duplicate CSS)\n- Session cache invalidation after rename and delete operations\n\n**🔌 Open-Source Ready:**\n- CORS origins: dynamic resolution for any deployment (env var → auto-detect → localhost defaults)\n- Gateway API key: reads from config.yaml, env var override supported\n- `.env.example` updated with `GATEWAY_API_KEY` and `HCI_CORS_ORIGINS` documentation\n\n### v3.3.3 (2026-04-19)\n\n**🔒 Security (Critical + High):**\n- **Command injection fix:** Skills uninstall/update endpoints now use `execHermes()` + strict regex validation `^[\\w.\\-]+$` on skill names (prevents shell metacharacter injection)\n- **CSRF protection:** Added `requireCsrf` to 21 admin endpoints (user mgmt, config, keys, skills, HCI update/rollback/restart, backup, doctor, profile create/delete)\n- **Hardcoded API key removed:** Gateway API key now reads from `~/.hermes/config.yaml` dynamically (was hardcoded `'hci-gateway-2026'` in source)\n- **Dynamic CORS origins:** `cors_origins` no longer hardcoded to specific domains — supports `HCI_CORS_ORIGINS` env var, auto-detect from request origin, or localhost defaults\n- **Session rename:** Switched from `shell()` to `execHermes()` (defense-in-depth)\n\n**🧹 Maintenance:**\n- **Dead code cleanup:** ~270 lines removed across 6 files (unused functions, duplicate endpoints, redundant imports, duplicate CSS)\n- **18-item security audit report** added (SECURITY_AUDIT.md)\n\n**🐛 Bug Fixes:**\n- **Session list sorting:** Fixed sort order — backend now correctly sorts by last activity timestamp\n- **Delete session button:** Fixed operator precedence bug in `await showModal({...})?.action` that prevented delete API call\n- **Session list refresh:** Cache invalidated after rename and delete operations (stale 10s cache)\n- **Gateway session resume:** Gateway process restart fixed stale bytecode issue\n\n**🔌 Open-Source Ready:**\n- CORS origins: dynamic resolution (env var → auto-detect → localhost defaults)\n- Gateway API key: reads from config.yaml, env var override supported\n- `.env.example` updated with `GATEWAY_API_KEY` and `HCI_CORS_ORIGINS` docs\n\n### v3.3.2 (2026-04-17)\n\n**🐛 Bug Fixes:**\n- **HTTP-only deployments:** Disable `upgrade-insecure-requests` CSP directive that broke UI on Tailscale/LAN/dev environments\n- **HOST env var:** Support `HOST` env var for non-localhost server binding (Tailscale IP, LAN, specific interface)\n\n**🤝 Contributors:**\n- @hifiguy — 2 fixes (HOST env + CSP HTTP fix)\n\n### v3.3.0 (2026-04-17)\n\n**💬 Chat Revamp:**\n- Tool call cards: collapsible cards with JSON viewer, collapsed by default\n- Banner suppression: `-Q` flag passed to hermes for clean output\n- Session sidebar: model tag, session list, resume/new chat buttons\n- Auto-detect session ID format: new (`session_id: YYYYMMDD_HHMMSS_HEX`) and legacy (`Session: YYYYMMDD_HHMMSS_HEX`)\n- `--continue \"\"` (empty) creates fresh session; bare `--continue` resumes last session\n\n**👥 User Management v2 (RBAC):**\n- 28 permissions across 12 groups: Sessions, Chat, Logs, Usage, Gateway, Config, Secrets, Skills, Cron, Files, Terminal, Users, System\n- Built-in roles: `admin` (full access), `viewer` (read-only), custom role\n- Create/edit user modal: role presets (Admin/Viewer), grouped permission checklist, reset password button\n- Permission gating on 9 previously-unprotected endpoints\n\n**🔒 Security:**\n- Full security audit (docs/SECURITY_AUDIT.md) — score 7.0/10\n- XSS fix: `loadHomeCards()` now escapes all dynamic values with `escapeHtml()`\n- Rate limiter: terminal exec limited to 30 commands/minute per IP (429 on exceeded)\n- Token cleanup: proper `setInterval()` every 15 minutes (was only on token creation)\n- Admin-only gate: `GET /api/plugins` now requires admin role\n- Full activity audit log: Maintenance → Audit panel\n\n**📦 Skills:**\n- Check updates: handles \"unavailable\" source status gracefully (info message, not error)\n- Uninstall: uses stdin pipe (`echo y |`) instead of unsupported `--yes` flag\n\n**🐛 Bug Fixes:**\n- Notification dismiss: backend handles both `/api/notifications/:id/dismiss` and `/api/notifications/dismiss`\n- Sidebar: responsive CSS, `flex-shrink:0`, mobile breakpoints at 480px\n- Agent dropdown: follows dark/light theme correctly\n- Favicon 404 loop: moved to `public/` to prevent Vite hash mismatch\n- HCI Info panel: version, GitHub link, Twitter @bayendor link in Maintenance\n\n**📝 Docs:**\n- Security audit report (12 categories)\n- Removed outdated script references (install.sh, reset-password.sh)\n- Screenshots: 13 dark mode, 6 light mode\n\n### v3.2.0 (2026-04-14)\n\n**⚡ Performance:**\n- Insights speed: 60s+ timeout → 0.65s via IPv4 adapter on model_metadata.py\n- Timeouts reduced: 10s → 5s (model metadata), 5s → 3s (llama.cpp props)\n\n**🔒 Security:**\n- WebSocket origin: exact match (was substring check)\n- Body limit: 10MB → 1MB global, 10MB only on avatar upload\n- Temp files: `crypto.randomUUID()` (no predictable paths)\n- Skills install/uninstall: `execHermes()` instead of shell interpolation\n- Username validation: 2-32 chars, alphanumeric/_.- only\n\n**✨ Features:**\n- Log tabs: Agent, Error, and Gateway logs now working\n- Non-root user support: dynamic HCI identity, HOME-aware paths\n- Gateway service: auto-detect `hermes-gateway-<profile>` for non-root\n\n**🐛 Fixes:**\n- Terminal flow: transcript handling after sendCommand\n- XSS: 15+ escaped user-facing error messages\n- Auth panel: data loaded async, doesn't block page load\n- CPR stripping: removed ANSI escape from terminal\n\n### v3.1.0 (2026-04-12)\n\n- Skills Hub + Honcho panel + Gateway connections\n- HTTPS support\n- Maintenance UI: Backup & Import, HCI Restart buttons\n\n---\n\n## License\n\nMIT\n\n## Credits\n\nBuilt for the [Hermes Agent](https://github.com/NousResearch/hermes-agent) ecosystem.\n\n[@bayendor](https://x.com/bayendor) — GitHub: [xaspx](https://github.com/xaspx)\n","summary":" Hermes Control Interface is a self-hosted web dashboard for managing the Hermes AI agent stack, offering centralized control over multiple AI profiles, terminal sessions, file systems, and scheduled jobs through a real-time WebSocket interface. Built with Node.js and Express, it provides robust capabilities including streaming chat with tool visualization, granular token analytics by model and platform, and a multi-agent gateway for orchestrating various Hermes instances. The platform features enterprise-grade security through role-based access control with 28 customizable permissions, CSRF protection, and bcrypt-encrypted password authentication to safeguard team deployments. It serves developers and organizations seeking to operationalize AI agent workflows with comprehensive monitoring, user management, and hardened security controls.","description":"A self-hosted web dashboard for the Hermes AI agent stack. Provides a browser-based terminal, file explorer, session overview, cron management, system metrics, and an agent status panel — all behind a single password gate.","stars":420,"language":"JavaScript"},{"owner":"travmiller","repo":"paper-console","url":"https://github.com/travmiller/paper-console","readme":"# PC-1 (Paper Console 1)\n\n**A small, self-hosted thermal printer for news, weather, puzzles, email, and more.**\n\n---\n\n* **No screens:** output is physical thermal paper.\n* **No subscriptions:** user-owned API keys or local algorithms.\n* **Quality materials:** walnut, brass, and archival-grade paper.\n* **Universal channels:** fully configurable channels (Adventure, Astronomy, Calendar, Email, History, Journal Prompt, Maze, News, QR Code, Quotes, RSS, Sudoku, System Monitor, Text / Note, Weather, Webhook)\n\nFor more information and build photos, visit [travismiller.design/paper-console](https://travismiller.design/paper-console).\n\n![PC-1 Front View](images/pc-1_front2.jpg)\n*Front view showing the brass rotary dial, push button, and thermal paper output*\n\n---\n\n## 1. Quick Start (Software)\n\nRun the entire system on your PC without hardware to test logic and see \"printer\" output in the terminal.\nUse a Unix-like shell for project commands: Linux, macOS, or WSL on Windows\n\n**Backend:**\n\n```bash\n./run.sh\n\n# Or run directly\nuvicorn app.main:app --host 0.0.0.0 --port 8000 --reload\n```\n\n* **API Docs:** \n  * Local: [http://localhost:8000/docs](http://localhost:8000/docs)\n* **Mock Output:** Watch your Terminal window. The \"Printer\" writes text there.\n\n**Frontend (Settings UI):**\n```bash\ncd web\nnpm install\nnpm run dev\n```\n* **URL:** [http://localhost:5173](http://localhost:5173)\n\n**Tests:**\n```bash\n./testing/run_tests.sh\n```\n\n### Unboxing & First-Use Experience\n\nWhen a user unboxes a PC-1 and powers it on for the first time, the expected flow is:\n\n1. **First boot prints setup receipt**\n   - The printer automatically outputs onboarding instructions.\n   - It includes:\n     - Setup SSID: `PC-1-Setup-XXXX` (device-specific suffix)\n     - Device Password (shared across setup WiFi, settings login, printed setup instructions, and SSH)\n     - A WiFi QR code for quickly joining the setup network on phones\n     - Setup URL: `http://10.42.0.1` (and `http://pc-1.local`)\n\n2. **User connects to setup WiFi**\n   - On phone/computer, scan the printed WiFi QR code or connect to the printed SSID manually.\n   - If connecting manually, enter the printed Device Password.\n   - Many phones and laptops should open the setup page automatically as a captive portal after joining.\n\n3. **User configures home WiFi in the setup web UI**\n   - If the setup page does not open automatically, open `http://10.42.0.1`\n   - Choose home network and enter password.\n   - The UI explains that connection may drop while PC-1 switches networks.\n\n4. **PC-1 joins home WiFi**\n   - Device attempts connection in the background.\n   - On success, PC-1 prints a confirmation receipt.\n   - User reconnects their phone/computer to home WiFi.\n\n5. **User opens settings**\n   - Visit `http://pc-1.local`\n   - Configure channels/modules and print behavior.\n\n6. **Normal daily usage**\n   - Turn dial to select channel (1-8)\n   - Press button to print selected channel\n   - Hold button ~5 seconds (half-line paper cue appears at threshold), then release to open **Quick Actions**:\n     - `1` Table of Contents\n     - `2` System Monitor\n     - `3` Reprint Setup Instructions\n     - `4` Reset WiFi\n     - `5` Reset Factory Settings\n     - `8` Cancel\n   - Quick Actions are single-shot: after you pick an option, the menu exits automatically.\n   - If no option is selected for 2 minutes, Quick Actions auto-exits and prints a timeout note.\n   - Hold button ~15 seconds for **Factory Reset** (clears settings and reboots)\n   - Use Web UI anytime for editing modules, schedules, and system settings\n\nIf WiFi setup fails, PC-1 returns to setup mode so the user can try again.\n\n---\n\n## 2. Software Installation\n\n### Development Environment\n\nProject commands assume a Unix-like shell environment. On Windows, use WSL.\n\nFirst-time setup:\n\n```bash\npython3 -m venv .venv\n./.venv/bin/python -m pip install -r requirements-dev.txt\ncd web && npm install\n```\n\n1. **Install Python Dependencies:**\n   ```bash\n   ./.venv/bin/python -m pip install -r requirements-dev.txt\n   ```\n   This installs the app dependencies plus test tooling. It intentionally excludes Raspberry Pi-only GPIO packages.\n\n2. **Run the Server:**\n   ```bash\n   ./run.sh\n   # Or: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload\n   ```\n\n### Raspberry Pi Deployment\n\n1. **Install Python Dependencies:**\n   ```bash\n   ./.venv/bin/python -m pip install -r requirements-pi.txt\n   ```\n\n2. **Run Setup Script:**\n   ```bash\n   cd ~/paper-console\n   chmod +x scripts/setup_pi.sh\n   sudo scripts/setup_pi.sh\n   ```\n   The script will:\n   - Set hostname (default: `pc-1`)\n   - Install Nginx (web proxy) and Avahi (mDNS)\n   - Configure systemd service\n   - Add user to `lp` group for printer access\n\n3. **Access the Device:**\n   Open your browser and go to `http://pc-1.local` (or your chosen hostname).\n\n---\n\n## 3. Configuration\n\nConfiguration is handled entirely via the **Web UI** at `http://pc-1.local` (or `http://localhost:8000`).\n\n### Global Settings\n* **Location:** City name, Latitude, Longitude, Timezone (with search functionality)\n* **Time Format:** 12-hour (AM/PM) or 24-hour format\n\n### Channel System\n* **8 Channel Positions:** Each position (1-8) represents a slot on the rotary dial\n* **Modular System:** Channels are containers. You can assign **multiple modules** to a single channel (e.g., \"News\" followed by \"Weather\" followed by \"Sudoku\")\n* **Reordering:** \n  * **Channels:** Use Up/Down arrows next to Channel title to swap entire channels\n  * **Modules:** Use arrow buttons within a channel card to change print order\n* **Scheduled Printing:** Click the clock icon on any channel to schedule automatic printing at specific times\n\n### Module Types\n\nEach module is an independent instance with its own configuration. See [Architecture & Modules](#4-architecture--modules) for detailed information.\n\nAvailable modules: **News API**, **RSS Feeds**, **Weather**, **Email Inbox**, **Sudoku**, **Maze**, **Adventure**, **Astronomy**, **Calendar**, **Webhook**, **QR Code**, **Text / Note**, **Quotes**, **Journal Prompt**, **History**, **System Monitor**.\n\n### Settings Storage\n* **Settings File:** `config.json` (auto-saved, gitignored)\n* **Reset:** \"Reset All Settings\" button restores factory defaults\n\n### Local Validation Workflows\nFor non-Pi development, use the local test and snapshot workflows:\n\n* **Pytest:** `./testing/run_tests.sh`\n* **Print snapshots:** `./.venv/bin/python testing/render_all_prints.py --output-dir testing/artifacts/print`\n* **Settings UI snapshots:** `./.venv/bin/python testing/render_settings_ui.py --output-dir testing/artifacts/ui`\n\nThese workflows use mock/local paths and do not require Raspberry Pi GPIO packages.\n\n### Security & Network Environment Variables\nFor production deployments, configure these environment variables:\n\n* **`PC1_DEVICE_PASSWORD`**: Optional override for the unified Device Password used by setup WiFi, settings login, printed setup instructions, and SSH.  \n  On managed PC-1 devices, the runtime password is normally stored in the device-managed credential file instead. For scripted access, clients may send header `X-PC1-Device-Password`.\n* **Settings Login Sessions**: The web UI can remember a browser with a signed `HttpOnly` session cookie so users do not need to re-enter the password on every visit.\n* **`PC1_CORS_ORIGINS`**: Comma-separated CORS origins (default is local/dev origins only).\n* **`PC1_UPDATE_GITHUB_REPO`**: GitHub repo slug used by OTA release checks/install (default: `travmiller/paper-console`).\n* **`PC1_UPDATE_TARBALL_SHA256`**: Optional expected SHA256 for OTA tarball verification.\n* **`PC1_LOG_LEVEL`**: Backend log level (default: `WARNING` on device builds).\n* **`UVICORN_LOG_LEVEL`**: Uvicorn log level for `run.sh` (default: `warning`).\n* **`UVICORN_ACCESS_LOG`**: Set to `1` to enable HTTP access logs (default: `0` for lower log volume).\n\n### Production Release Artifacts\n\nFor non-git production units, build versioned release artifacts with:\n\n```bash\n./.venv/bin/python scripts/release_build.py --version v1.2.3 --build-web\n```\n\nSee `scripts/RELEASE.md` for the full release/tag/publish workflow.\n\n---\n\n## 4. Architecture & Modules\n\n### Tech Stack\n* **OS:** Raspberry Pi OS Lite (64-bit)\n* **Backend:** Python 3.12 + FastAPI\n* **Frontend:** React + Vite + Tailwind CSS v4\n\n### Directory Structure\n```\npaper-console/\n├── app/\n│   ├── main.py                 # FastAPI app, dial/button loop, print orchestration\n│   ├── auth.py                 # Device-password auth and session helpers\n│   ├── config.py               # Settings, channels, schedules, module models\n│   ├── device_password.py      # Unified device password storage/loading\n│   ├── factory_reset.py        # Factory reset helpers and welcome marker reset\n│   ├── hardware.py             # Printer + dial/button singletons\n│   ├── location_lookup.py      # City/timezone lookup helpers\n│   ├── module_registry.py      # @register_module metadata and validation\n│   ├── selection_mode.py       # Dial-driven interactive selection flows\n│   ├── utils.py\n│   ├── wifi_manager.py         # Setup AP and WiFi connection orchestration\n│   ├── data/                   # Bundled offline content and lookup datasets\n│   ├── drivers/\n│   │   ├── printer_serial.py   # Thermal printer (hardware)\n│   │   ├── printer_mock.py     # Console / capture (dev)\n│   │   ├── dial_gpio.py / dial_mock.py\n│   │   ├── button_gpio.py / button_mock.py\n│   │   └── gpio_ioctl.py\n│   ├── modules/                # Printable module implementations\n│   │   ├── adventure.py        # Interactive CYOA (dial)\n│   │   ├── astronomy.py\n│   │   ├── calendar.py\n│   │   ├── email_client.py\n│   │   ├── history.py\n│   │   ├── journal_prompts.py\n│   │   ├── maze.py\n│   │   ├── news.py\n│   │   ├── qrcode_print.py\n│   │   ├── quotes.py\n│   │   ├── rss.py\n│   │   ├── settings_menu.py    # Quick actions / factory reset receipts (not on channel picker)\n│   │   ├── sudoku.py\n│   │   ├── system_monitor.py\n│   │   ├── text.py\n│   │   ├── weather.py\n│   │   └── webhook.py\n│   └── routers/\n│       └── wifi.py\n├── web/                        # React + Vite + Tailwind settings UI\n│   ├── src/                    # App UI, WiFi setup, shared constants/styles\n│   ├── public/                 # Static icons/assets\n│   ├── package.json\n│   └── vite.config.js\n├── scripts/\n│   ├── setup_pi.sh\n│   ├── wifi_ap_nmcli.sh\n│   ├── release_build.py\n│   ├── prepare_golden_image.sh\n│   ├── deploy_automated.py\n│   ├── validate_icons.py\n│   └── RELEASE.md / DEPLOYMENT.md\n├── testing/                    # Pytest, print/UI render helpers, snapshot galleries\n│   ├── render_all_prints.py\n│   ├── render_settings_ui.py\n│   ├── console_raster_preview.py\n│   ├── run_tests.sh\n│   └── artifacts/\n├── development/                # BOM, internal docs, supporting scripts\n├── icons/                      # Icon source assets\n├── images/                     # Product photos used in the README\n├── raspberry_pi/               # Misc device imaging/install artifacts\n├── .github/workflows/\n├── .env.example\n├── .deploy_config.example\n├── AGENTS.md\n├── config.json                 # Local settings (gitignored in normal use)\n├── deploy.sh\n├── run.sh\n├── requirements.txt\n├── requirements-dev.txt\n├── requirements-pi.txt\n└── readme.md\n```\n\n### Module Details\n\n**News API:** NewsAPI top headlines; requires API key.\n\n**RSS Feeds:** Custom RSS URLs; fetches and prints article blocks with optional QR.\n\n**Weather:** Open-Meteo; uses global location from settings.\n\n**Email Inbox:** IMAP; configurable poll interval; prints unread messages.\n\n**Sudoku:** Easy / Medium / Hard; generated puzzle printed as bitmap grid.\n\n**Maze:** Easy / Medium / Hard; printable maze (bitmap) with start/end markers.\n\n**Adventure:** Interactive choose-your-own-adventure; uses dial + button (prints story nodes, exits to normal channel use when done).\n\n**Astronomy:** Sunrise/sunset, moon phase, sun path graphic; uses global location.\n\n**Calendar:** iCal URLs; month/week/day views; recurring events, timezone-aware.\n\n**Webhook:** GET/POST; headers, body, JSON path extraction for custom APIs.\n\n**QR Code:** URLs, WiFi, contact, phone, SMS, email, plain text.\n\n**Text / Note:** Rich text (TipTap JSON): headings, lists, bold/italic, horizontal rules.\n\n**Quotes:** Offline DB of thousands of quotes; random quote per print.\n\n**Journal Prompt:** Offline prompt library; random prompt per print.\n\n**History:** Offline “on this day” events; optional event count in config.\n\n**System Monitor:** Hostname, IP, WiFi, disk/memory bars, uptime, load, CPU temp (where available).\n\n---\n\n## 5. Hardware Setup\n\n### Prerequisites\n1. **Raspberry Pi Zero 2 W** with Raspberry Pi OS Lite installed\n2. **Thermal Printer** (QR204/CSN-A2 or compatible 58mm TTL thermal printer. 30mm diameter paper roll maximum)\n3. **1-Pole 8-Position Rotary Switch**\n4. **Momentary Push Button** (x1)\n5. **Power Supply:** 5V 5A Power Supply (Barrel Jack) -> Terminal Adapter\n\n### Complete Wiring Tables (Component-Based)\n\nThis layout organizes connections into logical groups (blocks) for easier assembly with standard connectors (DuPont or JST).\n\n#### 1. Power & Printer Data Block (Top)\n*Use a 4-pin or 5-pin connector block.*\n\n| Pin | GPIO | Function | Wire To |\n| :---: | :---: | :--- | :--- |\n| **2** | 5V | **Power Input (+)** | External PSU 5V (+) |\n| **6** | GND | **Power Input (-)** | External PSU GND (-) |\n| **8** | 14 | **TX (Data)** | Printer RX |\n| **10** | 15 | **RX (Data)** | Printer TX |\n| **12** | 18 | **DTR (Flow)** | Printer DTR |\n| **14** | GND | **Signal GND** | Printer GND |\n\n#### 2. Main Button Block (Middle)\n*Use a 2-pin connector.*\n\n| Pin | GPIO | Function | Wire To |\n| :---: | :---: | :--- | :--- |\n| **20** | GND | **Button GND** | Button Pin 1 |\n| **22** | 25 | **Button Signal** | Button Pin 2 |\n\n#### 3. Rotary Dial Block (Bottom)\n*Use a 12-pin (2x6) connector block.*\n\n| Pin (Left) | GPIO | Function | | Pin (Right) | GPIO | Function |\n| :---: | :---: | :--- | :--- | :---: | :---: | :--- |\n| **29** | 5 | **Pos 1** | \\| | **30** | GND | *Unused* |\n| **31** | 6 | **Pos 2** | \\| | **32** | 12 | *Unused* |\n| **33** | 13 | **Pos 3** | \\| | **34** | GND | *Unused* |\n| **35** | 19 | **Pos 4** | \\| | **36** | 16 | **Pos 6** |\n| **37** | 26 | **Pos 5** | \\| | **38** | 20 | **Pos 7** |\n| **39** | GND | **Common** | \\| | **40** | 21 | **Pos 8** |\n\n### Visual Pin Layout\nLegend: `[X]` = Used, `[ ]` = Empty. The header is 2 pins wide.\n\n```\n      (Pin 1) [ ] [X] (Pin 2)  --> Power 5V (+)\n      (Pin 3) [ ] [ ] (Pin 4)\n      (Pin 5) [ ] [X] (Pin 6)  --> Power GND (-)\n      (Pin 7) [ ] [X] (Pin 8)  --> Printer TX\n      (Pin 9) [ ] [X] (Pin 10) --> Printer RX\n     (Pin 11) [ ] [X] (Pin 12) --> Printer DTR\n     (Pin 13) [ ] [X] (Pin 14) --> Printer GND\n     (Pin 15) [ ] [ ] (Pin 16)\n     (Pin 17) [ ] [ ] (Pin 18)\n     (Pin 19) [ ] [X] (Pin 20) --> Button GND\n     (Pin 21) [ ] [X] (Pin 22) --> Button SIG\n     (Pin 23) [ ] [ ] (Pin 24)\n     (Pin 25) [ ] [ ] (Pin 26)\n     (Pin 27) [ ] [ ] (Pin 28)\n     (Pin 29) [X] [ ] (Pin 30) --> Dial 1\n     (Pin 31) [X] [ ] (Pin 32) --> Dial 2\n     (Pin 33) [X] [ ] (Pin 34) --> Dial 3\n     (Pin 35) [X] [X] (Pin 36) --> Dial 4 | Dial 6\n     (Pin 37) [X] [X] (Pin 38) --> Dial 5 | Dial 7\n     (Pin 39) [X] [X] (Pin 40) --> Dial COM| Dial 8\n```\n\n### Thermal Printer\n\n**TTL Serial Connection:**\n1. Wire according to table above\n2. **Serial port is automatically configured** by `scripts/setup_pi.sh` (disables console, enables hardware)\n3. Device appears as `/dev/serial0` after setup\n\n### Power Supply\n\n**Recommended Setup (Split Power):**\n1.  **Source:** Use a 5V 5A power supply (Barrel Jack).\n2.  **Distribution:** Use a custom PCB HAT or a terminal splitter to feed power to two places simultaneously:\n    *   **To Pi:** Connect to GPIO Pins 2 (5V) and 6 (GND).\n    *   **To Printer:** Connect to the printer's power input cable.\n3.  **Warning:** Do **not** plug the power supply into the Pi's USB port and try to power the printer from the Pi's GPIO pins. The printer draws too much current (up to 4A) and will crash the Pi.\n\n---\n\n## 6. Troubleshooting\n\n### Printer Issues\n* **Device Not Found:**\n  * Check if `/dev/serial0` exists: `ls -l /dev/serial*`\n  * If missing, run setup script: `sudo scripts/setup_pi.sh` (configures serial automatically)\n  * Or manually: `sudo raspi-config` → Interface Options → Serial Port → Enable hardware, Disable console\n* **Permission Denied:**\n  * Ensure user is in `dialout` group: `groups`\n  * Add user: `sudo usermod -a -G dialout $USER` (then log out/in)\n* **Nothing Prints:**\n  * Verify power supply is adequate (5A minimum)\n  * Confirm printer is connected to correct GPIO pins using the wiring table above\n  * Make sure the printer is powered on (indicator lights as expected)\n  * Check for error/status lights or messages on the printer itself (if available)\n  * Test the printer with a simple echo command: `echo \"test\" > /dev/serial0`\n  * Check service logs: `sudo journalctl -u pc-1.service -f`\n  * Confirm no other application is holding the serial port open (use `lsof /dev/serial0`)\n\n### Service Issues\n  * **Restart Loop:**\n  * Service uses `run.sh` to handle port conflicts automatically\n  * Restart: `sudo systemctl restart pc-1.service`\n  * Check logs: `sudo journalctl -u pc-1.service -f`\n  * **Port Already in Use:**\n  * `run.sh` automatically kills zombie processes\n  * If persistent, reboot: `sudo reboot`\n  * **Log Storage:**\n  * Setup script configures journald in RAM (`Storage=volatile`) with a bounded budget (`RuntimeMaxUse=16M`).\n  * This minimizes SD writes and prevents long-term log growth on disk.\n  * Setup script also installs `pc1-storage-guard.timer` (runs every 6 hours) to trim journals/cache if root usage rises.\n  * Core dumps are disabled (`/etc/systemd/coredump.conf.d/pc-1.conf`) to prevent multi-megabyte crash artifacts.\n  * Check current journal usage: `journalctl --disk-usage`\n  * Check storage guard timer: `systemctl status pc1-storage-guard.timer`\n  * Run storage guard immediately: `sudo systemctl start pc1-storage-guard.service`\n  * Temporarily enable more logs for debugging by setting:\n    * `PC1_LOG_LEVEL=INFO`\n    * `UVICORN_ACCESS_LOG=1`\n\n### Module-Specific Issues\n* **NewsAPI Returns 0 Articles:** Check if API key is valid and on free tier\n* **RSS F
