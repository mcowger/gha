response logs | Troubleshoot issues easily |\n| 💾 **Cloud Sync** | Sync config across devices | Same setup everywhere |\n| 📊 **Usage Analytics** | Track tokens, cost, trends over time | Optimize spending |\n| 🌐 **Deploy Anywhere** | Localhost, VPS, Docker, Cloudflare Workers | Flexible deployment options |\n\n<details>\n<summary><b>📖 Feature Details</b></summary>\n\n### 🚀 RTK Token Saver\n\nTool outputs (`git diff`, `grep`, `find`, `ls`, `tree`, log dumps...) often eat 30-50% of your prompt budget. RTK detects them and applies smart, lossless compression **before** the request hits the LLM:\n\n- **Filters:** `git-diff`, `git-status`, `grep`, `find`, `ls`, `tree`, `dedup-log`, `smart-truncate`, `read-numbered`, `search-list`\n- **Auto-detect:** No config needed — RTK peeks the first 1KB of each `tool_result` and picks the right filter.\n- **Safe by design:** If a filter fails, throws, or makes output bigger, RTK silently keeps the original text. Errors never break your request.\n- **Universal:** Works across all formats (OpenAI, Claude, Gemini, Cursor, Kiro, OpenAI Responses) because it runs **before** any format translation.\n- **Default ON:** Toggle anytime in Dashboard → Endpoint settings.\n\n```\nWithout RTK: 47K tokens sent to LLM\nWith RTK:    28K tokens sent to LLM   (40% saved · same context · same answer)\n```\n\n### 🎯 Smart 3-Tier Fallback\n\nCreate combos with automatic fallback:\n\n```\nCombo: \"my-coding-stack\"\n  1. cc/claude-opus-4-6        (your subscription)\n  2. glm/glm-4.7               (cheap backup, $0.6/1M)\n  3. if/kimi-k2-thinking       (free fallback)\n\n→ Auto switches when quota runs out or errors occur\n```\n\n### 📊 Real-Time Quota Tracking\n\n- Token consumption per provider\n- Reset countdown (5-hour, daily, weekly)\n- Cost estimation for paid tiers\n- Monthly spending reports\n\n### 🔄 Format Translation\n\nSeamless translation between formats:\n- **OpenAI** ↔ **Claude** ↔ **Gemini** ↔ **Cursor** ↔ **Kiro** ↔ **Vertex** ↔ **Antigravity** ↔ **Ollama** ↔ **OpenAI Responses**\n- Your CLI tool sends OpenAI format → 9Router translates → Provider receives native format\n- Works with any tool that supports custom OpenAI endpoints\n\n### 👥 Multi-Account Support\n\n- Add multiple accounts per provider\n- Auto round-robin or priority-based routing\n- Fallback to next account when one hits quota\n\n### 🔄 Auto Token Refresh\n\n- OAuth tokens automatically refresh before expiration\n- No manual re-authentication needed\n- Seamless experience across all providers\n\n### 🎨 Custom Combos\n\n- Create unlimited model combinations\n- Mix subscription, cheap, and free tiers\n- Name your combos for easy access\n- Share combos across devices with Cloud Sync\n\n### 📝 Request Logging\n\n- Enable debug mode for full request/response logs\n- Track API calls, headers, and payloads\n- Troubleshoot integration issues\n- Export logs for analysis\n\n### 💾 Cloud Sync\n\n- Sync providers, combos, and settings across devices\n- Automatic background sync\n- Secure encrypted storage\n- Access your setup from anywhere\n\n#### Cloud Runtime Notes\n\n- Prefer server-side cloud variables in production:\n  - `BASE_URL` (internal callback URL used by sync scheduler)\n  - `CLOUD_URL` (cloud sync endpoint base)\n- `NEXT_PUBLIC_BASE_URL` and `NEXT_PUBLIC_CLOUD_URL` are still supported for compatibility/UI, but server runtime now prioritizes `BASE_URL`/`CLOUD_URL`.\n- Cloud sync requests now use timeout + fail-fast behavior to avoid UI hanging when cloud DNS/network is unavailable.\n\n### 📊 Usage Analytics\n\n- Track token usage per provider and model\n- Cost estimation and spending trends\n- Monthly reports and insights\n- Optimize your AI spending\n\n> **💡 IMPORTANT - Understanding Dashboard Costs:**\n> \n> The \"cost\" displayed in Usage Analytics is **for tracking and comparison purposes only**. \n> 9Router itself **never charges** you anything. You only pay providers directly (if using paid services).\n> \n> **Example:** If your dashboard shows \"$290 total cost\" while using iFlow models, this represents \n> what you would have paid using paid APIs directly. Your actual cost = **$0** (iFlow is free unlimited).\n> \n> Think of it as a \"savings tracker\" showing how much you're saving by using free models or \n> routing through 9Router!\n\n### 🌐 Deploy Anywhere\n\n- 💻 **Localhost** - Default, works offline\n- ☁️ **VPS/Cloud** - Share across devices\n- 🐳 **Docker** - One-command deployment\n- 🚀 **Cloudflare Workers** - Global edge network\n\n</details>\n\n---\n\n## 💰 Pricing at a Glance\n\n| Tier | Provider | Cost | Quota Reset | Best For |\n|------|----------|------|-------------|----------|\n| **🚀 TOKEN SAVER** | **RTK (built-in)** | **FREE** | Always on | **Save 20-40% tokens on EVERY request** |\n| **💳 SUBSCRIPTION** | Claude Code (Pro/Max) | $20-200/mo | 5h + weekly | Already subscribed |\n| | Codex (Plus/Pro) | $20-200/mo | 5h + weekly | OpenAI users |\n| | GitHub Copilot | $10-19/mo | Monthly | GitHub users |\n| | Cursor IDE | $20/mo | Monthly | Cursor users |\n| **💰 CHEAP** | GLM-5.1 / GLM-4.7 | $0.6/1M | Daily 10AM | Budget backup |\n| | MiniMax M2.7 | $0.2/1M | 5-hour rolling | Cheapest option |\n| | Kimi K2.5 | $9/mo flat | 10M tokens/mo | Predictable cost |\n| **🆓 FREE** | Kiro AI | $0 | Unlimited | Claude 4.5 + GLM-5 + MiniMax free |\n| | OpenCode Free | $0 | Unlimited | No auth, auto-fetch models |\n| | Vertex AI | $300 credits | New GCP accounts | Gemini 3 Pro + DeepSeek + GLM-5 |\n\n**💡 Pro Tip:** RTK + Kiro AI + OpenCode Free combo = **$0 cost + 20-40% token savings**!\n\n---\n\n### 📊 Understanding 9Router Costs & Billing\n\n**9Router Billing Reality:**\n\n✅ **9Router software = FREE forever** (open source, never charges)  \n✅ **Dashboard \"costs\" = Display/tracking only** (not actual bills)  \n✅ **You pay providers directly** (subscriptions or API fees)  \n✅ **FREE providers stay FREE** (iFlow, Kiro, Qwen = $0 unlimited)  \n❌ **9Router never sends invoices** or charges your card\n\n**How Cost Display Works:**\n\nThe dashboard shows **estimated costs** as if you were using paid APIs directly. This is **not billing** - it's a comparison tool to show your savings.\n\n**Example Scenario:**\n```\nDashboard Display:\n• Total Requests: 1,662\n• Total Tokens: 47M\n• Display Cost: $290\n\nReality Check:\n• Provider: iFlow (FREE unlimited)\n• Actual Payment: $0.00\n• What $290 Means: Amount you SAVED by using free models!\n```\n\n**Payment Rules:**\n- **Subscription providers** (Claude Code, Codex): Pay them directly via their websites\n- **Cheap providers** (GLM, MiniMax): Pay them directly, 9Router just routes\n- **FREE providers** (iFlow, Kiro, Qwen): Genuinely free forever, no hidden charges\n- **9Router**: Never charges anything, ever\n\n---\n\n## 🎯 Use Cases\n\n### Case 1: \"I have Claude Pro subscription\"\n\n**Problem:** Quota expires unused, rate limits during heavy coding\n\n**Solution:**\n```\nCombo: \"maximize-claude\"\n  1. cc/claude-opus-4-7        (use subscription fully)\n  2. glm/glm-5.1               (cheap backup when quota out)\n  3. kr/claude-sonnet-4.5      (free emergency fallback)\n\nMonthly cost: $20 (subscription) + ~$5 (backup) = $25 total\nvs. $20 + hitting limits = frustration\n```\n\n### Case 2: \"I want zero cost\"\n\n**Problem:** Can't afford subscriptions, need reliable AI coding\n\n**Solution:**\n```\nCombo: \"free-forever\"\n  1. kr/claude-sonnet-4.5      (Claude 4.5 free unlimited)\n  2. kr/glm-5                  (GLM-5 free via Kiro)\n  3. oc/<auto>                 (OpenCode Free, no auth)\n\nMonthly cost: $0\nQuality: Production-ready models + RTK saves 20-40% tokens\n```\n\n### Case 3: \"I need 24/7 coding, no interruptions\"\n\n**Problem:** Deadlines, can't afford downtime\n\n**Solution:**\n```\nCombo: \"always-on\"\n  1. cc/claude-opus-4-7        (best quality)\n  2. cx/gpt-5.5                (second subscription)\n  3. glm/glm-5.1               (cheap, resets daily)\n  4. minimax/MiniMax-M2.7      (cheapest, mary><b>🆓 Are FREE providers really unlimited?</b></summary>\n\n**Yes!** The current FREE providers (Kiro, OpenCode Free, Vertex) are genuinely free with **no hidden charges**.\n\nThese are free services offered by those respective companies:\n- **Kiro AI**: Free unlimited Claude 4.5 + GLM-5 + MiniMax via AWS Builder ID / Google / GitHub OAuth\n- **OpenCode Free**: No-auth passthrough proxy, models auto-fetched from `opencode.ai/zen/v1/models`\n- **Vertex AI**: $300 free credits for new Google Cloud accounts (90 days)\n\n9Router just routes your requests to them - there's no \"catch\" or future billing. They're truly free services, and 9Router makes them easy to use with fallback support.\n\n**Discontinued free tiers (no longer recommended):**\n- ❌ **iFlow**: Was free unlimited, now changed to paid (2026)\n- ❌ **Qwen Code**: Free OAuth tier discontinued by Alibaba on 2026-04-15\n- ❌ **Gemini CLI**: Still works, but using it with non-CLI tools (Claude, Codex, Cursor...) may result in account bans — only use if you stick to Gemini CLI itself\n\n</details>\n\n<details>\n<summary><b>💰 How do I minimize my actual AI costs?</b></summary>\n\n**Free-First Strategy:**\n\n1. **Start with 100% free combo:**\n   ```\n   1. gc/gemini-3-flash (180K/month free from Google)\n   2. if/kimi-k2-thinking (unlimited free from iFlow)\n   3. qw/qwen3-coder-plus (unlimited free from Qwen)\n   ```\n   **Cost: $0/month**\n\n2. **Add cheap backup** only if you need it:\n   ```\n   4. glm/glm-4.7 ($0.6/1M tokens)\n   ```\n   **Additional cost: Only pay for what you actually use**\n\n3. **Use subscription providers last:**\n   - Only if you already have them\n   - 9Router helps maximize their value through quota tracking\n\n**Result:** Most users can operate at $0/month using only free tiers!\n\n</details>\n\n<details>\n<summary><b>📈 What if my usage suddenly spikes?</b></summary>\n\n9Router's smart fallback prevents surprise charges:\n\n**Scenario:** You're on a coding sprint and blow through your quotas\n\n**Without 9Router:**\n- ❌ Hit rate limit → Work stops → Frustration\n- ❌ Or: Accidentally rack up huge API bills\n\n**With 9Router:**\n- ✅ Subscription hits limit → Auto-fallback to cheap tier\n- ✅ Cheap tier gets expensive → Auto-fallback to free tier\n- ✅ Never stop coding → Predictable costs\n\n**You're in control:** Set spending limits per provider in dashboard, and 9Router respects them.\n\n</details>\n\n---\n\n## 📖 Setup Guide\n\n<details>\n<summary><b>🔐 Subscription Providers (Maximize Value)</b></summary>\n\n### Claude Code (Pro/Max)\n\n```bash\nDashboard → Providers → Connect Claude Code\n→ OAuth login → Auto token refresh\n→ 5-hour + weekly quota tracking\n\nModels:\n  cc/claude-opus-4-7\n  cc/claude-opus-4-6\n  cc/claude-sonnet-4-6\n  cc/claude-haiku-4-5-20251001\n```\n\n**Pro Tip:** Use Opus for complex tasks, Sonnet for speed. 9Router tracks quota per model!\n\n### OpenAI Codex (Plus/Pro)\n\n```bash\nDashboard → Providers → Connect Codex\n→ OAuth login (port 1455)\n→ 5-hour + weekly reset\n\nModels:\n  cx/gpt-5.5\n  cx/gpt-5.4\n  cx/gpt-5.3-codex\n  cx/gpt-5.2-codex\n```\n\n### GitHub Copilot\n\n```bash\nDashboard → Providers → Connect GitHub\n→ OAuth via GitHub\n→ Monthly reset (1st of month)\n\nModels:\n  gh/gpt-5.4\n  gh/claude-opus-4.7\n  gh/claude-sonnet-4.6\n  gh/gemini-3.1-pro-preview\n  gh/grok-code-fast-1\n```\n\n### Cursor IDE\n\n```bash\nDashboard → Providers → Connect Cursor\n→ OAuth login\n→ Monthly subscription\n\nModels:\n  cu/claude-4.6-opus-max\n  cu/claude-4.5-sonnet-thinking\n  cu/gpt-5.3-codex\n```\n\n</details>\n\n<details>\n<summary><b>💰 Cheap Providers (Backup)</b></summary>\n\n### GLM-5.1 / GLM-4.7 (Daily reset, $0.6/1M)\n\n1. Sign up: [Zhipu AI](https://open.bigmodel.cn/)\n2. Get API key from Coding Plan\n3. Dashboard → Add API Key:\n   - Provider: `glm`\n   - API Key: `your-key`\n\n**Use:** `glm/glm-5.1`, `glm/glm-5`, `glm/glm-4.7`\n\n**Pro Tip:** Coding Plan offers 3× quota at 1/7 cost! Reset daily 10:00 AM.\n\n w\n\nName: premium-coding\nModels:\n  1. cc/claude-opus-4-7 (Subscription primary)\n  2. glm/glm-5.1 (Cheap backup, $0.6/1M)\n  3. minimax/MiniMax-M2.7 (Cheapest fallback, $0.20/1M)\n\nUse in CLI: premium-coding\n\nMonthly cost example (100M tokens):\n  80M via Claude (subscription): $0 extra\n  15M via GLM: $9\n  5M via MiniMax: $1\n  Total: $10 + your subscription\n```\n\n### Example 2: Free-Only (Zero Cost)\n\n```\nName: free-combo\nModels:\n  1. kr/claude-sonnet-4.5 (Claude 4.5 free unlimited)\n  2. kr/glm-5 (GLM-5 free via Kiro)\n  3. vertex/gemini-3.1-pro-preview ($300 free credits)\n\nCost: $0 forever (+ 20-40% token savings via RTK)!\n```\n\n</details>\n\n<details>\n<summary><b>🔧 CLI Integration</b></summary>\n\n### Cursor IDE\n\n```\nSettings → Models → Advanced:\n  OpenAI API Base URL: http://localhost:20128/v1\n  OpenAI API Key: [from 9router dashboard]\n  Model: cc/claude-opus-4-7\n```\n\nOr use combo: `premium-coding`\n\n### Claude Code\n\nEdit `~/.claude/config.json`:\n\n```json\n{\n  \"anthropic_api_base\": \"http://localhost:20128/v1\",\n  \"anthropic_api_key\": \"your-9router-api-key\"\n}\n```\n\n### Codex CLI\n\n```bash\nexport OPENAI_BASE_URL=\"http://localhost:20128\"\nexport OPENAI_API_KEY=\"your-9router-api-key\"\n\ncodex \"your prompt\"\n```\n\n### OpenClaw\n\n**Option 1 — Dashboard (recommended):**\n\n```\nDashboard → CLI Tools → OpenClaw → Select Model → Apply\n```\n\n**Option 2 — Manual:** Edit `~/.openclaw/openclaw.json`:\n\n```json\n{\n  \"agents\": {\n    \"defaults\": {\n      \"model\": {\n        \"primary\": \"9router/kr/claude-sonnet-4.5\"\n      }\n    }\n  },\n  \"models\": {\n    \"providers\": {\n      \"9router\": {\n        \"baseUrl\": \"http://127.0.0.1:20128/v1\",\n        \"apiKey\": \"sk_9router\",\n        \"api\": \"openai-completions\",\n        \"models\": [\n          {\n            \"id\": \"kr/claude-sonnet-4.5\",\n            \"name\": \"Claude Sonnet 4.5 (Kiro Free)\"\n          }\n        ]\n      }\n    }\n  }\n}\n```\n\n> **Note:** OpenClaw only works with local 9Router. Use `127.0.0.1` instead of `localhost` to avoid IPv6 resolution issues.\n\n### Cline / Continue / RooCode\n\n```\nProvider: OpenAI Compatible\nBase URL: http://localhost:20128/v1\nAPI Key: [from dashboard]\nModel: cc/claude-opus-4-7\n```\n\n</details>\n\n<details>\n<summary><b>🚀 Deployment</b></summary>\n\n### VPS Deployment\n\n```bash\n# Clone and install\ngit clone https://github.com/decolua/9router.git\ncd 9router\nnpm install\nnpm run build\n\n# Configure\nexport JWT_SECRET=\"your-secure-secret-change-this\"\nexport INITIAL_PASSWORD=\"your-password\"\nexport DATA_DIR=\"/var/lib/9router\"\nexport PORT=\"20128\"\nexport HOSTNAME=\"0.0.0.0\"\nexport NODE_ENV=\"production\"\nexport NEXT_PUBLIC_BASE_URL=\"http://localhost:20128\"\nexport NEXT_PUBLIC_CLOUD_URL=\"https://9router.com\"\nexport API_KEY_SECRET=\"endpoint-proxy-api-key-secret\"\nexport MACHINE_ID_SALT=\"endpoint-proxy-salt\"\n\n# Start\nnpm run start\n\n# Or use PM2\nnpm install -g pm2\npm2 start npm --name 9router -- start\npm2 save\npm2 startup\n```\n\n### Docker\n\nPublished images (multi-platform `linux/amd64` + `linux/arm64`):\n- Docker Hub: [`decolua/9router`](https://hub.docker.com/r/decolua/9router)\n- GHCR: [`ghcr.io/decolua/9router`](https://github.com/decolua/9router/pkgs/container/9router)\n\n**Quick start (use published image):**\n\n```bash\ndocker run -d \\\n  --name 9router \\\n  -p 20128:20128 \\\n  -v \"$HOME/.9router:/app/data\" \\\n  -e DATA_DIR=/app/data \\\n  decolua/9router:latest\n```\n\n→ Open http://localhost:20128\n\n**Build from source (dev):**\n\n```bash\ngit clone https://github.com/decolua/9router.git\ncd 9router/app\ndocker build -t 9router .\ndocker run -d --name 9router -p 20128:20128 \\\n  -v \"$HOME/.9router:/app/data\" -e DATA_DIR=/app/data 9router\n```\n\n**Container defaults:**\n- `PORT=20128`\n- `HOSTNAME=0.0.0.0`\n\n**Useful commands:**\n\n```bash\ndocker logs -f 9router\ndocker restart 9router\ndocker stop 9router && docker rm 9router\ndocker pull decolua/9router:latest   # update to latest\n```\n\n**Data persistence:** `$HOME/.9router/db/data.sqlite` on host ↔ `/app/data/db/data.sqlite` in container.\n\n### Environment Variables\n\n| Variable | Default | Description |\n|----------|---------|-------------|\n| `JWT_SECRET` | Auto-generated (`~/.9router/jwt-secret`) | JWT signing secret for dashboard auth cookie (override to share across instances) |\n| `INITIAL_PASSWORD` | `123456` | First login password when no saved hash exists |\n| `DATA_DIR` | `~/.9router` | Main app data location (SQLite at `$DATA_DIR/db/data.sqlite`) |\n| `PORT` | framework default | Service port (`20128` in examples) |\n| `HOSTNAME` | framework default | Bind host (Docker defaults to `0.0.0.0`) |\n| `NODE_ENV` | runtime default | Set `production` for deploy |\n| `BASE_URL` | `http://localhost:20128` | Server-side internal base URL used by cloud sync jobs |\n| `CLOUD_URL` | `https://9router.com` | Server-side cloud sync endpoint base URL |\n| `NEXT_PUBLIC_BASE_URL` | `http://localhost:3000` | Backward-compatible/public base URL (prefer `BASE_URL` for server runtime) |\n| `NEXT_PUBLIC_CLOUD_URL` | `https://9router.com` | Backward-compatible/public cloud URL (prefer `CLOUD_URL` for server runtime) |\n| `API_KEY_SECRET` | `endpoint-proxy-api-key-secret` | HMAC secret for generated API keys |\n| `MACHINE_ID_SALT` | `endpoint-proxy-salt` | Salt for stable machine ID hashing |\n| `ENABLE_REQUEST_LOGS` | `false` | Enables request/response logs under `logs/` |\n| `AUTH_COOKIE_SECURE` | `false` | Force `Secure` auth cookie (set `true` behind HTTPS reverse proxy) |\n| `REQUIRE_API_KEY` | `false` | Enforce Bearer API key on `/v1/*` routes (recommended for internet-exposed deploys) |\n| `HTTP_PROXY`, `HTTPS_PROXY`, `ALL_PROXY`, `NO_PROXY` | empty | Optional outbound proxy for upstream provider calls |\n\nNotes:\n- Lowercase proxy variables are also supported: `http_proxy`, `https_proxy`, `all_proxy`, `no_proxy`.\n- `.env` is not baked into Docker image (`.dockerignore`); inject runtime config with `--env-file` or `-e`.\n- On Windows, `APPDATA` can be used for local storage path resolution.\n- `INSTANCE_NAME` appears in older docs/env templates, but is currently not used at runtime.\n\n### Runtime Files and Storage\n\n- Main app state: `${DATA_DIR}/db/data.sqlite` (SQLite — providers, combos, aliases, keys, settings, usage history)\n- Auto backups: `${DATA_DIR}/db/backups/`\n- Optional request/translator logs: `<repo>/logs/...` when `ENABLE_REQUEST_LOGS=true`\n- Both `${DATA_DIR}` and `~/.9router` resolve to the same location in a Docker container — the symlink `/root/.9router -> /app/data` is created at build time.\n\n</details>\n\n---\n\n## 📊 Available Models\n\n<details>\n<summary><b>View all available models</b></summary>\n\n**Claude Code (`cc/`)** - Pro/Max:\n- `cc/claude-opus-4-7`\n- `cc/claude-opus-4-6`\n- `cc/claude-sonnet-4-6`\n- `cc/claude-sonnet-4-5-20250929`\n- `cc/claude-haiku-4-5-20251001`\n\n**Codex (`cx/`)** - Plus/Pro:\n- `cx/gpt-5.5`\n- `cx/gpt-5.4`\n- `cx/gpt-5.3-codex`\n- `cx/gpt-5.2-codex`\n- `cx/gpt-5.1-codex-max`\n\n**GitHub Copilot (`gh/`)**:\n- `gh/gpt-5.4`\n- `gh/claude-opus-4.7`\n- `gh/claude-sonnet-4.6`\n- `gh/gemini-3.1-pro-preview`\n- `gh/grok-code-fast-1`\n\n**Cursor (`cu/`)** - Subscription:\n- `cu/claude-4.6-opus-max`\n- `cu/claude-4.5-sonnet-thinking`\n- `cu/gpt-5.3-codex`\n- `cu/kimi-k2.5`\n\n**GLM (`glm/`)** - $0.6/1M:\n- `glm/glm-5.1`\n- `glm/glm-5`\n- `glm/glm-4.7`\n\n**MiniMax (`minimax/`)** - $0.2/1M:\n- `minimax/MiniMax-M2.7`\n- `minimax/MiniMax-M2.5`\n\n**Kimi (`kimi/`)** - $9/mo flat:\n- `kimi/kimi-k2.5`\n- `kimi/kimi-k2.5-thinking`\n\n**Kiro (`kr/`)** - FREE unlimited:\n- `kr/claude-sonnet-4.5`\n- `kr/claude-haiku-4.5`\n- `kr/glm-5`\n- `kr/MiniMax-M2.5`\n- `kr/qwen3-coder-next`\n- `kr/deepseek-3.2`\n\n**OpenCode Free (`oc/`)** - FREE no-auth:\n- Auto-fetched from `opencode.ai/zen/v1/models`\n\n**Vertex AI (`vertex/`)** - $300 free credits:\n- `vertex/gemini-3.1-pro-preview`\n- `vertex/gemini-3-flash-preview`\n- `vertex/gemini-2.5-flash`\n- `vertex-partner/glm-5-maas`\n- `vertex-partner/deepseek-v3.2-maas`\n\n</details>\n\n---\n\n## 🐛 Troubleshooting\n\n**\"Language model did not provide messages\"**\n- Provider quota exhausted → Check dashboard quota tracker\n- Solution: Use combo fallback or switch to cheaper tier\n\n**Rate limiting**\n- Subscription quota out → Fallback to GLM/MiniMax\n- Add combo: `cc/claude-opus-4-7 → glm/glm-5.1 → kr/claude-sonnet-4.5`\n\n**OAuth token expired**\n- Auto-refreshed by 9Router\n- If issues persist: Dashboard → Provider → Reconnect\n\n**High costs**\n- Enable RTK in Dashboard → Endpoint settings (default ON, saves 20-40% tokens)\n- Check usage stats in Dashboard\n- Switch primary model to GLM/MiniMax\n- Use free tier (Kiro, OpenCode Free, Vertex) for non-critical tasks\n\n**Dashboard opens on wrong port**\n- Set `PORT=20128` and `NEXT_PUBLIC_BASE_URL=http://localhost:20128`\n\n**First login not working**\n- Check `INITIAL_PASSWORD` in `.env`\n- If unset, fallback password is `123456`\n\n**No request logs under `logs/`**\n- Set `ENABLE_REQUEST_LOGS=true`\n\n---\n\n## 🛠️ Tech Stack\n\n- **Runtime**: Node.js 20+\n- **Framework**: Next.js 16\n- **UI**: React 19 + Tailwind CSS 4\n- **Database**: SQLite (better-sqlite3 / node:sqlite / sql.js fallback)\n- **Streaming**: Server-Sent Events (SSE)\n- **Auth**: OAuth 2.0 (PKCE) + JWT + API Keys\n\n---\n\n## 📝 API Reference\n\n### Chat Completions\n\n```bash\nPOST http://localhost:20128/v1/chat/completions\nAuthorization: Bearer your-api-key\nContent-Type: application/json\n\n{\n  \"model\": \"cc/claude-opus-4-6\",\n  \"messages\": [\n    {\"role\": \"user\", \"content\": \"Write a function to...\"}\n  ],\n  \"stream\": true\n}\n```\n\n### List Models\n\n```bash\nGET http://localhost:20128/v1/models\nAuthorization: Bearer your-api-key\n\n→ Returns all models + combos in OpenAI format\n```\n\n## 📧 Support\n\n- **Website**: [9router.com](https://9router.com)\n- **GitHub**: [github.com/decolua/9router](https://github.com/decolua/9router)\n- **Issues**: [github.com/decolua/9router/issues](https://github.com/decolua/9router/issues)\n\n---\n\n## 👥 Contributors\n\nThanks to all contributors who helped make 9Router better!\n\n[![Contributors](https://contrib.rocks/image?repo=decolua/9router&max=150&columns=15&anon=1&v=20260309)](https://github.com/decolua/9router/graphs/contributors)\n\n---\n\n## 📊 Star Chart\n\n[![Star Chart](https://starchart.cc/decolua/9router.svg?variant=adaptive)](https://starchart.cc/decolua/9router)\n\n\n\n## 🔀 Forks\n\n**[OmniRoute](https://github.com/diegosouzapw/OmniRoute)** — A full-featured TypeScript fork of 9Router. Adds 36+ providers, 4-tier auto-fallback, multi-modal APIs (images, embeddings, audio, TTS), circuit breaker, semantic cache, LLM evaluations, and a polished dashboard. 368+ unit tests. Available via npm and Docker.\n\n---\n\n## 🙏 Acknowledgments\n\nBuilt on the shoulders of giants:\n\n- **[CLIProxyAPI](https://github.com/router-for-me/CLIProxyAPI)** — original Go implementation that inspired this JavaScript port.\n- **[RTK](https://github.com/rtk-ai/rtk)** ![Stars](https://img.shields.io/github/stars/rtk-ai/rtk?style=flat&color=yellow) — Rust token-saver. 9Router ports its compression pipeline to JS → **−20-40% input tokens** on every request.\n- **[Caveman](https://github.com/JuliusBrussee/caveman)** ![Stars](https://img.shields.io/github/stars/JuliusBrussee/caveman?style=flat&color=yellow) by **[@JuliusBrussee](https://github.com/JuliusBrussee)** — viral *\"why use many token when few token do trick\"*. 9Router adapts its prompt → **−65% output tokens**.\n\nHuge thanks to these authors — without their work, 9Router's token-saving features wouldn't exist. ⭐ them on GitHub!\n\n---\n\n## 📄 License\n\nMIT License - see [LICENSE](LICENSE) for details.\n\n---\n\n<div align=\"center\">\n  <sub>Built with ❤️ for developers who code 24/7</sub>\n</div>\n","summary":"9Router is an AI request routing tool designed to optimize token usage and prevent workflow interruptions caused by rate limits or subscription exhaustion. It features an RTK Token Saver that compresses tool results to reduce costs by 20–40% and provides an intelligent auto-fallback mechanism that seamlessly switches between subscription, paid, and free AI models. By supporting over 40 providers and 100 models, this project is ideal for developers using CLI-based AI tools like Cursor, Claude Code, or Cline who want to maximize their efficiency and minimize API expenses.","description":"Unlimited FREE AI coding. Connect Claude Code, Codex, Cursor, Cline, Copilot, Antigravity to FREE Claude/GPT/Gemini via 40+ providers. Auto-fallback, RTK -40% tokens, never hit limits.","stars":15915,"language":"JavaScript"},{"owner":"awslabs","repo":"aidlc-workflows","url":"https://github.com/awslabs/aidlc-workflows","readme":"# AI-DLC (AI-Driven Development Life Cycle)\n\n> [!IMPORTANT]\n> Generative AI can make mistakes. You should consider reviewing all output and costs generated by your chosen AI model and agentic coding assistant. See [AWS Responsible AI Policy](https://aws.amazon.com/ai/responsible-ai/policy/).\n\n<!-- TODO: Replace this Amplify URL with a permanent/stable URL when available -->\nAI-DLC is an intelligent software development workflow that adapts to your needs, maintains quality standards, and keeps you in control of the process. For learning more about AI-DLC Methodology, read this [blog](https://aws.amazon.com/blogs/devops/ai-driven-development-life-cycle/) and the [Method Definition Paper](https://prod.d13rzhkk8cj2z0.amplifyapp.com/) referred in it.\n\n## Table of Contents\n\n- [Common](#common)\n- [Platform-Specific Setup](#platform-specific-setup)\n- [Usage](#usage)\n- [Three-Phase Adaptive Workflow](#three-phase-adaptive-workflow)\n- [Key Features](#key-features)\n- [Extensions](#extensions)\n- [Supporting Tools](#supporting-tools)\n- [Tenets](#tenets)\n- [Prerequisites](#prerequisites)\n- [Troubleshooting](#troubleshooting)\n- [Version Control Recommendations](#version-control-recommendations)\n- [Additional Resources](#additional-resources)\n- [Generated aidlc-docs/ Reference](#generated-aidlc-docs-reference)\n- [Experimental: AI-Assisted Setup (Release Download)](#experimental-ai-assisted-setup-release-download)\n- [Contributing](#contributing)\n- [License](#license)\n\n---\n\n## Common\n\n1. Download the latest release zip file named `ai-dlc-rules-v<release-number>.zip` from the [Releases page](../../releases/latest) to a folder **outside** your project directory (e.g., `~/Downloads`).\n2. Extract the zip. It contains an `aidlc-rules/` folder with two subdirectories:\n   - `aws-aidlc-rules/` — the core AI-DLC workflow rules\n   - `aws-aidlc-rule-details/` — detailed rules conditionally referenced by the core rules\n3. Follow the setup instructions for your coding agent and platform below.\n\n---\n\n## Platform-Specific Setup\n\n- [Kiro](#kiro)\n- [Amazon Q Developer IDE Plugin](#amazon-q-developer-ide-pluginextension)\n- [Cursor IDE](#cursor-ide)\n- [Cline](#cline)\n- [Claude Code](#claude-code)\n- [GitHub Copilot](#github-copilot)\n\n---\n\n### Kiro\n\nAI-DLC uses [Kiro Steering Files](https://kiro.dev/docs/cli/steering/) within your project workspace.  \n\nThe commands below assume you extracted the zip to your `Downloads` folder so that the resulting path is `Downloads/aidlc-rules/`. If you used a different location, replace `Downloads` with your actual folder path.\n\n> [!NOTE]\n> **Windows users:** if you used File Explorer's **Extract All...** dialog, it defaults to creating a wrapper folder named after the zip (e.g., `ai-dlc-rules-v0.1.8\\aidlc-rules\\...`). Either uncheck/edit that destination so the contents land directly in `Downloads\\aidlc-rules\\` (matching the commands below), or prepend `ai-dlc-rules-v<version>\\` to each `Downloads\\` path in the commands — substituting `<version>` with the release you downloaded.\n\nOn macOS/Linux:\n\n```bash\nmkdir -p .kiro/steering\ncp -R ~/Downloads/aidlc-rules/aws-aidlc-rules .kiro/steering/\ncp -R ~/Downloads/aidlc-rules/aws-aidlc-rule-details .kiro/\n```\n\nOn Windows (PowerShell):\n\n```powershell\nNew-Item -ItemType Directory -Force -Path \".kiro\\steering\"\nCopy-Item -Recurse \"$env:USERPROFILE\\Downloads\\aidlc-rules\\aws-aidlc-rules\" \".kiro\\steering\\\"\nCopy-Item -Recurse \"$env:USERPROFILE\\Downloads\\aidlc-rules\\aws-aidlc-rule-details\" \".kiro\\\"\n```\n\nOn Windows (CMD):\n\n```cmd\nmkdir .kiro\\steering\nxcopy %USERPROFILE%\\Downloads\\aidlc-rules\\aws-aidlc-rules .kiro\\steering\\aws-aidlc-rules\\ /E /I\nxcopy %USERPROFILE%\\Downloads\\aidlc-rules\\aws-aidlc-rule-details .kiro\\aws-aidlc-rule-details\\ /E /I\n```\n\nYour project should look like:\n\n```text\n<project-root>/\n    ├── .kiro/\n    │     ├── steering/\n    │     │      ├── aws-aidlc-rules/\n    │     ├── aws-aidlc-rule-details/\n```\n\nTo verify the rules are loaded:\n\n#### Verify in Kiro IDE\n\nOpen the steering files panel and confirm you see an entry for `core-workflow` under `Workspace` as shown in the screenshot below.\n\n<img src=\"./assets/images/kiro-ide-aidlc-rules-loaded.png?raw=true\" alt=\"AI-DLC Rules in Kiro IDE\" width=\"700\" height=\"450\">\n\nWe use Kiro IDE in Vibe mode to run the AI-DLC workflow. This ensures that AI-DLC workflow guides the development workflow in Kiro. At times, Kiro may nudge you to switch to spec mode. Select `No` to such prompts to stay in Vibe mode.\n\n<img src=\"./assets/images/kiro-sdd-nudge.png?raw=true\" alt=\"Staying in Kiro Vibe mode\" width=\"500\" height=\"175\">\n\n#### Verify in Kiro CLI\n\nRun `kiro-cli`, then `/context show`, and confirm entries for `.kiro/steering/aws-aidlc-rules`.\n\n<img src=\"./assets/images/kiro-cli-aidlc-rules-loaded.png?raw=true\" alt=\"AI-DLC Rules in Kiro CLI\" width=\"700\" height=\"660\">\n\n---\n\n### Amazon Q Developer IDE Plugin/Extension\n\nAI-DLC uses [Amazon Q Rules](https://docs.aws.amazon.com/amazonq/latest/qdeveloper-ug/context-project-rules.html) within your project workspace.\n\nThe commands below assume you extracted the zip to your `Downloads` folder so that the resulting path is `Downloads/aidlc-rules/`. If you used a different location, replace `Downloads` with your actual folder path.\n\n> [!NOTE]\n> **Windows users:** if you used File Explorer's **Extract All...** dialog, it defaults to creating a wrapper folder named after the zip (e.g., `ai-dlc-rules-v0.1.8\\aidlc-rules\\...`). Either uncheck/edit that destination so the contents land directly in `Downloads\\aidlc-rules\\` (matching the commands below), or prepend `ai-dlc-rules-v<version>\\` to each `Downloads\\` path in the commands — substituting `<version>` with the release you downloaded.\n\nOn macOS/Linux:\n\n```bash\nmkdir -p .amazonq/rules\ncp -R ~/Downloads/aidlc-rules/aws-aidlc-rules .amazonq/rules/\ncp -R ~/Downloads/aidlc-rules/aws-aidlc-rule-details .amazonq/\n```\n\nOn Windows (PowerShell):\n\n```powershell\nNew-Item -ItemType Directory -Force -Path \".amazonq\\rules\"\nCopy-Item -Recurse \"$env:USERPROFILE\\Downloads\\aidlc-rules\\aws-aidlc-rules\" \".amazonq\\rules\\\"\nCopy-Item -Recurse \"$env:USERPROFILE\\Downloads\\aidlc-rules\\aws-aidlc-rule-details\" \".amazonq\\\"\n```\n\nOn Windows (CMD):\n\n```cmd\nmkdir .amazonq\\rules\nxcopy %USERPROFILE%\\Downloads\\aidlc-rules\\aws-aidlc-rules .amazonq\\rules\\aws-aidlc-rules\\ /E /I\nxcopy %USERPROFILE%\\Downloads\\aidlc-rules\\aws-aidlc-rule-details .amazonq\\aws-aidlc-rule-details\\ /E /I\n```\n\nYour project should look like:\n\n```text\n<project-root>/\n    ├── .amazonq/\n    │     ├── rules/\n    │     │     ├── aws-aidlc-rules/\n    │     ├── aws-aidlc-rule-details/\n```\n\nTo verify the rules are loaded:\n\n1. In the Amazon Q Chat window, click the `Rules` button in the lower right corner.\n2. Confirm you see entries for `.amazonq/rules/aws-aidlc-rules`.\n\n<img src=\"./assets/images/q-ide-aidlc-rules-loaded.png?raw=true\" alt=\"AI-DLC Rules in Q Developer IDE plugin\" width=\"700\" height=\"400\">\n\n---\n\n### Cursor IDE\n\nAI-DLC uses [Cursor Rules](https://cursor.com/docs/context/rules) to implement its intelligent workflow.\n\nThe commands below assume you extracted the zip to your `Downloads` folder so that the resulting path is `Downloads/aidlc-rules/`. If you used a different location, replace `Downloads` with your actual folder path.\n\n> [!NOTE]\n> **Windows users:** if you used File Explorer's **Extract All...** dialog, it defaults to creating a wrapper folder named after the zip (e.g., `ai-dlc-rules-v0.1.8\\aidlc-rules\\...`). Either uncheck/edit that destination so the contents land directly in `Downloads\\aidlc-rules\\` (matching the commands below), or prepend `ai-dlc-rules-v<version>\\` to each `Downloads\\` path in the commands — substituting `<version>` with the release you downloaded.\n\n#### Option 1: Project Rules (Recommended)\n\n**Unix/Linux/macOS:**\n\n```bash\nmkdir -p .cursor/rules\n\ncat > .cursor/rules/ai-dlc-workflow.mdc << 'EOF'\n---\ndescription: \"AI-DLC (AI-Driven Development Life Cycle) adaptive workflow for software development\"\nalwaysApply: true\n---\n\nEOF\ncat ~/Downloads/aidlc-rules/aws-aidlc-rules/core-workflow.md >> .cursor/rules/ai-dlc-workflow.mdc\n\nmkdir -p .aidlc-rule-details\ncp -R ~/Downloads/aidlc-rules/aws-aidlc-rule-details/* .aidlc-rule-details/\n```\n\n**Windows PowerShell:**\n\n```powershell\nNew-Item -ItemType Directory -Force -Path \".cursor\\rules\"\n\n$frontmatter = @\"\n---\ndescription: \"AI-DLC (AI-Driven Development Life Cycle) adaptive workflow for software development\"\nalwaysApply: true\n---\n\n\"@\n$frontmatter | Out-File -FilePath \".cursor\\rules\\ai-dlc-workflow.mdc\" -Encoding utf8\n\nGet-Content \"$env:USERPROFILE\\Downloads\\aidlc-rules\\aws-aidlc-rules\\core-workflow.md\" | Add-Content \".cursor\\rules\\ai-dlc-workflow.mdc\"\n\nNew-Item -ItemType Directory -Force -Path \".aidlc-rule-details\"\nCopy-Item \"$env:USERPROFILE\\Downloads\\aidlc-rules\\aws-aidlc-rule-details\\*\" \".aidlc-rule-details\\\" -Recurse\n```\n\n**Windows CMD:**\n\n```cmd\nmkdir .cursor\\rules\n\n(\necho ---\necho description: \"AI-DLC (AI-Driven Development Life Cycle) adaptive workflow for software development\"\necho alwaysApply: true\necho ---\necho.\n) > .cursor\\rules\\ai-dlc-workflow.mdc\n\ntype \"%USERPROFILE%\\Downloads\\aidlc-rules\\aws-aidlc-rules\\core-workflow.md\" >> .cursor\\rules\\ai-dlc-workflow.mdc\n\nmkdir .aidlc-rule-details\nxcopy \"%USERPROFILE%\\Downloads\\aidlc-rules\\aws-aidlc-rule-details\" \".aidlc-rule-details\\\" /E /I\n```\n\n#### Option 2: AGENTS.md (Simple Alternative)\n\n**Unix/Linux/macOS:**\n\n```bash\ncp ~/Downloads/aidlc-rules/aws-aidlc-rules/core-workflow.md ./AGENTS.md\nmkdir -p .aidlc-rule-details\ncp -R ~/Downloads/aidlc-rules/aws-aidlc-rule-details/* .aidlc-rule-details/\n```\n\n**Windows PowerShell:**\n\n```powershell\nCopy-Item \"$env:USERPROFILE\\Downloads\\aidlc-rules\\aws-aidlc-rules\\core-workflow.md\" \".\\AGENTS.md\"\nNew-Item -ItemType Directory -Force -Path \".aidlc-rule-details\"\nCopy-Item \"$env:USERPROFILE\\Downloads\\aidlc-rules\\aws-aidlc-rule-details\\*\" \".aidlc-rule-details\\\" -Recurse\n```\n\n**Windows CMD:**\n\n```cmd\ncopy \"%USERPROFILE%\\Downloads\\aidlc-rules\\aws-aidlc-rules\\core-workflow.md\" \".\\AGENTS.md\"\nmkdir .aidlc-rule-details\nxcopy \"%USERPROFILE%\\Downloads\\aidlc-rules\\aws-aidlc-rule-details\" \".aidlc-rule-details\\\" /E /I\n```\n\n**Verify Setup:**\n\n1. Open **Cursor Settings → Rules, Commands**\n2. Under **Project Rules**, you should see `ai-dlc-workflow` listed\n3. For `AGENTS.md`, it will be automatically detected and applied\n\n![AI-DLC Rules in Cursor](./assets/images/cursor-ide-aidlc-rules-loaded.png?raw=true \"AI-DLC Rules in Cursor\")\n\n**Directory Structure (Option 1):**\n\n```text\n<my-project>/\n├── .cursor/\n│   └── rules/\n│       └── ai-dlc-workflow.mdc\n└── .aidlc-rule-details/\n    ├── common/\n    ├── inception/\n    ├── construction/\n    ├── extensions/\n    └── operations/\n```\n\n---\n\n### Cline\n\nAI-DLC uses Cline Rules to implement its intelligent workflow.\n\nThe commands below assume you extracted the zip to your `Downloads` folder so that the resulting path is `Downloads/aidlc-rules/`. If you used a different location, replace `Downloads` with your actual folder path.\n\n> [!NOTE]\n> **Windows users:** if you used File Explorer's **Extract All...** dialog, it defaults to creating a wrapper folder named after the zip (e.g., `ai-dlc-rules-v0.1.8\\aidlc-rules\\...`). Either uncheck/edit that destination so the contents land directly in `Downloads\\aidlc-rules\\` (matching the commands below), or prepend `ai-dlc-rules-v<version>\\` to each `Downloads\\` path in the commands — substituting `<version>` with the release you downloaded.\n\n#### Option 1: .clinerules Directory (Recommended)\n\n**Unix/Linux/macOS:**\n\n```bash\nmkdir -p .clinerules\ncp ~/Downloads/aidlc-rules/aws-aidlc-rules/core-workflow.md .clinerules/\nmkdir -p .aidlc-rule-details\ncp -R ~/Downloads/aidlc-rules/aws-aidlc-rule-details/* .aidlc-rule-details/\n```\n\n**Windows PowerShell:**\n\n```powershell\nNew-Item -ItemType Directory -Force -Path \".clinerules\"\nCopy-Item \"$env:USERPROFILE\\Downloads\\aidlc-rules\\aws-aidlc-rules\\core-workflow.md\" \".clinerules\\\"\nNew-Item -ItemType Directory -Force -Path \".aidlc-rule-details\"\nCopy-Item \"$env:USERPROFILE\\Downloads\\aidlc-rules\\aws-aidlc-rule-details\\*\" \".aidlc-rule-details\\\" -Recurse\n```\n\n**Windows CMD:**\n\n```cmd\nmkdir .clinerules\ncopy \"%USERPROFILE%\\Downloads\\aidlc-rules\\aws-aidlc-rules\\core-workflow.md\" \".clinerules\\\"\nmkdir .aidlc-rule-details\nxcopy \"%USERPROFILE%\\Downloads\\aidlc-rules\\aws-aidlc-rule-details\" \".aidlc-rule-details\\\" /E /I\n```\n\n#### Option 2: AGENTS.md (Alternative)\n\n**Unix/Linux/macOS:**\n\n```bash\ncp ~/Downloads/aidlc-rules/aws-aidlc-rules/core-workflow.md ./AGENTS.md\nmkdir -p .aidlc-rule-details\ncp -R ~/Downloads/aidlc-rules/aws-aidlc-rule-details/* .aidlc-rule-details/\n```\n\n**Windows PowerShell:**\n\n```powershell\nCopy-Item \"$env:USERPROFILE\\Downloads\\aidlc-rules\\aws-aidlc-rules\\core-workflow.md\" \".\\AGENTS.md\"\nNew-Item -ItemType Directory -Force -Path \".aidlc-rule-details\"\nCopy-Item \"$env:USERPROFILE\\Downloads\\aidlc-rules\\aws-aidlc-rule-details\\*\" \".aidlc-rule-details\\\" -Recurse\n```\n\n**Windows CMD:**\n\n```cmd\ncopy \"%USERPROFILE%\\Downloads\\aidlc-rules\\aws-aidlc-rules\\core-workflow.md\" \".\\AGENTS.md\"\nmkdir .aidlc-rule-details\nxcopy \"%USERPROFILE%\\Downloads\\aidlc-rules\\aws-aidlc-rule-details\" \".aidlc-rule-details\\\" /E /I\n```\n\n**Verify Setup:**\n\n1. In Cline's chat interface, look for the Rules popover under the chat input field\n2. Verify that `core-workflow.md` is listed and active\n3. You can toggle the rule file on/off as needed\n\n![AI-DLC Rules in Cline](./assets/images/cline-ide-aidlc-rules-loaded.png?raw=true \"AI-DLC Rules in Cline\")\n\n**Directory Structure (Option 1):**\n\n```text\n<my-project>/\n├── .clinerules/\n│   └── core-workflow.md\n└── .aidlc-rule-details/\n    ├── common/\n    ├── inception/\n    ├── construction/\n    ├── extensions/\n    └── operations/\n```\n\n---\n\n### Claude Code\n\nAI-DLC uses Claude Code's project memory file (`CLAUDE.md`) to implement its intelligent workflow.\n\nThe commands below assume you extracted the zip to your `Downloads` folder so that the resulting path is `Downloads/aidlc-rules/`. If you used a different location, replace `Downloads` with your actual folder path.\n\n> [!NOTE]\n> **Windows users:** if you used File Explorer's **Extract All...** dialog, it defaults to creating a wrapper folder named after the zip (e.g., `ai-dlc-rules-v0.1.8\\aidlc-rules\\...`). Either uncheck/edit that destination so the contents land directly in `Downloads\\aidlc-rules\\` (matching the commands below), or prepend `ai-dlc-rules-v<version>\\` to each `Downloads\\` path in the commands — substituting `<version>` with the release you downloaded.\n\n#### Option 1: Project Root (Recommended)\n\n**Unix/Linux/macOS:**\n\n```bash\ncp ~/Downloads/aidlc-rules/aws-aidlc-rules/core-workflow.md ./CLAUDE.md\nmkdir -p .aidlc-rule-details\ncp -R ~/Downloads/aidlc-rules/aws-aidlc-rule-details/* .aidlc-rule-details/\n```\n\n**Windows PowerShell:**\n\n```powershell\nCopy-Item \"$env:USERPROFILE\\Downloads\\aidlc-rules\\aws-aidlc-rules\\core-workflow.md\" \".\\CLAUDE.md\"\nNew-Item -ItemType Directory -Force -Path \".aidlc-rule-details\"\nCopy-Item \"$env:USERPROFILE\\Downloads\\aidlc-rules\\aws-aidlc-rule-details\\*\" \".aidlc-rule-details\\\" -Recurse\n```\n\n**Windows CMD:**\n\n```cmd\ncopy \"%USERPROFILE%\\Downloads\\aidlc-rules\\aws-aidlc-rules\\core-workflow.md\" \".\\CLAUDE.md\"\nmkdir .aidlc-rule-details\nxcopy \"%USERPROFILE%\\Downloads\\aidlc-rules\\aws-aidlc-rule-details\" \".aidlc-rule-details\\\" /E /I\n```\n\n#### Option 2: .claude Directory\n\n**Unix/Linux/macOS:**\n\n```bash\nmkdir -p .claude\ncp ~/Downloads/aidlc-rules/aws-aidlc-rules/core-workflow.md .claude/CLAUDE.md\nmkdir -p .aidlc-rule-details\ncp -R ~/Downloads/aidlc-rules/aws-aidlc-rule-details/* .aidlc-rule-details/\n```\n\n**Windows PowerShell:**\n\n```powershell\nNew-Item -ItemType Directory -Force -Path \".claude\"\nCopy-Item \"$env:USERPROFILE\\Downloads\\aidlc-rules\\aws-aidlc-rules\\core-workflow.md\" \".claude\\CLAUDE.md\"\nNew-Item -ItemType Directory -Force -Path \".aidlc-rule-details\"\nCopy-Item \"$env:USERPROFILE\\Downloads\\aidlc-rules\\aws-aidlc-rule-details\\*\" \".aidlc-rule-details\\\" -Recurse\n```\n\n**Windows CMD:**\n\n```cmd\nmkdir .claude\ncopy \"%USERPROFILE%\\Downloads\\aidlc-rules\\aws-aidlc-rules\\core-workflow.md\" \".claude\\CLAUDE.md\"\nmkdir .aidlc-rule-details\nxcopy \"%USERPROFILE%\\Downloads\\aidlc-rules\\aws-aidlc-rule-details\" \".aidlc-rule-details\\\" /E /I\n```\n\n**Verify Setup:**\n\n1. Start Claude Code in your project directory (CLI: `claude` or VS Code extension)\n2. Use the `/config` command to view current configuration\n3. Ask Claude: \"What instructions are currently active in this project?\"\n\n**Directory Structure (Option 1):**\n\n```text\n<my-project>/\n├── CLAUDE.md\n└── .aidlc-rule-details/\n    ├── common/\n    ├── inception/\n    ├── construction/\n    ├── extensions/\n    └── operations/\n```\n\n---\n\n### GitHub Copilot\n\nAI-DLC uses [GitHub Copilot custom instructions](https://code.visualstudio.com/docs/copilot/customization/custom-instructions) to implement its intelligent workflow. The `.github/copilot-instructions.md` file is automatically detected and applied to all chat requests in the workspace.\n\nThe commands below assume you extracted the zip to your `Downloads` folder so that the resulting path is `Downloads/aidlc-rules/`. If you used a different location, replace `Downloads` with your actual folder path.\n\n> [!NOTE]\n> **Windows users:** if you used File Explorer's **Extract All...** dialog, it defaults to creating a wrapper folder named after the zip (e.g., `ai-dlc-rules-v0.1.8\\aidlc-rules\\...`). Either uncheck/edit that destination so the contents land directly in `Downloads\\aidlc-rules\\` (matching the commands below), or prepend `ai-dlc-rules-v<version>\\` to each `Downloads\\` path in the commands — substituting `<version>` with the release you downloaded.\n\n**Unix/Linux/macOS:**\n\n```bash\nmkdir -p .github\ncp ~/Downloads/aidlc-rules/aws-aidlc-rules/core-workflow.md .github/copilot-instructions.md\nmkdir -p .aidlc-rule-details\ncp -R ~/Downloads/aidlc-rules/aws-aidlc-rule-details/* .aidlc-rule-details/\n```\n\n**Windows PowerShell:**\n\n```powershell\nNew-Item -ItemType Directory -Force -Path \".github\"\nCopy-Item \"$env:USERPROFILE\\Downloads\\aidlc-rules\\aws-aidlc-rules\\core-workflow.md\" \".github\\copilot-instructions.md\"\nNew-Item -ItemType Directory -Force -Path \".aidlc-rule-details\"\nCopy-Item \"$env:USERPROFILE\\Downloads\\aidlc-rules\\aws-aidlc-rule-details\\*\" \".aidlc-rule-details\\\" -Recurse\n```\n\n**Windows CMD:**\n\n```cmd\nmkdir .github\ncopy \"%USERPROFILE%\\Downloads\\aidlc-rules\\aws-aidlc-rules\\core-workflow.md\" \".github\\copilot-instructions.md\"\nmkdir .aidlc-rule-details\nxcopy \"%USERPROFILE%\\Downloads\\aidlc-rules\\aws-aidlc-rule-details\" \".aidlc-rule-details\\\" /E /I\n```\n\n**Verify Setup:**\n\n1. Open VS Code with your project folder\n2. Open the Copilot Chat panel (Cmd/Ctrl+Shift+I)\n3. Select **Configure Chat** (gear icon) > **Chat Instructions** and verify that `copilot-instructions` is listed\n4. Alternatively, type `/instructions` in the chat input to view active instructions\n\n**Directory Structure:**\n\n```text\n<my-project>/\n├── .github/\n│   └── copilot-instructions.md\n└── .aidlc-rule-details/\n    ├── common/\n    ├── inception/\n    ├── construction/\n    ├── extensions/\n    └── operations/\n```\n\n---\n\n### OpenAI Codex\n\nAI-DLC supports OpenAI Codex as a supported coding agent, using the [Codex AGENTS.md](https://developers.openai.com/codex/guides/agents-md) convention to deliver its intelligent workflow. Codex automatically discovers and loads `AGENTS.md` from your project root when you start a session.\n\nThe commands below assume you extracted the zip to your `Downloads` folder so that the resulting path is `Downloads/aidlc-rules/`. If you used a different location, replace `Downloads` with your actual folder path.\n\n> [!NOTE]\n> **Windows users:** if you used File Explorer's **Extract All...** dialog, it defaults to creating a wrapper folder named after the zip (e.g., `ai-dlc-rules-v0.1.8\\aidlc-rules\\...`). Either uncheck/edit that destination so the contents land directly in `Downloads\\aidlc-rules\\` (matching the commands below), or prepend `ai-dlc-rules-v<version>\\` to each `Downloads\\` path in the commands — substituting `<version>` with the release you downloaded.\n\n**Unix/Linux/macOS:**\n\n```bash\ncp ~/Downloads/aidlc-rules/aws-aidlc-rules/core-workflow.md ./AGENTS.md\nmkdir -p .aidlc-rule-details\ncp -R ~/Downloads/aidlc-rules/aws-aidlc-rule-details/* .aidlc-rule-details/\n```\n\n**Windows PowerShell:**\n\n```powershell\nCopy-Item \"$env:USERPROFILE\\Downloads\\aidlc-rules\\aws-aidlc-rules\\core-workflow.md\" \".\\AGENTS.md\"\nNew-Item -ItemType Directory -Force -Path \".aidlc-rule-details\"\nCopy-Item \"$env:USERPROFILE\\Downloads\\aidlc-rules\\aws-aidlc-rule-details\\*\" \".aidlc-rule-details\\\" -Recurse\n```\n\n**Windows CMD:**\n\n```cmd\ncopy \"%USERPROFILE%\\Downloads\\aidlc-rules\\aws-aidlc-rules\\core-workflow.md\" \".\\AGENTS.md\"\nmkdir .aidlc-rule-details\nxcopy \"%USERPROFILE%\\Downloads\\aidlc-rules\\aws-aidlc-rule-details\" \".aidlc-rule-details\\\" /E /I\n```\n\n**Verify Setup:**\n\n1. Start a Codex session in your project directory\n2. Ask Codex: For existing project - \"Using AIDLC analyze the project?\" or For new project \"Using Aidlc what workflow do you see\" .\n3. Codex should describe the AI-DLC three-phase workflow (Inception → Construction → Operations)\n\n> [!NOTE]\n> The `AGENTS.md` file is designed to fit within Codex's instruction budget under default settings. If you add substantial project-specific content and Codex reports that the project documentation exceeds its instruction limit, you can increase the limit in your Codex configuration (for example, by adjusting `project_doc_max_bytes` in your `config.toml` file):\n>\n> ```toml\n> project_doc_max_bytes = 65536  # Example value; choose a limit appropriate for your project\n> ```\n\n**Directory Structure:**\n\n```text\n<my-project>/\n├── AGENTS.md\n└── .aidlc-rule-details/\n    ├── common/\n    ├── inception/\n    ├── construction/\n    ├── extensions/\n    └── operations/\n```\n\n---\n\n### Other Agents\n\nAI-DLC works with any coding agent that supports project-level rules or steering files. The general approach:\n\n1. Place `aws-aidlc-rules/` wherever your agent reads project rules from (consult your agent's documentation).\n2. Place `aws-aidlc-rule-details/` at a sibling level so the rules can reference it.\n\nIf your agent has no convention for rules files, place both folders at your project root and point the agent to `aws-aidlc-rules/` as its rules directory.\n\n---\n\n## Usage\n\n1. Start any software development project by stating your intent starting with the phrase **\"Using AI-DLC, ...\"** in the chat\n2. AI-DLC workflow automatically activates and guides you from there\n3. Answer structured questions that AI-DLC asks you\n4. Carefully review every plan that AI generates. Provide your oversight and validation\n5. Review the execution plan to see which stages will run\n6. Carefully review the artifacts and approve each stage to maintain control\n7. All the artifacts will be generated in the `aidlc-docs/` directory\n\n---\n\n## Three-Phase Adaptive Workflow\n\nAI-DLC follows a structured three-phase approach that adapts to your project's complexity:\n\n### 🔵 INCEPTION PHASE\n\nDetermines **WHAT** to build and **WHY**\n\n- Requirements analysis and validation\n- User story creation (when applicable)\n- Application Design and creating units of work for parallel development\n- Risk assessment and complexity evaluation\n\n### 🟢 CONSTRUCTION PHASE\n\nDetermines **HOW** to build it\n\n- Detailed component design\n- Code generation and implementation\n- Build configuration and testing strategies\n- Quality assurance and validation\n\n### 🟡 OPERATIONS PHASE\n\nDeployment and monitoring (future)\n\n- Deployment automation and infrastructure\n- Monitoring and observability setup\n- Production readiness validation\n\n---\n\n## Key Features\n\n| Feature                   | Description                                                                                               |\n| ------------------------- | --------------------------------------------------------------------------------------------------------- |\n| **Adaptive Intelligence** | Only executes stages that add value to your specific request                                              |\n| **Context-Aware**         | Analyzes existing codebase and complexity requirements                                                    |\n| **Risk-Based**            | Complex changes get comprehensive treatment, simple changes stay efficient                                |\n| **Question-Driven**       | Structured multiple-choice questions in files, not chat                                                   |\n| **Always in Control**     | Review execution plans and approve each phase                                                             |\n| **Extensible**            | Layer custom rules e.g. security, compliance, and organization-specific rules on top of the core workflow |\n\n---\n\n## Extensions\n\nAI-DLC supports an extension system that lets you layer additional rules on top of the core workflow. Extensions are markdown files organized under `aws-aidlc-rule-details/extensions/` and grouped by category (e.g., `security/`, `testing/`).\n\n### How Extensions Work\n\nEach extension consists of two files placed in the same directory:\n\n- A **rules file** (e.g., `security-baseline.md`) containing the extension's rules.\n- An **opt-in file** (e.g., `security-baseline.opt-in.md`) containing a structured multiple-choice question presented to the user during Requirements Analysis.\n\nAt workflow start, AI-DLC scans the `extensions/` directory and loads only `*.opt-in.md` files. During Requirements Analysis, it presents each opt-in prompt to the user. When the user opts in, the corresponding rules file is loaded (derived by naming convention: strip `.opt-in.md`, append `.md`). When the user opts out, the rules file is never loaded. Extensions without a matching `*.opt-in.md` file are always enforced.\n\nOnce enabled, extension rules are blocking constraints — at each stage, the model verifies compliance before allowing the stage to proceed.\n\n### Built-in Extensions\n\nThe `extensions/` directory ships with the following (new extensions may be added over time):\n\n```text\naws-aidlc-rule-details/\n└── extensions/\n    ├── security/                      # Extension category\n    │   └── baseline/\n    │       ├── security-baseline.md          # Baseline security rules\n    │       └── security-baseline.opt-in.md   # Opt-in prompt\n    └── testing/                       # Extension category\n        └── property-based/\n            ├── property-based-testing.md          # Property-based testing rules\n            └── property-based-testing.opt-in.md   # Opt-in prompt\n```\n\n> [!IMPORTANT]\n> The security extension rules are provided as a directional reference for building effective security rules within AI-DLC workflows. Each organization should build, customize, and thoroughly test their own security rules before deploying in production workflows.\n\n### Adding Your Own Extensions\n\nYou can extend an existing category or create an entirely new one.\n\n1. Create a directory under `extensions/` (e.g., `security/compliance/` or `performance/baseline/`).\n2. Add a **rules file** (e.g., `compliance.md`). Follow the same structure as `security-baseline.md`:\n   - Define each rule as a heading in the format `## Rule <PREFIX-NN>: <Title>` where the prefix is a short category identifier and NN is a sequential number (e.g., `COMPLIANCE-01`, `COMPLIANCE-02`). These IDs are referenced in audit logs and compliance summaries, so they must be unique across all loaded extensions.\n   - Include a **Rule** section describing the requirement.\n   - Include a **Verification** section with concrete checks the model should evaluate.\n3. Add a matching **opt-in file** using the naming convention `<name>.opt-in.md` (e.g., `compliance.opt-in.md`). See `security-baseline.opt-in.md` for the expected format. Omitting this file means the extension is always enforced with no user opt-out.\n4. Rules are blocking by default — if verification criteria are not met, the stage cannot proceed until the finding is resolved.\n\n---\n\n## Supporting Tools\n\nThe `scripts/` directory contains supporting tools that enhance the AI-DLC workflow:\n\n### AIDLC Evaluator\n\n**Location:** [`scripts/aidlc-evaluator/`](scripts/aidlc-evaluator/)\n\nAutomated testing and reporting framework for validating changes to AI-DLC workflows. The evaluator provides:\n\n- **Golden Test Cases** — Curated baseline test cases for validation\n- **Execution Framework** — Orchestration for running test cases through evaluation pipelines\n- **Semantic Evaluation** — AI-based assessment of output correctness and completeness\n- **Code Evaluation** — Static analysis (linting, security scanning, duplication detection)\n- **NFR Evaluation** — Non-functional requirements testing (token usage, execution time, cross-model consistency)\n- **CI/CD Integration** — Automated pipelines for PR validation\n\n**Quick Start:**\n\n```bash\ncd scripts/aidlc-evaluator\nuv sync\nuv run python run.py test\n```\n\n**Documentation:** See [scripts/aidlc-evaluator/README.md](scripts/aidlc-evaluator/README.md)\n\n---\n\n### AIDLC Design Reviewer\n\n**Location:** [`scripts/aidlc-designreview/`](scripts/aidlc-designreview/)\n\n⚠️ **EXPERIMENTAL FEATURE** — AI-powered design review tool that analyzes AIDLC design artifacts using Claude models via AWS Bedrock.\n\n**Features:**\n\n- **Multi-Agent Review** — Three specialized AI agents (Critique, Alternatives, Gap Analysis)\n- **Quality Scoring** — Weighted severity analysis with actionable recommendations\n- **Two Deployment Modes:**\n  - **CLI Tool** — On-demand reviews for CI/CD pipelines\n  - **Claude Code Hook** — Real-time review during development (experimental)\n\n**Installation (CLI Tool):**\n\n```bash\ncd scripts/aidlc-designreview\nuv sync --extra test\nsource .venv/bin/activate  # Linux/Mac\ndesign-reviewer --aidlc-docs /path/to/aidlc-docs\n```\n\n**Installation (Claude Code Hook):**\n\n```bash\n# From workspace root\n./scripts/aidlc-designreview/tool-install/install-linux.sh      # Linux\n./scripts/aidlc-designreview/tool-install/install-mac.sh        # macOS\n.\\scripts\\aidlc-designreview\\tool-install\\install-windows.ps1   # Windows PowerShell\n```\n\nThe installer automatically detects your workspace root and installs the hook to `.claude/`.\n\n**Documentation:**\n\n- [scripts/aidlc-designreview/README.md](scripts/aidlc-designreview/README.md) — Main documentation\n- [scripts/aidlc-designreview/INSTALLATION.md](scripts/aidlc-designreview/INSTALLATION.md) — Hook installation guide\n\n---\n\n## Tenets\n\nThese are our core principles to guide our decision making.\n\n- **No duplication**. The source of truth lives in one place. If we add support for new tools or formats that require specific files, we generate them from the source rather than maintaining separate copies.\n\n- **Methodology first**. AI-DLC is fundamentally a methodology, not a tool. Users shouldn't need to install anything to get started. That said, we're open to convenience tooling (scripts, CLIs) down the road if it helps users adopt or extend the methodology.\n\n- **Reproducible**. Rules should be clear enough that different models produce similar outcomes. We know models behave differently, but the methodology should minimize variance through explicit guidance.\n\n- **Agnostic**. The methodology works with any IDE, agent, or model. We don't tie ourselves to specific tools or vendors.\n\n- **Human in the loop**. Critical decisions require explicit user confirmation. The agent proposes, the human approves.\n\n---\n\n## Prerequisites\n\nHave one of our supported platforms/tools for Assisted AI Coding installed:\n\n| Platform                      | Installation Link                                                                                                                                               |\n| ----------------------------- | --------------------------------------------------------------------------------------------------------------------------------------------------------------- |\n| Kiro                          | [Install](https://kiro.dev/)                                                                                                                                    |\n| Kiro CLI                      | [Install](https://kiro.dev/cli/)                                                                                                                                |\n| Amazon Q Developer IDE Plugin | [Install](https://docs.aws.amazon.com/amazonq/latest/qdeveloper-ug/q-in-IDE.html)                                                                               |\n| Cursor IDE                    | [Install](https://cursor.com/)                                                                                                                                  |\n| Cline VS Code Extension       | [Install](https://marketplace.visualstudio.com/items?itemName=saoudrizwan.claude-dev)                                                                           |\n| Claude Code CLI               | [Install](https://github.com/anthropics/claude-code)                                                                                                            |\n| GitHub Copilot                | [Install](https://marketplace.visualstudio.com/items?itemName=GitHub.copilot) + [Chat](https://marketplace.visualstudio.com/items?itemName=GitHub.copilot-chat) |\n\n---\n\n## Troubleshooting\n\n### General Issues\n\n| Problem                      | Solution                                                    |\n| ---------------------------- | ----------------------------------------------------------- |\n| Rules not loading            | Check file exists in the correct location for your platform |\n| File encoding issues         | Ensure files are UTF-8 encoded                              |\n| Rules not applied in session | Start a new chat session after file changes                 |\n| Rule details not loading     | Verify `.aidlc-rule-details/` exists with subdirectories    |\n\n### Platform-Specific Issues\n\n#### Amazon Q Developer / Kiro\n\n- Use `/context show` to verify rules are loaded\n- Check `.amazonq/rules/` or `.kiro/steering/` directory structure\n\n#### Cursor\n\n- For \"Apply Intelligently\", ensure a description is defined in frontmatter\n- Check **Cursor Settings → Rules** to ensure the rule is enabled\n- If rule is too large (>500 lines), split into multiple focused rules\n\n#### Cline\n\n- Check the Rules popover under the chat input field\n- Toggle rule files on/off as needed using the popover UI\n\n#### Claude Code\n\n- Use `/config` command to view current configuration\n- Ask \"What instructions are currently active in this project?\"\n\n#### GitHub Copilot\n\n- Select **Configure Chat** (gear icon) > **Chat Instructions** to verify instructions are loaded\n- Type `/instructions` in the chat input to view active instruction files\n- Check that `.github/copilot-instructions.md` exists in your workspace root\n\n### File Path Issues on Windows\n\n- Use forward slashes `/` in file paths within markdown files\n- Windows paths with backslashes may not work correctly\n\n---\n\n## Version Control Recommendations\n\n**Commit to repository:**\n\n```gitignore\n# These should be version controlled\nCLAUDE.md\nAGENTS.md\n.amazonq/rules/\n.amazonq/aws-aidlc-rule-details/\n.kiro/steering/\n.kiro/aws-aidlc-rule-details/\n.cursor/rules/\n.clinerules/\n.github/copilot-instructions.md\n.aidlc-rule-details/\n```\n\n**Optional - Add to `.gitignore` (if needed):**\n\n```gitignore\n# Local-only settings\n.claude/settings.local.json\n```\n\n---\n\n## Generated aidlc-docs/ Reference\n\nFor the complete reference of all documentation artifacts generated by the AI-DLC workflow, see [docs/GENERATED_DOCS_REFERENCE.md](docs/GENERATED_DOCS_REFERENCE.md).\n\n---\n\n## Experimental                                                                           |\n| Working with AI-DLC (interaction patterns and tips) | [docs/WORKING-WITH-AIDLC.md](docs/WORKING-WITH-AIDLC.md)                                                                      |\n| Contributing Guidelines                             | [CONTRIBUTING.md](CONTRIBUTING.md)                                                                                            |\n| Code of Conduct                                     | [CODE_OF_CONDUCT.md](CODE_OF_CONDUCT.md)                                                                                      |\n\n---\n\n## Additional Resources\n\n<!-- TODO: Replace this Amplify URL with a permanent/stable URL when available -->\n| Resource                                            | Link                                                                                                                          |\n| --------------------------------------------------- | ----------------------------------------------------------------------------------------------------------------------------- |\n| AI-DLC Method Definition Paper                      | [Paper](https://prod.d13rzhkk8cj2z0.amplifyapp.com/)                                                                          |\n| AI-DLC Methodology Blog                             | [AWS Blog](https://aws.amazon.com/blogs/devops/ai-driven-development-life-cycle/)                                             |\n| AI-DLC Open-source Launch Blog                      | [AWS Blog](https://aws.amazon.com/blogs/devops/open-sourcing-adaptive-workflows-for-ai-driven-development-life-cycle-ai-dlc/) |\n| AI-DLC Example Walkthrough Blog                     | [AWS Blog](https://aws.amazon.com/blogs/devops/building-with-ai-dlc-using-amazon-q-developer/)                                |\n| Amazon Q Developer Documentation                    | [Docs](https://docs.aws.amazon.com/amazonq/latest/qdeveloper-ug/q-in-IDE.html)                                                |\n| Kiro CLI Documentation                              | [Docs](https://kiro.dev/docs/cli/steering/)                                                                                   |\n| Cursor Rules Documentation                          | [Docs](https://cursor.com/docs/context/rules)                                                                                 |\n| Claude Code Documentation                           | [GitHub](https://github.com/anthropics/claude-code)                                                                           |\n| GitHub Copilot Documentation                        | [Docs](https://docs.github.com/en/copilot)                                                                                    |\n| Working with AI-DLC (interaction patterns and tips) | [docs/WORKING-WITH-AIDLC.md](docs/WORKING-WITH-AIDLC.md)                                                                      |\n| Contributing Guidelines                             | [CONTRIBUTING.md](CONTRIBUTING.md)                                                                                            |\n| Code of Conduct                                     | [CODE_OF_CONDUCT.md](CODE_OF_CONDUCT.md)                                                                                      |\n\n---\n\n## Contributing\n\nSee [CONTRIBUTING](CONTRIBUTING.md#security-issue-notifications) for more information.\n\n## License\n\nThis library is licensed under the MIT-0 License. See the [LICENSE](LICENSE) file.\n","summary":"AI-DLC (AI-Driven Development Life Cycle) is an intelligent, adaptive workflow framework designed to integrate standardized development practices into AI-assisted coding environments. By providing a structured set of rules and steering files, the project enables developers to maintain rigorous quality standards and consistency while leveraging agentic coding assistants. It supports a variety of popular IDEs and tools, making it an essential resource for engineering teams looking to enhance productivity, control, and reliability throughout their AI-augmented software development life cycle.","description":"AI-Driven Life Cycle (AI-DLC) adaptive workflow steering rules for AI coding agents","stars":2658,"language":"Python"},{"owner":"wojtczyk","repo":"trust","url":"https://github.com/wojtczyk/trust","readme":"# TRUST\n\nTRUST is a retro TUI IDE for Rust projects inspired by classic blue-screen DOS\ndevelopment environments.\n\nStatus: experimental nostalgia project. It edits files, browses Rust projects,\nand runs Cargo commands.\n\n## New IDE Features\n\n- `rust-analyzer` powered autocomplete for Rust files, with a built-in fallback\n  completion list if the language server is unavailable.\n- Clickable top-bar `Run`, `Debug`, and `BP` controls.\n- Source-level breakpoints in the editor gutter and a basic LLDB-backed debug\n  loop with continue and stepping commands.\n\n## Screenshots\n\nBuilding and running \"Hello World\" in TRUST.\n\n| Starting a project | Running a console program |\n| --- | --- |\n| ![Hello project in TRUST](doc/1_hello.png) | ![Hello project editor view](doc/2_hello.png) |\n\nTRUST can build TRUST.\n\n| TRUST Editor | Running Tests |\n| --- | --- |\n| ![TRUST project in TRUST](doc/3_trust.png) | ![TRUST menus and panes](doc/4_trust.png) |\n\n## FAQ\n\n**Why?**  \nBecause Rust deserves a blue-screen IDE from the olden days and someone had to do this.\n\n**Does it save my files?**  \nYes. Use `F2` or `Ctrl+S`. TRUST marks dirty buffers with `*` in the editor title. Still, this is more of a fun project so use at your own risk.\n\n**Is this affiliated with any classic DOS IDE vendor?**  \nNo. TRUST is an independent nostalgia project inspired by classic DOS development environments.\n\n## Run\n\n```sh\ncargo run -- /path/to/rust/project\n```\n\nIf no path is supplied, TRUST opens the current directory.\n\n## Keys\n\n- `F1`: help\n- `F2` / `Ctrl+S`: save\n- `F3` / `Ctrl+O`: open selected file\n- `Backspace`: go to the parent directory in the project pane\n- `F4`: cycle focus\n- `F5` / `Ctrl+R`: `cargo run`\n- `F6`: toggle breakpoint on the current line\n- `F7`: `cargo check`\n- `F8` / `Ctrl+T`: `cargo test`\n- `F9` / `Ctrl+B`: `cargo build`\n- `F10`: open the menu bar\n- `Ctrl+F`: find in the current file\n- `Ctrl+G`: jump to the next search match\n- `Ctrl+Z`: undo\n- `Ctrl+Y` / `Ctrl+Shift+Z`: redo\n- `F11`: debugger step into\n- `F12`: debugger step over\n- `Shift+F11`: debugger step out\n- `Shift+F5`: stop the active debug session\n- `Ctrl+C`: copy selected text\n- `Ctrl+D`: start or continue the debugger\n- `Ctrl+Space`: request autocomplete suggestions\n- `Ctrl+V`: paste clipboard text\n- `Ctrl+X`: cut selected text\n- `Esc` / `Ctrl+Q`: quit\n- `Alt+X`: delete line\n- `Alt+U`: duplicate line\n- `Tab`: indent\n- `Shift+Tab`: unindent\n- `Shift+Navigation`: select text\n- In the editor, `Enter` inserts an auto-indented new line.\n\n## Menus\n\n- `F10` opens the menu bar.\n- Left/right arrows switch menus.\n- Up/down arrows move through a dropdown.\n- `Enter` activates the highlighted menu item.\n- `Esc` closes the menu.\n- Mouse clicks on the menu bar and dropdown items work too.\n- `Edit` now includes `Undo` and `Redo`.\n- `Search` now includes `Find` and `Find next` for the current file.\n- `Debug` contains start/continue, breakpoint, step, and stop commands.\n- `File > New` asks for a filename and creates it in the current project pane\n  directory.\n- `Project > New project` opens the Cargo project dialog with parent directory,\n  project name, and `bin` / `lib` selector.\n- `Window` switches between panes and contains the former focus option.\n\n## Mouse\n\n- Click inside the editor to move the cursor.\n- Click inside the left editor gutter, or use `F6`, to toggle a breakpoint.\n- Drag inside the editor to select text.\n- Click the top bar `Run`, `Debug`, or `BP` buttons to trigger those actions.\n- Click inside the project pane to open editable files or navigate directories.\n- Click inside any pane to focus it.\n- Drag the vertical divider between project and editor panes to resize them.\n- Drag the top border of the compiler/message pane to resize it.\n- Scroll inside the project, editor, or message pane to move through content.\n\nThe project pane lists directories plus editable Rust and Cargo-related files\nsuch as `.rs`, `.toml`, and `.lock`, while skipping `.git`, `target`, and common\neditor/build directories. Compiler output is captured in the bottom pane.\n","summary":"TRUST is a retro-styled TUI IDE designed to provide a classic blue-screen DOS development experience for modern Rust projects. It features comprehensive IDE capabilities, including rust-analyzer-powered autocomplete, source-level debugging with LLDB integration, and convenient controls for common Cargo operations. This project is ideal for developers who appreciate nostalgic aesthetics and want a lightweight, keyboard-driven environment to manage, build, and debug their Rust code.","description":"TRUST – Coding Rust like it's 1989","stars":241,"language":"Rust"},{"owner":"ciembor","repo":"agent-rules-books","url":"https://github.com/ciembor/agent-rules-books","readme":"[![Polish Repo badge](https://polish-open-source.pl/en/badges/repositories/github/ciembor/agent-rules-books.svg)](https://polish-open-source.pl/en/latest)\n\n<div align=\"center\">\n  <img src=\"books-ai-rules.png\" alt=\"AI agent rules from programming books\" />\n  <h1 align=\"center\">AI agents Rules / Skills from<br />Programming Books v0.5</h1>\n\n  <p align=\"center\">\n    <strong>AGENTS.md rules</strong> / <strong>skills</strong> for <strong>Codex</strong>, <strong>Cursor</strong>, <strong>Claude Code</strong>, distilled from classic <strong>software engineering books</strong> about refactoring, architecture, DDD and code quality.\n  </p>\n\n  <p align=\"center\">\n    <a href=\"#about\">About</a>\n    ·\n    <a href=\"#release-matrix\">Rules / Skills</a>\n    ·\n    <a href=\"#books-list\">Books List</a>\n    ·\n    <a href=\"docs/USAGE.md\">Usage</a>\n    ·\n    <a href=\"docs/COMPATIBILITY.md\">Books Compatibility</a>\n  </p>\n</div>\n\n## About\nMIT licensed universal project rules for coding agents.\n\nThis repository contains ready-to-use rule sets inspired by well-known books on software design, architecture, refactoring, legacy code, reliability, and data-intensive systems.\n\nFor editor-specific setup in Codex, Claude Code, and Cursor, see [USAGE.md](docs/USAGE.md). It covers always-on vs on-demand usage, skills, scoped rules, MCP or RAG patterns, and the preferred setup for each editor.\n\nEach rule set is released in three tool-agnostic Markdown versions:\n\n- `mini`: the recommended version for most real task use\n- `nano`: the compact fallback for very tight context budgets\n- `full`: the canonical complete source and reference version\n\nFor constructive criticism from Reddit, see [CRITICISM.md](docs/CRITICISM.md).\n\nFor release history, see [CHANGELOG.md](CHANGELOG.md).\n\n## Release Matrix\n\nMetrics:\n\n- `lines`: physical line count from `wc -l`\n- `rules`: Markdown list items counted with the deterministic release convention\n- `size`: raw bytes from `wc -c`\n\n| Rule Set | Full file | Full lines | Full rules | Full size | Mini file | Mini lines | Mini rules | Mini size | Nano file | Nano lines | Nano rules | Nano size |\n| --- | --- | ---: | ---: | ---: | --- | ---: | ---: | ---: | --- | ---: | ---: | ---: |\n| [A Philosophy of Software Design](a-philosophy-of-software-design/) | [full](a-philosophy-of-software-design/a-philosophy-of-software-design.md) | 370 | 177 | 13561 B | [mini](a-philosophy-of-software-design/a-philosophy-of-software-design.mini.md) | 46 | 28 | 5774 B | [nano](a-philosophy-of-software-design/a-philosophy-of-software-design.nano.md) | 35 | 17 | 2258 B |\n| [Clean Architecture](clean-architecture/) | [full](clean-architecture/clean-architecture.md) | 515 |
