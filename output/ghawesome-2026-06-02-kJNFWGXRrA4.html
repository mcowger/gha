 against the system GTK stack and tend to be smoother.\n\n## Configure AI\n\n1. Open **Settings -> AI**.\n2. Pick a provider and paste your API key. For local inference, point Terax at your LM Studio / MLX / Ollama endpoint.\n3. Keys are written to the OS keychain via `keyring`. They never touch disk or localStorage.\n\n## Build from source\n\n**Prerequisites**\n- Rust (stable), https://rustup.rs\n- Node 20+ and [pnpm](https://pnpm.io)\n- Tauri prerequisites for your platform, https://tauri.app/start/prerequisites/\n\n**Run**\n```bash\npnpm install\npnpm tauri dev          # development\npnpm tauri build        # production bundle\n```\n\n**Checks**\n```bash\npnpm exec tsc --noEmit                                            # frontend type-check\ncd src-tauri && cargo clippy --all-targets --locked -D warnings   # Rust lint (matches CI)\ncd src-tauri && cargo test --locked                               # Rust tests\n```\n\n## Tech stack\n\nTauri 2, Rust, `portable-pty`, React 19, TypeScript, Vite, xterm.js, CodeMirror 6, Vercel AI SDK v6, Tailwind v4, shadcn/ui, Zustand.\n\n## Contributing\n\nIssues and PRs are welcome! Feel free to open issues, suggest features, or submit pull requests. See [CONTRIBUTING.md](CONTRIBUTING.md) for more details.\n\n## License\n\nTerax is licensed under the Apache-2.0 License. For more information on our dependencies, see [Apache License 2.0](LICENSE).\n\n## Star history\n\n<div align=\"center\">\n  <a href=\"https://www.star-history.com/#crynta/terax-ai&Date\">\n    <picture>\n      <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=crynta/terax-ai&type=Date&theme=dark\" />\n      <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=crynta/terax-ai&type=Date\" />\n      <img alt=\"Star History Chart\" src=\"https://api.star-history.com/svg?repos=crynta/terax-ai&type=Date\" />\n    </picture>\n  </a>\n</div>\n","summary":"Terax is a lightweight, open-source terminal and AI-native development environment built with Rust and React for high performance. It integrates a WebGL-powered terminal, a full-featured code editor, source control with git graph visualization, and an agentic AI assistant into a compact, privacy-focused application. Developers who prefer a terminal-first workflow will benefit from its ability to run AI models either locally or via API, while enjoying native tools for file management and web previews without the overhead of traditional IDEs.","description":"Lightweight (7MB) Terminal-first AI-native dev workspace","stars":6509,"language":"TypeScript"},{"owner":"temporalio","repo":"features","url":"https://github.com/temporalio/features","readme":"## Temporal Features\n\nThis repository contains snippets for many Temporal features written in different Temporal SDK languages. This also\ncontains a runner and language-specific harnesses to confirm feature behavior across versions.\n\nThese features serve several purposes:\n\n- Ensure parity across SDKs by having same-feature snippets adjacent to one another\n- Confirm feature behavior across SDK versions\n- Confirm history across SDK versions\n- Document features in different SDKs\n- Easy-to-use environment for writing quick workflows in all languages/versions\n- Verify feature compatibility across different server setups\n\n## Building\n\nWith latest [Go](https://golang.org/) installed, run:\n\n```\ngo build -o temporal-features # or temporal-features.exe on Windows\n```\n\n## Running\n\nPrerequisites:\n\nInstall versions of these runtimes and package managers that are compatible with the checked-in project files\nand lockfiles:\n\n- [Go](https://golang.org/)\n- [JDK](https://adoptium.net/)\n- [Node](https://nodejs.org)\n- [uv](https://docs.astral.sh/uv/)\n- [.NET](https://dotnet.microsoft.com)\n- [PHP](https://www.php.net/) / [Composer](https://getcomposer.org/)\n- [Ruby](https://www.ruby-lang.org/)\n\nCommand:\n\n    temporal-features run --lang LANG [--version VERSION] [PATTERN...]\n\nNote, `go run .` can be used in place of `go build` + `temporal-features` to save on the build step.\n\n`LANG` can be `go`, `java`, `ts`, `php`, `py`, `cs`, or `rb`. `VERSION` is per SDK and if left off, uses the latest version set for\nthe language in this repository.\n\n`PATTERN` must match either the features relative directory _or_ the relative directory + `/feature.<ext>` via\n[Go path match rules](https://pkg.go.dev/path#Match) which notably does not include recursive depth matching. If\n`PATTERN` arguments are not present, the default is to run all features.\n\nSeveral other options are available, some of which are described below. Run `temporal-features run --help` to see all\noptions.\n\n### Preparing\n\nBy default when using `run` and a version, a temporary directory is created with a temporary project, the project is\nbuilt, and then the features are run. To separate the steps, the `prepare` command can be used to prebuild the project\nin a directory. Then `run` can use the `--prepared-dir` to reference that directory.\n\nThe command to prepare is:\n\n    temporal-features prepare --lang LANG --version VERSION --dir DIR\n\nThe version is required and the directory is a simple string name of a not-yet-existing directory to be created directly\nbeneath this SDK features directory. That same directory value can then be provided as `--prepared-dir` to `run`. When\nusing a prepared directory on `run`, a version cannot be specified.\n\n### Building docker images\n\nThe CLI supports building docker images from [prepared](#preparing) features.\n\nThere are 2 types of image builds supported, by SDK version or by git repository ref as shown below:\n\n```\n./temporal-features build-image --lang go --repo-ref master\n```\n\nThe built image will be tagged with `features:go-master`\n\n```\n./temporal-features build-image --lang go --version v1.13.1\n```\n\nThe built image will be tagged with `features:go-1.13.1`\n\n- To tag as latest minor, pass `--semver-latest minor`, this will add the `go-1.13` tag.\n- To tag as latest major, pass `--semver-latest major`, this will add the `go-1.13`, `go-1` and `go` tags.\n\n### External Server and Namespace\n\nBy default, a [CLI Dev Server](https://github.com/temporalio/cli/#start-the-server) is dynamically started at runtime to handle all\nfeature runs and a namespace is dynamically generated. To not start the embedded server, use `--server` to specify the\naddress of a server to use. Similarly, to not use a dynamic namespace (that may not be registered on the external\nserver), use `--namespace`.\n\nNote: features under `features/nexus/` are not supported against Temporal Cloud — they\nrequire `OperatorService.CreateNexusEndpoint`, which is only exposed on self-hosted\nservers (e.g. the dev server).\n\n### History Checking\n\nHistory files are present at `features/<path/to/feature>/history/history.<lang>.<version>.json`. By default, three\nhistory checks are performed:\n\n1. Specific languages use their replayers to replay the just-executed workflow's history to confirm it works.\n2. Specific languages use their replayers to replay all history files with versions <= the current version to confirm it\n   works.\n3. The primary runner scrubs the history of the just-executed workflow of all execution-dependent values. Then it\n   compares the exact events to all similarly-scrubbed history files.\n\nCurrently there are not ways for features to opt out of specific history checks. To opt out of all history checking for\na specific run, use `--no-history-check`.\n\n## Writing Features\n\nDevelopers can write workflows and activities that represent a SDK \"feature\". These are organized into directories under\nthe `features/` directory.\n\nIn addition to code for the feature, there are configuration settings that can be set in `.config.json`. The possible\nsettings are:\n\n- `go`\n  - `minVersion` - Minimum version in Go this feature should be run in. The feature will be skipped in older versions.\n\nThere are also files in the `history/` subdirectory which contain history files used during run. See the\n\"History Checking\" and \"Generating History\" sections for more info.\n\n### Writing snippets for documentation\n\nThe repo can also be used as a way to author buildable/testable example snippets for our documentation. This is done\nusing Snipsync as described in the \n[documentation repo](https://github.com/temporalio/documentation/blob/main/CONTRIBUTING.md#snipsync).\n\nSnippets may be sourced from normal features, or, if writen purely for usage as a docs snippet they should be placed\nin `features/snippets/snippet_name`. Beyond the path prefix, the folder contents should follow the same practices\nas for a normal feature.\n\nTo define a snippet, use syntax like the following, where hellouniverse is the snippet identifier.\n\n```\n// @@@SNIPSTART hellouniverse\nfunc HelloUniverse() {\n\tfmt.Println(\"Hello Universe!\")\n}\n// @@@SNIPEND\n```\n\n### Best Practices\n\n- Try to only demonstrate/test one feature per feature directory.\n  - Code should be kept as short and clear as possible.\n  - No need to over-assert on a bunch of values, just confirm that the feature does what is expected via its output.\n- A Go feature should be in `feature.go`.\n  - For incompatible versions, different files like `feature_pre1.11.0.go` can be present using build tags\n- A Java feature should be in `feature.java`.\n- A TypeScript feature should be in `feature.ts`.\n\n  **NOTE**: TypeScript features include workflow and non workflow code in the same file. Those are run in different\n  environments so they may not share variables and the feature author should keep the workflow runtime limitations in\n  mind when writing features.\n\n- A Python feature should be in `feature.py`.\n- A Ruby feature should be in `feature.rb`.\n- Add a README.md to each feature directory.\n  - README should have a title summarizing the feature (only first letter needs to be in title case), then a short\n    paragraph explaining the feature and its purpose, and then optionally another paragraph explaining details of the\n    specific code steps.\n  - Other sections can also explain decisions made in language specific ways or other details about versions/approaches.\n  - Feel free to add links and more text as necessary.\n- Verification/regression feature directories for bugs should be under `features/bugs/<lang>`.\n  - Ideally the checking of the result has a version condition that shows in earlier versions it should fail and in\n    newer versions it should succeed.\n- The more languages per non-bug feature, the better. Try not to create non-bug features that use specific language\n  constructs unless that's the purpose of the feature.\n- Refactor liberally to create shortcuts and better harnesses for making features easy to read and write.\n  - This is not a library used by anyone, there are no backwards compatibility concerns. If one feature uses something\n    that has value to another, extract and put in helper/harness and have both use it.\n- History should be generated for each feature on the earliest version the feature is expected to work at without\n  history changes.\n\n#### Generating History\n\nTo generate history, run the same test (see the \"Running\" section) for the version to generate at, but use the\n`--generate-history` option. When generating history, only one test can be specified and the version of the SDK must be\nspecified. Any existing history for that feature, language, and version will be overwritten.\n\nHistory generation should only be needed when first developing a feature or when a version intentionally introduces an\nincompatibility. Otherwise, history files should remain checked in and not regenerated.\n\n## Usage within CI\n\nThe repo defines GitHub workflows which are designed to allow running the SDK features suites\nagainst changes to an SDK, or against changes to server. The former is accomplished by syncing the\nSDK repo and using it as a path-version when running the suites. The latter is accomplished by\nbuilding the changes to server into a docker image, and using that docker image for the server\nwhen running the suites.\n\nPublishing docker images of the features runner/suites is also supported. It may be run\n[manually](https://github.com/temporalio/features/actions/workflows/all-docker-images.yaml),\nbut is also triggered by default on each push to main.\n\nThe dynamic configuration file located at `dockerfiles/dynamicconfig/docker.yaml` defines the dynamic configuration\nsettings needed for features to run, and should be used as part of or all of the dynamic config settings for any\nexternal server not using the basic docker-compose setup.\n\n## TODO\n\n- Add support for replaying testing of all versions _inside_ each SDKs harness as part of the run\n- Add many more feature workflows\n- Document how to use this framework to easily write and test features even when not committing\n- Log swallowing and concurrent execution\n- Investigate support for changing runtime versions (i.e. Go, Java, and Node versions)\n- Investigate support for changing server versions\n- CI support\n  - Support using a commit hash and alternative git location for an SDK to run against\n","summary":"The Temporal Features repository serves as a centralized test and demonstration suite for validating Temporal SDK capabilities across multiple supported programming languages. It provides a robust harness for running feature-specific code snippets, allowing developers to ensure parity, verify compatibility across SDK versions, and test history consistency. This project is particularly beneficial for Temporal contributors and SDK maintainers who need to validate cross-platform behavior or rapidly prototype workflow features in a controlled, multi-language environment.","description":"Behavior and history compatibility testing for Temporal SDKs","stars":29,"language":"Go"},{"owner":"modem-dev","repo":"hunk","url":"https://github.com/modem-dev/hunk","readme":"# hunk\n\nHunk is a review-first terminal diff viewer for agent-authored changesets, built on [OpenTUI](https://github.com/anomalyco/opentui) and [Pierre diffs](https://www.npmjs.com/package/@pierre/diffs).\n\n[![CI status](https://img.shields.io/github/actions/workflow/status/modem-dev/hunk/ci.yml?branch=main&style=for-the-badge&label=CI)](https://github.com/modem-dev/hunk/actions/workflows/ci.yml?branch=main)\n[![Latest release](https://img.shields.io/github/v/release/modem-dev/hunk?style=for-the-badge)](https://github.com/modem-dev/hunk/releases)\n[![MIT License](https://img.shields.io/badge/License-MIT-blue.svg?style=for-the-badge)](LICENSE)\n\n- multi-file review stream with sidebar navigation\n- inline AI and agent annotations beside the code\n- split, stack, and responsive auto layouts\n- watch mode for auto-reloading file and Git-backed reviews\n- keyboard, mouse, pager, and Git difftool support\n\n<table>\n <tr>\n   <td width=\"60%\" align=\"center\">\n    <img width=\"845\" alt=\"image\" src=\"https://github.com/user-attachments/assets/35605618-be3f-479e-b6e0-edb089910651\" />\n     <br />\n     <sub>Split view with sidebar and inline AI notes</sub>\n   </td>\n   <td width=\"40%\" align=\"center\">\n     <img width=\"507\"alt=\"image\" src=\"https://github.com/user-attachments/assets/92eb8993-f044-436d-a038-8139da5ad8de\" />\n     <br />\n     <sub>Stacked view and mouse-selectable menus</sub>\n   </td>\n </tr>\n</table>\n\n## Install\n\n```bash\nnpm i -g hunkdiff\n```\n\nOr with Homebrew:\n\n```bash\nbrew install modem-dev/tap/hunk\n```\n\nRequirements:\n\n- Node.js 18+\n- macOS, Linux, or Windows\n- Git recommended for most workflows\n\n> Nix users can use the `default` package exported in `flake.nix` instead. See [nix/README.md](./nix/README.md) for details.\n\n## Quick start\n\n```bash\nhunk           # show help\nhunk --version # print the installed version\n```\n\n### Working with Git\n\nHunk mirrors Git's diff-style commands, but opens the changeset in a review UI instead of plain text.\n\n```bash\nhunk diff                      # review current repo changes, including untracked files\nhunk diff --watch              # auto-reload as the working tree changes\nhunk show                      # review the latest commit\nhunk show HEAD~1               # review an earlier commit\n```\n\n### Working with Jujutsu\n\nHunk auto-detects Jujutsu checkouts, so `hunk diff [revset]` and `hunk show [revset]` use jj revsets inside a jj workspace. To override VCS detection, set `vcs = \"git\"` or `vcs = \"jj\"` in [config](#config).\n\n### Working with raw files and patches\n\n```bash\nhunk diff before.ts after.ts                # compare two files directly\nhunk diff before.ts after.ts --watch        # auto-reload when either file changes\ngit diff --no-color | hunk patch -          # review a patch from stdin\n```\n\n### Working with agents\n\n1. Open Hunk in another terminal with `hunk diff` or `hunk show`.\n2. Tell your agent to add the skill file returned by `hunk skill path`.\n3. Ask your agent to use the skill against the live Hunk session.\n\nA good generic prompt is:\n\n```text\nLoad the Hunk skill and use it for this review.\n```\n\nFor the full live-session and `--agent-context` workflow guide, see [docs/agent-workflows.md](docs/agent-workflows.md).\n\n## Feature comparison\n\n| Capability                         | [hunk](https://github.com/modem-dev/hunk) | [lumen](https://github.com/jnsahaj/lumen) | [difftastic](https://github.com/Wilfred/difftastic) | [delta](https://github.com/dandavison/delta) | [diff-so-fancy](https://github.com/so-fancy/diff-so-fancy) | [diff](https://www.gnu.org/software/diffutils/) |\n| ---------------------------------- | ----------------------------------------- | ----------------------------------------- | --------------------------------------------------- | -------------------------------------------- | ---------------------------------------------------------- | ----------------------------------------------- |\n| Review-first interactive UI        | ✅                                        | ✅                                        | ❌                                                  | ❌                                           | ❌                                                         | ❌                                              |\n| Multi-file review stream + sidebar | ✅                                        | ✅                                        | ❌                                                  | ❌                                           | ❌                                                         | ❌                                              |\n| Inline agent / AI annotations      | ✅                                        | ❌                                        | ❌                                                  | ❌                                           | ❌                                                         | ❌                                              |\n| Responsive auto split/stack layout | ✅                                        | ❌                                        | ❌                                                  | ❌                                           | ❌                                                         | ❌                                              |\n| Mouse support inside the viewer    | ✅                                        | ✅                                        | ❌                                                  | ❌                                           | ❌                                                         | ❌                                              |\n| Runtime view toggles               | ✅                                        | ✅                                        | ❌                                                  | ❌                                           | ❌                                                         | ❌                                              |\n| Syntax highlighting                | ✅                                        | ✅                                        | ✅                                                  | ✅                                           | ❌                                                         | ❌                                              |\n| Structural diffing                 | ❌                                        | ❌                                        | ✅                                                  | ❌                                           | ❌                                                         | ❌                                              |\n| Pager-compatible mode              | ✅                                        | ❌                                        | ✅                                                  | ✅                                           | ✅                                                         | ✅                                              |\n\nHunk is optimized for reviewing a full changeset interactively.\n\n## Advanced\n\n### Config\n\nYou can persist preferences to a config file:\n\n- `~/.config/hunk/config.toml`\n- `.hunk/config.toml`\n\nExample:\n\n```toml\ntheme = \"graphite\"   # graphite, midnight, paper, ember, catppuccin-latte, catppuccin-mocha, custom\nmode = \"auto\"        # auto, split, stack\nvcs = \"git\"          # git, jj\nwatch = false\nexclude_untracked = false\nline_numbers = true\nwrap_lines = false\nagent_notes = false\n```\n\n`exclude_untracked` affects Git working-tree `hunk diff` sessions only.\n\nCustom themes can inherit from any built-in base theme and override only the colors you care about:\n\n```toml\ntheme = \"custom\"\n\n[custom_theme]\nbase = \"graphite\"    # graphite, midnight, paper, ember, catppuccin-latte, catppuccin-mocha\nlabel = \"My Theme\"\naccent = \"#7fd1ff\"\npanel = \"#10161d\"\nnoteBorder = \"#c49bff\"\n\n[custom_theme.syntax]\nkeyword = \"#8ed4ff\"\nstring = \"#c7b4ff\"\ncomment = \"#6e85a7\"\n```\n\nAll custom theme colors must use `#rrggbb` hex values.\n\n### Git integration\n\nSet Hunk as your Git pager so `git diff` and `git show` open in Hunk automatically:\n\n> [!NOTE]\n> Untracked files are auto-included only for Hunk's own `hunk diff` working-tree loader. If you open `git diff` through `hunk pager`, Git still decides the patch contents, so untracked files will not appear there.\n\n```bash\ngit config --global core.pager \"hunk pager\"\n```\n\nOr in your Git config:\n\n```ini\n[core]\n    pager = hunk pager\n```\n\nIf you want to keep Git's default pager and add opt-in aliases instead:\n\n```bash\ngit config --global alias.hdiff \"-c core.pager=\\\"hunk pager\\\" diff\"\ngit config --global alias.hshow \"-c core.pager=\\\"hunk pager\\\" show\"\n```\n\n### Jujutsu pager integration\n\nTo use Hunk as jj's pager, run `jj config edit --user` and update:\n\n```toml\n[ui]\npager = [\"hunk\", \"pager\"]\ndiff-formatter = \":git\"\n```\n\n### OpenTUI component\n\nHunk also publishes `HunkDiffView` and lower-level primitives from `hunkdiff/opentui` for embedding the same diff renderer in your own OpenTUI app.\n\nSee [docs/opentui-component.md](docs/opentui-component.md) for install, API, and runnable examples.\n\n## Examples\n\nReady-to-run demo diffs live in [`examples/`](examples/README.md).\n\nEach example includes the exact command to run from the repository root.\n\n## Contributing\n\n💬 _Chat with users/contributors on the [Modem Discord server](https://discord.gg/WZFjaP6Gt8)_\n\nFor source setup, tests, packaging checks, and repo architecture, see [CONTRIBUTING.md](CONTRIBUTING.md).\n\n## Sponsor\n\nSponsored by [Modem](https://modem.dev?utm_source=github&utm_medium=oss&utm_campaign=oss_hunk&utm_content=readme_footer).\n\n<a href=\"https://modem.dev?utm_source=github&utm_medium=oss&utm_campaign=oss_hunk&utm_content=readme_footer\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://modem.dev/images/logo/svg/modem-combined-white.svg\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://modem.dev/images/logo/svg/modem-combined-black.svg\">\n    <img src=\"https://modem.dev/images/logo/svg/modem-combined-black.svg\" alt=\"Modem\" width=\"220\">\n  </picture>\n</a>\n\n## License\n\n[MIT](LICENSE)\n","summary":"Hunk is an interactive, terminal-based diff viewer specifically optimized for reviewing complex code changesets and agent-authored content. The tool offers a feature-rich interface including multi-file navigation, responsive split-screen layouts, and inline support for AI and agent annotations. It integrates seamlessly with Git and Jujutsu workflows, providing a robust solution for developers and AI engineers who need a highly readable, efficient way to audit code changes directly in the command line.","description":"Review-first terminal diff viewer for agentic coders","stars":4539,"language":"TypeScript"},{"owner":"haydenbleasel","repo":"files-sdk","url":"https://github.com/haydenbleasel/files-sdk","readme":"# Files SDK\n\nA unified storage SDK for object and blob backends. One small, honest API. Web-standards I/O. An escape hatch when you need the native client.\n\n## Install\n\n```sh\nnpm install files-sdk\n```\n\nEach provider's native SDK is an **optional peer dependency** — install only the ones you actually use, alongside `files-sdk` itself. A few examples:\n\n```sh\n# S3 (and any S3-compatible: R2, MinIO, DigitalOcean Spaces, Backblaze B2, Wasabi, …)\nnpm install files-sdk @aws-sdk/client-s3 @aws-sdk/s3-presigned-post @aws-sdk/s3-request-presigner\n\n# Google Cloud Storage\nnpm install files-sdk @google-cloud/storage google-auth-library\n\n# Azure Blob Storage\nnpm install files-sdk @azure/storage-blob @azure/core-auth @azure/identity\n\n# Vercel Blob\nnpm install files-sdk @vercel/blob\n```\n\nSee [files-sdk.dev](https://files-sdk.dev) for the per-adapter install command. If you import an adapter without its peer installed, Node will throw `ERR_MODULE_NOT_FOUND` naming the missing package.\n\n## Quick start\n\n```ts\nimport { Files } from \"files-sdk\";\nimport { s3 } from \"files-sdk/s3\";\n\nconst files = new Files({\n  adapter: s3({ bucket: \"uploads\" }),\n});\n\nawait files.upload(\"avatars/abc.png\", file, { contentType: \"image/png\" });\nconst got = await files.download(\"avatars/abc.png\");\nconst exists = await files.exists(\"avatars/abc.png\");\n```\n\nSwap the adapter import (`files-sdk/r2`, `files-sdk/gcs`, `files-sdk/azure`, …) and the rest of your code stays the same.\n\n## File handles\n\nUse `files.file(key)` when your application code works with the same object repeatedly:\n\n```ts\nconst avatar = files.file(\"avatars/abc.png\");\n\nawait avatar.upload(file, { contentType: \"image/png\" });\n\nif (await avatar.exists()) {\n  const meta = await avatar.head();\n  const url = await avatar.url({ expiresIn: 300 });\n}\n\nawait avatar.delete();\n```\n\nFile handles are a thin layer over the same adapter methods, so adapters do not need to implement anything extra.\n\n## What you get\n\n- **One API across providers** — `upload`, `download`, `head`, `exists`, `delete`, `copy`, `move`, `list`/`listAll`, `url`, `signedUploadUrl`, plus `file(key)` for a key-scoped handle. The shape is the same on S3, GCS, Azure, Vercel Blob, the local filesystem, and consumer providers like Dropbox. `exists` returns `false` only when the provider reports `NotFound`; auth, permission, and transport failures still throw.\n- **Web-standard I/O** — bodies are `Blob`, `File`, `ReadableStream`, `Uint8Array`, `ArrayBuffer`, or `string`. No provider-specific types leak into your code.\n- **Escape hatch** — every adapter exposes its native client at `files.raw`, so provider-specific features are one property access away.\n- **Tree-shakeable** — each adapter is a separate entry point. You only bundle what you import.\n\n## Adapters\n\nA growing catalog covering S3 and S3-compatible stores, the major cloud blob platforms, edge/serverless blob services, the local filesystem, and consumer file providers. See [files-sdk.dev](https://files-sdk.dev) for the current list and per-adapter setup.\n\n## AI tools\n\nA growing set of subpaths wrap a configured `Files` instance as ready-made tools for popular AI SDKs — currently the [Vercel AI SDK](https://ai-sdk.dev) (`files-sdk/ai-sdk`), OpenAI's [Responses API](https://platform.openai.com/docs/api-reference/responses) and [Agents SDK](https://openai.github.io/openai-agents-js/) (`files-sdk/openai`), and Anthropic's [Claude Agent SDK](https://docs.claude.com/en/api/agent-sdk/overview) (`files-sdk/claude`). All share the same file operations and approval-gating defaults, so models can browse, read, and (optionally) mutate your bucket through the same unified surface as your application code. See [files-sdk.dev](https://files-sdk.dev) for the current list and per-SDK setup.\n\n## License\n\nMIT\n","summary":"Files SDK is a unified storage interface that provides a consistent API for interacting with various object and blob storage providers, including S3, Google Cloud, Azure, and Vercel Blob. By utilizing web-standard I/O and tree-shakeable adapters, it allows developers to swap storage backends seamlessly while maintaining access to native provider features via a built-in escape hatch. This library is an ideal solution for engineers who want to avoid vendor lock-in and simplify file management across diverse cloud environments and AI integration workflows.","description":"A unified storage SDK for object and blob backends. One small, honest API. Web-standards I/O.","stars":1184,"language":"TypeScript"},{"owner":"orhun","repo":"ratty","url":"https://github.com/orhun/ratty","readme":"<p align=\"center\">\n<img width=\"300\" src=\"https://raw.githubusercontent.com/orhun/ratty/refs/heads/main/website/assets/images/ratty-logo.gif\" />\n<br>\n<br>\n<b>Ratty: A GPU-rendered terminal emulator with inline 3D graphics</b> 🧀\n<br>\n<sup>\nInspired by TempleOS | Built with Rust & Ratatui\n</sup>\n<br>\n<img src=\"https://img.shields.io/badge/Built_with-Ratatui-000?logo=ratatui&amp;logoColor=fff&amp;labelColor=201a16&amp;color=ffd970\" alt=\"Built with Ratatui badge\">\n</p>\n\n<div>\n  <video src=\"https://github.com/user-attachments/assets/17eda86b-d00f-401b-9cf4-38343fa71386\" alt=\"Ratty Demo\"/>\n</div>\n\n[\"Rodent-obsessed developer creates Ratty to bring 3D graphics to the command line\"](https://www.theregister.com/software/2026/05/11/ratty-terminal-emulator-brings-3d-graphics-to-the-command-line/5238299) - The Register  \n[\"This New Terminal is Absurd (But Totally Fun)\"](https://itsfoss.com/ratty-terminal/) - It's FOSS  \n[\"10 weird OSS projects you need right now... \"](https://www.youtube.com/watch?v=qPuzWFvRajk) - Fireship\n\n## Features\n\n- Spinning rat cursor ([customizable](#changing-the-cursor))\n- Traditional 2D and [new 3D mode](#3d-mode)!\n- [Inline 3D objects](#inline-3d-objects)\n- [GPU-backed text rendering](#rendering-pipeline)\n- Image support (via Kitty Graphics Protocol >:\\()\n\n▶️ [Watch the demo video here!](https://youtu.be/cY9AX5j-osY)  \n📚 [Read the behind the scenes blog post here!](https://blog.orhun.dev/introducing-ratty)\n\n### 3D mode\n\nEver wondered what's _behind_ the terminal? Press <kbd>Ctrl</kbd>+<kbd>Alt</kbd>+<kbd>Enter</kbd>!\n\n<div>\n  <video width=\"80%\" src=\"https://github.com/user-attachments/assets/173971cc-b6bb-4897-857a-5db8e3c9e161\"/>\n</div>\n\n## Installation\n\n[![Packaging status](https://repology.org/badge/vertical-allrepos/ratty.svg)](https://repology.org/project/ratty/versions)\n\nRequirements:\n\n- A GPU / graphics stack supported by Bevy and wgpu\n- Melted cheese (optional but recommended)\n\n### [crates.io](https://crates.io/crates/ratty)\n\n```bash\ncargo install ratty\n```\n\n### [Arch Linux](https://archlinux.org/packages/extra/x86_64/ratty/)\n\n```bash\nsudo pacman -S ratty\n```\n\n### Binary releases\n\nPrebuilt binaries are available on the [GitHub releases page](https://github.com/orhun/ratty/releases) for direct download.\n\n### From Git\n\nRequirements:\n\n- Rust toolchain with Cargo\n- on Bazzite / Bluefin: `sudo rpm-ostree install gcc fontconfig-devel wayland-devel` (then reboot)\n- on Debian / Ubuntu: `sudo apt-get update ; sudo apt-get install gcc pkgconf libfontconfig-dev libwayland-dev`\n- on Fedora: `sudo dnf install gcc fontconfig-devel wayland-devel`\n\n```bash\ncargo install --git https://github.com/orhun/ratty\n```\n\n## Configuration\n\nThe default configuration file is available in [`config/ratty.toml`](config/ratty.toml).\n\nYou can copy this file to `$HOME/.config/ratty/ratty.toml` and customize it.\n\n### Changing the cursor\n\n```toml\n[cursor.model]\npath = \"CairoSpinyMouse.obj\"\nscale_factor = 6.0\nbrightness = 0.5\nx_offset = 0.5\nplane_offset = 18.0\nvisible = true\n\n[cursor.animation]\nspin_speed = 1.4\nbob_speed = 2.2\nbob_amplitude = 0.08\n```\n\nFor [`cursor.model.path`](config/ratty.toml), Ratty supports both `.obj` and `.glb` assets.\n\nOther useful cursor fields are:\n\n- `scale_factor`: scales the model relative to the terminal cell size\n- `brightness`: adjusts the cursor material brightness\n- `x_offset`: shifts the cursor model horizontally inside the cell\n- `plane_offset`: pushes the cursor away from the warped terminal surface in 3D mode\n- `visible`: show the custom 3D cursor model instead of only the terminal cursor\n\n## Key Bindings\n\n| Key                                             | Action               |\n| ----------------------------------------------- | -------------------- |\n| <kbd>Ctrl</kbd>+<kbd>Alt</kbd>+<kbd>C</kbd>     | Copy selection       |\n| <kbd>Ctrl</kbd>+<kbd>Alt</kbd>+<kbd>V</kbd>     | Paste clipboard      |\n| <kbd>Ctrl</kbd>+<kbd>Alt</kbd>+<kbd>Enter</kbd> | Toggle 2D / 3D mode  |\n| <kbd>Ctrl</kbd>+<kbd>Alt</kbd>+<kbd>M</kbd>     | Toggle Mobius mode   |\n| <kbd>Ctrl</kbd>+<kbd>Alt</kbd>+<kbd>Up</kbd>    | Increase warp        |\n| <kbd>Ctrl</kbd>+<kbd>Alt</kbd>+<kbd>Down</kbd>  | Decrease warp        |\n| <kbd>Alt</kbd>+<kbd>PageUp</kbd>                | Scroll one page up   |\n| <kbd>Alt</kbd>+<kbd>PageDown</kbd>              | Scroll one page down |\n| <kbd>Alt</kbd>+<kbd>Up</kbd>                    | Scroll one line up   |\n| <kbd>Alt</kbd>+<kbd>Down</kbd>                  | Scroll one line down |\n| <kbd>Ctrl</kbd>+<kbd>=</kbd>                    | Increase font size   |\n| <kbd>Ctrl</kbd>+<kbd>-</kbd>                    | Decrease font size   |\n| <kbd>Ctrl</kbd>+<kbd>Alt</kbd>+<kbd>0</kbd>     | Reset font size      |\n\n## Inline 3D objects\n\nRatty uses its own protocol, the [Ratty Graphics Protocol](protocols/graphics.md),\nto place inline 3D objects in terminal space.\n\nRGP supports:\n\n- registering `.obj` and `.glb` assets by path\n- placing them at terminal cell anchors\n- animation, scale, color, depth and other attributes\n\nThere is a Ratatui widget called `ratatui-rgp` available in\n[`widget/`](widget/) if you want to build your own terminal applications that involve inline 3D objects.\n\n### Examples\n\n#### [Big rat](widget/examples/big_rat.rs)\n\nPlaces a single oversized rat directly in your terminal:\n\n<div>\n  <video width=\"80%\" src=\"https://github.com/user-attachments/assets/e955d09a-d0eb-4bad-b3b2-fc1331f49646\"/>\n</div>\n\n#### [Document](widget/examples/document.rs)\n\nTempleOS-inspired document demo with editable text and embedded inline 3D objects:\n\n<div>\n  <video width=\"80%\" src=\"https://github.com/user-attachments/assets/f3a085b0-9e34-4b6f-92fb-90eff9f11776\"/>\n</div>\n\n#### [Draw](widget/examples/draw.rs)\n\nSplit-pane drawing demo with a 2D canvas on the left and a live 3D preview on the right:\n\n<div>\n  <video width=\"80%\" src=\"https://github.com/user-attachments/assets/8b53515b-b887-4d03-a54c-7e7aa7ea128c\"/>\n</div>\n\n### Apps\n\nHere are some applications explicitly built around Ratty's Graphics Protocol:\n\n#### [Ratscad](https://github.com/qewer33/ratscad)\n\nTerminal CAD:\n\n<div>\n  <video width=\"80%\" src=\"https://github.com/user-attachments/assets/7fe31947-b734-4d19-9fba-ef606cc7b975\"/>\n</div>\n\n#### [Ratty-runner](https://github.com/ozzyocak/ratty-runner)\n\nEndless runner built for Ratty:\n\n<div>\n  <video width=\"80%\" src=\"https://github.com/user-attachments/assets/bf3b84a9-7f45-4fac-ae91-240c7ce7c70e\"/>\n</div>\n\n#### [ComChan](https://github.com/Vaishnav-Sabari-Girish/ComChan)\n\nA blazingly fast serial monitor with plotter TUI and 3D telemetry\n\n<div>\n  <video width=\"80%\" src=\"https://github.com/user-attachments/assets/29ba6751-65d7-4103-86b3-705ef47dbbfd\"/>\n</div>\n\n## Architecture\n\n### Rendering pipeline\n\nThe terminal surface currently uses [`ratatui`](https://github.com/ratatui/ratatui) for the UI buffer,\n[`parley_ratatui`](https://github.com/gold-silver-copper/parley_ratatui) for text shaping/rendering\nand [Bevy](https://bevyengine.org/) for scene presentation.\n\nCurrent workflow:\n\n1. Ratatui buffer on CPU\n2. Parley/Vello renders on GPU\n3. Read back RGBA to CPU\n4. Copy into Bevy image\n5. Bevy presents that image in 2D and 3D\n\nTerminal drawing is GPU-rendered through Parley/Vello, but the main terminal\nimage still crosses back through CPU memory before Bevy presents it. This is a\nGPU-powered bridge, not a fully GPU-resident shared-texture path.\n\nIf the project later moves to a fully GPU-resident path, that will require a\ndedicated Bevy render integration that renders into a Bevy-owned texture on\nBevy's render-world device instead of using the current readback bridge.\n\n## Endorsements\n\n- _\"This is like a legitimately cool project but also I just spent like 20 minutes adjusting the config for the rat spinning to see him spin faster and more erratically and it cracked me up\"_ - [@vimlena.com](https://bsky.app/profile/vimlena.com/post/3mkoshbzpvs2y)\n\n<div>\n\n<video width=\"80%\" src=\"https://github.com/user-attachments/assets/76446086-0432-4b67-b768-1fe31134a2c1\">\n\n</div>\n\n- _\"These kinds of experiments are where creativity is born.\"_ - [@Coko7](https://github.com/Coko7)\n\n- _\"No comments. Just support.\"_ - [@Raphamorim](https://github.com/raphamorim/) (creator of Rio terminal)\n\n- _\"[tetro-tui](https://github.com/Strophox/tetro-tui) running in Ratty\"_ - [@Strophox](https://github.com/Strophox)\n\n<div>\n\n<video width=\"80%\" src=\"https://github.com/user-attachments/assets/bdc55f35-64eb-4a14-8bb1-4f8719f14644\">\n\n</div>\n\n## License\n\nAll code is licensed under <a href=\"LICENSE\">The MIT License</a>.\n\n<sup>\n🦀 ノ( º \\_ º ノ) - respect crables!\n</sup>\n\n## Credits\n\nRatty logo designed by [@Strophox](https://github.com/Strophox) & [@Harunocaksiz](https://github.com/harunocaksiz)\n\n## Copyright\n\nCopyright © 2026, [Orhun Parmaksız](mailto:orhunparmaksiz@gmail.com)\n\n<sup>\nThe author does not have a rat under the hat!\n</sup>\n","summary":"Ratty is a GPU-rendered terminal emulator built with Rust that uniquely integrates 3D graphics directly into the command-line interface. It offers high-performance text rendering alongside advanced capabilities such as inline 3D object support, image display via the Kitty Graphics Protocol, and a toggleable 3D view. This project is ideal for developers and terminal enthusiasts who want to experiment with immersive, unconventional terminal aesthetics and interactive 3D elements in their development environment.","description":"A GPU-rendered terminal emulator with inline 3D graphics 🐀🧀 ","stars":2765,"language":"Rust"},{"owner":"dokku","repo":"dokku","url":"https://github.com/dokku/dokku","readme":"# Dokku\n\n[![Build Status](https://github.com/dokku/dokku/actions/workflows/ci.yml/badge.svg?branch=master)](https://github.com/dokku/dokku/actions?query=branch%3Amaster)\n[![Ubuntu Package](https://img.shields.io/badge/package-ubuntu-brightgreen.svg?style=flat-square \"Ubuntu Package\")](https://packagecloud.io/dokku/dokku)\n[![Arch Package](https://img.shields.io/badge/package-arch-brightgreen.svg?style=flat-square \"Arch Package\")](https://aur.archlinux.org/packages/dokku/)\n[![Slack Group](https://img.shields.io/badge/irc-slack-blue.svg?style=flat-square \"Slack Group\")](https://slack.dokku.com/)\n[![Documentation](https://img.shields.io/badge/docs-site-blue.svg?style=flat-square \"Site\")](https://dokku.com/docs/getting-started/installation/)\n[![OpenCollective](https://opencollective.com/dokku/sponsors/badge.svg?style=flat-square)](#sponsors)\n[![OpenCollective](https://opencollective.com/dokku/backers/badge.svg?style=flat-square)](#backers)\n[![Patreon](https://img.shields.io/badge/patreon-donate-green.svg?style=flat-square)](https://www.patreon.com/dokku/)\n\nDocker powered mini-Heroku. The smallest PaaS implementation you've ever seen.\n\n## Sponsors\n\nBecome a sponsor and get your logo on our README on GitHub with a link to your site. [[Become a sponsor](https://opencollective.com/dokku#sponsor)]\n\n[![OpenCollective Sponsor 0](https://opencollective.com/dokku/sponsor/0/avatar.svg)](https://opencollective.com/dokku/sponsor/0/website)\n[![OpenCollective Sponsor 1](https://opencollective.com/dokku/sponsor/1/avatar.svg)](https://opencollective.com/dokku/sponsor/1/website)\n[![OpenCollective Sponsor 2](https://opencollective.com/dokku/sponsor/2/avatar.svg)](https://opencollective.com/dokku/sponsor/2/website)\n[![OpenCollective Sponsor 3](https://opencollective.com/dokku/sponsor/3/avatar.svg)](https://opencollective.com/dokku/sponsor/3/website)\n[![OpenCollective Sponsor 4](https://opencollective.com/dokku/sponsor/4/avatar.svg)](https://opencollective.com/dokku/sponsor/4/website)\n[![OpenCollective Sponsor 5](https://opencollective.com/dokku/sponsor/5/avatar.svg)](https://opencollective.com/dokku/sponsor/5/website)\n[![OpenCollective Sponsor 6](https://openc tps://opencollective.com/dokku/backer/15/avatar.svg)](https://opencollective.com/dokku/backer/15/website)\n[![OpenCollective Backer 16](https://opencollective.com/dokku/backer/16/avatar.svg)](https://opencollective.com/dokku/backer/16/website)\n[![OpenCollective Backer 17](https://opencollective.com/dokku/backer/17/avatar.svg)](https://opencollective.com/dokku/backer/17/website)\n[![OpenCollective Backer 18](https://opencollective.com/dokku/backer/18/avatar.svg)](https://opencollective.com/dokku/backer/18/website)\n[![OpenCollective Backer 19](https://opencollective.com/dokku/backer/19/avatar.svg)](https://opencollective.com/dokku/backer/19/website)\n[![OpenCollective Backer 20](https://opencollective.com/dokku/backer/20/avatar.svg)](https://opencollective.com/dokku/backer/20/website)\n[![OpenCollective Backer 21](https://opencollective.com/dokku/backer/21/avatar.svg)](https://opencollective.com/dokku/backer/21/website)\n[![OpenCollective Backer 22](https://opencollective.com/dokku/backer/22/avatar.svg)](https://opencollective.com/dokku/backer/22/website)\n[![OpenCollective Backer 23](https://opencollective.com/dokku/backer/23/avatar.svg)](https://opencollective.com/dokku/backer/23/website)\n[![OpenCollective Backer 24](https://opencollective.com/dokku/backer/24/avatar.svg)](https://opencollective.com/dokku/backer/24/website)\n[![OpenCollective Backer 25](https://opencollective.com/dokku/backer/25/avatar.svg)](https://opencollective.com/dokku/backer/25/website)\n[![OpenCollective Backer 26](https://opencollective.com/dokku/backer/26/avatar.svg)](https://opencollective.com/dokku/backer/26/website)\n[![OpenCollective Backer 27](https://opencollective.com/dokku/backer/27/avatar.svg)](https://opencollective.com/dokku/backer/27/website)\n[![OpenCollective Backer 28](https://opencollective.com/dokku/backer/28/avatar.svg)](https://opencollective.com/dokku/backer/28/website)\n[![OpenCollective Backer 29](https://opencollective.com/dokku/backer/29/avatar.svg)](https://opencollective.com/dokku/backer/29/website)\n\n## Requirements\n\nA fresh VM running any of the following operating systems:\n\n- Ubuntu 22.04 / 24.04 (amd64/arm64) - Any currently supported release\n- Debian 11+ (amd64/arm64)\n\nAn SSH keypair that can be used for application deployment. If this exists before installation, it will be automatically imported into dokku.\nOtherwise, you will need to import the keypair manually after installation using `dokku ssh-keys:add`.\n\n## Installation\n\nTo install the latest stable release, run the following commands as a user who has access to `sudo`:\n\n```shell\nwget -NP . https://dokku.com/install/v0.38.16/bootstrap.sh\nsudo DOKKU_TAG=v0.38.16 bash bootstrap.sh\n```\n\nYou can then proceed to configure your server domain (via `dokku domains:set-global`) and user access (via `dokku ssh-keys:add`) to complete the installation.\n\nIf you wish for a more unattended installation method, see [these](https://dokku.com/docs/getting-started/install/debian/#unattended-installation) docs.\n\n### Upgrade\n\n[View the docs](https://dokku.com/docs/getting-started/upgrading/) for upgrading from an older version of Dokku.\n\n## Documentation\n\nFull documentation - including advanced installation docs - are available online at <https://dokku.com/docs/getting-started/installation/>.\n\n## Support\n\nYou can use [GitHub Issues](https://github.com/dokku/dokku/issues), check [Troubleshooting](https://dokku.com/docs/getting-started/troubleshooting/) in the documentation, or join us on [Gliderlabs Slack in the #dokku channel](https://slack.dokku.com/).\n\n## Contribution\n\nAfter checking [GitHub Issues](https://github.com/dokku/dokku/issues), the [Troubleshooting Guide](https://dokku.com/docs/getting-started/troubleshooting/) or having a chat with us on [Gliderlabs Slack in the #dokku channel](https://slack.dokku.com/), feel free to fork and create a Pull Request.\n\nWhile we may not merge your PR as is, they serve to start conversations and improve the general Dokku experience for all users.\n\n## License\n\n[MIT License](https://github.com/dokku/dokku/blob/master/LICENSE) © Jeff Lindsay\n","summary":"Dokku is a lightweight, Docker-powered Platform as a Service (PaaS) that enables users to manage their own self-hosted application deployments. By providing a streamlined, Heroku-like workflow, it allows developers to deploy applications quickly using simple git pushes. This project is ideal for developers and system administrators who want the convenience of a modern cloud-native deployment experience without the overhead of complex infrastructure management.","description":"A docker-powered PaaS that helps you build and manage the lifecycle of applications","stars":31910,"language":"Shell"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
