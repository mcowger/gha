8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHBhdGggZD0iTTI2LjExODQgMTAxLjZDMjMuMjkzOSA5OC43ODMzIDIzLjI5MzkgOTQuMjE2NiAyNi4xMTg0IDkxLjRMOTcuNzE2NyAyMEwyMDAgMjBMNzcuMjYgMTQyLjRDNzQuNDM1NSAxNDUuMjE3IDY5Ljg1NjIgMTQ1LjIxNyA2Ny4wMzE3IDE0Mi40TDI2LjExODQgMTAxLjZaIiBmaWxsPSJ3aGl0ZSIvPjxwYXRoIGQ9Ik0xNTUuMjUxIDc3LjM3NUwyMDAgMTIyVjIyNEwxMDQuMTA5IDEyOC4zNzVMMTU1LjI1MSA3Ny4zNzVaIiBmaWxsPSJ3aGl0ZSIvPjwvc3ZnPgo=&logoColor=white\" alt=\"InsForge.dev\"></a>\n\n### Self-hosted: Docker Compose\n\nPrerequisites: [Docker](https://www.docker.com/) + [Node.js](https://nodejs.org/)\n\n#### 1. Setup\n\nYou can run InsForge locally using Docker Compose. This will start a local InsForge instance on your machine.\n\n[![Deploy on Docker][docker-btn]][docker-deploy]\n\nOr run from source:\n```bash\n# Run with Docker\ngit clone https://github.com/InsForge/InsForge.git\ncd insforge\ncp .env.example .env\ndocker compose -f docker-compose.prod.yml up\n```\n\n#### 2. Connect InsForge MCP\n\nOpen [http://localhost:7130](http://localhost:7130)\n\nFollow the steps to connect InsForge MCP Server\n\n<div align=\"center\">\n  <img src=\"assets/connect.png\" alt=\"Connect InsForge MCP\" width=\"600\">\n</div>\n\n#### 3. Verify installation\n\nTo verify the connection, send the following prompt to your agent:\n```\nI'm using InsForge as my backend platform, call InsForge MCP's fetch-docs tool to learn about InsForge instructions.\n```\n\n#### 4. Running Multiple Projects\n\nYou can run multiple InsForge projects on the same host by using different ports and project names.\n\n```bash\n# Create a separate env file for each project\ncp .env.example .env.project1\ncp .env.example .env.project2\n```\n\nEdit `.env.project2` with different ports:\n```\nPOSTGRES_PORT=5442\nPOSTGREST_PORT=5440\nAPP_PORT=7230\nAUTH_PORT=7231\nDENO_PORT=7233\n```\n\nStart each project with a unique name:\n```bash\ndocker compose -f docker-compose.prod.yml --env-file .env.project1 -p project1 up -d\ndocker compose -f docker-compose.prod.yml --env-file .env.project2 -p project2 up -d\n```\n\nEach project gets its own isolated database, storage, and configuration. Manage them with:\n```bash\ndocker compose -f docker-compose.prod.yml --env-file .env.project1 -p project1 ps      # status\ndocker compose -f docker-compose.prod.yml --env-file .env.project1 -p project1 logs -f  # logs\ndocker compose -f docker-compose.prod.yml --env-file .env.project1 -p project1 down     # stop\n```\n\n### One-click Deployment\n\nIn addition to running InsForge locally, you can also launch InsForge using a pre-configured setup. This allows you to get up and running quickly with InsForge without installing Docker on your local machine.\n\n| Railway | Zeabur | Sealos |\n| --- | --- | --- |\n| [![Deploy on Railway](https://railway.com/button.svg)](https://railway.com/deploy/insforge) | [![Deploy on Zeabur](https://zeabur.com/button.svg)](https://zeabur.com/templates/Q82M3Y) | [![Deploy on Sealos](https://sealos.io/Deploy-on-Sealos.svg)](https://sealos.io/products/app-store/insforge) |\n\n\n## Contributing\n\n**Contributing**: If you're interested in contributing, you can check our guide here [CONTRIBUTING.md](CONTRIBUTING.md). We truly appreciate pull requests, all types of help are appreciated!\n\n**Support**: If you need any help or support, we're responsive on our [Discord channel](https://discord.com/invite/MPxwj5xVvW), and also feel free to email us [info@insforge.dev](mailto:info@insforge.dev) too!\n\n\n## Documentation & Support\n\n### Documentation\n- **[Official Docs](https://docs.insforge.dev/introduction)** - Comprehensive guides and API references\n\n### Community\n- **[Discord](https://discord.com/invite/MPxwj5xVvW)** - Join our vibrant community\n- **[Twitter](https://x.com/InsForge)** - Follow for updates and tips\n\n### Contact\n- **Email**: info@insforge.dev\n\n## License\n\nThis project is licensed under the Apache License 2.0 - see the [LICENSE](LICENSE) file for details.\n\n---\n\n[![Star History Chart](https://api.star-history.com/svg?repos=InsForge/InsForge&type=Date)](https://www.star-history.com/#InsForge/InsForge&Date)\n\n## Badges\n\nShow your project is built with InsForge.\n\n### Made with InsForge\n\n<a href=\"https://insforge.dev\">\n  <img\n    width=\"168\"\n    height=\"30\"\n    src=\"https://insforge.dev/badge-made-with-insforge.svg\"\n    alt=\"Made with InsForge\"\n  />\n</a>\n\n**Markdown:**\n```md\n[![Made with InsForge](https://insforge.dev/badge-made-with-insforge.svg)](https://insforge.dev)\n```\n\n**HTML:**\n```html\n<a href=\"https://insforge.dev\">\n  <img\n    width=\"168\"\n    height=\"30\"\n    src=\"https://insforge.dev/badge-made-with-insforge.svg\"\n    alt=\"Made with InsForge\"\n  />\n</a>\n```\n\n### Made with InsForge (dark)\n\n<a href=\"https://insforge.dev\">\n  <img\n    width=\"168\"\n    height=\"30\"\n    src=\"https://insforge.dev/badge-made-with-insforge-dark.svg\"\n    alt=\"Made with InsForge\"\n  />\n</a>\n\n**Markdown:**\n```md\n[![Made with InsForge](https://insforge.dev/badge-made-with-insforge-dark.svg)](https://insforge.dev)\n```\n\n**HTML:**\n```html\n<a href=\"https://insforge.dev\">\n  <img\n    width=\"168\"\n    height=\"30\"\n    src=\"https://insforge.dev/badge-made-with-insforge-dark.svg\"\n    alt=\"Made with InsForge\"\n  />\n</a>\n```\n\n\n<p align=\"center\">⭐ <b>Star us on GitHub</b> to get notified about new releases!</p>\n\n<!-- LINK GROUPS -->\n\n[docker-btn]: ./deploy/buttons/docker.png\n[docker-deploy]: ./deploy/docker-deploy.md\n","summary":"InsForge is an open-source, all-in-one backend platform specifically designed to empower AI coding agents to build and manage full-stack applications. It provides essential infrastructure primitives—including database, authentication, storage, compute, and an AI gateway—that agents can manipulate via an MCP server or a specialized CLI. By allowing agents to access backend context, read logs, and perform migrations directly, the platform streamlines the development lifecycle. This tool is ideal for developers looking to automate complex backend engineering tasks and enhance the autonomy of their AI coding agents.","description":"The all-in-one, open-source backend platform for agentic coding. InsForge gives your coding agent database, auth, storage, compute, hosting, and AI gateway to ship full-stack apps end-to-end.","stars":10825,"language":"TypeScript"},{"owner":"Alishahryar1","repo":"free-claude-code","url":"https://github.com/Alishahryar1/free-claude-code","readme":"<div align=\"center\">\n\n# 🤖 Free Claude Code\n\nUse Claude Code CLI, VS Code, JetBrains ACP, or chat bots through your own Anthropic-compatible proxy.\n\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg?style=for-the-badge)](https://opensource.org/licenses/MIT)\n[![Python 3.14](https://img.shields.io/badge/python-3.14-3776ab.svg?style=for-the-badge&logo=python&logoColor=white)](https://www.python.org/downloads/)\n[![uv](https://img.shields.io/endpoint?url=https://raw.githubusercontent.com/astral-sh/uv/main/assets/badge/v0.json&style=for-the-badge)](https://github.com/astral-sh/uv)\n[![Tested with Pytest](https://img.shields.io/badge/testing-Pytest-00c0ff.svg?style=for-the-badge)](https://github.com/Alishahryar1/free-claude-code/actions/workflows/tests.yml)\n[![Type checking: Ty](https://img.shields.io/badge/type%20checking-ty-ffcc00.svg?style=for-the-badge)](https://pypi.org/project/ty/)\n[![Code style: Ruff](https://img.shields.io/badge/code%20formatting-ruff-f5a623.svg?style=for-the-badge)](https://github.com/astral-sh/ruff)\n[![Logging: Loguru](https://img.shields.io/badge/logging-loguru-4ecdc4.svg?style=for-the-badge)](https://github.com/Delgan/loguru)\n\nFree Claude Code routes Anthropic Messages API traffic from Claude Code to any provider. It keeps Claude Code's client-side protocol stable while letting you choose free, paid, or local models.\n\n[Quick Start](#quick-start) · [Providers](#choose-a-provider) · [Clients](#connect-claude-code) · [Integrations](#optional-integrations) · [Development](#development)\n\n</div>\n\n<div align=\"center\">\n  <img src=\"assets/pic.png\" alt=\"Free Claude Code in action\" width=\"700\">\n</div>\n\n<a id=\"model-picker\"></a>\n\n<div align=\"center\">\n  <img src=\"assets/cc-model-picker.png\" alt=\"Claude Code model picker showing gateway models\" width=\"700\">\n</div>\n\n## Star History\n\n<div align=\"center\">\n  <a href=\"https://star-history.com/#Alishahryar1/free-claude-code&Date\">\n    <picture>\n      <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=Alishahryar1/free-claude-code&type=Date&theme=dark\">\n      <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=Alishahryar1/free-claude-code&type=Date\">\n      <img alt=\"Star History Chart\" src=\"https://api.star-history.com/svg?repos=Alishahryar1/free-claude-code&type=Date\" width=\"700\">\n    </picture>\n  </a>\n</div>\n\n## What You Get\n\n- Drop-in proxy for Claude Code's Anthropic API calls.\n- 17 provider backends: NVIDIA NIM, OpenRouter, Google AI Studio (Gemini), DeepSeek, Mistral La Plateforme, Mistral Codestral, OpenCode Zen, OpenCode Go, Wafer, Kimi, Cerebras Inference, Groq, Fireworks AI, Z.ai, LM Studio, llama.cpp, and Ollama.\n- Per-model routing: send Opus, Sonnet, Haiku, and fallback traffic to different providers.\n- Native Claude Code `/model` picker support through the proxy's `/v1/models` endpoint (Claude Code must opt in to Gateway model discovery; see [Model Picker](#model-picker)).\n- Streaming, tool use, reasoning/thinking block handling, and local request optimizations.\n- Optional Discord or Telegram bot wrapper for remote coding sessions.\n- Optional Usage through the VSCode extension.\n- Optional voice-note transcription through local Whisper or NVIDIA NIM.\n- Local **Admin UI** at `/admin` to edit supported proxy settings, validate changes, and check providers (loopback access only).\n\n## Quick Start\n\n### 1. Install/Update The Proxy\n\nmacOS/Linux:\n\n```bash\ncurl -fsSL \"https://github.com/Alishahryar1/free-claude-code/blob/main/scripts/install.sh?raw=1\" | sh\n```\n\nWindows PowerShell:\n\n```powershell\nirm \"https://github.com/Alishahryar1/free-claude-code/blob/main/scripts/install.ps1?raw=1\" | iex\n```\n\nReview the installers at [scripts/install.sh](https://github.com/Alishahryar1/free-claude-code/blob/main/scripts/install.sh) and [scripts/install.ps1](https://github.com/Alishahryar1/free-claude-code/blob/main/scripts/install.ps1). Re-run these commands to update to the latest version.\n\n### 2. Start The Proxy\n\n```bash\nfcc-server\n```\n\nAfter startup, Uvicorn prints the proxy bind address and the app logs the admin URL:\n\n```text\nINFO:     Admin UI: http://127.0.0.1:8082/admin (local-only)\n```\n\nMany terminals make these clickable. Use your configured `PORT` if it is not `8082`.\n\n### 3. Open The Admin UI And Configure NVIDIA NIM\n\nOpen the **Admin UI** URL from the terminal output.\n\nNeed an NVIDIA NIM API key? Use the **[NVIDIA NIM provider](#nvidia-nim-provider)** section below, then scroll back up here.\n\n<div align=\"center\">\n  <img src=\"assets/admin-page.png\" alt=\"Local admin UI for proxy settings\" width=\"700\">\n</div>\n\nPaste your NVIDIA NIM API key into `NVIDIA_NIM_API_KEY`, then click **Validate** and **Apply**.\n\nThe default model is already set to `nvidia_nim/nvidia/nemotron-3-super-120b-a12b`. You can change it later from the same Admin UI.\n\n### 4. Run Claude Code\n\n```bash\nfcc-claude\n```\n\n`fcc-claude` reads the current configured port and auth token each time it starts, sets the Claude Code environment variables (including a 190k-token `CLAUDE_CODE_AUTO_COMPACT_WINDOW` for auto-compaction), and then launches the real `claude` command.\n\n## Choose A Provider\n\nPick one provider, enter its key or local URL in the Admin UI, and set `MODEL` to a provider-prefixed model slug. `MODEL` is the fallback. `MODEL_OPUS`, `MODEL_SONNET`, and `MODEL_HAIKU` can override routing for Claude Code's model tiers.\n\n<a id=\"nvidia-nim-provider\"></a>\n\n### 1. [NVIDIA NIM](https://build.nvidia.com/)\n\nGet a key at [build.nvidia.com/settings/api-keys](https://build.nvidia.com/settings/api-keys).\n\nIn the Admin UI, paste it into `NVIDIA_NIM_API_KEY`. The default `MODEL` is `nvidia_nim/nvidia/nemotron-3-super-120b-a12b`.\n\nPopular examples:\n\n- `nvidia_nim/nvidia/nemotron-3-super-120b-a12b`\n- `nvidia_nim/z-ai/glm5.1`\n- `nvidia_nim/moonshotai/kimi-k2.5`\n- `nvidia_nim/minimaxai/minimax-m2.5`\n\nBrowse models at [build.nvidia.com](https://build.nvidia.com/explore/discover).\n\n### 2. [OpenRouter](https://openrouter.ai/)\n\nGet a key at [openrouter.ai/keys](https://openrouter.ai/keys).\n\nIn the Admin UI, paste it into `OPENROUTER_API_KEY`, then set `MODEL` to an OpenRouter slug such as `open_router/openrouter/free`.\n\nBrowse [all models](https://openrouter.ai/models) or [free models](https://openrouter.ai/collections/free-models).\n\n### 3. [Google AI Studio (Gemini)](https://aistudio.google.com/)\n\nGet a Gemini API key at [Google AI Studio](https://aistudio.google.com/apikey) (see Google's [Gemini OpenAI compatibility](https://ai.google.dev/gemini-api/docs/openai) docs).\n\nIn the Admin UI, paste it into `GEMINI_API_KEY`, then set `MODEL` to a Gemini model slug such as `gemini/models/gemini-3.1-flash-lite`.\n\nThe Gemini API exposes an OpenAI-compatible endpoint at `https://generativelanguage.googleapis.com/v1beta/openai/`. Free tier quotas are per-model; prompts may be used to improve Google's products outside the UK/CH/EEA/EU unless your account region says otherwise—see Google's terms.\n\nPopular examples:\n\n- `gemini/models/gemini-3.1-flash-lite`\n\n### 4. [DeepSeek](https://platform.deepseek.com/)\n\nGet a key at [platform.deepseek.com/api_keys](https://platform.deepseek.com/api_keys).\n\nIn the Admin UI, paste it into `DEEPSEEK_API_KEY`, then set `MODEL` to a DeepSeek slug such as `deepseek/deepseek-chat`.\n\nThis provider uses DeepSeek's Anthropic-compatible endpoint, not the OpenAI chat-completions endpoint.\n\n### 5. [Mistral La Plateforme](https://console.mistral.ai/)\n\n[Mistral](https://mistral.ai) hosts an OpenAI-compatible Chat Completions API at `https://api.mistral.ai/v1`. Activate the **Experiment** plan on [console.mistral.ai](https://console.mistral.ai/) for free-tier API access with rate limits (upgrade for higher quotas).\n\nIn the Admin UI, paste your API key into `MISTRAL_API_KEY`, then set `MODEL` to a Mistral model slug such as `mistral/devstral-small-latest` or `mistral/mistral-small-latest`.\n\nPopular examples:\n\n- `mistral/devstral-small-latest`\n- `mistral/mistral-small-latest`\n\nBrowse models at [Mistral documentation](https://docs.mistral.ai/).\n\n### 6. [Mistral Codestral](https://console.mistral.ai/)\n\nMistral's **Codestral** gateway uses a **separate API key** from La Plateforme: provision `CODESTRAL_API_KEY`, then route with the `mistral_codestral/` prefix. The default upstream is **`https://codestral.mistral.ai/v1`** (OpenAI-compatible Chat Completions; same request shaping as the `mistral` provider). See Mistral's [coding / FIM domains](https://docs.mistral.ai/mistral-vibe/using-fim-api); the curated [free LLM API list](https://github.com/cheahjs/free-llm-api-resources#mistral-codestral) summarizes typical Codestral access terms.\n\nPopular examples:\n\n- `mistral_codestral/codestral-latest`\n\n### 7. [OpenCode Zen](https://opencode.ai/)\n\nGet an API key at [opencode.ai/auth](https://opencode.ai/auth).\n\nIn the Admin UI, paste it into `OPENCODE_API_KEY`, then set `MODEL` to an OpenCode Zen model slug such as `opencode/gpt-5.3-codex`. The same `OPENCODE_API_KEY` powers **OpenCode Go** (below); use `opencode_go/` slugs there.\n\nOpenCode Zen is a curated model gateway that provides access to models from Anthropic, OpenAI, Google, DeepSeek, and more through a single API key and OpenAI-compatible endpoint at `https://opencode.ai/zen/v1`.\n\nPopular examples:\n\n- `opencode/gpt-5.3-codex`\n- `opencode/claude-sonnet-4`\n- `opencode/deepseek-v4-flash-free` (free)\n- `opencode/gemini-3-flash`\n- `opencode/big-pickle` (free)\n- `opencode/glm-5.1`\n\nBrowse available models at [opencode.ai](https://opencode.ai).\n\n### 8. [OpenCode Go](https://opencode.ai/)\n\nGet an API key at [opencode.ai/auth](https://opencode.ai/auth) (same as OpenCode Zen).\n\nIn the Admin UI, use `OPENCODE_API_KEY`, then set `MODEL` to an OpenCode Go model slug such as `opencode_go/minimax-m2.7`.\n\nOpenCode Go is a subscription gateway with its own curated catalog and OpenAI-compatible endpoint at `https://opencode.ai/zen/go/v1`. It shares the **same OpenCode API key** as Zen; only the slug prefix (`opencode_go/` vs `opencode/`) and upstream path differ.\n\nPopular examples:\n\n- `opencode_go/minimax-m2.7`\n\nBrowse available models at [opencode.ai](https://opencode.ai).\n\n### 9. [Wafer](https://wafer.ai/)\n\nGet a key from [wafer.ai](https://wafer.ai). In the Admin UI, paste it into `WAFER_API_KEY`, then set `MODEL` to a Wafer Pass model such as `wafer/DeepSeek-V4-Pro`.\n\nPopular examples:\n\n- `wafer/DeepSeek-V4-Pro`\n- `wafer/MiniMax-M2.7`\n- `wafer/Qwen3.5-397B-A17B`\n- `wafer/GLM-5.1`\n\nThis provider uses Wafer's Anthropic-compatible endpoint at `https://pass.wafer.ai/v1/messages`.\n\n### 10. [Kimi](https://platform.moonshot.ai/)\n\nGet a key at [platform.moonshot.ai/console/api-keys](https://platform.moonshot.ai/console/api-keys).\n\nIn the Admin UI, paste it into `KIMI_API_KEY`, then set `MODEL` to a Kimi slug such as `kimi/kimi-k2.5`.\n\nThis provider calls Kimi's **Anthropic-compatible** Messages API (`https://api.moonshot.ai/anthropic/v1/messages`; model discovery uses OpenAI-compat `GET https://api.moonshot.ai/v1/models`). It is **not** the OpenAI Chat Completions path.\n\nBrowse models at [platform.moonshot.ai](https://platform.moonshot.ai).\n\n### 11. [Cerebras Inference](https://inference-docs.cerebras.ai/quickstart)\n\nSign up and create an API key in the [Cerebras Cloud Console](https://cloud.cerebras.ai) (see [Quickstart](https://inference-docs.cerebras.ai/quickstart)).\n\nIn the Admin UI, set `CEREBRAS_API_KEY`, then route with `MODEL` such as `cerebras/llama3.1-8b` or `cerebras/gpt-oss-120b` (ids from [List models](https://inference-docs.cerebras.ai/api-reference/models/list-models)).\n\nCerebras exposes an OpenAI-compatible API at `https://api.cerebras.ai/v1` ([OpenAI compatibility](https://inference-docs.cerebras.ai/resources/openai)). Non-standard request fields should go in `extra_body` when using the OpenAI client; see the same page. For reasoning models and parameters, see [Reasoning](https://inference-docs.cerebras.ai/capabilities/reasoning). This proxy follows other OpenAI-compat adapters for thinking via `reasoning_content` when Claude-style thinking is enabled.\n\n### 12. [Groq](https://console.groq.com/)\n\nGet an API key at [console.groq.com/keys](https://console.groq.com/keys).\n\nIn the Admin UI, paste it into `GROQ_API_KEY`, then set `MODEL` to a Groq OpenAI-compat model slug such as `groq/llama-3.3-70b-versatile`.\n\nGroq routes through `https://api.groq.com/openai/v1` ([OpenAI-compatible Chat Completions](https://console.groq.com/docs/openai)). Some request fields yield HTTP 400; this adapter strips known-unsupported shapes (documented in Groq's compatibility notes).\n\nReasoning-heavy models expose extra knobs documented under [Groq reasoning](https://console.groq.com/docs/reasoning). This release mirrors other OpenAI-compat adapters for thinking via `reasoning_content` deltas when Claude-style thinking is enabled; you can tune advanced parameters through request `extra_body` when needed.\n\nBrowse models at [console.groq.com/docs/models](https://console.groq.com/docs/models).\n\n### 13. [Fireworks AI](https://fireworks.ai/)\n\nGet an API key at [fireworks.ai/account/api-keys](https://fireworks.ai/account/api-keys).\n\nIn the Admin UI, paste it into `FIREWORKS_API_KEY`, then set `MODEL` to a Fireworks model slug such as `fireworks/accounts/fireworks/models/llama-v3p3-70b-instruct`.\n\nFireworks exposes an **Anthropic-compatible** Messages API at `https://api.fireworks.ai/inference/v1/messages` (same inference host as before; Chat Completions is not used here). Vendor-specific JSON keys can still be merged from request `extra_body` when allowed.\n\nBrowse models at [fireworks.ai/models](https://fireworks.ai/models).\n\n### 14. [Z.ai](https://z.ai/)\n\nGet an API key at [Z.ai/manage-apikey/apikey-list](https://z.ai/manage-apikey/apikey-list).\n\nIn the Admin UI, paste it into `ZAI_API_KEY`, then set `MODEL` to a Z.ai model slug such as `zai/glm-5.1`.\n\nThis provider calls Z.ai's **Anthropic-compatible** Messages API (`https://api.z.ai/api/anthropic/v1/messages`). The former OpenAI Coding Plan base (`https://api.z.ai/api/coding/paas/v4`) is **not** used by this gateway.\n\nPopular examples:\n\n- `zai/glm-5.1`\n- `zai/glm-5-turbo`\n\nBrowse models at [Z.ai](https://z.ai).\n\n### 15. [LM Studio](https://lmstudio.ai/)\n\nStart LM Studio's local server and load a model. In the Admin UI, keep or update `LM_STUDIO_BASE_URL`, then set `MODEL` to the model identifier shown by LM Studio, prefixed with `lmstudio/`.\n\nPrefer models with tool-use support for Claude Code workflows.\n\n### 16. [llama.cpp](https://github.com/ggml-org/llama.cpp)\n\nStart `llama-server` with an Anthropic-compatible `/v1/messages` endpoint and enough context for Claude Code requests.\n\nIn the Admin UI, keep or update `LLAMACPP_BASE_URL`, then set `MODEL` to the local model slug, prefixed with `llamacpp/`.\n\nFor local coding models, context size matters. If llama.cpp returns HTTP 400 for normal Claude Code requests, increase `--ctx-size` and verify the model/server build supports the requested features.\n\n### 17. [Ollama](https://ollama.com/)\n\nRun Ollama and pull a model:\n\n```bash\nollama pull llama3.1\nollama serve\n```\n\nIn the Admin UI, keep or update `OLLAMA_BASE_URL`, then set `MODEL` to the same tag shown by `ollama list`, prefixed with `ollama/`.\n\n`OLLAMA_BASE_URL` is the Ollama server root; do not append `/v1`. Example model slugs include `ollama/llama3.1` and `ollama/llama3.1:8b`.\n\n### 18. Mix Providers By Model Tier\n\nEach model tier can use a different provider by setting `MODEL_OPUS`, `MODEL_SONNET`, and `MODEL_HAIKU` in the Admin UI. Leave a tier blank to inherit `MODEL`.\n\nFor example, you can route Opus to `nvidia_nim/moonshotai/kimi-k2.6`, Sonnet to `open_router/openrouter/free`, Haiku to `lmstudio/qwen3.5-coder`, and keep the fallback `MODEL` on `zai/glm-5.1`.\n\n## Connect Claude Code\n\n### 1. Claude Code CLI\n\nFor terminal use, prefer the installed launcher:\n\n```bash\nfcc-claude\n```\n\nKeep `fcc-server` running while you work. The Admin UI manages proxy config, restarts the server when runtime settings change, and `fcc-claude` reads the current Admin UI-managed port and auth token every time it starts. It also sets `CLAUDE_CODE_AUTO_COMPACT_WINDOW` to `190000` for auto-compaction.\n\n### 2. VS Code Extension\n\nOpen Settings, search for `claude-code.environmentVariables`, choose **Edit in settings.json**, and add:\n\n```json\n\"claudeCode.environmentVariables\": [\n  { \"name\": \"ANTHROPIC_BASE_URL\", \"value\": \"http://localhost:8082\" },\n  { \"name\": \"ANTHROPIC_AUTH_TOKEN\", \"value\": \"freecc\" },\n  { \"name\": \"CLAUDE_CODE_ENABLE_GATEWAY_MODEL_DISCOVERY\", \"value\": \"1\" },\n  { \"name\": \"CLAUDE_CODE_AUTO_COMPACT_WINDOW\", \"value\": \"190000\" }\n]\n```\n\nReload the extension. If the extension shows a login screen, choose the Anthropic Console path once; the local proxy still handles model traffic after the environment variables are active.\n\n### 3. JetBrains ACP\n\nEdit the installed Claude ACP config:\n\n- Windows: `C:\\Users\\%USERNAME%\\AppData\\Roaming\\JetBrains\\acp-agents\\installed.json`\n- Linux/macOS: `~/.jetbrains/acp.json`\n\nSet the environment for `acp.registry.claude-acp`:\n\n```json\n\"env\": {\n  \"ANTHROPIC_BASE_URL\": \"http://localhost:8082\",\n  \"ANTHROPIC_AUTH_TOKEN\": \"freecc\",\n  \"CLAUDE_CODE_ENABLE_GATEWAY_MODEL_DISCOVERY\": \"1\",\n  \"CLAUDE_CODE_AUTO_COMPACT_WINDOW\": \"190000\"\n}\n```\n\nRestart the IDE after changing the file.\n\n## Optional Integrations\n\nFor every integration below, change **managed proxy settings** only in the **Admin UI** at `/admin`: edit fields, click **Validate**, then **Apply**. The footer shows where the managed config is stored; this README does not walk through editing that file by hand.\n\n### 1. Discord And Telegram Bots\n\nThe bot wrapper runs Claude Code sessions remotely, streams progress, supports reply-based conversation branches, and can stop or clear tasks.\n\n**Discord**\n\n1. Create the bot in the [Discord Developer Portal](https://discord.com/developers/applications).\n2. Enable **Message Content Intent**.\n3. Invite the bot with read, send, and message history permissions.\n4. Copy the bot token and the numeric channel ID (or IDs) where the bot should respond.\n\n**Telegram**\n\n1. Create a bot with [@BotFather](https://t.me/BotFather) and copy the bot token.\n2. Get your numeric user ID from [@userinfobot](https://t.me/userinfobot) so only you can use the bot.\n\n**Configure in the Admin UI**\n\n1. With `fcc-server` running, open the **Admin UI** URL from the terminal output.\n2. In the sidebar, choose **Messaging**.\n3. Set **Messaging Platform** to **discord** or **telegram**.\n4. For Discord, paste **Discord Bot Token** and **Allowed Discord Channels**. For Telegram, paste **Telegram Bot Token** and **Allowed Telegram User ID**.\n5. Set **Allowed Directory** to an absolute path on the machine running the proxy—the workspace root the bot may use.\n6. Click **Validate**, then **Apply**. Restart the server if the UI says one is required.\n\n<div align=\"center\">\n  <img src=\"assets/admin-messaging.png\" alt=\"Admin UI Messaging view with bot and voice settings\" width=\"700\">\n</div>\n\n<p align=\"center\"><em>Admin UI → Messaging (platform, bots, and Voice)</em></p>\n\n**Useful commands**\n\n- `/stop` cancels a task; reply to a task message to stop only that branch.\n- `/clear` resets sessions; reply to clear one branch.\n- `/stats` shows session state.\n\n### 2. Voice Notes\n\nVoice notes work on Discord and Telegram after you extend your [Free Claude Code install](#1-fast-install) with the matching optional extras.\n\nmacOS/Linux:\n\n```bash\n# NVIDIA NIM transcription (Riva gRPC)\ncurl -fsSL \"https://github.com/Alishahryar1/free-claude-code/blob/main/scripts/install.sh?raw=1\" | sh -s -- --voice-nim\n\n# Local Whisper (CPU or CUDA)\ncurl -fsSL \"https://github.com/Alishahryar1/free-claude-code/blob/main/scripts/install.sh?raw=1\" | sh -s -- --voice-local\n\n# Both backends\ncurl -fsSL \"https://github.com/Alishahryar1/free-claude-code/blob/main/scripts/install.sh?raw=1\" | sh -s -- --voice-all\n\n# Local Whisper with CUDA\ncurl -fsSL \"https://github.com/Alishahryar1/free-claude-code/blob/main/scripts/install.sh?raw=1\" | sh -s -- --voice-local --torch-backend cu130\n```\n\nWindows PowerShell:\n\n```powershell\n# NVIDIA NIM transcription (Riva gRPC)\n& ([scriptblock]::Create((irm \"https://github.com/Alishahryar1/free-claude-code/blob/main/scripts/install.ps1?raw=1\"))) -VoiceNim\n\n# Local Whisper (CPU or CUDA)\n& ([scriptblock]::Create((irm \"https://github.com/Alishahryar1/free-claude-code/blob/main/scripts/install.ps1?raw=1\"))) -VoiceLocal\n\n# Both backends\n& ([scriptblock]::Create((irm \"https://github.com/Alishahryar1/free-claude-code/blob/main/scripts/install.ps1?raw=1\"))) -VoiceAll\n\n# Local Whisper with CUDA\n& ([scriptblock]::Create((irm \"https://github.com/Alishahryar1/free-claude-code/blob/main/scripts/install.ps1?raw=1\"))) -VoiceLocal -TorchBackend cu130\n```\n\nRestart `fcc-server` after reinstalling.\n\nIn the **Admin UI**, open **Messaging** and scroll to **Voice**. Turn on **Voice Notes**, choose **Whisper Device** (`cpu`, `cuda`, or `nvidia_nim`), set **Whisper Model**, and enter **Hugging Face Token** when your setup needs it. For **nvidia_nim** transcription, install the `voice` extra and set **NVIDIA NIM API Key** on the **Providers** view. The screenshot above shows the **Voice** block in the same view.\n\n## How It Works\n\n<div align=\"center\">\n  <img src=\"assets/how-it-works.svg\" alt=\"Free Claude Code request flow architecture\" width=\"900\">\n</div>\n\nDiagram source: [`assets/how-it-works.mmd`](assets/how-it-works.mmd).\n\nImportant pieces:\n\n- FastAPI exposes Anthropic-compatible routes such as `/v1/messages`, `/v1/messages/count_tokens`, and `/v1/models`.\n- Model routing resolves the Claude model name to `MODEL_OPUS`, `MODEL_SONNET`, `MODEL_HAIKU`, or `MODEL`.\n- NIM, OpenCode Zen, and OpenCode Go use OpenAI chat streaming translated into Anthropic SSE.\n- Wafer, OpenRouter, DeepSeek, Kimi, Fireworks AI, Z.ai, LM Studio, llama.cpp, and Ollama use Anthropic Messages style transports where applicable (with provider-specific quirks and model-list URLs).\n- The proxy normalizes thinking blocks, tool calls, token usage metadata, and provider errors into the shape Claude Code expects.\n- Request optimizations answer trivial Claude Code probes locally to save latency and quota.\n\n## Development\n\n### 1. Project Structure\n\n```text\nfree-claude-code/\n├── server.py              # ASGI entry point\n├── api/                   # FastAPI routes, service layer, routing, optimizations\n├── core/                  # Shared Anthropic protocol helpers and SSE utilities\n├── providers/             # Provider transports, registry, rate limiting\n├── messaging/             # Discord/Telegram adapters, sessions, voice\n├── cli/                   # Package entry points and Claude process management\n├── config/                # Settings, provider catalog, logging\n└── tests/                 # Unit and contract tests\n```\n\n### 2. Run From Source\n\nUse this path if you are developing or want to run directly from a checkout:\n\n```bash\ngit clone https://github.com/Alishahryar1/free-claude-code.git\ncd free-claude-code\nuv run uvicorn server:app --host 0.0.0.0 --port 8082\n```\n\n### 3. Commands\n\n```bash\nuv run ruff format\nuv run ruff check\nuv run ty check\nuv run pytest\n```\n\nRun them in that order before pushing. CI enforces the same checks.\n\n### 4. Package Scripts\n\n`pyproject.toml` installs:\n\n- `fcc-server`: starts the proxy with configured host and port.\n- `fcc-init`: optional advanced scaffold for `~/.fcc/.env`; prefer the **Admin UI** for normal configuration.\n- `fcc-claude`: launches Claude Code with the configured local proxy URL, auth token, model discovery flag, and a 190k `CLAUDE_CODE_AUTO_COMPACT_WINDOW` for auto-compaction.\n- `free-claude-code`: compatibility alias for `fcc-server`.\n\n### 5. Extending\n\n- Add OpenAI-compatible providers by extending `OpenAIChatTransport`.\n- Add Anthropic Messages providers by extending `AnthropicMessagesTransport`.\n- Register provider metadata in `config.provider_catalog` and factory wiring in `providers.registry`.\n- Add messaging platforms by implementing the `MessagingPlatform` interface in `messaging/`.\n\n## Contributing\n\n- [`.env.example`](.env.example) lists env key names as a read-only reference for contributors; use the **Admin UI** to change managed proxy settings.\n- Report bugs and feature requests in [Issues](https://github.com/Alishahryar1/free-claude-code/issues). For bug always include all model mapping, current model when issue occured and the issue string\n- Keep changes small and covered by focused tests.\n- Do not open Docker integration PRs.\n- Do not open README change PRs just open an issue for it.\n- Run the full check sequence before opening a pull request.\n- The syntax `except X, Y` is brought back in python 3.14 final version (not in 3.14 alpha). Keep in mind before opening PRs.\n\n## License\n\nMIT License. See [LICENSE](LICENSE) for details.\n","summary":"Free Claude Code acts as a versatile proxy that routes Anthropic Messages API traffic from Claude Code to a wide variety of alternative providers, including local models and various cloud AI services. It supports advanced features such as per-model routing, streaming, tool use, and even integration with communication platforms like Discord or Telegram. By decoupling Claude Code from a single provider, this tool is ideal for developers who want the flexibility to use free, paid, or local models while maintaining a stable coding environment.","description":"Use claude-code for free in the terminal, VSCode extension or discord like OpenClaw (voice supported)","stars":31781,"language":"Python"},{"owner":"Anil-matcha","repo":"Open-Generative-AI","url":"https://github.com/Anil-matcha/Open-Generative-AI","readme":"# Open Generative AI — Open-Source Alternative to AI Video Platforms\n\n> **The free, open-source alternative to AI Video Platforms.** Generate AI images and videos using 200+ state-of-the-art models — no content filters, no closed ecosystem, no subscription fees.\n\n**Community:** Join [Reddit](reddit.com/r/muapi) & [Discord](https://discord.gg/QhTrNRU4r3) for discussions and support\n\n> **Latest Gemini Omni model from Google best prompts and resources:** [Gemini Omni Resources](https://github.com/Anil-matcha/Awesome-Gemini-Omni-API-Prompts)\n\n> 🤖 **Automate media generations with AI coding agents:** [Generative-Media-Skills](https://github.com/SamurAIGPT/Generative-Media-Skills) — a library of skills that let agents like **Claude Code**, **Codex**, and other coding assistants drive 200+ image/video models end-to-end (prompt → generate → edit → stitch) directly from your terminal. Perfect for building automated media pipelines without touching a UI.\n\n### Related projects\n\n> **Open-source Node based workflow builder** -> https://github.com/SamurAIGPT/Vibe-Workflow\n\n> **Open-source AI Clipping — turn any long-form YouTube video into viral-ready vertical shorts** -> https://github.com/SamurAIGPT/AI-Youtube-Shorts-Generator\n\n> **Open-source AI Design Agent** -> https://github.com/Anil-matcha/Open-AI-Design-Agent \n\n## 🌐 Try it Online — No Install Required\n\n**Hosted version:** [https://muapi.ai/open-generative-ai](https://muapi.ai/open-generative-ai)\n\nUse all four studios (Image, Video, Lip Sync, Cinema) directly in your browser — no Node.js, no setup. Sign up for a free account to start generating. The hosted version is always up to date with the latest models.\n\n**Follow** the [creator](https://x.com/matchaman11) for updates\n\n---\n\n## ⬇️ Download Desktop App\n\nOne-click installers — no Node.js or terminal required.\n\n| Platform | Download |\n|---|---|\n| macOS Apple Silicon (M1/M2/M3/M4) | [Open Generative AI-1.0.9-arm64.dmg](https://github.com/Anil-matcha/Open-Generative-AI/releases/download/v1.0.9/Open.Generative.AI-1.0.9-arm64.dmg) |\n| macOS Intel (x64) | [Open Generative AI-1.0.9.dmg](https://github.com/Anil-matcha/Open-Generative-AI/releases/download/v1.0.9/Open.Generative.AI-1.0.9.dmg) |\n| Windows (x64) | [Open Generative AI Setup 1.0.9.exe](https://github.com/Anil-matcha/Open-Generative-AI/releases/download/v1.0.9/Open.Generative.AI.Setup.1.0.9.exe) |\n| Linux (Ubuntu x64) | [v1.0.9 release](https://github.com/Anil-matcha/Open-Generative-AI/releases/tag/v1.0.9) (`.AppImage` / `.deb`), or build locally with `npm run electron:build:linux`. |\n\nAll releases: [github.com/Anil-matcha/Open-Generative-AI/releases](https://github.com/Anil-matcha/Open-Generative-AI/releases)\n\n### macOS Installation Guide\n\nBecause the app is not notarized by Apple, macOS Gatekeeper will block it on first launch. Follow these steps:\n\n**Step 1** — Mount the DMG and drag the app to `/Applications`\n\n**Step 2** — Open Terminal and run:\n```bash\nxattr -cr \"/Applications/Open Generative AI.app\"\n```\n\n**Step 3** — Right-click the app in `/Applications` → click **Open** → click **Open** again on the dialog\n\n> You only need to do this once. After that, the app opens normally.\n\n**Alternative (no Terminal):**\n1. Try to open the app — macOS will block it\n2. Go to **System Settings → Privacy & Security**\n3. Scroll down to find _\"Open Generative AI was blocked\"_\n4. Click **Open Anyway** → **Open**\n\n### Windows Installation — SmartScreen warning fix\n\nWindows SmartScreen may show a warning because the installer is not code-signed:\n\n1. Click **More info** on the SmartScreen dialog\n2. Click **Run anyway**\n\nThe app will install silently to `%LocalAppData%` with a Start Menu shortcut.\n\n### Ubuntu / Linux Installation\n\nLinux artifacts are available when building with Electron Builder:\n\n```bash\n# Build Linux installers (AppImage + .deb)\nnpm run electron:build:linux\n```\n\nGenerated files are written to the `release/` folder:\n- **AppImage** — portable, run directly after making executable:\n  ```bash\n  chmod +x \"release/Open Generative AI-*.AppImage\"\n  ./release/Open\\ Generative\\ AI-*.AppImage\n  ```\n- **.deb** — install on Debian/Ubuntu:\n  ```bash\n  sudo apt install ./release/open-generative-ai_*_amd64.deb\n  ```\n\nIf AppImage fails to start on older systems, install `libfuse2`:\n\n```bash\nsudo apt install libfuse2\n```\n\n#### Ubuntu 24.04+ / AppArmor sandbox restriction\n\nUbuntu 24.04 and later enable a kernel security policy (`apparmor_restrict_unprivileged_userns`) that blocks Chromium's user-namespace sandbox. If the app fails to start silently or crashes immediately, you have two options:\n\n**Option A — Recommended: install the `.deb` instead.**\nThe `.deb` package ships an AppArmor profile that grants the required permission automatically on install with no system-wide changes.\n\n**Option B — Temporary system fix (AppImage users):**\n```bash\nsudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0\n```\nThis lasts until next reboot. To make it permanent:\n```bash\necho 'kernel.apparmor_restrict_unprivileged_userns=0' | sudo tee /etc/sysctl.d/99-userns.conf\n```\n\n---\n\nOpen Generative AI is a free, open-source AI image, video, cinema, and lip sync studio that brings creative workflows to everyone. No content filters, no prompt rejections, no guardrails — just full creative freedom. Powered by [Muapi.ai](https://muapi.ai), it supports text-to-image, image-to-image, text-to-video, image-to-video, and audio-driven lip sync generation across models like Flux, Nano Banana, Midjourney, Kling, Sora, Veo, Seedream, Infinite Talk, LTX Lipsync, Wan 2.2, and more — all from a sleek, modern interface you can self-host and customize.\n\n**Why Open Generative AI instead of other AI Video Platforms?**\n- **No filters** — no content filters, no nanny guardrails, no prompt rejections\n- **Free & open-source** — no subscription, no vendor lock-in\n- **Self-hosted** — your data stays on your machine, full creative control\n- **200+ models** — text-to-image, image-to-image, text-to-video, image-to-video, lip sync\n- **Multi-image input** — feed up to 14 reference images into compatible models\n- **Lip Sync Studio** — animate portraits or sync lips to any audio with 9 dedicated models\n- **Extensible** — add your own models, modify the UI, build on top of it\n\nFor a deep dive into the technical architecture and the philosophy behind the \"Infinite Budget\" cinema workflow, see our [comprehensive guide and roadmap](https://medium.com/@anilmatcha/).\n\n## ⚡ Local Model Inference (Desktop App Only)\n\nThe desktop app supports **two independent local engines**. Pick whichever fits the machine you actually run on:\n\n| Engine | What it is | Best for |\n|---|---|---|\n| **sd.cpp** (bundled) | C++ engine from [stable-diffusion.cpp](https://github.com/leejet/stable-diffusion.cpp), runs on the same machine as the app. Metal GPU on Apple Silicon, CUDA/Vulkan/ROCm on Linux/Windows. | Image-only models. Works on Mac M-series. |\n| **Wan2GP** (BYO server) | HTTP client to a user-run [Wan2GP](https://github.com/deepbeepmeep/Wan2GP) server. The server runs Python + PyTorch on a CUDA/ROCm GPU; the desktop app only sends prompts and receives results. | Video models (Wan 2.2, Hunyuan, LTX) and large image models (Flux, Qwen-Image). NVIDIA/AMD GPU required on the *server*; the desktop app itself can run on a Mac. |\n\nBoth engines share the same UI: open **Settings → Local Models** to configure each.\n\n### Engine 1 — sd.cpp (bundled)\n\n| Model | Type | Size | Notes |\n|---|---|---|---|\n| **Z-Image Turbo** ⚡ | Diffusion Transformer | 2.5 GB + 2.7 GB aux | 8-step turbo. Heavy on memory. |\n| **Z-Image Base** ⚡ | Diffusion Transformer | 3.5 GB + 2.7 GB aux | 50-step high-quality. Heavy on memory. |\n| **Dreamshaper 8** | SD 1.5 | 2.1 GB | 20-step versatile. Lightest tested option on Mac. |\n| **Realistic Vision v5.1** | SD 1.5 | 2.1 GB | 25-step photorealistic |\n| **Anything v5** | SD 1.5 | 2.1 GB | 20-step anime/illustration |\n| **SDXL Base 1.0** | SDXL | 6.9 GB | 30-step high-res |\n\n> **Z-Image models** require two shared auxiliary files (downloaded once, shared across both models):\n> - **Qwen3-4B Text Encoder** — 2.4 GB\n> - **FLUX VAE** — 335 MB\n\n**How to use:**\n1. Open **Settings → Local Models** in the desktop app\n2. Install the **sd.cpp inference engine** (one click — auto-downloaded)\n3. Download your chosen model (and auxiliary files for Z-Image)\n4. In **Image Studio**, click the **⚡ Local** toggle next to the model selector\n5. Select your local model and generate — no API key needed\n\nAll downloads happen inside the app. Nothing is installed system-wide.\n\nBy default, `sd.cpp` stores the engine, model weights, and temporary downloads under Electron's app data directory. Common paths are:\n\n- macOS: `~/Library/Application Support/open-generative-ai/local-ai`\n- Windows: `%APPDATA%\\open-generative-ai\\local-ai`\n- Linux: `~/.config/open-generative-ai/local-ai`\n\nTo keep multi-GB model weights on another drive, set `OPEN_GENERATIVE_AI_LOCAL_AI_DIR`\nbefore launching the desktop app. The app will create `bin/`, `models/`, and `tmp/`\ninside that directory, and **Settings -> Local Models** shows the resolved model folder.\nLocal engine output and download errors are written to the app process console, so launch\nfrom Terminal or PowerShell when you need troubleshooting logs.\n\n### Engine 2 — Wan2GP (remote Gradio server)\n\nThe app does **not** bundle Python or model weights for Wan2GP. You run Wan2GP yourself on a machine with a CUDA or ROCm GPU and point the desktop app at its URL.\n\n```bash\n# On your GPU machine\ngit clone https://github.com/deepbeepmeep/Wan2GP\ncd Wan2GP\n./install.sh                          # or install.bat on Windows\npython wgp.py --listen --server-name 0.0.0.0   # binds to all interfaces\n```\n\nThen in the desktop app: **Settings → Local Models → Wan2GP server**, paste the URL (e.g. `http://192.168.1.42:7860`), click **Test**, then **Save**. The Wan2GP models become available — image models in **Image Studio**, video models reachable via the same generation API (Image Studio rejects video output explicitly; full Video Studio wiring is on the roadmap).\n\n| Model | Type | Notes |\n|---|---|---|\n| **Flux.1 Dev** | Image | 1024px, 28 steps |\n| **Qwen Image** | Image | 1024px, 30 steps |\n| **Wan 2.2 (T2V / I2V)** | Video | Slow on consumer GPUs |\n| **Hunyuan Video** | Video | High-quality T2V |\n| **LTX Video** | Video | Fastest video option |\n\n> **Why a separate server?** Wan2GP's runtime (Sage attention, flash-attn, AWQ/GGUF kernels) is CUDA-only — there is no MPS / Apple Silicon path. Treating it as a remote server lets a Mac-only user keep the desktop app while offloading inference to a Linux/Windows GPU box, a gaming PC on the LAN, or a rented RunPod/vast.ai instance.\n\n> **Local inference is only available in the desktop app.** The hosted web version always uses cloud APIs.\n\n### Hardware Notes\n\n- **sd.cpp** runs on CPU (all platforms) and **Metal GPU** on Apple Silicon (M1/M2/M3/M4); CUDA/Vulkan/ROCm on Linux/Windows.\n- Metal GPU acceleration is built into the macOS desktop binary — significantly faster than CPU-only.\n- Recommended for sd.cpp Z-Image: 16 GB RAM (7.4 GB weights + 2.4 GB compute buffer). On a base 8 GB M-series Mac, **Z-Image is known to hang the system** — stick to SD 1.5 there.\n- For SD 1.5 on M2: expect ~1–2 s/step with the Metal dylib active. If you see ~10 s/step instead, the binary may have fallen back to CPU — see verification below.\n\n### Verifying the SD 1.5 path (the fastest sanity test on Mac)\n\nIf you want to confirm sd.cpp is installed correctly without going through the UI, you can drive `sd-cli` directly. This is the same binary the app uses.\n\n```bash\n# 1. App data layout (created on first app launch)\nAPP_DATA=\"${OPEN_GENERATIVE_AI_LOCAL_AI_DIR:-$HOME/Library/Application Support/open-generative-ai/local-ai}\"\nls \"$APP_DATA/bin\"     # sd-cli, libstable-diffusion.dylib\nls \"$APP_DATA/models\"  # whatever you've downloaded\n\n# 2. Grab a small SD 1.5 model directly (Dreamshaper 8, ~2 GB)\ncurl -L --fail --progress-bar \\\n  -o \"$APP_DATA/models/DreamShaper_8_pruned.safetensors\" \\\n  \"https://huggingface.co/Lykon/DreamShaper/resolve/main/DreamShaper_8_pruned.safetensors\"\n\n# 3. Run a single 512x512 / 12-step inference\nDYLD_LIBRARY_PATH=\"$APP_DATA/bin\" \"$APP_DATA/bin/sd-cli\" \\\n  -m \"$APP_DATA/models/DreamShaper_8_pruned.safetensors\" \\\n  -p \"a serene mountain lake at sunrise, oil painting\" \\\n  -o /tmp/sd15-test.png \\\n  --steps 12 -H 512 -W 512 --cfg-scale 7.5 --seed 42 \\\n  --sampling-method euler_a\n```\n\nA healthy run on Apple Silicon prints `total params memory size = 1969.78MB (VRAM 1969.78MB, RAM 0.00MB)` (Metal-backed) and produces a coherent 512×512 PNG. If `VRAM` is `0.00MB` instead, the dylib is CPU-only — check `otool -L \"$APP_DATA/bin/libstable-diffusion.dylib\" | grep -i metal` and reinstall the engine from **Settings → Local Models** if Metal is missing.\n\n---\n\n## ✨ Features\n\n- **Image Studio** — Generate images from text prompts (50+ text-to-image models) or transform existing images (55+ image-to-image models). Switches model set automatically based on whether a reference image is provided. Quality and resolution controls visible for models that support them.\n- **Local Inference** — Two engines: **sd.cpp** (bundled, runs on Mac/Win/Linux with Metal/CUDA/Vulkan/ROCm) for SD 1.5, SDXL, and Z-Image; and **Wan2GP** (BYO Gradio server) for Flux, Qwen-Image, and video models (Wan 2.2, Hunyuan, LTX). Configure both in Settings → Local Models.\n- **Multi-Image Input** — Upload up to 14 reference images for compatible edit models (Nano Banana 2 Edit, Flux Kontext Dev, GPT-4o Edit, and more). Multi-select picker with order badges, batch upload, and a \"Use Selected\" confirmation flow.\n- **Video Studio** — Generate videos from text prompts (40+ text-to-video models) or animate a start-frame image (60+ image-to-video models). Same intelligent mode switching as Image Studio.\n- **Lip Sync Studio** — Animate portrait images or sync lips on existing videos using audio. 9 dedicated models across two modes: portrait image + audio → talking video, and video + audio → lipsync video.\n- **Cinema Studio** — Interface for photorealistic cinematic shots with pro camera controls (Lens, Focal Length, Aperture)\n- **Workflow Studio** — Build and run multi-step AI pipelines visually. Chain image, video, and audio models into automated flows. Browse community templates, create your own with a node-based editor, and run them via an interactive playground.\n- **Upload History** — Reference images are uploaded once and stored locally. A picker panel lets you reuse any previously uploaded image across sessions — no re-uploading.\n- **Smart Controls** — Dynamic aspect ratio, resolution/quality, and duration pickers that adapt to each model's capabilities (including t2i models with resolution or quality options)\n- **Generation History** — Browse, revisit, and download all past generations (persisted in browser storage)\n- **Image & Video Download** — One-click download of generated outputs in full resolution\n- **API Key Management** — Secure API key storage in browser localStorage (never sent to any server except Muapi)\n- **Responsive Design** — Works seamlessly on desktop and mobile with dark glassmorphism UI\n\n### 🖼️ Image Studio — Dual Mode\n\nThe Image Studio automatically switches between two model sets:\n\n| Mode | Trigger | Models | Prompt |\n| :--- | :--- | :--- | :--- |\n| **Text-to-Image** | Default (no image) | 50+ t2i models (Flux, Nano Banana 2, Seedream 5.0, Ideogram, GPT-4o, Midjourney…) | Required |\n| **Image-to-Image** | Reference image uploaded | 55+ i2i models (Kontext, Nano Banana 2 Edit, Seedream 5.0 Edit, Seededit, Upscaler…) | Optional |\n\n#### Newly Added Models\n\n| Model | Type | Key Features |\n| :--- | :--- | :--- |\n| **Nano Banana 2** | Text-to-Image | Google Gemini 3.1 Flash Image · Resolution 1K/2K/4K · Google Search enhancement · aspect ratio `auto` |\n| **Nano Banana 2 Edit** | Image-to-Image | Up to **14 reference images** · Resolution 1K/2K/4K · Google Search enhancement |\n| **Seedream 5.0** | Text-to-Image | ByteDance · Quality basic/high · 8 aspect ratios · up to 4K |\n| **Seedream 5.0 Edit** | Image-to-Image | ByteDance · Natural language style transfer · Quality basic/high |\n| **MiniMax Image 01** | Text-to-Image | MiniMax · 8 aspect ratios · up to 4 images per request · 1500 char prompt |\n\n#### Multi-Image Input\n\nModels that accept multiple reference images expose a multi-select picker when active:\n\n| Model | Max Images |\n| :--- | :--- |\n| Nano Banana 2 Edit | 14 |\n| Nano Banana Edit | 10 |\n| Flux Kontext Dev I2I | 10 |\n| Kling O1 Edit Image | 10 |\n| GPT-4o Edit / GPT Image 1.5 Edit | 10 |\n| Bytedance Seedream Edit v4 / v4.5 | 10 |\n| Vidu Q2 Reference to Image | 7 |\n| Flux 2 Flex/Pro Edit | 8 |\n| Nano Banana Pro Edit | 8 |\n| Flux Kontext Pro/Max I2I | 2 |\n| Wan 2.5/2.6 Image Edit | 2–3 |\n| Qwen Image Edit Plus / 2511 | 3 |\n| GPT-4o Image to Image | 5 |\n| Flux 2 Klein 4b/9b Edit | 4 |\n\nWhen a multi-image model is selected the upload trigger switches to multi-select mode:\n- **Checkboxes with order numbers** — images are sent to the model in the order you select them\n- **Batch upload** — pick multiple files at once from your file dialog\n- **Count badge** on the trigger shows how many images are active; a `+` badge appears when more slots are available\n- **\"Use Selected\" button** confirms and closes the picker\n\n### 🎬 Video Studio — Dual Mode\n\nThe Video Studio follows the same pattern:\n\n| Mode | Trigger | Models | Prompt |\n| :--- | :--- | :--- | :--- |\n| **Text-to-Video** | Default (no image) | 40+ t2v models (Kling, Sora, Veo, Wan, Seedance 2.0, Hailuo, Runway…) | Required |\n| **Image-to-Video** | Start frame uploaded | 60+ i2v models (Kling I2V, Veo3 I2V, Runway I2V, Wan I2V, Seedance 2.0 I2V, Midjourney I2V…) | Optional |\n\n#### Newly Added Models\n\n| Model | Type | Key Features |\n| :--- | :--- | :--- |\n| **Seedance 2.0** | Text-to-Video | ByteDance · Aspect ratios 16:9 / 9:16 / 4:3 / 3:4 · Duration 5 / 10 / 15s · Quality basic/high |\n| **Seedance 2.0 I2V** | Image-to-Video | ByteDance · Animate images into video · Up to 9 reference images · Aspect ratios 16:9 / 9:16 / 4:3 / 3:4 · Duration 5 / 10 / 15s · Quality basic/high |\n| **Seedance 2.0 Extend** | Video Extension | ByteDance · Seamlessly continue any Seedance 2.0 generation · Preserves style, motion & audio · Optional continuation prompt · Duration 5 / 10 / 15s · Quality basic/high |\n| **Grok Imagine T2V** | Text-to-Video | xAI · Duration 6 / 10 / **15s** · Modes: fun / normal / spicy · Aspect ratios 9:16 / 16:9 / 2:3 / 3:2 / 1:1 |\n| **Grok Imagine I2V** | Image-to-Video | xAI · Duration 6 / 10 / **15s** · Modes: fun / normal / spicy · Cinematic motion from still images |\n| **MiniMax Hailuo 02 / 2.3 Standard & Pro** | Text-to-Video / Image-to-Video | MiniMax · Full HD video · Multiple aspect ratios · Fast variant included |\n\n### 🎙️ Lip Sync Studio\n\nThe **Lip Sync Studio** generates audio-driven talking videos using 9 models across two input modes:\n\n| Mode | Trigger | Description |\n| :--- | :--- | :--- |\n| **Portrait Image** | Default | Upload a portrait image + audio file → animated talking video |\n| **Video** | Switch to Video mode | Upload an existing video + audio file → lipsync video |\n\n#### Image-based Models (Portrait Image + Audio → Video)\n\n| Model | Endpoint | Resolutions | Prompt |\n| :--- | :--- | :--- | :--- |\n| **Infinite Talk** | `infinitetalk-image-to-video` | 480p, 720p | Optional |\n| **Wan 2.2 Speech to Video** | `wan2.2-speech-to-video` | 480p, 720p | Optional |\n| **LTX 2.3 Lipsync** | `ltx-2.3-lipsync` | 480p, 720p, 1080p | Optional |\n| **LTX 2 19B Lipsync** | `ltx-2-19b-lipsync` | 480p, 720p, 1080p | Optional |\n\n#### Video-based Models (Video + Audio → Lipsync Video)\n\n| Model | Endpoint | Resolutions | Prompt |\n| :--- | :--- | :--- | :--- |\n| **Sync Lipsync** | `sync-lipsync` | — | — |\n| **LatentSync** | `latentsync-video` | — | — |\n| **Creatify Lipsync** | `creatify-lipsync` | — | — |\n| **Veed Lipsync** | `veed-lipsync` | — | — |\n| **Infinite Talk V2V** | `infinitetalk-video-to-video` | 480p, 720p | Optional |\n\n**How it works:**\n1. Select **Portrait Image** or **Video** mode using the toggle\n2. Upload your portrait image (or video) using the image/video upload button\n3. Upload your audio file using the audio upload button\n4. Optionally enter a prompt to guide the motion style\n5. Select a model and resolution (where supported), then click **Generate**\n\nGeneration history is saved separately in `lipsync_history` and pending jobs resume automatically on page reload.\n\n### 🔀 Workflow Studio\n\nThe **Workflow Studio** lets you build and run multi-step AI pipelines without writing code.\n\n**Key capabilities:**\n- **Templates** — Start from pre-built workflows (image chains, video pipelines, and more)\n- **My Workflows** — Save and manage your own custom pipelines\n- **Community** — Browse and run workflows published by other users\n- **Node-based Builder** — Drag-and-drop visual editor to connect models and route outputs between steps\n- **Playground** — Run any workflow interactively with a form UI; results render inline\n- **API execution** — Every workflow is also callable via the Muapi API\n\n> 💡 **Want to add workflows to your own app?** Check out **[Vibe Workflow](https://github.com/SamurAIGPT/Vibe-Workflow)** — the open-source workflow engine powering this feature. Drop it into any project.\n\n### 🎥 Cinema Studio Controls\n\nThe **Cinema Studio** offers precise control over the virtual camera, translating your choices into optimized prompt modifiers:\n\n| Category | Available Options |\n| :--- | :--- |\n| **Cameras** | Modular 8K Digital, Full-Frame Cine Digital, Grand Format 70mm Film, Studio Digital S35, Classic 16mm Film, Premium Large Format Digital |\n| **Lenses** | Creative Tilt, Compact Anamorphic, Extreme Macro, 70s Cinema Prime, Classic Anamorphic, Premium Modern Prime, Warm Cinema Prime, Swirl Bokeh Portrait, Vintage Prime, Halation Diffusion, Clinical Sharp Prime |\n| **Focal Lengths** | 8mm (Ultra-Wide), 14mm, 24mm, 35mm (Human Eye), 50mm (Portrait), 85mm (Tight Portrait) |\n| **Apertures** | f/1.4 (Shallow DoF), f/4 (Balanced), f/11 (Deep Focus) |\n\n### 📁 Upload History & Picker\n\nEvery image you upload is saved locally (URL + thumbnail) so you never upload the same file twice:\n\n- Click the upload button to open the **reference image picker**\n- Previously uploaded images appear in a 3-column grid with thumbnails\n- **Single-image models** — click a thumbnail to instantly select and close\n- **Multi-image models** — toggle multiple thumbnails (shown with order numbers), then click **Use Selected**\n- Upload new images with the **Upload files** button (supports multi-file selection in multi-image mode)\n- Remove individual images from history with the ✕ button\n- History persists across browser sessions (stored in `localStorage`)\n\n## 🚀 Quick Start\n\n### Prerequisites\n\n- [Node.js](https://nodejs.org/) (v18+)\n- A [Muapi.ai access key](https://muapi.ai/access-keys). Copy the generated key value into the app; do not enter the key name or label.\n\n### Setup\n\n> **Most users want the desktop app, not this dev path.** If you just want to run Open Generative AI on your machine, [download a prebuilt installer](#-download-desktop-app) instead — no Node.js required. The instructions below are for contributors building from source.\n\nPick the entry point that matches your goal:\n\n- **Desktop app (Electron)** → `npm run electron:dev`\n- **Hosted web version (Next.js)** → `npm run dev`\n\n```bash\n# Clone the repository (with submodules — required for the workflow + agent packages)\ngit clone --recurse-submodules https://github.com/Anil-matcha/Open-Generative-AI.git\ncd Open-Generative-AI\n\n# If you already cloned without --recurse-submodules, run this once:\n# git submodule update --init --recursive\n\n# Install dependencies + build workspace packages (studio, workflow, agents).\n# This step is REQUIRED — `npm install` alone is not enough; the workspaces\n# need to be built before either dev script will work.\nnpm run setup\n\n# Then start ONE of:\nnpm run electron:dev   # Desktop app (Electron + Vite) — recommended\nnpm run dev            # Hosted web version (Next.js) → http://localhost:3000\n```\n\nYou'll be prompted to enter your Muapi API key on first use (skip the key if you only plan to use local models).\n\n> **Troubleshooting — `Couldn't find a 'pages' directory`**: this means Next.js can't see the `app/` folder. Confirm you're running `npm run dev` from the repo root (the directory that contains `app/`, `package.json`, and `next.config.mjs`), and that you cloned with submodules. Re-run `npm run setup` if `packages/Vibe-Workflow` or `packages/Open-Poe-AI` are empty.\n\n### Production Build\n\n```bash\nnpm run build\nnpm run start\n```\n\n### Desktop App Build\n\nBuild native desktop apps with Electron:\n\n```bash\n# macOS (DMG — Intel + Apple Silicon)\nnpm run electron:build\n\n# Windows (NSIS installer — x64 + ARM64)\nnpm run electron:build:win\n\n# Linux (AppImage + DEB — x64)\nnpm run electron:build:linux\n\n# Both platforms in one pass\nnpm run electron:build:all\n```\n\nInstallers are output to the `release/` folder. Pre-built binaries are also available on the [Releases page](https://github.com/Anil-matcha/Open-Generative-AI/releases).\n\n## 🏗️ Architecture\n\nThe app is a **Next.js monorepo** with a shared `packages/studio` component library.\n\n```\nOpen-Generative-AI/\n├── app/                        # Next.js App Router\n│   ├── layout.js               # Root layout (Tailwind, fonts)\n│   ├── page.js                 # Redirects → /studio\n│   └── studio/\n│       └── page.js             # Studio page — renders StandaloneShell\n├── components/\n│   ├── StandaloneShell.js      # Tab nav + BYOK (API key from localStorage)\n│   └── ApiKeyModal.js          # API key entry modal\n├── packages/\n│   └── studio/                 # Shared React component library\n│       └── src/\n│           ├── index.js        # Exports: ImageStudio, VideoStudio, LipSyncStudio, CinemaStudio, WorkflowStudio\n│           ├── models.js       # 200+ model definitions (single source of truth)\n│           ├── muapi.js        # API client (named exports, apiKey as first param)\n│           └── components/\n│               ├── ImageStudio.jsx    # Dual-mode t2i/i2i studio\n│               ├── VideoStudio.jsx    # Dual-mode t2v/i2v studio\n│               ├── LipSyncStudio.jsx  # Portrait/video + audio → talking video\n│               ├── CinemaStudio.jsx   # Pro studio with camera controls\n│               └── WorkflowStudio.jsx # Multi-step pipeline builder & playground\n├── next.config.mjs             # transpilePackages: ['studio']\n├── tailwind.config.js\n└── package.json                # workspaces: [\"packages/studio\"]\n```\n\nThe `packages/studio` library is also consumed by the hosted version on [muapi.ai](https://muapi.ai) — model updates made in `packages/studio/src/models.js` apply to both the self-hosted app and the hosted version automatically.\n\n## 🔌 API Integration\n\nThe app communicates with [Muapi.ai](https://muapi.ai) using a two-step pattern:\n\n1. **Submit** — `POST /api/v1/{model-endpoint}` with prompt and parameters\n2. **Poll** — `GET /api/v1/predictions/{request_id}/result` until status is `completed`\n\nAuthentication uses the `x-api-key` header. During development, a Vite proxy handles CORS by routing `/api` requests to `https://api.muapi.ai`.\n\nFile uploads use `POST /api/v1/upload_file` (multipart/form-data) and return a hosted URL that is passed to image-conditioned models. For multi-image models the full `images_list` array is forwarded to the API in one request.\n\nLip sync jobs use the same two-step pattern: a dedicated `processLipSync()` method accepts `image_url` or `video_url` alongside `audio_url`, dispatches to the model's endpoint, and polls until the output video URL is available.\n\n## 🎨 Supported Model Categories\n\n| Category | Count | Examples |\n|---|---|---|\n| **Text-to-Image** | 50+ | Flux Dev, Nano Banana 2, Seedream 5.0, Ideogram v3, Midjourney v7, GPT-4o, SDXL |\n| **Image-to-Image** | 55+ | Nano Banana 2 Edit (×14), Flux Kontext Pro, GPT-4o Edit, Seededit v3, Upscaler, Background Remover |\n| **Text-to-Video** | 40+ | Kling v3, Sora 2, Veo 3, Wan 2.6, Seedance 2.0, Seedance 2.0 Extend, Seedance Pro, Hailuo 2.3, Runway Gen-3 |\n| **Image-to-Video** | 60+ | Kling v2.1 I2V, Veo3 I2V, Runway I2V, Seedance 2.0 I2V, Midjourney v7 I2V, Hunyuan I2V, Wan2.2 I2V |\n| **Lip Sync** | 9 | Infinite Talk I2V, Wan 2.2 Speech to Video, LTX 2.3 Lipsync, LTX 2 19B Lipsync, Sync, LatentSync, Creatify, Veed, Infinite Talk V2V |\n\n## 🛠️ Tech Stack\n\n- **Next.js 14** — App Router, server components, fast dev server\n- **React 18** — Studio UI components\n- **Tailwind CSS v3** — Utility-first styling\n- **npm workspaces** — Monorepo with shared `packages/studio` library\n- **Muapi.ai** — AI model API gateway\n\n## 🤔 How is this different from other AI Video Plaforms?\n\n**Open Generative AI** is a community-driven, open-source alternative that provides similar creative capabilities without the closed ecosystem:\n\n| | Other providers | Open Generative AI |\n| :--- | :--- | :--- |\n| **Cost** | Subscription-based | Free (open-source) |\n| **Content filters** | Yes — prompts blocked or altered | None |\n| **Restrictions** | Platform guardrails enforced | Full creative freedom |\n| **Models** | Proprietary | 200+ open & commercial models |\n| **Multi-image input** | Limited | Up to 14 images per request |\n| **Lip sync** | No | 9 models, image & video modes |\n| **Hosted version** | Subscription | Free at [muapi.ai/open-generative-ai](https://muapi.ai/open-generative-ai) |\n| **Self-hosting** | No | Yes |\n| **Customizable** | No | Fully hackable |\n| **Data privacy** | Cloud-based | Your data stays local |\n| **Source code** | Closed | MIT licensed |\n\n## 📄 License\n\nMIT\n\n## 🙏 Credits\n\nBuilt with [Muapi.ai](https://muapi.ai) — the unified API for AI image and video generation models.\n\n---\n**Deep Dive**: For more details on the \"AI Influencer\" engine, upcoming \"Popcorn\" storyboarding features, and the future of this project, read the [full technical overview](https://medium.com/@anilmatcha/).\n\n---\n*Looking for a free, open-source AI Video Platform? Open Generative AI is an open-source AI image and video generation studio — with no content filters that you can self-host, customize, and extend.*\n","summary":"Open Generative AI is an open-source platform that provides unrestricted access to over 200 state-of-the-art models for creating AI-generated images, videos, and lip-sync content. It serves as a subscription-free alternative to traditional AI platforms, offering both a browser-based web interface and installable desktop applications for macOS, Windows, and Linux. This project is ideal for creators and developers seeking a flexible, non-gated ecosystem to generate media or automate complex production pipelines using AI agents.","description":"Open-source alternative to AI video platforms — Free AI image & video generation studio with 200+ models (Flux, Midjourney, Kling, Sora, Veo). No content filters. Self-hosted, MIT licensed.","stars":17901,"language":"JavaScript"},{"owner":"z-lab","repo":"dflash","url":"https://github.com/z-lab/dflash","readme":"# DFlash: Block Diffusion for Flash Speculative Decoding\n[**Paper**](https://arxiv.org/abs/2602.06036) | [**Blog**](https://z-lab.ai/projects/dflash/) | [**Models**](https://huggingface.co/collections/z-lab/dflash)\n\n**DFlash** is a lightweight **block diffusion** model designed for speculative decoding. It enables efficient and high-quality parallel drafting.\n\n![DFlash Architecture](https://raw.githubusercontent.com/jianc99/jianc99.github.io/master/images/dflash_system.png)\n\nhttps://github.com/user-attachments/assets/5b29cabb-eb95-44c9-8ffe-367c0758de8c\n\n## Supported Models\n\n| Model | DFlash Draft |\n|---|---|\n| gemma-4-31B-it | [z-lab/gemma-4-31B-it-DFlash](https://huggingface.co/z-lab/gemma-4-31B-it-DFlash) |\n| gemma-4-26B-A4B-it | [z-lab/gemma-4-26B-A4B-it-DFlash](https://huggingface.co/z-lab/gemma-4-26B-A4B-it-DFlash) |\n| MiniMax-M2.7 (Preview) | [z-lab/MiniMax-M2.7-DFlash](https://huggingface.co/z-lab/MiniMax-M2.7-DFlash) |\n| MiniMax-M2.5 (Preview) | [z-lab/MiniMax-M2.5-DFlash](https://huggingface.co/z-lab/MiniMax-M2.5-DFlash) |\n| Kimi-K2.6 (Preview) | [z-lab/Kimi-K2.6-DFlash](https://huggingface.co/z-lab/Kimi-K2.6-DFlash) |\n| Kimi-K2.5 | [z-lab/Kimi-K2.5-DFlash](https://huggingface.co/z-lab/Kimi-K2.5-DFlash) |\n| Qwen3.6-27B | [z-lab/Qwen3.6-27B-DFlash](https://huggingface.co/z-lab/Qwen3.6-27B-DFlash) |\n| Qwen3.6-35B-A3B | [z-lab/Qwen3.6-35B-A3B-DFlash](https://huggingface.co/z-lab/Qwen3.6-35B-A3B-DFlash) |\n| Qwen3.5-4B | [z-lab/Qwen3.5-4B-DFlash](https://huggingface.co/z-lab/Qwen3.5-4B-DFlash) |\n| Qwen3.5-9B | [z-lab/Qwen3.5-9B-DFlash](https://huggingface.co/z-lab/Qwen3.5-9B-DFlash) |\n| Qwen3.5-27B | [z-lab/Qwen3.5-27B-DFlash](https://huggingface.co/z-lab/Qwen3.5-27B-DFlash) |\n| Qwen3.5-35B-A3B | [z-lab/Qwen3.5-35B-A3B-DFlash](https://huggingface.co/z-lab/Qwen3.5-35B-A3B-DFlash) |\n| Qwen3.5-122B-A10B | [z-lab/Qwen3.5-122B-A10B-DFlash](https://huggingface.co/z-lab/Qwen3.5-122B-A10B-DFlash) |\n| gpt-oss-20b | [z-lab/gpt-oss-20b-DFlash](https://huggingface.co/z-lab/gpt-oss-20b-DFlash) |\n| gpt-oss-120b | [z-lab/gpt-oss-120b-DFlash](https://huggingface.co/z-lab/gpt-oss-120b-DFlash) |\n| Qwen3-Coder-Next | [z-lab/Qwen3-Coder-Next-DFlash](https://huggingface.co/z-lab/Qwen3-Coder-Next-DFlash) |\n| Qwen3-4B (non-thinking) | [z-lab/Qwen3-4B-DFlash-b16](https://huggingface.co/z-lab/Qwen3-4B-DFlash-b16) |\n| Qwen3-8B (non-thinking) | [z-lab/Qwen3-8B-DFlash-b16](https://huggingface.co/z-lab/Qwen3-8B-DFlash-b16) |\n| Qwen3-Coder-30B-A3B | [z-lab/Qwen3-Coder-30B-A3B-DFlash](https://huggingface.co/z-lab/Qwen3-Coder-30B-A3B-DFlash) |\n| Llama-3.1-8B-Instruct | [z-lab/LLaMA3.1-8B-Instruct-DFlash-UltraChat](https://huggingface.co/z-lab/LLaMA3.1-8B-Instruct-DFlash-UltraChat) |\n| DeepSeek-V4-Flash | Coming soon |\n| DeepSeek-V4-Pro | Coming soon |\n| GLM-5.1 | Coming soon |\n\n> Feel free to open a GitHub issue to request support for additional models. We will also open-source the training recipe soon, so you can train your own DFlash draft model to accelerate any LLM.\n\n## 📦 Installation\n\nUse a separate virtual environment for each to avoid conflict.\n\n| Backend | Install command |\n|---|---|\n| **Transformers** | `uv pip install -e \".[transformers]\"` |\n| **SGLang** | `uv pip install -e \".[sglang]\"` |\n| **vLLM** | See below |\n| **MLX** (Apple Silicon) | `pip install -e \".[mlx]\"` |\n\n**vLLM:** vLLM v0.20.1+ includes core DFlash support. Use the standard install for most models:\n```bash\nuv pip install -e \".[vllm]\"\n```\n\nGemma4 DFlash currently needs our temporary vLLM Gemma4 build. Docker is recommended:\n```bash\ndocker pull ghcr.io/z-lab/vllm-openai:gemma4-dflash-cu130\n```\n\nSource fallback for Gemma4:\n```bash\nuv pip install -U --torch-backend=auto \\\n  \"vllm @ git+https://github.com/vllm-project/vllm.git@refs/pull/41703/head\"\n```\n\nNewer non-Gemma4 SWA draft models use the SWA support branch:\n```bash\nuv pip install -U --torch-backend=auto \\\n  \"vllm @ git+https://github.com/vllm-project/vllm.git@refs/pull/40898/head\"\n```\n\n## 🚀 Quick Start\n\n### vLLM\n\nGemma4 with Docker:\n```bash\ndocker run --rm -it \\\n  --gpus all \\\n  --ipc=host \\\n  --shm-size=16g \\\n  -p 8000:8000 \\\n  -v ~/.cache/huggingface:/root/.cache/huggingface \\\n  ghcr.io/z-lab/vllm-openai:gemma4-dflash-cu130 \\\n  google/gemma-4-26B-A4B-it \\\n  --host 0.0.0.0 \\\n  --port 8000 \\\n  --speculative-config '{\"method\": \"dflash\", \"model\": \"z-lab/gemma-4-26B-A4B-it-DFlash\", \"num_speculative_tokens\": 15, \"attention_backend\": \"flash_attn\"}' \\\n  --attention-backend triton_attn \\\n  --max-num-batched-tokens 32768 \\\n  --trust-remote-code\n```\n\nNon-Gemma4 models:\n```bash\nvllm serve Qwen/Qwen3.5-27B \\\n  --speculative-config '{\"method\": \"dflash\", \"model\": \"z-lab/Qwen3.5-27B-DFlash\", \"num_speculative_tokens\": 15}' \\\n  --attention-backend flash_attn \\\n  --max-num-batched-tokens 32768\n```\n\n### SGLang\n\n```bash\nexport SGLANG_ALLOW_OVERWRITE_LONGER_CONTEXT_LEN=1\n\n# Optional: enable schedule overlapping (experimental, may not be stable)\n# export SGLANG_ENABLE_SPEC_V2=1\n# export SGLANG_ENABLE_DFLASH_SPEC_V2=1\n# export SGLANG_ENABLE_OVERLAP_PLAN_STREAM=1\n\npython -m sglang.launch_server \\\n    --model-path Qwen/Qwen3.5-35B-A3B \\\n    --speculative-algorithm DFLASH \\\n    --speculative-draft-model-path z-lab/Qwen3.5-35B-A3B-DFlash \\\n    --speculative-num-draft-tokens 16 \\\n    --tp-size 1 \\\n    --attention-backend trtllm_mha \\\n    --speculative-draft-attention-backend fa4 \\\n    --mem-fraction-static 0.75 \\\n    --mamba-scheduler-strategy extra_buffer \\\n    --trust-remote-code\n```\n\n### Transformers\n\nOnly Qwen3 and LLaMA-3.1 models support the Transformers backend.\n\n```python\nfrom transformers import AutoModel, AutoModelForCausalLM, AutoTokenizer\n\ndraft = AutoModel.from_pretrained(\"z-lab/Qwen3-8B-DFlash-b16\", trust_remote_code=True, dtype=\"auto\", device_map=\"cuda:0\").eval()\ntarget = AutoModelForCausalLM.from_pretrained(\"Qwen/Qwen3-8B\", dtype=\"auto\", device_map=\"cuda:0\").eval()\ntokenizer = AutoTokenizer.from_pretrained(\"Qwen/Qwen3-8B\")\n\nmessages = [{\"role\": \"user\", \"content\": \"How many positive whole-number divisors does 196 have?\"}]\ninput_ids = tokenizer.apply_chat_template(messages, return_tensors=\"pt\", add_generation_prompt=True, enable_thinking=False).to(draft.device)\n\noutput = draft.spec_generate(input_ids=input_ids, max_new_tokens=2048, temperature=0.0, target=target, stop_token_ids=[tokenizer.eos_token_id])\nprint(tokenizer.decode(output[0], skip_special_tokens=False))\n```\n\n### MLX (Apple Silicon)\n\nThere have been many great community DFlash implementations on MLX; we provide a simple and efficient one here, tested on an Apple M5 Pro with Qwen3, Qwen3.5 and Gemma-4 models.\n\n```python\nfrom dflash.model_mlx import load, load_draft, stream_generate\n\nmodel, tokenizer = load(\"Qwen/Qwen3.5-4B\")\ndraft = load_draft(\"z-lab/Qwen3.5-4B-DFlash\")\n\nmessages = [{\"role\": \"user\", \"content\": \"How many positive whole-number divisors does 196 have?\"}]\nprompt = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True, enable_thinking=True)\ntps = 0.0\nfor r in stream_generate(model, draft, tokenizer, prompt, block_size=16, max_tokens=2048, temperature=0.6):\n    print(r.text, end=\"\", flush=True)\n    tps = r.generation_tps\nprint(f\"\\nThroughput: {tps:.2f} tok/s\")\n```\n\n## 📊 Evaluation\n\nAll benchmarks share the same datasets (gsm8k, math500, humaneval, mbpp, mt-bench). Datasets are automatically downloaded and cached as JSONL in `cache/` on first run.\n\n**vLLM**:\n```bash\npython -m dflash.benchmark --backend vllm \\\n    --base-url http://127.0.0.1:8000 --model Qwen/Qwen3.5-27B \\\n    --dataset gsm8k --num-prompts 128 --concurrency 1 --enable-thinking\n```\n\n**SGLang**:\n```bash\npython -m dflash.benchmark --backend sglang \\\n    --base-url http://127.0.0.1:30000 --model Qwen/Qwen3.5-35B-A3B \\\n    --dataset gsm8k --num-prompts 128 --concurrency 1 --enable-thinking\n```\n\n**Transformers** (Qwen3 and LLaMA only):\n```bash\ntorchrun --nproc_per_node=8 -m dflash.benchmark --backend transformers \\\n    --model Qwen/Qwen3-8B --draft-model z-lab/Qwen3-8B-DFlash-b16 \\\n    --dataset gsm8k --max-samples 128\n```\n\n**MLX**:\n```bash\npython -m dflash.benchmark --backend mlx \\\n    --model mlx-community/gemma-4-31b-it-4bit --draft-model z-lab/gemma-4-31B-it-DFlash \\\n    --dataset gsm8k --max-samples 128 --enable-thinking\n```\n\n## Acknowledgement\n\nHuge thanks to [@dcw02](https://github.com/dcw02), [@gongy](https://github.com/gongy), and the team at [@modal-labs](https://github.com/modal-labs) for their fast, high-quality support in bringing DFlash to SGLang. And huge thanks as well to [@benchislett](https://github.com/benchislett) at NVIDIA for his work in bringing DFlash to vLLM and helping make it available to the broader serving community.\n\n## Citation\nIf you find DFlash useful, please cite our work. To share feedback on DFlash or request new model support, please fill out this form: [DFlash Feedback](https://forms.gle/4YNwfqb4nJdqn6hq9).\n\n```bibtex\n@article{chen2026dflash,\n  title   = {{DFlash: Block Diffusion for Flash Speculative Decoding}},\n  author  = {Chen, Jian and Liang, Yesheng and Liu, Zhijian},\n  journal = {arXiv preprint arXiv:2602.06036},\n  year    = {2026}\n}\n```\n","summary":"DFlash is a lightweight block diffusion model specifically engineered to enhance speculative decoding performance in large language models. By enabling efficient and high-quality parallel drafting, it significantly accelerates text generation across a wide range of popular open-source architectures, including Qwen, Gemma, and Llama. This project is ideal for developers and researchers looking to optimize LLM inference speed and throughput without sacrificing output quality.","description":"DFlash: Block Diffusion for Flash Speculative Decoding","stars":4812,"language":"Python"},{"owner":"crynta","repo":"terax-ai","url":"https://github.com/crynta/terax-ai","readme":"<div align=\"center\">\n  <img src=\"public/logo.png\" width=\"144\" height=\"144\" alt=\"Terax\" />\n  <h1>Terax</h1>\n\n  <p><strong>Lightweight Terminal-first AI-native dev workspace.</strong></p>\n\n  <p>\n    <img src=\"https://img.shields.io/github/v/release/crynta/terax-ai?label=version&color=blue\" alt=\"version\" />\n    <img src=\"https://img.shields.io/badge/license-Apache--2.0-green\" alt=\"license\" />\n    <img src=\"https://img.shields.io/badge/platform-macOS%20%7C%20Linux%20%7C%20Windows-lightgrey\" alt=\"platform\" />\n  </p>\n\n  <p>\n    <a href=\"https://terax.app\">Website</a>\n    ·\n    <a href=\"https://terax.app/docs\">Docs</a>\n    ·\n    <a href=\"https://github.com/crynta/Terax-website\">Website's source code</a>\n  </p>\n</div>\n\n---\n\nTerax is a lightweight open-source terminal (ADE) built on Tauri 2 + Rust and React 19. A native PTY backend with a WebGL renderer, an agentic AI side-panel that runs against your own keys or fully local models, plus a code editor, file explorer, source control with a git graph, and a web preview pane built in. About 7-8 MB on disk. No telemetry. No account.\n\n## Screenshots\n\n<table>\n  <tr>\n    <td align=\"center\"><img src=\"docs/terminal.png\" alt=\"Terminal\" /><br/><sub>Multi-tab terminal with WebGL rendering</sub></td>\n    <td align=\"center\"><img src=\"docs/themes.png\" alt=\"Themes and background image\" /><br/><sub>Custom themes, presets, and background images</sub></td>\n  </tr>\n  <tr>\n    <td align=\"center\"><img src=\"docs/web-preview.png\" alt=\"Web preview\" /><br/><sub>Web preview of local dev servers</sub></td>\n    <td align=\"center\"><img src=\"docs/source-control.png\" alt=\"Source control and git graph\" /><br/><sub>Source control panel with git graph in history</sub></td>\n  </tr>\n  <tr>\n    <td colspan=\"2\" align=\"center\"><img src=\"docs/ai-workflow.png\" alt=\"AI window\" /><br/><sub>Agentic AI workflow with edit diffs in the code editor</sub></td>\n  </tr>\n</table>\n\n## Features\n\n### Terminal\n\n- xterm.js with WebGL renderer, multi-tab with background streaming\n- Native PTY backend via `portable-pty` (zsh, bash, pwsh, fish, cmd)\n- Split panels (horizontal and vertical)\n- Inline search, link detection, true-color\n- Per-tab workspace environments on Windows (Local, or any installed WSL distro)\n\n### Code editor\n\n- CodeMirror 6 (supports all popular languages - TS/JS, Rust, Python, Go, C/C++, Java, HTML/CSS, JSON, Markdown, etc.)\n- Inline AI autocomplete with local model support\n- AI edit diffs, accept or reject hunk by hunk\n- Vim mode\n- Ten built-in editor themes: Atom One, Aura, Copilot, GitHub Dark / Light, Gruvbox Dark, Nord, Tokyo Night, Xcode Dark / Light\n\n### Source control\n\n- Stage / unstage hunks, commit (Cmd+Enter / Ctrl+Enter), push with upstream awareness\n- Branch display including detached HEAD state\n- Git history pane with a real commit graph (lane rendering for merges and branches)\n- Commit search and filter, click through to the remote commit page\n\n### File explorer\n\n- Catppuccin icon theme\n- Fuzzy search, keyboard navigation, inline rename, context actions\n- Attach files and selections directly to the AI side-panel\n\n### Web preview\n\n- Auto-detects local dev servers and opens them in a preview tab\n- External URL preview via a native child webview\n\n### Themes and customization\n\n- Custom themes built in-app, switch between bundled presets and your own\n- Create your own themes, share them or import from the community\n- Background images with adjustable opacity and blur\n- Editor theme is independent from the app theme\n\n### AI\n\n- **BYOK providers:** OpenAI, Anthropic, Google (Gemini), Groq, xAI (Grok), Cerebras, OpenRouter, DeepSeek, Mistral, plus any OpenAI-compatible endpoint\n- **Local / offline:** LM Studio, MLX, Ollama\n- **Agentic workflow:** plans, sub-agents, project memory via `TERAX.md`, file read / write / edit / multi-edit / grep / glob, bash with approval gating, background processes\n- **Composer:** snippets via `#handle`, files via `@path`, slash commands, voice input, attach-to-agent from explorer or selection\n- **Custom agents** with their own system prompt and tool subset\n- **Plan mode** for multi-step work, generates and confirms before doing\n\n## Install\n\nLatest installers are on the [Releases](https://github.com/crynta/terax-ai/releases/latest) page. Terax auto-updates from there.\n\n### Windows notes\n\n- On first launch Windows shows \"Windows protected your PC\" because Terax isn't code-signed yet. Click **More info** then **Run anyway**.\n- Default shell detection: `pwsh.exe` (PowerShell 7+) -> `powershell.exe` (Windows PowerShell 5.1) -> `cmd.exe`.\n- WSL is a first-class workspace environment, not a wrapped subprocess.\n\n### Linux notes\n\n- **Arch / AUR:** `yay -S terax-bin` (or `paru`, etc.). Tracks the latest release.\n- **AppImage:** needs FUSE. Without it: `./Terax_*.AppImage --appimage-extract-and-run`. On Wayland with rendering glitches, try `WEBKIT_DISABLE_DMABUF_RENDERER=1`. Otherwise the `.deb` / `.rpm` packages link
