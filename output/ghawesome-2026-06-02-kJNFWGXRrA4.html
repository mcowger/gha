n/implementing-domain-driven-design.nano.md) | 37 | 19 | 2723 B |\n| [Patterns of Enterprise Application Architecture](patterns-of-enterprise-application-architecture/) | [full](patterns-of-enterprise-application-architecture/patterns-of-enterprise-application-architecture.md) | 404 | 196 | 15501 B | [mini](patterns-of-enterprise-application-architecture/patterns-of-enterprise-application-architecture.mini.md) | 54 | 36 | 8099 B | [nano](patterns-of-enterprise-application-architecture/patterns-of-enterprise-application-architecture.nano.md) | 35 | 17 | 2823 B |\n| [Refactoring](refactoring/) | [full](refactoring/refactoring.md) | 433 | 242 | 17866 B | [mini](refactoring/refactoring.mini.md) | 49 | 31 | 5167 B | [nano](refactoring/refactoring.nano.md) | 37 | 19 | 1986 B |\n| [Release It!](release-it/) | [full](release-it/release-it.md) | 382 | 204 | 13542 B | [mini](release-it/release-it.mini.md) | 48 | 30 | 6372 B | [nano](release-it/release-it.nano.md) | 38 | 20 | 2205 B |\n| [The Pragmatic Programmer](the-pragmatic-programmer/) | [full](the-pragmatic-programmer/the-pragmatic-programmer.md) | 359 | 179 | 13398 B | [mini](the-pragmatic-programmer/the-pragmatic-programmer.mini.md) | 65 | 47 | 7165 B | [nano](the-pragmatic-programmer/the-pragmatic-programmer.nano.md) | 44 | 26 | 2263 B |\n| [Working Effectively with Legacy Code](working-effectively-with-legacy-code/) | [full](working-effectively-with-legacy-code/working-effectively-with-legacy-code.md) | 371 | 193 | 13817 B | [mini](working-effectively-with-legacy-code/working-effectively-with-legacy-code.mini.md) | 50 | 32 | 5707 B | [nano](working-effectively-with-legacy-code/working-effectively-with-legacy-code.nano.md) | 35 | 17 | 1792 B |\n| [Refactoring.Guru](refactoring-guru/) | [full](refactoring-guru/refactoring-guru.md) | 765 | 478 | 62561 B | [mini](refactoring-guru/refactoring-guru.mini.md) | 64 | 46 | 6287 B | [nano](refactoring-guru/refactoring-guru.nano.md) | 41 | 23 | 2593 B |\n\n## Books List\n\n### [A Philosophy of Software Design](https://www.goodreads.com/book/show/39996759-a-philosophy-of-software-design)\n\nAuthor: [John Ousterhout](https://web.stanford.edu/~ouster/cgi-bin/home.php)\n\nThe book focuses on fighting complexity through deep modules, simple interfaces, information hiding, and design choices that reduce cognitive load. This rule set is especially useful for API design, module design, and refactoring shallow abstractions.\n\n### [Clean Architecture](https://www.goodreads.com/book/show/18043011-clean-architecture)\n\nAuthor: [Robert C. Martin](https://cleancoder.com/)\n\nThe book describes designing systems around stable boundaries, the dependency rule, and the separation of business policies from details such as frameworks, databases, and UI. This rule set helps keep code resistant to technology churn.\n\n### [Clean Code](https://www.goodreads.com/book/show/3735293-clean-code)\n\nAuthor: [Robert C. Martin](https://cleancoder.com/)\n\nThe book focuses on readability, naming, small functions, responsibilities, tests, and simplicity. This rule set is a strong default for everyday coding and code review.\n\n### [Code Complete](https://www.goodreads.com/book/show/4845.Code_Complete)\n\nAuthor: [Steve McConnell](https://www.construx.com/about-us/our-experts/steve-mcconnell/)\n\nThe book covers a broad range of software construction practices: routine design, variables, classes, control flow, defensive programming, coding standards, and testing. This rule set helps agents make disciplined implementation decisions.\n\n### [Designing Data-Intensive Applications](https://www.goodreads.com/book/show/23463279-designing-data-intensive-applications)\n\nAuthor: [Martin Kleppmann](https://martin.kleppmann.com/)\n\nThe book covers reliability, scalability, consistency, replication, partitioning, transactions, data streams, and schema evolution. This rule set is intended for systems where data ownership, event flows, and consistency semantics matter.\n\n### [Domain-Driven Design](https://www.goodreads.com/en/book/show/179133)\n\nAuthor: [Eric Evans](https://domainlanguage.com/)\n\nThe book introduces domain modeling, ubiquitous language, bounded contexts, tactical patterns, and strategic design. This rule set helps agents think in terms of the business model rather than tables, controllers, or DTOs.\n\n### [Domain-Driven Design Distilled](https://www.goodreads.com/book/show/28602719-domain-driven-design-distilled)\n\nAuthor: [Vaughn Vernon](https://vaughnvernon.com/)\n\nThe book is a short, practical introduction to DDD. It focuses on subdomains, bounded contexts, context mapping, and basic tactical patterns. This rule set is a good fit when you want the benefits of DDD without excessive ceremony.\n\n### [Implementing Domain-Driven Design](https://www.goodreads.com/book/show/18396266-implementing-domain-driven-design)\n\nAuthor: [Vaughn Vernon](https://vaughnvernon.com/)\n\nThe book shows how to apply DDD in real systems: aggregates, domain events, contexts, integrations, and application architecture. This rule set is more implementation-focused than `domain-driven-design-distilled`.\n\n### [Patterns of Enterprise Application Architecture](https://www.goodreads.com/en/book/show/70156.Patterns_of_Enterprise_Application_Architecture)\n\nAuthor: [Martin Fowler](https://martinfowler.com/)\n\nThe book catalogues enterprise application patterns: layers, service layer, transaction script, domain model, data mapper, repository, unit of work, identity map, DTO, and integration patterns. This rule set helps choose an appropriate pattern instead of mixing responsibilities accidentally.\n\n### [Refactoring](https://www.goodreads.com/book/show/44936.Refactoring)\n\nAuthor: [Martin Fowler](https://martinfowler.com/)\n\nThe book describes safe ways to improve code structure without changing observable behavior. This rule set emphasizes small steps, tests, code smell detection, and keeping refactoring separate from feature changes.\n\n### [Refactoring.Guru](https://refactoring.guru/refactoring)\n\nSource: [Refactoring.Guru](https://refactoring.guru/)\n\nThe site provides a practical refactoring process, code smell catalog, and catalog of refactoring techniques. This rule set is useful when an agent needs to diagnose smells, choose a safe treatment, preserve behavior, and stop before cleanup turns into uncontrolled redesign.\n\n### [Release It!](https://www.goodreads.com/en/book/show/1069827.Release_It_)\n\nAuthor: [Michael T. Nygard](https://www.michaelnygard.com/)\n\nThe book focuses on systems that survive production reality: failures, overload, timeouts, retries, circuit breakers, bulkheads, backpressure, observability, and deployment behavior. This rule set is useful for services, APIs, queues, integrations, and critical production paths.\n\n### [The Pragmatic Programmer](https://www.goodreads.com/book/show/50701156)\n\nAuthors: [Andrew Hunt](https://toolshed.com/), [David Thomas](https://pragdave.me/)\n\nThe book describes a pragmatic approach to software development: responsibility, DRY at the knowledge level, orthogonality, automation, fast feedback, prototyping, and adaptability. This rule set works well as a general engineering layer.\n\n### [Working Effectively with Legacy Code](https://www.goodreads.com/book/show/44919.Working_Effectively_with_Legacy_Code)\n\nAuthor: [Michael Feathers](https://www.r7krecon.com/)\n\nThe book explains how to safely change difficult, poorly tested code: characterization tests, seams, dependency breaking, sprout method, wrap method, and incremental risk reduction. This rule set is best for legacy work where the first goal is regaining control.\n\nFor choosing rule sets, skills, and delivery patterns, see [USAGE.md](docs/USAGE.md). For combining multiple books, see [COMPATIBILITY.md](docs/COMPATIBILITY.md). For the book extraction workflow, see [ADDING_THE_BOOK.md](docs/ADDING_THE_BOOK.md).\n\n## Does it work?\nThe first validation experiment used [vibe-coded-crap](https://github.com/ciembor/vibe-coded-crap), a deliberately generated helpdesk CLI project. The project as vibe-coded application generated with Codex, GPT-5.4 mini, reasoning medium, through continuous development across 80 tasks from `BACKLOG.md`. The project exists specifically for testing different `AGENTS.md` files and skills in refactoring workflows.\n\nThe experiment compared two separate refactors of the same application, both focused on [A Philosophy of Software Design](a-philosophy-of-software-design/):\n\n- [`aposd-refactor-mini-rules`](https://github.com/ciembor/vibe-coded-crap/tree/aposd-refactor-mini-rules), using the `mini` rules from this repository.\n- [`aposd-refactor-no-rules`](https://github.com/ciembor/vibe-coded-crap/tree/aposd-refactor-no-rules), using only this single `AGENTS.md` instruction:\n\n```md\n# OBEY A Philosophy of Software Design by John Ousterhout\n```\n\nFor each branch, Codex first generated a `PLAN.md` refactoring plan with GPT-5.5, reasoning extra high. The full plan was then executed with the same model, reasoning high. The resulting codebases were passed to ChatGPT with the prompt: “which code better implements the principles from A Philosophy of Software Design, and by how much?”\n\n**ChatGPT rated the mini rules refactor at roughly 74/100, versus 46/100 for the branch that only mentioned the book**. The result suggests that listing concrete rules from the book is more effective than merely naming the book when the goal is to make an agent apply the author's design principles during refactoring.\n\nThe result should be treated as an early qualitative signal, not a benchmark. A secondary Reek code-smell check showed only a small difference in generic static-analysis output: the original branch had 1083 detected smells, while the mini refactor had 1077. This suggests that the advantage of the mini rules did not show up clearly in raw smell counts. In this experiment, the difference was more visible in architectural judgment: module depth, responsibility boundaries, information hiding, and whether the refactor reduced the amount of code a reader needs to understand at once.\n\nDeeper measurements and equivalent experiments for other books are not planned at this stage because they would require substantial token budget and a large amount of manual review time.\n\n## Important Note\n\nThese rules are inspired by the books listed above. They are not official materials from the authors or publishers, and they are not a substitute for reading the books.\n\nThe files in this repository are practical engineering instructions written for AI coding tools. They intentionally avoid reproducing book text. Use them as lightweight working agreements, not as summaries or study notes.\n\n## FAQ\n\n### What are AI coding agent rules?\n\nAI coding agent rules are project-level instructions that guide tools like Codex, Cursor, Claude Code, and GitHub Copilot when generating, reviewing, or refactoring code.\n\n### What are AI coding agent skills?\n\nAI coding agent skills are task-specific instruction packs that agents load only when a workflow needs them, such as refactoring, reviewing, legacy-code changes, reliability work, or domain modeling.\n\n### What is AGENTS.md?\n\nAGENTS.md is a Markdown file used to give coding agents project-specific instructions, workflows, constraints, and coding standards.\n\n### Can I use these as Claude Code rules or skills?\n\nYes. You can copy selected rule sets into `CLAUDE.md` as project memory or turn a focused `mini` rule set into a Claude Code skill.\n\n### Can I use these as Cursor rules?\n\nYes. You can adapt the rule sets into Cursor project rules or keep them as AGENTS.md-style instructions.\n\n### Can I use these as GitHub Copilot custom instructions or skills?\n\nYes. The rules and skills are plain Markdown and can be adapted into GitHub Copilot custom instructions, prompt files, or reusable task-specific guidance.\n\n## Related searches\n\n**AI coding agent rules**, **Agent skills**, **AGENTS.md** examples, Claude Code rules, Cursor rules, Codex rules, GitHub Copilot custom instructions, **CLAUDE.md**, software engineering **rules for AI coding** assistants, Clean Code rules for AI, **Refactoring** rules for AI agents, **Domain-Driven Design rules**, Clean **Architecture rules**.\n\n## License\n\nThe code and rules in this repository are released under the MIT License.\n\nSee [LICENSE](LICENSE) for details.\n\n## Author\n\n[Maciej Ciemborowicz](https://maciej-ciemborowicz.eu)\n","summary":"Agent Rules Books provides a curated collection of standardized, Markdown-based rule sets for AI coding agents, distilled from foundational software engineering literature such as *Clean Code* and *Domain-Driven Design*. These rules are available in varying levels of detail—mini, nano, and full—allowing developers to balance context limits with instructional depth for tools like Cursor, Claude Code, and Codex. This project is an ideal resource for software engineers and architects looking to align their AI-assisted coding workflows with proven best practices in refactoring, design patterns, and system architecture.","description":"AGENTS.md rules / skills for AI coding agents: Codex, Cursor & Claude Code. Inspired by Clean Code, Refactoring, DDD, Clean Architecture and DDIA programming books.","stars":1716,"language":null},{"owner":"yikart","repo":"AiToEarn","url":"https://github.com/yikart/AiToEarn","readme":"# [Aitoearn：OPC（一人公司）的AI内容营销智能体](https://aitoearn.ai)\n\n<a href=\"https://trendshift.io/repositories/20785\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/20785\" alt=\"yikart%2FAiToEarn | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/></a>\n\n[![GitHub stars](https://img.shields.io/github/stars/yikart/AiToEarn?color=fa6470)](https://github.com/yikart/AiToEarn/stargazers)\n[![GitHub license](https://img.shields.io/badge/license-MIT-blue.svg)](LICENSE)\n[![Required Node.JS 20.18.x](https://img.shields.io/static/v1?label=node&message=20.18.x&logo=node.js&color=3f893e)](https://nodejs.org/about/releases)\n\n简体中文 | [English](README_EN.md) | [日本語](README_JA.md)\n\n**Monetize · Publish · Engage · Create —— 一站式平台。**\n\nAiToEarn 通过 **AI Agent自动化**，帮助 OPC（一人公司）、创作者、品牌与企业在全球主流平台上构建、分发并变现内容。\n\n支持渠道：\n抖音、小红书（Rednote）、快手、哔哩哔哩、视频号、TikTok、YouTube、Facebook、Instagram、Threads、Twitter（X）、Pinterest、LinkedIn\n\n## 🚀 快速使用 AiToEarn（5 种方式）\n\n| 方式 | 适合谁 | 需要部署吗 |\n|------|--------|-----------|\n| [① 打开网站直接用](#use-web) | 所有用户 | ❌ 不需要 |\n| [② 在龙虾 OpenClaw 中用](#use-in-openclaw) | 龙虾用户 | ❌ 不需要 |\n| [③ 在 Claude / Cursor 等 AI 助手中用](#use-in-claude) | AI 工具用户 | ❌ 不需要 |\n| [④ Docker 一键部署](#use-docker) | 想私有化部署的团队 | ✅ 需要服务器 |\n| [⑤ 源码开发](#use-source) | 开发者 | ✅ 需要开发环境 |\n\n> 💡 **方式 ②③④ 都需要先获取 API Key**，请先看 [如何获取 API Key](#get-api-key)。\n\n## 最新动态\n\n- **2026-05-21**: [2.4 version](https://github.com/yikart/AiToEarn/releases/tag/v2.4.0) — 草稿生成新增支持 HappyHorse 1.0 和 Seedance 2.0，增强视频/图文草稿批量生成、多模型选择、参考图片/视频、目标平台限制与文案提示词；带来全新界面风格，并增强 Twitter/X 探索与互动能力。\n- **2026-04-20**: OpenClaw（龙虾）新增 AiToEarn 赚钱支持，可在龙虾中直接接收并执行内容变现任务。\n- **2026-03-26**: [2.1 version](https://www.aitoearn.ai/) — 内容交易市场上线；新增 OpenClaw（龙虾）支持，可在龙虾中直接使用 AiToEarn；新增 MCP 协议支持，可在 Claude、Cursor 等任何支持 MCP 的 Agent 或大模型中使用 AiToEarn。\n- **2026-02-07**: [1.8.0 version](https://www.aitoearn.ai/)，新增线下商户推广解决方案，支持餐厅、零售店、民宿、美容美发、健身房等多种线下业态，将线下推广活动转化为可执行的线上传播任务，通过内容发布与用户参与机制，帮助门店获取更多线上曝光和到店流量。\n- **2025-12-15**: \"All In Agent\" 的开始！我们加入了能够自动内容生成和发布以及一些帮助你操作 Aitoearn 的超级 AI 智能 Agent。[v1.4.3](https://github.com/yikart/AiToEarn/releases/tag/v1.4.3)\n- **2025-11-28**: 支持应用内自动更新。在创作界面新增大量 AI 功能，例如：缩写、扩写、图片生成、视频生成、标签生成等，并支持 Nano Banana Pro。[v1.4.0](https://github.com/yikart/AiToEarn/releases/tag/v1.4.0)\n- **2025-11-12**: 首个开源且可完全使用的版本。[v1.3.2](https://github.com/yikart/AiToEarn/releases/tag/v1.3.2)\n- **2025-09-16**: 首个出海版本，新增支持 Facebook、Instagram、Threads、Twitter、YouTube、TikTok、Pinterest。[v1.0.18](https://github.com/yikart/AiToEarn/releases/tag/v1.0.18)\n- **2025-02-26**: 首个开源版本，初步实现小红书、抖音、快手、视频号视频一键发布。[v0.1.1](https://github.com/yikart/AiToEarn/releases/tag/v0.1.1)\n\n<details>\n  <summary><h2 style=\"display:inline;margin:0\">目录</h2></summary>\n\n  <br/>\n\n  1. [快速使用 AiToEarn（5 种方式）](#-快速使用-aitoearn5-种方式)\n  2. [最新动态](#最新动态)\n  3. [核心功能](#核心功能)\n  4. [如何获取 API Key](#get-api-key)\n  5. [贡献指南](#贡献指南)\n  6. [联系](#联系)\n  7. [推荐](#推荐)\n</details>\n\n## 核心功能\n\nAiToEarn 围绕内容创作者的完整变现链路，提供四大 Agent 能力：\n\n> **Monetize · Publish · Engage · Create**\n\n---\n\n### 💰 Monetize —— 内容赚钱\n\nAiToEarn 最核心的目标：**帮助每一位创作者赚钱**。\n\n创作者可以在平台出售内容以完成商家的推广任务。所有结算以结果为导向，我们提供三种结算模式：\n\n| 结算模式 | 全称 | 含义 |\n|---------|------|------|\n| **CPS** | Cost Per Sale | 按成交额结算 |\n| **CPE** | Cost Per Engagement | 按互动量结算 |\n| **CPM** | Cost Per Mille | 按播放量结算 |\n\n<img src=\"presentation/monetize-cn.png\" width=\"30%\">\n\n---\n\n### 📢 Publish —— 内容发布 Agent\n\n一键将内容分发到全球 10+ 主流平台，告别逐个平台手动发布。\n\n- **全网分发**：覆盖抖音、快手、B站、小红书、视频号、微信公众号、TikTok、YouTube、Facebook、Instagram、Threads、X（Twitter）、Pinterest、LinkedIn\n- **日历排期**：像排日程一样统一规划所有平台的内容发布时间\n\n<img src=\"presentation/publish-cn.png\" width=\"30%\"> <img src=\"presentation/channel-cn.png\" width=\"30%\">\n\n> ▶ 观看演示视频\n\n<a href=\"https://www.youtube.com/watch?v=5041jEKaiU8\">\n  <img src=\"https://img.youtube.com/vi/5041jEKaiU8/0.jpg\" alt=\"Publish 演示视频\" width=\"480\">\n</a>\n\n---\n\n### 💬 Engage —— 内容互动 Agent\n\n通过 AiToEarn 浏览器插件，在上述所有平台上实现自动化互动运营。\n\n- **自动化操作**：自动点赞、收藏、关注，批量高效运营\n- **AI 智能回复**：调用大模型为每条评论生成针对性回复，精准互动\n- **评论挖掘**：识别\"求链接\"\"怎么购买\"等高转化信号，快速响应\n- **品牌监测**：实时追踪关于你品牌的讨论，主动参与热点话题\n\n> ▶ 观看演示视频\n\n<a href=\"https://youtu.be/-QoHNrZBmp0\">\n  <img src=\"./presentation/engage-thumbnail-cn.png\" alt=\"Engage 演示视频\" width=\"480\">\n</a>\n\n---\n\n### 🎨 Create —— 内容创作 Agent\n\n我们用 Agent 的方式重构了内容制作流程。只需告诉 Agent 你的内容需求，它会自动完成从创意到成品的全部工作。\n\n**视频内容**：Agent 自动调用视频生成模型（Grok、Veo、Seedance 等）、视频翻译模块、视频剪辑模块，一站式完成视频制作。\n\n**图文内容**：支持调用 Nano Banana 等顶级图片模型，自动生成高质量图文内容。\n\n**批量生成**：支持批量下发创作任务，Agent 可并行生成多条内容，快速铺量，适合矩阵账号运营和大规模内容分发场景。\n\n> ▶ 观看演示视频\n\n<a href=\"https://youtu.be/y900LxIrZT4\">\n  <img src=\"./presentation/display-1.5.2png.png\" alt=\"Create 演示视频\" width=\"480\">\n</a>\n\n---\n\n<h2 id=\"use-web\">① 打开网站直接用</h2>\n\n最简单的方式，打开浏览器即可使用，无需任何配置：\n\n- 🇨🇳 中国用户访问：**[aitoearn.cn](https://aitoearn.cn/)**\n- 🌍 国际用户访问：**[aitoearn.ai](https://aitoearn.ai/)**\n\n---\n\n<h2 id=\"get-api-key\">🔑 如何获取 API Key（后续步骤的前置条件）</h2>\n\n> 以下的方式 ②③④ 都需要 API Key。只需获取一次，所有方式通用。\n\n**3 步获取**：\n\n1. 打开 [aitoearn.cn](https://aitoearn.cn/)（中国用户）或 [aitoearn.ai](https://aitoearn.ai/)（国际用户），注册并登录\n2. 点击左侧菜单 **设置**\n3. 在 **API Key** 中点击创建，复制生成的 Key\n\n<img src=\"presentation/app-screenshot/0.%20api-key/api-key-settings.png\" alt=\"获取 API Key\" width=\"600\">\n\n---\n\n<h2 id=\"use-in-openclaw\">② 在龙虾 OpenClaw 中使用</h2>\n\n> 前置条件：已 [获取 API Key](#get-api-key)\n\n\n**请在服务器终端输入以下命令！请在服务器终端输入以下命令！请在服务器终端输入以下命令！**\n\n**安装插件**\n\n```bash\nnpx -y @aitoearn/openclaw-plugin-cli\n```\n\n首次运行后会先让你选择环境并输入 API Key。请确保环境与 Key 匹配：\n\n- 中国版：使用 `aitoearn.cn` 获取的 API Key\n- 国际版：使用 `aitoearn.ai` 获取的 API Key\n\n环境和 Key 不匹配会导致 401。\n\n安装完成后，你就可以在 OpenClaw 中直接接收并执行 AiToEarn 的赚钱任务：\n\n<img src=\"presentation/openclaw-earn-demo.png\" alt=\"在 OpenClaw 中执行 AiToEarn 赚钱任务\" width=\"360\">\n\n---\n\n<h2 id=\"use-in-claude\">③ 在 Claude / Cursor / 其他 AI 助手中使用</h2>\n\n> 前置条件：已 [获取 API Key](#get-api-key)\n\nAiToEarn 支持所有兼容 MCP 协议的 AI 助手。以下是常见工具的配置方式：\n\n请根据 API Key 来源选择地址，环境和 Key 不匹配会导致 401：\n\n| 环境 | MCP 地址 | SSE 地址 |\n|------|---------|---------|\n| 中国版 | `https://aitoearn.cn/api/unified/mcp` | `https://aitoearn.cn/api/unified/sse` |\n| 国际版 | `https://aitoearn.ai/api/unified/mcp` | `https://aitoearn.ai/api/unified/sse` |\n\n<details open>\n<summary><b>Claude Desktop</b></summary>\n\n找到并编辑 `claude_desktop_config.json`，添加：\n\n```json\n{\n  \"mcpServers\": {\n    \"aitoearn\": {\n      \"type\": \"http\",\n      \"url\": \"https://aitoearn.ai/api/unified/mcp\",\n      \"headers\": {\n        \"x-api-key\": \"你的API-Key\"\n      }\n    }\n  }\n}\n```\n\n</details>\n\n<details>\n<summary><b>Cursor</b></summary>\n\n在 Cursor 的 MCP 设置中添加：\n\n```\nMCP 地址：https://aitoearn.ai/api/unified/mcp\n认证 Header：x-api-key: 你的API-Key\n```\n\n</details>\n\n<details>\n<summary><b>其他 AI 助手（通用配置）</b></summary>\n\n任何支持 MCP 协议的工具，只需要两个信息：\n\n| 配置项 | 值 |\n|--------|------|\n| **MCP 地址** | `https://aitoearn.ai/api/unified/mcp` |\n| **认证 Header** | `x-api-key: 你的API-Key` |\n\n也支持 SSE 长连接方式：`https://aitoearn.ai/api/unified/sse`\n\n</details>\n\n> 💡 如果你是自部署用户，将 `aitoearn.ai` 替换为你自己的地址（如 `localhost:8080`）。\n\n---\n\n<h2 id=\"use-docker\">④ Docker 一键部署</h2>\n\n> 前置条件：已安装 [Docker](https://docs.docker.com/get-docker/)\n\n适合想把 AiToEarn 部署在自己服务器上的团队。3 条命令搞定，无需手动安装数据库：\n\n```bash\ngit clone https://github.com/yikart/AiToEarn.git\ncd AiToEarn\ndocker compose up -d\n```\n\n启动后打开 **[http://localhost:8080](http://localhost:8080)** 即可使用。\n\n#### 配置 Relay（强烈推荐）\n\n> **为什么要配 Relay？** 发布内容需要登录社交媒体账号（抖音、小红书、TikTok 等），而这些平台的 OAuth 登录需要开发者凭据。配置 Relay 后，你可以直接借用官方 aitoearn.ai 的凭据完成授权，**不需要自己去各平台申请开发者账号**。\n\n在 `docker-compose.yml` 的 `aitoearn-server` 服务中添加（API Key 获取方式见 [上方说明](#get-api-key)）：\n\n请根据 `RELAY_API_KEY` 来源选择 `RELAY_SERVER_URL`：中国版 Key 使用 `https://aitoearn.cn/api`，国际版 Key 使用 `https://aitoearn.ai/api`。环境和 Key 不匹配会导致 401。\n\n```yaml\nRELAY_SERVER_URL: https://aitoearn.ai/api\nRELAY_API_KEY: 你的API-Key\nRELAY_CALLBACK_URL: http://localhost:8080/api/plat/relay-callback\n```\n\n然后重启：`docker compose restart aitoearn-server`\n\n> 📖 完整部署指南（生产环境配置、AI 服务、OAuth、存储等）请参阅 [DOCKER_DEPLOYMENT_CN.md](DOCKER_DEPLOYMENT_CN.md)。\n\n---\n\n<h2 id=\"use-source\">⑤ 源码开发</h2>\n\n<details>\n<summary>🧪 手动运行后端和前端（开发模式）</summary>\n\n此模式主要用于本地开发和调试。\n您仍然可以使用 Docker 运行 MongoDB/Redis，或在配置文件中指向您自己的服务。\n\n#### 1. 启动后端服务\n\n```bash\ncd project/aitoearn-backend\npnpm install\n# 复制配置文件用于本地开发\ncp apps/aitoearn-ai/config/config.js apps/aitoearn-ai/config/local.config.js\ncp apps/aitoearn-server/config/config.js apps/aitoearn-server/config/local.config.js\npnpm nx serve aitoearn-ai\n# 在另一个终端\npnpm nx serve aitoearn-server\n```\n\n#### 2. 启动前端 `aitoearn-web`\n\n```bash\npnpm install\npnpm run dev\n```\n\n</details>\n\n<details>\n<summary>🖥️ 启动 Electron 桌面项目</summary>\n\n```bash\n# 克隆仓库\ngit clone https://github.com/yikart/AttAiToEarn.git\n\n# 进入目录\ncd AttAiToEarn\n\n# 安装依赖\nnpm install\n\n# 编译 sqlite（better-sqlite3 需要 node-gyp 和本地 Python）\nnpm run rebuild\n\n# 启动开发\nnpm run dev\n```\n\nElectron 项目为 AiToEarn 提供桌面客户端。\n\n</details>\n\n## 贡献指南\n\n请查看 [贡献指南](./CONTRIBUTING.md) 开始参与。\n\n## 联系\n\n如果你在使用过程中遇到困难、使用问题或异常情况，优先通过 [GitHub Issues](https://github.com/yikart/AiToEarn/issues) 提交反馈，方便我们统一跟进和处理。\n\n- Telegram: [https://t.me/harryyyy2025](https://t.me/harryyyy2025)\n- 微信：扫码添加\n\n<img src=\"presentation/wechat.jpg\" alt=\"微信二维码\" width=\"200\">\n\n## 推荐\n- [AtomGit托管](https://atomgit.com/yikart/AitoEarn)\n- [MuseTalk](https://github.com/TMElyralab/MuseTalk)\n- [video_spider](https://github.com/5ime/video_spider)\n- [CosyVoice](https://github.com/FunAudioLLM/CosyVoice?tab=readme-ov-file)\n- [facefusion](https://github.com/facefusion/facefusion)\n- [NarratoAI](https://github.com/linyqh/NarratoAI)\n- [MoneyPrinterTurbo](https://github.com/harry0703/MoneyPrinterTurbo)\n","summary":"AiToEarn 是一个旨在帮助“一人公司”、创作者和企业实现内容营销自动化的智能平台。该工具通过集成的 AI Agent 提供创作、发布、互动和变现的全链路支持，能够一键将内容分发至抖音、YouTube、TikTok 等十余个主流社交平台。此外，它还内置了针对 CPS、CPE 和 CPM 的结算模式，非常适合需要高效管理多平台账号并寻求内容商业变现的个体创作者与营销团队。","description":"Let's use AI to Earn!","stars":17498,"language":"TypeScript"},{"owner":"playcanvas","repo":"supersplat","url":"https://github.com/playcanvas/supersplat","readme":"# SuperSplat Editor\n\n[![Github Release](https://img.shields.io/github/v/release/playcanvas/supersplat)](https://github.com/playcanvas/supersplat/releases)\n[![License](https://img.shields.io/github/license/playcanvas/supersplat)](https://github.com/playcanvas/supersplat/blob/main/LICENSE)\n[![Discord](https://img.shields.io/badge/Discord-5865F2?style=flat&logo=discord&logoColor=white&color=black)](https://discord.gg/RSaMRzg)\n[![Reddit](https://img.shields.io/badge/Reddit-FF4500?style=flat&logo=reddit&logoColor=white&color=black)](https://www.reddit.com/r/PlayCanvas)\n[![X](https://img.shields.io/badge/X-000000?style=flat&logo=x&logoColor=white&color=black)](https://x.com/intent/follow?screen_name=playcanvas)\n\n| [SuperSplat Editor](https://superspl.at/editor) | [User Guide](https://developer.playcanvas.com/user-manual/gaussian-splatting/editing/supersplat/) | [Blog](https://blog.playcanvas.com) | [Forum](https://forum.playcanvas.com) |\n\nThe SuperSplat Editor is a free and open source tool for inspecting, editing, optimizing and publishing 3D Gaussian Splats. It is built on web technologies and runs in the browser, so there's nothing to download or install.\n\nA live version of this tool is available at: https://superspl.at/editor\n\n![image](https://github.com/user-attachments/assets/b6cbb5cc-d3cc-4385-8c71-ab2807fd4fba)\n\nTo learn more about using SuperSplat, please refer to the [User Guide](https://developer.playcanvas.com/user-manual/gaussian-splatting/editing/supersplat/).\n\n## Local Development\n\nTo initialize a local development environment for SuperSplat, ensure you have [Node.js](https://nodejs.org/) 18 or later installed. Follow these steps:\n\n1. Clone the repository:\n\n   ```sh\n   git clone https://github.com/playcanvas/supersplat.git\n   cd supersplat\n   ```\n\n2. Install dependencies:\n\n   ```sh\n   npm install\n   ```\n\n3. Build SuperSplat and start a local web server:\n\n   ```sh\n   npm run develop\n   ```\n\n4. Open a web browser tab and make sure network caching is disabled on the network tab and the other application caches are clear:\n\n   - On Safari you can use `Cmd+Option+e` or Develop->Empty Caches.\n   - On Chrome ensure the options \"Update on reload\" and \"Bypass for network\" are enabled in the Application->Service workers tab:\n\n   <img width=\"846\" alt=\"Screenshot 2025-04-25 at 16 53 37\" src=\"https://github.com/user-attachments/assets/888bac6c-25c1-4813-b5b6-4beecf437ac9\" />\n\n5. Navigate to `http://localhost:3000`\n\nWhen changes to the source are detected, SuperSplat is rebuilt automatically. Simply refresh your browser to see your changes.\n\n## Localizing the SuperSplat Editor\n\nThe currently supported languages are available here:\n\nhttps://github.com/playcanvas/supersplat/tree/main/static/locales\n\n### Adding a New Language\n\n1. Add a new `<locale>.json` file in the `static/locales` directory.\n\n2. Add the locale to the list here:\n\n   https://github.com/playcanvas/supersplat/blob/main/src/ui/localization.ts\n\n### Testing Translations\n\nTo test your translations:\n\n1. Run the development server:\n\n   ```sh\n   npm run develop\n   ```\n\n2. Open your browser and navigate to:\n\n   ```\n   http://localhost:3000/?lng=<locale>\n   ```\n\n   Replace `<locale>` with your language code (e.g., `fr`, `de`, `es`).\n\n## Contributors\n\nSuperSplat is made possible by our amazing open source community:\n\n<a href=\"https://github.com/playcanvas/supersplat/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=playcanvas/supersplat\" />\n</a>\n","summary":"SuperSplat is a free, open-source web-based editor designed for the inspection, modification, and optimization of 3D Gaussian Splatting files. It enables users to manipulate and refine their 3D scenes directly within a browser without the need for any local installations. This tool is ideal for developers, researchers, and 3D artists looking for a streamlined workflow to prepare and publish high-quality Gaussian Splat assets.","description":"3D Gaussian Splat Editor","stars":8944,"language":"TypeScript"},{"owner":"datawhalechina","repo":"easy-vibe","url":"https://github.com/datawhalechina/easy-vibe","readme":"<!-- trigger vercel build -->\n<div align=\"center\">\n\n<img src=\"assets/easy-vibe-logo-hd.svg\" alt=\"Easy-Vibe Logo\" width=\"300\">\n\n<img src=\"assets/bann  **[2026-03-02]** 🦞 **OpenClaw and AI Agent friendly support**: Added `llms.txt` so OpenClaw, Claude, Cursor, Trae, and other AI agents can quickly understand the repository structure and find the right tutorial content.\n- **[2026-03-01]** The [Advanced Development section](https://datawhalechina.github.io/easy-vibe/en/stage-3/) has been comprehensively upgraded with deep guides for Claude Code, including MCP, Skills, Agent Teams, and more, along with eight cross-platform project tutorials.\n- **[2026-02-25]** Updated the [Appendix Knowledge Base](https://datawhalechina.github.io/easy-vibe/en/appendix/), now covering 9 knowledge areas and 80+ interactive topics.\n- **[2026-01-27]** Added Android and iOS app development tutorials.\n- **[2026-01-19]** Released interactive demos for Prompt Engineering, AI history, authentication design, Git principles, and more.\n- **[2026-01-16]** Reorganized the project structure and formally established a beginner entry path.\n- **[2026-01-14]** Completed a large update to the Stage 1 product prototyping docs.\n- **[2026-01-13]** Refactored the documentation architecture and fully enabled multi-language support.\n- **[2026-01-01]** Released the core learning map for the project.\n</details>\n\n## Who This Is For\n\n- **Complete beginners**: Build your first project first, then understand how it works\n- **Product managers / founders**: Validate ideas fast and build MVPs at low cost\n- **Students**: Develop practical skills for the AI era\n- **Junior developers**: Learn the full path from idea to launch\n- **Mid-level and senior developers**: Upgrade your AI collaboration workflow for complex projects\n\n\n\n## Your Learning Paths\n\n### 🎮 I want a fast first win\n**Best for**: Everyone\n**What you will learn**: What AI coding actually feels like through a simple, concrete hands-on example\n**What you will get**: A clear first impression of vibe coding and how to work with AI by conversation\n\n[Start here](https://datawhalechina.github.io/easy-vibe/en/stage-1/ai-capabilities-through-games/)\n\n### 💡 I want to turn an idea into a product prototype\n**Best for**: Beginners / product managers / founders\n**What you will learn**: Learning roadmap, AI IDE tools, idea validation, prototyping, AI capability integration, and full demo iteration\n**What you will get**: A demoable AI product prototype you can actually show to users or teammates\n\n[Start learning](https://datawhalechina.github.io/easy-vibe/en/stage-1/learning-map/)\n\n### 🚀 I want to build full-stack products end to end\n**Best for**: Junior developers / indie hackers / advanced learners\n**What you will learn**: Frontend workflows, design-to-code, databases, backend APIs, deployment, billing, and major projects\n**What you will get**: The ability to independently ship modern AI-enabled web applications\n\n[Start learning](https://datawhalechina.github.io/easy-vibe/en/stage-2/)\n\n### AI-Native: I want advanced Claude Code and agent workflows\n**Best for**: Developers interested in AI-native engineering\n**What you will learn**: Claude Code, MCP, Skills, Agent Teams, long-running tasks, Spec Coding, and cross-platform app delivery\n**What you will get**: A stronger workflow for complex AI-assisted development and automation\n\n[Go to advanced development](https://datawhalechina.github.io/easy-vibe/en/stage-3/)\n\n### 📚 I want reference material and fundamentals\n**Best for**: Everyone\n**What you will learn**: Computer fundamentals, frontend/backend basics, infrastructure, AI principles, and engineering practices\n**What you will get**: A long-term reference knowledge base covering 9 major knowledge areas\n\n[Browse the knowledge base](https://datawhalechina.github.io/easy-vibe/en/appendix/)\n\n## Study Suggestions\n\n- If you are a beginner, product manager, or founder, start with [Stage 1](https://datawhalechina.github.io/easy-vibe/en/stage-1/learning-map/)\n- If you want to move from prototypes to full-stack delivery, start with [Stage 2](https://datawhalechina.github.io/easy-vibe/en/stage-2/)\n- If you want advanced Claude Code workflows or cross-platform projects, go to [Stage 3](https://datawhalechina.github.io/easy-vibe/en/stage-3/)\n- If you get blocked by concepts or missing background knowledge, use the [Appendix Knowledge Base](https://datawhalechina.github.io/easy-vibe/en/appendix/)\n\n### 📖 Content Navigation\n\n<div align=\"center\">\n  <img src=\"assets/readme-image1.png\" alt=\"Learning Map\" width=\"70%\" style=\"border-radius: 10px; box-shadow: 0 8px 20px rgba(45,55,72,0.3); margin: 15px 0;\"/>\n</div>\n\n### I. Beginner Entry\n\n| Section | Key Content |\n| :------ | :---------- |\n| [Learning Map](https://datawhalechina.github.io/easy-vibe/en/stage-1/learning-map/) | A guided overview of the full learning journey |\n| [AI Era: If You Can Speak, You Can Code](https://datawhalechina.github.io/easy-vibe/en/stage-1/ai-capabilities-through-games/) | Get your first feel for AI coding through examples like Snake |\n| [Master AI Programming Tools](https://datawhalechina.github.io/easy-vibe/en/stage-1/introduction-to-ai-ide/) | Learn how AI IDE tools work and build simple local projects with them |\n| [Find Great Ideas](https://datawhalechina.github.io/easy-vibe/en/stage-1/finding-great-idea/) | Learn how to discover and validate product ideas worth building |\n| [Build Product Prototypes](https://datawhalechina.github.io/easy-vibe/en/stage-1/building-prototype/) | Move from requirements to single-page and multi-page product prototypes |\n| [Integrate AI Capabilities](https://datawhalechina.github.io/easy-vibe/en/stage-1/integrating-ai-capabilities/) | Integrate text, image, and video AI features |\n| [Complete project practice](https://datawhalechina.github.io/easy-vibe/en/stage-1/complete-project-practice/) | Simulate real scenarios, collect user feedback, and iterate on a full project |\n\n#### Appendix: Product and Business Thinking\n\n| Section | Key Content |\n| :------ | :------ ponent Libraries](https://datawhalechina.github.io/easy-vibe/en/stage-2/frontend/modern-component-library/) | Use component libraries to build professional interfaces faster |\n\n#### Backend\n\n| Section | Key Content |\n| :------ | :---------- |\n| [Backend 1: Learn Git and GitHub](https://datawhalechina.github.io/easy-vibe/en/stage-2/backend/git-workflow/) | Master core version control operations and collaboration workflows with Git |\n| [Backend 2: From Database to Supabase](https://datawhalechina.github.io/easy-vibe/en/stage-2/backend/database-supabase/) | Learn relational database basics and use Supabase as a modern BaaS platform |\n| [Backend 3: Backend API Design and Development](https://datawhalechina.github.io/easy-vibe/en/stage-2/backend/ai-interface-code/) | Use AI to assist API design, backend code generation, and API documentation |\n| [Backend 4: Ship Your Product Prototype](https://datawhalechina.github.io/easy-vibe/en/stage-2/backend/zeabur-deployment/) | Quickly deploy full-stack applications to the cloud with Zeabur |\n| [Backend 5: From IDEs to CLI AI Coding Tools](https://datawhalechina.github.io/easy-vibe/en/stage-2/backend/modern-cli/) | Explore terminal-first AI coding workflows for modern development |\n| [Backend 6: Integrate Stripe and Other Billing Systems](https://datawhalechina.github.io/easy-vibe/en/stage-2/backend/stripe-payment/) | Add monetization with payment and billing capabilities |\n\n#### Major Projects\n\n| Section | Key Content |\n| :------ | :---------- |\n| [Major Project 1: Your First SaaS Full-Stack App - AI Copywriting Website](https://datawhalechina.github.io/easy-vibe/en/stage-2/assignments/fullstack-app/) | Build an AI marketing copy workspace with login, generation, billing, and admin management |\n| [Major Project 2: Online Exam and Management System](https://datawhalechina.github.io/easy-vibe/en/stage-2/assignments/modern-frontend-trae/) | Build an online exam system with question generation, test-taking flows, and admin tools |\n\n#### AI Capabilities Appendix\n\n| Section | Key Content |\n| :------ | :---------- |\n| [AI 1: Dify Basics & Knowledge Base Integration](https://datawhalechina.github.io/easy-vibe/en/stage-2/ai-capabilities/dify-knowledge-base/) | Learn to build AI applications with Dify and integrate private knowledge bases |\n\n### III. Advanced Developers\n\n#### Claude Code Core Skills\n\n| Section | Key Content |\n| :------ | :---------- |\n| [Getting started with Claude Code](https://datawhalechina.github.io/easy-vibe/en/stage-3/core-skills/basics/) | Installation, setup, fundamentals, and useful commands |\n| [Claude Code MCP guide](https://datawhalechina.github.io/easy-vibe/en/stage-3/core-skills/mcp/) | Connect Claude Code to GitHub, databases, APIs, and other services through MCP |\n| [Claude Code Skills guide](https://datawhalechina.github.io/easy-vibe/en/stage-3/core-skills/skills/) | Package expertise into reusable skills you can use again and again |\n| [How to keep Claude Code working for long-running tasks](https://datawhalechina.github.io/easy-vibe/en/stage-3/core-skills/long-running-tasks/) | Design long-running tasks so coding tools can keep working until the job is done |\n| [Claude Agent Teams guide](https://datawhalechina.github.io/easy-vibe/en/stage-3/core-skills/agent-teams/) | Coordinate multiple AI instances like a real development team |\n| [Claude Code Superpowers for engineering-grade development](https://datawhalechina.github.io/easy-vibe/en/stage-3/core-skills/superpowers/) | Help AI produce engineering-grade code with TDD and best practices |\n| [Claude Code workflow best practices](https://datawhalechina.github.io/easy-vibe/en/stage-3/core-skills/workflow/) | Best practices for refactoring, code review, and daily development |\n| [Claude Code remote development on mobile](https://datawhalechina.github.io/easy-vibe/en/stage-3/core-skills/mobile-development/) | Use Claude Code beyond the desktop and build a productive remote workflow on mobile devices |\n| [Claude Agent SDK complete guide](https://datawhalechina.github.io/easy-vibe/en/stage-3/core-skills/claude-agent-sdk/) | Build custom agent workflows and integrate Claude into your own tools with the SDK |\n| [From vibe coding to spec coding](https://datawhalechina.github.io/easy-vibe/en/stage-3/core-skills/spec-coding/) | Move from ad-hoc prompting to a more structured, specification-driven AI development workflow |\n\n#### Cross-Platform Development\n\n| Section | Key Content |\n| :------ | :---------- |\n| [How to choose the right platform for your app](https://datawhalechina.github.io/easy-vibe/en/stage-3/cross-platform/choose-platform/) | Compare app forms and choose the right platform based on users, scenarios, and delivery goals |\n| [Build a WeChat Mini Program](https://datawhalechina.github.io/easy-vibe/en/stage-3/cross-platform/wechat-miniprogram/) | Understand the ecosystem and ship a frontend mini program from template to launch |\n| [Build a WeChat Mini Program with backend](https://datawhalechina.github.io/easy-vibe/en/stage-3/cross-platform/wechat-miniprogram-backend/) | Add backend logic and databases to complete the full business loop |\n| [Build an Android app](https://datawhalechina.github.io/easy-vibe/en/stage-3/cross-platform/android-app/) | Learn Android app development with a modern native workflow |\n| [Build an iOS app](https://datawhalechina.github.io/easy-vibe/en/stage-3/cross-platform/ios-app/) | Learn iOS app development and the conventions of the Apple ecosystem |\n| [Build a local PWA app](https://datawhalechina.github.io/easy-vibe/en/stage-3/cross-platform/pwa-local-app/) | Turn a website into a real app with offline support, push, and installation |\n| [Build a browser AI assistant extension](https://datawhalechina.github.io/easy-vibe/en/stage-3/cross-platform/browser-ai-extension/) | Create a Chrome extension that summarizes any page with either cloud APIs or built-in AI |\n| [Build an Electron desktop app](https://datawhalechina.github.io/easy-vibe/en/stage-3/cross-platform/electron-voice-to-text/) | Build a voice-to-text desktop app with Electron for three platforms |\n| [Rapidly build and mint an NFT](https://datawhalechina.github.io/easy-vibe/en/stage-3/cross-platform/nft-minting/) | Write a smart contract from scratch, deploy it, and mint your own NFT |\n| [Build a VS Code extension](https://datawhalechina.github.io/easy-vibe/en/stage-3/cross-platform/vscode-extension/) | Build an AI project assistant with templates, code chat, and multi-file Q&A |\n| [Build an industrial-grade Qt desktop app](https://datawhalechina.github.io/easy-vibe/en/stage-3/cross-platform/qt-industrial-hmi/) | Create a real-time Qt HMI system with trends, alerts, and monitoring |\n\n#### AI Capabilities Appendix\n\n| Section | Key Content |\n| :------ | :---------- |\n| [What is RAG and how does it work](https://datawhalechina.github.io/easy-vibe/en/stage-3/ai-advanced/rag-introduction/) | Build a systematic understanding of RAG principles and common architectures |\n| [Intermediate and advanced RAG workflows with LangGraph](https://datawhalechina.github.io/easy-vibe/en/stage-3/ai-advanced/langgraph-advanced-rag/) | Design multi-step workflows and more advanced RAG systems |\n\n### 📚 Appendix Knowledge Base\n\n> Covering **9 major knowledge areas** and **80+ interactive topics**, this appendix uses animation and visual components to help you intuitively understand core concepts from computer fundamentals to the AI frontier.\n>\n> 👉 [View the full appendix](https://datawhalechina.github.io/easy-vibe/en/appendix/)\n\n### 🎓 Other Courses\n\n- [Hands-on Modern RL](#other-courses)\n- [Learn Harness Engineering](#other-courses)\n\n## 🛠️ How To Learn\n\n- Read and practice the sections that match your current level. If you get stuck, feel free to open an issue.\n\n## 💻 Run Locally\n\n### Modern approach\n\nIn an AI IDE chat window such as VS Code, Cursor, or Trae, you can simply say:\n\n```text\nPlease help me run this project locally.\n```\n\n### Traditional approach\n\n1. `npm install`\n2. `npm run dev`\n3. Open `http://localhost:3000` in your browser.\n\n## Other Courses \n \nOur team has also created other courses! Check them out: \n \n[![Hands-on Modern RL](https://img.shields.io/badge/HANDS--ON_MODERN_RL-0052cc?style=for-the-badge)](https://github.com/walkinglabs/hands-on-modern-rl)\n \n**Hands-on Modern RL**: An open-source, hands-on curriculum bridging the gap from basic RL concepts to LLM alignment, RLVR, and advanced Agentic systems. \n\n[![Learn Harness Engineering](https://img.shields.io/badge/LEARN_HARNESS_ENGINEERING-0052cc?style=for-the-badge)](https://github.com/walkinglabs/learn-harness-engineering/tree/main)\n\n**Learn Harness Engineering**: A comprehensive guide to harness engineering.\n\n## 🤝 Contributing & Contributors\n\n- If you find an issue or see something that can be improved, feel free to open an issue. If nobody replies, you can also contact the [Datawhale support team](https://github.com/datawhalechina/DOPMC/blob/main/OP.md).\n- If you want to contribute, open a pull request. If nobody replies, you can also contact the [Datawhale support team](https://github.com/datawhalechina/DOPMC/blob/main/OP.md).\n- If you want to start a new Datawhale open-source project, please follow the [Datawhale Open Source Project Guide](https://github.com/datawhalechina/DOPMC/blob/main/GUIDE.md).\n\n### 🙏 Contributors\n\n- [Sanbu - Project Lead](https://github.com/sanbuphy) (Datawhale member)\n- Fang Ke - Mentor (Datawhale member, Tsinghua University)\n- [Yerim Kang](https://github.com/yerim25) (Practice projects, Tsinghua University)\n- [Zhilin Zhao](https://github.com/ChileenZ) (Practice projects, Tsinghua University)\n- [Yixuan Li](https://yixuan20.github.io/) (Visual design, Tsinghua University)\n- Siyi Liu (Practice projects, Tsinghua University)\n- [Lixin Liu](https://github.com/liulx25xx) (Practice projects, Tsinghua University)\n- Everyone in the AI Vibe Coding 101 internal testing group who shared suggestions and feedback\n\n### Special Thanks\n\n- Thanks to [@Sm1les](https://github.com/Sm1les) for the help and support on this project\n- Thanks to every contributor and everyone who supported the project with feedback and stars ❤️\n\n<div align=\"center\"> \n <a href=\"https://www.star-history.com/#datawhalechina/easy-vibe&type=timeline&legend=top-left\"> \n   <picture> \n     <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=datawhalechina/easy-vibe&type=timeline&theme=dark&legend=top-left\" /> \n     <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=datawhalechina/easy-vibe&type=timeline&legend=top-left\" /> \n   </picture> \n </a>\n</div>\n\n<div align=center style=\"margin-top: 30px;\">\n  <a href=\"https://github.com/datawhalechina/easy-vibe/graphs/contributors\">\n    <img src=\"https://contrib.rocks/image?repo=datawhalechina/easy-vibe\" />\n  </a>\n</div>\n\n## 📄 LICENSE\n\n<div align=\"center\">\n<a rel=\"license\" href=\"http://creativecommons.org/licenses/by-nc-sa/4.0/\">\n  <img\n    alt=\"Creative Commons License\"\n    style=\"border-width:0\"\n    src=\"https://img.shields.io/badge/license-CC%20BY--NC--SA%204.0-lightgrey\"\n  />\n</a>\n<br />\nThis work is licensed under the\n<a rel=\"license\" href=\"http://creativecommons.org/licenses/by-nc-sa/4.0/\">\n  Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International License\n</a>.\n</div>\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/svg?repos=datawhalechina/easy-vibe&type=date&legend=top-left)](https://www.star-history.com/#datawhalechina/easy-vibe&type=date&legend=top-left)\n","summary":"easy-vibe by datawhalechina is a beginner-friendly, interactive learning project that helps you build apps through a guided “vibe together” tutorial flow. It provides an online, multi-language learning experience (Stages 1–3 available in 10 languages), with an interactive tutorial you can follow directly in the browser. The project is ideal for newcomers who want to go from reading and practice to making their own applications quickly, and for educators or communities looking for a structured, accessible onboarding path.","description":"💻 vibe coding 2026 | Your first modern Coding course for beginners to master step by step.","stars":15631,"language":"JavaScript"},{"owner":"tinyhumansai","repo":"openhuman","url":"https://github.com/tinyhumansai/openhuman","readme":"<h1 align=\"center\">OpenHuman</h1>\n\n<p align=\"center\">\n <img src=\"./gitbooks/.gitbook/assets/demo.png\" alt=\"The Tet\" />\n</p>\n\n<p align=\"center\" style=\"display: inline-block\">\n\t<a href=\"https://trendshift.io/repositories/23680\" target=\"_blank\" style=\"display: inline-block\">\n\t\t<img src=\"https://trendshift.io/api/badge/repositories/23680\" alt=\"tinyhumansai%2Fopenhuman | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/>\n\t</a>\n\t<a href=\"https://www.producthunt.com/products/openhuman?embed=true&amp;utm_source=badge-top-post-badge&amp;utm_medium=badge&amp;utm_campaign=badge-openhuman\" target=\"_blank\" rel=\"noopener noreferrer\">\n\t\t<img alt=\"OpenHuman - An open source AI harness built with the human in mind | Product Hunt\" width=\"250\" height=\"54\" src=\"https://api.producthunt.com/widgets/embed-image/v1/top-post-badge.svg?post_id=1136902&amp;theme=light&amp;period=daily&amp;t=1778916022823\">\n\t\t</a>\n\t\t<a href=\"https://www.producthunt.com/products/openhuman?embed=true&amp;utm_source=badge-top-post-badge&amp;utm_medium=badge&amp;utm_campaign=badge-openhuman\" target=\"_blank\" rel=\"noopener noreferrer\">\n\t\t\t<img alt=\"OpenHuman - An open source AI harness built with the human in mind | Product Hunt\" width=\"250\" height=\"54\" src=\"https://api.producthunt.com/widgets/embed-image/v1/top-post-badge.svg?post_id=1136902&amp;theme=light&amp;period=weekly&amp;t=1779351403565\">\n\t\t</a>\n</p>\n<p align=\"center\" style=\"display: inline-block\">\n <a href=\"https://www.producthunt.com/products/openhuman?embed=true&amp;utm_source=badge-top-post-topic-badge&amp;utm_medium=badge&amp;utm_campaign=badge-openhuman\" target=\"_blank\" rel=\"noopener noreferrer\">\n  <img alt=\"OpenHuman - An open source AI harness built with the human in mind | Product Hunt\" width=\"250\" height=\"54\" src=\"https://api.producthunt.com/widgets/embed-image/v1/top-post-topic-badge.svg?post_id=1136902&amp;theme=light&amp;period=weekly&amp;topic_id=268&amp;t=1779351808756\">\n  </a>\n  <a href=\"https://www.producthunt.com/products/openhuman?embed=true&amp;utm_source=badge-top-post-topic-badge&amp;utm_medium=badge&amp;utm_campaign=badge-openhuman\" target=\"_blank\" rel=\"noopener noreferrer\">\n   <img alt=\"OpenHuman - An open source AI harness built with the human in mind | Product Hunt\" width=\"250\" height=\"54\" src=\"https://api.producthunt.com/widgets/embed-image/v1/top-post-topic-badge.svg?post_id=1136902&amp;theme=light&amp;period=weekly&amp;topic_id=46&amp;t=1779351808756\">\n   </a>\n </p>\n\n\n<p align=\"center\">\n <strong>OpenHuman is your Personal AI super intelligence: local memory, managed services where needed, simple and powerful.</strong>\n</p>\n\n\n<p align=\"center\">\n <a href=\"https://discord.tinyhumans.ai/\">Discord</a> •\n <a href=\"https://www.reddit.com/r/tinyhumansai/\">Reddit</a> •\n <a href=\"https://x.com/intent/follow?screen_name=tinyhumansai\">X/Twitter</a> •\n <a href=\"https://tinyhumans.gitbook.io/openhuman/\">Docs</a> •\n <a href=\"https://x.com/intent/follow?screen_name=senamakel\">Follow @senamakel (Creator)</a>\n</p>\n\n<p align=\"center\">\n  🇺🇸 <a href=\"./README.md\">English</a> | 🇨🇳 <a href=\"./README.zh-CN.md\">简体中文</a> | 🇯🇵 <a href=\"./README.ja-JP.md\">日本語</a> | 🇰🇷 <a href=\"./README.ko.md\">한국어</a> | 🇩🇪 <a href=\"./README.de.md\">Deutsch</a>\n</p>\n\n\n<p align=\"center\">\n <img src=\"https://img.shields.io/badge/status-early%20beta-orange\" alt=\"Early Beta\" />\n <a href=\"https://github.com/tinyhumansai/openhuman/releases/latest\"><img src=\"https://img.shields.io/github/v/release/tinyhumansai/openhuman?label=latest\" alt=\"Latest Release\" /></a>\n <a href=\"https://github.com/tinyhumansai/openhuman/stargazers\"><img src=\"https://img.shields.io/github/stars/tinyhumansai/openhuman?style=flat\" alt=\"GitHub Stars\" /></a>\n <a href=\"./LICENSE\"><img src=\"https://img.shields.io/github/license/tinyhumansai/openhuman\" alt=\"License\" /></a>\n <a href=\"./README.zh-CN.md\"><img src=\"https://img.shields.io/badge/lang-简体中文-blue\" alt=\"简体中文\" /></a>\n <a href=\"./README.ja-JP.md\"><img src=\"https://img.shields.io/badge/lang-日本語-blue\" alt=\"日本語\" /></a>\n <a href=\"./README.ko.md\"><img src=\"https://img.shields.io/badge/lang-한국어-blue\" alt=\"한국어\" /></a>\n <a href=\"./README.de.md\"><img src=\"https://img.shields.io/badge/lang-Deutsch-blue\" alt=\"Deutsch\" /></a>\n</p>\n\n> **Early Beta**: Under active development. Expect rough edges.\n\n> **Local + managed services, upfront:** OpenHuman stores its Memory Tree, Obsidian-style Markdown vault, workspace config, and local runtime state on your machine. The default managed experience still uses OpenHuman-hosted services for account sign-in, model routing, web search proxying, and managed integration/OAuth flows through the Composio connector layer. Choose custom/local settings if you want to bring your own model, search, or Composio credentials; some real-time triggers and hosted features still require the managed backend.\n\n# Install\n\nDownload installers from [tinyhumans.ai/openhuman](https://tinyhumans.ai/openhuman?utm_source=github&utm_medium=readme) or from the [GitHub Releases](https://github.com/tinyhumansai/openhuman/releases/latest) page. For terminal installs, the native package paths below are preferred — they ride your OS package-manager's signing chain.\n\n## Recommended install (native packages)\n\nThese paths verify the artifact through your OS package manager's signing chain (Homebrew bottle hash, signed apt repo, MSI signature).\n\n**macOS (Homebrew tap):**\n\n```bash\nbrew tap tinyhumansai/core\nbrew install openhuman\n```\n\n**Linux (Debian/Ubuntu — signed apt repo):**\n\n```bash\nsudo apt-get install -y --no-install-recommends gnupg2 curl ca-certificates\ncurl -fsSL https://tinyhumansai.github.io/openhuman/apt/KEY.gpg \\\n  | sudo gpg --dearmor -o /etc/apt/keyrings/openhuman.gpg\necho \"deb [signed-by=/etc/apt/keyrings/openhuman.gpg arch=amd64] \\\n  https://tinyhumansai.github.io/openhuman/apt stable main\" \\\n  | sudo tee /etc/apt/sources.list.d/openhuman.list\nsudo apt-get update\nsudo apt-get install -y openhuman\n```\n\n**Linux (Arch — AUR):** the [`openhuman-bin` AUR recipe](./packages/arch/openhuman-bin/) is in the repo. Once published, Arch users can install it with `yay -S openhuman-bin`.\n\n**Windows:** download the signed `.msi` from the [latest release](https://github.com/tinyhumansai/openhuman/releases/latest) and run it.\n\n**Manual `.dmg` / `.deb` / `.AppImage` / `.msi`:** grab the installer for your platform directly from the [latest release page](https://github.com/tinyhumansai/openhuman/releases/latest).\n\n> **Linux:** the AppImage can crash on launch under Wayland (and on Arch-based distros with `sharun: Interpreter not found!`) — see [#2463](https://github.com/tinyhumansai/openhuman/issues/2463) for the cause and env-var workarounds. The `.deb` package above avoids those failure modes on Debian/Ubuntu.\n\n## Alternative: script install (no integrity check)\n\n> **Warning — unverified install.** These scripts are served live from `raw.githubusercontent.com` and do **not** ship a separate signature, so `curl … | bash` and `irm … | iex` have no way to detect tampering of the script bytes. Prefer the **native package** paths above whenever possible. If you must use the script, see \"Verified script install\" below.\n\n```bash\n# macOS or Linux x64\ncurl -fsSL https://raw.githubusercontent.com/tinyhumansai/openhuman/main/scripts/install.sh | bash\n\n# Windows (PowerShell)\nirm https://raw.githubusercontent.com/tinyhumansai/openhuman/main/scripts/install.ps1 | iex\n```\n\n## Verified script install status\n\nA separately signed script-install path is not currently available. Issue [#2620](https://github.com/tinyhumansai/openhuman/issues/2620) is closed after the native package paths were promoted, but current release assets do not include `install.sh.asc` / `install.ps1.asc` for pre-execution script verification. Treat the script install path as unverified and prefer the native package options above when possible.\n\n# What is OpenHuman?\n\nOpenHuman is an open-source agentic assistant designed to integrate with you in your daily life. Each bullet links to the deeper writeup in the [docs](https://tinyhumans.gitbook.io/openhuman/).\n\n- **Simple, UI-first & Human** A clean desktop experience and short onboarding paths take you from install to a working agent in a few clicks — no config-first setup, no terminal required. The agent has [a face](https://tinyhumans.gitbook.io/openhuman/features/mascot): a desktop mascot that speaks, reacts to its surroundings, [joins your Google Meets](https://tinyhumans.gitbook.io/openhuman/features/mascot/meeting-agents) as a real participant, remembers you across weeks, and keeps thinking in the background even when you've stopped typing.\n\n- **[118+ third-party integrations](https://tinyhumans.gitbook.io/openhuman/features/integrations) with [auto-fetch](https://tinyhumans.gitbook.io/openhuman/features/obsidian-wiki/auto-fetch)**: plug into Gmail, Notion, GitHub, Slack, Stripe, Calendar, Drive, Linear, Jira and the rest of your stack with **one-click OAuth**. Every connection is exposed to the agent as a typed tool, and every twenty minutes the core walks each active connection and pulls fresh data into the [memory tree](https://tinyhumans.gitbook.io/openhuman/features/integrations/auto-fetch). No prompts, no polling loops you have to write, so the agent already has tomorrow's context this morning.\n\n  Managed integrations use OpenHuman's Composio connector layer. OAuth handshakes and integration tool calls are proxied through the managed backend by default. If you want to run Composio directly instead, configure direct mode with your own Composio API key; real-time trigger webhooks then need to be hosted and wired by you.\n\n- **[Memory Tree](https://tinyhumans.gitbook.io/openhuman/features/memory-tree) + [Obsidian Wiki](https://tinyhumans.gitbook.io/openhuman/features/obsidian-wiki)**: a local-first knowledge base built from your data and your activity. Everything you connect is canonicalized into ≤3k-token Markdown chunks, scored, and folded into hierarchical summary trees stored in **SQLite on your machine**. The same chunks land as `.md` files in an Obsidian-compatible vault you can open, browse and edit, inspired by Karpathy's [obsidian-wiki workflow](https://x.com/karpathy/status/2039805659525644595).\n\n- **Batteries included**: web search, a web-fetch [scraper](https://tinyhumans.gitbook.io/openhuman/features/native-tools), a full coder toolset (filesystem, git, lint, test, grep), and [native voice](https://tinyhumans.gitbook.io/openhuman/features/voice) (STT in, ElevenLabs TTS out, mascot lip-sync, live Google Meet agent) are wired in by default. By default, [model routing](https://tinyhumans.gitbook.io/openhuman/features/model-routing) uses the OpenHuman backend to select and proxy the right LLM for each workload (reasoning, fast, or vision). One subscription includes all models. No \"install a plugin to read files\" friction. Use [optional local AI via Ollama](https://tinyhumans.gitbook.io/openhuman/features/model-routing/local-ai) for supported on-device workloads.\n\n- **[Smart token compression (TokenJuice)](https://tinyhumans.gitbook.io/openhuman/features/token-compression)**: every tool call, scrape result, email body, and search payload is run through a token compression layer before it touches any LLM Model. HTML is converted to Markdown, long URLs are shortened, and verbose tool output is deduped and summarized via a configurable rule overlay etc... CJK, emoji, and other multi-byte text are preserved grapheme-by-grapheme — never stripped. You get the same information but at a fraction of the tokens. Reducing cost &amp; latency by up to 80%.\n\n- **[Messaging channels](https://tinyhumans.gitbook.io/openhuman/features/integrations#messaging-channels)** and **[privacy & security](https://tinyhumans.gitbook.io/openhuman/features/privacy-and-security)**: inbound/outbound across the channels you already use, with workflow data that stays on device, encrypted locally, treated as yours.\n\n## Contributing from source\n\nNew contributor? Start with [`CONTRIBUTING.md`](./CONTRIBUTING.md) for the fork/PR workflow and local validation commands, or use the copy-paste AI-agent prompt in [`CONTRIBUTING-BEGINNERS.md`](./CONTRIBUTING-BEGINNERS.md#optional-let-an-ai-coding-agent-guide-you). The short path is:\n\n1. Install Git, Node.js 24+, pnpm 10.10.0, Rust 1.93.0 (`rustfmt` + `clippy`), CMake, Ninja, ripgrep, and the platform desktop build prerequisites.\n2. Fork and clone the repo, then run `git submodule update --init --recursive` before `pnpm install` so the vendored Tauri/CEF sources are present.\n3. Use `pnpm dev` for web-only UI work, `pnpm --filter openhuman-app dev:app` for the desktop shell, and focused checks such as `pnpm typecheck`, `pnpm format:check`, and `cargo check -p openhuman --lib` before opening a PR.\n\nDeeper docs: [Architecture](https://tinyhumans.gitbook.io/openhuman/developing/architecture) · [Getting Set Up](https://tinyhumans.gitbook.io/openhuman/developing/getting-set-up) · [Cloud Deploy](./gitbooks/features/cloud-deploy.md).\n\n## Context in minutes, not weeks\n\nOpenHuman is the first agent harness that gets to know you in minutes. Inspired by [Karpathy's LLM Knowledgebase](https://x.com/karpathy/status/2039805659525644595). Most agents start cold. Hermes learns by watching you work; OpenClaw waits for plugins to ferry context in. Either way, you spend days or weeks before the agent knows enough about your stack to be genuinely useful.\n\n<p align=\"center\">\n <img src=\"./gitbooks/.gitbook/assets/image (1).png\" alt=\"OpenHuman context-building diagram\">\n</p>\n\n> OpenHuman summarizes and compresses all your documents, emails & chats; and creates a memory graph that lets your agent remember everything about you.\n\nOpenHuman skips the wait. Connect your accounts, let [auto-fetch](https://tinyhumans.gitbook.io/openhuman/features/integrations/auto-fetch) pull data locally on a 20-minute loop, and then have [Memory Trees](https://tinyhumans.gitbook.io/openhuman/features/memory-tree) compress everything into Markdown files stored intelligently in a [Karpathy-style Obsidian wiki](https://tinyhumans.gitbook.io/openhuman/features/obsidian-wiki).\n\nIn just one sync pass, the agent has full (compressed) context of your inbox, your calendar, your repos, your docs, your messages. No training period. No \"give it a few weeks.\". It becomes you, controlled by you.\n\nAlready self-host [agentmemory](https://github.com/rohitg00/agentmemory) across other coding agents? OpenHuman ships an optional `Memory` backend that proxies to it — set `memory.backend = \"agentmemory\"` in `config.toml` and the same durable store powers OpenHuman alongside Claude Code, Cursor, Codex, and OpenCode. See the [agentmemory backend](https://tinyhumans.gitbook.io/openhuman/features/obsidian-wiki/agentmemory-backend) page for setup.\n\n## OpenHuman vs Other Agent Harnesses\n\nHigh-level comparison (products evolve, so verify against each vendor). OpenHuman is built to **minimize vendor sprawl**, keep **workflow knowledge on-device**, and give the agent a **persistent memory** of your data, not only chat.\n\n|                     | Claude Cowork     | OpenClaw          | Hermes Agent      | OpenHuman                          |\n| ------------------- | ----------------- | ----------------- | ----------------- | ---------------------------------- |\n| **Open-source**     | 🚫 Proprietary    | ✅ MIT            | ✅ MIT            | ✅ GNU                             |\n| **Simple to start** | ✅ Desktop + CLI  | ⚠️ Terminal-first | ⚠️ Terminal-first | ✅ Clean UI, minutes               |\n| **Cost**            | ⚠️ Sub + add-ons  | ⚠️ BYO models     | ⚠️ BYO models     | ✅ One sub + TokenJuice            |\n| **Memory**          | ✅ Chat-scoped    | ⚠️ Plugin-reliant | ✅ Self-learning  | 🚀 Memory Tree + Obsidian vault, optional [agentmemory](https://github.com/rohitg00/agentmemory) backend |\n| **Integrations**    | ⚠️ Few connectors | ⚠️ BYO            | ⚠️ BYO            | 🚀 118+ via OAuth                  |\n| **Auto-fetch**      | 🚫 None           | 🚫 None           | 🚫 None           | ✅ 20-min sync into memory         |\n| **API sprawl**      | 🚫 Extra keys     | 🚫 BYOK           | 🚫 Multi-vendor   | ✅ One account                     |\n| **Model routing**   | 🚫 Single model   | ⚠️ Manual         | ⚠️ Manual         | ✅ Built-in                        |\n| **Native tools**    | ✅ Code-only      | ✅ Code-only      | ✅ Code-only      | ✅ Code + search + scraper + voice |\n\n# Star us on GitHub\n\n_Building toward AGI and artificial consciousness? Star the repo and help others find the path._\n\n<p align=\"center\">\n <a href=\"https://www.star-history.com/#tinyhumansai/openhuman&type=date&legend=top-left\">\n <picture>\n <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=tinyhumansai/openhuman&type=date&theme=dark&legend=top-left\" />\n <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=tinyhumansai/openhuman&type=date&legend=top-left\" />\n <img alt=\"Star History Chart\" src=\"https://api.star-history.com/svg?repos=tinyhumansai/openhuman&type=date&legend=top-left\" />\n </picture>\n </a>\n</p>\n\n# Contributors Hall of Fame\n\nShow some love and end up in the hall of fame. Contributors get free merch and special access to our [Discord](https://discord.tinyhumans.ai/).\n\n<a href=\"https://github.com/tinyhumansai/openhuman/graphs/contributors\">\n <img src=\"https://contrib.rocks/image?repo=tinyhumansai/openhuman\" alt=\"OpenHuman contributors\" />\n</a>\n","summary":"OpenHuman is an open-source AI harness designed to function as a personal artificial super-intelligence with a strong emphasis on user-centric control. It features local memory management to maintain context while offering the flexibility to integrate managed services when necessary. This project is ideal for individuals seeking a powerful, private-first AI solution that balances the benefits of local data processing with the capabilities of scalable external services.","description":"Your Personal AI super intelligence. Private, Simple and extremely powerful.","stars":30414,"language":"Rust"},{"owner":"millionco","repo":"react-doctor","url":"https://github.com/millionco/react-doctor","readme":"<picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"./assets/react-doctor-readme-logo-dark.svg\">\n  <source media=\"(prefers-color-scheme: light)\" srcset=\"./assets/react-doctor-readme-logo-light.svg\">\n  <img alt=\"React Doctor\" src=\"./assets/react-doctor-readme-logo-light.svg\" width=\"134\" height=\"36\">\n</picture>\n\n[![version](https://img.shields.io/npm/v/react-doctor?style=flat&colorA=000000&colorB=000000)](https://npmjs.com/package/react-doctor)\n[![downloads](https://img.shields.io/npm/dt/react-doctor.svg?style=flat&colorA=000000&colorB=000000)](https://npmjs.com/package/react-doctor)\n\nYour agent writes bad React, this catches it.\n\nReact Doctor deterministically scans your codebase and finds issues across state & effects, performance, architecture, security, and accessibility.\n\nWorks for all React frameworks and libraries - Next.js, Vite, TanStack, React Native, Expo, you name it.\n\n[Website →](https://react.doctor/docs)\n\n## Install\n\n### 1. Quick start\n\nRun this at your project root to get an audit.\n\n```bash\nnpx react-doctor@latest\n```\n\nhttps://github.com/user-attachments/assets/07cc88d9-9589-44c3-aa73-5d603cb1c570\n\n### 2. Install for agents\n\nOnce you have an audit, you can install the skill for your coding agent to learn from the issues and fix them in the future.\n\n```bash\nnpx react-doctor@latest install\n```\n\nWorks with Claude Code, Cursor, Codex, OpenCode, and many more.\n\n### 3. Run in CI (GitHub Actions) for your team\n\n[![GitHub Action](https://img.shields.io/badge/GitHub%20Action-React%20Doctor-000000?style=flat&labelColor=000000&logo=githubactions&logoColor=white)](https://github.com/marketplace/actions/react-doctor)\n\nAdd the reusable GitHub Action from Marketplace to scan every pull request, show inline annotations, and leave findings where reviewers already look.\n\n```yaml\nname: React Doctor\n\non:\n  pull_request:\n    types: [opened, synchronize, reopened, ready_for_review]\n\npermissions:\n  contents: read\n  pull-requests: write\n  issues: write\n\nconcurrency:\n  group: react-doctor-${{ github.event.pull_request.number || github.ref }}\n  cancel-in-progress: true\n\njobs:\n  react-doctor:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v5\n      - uses: millionco/react-doctor@main\n```\n\n[Add GitHub Action →](https://github.com/marketplace/actions/react-doctor)\n\n### 4. Configure rules in `doctor.config.ts`\n\nConfigure with a `doctor.config.ts` (or `.js`, `.mjs`, `.cjs`, `.json`, `.jsonc`) in your project root.\n\n```ts\n// doctor.config.ts\nimport type { ReactDoctorConfig } from \"react-doctor/api\";\n\nexport default {\n  lint: true,\n  rules: {\n    \"react-doctor/no-array-index-as-key\": \"off\",\n  },\n} satisfies ReactDoctorConfig;\n```\n\nPrefer JSON? Use `doctor.config.json`:\n\n```jsonc\n{\n  \"$schema\": \"https://react.doctor/schema/config.json\",\n  \"lint\": true,\n}\n```\n\n## Telemetry\n\nThe CLI reports crashes, basic run traces, and anonymous usage counters to [Sentry](https://sentry.io/) to help us fix bugs and prioritize work.\n\nWe collect:\n\n- Environment: CLI version, platform, Node version\n- Invocation: which command, package manager, and run context (whether it's local vs. CI vs. coding agent)\n- Project shape: framework, React version, TypeScript, project size NO file contents)\n- Rules fired: rule names and counts only (e.g. `react-doctor/no-array-index-as-key`) (NO code or specific findings)\n- De-minified React Doctor CLI stack traces\n\nTo opt out, run: `npx react-doctor@latest --no-telemetry`\n\n## Contributing\n\n[Issues welcome!](https://github.com/millionco/react-doctor/issues)\n\nMIT-licensed\n","summary":"React Doctor is a comprehensive analysis tool designed to identify performance, security, architecture, and accessibility issues within React codebases. It offers deterministic scanning that supports a wide range of frameworks, including Next.js, Vite, and React Native, with the ability to integrate directly into CI/CD pipelines or coding agents for automated remediation. This tool is ideal for React developers and teams looking to enforce high code quality standards and proactively catch common pitfalls in their projects.","description":"Your agent writes bad React. This catches it","stars":11936,"language":"TypeScript"},{"owner":"rohitg00","repo":"agentmemory","url":"https://github.com/rohitg00/agentmemory","readme":"<p align=\"center\">\n  <img src=\"assets/banner.png\" alt=\"agentmemory — Persistent memory for AI coding agents\" width=\"720\" />\n</p>\n\n<p align=\"center\">\n  <strong>\n    Your coding agent remembers everything. No more re-explaining.\n    Built on <a href=\"https://github.com/iii-hq/iii\">iii engine</a>\n  </strong><br/>\n  Persistent memory for Claude Code, GitHub Copilot CLI, Cursor, Gemini CLI, Codex CLI, Hermes, OpenClaw, pi, OpenCode, and any MCP client.\n</p>\n\n<p align=\"center\">\n  <a href=\"README.md\">English</a> |\n  <a href=\"READMEs/README.zh-CN.md\">简体中文</a> |\n  <a href=\"READMEs/README.zh-TW.md\">繁體中文</a> |\n  <a href=\"READMEs/README.ja-JP.md\">日本語</a> |\n  <a href=\"READMEs/README.ko-KR.md\">한국어</a> |\n  <a href=\"READMEs/README.es-ES.md\">Español</a> |\n  <a href=\"READMEs/README.tr-TR.md\">Türkçe</a> |\n  <a href=\"READMEs/README.ru-RU.md\">Русский</a> |\n  <a href=\"READMEs/README.hi-IN.md\">हिन्दी</a> |\n  <a href=\"READMEs/README.pt-BR.md\">Português</a> |\n  <a href=\"READMEs/README.fr-FR.md\">Français</a> |\n  <a href=\"READMEs/README.de-DE.md\">Deutsch</a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://trendshift.io/repositories/25123\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/25123\" alt=\"rohitg00/agentmemory | Trendshift\" width=\"250\" height=\"55\"/></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://www.star-history.com/?repos=rohitg00%2Fagentmemory&type=date&legend=top-left\">\n    <picture>\n      <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=rohitg00/agentmemory&type=date&theme=dark&legend=top-left\" />\n      <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=rohitg00/agentmemory&type=date&legend=top-left\" />\n      <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=rohitg00/agentmemory&type=date&legend=top-left\" />\n    </picture>\n  </a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://gist.github.com/rohitg00/2067ab416f7bbe447c1977edaaa681e2\"><img src=\"https://img.shields.io/badge/Viral%20GitHub%20Gist-1.3k%20stars%20%2F%20182%20forks-FF6B35?style=for-the-badge&logo=github&logoColor=white&labelColor=1a1a1a\" alt=\"Design doc: 1.3k stars / 182 forks on the gist\" /></a>\n</p>\n\n<p align=\"center\">\n  <em>The gist extends Karpathy's LLM Wiki pattern with confidence scoring, lifecycle, knowledge graphs, and hybrid search: agentmemory is the implementation.</em>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://www.npmjs.com/package/@agentmemory/agentmemory\"><img src=\"https://img.shields.io/npm/v/@agentmemory/agentmemory?color=CB3837&label=npm&style=for-the-badge&logo=npm\" alt=\"npm version\" /></a>\n  <a href=\"https://www.npmjs.com/package/@agentmemory/agentmemory\"><img src=\"https://img.shields.io/npm/dm/@agentmemory/agentmemory?color=CB3837&label=downloads&style=for-the-badge&logo=npm\" alt=\"npm downloads\" /></a>\n  <a href=\"https://github.com/rohitg00/agentmemory/actions\"><img src=\"https://img.shields.io/github/actions/workflow/status/rohitg00/agentmemory/ci.yml?label=tests&style=for-the-badge&logo=github\" alt=\"CI\" /></a>\n  <a href=\"https://github.com/rohitg00/agentmemory/blob/main/LICENSE\"><img src=\"https://img.shields.io/github/license/rohitg00/agentmemory?color=blue&style=for-the-badge\" alt=\"License\" /></a>\n  <a href=\"https://github.com/rohitg00/agentmemory/stargazers\"><img src=\"https://img.shields.io/github/stars/rohitg00/agentmemory?style=for-the-badge&color=yellow&logo=github\" alt=\"Stars\" /></a>\n</p>\n\n<p align=\"center\">\n  <picture><source media=\"(prefers-color-scheme: dark)\" srcset=\"assets/tags/light/stat-recall.svg\"><img src=\"assets/tags/stat-recall.svg\" alt=\"95.2% retrieval R@5\" height=\"38\" /></picture>\n  <picture><source media=\"(prefers-color-scheme: dark)\" srcset=\"assets/tags/light/stat-tokens.svg\"><img src=\"assets/tags/stat-tokens.svg\" alt=\"92% fewer tokens\" height=\"38\" /></picture>\n  <picture><source media=\"(prefers-color-scheme: dark)\" srcset=\"assets/tags/light/stat-tools.svg\"><img src=\"assets/tags/stat-tools.svg\" alt=\"53 MCP tools\" height=\"38\" /></picture>\n  <picture><source media=\"(prefers-color-scheme: dark)\" srcset=\"assets/tags/light/stat-hooks.svg\"><img src=\"assets/tags/stat-hooks.svg\" alt=\"12 auto hooks\" height=\"38\" /></picture>\n  <picture><source media=\"(prefers-color-scheme: dark)\" srcset=\"assets/tags/light/stat-deps.svg\"><img src=\"assets/tags/stat-deps.svg\" alt=\"0 external DBs\" height=\"38\" /></picture>\n  <picture><source media=\"(prefers-color-scheme: dark)\" srcset=\"assets/tags/light/stat-tests.svg\"><img src=\"assets/tags/stat-tests.svg\" alt=\"950+ tests passing\" height=\"38\" /></picture>\n</p>\n\n<p align=\"center\">\n  <img src=\"assets/demo.gif\" alt=\"agentmemory demo\" width=\"720\" />\n</p>\n\n<p align=\"center\">\n  <a href=\"#install\">Install</a> &bull;\n  <a href=\"#quick-start\">Quick Start</a> &bull;\n  <a href=\"#benchmarks\">Benchmarks</a> &bull;\n  <a href=\"#vs-competitors\">vs Competitors</a> &bull;\n  <a href=\"#works-with-every-agent\">Agents</a> &bull;\n  <a href=\"#how-it-works\">How It Works</a> &bull;\n  <a href=\"#mcp-server\">MCP</a> &bull;\n  <a href=\"#real-time-viewer\">Viewer</a> &bull;\n  <a href=\"#iii-console\">iii Console</a> &bull;\n  <a href=\"#powered-by-iii\">Powered by iii</a> &bull;\n  <a href=\"#configuration\">Config</a> &bull;\n  <a href=\"#api\">API</a>\n</p>\n\n---\n\n## Install\n\n```bash\nnpm install -g @agentmemory/agentmemory          # once — bare `agentmemory` on PATH\n# If you hit EACCES on macOS/Linux system Node installs, retry with:\n# sudo npm install -g @agentmemory/agentmemory\nagentmemory                                      # start the memory server on :3111\nagentmemory demo                                 # seed sample sessions + prove recall\nagentmemory connect claude-code                  # wire MCP into your agent (also: copilot-cli, codex, cursor, gemini-cli, ...)\nnpx skills add rohitg00/agentmemory -y           # install 8 native skills so your agent knows when to use the tools\n```\n\nOr via `npx` (no install):\n\n```bash\nnpx @agentmemory/agentmemory\n```\n\nHeads-up — npx caches per version. If a bare `npx @agentmemory/agentmemory` serves an older release, force the latest with `npx -y @agentmemory/agentmemory@latest`, or clear the cache once with `rm -rf ~/.npm/_npx` (macOS/Linux; on Windows delete `%LOCALAPPDATA%\\npm-cache\\_npx`). The first npx run from v0.9.16+ prompts to install globally inline so the bare `agentmemory` command works everywhere afterwards.\n\nFull options at [Quick Start](#quick-start) below. Agent-specific wiring at [Works with every agent](#works-with-every-agent).\n\n---\n\n<h2 id=\"works-with-every-agent\"><picture><source media=\"(prefers-color-scheme: dark)\" srcset=\"assets/tags/light/section-agents.svg\"><img src=\"assets/tags/section-agents.svg\" alt=\"Works with every agent\" height=\"32\" /></picture></h2>\n\nagentmemory works with any agent that supports hooks, MCP, or REST API. All agents share the same memory server.\n\n<table>\n<tr>\n<td align=\"center\" width=\"12.5%\">\n<a href=\"https://claude.com/product/claude-code\"><img src=\"https://github.com/anthropics.png?size=120\" alt=\"Claude Code\" width=\"48\" height=\"48\" /></a><br/>\n<strong>Claude Code</strong><br/>\n<sub>native plugin + 12 hooks + MCP</sub>\n</td>\n<td align=\"center\" width=\"12.5%\">\n<a href=\"https://github.com/openai/codex\"><img src=\"https://github.com/openai.png?size=120\" alt=\"Codex CLI\" width=\"48\" height=\"48\" /></a><br/>\n<strong>Codex CLI</strong><br/>\n<sub>native plugin + 6 hooks + MCP</sub>\n</td>\n<td align=\"center\" width=\"12.5%\">\n<a href=\"https://github.com/features/copilot\"><img src=\"https://github.githubassets.com/images/modules/site/copilot/copilot.png\" alt=\"GitHub Copilot CLI\" width=\"48\" height=\"48\" /></a><br/>\n<strong>GitHub Copilot CLI</strong><br/>\n<sub>MCP + plugin hooks/skills</sub>\n</td>\n<td align=\"center\" width=\"12.5%\">\n<a href=\"integrations/openclaw/\"><img src=\"https://github.com/openclaw.png?size=120\" alt=\"OpenClaw\" width=\"48\" height=\"48\" /></a><br/>\n<strong>OpenClaw</strong><br/>\n<sub>native plugin + MCP</sub>\n</td>\n<td align=\"center\" width=\"12.5%\">\n<a href=\"integrations/hermes/\"><img src=\"https://github.com/NousResearch.png?size=120\" alt=\"Hermes\" width=\"48\" height=\"48\" /></a><br/>\n<strong>Hermes</strong><br/>\n<sub>native plugin + MCP</sub>\n</td>\n<td align=\"center\" width=\"12.5%\">\n<a href=\"integrations/pi/\"><img src=\"assets/agents/pi.svg\" alt=\"pi\" width=\"48\" height=\"48\" /></a><br/>\n<strong>pi</strong><br/>\n<sub>native plugin + MCP</sub>\n</td>\n<td align=\"center\" width=\"12.5%\">\n<a href=\"https://github.com/tinyhumansai/openhuman\"><img src=\"https://raw.githubusercontent.com/tinyhumansai/openhuman/main/app/src-tauri/icons/128x128.png\" alt=\"OpenHuman\" width=\"48\" height=\"48\" /></a><br/>\n<strong>OpenHuman</strong><br/>\n<sub>native Memory trait backend</sub>\n</td>\n<td align=\"center\" width=\"12.5%\">\n<a href=\"https://cursor.com\"><picture><source media=\"(prefers-color-scheme: dark)\" srcset=\"https://svgl.app/library/cursor_dark.svg\"><img src=\"https://svgl.app/library/cursor_light.svg\" alt=\"Cursor\" width=\"48\" height=\"48\" /></picture></a><br/>\n<strong>Cursor</strong><br/>\n<sub>MCP server</sub>\n</td>\n<td align=\"center\" width=\"12.5%\">\n<a href=\"https://github.com/google-gemini/gemini-cli\"><img src=\"https://github.com/google-gemini.png?size=120\" alt=\"Gemini CLI\" width=\"48\" height=\"48\" /></a><br/>\n<strong>Gemini CLI</strong><br/>\n<sub>MCP server</sub>\n</td>\n</tr>\n<tr>\n<td align=\"center\" width=\"12.5%\">\n<a href=\"https://github.com/opencode-ai/opencode\"><picture><source media=\"(prefers-color-scheme: dark)\" srcset=\"https://svgl.app/library/opencode-dark.svg\"><img src=\"https://svgl.app/library/opencode.svg\" alt=\"OpenCode\" width=\"48\" height=\"48\" /></picture></a><br/>\n<strong>OpenCode</strong><br/>\n<sub>22 hooks + MCP + plugin</sub>\n</td>\n<td align=\"center\" width=\"12.5%\">\n<a href=\"https://github.com/cline/cline\"><img src=\"https://github.com/cline.png?size=120\" alt=\"Cline\" width=\"48\" heig
