otting code\n```\n\nBefore generating plotting code, the agent queries visual references, the user selects preferred examples in the browser, and AgentFigureGallery exports the selected references for the final plotting task.\n\n![AgentFigureGallery candidate counts by plot type](docs/assets/agentfiguregallery-scale-overview.png)\n\n## Quick Paths\n\n| Goal | Command or link |\n| --- | --- |\n| First successful local run after install | `~/AgentFigureGallery/.venv/bin/agentfiguregallery first-run --open` |\n| Bootstrap the Codex skill | <code>curl -fsSL https://raw.githubusercontent.com/Dsadd4/AgentFigureGallery/main/scripts/install.sh &#124; bash</code> |\n| Install through Awesome Skills | `npx add-skill Dsadd4/AgentFigureGallery` |\n| Review install behavior first | [Trust and Install Notes](docs/TRUST_AND_INSTALL.md) |\n| Open the Hugging Face showcase | [AgentFigureGallery Space](https://huggingface.co/spaces/dsadd4/AgentFigureGallery) |\n| Contribute a reference pack | [Community Packs](docs/COMMUNITY_PACKS.md) |\n\n## Manual Install\n\n```bash\ngit clone https://github.com/Dsadd4/AgentFigureGallery.git\ncd AgentFigureGallery\npython -m venv .venv\nsource .venv/bin/activate\npip install -e .\nagentfiguregallery doctor\nagentfiguregallery install-skill --target codex\n```\n\nThe default install is enough for smoke tests and the small built-in reference pack. To use the full 16k+ public reference pool, run the setup command below.\n\n## Full Public Reference Pool\n\nInstall the complete `full-public` pack from Hugging Face:\n\n```bash\nagentfiguregallery setup --pack full-public --manifest-url https://huggingface.co/datasets/dsadd4/AgentFigureGallery/resolve/main/resource_manifest.json\n```\n\nIf Hugging Face is blocked, use the GitHub API manifest fallback:\n\n```bash\nagentfiguregallery setup --pack full-public --manifest manifests/resource_manifest.github-api.json\n```\n\nYou can also download the full pack during bootstrap:\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/Dsadd4/AgentFigureGallery/main/scripts/install.sh | env AFG_INSTALL_FULL_PUBLIC=1 bash\n```\n\n## Browser Gallery Workflow\n\nCreate a reference session and open the browser gallery:\n\n```bash\nagentfiguregallery gallery --plot-type embedding_plot --limit 50 --serve\n# Then open http://127.0.0.1:8765/\n```\n\nThe command prints a `session` id before starting the local server. In the browser, mark references as liked, rejected, or selected. Those saved preferences are reused by later sessions.\n\nAfter selecting references, export the bundle for the coding agent:\n\n```bash\nagentfiguregallery bundle --session <session_id>\n```\n\nThe bundle is written to:\n\n```text\noutputs/reference_sessions/<session_id>/export_bundle/reference_bundle.json\n```\n\nTo reopen the frontend later without creating a new reference session:\n\n```bash\nagentfiguregallery serve --host 127.0.0.1 --port 8765\n```\n\n## Verify Codex Skill\n\nAfter installing the Codex skill, Codex can discover AgentFigureGallery as a local skill.\n\n![Codex discovered Agent Figure Gallery](examples/plot_type_examples/screenshots/codex-skill-discovered.png)\n\nThen ask your coding agent to run a plot-type smoke test:\n\n```text\nUse AgentFigureGallery to test your installed plotting skill. Generate one Nature-style example for each supported plot type, then export PNG/PDF/SVG and a combined preview.\n```\n\nThe result should look like this: one Nature-style example for every supported plot type.\n\n![AgentFigureGallery plot-type smoke examples](examples/plot_type_examples/figures/agentfiguregallery_plot_type_examples_preview.png)\n\nSee `examples/plot_type_examples/` for the runnable script, source data, and PNG/PDF/SVG outputs.\n\n## For Coding Agents\n\nAfter `pip install -e .` finishes, tell your Codex, Claude Code, Cursor, or other coding agent:\n\n```text\nRead skills/agent-figure-gallery/SKILL.md, then use AgentFigureGallery before writing publication figure code.\n```\n\nYou can install personal skill wrappers for multiple agents:\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/Dsadd4/AgentFigureGallery/main/scripts/install.sh | env AFG_AGENT_TARGETS=\"codex claude-code cursor\" bash\n```\n\nCursor project rules need a project path, so pass it explicitly:\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/Dsadd4/AgentFigureGallery/main/scripts/install.sh | env AFG_AGENT_TARGETS=\"cursor\" AFG_CURSOR_PROJECT=/path/to/your-cursor-project bash\n```\n\nOr install wrappers manually:\n\n```bash\nagentfiguregallery install-skill --target codex\nagentfiguregallery install-skill --target claude-code\nagentfiguregallery install-skill --target cursor\nagentfiguregallery install-cursor-rule --project /path/to/your-cursor-project\n```\n\nCodex installs to `~/.codex/skills`, Claude Code installs to `~/.claude/skills`, Cursor-compatible skill installs write to `~/.cursor/skills`, and Cursor project rules write to `.cursor/rules/agent-figure-gallery.mdc`. See `docs/AGENT_QUICKSTART.md` and `examples/agent_prompt.md`.\n\nEnd-to-end examples:\n\n- `examples/end_to_end_embedding.md`\n- `examples/generated_embedding_plot/README.md`\n- `examples/before_after_benchmark/README.md`\n\n## Dynamic Gallery\n\nUse the browser gallery to browse candidates by plot type, reject unsuitable references, save plot-type preferences, and export selected examples for the agent. With the `full-public` pack installed, the gallery can draw from 16,341 public visual candidates across common scientific plot types.\n\n```bash\nagentfiguregallery query --task \"Nature-style embedding map for cell atlas\"\nagentfiguregallery gallery --plot-type embedding_plot --limit 100 --serve\n```\n\n## Extend Your Gallery\n\nAgentFigureGallery can grow after install. You can ask an agent to follow the expansion guide, or add a small local reference pack yourself, then inspect the new candidates in the browser gallery.\n\nTell your coding agent:\n\n```text\nRead ExtendAgent/README.md, then expand AgentFigureGallery for <plot type or style>. Discover high-quality public scientific plotting sources, render every useful reference as a visible preview, preserve stable candidate IDs and source license metadata, rebuild the candidate index, and report candidate counts plus private-path scan results.\n```\n\nFor manual expansion, the important rules are:\n\n1. Add only references with visible preview PNGs.\n2. Preserve stable `candidate_id`, `plot_type`, preview path, source metadata, and license attribution when available.\n3. Keep large preview packs, raw upstream repositories, private paths, and tokens out of Git.\n\nSee `ExtendAgent/README.md` for the full expansion contract and quality gates.\n\n## Community Packs\n\nCommunity packs are the public contribution path for reusable plotting references. The base `full-public` pack remains the canonical 16k+ pool maintained by Dsadd4; community contributions land first in `community_pool/`, then accepted material is periodically released as installable asset packs.\n\nContribution routes:\n\n- Open a Community Pack issue to propose public sources, plot types, or a pack idea.\n- Open a PR under `community_pool/packs/<pack_name>/` using the documented schema.\n- Keep large assets out of Git; accepted packs are distributed through resource manifests.\n\nAfter a community release manifest is published, users can selectively install a community pack:\n\n```bash\nagentfiguregallery setup --pack community-latest --manifest-url <community_resource_manifest_url>\nagentfiguregallery gallery --plot-type embedding_plot --limit 50 --serve\n```\n\nSee `docs/COMMUNITY_PACKS.md` and `community_pool/README.md` for contribution rules, schemas, review gates, and install patterns.\n\n## What Is Inside\n\n- 16,341 full-public visual candidates across 10 scientific plot types.\n- Browser-gallery feedback for personal or lab-specific figure preferences.\n- A small curated minimal pack committed for instant smoke tests.\n- Codex-equipped plot-type smoke examples with PNG/PDF/SVG outputs.\n- Backend CLI, browser gallery, Codex skill wrapper, and agent expansion guide.\n- Stable candidate IDs, saved preferences, and export bundles for agent handoff.\n- Community pack contribution path for user-submitted plotting references and periodic asset releases.\n\n## Roadmap\n\n- [Curated Cell and Science style reference packs](https://github.com/Dsadd4/AgentFigureGallery/issues/3)\n- [Faster full-public mirror for China and restricted networks](https://github.com/Dsadd4/AgentFigureGallery/issues/4)\n\nCompleted:\n\n- [One-command Codex skill install](https://github.com/Dsadd4/AgentFigureGallery/issues/1)\n- [Generated embedding plot from a reference bundle](examples/generated_embedding_plot/README.md)\n- [Before/after benchmark: prompt-only vs reference-guided plotting](examples/before_after_benchmark/README.md)\n\n## Docs\n\nUser docs:\n\n- `docs/AGENT_QUICKSTART.md`: minimal instructions for coding agents.\n- `docs/COMMUNITY_PACKS.md`: community contribution rules and release model.\n- `community_pool/`: staging area and schema examples for community packs.\n- `ExtendAgent/`: instructions for agents that expand the gallery.\n- `docs/REMOTE_FULL_VALIDATION.md`: first remote full-public validation and current mirror-speed caveat.\n\nMaintainer docs:\n\n- `docs/DISCOVERY_PLAYBOOK.md`: launch and star-growth checklist.\n- `docs/releases/v0.1.0.md`: first public release notes.\n- `docs/HF_SYNC.md`: Hugging Face dataset card and asset sync commands.\n- `docs/PYPI_RELEASE.md`: Python package release path.\n- `docs/HF_DATASET_CARD.md`: Hugging Face dataset card draft.\n- `docs/LAUNCH.md`: public launch copy and channels.\n- `docs/FULL_KB_DISTRIBUTION.md`: public asset-pack strategy.\n","summary":"AgentFigureGallery is a scientific plotting reference gallery designed for coding agents like Claude Code, Codex, Cursor, and similar tools. It helps agents search a large pool of real figure references, lets users review candidate examples in a browser gallery and mark them as liked, rejected, or selected, and then exports the selections as a reference bundle that can drive plotting code generation. It includes an agent-ready workflow and supports installing either a small built-in pack or a full 16k+ public reference pool from Hugging Face, making it useful for researchers, analysts, and developers who want higher-quality, reference-grounded plots.","description":"Drop-in scientific plotting skill for Claude Code, Codex, Cursor, and other coding agents.","stars":124,"language":"Python"},{"owner":"nai0om","repo":"buddhist-method","url":"https://github.com/nai0om/buddhist-method","readme":"# Buddhist Method — a skill for Claude\n\nA skill that encodes six Buddhist epistemic and decision-making principles as practical work disciplines for Claude (or any LLM-driven workflow). Each principle targets a specific failure mode that LLMs routinely exhibit: pattern-matching instead of verifying, patching symptoms instead of removing causes, capitulating under social pressure instead of holding to evidence.\n\n> 🇹🇭 อ่าน [README.th.md](README.th.md) สำหรับเวอร์ชันภาษาไทย\n\n## What's in here\n\nA Claude skill (`SKILL.md` plus `references/`) that gives Claude a checklist for:\n\n| Principle | What it catches |\n|-----------|-----------------|\n| **Kalāma** (กาลามสูตร) | Stating facts from pattern memory without verifying |\n| **Yoniso Manasikāra** (โยนิโสมนสิการ) | Treating symptoms instead of finding root causes |\n| **Sati-Sampajañña** (สติ-สัมปชัญญะ) | Acting on stale or remembered state |\n| **Anatta** (อนัตตา) | Patching a fundamentally wrong draft instead of rewriting |\n| **Pahāna** (ปหานะ) | Workarounds that hide bugs instead of removing them |\n| **Upekkhā** (อุเบกขา) | Capitulating under user pressure or thrashing under tool failures |\n\nPlus deeper references for harder situations:\n- The **Four Noble Truths** as a debugging frame (`references/ariyasacca-debug.md`)\n- **Apāyakosalla** — recognizing decline / anti sunk-cost\n- **Appamāda** — heedfulness across long tasks\n- **Sappurisadhamma (3 of 7)** — knowing self / time / audience\n- **Atthatraya** — short-term vs long-term benefit trade-offs\n- **Majjhimā Paṭipadā** — the middle way for solution sizing\n\n## Why keep the Pali / Thai names\n\nThe Pali names are kept on purpose. They are mnemonic keys — each name retrieves a complete, well-developed pattern that a paragraph of plain English does not retrieve as cleanly. *Yoniso manasikāra* pulls in the whole discipline of attention to causes; \"root cause analysis\" loses the framing of attention itself.\n\nThis is the same reason engineers learn \"sigmoid\" rather than \"the curvy function\" — names are infrastructure.\n\nThe skill is **not** a religious framework. It does not require belief, ritual, or commitment to any tradition. It is a checklist with cultural roots, presented honestly. For the principles in their full traditional depth, read the suttas — this skill makes no claim to teach them.\n\n## How to use\n\n### With Claude Code\n\nPaste this prompt into Claude Code — it clones the skill and wires up `~/.claude/CLAUDE.md` in one step:\n\n```\nInstall the buddhist-method skill:\n1. Run: git clone https://github.com/nai0om/buddhist-method ~/.claude/skills/buddhist-method\n2. Open ~/.claude/CLAUDE.md (create it if it does not exist) and append:\n\n## Working method\nFor tasks involving factual claims, debugging, user pushback,\nor long multi-step work, consult the buddhist-method skill at\n~/.claude/skills/buddhist-method/SKILL.md before responding.\n```\n\nAfter that, Claude Code references the skill automatically across all sessions.\n\n### With other Claude products\n\nAnywhere skills are supported, drop the directory in. The structure is standard (a `SKILL.md` with YAML frontmatter, plus `references/`).\n\n### As a reference for yourself\n\nThe `SKILL.md` and `references/` files are readable on their own. Each principle has a **trigger** (when it fires) and an **action** (what to do). You can use them as a personal checklist without involving an LLM.\n\n### Make it always active (optional)\n\nBy default, Claude loads the skill on demand — it sees the description and decides whether to read the full `SKILL.md` based on the task at hand. That is fine for most uses, and it keeps your context budget free for everything else.\n\nIf you want the skill to be a persistent reminder regardless of task, add a small pointer to your `CLAUDE.md`:\n\n```markdown\n## Working method\nFor tasks involving factual claims, debugging, user pushback,\nor long multi-step work, consult the buddhist-method skill at\n~/.claude/skills/buddhist-method/SKILL.md before responding.\n```\n\nTwo places you can put this:\n\n- **Project root `CLAUDE.md`** — applies only when working in that project.\n- **`~/.claude/CLAUDE.md`** — applies globally across all your Claude Code sessions.\n\nThe pointer is only a few lines, so it doesn't bloat your context. Claude still loads the body of the skill progressively when triggers fire — you are just guaranteeing that the skill stays on Claude's radar.\n\n## Structure\n\n```\nbuddhist-method/\n├── SKILL.md                              # six core principles + dispatch\n├── README.md                             # this file\n├── README.th.md                          # Thai version\n├── LICENSE                               # MIT\n└── references/\n    ├── ariyasacca-debug.md               # Four Noble Truths as debug frame\n    └── extended-principles.md            # five secondary principles\n```\n\n## License\n\nMIT. Use, modify, and redistribute freely. See [LICENSE](LICENSE).\n\n## Contributing\n\nIssues and pull requests welcome. Particularly interested in:\n- Failure modes the current principles don't catch.\n- Better triggers (more specific situations that should fire each principle).\n- Translations into other languages where the source tradition is alive.\n\nIf proposing a new principle, please show:\n1. The specific failure mode it catches.\n2. A concrete trigger and action.\n3. Why an existing principle doesn't already cover it.\n\nThe bar is keeping the skill tight. New principles are easy to add; what's hard is keeping the set small enough to actually be used.\n","summary":"Buddhist-method is an open-source “skill” for Claude (and other LLM-driven workflows) that turns six Buddhist epistemic and decision-making principles into practical work disciplines. It provides a checklist designed to catch common failure modes in AI assistance such as unverified pattern-matching, treating symptoms instead of root causes, relying on stale assumptions, clinging to fundamentally wrong drafts, hiding bugs with workarounds, and buckling under social pressure or tool failures. The included references extend this with debugging and prioritization frames like the Four Noble Truths, long-horizon heedfulness, sunk-cost/decline awareness, and balanced “middle way” solution sizing. It’s most useful for people who use LLMs for high-stakes reasoning, debugging, contentious feedback, or multi-step projects and want a repeatable method to improve rigor and decision quality.","description":"Buddhist epistemic principles as Claude Code skill — anti-hallucination, root-cause debugging, steadiness under pressure","stars":178,"language":null},{"owner":"skydoves","repo":"android-testing-skills","url":"https://github.com/skydoves/android-testing-skills","readme":"# Android Testing Skills\n\n<img width=\"1116\" height=\"444\" alt=\"cover\" src=\"https://github.com/user-attachments/assets/0cb8280f-aa4c-425a-95a6-c17995e6b33d\" />\n\nA library of [Agent Skills](https://agentskills.io) for **Android testing**, covering the full\ntesting surface that an Android engineer touches, from unit-test fundamentals to ADB-driven E2E.\nThe skills are written for AI coding agents (Claude Code, Android Studio Agent mode, Gemini) but\nread fine for humans too: every API claim is grounded in an `androidx/` file path or an\nauthoritative external doc, and every behavior note is sourced from primary research.\n\n> **Note.** You don't need all 54 skills. This is a catalog to pick from based on what your\n> project actually tests. Pull the Compose set if you write Compose UI tests, the ADB set if\n> you script CI, etc. Most projects use a handful at a time.\n\n54 skills across 7 sets:\n\n| Set | Skills | What it covers |\n|---|---:|---|\n| [`compose/`](compose/) | 25 | Jetpack Compose UI testing: finders, semantics matchers, assertions, gesture/key injection, the test clock, idling resources, state restoration, Espresso interop, accessibility checks, audit, preview-driven development, on-device preview screenshot catalogs in CI, stability validation. |\n| [`fundamentals/`](fundamentals/) | 5 | Testing pyramid, what to test, test doubles (fake/stub/mock/spy/dummy), Given-When-Then strategies, source set organisation. |\n| [`kotlin/`](kotlin/) | 1 | Kotlin-native test tooling: the multiplatform `kotlin.test` library (`@Test`/`@BeforeTest`, `assert*`, `assertFailsWith`, `Asserter`, the `kotlin(\"test\")` JUnit4/JUnit5 capability). |\n| [`jvm-tests/`](jvm-tests/) | 6 | JVM unit tests: JUnit4 setup, Mockito + mockito-kotlin, MockK, kotlinx-coroutines-test (`runTest`), Turbine for flows, Robolectric. |\n| [`instrumentation/`](instrumentation/) | 6 | On-device tests: `AndroidJUnit4` runner, `ActivityScenario`, `FragmentScenario`, Espresso, UiAutomator, Gradle Managed Devices. |\n| [`platform/`](platform/) | 1 | Platform-shipped test tooling: migrating off the deprecated `android.test.*` classes (`ActivityInstrumentationTestCase2`, `AndroidTestCase`, `ServiceTestCase`, `MoreAsserts`, `TouchUtils`, `android.test.mock.*`) onto AndroidX Test. |\n| [`adb/`](adb/) | 10 | ADB-driven E2E: architecture, USB & wireless connection, app management, `am instrument`, input injection, screencap/screenrecord, logcat, file transfer, CI scripting. |\n\n> Another skills: [**compose-performance-skills**](https://github.com/skydoves/compose-performance-skills)\n> covers the *performance* side of Compose: stability, recomposition, lazy layouts, modifiers, side\n> effects, measurement, baseline profiles, R8, hot reload. Same authoring spec; install both for full\n> coverage. See [Attribution](#attribution) for details.\n\n## 💝 Sponsors\n\nThe sponsors listed below made it possible for this project to be released as open source. Many thanks to all of them for their support!\n\n<a href=\"https://cline.gg/jaewoong\"><img src=\"art/logo-cline.png\" alt=\"Cline\" width=\"280\"/></a>\n\n**[Cline](https://cline.gg/jaewoong)** is an open-source autonomous coding agent, and with Cline 2.0 the runtime that powers it across VS Code, JetBrains, and the CLI is now a programmable TypeScript SDK (`npm i @cline/sdk`). The agent loop is decoupled from providers (Anthropic, OpenAI, Google, Bedrock, and more) and extended via plugins, custom tools, hooks, and hub-backed sessions that outlive a single UI: inspectable, forkable, and built to be built upon.\n\n## What is a Skill\n\nA Skill is a single Markdown file (`SKILL.md`) plus optional `references/` material that teaches\nan agent how to perform one focused task. It declares trigger vocabulary in YAML frontmatter and a\nnumbered workflow in the body. The agent reads the frontmatter, decides whether the skill applies\nto the current task, then follows the workflow inside `SKILL.md` step by step.\n\nA skill is not documentation for humans. It is operational instructions for an LLM. That changes\nthe writing voice: terse, imperative, RIGHT and WRONG snippet pairs, MUST and MUST NOT directives\nin bold caps, and a Verification checklist that proves the work was done. Prose is kept short.\nCode samples carry the load.\n\n## Directory layout\n\n```\nandroid-testing-skills/\n├── README.md                     # this file\n├── INDEX.md                      # symptom + API + workflow lookup tables\n├── LICENSE                       # Apache-2.0\n├── docs/\n│   ├── SPEC.md                   # authoring spec (frontmatter, voice, RIGHT/WRONG, post-write self-check)\n│   └── CORPUS.md                 # research corpus (file paths, API tables, primary URLs)\n├── scripts/install-skills.sh     # symlinks each skill into the agent's flat skills dir\n├── tasks/research/               # 11 deep research reports (gitignored)\n└── <set>/<category>/<slug>/\n    ├── SKILL.md                  # the skill (required)\n    └── references/               # optional, one level deep\n```\n\nConventions:\n\n- **Set**: lowercase, one of `compose`, `fundamentals`, `kotlin`, `jvm-tests`, `instrumentation`, `platform`, `adb`.\n- **Category**: lowercase, varies per set (e.g. `compose/setup`, `adb/architecture`, `fundamentals/concepts`).\n- **Slug**: gerund form, lowercase, hyphenated, max 64 chars. Unique repo-wide.\n- **Body length**: every skill stays under 500 lines. Longer material moves into `references/`.\n- **Cross links**: relative Markdown links. Same category uses `..`; different category in same set uses `../..`; different set uses `../../..`. See [`docs/SPEC.md`](docs/SPEC.md) §7.\n\n## Installation\n\nSkill loaders (Claude Code, Android Studio Agent mode, Gemini) expect a **flat layout** of\n`<install-dir>/<slug>/SKILL.md`. This repo organizes skills under `<set>/<category>/<slug>/SKILL.md`\nfor human readability. A plain `git clone` into `~/.claude/skills` will NOT surface the skills\ndirectly. Use the bundled install script, which symlinks each skill folder by its slug into a flat\ntarget directory.\n\n> Why this matters. If you skip the install script, the agent loader sees `compose/`, `fundamentals/`, etc. as\n> top-level entries and never finds any `SKILL.md`. The script flattens the tree. **Always run\n> it after cloning** and after every `git pull`, since new skills only become discoverable\n> once their slugs are symlinked.\n\n### Claude Code\n\n```bash\ngit clone https://github.com/skydoves/android-testing-skills.git \\\n  ~/.claude/skills-sources/android-testing-skills\n\n~/.claude/skills-sources/android-testing-skills/scripts/install-skills.sh\n```\n\nThe script is idempotent. It walks the repo, finds every `SKILL.md`, and creates one symlink per\nskill at `~/.claude/skills/<slug>/`. It does NOT touch other entries in `~/.claude/skills/`, so it\ncoexists with `android skills add ...` (Google's first-party catalog) and with other community\nlibraries.\n\n```bash\n~/.claude/skills-sources/android-testing-skills/scripts/install-skills.sh /path/to/agent/skills\n~/.claude/skills-sources/android-testing-skills/scripts/install-skills.sh --uninstall\n```\n\nAfter install, restart Claude Code so it re-scans the skills directory.\n\n### Android Studio Agent mode and Gemini\n\nThese agents discover skills at runtime by scanning project-local directories per Google's\n[Android skills documentation](https://developer.android.com/tools/agents/android-skills). Use the\nsame install script, targeting the project's agent skills directory:\n\n```bash\ncd <your-android-project>\ngit clone https://github.com/skydoves/android-testing-skills.git \\\n  .android-testing-skills-source\n\n./.android-testing-skills-source/scripts/install-skills.sh .agent/skills\n```\n\nAdd `.android-testing-skills-source/` to `.gitignore` so the project doesn't track upstream.\nUpdates are a single `git -C .android-testing-skills-source pull && ./.android-testing-skills-source/scripts/install-skills.sh .agent/skills`.\n\nEnd-to-end behavior with Android Studio Agent mode and Gemini has not been independently verified\nby the author. Reports of working or broken integration are welcome at the\n[issue tracker](https://github.com/skydoves/android-testing-skills/issues).\n\n### Android CLI (first-party catalog only)\n\nThe [Android CLI](https://developer.android.com/tools/agents/android-cli) manages only Google's\nfirst-party skill catalog (`android skills add --skill r8-analyzer`, etc.). Community libraries\nsuch as this repo are outside that catalog and cannot be installed through the CLI. Use both\ntogether: `android skills add` for the first-party catalog, `install-skills.sh` for this library.\n\n### Claude.ai and the Claude API\n\nFor Claude.ai workspaces, upload the relevant `SKILL.md` files as Agent Skill attachments. For\ndirect Anthropic API integrations, reference skills inline in the system prompt or load them\nthrough the Agent Skills file API. The skills are self-contained: no external runtime is required\nbeyond a working Android toolchain on the developer's machine for the verification steps.\n\n### Other agent runtimes\n\nAny agent runtime that can read a Markdown file and follow its instructions can use these skills.\nThe frontmatter is plain YAML. The body is plain Markdown. Treat the `SKILL.md` files as system\nprompts for the task, attach the linked `references/` files when the body cites them, and let the\nagent run the Verification checklist before declaring the work done.\n\n## Quickstart examples\n\n### Diagnose a flaky animation test\n\n> My LazyColumn animation test passes locally but fails on CI. There's a `Thread.sleep(500)` mid-test.\n\nThe agent matches on `flaky`, `animation`, `Thread.sleep`, `LazyColumn` and loads\n[`compose/synchronization/testing-animations-deterministically/SKILL.md`](compose/synchronization/testing-animations-deterministically/SKILL.md),\nwhich walks Claude through the `mainClock.autoAdvance = false` recipe and chains into\n[`compose/synchronization/synchronizing-with-idle/SKILL.md`](compose/synchronization/synchronizing-with-idle/SKILL.md)\nto swap `Thread.sleep` for `mainClock.advanceTimeBy(durationMs)`.\n\n### Stand up a JVM test suite for a new module\n\n> I'm adding unit tests to a Kotlin library module. Pick the right runner, mock framework, and coroutine harness.\n\nThe agent loads [`jvm-tests/runner/configuring-junit4-on-android/SKILL.md`](jvm-tests/runner/configuring-junit4-on-android/SKILL.md)\nfor the AndroidX dep matrix and `AndroidJUnit4` runner choice, then chains into\n[`jvm-tests/mocking/mocking-with-mockito/SKILL.md`](jvm-tests/mocking/mocking-with-mockito/SKILL.md)\n(or `mocking-with-mockk`) and [`jvm-tests/coroutines/testing-coroutines-with-runtest/SKILL.md`](jvm-tests/coroutines/testing-coroutines-with-runtest/SKILL.md)\nfor the coroutine test harness.\n\n### Wire ADB into a CI pipeline\n\n> Run instrumented tests across 4 emulators in parallel and capture screenshots + logcat on failure.\n\nThe agent loads [`adb/automation/scripting-adb-for-ci/SKILL.md`](adb/automation/scripting-adb-for-ci/SKILL.md)\nfor the parallel-fan-out idiom, [`adb/tests/running-instrumented-tests-via-adb/SKILL.md`](adb/tests/running-instrumented-tests-via-adb/SKILL.md)\nfor the `am instrument -w -r -e numShards/-e shardIndex` invocation, and\n[`adb/capture/capturing-screenshots-and-screenrecord/SKILL.md`](adb/capture/capturing-screenshots-and-screenrecord/SKILL.md)\n+ [`adb/observability/extracting-logs-with-logcat/SKILL.md`](adb/observability/extracting-logs-with-logcat/SKILL.md)\nfor the capture-on-failure recipe.\n\nThe full symptom-to-skill lookup is in [INDEX.md](INDEX.md).\n\n## Editorial position\n\nCross-cutting hot takes that appear as **MUST** / **MUST NOT** directives across the relevant skills:\n\n1. **Tag from production, find by tag from tests.** `Modifier.testTag` (Compose) or `android:id` (View) belongs in production source under a constant. Text finders are i18n-fragile and churn with copy edits.\n2. **Default to `useUnmergedTree = false`** in Compose. Switch only when the matcher targets an inner element collapsed by the merge pass.\n3. **Animation tests require `mainClock.autoAdvance = false`** in Compose. Otherwise `InfiniteAnimationPolicy` cancels infinite animations and your test never observes a determinate state.\n4. **`waitUntil` timeouts are wall clock; `advanceTimeUntil` is test clock** in Compose. Same split applies to `runTest` virtual time vs Turbine's wall-clock timeouts.\n5. **Funnel state mutations through `runOnIdle` or `runOnUiThread`.** Direct `var = value` from the test thread races with the recomposer.\n6. **Prefer the v2 entry points** for Compose (`androidx.compose.ui.test.junit4.v2.createComposeRule`, `androidx.compose.ui.test.v2.runComposeUiTest`). They use `StandardTestDispatcher`, matching `kotlinx.coroutines.test.runTest`.\n7. **`Thread.sleep` is a smell**, except in screenshot tests waiting on the RenderThread for ripples.\n8. **`am instrument` exit codes only matter with `-w`.** Without it, `$?` is meaningless and CI silently passes broken tests.\n9. **`pm clear` for hermetic reset, not `am force-stop`.** Force-stop kills the process but leaves SharedPreferences, DB, and files intact.\n10. **`androidx.test:orchestrator` ships via `androidTestUtil`, NOT `androidTestImplementation`.** The latter is a silent no-op.\n\n## Scope\n\nIn scope:\n\n- Jetpack Compose UI testing (the original `compose/` set).\n- JVM unit tests on Android: JUnit4, Mockito + mockito-kotlin, MockK, kotlinx-coroutines-test, Turbine, Robolectric.\n- On-device instrumented tests: `AndroidJUnit4`, `ActivityScenario`, `FragmentScenario`, Espresso, UiAutomator.\n- ADB as the device-control surface for E2E and CI: connection, app management, instrumentation invocation, input injection, capture, logcat, transfer, automation.\n- Cross-cutting fundamentals: pyramid, what to test, test doubles, strategies, source sets.\n\nOut of scope (intentionally; root-foundations focus first):\n\n- Screenshot/golden testing libraries (Paparazzi, Roborazzi, Shot). May be added later.\n- Code coverage tooling (JaCoCo, Kover).\n- Static analysis (lint, ktlint, detekt).\n- Performance and stability, covered in the sister repo [compose-performance-skills](https://github.com/skydoves/compose-performance-skills).\n- Compose Multiplatform iOS/Desktop/Web specifics. Most Compose skills apply because `ComposeUiTest` is multiplatform, but iOS/Desktop/Web targets are not validated here.\n\n## Contributing\n\nContributions are welcome. Before opening a pull request:\n\n1. Read [`docs/SPEC.md`](docs/SPEC.md) end to end. Frontmatter template, body structure, voice, mandatory rules, post-write self-check: all non-negotiable.\n2. Pull facts and code samples from [`docs/CORPUS.md`](docs/CORPUS.md) so vocabulary stays consistent across skills.\n3. Verify cross-references resolve. The convention is `..` for same-category siblings, `../..` for same-set different category, `../../..` for cross-set.\n4. Run the post-write self-check (SPEC §9). Frontmatter validates, body ≤500 lines, ≥1 RIGHT/WRONG pair for code-level skills, Verification checklist, ≥3 authoritative reference URLs, no first person, no emojis, no time-sensitive phrasing.\n5. Add the new skill to [INDEX.md](INDEX.md) under each lookup section it belongs to.\n\nSee [`CONTRIBUTING.md`](CONTRIBUTING.md) for the full procedure.\n\n## Find this repository useful? :heart:\nSupport it by joining __[stargazers](https://github.com/skydoves/android-testing-skills/stargazers)__ for this repository. :star: <br>\nAlso __[follow](https://github.com/skydoves)__ me for my next creations! 🤩\n\n# License\n```xml\nDesigned and developed in 2026 by skydoves (Jaewoong Eum)\n\nLicensed under the Apache License, Version 2.0 (the \"License\");\nyou may not use this file except in compliance with the License.\nYou may obtain a copy of the License at\n\n   http://www.apache.org/licenses/LICENSE-2.0\n\nUnless required by applicable law or agreed to in writing, software\ndistributed under the License is distributed on an \"AS IS\" BASIS,\nWITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.\nSee the License for the specific language governing permissions and\nlimitations under the License.\n```\n","summary":"skydoves/android-testing-skills is a curated library of “Agent Skills” focused on Android testing, spanning the full workflow from unit tests to on-device instrumentation and ADB-driven end-to-end testing. It provides dozens of task-ready skill modules grouped by area—especially Jetpack Compose UI testing (finders, semantics, assertions, gestures/key injection, test clock/idling resources, accessibility), plus fundamentals, Kotlin/JVM testing tooling, AndroidX instrumentation/Espresso/UIAutomator, and CI-friendly ADB automation. These skills are designed to be directly usable by AI coding agents (e.g., Claude Code, Android Studio Agent mode, Gemini) while remaining readable for humans because each behavior is grounded in androidX source paths and authoritative docs. Android engineers, QA automation developers, and teams using AI agents to generate or verify tests will benefit most from selecting the relevant skill sets for their stack (Compose, instrumentation, or CI scripting).","description":"⚡️ A set of skills for Android testing: Compose UI, AndroidX Test, JVM unit tests, and ADB.","stars":249,"language":"Shell"},{"owner":"WantongC","repo":"journal-adapt-writing-skill","url":"https://github.com/WantongC/journal-adapt-writing-skill","readme":"# journal-adapt-writing-skill\n\n> **A static + dynamic academic writing skill framework. Start with reusable writing rules, then generate a corpus-grounded dynamic skill for one manuscript and one writing destination.**\n\n![License: MIT](https://img.shields.io/badge/License-MIT-blue.svg)\n![Claude Code](https://img.shields.io/badge/Claude_Code-compatible-blueviolet)\n![Codex](https://img.shields.io/badge/Codex-compatible-green)\n![Version](https://img.shields.io/badge/version-1.1-brightgreen)\n\nThere are already many useful **static academic writing skills**: discipline templates, anti-AI phrasing rules, citation/equation safety rules, and general academic style guides. They are valuable, but they usually apply the same rules to every manuscript.\n\nThe missing piece is **journal adaptation**. Even for the same manuscript, writing for Journal A and writing for Journal B may require different introduction logic, contribution framing, method exposition, result emphasis, and discussion scope. A strong revision workflow should learn from the actual papers that define the target writing destination.\n\n**journal-adapt adds that dynamic layer on top of optional static skills.**\n\n- **Static skills** are reusable base rules: discipline conventions, general academic writing constraints, anti-AI phrasing cleanup, citation/equation safety, or your own lab/advisor guide.\n- **Dynamic skills** are generated for one manuscript and one writing destination from a user-provided corpus: target-journal papers, optional field-top or topic-similar papers, and optional user/lab exemplars.\n\nThe result is a visible, editable `dynamic_writing_skill.md`. It does not auto-write a paper; it gives the agent an auditable revision framework for section-by-section academic rewriting.\n\n---\n\n## Static + Dynamic\n\n```mermaid\nflowchart TD\n    A[Optional Static Skills\\nreusable base rules] --> E[Dynamic Writing Skill]\n    B[Target Journal Papers\\nprimary corpus] --> D[Corpus Style Profile]\n    C[Field-top or Topic-similar Papers\\noptional] --> D\n    U[User / Lab Exemplars\\noptional] --> D\n    D --> E\n    E --> F[Human Review]\n    F --> G[Section Revision]\n    G --> H[Revision Log]\n\n    style E fill:#e8f5e9,stroke:#4caf50\n    style F fill:#f5f0e8,stroke:#999\n```\n\n## Optional Static Skills\n\nThe static layer is optional. You can choose an existing open-source skill, bring your own, or skip this layer.\n\n| Static option | Field / purpose | Source |\n|---------------|-----------------|--------|\n| Economics writing | Economics writing and referee-style guidance | [hanlulong/econ-writing-skill](https://github.com/hanlulong/econ-writing-skill) |\n| ML / CV / NLP writing | Research paper writing for ML-style papers | [Master-cai/Research-Paper-Writing-Skills](https://github.com/Master-cai/Research-Paper-Writing-Skills) |\n| CS / research paper writing | Research paper pipeline for CS systems, networking, and ML-adjacent papers | [SNL-UCSB/paper-writing-skill](https://github.com/SNL-UCSB/paper-writing-skill) |\n| Philosophy / interdisciplinary writing | Academic paper planning and composition | [lishix520/academic-paper-skills](https://github.com/lishix520/academic-paper-skills) |\n| General AI-writing cleanup | Generic AI-writing cleanup / humanizing constraints | [blader/humanizer](https://github.com/blader/humanizer) |\n\nMore details: [Static Skill Recommendations](docs/STATIC_SKILL_RECOMMENDATIONS.md).\n\nYou can also use a custom static skill:\n\n| Custom input | Use when |\n|--------------|----------|\n| Your own `SKILL.md` | You already have reusable agent instructions. |\n| Lab/advisor writing guide | Your group has stable style preferences. |\n| Journal or field checklist | You want a lightweight rule sheet instead of a full skill. |\n| No static skill | You want the dynamic corpus to drive the workflow on its own. |\n\n## Dynamic Corpus\n\nThe dynamic corpus is the main feature. It is broader than \"papers from the target journal.\"\n\n| Corpus role | Required? | What it contributes |\n|-------------|-----------|---------------------|\n| **Primary corpus: target-journal papers** | Yes | The journal's local writing culture: structure, contribution framing, method/result exposition, discussion scope. |\n| **Secondary corpus: field-top or topic-similar papers** | Optional | High-quality field writing when the target-journal corpus is small or when the topic needs extra reference points. |\n| **User/lab exemplars** | Optional | Author, advisor, or lab preferences that should be preserved when they do not conflict with the target journal. |\n\nThe target journal usually has the highest priority. Optional secondary papers and user/lab exemplars enrich the dynamic skill, but they do not override reviewed target-journal patterns unless the user explicitly chooses that behavior.\n\n## Priority System\n\n| Priority | Source | Rule |\n|----------|--------|------|\n| P1 | Hard constraints | Preserve facts, citations, equations, notation, numerical results, labels, and author-defined terminology. |\n| P2 | Target journal corpus | Follow reviewed target-journal patterns. |\n| P3 | Secondary corpus and exemplars | Use high-quality field patterns or user/lab preferences when target-journal evidence is absent or weak. |\n| P4 | Static base skill | Apply discipline or general writing rules when corpus signals do not decide. |\n| P5 | Cleanup rules | Remove AI-taste phrases, hollow transitions, generic contributions, and unsupported overclaims. |\n\nP1 always wins. P2 usually beats P3 and P4. Any conflict that changes revision behavior should be recorded in the revision log.\n\n---\n\n## Corpus Preparation\n\nRecommended starting point:\n\n| Corpus role | Recommended size |\n|-------------|------------------|\n| Primary corpus: target-journal papers | 5-8 papers |\n| Secondary corpus: field-top or topic-similar papers | 2-5 papers |\n| User/lab exemplars | 1-3 documents |\n\nAll corpus files should be fully readable Markdown/text before Phase 1. If a PDF conversion is incomplete, retry conversion, use another converter, provide clean Markdown/text, or replace the paper.\n\n---\n\n## Quick Start\n\n### 1. Install the skill\n\nFor Claude Code:\n\n```bash\nmkdir -p ~/.claude/skills/journal-adapt\ncp -R skill/* ~/.claude/skills/journal-adapt/\n```\n\nFor Codex, copy or symlink the `skill/` folder into your Codex skills directory if your local setup supports custom skills. You can also keep the repository open and ask Codex to use `skill/SKILL.md` directly.\n\nMore detail: [Installation and PDF Conversion](docs/INSTALLATION.md).\n\n### 2. Prepare inputs\n\nMinimum Markdown workflow, no MinerU required:\n\n```text\nmy_project/\n├── corpus/\n│   ├── target_journal_001.md\n│   ├── target_journal_002.md\n│   └── field_top_paper_001.md\n└── manuscript.md\n```\n\nPDF workflow:\n\n```text\nmy_project/\n├── corpus_pdfs/\n│   ├── paper_001.pdf\n│   └── paper_002.pdf\n└── manuscript.pdf\n```\n\nPDF input requires a PDF-to-Markdown converter. MinerU is supported, but Markdown input is the recommended path if MinerU is hard to install.\n\n### 3. Invoke\n\n```text\n/journal-adapt\n```\n\nOr ask:\n\n```text\nHelp me build a dynamic writing skill for my manuscript using these target-journal papers and this base writing skill.\n```\n\nThe skill will ask for:\n\n1. Target journal or writing destination\n2. Primary corpus folder\n3. Optional secondary corpus folder\n4. Optional user/lab exemplar files\n5. Optional base writing skill\n6. Manuscript file\n7. Sections to revise\n\n---\n\n## Output\n\nSaved next to the manuscript:\n\n```text\n[manuscript_name]_revised/\n├── dynamic_writing_skill.md\n├── style_profile.md\n├── abstract_revised.md\n├── introduction_revised.md\n├── ...\n├── [section]_revision_log.md\n└── revision_summary.md\n```\n\nThe revised files are Markdown. Move them into LaTeX, Word, or another writing environment after review.\n\n---\n\n## Example\n\n`examples/jeem/` shows an anonymized MVP run for the Journal of Environmental Economics and Management:\n\n- corpus-role metadata\n- conversion gate report\n- aggregated style profile\n- generated dynamic writing skill\n- sanitized section diagnosis, revision sample, and revision log\n\nRaw PDFs, converted full text, and the private manuscript are not included.\n\n---\n\n## Documentation\n\n- [Installation and PDF Conversion](docs/INSTALLATION.md)\n- [Static Skill Recommendations](docs/STATIC_SKILL_RECOMMENDATIONS.md)\n- [System Architecture](docs/ARCHITECTURE.md)\n- [Module Specifications](docs/MODULES.md)\n- [Templates](docs/templates/)\n\n---\n\n## Known Limitations\n\n- English-language academic writing only.\n- PDF conversion quality depends on the converter. MinerU can fail on some local setups.\n- The project extracts writing structure and rhetorical patterns only. It must not quote or paraphrase copyrighted corpus papers.\n- The generated dynamic skill needs human review before revision begins.\n- The tool does not add facts, citations, results, or claims that are not already in the manuscript.\n\n---\n\n## Contributing\n\nUseful contributions include:\n\n- new static base writing skills for disciplines not covered here\n- better installation paths for Claude Code, Codex, and other agent environments\n- safer PDF-to-Markdown conversion recipes\n- more anonymized example corpora\n- improvements to style-card and revision-log templates\n\nOne base skill per file is preferred. Keep example corpora free of copyrighted full text and unpublished manuscript details.\n\n---\n\n## License\n\nMIT\n","summary":"WantongC/journal-adapt-writing-skill is a framework that helps you revise academic manuscripts so they match the norms of a specific target journal, combining reusable “static” writing rules with a “dynamic” journal adaptation layer learned from a corpus. It generates an auditable, editable `dynamic_writing_skill.md` for one manuscript and one writing destination, using target-journal papers plus optional field/topic-similar references and user or lab exemplars to build a section-by-section revision workflow. Unlike one-size-fits-all templates, the dynamic layer focuses on differences in framing, introductions, method/result emphasis, and discussion scope across journals. It’s best for researchers, writing teams, and agent-based writing assistants who want more reliable journal-specific revisions while keeping the process transparent for human review.","description":"Learn any journal's writing conventions from its published papers, then revise your manuscript to match — section by section.","stars":510,"language":null},{"owner":"Simbastack-hq","repo":"framedex","url":"https://github.com/Simbastack-hq/framedex","readme":"# framedex\n\n**A queryable knowledge base for your video archive.**\n\nTurn a scattered video archive, spread across multiple SSDs and years, into a portable, plain-text knowledge base. Each clip gets a `.description.md` sidecar with GPS location + place name, a speaker-diarized multilingual transcript, an English translation (if needed), face detection, and an AI vision scene description with a keep/review/cull rating.\n\nSidecars live next to the videos. Originals are never modified. Local-first, non-destructive, resumable.\n\nframedex is a [Claude Code](https://docs.claude.com/en/docs/claude-code) skill. It installs the `fdx` command-line tool.\n\n## Install\n\n```bash\n# Clone into your Claude Code skills directory\ngit clone git@github.com:Simbastack-hq/framedex.git ~/.claude/skills/framedex\ncd ~/.claude/skills/framedex\n\n# Install Python deps (editable, so changes take effect immediately)\nuv pip install -e .\n\n# Verify system binaries + pre-download models\npython3 scripts/setup.py\n```\n\n## Quick start\n\n```bash\n# 1. Get a Hugging Face token + accept pyannote terms (one-time, for diarization)\n#    https://huggingface.co/pyannote/speaker-diarization-3.1   (click Agree)\n#    https://huggingface.co/pyannote/segmentation-3.0          (click Agree)\n#    https://huggingface.co/settings/tokens                    (create read token)\nexport HF_TOKEN=hf_yourTokenHere\n\n# 2. (Optional) Set an Anthropic API key, only needed for --backend api\nexport ANTHROPIC_API_KEY=sk-ant-...\n\n# 3. Commands are on PATH after editable install. Use fdx, fdx-summary, fdx-master, fdx-query.\n\n# 4. Test on 5 clips before unleashing on a full drive\nfdx /Volumes/SSD-2024 --max-files 5\n\n# 5. Inspect the sidecars. If happy, run the full drive.\nfdx /Volumes/SSD-2024\n\n# 6. After indexing, generate folder summaries + a master index\nfdx-summary /Volumes/SSD-2024\nfdx-master  /Volumes/SSD-2024\n```\n\n## Per-clip pipeline\n\n1. `ffprobe` → metadata (duration, codec, resolution, creation date)\n2. `exiftool` → GPS lat/lon/altitude\n3. Nominatim → reverse-geocoded place name (rate-limited 1/sec, polite UA)\n4. `ffmpeg` → 5 evenly-spaced JPEG frames (≤1920px wide)\n5. `ffmpeg` → mono 16k WAV\n6. WhisperX → Whisper transcribe + word-level alignment + pyannote diarization\n7. WhisperX translate mode → English translation (non-English only)\n8. `insightface` → face detection + 512-dim embeddings on the same frames\n9. Vision model → single-call structured description (Scene/Subjects/Action/Mood/Shot type/Use cases) + keep/review/cull rating\n10. Write `[filename].description.md` next to the video\n\n## What sidecars look like\n\n```markdown\n---\nfile: IMG_4827.mov\npath: 2024-08-construction/drone/IMG_4827.mov\nparent_folder: drone\nduration_seconds: 12.3\nresolution: 3840x2160\ncodec: hvc1\nsize_bytes: 245678912\ncreation_time: 2024-08-14T07:23:11Z\nlocation:\n  lat: 37.7456\n  lon: -119.5936\n  altitude_m: 1842.5\n  place: \"Yosemite Valley, Mariposa County, USA\"\nlanguage_detected: es\nspeaker_count: 2\nrating: keep\nindexed_at: 2026-05-17T14:32:01\n---\n\n# IMG_4827.mov\n\n## Description\n\n**Scene:** Wide drone aerial of a construction site at golden hour...\n**Subjects:** Three workers in high-vis vests near a partially-built structure...\n**Action:** Drone slowly orbits; workers carry materials between two structures.\n**Mood:** Industrious, expansive, hopeful.\n**Shot type:** Drone aerial, slow orbit.\n**Use cases:**\n- Construction milestone post\n- \"From the ground up\" origin-story reel\n- B-roll behind a voiceover\n\n## Transcript (es, 2 speakers)\n\n[SPEAKER_00] (00:00:01) Pon esta viga aquí primero.\n[SPEAKER_01] (00:00:04) Sí, vale.\n[SPEAKER_00] (00:00:07) Cuidado con el ángulo.\n\n## English translation\n\nPlace this beam here first. Yes, OK. Careful with the angle.\n```\n\n## Optional folder context\n\nDrop `.video-context.md` at the root of any scan target to give the vision model better priors:\n\n```\n/Volumes/SSD-2024/.video-context.md\n---\nThis drive contains construction-site footage, 2023-2026. Many clips\nare drone aerials, crew training, and site walkthroughs. Languages mix\nEnglish and Spanish.\n---\n```\n\nWithout it, descriptions are generic.\n\n### Proper-noun biasing\n\nA `.video-context.md` can also carry a line of names Whisper should spell correctly:\n\n```\n**Whisper proper nouns:** Yosemite, El Capitan, Half Dome, ...\n```\n\nThese get passed to Whisper as `initial_prompt` + `hotwords` so place names and people names in speech don't come back garbled. A second regex pass (`~/.framedex/whisper_fixes.json`) catches anything the prompt bias misses.\n\n## Multiple SSDs\n\nRun on each drive separately:\n\n```bash\nfdx /Volumes/SSD-2023\nfdx /Volumes/SSD-2024\nfdx /Volumes/SSD-2025\n```\n\nEach drive ends up self-contained with its own sidecars + `_INDEX.json`. Knowledge travels with the data. The face DB at `~/.framedex/faces.db` is centralized so cross-drive person queries work.\n\n## Common flags\n\n| Flag | Purpose |\n|---|---|\n| `--dry-run` | Show what would be processed; no API/model calls |\n| `--max-files N` | Stop after N clips (testing) |\n| `--force` | Re-process clips even if a sidecar exists |\n| `--whisper-model large-v3` | Higher quality, slower (default is large-v3-turbo) |\n| `--no-diarize` | Skip speaker diarization (faster; no HF_TOKEN needed) |\n| `--no-faces` | Skip face detection + embeddings |\n| `--no-geocode` | Skip Nominatim reverse geocoding (GPS still recorded) |\n| `--max-duration MINUTES` | Skip clips longer than N minutes (default: 30; 0 = no limit) |\n| `--exclude PATTERN` | Skip paths matching substring (repeatable) |\n| `--backend cli\\|api\\|local` | Vision backend (see below) |\n| `--vision-model haiku\\|sonnet` | Claude model for `cli`/`api`. Default `haiku` |\n| `--local-base-url URL` | Override LM Studio endpoint (default `http://localhost:1234/v1`) |\n| `--local-model NAME` | Specify which loaded model to use when LM Studio has multiple |\n| `--no-whisper-prompt` | Disable proper-noun biasing |\n| `--whisper-fixes PATH` | Override the canonical-name regex fixes file |\n\n## Vision backends\n\n| Backend | What it uses | Speed | Cost | Privacy |\n|---|---|---|---|---|\n| `cli` (default) | `claude -p` via a Claude Max subscription | ~10-30s/clip | $0 marginal | Frames sent to Anthropic |\n| `api` | Anthropic SDK with an API key | ~2-3s/clip | ~$0.002/clip (Haiku) | Frames sent to Anthropic |\n| `local` | LM Studio (or any OpenAI-compatible server) | ~3-90s/clip | $0 | Fully local, fully offline |\n\nFor huge archives, `api` is fastest. For routine indexing on a Max plan, `cli` is free. For full privacy, `local` keeps everything on-device.\n\n## Privacy\n\n| Component | Local or cloud? |\n|---|---|\n| ffmpeg, exiftool, Whisper, pyannote, insightface | Local |\n| Nominatim reverse geocode | Cloud: sends lat/lon only, never video. Skip with `--no-geocode` |\n| Vision (`--backend cli`/`api`) | Cloud: sends 5 JPEG frames + a transcript snippet per clip |\n| Vision (`--backend local`) | Fully local |\n| Face DB (`~/.framedex/faces.db`) | Local only, never uploaded |\n\n## Languages\n\nWhisper supports 99 languages with auto-detection. For non-English clips the script automatically runs a second translate-mode pass and stores the English version alongside the original transcript. For best quality on important non-English footage:\n\n```bash\nfdx /Volumes/SSD-2024 --whisper-model large-v3 --force\n```\n\n## Speaker diarization\n\nWhisperX uses `pyannote/speaker-diarization-3.1` under the hood. First-time setup requires:\n\n1. A Hugging Face account + read token (`HF_TOKEN` env var)\n2. Clicking \"Agree\" on both pyannote model pages (linked in Quick start)\n\nIf `HF_TOKEN` is missing, the script logs a notice and continues without diarization. Transcripts still work; they just won't have speaker labels.\n\n## Resumable + idempotent\n\nAlready-indexed clips are skipped on re-runs (a sidecar existing = done). Ctrl-C any time; a restart picks up where it stopped. `--force` regenerates everything.\n\n## Troubleshooting\n\n**\"Missing dependency: whisperx\"**. Run `setup.py`.\n\n**\"Failed to load diarization pipeline\"**. You didn't accept the pyannote model terms on Hugging Face. Visit the two model pages, click Agree, then re-run.\n\n**Whisper model download stalls**. Run `setup.py --skip-model-download`, then `index_videos.py` downloads on first use. Make sure you have disk space (~3GB for large-v3, ~1.5GB for turbo).\n\n**\"No GPS data in this file\"**. Many clips don't have GPS metadata. The script handles this silently; the frontmatter just omits the location block.\n\n**Apple Silicon GPU not used**. CTranslate2 (via WhisperX) currently runs on CPU on M-series Macs. For archive indexing, CPU is plenty fast (10-30× realtime).\n\n## Companion tools\n\n| Command | Script | Purpose |\n|---|---|---|\n| `fdx` | `index_videos.py` | Main indexer |\n| `fdx-summary` | `trip_summary.py` | Recursive per-folder summaries |\n| `fdx-master` | `master_index.py` | Drive-level `_INDEX.md` + `_INDEX.json` |\n| `fdx-query` | `query.py` | Filter sidecars by rating, lighting, person, keyword, location, language |\n\n```bash\nfdx-query /Volumes/SSD-2024 --rating keep --time-of-day golden_hour\nfdx-query /Volumes/SSD-2024 --rating cull                  # the cull pile\nfdx-query /Volumes/SSD-2024 --keyword drone --keyword landscape\nfdx-query /Volumes/SSD-2024 --place-contains California --language es\n```\n\n## Known limitations\n\n- Frame sampling is evenly-spaced, not scene-detected\n- pyannote diarization degrades on heavy ambient noise (wind, music, crowd)\n- WhisperX runs on CPU on Apple Silicon\n- Face cluster IDs are temporary hashes until the `fdx-faces` labeling tool ships; embeddings are captured now, so no re-indexing will be needed\n- RAW photo support not yet (videos only)\n\n## Built by SimbaStack\n\nframedex is an open-source project from **[SimbaStack](https://simbastack.com/)**, an AI consulting and development studio. We help businesses figure out where AI actually fits in their operations, then build and ship it. Working systems in production, not strategy decks.\n\nIf you want something like this built for your company (agents, automation, AI that removes a real bottleneck), get in touch: **[nj@simbastack.com](mailto:nj@simbastack.com)**.\n\n## License\n\nMIT. See [LICENSE](LICENSE).\n","summary":"framedex builds a queryable, local-first knowledge base for personal video archives by creating plain-text `.description.md` sidecars next to each clip. For every video it extracts metadata and GPS place context, generates a multilingual, speaker-diarized transcript (with optional English translation), runs face detection/embeddings, and uses vision to produce a structured scene description with a keep/review/cull rating. It’s designed to help you turn scattered footage across drives and years into something you can browse and search with confidence, without modifying the original files. This is especially useful for people with large personal or small-production video libraries who want AI-assisted organization and lightweight, portable indexing tools (via the `fdx` CLI and Claude Code skill).","description":"Framedex — a queryable knowledge base for your video archive","stars":282,"language":"Python"},{"owner":"jherrodthomas","repo":"automotive-skills-suite","url":"https://github.com/jherrodthomas/automotive-skills-suite","readme":"<div align=\"center\">\n\n# Automotive Engineering Suite\n\n**152 installable Claude skills covering automotive safety, cybersecurity, quality, communication, diagnostics, AUTOSAR, calibration, MBSE, SysML, and V&V**\n\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](LICENSE)\n[![Skills](https://img.shields.io/badge/Skills-152-blue)](skills/)\n[![Standards](https://img.shields.io/badge/Standards-ISO%2026262%20%7C%2021434%20%7C%2021448%20%7C%20IATF%2016949%20%7C%20ASPICE%20%7C%20AUTOSAR%20%7C%20ISO%2014229%20%7C%20SysML-green)]()\n[![Chain](https://img.shields.io/badge/Chain-Builder%20%2B%20Reviewer%20pairs-orange)]()\n[![Made for](https://img.shields.io/badge/Made%20for-Claude-purple)](https://claude.com)\n\nEvery artifact-producing skill is paired with a confirmation reviewer. Reviewer outputs include a visual dashboard with KPI tiles, charts, and findings tables.\n\n[Quickstart](#quickstart) · [The Chain](#the-chain) · [Skills](#skills) · [Standards](#standards-covered) · [Why](#why)\n\n</div>\n\n---\n\n## What this is\n\nA curated set of 76 builder skills + 76 matching confirmation reviewer skills that automate the structured xlsx deliverables required across the automotive engineering lifecycle:\n\n- **ISO 26262** functional safety (concept → HW → SW → safety case)\n- **ISO/SAE 21434** cybersecurity (TARA → goals → concept → architecture → IR plan)\n- **ISO 21448 SOTIF** for ADAS/AV (analysis → triggering conditions → validation strategy)\n- **AIAG-VDA quality** (APQP → DFMEA → PFMEA → Control Plan → PPAP)\n- **Automotive SPICE** (assessment → gap analysis → improvement → evidence)\n- **Communication protocols** (DBC / LDF / ARXML / FlexRay / Automotive Ethernet / K-Matrix / bus load / gateway routing)\n- **Diagnostics** (UDS / DTC catalog / CDD / ODX / DEM)\n- **AUTOSAR** (Classic SWC, Composition, BSW, RTE; Adaptive applications)\n- **Calibration** (A2L / DCM / cross-supplier exchange)\n- **MBSE** (ARCADIA model architecture, requirements allocation, system context)\n- **SysML** (block diagram, requirement diagram, activity diagram, state machine)\n- **V&V** (verification plan, validation plan, test case catalog, traceability matrix, V&V execution report)\n- **Chain-integrated program management** (risk register, gate review, WP roll-up, change impact, lessons learned)\n- **Continuous improvement** (8D, 5-Why, fishbone, MSA Gauge R&R, SPC)\n\nEach skill is an installable `.skill` file. The chain is the moat — every downstream skill consumes the upstream skill's xlsx output as a stable file-format contract.\n\n## Quickstart\n\n1. Download the skill you need from `skills/` (or the full bundle from Releases)\n2. Click \"Save skill\" in Cowork / Claude Desktop to install\n3. Trigger by phrasing — every skill declares its triggering description in its frontmatter\n\n```bash\n# Example: install the HARA builder, then ask Claude\n\"Build a HARA for a new ECU project — Electronic Stability Control\"\n```\n\n## The chain\n\n```\nItem Definition → Safety Plan → DIA\n        ↓\n      HARA → FSC → TSC\n        ↓                ↓\n   HW Lane         SW Lane\n   ↓ ↓ ↓ ↓         ↓ ↓ ↓ ↓\nHW-SR  Arch  HSI  FMEDA   SW-SR  Arch  FMEA  HSI\n        ↓                ↓\n            Safety Case (capstone)\n\nParallel chains:\nTARA → CS Goals → CS Concept → CS Architecture → IR Plan + Secure Coding   (ISO/SAE 21434)\nSOTIF Analysis → Triggering Conditions → Validation Strategy                  (ISO 21448)\nAPQP Plan → DFMEA → PFMEA → Control Plan → PPAP Package                       (IATF 16949)\nASPICE Assessment → Gap Analysis → Improvement Plan → Process Evidence        (ASPICE PAM)\n```\n\nEvery box above has a builder skill AND a matching reviewer skill.\n\n## Skills\n\n### Foundation (3 builder/reviewer pairs)\n| Skill | Standard |\n|-------|----------|\n| `item-definition-builder` + reviewer | ISO 26262-3 §5 |\n| `safety-plan-builder` + reviewer | ISO 26262-2 §6 |\n| `dia-builder` + reviewer | ISO 26262-8 §5 |\n\n### ISO 26262 Concept Phase (3 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `hara-builder` + reviewer | Hazard Analysis with 14 malfunction guide words and Cartesian (function × malfunction × environment) |\n| `fsc-builder` + reviewer | FTA per safety goal with visual fault tree rendering, FSR derivation, ASIL decomposition |\n| `tsc-builder` + reviewer | HW-TSR/SW-TSR with safety mechanisms, HSI scaffold, system FMEA, DFA, draw.io architecture diagram |\n\n### ISO 26262 HW Lane (4 pairs, Part 5)\n| Skill | What it produces |\n|-------|------------------|\n| `hw-safety-reqs-builder` + reviewer | HW Safety Requirements derived from HW-TSRs |\n| `hw-architecture-builder` + reviewer | Refined HW architecture (PCB / IC / package) with safety mechanism allocation |\n| `hsi-builder` + reviewer | Contract-grade HW-SW Interface with C header generation |\n| `fmeda-builder` + reviewer | Formula-driven SPFM/LFM/PMHF with auto-verification against per-ASIL targets |\n\n### ISO 26262 SW Lane (4 pairs, Part 6)\n| Skill | What it produces |\n|-------|------------------|\n| `sw-arch-builder` + reviewer | SW architecture with RTOS, scheduling, MPU partitioning, MISRA targets |\n| `sw-sr-builder` + reviewer | SW Safety Requirements with verification methods per ASIL |\n| `sw-fmea-builder` + reviewer | Software FMEA with qualitative residual risk per ASIL threshold |\n| `sw-hsis-builder` + reviewer | SW-side HSI with handler functions and C header |\n\n### ISO 26262 Capstone\n| Skill | What it produces |\n|-------|------------------|\n| `safety-case-builder` + reviewer | GSN-style argument pulling evidence from all upstream artifacts |\n\n### ISO/SAE 21434 Cybersecurity (6 pairs, UN R155 mandated)\n| Skill | What it produces |\n|-------|------------------|\n| `tara-builder` + reviewer | Threat Analysis with STRIDE coverage and Risk Value lookup |\n| `cs-goals-builder` + reviewer | Cybersecurity Goals with CAL assignment |\n| `cs-concept-builder` + reviewer | CSR derivation per cybersecurity property |\n| `cs-architecture-builder` + reviewer | Cryptographic inventory, key management, secure boot chain |\n| `incident-response-plan-builder` + reviewer | PSIRT plan with UN R155 / ENISA / NHTSA notification deadlines |\n| `secure-coding-guidelines-builder` + reviewer | CERT C + MISRA Amendment 1 + AUTOSAR C++14 secure subset |\n\n### ISO 21448 SOTIF (3 pairs, ADAS / AV)\n| Skill | What it produces |\n|-------|------------------|\n| `sotif-analysis-builder` + reviewer | ODD, performance limitations, scenario quadrant classification |\n| `triggering-conditions-builder` + reviewer | Environmental / sensor / road / road-user / system / driver triggering conditions |\n| `sotif-validation-strategy-builder` + reviewer | Real-world / simulation / proving ground / field monitoring campaign |\n\n### AIAG-VDA Quality (5 pairs, IATF 16949)\n| Skill | What it produces |\n|-------|------------------|\n| `apqp-plan-builder` + reviewer | 5-phase product quality plan with gate reviews |\n| `dfmea-builder` + reviewer | Design FMEA per AIAG-VDA 2019 (Action Priority replaces RPN) |\n| `pfmea-builder` + reviewer | Process FMEA per AIAG-VDA 2019 |\n| `control-plan-builder` + reviewer | Production Control Plan with SPC / 100% / mistake-proofing / audit |\n| `ppap-package-builder` + reviewer | 18-element PPAP submission with PSW |\n\n### Automotive SPICE (4 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `aspice-assessment-builder` + reviewer | Per-process Capability Level scoring per PAM 3.1 |\n| `aspice-gap-analysis-builder` + reviewer | Gaps to target CL with severity classification |\n| `aspice-improvement-plan-builder` + reviewer | Improvement roadmap with KPIs |\n| `aspice-process-evidence-builder` + reviewer | Per-process evidence package |\n\n### Continuous Improvement (5 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `8d-problem-solving-builder` + reviewer | 8D method (D1-D8) for warranty / customer complaint |\n| `5-why-builder` + reviewer | 5-Why root cause analysis |\n| `fishbone-builder` + reviewer | Ishikawa (6Ms) cause-and-effect with auto-Mermaid diagram |\n| `msa-gage-rr-builder` + reviewer | AIAG MSA 4th edition with Anova-based Gauge R&R |\n| `spc-chart-builder` + reviewer | SPC with Cpk capability and Western Electric / Nelson rules |\n\n### Communication protocols (8 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `dbc-builder` + reviewer | Vector DBC (CAN database) with messages, signals, ECUs, multiplexed groups |\n| `ldf-builder` + reviewer | LIN Description File per ISO 17987 / LIN 2.2A |\n| `arxml-system-builder` + reviewer | AUTOSAR system extract (ECUs, system mappings, comm stack, port interfaces) |\n| `communication-matrix-builder` + reviewer | K-Matrix across CAN / CAN FD / LIN / FlexRay / Automotive Ethernet |\n| `bus-load-analysis-builder` + reviewer | Bandwidth utilization with worst-case and fault-injection scenarios |\n| `gateway-routing-builder` + reviewer | Cross-bus signal / PDU / frame routing with latency and security rules |\n| `flexray-config-builder` + reviewer | FlexRay cluster config per ISO 17458 (static + dynamic segments) |\n| `automotive-ethernet-builder` + reviewer | 100BASE-T1 / 1000BASE-T1 with SOME/IP, AVB, TSN, VLAN |\n\n### Diagnostics (5 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `uds-services-builder` + reviewer | UDS service catalog per ISO 14229-1 with DIDs, RIDs, security access |\n| `dtc-catalog-builder` + reviewer | DTC catalog per ISO 14229 / SAE J2012 with snapshots, extended data |\n| `cdd-builder` + reviewer | Vector CANdela diagnostic database authoring |\n| `odx-builder` + reviewer | ODX per ISO 22901-1 with base / derived variants and PDU library |\n| `dem-config-builder` + reviewer | AUTOSAR DEM config with debounce, healing, NvM, OBD freeze frame |\n\n### AUTOSAR (5 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `autosar-swc-builder` + reviewer | AUTOSAR Classic SWC with ports, runnables, events, exclusive areas |\n| `autosar-composition-builder` + reviewer | Composition SWC with assembly + delegation connectors |\n| `autosar-bsw-config-builder` + reviewer | BSW config: MCAL, ECU Abstraction, Service Layer, Complex Drivers |\n| `autosar-rte-mapping-builder` + reviewer | RTE mapping: signal-to-port, runnable-to-task, exclusive area binding |\n| `autosar-adaptive-app-builder` + reviewer | AUTOSAR Adaptive app + service + machine manifests, ara::com / ara::exec |\n\n### Calibration (3 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `a2l-builder` + reviewer | A2L per ASAM MCD-2 MC v1.7 (characteristics, measurements, conversions) |\n| `dcm-builder` + reviewer | ETAS DCM dataset for cross-tool calibration value exchange |\n| `calibration-data-exchange-builder` + reviewer | OEM ↔ Tier-1 calibration ownership and exchange agreement |\n\n### MBSE (3 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `mbse-model-architecture-builder` + reviewer | ARCADIA-style operational / system / logical / physical layers |\n| `mbse-requirements-allocation-builder` + reviewer | Requirements decomposition with satisfy / derive / verify relationships |\n| `mbse-system-context-builder` + reviewer | System boundary, actors, use cases, stakeholder needs |\n\n### SysML (4 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `sysml-block-diagram-builder` + reviewer | BDD / IBD with blocks, parts, ports, connectors, item flows |\n| `sysml-requirement-diagram-builder` + reviewer | Requirement blocks with derive / satisfy / verify / refine relationships |\n| `sysml-activity-diagram-builder` + reviewer | Activities, control / object flows, decision / fork / join, swim-lanes |\n| `sysml-state-machine-builder` + reviewer | States, transitions with guards / effects, regions, history pseudo-states |\n\n### V&V (5 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `verification-plan-builder` + reviewer | Verification Plan per ISO 26262-8 §9 / IEEE 1012 |\n| `validation-plan-builder` + reviewer | Item Validation Plan per ISO 26262-4 §9 |\n| `test-case-catalog-builder` + reviewer | Test cases with preconditions, inputs, expected outputs, traceability |\n| `traceability-matrix-builder` + reviewer | Bidirectional RTM with coverage analysis and orphan identification |\n| `vv-execution-report-builder` + reviewer | V&V campaign report with defects, coverage, residual risk acceptance |\n\n### Chain-integrated program management (5 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `safety-program-risk-register-builder` + reviewer | Programmatic risks affecting safety case delivery |\n| `safety-gate-review-builder` + reviewer | ISO 26262 phase-gate reviews with Go / Conditional / No-Go |\n| `wp-status-rollup-builder` + reviewer | Work product completion roll-up across the safety lifecycle |\n| `change-impact-analysis-builder` + reviewer | Change impact across HARA / FSC / TSC / HW-SW reqs / tests |\n| `lessons-learned-builder` + reviewer | Lessons learned register per ISO 26262-2 §5 / IATF 16949 |\n\n## Standards covered\n\nISO 26262:2018 · ISO/SAE 21434:2021 · ISO 21448:2022 · IATF 16949:2016 · AIAG APQP 2nd edition · AIAG-VDA FMEA Handbook 2019 · AIAG PPAP 4th edition · AIAG MSA 4th edition · AIAG SPC 2nd edition · AIAG Control Plan · ASPICE PAM 3.1 / 4.0 · UN R155 · UN R156 · CERT C Secure Coding · MISRA C:2012 + Amendment 1 · AUTOSAR C++14 · AUTOSAR Classic R22-11 · AUTOSAR Adaptive R22-11 · ISO 14229-1 (UDS) · SAE J2012 (DTCs) · ISO 22901-1 (ODX) · ISO 11898 (CAN) · ISO 17987 (LIN) · ISO 17458 (FlexRay) · IEEE 100BASE-T1 / 1000BASE-T1 · ASAM MCD-2 MC (A2L) · OMG SysML 1.6 / 2.0 · INCOSE Systems Engineering Handbook · IEEE 1012 (V&V)\n\n## Why\n\nEvery automotive program ships an avalanche of structured deliverables. Most teams maintain them in xlsx, painstakingly hand-edited, with low audit-trail consistency and high re-keying overhead between phases. This suite turns each phase into a builder + reviewer pair where:\n\n- The **builder** produces the structured xlsx output from a JSON input plus the upstream artifact\n- The **reviewer** runs a confirmation-measures checklist on the builder's output and produces a visual dashboard with KPIs, charts, and findings\n\nThe chain compounds because phases hand off via stable xlsx contracts. A change upstream (HARA) automatically propagates to every downstream skill that consumes it (FSC → TSC → FMEDA → Safety Case).\n\n## Common patterns across the suite\n\n- All builder outputs use a consistent NAVY/Calibri styling palette with ASIL/CAL color coding\n- All reviewer outputs include visual dashboards (KPI tiles, pie chart, compliance bar, stacked rating breakdown by section, findings table)\n- Many reviewers auto-verify quantitative thresholds:\n  - **FMEDA**: SPFM / LFM / PMHF vs ASIL target\n  - **PPAP**: Cpk vs threshold (1.33 standard, 1.67 special characteristics)\n  - **SW FMEA**: residual risk vs ASIL threshold\n  - **MSA**: Gauge R&R % vs AIAG threshold\n  - **SPC**: Cpk vs target\n- Reviewers never modify source artifacts — gaps land in Recommended Actions\n- Every builder is paired with a reviewer for confirmation-measures compliance\n\n## Repo structure\n\n```\nautomotive-skills-suite/\n├── skills/                      # 152 .skill bundles, install individually\n├── README.md\n└── LICENSE\n```\n\n## Installation\n\nEach `.skill` file in `skills/` is independently installable. Skills declare triggering descriptions in their frontmatter, so the agent picks them up based on user phrasing (e.g., \"build me a HARA\" triggers `hara-builder`).\n\n## License\n\nMIT — see LICENSE file.\n\n---\n\n<div align=\"center\">\n\nBuilt with Claude. Designed for automotive safety, cybersecurity, and quality engineers shipping real programs.\n\n</div>\n","summary":"jherrodthomas/automotive-skills-suite is a curated bundle of installable Claude skills that automate automotive engineering deliverables across the full lifecycle, from functional safety and cybersecurity to quality, diagnostics, AUTOSAR, calibration, MBSE/SysML, and V&V. It provides paired “builder” and “confirmation reviewer” skills where every artifact-producing step is followed by reviewer output that includes a KPI-style dashboard with charts and findings, and later skills consume earlier outputs via a consistent xlsx file-format contract. The project also encodes common standards-driven process chains for ISO 26262, ISO/SAE 21434, ISO 21448 (SOTIF), AIAG-VDA quality, and Automotive SPICE to help teams produce structured documentation and maintain traceability. This is best suited for automotive safety, security, systems, and process engineers, as well as program managers and toolchain owners who need repeatable, standards-aligned documentation workflows for new projects or audits.","description":"100+ installable Claude skills covering Engineering areas such as, ISO 26262 functional safety, ISO/SAE 21434 cybersecurity, ISO 21448 SOTIF, AIAG-VDA quality (APQP/PPAP/FMEA), Automotive SPICE, and continuous improvement tools — every builder paired with a confirmation reviewer.","stars":1709,"language":null},{"owner":"google-deepmind","repo":"science-skills","url":"https://github.com/google-deepmind/science-skills","readme":"# Science Skills\n\n[![Install via skills.sh](https://img.shields.io/badge/skills.sh-install-green)](https://skills.sh/google-deepmind/science-skills)\n\nA collection of agent skills for scientific research tasks, spanning genomics,\nstructural biology, cheminformatics, literature search, and more.\n\nEach skill provides structured instructions, scripts, and resources that extend\nan AI agent's capabilities for specialized scientific tasks.\n\n## Skill Structure\n\nEach skill directory contains:\n\n-   **SKILL.md** — Main instruction file with YAML frontmatter and detailed\n    markdown instructions\n-   **scripts/** — Helper scripts and utilities\n-   **references/** — Additional documentation and references (optional)\n\n## Getting started with GDM Science Skills\n\nInstall the Science Skills bundle via\n[npx](https://docs.npmjs.com/cli/commands/npx) using:\n\n```bash\nnpx skills add google-deepmind/science-skills/\n```\n\n## Using science skills with [Google Antigravity](https://antigravity.google/)\n\nIf you're a new Google Antigravity user:\n\n-   Launch the application after downloading Google Antigravity and check the\n    box for Science at the 'Build with Google' step - this will install the\n    curated collection of our Science Skills.\n\nIf you're an existing Google Antigravity user:\n\n-   Update to the latest version then open Settings -> Customizations -> Build\n    with Google Plugins (click on 'Customize' at the bottom of the page) ->\n    Download the `Science` plugin\n\n### Prerequisites\n\nWe use the `uv` package manager to handle dependencies. The first time you\ntrigger a Science Skill, the agent will ask for approval and install `uv`, and\nthen proceed to respond to your scientific query / task. We recommend restarting\nAntigravity after this first time installation.\n\nSome skills, such as AlphaGenome and OpenAlex, require an API key to function.\nOthers, such as ClinVar, benefit from an API key to unlock higher rate limits\nbut are still functional without one. The agent should prompt you to obtain the\nAPI key and guide you through writing in the correct location. However, if you\nwould rather do this yourself, you can run a command like this in your terminal:\n`echo \"ALPHAGENOME_API_KEY=your_actual_api_key\" >> ~/.env`\n\n## Links\n\nYou can find examples of Science Skills use cases, including a demo, at\n[antigravity.google/use-cases/science](https://antigravity.google/use-cases/science).\n\nWe have also published a\n[technical report](https://storage.googleapis.com/deepmind-media/papers/google_deepmind_science_skills_for_antigravity_towards_efficient_and_reliable_scientific_workflows.pdf)\non the Science Skills.\n\n## Licensing & Disclaimer\n\nCopyright 2026 Google LLC\n\nAll software is licensed under the Apache License, Version 2.0 (Apache 2.0); you\nmay not use this file except in compliance with the Apache 2.0 license. You may\nobtain a copy of the Apache 2.0 license at:\nhttps://www.apache.org/licenses/LICENSE-2.0\n\nAs set out in the attached file\n‘[Skill Licences and Terms of Use](SKILL_LICENSES.md)’ certain third party data\nsources referenced within individual Skill files have their own applicable\nlicenses and/or terms of use. See the\n‘[Skill Licences and Terms of Use](SKILL_LICENSES.md)’ file for more\ninformation. You are responsible for ensuring that your use of individual Skill\nfiles complies with any such applicable licenses/ terms of use.\n\nAll other materials are licensed under the Creative Commons Attribution 4.0\nInternational License (CC-BY). You may obtain a copy of the CC-BY license at:\nhttps://creativecommons.org/licenses/by/4.0/legalcode\n\nUnless required by applicable law or agreed to in writing, all software and\nmaterials distributed here under the Apache 2.0 or CC-BY licenses are\ndistributed on an \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\neither express or implied. See the licenses for the specific language governing\npermissions and limitations under those licenses.\n\nThis is not an official Google product.\n","summary":"google-deepmind/science-skills is a collection of reusable “agent skills” designed to help AI systems carry out scientific research tasks more effectively. It provides structured skill packages—each with an instruction file (SKILL.md), supporting scripts, and optional references—that cover domains such as genomics, structural biology, cheminformatics, and literature search. Many skills include automation for external tools and data sources, and some require API keys (or optional keys for higher rate limits). The project is especially useful for developers and researchers building or using Google Antigravity who want reliable, domain-specific workflows rather than starting from scratch.","description":"GDM Science Skills to speed up agentic scientific workflows with better grounding and higher token efficiency. Integrate insights from AlphaGenome, AFDB, UniProt and 30+ other databases and tools.","stars":527,"language":"Python"},{"owner":"Kappaemme-git","repo":"codex-complexity-optimizer","url":"https://github.com/Kappaemme-git/codex-complexity-optimizer","readme":"# Codex Complexity Optimizer\n\nCodex skill for analyzing a codebase, finding
