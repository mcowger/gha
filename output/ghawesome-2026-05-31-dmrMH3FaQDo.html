<script id="project-data" type="application/json">[{"owner":"thananon","repo":"9arm-skills","url":"https://github.com/thananon/9arm-skills","readme":"# 9arm-skills\n\nAgent skills loaded by Claude Code.\n\n## Layout\n\nSkills live under `skills/`, grouped into buckets:\n\n- `engineering/` — daily code work\n- `productivity/` — daily non-code workflow tools\n- `misc/` — kept around but rarely used\n- `personal/` — tied to my own setup, not promoted\n- `in-progress/` — drafts not yet ready to ship\n- `deprecated/` — no longer used\n\nEach skill is its own directory containing a `SKILL.md` (with YAML frontmatter — `name` and `description`) and any bundled scripts or reference files.\n\n## Install\n\n### With `npx skills` (Recommended - works for every agent)\n\n```bash\nnpx skills add thananon/9arm-skills\n```\n\n### Alternative - Bash script\n\nFor my own dev loop — symlink every shippable skill into `~/.claude/skills/`:\n\n```bash\n./scripts/link-skills.sh\n```\n\nList every `SKILL.md` in the repo:\n\n```bash\n./scripts/list-skills.sh\n```\n\n## Reference\n\n### Engineering\n\n- **[debug-mantra](./skills/engineering/debug-mantra/SKILL.md)** — Four-mantra debugging discipline: reproduce → trace the fail path → falsify the hypothesis → cross-reference every breadcrumb. Recites verbatim at session start, then applies in order before any fix.\n- **[post-mortem](./skills/engineering/post-mortem/SKILL.md)** — Write the canonical engineering record of a fixed bug — root cause, mechanism, fix, validation, how it slipped through. Engineer-audience; refuses to draft without a reliable repro, known cause, and validated fix.\n- **[scrutinize](./skills/engineering/scrutinize/SKILL.md)** — Outsider-perspective end-to-end review of a plan, PR, or code change. Questions intent (is there a simpler way?), traces the actual code path, and verifies the change does what it claims. Output is concise, actionable, with rationale.\n\n### Productivity\n\n- **[management-talk](./skills/productivity/management-talk/SKILL.md)** — Rewrite engineer-to-engineer content for engineering-org leadership and shape it for the channel it's going to (JIRA, Slack, async standup, email, meeting talking-points).\n\n### Misc\n\n_(none yet)_\n","summary":"thananon/9arm-skills is a collection of reusable “agent skills” for Claude Code, organized as small, self-contained modules under a `skills/` directory. It ships with structured skill definitions (`SKILL.md` with YAML frontmatter) and supports different skill management workflows, including installing via `npx skills add thananon/9arm-skills` or linking local skills for a personal dev loop. The project focuses on practical engineering and communication capabilities, such as a disciplined debugging routine, enforced post-mortem writing with validated fixes, and an outsider-style review that traces real code paths. Engineers and teams using Claude Code for coding, PR review, incident follow-ups, and org communication will benefit from quickly loading consistent, opinionated workflows.","description":null,"stars":2552,"language":"Shell"},{"owner":"WUBING2023","repo":"PaperSpine","url":"https://github.com/WUBING2023/PaperSpine","readme":"# PaperSpine\n\n[English](README.en.md) | [中文](README.md)\n\n\n[**PaperSpine 使用讲解视频（Bilibili）**](https://www.bilibili.com/video/BV1rjVa6ZEYu)\n\n\n> PaperSpine 是一个面向 Codex、Claude Code 和 OpenClaw 的、以 motivation 为主线的论文与报告写作 skill suite。\n\n它适合目标格式很重要的写作任务：期刊论文、会议论文、课程或技术报告、综述、竞赛论文。它要求 agent 在写作前先学习目标场景和优秀样例，再记录每一个写作单元为什么这样规划或修改。\n\n## 仓库结构\n\n```text\nPaperSpine/\n  dist/\n    codex/\n      skills/                   # Codex 扁平 skill suite\n      paper-spine/              # 旧版 Codex 自包含兼容包\n    claude/\n      skills/                   # Claude Code 扁平 skill suite\n        paper-spine/\n        paper-spine-ui/\n        paper-spine-intake/\n        paper-spine-research/\n        paper-spine-citation/\n        paper-spine-rewrite/\n        paper-spine-build/\n        paper-spine-latex/\n        paper-spine-audit/\n        paper-spine-translate/\n        paper-spine-humanize/\n        paper-spine-update/\n      commands/                 # Claude Code slash-command 辅助入口\n        paperspine.md\n        paper-spine.md\n        paperspine-legacy.md\n    openclaw/\n      skills/                   # OpenClaw 扁平 skill suite\n  src/\n    scripts/                    # 共享的确定性辅助脚本\n    references/                 # 共享工作流参考文档\n    agents/                     # 共享 agent 元数据源\n  .claude-plugin/               # Claude Code 插件元数据\n  install.ps1                   # Windows 安装脚本\n  install.sh                    # macOS / Linux 安装脚本\n  README.md\n  README.en.md\n```\n\n`dist/` 是真正用于安装的内容。`src/` 保留共享脚本和参考文档，便于开发与维护。\n\n## 快速安装\n\nWindows PowerShell:\n\n```powershell\ngit clone https://github.com/WUBING2023/PaperSpine.git\ncd PaperSpine\n.\\install.ps1 -Target all\n```\n\n也可以只安装某一端：\n\n```powershell\n.\\install.ps1 -Target codex\n.\\install.ps1 -Target claude\n.\\install.ps1 -Target openclaw\n.\\install.ps1 -Target all -CleanLegacy\n```\n\n`-CleanLegacy` 会清理常见的旧 PaperSpine 目录，例如嵌套的 `PaperSpine`、`PaperSpineV2` 和旧的 `paper-spine-*` 副本，避免重复发现或找不到 skill。\n\n安装到 Codex 后：**Restart Codex**。然后用 `$paper-spine` 启动全流程，或单独调用 `$paper-spine-research`、`$paper-spine-citation`、`$paper-spine-latex` 等分支 skill。\n\n安装到 Claude Code 后：重启或 reload Claude Code，然后使用 `/paperspine`。\n\n安装到 OpenClaw 后：重启或 reload OpenClaw，然后用 `paper-spine` 启动全流程，或调用任意 `paper-spine-*` 分支 skill。\n\n安装脚本会把当前版本记录到 `~/.paperspine/install_state.json`，并保留 `~/.paperspine/config.json`，包括 UI 语言等全局配置。\n\n## 手动安装\n\nCodex 现在推荐使用扁平 suite，这样每个分支都可以被单独调用：\n\n```text\ndist/codex/skills/*\n```\n\n复制到：\n\n```text\n~/.codex/skills/\n```\n\n最终 Codex 布局应该是：\n\n```text\n~/.codex/skills/paper-spine/SKILL.md\n~/.codex/skills/paper-spine-research/SKILL.md\n~/.codex/skills/paper-spine-citation/SKILL.md\n~/.codex/skills/paper-spine-latex/SKILL.md\n~/.codex/skills/paper-spine-update/SKILL.md\n```\n\n`dist/codex/paper-spine` 仍保留为旧版自包含兼容包，但推荐的新安装方式是 `dist/codex/skills/*`。\n\nClaude Code 需要扁平 skill 文件夹和可选 slash commands：\n\n```text\ndist/claude/skills/*\ndist/claude/commands/*.md\n```\n\n复制到：\n\n```text\n~/.claude/skills/\n~/.claude/commands/\n```\n\n最终 Claude Code 布局应该包含：\n\n```text\n~/.claude/skills/paper-spine/SKILL.md\n~/.claude/skills/paper-spine-ui/SKILL.md\n~/.claude/skills/paper-spine-intake/SKILL.md\n~/.claude/skills/paper-spine-research/SKILL.md\n~/.claude/skills/paper-spine-citation/SKILL.md\n~/.claude/skills/paper-spine-update/SKILL.md\n~/.claude/commands/paperspine.md\n```\n\nOpenClaw 需要包含 `SKILL.md` 的 skill 文件夹：\n\n```text\ndist/openclaw/skills/*\n```\n\n复制到：\n\n```text\n~/.openclaw/skills/\n```\n\n最终 OpenClaw 布局应该包含：\n\n```text\n~/.openclaw/skills/paper-spine/SKILL.md\n~/.openclaw/skills/paper-spine-research/SKILL.md\n~/.openclaw/skills/paper-spine-citation/SKILL.md\n~/.openclaw/skills/paper-spine-update/SKILL.md\n```\n\n## Claude Code 插件安装\n\nClaude Code 也可以使用 `.claude-plugin` 中的插件元数据：\n\n```text\n/plugin marketplace add https://github.com/WUBING2023/PaperSpine\n/plugin install paper-spine\n/reload-plugins\n```\n\n插件 manifest 指向 `dist/claude/skills` 下的扁平 suite，而不是 Codex 的单 skill 目录。\n\n## Codex、Claude Code 与 OpenClaw 的差异\n\n| 宿主 | 安装单元 | 常用入口 | 原因 |\n| --- | --- | --- | --- |\n| Codex | `dist/codex/skills/*` | `$paper-spine` 或 `$paper-spine-*` | Codex 可以发现扁平 skill 文件夹，因此全流程和子 skill 都能调用。 |\n| Claude Code | `dist/claude/skills/*` 加 `dist/claude/commands/*` | `/paperspine` | Claude Code 按扁平文件夹发现 skills，并支持 slash-command 辅助入口。 |\n| OpenClaw | `dist/openclaw/skills/*` | `paper-spine` 或 `paper-spine-*` | OpenClaw skill 也是包含 `SKILL.md` 的目录，因此使用同一套扁平 suite。 |\n\n不要把整个仓库直接复制进 `skills` 文件夹。这是重复或缺失 skill 的主要原因。\n\n## 主工作流\n\nPaperSpine 有两条平级主流程：\n\n1. **Rewrite Existing**：改进已有论文或报告，但不把任务降级成简单润色。\n2. **Build From Materials**：从素材文件夹构筑论文或报告，素材可以包括说明文档、图片、PDF、数据摘要、部分初稿和实验描述。\n\n支持四类目标场景：\n\n- `journal`：期刊论文\n- `conference`：会议论文\n- `report/review`：课程报告、技术报告或综述\n- `competition`：竞赛论文或竞赛报告\n\n研究深度：\n\n- `flash`：3 篇目标场景样例、3 篇近期/高质量同领域论文和官方要求。\n- `pro`：6 篇目标场景样例、6 篇近期/高质量同领域论文和官方要求。\n\n输出语言：\n\n- `English`\n- `Chinese`\n\n选择英文输出时，PaperSpine 还可以生成 `translation_package`，把中间产物和最终 Markdown 产物翻译为中文。\n\n## 主控与分支 Skill\n\nPaperSpine 由一个主控 skill 加多个分支 skill 组成。主控 `paper-spine` 不直接修补句子，而是逐阶段路由：\n\n1. `paper-spine-ui`：打开外部终端配置 UI。\n2. `paper-spine-intake`：校验 `paper_spine_config.json`。\n3. `paper-spine-research`：学习目标场景、本地/指定参考资料和优秀样例。\n4. `paper-spine-citation`：构建逐句 claim 级别的引用支持库。\n5. `paper-spine-rewrite` 或 `paper-spine-build`：改写已有论文，或从素材构筑论文。\n6. `paper-spine-latex`：生成并检查 LaTeX、可用时生成 PDF，并处理可选 Word 输出。\n7. `paper-spine-audit`：检查产物完整性、写作思路深度、引用库质量、翻译覆盖率和文件健康度。\n8. `paper-spine-translate`：产出完整的 `translation_zh/` 翻译包，含逐行翻译。\n9. `paper-spine-update`：检查 GitHub `main` 上的最新版，并在保留全局配置的前提下更新本地安装。\n\n`rewrite_existing` 和 `build_from_materials` 共用研究、引用、写作思路矩阵、LaTeX、翻译和审计逻辑。\n\n用户可以通过 `paper-spine` 运行全流程，也可以只调用某一个分支：\n\n- `paper-spine-ui`：配置一次运行。\n- `paper-spine-intake`：校验或修复配置。\n- `paper-spine-research`：调研目标要求和优秀样例结构。\n- `paper-spine-citation`：只构建引用支持库。\n- `paper-spine-rewrite`：基于上游产物改写已有论文。\n- `paper-spine-build`：基于上游产物从素材构筑论文。\n- `paper-spine-latex`：组装/检查 LaTeX、PDF 和可选 Word。\n- `paper-spine-translate`：产出 translation_zh/ 翻译包。\n- `paper-spine-audit`：审计产物、翻译覆盖和写作思路深度。\n- `paper-spine-update`：检查或更新本地 PaperSpine 安装。\n\n## 更新 PaperSpine\n\n第一次安装之后，如果想检查新版本，可以单独调用更新分支 skill：\n\n```text\n$paper-spine-update\n```\n\n更新 skill 会运行：\n\n```powershell\npython scripts/paperspine_update.py --yes\n```\n\n它会把本地 `~/.paperspine/install_state.json` 中记录的版本和 GitHub `main` 分支的 `dist/paperspine_version.json` 进行比较。如果已经是最新版，会直接提示无需更新。如果发现新版本，会下载 GitHub 压缩包，校验 PaperSpine 目录结构，然后同步更新 Codex、Claude Code 和 OpenClaw 的 skill 文件夹，并保留 `~/.paperspine/config.json`。\n\n如果只想检查而不修改本地安装，可以运行：\n\n```powershell\npython scripts/paperspine_update.py --check-only\n```\n\n## 本地参考文献读取\n\n参考材料获取不再只依赖网络。配置字段 `reference_mode` 控制 PaperSpine 如何开始文献和样例读取：\n\n- `local_first`：默认模式。先索引当前工作文件夹中的参考材料，再按需进行网络补充。\n- `specified_paths`：只索引 `reference_paths` 中指定的文件夹或文件，再按任务需要补充。\n- `web`：用户没有本地参考材料时使用网络收集。\n\n本地参考路径会写入：\n\n```text\npaper_rewriting_output/reference_materials/source_index.md\n```\n\n辅助脚本：\n\n```powershell\npython src/scripts/reference_inventory.py . --output-dir paper_rewriting_output --mode local_first\n```\n\nPaperSpine 可以读取用户提供的 PDF、下载论文、BibTeX/RIS、模板、笔记、学校或竞赛文档。它不能绕过付费墙或私有数据库权限。\n\n## 引用支持库\n\n`paper-spine-citation` 会生成：\n\n```text\npaper_rewriting_output/citation_support_bank.md\n```\n\n它和优秀论文学习是两件事。样例论文用于学习结构和写法；引用支持库用于为 Introduction、Related Work、Discussion、局限性、应用背景等位置提供可选择的候选引用。\n\n默认行为：\n\n- `citation_target_count`: `20`\n- 候选池：`citation_target_count * 3`，默认是 `60`\n- 近期论文目标：约 `80%` 候选应来自近三年；在 2026 年，简单阈值是 2023 年及以后\n- 每一行候选都必须包含参考文献/BibTeX 风格信息、年份、来源，以及一两句可以支撑正文论述的句子\n\n检查引用库：\n\n```powershell\npython src/scripts/citation_bank_check.py paper_rewriting_output/citation_support_bank.md --target-count 20 --markdown\n```\n\n## 配置 UI\n\nClaude Code 推荐使用：\n\n```text\n/paperspine\n```\n\n当宿主终端允许时，这个命令会自动启动 PaperSpine intake UI。兜底方式是 Python wizard：\n\n```powershell\npython src/scripts/intake_wizard.py\n```\n\n配置完成后会生成：\n\n```text\npaper_rewriting_output/paper_spine_config.json\npaper_rewriting_output/paper_spine_config.md\n```\n\n## 关键产物\n\n一次完整运行不应该只有最终论文，而应该留下完整的可审计写作轨迹：\n\n```text\npaper_rewriting_output/\n  paper_spine_config.json\n  paper_spine_config.md\n  reference_materials/\n    source_index.md\n  research_dossier.md\n  exemplar_learning_dossier.md\n  style_profile.md\n  sota_gap_map.md\n  motivation_options_after_research.md\n  citation_support_bank.md\n  confirmed_motivation.md\n  source_inventory.md\n  evidence_bank.md\n  figure_asset_map.md\n  claim_register.md\n  section_blueprints.md\n  writing_rationale_matrix.md\n  rewrite_matrix.md\n  logic_transfer_audit.md\n  latex_report.md\n  final_artifact_manifest.md\n  final_paper/\n    main.tex\n    references.bib\n    figures/\n    paper.docx              # 可选 Word 输出\n    paper.pdf               # 本机有 LaTeX 编译器时生成\n  translation_package/       # 英文输出时可选\n```\n\n最核心产物是 `writing_rationale_matrix.md`。它必须按照真实论文或报告结构逐单元解释：该单元承担什么功能，如何服务确认后的 motivation，学习了哪些 SOTA 或目标场景样例，使用了哪些证据，最终文本应通过什么检查。\n\n`citation_support_bank.md` 是第二个重要推理产物。它让每个候选引用在进入正文前，都先绑定到一个具体句子级 claim。\n\n## 检查命令\n\n检查产物完整性：\n\n```powershell\npython src/scripts/artifact_check.py paper_rewriting_output --markdown --write\n```\n\n复制到 skill 内部后，也可能以这种形式出现：\n\n```powershell\npython scripts/artifact_check.py paper_rewriting_output --markdown --write\n```\n\n检查 LaTeX：\n\n```powershell\npython src/scripts/latex_guard.py paper_rewriting_output/final_paper/main.tex --markdown\n```\n\n检查 Word：\n\n```powershell\npython src/scripts/word_guard.py paper_rewriting_output/final_paper/paper.docx --markdown\n```\n\n检查本地参考材料索引：\n\n```powershell\npython src/scripts/reference_inventory.py . --output-dir paper_rewriting_output --mode local_first\n```\n\n检查引用候选覆盖：\n\n```powershell\npython src/scripts/citation_bank_check.py paper_rewriting_output/citation_support_bank.md --target-count 20 --markdown\n```\n\n运行项目测试：\n\n```powershell\npython -m unittest discover -s tests\n```\n\n## PaperSpine 试图避免的问题\n\n- 只改句子，不改论文逻辑。\n- 把期刊、会议、课程报告、综述、竞赛论文都按同一种风格写。\n- 没确认 motivation 就开始写。\n- 添加没有证据支撑的 claim。\n- 只输出 `main.tex`，但不解释为什么这样设计文章。\n- 用户要求翻译包时，只翻译一部分中间产物。\n\n## License\n\nMIT License. See [LICENSE](LICENSE).\n\n---\n\n**独立下载:** [paper-spine-humanize](https://github.com/WUBING2023/PaperSpine/tree/main/dist/claude/skills/paper-spine-humanize) — 自包含降 AI 检测率技能，无需完整套件即可独立使用。\n","summary":"PaperSpine 是一套面向 Codex、Claude Code 和 OpenClaw 的“论文与报告写作 skill suite”，以 motivation 为主线，帮助 agent 完成期刊论文、会议论文、课程/技术报告、综述与竞赛论文等目标格式的写作任务。它强调写作前先学习目标场景与优秀样例，并在写作过程中持续记录各个单元为何这样规划或修改，从而提升生成质量与可控性。按宿主提供扁平 skill 组织与分支能力（如 research、citation、latex、rewrite、audit 等），用户可选择全流程或按子任务单独调用。适合需要稳定产出论文草稿、希望标准化写作流程并降低从零组织写作结构成本的研究者、学生与技术写作者。","description":"PaperSpine is a motivation-driven skill for learning from strong academic papers, building a paper’s central argument, and rewriting manuscripts through evidence-aware blueprints, revision matrices, and LaTeX-safe audits.","stars":1518,"language":"Python"},{"owner":"virgiliojr94","repo":"book-to-skill","url":"https://github.com/virgiliojr94/book-to-skill","readme":"<h1 align=\"center\">📚 book-to-skill</h1>\n\n<p align=\"center\">\n  <strong>Turn any technical book or document into a Claude Code skill — ready to study, reference, and use while you work.</strong>\n</p>\n\n<p align=\"center\">\n  <img src=\"https://img.shields.io/badge/Claude_Code-Skill-blueviolet?style=for-the-badge\" alt=\"Claude Code Skill\">\n  <img src=\"https://img.shields.io/badge/PDF%20%E2%80%A2%20EPUB%20%E2%80%A2%20DOCX%20%E2%80%A2%20MD%20%E2%80%A2%20HTML%20%E2%80%A2%20RTF%20%E2%80%A2%20MOBI-supported-green?style=for-the-badge\" alt=\"Formats supported\">\n  <img src=\"https://img.shields.io/badge/effort-high-orange?style=for-the-badge\" alt=\"Effort: high\">\n  <img src=\"https://img.shields.io/badge/License-MIT-blue?style=for-the-badge\" alt=\"MIT License\">\n</p>\n\n<p align=\"center\">\n  <a href=\"#-why\">Why</a> ·\n  <a href=\"#-what-it-generates\">What it generates</a> ·\n  <a href=\"#-usage\">Usage</a> ·\n  <a href=\"#-requirements\">Requirements</a> ·\n  <a href=\"#-how-it-works\">How it works</a> ·\n  <a href=\"#-faq\">FAQ</a> ·\n  <a href=\"#-install\">Install</a>\n</p>\n\n---\n\n## 🤔 Why\n\nYou buy a great technical book. You read it once. Three months later you can't remember chapter 7 existed.\n\nThe usual workarounds don't help:\n- 📄 \"Let me just search the PDF\" → you get a list of pages, not answers\n- 🧠 \"I'll ask Claude about this book\" → it either hallucinates or says it doesn't have the content\n- 📝 \"I'll take notes as I read\" → you end up with a 200-line doc you never open again\n\n**book-to-skill solves this by turning the book into a structured skill Claude loads on demand.**\n\nOnce installed, you just type `/your-book-slug replication` and Claude reads the right chapter and answers from the actual content. No hallucination. No digging through PDFs. The book becomes part of your workflow.\n\n---\n\n## 📦 What it generates\n\nRunning `/book-to-skill your-book.pdf` (or `.epub`) creates a full skill at `~/.claude/skills/<slug>/`:\n\n| File | Purpose | Size |\n|------|---------|------|\n| `SKILL.md` | Core mental models + chapter index | ~4,000 tokens |\n| `chapters/ch01-*.md` … | One file per chapter, loaded on-demand | ~1,000 tokens each |\n| `glossary.md` | Every key term, alphabetically sorted with chapter refs | ~1,500 tokens |\n| `patterns.md` | All techniques, algorithms, and design patterns | ~2,000 tokens |\n| `cheatsheet.md` | Decision tables and quick-reference rules | ~1,000 tokens |\n\n**Chapter files are loaded on-demand** — they don't count against the skill budget until you ask about that topic.\n\n---\n\n## 🚀 Usage\n\n```\n/book-to-skill <path-to-document> [skill-name-slug]\n```\n\nSupported document formats: PDF, EPUB, DOCX, TXT, Markdown, reStructuredText, AsciiDoc, HTML, RTF, MOBI/AZW/AZW3.\n\n**Examples:**\n\n```bash\n# PDF — derive skill name from filename\n/book-to-skill ~/Downloads/designing-data-intensive-applications.pdf\n\n# EPUB — specify a custom slug\n/book-to-skill ~/books/clean-code.epub clean-code\n\n# Full path with explicit name\n/book-to-skill /tmp/ddd-evans.pdf domain-driven-design\n```\n\nAfter the skill is created, use it like any other Claude Code skill:\n\n```bash\n/designing-data-intensive-apps                  # load core mental models\n/designing-data-intensive-apps replication      # find and explain a topic\n/designing-data-intensive-apps ch05             # dive into chapter 5\n/designing-data-intensive-apps \"what chapters do you have?\"\n```\n\n---\n\n## 🔧 Requirements\n\nThe extractor tries tools in order per format and uses the first available. If nothing is installed, it tells you which command to run. Plain text, Markdown, reStructuredText and AsciiDoc need no extra deps.\n\n**PDF — choose by book type:**\n\n| Book type | Tool | Install | Speed |\n|-----------|------|---------|-------|\n| Text-heavy (prose, few tables) | `pdftotext` (poppler) | `sudo apt install poppler-utils` | ⚡ instant |\n| Text-heavy fallback | `PyPDF2` | `pip3 install PyPDF2` | ⚡ instant |\n| Text-heavy fallback | `pdfminer.six` | `pip3 install pdfminer.six` | ⚡ instant |\n| **Technical (code, tables, formulas)** | **`docling`** | `pip3 install docling` | ~1.5s/page |\n\n> Before extraction begins, the skill asks you whether the book is **technical** or **text-heavy** and picks the right tool automatically. Docling preserves markdown tables and code blocks; pdftotext is faster for prose-only books.\n\n**EPUB:**\n\n| Tool | Install | Quality |\n|------|---------|---------|\n| `ebooklib` + `beautifulsoup4` | `pip3 install ebooklib beautifulsoup4` | ⭐⭐⭐ Best |\n| stdlib `zipfile` | built-in — no install needed | ⭐⭐ Always available |\n\n**Other formats:**\n\n| Format | Tool | Install |\n|--------|------|---------|\n| DOCX | `python-docx` (fallback: stdlib ZIP/XML) | `pip3 install python-docx` |\n| HTML | `beautifulsoup4` (fallback: stdlib `html.parser`) | `pip3 install beautifulsoup4` |\n| RTF | `striprtf` (fallback: regex) | `pip3 install striprtf` |\n| MOBI / AZW / AZW3 | Calibre `ebook-convert` (external app, not pip) | https://calibre-ebook.com/download |\n| TXT / Markdown / reStructuredText / AsciiDoc | built-in | — |\n\n---\n\n## ⚙️ How it works\n\n```\nPDF or EPUB\n     │\n     ▼\nStep 1.5 — \"Technical or text-heavy book?\"\n     │\n     ├── technical → Docling  (tables + code blocks as markdown, ~1.5s/page)\n     └── text      → pdftotext → PyPDF2 → pdfminer  (instant)\n     │\n     ▼\nscripts/extract.py --mode <technical|text>\n  EPUB → ebooklib → stdlib zipfile\n     │\n     ├── /tmp/book_skill_work/full_text.txt\n     └── /tmp/book_skill_work/metadata.json\n               │\n               ▼\n          Claude analyzes structure\n          (title, author, chapters, ToC)\n               │\n               ▼\n          Generates per-chapter summaries  (800–1,200 tokens each)\n          technical → includes Code Examples + Reference Tables sections\n          Generates glossary, patterns, cheatsheet\n          Generates master SKILL.md with core mental models\n               │\n               ▼\n          ~/.claude/skills/<slug>/  ✅ written\n          /tmp/book_skill_work/     🗑️  cleaned up\n```\n\n**Extraction benchmark** (103-page technical book, CPU only):\n\n| Method | Time | Tokens | Tables | Code blocks |\n|--------|------|--------|--------|-------------|\n| pdftotext | 0.1s | 27K | 0 | 0 |\n| Docling | 164s | 27K (+1.2%) | 48 | 36 |\n\n<details>\n<summary>Design principles (click to expand)</summary>\n\n1. **Density over completeness** — a 1,000-token summary beats a 10,000-token excerpt\n2. **Practitioner voice** — \"Use X when Y\", not \"The book explains X\"\n3. **Front-loaded SKILL.md** — compaction keeps the first ~5,000 tokens; the most important content comes first\n4. **On-demand chapters** — the topic index tells Claude which file to read; chapters load only when needed\n5. **Never raw text** — always synthesize, summarize, extract signal from the source\n\n</details>\n\n---\n\n## ❓ FAQ\n\n**\"Can't I just dump the PDF/EPUB into my Claude project context?\"**\n\nYou can — but every conversation will burn that token budget upfront. A 400-page book is ~200K tokens. With a skill, only the chapters relevant to your question load. The rest stays on disk until you need it.\n\nMore importantly: raw text injection is retrieval. A skill is reasoning. When you load a chapter file, Claude isn't searching for keyword matches — it's working with pre-extracted named frameworks, principles, and mental models structured for application, not for reading.\n\n---\n\n**\"Isn't this just RAG?\"**\n\nRAG works at query time: chunk the book → embed everything → find similar vectors → inject into prompt. It's optimized for \"find me the part that talks about X.\"\n\nbook-to-skill works at compile time: one deep analysis run extracts the author's actual frameworks, names them, describes when to use each, captures the anti-patterns. The output is structure the author spent years building — not a similarity search over their sentences.\n\nRAG answers: *\"here are chunks close to your query.\"*  \nA skill answers: *\"here are the 12 frameworks this author built, ready to reason with.\"*\n\nFor searching across 50+ books, RAG wins. For going deep on one book and using its frameworks while you work, a skill wins.\n\n---\n\n**\"Popular books are already in Claude's training data. Why bother?\"**\n\nFor widely-known books (Clean Code, DDIA, Pragmatic Programmer), Claude has general knowledge — but it's compressed, averaged across the entire internet's discussion of the book, and may hallucinate specific quotes or chapter locations.\n\nbook-to-skill works from your actual copy. Every framework name, every anti-pattern list, every chapter number is grounded in the text you provided. No training data drift, no hallucinated chapter titles.\n\nIt also shines for books Claude doesn't know at all: niche technical references, internal company documentation, recent publications, translated works.\n\n---\n\n**\"NotebookLM handles multiple books better.\"**\n\nAbsolutely true — if your workflow is \"I have 80 books and I want to search across all of them,\" NotebookLM is the right tool.\n\nbook-to-skill is built for a different job: you want to go deep on one book and have its frameworks embedded in your coding or writing workflow, not in a separate browser tab. It's less \"library search\" and more \"the author is sitting next to you while you work.\"\n\n---\n\n## 📥 Install\n\nCopy this into your Claude Code session:\n\n```\nInstall book-to-skill: https://raw.githubusercontent.com/virgiliojr94/book-to-skill/master/SKILL.md\n```\n\nOr manually:\n\n```bash\nmkdir -p ~/.claude/skills/book-to-skill/scripts\n\ncurl -o ~/.claude/skills/book-to-skill/SKILL.md \\\n  https://raw.githubusercontent.com/virgiliojr94/book-to-skill/master/SKILL.md\n\ncurl -o ~/.claude/skills/book-to-skill/scripts/extract.py \\\n  https://raw.githubusercontent.com/virgiliojr94/book-to-skill/master/scripts/extract.py\n```\n\nThen in any Claude Code session:\n\n```bash\n/book-to-skill ~/path/to/your-book.pdf\n# or\n/book-to-skill ~/path/to/your-book.epub\n```\n\n---\n\n## 📁 Repository structure\n\n```\nbook-to-skill/\n├── SKILL.md              # Skill definition + step-by-step instructions\n├── scripts/\n│   └── extract.py        # PDF + EPUB extraction (pdftotext / PyPDF2 / pdfminer / ebooklib / zipfile)\n└── README.md             # This file\n```\n\n---\n\n## License\n\nMIT\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=virgiliojr94%2Fbook-to-skill&type=date&legend=top-left\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=virgiliojr94/book-to-skill&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=virgiliojr94/book-to-skill&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=virgiliojr94/book-to-skill&type=date&legend=top-left\" />\n </picture>\n</a>\n","summary":"book-to-skill turns technical books and documents (PDF, EPUB, DOCX, TXT, and more) into reusable Claude Code “skills” that Claude can load on demand. It automatically extracts the content and generates a structured skill directory including a chapter index, a glossary, patterns, and cheatsheets, with individual chapter files loaded only when you ask for them to avoid budget waste and reduce hallucinations. This is especially useful for engineers, students, and technical teams who want reliable, fast in-context access to specific chapters and concepts from their own reference materials during day-to-day work.","description":"Turn any technical book PDF into a Claude Code skill — ready to study, reference, and use while you work.","stars":2678,"language":"Python"},{"owner":"yetone","repo":"native-feel-skill","url":"https://github.com/yetone/native-feel-skill","readme":"<div align=\"center\">\n\n# native-feel.skill\n\n> *\"Cross-platform development AND near-native performance — refuse the trade-off.\"*\n\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](LICENSE)\n[![Agent Skill](https://img.shields.io/badge/Agent-Skill-7c3aed)](https://github.com/yetone/native-feel-skill)\n\n<br>\n\n**An Agent Skill for designing cross-platform desktop apps that feel native** — distilled from Raycast's 2.0 technical deep-dive and grounded in reverse-engineering of the shipping `Raycast Beta.app` binary.\n\nTwo goals usually pull against each other: convenient cross-platform development, and near-native performance. This skill captures the structural choices — eight architectural tenets, a four-layer architecture, a WebKit/WebView2 survival guide, a 75-item ship audit — that let an app have both.\n\n<br>\n\n**Install** — pick one:\n\n</div>\n\n**A. With [`skills`](https://github.com/vercel-labs/skills) (any compatible agent):**\n\n```bash\nnpx skills add yetone/native-feel-skill -g\n```\n\nThe `-g` flag installs globally (user-level) so every project picks it up.\n\n**B. Or paste this prompt to your AI agent:**\n\n```\nInstall the native-feel skill for me:\n\n1. Clone https://github.com/yetone/native-feel-skill into your\n   user-level skills directory as `native-feel-cross-platform-desktop/`\n   (whatever path your agent reads skills from on this machine — e.g.\n   `~/.claude/skills/` for Claude Code).\n2. Verify that SKILL.md plus the references/ and checklists/ subdirs\n   are present.\n3. Confirm the install path when done.\n```\n\n<div align=\"center\">\n\n[Use cases](#use-cases) · [What this is](#what-this-is) · [Philosophy](#philosophy) · [Layout](#layout) · [Sources](#sources)\n\n</div>\n\n---\n\n## Use cases\n\nOnce installed, the skill activates automatically whenever the conversation touches cross-platform desktop architecture, WebView quirks, or making a UI feel native. Two common ways to use it:\n\n### Case 1 — Refactor an existing app to feel more native\n\nYou have an Electron / Tauri / web-wrapped app, and a designer (or your own eye) tells you it feels web-y. You want to know where to start and how far you can take it without a full rewrite.\n\n```\nYou    ❯ My Electron app feels web-y on macOS — the designer says it\n         doesn't pass for a real Mac app. Where do I start?\n\nAgent  ❯ Quickest path is the 75-item native-feel audit\n         (checklists/ship-readiness.md). Most Electron apps fail\n         the same 6–8 items:\n           - cursor:pointer on rows (item 21)\n           - web-style modal overlays instead of native sheets (19)\n           - hardcoded brand accent instead of system accent (33)\n           - page fade-transitions (40)\n           - opaque window background instead of platform material (31)\n           - WebKit context menu still firing (23)\n         Each is a 5-to-30-minute fix; together they move you most\n         of the way to \"passes the 30-second skeptical user test.\"\n\n         Bigger question first: how far do you need to go? If \"good\n         enough\" means passing that 30-second test, Electron + this\n         audit gets you 80% there without rewriting. If you want\n         \"indistinguishable from a Mac app\" — Liquid Glass materials,\n         native popovers, sub-200ms launch — Electron has a ceiling\n         you'll hit. Want me to run the decision tree first?\n```\n\n### Case 2 — Build a cross-platform native-feel app from scratch\n\nGreenfield project, must run on macOS + Windows, and the native feel is the *point* — a launcher, a productivity tool, an AI workspace your users live in all day.\n\n```\nYou    ❯ Starting a new desktop app — macOS + Windows, native feel\n         is the whole pitch. What architecture should I use?\n\nAgent  ❯ Before architecture, the decision tree\n         (checklists/decision-tree.md) rules this stack out for\n         several common shapes — quick check first:\n           - Cold-start budget?  (<100ms → build native instead)\n           - Memory floor?       (<150MB → build native instead)\n           - Extension ecosystem? (yes → need the Node layer)\n           - Runway?             (<3mo → start on Electron)\n\n         If you pass, the four-layer architecture is:\n\n           ┌──────────────────────────────────────────────────┐\n           │ Native shell      Swift/AppKit  +  C#/WPF        │\n           │       ↕   one IPC schema, codegen for all sides  │\n           │ System WebView    WKWebView    +  WebView2       │\n           │   running React + TypeScript, shared 1:1         │\n           │       ↕                                          │\n           │ Node backend      single long-lived process      │\n           │       ↕                                          │\n           │ Rust core         UniFFI-bridged, sharable       │\n           │                   with iOS and server            │\n           └──────────────────────────────────────────────────┘\n\n         The expensive-to-get-wrong decisions, in order:\n           1. The IPC contract (one schema, codegen). Get this wrong\n              and you rebuild it later under duress.\n           2. WebView survival flags (occlusion off, alpha-prewarm,\n              _doAfterNextPresentationUpdate, font prewarming).\n           3. Memory hygiene (lazy-load extensions, tear down\n              secondary windows aggressively).\n\n         Want to start with the seam — where to draw the cross-\n         platform line — or with the IPC contract, since getting\n         that schema wrong means rebuilding every bridge later?\n```\n\n### Other things the skill is good for\n\n- **\"Why is my WKWebView flickering when I hide and re-show it?\"** → walks you through `references/03-webview-survival.md` (most likely A.1 throttling or A.2 startup flicker).\n- **\"How should typed IPC work across Rust, Swift, and TypeScript?\"** → the UniFFI-based pattern in `references/04-ipc-contract.md`, with the exact `Coordinator`/`EventHandler` shape Raycast Beta ships.\n- **\"My app is at 450 MB resident, is that bad?\"** → the six common Activity-Monitor mistakes and what to actually measure, in `references/05-memory-truths.md`.\n- **\"Is my designer's spec ‘native enough’?\"** → the 70+ item conventions audit in `references/06-native-conventions.md`.\n\n---\n\n> *\"We're not a web app with some native hooks sprinkled on top. We're a native app that uses web for its UI.\"* — Raycast\n\n## What this is\n\nA reference for architects, tech leads, and engineers who must build a desktop app that:\n\n- runs on **macOS + Windows** (optionally Linux) from a single UI codebase,\n- launches in under 500 ms and stays under 500 MB resident,\n- is **indistinguishable from a native app** to its users (no `cursor: pointer` tell-tales, no white-flash on launch, no WebKit context menu, no smooth-scroll JS),\n- supports a **plugin/extension ecosystem** in TypeScript,\n- can share performance-critical code with iOS and a server backend.\n\nThis is the four-layer architecture: **native shell → system WebView (WKWebView/WebView2) → Node backend → Rust core**, wired together with a single typed IPC schema that generates clients for every runtime.\n\n## What this is not\n\n- Not for single-OS apps (just build native).\n- Not for Electron-style \"good enough\" apps (the polish budget here is 5–10× higher).\n- Not for apps with strict <150 MB or <100 ms cold-start budgets (the floor is real).\n- Not for games, document editors, or media players.\n\nRun [`checklists/decision-tree.md`](checklists/decision-tree.md) to find out if this architecture is even right for your project. It rules itself out for several common cases — saying so directly is more useful than over-fitting advice.\n\n## Layout\n\n```\nnative-feel-skill/\n├── SKILL.md                                # entry point for the agent\n├── references/\n│   ├── 01-philosophy.md                    # 8 tenets that drive every decision\n│   ├── 02-architecture.md                  # the four-layer architecture\n│   ├── 03-webview-survival.md              # WebKit/WebView2 quirks + fixes (the goldmine)\n│   ├── 04-ipc-contract.md                  # typed IPC across Rust/Swift/C#/TS\n│   ├── 05-memory-truths.md                 # why Activity Monitor lies\n│   ├── 06-native-conventions.md            # 70+ items the native-feel audit checks\n│   └── 07-evidence-raycast.md              # what a reverse-eng. of Raycast Beta shows\n└── checklists/\n    ├── decision-tree.md                    # should you use this architecture?\n    └── ship-readiness.md                   # 75-item launch audit\n```\n\n## Philosophy\n\nThe central tension this architecture resolves: **how can a desktop app deliver convenient cross-platform development AND near-native performance, when those goals usually pull against each other?** Eight tenets name the structural moves:\n\n1. **Place the seam at the rendering surface** — share above the WebView, diverge below it; this is the only altitude where both DX and native feel survive.\n2. **One schema, many languages** — pay the polyglot tax once at the declaration, never at the call site.\n3. **Adopt the platform; don't compete with it** — the OS draws blur, scrolling, materials, and dark mode better than you can.\n4. **Performance is a property of perception** — what the user feels, not what Activity Monitor reports.\n5. **The short iteration loop is the product** — 200 ms hot reload vs 30 s native rebuild is a 150× compounding advantage.\n6. **Cross boundaries intentionally** — IPC has a cost; design every crossing as async, batched, schema-typed.\n7. **Identity is muscle memory** — the hotkey, the rank order, the verbs are the app; everything else is implementation.\n8. **Separate baseline from margin** — the WebView+Node floor is rented; only your dirty pages are yours to optimize.\n\nRead [`references/01-philosophy.md`](references/01-philosophy.md) first. Everything else is consequence.\n\n## About Agent Skills\n\nAgent Skills are the emerging standard for packaging domain knowledge that any compatible agent (Claude Code, the Claude Agent SDK, or other Agent-Skill-aware runtimes) can discover and load. Once installed via the prompt at the top of this README, the skill activates automatically when the agent's conversation touches cross-platform desktop architecture, WebView quirks, or Raycast-style apps — the trigger conditions are declared in `SKILL.md`'s frontmatter.\n\n## Sources\n\n- Raycast's public technical post: [A Technical Deep Dive into the New Raycast](https://www.raycast.com/blog/a-technical-deep-dive-into-the-new-raycast)\n- Reverse engineering of `Raycast Beta.app` v0.60.0 (macOS 26+ build, Xcode 17, arm64) — see [`references/07-evidence-raycast.md`](references/07-evidence-raycast.md) for what was found and how.\n\n## License\n\nMIT — see [`LICENSE`](LICENSE).\n\n## Credits\n\nAuthored as an Agent Skill. The architecture this skill describes is Raycast's; the philosophy is the author's synthesis; the evidence is from the shipping app.\n","summary":"yetone/native-feel-skill is an AI “agent skill” that helps you design cross-platform desktop apps that feel genuinely native rather than web-wrapped or Electron-like. It’s distilled from Raycast 2.0’s technical deep-dive and from reverse-engineering the Raycast Beta macOS binary, and it provides structured architectural tenets, a layered system guidance, and detailed checklists for WebKit/WebView-related pitfalls. The skill is best for developers and teams building or refactoring Electron/Tauri/web-wrapped desktop products who need near-native performance and platform-correct UI/interaction details without a full rewrite.","description":"An Agent Skill for designing cross-platform desktop apps that feel native — distilled from Raycast's 2.0 deep-dive and reverse engineering of Raycast Beta.app. Eight architectural tenets, four-layer architecture, WebKit/WebView2 survival guide, 75-item ship audit.","stars":1427,"language":null},{"owner":"nostrband","repo":"ServiceGraph","url":"https://github.com/nostrband/ServiceGraph","readme":"<p align=\"center\">\n  <img src=\"assets/mark-128.png\" alt=\"ServiceGraph\" width=\"64\" height=\"64\" />\n</p>\n\n# ServiceGraph Agent Skills\n\n> **Datasets for founders** — where to launch, who to email, who to hire.\n\nAgent Skills for [**ServiceGraph**](https://servicegraph.co) — structured,\nmetrics-enriched business datasets your agent can filter, rank, and pull\ncontact data from. One filter DSL, one credit balance, many datasets:\n\n<p align=\"center\">\n  <img src=\"assets/servicegraph-datasets.png\" alt=\"ServiceGraph datasets — product directories, business directories, newsletters, agencies, with subreddits and influencers coming soon\" width=\"820\" />\n</p>\n\n| Dataset | Size | Enriched with |\n|---|---|---|\n| **Agencies** (US professional-services firms) | 110k+ | services · size · location · ratings |\n| **Business directories** | 3,500+ | industry · domain rating · traffic |\n| **Product directories** | 850+ | submission policy · domain rating · traffic |\n| **Newsletters** | 50k+ | subscribers · topics · post cadence |\n| _subreddits, influencers_ | _coming soon_ | |\n\n**The branded `servicegraph` skill works against every dataset** — say\n\"servicegraph\" and your agent discovers what datasets exist, learns each\none's schema and filters, searches free, and unlocks detail with credits.\n**The specific `find-*` skills cover the Agencies dataset today** — law,\nmarketing, design, consulting, accounting, IT services, AI/ML, web\ndevelopment, engineering, HR, PR, cybersecurity, and more, filterable by\nindustry, services, location, size, ratings, and third-party listings.\nMore per-use-case skills for the directory, newsletter, and other datasets\nland here as they ship — same install, same API key, same DSL.\n\nCompatible with **19+ AI agents** including Claude Code, Codex, Cursor, GitHub\nCopilot, Gemini, Cline, Goose, Windsurf, and any other harness that supports\nthe [Agent Skills](https://agentskills.io/) format.\n\n## Installation\n\n### Install a specific skill\n\n```bash\nnpx skills add nostrband/servicegraph --skill find-service-providers\n```\n\n### Install all skills\n\n```bash\nnpx skills add nostrband/servicegraph\n```\n\n**API key:** browsing, filtering, and brief cards are free, but every call\nneeds a key. Create one at\n[**servicegraph.co/profile/api-keys**](https://servicegraph.co/profile/api-keys)\n(2,000 free credits on signup, no card) and put it in your shell or\n`.env.local` as `SERVICEGRAPH_API_KEY=vk_…`. Skills prompt for it on first\nuse and never read the value into the model's context.\n\n## Available Skills\n\n### Any dataset\n\n<details open>\n<summary><strong>servicegraph</strong> — the branded entry point</summary>\n\nThe generic, dataset-agnostic way to drive ServiceGraph. Launch it by naming\nthe brand; it discovers what datasets exist and each one's schema and filters\nthrough the API, searches free brief rows, and unlocks contact + metric detail\nwith credits — no datasets or fields hardcoded, so it stays correct as new\ndata lands.\n\n**Use when:**\n- \"Use ServiceGraph to find …\"\n- \"What datasets does ServiceGraph have?\"\n- \"Search ServiceGraph for … / look this up in ServiceGraph\"\n- \"Pull contacts from ServiceGraph for these domains\"\n- The dataset you need has no specific skill below yet\n\n</details>\n\n### Agencies dataset\n\n<details open>\n<summary><strong>find-service-providers</strong> — the umbrella skill</summary>\n\nFind, shortlist, vet, or enrich US professional-services firms across all 22\nindustries in the catalog — law, marketing, consulting, accounting, IT\nservices, architecture, engineering, HR, PR, design, and more.\n\n**Use when:**\n- \"Find me three boutique IP law firms in California\"\n- \"Build a longlist of 50 mid-size US management consultancies\"\n- \"Here are 12 agency domains — pull contact info and confirm which are US-based\"\n- The user's intent doesn't fit a more specific skill below\n\n</details>\n\n<details>\n<summary><strong>find-marketing-agency</strong></summary>\n\nFind US marketing agencies — branding, content marketing, PPC/paid media,\nsocial, email, performance/demand-gen, video production, full-service digital.\nAuto-pins `industry:marketing_agency` so the agent doesn't have to.\n\n**Use when:**\n- \"Shortlist three B2B branding agencies in California\"\n- \"Find a PPC shop with ecommerce experience\"\n- \"We need a content marketing partner for a SaaS launch\"\n\n</details>\n\n<details>\n<summary><strong>find-seo-agency</strong></summary>\n\nFind US SEO agencies — technical, on-page/off-page, link-building,\ncontent-led, local, ecommerce, B2B SEO, audits. Auto-pins\n`industry:marketing_agency service_provided:seo`.\n\n**Use when:**\n- \"Find me an SEO agency in Texas\"\n- \"Shortlist three technical SEO consultancies for SaaS\"\n- Indirect phrasings: \"organic traffic is flat\", \"improve our Google rankings\"\n\n</details>\n\n<details>\n<summary><strong>find-design-agency</strong></summary>\n\nFind US design and creative agencies — graphic design, UX/UI, product\ndesign, brand identity, packaging, illustration, motion design, creative\ndirection. Auto-pins `industry:design_creative`. Defers to\n`find-marketing-agency` for marketing-led engagements where design is one\nof several services, and to `find-web-developer` when the deliverable is a\nbuilt website rather than design assets.\n\n**Use when:**\n- \"Find me a UX/UI design agency for our SaaS product\"\n- \"Shortlist three brand-identity studios in NY for our rebrand\"\n- \"Packaging design firm for a CPG launch\"\n\n</details>\n\n<details>\n<summary><strong>find-software-developer</strong></summary>\n\nFind US software development firms — custom software, web/mobile development,\nbackend/API, DevOps/cloud consulting, system integration, hosting. Auto-pins\n`industry:it_services`. Defers to `find-web-developer` for strictly\nwebsite/landing-page projects, and to `find-ai-consultancy` for AI/ML\nmodeling and data-engineering work.\n\n**Use when:**\n- \"Find me a software dev shop in Austin\"\n- \"Shortlist three custom-software firms with healthcare experience\"\n- \"We need a mobile app developer for our iOS launch\"\n\n</details>\n\n<details>\n<summary><strong>find-web-developer</strong></summary>\n\nFind US web development firms — building, refreshing, or rebuilding\nmarketing sites, landing pages, ecommerce, WordPress/Webflow/Shopify,\nheadless CMS, microsites, and web frontend work. Auto-pins\n`industry:it_services service_provided:web-development`. Defers to\n`find-software-developer` for backend/API/mobile work, and to\n`find-marketing-agency` when scope spans broader marketing.\n\n**Use when:**\n- \"Find a web developer for our marketing landing page\"\n- \"Shortlist three Webflow agencies in California\"\n- \"Rebuild our ecommerce site on Shopify with custom theme work\"\n\n</details>\n\n<details>\n<summary><strong>find-ai-consultancy</strong></summary>\n\nFind US AI/ML and data consulting firms — AI/ML development, MLOps,\ngenerative AI / LLM apps (RAG, chatbots, agents), computer vision, NLP,\nrecommendation systems, data engineering, BI/analytics. Auto-pins\n`industry:data_ai_consulting`. Defers to `find-software-developer` for\ngeneral app/backend work where AI is just a feature.\n\n**Use when:**\n- \"Find an AI/ML consulting firm to build our recommendation engine\"\n- \"Three RAG/LLM consultancies for an enterprise chatbot project\"\n- Indirect: \"we want to use AI to predict customer churn — who can help?\"\n\n</details>\n\n<details>\n<summary><strong>find-law-firm</strong></summary>\n\nFind US **B2B** law firms — corporate, IP/patent, M&A and securities,\nemployment, commercial litigation, regulatory/compliance, data privacy/\ncyber, real estate, tax. Auto-pins `industry:legal`. The catalog is\nB2B-only — consumer-personal matters (divorce, personal injury, criminal\ndefense, estate planning, family law, wills) are explicitly out of scope.\n\n**Use when:**\n- \"Find three boutique IP law firms in California for patent prosecution\"\n- \"Shortlist M&A counsel for a Series-B fundraise\"\n- Indirect: \"outside counsel for GDPR / SOC 2 oversight\"\n\n</details>\n\n<details>\n<summary><strong>find-cpa-firm</strong></summary>\n\nFind US accounting and tax firms (CPA firms) — financial-statement audit,\nSOC 1/2, corporate tax, bookkeeping for businesses, advisory/fractional\nCFO, M&A diligence, 409A valuations, R&D tax credits, IPO readiness,\nsales-and-use tax. Auto-pins `industry:accounting_tax`. B2B-only —\npersonal tax prep (1040, individual estate, retirement planning) is\nout of scope.\n\n**Use when:**\n- \"Find me a CPA firm for our Delaware C-corp Series A audit\"\n- \"Shortlist three audit firms with SaaS experience\"\n- Indirect: \"our books are a mess and we need someone to clean them up\n  before the audit\"\n\n</details>\n\n<details>\n<summary><strong>find-management-consultant</strong></summary>\n\nFind US management consultancies — strategy, operations, executive\ncoaching, leadership development, org-development/change management,\nPMO/program management, sales/revenue ops. Auto-pins\n`industry:management_consulting` and uses the `service_provided`\nsub-tags (`strategy-consulting`, `operations-consulting`, etc.).\n\n**Use when:**\n- \"Find me three top strategy consultancies in California for a Series-B SaaS\"\n- \"We need an executive coach for our new CEO\"\n- Indirect: \"change-management partners for a post-merger integration\"\n\n</details>\n\n<details>\n<summary><strong>find-engineering-firm</strong></summary>\n\nFind US **real-world** engineering firms — civil, structural, MEP,\nmechanical, electrical, geotechnical, transportation, environmental,\nmanufacturing. Auto-pins `industry:engineering_services`. **NOT for\nsoftware engineering** — defers software-dev / \"engineering team\" /\nSaaS-architecture asks to `find-software-developer`. Skips residential\nor consumer architecture asks.\n\n**Use when:**\n- \"Find civil engineering firms in Florida for transportation infrastructure\"\n- \"Shortlist three structural engineering firms with high-rise experience\"\n- Indirect: \"we're building a 10-story office and need a structural engineer\n  to stamp the drawings\"\n\n</details>\n\n<details>\n<summary><strong>find-recruiting-firm</strong></summary>\n\nFind US recruiting and staffing firms — executive search/retained search,\nRPO, tech/sales/healthcare recruiting, contingent/contract staffing, temp\nstaffing. Auto-pins `industry:hr_recruiting_staffing`. **Procures an\nexternal recruiting firm** — does NOT fire on recruiting-an-employee\nasks (\"hire a recruiter for our team\", \"where should I post the job\"),\ncandidate-side asks, or in-house recruiter hires.\n\n**Use when:**\n- \"Find me an executive search firm for a CFO search\"\n- \"We need RPO support for a 50-engineer hiring push\"\n- Indirect: \"we're scaling fast and need help hiring at scale\"\n\n</details>\n\n<details>\n<summary><strong>find-pr-agency</strong></summary>\n\nFind US public-relations and communications agencies — media relations,\ncrisis comms, investor relations (IR), product-launch PR, tech/startup\nPR, healthcare PR, B2B PR, public affairs, brand reputation, internal\ncommunications. Pins `service_provided:public-relations`. Defers to\n`find-marketing-agency` when scope spans broader marketing beyond\nPR/comms.\n\n**Use when:**\n- \"Find me a tech PR agency in NY for our Series-B announcement\"\n- \"Three IR firms for our upcoming IPO roadshow\"\n- Indirect: \"we need press — get us into TechCrunch, WSJ, the trade press\"\n\n</details>\n\n<details>\n<summary><strong>find-cybersecurity-firm</strong></summary>\n\nFind US cybersecurity firms — pen-testing/red team, security audits,\nvCISO, SOC 2 readiness, incident response, managed SOC, IAM, cloud\nsecurity, AppSec. Pins `service_provided:cybersecurity`. B2B-only\n— consumer-personal cybersecurity (\"my Gmail got hacked\", \"secure my\nhome wifi\") is out of scope.\n\n**Use when:**\n- \"Find me a pen-testing firm for our SOC 2 audit\"\n- \"We need an incident response retainer\"\n- Indirect: \"we got hit with ransomware last week — we need help fast\"\n\n</details>\n\n## Prefer MCP? Use the hosted server.\n\nIf your harness speaks the [Model Context Protocol](https://modelcontextprotocol.io/),\nskip the skill install and point it at the hosted MCP server:\n\n```\nhttps://mcp.servicegraph.co\n```\n\n- **Transport:** Streamable HTTP\n- **Auth:** OAuth 2.1 + PKCE with Dynamic Client Registration — your harness\n  opens a browser tab on first use; you sign in on `servicegraph.co` and are\n  bounced back. No client ID or secret to copy around, no API key to paste.\n\n### Claude Code\n\n```bash\nclaude mcp add --transport http servicegraph https://mcp.servicegraph.co\n```\n\n### Claude Desktop\n\n**Settings → Connectors → Add custom connector**, then paste:\n\n```\nhttps://mcp.servicegraph.co\n```\n\nThe OAuth handshake runs in your browser on first use.\n\n### Codex CLI\n\n`~/.codex/config.toml`:\n\n```toml\n[mcp_servers.servicegraph]\nurl = \"https://mcp.servicegraph.co\"\n```\n\n### Cursor and other JSON-config clients\n\n`.cursor/mcp.json` (or the equivalent for your harness):\n\n```json\n{\n  \"mcpServers\": {\n    \"servicegraph\": {\n      \"url\": \"https://mcp.servicegraph.co\"\n    }\n  }\n}\n```\n\n## Usage\n\nSkills are automatically available once installed. The agent will pick the\nright one when it detects a relevant task.\n\n**Examples:**\n\n```\nFind me three boutique IP law firms in California that handle patent\nprosecution for hardware startups.\n```\n\n```\nNeed a shortlist of mid-size SEO agencies in NY or NJ with a strong B2B\nSaaS portfolio.\n```\n\n```\nWe're hiring a CPA firm for a Delaware C-corp Series A audit.\nRecommend 5 options under 50 people.\n```\n\n```\nHere are 12 marketing agency domains I scraped — pull contact info and\nconfirm which are in the US.\n```\n\n## How it works — browse free, unlock with credits\n\nEvery dataset lives behind the same per-dataset URL shape and the same\nfilter DSL. For the agencies dataset the id is `pro_services`:\n\n```\nGET  /v1/datasets/pro_services/fields    →  field catalog + DSL grammar · free\nGET  /v1/datasets/pro_services/check     →  validate a filter · free\nGET  /v1/datasets/pro_services/search    →  brief firm cards · free\nGET  /v1/datasets/pro_services/{apex}    →  one row (brief; detail if unlocked) · free\nPOST /v1/datasets/pro_services/unlocks   →  full contact bundle · 10 credits/row\n```\n\nDiscovery, filtering, and brief cards are **free** — you only spend credits\nto unlock a row's full contact detail (URL, phone, email, social, address).\nAn unlock lasts **30 days** and re-fetching within that window is free.\n\n- **2,000 free credits on signup**, no card.\n- **10 credits per row** (~$0.10). Top-ups: $10 / 1,000 credits, $80 / 10,000\n  (20% off). **Credits never expire.**\n\n### Filter DSL\n\nOne query parameter, GitHub-search-style. AND binds tighter than OR;\n`-x` / `NOT x` for negation; `tag@evidence` for the `service_provided` field.\nAny bareword is a free-text keyword search across firm name, brand, title,\nmeta description, and legal name.\n\n```\nindustry:legal state:CA,NY -company_size_signal:solo\nindustry:management_consulting service_provided:strategy-consulting@high\ndental industry:marketing_agency\nrating>=4 review_count_total>=20 has:clutch\n(web3 OR blockchain) state:CA\n```\n\nThe field catalog (kinds, operators, allowed values) is discoverable at\nruntime via\n[`/v1/datasets/pro_services/fields`](https://api.servicegraph.co/v1/datasets/pro_services/fields).\n\n## Why structured beats search\n\n- **Filter, don't grep.** Industry, services, location, size, rating,\n  domain authority, traffic, third-party listings — all queryable as a single\n  filter string, not a wall of fuzzy web results.\n- **Metrics built in.** Every row carries the signals you'd otherwise scrape\n  by hand — agency ratings, directory DR/traffic, newsletter subscriber\n  counts — so an agent can rank, not just list.\n- **Cheaper than scraping.** Browse and filter for free; pay only for the\n  contact rows you actually want, ~$0.10 each, 30-day access, credits never\n  expire. Beats Google, ChatGPT guesses, and stale Notion/Twitter lists.\n\n## Skill structure\n\nEach skill follows the [Agent Skills Open Standard](https://agentskills.io/):\n\n- `SKILL.md` — required manifest with frontmatter (name, description, metadata)\n\nThe skills in this repo are single-file. No bundled scripts or references\nyet — the API is small enough that the agent does fine with prose +\ncopy-pasteable curl examples.\n\n## Links\n\n- [API console & docs](https://docs.servicegraph.co)\n- [OpenAPI 3.1 spec](https://api.servicegraph.co/openapi.json)\n- [Create an API key](https://servicegraph.co/profile/api-keys)\n- [llms.txt](https://servicegraph.co/llms.txt)\n- [Site](https://servicegraph.co)\n\n## Community\n\n- [Dev.to](https://dev.to/brugeman)\n- [X.com](https://x.com/briugemanai)\n\n## See also\n\n- [Product directories](https://servicegraph.co/product-directories)\n- [MCP directories](https://servicegraph.co/blog/best-mcp-directories-2026)\n\n## License\n\nMIT\n\n## Contact\n\n[artur@servicegraph.co](mailto:artur@servicegraph.co)\n","summary":"ServiceGraph is an Agent Skills–compatible project that gives AI agents access to structured, metrics-enriched business datasets for founder-focused research, like identifying where to launch, who to email, and who to hire. It provides a branded entry-point skill (`servicegraph`) that discovers available datasets, learns each dataset’s schema and filter DSL, and returns free brief results while using credits to unlock richer details and contact data. It also includes dataset-specific skills for the Agencies directory (e.g., marketing, law, consulting, IT, HR, cybersecurity, and more), enabling filtered search and ranking by criteria such as industry, services, location, size, and ratings. This is best for teams building or using AI agents to prospect, generate lead lists, and perform market research with up-to-date business directory and newsletter data.","description":"AI Agent skills to access structured datasets for startup founders","stars":140,"language":"Shell"},{"owner":"Russell-cell","repo":"PPT-Design-Prompt","url":"https://github.com/Russell-cell/PPT-Design-Prompt","readme":"# PPT-Design-Prompt\n\nConvert `DESIGN.md` brand references into presentation-image oriented\n`DESIGN.md` files.\n\n1\n\nThis repository is for **slide image systems**, not full slide decks, not HTML\npresentations, and not product UI implementation. The goal is to turn web-first\nbrand guidance into a format that image models and design agents can use when\ngenerating assets for PowerPoint, Keynote, PDF decks, or visual essays.\n\nThis project is adapted from the upstream `DESIGN.md` collection maintained at\n[VoltAgent/awesome-design-md](https://github.com/VoltAgent/awesome-design-md).\nIts purpose is to reinterpret those web and UI oriented references as\npresentation-image prompts and guidance.\n\n## Upstream source\n\nThe original source catalog for this project is:\n\n- [https://github.com/VoltAgent/awesome-design-md](https://github.com/VoltAgent/awesome-design-md)\n\nThis repository is a derivative conversion tool and prompt library. It is not\nthe original source catalog, and it should not be confused with the upstream\nproject.\n\n## What this repo is\n\n- a converter from source `DESIGN.md` files to `ppt-image/<brand>/DESIGN.md`\n- a small Python CLI that can be installed and re-run locally\n- a generic presentation-image `DESIGN.md` at the repo root\n- a minimal synthetic example for CI and contributor onboarding\n\n## What this repo is not\n\n- not a deck generator\n- not a PowerPoint exporter\n- not a screenshot scraper\n- not a promise that every brand source can be legally redistributed\n\n## Open-source boundary\n\nThis repository is structured so that **local downloaded sources stay local by\ndefault**.\n\n- `source/` is ignored by `.gitignore`\n- local source files are expected to originate from\n  [VoltAgent/awesome-design-md](https://github.com/VoltAgent/awesome-design-md)\n- the repository license applies to repo-authored code and docs\n- third-party brand names and source materials remain the property of their\n  owners\n- if you publish converted brand outputs, review the legal notes in\n  [ATTRIBUTION.md](./ATTRIBUTION.md)\n\nIf your local working copy already contains a populated `source/` directory,\ndouble-check it before making an initial public commit.\n\n## Repository layout\n\n```text\n.\n+-- DESIGN.md                      # generic presentation-image design guide\n+-- ATTRIBUTION.md                 # licensing and provenance boundary\n+-- catalog/brands.txt             # optional expected brand catalog\n+-- examples/minimal/              # synthetic example fixture\n+-- ppt-image/                     # generated outputs\n+-- scripts/                       # convenience wrapper for repo-local runs\n+-- src/awesome_design_md_ppt_images/\n|   +-- cli.py\n|   +-- converter.py\n+-- tests/\n```\n\n## Install\n\n```bash\npython -m pip install -e .\n```\n\n## Quick start\n\nIf you already have local source files under `source/<brand>/DESIGN.md`, run:\n\n```bash\ndesign-md-ppt convert\n```\n\nThis writes:\n\n- converted files to `./ppt-image`\n- a manifest to `./conversion_manifest.json`\n\nIf you want explicit paths:\n\n```bash\ndesign-md-ppt convert \\\n  --source-root ./source \\\n  --output-root ./ppt-image \\\n  --manifest ./conversion_manifest.json \\\n  --brands-file ./catalog/brands.txt\n```\n\n## Example run without third-party data\n\nThis repo ships with a synthetic example so contributors can test the toolchain\nwithout downloading live sources:\n\n```bash\ndesign-md-ppt convert \\\n  --source-root ./examples/minimal/source \\\n  --output-root ./examples/minimal/output \\\n  --manifest ./examples/minimal/manifest.json \\\n  --brands-file ./examples/minimal/brands.txt\n```\n\n## Legacy script\n\nFor people who prefer the old workflow, the repo still includes:\n\n```bash\npython ./scripts/generate_ppt_image_designs.py\n```\n\nThat wrapper runs the same converter with repo-root defaults.\n\n## Why the brand catalog exists\n\n`catalog/brands.txt` is optional.\n\n- if you provide it, the converter knows which brands are expected and can emit\n  placeholders for missing sources\n- if you omit it, the converter simply converts whatever exists under\n  `source/`\n\nThis makes the tool self-contained and removes the old dependency on a sibling\n`awesome-design-md_upstream` checkout.\n\n## Development\n\nRun tests:\n\n```bash\npython -m unittest discover -s tests -v\n```\n\nRun the example conversion:\n\n```bash\ndesign-md-ppt convert \\\n  --source-root ./examples/minimal/source \\\n  --output-root ./tmp-example-output \\\n  --manifest ./tmp-example-manifest.json \\\n  --brands-file ./examples/minimal/brands.txt\n```\n\n## Current repository state\n\nThis working tree currently contains generated outputs under `ppt-image/`. They\ncan be useful as a public catalog, but they may still be too close to upstream\nbrand materials for some maintainers' comfort level. If you want a stricter\nopen-source posture, keep the code and generic docs, then selectively review or\nremove brand-specific generated outputs before your first public push.\n","summary":"Russell-cell/PPT-Design-Prompt converts web/UI-oriented `DESIGN.md` brand guidance (typically from VoltAgent/awesome-design-md) into presentation-image–oriented `DESIGN.md` files intended for use by image models and design agents generating assets for PowerPoint, Keynote, PDFs, and visual essays. It provides a generic root design guide plus a Python CLI/converter that can be re-run locally to produce `ppt-image/<brand>/DESIGN.md` outputs and a conversion manifest. This project benefits designers, prompt engineers, and automation workflows that need consistent, presentation-focused visual direction without generating full slide decks or exporting actual PowerPoint files. It also includes guardrails around local source handling and attribution/licensing boundaries for third-party brand materials.","description":null,"stars":943,"language":"Python"},{"owner":"ItsssssJack","repo":"power-design","url":"https://github.com/ItsssssJack/power-design","readme":"<div align=\"center\">\n\n<img src=\"principles/images/cta-go-deeper.png\" alt=\"Power Design\" width=\"720\">\n\n# Power Design\n\n### A Claude skill for slides that don't look like AI made them.\n\n**Brand DNA × 20 codified design principles → beautiful HTML decks, on demand.**\n\n[**See the principles →**](https://power-design.vercel.app) ·\n[**Join the community →**](https://bit.ly/3PATPoL)\n\n</div>\n\n---\n\n## What it does\n\nPower Design is a Claude Code skill that combines two things every other AI deck generator misses:\n\n1. **Brand DNA** — extracted live from any URL via Firecrawl, or picked from **72+ pre-built brand systems** (Stripe, Apple, Linear, Spotify, Vercel, Notion, Tesla, Airbnb…)\n2. **20 codified design principles** — pulled from Tufte, Reynolds, Duarte, Williams, Refactoring UI, Müller-Brockmann, Mayer, WCAG 2.2\n\nThe result: every deck is both on-brand and objectively well-designed. No purple gradients. No six-bullet hero slides. No drop shadows on bars.\n\n---\n\n## The 20 rules, illustrated\n\nEvery slide passes the same 20 checks. **[Read the full field manual →](https://power-design.vercel.app)**\n\n<div align=\"center\">\n\n<img src=\"principles/images/rule-01-one-idea.png\"      width=\"180\"> <img src=\"principles/images/rule-02-glanceable.png\"    width=\"180\"> <img src=\"principles/images/rule-03-chunks.png\"        width=\"180\"> <img src=\"principles/images/rule-04-whitespace.png\"    width=\"180\">\n<img src=\"principles/images/rule-05-safe-zone.png\"     width=\"180\"> <img src=\"principles/images/rule-06-modular-scale.png\" width=\"180\"> <img src=\"principles/images/rule-07-type-sizes.png\"    width=\"180\"> <img src=\"principles/images/rule-08-body-size.png\"     width=\"180\">\n<img src=\"principles/images/rule-09-line-height.png\"   width=\"180\"> <img src=\"principles/images/rule-10-line-length.png\"   width=\"180\"> <img src=\"principles/images/rule-11-contrast.png\"      width=\"180\"> <img src=\"principles/images/rule-12-color-split.png\"   width=\"180\">\n<img src=\"principles/images/rule-13-one-accent.png\"    width=\"180\"> <img src=\"principles/images/rule-14-no-hue-only.png\"   width=\"180\"> <img src=\"principles/images/rule-15-grid.png\"          width=\"180\"> <img src=\"principles/images/rule-16-alignment.png\"     width=\"180\">\n<img src=\"principles/images/rule-17-proximity.png\"     width=\"180\"> <img src=\"principles/images/rule-18-data-ink.png\"      width=\"180\"> <img src=\"principles/images/rule-19-f-pattern.png\"     width=\"180\"> <img src=\"principles/images/rule-20-two-modes.png\"     width=\"180\">\n\n</div>\n\n| # | Rule | Source |\n|---:|---|---|\n|  1 | One idea per slide | Reynolds; Duarte |\n|  2 | Glanceable in ≤3 seconds | Duarte; NN/g |\n|  3 | ≤7±2 visual chunks; ideal 3–5 | Miller 1956; Cowan 2001 |\n|  4 | ≥40% whitespace ratio | Refactoring UI; Reynolds |\n|  5 | 5% edge safe-zone, all sides | Broadcast title-safe |\n|  6 | Type on a modular scale (1.25–1.618) | Tschichold; Bringhurst |\n|  7 | Maximum 4 type sizes per slide | Refactoring UI |\n|  8 | Body ≥24px, title ≥48px | Reynolds; Duarte |\n|  9 | Line-height 1.4–1.6 body, 1.05–1.2 display | Butterick; Bringhurst |\n| 10 | Line length ≤60 characters | Bringhurst |\n| 11 | WCAG contrast ≥4.5:1 body, aim 7:1 (AAA) | WCAG 2.2 |\n| 12 | 60-30-10 color split | Itten; Refactoring UI |\n| 13 | One accent per slide | Tufte |\n| 14 | Never encode meaning by hue alone | WCAG 1.4.1 |\n| 15 | 8pt grid for all spacing | Bryn Jackson; Material |\n| 16 | Align everything to one grid | Müller-Brockmann |\n| 17 | Proximity: related ≤16px, unrelated ≥48px | Gestalt; Williams |\n| 18 | Data-ink ratio ≥80% | Tufte 1983 |\n| 19 | F-pattern: headline + key visual top-left | NN/g eye-tracking |\n| 20 | Two valid modes — pick one and stay | Tufte vs Reynolds |\n\n---\n\n## Install\n\n```bash\ngit clone https://github.com/ItsssssJack/power-design ~/.claude/skills/power-design\n```\n\nThen in Claude Code:\n\n```\n> use power-design — make me a deck for stripe.com about our new product launch\n```\n\nThe skill will:\n1. Ask you for a brand (paste URL, pick from library, or skip for default)\n2. Extract brand DNA via Firecrawl (~30 seconds)\n3. Ask for content brief (headline + 3–5 points)\n4. Generate `slides.html` applying brand DNA × 20 rules\n5. Open in browser. Refine via natural conversation.\n\n---\n\n## Brand library — 72 pre-built systems\n\n| Tech / AI | Finance | Auto / Lifestyle | Media | Productivity |\n|---|---|---|---|---|\n| Anthropic / Claude · OpenAI · DeepSeek · Linear · Vercel · Stripe · Cursor · GitHub · Figma · Webflow · Framer · Mintlify · Notion · Raycast · Lovable · Resend · Sentry · Supabase · Superhuman · MongoDB · Sanity · Posthog · Replicate · Runway · Hashicorp · ElevenLabs · Cal · Clay · Composio · ClickHouse · Cohere · Mistral · Together · x.ai · Ollama · OpenCode · Expo · Pinterest · Glaido | Stripe · Mastercard · Coinbase · Binance · Kraken · Revolut · Wise · Shopify | Tesla · BMW · BMW M · Bugatti · Ferrari · Lamborghini · Renault · Nike · Airbnb · Apple · Starbucks · Grind · Vodafone | The Verge · Wired · Spotify · YouTube · Sony · PlayStation · IBM | Notion · Slack · Miro · Intercom · Zapier · Uber · NVIDIA · SpaceX · VoltAgent · Warp |\n\nEach entry is a single `brand-style.md` file: colors, type, voice, components, source URL. Add your own using `brands/_template.md`.\n\n---\n\n## How the skill works (under the hood)\n\n```\n   ┌─────────────────────────────────────────┐\n   │  1. Brand DNA       (URL → Firecrawl)   │\n   │     OR pick from    brands/<name>.md    │\n   ├─────────────────────────────────────────┤\n   │  2. Design rules    principles/...md     │\n   ├─────────────────────────────────────────┤\n   │  3. Compose         brand × rules → HTML │\n   └─────────────────────────────────────────┘\n                      ↓\n                  slides.html\n```\n\nThe skill's runbook lives in `SKILL.md`. The 20 design principles (with research citations and numeric thresholds) live in `principles/design-principles.md`.\n\n---\n\n## Credits\n\n- **Brand library** — forked and restructured from [VoltAgent/awesome-design-md](https://github.com/VoltAgent/awesome-design-md), with permission and credit.\n- **Design research** — Edward Tufte, Garr Reynolds, Nancy Duarte, Robin Williams (CRAP), Adam Wathan & Steve Schoger (Refactoring UI), Josef Müller-Brockmann, Matthew Butterick, Robert Bringhurst, Richard Mayer, Nielsen Norman Group, WCAG 2.2.\n- **Illustrations** — generated via Kie.ai nano-banana 2.\n\n---\n\n## License\n\nMIT — see [LICENSE](LICENSE).\n\n---\n\n<div align=\"center\">\n\n**Built by Jack Roberts** ·\n[**Vercel showcase**](https://power-design.vercel.app) ·\n[**Community**](https://bit.ly/3PATPoL)\n\n</div>\n","summary":"Power Design is a Claude Code skill that generates beautiful, on-brand HTML slide decks that don’t look like generic AI output. It does this by extracting “brand DNA” from a provided URL via Firecrawl or using one of 72+ built-in brand systems, then applying 20 codified design principles drawn from well-known typography, layout, accessibility, and presentation design sources. The result is consistent slide quality—glanceable structure, disciplined type and spacing, accessible contrast, and brand-appropriate styling. It’s best for product teams, marketers, and anyone using Claude Code who wants faster deck creation with strong design fundamentals and fewer “uncanny” AI design mistakes.","description":"A Claude skill for slides that don't look like AI made them. Brand DNA × 20 codified design principles.","stars":318,"language":null},{"owner":"realrossmanngroup","repo":"no_ai_slop_writing_rules","url":"https://github.com/realrossmanngroup/no_ai_slop_writing_rules","readme":"# no-ai-slop-writing-rules\n\n[![skills.sh](https://skills.sh/b/realrossmanngroup/no_ai_slop_writing_rules)](https://skills.sh/realrossmanngroup/no_ai_slop_writing_rules)\n\n> # 👋 Hi, you were probably sent here.\n>\n> ## If someone handed you a link to this repo, it is because you sent them AI-generated shit so obviously AI-generated that they stopped reading partway through and went looking for a polite way to say \"run it through a human first.\"\n>\n> Pasting raw Gemini or ChatGPT output with zero editing, or running a project with no anti-slop rules at all, is the 2026 equivalent of handing out a business card with an `@aol.com` email on it. The tool is fine. Shipping its first draft with your name on it is the part people notice.\n>\n> Nobody is mad that you used a model. Everybody can tell, because the model has tics and you left every one of them in.\n>\n> The dead giveaway is the \"It's not X. It's Y.\" construction, and its cousin \"It's not just X, it's Y with Z.\" *This isn't a price increase. It's a betrayal of trust.* *This isn't just a phone. It's a statement.* The model loves it because it sounds profound and commits to nothing. Real people do not talk like this. They say what the thing is.\n>\n> Then there is the dramatic noun-phrase heading. The model writes **\"The Pricing Trap\"** when the honest heading is \"how to avoid scam pricing.\" It writes **\"The Hidden Cost of Convenience\"** instead of \"subscriptions add up.\" A heading is supposed to tell you what is in the section, not tease it like a movie poster.\n>\n> And the rest of the kit: \"Let's dive in.\" \"Here's the thing.\" \"But here's the kicker.\" \"In a world where...\" A 🚀 emoji in front of a bullet. Every list built in threes because three sounds complete. The fake-punchy one-line paragraph.\n>\n> For drama.\n>\n> Read your own output before you send it. That is the whole ask.\n>\n> The rules below are what \"read it first\" looks like written down. Steal them.\n\n---\n\nA portable Agent Skills package for writing in Louis Rossmann's voice without AI slop. It is general-purpose: essays, scripts, posts, documentation, emails, anything made of sentences. It is not tied to any wiki, CMS, or publishing system.\n\nCompatible with Claude Code, OpenAI Codex, Cursor, Windsurf, and agents that follow the [Agent Skills specification](https://agentskills.io/specification.md).\n\n## What it does\n\nIt gives an agent two things. First, a hard rule set that strips the patterns marking machine-generated text: emdashes, intensifiers, filler phrases, hollow statements, fabricated facts, AI transition words, dramatic headings, and the rest. Second, a data-driven voice profile built from corpus analysis of 513,683 words of Rossmann's writing: testable-number density, high sentence-length variance, claim-then-proof paragraph structure, contractions, the ampersand habit, and contempt shown through precision rather than adjectives.\n\n## How to use it\n\nInstall the skills into an agent project, drop this folder next to a project, or point Claude Code at it. When you ask an agent to write or edit prose, it reads the two skills, writes against the rules, then self-checks the output against the banned-words reference before returning it.\n\n## Installation\n\n### CLI install\n\n```bash\nnpx skills add realrossmanngroup/no_ai_slop_writing_rules\n```\n\nSkills install to `.agents/skills/` in your project.\n\n### Claude Code plugin\n\n```bash\n/plugin marketplace add realrossmanngroup/no_ai_slop_writing_rules\n/plugin install no-ai-slop-writing-rules\n```\n\n### Clone and copy\n\n```bash\ngit clone https://github.com/realrossmanngroup/no_ai_slop_writing_rules.git\ncp -r no_ai_slop_writing_rules/skills/* your-project/.agents/skills/\n```\n\nYou can also read the files yourself as a style guide. Every file here obeys its own rules, so they double as worked examples.\n\n## What each file does\n\n| File | Contents |\n|---|---|\n| `CLAUDE.md` | Claude Code entrypoint. States the purpose, summarizes the voice, sets the operating rules, and lists all 24 anti-slop rules. |\n| `AGENTS.md` | Cross-agent repository instructions and publishing format notes. |\n| `.claude-plugin/marketplace.json` | Claude Code plugin marketplace manifest. |\n| `skills/no-ai-slop/SKILL.md` | The anti-slop rules as actionable guidance, with WRONG/RIGHT worked examples and a self-check pass. |\n| `skills/no-ai-slop/references/ai-writing-detection.md` | The full banned-words reference: verbs, adjectives, transitions, phrases, intensifiers, heading anti-patterns, academic tells, hedging markers, and structural and statistical patterns. |\n| `skills/rossmann-voice/SKILL.md` | The voice profile: sentence-level rules, paragraph structure, drift prevention, the Claim-Mechanism-Reality argument pattern, a vocabulary guide, a DO/DON'T table, and the statistical fingerprint. |\n| `.claude/skills/` | Claude Code project-local mirror of the published skills. |\n\n## Scope\n\nThe examples in the voice skill are repair-themed because that is what the source corpus covers. The traits themselves are structural, so the voice applies to any subject. Write about anything in it; the rules hold.\n","summary":"no_ai_slop_writing-rules is an “Agent Skills” package that helps AI writing agents produce prose in Louis Rossmann’s voice while avoiding common hallmarks of low-effort AI output. It combines a rule set that bans or strips typical slop patterns (e.g., dramatic transitions/headings, filler phrasing, hollow punchiness, and likely fabricated claims) with a data-driven voice profile learned from a large corpus of Rossmann’s writing. The included skills can be installed into agent workflows like Claude Code, OpenAI Codex, Cursor, Windsurf, or any system that follows the Agent Skills specification, where the agent writes and then self-checks output against the anti-slop references. It’s best for writers, teams, and developers who want AI-assisted drafting that reads more human and more like Rossmann, especially for essays, scripts, documentation, and other general-purpose text.","description":"Claude Code reference: write in Louis Rossmann's voice, never like AI slop. Portable CLAUDE.md plus skills.","stars":269,"language":null},{"owner":"charlie947","repo":"social-media-skills","url":"https://github.com/charlie947/social-media-skills","readme":"<p align=\"center\">\n  <img src=\"assets/banner.svg\" alt=\"Social Media Skills by Charlie Hills\" width=\"100%\"/>\n</p>\n\n# Social Media Skills for AI Agents\n\nThe complete set of Claude skills behind Charlie Hills' content system. 350k+ followers across LinkedIn, Instagram, Substack, X and YouTube. 100m+ views per year. All running through one system that starts with the newsletter and flows out to every other channel.\n\nBuilt by [Charlie Hills](https://charliehills.substack.com). Subscribe to the [MarTech AI newsletter](https://charliehills.substack.com) for weekly breakdowns of how this system works in practice.\n\n**Contributions welcome.** Found a way to improve a skill? [Open a PR](https://github.com/charlie947/social-media-skills/pulls). Run into a problem? [Open an issue](https://github.com/charlie947/social-media-skills/issues).\n\n## What are Skills?\n\nSkills are markdown files that give AI agents specialised knowledge and workflows for specific tasks. When you install these in your project, Claude recognises when you're working on a social media task and applies the right patterns, voice rules, and platform constraints.\n\n## How Skills Work Together\n\nEvery skill reads shared context. The `voice-builder` skill is the foundation. Every other skill checks it first (via `about-me.md` and `voice.md`) before drafting a line.\n\n```\n                    ┌──────────────────────────────────────┐\n                    │           voice-builder              │\n                    │   about-me.md + voice.md             │\n                    │   (read by every skill below)        │\n                    └──────────────────┬───────────────────┘\n                                       │\n                    ┌──────────────────▼───────────────────┐\n                    │         newsletter-voice             │\n                    │   newsletter-voice.md                │\n                    │   (the source every piece comes from)│\n                    └──────────────────┬───────────────────┘\n                                       │\n     ┌────────────┬────────────┬───────┴───────┬────────────┬────────────┐\n     ▼            ▼            ▼               ▼            ▼            ▼\n┌──────────┐ ┌──────────┐ ┌──────────┐ ┌──────────────┐ ┌──────────┐ ┌──────────┐\n│ Profile  │ │LinkedIn  │ │ Video    │ │ Analytics &  │ │Community │ │Standalone│\n│          │ │ posts    │ │          │ │ Scoring      │ │          │ │          │\n├──────────┤ ├──────────┤ ├──────────┤ ├──────────────┤ ├──────────┤ ├──────────┤\n│profile-  │ │post-     │ │reels-    │ │post-scorer   │ │pinned-   │ │hook-gen  │\n│ optimizer│ │ writer   │ │ scripting│ │              │ │ comment  │ │content-  │\n│          │ │graphic-  │ │youtube-  │ │analytics-    │ │          │ │ matrix   │\n│          │ │ designer │ │ thumbnail│ │ dashboard    │ │          │ │niche-    │\n│          │ │          │ │          │ │              │ │          │ │ research │\n│          │ │
