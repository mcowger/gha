post-form │ │          │ │              │ │          │ │gemini-*  │\n│          │ │          │ │          │ │              │ │          │ │quote-post│\n└──────────┘ └──────────┘ └──────────┘ └──────────────┘ └──────────┘ └──────────┘\n```\n\nSee each skill's `SKILL.md` for trigger phrases, inputs, and dependencies.\n\n## Available Skills\n\n<!-- SKILLS:START -->\n| Skill | Description |\n|---|---|\n| [voice-builder](skills/voice-builder/) | Build `about-me.md` and `voice.md` from an interview plus 3 to 5 writing samples. The foundation every other skill reads. |\n| [newsletter-voice](skills/newsletter-voice/) | Add newsletter-specific writing instructions on top of voice-builder. Produces `newsletter-voice.md`. |\n| [profile-optimizer](skills/profile-optimizer/) | Rebuild a LinkedIn profile for conversions. Headline, about, experience, featured section, plus 4 image generation prompts. |\n| [post-writer](skills/post-writer/) | Draft LinkedIn posts in your voice using the voice files. |\n| [graphic-designer](skills/graphic-designer/) | Pick between HTML/CSS graphic and AI-generated infographic based on the post content. |\n| [post-scorer](skills/post-scorer/) | Pull your post history via Apify and score any draft against what actually performs for you. |\n| [reels-scripting](skills/reels-scripting/) | Reverse-engineer an outlier Reel via Apify + Gemini 2.5 Flash. Write a new script in your voice from your newsletter. |\n| [youtube-thumbnail](skills/youtube-thumbnail/) | Turn a video title into a branded YouTube thumbnail prompt for Gemini. |\n| [pinned-comment](skills/pinned-comment/) | Meme-style pinned comments with a matching image generation prompt. |\n| [hook-generator](skills/hook-generator/) | 6 clickbait-style two-line hook variations per topic. |\n| [post-formatter](skills/post-formatter/) | Topic to ready-to-publish post using PAS, AIDA, BAB, STAR, or SLAY. |\n| [content-matrix](skills/content-matrix/) | Pair your pillars with 8 formats for 32+ post ideas in one table. Justin Welsh style. |\n| [niche-research](skills/niche-research/) | Drive Claude for Chrome to scroll Reddit, X, and Google with verified dates. Surfaces the 20 most relevant stories in your niche from the last 7 days. |\n| [gemini-infographic](skills/gemini-infographic/) | The whiteboard style that pulled 480k impressions from 3 posts. |\n| [gemini-carousel](skills/gemini-carousel/) | Slide-by-slide carousel generator with an approval gate. |\n| [quote-post](skills/quote-post/) | Claude writes the quote, Gemini recreates the image with the quote baked in. |\n| [analytics-dashboard](skills/analytics-dashboard/) | LinkedIn Analytics export to interactive React dashboard plus 5 data-backed recommendations. |\n<!-- SKILLS:END -->\n\n## Installation\n\n### Option 1: Claude Code plugin marketplace\n\n```bash\n# Add the marketplace\n/plugin marketplace add charlie947/social-media-skills\n\n# Install the plugin\n/plugin install social-media-skills\n```\n\n### Option 2: Clone and copy\n\n```bash\ngit clone https://github.com/charlie947/social-media-skills.git\ncp -r social-media-skills/skills/* ~/.claude/skills/\n```\n\n### Option 3: Individual skill upload (Claude Desktop)\n\nDownload any skill folder, zip it, and upload via Customise skills in Claude.\n\n```bash\ncd social-media-skills/skills\nzip -r voice-builder.skill voice-builder\n# Upload voice-builder.skill through Customise skills in the Claude app\n```\n\n### Option 4: Git submodule\n\n```bash\ngit submodule add https://github.com/charlie947/social-media-skills.git .agents/social-media-skills\n```\n\nThen reference skills from `.agents/social-media-skills/skills/`.\n\n### Option 5: Fork and customise\n\nFork the repo, swap the voice rules for your own, and clone your fork into your projects.\n\n## Usage\n\nRun `voice-builder` first. Every other skill needs `about-me.md` and `voice.md` to work properly.\n\nOnce installed, ask Claude to help with content tasks and it will pick the right skill:\n\n```\n\"Build my voice\" → voice-builder\n\"Write me a post about AI agents\" → post-writer\n\"Score this draft against my history\" → post-scorer\n\"Make me a carousel from this\" → gemini-carousel\n\"What should I post this week\" → niche-research or content-matrix\n\"Turn this outlier Reel into a script\" → reels-scripting\n\"I need a thumbnail for 'How I fired my team'\" → youtube-thumbnail\n\"Write me a pinned comment\" → pinned-comment\n```\n\n## Skill Categories\n\n### Voice foundation\n- `voice-builder` — interview + sample analysis, writes about-me.md and voice.md\n- `newsletter-voice` — newsletter-specific writing rules on top of voice-builder\n\n### LinkedIn\n- `profile-optimizer` — full profile rebuild\n- `post-writer` — drafts in your voice\n- `graphic-designer` — HTML/CSS graphic or AI infographic, auto-selected\n- `post-formatter` — topic to post via named framework (PAS, AIDA, BAB, STAR, SLAY)\n- `hook-generator` — 6 hook variations per topic\n- `post-scorer` — scores drafts against your post history\n- `content-matrix` — pillars x formats ideation\n- `niche-research` — 7-day niche research via Claude for Chrome\n- `gemini-infographic` — whiteboard style for Gemini\n- `gemini-carousel` — slide-by-slide carousel\n- `quote-post` — two-step quote workflow\n\n### Instagram Reels\n- `reels-scripting` — Apify + Gemini 2.5 Flash reference analysis, newsletter-aligned script\n\n### YouTube\n- `youtube-thumbnail` — title to Gemini thumbnail prompt\n\n### Community\n- `pinned-comment` — meme-style pin + image prompt\n\n### Analytics\n- `analytics-dashboard` — LinkedIn export to dashboard + 5 recommendations\n\n## Prerequisites\n\nA few skills need external services. Set these environment variables before use:\n\n| Variable | Needed for |\n|---|---|\n| `APIFY_API_TOKEN` | post-scorer, reels-scripting |\n| `GOOGLE_AI_API_KEY` | reels-scripting (Gemini 2.5 Flash video analysis) |\n\nSet them with:\n\n```bash\nexport APIFY_API_TOKEN=your_token\nexport GOOGLE_AI_API_KEY=your_key\n```\n\nThe image generation skills (`gemini-infographic`, `gemini-carousel`, `quote-post`, `youtube-thumbnail`, `profile-optimizer`) output ready-to-paste prompts. You run them in a separate Gemini chat with Create Image enabled. No API key needed.\n\n## Contributing\n\nPRs and issues welcome. See [CONTRIBUTING.md](CONTRIBUTING.md) for guidelines on adding or improving skills.\n\nRun `./validate-skills.sh` before submitting to check your skill against the spec.\n\n## License\n\n[MIT](LICENSE). Use these however you like. If they help you, a link back to the [newsletter](https://charliehills.substack.com) is appreciated.\n\n— Charlie\n","summary":"social-media-skills is a collection of “Claude skills” packaged as markdown files that teach AI agents how to produce social media content in a consistent, platform-aware voice. It’s designed as a pipeline where a shared base voice is built first (via voice-builder from an interview and writing samples), then newsletter-specific instructions and channel-specific skills (e.g., LinkedIn posts, video scripts/thumbnails, analytics/scoring, community/pinned comments, and other content modules) generate outputs that follow the same rules. The project is best suited for creators, marketers, and teams who want to automate multi-channel content production while keeping messaging consistent and compliant with each platform’s constraints. It also benefits anyone looking to extend or contribute new skills by following the trigger phrases, inputs, and dependency patterns documented per skill.","description":null,"stars":1298,"language":"Shell"},{"owner":"Kappaemme-git","repo":"codex-startup-pressure-test-skill","url":"https://github.com/Kappaemme-git/codex-startup-pressure-test-skill","readme":"# Codex Startup Pressure Test Skill\n\nA Codex skill to brutally pressure-test startup ideas before you waste time building the wrong thing.\n\nGive Codex a startup idea and it returns a compact founder-style diagnosis: verdict, scorecard, core assumption, fatal flaws, problem reality, competition, first customer moves, and a 2-week MVP direction.\n\n## What It Does\n\n- Finds the core assumption\n- Exposes fatal flaws\n- Checks if the problem is real\n- Maps current behavior and real competitors\n- Plans first 10 customer moves\n- Defines a 2-week MVP test\n- Gives a direct strong / weak / pivot verdict\n\n## Installation\n\n```bash\nnpx --yes codex-startup-pressure-test-skill@latest\n```\n\nThis installs the skill into:\n\n```bash\n~/.codex/skills/startup-pressure-test\n```\n\nThen restart Codex so it can discover the skill.\n\n## Usage\n\nAfter installation, restart Codex and use the skill inside Codex prompts.\n\nBasic pressure test:\n\n```text\nUse $startup-pressure-test to pressure-test this startup idea:\n\nA tool that turns local videos into short clips with local captions for indie hackers and creators posting product demos.\n```\n\nBrutal version:\n\n```text\nUse $startup-pressure-test to brutally test this startup idea:\n\n...\n```\n\nProblem validation:\n\n```text\nUse $startup-pressure-test to validate whether this idea solves a real problem people pay for:\n\n...\n```\n\nCompetition mapping:\n\n```text\nUse $startup-pressure-test to map the real competition for this idea:\n\n...\n```\n\nFirst 10 customers:\n\n```text\nUse $startup-pressure-test to find the first 10 customers for this idea:\n\n...\n```\n\nMVP plan:\n\n```text\nUse $startup-pressure-test to build a 2-week MVP plan for this idea:\n\n...\n```\n\nDeep report:\n\n```text\nUse $startup-pressure-test to do a deep full report on this startup idea:\n\n...\n```\n\nIf you only invoke the skill without an idea, it will ask for the startup idea, target customer, and what the customer should do or pay for.\n\n## Modes\n\n- `pressure-test`: core assumption, fatal flaws, direct verdict\n- `problem-validation`: real pain, early adopter, validation criteria\n- `competition-map`: current behavior, direct/indirect competitors, switching cost\n- `first-10-customers`: manual traction plan\n- `mvp-plan`: smallest 2-week MVP test\n- `full`: compact all-in-one diagnosis\n\n## Output\n\nDefault output is compact:\n\n```text\nVerdict\nScorecard\nCore Assumption\nFatal Flaws\nProblem Reality\nCompetition\nFirst 10 Customers\nMVP\n```\n\n## Manual Installation\n\nClone the repository:\n\n```bash\ngit clone https://github.com/Kappaemme-git/codex-startup-pressure-test-skill.git\n```\n\nCopy the skill into your Codex skills directory:\n\n```bash\nmkdir -p ~/.codex/skills\ncp -R codex-startup-pressure-test-skill/startup-pressure-test ~/.codex/skills/startup-pressure-test\n```\n\nRestart Codex.\n\n## Troubleshooting\n\nIf Codex does not recognize `$startup-pressure-test`, restart Codex after installing.\n\nCheck that the skill exists:\n\n```bash\nls ~/.codex/skills/startup-pressure-test\n```\n\nYou should see:\n\n```text\nSKILL.md\nagents/\nreferences/\n```\n\n## License\n\nMIT\n","summary":"Kappaemme-git/codex-startup-pressure-test-skill is a Codex “startup pressure test” skill that takes a startup idea and produces a founder-style diagnostic report. It helps you identify the core assumption, surface fatal flaws, validate whether the problem is real, map direct and indirect competition, suggest first customer moves, and outline a 2-week MVP test with a strong/weak/pivot verdict. The skill includes focused modes for pressure testing, problem validation, competition mapping, finding first customers, and generating an MVP plan, plus a compact all-in-one “full” report. It’s best for aspiring founders, indie hackers, and product builders who want to quickly de-risk ideas before investing time and resources building the wrong thing.","description":null,"stars":880,"language":"JavaScript"},{"owner":"deepakness","repo":"google-ai-search-optimization","url":"https://github.com/deepakness/google-ai-search-optimization","readme":"# Google AI Search Optimization Skill\n\nAn open Agent Skill for applying Google's official guidance on optimizing websites for generative AI features in Google Search, including AI Overviews and AI Mode.\n\nThis skill helps AI agents explain, audit, plan, and implement SEO work based on Google's current public recommendations. It focuses on practical Search fundamentals: crawlability, indexability, helpful non-commodity content, media SEO, structured data, ecommerce/local details, and agent-friendly site readiness.\n\nPrimary source: [Google's guide to optimizing for generative AI features on Google Search](https://developers.google.com/search/docs/fundamentals/ai-optimization-guide).\n\n## Install\n\nInstall with the open [`skills` CLI](https://github.com/vercel-labs/skills):\n\n```bash\nnpx skills add deepakness/google-ai-search-optimization\n```\n\nThe CLI may ask whether to install for the current project or globally.\n\nTo force a global install:\n\n```bash\nnpx skills add deepakness/google-ai-search-optimization --global\n```\n\nList available skills before installing:\n\n```bash\nnpx skills add deepakness/google-ai-search-optimization --list\n```\n\n## Manual Install\n\nYou can also clone or download this repository and copy the skill folder directly.\n\nProject-local install for agents that use the common `.agents/skills` path:\n\n```bash\ngit clone https://github.com/deepakness/google-ai-search-optimization.git\nmkdir -p .agents/skills\ncp -R google-ai-search-optimization/skills/google-ai-search-optimization .agents/skills/\n```\n\nGlobal Codex install:\n\n```bash\nmkdir -p ~/.codex/skills\ncp -R google-ai-search-optimization/skills/google-ai-search-optimization ~/.codex/skills/\n```\n\nGlobal Claude Code install:\n\n```bash\nmkdir -p ~/.claude/skills\ncp -R google-ai-search-optimization/skills/google-ai-search-optimization ~/.claude/skills/\n```\n\nThe folder you copy should contain `SKILL.md` at its root.\n\n## What It Covers\n\n- How Google AI Overviews and AI Mode relate to normal Google Search.\n- Why SEO still matters for generative AI Search.\n- Retrieval-augmented generation, query fan-out, and Search-index grounding.\n- Helpful, reliable, people-first content.\n- Non-commodity content and firsthand expertise.\n- Crawlability, indexing, snippets, canonicalization, JavaScript SEO, and page experience.\n- Image and video SEO for AI-era Search visibility.\n- Structured data without treating schema as an AI-specific ranking trick.\n- Ecommerce and local business details through Merchant Center and Business Profile.\n- Myth-busting around AEO/GEO hacks, `llms.txt`, content chunking, fake mentions, and AI-only rewrites.\n- Agent-friendly website readiness.\n\n## Repository Structure\n\n```text\n.\n├── README.md\n└── skills\n    └── google-ai-search-optimization\n        ├── SKILL.md\n        └── references\n            ├── audit-playbook.md\n            └── google-ai-search-principles.md\n```\n\n## Usage Examples\n\nAsk your AI agent:\n\n```text\nUse the google-ai-search-optimization skill to audit this product page for Google AI Search readiness.\n```\n\n```text\nUse the google-ai-search-optimization skill to turn this SEO advice into a prioritized implementation plan.\n```\n\n```text\nUse the google-ai-search-optimization skill to check whether adding llms.txt helps with Google AI Overviews.\n```\n\n## Notes\n\nThis skill summarizes and operationalizes public Google guidance, but it is not a replacement for the live docs. For current policy-sensitive advice, verify against the official Google sources linked inside the skill references.\n\nThe `skills` CLI may collect anonymous install telemetry. To opt out:\n\n```bash\nDISABLE_TELEMETRY=1 npx skills add deepakness/google-ai-search-optimization\n```\n","summary":"deepakness/google-ai-search-optimization is an open “agent skill” that helps AI assistants apply Google’s official guidance for optimizing websites for generative AI features in Google Search, including AI Overviews and AI Mode. It enables agents to audit sites and explain, prioritize, and plan SEO improvements using Search fundamentals like crawlability and indexability, people-first helpful content, media SEO, structured data best practices, and ecommerce/local data readiness. It also addresses common myths and speculative “AI SEO” tactics by grounding recommendations in Google’s public principles. This is especially useful for teams building SEO-capable AI agents, marketers, and developers who want their automation to reflect current Google AI Search guidance.","description":"Unofficial Agent Skill based on Google Search guidance for AI Overviews, AI Mode, and SEO audits.","stars":116,"language":null},{"owner":"darkrishabh","repo":"agent-skills-eval","url":"https://github.com/darkrishabh/agent-skills-eval","readme":"<div align=\"center\">\n\n<img src=\"https://github.com/user-attachments/assets/094b8e11-e19e-4c96-ae82-ba701cfcf7e3\" alt=\"agent-skills-eval — a test runner for Agent Skills\" width=\"100%\" />\n\n<br />\n\n# agent-skills-eval\n\n**A test runner for [Agent Skills](https://agentskills.io).**\n\nWrite a `SKILL.md`, drop in some evals, and find out — empirically — whether your skill actually makes the model better at the task.\n\n[![npm version](https://img.shields.io/npm/v/agent-skills-eval.svg?style=flat-square&logo=npm&label=npm)](https://www.npmjs.com/package/agent-skills-eval)\n[![CI](https://img.shields.io/github/actions/workflow/status/darkrishabh/agent-skills-eval/ci.yml?style=flat-square&logo=github&label=ci)](https://github.com/darkrishabh/agent-skills-eval/actions/workflows/ci.yml)\n[![license: MIT](https://img.shields.io/badge/license-MIT-green?style=flat-square)](LICENSE)\n[![node](https://img.shields.io/node/v/agent-skills-eval.svg?style=flat-square&logo=nodedotjs&logoColor=white)](package.json)\n[![docs](https://img.shields.io/badge/docs-GitHub%20Pages-0f766e?style=flat-square)](https://darkrishabh.github.io/agent-skills-eval/)\n[![TypeScript](https://img.shields.io/badge/TypeScript-3178C6?style=flat-square&logo=typescript&logoColor=white)](https://www.typescriptlang.org/)\n\n[Documentation](https://darkrishabh.github.io/agent-skills-eval/) · [Quickstart](#quickstart) · [SDK](#sdk) · [agentskills.io](https://agentskills.io)\n\n</div>\n\n---\n\n## Why this exists\n\n[Agent Skills](https://agentskills.io) — the open standard from Anthropic for giving agents domain knowledge — make it easy to ship a `SKILL.md` and assume your agent is now better at the task. The hard part is *proving* it.\n\n`agent-skills-eval` is the missing piece. It runs your skill against the same prompts twice — once `with_skill` loaded into context, once `without_skill` (baseline) — has a judge model grade both outputs, and gives you a side-by-side report. If the skill doesn't make a measurable difference, you'll see it. If it does, you have receipts.\n\nIt's the test framework for the Agent Skills ecosystem, separated from any specific agent runtime so it works wherever your skills do.\n\n## Quickstart\n\n```bash\nnpx agent-skills-eval ./skills \\\n  --target gpt-4o-mini \\\n  --judge gpt-4o-mini \\\n  --baseline \\\n  --strict\n```\n\nThat's it. Point it at a folder of skills, give it a target model and a judge model, and it produces a workspace with full artifacts and a static HTML report.\n\n```text\nagent-skills-workspace/\n└── iteration-1/\n    ├── meta.json            # run metadata\n    ├── benchmark.json       # rolled-up pass/fail per skill\n    ├── eval-basic/\n    │   ├── with_skill/      # output, timing, judge grading\n    │   └── without_skill/   # ↑ same, with the skill stripped\n    └── report/\n        └── index.html       # the visual report\n```\n\nOpen `iteration-1/report/index.html` and you have a real, evidence-backed answer to \"is my skill working?\"\n\n## What you get\n\n|  |  |\n|---|---|\n| **`with_skill` vs `without_skill`** | Every eval runs both ways so you can see the actual lift from the skill — or its absence. |\n| **Judge-graded outputs** | Use any chat model as a judge. Pass/fail with cited assertions, not vibes. |\n| **TypeScript SDK + CLI** | One-liner CLI for CI, full SDK for custom pipelines, custom providers, and dashboards. |\n| **OpenAI-compatible by default** | Works out of the box with OpenAI, Together, Groq, Anthropic via OpenAI-compat layers, local Llama servers — anything that speaks the OpenAI chat API. |\n| **Tool-call assertions** | Deterministic checks for agents that call tools, not just generate text. |\n| **Portable artifacts** | JSON + JSONL all the way down. Run today, diff tomorrow. Plug into your own dashboard. |\n| **Static HTML reports** | A drop-in report site you can publish anywhere — no infrastructure. |\n| **Fully spec-compliant** | Implements the full [agentskills.io specification](https://agentskills.io/specification): `SKILL.md` validation, `evals/evals.json`, official `iteration-N` artifact layout, frontmatter rules. |\n\n## Install\n\n```bash\nnpm install agent-skills-eval\n```\n\nOr run directly without installing:\n\n```bash\nnpx agent-skills-eval --help\n```\n\n## How it works\n\nThe mental model is straightforward. For every eval defined in your skill:\n\n```\n                ┌─────────────────────────────┐\n                │       same prompt           │\n                └───────────────┬─────────────┘\n                                │\n                ┌───────────────┴─────────────┐\n                ▼                             ▼\n        ┌──────────────┐              ┌──────────────┐\n        │ with_skill   │              │without_skill │\n        │ SKILL.md in  │              │ baseline,    │\n        │ context      │              │ no skill     │\n        └──────┬───────┘              └──────┬───────┘\n               │                             │\n               ▼                             ▼\n          target model                  target model\n               │                             │\n               ▼                             ▼\n            output                        output\n               │                             │\n               └──────────┬──────────────────┘\n                          ▼\n                   ┌─────────────┐\n                   │  judge      │  scores both against\n                   │  model      │  the same assertions\n                   └──────┬──────┘\n                          ▼\n                  pass / fail per side\n```\n\nThe judge sees the eval's `expected_output` and `assertions` and grades each side independently. The `--baseline` flag is what enables the comparison; without it you only get the `with_skill` run.\n\n## YAML config\n\nFor anything beyond a quick command, drop a config file at the root of your project:\n\n```yaml\n# agent-skills-eval.yaml\nroot: ./skills\nworkspace: ./agent-skills-workspace\nbaseline: true\ntarget: gpt-4o-mini\njudge: gpt-4o-mini\nbaseUrl: https://api.openai.com/v1\napiKeyEnv: OPENAI_API_KEY\ninclude:\n  - \"skills/**\"\nexclude:\n  - \"**/draft-*\"\nconcurrency: 4\nlayout: iteration\nstrict: true\nreport:\n  enabled: true\n  title: Agent Skills Report\nlogging:\n  format: pretty   # pretty | jsonl | silent\n  verbose: false\n  color: auto\ntargetParams:\n  temperature: 0\njudgeParams:\n  temperature: 0\n```\n\n```bash\nOPENAI_API_KEY=... npx agent-skills-eval --config agent-skills-eval.yaml\n```\n\nCLI flags always override config values.\n\n## SDK\n\nFor programmatic use — CI pipelines, custom dashboards, multi-skill rollups — drive the evaluator from TypeScript:\n\n```ts\nimport {\n  OpenAICompatibleProvider,\n  consoleReporter,\n  evaluateSkills,\n} from \"agent-skills-eval\";\n\nconst provider = new OpenAICompatibleProvider({\n  baseUrl: \"https://api.openai.com/v1\",\n  apiKey: process.env.OPENAI_API_KEY!,\n  model: \"gpt-4o-mini\",\n  providerName: \"openai\",\n});\n\nconst result = await evaluateSkills({\n  root: \"./skills\",\n  workspace: \"./agent-skills-workspace\",\n  baseline: true,\n  concurrency: 4,\n  workspaceLayout: \"iteration\",\n  strict: true,\n  target: { model: provider.model, provider },\n  judge: { model: provider.model, provider },\n  onEvent: consoleReporter(),\n});\n\nconsole.log(result);\n```\n\nStream events to a file as JSONL for downstream analysis:\n\n```ts\nimport { jsonlReporter } from \"agent-skills-eval\";\n\nconst reporter = jsonlReporter({ file: \"./events.jsonl\" });\n\nawait evaluateSkills({ /* ... */ onEvent: reporter.onEvent });\nawait reporter.close();\n```\n\nLoad YAML config programmatically:\n\n```ts\nimport { loadConfigFile } from \"agent-skills-eval\";\n\nconst config = loadConfigFile(\"./agent-skills-eval.yaml\");\n```\n\n## Custom providers\n\nBring any backend by implementing the `Provider` interface — five fields, one method:\n\n```ts\nimport type { Provider, ProviderResult } from \"agent-skills-eval\";\n\nexport const provider: Provider = {\n  name: \"my-provider\",\n  model: \"my-model\",\n  async complete(prompt: string): Promise<ProviderResult> {\n    return {\n      provider: \"my-provider\",\n      model: \"my-model\",\n      output: \"model output\",\n      latencyMs: 0,\n      inputTokens: 0,\n      outputTokens: 0,\n      costUsd: 0,\n    };\n  },\n};\n```\n\nUseful for: local model servers (Ollama, vLLM, llama.cpp), proprietary internal APIs, mock providers in unit tests, or routing layers in front of multiple providers.\n\n## Skill layout\n\nA skill is a folder. The minimum is a `SKILL.md`. Add `evals/evals.json` and you can evaluate it.\n\n```text\nmy-skill/\n├── SKILL.md\n├── references/\n│   └── notes.md\n├── scripts/\n│   └── helper.sh\n└── evals/\n    ├── evals.json\n    └── files/\n        └── input.csv\n```\n\n`SKILL.md`:\n\n```markdown\n---\nname: my-skill\ndescription: Analyze small CSV files.\nlicense: MIT\ncompatibility: Works with text-capable chat models.\n---\n\nWhen given a CSV file, identify the most important trend and cite the\nrelevant rows.\n```\n\n`evals/evals.json`:\n\n```json\n{\n  \"skill_name\": \"my-skill\",\n  \"evals\": [\n    {\n      \"id\": \"basic\",\n      \"name\": \"basic behavior\",\n      \"prompt\": \"Use the attached data to summarize revenue.\",\n      \"files\": [\"evals/files/input.csv\"],\n      \"expected_output\": \"The response identifies the highest revenue month.\",\n      \"assertions\": [\n        \"The output identifies the highest revenue month.\"\n      ]\n    }\n  ]\n}\n```\n\nIf you skip `assertions` but provide `expected_output`, the SDK promotes the expected output into a judge assertion automatically — so a minimal agentskills.io eval file produces meaningful pass/fail grading without extra work.\n\n## CLI options\n\n```bash\nnpx agent-skills-eval [root] \\\n  --config agent-skills-eval.yaml \\\n  --workspace ./agent-skills-workspace \\\n  --baseline \\\n  --target gpt-4o-mini \\\n  --judge gpt-4o-mini \\\n  --base-url https://api.openai.com/v1 \\\n  --api-key-env OPENAI_API_KEY \\\n  --include \"skills/**\" \\\n  --exclude \"**/draft-*\" \\\n  --concurrency 4 \\\n  --layout iteration \\\n  --strict \\\n  --log-format pretty \\\n  --report\n```\n\n**Logging modes**: `pretty` for humans, `jsonl` for machines, `silent` for quiet CI.\n\n## Reports\n\nThe static HTML report is built from disk artifacts and shows everything you'd want for skill iteration:\n\n- Pass rate by skill and by eval\n- Assertion-by-assertion grading evidence with judge reasoning\n- Full target output, side by side for `with_skill` and `without_skill`\n- Prompt and judge prompt details\n- Timing and token usage\n- Tool calls when present\n\nUse `--report-output` (or `report.output` in YAML) to choose where the report lands.\n\n## agentskills.io compatibility\n\nImplements the [agentskills.io](https://agentskills.io) specification end to end:\n\n- `SKILL.md` YAML frontmatter — required `name` and `description`, optional `license`, `compatibility`, `metadata`, `allowed-tools`\n- Strict validation: name length, lowercase-hyphenated format, parent-directory match, description length, compatibility length\n- Optional `scripts/`, `references/`, and `assets/` directories — markdown references included in skill context, scripts exposed by manifest\n- `evals/evals.json` schema: `skill_name`, `evals[].id`, `prompt`, `expected_output`, `files`, `assertions`\n- Official artifact layout: `iteration-N/<eval>/<mode>/outputs`, `timing.json`, `grading.json`, `benchmark.json`\n- Baseline comparison via `with_skill` and `without_skill`\n\nBeyond the spec, this SDK adds: per-eval `defaults`, model `params`, tool definitions, deterministic `tool_assertions`, and a flat `workspaceLayout: \"flat\"` for multi-skill dashboards.\n\n## Examples\n\nSee [`examples/basic-skill`](examples/basic-skill) for a complete skill folder, and [`examples/agent-skills-eval.yaml`](examples/agent-skills-eval.yaml) for a reference config.\n\n## Development\n\n```bash\nnpm ci\nnpm test\nnpm pack --dry-run\n```\n\n## Documentation\n\nFull docs live at **[darkrishabh.github.io/agent-skills-eval](https://darkrishabh.github.io/agent-skills-eval/)** (sources in [`docs/`](docs)). Local preview:\n\n```bash\npython3 -m http.server 8080 --directory docs\n```\n\n## Contributing\n\nIssues, PRs, and skill examples are all welcome. See [CONTRIBUTING.md](CONTRIBUTING.md), [CODE_OF_CONDUCT.md](CODE_OF_CONDUCT.md), and [SECURITY.md](SECURITY.md).\n\n## License\n\nMIT. See [LICENSE](LICENSE).\n\n---\n\n<div align=\"center\">\n\nBuilt for the [Agent Skills](https://agentskills.io) ecosystem.\n\n</div>\n","summary":"agent-skills-eval is a Node/TypeScript test runner for the Agent Skills standard, designed to empirically verify whether a `SKILL.md` actually improves an agent’s performance. It runs the same prompts twice—once with the skill included in context and once as a baseline without the skill—then uses a judge model to grade both outputs and produce a side-by-side report. The project supports judge-graded pass/fail results, including deterministic tool-call assertions, and outputs portable JSON/JSONL artifacts plus a static HTML report for easy review and CI integration. It’s especially useful for developers, teams, and researchers building or maintaining Agent Skills who need “receipts” instead of assumptions when evaluating skill quality.","description":"A test runner for agentskills.io-style AI agent skills","stars":551,"language":"TypeScript"},{"owner":"anysearch-ai","repo":"anysearch-skill","url":"https://github.com/anysearch-ai/anysearch-skill","readme":"# AnySearch Skill\n\nUnified real-time search engine skill for AI agents. Supports general web search, vertical domain search, parallel batch search, and full-page content extraction.\n\n## Download & Install\n\n### For AI Agents\n\nIf your agent platform supports a skill marketplace/store, search for **anysearch** and install from there. Otherwise, download and install manually:\n\n```bash\n# Download (pin to a specific release version)\ncurl -L -o anysearch-skill.zip https://github.com/anysearch-ai/anysearch-skill/archive/refs/heads/main.zip\n# or: wget -O anysearch-skill.zip https://github.com/anysearch-ai/anysearch-skill/archive/refs/heads/main.zip\n\n# Verify integrity (replace with actual checksum from the release page)\n# sha256sum anysearch-skill.zip\n\n# Unzip\nunzip anysearch-skill.zip\n\n# Move to your agent's skill directory (example paths below, adjust for your agent)\n# Claude Code:    mv anysearch-skill ~/.claude/skills/anysearch\n# OpenCode:       mv anysearch-skill ~/.config/opencode/skills/anysearch\n# Cursor/Windsurf: mv anysearch-skill <project>/.skills/anysearch\n# Generic:        mv anysearch-skill <your_agent_skill_dir>/anysearch\n# Shared agents:  mv anysearch-skill ~/.agents/skills/anysearch\n```\n\n`~/.agents/skills/` is a useful shared install location when multiple AI tools read from the same skill directory, including Codex, Cursor, and OpenClaw personal agent skills.\n\n### For Humans\n\n1. Download the zip: https://github.com/anysearch-ai/anysearch-skill/archive/refs/heads/main.zip\n2. Unzip to your agent's skill directory\n3. Configure API key (see below)\n4. Run the entry test to verify installation\n\n## API Key Configuration\n\nAn API key is **optional but strongly recommended**. Without a key, you can still use all search features via anonymous access, but with **lower rate limits and quota**.\n\n### How to configure\n\nCopy the example env file and fill in your key:\n\n```bash\ncp .env.example .env\n# Edit .env and set: ANYSEARCH_API_KEY=<your_api_key_here>\n```\n\nOr set the environment variable directly:\n\n```bash\nexport ANYSEARCH_API_KEY=<your_api_key_here>   # Linux/macOS\nset ANYSEARCH_API_KEY=<your_api_key_here>       # Windows CMD\n$env:ANYSEARCH_API_KEY=\"<your_api_key_here>\"    # Windows PowerShell\n```\n\n### Get an API Key\n\nVisit https://anysearch.com/console/api-keys to sign up and create a free API key.\n\nKey priority order: `--api_key` CLI flag > `.env` file > environment variable > anonymous\n\n## Post-Install Verification\n\nAfter installation, probe the platform and run the entry test:\n\n### Step 1: Detect available runtime\n\nRun these checks in order. The first success determines the active CLI:\n\n```bash\n# Check Python (recommended)\npython --version   # Need >= 3.6, requires `requests` library\npython3 --version  # Need >= 3.6, requires `requests` library\n# Check Node.js (alternative)\nnode --version     # Need >= 12, no external dependencies\n# Check Shell (fallback)\n# Windows: PowerShell 5.1+ / Linux/macOS: bash 4+\n```\n\nPriority: **Python > Node.js > Shell**\n\nImportant: do not assume `python` exists. On many macOS systems, the correct executable is `python3`. Check both `python` and `python3`; if either works, Python is available.\n\n### Step 2: Run entry test (probe all available runtimes)\n\nRun the `doc` command with **each available** runtime to verify the skill works, and observe which runs without errors or warnings:\n\n```bash\n# Python\npython <skill_dir>/scripts/anysearch_cli.py doc\n\n# Python 3 fallback (common on macOS)\npython3 <skill_dir>/scripts/anysearch_cli.py doc\n\n# Node.js (if available)\nnode <skill_dir>/scripts/anysearch_cli.js doc\n\n# PowerShell (Windows)\npowershell -ExecutionPolicy Bypass -File <skill_dir>/scripts/anysearch_cli.ps1 doc\n\n# Bash (Linux/macOS)\nbash <skill_dir>/scripts/anysearch_cli.sh doc\n```\n\nFor each runtime, record whether the command succeeded and any errors/warnings encountered. The runtime that completes without errors and produces the cleanest output is the recommended runtime for this environment.\n\n### Step 3: Persist recommended runtime to configuration file\n\nBased on the entry test results, write the recommended runtime to `<skill_dir>/runtime.conf`:\n\n```bash\necho \"Runtime: <RUNTIME>\" > <skill_dir>/runtime.conf\necho \"Command: <COMMAND>\" >> <skill_dir>/runtime.conf\n```\n\nExample for Python:\n\n```bash\necho \"Runtime: Python\" > <skill_dir>/runtime.conf\necho \"Command: python <skill_dir>/scripts/anysearch_cli.py\" >> <skill_dir>/runtime.conf\n```\n\nExample for Python 3:\n\n```bash\necho \"Runtime: Python\" > <skill_dir>/runtime.conf\necho \"Command: python3 <skill_dir>/scripts/anysearch_cli.py\" >> <skill_dir>/runtime.conf\n```\n\nExample for Node.js:\n\n```bash\necho \"Runtime: Node.js\" > <skill_dir>/runtime.conf\necho \"Command: node <skill_dir>/scripts/anysearch_cli.js\" >> <skill_dir>/runtime.conf\n```\n\nExample for PowerShell:\n\n```bash\necho \"Runtime: PowerShell\" > <skill_dir>/runtime.conf\necho \"Command: powershell -ExecutionPolicy Bypass -File <skill_dir>/scripts/anysearch_cli.ps1\" >> <skill_dir>/runtime.conf\n```\n\nExample for Bash:\n\n```bash\necho \"Runtime: Bash\" > <skill_dir>/runtime.conf\necho \"Command: bash <skill_dir>/scripts/anysearch_cli.sh\" >> <skill_dir>/runtime.conf\n```\n\n**Important:** Runtime preferences are stored in `runtime.conf`, NOT in SKILL.md. The agent reads `runtime.conf` on skill load to determine the active CLI. If the file is missing or corrupted, the agent falls back to the Platform Detection procedure in SKILL.md. If `runtime.conf` already exists, replace it instead of appending.\n\n### Routine agent usage\n\nAfter `runtime.conf` exists, agents should use the stored `Command` directly for routine calls instead of running `doc` before every search. For example, if `runtime.conf` contains `Command: python3 <skill_dir>/scripts/anysearch_cli.py`, use:\n\n```bash\npython3 <skill_dir>/scripts/anysearch_cli.py search \"query\" --max_results 5\npython3 <skill_dir>/scripts/anysearch_cli.py batch_search --queries '[{\"query\":\"q1\",\"max_results\":5},{\"query\":\"q2\",\"max_results\":5}]'\npython3 <skill_dir>/scripts/anysearch_cli.py extract \"https://example.com/page\"\npython3 <skill_dir>/scripts/anysearch_cli.py extract --url \"https://example.com/page\"\n```\n\n`extract` output is already Markdown. Do not pass `--format markdown`, `--format json`, or `--markdown`; the extract command only accepts the URL positional argument or `--url`/`-u`. If a subcommand argument is unclear or fails, run `<command> <subcommand> --help` for that subcommand rather than the full `doc` command.\n\n### Step 4 (optional): Test a real search\n\n```bash\npython <skill_dir>/scripts/anysearch_cli.py search \"hello world\" --max_results 1\n```\n\nIf your system does not provide `python`, use:\n\n```bash\npython3 <skill_dir>/scripts/anysearch_cli.py search \"hello world\" --max_results 1\n```\n\nA successful JSON response confirms the API connection is working.\n\n## File Structure\n\n```\nanysearch/\n├── .env.example              # API key configuration template\n├── .env                      # Your API key (gitignored, create from .env.example)\n├── runtime.conf              # Detected runtime preferences (gitignored)\n├── runtime.conf.example      # Runtime configuration template\n├── SKILL.md                  # Skill definition for AI agents\n├── README.md                 # This file\n└── scripts/\n    ├── anysearch_cli.py       # Python CLI\n    ├── anysearch_cli.js       # Node.js CLI\n    ├── anysearch_cli.ps1      # PowerShell CLI\n    └── anysearch_cli.sh       # Bash CLI\n```\n","summary":"anysearch-ai/anysearch-skill provides a unified, real-time search capability for AI agents, combining general web search with vertical/domain-specific search. It also supports parallel batch searching and full-page content extraction so agents can retrieve both results and detailed page content in one workflow. The project can be installed either from an AI agent skill marketplace or manually, and it optionally supports an API key to improve rate limits and quota. This is best for developers and teams building AI agents that need reliable, automated information retrieval across broad and niche sources.","description":"Unified real-time search engine skill for AI agents. ","stars":1877,"language":"Python"},{"owner":"Nutlope","repo":"hallmark","url":"https://github.com/Nutlope/hallmark","readme":"# Hallmark\n\n**A design skill for Claude Code, Cursor, and Codex that refuses to look AI-generated.**\n\n[Live demo →](https://www.usehallmark.com) &nbsp;·&nbsp; twenty-two themes &nbsp;·&nbsp; four verbs &nbsp;·&nbsp; press `T` to cycle.\n\nMade by Together AI.\n\n<p align=\"center\">\n  <img src=\"site/OG-hallmark.png\" alt=\"Hallmark — A design skill that refuses to look AI-generated\" />\n</p>\n\nHallmark picks a macrostructure for the brief, dresses it in one of twenty-two themes, runs sixty-five slop-test gates plus a pre-emit self-critique, and refuses the on-distribution defaults every LLM was trained into. Two pages by Hallmark for two different briefs feel like different sites, not colour-swaps of the same template.\n\n---\n\n## Four verbs\n\n| Verb | What it does |\n| --- | --- |\n| *(default)* | Build new UI. Picks a macrostructure, applies the rule-set, runs the slop test before handing back. |\n| `hallmark audit <target>` | Score existing code against the anti-patterns. Punch list, no edits. |\n| `hallmark redesign <target>` | Throw out the structure, keep copy + IA + brand, rebuild with a different fingerprint. |\n| `hallmark study <screenshot \\| URL>` | Extract the **DNA** from a design you admire — macrostructure, type-pairing, colour anchor. Refuses pixel-clones and paid templates. Optionally emits a portable `design.md` for handoff to other AI tools. |\n\n---\n\n## Different briefs, different shapes\n\nEach generated by exercising the skill on a different brief. The skill picks differently every time — no two share a macrostructure or theme.\n\n<table>\n  <tr>\n    <td width=\"25%\"><a href=\"https://www.usehallmark.com/examples/tally/\"><img src=\"docs/screenshots/hero-tally.jpg\" alt=\"Tally — SaaS product page hero\" /></a></td>\n    <td width=\"25%\"><a href=\"https://www.usehallmark.com/examples/wayfare/\"><img src=\"docs/screenshots/hero-wayfare.jpg\" alt=\"Wayfare travel booking hero\" /></a></td>\n    <td width=\"25%\"><a href=\"https://www.usehallmark.com/_tests/09-slow-pour/\"><img src=\"docs/screenshots/hero-slow-pour.jpg\" alt=\"Slow Pour coffee subscription hero\" /></a></td>\n    <td width=\"25%\"><a href=\"https://www.usehallmark.com/examples/bananastudio/\"><img src=\"docs/screenshots/hero-bananastudio.jpg\" alt=\"BananaStudio creative studio hero\" /></a></td>\n  </tr>\n  <tr>\n    <td><b>Tally</b><br/><sub>SaaS · modern-minimal</sub></td>\n    <td><b>Wayfare</b><br/><sub>Travel · atmospheric</sub></td>\n    <td><b>Slow Pour</b><br/><sub>Coffee subscription</sub></td>\n    <td><b>BananaStudio</b><br/><sub>Studio · playful</sub></td>\n  </tr>\n  <tr>\n    <td><a href=\"https://www.usehallmark.com/_tests/06-anya-portfolio/\"><img src=\"docs/screenshots/hero-anya.jpg\" alt=\"Anya Reis personal site hero\" /></a></td>\n    <td><a href=\"https://www.usehallmark.com/examples/najm/\"><img src=\"docs/screenshots/hero-najm.jpg\" alt=\"NAJM Moroccan fashion brand hero\" /></a></td>\n    <td><a href=\"https://www.usehallmark.com/_tests/11-soroe-ceramics/\"><img src=\"docs/screenshots/hero-soroe.jpg\" alt=\"Søroe ceramics studio hero\" /></a></td>\n    <td><a href=\"https://www.usehallmark.com/examples/hyperlane/\"><img src=\"docs/screenshots/hero-hyperlane.jpg\" alt=\"Hyperlane developer infrastructure hero\" /></a></td>\n  </tr>\n  <tr>\n    <td><b>Anya Reis</b><br/><sub>Personal site</sub></td>\n    <td><b>NAJM</b><br/><sub>Fashion brand</sub></td>\n    <td><b>Søroe</b><br/><sub>Ceramics studio</sub></td>\n    <td><b>Hyperlane</b><br/><sub>Dev infrastructure</sub></td>\n  </tr>\n</table>\n\nEach page is self-contained HTML + CSS, stamped with its macrostructure in the CSS comment. Browse the full set at [usehallmark.com](https://www.usehallmark.com) or under [`site/_tests/`](site/_tests/).\n\n---\n\n## Install\n\n```\nnpx skills add nutlope/hallmark\n```\n\nRe-run any time to update. Or copy [`SKILL.md`](skills/hallmark/SKILL.md) + [`references/`](skills/hallmark/references/) into:\n\n- **Claude Code** — `~/.claude/skills/hallmark/`\n- **Cursor** — `.cursor/rules/hallmark.mdc` (body of `SKILL.md`, no frontmatter)\n- **Codex** — `~/.codex/skills/hallmark/` (personal) or `.codex/skills/hallmark/` (project-scoped)\n\nThe rule-set lives in [`SKILL.md`](skills/hallmark/SKILL.md) and [`references/`](skills/hallmark/references/). Worked examples in [`docs/recipes.md`](docs/recipes.md) and [`docs/study-examples.md`](docs/study-examples.md).\n\n---\n\n## Licence\n\nMIT. Use it, fork it, ship it.\n","summary":"Hallmark is a design “skill” for Claude Code, Cursor, and Codex that helps generate UI so it doesn’t look AI-generated by enforcing consistent macrostructure rules and actively rejecting common LLM defaults. It builds pages using one of 22 themes and a set of slop-test gates with a pre-emit self-critique, resulting in designs that feel structurally distinct rather than simple template variations. It also supports auditing existing designs for anti-patterns, redesigning while preserving copy/IA/brand, and studying reference screenshots/URLs to extract portable “DNA” (like macrostructure, type pairing, and color anchors). Best for designers and product teams who want more original-looking, brand-consistent web/UI output from AI coding tools.","description":"Anti-AI-slop design skill for Claude Code, Cursor, and Codex.","stars":2398,"language":"CSS"},{"owner":"MobiusQuant","repo":"OpenMobius-skill","url":"https://github.com/MobiusQuant/OpenMobius-skill","readme":"<div align=\"center\">\n\n# OpenMobius-skill\n\n**ICT/SMC trading-knowledge skill for AI coding agents**\n\nA `SKILL.md`-standard skill bringing 964 curated knowledge cards, real-time\nmarket data, technical indicators, and chart generation to\n**Claude Code**, **Codex**, **OpenClaw**, and **Hermes**.\n\n<br>\n\n[![License](https://img.shields.io/badge/license-Apache_2.0-blue.svg)](./LICENSE)\n[![Python](https://img.shields.io/badge/python-3.10%2B-3776ab.svg)](https://www.python.org/)\n[![Website](https://img.shields.io/badge/🌐_website-mobiusquant.ai-FF7E29.svg)](https://www.mobiusquant.ai/)\n[![Platforms](https://img.shields.io/badge/platforms-Claude_Code_·_Codex_·_OpenClaw_·_Hermes-9333ea.svg)](#platform-support)\n[![Knowledge Base](https://img.shields.io/badge/knowledge_base-964_cards-22c55e.svg)](#features)\n\n[English](./README.md) · [中文](./README.zh.md) · 📜 [Changelog](./CHANGELOG.md)\n\n</div>\n\n---\n\n> **🤖 AI agents** — when a user asks you to install this skill,\n> follow [`README_AGENT.md`](./README_AGENT.md) for the step-by-step\n> procedure (pre-flight checks, install command, verification, error\n> handling).\n\n---\n\n## Overview\n\n<div align=\"center\">\n  <img src=\"./docs/assets/demo.gif\" alt=\"OpenMobius-skill demo\" width=\"780\">\n  <br>\n  <sub>Works on <b>Claude Code</b>, <b>Codex</b>, <b>OpenClaw</b>, and <b>Hermes</b>.</sub>\n</div>\n\n<br>\n\nDrop this skill into your AI coding agent and ask trading questions in plain\nlanguage. The skill grounds every answer in a curated knowledge base + real\nmarket data — no hallucinated price levels, no generic \"looks bearish\"\nhand-waving.\n\n| You ask | The skill does |\n|---|---|\n| *\"What is Fair Value Gap, how to trade it?\"* | Vector-retrieves FVG concept card + related (CISD / OTE / Premium-Discount) — answers with cited rules from the knowledge base |\n| *Attach a BTCUSDT 1h chart + \"analyze this\"* | Identifies asset → fetches real OHLCV → extracts FVG / OB / sweep / displacement → outputs 5-section reply with **exact prices** + auto-annotated PNG |\n| *\"How is BTC 1h looking?\"* (no chart) | Live data fetch + built-in SMC structural indicator (BOS/CHoCH, Order Blocks, FVGs, equal H/L, premium-discount zones, strong/weak pivots) → KB-grounded analysis |\n| *\"What's <indicator> on BTC?\"* (user names a specific indicator) | Pass-through to the indicator API — no auto-fetch of indicators the user did not name |\n| *Paste a CSV of OHLCV* | Parses → local structural extraction (fallback when API unavailable) → KB cross-reference → 5-section reply |\n| *\"Generate a chart with my entry/SL/target\"* | Rendered chart via Playwright + lightweight-charts |\n\n---\n\n## Quick start\n\n```bash\ngit clone https://github.com/MobiusQuant/OpenMobius-skill.git /tmp/openmobius-src\ncd /tmp/openmobius-src\npython install.py --platform claude-code      # or codex / openclaw / hermes / all\n\nrm -rf /tmp/openmobius-src                     # ✓ clone is ephemeral; safe to delete\n```\n\nThe installer copies source files into `~/.claude/skills/OpenMobius-skill/`\n(or your chosen platform's skills dir), then in that directory:\n\n1. Creates `.venv/` and installs dependencies\n2. Downloads Playwright chromium (~280 MB, into your OS's user-global cache)\n3. Downloads `nomic-embed-text-v1.5` model (~274 MB, into your HuggingFace cache)\n4. Loads precomputed embeddings → builds vector index (~2 s)\n5. Generates the platform-specific `SKILL.md`\n6. Runs a health check\n\nEach platform install is **self-contained**: it owns its own `.venv` and\n`_index`. The clone is just a one-shot source bundle.\n\n**First run**: ~5–10 min · **Subsequent runs** (`python install.py --update`): <1 min\n\nAfter install, in your AI agent just ask:\n\n```\n\"What is Liquidity Sweep\"\n[attach chart] \"analyze this setup\"\n\"How is ETH 4h looking, give me a chart\"\n\"BTC 1h structure check\"\n```\n\n> **Prerequisites**: Python 3.10+. See [INSTALL.md](./INSTALL.md) for details.\n\n---\n\n## Platform support\n\n```bash\npython install.py --platform <name>\n```\n\n<div align=\"center\">\n\n| Platform | Flag | Default install path |\n|:---|:---|:---|\n| **Claude Code** | `--platform claude-code` *(default)* | `~/.claude/skills/OpenMobius-skill/` |\n| **Codex** | `--platform codex` | `~/.codex/skills/OpenMobius-skill/` |\n| **OpenClaw** | `--platform openclaw` | `~/.openclaw/skills/OpenMobius-skill/` |\n| **Hermes** | `--platform hermes` | `~/.hermes/skills/market-data/OpenMobius-skill/` |\n| Auto-detect | `--platform auto` | scans `~/.<agent>` dirs |\n| All four | `--platform all` | loops through all |\n\n</div>\n\nEach platform install is fully **self-contained** (its own `.venv`, its own\n`_index`). The nomic model and Playwright chromium live in your OS's\nuser-global cache, shared across platforms — so installing on N platforms\ndoesn't N× the download.\n\n---\n\n## Features\n\n### Knowledge base — 380 concepts + 584 cases\n\nDistilled from 130 ICT/SMC teaching videos. Each concept card carries:\nidentification rules, trading implications, common mistakes, related\nconcepts. Each case card carries: market context, key observation, analysis\nsteps, lessons. Retrieved via local ChromaDB + multilingual\n`nomic-embed-text-v1.5` — no API key needed for retrieval.\n\n### Real-time data + 60+ indicators\n\nCrypto (Binance, Bybit, OKX, Hyperliquid), China A-shares, Hong Kong stocks,\nUS stocks, forex. Each indicator carries built-in analysis dimensions\n(`summary_focus`) that the agent reads to structure its answer rather than\ndumping raw numbers.\n\n### Two chart-generation paths\n\n| Path | Method | Output |\n|---|---|---|\n| Annotate user's image | PIL | Annotated copy preserving the original chart |\n| Generate fresh chart | lightweight-charts in headless chromium | New K-lines + FVG/OB rectangles + sweep lines + swing markers |\n\n### Auto-invoked by description matching\n\nThe `SKILL.md` description field triggers on natural-language questions. The\nskill routes to one of four workflows:\n[Q&A](./workflows/qna.md) ·\n[analyze](./workflows/analyze.md) ·\n[annotate](./workflows/annotate.md) ·\n[klines](./workflows/klines.md).\n\n---\n\n## Roadmap\n\n**Knowledge base**\n\n- **ICT/SMC coverage completion** — Round 1 distilled the ICT trunk from 130\n  teaching videos; upcoming rounds complete ICT sub-schools (Inner Circle\n  Mentorship, Silver Bullet, Power of 3 variants) and full SMC coverage.\n- **Fundamental knowledge base** — interpretation methodologies for news,\n  policy reads, economic releases (CPI / NFP / FOMC) and earnings seasons.\n- **Multi-school expansion** — beyond ICT/SMC, add Wyckoff (volume/price\n  action), VSA, Volume Profile / Market Profile, and classic Price Action\n  (Al Brooks style).\n\n**Indicators & tools**\n\n- **Expanded SMC indicator coverage** — the built-in SMC structural\n  indicator covers BOS/CHoCH, Order Blocks, FVGs, equal H/L, premium-\n  discount zones and strong/weak pivot labels today. Upcoming: Killzone\n  windows, Stop Run / Inducement events, and per-event probability\n  scoring as computable signals.\n\n**Access surfaces**\n\n- **Non-CLI entry points** — chat-bot integrations for users who don't run a\n  coding agent, so the knowledge base is reachable without the CLI.\n\n---\n\n## Architecture\n\n```\nOpenMobius-skill/\n├── SKILL.md                          # main entry (LLM reads this)\n├── SKILL.body.md                     # shared body (platform-neutral)\n├── platforms/                        # per-platform frontmatter\n│   └── claude-code.yaml / codex.yaml / openclaw.yaml / hermes.yaml\n├── workflows/                        # detailed sub-workflows\n│   └── qna.md / analyze.md / annotate.md / klines.md\n├── scripts/                          # CLI tools\n│   ├── kb_retrieve.py                # local vector retrieval\n│   ├── kb_klines.py                  # API client + feature extraction\n│   ├── kb_draw_annotation.py         # PIL annotation\n│   ├── kb_phase_b_to_c.py            # analysis JSON → annotated PNG\n│   ├── build_index.py                # build vector index\n│   ├── kb_doctor.py                  # env health check\n│   ├── chart_render/                 # lightweight-charts + headless chromium\n│   └── _lib/                         # embedder + retriever\n├── knowledge_base/                   # 380 concepts + 584 cases\n├── install.py                        # cross-platform installer\n└── README.md / INSTALL.md\n```\n\n---\n\n## Update / Uninstall\n\n```bash\n# Update\npython install.py --update\npython install.py --update --rebuild-index    # also rebuild vector index\n\n# Uninstall (soft — remove platform registration only)\npython install.py --uninstall\npython install.py --uninstall --platform all  # all platforms\n\n# Uninstall fully (.venv + index too)\npython install.py --uninstall --full\n\n# Full purge (also delete shared chromium + nomic caches — these may be\n# used by other projects on your machine, so confirm before running)\npython install.py --uninstall --purge --yes-i-know\n```\n\nSee [INSTALL.md](./INSTALL.md) for all flags.\n\n---\n\n## Troubleshooting\n\n```bash\n.venv/bin/python scripts/kb_doctor.py\n```\n\nReports the state of: venv, deps, nomic model, vector index, CJK fonts,\nskill registration, API connectivity.\n\nCommon issues:\n\n| Symptom | Fix |\n|---|---|\n| Chinese labels render as boxes | Install `fonts-noto-cjk` (Linux); macOS/Windows usually bundled |\n| API request fails | Check network; see `api.mobiusquant.ai/api/health` |\n| Skill not auto-invoking in Claude Code | Check `~/.claude/skills/OpenMobius-skill` exists; restart agent |\n| `chroma.sqlite3` not found | `.venv/bin/python scripts/build_index.py` |\n\n---\n\n## License\n\nApache 2.0 — see [LICENSE](./LICENSE).\nThird-party components: see [ATTRIBUTION.md](./ATTRIBUTION.md).\n\n## Contributing\n\nIssues and PRs welcome at\n<https://github.com/MobiusQuant/OpenMobius-skill/issues>.\n\n<div align=\"center\">\n<sub>Built for AI coding agents · Apache 2.0</sub>\n</div>\n","summary":"OpenMobius-skill is a trading-knowledge “skill” for AI coding agents like Claude Code, Codex, OpenClaw, and Hermes. It lets agents answer market-structure and SMC (smart money concepts) questions in plain language by grounding responses in a curated knowledge base of 964 cards, backed by real-time OHLCV data and extracted indicators such as Fair Value Gaps, order blocks, liquidity sweeps, and BOS/CHoCH. It also supports chart analysis with auto-annotation and can generate charts (including when a user provides entry/SL/targets) or parse pasted OHLCV/CSV as a fallback. Traders, quant-curious users, and developers using AI agents for market research will benefit from more precise, cited, data-driven explanations rather than generic pattern talk.","description":"ICT/SMC trading-knowledge skill for AI coding agents (Claude Code / Codex / OpenClaw / Hermes)","stars":364,"language":"Python"},{"owner":"jherrodthomas","repo":"robotics-skills-suite","url":"https://github.com/jherrodthomas/robotics-skills-suite","readme":"<div align=\"center\">\n\n<img src=\"assets/hero.svg\" alt=\"Robotics Skills Suite — 76 audit-ready Claude skills\" width=\"100%\"/>\n\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](LICENSE)\n[![Skills](https://img.shields.io/badge/Skills-76-blue)](skills/)\n[![Standards](https://img.shields.io/badge/Standards-ISO%2010218%20%7C%2013849%20%7C%2062061%20%7C%2012100%20%7C%209283%20%7C%2015066%20%7C%203691--4%20%7C%2062443%20%7C%20ROS2-green)]()\n[![Chain](https://img.shields.io/badge/Chain-Builder%20%2B%20Reviewer%20pairs-orange)]()\n[![Made for](https://img.shields.io/badge/Made%20for-Claude-purple)](https://claude.com)\n\nEvery artifact-producing skill is paired with a confirmation reviewer. Reviewer outputs include a visual dashboard with KPI tiles, charts, and findings tables.\n\n[About](#about) · [Quickstart](#quickstart) · [The Chain](#the-chain) · [Skills](#skills) · [Standards](#standards-covered) · [Why](#why)\n\n</div>\n\n---\n\n## About\n\nThe Robotics Skills Suite is a curated set of 38 builder + 38 matching reviewer skills that automate every structured xlsx deliverable in the modern industrial-robotics lifecycle — from ISO 12100 risk assessment through ISO 13849-1 PLr / IEC 62061 SIL determination, ISO 10218-2:2025 / ANSI R15.06 compliance matrices, ISO/TS 15066 cobot biomechanics, ISO 3691-4 AMR risk, OSHA 1910.147 LOTO, ROS2 architecture artifacts, ISO 9283 performance verification, FAT/SAT acceptance protocols, AI/ML governance (datasheets, model cards), and IEC 62443 industrial cybersecurity.\n\nEvery builder produces a multi-tab audit-ready xlsx workbook. Every reviewer produces a confirmation-measures checklist over that workbook with a visual dashboard. Skills hand off via stable xlsx contracts — change a number in the upstream Risk Assessment and every downstream skill in the chain (PLr → Compliance Matrix → Declaration of Conformity) consumes the new value automatically.\n\nThis is the natural counterpart to the [automotive-skills-suite](https://github.com/jherrodthomas/automotive-skills-suite) (152 skills, ISO 26262 / ISO/SAE 21434 / IATF 16949 / ASPICE / AUTOSAR / V&V). Together they cover the two largest standards-driven engineering verticals.\n\n### Who this is for\n\n- **Robot integrators** producing ISO 10218-2 / ANSI R15.06 compliance documentation for every cell delivery\n- **OEM machine builders** generating CE marking / ANSI safety files at scale\n- **Cobot deployers** running ISO/TS 15066 biomechanical validation, SSM, and PFL plans\n- **AMR / AGV operators** executing ISO 3691-4 risk assessments and fleet manager architectures\n- **ROS2 development teams** producing system architecture, URDF, behavior tree, Nav2, and TF spec documents\n- **OT cybersecurity teams** running IEC 62443-3-2 risk assessments and zone & conduit segmentation\n- **AI/ML in robotics teams** producing datasheets for datasets, model cards, and perception test catalogs\n\n<div align=\"center\">\n<img src=\"assets/clusters.svg\" alt=\"Ten skill clusters — 38 builder + reviewer pairs\" width=\"100%\"/>\n</div>\n\n## Robot types covered\n\n<div align=\"center\">\n<img src=\"assets/robot-types.svg\" alt=\"Robot types covered by the suite\" width=\"100%\"/>\n</div>\n\nThe suite covers six classes of robots — 6-axis industrial arms, collaborative robots, SCARA, driverless industrial trucks, autonomous mobile robots, plus Cartesian gantries and a placeholder lane for UAS that ships in v2. Each class maps to a specific cluster of skills.\n\n## Safety mechanisms covered\n\n<div align=\"center\">\n<img src=\"assets/safety-mechanisms.svg\" alt=\"Safety mechanisms covered by the suite\" width=\"100%\"/>\n</div>\n\nThe six core safeguarding patterns every integrator needs to document — Speed and Separation Monitoring, Power and Force Limiting, E-stop and dual-channel safety architecture, light curtains and presence sensing, lockout/tagout, and IEC 62443 zone & conduit segmentation. Each is the subject of a builder + reviewer pair (most have several).\n\n---\n\n## What this is\n\nA curated set of 38 builder skills + 38 matching confirmation reviewer skills that automate the structured xlsx deliverables required across industrial robotics and AMR engineering:\n\n- **Machinery safety** (ISO 12100 risk → ISO 13849-1 PLr / IEC 62061 SIL → compliance matrix → DoC)\n- **Industrial + collaborative robots** (ISO 10218-1/-2:2025, ISO/TS 15066 cobot biomechanics, SSM, PFL, hand-guiding)\n- **Autonomous mobile robots** (ISO 3691-4, ANSI/RIA R15.08, fleet manager architecture, wireless coexistence)\n- **Cell design** (cell layout, EOAT, safety I/O matrix, E-stop architecture)\n- **Operations** (SOP, LOTO per OSHA 1910.147, operator training matrix)\n- **ROS2 software architecture** (system architecture, URDF, behavior trees, Nav2, TF tree)\n- **V&V** (ISO 9283 performance, FAT/SAT acceptance, HIL test catalog, field acceptance)\n- **AI/ML governance** (datasheets for datasets, model cards, perception test catalog)\n- **Industrial cybersecurity** (IEC 62443 risk assessment, OT asset inventory, zone & conduit plan)\n\nEach skill is an installable `.skill` file. Like the automotive suite, the chain is the moat — every downstream skill consumes the upstream skill's xlsx output as a stable file-format contract.\n\n## Quickstart\n\n1. Download a `.skill` file from `skills/` (or grab `robotics-skills-suite-bundle-76.zip` for all 76)\n2. Click \"Save skill\" in Cowork / Claude Desktop to install\n3. Trigger by phrasing — every skill declares its triggering description in its frontmatter\n\n```\nExample: install ISO 12100 risk assessment, then ask Claude\n\"Run an ISO 12100 risk assessment on a new cobot palletizing cell\"\n```\n\n## The chain\n\n<div align=\"center\">\n<img src=\"assets/lifecycle-chain.svg\" alt=\"Robotics skills lifecycle chain\" width=\"100%\"/>\n</div>\n\n```\nISO 12100 Risk Assessment → Machinery Safety Lifecycle Plan → Robot Cell Scope\n                                       ↓\n                ISO 13849-1 PLr / IEC 62061 SIL determination\n                                       ↓\n                ISO 10218-1/2 (or ANSI R15.06) Compliance Matrix\n                                       ↓\n                              Declaration of Conformity (CE)\n\nCobot lane:\nISO/TS 15066 Biomechanical Limits → SSM Plan / PFL Plan / Hand-Guiding\n\nAMR lane:\nISO 3691-4 Risk Assessment → Operating Envelope → Fleet Manager Architecture\n                                                  → Wireless Coexistence Plan\n\nCell + Operational lane:\nCell Layout → EOAT Spec → Safety I/O Matrix → Interlock + E-Stop Architecture\n                                                  → SOP → LOTO → Operator Training\n\nROS2 lane:\nROS2 System Architecture → URDF Spec → Behavior Tree Spec → Nav2 Config → TF Tree\n\nV&V lane:\nISO 9283 Performance → Acceptance Protocol (FAT/SAT) → HIL Catalog → Field Acceptance\n\nAI/ML governance:\nDataset Documentation → Model Card → Perception Test Catalog\n\nCybersecurity:\nIEC 62443 Risk Assessment → OT Asset Inventory → Zone & Conduit Plan\n```\n\nEvery box has a builder skill AND a matching reviewer skill.\n\n## Skills\n\n### Foundation (3 pairs)\n| Skill | Standard |\n|-------|----------|\n| `iso12100-risk-assessment-builder` + reviewer | ISO 12100 |\n| `machinery-safety-lifecycle-plan-builder` + reviewer | ISO 13849-1 / IEC 62061 |\n| `robot-cell-scope-builder` + reviewer | ISO 10218-2, ANSI R15.06 |\n\n### Compliance & Integrity (5 pairs)\n| Skill | Standard |\n|-------|----------|\n| `iso13849-plr-builder` + reviewer | ISO 13849-1 |\n| `iec62061-sil-builder` + reviewer | IEC 62061 |\n| `iso10218-compliance-matrix-builder` + reviewer | ISO 10218-1/-2:2025 |\n| `ansi-r1506-compliance-matrix-builder` + reviewer | ANSI/RIA R15.06-2012 R2017 |\n| `declaration-of-conformity-builder` + reviewer | EU Machinery Reg 2023/1230 |\n\n### Cobot (4 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `iso15066-biomechanical-limits-builder` + reviewer | Per body region force/pressure limits with measured values |\n| `ssm-plan-builder` + reviewer | Speed & Separation Monitoring with Sp formula |\n| `pfl-plan-builder` + reviewer | Power & Force Limiting with biofidelic measurements |\n| `cobot-hand-guiding-builder` + reviewer | Hand-guiding device + 3-position enabling switch design |\n\n### AMR / Mobile (4 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `iso3691-4-risk-assessment-builder` + reviewer | Driverless industrial truck risk assessment |\n| `operating-envelope-builder` + reviewer | Hazard zone map (operational/restricted/no-go/charging) |\n| `fleet-manager-architecture-builder` + reviewer | Multi-AMR coordination with VDA 5050 |\n| `wireless-coexistence-plan-builder` + reviewer | Wi-Fi / UWB / 5G channel planning + EMC |\n\n### Cell Design (4 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `robot-cell-layout-builder` + reviewer | Cell footprint, fence, light curtain, work zones |\n| `eoat-spec-builder` + reviewer | End-of-arm tooling spec |\n| `safety-io-matrix-builder` + reviewer | F-DI / F-DO matrix with category + response time |\n| `interlock-estop-architecture-builder` + reviewer | E-stop network with Cat B/1/2/3/4 ratings |\n\n### Operational (3 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `robot-sop-builder` + reviewer | Pre-start, normal op, fault recovery, shutdown |\n| `loto-procedure-builder` + reviewer | OSHA 1910.147 lockout/tagout |\n| `operator-training-matrix-builder` + reviewer | Per-role qualification matrix |\n\n### ROS2 (5 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `ros2-system-architecture-builder` + reviewer | Node, topic, service, action, lifecycle, DDS QoS |\n| `urdf-model-spec-builder` + reviewer | URDF/xacro kinematic + inertial spec |\n| `behavior-tree-spec-builder` + reviewer | BehaviorTree.CPP node + blackboard spec |\n| `nav2-config-builder` + reviewer | Nav2 costmap + planner + recovery config |\n| `tf-tree-spec-builder` + reviewer | TF tree per REP 105 / REP 103 |\n\n### V&V (4 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `iso9283-performance-test-builder` + reviewer | Pose accuracy, repeatability, path velocity |\n| `robot-acceptance-protocol-builder` + reviewer | FAT + SAT protocol with customer signoff |\n| `robot-hil-test-catalog-builder` + reviewer | Sensor fault, comm loss, power fault, E-stop tests |\n| `robot-field-acceptance-builder` + reviewer | OEE-based on-site acceptance with handover |\n\n### AI / ML Governance (3 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `dataset-documentation-builder` + reviewer | Datasheets for Datasets (Gebru et al.) |\n| `model-card-builder` + reviewer | Mitchell et al. model cards with per-slice fairness |\n| `perception-test-catalog-builder` + reviewer | Edge cases + adversarial + FP/FN scenarios |\n\n### Industrial Cybersecurity (3 pairs)\n| Skill | What it produces |\n|-------|------------------|\n| `iec62443-risk-assessment-builder` + reviewer | IEC 62443-3-2 risk with SL-T per FR1-FR7 |\n| `ot-asset-inventory-builder` + reviewer | IACS asset register with firmware + patch status |\n| `zone-conduit-plan-builder` + reviewer | Zone segmentation + conduit protocol allowlists |\n\n## Standards covered\n\nISO 12100:2010 · ISO 13849-1:2023 · IEC 62061:2021 · ISO 10218-1/-2:2025 · ISO/TS 15066:2016 · ISO 3691-4:2020 · ANSI/RIA R15.06-2012 R2017 · ANSI/RIA R15.08-1/-2/-3 · ISO 9283:1998 · OSHA 1910.147 · OSHA 1910.212 · EU Machinery Directive 2006/42/EC · EU Machinery Regulation 2023/1230 · IEC 62443 series · IEC 61508 · REP 105 / REP 103 · ROS 2 Humble / Iron / Jazzy · Mitchell et al. Model Cards · Gebru et al. Datasheets for Datasets · ISO/IEC 5469 (AI in safety systems) · VDA 5050\n\n## Why\n\nEvery robot integration project ships an avalanche of structured deliverables — most teams maintain them in xlsx, painstakingly hand-edited, with low audit-trail consistency. This suite turns each phase into a builder + reviewer pair where:\n\n- The **builder** produces the structured xlsx output from a JSON input plus the upstream artifact\n- The **reviewer** runs a confirmation-measures checklist on the builder's output and produces a visual dashboard with KPIs, charts, and findings\n\nThe chain compounds because phases hand off via stable xlsx contracts. A change upstream (Risk Assessment) automatically propagates to every downstream skill that consumes it (PLr → Compliance Matrix → DoC).\n\n## Common patterns across the suite\n\n- All builder outputs use NAVY/Calibri styling with PLr/SIL color coding\n- All reviewer outputs include visual dashboards (KPI tiles, pie chart, compliance bar, stacked rating breakdown by section, findings table)\n- Reviewers never modify source artifacts — gaps land in Recommended Actions\n- Every builder is paired with a reviewer for confirmation-measures compliance\n\n## Repo structure\n\n```\nrobotics-skills-suite/\n├── skills/                              # 76 .skill bundles, install individually\n├── robotics-skills-suite-bundle-76.zip  # All 76 skills in one download\n├── README.md\n└── LICENSE\n```\n\n## Companion suite\n\nThe [Automotive Skills Suite](https://github.com/jherrodthomas/automotive-skills-suite) covers ISO 26262, ISO/SAE 21434, ISO 21448, AIAG-VDA, ASPICE, AUTOSAR, diagnostics, calibration, MBSE, SysML, and V&V — 152 skills in the same builder + reviewer pattern.\n\n## License\n\nMIT — see LICENSE file.\n\n---\n\n<div align=\"center\">\n\nBuilt with Claude. Designed for robotics integrators, machine builders, and safety engineers shipping real cells.\n\n</div>\n","summary":"The Robotics Skills Suite is an open-source set of structured “builder” and “reviewer” skills that automates audit-ready documentation across the industrial-robotics lifecycle. It generates multi-tab XLSX workbooks for key safety, compliance, performance, acceptance, ROS2 architecture, and AI/ML governance artifacts, and pairs each builder output with a reviewer that confirms results via checklists and a visual KPI dashboard (with findings tables). The skills are linked through stable XLSX contracts so that updating upstream values automatically propagates through downstream documents, including standards-driven chains like ISO 12100 → ISO 13849-1 / IEC 62061 determinations and compliance matrices toward declaration-style outputs. This is especially useful for robot integrators, OEM/industrial machine builders, cobot and AMR/AGV teams, ROS2 developers, OT cybersecurity groups, and AI/ML teams that need consistent, traceable, standards-aligned deliverables at scale.","description":"76 audit-ready Claude skills automating the industrial robot, cobot, AMR, ROS2, V&V, AI/ML, and IEC 62443 lifecycle. 38 builder + reviewer pairs anchored to ISO 10218, 13849, 62061, 12100, 9283, 15066, 3691-4, and IEC 62443.","stars":538,"language":null},{"owner":"louisedesadeleer","repo":"clipify","url":"https://github.com/louisedesadeleer/clipify","readme":"# Clipify\n\nA [Claude Code](https://claude.com/claude-code) skill that turns long videos into social-ready clips.\n\n![Clipify turns long videos into 9:16 social clips](assets/preview.png)\n\nPoint it at any video file and it will:\n\n1. **Find clip-worthy segments** — transcribes the video with [Whisper](https://github.com/openai/whisper) and scans the transcript for punchlines, reversals, awkward pauses, and audio peaks to propose 3–5 candidates.\n2. **Create a 9:16 clip** — cuts your chosen moment, then reframes 16:9 → 9:16 with hard-cut pans that follow whoever is speaking (or split-screen if you'd rather see both faces).\n3. **Add subtitles** — burns opus-style word-by-word captions (big bold white, yellow active-word highlight).\n\nNo cloud APIs. Runs entirely on your machine. No OpenCV. ~20s of work for a 20s clip on Apple Silicon.\n\n## Why this exists\n\nMost \"auto-clip\" tools are either expensive SaaS, slow, or produce slop. This skill is what I actually use to clip my long-form videos for LinkedIn and TikTok. Built for talking-head dialogue (interviews, podcasts, two-person setups).\n\n## Requirements\n\n- macOS (uses VideoToolbox for hardware-accelerated decode — works on Linux/Windows if you remove `-hwaccel videotoolbox` flags)\n- [Claude Code](https://claude.com/claude-code)\n- `ffmpeg` with `libx264` (`brew install ffmpeg`)\n- [`whisper`](https://github.com/openai/whisper) (`pip install openai-whisper`)\n- Python 3 with `numpy` (`pip install numpy`)\n\n## Install\n\n```bash\ngit clone https://github.com/louisedesadeleer/clipify.git ~/.claude/skills/clipify\n```\n\nThat's it. Restart Claude Code and `/clipify` is available as a slash command.\n\n## Usage\n\nIn Claude Code:\n\n```\n/clipify\n```\n\nThen paste a video file path when asked. The skill will:\n\n1. Transcribe → propose 3–5 funny candidate clips with timestamps and titles\n2. Ask which to cut\n3. Ask 9:16 / 16:9 / 1:1\n4. If 9:16 from 16:9 with two faces: ask pan vs split-screen\n5. Ask subtitle style (opus / karaoke / minimal — or paste a reference image to match)\n6. Render and open the result\n\nFinal clips land in `<source-video-dir>/clipify_out/`.\n\n## How the face-pan works\n\nNo face detection model. Camera is static within a single clip, so:\n\n1. Eyeball each face's mouth+chin area as a rectangle on one sample frame.\n2. ffmpeg computes per-frame motion energy in each rectangle using frame differencing.\n3. Whichever rectangle has more motion at a given moment = that's the speaker.\n4. Build a hard-cut x-coordinate expression from the speaker timeline.\n5. Crop a vertical strip from the source that follows whoever's talking.\n\nTotal cost: a few seconds of ffmpeg per clip. Works surprisingly well.\n\n## Repo structure\n\n```\nclipify/\n├── SKILL.md           # the skill prompt Claude Code reads\n├── scripts/\n│   ├── analyze.py     # speaker timeline from two ROI motion files\n│   ├── build_pan.py   # ffmpeg crop x-expression with hard cuts\n│   ├── build_ass.py   # opus/karaoke/minimal ASS captions from whisper JSON\n│   └── audio_align.py # find offset of a sub-clip in a longer source\n└── README.md\n```\n\n## License\n\nMIT — see [LICENSE](LICENSE).\n\nBuilt by [Louise de Sadeleer](https://github.com/louisedesadeleer), Growth at [Tella](https://tella.tv).\n","summary":"Clipify is a Claude Code skill that automatically turns long talking-head videos into social-ready short clips by finding and extracting the best moments. It transcribes input videos locally with Whisper, identifies likely “clip-worthy” segments from the transcript, and then renders a 9:16 (or alternative aspect ratio) cut with reframing that follows the active speaker, including optional split-screen behavior for two-person setups. The tool burns subtitles in multiple styles and avoids cloud APIs and heavy dependencies like OpenCV, aiming for fast on-device performance. It’s well-suited for creators and teams who routinely repurpose podcasts, interviews, and other dialogue-heavy content for platforms like LinkedIn and TikTok.","description":"Claude Code skill: turn long videos into social-ready clips. Auto-find funny moments, cut, reframe to 9:16 with face-tracking, and burn opus-style captions.","stars":396,"language":"Python"},{"owner":"remotion-dev","repo":"html-in-canvas","url":"https://github.com/remotion-dev/html-in-canvas","readme":"\n\n\n# Remotion HTML-in-canvas examples\n\nShows the capabilities of [HTML-in-canvas](https://www.remotion.dev/docs/html-in-canvas) and Remotion using the [`<HtmlInCanvas>`](https://www.remotion.dev/docs/remotion/html-in-canvas) component.\n\n## Magnifying Glass\n\nhttps://github.com/user-attachments/assets/23142326-fa95-4783-a8c6-bffffead87cd\n\n\n\n\nSource: [`src/MagnifyingGlass/`](src/MagnifyingGlass)\n\n## Crt\n\nhttps://github.com/user-attachments/assets/a59b7549-4b89-46c3-821a-9a134c2689d2\n\nSource: [`src/Crt/`](src/Crt)\n\nStarter Prompt:\n\n> use remotion best practices, especially HTML in canvas.  \n> create a CLI animation which first does \"npm create video\", then \"claude\" and asks to create a CRT effect using html-in-canvas.  \n> then, use html-in-canvas to make it look like an old computer. add a scanline filter and screen  \n> curvature to the composition.\n\n## Vintage\n\nhttps://github.com/user-attachments/assets/02d48660-6c77-4f1a-9941-ca318a226f94\n\nSource: [`src/Vintage/`](src/Vintage)\n\n## GlowingBarChart\n\nhttps://github.com/user-attachments/assets/4797f7aa-c5ce-4c93-9e1f-3e22bdcfa038\n\nSource: [`src/CenteredWhitePaper/`](src/CenteredWhitePaper)\n\n## StorePeel\n\nhttps://github.com/user-attachments/assets/bd5d6110-12bf-48d7-9317-9f3f4728b206\n\nSource: [`src/CubeTransitionCard/`](src/CubeTransitionCard)\n\n## ArticleHighlight\n\nhttps://github.com/user-attachments/assets/8294d4c6-e4cd-48ef-a402-220bb72ce2fe\n\nSource: [`src/ArticleHighlight/`](src/ArticleHighlight)\n\nAdditional experiments live in [`src/Bonus/`](src/Bonus).\n\n## Commands\n\n**Install Dependencies**\n\n```console\nnpm i\n```\n\n**Start Preview**\n\n```console\nnpm run dev\n```\n\n**Render video**\n\n```console\nnpx remotion render\n```\n\n**Upgrade Remotion**\n\n```console\nnpx remotion upgrade\n```\n\n## Docs\n\nGet started with Remotion by reading the [fundamentals page](https://www.remotion.dev/docs/the-fundamentals).\n\n## Help\n\nWe provide help on our [Discord server](https://discord.gg/6VzzNDwUwV).\n\n## Issues\n\nFound an issue with Remotion? [File an issue here](https://github.com/remotion-dev/remotion/issues/new).\n\n## License\n\nNote that for some entities a company license is needed. [Read the terms here](https://github.com/remotion-dev/remotion/blob/main/LICENSE.md).\n","summary":"remotion-dev/html-in-canvas is a collection of Remotion examples that demonstrate how to use the HTML-in-canvas approach (via Remotion’s `<HtmlInCanvas>` component) to combine regular HTML/CSS-like visuals with frame-accurate video rendering. The repo includes multiple creative compositions such as magnifying glass effects, CRT/terminal-style styling, vintage screen treatments, chart highlights, and various transition and “bonus” experiments. It’s most useful for Remotion developers, designers, and content creators who want to learn practical patterns for building stylized UI animations and effects by rendering HTML into video. People experimenting with authenticity effects like scanlines, glow, and screen curvature will find these demos especially helpful.","description":null,"stars":177,"language":"TypeScript"},{"owner":"Dsadd4","repo":"AgentFigureGallery","url":"https://github.com/Dsadd4/AgentFigureGallery","readme":"# AgentFigureGallery\n\n[![English](https://img.shields.io/badge/lang-English-007ec6.svg)](README.md)\n[![简体中文](https://img.shields.io/badge/lang-%E7%AE%80%E4%BD%93%E4%B8%AD%E6%96%87-c0392b.svg)](README.zh-CN.md)\n\n[![License: MIT](https://img.shields.io/badge/license-MIT-blue.svg)](LICENSE)\n[![Python 3.10+](https://img.shields.io/badge/python-3.10%2B-3776ab.svg)](pyproject.toml)\n[![Full KB](https://img.shields.io/badge/full--public-16k%2B%20references-0f766e.svg)](docs/REMOTE_FULL_VALIDATION.md)\n[![Hugging Face Dataset](https://img.shields.io/badge/Hugging%20Face-dataset-ffcc00.svg)](https://huggingface.co/datasets/dsadd4/AgentFigureGallery)\n\nAgentFigureGallery is a scientific plotting reference gallery for Claude Code, Codex, Cursor, and other coding agents.\nIt lets an agent search real figure references, lets you mark examples as liked, rejected, or selected in a browser gallery, and exports those choices as a reference bundle for plotting code.\n\n**Quick install for Codex:**\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/Dsadd4/AgentFigureGallery/main/scripts/install.sh | bash\n```\n\nThe script clones or updates the repository at `$HOME/AgentFigureGallery`, creates a Python virtual environment, installs the package, and installs the Codex skill wrapper. After this bootstrap install, run the CLI as `~/AgentFigureGallery/.venv/bin/agentfiguregallery`, or activate the environment first:\n\n```bash\nsource ~/AgentFigureGallery/.venv/bin/activate\n```\n\nFor an editable manual install, see [Manual Install](#manual-install).\n\n![AgentFigureGallery dynamic demo](docs/assets/agentfiguregallery-demo.gif)\n\n```text\nagent query -> browser gallery -> human like/reject/select -> reference bundle -> pl
