algorithmic complexity and performance hotspots, and producing safe optimization reports.\n\n## Install\n\n```bash\nnpm install -g codex-complexity-optimizer\n```\n\nThe package installs the skill into:\n\n```bash\n${CODEX_HOME:-~/.codex}/skills/complexity-optimizer\n```\n\nYou can also run the installer directly:\n\n```bash\nnpx codex-complexity-optimizer\n```\n\n## Use\n\nIn Codex:\n\n```text\nUse $complexity-optimizer to analyze this codebase and give me a report.\n```\n\nBy default, report-only prompts do not modify files. The skill reports file/line, current complexity, recommended change, expected complexity after the change, risk level, and tests or benchmarks needed.\n\nTo apply a change, ask explicitly:\n\n```text\nUse $complexity-optimizer to implement the lowest-risk optimization from the report and run the relevant tests.\n```\n","summary":"Codex Complexity Optimizer is a specialized skill for the Codex platform designed to analyze codebases for algorithmic inefficiencies and performance bottlenecks. It generates detailed reports that identify specific file locations, assess complexity metrics, and suggest risk-aware optimizations alongside necessary testing requirements. Developers and software engineers looking to proactively improve application performance and maintain code quality will find this tool particularly useful for streamlining the optimization workflow.","description":"Codex skill for safe codebase complexity analysis and performance optimization reports","stars":882,"language":"Python"},{"owner":"Isoform","repo":"yansu-skill","url":"https://github.com/Isoform/yansu-skill","readme":"<div align=\"center\">\n\n# Yansu.skill\n\n> *\"Other agents start cold. Yansu.skill starts warm.\"*\n\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](LICENSE)\n[![Yansu](https://img.shields.io/badge/Yansu-Skill-d4603a)](https://yansu.app)\n\n[English](README.md) · [中文](README_ZH.md)\n\n<br>\n\n**Bespoke context, delivered to your agent. Prompt once, never re-introduce yourself.**\n\n[Yansu](https://yansu.app) listens, crystallizes, and quietly builds. **Yansu.skill** is how that crystallized knowledge reaches whichever agent you happen to be using — so it walks in already knowing how you actually work.\n\n<br>\n\n**Install** — paste this to your AI agent:\n\n</div>\n\n```\nInstall the Yansu skill for me:\n\n1. Fetch https://raw.githubusercontent.com/Isoform/yansu-skill/main/SKILL.md\n2. Save it under your own user-level skills directory as `yansu/SKILL.md`\n   (whatever path your agent reads skills from on this machine).\n3. Confirm the install path when done.\n```\n\n<div align=\"center\">\n\n[See it in action](#see-it-in-action) · [Features](#features) · [How it works](#how-it-works) · [Privacy](#privacy)\n\n</div>\n\n---\n\n## See it in action\n\nType `/yansu` to invoke the skill explicitly, or ask naturally and your agent will pull it in when it spots a continuity question.\n\n```\nYou      ❯ /yansu Why did that build fail again — the auth one?\n\nAgent    ❯ Same migration-lock issue from a few weeks back. You\n           worked around it last time by running the ALTER inside\n           a transaction with statement_timeout off. Want me to\n           apply that recipe?\n```\n\n```\nYou      ❯ /yansu Spin up the staging database\n\nAgent    ❯ You've done this twice. Your compose template lives\n           next door, and the first boot usually trips on the SSL\n           cert path. Starting from your last-known-good and\n           watching for the cert thing.\n```\n\n```\nYou      ❯ /yansu Pick the right tool for the job\n\nAgent    ❯ For this kind of task you usually reach for the same\n           three. The first one fits the shape of the problem,\n           and you've been getting cleaner output out of it since\n           you tuned the flags last week.\n```\n\nThis is not role-play. This is continuity.\n\n---\n\n## Features\n\n### Tribal Knowledge\n\nYour agent inherits everything Yansu has crystallized — every conversation, decision, hesitation, and pattern. Already structured, already tagged, already yours. The knowledge that used to live only in your head now lives wherever your agent does.\n\n### No Re-introduction\n\nYou still prompt your agent — you just stop re-explaining yourself. The agent already knows your tools, your workflows, the gotchas you've paid for. Say *\"help me ship the thing\"* and it knows what the thing is. Say *\"the bug from last week\"* and it knows which bug.\n\n### Distraction Free\n\nYansu.skill stays silent until your question actually needs personal context. No noisy preambles. No agent pretending to remember things it doesn't. Continuity when you need it, invisible when you don't.\n\n---\n\n## How it works\n\n**1. Yansu listens.** It observes how you work — your desktop, your messaging apps, the conversations and decisions that would otherwise vanish.\n\n**2. Yansu crystallizes.** Raw memory becomes structured, actionable knowledge — patterns you can reuse, not transcripts you'd never re-read.\n\n**3. Yansu.skill surfaces.** When your agent needs you, the skill hands over the relevant slice — one entry, one sentence, never the whole archive.\n\nYansu does the listening. The skill does the handoff.\n\n---\n\n## Privacy\n\n**Lives on your machine.** Your memory, your captured workflows, your generated knowledge — all stored locally. Not on our servers. On yours.\n\n**You hold the keys.** Nothing leaves your device through this skill. Delete an entry to make your agent forget it; uninstall the skill to disable the connection entirely.\n\n**Read-only by design.** Capture is Yansu's job. Recall is the skill's. The skill will never write back to your memory, your knowledge, or your machine.\n\n---\n\n## Honest boundaries\n\nA skill that won't tell you what it can't do is one you can't trust.\n\n- **It doesn't predict the future** — only your past, as captured by Yansu.\n- **It only knows what Yansu has seen** — if you've never used Yansu while doing X, your agent won't know about X.\n- **It is quiet by default** — it stays out of every turn that doesn't need it.\n\nA continuity layer that pretends to be omniscient isn't continuity. It is flattery.\n\n---\n\n## License\n\nMIT — see [LICENSE](LICENSE).\n\nBuilt for [Yansu](https://yansu.app) by [Isoform](https://github.com/Isoform).\n","summary":"Yansu.skill is a local “memory handoff” utility that delivers Yansu’s crystallized, structured knowledge into whichever AI agent you’re using, so the agent starts with relevant context rather than cold. It focuses on continuity by injecting the minimal slice of prior knowledge needed for the moment (and avoiding noisy re-introductions or irrelevant preambles). The project is designed for developers and operators who want their agent to remember their workflows, tools, and recurring gotchas across sessions while keeping all captured memory on their own machine.","description":"Bespoke context, delivered to your AI agent. Yansu observes how you actually work and crystallizes it into knowledge — this skill is how that knowledge reaches whichever agent you happen to be using. Prompt once, never re-introduce yourself.","stars":149,"language":null},{"owner":"goSprinto","repo":"compliance-skills","url":"https://github.com/goSprinto/compliance-skills","readme":"# Sprinto Compliance Skills\n\nA collection of agentic skills for compliance, security, and privacy-aware development.\nBuilt and maintained by [Sprinto](https://sprinto.com?utm_source=Claude&utm_medium=skill&utm_campaign=pii).\n\n---\n\n## Available Skills\n\n### [`pii-detector`](./pii-detector)\n\nAutomatic PII detection and privacy compliance checks for companies.\nFires during planning, code generation, and full repo audits — without being asked.\n\n**Covers**: CCPA, HIPAA, PCI-DSS, COPPA, GLBA, BIPA, FERPA, FTC Act  \n**Layers**: data models, auth, API, frontend, transit, lifecycle, testing, legal & consent\n\n---\n\n### [`gdpr-compliance-checker`](./gdpr-compliance-checker)\n\nFull GDPR gap analysis from a codebase scan. Assesses all 99 articles, produces a\n15-domain compliance dashboard, and ships a full document pack — DPA, ROPA, DPIA, LIA,\nbreach response, access governance, training, sub-processor register — pre-filled\nfrom your code. See a [sample report](./gdpr-compliance-checker/sample/gdpr-gap-analysis-acme-2025-05-25.docx)\nand the [skill README](./gdpr-compliance-checker) for the full template list.\n\n**Covers**: All 99 GDPR articles, ePrivacy Directive, EU AI Act (if AI/ML detected),\n27 EU/UK supervisory authorities, sector overlays (healthcare, fintech, adtech, children's)  \n**Outputs**: Gap analysis report + 8 document templates — as .docx, .xlsx, or .pdf\n\n---\n\n## Installation\n\nEach skill installs independently:\n\n```bash\n# Using npx (Node.js)\nnpx skills add gosprinto/compliance-skills/pii-detector\nnpx skills add gosprinto/compliance-skills/gdpr-compliance-checker\n\n# Latest version\nclaude skills add gosprinto/compliance-skills/pii-detector\nclaude skills add gosprinto/compliance-skills/gdpr-compliance-checker\n\n# Pin to a specific version\nclaude skills add gosprinto/compliance-skills/gdpr-compliance-checker@v1.0.0\n\n# Install globally across all projects\nclaude skills add --global gosprinto/compliance-skills/gdpr-compliance-checker\n```\n\n---\nVisit [Sprinto](https://sprinto.com?utm_source=Claude&utm_medium=skill&utm_campaign=pii) for more compliance solutions.\n\n[![Sprinto](https://sprinto.com/wp-content/uploads/2025/11/sprinto-site-logo-dark.png)](https://sprinto.com?utm_source=Claude&utm_medium=skill&utm_campaign=pii)\n","summary":"goSprinto/compliance-skills is a set of agentic “skills” designed to help developers build and maintain compliance-aware software. It includes an automated PII detector that performs privacy compliance checks across planning, code generation, and full repository audits, and a GDPR compliance checker that scans codebases to produce a comprehensive 99-article gap analysis plus a dashboard and pre-filled documentation pack (e.g., DPA, ROPA, DPIA, breach response). These skills support organizations that need practical, code-informed security and privacy governance—especially teams working in regulated industries or under GDPR/CCPA and similar frameworks. They’re particularly useful for engineering and compliance stakeholders who want faster auditing, clearer gaps, and reusable compliance artifacts.","description":null,"stars":122,"language":null},{"owner":"cosmicstack-labs","repo":"mercury-agent-skills","url":"https://github.com/cosmicstack-labs/mercury-agent-skills","readme":"# Mercury Skills\n\n<p align=\"center\">\n  <img src=\"assets/mercury-agent-skills-card.png\" alt=\"Mercury Skills\" width=\"75%\" style=\"max-width: 700px; height: auto;\">\n</p>\n\n<p align=\"center\">\n  <a href=\"https://skills.mercuryagent.sh\"><strong>Browse the registry</strong></a> •\n  <a href=\"https://mercuryagent.sh\"><strong>Mercury Agent</strong></a> •\n  <a href=\"./CATALOG.md\"><strong>Catalog</strong></a> •\n  <a href=\"./CONTRIBUTING.md\"><strong>Contribute</strong></a>\n</p>\n\n**An open-source library of `SKILL.md` playbooks for AI agents.** Browse and install on [skills.mercuryagent.sh](https://skills.mercuryagent.sh), or pull them directly from the [Mercury Agent](https://mercuryagent.sh) CLI.\n\n**128 skills across 23 categories** — hand-curated, production-ready, and compatible with every major agent: Mercury, Claude Code, Codex CLI, OpenClaw, Hermes, Cursor, and Gemini CLI.\n\n---\n\n## Quick Start\n\n### From the Mercury CLI (recommended)\n\n```bash\n# List what's available\nmercury skills search \"react patterns\"\n\n# Install one skill\nmercury skills install frontend/react-patterns\n\n# Install several at once\nmercury skills install ai-ml/prompt-engineering devops/docker security/threat-modeling\n```\n\nInstalled skills land in `~/.mercury/skills/<category>/<slug>/SKILL.md` and are picked up automatically by your agent.\n\n### From the web\n\nOpen [**skills.mercuryagent.sh**](https://skills.mercuryagent.sh), pick a skill, copy the install line for your agent — every skill page ships ready-made install steps for Mercury, Claude Code, Codex, OpenClaw, Hermes, and \"any other agent that understands SKILL.md\".\n\n### Clone the whole library\n\n```bash\ngit clone https://github.com/cosmicstack-labs/mercury-agent-skills.git\n```\n\nDrop individual skills into your agent's skills directory:\n\n| Agent | Skills directory |\n|---|---|\n| **Mercury** | `~/.mercury/skills/` |\n| **Claude Code** | `.claude/skills/` |\n| **Codex CLI** | `.codex/skills/` |\n| **OpenClaw** | `.openclaw/skills/` |\n| **Hermes** | `.hermes/skills/` |\n| **Cursor** | `.cursor/skills/` |\n| **Gemini CLI** | `.gemini/skills/` |\n| Any other | Wherever your agent reads `SKILL.md` from |\n\n---\n\n## Why Mercury Skills?\n\n| | |\n|---|---|\n| **Curated, not crowded** | Every skill is hand-written against real workflows — no AI slop, no duplicates. |\n| **Universal format** | One `SKILL.md` works in any agent that supports the standard. No per-agent forks. |\n| **Discoverable** | Full-text search, categories, tags, leaderboard, and live JSON feed on [skills.mercuryagent.sh](https://skills.mercuryagent.sh). |\n| **Installable** | One CLI command, no manual file copying. Atomic writes, version pinning, rollback on failure. |\n| **Open** | MIT licensed. Contributions welcome via PR — see [CONTRIBUTING.md](./CONTRIBUTING.md). |\n\n---\n\n## Browse on the Web\n\n[**skills.mercuryagent.sh**](https://skills.mercuryagent.sh) is the canonical browse-and-install surface for the library. It serves:\n\n- A searchable, categorized index of every skill in this repo\n- A trending leaderboard ranked by likes and installs\n- Per-skill detail pages with the full `SKILL.md`, install steps for every supported agent, and a copy-paste-ready install command\n- A bookmarking system so you can save skills for later (local, no account required)\n- Social share cards with per-skill OpenGraph imagery\n\nIt also exposes a public JSON feed at [`/api/feed.json`](https://skills.mercuryagent.sh/api/feed.json) and per-skill JSON at `/api/skills/<category>/<slug>` for tooling builders.\n\n---\n\n## Categories\n\n| Category | Skills | What's inside |\n|---|---|---|\n| [Development](./categories/development/) | 16 | Clean code, code review, debugging, testing, ADRs, documentation, refactoring, dependency hygiene |\n| [AI & ML](./categories/ai-ml/) | 11 | Prompt engineering, agent health, memory, delegation, handoffs, token budgets, error recovery, audit logging |\n| [Backend](./categories/backend/) | 9 | APIs, Node.js, Python, database design, auth, serverless, microservices, caching, message queues |\n| [Shop & Restaurant](./categories/shop-restaurant/) | 9 | Inventory, menu engineering, scheduling, reviews, daily pulse, table management, pricing, social, Zomato ordering |\n| [Frontend](./categories/frontend/) | 8 | React, Next.js, Tailwind, state management, testing, performance, responsive design, component systems |\n| [Creative & Personal Development](./categories/creative-personal-development/) | 8 | Storytelling, decision frameworks, standups, notes, repurposing, branding, validation, time blocking |\n| [DevOps](./categories/devops/) | 7 | Docker, CI/CD, Kubernetes, Terraform, monitoring, SRE, GitOps |\n| [Career](./categories/career/) | 5 | Resume writing, interview prep, career planning, LinkedIn, salary negotiation |\n| [Education & Learning](./categories/education-learning/) | 5 | Curriculum design, learning science, teaching methods, assessment, micro-learning |\n| [Finance & Legal](./categories/finance-legal/) | 5 | Financial analysis, budgeting, contracts, privacy compliance, risk management |\n| [Health & Wellness](./categories/health-wellness/) | 5 | Fitness, nutrition, mental health, sleep, habits |\n| [Mobile](./categories/mobile/) | 5 | iOS, Android, React Native, performance, App Store optimization |\n| [Testing & QA](./categories/testing-qa/) | 5 | Test strategy, E2E, performance testing, API testing, accessibility testing |\n| [Automation](./categories/automation/) | 10 | Screenshots, workflows, shell scripting, web scraping, X/Twitter automation, test automation, data sync, deployment automation, RPA, daily briefing |\n| [Media Download](./categories/media-download/) | 4 | yt-dlp wrappers, audio extraction, batch downloading, platform-specific patterns |\n| [PDF Generation](./categories/pdf-generation/) | 5 | Invoices, reports, branded documents, dynamic templating, markdown→PDF typesetting (any2pdf) |\n| [Presentation](./categories/presentation/) | 4 | Slide decks, narrative structure, stage delivery, visual hierarchy |\n| [Marketing](./categories/marketing/) | 3 | SEO, content strategy, distribution |\n| [Business](./categories/business/) | 2 | Negotiation, operations |\n| [Design](./categories/design/) | 2 | UI systems, accessibility |\n| [Product](./categories/product/) | 2 | Strategy, discovery |\n| [Security](./categories/security/) | 2 | Audit, secure coding |\n| [Data](./categories/data/) | 1 | Data engineering fundamentals |\n\nSee [CATALOG.md](./CATALOG.md) for the full skill-by-skill index.\n\n---\n\n## Skill Structure\n\nEvery skill is a single `SKILL.md` file with YAML frontmatter and a markdown body:\n\n```yaml\n---\nname: skill-name\ndescription: 'What this skill does and when to use it'\nmetadata:\n  author: cosmicstack-labs\n  version: 1.0.0\n  category: development\n  tags: [clean-code, refactoring, best-practices]\n---\n\n# Skill Name\n\nFull instructions, frameworks, scoring rubrics, and actionable guidance.\n```\n\nThe format is intentionally minimal so any agent runtime can parse it without custom tooling. See [CONTRIBUTING.md](./CONTRIBUTING.md) for the authoring standard.\n\n---\n\n## Try Mercury Agent\n\nThese skills are built for [**Mercury Agent**](https://mercuryagent.sh) — the agent runtime that consumes them natively.\n\n- **Second Brain** — persistent memory that learns from every session\n- **Skill system** — load, version, and update skills from this registry directly\n- **Permission guardrails** — safe by design, auditable by default\n- **Token budgets** — keep AI spend predictable\n- **Multi-channel** — CLI, Telegram, and web; same agent, same memory\n\n```bash\n# Install Mercury Agent\nnpm install -g @cosmicstack/mercury-agent\n\n# Pull a skill into your agent\nmercury skills install ai-ml/prompt-engineering\n\n# Browse what you have\nmercury skills list\n```\n\n[**Get started with Mercury →**](https://mercuryagent.sh)\n\n---\n\n## Ecosystem\n\n| Project | What it is |\n|---|---|\n| [**Mercury Agent**](https://mercuryagent.sh) | The agent runtime — CLI, Telegram, web — that loads these skills |\n| [**Mercury Skills (this repo)**](https://github.com/cosmicstack-labs/mercury-agent-skills) | The curated `SKILL.md` library |\n| [**skills.mercuryagent.sh**](https://skills.mercuryagent.sh) | The browse-and-install web platform powered by this repo |\n\nBuilt and maintained by [Cosmic Stack](https://cosmicstack.org).\n\n---\n\n## Contributing\n\nWe accept new skills, fixes, and refinements via pull request.\n\n- **Author a skill** — see the standard in [CONTRIBUTING.md](./CONTRIBUTING.md)\n- **Fix or improve an existing skill** — open a PR with a clear changelog note\n- **Request a category** — open an issue with the proposed scope\n\nEvery merged contribution lands on [skills.mercuryagent.sh](https://skills.mercuryagent.sh) within the hour via an automated sync.\n\n---\n\n## License\n\nMIT — see [LICENSE](./LICENSE).\n\n<p align=\"center\">\n  <sub>Built by <a href=\"https://cosmicstack.org\">Cosmic Stack</a> · Powered by <a href=\"https://mercuryagent.sh\">Mercury Agent</a></sub>\n</p>\n","summary":"Mercury-Agent-Skills is an open-source library of hand-curated `SKILL.md` playbooks for AI agents, designed to be easy to browse and install. It provides 128 production-ready skills across 23 categories and a universal format that works across multiple agent clients, including Mercury, Claude Code, Codex CLI, OpenClaw, Hermes, Cursor, and Gemini CLI. Users can search and install individual skills via the Mercury CLI or use the skills registry web interface for copy-paste-ready install instructions. This project is well-suited for developers and teams who want reliable, workflow-aligned agent instructions without maintaining their own skill catalog.","description":"A curated registry of reusable Mercury Agent, Open Claw or Hermes Agent skills designed for real developer workflows, persistent memory, and token-efficient execution.","stars":224,"language":"JavaScript"},{"owner":"shenli","repo":"distributed-system-testing","url":"https://github.com/shenli/distributed-system-testing","readme":"# Distributed Systems Testing Skills\n\n**Two skills for AI coding agents that design and run claim-driven\ntests for distributed and stateful systems.** Together they produce a\nstructured Markdown test plan and a findings report with 10-state\nverdicts and an explicit SUT / harness / checker / environment blame\nclassification. A reviewer reads the two artifacts and decides\nwhether to ship; nothing else has to be re-run.\n\nWorks with Claude Code, Codex, Copilot CLI, Cursor, Gemini, or any\nagent that reads Markdown and runs shell. The skills are plain\nSKILL.md files. The agent executes them; the plan and findings\nreport are the output.\n\nOne skill designs the plan. The other runs it. A plan starts from\nthe product's claims, generates hypotheses tied to those claims, and\nwrites scenarios named after the claim each tries to falsify. For\nconsistency-critical scenarios, each scenario also binds an abstract\nmodel (`register | queue | log | lock | lease | ledger | …`) to an\noperation-history schema, a named checker, and a nemesis with\nobservable landing evidence. The plan ends with a coverage adequacy\nargument and a conservative confidence statement.\n\n## Why\n\nThe default for testing distributed and stateful systems — write a\nfew integration tests and call it done — finds a small fraction of\nthe bugs that actually break these systems in production: partial\nnetwork partitions, non-deterministic concurrency, crash-recovery,\nupgrade/rollback, idempotency under replay, timing-sensitive ordering.\n\nThese skills enforce an opinionated workflow that pulls from the\nfield's hard-won knowledge:\n\n- **Claim-driven, not test-driven.** Start from what the product\n  promises. Every scenario falsifies one claim under one fault. A\n  test named after its claim is harder to weaken than one named\n  after its setup.\n- **Coverage adequacy is a deliverable.** The plan ends with an\n  argument that the chosen scenarios are *enough* to ship, plus an\n  honest list of what stays unverified.\n- **Reuse the SUT's own toolbox.** The execute skill discovers\n  existing tests, runbooks, and fault-injection scaffolding before\n  inventing anything new.\n- **Model + history + checker, not just chaos.** For safety,\n  durability, idempotency, isolation, ordering, or membership\n  claims, every scenario declares an abstract model, an\n  operation-history schema, a named checker (linearizability,\n  serializability, session-consistency, no-lost-ack, exactly-once,\n  …), and how it treats ambiguous outcomes (timeouts, unknown\n  commits, retries). Chaos plus a model and a checker, not chaos\n  alone.\n- **No silent passes.** Every PASS cites oracle execution evidence\n  *and* the signal proving the fault actually fired. Verdicts come\n  from a 10-state set, so \"the chaos script ran cleanly\" can't be\n  read as \"the claim survived the fault.\" Every FAIL carries a\n  SUT / harness / checker / environment blame tag so reproducers\n  reach the right queue.\n\n## What you get\n\nEnd-to-end, the two skills produce:\n\n```\ntesting-plans/<slug>.md             ← plan with §0–§9 (see below)\ntest-sessions/<UTC>/\n  ├── session-log.md                 ← timeline + toolbox + env probe\n  ├── logs/                          ← per-scenario stdout/stderr\n  ├── metrics/                       ← metric snapshots\n  ├── artifacts/                     ← ephemeral harnesses, dumps\n  └── findings/\n      ├── <scenario>.md              ← per-scenario verdict (written as run proceeds)\n      └── report.md                  ← summary + adequacy + confidence delta\n```\n\nThe plan structure (a reviewer can read this and decide whether to\nship without re-running the tests):\n\n```\n0. Architectural summary       — system as it actually exists\n1. Scope\n1b. Claims under test          — the spine\n1c. Missing claims discovered  — docs ↔ code drift\n2. SUT model\n3. Existing test inventory     — what's already covered\n4. Failure-mode hypotheses     — tied to claim IDs\n5. Coverage matrix             — claim × hypothesis\n6. Technique selection         — from the catalog\n6b. Environment requirements\n7. Scenarios                   — each named after the claim, with\n                                  Target test file + Skeleton\n   7.M Model / history /       — mandatory when the scenario falsifies\n       checker discipline        a claim in {safety, durability,\n                                  idempotency, isolation, ordering,\n                                  membership}: model under test,\n                                  operation-history schema, named\n                                  checker, nemesis + landing evidence,\n                                  ambiguous-outcome handling, reduction\n                                  plan (SUT/harness/checker/env blame)\n7b. Coverage adequacy argument — why these tests are enough\n7c. Residual uncertainty       — what stays unverified, and why ok\n7d. Confidence statement       — the reviewer's verdict\n8. What this plan does NOT cover\n9. Open questions / followups\n```\n\n### Example §7.M block (excerpt from a plan)\n\n```\n### Scenario S3: linearizable_append_under_partition\n- Falsifies if it FAILs: C1 (every acknowledged append is durable\n  and linearisable), C5 (leader election completes within 5s)\n- Workload: 8 clients, 70% append / 30% read, 5min, key-skew zipf\n- Faults: asymmetric partition isolating current leader at T+60s\n  for 30s\n- Oracle: linearizability via Porcupine over per-key histories\n\n§7.M (model / history / checker discipline)\n- Model under test:    log\n- Operation history:   default 11-field schema (op id, process id,\n                       invoke/complete ts, op type, key, input,\n                       output, error, timeout marker, node seen,\n                       fault epoch). Recorded in-process + server-\n                       side audit.\n- Checker:             linearizability (Porcupine) per-key, then\n                       no-lost-ack against final state\n- Nemesis + landing:   asymmetric-partition (iptables drop one\n                       direction). Landing evidence = iptables drop\n                       counter goes 0 → 14,712 over the 30s window\n                       AND raft log emits \"leader-lost; starting\n                       election\" within 2s of injection.\n- Ambiguous outcomes:  timeouts → timeout_marker=true, complete_ts\n                       =null, treated as could-have-succeeded;\n                       retries are separate ops sharing input\n- Reduction plan:      if FAIL, bisect fault window + fix seed, then\n                       classify SUT / harness / checker / environment\n                       per references/test-case-reduction.md\n```\n\n### Example findings-report row\n\n| ID | Verdict             | Nemesis landing evidence                              | Reduction class |\n|----|---------------------|-------------------------------------------------------|-----------------|\n| S3 | `PASS-hardening`    | iptables ctr 0→14,712; raft re-election at T+1.8s     | n/a             |\n| S4 | `FAIL-reproducible` | partition landed; Elle: G2-item anomaly on key K17    | SUT             |\n| S7 | `INCONCLUSIVE-fault-not-proven` | iptables rule installed but counter stayed 0 — wrong chain | harness |\n| S9 | `PARTIAL-model`     | landing ok; checker covered per-key, not cross-key    | n/a             |\n\n(The full findings template carries Oracle, Oracle execution evidence,\nartifact links, an adequacy-vs-plan section, and a confidence delta —\nsee `skills/executing-distributed-system-tests/assets/findings-report-template.md`.)\n\n## Install (one line, any agent)\n\nPaste this at any AI coding agent (Claude Code, Codex, Copilot CLI,\nCursor, Gemini, or anything else that reads Markdown and runs shell):\n\n```\nRead https://raw.githubusercontent.com/shenli/distributed-system-testing/main/INSTALL.md\nand follow the instructions to install and configure\ndistributed-testing-skills for this agent.\n```\n\nThe agent fetches [`INSTALL.md`](INSTALL.md), clones the repo to\n`~/.local/share/distributed-testing-skills/`, and wires the skills in\n(symlinks under `~/.claude/skills/` for Claude Code, a pointer block\nin `~/AGENTS.md` for other agents).\n\nAfter that, ask any agent on the machine to \"design a test plan for\nthis system\" or \"execute the plan at X\" and it'll follow the\nSKILL.md workflow.\n\n### Update\n\n**Paste the same one-liner again.** `INSTALL.md` is idempotent:\nif the install path exists, it does `git pull --ff-only`; if not,\nit does `git clone`. Symlinks always point at the cloned content\nso they pick up the new version automatically. The `~/AGENTS.md`\npointer block uses HTML markers and is replaced cleanly on each\nrun — no duplication.\n\nIf you have local edits to the cloned skills, `git pull --ff-only`\nwill fail; the agent will stop and ask before discarding them.\n\n### Manual install (if you'd rather see what's happening)\n\n```bash\ngit clone https://github.com/shenli/distributed-system-testing.git \\\n    ~/.local/share/distributed-testing-skills\n\n# Claude Code: symlink under ~/.claude/skills/\nmkdir -p ~/.claude/skills\nln -snf ~/.local/share/distributed-testing-skills/skills/designing-distributed-system-tests \\\n    ~/.claude/skills/designing-distributed-system-tests\nln -snf ~/.local/share/distributed-testing-skills/skills/executing-distributed-system-tests \\\n    ~/.claude/skills/executing-distributed-system-tests\n\n# Codex / Copilot CLI / Cursor / Gemini / others: see INSTALL.md\n```\n\n## Usage\n\nOnce the skills are installed, you have two ways to drive them:\n\n**Casual ask (Claude Code with auto-trigger):**\n\n```\nDesign a project-wide test plan for this codebase.\n```\n\n```\nExecute the plan at ./testing-plans/<slug>.md against this codebase.\n```\n\nThe skill descriptions pick up natural phrasing like \"design a\ntest plan\", \"execute the plan\", \"run stability tests\", \"design a\nrelease validation plan\", etc.\n\nFor a specific mode, output path, or a non-auto-trigger agent,\n[`USAGE.md`](USAGE.md) has copy/paste prompts for every workflow\n(design and execute, in their respective modes) plus tips on scope,\nenv probing, and long-run checkpointing.\n\n## The two skills\n\n### `designing-distributed-system-tests`\n\nWalks the repo, extracts the claims the product makes, generates\nhypotheses tied to those claims, picks techniques from the catalog,\nand writes a structured Markdown plan with a coverage adequacy\nargument and a confidence statement. For consistency-critical\nscenarios, the plan fills a §7.M block per scenario: model under\ntest, operation-history schema, named checker, nemesis + landing\nevidence, ambiguous-outcome handling, reduction plan. Details:\n[`history-discipline.md`](skills/designing-distributed-system-tests/references/history-discipline.md).\n\nTwo modes: **change-scoped** (a specific commit or PR) and\n**project-wide** (a holistic plan with existing-test inventory and\ngap analysis).\n\n### `executing-distributed-system-tests`\n\nReads the plan, discovers the SUT's toolbox, probes the environment,\nand runs scenarios with checkpoint discipline. Per scenario: captures\nlanding evidence for the fault, runs the green-but-broken and\nweak-oracle audits, assigns a verdict from the 10-state taxonomy in\n[`verdict-taxonomy.md`](skills/executing-distributed-system-tests/references/verdict-taxonomy.md),\nand classifies every FAIL into SUT / harness / checker / environment\nbefore filing. Produces a findings report with adequacy-vs-plan\nassessment and confidence delta.\n\nTwo modes: **default** (read-only on the SUT, ephemeral harnesses\nunder the session dir) and **author mode** (writes scenario skeletons\ndeclared in the plan's §7 into the SUT for review).\n\n## Technique catalog\n\nEight reference files distilled from the field's literature:\n\n| File | When to reach for it |\n|---|---|\n| [`catalog-index.md`](skills/designing-distributed-system-tests/references/catalog-index.md) | Selector page — start here |\n| [`jepsen-and-elle.md`](skills/designing-distributed-system-tests/references/jepsen-and-elle.md) | Linearizability / serializability under faults |\n| [`deterministic-simulation.md`](skills/designing-distributed-system-tests/references/deterministic-simulation.md) | Reproducible bugs from a seed; async heavy code |\n| [`chaos-and-fault-injection.md`](skills/designing-distributed-system-tests/references/chaos-and-fault-injection.md) | Real-cluster partial / asymmetric faults |\n| [`fuzzing.md`](skills/designing-distributed-system-tests/references/fuzzing.md) | Input or concurrency fuzzing under sanitizers |\n| [`formal-methods-tla.md`](skills/designing-distributed-system-tests/references/formal-methods-tla.md) | Protocol correctness at design time |\n| [`property-and-metamorphic.md`](skills/designing-distributed-system-tests/references/property-and-metamorphic.md) | Algebraic-law / metamorphic-relation testing |\n| [`performance-and-benchmarking.md`](skills/designing-distributed-system-tests/references/performance-and-benchmarking.md) | Tail latency / throughput / fairness |\n| [`crash-recovery-and-upgrade.md`](skills/designing-distributed-system-tests/references/crash-recovery-and-upgrade.md) | Durability, replay, idempotency, mixed-version |\n\nEach follows the same shape: when to reach for it, what it detects\nwell, what it misses, concrete tools, papers, cost signal, plan\nchecklist. The catalog index pairs symptoms to references.\n\n## Repo layout\n\n```\n.\n├── plugin.json                                 ← optional plugin manifest\n├── README.md                                   ← this file\n├── INSTALL.md                                  ← idempotent install / update (paste-this)\n├── USAGE.md                                    ← copy/paste prompts for every workflow\n├── LICENSE\n├── skills/\n│   ├── designing-distributed-system-tests/\n│   │   ├── SKILL.md                            ← the design workflow\n│   │   ├── assets/plan-template.md             ← §0–§9 incl. gated §7.M\n│   │   └── references/                         ← 8-file technique catalog + index,\n│   │                                             common-distributed-systems-pitfalls,\n│   │                                             history-discipline,\n│   │                                             boundary-and-isolation-testing\n│   └── executing-distributed-system-tests/\n│       ├── SKILL.md                            ← the execute workflow\n│       ├── assets/\n│       │   ├── session-log-template.md\n│       │   └── findings-report-template.md     ← 10-state verdicts + landing evidence\n│       └── references/                         ← oracle-patterns (checker picker + 14\n│                                                 patterns), fault-injection-howto\n│                                                 (22-row nemesis taxonomy),\n│                                                 test-case-reduction (with blame\n│                                                 classification), green-but-broken-\n│                                                 red-flags (incl. weak-oracle audit),\n│                                                 finding-classification (TaxDC),\n│                                                 verdict-taxonomy (10-state)\n├── evals/                                      ← eval suites for both skills\n├── verification/                               ← real runs against AgentDB (concrete output)\n└── specs/                                      ← original design spec\n```\n\n## Status\n\nEarly but exercised. Both skills have been driven against AgentDB\n(a distributed agent runtime in Rust) end-to-end multiple times,\nsurfacing six findings (one P0-candidate now closed, two P1s shipped\nas a PR, two open). The skill bodies evolve as harness experience\naccumulates; expect minor updates to the SKILL.mds and templates\nover the next few iterations.\n\nReal plan outputs, session directories, and findings reports from\nthose runs live under [`verification/`](verification/), one\nsubdirectory per run, each with a `README.md` describing what\npassed, what failed, and what the skill surfaced about itself in\nthe process. Notable runs:\n\n- [`verification/agentdb-fab7d9d/`](verification/agentdb-fab7d9d/) —\n  change-scoped plan + execution for AgentDB commit `fab7d9d` (durable\n  idempotent append replay); 670-line plan with 16 hypotheses across\n  all eight failure-mode categories.\n- [`verification/agentdb-jepsen/`](verification/agentdb-jepsen/) —\n  consistency + crash-recovery run with linearizability checking.\n- [`verification/agentdb-projectwide-lidev/`](verification/agentdb-projectwide-lidev/)\n  and `-v2` — project-wide plans with full coverage matrix +\n  adequacy argument + confidence statement.\n\nThere is also an eval suite under [`evals/`](evals/) (separate\n`evals.json` for the design and execute skills) — used to validate\nbehavioural changes to the SKILL.md bodies between iterations.\n\n## Acknowledgements\n\nThe technique catalog is distilled from Andrey Satarin's comprehensive\n[testing-distributed-systems](https://github.com/asatarin/testing-distributed-systems)\ncatalog. Seminal papers anchoring the catalog include:\n\n- Yuan et al., \"Simple Testing Can Prevent Most Critical Failures\" (OSDI'14)\n- Gunawi et al., \"What Bugs Live in the Cloud?\" (SoCC'14)\n- Zheng et al., \"Torturing Databases for Fun and Profit\" (OSDI'14)\n- Kingsbury & Alvaro, \"Elle: Inferring Isolation Anomalies from\n  Experimental Observations\" (VLDB'20)\n- Alfatafta et al., \"Toward a Generic Fault Tolerance Technique for\n  Partial Network Partitioning\" (OSDI'20)\n- Lou et al., \"Understanding, Detecting and Localizing Partial Failures\n  in Large System Software\" (NSDI'20)\n- Gao et al., \"An Empirical Study on Crash Recovery Bugs in Large-Scale\n  Distributed Systems\" (FSE'18)\n- Zhang et al., \"Understanding and Detecting Software Upgrade Failures\n  in Distributed Systems\" (SOSP'21)\n- Bornholt et al., \"Using Lightweight Formal Methods to Validate a\n  Key-Value Storage Node in Amazon S3\" (SOSP'21)\n- Newcombe et al., \"How Amazon Web Services Uses Formal Methods\" (CACM'15)\n\n## License\n\nMIT.\n","summary":"The project provides a pair of “skills” for AI coding agents that generate and execute claim-driven testing plans for distributed and stateful systems. One skill turns product claims into falsification-oriented scenarios with explicit abstract models, operation-history schemas, named checkers, and fault-injection (“nemesis”) setups that include observable landing evidence. The other skill runs the plan and produces structured Markdown artifacts, including per-scenario 10-state verdicts and SUT/harness/checker/environment blame classification so reviewers can decide whether to ship without re-running anything. It’s best suited for teams that want stronger assurance against real-world failures like partitions, nondeterministic concurrency, crash recovery, upgrades/rollbacks, idempotency under replay, and timing-sensitive ordering—especially when tests must be reviewer-auditable and reproducible.","description":"AI-agent skills for distributed-systems testing","stars":211,"language":null},{"owner":"aref-vc","repo":"tufte-claude-skill","url":"https://github.com/aref-vc/tufte-claude-skill","readme":"# tufte-claude-skill\n\nA Claude Code skill that turns \"make me a chart\" into a Tufte-compliant chart. Distilled from the three foundational books by Edward R. Tufte.\n\n<table>\n  <tr>\n    <td align=\"center\" width=\"33%\"><img src=\"assets/vdqi-cover.svg\" alt=\"The Visual Display of Quantitative Information\" width=\"240\"/></td>\n    <td align=\"center\" width=\"33%\"><img src=\"assets/ei-cover.svg\" alt=\"Envisioning Information\" width=\"240\"/></td>\n    <td align=\"center\" width=\"33%\"><img src=\"assets/ve-cover.svg\" alt=\"Visual Explanations\" width=\"240\"/></td>\n  </tr>\n  <tr>\n    <td align=\"center\"><b>The Visual Display of Quantitative Information</b><br/><i>1983 · 2nd ed. 2001</i><br/><sub>pictures of <b>numbers</b></sub></td>\n    <td align=\"center\"><b>Envisioning Information</b><br/><i>1990</i><br/><sub>pictures of <b>nouns</b></sub></td>\n    <td align=\"center\"><b>Visual Explanations</b><br/><i>1997</i><br/><sub>pictures of <b>verbs</b></sub></td>\n  </tr>\n</table>\n\n---\n\n## Install\n\nClone into your Claude Code skills directory:\n\n```bash\ngit clone https://github.com/aref-vc/tufte-claude-skill.git ~/.claude/skills/tufte\n```\n\nThat's it. Claude Code auto-loads the skill on next launch. To verify, run `/tufte` or ask Claude to \"make a chart of anything.\"\n\nTo update later:\n\n```bash\ncd ~/.claude/skills/tufte && git pull\n```\n\nTo uninstall:\n\n```bash\nrm -rf ~/.claude/skills/tufte\n```\n\n---\n\n## The three books, distilled\n\nTufte gives the three-book taxonomy himself on page 9 of *Visual Explanations*:\n\n- **VDQI** — how to depict data and enforce statistical honesty. The book that gave us *data-ink ratio*, *chartjunk*, *lie factor*, *small multiples*.\n- **EI** — how to lay out information in space. Layering, micro/macro readings, color rules, escaping flatland.\n- **VE** — how to show motion, causality, narrative. The smallest effective difference, parallelism, visual confections.\n\nTogether they yield the ten principles this skill applies.\n\n### The ten principles\n\n1. **Show the data.** Above all else. Every other decision asks \"does this help the reader see the data?\"\n2. **Maximize the data-ink ratio.** Ink that would change if the data changed is data-ink. Everything else is overhead.\n3. **Erase non-data-ink.** Drop the frame box, drop the gridlines, drop the ticks at minor units.\n4. **Erase redundant data-ink.** Pick one encoding per quantity. A bar plus a number plus a gridline plus an axis tick all saying \"37\" is one thing said four times.\n5. **Graphical integrity.** Lie factor between 0.95 and 1.05. Bar charts start at zero. Never use area for a 1D quantity.\n6. **Small multiples.** When you have a cross-cut (region, segment, cohort), make N small charts on a shared scale instead of one chart with N lines.\n7. **Layering and separation.** Data on top, labels next, scaffolding faintest. Watch for the *1+1=3 effect* — when two heavy elements interact to create unintended visual noise.\n8. **Micro/macro readings.** Good charts work at two scales: one shape from across the room, every data point legible up close.\n9. **The smallest effective difference.** \"Make all visual distinctions as subtle as possible, but still clear and effective.\" Gray for context, one accent for focus.\n10. **Word-data integration.** Sparklines belong in sentences. Numbers belong next to their visual. Tables are charts too.\n\nTufte's own five-line summary from VDQI p.105:\n\n> Above all else show the data.\n> Maximize the data-ink ratio.\n> Erase non-data-ink.\n> Erase redundant data-ink.\n> Revise and edit.\n\n---\n\n## How the skill works\n\nWhen you ask Claude to make, design, critique, or improve any chart, the skill activates automatically. It then:\n\n1. **Reads `principles.md`** to recall the ten rules.\n2. **Picks the chart type** from `chart-selection.md` based on your data shape and goal — not from what's familiar or what the library makes easy.\n3. **Applies `kill-list.md`** — removes the things that don't belong (3D, pie, dual-axis, rainbow scales, frame boxes, redundant legends).\n4. **Produces the chart** in your preferred stack: self-contained HTML/SVG, or React (Recharts + D3).\n5. **Runs `checklist.md`** as a final pass before declaring it done.\n\nDefault strictness: Tufte by default, override per chart on request (\"I need a pie because the CFO wants one\" → comply, but note the alternative).\n\n---\n\n## The one-page cheatsheet\n\nA printable reference covering principles, lie-factor formula, chart-selection table, kill list, color rules, and the 12-item checklist. Open [`cheatsheet.html`](./cheatsheet.html) in a browser or print [`cheatsheet.pdf`](./cheatsheet.pdf).\n\n![One-page Tufte cheatsheet](assets/cheatsheet.png)\n\n---\n\n## Before and after\n\nNine pairs comparing typical AI/BI default output (left) to Tufte-applied output (right). The full interactive gallery is at [`before-after.html`](./before-after.html) — open in any browser. Six pairs inlined here:\n\n### 1. Category comparison — sales by product\n\n![Before vs after: category comparison](assets/pair-1-category.png)\n\n3D bars with a six-color rainbow legend become a sorted dot plot with direct labels. The reader ranks in two seconds instead of decoding a key.\n\n### 2. Time series — monthly active users\n\n![Before vs after: time series](assets/pair-3-timeseries.png)\n\nA line chart trapped in a frame box (with gridlines, legend, axis title, chart title) becomes a sparkline plus the current value plus two endpoint labels. Same data, ~80% less ink.\n\n### 3. Dashboard — four KPIs\n\n![Before vs after: dashboard](assets/pair-4-dashboard.png)\n\nFour KPI tiles with giant numbers and decorative icons become a compact table with value, sparkline (10-month trend), and delta-to-target. One accent color flags the metric that's off-target.\n\n### 4. Period comparison — Q2 vs Q3 by team\n\n![Before vs after: slopegraph](assets/pair-7-slopegraph.png)\n\nClustered bars (two colors, ten bars to mentally pair up) become a slopegraph. Each line's slope is the change. Steepest gainer and only decliner read instantly without decoding a legend.\n\n### 5. Conversion funnel — signup flow\n\n![Before vs after: funnel](assets/pair-8-funnel.png)\n\nA 3D tapered funnel chart (where the visual taper exaggerates the drop-off) becomes horizontal bars sized by share of stage 1, with retention percentage printed per step. The worst step is annotated.\n\n### 6. Cohort retention\n\n![Before vs after: cohort retention](assets/pair-9-cohort.png)\n\nA rainbow heatmap (where viewers guess if yellow is more than green) becomes a sequential single-hue table with numbers printed in every cell and a sparkline showing each cohort's decay shape.\n\nThe other three pairs in the gallery: part-to-whole (pie → sorted table), distribution (rainbow histogram → strip plot with quantile markers), geographic (rainbow choropleth → sequential single-hue with annotations).\n\n---\n\n## When to use the skill\n\nThe skill auto-activates on any of these:\n\n- \"Make a chart of...\", \"visualize...\", \"graph...\", \"plot...\"\n- \"Build a dashboard for...\", \"design a KPI tile...\"\n- \"Improve this chart\", \"critique this visual\"\n- \"What chart should I use for...?\"\n- Direct invocation: `/tufte` or mentioning Tufte by name\n- Any project where chart code is being added or edited\n\nIt does *not* activate for:\n\n- Logo design, illustration, or decorative graphics\n- Flowcharts, architecture diagrams, hand-drawn sketches\n- Pure typography or layout that has no quantitative data\n\n---\n\n## How to use the skill\n\n### Fast path\n\nJust ask. The skill loads automatically and produces a Tufte-compliant chart:\n\n> Make a chart of monthly revenue for the last 12 months\n\nYou'll get a sparkline with the current value, two endpoint labels, no frame box, no legend.\n\n### Stack choice\n\nTell Claude which output you want:\n\n| Say | You'll get |\n|---|---|\n| \"as inline SVG\" or no preference | Self-contained HTML/SVG, single file |\n| \"in React\" or \"with Recharts\" | Recharts component with Tufte theme |\n| \"with D3\" | D3-in-React (for dot plots, slopegraphs, custom small multiples) |\n\n### Override the defaults\n\nIf you specifically need something on the kill list:\n\n> Make a pie chart of revenue mix — the CFO wants a pie\n\nClaude will produce the pie, but include a one-line comment noting the Tufte alternative (a sorted table). You stay in control.\n\n### Iterate on an existing chart\n\nPaste your chart code or screenshot and say:\n\n> Apply Tufte to this\n\nClaude will identify violations (frame box, gridlines, gradient fills, redundant legend, wrong sort), and produce a rewritten version.\n\n---\n\n## File index\n\n| File | Purpose |\n|---|---|\n| [`SKILL.md`](./SKILL.md) | Trigger description + skill index (loaded by Claude) |\n| [`principles.md`](./principles.md) | The ten rules, with Tufte's exact quotes |\n| [`chart-selection.md`](./chart-selection.md) | Data + goal → chart type decision table |\n| [`kill-list.md`](./kill-list.md) | What to remove from any chart |\n| [`before-after.html`](./before-after.html) | Nine side-by-side comparisons (open in browser) |\n| [`checklist.md`](./checklist.md) | 12-item pre-publish check |\n| [`cheatsheet.html`](./cheatsheet.html) / [`cheatsheet.pdf`](./cheatsheet.pdf) | One-page printable reference |\n| [`presets/html-svg.md`](./presets/html-svg.md) | Style tokens + working SVG templates (sparkline, dot plot, line, small multiples, sparkline-in-table) |\n| [`presets/react.md`](./presets/react.md) | Recharts theme + D3-in-React patterns (slopegraph, dot plot, what-to-never-import list) |\n\n---\n\n## Requirements\n\n- [Claude Code](https://docs.claude.com/en/docs/claude-code) installed\n- Skill auto-loads from `~/.claude/skills/`\n- No other dependencies for the skill itself\n- The cheatsheet PDF is included, but to regenerate it from the HTML you'll need [`weasyprint`](https://weasyprint.org/) (`pip install weasyprint`)\n\n---\n\n## Contributing\n\nPull requests welcome. Useful additions:\n\n- More before/after pairs (sankey, network, gantt, calendar heatmap, control chart)\n- Output presets for other stacks: Python (matplotlib, plotly), Observable Plot, Vega-Lite, ggplot2\n- Examples that show Tufte applied to real-world charts you've improved\n\nOpen an issue first for anything that adds a new chart type to the decision table — let's discuss the rule before adding it.\n\n---\n\n## License\n\n[MIT](./LICENSE). Use it, modify it, ship it.\n\nThe skill content is original; quotations from Tufte's books are used under fair-use for educational reference and are attributed inline.\n\n---\n\n> The principles of information design are universal — like mathematics — and are not tied to unique features of a particular language or culture.\n>\n> — Edward R. Tufte, *Envisioning Information*, p. 10\n","summary":"Tufte-claude-skill is a Claude Code skill that transforms requests like “make me a chart” into Tufte-compliant charts based on Edward R. Tufte’s principles. It works by selecting an appropriate chart type for your data and intent, then applying a set of rules to remove common “chartjunk” patterns (e.g., unnecessary frames, redundant encodings) while preserving graphical integrity and data visibility. The result is better layouts with strong data-to-ink ratios, clear word–data integration, and guidance toward small multiples, layering, and subtle but effective visual distinctions. This is especially useful for analysts, engineers, and anyone who frequently produces charts and wants more honest, readable, publication-quality visuals with less manual design effort.","description":"Claude Code skill that turns 'make me a chart' into a Tufte-compliant chart. Distilled from Edward Tufte's three foundational books.","stars":219,"language":"HTML"},{"owner":"DeepExperience","repo":"MMSkills","url":"https://github.com/DeepExperience/MMSkills","readme":"<h1 align=\"center\">\n  <img src=\"https://deepexperience.github.io/MMSkills/assets/mmskills_title.svg\" alt=\"MMSkills\" width=\"440\"/><br>\n  Towards Multimodal Skills for General Visual Agents\n</h1>\n\n<div align=\"center\">\n\n[![Python 3.10+](https://img.shields.io/badge/Python-3.10+-blue.svg)](https://www.python.org/downloads/)\n[![License](https://img.shields.io/badge/License-Apache--2.0-green.svg)](LICENSE)\n[![OSWorld](https://img.shields.io/badge/Benchmark-OSWorld-7b39e2.svg)](https://github.com/xlang-ai/OSWorld)\n[![arXiv](https://img.shields.io/badge/arXiv-2605.13527-b31b1b.svg)](https://arxiv.org/abs/2605.13527)\n[![Website](https://img.shields.io/badge/Website-MMSkills-0f766e.svg)](https://deepexperience.github.io/MMSkills/)\n[![Skill Library](https://img.shields.io/badge/Skill%20Library-515%20MMSkills-4420A8.svg)](https://deepexperience.github.io/MMSkills/skills.html)\n[![Demos](https://img.shields.io/badge/Demos-4%20Video%20Comparisons-a15c11.svg)](https://deepexperience.github.io/MMSkills/cases.html)\n[![Agent Adapter](https://img.shields.io/badge/Agent%20Adapter-Codex%20%7C%20OpenClaw%20%7C%20Claude%20Code-0f766e.svg)](agent_integrations/mmskills-agent-adapter/)\n[![Submit MMSkill](https://img.shields.io/badge/Submit-MMSkill%20Package-a15c11.svg)](https://deepexperience.github.io/MMSkills/submit.html)\n[![GitHub stars](https://img.shields.io/github/stars/DeepExperience/MMSkills?style=social)](https://github.com/DeepExperience/MMSkills/stargazers)\n\n</div>\n\n<p align=\"center\">\n  <a href=\"#-latest-news\">News</a> |\n  <a href=\"https://arxiv.org/abs/2605.13527\">Paper</a> |\n  <a href=\"https://deepexperience.github.io/MMSkills/\">Website</a> |\n  <a href=\"https://deepexperience.github.io/MMSkills/skills.html\">Skill Library</a> |\n  <a href=\"https://deepexperience.github.io/MMSkills/cases.html\">Demos</a> |\n  <a href=\"#-agent-adapter\">Agent Adapter</a> |\n  <a href=\"#-community-submissions\">Submit MMSkills</a> |\n  <a href=\"#-overview\">Overview</a> |\n  <a href=\"#-installation\">Installation</a> |\n  <a href=\"#-quick-start\">Quick Start</a> |\n  <a href=\"#-citation\">Citation</a>\n</p>\n\n<h5 align=\"center\">If you find this project helpful, please give us a star ⭐ for the latest updates.</h5>\n\n<div align=\"center\">\n  <img src=\"https://readme-typing-svg.herokuapp.com?font=Orbitron&size=18&duration=3000&pause=1000&color=4420A8&center=true&vCenter=true&width=820&lines=Welcome+to+MMSkills;Reusable+Multimodal+Procedural+Knowledge;Skill-Augmented+Visual+Agents+for+Desktop+Tasks\" alt=\"Typing Animation purple MMSkills\" />\n</div>\n\n## 📣 Latest News\n\n- 🏆 **[May 2026]** MMSkills ranked **#1 on Hugging Face Daily Papers** on **2026.5.18**.\n- 🤗 **[May 2026]** The MMSkills dataset is now available on [Hugging Face Datasets](https://huggingface.co/datasets/zhangkangning/mmskills); the paper page is also available on [Hugging Face Papers](https://huggingface.co/papers/2605.13527).\n- 🌐 **[May 2026]** The project website is live with [demo comparisons](https://deepexperience.github.io/MMSkills/cases.html) and a searchable [MMSkills Library](https://deepexperience.github.io/MMSkills/skills.html) indexing **515 skills** across Ubuntu, macOS, VAB-Minecraft, and Mario.\n- 🚀 **[May 2026]** The public release includes a compact multimodal desktop-skill subset, OSWorld-ready runtime adapters, task mappings, and model-agnostic skill modes.\n- 🔌 **[May 2026]** We added the **MMSkills Agent Adapter** for Codex, OpenClaw, and Claude Code, with one-line Codex installation and on-demand Hugging Face skill retrieval.\n- 🌱 **[May 2026]** Community MMSkill submissions are open for new domains such as autonomous driving, robotics, mobile agents, and beyond.\n\n## 🎬 Demos\n\nFour OSWorld demos compare the same task under no skills, text-only skill guidance, and multimodal MMSkills. These videos show selected trajectory excerpts to highlight behavioral differences between the three settings; they are not complete end-to-end trajectories. To keep GUI text readable in the GitHub README, each case uses three separate 1080p MP4 players instead of a compressed side-by-side composite. The full video layout is also available at [deepexperience.github.io/MMSkills/cases.html](https://deepexperience.github.io/MMSkills/cases.html).\n\n<details open>\n<summary><h3>1. Calc merged headers</h3></summary>\n\n<table>\n  <tr>\n    <th>No skills</th>\n    <th>Text-only</th>\n    <th>MMSkills</th>\n  </tr>\n  <tr>\n    <td><video src=\"https://github.com/user-attachments/assets/cfe1cde8-5da1-4f69-9e90-1a3ee0b82023\" width=\"280\" controls></video></td>\n    <td><video src=\"https://github.com/user-attachments/assets/ce092ee3-4e10-44cb-bfd3-bb4780e5c9c4\" width=\"280\" controls></video></td>\n    <td><video src=\"https://github.com/user-attachments/assets/24c8ca7a-a028-422a-8207-52b14c8b5d1e\" width=\"280\" controls></video></td>\n  </tr>\n</table>\n\nCreates Sheet2, merges the requested header ranges, and writes the target labels. MMSkills follows the intended spreadsheet workflow while the other modes make slower or less reliable progress.\n\n</details>\n\n<details>\n<summary><h3>2. VS Code local VSIX install</h3></summary>\n\n<table>\n  <tr>\n    <th>No skills</th>\n    <th>Text-only</th>\n    <th>MMSkills</th>\n  </tr>\n  <tr>\n    <td><video src=\"https://github.com/user-attachments/assets/2296cd12-733e-4f25-95d5-402b2845ae37\" width=\"280\" controls></video></td>\n    <td><video src=\"https://github.com/user-attachments/assets/4cfdfe99-6bb6-4a40-86ae-c7703eb1182c\" width=\"280\" controls></video></td>\n    <td><video src=\"https://github.com/user-attachments/assets/90abd134-1e2c-4bbd-833f-83938b81383a\" width=\"280\" controls></video></td>\n  </tr>\n</table>\n\nInstalls a local VSIX extension through the GUI workflow. The comparison highlights how multimodal skill references reduce detours around extension discovery and confirmation steps.\n\n</details>\n\n<details>\n<summary><h3>3. GIMP text-layer move</h3></summary>\n\n<table>\n  <tr>\n    <th>No skills</th>\n    <th>Text-only</th>\n    <th>MMSkills</th>\n  </tr>\n  <tr>\n    <td><video src=\"https://github.com/user-attachments/assets/6f0d27ba-25a4-4b31-b34b-8480eb3d5fa0\" width=\"280\" controls></video></td>\n    <td><video src=\"https://github.com/user-attachments/assets/57a4719d-0d62-4c00-a0b0-befecf5ac256\" width=\"280\" controls></video></td>\n    <td><video src=\"https://github.com/user-attachments/assets/0e221a36-29a8-4b7f-8eac-1af5e492fbc7\" width=\"280\" controls></video></td>\n  </tr>\n</table>\n\nMoves a specific text layer in GIMP. The multimodal skill package provides visual grounding for the relevant layer and toolbar state, making the edit path clearer.\n\n</details>\n\n<details>\n<summary><h3>4. Calc chart creation</h3></summary>\n\n<table>\n  <tr>\n    <th>No skills</th>\n    <th>Text-only</th>\n    <th>MMSkills</th>\n  </tr>\n  <tr>\n    <td><video src=\"https://github.com/user-attachments/assets/55a01c94-a748-4a22-9c40-cab707aca386\" width=\"280\" controls></video></td>\n    <td><video src=\"https://github.com/user-attachments/assets/ca310dd1-252a-4608-a0c7-7e613b31ee08\" width=\"280\" controls></video></td>\n    <td><video src=\"https://github.com/user-attachments/assets/1a485289-ceb5-4601-8e16-1be439593145\" width=\"280\" controls></video></td>\n  </tr>\n</table>\n\nBuilds the requested clustered chart in LibreOffice Calc. The side-by-side run shows the effect of reusable spreadsheet procedure knowledge on multi-step GUI manipulation.\n\n</details>\n\n## 💡 Overview\n\n**MMSkills** is a framework for representing, loading, and using reusable multimodal procedural knowledge for visual agents. Each skill combines textual procedure guidance, compact state-card metadata, and optional visual references. At inference time, the agent keeps only lightweight skill hints in the main context, then opens a temporary skill branch when task state suggests that a skill may help.\n\n<div align=\"center\">\n  <img src=\"https://deepexperience.github.io/MMSkills/assets/full_figure.png\" width=\"95%\" alt=\"MMSkills overview\" />\n</div>\n\nThis repository is a focused open-source release. It is not a full OSWorld fork; instead, it provides the MMSkill runtime layer, an install script, OSWorld runner patches, task-to-skill mappings, and a representative public skill library.\n\nProject pages:\n\n- [arXiv paper](https://arxiv.org/abs/2605.13527)\n- [MMSkills website](https://deepexperience.github.io/MMSkills/)\n- [Searchable Multidomain Skill Library](https://deepexperience.github.io/MMSkills/skills.html)\n- [Demo video comparisons](https://deepexperience.github.io/MMSkills/cases.html)\n\nWebsite frontend files are published from the `gh-pages` branch. The `main` branch is kept focused on the open-source code, runtime integration, skills, and documentation.\n\n## ✨ Highlights\n\n<table>\n  <tr>\n    <td width=\"50%\"><strong>🧩 Self-contained skill packages</strong><br>Each skill directory contains <code>SKILL.md</code>, runtime state cards, audit state cards, and visual keyframes.</td>\n    <td width=\"50%\"><strong>👁️ Multimodal evidence gating</strong><br>The runtime first decides whether visual references are needed, then loads only the requested state views.</td>\n  </tr>\n  <tr>\n    <td width=\"50%\"><strong>🧠 Branch-loaded planning</strong><br>A temporary planner branch consults selected skills and returns concise guidance, fallback advice, and verification cues.</td>\n    <td width=\"50%\"><strong>🔌 OSWorld ready</strong><br>Helper scripts install the agent files, runner integration, skills, and task mappings into a local OSWorld checkout.</td>\n  </tr>\n  <tr>\n    <td width=\"50%\"><strong>⚡ Agent-product adapter</strong><br>The <code>mmskills-agent-adapter</code> can be installed as a Codex skill and reused by OpenClaw or Claude Code through the same package contract.</td>\n    <td width=\"50%\"><strong>📦 On-demand skill retrieval</strong><br>Agents search the 515-skill Hugging Face library, download only task-relevant packages, then read <code>SKILL.md</code>, runtime states, and visual references as needed.</td>\n  </tr>\n  <tr>\n    <td width=\"50%\"><strong>🌱 Community-extensible library</strong><br>Researchers can submit MMSkill packages for new domains such as autonomous driving, robotics, mobile apps, web agents, and games.</td>\n    <td width=\"50%\"><strong>✅ Review-first publishing</strong><br>Submissions open GitHub issues, notify maintainers, and are reviewed before being normalized into the public Hugging Face library and website.</td>\n  </tr>\n</table>\n\n## 🔌 Agent Adapter\n\nThe [`mmskills-agent-adapter`](agent_integrations/mmskills-agent-adapter/) module turns MMSkills into an installable, product-neutral skill adapter for agent systems. It keeps one shared MMSkills package format across Codex, OpenClaw, Claude Code, and future agent products instead of maintaining separate copies for each ecosystem.\n\nThe adapter is intentionally lightweight. It does not bundle the full 515-skill asset set inside the repository branch. Instead, it points agents to the public [Hugging Face MMSkills dataset](https://huggingface.co/datasets/zhangkangning/mmskills), searches the metadata index, and downloads only the skill package needed for the current task.\n\nOne-line Codex install:\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/DeepExperience/MMSkills/main/scripts/install_codex_mmskills.sh | bash\n```\n\nDirect Codex skill-installer form:\n\n```bash\npython ~/.codex/skills/.system/skill-installer/scripts/install-skill-from-github.py \\\n  --repo DeepExperience/MMSkills \\\n  --path agent_integrations/mmskills-agent-adapter\n```\n\nAfter restarting Codex, invoke `$mmskills` for GUI-agent or computer-use tasks. The adapter scripts provide the standard flow:\n\n```bash\npython scripts/search_skills.py \"chrome bookmark\" --package ubuntu\npython scripts/download_skill.py ubuntu/chrome/CHROME_Manage_Bookmarks_Reading_List_And_Shortcuts\npython scripts/inspect_skill.py ~/.cache/mmskills/skills/ubuntu/chrome/CHROME_Manage_Bookmarks_Reading_List_And_Shortcuts\n```\n\nFor OpenClaw and Claude Code, use the same adapter contract: call the search/download scripts, parse `SKILL.md` and `runtime_state_cards.json`, and route `Images/` into the product's visual grounding or verification layer only when visual evidence is needed.\n\n## 🌱 Community Submissions\n\nWe welcome MMSkill packages from new domains. A submission can be a single reusable skill or a new domain collection, such as autonomous driving, robotics, mobile agents, browser workflows, scientific software, games, or other visual-agent environments.\n\nSubmit through the website entrypoint or directly through the GitHub issue form:\n\n- Website entry: [deepexperience.github.io/MMSkills/submit.html](https://deepexperience.github.io/MMSkills/submit.html)\n- GitHub issue form: [Submit an MMSkill package](https://github.com/DeepExperience/MMSkills/issues/new?template=skill_submission.yml)\n- Format guide: [docs/submit_mmskills.md](docs/submit_mmskills.md)\n\nEach submission creates a GitHub issue assigned to the maintainer account, so maintainers can receive email notifications through GitHub's repository notification settings. After review, accepted packages are normalized into the MMSkills library, uploaded to the public Hugging Face dataset, and surfaced on the website Skill Library.\n\n## 🗂️ Repository Layout\n\n```text\nMMSkills/\n├── agent_integrations/        # Codex/OpenClaw/Claude Code agent adapters and download helpers\n├── mm_agents/                 # MMSkill runtime architecture and model adapters\n├── osworld_integration/       # MMSkills-aware OSWorld runner files\n├── skills_library/            # Public multimodal skills subset for direct runtime use\n├── task_skill_mappings/       # OSWorld task-to-skill mapping for released skills\n└── scripts/\n    ├── install_into_osworld.py # Install this release into an OSWorld checkout\n    └── sync_from_sources.py    # Maintainer sync helper for source checkouts\n```\n\n## 🧠 Architecture\n\nThe public runtime entrypoint is [`mm_agents/mm_skill_agent.py`](mm_agents/mm_skill_agent.py), exposed in OSWorld as:\n\n```bash\n--agent_type mm_skill\n```\n\nThe architecture is model-agnostic. A main visual agent receives compact skill hints; when a skill may apply, the runtime opens a branch that decides whether visual evidence is needed, requests relevant state views, compares them with the live screenshot, and returns structured guidance for the next grounded action.\n\nThe reference integration supports:\n\n- `mm_skill`: multimodal branch-loaded skill consultation.\n- `general_text_skill`: text-only skill consultation for ablation and lightweight runs.\n- `general`: baseline model-agnostic screenshot-to-pyautogui visual-agent routing.\n\nLegacy `gemini`, `gemini_skill`, and `gemini_text_skill` CLI names are still accepted by the runner as aliases for compatibility, but the public files and recommended commands use the model-agnostic `general*` names.\n\nAny screenshot-capable VLM served through an OpenAI-compatible chat-completions API can use the same `general*` and `mm_skill` interfaces by setting `--model`, `--api_model` when needed, `--base_url`, and `--api_key`.\n\n## 🔧 Installation\n\n### 1. Clone MMSkills\n\n```bash\ngit clone https://github.com/DeepExperience/MMSkills.git\ncd MMSkills\n```\n\n### 2. Install Python dependencies\n\n```bash\npython3 -m venv .venv\nsource .venv/bin/activate\npip install -r requirements.txt\n```\n\n### 3. Install into OSWorld\n\nClone and install OSWorld following its upstream instructions, then run:\n\n```bash\npython3 scripts/install_into_osworld.py /path/to/OSWorld --with-runner --with-skills\n```\n\nThis copies the MMSkill agent files into `OSWorld/mm_agents/`, installs the MMSkills-aware runner files, and copies the released `skills_library/` plus `task_skill_mappings/`.\n\n### 4. Configure model endpoints\n\nFor an OpenAI-compatible endpoint:\n\n```bash\nexport OPENAI_BASE_URL=\"https://your-openai-compatible-endpoint/v1\"\nexport OPENAI_API_KEY=\"your_api_key\"\n```\n\nFor native Gemini-compatible routing, pass `--api_backend gemini` and set:\n\n```bash\nexport GEMINI_BASE_URL=\"https://your-gemini-compatible-endpoint/v1\"\nexport GEMINI_API_KEY=\"your_api_key\"\n```\n\n### 5. Install the Codex Agent Adapter\n\nMMSkills also ships a lightweight agent-product adapter under [`agent_integrations/mmskills-agent-adapter/`](agent_integrations/mmskills-agent-adapter/). The adapter is installable as a Codex skill and points agents to the full Hugging Face skill dataset for on-demand retrieval. See [Agent Adapter](#-agent-adapter) for the full cross-agent contract.\n\nOne-line Codex install:\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/DeepExperience/MMSkills/main/scripts/install_codex_mmskills.sh | bash\n```\n\nDirect Codex skill-installer form:\n\n```bash\npython ~/.codex/skills/.system/skill-installer/scripts/install-skill-from-github.py \\\n  --repo DeepExperience/MMSkills \\\n  --path agent_integrations/mmskills-agent-adapter\n```\n\nAfter restarting Codex, use `$mmskills` to search and load task-relevant packages. The same adapter contract is intended for OpenClaw and Claude Code: share the MMSkills package format, keep product-specific behavior in thin adapters, and download only the skills needed for the current task from [Hugging Face Datasets](https://huggingface.co/datasets/zhangkangning/mmskills).\n\n## 🏃 Quick Start\n\nRun commands from the OSWorld checkout after installation.\n\n### Baseline Without Skills\n\n```bash\npython run.py \\\n  --agent_type general \\\n  --model gpt-4o \\\n  --api_backend openai \\\n  --observation_type screenshot \\\n  --action_space pyautogui \\\n  --max_steps 20 \\\n  --test_all_meta_path evaluation_examples/test_nogdrive.json \\\n  --domain chrome \\\n  --result_dir results/no_skills\n```\n\n### Text-Only Skills\n\n```bash\npython run.py \\\n  --agent_type general_text_skill \\\n  --model gpt-4o \\\n  --api_backend openai \\\n  --observation_type screenshot \\\n  --action_space pyautogui \\\n  --max_steps 20 \\\n  --skills_library_dir skills_library \\\n  --task_skill_mapping_root task_skill_mappings/task_skill_mapping.json \\\n  --skill_mode text_only \\\n  --text_skill_mode branch_planner \\\n  --test_all_meta_path evaluation_examples/test_nogdrive.json \\\n  --domain chrome \\\n  --result_dir results/text_only\n```\n\n### Multimodal MMSkill Agent\n\n```bash\npython run.py \\\n  --agent_type mm_skill \\\n  --model gpt-4o \\\n  --api_backend openai \\\n  --observation_type screenshot \\\n  --action_space pyautogui \\\n  --max_steps 20 \\\n  --skills_library_dir skills_library \\\n  --task_skill_mapping_root task_skill_mappings/task_skill_mapping.json \\\n  --skill_mode multimodal \\\n  --task_skill_top_k 6 \\\n  --save_conversation_json \\\n  --test_all_meta_path evaluation_examples/test_nogdrive.json \\\n  --domain chrome \\\n  --result_dir results/mm_skill_multimodal\n```\n\nUse `--domain all` for the full no-Google-Drive OSWorld split. The runner writes trajectories, screenshots, `skill_invocations.json`, `skill_usage_summary.json`, and aggregate metrics under the selected `--result_dir`.\n\n## 📚 Skill Library\n\nThe website indexes **515 skills** from the open-source Ubuntu, macOS, VAB-Minecraft, and Mario skill assets. Each skill card links to a structured view of its `SKILL.md`, runtime state cards, and ordered visual references.\n\nBrowse the live library at [deepexperience.github.io/MMSkills/skills.html](https://deepexperience.github.io/MMSkills/skills.html).\n\nThe repository also includes a compact runtime-ready subset under [`skills_library/`](skills_library/) for immediate OSWorld integration.\n\n## 📦 Skill Package Format\n\n```text\nskills_library/<domain>/<skill_name>/\n├── SKILL.md                  # Procedure, applicability, transfer limits, checks\n├── runtime_state_cards.json  # Compact state/view metadata used at inference time\n├── state_cards.json          # Audit-grade state metadata for inspection\n├── plan.json                 # Generated plan metadata, when available\n└── Images/                   # Full frames, focus crops, before/after references\n```\n\nThe main agent sees only concise skill names and state hints. Detailed visual evidence is loaded lazily by the branch planner, which keeps the main context compact while preserving access to state-specific multimodal references.\n\n`runtime_state_cards.json` is the inference-facing version: it contains compact state descriptions, when-to-use rules, visible cues, verification cues, and selected image views for branch-time loading. `state_cards.json` is the richer authoring/audit version: it keeps transfer-limit notes, highlight targets, grounding queries, bounding boxes, crop decisions, and evidence-source metadata for inspection and regeneration.\n\n## 🧪 Outputs\n\nMMSkills adds skill-aware artifacts to OSWorld result directories:\n\n| File | Purpose |\n|------|---------|\n| `skill_invocations.json` | Per-branch consultation records, selected states, requested views, and planner outputs |\n| `skill_usage_summary.json` | Aggregate skill counts, branch success counts, exhausted skills, and final actions |\n| `conversation.json` | Optional main and branch conversation trace when `--save_conversation_json` is enabled |\n\n## 🤝 Contributing\n\nContributions are welcome for new skills, runtime integrations, documentation, and reproducibility fixes. Please read [`CONTRIBUTING.md`](CONTRIBUTING.md) before opening an issue or pull request.\n\n## 📄 License\n\nThis project is released under the [Apache License 2.0](LICENSE). Portions of the OSWorld integration are derived from OSWorld; see [NOTICE](NOTICE) for attribution details.\n\n## 📝 Citation\n\nIf you use MMSkills in your research or applications, please cite our arXiv paper:\n\n```bibtex\n@misc{zhang2026mmskills,\n  title = {MMSkills: Towards Multimodal Skills for General Visual Agents},\n  author = {Kangning Zhang and Shuai Shao and Qingyao Li and Jianghao Lin and Lingyue Fu and Shijian Wang and Wenxiang Jiao and Yuan Lu and Weiwen Liu and Weinan Zhang and Yong Yu},\n  year = {2026},\n  eprint = {2605.13527},\n  archivePrefix = {arXiv},\n  primaryClass = {cs.AI},\n  url = {https://arxiv.org/abs/2605.13527}\n}\n```\n\nYou can also use the machine-readable citation metadata in [`CITATION.cff`](CITATION.cff).\n","summary":"DeepExperience/MMSkills is an open framework for building reusable multimodal “skills” to power general visual agents that perform desktop and game-like GUI tasks. It provides a large, searchable skill library (over 500 skills), dataset-backed multimodal procedural knowledge, and model-agnostic skill modes plus runtime adapters that integrate with agent tools like Codex, OpenClaw, and Claude Code. The project includes demo comparisons and task mappings designed to let developers improve agent behavior by swapping in multimodal skills rather than relying only on text prompting. It will benefit researchers and engineers developing visual/UI agents, benchmarking on OSWorld-style environments, or looking for a structured way to reuse and share multimodal task capabilities.","description":"MMSkills: Towards Multimodal Skills for General Visual Agents","stars":316,"language":"Python"},{"owner":"LingyiChen-AI","repo":"boris-prompts","url":"https://github.com/LingyiChen-AI/boris-prompts","readme":"# boris-prompts\n\nAn agent skill that writes high-quality prompts for any LLM (Claude, Claude Code, ChatGPT, Gemini, Cursor, Windsurf, etc.) using **Boris's methodology** — the patterns Boris (Anthropic, Claude Code's creator) shared in his \"Pro Tips & Tricks\" talk.\n\nIf your request is unclear, the skill asks 1–3 targeted clarifying questions before writing. The output is short, copy-pasteable, and follows the five principles below.\n\n## Original tweet\nhttps://x.com/Etudecn/status/2057238154701426726\n\n## Install\n\nThis skill is distributed via the [`skills`](https://github.com/vercel-labs/skills) CLI (`npx skills`). Works with Claude Code, Codex, Cursor, OpenCode, and 50+ other agents.\n\n```bash\n# GitHub shorthand\nnpx skills add LingyiChen-AI/boris-prompts --skill boris-prompts\n\n# Or full URL\nnpx skills add https://github.com/LingyiChen-AI/boris-prompts --skill boris-prompts\n\n# Or point at the skill folder directly\nnpx skills add https://github.com/LingyiChen-AI/boris-prompts/tree/main/skills/boris-prompts\n\n# Install globally (available across all projects)\nnpx skills add LingyiChen-AI/boris-prompts --skill boris-prompts -g\n\n# Install only for Claude Code\nnpx skills add LingyiChen-AI/boris-prompts --skill boris-prompts -a claude-code\n```\n\nAfter install, restart your agent (or start a new session) and the skill loads automatically.\n\n## What it does\n\nWhen you say things like:\n\n- `write a prompt that makes Claude convert all our logs to JSON`\n- `how should I prompt Cursor to add dark mode`\n- `this ChatGPT prompt isn't working — keeps going off the rails`\n- `give me a good way to ask Gemini to refactor this module`\n\n…the skill triggers. If it has enough info, it writes the prompt directly. If not, it asks at most three questions (via `AskUserQuestion`) and then writes it.\n\n## The five principles\n\nThe skill applies these in order:\n\n1. **Short beats long.** A two-sentence prompt usually beats a screen-filling one. If you find yourself writing more than five lines, half of it probably belongs in a persistent-context file.\n2. **\"Make a plan first\" is the single highest-ROI addition.** Appending *\"Before you write code, make a plan and run it by me for approval\"* upgrades almost any non-trivial prompt.\n3. **Don't spec every detail.** Point the model at the right starting place (\"look at how `X` is implemented\") instead of re-describing the codebase.\n4. **A feedback loop beats detailed instructions.** Give the model a way to verify (tests, screenshots, lint) and let it iterate, rather than spelling out every step.\n5. **Persistent context lives in files / settings, not the prompt.** `CLAUDE.md`, `.cursorrules`, Custom Instructions, Projects, Gems — whichever the target supports.\n\n## Example\n\n**You:** \"I want Claude to add JWT auth to my Express app. There are tests.\"\n\n**Skill output:**\n\n```\nAdd JWT auth to the Express app. Look at how existing middleware is structured first, then make a plan and run it by me. After implementing, run the test suite and iterate until it passes.\n```\n\n> Plan-first + feedback loop applied. Anchors Claude in existing patterns rather than re-describing them.\n\n## Repo layout\n\nThis repo follows the convention the `skills` CLI expects: a top-level `skills/` directory containing one folder per skill, each with a `SKILL.md`.\n\n```\nboris-prompts/                  (this repo)\n└── skills/\n    └── boris-prompts/          (the skill)\n        └── SKILL.md\n```\n\nTo add more skills later, drop them in as siblings under `skills/`.\n\n## Credits\n\nMethodology from Boris's \"Claude Code Pro Tips\" talk (Anthropic). This repo just packages it as an agent skill.\n\nCommunity: <https://linux.do>\n\n## License\n\nMIT\n","summary":"boris-prompts is an open-source “skills” CLI package that generates high-quality, copy-pasteable LLM prompts using Boris’s Claude Code methodology. It helps when a user’s request is unclear by asking 1–3 targeted clarifying questions, then produces a short prompt that follows principles like plan-first, using existing code as an anchor, and setting up a feedback/verification loop rather tha
