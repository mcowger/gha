<script id="project-data" type="application/json">[{"owner":"renatoworks","repo":"3dsvg","url":"https://github.com/renatoworks/3dsvg","readme":"# 3dsvg\n\n![3dsvg](.github/assets/demo.png)\n\nThe easiest way to turn SVGs into interactive 3D.\n\n[![License: MIT](https://img.shields.io/badge/License-MIT-blue.svg)](LICENSE)\n[![npm](https://img.shields.io/npm/v/3dsvg)](https://www.npmjs.com/package/3dsvg)\n\n## Overview\n\nThis is a monorepo with two packages:\n\n| Package | Description |\n|---------|-------------|\n| [`packages/engine`](packages/engine/) | Embeddable `<SVG3D>` React component вҖ” published to npm as [`3dsvg`](https://www.npmjs.com/package/3dsvg) |\n| [`packages/web`](packages/web/) | Visual editor at [3dsvg.design](https://3dsvg.design) вҖ” design 3D objects and export as images, video, 3D models, or embed code |\n\nThe web editor renders the engine's `<SVG3D>` component directly вҖ” what you see in the editor is exactly what you get with the embed.\n\n## Quick Start\n\n```bash\nnpm install\nnpm run build:engine\nnpm run dev:web\n```\n\nOpen [http://localhost:3000](http://localhost:3000).\n\n## Embed\n\n```bash\nnpm install 3dsvg\n```\n\n```tsx\nimport { SVG3D } from \"3dsvg\";\n\n<SVG3D text=\"Hello\" animate=\"spin\" />\n<SVG3D svg=\"/logo.svg\" material=\"gold\" />\n```\n\nSee the full [engine docs](packages/engine/README.md) for all props.\n\n## Web Editor Features\n\n- **4 input methods** вҖ” Text (10 Google Fonts), Pixel Editor, SVG Code, File Upload\n- **10 material presets** вҖ” Default, Plastic, Metal, Glass, Rubber, Chrome, Gold, Clay, Emissive, Holographic\n- **7 animations** вҖ” Spin, Float, Pulse, Wobble, Swing, Spin+Float, or static\n- **Textures** вҖ” 10 procedural presets or upload your own\n- **Configurable lighting** вҖ” Key light position/intensity, ambient, shadows\n- **PNG export** вҖ” Transparent or with background, up to 4K resolution\n- **Video export** вҖ” 60fps capture with iOS-style trim UI, MP4 (via FFmpeg WASM) or WebM, quality control\n- **3D model export** вҖ” Download the scene as GLB (color + materials preserved), STL (3D printing), OBJ, or PLY\n- **Camera mode** вҖ” iPhone-style shutter button, aspect ratio picker, viewfinder overlay\n- **Interactive canvas** вҖ” Drag rotation with momentum, scroll zoom, cursor-follow orbit\n- **Responsive** вҖ” Auto-zooms on narrow/portrait viewports to keep the 3D object visible\n- **Embed code export** вҖ” Copy-ready `<SVG3D>` JSX snippet with all props from the current editor state\n- **Drag & drop** вҖ” Drop SVG files anywhere on the page to load them\n\n## Project Structure\n\n```\n3dsvg/\nв”ңв”Җв”Җ packages/\nв”Ӯ   в”ңв”Җв”Җ engine/                 # npm package \"3dsvg\"\nв”Ӯ   в”Ӯ   в””в”Җв”Җ src/\nв”Ӯ   в”Ӯ       в”ңв”Җв”Җ index.tsx       # SVG3D component (public API)\nв”Ӯ   в”Ӯ       в”ңв”Җв”Җ scene.tsx       # 3D scene, ExtrudedSVG, Canvas\nв”Ӯ   в”Ӯ       в”ңв”Җв”Җ controls.tsx    # Animations, smooth controls\nв”Ӯ   в”Ӯ       в”ңв”Җв”Җ materials.ts    # 10 PBR material presets\nв”Ӯ   в”Ӯ       в”ңв”Җв”Җ types.ts        # SVG3DProps, defaults\nв”Ӯ   в”Ӯ       в””в”Җв”Җ use-font.ts     # Google Font loading\nв”Ӯ   в””в”Җв”Җ web/                    # Next.js editor app\nв”Ӯ       в””в”Җв”Җ src/\nв”Ӯ           в”ңв”Җв”Җ app/            # Pages\nв”Ӯ           в”ңв”Җв”Җ components/     # Editor UI, export bar\nв”Ӯ           в””в”Җв”Җ lib/            # Textures, FFmpeg, utilities\nв””в”Җв”Җ package.json                # npm workspaces root\n```\n\n## Tech Stack\n\n| Library | Purpose |\n|---------|---------|\n| [Next.js 16](https://nextjs.org/) | App framework (web) |\n| [React Three Fiber](https://docs.pmnd.rs/react-three-fiber) | Declarative Three.js |\n| [Three.js](https://threejs.org/) | 3D rendering |\n| [tsup](https://tsup.egoist.dev/) | Engine bundler |\n| [opentype.js](https://opentype.js.org/) | Font to vector paths |\n| [FFmpeg WASM](https://ffmpegwasm.netlify.app/) | Video conversion (web) |\n| [shadcn/ui](https://ui.shadcn.co tuml ` / ` ```puml ` | SVG |\n| Architecture | (no fence, raw HTML) | HTML |\n| Infocard | (no fence, raw HTML) | HTML |\n\n---\n\n## рҹ”— Links\n\n- [Markdown Viewer Extension](https://docu.md) - The rendering engine behind these skills\n- [Agent Skills Format](https://agentskills.io/) - Standard format for AI agent skills\n- [Chrome Extension](https://chromewebstore.google.com/detail/markdown-viewer/jekhhoflgcfoikceikgeenibinpojaoi) - Install for Chrome/Edge\n- [Firefox Add-on](https://addons.mozilla.org/firefox/addon/markdown-viewer-extension/) - Install for Firefox\n- [VS Code Extension](https://marketplace.visualstudio.com/items?itemName=xicilion.markdown-viewer-extension) - Install for VS Code\n\n---\n\n## рҹӨқ Contributing\n\nTo add a new skill:\n\n1. Create a new folder under `skills/` with your skill name\n2. Add a `SKILL.md` file following the standard format:\n   ```yaml\n   ---\n   name: your-skill-name\n   description: Brief description of the skill\n   metadata:\n     author: Your attribution text\n   ---\n   ```\n3. Include examples/references in a subfolder\n4. Update this README to include your skill in the tables\n\n---\n\n## рҹ“„ License\n\nMIT\n","summary":"The Markdown Viewer Agent Skills package gives AI coding agents a toolbox for generating rich diagrams and visualizations straight within Markdown files. It bundles 14 opinionated skills across five rendering enginesвҖ”including Vega charts, infographic templates, PlantUML UML and cloud diagrams, and HTML/CSSвҖ‘embedded architecture cardsвҖ”each defined with simple code fences or inline templates. By installing the skill set into agents such as Claude, Copilot, or Cursor, writers, engineers, and data scientists can embed charting, mindвҖ‘mapping, and enterpriseвҖ‘architecture diagrams without leaving their markdown workflow. This makes technical documentation and presentations faster, more consistent, and visually engaging for teams that rely on Markdown for planning, design, and reporting.","description":"Opinionated skills for AI coding agents to create stunning diagrams and visualizations directly in Markdown. These skills extend agent capabilities across diagram generation, data visualization, and technical documentation.","stars":1893,"language":null},{"owner":"retlehs","repo":"quien","url":"https://github.com/retlehs/quien","readme":"# quien\n\n[![Build status](https://img.shields.io/github/actions/workflow/status/retlehs/quien/ci.yml?branch=main&style=flat-square)](https://github.com/retlehs/quien/actions)\n![GitHub release](https://img.shields.io/github/release/retlehs/quien?style=flat-square)\n![GitHub downloads](https://img.shields.io/github/downloads/retlehs/quien/total?label=github%20downloads&style=flat-square)\n\nA better whois and domain intelligence toolkit. Interactive TUI with tabbed views for WHOIS, DNS, mail, SSL/TLS, HTTP headers, SEO analysis, and tech stack detection.\n\n![quien demo](demo.gif)\n\nTry it without installing: `ssh quien.sh`\n\n## Install\n\n**Homebrew**\n\n```\nbrew tap retlehs/tap\nbrew install retlehs/tap/quien\n```\n\n**Ubuntu / Debian**\n\n```\ncurl -fsSL https://apt.quien.dev/install.sh | sudo sh\n```\n\n**Arch Linux (AUR)**\n\n```\nyay -S quien\n```\n\n**Go**\n\n```\ngo install github.com/retlehs/quien@latest\n```\n\n## Features\n\n- **RDAP-first lookups** with WHOIS fallback for broad TLD coverage\n  - **IANA referral** for automatic WHOIS server discovery\n- **IP lookups** with reverse DNS, network info, abuse contacts, and ASN discovery via RDAP\n  - **BGP fallback** for origin ASN/prefix when RDAP does not include ASN data\n  - **PeeringDB enrichment** for ASN context (network/org, peering policy, peering locations, traffic profile, IX/facility counts)\n- **Mail configuration audit** вҖ” MX, SPF, DMARC, DKIM, and BIMI with VMC chain validation\n- **SEO analysis** вҖ” indexability (robots.txt, canonical, sitemap), on-page (title, description, headings, images), structured data (JSON-LD, Open Graph, Twitter Cards), and performance hints (compression, caching, render-blocking resources)\n  - **Core Web Vitals** вҖ” LCP, INP, CLS, FCP, and TTFB field data with historical trends via the CrUX API (optional)\n- **Tech stack detection** including WordPress plugins, JS/CSS frameworks, and external services parsed from HTML\n- **Automatic retry** with exponential backoff on all lookups\n- **JSON subcommands** for scripting: `quien whois`, `quien dns`, `quien mail`, `quien tls`, `quien http`, `quien seo`, `quien stack`, `quien all`\n\n## Usage\n\n```\n# Interactive prompt\nquien\n\n# Domain lookup (interactive TUI)\nquien example.com\n\n# IP address lookup\nquien 8.8.8.8\n\n# JSON output\nquien --json example.com\n\n# JSON subcommands\nquien whois example.com\nquien dns example.com\nquien mail example.com\nquien tls example.com\nquien http example.com\nquien seo example.com\nquien stack example.com\nquien all example.com\n\n# Use a specific DNS resolver for this run\nquien mail example.com --resolver 9.9.9.9\n\n# Set a default resolver via environment variable\nQUIEN_RESOLVER=1.1.1.1 quien dns example.com\n```\n\nResolver precedence: `--resolver` > `QUIEN_RESOLVER` > system resolver.\n\n## Core Web Vitals\n\nThe SEO tab includes local checks out of the box. For Core Web Vitals field data (real-user metrics from Chrome), set a CrUX API key:\n\n```sh\nexport QUIEN_CRUX_API_KEY=your-api-key\n```\n\nThis enables LCP, INP, CLS, FCP, and TTFB p75 values with good/needs-improvement/poor ratings, plus an 8-25 week trend sparkline.\n\n<details>\n<summary>Getting a CrUX API key</summary>\n\n1. Go to the [Google Cloud Console](https://console.cloud.google.com/)\n2. Create a new project (or select an existing one)\n3. Go to **APIs & Services > Library**\n4. Search for **Chrome UX Report API** and enable it\n5. Go to **APIs & Services > Credentials**\n6. Click **Create Credentials > API key**\n7. Click **Edit API key**, then under **API restrictions** select **Restrict key** and choose **Chrome UX Report API** from the list\n8. Copy the key and set it as `QUIEN_CRUX_API_KEY`\n\nThe CrUX API is free. Not all domains have field data вҖ” a site needs enough Chrome traffic to be included in the Chrome User Experience Report.\n\n</details>\n\n## Theme\n\nquien automatically detects your terminal background and picks light or dark colors. If detection gets it wrong (common in tmux, screen, or remote shells), override it:\n\n```sh\nexport QUIEN_THEME=light  # force light palette\nexport QUIEN_THEME=dark   # force dark palette\nexport QUIEN_THEME=auto   # auto-detect (default)\n```\n\n## Troubleshooting DNS\n\nIf your system resolver is unreliable (common in WSL, VPN, or container setups), force a resolver:\n\n```sh\nquien mail example.com --resolver 9.9.9.9\n# or\nexport QUIEN_RESOLVER=9.9.9.9\n```\n\n> [!TIP]\n> If you want `quien` to replace your default whois tool, you can add an alias to your shell config:\n> ```sh\n> alias whois=quien\n> ```\n\n## Agent skill\n\nAdd quien as a [agent skill](https://skills.sh/) so agents use it for domain and IP lookups:\n\n```\nnpx skills add retlehs/quien\n```\n","summary":"quien is an interactive terminal UI and commandвҖ‘line toolkit that aggregates a wide range of domain and IP intelligenceвҖ” from RDAPвҖ‘driven whois and DNS lookups to mail configuration audits, SSL/TLS checks, HTTP header analysis, SEO metrics and techвҖ‘stack detectionвҖ”all presented in tabbed views or JSON. It automatically discovers appropriate WHOIS servers, enriches ASN data with PeeringDB, retries queries with exponential backoff, and can pull Core Web Vitals from the CrUX API, making it useful for network admin and security professionals performing rapid recon and audits. Developers, DevOps, and siteвҖ‘performance teams benefit from the oneвҖ‘stop tool that lets them script outputs (e.g., `quien whois example.com`) while also inspecting detailed SEO, JavaScript frameworks, and WordPress plugin usage directly from the terminal.","description":"A better whois and domain intelligence toolkit","stars":608,"language":"Go"},{"owner":"yizhiyanhua-ai","repo":"fireworks-tech-graph","url":"https://github.com/yizhiyanhua-ai/fireworks-tech-graph","readme":"[English](README.md) | [дёӯж–Ү](README.zh.md)\n\n# fireworks-tech-graph\n\n> **Stop drawing diagrams by hand.** Describe your system in English or Chinese вҖ” get publication-ready SVG + PNG technical diagrams in seconds.\n\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](LICENSE)\n[![Claude Code Skill](https://img.shields.io/badge/Claude%20Code-Skill-blue)](https://claude.ai/code)\n[![7 Visual Styles](https://img.shields.io/badge/Styles-7-purple)]()\n[![14 Diagram Types](https://img.shields.io/badge/Diagram%20Types-14-green)]()\n[![UML Support](https://img.shields.io/badge/UML-Full%20Support-orange)]()\n\n---\n\n## Overview\n\n`fireworks-tech-graph` turns natural language descriptions into polished SVG diagrams, then exports them as high-resolution PNG via `rsvg-convert`. It ships with **7 visual styles** and deep knowledge of AI/Agent domain patterns (RAG, Agentic Search, Mem0, Multi-Agent, Tool Call flows), plus full support for all 14 UML diagram types.\n\n```\nUser: \"Generate a Mem0 memory architecture diagram, dark style\"\n  вҶ’ Skill classifies: Memory Architecture Diagram, Style 2\n  вҶ’ Generates SVG with swim lanes, cylinders, semantic arrows\n  вҶ’ Exports 1920px PNG\n  вҶ’ Reports: mem0-architecture.svg / mem0-architecture.png\n```\n\n---\n\n## Showcase\n\n> All samples exported at 1920px width (2Г— retina) via `rsvg-convert`. PNG is lossless and the right choice for technical diagrams вҖ” sharp edges, no JPEG compression artifacts on text/lines.\n\n### Style 1 вҖ” Flat Icon (default)\n*Mem0 Memory Architecture вҖ” white background, semantic arrows, layered memory system*\n![Style 1 вҖ” Flat Icon](assets/samples/sample-style1-flat.png)\n\n### Style 2 вҖ” Dark Terminal\n*Tool Call Flow вҖ” dark background, neon accents, monospace font*\n![Style 2 вҖ” Dark Terminal](assets/samples/sample-style2-dark.png)\n\n### Style 3 вҖ” Blueprint\n*Microservices Architecture вҖ” deep blue background, grid lines, cyan strokes*\n![Style 3 вҖ” Blueprint](assets/samples/sample-style3-blueprint.png)\n\n### Style 4 вҖ” Notion Clean\n*Agent Memory Types вҖ” minimal white, single accent color*\n![Style 4 вҖ” Notion Clean](assets/samples/sample-style4-notion.png)\n\n### Style 5 вҖ” Glassmorphism\n*Multi-Agent Collaboration вҖ” dark gradient background, frosted glass cards*\n![Style 5 вҖ” Glassmorphism](assets/samples/sample-style5-glass.png)\n\n### Style 6 вҖ” Claude Official\n*System Architecture вҖ” warm cream background (#f8f6f3), Anthropic brand colors, clean professional aesthetic*\n![Style 6 вҖ” Claude Official](assets/samples/sample-style6-claude.png)\n\n### Style 7 вҖ” OpenAI Official\n*API Integration Flow вҖ” pure white background, OpenAI brand palette, modern minimalist design*\n![Style 7 вҖ” OpenAI Official](assets/samples/sample-style7-openai.png)\n\n---\n\n## Stable Prompt Recipes\n\nUse prompts like these when you want the model to stay close to the repo's strongest regression-tested outputs:\n\n### Style 1 вҖ” Flat Icon\n```text\nDraw a Mem0 memory architecture diagram in style 1 (Flat Icon).\nUse four horizontal sections: Input Layer, Memory Manager, Storage Layer, Output / Retrieval.\nInclude User, AI App / Agent, LLM, mem0 Client, Memory Manager, Vector Store, Graph DB, Key-Value Store, History Store, Context Builder, Ranked Results, Personalized Response.\nUse semantic arrows for read, write, control, and data flow. Keep the layout clean and product-doc friendly.\n```\n\n### Style 2 вҖ” Dark Terminal\n```text\nDraw a tool call flow diagram in style 2 (Dark Terminal).\nShow User query, Retrieve chunks, Generate answer, Knowledge base, Agent, Terminal, Source documents, and Grounded answer.\nUse terminal chrome, neon accents, monospace typography, and semantic arrows for retrieval, synthesis, and embedding update.\n```\n\n### Style 3 вҖ” Blueprint\n```text\nDraw a microservices architecture diagram in style 3 (Blueprint).\nCreate numbered engineering sections like 01 // EDGE, 02 // APPLICATION SERVICES, 03 // DATA + EVENT INFRA, 04 // OBSERVABILITY.\nInclude Client Apps, API Gateway, Auth / Policy, three services, Event Router, Postgres, Redis Cache, Warehouse, and Metrics / Traces.\nUse blueprint grid, cyan strokes, and a bottom-right title block.\n```\n\n### Style 4 вҖ” Notion Clean\n```text\nDraw an agent memory types diagram in style 4 (Notion Clean).\nCompare Sensory Memory, Working Memory, Episodic Memory, Semantic Memory, and Procedural Memory around a central Agent core.\nUse a minimal white layout, neutral borders, one accent color for arrows, and short storage tags for each memory type.\n```\n\n### Style 5 вҖ” Glassmorphism\n```text\nDraw a multi-agent collaboration diagram in style 5 (Glassmorphism).\nUse three sections: Mission Control, Specialist Agents, and Synthesis.\nInclude User brief, Coordinator Agent, Research Agent, Coding Agent, Review Agent, Shared Memory, Synthesis Engine, and Final response.\nUse frosted cards, soft glow, and semantic arrows for delegation, shared memory writes, and synthesis output.\n```\n\n### Style 6 вҖ” Claude Official\n```text\nDraw a system architecture diagram in style 6 (Claude Official).\nUse left-side layer labels: Interface Layer, Core Layer, Foundation Layer.\nInclude Client Surface, Gateway, Task Planner, Model Runtime, Policy Guardrails, Memory Store, Tool Runtime, Observability, and Registry.\nUse warm cream background, restrained brand-like palette, generous whitespace, and a bottom-right legend.\n```\n\n### Style 7 вҖ” OpenAI Official\n```text\nDraw an API integration flow diagram in style 7 (OpenAI Official).\nUse three sections: Entry, Model + Tools, and Delivery.\nInclude Application, OpenAI SDK Layer, Prompt Builder, Model Runtime, Tool Calls, Response Formatter, Observability, and Release Control.\nKeep the look minimal, white, precise, and modern with clean green-accented arrows.\n```\n\n---\n\n## Features\n\n- **7 visual styles** вҖ” from clean white docs to dark neon to frosted glass to official brand styles\n- **Executable style system** вҖ” style guides are encoded into the generator, not only documented in markdown\n- **14 diagram types** вҖ” Full UML support (Class, Component, Deployment, Package, Composite Structure, Object, Use Case, Activity, State Machine, Sequence, Communication, Timing, Interaction Overview, ER Diagram) plus AI/Agent domain diagrams\n- **AI/Agent domain patterns** вҖ” RAG, Agentic Search, Mem0, Multi-Agent, Tool Call, and more built-in\n- **Semantic shape vocabulary** вҖ” LLM = double-border rect, Agent = hexagon, Vector Store = ringed cylinder\n- **Semantic arrow system** вҖ” color + dash pattern encode meaning (write vs read vs async vs loop)\n- **Product icons** вҖ” 40+ products with brand colors: OpenAI, Anthropic, Pinecone, Weaviate, Kafka, PostgreSQLвҖҰ\n- **Swim lane grouping** вҖ” automatic layer labeling for complex architectures\n- **SVG + PNG output** вҖ” SVG for editing, 1920px PNG for embedding\n- **rsvg-convert compatible** вҖ” no external font fetching, pure inline SVG\n\n---\n\n## Installation\n\n```bash\nnpx skills add yizhiyanhua-ai/fireworks-tech-graph\n```\n\nThis skill is installed from the GitHub repository. The npm package page is the public package/distribution page:\n\n```text\nhttps://www.npmjs.com/package/@yizhiyanhua-ai/fireworks-tech-graph\n```\n\nDo not use the npm package name with `skills add`, because the CLI resolves install sources as GitHub/local paths.\n\n## Update\n\n```bash\nnpx skills add yizhiyanhua-ai/fireworks-tech-graph --force -g -y\n```\n\nRe-run `add --force` to pull the latest version of this skill.\n\nOr clone directly:\n\n```bash\ngit clone https://github.com/yizhiyanhua-ai/fireworks-tech-graph.git ~/.claude/skills/fireworks-tech-graph\n```\n\n---\n\n## Requirements\n\n```bash\n# macOS\nbrew install librsvg\n\n# Ubuntu/Debian\nsudo apt install librsvg2-bin\n\n# Verify\nrsvg-convert --version\n```\n\n---\n\n## Why Not Mermaid or draw.io?\n\n| | Mermaid | draw.io | **fireworks-tech-graph** |\n|--|---------|---------|--------------------------|\n| Natural language input | вң— | вң— | вң… |\n| AI/Agent domain patterns | вң— | вң— | вң… |\n| Multiple visual styles | вң— | manual | вң… 5 built-in |\n| High-res PNG export | вң— | manual | вң… auto 1920px |\n| Semantic arrow colors | вң— | manual | вң… auto |\n| No online tool needed | вң… | вң— | вң… |\n\nMermaid is great for quick inline diagrams in markdown. draw.io is great for manual polishing. `fireworks-tech-graph` is optimized for **describing a system and getting a polished diagram immediately**, without writing DSL syntax or clicking around a GUI.\n\n---\n\n## Usage\n\n### Trigger phrases\n\nThe skill auto-triggers on:\n\n```\ngenerate diagram / draw diagram / create chart / visualize\narchitecture diagram / flowchart / sequence diagram / data flow\n```\n\n### Basic usage\n\n```\nDraw a RAG pipeline flowchart\n```\n\n```\nGenerate an Agentic Search architecture diagram\n```\n\n### Specify style\n\n```\nDraw a microservices architecture diagram, style 2 (dark terminal)\n```\n\n```\nDraw a multi-agent collaboration diagram --style glassmorphism\n```\n\n### Specify output path\n\n```\nGenerate a Mem0 architecture diagram, output to ~/Desktop/\n```\n\n```\nCreate a tool call flow diagram --output /tmp/diagrams/\n```\n\n---\n\n## Example Prompts by Scenario\n\n### AI/Agent Systems\n\n```\nCompare Agentic RAG vs standard RAG in a feature matrix, Notion clean style\n```\nвҶ’ Comparison matrix: RAG vs Agentic RAG, covering retrieval strategy, agent loop, tool use\n\n```\nGenerate a Mem0 memory architecture diagram with vector store, graph DB, KV store, and memory manager\n```\nвҶ’ Memory Architecture with swim lanes: Input вҶ’ Memory Manager вҶ’ Storage tiers вҶ’ Retrieval\n\n```\nDraw a Multi-Agent diagram: Orchestrator dispatches 3 SubAgents (search / compute / code execution), results aggregated\n```\nвҶ’ Agent Architecture with hexagons, tool layers, and result aggregation\n\n```\nVisualize the Tool Call execution flow: LLM вҶ’ Tool Selector вҶ’ Execution вҶ’ Parser вҶ’ back to LLM\n```\nвҶ’ Flowchart with decision loop showing tool invocation cycle\n\n```\nDraw the 5 agent memory types: Sensory, Working, Episodic, Semantic, Procedural\n```\nвҶ’ Mind map or layered architecture showing memory tiers from sensory to procedural\n\n### Infrastructure & Cloud\n\n```\nDraw a microservices architecture: Client вҶ’ API Gateway вҶ’ [User Service / Order Service / Payment Service] вҶ’ PostgreSQL + Redis\n```\nвҶ’ Architecture diagram with horizontal layers, swim lanes per service cluster\n\n```\nGenerate a data pipeline diagram: Kafka вҶ’ Spark processing вҶ’ write to S3 вҶ’ Athena query\n```\nвҶ’ Data flow diagram with labeled arrows (stream / batch / query)\n\n```\nDraw a Kubernetes deployment: Ingress вҶ’ Service вҶ’ [Pod Г— 3] вҶ’ ConfigMap + PersistentVolume\n```\nвҶ’ Architecture with dashed containers per namespace, solid arrows for traffic flow\n\n### API & Sequence Flows\n\n```\nDraw an OAuth2 authorization code flow sequence diagram: User вҶ’ Client вҶ’ Auth Server вҶ’ Resource Server\n```\nвҶ’ Sequence diagram with vertical lifelines and activation boxes\n\n```\nDraw the ChatGPT Plugin call sequence diagram\n```\nвҶ’ Sequence: User вҶ’ ChatGPT вҶ’ Plugin Manifest вҶ’ API вҶ’ Response chain\n\n### Decision & Process Flows\n\n```\nDraw a pre-launch QA flowchart for an AI app: Code Review вҶ’ Security Scan вҶ’ Performance Test вҶ’ Manual Approval вҶ’ Deploy\n```\nвҶ’ Flowchart with diamond decision nodes and parallel branches\n\n```\nGenerate a feature comparison matrix: RAG vs Fine-tuning vs Prompt Engineering\n```\nвҶ’ Comparison matrix with checked/unchecked cells across cost, latency, accuracy, flexibility\n\n### Concept Maps\n\n```\nVisualize the LLM application tech stack: from foundation model to SDK to app framework to deployment\n```\nвҶ’ Layered architecture or mind map from model layer to product layer\n\n```\nDraw an AI Agent capability map: Perception / Memory / Reasoning / Action / Learning\n```\nвҶ’ Mind map with central \"AI Agent\" node and 5 radial branches\n\n---\n\n## Styles\n\n| # | Name | Background | Font | Best For |\n|---|------|-----------|------|----------|\n| 1 | **Flat Icon** *(default)* | `#ffffff` | Helvetica | Blogs, slides, docs |\n| 2 | **Dark Terminal** | `#0f0f1a` | SF Mono / Fira Code | GitHub README, dev articles |\n| 3 | **Blueprint** | `#0a1628` | Courier New | Architecture docs, engineering |\n| 4 | **Notion Clean** | `#ffffff` | system-ui | Notion, Confluence, wikis |\n| 5 | **Glassmorphism** | `#0d1117` gradient | Inter | Product sites, keynotes |\n| 6 | **Claude Official** | `#f8f6f3` | system-ui | Anthropic-style diagrams, warm aesthetic |\n| 7 | **OpenAI Official** | `#ffffff` | system-ui | OpenAI-style diagrams, clean modern look |\n\nEach style has a dedicated reference file in `references/` with exact color tokens, SVG patterns, and templates.\nThe generator also consumes style-aware structure fields such as `containers`, semantic `nodes[].kind`, `arrows[].flow`, and explicit port anchors so sample-grade layouts can be reproduced more consistently.\n\nUseful high-leverage fields for style-specific polish:\n- `style_overrides` to nudge title alignment or palette tokens without forking a full style\n- `containers[].header_prefix` / `containers[].header_text` for blueprint-style numbered section headers such as `01 // EDGE`\n- `containers[].side_label` for Claude-style left layer labels\n- `window_controls`, `meta_left`, `meta_center`, `meta_right` for terminal / document chrome\n- `blueprint_title_block` for engineering title boxes in style 3\n\n### Style Selection Guide\n\n**For UML Diagrams:**\n- **Class/Component/Package**: Style 1 (Flat Icon) or Style 4 (Notion Clean) вҖ” clear structure, easy to read\n- **Sequence/Timing**: Style 2 (Dark Terminal) вҖ” monospace fonts help with alignment\n- **State Machine/Activity**: Style 3 (Blueprint) вҖ” engineering aesthetic fits process flows\n- **Use Case/Interview**: Style 1 (Flat Icon) вҖ” colorful, accessible\n\n**For AI/Agent Diagrams:**\n- **RAG/Agentic Search**: Style 2 (Dark Terminal) or Style 5 (Glassmorphism) вҖ” tech-forward aesthetic\n- **Memory Architecture**: Style 3 (Blueprint) вҖ” emphasizes layered storage tiers\n- **Multi-Agent**: Style 5 (Glassmorphism) вҖ” frosted cards distinguish agent boundaries\n\n**For Documentation:**\n- **Internal docs**: Style 4 (Notion Clean) вҖ” minimal, wiki-friendly\n- **Blog posts**: Style 1 (Flat Icon) вҖ” colorful, engaging\n- **GitHub README**: Style 2 (Dark Terminal) вҖ” matches dark theme\n- **Presentations**: Style 5 (Glassmorphism) or Style 6 (Claude Official) вҖ” polished\n\n**Brand-Specific:**\n- **Anthropic/Claude projects**: Style 6 (Claude Official) вҖ” warm cream background, brand colors\n- **OpenAI projects**: Style 7 (OpenAI Official) вҖ” clean white, OpenAI palette\n\n---\n\n## Diagram Types\n\n| Type | Description | Key Layout Rule |\n|------|-------------|-----------------|\n| **Architecture** | Services, components, cloud infra | Horizontal layers topвҶ’bottom |\n| **Data Flow** | What data moves where | Label every arrow with data type |\n| **Flowchart** | Decisions, process steps | Diamond = decision, topвҶ’bottom |\n| **Agent Architecture** | LLM + tools + memory | 5-layer model: Input/Agent/Memory/Tool/Output |\n| **Memory Architecture** | Mem0, MemGPT-style | Separate read/write paths, memory tiers |\n| **Sequence** | API call chains, time-ordered | Vertical lifelines, horizontal messages |\n| **Comparison** | Feature matrix, side-by-side | Column = system, row = attribute |\n| **Mind Map** | Concept maps, radial | Central node, bezier branches |\n\n### UML Diagram Support (14 Types)\n\n| UML Type | Description | Best Style |\n|----------|-------------|------------|\n| **Class Diagram** | Classes, attributes, methods, relationships | Style 1, 4 |\n| **Component Diagram** | Software components and dependencies | Style 1, 3 |\n| **Deployment Diagram** | Hardware nodes and software deployment | Style 3 |\n| **Package Diagram** | Package organization and dependencies | Style 1, 4 |\n| **Composite Structure** | Internal structure of classes/components | Style 1, 3 |\n| **Object Diagram** | Object instances and relationships | Style 1, 4 |\n| **Use Case Diagram** | Actors, use cases, system boundaries | Style 1 |\n| **Activity Diagram** | Workflows, parallel processes | Style 3 |\n| **State Machine** | State transitions and events | Style 2, 3 |\n| **Sequence Diagram** | Message exchanges over time | Style 2 |\n| **Communication Diagram** | Object interactions and messages | Style 1, 2 |\n| **Timing Diagram** | State changes over time | Style 2 |\n| **Interaction Overview** | High-level interaction flow | Style 1, 2 |\n| **ER Diagram** | Entity-relationship data models | Style 1, 3 |\n\n---\n\n## AI/Agent Domain Patterns\n\nBuilt-in pattern knowledge:\n\n```\nRAG Pipeline         вҶ’ Query вҶ’ Embed вҶ’ VectorSearch вҶ’ Retrieve вҶ’ LLM вҶ’ Response\nAgentic RAG          вҶ’ adds Agent loop + Tool use\nAgentic Search       вҶ’ Query вҶ’ Planner вҶ’ [Search/Calc/Code] вҶ’ Synthesizer\nMem0 Memory Layer    вҶ’ Input вҶ’ Memory Manager вҶ’ [VectorDB + GraphDB] вҶ’ Context\nAgent Memory Types   вҶ’ Sensory вҶ’ Working вҶ’ Episodic вҶ’ Semantic вҶ’ Procedural\nMulti-Agent          вҶ’ Orchestrator вҶ’ [SubAgentГ—N] вҶ’ Aggregator вҶ’ Output\nTool Call Flow       вҶ’ LLM вҶ’ Tool Selector вҶ’ Execution вҶ’ Parser вҶ’ LLM (loop)\n```\n\n---\n\n## Shape Vocabulary\n\nShapes encode semantic meaning consistently across all styles:\n\n| Concept | Shape |\n|---------|-------|\n| User / Human | Circle + body |\n| LLM / Model | Rounded rect, double border, вҡЎ |\n| Agent / Orchestrator | Hexagon |\n| Memory (short-term) | Dashed-border rounded rect |\n| Memory (long-term) | Solid cylinder |\n| Vector Store | Cylinder with inner rings |\n| Graph DB | 3-circle cluster |\n| Tool / Function | Rect with вҡҷ |\n| API / Gateway | Hexagon (single border) |\n| Queue / Stream | Horizontal pipe/tube |\n| Document / File | Folded-corner rect |\n| Browser / UI | Rect with 3-dot titlebar |\n| Decision | Diamond |\n| External Service | Dashed-border rect |\n\n---\n\n## Arrow Semantics\n\n| Flow Type | Stroke | Dash | Meaning |\n|-----------|--------|------|---------|\n| Primary data flow | 2px solid | вҖ” | Main request/response |\n| Control / trigger | 1.5px solid | вҖ” | System A triggers B |\n| Memory read | 1.5px solid | вҖ” | Retrieve from store |\n| Memory write | 1.5px | `5,3` | Write/store operation |\n| Async / event | 1.5px | `4,2` | Non-blocking |\n| Feedback / loop | 1.5px curved | вҖ” | Iterative reasoning |\n\n---\n\n## File Structure\n\n```\nfireworks-tech-graph/\nв”ңв”Җв”Җ SKILL.md                      # Main skill вҖ” diagram types, layout rules, shape vocab\nв”ңв”Җв”Җ README.md                     # This file (English)\nв”ңв”Җв”Җ README.zh.md                  # Chinese version\nв”ңв”Җв”Җ references/\nв”Ӯ   в”ңв”Җв”Җ style-1-flat-icon.md      # White background, colored accents\nв”Ӯ   в”ңв”Җв”Җ style-2-dark-terminal.md  # Dark bg, neon accents, monospace\nв”Ӯ   в”ңв”Җв”Җ style-3-blueprint.md      # Blueprint grid, cyan lines\nв”Ӯ   в”ңв”Җв”Җ style-4-notion-clean.md   # Minimal, white, single arrow color\nв”Ӯ   в”ңв”Җв”Җ style-5-glassmorphism.md  # Dark gradient, frosted glass cards\nв”Ӯ   в”ңв”Җв”Җ style-6-claude-official.md # Warm cream background, Anthropic brand\nв”Ӯ   в”ңв”Җв”Җ style-7-openai.md      # Clean white, OpenAI brand palette\nв”Ӯ   в””в”Җв”Җ icons.md                  # 40+ product icons + semantic shapes\nв”ңв”Җв”Җ agents/\nв”Ӯ   в””в”Җв”Җ openai.yaml              # Agent metadata for compatible runtimes\nв”ңв”Җв”Җ fixtures/\nв”Ӯ   в”ңв”Җв”Җ mem0-style1.json         # Style 1 regression fixture\nв”Ӯ   в”ңв”Җв”Җ tool-call-style2.json    # Style 2 regression fixture\nв”Ӯ   в””в”Җв”Җ ...                      # Additional sample-grade fixtures per style\nв”ңв”Җв”Җ scripts/\nв”Ӯ   в”ңв”Җв”Җ generate-diagram.sh       # Validate SVG + export PNG\nв”Ӯ   в”ңв”Җв”Җ generate-from-template.py # Create starter SVGs from templates\nв”Ӯ   в”ңв”Җв”Җ validate-svg.sh           # Validate SVG syntax\nв”Ӯ   в””в”Җв”Җ test-all-styles.sh        # Batch test all styles\nв”ңв”Җв”Җ assets/\nв”Ӯ   в””в”Җв”Җ samples/                  # Showcase diagram PNGs\nв”ңв”Җв”Җ templates/\nв”Ӯ   в”ңв”Җв”Җ architecture.svg         # Architecture starter template\nв”Ӯ   в”ңв”Җв”Җ data-flow.svg            # Data-flow starter template\nв”Ӯ   в””в”Җв”Җ ...                      # Additional diagram templates\nв””в”Җв”Җ agentloop-core.svg           # Included sample SVG\n```\n\n---\n\n## Product Icon Coverage\n\n**AI/ML:** OpenAI, Anthropic/Claude, Google Gemini, Meta LLaMA, Mistral, Cohere, Groq, Hugging Face\n\n**AI Frameworks:** Mem0, LangChain, LlamaIndex, LangGraph, CrewAI, AutoGen, DSPy, Haystack\n\n**Vector DBs:** Pinecone, Weaviate, Qdrant, Chroma, Milvus, pgvector, Faiss\n\n**Databases:** PostgreSQL, MySQL, MongoDB, Redis, Elasticsearch, Neo4j, Cassandra\n\n**Messaging:** Kafka, RabbitMQ, NATS, Pulsar\n\n**Cloud:** AWS, GCP, Azure, Cloudflare, Vercel, Docker, Kubernetes\n\n**Observability:** Grafana, Prometheus, Datadog, LangSmith, Langfuse, Arize\n\n---\n\n## Troubleshooting\n\n| Symptom | Cause | Fix |\n|---------|-------|-----|\n| PNG is blank or all-black | `@import url()` in SVG вҖ” rsvg-convert can't fetch fonts | Remove `@import`, use system font stack |\n| PNG not generated | `rsvg-convert` not installed | `brew install librsvg` (macOS) or `apt install librsvg2-bin` |\n| Diagram cut off at bottom | ViewBox height too short | Increase `height` in `viewBox=\"0 0 960 <height>\"` |\n| Text overflowing boxes | Labels too long | Add `text-anchor=\"middle\"` + `<clipPath>` or shorten label |\n| Icons not rendering | External CDN URL in rsvg-convert context | Use inline SVG paths from `references/icons.md` |\n\n---\n\n## License\n\nMIT В© 2025 fireworks-tech-graph contributors\n","summary":"FireworksвҖ‘techвҖ‘graph automatically converts naturalвҖ‘language descriptions of systems into publicationвҖ‘ready technical diagrams in SVG, then exports them as highвҖ‘resolution PNGs. It offers 7 distinct visual stylesвҖ”ranging from flat icons to official brand palettesвҖ”and full support for all 14 UML diagram types, with builtвҖ‘in patterns for AI and agent workflows such as RAG, Mem0, and multiвҖ‘agent flows. The tool is ideal for architects, technical writers, and product designers who need quick, consistent, and polished visual documentation without manual diagramming.","description":"Claude Code skill for generating production-quality SVG+PNG technical diagrams. Supports 8 diagram types, 5 visual styles, and deep AI/Agent domain knowledge.","stars":3760,"language":"Python"},{"owner":"ParthJadhav","repo":"ios-marketing-capture","url":"https://github.com/ParthJadhav/ios-marketing-capture","readme":"[![bloom-banner-01-light-tags-1500x500](https://github.com/user-attachments/assets/31139b9d-1b89-44e8-b563-5bb7ba150b7b)](https://bloom.parthjadhav.com)\n\n# iOS Marketing Capture\n\nA skill for AI-powered coding agents (Claude Code, Cursor, Windsurf, etc.) that automates marketing screenshot capture for SwiftUI iOS apps. It builds an in-app capture system, seeds demo data, snapshots every screen and UI element, and loops across all your locales automatically.\n\n#### Built for and used by Bloom - https://apps.apple.com/us/app/bloom-coffee-shelf-recipe/id6759914524\n\n## What it does\n\n- Adds a `#if DEBUG`-gated capture system to your app target вҖ” zero production footprint\n- Seeds deterministic demo data so every screenshot looks populated and polished\n- Navigates to each screen programmatically via a step-based coordinator\n- Snapshots the full window including status bar, safe area, and presented sheets\n- Renders isolated elements (cards, widgets, charts) via `ImageRenderer` at 3x with transparency\n- Loops every locale automatically вҖ” one build, N relaunches with `-AppleLanguages`\n- Works with any SwiftUI navigation pattern: `TabView`, `NavigationStack`, `NavigationSplitView`\n\n## Install\n\n### Using npx skills (recommended)\n\n```bash\nnpx skills add ParthJadhav/ios-marketing-capture\n```\n\nThis works with Claude Code, Cursor, Windsurf, OpenCode, Codex, and [40+ other agents](https://github.com/vercel-labs/skills#available-agents).\n\nInstall globally (available across all projects):\n\n```bash\nnpx skills add ParthJadhav/ios-marketing-capture -g\n```\n\nInstall for a specific agent:\n\n```bash\nnpx skills add ParthJadhav/ios-marketing-capture -a claude-code\n```\n\n### Manual (git clone)\n\n```bash\ngit clone https://github.com/ParthJadhav/ios-marketing-capture ~/.claude/skills/ios-marketing-capture\n```\n\n## Usage\n\nOnce installed, the skill triggers automatically when you ask your agent to:\n\n- Capture marketing screenshots for my iOS app\n- Generate locale screenshots across all languages\n- Render my widgets as isolated PNGs\n- Automate App Store screenshot capture\n\nOr just tell the agent what you need:\n\n```\n> Capture marketing screenshots for my app across all locales\n```\n\nThe agent will ask you about your screens, elements, locales, device, appearance, and seed data before writing any code.\n\n## Example prompts\n\nThese are good starting prompts because they provide context while still leaving room for the skill to guide the process.\n\n### Coffee app\n\n```text\nCapture marketing screenshots for my coffee tracking app.\nI want Home, Shelf, Coffee Detail, Brew Timer, and Settings.\nAlso render coffee cards and all my widgets as isolated elements.\nCapture across en, de, es, fr, ja.\n```\n\n### Habit tracker\n\n```text\nGenerate locale screenshots for my habit tracker app.\nI need the dashboard, habit detail, streak view, and settings.\nLight mode only, iPhone 17 simulator.\nAll 5 locales in my Localizable.xcstrings.\n```\n\n### Finance app\n\n```text\nCapture marketing assets for my finance app.\nI want the overview, transaction list, budget detail, and charts.\nRender the spending chart and category cards as isolated elements.\nEnglish and German only.\n```\n\n### Fitness app with widgets\n\n```text\nAutomate App Store screenshot capture for my workout app.\nCapture the main dashboard, workout detail mid-session, and history.\nRender all my WidgetKit widgets (small, medium, lock screen) as isolated PNGs.\n```\n\n## Better prompt tips\n\n- List the exact screens you want captured by tab name or navigation path\n- Mention any components you want rendered independently (cards, widgets, charts)\n- Specify locales explicitly or say \"all locales in my xcstrings\"\n- Say which simulator and iOS version you want\n- Mention if any screen needs to be captured in a non-default state (e.g. timer mid-countdown)\n- Say light only, dark only, or both\n\n## How it works\n\n### In-app capture mode, not XCUITest\n\nThe skill uses an in-app capture approach instead of XCUITest / Fastlane:\n\n- **No test target surgery** вҖ” many projects have none, and adding one means fragile pbxproj edits\n- **Direct access to everything** вҖ” ViewModels, SwiftData, `ImageRenderer`, `UIWindow.drawHierarchy`\n- **Faster** вҖ” `xcodebuild build` once, then `simctl launch` per locale (no test-bundle overhead)\n- **Element renders require it** вҖ” `ImageRenderer` on widget views must run inside the app process\n\n### Step-based coordinator\n\nEach screenshot is a self-contained `CaptureStep`:\n\n```swift\nstruct CaptureStep {\n    let name: String                         // \"01-home\"\n    let navigate: @MainActor () -> Void      // put the app in the right state\n    let settle: Duration                     // wait for animations\n    let cleanup: (@MainActor () -> Void)?    // tear down before next step\n}\n```\n\nThe coordinator is a simple loop вҖ” no hardcoded screen sequences. The agent composes steps for your specific navigation architecture.\n\n### Navigation patterns\n\nThe skill covers three navigation architectures:\n\n| Pattern | How steps drive it |\n|---------|-------------------|\n| `TabView(selection:)` | `setTab(index)` |\n| `NavigationStack` + router | `router.push(.route)` / `router.popToRoot()` |\n| `NavigationSplitView` | Set sidebar + detail selection bindings |\n\n### Element rendering\n\nIsolated components are rendered via `ImageRenderer` at 3x scale with natural background inside rounded corners and transparency outside:\n\n```swift\nMarketingElementHarness.renderElement(\n    name: \"card-morning-blend\",\n    width: 380,\n    cornerRadius: 20,\n    background: theme.background\n) {\n    CoffeeCard(coffee: coffee, theme: theme)\n        .padding(.horizontal, 16)\n        .padding(.vertical, 12)\n}\n```\n\nWidget rendering handles the quirks of rendering WidgetKit views outside the widget process (missing `containerBackground`, missing padding, `ProgressView` rendering bugs).\n\n## What gets generated\n\nThe skill guides the agent to create:\n\n```\nYourApp/\nв”ңв”Җв”Җ Debug/\nв”Ӯ   в””в”Җв”Җ MarketingCapture.swift      # Capture system (DEBUG-only)\nв”ңв”Җв”Җ ContentView.swift               # Modified вҖ” DEBUG hook for seed + coordinator\nв”ңв”Җв”Җ Views/.../TimerView.swift       # Modified вҖ” primed state hooks (if needed)\nscripts/\nв””в”Җв”Җ capture-marketing.sh            # Build + install + per-locale loop\n```\n\n### Output layout\n\n```\nmarketing/\n    en/\n        01-home.png\n        02-detail.png\n        03-settings.png\n        elements/\n            card-morning-blend.png\n            widget-pulse-small.png\n            chart-cupping.png\n    de/\n        ...\n    es/\n        ...\n```\n\n## Known gotchas\n\nThe skill documents 11 real bugs discovered during development. These are all baked into the skill's guidance so the agent avoids them automatically:\n\n| # | Gotcha | What happens |\n|---|--------|--------------|\n| 1 | Live Activities persist across launches | Next locale crashes on stale SwiftData references |\n| 2 | Re-seeding per locale | CloudKit sync churn causes crashes |\n| 3 | VMs setup before seed | Hold stale empty snapshots |\n| 4 | Setting trigger binding to nil | Doesn't dismiss fullScreenCover вҖ” wrong screenshot |\n| 5 | NavigationPath can't be popped externally | Must capture clean stack before pushed detail |\n| 6 | `membershipExceptions` is an INCLUSION list | Widget target membership goes backwards |\n| 7 | `ImageRenderer` + `ProgressView` | Renders as prohibited symbol without explicit style |\n| 8 | `.containerBackground` outside WidgetKit | No-op вҖ” widget renders have no background |\n| 9 | iPhone 8 Plus gone on iOS 26 | Legacy 6.5\" simulator unavailable |\n| 10 | Locale launch argument format | Parens are mandatory: `(xx)` not `xx` |\n| 11 | SwiftUI animations in ImageRenderer | Captures frame 0, not the animated state |\n\n## Pairs well with\n\nUse [app-store-screenshots](https://github.com/ParthJadhav/app-store-screenshots) as a post-processing step to composite the captured PNGs into Apple-style marketing pages with device mockups, headlines, and gradients.\n\n## Requirements\n\n- Xcode 16+ (synchronized folder groups support)\n- iOS 17+ deployment target (for `ImageRenderer`, `@Observable`)\n- A simulator runtime matching your target iOS version\n- Python 3 (used by the shell script for JSON parsing)\n\n## Contributing\n\nContributions are welcome, especially around:\n\n- Support for additional navigation patterns\n- New gotcha documentation from real projects\n- Cross-agent compatibility improvements\n- Clearer docs and onboarding\n\n## License\n\nMIT\n","summary":"iOS Marketing Capture is an AIвҖ‘powered codingвҖ‘agent skill that injects a debugвҖ‘only screenshot system into SwiftUI apps, letting developers automatically generate polished marketing images for the App Store. It seeds deterministic demo data, walks through every screen via a stepвҖ‘based coordinator, captures fullвҖ‘window snapshots (including status bar and sheets), renders isolated UI elements at high resolution, and repeats this process for every locale in the app. The tool works with any SwiftUI navigation pattern and requires no production changes, making it ideal for app developers, designers, and product marketers who need an efficient, repeatable way to obtain screenshot assets across multiple languages and custom UI components.","description":"Automate Multi-Locale asset creation for your iOS app.","stars":221,"language":"Shell"},{"owner":"garrytan","repo":"gbrain","url":"https://github.com/garrytan/gbrain","readme":"# GBrain\n\nYour AI agent is smart but forgetful. GBrain gives it a brain.\n\nBuilt by the President and CEO of Y Combinator to run his actual AI agents. The production brain powering his OpenClaw and Hermes deployments: **17,888 pages, 4,383 people, 723 companies**, 21 cron jobs running autonomously, built in 12 days. The agent ingests meetings, emails, tweets, voice calls, and original ideas while you sleep. It enriches every person and company it encounters. It fixes its own citations and consolidates memory overnight. You wake up and the brain is smarter than when you went to bed.\n\nThe brain wires itself. Every page write extracts entity references and creates typed links (`attended`, `works_at`, `invested_in`, `founded`, `advises`) with zero LLM calls. Hybrid search. Self-wiring knowledge graph. Structured timeline. Backlink-boosted ranking. Ask \"who works at Acme AI?\" or \"what did Bob invest in this quarter?\" and get answers vector search alone can't reach. Benchmarked end-to-end: **Recall@5 jumps from 83% to 95%, Precision@5 from 39% to 45%, +30 more correct answers in the agent's top-5 reads** on a 240-page Opus-generated rich-prose corpus. Graph-only F1: **86.6% vs grep's 57.8%** (+28.8 pts). [Full report](docs/benchmarks/2026-04-18-brainbench-v1.md).\n\nGBrain is those patterns, generalized. 26 skills. Install in 30 minutes. Your agent does the work. As Garry's personal agent gets smarter, so does yours.\n\n> **~30 minutes to a fully working brain.** Database ready in 2 seconds (PGLite, no server). You just answer questions about API keys.\n\n## Install\n\n### On an agent platform (recommended)\n\nGBrain is designed to be installed and operated by an AI agent. If you don't have one running yet:\n\n- **[OpenClaw](https://openclaw.ai)** ... Deploy [AlphaClaw on Render](https://render.com/deploy?repo=https://github.com/chrysb/alphaclaw) (one click, 8GB+ RAM)\n- **[Hermes Agent](https://github.com/NousResearch/hermes-agent)** ... Deploy on [Railway](https://github.com/praveen-ks-2001/hermes-agent-template) (one click)\n\nPaste this into your agent:\n\n```\nRetrieve and follow the instructions at:\nhttps://raw.githubusercontent.com/garrytan/gbrain/master/INSTALL_FOR_AGENTS.md\n```\n\nThat's it. The agent clones the repo, installs GBrain, sets up the brain, loads 26 skills, and configures recurring jobs. You answer a few questions about API keys. ~30 minutes.\n\n### Standalone CLI (no agent)\n\n```bash\ngit clone https://github.com/garrytan/gbrain.git && cd gbrain && bun install && bun link\ngbrain init                     # local brain, ready in 2 seconds\ngbrain import ~/notes/          # index your markdown\ngbrain query \"what themes show up across my notes?\"\n```\n\n```\n3 results (hybrid search, 0.12s):\n\n1. concepts/do-things-that-dont-scale (score: 0.94)\n   PG's argument that unscalable effort teaches you what users want.\n   [Source: paulgraham.com, 2013-07-01]\n\n2. originals/founder-mode-observation (score: 0.87)\n   Deep involvement isn't micromanagement if it expands the team's thinking.\n\n3. concepts/build-something-people-want (score: 0.81)\n   The YC motto. Connected to 12 other brain pages.\n```\n\n### MCP server (Claude Code, Cursor, Windsurf)\n\nGBrain exposes 30+ MCP tools via stdio:\n\n```json\n{\n  \"mcpServers\": {\n    \"gbrain\": { \"command\": \"gbrain\", \"args\": [\"serve\"] }\n  }\n}\n```\n\nAdd to `~/.claude/server.json` (Claude Code), Settings > MCP Servers (Cursor), or your client's MCP config.\n\n### Remote MCP (Claude Desktop, Cowork, Perplexity)\n\n```bash\nngrok http 8787 --url your-brain.ngrok.app\nbun run src/commands/auth.ts create \"claude-desktop\"\nclaude mcp add gbrain -t http https://your-brain.ngrok.app/mcp -H \"Authorization: Bearer TOKEN\"\n```\n\nPer-client guides: [`docs/mcp/`](docs/mcp/DEPLOY.md). ChatGPT requires OAuth 2.1 (not yet implemented).\n\n## The 26 Skills\n\nGBrain ships 26 skills organized by `skills/RESOLVER.md`. The resolver tells your agent which skill to read for any task.\n\n[Skill files are code.](https://x.com/garrytan/status/2042925773300908103) They're the most powerful way to get knowledge work done. A skill file is a fat markdown document that encodes an entire workflow: when to fire, what to check, how to chain with other skills, what quality bar to enforce. The agent reads the skill and executes it. Skills can also call deterministic TypeScript code bundled in GBrain (search, import, embed, sync) for the parts that shouldn't be left to LLM judgment. [Thin harness, fat skills](docs/ethos/THIN_HARNESS_FAT_SKILLS.md): the intelligence lives in the skills, not the runtime.\n\n### Always-on\n\n| Skill | What it does |\n|-------|-------------|\n| **signal-detector** | Fires on every message. Spawns a cheap model in parallel to capture original thinking and entity mentions. The brain compounds on autopilot. |\n| **brain-ops** | Brain-first lookup before any external API. The read-enrich-write loop that makes every response smarter. |\n\n### Content ingestion\n\n| Skill | What it does |\n|-------|-------------|\n| **ingest** | Thin router. Detects input type and delegates to the right ingestion skill. |\n| **idea-ingest** | Links, articles, tweets become brain pages with analysis, author people pages, and cross-linking. |\n| **media-ingest** | Video, audio, PDF, books, screenshots, GitHub repos. Transcripts, entity extraction, backlink propagation. |\n| **meeting-ingestion** | Transcripts become brain pages. Every attendee gets enriched. Every company gets a timeline entry. |\n\n### Brain operations\n\n| Skill | What it does |\n|-------|-------------|\n| **enrich** | Tiered enrichment (Tier 1/2/3). Creates and updates person/company pages with compiled truth and timelines. |\n| **query** | 3-layer search with synthesis and citations. Says \"the brain doesn't have info on X\" instead of hallucinating. |\n| **maintain** | Periodic health: stale pages, orphans, dead links, citation audit, back-link enforcement, tag consistency. |\n| **citation-fixer** | Scans pages for missing or malformed citations. Fixes format to match the standard. |\n| **repo-architecture** | Where new brain files go. Decision protocol: primary subject determines directory, not format. |\n| **publish** | Share brain pages as password-protected HTML. Zero LLM calls. |\n| **data-research** | Structured data research with parameterized YAML recipes. Extract investor updates, expenses, company metrics from email. |\n\n### Operational\n\n| Skill | What it does |\n|-------|-------------|\n| **daily-task-manager** | Task lifecycle with priority levels (P0-P3). Stored as searchable brain pages. |\n| **daily-task-prep** | Morning prep: calendar lookahead with brain context per attendee, open threads, task review. |\n| **cron-scheduler** | Schedule staggering (5-min offsets), quiet hours (timezone-aware with wake-up override), idempotency. |\n| **reports** | Timestamped reports with keyword routing. \"What's the latest briefing?\" finds it instantly. |\n| **cross-modal-review** | Quality gate via second model. Refusal routing: if one model refuses, silently switch. |\n| **webhook-transforms** | External events (SMS, meetings, social mentions) converted into brain pages with entity extraction. |\n| **testing** | Validates every skill has SKILL.md with frontmatter, manifest coverage, resolver coverage. |\n| **skill-creator** | Create new skills following the conformance standard. MECE check against existing skills. |\n| **minion-orchestrator** | Long-running agent work as background jobs. Submit, fan out children with depth/cap/timeouts, collect results via child_done inbox. |\n\n### Identity and setup\n\n| Skill | What it does |\n|-------|-------------|\n| **soul-audit** | 6-phase interview generating SOUL.md (agent identity), USER.md (user profile), ACCESS_POLICY.md (4-tier privacy), HEARTBEAT.md (operational cadence). |\n| **setup** | Auto-provision PGLite or Supabase. First import. GStack detection. |\n| **migrate** | Universal migration from Obsidian, Notion, Logseq, markdown, CSV, JSON, Roam. |\n| **briefing** | Daily briefing with meeting context, active deals, and citation tracking. |\n\n### Conventions\n\nCross-cutting rules in `skills/conventions/`:\n- **quality.md** ... citations, back-links, notability gate, source attribution\n- **brain-first.md** ... 5-step lookup before any external API call\n- **model-routing.md** ... which model for which task\n- **test-before-bulk.md** ... test 3-5 items before any batch operation\n- **cross-modal.yaml** ... review pairs and refusal routing chain\n\n## How It Works\n\n```\nSignal arrives (meeting, email, tweet, link)\n  -> Signal detector captures ideas + entities (parallel, never blocks)\n  -> Brain-ops: check the brain first (gbrain search, gbrain get)\n  -> Respond with full context\n  -> Write: update brain pages with new information + citations\n  -> Auto-link: typed relationships extracted on every write (zero LLM calls)\n  -> Sync: gbrain indexes changes for next query\n```\n\nEvery cycle adds knowledge. The agent enriches a person page after a meeting. Next time that person comes up, the agent already has context. The difference compounds daily.\n\nThe system gets smarter on its own. Entity enrichment auto-escalates: a person mentioned once gets a stub page (Tier 3). After 3 mentions across different sources, they get web + social enrichment (Tier 2). After a meeting or 8+ mentions, full pipeline (Tier 1). The brain learns who matters without being told. Deterministic classifiers improve over time via a fail-improve loop that logs every LLM fallback and generates better regex patterns from the failures. `gbrain doctor` shows the trajectory: \"intent classifier: 87% deterministic, up from 40% in week 1.\"\n\n> \"Prep me for my meeting with Jordan in 30 minutes\"\n> ... pulls dossier, shared history, recent activity, open threads\n\n> \"What have I said about the relationship between shame and founder performance?\"\n> ... searches YOUR thinking, not the internet\n\n## Minions: your sub-agents won't drop work anymore\n\nA durable, Postgres-native job queue built into the brain. Every long-running agent task is now a job that survives gateway restarts, streams progress, gets paused / resumed / steered mid-flight, and shows up in `gbrain jobs list`. Zero infra beyond your existing brain.\n\n### The production numbers that matter\n\nHere's my personal OpenClaw deployment: one Render container. Supabase Postgres holding a 45,000-page brain. 19 cron jobs firing on schedule. Real gateway load from real daily work. The task: pull a month of my social posts from an external API and ingest them end-to-end into the brain as a structured page.\n\n|              | Minions   | `sessions_spawn`               |\n|---           |---        |---                             |\n| Wall time    | **753ms** | **>10,000ms** (gateway timeout) |\n| Token cost   | **$0.00** | ~$0.03 per run                 |\n| Success rate | **100%**  | **0%** (couldn't even spawn)   |\n| Memory/job   | ~2 MB     | ~80 MB                         |\n\nUnder that 19-cron load, sub-agent spawn couldn't clear the 10-second gateway wall. Minions landed it in under a second for zero tokens. **Scaling:** 19,240 posts across 36 months, single bash loop, ~15 min total, $0.00. Sub-agents: ~9 min best case, ~$1.08 in tokens, ~40% spawn failure. **Lab:** durability вҲһ (SIGKILL mid-flight, 10/10 rescued), throughput ~10Г— faster, fan-out ~21Г— with no failure wall, memory ~400Г— less.\n\nFull benchmarks: [production](docs/benchmarks/2026-04-18-minions-vs-openclaw-production.md) and [lab](docs/benchmarks/2026-04-18-minions-vs-openclaw-subagents.md).\n\n### The routing rule\n\n> **Deterministic** (same input вҶ’ same steps вҶ’ same output) вҶ’ **Minions**\n> **Judgment** (input requires assessment or decision) вҶ’ **Sub-agents**\n\nPull posts, parse JSON, write a brain page, run a sync вҖ” deterministic. $0 tokens, survives restart, millisecond runtime. Triage the inbox, assess meeting priority, decide if a cold email deserves a reply вҖ” judgment. What sub-agents are actually good at. `minion_mode: pain_triggered` (the default) automates the routing.\n\n### What's fixed\n\nThe six daily pains вҖ” spawn storms, agents that stop responding, forgotten dispatches, gateway crashes mid-run, runaway grandchildren, debugging soup вҖ” all belonged to the \"deterministic work through a reasoning model\" mistake. Minions fixes them by not making that mistake: `max_children` cap, `timeout_ms` + AbortSignal, `child_done` inbox, full `parent_job_id`/`depth`/transcript per job, Postgres durability with stall detection, cascade cancel via recursive CTE. Plus idempotency keys, attachment validation, `removeOnComplete`, and `gbrain jobs smoke` that proves the install in half a second.\n\n```bash\ngbrain jobs smoke                        # verify install\ngbrain jobs submit sync --params '{}'    # fire a background job\ngbrain jobs stats                        # health dashboard\ngbrain jobs work --concurrency 4         # start a worker (Postgres only)\n```\n\nRead [`skills/minion-orchestrator/SKILL.md`](skills/minion-orchestrator/SKILL.md) for parent-child DAGs, fan-in collection, steering via inbox.\n\n**Minions is not incrementally better than sub-agents for background work. It's categorically different.** 753ms vs gateway timeout. $0 vs tokens. 100% vs couldn't-spawn. If your agent does deterministic work on a schedule, it runs on Minions now.\n\n### Health check and self-heal\n\nMinions is canonical as of v0.11.1 вҖ” every `gbrain upgrade` runs the migration automatically (schema вҶ’ smoke вҶ’ prefs вҶ’ host rewrites вҶ’ env-aware autopilot install). If you ever want to verify manually or wire a cron into your morning briefing:\n\n```bash\ngbrain doctor                    # half-migrated state? prints loud banner + exits non-zero\ngbrain skillpack-check --quiet    # exit 0/1/2 for pipeline gating\ngbrain skillpack-check | jq       # full JSON: {healthy, summary, actions[], doctor, migrations}\n```\n\nIf anything's off, `actions[]` tells you the exact command to run. For deeper troubleshooting: [`docs/guides/minions-fix.md`](docs/guides/minions-fix.md).\n\nMoving gateway crons to Minions (deterministic scripts, zero LLM tokens per fire): [`docs/guides/minions-shell-jobs.md`](docs/guides/minions-shell-jobs.md).\n\n## Skillify: your skills tree stops being a black box\n\nHermes and similar agent frameworks auto-create skills as a background behavior. Fine until you don't know what the agent shipped. Checklists decay. Tests drift. Resolver entries get stale. Six months later you've got an opaque pile of \"skills\" that nobody has read, nobody has tested, and nobody is sure still work.\n\nGBrain ships the same capability. Except the human stays in the loop.\n\n- **`/skillify`** turns raw code into a properly-skilled feature: SKILL.md + deterministic script + unit tests + integration tests + LLM evals + resolver trigger + resolver trigger eval + E2E smoke + brain filing. Ten items. Every one required.\n- **`gbrain check-resolvable`** walks the whole skills tree: reachability, MECE overlap, DRY violations, gap detection, orphaned skills. Exits non-zero if anything is off.\n- **`scripts/skillify-check.ts`** вҖ” machine-readable audit. `--json` for CI, `--recent` for last-7-days files.\n\nYou decide when and what. The tooling keeps the checklist honest.\n\n### Why this is the right answer for OpenClaw\n\nAuto-generated skills are a liability the first time a behavior breaks. Was it the skill? The test? The resolver trigger? The eval? You don't know, because you never read it. Debugging a black box is pure guesswork.\n\nSkillify makes the black box legible. Every skill in your tree has: a contract (SKILL.md), tests that exercise that contract, an eval that grades LLM output against a rubric, a resolver trigger the user actually types, and a test that confirms the trigger routes right. If something breaks, you know which layer to look at. If anything goes stale, `check-resolvable` says so.\n\nIn practice this combo produces **zero orphaned skills, every feature with tests + evals + resolver triggers + evals of the triggers.** Compounding quality instead of compounding entropy.\n\n```bash\n# Audit a feature's skill completeness (10-item checklist)\nbun run scripts/skillify-check.ts src/commands/publish.ts\n\n# In CI: fail the build when a new feature isn't properly skilled\nbun run scripts/skillify-check.ts --json --recent\n\n# Validate the whole skills tree before shipping\ngbrain check-resolvable\n```\n\n**Skillify is not a nice-to-have. It's the piece that makes the skills tree survive six months of compounding work.** Read [`skills/skillify/SKILL.md`](skills/skillify/SKILL.md) for the full 10-item checklist and the anti-patterns it catches.\n\n## Getting Data In\n\nGBrain ships integration recipes that your agent sets up for you. Each recipe tells the agent what credentials to ask for, how to validate, and what cron to register.\n\n| Recipe | Requires | What It Does |\n|--------|----------|-------------|\n| [Public Tunnel](recipes/ngrok-tunnel.md) | вҖ” | Fixed URL for MCP + voice (ngrok Hobby $8/mo) |\n| [Credential Gateway](recipes/credential-gateway.md) | вҖ” | Gmail + Calendar access |\n| [Voice-to-Brain](recipes/twilio-voice-brain.md) | ngrok-tunnel | Phone calls to brain pages (Twilio + OpenAI Realtime) |\n| [Email-to-Brain](recipes/email-to-brain.md) | credential-gateway | Gmail to entity pages |\n| [X-to-Brain](recipes/x-to-brain.md) | вҖ” | Twitter timeline + mentions + deletions |\n| [Calendar-to-Brain](recipes/calendar-to-brain.md) | credential-gateway | Google Calendar to searchable daily pages |\n| [Meeting Sync](recipes/meeting-sync.md) | вҖ” | Circleback transcripts to brain pages with attendees |\n\n**Data research recipes** extract structured data from email into tracked brain pages. Built-in recipes for investor updates (MRR, ARR, runway, headcount), expense tracking, and company metrics. Create your own with `gbrain research init`.\n\nRun `gbrain integrations` to see status.\n\n## GBrain + GStack\n\n[GStack](https://github.com/garrytan/gstack) is the engine. GBrain is the mod.\n\n- **[GStack](https://github.com/garrytan/gstack)** = coding skills (ship, review, QA, investigate, office-hours, retro). 70,000+ stars, 30,000 developers per day. When your agent codes on itself, it uses GStack.\n- **GBrain** = everything-else skills (brain ops, signal detection, ingestion, enrichment, cron, reports, identity). When your agent remembers, thinks, and operates, it uses GBrain.\n- **`hosts/gbrain.ts`** = the bridge. Tells GStack's coding skills to check the brain before coding.\n\n`gbrain init` detects if GStack is installed and reports mod status. If GStack isn't there, it tells you how to get it.\n\n## Architecture\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ    в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ    в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ   Brain Repo     в”Ӯ    в”Ӯ    GBrain     в”Ӯ    в”Ӯ    AI Agent      в”Ӯ\nв”Ӯ   (git)          в”Ӯ    в”Ӯ  (retrieval)  в”Ӯ    в”Ӯ  (read/write)    в”Ӯ\nв”Ӯ                  в”Ӯ    в”Ӯ               в”Ӯ    в”Ӯ                  в”Ӯ\nв”Ӯ  markdown files  в”Ӯв”Җв”Җв”Җ>в”Ӯ  Postgres +   в”Ӯ<в”Җв”Җ>в”Ӯ  26 skills       в”Ӯ\nв”Ӯ  = source of     в”Ӯ    в”Ӯ  pgvector     в”Ӯ    в”Ӯ  define HOW to   в”Ӯ\nв”Ӯ    truth         в”Ӯ    в”Ӯ               в”Ӯ    в”Ӯ  use the brain   в”Ӯ\nв”Ӯ                  в”Ӯ<в”Җв”Җв”Җв”Ӯ  hybrid       в”Ӯ    в”Ӯ                  в”Ӯ\nв”Ӯ  human can       в”Ӯ    в”Ӯ  search       в”Ӯ    в”Ӯ  RESOLVER.md     в”Ӯ\nв”Ӯ  always read     в”Ӯ    в”Ӯ  (vector +    в”Ӯ    в”Ӯ  routes intent   в”Ӯ\nв”Ӯ  & edit          в”Ӯ    в”Ӯ   keyword +   в”Ӯ    в”Ӯ  to skill        в”Ӯ\nв”Ӯ                  в”Ӯ    в”Ӯ   RRF)        в”Ӯ    в”Ӯ                  в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ    в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ    в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\nThe repo is the system of record. GBrain is the retrieval layer. The agent reads and writes through both. Human always wins... edit any markdown file and `gbrain sync` picks up the changes.\n\n## The Knowledge Model\n\nEvery page follows the compiled truth + timeline pattern:\n\n```markdown\n---\ntype: concept\ntitle: Do Things That Don't Scale\ntags: [startups, growth, pg-essay]\n---\n\nPaul Graham's argument that startups should do unscalable things early on.\nThe key insight: the unscalable effort teaches you what users actually\nwant, which you can't learn any other way.\n\n---\n\n- 2013-07-01: Published on paulgraham.com\n- 2024-11-15: Referenced in batch W25 kickoff talk\n```\n\nAbove the `---`: **compiled truth**. Your current best understanding. Gets rewritten when new evidence changes the picture. Below: **timeline**. Append-only evidence trail. Never edited, only added to.\n\n## Knowledge Graph\n\nPages aren't just text. Every mention of a person, company, or concept becomes a typed link in a structured graph. The brain wires itself.\n\n```\nWrite a meeting page mentioning Alice and Acme AI\n  -> Auto-link extracts entity refs from content (zero LLM calls)\n  -> Infers types: meeting page + person ref => `attended`\n                   \"CEO of X\" pattern        => `works_at`\n                   \"invested in\"             => `invested_in`\n                   \"advises\", \"advisor\"      => `advises`\n                   \"founded\", \"co-founded\"   => `founded`\n  -> Reconciles stale links: edits remove links no longer in content\n  -> Backlinks rank well-connected entities higher in search\n```\n\n```bash\ngbrain graph-query people/alice --type attended --depth 2\n# returns who Alice met with, transitively\n```\n\nThe graph powers questions vector search can't: \"who works at Acme AI?\", \"what has Bob invested in?\", \"find the connection between Alice and Carol\". Backfill an existing brain in one command:\n\n```bash\ngbrain extract links --source db        # wire up the existing 29K pages\ngbrain extract timeline --source db     # extract dated events from markdown timelines\n```\n\nThen ask graph questions or watch the search ranking improve. Benchmarked: **Recall@5 jumps from 83% to 95%, Precision@5 from 39% to 45%, +30 more correct answers in the agent's top-5 reads** on a 240-page Opus-generated rich-prose corpus. Graph-only F1 hits 86.6% vs grep's 57.8% (+28.8 pts). See [docs/benchmarks/2026-04-18-brainbench-v1.md](docs/benchmarks/2026-04-18-brainbench-v1.md).\n\n## Search\n\nHybrid search: vector + keyword + RRF fusion + multi-query expansion + 4-layer dedup.\n\n```\nQuery\n  -> Intent classifier (entity? temporal? event? general?)\n  -> Multi-query expansion (Claude Haiku)\n  -> Vector search (HNSW cosine) + Keyword search (tsvector)\n  -> RRF fusion: score = sum(1/(60 + rank))\n  -> Cosine re-scoring + compiled truth boost\n  -> 4-layer dedup + compiled truth guarantee\n  -> Results\n```\n\nKeyword alone misses conceptual matches. Vector alone misses exact phrases. RRF gets both. Search quality is benchmarked and reproducible: `gbrain eval --qrels queries.json` measures P@k, Recall@k, MRR, and nDCG@k. A/B test config changes before deploying them.\n\n## Why it works: many strategies in concert\n\nThe brain isn't one trick. Every retrieval question goes through ~20 deterministic\ntechniques layered together. No single one is magic; the win comes from stacking\nthem so each layer covers what the others miss.\n\n```\nQuestion\n  в”Ӯ\n  в”ңв”Җ INGESTION (every put_page)\n  в”Ӯ    в”ңв”Җ Recursive markdown chunking (or semantic / LLM-guided)\n  в”Ӯ    в”ңв”Җ Embedding cache invalidation on edit\n  в”Ӯ    в””в”Җ Idempotent imports (content-hash dedup)\n  в”Ӯ\n  в”ңв”Җ GRAPH EXTRACTION (auto-link post-hook, zero LLM)\n  в”Ӯ    в”ңв”Җ Entity-ref regex (markdown links + bare slugs)\n  в”Ӯ    в”ңв”Җ Code-fence stripping (no false-positive slugs in code blocks)\n  в”Ӯ    в”ңв”Җ Typed inference cascade (FOUNDED вҶ’ INVESTED вҶ’ ADVISES вҶ’ WORKS_AT)\n  в”Ӯ    в”ңв”Җ Page-role priors (partner-bio language вҶ’ invested_in)\n  в”Ӯ    в”ңв”Җ Within-page dedup (same target collapses to one link)\n  в”Ӯ    в”ңв”Җ Stale-link reconciliation (edits remove dropped refs)\n  в”Ӯ    в””в”Җ Multi-type link constraint (same person can works_at AND advises)\n  в”Ӯ\n  в”ңв”Җ SEARCH PIPELINE (every query)\n  в”Ӯ    в”ңв”Җ Intent classifier (entity / temporal / event / general вҖ” auto-routes)\n  в”Ӯ    в”ңв”Җ Multi-query expansion (Haiku rephrases the question 3 ways)\n  в”Ӯ    в”ңв”Җ Vector search (HNSW cosine over OpenAI embeddings)\n  в”Ӯ    в”ңв”Җ Keyword search (Postgres tsvector + websearch_to_tsquery)\n  в”Ӯ    в”ңв”Җ Reciprocal Rank Fusion (score = sum 1/(60+rank) across both)\n  в”Ӯ    в”ңв”Җ Cosine re-scoring (re-rank chunks against actual query embedding)\n  в”Ӯ    в”ңв”Җ Compiled-truth boost (assessments outrank timeline noise)\n  в”Ӯ    в”ңв”Җ Backlink boost (well-connected entities rank higher)\n  в”Ӯ    в””в”Җ Source-aware dedup (one CT chunk per page guaranteed)\n  в”Ӯ\n  в”ңв”Җ GRAPH TRAVERSAL (relational queries)\n  в”Ӯ    в”ңв”Җ Recursive CTE with cycle prevention (visited-array check)\n  в”Ӯ    в”ңв”Җ Type-filtered edges (--type works_at, attended, etc.)\n  в”Ӯ    в”ңв”Җ Direction control (in / out / both)\n  в”Ӯ    в””в”Җ Depth-capped (вүӨ10 for remote MCP; DoS prevention)\n  в”Ӯ\n  в””в”Җ AGENT WORKFLOW (graph-confident hybrid)\n       в”ңв”Җ Graph-query first (high-precision typed answers)\n       в”ңв”Җ Grep fallback when graph returns nothing\n       в””в”Җ Graph hits ranked first in top-K (better P@K and R@K)\n```\n\nEnd-to-end on the BrainBench v1 corpus (240 rich-prose pages, before/after PR #188):\n\n| Metric                  | BEFORE PR #188 | AFTER PR #188 | О”           |\n|-------------------------|----------------|---------------|-------------|\n| **Precision@5**         | 39.2%          | **44.7%**     | **+5.4 pts**|\n| **Recall@5**            | 83.1%          | **94.6%**     | **+11.5 pts**|\n| Correct in top-5        | 217            | 247           | **+30**     |\n| Graph-only F1 (ablation)| 57.8% (grep)   | **86.6%**     | **+28.8 pts**|\n\nPlus 5 orthogonal capability checks (identity resolution, temporal queries,\nperformance at 10K-page scale, robustness to malformed input, MCP operation\ncontract). All pass. [Full report.](docs/benchmarks/2026-04-18-brainbench-v1.md)\n\nThe point: each technique handles a class of inputs the others miss. Vector\nsearch misses exact slug refs; keyword catches them. Keyword misses conceptual\nmatches; vector catches them. RRF picks the best of both. Compiled-truth boost\nkeeps assessments above timeline noise. Auto-link extraction wires the graph\nthat lets backlink boost rank well-connected entities higher. Graph traversal\nanswers questions search alone can't reach. The agent picks graph-first for\nprecision and falls back to keyword for recall. **All deterministic, all in\nconcert, all measured.**\n\n## Voice\n\nCall a phone number. Your AI answers. It knows who's calling, pulls their full context from the brain, and responds like someone who actually knows your world. When the call ends, a brain page appears with the transcript, entity detection, and cross-references.\n\n<p align=\"center\">\n  <img src=\"docs/images/voice-client.png\" alt=\"Voice client connected\" width=\"300\" />\n</p>\n\n> [See it in action](https://x.com/garrytan/status/2043022208512172263)\n\nThe voice recipe ships with GBrain: [Voice-to-Brain](recipes/twilio-voice-brain.md). WebRTC works in a browser tab with zero setup. A real phone number is optional.\n\n## Engine Architecture\n\n```\nCLI / MCP Server\n     (thin wrappers, identical operations)\n              |\n      BrainEngine interface (pluggable)\n              |\n     +--------+--------+\n     |                  |\nPGLiteEngine       PostgresEngine\n  (default)          (Supabase)\n     |                  |\n~/.gbrain/           Supabase Pro ($25/mo)\nbrain.pglite         Postgres + pgvector\nembedded PG 17.5\n\n     gbrain migrate --to supabase|pglite\n         (bidirectional migration)\n```\n\nPGLite: embedded Postgres, no server, zero config. When your brain outgrows local (1000+ files, multi-device), `gbrain migrate --to supabase` moves everything.\n\n## File Storage\n\nBrain repos accumulate binaries. GBrain has a three-stage migration:\n\n```bash\ngbrain files mirror <dir>       # copy to cloud, local untouched\ngbrain files redirect <dir>     # replace local with .redirect pointers\ngbrain files clean <dir>        # remove pointers, cloud only\ngbrain files restore <dir>      # download everything back (undo)\n```\n\nStorage backends: S3-compatible (AWS, R2, MinIO), Supabase Storage, or local.\n\n## Commands\n\n```\nSETUP\n  gbrain init [--supabase|--url]        Create brain (PGLite default)\n  gbrain migrate --to supabase|pglite   Bidirectional engine migration\n  gbrain upgrade                        Self-update with feature discovery\n\nPAGES\n  gbrain get <slug>                     Read a page (fuzzy slug matching)\n  gbrain put <slug> [< file.md]         Write/update (auto-versions)\n  gbrain delete <slug>                  Delete a page\n  gbrain list [--type T] [--tag T]      List with filters\n\nSEARCH\n  gbrain search <query>                 Keyword search (tsvector)\n  gbrain query <question>              Hybrid search (vector + keyword + RRF)\n\nIMPORT\n  gbrain import <dir> [--no-embed]      Import markdown (idempotent)\n  gbrain sync [--repo <path>]           Git-to-brain incremental sync\n  gbrain export [--dir ./out/]          Export to markdown\n\nFILES\n  gbrain files list|upload|sync|verify  File storage operations\n\nEMBEDDINGS\n  gbrain embed [<slug>|--all|--stale]   Generate/refresh embeddings\n\nLINKS + GRAPH\n  gbrain link|unlink|backlinks          Cross-reference management\n  gbrain extract links|timeline|all     Batch backfill from existing pages\n                                        (--source db|fs, --type, --since, --dry-run)\n  gbrain graph-query <slug>             Typed traversal (--type T --depth N\n                                        --direction in|out|both)\n\nJOBS (Minions)\n  gbrain jobs submit <name> [--params JSON] [--follow]  Submit a background job\n  gbrain jobs list [--status S] [--queue Q]             List jobs with filters\n  gbrain jobs get|cancel|retry|delete <id>              Manage job lifecycle\n  gbrain jobs prune [--older-than 30d]                  Clean completed/dead jobs\n  gbrain jobs stats                                     Job health dashboard\n  gbrain jobs smoke                                     One-command health check\n  gbrain jobs work [--queue Q] [--concurrency N]        Start worker daemon\n\nADMIN\n  gbrain doctor [--json] [--fast]       Health checks (resolver, skills, DB, embeddings)\n  gbrain doctor --fix                   Auto-fix resolver issues\n  gbrain stats                          Brain statistics\n  gbrain serve                          MCP server (stdio)\n  gbrain integrations                   Integration recipe dashboard\n  gbrain check-backlinks check|fix      Back-link enforcement\n  gbrain lint [--fix]                   LLM artifact detection\n  gbrain repair-jsonb [--dry-run]       Repair v0.12.0 double-encoded JSONB (Postgres)\n  gbrain orphans [--json] [--count]     Find pages with zero inbound wikilinks\n  gbrain transcribe <audio>             Transcribe audio (Groq Whisper)\n  gbrain research init <name>           Scaffold a data-research recipe\n  gbrain research list                  Show available recipes\n```\n\nRun `gbrain --help` for the full reference.\n\n## Origin Story\n\nI was setting up my [OpenClaw](https://openclaw.ai) agent and started a markdown brain repo. One page per person, one page per company, compiled truth on top, timeline on the bottom. Within a week: 10,000+ files, 3,000+ people, 13 years of calendar data, 280+ meeting transcripts, 300+ captured ideas.\n\nThe agent runs while I sleep. The dream cycle scans every conversation, enriches missing entities, fixes broken citations, consolidates memory. I wake up and the brain is smarter than when I went to sleep.\n\nThe skills in this repo are those patterns, generalized. What took 11 days to build by hand ships as a mod you install in 30 minutes.\n\n## Docs\n\n**For agents:**\n- **[skills/RESOLVER.md](skills/RESOLVER.md)** ... Start here. The skill dispatcher.\n- [Individual skill files](skills/) ... 25 standalone instruction sets\n- [GBRAIN_SKILLPACK.md](docs/GBRAIN_SKILLPACK.md) ... Legacy reference architecture\n- [Getting Data In](docs/integrations/README.md) ... Integration recipes and data flow\n- [GBRAIN_VERIFY.md](docs/GBRAIN_VERIFY.md) ... Installation verification\n\n**For humans:**\n- [GBRAIN_RECOMMENDED_SCHEMA.md](docs/GBRAIN_RECOMMENDED_SCHEMA.md) ... Brain repo directory structure\n- [Thin Harness, Fat Skills](docs/ethos/THIN_HARNESS_FAT_SKILLS.md) ... Architecture philosophy\n- [ENGINES.md](docs/ENGINES.md) ... Pluggable engine interface\n\n**Reference:**\n- [GBRAIN_V0.md](docs/GBRAIN_V0.md) ... Full product spec\n- [CHANGELOG.md](CHANGELOG.md) ... Version history\n\n**Benchmarks:**\n- [BrainBench v1 (PR #188)](docs/benchmarks/2026-04-18-brainbench-v1.md) ... single comprehensive before/after report on a 240-page Opus-generated corpus. 7 categories: relational queries, identity resolution, temporal queries, performance, robustness, MCP contract.\n\n## Contributing\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md). Run `bun test` for unit tests. E2E tests: spin up Postgres with pgvector, run `bun run test:e2e`, tear down.\n\nPRs welcome for: new enrichment APIs, performance optimizations, additional engine backends, new skills following the conformance standard in `skills/skill-creator/SKILL.md`.\n\n## License\n\nMIT\n","summary":"GBrain augments an AI agent with a selfвҖ‘wired knowledge graph that ingests meetings, emails, tweets, voice calls and original ideas while the user sleeps, automatically extracting entities and typed links without LLM calls. It combines hybrid vector search and graph traversal for highly accurate recall and precision, boosting answer quality by up to 30вҖҜ% over plain retrieval and offering over 86вҖҜ% F1 on graphвҖ‘only queries. The tool ships with 26 preвҖ‘built skills and can be installed in just half an hour on an agent platform or through a lightweight CLI, ready to serve 30+ MCP robots for Claude, Cursor, and other clients. GBrain is ideal for developers building longвҖ‘lived AI agents that need to persist, selfвҖ‘refine and recall context across thousands of pages and millions of interactions.","description":"Garry's Opinionated OpenClaw/Hermes Agent Brain","stars":9470,"language":"TypeScript"},{"owner":"imbue-ai","repo":"bouncer","url":"https://github.com/imbue-ai/bouncer","readme":"# Bouncer\n\n<p align=\"center\">\n  <img src=\"Bouncer/icons/b-bouncer-2x_big.png\" alt=\"Bounc
