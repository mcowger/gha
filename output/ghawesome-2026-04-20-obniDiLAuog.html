er\" width=\"200\" />\n</p>\n\n**Heal your feed.** Bouncer is a browser extension that uses AI to filter unwanted posts from your Twitter/X feed. Define filter topics in plain language вҖ” \"crypto\", \"engagement bait\", \"rage politics\" вҖ” and Bouncer classifies and hides matching posts in real time.\n\n[**Install from the Chrome Web Store**](https://chromewebstore.google.com/detail/bouncer-heal-your-feed-on/bkijmhafoocfloemhancbgadknkgdkcm)\n\n[**Install on iOS**](https://apps.apple.com/us/app/bouncer-heal-your-feed/id6759466393)\n\n<p align=\"center\">\n  <img src=\"appstore_assets/demo.gif\" alt=\"Bouncer demo\" />\n</p>\n\n## Features\n\n- **Natural language filters** вҖ” describe what you don't want to see in your own words\n- **Multiple AI backends** вҖ” run models locally on your GPU, or use cloud APIs (OpenAI, Google Gemini, Anthropic, OpenRouter)\n- **On-device inference** вҖ” local models via WebLLM run entirely in your browser with zero data sent externally\n- **Image-aware filtering** вҖ” multimodal models can classify posts based on images, not just text\n- **Reasoning transparency** вҖ” see exactly why each post was filtered\n- **Theme-aware UI** вҖ” adapts to light, dim, and dark modes automatically\n\n## Supported Models\n\n| Provider | Models | Requires |\n|----------|--------|----------|\n| **Local (WebGPU)** | Qwen3-4B, Qwen3.5-4B, Qwen3.5-4B Vision | WebGPU-capable browser |\n| **OpenAI** | GPT-5 Nano, gpt-oss-20b | API key |\n| **Google Gemini** | 2.5 Flash Lite, 2.5 Flash, 3 Flash Preview | API key |\n| **Anthropic** | Claude Haiku 4.5 | API key |\n| **OpenRouter** | Nemotron Nano 12B VL (free), Ministral 3B | Account |\n| **Imbue** | Default backend | None (built-in) |\n\nLocal models are downloaded once and cached in the browser's Cache Storage.\n\n## Quick Start\n\n### Chrome / Edge (Web Store)\n\n[**Install Bouncer**](https://chromewebstore.google.com/detail/bouncer-heal-your-feed-on/bkijmhafoocfloemhancbgadknkgdkcm) from the Chrome Web Store.\n\n### Chrome / Edge (from source)\n\n```bash\ncd Bouncer\nnpm install\nnpm run build\n```\n\n1. Open `chrome://extensions`\n2. Enable **Developer mode**\n3. Click **Load unpacked** and select the `Bouncer/` folder\n4. Navigate to twitter.com / x.com\n5. Click \"Settings\" in the Bouncer element and add your preferred provider API key (or enable local models) and select your preferred model from the dropdown.\n\n### iOS\n\n[**Install from the App Store**](https://apps.apple.com/us/app/bouncer-heal-your-feed/id6759466393)\n\n## How It Works\n\n1. A MutationObserver watches the Twitter feed for new posts\n2. Post text, images, and metadata are extracted via the Twitter adapter\n3. Posts are queued and sent to the selected AI model for classification against your filter topics\n4. The model returns a category match and reasoning for each post\n5. Matching posts are hidden with a fade-out animation and added to your filtered posts list\n6. Click **View filtered** to review hidden posts and see why each was filtered\n\nResults are cached so re-encountering a post doesn't require another inference call.\n","summary":"Bouncer is a browser extension that lets users curate their Twitter/X feed by defining filter topics in plain languageвҖ”such as вҖңcrypto,вҖқ вҖңengagement bait,вҖқ or вҖңrage politics.вҖқ It runs AI models locally via WebGPU or online through providers like OpenAI, Google Gemini, Anthropic, and OpenRouter, classifying text and images in real time to hide posts that match the userвҖҷs filters while showing the reasoning for each removal. The extension also offers onвҖ‘device inference for privacy, multimodal filtering to consider images, a themeвҖ‘aware UI, and a вҖңview filteredвҖқ list to review hidden content. Anyone looking for a cleaner, more intentional social media experienceвҖ”particularly those sensitive to specific content or concerned about data privacyвҖ”will find Bouncer useful.","description":"Heal your social media feeds","stars":320,"language":"TypeScript"},{"owner":"millionco","repo":"debug-agent","url":"https://github.com/millionco/debug-agent","readme":"# Debug Agent\n\nDebug Agent teaches your agent to debug with runtime evidence, not guesswork.\n\n## Getting Started\n\n```bash\nnpx debug-agent@latest init\n```\n\nThis installs the `debug-agent` skill for all detected agents (Cursor, Claude Code, Codex, etc.).\n\nIn Claude Code / Codex, run `/debug-agent [describe your issue]`. In Cursor, ask the agent to \"use the debug-agent skill\" and describe the issue.\n\n## How it works\n\n1. Run `/debug-agent` inside Claude Code, Codex, and more\n2. Generates hypotheses and instruments your code with lightweight NDJSON logs\n3. Asks you to reproduce the bug, then analyzes logs to confirm or reject hypotheses\n4. Fixes only with 100% confidence backed by log evidence, then verifies\n\n## License\n\nMIT В© Million Software, Inc.\n","summary":"Debug Agent equips AIвҖ‘powered coding assistants with the ability to debug code using runtime evidence instead of educated guesses. It automatically instruments the target code with lightweight NDJSON logs, generates debugging hypotheses, prompts the user to reproduce the issue, and then parses the logs to confirm or reject those hypotheses before applying a fix with complete confidence and verifying the result. The tool plugs into popular assistants such as Claude Code, Codex, and Cursor, making it ideal for developers and AI prompt engineers who need reliable, evidenceвҖ‘based debugging support. The project is openвҖ‘source under an MIT license.","description":"Debugging skill for AI agents","stars":239,"language":"TypeScript"},{"owner":"joeynyc","repo":"hermes-hudui","url":"https://github.com/joeynyc/hermes-hudui","readme":"# вҳӨ Hermes HUD вҖ” Web UI\n\nA browser-based consciousness monitor for [Hermes](https://github.com/nousresearch/hermes-agent), the AI agent with persistent memory.\n\nSame data, same soul, same dashboard that made the [TUI version](https://github.com/joeynyc/hermes-hud) popular вҖ” now in your browser.\n\n![Token Costs](assets/dashboard-costs.png)\n\n![Agent Profiles](assets/profiles.png)\n\n## Quick Start\n\n```bash\ngit clone https://github.com/joeynyc/hermes-hudui.git\ncd hermes-hudui\n./install.sh\nhermes-hudui\n```\n\nOpen http://localhost:3001\n\n**Requirements:** Python 3.11+, Node.js 18+, a running Hermes agent with data in `~/.hermes/`\n\nOn future runs:\n```bash\nsource venv/bin/activate && hermes-hudui\n```\n\n## What's Inside\n\n14 tabs covering everything your agent knows about itself вҖ” identity, memory, skills, sessions, cron jobs, projects, health, costs, patterns, corrections, sudo governance, and live chat.\n\nUpdates in real-time via WebSocket. No manual refresh needed.\n\n## Language Support\n\nEnglish (default) and Chinese. Click the language toggle at the far right of the header bar to switch. The choice persists to localStorage. When set to Chinese, chat responses from your agent also come back in Chinese.\n\n## Themes\n\nFour themes switchable with `t`: **Neural Awakening** (cyan), **Blade Runner** (amber), **fsociety** (green), **Anime** (purple). Optional CRT scanlines.\n\n## Keyboard Shortcuts\n\n| Key | Action |\n|-----|--------|\n| `1`вҖ“`9`, `0` | Switch tabs |\n| `t` | Theme picker |\n| `Ctrl+K` | Command palette |\n\n## Relationship to the TUI\n\nThis is the browser companion to [hermes-hud](https://github.com/joeynyc/hermes-hud). Both read from the same `~/.hermes/` data directory independently вҖ” use either one, or both at the same time.\n\nThe Web UI is fully standalone and adds features the TUI doesn't have: dedicated Memory, Skills, and Sessions tabs; per-model token cost tracking; command palette; live chat; theme switcher.\n\nIf you also have the TUI installed, you can enable it with `pip install 'hermes-hudui[tui]'`.\n\n(Quotes around `'hermes-hudui[tui]'` are required in zsh, where the unquoted `[tui]` is interpreted as a glob pattern. Bash and fish accept the unquoted form, but the quoted form is safe everywhere.)\n\n## Platform Support\n\nmacOS В· Linux В· WSL\n\n## License\n\nMIT вҖ” see [LICENSE](LICENSE).\n\n---\n\n<a href=\"https://www.star-history.com/?repos=joeynyc%2Fhermes-hudui&type=date&logscale=&legend=top-left\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=joeynyc/hermes-hudui&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=joeynyc/hermes-hudui&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=joeynyc/hermes-hudui&type=date&legend=top-left\" />\n </picture>\n</a>\n","summary":"HermesвҖҜHUDвҖҜUI is a browser-based dashboard that visualises the state and activity of a Hermes AI agent, mirroring the TUI version while adding extra tabs for memory, skills, sessions, cost tracking, and live chat. The interface updates via WebSocket, offers language toggling, theme switching, keyboard shortcuts, and a command palette, making it highly interactive and portable across macOS, Linux, and WSL. Developers and researchers running Hermes agents with persistent memory will benefit from realвҖ‘time insights into agent identity, behaviour, and usage costs directly in their browser.","description":"Web UI consciousness monitor for Hermes вҖ” the AI agent with persistent memory","stars":1097,"language":"Python"},{"owner":"idawnlight","repo":"ShichiZip","url":"https://github.com/idawnlight/ShichiZip","readme":"# ShichiZip\n\nThe missing 7-Zip derivative intended for macOS.\n\n![screenshot of ShichiZip](https://i.dawnlab.me/2e94b659e94ab1ec187fdb758bc4e7a9.png)\n\n## Build\n\n- Install prerequisites: `brew install xcodegen zig`\n- Generate the Xcode project and derived localization files: `xcodegen generate`\n\n## Variants\n\n- Mainline app: `make lib-mainline` then `xcodebuild -project ShichiZip.xcodeproj -scheme ShichiZip -configuration Debug -arch arm64 build`\n- Zstandard fork variant: `make lib-zs` then `xcodebuild -project ShichiZip.xcodeproj -scheme ShichiZipZS -configuration Debug -arch arm64 build`\n","summary":"ShichiZip is a native macOS archiver that fills the gap left by 7вҖ‘Zip on Apple platforms, offering a full featured compression and extraction user interface. It supports the most common archive formats as well as a dedicated ZstandardвҖ‘optimized build, and it is built with openвҖ‘source tools such as Zig and XcodeGen. Users who rely on robust, fast archiving on Mac, from casual file management to professional compression workflows, will find ShichiZip a convenient replacement for more limited defaults.","description":"The 7-Zip derivative intended for macOS","stars":631,"language":"Swift"},{"owner":"QuipNetwork","repo":"quip-node-manager","url":"https://github.com/QuipNetwork/quip-node-manager","readme":"# Quip Node Manager\n\nDesktop application for running and monitoring [Quip](https://gitlab.com/quip.network) network nodes. Supports Docker and native execution modes on macOS, Linux, and Windows.\n\n## Quick Install\n\n**macOS / Linux:**\n\n```sh\ncurl -fsSL https://gitlab.com/quip.network/quip-node-manager/-/raw/main/scripts/install.sh | sh\n```\n\n**Windows (PowerShell):**\n\n```powershell\nirm https://gitlab.com/quip.network/quip-node-manager/-/raw/main/scripts/install.ps1 | iex\n```\n\n## Manual Download\n\nDownload the latest release from the [Releases page](https://gitlab.com/quip.network/quip-node-manager/-/releases).\n\n### macOS\n\nDownload the `.dmg`, open it, and drag the app to `/Applications`.\n\nBecause the app is not yet notarized, macOS will quarantine it. Open **Terminal** (Applications > Utilities > Terminal) and paste:\n\n```sh\nxattr -dr com.apple.quarantine /Applications/Quip\\ Node\\ Manager.app\n```\n\nThen launch the app from `/Applications`, not from the `.dmg` or Downloads folder.\n\n### Linux\n\nThe recommended format is **AppImage** (works on any distro):\n\n```sh\nchmod +x quip-node-manager-linux-x86_64.AppImage\n./quip-node-manager-linux-x86_64.AppImage\n```\n\nA `.deb` package is also available for Debian/Ubuntu:\n\n```sh\nsudo dpkg -i quip-node-manager-linux-x86_64.deb\n```\n\n### Windows\n\nDownload the `.exe` and run it. Windows SmartScreen may show a warning because the binary is not yet code-signed.\n\nClick **More info**, then **Run anyway**.\n\n## Features\n\n- **Two run modes** -- Docker (default on Windows/Linux) pulls and manages a container image; Native (default on macOS) downloads a standalone binary\n- **Pre-flight checklist** -- verifies Docker/binary availability, node secret, public IP, port forwarding, and firewall before starting\n- **Live log streaming** -- tails node stdout/stderr in a collapsible drawer\n- **GPU configuration** -- detects CUDA and Metal devices, per-device enable/disable, utilization slider, yielding mode\n- **D-Wave QPU support** -- optional quantum processing unit configuration with daily budget controls\n- **Background update monitor** -- checks for new Docker images, native binaries, and app releases every 30 minutes; optional auto-restart on image updates\n- **TLS certificate guidance** -- built-in walkthrough for Let's Encrypt and self-signed certificate setup\n\n## Development\n\n### Prerequisites\n\n- [Rust](https://rustup.rs/) (stable)\n- [Bun](https://bun.sh/) (or Node.js)\n- Platform-specific Tauri v2 dependencies ([see Tauri docs](https://v2.tauri.app/start/prerequisites/))\n\n### Commands\n\n```sh\nbun install          # Install JS dependencies\nbun run dev          # Launch development build\nbun run build        # Production build for current platform\n```\n\n```sh\ncd src-tauri\ncargo check          # Type-check Rust code\ncargo clippy         # Lint\n```\n\n### CLI Mode\n\nThe app also supports a terminal UI mode:\n\n```sh\nquip-node-manager --cli\n```\n\n## Architecture\n\n- **Frontend**: `src/` -- vanilla HTML/CSS/JS with Tauri IPC (`withGlobalTauri: true`)\n- **Backend**: `src-tauri/src/` -- Rust + Tauri v2 commands\n- **Config**: TOML generation matching quip-protocol format\n- **Data**: `~/quip-data/` stores settings, config, secrets, binaries, and trust database\n\nSee [AGENTS.md](AGENTS.md) for detailed architecture documentation.\n\n## License\n\n[AGPL-3.0-or-later](LICENSE)\n\nCopyright (c) Postquant Labs\n","summary":"Quip Node Manager is a crossвҖ‘platform desktop application that simplifies launching and supervising Quip network nodes, supporting both native binaries on macOS and Docker containers on Linux and Windows. It offers automated preвҖ‘flight checks, live log streaming, GPU and optional DвҖ‘Wave QPU configuration, background update monitoring, and builtвҖ‘in TLS certificate guidance. The tool benefits developers, node operators, and privacyвҖ‘network enthusiasts who need an easy, GUIвҖ‘based way to deploy and maintain Quip nodes while keeping everything in sync across operating systems.","description":"A simple GUI client to manage a Quip Network node","stars":5068,"language":"Rust"},{"owner":"jerryjliu","repo":"liteparse_samples","url":"https://github.com/jerryjliu/liteparse_samples","readme":"# LiteParse Samples\n\nInteractive demos showcasing [LiteParse](https://developers.llamaindex.ai/liteparse/) вҖ” a fast, local, model-free document parser by [LlamaIndex](https://www.llamaindex.ai).\n\n## Samples\n\n### Parser Comparison\n\nSide-by-side comparison of **LiteParse vs PyPDF vs PyMuPDF** on real government and financial documents. See the original PDF on the left, then tab through each parser's extracted text on the right.\n\n![Parser Comparison](assets/comparison.png)\n\n**Quick start:** Open [`comparison/output/comparison.html`](comparison/output/comparison.html) in your browser.\n\n**Features:**\n- 8 document sections from 5 real-world PDFs (FDIC, Federal Reserve, CMS, IRS, WHO)\n- Embedded PDF viewer alongside parsed text\n- Per-document timing for each parser\n\n### Visual Citations\n\nExact keyword search over parsed documents вҖ” see precisely where each match appears on the source PDF page, with **bounding boxes** highlighted directly on the page image. This is a simple substring match demo (not fuzzy or RAG-based search). Learn more in the [Visual Citations guide](https://developers.llamaindex.ai/liteparse/guides/visual-citations/).\n\n![Visual Citations](assets/visual-citations.png)\n\n**Quick start:** Open [`visual_citations/output/visual-citations.html`](visual_citations/output/visual-citations.html) in your browser.\n\n**Features:**\n- Interactive keyword search across all documents\n- Bounding box overlays on rendered page images\n- Side-by-side view of source page and parsed text with highlighted matches\n\n### Research Docs (Claude Code Skill)\n\nAsk questions about your documents вҖ” get answers with **visual source citations**. Install as a [Claude Code](https://claude.com/claude-code) skill and invoke with `/research-docs`. The skill parses your documents, has Claude answer your question, and generates an HTML report with the answer and cited source pages highlighted with bounding boxes.\n\n![Research Docs](research_docs/assets/research-docs.png)\n\n**Install:**\n```bash\nnpx skills add run-llama/liteparse_samples --skill research_docs\n```\n\n**Usage:** `/research-docs ./my-pdfs What is the total revenue?`\n\n**Features:**\n- Parse any document LiteParse supports (PDF, DOCX, PPTX, XLSX, images) plus plaintext\n- AI-powered answers with exact-quote source citations\n- Bounding box highlights on source page images\n- PDF viewer toggle for each citation\n- Self-contained HTML report\n\n## Regenerating with Your Own Data\n\n1. Add your PDFs to the `data/` folder\n2. Edit `docs.json` in the relevant sample folder to configure your documents and pages\n3. Install dependencies and run:\n\n```bash\npip install -r requirements.txt\n\n# Regenerate comparison\ncd comparison && python generate.py\n\n# Regenerate visual citations\ncd visual_citations && python generate.py\n\n# Install research_docs skill\ncp -r research_docs ~/.claude/skills/research-docs\n# Then use: /research-docs ./data \"Your question here\"\n```\n\n### docs.json format\n\nEach sample has a `docs.json` that controls which documents and pages are processed:\n\n```json\n[\n  {\n    \"name\": \"My Document Title\",\n    \"file\": \"my_document.pdf\",\n    \"pages\": [0, 1, 2],\n    \"source\": \"example.com\",\n    \"desc\": \"Optional description (comparison only)\"\n  }\n]\n```\n\n- **file**: PDF filename (must exist in `data/`)\n- **pages**: 0-indexed page numbers to parse\n- **source**: Attribution label\n- **desc**: Description shown in comparison cards (comparison sample only)\n\n## Data\n\nThe included PDFs are publicly available government documents:\n\n| File | Source | Description |\n|------|--------|-------------|\n| `cms_pfs.pdf` | cms.gov | CMS Medicare Physician Fee Schedule (CY 2026) |\n| `fdic_qbp.pdf` | fdic.gov | FDIC Quarterly Banking Profile |\n| `fed_h41.pdf` | federalreserve.gov | Federal Reserve H.4.1 Statistical Release |\n| `irs_1040.pdf` | irs.gov | IRS Form 1040 вҖ” U.S. Individual Income Tax Return |\n| `who_indicators.pdf` | who.int | WHO Core Health Indicators |\n\n## Requirements\n\n- Python 3.9+\n- Dependencies: `liteparse`, `pypdf`, `pymupdf` (see [requirements.txt](requirements.txt))\n\n```bash\npip install -r requirements.txt\n```\n\n## Links\n\n- [LiteParse Documentation](https://developers.llamaindex.ai/liteparse/)\n- [LiteParse GitHub](https://github.com/run-llama/liteparse)\n- [LlamaIndex](https://www.llamaindex.ai)\n","summary":"The LiteParseвҖҜSamples project offers interactive examples that demonstrate how LlamaIndexвҖҷs lightweight, modelвҖ‘free LiteParse can rapidly parse documents locally. The repository showcases sideвҖ‘byвҖ‘side comparisons of LiteParse against PyPDF and PyMuPDF, realвҖ‘time keywordвҖ‘search visual citations with boundingвҖ‘box overlays, and an AIвҖ‘powered Claude Code skill that answers questions about parsed files while providing precise source citations. These demos highlight parsing speed, document format support, and accurate visual referencing in a single, browserвҖ‘based HTML report. Developers, data analysts, and legal or compliance professionals who need quick, zeroвҖ‘cost document extraction and traceable search results will find the sample set particularly useful.","description":"Interactive samples/demos for LiteParse: a fast, local, model-free document parser","stars":475,"language":"HTML"},{"owner":"vyfor","repo":"rattles","url":"https://github.com/vyfor/rattles","readme":"# рҹӘҮ Rattles\n\n![Demo](./.github/assets/demo.gif)\n\n**Rattles** is a minimal, dependency-free terminal spinner library for Rust. It makes no assumptions about how the output will be used.\n\n## Quick Start\n\n```sh\ncargo add rattles\n```\n\n### Minimal example\n\n```rust\nuse std::{io::Write, time::Duration};\nuse rattles::presets::prelude as presets;\n\nfn main() {\n    let rattle = presets::waverows();\n\n    // change default interval\n    // let rattle = presets::waverows().set_interval(Duration::from_millis(100));\n\n    // reverse direction\n    // let rattle = presets::waverows().reverse();\n\n    loop {\n        print!(\"\\r{}\", rattle.current_frame());\n        std::io::stdout().flush().unwrap();\n        std::thread::sleep(Duration::from_millis(20));\n    }\n}\n```\n\n### Custom keyframes\n\n```rust\nrattle!(\n    Custom, // struct name\n    custom, // method name\n    1,      // row count (width of the spinner)\n    100,    // interval in milliseconds\n    [\"вЈҫ\", \"вЈ·\", \"вЈҜ\", \"вЈҹ\", \"вЈ»\", \"вЈҪ\", \"вЈҫ\"] // keyframes\n)\n```\n\n### `no_std`\n\n`rattles` enables the `std` feature by default. To opt out:\n\n```sh\ncargo add rattles --no-default-features\n```\n\nWithout `std`, the global clock is unavailable. Animations can still be driven three ways:\n\n- Time-based, with an external clock: \n    ```rs\n    rattle.frame_at(elapsed)\n    ```\n- Index-based:\n    ```rs\n    rattle.frame(n)\n    ```\n- Tick-based:\n    ```rust\n    let mut rattle = presets::dots().into_ticked();\n    rattle.tick();\n    let frame = rattle.current_frame();\n    ```\n    Note that `TickedRattler` is stateful and must be stored outside the render loop.\n\n## Presets\n\nBuilt-in presets are organized by category:\n\n- `presets::arrows`\n- `presets::ascii`\n- `presets::braille`\n- `presets::emoji`\n\nA prelude is available `rattles::prelude`.\n\n## Examples\n\n- a minimal ratatui [example](./examples/ratatui.rs)\n- a no_std-oriented [example](./examples/no_std.rs)\n\n## Acknowledgements\n\nRattles includes spinners sourced from these wonderful projects. We gratefully acknowledge their work.\n\n- [sindresorhus/cli-spinners](https://github.com/sindresorhus/cli-spinners)\n- [gunnargray-dev/unicode-animations](https://github.com/gunnargray-dev/unicode-animations)\n","summary":"Rattles is a tiny, dependencyвҖ‘free Rust library that renders animated spinners in terminal user interfaces, offering full control over frame timing and output without assuming any particular environment. It ships a collection of readyвҖ‘made presets from popular projects and lets developers craft their own keyframes or drive animations via time, index, or tick methods, even in `no_std` contexts. The API is straightforward, with convenience macros and a prelude for rapid integration, making it ideal for Rust CLI tools, terminal dashboards, or embedded systems that need lightweight progress indicators.","description":"рҹӘҮ Minimal terminal spinners for Rust","stars":903,"language":"Rust"},{"owner":"MagicCube","repo":"helixent","url":"https://github.com/MagicCube/helixent","readme":"![](https://github.com/user-attachments/assets/9b4b7b72-45f4-4ae5-8fd5-5fb48d615481)\n\n# Helixent\n\n[![npm](https://img.shields.io/npm/v/helixent?label=npm&logo=npm&color=CB3837)](https://www.npmjs.com/package/helixent)\n[![Check](https://github.com/magiccube/helixent/actions/workflows/check.yml/badge.svg?branch=main)](https://github.com/magiccube/helixent/actions/workflows/check.yml)\n[![Bun](https://img.shields.io/badge/Bun-000000?logo=bun&logoColor=ffffff)](https://bun.com)\n[![TypeScript](https://img.shields.io/badge/TypeScript-3178C6?logo=typescript&logoColor=ffffff)](https://www.typescriptlang.org)\n[![Ink](https://img.shields.io/badge/Ink-000000?logo=npm&logoColor=ffffff)](https://github.com/vadimdemedes/ink)\n[![React](https://img.shields.io/badge/React-61DAFB?logo=react&logoColor=000000)](https://react.dev)\n\nHelixent is a blue rabbit that writes code. It includes an Agent Loop, a Coding Agent, and a nice CLI.\n\n## Demo\n\nhttps://github.com/user-attachments/assets/4ad89f14-e338-43e4-82ce-91cb83d58be2\n\n## Index\n\n- [Get Started](#get-started)\n  - [Key Features](#key-features)\n  - [Install and Run](#install-and-run)\n    - [Option 1: Install and Run](#option-1-install-and-run)\n    - [Option 2: Run without Installing](#option-2-run-without-installing)\n- [Model Configuration](#model-configuration)\n  - [List Configured Models](#list-configured-models)\n  - [Add a New Model](#add-a-new-model)\n  - [Remove a Model](#remove-a-model)\n  - [Set the Default Model](#set-the-default-model)\n- [How to Contribute](#how-to-contribute)\n  - [Develop & Build from Source](#develop-build-from-source)\n    - [1. Install Dependencies](#1-install-dependencies)\n    - [2. Run in Development Mode](#2-run-in-development-mode)\n    - [3. Build the Binary](#3-build-the-binary)\n  - [Architecture](#architecture)\n    - [Layer 1: Foundation](#layer-1-foundation)\n    - [Layer 2: Agent Loop](#layer-2-agent-loop)\n    - [Layer 3: Coding Agent](#layer-3-coding-agent)\n  - [Community](#community)\n    - [How to Build a Coding Agent from Scratch](#how-to-build-a-coding-agent-from-scratch)\n  - [Middleware](#middleware)\n    - [Available Hooks](#available-hooks)\n  - [Why Bun?](#why-bun)\n- [Roadmap](#roadmap)\n\n---\n\n## Get Started\n\n### Key Features\n\n- **Model Foundation**\n  - A stable core `Model` abstraction plus provider-facing contracts, designed to keep model integrations clean and reusable.\n  - Multiple models are supported.\n- **Agent Loop (Middleware-Ready)**\n  - A reusable ReAct-style agent loop.\n  - First-class middleware support for extending behavior (state, tool orchestration, skills, etc.).\n  - Human-in-the-loop support for approval of tool calls.\n  - See [Middleware](#middleware)\n- **Skills Support**\n  - The [standard agent skill](https://agentskills.io/) format is supported.\n  - Skills are discovered and loaded from:\n    - `~/.agents/skills`\n    - `~/.helixent/skills`\n    - `${current_project}/.agents/skills`\n    - `${current_project}/.helixent/skills`\n  - Duplicate skill names in different folders are allowed.\n\n- **Long-term memory**\n  - **Project root `AGENTS.md` support**: if an `AGENTS.md` exists at the repository root, it is automatically picked up as project guidance.\n- **Coding Agent**\n  - A coding-focused agent layer with practical tools (e.g. `bash`, `read_file`, `write_file`, `str_replace`, `list_files`, `glob_search`, `grep_search`, `apply_patch`, `file_info`, `mkdir`, `move_path`, etc.) for developer workflows.\n  - Todo-list-based **plan mode** is supported.\n- **CLI**\n  - A CLI (with TUI support) for running agents interactively and iterating quickly.\n\nHelixent is now available on [`npm`](https://www.npmjs.com/package/helixent), so you can install globally and run, or choose to run via npx without installing:\n\n### Install and Run\n\n#### Option 1: Install and Run\n\n```bash\nnpm install -g helixent@latest\ncd path/to/your/project\nhelixent\nhelixent --help\n```\n\n#### Option 2: Run without Installing\n\n```bash\ncd path/to/your/project\nnpx helixent@latest\nnpx helixent --help\n```\n\n## Model Configuration\n\nHelixent stores your CLI configuration in:\n\n- `~/.helixent/config.yaml`\n\n### List Configured Models\n\n```bash\nhelixent config model list\n```\n\n### Add a New Model\n\n```bash\nhelixent config model add\n```\n\n### Remove a Model\n\n```bash\nhelixent config model remove <model_name>\n```\n\nOr select from the list of configured models:\n\n```bash\nhelixent config model remove\n```\n\n### Set the Default Model\n\n```bash\nhelixent config model set-default <model_name>\n```\n\nOr select from the list of configured models:\n\n```bash\nhelixent config model set-default\n```\n\n---\n\n## How to Contribute\n\n### Develop & Build from Source\n\nThis section shows how to build Helixent from source and link the `helixent` CLI into your global PATH on **macOS**.\n\n#### 1. Install Dependencies\n\n```bash\nbun install\n```\n\nAll pushes and pull requests run `bun run check` in GitHub Actions. Local commits are also blocked by the pre-commit hook until the same check passes.\n\n#### 2. Run in Development Mode\n\n```bash\nbun run dev\n```\n\n#### 3. Build the Binary\n\n```bash\nbun run build:bin\n```\n\nAfter the build completes, you should have:\n\n- `dist/bin/helixent`\n\n#### 4. Before Commit\n\nMake sure your changes pass all the linting, type checking, and tests by running:\n\n```bash\nbun run check\n```\n\nOr run tests only by running:\n\n```bash\nbun run test\n```\n\n> This is also run automatically by the pre-commit hook. This also causes the committing process a little bit slower,\n> but we think it's worth it. After all, in an AI-dominated GitHub universe, we should be able to handle the last mile of code quality.\n\n### Architecture\n\nHelixent is organized into three layers, plus a `community` area for third-party integrations.\n\n```\nsrc/\nв”ңв”Җв”Җ foundation/    # Layer 1 вҖ“ Core primitives\nв”ңв”Җв”Җ agent/         # Layer 2 вҖ“ Agent loop\nв”ңв”Җв”Җ coding/        # Layer 3 вҖ“ Coding agent (domain-specific)\nв””в”Җв”Җ community/     # Third-party integrations (e.g. OpenAI)\n```\n\n#### Layer 1: Foundation\n\nCore primitives that everything else builds on:\n\n- **Model** вҖ” A unified abstraction over LLM providers. Define a model once, swap providers without changing agent code.\n- **Message** вҖ” A single transcript type that flows end-to-end through the system вҖ” the single source of truth for the conversation.\n- **Tool** вҖ” Tool definitions and execution plumbing (the \"actions\" an agent can invoke).\n\n#### Layer 2: Agent Loop\n\nA reusable **ReAct-style agent loop**:\n\n- Maintains state over a conversation transcript.\n- Orchestrates \"think вҶ’ act вҶ’ observe\" steps in a loop.\n- Invokes tool calls in parallel and feeds observations back into the next reasoning step.\n- Supports **middleware** for extending behavior (see below).\n\nThis layer depends only on Foundation and remains generic вҖ” not tied to any specific domain.\n\n#### Layer 3: Coding Agent\n\nA domain-specific agent built on top of the generic agent loop, pre-configured with coding-oriented tools (`read_file`, `write_file`, `str_replace`, `bash`, `list_files`, `glob_search`, `grep_search`, `apply_patch`, `file_info`, `mkdir`, `move_path`, etc.) and the skills middleware.\n\n### Community\n\nOptional, decoupled adapters that implement Foundation interfaces for specific providers:\n\n- `community/openai` вҖ” `OpenAIModelProvider` backed by the `openai` SDK, compatible with any OpenAI-compatible endpoint.\n\n#### How to Build a Coding Agent from Scratch\n\nHere is a complete example that creates a coding agent using an OpenAI-compatible provider:\n\n```ts\nimport { createCodingAgent } from \"helixent/coding\";\nimport { OpenAIModelProvider } from \"helixent/community/openai\";\nimport { Model } from \"helixent/foundation\";\n\n// 1. Set up a model provider (any OpenAI-compatible endpoint works)\nconst provider = new OpenAIModelProvider({\n  baseURL: \"https://api.openai.com/v1\",\n  apiKey: process.env.OPENAI_API_KEY,\n});\n\n// 2. Create a model instance with your preferred options\nconst model = new Model(\"gpt-4o\", provider, {\n  max_tokens: 16 * 1024,\n  thinking: { type: \"enabled\" },\n});\n\n// 3. Create the agent вҖ” tools and skills are wired up automatically\nconst agent = await createCodingAgent({ model });\n\n// 4. Stream the agent's response\nconst stream = await agent.stream({\n  role: \"user\",\n  content: [{ type: \"text\", text: \"Create a hello world web server in the current directory.\" }],\n});\n\nfor await (const message of stream) {\n  for (const content of message.content) {\n    if (content.type === \"thinking\" && content.thinking) {\n      console.info(\"рҹ’Ў\", content.thinking);\n    } else if (content.type === \"text\" && content.text) {\n      console.info(content.text);\n    } else if (content.type === \"tool_use\") {\n      console.info(\"рҹ”§\", content.name, content.input.description ?? \"\");\n    }\n  }\n}\n```\n\n### Middleware\n\nHelixent provides a **middleware** system that lets you observe and mutate the agent's behavior at every stage of the loop. Middleware hooks are invoked sequentially in array order.\n\n#### Available Hooks\n\n| Hook | When it runs |\n|---|---|\n| `beforeAgentRun` | Once after the user message is appended, before the first step |\n| `afterAgentRun` | Once when the agent is about to stop (no tool calls) |\n| `beforeAgentStep` | At the start of each step, before the model is invoked |\n| `afterAgentStep` | At the end of each step, after all tool calls complete |\n| `beforeModel` | Before the model context is sent to the provider |\n| `afterModel` | After the model response is received |\n| `beforeToolUse` | Immediately before a tool is invoked |\n| `afterToolUse` | Immediately after a tool invocation resolves |\n\nEach hook receives the current context and can return a partial update to merge back in, or `void` to leave it unchanged.\n\n### Why Bun?\n\nAgent loops are inherently asynchronous вҖ” the model thinks, tools execute, results stream back, often in parallel. JavaScript/TypeScript has **native async/await** baked into the language and runtime, making concurrent orchestration straightforward without the callback gymnastics or `asyncio` boilerplate you'd face in Python.\n\nAmong JS runtimes, we chose [**Bun**](https://bun.com/) specifically because:\n\n- **Same runtime as Claude Code** вҖ” Bun powers Claude Code and a growing number of TypeScript-first tools. It's built for speed, and a compiled build is a single native executable.\n- **Performance** вҖ” HTTP, filesystem I/O, and cold starts are all noticeably faster than Node's, which adds up when an agent loop issues dozens of tool calls per run.\n- **Standalone executables** вҖ” `bun build --compile` outputs one self-contained binary. Shipping a CLI is as simple as handing users a single fileвҖ”no separate runtime install.\n- **Batteries included** вҖ” Test runner, bundler, and TypeScript support ship with Bun, so there's no separate toolchain to wire up.\n\n---\n\n## Roadmap\n\n- **Sub-agent** вҖ” Spawn child agents from within a run to handle subtasks independently, each with their own context and tool set.\n- **Agent Team** вҖ” Multi-agent collaboration where agents can coordinate, delegate, and share results to tackle complex problems together.\n- **Print Mode** вҖ” A Claude Code-style rendering mode that streams the agent's thinking, tool calls, and outputs in a rich, human-friendly terminal UI.\n- **Sessioning** вҖ” A local, file-based session store for the agent's context and history.\n","summary":"Helixent is an openвҖ‘source codeвҖ‘generation framework that runs a ReActвҖ‘style agent loop inside a commandвҖ‘line interface built with Node.js, TypeScript, and Bun. It bundles a versatile model abstraction, middlewareвҖ‘ready agent logic, and a codingвҖ‘focused agent that comes with fileвҖ‘manipulation tools, planвҖ‘mode todo handling, and automatic skill discovery from standard directories. The workflow supports longвҖ‘term project memory via `AGENTS.md`, humanвҖ‘inвҖ‘theвҖ‘loop approvals for tool calls, and an extensible plugin system for custom behaviors. It is ideal for developers, build engineers, and AI researchers who want a fast, reproducible way to generate, modify, and iterate on code within their existing projects.","description":"Helixent is a small library for building ReAct-style agent loops based on the Bun stack.","stars":187,"language":"TypeScript"},{"owner":"antfu","repo":"tsnapi","url":"https://github.com/antfu/tsnapi","readme":"<img src=\"./tsnapi.svg\" alt=\"tsnapi\" height=\"150\" />\n\n# tsnapi\n\n\nLibrary public API snapshot testing for runtime exports and type declarations.\n\nCaptures your public API surface -- both runtime exports and type declarations -- into human-readable snapshot files that you commit alongside your code. When the API changes unexpectedly, you'll know.\n\nThink of it like Vitest's snapshot testing, but for your package's public contract.\n\nFor example, you can check the generated snapshots for the package itself: [`__snapshots__/tsnapi`](/__snapshots__/tsnapi).\n\n## Why\n\nWhen maintaining a library, it's easy to accidentally:\n\n- Remove or rename an export\n- Change a function signature\n- Break type declarations\n- Introduce unintended public API surface\n\n`tsnapi` makes these changes visible in your git diff. Every build produces a pair of snapshot files per entry point:\n\n- **`.snapshot.js`** -- what your package exports at runtime\n- **`.snapshot.d.ts`** -- what your package exports as types\n\nThese files are committed to your repo. When they change, you review the diff -- just like any other code change.\n\n## Install\n\n```bash\npnpm add -D tsnapi\n```\n\n## Usage\n\n### As a Rolldown / tsdown plugin\n\nThe most recommended way of using `tsnapi` is to use it with [`tsdown`](https://tsdown.dev) -- an elegant library bundler built on top of Rolldown:\n\n```ts\n// tsdown.config.ts\nimport { defineConfig } from 'tsdown'\nimport ApiSnapshot from 'tsnapi/rolldown'\n\nexport default defineConfig({\n  entry: ['src/index.ts'],\n  dts: true,\n  plugins: [\n    ApiSnapshot()\n  ],\n})\n```\n\nOn first build, snapshot files are written. On subsequent builds, the plugin compares against existing snapshots and **fails the build with a diff** if the API changed.\n\nTo update snapshots when you intentionally change the API, set the `update` option to `true` or use the `--update-snapshot` / `-u` CLI flag:\n\n```bash\ntsdown --update-snapshot\n# or\nUPDATE_SNAPSHOT=1 tsdown\n```\n\nor add the `update` option to the plugin:\n\n<!-- eslint-skip -->\n```ts\nplugins: [\n  ApiSnapshot({ update: true })\n],\n```\n\n### As a CLI\n\nSnapshot any package's dist without a bundler:\n\n```bash\n# Snapshot the current package (reads package.json exports вҶ’ parses dist files), which you need to run the build first to generate the dist\ntsnapi\n\n# Update snapshots when you intentionally change the API\ntsnapi -u\n```\n\n### With Vitest\n\n`tsnapi/vitest` provides higher-level Vitest integration that uses [`toMatchFileSnapshot`](https://vitest.dev/guide/snapshot#file-snapshots) to store snapshots as individual files.\n\n> **Note:** `tsnapi` reads built dist files, so make sure to build your packages before running the tests. We recommend updating your test script to build first:\n>\n> ```json\n> {\n>   \"scripts\": {\n>     \"test\": \"pnpm run build && vitest\"\n>   }\n> }\n> ```\n>\n> If you are using [`tsdown`](https://tsdown.dev), you can use [`tsdown-stale-guard`](https://github.com/antfu-collective/tsdown-stale-guard) to set up the build guard automatically.\n\n#### Single package\n\n```ts\n// api.test.ts\nimport { fileURLToPath } from 'node:url'\nimport { snapshotApiPerEntry } from 'tsnapi/vitest'\nimport { describe } from 'vitest'\n\nconst dir = fileURLToPath(new URL('../packages/my-lib', import.meta.url))\n\ndescribe('my-lib API', async () => {\n  await snapshotApiPerEntry(dir)\n})\n```\n\nThis creates `it()` blocks for each entry point, asserting both runtime and DTS snapshots. Snapshot files are written to `__snapshots__/tsnapi/<package-name>/` relative to the test file. Run `vitest -u` to update snapshots when you intentionally change the API.\n\n#### Monorepo\n\nFor monorepos, `describePackagesApiSnapshots` creates a `describe()` block per package. When `packages` is omitted, it auto-discovers workspace packages from `pnpm-workspace.yaml` or the `workspaces` field in `package.json`:\n\n```ts\n// api.test.ts\nimport { describePackagesApiSnapshots } from 'tsnapi/vitest'\n\n// Auto-discovers all workspace packages\nawait describePackagesApiSnapshots()\n```\n\nOr provide explicit package paths:\n\n```ts\nimport { fileURLToPath } from 'node:url'\nimport { describePackagesApiSnapshots } from 'tsnapi/vitest'\n\nawait describePackagesApiSnapshots({\n  packages: [\n    fileURLToPath(new URL('../packages/core', import.meta.url)),\n    fileURLToPath(new URL('../packages/utils', import.meta.url)),\n  ],\n})\n```\n\n`describePackagesApiSnapshots` accepts `filter`, `beforeEach`, and `afterEach` callbacks. Each receives a `PackageContext` object:\n\n```ts\ninterface PackageContext {\n  cwd: string // the input cwd\n  workspaceRoot: string // the resolved workspace root\n  packageRoot: string // absolute path to the package directory\n  packageName: string // package name from package.json\n  outputDir: string // snapshot output directory (relative to test file)\n}\n```\n\n#### `filter`\n\nCalled for each discovered package. The context is mutable вҖ” modify any property to customize behavior. Return `false` to skip the package entirely:\n\n```ts\nimport { describePackagesApiSnapshots } from 'tsnapi/vitest'\n\nawait describePackagesApiSnapshots({\n  filter(ctx) {\n    // Skip private packages\n    if (ctx.packageName.startsWith('@internal/'))\n      return false\n    // Strip org scope from describe block name\n    ctx.packageName = ctx.packageName.replace(/^@.*\\//, '')\n    // Customize snapshot output directory per package\n    ctx.outputDir = `__snapshots__/${ctx.packageName}`\n  },\n})\n```\n\n#### `beforeEach` / `afterEach`\n\nLifecycle hooks registered inside each package's `describe` block via Vitest's `beforeEach`/`afterEach`. They receive the (possibly mutated) context:\n\n```ts\nimport { describePackagesApiSnapshots } from 'tsnapi/vitest'\n\nawait describePackagesApiSnapshots({\n  beforeEach({ packageRoot, packageName }) {\n    console.log(`Testing ${packageName} at ${packageRoot}`)\n  },\n  afterEach({ packageName }) {\n    console.log(`Done testing ${packageName}`)\n  },\n})\n```\n\nFor example, if you use [`tsdown-stale-guard`](https://github.com/antfu-collective/tsdown-stale-guard), you can use the `beforeEach` hook to guard against stale builds вҖ” ensuring each package's dist is in sync with its source before running snapshot tests:\n\n```ts\nimport { guardStaleBuild } from 'tsdown-stale-guard'\nimport { describePackagesApiSnapshots } from 'tsnapi/vitest'\n\nawait describePackagesApiSnapshots({\n  async beforeEach({ packageRoot }) {\n    // guard will throw if the build is stale to fail the test\n    await guardStaleBuild({ root: packageRoot })\n  },\n})\n```\n\nRun `vitest -u` to update snapshots when you intentionally change the API.\n\n#### Low-level\n\nYou can also use `generateApiSnapshot` directly with Vitest's built-in snapshot system:\n\n```ts\n// api.test.ts\nimport { generateApiSnapshot } from 'tsnapi'\nimport { expect, it } from 'vitest'\n\nconst api = await generateApiSnapshot(process.cwd())\n\nit('runtime API', () => {\n  expect(api['.'].runtime).toMatchInlineSnapshot()\n})\n\nit('type declarations', () => {\n  expect(api['.'].dts).toMatchInlineSnapshot()\n})\n```\n\nFor packages with multiple entry points, each entry is keyed by its export path:\n\n```ts\nconst api = await generateApiSnapshot(process.cwd())\nexpect(api['./utils'].runtime).toMatchSnapshot()\n```\n\n### As a library\n\n```ts\nimport { snapshotPackage } from 'tsnapi'\n\n// Snapshot current package\nconst result = await snapshotPackage(process.cwd())\n\nif (result.hasChanges) {\n  console.error(result.diff)\n}\n```\n\n## Options\n\n```ts\ninterface ApiSnapshotOptions {\n  /** Snapshot output directory. @default '__snapshots__/tsnapi' */\n  outputDir?: string\n  /** Runtime snapshot extension. @default '.snapshot.js' */\n  extensionRuntime?: string\n  /** DTS snapshot extension. @default '.snapshot.d.ts' */\n  extensionDts?: string\n  /** Omit argument names from function signatures. @default true */\n  omitArgumentNames?: boolean\n  /** Widen literal types to base types, hiding implementation details. @default true */\n  typeWidening?: boolean\n  /** Update mode. Auto-detected from --update-snapshot / -u / UPDATE_SNAPSHOT=1 */\n  update?: boolean\n}\n```\n\n### `typeWidening`\n\nWhen `typeWidening` is `true` (default), literal values are widened to hide implementation details:\n\n- **Runtime**: `export const VERSION = '1.0.0'` вҶ’ `export var VERSION /* const */`\n- **DTS**: `declare const VERSION = \"1.0.0\"` вҶ’ `export declare const VERSION: string;`\n\nWhen `typeWidening` is `false`, literal values are preserved in the snapshot:\n\n- **Runtime**: `export const VERSION = '1.0.0'` вҶ’ `export var VERSION = '1.0.0' /* const */`\n- **DTS**: `declare const VERSION = \"1.0.0\"` вҶ’ `export declare const VERSION = \"1.0.0\";`\n\nThis applies to string, number, boolean, null, bigint, and array literals. Non-literal values (function calls, complex objects) are always stripped regardless of this setting.\n\n## Credits\n\nThis project is heavily inspired by:\n\n- [rolldown-plugin-dts-snapshot](https://github.com/sxzz/rolldown-plugin-dts-snapshot) by [@sxzz](https://github.com/sxzz) -- DTS snapshot approach using AST parsing\n- [vitest-package-exports](https://github.com/antfu/vitest-package-exports) by [@antfu](https://github.com/antfu) -- Concept of snapshotting package exports for regression detection\n\n## License\n\n[MIT](./LICENSE)\n","summary":"tsnapi is a library that captures and tests a packageвҖҷs public API surface, generating humanвҖ‘readable runtimeвҖ‘export and typeвҖ‘declaration snapshots that are committed alongside the code. It supports integration as a Rollup/tsdown plugin, a standalone CLI, and a Vitest helper, automatically comparing snapshots on each build or test run and failing if the API changes unexpectedly. The tool lets you update snapshots intentionally via flags or options, making unintentional API breaks visible in git diffs. Library authors and monorepo maintainers can use it to guard against accidental export or type changes throughout development.","description":"Library public API snapshot testing for runtime exports and type declarations.","stars":160,"language":"TypeScript"},{"owner":"moabukar","repo":"miniblue","url":"https://github.com/moabukar/miniblue","readme":"<p align=\"center\">\n  <img src=\"assets/logo.svg\" alt=\"miniblue\" width=\"120\" />\n</p>\n\n<h1 align=\"center\">miniblue</h1>\n\n<p align=\"center\"><strong>The free, open-source Azure emulator. Develop and test your Azure apps locally.</strong></p>\n\n<p align=\"center\">\n  <a href=\"https://golang.org\"><img src=\"https://img.shields.io/badge/go-1.26+-blue.svg\" alt=\"Go Version\"></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/badge/license-MIT-blue.svg\" alt=\"License\"></a>\n  <a href=\"https://github.com/moabukar/miniblue/actions/workflows/ci.yml\"><img src=\"https://github.com/moabukar/miniblue/actions/workflows/ci.yml/badge.svg\" alt=\"CI\"></a>\n  <a href=\"https://hub.docker.com/r/moabukar/miniblue\"><img src=\"https://img.shields.io/badge/docker-moabukar%2Fminiblue-blue?logo=docker\" alt=\"Docker\"></a>\n  <a href=\"https://miniblue.io\"><img src=\"https://img.shields.io/badge/docs-miniblue.io-blue\" alt=\"Docs\"></a>\n</p>\n\n<p align=\"center\">Local Azure development. One binary. No account needed.</p>\n\n> **Disclaimer:** miniblue is an independent open-source project. It is not affiliated with, endorsed by, or associated with Microsoft or Azure.\n\n---\n\n## Quick Start\n\n```bash\n# Homebrew\nbrew tap moabukar/tap && brew install miniblue\n\n# Or Docker\ndocker run -p 4566:4566 -p 4567:4567 moabukar/miniblue:latest\n```\n\nThen interact with it:\n\n```bash\nazlocal health\nazlocal group create --name myRG --location eastus\nazlocal keyvault secret set --vault myvault --name db-pass --value secret123\nazlocal storage blob upload --account myacct --container data --name file.txt --data \"Hello!\"\n```\n\nNo Azure account or credentials needed.\n\n## What it does\n\n26 Azure services emulated behind a single port. Works with Terraform, Pulumi, Azure SDKs, and curl.\n\n| Service | Service | Service |\n|---------|---------|---------|\n| Resource Groups | Blob Storage | Table Storage |\n| Queue Storage | Key Vault | Cosmos DB |\n| Service Bus | Azure Functions | Virtual Networks |\n| DNS Zones | Container Registry | Event Grid |\n| App Configuration | Managed Identity | DB for PostgreSQL |\n| DB for MySQL | Azure SQL Database | Azure Cache for Redis |\n| Container Instances | Public IP Addresses | Network Security Groups |\n| Load Balancer | Application Gateway | Storage Accounts |\n\n## How it compares\n\n| | LocalStack (AWS) | MiniStack (AWS) | Azurite (Azure) | miniblue |\n|---|---|---|---|---|\n| Services | 80+ | 36 | 3 (storage only) | **26** |\n| Docker image | ~1GB | ~200MB | ~300MB | **~8MB** |\n| Startup | ~10s | ~5s | ~3s | **<1s** |\n| Real backends | DynamoDB Local | RDS, S3, SQS | No | **Postgres, Redis, Docker** |\n| Terraform | Yes | Yes | No | **Yes** |\n| License | BSL | MIT | MIT | MIT |\n\n## Terraform\n\nhttps://github.com/user-attachments/assets/eea72535-6eb7-419d-9f9c-6f42b80d5efc\n\n```bash\nbash scripts/trust-cert.sh  # one-time cert trust\n```\n\n```hcl\nprovider \"azurerm\" {\n  features {}\n  metadata_host              = \"localhost:4567\"\n  skip_provider_registration = true\n  subscription_id            = \"00000000-0000-0000-0000-000000000000\"\n  tenant_id                  = \"00000000-0000-0000-0000-000000000001\"\n  client_id                  = \"miniblue\"\n  client_secret              = \"miniblue\"\n}\n```\n\nSee [examples/terraform/](examples/terraform/) for full examples including three-tier, serverless, and microservices scenarios.\n\n## Real Backends (optional)\n\n| Feature | Env var |\n|---------|---------|\n| Real PostgreSQL databases | `POSTGRES_URL=postgres://user:pass@host:5432/db` |\n| Real Redis connectivity | `REDIS_URL=redis://host:6379` |\n| Real Docker containers (ACI) | Docker daemon running |\n| File persistence | `PERSISTENCE=1` |\n| Postgres persistence | `DATABASE_URL=postgres://...` |\n\n## Configuration\n\n| Variable | Default | Description |\n|----------|---------|-------------|\n| `PORT` | `4566` | HTTP port |\n| `TLS_PORT` | `4567` | HTTPS port |\n| `LOG_LEVEL` | `info` | debug, info, warn, error |\n| `SERVICES` | all | Comma-separated list to enable selectively |\n| `PERSISTENCE` | off | Set to `1` for file-based persistence |\n\nFull configuration reference in the [docs](https://miniblue.io/getting-started/configuration/).\n\n## Documentation\n\nFull docs at **[miniblue.io](https://miniblue.io)** covering:\n\n- [Installation](https://miniblue.io/getting-started/installation/) (Homebrew, Docker, binary, Helm)\n- [Quick Start](https://miniblue.io/getting-started/quickstart/)\n- [Terraform Guide](https://miniblue.io/guides/terraform/)\n- [Pulumi Guide](https://miniblue.io/guides/pulumi/)\n- [SDK Guide](https://miniblue.io/guides/sdk/) (Python, Go, JavaScript)\n- [CLI Reference](https://miniblue.io/guides/azure-cli/)\n- [API Parity Matrix](https://miniblue.io/services/parity/)\n- [Architecture](https://miniblue.io/architecture/overview/)\n\n## Contributing\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md). Each service is its own Go package under `internal/services/`.\n\n## Sponsors\n\n<p>\n  <a href=\"https://coderco.io\"><img src=\"assets/cc.jpg\" alt=\"CoderCo\" width=\"200\" /></a>\n</p>\n\nminiblue is sponsored by [CoderCo](https://coderco.io).\n\nWant to sponsor this project? Reach out at devopsbymo@gmail.com.\n\n## License\n\nMIT - see [LICENSE](LICENSE).\n","summary":"miniblue is an openвҖ‘source Azure emulator that lets developers run and test Azure services locally without an Azure account, providing a singleвҖ‘binary deployment that starts in under a second. It emulates 26 Azure servicesвҖ”including Blob Storage, Resource Groups, Key Vault, Cosmos DB, Functions, and SQL DatabaseвҖ”through a single port and supports Terraform, Pulumi, the Azure SDKs, and raw HTTP calls. The lightweight Docker image (~8вҖҜMB) and optional realвҖ‘backend integrations with PostgreSQL, Redis, and Docker containers make it ideal for CI pipelines, local development, and rapid prototyping of cloudвҖ‘native applications. Anyone building AzureвҖ‘centric workloads who wants a costвҖ‘free, fast, and fully scriptable local environment will benefit from using miniblue.","description":"Local Azure development. One binary. No account needed. 25+ emulated services for testing, CI and local dev.","stars":356,"language":"Go"},{"owner":"hiroppy","repo":"tmux-agent-sidebar","url":"https://github.com/hiroppy/tmux-agent-sidebar","readme":"<h1 align=\"center\">tmux-agent-sidebar</h1>\n\n<p align=\"center\">One tmux sidebar that tracks every Claude Code and Codex pane across every session and window. See status, prompts, Git state, activity, and worktrees without switching windows.</p>\n\n<p align=\"center\"><img src=\"website/src/assets/captures/hero.png\" alt=\"tmux-agent-sidebar hero\" /></p>\n\n<p align=\"center\">\n  <a href=\"https://hiroppy.github.io/tmux-agent-sidebar/\">Documentation</a> В·\n  <a href=\"https://hiroppy.github.io/tmux-agent-sidebar/getting-started/installation/\">Getting Started</a> В·\n  <a href=\"https://hiroppy.github.io/tmux-agent-sidebar/features/agent-pane/\">Features</a>\n</p>\n\n## Features\n\n- **Every pane, one view** \n  вҖ” tracks Claude Code and Codex panes across all tmux sessions and windows\n- **Live metadata** \n  вҖ” prompts, tool calls, response previews, wait reasons, task progress, and subagent trees refresh as the agents work\n- **Worktrees, included** \n  вҖ” spawn a fresh worktree + agent from the sidebar and tear it down вҖ” window, worktree, and branch вҖ” in one keystroke\n- **Desktop notifications** \n  вҖ” native alerts when an agent finishes, needs permission, or errors out\n\n## Requirements\n\n- tmux 3.0+\n- [TPM](https://github.com/tmux-plugins/tpm) (or the manual install in [Installation](https://hiroppy.github.io/tmux-agent-sidebar/getting-started/installation/))\n- [GitHub CLI](https://cli.github.com/) (optional вҖ” required only for PR numbers in the Git tab)\n\n## Quick Start\n\n### 1. Install the plugin\n\nUsing [TPM](https://github.com/tmux-plugins/tpm):\n\n```tmux\nset -g @plugin 'hiroppy/tmux-agent-sidebar'\n```\n\nReload tmux (`tmux source ~/.tmux.conf`), then press `prefix + I`. The install wizard downloads a pre-built binary or builds from source.\n\n### 2. Wire up the agent hooks\n\n- **Claude Code** вҖ” register the plugin inside Claude Code:\n\n  ```sh\n  /plugin marketplace add ~/.tmux/plugins/tmux-agent-sidebar\n  /plugin install tmux-agent-sidebar@hiroppy\n  ```\n\n- **Codex** вҖ” open a Codex pane, press `prefix + e`, click the yellow `в“ҳ` badge, copy the setup snippet, paste it into the Codex pane.\n\nFull walkthroughs: [Claude Code setup](https://hiroppy.github.io/tmux-agent-sidebar/getting-started/claude-code/) В· [Codex setup](https://hiroppy.github.io/tmux-agent-sidebar/getting-started/codex/)\n\n### 3. Toggle the sidebar\n\n`prefix + e` toggles the sidebar in the current window, `prefix + E` toggles it everywhere.\n\n## Documentation\n\nThe [documentation site](https://hiroppy.github.io/tmux-agent-sidebar/) covers every feature and option:\n\n- [Agent pane breakdown](https://hiroppy.github.io/tmux-agent-sidebar/features/agent-pane/)\n- [Worktree lifecycle](https://hiroppy.github.io/tmux-agent-sidebar/features/worktree/)\n- [Activity log](https://hiroppy.github.io/tmux-agent-sidebar/features/activity-log/) В· [Git tab](https://hiroppy.github.io/tmux-agent-sidebar/features/git-status/) В· [Notifications](https://hiroppy.github.io/tmux-agent-sidebar/features/notifications/)\n- [Agent support matrix](https://hiroppy.github.io/tmux-agent-sidebar/agents/)\n- [Keybindings](https://hiroppy.github.io/tmux-agent-sidebar/reference/keybindings/) В· [tmux options](https://hiroppy.github.io/tmux-agent-sidebar/reference/tmux-options/) В· [Scripting](https://hiroppy.github.io/tmux-agent-sidebar/reference/scripting/)\n\n## Development\n\nSymlink the plugin directory to your working copy so builds are picked up without copying:\n\n```sh\nrm -rf ~/.tmux/plugins/tmux-agent-sidebar\nln -s <path-to-this-repo> ~/.tmux/plugins/tmux-agent-sidebar\ncargo build --release\n```\n\nToggle the sidebar off вҶ’ on to pick up the new binary.\n\n## License\n\n[MIT](./LICENSE)\n","summary":"tmuxвҖ‘agentвҖ‘sidebar adds a unified pane to tmux that tracks every ClaudeвҖҜCode and Codex agent window, displaying realвҖ‘time metadata such as prompts, tool calls, progress, and Git worktree status. It lets users spawn and tear down Git worktrees and agents from a single keystroke, and emits desktop notifications when agents finish or error. The plugin is lightweight, works with tmuxвҖҜ3.0+ and TPM, and is ideal for developers who use Claude or Codex inside tmux and want a nonвҖ‘intrusive way to monitor and manage multiple agents across sessions.","description":"A tmux sidebar that monitors AI coding agents across all windows and sessions in real-time","stars":162,"language":"Rust"},{"owner":"Hyacinthe-primus","repo":"File_Converter_Pro","url":"https://github.com/Hyacinthe-primus/File_Converter_Pro","readme":"<div align=\"center\">\n\n<img src=\"icon.png\" alt=\"File Converter Pro\" width=\"110\"/>\n\n<h1>File Converter Pro</h1>\n\n<p><em>A free, offline, all-in-one file converter for Windows built to feel premium.</em></p>\n\n[![Version](https://img.shields.io/badge/version-1.0.0-4dabf7?style=flat-square)](#) [![Platform](https://img.shields.io/badge/Windows%2010%2F11-0078D4?style=flat-square&logo=windows)](#)\n[![PySide6](https://img.shields.io/badge/PySide6-41CD52?style=flat-square&logo=qt&logoColor=white)](#) [![License](https://img.shields.io/badge/license-GPLv3%20%2F%20Commercial-blue?style=flat-square)](#license)\n[![Status](https://img.shields.io/badge/status-active-brightgreen?style=flat-square)](#) [![Python](https://img.shields.io/badge/Python-3.11%20%7C%203.13-3776AB?style=flat-square&logo=python&logoColor=white)](#)\n\n<br/>\n\n> ![DГ©mo - main window, drag & drop, conversion flow](previews/preview.gif)\n\n<br/>\n\n<details>\n<summary><h2>рҹ“ҡ Table of Contents</h2></summary>\n\n- [What is File Converter Pro?](#what-is-file-converter-pro)\n- [вңЁ Features](#-features)\n- [рҹ“Ӯ Supported Formats](#-supported-formats)\n- [рҹ–ҘпёҸ For End Users](#пёҸ-for-end-users)\n  - [System Requirements](#system-requirements)\n  - [Download & Install](#download--install)\n  - [Optional Tools вҖ” Unlock Better Quality](#optional-tools--unlock-better-quality)\n  - [рҹӣЎпёҸ Windows Defender & Antivirus](#пёҸ-windows-defender--antivirus)\n  - [вҡЎ Terminal Flash on Launch](#-terminal-flash-on-launch--its-safe)\n- [рҹ‘ЁвҖҚрҹ’» For Developers](#-for-developers)\n  - [Prerequisites](#prerequisites)\n  - [Clone & Install](#clone--install)\n  - [Key Python Dependencies](#key-python-dependencies)\n  - [Optional External Binaries](#optional-external-binaries)\n  - [Running in Dev Mode](#running-in-dev-mode)\n  - [Building the Exe](#building-the-exe)\n  - [Project Structure](#project-structure)\n- [рҹҢҗ Internationalization](#-internationalization)\n- [вҡ пёҸ Known Limitations](#пёҸ-known-limitations)\n- [рҹҶҡ How It Compares](#-how-it-compares)\n- [рҹ—әпёҸ Roadmap](#пёҸ-roadmap)\n- [рҹ’ҷ Support the Project](#-support-the-project)\n- [рҹӨқ Contributing](#-contributing)\n- [рҹҷҸ Credits](#-credits)\n- [рҹ”§ Modifications & Contributions](#-modifications--contributions)\n- [рҹ“Ӣ Legal](#-legal)\n- [рҹ“„ License](#-license)\n\n</details>\n\n</div>\n\n---\n\n## What is File Converter Pro?\n\nFile Converter Pro is a **free, fully offline Windows desktop application** that converts documents, images, audio, and video all from a single polished tool, without needing a browser or sending your files anywhere online.\n\nIt is built with Python and PySide6 and designed to feel like a real product: animated startup, system-aware dark/light theme, statistics dashboard, gamified achievements, multi-language support.\n\nMost importantly, RAM consumption matters, especially as prices continue to rise. My app is lightweight, using around 250 MB in the executable version and around 125 MB when run from source.\n\nCore philosophy: **ship nothing until it runs perfectly on a clean machine, with zero preinstalled dependencies.**\n\n---\n\n## вңЁ Features\n\n### рҹ”„ All-in-One Conversion\nDocuments, images, audio, and video, one tool instead of five browser tabs.\nBatch conversions supported\n\n### рҹ”’ 100% Offline & Private\nYour files never leave your machine. No telemetry, no uploads, no internet required for any conversion.\n\n### Polished UI\n- Automatic Dark / Light mode, read directly from the Windows registry\n- Animated splash screen with a smooth crossfade into the main window\n- Glassmorphism stat cards, hover effects, and fluid transitions throughout\n\n<br/>\n\n> ![Toggling between themes](previews/preview2.gif)\n\n<br/>\n\n### рҹ“Ҡ Statistics Dashboard\nA full Matplotlib-powered analytics panel showing your conversion history at a glance:\n- Animated bar chart вҖ” conversions per day\n- Animated filled line chart вҖ” processed data volume per day\n- Animated donut chart вҖ” operation type breakdown\n- Animated horizontal bar chart вҖ” format evolution over time\n- Filterable history table with CSV/JSON/PDF export\n\n<br/>\n\n> ![Showing dashboard animations](previews/preview3.gif)\n\n<br/>\n\n\n### Achievements & Rank Progression\nA complete gamification system backed by SQLite:\n- Achievements unlock based on conversion counts, format diversity, streaks, and special events\n- Animated pop-ups appear in real time when an achievement is earned\n- Rank-up celebration dialogs at milestone ranks\n- Full achievements panel to browse locked and unlocked states\n\n<br/>\n\n> ![Achievement unlock animation](previews/preview4.gif)\n\n<br/>\n\n### рҹҢҗ Community i18n\nBuilt-in **French** and **English**. Anyone can contribute a translation by dropping a `.lang` JSON file into the `languages/` folder вҖ” no source code changes needed. See [Internationalization](#-internationalization).\n\n### Special Events\nDate-aware special event overlays (birthdays, new year) with animated Perlin-noise liquid borders, particle confetti/sparkle systems, and per-event color theming. More events will be supported in future versions.\n\n<br/>\n\n> ![Special event overlay вҖ” animated border and confetti](previews/preview_events.png)\n\n<br/>\n\n### рҹ“Ғ Project Files (`.fcproj`)\nSave your conversion setups as project files. Double-clicking a `.fcproj` (with file association enabled) reopens the session instantly.\nYou can even add notes to the project so you know exactly what a project is about.\n\n<br/>\n\n> ![Project file save/load dialog](previews/preview_projects.png)\n\n<br/>\n\n### Drag & Drop onto the Exe\nDrag one or more files directly onto `File Converter Pro.exe` вҖ” they'll be pre-loaded when the window opens.\n\n### Single Instance\nLaunching a second instance focuses the already-running window instead of opening a duplicate.\n\n### Encrypted Settings\nUser preferences are stored on disk using Fernet encryption (`cryptography` library) вҖ” no sensitive settings sit as plain text.\n\n### Native Windows Notifications\nOptional desktop notifications when a conversion finishes, using Windows' native notification system. \nNOTE: This is just for basic conversions, will support more conversions later.\n\n### Quick Check Utility\nA lightweight companion tool (`Quick Check.exe`) built with Tkinter вҖ” categorized scrollable tabs to verify that critical expected files are present in the installed build.\n\n### рҹ’» CLI Mode *(development only)*\n\nWhen running from source, `main.py` supports command-line arguments for managing achievements directly:\n```\npython main.py status              # List all achievement states\npython main.py reset <id>          # Reset a specific achievement\npython main.py unlock <id>         # Manually unlock an achievement\npython main.py reset-all           # Wipe all achievement progress\npython main.py --lang fr           # Force French on launch\npython main.py --lang en           # Force English on launch\npython main.py help                # Show CLI usage\n```\n\n> **Note:** These commands are intended for development use. The compiled `.exe` does not expose a console window, so CLI output would not be visible.\n\n<br/>\n\n> ![CLI mode вҖ” achievement commands in terminal](previews/preview_cli.png)\n\n<br/>\n\n---\n\n## рҹ“Ӯ Supported Formats\n\n<br/>\n\n> ![Format selection вҖ” document, image, audio, video tabs](previews/preview_formats.png)\n\n<br/>\n\n### рҹ“„ Documents\n\n| Input | Output | Engine chain |\n|-------|--------|-------------|\n| TXT | PDF | ReportLab вҶ’ pypandoc (if Pandoc installed) |\n| TXT | DOCX | Word COM вҶ’ pypandoc вҶ’ python-docx native |\n| RTF | PDF | ReportLab native (full fidelity, no Office needed) |\n| RTF | DOCX | Word COM вҶ’ pypandoc вҶ’ striprtf + python-docx |\n| CSV | JSON | Native |\n| JSON | CSV | Native |\n| XLSX | PDF | Microsoft Excel COM вҶ’ LibreOffice CLI вҶ’ ReportLab (auto portrait/landscape, multi-sheet) |\n| XLSX | JSON | openpyxl native |\n| XLSX | CSV | openpyxl native |\n| PPTX | PDF | Microsoft PowerPoint COM вҶ’ LibreOffice CLI вҶ’ python-pptx + ReportLab + Matplotlib |\n| HTML | PDF | pdfkit (wkhtmltopdf) вҶ’ WeasyPrint вҶ’ ReportLab |\n| PDF | HTML | PyMuPDF dict-mode (flow layout, base64-embedded images) |\n| EPUB | PDF | pypandoc вҶ’ spine-order native (images embedded) |\n\n> **PDF вҶ’ DOCX** has its own dedicated pipeline: `pdf2docx` (layout-preserving) вҶ’ text-only fallback вҶ’ image+text hybrid. Quality depends on the source PDF вҖ” scanned PDFs without embedded text are only partially recoverable.\n\n> **`.ppt` (legacy binary format)**: requires Microsoft Office or LibreOffice to be installed. python-pptx cannot open old `.ppt` files natively.\n\n### рҹ–јпёҸ Images\n\n| Input | Output | Notes |\n|-------|--------|-------|\n| JPEG / JPG | PNG | EXIF preserved |\n| PNG | JPG | Max quality, EXIF preserved |\n| WebP | PNG | |\n| BMP | PNG | |\n| TIFF | PNG | |\n| HEIC | PNG | via `pillow-heif` |\n| GIF | PNG | |\n| Any image | ICO | Multi-resolution icon generation |\n\nAll image conversions use Pillow at maximum quality with EXIF metadata preserved.\n\n### рҹ”Ҡ Audio\n\n| Input | Output |\n|-------|--------|\n| WAV | MP3 |\n| MP3 | WAV |\n| AAC | MP3 |\n| MP3 | AAC |\n| FLAC | MP3 |\n| OGG | MP3 |\n| MP4 | MP3 |\n| AVI | MP3 |\n| WebM | MP3 |\n| MKV | MP3 |\n\n### рҹҺ¬ Video\n\n| Input | Output |\n|-------|--------|\n| AVI | MP4 |\n| WebM | MP4 |\n| MKV | MP4 |\n| MOV | MP4 |\n\nAll audio and video conversions are powered by a bundled `ffmpeg` binary located automatically at runtime, with quality presets per format. (you have to install it yourself)\n\n---\n\n## рҹ–ҘпёҸ For End Users\n\nThis section is for anyone who just wants to **download and use** the app. No Python, no terminal, no setup beyond running an installer or downloading the portable version.\n\n**NOTE:** **FFMPEG** is absolutely required for Audio/Video conversions, if you try an audio/video conversion without it, you'll get a command to download it.\n\n<br/>\n\n> ![Main window вҖ” dark mode, file list, conversion options](previews/preview_main.png)\n\n<br/>\n\n---\n\n### System Requirements\n\n| Component | Requirement |\n|-----------|------------|\n| **OS** | Windows 10 or Windows 11 (64-bit) |\n| **RAM** | 4 GB minimum вҖ” 8 GB recommended |\n| **Disk** | ~500 MB free (~435 MB compiled, inherent to the Python / PySide6 / Matplotlib ecosystem) |\n| **Display** | 1280 Г— 720 or higher |\n| **Dependencies** | None вҖ” fully self-contained |\n\n---\n\n### Download & Install\n\n#### Option A вҖ” Installer *(recommended)*\n\nDownload the latest **`FileConverterPro_Setup_v1.0.2.exe`** from the [Releases](../../releases) page and run it.\n\nThe installer:\n- Supports both **English** and **French** during setup\n- Runs **without administrator rights**\n- Targets **64-bit Windows only** (Windows 10 / 11)\n- Optionally creates a **Desktop shortcut**\n- Optionally associates **`.fcproj`** project files with the app\n- Offers to add a **Windows Defender exclusion** for the install folder (recommended вҖ” see [below](#пёҸ-windows-defender--antivirus))\n\nOnce installed, launch **File Converter Pro** from the Start Menu or Desktop shortcut. That's it.\n\n#### Option B вҖ” Portable *(no install)*\n\nIf you'd rather not run an installer, download the portable `.zip` from the [Releases](../../releases) page, extract it anywhere, and run `File Converter Pro.exe` directly.\n\nAll settings, history, and achievements are stored in the same folder as the executable вҖ” move the folder, everything moves with it.\n\n> вҡ пёҸ The portable version does not create automatic file associations for `.fcproj` files. You can still open project files via **File вҶ’ Open Project** inside the app or **open with вҶ’ Select the File Converter Pro exe**\n\n---\n\n### Optional Tools вҖ” Unlock Better Quality\n\nFile Converter Pro works **out of the box with zero dependencies**. Every conversion has a built-in fallback engine that runs on a clean machine. However, if you install any of the tools below, the app will detect them automatically and use them to produce higher-quality output. No configuration needed.\n\n| Tool | What it unlocks | Where to get it |\n|------|----------------|-----------------|\n| **Microsoft Office** (Word, Excel, PowerPoint) | Pixel-perfect DOCX/XLSX/PPTX вҶ’ PDF via COM automation. Also required for legacy `.ppt` files. | Microsoft 365 or standalone Office |\n| **LibreOffice** | High-quality PPTX вҶ’ PDF and XLSX вҶ’ PDF when Office is not installed. | [libreoffice.org](https://www.libreoffice.org/download/download/) |\n| **Pandoc** | Better TXT / RTF / EPUB вҶ’ PDF quality; RTF вҶ’ DOCX with proper formatting. | [pandoc.org](https://pandoc.org/installing.html) |\n| **MiKTeX** *(or any TeX distribution)* | Enables Pandoc's LaTeX PDF pipeline for best typographic output on TXT вҶ’ PDF. Install alongside Pandoc. | [miktex.org](https://miktex.org/download) |\n| **wkhtmltopdf** | Best HTML вҶ’ PDF rendering вҖ” full CSS, fonts, local images. Used as the first-choice engine for HTML conversions. | [wkhtmltopdf.org](https://wkhtmltopdf.org/downloads.html) |\n\n**Conversion quality tiers at a glance:**\n\n```\nPPTX вҶ’ PDF:   PowerPoint COM  вҖә  LibreOffice CLI  вҖә  python-pptx + ReportLab\nXLSX вҶ’ PDF:   Excel COM       вҖә  LibreOffice CLI  вҖә  ReportLab native\nTXT  вҶ’ PDF:   ReportLab       вҖә  pypandoc  (needs Pandoc + MiKTeX for LaTeX output)\nHTML вҶ’ PDF:   wkhtmltopdf     вҖә  WeasyPrint        вҖә  ReportLab\nRTF  вҶ’ DOCX:  Word COM        вҖә  pypandoc          вҖә  striprtf + python-docx\n```\n\n---\n\n### рҹӣЎпёҸ Windows Defender & Antivirus\n\nIt is **strongly recommended** to add the File Converter Pro installation folder to your Windows Defender exclusion list. The installer will offer to do this automatically during setup.\n\n**Why?** The app bundles:\n- A `ffmpeg` binary (commonly flagged by heuristic scanners)\n- A PyInstaller-compiled Python executable (another common false-positive trigger)\n\nThe application makes **no outbound network calls** during conversions and contains no malicious code. If your antivirus flags it, it is a false positive.\n\nIf you have installed the portable version and you want to add the folder as an exclusion, run this PowerShell command:\n\n```powershell\nAdd-MpPreference -ExclusionPath \"C:\\Your\\Folder\\File Converter Pro\"\n```\nOr add it manually in Windows Defender.\n\nIf you get this error: **Unhandled exception in script** (precisely: *\"an application control policy blocked this file\"*):\n\n> ![Unhandled error](previews/unhandled_exception.png)\n\nRun this command in a **PowerShell terminal as Administrator**, replacing the path with your actual installation folder:\n\n```powershell\nGet-ChildItem -Path \"C:\\Your\\path\\to\\File Converter Pro\" -Recurse | Unblock-File\n```\n\n**Why does this happen?**  \nWhen you download a file from the internet, Windows automatically tags it with a hidden mark called `Zone.Identifier`. This causes Windows to block certain DLLs from loading, even if your antivirus has no issue with them. Running the command above removes that mark from all files in the folder.\n\n> **Note:** Just adding the folder to Windows Defender exclusions will **not** fix this, they are two separate mechanisms.\n\n---\n\n### вҡЎ Terminal Flash on Launch вҖ” It's Safe\n\nWhen you first launch `File Converter Pro.exe`, a **black terminal window may flash briefly** before disappearing.\n\n**This is completely normal and harmless.** It is due to ffmpeg setting up, if you do not have ffmpeg you won't notice a flash. It is not a virus, it does not run any hidden script, and it does not connect to the internet.\n\nYou can safely ignore it. The GUI will appear immediately after. Or if you still doubt, you can check the code source or built it yourself to have the proves\n\n---\n\n## рҹ‘ЁвҖҚрҹ’» For Developers\n\nThis section is for contributors, translators, and anyone who wants to **run or build the project from source**.\n\n---\n\n### Prerequisites\n\nMake sure the following are installed on your machine before cloning:\n\n| Tool | Version | Purpose |\n|------|---------|---------|\n| **Python** | 3.11 or 3.13 recommended | Runtime |\n| **pip** | Latest | Package manager |\n| **Git** | Any recent | Cloning the repo |\n| **PyInstaller** | 6.x | Building the `.exe` |\n\n> Python 3.13 is what the project is currently compiled against. Other versions may work but are untested. As advice, do not use too recent Python versions because they may not support all libraries yet.\n\n---\n\n### Clone & Install\n\n```bash\ngit clone https://github.com/Hyacinthe-primus/File_Converter_Pro.git\ncd File_Converter_Pro\npip install -r requirements.txt\n```\n\nThen launch the app directly:\n\n```bash\npython main.py\n```\n\n---\n\n### Key Python Dependencies\n\nThese are installed automatically via `requirements.txt`:\n\n| Package | Role |\n|---------|------|\n| `PySide6` | UI framework (Qt6 bindings) |\n| `pdf2docx` | PDF вҶ’ DOCX layout-preserving pipeline |\n| `pymupdf` (`fitz`) | PDF rendering and HTML export |\n| `reportlab` | Native PDF generation fallback |\n| `pypandoc` | Pandoc bridge (TXT/RTF/EPUB вҶ’ PDF/DOCX) |\n| `python-docx` | DOCX creation and editing |\n| `python-pptx` | PPTX reading and rendering |\n| `openpyxl` | XLSX reading and conversion |\n| `Pillow` | Image conversion engine |\n| `pillow-heif` | HEIC format support |\n| `striprtf` | RTF text extraction fallback |\n| `matplotlib` | Statistics dashboard charts |\n| `cryptography` | Fernet-encrypted config storage |\n| `comtypes` | Windows COM automation (Office/PowerPoint/Excel) |\n\n> `comtypes` is Windows-only. It is used to call Microsoft Office via COM for pixel-perfect document-to-PDF conversion. It gracefully no-ops on machines without Office installed.\n\n---\n\n### Optional External Binaries\n\nSome conversion pipelines rely on external binaries that must be installed separately. Currently, the only truly required one is FFmpeg, the others are optional. The app auto-detects them at runtime. No path configuration needed.\n\n| Binary | Used for | Install |\n|--------|---------|---------|\n| `ffmpeg` | All audio and video conversions | Bundled in the compiled exe вҖ” for dev, install via [ffmpeg.org](https://ffmpeg.org/download.html) or `winget install ffmpeg` |\n| `pandoc` | High-quality TXT/RTF/EPUB вҶ’ PDF/DOCX | [pandoc.org](https://pandoc.org/installing.html) |\n| `MiKTeX` / `pdflatex` | LaTeX-based PDF rendering via Pandoc | [miktex.org](https://miktex.org/download) |\n| `wkhtmltopdf` | HTML вҶ’ PDF (pdfkit Strategy 1) | [wkhtmltopdf.org](https://wkhtmltopdf.org/downloads.html) |\n| `soffice` (LibreOffice) | PPTX/XLSX вҶ’ PDF fallback | [libreoffice.org](https://www.libreoffice.org/download/download/) |\n\n---\n\n### Running in Dev Mode\n\nForce a specific language on launch:\n\n```bash\npython main.py --fr\npython main.py --lang en\npython main.py --lang \"Custom English\"         # any .lang file in languages/\n```\n\nForce a specific theme:\n\n```bash\npython main.py --theme dark\npython main.py --theme light\n```\n\nBoth at the same time:\n\n```bash\npython main.py --en --theme light\npython main.py --lang \"Custom English\" --theme dark\n```\n\n#### Achievement CLI commands\n\nUseful during development to inspect or reset the achievement database without launching the full GUI:\n\n```bash\npython main.py status                    # Print all achievement states\npython main.py reset <achievement_id>    # Reset a specific achievement\npython main.py unlock <achievement_id>   # Manually unlock an achievement\npython main.py reset-all                 # Wipe all progress (prompts confirmation)\npython main.py help                      # Show CLI usage\n```\n\n> These commands print to stdout and are only usable when running from source (`python main.py`). The compiled `.exe` does not expose a console window, so this output would not be visible.\n\n---\n\n### Building the Exe\n\nThe project uses **PyInstaller** + **UPX** for compression. Build scripts are PowerShell-based.\n\n#### 1. Install build tools\n\n```powershell\npip install pyinstaller\nwinget install UPX.UPX   # or download manually from upx.github.io\n```\n\n#### 2. Build the main application\n\n```powershell\n.\\build.ps1\n```\n\nThis runs PyInstaller with `build.spec` and produces a `dist/File Converter Pro/` onedir output.\n\n#### 3. Build the Quick Check utility\n\n```powershell\n.\\build_quick_check.ps1\n```\n\n#### 4. Package everything into an installer\n\n```powershell\n.\\build_installer.ps1\n```\n\nThis calls **Inno Setup** with `setup.iss` and produces `Output/FileConverterPro_Setup_v1.0.2.exe`.\n\n> Make sure **Inno Setup** is installed and on your PATH before running step 4. Download it at [jrsoftware.org/isinfo.php](https://jrsoftware.org/isinfo.php).\n\n#### Full pipeline at once\n\n```powershell\n.\\build_all.ps1\n```\n\n---\n\n### Project Structure\n\n```\nFile Converter Pro/\nв”Ӯ\nв”ңв”Җв”Җ main.py                       # Entry point вҖ” splash, single instance, CLI, drag & drop\nв”ңв”Җв”Җ config.py                     # Encrypted config manager, Windows dark mode detection\nв”ңв”Җв”Җ translations.py               # i18n engine (FR/EN built-in + .lang file support)\nв”ңв”Җв”Җ conversion_worker.py          # Background QThread conversion worker\nв”ңв”Җв”Җ advanced_conversions.py       # Extra conversion routines\nв”ңв”Җв”Җ dashboard.py                  # Statistics dashboard (Matplotlib animated charts)\nв”ңв”Җв”Җ database.py                   # SQLite abstraction layer\nв”ңв”Җв”Җ donate.py                     # Donation dialog вҖ” kofi, animated UI, donor flag\nв”ңв”Җв”Җ history.py                    # Conversion history panel\nв”ңв”Җв”Җ widgets.py                    # Shared custom Qt widgets (AnimatedCheckBox, etc.)\nв”ңв”Җв”Җ special_events_manager.py     # Date-aware special events (birthday, new yearвҖҰ)\nв”ңв”Җв”Җ system_notifier.py            # Native Windows desktop notifications\nв”ңв”Җв”Җ quick_check.py                # Companion build-verifica
