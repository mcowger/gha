tion tool (Tkinter)\nв”Ӯ\nв”ңв”Җв”Җ app/\nв”Ӯ   в”ңв”Җв”Җ __init__.py               # FadingMainWindow, FileConverterApp\nв”Ӯ   в”ңв”Җв”Җ ui.py                     # AppUIMixin вҖ” all UI construction\nв”Ӯ   в””в”Җв”Җ logic.py                  # AppLogicMixin вҖ” all business logic\nв”Ӯ\nв”ңв”Җв”Җ converter/\nв”Ӯ   в”ңв”Җв”Җ converters.py             # AdvancedConverterEngine вҖ” all format pipelines\nв”Ӯ   в””в”Җв”Җ advanced_db.py            # SQLite DB for conversion stats\nв”Ӯ\nв”ңв”Җв”Җ achievements/\nв”Ӯ   в”ңв”Җв”Җ achievements_system.py    # Achievement definitions and unlock logic\nв”Ӯ   в”ңв”Җв”Җ achievements_manager.py   # Persistence and state management\nв”Ӯ   в”ңв”Җв”Җ achievements_ui.py        # Full achievements panel UI\nв”Ӯ   в”ңв”Җв”Җ achievements_popup.py     # Animated real-time unlock pop-up\nв”Ӯ   в””в”Җв”Җ rank_popup.py             # Rank-up celebration dialog\nв”Ӯ\nв”ңв”Җв”Җ dialogs/\nв”Ӯ   в”ңв”Җв”Җ dialogs.py                # General-purpose dialogs\nв”Ӯ   в”ңв”Җв”Җ terms_dialog.py           # Terms & Privacy acceptance dialog\nв”Ӯ   в””в”Җв”Җ word_to_pdf_dialog.py     # Word вҶ’ PDF options dialog (mode, quality, metadata)\nв”Ӯ\nв””в”Җв”Җ templates/\n    в”ңв”Җв”Җ templates.py              # Conversion template definitions\n    в””в”Җв”Җ template_manager.py       # Save / load / apply templates\n```\n\n**Main window inheritance chain:**\n\n```\nQMainWindow\n  в””в”Җв”Җ AppLogicMixin        (app/logic.py)\n        в””в”Җв”Җ AppUIMixin           (app/ui.py)\n              в””в”Җв”Җ FileConverterApp\n                    в””в”Җв”Җ FadingMainWindow    вҶҗ what gets instantiated at runtime\n```\n\n---\n\n## рҹҢҗ Internationalization\n\nFile Converter Pro ships with built-in **French** and **English**.\n\nAnyone can add a new language without touching the source code. Create a `.lang` file (UTF-8 JSON) and place it in the `languages/` folder next to the executable вҖ” it will be detected and listed in Settings automatically on next launch.\n\n**`.lang` file format:**\n\n```json\n{\n  \"meta\": {\n    \"code\":        \"EN\",\n    \"name\":        \"English\",\n    \"author\":      \"Your Name\",\n    \"version\":     \"1.0\",\n    \"created\":     \"2026-02-06\",\n    \"description\": \"English translation\"\n  },\n  \"strings\": {\n    \"ParamГЁtres\": \"Settings\",\n    \"Fermer\": \"Close\",\n    \"Gestion des Fichiers\": \"File Management\",\n  }\n}\n```\n\nYou can also force a language from the command line *(development only)* :\n\n```\nmain.py --lang de\nmain.py --lang en-revisited\nmain.py --lang \"my custom language\"\n```\n\n---\n\n## вҡ пёҸ Known Limitations\n\n| Area | Details |\n|------|---------|\n| **Windows only** | Word/Excel/PowerPoint COM automation, registry-based dark mode detection, and PyInstaller packaging are all Windows-first. macOS / Linux are not currently supported. (will come later) |\n| **Build size** | ~435 MB compiled вҖ” inherent to Python + PySide6 + Matplotlib + pdf2docx and other libraries |\n| **PDF вҶ’ DOCX quality** | Depends on the source PDF. Scanned PDFs with no embedded text layer are only partially recoverable without an OCR tool. |\n| **`.ppt` legacy format** | Requires Microsoft Office or LibreOffice. python-pptx cannot open old binary `.ppt` files natively. |\n| **Donation Thank-You** | The thank-you dialog requires a relaunch after donating. If the app is never relaunched, the flag remains pending. |\n| **No cloud / sync** | History, settings, and achievements are stored locally only вҖ” no backup, no multi-device profiles. |\n| **Manual distribution** | Not on the Microsoft Store. Distributed via GitHub or Itch.io. |\n| **Solo development** | Progression on the application depends on availability outside of studies. |\n\n---\n\n## рҹҶҡ How It Compares\n\nThere are plenty of ways to convert files. Here's where File Converter Pro fits in:\n\n| | File Converter Pro | CloudConvert / Zamzar | HandBrake | Format Factory | PDF24 | XnConvert |\n|---|---|---|---|---|---|---|\n| **Offline / no upload** | вң… | вқҢ Files uploaded | вң… | вң… | вң… | вң… |\n| **Documents** | вң… | вң… | вқҢ | вқҢ | вҡ пёҸ PDF only | вқҢ |\n| **Images** | вң… | вң… | вқҢ | вң… | вқҢ | вң… |\n| **Audio** | вң… | вң… | вқҢ | вң… | вқҢ | вқҢ |\n| **Video** | вң… | вң… | вң… | вң… | вқҢ | вқҢ |\n| **Free, no limits** | вң… | вҡ пёҸ 25/day free tier | вң… | вң… | вң… | вң… |\n| **Themed UI (dark/light)** | вң… | N/A | вқҢ | вқҢ | вқҢ | вқҢ |\n| **Conversion history & stats** | вң… | вқҢ | вқҢ | вқҢ | вқҢ | вқҢ |\n| **Multi-engine fallback** | вң… | N/A | N/A | N/A | N/A | N/A |\n\n> Online tools like CloudConvert and Zamzar are excellent for occasional use, but they require uploading files to external servers and often impose daily limits on free plans. File Converter Pro is designed for users who convert files frequently and prioritize speed, privacy, and local processing.\n\n**NOTE:** These comparisons are intended to highlight different use cases rather than criticize other tools; the best choice simply depends on your specific needs.\n\n---\n\n## рҹ—әпёҸ Roadmap\n\nSee [ROADMAP.md](ROADMAP.md) for the full list of planned features and future directions.\n\n**Highlights:**\n- User profiles вҖ” multiple independent profiles on the same machine\n- Extended system notifications вҖ” covering long-running batch conversions\n- Watch folder вҖ” auto-convert anything dropped into a monitored folder\n- Batch scheduling вҖ” run conversions at a set time or on a recurring schedule\n- Dashboard upgrades вҖ” period comparison, achievement timeline, PDF export\n- Plugin system вҖ” add custom converters via external Python scripts\n- Local REST API вҖ” integrate conversions into scripts and automation workflows\n- Automated test suite вҖ” regression coverage for all conversion engines\n\n---\n\n## рҹ’ҷ Support the Project\n\nFile Converter Pro is and will remain **completely free**. If it saves you time, a voluntary donation is always appreciated and helps fund continued development.\n\n<div align=\"center\">\n\n[![Support me on Ko-fi](https://img.shields.io/badge/Support-Ko--fi-FF5E5B?style=for-the-badge&logo=ko-fi&logoColor=white)](https://ko-fi.com/hyacinthe_primus/goal?g=0)\n\n\n</div>\n\nThe donation dialog is also accessible anytime from **Left Tab вҶ’ Support the project** inside the app itself.\n\n---\n\n## рҹӨқ Contributing\n\nThe project is being prepared for open-sourcing. All source comments and docstrings have been translated from French to English for this purpose.\n\n**Translations** are the easiest way to contribute right now вҖ” follow the `.lang` format above, open an issue, and attach your file or submit a pull request.\n\nFor **bug reports**, please include:\n- Your Windows version\n- The input and output format you were trying to convert\n- Any error message or unexpected behavior\n- Whether Microsoft Office, LibreOffice, Pandoc, or MiKTeX are installed on your machine\n\n***Report here:*** [Signal a Bug or Malfunction](mailto:hyacintheatho91@gmail.com)\n\n---\n\n## рҹҷҸ Credits\n\nFile Converter Pro was designed, built, and maintained by **Hyacinthe** (Prime Enterprises).\n\n### Open-Source Libraries\n\nThis project is made possible by the following open-source projects:\n\n| Library | Use |\n|---------|-----|\n| [PySide6 / Qt](https://www.qt.io/) | UI framework |\n| [FFmpeg](https://ffmpeg.org/) | Audio & video conversion |\n| [pdf2docx](https://github.com/ArtifexSoftware/pdf2docx) | PDF вҶ’ DOCX conversion |\n| [PyMuPDF](https://github.com/pymupdf/PyMuPDF) | PDF rendering & HTML export |\n| [ReportLab](https://www.reportlab.com/) | Native PDF generation |\n| [pypandoc](https://github.com/JessicaTegner/pypandoc) | Pandoc bridge |\n| [MiKTeX](https://miktex.org/) | LaTeX PDF rendering via Pandoc |\n| [python-docx](https://github.com/python-openxml/python-docx) | DOCX generation |\n| [python-pptx](https://github.com/scanny/python-pptx) | PPTX rendering |\n| [openpyxl](https://openpyxl.readthedocs.io/) | XLSX reading |\n| [Pillow](https://python-pillow.org/) | Image processing |\n| [Matplotlib](https://matplotlib.org/) | Statistics charts |\n| [cryptography](https://cryptography.io/) | Encrypted settings |\n| [PyInstaller](https://pyinstaller.org/) | Windows executable packaging |\n| [Inno Setup](https://jrsoftware.org/isinfo.php) | Installer creation |\n| [UPX](https://upx.github.io/) | Executable compression |\n\n### Special Thanks\n\nA huge thanks to everyone who has supported the project whether by testing the app, reporting bugs, contributing translations, sharing the link, or **starring this repository**. Your support makes a real difference!\n\n---\n\n## рҹ”§ Modifications & Contributions\n\nThis project is **Open Source**. You are free to **fork, modify, and adapt** the code for your own projects, provided that you comply with the terms of the GPLv3 License.\n\nIf you use or adapt this project, please include:\n- A link to the original repository: [github.com/Hyacinthe-primus/File_Converter_Pro](https://github.com/Hyacinthe-primus/File_Converter_Pro)\n\n> [!TIP]\n> While the GPLv3 allows for many uses, keeping your modifications open-source is a requirement. For any inquiries regarding use cases not covered by this license, feel free to reach out.\n\n> [!IMPORTANT]\n> **Dual Licensing:** This project is available under the GPLv3 for open-source use.\n> For integration into proprietary or commercial products without sharing your code, a separate commercial license\n> is available. Read it down in LICENSE section.\n\n---\n\n## рҹ“Ӣ Legal\n\nTo ensure transparency and privacy, please review our legal documents:\n\n* [Privacy Policy](legal/privacy_policy_en.html)\n* [Terms of Use](legal/terms_conditions_en.html)\n\n---\n\n## рҹ“„ License\n\nThis project uses a **dual licensing model**:\n\n- **Open-Source (GPLv3):** Free to use, modify, and distribute under the terms of the GNU General Public License v3. Full license terms is also available here:\n\n  * [`LICENSE.txt`](LICENSE/LICENSE.txt)\n\n- **Commercial License:** For integration into proprietary or closed-source products, a separate commercial license is required. Please contact the author for explicit permission: read more here: [Commercial license](COMMERCIAL_LICENSE.md)\n\nВ© 2026 Prime Enterprises (Hyacinthe). All rights reserved.\n\n---\n\n<div align=\"center\">\n<sub>Built by Hyacinthe <em>because file conversion should actually feel good.</em></sub>\n</div>\n","summary":"File ConverterвҖҜPro is a free, offline Windows desktop application that lets users batchвҖ‘convert documents, images, audio and video without relying on the web. Built with PythonвҖҜ3.11/3.13 and PySide6, the lightweight executable (вүҲ250вҖҜMB) runs smoothly on a clean system and offers an animated, themeвҖ‘aware UI, a dashboard powered by Matplotlib that tracks conversion history, and support for multiple languages. Its polished experience, zero telemetry and complete offline functionality make it ideal for privacyвҖ‘conscious Windows users, power users, and developers looking to embed or extend a robust conversion tool.","description":"Free offline all-in-one file converter for Windows. Converts documents, images, audio and video locally. No uploads, no internet, no dependencies. Built with Python & PySide6. Features dark/light theme, stats dashboard, achievements, and multi-engine fallback.","stars":308,"language":"Python"},{"owner":"lucasastorian","repo":"llmwiki","url":"https://github.com/lucasastorian/llmwiki","readme":"# LLM Wiki\n\n[![Live Demo](https://img.shields.io/badge/demo-llmwiki.app-blue)](https://llmwiki.app)\n[![License](https://img.shields.io/badge/license-Apache%202.0-green)](https://opensource.org/licenses/Apache-2.0)\n\nFree, open-source implementation of [Karpathy's LLM Wiki](https://x.com/karpathy/status/2039805659525644595) ([spec](https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f)). Available at [llmwiki.app](https://llmwiki.app).\n\n1. **Upload sources** вҖ” PDFs, articles, notes, office docs. Review them in a full document viewer.\n2. **Connect Claude** вҖ” via MCP. It reads your sources, writes wiki pages, maintains cross-references and citations.\n3. **The wiki compounds** вҖ” every source you add and every question you ask makes it richer. Knowledge is built up, not re-derived.\n\n![LLM Wiki вҖ” a compiled wiki page with citations and table of contents](wiki-page.png)\n\n### Three Layers\n\n| Layer | Description |\n|-------|-------------|\n| **Raw Sources** | PDFs, articles, notes, transcripts. Your immutable source of truth. The LLM reads them but never modifies them. |\n| **The Wiki** | LLM-generated markdown pages вҖ” summaries, entity pages, cross-references, mermaid diagrams, tables. The LLM owns this layer. You read it; the LLM writes it. |\n| **The Tools** | Search, read, and write. Claude connects via MCP and orchestrates the rest. |\n\n### Core Operations\n\nLLM Wiki ships an **MCP server** that Claude.ai connects to directly. Once connected, Claude has tools to search, read, write, and delete across your entire knowledge vault. All operations below happen through Claude вҖ” you talk to it, it maintains the wiki.\n\n**Ingest** вҖ” Drop a source in. Claude reads it, writes a summary, updates entity and concept pages across the wiki, and flags anything that contradicts existing knowledge. A single source might touch 10-15 wiki pages.\n\n**Query** вҖ” Ask complex questions against the compiled wiki. Knowledge is already synthesized вҖ” not re-derived from raw chunks each time. Good answers get filed back as new pages, so your explorations compound.\n\n**Lint** вҖ” Run health checks. Find inconsistent data, stale claims, orphan pages, missing cross-references. Claude suggests new questions to investigate and new sources to look for.\n\n---\n\n## Architecture\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ     в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ     в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ   Next.js   в”Ӯв”Җв”Җв”Җв”Җв–¶в”Ӯ   FastAPI   в”Ӯв”Җв”Җв”Җв”Җв–¶в”Ӯ  Supabase   в”Ӯ\nв”Ӯ   Frontend  в”Ӯ     в”Ӯ   Backend   в”Ӯ     в”Ӯ  (Postgres) в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ     в””в”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”ҳ     в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n                           в”Ӯ\n                    в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n                    в”Ӯ  MCP Server в”Ӯв—Җв”Җв”Җв”Җв”Җ Claude\n                    в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n| Component | Stack | Responsibilities |\n|-----------|-------|------------------|\n| **Web** (`web/`) | Next.js 16, React 19, Tailwind, Radix UI | Dashboard, PDF/HTML viewer, wiki renderer, onboarding |\n| **API** (`api/`) | FastAPI, asyncpg, aioboto3 | Auth, uploads (TUS), document processing, OCR (Mistral) |\n| **Converter** (`converter/`) | FastAPI, LibreOffice | Isolated office-to-PDF conversion (non-root, zero AWS creds) |\n| **MCP** (`mcp/`) | MCP SDK, Supabase OAuth | Tools for Claude: `guide`, `search`, `read`, `write`, `delete` |\n| **Database** | Supabase (Postgres + RLS + PGroonga) | Documents, chunks, knowledge bases, users |\n| **Storage** | S3-compatible | Raw uploads, tagged HTML, extracted images |\n\n---\n\n## MCP Tools\n\nOnce connected, Claude has full access to your knowledge vault:\n\n| Tool | Description |\n|------|-------------|\n| `guide` | Explains how the wiki works and lists available knowledge bases |\n| `search` | Browse files (`list`) or keyword search with PGroonga ranking (`search`) |\n| `read` | Read documents вҖ” PDFs with page ranges, inline images, glob batch reads |\n| `write` | Create wiki pages, edit with `str_replace`, append. SVG and CSV asset support |\n| `delete` | Archive documents by path or glob pattern |\n\n---\n\n## Getting Started\n\nThe fastest way to try LLM Wiki:\n\n1. **Sign up** at [llmwiki.app](https://llmwiki.app) and create a knowledge base\n2. **Upload sources** вҖ” drop in PDFs, notes, articles\n3. **Connect Claude** вҖ” go to Settings, copy the MCP config, add it as a connector in Claude.ai\n4. **Start building** вҖ” tell Claude to read your sources and compile the wiki\n\nThat's it. No local setup required.\n\n### Self-Hosting\n\n#### Prerequisites\n\n- Python 3.11+\n- Node.js 20+\n- A [Supabase](https://supabase.com) project (or local Docker setup)\n- An S3-compatible bucket (needed for file uploads)\n\n#### 1. Database\n\n```bash\npsql $DATABASE_URL -f supabase/migrations/001_initial.sql\n```\n\nOr use local Docker: `docker compose up -d`\n\n#### 2. API\n\n```bash\ncd api\npython -m venv .venv && source .venv/bin/activate\npip install -r requirements.txt\ncp ../.env.example .env  # edit with your credentials\nuvicorn main:app --reload --port 8000\n```\n\n#### 3. MCP Server\n\n```bash\ncd mcp\npython -m venv .venv && source .venv/bin/activate\npip install -r requirements.txt\nuvicorn server:app --reload --port 8080\n```\n\n#### 4. Web\n\n```bash\ncd web\nnpm install\ncp .env.example .env.local\nnpm run dev\n```\n\n#### 5. Connect Claude\n\n1. Open **Settings** > **Connectors** in Claude\n2. Add a custom connector pointing to `http://localhost:8080/mcp`\n3. Sign in with your Supabase account when prompted\n\n#### Environment Variables\n\n**API** (`api/.env`)\n\n```\nDATABASE_URL=postgresql://...\nSUPABASE_URL=https://your-ref.supabase.co\nSUPABASE_JWT_SECRET=          # optional, for legacy HS256 projects\nMISTRAL_API_KEY=              # for PDF OCR\nAWS_ACCESS_KEY_ID=\nAWS_SECRET_ACCESS_KEY=\nAWS_REGION=us-east-1\nS3_BUCKET=your-bucket\nAPP_URL=http://localhost:3000\nCONVERTER_URL=               # optional, URL of isolated converter service\n```\n\n**Web** (`web/.env.local`)\n\n```\nNEXT_PUBLIC_SUPABASE_URL=https://your-ref.supabase.co\nNEXT_PUBLIC_SUPABASE_ANON_KEY=your-anon-key\nNEXT_PUBLIC_API_URL=http://localhost:8000\nNEXT_PUBLIC_MCP_URL=http://localhost:8080/mcp\n```\n\n---\n\n## Why This Works\n\nThe tedious part of maintaining a knowledge base is not the reading or the thinking вҖ” it's the bookkeeping. Updating cross-references, keeping summaries current, noting when new data contradicts old claims, maintaining consistency across dozens of pages.\n\nHumans abandon personal wikis because the maintenance burden grows faster than the value. LLMs don't get bored, don't forget to update a cross-reference, and can touch 15 files in one pass. The wiki stays maintained because the cost of maintenance drops to near zero.\n\nThe human's job is to curate sources, direct the analysis, ask good questions, and think about what it all means. The LLM's job is everything else.\n\n## License\n\nApache 2.0\n","summary":"LLM Wiki turns your PDFs, notes, and other documents into a continuouslyвҖ‘expanding, LLMвҖ‘generated markdown wiki powered by Claude via MCP.  After uploading raw sources, the system automatically reads them, writes summaries, entity pages, diagrams, and citations, and keeps the wiki growing as you add more material or ask questions.  ClaudeвҖҷs tools let you search, read, write, delete, and lint the entire knowledge vault through a conversational interface, ensuring consistency and encouraging iterative exploration.  It is designed for researchers, knowledgeвҖ‘base builders, and developers who need an openвҖ‘source, machineвҖ‘augmented way to synthesize and maintain a richly interconnected information repository.","description":"Open Source Implementation of Karpathy's LLM Wiki. Upload documents, connect your Claude account via MCP, and have it write your wiki ! ","stars":554,"language":"TypeScript"},{"owner":"ximinng","repo":"HiVG","url":"https://github.com/ximinng/HiVG","readme":"<h1>HiVG: Hierarchical SVG Tokenization</h1>\n\n<p align=\"center\">\n  <a href=\"https://hy-hivg.github.io/\"><img src=\"https://img.shields.io/badge/Project-Page-blue?style=for-the-badge&logo=googlechrome&logoColor=white\" alt=\"Project Page\"></a>\n  <a href=\"https://arxiv.org/abs/2604.05072\"><img src=\"https://img.shields.io/badge/arXiv-2604.05072-B31B1B?style=for-the-badge&logo=arxiv&logoColor=white\" alt=\"arXiv\"></a>\n  <a href=\"https://huggingface.co/papers/date/2026-04-15\"><img src=\"https://img.shields.io/badge/%F0%9F%A4%97%20Daily%20Papers-Featured-ff9d00?style=for-the-badge\" alt=\"HuggingFace Daily Papers\"></a>\n  <a href=\"https://github.com/ximinng/HiVG/blob/main/LICENSE\"><img src=\"https://img.shields.io/badge/License-MIT-green?style=for-the-badge\" alt=\"License\"></a>\n  <a href=\"https://huggingface.co/xingxm/HiVG-3B-Base\"><img src=\"https://img.shields.io/badge/%F0%9F%A4%97%20HuggingFace-Models-yellow?style=for-the-badge\" alt=\"HuggingFace Models\"></a>\n</p>\n\nThis repository contains the official implementation of the paper \"Hierarchical SVG Tokenization: Learning Compact Visual Programs for Scalable Vector Graphics Modeling\".\n\n<p align=\"center\">\n  <img src=\"assets/HiVG_tokenizer.gif\" width=\"100%\" alt=\"HiVG Tokenizer\">\n</p>\n\n## Highlights\n\n- **Small Model, Frontier Results** &mdash; 3B parameters that beat 7/7 proprietary models including GPT-5 and Gemini 2.5 on image-to-SVG.\n- **Efficient SVG Token Compression** &mdash; Hierarchical tokenization (Raw SVG &rarr; Atomic tokens &rarr; Segment tokens) with 2.76x sequence compression.\n- **High-Fidelity Image-to-SVG** &mdash; Convert any image into a clean, editable SVG &mdash; structure, layout, and detail faithfully preserved.\n\n## Table of Contents\n\n- [Installation](#installation)\n- [Quick Start](#quick-start)\n- [Model Weights](#model-weights)\n- [Evaluation](#evaluation)\n- [Segment Token Training](#segment-token-training)\n- [Generation Parameters](#generation-parameters)\n- [Citation](#citation)\n\n## Installation\n\n```bash\ngit clone https://github.com/ximinng/HiVG.git\ncd HiVG\npip install -e .\n```\n\n## Quick Start\n\n### Python API\n\n```python\nfrom hivg_infer import HiSVGInferencePipeline\n\npipeline = HiSVGInferencePipeline(\n    model_path=\"/path/to/model\",\n    coord_range=234,\n    temperature=0.7,\n    top_p=0.9,\n    max_new_tokens=4096,\n)\n\n# Image-to-SVG\nresult = pipeline.img2svg(\"assets/cases/w2.png\")\nif result[\"success\"]:\n    print(result[\"svg\"])\n\n# Text-to-SVG\nresult = pipeline.text2svg(\"The image features a simple, flat-style briefcase with a handle and a central plus symbol. The briefcase is outlined in black with a light teal plus sign, suggesting medical or emergency services. Small decorative dots surround the briefcase, enhancing its minimalistic design.\")\n\nif result[\"success\"]:\n    with open(\"output.svg\", \"w\") as f:\n        f.write(result[\"svg\"])\n```\n\n### Command Line\n\n```bash\n# Text-to-SVG\npython -m hivg_infer.cli --model_path /path/to/model \\\n    --prompt \"A minimalist black phone icon with an outline style\"\n\n# Image-to-SVG\npython -m hivg_infer.cli --model_path /path/to/model \\\n    --image photo.png\n\n# Batch inference\npython -m hivg_infer.cli --model_path /path/to/model \\\n    --dataset test.json --output_dir ./outputs\n\n# Interactive mode\npython -m hivg_infer.cli --model_path /path/to/model --interactive\n```\n\n## Model Weights\n\n| Model | Description | Download |\n|:---|:---|:---:|\n| HiVG-3B-Base | Base model with hierarchical SVG tokenization | [рҹӨ— HuggingFace](https://huggingface.co/xingxm/HiVG-3B-Base) |\n| HiVG-3B-Instruct | Instruction-tuned model for SVG generation | Coming Soon |\n| HiVG-3B-DwT | Draw-with-Thought fine-tuned model | Coming Soon |\n| HiVG-3B-DwT-RL | DwT model with RL | Coming Soon |\n\n## Evaluation\n\n<details open>\n<summary><b>Batch Inference</b></summary>\n\n```bash\n# HuggingFace backend\npython -m hivg_metric.eval \\\n    --model_path /path/to/model \\\n    --dataset test.json \\\n    --format alpaca \\\n    --coord_range 234 \\\n    --save_name results.jsonl \\\n    --save_svg_dir ./svgs/\n\n# vLLM backend (faster)\npython -m hivg_metric.eval \\\n    --model_path /path/to/model \\\n    --dataset test.json \\\n    --infer_backend vllm \\\n    --batch_size 32 \\\n    --save_name results.jsonl\n```\n\n</details>\n\n<details>\n<summary><b>Compute Metrics</b></summary>\n\n```bash\n# Text-to-SVG: CLIP score + preference metrics\npython -m hivg_metric.compute_metrics \\\n    --input results.jsonl \\\n    --task_type text2svg \\\n    --metrics basic,clip,preference \\\n    --output metrics.json\n\n# Image-to-SVG: visual similarity metrics\npython -m hivg_metric.compute_metrics \\\n    --input results.jsonl \\\n    --task_type img2svg \\\n    --image_base_dir /path/to/images \\\n    --metrics basic,visual \\\n    --output metrics.json\n```\n\n</details>\n\n<details>\n<summary><b>Visualize Results</b></summary>\n\n```bash\npython -m hivg_metric.visualize \\\n    --input results.jsonl \\\n    --output report.html \\\n    --title \"HiVG Evaluation Report\"\n```\n\nGenerates an interactive HTML report with side-by-side input / prediction / ground-truth columns.\n\n</details>\n\n### Supported Metrics\n\n| Metric Group | img2svg | text2svg | Description |\n|:---|:---:|:---:|:---|\n| `basic` | вң“ | вң“ | Success rate, SVG length, path count |\n| `visual` | вң“ | &mdash; | SSIM, LPIPS, PSNR vs. input image |\n| `clip` | &mdash; | вң“ | CLIP score (text-image alignment) |\n| `preference` | вң“ | вң“ | PickScore, ImageReward, HPS, Aesthetic |\n| `diversity` | &mdash; | вң“ | DINOv2 / CLIP diversity (N > 1 samples) |\n\n## Segment Token Training\n\nHiVG's key innovation is learning **structure segment tokens** that compress SVG command sequences. See the full guide:\n\n> **[Segment Token Training Guide](docs/segment_training.md)** &mdash; Step-by-step instructions for training BPE segments from your own SVG corpus and converting datasets.\n\nQuick overview of the three-level tokenization:\n\n```\nLevel 0 (Raw SVG)    path d=\"M 100 200 c -5 0 -10 5 -10 10\"\n                                    вҶ“\nLevel 1 (Atomic)     <cmd_M><P_100><P_200><cmd_c><d_-5><d_0><d_-10><d_5><d_-10><d_10>\n                                    вҶ“\nLevel 2 (Segment)    <cmd_M><P_100><P_200><SEG_42>\n```\n\n## Generation Parameters\n\n| Parameter | Default | Description |\n|:---|:---:|:---|\n| `coord_range` | 234 | Canvas coordinate range (224 canvas + margin) |\n| `temperature` | 0.7 | Sampling temperature |\n| `top_p` | 0.9 | Nucleus sampling threshold |\n| `top_k` | 50 | Top-k sampling |\n| `max_new_tokens` | 4096 | Maximum output length |\n| `repetition_penalty` | 1.0 | Repetition penalty |\n\n## Dataset Format\n\n<details>\n<summary><b>Alpaca (text2svg)</b></summary>\n\n```json\n[\n  {\"instruction\": \"Draw a red circle\", \"input\": \"\", \"output\": \"<svg tokens>\"}\n]\n```\n\n</details>\n\n<details>\n<summary><b>ShareGPT (img2svg)</b></summary>\n\n```json\n[\n  {\n    \"messages\": [{\"role\": \"user\", \"content\": \"<image>Convert to SVG\"}],\n    \"images\": [\"path/to/image.png\"],\n    \"label\": \"<svg tokens>\"\n  }\n]\n```\n\n</details>\n\n## License\n\nThis project is licensed under the [MIT License](LICENSE).\n\n## Citation\n\nIf you find HiVG useful in your research, please consider citing:\n\n```bibtex\n@article{xing2026hivg,\n    title={Hierarchical SVG Tokenization: Learning Compact Visual Programs for Scalable Vector Graphics Modeling},\n    author={Xing, Ximing and Xue, Ziteng and Li, Zhenxi and Liang, Weicong and Wang, Linqing and Yang, Zhantao and Hang, Tiankai and Yin, Zijin and Lu, Qinglin and Wang, Chunyu and Yu, Qian},\n    journal={arXiv preprint arXiv:2604.05072},\n    year={2026}\n}\n```\n","summary":"HiVG implements a compact, hierarchyвҖ‘aware tokenizer that converts images and textual descriptions into clean, editable SVG programs, enabling highвҖ‘fidelity vector graphics generation with only 3вҖҜB parameters. It achieves stateвҖ‘ofвҖ‘theвҖ‘art performance by compressing raw SVG data into atomic and segment tokens, which speeds inference and reduces sequence length by 2.76Г— while outperforming larger proprietary models on imageвҖ‘toвҖ‘SVG benchmarks. The project offers an easy-toвҖ‘use Python API, a commandвҖ‘line interface, and pretrained Hugging Face weights, making it ideal for designers, illustrators, and AI researchers who need efficient, scalable vectorвҖ‘graphic generation or transformation.","description":"Hierarchical SVG Tokenization: Learning Compact Visual Programs for Scalable Vector Graphics Modeling","stars":301,"language":"Python"},{"owner":"AgriciDaniel","repo":"claude-obsidian","url":"https://github.com/AgriciDaniel/claude-obsidian","readme":"\n# claude-obsidian\n\n<p align=\"center\">\n  <img src=\"wiki/meta/claude-obsidian-gif-cover-16x9.gif\" alt=\"claude-obsidian\" width=\"100%\" />\n</p>\n\n[![GitHub stars](https://img.shields.io/github/stars/AgriciDaniel/claude-obsidian?style=flat&color=e8734a)](https://github.com/AgriciDaniel/claude-obsidian/stargazers)\n[![License: MIT](https://img.shields.io/badge/License-MIT-blue.svg)](LICENSE)\n[![Claude Code](https://img.shields.io/badge/Claude_Code-plugin-8B5CF6)](https://code.claude.com/docs/en/discover-plugins)\n[![Blog Post](https://img.shields.io/badge/Deep_Dive-Blog_Post-22c55e)](https://agricidaniel.com/blog/claude-obsidian-ai-second-brain)\n\nClaude + Obsidian knowledge companion. A running notetaker that builds and maintains a persistent, compounding wiki vault. Every source you add gets integrated. Every question you ask pulls from everything that has been read. Knowledge compounds like interest.\n\nBased on [Andrej Karpathy's LLM Wiki pattern](https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f). **10 skills. Zero manual filing. Multi-agent support.**\n\n---\n\n## What It Does\n### [Youtube Demo](https://www.youtube.com/watch?v=a2hgayvr-H4)\n<p align=\"center\">\n  <img src=\"wiki/meta/welcome-canvas.gif\" alt=\"Welcome canvas. Visual demo board\" width=\"96%\" />\n</p>\n\nYou drop sources. Claude reads them, extracts entities and concepts, updates cross-references, and files everything into a structured Obsidian vault. The wiki gets richer with every ingest.\n\nYou ask questions. Claude reads the hot cache (recent context), scans the index, drills into relevant pages, and synthesizes an answer. It cites specific wiki pages, not training data.\n\nYou lint. Claude finds orphans, dead links, stale claims, and missing cross-references. Your wiki stays healthy without manual cleanup.\n\nAt the end of every session, Claude updates a hot cache. The next session starts with full recent context, no recap needed.\n\n<p align=\"center\">\n  <img src=\"wiki/meta/image-example-graph-view.png\" alt=\"Graph view. Color-coded wiki nodes\" width=\"48%\" />\n  <img src=\"wiki/meta/image-example-wiki-map-view.png\" alt=\"Wiki Map canvas\" width=\"48%\" />\n</p>\n\n---\n\n## Why claude-obsidian?\n\nMost Obsidian AI plugins are chat interfaces - they answer questions about your existing notes. claude-obsidian is a knowledge engine - it creates, organizes, maintains, and evolves your notes autonomously.\n\n| Capability | claude-obsidian | Smart Connections | Copilot |\n|---|---|---|---|\n| **Auto-organize notes** | Creates entities, concepts, cross-references | No | No |\n| **Contradiction flagging** | `[!contradiction]` callouts with sources | No | No |\n| **Session memory** | Hot cache persists between conversations | No | No |\n| **Vault maintenance** | 8-category lint (orphans, dead links, gaps) | No | No |\n| **Autonomous research** | 3-round web research with gap-filling | No | No |\n| **Multi-model support** | Claude, Gemini, Codex, Cursor, Windsurf | Claude only | Multiple |\n| **Visual canvas** | Via [claude-canvas](https://github.com/AgriciDaniel/claude-canvas) companion | No | No |\n| **Query with citations** | Cites specific wiki pages | Cites similar notes | Cites notes |\n| **Batch ingestion** | Parallel agents for multiple sources | No | No |\n| **Open source** | MIT | MIT | Freemium |\n\n> **Deep dive:** [I Turned Obsidian Into a Self-Organizing AI Brain](https://agricidaniel.com/blog/claude-obsidian-ai-second-brain) - full breakdown with data visualizations, market context, and workflow demos.\n\n---\n\n## Quick Start\n\n### Option 1: Clone as vault (recommended: full setup in 2 minutes)\n\n```bash\ngit clone https://github.com/AgriciDaniel/claude-obsidian\ncd claude-obsidian\nbash bin/setup-vault.sh\n```\n\nOpen the folder in Obsidian: **Manage Vaults вҶ’ Open folder as vault вҶ’ select `claude-obsidian/`**\n\nOpen Claude Code in the same folder. Type `/wiki`.\n\n> `setup-vault.sh` configures `graph.json` (filter + colors), `app.json` (excludes plugin dirs), and `appearance.json` (enables CSS). Run it once before the first Obsidian open. You get the fully pre-configured graph view, color scheme, and wiki structure out of the box.\n\n---\n\n### Option 2: Install as Claude Code plugin\n\nPlugin installation is a two-step process in Claude Code. First add the marketplace catalog, then install the plugin from it.\n\n```bash\n# Step 1: add the marketplace\nclaude plugin marketplace add AgriciDaniel/claude-obsidian\n\n# Step 2: install the plugin\nclaude plugin install claude-obsidian@claude-obsidian-marketplace\n```\n\nIn any Claude Code session: `/wiki`. Claude walks you through vault setup.\n\nTo check it worked:\n```bash\nclaude plugin list\n```\n\n---\n\n### Option 3: Add to an existing vault\n\nCopy `WIKI.md` into your vault root. Paste into Claude:\n\n```\nRead WIKI.md in this project. Then:\n1. Check if Obsidian is installed. If not, install it.\n2. Check if the Local REST API plugin is running on port 27124.\n3. Configure the MCP server.\n4. Ask me ONE question: \"What is this vault for?\"\nThen scaffold the full wiki structure.\n```\n\n---\n\n## Commands\n\n| You say | Claude does |\n|---------|------------|\n| `/wiki` | Setup check, scaffold, or continue where you left off |\n| `ingest [file]` | Read source, create 8-15 wiki pages, update index and log |\n| `ingest all of these` | Batch process multiple sources, then cross-reference |\n| `what do you know about X?` | Read index > relevant pages > synthesize answer |\n| `/save` | File the current conversation as a wiki note |\n| `/save [name]` | Save with a specific title (skips the naming question) |\n| `/autoresearch [topic]` | Run the autonomous research loop: search, fetch, synthesize, file |\n| `/canvas` | Open or create the visual canvas, list zones and nodes |\n| `/canvas add image [path]` | Add an image (URL or local path) to the canvas with auto-layout |\n| `/canvas add text [content]` | Add a markdown text card to the canvas |\n| `/canvas add pdf [path]` | Add a PDF document as a rendered preview node |\n| `/canvas add note [page]` | Pin a wiki page as a linked card on the canvas |\n| `/canvas zone [name]` | Add a new labeled zone to organize visual content |\n| `/canvas from banana` | Capture recently generated images onto the canvas |\n| `lint the wiki` | Health check: orphans, dead links, gaps, suggestions |\n| `update hot cache` | Refresh hot.md with latest context summary |\n\n> **Want more?** [claude-canvas](https://github.com/AgriciDaniel/claude-canvas) adds 12 templates, 6 layout algorithms, AI image generation, presentations, and full canvas orchestration. Install both вҖ” they complement each other.\n\n---\n\n## Cross-Project Power Move\n\nPoint any Claude Code project at this vault. Add to that project's `CLAUDE.md`:\n\n```markdown\n## Wiki Knowledge Base\nPath: ~/path/to/vault\n\nWhen you need context not already in this project:\n1. Read wiki/hot.md first (recent context cache)\n2. If not enough, read wiki/index.md\n3. If you need domain details, read the relevant domain sub-index\n4. Only then drill into specific wiki pages\n\nDo NOT read the wiki for general coding questions or tasks unrelated to [domain].\n```\n\nYour executive assistant, coding projects, and content workflows all draw from the same knowledge base.\n\n---\n\n## Six Wiki Modes\n\n| Mode | Use when |\n|------|---------|\n| A: Website | Sitemap, content audit, SEO wiki |\n| B: GitHub | Codebase map, architecture wiki |\n| C: Business | Project wiki, competitive intelligence |\n| D: Personal | Second brain, goals, journal synthesis |\n| E: Research | Papers, concepts, thesis |\n| F: Book/Course | Chapter tracker, course notes |\n\nModes can be combined.\n\n---\n\n## What Gets Created\n\nA typical scaffold creates:\n- Folder structure for your chosen mode\n- `wiki/index.md`: master catalog\n- `wiki/log.md`: append-only operation log\n- `wiki/hot.md`: recent context cache\n- `wiki/overview.md`: executive summary\n- `wiki/meta/dashboard.base`: Bases dashboard (primary, native Obsidian)\n- `wiki/meta/dashboard.md`: Legacy Dataview dashboard (optional fallback)\n- `_templates/`: Obsidian Templater templates for each note type\n- `.obsidian/snippets/vault-colors.css`: color-coded file explorer\n- Vault `CLAUDE.md`: auto-loaded project instructions\n\n---\n\n## MCP Setup (Optional)\n\nMCP lets Claude read and write vault notes directly without copy-paste.\n\nOption A (REST API based):\n1. Install the Local REST API plugin in Obsidian\n2. Copy your API key\n3. Run:\n```bash\nclaude mcp add-json obsidian-vault '{\n  \"type\": \"stdio\",\n  \"command\": \"uvx\",\n  \"args\": [\"mcp-obsidian\"],\n  \"env\": {\n    \"OBSIDIAN_API_KEY\": \"your-key\",\n    \"OBSIDIAN_HOST\": \"127.0.0.1\",\n    \"OBSIDIAN_PORT\": \"27124\",\n    \"NODE_TLS_REJECT_UNAUTHORIZED\": \"0\"\n  }\n}' --scope user\n```\n\nOption B (filesystem based, no plugin needed):\n```bash\nclaude mcp add-json obsidian-vault '{\n  \"type\": \"stdio\",\n  \"command\": \"npx\",\n  \"args\": [\"-y\", \"@bitbonsai/mcpvault@latest\", \"/path/to/your/vault\"]\n}' --scope user\n```\n\n---\n\n## Plugins\n\n### Core Plugins (built into Obsidian: no install needed)\n\n| Plugin | Purpose |\n|--------|---------|\n| **Bases** | Powers `wiki/meta/dashboard.base`: native database views. Available since Obsidian v1.9.10 (August 2025). **Replaces Dataview for the primary dashboard.** |\n| **Properties** | Visual frontmatter editor |\n| **Backlinks**, **Outline**, **Graph view** | Standard navigation |\n\n### Pre-installed Community Plugins (ship with this vault)\n\nEnable in **Settings вҶ’ Community Plugins вҶ’ enable**:\n\n| Plugin | Purpose | Notes |\n|--------|---------|-------|\n| **Calendar** | Right-sidebar calendar with word count + task dots | Pre-installed |\n| **Thino** | Quick memo capture panel | Pre-installed |\n| **Excalidraw** | Freehand drawing canvas, annotate images | Pre-installed* |\n| **Banners** | Notion-style header image via `banner:` frontmatter | Pre-installed |\n\n\\* Excalidraw `main.js` (8MB) is downloaded automatically by `setup-vault.sh`. It is not tracked in git.\n\n### Also install from Community Plugins (not pre-installed)\n\n| Plugin | Purpose |\n|--------|---------|\n| **Templater** | Auto-fills frontmatter from `_templates/` |\n| **Obsidian Git** | Auto-commits vault every 15 minutes |\n| **Dataview** *(optional/legacy)* | Only needed for the legacy `wiki/meta/dashboard.md` queries. The primary dashboard now uses Bases. |\n\nAlso install the **[Obsidian Web Clipper](https://obsidian.md/clipper)** browser extension. Sends web pages to `.raw/` in one click.\n\n---\n\n## CSS Snippets (auto-enabled by setup-vault.sh)\n\nThree snippets ship with the vault and are enabled automatically:\n\n| Snippet | Effect |\n|---------|--------|\n| `vault-colors` | Color-codes `wiki/` folders by type in the file explorer (blue = concepts, green = sources, purple = entities) |\n| `ITS-Dataview-Cards` | Turns Dataview `TABLE` queries into visual card grids: use ` ```dataviewjs ` with `.cards` class |\n| `ITS-Image-Adjustments` | Fine-grained image sizing in notes: append `\\|100` to any image embed |\n\n---\n\n## Banner Plugin\n\nAdd to any wiki page frontmatter:\n\n```yaml\nbanner: \"_attachments/images/your-image.png\"\nbanner_icon: \"рҹ§ \"\n```\n\nThe page renders a full-width header image in Obsidian. Works great for hub pages and overviews.\n\n---\n\n## File Structure\n\n```\nclaude-obsidian/\nв”ңв”Җв”Җ .claude-plugin/\nв”Ӯ   в”ңв”Җв”Җ plugin.json              # manifest\nв”Ӯ   в””в”Җв”Җ marketplace.json         # distribution\nв”ңв”Җв”Җ skills/\nв”Ӯ   в”ңв”Җв”Җ wiki/                    # orchestrator + references (7 ref files)\nв”Ӯ   в”ңв”Җв”Җ wiki-ingest/             # INGEST operation\nв”Ӯ   в”ңв”Җв”Җ wiki-query/              # QUERY operation\nв”Ӯ   в”ңв”Җв”Җ wiki-lint/               # LINT operation\nв”Ӯ   в”ңв”Җв”Җ save/                    # /save: file conversations to wiki\nв”Ӯ   в”ңв”Җв”Җ autoresearch/            # /autoresearch: autonomous research loop\nв”Ӯ   в”Ӯ   в””в”Җв”Җ references/\nв”Ӯ   в”Ӯ       в””в”Җв”Җ program.md       # configurable research objectives\nв”Ӯ   в””в”Җв”Җ canvas/                  # /canvas: visual layer (images, PDFs, notes)\nв”Ӯ       в””в”Җв”Җ references/\nв”Ӯ           в””в”Җв”Җ canvas-spec.md   # Obsidian canvas JSON format reference\nв”ңв”Җв”Җ agents/\nв”Ӯ   в”ңв”Җв”Җ wiki-ingest.md           # parallel ingestion agent\nв”Ӯ   в””в”Җв”Җ wiki-lint.md             # health check agent\nв”ңв”Җв”Җ commands/\nв”Ӯ   в”ңв”Җв”Җ wiki.md                  # /wiki bootstrap command\nв”Ӯ   в”ңв”Җв”Җ save.md                  # /save command\nв”Ӯ   в”ңв”Җв”Җ autoresearch.md          # /autoresearch command\nв”Ӯ   в””в”Җв”Җ canvas.md                # /canvas visual layer command\nв”ңв”Җв”Җ hooks/\nв”Ӯ   в””в”Җв”Җ hooks.json               # SessionStart + Stop hot cache hooks\nв”ңв”Җв”Җ _templates/                  # Obsidian Templater templates\nв”ңв”Җв”Җ wiki/\nв”Ӯ   в”ңв”Җв”Җ Wiki Map.canvas          # visual hub, central graph node\nв”Ӯ   в”ңв”Җв”Җ canvases/                # welcome.canvas + main.canvas (visual demos)\nв”Ӯ   в”ңв”Җв”Җ getting-started.md       # onboarding walkthrough (inside the vault)\nв”Ӯ   в”ңв”Җв”Җ concepts/                # seeded: LLM Wiki Pattern, Hot Cache, Compounding Knowledge\nв”Ӯ   в”ңв”Җв”Җ entities/                # seeded: Andrej Karpathy\nв”Ӯ   в”ңв”Җв”Җ sources/                 # populated by your first ingest\nв”Ӯ   в””в”Җв”Җ meta/\nв”Ӯ       в”ңв”Җв”Җ dashboard.base       # Bases dashboard (primary)\nв”Ӯ       в””в”Җв”Җ dashboard.md         # Legacy Dataview dashboard (optional)\nв”ңв”Җв”Җ .raw/                        # source documents (hidden in Obsidian)\nв”ңв”Җв”Җ .obsidian/snippets/          # vault-colors.css (3-color scheme)\nв”ңв”Җв”Җ WIKI.md                      # full schema reference\nв”ңв”Җв”Җ CLAUDE.md                    # project instructions\nв””в”Җв”Җ README.md                    # this file\n```\n\n---\n\n## AutoResearch: program.md\n\nThe `/autoresearch` command is configurable. Edit `skills/autoresearch/references/program.md` to control:\n\n- What sources to prefer (academic, official docs, news)\n- Confidence scoring rules\n- Max rounds and max pages per session\n- Domain-specific constraints\n\nThe default program works for general research. Override it for your domain. A medical researcher would add \"prefer PubMed\". A business analyst would add \"focus on market data and filings\".\n\n---\n\n## Seed Vault\n\nThis repo ships with a seeded vault. Open it in Obsidian and you'll see:\n\n- `wiki/concepts/`: LLM Wiki Pattern, Hot Cache, Compounding Knowledge\n- `wiki/entities/`: Andrej Karpathy\n- `wiki/sources/`: empty until your first ingest\n- `wiki/meta/dashboard.base`: Bases dashboard (works in any Obsidian v1.9.10+)\n- `wiki/meta/dashboard.md`: Legacy Dataview dashboard (optional fallback)\n\nThe graph view will show a connected cluster of 5 pages. This is what the wiki looks like after one ingest. Add more sources and it grows from there.\n\n<p align=\"center\">\n  <img src=\"wiki/meta/wiki-graph-grow.gif\" alt=\"Knowledge graph growing\" width=\"48%\" />\n  <img src=\"wiki/meta/workflow-loop.gif\" alt=\"Workflow loop\" width=\"48%\" />\n</p>\n\n---\n\n## Companion: claude-canvas\n\nFor the visual layer, [claude-canvas](https://github.com/AgriciDaniel/claude-canvas) adds AI-orchestrated canvas creation - knowledge graphs, presentations, flowcharts, mood boards with 12 templates and 6 layout algorithms. Auto-detects claude-obsidian vaults.\n\n```bash\nclaude plugin install AgriciDaniel/claude-canvas\n```\n\n---\n\n## Community\n\n- [Blog post](https://agricidaniel.com/blog/claude-obsidian-ai-second-brain) - deep dive with competitor analysis, data charts, and workflow demos\n- [AI Marketing Hub](https://www.skool.com/ai-marketing-hub) - 2,800+ members, free community\n- [YouTube](https://www.youtube.com/@AgriciDaniel) - tutorials and demos\n- [All open-source tools](https://github.com/AgriciDaniel) - claude-seo, claude-ads, claude-blog, and more\n\n---\n\n*Based on [Andrej Karpathy's LLM Wiki pattern](https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f). Built by [Agrici Daniel](https://agricidaniel.com/about).*\n","summary":"claudeвҖ‘obsidian turns an Obsidian vault into a selfвҖ‘organizing knowledge engine powered by Claude. It ingests any source, automatically extracts entities and concepts, builds crossвҖ‘references, and persists a hot cache so each new session picks up where the last left off, all while flagging contradictions, dead links, and gaps. Users can query the vault through a chat interface that pulls from the indexed pages, cites the specific notes, and even performs autonomous web research in multiple rounds. The plugin is ideal for researchers, writers, and hobbyists who rely on Obsidian for personal knowledge management and want an AIвҖ‘driven system that continually enriches and cleanses their notes without manual upkeep.","description":"Claude + Obsidian knowledge companion. Persistent, compounding wiki vault based on Karpathy's LLM Wiki pattern. /wiki /save /autoresearch","stars":2155,"language":"Shell"},{"owner":"bitjaru","repo":"styleseed","url":"https://github.com/bitjaru/styleseed","readme":"<div align=\"center\">\n\n<br />\n\n# styleseed\n\n### The design system for Claude Code, Cursor, and vibe coding.\n\n<br />\n\n<a href=\"https://styleseed-demo.vercel.app\">\n  <img src=\"showcase/demo.gif\" width=\"640\" alt=\"StyleSeed live demo вҖ” same chat UI morphing across Toss, Raycast, and Arc brand skins\" />\n</a>\n\n<br /><br />\n\n[![в–¶ Open AI Chat Demo](https://img.shields.io/badge/в–¶_AI_Chat_Demo-Live-FF4E8B?style=for-the-badge&logoColor=white)](https://styleseed-demo.vercel.app)\n&nbsp;\n[![в–¶ Open Pricing Demo](https://img.shields.io/badge/в–¶_Pricing_Demo-Live-6C5CE7?style=for-the-badge&logoColor=white)](https://styleseed-demo.vercel.app/pricing)\n\n**One component. Three brand DNAs.** Same chat UI morphing across Toss В· Raycast В· Arc вҖ” colors, radius, motion, shadows, gradients all driven by StyleSeed tokens. No rewrites. No conditional code. Just a `data-skin` attribute.\n\n<br />\n\n![GitHub release](https://img.shields.io/github/v/release/bitjaru/styleseed?style=flat-square)\n![GitHub stars](https://img.shields.io/github/stars/bitjaru/styleseed?style=flat-square)\n![License](https://img.shields.io/github/license/bitjaru/styleseed?style=flat-square)\n\n**Other repos teach LLMs what brands look like. StyleSeed teaches LLMs how designers think.**<br />\nData vs judgment. 69 design rules that Claude Code and Cursor read automatically вҖ” so the output stops looking generated and starts looking designed.\n\n<br />\n\n[Get Started](#get-started) В· [Engine + Skins](#how-it-works-engine--skins) В· [Skills](#11-ai-powered-skills) В· [Wiki](../../wiki) В· [н•ңкөӯм–ҙ](README-KR.md)\n\n<br />\n\n</div>\n\n---\n\n## Who is this for?\n\n- You asked **Claude Code** or **Cursor** to build a dashboard and it came out amateur-looking\n- You're **vibe coding** a SaaS app and don't want to hire a designer\n- You use **shadcn/ui** but the output still feels generic\n- You want **Toss-style** refinement without reverse-engineering it yourself\n- You're building a **Claude Code skill** or **Cursor rules** setup for design\n- You ship fast with AI and need professional UI that doesn't look AI-generated\n\n## Data vs Judgment\n\nEvery \"help LLMs design better\" project solves the wrong half of the problem. They feed the model more **design data** вҖ” brand palettes, font specs, shadow tokens, component libraries. I tried that first. Dumped Toss's entire design token JSON into my prompts. The output was still generic.\n\nThen it hit me: **a junior designer with Toss's palette still ships ugly dashboards. A senior designer with only grayscale ships something refined.** The difference isn't what they have. It's what they know to do with it.\n\nDesign data is the paint. Design judgment is knowing where to put it.\n\nStyleSeed is a **design engine** вҖ” 69 visual rules, 48 components, and 11 slash commands that teach LLMs the judgment, not just the data:\n\n```\n\"The most refined black isn't #000 вҖ” it's #2A2A2A\"\n\"One accent color in the entire app. Everything else grayscale. Restraint is elegance.\"\n\"Shadows at 4% opacity. If you can see it, it's already too much.\"\n\"Numbers and units at 2:1 ratio. 48px number, 24px unit. Always.\"\n\"Never repeat the same section type twice. Alternate tall and compact for rhythm.\"\n\"Card/background separation matters more than any border.\"\n```\n\nNobody writes these down. They're baked into years of experience вҖ” invisible to outsiders, invisible to LLMs. StyleSeed writes them down, organizes them into six categories (color discipline, spatial rhythm, information hierarchy, shadow/elevation, component variance, motion/feedback), and hands them to Claude as a single markdown file it reads automatically.\n\nThe rules are **brand-agnostic** вҖ” they don't reference specific colors, only semantic tokens. Which means the same rulebook works whether your app looks like Toss, Vercel, or your client's weird purple brand. Swap the skin, the judgment carries over.\n\n<div align=\"center\">\n  <img src=\"showcase/light-hero.png\" width=\"260\" alt=\"Light mode\" />&nbsp;&nbsp;&nbsp;&nbsp;<img src=\"showcase/dark-hero.png\" width=\"260\" alt=\"Dark mode\" />\n  <br />\n  <em>Same engine, different skins. Built with Claude Code. Zero designer.</em>\n</div>\n\n<details>\n<summary><strong>See full page</strong></summary>\n<div align=\"center\">\n  <img src=\"showcase/light-full.png\" width=\"260\" alt=\"Light full\" />&nbsp;&nbsp;&nbsp;&nbsp;<img src=\"showcase/dark-full.png\" width=\"260\" alt=\"Dark full\" />\n</div>\n</details>\n\n## Get Started\n\n### Option 1: Interactive Setup (Recommended)\n\n```bash\n# Copy the engine into your project\ncp -r engine/* your-project/\n\n# Run the setup wizard\n/ss-setup\n```\n\nThe wizard walks you through:\n1. App type (SaaS, e-commerce, fintech...)\n2. Brand color or pick a skin (Toss, Stripe, Linear, Vercel, Notion...)\n3. Or fetch any brand from [awesome-design-md](https://github.com/VoltAgent/awesome-design-md) (58+ brands)\n4. Font preference\n5. Generates your first page automatically\n\n### Option 2: Manual Setup\n\n```bash\n# Copy engine (rules, components, skills)\ncp -r engine/* your-project/\n\n# Copy engine css to src/styles\ncp -r engine/css/* your-project/src/styles/\n\n# Pick a skin вҖ” copy theme.css alongside other css files\ncp skins/stripe/theme.css your-project/src/styles/theme.css\n\n# Copy components\ncp -r engine/components/* your-project/src/components/\n```\n\n### Option 3: Just give AI the URL\n\n```\nRefer to https://github.com/bitjaru/styleseed вҖ” read engine/CLAUDE.md \nand engine/DESIGN-LANGUAGE.md, then build a SaaS dashboard.\nUse skins/stripe/theme.css for the color palette.\n```\n\n### Option 4: Cursor\n\n```bash\ncp engine/.cursorrules your-project/.cursorrules\n```\n\n## How It Works: Engine + Skins\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  StyleSeed Engine (brand-agnostic)              в”Ӯ\nв”Ӯ                                                 в”Ӯ\nв”Ӯ  69 design rules В· 48 components В· 13 skills    в”Ӯ\nв”Ӯ  Layout В· Composition В· Typography В· UX В· A11y  в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n                       в”Ӯ\n              Pick a skin вҶ“\n                       в”Ӯ\n    в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n    в”Ӯ Toss в”ӮStripeв”ӮLinearв”ӮVercelв”ӮNotionв”Ӯ 58 more в”Ӯ\n    в”Ӯ      в”Ӯ      в”Ӯ      в”Ӯ      в”Ӯ      в”Ӯ(awesome)в”Ӯ\n    в””в”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n**Engine** = how your app is structured (design intelligence)\n- 69 visual design rules (layout, composition, rhythm, forbidden patterns)\n- 48 React components (32 primitives + 16 patterns)\n- 11 Claude Code skills (setup, UI, UX, accessibility)\n- Works with ANY color palette\n\n**Skin** = what your app looks like (visual identity)\n- Just a `theme.css` file with color variables\n- 5 built-in skins: Toss, Stripe, Linear, Vercel, Notion\n- 58+ more available from [awesome-design-md](https://github.com/VoltAgent/awesome-design-md)\n- Or create your own (change `--brand` and you're done)\n\n### Data vs Judgment вҖ” how StyleSeed differs from every other \"design for AI\" repo\n\nMost projects trying to fix AI-generated UI give the model more **data**. StyleSeed gives it **judgment**. They're complementary, not competing:\n\n| | Data repos (e.g. [awesome-design-md](https://github.com/VoltAgent/awesome-design-md)) | StyleSeed |\n|---|---|---|\n| **Approach** | Brand palette collection | Design judgment engine |\n| **Teaches the model** | What brands *look like* | How designers *think* |\n| **Provides** | Colors, fonts, shadow values | 69 rules + semantic tokens + executable skills |\n| **Example output** | \"Use this shade of blue\" | \"The refined black isn't #000, it's #2A2A2A\" |\n| **Brand-specific?** | Yes вҖ” rules are tied to one brand | No вҖ” rules reference semantic tokens, work with any skin |\n| **Components** | None | 48 React components |\n| **AI skills** | None | 11 slash commands (executable rules) |\n| **Scales with new brands** | Re-extract everything | Write one `theme.css`, reuse all rules |\n\n**Data repos** = paint colors.<br/>\n**StyleSeed** = the rulebook for where to put the paint.\n\nUse them together: data repos provide the skin, StyleSeed provides the brain.\n\n## Available Skins\n\n| Skin | Style | Source |\n|------|-------|--------|\n| **[toss](skins/toss/)** | Korean fintech вҖ” purple, minimal, data-focused | Original |\n| **[stripe](skins/stripe/)** | Professional вҖ” indigo, clean, multi-layer shadows | awesome-design-md |\n| **[linear](skins/linear/)** | Dark-first вҖ” violet, minimal, developer-focused | awesome-design-md |\n| **[vercel](skins/vercel/)** | Monochrome вҖ” black & white, geometric | awesome-design-md |\n| **[notion](skins/notion/)** | Warm вҖ” blue accent, friendly, warm neutrals | awesome-design-md |\n| **[58+ more](skins/_from-awesome-design-md/)** | Any brand from awesome-design-md | Auto-fetch via `/ss-setup` |\n\n## Engine Contents\n\n```\nengine/\nв”ңв”Җв”Җ CLAUDE.md                 # AI reads this automatically\nв”ңв”Җв”Җ DESIGN-LANGUAGE.md        # 69 visual design rules (brand-agnostic)\nв”ңв”Җв”Җ .claude/skills/           # 13 slash commands (/ss-*)\nв”Ӯ   в”ңв”Җв”Җ ss-setup/             #   Interactive setup wizard\nв”Ӯ   в”ңв”Җв”Җ ss-page/              #   Scaffold pages\nв”Ӯ   в”ңв”Җв”Җ ss-component/         #   Generate components\nв”Ӯ   в”ңв”Җв”Җ ss-pattern/           #   Compose layouts\nв”Ӯ   в”ңв”Җв”Җ ss-review/            #   Design compliance check\nв”Ӯ   в”ңв”Җв”Җ ss-tokens/            #   Manage tokens\nв”Ӯ   в”ңв”Җв”Җ ss-a11y/              #   Accessibility audit\nв”Ӯ   в”ңв”Җв”Җ ss-lint/              #   Quick violation scan\nв”Ӯ   в”ңв”Җв”Җ ss-update/            #   Pull latest engine\nв”Ӯ   в”ңв”Җв”Җ ss-flow/              #   Design user flows\nв”Ӯ   в”ңв”Җв”Җ ss-audit/             #   UX heuristic evaluation\nв”Ӯ   в”ңв”Җв”Җ ss-copy/              #   Generate microcopy\nв”Ӯ   в””в”Җв”Җ ss-feedback/          #   Add loading/error/empty states\nв”ңв”Җв”Җ components/\nв”Ӯ   в”ңв”Җв”Җ ui/                   # 32 primitives (shadcn/ui + motion)\nв”Ӯ   в””в”Җв”Җ patterns/             # 16 dashboard patterns\nв”ңв”Җв”Җ css/                      # base.css, fonts.css, index.css\nв”ңв”Җв”Җ tokens/                   # 6 JSON token files\nв”ңв”Җв”Җ utils/                    # Formatting utilities\nв”ңв”Җв”Җ icons/                    # Custom SVG icon library\nв””в”Җв”Җ scaffold/                 # Vite 6 + React 18 starter\n```\n\n## 13 AI-Powered Skills\n\n### Setup\n| Skill | What It Does |\n|-------|-------------|\n| `/ss-setup` | **Interactive wizard** вҖ” pick skin, brand color, font, generates first page |\n\n### UI вҖ” Build It Right\n| Skill | What It Does |\n|-------|-------------|\n| `/ss-component` | Generate components following design conventions |\n| `/ss-page` | Scaffold pages with proper layout structure |\n| `/ss-pattern` | Compose UI patterns (card grid, chart, list) |\n| `/ss-review` | Audit code for design system violations |\n| `/ss-tokens` | View, add, or modify design tokens |\n| `/ss-a11y` | Accessibility audit (WCAG 2.2 AA) |\n| `/ss-lint` | Quick automated lint вҖ” catches common violations in seconds |\n| `/ss-update` | Pull latest engine updates вҖ” analyzes your project and updates safely |\n\n### UX вҖ” Design It Right (No Designer Needed)\n| Skill | What It Does |\n|-------|-------------|\n| `/ss-flow` | Design user flows (progressive disclosure, information pyramid) |\n| `/ss-audit` | Nielsen's 10 usability heuristics evaluation |\n| `/ss-copy` | Generate UX microcopy (buttons, errors, empty states, toasts) |\n| `/ss-feedback` | Add loading/success/error/empty states to any component |\n\n### Example Workflow\n\n```bash\n/ss-setup                    # Pick skin, configure project\n/ss-page Dashboard           # Scaffold main page\n/ss-copy \"dashboard\"         # Generate all microcopy\n/ss-feedback src/Dashboard   # Add loading/error states\n/ss-audit src/Dashboard      # Check UX quality\n/ss-lint src/Dashboard       # Quick violation scan\n/ss-review src/Dashboard     # Deep design compliance check\n/ss-update                   # Pull latest engine updates\n```\n\n### Example Prompts\n\n**New project:**\n```\nRefer to https://github.com/bitjaru/styleseed вҖ” read engine/CLAUDE.md \nand engine/DESIGN-LANGUAGE.md. Use skins/stripe/theme.css for colors.\nBuild a SaaS dashboard with revenue, users, and activity.\n```\n\n**Add a page (engine already in project):**\n```\nFollow CLAUDE.md and DESIGN-LANGUAGE.md rules.\nCreate a settings page with profile, notifications, and danger zone.\nRun /ss-review when done.\n```\n\n**Improve existing page:**\n```\nRefactor src/Dashboard.tsx to follow DESIGN-LANGUAGE.md.\nCheck visual rhythm (rule 61) and KPI variation (rule 62).\n```\n\n**Update engine:**\n```\n/ss-update\n```\n\n## Example Design Rules\n\nThese are the kind of rules that make AI output look professional:\n\n```\nRule: The most refined black isn't #000 вҖ” it's #2A2A2A.\n      5-level grayscale: #2A вҶ’ #3C вҶ’ #6A вҶ’ #7A вҶ’ #9B\n\nRule: All content lives inside cards. Never on page background.\n      Card (#FFF) vs background (#FAFAFA) contrast IS the separator.\n\nRule: Never repeat the same section type consecutively.\n      Hero вҶ’ Grid вҶ’ Chart вҶ’ Carousel вҶ’ List (visual rhythm)\n\nRule: KPI cards must vary: 2 with trend arrows, 1 with progress bar,\n      1 with comparison text. Never 4 identical cards.\n\nRule: Information density increases as you scroll down.\n      Top: 48px (one number) вҶ’ Bottom: 14px (detailed lists)\n```\n\n69 rules total. [See the full design language вҶ’](engine/DESIGN-LANGUAGE.md)\n\n## Tech Stack\n\nReact 18 В· TypeScript В· Tailwind CSS v4 В· Radix UI В· Vite 6 В· Lucide Icons В· CVA\n\n## StyleSeed vs. the alternatives\n\n| | StyleSeed | shadcn/ui | Tailwind UI | Material UI | Generic AI output |\n|---|---|---|---|---|---|\n| Components | вң… 48 | вң… 50+ | вң… | вң… | вқҢ |\n| Design **judgment** (when to use what) | вң… 69 rules | вқҢ | вқҢ | Partial | вқҢ |\n| Claude Code / Cursor integration | вң… 11 skills | вқҢ | вқҢ | вқҢ | вҖ” |\n| Brand skins (Toss, Stripe, Linear...) | вң… | вқҢ | вқҢ | вқҢ | вқҢ |\n| Price | Free (MIT) | Free | $299+ | Free | вҖ” |\n| Works *with* AI coding tools | вң… | Indirect | Indirect | Indirect | вҖ” |\n\n**TL;DR:** shadcn/ui gives you components. Tailwind UI gives you templates. StyleSeed gives you the *design judgment* that makes AI output stop looking like AI output.\n\n## FAQ\n\n**Q: Why does Claude Code / Cursor generate ugly UI?**\nBecause LLMs optimize for functional correctness, not visual refinement. They'll pick `#000` for text, `py-4` for spacing, `text-xl` for everything вҖ” all technically valid, all amateur. StyleSeed gives them the rules professional designers use.\n\n**Q: Is this a shadcn/ui replacement?**\nNo вҖ” it's built *on top of* shadcn/ui patterns. StyleSeed components use the same Radix primitives and CVA conventions. Think of it as shadcn/ui + design judgment + AI-tool integration.\n\n**Q: Does it work with Cursor too?**\nYes. The 69 design rules live in a `.cursorrules` file and `CLAUDE.md`. Cursor reads them automatically.\n\n**Q: How is this different from awesome-design-md?**\nawesome-design-md gives you brand DESIGN.md files (what). StyleSeed gives you the engine that turns any brand into a working app (how). They pair well.\n\n**Q: Can I use it for a non-fintech app?**\nYes. The engine is brand-agnostic. Pick any skin, swap the brand color, ship.\n\n## Documentation\n\nFull docs in the **[Wiki](../../wiki)** вҖ” design rules reference, composition recipes, chart guides, skills reference.\n\n## Contributing\n\n### Create a New Skin\n\nJust a `theme.css` + `skin.json`:\n```bash\nmkdir skins/your-brand\n# Copy any existing skin as starting point\ncp skins/toss/theme.css skins/your-brand/theme.css\n# Change the --brand color and other values\n```\n\n### Improve the Engine\n\nBetter rules вҶ’ better AI output:\n- More specific design rules\n- New pattern components\n- Accessibility improvements\n- New AI skills\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for details.\n\n## Updating\n\nAlready using StyleSeed? Quick update (always safe):\n\n```bash\n# Pull latest\ncd styleseed && git pull\n\n# Update design rules + skills (safe вҖ” no project-specific content)\ncp styleseed/engine/DESIGN-LANGUAGE.md your-project/.claude/DESIGN-LANGUAGE.md\ncp -r styleseed/engine/.claude/skills/ your-project/.claude/skills/\n```\n\n**Don't overwrite:** your `theme.css` (brand colors), `CLAUDE.md` (if project-specific), or customized components.\n\nFull guide: [engine/UPDATE.md](engine/UPDATE.md)\n\n**Get notified:** Click **Watch** вҶ’ **Custom** вҶ’ **Releases** on this repo.\n\n## License\n\n[MIT](LICENSE)\n\n## Acknowledgments\n\n- Design language inspired by [Toss](https://toss.im/design-system)\n- Components based on [shadcn/ui](https://ui.shadcn.com/)\n- Brand skins sourced from [awesome-design-md](https://github.com/VoltAgent/awesome-design-md)\n- UX principles from [Laws of UX](https://lawsofux.com/) and [Nielsen Norman Group](https://www.nngroup.com/)\n","summary":"StyleSeed is a design engine that teaches AIвҖ‘assisted coding tools the design judgment needed to produce polished, brandвҖ‘consistent UIs. It provides a single component with over 48 reusable elements, 69 visual rules, and 11 slash commands that translate brandвҖ‘agnostic design principlesвҖ”color discipline, layout rhythm, shadow balance, and moreвҖ”into a dataвҖ‘driven story for Claude Code, Cursor, or vibe coding. By swapping a simple `data-skin` attribute you can morph the same chat interface into any brand style without rewriting or conditional logic. Designers and developers who rely on AI code assistants and SaaS builders looking to ship fast, professional interfaces without hiring a designer will find this tool essential.","description":"Claude Code & Cursor design system. Stop generating ugly AI UI. 69 design rules + 48 shadcn components + Toss/Stripe/Linear/Vercel/Notion brand skins. Tailwind v4 + Radix.","stars":300,"language":"TypeScript"},{"owner":"standardagents","repo":"sip","url":"https://github.com/standardagents/sip","readme":"<picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://raw.githubusercontent.com/standardagents/sip/main/docs/public/sip-logo-light.svg\" />\n  <source media=\"(prefers-color-scheme: light)\" srcset=\"https://raw.githubusercontent.com/standardagents/sip/main/docs/public/sip-logo.svg\" />\n  <img alt=\"sip\" src=\"https://raw.githubusercontent.com/standardagents/sip/main/docs/public/sip-logo.svg\" width=\"400\" />\n</picture>\n\n# @standardagents/sip\n\nUltra low memory WASM image processing for Cloudflare Workers.\n\n[![npm](https://img.shields.io/npm/v/@standardagents/sip?style=flat-square)](https://www.npmjs.com/package/@standardagents/sip)\n[![License](https://img.shields.io/npm/l/@standardagents/sip?style=flat-square)](./LICENSE)\n\nsip resizes images inside Cloudflare Workers without blowing the 128 MB memory limit. It decodes one row at a time using WASM (libjpeg-turbo + libspng), so a 25 megapixel photo never needs to be fully buffered in memory.\n\n<a href=\"https://sip.standardagents.ai\"><img src=\"https://img.shields.io/badge/%E2%86%92_Read_the_docs-sip.standardagents.ai-000?style=for-the-badge&labelColor=111&color=222\" alt=\"Read the docs\" /></a>\n\n## Install\n\n```bash\npnpm add @standardagents/sip\n```\n\n## Quick start\n\n```typescript\nimport { ready, inspect, transform, toResponse } from '@standardagents/sip'\n\nexport default {\n  async fetch(request: Request) {\n    await ready()\n\n    const { source } = await inspect(request)\n    return toResponse(transform(source, {\n      width: 1024,\n      height: 1024,\n      quality: 82,\n    }))\n  },\n}\n```\n\nThat's a complete Worker. It reads the uploaded image, resizes it, and streams back a JPEG.\n\n## API\n\n| Function | Description |\n|----------|-------------|\n| `ready()` | Load the WASM module. Call once per isolate. |\n| `inspect(input)` | Read format, dimensions, and alpha from headers. Returns `{ info, source }`. |\n| `transform(input, opts?)` | One-shot decode + resize + JPEG encode. Returns an `EncodedImage`. |\n| `decode(input)` | Decode to a `PixelStream` (async iterable of scanlines). |\n| `resize(stream, opts)` | Resize a `PixelStream` row by row. |\n| `encodeJpeg(stream, opts?)` | Encode a `PixelStream` to JPEG chunks. |\n| `collect(image)` | Buffer an `EncodedImage` into an `ArrayBuffer` + stats. |\n| `toResponse(image, init?)` | Stream an `EncodedImage` into a `Response`. |\n| `toReadableStream(image)` | Convert an `EncodedImage` to a `ReadableStream`. |\n\nAll functions accept `ByteInput` вҖ” any of `Request`, `Response`, `ReadableStream`, `ArrayBuffer`, `Uint8Array`, `Blob`, or `AsyncIterable<Uint8Array>`.\n\n## Format support\n\n| Format | Decoder | Notes |\n|--------|---------|-------|\n| JPEG | libjpeg-turbo (WASM) | DCT scaling + scanline decode. Best memory profile. |\n| PNG | libspng (WASM) | Row-by-row decode. |\n| WebP | @jsquash/webp | Full decode вҖ” higher memory. |\n| AVIF | @jsquash/avif | Full decode вҖ” higher memory. |\n\nOutput is always JPEG.\n\n## Example Worker\n\nA ready-to-deploy Cloudflare Worker with an upload UI:\n\n[![Deploy to Cloudflare](https://deploy.workers.cloudflare.com/button)](https://deploy.workers.cloudflare.com/?url=https://github.com/standardagents/sip-worker-example)\n\n[View source](https://github.com/standardagents/sip-worker-example/blob/main/src/index.ts)\n\n## Documentation\n\nFull API reference, interactive demo, and code examples at **[sip.standardagents.ai](https://sip.standardagents.ai)**.\n\n## License\n\n[MIT](./LICENSE) - Standard Agents\n","summary":"@standardagents/sip is a lightweight WASM imageвҖ‘processing library designed for Cloudflare Workers, enabling highвҖ‘resolution image resizing without breaching the 128вҖҜMB memory limit by decoding one scanline at a time with libjpegвҖ‘turbo and libspng. It supports JPEG, PNG, WebP, and AVIF inputs and always outputs JPEG, offering a concise API for inspecting, transforming, resizing, encoding, and streaming images directly into Worker responses. Key capabilities include memoryвҖ‘efficient rowвҖ‘byвҖ‘row decoding, realвҖ‘time JPEG encoding, and easy integration via async iterables or standard browser objects. Developers building serverless image manipulation services on Cloudflare Workers or anyone needing ultra lowвҖ‘memory image processing in a constrained environment will find this library highly beneficial.","description":"Small Image Processor - Ultra memory-efficient image processing for Cloudflare Workers рҹҹ ","stars":167,"language":"TypeScript"},{"owner":"Neighbor-Z","repo":"SwiftMTP","url":"https://github.com/Neighbor-Z/SwiftMTP","readme":"<p align=\"center\">\n<img height=\"128\" src=\"https://github.com/Neighbor-Z/SwiftMTP/blob/main/Materials/MTPIcon-macOS-Default-128x128@2x.png\">\n</p>\n\n\n\n<h1 align=\"center\">SwiftMTP</h1>\n\n<p align=\"center\">\n<a href=\"https://neighbor-z.github.io/swiftmtp-website\">Website</a> В·\n<a href=\"https://github.com/Neighbor-Z/SwiftMTP/releases\">Releases</a>\n</p>\n\n[![Swift 5.9+](https://img.shields.io/badge/Swift-5.9%2B-orange.svg?style=flat)](https://github.com/Neighbor-Z/SwiftMTP/)[![Platform: macOS 12.0+](https://img.shields.io/badge/Platform-macOS%2012.0%2B-blue.svg?style=flat)](https://github.com/Neighbor-Z/SwiftMTP/releases/latest)[![License: GPL](https://img.shields.io/badge/License-GPL-green.svg)](https://github.com/Neighbor-Z/SwiftMTP/blob/main/LICENSE)\n\n**SwiftMTP** is a light-weight, modern, Swift-based utility for interacting with MTP (Media Transfer Protocol) devices on macOS. It allows users to browse, manage, and transfer files between a Mac and external devices like Android phones.\n\nInspired by [OpenMTP](https://github.com/ganeshrvel/openmtp/), SwiftMTP uses the enhanced backend to provide a consistently high-performance transfer experience while maintaining a compact footprint.\n\n---\n\n## Features\n\n- **Device Management**: Easily connect/disconnect MTP devices and select specific storage devices.\n- **File Browsing**: Deeply navigate through device directories with a native macOS feel with Quick Look preview supported.\n- **Bi-directional Transfer**: Import and export files with support for **Drag-and-Drop**.\n- **File Operations**: Create new folders, rename and delete files directly on the device.\n- **Progress Tracking**: Real-time transfer progress bars and status indicators.\n- **Safe and secure**: No ADB or USB debugging required.\n- **Localization**: Multilingual support via `Localizable.xcstrings`.\n\n---\n\n## Screenshot\n\n![Main UI](https://github.com/Neighbor-Z/SwiftMTP/blob/main/Materials/screenshot.png)\n\n| File menu with Keyboard Shortcuts                | Go menu with Keyboard Shortcuts              |\n| ------------------------------------------------ | -------------------------------------------- |\n| ![File Menu](https://github.com/Neighbor-Z/SwiftMTP/blob/main/Materials/file_menu_in_Tahoe.png) | ![Go Menu](https://github.com/Neighbor-Z/SwiftMTP/blob/main/Materials/go_menu_in_Tahoe.png) |\n\n---\n\n## Architecture\n\nThe project is structured to bridge high-level Swift with low-level MTP kernel interactions:\n\n```text\nSwiftMTP/\nв”ңв”Җв”ҖSwiftMTP/                  # Main App Source\nв”Ӯ   в”ңв”Җв”Җ SwiftMTPApp.swift     # Entry point\nв”Ӯ   в”ңв”Җв”Җ Views/                # SwiftUI UI Layer\nв”Ӯ   в”ңв”Җв”Җ Models/               # Data models\nв”Ӯ   в””в”Җв”Җ Services/             # KalamMTPManager (Connection & Transfer logic)\nв”ңв”Җв”ҖKalamShim/                # C shim bridging Swift and the MTP kernel\nв”ңв”Җв”Җffi/                      # Kalam backend source\nв”ңв”Җв”ҖCKalam/                   # Module map for C headers\nв””в”Җв”Җlib/                      # Runtime dependencies (kalam.dylib, libusb.dylib)\n```\n\n---\n\n## Getting Started\n\n### Download\n\n[Release](https://github.com/Neighbor-Z/SwiftMTP/releases/latest)\n\n### Build\n\n#### Prerequisites\n\n* **Xcode 15.0+**\n* **macOS 12.0+**\n\n#### Build & Run\n1.  ~~Please build Kalam backend first. Refer to `ffi/kalam/native/README.md`. This step will build necessary dynamic libraries (`kalam.dylib` & `libusb.dylib`) and will place them under `lib`.~~ Pre-compiled dylibs have been added. You can also compile them by yourself.\n2.  Open `SwiftMTP.xcodeproj` in Xcode.\n3.  Select your target platform (macOS).\n4.  Press Run.\n\n---\n\n## Realized\n\n- [x] Drag-and-Drop\n- [x] Automatic device connect detection\n- [x] Transfer progress bar and status indicators\n- [x] Multi selections and export\n- [x] \"Go\" and \"File\" menu\n- [x] Favorites\n- [x] Finder-like quick look preview (press spacebar)\n- [x] File list font size adjustment \n- [x] Paste to import\n\n## To do\n\n- [ ] Multiple connections at same time \n\n## FAQ\n\n**I got \"OpenSession after reset: LIBUSB_ERROR_NOT_FOUND\"**\n\nThis could be due to other software occupying MTP sessions or a device connection issue. Please ensure software like *Preview*, *Image Capture*, or *Android File Transfer* is not running. For *Android File Transfer*, even if it's not running in the foreground, there is an *Android File Transfer Agent* in the system background to detect USB MTP device connections in real time and automatically launch the main app. You can exit *Android File Transfer Agent* in *Activity Monitor*. After that, please reconnect or restart your device.\n\n**macOS cannot verify this app?**\n\nThis is because the app was not released in the way Apple prefers. Apple requires developers to pay $99 annually for a so-called \"security signature\". Please go to System Settings > Privacy & Security, scroll down and allow the app to run.\n\n## License\n\n[GPL](https://github.com/Neighbor-Z/SwiftMTP/blob/main/LICENSE)\n\n---\n**About AI**: AI assistance involved; each code segment has undergone manual review and testing.\n\n**Need help?** If you encounter any issues, please open an [Issue](https://github.com/Neighbor-Z/SwiftMTP/issues).\n\n**Contributing**: SwiftMTP is always looking for contributions. Just simply fork this repo and make [pull requests](https://github.com/Neighbor-Z/SwiftMTP/pulls). You can also improve the translation or add your new language freely.\n\n**Support project**: [вҳ•пёҸ Buy Me a Coffee](https://buymeacoffee.com/neighbor_z)\n","summary":"SwiftMTP is a lightweight, SwiftвҖ‘based macOS app that lets users connect to MTP devicesвҖ”such as Android phonesвҖ”without needing ADB or USB debugging. It provides a native file browser with QuickвҖ‘Look preview, dragвҖ‘andвҖ‘drop transfer, realвҖ‘time progress bars, folder creation, renaming, deletion, and localization, all controlled via menu shortcuts and keyboard shortcuts. The app targets macOSвҖҜ12+ and is ideal for Mac users who need a fast, secure, and userвҖ‘friendly way to browse, transfer, and manage files on external MTP devices.","description":"A modern MTP device management tool for macOS.","stars":185,"language":"Swift"},{"owner":"kapishdima","repo":"remocn","url":"https://github.com/kapishdima/remocn","readme":"<p align=\"center\">\n  <img src=\"./public/hero.png\" alt=\"remocn вҖ” shadcn registry for Remotion\" />\n</p>\n\n# remocn\n\n> A shadcn registry of production-ready animations, transitions, backgrounds, and scenes for [Remotion](https://www.remotion.dev/).\n\nremocn is a copy-paste component library for building videos in Remotion. Instead of writing every fade, wipe, and kinetic title from scratch, you `npx shadcn add` a polished primitive into your project and own the code. Built for solo builders and small teams who need a product demo video shipped today, not next week.\n\n## Why remocn\n\n- **Remotion has no batteries-included component library** You either build every animation from scratch or copy snippets from blog posts. remocn gives you a curated registry of primitives and full scenes that just work.\n- **Polished motion is hard** Easing curves, spring physics, transition timing вҖ” remocn ships components that already feel right, so you can focus on storytelling instead of tuning `interpolate()` calls.\n- **You own the code** Components are copied into your repo (shadcn philosophy). No runtime dependency, no version lock-in, no black box вҖ” tweak anything you want.\n- **Solo builders need demo videos fast** Compose a launch trailer, changelog clip, or feature walkthrough from prebuilt blocks in an afternoon.\n\n## What's inside\n\n64+ components across five categories:\n\n- **Text animations** вҖ” Blur Reveal, Typewriter, Shimmer Sweep, Tracking In, Slot Machine Roll, Matrix Decode, RGB Glitch Text, Kinetic Type Mask, Marker Highlight, Infinite Marquee, and more\n- **Backgrounds & visual primitives** вҖ” Mesh Gradient Background, Dynamic Grid, Spring Pop In, Pulsing Indicator\n- **Transitions & wipes** вҖ” Chromatic Aberration Wipe, Frosted Glass Wipe, Directional Wipe, Grid Pixelate, Spatial Push, Zoom Through Transition\n- **UI blocks** вҖ” Glass Code Block, Terminal Simulator, Browser Flow, Toast Notification, Animated Charts, Code Diff Wipe, Device Mockup Zoom, Simulated Cursor, Morphing Modal, Progress Steps\n- **Full compositions** вҖ” Product Launch Trailer, Hero Device Assemble, Changelog Bite, Pricing Tier Focus, Landing Code Showcase, Terminal to Browser Deploy, Live Code Compilation\n\nBrowse the full catalog with interactive previews at [remocn.dev](https://remocn.dev).\n\n## Installation\n\nRemotion is a prerequisite вҖ” set up a Remotion project first if you don't have one (`npx create-video@latest`). Then add any component from the registry:\n\n```bash\nnpx shadcn@latest add @remocn/blur-reveal\n```\n\nThe component lands in `components/remocn/blur-reveal.tsx` and is yours to edit.\n\n## Local development\n\nThis repo is a single Next.js app that hosts both the landing page / docs and the registry endpoint at `/r/[name]`.\n\n```bash\nbun install              # install dependencies\nbun dev                  # run the site locally\nbun run registry:build   # rebuild the shadcn registry JSON\nbun run lint             # biome check\n```\n\n## Tech stack\n\n- [Remotion](https://www.remotion.dev/) 4.0 + `@remotion/player` for in-browser previews\n- [Next.js](https://nextjs.org/) 16 + React 19\n- [Tailwind CSS](https://tailwindcss.com/) 4\n- [Fumadocs](https://fumadocs.vercel.app/) for documentation\n- [shadcn](https://ui.shadcn.com/) registry format\n\n## License\n\nMIT. Open core вҖ” primitives and base compositions are free forever. Premium blocks and a video builder are on the roadmap.\n","summary":"remocn is a shadcnвҖ‘style registry that supplies productionвҖ‘ready animation primitives, background skins, transitions, and full scene compositions for Remotion, the ReactвҖ‘based videoвҖ‘rendering framework. It ships more than 60 preвҖ‘crafted componentsвҖ”including text effects, kinetic title masks, glassy wipes, and complete launchвҖ‘trailer templatesвҖ”that can be copied straight into a project via `npx shadcn add`, giving developers immediate, editable, and selfвҖ‘contained motion elements. The library emphasizes polished motion physics and easing curves out of the box, eliminating the need for tedious interpolation fineвҖ‘tuning. Solo creators, small teams, or marketers who need featureвҖ‘demo, productвҖ‘launch, or changelog videos assembled swiftly will benefit most from this plugвҖ‘andвҖ‘play, codeвҖ‘ownable toolkit.","description":"Pr
