e, VS Code, etc.)\n- **AppInfoFetcher** - Spotlight metadata + Info.plist fallback for app discovery\n- **Logger** - Apple `os.log` unified logging\n\n## Contributing\n\nContributions are welcome. See [CONTRIBUTING.md](CONTRIBUTING.md) for guidelines.\n\nAreas where help is especially welcome:\n- Size/date filter presets in category views\n- XCTest coverage for AppState and scan engine\n- Localization (zh-Hans, zh-Hant, and other languages)\n- App icon design\n\n## Acknowledgments\n\nv2.0 was shaped by community feedback and contributions:\n\n- **[@nguyenhuy158](https://github.com/nguyenhuy158)** - Search and filter feature request ([#18](https://github.com/momenbasel/PureMac/issues/18)) and implementation ([#29](https://github.com/momenbasel/PureMac/pull/29))\n- **[@edufalcao](https://github.com/edufalcao)** - Cleaning safety guards and confirmation dialogs ([#30](https://github.com/momenbasel/PureMac/pull/30))\n- **[@zeck00](https://github.com/zeck00)** - UI overhaul ([#31](https://github.com/momenbasel/PureMac/pull/31)), app uninstaller with system app protection ([#32](https://github.com/momenbasel/PureMac/pull/32)), and onboarding experience ([#33](https://github.com/momenbasel/PureMac/pull/33))\n- **[@0x-man](https://github.com/0x-man)** - Symlink security vulnerability report ([#25](https://github.com/momenbasel/PureMac/issues/25))\n- **[@ansidev](https://github.com/ansidev)** - Checkbox interaction bug report ([#34](https://github.com/momenbasel/PureMac/issues/34))\n- **[@fengcheng01](https://github.com/fengcheng01)** - App uninstaller feature request ([#28](https://github.com/momenbasel/PureMac/issues/28))\n- **[@scholzfuni](https://github.com/scholzfuni)** - Modularization proposal ([#23](https://github.com/momenbasel/PureMac/issues/23))\n\n## License\n\nMIT License. See [LICENSE](LICENSE) for details.\n","summary":"PureMac is a free, openвҖ‘source macOS utility that lets users uninstall applications completely, locate orphaned files left behind by removed apps, and clean various kinds of system junk. It offers a heuristic appвҖ‘uninstaller that searches for every related file at multiple sensitivity levels, a oneвҖ‘click orphan finder, and a smart scanner that removes caches, logs, mail attachments, Xcode junk, Homebrew caches, and more, even scheduling cleanвҖ‘ups automatically. Built entirely in SwiftВ UI for a native look and feel, it respects macOSвҖҷs darkвҖ‘light modes and includes fullвҖ‘disk access onboarding. The app benefits Mac users who want deep system hygieneвҖ”especially developers, power users, or anyone looking to reclaim disk space without telemetry or subscriptions.","description":"Free, open-source macOS cleaner. CleanMyMac alternative with zero telemetry. Native SwiftUI, scheduled auto-cleaning, Xcode/Homebrew/system cache cleanup. MIT licensed.","stars":2873,"language":"Swift"},{"owner":"MarchLiu","repo":"hypatia","url":"https://github.com/MarchLiu/hypatia","readme":"# Hypatia\n\n\"We can wander through the stacks of the Library of Alexandria, imagining the scrolls and the knowledge they contain. Its destruction is a warning: all we have is transient.\"вҖ”вҖ”Alberto Manguel\n\nAI-oriented memory management system. Stores structured knowledge as a graph of **Knowledge** entries (nodes) and **Statement** triples (edges), queried via a custom JSON Search Expression (JSE) language. Built on SQLite FTS5 + DuckDB, with configurable embedding models (local ONNX or remote API) for semantic vector search.\n\n## Features\n\n- **Knowledge Graph** -- Knowledge entries (named info points with tags) and Statement triples (subject-predicate-object with temporal ranges)\n- **JSE Query Engine** -- JSON-based query language compiling to parameterized SQL + FTS5, supporting `$and`, `$or`, `$not`, `$eq`, `$ne`, `$gt`, `$lt`, `$contains`, `$like`, `$content`, `$search`, `$quote`, `$triple`, `$k-hop`\n- **Dual-Database Storage** -- DuckDB for structured queries + vector search, SQLite FTS5 (Porter stemmer + multi-column BM25) for full-text search, auto-synchronized\n- **Configurable Vector Search** -- Local ONNX models (BGE-M3 default) or remote API (OpenAI-compatible) for semantic similarity search via DuckDB cosine distance\n- **Synonyms** -- Per-entry synonym lists for knowledge, per-position (subject/predicate/object) synonyms for statements, indexed in FTS\n- **Shelf System** -- Named, connectable, exportable data directories for isolation\n- **CLI + REPL** -- Full command-line interface with interactive mode (rustyline)\n- **Agent Integration** -- Claude Code skill for natural-language-to-CLI translation\n- **Cross-Platform** -- Build for 18+ targets (Linux, macOS, Windows, FreeBSD, NetBSD, illumos, Android)\n\n## Quick Start\n\n```bash\n# Build\ncargo build --release\n\n# Download embedding model (BGE-M3, recommended)\nmkdir -p ~/.hypatia/default\nhf download BAAI/bge-m3 --local-dir /tmp/bge-m3\ncp /tmp/bge-m3/onnx/model.onnx ~/.hypatia/default/embedding_model.onnx\ncp /tmp/bge-m3/onnx/model.onnx_data ~/.hypatia/default/model.onnx_data\ncp /tmp/bge-m3/onnx/tokenizer.json ~/.hypatia/default/tokenizer.json\n\n# Create knowledge\nhypatia knowledge-create \"Rust\" -d \"systems programming language\" -t \"language,compiled\"\n\n# Create a relationship\nhypatia statement-create \"Rust\" \"is_a\" \"systems language\"\n\n# Full-text search\nhypatia search \"programming language\"\n\n# Vector similarity search (requires embedding model)\nhypatia backfill    # generate embeddings for existing entries\nhypatia similar \"programming language\"  # semantic search\n\n# Structured query (JSE)\nhypatia query '[\"$knowledge\", [\"$eq\", \"name\", \"Rust\"]]'\nhypatia query '[\"$statement\", [\"$triple\", \"Rust\", \"$*\", \"$*\"]]'\nhypatia query '[\"$knowledge\", [\"$search\", \"database migration\"]]'\n\n# Interactive REPL\nhypatia repl\n```\n\n## Embedding Models\n\nHypatia supports multiple embedding backends, configured via `shelf.toml` in the shelf directory (e.g., `~/.hypatia/default/shelf.toml`).\n\n### Default: BAAI/bge-m3 (Local ONNX)\n\nNo configuration needed вҖ” place model files in the shelf directory and Hypatia auto-detects them.\n\n```bash\n# Download from HuggingFace\nhf download BAAI/bge-m3 --local-dir /tmp/bge-m3\ncp /tmp/bge-m3/onnx/model.onnx ~/.hypatia/default/embedding_model.onnx\ncp /tmp/bge-m3/onnx/model.onnx_data ~/.hypatia/default/model.onnx_data\ncp /tmp/bge-m3/onnx/tokenizer.json ~/.hypatia/default/tokenizer.json\n```\n\n- Dimensions: 1024\n- Max sequence length: 8192\n- Multilingual (100+ languages including Chinese and English)\n\n### Switching to Other Local Models\n\nCreate or edit `~/.hypatia/default/shelf.toml`:\n\n```toml\n[embedding]\nprovider = \"local\"\ndimensions = 1536\nmax_seq_length = 8192\n```\n\n#### Alibaba-NLP/gte-Qwen2-1.5B-instruct\n\n```bash\nhf download Alibaba-NLP/gte-Qwen2-1.5B-instruct --local-dir /tmp/gte-qwen2\n# Export ONNX first (requires optimum-cli or transformers)\n# Then place files in shelf directory\n```\n\n- Dimensions: 1536\n- Max sequence length: 8192\n- Strong multilingual performance\n\n#### google/embedding-gemma-300M (EmbeddingGemma)\n\n```bash\nhf download google/embedding-gemma-300M --local-dir /tmp/embedding-gemma\n# Export ONNX and place files\n```\n\n- Dimensions: 768\n- Max sequence length: 8192\n- Lightweight, fast inference\n\n#### jinaai/jina-embeddings-v5-text-small\n\n```bash\nhf download jinaai/jina-embeddings-v5-text-small-text-matching \\\n  onnx/model.onnx onnx/model.onnx_data tokenizer.json \\\n  --local-dir /tmp/jina-v5-small\ncp /tmp/jina-v5-small/onnx/model.onnx ~/.hypatia/default/embedding_model.onnx\ncp /tmp/jina-v5-small/onnx/model.onnx_data ~/.hypatia/default/model.onnx_data\ncp /tmp/jina-v5-small/tokenizer.json ~/.hypatia/default/tokenizer.json\n```\n\nshelf.toml:\n```toml\n[embedding]\nprovider = \"local\"\ndimensions = 1024\nmax_seq_length = 32768\npooling = \"last_token\"\n```\n\n- Dimensions: 1024\n- Max sequence length: 32768\n- 677M params, last-token pooling\n\n#### jinaai/jina-embeddings-v5-text-nano\n\n```bash\nhf download jinaai/jina-embeddings-v5-text-nano-text-matching \\\n  onnx/model.onnx onnx/model.onnx_data tokenizer.json \\\n  --local-dir /tmp/jina-v5-nano\ncp /tmp/jina-v5-nano/onnx/model.onnx ~/.hypatia/default/embedding_model.onnx\ncp /tmp/jina-v5-nano/onnx/model.onnx_data ~/.hypatia/default/model.onnx_data\ncp /tmp/jina-v5-nano/tokenizer.json ~/.hypatia/default/tokenizer.json\n```\n\nshelf.toml:\n```toml\n[embedding]\nprovider = \"local\"\ndimensions = 768\nmax_seq_length = 8192\npooling = \"last_token\"\n```\n\n- Dimensions: 768\n- Max sequence length: 8192\n- 239M params, last-token pooling, fastest inference\n\n### Remote API (OpenAI-Compatible)\n\nFor cloud-based embeddings without local model files:\n\n```toml\n[embedding]\nprovider = \"remote\"\napi_url = \"https://api.openai.com/v1/embeddings\"\napi_key_env = \"OPENAI_API_KEY\"\napi_model = \"text-embedding-3-small\"\ndimensions = 1536\n```\n\nWorks with any OpenAI-compatible API:\n- OpenAI (`text-embedding-3-small`, `text-embedding-3-large`)\n- Azure OpenAI\n- Local servers (Ollama, LM Studio, vLLM)\n- Other providers (Voyage AI, Cohere, Jina, Gitee AI)\n\n#### Ollama Example\n\n```toml\n[embedding]\nprovider = \"remote\"\napi_url = \"http://localhost:11434/v1/embeddings\"\napi_key_env = \"OLLAMA_API_KEY\"\napi_model = \"qwen3-embedding:8b\"\ndimensions = 1024\n```\n\n```bash\n# Set a dummy key (Ollama doesn't require auth)\nexport OLLAMA_API_KEY=\"ollama\"\n```\n\nSet the API key as an environment variable:\n```bash\nexport OPENAI_API_KEY=\"sk-...\"\n```\n\n### Configuration Reference\n\n| Field | Default | Description |\n|-------|---------|-------------|\n| `provider` | `\"local\"` | `\"local\"` for ONNX, `\"remote\"` for HTTP API |\n| `dimensions` | `1024` | Embedding vector dimensions |\n| `max_seq_length` | `8192` | Max tokenizer sequence length (local only) |\n| `pooling` | `\"mean\"` | Pooling strategy: `\"mean\"`, `\"cls\"`, or `\"last_token\"` (local only) |\n| `model_path` | `embedding_model.onnx` | ONNX model path, relative to shelf dir (local only) |\n| `tokenizer_path` | `tokenizer.json` | Tokenizer path, relative to shelf dir (local only) |\n| `api_url` | OpenAI URL | API endpoint URL (remote only) |\n| `api_key_env` | `OPENAI_API_KEY` | Environment variable name for API key (remote only) |\n| `api_model` | `text-embedding-3-small` | Model name sent to API (remote only) |\n\n## CLI Reference\n\n| Command | Description |\n|---------|-------------|\n| `hypatia connect <path> [-n <name>]` | Connect to a shelf directory |\n| `hypatia disconnect <name>` | Disconnect from a shelf |\n| `hypatia list` | List connected shelves |\n| `hypatia knowledge-create <name> [-d <data>] [-t <tags>] [--synonyms <csv>] [--figures <refs>]` | Create a knowledge entry |\n| `hypatia knowledge-get <name>` | Get a knowledge entry |\n| `hypatia knowledge-delete <name>` | Delete a knowledge entry |\n| `hypatia statement-create <subj> <pred> <obj> [-d <data>] [--synonyms <json>]` | Create a triple |\n| `hypatia statement-delete <subj> <pred> <obj>` | Delete a triple |\n| `hypatia search <query> [-c <catalog>] [--limit N]` | Full-text search |\n| `hypatia similar <query> [--limit N]` | Vector similarity search |\n| `hypatia backfill` | Generate embeddings for all entries |\n| `hypatia archive-store <file> [-n <name>] [-s <shelf>]` | Store a file in archives with auto-metadata |\n| `hypatia archive-get <name> [-o <output>] [-s <shelf>]` | Get an archive file path or copy it |\n| `hypatia archive-list [-s <shelf>]` | List all archive files |\n| `hypatia query '<jse-json>'` | Execute a JSE query |\n| `hypatia export <name> <dest>` | Export a shelf |\n| `hypatia repl` | Interactive REPL |\n\n## JSE Query Language\n\nJSE (JSON Search Expression) enables precise queries against knowledge or statement tables.\n\n### Syntax\n\n```json\n[\"$knowledge\", condition1, condition2, ...]\n[\"$statement\", condition1, condition2, ...]\n```\n\n### Operators\n\n| Operator | Purpose | Example |\n|----------|---------|---------|\n| `$eq` | Equals | `[\"$eq\", \"name\", \"Rust\"]` |\n| `$ne` | Not equals | `[\"$ne\", \"name\", \"Rust\"]` |\n| `$gt` / `$lt` / `$gte` / `$lte` | Comparison | `[\"$gt\", \"created_at\", \"2025-01-01\"]` |\n| `$contains` | Substring in JSON field | `[\"$contains\", \"tags\", \"backend\"]` |\n| `$like` | SQL LIKE pattern match | `[\"$like\", \"name\", \"Rust%\"]` |\n| `$content` | Match content JSON key-values | `[\"$content\", {\"format\": \"markdown\"}]` |\n| `$search` | Full-text search | `[\"$search\", \"database migration\"]` |\n| `$and` | Logical AND | `[\"$and\", cond1, cond2]` |\n| `$or` | Logical OR | `[\"$or\", cond1, cond2]` |\n| `$not` | Logical NOT | `[\"$not\", cond]` |\n| `$quote` | Prevent evaluation | `[\"$quote\", [\"$eq\", \"x\", \"y\"]]` |\n| `$triple` | Triple position match | `[\"$triple\", \"Alice\", \"$*\", \"Bob\"]` |\n| `$k-hop` | K-hop graph traversal | `[\"$k-hop\", \"Alice\", \"$*\", 2]` |\n\n### Examples\n\n```bash\n# All knowledge entries\nhypatia query '[\"$knowledge\"]'\n\n# Knowledge named \"Rust\" with tag \"systems\"\nhypatia query '[\"$knowledge\", [\"$and\", [\"$eq\", \"name\", \"Rust\"], [\"$contains\", \"tags\", \"systems\"]]]'\n\n# Statements containing \"Alice\" in triple\nhypatia query '[\"$statement\", [\"$contains\", \"triple\", \"Alice\"]]'\n\n# Triple matching: all relationships where Alice is the subject\nhypatia query '[\"$statement\", [\"$triple\", \"Alice\", \"$*\", \"$*\"]]'\n\n# Triple matching: all \"manages\" relationships\nhypatia query '[\"$statement\", [\"$triple\", \"$*\", \"manages\", \"$*\"]]'\n\n# Triple matching: exact triple (uses PK index)\nhypatia query '[\"$statement\", [\"$triple\", \"Alice\", \"knows\", \"Bob\"]]'\n\n# Pattern matching: names starting with \"Al\"\nhypatia query '[\"$knowledge\", [\"$like\", \"name\", \"Al%\"]]'\n\n# Content filtering: all markdown entries\nhypatia query '[\"$knowledge\", [\"$content\", {\"format\": \"markdown\"}]]'\n\n# FTS search within knowledge\nhypatia query '[\"$knowledge\", [\"$search\", \"query optimization\"]]'\n\n# Statements where triple contains Alice or Bob\nhypatia query '[\"$statement\", [\"$or\", [\"$contains\", \"triple\", \"Alice\"], [\"$contains\", \"triple\", \"Bob\"]]]'\n\n# K-hop: all entities reachable from Alice in 2 hops\nhypatia query '[\"$statement\", [\"$k-hop\", \"Alice\", \"$*\", 2]]'\n\n# K-hop: follow \"knows\" edges from Alice, 3 hops deep\nhypatia query '[\"$statement\", [\"$k-hop\", \"Alice\", \"knows\", 3]]'\n```\n\n## Architecture\n\n```\nsrc/\nв”ңв”Җв”Җ cli/            # CLI commands + REPL (clap + rustyline)\nв”ңв”Җв”Җ embedding/      # Embedding providers (ONNX local + remote API)\nв”ңв”Җв”Җ engine/         # JSE parser, AST, evaluator, SQL builder\nв”ңв”Җв”Җ model/          # Knowledge, Statement, Content, Query types\nв”ңв”Җв”Җ service/        # Business logic (dual-write to DuckDB + SQLite)\nв”ңв”Җв”Җ storage/        # DuckDB store, SQLite FTS5 store, shelf manager\nв”ңв”Җв”Җ lab.rs          # Top-level API facade\nв”ңв”Җв”Җ error.rs        # Error types\nв”ңв”Җв”Җ lib.rs          # Module declarations\nв””в”Җв”Җ main.rs         # Entry point\n```\n\nEach **shelf** is a directory containing `data.duckdb` (structured data), `index.sqlite` (FTS5 index), optional `shelf.toml` (embedding config), embedding model files, and an `archives/` directory for attachments. The service layer keeps both databases in sync via dual-write.\n\n## Archive Files\n\nHypatia supports storing archive files (images, PDFs, data, etc.) alongside knowledge entries. Files are stored in the shelf's `archives/` directory and referenced via the `archive://` convention in knowledge content.\n\n```\n~/.hypatia/default/\nв”ңв”Җв”Җ data.duckdb\nв”ңв”Җв”Җ index.sqlite\nв”ңв”Җв”Җ shelf.toml\nв””в”Җв”Җ archives/\n    в””в”Җв”Җ euclid/\n        в”ңв”Җв”Җ fig_1_1.png\n        в””в”Җв”Җ fig_1_2.svg\n```\n\n### Commands\n\n```bash\n# Store a file (auto-creates knowledge with metadata)\nhypatia archive-store figure.png -n euclid/fig_1_1.png\n\n# Get the path to a stored archive file\nhypatia archive-get euclid/fig_1_1.png\n\n# Copy an archive file to a local path\nhypatia archive-get euclid/fig_1_1.png -o /tmp/fig.png\n\n# List all archive files\nhypatia archive-list\n\n# Reference an archive when creating knowledge\nhypatia knowledge-create \"Euclid Prop 1\" \\\n  -d \"Construction of equilateral triangle\" \\\n  --figures \"archive://euclid/fig_1_1.png\"\n```\n\n### Auto-Created Metadata\n\n`archive-store` automatically creates:\n\n1. **Knowledge entry** with name = archive path, containing filename, size, and MIME type\n2. **Statement**: `<path> is_a archive` (graph connectivity)\n\nThis enables JSE queries on archive metadata:\n\n```bash\nhypatia query '[\"$knowledge\", [\"$contains\", \"tags\", \"archive\"]]'\nhypatia query '[\"$knowledge\", [\"$content\", {\"mime_type\": \"image/png\"}]]'\nhypatia query '[\"$statement\", [\"$triple\", \"$*\", \"is_a\", \"archive\"]]'\n```\n\n### Convention\n\n- **Storage**: Files go in `<shelf>/archives/<path>` on the filesystem\n- **Reference**: Use `archive://<path>` in knowledge content's `figures` field\n- **Resolution**: `archive://euclid/fig.png` resolves to `<shelf>/archives/euclid/fig.png`\n- **Export**: `hypatia export` copies the `archives/` directory along with databases\n- **No cascade delete**: Deleting a knowledge entry does not remove the archive file\n\n## Benchmark\n\n### LoCoMo Academic Benchmark\n\nTested on the LoCoMo long-term conversational memory benchmark (ACL 2024, 10 conversations, 1,540 non-adversarial QA pairs, 6,426 entries). Measures whether the correct evidence passage is found in top-K results.\n\n#### Embedding Model Comparison\n\n| Model | Params | Dims | Pooling | R@1 | R@5 | R@10 | Vec p50 |\n|-------|--------|------|---------|-----|-----|------|---------|\n| FTS (BM25, baseline) | вҖ” | вҖ” | вҖ” | 0.2% | 0.2% | 0.2% | 815 ms |\n| Jina v5 text-nano | 239M | 768 | last_token | 8.7% | 19.6% | 25.1% | 25 ms |\n| gte-multilingual-base | 305M | 768 | mean | 13.6% | 31.9% | 42.5% | 25 ms |\n| gte-Qwen2-1.5B-instruct | 1.5B | 1536 | mean | 17.7% | 43.6% | 54.9% | 105 ms |\n| Jina v5 text-small | 677M | 1024 | last_token | 24.9% | 50.7% | 60.4% | 54 ms |\n| GLM Embedding-3 (API) | вҖ” | 1024 | вҖ” | 22.4% | 53.3% | 64.9% | 146 ms |\n| Qwen3-Embedding-8B (Ollama) | 8B | 1024 | вҖ” | 32.9% | 59.5% | 70.7% | 152 ms |\n| Qwen3-Embedding-8B (Ollama) | 8B | 4096 | вҖ” | 33.6% | 60.0% | 70.6% | 310 ms |\n| **BAAI/bge-m3** | **568M** | **1024** | **mean** | **38.6%** | **65.7%** | **75.2%** | **43 ms** |\n\n#### BGE-M3 by Category (default model)\n\n| Category | N | FTS R@10 | Vector R@10 | Improvement |\n|----------|---|----------|-------------|-------------|\n| Single-hop | 841 | 0.1% | **76.1%** | +76.0pp |\n| Multi-hop | 282 | 0.4% | **75.5%** | +75.2pp |\n| Temporal | 321 | 0.0% | **80.4%** | +80.4pp |\n| Open-domain | 96 | 1.0% | **49.0%** | +47.9pp |\n| **Overall** | **1540** | **0.2%** | **75.2%** | **+75.0pp** |\n\n#### Comparison with MemPalace (ChromaDB)\n\n| Metric | Hypatia (BGE-M3) | MemPalace ChromaDB | MemPalace Hybrid v5 |\n|--------|-------------------|--------------------|---------------------|\n| R@10 | 75.2% | 60.3% | 88.9% |\n| Vec latency p50 | 43 ms | ~2-50 ms | ~2-50 ms |\n| Ingest time | ~9 min | вҖ” | вҖ” |\n\n**Note**: LoCoMo is designed as a semantic challenge, which is why BM25 FTS recall is near zero. Vector search closes this gap effectively. BGE-M3 (568M, 1024d) achieves the highest recall (R@10=75.2%) with good latency (43ms) and strong multilingual coverage (100+ languages) вҖ” the best default choice. Qwen3-Embedding-8B (8B, via Ollama) was tested at both 1024d and native 4096d: higher dimensions yield negligible gains (R@10: 70.7% vs 70.6%) at 2x latency (310ms vs 152ms), confirming that 1024d is the optimal trade-off. Even at 8B params, it does not surpass the much smaller BGE-M3. GLM Embedding-3 (Zhipu AI, cloud API) at 1024d underperforms (R@10=64.9%) compared to local models, suggesting API latency overhead doesn't compensate for model quality. Jina v5 text-small (677M) offers mid-range quality (R@10=60.4%) at 54ms. Notably, larger models don't always win: gte-Qwen2 (1.5B) and gte-multilingual-base (305M, ModernBERT) both underperform BGE-M3 on this benchmark.\n\n#### Run the Benchmark\n\n```bash\n# Download test data\ncurl -sL https://huggingface.co/datasets/Percena/locomo-mc10/resolve/main/raw/locomo10.json -o locomo10.json\n\n# Run (requires embedding model in ~/.hypatia/default/)\nLOCOMO_DATA=locomo10.json LOCOMO_RESULTS=results.jsonl \\\n  cargo test --test locomo --release -- --nocapture\n```\n\n### LongMemEval Benchmark\n\nTested on [LongMemEval](https://github.com/xiaowu0162/longmemeval) (500 questions, 7 types, 5 abilities), a comprehensive benchmark for long-term conversational memory.\n\n> **Note**: The test data file (`longmemeval_m.json`, ~2.6 GB) is **not** included in this repository because it is a large third-party public dataset. You need to download it separately before running the benchmark.\n\n#### Download Data\n\n```bash\n# Option 1: Use the download script (recommended)\npip install httpx\npython3 scripts/longmemeval_download.py              # M variant (default, ~2.6 GB)\npython3 scripts/longmemeval_download.py --variant s   # S variant (smaller)\n\n# Option 2: Direct download from HuggingFace\ncurl -L -o longmemeval_m.json \\\n  https://huggingface.co/datasets/xiaowu0162/longmemeval-cleaned/resolve/main/longmemeval_m_cleaned.json\n```\n\nSource: [xiaowu0162/longmemeval-cleaned on HuggingFace](https://huggingface.co/datasets/xiaowu0162/longmemeval-cleaned)\n\n#### Run the Benchmark\n\n```bash\n# Full run (requires embedding model in ~/.hypatia/default/)\nLONGMEMEVAL_DATA=longmemeval_m.json LONGMEMEVAL_RESULTS=longmemeval_m_results.jsonl \\\n  cargo test --test longmemeval --release -- --nocapture\n\n# Quick test with subset\nLONGMEMEVAL_DATA=longmemeval_m.json LONGMEMEVAL_MAX_QUESTIONS=50 LONGMEMEVAL_RESULTS=longmemeval_m_results.jsonl \\\n  cargo test --test longmemeval --release -- --nocapture\n\n# Evaluate results\npython3 scripts/longmemeval_eval.py --results longmemeval_m_results.jsonl --retrieval-only\n```\n\n### Synthetic Benchmark\n\nBenchmark uses synthetic data with planted needles (known-answer entries) to measure retrieval quality, following MemPalace's methodology.\n\n#### Run\n\n```bash\n# Small scale (1K knowledge, 2K statements, ~12s)\ncargo test --test bench\n\n# With JSON report\nBENCH_REPORT=report.json cargo test --test bench\n\n# Larger scales\nBENCH_SCALE=medium cargo test --test bench --release\nBENCH_SCALE=large cargo test --test bench --release\n```\n\n#### Results (small scale, debug build, Apple Silicon)\n\n1K knowledge, 2K statements, 20 needles, 20 JSE query types (x3 runs each).\n\n| Metric | Result |\n|--------|--------|\n| **Recall@1** | 100.0% (20/20 needles) |\n| **Recall@5** | 100.0% |\n| **Recall@10** | 100.0% |\n| **FTS search p50** | 474 us |\n| **FTS search p99** | 700 us |\n| **JSE query p50** | 3.39 ms |\n| **JSE query count** | 20 types (eq, ne, gt, lt, contains, like, content, search, and, or, not, triple) |\n| **Ingest throughput** | 384 knowledge/s, 280 statements/s |\n\nFull report: [docs/benchmark-report.md](docs/benchmark-report.md)\n\n**Honest assessment**: These results are on synthetic data with known-answer queries -- not academic benchmarks. See [docs/benchmark-honest-assessment.md](docs/benchmark-honest-assessment.md) for a frank analysis.\n\n## Cross-Compilation\n\n```bash\n# Prerequisites\ncargo install cargo-zigbuild\npip install ziglang\n\n# Build for Linux (musl, static binary)\n./scripts/build.sh x86_64-unknown-linux-musl\n\n# Build for all 18 targets\n./scripts/build.sh all\n\n# List supported targets\n./scripts/build.sh list\n\n# Docker-based cross-compilation (alternative)\ncargo install cross --git https://github.com/cross-rs/cross\n./scripts/build.sh --backend cross x86_64-unknown-linux-musl\n```\n\nSupported targets: x86_64/aarch64/armv7 Linux (glibc + musl), riscv64, s390x, powerpc64le, macOS, Windows, FreeBSD, NetBSD, illumos, Android.\n\n## License\n\nMIT\n","summary":"Hypatia is an AIвҖ‘oriented knowledgeвҖ‘management engine that stores information as a graph of knowledge nodes and statement triples, enabling sophisticated semantic and fullвҖ‘text queries. It runs on SQLite FTS5 and DuckDB, supporting a JSONвҖ‘based search language (JSE) with logical operators, temporal ranges, kвҖ‘hop traversal, and vector similarity using local ONNX models or remote APIs. The system includes a commandвҖ‘line interface and REPL, a shelf mechanism for isolated data stores, synonym indexing, and crossвҖ‘platform builds, making it suitable for developers and data scientists who need a lightweight, embeddable graph database for naturalвҖ‘language knowledge retrieval and semantic reasoning.","description":"\"We can wander through the stacks of the Library of Alexandria, imagining the scrolls and the knowledge they contain. Its destruction is a warning: all we have is transient.вҖқ--Alberto Manguel","stars":199,"language":"Rust"},{"owner":"labarba","repo":"sciwrite","url":"https://github.com/labarba/sciwrite","readme":"# SciWrite вҖ” Manuscript Writing Review\n\nAn [Agent Skill](https://agentskills.io) that reviews scientific and engineering manuscripts for writing quality, applying the methodology from Dr. Kristin Sainani's [*Writing in the Sciences*](https://www.coursera.org/learn/sciwrite) course at Stanford (2012).\n\n## What This Skill Does\n\nClear writing is not a cosmetic concern in science; it determines whether reviewers and readers can follow your argument. Yet most graduate students receive little formal training in scientific writing, and self-editing for clarity is difficult because you already know what you meant to say.\n\nThis skill encodes a systematic editorial review process distilled from 30 video lectures on scientific writing. When loaded into an AI tool, it performs five sequential audit passes on your manuscript text:\n\n1. **Clutter extraction.** Flags dead-weight phrases, unnecessary jargon, and filler language, and provides concise replacements.\n2. **Voice and verb vitality.** Identifies passive constructions, smothered verbs (nominalizations), and weak verb choices, and suggests active alternatives.\n3. **Sentence architecture.** Evaluates sentence length, structure, and flowвҖ”flagging run-on sentences, misplaced modifiers, and paragraphs that lack a clear logical progression.\n4. **Keyword consistency.** Checks that key technical terms are used consistently throughout the manuscript, catching cases where synonyms introduce ambiguity.\n5. **Numerical and citation integrity.** Audits numerical values, units, and in-text citations for internal consistency (e.g., a value reported as 3.2 in the text but 3.4 in a table).\n\nThe skill supports four review modes: a full-manuscript review that runs all five passes, a single-section review, a targeted review that runs only the pass you specify (e.g., \"fix passive voice\"), and an interactive mode that walks through the manuscript paragraph by paragraph with before/after examples. The output is a structured report with specific findings, concrete revisions, and severity tags.\n\nImportantly, the skill does not alter scientific content, data, or technical claims. It improves how those claims are delivered.\n\n## How This Skill Was Made\n\nThe creation of this skill illustrates a three-tool workflow that combined an agentic browser, a synthesis engine, and a skill-authoring assistant.\n\n**Step 1: Extracting video URLs with an agentic browser.** The source material is a [YouTube playlist](https://www.youtube.com/playlist?list=PLVc-QdfGfSl2Ntc6CvIP83Nj_uHTSdNSw) of 30 lecture recordings from Sainani's course, posted under a Creative Commons Attribution license (CC-BY). To process them, I first needed the individual video URLs. Rather than clicking through each video's share menu 30 times, I opened the playlist in [Comet](https://comet.page) (an agentic browser by Perplexity) and instructed it to extract every URL, stripping the tracking parameters. In under a minute, the agent produced a clean list of all 30 URLs, a task that would have taken 15вҖ“20 minutes of tedious manual work.\n\n**Step 2: Synthesizing the content with NotebookLM.** I pasted all 30 URLs into a new [Google NotebookLM](https://notebooklm.google.com/) notebook. NotebookLM ingested the video transcripts as sources and, using its Studio panel, I produced a Writing Standards Manual: a comprehensive narrative document distilling the key principles from all 30 lectures into a structured reference. The output captured the core ideasвҖ”strip sentences to their cleanest components, use active voice, resurrect smothered verbs, maintain keyword consistencyвҖ”but it was formatted as a human-readable guideline, not as a machine-actionable skill file.\n\n**Step 3: Converting the guideline into a SKILL.md file with Claude.** I pasted the full Writing Standards Manual into a Claude conversation, along with instructions to produce a properly formatted `SKILL.md` following the Agent Skills conventions, and a How-To file. Claude checked the skill format structureвҖ”YAML frontmatter, Markdown body, the relationship between the description field and trigger behaviorвҖ”and produced two files: the `SKILL.md` itself, architected as an operational protocol with the five sequential audit passes and four review modes, and a companion `HOW-TO-USE.md` with installation instructions and example prompts. The skill-authoring step used Claude's built-in **skill creator** capabilities, making the process meta in the best sense: an AI tool creating instructions for an AI tool.\n\nThree different AI tools, each doing what it does best. The browser agent handled the mechanical extraction. NotebookLM handled the synthesis of 30 video transcripts into a coherent document. Claude handled the architectural work of converting a human-readable guideline into a machine-actionable skill with proper formatting.\n\n## What Is an Agent Skill?\n\nAn Agent Skill is an industry-standard format for giving AI tools reusable, domain-specific instructions. It is a Markdown file (`SKILL.md`) with a short header that tells the AI *when* to use it and a body that tells the AI *how* to perform the task.\n\nSkills were introduced by Anthropic in October 2025 and published as an [open standard](https://agentskills.io) in December 2025. They are now supported across Claude, ChatGPT, GitHub Copilot, Cursor, and other AI tools. A skill you write once works across platforms and improves over time as you refine it.\n\nThink of a skill as a detailed rubric or style guide, except the reader is an AI assistant rather than a human colleague.\n\n## How to Use This Skill\n\n### In Claude.ai (recommended starting point)\n\nThis is the simplest way to get started. No terminal or coding experience is required. There are two approaches, depending on whether you want the skill available everywhere or only within a specific project.\n\n**Option A: Install account-wide via Customize (recommended)**\n\nThis makes the skill available in all your conversations and in Cowork.\n\n1. Download this repository as a ZIP file (on the repository's main page, click the green **Code** button, then **Download ZIP**).\n2. Open [claude.ai](https://claude.ai). In the left sidebar, click **Customize** (the toolbox icon), then go to **Skills**.\n3. Click the **+** button, then **+ Create skill**, and upload the ZIP file.\n4. The skill will appear in your Skills list. Make sure its toggle is turned on.\n5. Start any conversation and ask Claude to review your writing. For example:\n\n   > Review the writing quality of my manuscript. Here is the Introduction section:\n   >\n   > [paste your text]\n\nClaude will recognize that the request matches the skill, load it, and produce a structured review report with specific findings and suggested revisions. You can also upload your manuscript as a PDF or paste individual sections.\n\n> **Note:** The ZIP file must contain the skill folder at the root level. If your ZIP contains `sciwrite/SKILL.md` (not just a loose `SKILL.md`), you're set.\n\n**Option B: Add to a specific Project's knowledge base**\n\nIf you prefer to limit the skill to a particular project (for example, a project dedicated to a specific manuscript):\n\n1. Download the `SKILL.md` file from this repository.\n2. Open or create a **Project** in Claude.ai.\n3. In the Project's knowledge base, click **Add content** and upload the `SKILL.md` file.\n4. Start a conversation inside that Project and ask Claude to review your writing.\n\nThis approach keeps the skill scoped to one project, which is useful if you are working on multiple manuscripts with different conventions.\n\n### In Claude Code (terminal agent)\n\nPlace `SKILL.md` in `.claude/skills/manuscript-review/` inside your manuscript project directory, then launch Claude Code and ask for a review. See [`HOW-TO-USE.md`](HOW-TO-USE.md) for full setup instructions, example prompts, and tips for each review mode.\n\n### In Claude's Cowork (desktop agent)\n\nIf you installed the skill account-wide via Customize (Option A above), it is already available in CoworkвҖ”no additional setup needed.\n\nIf you prefer to work with the file directly, you can also place the `SKILL.md` file in the folder you point Cowork at (or in a subfolder). Then ask Cowork to review a manuscript file in that same folder:\n\n   > Review the writing quality of the manuscript draft in this folder.\n\n### In ChatGPT\n\nBecause OpenAI has adopted the Agent Skills standard, you can use this skill in ChatGPT through a Custom GPT:\n\n1. Open the `SKILL.md` file and copy its full contents (everything below the closing `---` of the header).\n2. Go to [chat.openai.com](https://chat.openai.com), click your profile icon, then **My GPTs** вҶ’ **Create a GPT**.\n3. In the **Configure** tab, paste the contents of the skill into the **Instructions** field. You may also want to add the YAML header's description text at the top so the GPT knows when to apply these instructions.\n4. Name the GPT something like \"SciWrite Reviewer\" and save it.\n5. Open the GPT and paste your manuscript text.\n\nThe output format and reasoning will follow the same structure as in Claude.\n\n### In Google Gemini\n\nGemini does not yet natively support the SKILL.md format, but you can achieve a similar result using a **Gem** (Gemini's equivalent of a custom assistant):\n\n1. Open [gemini.google.com](https://gemini.google.com) and navigate to **Gems** (in the left sidebar, or via the Gem manager).\n2. Create a new Gem. In the instructions field, paste the full body of the `SKILL.md` file (everything after the YAML header).\n3. Save the Gem and open a conversation with it.\n4. Paste your manuscript text and ask for a writing review.\n\n### General approach for any AI tool\n\nIf your preferred AI tool is not listed above, the pattern is the same:\n\n1. Find the tool's mechanism for persistent instructions (custom assistants, system prompts, project instructions, or similar).\n2. Paste the contents of `SKILL.md` into that mechanism.\n3. Provide your manuscript text and ask for a review.\n\nThe skill is plain Markdown with no dependencies on any specific platform. It works wherever you can give an AI tool a block of instructions to follow.\n\n## Tips for Getting Good Results\n\n**Provide enough text for context.** A single isolated sentence is hard to review for keyword consistency or logical flow. A full section or chapter gives the skill enough material to identify patternsвҖ”repeated nominalizations, inconsistent terminology, or structural problems that span multiple paragraphs.\n\n**Specify the review mode if you have a specific need.** If you already know your weakness is passive voice, ask for a targeted review rather than a full pass. This produces faster, more focused feedback.\n\n**Use the interactive mode for learning.** The paragraph-by-paragraph mode shows before/after revisions with explanations вҖ” useful for building long-term writing habits, not just fixing a single draft.\n\n**Review the output critically.** The skill produces well-structured editorial feedback, but your domain expertise is the final quality check. Occasionally a \"smothered verb\" that the skill flags is actually the standard term in your field (e.g., \"polymerization\" is not a nominalization that needs fixing). Use your judgment.\n\n**Iterate.** If a suggested revision changes your intended meaning, tell the AI why and ask it to try again. The skill's structured reasoning means the AI can explain *why* it flagged a particular sentence, which makes it easy to have a productive back-and-forth.\n\n## Customizing the Skill\n\nThe skill encodes general principles of scientific writing clarity. You can extend it with discipline-specific or journal-specific conventions. For example, if your target journal has specific style requirements, you could add a section like:\n\n```markdown\n## Journal-Specific Conventions\n\nTarget journal: Journal of Fluid Mechanics (JFM)\n- Use \"figure\" (lowercase) in running text; \"Figure\" only at the start of a sentence.\n- Equations are referenced as (1), not Eq. (1), unless at the start of a sentence.\n- Use Oxford commas.\n- Abbreviations must be defined at first use in the abstract AND again at first use in the body text.\n```\n\nYou can also adjust the severity thresholds, add or remove entries from the clutter-phrase lookup table, or modify the review modes to match your workflow.\n\n## Contributing\n\nIf you use this skill and find an edge case it doesn't handle wellвҖ”a field-specific writing convention it misjudges, a common clutter pattern it misses, or a false positive that comes up repeatedlyвҖ”contributions are welcome. Open an issue describing the case, or submit a pull request with your proposed change.\n\n## License\n\nThis skill is licensed under [CC BY 4.0](https://creativecommons.org/licenses/by/4.0/). You are free to use, adapt, and share it, with attribution.\n\nThe source materialвҖ”Dr. Kristin Sainani's *Writing in the Sciences* video lecturesвҖ”is published under a [Creative Commons Attribution (CC-BY)](https://creativecommons.org/licenses/by/4.0/) license.\n\n## Acknowledgments\n\nDeveloped as part of the course [MAE 6291: Generative AI for Engineering Research](https://generative-ai-engineerin-u4bkjgp.gamma.site) at the George Washington University School of Engineering and Applied Science, and shared through the [GW Engineering AI Academy](https://www.seas.gwu.edu/ai-academy).\n\nThe writing methodology encoded in this skill is drawn from Dr. Kristin Sainani's [*Writing in the Sciences*](https://www.coursera.org/learn/sciwrite) course at Stanford University. The original video lectures are available on [YouTube](https://www.youtube.com/playlist?list=PLVc-QdfGfSl2Ntc6CvIP83Nj_uHTSdNSw) under a CC-BY license.\n","summary":"SciWrite is an Agent Skill that automates a systematic editorial review of scientific and engineering manuscripts, applying the principles from Dr. Kristin SainaniвҖҷs *Writing in the Sciences* course. It performs five sequential passesвҖ”clutter removal, voice and verb improvement, sentence architecture, keyword consistency, and numerical/citation integrityвҖ”offering full, sectionвҖ‘level, targeted, or interactive reviews with detailed findings and revision suggestions. The skill produces a structured report with severity tags but never alters the underlying data or scientific claims, ensuring content integrity. Graduate students, postdocs, and earlyвҖ‘career researchers can use SciWrite to polish their writing so itвҖҷs clearer, more concise, and easier for reviewers and readers to follow.","description":"Agent Skill for AI-assisted manuscript writing review, based on Dr. Kristin Sainani's \"Writing in the Sciences\" methodology.","stars":554,"language":null}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = 'вҳ… ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
