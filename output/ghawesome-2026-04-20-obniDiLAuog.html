oduction-ready animations, transitions, backgrounds, and scenes for Remotion. A shadcn registry that lets you `npx shadcn add` polished video components into any Remotion project. Built for solo builders shipping demo videos fast","stars":320,"language":"TypeScript"},{"owner":"pithings","repo":"coderaft","url":"https://github.com/pithings/coderaft","readme":"# рҹӣ¶ coderaft\n\n[![npm version](https://img.shields.io/npm/v/coderaft?color=blue)](https://npmx.dev/package/coderaft)\n[![install size](https://packagephobia.com/badge?p=coderaft)](https://packagephobia.com/result?p=coderaft)\n\nRun VS Code on any machine anywhere and access it in the browser.\n\nA redistribution of [coder/code-server](https://github.com/coder/code-server) bundled into a single zero-dependency package (**~25 MB**). Native modules are shimmed with better alternatives ([zigpty](https://github.com/pithings/zigpty), [ripgrep-node](https://github.com/pithings/ripgrep-node), [...more](./shims/README.md)).\n\n- **Installs in under a second** вҖ” no build tools, post-install scripts, or C/C++ toolchain needed\n- **Fully portable** across platforms and architectures, unlike `code-server` (platform-specific binaries) and `openvscode-server` (Linux only)\n- **Works everywhere** Node.js runs, including minimal images like `node:slim` and `node:alpine`\n\n<details>\n<summary>Detailed comparison</summary>\n\nCompared to [`code-server`](https://www.npmjs.com/package/code-server) and [`openvscode-server`](https://github.com/gitpod-io/openvscode-server):\n\n|                             | **coderaft** | **code-server**                           | **openvscode-server**            | **VS Code (DMG)**                |\n| --------------------------- | ------------ | ----------------------------------------- | -------------------------------- | -------------------------------- |\n| Distribution                | **npm**      | npm                                       | GitHub tarball (not on npm)      | Platform installer (DMG/EXE/deb) |\n| Network download            | **31 MB**    | 273 MB                                    | ~73 MB                           | 155 MB                           |\n| Install size on disk\\*      | **32 MB**    | 776 MB                                    | 224 MB                           | 529 MB                           |\n| Install time                | **~0.5s**    | ~15s                                      | ~1.2s                            | N/A                              |\n| Dependencies                | **0**        | 462                                       | Bundled                          | Bundled                          |\n| Build tools required        | **No**       | Yes (`node-gyp`, `gcc`, `make`, `python`) | No (pre-built)                   | No (pre-built)                   |\n| Post-install scripts        | **None**     | Yes (`--unsafe-perm` required as root)    | N/A                              | N/A                              |\n| Works on `node:slim` images | **Yes**      | No                                        | N/A (bundles own Node.js)        | N/A (desktop app)                |\n| Fully portable              | **Yes**      | No (platform-specific compiled binaries)  | No (Linux only, x64/arm64/armhf) | No (platform-specific)           |\n\n> Measured with `npm i` inside a fresh `node:22` Docker container.\n>\n> \\*Before temporary decompression on first server start (~200 MB decompressed in a temp directory < 2s).\n\n</details>\n\n## CLI\n\nStart an instance:\n\n```sh\nnpx coderaft -o .\n```\n\n### Docker\n\n```sh\ndocker run -it --rm -p 6063:6063 -v coderaft:/data ghcr.io/pithings/coderaft\n```\n\nBased on Alpine with Node.js LTS, bash, corepack (npm/pnpm/yarn) (~65 MB download, ~89 MB final). Data persists in `/data` volume (`/data/workspace` for project files, `/data/home` symlinked to `/root` for configs).\n\n## Programmatic\n\n```ts\nimport { startCodeServer } from \"coderaft\";\n\nconst instance = await startCodeServer({\n  port: 6063,\n  host: \"127.0.0.1\",\n  defaultFolder: \"/path/to/workspace\",\n  // connectionToken: \"my-secret\", // disabled for localhost, auto-generated otherwise\n});\n\nconsole.log(`Ready at ${instance.url}`);\n\n// Later:\nawait instance.close();\n```\n\n### Middleware\n\nUse `createCodeServer` to get a request handler without starting a listener. This lets you integrate code-server into any existing Node.js HTTP server or framework:\n\n```ts\nimport { createServer } from \"node:http\";\nimport { createCodeServer } from \"coderaft\";\n\nconst handler = await createCodeServer({\n  defaultFolder: \"/path/to/workspace\",\n});\n\nconst server = createServer((req, res) => {\n  handler.handleRequest(req, res);\n});\n\nserver.on(\"upgrade\", (req, socket) => {\n  handler.handleUpgrade(req, socket);\n});\n\nserver.listen(3000);\n```\n\n### `createCodeServer(options)`\n\nCreates a code-server handler without binding to a port.\n\n| Option            | Type                  | Description                                                                  |\n| ----------------- | --------------------- | ---------------------------------------------------------------------------- |\n| `defaultFolder`   | `string`              | Workspace folder opened when no input is given in the URL.                   |\n| `connectionToken` | `string`              | Shared auth secret. Disabled for localhost, auto-generated for remote hosts. |\n| `host`            | `string`              | Host/interface to bind. Used to infer whether to require a token.            |\n| `vscode`          | `VSCodeServerOptions` | Extra options forwarded to VS Code's internal `createServer()`.              |\n\nReturns a `CodeServerHandler`:\n\n```ts\ninterface CodeServerHandler {\n  handleRequest(req: IncomingMessage, res: ServerResponse): void;\n  handleUpgrade(req: IncomingMessage, socket: Duplex): void;\n  connectionToken: string;\n  dispose(): Promise<void>;\n}\n```\n\n### `startCodeServer(options)`\n\nConvenience wrapper around `createCodeServer` that creates an HTTP server and starts listening.\n\nAccepts all `createCodeServer` options plus:\n\n| Option | Type     | Description                                           |\n| ------ | -------- | ----------------------------------------------------- |\n| `port` | `number` | TCP port to listen on. Defaults to `$PORT` or `6063`. |\n\nReturns a `CodeServerHandle`:\n\n```ts\ninterface CodeServerHandle {\n  server: http.Server;\n  port: number;\n  url: string;\n  connectionToken: string;\n  close(): Promise<void>;\n}\n```\n\n## CLI Options\n\n### Server\n\n| Option                        | Description                                         |\n| ----------------------------- | --------------------------------------------------- |\n| `-p, --port <port>`           | Port to listen on (default: `$PORT` or `6063`)      |\n| `-H, --host <host>`           | Host/interface to bind                              |\n| `--base-url <path>`           | Base URL the server is mounted under (default: `/`) |\n| `--socket-path <path>`        | Path to a socket file to listen on                  |\n| `--print-startup-performance` | Print startup timing to stdout                      |\n\n### Auth\n\n> [!NOTE]\n> When binding to `localhost` / `127.0.0.1` (or no `--host`), the connection token is **disabled by default** for convenience. When binding to any other host, a token is auto-generated unless `--without-connection-token` is explicitly passed. You can always override by providing `--token` or `--connection-token`.\n\n| Option                           | Description                                           |\n| -------------------------------- | ----------------------------------------------------- |\n| `-t, --token <token>`            | Connection token for auth (shorthand)                 |\n| `--connection-token <token>`     | Connection token for auth (auto-generated if omitted) |\n| `--connection-token-file <path>` | Path to file containing the connection token          |\n| `--without-connection-token`     | Disable connection token auth                         |\n| `--auth <type>`                  | Auth type                                             |\n| `--github-auth <token>`          | GitHub auth token                                     |\n\n### Defaults\n\n| Option                       | Description                      |\n| ---------------------------- | -------------------------------- |\n| `--default-folder <path>`    | Default workspace folder         |\n| `--default-workspace <path>` | Default workspace file           |\n| `--locale <locale>`          | The locale to use (e.g. `en-US`) |\n\n### Data Directories\n\n| Option                             | Description                   |\n| ---------------------------------- | ----------------------------- |\n| `--server-data-dir <path>`         | Server data directory         |\n| `--user-data-dir <path>`           | User data directory           |\n| `--extensions-dir <path>`          | Extensions directory          |\n| `--extensions-download-dir <path>` | Extensions download directory |\n| `--builtin-extensions-dir <path>`  | Built-in extensions directory |\n| `--agent-plugins-dir <path>`       | Agent plugins directory       |\n\n### Logging\n\n| Option               | Description                                                              |\n| -------------------- | ------------------------------------------------------------------------ |\n| `--log <level>`      | Log level (`off`, `critical`, `error`, `warn`, `info`, `debug`, `trace`) |\n| `--logs-path <path>` | Logs output directory                                                    |\n\n### Network\n\n| Option                            | Description                   |\n| --------------------------------- | ----------------------------- |\n| `--disable-websocket-compression` | Disable WebSocket compression |\n| `--use-host-proxy`                | Enable host proxy             |\n\n### Files\n\n| Option                        | Description                   |\n| ----------------------------- | ----------------------------- |\n| `--disable-file-downloads`    | Disable file downloads        |\n| `--disable-file-uploads`      | Disable file uploads          |\n| `--file-watcher-polling <ms>` | File watcher polling interval |\n\n### Telemetry\n\n| Option                      | Description                                      |\n| --------------------------- | ------------------------------------------------ |\n| `--telemetry-level <level>` | Telemetry level (`off`, `crash`, `error`, `all`) |\n| `--disable-telemetry`       | Disable telemetry                                |\n| `--disable-update-check`    | Disable update check                             |\n| `--disable-experiments`     | Disable experiments                              |\n\n### Features\n\n| Option                               | Description                                       |\n| ------------------------------------ | ------------------------------------------------- |\n| `--enable-sync`                      | Enable settings sync                              |\n| `--enable-proposed-api <ext-id>`     | Enable proposed API for an extension (repeatable) |\n| `--disable-workspace-trust`          | Disable workspace trust                           |\n| `--disable-getting-started-override` | Disable getting started override                  |\n\n### Remote\n\n| Option                                 | Description                                           |\n| -------------------------------------- | ----------------------------------------------------- |\n| `--enable-remote-auto-shutdown`        | Enable remote auto shutdown                           |\n| `--remote-auto-shutdown-without-delay` | Auto shutdown without delay                           |\n| `--without-browser-env-var`            | Disable browser env var                               |\n| `--reconnection-grace-time <sec>`      | Reconnection grace time in seconds (default: `10800`) |\n\n### Agent Host\n\n| Option                     | Description                      |\n| -------------------------- | -------------------------------- |\n| `--agent-host-path <path>` | Agent host WebSocket socket path |\n| `--agent-host-port <port>` | Agent host WebSocket port        |\n\n### Shell\n\n| Option                     | Description                             |\n| -------------------------- | --------------------------------------- |\n| `--force-disable-user-env` | Force disable user shell env resolution |\n| `--force-user-env`         | Force user shell env resolution         |\n\n### Other\n\n| Option       | Description                                            |\n| ------------ | ------------------------------------------------------ |\n| `--no-fork`  | Run server in the main process (no subprocess)         |\n| `--no-tui`   | Disable interactive terminal UI (alt screen with logs) |\n| `-o, --open` | Open in browser on startup                             |\n\n### Debugging\n\n| Option                             | Description                         |\n| ---------------------------------- | ----------------------------------- |\n| `--inspect-ptyhost <port>`         | Inspect pty host                    |\n| `--inspect-brk-ptyhost <port>`     | Inspect pty host (break on start)   |\n| `--inspect-agenthost <port>`       | Inspect agent host                  |\n| `--inspect-brk-agenthost <port>`   | Inspect agent host (break on start) |\n| `--enable-smoke-test-driver`       | Enable smoke test driver            |\n| `--crash-reporter-directory <dir>` | Crash reporter directory            |\n| `--crash-reporter-id <id>`         | Crash reporter ID                   |\n\n## Sponsors\n\n<p align=\"center\">\n  <a href=\"https://sponsors.pi0.io/\">\n    <img src=\"https://sponsors.pi0.io/sponsors.svg?xyz\">\n  </a>\n</p>\n\n## License\n\nMIT, with bundled third-party packages. See [lib/LICENSE.md](./lib/LICENSE.md).\n","summary":"coderaft is an npmвҖ‘packaged, zeroвҖ‘dependency distributor of VSвҖҜCodeвҖҷs вҖңcodeвҖ‘serverвҖқ that lets you run a webвҖ‘based IDE on any machine where NodeвҖҜJS is available. It installs in under a second, needs no build tools or postвҖ‘install scripts, and is fully portable across OSes and architectures, even on minimal images like `node:alpine`. Key features include a lightweight (~25вҖҜMB) download, programmatic APIs for starting and stopping instances, a readyвҖ‘made Docker image, and native module shims that replace heavy C/C++ dependencies. Developers and teams that need quick, reproducible, browserвҖ‘based VSвҖҜCode services in CI/CD pipelines, lowвҖ‘resource environments, or containers will benefit most from coderaft.","description":"рҹӣ¶ Run VS Code on any machine anywhere and access it in the browser (25MB npm pkg)","stars":166,"language":"JavaScript"},{"owner":"xicilion","repo":"boxsh","url":"https://github.com/xicilion/boxsh","readme":"# boxsh\n\nA sandboxed POSIX shell and MCP server, built on [dash 0.5.12](http://gondor.apana.org.au/~herbert/dash/).\n\nboxsh works as a **command-line shell** and as an **MCP (Model Context Protocol) server** for AI agents. OS-native sandbox isolation is baked in вҖ” give an AI agent, build system, or orchestration layer a shell that can execute arbitrary commands while constraining exactly what it can see and modify.\n\n**Core capabilities:**\n\n- **AI agent sandbox** вҖ” MCP-compatible server that AI clients (VS Code, Claude Desktop, Cursor, etc.) connect to directly. The agent gets `bash`, `read`, `write`, and `edit` tools inside an isolated environment.\n- **Copy-on-write workspace** вҖ” overlay any directory as a COW workspace. The agent reads and writes freely; all modifications land in a separate destination directory. The original is never touched.\n- **Interactive sandboxed shell** вҖ” `boxsh --try` drops you into a root shell over your current directory with COW. Experiment freely; discard everything on exit.\n- **Parallel isolated workers** вҖ” pre-forked worker pool with configurable concurrency. Crash recovery, per-request timeout, out-of-order response streaming.\n\nFor a scenario-driven walkthrough with examples, see the **[Usage Guide](docs/usage.md)**.\n\n---\n\n## Features\n\n| Feature | Details |\n|---|---|\n| **MCP server** | Implements MCP (Model Context Protocol) over stdio with Content-Length framing or newline-delimited JSON. Nine tools: `bash`, `read`, `write`, `edit`, `run_in_terminal`, `send_to_terminal`, `get_terminal_output`, `kill_terminal`, `list_terminals` вҖ” each with `inputSchema` and `annotations`. |\n| **OS-native sandbox** | Linux: user/mount/PID/network namespaces via direct syscalls + seccomp syscall filtering; macOS: Seatbelt (sandbox_init) + SBPL profiles вҖ” no external tools required |\n| **Overlay filesystem** | Copy-on-write workspace over any read-only base; writes accumulate in a caller-managed destination directory and persist between commands |\n| **Built-in file tools** | `read` (text with offset/limit, binary as base64 with MIME detection), `write` (create or overwrite, auto-creates parent dirs), and `edit` (multi-replacement with unified diff) run on background threads вҖ” the event loop is never blocked |\n| **JSON-RPC 2.0** | Dual transport: Content-Length framed (LSP-style) or newline-delimited JSON over stdin/stdout |\n| **Pre-forked worker pool** | Configurable number of workers (`--workers N`); each worker is forked once and reused across requests |\n| **Crash recovery** | If a worker is killed (timeout, segfault, OOM), the coordinator detects `POLLHUP`, returns an error response, and immediately respawns a replacement |\n| **Per-request timeout** | `timeout` argument on the `bash` tool; enforced via `alarm(2)` inside the worker |\n| **Bind mounts** | Selectively expose host paths (read-write or read-only) inside the sandbox |\n| **Drop-in `/bin/sh`** | Shell mode delegates to embedded dash 0.5.12 вҖ” any script or flag that works with POSIX sh works here |\n| **Single static binary** | dash, nlohmann/json, and libedit are vendored; no runtime dependencies beyond the OS kernel |\n\n---\n\n## Overview\n\nboxsh has three modes:\n\n| Mode | How to start | What it does |\n|---|---|---|\n| **Shell mode** | `boxsh` (default) | Drop-in `dash` replacement вҖ” interactive shell, `-c`, script files |\n| **MCP / RPC mode** | `boxsh --rpc` | MCP server over stdio. Reads JSON-RPC 2.0 requests, executes tools via a pre-forked worker pool, writes JSON-RPC 2.0 responses. |\n| **Quick-try** | `boxsh --try` | Drop into a sandboxed root shell on your CWD; writes go to a temp directory вҖ” original directory untouched |\n\nIn any mode, an optional OS-native sandbox can be enabled with `--sandbox`.\n\n---\n\n## Installation\n\n### One-line install (Linux / macOS)\n\n```sh\ncurl -fsSL https://raw.githubusercontent.com/xicilion/boxsh/master/install.sh | sh\n```\n\nThis auto-detects your OS and architecture, downloads the latest release binary, and installs it to `/usr/local/bin`.\n\nOptions via environment variables:\n\n```sh\n# Install a specific version\nBOXSH_VERSION=v1.0.0 curl -fsSL https://raw.githubusercontent.com/xicilion/boxsh/master/install.sh | sh\n\n# Install to a custom directory\nBOXSH_INSTALL=~/.local/bin curl -fsSL https://raw.githubusercontent.com/xicilion/boxsh/master/install.sh | sh\n```\n\nSupported platforms: Linux (x64, ia32, arm64, arm, mips64, ppc64, riscv64, loong64) and macOS (arm64, x86_64).\n\n### Build from source\n\n**Requirements:** CMake вүҘ 3.16, GCC or Clang (C11 / C++17). Supported platforms: Linux (kernel вүҘ 3.8) and macOS (вүҘ 10.12).\n\n```sh\ncmake -B build\ncmake --build build\n# binary: build/boxsh\n```\n\n---\n\n## Quick try\n\nThe fastest way to get started:\n\n```sh\ncd my-project\nboxsh --try\n```\n\nThis drops you into a **root shell inside a copy-on-write sandbox** over your current directory. Writes go to a temporary directory; your real directory is never modified.\n\n```\n$ boxsh --try\nboxsh: changes will be saved in /tmp/boxsh-try-abc123/work\n# <sandboxed root shell вҖ” experiment freely>\n$ rm important-file.txt\n$ exit\n$ ls important-file.txt   # still here on the host\nimportant-file.txt\n$ ls /tmp/boxsh-try-abc123/work/\n.wh.important-file.txt   # the whiteout lives here, not in your directory\n```\n\nThe temp directory persists after exit so you can inspect or archive exactly what changed. `--try` is shorthand for `--sandbox --bind cow:CWD:<tmpdir>/work` with auto-managed directories. See [Quick-try Mode](docs/usage.md#quick-try-mode) for the full reference.\n\n---\n\n## Shell mode\n\nDelegates to the embedded dash interpreter. Any flag or script that works with `/bin/sh` works here.\n\n```sh\nboxsh                        # interactive shell (with line editing via libedit)\nboxsh -c 'echo hello'        # run a command string\nboxsh script.sh arg1 arg2    # run a script\n```\n\nSandbox flags apply immediately before the shell starts:\n\n```sh\nboxsh --sandbox --new-net-ns -c 'curl example.com'  # network isolated\n```\n\n---\n\n## MCP server\n\nboxsh implements [MCP (Model Context Protocol)](https://modelcontextprotocol.io/) over stdio. Any MCP-compatible client can connect to it directly as a sandboxed code execution server.\n\n```sh\nboxsh --rpc [--workers N] [--shell PATH] [sandbox flags...]\n```\n\n### Transport\n\nboxsh supports two JSON-RPC 2.0 transports, auto-detected from the first bytes:\n\n| Transport | Format | Used by |\n|---|---|---|\n| **Content-Length framed** | `Content-Length: N\\r\\n\\r\\nJSON` | VS Code, most MCP clients |\n| **Newline-delimited** | One JSON object per line | CLI testing, piped input |\n\n### MCP methods\n\n| Method | Description |\n|---|---|\n| `initialize` | Returns server capabilities and protocol version |\n| `notifications/initialized` | Acknowledged silently (no response) |\n| `tools/list` | Returns all nine tools with `inputSchema` and `annotations` |\n| `tools/call` | Dispatches to a named tool: `bash`, `read`, `write`, `edit` |\n\n### Tools\n\n#### `bash` вҖ” Execute a shell command\n\n```json\n{\"jsonrpc\":\"2.0\", \"id\":\"1\", \"method\":\"tools/call\",\n \"params\":{\"name\":\"bash\", \"arguments\":{\"command\":\"echo hello\", \"timeout\":10}}}\n```\n\nResponse (MCP `CallToolResult` format):\n\n```json\n{\"jsonrpc\":\"2.0\", \"id\":\"1\", \"result\":{\n  \"content\":[{\"type\":\"text\", \"text\":\"hello\\n\"}],\n  \"structuredContent\":{\"exit_code\":0, \"stdout\":\"hello\\n\", \"stderr\":\"\", \"duration_ms\":3}\n}}\n```\n\n- `content` вҖ” text representation for the LLM\n- `structuredContent` вҖ” typed fields (`exit_code`, `stdout`, `stderr`, `duration_ms`)\n- `isError: true` вҖ” set when `exit_code != 0` or the command fails\n\n#### `read` вҖ” Read a file\n\n```json\n{\"jsonrpc\":\"2.0\", \"id\":\"2\", \"method\":\"tools/call\",\n \"params\":{\"name\":\"read\", \"arguments\":{\"path\":\"/etc/hostname\", \"offset\":1, \"limit\":10}}}\n```\n\n`offset` (1-indexed start line) and `limit` (max lines) are optional for text files. Binary files are automatically detected and returned as base64 with `encoding: \"base64\"` and a `mime_type` field. `structuredContent` includes `truncated` and `line_count` (text) or `size` (binary).\n\n#### `write` вҖ” Create or overwrite a file\n\n```json\n{\"jsonrpc\":\"2.0\", \"id\":\"3\", \"method\":\"tools/call\",\n \"params\":{\"name\":\"write\", \"arguments\":{\"path\":\"/tmp/hello.txt\", \"content\":\"hello\\n\"}}}\n```\n\nCreates or overwrites the file. Parent directories are created automatically if needed.\n\n#### `edit` вҖ” Search-and-replace edit\n\n```json\n{\"jsonrpc\":\"2.0\", \"id\":\"4\", \"method\":\"tools/call\",\n \"params\":{\"name\":\"edit\", \"arguments\":{\"path\":\"config.ini\",\n   \"edits\":[{\"oldText\":\"debug = false\", \"newText\":\"debug = true\"}]}}}\n```\n\nEach `oldText` must appear exactly once in the original file. Edits must not overlap. `structuredContent` includes `diff` (unified diff) and `firstChangedLine`.\n\n#### `run_in_terminal` вҖ” Start a persistent PTY session\n\n```json\n{\"jsonrpc\":\"2.0\", \"id\":\"5\", \"method\":\"tools/call\",\n \"params\":{\"name\":\"run_in_terminal\", \"arguments\":{\"command\":\"bash\"}}}\n```\n\nStarts a PTY session running the given command. Returns `{ id, output, exited, exit_code }` вҖ” `id` is used by the other terminal tools.\n\n#### `send_to_terminal` вҖ” Send input to a PTY session\n\n```json\n{\"jsonrpc\":\"2.0\", \"id\":\"6\", \"method\":\"tools/call\",\n \"params\":{\"name\":\"send_to_terminal\", \"arguments\":{\"id\":\"<session-id>\", \"command\":\"ls -la\\n\"}}}\n```\n\nWrites text to the session's stdin, waits up to 500 ms, and returns the updated screen snapshot with `{ output, exited, exit_code }`.\n\n#### `get_terminal_output` вҖ” Poll for new output\n\n```json\n{\"jsonrpc\":\"2.0\", \"id\":\"7\", \"method\":\"tools/call\",\n \"params\":{\"name\":\"get_terminal_output\", \"arguments\":{\"id\":\"<session-id>\"}}}\n```\n\nWaits up to 500 ms for new output, then returns the current screen snapshot. Use this to poll long-running commands until `exited` is `true`.\n\n#### `kill_terminal` вҖ” Terminate a PTY session\n\n```json\n{\"jsonrpc\":\"2.0\", \"id\":\"8\", \"method\":\"tools/call\",\n \"params\":{\"name\":\"kill_terminal\", \"arguments\":{\"id\":\"<session-id>\"}}}\n```\n\nSends SIGHUP, drains output, and frees resources. Returns the final screen snapshot.\n\n#### `list_terminals` вҖ” List active sessions\n\n```json\n{\"jsonrpc\":\"2.0\", \"id\":\"9\", \"method\":\"tools/call\",\n \"params\":{\"name\":\"list_terminals\", \"arguments\":{}}}\n```\n\nReturns metadata for all live and recently-exited sessions.\n\n### Error model\n\nboxsh distinguishes two kinds of errors per the MCP spec:\n\n| Error type | Serialization | Example |\n|---|---|---|\n| **Protocol error** | JSON-RPC `{\"error\": {\"code\": N, \"message\": \"...\"}}` | Invalid JSON, unknown method, unknown tool |\n| **Tool execution error** | `{\"result\": {\"content\": [...], \"isError\": true}}` | Non-zero exit code, file not found |\n\n### Client configuration\n\n`--sandbox` enforces minimal privileges вҖ” only system directories are accessible. You must explicitly `--bind` any project directories the agent needs.\n\n**VS Code** (`.vscode/mcp.json`):\n\n```json\n{\n  \"servers\": {\n    \"boxsh\": {\n      \"command\": \"boxsh\",\n      \"args\": [\n        \"--rpc\", \"--workers\", \"4\",\n        \"--sandbox\", \"--bind\", \"ro:${workspaceFolder}\"\n      ]\n    }\n  }\n}\n```\n\n**Claude Desktop** (`claude_desktop_config.json`):\n\n```json\n{\n  \"mcpServers\": {\n    \"boxsh\": {\n      \"command\": \"boxsh\",\n      \"args\": [\n        \"--rpc\", \"--workers\", \"4\",\n        \"--sandbox\", \"--bind\", \"cow:/path/to/project:/path/to/dst\"\n      ]\n    }\n  }\n}\n```\n\n**Cursor** (`.cursor/mcp.json`):\n\n```json\n{\n  \"mcpServers\": {\n    \"boxsh\": {\n      \"command\": \"boxsh\",\n      \"args\": [\n        \"--rpc\", \"--workers\", \"4\",\n        \"--sandbox\", \"--bind\", \"cow:/path/to/project:/path/to/dst\"\n      ]\n    }\n  }\n}\n```\n\n**Bind modes:** `cow:SRC:DST` (copy-on-write вҖ” project is read-only, writes go to DST), `ro:PATH` (read-only), `wr:PATH` (direct read-write). Add `--new-net-ns` to block network access.\n\n### Sandboxing third-party MCP servers\n\nboxsh can wrap **any** MCP server command to sandbox it вҖ” no changes to the server itself are required. Simply replace the original `command` with `boxsh` and prepend sandbox flags before `--`:\n\n**Before** (unsandboxed):\n\n```json\n{\n  \"servers\": {\n    \"some-mcp\": {\n      \"command\": \"npx\",\n      \"args\": [\"-y\", \"@anthropic/some-mcp-server\"]\n    }\n  }\n}\n```\n\n**After** (sandboxed via boxsh):\n\n```json\n{\n  \"servers\": {\n    \"some-mcp\": {\n      \"command\": \"boxsh\",\n      \"args\": [\n        \"--sandbox\",\n        \"--bind\", \"ro:/path/to/project\",\n        \"--new-net-ns\",\n        \"--\", \"npx\", \"-y\", \"@anthropic/some-mcp-server\"\n      ]\n    }\n  }\n}\n```\n\nboxsh launches the original MCP server inside an isolated namespace. The server still communicates over stdio as usual, but its filesystem and network access are restricted by the sandbox. This works with any MCP server that uses stdio transport.\n\n### Handshake example\n\n```sh\nprintf '%s\\n' \\\n  '{\"jsonrpc\":\"2.0\",\"id\":\"1\",\"method\":\"initialize\",\"params\":{}}' \\\n  '{\"jsonrpc\":\"2.0\",\"method\":\"notifications/initialized\"}' \\\n  '{\"jsonrpc\":\"2.0\",\"id\":\"2\",\"method\":\"tools/list\"}' \\\n  '{\"jsonrpc\":\"2.0\",\"id\":\"3\",\"method\":\"tools/call\",\"params\":{\"name\":\"bash\",\"arguments\":{\"command\":\"echo hello\"}}}' \\\n| boxsh --rpc --workers 1\n```\n\n### Concurrency\n\nMultiple requests sent at once are dispatched to different workers and execute in parallel. Responses arrive in completion order вҖ” fast commands don't wait for slow ones.\n\n```sh\nprintf '%s\\n' \\\n  '{\"jsonrpc\":\"2.0\",\"id\":\"slow\",\"method\":\"tools/call\",\"params\":{\"name\":\"bash\",\"arguments\":{\"command\":\"sleep 0.5; echo slow\"}}}' \\\n  '{\"jsonrpc\":\"2.0\",\"id\":\"fast\",\"method\":\"tools/call\",\"params\":{\"name\":\"bash\",\"arguments\":{\"command\":\"echo fast\"}}}' \\\n| boxsh --rpc --workers 2\n# \"fast\" response arrives first, then \"slow\"\n```\n\nFile tool requests (`read`, `write`, `edit`) and terminal tool requests run on background threads and do not occupy a worker slot.\n\n---\n\n## Options reference\n\n```\nUsage: boxsh [OPTIONS] [-- shell-args...]\n\nModes:\n  (default)            Run as an ordinary POSIX shell (delegates to dash).\n  --rpc                Read JSON-RPC 2.0 requests from stdin, write responses to stdout. MCP-compatible.\n\nRPC options:\n  --workers N          Number of pre-forked worker processes (default: 4).\n  --shell PATH         Shell binary used by workers (default: /bin/sh).\n\nSandbox options (applied in both shell mode and RPC mode):\n  --sandbox            Enable the sandbox.\n  --new-net-ns         Create a new network namespace (loopback only).\n  --bind ro:PATH       Expose PATH read-only inside the sandbox.\n  --bind wr:PATH       Expose PATH read-write inside the sandbox.\n  --bind cow:SRC:DST   Mount an overlayfs at DST with SRC as the read-only\n                       base.  Writes go to DST (the upper layer); SRC is\n                       never modified.  DST must exist before launch.\n\nQuick-try mode:\n  --try                Launch a sandboxed shell on the current directory.\n                       Mounts the current directory as a copy-on-write overlay\n                       so all writes are captured in a temporary directory.\n```\n\n---\n\n## Sandbox\n\nPass `--sandbox` to enable OS-native sandbox isolation. The sandbox is applied once per worker at fork time (RPC mode) or immediately before the shell starts (shell mode).\n\n```sh\n# RPC mode вҖ” all workers share the same isolated environment\nboxsh --rpc --workers 4 --sandbox --new-net-ns\n\n# Shell mode вҖ” sandbox applied before dash starts\nboxsh --sandbox --bind wr:/data -c 'ls /'\n```\n\n**What each flag does:**\n\n| Flag | Effect |\n|---|---|\n| `--sandbox` | Isolated environment; only system directories accessible; all project access requires explicit `--bind`; current UID mapped as root inside (Linux) |\n| `--new-net-ns` | Loopback-only; outbound network blocked |\n| `--bind ro:PATH` | Expose a host path read-only inside the sandbox |\n| `--bind wr:PATH` | Expose a host path read-write inside the sandbox |\n| `--bind cow:SRC:DST` | Copy-on-write overlay вҖ” SRC is read-only, writes go to DST |\n\n**Platform implementation details:**\n\n| Platform | Sandbox mechanism | COW mechanism |\n|---|---|---|\n| Linux | User/mount/PID namespaces + seccomp syscall filter | overlayfs (kernel вүҘ 5.11 for user-ns) |\n| macOS | Seatbelt (`sandbox_init` + SBPL) | `clonefile(2)` on APFS |\n\nNo external tools such as `bwrap` or `newuidmap` are required on any platform.\n\n---\n\n## Worker pool\n\nRPC-mode workers are forked at startup before the event loop begins:\n\n1. Each worker optionally enters the sandbox via OS-native isolation.\n2. Workers communicate with the coordinator over a `socketpair(AF_UNIX, SOCK_STREAM)` using a 4-byte length-prefixed JSON wire format.\n3. To execute a shell command, the worker forks a grandchild with stdout/stderr pipes, waits, then sends the result back.\n4. After returning a result the worker immediately accepts the next request.\n\nThe coordinator runs a `poll(2)` event loop вҖ” it reads requests from stdin and forwards them to free workers as they become available; responses are forwarded to stdout as they arrive.\n\n**Crash recovery:** if a worker crashes (killed by signal or alarm), the coordinator detects `POLLHUP` on the socket, returns an error response for the in-flight request, and respawns a replacement worker.\n\n---\n\n## Timeout\n\n```sh\necho '{\"jsonrpc\":\"2.0\",\"id\":\"t\",\"method\":\"tools/call\",\"params\":{\"name\":\"bash\",\"arguments\":{\"command\":\"sleep 60\",\"timeout\":5}}}' | boxsh --rpc\n```\n\nWhen a request includes a `timeout` argument, the worker kills the running command after the specified number of seconds and returns a tool result with `exit_code: -1` and `stderr: \"timeout\"`. The worker itself remains alive and immediately accepts the next request вҖ” no respawn is needed.\n\n```json\n{\"jsonrpc\":\"2.0\",\"id\":\"t\",\"result\":{\n  \"content\":[{\"type\":\"text\",\"text\":\"timeout\"}],\n  \"structuredContent\":{\"exit_code\":-1,\"stdout\":\"\",\"stderr\":\"timeout\",\"duration_ms\":5001},\n  \"isError\":true\n}}\n```\n\n---\n\n## Testing\n\nRequires Node.js вүҘ 18.\n\n```sh\nnode --test tests/index.test.mjs\n```\n\n| File | What it covers |\n|---|---|\n| `shell-mode.test.mjs` | Interactive/script shell mode, built-ins, shell features, shell-mode sandbox |\n| `rpc-basics.test.mjs` | Response shape, field types, protocol robustness, parse error handling |\n| `rpc-shell-features.test.mjs` | Pipelines, variables, arithmetic, heredocs, sed, grep, awk |\n| `worker-pool.test.mjs` | Pool sizing, crash recovery, sequential and batch dispatch |\n| `timeout.test.mjs` | Timeout triggering, post-timeout worker recovery and reuse |\n| `concurrent.test.mjs` | Concurrent correctness, out-of-order responses, isolation, stress |\n| `overlay.test.mjs` | COW bind mounts, copy-on-write, delete/whiteout |\n| `tools.test.mjs` | Built-in tools: read (offset/limit), write, edit (diff, uniqueness checks) |\n| `mcp.test.mjs` | MCP protocol: initialize, tools/list, tools/call, notifications, handshake |\n| `protocol-regression.test.mjs` | Content-Length transport, ID type preservation, initialize handshake, error distinction |\n\n---\n\n## Architecture\n\n```\nboxsh/\nв”ңв”Җв”Җ src/\nв”Ӯ   в”ңв”Җв”Җ main.cpp              CLI parsing, mode dispatch\nв”Ӯ   в”ңв”Җв”Җ rpc.h / rpc.cpp       JSON-RPC 2.0 protocol, MCP handlers, built-in tools, poll(2) event loop\nв”Ӯ   в”ңв”Җв”Җ worker_pool.h / .cpp  Worker lifecycle, IPC, shell command execution\nв”Ӯ   в”ңв”Җв”Җ sandbox.h              Platform-neutral sandbox interface\nв”Ӯ   в”ңв”Җв”Җ sandbox.cpp            Linux implementation (namespaces/overlayfs/seccomp)\nв”Ӯ   в”ңв”Җв”Җ sandbox_darwin.cpp     macOS implementation (Seatbelt/clonefile)\nв”Ӯ   в”ңв”Җв”Җ terminal.h / .cpp     PTY session management (libvterm-backed)\nв”Ӯ   в”ңв”Җв”Җ file_type.h / .cpp    Binary file type detection\nв”Ӯ   в””в”Җв”Җ image_resize.h / .cpp Image resizing for binary read responses\nв””в”Җв”Җ third_party/\n    в”ңв”Җв”Җ dash-0.5.12/          Vendored dash (compiled as a static library;\n    в”Ӯ                         dash_main() called directly in shell mode)\n    в”ңв”Җв”Җ nlohmann/json.hpp     nlohmann/json v3.11.3 (header-only, MIT)\n    в”ңв”Җв”Җ libedit/              libedit headers + .so symlink (line editing)\n    в”ңв”Җв”Җ libvterm/             libvterm (PTY screen model for terminal tools)\n    в””в”Җв”Җ stb/                  stb_image / stb_image_resize (image processing)\n```\n\n---\n\n## License\n\nboxsh is released under the MIT License.\n\n- [dash](http://gondor.apana.org.au/~herbert/dash/) вҖ” BSD license\n- [nlohmann/json](https://github.com/nlohmann/json) вҖ” MIT license\n- [libedit](https://www.thrysoee.dk/editline/) вҖ” BSD license\n\n","summary":"boxsh is a lightweight, POSIXвҖ‘compatible shell and Model Context Protocol (MCP) server that runs inside an OSвҖ‘native sandbox, enabling safe execution of arbitrary commands. It offers copyвҖ‘onвҖ‘write workspaces, a preвҖ‘forked worker pool with crash recovery and timeouts, and a suite of fileвҖ‘related JSONвҖ‘RPC tools that can be leveraged by AI agents, build systems, or orchestration layers. The interactive `--try` mode lets developers experiment in full isolation, while the sandboxed MCP mode lets AI clients such as VSвҖҜCode or Claude Desktop run scripts and file operations securely. Users developing AI assistants, automated pipelines, or any system requiring isolated yet programmable shell access will find boxsh especially useful.","description":"A sandboxed POSIX shell with a concurrent JSON-line RPC mode","stars":279,"language":"JavaScript"},{"owner":"ProjectPhysX","repo":"hw-smi","url":"https://github.com/ProjectPhysX/hw-smi","readme":"# hw-smi\n\nA minimal, cross-compatible CPU/GPU telemetry monitor with accurate data directly from vendor APIs and beautiful ASCII visualization.\n\n`moritz@opencl-pc:~/hw-smi$ sudo bin/hw-smi --bars`\n<img src=\"https://github.com/user-attachments/assets/a8140256-ab62-46ab-a730-3da564e0ccce\" width=\"100%\">\n\n`moritz@opencl-pc:~/hw-smi$ sudo bin/hw-smi --graphs`\n<img src=\"https://github.com/user-attachments/assets/7f350997-3602-4198-87fd-f18d48d5b6d7\" width=\"100%\">\n\n## Hardware/OS Support\n| Metric<br>(Windows/Linux) | CPUs<br>[Win32](https://learn.microsoft.com/de-de/windows/win32/apiindex/api-index-portal)/`/proc` | &nbsp;Nvidia&nbsp;GPUs&nbsp;<br>[NVML](https://docs.nvidia.com/deploy/nvml-api/index.html) | &nbsp;&nbsp;&nbsp;AMD&nbsp;GPUs&nbsp;&nbsp;&nbsp;<br>[ADLX](https://github.com/GPUOpen-LibrariesAndSDKs/ADLX/blob/main/SDK/Include/IPerformanceMonitoring.h)/[AMDSMI](https://github.com/ROCm/amdsmi/blob/amd-mainline/include/amd_smi/amdsmi.h) | &nbsp;&nbsp;Intel&nbsp;GPUs&nbsp;&nbsp;<br>[SYSMAN](https://github.com/oneapi-src/level-zero/blob/master/include/zes_api.h) |\n| :---------------------  | :---------: | :---------: | :---------: | :---------: |\n| device name             |   вң…/вң…    |   вң…/вң…    |   вң…/вң…    |   вң…/вң…    |\n| per-core/avg usage [%]  | вң…вң…/вң…вң… | вң…вң…/вң…вң… | вң…вң…/вң…вң… | вң…вң…/вқҺвң… |\n| memory bandwidth [MB/s] | вқҢвқҢ/вқҢвқҢ | вң…вң…/вң…вң… |    рҹҹЁрҹҹЁ/вң…вң… | вқҺвқҺ/вқҺвқҺ |\n| memory occupation [MB]  | вң…вң…/вң…вң… | вң…вң…/вң…вң… | вң…вң…/вң…вң… | вң…вң…/вң…вң… |\n| temperature [В°C]        |  рҹ« вң…/вң…вң… | вң…вң…/вң…вң… | вң…вң…/вң…вң… | вқҺвң…/вқҺвң…  |\n| power [W]               | вқҢвқҢ/вқҢвқҢ | вң…вң…/вң…вң… | вң…вң…/вң…вң… | вқҺвң…/вң…вң… |\n| fan [RPM]               | вқҢвқҢ/вқҢвқҢ |    рҹҹЁрҹҹЁ/рҹҹЁрҹҹЁ    | вң…вң…/вң…рҹҹЁ  |   вң…рҹҹЁ/рҹ« рҹҹЁ    |\n| core clock [MHz]        |    рҹҹЁрҹҹЁ/вң…рҹҹЁ  | вң…вң…/вң…вң… | вң…вң…/вң…вң… | вң…вң…/вң…вң… |\n| memory clock [MHz]      | вқҢвқҢ/вқҢвқҢ |    рҹ« рҹ« /рҹ« рҹ«     | вң…вң…/вң…вң… | вң…вң…/рҹ« вң…  |\n| PCIe bandwidth [MB/s]   |    рҹҹЁрҹҹЁ/рҹҹЁрҹҹЁ    | вң…вң…/вң…вң… | вқҢвқҢ/рҹ« вң…  | вқҺвң…/вқҺрҹ«    |\n\n| Legend | Description |\n| :----: | :---------- |\n| AB/CD| A&nbsp;`current`&nbsp;value&nbsp;(Windows), B&nbsp;`max`&nbsp;value&nbsp;(Windows)<br>C&nbsp;`current`&nbsp;value&nbsp;(&nbsp;&nbsp;&nbsp;Linux&nbsp;&nbsp;&nbsp;), D&nbsp;`max`&nbsp;value&nbsp;(&nbsp;&nbsp;&nbsp;Linux&nbsp;&nbsp;&nbsp;) |\n| вң… | supported and working |\n| вқҺ | supported and working, but `administrator`/`sudo` permissions required |\n|  рҹҹЁ | vendor API does not directly provide metric, but workaround/estimate/default possible |\n|  рҹ«  | available but broken in vendor API |\n| вқҢ | unavailable in vendor API and no suitable default value possible |\n\n<details><summary>API issues submitted</summary>\n\n- https://github.com/GPUOpen-LibrariesAndSDKs/ADLX/issues/27\n- https://github.com/ROCm/amdsmi/issues/182 / [183](https://github.com/ROCm/amdsmi/issues/183) / [188](https://github.com/ROCm/amdsmi/issues/188)\n- https://github.com/intel/drivers.gpu.control-library/issues/120 / [146](https://github.com/intel/drivers.gpu.control-library/issues/146) / [138](https://github.com/intel/drivers.gpu.control-library/issues/138) / [149](https://github.com/intel/drivers.gpu.control-library/issues/149)\n- https://github.com/oneapi-src/level-zero/issues/434 / [440](https://github.com/oneapi-src/level-zero/issues/440) / [441](https://github.com/oneapi-src/level-zero/issues/441)\n\n</details>\n\n## Compiling the Source Code\n\n### Windows\n- Download and install [Visual Studio Community](https://visualstudio.microsoft.com/de/vs/community/). In Visual Studio Installer, add:\n  - Desktop development with C++\n  - MSVC v142\n  - Windows 10 SDK\n- [Download](https://github.com/ProjectPhysX/TaskManager/archive/refs/heads/master.zip) and unzip hw-smi.\n- Open [`hw-smi.vcxproj`](hw-smi.vcxproj) in [Visual Studio Community](https://visualstudio.microsoft.com/de/vs/community/).\n- Compile by clicking the <kbd>в–ә Local Windows Debugger</kbd> button.\n- Go to `hw-smi/bin/` folder and double-click `hw-smi.exe`.\n- Alternatively, run from CMD:\n  ```bash\n  hw-smi.exe\n  hw-smi.exe --bars\n  hw-smi.exe --graphs\n  hw-smi.exe --help\n  ```\n- Note that it will also work without `administrator` permissions. However, some telemetry counters on Intel GPUs are not available without `administrator` permissions.\n\n### Linux\n- Clone from GitHub:\n  ```bash\n  git clone https://github.com/ProjectPhysX/hw-smi.git && cd hw-smi\n  ```\n- Compile:\n  ```bash\n  chmod +x make.sh\n  ./make.sh\n  ```\n- Run:\n  ```bash\n  sudo bin/hw-smi\n  sudo bin/hw-smi --bars\n  sudo bin/hw-smi --graphs\n  sudo bin/hw-smi --help\n  ```\n- Note that it will also work without `sudo`. However, some telemetry counters on Intel GPUs are not available without `sudo`.\n\n</details>\n","summary":"hwвҖ‘smi is a lightweight, crossвҖ‘platform CLI utility that gathers detailed CPU and GPU telemetry by directly querying vendor APIs, offering accurate, realвҖ‘time data in simple ASCII bars or animated graphs.  It supports Windows and Linux on Intel, Nvidia, AMD, and ARM systems, exposing perвҖ‘core utilisation, memory usage, temperature, power draw, fan speed, clock rates, and PCIe bandwidth where the APIs allow.  The tool is ideal for developers, system administrators, and power users who need a quick, scriptable way to monitor hardware performance without a heavyweight GUI.  Built with minimal dependencies, hwвҖ‘smi runs with standard user rights, though elevated privileges unlock deeper metrics on some platforms.","description":"A minimal, cross-compatible CPU/GPU telemetry monitor with accurate data directly from vendor APIs and beautiful ASCII visualization.","stars":201,"language":"C++"},{"owner":"millionco","repo":"cli-to-js","url":"https://github.com/millionco/cli-to-js","readme":"# `cli-to-js`\n\n> **Warning:** This project is very experimental. APIs may change without notice.\n\nTurn any CLI into a JavaScript API, automatically.\n\nGive it a binary name, it reads `--help`, and hands you back a fully typed object where subcommands are methods, flags are options, and everything just works.\n\n```ts\nimport { convertCliToJs } from \"cli-to-js\";\n\nconst git = await convertCliToJs(\"git\");\nconst claude = await convertCliToJs(\"claude\");\n\n// Get the files that changed in the last commit\nconst { stdout } = await git.diff({ nameOnly: true, _: [\"HEAD~1\"] });\nconst changedFiles = stdout.trim().split(\"\\n\");\n\n// Ask Claude to review each changed file\nfor (const file of changedFiles) {\n  const review = await claude({\n    print: true,\n    model: \"sonnet\",\n    _: [`Review ${file} for bugs and suggest fixes`],\n  });\n\n  if (review.stdout.includes(\"no issues\")) continue;\n  console.log(`${file}:`, review.stdout);\n}\n```\n\n**Why this matters for agents.**\n\nAgents need to call CLI tools, but they work best with structured APIs, not raw shell strings.\n\n`cli-to-js` lets an agent introspect any binary on the system, get a typed interface, and call it safely. `$validate` catches hallucinated flag names before spawning a process and returns did-you-mean suggestions the agent can self-correct from in a single retry.\n\n`$spawn` returns a standard async iterator, so streaming and piping is just a `for await` loop.\n\n## Install\n\n```sh\nnpm install cli-to-js\n```\n\n## Quick start\n\n`convertCliToJs` runs `--help` on the binary, parses the output into a schema, and returns a Proxy-based API where every subcommand is a method and every flag is an option.\n\n```ts\nimport { convertCliToJs } from \"cli-to-js\";\n\nconst api = await convertCliToJs(\"my-tool\");\n\n// Subcommand as a method\nconst result = await api.build({ output: \"dist\", minify: true });\n// вҶ’ my-tool build --output dist --minify\n\nconsole.log(result.stdout);\nconsole.log(result.exitCode);\n```\n\nHere's how JS option keys map to CLI flags:\n\n| JS option                 | CLI output                |\n| ------------------------- | ------------------------- |\n| `{ verbose: true }`       | `--verbose`               |\n| `{ verbose: false }`      | _(omitted)_               |\n| `{ output: \"file.txt\" }`  | `--output file.txt`       |\n| `{ dryRun: true }`        | `--dry-run`               |\n| `{ v: true }`             | `-v`                      |\n| `{ include: [\"a\", \"b\"] }` | `--include a --include b` |\n| `{ _: [\"file.txt\"] }`     | `file.txt`                |\n\n## TypeScript\n\nThe API is fully typed out of the box. Every subcommand returns `Promise<CommandResult>`, and `$schema`, `$parse`, `$spawn` are all properly typed. No codegen needed.\n\nFor per-subcommand option types, pass a generic:\n\n```ts\nconst git = await convertCliToJs<{\n  commit: { message?: string; all?: boolean; amend?: boolean };\n  push: { force?: boolean; setUpstream?: string };\n}>(\"git\");\n\ngit.commit({ message: \"hello\" }); // message autocompletes as string\ngit.push({ foobar: true }); // type error\n```\n\nOr generate a `.d.ts` from the parsed schema:\n\n```sh\nnpx cli-to-js git --dts --subcommands -o git.d.ts\n```\n\n## From a help text string\n\nIf you already have the help text, skip the binary lookup:\n\n```ts\nimport { fromHelpText } from \"cli-to-js\";\n\nconst api = fromHelpText(\"my-tool\", helpTextString);\nawait api.build({ watch: true });\n```\n\n## Subcommand parsing\n\nBy default, only the root `--help` is parsed. Enable `subcommands` to also parse every subcommand's help text and populate its flags in the schema:\n\n```ts\nconst git = await convertCliToJs(\"git\", { subcommands: true });\n\n// Schema now includes each subcommand's flags\nconst commitFlags = git.$schema.command.subcommands.find((s) => s.name === \"commit\")?.flags;\n```\n\nOr parse on demand:\n\n```ts\nconst git = await convertCliToJs(\"git\");\n\n// Parse one subcommand lazily\nconst commitSchema = await git.$parse(\"commit\");\nconsole.log(commitSchema.flags);\n\n// Parse all discovered subcommands\nawait git.$parse();\n```\n\nHandles commander-style aliases (`init|setup`, `add|install`). The primary name is used.\n\n## Validation\n\nValidate options against the parsed schema before running a command. Returns an array of structured errors (empty means valid).\n\n```ts\nconst git = await convertCliToJs(\"git\", { subcommands: true });\n\nconst errors = git.$validate(\"commit\", { massage: \"fix typo\" });\n// => [{ kind: \"unknown-flag\", name: \"massage\", suggestion: \"message\",\n//       message: 'Unknown flag \"massage\". Did you mean \"message\"?' }]\n\nif (errors.length === 0) {\n  await git.commit({ message: \"fix typo\" });\n}\n```\n\nChecks for unknown flags (with Levenshtein-based suggestions), type mismatches (boolean vs value-taking), missing required positionals, and too many positionals.\n\nFor root command validation, pass options directly:\n\n```ts\nconst errors = git.$validate({ unknownFlag: true });\n```\n\nFor subcommand validation, the subcommand must be enriched first (via `subcommands: true` or `$parse(\"name\")`).\n\nOr use `validateOptions` directly with any `ParsedCommand`:\n\n```ts\nimport { validateOptions } from \"cli-to-js\";\n\nconst errors = validateOptions(schema.command, { verbose: \"wrong\" });\n```\n\n## Output parsing\n\nEvery command returns a `CommandPromise` with `.text()`, `.lines()`, and `.json()` for typed output:\n\n```ts\nconst branch = await git.branch({ showCurrent: true }).text();\n// \"main\"\n\nconst files = await git.diff({ nameOnly: true, _: [\"HEAD~1\"] }).lines();\n// [\"src/index.ts\", \"src/utils.ts\"]\n\nconst packages = await npm.outdated({ json: true }).json<Record<string, { current: string }>>();\n// { \"lodash\": { current: \"4.17.20\" }, ... }\n```\n\nYou can also use the raw `CommandResult` directly:\n\n```ts\nconst result = await git.status();\nresult.stdout; // raw string\nresult.exitCode; // number\n```\n\n## Command strings\n\n`$command` returns the shell string instead of executing:\n\n```ts\ngit.$command.commit({ message: \"fix\", all: true });\n// \"git commit --message fix --all\"\n\ngit.$command.push({ force: true });\n// \"git push --force\"\n```\n\nCompose multiple commands into a runnable script with `script()`:\n\n```ts\nimport { script } from \"cli-to-js\";\n\nconst deploy = script(git.$command.commit({ message: \"deploy\", all: true }), git.$command.push());\n\ndeploy.run(); // executes sequentially, stops on failure\nconsole.log(`${deploy}`); // \"git commit --message deploy --all && git push\"\n```\n\n## Streaming\n\n### Callbacks\n\nGet real-time output while still receiving the buffered result:\n\n```ts\nconst result = await api.build(\n  { watch: true },\n  {\n    onStdout: (data) => process.stdout.write(data),\n    onStderr: (data) => process.stderr.write(data),\n  },\n);\n```\n\n### Async iterator\n\n`spawnCommand` and `$spawn` return a `CommandProcess` with raw streams and an async iterator that yields stdout lines:\n\n```ts\nconst proc = api.$spawn.test({ _: [\"--watch\"] });\n\nfor await (const line of proc) {\n  console.log(line);\n}\n\nconsole.log(\"exited with:\", await proc.exitCode);\n```\n\nOr use `spawnCommand` directly:\n\n```ts\nimport { spawnCommand } from \"cli-to-js\";\n\nconst proc = spawnCommand(\"npm\", [\"run\", \"dev\"]);\nfor await (const line of proc) {\n  if (line.includes(\"ready\")) console.log(\"Server is up\");\n}\n```\n\n### stdio inherit\n\nPass stdio through to the parent terminal for interactive CLIs:\n\n```ts\nawait api.login({}, { stdio: \"inherit\" });\n```\n\n## Per-call config\n\nEvery method accepts an optional second argument for execution config:\n\n```ts\nconst controller = new AbortController();\n\nawait api.build(\n  {},\n  {\n    cwd: \"/my/project\",\n    env: { NODE_ENV: \"production\" },\n    timeout: 60_000,\n    signal: controller.signal,\n  },\n);\n```\n\n## CLI\n\nGenerate a standalone JS/TS wrapper for any CLI tool:\n\n```sh\nnpx cli-to-js git                          # TypeScript to stdout\nnpx cli-to-js git -o git.ts               # write to file\nnpx cli-to-js git --js -o git.js          # plain JavaScript\nnpx cli-to-js git --subcommands -o git.ts  # include per-subcommand flags\nnpx cli-to-js git --dts -o git.d.ts       # generate type declarations only\nnpx cli-to-js git --json                   # dump raw schema as JSON\n```\n\nThe generated code is **standalone**. It embeds a tiny runtime (spawn + options-to-args) and has zero dependencies on `cli-to-js`. Drop it into any project and it just works.\n\n## API\n\n### `convertCliToJs<T>(binary, options?)`\n\nRuns `--help`, parses the output, returns the API proxy. Accepts an optional generic `T` for per-subcommand option types.\n\n| Option        | Type         | Default    | Description                                |\n| ------------- | ------------ | ---------- | ------------------------------------------ |\n| `helpFlag`    | `string`     | `\"--help\"` | Flag to get help text                      |\n| `timeout`     | `number`     | `10000`    | Timeout for help text fetch (ms)           |\n| `cwd`         | `string`     | -          | Default working directory for all commands |\n| `env`         | `ProcessEnv` | -          | Default environment for all commands       |\n| `subcommands` | `boolean`    | `false`    | Parse all subcommand help texts eagerly    |\n\n### `fromHelpText<T>(binary, helpText, options?)`\n\nSame as `convertCliToJs` but from a static help text string. Accepts `cwd` and `env` options.\n\n### API proxy (`CliApi<T>`)\n\nThe returned proxy is both callable and has subcommand methods:\n\n| Access                       | Description                              |\n| ---------------------------- | ---------------------------------------- |\n| `api.sub({ flag: val })`     | Run subcommand, returns `CommandPromise` |\n| `api.sub(opts).text()`       | Run and get trimmed stdout               |\n| `api.sub(opts).lines()`      | Run and get stdout as `string[]`         |\n| `api.sub(opts).json<T>()`    | Run and parse stdout as JSON             |\n| `api(\"sub\", { flag: val })`  | Run subcommand by name                   |\n| `api({ flag: val })`         | Run root command                         |\n| `api.$schema`                | Parsed `CliSchema`                       |\n| `api.$validate(opts)`        | Validate options against root schema     |\n| `api.$validate(\"sub\", opts)` | Validate options against subcommand      |\n| `api.$command.sub(opts)`     | Get shell string without executing       |\n| `api.$spawn.sub(opts)`       | Spawn subcommand, get `CommandProcess`   |\n| `api.$parse(\"sub\")`          | Lazily parse a subcommand's help text    |\n| `api.$parse()`               | Parse all subcommand help texts          |\n\n### `RunConfig`\n\n| Option     | Type                     | Default    | Description               |\n| ---------- | ------------------------ | ---------- | ------------------------- | ---------- |\n| `timeout`  | `number`                 | `30000`    | Command timeout (ms)      |\n| `signal`   | `AbortSignal`            | -          | Abort signal              |\n| `cwd`      | `string`                 | -          | Working directory         |\n| `env`      | `ProcessEnv`             | -          | Environment variables     |\n| `stdio`    | `\"pipe\"                  | \"inherit\"` | `\"pipe\"`                  | stdio mode |\n| `onStdout` | `(data: string) => void` | -          | Real-time stdout callback |\n| `onStderr` | `(data: string) => void` | -          | Real-time stderr callback |\n\nColor output (`FORCE_COLOR`, `CLICOLOR_FORCE`) is auto-detected. It's enabled when streaming callbacks are provided and the parent process is connected to a TTY. To force it manually, pass `env: { ...process.env, FORCE_COLOR: \"1\" }`.\n\n### `CommandResult`\n\n```ts\ninterface CommandResult {\n  stdout: string;\n  stderr: string;\n  exitCode: number;\n}\n```\n\n### `CommandProcess`\n\nReturned by `spawnCommand` and `$spawn`:\n\n```ts\ninterface CommandProcess {\n  stdin: Writable | null;\n  stdout: Readable | null;\n  stderr: Readable | null;\n  pid: number | undefined;\n  kill: (signal?) => boolean;\n  exitCode: Promise<number>;\n  [Symbol.asyncIterator](): AsyncIterableIterator<string>;\n}\n```\n\n## License\n\nMIT В© Million Software, Inc.\n","summary":"`cli-to-js` automatically turns any commandвҖ‘line tool into a TypeScriptвҖ‘friendly JavaScript API. By running a binaryвҖҷs `--help`, it builds a typed schema and returns a ProxyвҖ‘based interface where subcommands become methods and flags become options, with full async execution and streaming support. The library offers builtвҖ‘in validation, вҖңdidвҖ‘youвҖ‘meanвҖқ suggestions, and custom typing for subcommands, allowing developers and autonomous agents to invoke arbitrary CLIs safely without crafting shell strings. It is ideal for Node.js projects that need to programmatically access system toolsвҖ”such as build scripts, automation bots, or AI agentsвҖ”while retaining type safety and convenience.","description":"Turn any CLI into a JavaScript API","stars":365,"language":"TypeScript"},{"owner":"ibelick","repo":"mesurer","url":"https://github.com/ibelick/mesurer","readme":"<picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://mesurer.dev/logo-dark.svg\">\n  <img src=\"https://mesurer.dev/logo.svg\" alt=\"Mesurer\" width=\"200\">\n</picture>\n\n<br>\n\n[![npm version](https://img.shields.io/npm/v/mesurer)](https://www.npmjs.com/package/mesurer)\n[![downloads](https://img.shields.io/npm/dm/mesurer)](https://www.npmjs.com/package/mesurer)\n\n**[Mesurer](https://mesurer.dev)** is a lightweight measurement and alignment overlay for React apps. Toggle it on, select elements, and measure distances directly in the browser.\n\n[Full documentation](https://mesurer.dev/)\n\n## Install\n\n```bash\nnpm install mesurer\n```\n\n## Usage\n\n```tsx\nimport { Measurer } from \"mesurer\";\n\nfunction App() {\n  return (\n    <>\n      <YourApp />\n      <Measurer />\n    </>\n  );\n}\n```\n\n## Props\n\n| Prop                    | Description                                                                   |\n| ----------------------- | ----------------------------------------------------------------------------- |\n| `highlightColor`        | Base color for selection/hover overlays (defaults to `oklch(0.62 0.18 255)`). |\n| `guideColor`            | Base color for guides (defaults to `oklch(0.63 0.26 29.23)`).                 |\n| `hoverHighlightEnabled` | Disables hover highlight and deselects on click when `false`.                 |\n| `persistOnReload`       | Persists state in `localStorage` as `mesurer-state` when `true`.              |\n| `portalTarget`          | Optional element or shadow root used as the overlay portal mount target.      |\n\n## Commands\n\n| Shortcut               | Action                                                |\n| ---------------------- | ----------------------------------------------------- |\n| `M`                    | Toggle measurer on/off.                               |\n| `S`                    | Toggle Select mode.                                   |\n| `G`                    | Toggle Guides mode.                                   |\n| `H`                    | Set guide orientation to horizontal.                  |\n| `V`                    | Set guide orientation to vertical.                    |\n| `Alt`                  | Temporarily enable option/guide measurement overlays. |\n| `Esc`                  | Clear all measurements and guides.                    |\n| `Backspace` / `Delete` | Remove selected guides.                               |\n| `Cmd/Ctrl + Z`         | Undo.                                                 |\n| `Cmd/Ctrl + Shift + Z` | Redo.                                                 |\n\n## Features\n\n- **Toggle on/off** вҖ“ Enable the overlay with a single shortcut\n- **Select mode** вҖ“ Click elements to measure their bounds\n- **Guides mode** вҖ“ Add vertical or horizontal guides\n- **Distance overlays** вҖ“ Hold Alt for quick spacing checks\n- **Undo/redo** вҖ“ Command history for guide and measurement changes\n- **Persist state** вҖ“ Keep guides and measurements on reload\n\n## Requirements\n\n- React 18+\n\n## License\n\nLicensed under the MIT License.\n","summary":"Mesurer is a lightweight React overlay that lets developers and designers inspect and measure element dimensions and spacing directly in the browser. By toggling the tool with a keyboard shortcut, users can enter selection or guide modes, click to highlight bounds, hold Alt to instantly see distance overlays, and manipulate vertical or horizontal guides with undo/redo support. The component stores its state in localStorage by default, so measurements persist across page reloads, while customizable colors and portal targets allow seamless integration into any UI. FrontвҖ‘end developers, UI/UX designers, and anyone building responsive React applications can use Mesurer to quickly validate alignment, spacing, and layout accuracy without leaving the codebase.","description":"Measure and align everything.","stars":249,"language":"TypeScript"},{"owner":"zarazhangrui","repo":"personalized-podcast","url":"https://github.com/zarazhangrui/personalized-podcast","readme":"# Personalized Podcast\n\n**NotebookLM-style AI podcasts, except you control everything.**\n\nThe script. The prompt. The hosts' roles. Their voices. The content they discuss. All of it.\n\nA coding agent skill that turns any content into a two-host podcast episode. Paste in text, point it at files, drop a URL. Two AI hosts read your content and have a natural conversation about it. You get an MP3 that plays immediately. Set up an RSS feed and listen in the apps you already use: Apple Podcasts, Spotify, Overcast, Snipd, Pocket Casts. No new app to download.\n\n## Why this exists\n\n**Turn anything into a podcast you can listen to on the go.** Newsletters, long reads, tweets, research papers, meeting notes. Instead of reading on a screen, you listen to two people break it down while you walk, commute, or cook. Set up the RSS feed once and new episodes show up right where you already listen to podcasts.\n\n**Know yourself from the outside.** This is the unexpected use case. Feed it personal content: your resume, meeting transcripts, journal entries, even your browser history. Then ask the hosts to comment on their impressions of you. What patterns do they see in how you think, communicate, make decisions? It is genuinely illuminating to hear two voices discuss you as if you're not in the room.\n\n## Quick start\n\n### 1. Install\n\n```bash\ngh repo clone zarazhangrui/personalized-podcast-skill ~/.claude/skills/personalized-podcast\n```\n\n### 2. Go\n\n```\n/podcast <paste content, point to files, or describe a topic>\n```\n\nThat's it. On first run, Claude sets up the Python environment, installs dependencies, and asks you for a free [Fish Audio](https://fish.audio) API key. Default voices are pre-configured. Your first episode generates immediately.\n\n## What you can do with it\n\n**Consume content as audio**\n```\n/podcast read ~/Downloads/newsletter.txt\n/podcast https://some-article-url.com\n/podcast Here's a thread about AI agents I want to hear discussed...\n```\n\n**Self-reflection**\n```\n/podcast read ~/Documents/my-resume.pdf and have the hosts analyze my career trajectory\n/podcast read ~/transcripts/meeting.txt and have the hosts eavesdrop and share their impressions of me\n```\n\n**Custom formats**\n```\n/podcast read ~/notes.md, make it a debate between an optimist and a skeptic\n/podcast read these 3 files, hosts should focus on what's surprising or counterintuitive\n```\n\nYou can change the prompt, the hosts' personalities, the episode length, the tone. It is all in your config file.\n\n## How it works\n\n```\n/podcast <your content>\n        |\n        v\n  Claude reads the content and writes a two-host conversation script\n        |\n        v\n  Fish Audio generates speech for each line (different voice per host)\n        |\n        v\n  Audio gets stitched together with natural pacing\n        |\n        v\n  MP3 opens and plays on your computer\n```\n\nThe default show has two hosts:\n- **Alex** (Speaker A): The curious one. Introduces topics, asks questions, gets excited.\n- **Sam** (Speaker B): The analytical one. Adds depth, offers opinions, drops the witty takes.\n\nThey sound like two friends talking over coffee. Not news anchors. Not a lecture.\n\n## Make it yours\n\n**Customize the script prompt.** This is the big one. [`PROMPT.md`](https://github.com/zarazhangrui/personalized-podcast-skill/blob/main/PROMPT.md) controls how the hosts behave, the show structure, and the writing style. Edit it to create your own show format. Some ideas:\n\n- **Debate:** Two hosts take opposing sides. One is bullish, the other is skeptical. They challenge each other.\n- **Eavesdrop:** Two hosts discuss a person (from transcripts, writing, or personal content) as if that person isn't in the room. They share observations about personality and communication patterns.\n- **Interview:** One host interviews the other as an expert on the topic.\n- **Solo narrator:** One voice walks through the content in a thoughtful monologue.\n- **News roundup:** Hosts go through a list of items (tweets, headlines) one by one. Each is read aloud, then discussed.\n\n**Pick your own voices.** Browse [fish.audio/discovery](https://fish.audio/discovery/). Find voices you like. Copy their reference IDs into your config. You can make your hosts sound however you want.\n\n**Change the show's personality.** Edit `show_name` and `tone` in `~/.personalized-podcast/config.yaml`. Make it serious, funny, academic, casual, confrontational. Up to you.\n\n**Set up an RSS feed.** Want episodes delivered to your podcast app automatically? Just ask Claude: \"Set up an RSS feed for my podcast.\" It creates a GitHub Pages feed you can subscribe to in Apple Podcasts, Overcast, Pocket Casts, Snipd, Spotify, or any podcast app that supports RSS.\n\n## Requirements\n\n- A coding agent that supports skills (e.g. Claude Code, Gemini CLI, Copilot CLI)\n- Python 3.10+\n- ffmpeg (`brew install ffmpeg` on macOS)\n- [Fish Audio](https://fish.audio) account (free tier available)\n\n## About\n\nBuilt by [Zara Zhang](https://x.com/zarazhangrui). Your AI coding agent already understands context, writes well, and follows instructions. Why not have it write you a podcast script, generate the audio, and deliver it to your ears?\n\nThe entire pipeline runs locally through your coding agent. No separate backend. No hosted service. No subscription. Just a skill that turns your coding agent into a podcast producer.\n\n## Under the hood\n\n```\n~/.claude/skills/personalized-podcast/     # The skill (this repo)\n  SKILL.md                                  # Instructions for the coding agent\n  scripts/\n    speak.py                                # Fish Audio TTS + audio stitching\n    publish.py                              # Push episodes to GitHub Pages (optional)\n    bootstrap.py                            # One-time repo setup (optional)\n    utils.py                                # Config, logging, .env loading\n  templates/\n    feed_template.xml                       # RSS feed template (optional)\n  config/\n    config.example.yaml                     # Default config with pre-picked voices\n\n~/.personalized-podcast/                   # Your data (created automatically)\n  config.yaml                               # Your config\n  .env                                      # Your Fish Audio API key\n  scripts_output/                           # Generated scripts (JSON)\n  episodes/                                 # Generated MP3 files\n```\n\n**Script generation:** Your coding agent writes the script directly. No separate LLM API call needed.\n\n**Text-to-speech:** [Fish Audio](https://fish.audio) with 2M+ voices and a free tier.\n\n**Audio processing:** pydub + ffmpeg for stitching segments with natural pauses and fade effects.\n\n**Feed hosting (optional):** GitHub Pages, auto-deploys on every push.\n","summary":"The Personalized Podcast skill lets you transform any text, file, or URL into an instant, twoвҖ‘host podcast episode using Claude and Fish Audio. By pasting content, pointing to documents, or supplying a link, the tool generates a conversational script between two customizable AI hosts, synthesises their voices, and outputs an MP3 that can be streamed via any existing podcast app. Users can harness it to listen to newsletters, research papers, or meeting notes on the go, or to perform selfвҖ‘reflection by having hosts analyze personal documents such as resumes or transcripts. Its scriptвҖ‘prompt; host personalities; episode length; and tone are entirely configurable, making it ideal for content creators, commuters, and anyone who prefers audio over reading.","description":"Turn any content into a personalized AI podcast. NotebookLM-style, except you control the script, voices, and hosts. Listen in Apple Podcasts, Spotify, or any podcast app.","stars":310,"language":"Python"},{"owner":"dominikmartn","repo":"ProgressiveBlurHeader","url":"https://github.com/dominikmartn/ProgressiveBlurHeader","readme":"# ProgressiveBlurHeader\n\nA drop-in SwiftUI component for sticky headers with progressive blur вҖ” like Apple Music, Photos, and the App Store.\n\nContent scrolls freely underneath the header, becoming increasingly blurred and tinted. Never clipped, always visible.\n\n<p align=\"center\">\n  <img src=\"Media/demo.gif\" width=\"280\" alt=\"Progressive blur header demo\" />\n</p>\n\n## The Problem\n\nBuilding a progressive blur header in SwiftUI is surprisingly hard. There's no native API for variable-radius blur, and most attempts end up with either:\n- Hard edges where content gets clipped\n- Uniform blur that looks flat\n- Complex `UIViewRepresentable` wrappers that break with SwiftUI's layout system\n\nAI coding assistants consistently struggle with this pattern вҖ” it typically takes many iterations to get right. This package gives you a working solution in one line.\n\n## How It Works\n\nThree-layer `ZStack`:\n\n| Layer | What | Purpose |\n|-------|------|---------|\n| Back | `ScrollView` | Content scrolls freely, never clipped |\n| Middle | `VariableBlurView` + gradient | Progressive blur + tint overlay |\n| Front | Your header | Floats above the blur вҖ” no opaque background |\n\nThe blur uses the same (obfuscated) private API that Apple uses internally, via [VariableBlur](https://github.com/nikstar/VariableBlur) by nikstar (495+ stars, App Store approved).\n\n## Installation\n\n**Swift Package Manager** вҖ” add this to your `Package.swift`:\n\n```swift\ndependencies: [\n    .package(url: \"https://github.com/dominikmartn/ProgressiveBlurHeader\", branch: \"main\"),\n]\n```\n\nOr in Xcode: **File вҶ’ Add Package Dependencies** вҶ’ paste the URL.\n\n## Usage\n\n```swift\nimport ProgressiveBlurHeader\n\nstruct MyView: View {\n    var body: some View {\n        StickyBlurHeader {\n            // Your header вҖ” NO opaque background!\n            HStack {\n                Button(\"Back\") { }\n                Spacer()\n                Text(\"Title\").font(.headline)\n                Spacer()\n                Button(\"Settings\") { }\n            }\n            .padding()\n        } content: {\n            // Your scrollable content\n            ForEach(items) { item in\n                ItemRow(item: item)\n            }\n        }\n        .background(Color(.systemBackground))\n    }\n}\n```\n\n## Customization\n\nAll parameters have sensible defaults вҖ” adjust what you need:\n\n```swift\nStickyBlurHeader(\n    maxBlurRadius: 5,       // Blur intensity: 5 = subtle, 10 = moderate, 20 = strong\n    fadeExtension: 64,      // How far (pt) blur extends below header\n    tintOpacityTop: 0.7,    // Tint at screen top (behind Dynamic Island)\n    tintOpacityMiddle: 0.5  // Tint at header center\n) {\n    headerView\n} content: {\n    contentView\n}\n```\n\n### Parameters\n\n| Parameter | Default | Effect |\n|-----------|---------|--------|\n| `maxBlurRadius` | `5` | Maximum blur at the top edge |\n| `fadeExtension` | `64` | How far blur reaches below the header (pt) |\n| `tintOpacityTop` | `0.7` | Darkening behind Dynamic Island / status bar |\n| `tintOpacityMiddle` | `0.5` | Darkening at the header's vertical center |\n\nThe tint automatically adapts to light/dark mode (white tint in light mode, black in dark).\n\n## Important Rules\n\n> **Header must NOT have an opaque background.** No `.background(Color.xxx)` вҖ” the `VariableBlurView` IS the background. Adding one hides the blur effect.\n\n> **Don't clip the content.** No `.clipped()` anywhere in the hierarchy. Content should always be visible, just blurred.\n\n> **Header height is measured automatically** via `GeometryReader` + `PreferenceKey`. It adapts dynamically if your header changes size.\n\n## What About iOS 26's `.safeAreaBar(edge: .top)`?\n\niOS 26 introduces `.safeAreaBar(edge: .top)` вҖ” a one-liner that adds a sticky bar with blur. But it gives you **zero control** over blur radius, tint intensity, or fade length. If you need to match a specific design, the custom approach is the way to go.\n\n## Requirements\n\n- iOS 16+\n- Swift 5.9+\n\n## Credits\n\n- [VariableBlur](https://github.com/nikstar/VariableBlur) by nikstar вҖ” the progressive blur engine\n- Built by [Dominik Martin](https://x.com/dominikmartn)\n\n## License\n\nMIT вҖ” see [LICENSE](LICENSE).\n","summary":"ProgressiveBlurHeader is a dropвҖ‘in SwiftUI component that adds a sticky header with a smoothly increasing blur effect, emulating the appearance seen in Apple Music, Photos and the AppвҖҜStore. It leverages the VariableBlur library to deliver a variable-radius blur and configurable tint, fade length, and maximum blur radius without clipping the underlying scrollable content. The component is simple to integrate via the Swift Package Manager and works with any custom header view, as long as the header has no opaque background. iOSвҖҜ16+ SwiftUI developers looking to create polished, nativeвҖ‘style interfaces can use it to achieve a professionalвҖ‘looking header blur with minimal code.","description":"Drop-in SwiftUI component for sticky headers with progressive blur вҖ” like Apple Music, Photos, and App Store. Content scrolls underneath with increasing blur, never clipped.","stars":402,"language":"Swift"},{"owner":"momenbasel","repo":"PureMac","url":"https://github.com/momenbasel/PureMac","readme":"<p align=\"center\">\n  <img src=\"screenshot.png\" alt=\"PureMac\" width=\"700\">\n</p>\n\n<h1 align=\"center\">PureMac</h1>\n\n<p align=\"center\">\n  <b>Free, open-source macOS app manager and system cleaner.</b><br>\n  Uninstall apps completely. Find orphaned files. Clean system junk.<br>\n  No subscriptions. No telemetry. No data collection.\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/momenbasel/PureMac/releases/latest\"><img src=\"https://img.shields.io/github/v/release/momenbasel/PureMac?style=flat-square&label=Download\" alt=\"Latest Release\"></a>\n  <a href=\"https://github.com/momenbasel/PureMac/actions/workflows/build.yml\"><img src=\"https://img.shields.io/github/actions/workflow/status/momenbasel/PureMac/build.yml?style=flat-square&label=Build\" alt=\"Build Status\"></a>\n  <img src=\"https://img.shields.io/badge/macOS-13.0+-blue?style=flat-square\" alt=\"macOS 13.0+\">\n  <img src=\"https://img.shields.io/badge/Swift-5.9-orange?style=flat-square\" alt=\"Swift 5.9\">\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/github/license/momenbasel/PureMac?style=flat-square\" alt=\"MIT License\"></a>\n  <a href=\"https://github.com/momenbasel/PureMac/stargazers\"><img src=\"https://img.shields.io/github/stars/momenbasel/PureMac?style=flat-square\" alt=\"Stars\"></a>\n  <a href=\"https://github.com/momenbasel/PureMac/releases\"><img src=\"https://img.shields.io/github/downloads/momenbasel/PureMac/total?style=flat-square&label=Downloads\" alt=\"Downloads\"></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"#install\">Install</a> -\n  <a href=\"#features\">Features</a> -\n  <a href=\"#screenshots\">Screenshots</a> -\n  <a href=\"#contributing\">Contributing</a>\n</p>\n\n---\n\n## Install\n\n### Homebrew (recommended)\n\n```bash\nbrew update\nbrew install --cask puremac\n```\n\n### Direct Download\n\nDownload the latest `.dmg` from [Releases](https://github.com/momenbasel/PureMac/releases/latest), open it, and drag PureMac to `/Applications`.\n\n> Signed and notarized with Apple Developer ID - installs without Gatekeeper warnings.\n\n### Build from source\n\n```bash\nbrew install xcodegen\ngit clone https://github.com/momenbasel/PureMac.git\ncd PureMac\nxcodegen generate\nxcodebuild -project PureMac.xcodeproj -scheme PureMac -configuration Release -derivedDataPath build build\nopen build/Build/Products/Release/PureMac.app\n```\n\n## Features\n\n### App Uninstaller\n- Discovers all installed apps from `/Applications` and `~/Applications`\n- Heuristic file discovery engine with **10-level matching** (bundle ID, company name, entitlements, team identifier, Spotlight metadata, container discovery)\n- **3 sensitivity levels**: Strict (safe), Enhanced (balanced), Deep (thorough)\n- Shows all related files: caches, preferences, containers, logs, support files, launch agents\n- System app protection - 27 Apple apps are excluded from the uninstall list\n- Master-detail view: app table on left, discovered files on right\n\n### Orphaned File Finder\n- Detects leftover files in `~/Library` from apps that have been uninstalled\n- Compares Library contents against all installed app identifiers\n- One-click cleanup of orphaned files\n\n### System Cleaner\n- **Smart Scan** - one-click scan across all categories\n- **System Junk** - system caches, logs, and temporary files\n- **User Cache** - dynamically discovers all app caches (no hardcoded app list)\n- **Mail Attachments** - downloaded mail attachments\n- **Trash Bins** - empty all Trash\n- **Large & Old Files** - files over 100 MB or older than 1 year\n- **Purgeable Space** - APFS purgeable disk space detection\n- **Xcode Junk** - DerivedData, Archives, simulator caches\n- **Brew Cache** - Homebrew download cache (detects custom HOMEBREW_CACHE)\n- **Scheduled Cleaning** - automatic scans on configurable intervals\n\n### Native macOS Experience\n- Built with SwiftUI using native macOS components\n- `NavigationSplitView`, `Toggle`, `ProgressView`, `Form`, `GroupBox`, `Table`\n- Respects system light/dark mode automatically\n- No custom gradients, glows, or web-app styling\n- First-launch onboarding with Full Disk Access setup\n\n### Safety\n- Confirmation dialogs before all destructive operations\n- Symlink attack prevention - resolves and validates paths before deletion\n- System app protection - Apple apps cannot be uninstalled\n- Large & Old Files are never auto-selected\n- Structured logging via `os.log` (visible in Console.app)\n\n## Screenshots\n\n| Onboarding | App Uninstaller |\n|---|---|\n| ![Onboarding](screenshots/onboarding.png) | ![App Uninstaller](screenshots/app-uninstaller.png) |\n\n| System Junk | Xcode Junk |\n|---|---|\n| ![System Junk](screenshots/system-junk.png) | ![Xcode Junk](screenshots/xcode-junk.png) |\n\n| User Cache |\n|---|\n| ![User Cache](screenshots/user-cache.png) |\n\n## Architecture\n\n```\nPureMac/\n  Logic/Scanning/     - Heuristic scan engine, locations database, conditions\n  Logic/Utilities/    - Structured logging\n  Models/             - Data models, typed errors\n  Services/           - Scan engine, cleaning engine, scheduler\n  ViewModels/         - Centralized app state\n  Views/              - Native SwiftUI views\n    Apps/             - App uninstaller views\n    Cleaning/         - Smart scan and category views\n    Orphans/          - Orphan finder\n    Settings/         - Native Form-based settings\n    Components/       - Shared components\n```\n\nKey components:\n- **AppPathFinder** - 10-level heuristic matching engine for discovering app-related files\n- **Locations** - 120+ macOS filesystem search paths\n- **Conditions** - 25 per-app matching rules for edge cases (Xcode, Chrom
