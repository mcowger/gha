agents, Microsoft Agent Framework 1.0 gives you enterprise-grade multi-agent orchestration, multi-provider model support, and cross-runtime interoperability via A2A and MCP.\n\n## Installation\n\nAutoGen requires **Python 3.10 or later**.\n\n```bash\n# Install AgentChat and OpenAI client from Extensions\npip install -U \"autogen-agentchat\" \"autogen-ext[openai]\"\n```\n\nThe current stable version can be found in the [releases](https://github.com/microsoft/autogen/releases). If you are upgrading from AutoGen v0.2, please refer to the [Migration Guide](https://microsoft.github.io/autogen/stable/user-guide/agentchat-user-guide/migration-guide.html) for detailed instructions on how to update your code and configurations.\n\n```bash\n# Install AutoGen Studio for no-code GUI\npip install -U \"autogenstudio\"\n```\n\n## Quickstart\n\nThe following samples call OpenAI API, so you first need to create an account and export your key as `export OPENAI_API_KEY=\"sk-...\"`.\n\n### Hello World\n\nCreate an assistant agent using OpenAI's GPT-4o model. See [other supported models](https://microsoft.github.io/autogen/stable/user-guide/agentchat-user-guide/tutorial/models.html).\n\n```python\nimport asyncio\nfrom autogen_agentchat.agents import AssistantAgent\nfrom autogen_ext.models.openai import OpenAIChatCompletionClient\n\nasync def main() -> None:\n    model_client = OpenAIChatCompletionClient(model=\"gpt-4.1\")\n    agent = AssistantAgent(\"assistant\", model_client=model_client)\n    print(await agent.run(task=\"Say 'Hello World!'\"))\n    await model_client.close()\n\nasyncio.run(main())\n```\n\n### MCP Server\n\nCreate a web browsing assistant agent that uses the Playwright MCP server.\n\n```python\n# First run `npm install -g @playwright/mcp@latest` to install the MCP server.\nimport asyncio\nfrom autogen_agentchat.agents import AssistantAgent\nfrom autogen_agentchat.ui import Console\nfrom autogen_ext.models.openai import OpenAIChatCompletionClient\nfrom autogen_ext.tools.mcp import McpWorkbench, StdioServerParams\n\n\nasync def main() -> None:\n    model_client = OpenAIChatCompletionClient(model=\"gpt-4.1\")\n    server_params = StdioServerParams(\n        command=\"npx\",\n        args=[\n            \"@playwright/mcp@latest\",\n            \"--headless\",\n        ],\n    )\n    async with McpWorkbench(server_params) as mcp:\n        agent = AssistantAgent(\n            \"web_browsing_assistant\",\n            model_client=model_client,\n            workbench=mcp, # For multiple MCP servers, put them in a list.\n            model_client_stream=True,\n            max_tool_iterations=10,\n        )\n        await Console(agent.run_stream(task=\"Find out how many contributors for the microsoft/autogen repository\"))\n\n\nasyncio.run(main())\n```\n\n> **Warning**: Only connect to trusted MCP servers as they may execute commands\n> in your local environment or expose sensitive information.\n\n### Multi-Agent Orchestration\n\nYou can use `AgentTool` to create a basic multi-agent orchestration setup.\n\n```python\nimport asyncio\n\nfrom autogen_agentchat.agents import AssistantAgent\nfrom autogen_agentchat.tools import AgentTool\nfrom autogen_agentchat.ui import Console\nfrom autogen_ext.models.openai import OpenAIChatCompletionClient\n\n\nasync def main() -> None:\n    model_client = OpenAIChatCompletionClient(model=\"gpt-4.1\")\n\n    math_agent = AssistantAgent(\n        \"math_expert\",\n        model_client=model_client,\n        system_message=\"You are a math expert.\",\n        description=\"A math expert assistant.\",\n        model_client_stream=True,\n    )\n    math_agent_tool = AgentTool(math_agent, return_value_as_last_message=True)\n\n    chemistry_agent = AssistantAgent(\n        \"chemistry_expert\",\n        model_client=model_client,\n        system_message=\"You are a chemistry expert.\",\n        description=\"A chemistry expert assistant.\",\n        model_client_stream=True,\n    )\n    chemistry_agent_tool = AgentTool(chemistry_agent, return_value_as_last_message=True)\n\n    agent = AssistantAgent(\n        \"assistant\",\n        system_message=\"You are a general assistant. Use expert tools when needed.\",\n        model_client=model_client,\n        model_client_stream=True,\n        tools=[math_agent_tool, chemistry_agent_tool],\n        max_tool_iterations=10,\n    )\n    await Console(agent.run_stream(task=\"What is the integral of x^2?\"))\n    await Console(agent.run_stream(task=\"What is the molecular weight of water?\"))\n\n\nasyncio.run(main())\n```\n\nFor more advanced multi-agent orchestrations and workflows, read\n[AgentChat documentation](https://microsoft.github.io/autogen/stable/user-guide/agentchat-user-guide/index.html).\n\n### AutoGen Studio\n\nUse AutoGen Studio to prototype and run multi-agent workflows without writing code.\n\n> **Caution**: AutoGen Studio is meant to help you rapidly prototype multi-agent workflows and\n> demonstrate an example of end user interfaces built with AutoGen. It is **not meant to be a\n> production-ready app**. Developers are encouraged to use the AutoGen framework to build their own\n> applications, implementing authentication, security and other features required for deployed\n> applications. See the [security note](https://microsoft.github.io/autogen/dev/user-guide/autogenstudio-user-guide/index.html#a-note-on-security) for more details.\n\n```bash\n# Run AutoGen Studio on http://localhost:8080\nautogenstudio ui --port 8080 --appdir ./my-app\n```\n\n## Why AutoGen?\n\n<div align=\"center\">\n  <img src=\"autogen-landing.jpg\" alt=\"AutoGen Landing\" width=\"500\">\n</div>\n\nPioneered in Microsoft Research, AutoGen opened the door to experimental multi-agent orchestration patterns that inspired the community. While AutoGen is now in maintenance mode, existing users can continue to use the framework with the architecture described below. **For new projects, we recommend [Microsoft Agent Framework](https://github.com/microsoft/agent-framework)**, which builds on the lessons learned from AutoGen with enterprise-grade support.\n\nThe autogen _framework_ uses a layered and extensible design. Layers have clearly divided responsibilities and build on top of layers below. This design enables you to use the framework at different levels of abstraction, from high-level APIs to low-level components.\n\n- [Core API](./python/packages/autogen-core/) implements message passing, event-driven agents, and local and distributed runtime for flexibility and power. It also support cross-language support for .NET and Python.\n- [AgentChat API](./python/packages/autogen-agentchat/) implements a simpler but opinionated API for rapid prototyping. This API is built on top of the Core API and is closest to what users of v0.2 are familiar with and supports common multi-agent patterns such as two-agent chat or group chats.\n- [Extensions API](./python/packages/autogen-ext/) enables first- and third-party extensions continuously expanding framework capabilities. It support specific implementation of LLM clients (e.g., OpenAI, AzureOpenAI), and capabilities such as code execution.\n\nThe ecosystem also supports two essential _developer tools_:\n\n<div align=\"center\">\n  <img src=\"https://media.githubusercontent.com/media/microsoft/autogen/refs/heads/main/python/packages/autogen-studio/docs/ags_screen.png\" alt=\"AutoGen Studio Screenshot\" width=\"500\">\n</div>\n\n- [AutoGen Studio](./python/packages/autogen-studio/) provides a no-code GUI for building multi-agent applications.\n- [AutoGen Bench](./python/packages/agbench/) provides a benchmarking suite for evaluating agent performance.\n\nYou can use the AutoGen framework and developer tools to create applications for your domain. For example, [Magentic-One](./python/packages/magentic-one-cli/) is a state-of-the-art multi-agent team built using AgentChat API and Extensions API that can handle a variety of tasks that require web browsing, code execution, logo.png\" width=\"600px\" alt=\"Open source Multi-AI Agent orchestration framework\">\n  </a>\n</p>\n<p align=\"center\" style=\"display: flex; justify-content: center; gap: 20px; align-items: center;\">\n  <a href=\"https://trendshift.io/repositories/11239\" target=\"_blank\">\n    <img src=\"https://trendshift.io/api/badge/repositories/11239\" alt=\"crewAIInc%2FcrewAI | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/>\n  </a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://crewai.com\">Homepage</a>\n  ·\n  <a href=\"https://docs.crewai.com\">Docs</a>\n  ·\n  <a href=\"https://app.crewai.com\">Start Cloud Trial</a>\n  ·\n  <a href=\"https://blog.crewai.com\">Blog</a>\n  ·\n  <a href=\"https://community.crewai.com\">Forum</a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/crewAIInc/crewAI\">\n    <img src=\"https://img.shields.io/github/stars/crewAIInc/crewAI\" alt=\"GitHub Repo stars\">\n  </a>\n  <a href=\"https://github.com/crewAIInc/crewAI/network/members\">\n    <img src=\"https://img.shields.io/github/forks/crewAIInc/crewAI\" alt=\"GitHub forks\">\n  </a>\n  <a href=\"https://github.com/crewAIInc/crewAI/issues\">\n    <img src=\"https://img.shields.io/github/issues/crewAIInc/crewAI\" alt=\"GitHub issues\">\n  </a>\n  <a href=\"https://github.com/crewAIInc/crewAI/pulls\">\n    <img src=\"https://img.shields.io/github/issues-pr/crewAIInc/crewAI\" alt=\"GitHub pull requests\">\n  </a>\n  <a href=\"https://opensource.org/licenses/MIT\">\n    <img src=\"https://img.shields.io/badge/License-MIT-green.svg\" alt=\"License: MIT\">\n  </a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://pypi.org/project/crewai/\">\n    <img src=\"https://img.shields.io/pypi/v/crewai\" alt=\"PyPI version\">\n  </a>\n  <a href=\"https://pypi.org/project/crewai/\">\n    <img src=\"https://img.shields.io/pypi/dm/crewai\" alt=\"PyPI downloads\">\n  </a>\n  <a href=\"https://twitter.com/crewAIInc\">\n    <img src=\"https://img.shields.io/twitter/follow/crewAIInc?style=social\" alt=\"Twitter Follow\">\n  </a>\n</p>\n\n### Fast and Flexible Multi-Agent Automation Framework\n\n> CrewAI is a lean, lightning-fast Python framework built entirely from scratch—completely **independent of LangChain or other agent frameworks**.\n> It empowers developers with both high-level simplicity and precise low-level control, ideal for creating autonomous AI agents tailored to any scenario.\n\n- **CrewAI Crews**: Optimize for autonomy and collaborative intelligence.\n- **CrewAI Flows**: The **enterprise and production architecture** for building and deploying multi-agent systems. Enable granular, event-driven control, single LLM calls for precise task orchestration and supports Crews natively\n\nWith over 100,000 developers certified through our community courses at [learn.crewai.com](https://learn.crewai.com), CrewAI is rapidly becoming the\nstandard for enterprise-ready AI automation.\n\n# CrewAI AMP Suite\n\nCrewAI AMP Suite is a comprehensive bundle tailored for organizations that require secure, scalable, and easy-to-manage agent-driven automation.\n\nYou can try one part of the suite the [Crew Control Plane for free](https://app.crewai.com)\n\n## Crew Control Plane Key Features:\n\n- **Tracing & Observability**: Monitor and track your AI agents and workflows in real-time, including metrics, logs, and traces.\n- **Unified Control Plane**: A centralized platform for managing, monitoring, and scaling your AI agents and workflows.\n- **Seamless Integrations**: Easily connect with existing enterprise systems, data sources, and cloud infrastructure.\n- **Advanced Security**: Built-in robust security and compliance measures ensuring safe deployment and management.\n- **Actionable Insights**: Real-time analytics and reporting to optimize performance and decision-making.\n- **24/7 Support**: Dedicated enterprise support to ensure uninterrupted operation and quick resolution of issues.\n- **On-premise and Cloud Deployment Options**: Deploy CrewAI AMP on-premise or in the cloud, depending on your security and compliance requirements.\n\nCrewAI AMP is designed for enterprises seeking a powerful, reliable solution to transform complex business processes into efficient,\nintelligent automations.\n\n## Table of contents\n\n- [Build with AI](#build-with-ai)\n- [Why CrewAI?](#why-crewai)\n- [Getting Started](#getting-started)\n- [Key Features](#key-features)\n- [Understanding Flows and Crews](#understanding-flows-and-crews)\n- [CrewAI vs LangGraph](#how-crewai-compares)\n- [Examples](#examples)\n  - [Quick Tutorial](#quick-tutorial)\n  - [Write Job Descriptions](#write-job-descriptions)\n  - [Trip Planner](#trip-planner)\n  - [Stock Analysis](#stock-analysis)\n  - [Using Crews and Flows Together](#using-crews-and-flows-together)\n- [Connecting Your Crew to a Model](#connecting-your-crew-to-a-model)\n- [How CrewAI Compares](#how-crewai-compares)\n- [Frequently Asked Questions (FAQ)](#frequently-asked-questions-faq)\n- [Contribution](#contribution)\n- [Telemetry](#telemetry)\n- [License](#license)\n\n## Build with AI\n\nUsing an AI coding agent? Teach it CrewAI best practices in one command:\n\n**Claude Code:**\n```shell\n/plugin marketplace add crewAIInc/skills\n/plugin install crewai-skills@crewai-plugins\n/reload-plugins\n```\nFour skills that activate automatically when you ask relevant CrewAI questions:\n\n| Skill | When it runs |\n|-------|--------------|\n| `getting-started` | Scaffolding new projects, choosing between `LLM.call()` / `Agent` / `Crew` / `Flow`, wiring `crew.py` / `main.py` |\n| `design-agent` | Configuring agents — role, goal, backstory, tools, LLMs, memory, guardrails |\n| `design-task` | Writing task descriptions, dependencies, structured output (`output_pydantic`, `output_json`), human review |\n| `ask-docs` | Querying the live [CrewAI docs MCP server](https://docs.crewai.com/mcp) for up-to-date API details |\n\n**Cursor, Codex, Windsurf, and others ([skills.sh](https://skills.sh/crewaiinc/skills)):**\n```shell\nnpx skills add crewaiinc/skills\n```\n\nThis installs the official [CrewAI Skills](https://github.com/crewAIInc/skills) — structured instructions that teach coding agents how to scaffold Flows, configure Crews, design agents and tasks, and follow CrewAI patterns.\n\n## Why CrewAI?\n\n<div align=\"center\" style=\"margin-bottom: 30px;\">\n  <img src=\"docs/images/asset.png\" alt=\"CrewAI Logo\" width=\"100%\">\n</div>\n\nCrewAI unlocks the true potential of multi-agent automation, delivering the best-in-class combination of speed, flexibility, and control with either Crews of AI Agents or Flows of Events:\n\n- **Standalone Framework**: Built from scratch, independent of LangChain or any other agent framework.\n- **High Performance**: Optimized for speed and minimal resource usage, enabling faster execution.\n- **Flexible Low Level Customization**: Complete freedom to customize at both high and low levels - from overall workflows and system architecture to granular agent behaviors, internal prompts, and execution logic.\n- **Ideal for Every Use Case**: Proven effective for both simple tasks and highly complex, real-world, enterprise-grade scenarios.\n- **Robust Community**: Backed by a rapidly growing community of over **100,000 certified** developers offering comprehensive support and resources.\n\nCrewAI empowers developers and enterprises to confidently build intelligent automations, bridging the gap between simplicity, flexibility, and performance.\n\n## Getting Started\n\nSetup and run your first CrewAI agents by following this tutorial.\n\n[![CrewAI Getting Started Tutorial](https://img.youtube.com/vi/-kSOTtYzgEw/hqdefault.jpg)](https://www.youtube.com/watch?v=-kSOTtYzgEw \"CrewAI Getting Started Tutorial\")\n\n###\n\nLearning Resources\n\nLearn CrewAI through our comprehensive courses:\n\n- [Multi AI Agent Systems with CrewAI](https://www.deeplearning.ai/short-courses/multi-ai-agent-systems-with-crewai/) - Master the fundamentals of multi-agent systems\n- [Practical Multi AI Agents and Advanced Use Cases](https://www.deeplearning.ai/short-courses/practical-multi-ai-agents-and-advanced-use-cases-with-crewai/) - Deep dive into advanced implementations\n\n### Understanding Flows and Crews\n\nCrewAI offers two powerful, complementary approaches that work seamlessly together to build sophisticated AI applications:\n\n1. **Crews**: Teams of AI agents with true autonomy and agency, working together to accomplish complex tasks through role-based collaboration. Crews enable:\n\n   - Natural, autonomous decision-making between agents\n   - Dynamic task delegation and collaboration\n   - Specialized roles with defined goals and expertise\n   - Flexible problem-solving approaches\n\n2. **Flows**: Production-ready, event-driven workflows that deliver precise control over complex automations. Flows provide:\n\n   - Fine-grained control over execution paths for real-world scenarios\n   - Secure, consistent state management between tasks\n   - Clean integration of AI agents with production Python code\n   - Conditional branching for complex business logic\n\nThe true power of CrewAI emerges when combining Crews and Flows. This synergy allows you to:\n\n- Build complex, production-grade applications\n- Balance autonomy with precise control\n- Handle sophisticated real-world scenarios\n- Maintain clean, maintainable code structure\n\n### Getting Started with Installation\n\nTo get started with CrewAI, follow these simple steps:\n\n### 1. Installation\n\nEnsure you have Python >=3.10 <3.14 installed on your system. CrewAI uses [UV](https://docs.astral.sh/uv/) for dependency management and package handling, offering a seamless setup and execution experience.\n\nFirst, install CrewAI:\n\n```shell\nuv pip install crewai\n```\n\nIf you want to install the 'crewai' package along with its optional features that include additional tools for agents, you can do so by using the following command:\n\n```shell\nuv pip install 'crewai[tools]'\n```\n\nThe command above installs the basic package and also adds extra components which require more dependencies to function.\n\n### Troubleshooting Dependencies\n\nIf you encounter issues during installation or usage, here are some common solutions:\n\n#### Common Issues\n\n1. **ModuleNotFoundError: No module named 'tiktoken'**\n\n   - Install tiktoken explicitly: `uv pip install 'crewai[embeddings]'`\n   - If using embedchain or other tools: `uv pip install 'crewai[tools]'`\n\n2. **Failed building wheel for tiktoken**\n\n   - Ensure Rust compiler is installed (see installation steps above)\n   - For Windows: Verify Visual C++ Build Tools are installed\n   - Try upgrading pip: `uv pip install --upgrade pip`\n   - If issues persist, use a pre-built wheel: `uv pip install tiktoken --prefer-binary`\n\n### 2. Setting Up Your Crew with the YAML Configuration\n\nTo create a new CrewAI project, run the following CLI (Command Line Interface) command:\n\n```shell\ncrewai create crew <project_name>\n```\n\nThis command creates a new project folder with the following structure:\n\n```\nmy_project/\n├── .gitignore\n├── pyproject.toml\n├── README.md\n├── .env\n└── src/\n    └── my_project/\n        ├── __init__.py\n        ├── main.py\n        ├── crew.py\n        ├── tools/\n        │   ├── custom_tool.py\n        │   └── __init__.py\n        └── config/\n            ├── agents.yaml\n            └── tasks.yaml\n```\n\nYou can now start developing your crew by editing the files in the `src/my_project` folder. The `main.py` file is the entry point of the project, the `crew.py` file is where you define your crew, the `agents.yaml` file is where you define your agents, and the `tasks.yaml` file is where you define your tasks.\n\n#### To customize your project, you can:\n\n- Modify `src/my_project/config/agents.yaml` to define your agents.\n- Modify `src/my_project/config/tasks.yaml` to define your tasks.\n- Modify `src/my_project/crew.py` to add your own logic, tools, and specific arguments.\n- Modify `src/my_project/main.py` to add custom inputs for your agents and tasks.\n- Add your environment variables into the `.env` file.\n\n#### Example of a simple crew with a sequential process:\n\nInstantiate your crew:\n\n```shell\ncrewai create crew latest-ai-development\n```\n\nModify the files as needed to fit your use case:\n\n**agents.yaml**\n\n```yaml\n# src/my_project/config/agents.yaml\nresearcher:\n  role: >\n    {topic} Senior Data Researcher\n  goal: >\n    Uncover cutting-edge developments in {topic}\n  backstory: >\n    You're a seasoned researcher with a knack for uncovering the latest\n    developments in {topic}. Known for your ability to find the most relevant\n    information and present it in a clear and concise manner.\n\nreporting_analyst:\n  role: >\n    {topic} Reporting Analyst\n  goal: >\n    Create detailed reports based on {topic} data analysis and research findings\n  backstory: >\n    You're a meticulous analyst with a keen eye for detail. You're known for\n    your ability to turn complex data into clear and concise reports, making\n    it easy for others to understand and act on the information you provide.\n```\n\n**tasks.yaml**\n\n````yaml\n# src/my_project/config/tasks.yaml\nresearch_task:\n  description: >\n    Conduct a thorough research about {topic}\n    Make sure you find any interesting and relevant information given\n    the current year is 2025.\n  expected_output: >\n    A list with 10 bullet points of the most relevant information about {topic}\n  agent: researcher\n\nreporting_task:\n  description: >\n    Review the context you got and expand each topic into a full section for a report.\n    Make sure the report is detailed and contains any and all relevant information.\n  expected_output: >\n    A fully fledge reports with the mains topics, each with a full section of information.\n    Formatted as markdown without '```'\n  agent: reporting_analyst\n  output_file: report.md\n````\n\n**crew.py**\n\n```python\n# src/my_project/crew.py\nfrom crewai import Agent, Crew, Process, Task\nfrom crewai.project import CrewBase, agent, crew, task\nfrom crewai_tools import SerperDevTool\nfrom crewai.agents.agent_builder.base_agent import BaseAgent\nfrom typing import List\n\n@CrewBase\nclass LatestAiDevelopmentCrew():\n\t\"\"\"LatestAiDevelopment crew\"\"\"\n\tagents: List[BaseAgent]\n\ttasks: List[Task]\n\n\t@agent\n\tdef researcher(self) -> Agent:\n\t\treturn Agent(\n\t\t\tconfig=self.agents_config['researcher'],\n\t\t\tverbose=True,\n\t\t\ttools=[SerperDevTool()]\n\t\t)\n\n\t@agent\n\tdef reporting_analyst(self) -> Agent:\n\t\treturn Agent(\n\t\t\tconfig=self.agents_config['reporting_analyst'],\n\t\t\tverbose=True\n\t\t)\n\n\t@task\n\tdef research_task(self) -> Task:\n\t\treturn Task(\n\t\t\tconfig=self.tasks_config['research_task'],\n\t\t)\n\n\t@task\n\tdef reporting_task(self) -> Task:\n\t\treturn Task(\n\t\t\tconfig=self.tasks_config['reporting_task'],\n\t\t\toutput_file='report.md'\n\t\t)\n\n\t@crew\n\tdef crew(self) -> Crew:\n\t\t\"\"\"Creates the LatestAiDevelopment crew\"\"\"\n\t\treturn Crew(\n\t\t\tagents=self.agents, # Automatically created by the @agent decorator\n\t\t\ttasks=self.tasks, # Automatically created by the @task decorator\n\t\t\tprocess=Process.sequential,\n\t\t\tverbose=True,\n\t\t)\n```\n\n**main.py**\n\n```python\n#!/usr/bin/env python\n# src/my_project/main.py\nimport sys\nfrom latest_ai_development.crew import LatestAiDevelopmentCrew\n\ndef run():\n    \"\"\"\n    Run the crew.\n    \"\"\"\n    inputs = {\n        'topic': 'AI Agents'\n    }\n    LatestAiDevelopmentCrew().crew().kickoff(inputs=inputs)\n```\n\n### 3. Running Your Crew\n\nBefore running your crew, make sure you have the following keys set as environment variables in your `.env` file:\n\n- An [OpenAI API key](https://platform.openai.com/account/api-keys) (or other LLM API key): `OPENAI_API_KEY=sk-...`\n- A [Serper.dev](https://serper.dev/) API key: `SERPER_API_KEY=YOUR_KEY_HERE`\n\nLock the dependencies and install them by using the CLI command but first, navigate to your project directory:\n\n```shell\ncd my_project\ncrewai install (Optional)\n```\n\nTo run your crew, execute the following command in the root of your project:\n\n```bash\ncrewai run\n```\n\nor\n\n```bash\npython src/my_project/main.py\n```\n\nIf an error happens due to the usage of poetry, please run the following command to update your crewai package:\n\n```bash\ncrewai update\n```\n\nYou should see the output in the console and the `report.md` file should be created in the root of your project with the full final report.\n\nIn addition to the sequential process, you can use the hierarchical process, which automatically assigns a manager to the defined crew to properly coordinate the planning and execution of tasks through delegation and validation of results. [See more about the processes here](https://docs.crewai.com/core-concepts/Processes/).\n\n## Key Features\n\nCrewAI stands apart as a lean, standalone, high-performance multi-AI Agent framework delivering simplicity, flexibility, and precise control—free from the complexity and limitations found in other agent frameworks.\n\n- **Standalone & Lean**: Completely independent from other frameworks like LangChain, offering faster execution and lighter resource demands.\n- **Flexible & Precise**: Easily orchestrate autonomous agents through intuitive [Crews](https://docs.crewai.com/concepts/crews) or precise [Flows](https://docs.crewai.com/concepts/flows), achieving perfect balance for your needs.\n- **Seamless Integration**: Effortlessly combine Crews (autonomy) and Flows (precision) to create complex, real-world automations.\n- **Deep Customization**: Tailor every aspect—from high-level workflows down to low-level internal prompts and agent behaviors.\n- **Reliable Performance**: Consistent results across simple tasks and complex, enterprise-level automations.\n- **Thriving Community**: Backed by robust documentation and over 100,000 certified developers, providing exceptional support and guidance.\n\nChoose CrewAI to easily build powerful, adaptable, and production-ready AI automations.\n\n## Examples\n\nYou can test different real life examples of AI crews in the [CrewAI-examples repo](https://github.com/crewAIInc/crewAI-examples?tab=readme-ov-file):\n\n- [Landing Page Generator](https://github.com/crewAIInc/crewAI-examples/tree/main/crews/landing_page_generator)\n- [Having Human input on the execution](https://docs.crewai.com/how-to/Human-Input-on-Execution)\n- [Trip Planner](https://github.com/crewAIInc/crewAI-examples/tree/main/crews/trip_planner)\n- [Stock Analysis](https://github.com/crewAIInc/crewAI-examples/tree/main/crews/stock_analysis)\n\n### Quick Tutorial\n\n[![CrewAI Tutorial](https://img.youtube.com/vi/tnejrr-0a94/maxresdefault.jpg)](https://www.youtube.com/watch?v=tnejrr-0a94 \"CrewAI Tutorial\")\n\n### Write Job Descriptions\n\n[Check out code for this example](https://github.com/crewAIInc/crewAI-examples/tree/main/crews/job-posting) or watch a video below:\n\n[![Jobs postings](https://img.youtube.com/vi/u98wEMz-9to/maxresdefault.jpg)](https://www.youtube.com/watch?v=u98wEMz-9to \"Jobs postings\")\n\n### Trip Planner\n\n[Check out code for this example](https://github.com/crewAIInc/crewAI-examples/tree/main/crews/trip_planner) or watch a video below:\n\n[![Trip Planner](https://img.youtube.com/vi/xis7rWp-hjs/maxresdefault.jpg)](https://www.youtube.com/watch?v=xis7rWp-hjs \"Trip Planner\")\n\n### Stock Analysis\n\n[Check out code for this example](https://github.com/crewAIInc/crewAI-examples/tree/main/crews/stock_analysis) or watch a video below:\n\n[![Stock Analysis](https://img.youtube.com/vi/e0Uj4yWdaAg/maxresdefault.jpg)](https://www.youtube.com/watch?v=e0Uj4yWdaAg \"Stock Analysis\")\n\n### Using Crews and Flows Together\n\nCrewAI's power truly shines when combining Crews with Flows to create sophisticated automation pipelines.\nCrewAI flows support logical operators like `or_` and `and_` to combine multiple conditions. This can be used with `@start`, `@listen`, or `@router` decorators to create complex triggering conditions.\n\n- `or_`: Triggers when any of the specified conditions are met.\n- `and_`Triggers when all of the specified conditions are met.\n\nHere's how you can orchestrate multiple Crews within a Flow:\n\n```python\nfrom crewai.flow.flow import Flow, listen, start, router, or_\nfrom crewai import Crew, Agent, Task, Process\nfrom pydantic import BaseModel\n\n# Define structured state for precise control\nclass MarketState(BaseModel):\n    sentiment: str = \"neutral\"\n    confidence: float = 0.0\n    recommendations: list = []\n\nclass AdvancedAnalysisFlow(Flow[MarketState]):\n    @start()\n    def fetch_market_data(self):\n        # Demonstrate low-level control with structured state\n        self.state.sentiment = \"analyzing\"\n        return {\"sector\": \"tech\", \"timeframe\": \"1W\"}  # These parameters match the task description template\n\n    @listen(fetch_market_data)\n    def analyze_with_crew(self, market_data):\n        # Show crew agency through specialized roles\n        analyst = Agent(\n            role=\"Senior Market Analyst\",\n            goal=\"Conduct deep market analysis with expert insight\",\n            backstory=\"You're a veteran analyst known for identifying subtle market patterns\"\n        )\n        researcher = Agent(\n            role=\"Data Researcher\",\n            goal=\"Gather and validate supporting market data\",\n            backstory=\"You excel at finding and correlating multiple data sources\"\n        )\n\n        analysis_task = Task(\n            description=\"Analyze {sector} sector data for the past {timeframe}\",\n            expected_output=\"Detailed market analysis with confidence score\",\n            agent=analyst\n        )\n        research_task = Task(\n            description=\"Find supporting data to validate the analysis\",\n            expected_output=\"Corroborating evidence and potential contradictions\",\n            agent=researcher\n        )\n\n        # Demonstrate crew autonomy\n        analysis_crew = Crew(\n            agents=[analyst, researcher],\n            tasks=[analysis_task, research_task],\n            process=Process.sequential,\n            verbose=True\n        )\n        return analysis_crew.kickoff(inputs=market_data)  # Pass market_data as named inputs\n\n    @router(analyze_with_crew)\n    def determine_next_steps(self):\n        # Show flow control with conditional routing\n        if self.state.confidence > 0.8:\n            return \"high_confidence\"\n        elif self.state.confidence > 0.5:\n            return \"medium_confidence\"\n        return \"low_confidence\"\n\n    @listen(\"high_confidence\")\n    def execute_strategy(self):\n        # Demonstrate complex decision making\n        strategy_crew = Crew(\n            agents=[\n                Agent(role=\"Strategy Expert\",\n                      goal=\"Develop optimal market strategy\")\n            ],\n            tasks=[\n                Task(description=\"Create detailed strategy based on analysis\",\n                     expected_output=\"Step-by-step action plan\")\n            ]\n        )\n        return strategy_crew.kickoff()\n\n    @listen(or_(\"medium_confidence\", \"low_confidence\"))\n    def request_additional_analysis(self):\n        self.state.recommendations.append(\"Gather more data\")\n        return \"Additional analysis required\"\n```\n\nThis example demonstrates how to:\n\n1. Use Python code for basic data operations\n2. Create and execute Crews as steps in your workflow\n3. Use Flow decorators to manage the sequence of operations\n4. Implement conditional branching based on Crew results\n\n## Connecting Your Crew to a Model\n\nCrewAI supports using various LLMs through a variety of connection options. By default your agents will use the OpenAI API when querying the model. However, there are several other ways to allow your agents to connect to models. For example, you can configure your agents to use a local model via the Ollama tool.\n\nPlease refer to the [Connect CrewAI to LLMs](https://docs.crewai.com/how-to/LLM-Connections/) page for details on configuring your agents' connections to models.\n\n## How CrewAI Compares\n\n**CrewAI's Advantage**: CrewAI combines autonomous agent intelligence with precise workflow control through its unique Crews and Flows architecture. The framework excels at both high-level orchestration and low-level customization, enabling complex, production-grade systems with granular control.\n\n- **LangGraph**: While LangGraph provides a foundation for building agent workflows, its approach requires significant boilerplate code and complex state management patterns. The framework's tight coupling with LangChain can limit flexibility when implementing custom agent behaviors or integrating with external systems.\n\n_P.S. CrewAI demonstrates significant performance advantages over LangGraph, executing 5.76x faster in certain cases like this QA task example ([see comparison](https://github.com/crewAIInc/crewAI-examples/tree/main/Notebooks/CrewAI%20Flows%20%26%20Langgraph/QA%20Agent)) while achieving higher evaluation scores with faster completion times in certain coding tasks, like in this example ([detailed analysis](https://github.com/crewAIInc/crewAI-examples/blob/main/Notebooks/CrewAI%20Flows%20%26%20Langgraph/Coding%20Assistant/coding_assistant_eval.ipynb))._\n\n- **Autogen**: While Autogen excels at creating conversational agents capable of working together, it lacks an inherent concept of process. In Autogen, orchestrating agents' interactions requires additional programming, which can become complex and cumbersome as the scale of tasks grows.\n- **ChatDev**: ChatDev introduced the idea of processes into the realm of AI agents, but its implementation is quite rigid. Customizations in ChatDev are limited and not geared towards production environments, which can hinder scalability and flexibility in real-world applications.\n\n## Contribution\n\nCrewAI is open-source and we welcome contributions. If you're looking to contribute, please:\n\n- Fork the repository.\n- Create a new branch for your feature.\n- Add your feature or improvement.\n- Send a pull request.\n- We appreciate your input!\n\n### Installing Dependencies\n\n```bash\nuv lock\nuv sync\n```\n\n### Virtual Env\n\n```bash\nuv venv\n```\n\n### Pre-commit hooks\n\n```bash\npre-commit install\n```\n\n### Running Tests\n\n```bash\nuv run pytest .\n```\n\n### Running static type checks\n\n```bash\nuvx mypy src\n```\n\n### Packaging\n\n```bash\nuv build\n```\n\n### Installing Locally\n\n```bash\nuv pip install dist/*.tar.gz\n```\n\n## Telemetry\n\nCrewAI uses anonymous telemetry to collect usage data with the main purpose of helping us improve the library by focusing our efforts on the most used features, integrations and tools.\n\nIt's pivotal to understand that **NO data is collected** concerning prompts, task descriptions, agents' backstories or goals, usage of tools, API calls, responses, any data processed by the agents, or secrets and environment variables, with the exception of the conditions mentioned. When the `share_crew` feature is enabled, detailed data including task descriptions, agents' backstories or goals, and other specific attributes are collected to provide deeper insights while respecting user privacy. Users can disable telemetry by setting the environment variable OTEL_SDK_DISABLED to true.\n\nData collected includes:\n\n- Version of CrewAI\n  - So we can understand how many users are using the latest version\n- Version of Python\n  - So we can decide on what versions to better support\n- General OS (e.g. number of CPUs, macOS/Windows/Linux)\n  - So we know what OS we should focus on and if we could build specific OS related features\n- Number of agents and tasks in a crew\n  - So we make sure we are testing internally with similar use cases and educate people on the best practices\n- Crew Process being used\n  - Understand where we should focus our efforts\n- If Agents are using memory or allowing delegation\n  - Understand if we improved the features or maybe even drop them\n- If Tasks are being executed in parallel or sequentially\n  - Understand if we should focus more on parallel execution\n- Language model being used\n  - Improved support on most used languages\n- Roles of agents in a crew\n  - Understand high level use cases so we can build better tools, integrations and examples about it\n- Tools names available\n  - Understand out of the publicly available tools, which ones are being used the most so we can improve them\n\nUsers can opt-in to Further Telemetry, sharing the complete telemetry data by setting the `share_crew` attribute to `True` on their Crews. Enabling `share_crew` results in the collection of detailed crew and task execution data, including `goal`, `backstory`, `context`, and `output` of tasks. This enables a deeper insight into usage patterns while respecting the user's choice to share.\n\n## License\n\nCrewAI is released under the [MIT License](https://github.com/crewAIInc/crewAI/blob/main/LICENSE).\n\n## Frequently Asked Questions (FAQ)\n\n### General\n\n- [What exactly is CrewAI?](#q-what-exactly-is-crewai)\n- [How do I install CrewAI?](#q-how-do-i-install-crewai)\n- [Does CrewAI depend on LangChain?](#q-does-crewai-depend-on-langchain)\n- [Is CrewAI open-source?](#q-is-crewai-open-source)\n- [Does CrewAI collect data from users?](#q-does-crewai-collect-data-from-users)\n\n### Features and Capabilities\n\n- [Can CrewAI handle complex use cases?](#q-can-crewai-handle-complex-use-cases)\n- [Can I use CrewAI with local AI models?](#q-can-i-use-crewai-with-local-ai-models)\n- [What makes Crews different from Flows?](#q-what-makes-crews-different-from-flows)\n- [How is CrewAI better than LangChain?](#q-how-is-crewai-better-than-langchain)\n- [Does CrewAI support fine-tuning or training custom models?](#q-does-crewai-support-fine-tuning-or-training-custom-models)\n\n### Resources and Community\n\n- [Where can I find real-world CrewAI examples?](#q-where-can-i-find-real-world-crewai-examples)\n- [How can I contribute to CrewAI?](#q-how-can-i-contribute-to-crewai)\n\n### Enterprise Features\n\n- [What additional features does CrewAI AMP offer?](#q-what-additional-features-does-crewai-amp-offer)\n- [Is CrewAI AMP available for cloud and on-premise deployments?](#q-is-crewai-amp-available-for-cloud-and-on-premise-deployments)\n- [Can I try CrewAI AMP for free?](#q-can-i-try-crewai-amp-for-free)\n\n### Q: What exactly is CrewAI?\n\nA: CrewAI is a standalone, lean, and fast Python framework built specifically for orchestrating autonomous AI agents. Unlike frameworks like LangChain, CrewAI does not rely on external dependencies, making it leaner, faster, and simpler.\n\n### Q: How do I install CrewAI?\n\nA: Install CrewAI using pip:\n\n```shell\nuv pip install crewai\n```\n\nFor additional tools, use:\n\n```shell\nuv pip install 'crewai[tools]'\n```\n\n### Q: Does CrewAI depend on LangChain?\n\nA: No. CrewAI is built entirely from the ground up, with no dependencies on LangChain or other agent frameworks. This ensures a lean, fast, and flexible experience.\n\n### Q: Can CrewAI handle complex use cases?\n\nA: Yes. CrewAI excels at both simple and highly complex real-world scenarios, offering deep customization options at both high and low levels, from internal prompts to sophisticated workflow orchestration.\n\n### Q: Can I use CrewAI with local AI models?\n\nA: Absolutely! CrewAI supports various language models, including local ones. Tools like Ollama and LM Studio allow seamless integration. Check the [LLM Connections documentation](https://docs.crewai.com/how-to/LLM-Connections/) for more details.\n\n### Q: What makes Crews different from Flows?\n\nA: Crews provide autonomous agent collaboration, ideal for tasks requiring flexible decision-making and dynamic interaction. Flows offer precise, event-driven control, ideal for managing detailed execution paths and secure state management. You can seamlessly combine both for maximum effectiveness.\n\n### Q: How is CrewAI better than LangChain?\n\nA: CrewAI provides simpler, more intuitive APIs, faster execution speeds, more reliable and consistent results, robust documentation, and an active community—addressing common criticisms and limitations associated with LangChain.\n\n### Q: Is CrewAI open-source?\n\nA: Yes, CrewAI is open-source and actively encourages community contributions and collaboration.\n\n### Q: Does CrewAI collect data from users?\n\nA: CrewAI collects anonymous telemetry data strictly for improvement purposes. Sensitive data such as prompts, tasks, or API responses are never collected unless explicitly enabled by the user.\n\n### Q: Where can I find real-world CrewAI examples?\n\nA: Check out practical examples in the [CrewAI-examples repository](https://github.com/crewAIInc/crewAI-examples), covering use cases like trip planners, stock analysis, and job postings.\n\n### Q: How can I contribute to CrewAI?\n\nA: Contributions are warmly welcomed! Fork the repository, create your branch, implement your changes, and submit a pull request. See the Contribution section of the README for detailed guidelines.\n\n### Q: What additional features does CrewAI AMP offer?\n\nA: CrewAI AMP provides advanced features such as a unified control plane, real-time observability, secure integrations, advanced security, actionable insights, and dedicated 24/7 enterprise support.\n\n### Q: Is CrewAI AMP available for cloud and on-premise deployments?\n\nA: Yes, CrewAI AMP supports both cloud-based and on-premise deployment options, allowing enterprises to meet their specific security and compliance requirements.\n\n### Q: Can I try CrewAI AMP for free?\n\nA: Yes, you can explore part of the CrewAI AMP Suite by accessing the [Crew Control Plane](https://app.crewai.com) for free.\n\n### Q: Does CrewAI support fine-tuning or training custom models?\n\nA: Yes, CrewAI can integrate with custom-trained or fine-tuned models, allowing you to enhance your agents with domain-specific knowledge and accuracy.\n\n### Q: Can CrewAI agents interact with external tools and APIs?\n\nA: Absolutely! CrewAI agents can easily integrate with external tools, APIs, and databases, empowering them to leverage real-world data and resources.\n\n### Q: Is CrewAI suitable for production environments?\n\nA: Yes, CrewAI is explicitly designed with production-grade standards, ensuring reliability, stability, and scalability for enterprise deployments.\n\n### Q: How scalable is CrewAI?\n\nA: CrewAI is highly scalable, supporting simple automations and large-scale enterprise workflows involving numerous agents and complex tasks simultaneously.\n\n### Q: Does CrewAI offer debugging and monitoring tools?\n\nA: Yes, CrewAI AMP includes advanced debugging, tracing, and real-time observability features, simplifying the management and troubleshooting of your automations.\n\n### Q: What programming languages does CrewAI support?\n\nA: CrewAI is primarily Python-based but easily integrates with services and APIs written in any programming language through its flexible API integration capabilities.\n\n### Q: Does CrewAI offer educational resources for beginners?\n\nA: Yes, CrewAI provides extensive beginner-friendly tutorials, courses, and documentation through learn.crewai.com, supporting developers at all skill levels.\n\n### Q: Can CrewAI automate human-in-the-loop workflows?\n\nA: Yes, CrewAI fully supports human-in-the-loop workflows, allowing seamless collaboration between human experts and AI agents for enhanced decision-making.\n","summary":"CrewAI is a powerful Python framework designed for orchestrating autonomous multi-agent systems that collaborate to execute complex tasks. It offers a flexible architecture featuring \"Crews\" for collaborative intelligence and \"Flows\" for precise, event-driven task management. By providing robust observability, enterprise-grade security, and seamless integration capabilities, it is an ideal solution for developers and organizations building scalable AI-driven automation.","description":"Framework for orchestrating role-playing, autonomous AI agents. By fostering collaborative intelligence, CrewAI empowers agents to work together seamlessly, tackling complex tasks.","stars":52701,"language":"Python"},{"owner":"noahshinn","repo":"reflexion","url":"https://github.com/noahshinn/reflexion","readme":"# [NeurIPS 2023] Reflexion: Language Agents with Verbal Reinforcement Learning\n\nThis repo holds the code, demos, and log files for [Reflexion: Language Agents with Verbal Reinforcement Learning](https://arxiv.org/abs/2303.11366) by Noah Shinn, Federico Cassano, Edward Berman, Ashwin Gopinath, Karthik Narasimhan, Shunyu Yao. \n\n![Reflexion RL diagram](./figures/reflexion_rl.png)\n\n![Reflexion tasks](./figures/reflexion_tasks.png)\n\nWe have released the LeetcodeHardGym [here](https://github.com/GammaTauAI/leetcode-hard-gym)\n\n## To Run: reasoning (HotPotQA)\n\nWe have provided a set of notebooks to easily run, explore, and interact with the results of the reasoning experiments. Each experiment consists of a random sample of 100 questions from the HotPotQA distractor dataset. Each question in the sample is attempted by an agent with a specific type and reflexion strategy.\n\n### Setup\n\nTo get started:\n\n1. Clone this repo and move to the HotPotQA directory:\n\n```bash\ngit clone https://github.com/noahshinn/reflexion && cd ./hotpotqa_runs\n```\n\n2. Install the module dependencies into your environment:\n\n```bash\npip install -r requirements.txt\n```\n\n3. Set `OPENAI_API_KEY` environment variable to your OpenAI API key:\n\n```bash\nexport OPENAI_API_KEY=<your key>\n```\n\n#### Agent Types\n\nAgent type is determined by the notebook you choose to run. The available agent types include:\n\n- `ReAct` - ReAct Agent\n\n- `CoT_context` - CoT Agent given supporting context about the question \n\n- `CoT_no_context` - CoT Agent given no supporting context about the question\n\nThe notebook for each agent type is located in the `./hotpot_runs/notebooks` directory.\n\n#### Reflexion Strategies\n\nEach notebook allows you to specify the reflexion strategy to be used by the agents. The available reflexion strategies, which are defined in an `Enum`, include:\n\n- `ReflexionStrategy.NONE` - The agent is not given any information about its last attempt. \n\n- `ReflexionStrategy.LAST_ATTEMPT` - The agent is given its reasoning trace from its last attempt on the question as context.\n\n- `ReflexionStrategy.REFLEXION` - The agent is given its self-reflection on the last attempt as context. \n\n- `ReflexionStrategy.LAST_ATTEMPT_AND_REFLEXION` -  The agent is given both its reasoning trace and self-reflection on the last attempt as context.\n\n### To Run: decision-making (AlfWorld)\n\nClone this repo and move to the AlfWorld directory\n\n```bash\ngit clone https://github.com/noahshinn/reflexion && cd ./alfworld_runs\n```\n\nSpecify the run parameters in `./run_reflexion.sh`.\n`num_trials`: number of iterative learning steps\n`num_envs`: number of task-environment pairs per trial\n`run_name`: the name for this run\n`use_memory`: use persisting memory to store self-reflections (turn off to run a baseline run)\n`is_resume`: use logging directory to resume a previous run\n`resume_dir`: the logging directory from which to resume the previous run\n`start_trial_num`: if resume run, then the trial number of which to start\n\nRun the trial\n\n```bash\n./run_reflexion.sh\n```\n\nThe logs will be sent to `./root/<run_name>`.\n\n### Another Note\n\nDue to the nature of these experiments, it may not be feasible for individual developers to rerun the results as GPT-4 has limited access and significant API charges. All runs from the paper and additional results are logged in `./alfworld_runs/root` for decision-making, `./hotpotqa_runs/root` for reasoning, and `./programming_runs/root` for programming\n\n### Other Notes\n\nCheck out the original implementation [here](https://github.com/noahshinn/reflexion-draft)\n\nRead one of the original blog posts [here](https://nanothoughts.substack.com/p/reflecting-on-reflexion)\n\nCheck out an [Appl](https://github.com/appl-team/appl) implementation [here](https://github.com/appl-team/reppl/tree/main/reflexion).\n\nCheck out an interesting type-prediction implementation here: [OpenTau](https://github.com/GammaTauAI/opentau)\n\nFor all questions, contact [noahrshinn@gmail.com](noahrshinn@gmail.com)\n\n### Cite\n\n```bibtex\n@misc{shinn2023reflexion,\n      title={Reflexion: Language Agents with Verbal Reinforcement Learning}, \n      author={Noah Shinn and Federico Cassano and Edward Berman and Ashwin Gopinath and Karthik Narasimhan and Shunyu Yao},\n      year={2023},\n      eprint={2303.11366},\n      archivePrefix={arXiv},\n      primaryClass={cs.AI}\n}\n```\n","summary":"Reflexion is a framework for language agents that utilizes verbal reinforcement learning to improve task performance through iterative self-reflection. The project provides tools to implement various reflection strategies, allowing agents to learn from past mistakes by analyzing reasoning traces and generating self-reflective feedback. Researchers and developers working on LLM-based autonomous agents will find this resource valuable for enhancing performance in complex reasoning, decision-making, and programming tasks.","description":"[NeurIPS 2023] Reflexion: Language Agents with Verbal Reinforcement Learning","stars":3170,"language":"Python"},{"owner":"xforceai","repo":"ide","url":"https://github.com/xforceai/ide","readme":"# X-Force IDE\n\n![Alt text](docs/image.png)\n\n### Create your own workforce @ [ide.x-force.ai](https://ide.x-force.ai)\n\n## What is X-Force IDE?\n\nX-Force IDE is a low-code, agent-as-a-service UI framework that enables you to create agent-based workforces through a drag-and-drop interface. You can export the workforces you create as Python scripts and run them on your local machine.\n\n## Guides\n\n[Getting Started Guide](https://x-force.notion.site/Introduction-to-X-Force-IDE-b92c434802de4df6a58c83fd5d292c33)\n\n[Examples](https://x-force.notion.site/Example-Workforces-fff4a8ee317c4e76b226fef321c098ba)\n\n## Contributing\n\nThis project welcomes contributions and suggestions. You can open pull request/issue!\n","summary":"X-Force IDE is a low-code UI framework designed for building and managing agent-based workforces through an intuitive drag-and-drop interface. The platform allows users to design complex automated workflows and export them as functional Python scripts for execution on local machines. It is an ideal tool for developers and automation enthusiasts looking to streamline the creation and deployment of AI-driven workforce solutions without extensive manual coding.","description":"Visualize Autogen workforce creation by diagrams.","stars":338,"language":"TypeScript"},{"owner":"BCG-X-Official","repo":"agentkit","url":"https://github.com/BCG-X-Official/agentkit","readme":"## Deprecation notice\n\n**This repository has been deprecated and is no longer actively maintained.**\n\nAgentKit was created to help teams get started faster with agent-based applications and to provide a practical foundation for experimentation and delivery. It helped explore and operationalize many of the ideas that have since become much more central to the field, including parallel tool calls, quality gates, and the compositional design of flows.\n\nSince then, the ecosystem has evolved rapidly. New frameworks, templates, and runtime patterns now provide a stronger foundation for building modern agent-based systems. We increasingly see approaches such as iterative CLI execution and modular agent runtimes becoming important directions for the next generation of agents, with projects such as [OpenClaw](https://github.com/openclaw/openclaw) and [NemoClaw](https://github.com/NVIDIA/NemoClaw/tree/main) reflecting some of these trends.\n\nWe would like to thank everyone who contributed to AgentKit — from the original creators and maintainers to all colleagues who opened issues, shared feedback, tested ideas in projects, and helped improve the repository over time. AgentKit reflects an important early chapter of work in this space, and we are grateful to everyone who helped shape it.\n\nFor new projects, we recommend using more current and actively maintained alternatives, depending on your use case, for example:\n- [Vercel AI SDK Chatbot template](https://vercel.com/templates/ai/chatbot)\n- [Vercel AI templates](https://vercel.com/templates/ai)\n- [FastAPI Full-Stack Template](https://github.com/fastapi/full-stack-fastapi-template)\n\n-------\n\n<img src=\"static/agentkit_logo_color.png\" alt=\"AgentKit logo\" style=\"width:500px;\"/>\n\n# AgentKit: rapidly build high quality Agent apps\nAgentKit is a LangChain-based starter kit developed by BCG X to build Agent apps. Developers can use AgentKit to\n- Quickly experiment on your constrained agent architecture with a beautiful UI\n- Build a full stack chat-based Agent app that can scale to production-grade MVP\n\nKey advantages of the AgentKit toolkit include:\n- 🚀 **Quickly build high quality Agent apps**: Build a strong demo in a few hours using a modular, easy to configure tech stack based on FastAPI/Nextjs and a library of useful GenAI tools\n- 💻 **Flexible, reactive UI/UX designed for Agents**: React/Nextjs chat-based UI that is easy to configure, with features such as streaming, rendering of tables/visualizations/code, status of Agent actions and more\n- 🛡️ **Focus on reliability**: Easy to configure routing architecture gives control of possible paths Agent can take, increasing reliability and making it suited for real-life use cases\n- 📈 **Set up to scale**: Set up to scale to MVP with ready made Queue Management, Auth, Caching, Monitoring etc.\n\n\nhttps://github.com/BCG-X-Official/agentkit/assets/103188952/8e86fd0e-24a5-4335-8dba-06f1cefa8dd9\n\n\n### Tech stack\nThe starter pack is based on the latest technologies for optimal performance, security and developer experience.\n* 💫 Nextjs 14 with tailwind and daisyui\n* 🔥 Python 3.10 with fastapi, sqlmodel and pydantic 2.x.\n* 🦜 Langchain and Langsmith e2e configuration\n* 🗝 Authentication: NextAuth integrated with FastAPI\n* 🥬 Celery and redis for long running tasks, caching etc.\n* 💾 Local Postgres with pgvector extension\n* ⬆️ Docker-compose for simple deployments and DX\n* 🖍 Linting, tests and pre-commit hooks pre-configured\n\nNote: this is a starter kit - for production deployments, we recommend adding enterprise-grade security functionalities. Especially when using LLMs, be aware of known risks like prompt injection ([read more](https://www.ibm.com/topics/prompt-injection)).\n\n## Quickstart\nFor a quick setup of AgentKit, use the steps below, where both the backend app and frontend app are run inside a Docker container. More elaborate setup instructions can be found in the [documentation](https://agentkit.infra.x.bcg.com/docs/introduction).\n\n### Prerequisites\n- Docker: https://www.docker.com/get-started\n\n### Installation steps\n1. Clone the repository containing the source code for the backend and frontend apps.\n\n2. Copy the `frontend/.env.example` file in the frontend directory and change the name to `.env`. Also, copy the `.env.example` file in the root directory of the repository and change the name to `.env`.\n   - Change the OPENAI_API_KEY and OPENAI_ORGANIZATION to your own (n.b. OPENAI_ORGANIZATION should be your OpenAI 'Organization ID')\n\n3. In the terminal, navigate to the root directory of the cloned repository. Build and start the Docker containers with the following command:\n   ```\n   docker-compose -f docker-compose.yml up -d\n   ```\n   Wait for the containers to build and start, which may take a few minutes depending on your system. Once the containers are up and running, you can access the apps in your browser at [http://localhost](http://localhost/).\n\n## Chinook music database demo\n- If docker containers are running, run `docker-compose down --volumes`\n- Follow the installation instructions above and swap `docker-compose.yml` with `docker-compose-demo.yml` to run the app\n- Try the prompt \"How many artists and songs are there in the database?\" to see AgentKit in action!\n\nCheck out a more advanced [demo](https://agentkit.infra.x.bcg.com) build following the [tutorial](https://agentkit.infra.x.bcg.com/docs/tutorial/).\n\n## Set up your own app\n- Configure your Agent and Tools [link](docs/docusaurus/docs/configuration/configure_agent_and_tools.md)\n- (Optional) Adjust the UI to your use case [link](docs/docusaurus/docs/configuration/configure_ui.md)\n- (Optional) Set up evaluation with LangSmith [link](docs/docusaurus/docs/advanced/evaluation.md)\n\n## Documentation\nFind the [hosted documentation here](https://agentkit.infra.x.bcg.com/docs/introduction).\n\n- [Installation instructions for running frontend or entire app outside Docker](https://agentkit.infra.x.bcg.com/docs/setup/setup_development)\n- [Key concepts](https://agentkit.infra.x.bcg.com/docs/how_it_works/key_concepts)\n- [Agent and Tools configuration](https://agentkit.infra.x.bcg.com/docs/configuration/configure_agent_and_tools)\n- [UI configuration](https://agentkit.infra.x.bcg.com/docs/configuration/configure_ui)\n- [Optional features](https://agentkit.infra.x.bcg.com/docs/advanced/optional_features)\n- [Tool library](https://agentkit.infra.x.bcg.com/docs/tool_library/)\n\n## How it works\n\n### Reliability\nAgentKit attempts to solve the reliability issue of agents such as ReAct agents by constraining the potential routes the agent can take to a pre-configured sets of routes, or **Action Plans**. Since for many use cases the potential routes the agent can take are known, we can use our human domain expertise to steer the agent in the right direction, and reduce it going into unexpected directions or rabbit holes. This is achieved by combining a **Meta Agent** with **Action Plans**: A set of tools which are executed linearly and in parallel, similar to a Chain. The Meta Agent takes in the user prompt and outputs the most suited Action Plan to generate an answer. Note: implementing multiple Meta Agents is possible, generating a tree of possible routes.\n\n### User experience\nTo optimize user experience, the intermediary output of every step in the Action Plan can be shown to the user. For example, consider an Action Plan consisting of 2 toolsets: `[[sql_tool, pdf_tool], [generate_summary_tool, visualize_tool]]`. In the first action step, information from a SQL database and a vector database with embedded PDFs are retrieved in parallel. The retrieved data and most relevant PDF are streamed to the UI as soon as the first action step finishes. In the second action step, the output from step 1 is passed to a tool that generates a text summary and a tool that creates a JSX visualization from the data, which is streamed to the UI to create the final answer.\n\nFor a high level overview of the routing flow and connection the UI, please see below diagram:\n<img src=\"static/agentkit_flow_diagram.png\" alt=\"AgentKit framework\" style=\"width:500px;\"/>\n\n## Additional optional features\n\n- **Feedback integration**: collect feedback on generated answers from users\n\n<img src=\"static/feedback_feature.png\" alt=\"Feedback\" style=\"width:500px;\"/>\n\n- **User settings**: Allow users to specify default settings in the app that can be used to customize prompts for the user\n\n<img src=\"static/settings_feature.png\" alt=\"Feedback\" style=\"width:500px;\"/>\n\n- **User authentication**: Enable NextAuth on your app to authenticate users with Github or with email/password\n\n<img src=\"static/auth_feature.png\" alt=\"Feedback\" style=\"width:500px;\"/>\n\nSee [optional feature documentation](docs/docusaurus/docs/advanced/optional_features.md) for more detailed info.\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/svg?repos=BCG-X-Official/agentkit&type=Timeline)](https://star-history.com/#BCG-X-Official/agentkit&Timeline)\n\n## Support and Maintenance\n\nThe project spun of a combination of different templates. One great inspiration is [fastapi-alembic-sqlmodel-async](https://github.com/jonra1993/fastapi-alembic-sqlmodel-async), which provided the foundations for the FastAPI setup. Please check them out!\n\nGreat thanks to all the contributors:\n[@kaikun213](https://github.com/kaikun213) [@drivian](https://github.com/drivian) [@ielmansouri](https://github.com/ielmansouri) [@mastersplinter](https://github.com/mastersplinter) [@tanmaygupta9](https://github.com/tanmaygupta9) [@sofglide](https://github.com/sofglide) [@harticode](https://github.com/harticode) [@edenbd](https://github.com/edenbd) [@ben-howt](https://github.com/ben-howt) [@carelschw](https://github.com/carelschw) [@gustafvh](https://github.com/gustafvh) [@casper321](https://github.com/casper321) [@modvinden1](https://github.com/modvinden1) [@valerie-jzr](https://github.com/valerie-jzr) [@ispoljari](https://github.com/ispoljari) [@martinthenext](https://github.com/martinthenext) [@rkdy](https://github.com/rkdy)\n\nPlease read `CONTRIBUTING.md` for more details on how to contribute.\nPRs are welcome ❤️\n\n## License\n\n[![License](http://img.shields.io/:license-mit-blue.svg?style=flat-square)](http://badges.mit-license.org)\n\n- This project is licensed under the terms of the **[MIT license](LICENSE)**\n","summary":"AgentKit is a deprecated LangChain-based starter kit designed to accelerate the development of full-stack, chat-based agent applications. It provided a modular architecture integrating FastAPI and Next.js, offering built-in features for streaming, authentication, task queuing, and persistent storage. While formerly useful for teams aiming to move rapidly from experimentation to production-grade MVPs, the project is no longer maintained and authors now recommend utilizing more modern, community-standard agent frameworks.","description":"Starter-kit to build constrained agents with Nextjs, FastAPI and Langchain","stars":1944,"language":"TypeScript"},{"owner":"KwaiKEG","repo":"KwaiAgents","url":"https://github.com/KwaiKEG/KwaiAgents","readme":"<p align=\"left\">\n    English ｜ <a href=\"README_ZH.md\">中文</a> | <a href=\"README_JA.md\">日本語</a>\n</p>\n<br><br>\n\n<p align=\"center\">\n    <img src=\"blob/logo.png\" width=\"400\"/>\n<p>\n<br>\n\n<p align=\"center\">\n      📚 <a href=\"https://huggingface.co/datasets/kwaikeg/KAgentInstruct\">Dataset</a> | 📚 <a href=\"https://huggingface.co/datasets/kwaikeg/KAgentBench\">Benchmark</a> | 🤗 <a href=\"https://huggingface.co/collections/kwaikeg/kagentlms-6551e685b5ec9f9a077d42ef\">Models</a> | 📑 <a href=\"http://arxiv.org/abs/2312.04889\">Paper</a>\n<br>\n\nKwaiAgents is a series of Agent-related works open-sourced by the [KwaiKEG](https://github.com/KwaiKEG) from [Kuaishou Technology](https://www.kuaishou.com/en). The open-sourced content includes:\n\n1. **KAgentSys-Lite**: a lite version of the KAgentSys in the paper. While retaining some of the original system's functionality, KAgentSys-Lite has certain differences and limitations when compared to its full-featured counterpart, such as: (1) a more limited set of tools; (2) a lack of memory mechanisms; (3) slightly reduced performance capabilities; and (4) a different codebase, as it evolves from open-source projects like BabyAGI and Auto-GPT. Despite these modifications, KAgentSys-Lite still delivers comparable performance among numerous open-source Agent systems available.\n2. **KAgentLMs**: a series of large language models with agent capabilities such as planning, reflection, and tool-use, acquired through the Meta-agent tuning proposed in the paper.\n3. **KAgentInstruct**: over 200k Agent-related instructions finetuning data (partially human-edited) proposed in the paper.\n4. **KAgentBench**: over 3,000 human-edited, automated evaluation data for testing Agent capabilities, with evaluation dimensions including planning, tool-use, reflection, concluding, and profiling.\n\n<br>\n<table align='center'>\n    <tr>\n        <td align='center'><b>Type</b></td>\n        <td align='center'><b>Models</b></td>\n        <td align='center'><b>Training Data</b></td>\n        <td align='center'><b>Benchmark Data</b></td>\n    </tr>\n    <tr>\n        <td>Qwen</td>\n        <td>\n            <a href=\"https://huggingface.co/kwaikeg/kagentlms_qwen_7b_mat\">Qwen-7B-MAT</a> <br> \n            <a href=\"https://huggingface.co/kwaikeg/kagentlms_qwen_14b_mat\">Qwen-14B-MAT</a> <br>\n            <a href=\"https://huggingface.co/kwaikeg/kagentlms_qwen_7b_mat_gguf\">Qwen-7B-MAT-cpp</a> <br>\n            <a href=\"https://huggingface.co/kwaikeg/kagentlms_qwen1.5_14b_mat\">Qwen1.5-14B-MAT</a>\n        </td>\n        <td align=\"center\" rowspan=\"2\"><a href=\"https://huggingface.co/datasets/kwaikeg/KAgentInstruct\">KAgentInstruct</a></td>\n        <td align=\"center\" rowspan=\"2\"><a href=\"https://huggingface.co/datasets/kwaikeg/KAgentBench\">KAgentBench</a></td>\n    </tr>\n    <tr>\n        <td>Baichuan</td>\n        <td><a href=\"https://huggingface.co/kwaikeg/kagentlms_baichuan2_13b_mat\">Baichuan2-13B-MAT</a></td>\n    </tr>\n</table>\n\n\n<br>\n<br>\n\n<p align=\"center\">\n    <img src=\"blob/example.gif\"/>\n<p>\n\n<br>\n\n<p align=\"center\">\n    <img src=\"blob/overview.png\"/>\n<p>\n\n## News\n* 2024.4.19 - Qwen1.5-14B-MAT model [[link]](https://huggingface.co/kwaikeg/kagentlms_qwen1.5_14b_mat) released. \n* 2024.4.9 - Benchmark results have been refreshed.\n* 2024.1.29 - Qwen-14B-MAT model [[link]](https://huggingface.co/kwaikeg/kagentlms_qwen_14b_mat) released.\n* 2023.1.5 - Training data [[link]](https://huggingface.co/datasets/kwaikeg/KAgentInstruct) released.\n* 2023.12.27 - 🔥🔥🔥 KwaiAgents have been reported on many sites. [[机器之心]](https://mp.weixin.qq.com/s/QhZIFL1GHH90z98gnk194g) [[Medium]](https://medium.com/@myscarletpan/can-7b-models-now-master-ai-agents-a-look-at-kwais-recent-llm-open-source-release-8b9e84647412) [[InfoQ]](https://www.infoq.cn/article/xHGJwG3b8hXSdaP4m6r0), etc. \n* 2023.12.13 - The benchmark and evaluation code [[link]](https://huggingface.co/datasets/kwaikeg/KAgentBench) released.\n* 2023.12.08 - Technical report [[link]](https://arxiv.org/abs/2312.04889) release.\n* 2023.11.17 - Initial release.\n\n## Evaluation\n1. Benchmark Results\n   \n|                | Scale | Planning | Tool-use | Reflection | Concluding | Profile | Overall Score |\n|----------------|-------|----------|----------|------------|------------|---------|---------------|\n| GPT-3.5-turbo  |   -   |  18.55   |  26.26   |    8.06    |   37.26    |  35.42  |     25.63     |\n| Llama2         |  13B  |   0.15   |   0.44   |    0.14    |   16.60    |  17.73  |      5.30     |\n| ChatGLM3       |  6B   |   7.87   |  11.84   |    7.52    |   30.01    |  30.14  |     15.88     |\n| Qwen           |  7B   |  13.34   |  18.00   |    7.91    |   36.24    |  34.99  |     21.17     |\n| Baichuan2      |  13B  |   6.70   |  16.10   |    6.76    |   24.97    |  19.08  |     14.89     |\n| ToolLlama      |  7B   |   0.20   |   4.83   |    1.06    |   15.62    |  10.66  |      6.04     |\n| AgentLM        |  13B  |   0.17   |   0.15   |    0.05    |   16.30    |  15.22  |      4.88     |\n| Qwen-MAT       |  7B   |  31.64   |  43.30   |   33.34    |   44.85    |  44.78  |     39.85     |\n| Baichuan2-MAT  |  13B  |  37.27   |  52.97   |   37.00    |   48.01    |  41.83  |     45.34     |\n| Qwen-MAT       |  14B  |  43.17   |  63.78   |   32.14    |   45.47    |  45.22  |     49.94     |\n| Qwen1.5-MAT    |  14B  |  42.42   |  64.62   |   30.58    |   46.51    |  45.95  |     50.18     |\n\n\n2. Human evaluation. Each result cell shows the pass rate (\\%) and the average score (in parentheses)\n\n|                 | Scale   | NoAgent         | ReACT          | Auto-GPT        | KAgentSys       |\n|-----------------|---------|-----------------|----------------|-----------------|-----------------|\n| GPT-4           | -       | 57.21% (3.42)    | 68.66% (3.88)   | 79.60% (4.27)    | 83.58% (4.47)    |\n| GPT-3.5-turbo   | -       | 47.26% (3.08)    | 54.23% (3.33)   | 61.74% (3.53)    | 64.18% (3.69)    |\n| Qwen            | 7B      | 52.74% (3.23)    | 51.74% (3.20)   | 50.25% (3.11)    | 54.23% (3.27)    |\n| Baichuan2       | 13B     | 54.23% (3.31)    | 55.72% (3.36)   | 57.21% (3.37)    | 58.71% (3.54)    |\n| Qwen-MAT        | 7B      | -                | 58.71% (3.53)   | 65.67% (3.77)    | 67.66% (3.87)    |\n| Baichuan2-MAT   | 13B     | -                | 61.19% (3.60)   | 66.67% (3.86)    | 74.13% (4.11)    |\n\n\n## User Guide\n\n### Prebuild environment\nInstall miniconda for build environment first. Then create build env first:\n```bash\nconda create -n kagent python=3.10\nconda activate kagent\npip install -r requirements.txt\n```\n\n### Using AgentLMs\n#### Serving by [vLLM](https://github.com/vllm-project/vllm) (GPU)\nWe recommend using [vLLM](https://github.com/vllm-project/vllm) and [FastChat](https://github.com/lm-sys/FastChat) to deploy the model inference service. First, you need to install the corresponding packages (for detailed usage, please refer to the documentation of the two projects):\n1. For Qwen-7B-MAT, install the corresponding packages with the following commands\n```bash\npip install vllm\npip install \"fschat[model_worker,webui]\"\n```\n2. For Baichuan-13B-MAT, install the corresponding packages with the following commands\n```bash\npip install \"fschat[model_worker,webui]\"\npip install vllm==0.2.0\npip install transformers==4.33.2\n```\n\nTo deploy KAgentLMs, you first need to start the controller in one terminal.\n```bash\npython -m fastchat.serve.controller\n```\nSecondly, you should use the following command in another terminal for single-gpu inference service deployment:\n```bash\npython -m fastchat.serve.vllm_worker --model-path $model_path --trust-remote-code\n```\nWhere `$model_path` is the local path of the model downloaded. If the GPU does not support Bfloat16, you can add `--dtype half` to the command line.\n\nThirdly, start the REST API server in the third terminal.\n```bash\npython -m fastchat.serve.openai_api_server --host localhost --port 8888\n```\n\nFinally, you can use the curl command to invoke the model same as the OpenAI calling format. Here's an example:\n```bash\ncurl http://localhost:8888/v1/chat/completions \\\n-H \"Content-Type: application/json\" \\\n-d '{\"model\": \"kagentlms_qwen_7b_mat\", \"messages\": [{\"role\": \"user\", \"content\": \"Who is Andy Lau\"}]}'\n```\nHere, change `kagentlms_qwen_7b_mat` to the model you deployed.\n\n#### Serving by [Lamma.cpp](https://github.com/ggerganov/llama.cpp) (CPU)\nllama-cpp-python offers a web server which aims to act as a drop-in replacement for the OpenAI API. This allows you to use llama.cpp compatible models with any OpenAI compatible client (language libraries, services, etc). The converted model can be found in [kwaikeg/kagentlms_qwen_7b_mat_gguf](https://huggingface.co/kwaikeg/kagentlms_qwen_7b_mat_gguf).\n\nTo install the server package and get started:\n```bash\npip install \"llama-cpp-python[server]\"\npython3 -m llama_cpp.server --model kagentlms_qwen_7b_mat_gguf/ggml-model-q4_0.gguf --chat_format chatml --port 8888\n```\n\nFinally, you can use the curl command to invoke the model same as the OpenAI calling format. Here's an example:\n```bash\ncurl http://localhost:8888/v1/chat/completions \\\n-H \"Content-Type: application/json\" \\\n-d '{\"messages\": [{\"role\": \"user\", \"content\": \"Who is Andy Lau\"}]}'\n```\n\n### Using KAgentSys-Lite\nDownload and install the KwaiAgents, recommended Python>=3.10\n```bash\ngit clone git@github.com:KwaiKEG/KwaiAgents.git\ncd KwaiAgents\npython setup.py develop\n```\n\n1. **ChatGPT usage**\nDeclare some environment variables\n```\nexport OPENAI_API_KEY=sk-xxxxx\nexport WEATHER_API_KEY=xxxxxx\n```\n\nThe WEATHER_API_KEY is not mandatory, but you need to configure it when asking weather-related questions. You can obtain the API key from [this website](https://www.weatherapi.com/) (Same for local model usage).\n\n```bash\nkagentsys --query=\"Who is Andy Lau's wife?\" --llm_name=\"gpt-3.5-turbo\" --lang=\"en\"\n```\n\n2. **Local model usage**\n> To use a local model, you need to deploy the corresponding model service as described in the previous chapter\n```bash\nkagentsys --query=\"Who is Andy Lau's wife?\" --llm_name=\"kagentlms_qwen_7b_mat\" \\\n--use_local_llm --local_llm_host=\"localhost\" --local_llm_port=8888 --lang=\"en\"\n```\n\n\nFull command arguments:\n\n```\noptions:\n  -h, --help            show this help message and exit\n  --id ID               ID of this conversation\n  --query QUERY         User query\n  --history HISTORY     History of conversation\n  --llm_name LLM_NAME   the name of llm\n  --use_local_llm       Whether to use local llm\n  --local_llm_host LOCAL_LLM_HOST\n                        The host of local llm service\n  --local_llm_port LOCAL_LLM_PORT\n                        The port of local llm service\n  --tool_names TOOL_NAMES\n                        the name of llm\n  --max_iter_num MAX_ITER_NUM\n                        the number of iteration of agents\n  --agent_name AGENT_NAME\n                        The agent name\n  --agent_bio AGENT_BIO\n                        The agent bio, a short description\n  --agent_instructions AGENT_INSTRUCTIONS\n                        The instructions of how agent thinking, acting, or talking\n  --external_knowledge EXTERNAL_KNOWLEDGE\n                        The link of external knowledge\n  --lang {en,zh}        The language of the overall system\n  --max_tokens_num      Maximum length of model input\n```\n\n**Note**:\n1. If you need to use the `browse_website` tool, you need to configure the [chromedriver](https://chromedriver.chromium.org/getting-started) on your server.\n2. If the search fails multiple times, it may be because the network cannot access duckduckgo_search. You can solve this by setting the `http_proxy`.\n\n#### Using Custom tools\nCustom tools usage can be found in <a href=\"examples/custom_tool_example.py\">examples/custom_tool_example.py</a> \n\n### Using KAgentBench Evaluation\nWe only need two lines to evaluate the agent capabilities like:\n```bash\ncd benchmark\npython infer_qwen.py qwen_benchmark_res.jsonl\npython benchmark_eval.py ./benchmark_eval.jsonl ./qwen_benchmark_res.jsonl\n```\nThe above command will give the results like\n```\nplan : 31.64, tooluse : 43.30, reflextion : 33.34, conclusion : 44.85, profile : 44.78, overall : 39.85\n```\n\nPlease refer to <a href=\"benchmark/\">benchmark/</a> for more details.\n\n## Citation\n```\n@article{pan2023kwaiagents,\n  author    = {Haojie Pan and\n               Zepeng Zhai and\n               Hao Yuan and\n               Yaojia Lv and\n               Ruiji Fu and\n               Ming Liu and\n               Zhongyuan Wang and\n               Bing Qin\n               },\n  title     = {KwaiAgents: Generalized Information-seeking Agent System with Large Language Models},\n  journal   = {CoRR},\n  volume    = {abs/2312.04889},\n  year      = {2023}\n}\n```\n","summary":"KwaiAgents is a comprehensive, open-source framework developed by Kuaishou Technology designed to enhance the capabilities of large language models in planning, reflection, and tool utilization. The project provides a robust ecosystem including specialized models (KAgentLMs), a vast instruction-tuning dataset (KAgentInstruct), and a rigorous automated evaluation benchmark (KAgentBench). This suite is ideal for developers and researchers looking to build or evaluate sophisticated AI agents that require advanced reasoning and interactive task-solving functionalities.","description":"A generalized information-seeking agent system with Large Language Models (LLMs).","stars":1200,"language":"Python"},{"owner":"QwenLM","repo":"Qwen-Agent","url":"https://github.com/QwenLM/Qwen-Agent","readme":"<!---\nCopyright 2023 The Qwen team, Alibaba Group. All rights reserved.\n\nLicensed under the Apache License, Version 2.0 (the \"License\");\nyou may not use this file except in compliance with the License.\nYou may obtain a copy of the License at\n\n   http://www.apache.org/licenses/LICENSE-2.0\n\nUnless required by applicable law or agreed to in writing, software\ndistributed under the License is distributed on an \"AS IS\" BASIS,\nWITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.\nSee the License for the specific language governing permissions and\nlimitations under the License.\n-->\n\n[中文](https://github.com/QwenLM/Qwen-Agent/blob/main/README_CN.md) ｜ English\n\n<p align=\"center\">\n    <img src=\"https://qianwen-res.oss-accelerate-overseas.aliyuncs.com/logo_qwen_agent.png\" width=\"400\"/>\n<p>\n<br>\n\n<p align=\"center\">\n          💜 <a href=\"https://chat.qwen.ai/\"><b>Qwen Chat</b></a>&nbsp&nbsp | &nbsp&nbsp🤗 <a href=\"https://huggingface.co/Qwen\">Hugging Face</a>&nbsp&nbsp | &nbsp&nbsp🤖 <a href=\"https://modelscope.cn/organization/qwen\">ModelScope</a>&nbsp&nbsp | &nbsp&nbsp 📑 <a href=\"https://qwenlm.github.io/\">Blog</a> &nbsp&nbsp ｜ &nbsp&nbsp📖 <a href=\"https://qwenlm.github.io/Qwen-Agent/en/\">Documentation</a>\n\n<br>\n📊 <a href=\"https://qwenlm.github.io/Qwen-Agent/en/benchmarks/deepplanning/\">Benchmark</a>&nbsp&nbsp | &nbsp&nbsp💬 <a href=\"https://github.com/QwenLM/Qwen/blob/main/assets/wechat.png\">WeChat (微信)</a>&nbsp&nbsp | &nbsp&nbsp🫨 <a href=\"https://discord.gg/CV4E9rpNSD\">Discord</a>&nbsp&nbsp\n</p>\n\n\nQwen-Agent is a framework for developing LLM applications based on the instruction following, tool usage, planning, and\nmemory capabilities of Qwen.\nIt also comes with example applications such as Browser Assistant, Code Interpreter, and Custom Assistant.\nNow Qwen-Agent plays as the backend of [Qwen Chat](https://chat.qwen.ai/).\n\n# News\n* 🔥🔥🔥Feb 16, 2026: Open-sourced Qwen3.5. For usage examples, refer to [Qwen3.5 Agent Demo](./examples/assistant_qwen3.5.py).\n* Jan 27, 2026: Open-sourced agent evaluation benchmark [DeepPlanning](https://qwenlm.github.io/Qwen-Agent/en/benchmarks/deepplanning/) and added Qwen-Agent [documentation](https://qwenlm.github.io/Qwen-Agent/en/guide/).\n* Sep 23, 2025: Added [Qwen3-VL Tool-call Demo](./examples/cookbook_think_with_images.ipynb), supporting tools such as zoom in, image search, and web search.\n* Jul 23, 2025: Add [Qwen3-Coder Tool-call Demo](./examples/assistant_qwen3_coder.py); Added native API tool call interface support, such as using vLLM's built-in tool call parsing.\n* May 1, 2025: Add [Qwen3 Tool-call Demo](./examples/assistant_qwen3.py), and add [MCP Cookbooks](./examples/).\n* Mar 18, 2025: Support for the `reasoning_content` field; adjust the default [Function Call template](./qwen_agent/llm/fncall_prompts/nous_fncall_prompt.py), which is applicable to the Qwen2.5 series general models and QwQ-32B. If you need to use the old version of the template, please refer to the [example](./examples/function_calling.py) for passing parameters.\n* Mar 7, 2025: Added [QwQ-32B Tool-call Demo](./examples/assistant_qwq.py). It supports parallel, multi-step, and multi-turn tool calls.\n* Dec 3, 2024: Upgrade GUI to Gradio 5 based. Note: GUI requires Python 3.10 or higher.\n* Sep 18, 2024: Added [Qwen2.5-Math Demo](./examples/tir_math.py) to showcase the Tool-Integrated Reasoning capabilities of Qwen2.5-Math. Note: The python executor is not sandboxed and is intended for local testing only, not for production use.\n\n# Getting Started\n\n## Installation\n\n- Install the stable ver
