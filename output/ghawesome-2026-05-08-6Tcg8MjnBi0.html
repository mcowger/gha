ocation (from any MCP client):\n\n```jsonc\n// tool: chorus.create_chat\n{\n  \"template\": \"code-review\",\n  \"work\": \"Review the staged diff vs main. Flag race conditions and missing tests.\"\n}\n// → { \"chatId\": \"abc123\", \"url\": \"http://localhost:5050/runs/abc123\", \"status\": \"reviewing\" }\n```\n\nStream results back into your editor, or open the URL to watch live.\n\n---\n\n**Requires** Node 20+ and at least *one* of these (you probably already have one):\n\n- Claude Code, Codex CLI, Gemini CLI, OpenCode, or Kimi CLI — uses your existing subscription, no extra cost\n- *or* an OpenRouter API key (one key, 200+ models, pay-per-use)\n\n<details>\n<summary><b>Don't have any of those?</b></summary>\n\n```bash\nnpm i -g @anthropic-ai/claude-code   # Anthropic — uses Claude Pro sub\nnpm i -g @openai/codex                # OpenAI — uses ChatGPT Plus sub\nnpm i -g @google/gemini-cli           # Google — uses Gemini Advanced sub\n```\n\nPick whichever vendor you already pay for. Or skip CLIs entirely and add an OpenRouter key in Settings after `chorus init`.\n\n</details>\n\n---\n\n## What it looks like\n\n<table>\n<tr>\n<td width=\"50%\" align=\"center\">\n<b>Live review</b><br/>\n<img src=\"docs/images/run-page.png\" alt=\"Three reviewers streaming verdicts in real-time\" width=\"100%\" /><br/>\n<sub>Each AI streams its thinking live as it reviews.</sub>\n</td>\n<td width=\"50%\" align=\"center\">\n<b>Verdict</b><br/>\n<img src=\"docs/images/verdict.png\" alt=\"Final converged verdict with merged diff\" width=\"100%\" /><br/>\n<sub>Agreement = green. Disagreement = retry with their feedback.</sub>\n</td>\n</tr>\n<tr>\n<td width=\"50%\" align=\"center\">\n<b>Templates</b><br/>\n<img src=\"docs/images/templates.png\" alt=\"Template editor\" width=\"100%\" /><br/>\n<sub>Pre-built review patterns. Make your own in YAML.</sub>\n</td>\n<td width=\"50%\" align=\"center\">\n<b>From inside Claude / Cursor</b><br/>\n<img src=\"docs/images/mcp.png\" alt=\"Claude Code calling Chorus\" width=\"100%\" /><br/>\n<sub>Any AI tool that speaks MCP can trigger a Chorus run.</sub>\n</td>\n</tr>\n</table>\n\n---\n\n## A real example\n\nYou ask Claude to write this:\n\n```js\nfunction divide(a, b) {\n  return a / b;\n}\n```\n\nSubmit to Chorus with the **Code Review** template (1 writer + 2 reviewers, both must agree to ship):\n\n| Step | What happens |\n|---|---|\n| 1. Claude writes | \"Looks correct to me!\" |\n| 2. GPT reviews in parallel | 🚨 *No type validation — `divide('a','b')` returns `NaN`* |\n| 3. Gemini reviews in parallel | 🚨 *Missing zero-check — `divide(1, 0)` returns `Infinity`* |\n| 4. Verdict | ❌ **REJECT** — both reviewers flagged real bugs |\n\nNow you know what to fix **before** you push.\n\n---\n\n## Templates: pre-built review patterns\n\nDon't figure out which AIs to use yourself. Pick a pattern that fits the moment:\n\n| Use this when... | Template |\n|---|---|\n| Pre-merge sanity check | `code-review` — 1 writer + 2 reviewers, both must agree |\n| Diagnosing a weird bug | `bug-diagnose` — one hypothesises, one challenges |\n| Big architectural call | `architect-review` — 3 different vendors critique your plan |\n| TDD where neither AI cheats | `red-green` — tests written blind to code |\n| Quick audit of a diff someone else wrote | `review-only` — paste, get 3 opinions, no writer |\n\nMake your own by dropping a YAML file in `~/.chorus/templates/`. Or duplicate one of the built-ins and tweak.\n\n<details>\n<summary><b>Custom template example</b></summary>\n\n```yaml\nid: security-pre-merge\nlabel: Security Pre-Merge\ndescription: Sentinel persona on every reviewer; everyone must approve.\nslots:\n  doer:\n    lineage: anthropic\n    model: claude-sonnet-4-6\n  reviewers:\n    - { lineage: openai,   model: codex,                 persona: sentinel }\n    - { lineage: google,   model: gemini-2.5-pro,        persona: sentinel }\n    - { lineage: opencode, model: opencode-go/kimi-k2.6, persona: sentinel }\nquorum:\n  type: unanimous\n```\n\n</details>\n\n---\n\n## Reviewer personas\n\nEach reviewer can wear a \"hat\" — a focus area Chorus prepends to their prompt:\n\n| Persona | What they look for |\n|---|---|\n| 🛡️ **Sentinel** | Security holes, auth bypass, injection |\n| 🗺️ **Cartographer** | Cross-platform issues (Windows vs Mac, browser support) |\n| 💰 **Accountant** | Cost regressions (extra DB queries, API calls) |\n| ⚡ **Profiler** | Performance regressions |\n| 🔍 **Inspector**, 📦 **Quartermaster**, 🛎️ **Concierge**, 🏛️ **Conservator**, 📚 **Librarian**, 🌐 **Translator** | …and more — see Personas page in cockpit |\n\nDifferent personas reviewing the same change = wider net.\n\n---\n\n## Why \"different vendors\" matters\n\nYou can run Chorus with three Claudes. We let you. But the value drops a lot.\n\nA second Claude reviewing the first Claude's work is theatre — same training, same blind spots. Mix vendors (Claude + GPT + Gemini) and you get genuinely different angles, because they were trained on different data with different biases.\n\nTemplates let you encode this: each reviewer slot has a `lineage` (anthropic / openai / google / opencode / moonshot). Built-in templates mix vendors automatically.\n\n---\n\n## What does it cost?\n\nTwo paths, depending on how you already pay for AI:\n\n**Using subscriptions** (Claude Pro / ChatGPT Plus / Gemini Advanced — ~$20/mo each)\nA typical review = **$0** out of pocket. Counts against the quota you already have.\n\n**Using API keys** (pay-per-use)\nA typical code-review run = **$0.30 to $1.50**, depending on diff size. If reviewers disagree and retry, 2–3× worst case.\n\nChorus adds **zero markup**. We don't see your tokens.\n\n---\n\n## Permissions & safety\n\nReviewers run on your machine. You decide how much trust to give them:\n\n| Mode | Read code | Write code | Network | When to use |\n|---|:---:|:---:|:---:|---|\n| 🔒 **Strict** | ✅ | ❌ | ❌ | Reviewing a diff you don't trust |\n| 📁 **Workspace** *(default)* | ✅ | ✅ inside chat dir | ❌ | Day-to-day |\n| 🔓 **Full** | ✅ | ✅ anywhere | ✅ | Personal machine, full trust |\n\nConfigure on first run, or anytime at *Settings → Permissions*.\n\n> **Trust model in plain English.** \"Workspace\" means the reviewer can write files inside its working directory and run scoped commands, but can't reach the internet or write outside the sandbox. \"Full\" means anything-goes — only enable on a personal machine you own. Run `chorus doctor` to verify each AI tool got the sandbox you set.\n\n---\n\n## Compared to other code-review tools\n\n| | **Chorus** | CodeRabbit | Greptile | Cursor Review | GitHub Copilot |\n|---|:---:|:---:|:---:|:---:|:---:|\n| Multiple AI vendors review the same change | ✅ | ❌ | ❌ | ❌ | ❌ |\n| Uses your existing AI subscriptions | ✅ | ❌ | ❌ | ❌ | ❌ |\n| Runs locally (your code never leaves your existing AI vendors) | ✅ | ❌ | ❌ | partial | ❌ |\n| Open source (modify + self-host) | ✅ Apache-2.0 | ❌ | ❌ | ❌ | ❌ |\n| Custom review patterns | ✅ | partial | ❌ | ❌ | ❌ |\n\n**The unique thing:** your code never goes to a new vendor. Chorus just orchestrates the AI tools you already use.\n\n---\n\n## Commands\n\n```bash\nchorus init             # one-time: detect + connect AI tools\nchorus start --ui       # boot + open browser\nchorus stop             # shut it down\nchorus status           # is it running?\nchorus doctor           # diagnose AI tool detection / sandbox issues\nchorus diagnose         # print a redacted diagnostic bundle for bug reports\n```\n\n---\n\n## Reporting bugs\n\nWhen something goes wrong, run:\n\n```bash\nchorus diagnose\n```\n\nIt prints a fenced markdown block with: chorus version, running daemon\nversion (and a **VERSION MISMATCH** flag if the CLI was upgraded but the\ndaemon hasn't been restarted), node + OS + arch, daemon health, DB\ncounts, CLI detection, the latest crash dump if any, and the last 50\nlines of `daemon.log`. Paste the block into a new issue at\n<https://github.com/chorus-codes/chorus/issues/new>.\n\nIf chorus crashes hard (uncaught exception during boot — common on\nolder Node + Windows combos), a self-contained crash log is written to\n`~/.chorus/crashes/<timestamp>.log`. Attach it to the issue.\n\n---\n\n## Telemetry\n\nChorus pings home once on startup and once every 24h. The payload is fixed:\n\n```json\n{\n  \"schema\": 1,\n  \"installId\": \"<random uuid>\",\n  \"version\": \"0.7.0\",\n  \"os\": \"linux\", \"arch\": \"x64\", \"node\": \"22\",\n  \"daemonUptimeSeconds\": 86400,\n  \"chatsLast24h\": 12\n}\n```\n\n**Never sent:** chat content, prompts, file paths, repo paths, model names, voice/template names, hostnames, IPs, API keys.\n\nTurn it off any of three ways:\n\n```bash\nexport CHORUS_TELEMETRY=0           # env var\ntouch ~/.chorus/no-telemetry        # touch-file\n# or click \"Off\" in cockpit Settings → Telemetry\n```\n\nThe install ID lives at `~/.chorus/install-id` — `rm` it for a fresh one.\n\n---\n\n## Roadmap\n\n- [x] **v0.5** — Daemon + cockpit + 4 AI vendors\n- [x] **v0.6** — MCP server, persona system\n- [x] **v0.7** — OpenRouter integration, voices table, real-time sidebar\n- [ ] **v0.8** — Multi-stage review (write → review → fix → re-review)\n- [ ] **v0.9** — Per-voice persona overrides\n- [ ] **v1.0** — Hosted GitHub App + cloud fan-out\n\nFull picture in [ROADMAP.md](./ROADMAP.md).\n\n---\n\n<details>\n<summary><b>How it works (under the hood)</b></summary>\n\n```mermaid\nflowchart TB\n    User([👤 You])\n    Cockpit[Cockpit<br/>:5050 · web UI]\n    Daemon[Chorus daemon<br/>:7707 · local server]\n    DB[(SQLite<br/>~/.chorus/chorus.db)]\n    MCP[MCP server<br/>for editor integrations]\n\n    Claude[🤖 Claude<br/>writer]\n    Codex[🦾 GPT<br/>reviewer]\n    Gemini[💎 Gemini<br/>reviewer]\n\n    User -->|paste task| Cockpit\n    Cockpit <-->|REST + live updates| Daemon\n    Daemon <--> DB\n    Daemon -->|spawn| Claude\n    Daemon -->|spawn| Codex\n    Daemon -->|spawn| Gemini\n    User -.->|\"call Chorus from your AI\"| MCP --> Daemon\n\n    classDef user fill:#fef3c7,stroke:#f59e0b,color:#000\n    classDef chorus fill:#dbeafe,stroke:#3b82f6,color:#000\n    classDef llm fill:#fce7f3,stroke:#ec4899,color:#000\n    class User user\n    class Daemon,Cockpit,MCP,DB chorus\n    class Claude,Codex,Gemini llm\n```\n\n**Three pieces:**\n\n- **Daemon** — small local server (port 7707) that spawns AI tools as subprocesses, parses their output, and tracks state in a SQLite database at `~/.chorus/chorus.db`.\n- **Cockpit** — the web UI at port 5050 (Next.js). Templates, chats, voices, settings.\n- **MCP server** — lets *other* AI tools (Claude Code, Cursor, etc.) call Chorus programmatically.\n\nEach AI runs as an isolated subprocess. Chorus reads their structured output (stream-JSON), compares against the template's quorum rule, and emits a verdict. Nothing leaves your machine except the calls to the AI vendors you already use.\n\nCode layout:\n- `src/daemon/` — Fastify server + agent shims (one per AI tool)\n- `src/app/` — Next.js cockpit\n- `src/mcp/` — JSON-RPC MCP server\n- `src/lib/db/` — schema + migrations\n\n</details>\n\n---\n\n## Contributing\n\nPRs welcome.\n\n```bash\ngit clone https://github.com/chorus-codes/chorus.git\ncd chorus && pnpm install\npnpm dev:daemon   # daemon on :7707\npnpm dev          # cockpit on :5050\npnpm test         # full suite\n```\n\nRead [`AGENTS.md`](./AGENTS.md) first — Next.js 16 has breaking changes from older versions. Coverage target on new code: 80%+.\n\nWe dogfood: PRs to Chorus go through Chorus before merging.\n\nSee [CONTRIBUTING.md](./CONTRIBUTING.md) for the full guide.\n\n---\n\n## Links\n\n- 🌐 Website: <https://chorus.codes>\n- 🗺️ Roadmap: [./ROADMAP.md](./ROADMAP.md)\n- 🐛 Issues: <https://github.com/chorus-codes/chorus/issues>\n- 💬 Discussions: <https://github.com/chorus-codes/chorus/discussions>\n- 🐦 Twitter / X: [@chorus_codes](https://twitter.com/chorus_codes)\n\n---\n\n## License\n\n[Apache-2.0](./LICENSE). Use it however you want, including commercially.\n","summary":"Chorus is a local, zero‑markup tool that lets developers run real‑time, multi‑vendor AI code reviews before shipping: an AI writes the code and up to three different models—Claude, GPT, Gemini—inspect the same diff in parallel, approving only if they all agree. It leverages the AI subscriptions you already pay for by harnessing each vendor’s headless CLI, so every review costs $0 out of pocket and stays within your existing quota. Key capabilities include vendor‑agnostic reviewing, automated disagreement alerts, and a lightweight UI for quick diff evaluation. The platform is ideal for teams and individual developers who rely on AI for code generation and want to mitigate the ~5 % bug rate by eliminating blind spots without incurring extra API expenses.","description":"Multi-LLM peer review for code decisions. Bring your own CLI; Chorus convenes 2-4 other LLMs to review the work before you ship.","stars":232,"language":"TypeScript"},{"owner":"UfukNode","repo":"Noustiny","url":"https://github.com/UfukNode/Noustiny","readme":"<h1 align=\"center\">Noustiny</h1>\n\n<p align=\"center\"><em>Drop a seed. Walk a universe.</em></p>\n\n<p align=\"center\">\n  <img alt=\"Built for Nous Creative Hackathon 2026\" src=\"https://img.shields.io/badge/Nous_Creative_Hackathon-2026-FF6B35?style=flat-square\">\n  <img alt=\"Built on Hermes Agent\" src=\"https://img.shields.io/badge/Hermes_Agent-Nous_Research-635BFF?style=flat-square\">\n  <img alt=\"Next.js 16\" src=\"https://img.shields.io/badge/Next.js-16-000?style=flat-square&logo=next.js\">\n  <img alt=\"React 19\" src=\"https://img.shields.io/badge/React-19-149ECA?style=flat-square&logo=react\">\n  <img alt=\"TypeScript\" src=\"https://img.shields.io/badge/TypeScript-strict-3178C6?style=flat-square&logo=typescript&logoColor=white\">\n</p>\n\n---\n\n> **The stories you keep imagining. See them, hear them, share them.**\n\nYou don't ask for *a* story. You drop a seed and walk every \"what if\"\nbranch the universe could take. Every splice becomes a real branch: the\nagent re-harmonises the canon, paints the visuals, clones a fitting\nnarrator voice, and renders the version you picked into a video you can\npost.\n\n<p align=\"center\">\n  <img src=\"docs/screenshots/tree.png\" alt=\"Story tree, early branches\" width=\"49%\">\n  <img src=\"docs/screenshots/tree2.png\" alt=\"Story tree, expanded canon path\" width=\"49%\">\n</p>\n\n## At a glance\n\n| Action                    | Result                                                         |\n| :------------------------ | :------------------------------------------------------------- |\n| Type a seed               | A canon-tracked, live branching story canvas                   |\n| Pick an option            | Hermes proposes the next 2 to 3 critical beats                 |\n| Splice a beat mid-tree    | Downstream beats re-harmonise themselves automatically         |\n| Hit Render                | A landscape audiobook or a vertical reel, ready to post        |\n| Drop a YouTube URL        | ElevenLabs IVC clones that voice for every line of narration   |\n| Save / Load               | Full tree state, with provenance, in localStorage              |\n\n## How it works\n\nTwo distinct loops sit under the canvas. The **authoring loop** runs per\nbeat as you grow the tree. The **render loop** runs once, when you press\nRender: the agent dispatches four registered Hermes tools in sequence on\na single chat completion, no app-side orchestration.\n\n### Two ways to fork the story\n\nThe canvas exposes two `+` buttons with different shapes and different\njobs. Both grow the tree, but only one of them needs the council.\n\n```mermaid\nflowchart LR\n  classDef canon fill:#0d1828,stroke:#4fc3f7,color:#e0f7fa,stroke-width:2px\n  classDef inserted fill:#1a1208,stroke:#e9c16b,color:#fff8e1,stroke-width:2px\n  classDef whatif fill:#0f1019,stroke:#7a7e8a,color:#cdd2de,stroke-dasharray: 5 3\n  classDef arm fill:#0f131b,stroke:#e9c16b,color:#e9c16b,stroke-width:2px\n  classDef trunk fill:#0f131b,stroke:#7a7e8a,color:#cdd2de,stroke-width:2px,stroke-dasharray: 4 3\n\n  A[\"Beat 1<br/>opening\"]:::canon\n  B[\"Beat 2<br/>discovery\"]:::canon\n  C[\"Beat 3<br/>climax\"]:::canon\n  ARM[\"⬛ +<br/>arm splice\"]:::arm\n  INS[\"Beat 1.5<br/>inserted, gold\"]:::inserted\n  TRK((\"○ +<br/>trunk\")):::trunk\n  WIF[\"Beat 2'<br/>what-if branch\"]:::whatif\n\n  A -- canon --> ARM\n  ARM -- splice --> INS\n  INS -- canon --> B\n  B -- canon --> C\n  A -. parent stub .-> TRK\n  TRK -. what-if .-> WIF\n```\n\n| Gesture | Where it sits | What it does |\n| :--- | :--- | :--- |\n| **Square +** (gold, parallelogram) | Midpoint between a parent and its canon child | Splices a new beat *into* the canon. `narrative-writer-assist` drafts the inserted beat, then the council cascade patches every downstream beat the splice made stale. |\n| **Round +** (dashed circle) | Off the parent's outgoing stub | Adds a what-if sibling, a parallel timeline that doesn't touch existing canon. No cascade fires; brainstorm just produces 3 fresh next options on this new branch. |\n\n### Authoring loop: per-beat council\n\nEvery beat passes through a small council of narrative skills. Splice one\nbeat and the cascade walks downstream by itself until the canon is coherent\nagain.\n\n```mermaid\nsequenceDiagram\n  autonumber\n  participant U as user\n  participant N as next.js\n  participant H as hermes gateway\n\n  U->>N: enter seed\n  N->>H: brainstorm\n  H-->>N: 2-3 next options\n  U->>N: pick / splice\n\n  rect rgba(80,140,255,0.10)\n    Note over N,H: re-harmonisation cascade\n    N->>H: continuity-critic\n    H-->>N: contradictions per node\n    N->>H: rewriter\n    H-->>N: patched beats\n    N->>H: judge\n    H-->>N: approve / reject\n  end\n\n  N-->>U: tree updated\n```\n\n### Render loop: autonomous tool chain\n\nWhen you press Render, the agent chains four registered Hermes tools in\nsequence on a single chat completion. No app-side glue.\n\n```mermaid\nsequenceDiagram\n  autonumber\n  participant A as agent\n  participant D as narration_voice_director\n  participant S as voice_sample_builder\n  participant C as voice_clone_synthesize\n  participant R as noustiny_storybook\n\n  A->>D: title, seed, voice_gender\n  D-->>A: persona_label, search_query, fallback_query\n  A->>S: query\n  S-->>A: sample_path (24 kHz mono PCM)\n  A->>C: text, reference_wav\n  C-->>A: audio + per-character alignment\n  A->>R: voice_reference_wav, persona, render args\n  R-->>A: rendered video path\n```\n\n### Character continuity: one face per character\n\nStories drift visually when \"Tony Stark\", \"Mr. Stark\", and \"Tony\" each\nget a different portrait. Noustiny pins the cast at seed time and threads\nthe same reference image through every beat that mentions them.\n\n```mermaid\nflowchart LR\n  classDef seed fill:#0d1828,stroke:#4fc3f7,color:#e0f7fa,stroke-width:2px\n  classDef sheet fill:#1a1208,stroke:#e9c16b,color:#fff8e1,stroke-width:2px\n  classDef beat fill:#0f131b,stroke:#7a7e8a,color:#cdd2de\n  classDef tool fill:#0a1018,stroke:#4fc3f7,color:#4fc3f7,stroke-dasharray: 4 3\n\n  seed[\"seed prompt\"]:::seed --> sheet\n  sheet[\"character_sheet_builder<br/>1 to 4 named cast<br/>IP-free portrait per character\"]:::sheet\n\n  beat[\"beat mentions a name\"]:::beat --> reg\n  reg{{\"character_alias_resolver<br/>'Mr. Stark' → 'Tony Stark'\"}}:::tool --> lookup\n  lookup{{\"character_registry_lookup<br/>fetch portrait reference\"}}:::tool --> img\n\n  sheet -. registers .-> lookup\n  img[\"beat image gen<br/>conditioned on portrait\"]:::beat\n```\n\nThe cast sheet is built once. From then on, every beat that names a\ncharacter pulls the same portrait reference, so a face stays a face across\nthe whole tree, including the rendered video.\n\n## Tools\n\n12 registered tool names across 10 Python files. Each one fills a primitive\nHermes did not ship with.\n\n### Story state\n\n| Tool                        | Purpose                                                                            |\n| :-------------------------- | :--------------------------------------------------------------------------------- |\n| `story_tree_graph`          | Tree graph operations: canon path, descendants, splice insertion points            |\n| `narrative_context_builder` | Walks the canon chain, returns the live structured context every skill reads from  |\n| `motif_tracker`             | Recurring motif memory across the arc (a sword in beat 2 must reappear later)      |\n\n### Character continuity\n\n| Tool                        | Purpose                                                                            |\n| :-------------------------- | :--------------------------------------------------------------------------------- |\n| `story_copyright_detector`  | IP scrub: \"Iron Man\" becomes an IP-free description before the image API sees it   |\n| `character_sheet_builder`   | Produces 1 to 4 named characters with IP-free visuals plus portrait prompts        |\n| `character_registry_lookup` | Find a character on the cast sheet, attach the correct portrait reference          |\n| `character_alias_resolver`  | \"Mr. Stark\" resolves to \"Tony Stark\" so one character keeps one portrait           |\n\n### Voice\n\n| Tool                        | Purpose                                                                            |\n| :-------------------------- | :--------------------------------------------------------------------------------- |\n| `narration_voice_director`  | Director-agent reads seed and story, returns persona plus reference search query   |\n| `voice_sample_builder`      | yt-dlp + ffmpeg, accepts URL, 11-char ID, or free text. Normalises to 24 kHz mono  |\n| `voice_clone_synthesize`    | ElevenLabs IVC + with-timestamps. Voice cached by reference SHA. Alignment is free |\n| `voice_clone_cleanup`       | Frees the cached voice ID after render                                             |\n\n### Render\n\n| Tool                        | Purpose                                                                            |\n| :-------------------------- | :--------------------------------------------------------------------------------- |\n| `noustiny_storybook`        | Render entry. Agent dispatches it; one call drives the FastAPI service end to end  |\n\n## Skills\n\n13 agentskills.io bundles, each one a system prompt for a single creative\nconcern. Next reads them from the local mirror and sends them as the\nsystem role on every chat completion; the autonomous storybook chain pulls\nits own from the gateway side.\n\n### Tree authoring\n\n| Skill                         | Role                                                              |\n| :---------------------------- | :---------------------------------------------------------------- |\n| `narrative-brainstorm`        | Proposes 2 to 3 next-checkpoint options from the canon chain      |\n| `narrative-writer-assist`     | Writes a spliced insert beat that fits parent and child           |\n| `narrative-continuity-critic` | Audits downstream beats against any insert                        |\n| `narrative-rewriter`          | Patches the stale beats the critic flagged                        |\n| `narrative-judge`             | Approves or rejects the rewrite against the original              |\n| `narrative-scene-qa`          | Per-beat sanity check (consistency, length, register)             |\n| `narrative-writer`            | Seals the chosen branch as final prose                            |\n\n### Visual + IP\n\n| Skill                       | Role                                                              |\n| :-------------------------- | :---------------------------------------------------------------- |\n| `story-copyright-detector`  | Skill counterpart of the same-named tool                          |\n| `character-sheet-builder`   | Cast extraction rules + IP-free portrait prompt format            |\n| `visual-prompt-builder`     | Turns a beat into an IP-free image prompt; reads character sheet  |\n| `scene-composition`         | Shot framing and layout rules                                     |\n| `storybook-intro`           | Cinematic intro page generator                                    |\n\n### Voice\n\n| Skill                      | Role                                                               |\n| :------------------------- | :----------------------------------------------------------------- |\n| `narration-voice-director` | Persona reasoning rules backing the same-named tool                |\n\n## Architecture\n\n```mermaid\nflowchart TB\n  subgraph windows[Windows side]\n    nx[Next.js<br/>:3000]\n    mirror[hermes-skills-local<br/>NTFS mirror]\n  end\n\n  subgraph wslblock[WSL]\n    gw[Hermes gateway<br/>:8642]\n    svc[Storybook render<br/>:8643]\n    tools[hermes-agent tools]\n    skills[hermes-agent skills<br/>canonical]\n  end\n\n  subgraph cloud[Cloud]\n    nous[Nous Portal]\n    el[ElevenLabs]\n    yt[YouTube / yt-dlp]\n  end\n\n  browser([browser]) --> nx\n  nx -- chat completion --> gw\n  nx -. \"read SKILL.md\" .-> mirror\n  gw -- forward --> nous\n  gw --> tools\n  tools --> el\n  tools --> yt\n  tools --> svc\n  svc --> nx\n```\n\nThe `hermes-skills-local` directory is a Windows-side mirror of the canonical\nskills folder in WSL. Reading SKILL.md over UNC stalls under parallel reads\n(25 second timeouts on canvas-enter), so Next reads from local NTFS instead.\nResync after editing a SKILL.md:\n\n```bash\ncp -r //wsl.localhost/Ubuntu/home/<user>/hermes-agent/skills/creative \\\n      ./hermes-skills-local/\n```\n\n## Repo layout\n\n```\n.\n├── hermes-additions/          tools + skills we authored for Hermes\n│   ├── tools/                 10 .py files, 12 registered tool names\n│   ├── skills/creative/       13 SKILL.md bundles\n│   └── README.md              install + integration notes\n├── hermes-skills-local/       Windows mirror (gitignored)\n└── web/                       Next.js 16 app\n    ├── app/                   routes, pages, layouts\n    ├── components/            canvas, modals, agent ticker, etc.\n    ├── lib/                   store, hermes client, save system\n    └── public/                static assets\n```\n\n## Built for\n\nNous Creative Hackathon, 2026.\n\n## Credits\n\nHermes Agent · Nous Research\nElevenLabs Instant Voice Cloning\nyt-dlp\nffmpeg + libass\n","summary":"Noustiny is a web‑based interactive storytelling tool that lets users drop an initial “seed” and then explore all possible “what‑if” branches of a narrative. It features a live branching canvas where each beat can be spliced into the canon, automatically re‑harmonising downstream beats, or spawned as a parallel “what‑if” branch; the built‑in Hermes agent suggests next critical beats and coordinates video, audio, and narration rendering in a single command. Creators can pull a voice from any YouTube URL via ElevenLabs, generate landscape audiobooks or vertical reels, and save or load the full story tree with provenance in the browser. The project is ideal for writers, game designers, and content creators who want to quickly prototype, evolve, and publish branching stories without manual script editing.","description":"An agent native video creation pipeline that runs on top of Hermes Agent","stars":121,"language":"TypeScript"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
