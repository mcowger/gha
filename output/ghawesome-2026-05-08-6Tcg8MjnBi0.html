r-attachments/assets/b4149e63-48df-456e-8007-c607b7d46f37\" />\n\n\n## The Idea\n\nWhat if you could vibe code from an airplane? Or a cabin with no cell signal? Or just... without sending your code to someone else's server?\n\n**Gemma Chat** is an open-source Electron app that runs Gemma 4 natively on Apple Silicon. You describe what you want to build, and it writes the code — HTML, CSS, JavaScript, multi-file projects — with a live preview that updates as the model types. No internet connection needed after the initial model download.\n\nIt's a proof-of-concept for **fully offline, local-first vibe coding** using a small open model. The model is ~3 GB. The whole thing runs on your laptop.\n\n## How It Works\n\n1. **Describe what you want to build** — \"A retro calculator app\" or \"A landing page for a coffee shop\"\n2. **Watch it code** — Gemma writes files character-by-character with a live preview\n3. **Iterate** — Ask for changes, it edits the files and the preview updates in real-time\n\nEverything happens locally. The model runs via [MLX-LM](https://github.com/ml-explore/mlx-examples/tree/main/llms/mlx_lm), Apple's framework for running LLMs on Apple Silicon. Your code, your prompts, your conversations — all on your machine.\n\n## Features\n\n- 🛠 **Build Mode** — Coding agent with a live preview canvas. Writes multi-file projects into a sandboxed workspace.\n- 💬 **Chat Mode** — Conversational AI with tool use (web search, URL fetch, calculator, bash).\n- 🔄 **Model Switching** — Hot-swap between 4 Gemma variants on the fly.\n- 🎤 **Voice Input** — Local speech-to-text via in-browser Whisper.\n- ✈️ **Works Offline** — After the one-time model download, everything runs without internet.\n- 💾 **Zero Config** — Python venv + MLX runtime auto-provisions on first launch.\n\n## Available Models\n\n| Model | Size | Best For |\n|---|---|---|\n| Gemma 4 E2B | ~1.5 GB | Fast Q&A, simple tasks |\n| **Gemma 4 E4B** | **~3 GB** | **Recommended.** Speed + capability balance |\n| Gemma 4 27B MoE | ~8 GB | Stronger reasoning (needs 16 GB+ RAM) |\n| Gemma 4 31B | ~18 GB | Maximum quality (needs 32 GB+ RAM) |\n\n## Getting Started\n\n**Requirements:** macOS on Apple Silicon, Python 3.10–3.13, Node 20+.\n\n```bash\ngit clone https://github.com/ammaarreshi/gemma-chat-public.git\ncd gemma-chat-public\nnpm install\nnpm run dev\n```\n\nFirst launch will auto-detect Python → create a venv → install MLX-LM → download the model (~3 GB) → ready to vibe code.\n\n> **Tip:** Install Python via Homebrew if you don't have it: `brew install python@3.13`\n\n### Building a Distributable\n\n```bash\nnpm run dist\n```\n\nProduces a signed `.dmg` in `dist/`. Share it directly — recipients just drag to Applications.\n\n## Tech Stack\n\n| Layer | Tech |\n|---|---|\n| App Shell | Electron + Vite + React 19 + TypeScript + Tailwind |\n| Model Runtime | MLX-LM (auto-installed into a local venv) |\n| Speech-to-Text | transformers.js (Whisper, runs in-browser via WASM) |\n| Workspace | Per-conversation sandboxed filesystem + local HTTP server |\n\n## Architecture\n\n```\nsrc/\n├── main/              Electron main process\n│   ├── index.ts       Window + IPC + agent loop\n│   ├── mlx.ts         MLX-LM venv install / server lifecycle / chat streaming\n│   ├── workspace.ts   Per-conversation workspace + static file server\n│   └── tools.ts       Tool definitions + system prompts + XML action parser\n├── preload/           contextBridge API surface\n├── renderer/src/\n│   ├── components/\n│   │   ├── Setup.tsx      First-run onboarding + download progress\n│   │   ├── Chat.tsx       Main layout + model switcher\n│   │   ├── Canvas.tsx     Preview / Code / Files tabs (Build mode)\n│   │   ├── Message.tsx    Chat bubbles + tool cards + activity bar\n│   │   ├── Composer.tsx   Input + mic button\n│   │   └── Sidebar.tsx    Conversation list\n│   └── lib/whisper.ts     Browser Whisper pipeline\n└── shared/types.ts    IPC types + model registry\n```\n\n### Under the Hood\n\n**Agent Loop** — In Build mode, each assistant turn streams tokens from the local MLX server. XML `<action>` blocks are parsed from the stream, executed (file writes, bash commands, etc.), and results are fed back for the next turn. Up to 40 rounds per user message.\n\n**Live Streaming** — As the model generates file content, partial writes are flushed to disk every ~450ms. The preview iframe reloads in real-time so you watch the page build itself.\n\n**Tool Protocol** — Small models handle XML more reliably than JSON function calling, so tools are invoked via an XML-based format:\n\n```xml\n<action name=\"write_file\">\n<path>index.html</path>\n<content>\n<!doctype html>\n...\n</content>\n</action>\n```\n\n## Credits\n\n- [Gemma](https://ai.google.dev/gemma) by Google DeepMind\n- [MLX](https://github.com/ml-explore/mlx) by Apple Machine Learning Research\n- [transformers.js](https://github.com/huggingface/transformers.js) by Hugging Face\n\nCreated by [@ammaar](https://x.com/ammaar) and AI :) \n\n## License\n\nMIT\n","summary":"Gemma Chat is an open‑source Electron app that runs Google’s Gemma 4 language model locally on Apple Silicon, enabling a fully offline coding assistant that can generate HTML, CSS, JavaScript, and multi‑file projects right on your Mac. The application supports a Build mode with live preview, a conversational Chat mode with built‑in tools such as web search and bash, hot‑swappable Gemma variants, and even local voice input via Whisper, all without requiring any network connection after the initial model download. Its lightweight runtime uses Apple’s MLX framework, making it ideal for developers who need code generation on the go—whether on flights, in remote cabins, or in environments where privacy and connectivity are limited. The intuitive workflow of describing a project, watching it code character‑by‑character, and iterating in real time makes it especially useful for designers, front‑end developers, and anyone looking to quickly prototype or automate web projects in a secure, offline setting.","description":"Local AI chat + coding agent for Apple Silicon, powered by Gemma 4 via MLX / Supports Ollama","stars":1069,"language":"TypeScript"},{"owner":"fluffypony","repo":"dothething","url":"https://github.com/fluffypony/dothething","readme":"# dothething\n\nDothething (DTT) is a local AI agent. You give it a task, walk away, and come back to results.\n\nIt handles research, data extraction, browser automation, file editing, and code execution. It works until the job is done, or tells you exactly why it couldn't.\n\n**Website:** [dotheth.ing](https://dotheth.ing)\n\n## What it does\n\nYou describe a task in plain English. The agent breaks it down, picks the right tools, and delivers the output.\n\n- Plans its work and tracks progress\n- Searches the web using a local SearXNG instance (supports Google, Bing, DuckDuckGo, and more -- you can target specific engines or search images directly)\n- Browses pages with Notte and Camoufox (a Firefox fork built to avoid fingerprinting). Extracts page content, solves captchas, and handles multi-step web interactions\n- Reads and edits files, runs shell commands, makes HTTP requests\n- Connects to your existing MCP servers via `~/.dtt/mcp.json`\n- Loads custom skills from `~/.dtt/skills/<skill-name>/SKILL.md` (Claude Code convention) -- behavioral skills inject directly into the agent's context, while text-processing skills run as isolated sub-tasks\n- Manages its own configuration. Tell it to add an API key or install a skill, and it handles the file edits and reloads itself\n- Sends and receives email through its own inbox via AgentMail\n- Copies to and pastes from your system clipboard, including images\n- Accepts mid-task input. Press any key while it's working to type instructions. Ctrl-Q queues input for after the current step finishes\n- Farms out grunt work to a cheaper model. Asks GPT-5.4 for a second opinion when stuck\n- Saves full conversation threads so you can resume interrupted work\n- Tracks token usage and dollar cost via OpenRouter, with Anthropic prompt caching for cost reduction\n\n## Quick start\n\n```bash\ngit clone https://github.com/fluffypony/dothething.git\ncd dothething\n./dtt.sh --prompt \"Find the 10 largest public companies by revenue that went bankrupt in the last 20 years and write a markdown report with causes and timelines.\"\n```\n\nFirst run prompts for your OpenRouter API key (required) and a 2Captcha API key (optional), and saves them to `~/.dtt/env` (mode 0600). Subsequent runs read the keys from there. To skip the prompt, export `OPENROUTER_API_KEY` in your shell first; values in the shell environment take precedence over the saved file. To change or clear the saved keys, edit or delete `~/.dtt/env`.\n\nThe first run also takes a couple of minutes to set up a Python venv, install SearXNG, and set up the Notte browser framework. After that, startup is fast.\n\nOmit `--prompt` to open a multiline editor. Type your task, then hit Esc+Enter to submit.\n\n## Requirements\n\n- macOS or Linux\n- Python 3.11+\n- An OpenRouter API key. Get one at [openrouter.ai/keys](https://openrouter.ai/keys). First run prompts for it and saves it to `~/.dtt/env`, or export `OPENROUTER_API_KEY` in your shell to skip the prompt.\n- Optional: a 2Captcha API key for automated captcha solving during browser tasks. First-run setup prompts for this too, or export `TWOCAPTCHA_API_KEY`.\n- Optional: an AgentMail API key for email tools. The agent can set this up for you on first use, or get one at [agentmail.to](https://agentmail.to).\n- Linux clipboard/image support needs `wl-clipboard` (Wayland) or `xclip` (X11).\n\nEverything else is installed automatically into `/tmp/dothething` on first run.\n\n## Usage\n\n```bash\n./dtt.sh [flags]\n```\n\n| Flag | What it does |\n|---|---|\n| `--prompt \"...\"` | Provide the task inline instead of opening the editor |\n| `--fast` | Use claude-opus-4.6-fast (cheaper, slightly less capable) |\n| `--cwd DIR` | Set the working directory for file operations (default: `.`) |\n| `--max-loops N` | Cap the number of agent turns (default: 200) |\n| `--oraclepro` | Use GPT-5.4-pro instead of GPT-5.4 for oracle calls |\n| `--resume ID` | Pick up a previous session by thread ID |\n| `--headed` | Show the browser window for visual debugging |\n| `--orchestrator` | Launch orchestrator mode -- run and manage multiple agents from one terminal |\n| `--pipe` | Stdout-only output for Unix pipelines. Final report on stdout, everything else suppressed. Exit codes: 0=complete, 2=partial, 1=failed |\n| `--tui` | Full-screen terminal UI for single-agent mode (experimental) |\n| `--notify-desktop` | Send a desktop notification when the task finishes |\n| `--notify-email EMAIL` | Email a notification to this address when the task finishes (requires AgentMail) |\n| `--max-cost USD` | Stop and checkpoint when cumulative cost reaches this amount |\n| `--verbose` | Show full error tracebacks |\n| `--debug` | Log raw API payloads and cache metrics |\n\n## How it works\n\nThe agent routes Claude Opus through OpenRouter. Every turn, the model decides which tools to call, processes the results, and decides what to do next.\n\n**result_mode.** Every tool call has a `result_mode`. If you need exact output, use `\"raw\"`. If you tell it to \"extract all function signatures\", it pipes the output through Sonnet for a tight summary before the main agent sees it. This keeps the context window manageable on long tasks.\n\n**Browser automation.** We use Notte with Camoufox under the hood. For simple scraping, `fetch_page` grabs clean markdown with no LLM cost. If a captcha shows up, it gets solved automatically. For complex multi-step interactions (login flows, forms, SPAs), the agent can hand off the session to a dedicated Notte browser agent via `browser_agent`.\n\n**Prompt caching.** We use OpenRouter sticky routing and Anthropic's block-level cache controls. On long tasks, subsequent turns hit the cache, cutting input costs significantly.\n\n**Thread persistence.** Every session saves to `~/.dtt/threads/` with a timestamped ID. If you interrupt a run or hit the loop limit, resume with `--resume <thread-id>`.\n\n**Skills.** Drop skill directories into `~/.dtt/skills/` to teach the agent new procedures. Each skill is a directory containing a `SKILL.md` file (Claude Code convention). Skills with `allowed-tools` in their frontmatter inject directly into the agent's context, so it follows those instructions while using its own tools. Text-processing skills run via Sonnet as isolated sub-tasks. Skills can also be installed mid-session via the `manage_skill` tool.\n\n**MCP servers.** Configure MCP servers in `~/.dtt/mcp.json` (same format as Claude Code). The agent picks up all connected MCP tools at startup. Servers can also be added mid-session via the `manage_mcp` tool.\n\n## Orchestrator mode\n\n`--orchestrator` opens a terminal UI for running multiple agents in parallel. You get:\n\n- One line per session showing status, current phase, elapsed time, and cost\n- Expand any session to watch its log in real time\n- Send live input or queued input to a running agent\n- Terminate, copy logs, or copy final output to your clipboard\n- A \"smart launcher\" that sends your prompt to Opus, which figures out how to split the work and spins up agents for each piece\n\nThe smart launcher caps at 16 concurrent agents by default and shows a cost estimate before launching.\n\n## Live input\n\nWhile the agent is running, press any key to open an input bar at the bottom. Type and press Enter to inject your message immediately. Press Ctrl-Q to queue it until the current step finishes. Press Esc to cancel.\n\nThe agent can also ask you questions directly when it needs something it can't figure out on its own -- an OTP code, a preference, or confirmation before a destructive action.\n\n## Email\n\nDTT can send and receive email through AgentMail. First time: the agent signs itself up, you confirm a one-time OTP from your personal email, and the API key is saved for all future sessions. After that, it handles email on its own.\n\nSet `AGENTMAIL_API_KEY` in your shell or let the agent create one via `email_auth`.\n\n## Models\n\nAll calls route through OpenRouter. You only need one API key.\n\n| Role | Default model | Flag to change |\n|---|---|---|\n| Main agent | Claude Opus 4.6 | `--fast` for Opus 4.6-fast |\n| Summarizer, Notte agent, delegate | Claude Sonnet 4.6 | -- |\n| Oracle | GPT-5.4 | `--oraclepro` for GPT-5.4-pro |\n\n## Tools\n\n**File operations:** `read_file`, `write_file`, `edit_file`, `batch_read`, `diff_files`\n\n**System:** `run_command`, `shell_session`, `run_code`, `glob`, `list_dir`, `search_file`, `clipboard_copy`, `clipboard_paste`, `request_user_input`\n\n**Web:** `search_web` (hybrid Serper + SearXNG for general discovery, plus engine/category targeting), `fetch_page` (Notte-powered scraping), `browser_agent` (full interactive control), `http_request`\n\n**Analysis:** `think`, `oracle`, `delegate`, `analyze_data`, `analyze_image`, `batch_process`\n\n**State:** `notes_add`, `notes_read`, `plan_create`, `plan_update`\n\n**Config:** `manage_config`, `manage_skill`, `manage_mcp`\n\n**Email:** `email_auth`, `email_list_inboxes`, `email_create_inbox`, `email_list`, `email_read`, `email_send`, `email_delete`, `email_wait_for_message`\n\n**Extensions:** `use_skill` (custom skills), MCP tools (from configured servers)\n\n## Skills\n\nEach skill lives in its own directory under `~/.dtt/skills/` as a `SKILL.md` file (matching Claude Code's convention). So a skill called `my-skill` would live at `~/.dtt/skills/my-skill/SKILL.md`. Subdirectories are scanned recursively, so you can organize skills however you like. Each `SKILL.md` can have optional YAML frontmatter:\n\n```yaml\n---\nname: my-skill\ndescription: What this skill does\ninline: true          # inject into agent context (vs. delegate to Sonnet)\nallowed-tools: [Read, Write, Edit]  # implies inline\ndisable-model-invocation: true  # hide from agent's skill list\n---\n\nYour skill instructions here...\n```\n\nSkills with `allowed-tools` or `inline: true` get injected directly into the agent's system prompt. The agent applies them while working, using its full tool access. All other skills are available via the `use_skill` tool for isolated execution.\n\n## MCP servers\n\nConfigure MCP servers in `~/.dtt/mcp.json`:\n\n```json\n{\n  \"mcpServers\": {\n    \"my-server\": {\n      \"command\": \"npx\",\n      \"args\": [\"-y\", \"my-mcp-server\"],\n      \"env\": { \"API_KEY\": \"${MY_API_KEY}\" }\n    }\n  }\n}\n```\n\nThe agent discovers and uses all tools exposed by connected MCP servers.\n\n## Environment variables\n\n| Variable | Required | Description |\n|---|---|---|\n| `OPENROUTER_API_KEY` | Yes | Your OpenRouter API key |\n| `SERPER_API_KEY` | No | Enables hybrid `search_web` plus Serper-backed `batch_process` search enrichment |\n| `TWOCAPTCHA_API_KEY` | No | Enables automated captcha solving |\n| `AGENTMAIL_API_KEY` | No | AgentMail key for email tools |\n| `AGENTMAIL_INBOX_ID` | No | Default AgentMail inbox ID |\n| `AGENTMAIL_HUMAN_EMAIL` | No | Human email for AgentMail OTP verification |\n\nAll variables can be saved to `~/.dtt/env` (shell-exported values take precedence). The agent can update this file via `manage_config`.\n\n## Where things live\n\n| Path | What's there |\n|---|---|\n| `~/.dtt/env` | Saved API keys for OpenRouter, Serper, 2Captcha, and AgentMail. Mode 0600. The agent can update this via manage_config. |\n| `~/.dtt/threads/` | Saved conversation threads (resume with `--resume`) |\n| `~/.dtt/threads/<id>/cache/` | Per-thread scratch folder (intermediate files, downloads, batch artifacts) |\n| `~/.dtt/skills/<name>/SKILL.md` | User-defined skills (Claude Code convention) |\n| `~/.dtt/mcp.json` | MCP server configuration |\n| `/tmp/dothething/` | Runtime: Python venv, SearXNG, Camoufox browser |\n\n## Pipe mode\n\n`--pipe` sends only the final report to stdout and mutes everything else. Use it when you need to chain dothething into other commands:\n\n```bash\n./dtt.sh --pipe --prompt \"Summarize the README in this repo\" | pbcopy\n./dtt.sh --pipe --prompt \"List all TODO comments\" > todos.txt\ncat spec.md | ./dtt.sh --pipe --prompt \"Review this spec\"\n```\n\nExit codes: 0 means complete, 2 means partial, 1 means failed.\n\n## Notifications\n\n`--notify-desktop` pops a system notification when the task finishes. On macOS this uses osascript, on Linux it uses notify-send.\n\n`--notify-email you@example.com` sends a short email summary when done. Requires AgentMail to be configured.\n\nBoth work in orchestrator mode -- you get per-agent notifications as they finish, plus one when all agents are done.\n\n## Persistent shell\n\nThe `shell_session` tool provides a stateful bash session that persists environment variables, working directory, and shell state across calls. Use it for multi-step build processes, interactive debugging, or anything where shell state matters between commands. For simple one-off commands, `run_command` is still there and simpler.\n\n## Cost limits\n\n`--max-cost 5.00` stops the agent when cumulative spending hits $5. The agent checkpoints its state so you can `--resume` later if you want to continue. Useful for fire-and-forget runs where you don't want to babysit the budget.\n\n## Email polling\n\n`email_wait_for_message` pauses the agent until a specific reply hits the inbox. Set filters on sender, subject, or thread. The agent polls every few seconds and returns the message when it arrives, or times out. Saves you from wasting tokens on manual poll loops.\n\n## Security\n\nPersisted thread logs (`~/.dtt/threads/`) are redacted -- API keys, tokens, and secrets are masked before writing to disk. The same redaction applies to `--debug` output.\n\n## License\n\nBSD 3-Clause. See [LICENSE](LICENSE) for the full text.\n","summary":"Dothething delivers a self‑contained local AI agent that takes a plain‑English description of a job and works independently until the task is finished or a reason for failure is reported. It can search the web through a local SearXNG instance, browse pages with a privacy‑focused Firefox fork, edit files, run shell commands, send and receive email, and even farm out work to cheaper models while regularly consulting GPT‑5.4 for tough decisions. The agent tracks its progress, token usage and cost, allows mid‑task input, and supports custom skills loaded from files. Developers, researchers, and power users looking for an autonomous, cost‑aware automation layer that requires no cloud services beyond an OpenRouter key will find it especially useful.","description":"an autonomous AI agent: you describe the thing, it does the thing.","stars":1595,"language":"Shell"},{"owner":"MayersScott","repo":"rkn-block-checker","url":"https://github.com/MayersScott/rkn-block-checker","readme":"# RKN Block Checker\n\n[![PyPI version](https://img.shields.io/pypi/v/rkn-block-checker.svg)](https://pypi.org/project/rkn-block-checker/)\n[![CI](https://github.com/MayersScott/rkn-block-checker/actions/workflows/ci.yml/badge.svg)](https://github.com/MayersScott/rkn-block-checker/actions/workflows/ci.yml)\n[![Python](https://img.shields.io/badge/python-3.10%2B-blue)](https://www.python.org/downloads/)\n[![License: MIT](https://img.shields.io/badge/license-MIT-green.svg)](LICENSE)\n\nA small CLI that figures out whether the connection you're sitting on is in\nan RKN/TSPU-blocked zone - and, more usefully, **what kind** of block it is\n(DNS poisoning, TCP reset, TLS DPI on SNI, or an ISP stub page).\n\nThe point isn't \"site X doesn't open.\" Browsers already tell you that. The\npoint is to look at each layer of the stack independently and report\n*where* it broke. That tells you a lot more about your situation than a\ngeneric \"this site can't be reached\" page.\n\n## Quick start\n\n```bash\npip install rkn-block-checker\nrkn-check\n```\n\nThat's it. The tool probes a built-in list of sites, classifies each\nfailure by layer, and prints a verdict. No config, no setup, nothing to\nedit.\n\n## Example output\n\n```text\n======================================================================\n  RKN Block Checker\n======================================================================\n  IP:       95.165.xxx.xxx\n  ISP:      AS12389 Rostelecom\n  Location: Moscow, Moscow, RU\n----------------------------------------------------------------------\n\nWhitelist (should always work)\n  name          verdict                    TCP     TLS     PLT  status\n  --------------------------------------------------------------------\n  gosuslugi     ✓ OK                      18ms    42ms   380ms  200\n  yandex        ✓ OK                       8ms    25ms    95ms  200\n  sberbank      ✓ OK                      12ms    38ms   250ms  200\n  vk            ✓ OK                       9ms    28ms   180ms  200\n  ...\n\nBlacklist (RKN-restricted)\n  name          verdict                    TCP     TLS     PLT  status\n  --------------------------------------------------------------------\n  instagram     ~ LIKELY TLS DPI          22ms       -       -  -\n    └ TLS reset right after ClientHello - consistent with SNI-based DPI\n  twitter/x     ~ LIKELY TLS DPI          24ms       -       -  -\n    └ TLS handshake silently dropped - consistent with DPI filtering\n  rutracker     ✗ HTTP STUB               18ms    45ms   120ms  200\n    └ response body matches a known ISP stub-page marker\n  protonvpn     ✗ DNS                        -       -       -  -\n    └ system DNS doesn't resolve, DoH does - consistent with DNS poisoning\n\n======================================================================\n  Summary\n----------------------------------------------------------------------\n  Whitelist: 21/21 working\n  Blacklist: 3/15 open, 12/15 blocked\n\n  → Likely in an RKN-blocked zone (medium confidence).\n    Most blacklist failures match censorship patterns (TLS DPI, TCP RST),\n    but those signals can also be caused by server-side issues. A control\n    vantage point would confirm.\n\n  Block types in the blacklist:\n    ~ LIKELY TLS DPI: 8\n    ✗ DNS: 2\n    ✗ HTTP STUB: 2\n======================================================================\n```\n\nVerdict labels are **calibrated by confidence**: `✗` means a high-confidence\ndiagnosis (e.g. DNS poisoning confirmed by DoH, HTTP 451, a known stub-page\nmarker), `~ LIKELY` means a known censorship pattern matched but a single\nsignal can't rule out a server-side issue, and `?` means the symptom is\nambiguous. The summary line says so plainly - \"high confidence\", \"medium\nconfidence\", or \"inconclusive\" - and never claims more certainty than the\nunderlying signals support.\n\n## Why this exists\n\nIf a site doesn't open, your browser tells you that. But if you want to\n*do* something about it - pick the right circumvention tool, file a useful\nbug report, or just understand what's happening to your traffic - you need\nto know which part of the network stack is actually being interfered with.\n\nDifferent censorship mechanisms leave different fingerprints:\n\n- **DNS poisoning** is the cheapest and oldest. The ISP's resolver lies\n  about a domain.\n- **TCP reset** is IP-level blackholing. Rare in practice - most ISPs\n  don't bother.\n- **TLS DPI on SNI** is the modern TSPU/RKN signature. The middlebox\n  watches for the SNI extension in the TLS ClientHello and tears the\n  connection down once it sees a blocked hostname.\n- **HTTP stub pages** are the polite kind: an ISP-controlled page served\n  back with a \"blocked by RKN\" body, often with status 200 or the\n  rarer-but-explicit 451.\n\n`rkn-check` walks DNS → TCP → TLS → HTTP for each target and stops at the\nfirst thing that fails. Whichever layer broke becomes the verdict.\n\n## Common scenarios\n\n### Just diagnose the connection you're on\n\n```bash\nrkn-check\n```\n\nProbes the built-in lists (~21 control sites, ~15 RKN-restricted), prints\na per-site report and a summary verdict.\n\n### Check a single URL\n\n```bash\nrkn-check --url https://example.com\nrkn-check --url example.com --url google.com    # repeat for several\n```\n\nSkips the built-in lists entirely and runs an ad-hoc check against just\nthe URLs you pass. No summary verdict - there's no control group to\ncompare against. Use this when you want to know \"did *this one site* come\nthrough?\" without paying for a full scan.\n\n### Pipe to `jq`\n\n```bash\n# names of every blocked site\nrkn-check --json | jq -r '.blacklist[] | select(.verdict != \"OK\") | .name'\n\n# count by block type\nrkn-check --json | jq '.blacklist | group_by(.verdict)\n                       | map({verdict: .[0].verdict, count: length})'\n\n# only DPI-style blocks (TCP fine, TLS dies)\nrkn-check --json | jq '.blacklist[] | select(.verdict == \"TLS_BLOCK\" and .tcp_ok)'\n```\n\n### Use your own target lists\n\n```bash\nrkn-check --black-file my-list.txt\nrkn-check --white-file my-control.json --black-file my-targets.json\n```\n\nSee [Custom target lists](#custom-target-lists) below for the file format.\n\n### Run from cron and store JSON over time\n\n```bash\nrkn-check --json --no-self-info > \"snapshots/$(date -I).json\"\n```\n\n`--no-self-info` skips the public-IP lookup so the tool doesn't hit\n`ipinfo.io` on every cron tick (and so the resulting JSON doesn't carry\nyour IP).\n\n## Usage\n\n```text\nrkn-check [-h] [--json] [--white] [--black]\n          [--white-file PATH] [--black-file PATH] [--url URL]\n          [--timeout TIMEOUT] [--workers WORKERS] [-v]\n          [--no-self-info] [--identify]\n```\n\n| flag | what it does |\n|------|--------------|\n| `--json` | emit machine-readable JSON instead of the colored report |\n| `--white` | check only the control (whitelist) targets |\n| `--black` | check only the blacklist targets |\n| `--white-file PATH` | replace the built-in whitelist with a `.txt` or `.json` file |\n| `--black-file PATH` | replace the built-in blacklist with a `.txt` or `.json` file |\n| `--url URL` | probe a single URL or hostname; repeat for several. Skips built-in lists |\n| `--timeout T` | per-probe timeout in seconds (default 5.0) |\n| `--workers N` | thread pool size for parallel checks (default 10) |\n| `--no-self-info` | skip the public-IP lookup at the top of the report |\n| `--identify` | send a self-identifying User-Agent instead of a generic Chrome one. See [Privacy](#privacy-and-threat-model) |\n| `-v` / `-vv` | logging at INFO / DEBUG |\n\n`--white` and `--black` are mutually exclusive. `--url` cannot be combined\nwith `--white`/`--black`/`--white-file`/`--black-file` - ad-hoc mode runs\nonly the URLs you pass.\n\n## How it works\n\nFor each target the tool walks DNS → TCP → TLS → HTTP and stops at the\nfirst thing that fails. Whichever layer broke becomes the verdict.\n\n| layer | probe | what a failure means |\n|------:|-------|----------------------|\n| DNS  | system resolver vs Cloudflare DoH, full address sets compared | sets agree but the system fails alone → DNS poisoning. Disjoint sets → transparent rewriting |\n| TCP  | plain TCP handshake on `:443` | a `RST` is IP-level blackholing. Rare - most ISPs don't bother |\n| TLS  | TLS handshake with SNI = target host | reset/timeout *here*, with TCP working fine, is the classic TSPU/DPI signature: the middlebox sees the SNI and tears the connection down |\n| HTTP | `GET` after handshake completes | 451, or an ISP stub page returning 200 with a \"blocked by Roskomnadzor\" body |\n\nTwo probes are worth calling out:\n\n**System DNS vs DoH, set-based.** The cheapest way to \"block\" a site is\nto make the ISP's DNS lie. Every host is resolved twice - once via\n`getaddrinfo` (which uses whatever resolver the OS is configured for,\nusually the ISP's) and once via Cloudflare's DoH endpoint, which the ISP\ncan't intercept. The two **sets** of returned IPs are then compared:\ndisagreement only counts when the sets are **completely disjoint**. Any\nshared address is treated as load balancing, not poisoning - large sites\ntypically rotate the order of multiple A-records on every query, and\ncomparing only the first IP from each side produces false positives on\nevery other run.\n\n**TLS handshake with SNI.** Modern TSPU equipment doesn't drop the TCP\nconnection - it lets you connect, reads the SNI extension out of the\nClientHello, and *then* sends a RST or simply stops responding. So we\nhave to actually start the TLS handshake to see this. A `TLS_BLOCK` after\na clean `TCP_OK` is the unambiguous fingerprint of DPI-based blocking.\n\n## Verdicts and confidence\n\nEvery result carries both a verdict and a confidence level. The verdict\nsays **what kind** of failure happened; the confidence says how\ntrustworthy the diagnosis is.\n\n| verdict | meaning |\n|---------|---------|\n| `OK` | the site loaded normally |\n| `DNS_BLOCK` | system DNS doesn't resolve while DoH does - consistent with poisoning |\n| `TCP_RESET` | TCP handshake answered with RST |\n| `TLS_BLOCK` | TCP succeeded but TLS handshake was reset, dropped, or otherwise killed (typical DPI on SNI) |\n| `HTTP_STUB` | the response was a known ISP stub page or HTTP 451 |\n| `TIMEOUT` | something timed out, not enough to classify further |\n| `DOWN` | resolution and connectivity both failed in ways that aren't censorship-shaped |\n| `UNKNOWN` | unexpected error, see notes |\n\nConfidence levels:\n\n- **HIGH** - two independent signals agree (e.g. DNS poisoning confirmed\n  by DoH, an explicit HTTP 451, a known stub-page marker in the body).\n- **MEDIUM** - a known censorship pattern matches, but the signal alone\n  doesn't rule out a server-side issue or a flaky path (TLS reset right\n  after ClientHello, TCP RST mid-stream).\n- **LOW** - symptom is ambiguous (a generic timeout, an unclassified\n  failure).\n\nThe summary line at the bottom mirrors this. With most blacklist failures\nmatching high-confidence patterns it says \"Likely in an RKN-blocked zone\n(high confidence)\". If most signals are medium it lowers the claim. And\nwhen the **whitelist** itself is mostly failing it doesn't claim either\nway - without a working baseline you can't separate censorship from a\nbroken uplink, so the summary becomes \"Inconclusive\".\n\n## Privacy and threat model\n\n`rkn-check` is a diagnostic tool, not a circumvention tool. But the\npeople running it are typically already under network surveillance of\nsome kind, so the defaults are chosen to minimize the footprint a single\nrun leaves behind.\n\n**User-Agent.** The default UA is a generic Chrome-on-Windows string with\nthe full set of browser-like headers (`Accept`, `Accept-Language`,\n`Sec-Fetch-*`, etc.). The earlier `Mozilla/5.0 (RKN-Checker)` default was\nunique enough to fingerprint a tool run in any logs along the path -\nincluding, in some jurisdictions, VPN-provider logs that get handed to\nregulators on request. A generic UA blends the request in with normal\ntraffic. If you *want* to be seen as diagnostic tooling - for example\nwhen probing infrastructure you control - pass `--identify` to switch to\na self-identifying UA (`rkn-block-checker/<ver>`).\n\n**Public-IP lookup.** By default the tool fetches your IP/ISP/location\nfrom `ipinfo.io` and prints it at the top of the report. This is purely\nfor the human reading the report - the diagnosis itself doesn't depend\non it. Pass `--no-self-info` to skip that lookup entirely; that's also\nthe right thing to do in cron scripts and in CI.\n\n**No telemetry.** The tool doesn't phone home. The only outbound\nconnections are: the per-target probes you asked for, the DoH lookup to\n`cloudflare-dns.com` (always on - it's the control side of the DNS\ncomparison), and the optional `ipinfo.io` lookup unless you disabled it.\n\n**No exfil of probe results.** Results are printed to stdout. They go\nnowhere else.\n\n## JSON output\n\n`--json` emits a single object containing `self_info` (the IP/ISP block\nfrom the header, or `null` if `--no-self-info` is set) and the result\nlists. Every result is the full per-target probe trace - which DNS\nresolvers returned what, whether TCP and TLS succeeded with timings, the\nHTTP status, the verdict, the confidence level, and human-readable notes.\n\nA trimmed sample (full version: [`docs/sample-output.json`](docs/sample-output.json)):\n\n```json\n{\n  \"self_info\": {\n    \"ip\": \"95.165.xxx.xxx\",\n    \"city\": \"Moscow\",\n    \"country\": \"RU\",\n    \"org\": \"AS12389 Rostelecom\"\n  },\n  \"whitelist\": [\n    {\n      \"name\": \"gosuslugi\",\n      \"url\": \"https://www.gosuslugi.ru/\",\n      \"verdict\": \"OK\",\n      \"confidence\": \"HIGH\",\n      \"notes\": [],\n      \"sys_ip\": \"95.181.182.36\",\n      \"doh_ip\": \"95.181.182.36\",\n      \"sys_ips\": [\"95.181.182.36\"],\n      \"doh_ips\": [\"95.181.182.36\"],\n      \"dns_mismatch\": false,\n      \"tcp_ok\": true,  \"tcp_time_ms\": 18.4,\n      \"tls_ok\": true,  \"tls_time_ms\": 42.1,\n      \"tls_cert_cn\": \"*.gosuslugi.ru\",\n      \"status_code\": 200, \"plt_ms\": 380.7\n    }\n  ],\n  \"blacklist\": [\n    {\n      \"name\": \"instagram\",\n      \"url\": \"https://www.instagram.com/\",\n      \"verdict\": \"TLS_BLOCK\",\n      \"confidence\": \"MEDIUM\",\n      \"notes\": [\"TLS reset right after ClientHello - consistent with SNI-based DPI filtering\"],\n      \"tcp_ok\": true,  \"tcp_time_ms\": 22.4,\n      \"tls_ok\": false, \"tls_error\": \"connection reset during TLS\"\n    },\n    {\n      \"name\": \"protonvpn\",\n      \"url\": \"https://protonvpn.com/\",\n      \"verdict\": \"DNS_BLOCK\",\n      \"confidence\": \"HIGH\",\n      \"notes\": [\"system DNS doesn't resolve, DoH does - consistent with DNS poisoning\"],\n      \"sys_ip\": null, \"doh_ip\": \"185.70.40.182\",\n      \"sys_ips\": [], \"doh_ips\": [\"185.70.40.182\"],\n      \"dns_error\": \"system resolver failed, DoH succeeded\",\n      \"tcp_ok\": false\n    }\n  ]\n}\n```\n\n`sys_ip` / `doh_ip` carry the lowest-sorted address from each set for\nbackward compatibility; `sys_ips` / `doh_ips` carry the full sorted\nlists. The probe trace fields are always present so you can tell *why* a\nverdict was reached - a `TLS_BLOCK` with `tcp_ok: true` is the DPI-on-SNI\nsignature; one with `tcp_ok: false` would mean something else failed\nfirst.\n\n## Custom target lists\n\n`--white-file` and `--black-file` accept either JSON or plain text. The\nformat is picked by file extension (`.json` → JSON, anything else → text).\n\n**JSON format** - a flat object mapping name to URL:\n\n```json\n{\n  \"google\":   \"https://google.com\",\n  \"github\":   \"https://github.com\",\n  \"rutracker\": \"https://rutracker.org\"\n}\n```\n\n**Text format** - one entry per line. Three forms are accepted:\n\n```text\n# bare URL - name auto-derived from the hostname\nhttps://example.com\n\n# name<whitespace>URL\ngithub https://github.com\n\n# name=URL\ncustom=https://example.org\n\n# blank lines and #-comments are skipped\n```\n\nURLs without a scheme get `https://` prepended. Duplicate names overwrite\n(with a warning logged); use unique names if both should be probed.\n\n## Install\n\nPython 3.10+.\n\nFrom PyPI:\n\n```bash\npip install rkn-block-checker\n```\n\nFrom source:\n\n```bash\ngit clone https://github.com/MayersScott/rkn-block-checker.git\ncd rkn-block-checker\npip install -e .\n```\n\nFor development (adds pytest and friends):\n\n```bash\npip install -e \".[dev]\"\n```\n\n## Layout\n\n```text\nrkn_checker/\n  __main__.py     # python -m rkn_checker\n  cli.py          # argparse + entry point\n  core.py         # orchestrates DNS -> TCP -> TLS -> HTTP\n  dns.py          # system resolver + Cloudflare DoH (full address sets)\n  network.py      # raw TCP and TLS probes\n  http.py         # HTTP GET, header set, stub-page detection\n  output.py       # colored CLI report\n  lists.py        # parser for user-supplied target files\n  targets.py      # built-in whitelist, blacklist, stub markers\n  models.py       # CheckResult, Verdict, Confidence\ntests/            # pytest, all network calls mocked\n```\n\n## Tests\n\n```bash\npip install -e \".[dev]\"\npytest\n```\n\nNo network calls in the test suite - every probe is mocked, so it runs\nthe same in CI, on a plane, or behind a corporate proxy.\n\n## Releasing\n\nReleases are pushed to PyPI automatically by the `release.yml` workflow\nwhen a `v*` tag is pushed. The workflow uses\n[PyPI Trusted Publishing](https://docs.pypi.org/trusted-publishers/) - no\nAPI token in repo secrets.\n\nTo ship a new version:\n\n```bash\n# bump version in pyproject.toml first, commit\ngit tag v0.3.4\ngit push origin v0.3.4\n```\n\nThe workflow checks that the tag matches `pyproject.toml`'s version,\nbuilds sdist + wheel, runs `twine check --strict`, publishes to PyPI,\nand attaches the artifacts to a GitHub Release with auto-generated\nnotes.\n\n## Caveats\n\n- IPv4 only. Some Russian ISPs treat IPv6 differently (often less\n  filtered) but the v4 path is what users actually experience in\n  practice.\n- The built-in target lists are small (~20 sites per category). That's\n  enough for a verdict but won't catch a block that affects only one\n  specific resource. Use `--url` for ad-hoc checks or `--white-file` /\n  `--black-file` for your own lists.\n- One-shot snapshot, no retries, no longitudinal tracking. If you want\n  to monitor a connection over time, run `rkn-check --json` from cron\n  and store the snapshots.\n- Stub markers are mostly Russian-language phrases narrowed enough to\n  avoid false positives on unrelated articles that happen to mention\n  Roskomnadzor. New patterns get added when reported.\n\n## Acknowledgements\n\nThis project was significantly improved by people who looked at the code\ncritically and reported issues with concrete reproductions. Listed in the\norder their contributions landed:\n\n- [@vladon](https://github.com/vladon) - security holes, misclassifications\n  and edge case fixes ([#1](https://github.com/MayersScott/rkn-block-checker/pull/1)):\n  silent DNS pipeline failures, TLS misclassifications, narrowed stub markers,\n  validation, `--no-self-info` flag, and four new test files.\n- [@easymoney322](https://github.com/easymoney322) - flagged the unique-UA\n  fingerprinting risk\n  ([#2](https://github.com/MayersScott/rkn-block-checker/issues/2)). The\n  threat model around VPN-provider logs was the right one to raise; led to\n  the generic Chrome UA default and the `--identify` opt-in.\n- [@rlobanov](https://github.com/rlobanov) - pointed out that ad-hoc URL\n  checking required editing source files\n  ([#4](https://github.com/MayersScott/rkn-block-checker/issues/4)); led to\n  the `--url` flag (repeatable) for one-shot probes without touching the\n  built-in lists.\n- [@AndreyKopeyko](https://github.com/AndreyKopeyko) - caught a real false\n  positive in DNS rewriting detection on multi-A-record sites\n  ([#5](https://github.com/MayersScott/rkn-block-checker/issues/5)). The\n  reproduction with `host(1)` made the bug obvious; led to set-based DNS\n  comparison that only flags rewriting when the address sets are completely\n  disjoint.\n- [@tagantank](https://github.com/tagantank) — Docker / Compose support\n  ([#3](https://github.com/MayersScott/rkn-block-checker/pull/3)) so the\n  tool can be run without touching the host's Python environment.\n\nIf you spot something off, open an issue with a reproduction - that's the\nsingle most useful thing you can do.\n\n## License\n\nMIT.","summary":"RKN Block Checker is a lightweight Python CLI that determines whether the connection you are using falls under RKN/TSPU censorship and identifies the specific block type—such as DNS poisoning, TCP resets, TLS DPI, or ISP stub pages—by probing a built‑in list of sites. It dissects each failure layer by layer, assigns confidence levels to the diagnosis, and outputs a concise health report along with a summary of the overall zone status. Users can run it with a single command (`pip install rkn-block-checker && rkn-check`) to get instant, layer‑specific diagnostics without any configuration. The tool is especially useful for researchers, VPN developers, or anyone needing to pinpoint the cause of a blocked site in order to choose an appropriate circumvention method or report the issue accurately.","description":"Diagnose RKN/TSPU internet blocks layer by layer (DNS, TCP, TLS, HTTP)","stars":756,"language":"Python"},{"owner":"ciembor","repo":"agent-rules-books","url":"https://github.com/ciembor/agent-rules-books","readme":"\n# 📚 AI AGENTS Rules from Programming Books <a href=\"CHANGELOG.md\"><img align=\"right\" src=\"https://img.shields.io/badge/version-v0.5-blue?style=for-the-badge\" alt=\"Version v0.5\" height=\"48\"></a>\n\n### AGENTS.md rules / skills for Codex, Cursor, Claude Code, distilled from classic software engineering books about refactoring, architecture, DDD and code quality.\n\n![AGENTS Book Rules](books-ai-rules.png)\n\nMIT licensed universal project rules for coding agents.\n\nThis repository contains ready-to-use rule sets inspired by well-known books on software design, architecture, refactoring, legacy code, reliability, and data-intensive systems.\n\nFor editor-specific setup in Codex, Claude Code, and Cursor, see [USAGE.md](USAGE.md). It covers always-on vs on-demand usage, skills, scoped rules, MCP or RAG patterns, and the preferred setup for each editor.\n\nEach rule set is released in three tool-agnostic Markdown versions:\n\n- `mini`: the recommended version for most real task use\n- `nano`: the compact fallback for very tight context budgets\n- `full`: the canonical complete source and reference version\n\nFor constructive criticism from Reddit, see [CRITICISM.md](CRITICISM.md).\n\nFor release history, see [CHANGELOG.md](CHANGELOG.md).\n\n## Release Matrix\n\nMetrics:\n\n- `lines`: physical line count from `wc -l`\n- `rules`: Markdown list items counted with the deterministic release convention\n- `size`: raw bytes from `wc -c`\n\n| Rule Set | Full file | Full lines | Full rules | Full size | Mini file | Mini lines | Mini rules | Mini size | Nano file | Nano lines | Nano rules | Nano size |\n| --- | --- | ---: | ---: | ---: | --- | ---: | ---: | ---: | --- | ---: | ---: | ---: |\n| [A Philosophy of Software Design](a-philosophy-of-software-design/) | [full](a-philosophy-of-software-design/a-philosophy-of-software-design.md) | 370 | 177 | 13561 B | [mini](a-philosophy-of-software-design/a-philosophy-of-software-design.mini.md) | 46 | 28 | 5774 B | [nano](a-philosophy-of-software-design/a-philosophy-of-software-design.nano.md) | 35 | 17 | 2258 B |\n| [Clean Architecture](clean-architecture/) | [full](clean-architecture/clean-architecture.md) | 515 | 289 | 17782 B | [mini](clean-architecture/clean-architecture.mini.md) | 49 | 31 | 5486 B | [nano](clean-architecture/clean-architecture.nano.md) | 36 | 18 | 2254 B |\n| [Clean Code](clean-code/) | [full](clean-code/clean-code.md) | 297 | 220 | 13851 B | [mini](clean-code/clean-code.mini.md) | 47 | 29 | 3804 B | [nano](clean-code/clean-code.nano.md) | 32 | 14 | 1235 B |\n| [Code Complete](code-complete/) | [full](code-complete/code-complete.md) | 354 | 180 | 12407 B | [mini](code-complete/code-complete.mini.md) | 56 | 38 | 6717 B | [nano](code-complete/code-complete.nano.md) | 41 | 23 | 2544 B |\n| [Designing Data-Intensive Applications](designing-data-intensive-applications/) | [full](designing-data-intensive-applications/designing-data-intensive-applications.md) | 393 | 205 | 16084 B | [mini](designing-data-intensive-applications/designing-data-intensive-applications.mini.md) | 55 | 37 | 6949 B | [nano](designing-data-intensive-applications/designing-data-intensive-applications.nano.md) | 34 | 16 | 2575 B |\n| [Domain-Driven Design](domain-driven-design/) | [full](domain-driven-design/domain-driven-design.md) | 979 | 523 | 42424 B | [mini](domain-driven-design/domain-driven-design.mini.md) | 48 | 30 | 5683 B | [nano](domain-driven-design/domain-driven-design.nano.md) | 39 | 21 | 2266 B |\n| [Domain-Driven Design Distilled](domain-driven-design-distilled/) | [full](domain-driven-design-distilled/domain-driven-design-distilled.md) | 317 | 158 | 11351 B | [mini](domain-driven-design-distilled/domain-driven-design-distilled.mini.md) | 56 | 38 | 6438 B | [nano](domain-driven-design-distilled/domain-driven-design-distilled.nano.md) | 41 | 23 | 2535 B |\n| [Implementing Domain-Driven Design](implementing-domain-driven-design/) | [full](implementing-domain-driven-design/implementing-domain-driven-design.md) | 337 | 177 | 12848 B | [mini](implementing-domain-driven-design/implementing-domain-driven-design.mini.md) | 57 | 39 | 7333 B | [nano](implementing-domain-driven-design/implementing-domain-driven-design.nano.md) | 37 | 19 | 2723 B |\n| [Patterns of Enterprise Application Architecture](patterns-of-enterprise-application-architecture/) | [full](patterns-of-enterprise-application-architecture/patterns-of-enterprise-application-architecture.md) | 404 | 196 | 15501 B | [mini](patterns-of-enterprise-application-architecture/patterns-of-enterprise-application-architecture.mini.md) | 54 | 36 | 8099 B | [nano](patterns-of-enterprise-application-architecture/patterns-of-enterprise-application-architecture.nano.md) | 35 | 17 | 2823 B |\n| [Refactoring](refactoring/) | [full](refactoring/refactoring.md) | 433 | 242 | 17866 B | [mini](refactoring/refactoring.mini.md) | 49 | 31 | 5167 B | [nano](refactoring/refactoring.nano.md) | 37 | 19 | 1986 B |\n| [Release It!](release-it/) | [full](release-it/release-it.md) | 382 | 204 | 13542 B | [mini](release-it/release-it.mini.md) | 48 | 30 | 6372 B | [nano](release-it/release-it.nano.md) | 38 | 20 | 2205 B |\n| [The Pragmatic Programmer](the-pragmatic-programmer/) | [full](the-pragmatic-programmer/the-pragmatic-programmer.md) | 359 | 179 | 13398 B | [mini](the-pragmatic-programmer/the-pragmatic-programmer.mini.md) | 65 | 47 | 7165 B | [nano](the-pragmatic-programmer/the-pragmatic-programmer.nano.md) | 44 | 26 | 2263 B |\n| [Working Effectively with Legacy Code](working-effectively-with-legacy-code/) | [full](working-effectively-with-legacy-code/working-effectively-with-legacy-code.md) | 371 | 193 | 13817 B | [mini](working-effectively-with-legacy-code/working-effectively-with-legacy-code.mini.md) | 50 | 32 | 5707 B | [nano](working-effectively-with-legacy-code/working-effectively-with-legacy-code.nano.md) | 35 | 17 | 1792 B |\n| [Refactoring.Guru](refactoring-guru/) | [full](refactoring-guru/refactoring-guru.md) | 765 | 478 | 62561 B | [mini](refactoring-guru/refactoring-guru.mini.md) | 64 | 46 | 6287 B | [nano](refactoring-guru/refactoring-guru.nano.md) | 41 | 23 | 2593 B |\n\n## Books\n\n### [A Philosophy of Software Design](https://www.goodreads.com/book/show/39996759-a-philosophy-of-software-design)\n\nAuthor: [John Ousterhout](https://web.stanford.edu/~ouster/cgi-bin/home.php)\n\nThe book focuses on fighting complexity through deep modules, simple interfaces, information hiding, and design choices that reduce cognitive load. This rule set is especially useful for API design, module design, and refactoring shallow abstractions.\n\n### [Clean Architecture](https://www.goodreads.com/book/show/18043011-clean-architecture)\n\nAuthor: [Robert C. Martin](https://cleancoder.com/)\n\nThe book describes designing systems around stable boundaries, the dependency rule, and the separation of business policies from details such as frameworks, databases, and UI. This rule set helps keep code resistant to technology churn.\n\n### [Clean Code](https://www.goodreads.com/book/show/3735293-clean-code)\n\nAuthor: [Robert C. Martin](https://cleancoder.com/)\n\nThe book focuses on readability, naming, small functions, responsibilities, tests, and simplicity. This rule set is a strong default for everyday coding and code review.\n\n### [Code Complete](https://www.goodreads.com/book/show/4845.Code_Complete)\n\nAuthor: [Steve McConnell](https://www.construx.com/about-us/our-experts/steve-mcconnell/)\n\nThe book covers a broad range of software construction practices: routine design, variables, classes, control flow, defensive programming, coding standards, and testing. This rule set helps agents make disciplined implementation decisions.\n\n### [Designing Data-Intensive Applications](https://www.goodreads.com/book/show/23463279-designing-data-intensive-applications)\n\nAuthor: [Martin Kleppmann](https://martin.kleppmann.com/)\n\nThe book covers reliability, scalability, consistency, replication, partitioning, transactions, data streams, and schema evolution. This rule set is intended for systems where data ownership, event flows, and consistency semantics matter.\n\n### [Domain-Driven Design](https://www.goodreads.com/en/book/show/179133)\n\nAuthor: [Eric Evans](https://domainlanguage.com/)\n\nThe book introduces domain modeling, ubiquitous language, bounded contexts, tactical patterns, and strategic design. This rule set helps agents think in terms of the business model rather than tables, controllers, or DTOs.\n\n### [Domain-Driven Design Distilled](https://www.goodreads.com/book/show/28602719-domain-driven-design-distilled)\n\nAuthor: [Vaughn Vernon](https://vaughnvernon.com/)\n\nThe book is a short, practical introduction to DDD. It focuses on subdomains, bounded contexts, context mapping, and basic tactical patterns. This rule set is a good fit when you want the benefits of DDD without excessive ceremony.\n\n### [Implementing Domain-Driven Design](https://www.goodreads.com/book/show/18396266-implementing-domain-driven-design)\n\nAuthor: [Vaughn Vernon](https://vaughnvernon.com/)\n\nThe book shows how to apply DDD in real systems: aggregates, domain events, contexts, integrations, and application architecture. This rule set is more implementation-focused than `domain-driven-design-distilled`.\n\n### [Patterns of Enterprise Application Architecture](https://www.goodreads.com/en/book/show/70156.Patterns_of_Enterprise_Application_Architecture)\n\nAuthor: [Martin Fowler](https://martinfowler.com/)\n\nThe book catalogues enterprise application patterns: layers, service layer, transaction script, domain model, data mapper, repository, unit of work, identity map, DTO, and integration patterns. This rule set helps choose an appropriate pattern instead of mixing responsibilities accidentally.\n\n### [Refactoring](https://www.goodreads.com/book/show/44936.Refactoring)\n\nAuthor: [Martin Fowler](https://martinfowler.com/)\n\nThe book describes safe ways to improve code structure without changing observable behavior. This rule set emphasizes small steps, tests, code smell detection, and keeping refactoring separate from feature changes.\n\n### [Refactoring.Guru](https://refactoring.guru/refactoring)\n\nSource: [Refactoring.Guru](https://refactoring.guru/)\n\nThe site provides a practical refactoring process, code smell catalog, and catalog of refactoring techniques. This rule set is useful when an agent needs to diagnose smells, choose a safe treatment, preserve behavior, and stop before cleanup turns into uncontrolled redesign.\n\n### [Release It!](https://www.goodreads.com/en/book/show/1069827.Release_It_)\n\nAuthor: [Michael T. Nygard](https://www.michaelnygard.com/)\n\nThe book focuses on systems that survive production reality: failures, overload, timeouts, retries, circuit breakers, bulkheads, backpressure, observability, and deployment behavior. This rule set is useful for services, APIs, queues, integrations, and critical production paths.\n\n### [The Pragmatic Programmer](https://www.goodreads.com/book/show/50701156)\n\nAuthors: [Andrew Hunt](https://toolshed.com/), [David Thomas](https://pragdave.me/)\n\nThe book describes a pragmatic approach to software development: responsibility, DRY at the knowledge level, orthogonality, automation, fast feedback, prototyping, and adaptability. This rule set works well as a general engineering layer.\n\n### [Working Effectively with Legacy Code](https://www.goodreads.com/book/show/44919.Working_Effectively_with_Legacy_Code)\n\nAuthor: [Michael Feathers](https://www.r7krecon.com/)\n\nThe book explains how to safely change difficult, poorly tested code: characterization tests, seams, dependency breaking, sprout method, wrap method, and incremental risk reduction. This rule set is best for legacy work where the first goal is regaining control.\n\n## Choosing Rules\n\nChoose rules based on the task:\n\n- everyday code quality: `clean-code`, `code-complete`\n- architecture and boundaries: `clean-architecture`, `domain-driven-design`, `patterns-of-enterprise-application-architecture`\n- domain modeling: `domain-driven-design`, `domain-driven-design-distilled`, `implementing-domain-driven-design`\n- refactoring: `refactoring`, `a-philosophy-of-software-design`, `refactoring-guru`\n- legacy code: `working-effectively-with-legacy-code`, optionally `refactoring`\n- production systems: `release-it`\n- data systems: `designing-data-intensive-applications`\n- general engineering style: `clean-code`, `code-complete`, `the-pragmatic-programmer`\n\nCheck rules compatibility in the [COMPATIBILITY.md](/COMPATIBILITY.md).\n\n## Adding a Book\n\nUse lowercase kebab-case for the book directory name.\n\nWorkflow:\n\n1. Ask the chatbot for the complete book outline: every chapter, every section inside each chapter, and every operational rule stated or strongly implied by each section.\n2. Ask the chatbot to expand the extraction until nothing material is missing. In particular, recover non-negotiable rules, tradeoff rules, trigger rules, anti-patterns, review and testing guidance, and any “when uncertain” guidance.\n3. Ask the chatbot to produce a full `AGENTS.md` in this repository's `full` standard, not a loose summary. It should preserve the book's structure and distinctive bias, express obligations as `MUST`, strong defaults as `SHOULD`, prohibitions as `MUST NOT`, and keep anti-patterns explicit.\n4. Review the generated `AGENTS.md` before importing it. Check that no important local discipline was flattened into generic advice, that modal strength matches the book's intent, and that the chatbot did not invent unsupported rules.\n5. Move the approved file to `_rule-workbench/<book-name>/full.md`.\n6. Ask the chatbot to run the workflow from [_rule-workbench/PROCESS.md](/Users/maciej/Projects/AGENTS/_rule-workbench/PROCESS.md:1) for that book.\n7. Ask the chatbot to execute the release instructions from [_rule-workbench/RELEASE.md](/Users/maciej/Projects/AGENTS/_rule-workbench/RELEASE.md:1).\n\n## Important Note\n\nThese rules are inspired by the books listed above. They are not official materials from the authors or publishers, and they are not a substitute for reading the books.\n\nThe files in this repository are practical engineering instructions written for AI coding tools. They intentionally avoid reproducing book text. Use them as lightweight working agreements, not as summaries or study notes.\n\n## Related searches\n\n**AI coding agent rules**, **AGENTS.md** examples, Claude Code rules, Cursor rules, Codex rules, GitHub Copilot custom instructions, **CLAUDE.md**, software engineering **rules for AI coding** assistants, Clean Code rules for AI, **Refactoring** rules for AI agents, **Domain-Driven Design rules**, Clean **Architecture rules**.\n\n## License\n\nThe code and rules in this repository are released under the MIT License.\n\nSee [LICENSE](LICENSE) for details.\n\n## Author\n\n[Maciej Ciemborowicz](https://maciej-ciemborowicz.eu)\n","summary":"This project delivers curated rule sets distilled from classic software‑engineering books for use with AI coding assistants such as Codex, Cursor, and Claude Code. It offers the same content in three Markdown variants—full, mini, and nano—to accommodate varying context budgets while retaining the core guidance on refactoring, architecture, DDD, and data‑intensive design. The bundled “AGENTS.md” files come with editor‑specific usage instructions and are MIT‑licensed, making them ready to drop into any LLM‑powered IDE. Developers, technical writers, and teams building AI‑augmented coding workflows will gain immediate, book‑grounded rules to enforce coding standards and best practices.","description":"AGENTS.md rules for AI coding agents: Codex, Cursor & Claude Code. Inspired by Clean Code, Refactoring, DDD, Clean Architecture and DDIA programming books.","stars":1203,"language":null},{"owner":"ps5-linux","repo":"ps5-linux-loader","url":"https://github.com/ps5-linux/ps5-linux-loader","readme":"# ps5-linux\n\n**ps5-linux** leverages a patched HV vulnerability to transform your PS5 Phat console running **3.xx or 4.xx firmwares** into a highly capable Linux PC, unlocking its full hardware potential for desktop use. Powered by 8 CPU cores (16 threads) at **3.5 GHz** and a GPU at **2.23 GHz**, it provides enough performance to run Steam games and various emulators with impressive fluidity. It supports HDMI 4K60 video and audio output. Furthermore, it allows you to utilize an **M.2 SSD** as a dedicated Linux partition, as well as all USB ports on the console.\n\n![Alt Text](logo.webp)\n\n## PS5 firmware\n\n*ps5-linux* is currently only supported on PS5 Phat on 3.xx and 4.xx firmwares.\n\n- **3.00**, **3.10**, **3.20**, **3.21**, without M.2 support\n- **4.00**, **4.02**, **4.03**, **4.50**, **4.51** with M.2 support\n\nSupport for 1.xx and 2.xx firmwares may be added in the future, but we will not prioritize this effort.\n\nSupport for 5.xx firmwares may be added in the future, but for those firmwares, Linux will run within the GameOS VM, thus it will have less features (still unknown what limitations there will be) and it may not perform as good.\n\nIf you want to update to a specific firmware, [download the correct PUP](https://darthsternie.net/ps5-firmwares/) and follow the [official guide](https://www.playstation.com/en-us/support/hardware/reinstall-playstation-system-software-safe-mode) to upgrade your PS5.\n\n## Hardwares\n\nTo run *ps5-linux*, you need some required and optional hardwares:\n\n- **Required**: USB drive with minimum 64GB (ideally external SSD) to install and run Linux.\n- **Required**: USB Ethernet/WLAN adapter for internet access.\n- **Required**: USB keyboard/mouse (dongles supported too).\n- *Optional*: M.2 SSD compatible on PS5 (see [official guide](https://www.playstation.com/en-us/support/hardware/ps5-install-m2-ssd)) to run Linux from SSD.\n- *Optional*: Bluetooth dongle to connect with PS5 DualSense controller.\n\n\n## Configure PS5 settings\n\n- **Required**: Enable Rest Mode features:\n  - Go to `Settings` → `System` → `Power Saving` → `Features Available in Rest Mode` and set `Supply Power to USB Ports` to `Always`.\n- **Required**: Disable HDMI Device Link:\n  - Go to `Settings` → `HDMI` → `Enable HDMI Device Link`\n- *Recommended*: Disable automatic updates:\n  - Go to `Settings` → `System Software` → `System Software Update and Settings`\n- *Recommended*: Disable automatic error reporting:\n  - Go to `Settings` → `System Software` → `Report System Software Errors Automatically`\n\n## Installation\n\n### 1. Get a Linux image\n\n#### Linux/macOS:\n\nInstall docker:\n\n```bash\nsudo apt update\nsudo apt install docker.io -y\nsudo service docker start\nsudo usermod -aG docker $USER\n```\n\nRestart the terminal.\n\n```bash\ngit clone https://github.com/ps5-linux/ps5-linux-image\ncd ps5-linux-image\nchmod +x ./build_image.sh\n./build_image.sh --distro ubuntu2604\n```\n\n#### Windows (WSL2):\n\nIf WSL2 is not installed yet, run this in PowerShell or CMD as administrator, then restart:\n\n```bash\nwsl --install\n```\n\nThen open WSL and set up Docker:\n\n```bash\nsudo apt update\nsudo apt install docker.io -y\nsudo service docker start\nsudo usermod -aG docker $USER\n```\n\nRestart WSL from PowerShell/CMD:\n\n```bash\nwsl --shutdown\n```\n\nThen clone and build:\n\n```bash\ncd ~/\ngit clone https://github.com/ps5-linux/ps5-linux-image\ncd ps5-linux-image\nchmod +x ./build_image.sh\n./build_image.sh --distro ubuntu2604\n```\n\nThe finished image is written to `output/ps5-ubuntu2604.img`.\n\n### 2. Flash the image to USB\nMinimum drive size: 64 GB. An external SSD is strongly recommended.\n\n#### Linux/macOS:\n\n```bash\n# check drive name with lsblk / diskutil list\nsudo dd if=output/ps5-ubuntu2604.img of=/dev/sdX bs=4M status=progress conv=fsync\n```\n\n#### Windows (Balena Etcher):\n\nDownload [Balena Etcher](https://etcher.balena.io/), select the .img file, select your USB drive, click Flash.\n\n### 3. Plug the USB drive into your PS5\n\nThe following USB ports are supported for booting:\n\n- Front bottom Type-C port\n- Rear Type-A ports\n\nThe front top Type-A port is USB 2.0 which is slower and thus not recommended.\n\n### 4. Run the jailbreak exploit\n\n1. Clone https://github.com/idlesauce/umtx2\n2. Configure fakedns via `dns.conf` to point `manuals.playstation.net` to your PCs IP address\n3. Run fake dns: `python fakedns.py -c dns.conf`\n4. Run HTTPS server: `python host.py`\n5. Go into PS5 advanced network settings and set primary DNS to your PCs IP address and leave secondary at `0.0.0.0`\n6. Go to user manual in settings and accept untrusted certificate prompt, run.\n\n#### 5. Send the payload\nEither download [ps5-linux-loader.elf](https://github.com/ps5-linux/ps5-linux-loader/releases/), or install [ps5-payload-sdk](https://github.com/ps5-payload-dev/sdk) and compile it yourself:\n\n```bash\ngit clone https://github.com/ps5-linux/ps5-linux-loader\ncd ps5-linux-loader\nmake\n```\n## Compiling on ARM64 Linux\n\nInstall the x86-64 cross-compilation tools before:\n\n```bash\nsudo apt install gcc-x86-64-linux-gnu binutils-x86-64-linux-gnu\n```\n\nFind your PS5 IP at `Settings → Network → View Connection Status`.\n\n```bash\nsocat -t 99999999 - TCP:192.168.178.127:9021 < ps5-linux-loader.elf\n```\n\nIf all is successful, the payload will automatically go into rest mode. Wait until the orange LED stops blinking and becomes static. Only then, press the power button again to boot your PS5 into Linux. If the boot is successful, **the LED should turn white**. If it boots back into PS5 OS, then it's because you pressed the power button too early. Or, you did not enable rest mode features as described above.\n\nIf the LED is white, but you still have a blackscreen then:\n\n- Try removing `video=DP-1:1920x1080@60` line in cmdline.txt.\n- Try different monitors or capture cards, ideally with different resolutions. Currently, some monitors have issues.\n- Try setting `amdgpu.force_1080p=1` in `cmdline.txt` in the FAT32 partition of the USB drive.\n\nIf none of this helps, please report the issue in our [Discord server](https://discord.gg/PeMGVB7BAm) and provide your EDID information.\n\n\n## First Boot\n\nConfigure your system and memorize your login password.\n\nThen, there are certain settings and commands we recommend doing:\n\n1. Disable screen saver, as it is currently buggy.\n\n2. Possibly, you have to disable and reenable your Wired/WLAN connection to get internet connection.\n\n3. Hold packages to prevent updating the kernel when doing `apt upgrade`:\n   ```bash\n   sudo apt-mark hold linux-generic linux-generic-hwe-24.04 linux-generic-hwe-26.04 linux-image-generic linux-image-generic-hwe-24.04 linux-image-generic-hwe-26.04 linux-headers-generic linux-headers-generic-hwe-24.04 linux-headers-generic-hwe-26.04\n   ```\n\n4. Install Firefox:\n\n   ```bash\n   sudo snap install firefox\n   ```\n\n5. Update mesa:\n\n   ```bash\n   sudo snap refresh mesa-2404 --channel=latest/edge\n   ```\n\n6. Clone our [ps5-linux-tools](https://github.com/ps5-linux/ps5-linux-tools):\n\n   ```bash\n   sudo apt install zlib1g-dev\n   git clone https://github.com/ps5-linux/ps5-linux-tools\n   cd ps5-linux-tools\n   make\n   ```\n\n## M.2 installation\n\nYou can use a M.2 SSD exclusively for Linux (which means you cannot use it for PS5 game storage).\n\n1. Attach the M.2 SSD by following the [official guide](https://www.playstation.com/en-us/support/hardware/ps5-install-m2-ssd).\n2. **VERY IMPORTANT**: If you used the M2. SSD for games before, reformat it on the PS5 under `Settings` → `Storage` → `M.2 SSD Storage`.\n3. Boot Linux on your PS5 and run these commands to initialize your M.2:\n\n```bash\ncd ps5-linux-tools\nsudo ./m2_init\n```\n\n4. Reboot via `sudo reboot`. If your PS5 asks you to format your M.2 again, please report this issue to us in our [Discord server](https://discord.gg/PeMGVB7BAm) and provide your M.2 model and storage size.\n5. Relaunch Linux on your PS5.\n6. Copy the `ps5-ubuntu2604.img` image that you built during installation or rebuild it on your PS5. Then, install it onto your M.2:\n\n```bash\ncd ps5-linux-tools\nchmod +x ./m2_install.sh\nsudo ./m2_install.sh --install $PATH_TO_YOUR_IMG\n```\n\nNow, you can boot into Linux on your M.2 via:\n\n```bash\ncd ps5-linux-tools\nchmod +x ./m2_exec.sh\nsudo ./m2_exec.sh\n```\n\nThen follow the same instructions again as the previous section.\n\nIn order to always boot Linux from your M.2, you can edit the label at `/boot/efi/cmdline.txt` from `root=LABEL=ubuntu2604` to `root=LABEL=ubuntu2604-m2`.\n\n## Fan & boost control\n\nWe provide a simple tool that allows you to boost your CPU to 3500Mhz and GPU to 2230MHz as well as changing the fan curve:\n\n```bash\ncd ps5-linux-tools\nsudo ./ps5_control --fan on\nsudo ./ps5_control --boost on\n```\n\nAlways turn on fan when your turn on boost, as this is what the official PS5 OS does.\n\n## FAQ\n\n- Q: Can I dual-boot Linux and PS5 OS?\n  - A: No, this is a soft-mod. You need to re-run the exploit in order to boot into Linux.\n- Q: Can I put Linux into standby and resume?\n  - A: No, this is not supported. We may however add a shutdown feature that puts your PS5 into rest-mode allowing you to relaunch Linux when powering up again.\n- Q: Can I continue using my PS5 if I install Linux?\n  - A: Yes, the internal SSD is not modified\n- Q: Can I use the PS5's NIC/WLAN module in Linux?\n  - A: In theory yes, but someone needs to write or adapt drivers to use them.\n- Q: Will higher >=6.xx firmwares be supported?\n  - A: No.\n- Q: Does the DualSense controller work?\n  - A: Via a Bluetooth dongle. Built-in Bluetooth is not yet supported.\n- Q: What resolutions and refresh rates are supported?\n  - A: 1080p, 1440p and 2160p at 60Hz are broadly supported. 1440p@120Hz has been the only confirmed working on the DELL S3225QC yet. 120Hz or 30Hz may be added in the future.\n\n\n## Tips and tricks\n\n- If you see graphical issues in your games, add the environment variable `RADV_DEBUG=nohiz` as [recommended for BC250](https://elektricm.github.io/amd-bc250-docs/drivers/environment/#critical-environment-variables) as well.\n- You can adjust the kernel cmdline in `cmdline.txt` in the FAT32 partition.\n- You can adjust the VRAM size in `vram.txt` in the FAT32 partition. By default, it uses 512MB (0x20000000) which enables [Dynamic VRAM allocation](https://elektricm.github.io/amd-bc250-docs/bios/flashing/#why-flash-the-bios).\n- Monitor hotswap may work, but it will not change resolution automatically.\n- Some monitors have a black screen if a video=DP-1: parameter is set in `cmdline.txt`. Confirmed working without `video=DP-1:1920x1080@60` on:\n  - MSI MAG274Q QD E2, DELL S2721DGF, DELL U2515H (1440p@60Hz)\n  - Possibly also: LG 27GL850, Lenovo Legion Y27q, ViewSonic Elite XG270QG\n\nMany configurations, tips and tricks from the [AMD BC250 Documentation](https://elektricm.github.io/amd-bc250-docs/) also apply to PS5.\n\n## Bugs\n\n- screen save does not work properly\n- hdmi audio output does not work on some monitors\n- hdmi 1440p and 2160p video output does not work on some monitors\n\n## Upstreamed changes\n\nDuring this project, we have upstreamed some changes:\n\n- [drm/amd: fix dcn 2.01 check](https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git/commit/drivers/gpu/drm/amd/display/dc?id=39f44f54afa58661ecae9c27e15f5dbce2372892)\n- [amd/addrlib: Add more GFX1013 GPUs](https://gitlab.freedesktop.org/mesa/mesa/-/commit/44bed00b8bbcb1825e2c920cf1a828efdc72b1f1)\n\n## Discord\n\nJoin our [Discord server](https://discord.gg/PeMGVB7BAm) to celebrate Linux on PS5, receive help, learn tips & tricks, join development, or report issues.\n\n## Credits\n\n- [theflow](https://github.com/TheOfficialFloW): [ps5-linux-loader](https://github.com/ps5-linux/ps5-linux-loader), [ps5-linux-patches](https://github.com/ps5-linux/ps5-linux-patches), [ps5-linux-tools](https://github.com/ps5-linux/ps5-linux-tools)\n- [c0w](https://github.com/c0w-ar): [ps5-linux-loader](https://github.com/ps5-linux/ps5-linux-loader)\n- [resulknad](https://github.com/resulknad): [ps5-linux-image](https://github.com/ps5-linux/ps5-linux-image)\n- [fail0verflow](https://github.com/fail0verflow): [prosperous](https://github.com/fail0verflow/prosperous)\n- [flatz](github.com/flatz): [HV exploit](https://gist.github.com/flatz/620ddda6d64acca6d1c990dc3080ac0e)\n- [cragson](https://github.com/cragson): [HV expoit implementation](https://github.com/cragson/ps5-hen)\n- [john-tornblom](https://github.com/john-tornblom): [PS5 SDK](https://github.com/ps5-payload-dev/sdk)\n- [echostretch](https://github.com/echostretch): Offsets and testing\n- [kirathenotebook](https://github.com/kirathenotebook): Betatesting and readme contribution\n- 15432: Tests on BC-250\n","summary":"ps5‑linux turns a PS5 Phat running firmware 3.xx or 4.xx into a fully‑functional Linux desktop by exploiting a patched HV vulnerability. It unlocks the console’s 8‑core, 3.5 GHz processor and 2.23 GHz GPU, allowing 4K60 HDMI video and audio, Steam gaming, emulation, and development workloads, all while supporting USB, Ethernet adapters, and an optional M.2 SSD as a Linux partition. The loader also provides a simple installer image that can be flashed to a 64 GB or larger USB drive or SSD, making the PS5 a portable Linux machine. This project appeals to console hacking enthusiasts, developers who need a powerful low‑cost Linux environment, and gamers who want to repurpose their PS5 as a dual‑boot workstation.","description":"Linux payload implementing the HV exploit and a custom bootloader","stars":1262,"language":"C"},{"owner":"VRSEN","repo":"OpenSwarm","url":"https://github.com/VRSEN/OpenSwarm","readme":"<div align=\"center\">\n\n# 🚀 OpenSwarm\n\n![OpenSwarm](assets/new-framework.jpg)\n\n</div>\n\n**The fully open-source multi-agent system that does everything Claude Code can't.**\n\nCreate polished slide decks, research reports, data visualizations, documents, images, and videos — all from a single prompt in your terminal. No platform, no UI, no setup hassles.\n\n✨ **One prompt → Complete deliverables**\n🎯 **8 specialized agents working together**\n⚡ **Install in 30 seconds, running in 60**\n🔧 **100% customizable and forkable**\n\nBuilt on [Agency Swarm](https://github.com/VRSEN/agency-swarm) — the framework powering real AI agencies.\n\n---\n\n> 💼 **Investor or looking to integrate AI agents into your SaaS?**\n> We're the team behind OpenSwarm and Agency Swarm, building the future of multi-agent systems.\n> **[Partner with us →](https://vrsen-ai.notion.site/fee2d391a8d74b24baa04a0b648af83c?pvs=105)**\n\n---\n\n## 💡 What Makes This Different?\n\nInstead of one agent trying to do everything poorly, you get **specialists coordinated by an orchestrator**.\n\n### 🎯 Real Examples\n\nPaste these into your terminal and watch magic happen:\n\n- **\"Create a complete investor pitch for OpenSwarm\"** → Full deck + executive summary + market research\n- **\"Research my top 5 competitors and write 3 SEO-optimized blog posts\"** → Competitive analysis + keyword research + publish-ready content\n- **\"Analyze this data and create a quarterly report with charts\"** → Data insights + visualizations + formatted document\n- **\"Generate a product launch video with animations\"** → Professional video with graphics and transitions\n- **\"Build me a marketing campaign for Q2\"** → Strategy doc + creative assets + implementation timeline\n\nConnect to 10,000+ external services (Gmail, Slack, GitHub, HubSpot) via Composio for even more power.\n\n---\n\n## 🤖 Meet Your AI Team\n\n| Agent                      | What it does                                                                                                                                                                                 |\n| -------------------------- | -------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- |\n| **Orchestrator**           | Routes every user request to the right specialist(s). Never answers directly — pure coordination.                                                                                            |\n| **Virtual Assistant**      | Handles everyday tasks: writing, scheduling, messaging, task management. Gains 10,000+ external integrations via [Composio](https://composio.dev) (Gmail, Slack, GitHub, HubSpot, and more). |\n| **Deep Research**          | Conducts comprehensive, evidence-based web research with citations and balanced analysis.                                                                                                    |\n| **Data Analyst**           | Analyses structured data, builds charts, runs statistical models — all inside an isolated IPython kernel.                                                                                    |\n| **Slides Agent**           | Generates complete, visually polished HTML slide decks, then exports them to PPTX.                                                                                                           |\n| **Docs Agent**             | Creates formatted Word documents and PDFs from outlines or raw content.                                                                                                                      |\n| **Image Generation Agent** | Generates and edits images using Gemini 2.5 Flash Image / Gemini 3 Pro Image and fal.ai.                                                                                                     |\n| **Video Generation Agent** | Produces videos via Sora (OpenAI), Veo (Google), and Seedance (fal.ai); also edits and combines clips.                                                                                       |\n\n---\n\n## 📦 Get Started in 30 Seconds\n\n**For most users (recommended):**\n\n```bash\nnpm install -g @vrsen/openswarm\nopenswarm\n```\n\nThat's it! The setup wizard handles everything: authentication, dependencies, and configuration.\n\n**Requirements:** Node.js 20+ (Python 3.10+ auto-installed)\n\n## 🔧 Build Your Own Swarm\n\nFork this repo and create your own specialized AI team in minutes:\n\n```bash\ngit clone https://github.com/VRSEN/openswarm.git\ncd openswarm\n```\n\nThen tell **Claude Code**, **Cursor**, or **Codex**:\n\n> _\"Turn this into an SEO optimization swarm\"_\n\nThey'll automatically customize all agents for your use case.\n\n**Popular custom swarms:**\n\n- **SEO Swarm:** Keyword research + competitor analysis + blog writing\n- **Sales Swarm:** Lead research + outreach + proposal generation\n- **Marketing Swarm:** Campaign planning + creative assets + analytics\n- **Product Swarm:** Market research + feature specs + launch materials\n\n## ⚙️ API Keys & Setup\n\nThe setup wizard walks you through everything, but you'll need at least one of these:\n\n**Required (choose one):**\n\n- `OPENAI_API_KEY` - For GPT 5.5 and Sora video generation\n- `ANTHROPIC_API_KEY` - For Claude models\n\n**Optional superpowers:**\n\n- `COMPOSIO_API_KEY` - Unlock 10,000+ integrations (Gmail, Slack, GitHub, etc.)\n- `GOOGLE_API_KEY` - Gemini image generation + Veo video\n- `FAL_KEY` - Advanced video editing and effects\n- `SEARCH_API_KEY` - Web search for research agent\n\nTools gracefully degrade when keys are missing — you'll get clear instructions on what to add.\n\n---\n\n## 🚀 Coming Soon\n\n- **Agent Builder Agent** - Create custom swarms from a single prompt\n- **OpenClaw + Claude Code integration** - All agents in one place\n\n⭐ **Star us on GitHub** to stay updated and help us prioritize features!\n\n## 🏗️ For Developers\n\n**Local development:**\n\n```bash\ngit clone https://github.com/VRSEN/openswarm.git\ncd openswarm\npython swarm.py\n```\n\n**Docker deployment:**\n\n```bash\ngit clone https://github.com/VRSEN/openswarm.git\ncd openswarm\ncp .env.example .env        # Add your API keys\ndocker-compose up --build\n```\n\n**API server:**\n\n```bash\npython server.py           # Runs on localhost:8080\n```\n\n---\n\n## 📺 Learn More\n\n- **Watch the full demo:** [YouTube video →](https://youtu.be/c5DdXzqaeVU?si=rM2CNaZ8qVwMvqmz)\n- **Multi-agent framework:** [Agency Swarm](https://github.com/VRSEN/agency-swarm)\n- **External integrations:** [Composio](https://composio.dev)\n\n---\n\n## 📄 License\n\nMIT — see [LICENSE](LICENSE).\n\n**Built with ❤️ by the team behind [Agency Swarm](https://github.com/VRSEN/agency-swarm)**\n","summary":"OpenSwarm is a fully open‑source multi‑agent framework that turns a single terminal prompt into complete deliverables—slide decks, research reports, data visualizations, documents, images, and videos—without any UI or complex setup. It runs eight specialist agents coordinated by an orchestrator, each handling tasks from research and data analysis to creative content generation, and can hook into over 10,000 external services via Composio for additional power. Developers, content marketers, analysts, and SaaS products looking to embed AI‑powered workflows can install and customize it in minutes, fork it freely, and extend it to fit their own pipelines. This
