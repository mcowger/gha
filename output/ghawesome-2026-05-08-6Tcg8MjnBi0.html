<script id="project-data" type="application/json">[{"owner":"strukto-ai","repo":"mirage","url":"https://github.com/strukto-ai/mirage","readme":"<p align=\"center\">\n  <img src=\"assets/mirage-og-light@2x.png\" alt=\"Mirage: A Unified Virtual File System for AI Agents\" width=\"900\">\n</p>\n\n<p align=\"center\">\n    <a href=\"https://docs.mirage.strukto.ai\" alt=\"Documentation\">\n        <img src=\"https://img.shields.io/badge/mirage-docs-0C0C0C?labelColor=FAFAFA\" /></a>\n    <a href=\"https://www.strukto.ai\" alt=\"Website\">\n        <img src=\"https://img.shields.io/badge/made by-strukto.ai-0C0C0C?labelColor=FAFAFA\" /></a>\n    <a href=\"https://github.com/strukto-ai/mirage/blob/main/LICENSE\" alt=\"License\">\n        <img src=\"https://img.shields.io/github/license/strukto-ai/mirage?color=0C0C0C&labelColor=FAFAFA\" /></a>\n    <a href=\"https://discord.gg/u8BPQ65KsS\" alt=\"Discord\">\n        <img src=\"https://img.shields.io/badge/discord-join-0C0C0C?labelColor=FAFAFA&logo=discord&logoColor=0C0C0C\" /></a>\n    <br/>\n    <a href=\"https://docs.mirage.strukto.ai/python/quickstart\" alt=\"Python docs\">\n        <img src=\"https://img.shields.io/badge/python-docs-0C0C0C?labelColor=FAFAFA&logo=python&logoColor=0C0C0C\" alt=\"Python docs\"></a>\n    <a href=\"https://pypi.org/project/mirage-ai/\" alt=\"PyPI Version\">\n        <img src=\"https://img.shields.io/pypi/v/mirage-ai.svg?color=0C0C0C&labelColor=FAFAFA\"/></a>\n    <br/>\n    <a href=\"https://docs.mirage.strukto.ai/typescript/quickstart\" alt=\"TypeScript docs\">\n        <img src=\"https://img.shields.io/badge/typescript-docs-0C0C0C?labelColor=FAFAFA&logo=typescript&logoColor=0C0C0C\" alt=\"TypeScript docs\"></a>\n    <a href=\"https://www.npmjs.com/package/@struktoai/mirage-node\" alt=\"NPM Version\">\n        <img src=\"https://img.shields.io/npm/v/@struktoai/mirage-node.svg?color=0C0C0C&labelColor=FAFAFA\"/></a>\n</p>\n\nMirage is **a Unified Virtual File System for AI Agents**: a single tree that mounts services and data sources like S3, Google Drive, Slack, Gmail, and Redis side-by-side as one filesystem.\n\nAI agents reach every backend with the same handful of Unix-like tools, and pipelines compose across services as naturally as on a local disk. It's a simulated environment, agents see one filesystem underneath. Any LLM that already knows bash can use Mirage out of the box, with zero new vocabulary.\n\n```ts\nconst ws = new Workspace({\n  '/data':   new RAMResource(),\n  '/s3':     new S3Resource({ bucket: 'logs' }),\n  '/slack':  new SlackResource({}),\n  '/github': new GitHubResource({}),\n})\n\nawait ws.execute('grep alert /slack/general/*.json | wc -l')\nawait ws.execute('cat /github/mirage/README.md')\nawait ws.execute('cp /s3/report.csv /data/local.csv')\n\n// Register a new command, available across every mount.\nws.command('summarize', ...)\n\n// Override a command for a specific resource + filetype —\n// `cat` on a Parquet file in /s3 renders rows as JSON instead of raw bytes.\nws.command('cat', { resource: 's3', filetype: 'parquet' }, ...)\n\nawait ws.execute('summarize /github/mirage/README.md')\nawait ws.execute('cat /s3/events/2026-05-06.parquet | jq .user')\n```\n\n## About\n\n- **One filesystem, every backend.** Every service speaks the same filesystem semantics, so agents reason about one abstraction instead of N SDKs and M MCPs, leaning on the filesystem and bash vocabulary LLMs are most fluent in.\n- **Multiple resources, one filesystem:** RAM, Disk, Redis, S3 / R2 / OCI / Supabase / GCS, Gmail / GDrive / GDocs / GSheets / GSlides, GitHub / Linear / Notion / Trello, Slack / Discord / Telegram / Email, MongoDB, SSH, and more, mounted side-by-side under a single root.\n- **Familiar bash tools across every mount.** Agents reuse the same handful of Unix-like tools instead of learning a new API per service, and pipelines compose across services as naturally as on a local disk, the exact corpus modern LLMs are most heavily trained on.\n- **Portable workspaces:** clone, snapshot, and version your environment. Move agent runs between machines without restarting or reconfiguring the system.\n- **Embed in your apps and services:** Python and TypeScript SDKs let you give your AI agents a virtual filesystem directly inside FastAPI, Express, browser apps, or any async runtime, no separate process required. Clone, snapshot, and version the workspace from inside your code.\n- **Works with major agent application frameworks:** OpenAI Agents SDK, Vercel AI SDK (TypeScript), LangChain, Pydantic AI, CAMEL, and OpenHands.\n- **Lightweight CLI + daemon:** plugs into coding agents like Claude Code and Codex so they reach every mounted resource through familiar bash, getting more useful work done per turn.\n\n## Architecture\n\n<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"assets/mirage-arch-dark.svg\">\n    <img src=\"assets/mirage-arch-light.svg\" alt=\"Mirage architecture: AI Agent and Application → Mirage Bash and VFS → Dispatcher &amp; Cache → Infrastructure and Remote\" width=\"900\">\n  </picture>\n</p>\n\n## Installation\n\n### Prerequisites\n\n- **Python** ≥ 3.12 for the `mirage-ai` package and the `mirage` CLI\n- **Node.js** ≥ 20 for the TypeScript SDK\n- **macOS** or **Linux** (FUSE-based mounts require platform support)\n\n### Python\n\n```bash\nuv add mirage-ai\n```\n\nThis installs both the `mirage` library and the `mirage` CLI binary.\n\n### TypeScript\n\nPick the package that matches your runtime:\n\n```bash\nnpm install @struktoai/mirage-node      # Node.js servers and CLIs\nnpm install @struktoai/mirage-browser   # browser / edge runtimes\nnpm install @struktoai/mirage-core      # runtime-agnostic primitives\n```\n\n`@struktoai/mirage-node` and `@struktoai/mirage-browser` both pull in `@struktoai/mirage-core` automatically.\n\n### CLI\n\n```bash\ncurl -fsSL https://strukto.ai/mirage/install.sh | sh\n```\n\nOr via your package manager of choice:\n\n```bash\nnpm install -g @struktoai/mirage-cli\n```\n\n```bash\nuvx mirage-ai\n```\n\n```bash\nnpx @struktoai/mirage-cli\n```\n\n## Quickstart (Python)\n\n```python\nfrom mirage import Workspace\nfrom mirage.resource.gdocs import GDocsConfig, GDocsResource\nfrom mirage.resource.ram import RAMResource\nfrom mirage.resource.s3 import S3Config, S3Resource\nfrom mirage.resource.slack import SlackConfig, SlackResource\n\nws = Workspace({\n    \"/data\":  RAMResource(),\n    \"/s3\":    S3Resource(S3Config(bucket=\"my-bucket\")),\n    \"/slack\": SlackResource(SlackConfig()),\n    \"/docs\":  GDocsResource(GDocsConfig()),\n})\n\nawait ws.execute(\"cp /s3/report.csv /data/report.csv\")\nawait ws.execute(\"grep alert /s3/data/log.jsonl | wc -l\")\n\nws.snapshot(\"demo.tar\")\n```\n\n## Quickstart (TypeScript)\n\n```ts\nimport {\n  Workspace,\n  RAMResource,\n  S3Resource,\n  SlackResource,\n  GDocsResource,\n} from '@struktoai/mirage-browser'\n\nconst ws = new Workspace({\n  '/data':  new RAMResource(),\n  '/s3':    new S3Resource({ bucket: 'my-bucket' }),\n  '/slack': new SlackResource({}),\n  '/docs':  new GDocsResource({}),\n})\n\nawait ws.execute('cp /s3/report.csv /data/report.csv')\nawait ws.execute('grep alert /s3/data/log.jsonl | wc -l')\n```\n\n## Quickstart (CLI)\n\n```bash\nmirage workspace create ws.yaml --id demo\nmirage execute   --workspace_id demo --command \"cp /s3/report.csv /data/report.csv\"\nmirage provision --workspace_id demo --command \"cat /s3/data/large.jsonl\"\nmirage workspace snapshot demo demo.tar\nmirage workspace load demo.tar --id demo-restored\n```\n\n## Agent Frameworks\n\nMirage drops into the major agent application frameworks as a sandbox or tool layer. Your agent runs against the same mount tree it would in bash, so swapping the model or runtime never changes the surface.\n\n### OpenAI Agents SDK (Python)\n\nThe `MirageSandboxClient` plugs a `Workspace` into the OpenAI Agents SDK as a sandbox: bash commands the agent runs execute against your mounts.\n\n```python\nfrom agents import Runner\nfrom agents.run import RunConfig\nfrom agents.sandbox import SandboxAgent, SandboxRunConfig\n\nfrom mirage.agents.openai_agents import MirageSandboxClient\n\nclient = MirageSandboxClient(ws)\nagent = SandboxAgent(\n    name=\"Mirage Sandbox Agent\",\n    model=\"gpt-5.4-nano\",\n    instructions=ws.file_prompt,\n)\n\nresult = await Runner.run(\n    agent,\n    \"Summarize /s3/data/report.parquet into /report.txt.\",\n    run_config=RunConfig(sandbox=SandboxRunConfig(client=client)),\n)\n```\n\n### Vercel AI SDK (TypeScript)\n\n`mirageTools(ws)` exposes the workspace as a typed AI SDK tool set, so any model wired into the AI SDK can read and write across mounts, in Node or the browser.\n\n```ts\nimport { generateText } from 'ai'\nimport { openai } from '@ai-sdk/openai'\nimport { mirageTools } from '@struktoai/mirage-agents/vercel'\nimport { buildSystemPrompt } from '@struktoai/mirage-agents/openai'\n\nconst { text } = await generateText({\n  model: openai('gpt-5.4-nano'),\n  system: buildSystemPrompt({ mountInfo: { '/': 'In-memory filesystem' } }),\n  prompt: \"Use readFile to read /docs/paper.pdf, then describe what's in it.\",\n  tools: mirageTools(ws),\n})\n```\n\nLangChain, Pydantic AI, CAMEL, OpenHands, and Mastra adapters live alongside these.\n\n## Cache\n\nEvery `Workspace` ships with a **two-layer cache** so repeated work against remote backends (S3, GDrive, Slack, …) hits local state instead of the network:\n\n- **Index cache.** Listings and metadata. The first directory walk hits the API; subsequent ones serve from the index until TTL expires.\n- **File cache.** Object bytes. The first read streams from origin; later pipelines read from cache.\n- **Pluggable backends.** Each layer is a store with two built-ins:\n  - **RAM** (default): in-process, zero setup, 512 MB file cache and 10-minute index TTL. Best for single-process apps and notebooks.\n  - **Redis**: shared across workers, processes, and machines. Best for serverless, multi-replica services, or when you want cache state to survive restarts.\n\n```ts\nimport { RedisFileCacheStore, RedisIndexCacheStore, Workspace } from 'mirage/node'\n\nconst ws = new Workspace(\n  { '/s3': new S3Resource({ bucket: 'my-bucket' }) },\n  {\n    cache: new RedisFileCacheStore({ url: 'redis://localhost:6379/0', limit: '8GB' }),\n    index: new RedisIndexCacheStore({ url: 'redis://localhost:6379/0', ttl: 600 }),\n  },\n)\n```\n\n```ts\nimport { S3Resource, Workspace } from 'mirage/node'\n\nconst ws = new Workspace({ '/s3': new S3Resource({ bucket: 'my-bucket' }) })\n\n// 1. Index miss → S3 LIST. Listing stored in index cache.\nawait ws.execute('ls /s3/data/')\n\n// 2. Index hit → 0 network calls.\nawait ws.execute('find /s3/data/ -name \"*.jsonl\"')\n\n// 3. File miss → S3 GET. Bytes stored in file cache.\nawait ws.execute('cat /s3/data/log.jsonl | wc -l')\n\n// 4. File hit → 0 network calls.\nawait ws.execute('grep alert /s3/data/log.jsonl')\n```\n","summary":"Mirage is a unified virtual filesystem that mounts a wide range of services—S3, Google Drive, Slack, Gmail, Redis, GitHub, and more—into one seamless tree. By exposing a Unix‑like set of commands (grep, cat, cp, etc.) across every mount, it lets LLM‑driven agents craft cross‑service pipelines without learning new APIs, allowing any model familiar with bash to use it immediately. Python and TypeScript SDKs let developers snapshot, clone, and move workspaces, making Mirage especially valuable for data‑science teams, AI researchers, and production environments that require smooth integration of heterogeneous back‑ends.","description":"A Unified Virtual Filesystem For AI Agents","stars":1377,"language":"TypeScript"},{"owner":"vercel-labs","repo":"deepsec","url":"https://github.com/vercel-labs/deepsec","readme":"# deepsec\n\n`deepsec` an agent-powered vulnerability scanner that you can run in your own infrastructure, optimized to perform on-demand review of all code in existing \nlarge-scale repos.\n\n`deepsec` is designed to surface hard-to-find issues that have been lurking in applications for a long time. It is configured to use the best models at maximum thinking levels, meaning scans can cost thousands or even tens-of-thousands of dollars for large codebases. Our customers have found the cost worth it for how quickly they were able to patch vulnerabilities that would have otherwise gone unfixed.\n\nFor large codebases, work fans out across worker machines in parallel.\nIf a run is interrupted or errors out partway through, just re-run the same\ncommand — deepsec picks up where it left off, skipping files it already\nanalyzed and only investigating the rest.\n\n## Get started\n\nNavigate to the root of the repository that you want to scan, then:\n\n```bash\nnpx deepsec init       # creates .deepsec/ with this repo as the first project\ncd .deepsec\npnpm install           # installs deepsec from npm\n\n# Proceed as instructed by `init` output\n```\n\nNow have your coding agent bootstrap your installation. Open the agent of choice\nand prompt:\n\n> Read `.deepsec/node_modules/deepsec/SKILL.md` to understand the\n> tool. Then read `.deepsec/data/<id>/SETUP.md` and follow it:\n> skim this repo's README, any AGENTS.md/CLAUDE.md, and a handful\n> of representative code files, then replace each section of\n> `.deepsec/data/<id>/INFO.md`.\n>\n> Keep it SHORT — target 50–100 lines total. Pick 3–5 examples per\n> section, not exhaustive enumeration. Name primitives (auth helpers,\n> middleware) but no line numbers. Skip generic CWE categories —\n> built-in matchers cover those. Cover only what's project-specific.\n> INFO.md is injected into every scan batch; verbose context dilutes\n> signal.\n\nThen scan from inside `.deepsec/`:\n\n```bash\npnpm deepsec scan\npnpm deepsec process    \npnpm deepsec revalidate # optional, cuts FP rate\npnpm deepsec export --format md-dir --out ./findings\n```\n\nIf you feel like the `deepsec` should look at more parts of the code, give it [the writing matchers](docs/writing-matchers.md) doc to find more valuable starting points in your code base.\n\n## Docs\n\n- [docs/getting-started.md](docs/getting-started.md) — first-scan walkthrough\n- [docs/reviewing-changes.md](docs/reviewing-changes.md) — `process --diff` for PR review and CI gating\n- [docs/supported-tech.md](docs/supported-tech.md) — frameworks and ecosystems deepsec recognizes out of the box\n- [docs/writing-matchers.md](docs/writing-matchers.md) — **prompt your coding agent to grow your matcher set**\n- [docs/configuration.md](docs/configuration.md) — `deepsec.config.ts` reference\n- [docs/plugins.md](docs/plugins.md) — plugin authoring\n- [docs/models.md](docs/models.md) — model selection, defaults, refusals, future models\n- [docs/vercel-setup.md](docs/vercel-setup.md) — AI Gateway + Vercel Sandbox keys / tokens\n- [docs/architecture.md](docs/architecture.md) — pipeline internals\n- [docs/data-layout.md](docs/data-layout.md) — `data/` schemas (FileRecord, RunMeta, …)\n- [docs/faq.md](docs/faq.md) — cost, model choice, sandbox mode, FP rate\n- [samples/](samples/) — copy-paste starting points (currently: `webapp/`)\n- [CONTRIBUTING.md](CONTRIBUTING.md) — repo layout, dev workflow\n\n## AI provider\n\nWhen running locally, `deepsec` falls back to your existing `claude` /\n`codex` subscription if you've logged in on this machine. Subscriptions\n(Claude Pro/Max, ChatGPT Plus) are useful for evaluating deepsec but\ngenerally don't have enough headroom for full repo scans.\n\nFor real scans, use Vercel AI Gateway. One key covers both Claude and\nCodex, and the gateway's default quotas are sized for highly concurrent\nresearch.\n\n```\nAI_GATEWAY_API_KEY=vck_...\n```\n\nSee [docs/vercel-setup.md](docs/vercel-setup.md) for getting a key and\nfor the Vercel Sandbox setup. To bypass the gateway, set\n`ANTHROPIC_AUTH_TOKEN` + `ANTHROPIC_BASE_URL` (or the OpenAI pair)\nexplicitly. Explicit values always win over the `AI_GATEWAY_API_KEY`\nexpansion.\n\nIf a `process` or `revalidate` run halts because the upstream credential\nran out of quota or credits, deepsec stops gracefully and tells you\nwhere to top up. Re-run the same command afterward and it picks up\nwhere it left off.\n\n## Distributed execution (optional)\n\nLarge monorepos can fan work across [Vercel Sandbox](https://vercel.com/docs/vercel-sandbox) microVMs:\n\n```bash\npnpm deepsec sandbox process --project-id my-app --sandboxes 10 --concurrency 4\n```\n\nNeeds a Vercel account. The local working tree is tarballed and\nuploaded; `.git` is excluded. Both OIDC tokens (local) and access\ntokens (CI) are supported — see\n[docs/vercel-setup.md](docs/vercel-setup.md).\n\n## Security model of deepsec itself\n\nTreat `deepsec` like a coding agent with full shell access on the enviroment that it is\nrunning on. It is designed to run on trusted inputs (your source code) but you may still\nbe concerned about prompt injection due to external dependencies or vendored code.\n\nRunning on a sandbox (see above) does limit the potential exposure substantially:\n\n- The API keys for the coding agents are injected outside of the sandbox and hence cannot be exfiltrated\n- For the worker sandboxes, network egress from the sandbox is limited to coding agent hosts (Egress is allowed during the bootstrap process, but this does not run the coding agent)\n\n## Workflow reference\n\n| Command         | What it does                                             |\n|-----------------|----------------------------------------------------------|\n| `scan`          | Find candidate sites with regex matchers (fast, no AI)   |\n| `process`       | AI investigation; emits findings + recommendation        |\n| `process --diff`| PR-mode: scan + investigate only files changed in a diff |\n| `triage`        | Lightweight P0/P1/P2 classification (cheaper model)      |\n| `revalidate`    | Re-check existing findings; checks git history for fixes |\n| `enrich`        | Add git committer info + (with a plugin) ownership data  |\n| `report`        | Markdown + JSON summary for one project                  |\n| `export`        | Per-finding JSON or directory of markdown files          |\n| `metrics`       | Cross-project counts: severities, vulns by type, TPs     |\n| `status`        | Snapshot of the project mirror                           |\n| `sandbox <cmd>` | Run any of the above on Vercel Sandbox microVMs          |\n\n## License\n\nApache 2.0. See [LICENSE](LICENSE) and [NOTICE](NOTICE).\n","summary":"deepsec is an agent‑powered vulnerability scanner built for large codebases, letting teams run comprehensive on‑demand reviews of all repository files while leveraging the most advanced language‑models for deep analysis. It distributes work across parallel workers, automatically resumes interrupted scans, and can be customized with reusable matchers, plugins, and fine‑tuned model settings. The tool targets hard‑to‑find security flaws, providing quick, actionable findings that help developers patch issues before they are merged or deployed. Software security teams, DevOps engineers, and maintainers of enterprise‑scale projects will benefit from its scalability, automation, and integration with Vercel’s AI gateway for cost‑effective, high‑throughput scanning.","description":"Deepsec is a security harness for finding vulnerabilities in your codebase powered by coding agents","stars":1827,"language":"TypeScript"},{"owner":"wojtczyk","repo":"trust","url":"https://github.com/wojtczyk/trust","readme":"# TRUST\n\nTRUST is a retro TUI IDE for Rust projects inspired by classic blue-screen DOS\ndevelopment environments.\n\nStatus: experimental nostalgia project. It edits files, browses Rust projects,\nand runs Cargo commands.\n\n## Screenshots\n\nBuilding and running \"Hello World\" in TRUST.\n\n| Starting a project | Running a console program |\n| --- | --- |\n| ![Hello project in TRUST](doc/1_hello.png) | ![Hello project editor view](doc/2_hello.png) |\n\nTRUST can build TRUST.\n\n| TRUST Editor | Running Tests |\n| --- | --- |\n| ![TRUST project in TRUST](doc/3_trust.png) | ![TRUST menus and panes](doc/4_trust.png) |\n\n## FAQ\n\n**Why?**  \nBecause Rust deserves a blue-screen IDE from the olden days and someone had to do this.\n\n**Does it save my files?**  \nYes. Use `F2` or `Ctrl+S`. TRUST marks dirty buffers with `*` in the editor title. Still, this is more of a fun project so use at your own risk.\n\n**Is this affiliated with any classic DOS IDE vendor?**  \nNo. TRUST is an independent nostalgia project inspired by classic DOS development environments.\n\n## Run\n\n```sh\ncargo run -- /path/to/rust/project\n```\n\nIf no path is supplied, TRUST opens the current directory.\n\n## Keys\n\n- `F1`: help\n- `F2` / `Ctrl+S`: save\n- `F3` / `Ctrl+O`: open selected file\n- `Backspace`: go to the parent directory in the project pane\n- `F4` / `Tab` / `Ctrl+F`: cycle focus\n- `F5` / `Ctrl+R`: `cargo run`\n- `F7`: `cargo check`\n- `F8` / `Ctrl+T`: `cargo test`\n- `F9` / `Ctrl+B`: `cargo build`\n- `F10`: open the menu bar\n- `Ctrl+C`: copy selected text\n- `Ctrl+V`: paste clipboard text\n- `Ctrl+X`: cut selected text\n- `Esc` / `Ctrl+Q`: quit\n- `Alt+X`: delete line\n- `Alt+U`: duplicate line\n- `Shift+Navigation`: select text\n\n## Menus\n\n- `F10` opens the menu bar.\n- Left/right arrows switch menus.\n- Up/down arrows move through a dropdown.\n- `Enter` activates the highlighted menu item.\n- `Esc` closes the menu.\n- Mouse clicks on the menu bar and dropdown items work too.\n- `File > New` asks for a filename and creates it in the current project pane\n  directory.\n- `Project > New project` opens the Cargo project dialog with parent directory,\n  project name, and `bin` / `lib` selector.\n- `Window` switches between panes and contains the former focus option.\n\n## Mouse\n\n- Click inside the editor to move the cursor.\n- Drag inside the editor to select text.\n- Click inside the project pane to open editable files or navigate directories.\n- Click inside any pane to focus it.\n- Drag the vertical divider between project and editor panes to resize them.\n- Drag the top border of the compiler/message pane to resize it.\n- Scroll inside the project, editor, or message pane to move through content.\n\nThe project pane lists directories plus editable Rust and Cargo-related files\nsuch as `.rs`, `.toml`, and `.lock`, while skipping `.git`, `target`, and common\neditor/build directories. Compiler output is captured in the bottom pane.\n","summary":"TRUST is an experimental retro text‑user‑interface IDE for Rust, modeled after classic blue‑screen DOS development suites. It lets you edit Rust source files, browse a Cargo project tree, and run Cargo commands such as build, run, test, and check directly from a single screen, with a menu bar, keyboard shortcuts, and mouse support. The interface shows compiler output in a bottom pane while skipping irrelevant directories, making it quick to develop and debug small to mid‑size crates. Rust hobbyists or those craving a nostalgic development experience will benefit from its compact, console‑centric workflow.","description":"TRUST – Coding Rust like it's 1989","stars":152,"language":"Rust"},{"owner":"dodo-reach","repo":"hermes-desktop","url":"https://github.com/dodo-reach/hermes-desktop","readme":"# Hermes Desktop\n\nNative macOS companion for Hermes Agent over SSH.\n\nIt turns the daily Hermes loop into something you can actually live in on a\nMac.\n\nIt brings the parts of the workflow that matter most into one focused window:\nsessions, Kanban, workspace files, usage, skills, cron jobs, and a real\nterminal.\n\nIf Hermes is already part of how you work, the app should feel immediately\nlegible: same host, same files, same profiles.\n\nNo browser wrapper. No gateway API. No daemon on the host. No local mirror. No\nextra sync layer slowly drifting away from the machine that actually matters.\n\nThat restraint is intentional:\n\n- connects directly over SSH\n- keeps the Hermes host as the only source of truth\n- does not depend on a gateway API\n- does not mirror files onto your Mac\n- does not install a helper service on the remote host\n\nThat is the point of the app.\n\nHermes Desktop does not invent a softer second version of Hermes. It makes the\nreal workflow feel calm, fast, and native on a Mac while keeping the model\nvisible. You still know what host you are on, which Hermes profile is active,\nwhere the canonical state lives, and which path the app is actually using.\n\n## Preview\n\n<table>\n  <tr>\n    <td width=\"50%\">\n      <img src=\"assets/sessions.png\" alt=\"Hermes Desktop Sessions view\" />\n    </td>\n    <td width=\"50%\">\n      <img src=\"assets/kanban.png\" alt=\"Hermes Desktop Kanban view\" />\n    </td>\n  </tr>\n  <tr>\n    <td width=\"50%\">\n      <img src=\"assets/files.png\" alt=\"Hermes Desktop Files view\" />\n    </td>\n    <td width=\"50%\">\n      <img src=\"assets/USAGE.png\" alt=\"Hermes Desktop Usage view\" />\n    </td>\n  </tr>\n  <tr>\n    <td width=\"50%\">\n      <img src=\"assets/skills.png\" alt=\"Hermes Desktop Skills view\" />\n    </td>\n    <td width=\"50%\">\n      <img src=\"assets/terminal.png\" alt=\"Hermes Desktop Terminal view\" />\n    </td>\n  </tr>\n</table>\n\nSix views from a live Hermes host: sessions, Kanban, workspace files, usage,\nskills, and terminal workflows.\n\n## What You Get\n\n- a native macOS workspace for the Hermes host you already use over SSH\n- profile-aware connection handling for the default Hermes home and named\n  Hermes profiles on the same host\n- the real remote state in one place: sessions, Kanban, workspace files, usage,\n  skills, cron jobs, and terminal work\n- a session workbench for searching session metadata and message content,\n  reading transcripts, pinning important sessions, continuing a chat, and\n  resuming the same session in Terminal\n- a native Kanban workspace for the upstream host-wide Kanban home: the default\n  `~/.hermes/kanban.db` board plus additional upstream boards when the host\n  supports them\n- direct editing for canonical Hermes files, selected remote text files, and\n  remote `SKILL.md` files, with conflict checks before save\n- an embedded SSH terminal with tabs, themes, and enough room for real\n  multi-agent work across hosts and profiles\n- a universal Mac release for Apple Silicon and Intel, with English,\n  Simplified Chinese, and Russian localization resources in the app bundle\n\nIf Hermes runs there and SSH already works, Hermes Desktop will usually meet you\nthere. That includes:\n\n- Raspberry Pi\n- another Mac\n- a VPS or remote server\n- the same Mac via `ssh localhost`, a local hostname, or a local SSH alias\n\n## Hermes Desktop And The Official Web Dashboard\n\nNous Research now ships the official Hermes web dashboard. That is good news.\n\nThe dashboard is the browser-based management surface for Hermes: configuration,\nAPI keys, logs, sessions, analytics, cron jobs, skills, and browser chat. It is\nthe right place when you want a local web UI around the installation.\n\nHermes Desktop is deliberately different. It is a native Mac workspace for\npeople who want to stay close to the host itself: direct SSH, profile-aware\nremote files, sessions, Kanban, cron jobs, editable skills, usage, and a real\nterminal in one focused app.\n\nThe boundary is simple: browser for administration, Mac app for host work.\nHermes Desktop stays valuable because it does not create another backend around\nHermes. It gives the existing SSH path a native surface.\n\n## Before You Download\n\nSetup is intentionally lightweight. You need only a few things:\n\n- a Mac running macOS 14 or newer\n- SSH access from this Mac that already works in Terminal without interactive\n  prompts\n- the SSH host key already accepted once in Terminal for that target\n- a normal route from this Mac to the Hermes host, such as local LAN, public\n  IP or DNS, VPN, or a Tailscale IP or hostname\n- `python3` available on the Hermes host\n- `hermes` available on the host's non-interactive SSH `PATH` for in-app chat\n  turns and terminal resume workflows\n- a Hermes Agent build with upstream Kanban support if you want the native\n  Kanban workspace; multiple-board management appears when the host exposes the\n  newer upstream board APIs\n- Hermes data under the remote user's `~/.hermes`\n\nSimple rule: if this works in Terminal from this Mac without asking for a\npassword or host key confirmation, the app is usually ready to work too:\n\n```bash\nssh your-host\n```\n\n## Install\n\nInstall takes about a minute:\n\n1. Download `HermesDesktop.app.zip` from the\n   [latest GitHub Release](https://github.com/dodo-reach/hermes-desktop/releases/latest).\n2. Double click the zip to extract `HermesDesktop.app`.\n3. Quit Hermes Desktop if an older version is already running.\n4. Drag `HermesDesktop.app` into `Applications` and replace the old copy if\n   macOS asks.\n5. First launch: right click `HermesDesktop.app`, choose `Open`, then confirm\n   `Open`.\n\nHermes Desktop is currently distributed as a universal macOS build for Apple\nSilicon and Intel Macs. The app is ad-hoc signed and not notarized by Apple, so\nmacOS may show a warning saying Apple cannot verify it for malware. That is\nexpected for this distribution model and does not mean macOS found malware in\nHermes Desktop.\n\nIf macOS blocks the first launch:\n\n1. Click `Done`, not `Move to Bin`.\n2. Right click `HermesDesktop.app` and choose `Open`.\n3. If needed, go to `System Settings` > `Privacy & Security` and click\n   `Open Anyway`.\n\nDo not disable Gatekeeper or run `sudo` commands to install Hermes Desktop.\n\n## Verify The Download\n\nEach GitHub Release includes a SHA-256 checksum for `HermesDesktop.app.zip`.\nCompare it with the value printed locally after downloading:\n\n```bash\nshasum -a 256 HermesDesktop.app.zip\n```\n\nAfter installing:\n\n```bash\ncodesign --verify --deep --strict /Applications/HermesDesktop.app\n```\n\n## Connect Your Hermes Host\n\nOpen the app, go to `Connections`, create a profile, then click `Test` and\n`Use Host`.\n\nYou have two valid ways to fill the connection. In most cases, an SSH alias is\nthe cleanest one:\n\n### Option 1: SSH alias\n\nAn SSH alias is just a short name saved in your Mac's SSH config, so instead of\ntyping a long command every time, you can type something simple like:\n\n```bash\nssh hermes-home\n```\n\nThat short name usually comes from `~/.ssh/config`.\n\nExample:\n\n```sshconfig\nHost hermes-home\n  HostName vps.example.com\n  User alex\n```\n\nIn the app:\n\n- set `SSH alias` to `hermes-home`\n- leave `Host`, `User`, and `Port` empty unless you want explicit overrides\n\n### Option 2: host details directly\n\nIf you normally connect with something like:\n\n```bash\nssh alex@vps.example.com\n```\n\nthen in the app:\n\n- `Host or IP`: `vps.example.com`\n- `User`: `alex`\n- `Port`: `22` or your real SSH port\n\n### Hermes profiles on the same host\n\nHermes Desktop can target either the default Hermes home or a named profile on\nthe same SSH host.\n\nExamples:\n\n- leave `Hermes profile` empty to use `~/.hermes`\n- set `Hermes profile` to `researcher` to use\n  `~/.hermes/profiles/researcher`\n\nThe important part is what happens after that: the profile selection is not a\nlabel stuck on a form. It flows through the app.\n\nOverview resolves against that profile. Usage stays scoped to that profile while\nstill being able to show host-wide cross-profile totals. Cron jobs target that\nprofile's scheduler state. The terminal launches with the right `HERMES_HOME`.\nAnd terminal tabs can stay open across different profiles, so it is natural to\nwork multiple Hermes agents on the same host side by side.\n\n### Same Mac\n\nIf Hermes runs on the same Mac, the model stays the same: SSH.\n\nUse one of these:\n\n- `localhost`\n- your local hostname\n- a local SSH alias\n\nHermes Desktop still connects over SSH and never reads those files directly.\n\n## What `Test` Checks\n\n`Test` is the preflight, not a cosmetic button.\n\nIt checks that:\n\n- the SSH target is reachable\n- authentication works without interactive prompts\n- `python3` is available in the remote SSH environment used by the app\n\nIf `Test` passes, `Use Host` should be on solid ground.\n\nFeature-specific requirements, such as the remote `hermes` CLI path and Kanban\nsupport, are checked when those sections actually run.\n\n## Ways To Chat With Hermes\n\nHermes Desktop does not replace the terminal surfaces Hermes already gives you.\nIt lets you choose the right one for the job:\n\n- use in-app chat in `Sessions` for quick turns, checking context, or\n  continuing a session while you are already in Hermes Desktop\n- use the embedded `Terminal` for heavier work where you want the shell,\n  command approvals, long-running output, or manual control close at hand; from\n  there you can run `hermes`, `hermes chat`, or a one-shot prompt such as\n  `hermes chat -q \"Hello\"`\n- use `hermes --tui` in the terminal when you want Hermes Agent's modern TUI\n  for longer interactive sessions, richer overlays, session picking, and the\n  same sessions, slash commands, and config as the classic CLI\n\nAll of these paths still run Hermes on the selected host. The choice is about\nsurface area and workflow, not about creating a second source of truth.\n\n## What You Will See In The App\n\n- `Overview`\n  Confirms the active host, the active Hermes profile, the discovered profiles,\n  tracked paths, cron location, and the session store source.\n- `Files`\n  Lets you edit the canonical Hermes files and bookmark selected remote text\n  files on the active host, with remote conflict checks before save.\n- `Sessions`\n  Reads the real remote session store from `~/.hermes/state.db`, with\n  full-text search across names, IDs, previews, and message content, match\n  snippets, pinned sessions, cleaner metadata, readable transcripts, compact\n  tool-output summaries, in-app chat continuation, safer non-interactive\n  approval handling, terminal resume, refresh-on-entry behavior, and remote\n  deletion.\n- `Cron Jobs`\n  Browses the real Hermes cron definitions on the host, with create, edit,\n  pause, resume, run-now, and delete actions, including agent jobs and\n  script-only jobs that run host scripts without creating an agent turn. It\n  shows the details that matter when you are actually running them: schedule,\n  model, skills, script, workdir, delivery target, and recent status.\n- `Kanban`\n  Opens the upstream Hermes Kanban workspace from the host-wide Kanban home:\n  the default board at `~/.hermes/kanban.db`, plus additional boards under\n  `~/.hermes/kanban/boards/` when supported. It includes board selection,\n  board creation and archive, task creation, search, filters, assignment,\n  dependency links, editable task metadata, comments, block, unblock, complete,\n  archive, delete, run and event history, worker log tailing, and dispatcher\n  nudging when the host supports it.\n- `Usage`\n  Shows aggregate input and output token totals, top sessions, top models,\n  recent session trends, and when available, a host-wide profile breakdown.\n- `Skills`\n  Discovers and reads remote `SKILL.md` files from the local Hermes skills\n  store plus configured `skills.external_dirs`, while keeping skill creation\n  and editing anchored to `~/.hermes/skills/`, with quick filtering,\n  companion folder awareness, optional folder scaffolding, and remote\n  conflict checks before save.\n- `Terminal`\n  Opens the real SSH shell inside the app, with multiple tabs, named theme\n  presets, live background and text color tuning, and room for a genuinely\n  multi-profile, multi-agent workflow that still stays close to the host.\n\n## Why It Feels Different\n\nMost visual agent tools become one of three things: a browser dashboard, a\ncloud execution surface, or a terminal session relay. Those are useful shapes,\nbut they usually add something else to manage: a local web server, a gateway,\na container, a cloud workspace, or a second place where state can appear to\nlive.\n\nHermes Desktop makes a narrower bet.\n\nIt is a native macOS app that talks to your Hermes host over SSH and keeps the\nhost authoritative. Sessions come from the remote session store. Kanban comes\nfrom the upstream host-wide Kanban home, starting with the default\n`~/.hermes/kanban.db` board. Cron jobs come from the remote scheduler state.\nFiles and skills are edited on the host with conflict checks.\n\nThe app feels calmer because it does not blur where the work is happening. It\njust gives the real Hermes workflow a Mac surface that is easier to live in.\n\n## Why SSH And A Real Terminal\n\nHermes is strongest at the command line.\n\nHermes Desktop respects that. It keeps the real path visible and usable: real\nSSH, real terminal, real remote files, real session data, real Kanban state,\nreal cron state.\n\nIt does not try to hide Hermes behind a separate gateway layer, invent a second\nsource of truth, or turn the workflow into something softer and less reliable.\nThe goal is not to abstract Hermes away. The goal is to give it a native Mac\nsurface that still feels honest.\n\nThat honesty is precisely what makes the app reassuring. You do not need to\nguess where your data lives, which machine is authoritative, or whether the app\ninvented its own shadow world to feel convenient. Hermes Desktop stays close to\nthe host because that is the more trustworthy design.\n\n## FAQ\n\n### Is it safe to install?\n\nThat is the right question, and you should not rely on reassurance alone.\n\nHere are concrete things you can verify yourself:\n\n- the app is open source in this repo, and you can build it locally with\n  `./scripts/build-macos-app.sh` instead of using the release zip\n- GitHub Releases include a SHA-256 checksum for the release zip\n- Hermes Desktop uses direct SSH to the host you choose and does not require a\n  gateway API or helper service\n- the built-in update check calls GitHub Releases for the latest Hermes Desktop\n  app version only; it does not update Hermes Agent and does not send your host,\n  profile, file, session, or Kanban content\n- you can inspect its live network behavior with Little Snitch, LuLu, or\n  `nettop`\n\nOne distribution detail to understand: the public build is ad-hoc signed and\nnot notarized by Apple. That is why macOS may show a first-launch warning. It is\ndifferent from Apple actively reporting that it found malware in the app.\n\n### Why use Hermes Desktop if the official web dashboard exists?\n\nBecause the dashboard is for managing Hermes from a browser, while Hermes\nDesktop is for working on the Hermes host from your Mac.\n\nUse the dashboard for installation-level tasks: configuration, API keys, logs,\nand browser-based monitoring. Use Hermes Desktop when you are in the daily loop:\nreading sessions, editing remote files or skills, checking Kanban, reviewing\nusage, managing cron jobs, and keeping a real SSH terminal close.\n\nThe dashboard gives Hermes a web control surface. Hermes Desktop gives the same\nhost a native macOS workbench without changing the SSH-first model.\n\n### Does Hermes Desktop replace a remote file manager or IDE?\n\nNo.\n\nIt lets you browse remote directories and bookmark selected text files next to\nthe canonical Hermes files. It is still a focused Hermes workspace, not a full\nSFTP client or remote IDE. Remote text files up to 10 MB are editable.\n\n### Where does state live?\n\nOn the Hermes host.\n\nSessions are read from `~/.hermes/state.db` first, with\n`~/.hermes/sessions/*.jsonl` as a fallback only when the SQLite store is not\navailable. Kanban reads and writes the upstream host-wide Kanban home: the\ndefault board is `~/.hermes/kanban.db`, and additional boards use\n`~/.hermes/kanban/boards/<slug>/kanban.db` when available. Cron jobs use the\nremote scheduler state. Files and skills are saved back to the host.\n\n### What does in-app chat do?\n\nIt runs Hermes on the selected host over SSH.\n\nStarting a new chat uses the remote `hermes chat` path. Continuing a session\nuses `hermes --resume <session-id> chat`, with the selected Hermes profile\npreserved when one is active. If Hermes requests command approval during a\nnon-interactive chat turn, Hermes Desktop cannot collect a manual approval\ninside the chat. When Hermes can handle the denial and continue, the transcript\nshows Hermes' normal response. If the turn cannot continue usefully, the app\nshows an approval-needed message and lets you retry with auto-approve enabled\nor resume the session in Terminal to review the command yourself.\n\n### Why do I still need SSH working in Terminal first?\n\nBecause the app uses the same SSH path your Mac already uses, but in a\nnon-interactive way.\n\nIf Terminal still needs password entry, host key confirmation, or other\ninteractive fixes for that target, the app will usually hit the same wall.\n\nYour Mac does not need to be on the same Wi-Fi. It only needs a normal SSH route\nto the host: LAN, public IP, DNS, VPN, or Tailscale.\n\n### What happens if a remote file changed after I opened it?\n\nHermes Desktop will not blindly overwrite it.\n\nBefore saving an edited workspace file or skill, the app checks whether the\nremote file still matches the version you opened. If it changed, save is blocked\nand your local edits stay intact until you reload intentionally.\n\n## Roadmap\n\nMost of the original roadmap is now shipped.\n\nThis app has reached the point we wanted: a calm, capable native macOS\nworkspace for the real Hermes workflow, still anchored to SSH and the host as\nsource of truth.\n\n### Shipped\n\n- [x] a Files workspace for canonical Hermes files and user-bookmarked remote\n  text files, with SSH-backed browsing, conflict-aware editing, and atomic saves\n- [x] native session workflows with cleaner metadata, full-text session and\n  message-content search, match snippets, deletion, and refresh-on-entry\n  behavior\n- [x] a session workbench with pinned sessions, readable transcripts, compact\n  tool-output summaries, in-app chat continuation, safer non-interactive\n  approval handling, and terminal resume\n- [x] a native Kanban workspace for upstream Hermes boards, including board\n  selection, board creation and archive, task creation, status actions,\n  assignment, dependency links, editable task metadata, comments, run/event\n  history, recovery actions, worker log visibility, and dispatcher nudging\n- [x] a usage dashboard with aggregate token totals, top sessions, top models,\n  trends, and host-wide multi-profile totals when available\n- [x] native skill workflows for discovering, inspecting, creating, and editing\n  remote `SKILL.md` files from the Hermes skills store, with support for\n  configured external discovery directories and local write precedence\n- [x] profile-aware host workflows aligned with Hermes Agent profiles on the\n  same SSH target\n- [x] native cron job workflows for the canonical remote scheduler state,\n  including agent jobs and script-only host jobs\n- [x] a real embedded SSH terminal with tabs, named theme presets, live color\n  controls, and coherent multi-profile workspace behavior\n- [x] English, Simplified Chinese, and Russian localization resources packaged\n  in the app bundle\n- [x] universal macOS release packaging for Apple Silicon and Intel, with\n  bundle version stamping in the packaging flow\n\n### From Here\n\n- reduce distribution friction with signing and notarization\n- keep polishing onboarding, diagnostics, Files ergonomics, terminal UX, and\n  multi-host details without adding a second transport model or shadow state\n- keep tracking upstream Hermes Agent changes, especially around Kanban and\n  session chat, so the app stays close to the real host workflow\n\nAnything larger than that should be justified by Hermes itself, not added here\nfor novelty.\n\n## Build From Source\n\nFor local development, the supported path in this repo is to build the app\nbundle directly:\n\n```bash\n./scripts/build-macos-app.sh\n```\n\nThen open `dist/HermesDesktop.app`.\n\nTo run the release-support test suite:\n\n```bash\n./scripts/run-tests.sh\n```\n\nTo create the GitHub Releases archive:\n\n```bash\n./scripts/package-github-release.sh\n```\n\nFor release-candidate packaging, you can stamp an explicit version:\n\n```bash\nHERMES_VERSION=0.7.1 ./scripts/package-github-release.sh\n```\n\nRelease artifacts:\n\n- `dist/HermesDesktop.app.zip` as a universal macOS archive for Apple Silicon\n  and Intel Macs\n- `dist/HermesDesktop.app.zip.sha256` for checksum verification\n","summary":"Hermes Desktop is a native macOS app that connects directly over SSH to a running Hermes Agent, giving users a focused workspace that brings sessions, Kanban boards, remote files, usage stats, skills, cron jobs, and an embedded terminal into a single window. It avoids extra gateways, local mirrors, or helper services, keeping the Hermes host as the sole source of truth while supporting profile‑aware connections and conflict‑checked editing of canonical files. The application is ideal for anyone who already uses Hermes on a remote host and wants a fast, calm, and native interface on macOS to manage and interact with that host’s workflow.","description":"The safest, simplest way to manage Hermes from your Mac. Pure SSH. No gateways, no exposed ports, no browser layer.","stars":1101,"language":"Swift"},{"owner":"lightseekorg","repo":"tokenspeed","url":"https://github.com/lightseekorg/tokenspeed","readme":"<p align=\"center\">\n  <img src=\"./assets/banner/tokenspeed-banner.png\" alt=\"TokenSpeed: Tokens at the speed of light\" width=\"100%\" />\n</p>\n\nTokenSpeed is a speed-of-light LLM inference engine designed for **agentic workloads**, with TensorRT-LLM-level performance and vLLM-level usability. Our goal is to be the most performant inference engine for production agentic workloads.\n\nCore components:\n\n- **Modeling layer**: local-SPMD design with a static compiler that generates\n  collective communication from module-boundary placement annotations, so users\n  do not hand-write parallelism logic.\n- **Scheduler**: C++ control plane and Python execution plane. Request\n  lifecycle, KV cache ownership, and overlap timing are encoded as a\n  finite-state machine, with safe KV resource reuse enforced by the type system at compile time.\n- **Kernels**: pluggable, layered kernel system with a portable public API and\n  a centralized registry including one of the fastest **MLA**\n  (Multi-head Latent Attention) implementations on Blackwell for agentic workload.\n- **Entrypoint**: SMG-integrated AsyncLLM for low-overhead CPU-side request\n  handling.\n\n## Performance Comparison\n\n<img src=\"./assets/perf/tokenspeed-kimi-k2.5-performance.png\" alt=\"TokenSpeed vs. TensorRT-LLM Pareto curves on agentic workload (Kimi K2.5, B200)\" width=\"800\" margin=\"10px\"></img>\n\n## Preview Status\n\nThis version is a preview release for reproducing the Kimi K2.5 on B200 and\nTokenSpeed MLA on B200 results from the [TokenSpeed blog](https://lightseek.org/blog/lightseek-tokenspeed.html). Several major PRs are\nstill in progress and have not been merged yet.\n\nOngoing work includes:\n\n- Model coverage: Qwen 3.6, DeepSeek V4, and MiniMax M2.7.\n- Runtime features: PD, EPLB, KV store, Mamba cache, VLM, and metrics.\n- Platform optimization: Hopper optimization, MI350 optimization, and related\n  runtime improvements.\n\nThese features are still being cleaned up and will be merged into `main` over\nthe next few weeks. TokenSpeed is currently under heavy development and is\nintended to showcase the new runtime design and technical direction. Do not use\nthis preview release for production deployments.\n\n## Documentation\n\nStart here:\n\n- [Docs Index](https://lightseek.org/tokenspeed/)\n- [Getting Started](https://lightseek.org/tokenspeed/guides/getting-started)\n- [Launching a Server](https://lightseek.org/tokenspeed/guides/launching)\n- [Model Recipes](https://lightseek.org/tokenspeed/recipes/models)\n- [Server Parameters](https://lightseek.org/tokenspeed/configuration/server)\n- [Compatible Parameters](https://lightseek.org/tokenspeed/configuration/compatible-parameters)\n- [Parallelism](https://lightseek.org/tokenspeed/serving/parallelism)\n","summary":"TokenSpeed is a high‑performance LLM inference engine tuned for agentic workloads, offering TensorRT‑LLM‑level speed while retaining vLLM‑style usability. Its core architecture includes a local‑SPMD modeling layer that auto‑generates collective communication, a C++/Python scheduler built as a finite‑state machine with compile‑time safe KV cache reuse, and a pluggable kernel system featuring one of the fastest MLA implementations on recent NVIDIA hardware. The package also integrates AsyncLLM for low‑overhead CPU request handling and supports a range of model types such as Qwen and DeepSeek. Engineers and data‑science teams building production‑grade, low‑latency AI agents will benefit from its optimized performance and developer‑friendly interfaces.","description":"TokenSpeed is a speed-of-light LLM inference engine.","stars":760,"language":"Python"},{"owner":"akinloluwami","repo":"avnac","url":"https://github.com/akinloluwami/avnac","readme":"# Avnac\n\nAvnac is a browser-first design editor for posters, layouts, social graphics, and other canvas-based compositions.\n\n\n## Current Product State\n\nAvnac today is strongest around:\n\n- Fast browser-local editing\n- A custom scene editor with direct manipulation controls\n- Files saved in IndexedDB with a dedicated `/files` view\n- JSON import/export\n- Legacy file migration into the current editor format\n- Image export as `PNG`, `JPG`, and `WebP`\n- Prompt-driven editing through the Magic panel\n\nThings that are true right now:\n\n- The main editing experience lives in the frontend\n- The app is desktop-first; mobile editing is intentionally blocked\n- File persistence is primarily browser-local today\n- The backend exists, but it is optional for many day-to-day editor tasks\n\n## Editor Capabilities\n\nThe current editor supports:\n\n- Custom-size or preset canvases\n- Text, rectangles, ellipses, polygons, stars, lines, arrows, images, and vector boards\n- Selection, multi-select, marquee select, group/ungroup, reorder, and alignment\n- Resize, rotate, crop, corner radius, blur, opacity, shadows, and background editing\n- Snapping and transform overlays\n- Nested vector-board drawing areas\n- QR code generation\n- JSON file import from the files page\n- Legacy-file conversion prompts before opening older documents\n\n## Architecture Overview\n\n### Frontend\n\nThe frontend is a React + Vite + TypeScript application with TanStack Router and Tailwind CSS.\n\nKey architectural points:\n\n- The editor no longer depends on an external canvas editing runtime for scene manipulation\n- Scene data is modeled in `frontend/src/lib/avnac-scene.ts`\n- Rendering/export logic lives in `frontend/src/lib/avnac-scene-render.ts`\n- Low-level geometry, snapping, object transforms, file placement, and related logic live under `frontend/src/scene-engine/primitives`\n- The scene editor UI has been split into smaller modules under `frontend/src/components/scene-editor`\n- Shared editor state now uses a small Zustand-backed store in `frontend/src/components/scene-editor/editor-store.tsx`\n\nImportant frontend routes:\n\n- `/` landing page\n- `/files` local files manager\n- `/create` editor\n\n### Backend\n\nThe backend is an Elysia + TypeScript service. It is not required for all local editing workflows, but it is useful for:\n\n- media proxying for export-safe remote images\n- Unsplash search/download flows\n- document and auth-related server routes that exist in the repo\n\nCurrent backend route areas:\n\n- `backend/src/routes/media.ts`\n- `backend/src/routes/unsplash.ts`\n- `backend/src/routes/documents.ts`\n\n## Repository Layout\n\n```text\nfrontend/\n  src/\n    routes/                   App routes like landing, files, and editor\n    components/scene-editor/  Main editor UI modules, panels, overlays, hooks, store\n    scene-engine/primitives/  Geometry, transforms, snapping, object/file helpers\n    lib/                      Scene model, render/export, storage, previews, utilities\n    __tests__/                Frontend unit/regression tests\n\nbackend/\n  src/\n    routes/                   Media, Unsplash, and document endpoints\n    plugins/                  Backend plugins such as auth wiring\n    db/                       Database setup and schema\n```\n\n## Persistence and File Handling\n\nAvnac is currently local-first.\n\n- Documents autosave in the browser\n- The files page reads from IndexedDB\n- The editor opens documents by id via `/create?id=...`\n- JSON import/export is supported from the files workflow\n- Older saved files are detected and can be migrated from the UI before editing\n\nLegacy migration behavior currently includes:\n\n- a migrate-all prompt on the files page when old files are present\n- a conversion modal when a user clicks an old file\n- a blocking conversion overlay if a user opens or refreshes an old editor URL directly\n\n## Analytics\n\nFrontend analytics use PostHog.\n\n- Root provider setup lives in `frontend/src/routes/__root.tsx`\n- The tracked event catalog is documented in `frontend/.posthog-events.json`\n\n## Local Development\n\n### Frontend\n\n```bash\ncd frontend\nnpm install\nnpm run dev\n```\n\nRuns on `http://localhost:3300`.\n\nOptional Hugeicons Pro setup:\n\n- The frontend works without a Hugeicons Pro license. By default, contributors will install only the free icon packages and the app will fall back to free sidebar icons.\n- If you have a Hugeicons Pro license, set `HUGEICONS_NPM_TOKEN` before running `npm install` in `frontend/`. The optional package will install and Vite will automatically switch the sidebar to the pro icon set.\n- Do not expose this token with a `VITE_` prefix. It is only needed at install/build time.\n- In production or CI, builds can still succeed without the token. They will simply use the free fallback icons instead of the pro ones.\n\nExample local setup for licensed installs:\n\n```bash\ncd frontend\nexport HUGEICONS_NPM_TOKEN=your_token_here\nnpm install\n```\n\nUseful frontend scripts:\n\n```bash\ncd frontend\nnpm run dev\nnpm run build\nnpm run preview\nnpm test\n```\n\n### Backend\n\n```bash\ncd backend\nnpm install\ncp .env.example .env\nnpm run dev\n```\n\nRuns on `http://localhost:3001`.\n\nUseful backend scripts:\n\n```bash\ncd backend\nnpm run dev\nnpm run check\n```\n\n## Backend Notes\n\nThe backend matters most when you are working on remote media, Unsplash flows, or server-backed document/auth behavior.\n\nIn local development, the frontend can still be the primary focus if you are working on:\n\n- scene editing\n- selection and transform behavior\n- local files\n- legacy migration UX\n- export behavior\n\n## Testing\n\nFrontend regression tests live in `frontend/src/__tests__`.\n\nRight now they cover core areas such as:\n\n- scene parsing and migration detection\n- snapping behavior\n- image/object resize behavior\n- vector-board render behavior\n- file placement helpers\n\n## Practical Notes\n\n- If you change media proxy behavior, restart the backend before testing export flows that depend on remote images\n- If you are debugging editor behavior, the frontend is the main source of truth\n- If you are debugging old-file compatibility, start with `frontend/src/lib/avnac-scene.ts` and the files/create routes\n","summary":"Avnac is a browser‑first design editor that lets users create posters, layouts, social media graphics, and other canvas‑based compositions directly in the browser. It provides a fast local editing experience built with React, featuring a custom scene editor that supports text, shapes, images, QR codes, nested vector boards, snapping, alignment, and a range of effects such as blur and shadows, plus export to PNG, JPG, and WebP, as well as JSON import/export. The editor runs entirely on the client with IndexedDB persistence, while an optional Elysia‑based backend can handle media proxying, Unsplash searches, and authentication. Designers, marketers, and content creators who need a lightweight, offline‑capable, web‑based design tool would find Avnac particularly useful.","description":null,"stars":1027,"language":"TypeScript"},{"owner":"antirez","repo":"ds4","url":"https://github.com/antirez/ds4","readme":"# ds4.c\n\n`ds4.c` is a small native inference engine for DeepSeek V4 Flash. It is\nintentionally narrow: not a generic GGUF runner, not a wrapper around another\nruntime, and not a framework. The main path is a DeepSeek V4 Flash-specific\nMetal graph executor with DS4-specific loading, prompt rendering, KV state, and\nserver API glue.\n\nThis project would not exist without **llama.cpp and GGML**, make sure to read\nthe acknowledgements section, a big thank you to Georgi Gerganov and all the\nother contributors.\n\nNow, back at this project. Why we believe DeepSeek v4 Flash to be a pretty special\nmodel deserving a stand alone engine? Because after comparing it with powerful smaller\ndense models, we can report that:\n\n1. DeepSeek v4 Flash is faster because of less active parameters.\n2. In thinking mode, if you avoid *max thinking*, it produces a thinking section that is a lot shorter than other models, even 1/5 of other models in many cases, and crucially, the thinking section length is **proportional to the problem complexity**. This makes DeepSeek v4 Flash usable with thinking enabled when other models are practically impossible to use in the same conditions.\n3. The model features a context window of **1 million tokens**.\n4. Being so large, it knows more things if you go sampling at the edge of knowledge. For instance asking about Italian show or political questions soon uncovers that 284B parameters are a lot more than 27B or 35B parameters.\n5. It writes much better English and Italian. It *feels* a quasi-frontier model.\n6. The KV cache is incredibly compress, allowing long context inference on local computers and **on disk KV cache persistence**.\n7. It works well with 2-bit quantization, if quantized in a special way (read later). This allows to run it in MacBooks with 128GB of RAM.\n8. We expect DeepSeek to release **updated versions of v4 Flash** in the future, even better than the current one.\n\nThat said, a few important things about this project:\n\n* The local inference landscape contains many excellent projects, but new models are released continuously, and the attention immediately gets captured by the next model to implement. This project takes a deliberately narrow bet: one model at a time, official-vector validation (logits obtained with the official implementation), long-context tests, and enough agent integration to know if it really works. The exact model may change as the landscape evolves, but the constraint remains: local inference credible on high end personal machines or Mac Studios, starting from 128GB of memory.\n* This software is developed with **strong assistance from GPT 5.5** and with humans leading the ideas, testing, and debugging. We say this openly because it shaped how the project was built. If you are not happy with AI-developed code, this software is not for you. The acknowledgement below is equally important: this would not exist without `llama.cpp` and GGML, largely written by hand.\n* This implementation is based on the idea that compressed KV caches like the one of DeepSeek v4 and the fast SSD disks of modern MacBooks should change our idea that KV cache belongs to RAM. **The KV cache It is actually a first class disk citizen**.\n* Our vision is that local inference should be a set of three things working well together, out of the box: A) inference engine with HTTP API + B) GGUF specially crafted to run well under a given engine and given assumptions + C) testing and validation with coding agents implementations. This inference engine only runs with the GGUF files provided. It gets tested against officially obtained logits at different context sizes. This project exists because we wanted to make one local model feel finished end to end, not just runnable. However this is just alpha quality code, so probably we are not still there.\n* This is **Metal-only**, may implement CUDA support in the future? Perhaps, but nothing more. The CPU path is only for correctness check, but **warning: current macOS versions have a bug in the virtual memory implementation that will crash the kernel** if you try to run the CPU code. Remember? Software sucks. I was not possible to fix the CPU inference to avoid crashing, since each time there is to restart the computer, which is not funny. Help us, if you have the guts.\n\n## Acknowledgements to llama.cpp and GGML\n\n`ds4.c` does not link against GGML, but it **exists thanks to the path opened by the\nllama.cpp project and the kernels, quantization formats, GGUF ecosystem, and hard-won\nengineering knowledge developed there**.\nWe are thankful and indebted to [`llama.cpp`](https://github.com/ggml-org/llama.cpp)\nand its contributors. Their implementation, kernels, tests, and design choices were\nan essential reference while building this DeepSeek V4 Flash-specific inference path.\nSome source-level pieces are retained or adapted here under the MIT license: GGUF\nquant layouts and tables, CPU quant/dot logic, and certain Metal kernels. For this\nreason, and because we are genuinely grateful, we keep the GGML authors copyright\nnotice in our `LICENSE` file.\n\n## Model Weights\n\nThis implementation only works with the DeepSeek V4 Flash GGUFs published for\nthis project. It is not a general GGUF loader, and arbitrary DeepSeek/GGUF files\nwill not have the tensor layout, quantization mix, metadata, or optional MTP\nstate expected by the engine. The 2 bit quantizations provided here are not\na joke: they behave well, work under coding agents, call tools in a reliable way.\nThe 2 bit quants use a very asymmetrical quantization: only the routed MoE\nexperts are quantized, up/gate at `IQ2_XXS`, down at `Q2_K`. They are the\nmajority of all the model space: the other components (shared experts,\nprojections, routing) are left untouched to guarantee quality.\n\nDownload one main model:\n\n```sh\n./download_model.sh q2   # 128 GB RAM machines\n./download_model.sh q4   # >= 256 GB RAM machines\n```\n\nThe script downloads from `https://huggingface.co/antirez/deepseek-v4-gguf`,\nstores files under `./gguf/`, resumes partial downloads with `curl -C -`, and\nupdates `./ds4flash.gguf` to point at the selected q2/q4 model. Authentication\nis optional for public downloads, but `--token TOKEN`, `HF_TOKEN`, or the local\nHugging Face token cache are used when present.\n\n`./download_model.sh mtp` fetches the optional speculative decoding support\nGGUF. It can be used with both q2 and q4, but must be enabled explicitly with\n`--mtp`. The current MTP/speculative decoding path is still experimental: it is\ncorrectness-gated and currently provides at most a slight speedup, not a\nmeaningful generation-speed win.\n\nThen build:\n\n```sh\nmake\n```\n\n`./ds4flash.gguf` is the default model path used by both binaries. Pass `-m` to\nselect another supported GGUF from `./gguf/`. Run `./ds4 --help` and\n`./ds4-server --help` for the full flag list.\n\n## Speed\n\nThese are single-run Metal CLI numbers with `--ctx 32768`, `--nothink`, greedy\ndecoding, and `-n 256`. The short prompt is a normal small Italian story\nprompt. The long prompts exercise chunked prefill plus long-context decode.\nQ4 requires the larger-memory machine class, so M3 Max Q4 numbers are `N/A`.\n\n| Machine | Quant | Prompt | Prefill | Generation |\n| --- | ---: | ---: | ---: | ---: |\n| MacBook Pro M3 Max, 128 GB | q2 | short | 58.52 t/s | 26.68 t/s |\n| MacBook Pro M3 Max, 128 GB | q2 | 11709 tokens | 250.11 t/s | 21.47 t/s |\n| MacBook Pro M3 Max, 128 GB | q4 | short | N/A | N/A |\n| MacBook Pro M3 Max, 128 GB | q4 | long | N/A | N/A |\n| Mac Studio M3 Ultra, 512 GB | q2 | short | 84.43 t/s | 36.86 t/s |\n| Mac Studio M3 Ultra, 512 GB | q2 | 11709 tokens | 468.03 t/s | 27.39 t/s |\n| Mac Studio M3 Ultra, 512 GB | q4 | short | 78.95 t/s | 35.50 t/s |\n| Mac Studio M3 Ultra, 512 GB | q4 | 12018 tokens | 448.82 t/s | 26.62 t/s |\n\n## CLI\n\nOne-shot prompt:\n\n```sh\n./ds4 -p \"Explain Redis streams in one paragraph.\"\n```\n\nNo `-p` starts the interactive prompt:\n\n```sh\n./ds4\nds4>\n```\n\nThe interactive CLI is a real multi-turn DS4 chat. It keeps the rendered chat\ntranscript and the live Metal KV checkpoint, so each turn extends the previous\nconversation. Useful commands are `/help`, `/think`, `/think-max`, `/nothink`,\n`/ctx N`, `/read FILE`, and `/quit`. Ctrl+C interrupts the current generation\nand returns to `ds4>`.\n\nThe CLI defaults to thinking mode. Use `/nothink` or `--nothink` for direct\nanswers. `--mtp MTP.gguf --mtp-draft 2` enables the optional MTP speculative\npath; it is useful only for greedy decoding, currently uses a confidence gate\n(`--mtp-margin`) to avoid slow partial accepts, and should be treated as an\nexperimental slight-speedup path.\n\n## Server\n\nStart a local OpenAI/Anthropic-compatible server:\n\n```sh\n./ds4-server --ctx 100000 --kv-disk-dir /tmp/ds4-kv --kv-disk-space-mb 8192\n```\n\nThe server is Metal-only. It keeps one mutable graph/KV checkpoint in memory,\nso stateless clients that resend a longer version of the same prompt can reuse\nthe shared prefix instead of pre-filling from token zero.\n\nRequest parsing and sockets run in client threads, but inference itself is\nserialized through one Metal worker. The current server does not batch multiple\nindependent requests together; concurrent requests wait their turn on the single\nlive graph/session.\n\nSupported endpoints:\n\n- `GET /v1/models`\n- `GET /v1/models/deepseek-v4-flash`\n- `POST /v1/chat/completions`\n- `POST /v1/completions`\n- `POST /v1/messages`\n\n`/v1/chat/completions` accepts the usual OpenAI-style `messages`,\n`max_tokens`/`max_completion_tokens`, `temperature`, `top_p`, `top_k`, `min_p`,\n`seed`, `stream`, `stream_options.include_usage`, `tools`, and `tool_choice`.\nTool schemas are rendered into DeepSeek's DSML tool format, and generated DSML\ntool calls are mapped back to OpenAI tool calls.\n\n`/v1/messages` is the Anthropic-compatible endpoint used by Claude Code style\nclients. It accepts `system`, `messages`, `tools`, `tool_choice`, `max_tokens`,\n`temperature`, `top_p`, `top_k`, `stream`, `stop_sequences`, and thinking\ncontrols. Tool uses are returned as Anthropic `tool_use` blocks.\n\nBoth APIs support SSE streaming. In thinking mode, reasoning is streamed in the\nnative API shape instead of being mixed into final text.\n\nMinimal OpenAI example:\n\n```sh\ncurl http://127.0.0.1:8000/v1/chat/completions \\\n  -H 'Content-Type: application/json' \\\n  -d '{\n    \"model\":\"deepseek-v4-flash\",\n    \"messages\":[{\"role\":\"user\",\"content\":\"List three Redis design principles.\"}],\n    \"stream\":true\n  }'\n```\n\n### Agent Client Usage\n\n`ds4-server` can be used by local coding agents that speak OpenAI-compatible\nchat completions. Start the server first, and set the client context limit no\nhigher than the `--ctx` value you started the server with:\n\n```sh\n./ds4-server --ctx 100000 --kv-disk-dir /tmp/ds4-kv --kv-disk-space-mb 8192\n```\n\nYou can use larger context and larger cache if you wish. Full context of\n1M tokens is going to use more or less 26GB of memory (compressed indexer\nalone will be like 22GB), so configure a context which makes sense in\nyour system. With 128GB of RAM you would run the 2-bit quants, which are\nalready 81GB, 26GB are going to be likely too much, so a context window\nof 100~300k tokens is wiser.\n\nThe `384000` output limit below avoids token caps since the model is able\nto generate very long replies otherwise (up to 384k tokens). The server\nstill stops when the configured context window is full.\n\nFor **opencode**, add a provider and agent entry to\n`~/.config/opencode/opencode.json`:\n\n```json\n{\n  \"$schema\": \"https://opencode.ai/config.json\",\n  \"provider\": {\n    \"ds4\": {\n      \"name\": \"ds4.c (local)\",\n      \"npm\": \"@ai-sdk/openai-compatible\",\n      \"options\": {\n        \"baseURL\": \"http://127.0.0.1:8000/v1\",\n        \"apiKey\": \"dsv4-local\"\n      },\n      \"models\": {\n        \"deepseek-v4-flash\": {\n          \"name\": \"DeepSeek V4 Flash (ds4.c local)\",\n          \"limit\": {\n            \"context\": 100000,\n            \"output\": 384000\n          }\n        }\n      }\n    }\n  },\n  \"agent\": {\n    \"ds4\": {\n      \"description\": \"DeepSeek V4 Flash served by local ds4-server\",\n      \"model\": \"ds4/deepseek-v4-flash\",\n      \"temperature\": 0\n    }\n  }\n}\n```\n\nFor **Pi**, add a provider to `~/.pi/agent/models.json`:\n\n```json\n{\n  \"providers\": {\n    \"ds4\": {\n      \"name\": \"ds4.c local\",\n      \"baseUrl\": \"http://127.0.0.1:8000/v1\",\n      \"api\": \"openai-completions\",\n      \"apiKey\": \"dsv4-local\",\n      \"compat\": {\n        \"supportsStore\": false,\n        \"supportsDeveloperRole\": false,\n        \"supportsReasoningEffort\": true,\n        \"supportsUsageInStreaming\": true,\n        \"maxTokensField\": \"max_tokens\",\n        \"supportsStrictMode\": false,\n        \"thinkingFormat\": \"deepseek\",\n        \"requiresReasoningContentOnAssistantMessages\": true\n      },\n      \"models\": [\n        {\n          \"id\": \"deepseek-v4-flash\",\n          \"name\": \"DeepSeek V4 Flash (ds4.c local)\",\n          \"reasoning\": true,\n          \"thinkingLevelMap\": {\n            \"off\": null,\n            \"minimal\": \"low\",\n            \"low\": \"low\",\n            \"medium\": \"medium\",\n            \"high\": \"high\",\n            \"xhigh\": \"xhigh\"\n          },\n          \"input\": [\"text\"],\n          \"contextWindow\": 100000,\n          \"maxTokens\": 384000,\n          \"cost\": {\n            \"input\": 0,\n            \"output\": 0,\n            \"cacheRead\": 0,\n            \"cacheWrite\": 0\n          }\n        }\n      ]\n    }\n  }\n}\n```\n\nOptionally make it the default Pi model in `~/.pi/agent/settings.json`:\n\n```json\n{\n  \"defaultProvider\": \"ds4\",\n  \"defaultModel\": \"deepseek-v4-flash\"\n}\n```\n\nFor **Claude Code**, use the Anthropic-compatible endpoint. A wrapper like this\nmatches the local `~/bin/claude-ds4` setup:\n\n```sh\n#!/bin/sh\nunset ANTHROPIC_API_KEY\n\nexport ANTHROPIC_BASE_URL=\"${DS4_ANTHROPIC_BASE_URL:-http://127.0.0.1:8000}\"\nexport ANTHROPIC_AUTH_TOKEN=\"${DS4_API_KEY:-dsv4-local}\"\nexport ANTHROPIC_MODEL=\"deepseek-v4-flash\"\n\nexport ANTHROPIC_CUSTOM_MODEL_OPTION=\"deepseek-v4-flash\"\nexport ANTHROPIC_CUSTOM_MODEL_OPTION_NAME=\"DeepSeek V4 Flash local ds4\"\nexport ANTHROPIC_CUSTOM_MODEL_OPTION_DESCRIPTION=\"ds4.c local GGUF\"\n\nexport ANTHROPIC_DEFAULT_SONNET_MODEL=\"deepseek-v4-flash\"\nexport ANTHROPIC_DEFAULT_HAIKU_MODEL=\"deepseek-v4-flash\"\nexport ANTHROPIC_DEFAULT_OPUS_MODEL=\"deepseek-v4-flash\"\nexport CLAUDE_CODE_SUBAGENT_MODEL=\"deepseek-v4-flash\"\n\nexport CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1\nexport CLAUDE_CODE_DISABLE_NONSTREAMING_FALLBACK=1\nexport CLAUDE_STREAM_IDLE_TIMEOUT_MS=600000\n\nexec \"$HOME/.local/bin/claude\" \"$@\"\n```\n\nClaude Code may send a large initial prompt, often around 25k tokens, before it\nstarts doing useful work. Keep `--kv-disk-dir` enabled: after the first expensive\nprefill, the disk KV cache lets later continuations or restarted sessions reuse\nthe saved prefix instead of processing the whole prompt again.\n\n## Thinking Modes\n\nDeepSeek V4 Flash has distinct non-thinking, thinking, and Think Max modes.\nThe server defaults to thinking mode. `reasoning_effort=max` requests Think\nMax, but it is only applied when the context size is large enough for the model\ncard recommendation; smaller contexts fall back to normal thinking. OpenAI\n`reasoning_effort=xhigh` still maps to normal thinking, not Think Max.\n\nFor direct replies, use `thinking: {\"type\":\"disabled\"}`, `think:false`, or a\nnon-thinking model alias such as `deepseek-chat`.\n\n## Disk KV Cache\n\nChat/completion APIs are stateless: agent clients usually resend the whole\nconversation every request. `ds4-server` handles this by comparing the rendered\ntoken stream with cached token prefixes. The live in-memory checkpoint covers\nthe current session; the disk KV cache makes useful prefixes survive session\nswitches and server restarts.\n\nFor RAM reasons there is currently only one live KV cache in memory. When a new\nunrelated session replaces it, the old checkpoint can only be resumed without\nre-processing if it was written to the disk KV cache. In other words, memory\ncache handles the active session; disk cache is the resume mechanism for\ndifferent sessions.\n\nEnable it with:\n\n```sh\n./ds4-server --kv-disk-dir /tmp/ds4-kv --kv-disk-space-mb 8192\n```\n\nThe cache key is the SHA1 of exact token IDs, not raw text. Each token ID is\nhashed as a little-endian 32-bit integer, and files are named `<sha1>.kv`.\nThe file is intentionally written with ordinary `read`/`write` I/O, not\n`mmap`, so restoring cache entries does not add more VM mappings to a process\nthat already maps the model.\n\nOn disk, a cache file is:\n\n```text\nKVC fixed header, 48 bytes\nu32 rendered_text_bytes\nrendered_text_bytes of UTF-8-ish token text\nDS4 session payload, payload_bytes from the KVC header\n```\n\nThe fixed header is little-endian:\n\n```text\n0   u8[3]  magic = \"KVC\"\n3   u8     version = 1\n4   u8     routed expert quant bits, currently 2 or 4\n5   u8     save reason: 0 unknown, 1 cold, 2 continued, 3 evict, 4 shutdown\n6   u8[2]  reserved\n8   u32    cached token count\n12  u32    hit count\n16  u32    context size the snapshot was written for\n20  u8[4]  reserved\n24  u64    creation Unix time\n32  u64    last-used Unix time\n40  u64    DS4 session payload byte count\n```\n\nThe rendered text is the tokenizer-decoded text for the cached token prefix.\nIt is stored only for observability, so humans can inspect a cache directory\nwithout decoding token IDs. It is not used as the key and it is not trusted\nwhen loading; after load, the stored checkpoint tokens must still match the\nincoming request prefix.\n\nThe DS4 session payload starts with thirteen little-endian `u32` fields:\n\n```text\n0   magic = \"DSV4\"\n1   payload version = 1\n2   saved context size\n3   prefill chunk size\n4   raw KV ring capacity\n5   raw sliding-window length\n6   compressed KV capacity\n7   checkpoint token count\n8   layer count\n9   raw/head KV dimension\n10  indexer head dimension\n11  vocabulary size\n12  live raw rows serialized below\n```\n\nThen it stores:\n\n- `u32[token_count]` checkpoint token IDs.\n- `float32[vocab_size]` logits for the next token after that checkpoint.\n- `u32[layer_count]` compressed attention row counts.\n- `u32[layer_count]` ratio-4 indexer row counts.\n- For every layer: the live raw sliding-window KV rows, written in logical\n  position order rather than physical ring order.\n- For compressed layers: live compressed KV rows and compressor frontier\n  tensors.\n- For ratio-4 compressed layers: live indexer compressed rows and indexer\n  frontier tensors.\n\nThe logits are raw IEEE-754 `float32` values from the host `ds4_session`\nbuffer. They are saved immediately after the checkpoint tokens so a loaded\nsnapshot can sample or continue from the exact next-token distribution without\nrunning one extra decode step. MTP draft logits/state are not persisted; after\nloading a disk checkpoint the draft state is invalidated and rebuilt by normal\ngeneration.\n\nThe tensor payload is DS4-specific KV/session state, not a generic inference\ngraph dump. It is expected to be portable only across compatible `ds4.c`\nbuilds for this model layout.\n\nThe cache stores checkpoints at four moments:\n\n- `cold`: after a long first prompt reaches a stable prefix, before generation.\n- `continued`: when prefill or generation advances the live conversation by the configured interval.\n- `evict`: before an unrelated request replaces the live in-memory session.\n- `shutdown`: when the server exits cleanly.\n\nCold saves intentionally trim a small token suffix and align down to a prefill\nchunk boundary. This avoids common BPE boundary retokenization misses when a\nfuture request appends text to the same prompt. The defaults are conservative:\nstore prefixes of at least 512 tokens, cold-save prompts up to 30000 tokens,\ntrim 32 tail tokens, and align to 2048-token chunks. The important knobs are:\n\n- `--kv-cache-min-tokens`\n- `--kv-cache-cold-max-tokens`\n- `--kv-cache-continued-interval-tokens`\n- `--kv-cache-boundary-trim-tokens`\n- `--kv-cache-boundary-align-tokens`\n\nBy default, checkpoints may be reused across the 2-bit and 4-bit routed-expert\nvariants if the token prefix matches. Use `--kv-cache-reject-different-quant`\nwhen you want strict same-quant reuse only.\n\nThe cache directory is disposable. If behavior looks suspicious, stop the\nserver and remove it. You can investigate what is cached with hexdump as\nthe kv cache files include the verbatim prompt cached.\n\n## Backends\n\nThe default backend is Metal:\n\n```sh\n./ds4 -p \"Hello\" --metal\n```\n\nThere is also a CPU reference/debug path:\n\n```sh\n./ds4 -p \"Hello\" --cpu\n```\n\nDo not treat the CPU path as the production target. The server is Metal-only,\nand the optimized implementation lives in the Metal graph path. This may\nchange in the future.\n\n## Test Vectors\n\n`tests/test-vectors` contains short and long-context continuation vectors\ncaptured from the official DeepSeek V4 Flash API. The requests use\n`deepseek-v4-flash`, greedy decoding, thinking disabled, and the maximum\n`top_logprobs` slice exposed by the API. Local vectors are generated with\n`./ds4 --dump-logprobs` and compared by token bytes, so tokenizer/template or\nattention regressions show up before they become long generation failures.\n\nAll project tests are driven by the C runner:\n\n```sh\nmake test                  # ./ds4_test --all\n./ds4_test --logprob-vectors\n./ds4_test --server\n```\n","summary":"This project implements a lightweight native inference engine specifically for DeepSeek V4 Flash, using a Metal‑based graph executor that handles model loading, prompt rendering, KV caching, and exposes a server API. It is optimized for DeepSeek’s large‑context, low‑parameter model—supporting a 1‑million‑token window, 2‑bit quantization, and disk‑resident KV caches that enable long‑form inference on high‑end Macs or machines with 128 GB RAM. The engine is tightly coupled to the official GGUF files and includes extensive validation against the model’s reference logits, making it ideal for developers who need reliable, end‑to‑end local inference of DeepSeek models on macOS.","description":"DeepSeek 4 Flash local inference engine for Metal","stars":2201,"language":"C"},{"owner":"ammaarreshi","repo":"gemma-chat","url":"https://github.com/ammaarreshi/gemma-chat","readme":"<p align=\"center\">\n  <img src=\"gemma-extruded-app.png\" alt=\"Gemma Chat\" width=\"180\" />\n</p>\n\n<h1 align=\"center\">Gemma Chat</h1>\n\n<p align=\"center\">\n  <strong>Vibe code without the internet.</strong><br/>\n  A local coding agent powered by Google's Gemma 4 — runs entirely on your Mac via Apple's MLX framework.<br/>\n  No API keys. No cloud. No Wi-Fi required.\n</p>\n\n---\n\n<img width=\"960\" height=\"593\" alt=\"Gemma4-Vibecoding\" src=\"https://github.com/use
