e new users through product setup with interactive agents that adapt to each user's pace and knowledge level.\n\n### Quality Assurance & Evaluation\nAutomate LLM evaluation pipelines — define test cases, run evaluations across models, and generate benchmark reports automatically.\n\n### Internal Helpdesk\nProvide IT support, HR policy lookups, and facility requests through a single agent interface connected to your internal knowledge base.\n\n### E-commerce Assistant\nPower product recommendations, order tracking, cancellation requests, and inventory inquiries — connected to your commerce backend.\n\n### Healthcare Triage\nDeploy agents that conduct initial symptom assessment, schedule appointments, and route critical cases to the appropriate specialist.\n\n### Education Tutor\nBuild adaptive tutoring agents that personalize learning paths, grade assignments, and provide real-time feedback to students.\n\n### Content Moderation\nScan user-generated content for harmful patterns, flag violations, and take appropriate action — all within configurable safety boundaries.\n\n### Financial Advisory\nCreate agents that analyze portfolios, generate market summaries, assess risk profiles, and provide data-driven financial insights.\n\n### Agentic ERP\nOrchestrate enterprise resource planning workflows — supply chain monitoring, inventory optimization, procurement automation, and financial reconciliation — through specialized agents that coordinate across departments.\n\n### AI Workflow Orchestration\nDesign end-to-end AI pipelines where agents manage the entire lifecycle: data ingestion, preprocessing, model training, evaluation, and deployment — with each stage handled by a specialized agent.\n\n---\n\n## Architecture Overview\n\n```\nUser Message\n    ↓\nChannel (Telegram, Web, WhatsApp, etc.)\n    ↓\nAgent Runtime\n    ├── Load agent config (system prompt, model, tools)\n    ├── Load/create session (per-user persistence)\n    ├── Build messages (system prompt + history + new message)\n    ├── Call LLM\n    ├── Execute tool calls (if any)\n    ├── Heuristic safety check on every action\n    └── Loop until final response\n    ↓\nResponse → Channel → User\n```\n\n---\n\n## License\n\nEvonic is open source. See the [LICENSE](LICENSE) file for details.\n\n---\n\n*Built with ❤️ by [Robin Syihab](https://github.com/anvie)*\n","summary":"Evonic is an agentic AI framework that lets you design, build, and orchestrate intelligent agents from concept to production, giving full control over the model, tools, knowledge base, channels, and skills that each agent uses. It supports pluggable LLM backends, installable skill packages, an event‑driven plugin system, and a lightweight Go connector (Evonet) that enables agents to run anywhere—from local sandboxes to remote SSH servers and cloud instances—through the common “Workplace” abstraction. Native agent‑to‑agent communication, a cron‑style scheduler, and a real‑time heuristic safekeeper that flags and escalates potentially harmful actions make multi‑agent swarms both powerful and secure. Developers, data scientists, and operations teams can use Evonic to create distributed, autonomous agent networks that operate safely across heterogeneous infrastructure.","description":"Open Agentic AI Platform - The home your agents deserve","stars":187,"language":"Python"},{"owner":"jmerelnyc","repo":"Photo-agents","url":"https://github.com/jmerelnyc/Photo-agents","readme":"# Photo Agents\n\n<img width=\"2688\" height=\"1520\" alt=\"hf_20260504_103619_aaebb60a-ba3e-4763-a5b2-7771293ce9d6\" src=\"https://github.com/user-attachments/assets/b190236d-d0cc-448f-a6eb-4c7bf4c6f7b7\" />\n\nAutonomous self-evolving **Photo Agents**. A perceive / reason / act framework for photo-aware agents that operate your computer the way you do.\n\n> \"100% autonomous, self-evolving agents.\"\n> [photo-agents.com](https://photo-agents.com)\n\n[## Star History\n\n<a href=\"https://www.star-history.com/?repos=jmerelnyc%2FPhoto-agents&type=timeline&legend=bottom-right\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=jmerelnyc/Photo-agents&type=timeline&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=jmerelnyc/Photo-agents&type=timeline&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=jmerelnyc/Photo-agents&type=timeline&legend=top-left\" />\n </picture>\n</a>](https://www.star-history.com/?repos=jmerelnyc%2FPhoto-agents&type=timeline&logscale=&legend=top-left)\n\n## About\n\nPhoto Agents is building the next generation of LLM-driven agents that ground in what they actually see on screen. Instead of dumping longer chat transcripts into a model and hoping for the best we treat memory the way biology does. Vision in. Bound observations stored in layers. Skills written by the agent itself from real success.\n\nThe package in this repo is the runtime that ships that idea. It runs locally so you keep ownership of your screen your data and your keys.\n\n- Website: https://photo-agents.com\n- X / Twitter: https://x.com/photoagents\n\nFollow [@photoagents](https://x.com/photoagents) on X for build notes demos and the occasional rant about why text-only agents will never see your UI.\n\n## What it is\n\nPhoto Agents is a single Python package that bundles:\n\n- A streaming **agent loop** (`photoagents.core.loop.run_agent_session`) that drives any tool-calling LLM through a perceive → reason → act cycle.\n- A **multi-provider LLM router** (`photoagents.llm.router`) with first-class support for Anthropic Claude (native) OpenAI GPT (native) and a mixin failover session.\n- A **physical-execution toolset**: file I/O, sandboxed code execution (Python / PowerShell / bash), browser automation via a Chrome DevTools Protocol bridge and a layered memory system (working / global / SOP / session archive).\n- Pluggable **clients**: a polished Streamlit web app, a PyQt desktop app, a desktop companion and ready-to-run bots for Telegram, QQ, Feishu, WeCom and DingTalk.\n- Optional **observability** via Langfuse and a cron-style scheduler.\n\nThe whole thing is gated by a remote-validated **Photo Agents API key** so usage stays accountable.\n\n## Install\n\n```bash\npip install photoagents\n# or, with every optional client and integration\npip install \"photoagents[all]\"\n```\n\nPhoto Agents needs Python 3.10+.\n\n## Get an API key\n\nPhoto Agents requires a license key, validated against `https://photo-agents.com/v1/keys/validate`. Sign in and create one at:\n\n> **https://photo-agents.com/dashboard/keys**\n\nThen make it available to the runtime in any of these ways (checked in order):\n\n1. Environment variable: `PHOTOAGENTS_API_KEY=pk_live_...`\n2. Saved config: `~/.photoagents/config.json` field `api_key`\n3. Interactive prompt on first run (offered to be saved automatically)\n\nA successful validation is cached for 24 hours so the gate stays fast.\n\n## LLM credentials\n\nCopy the credentials template and fill in your provider key:\n\n```bash\n# from the repo root\ncp photoagents/config/keys_template.py credentials.py\n# then edit credentials.py and uncomment one of the provider configs\n```\n\nThe runtime also accepts a JSON form (`credentials.json`) with the same shape.\n\n## Run\n\n```bash\n# Interactive REPL on your terminal\npython -m photoagents\n\n# One-shot file-IO mode\npython -m photoagents --task my_task --input \"List the largest files in this directory.\"\n\n# Reflect / watchdog mode (your check() function fires the next task)\npython -m photoagents --reflect photoagents/evolution/scheduler.py\n```\n\n## GUI clients\n\nPhoto Agents ships several optional frontends. Pick whichever fits your workflow:\n\n| Client                         | Launch command                                      |\n| ------------------------------ | --------------------------------------------------- |\n| Streamlit web app + webview    | `pythonw -m photoagents.cli.launcher`               |\n| Service hub (start/stop)       | `pythonw -m photoagents.cli.hub`                    |\n| Desktop app (PyQt)             | `python -m photoagents.clients.desktop_app`         |\n| Desktop companion              | `pythonw -m photoagents.clients.companion_v2`      |\n| Telegram bot                   | `python -m photoagents.clients.telegram_client`     |\n| Feishu / WeCom / DingTalk / QQ | `python -m photoagents.clients.<feishu|wecom|...>_client` |\n\nThe launcher and hub both call the same API key gate before starting any service, so they will refuse to launch anything if your key is missing or revoked.\n\n## On-disk state\n\n| Path                              | What lives there                                  |\n| --------------------------------- | -------------------------------------------------- |\n| `~/.photoagents/config.json`      | API key + license validation cache                 |\n| `~/.photoagents/global_mem.txt`   | Long-term L2 facts                                 |\n| `~/.photoagents/sessions/`        | L4 raw session archives                            |\n| `~/.photoagents/skill_index/`     | Vector index for skill / SOP search                |\n| `~/.photoagents/temp/`            | Per-task scratch (logs, intermediate output)       |\n\n## Project layout\n\n```\nphotoagents/\n├── auth/        License gate (remote-validated API key)\n├── cli/         python -m photoagents, GUI launcher, service hub\n├── clients/     Web / desktop / chat-platform frontends\n├── config/      credentials.py template\n├── core/        Agent loop and tool dispatcher\n├── evolution/   Reflection / scheduler scripts (the \"self-evolving\" loop)\n├── integrations/Optional third-party hooks (Langfuse, etc.)\n├── llm/         Multi-provider session router\n├── resources/   System prompt, tool schema, CDP bridge, demo media\n├── skills/      L3 SOPs and helper modules (browser, vision, OCR, ...)\n└── web/         DOM simplifier and Chrome DevTools Protocol driver\n```\n\n## License\n\nMIT. See [LICENSE](LICENSE).\n\n## Status\n\nStatus: beta. APIs may change before 1.0.\n\n\n\n","summary":"Photo Agents is a Python package that creates autonomous, self‑evolving agents able to perceive what is displayed on a computer screen, reason about that visual context, and act accordingly—essentially giving an LLM a hands‑on, UI‑aware workflow. It supplies a streaming agent loop that works with multiple LLM providers, a suite of physical‑execution tools such as file I/O, sandboxed script runs, and browser automation, along with a layered memory system and optional observability hooks. The runtime runs locally behind a validated API key and ships several ready‑made interfaces, including a Streamlit web app, a PyQt desktop client, and bots for platforms like Telegram and WeCom. These capabilities make it especially useful for developers and power users who need privacy‑preserving, UI‑grounded automation or who want to prototype LLM‑driven agents that act just like a human user.","description":"Autonomous self-evolving agents. Vision-grounded layered memory and self-written skills for LLM agents that operate your computer.","stars":189,"language":"Python"},{"owner":"alvinunreal","repo":"claude-pets","url":"https://github.com/alvinunreal/claude-pets","readme":"<p align=\"center\">\n  <img src=\"assets/claude-pets.png\" alt=\"Claude Pets - pixel art Claude Code integration for OpenPets\" width=\"100%\" />\n</p>\n\n<h1 align=\"center\">Claude Pets</h1>\n\n<p align=\"center\">\n  <strong>Make Claude Code feel alive with OpenPets.</strong>\n</p>\n\n<p align=\"center\">\n  Tiny Claude Code hooks that update your desktop pet while Claude works.\n</p>\n\n---\n## Video\n\n\nhttps://github.com/user-attachments/assets/a10edb8a-d13a-4b99-96bc-ea5c7cade741\n\n\n\n## What is Claude Pets?\n\nClaude Pets connects Claude Code activity to [OpenPets](https://github.com/alvinunreal/openpets), a local desktop pet.\n\n## Requirements\n\n- [Bun](https://bun.com) `>= 1.3.0`\n- Claude Code\n- OpenPets desktop app\n\n## Quick start\n\n### 1. Install OpenPets desktop\n\nDownload the latest OpenPets app:\n\nhttps://github.com/alvinunreal/openpets/releases/latest\n\nPick the file for your OS:\n\n- **macOS Apple Silicon**: `OpenPets-*-arm64.dmg` or `OpenPets-*-arm64.zip`\n- **Windows**: `OpenPets-Setup-*-x64.exe`\n- **Linux**: `OpenPets-*-x86_64.AppImage` or `OpenPets-*-amd64.deb`\n\nOpen the app once. You should see the pet on your desktop and an OpenPets tray/menu-bar icon.\n\n> Preview builds are unsigned, so macOS or Windows may show a warning on first launch.\n\nIf macOS says the app is damaged or should be moved to Trash, remove the quarantine flag and open it again:\n\n```bash\nxattr -dr com.apple.quarantine /Applications/OpenPets.app\nopen /Applications/OpenPets.app\n```\n\n### 2. Add OpenPets to Claude Code\n\nThis gives Claude Code tools for talking to and controlling the pet:\n\n```bash\nclaude mcp add -s user openpets -- bunx @open-pets/mcp\n```\n\nRestart Claude Code, then check:\n\n```bash\nclaude mcp list\n```\n\nYou should see `openpets`.\n\n### 3. Enable automatic Claude reactions\n\nInstall Claude Pets hooks globally:\n\n```bash\nbunx @open-pets/claude-pets install\n```\n\nThis updates your user-wide Claude Code settings:\n\n```txt\n~/.claude/settings.json\n```\n\nThe installer preserves unrelated settings and creates a backup before writing.\n\nRestart Claude Code after installing, then run `/hooks` in Claude Code. The Claude Pets commands should appear under user settings. If they do not appear there, Claude Code has not loaded the hooks yet.\n\n## Test it\n\nWith OpenPets running:\n\n```bash\nbunx @open-pets/claude-pets test-event thinking\n```\n\nYour pet should animate briefly, then return to idle.\n\nYou can also try:\n\n```bash\nbunx @open-pets/claude-pets test-event testing\nbunx @open-pets/claude-pets test-event success\n```\n\n## Uninstall\n\nRemove the global hooks:\n\n```bash\nbunx @open-pets/claude-pets uninstall\n```\n\nThis only removes Claude Pets managed hook commands from `~/.claude/settings.json`.\n\n## Troubleshooting\n\n### OpenPets is not reacting\n\n1. Start the OpenPets desktop app.\n2. Run:\n\n```bash\nbunx @open-pets/claude-pets test-event thinking\n```\n\n3. If nothing happens, restart OpenPets and try again.\n\n### Hooks are not firing\n\n1. Make sure you installed hooks:\n\n```bash\nbunx @open-pets/claude-pets install\n```\n\n2. Restart Claude Code.\n3. In Claude Code, run `/hooks` and confirm the Claude Pets command appears under user settings. Treat `/hooks` as the source of truth: if Claude Pets is not listed there, Claude Code has not loaded the hooks.\n4. Check that `~/.claude/settings.json` contains `@open-pets/claude-pets`.\n5. If `bunx @open-pets/claude-pets test-event thinking` works but normal Claude Code prompts do not update the pet, the desktop app is working and the issue is hook loading.\n\nOn Windows, you can also test the hook command directly from PowerShell while OpenPets is running:\n\n```powershell\n'{\"hook_event_name\":\"UserPromptSubmit\"}' | bunx --bun @open-pets/claude-pets hook\n```\n\nIf this makes the pet think, the hook command works and Claude Code still needs to load the hook config.\n\n### Bun is missing\n\nInstall Bun first:\n\nhttps://bun.com\n\n### Restore settings from backup\n\nEvery write creates a backup next to the settings file:\n\n```txt\n~/.claude/settings.json.bak-<timestamp>\n```\n\nQuit Claude Code, copy the backup over `~/.claude/settings.json`, then restart Claude Code.\n\n## Advanced\n\n### Project-only install\n\nGlobal install is recommended. Project-only hooks are written to `.claude/settings.local.json`, but Claude Code must load that project settings file for the hooks to run. Always verify project-only installs with `/hooks`.\n\nIf you only want Claude Pets hooks in one project, run this from that project root:\n\n```bash\nbunx @open-pets/claude-pets install --project\n```\n\nThis writes project-local settings instead:\n\n```txt\n.claude/settings.local.json\n```\n\nUninstall project-local hooks with:\n\n```bash\nbunx @open-pets/claude-pets uninstall --project\n```\n\n### Preview settings without writing\n\n```bash\nbunx @open-pets/claude-pets install --dry-run\n```\n\n### Print the hook settings snippet\n\n```bash\nbunx @open-pets/claude-pets print\n```\n\nProduction hooks use this command:\n\n```txt\nbunx --bun @open-pets/claude-pets@<package-version> hook\n```\n\nThe installer derives `<package-version>` from the installed package so hook commands stay in sync with the published release.\n\n### Diagnose your setup\n\n```bash\nbunx @open-pets/claude-pets doctor\n```\n\nUse `--project` to inspect project-local hooks:\n\n```bash\nbunx @open-pets/claude-pets doctor --project\n```\n\nIf you launch Claude Code with `CLAUDE_CONFIG_DIR`, run `doctor` with the same environment variable so it inspects the same profile:\n\n```bash\nCLAUDE_CONFIG_DIR=/path/to/claude-profile bunx @open-pets/claude-pets doctor\n```\n\n## Commands\n\n```txt\nclaude-pets install [--dry-run] [--project] [--local-command]\nclaude-pets uninstall [--dry-run] [--project]\nclaude-pets print [--local-command]\nclaude-pets hook\nclaude-pets test-event <state>\nclaude-pets doctor [--project]\n```\n\n## Local development\n\n```bash\ngit clone https://github.com/alvinunreal/claude-pets.git\ncd claude-pets\nbun install\nbun test\nbun run typecheck\nbun run build\n```\n\nInstall hooks pointing at your local checkout:\n\n```bash\nbun src/cli.ts install --local-command\n```\n\n## Recommended setup\n\nUse both OpenPets integrations for the best experience:\n\n1. **OpenPets MCP** - lets Claude intentionally speak/control the pet.\n2. **Claude Pets hooks** - automatic background state changes while Claude works.\n","summary":"Claude Pets is a lightweight integration that connects Claude Code’s activity to the OpenPets desktop pet application, enabling the pet to react to coding events. It provides hooks that update the pet’s animations during prompts, tests, and other Claude actions, and can be installed or uninstalled globally via Bun. Developers, designers, or anyone using Claude Code who wants a playful, responsive desktop pet experience will benefit from this simple, cross‑platform setup. The project offers step‑by‑step instructions, troubleshooting guidance, and backup handling to ensure smooth operation.","description":"Claude Code integration for OpenPets: automatic desktop pet status updates with one-command setup.","stars":135,"language":"TypeScript"},{"owner":"youssofal","repo":"MTPLX","url":"https://github.com/youssofal/MTPLX","readme":"<div align=\"center\">\n\n<img src=\"docs/assets/readme/hero.svg\" alt=\"MTPLX\" width=\"100%\" />\n\n# **Native MTP speculative decoding on Apple Silicon**\n\n**~2.24× over no-MTP AR at `temp=0.6`** on Qwen3.6-27B · math-correct rejection sampling · MLX-native · zero external drafter\n\n<sub>Multiplier is hardware-independent. Absolute tok/s scales with memory bandwidth — current public record on M5 Max: **63.056 / 62.886 tok/s** D3, [`Youssofal/Qwen3.6-27B-MTPLX-Optimized-Speed`](https://huggingface.co/Youssofal/Qwen3.6-27B-MTPLX-Optimized-Speed).</sub>\n\n[![CI](https://github.com/youssofal/mtplx/actions/workflows/ci.yml/badge.svg)](https://github.com/youssofal/mtplx/actions/workflows/ci.yml)\n[![PyPI](https://img.shields.io/pypi/v/mtplx?label=PyPI)](https://pypi.org/project/mtplx/)\n[![Python](https://img.shields.io/badge/python-3.11%2B-blue)](https://www.python.org/)\n[![macOS Apple Silicon](https://img.shields.io/badge/macOS-Apple%20Silicon-black?logo=apple)](https://developer.apple.com/metal/)\n[![Status](https://img.shields.io/badge/status-v0.2.1-blue)](CHANGELOG.md)\n[![License](https://img.shields.io/badge/license-Apache--2.0-green)](LICENSE)\n\n</div>\n\n---\n\n**Permissive open source.** MTPLX is Apache-2.0: you can use it, modify it, and ship it commercially. If you redistribute MTPLX, keep the license and NOTICE attribution; for public projects and research, visible credit or citation is strongly appreciated.\n\nMTPLX runs **the model's own built-in MTP heads** as a speculative drafter, with **exact probability-ratio acceptance + residual correction** — not the greedy-argmax trick most fast-decode tools use at T>0. That means real coding settings (`temperature=0.6`, `top_p=0.95`, `top_k=20`) actually get the speculative speedup *and* keep the target model's distribution.\n\nThis is **not** DFlash, DDTree, llama-spec, or an external-drafter system. It's a native-MTP runtime built around MLX, Apple Silicon, and a real OpenAI/Anthropic-compatible serving surface.\n\nInstall:\n\n```bash\nbrew install youssofal/mtplx/mtplx\nmtplx start            # interactive: pick model → mode → web/CLI/Pi, then chat\n```\n\nThe Homebrew installer sets up the `mtplx` command in `/opt/homebrew/bin` and bootstraps the Python runtime under `/opt/homebrew/var/mtplx`. Python users can also run `python3 -m pip install -U mtplx`.\n\nThat's it. The wizard handles the default speed model (`Youssofal/Qwen3.6-27B-MTPLX-Optimized-Speed`), runtime mode (Sustained / Sustained Max / Burst), and surface (browser chat at `127.0.0.1:8000/`, terminal chat, or a Pi coding-agent connection) on first run. On every subsequent run it asks \"same as last time?\" so you're one keypress from chatting.\n\n---\n\n## What you get\n\n- **Native MTP speculative decoding.** Built-in MTP heads, no external drafter, no RAM hit for a second model.\n- **Math-correct sampling at T=0.6.** Probability-ratio acceptance with residual correction. Verified `max_diff = 0.0` against reference single-token AR on the verified Qwen3.6-27B path.\n- **~2.24× over no-MTP AR at `temp=0.6`.** The hardware-independent number, which the CLI reports as `mean_speedup_vs_ar`. Verified contract on the public default `Youssofal/Qwen3.6-27B-MTPLX-Optimized-Speed`: `63.056 / 62.886 tok/s` MTP-D3 vs `28.156 tok/s` no-MTP AR, on Apple Silicon M5 Max with `--max` fans, target sampler `temp=0.6 top_p=0.95 top_k=20`, draft sampler `temp=0.70`. Absolute tok/s scales with memory bandwidth; the 2.24× multiplier doesn't.\n- **Real serving surface.** OpenAI-compatible `/v1/chat/completions` + `/v1/completions` + `/v1/models`, Anthropic-compatible `/v1/messages` (streaming SSE), `/health`, `/metrics`. Plug it into Pi, Open WebUI, OpenClaw, Claude Code, Cline, Continue, or anything that speaks OpenAI.\n- **Agent tool calls.** OpenAI-style `tools` / `tool_choice`, structured `message.tool_calls`, streaming `delta.tool_calls`, and tool-result history are supported so agent clients execute tools instead of printing Qwen tool markup.\n- **In-browser chat UI** with auto-detected model context (256k for Qwen3.6), live tokens-per-second, markdown rendering, code-block copy buttons, a stop button, an MTP on/off toggle, and a settings sidebar that persists per-machine.\n- **Interactive start wizard.** Pick model, mode, and surface in three numbered prompts. Returning users get \"same as last time?\". No flag-soup required.\n- **Local-folder model picker.** Point the wizard at any parent directory — your `~/models/`, the LM Studio cache, the HuggingFace cache — and it walks the tree, classifies each model into the four-tier compatibility contract, and presents a numbered picker. Config-only classification, never mmaps a tensor file, so a single APFS-dataless or partial download in the tree can't crash the picker.\n- **One-line live download progress.** Single rich-rendered line with bar / percent / GB / speed / ETA, streamed at 8 fps. HuggingFace's tqdm bars are suppressed during the download so they don't fight the MTPLX UI for terminal real estate.\n- **Honest mode names that tell you what they do.**\n  - `Sustained` — default long-context native-MTP path (`--profile sustained`) with chunked prefill, final-token logits, request-sized paged KV, and the normal Apple fan controller.\n  - `Sustained Max` — Sustained plus ThermalForge fans pinned at 100% (`--profile sustained --max`) for explicit fan-backed long-context runs.\n  - `Burst` — old max-fan performance-cold lane (`--profile performance-cold --max`), **not recommended**, max 8K context. This is the recorded headline lane (`63.056 / 62.886 tok/s` MTP vs `28.156 tok/s` AR on M5 Max), loud by design.\n  - `Stable` — hidden compatibility flag (`--profile stable` / `--profile safe`) for the exact/staged long-reply path.\n- **Crash-safe fan control.** When Sustained Max or Burst is on, MTPLX spawns a detached watchdog that restores fans to auto if the parent dies for any reason — including `kill -9` and \"I closed the terminal\". Verified live on hardware.\n- **Idle-aware fan-backed modes.** Server tracks request activity; after 15 minutes of no chat, fans drop to auto, then ramp back up on the next message.\n- **Four-tier model compatibility contract.** `mtplx inspect <model>` reports: verified / arch-compatible-unverified / incompatible-architecture / no-MTP. No silent garbage runs.\n- **Lazy imports.** `mtplx --help`, `doctor`, `inspect`, `init`, `setup` work on a fresh venv *without MLX installed*. Generation and serving pull in MLX only when needed.\n- **v0.2.1 status: fast-prefill hotfix release**, including Sustained long-context PP/TPS improvements, Pi onboarding, corrected OpenAI tools streaming, and a guard against stale config silently selecting the unsafe long-context Burst path.\n\n> **Release honesty.** Burst is the old fan-backed headline lane and is capped in the UI at short contexts only. Sustained is the explicit long-context memory-safety lane; it is not an AR downgrade. Long no-fan decode decay remains a future runtime track; see [Roadmap](#roadmap).\n\n---\n\n## Quick start (full)\n\n```bash\n# 1. Install on macOS\nbrew install youssofal/mtplx/mtplx\n\n# 2. Verify the install\nmtplx help\nmtplx doctor --json\n\n# 3. Chat (the wizard does everything)\nmtplx start\n```\n\nPower-user shortcuts (any of these skip the wizard):\n\n```bash\nmtplx start --fresh                         # re-run the wizard from scratch\nmtplx start cli                             # terminal chat directly\nmtplx start pi                              # configure Pi and start MTPLX for Pi\nmtplx start cli --no-mtp                    # target-only AR generation\nmtplx start --profile sustained             # long-context native-MTP mode\nmtplx start --max                           # Sustained Max browser chat with fan boost\nmtplx start --model /path/to/model          # use a specific local or HF model\nmtplx pull Youssofal/Qwen3.6-27B-MTPLX-Optimized-Speed\nmtplx quickstart --profile sustained --port 8000  # API server only, no chat\n```\n\nIf `mtplx start pi` cannot find the `pi` command, it stops before loading the\nmodel, prints `npm install -g @earendil-works/pi-coding-agent`, and offers to\ninstall Pi from the wizard path.\n\nOpenAI-compatible smoke test:\n\n```bash\ncurl http://127.0.0.1:8000/v1/chat/completions \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"model\":\"mtplx\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}],\"stream\":true}'\n```\n\nSet `\"generation_mode\":\"ar\"` per request to compare target-only AR against the default native-MTP path without unloading the model.\n\nHomebrew writes a durable launcher so `mtplx` works from a normal new Terminal tab. The older script installer remains available if you prefer a user-local venv:\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/youssofal/MTPLX/main/scripts/install_macos.sh | bash\n```\n\nFor Python-only installs, PyPI is also available:\n\n```bash\npython3 -m pip install -U mtplx\n```\n\n---\n\n## How it actually works\n\nMost \"fast decode on Apple Silicon\" projects fall into one of three buckets:\n\n| Approach | What they do at T>0 | What MTPLX does |\n|---|---|---|\n| llama.cpp / mlx-lm AR | No speculation, target model only | Speculative with a built-in drafter |\n| DFlash, prefix-match speculation | Greedy-argmax equality (silently breaks at T>0) | Probability-ratio acceptance + residual correction |\n| External-drafter speculation | Loads a second model into RAM | Uses the target's own MTP heads — zero extra RAM |\n\nThe math-correctness wedge is real. At `temperature=0.6`, the difference between \"rejected because the draft argmax disagrees\" and \"rejected via the Leviathan/Chen rejection-sampling theorem\" is the difference between a benchmark trick and a runtime your code editor can trust. MTPLX does the latter, including residual correction `(p − q)+` for the cases where the draft was rejected.\n\n**Verified evidence (current public default `Youssofal/Qwen3.6-27B-MTPLX-Optimized-Speed`):**\n- **~2.24× over matched no-MTP AR at `temp=0.6`** on Apple Silicon M5 Max: `63.056 / 62.886 tok/s` MTP-D3 paired runs vs `28.156 tok/s` no-MTP AR, same machine, same target sampler (`temp=0.6 top_p=0.95 top_k=20`), draft sampler `temp=0.70 top_p=0.95 top_k=20`, performance-cold profile, fans pinned by `--max`, thinking mode off. Recorded in `mtplx_runtime.json` under the model.\n- The multiplier is what the CLI reports as `mean_speedup_vs_ar`. Absolute tok/s above is M5-Max-with-614-GB/s-bandwidth-specific; if your Mac is slower you keep the **2.24×** ratio, the absolute number drops with bandwidth.\n- Per-position acceptance on the recorded prompt: `[100%, 97.96%, 93.88%]` at D3 (corrections=3 over 49 verify calls).\n- Distribution exactness vs reference single-token AR: `max_diff = 0.0`. Greedy diagnostic on the same cleaned window: `60.108 tok/s`.\n\n<img src=\"docs/assets/readme/flow.svg\" alt=\"MTPLX end-to-end flow\" width=\"100%\" />\n\nNo second model, no greedy hack, no external drafter, no silent distribution drift.\n\n---\n\n## Modes\n\nPicked by `mtplx start`, or set explicitly via `--profile`. Every mode preserves exactness; the difference is the runtime path and whether MTPLX touches your fans.\n\n| Mode | Profile | Mechanics | Speed lane | Best for |\n|---|---|---|---|---|\n| **Sustained** | `sustained` | Native-MTP long-context path with chunked prefill, final-token logits, request-sized paged KV, normal Apple fan controller | Target <=10-15% TPS cost vs Burst while avoiding the old long-context memory balloon | Large files, long documents, coding contexts, 16K-200K prompts |\n| **Sustained Max** | `sustained` + `--max` | Sustained path plus ThermalForge pinned to 100% | Fan-backed long-context lane | Long-context work where the user explicitly wants maximum cooling |\n| **Burst** | `performance-cold` + `--max` | Old max-fan performance-cold lane | **~2.24× over no-MTP AR** (recorded: 63.056/62.886 vs 28.156 tok/s on M5 Max) | Short prompts and benchmarks only; **not recommended**, max 8K context |\n| **Stable** | `stable` / `safe` | Exact/staged long-reply path, hidden from onboarding | Lower peak speed, steadier shape | Compatibility and conservative long replies |\n\nFan-backed modes require ThermalForge. `mtplx max --install` installs it from source into `~/.mtplx/bin/thermalforge`, sets up a passwordless sudoers rule scoped to that one binary, and verifies fans actually ramp before declaring success. One sudo prompt, end-to-end. Crash safety covers SIGINT, SIGTERM, SIGHUP, terminal close, and `kill -9` via a detached sidecar process.\n\n---\n\n## Compatibility\n\n```bash\nmtplx inspect <model-path-or-hf-repo> --json\n```\n\n| Tier | Means | Behavior |\n|---|---|---|\n| **Verified** | Has `mtplx_runtime.json` and passed MTPLX gates | Runs |\n| **Arch-compatible, unverified** | Qwen3-Next MTP markers detected, no runtime contract | Refuses unless `--unsafe-force-unverified` |\n| **Incompatible architecture** | MTP exists but not Qwen3-Next | Clear error, roadmap pointer |\n| **No MTP** | No MTP head detected | Clear error, no garbage runs |\n\nv0.1 ships verified Qwen3.6-27B via `Youssofal/Qwen3.6-27B-MTPLX-Optimized-Speed`, with public served model id `mtplx-qwen36-27b-optimized-speed`. The compatibility registry already detects DeepSeek V3 / V3.2, GLM-4 MoE / MoE-Lite, MiMo, and MiniMax M2 — unsupported runtime families stay behind explicit compatibility gates rather than silently running.\n\n### Support matrix\n\n| Area | Preview support |\n|---|---|\n| Mac | Apple Silicon only (`arm64`) |\n| macOS | 14.0+; Sequoia is supported |\n| Python | native arm64 Python 3.10+ |\n| MLX | `python3 -m pip install mlx` in the same native environment |\n| Memory | dynamic preflight; warns below 48 GiB, fails when the selected model/profile estimate exceeds 80% of unified memory |\n| Storage | first download requires `max(model_size * 2.5, model_size + 20 GiB)` free on the model-cache filesystem |\n| Docker/Open WebUI | Docker Desktop current plus previous two macOS major releases |\n\nRun `mtplx doctor --summary`, `mtplx doctor --deep --json`, or `mtplx doctor --bundle` before filing a bug. Bundles are redacted by default under `~/.mtplx/reports/`.\n\n---\n\n## CLI surface\n\n```bash\nmtplx start                 # interactive setup, then chat\nmtplx help                  # detailed help; `mtplx help <command>` for any\nmtplx doctor                # install + model + integration health\nmtplx inspect <model>       # four-tier compatibility report\nmtplx init                  # write ~/.mtplx/config.toml\nmtplx setup                 # download verified model, prepare cache\nmtplx pull                  # download the default HF model safely\nmtplx models                # cached models, validation, size, delete command\nmtplx run \"...\"             # one-shot ask\nmtplx chat                  # terminal chat\nmtplx start                 # OpenAI/Anthropic-compatible server\nmtplx connect openwebui     # paste settings for Open WebUI\nmtplx openwebui docker-command\nmtplx bench run --suite cold-long-code-192\nmtplx max --install         # install ThermalForge for Sustained Max / Burst\nmtplx max --status          # fan / thermal state\n```\n\nEvery command has `--json` for machine-readable output and `--help` for context-specific docs.\n\n---\n\n## Architecture\n\nThe architectural achievement is **a single-model native-MTP runtime that's mathematically exact at temperature**, with a real serving surface bolted on. There is no second drafter, no greedy hack, and no \"drop in a fast-decode library\" wrapper. Four layers, drawn the way they actually run.\n\n### 0. MLX runtime layer (the kernel stack we own)\n\nMTPLX is not a thin wrapper over stock MLX — the speed lane sits on top of an **MLX source fork** plus a small set of **custom Metal kernels** registered as primitives. Stock `mlx-lm` cannot reproduce the multiplier above; the runtime layer is what makes the speculative cycle in §2 tractable on Apple Silicon.\n\nWhat we changed at the MLX source level (fork: `mlx-mtplx-0.31.2-qmm`, commit `2377a99f` \"Tune small-M qmv for MTPLX 60TPS path\"):\n\n- **Small-M `qmv` retuning.** The verify forward is dominated by quantized-matrix-vector ops at `M ≈ 3..6` (one position per accepted draft). Stock MLX's `qmv_fast_impl` is tuned for large M and stalls dispatch at small M. Our fork: `BN16` group-size, **4-simdgroup** instead of 2-simdgroup, `unroll_count(4)` on the inner loop. Cuts the verify-MLP region by enough to be the difference between \"MTP loses to AR\" and \"MTP at ~2.24×\".\n- **Source-primitive registration.** Custom kernels (below) are registered through `mlx.core.fast.metal_kernel` and integrated into MLX's graph the same way stock primitives are, so `mx.compile` can fuse around them and `mx.eval` doesn't see them as opaque blocks.\n\nCustom Metal kernels we shipped on top of the fork:\n\n- **`linear-gdn-from-conv-tape`** — the GDN linear-attention path during verify. Records an *innovation tape* of `(token, gate, state-delta)` tuples during the draft phase, then **replays** them deterministically on rollback when a draft is rejected. Replaces stock MLX's `Conv1d` + recurrent-state restore with a single fused kernel that's bit-exact (`max_diff = 0.0` against batched-vs-sequential reference) and shape-stable.\n- **`verify_qmv` (small-M qmv kernel).** Direct successor of dflash-mlx's M=16 idea, retuned for MTPLX's M=3..6 verify shapes. Now subsumed by the MLX-source qmv tuning above for the verify hot path; remains as a standalone primitive for diagnostic regressions.\n- **GraphBank.** A cache of `mx.compile`-compiled verify graphs, keyed by `(suffix_length, depth, profile)`. Each verify shape gets one compiled graph reused across cycles — no per-cycle Python dispatch overhead. Capture-commit + GraphBank together hit `capture_commit_time_s ≈ 0.073 ms` per cycle (vs `verify_time_s ≈ 47 ms` per cycle), i.e. the commit step is three orders of magnitude smaller than the verify itself.\n- **Draft-only 4-bit / 3-bit LM head** built in memory by `scripts/probe_draft_lm_head_requant.py`. The target's `lm_head` stays at the model's actual precision (BF16 / INT4 affine); the drafter gets a separate, much smaller LM-head requantized for proposal use only. Cuts draft time by ~29% without touching target accuracy.\n\nRuntime knobs that are enabled when `performance-cold` is explicitly selected:\n\n- `MTPLX_LAZY_VERIFY_LOGITS=1` · `MTPLX_BATCH_TARGET_ARRAYS=1` · `MTPLX_LAZY_MTP_HISTORY_APPEND=1` · `MTPLX_DROP_EVENTS=1` · `MTPLX_SKIP_VERIFY_SNAPSHOT=1`.\n\nNumerical hygiene (these are correctness fixes, not speed):\n\n- **`fp32` `p/q` ratio** during probability-ratio acceptance. The Leviathan–Chen ratio underflows in BF16 at small `q`; fp32 is the only safe path.\n- **`mx.random.split` per draft position** so each acceptance roll uses an independent RNG key. Without this, depth>1 would silently correlate accept decisions.\n\n<img src=\"docs/assets/readme/mlx-runtime.svg\" alt=\"MLX runtime layer\" width=\"100%\" />\n\n### 1. Single-model runtime\n\nThe target model and the drafter are the **same checkpoint**. Qwen3.6-27B ships native MTP heads; MTPLX uses them as the speculative drafter. Zero RAM cost for a second model, zero distillation, zero \"we trained a drafter\" handoff. The trunk's KV cache obeys a **committed-history contract** (verified against the vLLM CUDA reference at cosine > 0.9998 through D5) so recursive draft depth holds together — that's what lets D2/D3/D4 acceptance reach the 90s instead of collapsing.\n\n<img src=\"docs/assets/readme/single-model.svg\" alt=\"Single-model runtime\" width=\"100%\" />\n\n### 2. Speculative cycle (the hot loop)\n\nPer cycle: the MTP head drafts K tokens, the target verifies all K in parallel via one batched forward, **probability-ratio acceptance** (Leviathan–Chen) decides per-position, **residual correction `(p − q)+`** emits a clean replacement on rejection, and a **bonus token** falls out for free when all K accept. Verify cost is paid by `capture_commit` + the `linear-gdn-from-conv-tape` GDN kernel + a **GraphBank** of compiled verify shapes; the math is exact at any temperature.\n\n<img src=\"docs/assets/readme/cycle.svg\" alt=\"Speculative cycle\" width=\"100%\" />\n\n### 3. Serving stack\n\nThe runtime is wrapped in a real serving surface so you can point Open WebUI / Claude Code / Cline / Continue / `curl` / `openai-python` / `anthropic-python` at it. **Engine sessions** keep per-chat state; the **Session Bank** preserves warm-prefix exact state across turns (verified `logits_max_abs_diff = 0.0` against fresh forwards) so multi-turn TTFT doesn't collapse the way a stateless shim would.\n\n<img src=\"docs/assets/readme/serving.svg\" alt=\"Serving stack\" width=\"100%\" />\n\nThe CLI (`mtplx start` / `pull` / `doctor` / `inspect` / `max`) is the on-ramp to all of the above and not the architectural story — it lazy-imports MLX so `--help`, `doctor`, `inspect`, `init`, `setup` work on a fresh venv with no GPU/Apple-Silicon stack installed.\n\n---\n\n## What MTPLX is *not*\n\n- It's not DFlash. DFlash uses greedy-argmax prefix matching and breaks the target distribution at T>0. MTPLX implements exact probability-ratio rejection sampling.\n- It's not an external-drafter system. There's no second model. The drafter is the target's own MTP heads.\n- It's not a generic \"speculative decoding library\". It's a runtime + serving stack with an explicit model-compatibility contract.\n- It's not a CUDA project. MTPLX is MLX-native and Apple-Silicon-first. Linux/CUDA is not on the roadmap; for that, use vLLM.\n- It's not finished. v0.2 is an early production release. The **~2.24× multiplier** cold-lane target is met, the long-context fast-prefill path is much stronger, and the sustained-no-fan target is still a future runtime track.\n\n---\n\n## License, citation, and attribution\n\nMTPLX builds on [MLX](https://github.com/ml-explore/mlx) and the Qwen3-Next model family. The speculative-sampling math follows Leviathan & Chen 2023 (\"Fast Inference from Transformers via Speculative Decoding\") and the MTP heads ship with Qwen. Design and diagnostics are informed by vLLM speculative decoding, vLLM-Metal (issues #188 and #281), DFlash-MLX, DDTree-MLX, and DeepSeek V3.2's `mx.depends` precedent. Optional fan control via [ThermalForge](https://github.com/ProducerGuy/ThermalForge). Model weights and licenses remain governed by their upstream model cards.\n\nMTPLX is released under the [Apache License 2.0](LICENSE): you can use it, modify it, and ship it commercially. If you redistribute MTPLX or derivative works, preserve the Apache license and the attribution notices from [NOTICE](NOTICE) as required by Apache-2.0.\n\nIf MTPLX powers a public project, product, benchmark, article, or research result, please include clear credit in your README, docs, paper, or public writeup:\n\n> Powered by MTPLX by Youssof Altoukhi\n>\n> https://github.com/youssofal/mtplx\n\nFor academic or technical writing, cite the repository using [CITATION.cff](CITATION.cff).\n\n— Built by [Youssof Altoukhi](https://github.com/youssofal). Contributions, bug reports, and benchmark replications welcome via [Issues](https://github.com/youssofal/mtplx/issues).\n","summary":"MTPLX is a lightweight runtime that runs a model’s native *multiple‑token‑prediction* (MTP) heads as a speculative drafter, enabling fast and scientifically accurate decoding on Apple Silicon through MLX. It delivers an average two‑to‑three‑fold speedup over standard autoregressive inference at realistic sampling settings (e.g., temp = 0.6, top_p = 0.95, top_k = 20) while preserving the target model’s probability distribution via exact ratio‑based acceptance and residual correction. The library ships a ready‑to‑use “optimized‑speed” Qwen3.6‑27B pipeline, a compact OpenAI/Anthropic‑compatible serving surface, and CLI or browser chat UI, making it ideal for developers and researchers who need fast, plug‑and‑play large‑language‑model inference on Mac hardware.","description":"Native MTP Speculative Decoding On Apple Silicon | 2x - 2.5x decode TPS increase at temp 0.6 | MLX-native, OpenAI API/Anthropic-compatible serving, no external drafter.","stars":233,"language":"Python"},{"owner":"maria-rcks","repo":"miri","url":"https://github.com/maria-rcks/miri","readme":"<div align=\"center\">\n\n# miri\n\n[![License](https://img.shields.io/badge/license-MIT-111111?style=flat-square)](./LICENSE)\n[![GitHub](https://img.shields.io/badge/github-maria--rcks%2Fmiri-111111?style=flat-square&logo=github)](https://github.com/maria-rcks/miri)\n[![Ko-fi](https://img.shields.io/badge/ko--fi-maria__rcks-111111?style=flat-square&logo=kofi)](https://ko-fi.com/maria_rcks)\n\n<img src=\"./assets/repo/miri-demo.gif\" alt=\"miri macOS window layout preview\" width=\"1000\" />\n\n_Niri-ish, keyboard-first window manager for macOS._\n\n</div>\n\n## Install\n\nBuild and run from source:\n\n```bash\ngit clone https://github.com/maria-rcks/miri.git\ncd miri\nswift run miri\n```\n\nFor a release build:\n\n```bash\nswift build -c release\n.build/release/miri\n```\n\nTo build a local macOS disk image:\n\n```bash\nscripts/package-macos.sh --version 0.1.0\nopen dist/Miri-0.1.0-*.dmg\n```\n\nmiri needs Accessibility permission, and the event tap may also need Input\nMonitoring permission. If you run it from a terminal, macOS may ask for the\nterminal app itself to get those permissions.\n\n## What it does\n\n- Keeps a Niri-like virtual layout of workspaces and columns on macOS.\n- Tiles normal app windows with Accessibility APIs instead of acting as a\n  compositor.\n- Makes each column `0.8` screen widths by default, so the next column can peek\n  in while you move sideways.\n- Centers the focused column when possible, while keeping the first column\n  pinned to the left edge.\n- Tracks `Cmd+Tab`, app launches, app exits, manual window resizes, and focused\n  windows so the model follows macOS instead of fighting it.\n- Supports app rules for tiled, floating, and ignored windows.\n- Adds a graphical menu bar status item with workspace/window status, settings\n  shortcuts, layout reapply, and safe quit.\n- Hot-reloads config changes without restarting, keeping the previous config if\n  a saved file cannot be parsed.\n- Persists workspace, column order, manual widths, and focused window across\n  restarts.\n- Parks off-workspace windows near the side edge, with optional SkyLight alpha\n  hiding when those private symbols are available.\n- Restores tiled windows on normal exit and starts a small cleanup watcher for\n  crash or kill recovery.\n\n## Shortcuts\n\n| Shortcut | Action |\n| :------- | :----- |\n| `Cmd+1`..`Cmd+9` | Focus workspace by dynamic index |\n| `Cmd+0` | Focus the previous workspace |\n| `Cmd+J` / `Cmd+K` | Focus workspace down / up |\n| `Cmd+H` / `Cmd+L` | Focus column left / right |\n| `Cmd+[` / `Cmd+]` | Focus first / last column |\n| `Cmd+Home` / `Cmd+End` | Focus first / last column |\n| `Cmd+Shift+1`..`Cmd+Shift+9` | Move column to workspace |\n| `Cmd+Shift+J` / `Cmd+Shift+K` | Move column workspace down / up |\n| `Cmd+Shift+H` / `Cmd+Shift+L` | Move column left / right |\n| `Cmd+Shift+[` / `Cmd+Shift+]` | Move column to first / last |\n| `Cmd+Ctrl+H` / `Cmd+Ctrl+L` | Cycle active column width preset |\n| `Cmd+Ctrl+-` / `Cmd+Ctrl+=` | Nudge active column width |\n| `Cmd+Ctrl+Shift+H` / `Cmd+Ctrl+Shift+L` | Cycle every tiled window width preset |\n| `Cmd+Ctrl+Shift+-` / `Cmd+Ctrl+Shift+=` | Nudge every tiled window width |\n| three-finger trackpad swipe | Navigate columns / workspaces |\n\nEverything else passes through. The default config excludes `Cmd+Shift+5`, so\nmacOS screen recording keeps working.\n\nTrackpad navigation uses Apple's private MultitouchSupport framework so Miri can\nsee raw three-finger movement without stealing normal two-finger scrolling. It\nmoves a continuous camera with momentum, then focuses the workspace and column\nnearest the camera when the motion settles.\n\n## Config\n\nmiri loads the first config file it can read:\n\n- `MIRI_CONFIG`\n- `./miri.config.json`\n- `$XDG_CONFIG_HOME/miri/config.json`\n- `~/.config/miri/config.json`\n\n`$XDG_CONFIG_HOME/miri/config.json` is checked only when `XDG_CONFIG_HOME` is\nset. If it is unset, miri falls back to `~/.config/miri/config.json`.\n\nThe loaded config file is watched for changes. Saving valid JSON reloads\nkeybindings, rules, layout settings, animations, and trackpad settings in place.\nIf a save cannot be parsed, miri keeps running with the previous config.\nThe menu bar item can open or reveal the loaded settings file, reveal the saved\nlayout state file, reload settings, reapply the layout, and quit while restoring\ntiled windows.\n\nThe repo includes a full default config. A compact version looks like this:\n\n```json\n{\n  \"default_width_ratio\": 0.8,\n  \"preset_width_ratios\": [0.5, 0.67, 0.8, 1.0],\n  \"animation_duration_ms\": 240,\n  \"keyboard_animation_ms\": 240,\n  \"hover_focus_animation_ms\": 240,\n  \"trackpad_settle_animation_ms\": 240,\n  \"move_column_animation_ms\": 240,\n  \"width_animation_ms\": 280,\n  \"animation_curve\": \"smooth\",\n  \"hover_to_focus\": true,\n  \"hover_focus_delay_ms\": 120,\n  \"hover_focus_max_scroll_ratio\": 0.15,\n  \"hover_focus_requires_visible_ratio\": 0.15,\n  \"hover_focus_edge_trigger_width\": 8,\n  \"hover_focus_after_trackpad_ms\": 280,\n  \"hover_focus_mode\": \"edge_or_visible\",\n  \"workspace_auto_back_and_forth\": true,\n  \"center_focused_column\": true,\n  \"focus_alignment\": \"smart\",\n  \"new_window_position\": \"after_active\",\n  \"inner_gap\": 0,\n  \"outer_gap\": 0,\n  \"parked_sliver_width\": 1,\n  \"excluded_keybindings\": [\"cmd+shift+5\"],\n  \"keybindings\": {\n    \"column_left\": [\"cmd+h\"],\n    \"column_right\": [\"cmd+l\"],\n    \"workspace_down\": [\"cmd+j\"],\n    \"workspace_up\": [\"cmd+k\"],\n    \"move_column_to_workspace_5\": [\"cmd+ctrl+shift+5\"]\n  },\n  \"trackpad_navigation\": true,\n  \"trackpad_navigation_fingers\": 3,\n  \"trackpad_navigation_sensitivity\": 1.6,\n  \"trackpad_navigation_deceleration\": 5.5,\n  \"trackpad_navigation_hover_suppression_ms\": 280,\n  \"trackpad_navigation_momentum_min_velocity\": 80,\n  \"trackpad_navigation_velocity_gain\": 1.35,\n  \"trackpad_navigation_settle_animation_ms\": 240,\n  \"trackpad_navigation_snap\": \"nearest_column\",\n  \"trackpad_navigation_invert_x\": false,\n  \"trackpad_navigation_invert_y\": false,\n  \"rescan_interval_ms\": 1000,\n  \"restore_on_exit\": true,\n  \"persist_layout\": true,\n  \"state_path\": null,\n  \"hide_method\": \"skylight_alpha\",\n  \"debug_logging\": false,\n  \"rules\": [\n    {\n      \"bundle_id\": \"com.apple.finder\",\n      \"behavior\": \"float\"\n    }\n  ]\n}\n```\n\n`keybindings` is merged with the built-in defaults by action name, so a config\ncan override only the actions it cares about. Set an action to `[]` to disable\nit. `excluded_keybindings` always wins, so the default `Cmd+Shift+5`\nscreen-recording shortcut passes through; moving a column to workspace 5 uses\n`Cmd+Ctrl+Shift+5`. See `miri.config.json` for the full command-name list.\n\nKeybinding strings support the standard modifiers `cmd`/`win`/`windows`/`super`/`meta`,\n`ctrl`, `shift`, `alt`/`option`, and `fn`/`globe`. This makes MacBook keyboard\nshortcuts like `cmd+fn+left` configurable without requiring a separate Home/End key.\n\nUseful string settings:\n\n- `animation_curve`: `smooth`, `snappy`, or `linear`\n- `hover_focus_mode`: `off`, `visible_only`, or `edge_or_visible`\n- `focus_alignment`: `left`, `center`, or `smart`\n- `new_window_position` and rule `open_position`: `before_active`,\n  `after_active`, or `end`\n- `trackpad_navigation_snap`: `nearest_column`, `nearest_visible`, or `none`\n- `hide_method`: `skylight_alpha` or `park_only`\n\nRules can match on `bundle_id`, `app_name`, or `title_contains`. Use\n`behavior: \"ignore\"` for windows miri should leave alone, `behavior: \"float\"`\nfor visible untiled windows that should be raised above tiled columns, and\n`width_ratio` to override an app's default column width. Rules can also set `workspace`, `open_position`,\n`trackpad_navigation`, and `hover_to_focus` for matching windows.\n\nWith `persist_layout` enabled, miri writes a local layout snapshot to\n`$XDG_STATE_HOME/miri/layout.json` or `~/.local/state/miri/layout.json`. Set\n`state_path` to override that location. The snapshot uses app names, bundle IDs,\nand window titles to match windows after restart.\n\n## Development\n\n```bash\nswift build\nswift run miri\n```\n\n## Releases\n\nRelease artifacts are built by `.github/workflows/release.yml`.\n\n- Push a stable tag like `v0.1.0` to publish a GitHub Release.\n- Run the workflow manually with `channel: nightly` to publish a prerelease.\n- The scheduled nightly checks whether `main` changed since the last nightly tag\n  before publishing.\n- The macOS artifact is a `Miri-<version>-arm64-darwin.dmg` containing\n  `Miri.app`.\n\n## Notes\n\n- miri targets macOS 13+ and Swift 6.\n- It uses public Accessibility APIs for the core window control path.\n- The SkyLight path is private and optional; if it is unavailable, hidden\n  windows stay parked as side-edge slivers.\n- This does not use native macOS Spaces.\n\n## Links\n\n- Repository: https://github.com/maria-rcks/miri\n- Research notes: [docs/macos-window-management-investigation.md](docs/macos-window-management-investigation.md)\n- Niri behavior notes: [docs/niri-mvp-behavior-notes.md](docs/niri-mvp-behavior-notes.md)\n","summary":"miri is a keyboard‑first window manager for macOS that emulates a Niri‑style virtual workspace and column layout using Accessibility APIs rather than a compositor. It tiles normal app windows, keeps the first column pinned while allowing adjacent column peeking, and manages focus, resizing, and app rules with automatic persistence across restarts. The project offers an extensive hot‑reloadable configuration, a menu‑bar status item, and support for gestures such as three‑finger trackpad swipes to navigate workspaces. Developers, designers, and power users who prefer a tiling workflow on macOS will find miri a lightweight, configurable alternative to full‑blown window managers.","description":"Niri-ish, keyboard-first window manager for macOS.","stars":156,"language":"Swift"},{"owner":"bensenescu","repo":"downy","url":"https://github.com/bensenescu/downy","readme":"# Downy\n\nBuild a team of agents and work with them from any device.\n\n- Best UX for working with multiple agents.\n- Each agent has its own personality, skills, tools, and workspace.\n- OpenAI Sub compatible for frontier models at a flat rate. Or, use any model on OpenRouter or Workers AI.\n\n![Downy demo](docs/demo.gif)\n\n## Why Downy\n\n- **Self-hosted.**\n  - Runs in your Cloudflare account or locally.\n- **Multi-agent w/ purpose built UX.**\n  - Each agent has its own personality, skills, tools, and workspace.\n  - Manage workspaces, tools, and background tasks directly in the app — no Obsidian, no CLI.\n- **Use w/ any Model, including your OpenAI Sub.**\n  - Kimi 2.6 on Workers AI by default — no API keys to wire up.\n  - Swap in [ChatGPT Plus/Pro](#optional-chatgpt-subscription) or any OpenRouter model when you want.\n- **Access anywhere.**\n  - Reach Downy from any device behind Cloudflare's secure network.\n\n## How does it work?\n\nI had been meaning to make something like Downy for a while, but this blog post made me actually build it: https://blog.cloudflare.com/project-think/. I highly recommend reading it if you want to understand how Downy works. But, basically each agent and subagent is its own Durable Object.\n\n![Architecture diagram](docs/downy-diagram.png)\n\nFull system map: [`docs/architecture.md`](docs/architecture.md).\n\n## Deploy\n\n> [!WARNING]\n> This is a brand new project being \"agentically engineered\" rapidly. It's self editing features are very powerful, but inherently prone to prompt injection like OpenClaw. Be considerate of what data and tools you give it access to. Use at your own risk.\n\nYou'll need:\n\n- **Node 24 LTS** and **pnpm**:\n  ```bash\n  nvm install 24 && nvm use 24\n  npm install -g pnpm\n  ```\n- **Cloudflare account** — the free Workers plan works if you bring your own model.\n  - Workers AI (the default Kimi setup) needs the **Workers Paid plan** ($5/mo).\n  - Pi proxy (ChatGPT) and OpenRouter both run on the free plan.\n- **[Exa](https://exa.ai) API key** — free $10 credit, effectively unlimited for personal use. Required for search.\n\nClone the repo and install dependencies:\n\n```bash\ngit clone https://github.com/bensenescu/downy\ncd downy\npnpm install\n```\n\nLogin into Cloudflare with Alchemy\n\n- [Alchemy](https://alchemy.run) makes it simpler to deploy to Cloudflare.\n\n```\nnpx alchemy configure         # Authorize in Cloudflare and accept the defaults\npnpm alchemy login            # one-time browser OAuth to your Cloudflare account\n```\n\nSet up env vars and deploy:\n\n- Read through the .env which has further instructions\n\n```\ncp .env.example .env          # then fill in EXA_API_KEY and ALCHEMY_PASSWORD (random string)\npnpm deploy\n```\n\nThe Worker rejects every request until Cloudflare Access is in front of it — that's next.\n\n## Authentication: Cloudflare Access\n\nBy putting Downy behind Cloudflare Access, it gates all traffic to the service unless you've authenticated. This authentication is managed by Cloudflare, not Downy. By default, Cloudflare Access adds the email tied to your Cloudflare Account to the allow list and authenticates by sending a One Time Password to your email.\n\nHere is how you set it up:\n\n1. **Go to your Worker's settings** in the Cloudflare dashboard:\n   - Open the sidebar and find **Workers & Pages**.\n   - Click into your **downy** worker.\n   - Open the **Settings** tab.\n2. **Turn on Cloudflare Access:**\n   - Under **Domains & Routes**, click the three-dot menu next to your `workers.dev` value.\n   - Toggle **Cloudflare Access** on.\n   - A modal pops up with your `TEAM_DOMAIN` and `POLICY_AUD`.\n3. **Copy those values into `.env`:**\n   - `TEAM_DOMAIN=https://<team>.cloudflareaccess.com`\n   - `POLICY_AUD=<aud-tag>`\n4. `pnpm deploy`, then open your Worker URL and log in.\n\n<details>\n<summary>Sign-in works but you still see \"Authentication required\"?</summary>\n\n`pnpm tail` shows the verifier's failure reason — usually `TEAM_DOMAIN` missing `https://` or a stale `POLICY_AUD`.\n\n</details>\n\n<details>\n<summary>Deploy fails with <code>VPC service ... does not exist</code>?</summary>\n\n`PI_RELAY_VPC_SERVICE_ID` should be unset in `.env` by default. If you set it, either remove it or follow [`docs/pi-proxy-setup.md`](docs/pi-proxy-setup.md) to provision the VPC service.\n\n</details>\n\n## Optional: ChatGPT subscription\n\nPoint Downy at your **ChatGPT Plus/Pro subscription** instead of Kimi:\n\n- **Smarter models at a flat rate** — no per-token API billing.\n- **Secure by network boundary** — a small proxy on your hardware holds the OAuth tokens, reached only via a Cloudflare Tunnel + Workers VPC binding (never the public internet).\n- **Walkthrough:** [`docs/pi-proxy-setup.md`](docs/pi-proxy-setup.md).\n\n> Note: OpenAI currently allows third-party harnesses to use ChatGPT subscriptions for personal use, but that policy could change.\n\n## CI\n\n```bash\npnpm run ci:check       # prettier + knip + tsc + oxlint\npnpm run format:write\npnpm run lint:fix\n```\n","summary":"Downy is a self‑hosted, multi‑agent platform that lets users build, configure, and manage teams of AI agents from any device via a streamlined web UI. Each agent can be endowed with its own personality, skill set, tools, and workspace, and the system supports seamless interaction with a variety of language models—including OpenAI subscriptions, OpenRouter, and Workers AI—without requiring API keys on the client side. The architecture hinges on Cloudflare Durable Objects, making it run in Cloudflare’s network or locally, while built‑in authentication through Cloudflare Access keeps the service secure. The project is ideal for developers, data scientists, and product teams who need an all‑in‑one, secure, and customizable multi‑agent environment that can be deployed quickly in the cloud.","description":"OpenClaw Alternative - Create a team of agents and work with them from anywhere.","stars":165,"language":"TypeScript"},{"owner":"butthtio","repo":"solidity-cot-auditor","url":"https://github.com/butthtio/solidity-cot-auditor","readme":"<div align=\"center\">\n\n# solidity-cot-auditor\n\n**Multi-role chain-of-thought LLM pipeline for Solidity security auditing**\n\n[![Python 3.10+](https://img.shields.io/badge/python-3.10+-blue.svg?style=for-the-badge)](https://python.org)\n[![License: Apache 2.0](https://img.shields.io/badge/License-Apache_2.0-orange.svg?style=for-the-badge)](LICENSE)\n[![Slither](https://img.shields.io/badge/powered_by-Slither-purple?style=for-the-badge)](https://github.com/crytic/slither)\n\n[Install](#install) · [Quick Start](#quick-start) · [How It Works](#how-it-works) · [Configuration](#configuration) · [Results](#results)\n\n</div>\n\n---\n\nStatic analyzers like Slither are fast and reliable, but their output is terse. A finding like `reentrancy-eth` tells you *what* fired, not *why it matters in this specific contract*, *how an attacker would exploit it*, or *what the minimal fix looks like*. This tool fills that gap.\n\n`solidity-cot-auditor` takes Slither's JSON output and runs each finding through a four-role LLM chain:\n\n```\nSlither finding\n    │\n    ▼\n[Explainer]  — technical explanation + true/false positive verdict\n    │\n    ▼\n[ExploitWriter]  — minimal PoC sketch (for defenders)\n    │\n    ▼\n[Fixer]  — unified diff of the minimal fix\n    │\n    ▼\n[Judge]  — quality score + flags logical errors in the chain\n    │\n    ▼\nMarkdown + JSON report\n```\n\nEach role is a separate LLM call with a focused system prompt. The chain-of-thought is preserved in the output so you can inspect each step.\n\n## Install\n\n```bash\npip install -e \".[dev]\"\n# slither is a separate install (requires solc)\npip install slither-analyzer\n```\n\n## Quick Start\n\n**Audit a .sol file directly:**\n\n```bash\nexport OPENAI_API_KEY=sk-...\nsolidity-cot audit ./contracts/MyToken.sol --output reports/\n```\n\n**Audit from a saved Slither JSON (useful in CI):**\n\n```bash\nslither MyToken.sol --json slither_out.json\nsolidity-cot audit-json slither_out.json --project MyToken --source-root ./contracts\n```\n\n**Try it on the included example:**\n\n```bash\nsolidity-cot audit examples/contracts/SimpleBank.sol --skip-judge\n```\n\n## How It Works\n\n### Role separation\n\nEach role has a narrow, well-defined job. This matters because:\n\n- A single \"audit everything\" prompt hallucinates more and produces generic output.\n- Separating roles lets you swap or skip stages (e.g., skip exploit writing for informational findings).\n- The Judge role catches when earlier roles contradict themselves or miss the point.\n\n### Contested-weighted filtering\n\nFindings are filtered by severity before entering the chain. The default is `--min-severity medium`. Informational findings (pragma version, naming conventions) are skipped unless you explicitly lower the threshold.\n\n### LLM compatibility\n\nAny OpenAI-compatible endpoint works. Point at a local vLLM server, Together AI, or Fireworks:\n\n```bash\nexport LLM_BASE_URL=http://localhost:8000/v1\nexport LLM_MODEL=meta-llama/Llama-3-70b-instruct\nexport LLM_API_KEY=dummy\nsolidity-cot audit MyContract.sol\n```\n\nAnthropic Claude is also supported directly:\n\n```bash\nexport LLM_PROVIDER=anthropic\nexport LLM_BASE_URL=https://api.anthropic.com\nexport LLM_MODEL=claude-sonnet-4-6\nexport ANTHROPIC_API_KEY=sk-ant-...\nsolidity-cot audit MyContract.sol\n```\n\n## Configuration\n\n| Flag | Default | Description |\n|------|---------|-------------|\n| `--min-severity` | `medium` | Skip findings below this level |\n| `--max-findings` | `20` | Cap findings sent to the LLM chain |\n| `--skip-exploit` | off | Skip the ExploitWriter role |\n| `--skip-fix` | off | Skip the Fixer role |\n| `--skip-judge` | off | Skip the Judge quality check |\n| `--slither-args` | `\"\"` | Extra args forwarded to slither |\n\n## Results\n\nOn `SimpleBank.sol` (textbook reentrancy):\n\n| Finding | Severity | Verdict | Judge |\n|---------|----------|---------|------:|\n| reentrancy-eth in `withdraw` | High | TRUE_POSITIVE | 4/5 |\n\nThe Fixer correctly identifies the Checks-Effects-Interactions fix and produces a minimal diff. The Judge flags no logical errors.\n\n<details>\n<summary>Sample output snippet</summary>\n\n```\n### Explanation\nThe `withdraw` function performs an external call (`msg.sender.call{value: amount}`) before\nupdating `balances[msg.sender]`. An attacker contract can re-enter `withdraw` in its fallback\nfunction, draining the contract before the balance is decremented.\n\nVerdict: TRUE_POSITIVE\n\n### Exploit sketch\nAttacker deploys a contract with a fallback that calls `withdraw()` again. On first entry,\nbalance check passes; on re-entry, balance is still non-zero (not yet decremented).\n\n### Suggested fix\nMove the state update before the external call (Checks-Effects-Interactions pattern):\n```diff\n-        (bool ok, ) = msg.sender.call{value: amount}(\"\");\n-        require(ok, \"transfer failed\");\n-        balances[msg.sender] -= amount;\n+        balances[msg.sender] -= amount;\n+        (bool ok, ) = msg.sender.call{value: amount}(\"\");\n+        require(ok, \"transfer failed\");\n```\n```\n\n</details>\n\n## Roadmap\n\n- [x] Slither JSON parser\n- [x] Four-role CoT chain (Explainer → Exploit → Fixer → Judge)\n- [x] Markdown + JSON report output\n- [x] OpenAI-compatible endpoint support\n- [ ] Mythril integration (dynamic analysis findings)\n- [ ] Batch mode: audit entire Foundry project\n- [ ] GitHub Actions workflow template\n- [ ] Fine-tuned model support (SFT on DeFi exploit dataset)\n\n## Running Tests\n\n```bash\npytest\n```\n\nTests use a fake LLM client — no API key needed.\n\n## License\n\nApache 2.0\n","summary":"solidity-cot-auditor is a Python tool that enhances the output of static analysis for Solidity smart contracts by chaining large‑language‑model calls to explain, exploit, fix, and judge each finding. It takes Slither’s JSON results and runs each vulnerability through a four‑role LLM pipeline—Explainer, ExploitWriter, Fixer, and Judge—to produce a detailed, human‑readable report with Markdown and JSON artifacts. The design separates responsibilities to reduce hallucination, allows selective skipping of stages, and includes a configurable severity filter and LLM provider switch. Developers and auditors who want deeper context and actionable patches for found issues will find the tool useful, especially in continuous‑integration workflows or when interpreting Slither alerts.","description":"Multi-role chain-of-thought LLM pipeline for Solidity security auditing, layered on top of Slither output.","stars":318,"language":"Python"},{"owner":"gofsnotify","repo":"fsnotify","url":"https://github.com/gofsnotify/fsnotify","readme":"# fsnotify\n\n[![CI](https://github.com/gofsnotify/fsnotify/actions/workflows/ci.yml/badge.svg)](https://github.com/gofsnotify/fsnotify/actions/workflows/ci.yml)\n[![Go Reference](https://pkg.go.dev/badge/github.com/gofsnotify/fsnotify.svg)](https://pkg.go.dev/github.com/gofsnotify/fsnotify)\n\nCross-platform file system notifications for Go.\n\n## Install\n\n```\ngo get github.com/gofsnotify/fsnotify\n```\n\n## Usage\n\n```go\npackage main\n\nimport (\n\t\"log\"\n\n\t\"github.com/gofsnotify/fsnotify\"\n)\n\nfunc main() {\n\tw, err := fsnotify.NewWatcher()\n\tif err != nil {\n\t\tlog.Fatal(err)\n\t}\n\tdefer w.Close()\n\n\tif err := w.Add(\"/path/to/dir\", fsnotify.Create|fsnotify.Write|fsnotify.Remove); err != nil {\n\t\tlog.Fatal(err)\n\t}\n\n\tfor {\n\t\tselect {\n\t\tcase ev := <-w.Events:\n\t\t\tlog.Println(ev)\n\t\tcase err := <-w.Errors:\n\t\t\tlog.Println(\"error:\", err)\n\t\t}\n\t}\n}\n```\n\n## API\n\n- `NewWatcher() (*Watcher, error)` — creates a watcher.\n- `(*Watcher).Add(path string, op Op) error` — registers `path` with the given event mask. Returns `ErrAlreadyAdded` if `path` is already registered.\n- `(*Watcher).AddRecursive(path string, op Op) error` — registers `path` and every directory under it. New subdirectories created inside are watched automatically; removed subdirectories are dropped. `Remove` may only be called on the original recursive root.\n- `(*Watcher).Remove(path string) error` — unregisters `path`. For an `AddRecursive` registration this drops the entire subtree.\n- `(*Watcher).Close() error` — stops the watcher and closes the channels.\n- `(*Watcher).Events <-chan Event` — receives change notifications.\n- `(*Watcher).Errors <-chan error` — receives non-fatal errors.\n\nPaths are canonicalized (absolute, cleaned, with symlinks resolved when the target exists; on Windows 8.3 short forms are expanded and case is folded), so two spellings of the same path dedupe and `Event.Name` is always returned in canonical form.\n\n## Events\n\n| Op     | Description                                 |\n|--------|---------------------------------------------|\n| Create | A file or directory was created.            |\n| Write  | A file's contents were modified.            |\n| Remove | A file or directory was removed.            |\n| Rename | A file or directory was renamed or moved.   |\n| Chmod  | Permissions or attributes changed.          |\n\n`Op` is a bitmask; combine values with `|` when calling `Add`. The `All` constant is shorthand for the union of every Op bit.\n\n## Guarantees\n\n- Thread-safe: methods may be called from multiple goroutines.\n- Event ordering is preserved as far as the underlying OS allows.\n- Behavior is normalized across supported platforms.\n\n## Platform Support\n\n| OS      | Backend                 | Status    |\n|---------|-------------------------|-----------|\n| Linux   | inotify                 | Supported |\n| Windows | ReadDirectoryChangesW   | Supported |\n| macOS   | FSEvents (purego)       | Supported |\n| FreeBSD | kqueue                  | Supported |\n\n## License\n\nMIT\n","summary":"`fsnotify` is a Go library that provides cross‑platform file‑system notification support, wrapping inotify on Linux, ReadDirectoryChangesW on Windows, FSEvents on macOS and kqueue on FreeBSD. It exposes a lightweight `Watcher` API that lets users add or recursively monitor paths, receive change events and non‑fatal errors through separate channels, and cleanly close the watcher. The library handles path canonicalization, event ordering, and is thread‑safe, making it ideal for developers building tools, editors, build systems, or any Go application that needs a reliable, platform‑agnostic file‑change monitoring mechanism.","description":"Cross-platform file system notifications for Go.","stars":156,"language":"Go"},{"owner":"Jakubantalik","repo":"metal-fx","url":"https://github.com/Jakubantalik/metal-fx","readme":"# metal-fx\n\nAnimated WebGL \"liquid metal\" effect for React. Wrap a button, chip, or icon and it gets a real-time metal ring with optional proximity reflection on neighbouring elements.\n\n[Live demo](https://metal.jakubantalik.com) · [Repository](https://github.com/Jakubantalik/metal-fx) · [Report an issue](https://github.com/Jakubantalik/metal-fx/issues)\n\n## Install\n\n```bash\nnpm install metal-fx\n```\n\n## Quick start\n\n```tsx\nimport { MetalFx } from 'metal-fx';\n\nfunction App() {\n  return (\n    <MetalFx variant=\"button\">\n      <button className=\"upgrade-pill\">Upgrade to Pro</button>\n    </MetalFx>\n  );\n}\n```\n\nThe component wraps a single child host element, measures it, and paints an animated metal ring on top. The child stays fully interactive — overlays sit above it with `pointer-events: none`.\n\n## Variants\n\n```tsx\n<MetalFx variant=\"button\">  {/* Pill silhouette, 1 px ring, scale 1.6 */}\n  <button>Upgrade to Pro</button>\n</MetalFx>\n\n<MetalFx variant=\"circle\">  {/* Compact circle, 2 px ring, scale 1.3 */}\n  <button>↑</button>\n</MetalFx>\n```\n\n## Presets\n\nThree bundled palettes, each with a tuned dark and light mode block:\n\n```tsx\n<MetalFx preset=\"chromatic\" />  {/* Iridescent rainbow (default) */}\n<MetalFx preset=\"silver\" />     {/* Cool steel */}\n<MetalFx preset=\"gold\" />       {/* Warm gold */}\n```\n\n## Theme\n\n```tsx\n<MetalFx theme=\"auto\" />    {/* Follows prefers-color-scheme (default) */}\n<MetalFx theme=\"dark\" />    {/* Pin to dark backgrounds */}\n<MetalFx theme=\"light\" />   {/* Pin to light backgrounds */}\n```\n\n`auto` reads the OS / browser theme on mount and subscribes to live changes via `matchMedia('(prefers-color-scheme: dark)')`, so the metal frame switches over instantly when the user toggles their system theme. SSR-safe — the initial render falls back to `dark` and rehydrates to the resolved theme on the client.\n\nIf your app has its own theme toggle that doesn't follow the OS, drive `theme` from your app state instead:\n\n```tsx\nconst appTheme = useAppTheme(); // 'dark' | 'light'\n<MetalFx theme={appTheme}>...</MetalFx>\n```\n\n## Strength\n\n```tsx\n<MetalFx strength={0.7}>  {/* 70% effect intensity */}\n  <button>Upgrade to Pro</button>\n</MetalFx>\n```\n\n`strength` runs from `0` (invisible) to `1` (full, default). It scales the canvas and glow opacity without changing the underlying shader animation.\n\n## Paused\n\n```tsx\n<MetalFx paused>\n  <button>Upgrade to Pro</button>\n</MetalFx>\n```\n\nFreezes the shader on its current frame. The metal silhouette stays visible.\n\n## Proximity reflection (dark mode only)\n\nPass refs to neighbouring elements and they receive a soft, mirrored reflection of the metal ring:\n\n```tsx\nconst sendRef = useRef<HTMLButtonElement>(null);\nconst chipRef = useRef<HTMLButtonElement>(null);\n\n<>\n  <button ref={chipRef}>Tools</button>\n  <MetalFx variant=\"circle\" reflectionTargets={[chipRef]}>\n    <button ref={sendRef} aria-label=\"Send\">↑</button>\n  </MetalFx>\n</>\n```\n\nReflections are skipped automatically when the resolved theme is `light` — no DOM scanning, no per-frame work in light mode.\n\n## Performance\n\n- One shared WebGL context is reused across every mounted `<MetalFx>` on the page. The shader is compiled once.\n- A single `requestAnimationFrame` loop drives every instance. Per-frame work for one mount: a `gl.drawArrays` plus N×`drawImage` copies (one per visible instance).\n- `IntersectionObserver` pauses per-instance copies when the host scrolls offscreen. When every instance is offscreen the GL render is skipped too.\n- `ResizeObserver` callbacks are debounced through RAF.\n- The GL context, program, and buffer are released when the last `<MetalFx>` unmounts.\n\n## Server-side rendering\n\nThe component renders a transparent placeholder during SSR and only mounts the WebGL pipeline after hydration on the client. No flash of broken effect, no SSR errors.\n\n## Sizing\n\n`MetalFx` does not force any dimensions onto the wrapped child — the wrapper sizes itself to whatever the child renders. Style your child the way you normally would (intrinsic content, CSS class, or inline style):\n\n```tsx\n// Pattern 1 (recommended): size the child.\n<MetalFx variant=\"circle\">\n  <button style={{ width: 36, height: 36 }} aria-label=\"Send\">↑</button>\n</MetalFx>\n\n<MetalFx>\n  <button className=\"rounded-full px-6 h-10\">Upgrade to Pro</button>\n</MetalFx>\n```\n\nIf you want a metal frame larger than the child (e.g. padding around an icon), size the wrapper instead and explicitly stretch the child to fill:\n\n```tsx\n// Pattern 2: size the wrapper, child fills.\n<MetalFx style={{ width: 36, height: 36 }} variant=\"circle\">\n  <button style={{ width: '100%', height: '100%' }} aria-label=\"Send\">↑</button>\n</MetalFx>\n```\n\nBoth patterns work; pick whichever fits your layout. The wrapper is `display: inline-flex` so it lays out inline like a button.\n\n## Custom border radius\n\nBy default `MetalFx` reads the computed `border-radius` of the wrapped child each resize. Pass an explicit override when needed:\n\n```tsx\n<MetalFx borderRadius={20}>\n  <button>Upgrade to Pro</button>\n</MetalFx>\n```\n\n## License\n\nMIT &copy; [Jakub Antalik](https://github.com/Jakubantalik). See [LICENSE](./LICENSE).\n","summary":"Metal‑Fx is a lightweight React component that wraps any element (button, chip, icon, etc.) and paints a real‑time, liquid‑metal ring around it using a single shared WebGL context.  It offers multiple visual variants, preset color palettes, auto‑theme syncing, adjustable intensity, pause control, and, in dark mode, soft reflections on adjacent elements, all while keeping the underlying host fully interactive.  Front‑end developers and designers looking to add striking, GPU‑accelerated metallic glow effects to their UI can drop in Metal‑Fx with minimal configuration and no server‑side rendering issues.","description":"Animated WebGL liquid-metal effect for React buttons and UI components","stars":127,"language":"TypeScript"},{"owner":"fendouai","repo":"CodexSaver","url":"https://github.com/fendouai/CodexSaver","readme":"# CodexSaver\n\n> Make Codex cheaper without making it dumber.\n\n<p align=\"center\">\n  <a href=\"./README_zh.md\"><strong>中文文档</strong></a>\n</p>\n\n![CodexSaver](./CodexSaver.png)\n\nCodexSaver is an MCP tool that turns Codex into a cost-aware router.\nIt pushes low-risk development work to a cheaper worker LLM, keeps high-risk\njudgment in Codex, and returns enough interaction detail that you can feel when\nthe tool is active.\n\n- Lower-cost execution for tests, docs, search, and explanation work\n- Codex stays responsible for architecture, security, protected domains, and final review\n- Global-by-default Codex install, so every workspace can use the same MCP tool\n- DeepSeek by default, with presets for OpenAI, Anthropic, Gemini, Qwen, Ollama, LM Studio, and more\n- One-time local provider setup in `~/.codexsaver/config.json`\n- Verified with tests, real DeepSeek calls, and end-to-end MCP launcher checks\n\n---\n\n## Why This Exists\n\nMost coding sessions contain two very different kinds of work:\n\n- expensive thinking\n- cheap execution\n\nCodex is excellent at the first one. It is overqualified for much of the second.\n\nCodexSaver splits the flow on purpose:\n\n- `Codex` handles reasoning, ambiguity, protected domains, and approval\n- a configured worker provider handles low-risk throughput work\n\nThat gives you a practical pattern:\n\n```text\nUse the expensive model for judgment.\nUse the cheaper model for volume.\nNever confuse the two.\n```\n\n---\n\n## What It Feels Like\n\nWhen CodexSaver is active, tool responses are not silent blobs of JSON.\nThey include an `interaction` block that makes the routing decision visible:\n\n```json\n{\n  \"interaction\": {\n    \"tool\": \"codexsaver.delegate_task\",\n    \"mode\": \"delegated_execution\",\n    \"headline\": \"CodexSaver delegated this task to the configured worker provider.\",\n    \"route_label\": \"[CodexSaver] route=deepseek task_type=write_tests risk=low\",\n    \"next_step\": \"Review the worker result and apply it only if the patch looks safe.\"\n  }\n}\n```\n\nThree states matter:\n\n- `preview`: routing preview only, no external model call\n- `delegated_execution`: delegated run completed\n- `codex_takeover`: task stayed with Codex because risk was too high or the task was ambiguous\n\n---\n\n## Quick Start\n\n### Recommended Global Install\n\n```bash\ngit clone https://github.com/fendouai/CodexSaver\ncd CodexSaver\n\npython cli.py auth set --provider deepseek --api-key YOUR_API_KEY\npython cli.py install\npython cli.py doctor\n```\n\nThat is it. `python cli.py install` writes a global Codex MCP entry to\n`~/.codex/config.toml` and points it at a stable launcher:\n`~/.codexsaver/codexsaver_mcp.py`.\n\nAfter that, every Codex workspace can call:\n\n```text\ncodexsaver.delegate_task\n```\n\nUse `--project` only when you want a repository-local `.codex/config.toml`:\n\n```bash\npython cli.py install --project\n```\n\n### Provider Setup\n\nDeepSeek is the default because it is inexpensive and exposes an OpenAI-compatible API.\nSwitching providers is just one flag:\n\n```bash\npython cli.py auth set --provider openai --api-key YOUR_API_KEY --model gpt-4o-mini\npython cli.py auth set --provider anthropic --api-key YOUR_API_KEY --model claude-3-5-haiku-latest\npython cli.py auth set --provider gemini --api-key YOUR_API_KEY --model gemini-2.0-flash\npython cli.py auth set --provider qwen --api-key YOUR_API_KEY --model qwen-plus\n```\n\nFor local models:\n\n```bash\npython cli.py auth set --provider ollama --model llama3.1\npython cli.py auth set --provider lmstudio --model local-model\n```\n\nFor any custom OpenAI-compatible endpoint:\n\n```bash\npython cli.
