makes it ideal for teams that need rapid, high‑quality production of varied content and data‑driven insights.","description":"Claude code for everything except coding","stars":1499,"language":"Python"},{"owner":"joelbqz","repo":"writer-computer","url":"https://github.com/joelbqz/writer-computer","readme":"# Writer\n\nFast and lightweight app for your workspace's markdown files\n\n![Writer](./assets/screenshot.png)\n\nIt is built with Tauri v2, React, Zustand, CodeMirror, and Rust. The app keeps documents on disk, respects workspace `.gitignore` rules, supports multiple windows, renders extended markdown such as tables and Mermaid diagrams, and ships with a signed macOS release flow.\n\n## Repository\n\n- `apps/desktop/` — Tauri desktop app.\n- `apps/desktop/src/` — React frontend.\n- `apps/desktop/src-tauri/src/` — Rust commands, workspace state, watcher, updater, and CLI integration.\n- `apps/website/` — landing page.\n- `docs/` — project and agent workflow docs.\n- `SPECs/` — feature specs and design notes.\n\n## Development\n\nThis repo uses Vite+ through the `vp` CLI. Use `vp` instead of calling the package manager or Vite tooling directly.\n\n```bash\nvp install\nvp dev\n```\n\n## Validation\n\n```bash\nvp check\nvp test\n```\n\nRust validation runs from the Tauri crate:\n\n```bash\ncd apps/desktop/src-tauri\ncargo test\ncargo clippy\ncargo fmt --check\n```\n\n## Releases\n\nmacOS releases are cut locally with `scripts/distribute.sh`. See `docs/releasing.md` for the signed, notarized release workflow and updater publishing details.\n","summary":"Writer is a lightweight, fast markdown editor tailored for developers’ workspaces, built with Tauri, React, and Rust. It keeps notes directly on disk, honors a workspace’s `.gitignore`, supports multiple windows, and renders extended markdown features such as tables and Mermaid diagrams via CodeMirror. The tool offers a signed macOS release flow and a CLI integration for a seamless desktop experience. It is ideal for programmers, technical writers, and anyone who needs a quick, focused editor that stays in sync with their project files.","description":"Local-first desktop markdown editor","stars":491,"language":"TypeScript"},{"owner":"heyderekj","repo":"binky","url":"https://github.com/heyderekj/binky","readme":"# Binky\n\nA native macOS app that calms whatever folder is fussy — Downloads, Desktop, a Dropbox folder, a screenshots dump, you name it. **Quick Sort** is one-tap cleanup; **Routines** are named watchers with their own sources, rules, and optional Finder tags.\n\nBinky waits for files to finish landing, then routes them into clear sorted folders — Images, PDFs, Media, Documents, Archives, Apps, Screenshots, and Misc — or runs the action you chose (extract an archive, install from a DMG, fan out by Finder tag, and more).\n\nUnknown or sketchy extensions do not disappear silently: they land in **Review** first. Optional Finder tags, move summaries, and session history make it easy to verify what happened and undo where possible.\n\n## System requirements\n\n- **Apple Silicon** (M-series Mac). Current **1.x** DMG and Homebrew cask builds are not for Intel-based Macs (Finder may show the app icon with a slash through it on the wrong architecture).\n- **macOS 14** (Sonoma) or later (Liquid Glass UI on macOS 26 Tahoe).\n\n<table>\n  <tr>\n    <td><img src=\"site/screenshots/binky-sorting-2.png\" alt=\"Binky organizer with Downloads sorted into folders\" width=\"100%\" /></td>\n    <td><img src=\"site/screenshots/binky-routines-new.webp\" alt=\"Binky in Routines mode — named watchers, sources, rules, and organizer\" width=\"100%\" /></td>\n  </tr>\n  <tr>\n    <td><img src=\"site/screenshots/binky-sorting-summary-2.webp\" alt=\"Binky sorting summary showing batch outcomes\" width=\"100%\" /></td>\n    <td><img src=\"site/screenshots/binky-review-2.webp\" alt=\"Binky Review folder triage sheet\" width=\"100%\" /></td>\n  </tr>\n</table>\n\n## Releases\n\n**1.x** is organizer-first: sort now, watch continuously, review uncertain files, and keep a reliable history of move outcomes.\n\n**Homebrew:** add this repo as a tap once, then install the cask (see [Casks/README.md](Casks/README.md) for why it lives in-tree):\n\n```bash\nbrew tap heyderekj/binky https://github.com/heyderekj/binky\nbrew install --cask binky\n```\n\nYou can also download `Binky-{version}.dmg` or `Binky-{version}.zip` from [GitHub Releases](https://github.com/heyderekj/binky/releases).\n\n**Sister app — [Dinky](https://dinkyfiles.com)** (images, video, audio, PDF compression) currently requires **Apple Silicon** and **macOS 15 Sequoia** or later for distributed builds; see dinkyfiles.com for details.\n\n## About the developer\n\nHey! I'm [Derek Castelli](https://www.heyderekj.com), a full-time freelance web designer working primarily in Webflow and Figma. Binky came from a boring problem: Downloads gets noisy fast, and manually dragging files around all day is not the dream.\n\n## Features\n\n- **Quick Sort** — one-tap sweep for any folder (defaults to `~/Downloads`), with stable-file checks and collision-safe moves\n- **CLI (`binky`)** — ship the Organizer engine from Terminal; build `BinkyCore` with SwiftPM ([`docs/local-cli.md`](docs/local-cli.md))\n- **Routines** — multiple named watchers (each with its own source folder and rules) plus a global folder fallback\n- **Watch** - monitor folders continuously and route new files as they settle\n- **Rules** - extensions, names, origins, OCR/receipt hints, Finder tag predicates, actions (move, zip, extract, DMG install, tag fan-out, trash, rename)\n- **Review folder** — unknown or ambiguous extensions get held for inspection first\n- **History and undo-friendly flow** - batch summaries with moved, skipped, and review counts\n- **Finder Quick Action and Services** - run \"Sort with Binky\" on selected files\n- **Apple Shortcuts support** - \"Sort Files\" App Intent can hand paths to Binky\n- **Finder tags (optional)** - apply tags during routing for quick visual scanning\n- **Launch at login** - keep it ready in the background when your Mac boots\n- **Native macOS stack** - SwiftUI + AppKit, no bundled web runtime\n\n## What others don't do\n\n- **Treat uncertainty safely** - questionable files go to **Review** instead of being buried in the wrong folder\n- **Sort with context, not just extension lists** — routines and routing logic keep behavior predictable while you stay in control\n- **Keep a readable paper trail** - clear per-batch outcomes so you can verify what moved and what did not\n- **Fit native Mac workflows** - Finder Services, Shortcuts, and login-item support out of the box\n- **Stay lightweight** - organizer-first UX on Apple frameworks with strict bundle-size discipline\n\n## Why it exists\n\nDownloads is where good naming conventions go to die. Binky exists to make that mess quiet again without adding another noisy \"productivity system.\"\n\nFussy folder. Meet Binky.\n\n## How it works\n\nBinky is built in Swift and SwiftUI with AppKit integration for Mac-native behavior. The organizer pipeline waits for files to stabilize, classifies by routing rules, then moves them safely to target sorted folders with review safeguards.\n\nThe app keeps session outcomes so you can see exactly what happened in each run. Optional compatibility code from earlier compression-focused iterations may remain in the bundle, but the shipping product and UX are organizer-led.\n\n## Built with\n\n- SwiftUI\n- AppKit\n- Foundation\n- UserNotifications\n- SwiftPM package `BinkyCore/` bundles shared models + the optional `binky` CLI (`docs/local-cli.md`)\n\n## Install\n\nDownload the latest release and drag `Binky.app` to Applications.\n\nOr install with Homebrew:\n\n```bash\nbrew tap heyderekj/binky https://github.com/heyderekj/binky\nbrew install --cask binky\n```\n\n**Gatekeeper:** if macOS blocks the first launch, use **System Settings → Privacy & Security → Open Anyway**, or run:\n\n```bash\nxattr -dr com.apple.quarantine /Applications/Binky.app\n```\n\nFor local development:\n\n```bash\nxcodebuild -scheme Binky -configuration Debug test -destination 'platform=macOS'\n```\n\n## FAQ\n\n**macOS says Binky can't be opened — what do I do?**\n\nThat's Gatekeeper. Use **System Settings → Privacy & Security → Open Anyway**, or remove the quarantine flag with the `xattr` command in [Install](#install) above.\n\n**Is it actually free?**\n\n[Open source on GitHub](https://github.com/heyderekj/binky) under MIT. **Binky 1.x** stays free (official builds included). **Binky 2.0** will introduce a **one-time license** for official app builds with **one year of updates** included and **optional yearly renewals** for further updates — not a subscription. See [binkyfiles.com/#faq-licensing](https://binkyfiles.com/#faq-licensing).\n\n**How does licensing work for 2.0?**\n\nPay once, keep the app. Renewal only extends how long you receive updates. Source code stays MIT.\n\n**Binky + Dinky bundle?**\n\nPlanned: family bundle (one-time purchase, one year of updates for both, lower yearly renewal than separate). Details on binkyfiles.com when live.\n\n**Does Binky upload my files?**\n\nNo. Sorting stays on your Mac. No accounts baked in.\n\n**Mac only? Which macOS?**\n\nYes. SwiftUI, native frameworks, no cross-platform runtime. Requires macOS 14 Sonoma or later. On macOS 26 Tahoe, the UI uses Liquid Glass where available.\n\n**Does it move originals or make copies?**\n\nMoves originals. Nothing duplicated, nothing left behind in Downloads. That's why the stable-file gate and the Review folder exist — Binky won't touch a file it isn't sure about.\n\n**What if Binky isn't running when files land?**\n\nThe watch folder only acts while Binky is running. Files that arrived while it was off sit untouched — run Sort Now when you're ready and it'll sweep them up.\n\n**Can I set custom routing rules?**\n\nYep. Match by name, extension, kind, size, or date — then route to any folder you choose. Good for sending client files to client folders, project exports to project folders, receipts to wherever receipts go. Rules can also rename on the way and add Finder tags. They run before the default sorted folders.\n\n**What file types go in which destination?**\n\nImages (jpg, png, gif, webp, svg, heic…), PDFs, Media (mp4, mov, mp3, m4a…), Documents (doc, txt, md, xls…), Archives (zip, rar, 7z, tar…), Apps (dmg, pkg, app), Screenshots (matched by name pattern), Misc (everything else). Unknowns or ambiguous types go to Review.\n","summary":"Binky is a native Apple‑Silicon macOS app that automatically cleans up and organizes folders such as Downloads, Desktop, or cloud‑sync locations, routing files into well‑defined categories (Images, PDFs, Media, etc.) with a single tap or continuous watching.  \nIts core engine supports customizable rules based on extensions, names, origins, OCR hints, and Finder tags, and can perform actions like extracting archives, installing DMGs, or fan‑out tagging, while uncertain files are held in a Review folder for safe inspection.  \nBinky offers a Finder quick‑action, a CLI interface, Apple Shortcuts support, and a robust history with undo‑friendly summaries, making it ideal for power users, developers, and anyone who routinely deals with noisy downloads or chaotic file dumps on macOS 14+.","description":"Binky sorts your files.","stars":238,"language":"Swift"},{"owner":"zarazhangrui","repo":"beautiful-html-templates","url":"https://github.com/zarazhangrui/beautiful-html-templates","readme":"# beautiful-html-templates\n\nA library of reusable HTML slide templates designed so that any coding agent can pick the right one and produce a beautiful deck on the user's behalf, automatically.\n\nAgents using the library should read [`AGENTS.md`](./AGENTS.md). It's the operating manual: how to read `index.json`, match the user's brief to a template, clone it, and adapt the content.\n\n## Get started\n\nCopy this to your coding agent:\n\n```\nClone https://github.com/zarazhangrui/beautiful-html-templates and follow the instructions in AGENTS.md to build me a beautiful HTML slide deck.\n```\n\n## Gallery\n\nAll 32 templates. Three slides per template (cover · mid-deck · later) to give a sense of how each visual system handles different layouts. Click any template name to open its folder on GitHub — the HTML, metadata, and any sibling assets are all there.\n\n### [Soft Editorial](./templates/soft-editorial/)\n\n<p>\n  <img src=\"./screenshots/soft-editorial-4.png\" width=\"32.5%\" alt=\"Soft Editorial — slide 4\" />\n  <img src=\"./screenshots/soft-editorial-6.png\" width=\"32.5%\" alt=\"Soft Editorial — slide 6\" />\n  <img src=\"./screenshots/soft-editorial-10.png\" width=\"32.5%\" alt=\"Soft Editorial — slide 10\" />\n</p>\n\n> Cormorant Garamond serif on warm paper with sage, blush, and lemon accents.\n\n### [Stencil & Tablet](./templates/stencil-tablet/)\n\n<p>\n  <img src=\"./screenshots/stencil-tablet-1.png\" width=\"32.5%\" alt=\"Stencil & Tablet — slide 1\" />\n  <img src=\"./screenshots/stencil-tablet-3.png\" width=\"32.5%\" alt=\"Stencil & Tablet — slide 3\" />\n  <img src=\"./screenshots/stencil-tablet-8.png\" width=\"32.5%\" alt=\"Stencil & Tablet — slide 8\" />\n</p>\n\n> Bone paper with stencil-cut headlines and a six-color earth palette: archaeology meets brand.\n\n### [Vellum](./templates/vellum/)\n\n<p>\n  <img src=\"./screenshots/vellum-1.png\" width=\"32.5%\" alt=\"Vellum — slide 1\" />\n  <img src=\"./screenshots/vellum-4.png\" width=\"32.5%\" alt=\"Vellum — slide 4\" />\n  <img src=\"./screenshots/vellum-8.png\" width=\"32.5%\" alt=\"Vellum — slide 8\" />\n</p>\n\n> Deep navy canvas with warm-yellow italic Cormorant serifs and a single dusty teal accent. A quiet, scholarly aesthetic.\n\n### [Neo-Grid Bold](./templates/neo-grid-bold/)\n\n<p>\n  <img src=\"./screenshots/neo-grid-bold-1.png\" width=\"32.5%\" alt=\"Neo-Grid Bold — slide 1\" />\n  <img src=\"./screenshots/neo-grid-bold-3.png\" width=\"32.5%\" alt=\"Neo-Grid Bold — slide 3\" />\n  <img src=\"./screenshots/neo-grid-bold-8.png\" width=\"32.5%\" alt=\"Neo-Grid Bold — slide 8\" />\n</p>\n\n> Editorial neo-brutalism with a single neon yellow accent on off-white paper.\n\n### [Editorial Tri-Tone](./templates/editorial-tri-tone/)\n\n<p>\n  <img src=\"./screenshots/editorial-tri-tone-1.png\" width=\"32.5%\" alt=\"Editorial Tri-Tone — slide 1\" />\n  <img src=\"./screenshots/editorial-tri-tone-4.png\" width=\"32.5%\" alt=\"Editorial Tri-Tone — slide 4\" />\n  <img src=\"./screenshots/editorial-tri-tone-3.png\" width=\"32.5%\" alt=\"Editorial Tri-Tone — slide 3\" />\n</p>\n\n> Three-color editorial system: dusty pink, mustard cream, and deep burgundy, set in Bricolage + Instrument Serif.\n\n### [Creative Mode](./templates/creative-mode/)\n\n<p>\n  <img src=\"./screenshots/creative-mode-1.png\" width=\"32.5%\" alt=\"Creative Mode — slide 1\" />\n  <img src=\"./screenshots/creative-mode-4.png\" width=\"32.5%\" alt=\"Creative Mode — slide 4\" />\n  <img src=\"./screenshots/creative-mode-6.png\" width=\"32.5%\" alt=\"Creative Mode — slide 6\" />\n</p>\n\n> Cream paper canvas with confident multi-color (green, pink, orange, yellow) accents and Archivo Black display.\n\n### [Monochrome](./templates/monochrome/)\n\n<p>\n  <img src=\"./screenshots/monochrome-1.png\" width=\"32.5%\" alt=\"Monochrome — slide 1\" />\n  <img src=\"./screenshots/monochrome-4.png\" width=\"32.5%\" alt=\"Monochrome — slide 4\" />\n  <img src=\"./screenshots/monochrome-12.png\" width=\"32.5%\" alt=\"Monochrome — slide 12\" />\n</p>\n\n> Ivory ledger paper with all-black type; Lora serif headlines, Jost body, no color at all.\n\n### [People's Platform (Block & Bold)](./templates/peoples-platform/)\n\n<p>\n  <img src=\"./screenshots/peoples-platform-1.png\" width=\"32.5%\" alt=\"People's Platform (Block & Bold) — slide 1\" />\n  <img src=\"./screenshots/peoples-platform-4.png\" width=\"32.5%\" alt=\"People's Platform (Block & Bold) — slide 4\" />\n  <img src=\"./screenshots/peoples-platform-8.png\" width=\"32.5%\" alt=\"People's Platform (Block & Bold) — slide 8\" />\n</p>\n\n> Activist poster energy: blue, orange, red on cream, with Alfa Slab + Caveat Brush.\n\n### [Pink Script — After Hours](./templates/pink-script/)\n\n<p>\n  <img src=\"./screenshots/pink-script-1.png\" width=\"32.5%\" alt=\"Pink Script — After Hours — slide 1\" />\n  <img src=\"./screenshots/pink-script-4.png\" width=\"32.5%\" alt=\"Pink Script — After Hours — slide 4\" />\n  <img src=\"./screenshots/pink-script-8.png\" width=\"32.5%\" alt=\"Pink Script — After Hours — slide 8\" />\n</p>\n\n> Black canvas, hot pink accent, pearl-cream paper, Instrument Serif headlines: late-night editorial luxury.\n\n### [8-Bit Orbit](./templates/8-bit-orbit/)\n\n<p>\n  <img src=\"./screenshots/8-bit-orbit-1.png\" width=\"32.5%\" alt=\"8-Bit Orbit — slide 1\" />\n  <img src=\"./screenshots/8-bit-orbit-6.png\" width=\"32.5%\" alt=\"8-Bit Orbit — slide 6\" />\n  <img src=\"./screenshots/8-bit-orbit-5.png\" width=\"32.5%\" alt=\"8-Bit Orbit — slide 5\" />\n</p>\n\n> Pixel-art neon arcade aesthetic on a deep navy void.\n\n### [BlockFrame](./templates/block-frame/)\n\n<p>\n  <img src=\"./screenshots/block-frame-1.png\" width=\"32.5%\" alt=\"BlockFrame — slide 1\" />\n  <img src=\"./screenshots/block-frame-4.png\" width=\"32.5%\" alt=\"BlockFrame — slide 4\" />\n  <img src=\"./screenshots/block-frame-8.png\" width=\"32.5%\" alt=\"BlockFrame — slide 8\" />\n</p>\n\n> Neobrutalist deck with pastel-neon color blocks and chunky black borders.\n\n### [Blue Professional](./templates/blue-professional/)\n\n<p>\n  <img src=\"./screenshots/blue-professional-1.png\" width=\"32.5%\" alt=\"Blue Professional — slide 1\" />\n  <img src=\"./screenshots/blue-professional-6.png\" width=\"32.5%\" alt=\"Blue Professional — slide 6\" />\n  <img src=\"./screenshots/blue-professional-8.png\" width=\"32.5%\" alt=\"Blue Professional — slide 8\" />\n</p>\n\n> Cream paper background with electric cobalt blue accents; clean modern professional.\n\n### [Bold Poster](./templates/bold-poster/)\n\n<p>\n  <img src=\"./screenshots/bold-poster-1.png\" width=\"32.5%\" alt=\"Bold Poster — slide 1\" />\n  <img src=\"./screenshots/bold-poster-4.png\" width=\"32.5%\" alt=\"Bold Poster — slide 4\" />\n  <img src=\"./screenshots/bold-poster-8.png\" width=\"32.5%\" alt=\"Bold Poster — slide 8\" />\n</p>\n\n> Editorial poster aesthetic with massive Shrikhand display and a single fire-engine red accent.\n\n### [Broadside](./templates/broadside/)\n\n<p>\n  <img src=\"./screenshots/broadside-1.png\" width=\"32.5%\" alt=\"Broadside — slide 1\" />\n  <img src=\"./screenshots/broadside-4.png\" width=\"32.5%\" alt=\"Broadside — slide 4\" />\n  <img src=\"./screenshots/broadside-13.png\" width=\"32.5%\" alt=\"Broadside — slide 13\" />\n</p>\n\n> Dark editorial canvas with a single fire orange accent and bilingual Latin/Chinese type stack.\n\n### [Capsule](./templates/capsule/)\n\n<p>\n  <img src=\"./screenshots/capsule-1.png\" width=\"32.5%\" alt=\"Capsule — slide 1\" />\n  <img src=\"./screenshots/capsule-4.png\" width=\"32.5%\" alt=\"Capsule — slide 4\" />\n  <img src=\"./screenshots/capsule-8.png\" width=\"32.5%\" alt=\"Capsule — slide 8\" />\n</p>\n\n> Modular pill-shaped cards on warm bone with a full pastel-pop palette.\n\n### [Cartesian](./templates/cartesian/)\n\n<p>\n  <img src=\"./screenshots/cartesian-1.png\" width=\"32.5%\" alt=\"Cartesian — slide 1\" />\n  <img src=\"./screenshots/cartesian-4.png\" width=\"32.5%\" alt=\"Cartesian — slide 4\" />\n  <img src=\"./screenshots/cartesian-8.png\" width=\"32.5%\" alt=\"Cartesian — slide 8\" />\n</p>\n\n> Quiet warm-neutral palette with classical Playfair serifs; tasteful and unhurried.\n\n### [Coral](./templates/coral/)\n\n<p>\n  <img src=\"./screenshots/coral-1.png\" width=\"32.5%\" alt=\"Coral — slide 1\" />\n  <img src=\"./screenshots/coral-4.png\" width=\"32.5%\" alt=\"Coral — slide 4\" />\n  <img src=\"./screenshots/coral-8.png\" width=\"32.5%\" alt=\"Coral — slide 8\" />\n</p>\n\n> Cream and coral on near-black, set in oversized Bebas Neue.\n\n### [Daisy Days](./templates/daisy-days/)\n\n<p>\n  <img src=\"./screenshots/daisy-days-1.png\" width=\"32.5%\" alt=\"Daisy Days — slide 1\" />\n  <img src=\"./screenshots/daisy-days-4.png\" width=\"32.5%\" alt=\"Daisy Days — slide 4\" />\n  <img src=\"./screenshots/daisy-days-8.png\" width=\"32.5%\" alt=\"Daisy Days — slide 8\" />\n</p>\n\n> Cheerful pastel deck with hand-drawn daisies, stars, and rainbows. Friendly, soft, and warm.\n\n### [Grove](./templates/grove/)\n\n<p>\n  <img src=\"./screenshots/grove-1.png\" width=\"32.5%\" alt=\"Grove — slide 1\" />\n  <img src=\"./screenshots/grove-4.png\" width=\"32.5%\" alt=\"Grove — slide 4\" />\n  <img src=\"./screenshots/grove-8.png\" width=\"32.5%\" alt=\"Grove — slide 8\" />\n</p>\n\n> Forest-green canvas with cream type, classical Playfair serifs, and a single rust accent.\n\n### [Mat](./templates/mat/)\n\n<p>\n  <img src=\"./screenshots/mat-1.png\" width=\"32.5%\" alt=\"Mat — slide 1\" />\n  <img src=\"./screenshots/mat-4.png\" width=\"32.5%\" alt=\"Mat — slide 4\" />\n  <img src=\"./screenshots/mat-8.png\" width=\"32.5%\" alt=\"Mat — slide 8\" />\n</p>\n\n> Dark sage canvas with bone paper and burnt-orange accent; mid-century modern with wood undertones.\n\n### [Pin & Paper](./templates/pin-and-paper/)\n\n<p>\n  <img src=\"./screenshots/pin-and-paper-1.png\" width=\"32.5%\" alt=\"Pin & Paper — slide 1\" />\n  <img src=\"./screenshots/pin-and-paper-11.png\" width=\"32.5%\" alt=\"Pin & Paper — slide 11\" />\n  <img src=\"./screenshots/pin-and-paper-3.png\" width=\"32.5%\" alt=\"Pin & Paper — slide 3\" />\n</p>\n\n> Yellow paper with safety-pin illustrations, ink-blue handwritten Caveat, paper-grain texture.\n\n### [Playful](./templates/playful/)\n\n<p>\n  <img src=\"./screenshots/playful-1.png\" width=\"32.5%\" alt=\"Playful — slide 1\" />\n  <img src=\"./screenshots/playful-6.png\" width=\"32.5%\" alt=\"Playful — slide 6\" />\n  <img src=\"./screenshots/playful-8.png\" width=\"32.5%\" alt=\"Playful — slide 8\" />\n</p>\n\n> Sun-warm peach background with Syne display: a friendly indie launch deck.\n\n### [Raw Grid](./templates/raw-grid/)\n\n<p>\n  <img src=\"./screenshots/raw-grid-1.png\" width=\"32.5%\" alt=\"Raw Grid — slide 1\" />\n  <img src=\"./screenshots/raw-grid-4.png\" width=\"32.5%\" alt=\"Raw Grid — slide 4\" />\n  <img src=\"./screenshots/raw-grid-8.png\" width=\"32.5%\" alt=\"Raw Grid — slide 8\" />\n</p>\n\n> Neo-brutalist deck with thick borders, offset shadows, and a pink/sage/ink palette.\n\n### [Retro Windows](./templates/retro-windows/)\n\n<p>\n  <img src=\"./screenshots/retro-windows-1.png\" width=\"32.5%\" alt=\"Retro Windows — slide 1\" />\n  <img src=\"./screenshots/retro-windows-4.png\" width=\"32.5%\" alt=\"Retro Windows — slide 4\" />\n  <img src=\"./screenshots/retro-windows-8.png\" width=\"32.5%\" alt=\"Retro Windows — slide 8\" />\n</p>\n\n> Windows 95 chrome: gray title bars, MS Sans Serif, pixel typography, full nostalgia.\n\n### [Retro Zine](./templates/retro-zine/)\n\n<p>\n  <img src=\"./screenshots/retro-zine-1.png\" width=\"32.5%\" alt=\"Retro Zine — slide 1\" />\n  <img src=\"./screenshots/retro-zine-4.png\" width=\"32.5%\" alt=\"Retro Zine — slide 4\" />\n  <img src=\"./screenshots/retro-zine-8.png\" width=\"32.5%\" alt=\"Retro Zine — slide 8\" />\n</p>\n\n> Beige paper with green accent and Bebas Neue + Caveat: a riso-printed zine in HTML form.\n\n### [Scatterbrain](./templates/scatterbrain/)\n\n<p>\n  <img src=\"./screenshots/scatterbrain-1.png\" width=\"32.5%\" alt=\"Scatterbrain — slide 1\" />\n  <img src=\"./screenshots/scatterbrain-4.png\" width=\"32.5%\" alt=\"Scatterbrain — slide 4\" />\n  <img src=\"./screenshots/scatterbrain-8.png\" width=\"32.5%\" alt=\"Scatterbrain — slide 8\" />\n</p>\n\n> Post-it inspired: pastel sticky notes, Caveat handwriting, Shrikhand and Zilla Slab type stack.\n\n### [Signal](./templates/signal/)\n\n<p>\n  <img src=\"./screenshots/signal-1.png\" width=\"32.5%\" alt=\"Signal — slide 1\" />\n  <img src=\"./screenshots/signal-18.png\" width=\"32.5%\" alt=\"Signal — slide 18\" />\n  <img src=\"./screenshots/signal-8.png\" width=\"32.5%\" alt=\"Signal — slide 8\" />\n</p>\n\n> Deep navy canvas with bone paper and a single muted-gold accent; institutional with quiet weight.\n\n### [Studio](./templates/studio/)\n\n<p>\n  <img src=\"./screenshots/studio-1.png\" width=\"32.5%\" alt=\"Studio — slide 1\" />\n  <img src=\"./screenshots/studio-4.png\" width=\"32.5%\" alt=\"Studio — slide 4\" />\n  <img src=\"./screenshots/studio-8.png\" width=\"32.5%\" alt=\"Studio — slide 8\" />\n</p>\n\n> Black canvas with electric-yellow type; high-voltage design studio aesthetic.\n\n### [Biennale Yellow](./templates/biennale-yellow/)\n\n<p>\n  <img src=\"./screenshots/biennale-yellow-1.png\" width=\"32.5%\" alt=\"Biennale Yellow — slide 1\" />\n  <img src=\"./screenshots/biennale-yellow-5.png\" width=\"32.5%\" alt=\"Biennale Yellow — slide 5\" />\n  <img src=\"./screenshots/biennale-yellow-8.png\" width=\"32.5%\" alt=\"Biennale Yellow — slide 8\" />\n</p>\n\n> Solar yellow on warm parchment with deep indigo serif and atmospheric sun-glow gradients. Dutch-editorial poster energy.\n\n### [Sakura Chroma](./templates/sakura-chroma/)\n\n<p>\n  <img src=\"./screenshots/sakura-chroma-1.png\" width=\"32.5%\" alt=\"Sakura Chroma — slide 1\" />\n  <img src=\"./screenshots/sakura-chroma-3.png\" width=\"32.5%\" alt=\"Sakura Chroma — slide 3\" />\n  <img src=\"./screenshots/sakura-chroma-4.png\" width=\"32.5%\" alt=\"Sakura Chroma — slide 4\" />\n</p>\n\n> Vintage Japanese cassette-package aesthetic: cream paper, diagonal rainbow ribbons, condensed bold type, JIS-style spec checkboxes.\n\n### [Cobalt Grid](./templates/cobalt-grid/)\n\n<p>\n  <img src=\"./screenshots/cobalt-grid-1.png\" width=\"32.5%\" alt=\"Cobalt Grid — slide 1\" />\n  <img src=\"./screenshots/cobalt-grid-3.png\" width=\"32.5%\" alt=\"Cobalt Grid — slide 3\" />\n  <img src=\"./screenshots/cobalt-grid-5.png\" width=\"32.5%\" alt=\"Cobalt Grid — slide 5\" />\n</p>\n\n> Electric cobalt italic serifs on a graph-paper canvas, anchored by stair-stepped pixel-glitch decorations and slim hairline rules.\n\n### [Long Table](./templates/long-table/)\n\n<p>\n  <img src=\"./screenshots/long-table-1.png\" width=\"32.5%\" alt=\"Long Table — slide 1\" />\n  <img src=\"./screenshots/long-table-3.png\" width=\"32.5%\" alt=\"Long Table — slide 3\" />\n  <img src=\"./screenshots/long-table-7.png\" width=\"32.5%\" alt=\"Long Table — slide 7\" />\n</p>\n\n> Warm cream and rust-red supper-club aesthetic with bold uppercase grotesk headlines, italic Fraunces, and pill-shaped outlined buttons.\n\n## License\n\n[MIT](./LICENSE) — free to use, modify, and distribute.\n","summary":"beautiful-html-templates is a library of 32 ready‑made HTML slide decks that can be automatically assembled by a coding agent. Each template ships with sample slides, a metadata index, and an AGENTS.md guide that explains how to match a user brief, clone the chosen template, and inject new content. The collection offers consistent typography, color palettes, and layout variations, enabling agents to produce a polished, brand‑consistent deck with no manual coding. This makes the project especially useful for AI‑assistant developers, designers, and content creators who need to outsource the creation of visually appealing presentations.","description":"A library of HTML slide templates designed so any coding agent can pick the right one and produce a beautiful deck on the user's behalf, automatically.","stars":392,"language":"HTML"},{"owner":"sinanata","repo":"unity-ui-document-design-system","url":"https://github.com/sinanata/unity-ui-document-design-system","readme":"# Unity UI Toolkit Design System\n\nA drop-in **design system for Unity 6 UI Toolkit** (UIDocument + UXML + USS). Tokens, components, icons, mobile responsiveness, and a runtime helper — all themed dark, all keyboard-and-touch-ready, all editable from one stylesheet. Open-sourced as part of a small giving-back set of Unity tools — alongside the [Voronoi mesh fracturer](https://github.com/sinanata/unity-mesh-fracture) and the [cross-platform build orchestrator](https://github.com/sinanata/unity-cross-platform-local-build-orchestrator).\n\n<blockquote>\n<a href=\"https://store.steampowered.com/app/2269500/\"><img src=\"docs/leap-of-legends-icon.png\" align=\"left\" width=\"70\" height=\"70\" alt=\"Leap of Legends\"></a>\nBuilt for and battle-tested in <strong><a href=\"https://leapoflegends.com\">Leap of Legends</a></strong> — a cross-platform multiplayer game in active development on Steam, Google Play (internal testing), TestFlight, and macOS. Every menu, HUD, lobby, and store screen in the game is built on this design system. <a href=\"https://store.steampowered.com/app/2269500/\">Wishlist on Steam</a> — public mobile store pages coming soon.\n</blockquote>\n\n---\n\n## Live showcase\n\n[![UI Toolkit Design System — interactive web showcase. Hover or tap to inspect, toggle day/night, click classes to copy.](docs/screenshots/design_system_showcase.gif)](https://sinanata.github.io/unity-ui-document-design-system/)\n\n**[Open the interactive web demo →](https://sinanata.github.io/unity-ui-document-design-system/)** (click the gif, too)\n\nHover (desktop) or tap (mobile) any component to surface its **selector chain** — every parent class on the way down to the leaf, plus the leaf's class list ready to copy. Click the classes line to copy to clipboard. Toggle day / night in the COLORS section header and the whole tree retheme over 240 ms via the var() cascade. Slim themed scrollbar throughout, mobile flip below 768 px.\n\nBuild the demo locally any time:\n\n```powershell\n.\\Tools\\Build\\Build-Showcase.ps1 -Serve\n```\n\nServes at `http://localhost:3000`. See [`Tools/Build/README.md`](Tools/Build/README.md) for the orchestrator — no cloud builds, no Unity license secret, entirely local.\n\nThe showcase covers 23 sections: colors, typography, buttons, icons, inputs, tabs & filters, animal card, animal detail, navigation, badges & labels, toggles & checks, sliders, progress, modals / panels, toasts, empty states, bottom sheet, confirm dialog, quantity stepper, pagination, loading states, notification badge, avatar, scrollbars.\n\n---\n\n```\n.ds-btn ds-btn--primary       →  rounded green CTA, hover/press/disabled built in\n.ds-input    .ds-search       →  text fields with leading-icon slot + placeholder\n.ds-tab      .ds-tabs         →  segmented strip with .is-active state\n.ds-toggle   .ds-check        →  iOS-style switch + square checkbox (auto-knob via runtime)\n.ds-modal    .ds-toast        →  overlays with header / body / actions slots\n.ds-icon ds-icon--paw         →  60+ SVG icons, parent-state-driven tints\n.mobile .ds-…                 →  one-class layout flip for touch targets\n.theme-light                  →  add to .ds-root — every var(--color-*) re-paints, animated\n```\n\n## Why this exists\n\nUI Toolkit ships great primitives but no design language. Every project re-invents tokens, button hierarchy, input shells, mobile breakpoints, modal scaffolding, and an icon system — usually inconsistently across screens, usually as a side-project of the actual game/app. This repo is that work, finished, kept evergreen by [a real shipping product](https://leapoflegends.com).\n\nWhat you get on day one:\n\n- **A dark-themed token palette** — primary / secondary / tertiary / warning / danger / surface stack, all referenced via `var(--color-...)`. Swap one token, the whole UI follows. The showcase ships a `.theme-light` override under `Assets/Showcase/Resources/ShowcaseTheme.uss` so you can see the cascade animate to a light palette in real time.\n- **24 ready components** — buttons (5 variants × 4 states + icon + sizes), inputs (text / textarea / search / dropdown), tabs, toggles, checkboxes, radios, sliders + range, progress, modals, dialogs, drawers, toasts, badges, chips, tags, navigation (side / rail / bottom), avatars, notification dots, pagination, steppers, empty states, skeleton loaders, spinners.\n- **63 SVG icons** — paw, shirt, hats, store, cart, plus arrows, chevrons, status glyphs, action icons. White-fill SVGs that tint via `-unity-background-image-tint-color` so the same artwork serves passive / hover / active / muted states.\n- **One `.mobile` class** — add it to your screen root to flip every spacing token, tap target, and dropdown to touch-friendly sizes. Same UXML, same USS, two layouts.\n- **A runtime helper** — `DesignSystemRuntime.cs` auto-attaches to every `UIDocument` in a scene, injects toggle knobs (Unity's `Toggle` doesn't render the iOS-style sliding pill on its own), drives spinner rotation (USS transitions can't loop), and animates skeleton shimmer.\n- **Slim themed scrollbars** — 8 px-wide pill thumb in `var(--color-border-strong)` that brightens on hover, scoped to `.ds-root` so it doesn't leak into editor windows. Auto-themes with the rest of the system.\n\n## Requirements\n\n| Requirement | Notes |\n| --- | --- |\n| **Unity 6** (6000.x or newer) | Uses Unity 6 USS additions (`@import`, `background-size`, `-unity-background-image-tint-color`, parent-state cascades). Earlier versions partially work but components like the checkbox icon shrink rule rely on Unity 6 `background-size`. |\n| `com.unity.ui` (UI Toolkit) | Built-in module — already enabled by default in Unity 6. |\n| `com.unity.modules.vectorgraphics` | Built-in module in Unity 6 — already enabled by default. The standalone `com.unity.vectorgraphics` *package* is not required; Unity 6's engine ships the SVG ScriptedImporter (`fileID: 12408`) directly. The repo ships `.meta` files for every icon preset to `svgType: 3` (Texture) so they import correctly on first open. |\n\nNo other external dependencies. No NuGet, no asmdef requirements, no editor scripts.\n\n## Installation\n\nThe design system is a single folder you drop into your project's `Assets/`:\n\n```\nyour-unity-project/\n└── Assets/\n    └── DesignSystem/                  ← drop the whole folder\n        ├── Resources/\n        │   ├── UI/Styles/DesignSystem/    ← USS + UXML showcase\n        │   └── Textures/Icons/            ← 63 SVG icons\n        └── Runtime/\n            └── DesignSystemRuntime.cs\n```\n\n**Option A — copy files:**\n\n```powershell\n# From your Unity project root, on Windows or macOS:\ngit clone https://github.com/sinanata/unity-ui-document-design-system ../design-system-src\ncp -r ../design-system-src/Assets/DesignSystem Assets/DesignSystem\n```\n\n**Option B — git submodule (recommended for keeping the system updated):**\n\nThe submodule must live **outside** `Assets/` and the drop-in folder gets linked into `Assets/DesignSystem`. Putting the submodule directly under `Assets/` would make Unity import this repo's host project (`Assets/Showcase/`, `Assets/Editor/`, `Assets/WebGLTemplates/`) into the consuming project — and a symlink alongside that would produce duplicate-GUID errors.\n\n```bash\ncd your-unity-project\ngit submodule add https://github.com/sinanata/unity-ui-document-design-system Vendor/unity-ui-document-design-system\n```\n\nThen create an OS-level link from `Assets/DesignSystem` to the vendored copy:\n\n```powershell\n# Windows — directory junction (no admin / Developer Mode required)\ncmd /c mklink /J Assets\\DesignSystem Vendor\\unity-ui-document-design-system\\Assets\\DesignSystem\n```\n\n```bash\n# macOS / Linux — symbolic link\nln -s ../Vendor/unity-ui-document-design-system/Assets/DesignSystem Assets/DesignSystem\n```\n\nAdd the link itself to your `.gitignore` so each contributor re-creates it after their first clone (the link path is per-OS and per-clone state — junctions can't roundtrip through git, and symlinks don't roundtrip cleanly across Windows / *nix):\n\n```gitignore\n# Per-clone link to the vendored design system\nAssets/DesignSystem\nAssets/DesignSystem.meta\n```\n\n> **Working example:** [unity-mesh-fracture](https://github.com/sinanata/unity-mesh-fracture) consumes the design system this way — see the \"Cloning this demo project\" section of its README for the end-to-end recipe.\n\nAfter Unity reimports, every screen with a UIDocument can opt into the system by attaching the master stylesheet:\n\n```xml\n<ui:UXML xmlns:ui=\"UnityEngine.UIElements\">\n  <Style src=\"project://database/Assets/DesignSystem/Resources/UI/Styles/DesignSystem/DesignSystem.uss\" />\n\n  <ui:VisualElement class=\"ds-root\">\n    <ui:Button text=\"Get started\" class=\"ds-btn ds-btn--primary\" />\n  </ui:VisualElement>\n</ui:UXML>\n```\n\nThat's it. The runtime auto-attaches to every UIDocument; no per-screen wiring needed.\n\n## Quick start\n\n```xml\n<!-- A login form, fully styled, no inline CSS -->\n<ui:VisualElement class=\"ds-root\" style=\"padding: 24px;\">\n\n  <ui:Label text=\"Sign in\" class=\"ds-h2\" style=\"margin-bottom: 16px;\" />\n\n  <ui:VisualElement class=\"ds-search\" style=\"margin-bottom: 8px;\">\n    <ui:VisualElement class=\"ds-icon ds-icon--sm ds-icon--user ds-search__icon\" />\n    <ui:TextField class=\"ds-search__field\" />\n  </ui:VisualElement>\n\n  <ui:TextField class=\"ds-input\" style=\"margin-bottom: 16px;\" password=\"true\" />\n\n  <ui:VisualElement class=\"ds-row\" style=\"justify-content: space-between; margin-bottom: 16px;\">\n    <ui:Toggle class=\"ds-check\" />\n    <ui:Label text=\"Remember me\" class=\"ds-body-1\" />\n  </ui:VisualElement>\n\n  <ui:Button text=\"Sign in\" class=\"ds-btn ds-btn--primary ds-btn--block\" />\n\n</ui:VisualElement>\n```\n\nSet `searchField.textEdition.placeholder = \"Username\"` from C# and you have a complete, themed, mobile-ready form in 12 lines of UXML.\n\n## Mobile\n\nAdd the `.mobile` class to your screen root and the entire stylesheet flips:\n\n```csharp\nif (Screen.width < 768)              // or your own platform check\n    root.AddToClassList(\"mobile\");\n```\n\n- Buttons grow from 36 px to 48 px (touch target minimum).\n- Inputs grow to 48 px height with 15 px font.\n- Tabs spread to 48 px tall.\n- Sliders / range thumbs grow 18 px → 24 px with recomputed centering.\n- Modals widen, side rails compact, bottom-nav bar takes over from side-nav.\n\nAll in `Mobile.uss` — one file, ~350 lines, parallel-class structure to the desktop tokens. Full pattern in [docs/MOBILE.md](docs/MOBILE.md).\n\n## Icons\n\n63 white-fill SVGs under `Resources/Textures/Icons/`. Each has a class in `Icons.uss`:\n\n```xml\n<!-- Default tint = text-secondary -->\n<ui:VisualElement class=\"ds-icon ds-icon--paw\" />\n\n<!-- Tint variant -->\n<ui:VisualElement class=\"ds-icon ds-icon--lg ds-icon--accent\" />\n\n<!-- Inside a button — tint follows the button's hover/active state -->\n<ui:Button class=\"ds-btn ds-btn--icon\">\n  <ui:VisualElement class=\"ds-icon ds-icon--search\" />\n</ui:Button>\n```\n\nAdding a new icon: drop the SVG into `Resources/Textures/Icons/`, set `svgType: 3` (Texture) in the importer, add one line to `Icons.uss`. SVGs ship as `fill=\"white\"` so the design system's tint cascade can multiply onto any colour. Black-fill SVGs render black regardless of tint — see [docs/ICONS.md](docs/ICONS.md) for why and how.\n\n## Architecture\n\n```\nAssets/\n├── DesignSystem/                       ← the drop-in design system\n│   ├── Resources/UI/Styles/DesignSystem/\n│   │   ├── DesignSystem.uss            ← master, @imports the rest in order\n│   │   ├── DesignTokens.uss            ← :root variables (colors, radii, spacing, motion)\n│   │   ├── Typography.uss              ← .ds-h1 / .ds-h2 / .ds-h3 / .ds-body-1 / .ds-caption\n│   │   ├── Icons.uss                   ← .ds-icon + 63 .ds-icon--<name> + state cascade\n│   │   ├── Buttons.uss                 ← .ds-btn + variants + sizes + icon button\n│   │   ├── Inputs.uss                  ← .ds-input / .ds-search / .ds-dropdown / .ds-textarea\n│   │   ├── TabsAndFilters.uss          ← .ds-tabs / .ds-tab / .ds-view-toggle\n│   │   ├── Cards.uss                   ← animal card, info row\n│   │   ├── Navigation.uss              ← .ds-side-nav / .ds-side-rail / .ds-bottom-nav / profile\n│   │   ├── Badges.uss                  ← .ds-badge / .ds-tag / .ds-chip / .ds-avatar / notif dot\n│   │   ├── Controls.uss                ← .ds-toggle / .ds-check / .ds-radio / .ds-slider / .ds-range / scrollbars\n│   │   ├── Overlays.uss                ← .ds-modal / .ds-dialog / .ds-toast / .ds-sheet / empty\n│   │   ├── Feedback.uss                ← .ds-progress / .ds-spinner / .ds-skeleton / .ds-pagination\n│   │   ├── Mobile.uss                  ← every .mobile-prefixed responsive override (loaded LAST)\n│   │   └── DesignSystemShowcase.uxml   ← living style guide\n│   └── Runtime/DesignSystemRuntime.cs  ← auto-attaches to every UIDocument\n│\n├── Showcase/                           ← showcase host project (only if cloning the repo)\n│   ├── Showcase.unity                  ← minimal scene; bootstrap creates UIDocuments at runtime\n│   ├── Resources/\n│   │   ├── ShowcaseTheme.uss           ← .theme-light override + universal opacity transition\n│   │   ├── UnityDefaultRuntimeTheme.tss\n│   │   └── sinanata.jpg                ← avatar texture (Showcase only)\n│   └── Runtime/\n│       ├── ShowcaseBootstrap.cs        ← spawns docs, wires toggle, promo links\n│       └── ShowcaseDocOverlay.cs       ← selector-chain hover overlay\n│\n├── Editor/BuildCli.cs                  ← Unity batchmode entry for WebGL builds\n└── WebGLTemplates/ShowcaseTemplate/    ← custom WebGL template (mobile-friendly)\n\nTools/Build/\n├── Build-Showcase.ps1                  ← Windows orchestrator (-Serve / -Deploy)\n├── Deploy-GhPages.ps1                  ← single-commit force-push via git worktree\n├── config.example.json                 ← copy to config.local.json (gitignored)\n└── README.md                           ← orchestrator docs\n```\n\nImport order is load-bearing — Inputs.uss specialises selectors that Icons.uss generalises; Mobile.uss intentionally loads last so its specificity always wins. Don't reorder unless you read the comments first.\n\nThe `Assets/Showcase/`, `Assets/Editor/`, `Assets/WebGLTemplates/`, and `Tools/Build/` folders are the **host project** that runs the live demo. They're not part of the drop-in design system — if you copy `Assets/DesignSystem/` into your own project, leave them behind. Use them when you clone this repo to iterate on the design system itself.\n\nFull architectural reasoning in [docs/ARCHITECTURE.md](docs/ARCHITECTURE.md). Build pipeline docs in [Tools/Build/README.md](Tools/Build/README.md).\n\n## Components reference\n\nOne-line summary per component lives in [docs/COMPONENTS.md](docs/COMPONENTS.md). The showcase UXML is the second source of truth — every class appears there with its expected DOM structure.\n\n## What makes this robust\n\n- **Tokens, not hex.** Every colour, radius, spacing, motion timing references a `var(--…)` variable. Theme by editing one file (`DesignTokens.uss`).\n- **Parent-state cascades for icons.** A `.ds-icon` inside `.ds-btn:hover` retints automatically — you don't write per-component `:hover .icon` rules.\n- **Per-axis radius tokens.** Unity 6 USS clamps `border-radius` per axis to half the element's side. We ship `--radius-pill-9 / -16 / -20 / -28 / -36` so a circle stays a circle and a pill stays a pill regardless of element height.\n- **Auto-knob injection.** Unity's `Toggle` doesn't render the sliding pill on its own. `DesignSystemRuntime` injects a `.ds-toggle__knob` child every 250 ms — covers UXML-authored screens AND C#-cloned templates.\n- **No `Resources.Load<Texture2D>` in C#.** Icons resolve via USS `resource(...)` so they survive Sprite-vs-Texture import differences. The runtime never touches a backgroundImage.\n- **MinMaxSlider thumbs cross-centred via `top: 50% + margin-top: -<half>px`** — Unity's stock slider positions thumbs at `top: 0` which floats them above the track. Same trick for the single slider.\n- **Checkbox tick shrunk via `background-size: 12px 12px`** — the `check.svg` viewBox runs path-edge to viewBox-edge; default `stretch-to-fill` made the tick overflow the box's 2 px border. Constraining the rendered size leaves a clean inner margin.\n- **Day / night theme via single class.** Adding `.theme-light` to `.ds-root` redefines every colour token under that scope; the var() cascade re-paints the whole tree. A universal `transition-property` in `ShowcaseTheme.uss` animates the swap over 240 ms. Same pattern works for any custom theme — just author the token block.\n- **Progress-bar `min-height: 0` overrides.** Unity's stock `.unity-progress-bar` ships with `min-height: 21px`. `.ds-progress` resets it to 0 across container, background, and progress layers so an 8 px bar reserves exactly 8 px of vertical space (not the 21 px Unity defaults to).\n- **Spinner rotation is C#-driven, no USS transition.** `DesignSystemRuntime.StartSpinners` writes `style.rotate` every 16 ms. We deliberately omit `transition-property: rotate` from `.ds-spinner` — a transition would try to ease between consecutive per-frame writes and the spinner visibly jiggles instead of spinning.\n\nEvery \"why is this ugly?\" complaint we hit while shipping the game lives as a comment on the rule that fixed it. Read the USS files — half of them are documentation.\n\n## Contributing\n\nIssues and PRs welcome. The whole system is ~1700 lines of USS + 180 lines of C# — readable in an afternoon, hackable in a weekend.\n\nAreas where help is especially useful:\n\n- Light theme — the token structure supports it (just override `:root`); a polished `LightTokens.uss` is on the roadmap.\n- Localisation — RTL flips for nav-item icons / chevrons / arrow buttons, and a doc note on which classes need a mirror modifier.\n- Additional icons — particularly platform glyphs (Steam / Apple / Google), gameplay glyphs (D-pad, button prompts), and currency icons.\n- Editor scripts — a Unity menu item that toggles `.mobile` on the active UIDocument's root for live preview, like the showcase but for any screen.\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for the naming convention, file-load order, and PR checklist.\n\n## Credits & support\n\nMade for **[Leap of Legends](https://leapoflegends.com)** — a cross-platform physics-heavy multiplayer game in active development, targeting Steam, iOS, Android, and Mac. If this design system saved you time:\n\n- ⭐ Star the repo\n- 🎮 [Wishlist Leap of Legends on Steam](https://store.steampowered.com/app/2269500/) — mobile store pages coming soon\n- 🐦 Shout out [@sinanata](https://x.com/sinanata)\n\n## Licence\n\nMIT — see [LICENSE](LICENSE). Free for commercial use. No warranty.\n\nThe 63 SVG icons under `Resources/Textures/Icons/` are released under the same MIT licence — use them in your own projects, ship them in commercial products, modify them freely.\n\n---\n\n**[Leap of Legends](https://leapoflegends.com)** · physics · multiplayer · cross-platform · in development · the UI you see in every screenshot was built with this system.\n","summary":"Unity UI Toolkit Design System is a drop‑in framework for Unity 6’s UIDocument, UXML, and USS workflow that supplies a dark‑theme token palette, ready‑made components, an extensive icon set, and mobile‑responsive helpers—all editable from a single stylesheet. It includes over twenty four curated UI elements such as buttons, inputs, tab strips, sliders, and modals, along with a runtime helper that automatically applies iOS‑style toggles and supports keyboard and touch interaction. The system was built and rigorously tested inside the multiplayer title Leap of Legends, ensuring reliability across Steam, Google Play, TestFlight, and macOS. Unity developers and UI/UX designers looking for a cohesive, theme‑driven toolkit to accelerate UI creation will find this design system a practical foundation for consistent interfaces.","description":"A drop-in design system for Unity 6 UI Toolkit (UIDocument + UXML + USS). Tokens, components, icons, mobile responsiveness, and a runtime helper — all themed dark, all keyboard-and-touch-ready, all editable from one stylesheet.","stars":203,"language":"C#"},{"owner":"debba","repo":"gh-dashboard","url":"https://github.com/debba/gh-dashboard","readme":"# gh-dashboard\n\n> `gh-dashboard` is a working name. The final project name will be picked together with the community — share your suggestion in the [naming discussion](https://github.com/debba/gh-dashboard/discussions/1) or on Discord.\n\n> The initial scaffolding of this repository was produced in an AI-assisted session with [Claude Code](https://claude.com/claude-code). From here on, code is reviewed and maintained by humans, and contributions are welcome.\n\n<p align=\"center\">\n  <a href=\"https://discord.gg/YrZPHAwMSG\"><img src=\"https://img.shields.io/discord/1470772941296894128?color=5865F2&logo=discord&logoColor=white&label=Discord\" alt=\"Discord\" /></a>\n</p>\n\nAn open-source dashboard to explore your GitHub repositories, issues, pull requests, traffic, and CI activity from a single interface.\n\n## Demo\n\n<div align=\"center\">\n  <img src=\"public/demo.gif\" alt=\"gh-dashboard demo\" />\n</div>\n\n## What it does\n\nThe dashboard pulls data from the GitHub REST and GraphQL APIs and organizes it into a few different views:\n\n- **Repositories** — paginated grid with description, language, stars, forks, open issues, last push and a per-repo health score. Filter by organization, language, visibility, forks/archived; sort by stars, recent activity, etc.\n- **Issues / Pull Requests** — cross-repo lists with the same filter sidebar, useful for triage across many projects.\n- **Insights** — overview of all repos with alerts (\"issues need attention\", \"no push for X days\"), opportunities, and correlations between traffic and recent activity. Each repo gets a status (Strong / Watch / Risky).\n- **Daily digest** — short per-repo summary of the day's movement (stars, forks, issues), with an executive summary you can copy as Markdown. Optionally augmented by an OpenAI-generated narrative when `OPENAI_API_KEY` is configured.\n- **Board** — Kanban-style view that groups issues into columns (Backlog, To-do, In progress, Ready, In review, etc.).\n\n### Per-repository view\n\nOpen any repository to see:\n\n- **Overview** — stars, forks, open issues, owner, license, default branch, last push.\n- **Actions** — recent workflow runs.\n- **PRs** and **Issues** — open and recent items, paginated.\n- **Releases** — release history.\n- **Forks** — list of forks, sortable by most stars or recent push.\n- **Traffic** — views and clones for the last 14 days, unique visitors/cloners, top referrers, popular paths.\n- **Mentions** — references to the repo found via GitHub code/issue search, including previous names of the project.\n- **Dependents** — repository relationships, where available.\n- **Languages and trend charts** — language breakdown and stars/forks history.\n- **Contributors** — paginated list with commit counts.\n\n## Architecture\n\nThe app is a single repository with two cooperating processes:\n\n- **Backend** — a Node HTTP server (`src/server.ts` + `src/server/*`) that handles GitHub OAuth (Device Flow), proxies all REST/GraphQL calls, caches responses on disk, and exposes a small JSON API under `/api/*`. The GitHub token is stored locally under `~/.gh-issues-dashboard/` and **never exposed to the browser**.\n- **Frontend** — a React 19 + Vite SPA (`src/main.tsx`, `src/App.tsx`, `src/components/*`, `src/api/*`) that consumes the backend's `/api/*` endpoints.\n\nIn production both are served by the Node process: Vite builds the SPA into `dist/client/` and the server falls back to `index.html` for non-API routes.\n\n### Tech stack\n\n| Layer       | Tech                                           |\n| ----------- | ---------------------------------------------- |\n| Language    | TypeScript                                     |\n| Frontend    | React 19, Vite 8                               |\n| Backend     | Node `http` + `tsx` watch (dev), compiled JS in production |\n| Tests       | Vitest + jsdom                                 |\n| Tooling     | `concurrently`, `tsc`                          |\n\n## Prerequisites\n\n- **Node.js 20+** (anything that supports native `fetch` and ESM is fine).\n- A **GitHub OAuth App** with **Device Flow enabled** (see next section).\n- (Optional) An **OpenAI API key** if you want AI-generated daily digest summaries.\n\n## Configure GitHub\n\nThe dashboard talks to GitHub using a personal **OAuth App** with the **Device Authorization Flow**. This means you keep ownership of the credentials and there is no client secret to manage. You only have to do this once.\n\n### 1. Create the OAuth App\n\n1. Go to <https://github.com/settings/developers> → **OAuth Apps** → **New OAuth App**.\n   (For an org-owned app, use **Settings → Developer settings → OAuth Apps** on the organization instead.)\n2. Fill in the form:\n   - **Application name** — anything, e.g. `gh-dashboard (local)`.\n   - **Homepage URL** — `http://127.0.0.1:8765` (or any URL you control; this is informational).\n   - **Authorization callback URL** — `http://127.0.0.1:8765` will do. Device Flow does not actually use a redirect, but GitHub requires the field.\n3. Click **Register application**.\n\n### 2. Enable Device Flow\n\nOn the OAuth App's settings page, tick **Enable Device Flow** and **Update application**. This is required — without it, sign-in will fail with `unsupported_grant_type`.\n\n### 3. Copy the Client ID\n\nYou only need the **Client ID** (it looks like `Iv1.xxxxxxxxxxxxxxxx` or `Ov23li...`). **Do not** generate a client secret — Device Flow does not use one, and the dashboard never reads it.\n\n### 4. Export it before starting the server\n\n```bash\nexport GITHUB_CLIENT_ID=Iv1.xxxxxxxxxxxxxxxx\n```\n\nYou can also put it in a `.env` file or your shell profile. The server reads `process.env.GITHUB_CLIENT_ID` at startup and will refuse to start the OAuth flow without it.\n\n### 5. Sign in from the UI\n\nWhen you open the dashboard for the first time, it will:\n\n1. call the backend, which asks GitHub for a **device code**;\n2. show you a short **user code** and a verification URL (typically <https://github.com/login/device>);\n3. you paste the code on GitHub and approve the requested scopes;\n4. the backend exchanges the device code for an access token and stores it in `~/.gh-issues-dashboard/` — **the token never reaches the browser**.\n\nGranted scopes default to `repo read:org project read:user user:email`. To narrow them, set `GITHUB_OAUTH_SCOPES` (see [Configuration](#configuration)). If you ever want to revoke access, remove the app from <https://github.com/settings/applications> and delete the local token file under `~/.gh-issues-dashboard/`.\n\n## Configuration\n\nThe server reads its configuration from environment variables:\n\n| Variable               | Required | Default                                        | Purpose                                          |\n| ---------------------- | -------- | ---------------------------------------------- | ------------------------------------------------ |\n| `GH_AUTH_MODE`         | no       | `device`                                       | Auth source: `device` (OAuth Device Flow), `gh-cli` (reuse local `gh` CLI), or `token` (use `GITHUB_TOKEN`). Aliases accepted: `GITHUB_AUTH_MODE`, `GITHUB_MODE`. |\n| `GITHUB_CLIENT_ID`     | only `device` | —                                         | Client ID of your GitHub OAuth App (Device Flow) |\n| `GITHUB_OAUTH_SCOPES`  | no       | `repo read:org project read:user user:email`   | OAuth scopes requested at sign-in (Device Flow)  |\n| `GITHUB_TOKEN`         | only `token` | —                                          | Personal access token used when `GH_AUTH_MODE=token` |\n| `HOST`                 | no       | `127.0.0.1`                                    | Interface the server binds to                    |\n| `PORT`                 | no       | `8765`                                         | Port the server listens on                       |\n| `OPENAI_API_KEY`       | no       | —                                              | Enables AI-generated daily digest narratives     |\n| `OPENAI_DIGEST_MODEL`  | no       | `gpt-4.1-mini`                                 | Model used for digest narratives                 |\n\n### Authentication modes\n\nThe dashboard can obtain a GitHub token in three different ways. Pick the one that fits your setup:\n\n- **`device` (default)** — OAuth App + Device Flow, as described above. The token is stored under `~/.gh-issues-dashboard/` and refreshed via the in-app sign-in screen. Requires `GITHUB_CLIENT_ID`.\n- **`gh-cli`** — if you already use the [GitHub CLI](https://cli.github.com/), set `GH_AUTH_MODE=gh-cli` and the server will read the token by running `gh auth token` on each request (cached in-process for 60s). No OAuth App is needed; the scopes are whatever your `gh` session already has. Run `gh auth refresh -h github.com -s repo,read:org,project` if you need extra scopes.\n- **`token`** — bring-your-own personal access token. Set `GH_AUTH_MODE=token` and export `GITHUB_TOKEN=<your-pat>`. Useful for headless / CI-style deployments.\n\nIn `gh-cli` and `token` modes the device-flow sign-in screen is hidden; the server treats the configured source as authoritative.\n\nTokens and snapshots are persisted under `~/.gh-issues-dashboard/`.\n\n### Quick env setup\n\n```bash\nexport GITHUB_CLIENT_ID=Iv1.xxxxxxxxxxxxxxxx\n# optional\nexport OPENAI_API_KEY=sk-...\n```\n\n## Install\n\n```bash\nnpm install\n```\n\n## Run in development\n\nStarts the API server (with file-watch reload) and the Vite dev server in parallel. The Vite dev server proxies `/api` to the backend on port `8765`.\n\n```bash\nnpm run dev\n```\n\nThen open <http://127.0.0.1:5173>. On first launch the UI will walk you through the GitHub Device Flow sign-in.\n\nIf you only want one of the two processes:\n\n```bash\nnpm run api    # backend only, on http://127.0.0.1:8765\n```\n\n## Build\n\nType-checks the server, compiles it to `dist/`, and produces the production frontend bundle under `dist/client/`:\n\n```bash\nnpm run build\n```\n\n## Run the production build\n\nAfter `npm run build`, the Node server can serve both the API and the built SPA from a single port:\n\n```bash\nnpm start\n# or, equivalently\nnpm run serve\n```\n\nThen open <http://127.0.0.1:8765>.\n\n`npm run preview` is also available if you want to preview only the static frontend through Vite (no backend).\n\n## Run with Docker\n\nA multi-stage `Dockerfile` and a `docker-compose.yml` are provided. The image builds the server + SPA bundle and runs as a non-root user; tokens and snapshots are persisted to a named volume mounted at `/home/node/.gh-issues-dashboard`.\n\nWith Docker Compose (recommended):\n\n```bash\ncat > .env <<'EOF'\nGITHUB_CLIENT_ID=Iv1.xxxxxxxxxxxxxxxx\n# Optional — enables AI-generated daily digest narratives\nOPENAI_API_KEY=sk-...\n# Optional overrides\n# OPENAI_DIGEST_MODEL=gpt-4.1-mini\n# GITHUB_OAUTH_SCOPES=repo read:org project read:user user:email\nEOF\ndocker compose up -d --build\n# open http://127.0.0.1:8765\n```\n\nWith plain Docker:\n\n```bash\ndocker build -t gh-dashboard .\ndocker run -d --name gh-dashboard \\\n  -p 8765:8765 \\\n  -e GITHUB_CLIENT_ID=Iv1.xxxxxxxxxxxxxxxx \\\n  -e OPENAI_API_KEY=sk-... \\\n  -v gh-dashboard-data:/home/node/.gh-issues-dashboard \\\n  gh-dashboard\n```\n\nThe container forwards `GITHUB_CLIENT_ID`, `GITHUB_OAUTH_SCOPES`, `OPENAI_API_KEY` and `OPENAI_DIGEST_MODEL` from the host environment (or `.env` with Compose) — see [Configuration](#configuration) for the full list. It sets `HOST=0.0.0.0` so the server is reachable from outside. To wipe the stored token (full logout) remove the volume: `docker volume rm gh-dashboard-data`.\n\n## Test & type-check\n\n```bash\nnpm test          # vitest run\nnpm run typecheck # tsc --noEmit\n```\n\nTests live under `tests/` and mirror the structure of `src/` (see [AGENTS.md](AGENTS.md)).\n\n## Project layout\n\n```\n.\n├── index.html                 # SPA entrypoint consumed by Vite\n├── src/\n│   ├── main.tsx               # React bootstrap\n│   ├── App.tsx                # Top-level component & routing\n│   ├── api/                   # Browser-side API client (calls /api/*)\n│   ├── components/            # UI: views, modals, common, sidebar, top bar\n│   ├── styles/                # CSS modules (tokens, layout, views, modals, …)\n│   ├── server.ts              # Node HTTP server entrypoint\n│   ├── server/                # OAuth, GitHub client, caches, digests, insights\n│   ├── types/github.ts        # Shared TypeScript types\n│   └── utils/                 # Pure logic (covered by unit tests)\n├── tests/                     # Vitest suites mirroring src/\n├── public/                    # Static assets (demo media)\n├── vite.config.ts\n├── tsconfig.json              # Frontend TS config\n└── tsconfig.server.json       # Server TS config (build → dist/)\n```\n\n## Status\n\nEarly scaffolding. APIs, modules, and the UI are still being shaped — expect rapid changes. Star the repo and join Discord to follow along.\n\n## Community\n\n- [Discord server](https://discord.gg/YrZPHAwMSG) — suggest features, report issues, or just say hi.\n- [Help name the project](https://github.com/debba/gh-dashboard/discussions/1) — open discussion for naming suggestions.\n\n## Contributing\n\nBefore opening a PR, please skim [AGENTS.md](AGENTS.md) for the project conventions (English-only identifiers, pure logic in `src/utils/` with mirrored tests, no GitHub tokens on the browser, etc.) and run `npm test` + `npm run build`.\n\n## License\n\nMIT License — see [LICENSE](LICENSE).\n","summary":"gh‑dashboard is an open‑source web app that lets you monitor and triage your GitHub repositories from a single interface. It pulls data via GitHub’s REST and GraphQL APIs and offers a paginated repository grid, cross‑repo issue and pull‑request lists, a Kanban board, and detailed per‑repo pages that include traffic, releases, forks, and a daily digest that can be augmented with an OpenAI‑generated narrative. The Node‑based backend handles OAuth securely and proxies all API calls, while a React 19 SPA renders the data in a responsive, interactive layout. Developers, team leads, and open‑source maintainers can use the tool to gauge repository health, spot stale activity, and prioritize work across multiple projects.","description":"Open-source Github dashboard built on REST and GraphQL APIs: repositories, issues, pull requests, traffic, Actions, contributors, dependents, and a kanban board view.","stars":221,"language":"TypeScript"},{"owner":"tolibear","repo":"goalbuddy","url":"https://github.com/tolibear/goalbuddy","readme":"# GoalBuddy\n\n<p align=\"center\">\n  <a href=\"https://goalbuddy.dev\">\n    <img src=\"internal/assets/goalbuddy-readme-hero.png\" alt=\"GoalBuddy turns vague Codex goals into structured progress with Scout, Judge, Worker, receipts, and verification.\" width=\"100%\">\n  </a>\n</p>\n\n<p align=\"center\">\n  <strong>Turn open-ended Codex work into one reviewable goal board.</strong>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://www.npmjs.com/package/goalbuddy\"><img alt=\"npm\" src=\"https://img.shields.io/npm/v/goalbuddy?style=flat-square&color=684cff\"></a>\n  <a href=\"LICENSE\"><img alt=\"MIT License\" src=\"https://img.shields.io/badge/license-MIT-071236?style=flat-square\"></a>\n  <a href=\"https://goalbuddy.dev\"><img alt=\"goalbuddy.dev\" src=\"https://img.shields.io/badge/site-goalbuddy.dev-684cff?style=flat-square\"></a>\n</p>\n\nGoalBuddy is a local Codex companion for work that is too broad to trust to a single prompt. It turns a vague request into a `goal.md` charter, a machine-readable `state.yaml` board, role-tagged Scout/Judge/Worker tasks, compact receipts, and verification before completion.\n\n```bash\nnpx goalbuddy\n```\n\nOr install it globally:\n\n```bash\nnpm i -g goalbuddy\n```\n\nThen restart Codex and invoke the installed skill:\n\n```text\n$goal-prep\n```\n\n`$goal-prep` prepares the GoalBuddy board and prints the `/goal` command to run next. It does not start `/goal` automatically.\n\n## Why GoalBuddy Exists\n\nLong Codex goals drift. A request like \"improve this project\" can turn into unbounded edits, stale verification, and premature completion claims.\n\nGoalBuddy gives Codex a durable loop:\n\n```text\nvague goal -> Scout -> Judge -> Worker -> receipt -> verify -> repeat\n```\n\nThe main `/goal` thread acts as PM. It owns the board, keeps exactly one active task, delegates when useful, records receipts, and only completes after a Judge or PM audit proves the original outcome is done.\n\n## What You Get Locally\n\n```text\ndocs/goals/<slug>/\n  goal.md\n  state.yaml\n  notes/\n```\n\n- `goal.md` is the editable charter: objective, constraints, tranche, and stop rule.\n- `state.yaml` is the board truth: task status, active task, receipts, and verification.\n- `notes/` holds longer Scout, Judge, or PM findings when a task receipt would be too large.\n\n## The Operating Model\n\nGoalBuddy uses four primitives:\n\n- **Charter**: states what this goal is trying to accomplish and what must stay true.\n- **Board**: tracks tasks, status, receipts, and verification freshness.\n- **Task**: exactly one active Scout, Judge, Worker, or PM task.\n- **Receipt**: compact proof for every completed, blocked, or escalated task.\n\nThe default agents are installed with the skill:\n\n- **Scout** maps repo evidence, workflows, constraints, risks, and candidate next tasks.\n- **Judge** resolves ambiguity, scope, risk, task selection, and completion claims.\n- **Worker** performs one bounded implementation or recovery slice with explicit files and checks.\n\n## Install And Check Readiness\n\nInstall and enable the native Codex plugin:\n\n```bash\nnpx goalbuddy\n```\n\nRestart Codex, then use `$goal-prep`. To add the optional extension bundle:\n\n```bash\nnpx goalbuddy extend install --all\n```\n\nIf you prefer a global executable, install the npm package globally and run `goalbuddy`:\n\n```bash\nnpm i -g goalbuddy\ngoalbuddy\n```\n\nUse the skill-only fallback if your Codex build does not support plugins:\n\n```bash\nnpx goalbuddy install\nnpx goalbuddy update\n```\n\nNative Codex `/goal` is still an under-development Codex feature. Before relying on the printed command, confirm your local Codex runtime is logged in and has goals enabled:\n\n```bash\ncodex login status\ncodex features enable goals\nnpx goalbuddy doctor --goal-ready\n```\n\nRepair only the bundled agent definitions:\n\n```bash\nnpx goalbuddy agents\n```\n\nCheck the local install:\n\n```bash\nnpx goalbuddy doctor\n```\n\nCheck whether a newer GoalBuddy release is available:\n\n```bash\nnpx goalbuddy check-update\n```\n\nUse a non-default Codex home:\n\n```bash\nnpx goalbuddy --codex-home /path/to/.codex\n```\n\n`plugin install`, `install`, `update`, and `doctor` also support `--json` when an agent or script needs structured output.\n\n## Run A Goal\n\nAfter `$goal-prep` creates or repairs the board, start the run with the printed command:\n\n```text\n/goal Follow docs/goals/<slug>/goal.md.\n```\n\nCheck board health at any time:\n\n```bash\nnode ~/.codex/skills/goalbuddy/scripts/check-goal-state.mjs docs/goals/<slug>/state.yaml\n```\n\nFor a broad prompt like \"Improve my project,\" the first active task should usually be Scout, not Worker:\n\n```yaml\ntasks:\n  - id: T001\n    type: scout\n    assignee: Scout\n    status: active\n    objective: \"Map repo health and identify improvement candidates.\"\n    receipt: null\n  - id: T002\n    type: judge\n    assignee: Judge\n    status: queued\n    objective: \"Choose the next safe implementation task.\"\n    receipt: null\n  - id: T003\n    type: worker\n    assignee: Worker\n    status: queued\n    objective: \"Execute the safe implementation task selected by Judge.\"\n    allowed_files: []\n    verify: []\n    stop_if:\n      - \"Need files outside allowed_files.\"\n      - \"Verification fails twice.\"\n    receipt: null\n```\n\n## Extensions\n\nThe npm package is the stable core. Optional extensions live under `extend/` and are discovered from the GitHub-hosted `extend/catalog.json`, so users do not need a new npm release for every integration.\n\n```bash\nnpx goalbuddy extend\nnpx goalbuddy extend github-pr-workflow\nnpx goalbuddy extend install github-pr-workflow --dry-run\nnpx goalbuddy extend install --all --dry-run\nnpx goalbuddy extend install --all\n```\n\n`goalbuddy extend` shows available extensions and detail commands. `goalbuddy extend <id>` shows local install state, activation state, credential requirements, safe-by-default status, and missing environment variables.\n\nCurrent catalog examples include:\n\n- `github-pr-workflow`: prepares receipt-aligned commit and PR handoff text.\n- `github-projects`: mirrors GoalBuddy boards into GitHub Projects.\n- `ai-diff-risk-review`: summarizes risk in the current diff.\n- `ci-failure-triage`: maps failing CI back to likely causes and next tasks.\n- `docs-drift-audit`: checks whether docs still match implementation.\n- `codebase-onboarding-map`: creates a concise repo map from files and conventions.\n- `release-readiness`: checks whether a goal is ready to publish.\n\nExtensions can publish, report, intake, or add role guidance. They are not board truth. `state.yaml` remains authoritative.\n\n## Compatibility Window\n\nGoalBuddy was previously published as `goal-maker`. During the migration window, `npx goal-maker` remains available as a compatibility alias and prints the new command:\n\n```bash\nnpx goalbuddy\n```\n\nMachine-readable commands such as `npx goal-maker install --json` keep JSON output clean so existing automation can migrate safely.\n\nRelease automation for future npm publishes is documented in [RELEASE.md](RELEASE.md).\n\n## Examples\n\n- `examples/improve-goal-maker/`: a small completed reliability run.\n- `examples/extend-catalog-workflow/`: a larger run from product framing through implementation and cleanup.\n- `examples/github-pr-workflow-extension/pr-handoff.md`: an extension-generated PR handoff artifact.\n\n## Repo Map\n\n- `goalbuddy/SKILL.md`: canonical Codex skill\n- `goalbuddy/agents/`: Scout, Judge, and Worker definitions\n- `goalbuddy/templates/`: `goal.md`, `state.yaml`, and `note.md`\n- `goalbuddy/scripts/check-goal-state.mjs`: v2 board checker\n- `internal/cli/goal-maker.mjs`: npm installer CLI\n- `plugins/goalbuddy/`: repo-local Codex plugin package scaffold\n- `extend/` and `extend/catalog.json`: GitHub-hosted extension surface\n- `examples/`: completed sample runs\n\n## Status\n\n`0.2.x` is the v2 board and receipt model. It intentionally rejects old v1 `gate`, `units`, `artifacts`, and `evidence.jsonl` goal folders instead of auto-migrating them.\n\nUse GoalBuddy to structure autonomous Codex work. Keep relying on repo-specific `AGENTS.md`, tests, and CI for repo facts.\n\n## License\n\nMIT\n","summary":"GoalBuddy is a local companion for OpenAI Codex that transforms vague, open‑ended requests into a structured goal board consisting of a `goal.md` charter, a machine‑readable `state.yaml`, and compact receipt files. It uses built‑in Scout, Judge, and Worker primitives to decompose tasks, track a single active task, collect evidence, and verify completion through a durable loop of scout‑judge‑worker‑verify steps. The tool automatically generates goal artifacts in a `docs/goals/<slug>/` directory, enables audit‑ready receipts, and integrates with Codex via a simple `$goal-prep` skill command or a global npm install. Developers and teams using Codex for large or complex projects will benefit from its goal‑management, accountability, and verification features that turn broad ideas into reviewable, repeatable work.","description":"Supercharge Codex Goals","stars":248,"language":"JavaScript"},{"owner":"anvie","repo":"evonic","url":"https://github.com/anvie/evonic","readme":"# Evonic\n\n> **Design. Deploy. Orchestrate.**  \n> *Your Models. Your Rules. Your Swarm.*\n\nEvonic is an **agentic AI framework** for designing, building, and orchestrating intelligent agents from concept to production. It empowers you to define every aspect of an agent — its **model**, **tools**, **knowledge base**, **channels**, and **skills** — and compose them into multi-agent systems that operate autonomously across distributed environments.\n\n**Full documentation:** [evonic.dev](https://evonic.dev)\n\n<p align=\"center\">\n  <img src=\"static/img/mascot-large.png\" alt=\"Evonic Logo\" width=\"200\">\n</p>\n\n<p align=\"center\">\n  <img src=\"static/img/evonic-web.jpg\" alt=\"Evonic Web UI Screenshot\" width=\"600\">\n</p>\n\n---\n\n## Three Core Differentiators\n\nEvonic is not just another agent framework. Three architectural decisions set it apart:\n\n### 1. Workplace — Anywhere Execution\n\nAgents are not tied to a single machine. A **Workplace** is a first-class execution environment that can be:\n\n- **Local** — sandboxed workspace on the host machine\n- **Remote** — SSH servers, edge devices, or any machine with network access\n- **Cloud** — lightweight Evonet connector that requires no public IP, no SSH, and no firewall rules\n\nThis means your agents can operate across your entire infrastructure — development laptops, production servers, and cloud instances — with a single abstraction layer.\n\n### 2. Agent-to-Agent Communication\n\nCommunication between agents is a first-class protocol, not an afterthought. Agents can message, delegate, and coordinate with each other natively. This enables:\n\n- **Multi-agent swarms** where each agent has a distinct role and toolset\n- **Hierarchical orchestration** with supervisor agents managing worker agents\n- **Peer-to-peer collaboration** for complex multi-step workflows\n\nEach agent maintains its own identity, state, and capabilities, making swarm intelligence a natural pattern rather than a bolt-on feature.\n\n### 3. Heuristic Mal-activity Detection System\n\nSafety is not optional. Every action an agent takes is inspected through a real-time, multi-layer heuristic detection system that identifies and blocks dangerous patterns before execution. The system monitors for:\n\n- Mass file deletion and privilege escalation attempts\n- Unauthorized remote code execution\n- Behavioral drift beyond expected action boundaries\n\nWhen suspicious activity is detected, the system escalates to a human operator rather than blindly executing — giving you a safety net that enables genuine agent autonomy without compromising security.\n\n---\n\n## Key Features\n\n| Feature | Description |\n|---------|-------------|\n| **Agents** | Independent, LLM-powered assistants with custom tools, knowledge bases, and isolated workspaces |\n| **Models** | Pluggable LLM backends — any OpenAI-compatible API, local or cloud |\n| **Skills** | Installable packages that bundle tool definitions with Python backends |\n| **Plugins** | Event-driven extensions for custom integrations and background workers |\n| **Workplaces** | Execution environments: local directories, SSH servers, or cloud devices via Evonet |\n| **Evonet** | Lightweight Go connector for remote execution without SSH or firewall rules |\n| **Scheduler** | Cron-based triggers, recurring tasks, and reminders for agents |\n| **Channels** | Connect agents to Telegram, WhatsApp, Discord, Slack, and custom interfaces |\n| **Evaluation Engine** | Automated LLM evaluation with customizable regex and heuristic evaluators |\n\n---\n\n## Getting Started\n\n### Prerequisites\n\n- **Python 3.8+**\n- **LLM endpoint** — any OpenAI-compatible API (local or cloud)\n\n### Installation\n\nOne-liner install:\n\n```bash\ncurl -fsSL https://evonic.dev/install.sh | bash\n```\n\nThis clones the repository, sets up a virtual environment, installs dependencies, generates configuration, and guides you through adding `evonic` to your PATH.\n\n**Manual installation:**\n\n```bash\ngit clone https://github.com/anvie/evonic\ncd evonic\npip install -r requirements.txt\nchmod +x ./evonic\n```\n\n### Start\n\n```bash\n./evonic start\n```\n\nOpen `http://localhost:8080` in your browser.\n\n### Docker Sandbox (optional)\n\nAgent tools like `bash` and `runpy` execute inside an isolated Docker container by default:\n\n```bash\ndocker build -t evonic-sandbox:latest docker/tools/\n```\n\nConfigure resource limits in `.env` (memory, CPU, network). If Docker is unavailable, set `sandbox_enabled=0` to fall back to local execution.\n\n---\n\n## Agents\n\nEach agent is designed from the ground up with six configurable dimensions:\n\n| Dimension | Description |\n|-----------|-------------|\n| **Concept** | System prompt and identity — who the agent is and how it behaves |\n| **Model** | LLM backend — which model powers the agent's reasoning |\n| **Tools** | Capabilities — what actions the agent can take |\n| **Knowledge Base** | Reference documents — what information the agent can access |\n| **Channels** | Interfaces — where users interact with the agent |\n| **Skills** | Modular extensions — additional capabilities installed on demand |\n\nCreate and manage agents via the web UI (`/agents`) or CLI:\n\n```bash\n./evonic agent add my_bot --name \"My Bot\"\n./evonic agent add dev_bot --name \"Dev Bot\" --skillset coder\n./evonic agent enable my_bot\n./evonic agent remove my_bot\n```\n\n---\n\n## Channels\n\nConnect your agents to the platforms your users already use:\n\n| Channel | Status | Library |\n|---------|--------|---------|\n| **Telegram** | ✅ Implemented | `python-telegram-bot` |\n| **WhatsApp** | ✅ Implemented | `@whiskeysockets/baileys` (Node.js sidecar) |\n| **Discord** | 🔄 Planned | `discord.py` |\n| **Slack** | 🔄 Planned | `slack-sdk` |\n\n---\n\n## Skills\n\nSkills extend agents with new capabilities. Install via CLI:\n\n```bash\n./evonic skill install path/to/skill.zip\n./evonic skill list\n./evonic skill enable math\n./evonic skill uninstall math\n```\n\nSkills follow a **load → context → execute** lifecycle, keeping the agent's system prompt lean and modular.\n\n---\n\n## Plugins\n\nPlugins are event-driven extensions that hook into Evonic's event stream. Manage them via CLI:\n\n```bash\n./evonic plugin install path/to/plugin.zip\n./evonic plugin list\n./evonic plugin uninstall my_plugin\n```\n\n---\n\n## Models\n\nManage LLM configurations:\n\n```bash\n./evonic model add gpt4o --name \"GPT-4o\" --provider openai --api-key \"sk-...\" --base-url \"https://api.openai.com/v1\"\n./evonic model list\n./evonic model rm gpt4o\n```\n\n---\n\n## Use Cases\n\nEvonic's architecture unlocks a broad spectrum of real-world applications. Here are fifteen concrete scenarios:\n\n### Customer Service\nDeploy agents that handle support tickets, answer FAQs, process refunds, and escalate complex issues — all within your existing Telegram or WhatsApp channels.\n\n### Personal Companion\nBuild personal assistants that manage daily tasks, set reminders, conduct research, and maintain long-term context across conversations.\n\n### Agentic Swarm / Multi-Agent Orchestration\nOrchestrate multiple agents with distinct roles — a researcher, a writer, a reviewer, and a publisher — collaborating autonomously on complex deliverables.\n\n### Automation & DevOps\nDeploy agents that monitor server health, trigger deployments, roll back faulty releases, and respond to incidents with automated runbooks.\n\n### Research Assistant\nCreate agents that perform literature reviews, extract structured data from documents, summarize findings, and generate citations.\n\n### Customer Onboarding\nGuid
