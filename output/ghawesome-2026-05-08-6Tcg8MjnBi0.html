py auth set \\\n  --provider custom \\\n  --api-key YOUR_API_KEY \\\n  --base-url https://example.com/v1/chat/completions \\\n  --model your-model\n```\n\nSee built-in presets:\n\n```bash\npython cli.py auth providers\n```\n\nIf you prefer a temporary one-shell-session setup instead of saving the key locally:\n\n```bash\nexport CODEXSAVER_PROVIDER=deepseek\nexport CODEXSAVER_API_KEY=YOUR_API_KEY\npython cli.py install\npython cli.py doctor\n```\n\n### One Message To Codex\n\nIf Codex is already open in this repository, you can just say:\n\n```text\nSave my worker provider API key for CodexSaver, run `python cli.py auth set --provider deepseek --api-key ...`, then run `python cli.py install` and `python cli.py doctor`, and tell me whether it is ready.\n```\n\nFor repo-local setup:\n\n```text\nSave my worker provider API key for CodexSaver, install CodexSaver only for this repo, run `python cli.py auth set --provider deepseek --api-key ...`, `python cli.py install --project`, then `python cli.py doctor`, and summarize the result.\n```\n\nReady means:\n\n- `~/.codex/config.toml` contains the global `codexsaver` MCP server, or `.codex/config.toml` exists in the repo\n- `~/.codexsaver/codexsaver_mcp.py` exists for global installs\n- provider settings are available from env vars or `~/.codexsaver/config.json`\n- `python cli.py doctor` reports `CodexSaver is ready`\n\n---\n\n## 60-Second Demo\n\nGlobal MCP config created by `python cli.py install`:\n\n```toml\n[mcp_servers.codexsaver]\ncommand = \"python\"\nargs = [\"/Users/you/.codexsaver/codexsaver_mcp.py\"]\nstartup_timeout_sec = 10\ntool_timeout_sec = 120\n```\n\nThen tell Codex:\n\n```text\nUse CodexSaver for safe low-risk tasks.\nAdd unit tests for user service.\n```\n\nOr call the CLI directly:\n\n```bash\npython cli.py delegate \"Explain the routing logic briefly\" --files codexsaver/router.py --workspace .\n```\n\nDry run:\n\n```bash\npython cli.py \"add unit tests for user service\" --files src/user/service.ts --workspace . --dry-run\n```\n\nReal run:\n\n```bash\npython cli.py \"add unit tests for user service\" --files src/user/service.ts --workspace .\n```\n\n---\n\n## Verified Setup Flow\n\nMeasured on May 8, 2026 with the global install and local-key workflow:\n\n| Check | Command | Result |\n|---|---|---|\n| Full test suite | `PYTHONDONTWRITEBYTECODE=1 python -m pytest -q -p no:cacheprovider` | `86 passed in 0.23s` |\n| Global install | `python cli.py install --workspace .` | `status=ok`, global config points at `~/.codexsaver/codexsaver_mcp.py` |\n| Local provider persistence | `python cli.py auth set --provider deepseek --api-key ...` | saved to `~/.codexsaver/config.json` |\n| Workspace doctor | `python cli.py doctor --workspace .` | `provider_api_key_source=local_config:deepseek`, workspace ready |\n| Global launcher check | `python ~/.codexsaver/codexsaver_mcp.py` with MCP `initialize` | returned `serverInfo.name=codexsaver` |\n| Real DeepSeek call | `python cli.py delegate \"Explain the CodexSaver router...\" --files codexsaver/router.py --workspace .` | `route=deepseek`, `status=success`, verification passed |\n\nThis is the intended workflow:\n\n1. Save the key once\n2. Install CodexSaver globally\n3. Confirm readiness with `doctor`\n4. Use real delegated calls without re-exporting API keys\n\n---\n\n## Provider Matrix\n\nBuilt-in presets cover the common hosted and local routes:\n\n| Provider | Style | Default model | API key |\n|---|---|---|---|\n| `deepseek` | OpenAI-compatible | `deepseek-chat` | required |\n| `openai` | OpenAI | `gpt-4o-mini` | required |\n| `anthropic` | native Messages API | `claude-3-5-haiku-latest` | required |\n| `gemini` | OpenAI-compatible endpoint | `gemini-2.0-flash` | required |\n| `qwen` | OpenAI-compatible endpoint | `qwen-plus` | required |\n| `ollama` | local OpenAI-compatible endpoint | `llama3.1` | not required |\n| `lmstudio` | local OpenAI-compatible endpoint | `local-model` | not required |\n\nRun `python cli.py auth providers` for the complete list.\n\n---\n\n## Post-Setup Usage Ratio\n\nAfter setup completed, I measured the actual routed tasks in this working session.\nI only counted tasks that truly entered model routing, not local commands like `pytest`,\n`git`, `install`, `doctor`, or README editing.\n\nResult:\n\n- `DeepSeek`: `7 / 8 = 87.5%`\n- `Codex`: `1 / 8 = 12.5%`\n\nWhy not 100%?\n\nOne test-writing prompt originally included the phrase `production logic`.\nThat triggered the router's intentional high-risk keyword guard and returned the task to Codex.\nThis was not a failure. It was the protection logic working as designed.\n\nIf you only count the later standardized five-task benchmark with natural low-risk phrasing,\nthe delegation ratio was:\n\n- `DeepSeek`: `5 / 5 = 100%`\n- `Codex`: `0 / 5 = 0%`\n\nTakeaway:\n\n- In real usage, CodexSaver defaulted to DeepSeek for most low-risk work\n- It still preserved a strict fallback path for risky wording and protected domains\n\n---\n\n## Five-Task A/B Benchmark\n\nMethod:\n\n- **A** = counterfactual `Codex-only` baseline with normalized cost index fixed at `1.00`\n- **B** = `CodexSaver` mode with the live router and DeepSeek worker\n- latency is wall-clock time for the real CodexSaver execution\n- savings come from the current `CostEstimator`, so this is a reproducible routing benchmark, not invoice-grade billing data\n\nSummary:\n\n- All 5 tasks were typical low-risk development chores: explanation, docs, tests, and README maintenance\n- All 5 delegated successfully after using natural low-risk phrasing\n- Average live latency was `6.18s`\n- Average estimated savings were `48.4%`\n- Average normalized cost moved from `1.00` to `0.52`\n- Estimated relative reduction was `48.0%`\n\n| Task | Type | Route | Latency | A: Codex-only Cost Index | B: CodexSaver Cost Index | Estimated Savings | Output Shape |\n|---|---|---|---:|---:|---:|---:|---|\n| Explain router logic | `explain` | `deepseek` | `2.13s` | `1.00` | `0.55` | `45%` | read-only summary |\n| Document router module | `docs` | `deepseek` | `3.13s` | `1.00` | `0.55` | `45%` | 1-file patch |\n| Add cost tests | `write_tests` | `deepseek` | `9.29s` | `1.00` | `0.55` | `45%` | test patch |\n| Explain verifier flow | `explain` | `deepseek` | `2.30s` | `1.00` | `0.55` | `45%` | read-only summary |\n| Update install docs | `docs` | `deepseek` | `14.06s` | `1.00` | `0.38` | `62%` | README patch |\n\n![Five-task benchmark](./assets/ab-test-benchmark.svg)\n\nFigure:\nGray bars are the `Codex-only` baseline fixed at `100`.\nGreen bars are the `CodexSaver` cost index for the same task.\nLower bars mean lower estimated Codex spend.\n\nInterpretation:\n\n- Read-only explain tasks were the fastest, cleanest wins\n- Small docs edits delegated well and returned compact, reviewable patches\n- Test generation had higher latency than explanation, but still stayed in the low-risk savings band\n- Larger-context documentation work produced the biggest estimated savings because the Codex-only context cost would be higher\n\n---\n\n## Routing Rules\n\n### Good Tasks To Delegate\n\n- repo scanning and code search\n- code explanation and summarization\n- writing unit tests\n- fixing lint or type errors\n- documentation updates\n- boilerplate generation\n- small localized refactors\n\n### Tasks Kept In Codex\n\n- architecture decisions\n- auth, security, payment, billing, or permissions logic\n- database migrations\n- deployment and production operations\n- ambiguous product requests\n- final review before applying changes\n\n### Why Some Medium-Risk Tasks Still Delegate\n\nCodexSaver does not just ask:\n\n```text\nIs this code work?\n```\n\nIt asks:\n\n```text\nIs this code work cheap enough to delegate without losing judgment quality?\n```\n\nThat creates a deliberate asymmetry:\n\n- read-only understanding can be cheap\n- writes in sensitive domains are expensive in risk even if the diff is small\n- ambiguity defaults to Codex, not delegation\n\nThat is why `Explain auth code` may still delegate while `Refactor auth service` stays in Codex.\n\n---\n\n## How It Works\n\n```text\nUser\n  ↓\nCodex\n  ↓ MCP tool call\nCodexSaver\n  ├─ Router\n  ├─ Context Packer\n  ├─ Worker LLM Provider\n  ├─ Verifier\n  └─ Cost Estimator\n  ↓\nCodex review / apply / finalize\n```\n\nCore modules:\n\n- `Router`: classify tasks and assign risk\n- `ContextPacker`: bound file context before delegation\n- `ProviderClient`: call the configured worker model\n- `Verifier`: validate output shape, protected paths, and suggested commands\n- `CostEstimator`: estimate relative savings bands\n\n---\n\n## Security And Persistence\n\n- `python cli.py auth set --provider ... --api-key ...` saves provider settings to `~/.codexsaver/config.json`\n- the config file is written with local-user-only permissions\n- `doctor` shows whether the key comes from the environment or local config, and only prints a masked preview\n- live calls use local config automatically if no env key is exported\n- if verification fails, CodexSaver falls back to `needs_codex`\n\n---\n\n## Commands\n\n```bash\npython cli.py auth providers\npython cli.py auth set --provider deepseek --api-key YOUR_API_KEY\npython cli.py install\npython cli.py install --project\npython cli.py doctor\npython cli.py delegate \"Explain the routing logic briefly\" --files codexsaver/router.py --workspace .\n```\n\n---\n\n## Roadmap\n\n- [x] MCP server\n- [x] rule-based routing\n- [x] bounded context packing\n- [x] DeepSeek default worker integration\n- [x] multi-provider OpenAI-compatible worker support\n- [x] local API key persistence\n- [x] interaction-aware tool responses\n- [x] end-to-end verification flow\n- [ ] cost-aware dynamic routing\n- [ ] cost-aware provider selection\n\n---\n\n## If This Saves You Money\n\nStar the repo.\n","summary":"CodexSaver is a cost‑aware routing tool for the Codex MCP that delegates low‑risk, high‑volume tasks—such as test generation, documentation, or code search—to cheaper worker LLMs while leaving complex reasoning and security‑sensitive work with Codex. It automatically decides routing based on risk, logs the decision in an interaction block, and supports a wide range of providers, including DeepSeek, OpenAI, Anthropic, Gemini, Qwen, Ollama, LM Studio, and custom endpoints. By retaining a global Codex installation and simple provider configuration, it lets every workspace seamlessly switch between expensive and inexpensive models without changing the workflow. Developers and teams using Codex who need to keep costs low yet preserve quality for critical tasks will find this tool especially useful.","description":"Make Codex cheaper without making it dumber with DeepSeek.","stars":216,"language":"Python"},{"owner":"awizemann","repo":"harness","url":"https://github.com/awizemann/harness","readme":"# Harness\n\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](LICENSE)\n![Platform: macOS 14+](https://img.shields.io/badge/platform-macOS%2014%2B-blue)\n![Targets: iOS · macOS · Web](https://img.shields.io/badge/targets-iOS%20%C2%B7%20macOS%20%C2%B7%20Web-3DDC97)\n![Version: 0.3.1](https://img.shields.io/badge/version-0.3.1-blue)\n![Swift 6](https://img.shields.io/badge/Swift-6-F05138?logo=swift&logoColor=white)\n\n<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"site/landing/assets/screenshots/runsession-hero-dark.png\">\n    <img alt=\"Harness Run Session — simulator mirror, step feed, and approval card visible mid-run\" src=\"site/landing/assets/screenshots/runsession-hero.png\" width=\"900\">\n  </picture>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/awizemann/harness/releases/download/v0.3.1/Harness-v0.3.1-Universal.zip\">\n    <img alt=\"Download Harness v0.3.1 — macOS Universal (Apple Silicon + Intel)\" src=\"https://img.shields.io/badge/Download%20for%20Mac-v0.3.1%20Universal-1f6feb?style=for-the-badge&logo=apple&logoColor=white\">\n  </a>\n  <br>\n  <sub>macOS 14+ · Apple Silicon &amp; Intel · ~12 MB</sub>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://awizemann.github.io/harness/\"><strong>awizemann.github.io/harness</strong></a> &nbsp;·&nbsp;\n  <a href=\"https://github.com/awizemann/harness/wiki\">Wiki</a> &nbsp;·&nbsp;\n  <a href=\"https://github.com/awizemann/harness/releases/latest\">All releases</a>\n</p>\n\n> A native macOS developer tool that drives an **iOS Simulator, a macOS app, or a web app** with an AI agent so you can run **user tests** — not scripted UI tests, but real-user simulation.\n\nYou write a goal in plain language (\"I want to sign up and create my first list\", \"delete my account\", \"find a vegetarian restaurant near me and save it\") and a persona (\"first-time user, never seen this app\"). Harness builds (or just launches) your target, and an LLM agent reads screenshots, clicks/types/scrolls, and pursues the goal — narrating what it sees, flagging UX friction (dead ends, ambiguous labels, unresponsive controls), and stopping when it succeeds, fails, or would give up.\n\nThree artifacts come out of every run:\n\n1. **Did the goal complete?** — success / failure / blocked + summary\n2. **What was the path?** — replayable sequence of screens + actions\n3. **Where was the friction?** — timestamped events the agent flagged as confusing\n\n## Targets\n\n| Kind | How Harness drives it |\n|---|---|\n| **iOS Simulator** | `xcodebuild` your project + scheme; `simctl` boot/install/launch; WebDriverAgent for input. |\n| **macOS app** | NSWorkspace launch (pre-built `.app` *or* xcodebuild macOS scheme); `CGEvent` for input; `CGWindowListCreateImage` for capture. |\n| **Web app** | Embedded `WKWebView` at a chosen viewport (default **1280×1600** tall desktop, or 375×812 mobile); JS-synthesised events for input; `WKWebView.takeSnapshot` for capture. The mirror shows a flat browser chrome (no device bezel) so the screenshot fills the full pane and one snapshot covers more page — fewer scrolls per goal, lower API cost. |\n\nPer-app setting: each Application declares its kind once at create time. The agent's tool schema (clicks vs swipes vs key shortcuts vs navigate) and the system-prompt context block re-shape per platform. Run history, replay, and friction reporting are platform-neutral.\n\n> **Status:** v0.3.1 (alpha). All three platforms wired end-to-end; **per-Application credential storage + Set-of-Mark targeting on web** (numbered overlays on focusable elements; agent clicks by id, no pixel guessing — agent-only, never on disk); **multi-provider LLM support** (Anthropic Opus 4.7 / Sonnet 4.6 / Haiku 4.5 + OpenAI GPT-5 Mini / GPT-4.1 Nano + Google Gemini 2.5 Flash / Flash Lite); per-provider Keychain storage; configurable per-model token budgets; unlimited-step option. macOS needs Screen Recording permission. Web is WebKit-only; Chrome via CDP is on the roadmap. See [`docs/ROADMAP.md`](docs/ROADMAP.md).\n\n## What's new in 0.3.1\n\n- **Set-of-Mark badges no longer leak into human-visible surfaces.** The disk PNG is the **clean rendered page** — replay, friction reports, and exported screenshots show what a real user would see. The agent still receives the marked-up image (numbered green badges over focusable elements) via an in-memory `ScreenshotMetadata.markedImageData` channel; the on-disk artifact stays free of dev-tool clutter. Standard 14 §6 documents the new \"no agent scaffolding on disk\" invariant.\n- **Compose Run pairs Persona + Credential side-by-side.** Both sections answer \"who's running this?\", so they read as one row instead of two stacked panels. Saves vertical scroll; auto-falls-back to a single column on narrow windows via `ViewThatFits`. When no credentials are staged, Persona expands to fill the row naturally.\n\n## What's new in 0.3.0\n\n- **Per-Application credential storage.** Pre-stage username/password pairs against an Application; pick one per run in Compose Run. The agent gets a new `fill_credential(field: \"username\"|\"password\")` tool for iOS, macOS, and web. Password bytes never enter the model's context, the JSONL log, or any prompt template — `tool_call.input` for password fills records `{\"field\":\"password\"}` and nothing else. New friction kind `auth_required` for the \"agent hit a login wall and has nothing to fill\" case.\n- **Set-of-Mark targeting (web).** Every screenshot now overlays small numbered badges on focusable elements (form fields, buttons, dropdowns, checkboxes). The agent calls `tap_mark(id)` and the WebDriver resolves to the element's center — no more \"agent picked y=228, input was at y=242\" misses. Coordinate `tap(x, y)` stays available for unmarked content. Probe pierces open shadow roots so inputs in modern signin / payment widgets get marks. iOS / macOS get the same treatment in a follow-up via accessibility-tree probes (tracked on the [wiki Roadmap](https://github.com/awizemann/harness/wiki/Roadmap)).\n- **Web mirror reworked.** Replaced the iPad-shaped device bezel with a flat browser chrome (URL pill, lock glyph, back/forward/refresh affordances) so web runs use the full middle column. Default viewport bumped to 1280×1600 — taller snapshots mean fewer scroll turns, which translates directly to lower API spend per run.\n- **React-aware form fill.** `dispatchType` now uses the native value setter via `Object.getOwnPropertyDescriptor`, so React's value tracker actually sees the change and re-renders won't reset typed text. Same fix applies to `fill_credential`. Click-target focus routing now walks `<label>`, wrappers, and shadow children to focus the actual input, not the styled `<div>` on top of it.\n- **Multi-tool emissions accepted.** The system prompt always allowed *\"exactly one tool call ... optionally accompanied by one or more `note_friction` calls\"*; the parsers were rejecting anything > 1 block. Each provider's parser now splits action vs `note_friction` and forwards inline frictions through `AgentDecision.inlineFriction` → JSONL friction rows.\n- **Run-log schema v3.** `run_started` payload gains optional `credentialLabel` + `credentialUsername` (decode-if-present so v2 logs round-trip). Standards doc §5 documents the v2→v3 migration and the three credential-redaction invariants.\n- **`RunHistoryStore` adopts `@ModelActor`.** Eliminates the *\"Unbinding from the main queue. ModelContexts are not Sendable\"* runtime warning that Swift's strict concurrency was right to flag.\n\n## What's new in 0.2.0\n\n- **Seven supported models across three providers.** Pick a provider in Settings, then a model. Compose Run can override per-run. Each provider has its own Keychain entry; swap mid-session without restart.\n- **Per-model token budgets.** The legacy \"Opus → 250k, else 1M\" ternary is gone — every model has a justified default and a hard ceiling, configurable globally in Settings and per-run in Compose Run.\n- **Unlimited steps.** Toggle in Settings, Compose Run, or Application defaults. The token budget + cycle detector remain the safety rails.\n- **Settings persist across launches.** Default provider, model, mode, step + token budgets, and simulator visibility all survive a restart now (they didn't in 0.1).\n- **Real screenshot thumbnails** in the step feed, sized to each platform's aspect ratio.\n- **Loop hardening for cheaper models.** Multi-tool / zero-tool / parse-failure responses now surface a corrective hint to the model on retry instead of failing the run silently.\n- 218 unit tests passing (was 175 in 0.1).\n\n## First clone\n\nHarness vendors `appium/WebDriverAgent` as a git submodule under `vendor/WebDriverAgent` (it's how we drive the iOS Simulator's responder chain). The Xcode project is generated from `project.yml` via [xcodegen](https://github.com/yonaskolb/XcodeGen).\n\n```bash\ngit clone https://github.com/awizemann/harness.git\ncd harness\ngit submodule update --init --recursive\nbrew install xcodegen\nxcodegen generate\nopen Harness.xcodeproj\n```\n\nYou'll also need `idb_companion` for simulator control:\n\n```bash\nbrew tap facebook/fb && brew install idb-companion\n```\n\nThe first run builds WDA against your simulator's iOS runtime (~1–2 min). Result is cached under `~/Library/Application Support/Harness/wda-build/<iOS-version>/` and reused on subsequent runs.\n\nFull setup: see [Build-and-Run on the Wiki](https://github.com/awizemann/harness/wiki/Build-and-Run).\n\n## How to read this repo\n\n- [`standards/INDEX.md`](standards/INDEX.md) — development, code, and architecture standards. Read these before adding code.\n- [GitHub Wiki](https://github.com/awizemann/harness/wiki) — \"where things live, why, and how to extend them.\" Maintained per PR alongside code.\n- [`docs/ARCHITECTURE.md`](docs/ARCHITECTURE.md) — system architecture overview.\n- [`docs/ROADMAP.md`](docs/ROADMAP.md) — build order and milestones.\n- [`docs/PROMPTS/`](docs/PROMPTS/) — canonical agent prompts (loaded as a bundle resource at runtime).\n- [`HarnessDesign/`](HarnessDesign/) — design system tokens, primitives, and screen layouts.\n\n## Contributing\n\nPRs welcome. Read [`CONTRIBUTING.md`](CONTRIBUTING.md) first — it covers setup, the architecture rules (MVVM-F, Swift 6 strict concurrency, single subprocess actor), and the **public-surfaces sync rule** (code changes that affect README / wiki / site update them in the same PR).\n\n## License\n\nMIT — see [`LICENSE`](LICENSE).\n","summary":"Harness is a macOS‑native tool that uses an AI agent to simulate real‑user interactions across iOS Simulator, macOS apps, and web pages. By supplying a plain‑language goal and persona, the LLM reads screenshots, performs taps, scrolls, and keystrokes, and then reports success, the action path, and any UX friction flagged along the way. It integrates with Xcode build workflows, WebKit, and macOS APIs for input and screen capture, supports multiple LLM providers and configurable token budgets, and stores per‑application credentials securely. Developers, designers, and QA engineers can employ Harness to conduct automated exploratory tests, uncover usability problems, and generate reproducible test artifacts without writing scripted UI tests.","description":"AI-driven user testing for iOS Simulator, macOS apps, and web apps. Write a goal in plain language; an LLM agent drives the UI and reports friction. macOS 14+, Swift 6.","stars":153,"language":"Swift"},{"owner":"Avarok-Cybersecurity","repo":"atlas","url":"https://github.com/Avarok-Cybersecurity/atlas","readme":"<p align=\"center\">\n  <img src=\"assets/logo.svg\" alt=\"Atlas Inference Engine\" width=\"640\" />\n</p>\n<p align=\"center\">\n  <h1 align=\"center\">Atlas Inference Engine</h1>\n  <p align=\"center\">\n    <strong>Pure Rust LLM Inference</strong><br>\n    <em>Universal Inference At Unimaginable Speeds</em>\n  </p>\n  <p align=\"center\">\n    <img alt=\"NVIDIA\" src=\"https://img.shields.io/badge/NVIDIA-76B900?style=flat-square&logo=nvidia&logoColor=white\">\n    <img alt=\"AMD\" src=\"https://img.shields.io/badge/AMD-ED1C24?style=flat-square&logo=amd&logoColor=white\">\n    <img alt=\"Intel\" src=\"https://img.shields.io/badge/Intel-0071C5?style=flat-square&logo=intel&logoColor=white\">\n  </p>\n  <p align=\"center\">\n    <a href=\"LICENSE\"><img alt=\"License: AGPLv3\" src=\"https://img.shields.io/badge/license-AGPLv3-yellow?style=flat-square\"></a>\n    <a href=\"#build\"><img alt=\"Pure Rust\" src=\"https://img.shields.io/badge/runtime-pure%20Rust-orange?style=flat-square\"></a>\n    <a href=\"https://hub.docker.com/r/avarok/atlas-gb10\"><img alt=\"Docker Hub\" src=\"https://img.shields.io/badge/Docker%20Hub-avarok%2Fatlas--gb10-2496ED?style=flat-square&logo=docker&logoColor=white\"></a>\n    <a href=\"https://discord.gg/DwF3brBMpw\"><img alt=\"Discord\" src=\"https://img.shields.io/badge/dynamic/json?url=https%3A%2F%2Fdiscord.com%2Fapi%2Fv10%2Finvites%2FDwF3brBMpw%3Fwith_counts%3Dtrue&query=%24.approximate_member_count&label=discord&suffix=%20members&style=flat-square&logo=discord&logoColor=white&color=5865F2\"></a>\n  </p>\n</p>\n\n<p align=\"center\">\n  <a href=\"assets/atlas-demo.mp4\"><img alt=\"Atlas demo — click for full-quality MP4\" src=\"assets/atlas-demo.gif\" width=\"820\" /></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"#run-atlas\"><img alt=\"Quick Start — under 2 minutes\" src=\"https://img.shields.io/badge/%E2%9A%A1%20Quick%20Start%20%E2%80%94%20%3C%202%20min-2EA44F?style=for-the-badge&logo=docker&logoColor=white\"></a>\n  <a href=\"https://atlasinference.io\"><img alt=\"atlasinference.io\" src=\"https://img.shields.io/badge/%F0%9F%8C%90%20atlasinference.io-F48C06?style=for-the-badge\"></a>\n  <a href=\"https://x.com/AIshaqui81766/status/2052121270506930276\"><img alt=\"Launch announcement on X\" src=\"https://img.shields.io/badge/%F0%9D%95%8F%20Launch%20Announcement-000000?style=for-the-badge&logo=x&logoColor=white\"></a>\n</p>\n\n## Philosophy\n\nThe foundation of any given field of science is philosophy. It is that which inspires direction, structure, and mission.\n\nAtlas began as a solution to widely known problem in using other (python) inference engines built by data scientists: the code was steeped in a poly codebase with an ever shifting ecosystem of dependencies, patches, and cross-dependencies. One day your workaround for running a model works, the next day you have to update to a nightly branch of several dependencies and inject a new workaround. This is not how you build a software ecosystem; that's how you build a proof of concept. We thank the great and hard work data scientists made in proving LLMs can revolutionize our world, its economy, and how it challenges us to higher epochs. Now, the software engineers take the torch to turn a proof of concept into something that is designed to withstand the test of time.\n\n### Main Objective\n\nSimilar to how llama.cpp was built with the intent to prove you don't need $10000-$100000 GPUs to run LLMs, Atlas is built with the intent to consistently force the narrative that as hardware continues to advance, we should not have to pay premium Cloud API prices for inference. Atlas, by virtue of its philosophy, maximizes speed for each hardware/model combination, thus paving the way for meaningfully powerful and intelligent LLMs to be run locally in such a way the model is truly useful.\n\n### Design Choices\n\n#### Free and Open Source, Always\n\nWe promised this since the beginning. We believe great software comes from opening the source, not from just keeping it closed. The more eyes, the better. And therein brings us to the next point.\n\n#### Community-First\n\nFor those who've followed us this far since the inception of our Discord, you know the extent to which our commitment to the community is, according to one user humourously put, \"cracked\". We want to build something incredible, and that means we not only build for you, but you, now having access to the source code, can now build for others in ways that triumph over existing solutions. This is the only way we all win. We are the Pirates of the inference space.\n\n#### Monorepo\n\nWe chose a monorepo design to ensure that, as we head further into the agentic age of coding, the average data scientist or engineer can contribute meaningful PRs to any part of the system. Eventually, since this is a monorepo, there will be a day where the repo is autonomously self-improving and self-patching. This is most efficient and most effective when all the code is in one place, not many.\n\n#### Hardware+Model Specific Kernels\n\nWe make no compromises or generalizations. Each hardware and model combination has its own unique properties that require fine-tuning custom kernels that leverage the model for that specific hardware configuration. The end result? 2-3x faster kernels all around.\n\n#### AI-Friendly Codebase\n\nIt took a significant amount of time to build this codebase. We also know people will want to submit AI-generated PRs. We can't stop you, and in fact, given SOTA, you might just have to! The good news is that this codebase was built with enough railguards, structure, and abstraction to guide your AI to absorb the entire monorepo and contribute meaningfully. There's enough context to keep this going off the rails like a crazy train.This means ultimately that instead of waiting for days to weeks before getting model support, you can just fork this repo, and ask your AI to integrate it, then within hours you'll more likely than not have a working model running. We will not be condescending, [unlike some other inference engines out there when good-faith PRs that simply work are posted](https://github.com/ggml-org/llama.cpp/pull/18680#issuecomment-3723954542). We are not stymied by bureacracy, and want to enable the community to rapidly expand this monorepo ecosystem safely and effectively.\n\n#### Theory-Friendly Codebase\n\nArxiv is getting countless papers published every day on AI. Nobody can keep up. Yet, some papers may be relevant to this project, others may not. Research endeavors to improve quality, alignment, and speed ought to be considered by our community as something we can integrate cleanly. Feel free to open a PoC PR here and just explain what you did and why, and how it works.\n\n#### Plug and Play Design\n\nOur system is modular, with tight abstraction boundaries and trait requirements that force the architecture to take on a certain form. This form is designed to prevent pigeon-holing the project into the wrong direction. The business logic is the same across all hardware/model combinations, just the concrete implementations differ.\n\n## Architecture\n\nThe diagram below shows how a single HTTP request flows from the API surface down to hardware-specific CUDA kernel execution. **Dashed borders** mark the **plug-and-play** abstraction boundaries — the traits and registries where a new hardware target, model family, communication backend, or storage backend plugs in without touching the layers above or below it.\n\n```mermaid\nflowchart TB\n    %% ── Colours & styles ──────────────────────────────────────────────\n    classDef server fill:#2d6a4f,stroke:#1b4332,color:#d8f3dc\n    classDef sched fill:#1d3557,stroke:#0d1b2a,color:#a8dadc\n    classDef model fill:#6a040f,stroke:#370617,color:#fae0e4\n    classDef runtime fill:#7b2cbf,stroke:#3c096c,color:#e0aaff\n    classDef kernel fill:#e85d04,stroke:#9d0208,color:#fff\n    classDef plug fill:none,stroke:#f48c06,stroke-width:3,stroke-dasharray:6 4,color:#f48c06\n    classDef prim fill:#3a0ca3,stroke:#240046,color:#c8b6ff\n    classDef hw fill:#264653,stroke:#2a9d8f,color:#e9f5db\n\n    %% ════════════════════════════════════════════════════════════════\n    %% 1. HTTP API  (spark-server)\n    %% ════════════════════════════════════════════════════════════════\n    CLIENT[\"Client<br/>(OpenAI / Anthropic API)\"]\n    API[\"spark-server — api.rs / anthropic.rs<br/>OpenAI + Anthropic HTTP surface<br/>Tool-call parsing · Streaming SSE\"]:::server\n    CLIENT --> API\n\n    %% ════════════════════════════════════════════════════════════════\n    %% 2. Scheduler  (spark-server/scheduler.rs)\n    %% ════════════════════════════════════════════════════════════════\n    SCHED[\"Scheduler<br/>Batched decode · Chunked prefill · MTP spec-decode<br/>Grammar FSM · Thinking-loop watchdog<br/>Sampling (argmax / top-k / top-p / DRY / LZ)\"]:::sched\n    API -->|\"InferenceRequest<br/>via mpsc channel\"| SCHED\n\n    %% ════════════════════════════════════════════════════════════════\n    %% 3. Model trait  (spark-model/traits.rs) — PLUG & PLAY\n    %% ════════════════════════════════════════════════════════════════\n    MODEL_TRAIT{{\"🔌 trait Model<br/>(spark-model/traits.rs)<br/>prefill · decode · decode_batch<br/>mixed_forward · speculative verify\"}}:::plug\n    SCHED -->|\"Box(dyn Model)\"| MODEL_TRAIT\n\n    %% ════════════════════════════════════════════════════════════════\n    %% 4. Model factory + weight loaders  (spark-model)\n    %% ════════════════════════════════════════════════════════════════\n    FACTORY[\"factory.rs — loader_for_config()<br/>SSOT model_type → loader dispatch\"]:::model\n    MODEL_TRAIT --> FACTORY\n\n    subgraph LOADERS [\"🔌 Weight Loaders — trait ModelWeightLoader\"]\n        direction LR\n        QWEN3[\"Qwen3<br/>qwen3.rs\"]:::model\n        QWEN35[\"Qwen3.5 / 3.6<br/>qwen35.rs\"]:::model\n        GEMMA4[\"Gemma-4<br/>gemma4.rs\"]:::model\n        NEMOTRON[\"Nemotron-H<br/>nemotron.rs\"]:::model\n        MINIMAX[\"MiniMax M2<br/>minimax.rs\"]:::model\n        MISTRAL[\"Mistral<br/>mistral_loader.rs\"]:::model\n        NEW_MODEL[\"🆕 Your Model<br/>impl ModelWeightLoader\"]:::plug\n    end\n    FACTORY --> LOADERS\n\n    %% ════════════════════════════════════════════════════════════════\n    %% 5. Layer trait  (spark-model/layer.rs) — PLUG & PLAY\n    %% ════════════════════════════════════════════════════════════════\n    LAYER_TRAIT{{\"🔌 trait TransformerLayer<br/>(spark-model/layer.rs)<br/>decode · prefill · decode_multi_seq<br/>SSM two-phase · MoE transpose\"}}:::plug\n    LOADERS --> LAYER_TRAIT\n\n    subgraph LAYERS [\"Layer Implementations\"]\n        direction LR\n        ATTN[\"Qwen3 Attention<br/>(GQA · MLA · MRoPE)\"]:::model\n        SSM[\"Qwen3 SSM<br/>(GDN · Mamba-2)\"]:::model\n        MOE[\"MoE FFN<br/>(top-k · sigmoid-route)\"]:::model\n        DENSE[\"Dense FFN<br/>(GeGLU · SiLU)\"]:::model\n        VIS[\"Vision Encoder<br/>(ViT blocks)\"]:::model\n    end\n    LAYER_TRAIT --> LAYERS\n\n    %% ════════════════════════════════════════════════════════════════\n    %% 6. GPU backend trait  (spark-runtime/gpu.rs) — PLUG & PLAY\n    %% ════════════════════════════════════════════════════════════════\n    GPU_TRAIT{{\"🔌 trait GpuBackend<br/>(spark-runtime/gpu.rs)<br/>alloc · free · launch · copy_h2d/d2h<br/>CUDA graphs · pinned memory\"}}:::plug\n    LAYERS -->|\"&dyn GpuBackend\"| GPU_TRAIT\n\n    subgraph GPU_IMPLS [\"GPU Backend Implementations\"]\n        direction LR\n        CUDA_BE[\"AtlasCudaBackend<br/>(production — CUDA driver)\"]:::runtime\n        MOCK_BE[\"MockGpuBackend<br/>(unit tests)\"]:::runtime\n        NEW_HW[\"🆕 Your Hardware<br/>impl GpuBackend\"]:::plug\n    end\n    GPU_TRAIT --> GPU_IMPLS\n\n    %% ════════════════════════════════════════════════════════════════\n    %% 7. Runtime services  (spark-runtime)\n    %% ════════════════════════════════════════════════════════════════\n    subgraph RUNTIME [\"spark-runtime\"]\n        direction TB\n        KV[\"PagedKvCache<br/>BF16 · FP8 · NVFP4 · Turbo3/4/8\"]:::runtime\n        BUFS[\"BufferArena<br/>Pre-allocated scratch\"]:::runtime\n        WEIGHTS[\"WeightStore<br/>mmap / O_DIRECT loader\"]:::runtime\n        SAMPLER[\"Sampler<br/>argmax · top-k/p · temperature\"]:::runtime\n    end\n    LAYERS --> RUNTIME\n\n    %% ════════════════════════════════════════════════════════════════\n    %% 8. Kernel registry  (atlas-core/registry.rs)\n    %% ════════════════════════════════════════════════════════════════\n    REGISTRY[\"AtlasRegistry<br/>Global PTX cache · cuLaunchKernel\"]:::kernel\n    CUDA_BE --> REGISTRY\n\n    %% ════════════════════════════════════════════════════════════════\n    %% 9. Kernel target system  (atlas-kernels) — PLUG & PLAY\n    %% ════════════════════════════════════════════════════════════════\n    KERNELS_CRATE{{\"🔌 atlas-kernels<br/>KernelTarget = (HW × Model × Quant)<br/>build.rs → per-target PTX embedding<br/>MODEL.toml → SamplingPresets + ModelBehavior\"}}:::plug\n    REGISTRY --> KERNELS_CRATE\n\n    subgraph TARGETS [\"kernels/ — CUDA Kernel Targets\"]\n        direction TB\n        subgraph GB10 [\"kernels/gb10/ — HARDWARE.toml\"]\n            direction LR\n            T1[\"qwen3-next-80b-a3b\"]:::kernel\n            T2[\"qwen3.5-35b-a3b\"]:::kernel\n            T3[\"gemma-4-26b-a4b\"]:::kernel\n            T4[\"nemotron-3-nano-30b\"]:::kernel\n            T5[\"minimax-m2-229b\"]:::kernel\n            T6[\"mistral-small-4\"]:::kernel\n            T7[\"+ 7 more targets\"]:::kernel\n        end\n        NEW_TARGET[\"🆕 kernels/<hw>/<model>/<quant>/<br/>HARDWARE.toml + MODEL.toml + *.cu\"]:::plug\n    end\n    KERNELS_CRATE --> TARGETS\n\n    %% ════════════════════════════════════════════════════════════════\n    %% 10. Communication  (spark-comm) — PLUG & PLAY\n    %% ════════════════════════════════════════════════════════════════\n    COMM_TRAIT{{\"🔌 trait CommBackend<br/>(spark-comm/lib.rs)<br/>all_reduce · broadcast · send_to/recv_from<br/>Expert Parallelism (EP)\"}}:::plug\n    LAYERS -->|\"&dyn CommBackend<br/>(EP all-reduce)\"| COMM_TRAIT\n\n    subgraph COMM_IMPLS [\"Comm Implementations\"]\n        direction LR\n        SINGLE[\"SingleGpuBackend<br/>(no-op)\"]:::prim\n        NCCL[\"NcclBackend<br/>(multi-GPU NCCL)\"]:::prim\n        NEW_COMM[\"🆕 Your Transport<br/>impl CommBackend\"]:::plug\n    end\n    COMM_TRAIT --> COMM_IMPLS\n\n    %% ════════════════════════════════════════════════════════════════\n    %% 11. Storage  (spark-storage) — PLUG & PLAY\n    %% ════════════════════════════════════════════════════════════════\n    STORAGE_TRAIT{{\"🔌 trait StorageBackend<br/>(spark-storage/backend)<br/>High-Speed Swap — NVMe KV offload<br/>Predictive eviction · Tiled attention\"}}:::plug\n    KV -->|\"KV spill / restore\"| STORAGE_TRAIT\n\n    subgraph STORAGE_IMPLS [\"Storage Implementations\"]\n        direction LR\n        IOURING[\"IoUringBackend\"]:::prim\n        POSIX[\"PosixBackend\"]:::prim\n        NEW_STORAGE[\"🆕 Your Backend<br/>impl StorageBackend\"]:::plug\n    end\n    STORAGE_TRAIT --> STORAGE_IMPLS\n\n    %% ════════════════════════════════════════════════════════════════\n    %% 12. Shared primitives  (atlas-*)\n    %% ════════════════════════════════════════════════════════════════\n    subgraph PRIMITIVES [\"Shared Primitives (atlas-*)\"]\n        direction LR\n        P1[\"atlas-core<br/>Config · KernelTarget<br/>Registry · Compute\"]:::prim\n        P2[\"atlas-quant<br/>NVFP4 · FP8\"]:::prim\n        P3[\"atlas-norm<br/>RMS norm\"]:::prim\n        P4[\"atlas-embed<br/>Embedding\"]:::prim\n        P5[\"atlas-reduce<br/>Reductions\"]:::prim\n        P6[\"atlas-activation<br/>SiLU · GeGLU\"]:::prim\n    end\n    LAYERS -.->|\"kernel wrappers\"| PRIMITIVES\n```\n\n### Reading the Diagram\n\n**Solid boxes** are concrete implementations. **Dashed borders with 🔌** are the trait-based abstraction boundaries — each is a Rust trait (or a filesystem convention for kernels) where a new integration plugs in:\n\n| Plug Point | What It Abstracts | To Add New Support |\n|---|---|---|\n| `trait Model` | Full model forward pass | Rarely needed — the existing `TransformerModel` handles all architectures via composable layers |\n| `trait ModelWeightLoader` | HuggingFace → layer translation | **Implement one struct** with weight-name patterns for your model family ([`factory.rs`](crates/spark-model/src/factory.rs) adds one match arm) |\n| `trait TransformerLayer` | Per-layer compute (attn, SSM, MoE, FFN) | Compose existing layer types or implement a new one for novel architectures |\n| `trait GpuBackend` | All GPU memory and kernel ops | Swap the CUDA driver for another accelerator backend |\n| `kernels/<hw>/<model>/<quant>/` | Hardware-tuned CUDA kernels | Drop a new directory with `MODEL.toml` + `.cu` files; `build.rs` auto-discovers it |\n| `trait CommBackend` | Multi-GPU collective communication | Implement for MPI, GDR, or custom interconnects |\n| `trait StorageBackend` | NVMe KV-cache offload I/O | Implement for CXL, RDMA, or other storage tiers |\n\n### Data Flow Summary\n\n1. **HTTP** → `spark-server` receives OpenAI/Anthropic requests, tokenizes, and enqueues\n2. **Scheduler** → batches sequences, orchestrates prefill/decode/speculative-verify steps\n3. **Model** → generic loop: `embed → [layer₀ … layerₙ] → norm → lm_head`\n4. **Layers** → each layer dispatches through `GpuBackend` to launch kernels from `AtlasRegistry`\n5. **Kernels** → pre-compiled PTX selected by `(hardware × model × quant)` target at build time\n6. **EP** → `CommBackend` handles cross-GPU all-reduce after MoE expert computation\n7. **Storage** → `StorageBackend` spills/restores KV blocks to NVMe for long-context sequences\n\n## What We Ship Today\n\nWe have to walk before we can run. Today's Atlas is targeted at a single hardware platform — NVIDIA's GB10 (DGX Spark, SM121) — and twelve hand-tuned (Hardware × Model × Quantization) targets. Every supported model below runs off one multi-model binary; the right kernel set is selected at startup from the model's `config.json`. No swapping images, no rebuilding, no per-model magic — just point Atlas at a HuggingFace ID.\n\n| Family | Model | HuggingFace ID | Params / active | Architecture |\n|---|---|---|---:|---|\n| Qwen3.5 | Qwen3.5-27B | `Kbenkhaled/Qwen3.5-27B-NVFP4` | 27B dense | Hybrid SSM + attention, dense FFN, MRoPE |\n| Qwen3.5 | Qwen3.5-35B-A3B | `Sehyo/Qwen3.5-35B-A3B-NVFP4` | 35B / 3B | GDN + attention + MoE, MTP |\n| Qwen3.5 | Qwen3.5-122B-A10B | `Sehyo/Qwen3.5-122B-A10B-NVFP4` | 122B / 10B | GDN + attention + MoE, MTP |\n| Qwen3.6 | Qwen3.6-35B-A3B | `Qwen/Qwen3.6-35B-A3B-FP8` | 35B / 3B | GDN + attention + MoE, MRoPE, vision tower |\n| Qwen3-Next | Qwen3-Next-80B-A3B | `nvidia/Qwen3-Next-80B-A3B-Instruct-NVFP4` | 80B / 3B | SSM + attention + MoE |\n| Qwen3-VL | Qwen3-VL-30B-A3B | `ig1/Qwen3-VL-30B-A3B-Instruct-NVFP4` | 30B / 3B | Vision + attention + MoE |\n| Gemma-4 | Gemma-4-26B-A4B | `bg-digitalservices/Gemma-4-26B-A4B-it-NVFP4A16` | 26B / 4B | Attention + MoE, GeGLU |\n| Gemma-4 | Gemma-4-31B | `nvidia/Gemma-4-31B-IT-NVFP4` | 31B dense | Attention (sliding + full), GeGLU |\n| Mistral | Mistral-Small-4-119B | `mistralai/Mistral-Small-4-119B-2603-NVFP4` | 119B / 6.5B | Attention + MoE |\n| MiniMax | MiniMax-M2.7 | `lukealonso/MiniMax-M2.7-NVFP4` | 229B / ~10B | Attention + 256-expert MoE + MTP |\n| Nemotron-H | Nemotron-3-Nano-30B-A3B | `nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4` | 30B / 3B | Mamba-2 + attention + MoE |\n| Nemotron-H | Nemotron-3-Super-120B-A12B | `nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4` | 120B / 12B | Mamba-2 + attention + MoE |\n\nThis is a starting point, not a destination. The plug-and-play design above exists precisely so that AMD, Apple Silicon, Intel, and the next round of Blackwell parts can land here as community contributions, and so that the Llama 4s and DeepSeek V4s of next quarter slot in the same way the Qwens did this quarter. We did the hard part — bolting in the abstractions while bringing up the first twelve targets — so that adding the thirteenth is a weekend, not a quarter.\n\n## Performance\n\nWe're not going to spend much real estate on benchmark theatre. The numbers below are what the binary in this repository does on a single NVIDIA GB10, on a short prompt (`\"What is the capital of France?\"`, `max_tokens ≤ 30`, `temperature = 0.1`), measured end-to-end through the HTTP API. They are reproducible: `scripts/sweep_all_models.sh` is the harness, and the source for every kernel that produced them is in this repository.\n\n| Model | Mode | tok/s |\n|---|---|---:|\n| Qwen3.5-35B-A3B | MTP speculative (K=2) | **131** |\n| Qwen3.5-35B-A3B | turbo4 KV | 77 |\n| Qwen3.5-35B-A3B | No speculative | 70 |\n| Qwen3-Next-80B-A3B | FP8 KV | 74 |\n| Qwen3.5-122B-A10B | EP=2, MTP K=2 (600-tok sustained) | 46 |\n| Qwen3.5-122B-A10B | FP8 KV, single-GPU tuned | 32 |\n| Qwen3-VL-30B-A3B | NVFP4 KV | 97 |\n| Nemotron-3-Nano-30B-A3B | FP8 KV | 88 |\n| Nemotron-3-Super-120B | FP8 KV | 24 |\n| Gemma-4-26B-A4B | default | 67 |\n| Gemma-4-31B | `--max-batch-size 2` | 9 |\n| Mistral-Small-4-119B | NVFP4 | 33 |\n| Qwen3.5-27B (dense hybrid) | FP8 KV | 13 |\n\nWe compete with vLLM and TensorRT-LLM on the same GB10. On Qwen3.5-35B-A3B with MTP speculative decoding, Atlas decodes faster than the same model under NVIDIA's own vLLM build on the same hardware — meaningfully faster, on numbers we can hand you the script for. We will not put a bigger figure in this paragraph than the one that comes off our own benchmark scripts, and we publish the vLLM baseline command alongside ours so you can verify both. If you reproduce a faster vLLM number, file an issue. We would rather be measured than congratulated.\n\nThe kernel-by-kernel comparison against PyTorch eager (35 hyperoptimized CUDA kernels, all wins on production-relevant shapes) lives in the [benchmarks chapter](book/src/operations/benchmarks.md) along with the methodology footnotes — read them; they matter.\n\n## KV Cache Quantization\n\nAtlas stores attention key/value state in one of six quantized formats, selected via `--kv-cache-dtype`. Lower bit-widths fit more tokens in GPU memory at the cost of precision; the Turbo family adds Walsh-Hadamard rotation and Lloyd-Max optimal codebooks to recover accuracy at the same bit rate. Mix dtypes per layer with `--kv-high-precision-layers` to keep boundary layers at BF16 while compressing the middle.\n\n| CLI flag | Bits/element | Scale overhead | Technique | When to use |\n|---|---:|---|---|---|\n| `bf16` | 16 | — | Raw BF16 storage | Maximum precision; short-context or quality-critical workloads |\n| `fp8` | 8 | Per-tensor FP32 scale (from checkpoint or online calibration via `--fp8-kv-calibration-tokens`) | FP8 E4M3 with static or calibrated per-tensor scale | **Default.** Safe baseline — half the memory of BF16, minimal quality loss for most models |\n| `turbo8` | 8 | Per-group BF16 scale (2 bytes / 16 elements) | Walsh-Hadamard rotation → FP8 E4M3 + BF16 per-group scales | FP8-level memory with outlier suppression; recommended for many-layer models (e.g. MiniMax M2.7, 58 layers) where per-group FP8 scales compound |\n| `nvfp4` | 4 | Per-group FP8 scale (1 byte / 16 elements) | E2M1 packed nibbles (NVIDIA NVFP4 format) | 4× compression vs BF16; good for long-context with `--kv-high-precision-layers auto` |\n| `turbo4` | 4 | Per-group FP8 scale (1 byte / 16 elements) | Walsh-Hadamard rotation → Lloyd-Max optimal 4-bit codebook | ~2× lower MSE than NVFP4 at the same bit rate; same memory footprint |\n| `turbo3` | 3 | Per-group FP8 scale (1 byte / 16 elements) | Walsh-Hadamard rotation → Lloyd-Max 3-bit codebook (8 levels, packed 8 values → 3 bytes) | Maximum compression (22% smaller than turbo4); experimental |\n\n## Quick Start\n\nThe whole supported model matrix lives in one Docker image. Pull it, mount your HuggingFace cache, point Atlas at any model ID from the table above:\n\n<a id=\"run-atlas\"></a>\n\n**Qwen3.6-35B (FP8) — 130 tok/s on a single Spark:**\n\n```bash\ndocker pull avarok/atlas-gb10:latest\n\nsudo docker run -d --name atlas \\\n  --network host --gpus all --ipc=host \\\n  -v ~/.cache/huggingface:/root/.cache/huggingface \\\n  avarok/atlas-gb10:latest \\\n  serve Qwen/Qwen3.6-35B-A3B-FP8 \\\n    --port 8888 \\\n    --max-seq-len 65536 \\\n    --kv-cache-dtype fp8 \\\n    --kv-high-precision-layers auto \\\n    --gpu-memory-utilization 0.90 \\\n    --scheduling-policy slai \\\n    --tool-call-parser qwen3_coder \\\n    --enable-prefix-caching \\\n    --speculative\n```\n\n**Qwen3.5-122B (NVFP4) — single Spark, ~33 tok/s decode at batch=1:**\n\nThe 122B NVFP4 weights + Atlas runtime overhead leave only ~2 GB for KV cache on a 119.7 GB GB10, so keep `--max-num-seqs` low and use a tighter `--max-seq-len`. This recipe is verified end-to-end (model loads, `/v1/chat/completions` answers correctly, 4-way concurrent serves cleanly):\n\n```bash\nsudo docker run -d --name atlas \\\n  --network host --gpus all --ipc=host \\\n  -v ~/.cache/huggingface:/root/.cache/huggingface \\\n  avarok/atlas-gb10:latest \\\n  serve Sehyo/Qwen3.5-122B-A10B-NVFP4 \\\n    --port 8888 \\\n    --max-seq-len 16384 \\\n    --kv-cache-dtype fp8 \\\n    --kv-high-precision-layers auto \\\n    --gpu-memory-utilization 0.92 \\\n    --scheduling-policy slai \\\n    --max-batch-size 1 \\\n    --max-num-seqs 4 \\\n    --oom-guard-mb 1024 \\\n    --ssm-cache-slots 0 \\\n    --tool-call-parser qwen3_coder\n```\n\n**Note:** `--speculative` (MTP) on single-Spark 122B costs ~1.5 GB for the draft head + draft KV and forces `--max-seq-len` down to ~4 K. Either run without `--speculative` at 16 K (the recipe above), or move to EP=2 across two Sparks ([`QUICKSTART.md`](QUICKSTART.md) §5) for both speculative decoding *and* a 16 K+ window.\n\nFor longer contexts on a single Spark, add `--high-speed-swap --high-speed-swap-dir /path/on/nvme --high-speed-swap-cache-blocks-per-seq 64`. HSS keeps a rolling 1024-token KV window in HBM and streams older blocks to NVMe through an io_uring orchestrator — works with any `--max-seq-len` you can fit on disk. The Docker container needs `--security-opt seccomp=unconfined --ulimit memlock=-1` for io_uring access.\n\nThat's it. Anything OpenAI-compatible — `curl`, the OpenAI SDK, Open WebUI, opencode — points at port 8888:\n\n```bash\ncurl http://localhost:8888/v1/chat/completions \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"model\":\"atlas\",\"messages\":[{\"role\":\"user\",\"content\":\"Hello!\"}],\"max_tokens\":256}'\n```\n\nPer-model recipes (vision, MoE, multi-node EP=2, single-GPU 122B with the tighter budget) live in [`QUICKSTART.md`](QUICKSTART.md). Build-from-source instructions are in [`CONTRIBUTING.md`](CONTRIBUTING.md), and the kernel build pipeline is documented in [`docs/ARCHITECTURE.md`](docs/ARCHITECTURE.md#build-pipeline).\n\n## Adding a New Hardware Target\n\nThe full recipe is in [`docs/HARDWARE.md`](docs/HARDWARE.md#adding-a-new-hardware-target). The short version: implement two traits (`ComputeTarget` for the build-time compiler, `GpuBackend` for the runtime), drop kernel sources into `kernels/<your-hw>/`, add one match arm in the registry. There is a `MockGpuBackend` in `spark-runtime` that lets you write and test the entire scaffold without owning the hardware — every layer above the GPU trait is hardware-agnostic, so unit tests can run on a laptop. We bolted the project from \"single CUDA target\" to \"trait-pluggable across vendors\" specifically so that the AMD, Apple, and Intel ports stop being our problem and start being yours.\n\n## Adding a New Model\n\nSame story, smaller surface. Implement `ModelWeightLoader` (one struct, the existing `Qwen3AttentionLayer`/`MoeLayer`/`Qwen3SsmLayer`/`NemotronMamba2Layer` primitives cover most architectures), add one line to the factory dispatch, optionally drop a `MODEL.toml` for sampling defaults and behavior knobs. Kernels are reused; the scheduler is untouched; the server is oblivious. The step-by-step cookbook is in [`docs/HARDWARE.md`](docs/HARDWARE.md#adding-a-new-model-family). Once your loader produces coherent output on the integration coherence prompt, you are done — file the PR.\n\n## Citations\n\nWe did not invent the kernels we ship. We picked the right ideas from the right papers, fused them together, and tuned them for one chip until they pinned the bandwidth ceiling. Atlas owes a direct intellectual debt to:\n\n- **FlashAttention-2** — Tri Dao. *FlashAttention-2: Faster Attention with Better Parallelism and Work Partitioning.* ICLR 2024. [arXiv:2307.08691](https://arxiv.org/abs/2307.08691) — tiled online softmax, Q/K/V SMEM staging, causal masking. Foundation of our prefill kernel.\n- **FlashAttention-4** — Shah, Bikshandi, Zhang, Thakkar, Ramani, Dao. *FlashAttention-4: Taming the Hardware.* 2025. [arXiv:2603.05451](https://arxiv.org/abs/2603.05451) — conditional softmax rescaling and software polynomial `sw_exp` (3 FMA + `ldexpf` instead of going through the SFU). Both shipped in our GQA-fused paged Flash Attention.\n- **FlashInfer** — Ye, Chen, Lai, Zhao, Zheng, Shao, Hou, Jin, Zuo, Yin, Chen, Ceze. *FlashInfer: Efficient and Customizable Attention Engine for LLM Inference Serving.* MLSys 2025 (Best Paper). [arXiv:2501.01005](https://arxiv.org/abs/2501.01005) — block-sparse paged KV cache, page index prefetch to SMEM, the gather-SMEM-MMA pattern for scattered pages. Informed our paged attention design.\n- **SageAttention 3** — Zhang, Huang, Zhang, Wei, Zhu, Chen. *SageAttention3: Microscaling FP4 Attention on Blackwell GPUs.* NeurIPS 2025 Spotlight. [arXiv:2505.11594](https://arxiv.org/abs/2505.11594) — FP4 attention with FP8 per-block microscales. On the SM121 roadmap once silicon-level FP4 MMA arrives upstream.\n- **LeanAttention** — Roy, Vassilieva, Willke, Mendis. *LeanAttention: Hardware-Aware Scalable Attention for LLM Inference.* 2024. [arXiv:2405.10480](https://arxiv.org/abs/2405.10480) — stream-K tile scheduling for near-100% SM occupancy in split-K decode attention. Planned next.\n\nIf you wrote one of these papers and you spot a misattribution or a wrong technique credit on our side, open an issue. We would rather be corrected than wrong.\n\n## License and Enterprise Edition\n\nAtlas operates under a **dual-license** model. Both are real, both are intentional, and neither is a teaser for the other.\n\n1. **[Community Edition](LICENSE) — AGPLv3.** Free, open, copyleft. Use it for yourself to run inference on your own hardware, research, hobby projects, side-projects, and/or hosted demos, as examples. If you want to make money from Atlas, purchase a commercial license.\n2. **Enterprise Edition — commercial license.** If you need to ship Atlas inside a closed-source product, run it as a SaaS backend without inheriting the AGPLv3 source-disclosure obligation, or simply want a support relationship with the people who wrote the kernels, contact sales. Enterprise customers also receive prioritized model and hardware ports.\n\nThis split exists for a single reason: a permissive license keeps us building Atlas full-time, and the AGPL community license keeps the project honest. What is in this repository is what we run.","summary":"Atlas Inference Engine is a high‑performance, pure‑Rust framework designed to run large language models locally at speeds that rival or surpass commercial cloud APIs. It offers hardware‑agnostic inference across NVIDIA, AMD, and Intel GPUs, with ready‑made Docker images and a streamlined ABI for easy integration. The project focuses on eliminating the dependency churn of traditional Python‑centric runtimes, delivering a lightweight, maintainable codebase that is both open source and community‑driven. Software engineers, data scientists and researchers who need fast, cost‑effective local LLM inference will find Atlas a compelling alternative to legacy inference engines.","description":"Pure Rust Inference Engine","stars":171,"language":"Rust"},{"owner":"scosman","repo":"cursed_browser","url":"https://github.com/scosman/cursed_browser","readme":"# Cursed Browser: Rendering Engine using Visual-LLMs\n\nCursed Browser asks an LLM to look at the page's HTML and draw what it thinks it looks like. Every page load is a surprise. Every render is a work of art. It's better than correct, it's *AI Native*.\n\n## Examples: Cursed vs Safari\n\n<p align=\"center\">\n  <img src=\"https://github.com/user-attachments/assets/27d2d637-6fc0-49b7-9b11-37991b1ba889\" width=\"45%\" alt=\"wikipedia rendered by cursed\" />\n  <img src=\"https://github.com/user-attachments/assets/10987507-bd12-4fe3-a060-fdc3efea0732\" width=\"45%\" alt=\"wikipedia rendered by safari\"/>\n</p>\n\n<p align=\"center\">\n  <img src=\"https://github.com/user-attachments/assets/8bbf04e4-fb69-4d3c-b2f3-f0ea3a141854\" width=\"45%\" alt=\"hacker news rendered by cursed\"/>\n  <img src=\"https://github.com/user-attachments/assets/da9e6740-3973-4935-a50e-5d0bdcae65c3\" width=\"45%\" alt=\"hacker news rendered by safari\"/>\n</p>\n\n<p align=\"center\">\n  <img src=\"https://github.com/user-attachments/assets/444b9fd3-2998-4ff0-aa94-de2e06680858\" width=\"45%\" alt=\"cbc.ca rendered by cursed\"/>\n  <img src=\"https://github.com/user-attachments/assets/132b9726-43bd-44af-bbde-057540d37066\" width=\"45%\" alt=\"cbc.ca rendered by safari\"/>\n</p>\n\n<p align=\"center\">\n  <img src=\"https://github.com/user-attachments/assets/3db95555-7c35-4410-bb40-7e0709b617be\" width=\"45%\" alt=\"acid 3 test rendered by cursed\"/>\n  <img src=\"https://github.com/user-attachments/assets/ae6a313f-6a27-4a65-b9a7-01fcdc72778b\" width=\"45%\" alt=\"acid 3 test rendered by safari\"/>\n</p>\n\n<p align=\"center\">\n  <img src=\"https://github.com/user-attachments/assets/60abe8f9-fab8-400f-94e7-493a51ecf999\" width=\"45%\" alt=\"google search for 'cursed browser' rendered by cursed\"/>\n  <img src=\"https://github.com/user-attachments/assets/176b4fec-51d1-4fbc-9cbd-08470dc3d49d\" width=\"45%\" alt=\"google search for 'cursed browser' rendered by cursed\"/>\n</p>\n\n<p align=\"center\">\n  <img src=\"https://github.com/user-attachments/assets/5c61594d-4477-429a-9702-c0a6e376a9bd\" width=\"45%\" alt=\"scosman.net homepage rendered by cursed\"/>\n  <img src=\"https://github.com/user-attachments/assets/3b6bcc0c-b803-4deb-8a5b-64bc3b334804\" width=\"45%\" alt=\"scosman.net homepage rendered by safari\"/>\n</p>\n\n## Compared to other \"AI Native\" browsers\n\n| Feature | Arc | Dia | Comet | Atlas | **Cursed** |\n|---|:-:|:-:|:-:|:-:|:-:|\n| HTML parsed by an LLM token-by-token | ❌ | ❌ | ❌ | ❌ | ✅ |\n| CSS interpreted via next-token prediction | ❌ | ❌ | ❌ | ❌ | ✅ |\n| Pixels hallucinated by a VLM | ❌ | ❌ | ❌ | ❌ | ✅ |\n| All hyphens upgraded to em—dashes | ❌ | ❌ | ❌ | ❌ | ✅ |\n\n## Roadmap\n\n**V1**: An LLM looks at HTML and draws what it thinks a browser would show. Technically a browser. Legally, probably also a browser. Morally, questionable.\n\n**[V1.1](https://github.com/scosman/cursed_browser/commit/ab64ae13eb6548650ec95bde889739c7825c5d3e)** (current, open-source): Break unnecessary dependency on the web; the model memorized it during pretraining. The live HTTP fetch is a formality, a polite\n  nod to legacy infrastructure. Acid test 100/100.\n\n**V2**: (oversubscribed $200m pre-seed, enterprise) The LLM writes a brand new browser engine from scratch every time you load a page. No bloat -- the engine only supports exactly the features that page needs. Extremely efficient.\n","summary":"Cursed Browser is a pioneering AI‑native rendering engine that asks a large language model to interpret a page’s HTML and then uses a visual LLM to generate the final pixels, producing a unique artistic visualization on every load. It parses HTML token‑by‑token, predicts CSS styles with next‑token inference, and hallucines complete images, even converting all hyphens into em‑dashes as a quirky style touch. The project appeals to researchers and developers exploring novel browser architectures, AI art enthusiasts, and anyone curious about how machine‑learning models can reinvent web rendering from scratch.","description":"True AI-Native Browser — a VLM reads the HTML and hallucinates the page.","stars":172,"language":"Swift"},{"owner":"ericjypark","repo":"codex-island","url":"https://github.com/ericjypark/codex-island","readme":"# CodexIsland\n\n<p align=\"center\">\n  <img src=\"Assets/codexisland-logo.png\" width=\"160\" alt=\"CodexIsland logo\">\n</p>\n\n\n> Your AI usage limits, living in your notch.\n\nCodexIsland is a native macOS overlay that turns the MacBook notch into a\nDynamic-Island-style live activity for Claude Code and Codex usage limits. It\nsits quietly over the notch, peeks on hover with the 5-hour headline, and\nexpands on click to show both providers' 5-hour and weekly windows with reset\ntiming, chart controls, and a swipeable Cost screen that estimates dollar\nspend and token throughput from your local session logs.\n\nhttps://github.com/user-attachments/assets/195beeff-0f70-4d6b-8f3d-9f31d9c0b989\n\n\nThe app is free, open source, unsigned, and local-first. It reads credentials\nalready written by Claude Code / Claude Desktop and Codex, then calls only the\nproviders' own usage endpoints.\n\n## What it does\n\n- **Two providers, four windows.** Claude 5h + 7d and Codex 5h + 7d live in\n  one panel.\n- **Notch-native overlay.** The compact state is a black pill aligned to the\n  physical notch, drawn with continuous (squircle) corners that match the\n  hardware. On non-notched Macs it falls back to a 200 x 28 menu-bar pill.\n- **Hover to peek.** The silhouette widens just enough to show each visible\n  provider's 5-hour percentage and reset headline.\n- **Click to expand.** Click the island to open the full Usage / Cost panel,\n  provider columns, and chart controls.\n- **Swipe between Usage and Cost.** A second screen estimates today and\n  month-to-date dollar spend + token throughput from your local Claude Code\n  and Codex session logs (no extra auth — same files `ccusage` reads). Cycle\n  display modes between USD, VALUE (vs your subscription), TOKENS, and TREND.\n- **Configurable token counting.** The TOKENS hero can sum every token type\n  that crossed the wire (cache included, ccusage parity) or input + output\n  only — the latter matches Anthropic's claude.ai stats panel.\n- **Click-through outside the island.** The window ignores mouse events outside\n  the visible silhouette so the menu bar and apps underneath still work.\n- **Five chart styles.** Ring, Bar, Stepped, Numeric, and Sparkline. Pick the\n  default in Settings or Cmd-click the expanded panel to cycle.\n- **On-demand refresh.** Click `synced Xs ago` in the panel header to refetch\n  immediately; the next scheduled poll re-arms from there.\n- **Cobalt glow + Low Power Mode.** A soft glow around the island signals an\n  in-flight refresh. Low Power Mode hides the steady-state glow so it only\n  pulses during active work.\n- **Settings without a Dock icon.** A quiet gear in the expanded panel opens a\n  custom settings window for launch-at-login, refresh interval, provider\n  visibility, chart style, cost view style, token counting, links, and Quit.\n- **Configurable safe polling.** Choose 5m, 15m, or 30m. The app does not offer\n  sub-5-minute polling because Anthropic rate-limits the usage endpoint\n  aggressively.\n- **Universal binary.** `build.sh` compiles arm64 and x86_64 slices and merges\n  them with `lipo`, targeting macOS 13+.\n- **Auto-updates via Sparkle.** The app checks the appcast attached to the\n  latest GitHub Release on launch and once a day thereafter, then prompts\n  before installing. Updates are signed with an EdDSA key — verifiable\n  without involving Apple's signing infrastructure. Toggle off in Settings\n  if you'd rather pin a version.\n- **Native app privacy.** No app telemetry, no crash reporting, no third-party\n  app analytics, and no proxy service.\n\n## Install\n\n### Homebrew\n\n```sh\nbrew install --cask ericjypark/tap/codexisland\n```\n\nThe first invocation auto-taps `ericjypark/homebrew-tap`. The cask strips the\nGatekeeper quarantine attribute automatically (CodexIsland is unsigned by\nApple — Sparkle handles update verification independently).\n\n### Direct download\n\nDownload `CodexIsland-X.Y.Z.dmg` from\n[Releases](https://github.com/ericjypark/codex-island/releases), drag the app\nto `/Applications`, then run:\n\n```sh\nxattr -dr com.apple.quarantine /Applications/CodexIsland.app\n```\n\n<details>\n<summary>Why is the dequarantine command necessary?</summary>\n\nCodexIsland is unsigned because Apple charges $99/year for a Developer ID\ncertificate, and this is a free open-source project. The command removes the\nmacOS Gatekeeper quarantine attribute that triggers the \"cannot be opened\nbecause Apple cannot check it for malicious software\" warning. The source code\nis in this repository for audit.\n\nIf a sponsored Apple Developer ID becomes available via\n[GitHub Sponsors](https://github.com/sponsors/ericjypark), signed builds can\nfollow.\n</details>\n\n<details>\n<summary>I do not want to use Terminal. What do I do?</summary>\n\n1. Drag `CodexIsland.app` to `/Applications`.\n2. Try to open it. macOS will block it because the build is unsigned.\n3. Open **System Settings -> Privacy & Security**.\n4. Scroll to the bottom and find the blocked CodexIsland message.\n5. Click **Open Anyway**, then re-launch the app.\n</details>\n\n## First run\n\nCodexIsland does not ask for passwords or API keys. It reads the auth state\nalready created by the command-line tools or desktop apps you use.\n\nFor Codex:\n\n- Sign in to Codex / ChatGPT CLI first.\n- CodexIsland reads `~/.codex/auth.json`.\n- If the file or access token is missing, the panel shows `no codex auth`.\n\nFor Claude:\n\n- Run `claude` once, or open Claude Desktop, so Claude credentials are\n  populated.\n- CodexIsland tries `CLAUDE_CODE_OAUTH_TOKEN`, then the macOS Keychain item\n  named `Claude Code-credentials`, then a refresh against Anthropic's OAuth\n  token endpoint.\n- If none work, the panel shows `auth required — run claude`.\n\nThe first fetch starts at app launch so the panel usually has values ready by\nthe first peek. Opening Settings also triggers a fresh fetch.\n\n## Using the app\n\n- Hover the notch to peek at the current 5-hour usage.\n- Click the island to expand the full panel.\n- Swipe horizontally on the panel (or use the indicator dots) to cross between\n  the **Usage** screen and the **Cost** screen.\n- Move away to collapse it.\n- Cmd-click the expanded panel to cycle chart styles on the active screen\n  (Usage cycles Ring/Bar/Stepped/Numeric/Sparkline; Cost cycles\n  USD/VALUE/TOKENS/TREND).\n- Click `synced Xs ago` in the panel header to refetch immediately.\n- Click the gear in the lower-left corner of the expanded panel to open\n  Settings.\n- Use Settings to enable Launch at Login, pick a refresh interval, toggle Low\n  Power Mode, hide/show Claude or Codex, choose the default chart and cost\n  styles, choose between all-tokens and billable-only token counting, open\n  GitHub / License, or quit the app.\n\nProvider visibility is display-only. Hiding a provider removes that provider's\nlogo and column from the island, but the app keeps the latest usage values in\nmemory so showing it again does not require a reset.\n\n## Settings\n\nSettings is a custom `NSWindow`, not the system Settings scene. The app still\nruns as an accessory app with no Dock icon and no menu bar.\n\nStored preferences:\n\n| Setting | Store | UserDefaults key | Values |\n| --- | --- | --- | --- |\n| Chart style | `StylePref` | `MacIsland.chartStyle` | `ring`, `bar`, `stepped`, `numeric`, `spark` |\n| Cost style | `CostStylePref` | `MacIsland.costStyle` | `dollar`, `multi`, `tokens`, `spark` |\n| Token counting | `TokenCountModeStore` | `MacIsland.tokenCountMode` | `all`, `billable` |\n| Refresh interval | `RefreshIntervalStore` | `MacIsland.refreshInterval` | `300`, `900`, `1800` |\n| Low Power Mode | `LowPowerModeStore` | `MacIsland.lowPowerMode` | Boolean, default `false` |\n| Claude visible | `ProviderVisibilityStore` | `MacIsland.claudeVisible` | Boolean, default `true` |\n| Codex visible | `ProviderVisibilityStore` | `MacIsland.codexVisible` | Boolean, default `true` |\n| Launch at login | `LaunchAtLoginStore` | managed by `SMAppService.mainApp` | System login item status |\n| Style hint seen | `StylePref` | `MacIsland.hasCycledStyle` | Boolean |\n| Cost style hint seen | `CostStylePref` | `MacIsland.costStyleCycled` | Boolean |\n\nThe refresh interval applies live. `UsageStore` invalidates the current timer\nand re-arms it with the selected cadence.\n\n## Build from source\n\nRequires macOS 13+ and a Swift toolchain from Xcode / Command Line Tools.\n\n```sh\ngit clone https://github.com/ericjypark/codex-island\ncd codex-island\n./build.sh\nopen build/CodexIsland.app\n```\n\nThere is no Xcode project and no SwiftPM package. `build.sh` runs `swiftc` over\n`Sources/**/*.swift`, compiles arm64 and x86_64 slices, merges them with\n`lipo`, copies bundled resources, and writes `Info.plist`.\n\nSmoke test the native app:\n\n```sh\n./scripts/verify.sh\n```\n\nThe script builds the app, launches the binary for one second, then kills it if\nit is still alive.\n\n## Release\n\nPackage a DMG:\n\n```sh\nnpm install --global create-dmg\n./release.sh\n```\n\n`release.sh` runs the native build, copies the `.app` to `dist/`, applies ad-hoc\ncodesigning, creates `dist/CodexIsland-X.Y.Z.dmg`, and prints the file size and\nSHA-256.\n\nPushing a `v*` tag triggers `.github/workflows/release.yml` on `macos-15`,\nbuilds the DMG, computes the checksum, publishes a GitHub Release, and mirrors\nthe cask to `ericjypark/homebrew-tap` when `HOMEBREW_TAP_TOKEN` is configured.\n\n`Casks/codexisland.rb` is the Homebrew Cask template. Do not manually bump its\nversion or SHA for normal releases; CI copies it to the tap and rewrites those\nfields from the tag and freshly built DMG.\n\n## Repository layout\n\n```text\n.\n├── Sources/\n│   ├── App.swift\n│   ├── Cost/                # Local-log cost + token aggregation\n│   ├── Model/\n│   ├── Theme/\n│   ├── Update/              # Sparkle wrapper\n│   ├── Usage/\n│   ├── Views/\n│   └── Window/\n├── Resources/              # App-bundled logo PNGs and .icns\n├── Assets/                 # README logo asset\n├── docs/                   # Sparkle runbook, design specs\n├── Casks/                  # Homebrew Cask template\n├── scripts/verify.sh       # Native smoke test\n├── build.sh                # Universal .app build\n├── release.sh              # DMG packaging\n└── VERSION\n```\n\n## Privacy\n\nNative app behavior:\n\n- No app telemetry.\n- No app analytics.\n- No crash reporting.\n- No proxy server.\n- No credentials are stored by CodexIsland.\n- Codex tokens are read locally from `~/.codex/auth.json`.\n- Claude tokens are read from `CLAUDE_CODE_OAUTH_TOKEN`, the macOS Keychain, or\n  Anthropic's refresh endpoint.\n- Tokens leave the machine only as `Authorization` headers to `chatgpt.com` and\n  `api.anthropic.com`.\n- The Cost screen reads local Claude Code session logs from\n  `~/.claude/projects/**/*.jsonl` (and `~/.config/claude/...`, plus any path\n  in `CLAUDE_CONFIG_DIR`) and Codex session logs from `~/.codex/sessions/`.\n  Aggregation happens entirely on-device — no log content is uploaded or\n  shared anywhere.\n\nThe network surface is concentrated in\n[`Sources/Usage/UsageFetcher.swift`](Sources/Usage/UsageFetcher.swift). The\nlocal log readers live in [`Sources/Cost/`](Sources/Cost/).\n\n## Troubleshooting\n\n**Claude shows `auth required — run claude`.**\nRun `claude` once in Terminal or open Claude Desktop so the credentials exist.\n\n**Codex shows `no codex auth`.**\nSign in to Codex / ChatGPT CLI and confirm `~/.codex/auth.json` exists.\n\n**The app shows stale values after an error.**\nThat is intentional. `UsageStore` keeps the previous good values when a refresh\nreturns only errors, so a temporary 429 does not turn the panel into 0%.\n\n**Why can I not choose 30-second polling?**\nAnthropic rate-limits `/api/oauth/usage` per token. The app exposes 5m, 15m,\nand 30m only.\n\n**Does it work without a notch?**\nYes. It falls back to a 200 x 28 pill in the menu-bar area.\n\n**Does it support multiple monitors?**\nPartially. The app prefers the first display whose safe-area inset indicates a\nnotch, then falls back to `NSScreen.main`. Multi-monitor setups still get one\nisland, not one island per display.\n\n**Will the usage endpoints break?**\nProbably at some point. Both provider endpoints are undocumented. If the panel\nstarts showing parse errors or HTTP errors, open an issue with the response\nshape and redact tokens.\n\n**Why is there no Dock icon?**\nCodexIsland is an accessory app. Use the gear in the expanded island to open\nSettings, and use Settings -> Quit to exit.\n\n## Known limits\n\n- Unsigned builds require dequarantine / Open Anyway.\n- Claude and Codex usage endpoints are undocumented.\n- Sparkline history is synthesized, not provider-sourced history.\n- Multi-monitor placement uses a single island.\n- Accessibility is partial: VoiceOver labels exist, but a high-contrast variant\n  is not implemented yet.\n\n## Acknowledgements\n\n- [codexbar](https://github.com/steipete/codexbar) by Peter Steinberger -\n  auth-source archaeology for the Claude env-var -> keychain -> refresh ladder.\n- [claudecodeusage](https://github.com/RchGrav/claudecodeusage) by Rich Hickson\n  - the `claude-code/2.1.121` User-Agent requirement on `/api/oauth/usage`.\n- [LaunchAtLogin-Modern](https://github.com/sindresorhus/LaunchAtLogin-Modern)\n  by Sindre Sorhus - reference shape for `SMAppService.mainApp`.\n- [Emil Kowalski](https://animations.dev) - animation timing and interaction\n  discipline.\n\n## Changelog\n\nSee [CHANGELOG.md](CHANGELOG.md) for user-facing changes per release.\n\n## License\n\nMIT - see [LICENSE](LICENSE).\n\n<a href=\"https://www.star-history.com/?type=date&repos=ericjypark%2Fcodex-island\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=ericjypark/codex-island&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=ericjypark/codex-island&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=ericjypark/codex-island&type=date&legend=top-left\" />\n </picture>\n</a>\n","summary":"CodexIsland is a native macOS overlay that turns a MacBook’s notch into a Dynamic‑Island‑style widget for monitoring Claude and Codex usage limits. It displays all four 5‑hour and 7‑day windows in a compact pill and expands on click to show usage charts, token counts, and estimated cost derived from local session logs. Features include customizable chart styles, on‑demand refresh, low‑power mode, and silent auto‑updates via Sparkle, all while respecting privacy with no telemetry. The app is ideal for developers and AI practitioners who use Claude or Codex on macOS and want real‑time, unobtrusive tracking of their usage and spending.","description":"CodexIsland - AI usage limits in your MacBook notch","stars":126,"language":"Swift"},{"owner":"chorus-codes","repo":"chorus","url":"https://github.com/chorus-codes/chorus","readme":"<div align=\"center\">\n\n<img src=\"docs/images/logo.png\" alt=\"Chorus\" width=\"120\" />\n\n# Chorus\n\n**A second opinion (and a third) before you ship AI-written code — using the AI subscriptions you already pay for.**\n\n2–3 *different* AI tools review the same change in parallel, only green-lighting when they agree. Runs on your existing Claude Pro / ChatGPT Plus / Gemini Advanced — typical review costs **$0** out of pocket.\n\n[![CI](https://github.com/chorus-codes/chorus/actions/workflows/ci.yml/badge.svg)](https://github.com/chorus-codes/chorus/actions/workflows/ci.yml)\n[![npm](https://img.shields.io/npm/v/chorus-codes?color=22c55e)](https://www.npmjs.com/package/chorus-codes)\n[![License](https://img.shields.io/badge/license-Apache%202.0-blue)](./LICENSE)\n[![Status](https://img.shields.io/badge/status-v0.7-brightgreen)]()\n[![Node](https://img.shields.io/badge/node-%E2%89%A520-339933)]()\n\n[Website](https://chorus.codes) · [Roadmap](./ROADMAP.md) · [Issues](https://github.com/chorus-codes/chorus/issues)\n\n</div>\n\n---\n\n<div align=\"center\">\n\n<img src=\"docs/images/hero-demo.gif\" alt=\"Six AI reviewers streaming verdicts in parallel — Chorus running live\" width=\"800\" />\n\n**One AI writes. Three review. You ship only when they agree — using AI subscriptions you already pay for.**\n\n</div>\n\n---\n\n## The problem Chorus solves\n\n🤖 **AI coding tools are confident — and wrong about 5% of the time** in subtle ways that are hard to spot until production.\n\n🪞 **The model that wrote your code can't see its own blind spots.**\nAsking GPT to review GPT's work is theatre — same training, same biases.\n\n💸 **Multi-AI review on raw API keys gets expensive fast.**\nEvery diff × 3 reviewers × pay-per-token = real money. So nobody does it routinely.\n\n### Chorus fixes all three\n\n✅ **Different vendors review each other.**\nClaude writes, GPT and Gemini check it. Different blind spots cover each other. Disagreement = red flag *before* you merge.\n\n✅ **Uses your existing AI subscriptions.**\nYou're already paying for Claude Pro / ChatGPT Plus / Gemini Advanced (~$20/mo each). Chorus drives them headlessly through their CLIs — every multi-AI review costs **$0 out of pocket**, just counts against the quota you already have. Per-token API users save 10-100× vs running the same prompts directly.\n\n✅ **Local-first, zero markup.**\nYour code never reaches a new vendor. Chorus runs on your laptop, talks to the AI tools you already trust, and shuts up. Open source, Apache-2.0.\n\nThat's the whole pitch.\n\n---\n\n## Real moments where this matters\n\n🚨 **You asked Claude to write a `divide(a, b)` helper.**\nIt says \"looks correct!\" You ship. Production crashes at 2am because nobody handled `b = 0`.\n*With Chorus: GPT or Gemini would have flagged it in the review pass before you merged.*\n\n🔧 **You're refactoring a critical path.**\nYour AI rewrote 200 lines and says it's behaviour-equivalent. You're tired and skeptical.\n*Run it through Chorus. Three different AIs all saying \"yes, equivalent\" lets you sleep.*\n\n🏗️ **Big architectural call** — queue vs polling, sync vs async, this DB vs that one.\nWrite a paragraph, hit Chorus. *Three different models give you three angles you hadn't thought of.*\n\n📝 **Reviewing a 600-line PR.**\nYou're short on time. Paste the diff into Chorus. *Three reviewers spot the obvious bugs in 90 seconds. Your job becomes the 5% they couldn't catch.*\n\n⚔️ **Test-driven development where neither AI cheats.**\n*One AI writes tests blind to the code; another AI writes code to pass them.* Use the `red-green` template.\n\n🐛 **Hunting a flaky bug.**\nReproduces 1-in-20, no obvious pattern. Drop the failing test + suspect code into Chorus.\n*Each reviewer attacks the bug from a different angle — race? clock skew? off-by-one? — and you land on the cause faster than walking it alone.*\n\n---\n\n## Quick start\n\n```bash\nnpm i -g chorus-codes      # install (no sudo — see below)\nchorus init                # finds AI tools you already have, wires up MCP\nchorus start --ui          # opens http://localhost:5050\n```\n\nPaste a task. Hit submit. Watch the AIs argue.\n\n> **Don't `sudo npm install -g`** if you use nvm, fnm, asdf, or any per-user\n> Node manager. `sudo` writes to root's npm prefix (`/usr/local/...`) but\n> your `chorus` command resolves through your user prefix — the install\n> succeeds in a place PATH never sees, leaving you on a stale version.\n> If `npm install -g` errors with EACCES, set up an unprivileged prefix:\n> `npm config set prefix ~/.npm-global` then add `~/.npm-global/bin` to\n> your PATH.\n\nTo upgrade later: `chorus update`. The updater locates the running binary\nand writes to that exact install location, so it always lands where PATH\nexpects regardless of how you installed.\n\n### Or drive it from any AI CLI you already use\n\n`chorus init` registers Chorus as an MCP server with every CLI / IDE it detects (Claude Code, Codex, Gemini CLI, Cursor, Windsurf, Kimi, OpenCode). After that, just ask the assistant in plain English:\n\n```\n> Use chorus to review the staged diff against main\n> Ask chorus to run the architect-review template on src/payments/*.ts\n> chorus, get a second opinion on this function from claude + gemini\n```\n\nOr invoke a specific MCP tool directly — every CLI uses the same name (`chorus`) and exposes nine tools:\n\n| Tool | What it does |\n|---|---|\n| `create_chat` | Kick off a review (returns a `chatId` + URL) |\n| `wait_for_chat` | Block until the run reaches a terminal state |\n| `get_chat_status` | Poll a running chat without blocking |\n| `cancel_chat` / `resume_chat` | Stop or restart |\n| `list_templates` / `list_personas` | Discover what's available |\n| `invoke_persona` | Run a single persona (skip multi-reviewer fan-out) |\n| `list_blocked` | See chats that need human input |\n\nExample raw inv
