<script id="project-data" type="application/json">[{"owner":"tauri-apps","repo":"tauri","url":"https://github.com/tauri-apps/tauri","readme":"<img src=\".github/splash.png\" alt=\"Tauri\" />\n\n[![status](https://img.shields.io/badge/status-stable-blue.svg)](https://github.com/tauri-apps/tauri/tree/dev)\n[![License](https://img.shields.io/badge/License-MIT%20or%20Apache%202-green.svg)](https://opencollective.com/tauri)\n[![test core](https://img.shields.io/github/actions/workflow/status/tauri-apps/tauri/test-core.yml?label=test%20core&logo=github)](https://github.com/tauri-apps/tauri/actions/workflows/test-core.yml)\n[![FOSSA Status](https://app.fossa.com/api/projects/git%2Bgithub.com%2Ftauri-apps%2Ftauri.svg?type=shield)](https://app.fossa.com/projects/git%2Bgithub.com%2Ftauri-apps%2Ftauri?ref=badge_shield)\n[![Chat Server](https://img.shields.io/badge/chat-discord-7289da.svg)](https://discord.com/invite/tauri)\n[![website](https://img.shields.io/badge/website-tauri.app-purple.svg)](https://tauri.app)\n[![https://good-labs.github.io/greater-good-affirmation/assets/images/badge.svg](https://good-labs.github.io/greater-good-affirmation/assets/images/badge.svg)](https://good-labs.github.io/greater-good-affirmation)\n[![support](https://img.shields.io/badge/sponsor-Open%20Collective-blue.svg)](https://opencollective.com/tauri)\n\n## Introduction\n\nTauri is a framework for building tiny, blazingly fast binaries for all major desktop platforms. Developers can integrate any front-end framework that compiles to HTML, JS and CSS for building their user interface. The backend of the application is a rust-sourced binary with an API that the front-end can interact with.\n\nThe user interface in Tauri apps currently leverages [`tao`](https://docs.rs/tao) as a window handling library on macOS, Windows, Linux, Android and iOS. To render your application, Tauri uses [WRY](https://github.com/tauri-apps/wry), a library which provides a unified interface to the system webview, leveraging WKWebView on macOS & iOS, WebView2 on Windows, WebKitGTK on Linux and Android System WebView on Android.\n\nTo learn more about the details of how all of these pieces fit together, please consult this [ARCHITECTURE.md](https://github.com/tauri-apps/tauri/blob/dev/ARCHITECTURE.md) document.\n\n## Getting Started\n\nIf you are interested in making a tauri app, please visit the [documentation website](https://tauri.app).\n\nThe quickest way to get started is to install the [prerequisites](https://v2.tauri.app/start/prerequisites/) for your system and create a new project with [`create-tauri-app`](https://github.com/tauri-apps/create-tauri-app/#usage). For example with `npm`:\n\n```sh\nnpm create tauri-app@latest\n```\n\n## Features\n\nThe list of Tauri's features includes, but is not limited to:\n\n- Built-in app bundler to create app bundles in formats like `.app`, `.dmg`, `.deb`, `.rpm`, `.AppImage` and Windows installers like `.exe` (via NSIS) and `.msi` (via WiX).\n- Built-in self updater (desktop only)\n- System tray icons\n- Native notifications\n- Native WebView Protocol (tauri doesn't create a localhost http(s) server to serve the WebView contents)\n- GitHub action for streamlined CI\n- VS Code extension\n\n### Platforms\n\nTauri currently supports development and distribution on the following platforms:\n\n| Platform   | Versions                                                                                                        |\n| :--------- | :-------------------------------------------------------------------------------------------------------------- |\n| Windows    | 7 and above                                                                                                     |\n| macOS      | 10.15 and above                                                                                                 |\n| Linux      | webkit2gtk 4.0 for Tauri v1 (for example Ubuntu 18.04). webkit2gtk 4.1 for Tauri v2 (for example Ubuntu 22.04). |\n| iOS/iPadOS | 9 and above                                                                                                     |\n| Android    | 7 and above (currently 8 and above)                                                                             |\n\n## Contributing\n\nBefore you start working on something, it's best to check if there is an existing issue first. It's also a good idea to stop by the Discord server and confirm with the team if it makes sense or if someone else is already working on it.\n\nPlease make sure to read the [Contributing Guide](./.github/CONTRIBUTING.md) before making a pull request.\n\nThank you to everyone contributing to Tauri!\n\n### Documentation\n\nDocumentation in a polyglot system is a tricky proposition. To this end, we prefer to use inline documentation in the Rust & JS source code as much as possible. Check out the hosting repository for the documentation site for further information: <https://github.com/tauri-apps/tauri-docs>\n\n## Partners\n\n<table>\n  <tbody>\n    <tr>\n      <td align=\"center\" valign=\"middle\">\n        <a href=\"https://crabnebula.dev\" target=\"_blank\">\n          <img src=\".github/sponsors/crabnebula.svg\" alt=\"CrabNebula\" width=\"283\">\n        </a>\n      </td>\n    </tr>\n  </tbody>\n</table>\n\nFor the complete list of sponsors please visit our [website](https://tauri.app#sponsors) and [Open Collective](https://opencollective.com/tauri).\n\n## Organization\n\nTauri aims to be a sustainable collective based on principles that guide sustainable free and open software communities. To this end it has become a Programme within the [Commons Conservancy](https://commonsconservancy.org/), and you can contribute financially via [Open Collective](https://opencollective.com/tauri).\n\n## Licenses\n\nCode: (c) 2015 - Present - The Tauri Programme within The Commons Conservancy.\n\nMIT or MIT/Apache 2.0 where applicable.\n\nLogo: CC-BY-NC-ND\n\n- Original Tauri Logo Designs by [Alve Larsson](https://alve.io/), [Daniel Thompson-Yvetot](https://github.com/nothingismagick) and [Guillaume Chau](https://github.com/akryum)\n\n[![FOSSA Status](https://app.fossa.com/api/projects/git%2Bgithub.com%2Ftauri-apps%2Ftauri.svg?type=large)](https://app.fossa.com/projects/git%2Bgithub.com%2Ftauri-apps%2Ftauri?ref=badge_large)\n","summary":"Tauri is a framework designed for building lightweight, highly performant cross-platform applications using a Rust-based backend and any web-based front-end framework. It leverages native system webviews to render interfaces while providing a secure API for the front-end to communicate with the operating system. With features like a built-in app bundler, native notification support, and a self-updater, Tauri is an ideal solution for developers looking to create compact desktop and mobile apps with a smaller resource footprint than traditional Electron-based alternatives.","description":"Build smaller, faster, and more secure desktop and mobile applications with a web frontend.","stars":107456,"language":"Rust"},{"owner":"ToolJet","repo":"ToolJet","url":"https://github.com/ToolJet/ToolJet","readme":"ToolJet is an **open-source low-code framework** to build and deploy internal tools with minimal engineering effort. ToolJet's drag-and-drop frontend builder allows you to create complex, responsive frontends within minutes. Additionally, you can integrate various data sources, including databases like PostgreSQL, MongoDB, and Elasticsearch; API endpoints with OpenAPI spec and OAuth2 support; SaaS tools such as Stripe, Slack, Google Sheets, Airtable, and Notion; as well as object storage services like S3, GCS, and Minio, to fetch and write data.\n\n :star: If you find ToolJet useful, please consider giving us a star on GitHub! Your support helps us continue to innovate and deliver exciting features.\n\n![Docker Cloud Build Status](https://img.shields.io/docker/cloud/build/tooljet/tooljet-ce)\n![Number of GitHub contributors](https://img.shields.io/github/contributors/tooljet/tooljet)\n[![Number of GitHub issues that are open](https://img.shields.io/github/issues/ToolJet/ToolJet)](https://github.com/ToolJet/ToolJet/issues)\n[![Number of GitHub stars](https://img.shields.io/github/stars/ToolJet/ToolJet)](https://github.com/ToolJet/ToolJet/stargazers)\n![Number of GitHub closed issues](https://img.shields.io/github/issues-closed/tooljet/tooljet)\n![Number of GitHub pull requests that are open](https://img.shields.io/github/issues-pr-raw/tooljet/tooljet)\n![GitHub release; latest by date](https://img.shields.io/github/v/release/tooljet/tooljet)\n![GitHub commit activity](https://img.shields.io/github/commit-activity/m/tooljet/tooljet)\n[![GitHub license which is AGPL license](https://img.shields.io/github/license/ToolJet/ToolJet)](https://github.com/ToolJet/ToolJet)\n[![Follow us on X, formerly Twitter](https://img.shields.io/twitter/follow/ToolJet?style=social)](https://twitter.com/ToolJet)\n\n<p align=\"center\">\n    <img src=\"https://user-images.githubusercontent.com/7828962/211444352-4d6d2e4a-13c9-4980-9e16-4aed4af9811b.png\" alt=\"Tooljet dashboard showing inventory and orders\"/>\n</p>\n\n<p align=\"center\">\n    <img src=\"https://github.com/ToolJet/ToolJet/assets/25361949/0e711f3a-edb7-496b-8833-107de3826933\"/>\n</p>\n\n## All features\n\n- **Visual App Builder:** 45+ built-in responsive components, including Tables, Charts, Lists, Forms, and Progress Bars.\n- **ToolJet Database:** Built-in no-code database.\n- **Multi-Page:** Build an application with multiple pages.\n- **Multiplayer editing:** Allows simultaneous app building by multiple developers.\n- **50+ data sources:** Integrate with external databases, cloud storage, and APIs.\n- **Desktop & mobile:** Customize layout widths to fit various screen sizes.\n- **Self-host:** Supports Docker, Kubernetes, AWS EC2, Google Cloud Run, and more.\n- **Collaborate:** Add comments anywhere on the canvas and tag your team members.\n- **Extend with plugins:** Use our [command-line tool](https://www.npmjs.com/package/@tooljet/cli) to easily bootstrap new connectors.\n- **Version control:** Manage multiple application versions with a structured release cycle.\n- **Run JS & Python code:** Execute custom JavaScript and Python snippets.\n- **Granular access control:** Set permissions at both group and app levels.\n- **Low-code:** Use JS code almost anywhere within the builder, such as setting text color based on status with \n`status === 'success' ? 'green' : 'red'`.\n- **No-code query editors:** Query Editors are available for all supported data sources.\n- **Join and transform data:** Transform query results using JavaScript or Python code.\n- **Secure:** All the credentials are securely encrypted using `aes-256-gcm`.\n- **Data Privacy:** ToolJet serves solely as a proxy and does not store data.\n- **SSO:** Supports multiple Single Sign-On providers.\n\n<hr>\n\n## Quickstart\nThe easiest way to get started with ToolJet is by creating a [ToolJet Cloud](https://tooljet.com) account. ToolJet Cloud offers a hosted solution of ToolJet. If you want to self-host ToolJet, kindly proceed to [deployment documentation](https://docs.tooljet.com/docs/setup/).\n\n### Try using Docker\nWant to give ToolJet a quick spin on your local machine? You can run the following command from your terminal to have ToolJet up and running right away.\n\n\n```bash\ndocker run \\\n  --name tooljet \\\n  --restart unless-stopped \\\n  -p 80:80 \\\n  --platform linux/amd64 \\\n  -v tooljet_data:/var/lib/postgresql/13/main \\\n  tooljet/try:ee-lts-latest\n```\n\n*For users upgrading their ToolJet version, we recommend choosing the LTS version over the latest version. The LTS version ensures stability with production bug fixes, security patches, and performance enhancements.*\n\n## Tutorials and examples\n\n[Time Tracker Application](https://docs.tooljet.com/docs/#quickstart-guide)<br>\n[Build your own CMS using low-code](https://blog.tooljet.com/build-cms-using-lowcode-and-mongodb/)<br>\n[AWS S3 Browser](https://blog.tooljet.com/build-an-aws-s3-broswer-with-tooljet/)<br>\n\n## Documentation\nDocumentation is available at https://docs.tooljet.com.\n\n- [Getting Started](https://docs.tooljet.com)<br>\n- [Data source Reference](https://docs.tooljet.com/docs/data-sources/airtable/)<br>\n- [Component Reference](https://docs.tooljet.com/docs/widgets/button)\n\n## Self-hosted\nYou can use ToolJet Cloud for a fully managed solution. If you want to self-host ToolJet, we have guides on deploying ToolJet on Kubernetes, AWS EC2, Docker, and more.\n\n| Provider  | Documentation |\n| :------------- | :------------- |\n| Digital Ocean | [Link](https://docs.tooljet.com/docs/setup/digitalocean)  |\n| Docker  | [Link](https://docs.tooljet.com/docs/setup/docker)   |\n| AWS EC2 | [Link](https://docs.tooljet.com/docs/setup/ec2)  |\n| AWS ECS | [Link](https://docs.tooljet.com/docs/setup/ecs)   |\n| OpenShift | [Link](https://docs.tooljet.com/docs/setup/openshift)   |\n| Helm | [Link](https://docs.tooljet.com/docs/setup/helm)   |\n| AWS EKS (Kubernetes) | [Link](https://docs.tooljet.com/docs/setup/kubernetes)   |\n| GCP GKE (Kubernetes) | [Link](https://docs.tooljet.com/docs/setup/kubernetes-gke)   |\n| Azure AKS (Kubernetes) | [Link](https://docs.tooljet.com/docs/setup/kubernetes-aks)   |\n| Azure Container | [Link](https://docs.tooljet.com/docs/setup/azure-container)   |\n| Google Cloud Run  | [Link](https://docs.tooljet.com/docs/setup/google-cloud-run)   |\n| Deploying ToolJet client  | [Link](https://docs.tooljet.com/docs/setup/client)   |\n| Deploying ToolJet on a Subpath  | [Link](https://docs.tooljet.com/docs/setup/tooljet-subpath/)   |\n\n## Marketplace \nToolJet can now be found on both AWS and Azure Marketplaces, making it simpler than ever to access and deploy our app-building platform.\n\nFind ToolJet on AWS Marketplace [here](https://aws.amazon.com/marketplace/pp/prodview-fxjto27jkpqfg?sr=0-1&ref_=beagle&applicationId=AWSMPContessa) and explore seamless integration on Azure Marketplace [here](https://azuremarketplace.microsoft.com/en-us/marketplace/apps/tooljetsolutioninc1679496832216.tooljet?tab=Overview).\n\n## Community support\nFor general help using ToolJet, please refer to the official [documentation](https://docs.tooljet.com/docs/). For additional help, you can use one of these channels to ask a question:\n\n- [Slack](https://tooljet.com/slack) - Discussions with the community and the team.\n- [GitHub](https://github.com/ToolJet/ToolJet/issues) - For bug reports and feature requests.\n- [𝕏 (Twitter)](https://twitter.com/ToolJet) - Get the product updates quickly.\n\n## Roadmap\nCheck out our [roadmap](https://github.com/orgs/ToolJet/projects/15) to stay updated on recently released features and learn about what's coming next.\n\n## Branching model\nWe use the git-flow branching model. The base branch is `develop`. If you are looking for a stable version, please use the main branch or tags labeled as v1.x.x.\n\n## Contributing\nKindly read our [Contributing Guide](CONTRIBUTING.md) to familiarize yourself with ToolJet's development process, how to suggest bug fixes and improvements, and the steps for building and testing your changes. <br>\n\n## Contributors\n<a href=\"https://github.com/tooljet/tooljet/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=tooljet/tooljet&max=400&columns=20\" />\n  <img src=\"https://us-central1-tooljet-hub.cloudfunctions.net/github\" width=\"0\" height=\"0\" />\n</a>\n\n## License\nToolJet © 2023, ToolJet Solutions Inc - Released under the GNU Affero General Public License v3.0.\n","summary":"ToolJet is an open-source, low-code framework designed to help teams build and deploy complex internal tools with minimal engineering effort. It features a robust drag-and-drop interface builder and supports seamless integration with over 50 data sources, including databases, SaaS applications, and cloud storage services. The platform is ideal for developers and organizations looking to accelerate internal application development through collaborative features, version control, and extensible JavaScript and Python support.","description":"ToolJet is the open-source foundation of ToolJet AI - the enterprise app generation platform for building internal tools, dashboard, business applications, workflows and AI agents 🚀","stars":37970,"language":"JavaScript"},{"owner":"udecode","repo":"plate","url":"https://github.com/udecode/plate","readme":"<h1 align=\"center\">\nPlate\n</h1>\n\n<p>\n<div align=\"center\">\n  <a href=\"https://www.npmjs.com/package/@platejs/core\"><img src=\"https://img.shields.io/npm/dm/@platejs/core.svg\" alt=\"Total Downloads\"></a>\n  <a target=\"_blank\" href=\"https://github.com/udecode/plate/releases/latest\"><img src=\"https://img.shields.io/github/v/release/udecode/plate\" /></a>\n  <a target=\"_blank\" href=\"CONTRIBUTING.md\"><img src=\"https://img.shields.io/badge/PRs-welcome-brightgreen.svg\" alt=\"PRs Welcome\"></a>\n  <a target=\"_blank\" href=\"https://discord.gg/mAZRuBzGM3\"><img src=\"https://img.shields.io/badge/chat-on%20discord-7289da.svg?sanitize=true\" /></a>\n  <a target=\"_blank\" href=\"https://github.com/udecode/plate/blob/main/LICENSE\"><img src=\"https://badgen.now.sh/badge/license/MIT\" /></a>\n</div>\n\n[//]: # '  <a target=\"_blank\" href=\"https://platejs.org/docs/playground\" alt=\"Live Demo\"><img src=\"https://img.shields.io/badge/Live%20Demo-blue\" /></a>'\n[//]: # 'Welcome to Plate, a rich-text editor framework designed for simplicity and efficiency. Plate consists of four main parts:'\n[//]: #\n[//]: # \"1. **Core**: This is the heart of Plate. It's a special plugin system just for `slate-react`. We've made sure everything is neat and tidy, so it's easier for you to develop your project.\"\n[//]: # '2. **Plugins**: We give you a big selection of plugin packages. They help make editor behaviors, hooks, serialization, and normalization better, among other things.'\n[//]: # '3. **Primitives**: Besides the headless plugins, we also provide primitive hooks and components built on top of [Radix UI](https://www.radix-ui.com/). These are **unstyled** and accessible parts for making great design systems.'\n[//]: # '4. **Components**: We know a good-looking start is important. So, we give you components created with Plate CLI and [shadcn/ui](https://ui.shadcn.com/). Use these as a starting point to create your own component library.'\n\n## Templates\n\nYou can choose one of the following templates to get started:\n\n| Option                                                                            | Plate | Plugins | AI  | Backend |\n| --------------------------------------------------------------------------------- | ----- | ------- | --- | ------- |\n| [Notion-like template](https://pro.platejs.org/docs/templates/potion)             | ✅    | ✅      | ✅  | ✅      |\n| [Plate playground template](https://github.com/udecode/plate-playground-template) | ✅    | ✅      | ✅  |         |\n| [Plate minimal template](https://github.com/udecode/plate-template)               | ✅    |         |     |         |\n\n## Documentation\n\nYou can learn more about Plate by checking out our [documentation](https://platejs.org/docs).\n\n## Contributing\n\nTo get started, check out our [contributing guide](CONTRIBUTING.md).\n\n### Contributors\n\nWe'd love for you to join us! Whether it's through giving us a 🌟 star, making a 📥 pull request, or **sharing your plugins**, your help is always appreciated.\n\n[![Star History Chart](https://api.star-history.com/svg?repos=udecode/plate&type=Date)](https://star-history.com/#udecode/plate&Date)\n\nNeed more help? Join us on [Discord](https://discord.gg/mAZRuBzGM3). We're always here to guide you.\n\n## 中文文档\n\n您可以通过查看我们的[中文文档](tooling/cn/README.md)了解更多关于Plate的信息。如果您需要中文支持，欢迎加入我们的[Discord](https://discord.gg/mAZRuBzGM3)中文频道，我们的社区成员将很乐意用中文为您解答问题。\n\n对于贡献者，我们也提供了[中文贡献指南](tooling/cn/CONTRIBUTING.md)，帮助您参与到Plate的开发中。\n","summary":"Plate is a comprehensive rich-text editor framework built on top of Slate.js that utilizes a modular plugin architecture to provide extensive customization for editor behavior, serialization, and normalization. The project offers a rich ecosystem of headless primitives based on Radix UI and pre-styled components compatible with shadcn/ui to help developers build accessible, high-quality editing experiences. It is an ideal solution for developers looking to create sophisticated, Notion-like document editors while maintaining full control over their design system and application logic.","description":"Rich-text editor with AI and shadcn/ui","stars":16319,"language":"TypeScript"},{"owner":"yoheinakajima","repo":"ditto","url":"https://github.com/yoheinakajima/ditto","readme":"# Ditto\n\n[![License](https://img.shields.io/github/license/yoheinakajima/ditto)](LICENSE)\n\n**Ditto** - *the simplest self-building coding agent*.\n\nDitto is a user-friendly tool that allows you to generate a multi-file Flask application from simple natural language descriptions using a no-code interface. By leveraging a simple LLM loop with a few tools, Ditto automates the coding process, (occasionally) turning your ideas into functional web applications (or at least trying and getting close).\n\n## Features\n\n- **Simple Natural Language Input**: Just describe the application you want to build in plain English.\n- **Automated Code Generation**: Generates routes, templates, and static files based on your description.\n- **Self-Building Agent**: Automatically plans and constructs the application without the need for manual coding.\n- **Modular Structure**: Organizes code into a clean, modular structure with separate directories for templates, static files, and routes.\n\n## Getting Started\n\n### Prerequisites\n\n- Python 3.7 or higher\n- `pip` package manager\n\n### Installation\n\n1. **Clone the Repository**\n\n   ```bash\n   git clone https://github.com/yoheinakajima/ditto.git\n   cd ditto\n   ```\n\n2. **Create a Virtual Environment (Optional but Recommended)**\n\n   ```bash\n   python3 -m venv venv\n   source venv/bin/activate  # On Windows, use venv\\Scripts\\activate\n   ```\n\n3. **Install Dependencies**\n\n   ```bash\n   pip install litellm\n   ```\n\n### Setting the `OPENAI_API_KEY`\n\nTo use Ditto, you'll need to set the `OPENAI_API_KEY` in your environment. Here are two options for doing that:\n\n#### Option 1: Temporary Setup in Terminal\n\nFor macOS/Linux:\n\n```bash\nexport OPENAI_API_KEY=your-openai-api-key\n```\n\nFor Windows (Command Prompt):\n\n```cmd\nset OPENAI_API_KEY=your-openai-api-key\n```\n\nFor Windows (PowerShell):\n\n```powershell\n$env:OPENAI_API_KEY=\"your-openai-api-key\"\n```\n\nRun the application:\n\n```bash\npython main.py\n```\n\n#### Option 2: Persistent Setup using a `.env` File (Recommended)\n\n1. Install the `python-dotenv` package to load environment variables from a `.env` file:\n\n   ```bash\n   pip install python-dotenv\n   ```\n\n2. Create a `.env` file in the root of the project directory and add your API key:\n\n   ```bash\n   OPENAI_API_KEY=your-openai-api-key\n   ```\n\n3. Run the application as usual:\n\n   ```bash\n   python main.py\n   ```\n\n### Usage\n\n1. **Run the Application**\n\n   ```bash\n   python main.py\n   ```\n\n2. **Access the Web Interface**\n\n   Open your web browser and navigate to `http://localhost:8080`.\n\n3. **Describe Your Application**\n\n   On the home page, you'll find a form where you can describe the Flask application you want to create.\n\n4. **Monitor Progress**\n\n   After submitting your description, the application will process your request. You can monitor the progress in real-time.\n\n5. **View the Generated Application**\n\n   Once the process is complete, you can rerun the Flask app to interact with your newly generated Flask application.\n\n```bash\npython main.py\n```\n\n\n## Contribution\n\nThis is a quick exploration, so I have no plans to work on this further. Contributions are welcome, especially if they are awesome, but ping me on X/Twitter because I don't check PRs often. I'm basically going to try to bake this into the new [BabyAGI framework](https://github.com/yoheinakajima/babyagi), but give it the ability to store and save functions from the database. If this sounds like a fun challenge and you get it working, definitely let me know :)\n\n## License\n\nThis project is licensed under the MIT License - see the [LICENSE](LICENSE) file for details.\n","summary":"Ditto is an autonomous, self-building coding agent designed to generate functional multi-file Flask applications directly from natural language descriptions. By utilizing an automated LLM loop, the tool manages the entire creation process, including the generation of routes, templates, and organized file structures without manual coding. This project is ideal for developers and experimenters looking to rapidly prototype web applications or explore the capabilities of autonomous agents in software engineering.","description":"the simplest self-building coding agent","stars":1056,"language":"Python"},{"owner":"cypress-io","repo":"cypress","url":"https://github.com/cypress-io/cypress","readme":"<p align=\"center\">\n  <a href=\"https://www.cypress.io\">\n    <picture>\n      <source media=\"(prefers-color-scheme: dark)\"  srcset=\"./assets/cypress-logo-dark.png\">\n      <source media=\"(prefers-color-scheme: light)\" srcset=\"./assets/cypress-logo-light.png\">\n      <img alt=\"Cypress Logo\" src=\"./assets/cypress-logo-light.png\">\n    </picture>\n  </a>\n</p>\n<p align=\"center\">\n  <a href=\"https://on.cypress.io\">Documentation</a> |\n  <a href=\"https://on.cypress.io/changelog\">Changelog</a> |\n  <a href=\"https://on.cypress.io/roadmap\">Roadmap</a>\n</p>\n\n<h3 align=\"center\">\n  The web has evolved. Finally, testing has too.\n</h3>\n\n<p align=\"center\">\n  Fast, easy and reliable testing for anything that runs in a browser.\n</p>\n<p align=\"center\">\n  Join us, we're <a href=\"https://cypress.io/jobs\">hiring</a>.\n</p>\n\n<p align=\"center\">\n  <a href=\"https://www.npmjs.com/package/cypress\">\n    <img src=\"https://img.shields.io/npm/dm/cypress.svg\" alt=\"npm\"/>\n  </a>\n  <a href=\"https://on.cypress.io/discord\">\n    <img src=\"https://img.shields.io/badge/chat-on%20Discord-brightgreen\" alt=\"Discord chat\"/>\n  </a>\n    <a href=\"https://stackshare.io/cypress\">\n    <img src=\"https://img.stackshare.io/misc/follow-on-stackshare-badge.svg\" alt=\"StackShare\"/>\n  </a><br />\n</p>\n\n## What is Cypress?\n\n<p align=\"center\">\n  <a href=\"https://player.vimeo.com/video/237527670\">\n    <img alt=\"Why Cypress Video\" src=\"https://user-images.githubusercontent.com/1271364/31739717-dbdff0ee-b41c-11e7-9b16-bfa1b6ac1814.png\" width=\"75%\" height=\"75%\" />\n  </a>\n</p>\n\n## Installing\n\n[![npm version](https://badge.fury.io/js/cypress.svg)](https://badge.fury.io/js/cypress)\n\nInstall Cypress for Mac, Linux, or Windows, then [get started](https://on.cypress.io/install).\n\n```bash\nnpm install cypress --save-dev\n```\nor\n```bash\nyarn add cypress --dev\n```\nor\n```bash\npnpm add cypress --save-dev\n```\n\n![installing-cli e1693232](./assets/cypress-installation.gif)\n\n## Contributing\n\n[![cypress](https://img.shields.io/endpoint?url=https://cloud.cypress.io/badge/simple/ypt4pf/develop&style=flat&logo=cypress)](https://cloud.cypress.io/projects/ypt4pf/runs)\n[![CircleCI](https://circleci.com/gh/cypress-io/cypress/tree/develop.svg?style=svg)](https://circleci.com/gh/cypress-io/cypress/tree/develop) -  `develop` branch\n\nPlease see our [Contributing Guideline](./CONTRIBUTING.md) which explains repo organization, linting, testing, and other steps.\n\n## License\n\n[![license](https://img.shields.io/badge/license-MIT-green.svg)](https://github.com/cypress-io/cypress/blob/develop/LICENSE)\n\nThis project is licensed under the terms of the [MIT license](/LICENSE).\n\n## Badges\n\nConfigure a badge for your project's README to show your test status or test count in the [Cypress Cloud](https://www.cypress.io/cloud).\n\n[![cypress](https://img.shields.io/endpoint?url=https://cloud.cypress.io/badge/simple/ypt4pf/develop&style=flat&logo=cypress)](https://cloud.cypress.io/projects/ypt4pf/runs)\n\n[![cypress](https://img.shields.io/endpoint?url=https://cloud.cypress.io/badge/count/ypt4pf/develop&style=flat&logo=cypress)](https://cloud.cypress.io/projects/ypt4pf/runs)\n\nOr let the world know your project is using Cypress with the badge below.\n\n[![Cypress.io](https://img.shields.io/badge/tested%20with-Cypress-04C38E.svg)](https://www.cypress.io/)\n\n```\n[![Cypress.io](https://img.shields.io/badge/tested%20with-Cypress-04C38E.svg)](https://www.cypress.io/)\n```\n","summary":"Cypress is a comprehensive, open-source testing framework designed to provide fast, easy, and reliable automated testing for any application that runs in a browser. It enables developers to execute end-to-end, integration, and unit tests directly within a real browser environment, significantly simplifying the debugging and validation process. This tool is an essential asset for frontend developers and quality assurance engineers looking to streamline their testing workflows and ensure a consistent user experience.","description":"Fast, easy and reliable testing for anything that runs in a browser.","stars":49650,"language":"TypeScript"},{"owner":"ethanniser","repo":"NextMaster","url":"https://github.com/ethanniser/NextMaster","readme":"## NextFaster\n\nA highly performant e-commerce template using Next.js and AI generated content by [@ethanniser](https://x.com/ethanniser), [@RhysSullivan](https://x.com/RhysSullivan) and [@armans-code](https://x.com/ksw_arman)\n\n### Design notes\n\n**Check out the detailed [twitter thread](https://x.com/ethanniser/status/1848442738204643330)**\n\n- Uses [Next.js 15](https://nextjs.org/)\n  - All mutations are done via [Server Actions](https://nextjs.org/docs/app/building-your-application/data-fetching/server-actions-and-mutations)\n- [Partial Prerendering](https://vercel.com/blog/partial-prerendering-with-next-js-creating-a-new-default-rendering-model) is used to precompute the shells of pages\n  - When deployed, these are served statically from the edge\n  - Dynamic data (such as cart information) is then streamed in\n- Uses [Drizzle ORM](https://orm.drizzle.team/docs/overview) on top of [Neon Postgres](https://neon.tech)\n- Images stored on [Vercel Blob](https://vercel.com/docs/storage/vercel-blob)\n- Used [v0](https://v0.dev) to generate all initial UIs, check out some of the threads we were particularly impressed by:\n  - [v0 makes pretty impressive search dropdown without a library](https://v0.dev/chat/lFfc68X3fir?b=b_1o4tkiC9EEm&p=0)\n  - [recreating 'order' page](https://v0.dev/chat/RTBa8dXhx03?b=b_4RguNNUEhLh)\n  - [recreating 'login' page](https://v0.dev/chat/tijwMFByNX9?b=b_XnRtduKn2oe)\n\n#### AI\n\n- Used [OpenAI](https://openai.com)'s `gpt-4o-mini` with their batch API and the Vercel AI SDK to generate product categories, names and descriptions\n- [GetImg.ai](https://getimg.ai) was used to generate product images via the `stable-diffusion-v1-5` model\n\n### Deployment\n\n- Make sure the Vercel project is connected to a Vercel Postgres (Neon) database and Vercel Blob Storage\n- Run `pnpm db:push` to apply schema to your db\n\n### Local dev\n\n- Run `vc link` to link your project to Vercel.\n- Run `vc env pull` to get a `.env.local` file with your db credentials.\n- Run `pnpm install` && `pnpm dev` to start developing.\n- The data/data.zip includes a ~300 MB data.sql file with the full schema and 1,000,000+ products (_Note, the data exceeds the size limit allowed by the free tier for Neon on Vercel_ [see more](https://vercel.com/docs/storage/vercel-postgres/usage-and-pricing#pricing)). To seed Vercel Postgres with this data:\n  - Unzip data.zip to data.sql.\n  - Run `psql \"YOUR_CONNECTION_STRING\" -f data/data.sql`.\n- Create the default roles in your database.\n  -Run `psql \"YOUR_CONNECTION_STRING\"`\n  -Now run CREATE ROLE default; and CREATE ROLE cloud_admin;\n- For DB migrations with `drizzle-kit`:\n  - Make sure `?sslmode=required` is added to the `POSTGRES_URL` env for dev\n  - Run `pnpm db:push` to apply schema to your db\n\n### Performance\n\n[PageSpeed Report](https://pagespeed.web.dev/analysis/https-next-faster-vercel-app/7iywdkce2k?form_factor=desktop)\n\n<img width=\"822\" alt=\"SCR-20241027-dmsb\" src=\"https://github.com/user-attachments/assets/810bc4c7-2e01-422d-9c3d-45daf5fb13ce\">\n\n### Costs\n\nThis project is hosted on Vercel, and uses many of the features of the Vercel platform.\n\nHere is the full breakdown of the cost of running this project from Oct 20th 2024 through Nov 11th 2024.\n\nDuring that time, the project recieved **over 1 million page views** across 45k unique users. The site has **over 1 million unique pages and images\\***.\n\n\\*_images are unique by url (and caching) although not unqiue in their content_\n\n#### Summary:\n\n- ~1 million page views\n- ~1 million unqiue product pages\n- 45k unique users\n- $513.12\n\nIs $500 a lot for hosting this site? It depends, in this instance if it was a real ecommerce site that hosting cost would've been made back in the first 10k visitors.\n\nIt is likely possible to optimize these costs further if that is your goal, however that wasn't a priority for this project. We wanted to try and build the fastest possible site, quickly. We definitely achieved that goal without ever having to think about infra once.\n\nThese numbers are also on top of the Vercel pro plan, which is $20/contributor/month.\n\nWe would like to thank Vercel for covering the costs of hosting this project.\n\n#### Compute and Caching\n\nThese costs represent the core functionality of serving the site.\n\n| Resource             | Included                    | On-demand     | Charge  | Notes                                                                                 |\n| -------------------- | --------------------------- | ------------- | ------- | ------------------------------------------------------------------------------------- |\n| Function Invocations | 1M / 1M                     | +31M          | $18.00  |\n| Function Duration    | 1,000 GB-Hrs / 1,000 GB-Hrs | +333.7 GB-Hrs | $33.48  | Using In-function Concurrency reduces our compute usage by over 50% (see image below) |\n| Edge Requests        | 10M / 10M                   | +93M          | $220.92 |                                                                                       |\n| Fast Origin Transfer | 100 GB / 100 GB             | +461.33 GB    | $26.33  |                                                                                       |\n| ISR Writes           | 2M / 2M                     | +12M          | $46.48  |                                                                                       |\n| ISR Reads            | 10M / 10M                   | +20M          | $7.91   |                                                                                       |\n\nTotal: $353.12\n\n#### Images\n\nThese costs represent the image optimization done by Vercel.\n\n| Resource           | Included    | On-demand | Charge  | Notes                                                                                                                                                                                                                                                                              |\n| ------------------ | ----------- | --------- | ------- | ---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- |\n| Image Optimization | 5000 / 5000 | +101,784  | $160.00 | This represents the number of distinct source images used on the site and optimized by Vercel. Each of the 1 million products has a unique image. The reason this number is less than 1 million is because the optimization is done on demand and not all pages have been visited. |\n\nTotal: $160.00\n\n#### Even More Info\n\n![image](https://github.com/user-attachments/assets/fc0ba91c-6e58-4ea0-8c1c-3acfaf56e98a)\n\n![image](https://github.com/user-attachments/assets/fa208c6f-a943-42f2-ae90-3c50889cc98e)\n\n![image](https://github.com/user-attachments/assets/e04b0948-e18c-4bd5-b0d4-7ef65f2af84a)\n","summary":"NextFaster is a high-performance e-commerce template built with Next.js 15 that utilizes partial prerendering and server actions to deliver a lightning-fast shopping experience. The project showcases an end-to-end modern stack, integrating Drizzle ORM, Neon Postgres, and Vercel Blob, while leveraging AI tools like v0 for UI generation and GPT-4o-mini for automated content creation. It is an ideal resource for developers and e-commerce entrepreneurs who want to build highly scalable, edge-optimized storefronts that can handle millions of pages and requests with minimal infrastructure overhead.","description":"A highly performant e-commerce template using Next.js ","stars":4849,"language":"TypeScript"},{"owner":"iree-org","repo":"iree","url":"https://github.com/iree-org/iree","readme":"# IREE: Intermediate Representation Execution Environment\n\n<p><img src=\"docs/website/docs/assets/images/IREE_Logo_Icon_Color.svg\" width=\"48px\"></p>\n\nIREE (**I**ntermediate **R**epresentation **E**xecution **E**nvironment,\npronounced as \"eerie\") is an [MLIR](https://mlir.llvm.org/)-based end-to-end\ncompiler and runtime that lowers Machine Learning (ML) models to a unified IR\nthat scales up to meet the needs of the datacenter and down to satisfy the\nconstraints and special considerations of mobile and edge deployments.\n\nSee [our website](https://iree.dev/) for project details, user\nguides, and instructions on building from source.\n\n[![IREE Discord Status](https://discordapp.com/api/guilds/689900678990135345/widget.png?style=shield)]([https://discord.gg/wEWh6Z9nMU](https://discord.gg/wEWh6Z9nMU))\n[![pre-commit](https://img.shields.io/badge/pre--commit-enabled-brightgreen?logo=pre-commit)](https://github.com/pre-commit/pre-commit)\n[![OpenSSF Best Practices](https://www.bestpractices.dev/projects/8738/badge)](https://www.bestpractices.dev/projects/8738)\n\n## Project news\n\n* 2025-04-02:\n[AMD submitted an IREE-based SDXL implementation to the MLPerf benchmark suite](https://rocm.blogs.amd.com/artificial-intelligence/mi325x-accelerates-mlperf-inference/README.html#stable-diffusion-xl-sdxl-text-to-image-mlperf-inference-benchmark)\n* 2024-05-23:\n[IREE joins the LF AI & Data Foundation as a sandbox-stage project](https://lfaidata.foundation/blog/2024/05/23/announcing-iree-a-new-initiative-for-machine-learning-deployment/)\n\n## Project status\n\n### Release status\n\nReleases notes are\n[published on GitHub releases](https://github.com/iree-org/iree/releases?q=prerelease%3Afalse).\n\n| Package | Release status |\n| -- | -- |\nGitHub release (stable) | [![GitHub Release](https://img.shields.io/github/v/release/iree-org/iree)](https://github.com/iree-org/iree/releases/latest)\nGitHub release (nightly) | [![GitHub Release](https://img.shields.io/github/v/release/iree-org/iree?include_prereleases)](https://github.com/iree-org/iree/releases)\n`iree-base-compiler` | [![PyPI version](https://badge.fury.io/py/iree-base-compiler.svg)](https://pypi.org/project/iree-base-compiler)\n`iree-base-runtime` | [![PyPI version](https://badge.fury.io/py/iree-base-runtime.svg)](https://pypi.org/project/iree-base-runtime)\n\nFor more details on the release process, see\nhttps://iree.dev/developers/general/release-management/.\n\n### Build status\n\n[![CI](https://github.com/iree-org/iree/actions/workflows/ci.yml/badge.svg?query=branch%3Amain+event%3Apush)](https://github.com/iree-org/iree/actions/workflows/ci.yml?query=branch%3Amain+event%3Apush)\n[![PkgCI](https://github.com/iree-org/iree/actions/workflows/pkgci.yml/badge.svg?query=branch%3Amain+event%3Apush)](https://github.com/iree-org/iree/actions/workflows/pkgci.yml?query=branch%3Amain+event%3Apush)\n\n#### Nightly build status\n\n| Operating system | Build status |\n| -- | --: |\nLinux | [![CI - Linux arm64 clang](https://github.com/iree-org/iree/actions/workflows/ci_linux_arm64_clang.yml/badge.svg?query=branch%3Amain+event%3Aschedule)](https://github.com/iree-org/iree/actions/workflows/ci_linux_arm64_clang.yml?query=branch%3Amain+event%3Aschedule)\nmacOS | [![CI - macOS x64 clang](https://github.com/iree-org/iree/actions/workflows/ci_macos_x64_clang.yml/badge.svg?query=branch%3Amain+event%3Aschedule)](https://github.com/iree-org/iree/actions/workflows/ci_macos_x64_clang.yml?query=branch%3Amain+event%3Aschedule)\nmacOS | [![CI - macOS arm64 clang](https://github.com/iree-org/iree/actions/workflows/ci_macos_arm64_clang.yml/badge.svg?query=branch%3Amain+event%3Aschedule)](https://github.com/iree-org/iree/actions/workflows/ci_macos_arm64_clang.yml?query=branch%3Amain+event%3Aschedule)\n\nFor the full list of workflows see\nhttps://iree.dev/developers/general/github-actions/.\n\n## Communication channels\n\n*   [GitHub issues](https://github.com/iree-org/iree/issues): Feature requests,\n    bugs, and other work tracking\n*   [IREE Discord server](https://discord.gg/wEWh6Z9nMU): Daily development\n    discussions with the core team and collaborators\n*   (New) [iree-announce email list](https://lists.lfaidata.foundation/g/iree-announce):\n    Announcements\n*   (New) [iree-technical-discussion email list](https://lists.lfaidata.foundation/g/iree-technical-discussion):\n    General and low-priority discussion\n*   (Legacy) [iree-discuss email list](https://groups.google.com/forum/#!forum/iree-discuss):\n    Announcements, general and low-priority discussion\n\n### Related project channels\n\n*   [MLIR topic within LLVM Discourse](https://llvm.discourse.group/c/llvm-project/mlir/31):\n    IREE is enabled by and heavily relies on [MLIR](https://mlir.llvm.org). IREE\n    sometimes is referred to in certain MLIR discussions. Useful if you are also\n    interested in MLIR evolution.\n\n## Architecture overview\n\n<!-- TODO(scotttodd): switch to <picture> once better supported? https://github.blog/changelog/2022-05-19-specify-theme-context-for-images-in-markdown-beta/ -->\n![IREE Architecture](docs/website/docs/assets/images/iree_architecture_dark.svg#gh-dark-mode-only)\n![IREE Architecture](docs/website/docs/assets/images/iree_architecture.svg#gh-light-mode-only)\n\nSee [our website](https://iree.dev/) for more information.\n\n## Presentations and talks\n\nCommunity meeting recordings: [IREE YouTube channel](https://www.youtube.com/@iree4356)\n\nDate | Title | Recording | Slides\n---- | ----- | --------- | ------\n2025-06-10 | Data-Tiling in IREE: Achieving High Performance Through Compiler Design (AsiaLLVM) | [recording](https://www.youtube.com/watch?v=iANJWUL_SOo) | [slides](https://llvm.org/devmtg/2025-06/slides/technical-talk/wang-data-tilling.pdf)\n2025-05-17 | Introduction to GPU architecture and IREE's GPU CodeGen Pipeline | [recording](https://www.youtube.com/watch?v=9Fy2jxj0ARE) | [slides](https://drive.google.com/file/d/1xbABUy3kQxxBzOUb3WjBOFCSY_sQYdGo/view)\n2025-02-12 | The Long Tail of AI: SPIR-V in IREE and MLIR (Vulkanised) | [recording](https://youtu.be/0zwfc6UkxeE) | [slides](https://www.vulkan.org/user/pages/09.events/vulkanised-2025/T12-Jakub-Kuderski-AMD-IREE-MLIR.pdf)\n2024-10-01 | Unveiling the Inner Workings of IREE: An MLIR-Based Compiler for Diverse Hardware | [recording](https://www.youtube.com/watch?v=a3T74I9gGH8) |\n2021-06-09 | IREE Runtime Design Tech Talk | [recording](https://drive.google.com/file/d/1p0DcysaIg8rC7ErKYEgutQkOJGPFCU3s/view) | [slides](https://drive.google.com/file/d/1ikgOdZxnMz1ExqwrAiuTY9exbe3yMWbB/view?usp=sharing)\n2020-08-20 | IREE CodeGen (MLIR Open Design Meeting) | [recording](https://drive.google.com/file/d/1325zKXnNIXGw3cdWrDWJ1-bp952wvC6W/view?usp=sharing) | [slides](https://docs.google.com/presentation/d/1NetHjKAOYg49KixY5tELqFp6Zr2v8_ujGzWZ_3xvqC8/edit)\n2020-03-18 | Interactive HAL IR Walkthrough | [recording](https://drive.google.com/file/d/1_sWDgAPDfrGQZdxAapSA90AD1jVfhp-f/view?usp=sharing) |\n2020-01-31 | End-to-end MLIR Workflow in IREE (MLIR Open Design Meeting) | [recording](https://drive.google.com/open?id=1os9FaPodPI59uj7JJI3aXnTzkuttuVkR) | [slides](https://drive.google.com/open?id=1RCQ4ZPQFK9cVgu3IH1e5xbrBcqy7d_cEZ578j84OvYI)\n\n## License\n\nIREE is licensed under the terms of the Apache 2.0 License with LLVM Exceptions.\nSee [LICENSE](LICENSE) for more information.\n","summary":"IREE (Intermediate Representation Execution Environment) is an MLIR-based compiler and runtime ecosystem designed to lower machine learning models into a unified intermediate representation. It provides a scalable architecture that enables high-performance model execution across a wide range of hardware, spanning from large-scale datacenter environments to resource-constrained mobile and edge devices. This project is an ideal solution for developers and engineers seeking a flexible, cross-platform deployment pipeline to optimize and execute complex machine learning workloads efficiently.","description":"A retargetable MLIR-based machine learning compiler and runtime toolkit.","stars":3786,"language":"C++"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
