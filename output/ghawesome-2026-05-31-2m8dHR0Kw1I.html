d shared plan, PHP 8.3\n\n### Insertion\n\n| Volume  | insert() Win | insert() Linux | insertBulk() Win | insertBulk() Linux | Gain Win | Gain Linux |\n|---------|-------------|----------------|------------------|--------------------|----------|------------|\n| 1 000   | 3.23 s      | 8.58 s         | 274 ms           | 167 ms             | 11.8×    | 51.3×      |\n| 5 000   | 17.43 s     | 38.94 s        | 1.35 s           | 952 ms             | 12.9×    | 40.9×      |\n| 10 000  | 35.72 s     | 66.15 s        | 2.97 s           | 1.62 s             | 12×      | 40.8×      |\n| 20 000  | 72.87 s     | 129.09 s       | 5.78 s           | 3.44 s             | 12.6×    | 37.5×      |\n\n> Always prefer `insertBulk()` over `insert()` in production: it acquires a single lock\n> for the entire batch and is consistently faster — up to **12×** on local NVMe,\n> up to **51×** on shared Linux hosting. Both are designed for offline or scheduled\n> use; keep them out of critical request paths on high-traffic setups.\n\n### Index size\n\n| Volume  | Index size |\n|---------|------------|\n| 1 000   | 2.32 MB    |\n| 5 000   | 8.14 MB    |\n| 10 000  | 18.97 MB   |\n| 20 000  | 36.58 MB   |\n\n### Search\n\n| Volume  | Median Win | Median Linux | P95 Win  | P95 Linux | P99 Win   | P99 Linux |\n|---------|-----------|--------------|----------|-----------|-----------|-----------|\n| 1 000   | 3.51 ms   | 2.06 ms      | 8.21 ms  | 4.41 ms   | 8.66 ms   | 6.64 ms   |\n| 5 000   | 4.52 ms   | 2.99 ms      | 22.79 ms | 8.7 ms    | 23.62 ms  | 16.89 ms  |\n| 10 000  | 5.92 ms   | 4.02 ms      | 41.89 ms | 15.23 ms  | 44.37 ms  | 33.67 ms  |\n| 20 000  | 7.62 ms   | 4.76 ms      | 62.88 ms | 19.76 ms  | 106.67 ms | 21.39 ms  |\n\n> 200 queries, 10 distinct queries in rotation (including typos and out-of-corpus queries).  \n> Measured with `hrtime()`.\n\n### Compaction\n\n| Volume  | Windows  | Linux    |\n|---------|----------|----------|\n| 1 000   | 571.6 ms | 449.3 ms |\n| 5 000   | 1.25 s   | 897.9 ms |\n| 10 000  | 2.12 s   | 1.63 s   |\n| 20 000  | 4.03 s   | 2.68 s   |\n\n> Compaction rewrites the index from scratch — it is an occasional maintenance operation, not a request-time concern.  \n> Run it when `fragmentationRate()` exceeds your threshold (e.g. 20%).\n\n---\n\n## Example application\n\nThe gif below shows one possible use of php-fts — a product search interface with filters and ranked results, built on top of a fake shoe catalogue.\n\nIt is just an illustration. php-fts is an engine, not an interface. You can use it to power a product search, a documentation search, an admin filter, a CLI tool, or anything else that needs full-text matching over a set of documents.\n\nTo run it locally:\n\n```bash\nphp demo/seed.php\nphp -S localhost:8000 -t demo\n```\n\n![Demo](docs/demo.gif)\n\n> No database. No external service. The filters, scores, and result counts are all computed by the engine.\n\n---\n\n## License\n\nMIT — see [LICENSE](LICENSE).\n","summary":"php-fts is a self-contained full-text search engine implemented in pure PHP, designed to work without any PHP extensions, external services, or dependencies. It indexes documents using trigram-based matching to provide typo-tolerant and partial searches, and ranks results with BM25/IDF scoring while exposing per-document scores. The engine also supports field boosting for relevance tuning, rich filtering (including range/containment and array operators), bulk insertion for faster indexing, soft deletes with compaction, and portable binary index storage. It’s best for small to medium datasets on shared hosting or lightweight VPS where running Elasticsearch-like infrastructure isn’t feasible, and for applications that can index offline or on a schedule.","description":"A self-contained full-text search engine in pure PHP. No extensions, no dependencies.","stars":128,"language":"PHP"},{"owner":"harmont-dev","repo":"hsrs","url":"https://github.com/harmont-dev/hsrs","readme":"# hsrs\n\n[![actions status](https://img.shields.io/github/actions/workflow/status/harmont-dev/hsrs/ci.yml?branch=main&logo=github)](https://github.com/harmont-dev/hsrs/actions)\n[![codecov](https://img.shields.io/codecov/c/gh/harmont-dev/hsrs?logo=codecov)](https://codecov.io/gh/harmont-dev/hsrs)\n[![crates.io](https://img.shields.io/crates/v/hsrs?logo=rust)](https://crates.io/crates/hsrs)\n[![minimum rustc 1.85](https://img.shields.io/badge/rustc-1.85+-blue?logo=rust)](https://blog.rust-lang.org/2025/02/20/Rust-1.85.0.html)\n[![discord](https://img.shields.io/discord/1503184719578136576?logo=discord)](https://discord.gg/TcXYncqFWj)\n\nCall Rust from Haskell with type-safe, automatically generated FFI bindings.\n\nAnnotate your Rust types and functions, run the code generator, and get idiomatic Haskell that handles memory management, serialization, and type conversions for you.\n\n## Quick start\n\n### 1. Annotate your Rust code\n\n```rust\n#[hsrs::module]\nmod canvas {\n    #[hsrs::value_type]\n    pub struct Point {\n        pub x: i32,\n        pub y: i32,\n    }\n\n    #[hsrs::data_type]\n    pub struct Canvas {\n        points: Vec<Point>,\n    }\n\n    impl Canvas {\n        #[hsrs::function]\n        pub fn new() -> Self { Self { points: vec![] } }\n\n        #[hsrs::function]\n        pub fn add_point(&mut self, p: Point) { self.points.push(p); }\n\n        #[hsrs::function]\n        pub fn count(&self) -> u64 { self.points.len() as u64 }\n    }\n}\n```\n\n### 2. Generate Haskell bindings\n\n```sh\ncargo install hsrs-codegen\nhsrs-codegen src/lib.rs -o Bindings.hs\n```\n\n### 3. Use from Haskell\n\n```haskell\nimport Bindings\n\nmain :: IO ()\nmain = do\n  c <- new\n  addPoint c (Point 10 20)\n  n <- count c\n  print n  -- 1\n```\n\nThat's it. Memory is managed automatically via `ForeignPtr`, and complex types like `Point` are serialized across the boundary with [Borsh](https://borsh.io).\n\n## Setup\n\n**Rust side** — add `hsrs` to your crate:\n\n```toml\n[lib]\ncrate-type = [\"lib\", \"staticlib\"]\n\n[dependencies]\nhsrs = \"0.1\"\n```\n\n**Haskell side** — add the `hsrs` runtime package:\n\n```cabal\nbuild-depends:\n    hsrs >= 0.1 && < 0.2\n```\n\nThis pulls in Borsh serialization automatically — no extra dependencies needed.\n\n## What you can annotate\n\n| Annotation | What it does | Haskell result |\n|---|---|---|\n| `#[hsrs::data_type]` | Opaque struct passed by pointer | `ForeignPtr` newtype with automatic cleanup |\n| `#[hsrs::enumeration]` | C-compatible enum (`repr(u8)`) | `Word8` newtype with pattern synonyms |\n| `#[hsrs::value_type]` | Struct passed by value via Borsh | `data` record with Borsh deriving |\n| `#[hsrs::function]` | Method exported over FFI | Type-safe Haskell wrapper |\n| `#[hsrs::module]` | Groups a data type with its methods | Generates all FFI glue for the type |\n\n`Result<T, E>` becomes `Either E T`, `Option<T>` becomes `Maybe T`, `Vec<T>` becomes `[T]`, and `String` becomes `Text` — all serialized transparently via Borsh.\n\n## Supported types\n\n| Rust | Haskell | Transfer |\n|---|---|---|\n| `i8`, `i16`, `i32`, `i64` | `Int8`, `Int16`, `Int32`, `Int64` | Direct (C FFI) |\n| `u8`, `u16`, `u32`, `u64` | `Word8`, `Word16`, `Word32`, `Word64` | Direct (C FFI) |\n| `bool` | `CBool` | Direct (C FFI) |\n| `usize` / `isize` | `Word64` / `Int64` | Direct (C FFI) |\n| `#[hsrs::enumeration]` enum | `Word8` newtype + patterns | Direct (C FFI) |\n| `#[hsrs::value_type]` struct | `data` record | Borsh |\n| `String` | `Text` | Borsh |\n| `Vec<T>` | `[T]` | Borsh |\n| `Option<T>` | `Maybe T` | Borsh |\n| `Result<T, E>` | `Either E T` | Borsh |\n\n## Platform notes\n\n`usize` and `isize` are mapped to `Word64` and `Int64` respectively. This matches 64-bit platforms (x86_64, aarch64). If you target 32-bit platforms, be aware that values may be truncated.\n\n## Full example\n\n<details>\n<summary>A small VM with enums, value types, Result, and Option</summary>\n\n### Rust\n\n```rust\n#[hsrs::module]\nmod quecto_vm {\n    #[derive(Debug, PartialEq, Eq)]\n    #[hsrs::enumeration]\n    pub enum Register { Reg0, Reg1, Count }\n\n    #[derive(Debug, PartialEq, Eq)]\n    #[hsrs::value_type]\n    pub struct Point { pub x: i32, pub y: i32 }\n\n    #[derive(Debug, PartialEq, Eq)]\n    #[hsrs::value_type]\n    pub struct VmError { pub code: u32 }\n\n    #[hsrs::data_type]\n    pub struct QuectoVm {\n        registers: [i64; Register::Count as usize],\n        clock: usize,\n    }\n\n    impl QuectoVm {\n        #[hsrs::function]\n        pub fn new() -> Self { /* ... */ }\n\n        #[hsrs::function]\n        pub fn store(&mut self, r: Register, v: i64) { /* ... */ }\n\n        #[hsrs::function]\n        pub fn snapshot(&self) -> Point { /* ... */ }\n\n        #[hsrs::function]\n        pub fn safe_div(&mut self, a: Register, b: Register) -> Result<i64, VmError> { /* ... */ }\n\n        #[hsrs::function]\n        pub fn nonzero(&self, r: Register) -> Option<i64> { /* ... */ }\n    }\n}\n```\n\n### Generated Haskell\n\n```haskell\nnewtype Register = Register Word8\n  deriving (Eq, Show, Storable)\n  deriving (BorshSize, ToBorsh, FromBorsh) via Word8\n\npattern Reg0 :: Register\npattern Reg0 = Register 0\n\ndata Point = Point\n  { pointX :: Int32\n  , pointY :: Int32\n  } deriving (Generic, Eq, Show)\n  deriving (BorshSize, ToBorsh, FromBorsh) via AsStruct Point\n\ndata VmError = VmError\n  { vmErrorCode :: Word32\n  } deriving (Generic, Eq, Show)\n  deriving (BorshSize, ToBorsh, FromBorsh) via AsStruct VmError\n\ndata QuectoVmRaw\nnewtype QuectoVm = QuectoVm (ForeignPtr QuectoVmRaw)\n\nnew       :: IO QuectoVm\nstore     :: QuectoVm -> Register -> Int64 -> IO ()\nsnapshot  :: QuectoVm -> IO Point\nsafeDiv   :: QuectoVm -> Register -> Register -> IO (Either VmError Int64)\nnonzero   :: QuectoVm -> Register -> IO (Maybe Int64)\n```\n\n</details>\n\n## License\n\nMIT OR Apache-2.0\n","summary":"hsrs (harmont-dev/hsrs) is a Rust-to-Haskell FFI generator that creates type-safe, idiomatic Haskell bindings from annotated Rust code. It lets you mark Rust modules, functions, and types so the code generator produces wrappers that handle conversions and memory management automatically, including pointer-backed opaque types via `ForeignPtr`. Complex data like structs, `Vec`, `Option`, `Result`, and `String` are transferred transparently using Borsh serialization, while enums use a C-compatible representation. This is a good fit for Haskell developers integrating performance-critical Rust libraries without writing manual FFI glue or risking mismatched types and lifetimes.","description":"Type-safe Haskell Rust Bindings","stars":62,"language":"Rust"},{"owner":"agberohq","repo":"keeper","url":"https://github.com/agberohq/keeper","readme":"# keeper\n\nKeeper is a cryptographic secret store for Go. It encrypts arbitrary byte\npayloads at rest using Argon2id key derivation and XChaCha20-Poly1305 (default)\nauthenticated encryption, and stores them in an embedded bbolt database.\n\nIt ships as three things you can use independently:\n\n- **A Go library** — embed a hardened secret store directly in your process,\n  with four security levels, per-bucket DEK isolation, and a tamper-evident\n  audit chain.\n- **An HTTP handler** (`x/keephandler`) — mount keeper endpoints on any\n  `net/http` mux in one call, with pluggable hooks, guards, and response\n  encoders for access control and audit logging.\n- **A CLI** (`cmd/keeper`) — a terminal interface with a persistent REPL\n  session, no-echo secret entry, and zero shell-history exposure.\n\nKeeper was designed as the foundational secret management layer for the [Agbero](https://github.com/agberohq/agbero)\nload balancer but has no dependency on Agbero and works in any Go project.\n\n---\n\n## Contents\n\n- [Security model](#security-model)\n- [Cryptographic design](#cryptographic-design)\n- [Key hierarchy](#key-hierarchy)\n- [Storage schema](#storage-schema)\n- [Audit chain](#audit-chain)\n- [Jack integration](#jack-integration)\n- [x/keepcmd — reusable CLI operations](#xkeepcmd)\n- [x/keephandler — HTTP handler](#xkeephandler)\n- [API reference](#api-reference)\n- [Error catalogue](#error-catalogue)\n- [Security decisions](#security-decisions)\n- [Dependencies](#dependencies)\n\n---\n\n## Security model\n\nKeeper partitions secrets into buckets. Every bucket has an immutable\n`BucketSecurityPolicy` that governs how its Data Encryption Key (DEK) is\nprotected. Four levels are available.\n\n### Schemes vs. Security Levels\n\nA **scheme** is a URI prefix that groups related buckets (`vault://`, `certs://`,\n`space://`, or any name you register). A **security level** is a property of the\nbucket policy set at creation and immutable thereafter.\n\nYou can mix security levels freely within the same scheme. For example,\n`vault://system` might be `LevelPasswordOnly` (auto-unlocked at startup), while\n`vault://admin` is `LevelAdminWrapped` (requires explicit credential).\n\n### LevelPasswordOnly\n\nThe bucket DEK is derived from the master key using HKDF-SHA256 with a\ndomain-separated info string per bucket (`keeper-bucket-dek-v1:scheme:namespace`).\nAll `LevelPasswordOnly` buckets are unlocked automatically when\n`UnlockDatabase` is called with the correct master passphrase. No per-bucket\ncredential is required at runtime. This level is appropriate for secrets the\nprocess needs at startup without human interaction.\n\n### LevelAdminWrapped\n\nThe bucket has a randomly generated 32-byte DEK unique to that bucket. The DEK\nis never stored in plaintext. For each authorised admin a Key Encryption Key\n(KEK) is derived from `HKDF(masterKey‖adminCred, dekSalt)` and used to wrap\nthe DEK via XChaCha20-Poly1305. The bucket is inaccessible until an admin calls\n`UnlockBucket` with their credential. The master passphrase alone cannot\ndecrypt the bucket. Revoking one admin does not affect any other admin's wrapped\ncopy.\n\n### LevelHSM\n\nThe bucket DEK is generated at `CreateBucket` time and immediately wrapped by\na caller-supplied `HSMProvider`. The provider performs the wrap and unwrap\noperations — keeper never handles the raw DEK after handing it to the provider.\n`UnlockDatabase` automatically calls the provider to unwrap and seed the\nEnvelope for all registered HSM buckets. Master key rotation does not\nre-encrypt these buckets; the DEK is provider-controlled.\n\nA built-in `SoftHSM` implementation backed by a memguard-protected wrapping\nkey is available in `pkg/hsm` for testing and CI environments. Do not use it\nin production.\n\n### LevelRemote\n\nIdentical to `LevelHSM` in key management behaviour, but the `HSMProvider` is\nimplemented by `pkg/remote.Provider` — a configurable HTTPS adapter that\ndelegates wrap and unwrap to any remote KMS service over TLS. Pre-built\nconfigurations for HashiCorp Vault Transit, AWS KMS, and GCP Cloud KMS are\nprovided in `pkg/remote`. For production use, configure `TLSClientCert` and\n`TLSClientKey` to enable mutual TLS authentication.\n\n---\n\n## Cryptographic design\n\n### Master key derivation\n\n```\nsalt ← random 32 bytes, generated once, stored as a versioned SaltStore (unencrypted)\nmasterKey ← Argon2id(passphrase, salt, t=3, m=64 MiB, p=4) → 32 bytes\n```\n\nA verification hash is stored on first derivation:\n\n```\nverifyHash ← Argon2id(masterKey, \"verification\", t=1, m=64 MiB, p=4) → 32 bytes\n```\n\nSubsequent `DeriveMaster` calls recompute this hash and compare it with\n`crypto/subtle.ConstantTimeCompare`. A mismatch returns `ErrInvalidPassphrase`.\n\nThe KDF salt is stored **unencrypted** by design. It must be readable before\n`UnlockDatabase` to derive the master key — encrypting it with a key derived\nfrom the master would be circular. A KDF salt is not a secret; its purpose is\nuniqueness, not confidentiality.\n\n### Secret encryption\n\nEach plaintext value is encrypted with XChaCha20-Poly1305 using the bucket DEK:\n\n```\nnonce ← random 24 bytes\nciphertext ← XChaCha20-Poly1305.Seal(nonce, DEK, plaintext)\n```\n\nThe stored record is a msgpack-encoded `Secret` struct containing the\nciphertext, encrypted metadata, and schema version. Authentication is implicit:\na ciphertext decrypted with the wrong key produces an AEAD authentication\nfailure before any plaintext is returned.\n\n### KEK derivation — LevelAdminWrapped\n\n```\nsalt ← random 32 bytes, generated at bucket creation, stored in policy\nikm ← masterKey ‖ adminCredential\nKEK ← HKDF-SHA256(ikm, salt, info=\"keeper-kek-v1\") → 32 bytes\nwrappedDEK ← XChaCha20-Poly1305.Seal(nonce, KEK, DEK)\n```\n\nThe KEK is derived using HKDF rather than a second Argon2 pass. The master key\nwas already produced by a high-cost KDF; a second Argon2 invocation would add\nhundreds of milliseconds of latency to every `UnlockBucket` call with no\nsecurity benefit. HKDF-SHA256 operates in approximately one microsecond.\n\n**Defense-in-depth:** An attacker who compromises only the database obtains the\nwrapped DEK and the HKDF salt but cannot derive the KEK without the master key.\nAn attacker who compromises only the master key cannot unwrap any\n`LevelAdminWrapped` DEK without also knowing the admin credential.\n\n### Metadata encryption — secrets\n\nSecret metadata (creation time, update time, access count, version) is\nencrypted separately from the ciphertext:\n\n```\nmetaKey ← HKDF-SHA256(bucketDEK, nil, info=\"keeper-metadata-v1\") → 32 bytes\nencryptedMeta ← XChaCha20-Poly1305.Seal(nonce, metaKey, msgpack(metadata))\n```\n\nFor `LevelAdminWrapped`, `LevelHSM`, and `LevelRemote` buckets this means\nmetadata is inaccessible without the bucket credential, preventing an attacker\nwith read access to the database file from learning access patterns or\ntimestamps.\n\n**Timing side-channel note:** XChaCha20-Poly1305 processes the full ciphertext\nbefore returning an authentication error. The fallback decrypt path (new\nderived DEK → old master-key-as-DEK) takes the same wall-clock time regardless\nof which key succeeds. No timing side-channel leaks the migration state of a\nrecord.\n\n### Metadata encryption — policies, WAL, and audit\n\nAll structural metadata is also encrypted at rest. Two keys are derived from\nthe master key at `UnlockDatabase` time:\n\n```\npolicyEncKey ← HKDF-SHA256(masterKey, nil, info=\"keeper-policy-enc-v1\") → 32 bytes\nauditEncKey  ← HKDF-SHA256(masterKey, nil, info=\"keeper-audit-enc-v1\")  → 32 bytes\n```\n\n`policyEncKey` encrypts: `BucketSecurityPolicy` values and the rotation WAL.\n\n`auditEncKey` encrypts: the `Scheme`, `Namespace`, and `Details` fields of\nevery audit event.\n\nBoth keys are cleared from memory at `Lock()`. The cipher used for metadata\nencryption is the same configurable `crypt.Cipher` interface used for secrets —\nthe user's cipher choice (AES-256-GCM for FIPS, XChaCha20-Poly1305 by default)\nflows through automatically.\n\nWire format for all encrypted metadata blobs:\n\n```\nnonce (cipher.NonceSize() bytes) || AEAD-ciphertext\n```\n\n### Policy bucket key hashing\n\nOn-disk policy keys are opaque hashes rather than plaintext `scheme:namespace`\nstrings, preventing offline enumeration of bucket names:\n\n```\nbase ← hex(SHA-256(\"scheme:namespace\"))[:32]   // 32 hex chars = 128-bit key space\n_policies/<base>          → encrypted BucketSecurityPolicy\n_policies/<base>__hash__  → SHA-256(encrypted policy bytes)\n_policies/<base>__hmac__  → HMAC-SHA256(policyKey, encrypted policy bytes)\n```\n\nThe in-memory `schemeRegistry` continues to use `\"scheme:namespace\"` as its\nkey — only the on-disk representation changes.\n\n### Policy authentication\n\nEach policy record carries two integrity tags written atomically in one bbolt\ntransaction:\n\n```\nhash ← SHA-256(encryptedPolicyBytes)                         — unauthenticated, pre-unlock integrity\npolicyKey ← HKDF-SHA256(masterKey, nil, info=\"keeper-policy-hmac-v1\") → 32 bytes\nhmac ← HMAC-SHA256(policyKey, encryptedPolicyBytes)          — authenticated, post-unlock integrity\n```\n\nBefore `UnlockDatabase`, only the SHA-256 hash is available. After unlock,\n`loadPolicy` verifies the HMAC tag. `UnlockDatabase` calls `upgradePolicyHMACs`\nto backfill HMAC tags on policies created before this feature existed.\n\n### Audit HMAC signing\n\n```\nauditKey ← HKDF-SHA256(masterKey, nil, info=\"keeper-audit-hmac-v1\") → 32 bytes\nHMAC ← HMAC-SHA256(auditKey, event fields including Seq)\n```\n\nThe signing key is activated at `UnlockDatabase` and cleared at `Lock`. When\nthe master key is rotated, `Rotate` appends a key-rotation checkpoint event to\nevery active audit chain, signed with the old audit key as the final event of\nthe old epoch. History is never rewritten; the checkpoint is the trust bridge\nbetween epochs.\n\n---\n\n## Key hierarchy\n\n```\npassphrase\n    │\n    └─ Argon2id(salt) ──→ masterKey (32 bytes, memguard Enclave)\n                              │\n                              ├─ HKDF(\"keeper-audit-hmac-v1\")  ──→ auditKey    (HMAC signing)\n                              ├─ HKDF(\"keeper-audit-enc-v1\")   ──→ auditEncKey (audit field encryption)\n                              ├─ HKDF(\"keeper-policy-hmac-v1\") ──→ policyKey   (policy HMAC)\n                              ├─ HKDF(\"keeper-policy-enc-v1\")  ──→ policyEncKey (policy/WAL encryption)\n                              │\n                              ├─ [LevelPasswordOnly]\n                              │       └─ HKDF(\"keeper-bucket-dek-v1:scheme:ns\") ──→ DEK\n                              │               └─ HKDF(\"keeper-metadata-v1\") ──→ metaKey\n                              │\n                              ├─ [LevelAdminWrapped]\n                              │       ├─ random 32 bytes ──→ DEK\n                              │       │       └─ HKDF(\"keeper-metadata-v1\") ──→ metaKey\n                              │       │\n                              │       └─ HKDF(\"keeper-kek-v1\", masterKey‖adminCred, dekSalt)\n                              │                 └─ KEK\n                              │                       └─ XChaCha20-Poly1305(KEK, DEK) ──→ wrappedDEK\n                              │\n                              └─ [LevelHSM / LevelRemote]\n                                      ├─ random 32 bytes ──→ DEK\n                                      │       └─ HKDF(\"keeper-metadata-v1\") ──→ metaKey\n                                      │\n                                      └─ HSMProvider.WrapDEK(DEK) ──→ wrappedDEK\n                                         (stored; provider controls the wrapping key)\n```\n\nAll intermediate keys are zeroed immediately after use. The master key is\nnever written to disk in any form.\n\n---\n\n## Storage schema\n\nThe underlying database is bbolt. All buckets and their contents:\n\n| bbolt bucket | Key | Value |\n|---|---|---|\n| `__meta__` | `salt` | msgpack — SaltStore (unencrypted; circular dependency if encrypted) |\n| `__meta__` | `verify` | raw bytes — Argon2id verification hash |\n| `__meta__` | `rotation_wal` | `nonce‖AEAD(msgpack(RotationWAL))` |\n| `__meta__` | `bucket_dek_done` | `\"1\"` — DEK migration completion marker |\n| `__policies__` | `hex(SHA-256(scheme:ns))[:32]` | `nonce‖AEAD(msgpack(BucketSecurityPolicy))` |\n| `__policies__` | `<base>__hash__` | hex SHA-256 of encrypted policy bytes |\n| `__policies__` | `<base>__hmac__` | hex HMAC-SHA256(policyKey, encrypted policy bytes) |\n| `__audit__/scheme/namespace` | event UUID | JSON — audit Event |\n| `__audit__/scheme/namespace` | `__chain_index__` | JSON — chainIndex |\n| `scheme/namespace` | key string | msgpack — Secret struct |\n\n### Secret struct (msgpack)\n\n```go\ntype Secret struct {\n    Ciphertext    []byte `msgpack:\"ct\"`\n    EncryptedMeta []byte `msgpack:\"em,omitempty\"`\n    SchemaVersion int    `msgpack:\"sv\"`  // always 1\n}\n```\n\n### Audit Event fields\n\nThe `Event` struct uses separate plaintext routing fields (`Scheme`,\n`Namespace`) alongside encrypted payload fields (`EncScheme`, `EncNamespace`,\n`EncDetails`). Checksums are computed over the plaintext routing fields and the\nencrypted `EncDetails` bytes, so chain integrity can be verified at three tiers\nwithout any key:\n\n| Tier | Has | Can verify |\n|---|---|---|\n| Public | Nothing | SHA-256 checksum chain (detects tampering and insertion) |\n| Audit-key holder | `auditEncKey` | Full chain + decrypt Scheme/Namespace/Details |\n| Operator | Master passphrase | Everything |\n\n**Example:** A compliance auditor receives only `auditEncKey`. They can verify\nthe full HMAC chain across key rotations and read all event details, but cannot\ndecrypt any secret values. A public observer with only the database file can\nstill detect if any event was modified or inserted after the fact.\n\n### Versioned salt store\n\nThe KDF salt is stored as a msgpack-encoded `SaltStore` under the `salt`\nmetadata key. Each salt rotation appends a new `SaltEntry` and advances\n`CurrentVersion`. Old entries are retained as an audit trail. The SaltStore is\nstored unencrypted — see [Security decisions](#security-decisions).\n\n### Crash-safe rotation WAL\n\n`Rotate` writes a WAL before touching any record. The WAL carries\n`WrappedOldKey`: the pre-rotation master key encrypted with the new master key.\nAfter a crash the old passphrase is gone; `WrappedOldKey` is the only correct\nway to carry the old key across the boundary. At `UnlockDatabase`, when a WAL\nis present, the new master key decrypts `WrappedOldKey` and rotation resumes\nfrom the WAL cursor. The WAL itself is encrypted with `policyEncKey`.\n\n---\n\n## Audit chain\n\nEvery significant operation appends a tamper-evident event to the bucket's\naudit chain. Chain integrity depends on two mechanisms.\n\n**Checksum.** SHA-256 over prevChecksum, ID, BucketID, Scheme, Namespace,\nEncDetails, EventType, and Timestamp. Using `Scheme`/`Namespace` as plaintext\n(always preserved alongside the encrypted forms) ensures the checksum is stable\nacross load paths. `EncDetails` provides integrity over the encrypted payload.\n\n**HMAC.** HMAC-SHA256 over all fields including Seq. An attacker who can write\nto the database but does not know the audit key cannot produce a valid HMAC.\n`VerifyIntegrity` checks both layers for every event.\n\n**Key rotation epoch boundary.** At `Rotate`, a checkpoint event is appended\nto every active chain carrying fingerprints of both the outgoing and incoming\naudit keys. The checkpoint is signed with the outgoing key. Auditors holding\nany epoch key can recover subsequent epoch keys from the `wrapped_new_key` field\nand verify HMAC continuity across the full chain.\n\n**Automatic pruning.** When `AuditPruneInterval` is set in `Config`, a\n`jack.Scheduler` runs periodically and calls `PruneEvents` on every registered\nbucket. `LevelHSM` and `LevelRemote` buckets are never pruned regardless of\nthis setting.\n\n---\n\n## Jack integration\n\nJack is an optional process supervision library. When a `JackConfig` is\nprovided via `WithJack`, keeper activates background components automatically:\n\n- **Auto-lock Looper:** Periodically checks the last activity timestamp and\n  drops `LevelAdminWrapped` bucket DEKs after `AutoLockInterval`. `LevelPasswordOnly`\n  buckets remain unlocked so background jobs continue uninterrupted. The\n  single-write-lock pattern inside the looper task eliminates the `RUnlock→Lock`\n  race condition present in earlier designs.\n- **Per-bucket DEK Reaper:** TTL-based expiration for `LevelAdminWrapped` DEKs.\n- **Health monitoring patients:** bbolt read latency check and encrypt/decrypt\n  round-trip verification, both registered with `jack.Doctor`.\n- **Audit prune scheduler:** Periodic `PruneEvents` on all non-HSM buckets.\n- **Async event Pool:** Audit events submitted without blocking the main operation.\n\nIf `JackConfig` is not provided, keeper runs without these background tasks.\nKeeper never calls `pool.Shutdown` — the pool lifecycle belongs to the caller.\n\n---\n\n## x/keepcmd\n\n`x/keepcmd` provides reusable keeper operations decoupled from any CLI\nframework. Embed it in your own application to get typed, testable secret\nmanagement without pulling in the CLI binary.\n\n```go\nimport \"github.com/agberohq/keeper/x/keepcmd\"\n\ncmds := &keepcmd.Commands{\n    Store: func() (*keeper.Keeper, error) {\n        return security.KeeperOpen(cfg)  // your own config\n    },\n    Out:     keepcmd.PlainOutput{},\n    NoClose: false, // true in REPL / session contexts\n}\n\ncmds.List()                                          // all keys: scheme://namespace/key\ncmds.List(\"vault\")                                   // all keys in scheme vault\ncmds.List(\"vault\", \"system\")                         // all keys in vault://system\ncmds.Get(\"vault://system/jwt_secret\")\ncmds.Set(\"vault://system/jwt_secret\", \"newsecret\", keepcmd.SetOptions{})\ncmds.Rotate(newPassphraseBytes)    // caller resolved the passphrase — no prompter dependency\ncmds.RotateSalt(currentPassBytes)  // same\n```\n\n`keepcmd` never calls `prompter` or reads from stdin. Passphrase resolution\nis entirely the caller's responsibility — this keeps the package safe in\nheadless server contexts.\n\n`NoClose: true` prevents `Commands` from calling `store.Close()` after each\noperation. Use this in REPL / session contexts where one store is shared\nacross many calls.\n\n---\n\n## x/keephandler\n\n`x/keephandler` mounts keeper HTTP endpoints on any `net/http` mux. No\nexternal router dependency — it uses Go 1.22+ method+pattern routing with\nstdlib `http.ServeMux`.\n\n```go\nimport \"github.com/agberohq/keeper/x/keephandler\"\n\nkeephandler.Mount(mux, store,\n    keephandler.WithPrefix(\"/api/keeper\"),\n    keephandler.WithGuard(func(w http.ResponseWriter, r *http.Request, route string) bool {\n        if !acl.Allow(r.Header.Get(\"X-Principal\"), route) {\n            http.Error(w, `{\"error\":\"forbidden\"}`, http.StatusForbidden)\n            return false\n        }\n        return true\n    }),\n    keephandler.WithHooks(\n        keephandler.Hook{\n            Route:       keephandler.RouteGet,\n            CaptureBody: false,\n            After: func(r *http.Request, status int, _ []byte) {\n                audit.Log(r.Context(), route, status)\n            },\n        },\n    ),\n    keephandler.WithEncoder(func(w http.ResponseWriter, route string, status int, data any) {\n        w.Header().Set(\"Content-Type\", \"application/json\")\n        w.WriteHeader(status)\n        json.NewEncoder(w).Encode(map[string]any{\n            \"ok\":    status < 400,\n            \"route\": route,\n            \"data\":  data,\n        })\n    }),\n    keephandler.WithRoutes(func(m *http.ServeMux) {\n        m.HandleFunc(\"POST /api/keeper/totp/{user}\", myTOTPHandler)\n    }),\n)\n```\n\n### Endpoints\n\n| Method | Path | Description |\n|---|---|---|\n| `POST` | `{prefix}/unlock` | Unlock the store with a passphrase |\n| `POST` | `{prefix}/lock` | Lock the store |\n| `GET` | `{prefix}/status` | Lock state — safe to poll without auth |\n| `GET` | `{prefix}/keys` | List all secret keys |\n| `GET` | `{prefix}/keys/{key}` | Retrieve a secret value |\n| `POST` | `{prefix}/keys` | Store a secret (JSON or multipart) |\n| `DELETE` | `{prefix}/keys/{key}` | Delete a secret |\n| `POST` | `{prefix}/rotate` | Rotate the master passphrase |\n| `POST` | `{prefix}/rotate/salt` | Rotate the KDF salt |\n| `GET` | `{prefix}/backup` | Stream a database snapshot |\n\n### Hook contract\n\n`BeforeFunc` returns `(allow bool, err error)`.\n\n- `(true, nil)` — let the request proceed.\n- `(false, nil)` — abort; the hook has already written a complete response.\n- `(false, err)` — abort; the framework writes a `500` using `err.Error()`.\n  The hook must **not** have written anything to `w`.\n\n`Hook.CaptureBody bool` controls whether `AfterFunc` receives the response\nbody. `false` (default) costs one lightweight `statusWriter` wrapper;\n`true` buffers the full body into a `bytes.Buffer` for the `AfterFunc` — one\nallocation per request.\n\nHooks are executed in registration order. Multiple `WithHooks` calls are\nadditive. Only the first hook registered for a given route name is used—subsequent\nregistrations for the same route are ignored.\n\n---\n\n## API reference\n\n### Construction and unlock\n\n```go\nstore, err := keeper.New(keeper.Config{\n    DBPath:              \"/var/lib/agbero/keeper.db\",\n    AutoLockInterval:    30 * time.Minute,\n    EnableAudit:         true,\n    AuditPruneInterval:  24 * time.Hour,\n    AuditPruneKeepLastN: 10_000,\n    AuditPruneOlderThan: 90 * 24 * time.Hour,\n    DBLatencyThreshold:  200 * time.Millisecond,\n    Logger:              logger,\n}, keeper.WithJack(keeper.JackConfig{\n    Pool:     jackPool,\n    Shutdown: jackShutdown,\n}))\ndefer store.Close()\n\n// Shorthand (wraps DeriveMaster + UnlockDatabase):\nif err := store.Unlock([]byte(os.Getenv(\"KEEPER_PASSPHRASE\"))); err != nil {\n    log.Fatal(err) // ErrInvalidPassphrase on wrong passphrase\n}\n```\n\n`UnlockDatabase` performs the following in order:\n\n1. Derives and activates the audit HMAC signing key\n2. Derives and activates the policy HMAC key\n3. Derives and activates `policyEncKey` and `auditEncKey`\n4. Clears and reloads `schemeRegistry` (decrypts all policy blobs)\n5. Resumes any interrupted rotation WAL\n6. Upgrades policy HMAC tags\n7. Seeds all `LevelPasswordOnly` bucket DEKs into the Envelope\n8. Starts background tasks (migration looper, auto-lock, health patients)\n\n### LevelPasswordOnly bucket — full lifecycle\n\n```go\nerr := store.CreateBucket(\"vault\", \"system\", keeper.LevelPasswordOnly, \"init\")\n\nstore.Set(\"vault://system/jwt_secret\", []byte(\"supersecret\"))\nval, err := store.Get(\"vault://system/jwt_secret\")\n\n// Namespaced convenience wrappers\nstore.SetNamespaced(\"admin\", \"jwt_secret\", secretBytes)\nval, err = store.GetNamespaced(\"admin\", \"jwt_secret\")\n```\n\n### LevelAdminWrapped bucket — full lifecycle\n\n```go\nerr := store.CreateBucket(\"finance\", \"payroll\", keeper.LevelAdminWrapped, \"ops-team\")\nerr = store.AddAdminToPolicy(\"finance\", \"payroll\", \"alice\", []byte(\"alicepass\"))\n\nstore.SetNamespacedFull(\"finance\", \"payroll\", \"salary_key\", []byte(\"AES256...\"))\n\nstore.LockBucket(\"finance\", \"payroll\")\nerr = store.UnlockBucket(\"finance\", \"payroll\", \"bob\", []byte(\"bobpass\"))\n// ErrAuthFailed — does not distinguish wrong password from unknown admin (CWE-204)\n\nerr = store.RevokeAdmin(\"finance\", \"payroll\", \"alice\")\nerr = store.RotateAdminWrappedDEK(\"finance\", \"payroll\", \"bob\", []byte(\"bobpass\"))\n\nneeds, err := store.NeedsAdminRekey(\"finance\", \"payroll\")\n```\n\n### LevelHSM / LevelRemote buckets\n\n```go\nimport (\n    \"github.com/agberohq/keeper/pkg/hsm\"\n    \"github.com/agberohq/keeper/pkg/remote\"\n)\n\n// SoftHSM — testing only\nprovider, _ := hsm.NewSoftHSM()\nstore.RegisterHSMProvider(\"secure\", \"keys\", provider)\nstore.CreateBucket(\"secure\", \"keys\", keeper.LevelHSM, \"ops\")\n\n// Vault Transit\ncfg := remote.VaultTransit(\"https://vault.corp:8200\", vaultToken, \"my-key\")\ncfg.TLSClientCert = \"/etc/keeper/client.crt\"\ncfg.TLSClientKey  = \"/etc/keeper/client.key\"\nprovider, _ = remote.New(cfg)\nstore.RegisterHSMProvider(\"tenant\", \"secrets\", provider)\nstore.CreateBucket(\"tenant\", \"secrets\", keeper.LevelRemote, \"ops\")\n```\n\n### Audit key export\n\n```go\n// Export the audit encryption key to allow a third-party auditor to decrypt\n// event details without access to the master passphrase.\nauditKey, err := store.ExportAuditKey()\ndefer zero.Bytes(auditKey)\n\nevents, err := auditStore.LoadChain(\"vault\", \"system\", auditKey)\n```\n\n### Key rotation\n\n```go\n// Rotate passphrase — crash-safe WAL, resumes on next Unlock if interrupted\nstore.Rotate([]byte(\"new-passphrase\"))\n\n// Rotate KDF salt — re-derives master key, re-encrypts LevelPasswordOnly\nstore.RotateSalt([]byte(\"current-passphrase\"))\n```\n\n### Compare-and-swap\n\n```go\nerr := store.CompareAndSwapNamespacedFull(\"vault\", \"system\", \"counter\",\n    []byte(\"old\"), []byte(\"new\"))\n// ErrCASConflict if current value does not match old\n```\n\n### Backup\n\n```go\nf, _ := os.Create(\"keeper.db.bak\")\ninfo, err := store.Backup(f)\n// info.Bytes, info.Timestamp, info.DBPath\n```\n\n---\n\n## Error catalogue\n\nAll sentinel errors work with `errors.Is` and `errors.As`. Stack traces are\ncaptured at the point of creation via `github.com/olekukonko/errors`.\n\n| Error | Meaning |\n|---|---|\n| `ErrStoreLocked` | Operation attempted while the store is locked |\n| `ErrInvalidPassphrase` | Wrong master passphrase |\n| `ErrAuthFailed` | Any `UnlockBucket` failure — does not distinguish wrong password from unknown admin ID (CWE-204) |\n| `ErrKeyNotFound` | Secret key does not exist |\n| `ErrBucketLocked` | Bucket has not been unlocked |\n| `ErrPolicyImmutable` | Second policy for an existing bucket |\n| `ErrPolicyNotFound` | No policy for the given scheme/namespace |\n| `ErrAdminNotFound` | Admin ID not in policy — `RevokeAdmin` only |\n| `ErrHSMProviderNil` | HSM/Remote bucket created without a registered provider |\n| `ErrCheckLatency` | DB read latency exceeded `DBLatencyThreshold` |\n| `ErrCASConflict` | Current value does not match expected in `CompareAndSwap` |\n| `ErrSecurityDowngrade` | Cross-bucket move from higher to lower security level |\n| `ErrAlreadyUnlocked` | `UnlockDatabase` called on an already-unlocked store |\n| `ErrMasterRequired` | `UnlockDatabase` called with nil or destroyed `Master` |\n| `ErrChainBroken` | Audit chain integrity verification failed |\n| `ErrMetadataDecrypt` | Encrypted metadata could not be decrypted |\n| `ErrPolicySignature` | Policy HMAC verification failed — record was tampered |\n\n---\n\n## Security decisions\n\n**ErrAuthFailed unifies all UnlockBucket failures (CWE-204 / CVSS 5.3).** Both\nan unknown admin ID and a wrong password return `ErrAuthFailed`. This prevents\nadmin ID enumeration by timing or error-string comparison. `RevokeAdmin` retains\n`ErrAdminNotFound` because it is an administrative operation on an\nalready-unlocked store. The constant-time comparison for admin ID presence is\nintentionally omitted. An attacker who can measure sub-microsecond differences\nin bbolt bucket lookups would need local filesystem access—at which point they\ncan read the policy bucket directly. The threat model assumes the database file\nmay be compromised; timing defense against remote enumeration is the primary\nconcern.\n\n**Argon2id dominates timing.** Argon2id takes 200–500 ms on typical hardware.\nPost-derivation comparison differences are four or more orders of magnitude\nsmaller and are not measurable remotely. No artificial equalisation is applied.\n\n**DEK retrieved inside the CAS transaction boundary.** `CompareAndSwapNamespacedFull`\nretrieves the bucket DEK inside the bbolt write transaction, eliminating the\nwindow where a concurrent `Rotate` could change the DEK between retrieval and\nuse.\n\n**Passphrase never stored as a Go string in the HTTP handler.** All three\npassphrase fields (`passphrase`, `new_passphrase`) are decoded from JSON\ndirectly into `[]byte` via raw-map extraction, keeping the string backing array\noff the long-lived heap. The `[]byte` copy is zeroed with `wipeBytes` after use.\n\n**No `--passphrase` flag in the CLI.** Flags appear in `ps` output and shell\nhistory. The CLI accepts the passphrase only from `KEEPER_PASSPHRASE` env or\nan interactive no-echo prompt.\n\n**REPL secret values are never visible.** `set <key>` in the REPL without an\ninline value uses `term.ReadPassword` — it does not appear in terminal\nscrollback, shell history, or `ps`. An inline value (`set key value`) can be\nsupplied for non-sensitive data when convenient.\n\n**SaltStore is intentionally unencrypted.** The KDF salt must be readable\nbefore `UnlockDatabase` to derive the master key. `policyEncKey` (used for all\nother metadata encryption) is itself derived from the master key — encrypting\nthe salt with `policyEncKey` would be circular. A KDF salt provides uniqueness,\nnot confidentiality; there is no security value in encrypting it.\n\n**Policy bucket keys are hashed, not plaintext.** On-disk policy keys are\n`hex(SHA-256(\"scheme:namespace\"))[:32]` — 128 bits of key space — rather than\nreadable strings. An offline attacker reading the bbolt file cannot enumerate\nbucket names without decrypting the policy blobs.\n\n**Metadata encryption uses the same cipher interface as secrets.** All\n`policyEncKey` and `auditEncKey` operations go through `s.config.NewCipher(key)`\n— the same `crypt.Cipher` interface configured for secret values. The user's\ncipher choice (AES-256-GCM for FIPS 140, XChaCha20-Poly1305 by default) flows\nthrough to policy, WAL, and audit encryption automatically. No code path\nhard-codes a specific algorithm.\n\n**LevelHSM and LevelRemote buckets skipped during master key rotation.**\n`reencryptAllWithKey` and `RotateSalt` explicitly skip these buckets. The DEK\nis provider-controlled; master salt rotation does not affect it.\n\n**Crash-safe rotation with WrappedOldKey.** `Rotate` writes a WAL before\ntouching any record. The WAL carries `WrappedOldKey`: the pre-rotation master\nkey encrypted with the new master key. After a crash, `UnlockDatabase` decrypts\n`WrappedOldKey` using the verified new key and resumes rotation from the cursor.\n\n---\n\n## Dependencies\n\n| Package | Purpose |\n|---|---|\n| `go.etcd.io/bbolt` | Embedded key-value store |\n| `golang.org/x/crypto` | Argon2id, XChaCha20-Poly1305, HKDF, scrypt |\n| `github.com/awnumar/memguard` | Memory-safe key enclave (master key, DEKs) |\n| `github.com/vmihailenco/msgpack/v5` | Binary serialisation for secrets and policies |\n| `github.com/olekukonko/jack` | Process supervision (optional Jack integration) |\n| `github.com/olekukonko/ll` | Structured logging |\n| `github.com/olekukonko/errors` | Sentinel errors with stack traces |\n| `github.com/olekukonko/zero` | Safe byte-slice zeroing |\n| `github.com/olekukonko/prompter` | No-echo terminal prompts (CLI only) |\n| `github.com/integrii/flaggy` | CLI flag parsing (cmd/keeper only) |\n| `golang.org/x/term` | TTY detection and raw password reading (CLI only) |\n","summary":"Keeper is a cryptographic secret store for Go that securely encrypts arbitrary byte payloads at rest using Argon2id key derivation and XChaCha20-Poly1305, storing data in an embedded bbolt database. It provides a hardened, bucket-based security model with four isolation/encryption levels, including options that rely on caller-wrapped keys via an HSM provider or remote KMS, and it includes a tamper-evident audit chain. The project ships as a Go library for embedding into your application, an HTTP handler package for mounting secure endpoints on any net/http mux, and a CLI with a persistent REPL for safe secret entry without shell history exposure. This is well-suited for Go teams that need lightweight, local-first secret management with strong crypto primitives and auditable access for services and load balancers like Agbero, without tying themselves to any single runtime.","description":"Simple Secure Keeper for Secrets ","stars":119,"language":"Go"},{"owner":"lsferreira42","repo":"nfsdiag","url":"https://github.com/lsferreira42/nfsdiag","readme":"# nfsdiag\n\n**Website:** [www.nfsdiag.org](https://www.nfsdiag.org) · **Releases:** [github.com/lsferreira42/nfsdiag/releases/latest](https://github.com/lsferreira42/nfsdiag/releases/latest)\n\n[![CI](https://github.com/lsferreira42/nfsdiag/actions/workflows/ci.yml/badge.svg)](https://github.com/lsferreira42/nfsdiag/actions/workflows/ci.yml)\n[![Deploy website to Cloudflare](https://github.com/lsferreira42/nfsdiag/actions/workflows/deploy-website.yml/badge.svg)](https://github.com/lsferreira42/nfsdiag/actions/workflows/deploy-website.yml)\n\n`nfsdiag` is a small command line tool written in C to help debug NFS servers from the client side.\n\nThe idea is simple: you give one IP or hostname, and the tool checks the things that usually break in NFS: network, rpcbind, NFS versions, mountd, exports, permissions, root squash, locking, stale handles and some basic performance.\n\nIt is not magic, and it will not replace a good server side analysis. But it helps a lot to understand if the problem is network, NFS config, permissions, UID/GID mapping, or something more strange.\n\n---\n\n## What this tool does\n\nToday `nfsdiag` can do these checks:\n\n- test if `rpcbind` TCP port `111` is reachable\n- test if NFS TCP port `2049` is reachable\n- query the RPC service map from rpcbind (supports IPv6 fallback)\n- detect registered NFS, mountd, lockd/NLM and statd/NSM services\n- test NFS v2, v3 and v4 with RPC `NULLPROC` (including v4.1 and v4.2 hints)\n- test mountd v1, v2 and v3\n- optionally test RPC over UDP with `--udp`\n- enumerate exports using mountd\n- check client prerequisite daemons (nfs-client.target, rpc.gssd, nfs-idmapd)\n- detect Kerberos tickets and configuration with `--krb5`\n- mount exports automatically under `/tmp/nfsdoctor-*`\n- try NFS v4.2 first, then fallback to v4.1, v4, and v3\n- parse and verify effective mount options from `/proc/self/mountinfo`\n- capture RPC stats (retransmissions, auth refreshes) before and after tests\n- extract deep latency metrics from `/proc/self/mountstats`\n- run filesystem checks after mount (close-to-open consistency, special files, quotas)\n- test read/traverse permission\n- test directory listing\n- test POSIX ACLs, NFSv4 ACLs, generic xattrs, and SELinux contexts\n- test create/write/read/fsync when allowed (with configurable timeouts)\n- test advanced I/O operations: `copy_file_range`, `fallocate`, and `O_DIRECT`\n- test advisory locks with `fcntl`\n- detect practical `root_squash` behavior\n- simulate UID/GID access with `prctl` termination safety\n- simulate supplemental groups with `--groups`\n- run metadata latency test with create/rename/unlink\n- run stale file handle loop looking for `ESTALE`\n- check for pNFS layouts via `/proc/self/mountstats`\n- run external `fio` benchmarks alongside internal smoke tests\n- safely handle temporary files, mounts and folders using `O_NOFOLLOW`\n- perform safe audits with `--dry-run` and rate limiting (`--delay-ms`)\n- generate hierarchical JSON reports for automation (NFS minor version tracked)\n- generate standalone HTML reports with inline CSS (`--html`)\n- output colored text and progress bars on interactive terminals\n- run Docker fixture tests for regression checks (all 14 fixtures included)\n\nBy default the output is compact. If you want all details, use `--verbose`.\n\n---\n\n## Important note\n\nNFS problems are very environment dependent. The result can change because of:\n\n- firewall rules\n- server export options\n- NFS version\n- kernel client state\n- UID/GID mapping\n- root squash\n- ACLs\n- SELinux/AppArmor on server\n- server load\n- stale file handles that only happen during real use\n\nSo, if the tool says no `ESTALE` happened, it means only that the tool did not reproduce it during the test window. It does not mean the problem can never happen.\n\n---\n\n## Build requirements\n\nOn Debian or Ubuntu:\n\n```sh\nsudo apt-get update\nsudo apt-get install -y build-essential pkg-config libtirpc-dev\n```\n\nOn Fedora/RHEL style distros:\n\n```sh\nsudo dnf install -y gcc make pkgconf-pkg-config libtirpc-devel\n```\n\nFor live mount tests you also need NFS client tools.\n\nDebian or Ubuntu:\n\n```sh\nsudo apt-get install -y nfs-common\n```\n\nFedora/RHEL style distros:\n\n```sh\nsudo dnf install -y nfs-utils\n```\n\n---\n\n## Build\n\nNormal build:\n\n```sh\nmake\n```\n\nClean and rebuild:\n\n```sh\nmake rebuild\n```\n\nSmall self-check:\n\n```sh\nmake check\n```\n\nInstall:\n\n```sh\nsudo make install\n```\n\nInstall in another prefix:\n\n```sh\nmake PREFIX=/opt/nfsdiag install\n```\n\nUninstall:\n\n```sh\nsudo make uninstall\n```\n\nManual compile, if you want:\n\n```sh\ngcc -O2 -Wall -Wextra -D_GNU_SOURCE -I/usr/include/tirpc \\\n    src/main.c src/mount.c src/network.c src/report.c \\\n    src/rpc.c src/stats.c src/tests.c \\\n    -ltirpc -o nfsdiag\n```\n\n---\n\n## Packaging\n\nPackages are placed in `build/` after each build target.\n\nBuild a Debian/Ubuntu `.deb`:\n\n```sh\nmake deb\n```\n\nBuild a Fedora/RHEL `.rpm` (requires `rpm-build`):\n\n```sh\nmake rpm\n```\n\nBuild an Alpine `.apk` (requires Docker):\n\n```sh\nmake apk\n```\n\nBuild all formats at once:\n\n```sh\nmake packages\n```\n\n---\n\n## GitHub release\n\n`make release` builds all packages, creates an annotated git tag, pushes it,\nand uploads the resulting `.deb`, `.rpm`, and `.apk` to a GitHub release using\nthe `gh` CLI. The working directory must be clean before running.\n\n```sh\nmake release\n```\n\nAutomated releases also run via GitHub Actions whenever a `v*` tag is pushed.\nThe workflow builds DEB on Ubuntu, RPM in a Fedora container, and APK via\nDocker, then creates the release with all three packages attached. See\n`.github/workflows/release.yml`.\n\n---\n\n## Version bumping\n\nThe version lives in `VERSION` and is mirrored in `src/nfsdiag.h` and all\npackaging files. Use these targets to bump it atomically:\n\n```sh\nmake bump-version-bugfix   # 0.4.1 → 0.4.2\nmake bump-version-minor    # 0.4.1 → 0.5.0\nmake bump-version-major    # 0.4.1 → 1.0.0\n```\n\nEach target rewrites `VERSION`, `src/nfsdiag.h` (`NFSDIAG_VERSION`),\n`packaging/nfsdiag.control`, `packaging/nfsdiag.spec`, and\n`packaging/Dockerfile.apk` in one shot.\n\n---\n\n## Basic usage\n\nFull diagnostic:\n\n```sh\nsudo ./nfsdiag 192.168.1.10\n```\n\nVerbose mode:\n\n```sh\nsudo ./nfsdiag --verbose 192.168.1.10\n```\n\nOnly network and RPC checks, without mounting anything:\n\n```sh\n./nfsdiag --no-mount 192.168.1.10\n```\n\nTest only one export:\n\n```sh\nsudo ./nfsdiag --export /data 192.168.1.10\n```\n\nPass mount options:\n\n```sh\nsudo ./nfsdiag --mount-options soft,timeo=30,retrans=2 192.168.1.10\n```\n\nDo not create/write test files:\n\n```sh\nsudo ./nfsdiag --read-only 192.168.1.10\n```\n\nKeep the temp folder for manual inspection:\n\n```sh\nsudo ./nfsdiag --keep-temp 192.168.1.10\n```\n\n---\n\n## Output style\n\nDefault output is clean and short. For example, in a healthy server it can be something like:\n\n```text\nnfsdiag 0.4.1: 192.168.0.21\n[OK] 1 export(s) discovered\nsummary: ok=13 warn=0 fail=0\n```\n\nIf you want to see all probe steps, use:\n\n```sh\n./nfsdiag --verbose 192.168.0.21\n```\n\nWarnings and failures always appear in normal mode. Informational and low-level OK messages only appear in verbose mode.\n\n---\n\n## JSON output\n\nFor automation, use JSON.\n\nJSON to stdout (diagnostic text is suppressed):\n\n```sh\n./nfsdiag --json 192.168.1.10\n# or equivalently:\n./nfsdiag --json=- 192.168.1.10\n```\n\nJSON to file (diagnostic text still appears on stdout normally):\n\n```sh\n./nfsdiag --json=report.json 192.168.1.10\n```\n\nTo suppress stdout when writing JSON to a file, combine with `--quiet`:\n\n```sh\n./nfsdiag --quiet --json=report.json 192.168.1.10\n```\n\nThe JSON includes:\n\n- tool name and version\n- host\n- timestamp\n- system information (kernel, hostname, arch)\n- summary (ok, warn, fail)\n- options used\n- exports (hierarchical list of mount tests with performance metrics, ACLs, NFS major and minor version)\n- global events\n- recommendations\n\n---\n\n## HTML output\n\nFor human-readable reports that can be easily shared or attached to tickets, use HTML:\n\n```sh\n./nfsdiag --html=report.html 192.168.1.10\n```\n\nHTML to stdout (diagnostic text is suppressed):\n\n```sh\n./nfsdiag --html=- 192.168.1.10\n```\n\nThe generated HTML is standalone with inline CSS. Reports are written with mode `0600` and without following symlinks (`O_NOFOLLOW`).\n\n---\n\n## UID/GID and permission tests\n\nSimulate one UID/GID:\n\n```sh\nsudo ./nfsdiag --uid 1000 --gid 1000 192.168.1.10\n```\n\nSimulate more than one identity:\n\n```sh\nsudo ./nfsdiag --uid 1000 --gid 1000 --uid 65534 --gid 65534 192.168.1.10\n```\n\nSimulate supplemental groups:\n\n```sh\nsudo ./nfsdiag --uid 1000 --gid 1000 --groups 10,20,30 192.168.1.10\n```\n\nThis is useful because many NFS problems are not really NFS protocol problems. Many times it is UID, GID, groups, ACL, or root squash.\n\n---\n\n## Performance and stale handle tests\n\nChange write/read test size:\n\n```sh\nsudo ./nfsdiag --bench-bytes 167772160 192.168.1.10\n```\n\nChange metadata latency iterations:\n\n```sh\nsudo ./nfsdiag --bench-iterations 500 192.168.1.10\n```\n\nChange stale handle loop:\n\n```sh\nsudo ./nfsdiag --stale-iterations 1000 192.168.1.10\n```\n\nRun benchmarks using `fio` instead of the internal C loop (requires `fio` installed):\n\n```sh\nsudo ./nfsdiag --bench-type=fio 192.168.1.10\n```\n\nThe performance test is only a smoke test. It is not a replacement for full benchmarking, though enabling `fio` provides more accurate storage baseline metrics.\n\n---\n\n## Safety options\n\nTimeout for external commands like `mount` and `umount`:\n\n```sh\nsudo ./nfsdiag --command-timeout 15 192.168.1.10\n```\n\nDelay between testing each export (rate limiting):\n\n```sh\nsudo ./nfsdiag --delay-ms 500 192.168.1.10\n```\n\nSimulate the tool execution without actually mounting or modifying anything:\n\n```sh\n./nfsdiag --dry-run 192.168.1.10\n```\n\nTry to isolate live mounts in a private mount namespace:\n\n```sh\nsudo ./nfsdiag --mount-namespace 192.168.1.10\n```\n\nThis needs root or `CAP_SYS_ADMIN`.\n\n---\n\n## Network/protocol options\n\nProbe UDP RPC too:\n\n```sh\n./nfsdiag --no-mount --udp 192.168.1.10\n```\n\nForce IPv4 direct TCP checks:\n\n```sh\n./nfsdiag --ipv4-only --no-mount 192.168.1.10\n```\n\nForce IPv6 direct TCP checks:\n\n```sh\n./nfsdiag --ipv6-only --no-mount nfs-server.example.com\n```\n\nDisable NFSv4 pseudo-root fallback:\n\n```sh\nsudo ./nfsdiag --no-nfs4-discovery 192.168.1.10\n```\n\nThe NFSv4 fallback is useful when the server is NFSv4-only and mountd is not available.\n\n---\n\n## Command line reference\n\n```text\nUsage: nfsdiag [OPTIONS] <server-ip-or-hostname>\n\nDiagnostic options:\n  -e, --export PATH          Test only this export path\n  -o, --mount-options OPTS   Extra mount options passed to mount(8)\n      --no-mount             Run network/RPC checks only; skip all mounts\n      --dry-run              Print what would be done; skip mounts and fs tests\n      --read-only            Do not create or write test files\n      --uid UID              Simulate access as UID (repeatable, needs root)\n      --gid GID              GID paired with last --uid\n      --groups G1,G2         Supplemental GIDs for UID/GID simulation\n      --krb5                 Check Kerberos prerequisites (ticket, gssd)\n      --udp                  Also probe RPC NULLPROC over UDP\n      --ipv4-only            Force IPv4 for direct TCP checks\n      --ipv6-only            Force IPv6 for direct TCP checks\n      --no-nfs4-discovery    Disable NFSv4 pseudo-root fallback\n      --mount-namespace      Use private mount namespace (needs root/CAP_SYS_ADMIN)\n\nTimeout options:\n      --timeout SEC          Network/RPC connect timeout. Default: 5\n      --command-timeout SEC  Timeout for mount/umount commands. Default: 30\n      --fs-timeout SEC       Timeout for each filesystem test group. Default: 30\n      --delay-ms MS          Delay between testing each export (rate limit). Default: 0\n\nBenchmark options:\n      --bench-bytes BYTES    Bytes for read/write benchmark. Default: 4194304\n      --bench-iterations N   Metadata latency iterations. Default: 10\n      --bench-type TYPE      Benchmark engine: 'internal' or 'fio'. Default: internal\n      --stale-iterations N   ESTALE probe loop iterations. Default: 100\n\nOutput options:\n      --json[=PATH]          Emit JSON report to PATH (use '-' or omit for stdout)\n      --html[=PATH]          Emit HTML report to PATH (use '-' or omit for stdout)\n      --keep-temp            Keep temp workspace after tests\n  -v, --verbose              Show all diagnostic steps\n  -q, --quiet                Suppress stdout (combine with --json=FILE or --html=FILE)\n  -V, --version              Print version and exit\n  -h, --help                 Show this help\n\nExit codes: 0=pass  1=warn/fail  2=usage/runtime error\n\nStdout suppression: active only when --json=- or --html=- (report to stdout).\n  Use --quiet to suppress stdout when writing a report to a file.\n```\n\n---\n\n## Exit codes\n\n- `0`: no warnings or failures\n- `1`: warning or failure found\n- `2`: usage error or local runtime error\n\nWarnings return `1` because in automation they usually need attention.\n\n---\n\n## Docker fixtures\n\nThe project has Docker fixtures to reproduce bad NFS situations.\n\nList fixtures:\n\n```sh\nmake docker-list\n```\n\nBuild all fixtures:\n\n```sh\nmake docker-build-all\n```\n\nBuild one fixture:\n\n```sh\nmake docker-build-read-only-export\n```\n\nRun automated fixture tests:\n\n```sh\nmake test-fixtures\n```\n\nRun only one test:\n\n```sh\nmake test-fixture-rpcbind-unreachable\n```\n\nSome tests need root because they do real NFS mounts from the host. If the host cannot run kernel NFS inside Docker, the test runner skips those cases instead of failing everything.\n\n> **Warning:** Docker fixture configurations use wildcard clients, `insecure`, and `no_root_squash`\n> intentionally to simulate test scenarios. These settings are **test-only** and must **never** be\n> used in production. Each `exports.*` file in `dockerfiles/common/` carries this warning.\n\nThe current fixture set includes:\n\n- `rpcbind-unreachable`\n- `nfs-port-unreachable`\n- `rpc-map-missing-nfs`\n- `mountd-unavailable`\n- `empty-exports`\n- `mount-denied`\n- `permission-denied`\n- `acl-unsupported`\n- `identity-denied`\n- `read-only-export`\n- `root-squash`\n- `locking-missing`\n- `stale-handle`\n- `slow-performance`\n\n---\n\n## Security notes\n\nBe careful when running against production exports.\n\nBy default the tool may create hidden `.nfsdoctor-*` files to test write/read behavior. If you do not want this, use:\n\n```sh\n--read-only\n```\n\nAlso, UID/GID simulation requires root because the tool uses `setgid`, `setgroups`, and `setuid` in child processes.\n\n---\n\n## Limitations\n\nSome things are impossible to guarantee from the client side:\n\n- `ESTALE` only appears if the handle becomes stale during the test\n- SELinux/AppArmor problems can look only like generic permission denied\n- ACL info depends on what the NFS client exposes\n- performance numbers are only smoke-test values\n- Docker NFS fixtures depend on host kernel and Docker privileges\n\nSo use this tool as a fast diagnostic helper, not as the only source of truth.\n","summary":"nfsdiag is a small C-based command-line utility for debugging NFS servers from the client side. Given a target IP or hostname, it checks common failure points across the NFS stack—network reachability, rpcbind and required RPC services, NFS/mountd and version negotiation, exports, locking, root squash behavior, UID/GID mapping, and permission/ACL/Selinux-related access issues. It can also mount exports temporarily and run a series of smoke tests and latency/IO checks, producing JSON or standalone HTML reports for easier automation and sharing. It’s especially useful for system administrators, support engineers, and DevOps teams who need fast, repeatable troubleshooting when NFS connectivity, configuration, or access problems are suspected.","description":"A nfs diagnostic application","stars":143,"language":"C"},{"owner":"vostride","repo":"id-agent","url":"https://github.com/vostride/id-agent","readme":"<div align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/vostride/id-agent/main/docs/id-agent.png\" alt=\"id-agent - Token efficient IDs for AI agents\" />\n\n  [![Featured on Hacker News](https://img.shields.io/badge/Hacker%20News-featured-ff6600?style=flat&logo=ycombinator&logoColor=white&colorA=13110f)](https://news.ycombinator.com/item?id=48191852)\n  [![npm](https://img.shields.io/npm/dm/id-agent?style=flat&colorA=13110f&colorB=196872)](https://npm.chart.dev/id-agent?primary=neutral&gray=neutral&theme=dark)\n  [![npm version](https://img.shields.io/npm/v/id-agent.svg?style=flat&colorA=13110f&colorB=196872)](https://www.npmjs.com/package/id-agent)\n  [![GitHub stars](https://img.shields.io/github/stars/vostride/id-agent?style=flat&colorA=13110f&colorB=196872)](https://github.com/vostride/id-agent/stargazers)\n\n  <p>\n    <a href=\"#api-reference\">Docs</a>\n    ·\n    <a href=\"#quick-start\">Quick Start</a>\n    ·\n    <a href=\"https://www.npmjs.com/package/id-agent\">npm</a>\n    ·\n    <a href=\"https://vostride.com\">Vostride AI</a>\n  </p>\n</div>\n\n# id-agent\n> Token efficient IDs for AI agents \n\nWhere UUIDs cost ~23 tokens and get hallucinated by LLMs, id-agent produces memorable word-based IDs at ~14 tokens with equivalent collision resistance. The first ID library built for the context window, not the database.\n\n- **Human-readable** -- word-based IDs that humans and LLMs can actually remember\n- **Token-efficient** -- every word in the wordlist is exactly 1 BPE token on o200k_base\n- **Collision-safe** -- configurable entropy from ~12 to ~192 bits\n- **Validated inputs** -- zod-powered schema validation on all public APIs\n\n## Token Cost Comparison\n\n| Format | Example | Tokens (o200k_base) | Collision Resistance |\n|--------|---------|---------------------|----------------------|\n| UUID v4 | `89b842d9-6df9-4cf4-8db0-9dc3aed3cfd7` | ~23 | 122 bits |\n| id-agent (default, 8 words) | `urd-antes-sorry-pac-dire-total-expire-going` | ~14 | ~96 bits |\n| id-agent (5 words) | `frame-beer-bell-tog-hoot` | ~8 | ~60 bits |\n\n<table align=\"center\">\n  <tr>\n    <td align=\"center\"><img src=\"docs/id-agent-tokenizer.png\" alt=\"id-agent: 12 tokens for 8 words\" width=\"100%\" /><br/><strong>id-agent</strong> — 8 words, 43 chars, <strong>12 tokens</strong></td>\n    <td align=\"center\"><img src=\"docs/uuid-tokenizer.png\" alt=\"UUID v4: 26 tokens\" width=\"100%\" /><br/><strong>UUID v4</strong> — 36 chars, <strong>26 tokens</strong></td>\n  </tr>\n</table>\n\n## Install\n\n```bash\nnpm install id-agent\n```\n\n```bash\npnpm add id-agent\n```\n\n## Quick Start\n\n```typescript\nimport { idAgent } from 'id-agent'\n\n// Generate a random ID (8 words, ~96 bits entropy)\nconst id = idAgent()\n// => \"urd-antes-sorry-pac-dire-total-expire-going\"\n\n// With a type prefix\nconst taskId = idAgent({ prefix: 'task' })\n// => \"task_slide-exact-cede-bury-linge-ease-bean-impact\"\n\n// Fewer words for short-lived IDs\nconst short = idAgent({ words: 3 })\n// => \"front-reject-tho\"\n```\n\n## API Reference\n\n### `idAgent(opts?)`\n\nGenerate a random, human-readable ID.\n\n```typescript\nimport { idAgent } from 'id-agent'\n\nidAgent()                          // 8 words, ~96 bits\nidAgent({ words: 5 })             // 5 words, ~60 bits\nidAgent({ prefix: 'user' })       // \"user_cloud-train-scope-frame-match-level-paint-field\"\n```\n\n**Options:**\n\n| Option | Type | Default | Description |\n|--------|------|---------|-------------|\n| `prefix` | `string` | `undefined` | Type prefix (lowercase alphanumeric only) |\n| `words` | `number` | `8` | Number of words (1-16). Controls entropy: words * 12 bits |\n\nInvalid options throw a `ZodError` with a descriptive message.\n\n### `idAgent.from(input, opts?)`\n\nGenerate a deterministic ID from a string input using HMAC-SHA256. Same input always produces the same ID.\n\n```typescript\nconst id = await idAgent.from('user@example.com')\n// Always returns the same ID for the same input\n\nconst namespaced = await idAgent.from('user@example.com', {\n  namespace: 'my-app',\n  prefix: 'user',\n  words: 5,\n})\n```\n\n**Options:**\n\n| Option | Type | Default | Description |\n|--------|------|---------|-------------|\n| `prefix` | `string` | `undefined` | Type prefix (lowercase alphanumeric only) |\n| `words` | `number` | `8` | Number of words (1-16) |\n| `namespace` | `string` | `'id-agent'` | HMAC key for domain separation |\n\n### `parse(id)`\n\nParse any id-agent ID into its components. Supports both hyphen-separated and underscore-separated words. Returns `null` for unrecognized formats.\n\n```typescript\nimport { parse } from 'id-agent'\n\nparse('task_storm-delta-stone')\n// => { prefix: 'task', words: ['storm', 'delta', 'stone'], wordCount: 3, bits: 36, raw: 'task_storm-delta-stone', format: 'readable' }\n\nparse('task_storm_delta_stone')\n// => { prefix: 'task', words: ['storm', 'delta', 'stone'], wordCount: 3, bits: 36, raw: 'task_storm_delta_stone', format: 'readable' }\n```\n\n### `validate(id)`\n\nCheck if a string is a valid id-agent ID. Validates that all words exist in the WORDLIST.\n\n```typescript\nimport { validate } from 'id-agent'\n\nvalidate('storm-delta-stone')\n// => { valid: true, prefix: undefined, wordCount: 3 }\n\nvalidate('task_jump-notaword')\n// => { valid: false, reason: 'unknown words: notaword' }\n\nvalidate('INVALID')\n// => { valid: false, reason: 'contains uppercase characters' }\n```\n\n### `createAliasMap(opts)`\n\nCreate a bidirectional alias map for token reduction in LLM contexts. Maps long IDs to short word-based aliases with full replace/restore support.\n\n```typescript\nimport { createAliasMap } from 'id-agent'\n\nconst aliases = createAliasMap({ words: 3 })\naliases.set('8cdda07b-85d2-459c-8a2a-83c8f9245dbe')\n// => \"storm-delta-stone\" (3 random words from WORDLIST)\n\naliases.get('storm-delta-stone')\n// => \"8cdda07b-85d2-459c-8a2a-83c8f9245dbe\"\n\n// Replace all UUIDs in text before sending to LLM\nconst text = 'Process 8cdda07b-85d2-459c-8a2a-83c8f9245dbe then 6ba7b810-9dad-11d1-80b4-00c04fd430c8'\nconst shortened = aliases.replace(text, {\n  pattern: /[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/gi\n})\n// => \"Process storm-delta-stone then cloud-train-scope\"\n\n// Restore originals in LLM output\nconst restored = aliases.restore(shortened)\n// => original text\n```\n\n**Options:**\n\n| Option | Type | Required | Description |\n|--------|------|----------|-------------|\n| `words` | `number` | Yes | Number of words per alias (1-16) |\n\n**`entries()`** returns `[original, alias]` pairs (not `[alias, original]`). Use `get(alias)` to look up the original from an alias.\n\n### `detectDuplicates(opts)`\n\nScan text for duplicate IDs using a regex pattern. Pure function -- no filesystem access.\n\n```typescript\nimport { detectDuplicates } from 'id-agent'\n\nconst dupes = detectDuplicates({\n  pattern: /[a-z]+(?:-[a-z]+)+/,\n  text: 'Found storm-delta-stone in file A and storm-delta-stone in file B',\n})\n// => [{ id: 'storm-delta-stone', count: 2 }]\n\n// Also accepts an array of strings\nconst dupes2 = detectDuplicates({\n  pattern: /task_[a-z]+(?:-[a-z]+)+/,\n  text: ['const x = \"task_red-fox-run\"', 'const y = \"task_red-fox-run\"'],\n})\n```\n\n**Options:**\n\n| Option | Type | Description |\n|--------|------|-------------|\n| `pattern` | `RegExp` | Regex to match IDs in text |\n| `text` | `string \\| string[]` | Text to scan for duplicates |\n\n### `WORDLIST`\n\nDirect access to the curated 4096-word list. Every word is exactly 1 BPE token on o200k_base. The array is frozen (immutable).\n\n```typescript\nimport { WORDLIST } from 'id-agent'\n\nWORDLIST.length          // => 4096\nObject.isFrozen(WORDLIST) // => true\n```\n\n## The Math\n\n### Entropy\n\nEach word is drawn uniformly from a curated **4096-word list** (2^12). Every position in the ID is an independent random selection:\n\n```\nEntropy per word = log2(4096) = 12 bits\nTotal entropy    = words * 12 bits\nID space         = 4096^words = 2^(words * 12)\n```\n\nThis holds regardless of individual word length -- a 3-character word and a 6-character word both contribute exactly 12 bits because the attacker must guess from the same 4096-word pool.\n\n### Collision Probability (Birthday Paradox)\n\nThe probability of at least one collision among `n` randomly generated IDs:\n\n```\nP(collision) ≈ n^2 / (2 * 2^b)\n\nwhere b = total bits of entropy\n```\n\nThis is the birthday paradox approximation, valid when P is small (P < 0.01).\n\n| Words | Bits | ID Space | P @ 1K | P @ 10K | P @ 100K | P @ 1M | P @ 1B | 50% collision at |\n|-------|------|----------|--------|---------|----------|--------|--------|------------------|\n| 3 | 36 | 6.9 * 10^10 | 7.3 * 10^-6 | 7.3 * 10^-4 | 7.3 * 10^-2 | ~1 | ~1 | ~309K items |\n| 4 | 48 | 2.8 * 10^14 | 1.8 * 10^-9 | 1.8 * 10^-7 | 1.8 * 10^-5 | 1.8 * 10^-3 | ~1 | ~20M items |\n| 5 | 60 | 1.2 * 10^18 | 4.3 * 10^-13 | 4.3 * 10^-11 | 4.3 * 10^-9 | 4.3 * 10^-7 | 0.43 | ~1.3B items |\n| **8** | **96** | **7.9 * 10^28** | **6.3 * 10^-24** | **6.3 * 10^-22** | **6.3 * 10^-20** | **6.3 * 10^-18** | **6.3 * 10^-12** | **~331T items** |\n| 10 | 120 | 1.3 * 10^36 | 3.8 * 10^-31 | 3.8 * 10^-29 | 3.8 * 10^-27 | 3.8 * 10^-25 | 3.8 * 10^-19 | ~1.4 * 10^18 items |\n| *UUID v4* | *122* | *5.3 * 10^36* | *9.4 * 10^-32* | *9.4 * 10^-30* | *9.4 * 10^-28* | *9.4 * 10^-26* | *9.4 * 10^-20* | *~2.7 * 10^18 items* |\n\n**The default (8 words, 96 bits)** is safe for over 300 trillion items before reaching a 50% collision chance. For context, most applications will never generate more than a few million IDs.\n\n### Worked Example\n\nFor the default 8-word ID at 1 million items:\n\n```\nb = 8 * 12 = 96 bits\nn = 1,000,000\n\nP ≈ (10^6)^2 / (2 * 2^96)\n  = 10^12 / (2 * 7.92 * 10^28)\n  = 10^12 / (1.58 * 10^29)\n  = 6.3 * 10^-18\n```\n\nThat's roughly **1 in 158 quadrillion** -- effectively zero.\n\n### Token Cost (Measured)\n\nAll measurements on **o200k_base** (GPT-4o, GPT-4.1, o1, o3) using tiktoken. Token counts vary slightly per ID due to BPE merge behavior with hyphens -- values below are averages over 100 samples:\n\n| Format | Avg Tokens | Entropy | Tokens Saved vs UUID | Savings |\n|--------|-----------|---------|---------------------|---------|\n| UUID v4 | **~23** | 122 bits | -- | -- |\n| id-agent (3 words) | **~5** | 36 bits | ~18 | **78%** |\n| id-agent (5 words) | **~8** | 60 bits | ~15 | **65%** |\n| **id-agent (8 words, default)** | **~14** | **96 bits** | **~9** | **39%** |\n| id-agent (10 words) | **~17** | 120 bits | ~6 | **26%** |\n\n### Why Not Just Fewer Words?\n\nThe right word count depends on your scale. The default of 8 is deliberately conservative (global-safe). But if you're building something smaller:\n\n| Scale | Recommended | Entropy | Why |\n|-------|-------------|---------|-----|\n| Dev/testing | `words: 3` | 36 bits | Fast, memorable, ~5 tokens. Collides at ~300K items. |\n| Team tools | `words: 4` | 48 bits | Safe to ~20M items. Good for internal APIs. |\n| Production SaaS | `words: 5` | 60 bits | Safe to ~1B items. 65% token savings vs UUID. |\n| High-volume / distributed | `words: 8` (default) | 96 bits | Safe to ~300T items. The safe default. |\n| UUID-equivalent | `words: 10` | 120 bits | Matches UUID v4 collision math. |\n\n### Token Efficiency: Why Words Beat Hex\n\nBPE tokenizers (used by all major LLMs) were trained on natural language. Short English words are single tokens by design. UUIDs are hex strings that split unpredictably:\n\n```\n\"storm-delta-stone\"  =>  4 tokens (3 words + separators)\n\"dc193952-186a-4645\" =>  11 tokens (same 18 characters!)\n```\n\nid-agent's wordlist is curated so every word is exactly **1 BPE token** on o200k_base. The hyphens add ~1 token per 6 words due to BPE merge behavior. This is why word-based IDs are fundamentally more token-efficient than random hex/alphanumeric strings.\n\n## How It Works\n\nid-agent uses a curated wordlist of 4096 English words, each verified as a single BPE token on the o200k_base tokenizer (used by GPT-4o, GPT-4.1). Words are 3-6 characters, filtered for offensive terms and homophones.\n\nRandom IDs use `crypto.getRandomValues()` (CSPRNG). Deterministic IDs use HMAC-SHA256 via the Web Crypto API, mapping the hash to wordlist indices.\n\nAll public API inputs are validated with [zod](https://zod.dev) schemas. Invalid options throw with descriptive error messages.\n\n## License\n\nMIT\n","summary":"id-agent is a small library for generating token-efficient, human-readable IDs aimed specifically at AI agents, where UUIDs can be expensive in tokens and prone to LLM hallucination. It produces word-based identifiers that are designed to be memorable and use fewer tokens (roughly ~14 tokens for the default 8-word format) while maintaining configurable collision resistance through adjustable entropy. The package supports options like word count and type prefixes, and it validates API inputs with zod to help prevent incorrect configurations. It’s a good fit for developers building chat/agent workflows, tool call systems, and any LLM-facing application that needs reliable, compact identifiers.","description":"Token efficient IDs for AI agents. UUID alternative for the agentic era","stars":71,"language":"TypeScript"},{"owner":"Asymptote-Labs","repo":"agent-beacon","url":"https://github.com/Asymptote-Labs/agent-beacon","readme":"<p align=\"center\">\n  <img src=\"images/beacon-hero.png\" alt=\"Beacon\" width=\"860\">\n</p>\n\n<h1 align=\"center\">Asymptote Lab's Beacon</h1>\n\n<p align=\"center\">\n  <a href=\"https://github.com/asymptote-labs/agent-beacon/releases\"><img src=\"https://img.shields.io/github/v/release/asymptote-labs/agent-beacon\" alt=\"GitHub release\"></a>\n  <a href=\"https://github.com/asymptote-labs/homebrew-tap\"><img src=\"https://img.shields.io/badge/homebrew-beacon-fbb040?logo=homebrew\" alt=\"Homebrew\"></a>\n  <a href=\"https://github.com/asymptote-labs/agent-beacon/actions/workflows/ci.yml\"><img src=\"https://img.shields.io/github/actions/workflow/status/asymptote-labs/agent-beacon/ci.yml\" alt=\"GitHub Workflow Status\"></a>\n  <a href=\"https://github.com/asymptote-labs/agent-beacon/blob/main/LICENSE\"><img src=\"https://img.shields.io/github/license/asymptote-labs/agent-beacon\" alt=\"MIT license\"></a>\n  <a href=\"https://docs.asymptotelabs.ai/cli\"><img src=\"https://img.shields.io/badge/docs-asymptotelabs.ai-0369a1\" alt=\"Docs\"></a>\n</p>\n\n<p align=\"center\">\n  <strong>Unified endpoint telemetry for AI agents.</strong>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://docs.asymptotelabs.ai/cli\">Docs</a>\n  ·\n  <a href=\"https://docs.asymptotelabs.ai/cli/installation\">Install</a>\n  ·\n  <a href=\"https://docs.asymptotelabs.ai/cli/security-it-teams\">For Security & IT Teams</a>\n  ·\n  <a href=\"https://docs.asymptotelabs.ai/cli/dashboard\">Dashboard</a>\n  ·\n  <a href=\"https://docs.asymptotelabs.ai/cli/command-reference\">Commands</a>\n</p>\n\n## What Is Beacon?\n\nBeacon is [Asymptote's open-source endpoint agent](https://justindsouza.substack.com/p/introducing-beacon-endpoint-telemetry) for security and IT teams that\nneed visibility into local AI agent activity.\n\nIt runs locally, captures all agent activity (e.g. prompts, tool use, file edits, etc.) from\nall the [major local agent harnesses](#agent-runtimes), then\nnormalizes that activity into endpoint events your team can inspect and retain\nlocally.\n\nBeacon is built to be easy to deploy for Security and IT teams through\n[MDM deployment](#mdm-deployment) and to\nemit agent harness telemetry logs to\n[all the major enterprise-grade SIEMs](#siem--output-destinations).\n\nLearn more in the [Agent Beacon Documentation](https://docs.asymptotelabs.ai/cli).\n\n## High-Level Architecture\n\nBeacon keeps collection, processing, and inspection local to the endpoint while\nleaving forwarding under customer control.\n\n<p align=\"center\">\n  <img src=\"images/beacon-architecture.png\" alt=\"Beacon endpoint architecture\" width=\"860\">\n</p>\n\n- **Agent runtime layer:** Local hooks and OpenTelemetry sources capture\n  supported activity from AI agent harnesses on the endpoint.\n- **Beacon endpoint layer:** Local processing normalizes events, applies\n  retention and redaction settings, and writes durable endpoint telemetry.\n- **Output layer:** Teams inspect events in the local dashboard, retain JSONL,\n  or forward records into all the major enterprise-grade SIEMs.\n\n## Supported Surfaces\n\nBeacon captures supported agent harness activity locally and writes normalized\nendpoint events that teams can inspect in place or forward into customer-managed\nsecurity pipelines.\n\n### Agent Runtimes\n\nAgent Beacon supports the most popular enterprise coding agent harnesses (e.g.\nClaude Code, Codex, Cursor, etc.) and knowledge worker agent harnesses (e.g.\nClaude Cowork, OpenClaw).\n\n| Agent Harness | Support path |\n| --- | --- |\n| [Antigravity CLI](https://docs.asymptotelabs.ai/cli/supported-runtimes-antigravity-cli) | Beacon hook adapter |\n| [Claude Code](https://docs.asymptotelabs.ai/cli/supported-runtimes-claude-code) | Local OpenTelemetry configuration or Beacon hook adapter |\n| [Claude Cowork](https://docs.asymptotelabs.ai/cli/supported-runtimes-claude-cowork) | Admin-configured OpenTelemetry setup |\n| [Codex CLI](https://docs.asymptotelabs.ai/cli/supported-runtimes-codex-cli) | Local OpenTelemetry configuration |\n| [Cursor](https://docs.asymptotelabs.ai/cli/supported-runtimes-cursor) | Beacon hook adapter |\n| [Devin](https://docs.asymptotelabs.ai/cli/supported-runtimes-devin) | Beacon hook adapter |\n| [Factory Droid](https://docs.asymptotelabs.ai/cli/supported-runtimes-factory-droid) | Local OpenTelemetry configuration and optional hook adapter |\n| [Gemini CLI](https://docs.asymptotelabs.ai/cli/supported-runtimes-gemini-cli) | Opt-in local OpenTelemetry configuration |\n| [GitHub Copilot CLI](https://docs.asymptotelabs.ai/cli/supported-runtimes-github-copilot-cli) | MDM-managed OpenTelemetry (OTLP HTTP) |\n| [Grok Build](https://docs.asymptotelabs.ai/cli/supported-runtimes-grok-build) | Beacon hook adapter |\n| [OpenClaw Gateway](https://docs.asymptotelabs.ai/cli/supported-runtimes-openclaw-gateway) | Gateway-configured OTLP/HTTP export |\n| [OpenCode](https://docs.asymptotelabs.ai/cli/supported-runtimes-opencode) | Beacon hook adapter |\n| [VS Code](https://docs.asymptotelabs.ai/cli/supported-runtimes-vscode) | VS Code Copilot OpenTelemetry and optional Beacon hook adapter |\n\n### SIEM / Output Destinations\n\nAgent Beacon emits agent harness telemetry logs to all the major\nenterprise-grade SIEMs.\n\n| SIEMs | Support path |\n| --- | --- |\n| [CrowdStrike Falcon LogScale HEC](https://docs.asymptotelabs.ai/cli/siem-forwarding-falcon) | Optional endpoint forwarding with LogScale ingest tokens during install or repair |\n| [Customer-managed SIEM pipelines](https://docs.asymptotelabs.ai/cli/siem-forwarding) | Forwarding from local Beacon JSONL under customer control |\n| [Datadog](https://docs.asymptotelabs.ai/cli/siem-forwarding-datadog) | Datadog Agent custom log collection over local JSONL |\n| [Elastic](https://docs.asymptotelabs.ai/cli/siem-forwarding-elastic) | Filebeat or Elastic Agent content pack over local JSONL |\n| [Local JSONL](https://docs.asymptotelabs.ai/cli/local-testing-logs) | Default endpoint log and local dashboard source |\n| [Microsoft Sentinel](https://docs.asymptotelabs.ai/cli/siem-forwarding-microsoft-sentinel) | Azure Monitor Agent and Data Collection Rule content pack over local JSONL |\n| [Rapid7 InsightIDR](https://docs.asymptotelabs.ai/cli/siem-forwarding-rapid7) | Custom Logs webhook content pack over local JSONL |\n| [Splunk HEC](https://docs.asymptotelabs.ai/cli/siem-forwarding-splunk) | Optional endpoint forwarding during install or repair |\n| [Sumo Logic](https://docs.asymptotelabs.ai/cli/siem-forwarding-sumo) | HTTP Logs & Metrics Source content pack over local JSONL |\n| [Wazuh](https://docs.asymptotelabs
