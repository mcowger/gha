 doing rhetorically — its rhetorical situation, explicit argument vs. buried frame, appeals map, and loaded language.\n- [`/writing-scene-construction`](docs/writing/scene-construction.md) — Diagnoses and repairs individual scenes using the want/obstacle/outcome framework.\n- [`/writing-technical`](docs/writing/technical.md) — Writes and audits technical documentation, API docs, user guides, and specifications for completeness, sequence, precision, and audience calibration.\n- [`/writing-tone-alignment`](docs/writing/tone-alignment.md) — Diagnoses and repairs tone drift — shifts in register, formality, warmth, or rhythm that make a piece feel like it was written by multiple people or in multiple moods.\n- [`/writing-voice-consistency`](docs/writing/voice-consistency.md) — Extracts a voice fingerprint from strong existing passages and uses it to audit and repair voice departures.\n- [`/writing-worldbuilding`](docs/writing/worldbuilding.md) — Audits a fictional world for internal consistency, texture, economy, and constraint-story alignment.\n\n#### `/linguistics`\n\n- [`/linguistics`](docs/linguistics/README.md) — Entry point for the linguistics toolkit.\n- [`/linguistics-framing`](docs/linguistics/framing.md) — Identifies the frame embedded in a word, phrase, or question — and how that frame pre-loads the answer before reasoning begins.\n- [`/linguistics-connotation`](docs/linguistics/connotation.md) — Maps the emotional and associative load of word choices — the difference between what a word denotes and what it implies.\n- [`/linguistics-pragmatics`](docs/linguistics/pragmatics.md) — Analyses what is being communicated beyond the literal meaning — implicature, speech acts, and the gap between what is said and what is meant.\n- [`/linguistics-semantic-drift`](docs/linguistics/semantic-drift.md) — Tracks how a word or concept has shifted meaning over time or across communities — and whether the current argument depends on conflating distinct meanings.\n\n### Think in Time & Systems\n\n#### `/systems`\n\n- [`/systems`](docs/systems/README.md) — Entry point for the systems thinking toolkit.\n- [`/systems-archetype-matching`](docs/systems/archetype-matching.md) — Applies the 8 classic system archetypes (Senge) to diagnose recurring system behavior.\n- [`/systems-emergence-detection`](docs/systems/emergence-detection.md) — Identifies system-level properties that exist nowhere in any individual component.\n- [`/systems-feedback-mapping`](docs/systems/feedback-mapping.md) — Identifies all reinforcing (+) and balancing (−) feedback loops in a system.\n- [`/systems-leverage-analysis`](docs/systems/leverage-analysis.md) — Finds where small interventions produce large, lasting change using Donella Meadows' leverage point hierarchy.\n\n#### `/temporal`\n\n- [`/temporal`](docs/temporal/README.md) — Entry point for the temporal thinking toolkit.\n- [`/temporal-cycle-detection`](docs/temporal/cycle-detection.md) — Identifies what recurring cycle a situation is an instance of and where in that cycle you currently are.\n- [`/temporal-futures-mapping`](docs/temporal/futures-mapping.md) — Explores possible, probable, and preferable futures using scenario thinking.\n- [`/temporal-horizon-mapping`](docs/temporal/horizon-mapping.md) — Maps consequences of a decision across short, medium, and long time horizons.\n- [`/temporal-timing-analysis`](docs/temporal/timing-analysis.md) — Assesses whether now is the right time to act, wait, or prepare.\n\n#### `/historical`\n\n- [`/historical`](docs/historical/README.md) — Entry point for the historical reasoning toolkit.\n- [`/historical-cycle-detection`](docs/historical/cycle-detection.md) — Identifies what recurring cycle the current situation is an instance of — and where in that cycle you currently are.\n- [`/historical-failure-analysis`](docs/historical/failure-analysis.md) — Extracts recurring failure modes from similar past situations — most failures have happened before in recognisable patterns.\n- [`/historical-lesson-extraction`](docs/historical/lesson-extraction.md) — Extracts the transferable principle from a specific historical case — separating the contingent surface details from the underlying rule that applies across contexts.\n- [`/historical-precedent-analysis`](docs/historical/precedent-analysis.md) — Finds and applies genuinely similar historical situations to inform a current decision — distinguishing true precedents from superficial analogies.\n\n#### `/resource`\n\n- [`/resource`](docs/resource/README.md) — Entry point for the resource toolkit.\n- [`/resource-allocation-analysis`](docs/resource/allocation-analysis.md) — Distributes limited resources across competing needs — making the trade-offs explicit rather than implicit.\n- [`/resource-bottleneck-analysis`](docs/resource/bottleneck-analysis.md) — Identifies what is actually constraining throughput — using Theory of Constraints logic: the system can only move as fast as its slowest point.\n- [`/resource-leverage-mapping`](docs/resource/leverage-mapping.md) — Finds the highest-leverage use of available resources — where the same input produces the most output.\n- [`/resource-waste-audit`](docs/resource/waste-audit.md) — Finds where resources are being lost, duplicated, or underused — the seven wastes applied to knowledge work.\n\n#### `/strategy`\n\n- [`/strategy`](docs/strategy/README.md) — Routes to the right strategy skill for any adversarial or competitive reasoning situation.\n- [`/strategy-alliance`](docs/strategy/alliance.md) — Maps parties, identifies natural allies and swing parties, and assesses alliance stability for coalition-building in competitive contexts.\n- [`/strategy-deception`](docs/strategy/deception.md) — Manages information asymmetry in legitimate competitive contexts — what to protect, what impressions work in your favor, and what your opponent may be concealing from you.\n- [`/strategy-force-economy`](docs/strategy/force-economy.md) — Finds the minimum intervention that achieves the objective — especially when you're outgunned or under-resourced.\n- [`/strategy-intelligence`](docs/strategy/intelligence.md) — Audits what you actually know vs. what you're assuming about yourself and your opponent before acting.\n- [`/strategy-positioning`](docs/strategy/positioning.md) — Builds the conditions for competitive unassailability before the contest begins.\n- [`/strategy-terrain`](docs/strategy/terrain.md) — Maps the competitive landscape to identify where you have advantage, where contests are evenly matched, and where engagement is costly.\n- [`/strategy-timing`](docs/strategy/timing.md) — Analyzes whether to act now or wait, reads your opponent's rhythm, and identifies trigger conditions for the right moment.\n- [`/strategy-victory`](docs/strategy/victory.md) — Defines what winning actually means before the contest begins — prevents the pyrrhic trap of winning in ways that lose the larger goal.\n\n#### `/network`\n\n- [`/network`](docs/network/README.md) — Entry point for the network thinking toolkit.\n- [`/network-centrality`](docs/network/centrality.md) — Identifies the most influential nodes in a network — the people, ideas, or components whose removal or activation disproportionately affects the whole.\n- [`/network-contagion`](docs/network/contagion.md) — Models how things spread through a network — ideas, behaviors, failures, diseases — and where to intervene to accelerate or arrest spread.\n- [`/network-weak-ties`](docs/network/weak-ties.md) — Maps the weak ties in a network and identifies where they provide access to information, opportunities, or bridges unavailable through strong ties alone.\n- [`/network-effects`](docs/network/network-effects.md) — Diagnoses whether a product, platform, or system exhibits network effects — and what type — to assess whether value compounds with scale or saturates.\n\n#### `/ecology`\n\n- [`/ecology`](docs/ecology/README.md) — Entry point for the ecology toolkit.\n- [`/ecology-carrying-capacity`](docs/ecology/carrying-capacity.md) — Maps the limits a system can sustain — identifying where growth will hit a ceiling and what determines that ceiling.\n- [`/ecology-keystone-species`](docs/ecology/keystone-species.md) — Identifies the keystone element in a system — the component whose removal triggers disproportionate collapse across the whole.\n- [`/ecology-interdependence`](docs/ecology/interdependence.md) — Maps the web of mutual dependencies in a system — finding the hidden relationships that make apparently independent elements fragile when separated.\n- [`/ecology-succession`](docs/ecology/succession.md) — Maps the succession dynamics in a system — how it moves through stages of development, what triggers each transition, and what a mature stable state looks like.\n\n### See More Clearly\n\n#### `/aesthetic`\n\n- [`/aesthetic`](docs/aesthetic/README.md) — Entry point for the aesthetic toolkit.\n- [`/aesthetic-coherence-check`](docs/aesthetic/coherence-check.md) — Tests whether the parts of something form a unified whole — finding the jarring inconsistencies that accumulate when different contributors work without a shared vision.\n- [`/aesthetic-elegance-testing`](docs/aesthetic/elegance-testing.md) — Tests whether a solution is more complex than it needs to be — distinguishing necessary complexity from accidental complexity that accreted over time.\n- [`/aesthetic-pattern-detection`](docs/aesthetic/pattern-detection.md) — Identifies the underlying formal pattern at work — because most successful designs, arguments, and solutions share deep structural patterns, and naming the pattern unlocks the playbook.\n- [`/aesthetic-simplicity-analysis`](docs/aesthetic/simplicity-analysis.md) — Finds the simpler version while preserving what matters — not arbitrary reduction, but finding the core and discarding what is not it.\n\n#### `/sensory`\n\n- [`/sensory`](docs/sensory/README.md) — Entry point for the sensory observation toolkit.\n- [`/sensory-detail-mining`](docs/sensory/detail-mining.md) — Finds specific details being overlooked — the most important information is often present but not being registered.\n- [`/sensory-signal-detection`](docs/sensory/signal-detection.md) — Separates meaningful signal from background noise — finding what actually matters among everything present.\n- [`/sensory-structured-observation`](docs/sensory/structured-observation.md) — Applies disciplined observation to a situation — suspending interpretation to see what's actually there before deciding what it means.\n\n\n</details>\n\n---\n\n## Examples\n\n#### The political landscape through game theory\nThe current political climate feels like everyone is acting against their own interests. `/game-theory-iterated` maps the repeated-game structure: parties face short-term defection incentives even when cooperation would benefit everyone long-run, and a shrinking shadow of the future (declining expected gains from future cooperation) explains why moderation keeps losing even when most people say they want it. The equilibrium is stable — not because of irrationality, but because of it.\n\n#### Why social media makes discourse worse despite everyone wanting better\nPlatforms want healthier discourse. Users say they want it. It keeps getting worse. `/systems-feedback-mapping` finds the reinforcing loop: engagement-optimised feeds reward content that provokes reaction, which selects for users who engage with provocation, which trains the algorithm to serve more of it. The stated goal and the actual incentive structure point in opposite directions. No individual decision made it this way — the system produced it.\n\n#### The ethics and game theory of automating 40 jobs\nYour company is considering automating a function that currently employs 40 people. `/ethics-council` runs five frameworks and surfaces a genuine conflict: utilitarian logic favours the automation, Kantian reasoning flags that treating displaced workers as means rather than ends requires more than an efficiency argument. `/game-theory-mechanism-design` then helps design a transition that aligns incentives — rather than announcing a decision and managing the fallout.\n\n#### Whether the current wave of nationalism is unprecedented\nThe political nationalism of the 2020s feels like something new. `/historical-cycle-detection` finds four structural analogues — late-19th-century nativist movements, 1930s economic retrenchment, post-colonial identity politics, 1970s stagflation politics — and maps where the current situation matches the pattern and where it doesn't. More useful than \"this has happened before\" or \"this time is different.\"\n\n#### A career pivot with a closing window\nYou're considering leaving a stable senior role for an early-stage company. The question feels like yes or no. `/strategy-positioning` maps how your options change if you wait two years versus going now. `/decision-reversibility-analysis` finds the move is partially reversible in the medium term — but with a specific window that closes as you get further from hands-on execution. The pairing surfaces a time constraint neither skill would have found alone.\n\n#### Why a new pricing model keeps failing despite making economic sense\nThe economics look clear: the new pricing model captures more value, aligns incentives, and is objectively fairer. It keeps getting rejected. `/economics-incentive-mapping` finds the problem: the people who must approve it face short-term losses even though the organisation wins long-term. `/economics-coordination` then diagnoses the collective action failure — each approver is waiting for someone else to absorb the transition cost first.\n\n#### What a startup's fundraising pitch is actually communicating\nA founder's pitch deck is clear and well-structured. Investors keep passing without giving substantive reasons. `/linguistics-framing` finds the issue: the deck frames the company as solving a problem investors already think is solved, which pre-loads skepticism before a single number is scrutinised. The facts haven't changed — the frame has been working against the argument the whole time.\n\n#### Why a platform grows explosively then stalls at the same threshold\nA consumer app hit 100,000 users fast, then plateaued. Growth tactics aren't working. `/network-effects` diagnoses the type of network effect at play — local, not global — which means the platform reaches saturation within clusters long before it reaches market saturation. `/network-weak-ties` then identifies the bridge connections that could carry growth across cluster boundaries.\n\n#### Whether a dominant tech company's position is actually durable\nThe company looks unassailable: massive market share, capital, talent. `/ecology-keystone-species` maps the dependencies — which other players rely on it and which the platform itself relies on — and finds two suppliers with quietly disproportionate leverage. `/ecology-succession` then models what the ecosystem looks like in the next developmental stage, and whether the current dominant player is positioned for it or optimised for conditions that are already passing.\n\n#### Why a product keeps winning technically and losing commercially\nEngineers ship a product that outperforms competitors on every measurable dimension. It keeps underperforming in the market. `/design-user-needs` finds the gap: the features being optimised are the ones engineers care about, not the ones that determine adoption decisions. `/cognition-mental-models` then surfaces the mental model users bring to the product — and shows the product is being built against a different model than the one users actually hold.\n\n#### How a species analogy reveals the flaw in a market entry strategy\nA company plans to enter a mature market by doing what the market leader does, but cheaper. `/evolution-fitness-landscape` maps the landscape: the incumbent occupies a local optimum that is genuinely hard to displace incrementally — competing on the same dimensions means fighting on the incumbent's terms. The analysis points toward a different peak entirely: a niche the incumbent has structurally abandoned.\n\n#### The hidden cost in every information-rich environment\nA team drowns in data but keeps making the same avoidable mistakes. `/information-signal-noise` finds that the most decision-relevant signals are buried in low-frequency, low-urgency reports that nobody reads — while high-frequency, high-urgency signals (email, Slack, dashboards) carry almost no information about the actual problem. The team isn't uninformed; it's overloaded with noise while the signal sits unread.\n\n---\n\n<details>\n<summary>Quick examples — one per skill</summary>\n\n#### `/logic`\nYou believe working from home makes you more productive because you get more done on those days. `/logic-check` finds the flaw: you only work from home when you have focused work scheduled anyway — the variable you think is causing the effect is just correlated with it.\n\n#### `/probability`\nA doctor tells you a test for a rare disease is 99% accurate and you tested positive. `/probability-base-rate-anchoring` shows why you're probably still fine: when the disease affects 1 in 10,000 people, even a highly accurate test produces mostly false positives.\n\n#### `/decision`\nYou've been offered a chance to move abroad for a year. It feels like a binary yes/no. `/decision-option-mapping` surfaces four options you weren't considering: go for six months, negotiate remote work, defer by a year, or go with a return clause.\n\n#### `/constraint`\nYou want to write a novel but insist you have no time. `/constraint-hardness-testing` asks whether the constraint is real — and finds it's a habit dressed as a fact. The actual constraint is that you haven't protected a 45-minute slot.\n\n#### `/game-theory`\nYou and a housemate both hate cleaning the kitchen but neither wants to go first. `/game-theory-prisoners-dilemma` shows why this equilibrium is stable and what actually breaks it: not goodwill, but a credible commitment mechanism.\n\n#### `/epistemology`\nEveryone in your social circle agrees on a contested topic and it feels like obvious truth. `/epistemology-epistemic-status` maps how much of your belief rests on actual evidence versus social contagion — and which parts would survive if your environment were different.\n\n#### `/investigation`\nYou've heard that people only use 10% of their brain. `/investigation-source-trace` traces the claim back to its supposed origin and finds no credible scientific source — it appears to have emerged from a misquote and spread through repetition.\n\n#### `/economics`\nYour company is subsidising a service that everyone uses but nobody values. `/economics-opportunity-cost` maps what that budget forecloses — and finds the invisible cost is three times larger than the visible one.\n\n#### `/information`\nYour team produces weekly status reports that nobody reads. `/information-entropy` measures how much genuine new information each report contains — and finds it's near zero, because everything in the report was already known by the people receiving it.\n\n#### `/cognition`\nA senior engineer keeps making the same class of architecture mistake across different projects. `/cognition-mental-models` surfaces the model driving the decisions — and finds it's a model built for a context that no longer applies.\n\n#### `/creativity`\nYou've been writing the same kind of music for three years and everything sounds the same. `/creativity-lateral-thinking` forces you to approach the next track as if you were scoring a silent film — and the constraint breaks the pattern.\n\n#### `/analogy`\nYou're struggling to explain how machine learning works to someone with no technical background. `/analogy-domain-transfer` imports the structure of learning to ride a bike: you don't study the physics, you fall, adjust, and eventually your body just knows.\n\n#### `/play`\nYour short story feels predictable but you can't see where. `/play-worst-case-reversal` asks you to design the most boring possible version of the story — and the list of failure modes reveals exactly what the current draft is doing.\n\n#### `/evolution`\nA competitor keeps copying your product features and you keep losing the advantage. `/evolution-arms-race` maps the escalation dynamic — and finds you're both locked into a cycle neither side can exit unilaterally, optimising for a dimension that neither side actually wants to compete on.\n\n#### `/design`\nYou've shipped five versions of a feature and users still find it confusing. `/design-user-needs` separates what users asked for from what they actually need — and finds the confusion is downstream of a mismatch between the feature's mental model and the user's.\n\n#### `/communication`\nYou sent a message that was meant to be supportive and the other person felt criticised. `/communication-clarity-audit` finds the two sentences that read as judgement to the receiver even though they weren't written that way.\n\n#### `/social`\nA group project has stalled and nobody can explain why. `/social-dynamics-analysis` identifies that one person holds informal veto power over decisions and everyone else is routing around them without naming it.\n\n#### `/emotional`\nA close friend keeps cancelling plans at the last minute. `/emotional-resistance-diagnosis` maps what might be underneath the behaviour — not flakiness, but something they're avoiding that the plans surface.\n\n#### `/ethics`\nYou found someone's wallet containing a significant amount of cash and no ID. `/ethics-council` walks through five ethical frameworks and finds they mostly converge — with one genuinely dissenting position that's worth taking seriously.\n\n#### `/identity`\nYou keep agreeing to commitments that make you miserable. `/identity-values-clarification` surfaces the gap between what you say you value and what your decisions actually reveal — and names the value that's been running your choices without your endorsement.\n\n#### `/narrative`\nYou're giving a speech that matters to you but it keeps landing flat in rehearsal. `/narrative-tension-mapping` finds that you've removed all the stakes in an attempt to sound measured — and that's exactly what's killing it.\n\n#### `/psychology`\nYou've tried to quit a habit five times and it keeps returning. `/psychology-behavior-change` diagnoses what's maintaining it: not lack of willpower, but a specific trigger-routine-reward loop that none of your previous attempts addressed.\n\n#### `/mindset`\nYou've been dreading a difficult conversation for three weeks and it's getting worse. `/mindset-stoic` separates what's in your control from what isn't — and finds the avoidance is costing more than the conversation would.\n\n#### `/writing`\nYour essay makes a strong argument but readers say it doesn't land. `/writing-rhetoric` reveals the structure leads with the conclusion before earning it — the reader hasn't been brought along, so the argument feels asserted rather than demonstrated.\n\n#### `/linguistics`\nYour policy proposal keeps getting mischaracterised in discussion. `/linguistics-framing` finds the word you chose to describe the mechanism carries a connotation that pre-loads opposition — a different word, identical in denotation, removes the friction.\n\n#### `/systems`\nEvery time your team fixes one problem, two more appear. `/systems-feedback-mapping` finds the reinforcing loop: the fixes are creating conditions that generate the next set of problems faster than the team can resolve them.\n\n#### `/temporal`\nYou're deciding whether to go back to study and the short-term cost feels prohibitive. `/temporal-horizon-mapping` maps the decision at one year, five years, and twenty — and shows that the framing that makes it look impossible only holds at the shortest horizon.\n\n#### `/historical`\nYou're starting an ambitious creative project and feel pressure to have a breakthrough immediately. `/historical-failure-analysis` maps how most significant creative works actually developed: slowly, with long unproductive stretches that looked like failure until they weren't.\n\n#### `/resource`\nYou have three hours to prepare for an important conversation and you're trying to prepare for everything. `/resource-bottleneck-analysis` finds the real constraint: there are two specific questions you can't answer and everything else is already solid.\n\n#### `/strategy`\nYou want to win a local chess tournament. `/strategy-positioning` shows that the decisive work happens before the match: in the openings you prepare, the players you study, and the psychological state you arrive in.\n\n#### `/network`\nYou've been trying to break into a new industry for a year with no traction. `/network-weak-ties` maps your current network and finds it's dense but homogeneous — everyone you know already knows everyone else. The entry point is a single weak tie to a different cluster, not another strong tie in your existing one.\n\n#### `/ecology`\nYour product's ecosystem of integrations looks healthy until two partners quietly announce they're building competing features. `/ecology-interdependence` maps the dependency web and finds three other integrations that were implicitly relying on those two partners — a cascade that wasn't visible until the dependencies were drawn out.\n\n#### `/aesthetic`\nYour apartment feels wrong but you can't articulate why. `/aesthetic-coherence-check` finds that three incompatible design eras are competing in the same room — and the feeling of wrongness is the parts refusing to form a whole.\n\n#### `/sensory`\nYou've read the same paragraph four times and nothing is sticking. `/sensory-signal-detection` asks what's actually present in your environment right now that you've stopped registering — and finds three things competing for the same attention channel.\n\n</details>\n","summary":"skills-for-humanity is an npm package of Claude Code “skills” that packages well-known structured reasoning methodologies into runnable procedures. It provides a curated set of skills across logic and probability, creativity and design, communication and ethics, and time/system thinking, with each skill guiding the model through defined steps and structured outputs. The included routing helps users choose an appropriate methodology automatically via a simple `/think` flow, including confirmation, iterative depth control, and the ability to correct the framing mid-run. This is useful for people building decision, strategy, communication, or planning workflows in Claude Code who want more rigorous, repeatable thinking than ad hoc prompting.","description":"Structured reasoning methodologies from history's most rigorous thinkers, packaged as Claude Code skills.","stars":129,"language":"JavaScript"},{"owner":"FredAntB","repo":"Spec-Driven-Development","url":"https://github.com/FredAntB/Spec-Driven-Development","readme":"# spec-driven-development\n\n> Claude, Cursor, and Copilot all read the same plan before touching your code.\n\nA Claude skill that writes your specs before you write code — interviews you,\ngenerates `requirements.md`, `design.md`, and `tasks.md`, then creates matching\nconfig files for every AI tool you use so they can't contradict each other.\n\n[![Version](https://img.shields.io/badge/version-1.0--beta-blue)](https://github.com/FredAntB/spec-driven-development/releases/tag/v1.0-beta)\n[![CI](https://github.com/FredAntB/spec-driven-development/actions/workflows/ci.yml/badge.svg)](https://github.com/FredAntB/spec-driven-development/actions/workflows/ci.yml)\n[![Phase 2A](https://img.shields.io/badge/static%20assertions-67%2F67-brightgreen)](phase2a/assertions.md)\n[![Phase 2B](https://img.shields.io/badge/behavioral%20tests-15%2F15-brightgreen)](phase2b/eval_session.md)\n[![Phase 2C](https://img.shields.io/badge/generation%20quality-53%2F53-brightgreen)](phase2c/eval_flows.md)\n[![License](https://img.shields.io/badge/license-MIT-green)](LICENSE)\n\n---\n\n## The problem this solves\n\nYou open Claude Code and ask it to build a feature. An hour later it's\ndone something technically impressive that isn't quite what you wanted.\nYou ask Cursor to fix it. It contradicts what Claude Code did. You ask\nCopilot to clean up. It invents a third interpretation.\n\nThe root cause is always the same: your AI agents have no shared source\nof truth. They fill every gap with their own assumptions.\n\nThis skill fixes that by creating three files before any code is written:\n\n| File | Answers |\n|---|---|\n| `requirements.md` | What the system must do |\n| `design.md` | How it will be built |\n| `tasks.md` | What to build next, in order |\n\nHere's what those files actually look like:\n\n**`requirements.md`** — every requirement is traceable and testable:\n```markdown\n- **REQ-001**: Users shall log time entries against a client project.\n  - _Acceptance_: POST /entries returns 201 with entry id, duration, and project_id\n- **REQ-002**: Users shall generate a monthly invoice from logged entries.\n  - _Acceptance_: GET /invoices/:month returns PDF with line items summing to total\n```\n\n**`tasks.md`** — every task links back to its requirement:\n```markdown\n- [ ] **TASK-003** [REQ-001]: Implement POST /entries with validation\n  - _Output_: Route handler + duration schema validation\n  - _Verify_: POST /entries returns 201 with all required fields\n```\n\nEvery AI tool reads from these files before touching code. Drift stops.\n\n---\n\n## Quick start\n\nInstall the skill, then start a conversation with any of these:\n\n```\n\"I want to start a new project\"\n\"my AI keeps going off script, help\"\n\"I already have a codebase, no specs yet\"\n\"set up cursor and claude code for my team project\"\n```\n\nClaude will ask a few short questions and generate your spec files.\nNo configuration needed.\n\n---\n\n## Installation\n\n### Claude.ai / Claude desktop app (Chat tab)\n\n1. Download [`spec-driven-development-v1.0.skill`](releases/latest)\n2. In Claude settings → Skills → Install from file\n\nOr via CLI:\n```bash\nclaude plugin install FredAntB/spec-driven-development\n```\n\n### Claude Code (Code tab)\n\n```bash\ngit clone https://github.com/FredAntB/spec-driven-development\n```\n\nOpen the folder in the Code tab. The `CLAUDE.md` file is auto-read\nat session start and bootstraps the skill.\n\n**Windows note:** Git must be installed for the Code tab to work\nwith local folders. Download from [git-scm.com](https://git-scm.com).\n\n---\n\n## What you get\n\n### For a new project (greenfield)\n\nClaude interviews you in 4 short questions — one at a time,\nconversationally — then generates:\n\n```\nyour-project/\n├── requirements.md      ← what the system must do\n├── design.md            ← how it will be built\n├── tasks.md             ← atomic ordered implementation steps\n└── CLAUDE.md            ← Claude Code reads this automatically\n```\n\n**requirements.md** uses `shall` language and REQ-xxx IDs so every\nrequirement is traceable:\n\n```markdown\n## Functional Requirements\n\n### Tasks\n- **REQ-001**: Users shall create tasks with a title, description,\n  due date, and assignee.\n  - _Acceptance_: POST /tasks returns 201 with the created task object\n\n- **REQ-002**: Users shall update only tasks they created or are\n  assigned to.\n  - _Acceptance_: PATCH /tasks/:id returns 403 for unauthorized users\n```\n\n**tasks.md** links every task back to its requirement inline:\n\n```markdown\n## Phase 2: Core endpoints\n\n- [ ] **TASK-007** [REQ-001]: Implement POST /tasks with validation\n  - _Output_: Route handler + request schema validation\n  - _Verify_: POST /tasks returns 201 with all fields present\n```\n\n### For an existing codebase (retrofit)\n\nSame result, reverse-engineered from what you describe:\n\n```\nyour-project/\n├── requirements.md      ← v0-retrofit: discovered from existing code\n├── design.md            ← with [TO VERIFY] on every inferred field\n└── tasks.md             ← Phase 1 is spec verification, not new code\n```\n\n### For cross-AI teams\n\nGenerates identical instruction blocks across every tool your team uses:\n\n```\nyour-project/\n├── CLAUDE.md                           ← Claude Code\n├── .cursorrules                        ← Cursor\n├── .windsurfrules                      ← Windsurf\n├── .github/copilot-instructions.md    ← GitHub Copilot\n└── .aider.conf.yml                     ← Aider\n```\n\nEach file contains the same Universal Instruction Block — agents read\nthe same mandate, cite the same spec files, follow the same divergence\nprotocol. The only differences are tool-specific additions.\n\n---\n\n## Supported AI tools\n\n| Tool | Config file | Status |\n|---|---|---|\n| Claude Code | `CLAUDE.md` | ✓ Tested |\n| Cursor | `.cursorrules` | ✓ Tested |\n| Windsurf | `.windsurfrules` | ✓ Tested |\n| GitHub Copilot | `.github/copilot-instructions.md` | ✓ Tested |\n| Aider | `.aider.conf.yml` | ✓ Generated |\n\n---\n\n## The Universal Instruction Block\n\nEvery AI config file contains this block, with only the project name\nand spec version filled in:\n\n```\n═══════════════════════════════════════════════════════════\nSPEC DRIVEN DEVELOPMENT — PROJECT CONSTITUTION\nProject: Your Project Name\nVersion: 1.0\n═══════════════════════════════════════════════════════════\n\nThis project uses Spec Driven Development. All work is\ngoverned by three source-of-truth files:\n\n  requirements.md  — What the system must do\n  design.md        — How the system is structured\n  tasks.md         — The ordered implementation plan\n\nMANDATORY BEFORE ANY ACTION:\n  1. Read requirements.md in full\n  2. Read design.md in full\n  3. Read tasks.md — identify the next incomplete [ ] task\n\nHARD CONSTRAINTS:\n  ✗ Never implement requirements not in requirements.md\n  ✗ Never alter the data model without updating design.md first\n  ✗ Never create files not listed or implied in design.md\n  ✗ Never mark a task [x] without verifying its acceptance criterion\n  ✗ Never guess when a requirement is ambiguous — ask instead\n\nDIVERGENCE PROTOCOL:\n  If implementation must deviate from design.md:\n    → Stop immediately\n    → Describe the conflict clearly\n    → Wait for explicit user approval\n    → Update design.md BEFORE writing code\n═══════════════════════════════════════════════════════════\n```\n\n---\n\n## Test suite & CI\n\nThis skill ships with a complete, runnable test suite — 135 assertions\nacross three phases. A GitHub Actions workflow runs the automatable\nchecks on every push and pull request.\n\n### GitHub Actions workflow (`.github/workflows/ci.yml`)\n\nFour jobs run on every push to `main`/`master` and on every PR:\n\n| Job | What it does | Required to pass? |\n|---|---|---|\n| `phase2a` | Runs 67 static assertions via Python | Yes — hard gate |\n| `phase2c` | Runs 53 generation quality checks against committed fixtures | Yes if fixtures present |\n| `phase2b-notice` | Prints instructions for running behavioral tests manually | Informational only |\n| `all-checks` | Aggregates results — reference this in branch protection rules | Yes |\n\n**Branch protection setup** — in your repo settings, add `all-checks`\nas the single required status check. This means one rule covers all\nautomated phases now and any you add later.\n\n### Running locally\n\n```bash\n# Phase 2A — static assertions (67 checks)\npython3 phase2a/run_assertions.py\n\n# Windows — if python3 not on PATH or encoding errors occur\nPYTHONUTF8=1 python phase2a/run_assertions.py\n\n# Phase 2C — generation quality (53 checks, requires fixture files)\npython3 phase2c/check_outputs.py\n```\n\nOr paste the KICKOFF.md for each phase into the Claude Code tab\nfor a zero-setup run from any machine.\n\n### Running in Claude Code (Code tab)\n\n| Phase | Paste this | Output |\n|---|---|---|\n| 2A | `phase2a/KICKOFF.md` | Runs script, explains any failures |\n| 2B | `phase2b/KICKOFF.md` | 15 behavioral tests → `eval_report.md` |\n| 2C | `phase2c/KICKOFF.md` | 3 flows → files → `eval_report_2c.md` |\n\n### Phase 2C fixtures\n\nPhase 2C requires Claude Code to generate real spec files, which are\nthen committed to the repo as fixtures that CI checks on every push.\n\nTo regenerate fixtures after a significant skill change:\n1. Open the repo folder in the Code tab\n2. Paste `phase2c/KICKOFF.md`\n3. Commit the files Claude Code writes to `phase2c/flow_a/`,\n   `phase2c/flow_b/`, and `phase2c/flow_c/`\n\nCI will automatically pick up the new fixtures on the next push.\n\n### Current test results\n\n| Phase | Type | Assertions | CI |\n|---|---|---|---|\n| 2A | Static file checks | 67 / 67 ✓ | Automated |\n| 2B | Behavioral (live session) | 15 / 15 ✓ | Manual |\n| 2C | Generation quality | 53 / 53 ✓ | Automated (fixtures required) |\n\n---\n\n## Trigger phrases\n\nThe skill activates on a wide vocabulary. A sample:\n\n**Starting a project:**\n`\"I want to start a new project\"` · `\"help me plan before I code\"` ·\n`\"set up SDD for my project\"` · `\"I need a spec\"`\n\n**AI tool setup:**\n`\"set up cursor and claude code\"` · `\"make a cursorrules file\"` ·\n`\"my AI keeps going off script\"` · `\"keep my agents consistent\"`\n\n**Existing codebase:**\n`\"I already have a codebase, no specs yet\"` ·\n`\"help me document what my system does\"` ·\n`\"describe my architecture\"` · `\"add specs to existing project\"`\n\n**Feature requests:**\n`\"add dark mode\"` → triggers spec presence check before any code\n`\"just start coding\"` → triggers anti-pattern warning\n\n---\n\n## Anti-patterns the skill prevents\n\n| Anti-pattern | What the skill does |\n|---|---|\n| \"just start coding\" | Pushes back with concrete reasons, asks for spec |\n| Feature request without spec context | Checks for requirements.md before proceeding |\n| Generating config files before spec exists | Hard gate — interview required first |\n| AI guessing at ambiguous requirements | Asks for clarification, never fabricates |\n| Out of scope missing from requirements | Flags it and asks what won't be in v1 |\n\n---\n\n## Community beta — we need testers\n\nThis skill is in **public beta**. It has passed 135 automated\nassertions and 3 end-to-end generation flows, but it has not yet\nbeen tested by strangers using natural language.\n\nWe need 5 testers matching these profiles:\n\n- A complete beginner starting their first real project\n- A solo developer with an active side project (greenfield or partial)\n- A team lead whose team uses multiple AI tools\n- A developer with an existing codebase and no written specs\n- A developer who actively uses 3+ AI coding tools simultaneously\n\n**To volunteer:** Open an issue titled `[Beta] I'd like to test`\nand describe which profile fits you best.\n\nAll you need to do is use the skill naturally for your real work\nand file issues when something doesn't work. That's it.\n\n---\n\n## Contributing\n\n1. Fork the repo\n2. Make your change to `SKILL.md` or the reference files\n3. Run the Phase 2A assertion suite: `python3 phase2a/run_assertions.py`\n4. If assertions fail, fix them before filing a PR\n5. If your change adds new behavior, add a corresponding assertion\n\nNew assertions go in `phase2a/assertions.md` (human-readable spec)\nand `phase2a/run_assertions.py` (machine-executable check).\n\n---\n\n## Skill structure\n\n```\nspec-driven-development/\n├── SKILL.md                                  ← the skill (install this)\n├── CLAUDE.md                                 ← Code tab bootstrap\n├── references/\n│   ├── sdd-curriculum.md                     ← newbie-to-hero teaching guide\n│   ├── capabilities-and-cross-ai.md          ← Claude Code + cross-AI strategy\n│   └── templates.md                          ← spec file + UIB templates\n├── phase2a/\n│   ├── assertions.md                         ← human-readable test spec\n│   └── run_assertions.py                     ← static assertion runner\n├── phase2b/\n│   ├── eval_session.md                       ← behavioral test definitions\n│   └── KICKOFF.md                            ← Code tab eval kickoff\n├── phase2c/\n│   ├── eval_flows.md                         ← end-to-end flow definitions\n│   ├── check_outputs.py                      ← generation quality checker\n│   └── KICKOFF.md                            ← Code tab eval kickoff\n└── beta/\n    ├── BETA_PLAN.md                          ← 5-person beta plan\n    ├── TESTER_BRIEF.md                       ← tester onboarding guide\n    └── ISSUE_TEMPLATES.md                    ← feedback issue templates\n```\n\n---\n\n## License\n\nMIT — use freely, attribution appreciated.\n\n---\n\n## Acknowledgements\n\nBuilt and tested using the Claude skill framework. Test suite\nmethodology adapted from the skill-creator eval harness. All\n135 assertions were written before the corresponding fixes —\ntest-first, always.\n","summary":"Spec-Driven-Development is a Claude skill that forces a shared “source of truth” before any AI writes code, helping prevent contradictory or off-script implementations across tools like Claude, Cursor, and Copilot. It interviews you to generate traceable specification files—requirements.md (testable REQ-xxx requirements), design.md (how to build), and tasks.md (ordered, requirement-linked implementation steps)—and then creates matching configuration context for the AI tools you use. This benefits developers and teams who notice that their coding assistants make inconsistent assumptions, and anyone who wants more reliable, verifiable development plans that can be tested and followed through.","description":"A Claude skill that keeps your AI coding tools from contradicting  each other. Generates requirements.md, design.md, and tasks.md  before any code is written — then creates matching config files  for Claude Code, Cursor, Copilot, Windsurf, and Aider.","stars":75,"language":"Python"},{"owner":"madmonk13","repo":"modal-16","url":"https://github.com/madmonk13/modal-16","readme":"# modal-16\n\nA browser-based generative music sequencer built with JavaScript and Tone.js, designed for live performance and composition.\n\n**[▶ Open modal-16](https://madmonk13.github.io/modal-16/)**\n\n## Overview\n\nmodal-16 is a 16-step polyphonic sequencer that runs entirely in the browser. It proposes melodies, chord progressions, bass lines, and drum patterns in real time using probabilistic rules and harmonic constraints. Patterns can be shaped, edited, saved, and performed live — the system generates, the composer decides what stays.\n\nEverything runs in a single HTML file with no build step, no dependencies to install, and no server required.\n\n## Features\n\n**Sequencer**\n- 16-step patterns for melody, chords, bass, and five drum voices (kick, snare, hi-hat, clap, open hat)\n- Per-step note editing with scale-aware dropdowns for pitched tracks\n- Per-track mute, hold, level, density, and FX controls\n\n**Instruments**\n- 10 melody voices: Piano, Rhodes, Vibraphone, Bells, Mellotron Flute, Wurlitzer, Kalimba, Supersaw, Juno, Acid 303\n- 8 chord voices: Warm Pad, Strings, Organ, Glass, Tape Choir, Cello Ensemble, Brass Stab, Synth Pad\n- 7 bass voices: Electric, Sub, Synth, Moog, Fretless, Acid 303, Reese\n- Fully synthesized drum kit via Web Audio API\n\n**Harmony & Drift**\n- 5 scales: Dorian, Phrygian, Aeolian, Pentatonic, Mixolydian\n- 10 harmonic progressions for automatic root movement\n- Pattern drift: incremental mutation of active steps and notes on a configurable bar interval\n- Harmonic drift: root transposition through a progression on a configurable interval\n- Freeze mode: locks drift until manually released\n\n**Performance**\n- 8 snapshot slots — save and recall full pattern + instrument states\n- Chain sequencer — arrange snapshots into sequences with configurable repeat counts\n- Stutter (1× and 2×) — momentary step freeze for live rhythmic effects\n- Keyboard shortcuts for transport, mute, solo, and stutter\n\n**Recording & Scripting**\n- Audio recording direct from the browser (exports .webm)\n- Script recording — captures all parameter changes as a timestamped JSON event log\n- Script replay — deterministic playback of a recorded session\n\n**FX**\n- Per-track: LP filter, reverb, delay, stereo spread (melody/chords)\n- Master: tape wobble (vibrato), lo-fi low-pass, vinyl noise\n\n## Usage\n\nOpen `index.html` in a modern browser. No installation required.\n\n1. Click **▶ PLAY** to initialise audio and start the sequencer\n2. Use **⟳ NEW PATTERN** to generate a random pattern in the current key and scale\n3. Edit steps directly — click drum steps to toggle, use dropdowns to set pitched notes\n4. Save states to snapshot slots and chain them for structured arrangements\n5. Use **⏺ RECORD** to capture audio, or **◎ SCRIPT REC** to capture a session as a replayable script\n\n### Keyboard Shortcuts\n\n| Key | Action |\n|-----|--------|\n| `Space` | Play / stop |\n| `0` | Unmute all |\n| `1–3` | Mute melody / chords / bass |\n| `4` | Mute all drums |\n| `5–9` | Mute individual drum voices |\n| `Shift + 1–9` | Solo track |\n| `Z` (hold) | Stutter 1× |\n| `X` (hold) | Stutter 2× |\n\n## Technical\n\n- Vanilla JavaScript, no framework\n- [Tone.js](https://tonejs.github.io/) v14.7.77 for scheduling, synthesis, and effects (loaded from cdnjs)\n- Web Audio API for drum synthesis and recording\n- Piano samples loaded from `tonejs.github.io/audio/salamander/` (external dependency — app falls back to synth mode if unavailable)\n- Single file: `index.html`\n\n## Scripts\n\nThe `scripts/` directory contains replayable session recordings in JSON format. Load any script via **↑ IMPORT SCRIPT** and press **▶ REPLAY** to play it back.\n\n`01-init-script.json` is the generative script for *01 init()*, the opening track of *Yesterday's Tomorrow, Today!*\n\n## Yesterday's Tomorrow, Today!\n\n*Yesterday's Tomorrow, Today!* is a twelve-track album recorded entirely with modal-16 by Jeff Ulicny.\n\nEach track is a single live take of the generative system in performance — patterns proposed by the sequencer, shaped in real time through parameter changes, snapshot recalls, and live edits. No post-production, no overdubs. All composition, performance, and recording took place in the browser.\n\nThe album title and track names draw from programming terminology to invoke a retro-futuristic sensibility: the sound of futures imagined from the early days of personal computing, built with tools that exist today.\n\n[Listen on Bandcamp](https://madmonk13.bandcamp.com/album/yesterdays-tomorrow-today)\n\n## About\n\nmodal-16 was designed and built by Jeff Ulicny.\n\n## License\n\n[MIT](LICENSE) — free to use, modify, and distribute with attribution.\n","summary":"modal-16 is a browser-based, 16-step polyphonic generative music sequencer that runs entirely from a single HTML file using JavaScript and Tone.js. It can automatically propose melodies, chord progressions, bass lines, and multiple drum parts in real time based on probabilistic rules, scales, and harmonic constraints, while letting you edit steps, control per-track behavior, and apply per-track/master effects. For performance, it includes snapshot saving/recall, chaining of snapshots into arrangements, stutter effects, and keyboard shortcuts, plus in-browser audio and deterministic “script” recording/replay. It’s a good fit for musicians, live performers, and creators who want quick, framework-free prototyping of generative composition and interactive sequencing directly in the browser.","description":"A browser-based generative music sequencer built with JavaScript and Tone.js, designed for live performance and composition.","stars":18,"language":"HTML"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
