.ai/cli/siem-forwarding-wazuh) | Localfile configuration and Beacon Wazuh content pack |\n\n### MDM Deployment\n\nAgent Beacon is designed for Security and IT teams to deploy and validate\nthrough standard MDM workflows.\n\n| MDM platform | Support path |\n| --- | --- |\n| [Fleet](https://docs.asymptotelabs.ai/cli/fleet) | macOS package and user-context deployment helpers |\n| [Jamf Pro](https://docs.asymptotelabs.ai/cli/jamf) | macOS package, policy scripts, validation, and Extension Attributes |\n\n## Dashboard\n\nBeacon includes a local, read-only dashboard for validating endpoint activity\nwithout a hosted backend. The overview screen summarizes recent runtime events\nand collection status, while log search helps teams inspect normalized event\nrecords during rollout, testing, and investigations.\n\nBeacon writes endpoint activity to a stable local `runtime.jsonl` file. The\nactive file rotates at 10 MiB with five numbered local archives, keeping the\nendpoint handoff file bounded while external SIEM forwarders continue tailing\nthe active path. The dashboard reads the active log plus retained numbered\narchives for local triage; SIEM destinations remain the source of truth for\nlong-term retention and search.\n\n<p align=\"center\">\n  <img src=\"images/dashboard-overview.png\" alt=\"Beacon dashboard overview\" width=\"860\">\n</p>\n\n<p align=\"center\">\n  <img src=\"images/dashboard-log-search.png\" alt=\"Beacon dashboard log search\" width=\"860\">\n</p>\n\n## Start Here\n\n- [Beacon CLI docs](https://docs.asymptotelabs.ai/cli) — full documentation index.\n- [Installation](https://docs.asymptotelabs.ai/cli/installation) — install Beacon locally.\n- [For Security & IT Teams](https://docs.asymptotelabs.ai/cli/security-it-teams) — rollout, validation, and security workflows.\n- [Security review](https://docs.asymptotelabs.ai/cli/security-review) — review Beacon's architecture, data handling, and local-only posture.\n- [Endpoint agent](https://docs.asymptotelabs.ai/cli/endpoint) — install, status, repair, and uninstall.\n- [Dashboard](https://docs.asymptotelabs.ai/cli/dashboard) — inspect local runtime logs.\n- [Endpoint event schema](https://docs.asymptotelabs.ai/cli/event-schema) — normalized JSONL event model.\n- [Supported surfaces](https://docs.asymptotelabs.ai/cli/supported-surfaces) — supported runtimes, destinations, and boundaries.\n- [Command reference](https://docs.asymptotelabs.ai/cli/command-reference) — detailed CLI command docs.\n\n## Quickstart\n\nSee the [Quickstart](https://docs.asymptotelabs.ai/cli/quickstart) docs for the\nfull setup paths.\n\n### For Security & IT Teams\n\nStart with the\n[security and IT quickstart](https://docs.asymptotelabs.ai/cli/quickstart) and\n[managed deployment guidance](https://docs.asymptotelabs.ai/cli/security-it-teams)\nfor rollout, validation, retention, and SIEM forwarding. For vendor review, see\nthe [security review](https://docs.asymptotelabs.ai/cli/security-review).\n\n### For Developers\n\nInstall the released Beacon CLI locally with Homebrew:\n\n```bash\nbrew tap asymptote-labs/tap\nbrew install beacon\nbeacon version\n```\n\nOr build from source:\n\n```bash\ncd cli/beacon\nmake build\n```\n\nFor setup, deployment, integrations, and command details, see the\n[Beacon CLI docs](https://docs.asymptotelabs.ai/cli).\n\n## License\n\n[MIT](LICENSE)\n","summary":"Asymptote-Labs’ Beacon is an open-source local endpoint agent that provides unified telemetry for AI agent activity, designed for security and IT teams that need visibility into what local agents are doing. It installs on endpoints to capture and normalize agent events such as prompts, tool use, and file edits across major local agent harnesses, while applying retention and redaction settings before storing durable telemetry locally. Teams can inspect the resulting endpoint events in a dashboard, retain JSONL records, or forward normalized logs to enterprise-grade SIEMs for customer-controlled security workflows. This project is best suited for organizations deploying AI coding/knowledge-worker agents in regulated environments who want centralized monitoring, auditing, and analysis of on-device agent behavior.","description":"Agent Beacon is the world’s first open-source endpoint telemetry layer for local AI agents.","stars":95,"language":"Go"},{"owner":"ReviewStage","repo":"stage-cli","url":"https://github.com/ReviewStage/stage-cli","readme":"<div align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/ReviewStage/stage-cli/main/assets/stage-mark.svg\" alt=\"Stage\" height=\"80\">\n  <h1>Stage</h1>\n  <p>A code review tool that organizes local code changes into logical chapters and points out what to review before you dive into the code.</p>\n  <p>If you like this, try out the full Stage experience on our website below!</p>\n</div>\n\n<p align=\"center\">\n  <a href=\"https://stagereview.app\">Website</a>\n  &nbsp;&nbsp;•&nbsp;&nbsp;\n  <a href=\"https://stagereview.app/explore\">Examples</a>\n  &nbsp;&nbsp;•&nbsp;&nbsp;\n  <a href=\"https://stagereview.app/blog\">Blog</a>\n  &nbsp;&nbsp;•&nbsp;&nbsp;\n  <a href=\"https://x.com/StageReviewApp\">Twitter</a>\n  &nbsp;&nbsp;•&nbsp;&nbsp;\n  <a href=\"https://discord.gg/kfEa6a4wTp\">Discord</a>\n  &nbsp;&nbsp;•&nbsp;&nbsp;\n  <a href=\"https://stagereview.app/about\">About Us</a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://www.npmjs.com/package/stagereview\"><img src=\"https://img.shields.io/npm/v/stagereview.svg\" alt=\"npm version\"></a>\n  <a href=\"https://www.npmjs.com/package/stagereview\"><img src=\"https://img.shields.io/npm/dm/stagereview.svg\" alt=\"npm downloads\"></a>\n  <a href=\"https://github.com/ReviewStage/stage-cli/blob/main/LICENSE\"><img src=\"https://img.shields.io/npm/l/stagereview.svg\" alt=\"license\"></a>\n</p>\n\n## Install\n\n```bash\nnpm install -g stagereview\n```\n\nThen add the skill to your agent:\n\n```bash\nnpx skills add ReviewStage/stage-cli\n```\n\n## Uninstall\n\n```bash\nnpx skills remove ReviewStage/stage-cli\nnpm uninstall -g stagereview\n```\n\n## Usage\n\nIn your AI agent, run:\n\n```\n/stage-chapters\n```\n\nThis organizes your local changes into reviewable chapters and opens a browser UI. Everything happens on your machine.\n\n### Options\n\n| Flag | Description |\n|------|-------------|\n| `--base <ref>` | Base ref to diff against (default: auto-detect main/master) |\n| `--compare <ref>` | Compare ref to diff against `--base` |\n| `--ref <mode>` | Diff scope: `work` (staged + unstaged + untracked), `staged`, or `unstaged` (default: auto-detect) |\n\nExamples:\n\n```bash\n# Review only staged changes\n/stage-chapters --ref staged\n\n# Diff against a specific branch\n/stage-chapters --base feature-a\n\n# Compare two branches\n/stage-chapters main feature\n/stage-chapters main..feature\n/stage-chapters --base main --compare feature\n```\n\n<img width=\"1840\" height=\"1196\" alt=\"Stage CLI\" src=\"https://raw.githubusercontent.com/ReviewStage/stage-cli/main/assets/screenshot.png\" />\n\n## License\n\n[MIT](LICENSE)\n","summary":"ReviewStage/stage-cli is a command-line tool for organizing local code changes into logical “chapters” to help reviewers understand what to examine before diving into the diff. It integrates with an AI agent via a simple `/stage-chapters` command and launches a browser UI, with all processing happening locally. You can tailor the review scope to staged, unstaged, or full work, and choose base/compare refs to generate diffs against specific branches or comparisons. It’s well-suited for developers and teams who want a more structured, review-focused workflow—especially when using AI agents to guide and streamline code reviews.","description":"A viewer for reviewing local code changes in small individual chapters. Works with any AI agent.","stars":210,"language":"TypeScript"},{"owner":"craigmccaskill","repo":"posthorn","url":"https://github.com/craigmccaskill/posthorn","readme":"# Posthorn\n\n[![CI](https://github.com/craigmccaskill/posthorn/actions/workflows/ci.yml/badge.svg)](https://github.com/craigmccaskill/posthorn/actions/workflows/ci.yml)\n[![Docs](https://img.shields.io/badge/docs-posthorn.dev-d4a300)](https://posthorn.dev)\n[![License: Apache-2.0](https://img.shields.io/badge/license-Apache--2.0-blue.svg)](./LICENSE)\n[![Go version](https://img.shields.io/badge/go-1.25%2B-00ADD8.svg)](https://go.dev)\n\n**The unified outbound mail layer for self-hosted projects.** One gateway between every app you self-host and the transactional mail provider you've already picked. Three ingress shapes (HTTP form, HTTP API, SMTP), five transports (Postmark, Resend, Mailgun, AWS SES, outbound-SMTP relay), single Go binary, single TOML config.\n\n**Real-world stacks:** [Hugo + Comentario](https://posthorn.dev/recipes/hugo-comentario/) · [Ghost](https://posthorn.dev/recipes/ghost/) · [Gitea](https://posthorn.dev/recipes/gitea/) · [Umami digest cron](https://posthorn.dev/recipes/umami/) · [Cloudflare Worker](https://posthorn.dev/recipes/cloudflare-worker/)\n\n## Why\n\nNobody wants to run a mail server in 2026. Self-hosted operators use Postmark, Resend, Mailgun, or AWS SES because they're cheap, they handle deliverability properly, and someone else worries about SPF / DKIM / DMARC / bounces / sender reputation.\n\nBut every app you self-host has to integrate with that service **independently.** Your contact form. Your Ghost blog's admin emails. Your Gitea magic links. Your Mastodon notifications. The Cloudflare Worker that fires a password-reset email when someone clicks the link. Each one needs its own copy of the API key, its own integration code, its own quirks around retry and bounce handling. **The same outbound concern duplicated across your stack.**\n\nAnd on cloud hosts that block outbound SMTP — DigitalOcean, AWS Lightsail, Linode, Vultr — the SMTP-only apps don't work at all without a workaround.\n\nPosthorn is the bridge. One container, one config, one set of credentials. Your apps point at Posthorn. Posthorn talks to your provider.\n\n| Where your app connects | What Posthorn does |\n|---|---|\n| HTTP form (contact forms, signups, alert webhooks) | Honeypot + Origin/Referer + rate limit + optional CSRF; templates the email; sends |\n| HTTP API mode (workers, cron, payment handlers, internal services) | `Authorization: Bearer` auth; JSON body; idempotent retries; per-request `to_override` for transactional sends |\n| SMTP listener (Ghost, Gitea, Mastodon, Matrix, NextCloud, Authentik, anything that emits SMTP) | AUTH PLAIN or client-cert; STARTTLS-required; sender + recipient allowlists; parses MIME; forwards via HTTP API transport |\n\nAll three ingresses converge on one `transport.Message` and one outbound provider — pick from Postmark, Resend, Mailgun, AWS SES, or an outbound-SMTP relay.\n\n## What Posthorn is not\n\nTo save you a wrong turn:\n\n| | What it does | Look at instead |\n|---|---|---|\n| **Not a mail server** | No mailbox storage, no IMAP/JMAP, no DKIM key management, no MX target | [Stalwart](https://stalw.art), [Mailcow](https://mailcow.email), [iRedMail](https://www.iredmail.org) |\n| **Not its own outbound infrastructure** | Posthorn relays through a provider you chose; it doesn't run its own SMTP fleet or manage IP reputation | [Postal](https://postalserver.io), [Hyvor Relay](https://hyvor.com/relay) |\n| **Not a marketing email platform** | No list management, no segmentation, no campaign dashboard | [Listmonk](https://listmonk.app) |\n| **Not webmail / a mailbox UI** | No interface for reading mail | Roundcube, Snappymail (with a mail server) |\n\nThe wedge is **the integration layer** between your self-hosted apps and the transactional provider you've already picked.\n\n## Documentation\n\n**[posthorn.dev](https://posthorn.dev)** — getting started, configuration reference, deployment guides, feature deep-dives, security model, HTTP API reference, FAQ. Ten recipes covering contact forms, newsletter signups, multi-form sites, monitoring alerts, Cloudflare Workers, internal SMTP relay (Docker Compose), and full case studies for Hugo+Comentario, Ghost, Gitea, and self-hosted Umami digests.\n\nFor project history and the v1.0 spec, see [`spec/`](./spec/).\n\n## Quick start (Docker)\n\n```yaml\n# docker-compose.yml\nservices:\n  posthorn:\n    image: ghcr.io/craigmccaskill/posthorn:latest\n    restart: unless-stopped\n    volumes:\n      - ./posthorn.toml:/etc/posthorn/config.toml:ro\n    environment:\n      POSTMARK_API_KEY: ${POSTMARK_API_KEY}\n    ports:\n      - \"127.0.0.1:8080:8080\"   # bind to loopback; reverse-proxy from your front door\n```\n\n```toml\n# posthorn.toml\n[[endpoints]]\npath = \"/api/contact\"\nto = [\"you@example.com\"]\nfrom = \"Contact Form <noreply@example.com>\"\nhoneypot = \"_gotcha\"\nallowed_origins = [\"https://example.com\"]\nrequired = [\"name\", \"email\", \"message\"]\nsubject = \"Contact from {{.name}}\"\nbody = \"\"\"\nFrom: {{.name}} <{{.email}}>\n\n{{.message}}\n\"\"\"\nredirect_success = \"/thank-you\"\n\n[endpoints.transport]\ntype = \"postmark\"\n\n[endpoints.transport.settings]\napi_key = \"${env.POSTMARK_API_KEY}\"\n\n[endpoints.rate_limit]\ncount = 5\ninterval = \"1m\"\n```\n\nReverse-proxy `/api/contact` from your front door (Caddy, nginx, Traefik) to `http://posthorn:8080`. Point your form's `action` at `/api/contact`. Done.\n\nFull walkthrough: [posthorn.dev/getting-started/quick-start](https://posthorn.dev/getting-started/quick-start/).\n\n## API mode (server-to-server)\n\nFor Workers, cron jobs, internal services — anything that speaks JSON instead of forms:\n\n```toml\n[[endpoints]]\npath = \"/api/transactional\"\nto = [\"fallback@yourdomain.com\"]\nfrom = \"YourApp <noreply@yourdomain.com>\"\nauth = \"api-key\"\napi_keys = [\"${env.WORKER_KEY_PRIMARY}\", \"${env.WORKER_KEY_BACKUP}\"]\nrequired = [\"subject_line\", \"message\"]\nsubject = \"{{.subject_line}}\"\nbody = \"{{.message}}\"\n\n[endpoints.transport]\ntype = \"postmark\"\n\n[endpoints.transport.settings]\napi_key = \"${env.POSTMARK_API_KEY}\"\n```\n\n```bash\ncurl -X POST https://posthorn.yourdomain.com/api/transactional \\\n  -H \"Authorization: Bearer $WORKER_KEY_PRIMARY\" \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Idempotency-Key: reset:user-123:$(date -u +%FT%H)\" \\\n  --data '{\n    \"to_override\": \"alice@example.com\",\n    \"subject_line\": \"Reset your password\",\n    \"message\": \"Click here: https://app.example.com/reset/abc\"\n  }'\n```\n\nFull walkthrough: [posthorn.dev/recipes/cloudflare-worker](https://posthorn.dev/recipes/cloudflare-worker/).\n\n## SMTP listener (Ghost / Gitea / Mastodon / Authentik)\n\nFor apps that speak SMTP natively and can't be reconfigured to call an HTTP API:\n\n```toml\n[smtp_listener]\nlisten          = \":2525\"\nrequire_tls     = true\ntls_cert        = \"/etc/posthorn/cert.pem\"\ntls_key         = \"/etc/posthorn/key.pem\"\nauth_required   = \"smtp-auth\"\nallowed_senders = [\"*@yourdomain.com\"]\nmax_recipients_per_session = 10\nmax_message_size = \"1MB\"\n\n[[smtp_listener.smtp_users]]\nusername = \"ghost\"\npassword = \"${env.GHOST_SMTP_PASSWORD}\"\n\n[smtp_listener.transport]\ntype = \"postmark\"\n\n[smtp_listener.transport.settings]\napi_key = \"${env.POSTMARK_API_KEY}\"\n```\n\nPoint Ghost (or any app's SMTP config) at `posthorn.yourdomain.com:2525` with the username/password above. Posthorn parses the MIME, builds a `transport.Message`, forwards via Postmark.\n\nFull doc: [posthorn.dev/features/smtp-ingress](https://posthorn.dev/features/smtp-ingress/).\n\n## Picking a transport\n\n| Transport | Best for | Auth | Body |\n|---|---|---|---|\n| **Postmark** | Transactional email, strong deliverability defaults | `X-Postmark-Server-Token` | JSON |\n| **Resend** | Modern HTTP API, developer-friendly dashboard | `Authorization: Bearer` | JSON |\n| **Mailgun** | Higher-volume transactional, US + EU regions | HTTP Basic | multipart/form-data |\n| **AWS SES** | AWS-native deployments, cheapest at volume | AWS SigV4 (bespoke) | JSON |\n| **Outbound SMTP** | Any STARTTLS-capable relay (Mailtrap, your Postfix smarthost, etc.) | AUTH PLAIN | SMTP DATA |\n\nSwitching providers is a TOML edit — every transport implements the same `Transport` interface. See [posthorn.dev/configuration/transports](https://posthorn.dev/configuration/transports/) for per-provider config.\n\n## Production checklist\n\nBefore pointing real traffic at Posthorn:\n\n1. **DNS** — SPF, DKIM, and DMARC records on your sending domain. Without these your mail goes to spam. See [posthorn.dev/security/dns](https://posthorn.dev/security/dns/).\n2. **Reverse proxy** — Posthorn does not terminate TLS. Run it behind Caddy, nginx, or Traefik. See [posthorn.dev/deployment/reverse-proxy](https://posthorn.dev/deployment/reverse-proxy/).\n3. **`allowed_origins`** (form-mode endpoints) — set this to lock submissions to your domain. Without it, anyone can POST to your endpoint.\n4. **`rate_limit`** — set a tight bucket per endpoint (5/minute is a sensible default for a public contact form; API mode rate-limits per matched key).\n5. **`trusted_proxies`** — if behind a reverse proxy, list its CIDR (or use the `cloudflare` named preset) so the rate limiter sees the real client IP.\n6. **`/healthz` and `/metrics`** — auto-registered on the same listener. Wire your Docker healthcheck or Prometheus scrape to these.\n\nThe full operator checklist is on [posthorn.dev](https://posthorn.dev).\n\n## What's in v1.0\n\n| Block | Detail |\n|---|---|\n| **Form ingress** | Form-encoded + multipart bodies; honeypot, Origin/Referer fail-closed, rate limit, optional CSRF tokens |\n| **API mode** | `auth = \"api-key\"` with Bearer tokens (constant-time compare); JSON content type; idempotency keys (24h, in-memory LRU); per-request `to_override` |\n| **Transports** | Postmark, Resend, Mailgun, AWS SES (bespoke SigV4), outbound-SMTP relay |\n| **SMTP listener** | TCP listener with AUTH PLAIN / client-cert, STARTTLS-required, sender + recipient allowlists, size cap, MIME → `transport.Message` |\n| **Operations** | `/healthz`, `/metrics` (Prometheus exposition), dry-run mode, IP-stripping, named `trusted_proxies` presets (Cloudflare) |\n| **Failure handling** | 1 retry on transient/5xx (1s), 1 retry on 429 (5s), 10s hard timeout |\n| **Logging** | Structured JSON; UUIDv4 submission IDs and SMTP session IDs; `transport_message_id` in `submission_sent` |\n| **Deployment** | Single Go binary, multi-arch distroless Docker image at `ghcr.io/craigmccaskill/posthorn` |\n\nThree external Go dependencies in the whole module: TOML parser, UUID library, LRU cache. Every transport is bespoke — no vendor SDK in transport code.\n\n## Roadmap\n\n**v2 — platform maturity.** SQLite submission log, retry queue across restarts, suppression list (auto on hard bounces), durable idempotency, lifecycle event callbacks via HMAC-signed webhook, RFC 8058 one-click unsubscribe, file attachments, HTML body, multiple outputs per endpoint (email + webhook + log fan-out), multi-tenant SMTP routing.\n\n**v3 — speculative.** Admin UI, proof-of-work spam challenge, PGP encryption. Depends on community traction.\n\nFull trajectory: [posthorn.dev/roadmap](https://posthorn.dev/roadmap/).\n\n## Build from source\n\nRequires Go 1.25+.\n\n```bash\ngit clone https://github.com/craigmccaskill/posthorn\ncd posthorn/core\ngo build -o /tmp/posthorn ./cmd/posthorn\n/tmp/posthorn version\n```\n\n## Contributing\n\nThe v1.0 specification is in [`spec/`](./spec/) (brief, PRD, architecture). The architecture doc at [`spec/03-architecture.md`](./spec/03-architecture.md) is the source of truth for design questions.\n\nSecurity issues: see [SECURITY.md](./SECURITY.md) — do **not** open public issues for security disclosures.\n\n## License\n\nApache-2.0. See [LICENSE](./LICENSE).\n","summary":"Posthorn provides a unified outbound mail layer for self-hosted applications, acting as a single gateway between many apps and your chosen transactional email provider. It supports three ingress modes—HTTP form, HTTP API, and an SMTP listener—so you can feed it mail from both modern web services and apps that only emit SMTP, then forward everything through one configured transport (Postmark, Resend, Mailgun, AWS SES, or an outbound SMTP relay). Features include authentication, anti-abuse protections for form submissions, idempotent retries for API requests, and configurable allowlists for SMTP forwarding. It’s best for self-hosters and operators who want to avoid duplicating email integration code across apps and who need a workaround for environments that block outbound SMTP.","description":"Self-hosted email gateway between your apps and a transactional mail provider (Postmark, Resend, Mailgun, AWS SES, or outbound-SMTP). Three ingress shapes (HTTP form, HTTP API, SMTP). One Docker container, one TOML config.","stars":180,"language":"Go"},{"owner":"Kaelio","repo":"ktx","url":"https://github.com/Kaelio/ktx","readme":"<h1 align=\"center\">\n  <img src=\"assets/ktx-lockup.svg\" alt=\"ktx\" width=\"500\" />\n</h1>\n\n<h1 align=\"center\">\n  The context layer for data agents\n</h1>\n\n<p align=\"center\">\n  <a href=\"https://www.npmjs.com/package/@kaelio/ktx\"><img src=\"https://img.shields.io/npm/v/@kaelio/ktx?style=flat-square&color=f97316\" alt=\"npm version\" /></a>\n  <a href=\"https://codecov.io/gh/Kaelio/ktx\"><img src=\"https://codecov.io/gh/Kaelio/ktx/graph/badge.svg?branch=main\" alt=\"Codecov\" /></a>\n  <a href=\"https://github.com/Kaelio/ktx/actions/workflows/ci.yml?query=branch%3Amain\"><img src=\"https://img.shields.io/github/actions/workflow/status/Kaelio/ktx/ci.yml?branch=main&label=tests&style=flat-square\" alt=\"Tests\" /></a>\n  <a href=\"https://docs.kaelio.com/ktx/docs/\"><img src=\"https://img.shields.io/badge/docs-ktx-22c55e?style=flat-square\" alt=\"Documentation\" /></a>\n  <a href=\"https://join.slack.com/t/ktxcommunity/shared_invite/zt-3y9b44m1x-LVyNNJD5nwaZHq4XS29LMQ\"><img src=\"https://img.shields.io/badge/slack-join%20community-4A154B?style=flat-square&logo=slack&logoColor=white\" alt=\"Join the ktx Slack community\" /></a>\n  <a href=\"https://github.com/Kaelio/ktx/blob/main/LICENSE\"><img src=\"https://img.shields.io/badge/license-Apache%202.0-blue?style=flat-square\" alt=\"License\" /></a>\n  <a href=\"https://www.ycombinator.com/companies?batch=P25\"><img src=\"https://img.shields.io/badge/Y%20Combinator-P25-orange?style=flat-square\" alt=\"Y Combinator P25\" /></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://docs.kaelio.com/ktx/docs/getting-started/quickstart\"><b>Quickstart</b></a> ·\n  <a href=\"https://docs.kaelio.com/ktx/docs/cli-reference/ktx\"><b>CLI Reference</b></a> ·\n  <a href=\"https://docs.kaelio.com/ktx/docs/ai-resources/agent-quickstart\"><b>Agent Setup</b></a> ·\n  <a href=\"https://join.slack.com/t/ktxcommunity/shared_invite/zt-3y9b44m1x-LVyNNJD5nwaZHq4XS29LMQ\"><b>Slack</b></a>\n</p>\n\n---\n\n**ktx** is a self-improving context layer that teaches agents how to query your\nwarehouse accurately - from approved metric definitions, joinable columns, and\nbusiness knowledge it builds and maintains for you.\n\n> [!NOTE]\n> Run **ktx** with your own LLM API keys or a **Claude Pro/Max** subscription.\n> No extra usage billing from **ktx**.\n\n<p align=\"center\">\n  <img src=\"docs-site/public/images/ingestion-flow-transparent.svg\" alt=\"ktx ingestion flow from source systems through validation to wiki and semantic-layer outputs\" width=\"900\" />\n</p>\n\n## Why ktx\n\nGeneral-purpose agents struggle on data tasks. They re-explore your warehouse\non every question, invent their own metric logic, and return numbers that\ndon't match approved definitions.\n\nTraditional semantic layers don't fix this. They demand constant manual\nupkeep and don't absorb the rest of your company's knowledge.\n\n**ktx** does both, automatically:\n\n- **Learns from company knowledge.** Ingests wiki content, organizes it,\n  removes duplicates, and flags contradictions for human review.\n- **Maps the data stack.** Samples tables, captures metadata and usage\n  patterns, detects joinable columns, and annotates sources so agents write\n  better queries.\n- **Builds a semantic layer.** Combines raw tables and high-level metrics\n  through a join graph that automatically resolves chasm and fan traps, so\n  agents fetch metrics declaratively instead of rewriting canonical SQL each\n  time.\n- **Serves agents at execution.** Exposes CLI and MCP tools with combined\n  full-text and semantic search across wiki and semantic-layer entities.\n\n## How ktx compares\n\n|  | General-purpose agent | Traditional semantic layer | **ktx** |\n| --- | :---: | :---: | :---: |\n| Builds warehouse context automatically | — | — | ✓ |\n| Detects joinable columns + resolves fan/chasm traps | — | Manual | ✓ |\n| Approved, reusable metric definitions | — | ✓ | ✓ |\n| Absorbs wiki / Notion / team knowledge | — | — | ✓ |\n| Flags contradictions across sources | — | — | ✓ |\n| Ships CLI + MCP for agent execution | Partial | — | ✓ |\n| Read-only by design | n/a | n/a | ✓ |\n\n## Who is ktx for\n\n**Use ktx if you:**\n\n- Want agents like Claude Code, Codex, Cursor, or OpenCode to query your\n  warehouse with approved metric definitions\n- Have business knowledge scattered across dbt, Looker, Metabase, Notion, and\n  team wikis\n- Need agents to reuse canonical SQL instead of inventing it on every prompt\n\n**Skip ktx if you:**\n\n- You don't have a SQL warehouse - **ktx** sits on top of one\n- You only need one ad-hoc query - `psql` or a notebook will do\n\nWorks with PostgreSQL, Snowflake, BigQuery, ClickHouse, MySQL, SQL Server, and\nSQLite. Integrates with dbt, MetricFlow, LookML, Looker, Metabase, and Notion.\n\n## Quick Start\n\n```bash\nnpm install -g @kaelio/ktx\nktx setup\nktx status\n```\n\n`ktx setup` creates or resumes a local **ktx** project, configures providers\nand connections, builds context, and installs agent integration.\n\nExample `ktx status` after setup:\n\n```text\nktx project: /home/user/analytics\nProject ready: yes\nLLM ready: yes (claude-sonnet-4-6)\nEmbeddings ready: yes (text-embedding-3-small)\nDatabases configured: yes (warehouse)\nContext sources configured: yes (dbt_main)\nktx context built: yes\nAgent integration ready: yes (codex:project)\n```\n\n> [!TIP]\n> Already using an agent? Ask Claude Code, Codex, Cursor, or OpenCode from\n> your project directory:\n>\n> ```text\n> Run npx skills add Kaelio/ktx --skill ktx and use the ktx skill to install\n> and configure ktx in this project.\n> ```\n\n> [!IMPORTANT]\n> If `ktx status` prints `ktx mcp start --project-dir ...`, run it before\n> opening your agent client.\n\n## First commands\n\n| Command | Purpose |\n| --- | --- |\n| `ktx setup` | Create, resume, or update a **ktx** project |\n| `ktx status` | Check project readiness |\n| `ktx ingest` | Build context for every configured connection |\n| `ktx sl \"revenue\"` | Search semantic sources |\n| `ktx wiki \"refund policy\"` | Search local wiki pages |\n| `ktx mcp start` | Start the MCP server for agent clients |\n\nSee the [CLI Reference](https://docs.kaelio.com/ktx/docs/cli-reference/ktx)\nfor every command, flag, and option.\n\n## Project Layout\n\n```text\nmy-project/\n├── ktx.yaml                         # Project configuration\n├── semantic-layer/<connection-id>/  # YAML semantic sources\n├── wiki/global/                     # Shared business context\n├── wiki/user/<user-id>/             # User-scoped notes\n├── raw-sources/<connection-id>/     # Ingest artifacts and reports\n└── .ktx/                            # Local state and secrets, git-ignored\n```\n\nCommit `ktx.yaml`, `semantic-layer/`, and `wiki/`. Keep `.ktx/` local.\n\nProject resolution defaults to `KTX_PROJECT_DIR`, then the nearest `ktx.yaml`,\nthen the current directory. Pass `--project-dir <path>` when scripting.\n\n## FAQ\n\n- **Does ktx send my schema or query results to a hosted service?**\n  No. **ktx** runs locally. The only data leaving your machine is what you\n  send to the LLM provider you configured.\n- **Which LLM backends are supported?**\n  Anthropic API, Google Vertex AI, AI Gateway, and the local Claude Code\n  session through the Claude Agent SDK. See\n  [LLM configuration](https://docs.kaelio.com/ktx/docs/guides/llm-configuration).\n- **How is ktx different from a dbt or MetricFlow semantic layer?**\n  **ktx** *ingests* those layers and combines them with raw-table\n  introspection and wiki content. Agents get one searchable surface instead\n  of three disconnected ones - and **ktx** flags contradictions across\n  sources.\n- **Does ktx need a running server?**\n  There is no hosted service. The local MCP daemon runs on demand via\n  `ktx mcp start` when an agent client needs it.\n- **Is my warehouse safe?**\n  Yes. Connections are read-only - **ktx** never writes to your database.\n\n## Docs\n\n- [Quickstart](https://docs.kaelio.com/ktx/docs/getting-started/quickstart)\n- [The Context Layer](https://docs.kaelio.com/ktx/docs/concepts/the-context-layer)\n- [Building Context](https://docs.kaelio.com/ktx/docs/guides/building-context)\n- [CLI Reference](https://docs.kaelio.com/ktx/docs/cli-reference/ktx)\n- [Agent Quickstart](https://docs.kaelio.com/ktx/docs/ai-resources/agent-quickstart)\n- [Community & Support](https://docs.kaelio.com/ktx/docs/community/support)\n\n## Community\n\n- **[Slack](https://join.slack.com/t/ktxcommunity/shared_invite/zt-3y9b44m1x-LVyNNJD5nwaZHq4XS29LMQ)** — ask questions, share what you're building, and chat with maintainers.\n- **[GitHub Issues](https://github.com/Kaelio/ktx/issues)** — report bugs and request features.\n- **[Contributing](https://docs.kaelio.com/ktx/docs/community/contributing)** — set up the repo, run tests, and open a PR.\n\n## Development\n\n```bash\ngit clone https://github.com/kaelio/ktx.git\ncd ktx\npnpm install\nuv sync --all-groups\npnpm run build\npnpm run check\n```\n\n**ktx** is a pnpm + uv workspace:\n\n| Path | Purpose |\n| --- | --- |\n| `packages/cli` | TypeScript CLI and published npm package source |\n| `packages/cli/src/context` | Core context engine |\n| `packages/cli/src/llm` | LLM and embedding providers |\n| `packages/cli/src/connectors` | Database scan connectors |\n| `python/ktx-sl` | Semantic-layer query planning |\n| `python/ktx-daemon` | Portable compute service |\n\nLocal development CLI:\n\n```bash\npnpm run setup:dev\npnpm run link:dev\nktx-dev --help\n```\n\nUseful checks:\n\n```bash\npnpm run type-check\npnpm run test\npnpm run dead-code\nuv run pytest -q\n```\n\n## Telemetry\n\n**ktx** collects anonymous usage telemetry from interactive CLI runs to\nimprove setup, command reliability, and data-agent workflows. No file paths,\nhostnames, SQL, schema names, error messages, or argv are recorded. See\n[Telemetry](https://docs.kaelio.com/ktx/docs/community/telemetry) for the\nevent catalog and opt-out options.\n\n## License\n\n**ktx** is licensed under the Apache License, Version 2.0. See `LICENSE`.\n\n## Star History\n\n<p align=\"center\">\n  <a href=\"https://star-history.com/#Kaelio/ktx&Date\">\n    <img src=\"assets/star-history.svg\" alt=\"ktx Star History Chart\" width=\"700\" />\n  </a>\n</p>\n","summary":"Ktx is a self-improving context layer designed to bridge the gap between company knowledge and data infrastructure for AI agents. It automatically maps data warehouses, manages metric definitions, and ingests organizational documentation to prevent agents from relying on hallucinated logic or incorrect SQL. By resolving complex join graph issues and providing a unified interface via CLI and MCP tools, it ensures agents consistently retrieve accurate, source-verified data. This project is ideal for data teams and engineers building AI-driven analytics systems who need a reliable, automated way to ground agents in their company's specific business context.","description":"ktx is an executable context layer for data and analytics agents 🐙 Allow Claude Code, Codex, and any AI agent to query data accurately through MCP with skills, memory and a semantic layer","stars":609,"language":"TypeScript"},{"owner":"tomfunk","repo":"fungible","url":"https://github.com/tomfunk/fungible","readme":"<img src=\"logo.png\" alt=\"fungible\" width=\"400\" />\n\n[![CI](https://github.com/tomfunk/fungible/actions/workflows/ci.yml/badge.svg)](https://github.com/tomfunk/fungible/actions/workflows/ci.yml)\n\nA terminal UI for personal finance. Syncs transactions from [Plaid](https://plaid.com/docs/quickstart/), imports CSVs, and lets you categorize, search, tag, and analyze spending — all from the keyboard.\n\n<img src=\"docs/screenshots/demo.gif\" alt=\"fungible demo\" width=\"720\" />\n\n<details>\n<summary>Screenshots</summary>\n\n| | |\n|---|---|\n| ![Dashboard](docs/screenshots/dashboard.png) | ![Transactions](docs/screenshots/transactions.png) |\n| ![Trends](docs/screenshots/trends.png) | ![Net Worth](docs/screenshots/net-worth.png) |\n| ![Tags](docs/screenshots/tags.png) | ![Financial Health](docs/screenshots/financial-health.png) |\n| ![Rules](docs/screenshots/rules.png) | ![Accounts](docs/screenshots/accounts.png) |\n\n</details>\n\n## Features\n\n- **Plaid sync** — connect bank accounts and pull transactions automatically; 15-min debounce with force-sync option\n- **CSV import** — import statement exports from any bank with flexible column mapping\n- **Manual assets** — track a house, car, or other asset by name and value\n- **Category rules** — substring and regex rules that auto-categorize transactions, with optional amount filters\n- **Name rules** — rename how transactions display, with optional amount filters\n- **Spending flexibility** — tag categories as fixed / flexible / discretionary; view breakdown on Dashboard\n- **Manual edits** — pin a category or display name to a specific transaction; survives re-syncs\n- **Ignore** — soft-hide transactions from totals (transfers, reimbursements, etc.)\n- **Hidden categories** — exclude categories like Transfer from all totals and charts\n- **Tags** — label transactions across accounts (trips, projects, events) and view summaries by tag\n- **Net worth** — balance history with asset/liability breakdown; view by account or by type; scroll by week, month, quarter, or year\n- **Financial health** — cash and liquid runway, FIRE number and progress, years to retirement with adjustable assumptions\n- **Dedup review** — review and remove CSV transactions that duplicate Plaid imports\n- **Time ranges** — view Dashboard by week, month, quarter, year, or all time\n- **Trends** — bar charts for expenses, income, net, or any category; per-range aggregation (week / month / quarter / year)\n- **Delta mode** — toggle on Dashboard to see per-category spending deltas vs prior period, same period last year, and 12-month rolling average; heat-map coloring by deviation\n- **Regex search** — `/` on Dashboard or Transactions filters by name using a regular expression; search is shared when navigating between Dashboard, Transactions, and Trends\n- **MCP server** — Claude can read and manage your finances via the Model Context Protocol\n- **HTTP API** — REST-style API server for scripting and automation\n- **Daily backups** — database is backed up to `~/.fungible/backups/` on startup once per day; keeps the last 7 backups by default, configurable via `FUNGIBLE_BACKUP_DAYS`\n\n## Try it (no account needed)\n\n```bash\nfungible --demo\n```\n\nSpins up a fully pre-loaded instance with fake accounts, transactions, tags, and rules — completely isolated from any real data. Good for exploring all the screens before connecting a bank.\n\n## Install\n\n### Homebrew (recommended)\n\n```bash\nbrew tap tomfunk/fungible\nbrew install fungible\nfungible --setup   # first-time setup wizard\nfungible\n```\n\n### From source\n\nRequires Node.js 22+.\n\n```bash\nnpm install\nnpm run dev\n```\n\nOn first run, use `--setup` to configure credentials:\n\n```bash\nnpm run dev -- --setup\n```\n\nData and config are stored at `~/.fungible/`. Plaid access tokens are encrypted at rest using a key file at `~/.fungible/key` — do not delete this file or you will need to re-link your bank accounts. You'll need a free [Plaid](https://plaid.com) developer account to sync bank transactions (sandbox tier works).\n\n## Running\n\n| Command | What starts |\n|---------|-------------|\n| `fungible` | TUI + MCP server (HTTP, port 3741) + REST API (port 3456) |\n| `fungible mcp` | stdio MCP server only — use this in your Claude Desktop config |\n| `fungible api` | REST API server only |\n\nWhen you run the TUI, the MCP server and REST API start automatically in the background on their default ports. They share the same database connection as the TUI, so any changes made through them are reflected the next time you navigate in the UI.\n\nThe `FUNGIBLE_MCP_PORT` and `FUNGIBLE_API_PORT` env vars (in `~/.fungible/.env`) override the defaults.\n\n## Screens\n\n| Key | Screen |\n|-----|--------|\n| `1` | Dashboard |\n| `2` | Transactions |\n| `3` | Trends |\n| `4` | Net Worth |\n| `5` | Tags |\n| `6` | Financial Health |\n| `7` | Rules |\n| `8` | Accounts |\n| `q` | Quit |\n| `Esc` | Back / clear filter |\n\n## Key bindings\n\n### Dashboard `[1]`\n\n| Key | Action |\n|-----|--------|\n| `r` | Cycle time range (Week → Month → Quarter → Year → All Time) |\n| `← →` | Previous / next period |\n| `Tab` | Cycle views: Categories → Flex → Account picker |\n| `↑ ↓` | Select category (Categories view) or account (Account view) |\n| `Enter` | Drill into transactions for selected category / account |\n| `Space` | Toggle account filter (Account view) |\n| `c` | Clear account filter |\n| `d` | Toggle delta mode (spending vs prior period / same period last year / 12-month avg) |\n| `/` | Search transactions by name (regex); filters category totals live |\n\nIn **Categories** view, spending is broken down by category with bar charts. In **Flex** view, spending is grouped by flexibility tier (fixed / flexible / discretionary / untagged). In **Account** view, select an account to filter all dashboard data to that account.\n\nIn **delta mode**, the bar chart is replaced by three delta columns — vs prev period, vs same period last year, and vs 12-month rolling average — color-coded green / yellow / red by deviation. Not available for the All Time range. An active search carries through when switching to Transactions (`2`) or Trends (`3`).\n\n### Transactions `[2]`\n\n| Key | Action |\n|-----|--------|\n| `↑ ↓` | Navigate |\n| `← →` | Previous / next month (when date filter active) |\n| `s` | Cycle sort: Date ↓↑ → Description ↑↓ → Amount ↓↑ → Category ↑↓ |\n| `/` | Search by name (regex); inherited from Dashboard if navigated with an active search |\n| `a` | Show all transactions |\n| `u` | Show uncategorized only |\n| `e` | Edit: rename display name or change category |\n| `g` | Tag panel: add/remove tags on selected transaction |\n| `G` | Tag all visible transactions at once (use `/` to filter first) |\n| `c` | Undo manual category override |\n| `i` | Ignore / un-ignore selected transaction |\n| `x` | Delete selected transaction (CSV-imported only) |\n| `Esc` | Clear active filter (peels off one at a time) |\n\n### Trends `[3]`\n\n| Key | Action |\n|-----|--------|\n| `Tab` | Cycle views: Expenses → Income → Net → [each category] |\n| `↑ ↓` | Navigate periods |\n| `r` | Cycle aggregation range (Week / Month / Quarter / Year) |\n| `Enter` | Drill into transactions for selected period |\n\n### Net Worth `[4]`\n\n| Key | Action |\n|-----|--------|\n| `Tab` | Toggle: by account ↔ by type |\n| `r` | Cycle history range (Week / Month / Quarter / Year) |\n| `↑ ↓` | Scroll history |\n\nShows assets (depository, investment, manual), liabilities (credit), and net worth. History shows one snapshot per period (last sync within each bucket), scrollable with up/down.\n\n### Tags `[5]`\n\n| Key | Action |\n|-----|--------|\n| `↑ ↓` | Select tag |\n| `/` | Search tags |\n| `Enter` | Open tag detail (income / expenses / category breakdown) |\n| `t` | View all transactions for selected tag |\n| `a` | Add new tag |\n| `n` | Rename selected tag |\n| `x` | Delete selected tag |\n\nIn tag detail, `↑ ↓` selects a category and `Enter` drills into transactions for that tag + category. `← →` cycles to the previous/next tag.\n\n### Financial Health `[6]`\n\nDisplays a full financial picture across four sections:\n\n- **Snapshot** — savings rate (color-coded) and estimated monthly income\n- **Runway** — months of cash and liquid coverage at current spending\n- **Debt** — net cash position (checking minus credit debt), months to debt-free at current savings rate (hidden if no debt)\n- **Retirement** — net worth, FIRE number with progress bar, Coast FIRE (years until growth alone covers retirement if you stop saving now), estimated years to FIRE\n\n| Key | Action |\n|-----|--------|\n| `↑ ↓` | Select assumption dial |\n| `← →` | Adjust selected dial value |\n| `r` | Reset selected dial to default |\n\n**Dials:** Monthly spending (±$100, default = avg past 12 months), Monthly savings (±$100, default = avg surplus), Withdrawal rate (±0.5%, default = 4%), Growth rate (±1%, default = 7%).\n\nLiquid assets = cash + brokerage (excludes 401k, IRA, pension).\n\n### Rules `[7]`\n\nThree sections, cycle with `Tab`: **Category Rules**, **Name Rules**, **Categories**.\n\n**Category Rules / Name Rules:**\n\n| Key | Action |\n|-----|--------|\n| `/` | Search rules |\n| `a` | Add rule |\n| `e` / `Enter` | Edit selected rule |\n| `x` | Delete selected rule |\n\nCategory rules support substring and regex matching with optional min/max amount filters. Name rules support the same matching plus optional amount filters.\n\n**Categories:**\n\n| Key | Action |\n|-----|--------|\n| `a` | Add new category |\n| `n` | Rename category (cascades to all transactions, rules, and hidden settings) |\n| `x` | Delete category (resets affected transactions to Uncategorized) |\n| `v` | Toggle hidden (hidden categories are excluded from totals) |\n| `f` | Cycle flexibility tier: none → fixed → flexible → discretionary |\n\n### Accounts `[8]`\n\n| Key | Action |\n|-----|--------|\n| `Tab` | Cycle views: Accounts → Add Data → Dupes |\n| `↑ ↓` | Select account |\n| `e` | Edit account type / subtype |\n| `n` | Set or clear a nickname (shown in place of the bank-assigned name) |\n| `v` | Update value (manual assets only) |\n| `r` | Repair Plaid link for selected account |\n| `s` | Force sync (bypasses 15-min cooldown) |\n| `x` | Delete selected account |\n| `l` | Link a new bank account via Plaid |\n\n**Add Data** options: `[l]` link bank via Plaid, `[c]` import CSV, `[m]` add manual asset (house, car, etc.), `[s]` force sync.\n\n**Dupes** tab shows CSV transactions that match Plaid imports. `[x]` deletes the selected CSV duplicate; `[X]` deletes all.\n\n## Scripts\n\n```bash\n# Link a new bank account via Plaid (also available from Accounts screen)\nnpm run link\n\n# Import a CSV file\nnpm run import-csv /path/to/file.csv\n\n# Seed default category rules\nnpm run seed-rules\n```\n\n## HTTP API\n\nExposes the same tools as the MCP server over HTTP — useful for scripting and automation. Starts automatically on port 3456 when you run the TUI, or run it standalone:\n\n```bash\nfungible api\n# or: npm run api\n# Listening on http://localhost:3456\n```\n\n**Endpoint:** `POST /tools/:name` with a JSON body.\n\n```bash\ncurl -X POST http://localhost:3456/tools/spending_summary \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Bearer <key>\" \\\n  -d '{\"year\": 2026, \"month\": 5}'\n```\n\n**Configuration** (in `~/.fungible/.env`):\n\n| Variable | Default | Description |\n|----------|---------|-------------|\n| `FUNGIBLE_API_KEY` | _(none)_ | Bearer token required on all requests. If unset, auth is skipped (dev only). |\n| `FUNGIBLE_API_PORT` | `3456` | Port to listen on. |\n\nAvailable tools: same set as the MCP server below.\n\n## MCP Server\n\nExposes your financial data to Claude via the [Model Context Protocol](https://modelcontextprotocol.io).\n\n**Two connection modes:**\n\n- **stdio** — Claude Desktop spawns `fungible mcp` as a child process. Always works, even when the TUI isn't open. When the TUI is running, writes notify it automatically so the UI refreshes. Use this if you're not sure which to pick.\n\n- **HTTP** — when the TUI is running, it starts an HTTP MCP server on port 3741 (`FUNGIBLE_MCP_PORT` to override). Point Claude at `http://localhost:3741/mcp` instead of using a command — writes are in-process so the TUI updates instantly. Only works while the TUI is open.\n\nAdd to your Claude config (`~/Library/Application Support/Claude/claude_desktop_config.json`):\n\n**stdio — Homebrew:**\n```json\n{\n  \"mcpServers\": {\n    \"fungible\": {\n      \"command\": \"/opt/homebrew/bin/node\",\n      \"args\": [\"--no-warnings\", \"--import\", \"tsx/esm\", \"/opt/homebrew/lib/node_modules/fungible/mcp/server.ts\"]\n    }\n  }\n}\n```\n\n**stdio — from source:**\n```json\n{\n  \"mcpServers\": {\n    \"fungible\": {\n      \"command\": \"node\",\n      \"args\": [\"--no-warnings\", \"--import\", \"tsx/esm\", \"/path/to/fungible/mcp/server.ts\"]\n    }\n  }\n}\n```\n\n**HTTP (TUI must be running):**\n```json\n{\n  \"mcpServers\": {\n    \"fungible\": {\n      \"url\": \"http://localhost:3741/mcp\"\n    }\n  }\n}\n```\n\nAvailable tools:\n\n| Tool | Description |\n|------|-------------|\n| `spending_summary` | Income, expenses, and breakdown by category for a given month |\n| `list_transactions` | Search and filter transactions |\n| `edit_transaction` | Rename display name or change category |\n| `clear_edit` | Remove a manual category or name override |\n| `ignore_transaction` | Ignore / un-ignore a transaction |\n| `list_rules` | List category rules |\n| `add_rule` | Add a category rule |\n| `delete_rule` | Delete a category rule |\n| `list_name_rules` | List name rules |\n| `add_name_rule` | Add a name rule |\n| `delete_name_rule` | Delete a name rule |\n| `list_hidden_categories` | List hidden categories |\n| `toggle_hidden_category` | Show or hide a category |\n| `list_accounts` | List connected accounts |\n| `sync` | Pull latest transactions from Plaid |\n| `uncategorized_summary` | Most common uncategorized transaction names |\n| `list_tags` | List tags with transaction counts |\n| `tag_summary` | Income / expenses / category breakdown for a tag |\n| `tag_transaction` | Add or remove a tag on a transaction |\n| `get_balances` | Current balances, net worth, total cash and liquid |\n| `get_financial_health` | Runway, FIRE number, years to retirement |\n| `get_drift` | Per-category spending deltas vs prior period, last year, and 12-month avg |\n| `get_trends` | Month-by-month spending trends for the last N months |\n| `get_finance_guide` | Opinionated personal finance guidance by topic |\n","summary":"Fungible is a keyboard-first terminal UI for managing personal finance, designed to help you sync, import, and analyze spending quickly. It pulls transactions from Plaid, supports flexible CSV imports with column mapping, and lets you apply rules to auto-categorize and rename transactions, tag them, and fine-tune how they affect totals via ignoring or hidden categories. The app provides dashboard views for trends, net worth history, and “financial health” metrics such as runway and FIRE progress, with helpful features like dedup review, time-range aggregation, and delta comparisons. It’s a great fit for people who prefer a fast, text-based workflow (and those using Claude via an MCP server or scripting via the HTTP API) rather than traditional spreadsheet or dashboard tools.","description":"Terminal UI for personal finance — Plaid sync, CSV import, AI assistant, and MCP server","stars":44,"language":"TypeScript"},{"owner":"human-avatar","repo":"skills-for-humanity","url":"https://github.com/human-avatar/skills-for-humanity","readme":"<div align=\"center\">\n<br>\n\n# skills-for-humanity\n\n<br>\n\n**Structured reasoning methodologies from history's most rigorous thinkers, packaged as Claude Code skills.**\n\n<br>\n\n[![npm](https://img.shields.io/npm/v/@human-avatar/skills-for-humanity?style=flat-square&color=black&label=npm)](https://www.npmjs.com/package/@human-avatar/skills-for-humanity)&nbsp;&nbsp;![](https://img.shields.io/badge/216_skills-black?style=flat-square)&nbsp;&nbsp;![](https://img.shields.io/badge/35_categories-black?style=flat-square)&nbsp;&nbsp;![](https://img.shields.io/badge/Claude_Code-compatible-black?style=flat-square)\n\n<br>\n</div>\n\n| | Skills |\n|---|---|\n| **Think Sharper** | `/logic` · `/probability` · `/decision` · `/constraint` · `/game-theory` · `/epistemology` · `/investigation` · `/economics` · `/information` · `/cognition` |\n| **Think Differently** | `/creativity` · `/analogy` · `/play` · `/evolution` · `/design` |\n| **Think About People** | `/communication` · `/social` · `/emotional` · `/ethics` · `/identity` · `/narrative` · `/psychology` · `/mindset` · `/writing` · `/linguistics` |\n| **Think in Time & Systems** | `/systems` · `/temporal` · `/historical` · `/resource` · `/strategy` · `/network` · `/ecology` |\n| **See More Clearly** | `/aesthetic` · `/sensory` |\n\n---\n\nEach skill is a complete procedure: a defined problem type, a sequence of moves, a structured output. Not a concept to apply — a method to run.\n\n**Lineage:** [de Bono](https://en.wikipedia.org/wiki/Edward_de_Bono) · [Meadows](https://en.wikipedia.org/wiki/Donella_Meadows) · [Altshuller](https://en.wikipedia.org/wiki/Genrich_Altshuller) · [Minto](https://en.wikipedia.org/wiki/Barbara_Minto) · [Goldratt](https://en.wikipedia.org/wiki/Eliyahu_M._Goldratt) · [Tetlock](https://en.wikipedia.org/wiki/Philip_E._Tetlock) · [Klein](https://en.wikipedia.org/wiki/Gary_Klein) · [Mill](https://en.wikipedia.org/wiki/John_Stuart_Mill) · [Kant](https://en.wikipedia.org/wiki/Immanuel_Kant) · [Aristotle](https://en.wikipedia.org/wiki/Aristotle) · [Noddings](https://en.wikipedia.org/wiki/Nel_Noddings) · [Rawls](https://en.wikipedia.org/wiki/John_Rawls) · [Sun Tzu](https://en.wikipedia.org/wiki/Sun_Tzu) · [Clausewitz](https://en.wikipedia.org/wiki/Carl_von_Clausewitz) · [Musashi](https://en.wikipedia.org/wiki/Miyamoto_Musashi) · [Nash](https://en.wikipedia.org/wiki/John_Forbes_Nash_Jr.) · [Axelrod](https://en.wikipedia.org/wiki/Robert_Axelrod) · [Vickrey](https://en.wikipedia.org/wiki/William_Vickrey) · [Shapley](https://en.wikipedia.org/wiki/Lloyd_Shapley) · [Spence](https://en.wikipedia.org/wiki/Michael_Spence) · [Marshall](https://en.wikipedia.org/wiki/Alfred_Marshall) · [Coase](https://en.wikipedia.org/wiki/Ronald_Coase) · [Ostrom](https://en.wikipedia.org/wiki/Elinor_Ostrom) · [Granovetter](https://en.wikipedia.org/wiki/Mark_Granovetter) · [Barab%C3%A1si](https://en.wikipedia.org/wiki/Albert-L%C3%A1szl%C3%B3_Barab%C3%A1si) · [Shannon](https://en.wikipedia.org/wiki/Claude_Shannon) · [Norman](https://en.wikipedia.org/wiki/Don_Norman) · [Lakoff](https://en.wikipedia.org/wiki/George_Lakoff) · [Grice](https://en.wikipedia.org/wiki/Paul_Grice) · [Kahneman](https://en.wikipedia.org/wiki/Daniel_Kahneman) · [Tansley](https://en.wikipedia.org/wiki/Arthur_Tansley) · [Dawkins](https://en.wikipedia.org/wiki/Richard_Dawkins)\n\n---\n\n## Install\n\n```bash\nnpx @human-avatar/skills-for-humanity\n```\n\nRun again to update. Restart Claude Code when done.\n\n---\n\n## Use\n\n```\n/think\n```\n\nDescribe your situation. Routes to the right methodology automatically. You don't need to know which skill fits — that's the point.\n\nEvery skill pauses before running: states its read, confirms what it's actually analysing, and asks how deep to go. Correct the framing at any point — the analysis follows the corrected read, not the original one.\n\n---\n\n## Use cases\n\n**Decisions** — `/decision` for structure, `/decision-premortem-analysis` to stress-test before committing, `/constraint-hardness-testing` to separate real obstacles from assumed ones.\n\n**Complex situations** — `/systems` to map why something keeps producing the same outcome, `/game-theory` for the incentive structure underneath, `/historical` for the pattern it's an instance of.\n\n**Creative work** — `/creativity-brainstorm` for multi-method exploration, `/constraint-rule-inversion` to make limits generative, `/aesthetic-elegance-testing` to find what's unnecessary.\n\n**Communication** — `/communication-objection-mapping` to anticipate resistance, `/narrative-tension-mapping` to find what earns attention, `/writing-rhetoric` to audit what a piece is actually doing.\n\n**Ethics** — `/ethics-check` for a fast multi-framework scan, `/ethics-council` for adversarial analysis, `/identity-values-clarification` to test against what you actually value.\n\n**Investigation** — `/investigation-triangulation` for independent corroboration, `/investigation-source-trace` to trace a claim to its origin, `/investigation-counter-hypothesis` to pressure-test your explanation.\n\n---\n\n<details>\n<summary><strong>Skills reference</strong> — 216 skills across 35 categories</summary>\n\n### Think Sharper\n\n#### `/logic`\n\n- [`/logic`](docs/logic/README.md) — Entry point for the logic toolkit.\n- [`/logic-argument-validation`](docs/logic/argument-validation.md) — Check whether an argument's premises actually support its conclusion, and identify logical fallacies.\n- [`/logic-causality-mapping`](docs/logic/causality-mapping.md) — Map causal relationships, trace dependencies, and reason about consequences before acting.\n- [`/logic-check`](docs/logic/check.md) — A fast, comprehensive logic report on any argument, plan, or reasoning — validates premises, tests inference, detects fallacies, surfaces hidden assumptions, and produces a verdict.\n- [`/logic-consistency-check`](docs/logic/consistency-check.md) — Surface internal contradictions, conflicting requirements, and edge cases that expose hidden conflicts in a document, spec, plan, design, or set of requirements.\n- [`/logic-constraint-mapping`](docs/logic/constraint-mapping.md) — Map the full constraint landscape for a decision, design, or plan — distinguishing hard limits from soft preferences, surfacing hidden constraints, and finding conflicts between them.\n- [`/logic-council`](docs/logic/council.md) — Run a reasoning problem, argument, plan, or decision through a council of 5 logical reasoning advisors who analyze it from distinct reasoning frameworks, peer-review each other, and synthesize a verdict on whether the reasoning holds.\n\n#### `/probability`\n\n- [`/probability`](docs/probability/README.md) — Entry point for the probability toolkit.\n- [`/probability-base-rate-anchoring`](docs/probability/base-rate-anchoring.md) — Anchors estimates in historical base rates before adjusting for specific factors.\n- [`/probability-confidence-calibration`](docs/probability/confidence-calibration.md) — Tests whether stated confidence levels match available evidence — catching overconfidence and underconfidence.\n- [`/probability-expected-value-calculation`](docs/probability/expected-value-calculation.md) — Calculates expected value to compare options under uncertainty.\n- [`/probability-scenario-weighting`](docs/probability/scenario-weighting.md) — Assigns explicit probabilities to distinct scenarios before making a decision.\n\n#### `/decision`\n\n- [`/decision`](docs/decision/README.md) — Entry point for the decision toolkit.\n- [`/decision-criteria-weighting`](docs/decision/criteria-weighting.md) — Runs a weighted multi-criteria analysis — making explicit what matters, how much, and how each option performs against it.\n- [`/decision-option-mapping`](docs/decision/option-mapping.md) — Ensures all real options are visible before choosing — countering the false dichotomy that limits consideration to the first two options that came to mind.\n- [`/decision-premortem-analysis`](docs/decision/premortem-analysis.md) — Imagines the decision has been made and failed — then diagnoses why.\n- [`/decision-reversibility-analysis`](docs/decision/reversibility-analysis.md) — Categorises a decision by reversibility and applies the appropriate level of process rigour.\n\n#### `/constraint`\n\n- [`/constraint`](docs/constraint/README.md) — Entry point for the constraint toolkit.\n- [`/constraint-hardness-testing`](docs/constraint/hardness-testing.md) — Tests whether a stated constraint is real — distinguishing genuine limits from assumptions, habits, or politics dressed as facts.\n- [`/constraint-rule-inversion`](docs/constraint/rule-inversion.md) — Flips a constraint into a creative driver — uses the limit as the generative force rather than working around it.\n- [`/constraint-scope-reduction`](docs/constraint/scope-reduction.md) — Finds the minimum that satisfies the actual requirement — stripping everything wanted but not needed.\n- [`/constraint-workaround-mapping`](docs/constraint/workaround-mapping.md) — Finds paths around a fixed constraint without removing it — routing around a hard limit to reach the same goal.\n\n#### `/game-theory`\n\n- [`/game-theory`](docs/game-theory/README.md) — Routes to the right game-theory skill for your strategic situation.\n- [`/game-theory-auction`](docs/game-theory/auction.md) — Analyses bidding strategy and auction design — how much to bid, how to avoid the winner's curse, and how to design revenue-maximising or efficient auctions.\n- [`/game-theory-coalition`](docs/game-theory/coalition.md) — Analyses which coalitions form and how to divide gains fairly using cooperative game theory and the Shapley value.\n- [`/game-theory-equilibrium`](docs/game-theory/equilibrium.md) — Finds the stable outcome of a strategic interaction — the point where no player can improve their result by changing their strategy alone.\n- [`/game-theory-iterated`](docs/game-theory/iterated.md) — Analyses long-run repeated interactions — how cooperation forms, how trust is built, how defection spirals start, and which strategies sustain cooperation.\n- [`/game-theory-mechanism-design`](docs/game-theory/mechanism-design.md) — Designs rules and incentive systems that produce desired outcomes even when players are self-interested.\n- [`/game-theory-prisoners-dilemma`](docs/game-theory/prisoners-dilemma.md) — Analyses cooperation problems where individual rationality produces collective irrationality.\n- [`/game-theory-signaling`](docs/game-theory/signaling.md) — Analyses credibility problems and designs signals that are believable because they're costly to fake.\n\n#### `/epistemology`\n\n- [`/epistemology`](docs/epistemology/README.md) — Entry point for the epistemology toolkit.\n- [`/epistemology-epistemic-status`](docs/epistemology/epistemic-status.md) — Produces an honest, rigorous calibration of what you know vs. believe vs. assume vs. hope across a domain.\n- [`/epistemology-justification`](docs/epistemology/justification.md) — Analyzes what would actually justify believing a claim.\n- [`/epistemology-knowledge-types`](docs/epistemology/knowledge-types.md) — Maps what kind of knowing is actually in play for a claim or question.\n- [`/epistemology-limits`](docs/epistemology/limits.md) — Identifies what can't be known and why, then clarifies what can be established within those limits and reframes the question into its answerable part.\n\n#### `/investigation`\n\n- [`/investigation`](docs/investigation/README.md) — Entry point for the investigation toolkit.\n- [`/investigation-claim-decomposition`](docs/investigation/claim-decomposition.md) — Breaks a complex claim into its smallest independently verifiable parts, classifies each sub-claim, and identifies which parts carry the most logical load.\n- [`/investigation-counter-hypothesis`](docs/investigation/counter-hypothesis.md) — Generates the best alternative explanations for the same observations.\n- [`/investigation-evidence-audit`](docs/investigation/evidence-audit.md) — Evaluates the quality, strength, and completeness of evidence for a claim.\n- [`/investigation-source-trace`](docs/investigation/source-trace.md) — Traces a claim back to its origin: who first made it, what evidence it rested on, and how it has been distorted in transmission.\n- [`/investigation-triangulation`](docs/investigation/triangulation.md) — Verifies a claim across genuinely independent sources, distinguishing amplification from true corroboration.\n\n#### `/economics`\n\n- [`/economics`](docs/economics/README.md) — Entry point for the economics toolkit.\n- [`/economics-opportunity-cost`](docs/economics/opportunity-cost.md) — Maps what you give up by choosing X — because every choice forecloses alternatives, and the invisible cost is often the decisive one.\n- [`/economics-incentive-mapping`](docs/economics/incentive-mapping.md) — Maps who benefits, who pays, and what behaviors the incentive structure produces.\n- [`/economics-externalities`](docs/economics/externalities.md) — Identifies costs and benefits not borne by the actor — and whether they should be internalized.\n- [`/economics-margin`](docs/economics/margin.md) — Applies marginal thinking: the relevant decision is always the next unit, not the average, and sunk costs are irrelevant.\n- [`/economics-coordination`](docs/economics/coordination.md) — Diagnoses collective action failures and public goods problems — why individually rational behavior produces collectively irrational outcomes.\n\n#### `/information`\n\n- [`/information`](docs/information/README.md) — Entry point for the information toolkit.\n- [`/information-signal-noise`](docs/information/signal-noise.md) — Separates meaningful signal from irrelevant noise in any dataset, communication, or situation — identifying what carries actual information and what is static.\n- [`/information-compression`](docs/information/compression.md) — Finds the shortest lossless representation of a message or model — the minimum description that preserves what matters.\n- [`/information-redundancy`](docs/information/redundancy.md) — Identifies where redundancy is protective versus wasteful — and whether removing it creates brittleness or just bloat.\n- [`/information-entropy`](docs/information/entropy.md) — Measures how much genuine uncertainty or surprise is in a source — and what that implies for decisions that depend on it.\n\n#### `/cognition`\n\n- [`/cognition`](docs/cognition/README.md) — Entry point for the cognition toolkit.\n- [`/cognition-attention`](docs/cognition/attention.md) — Maps what is and isn't receiving cognitive attention in a situation — and whether the right things are being prioritised.\n- [`/cognition-mental-models`](docs/cognition/mental-models.md) — Surfaces the mental models driving a decision or interpretation — and tests whether they fit the actual situation.\n- [`/cognition-metacognition`](docs/cognition/metacognition.md) — Examines how you are thinking, not just what you are thinking — catching reasoning errors before they compound.\n- [`/cognition-cognitive-load`](docs/cognition/cognitive-load.md) — Identifies where cognitive load is exceeding capacity — and redesigns the task, environment, or communication to work within limits.\n\n### Think Differently\n\n#### `/creativity`\n\n- [`/creativity`](docs/creativity/README.md) — Entry point for the creativity toolkit.\n- [`/creativity-alternatives`](docs/creativity/alternatives.md) — Apply Edward de Bono's APC (Alternatives, Possibilities, Choices) tool to deliberately generate options before evaluating any of them.\n- [`/creativity-assumption-excavator`](docs/creativity/assumption-excavator.md) — Surface and challenge the hidden assumptions in any problem, plan, or framing.\n- [`/creativity-brainstorm`](docs/creativity/brainstorm.md) — Run an orchestrated multi-method creative thinking sprint on a challenge.\n- [`/creativity-concept-fan`](docs/creativity/concept-fan.md) — Apply Edward de Bono's Concept Fan to expand the solution space before committing to an approach.\n- [`/creativity-consider-factors`](docs/creativity/consider-factors.md) — Apply Edward de Bono's CAF (Consider All Factors) tool to map every relevant factor before making a decision or taking action.\n- [`/creativity-lateral-thinking`](docs/creativity/lateral-thinking.md) — Apply Edward de Bono's lateral thinking to escape dominant patterns and generate genuinely new directions.\n- [`/creativity-other-perspectives`](docs/creativity/other-perspectives.md) — Apply Edward de Bono's OPS (Other People's Shoes) tool to genuinely think from other perspectives.\n- [`/creativity-plus-minus-interesting`](docs/creativity/plus-minus-interesting.md) — Apply Edward de Bono's Plus/Minus/Interesting (PMI) tool for balanced evaluation of any idea, proposal, plan, or decision.\n- [`/creativity-provocation`](docs/creativity/provocation.md) — Apply Edward de Bono's Provocation Operation (Po) to use deliberately absurd or impossible statements as springboards to new ideas.\n- [`/creativity-random-entry`](docs/creativity/random-entry.md) — Apply Edward de Bono's Random Entry technique — use an unrelated word, object, or image as a creative springboard to break out of cognitive ruts.\n- [`/creativity-six-hats`](docs/creativity/six-hats.md) — Apply Edward de Bono's Six Thinking Hats for structured parallel thinking.\n- [`/creativity-water-logic`](docs/creativity/water-logic.md) — Apply Edward de Bono's water logic for flow-based, non-judgmental exploration.\n\n#### `/analogy`\n\n- [`/analogy`](docs/analogy/README.md) — Entry point for the analogy toolkit.\n- [`/analogy-boundary-testing`](docs/analogy/boundary-testing.md) — Finds where an analogy breaks down before it's relied upon.\n- [`/analogy-domain-transfer`](docs/analogy/domain-transfer.md) — Imports solutions from unrelated domains by finding structural similarities between your problem and solved problems elsewhere.\n- [`/analogy-perspective-shifting`](docs/analogy/perspective-shifting.md) — Approaches a problem from completely different fields to break the assumption blindness that comes from domain expertise.\n- [`/analogy-structure-mapping`](docs/analogy/structure-mapping.md) — Identifies the deep structural correspondence between two situations — genuine isomorphism vs superficial similarity.\n\n#### `/play`\n\n- [`/play`](docs/play/README.md) — Entry point for the play toolkit.\n- [`/play-constraint-inversion`](docs/play/constraint-inversion.md) — Removes or inverts the main constraint to see what becomes possible — then uses those unconstrained solutions to find real ones.\n- [`/play-perspective-reversal`](docs/play/perspective-reversal.md) — Fully inhabits the opposing perspective — competitor, critic, user, or adversary — to find what is invisible from your own position.\n- [`/play-stimulus-generation`](docs/play/stimulus-generation.md) — Introduces a random, unrelated element to break mental fixation — forcing new associations that bypass the groove of familiar thinking.\n- [`/play-worst-case-reversal`](docs/play/worst-case-reversal.md) — Deliberately designs the worst possible version — then reverses each failure mode into a design principle.\n\n#### `/evolution`\n\n- [`/evolution`](docs/evolution/README.md) — Entry point for the evolution toolkit.\n- [`/evolution-variation-selection`](docs/evolution/variation-selection.md) — Applies the variation-selection framework to any adaptive system — identifying what is varying, what selects, and what survives to replicate.\n- [`/evolution-niche`](docs/evolution/niche.md) — Maps the niche a strategy, product, or organism occupies — and whether that niche is shrinking, shifting, or contested.\n- [`/evolution-fitness-landscape`](docs/evolution/fitness-landscape.md) — Models the fitness landscape for a strategy or design — mapping peaks, valleys, and the paths between them to find whether local optima are trapping progress.\n- [`/evolution-arms-race`](docs/evolution/arms-race.md) — Diagnoses co-evolutionary escalation dynamics — where two parties keep adapting to each other in a cycle with no stable end.\n\n#### `/design`\n\n- [`/design`](docs/design/README.md) — Entry point for the design toolkit.\n- [`/design-user-needs`](docs/design/user-needs.md) — Surfaces what users actually need as distinct from what they ask for — the gap between stated preference and revealed behavior is where design fails.\n- [`/design-constraints`](docs/design/design-constraints.md) — Maps the full constraint space for a design problem — material, technical, human, contextual — and finds where constraints are generative rather than limiting.\n- [`/design-iteration`](docs/design/iteration.md) — Structures a rapid iteration cycle — hypothesis, prototype, test, learn — to get to better solutions faster by failing informatively rather than expensively.\n- [`/design-simplicity`](docs/design/simplicity.md) — Finds the simplest version of a design that fully solves the problem — removing everything that doesn't earn its place without losing what makes it work.\n\n### Think About People\n\n#### `/communication`\n\n- [`/communication`](docs/communication/README.md) — Entry point for the communication toolkit.\n- [`/communication-audience-modeling`](docs/communication/audience-modeling.md) — Maps what the audience currently believes, actually cares about, and fears before communicating — because communication fails at the receiver, not the sender.\n- [`/communication-clarity-audit`](docs/communication/clarity-audit.md) — Audits a communication for places where the message will be lost, misread, or misunderstood — before it's sent.\n- [`/communication-medium-selection`](docs/communication/medium-selection.md) — Matches the message to the right channel and format — the same content in the wrong medium loses most of its effect.\n- [`/communication-objection-mapping`](docs/communication/objection-mapping.md) — Maps likely objections before delivering a proposal — objections that are anticipated feel addressed; objections that land as surprises derail.\n\n#### `/social`\n\n- [`/social`](docs/social/README.md) — Entry point for the social dynamics toolkit.\n- [`/social-coalition-mapping`](docs/social/coalition-mapping.md) — Maps who needs to be aligned, who already is, and how to build the coalition a proposal needs to succeed.\n- [`/social-dynamics-analysis`](docs/social/dynamics-analysis.md) — Identifies group psychology shaping a discussion or team — groupthink, status dynamics, coalition formation, psychological safety.\n- [`/social-incentive-analysis`](docs/social/incentive-analysis.md) — Maps the actual incentives driving behaviour — distinguishing stated motivations from the real incentive structures that shape what people do.\n- [`/social-power-mapping`](docs/social/power-mapping.md) — Maps who holds power — formal authority, informal influence, gatekeeping, expertise — and how it flows.\n\n#### `/emotional`\n\n- [`/emotional`](docs/emotional/README.md) — Entry point for the emotional intelligence toolkit.\n- [`/emotional-motivation-mapping`](docs/emotional/motivation-mapping.md) — Maps what genuinely drives different people — beyond stated reasons and job descriptions.\n- [`/emotional-resistance-diagnosis`](docs/emotional/resistance-diagnosis.md) — Diagnoses why people are resisting — finding what's underneath the pushback.\n- [`/emotional-stakes-mapping`](docs/emotional/stakes-mapping.md) — Maps what each stakeholder actually cares about underneath their stated position — because addressing the stated position while missing the real stake accomplishes nothing.\n- [`/emotional-trust-audit`](docs/emotional/trust-audit.md) — Maps what is building and eroding trust in a relationship or situation — trust degrades silently until it fails loudly.\n\n#### `/ethics`\n\n- [`/ethics`](docs/ethics/README.md) — Entry point for the ethics toolkit.\n- [`/ethics-bias-check`](docs/ethics/bias-check.md) — Evaluate an algorithm, model, ranking system, recommendation engine, or automated decision process for discriminatory patterns and unfair outcomes.\n- [`/ethics-check`](docs/ethics/check.md) — A fast, comprehensive ethics report on any decision, action, or situation — runs all five ethical frameworks in a single pass.\n- [`/ethics-consent-review`](docs/ethics/consent-review.md) — Review a UX flow, data practice, or communication pattern to verify that user consent is genuine — informed, voluntary, and meaningful.\n- [`/ethics-council`](docs/ethics/council.md) — Run any decision, feature, policy, or action through a council of 5 ethical framework advisors who independently analyze it from different moral foundations, peer-review each other's reasoning, and synthesize a final verdict.\n- [`/ethics-crisis-triage`](docs/ethics/crisis-triage.md) — Rapid multi-framework ethical assessment when something has already gone wrong — a data breach, a harmful outcome, a discriminatory incident, a policy failure, or any situation requiring an urgent ethical response.\n- [`/ethics-data-audit`](docs/ethics/data-audit.md) — Audit a data collection, retention, or sharing decision against ethical standards.\n- [`/ethics-empathy-circle`](docs/ethics/empathy-circle.md) — Applies Jaron Lanier's Circle of Empathy framework to determine which entities deserve moral consideration and rights.\n- [`/ethics-impact-scan`](docs/ethics/impact-scan.md) — Run a quick ethical impact assessment on a proposed feature, change, or decision before it ships.\n- [`/ethics-vendor-review`](docs/ethics/vendor-review.md) — Evaluate a third-party vendor, supplier, partner, or integration against ethical standards before signing a contract or shipping their code or service.\n\n#### `/identity`\n\n- [`/identity`](docs/identity/README.md) — Entry point for the identity toolkit.\n- [`/identity-character-testing`](docs/identity/character-testing.md) — Asks what a person or organisation of genuine integrity would do — grounding decisions in character rather than calculation.\n- [`/identity-mission-alignment`](docs/identity/mission-alignment.md) — Tests whether a proposed decision is genuinely aligned with stated mission — or is rationalising a departure from it.\n- [`/identity-values-clarification`](docs/identity/values-clarification.md) — Surfaces and tests actual operative values — distinguishing what is stated from what decisions actually reveal.\n\n#### `/narrative`\n\n- [`/narrative`](docs/narrative/README.md) — Entry point for the narrative toolkit.\n- [`/narrative-audience-modeling`](docs/narrative/audience-modeling.md) — Maps the audience's current beliefs, real goals, fears, and threshold conditions before communicating with them.\n- [`/narrative-frame-analysis`](docs/narrative/frame-analysis.md) — Identifies the current frame around a situation and generates alternative frames that reveal different truths.\n- [`/narrative-structure-mapping`](docs/narrative/structure-mapping.md) — Applies story architecture to any communication — proposal, presentation, strategy doc — so it moves people rather than informing them.\n- [`/narrative-tension-mapping`](docs/narrative/tension-mapping.md) — Finds or creates the tension that makes communication worth paying attention to.\n\n#### `/psychology`\n\n- [`/psychology`](docs/psychology/README.md) — Entry point for the psychology toolkit.\n- [`/psychology-behavior-change`](docs/psychology/behavior-change.md) — Diagnose what's maintaining an entrenched behavior and design the right intervention to shift it.\n- [`/psychology-cognitive-biases`](docs/psychology/cognitive-biases.md) — Diagnose which cognitive biases are actively distorting thinking in a specific situation.\n- [`/psychology-heuristics`](docs/psychology/heuristics.md) — Assess the fast-thinking pattern at work — when it's reliable, when it misleads, and whether to trust or override it.\n- [`/psychology-motivation`](docs/psychology/motivation.md) — Diagnose what's actually driving behavior — the person's own, someone else's, or a group's.\n- [`/psychology-persuasion`](docs/psychology/persuasion.md) — Identify the right influence approach and construct it for the context.\n\n#### `/mindset`\n\n- [`/mindset`](docs/mindset/README.md) — Entry point for the mindset toolkit.\n- [`/mindset-flow`](docs/mindset/flow.md) — Applies Csikszentmihalyi's flow framework to diagnose why optimal experience isn't occurring and redesign the conditions for it.\n- [`/mindset-growth`](docs/mindset/growth.md) — Applies Carol Dweck's growth mindset research as a practical methodology — the actual mechanics, not the motivational poster version.\n- [`/mindset-positive`](docs/mindset/positive.md) — Applies positive psychology as a rigorous practice — not pop-psychology positivity.\n- [`/mindset-reframe`](docs/mindset/reframe.md) — Applies cognitive reframing as a rigorous methodology — CBT-adjacent but not therapy.\n- [`/mindset-stoic`](docs/mindset/stoic.md) — Applies the full Stoic toolkit as a practical thinking methodology.\n\n#### `/writing`\n\n- [`/writing`](docs/writing/README.md) — Routes to the right writing skill for any fiction, non-fiction, or professional writing challenge.\n- [`/writing-arc-design`](docs/writing/arc-design.md) — Maps and repairs character arcs and thematic arcs by aligning external plot events with internal change.\n- [`/writing-argument`](docs/writing/argument.md) — Builds and repairs persuasive arguments by surfacing the warrant, auditing evidence, addressing counterarguments, and identifying rhetorical substitutes.\n- [`/writing-audience-calibration`](docs/writing/audience-calibration.md) — Calibrates writing for a specific reader by profiling their knowledge, concerns, and relationship to the topic — then rewriting for that reader without changing the substance.\n- [`/writing-character-development`](docs/writing/character-development.md) — Engineers psychologically compelling characters by mapping want vs. need, wound, defence mechanism, and defining contradiction.\n- [`/writing-copy`](docs/writing/copy.md) — Writes and audits marketing copy, landing pages, ad copy, email copy, and product descriptions using the attention-desire-action framework.\n- [`/writing-dialogue`](docs/writing/dialogue.md) — Diagnoses and repairs dialogue for subtext, voice differentiation, exposition, and forward momentum.\n- [`/writing-executive-summary`](docs/writing/executive-summary.md) — Produces executive summaries, 1-page briefs, and board-level documents by extracting the situation, key findings, implications, and recommendation — answer-first, one page maximum.\n- [`/writing-inconsistency-audit`](docs/writing/inconsistency-audit.md) — Runs four systematic passes to identify timeline errors, character logic violations, world-rule breaks, and physical continuity errors.\n- [`/writing-line-editing`](docs/writing/line-editing.md) — Applies five-category line-editing passes to identify and repair redundancy, nominalisations, passive voice, rhythmic monotony, and throat-clearing.\n- [`/writing-plot-structure`](docs/writing/plot-structure.md) — Diagnoses structural failures in a story using the five-beat dramatic framework — inciting incident, first turning point, midpoint, dark night, climax.\n- [`/writing-pov`](docs/writing/pov.md) — Audits point-of-view for violations, consistency, and fit.\n- [`/writing-prose-elevation`](docs/writing/prose-elevation.md) — Raises the quality of competent but flat prose by targeting abstraction, weak verbs, and sensory absence.\n- [`/writing-report`](docs/writing/report.md) — Writes and audits business reports, briefing documents, and information reports for answer-first structure, precision, hierarchy, and navigability.\n- [`/writing-restructure`](docs/writing/restructure.md) — Diagnoses and repairs structural problems in non-fiction, essays, and documents — wrong order, buried lead, wrong ending, proportion errors.\n- [`/writing-rhetoric`](docs/writing/rhetoric.md) — Analyses what a piece of writing is
