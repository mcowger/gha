<script id="project-data" type="application/json">[{"owner":"antoinezambelli","repo":"forge","url":"https://github.com/antoinezambelli/forge","readme":"# forge\n\n[![PyPI](https://img.shields.io/pypi/v/forge-guardrails.svg)](https://pypi.org/project/forge-guardrails/)\n[![Tests](https://github.com/antoinezambelli/forge/actions/workflows/tests.yml/badge.svg)](https://github.com/antoinezambelli/forge/actions/workflows/tests.yml)\n[![codecov](https://codecov.io/gh/antoinezambelli/forge/branch/main/graph/badge.svg)](https://codecov.io/gh/antoinezambelli/forge)\n[![Python 3.12+](https://img.shields.io/badge/python-3.12%2B-blue.svg)](https://www.python.org/downloads/)\n[![License: MIT](https://img.shields.io/badge/license-MIT-green.svg)](LICENSE)\n\nA reliability layer for self-hosted LLM tool-calling. You give forge a set of tools; the model calls whichever it wants in whatever order. Workflow structure is opt-in — `required_steps`, `prerequisites`, and `terminal_tool` let you constrain the loop when you need to, but forge's guardrails (rescue parsing, retry nudges, response validation) apply with zero required steps too.\n\nForge takes an 8B local model from single digits to 84% across forge's 26-scenario v0.7.0 eval suite — and even lifts Sonnet 4.6 from 85% to 98% on the same workload (Anthropic numbers measured in v0.6.0; not re-run in v0.7.0 since the cost is non-trivial).\n\n**What forge isn't:**\n- **Not an agent orchestrator.** Forge sits inside one agentic loop and makes its tool calls reliable. Multi-agent graphs, DAG planners, and cross-agent coordination are out of scope.\n- **Not a coding harness.** Forge is domain-agnostic. If you're building a coding agent (or already using one like opencode, aider, Cline), [proxy mode](#proxy-server) lifts your existing harness with forge's guardrails — no rewrite.\n\n**Three ways to use it:**\n\n- **Proxy server** — Drop-in proxy (`python -m forge.proxy`) speaking both the OpenAI chat-completions and Anthropic Messages (`/v1/messages`) APIs, sitting between any client and a local model server. Point OpenAI-compatible tools (opencode, Continue, aider) **or Claude Code** at it and forge applies guardrails transparently — the client thinks it's talking to a smarter model. Most popular entry point.\n\n- **WorkflowRunner** — Define tools, pick a backend, run structured agent loops. Forge manages the full lifecycle: system prompts, tool execution, context compaction, and guardrails. **SlotWorker** adds priority-queued access to a shared inference slot with auto-preemption — for multi-agent architectures where specialist workflows share a GPU slot. Best when you're building on forge directly.\n\n- **Guardrails middleware** — Use forge's reliability stack ([composable middleware](examples/foreign_loop.py)) inside your own orchestration loop. You control the loop; forge validates responses, rescues malformed tool calls, and enforces required steps.\n\nSupports Ollama, llama-server (llama.cpp), Llamafile, vLLM, and Anthropic as backends.\n\n## Requirements\n\n- Python 3.12+\n- A running LLM backend (see below)\n\n## Install\n\n```bash\npip install forge-guardrails                # core only\npip install \"forge-guardrails[anthropic]\"   # + Anthropic client\n```\n\nFor development:\n\n```bash\ngit clone https://github.com/antoinezambelli/forge.git\ncd forge\npip install -e \".[dev]\"\n```\n\n### Backend setup (pick one)\n\n**llama-server** (recommended — top 10 eval configs all run on llama-server):\n```bash\n# Install from https://github.com/ggml-org/llama.cpp/releases\nllama-server -m path/to/Ministral-3-8B-Instruct-2512-Q8_0.gguf --jinja -ngl 999 --port 8080\n```\n\n**Ollama** (alternative — easier setup, slightly weaker on harder workloads):\n```bash\n# Install from https://ollama.com/download\nollama pull ministral-3:8b-instruct-2512-q4_K_M\n```\n\n**Anthropic** (API, no local GPU needed):\n```bash\npip install -e \".[anthropic]\"\nexport ANTHROPIC_API_KEY=sk-...\n```\n\nSee [Backend Setup](docs/BACKEND_SETUP.md) for full instructions and [Model Guide](docs/MODEL_GUIDE.md) for which model fits your hardware.\n\n## Quick Start\n\nStart llama-server however you normally do (e.g. in a separate shell):\n\n```bash\nllama-server -m path/to/Ministral-3-8B-Instruct-2512-Q8_0.gguf --jinja -ngl 999 --port 8080\n```\n\nThen the Python you'll run (e.g. from another shell):\n\n```python\nimport asyncio\nfrom pydantic import BaseModel, Field\nfrom forge import (\n    Workflow, ToolDef, ToolSpec,\n    WorkflowRunner, LlamafileClient,\n    ContextManager, TieredCompact,\n)\n\ndef get_weather(city: str) -> str:\n    return f\"72°F and sunny in {city}\"\n\nclass GetWeatherParams(BaseModel):\n    city: str = Field(description=\"City name\")\n\nworkflow = Workflow(\n    name=\"weather\",\n    description=\"Look up weather for a city.\",\n    tools={\n        \"get_weather\": ToolDef(\n            spec=ToolSpec(\n                name=\"get_weather\",\n                description=\"Get current weather\",\n                parameters=GetWeatherParams,\n            ),\n            callable=get_weather,\n        ),\n    },\n    required_steps=[],\n    terminal_tool=\"get_weather\",\n    system_prompt_template=\"You are a helpful assistant. Use the available tools to answer the user.\",\n)\n\nasync def main():\n    client = LlamafileClient(\n        gguf_path=\"path/to/Ministral-3-8B-Instruct-2512-Q8_0.gguf\",\n        mode=\"native\",\n        recommended_sampling=True,\n    )\n    ctx = ContextManager(strategy=TieredCompact(keep_recent=2), budget_tokens=8192)\n    runner = WorkflowRunner(client=client, context_manager=ctx)\n    await runner.run(workflow, \"What's the weather in Paris?\")\n\nasyncio.run(main())\n```\n\nFor multi-step workflows, multi-turn conversations, and backend auto-management, see the [User Guide](docs/USER_GUIDE.md). If you're building a long-running session (CLI, chat server, voice assistant), see the [long-running session advisory](docs/USER_GUIDE.md#long-running-sessions-filtering-transient-messages) for important guidance on filtering transient messages.\n\n## Proxy Server\n\nDrop-in proxy that sits between any client and a local model server, speaking both the OpenAI chat-completions API and the Anthropic Messages API (`/v1/messages`). Point your client at the proxy (e.g. `http://localhost:8081/v1`) and forge applies its guardrails transparently — the client thinks it's talking to a smarter model.\n\nThis is the path for **using forge with an existing harness** (opencode, Continue, aider, Cline, anything that speaks the OpenAI chat-completions schema — or Claude Code, which speaks the Anthropic Messages API). No Python rewrite.\n\n```bash\n# External mode — you manage the backend, forge proxies it\npython -m forge.proxy --backend-url http://localhost:8080 --port 8081\n\n# Managed mode — forge starts the backend and the proxy together\npython -m forge.proxy --backend llamaserver --gguf path/to/model.gguf --port 8081\n\n# Managed vLLM — pass a model directory or HF repo id via --model-path\npython -m forge.proxy --backend vllm --model-path /path/to/awq-dir --port 8081\n```\n\nThen configure your client to use `http://localhost:8081/v1` as the API base URL.\n\n**Claude Code:** the proxy also serves the Anthropic Messages API on `POST /v1/messages`, so you can point Claude Code at a forge-guarded local model — set `ANTHROPIC_BASE_URL=http://localhost:8081` and `ANTHROPIC_AUTH_TOKEN=anything` for the `claude` process. See [Using forge with Claude Code](docs/USER_GUIDE.md#using-forge-with-claude-code) for the full setup (native-vs-prompt FC, Anthropic-shape downstreams, `cache_control`).\n\n**Backend compatibility:**\n\n- **Managed mode** spins up the backend for you. Supported backends: `llamaserver`, `llamafile`, `ollama`, `vllm` (use `--backend <name>` with `--gguf` for the GGUF-based backends, `--model-path` for vllm, or `--model` for ollama).\n- **External mode** is backend-agnostic — forge talks `POST /v1/chat/completions` to whatever you point `--backend-url` at, as long as it speaks the OpenAI schema. Tool calls must come back in OpenAI `tool_calls` format or in one of forge's rescue-parsed formats (Mistral `[TOOL_CALLS]`, Qwen `<tool_call>` XML, fenced JSON). For a vLLM server, add `--backend vllm` so the proxy adopts vLLM's `--served-model-name` (vLLM 404s on a mismatched `model` field, unlike llama.cpp).\n\n### What proxy mode fortifies\n\nOn every `POST /v1/chat/completions`, forge applies (in order):\n\n1. **Response validation** — each tool call in the model's response is checked against the `tools` array in the request. Calls to unknown tool names or with malformed shapes are caught before the response returns to your client.\n2. **Rescue parsing** — when the model emits tool calls in the wrong format (JSON in a code fence, Mistral's `[TOOL_CALLS]name{args}`, Qwen's `<tool_call>...</tool_call>` XML), forge extracts the structured call and re-emits it in the canonical OpenAI `tool_calls` schema. Biggest practical lift for Mistral-family models.\n3. **Retry loop with error tracking** — if validation fails, forge retries inference up to `--max-retries` (default 3) with a corrective tool-result message on the canonical channel, rather than returning a malformed response. From your client's perspective the proxy looks like a single request that just took a few extra ms.\n4. **Synthetic `respond` tool injection** — when tools are present in the request, forge injects a synthetic `respond` tool the model calls instead of producing bare text. The `respond` call is stripped from the outbound response — the client sees a normal text response (`finish_reason: \"stop\"`) and never knows the tool exists. Essential for small local models (~8B) that can't be trusted to choose correctly between text and tool calls. See [ADR-013](docs/decisions/013-text-response-intent.md) for the full analysis.\n\n### What proxy mode does *not* do\n\nProxy mode is single-shot per request; some forge features need multi-turn workflow state that the OpenAI chat-completions schema doesn't carry:\n\n- **Prerequisite enforcement and step-ordering** — these need a workflow definition spanning turns. Available in `WorkflowRunner`.\n- **Context compaction and session memory** — proxy mode forwards the inbound message list as-is; managing the rolling window is the client's job.\n- **VRAM-aware budget detection** — opt in with `--budget-mode forge-full` or `--budget-mode forge-fast`; otherwise proxy uses the backend's reported budget.\n\nFor the full guardrail surface, use `WorkflowRunner` directly. The proxy trades depth for \"use forge with your existing setup, no rewrite.\"\n\n### Useful flags\n\n| Flag | Default | Purpose |\n|---|---|---|\n| `--max-retries N` | 3 | Retry budget per validation failure |\n| `--no-rescue` | (rescue on) | Disable rescue parsing (debugging only) |\n| `--budget-mode {backend,manual,forge-full,forge-fast}` | `backend` | Context budget source |\n| `--budget-tokens N` | — | Manual token budget (requires `--budget-mode manual`) |\n| `--serialize` / `--no-serialize` | auto | Force request serialization (single-slot backends) |\n\n### Docker\n\nYou can run the forge proxy as a Docker container.\n\n**Build the image:**\n\n```bash\ndocker build -t forge-proxy .\n```\n\n**Run the container:**\n\n```bash\n# Connect to an external backend (e.g. vLLM hosted on the same machine)\ndocker run -p 8081:8081 forge-proxy --backend-url http://host.docker.internal:8000 --backend vllm --budget-mode manual --budget-tokens 8192\n```\n\nNote: If your backend is running on `localhost` of the host machine, use `http://host.docker.internal:PORT` (on macOS/Windows) or the host's IP address to allow the container to reach it.\n\n## Backends\n\n| Backend | Best for | Native FC? |\n|---------|----------|------------|\n| **Ollama** | Easiest setup, model management built-in | Yes |\n| **llama-server** | Best performance, full control | Yes (with `--jinja`) |\n| **Llamafile** | Single binary, zero dependencies | No (prompt-injected) |\n| **vLLM** | High-throughput serving, AWQ/GPTQ weights | Yes (server-side parser) |\n| **Anthropic** | Frontier baseline, hybrid workflows | Yes |\n\nSee [Backend Setup](docs/BACKEND_SETUP.md) for installation and [Model Guide](docs/MODEL_GUIDE.md) for which model to pick.\n\n## Running Tests\n\n```bash\npython -m pytest tests/ -v --tb=short\n```\n\n```bash\npython -m pytest tests/ --cov=forge --cov-report=term-missing\n```\n\n## Eval Harness\n\n26 scenarios measuring how reliably a model + backend combo navigates multi-step tool-calling workflows — split into an OG-18 baseline tier and an 8-scenario advanced_reasoning tier for top-end separation. See [Eval Guide](docs/EVAL_GUIDE.md) for full CLI reference.\n\n```bash\n# llama-server (start in another terminal first; see Eval Guide)\npython -m tests.eval.eval_runner --backend llamafile --llamafile-mode prompt --gguf \"path/to/Ministral-3-8B-Instruct-2512-Q8_0.gguf\" --runs 10 --stream --verbose\n\n# Batch eval (JSONL output, automatic resume)\npython -m tests.eval.batch_eval --config all --runs 50\n\n# Reports — ASCII table by default; --html / --markdown export views\npython -m tests.eval.report eval_results.jsonl\npython -m tests.eval.report eval_results.jsonl --html docs/results/dashboard.html\npython -m tests.eval.report eval_results.jsonl --markdown docs/results/raw/\n```\n\n## Project Structure\n\n```\nsrc/forge/\n  __init__.py          # Public API exports\n  errors.py            # ForgeError hierarchy\n  server.py            # setup_backend(), ServerManager, BudgetMode\n  core/\n    messages.py        # Message, MessageRole, MessageType, MessageMeta\n    workflow.py        # ToolSpec, ToolDef, ToolCall, TextResponse, Workflow\n    inference.py       # run_inference() — shared front half (compact, fold, validate, retry)\n    runner.py          # WorkflowRunner — the agentic loop\n    slot_worker.py     # SlotWorker — priority-queued slot access\n    steps.py           # StepTracker\n  guardrails/\n    guardrails.py      # Guardrails facade — applies the full stack in foreign loops\n    nudge.py           # Nudge dataclass\n    response_validator.py  # ResponseValidator, ValidationResult\n    step_enforcer.py   # StepEnforcer, StepCheck\n    error_tracker.py   # ErrorTracker\n  clients/\n    base.py            # ChunkType, StreamChunk, LLMClient protocol\n    ollama.py          # OllamaClient (native FC)\n    llamafile.py       # LlamafileClient (native FC or prompt-injected)\n    anthropic.py       # AnthropicClient (frontier baseline)\n  context/\n    manager.py         # ContextManager, CompactEvent\n    strategies.py      # CompactStrategy, NoCompact, TieredCompact, SlidingWindowCompact\n    hardware.py        # HardwareProfile, detect_hardware()\n  prompts/\n    templates.py       # Tool prompt builders (prompt-injected path)\n    nudges.py          # Retry and step-enforcement nudge templates\n  tools/\n    respond.py         # Synthetic respond tool (respond_tool(), respond_spec())\n  proxy/\n    __main__.py        # CLI entry point: python -m forge.proxy\n    proxy.py           # ProxyServer — programmatic start/stop API\n    server.py          # Raw asyncio HTTP server, SSE streaming\n    handler.py         # Request handler — bridge between HTTP and run_inference\n    convert.py         # OpenAI messages ↔ forge Messages conversion\ntests/\n  unit/                # 865 deterministic tests — no LLM backend required\n  eval/                # Eval harness — model qualification against real backends\n```\n\n## Documentation\n\n- [User Guide](docs/USER_GUIDE.md) — Usage patterns, multi-turn, context management, guardrails, slot worker, long-running session advisory\n- [Model Guide](docs/MODEL_GUIDE.md) — Which model and backend for your hardware\n- [Backend Setup](docs/BACKEND_SETUP.md) — Backend installation and server setup\n- [Eval Guide](docs/EVAL_GUIDE.md) — Eval harness CLI reference, batch eval\n- [Architecture](docs/ARCHITECTURE.md) — Full design document\n- [Workflow Internals](docs/WORKFLOW.md) — Workflow design and runner internals\n- [Contributing](CONTRIBUTING.md) — How to set up, test, and add new backends or scenarios\n\n## Paper\n\nThe forge guardrail framework and ablation study are published as:\n\n> Zambelli, A. *Forge: A Reliability Layer for Self-Hosted LLM Tool-Calling.*\n> [https://doi.org/10.1145/3786335.3813193](https://doi.org/10.1145/3786335.3813193)\n\nA pre-publication preprint is also available at [docs/forge_ieee_preprint.pdf](docs/forge_ieee_preprint.pdf) — kept as a historical artifact. Cite the published version above; the DOI link may not resolve immediately depending on the publisher's release timing.\n\n## License\n\n[MIT](LICENSE) — Copyright (c) 2025-2026 Antoine Zambelli\n","summary":"Forge is a reliability layer for self-hosted LLM tool-calling, focused on making tool-use loops more dependable without acting as a full agent orchestrator. It wraps an LLM and a set of tools with guardrails such as rescue parsing for malformed calls, retry nudges, response validation, and optional workflow constraints like required steps, prerequisites, and a terminal tool. You can use it as a drop-in proxy server compatible with OpenAI-chat and Anthropic Messages APIs, integrate directly via a WorkflowRunner/SlotWorker for structured tool-call workflows, or embed its middleware into your own loop. It’s most beneficial for developers running local tool-calling agents (e.g., code or task agents) who want higher reliability on hardware-friendly models and want to avoid rewriting their existing orchestration logic.","description":"A Python framework for self-hosted LLM tool-calling and multi-step agentic workflows","stars":1928,"language":"Python"},{"owner":"sqliteai","repo":"adam","url":"https://github.com/sqliteai/adam","readme":"# Adam\n\nEmbeddable AI agent library in C.\n\nAdam gives you a complete agent loop: tool calling, memory, sessions, voice, streaming, structured output, in one `#include`. Works with cloud APIs (Anthropic, OpenAI, Google Gemini, Groq, Together, xAI) and local models (llama.cpp) through the same interface. Compiles on macOS, Linux, Windows, iOS, Android, and WASM.\n\n## Quick Start\n\n```c\n#include \"adam.h\"\n\nint main(void) {\n    adam_init();\n\n    adam_settings_t *s = adam_create_settings();\n    adam_settings_set_provider(s, ADAM_API_ANTHROPIC,\n                               getenv(\"ANTHROPIC_API_KEY\"),\n                               \"claude-sonnet-4-20250514\");\n\n    adam_history_t *h = adam_history_create();\n    adam_run_result_t r = adam_run(s, h, \"What is the capital of France?\");\n\n    printf(\"%s\\n\", r.final_response);  // \"The capital of France is Paris.\"\n\n    adam_run_result_free(&r);\n    adam_history_destroy(h);\n    adam_settings_destroy(s);\n    adam_cleanup();\n}\n```\n\n```bash\nmake deps    # build llama.cpp + whisper.cpp\nmake all     # build libadam.a\nmake test    # run 161 tests (ASan + UBSan)\n```\n\n## Features\n\n| Feature | Description |\n|---------|-------------|\n| **Agent loop** | Tool calling with automatic iteration until final response |\n| **Three providers** | Anthropic, OpenAI, Google Gemini + any compatible API + local GGUF via llama.cpp |\n| **Local vision** | Multimodal image understanding via llama.cpp + mmproj (Gemma 3, LLaVA, etc.) |\n| **Image generation** | Native image output via Gemini image models (gemini-3.1-flash-image-preview) |\n| **Database extensions** | [SQLite](extensions/sqlite/) and [PostgreSQL](extensions/postgres/) extensions — embed Adam as SQL functions that query the same database |\n| **13 built-in tools** | File I/O, shell, calculator, SQL, web fetch/search, HTTP POST, memory, research, multi-agent |\n| **Long-term memory** | Hybrid BM25 + vector search via SQLite (sqlite-memory + sqlite-vector) |\n| **Session persistence** | Save/load conversations with UUIDv7 keys |\n| **Telegram bot** | Full-featured [Telegram integration](examples/telegram/) with text, voice, images, tools, and memory |\n| **Voice** | STT (Whisper cloud/local) + TTS (cloud/system) + full audio pipeline |\n| **Streaming** | Real-time token delivery via callback |\n| **Structured output** | `adam_run_json()` with validation and retry |\n| **Evolution loop** | Self-improving agent: iterate, score, refine strategy |\n| **Research mode** | Autonomous multi-iteration information gathering with report synthesis |\n| **Multi-agent** | Agent A invokes Agent B as a tool, with independent settings/tools |\n| **Guardrails** | Pre-send and post-receive validation callbacks |\n| **Response cache** | LRU hash table keyed on model + message history |\n| **History management** | Clone, summarize (LLM-based compression), token estimation |\n| **Thread pool** | Concurrent agent execution with job queue |\n| **Filesystem sandbox** | Tools restricted to explicitly allowed directories |\n| **Cross-platform** | macOS, Linux, Windows, iOS, Android, WASM (Emscripten) |\n| **Arena allocator** | Zero-leak per-iteration memory with automatic cleanup |\n\n## Build\n\n```bash\nmake deps          # Build llama.cpp, whisper.cpp (+ mbedtls/curl on Linux)\nmake all           # Build libadam.a\nmake test          # Build & run unit tests (ASan + UBSan)\nmake chat          # Interactive text chat (cloud API)\nmake chat GGUF=models/model.gguf  # Interactive text chat (local)\nmake vision GGUF=models/model.gguf MMPROJ=models/mmproj.gguf  # Local vision test\nmake talk          # Voice agent (cloud)\nmake talk LOCAL=1  # Voice agent (fully local)\nmake memory        # Memory system tests\nmake clean         # Remove all build artifacts\n```\n\n## API Reference\n\nFull API documentation with every function, type, and callback: **[API.md](API.md)**\n\n## Examples\n\n```c\nadam_settings_t *s = adam_create_settings();\nadam_settings_set_provider(s, ADAM_API_ANTHROPIC, api_key, \"claude-sonnet-4-20250514\");\n\nadam_history_t *h = adam_history_create();\nadam_run_result_t r = adam_run(s, h, \"Explain quantum entanglement simply.\");\nprintf(\"%s\\n\", r.final_response);\nadam_run_result_free(&r);\n\n// Continue the conversation — history carries forward\nr = adam_run(s, h, \"Can you give an analogy?\");\nprintf(\"%s\\n\", r.final_response);\nadam_run_result_free(&r);\n\nadam_history_destroy(h);\nadam_settings_destroy(s);\n```\n\nMore examples are available in the **[examples/](examples/)** directory:\n\n| Example | Description |\n|---------|-------------|\n| [simple-conversation](examples/simple-conversation/) | Multi-turn chat with a cloud API |\n| [tool-calling](examples/tool-calling/) | Register a custom tool and let the agent call it |\n| [local-model](examples/local-model/) | Run a local GGUF model via llama.cpp |\n| [local-vision](examples/local-vision/) | Image understanding with a local vision model + mmproj |\n| [google-gemini](examples/google-gemini/) | Use Google Gemini models |\n| [image-generation](examples/image-generation/) | Generate images with Gemini |\n| [sqlite-query](examples/sqlite-query/) | Natural language queries on any SQLite database |\n| [structured-json](examples/structured-json/) | Get validated JSON output with retry |\n| [memory](examples/memory/) | Long-term memory with hybrid BM25 + vector search |\n| [sessions](examples/sessions/) | Save and restore conversations |\n| [streaming](examples/streaming/) | Real-time token streaming via callback |\n| [voice](examples/voice/) | Speech-to-text + agent + text-to-speech pipeline |\n| [multi-agent](examples/multi-agent/) | Agent A delegates to Agent B as a tool |\n| [evolution](examples/evolution/) | Self-improving agent with scoring loop |\n| [research](examples/research/) | Autonomous multi-iteration research with report |\n| [filesystem-sandbox](examples/filesystem-sandbox/) | File and shell tools restricted to allowed directories |\n| [guardrails](examples/guardrails/) | Pre-send and post-receive validation |\n| [response-cache](examples/response-cache/) | LRU cache for repeated queries |\n| [thread-pool](examples/thread-pool/) | Concurrent agent execution |\n| [telegram](examples/telegram/) | Telegram bot with text, images, tools, and memory |\n| [wasm-chat](examples/wasm-chat/) | Browser-based chat UI via WebAssembly |\n| [full-agent](examples/full-agent/) | All features combined |\n\n## Database Extensions\n\nAdam can be embedded directly inside SQLite and PostgreSQL as a SQL extension. The agent can query the **same database** it's loaded in — ask questions in natural language, get answers from your data.\n\n```sql\n-- SQLite\n.load adam\n\n-- PostgreSQL\nCREATE EXTENSION adam;\n\n-- Configure (both)\nSELECT adam_config('provider', 'anthropic');\nSELECT adam_config('api_key', 'sk-ant-...');\n\n-- Ask about your data — the agent reads the schema and runs SQL\nSELECT adam_ask('How many users signed up last month?');\n-- → \"47 users signed up last month.\"\n\n-- Generate SQL without executing\nSELECT adam_sql('top 5 products by revenue');\n-- → \"SELECT p.name, SUM(oi.quantity * oi.price) AS revenue FROM ...\"\n```\n\n| Function | Description |\n|----------|-------------|\n| `adam_config(key, val)` | Configure provider, API key, model (persisted) |\n| `adam(msg)` | Stateless one-shot chat |\n| `adam_ask(msg)` | SQL-aware agent — reads schema, queries data, multi-turn |\n| `adam_sql(question)` | Generate SQL from natural language |\n| `adam_create_session()` | Create session (auto-created on first `adam_ask`) |\n| `adam_get_session()` | Get current session UUID |\n| `adam_clear_session()` | Clear session and history |\n\nSee **[extensions/sqlite/](extensions/sqlite/)** and **[extensions/postgres/](extensions/postgres/)** for build instructions.\n\n## Architecture\n\n```\nadam_run() loop:\n  build system prompt (identity + instructions + bootstrap files + memory + datetime)\n  -> check guardrails (on_before_send)\n  -> check cache\n  -> dispatch LLM (mock | local/llama.cpp | remote/HTTP)\n  -> check guardrails (on_after_receive)\n  -> if tool_calls: execute tools -> append results -> loop\n  -> if text: return final response -> auto-save session -> extract memory\n```\n\n**Platform abstraction**: macOS uses NSURLSession, Linux uses libcurl+mbedtls, WASM uses embedder-provided `http_fn` callback.\n\n**Memory management**: Arena allocators for per-iteration zero-copy work. malloc/free for long-lived structures. Arena-allocated strings are only valid within the current iteration.\n\n## Feature Gates\n\nDefine before `#include \"adam.h\"` to disable features:\n\n| Gate | Effect |\n|------|--------|\n| `ADAM_NO_CURL` | No libcurl (must provide `http_fn` callback) |\n| `ADAM_NO_LOCAL` | No llama.cpp (no local inference) |\n| `ADAM_NO_PTHREADS` | No thread pool, no voice thread |\n| `ADAM_NO_SQLITE` | No SQLite (no memory, sessions, or SQL tool) |\n| `ADAM_NO_VOICE` | No voice subsystem |\n| `ADAM_NO_FILESYSTEM` | No file_read/file_write/list_directory tools |\n| `ADAM_NO_SHELL` | No shell_exec tool |\n\n## Dependencies\n\nAll vendored as git submodules in `modules/`:\n\n| Module | Purpose |\n|--------|---------|\n| llama.cpp | Local LLM inference + GGML compute |\n| whisper.cpp | Local speech-to-text (shares ggml via symlink) |\n| miniaudio | Cross-platform audio I/O |\n| sqlite | Amalgamation build |\n| sqlite-memory | Hybrid BM25 + vector knowledge store |\n| sqlite-vector | Vector similarity search |\n| mbedtls | TLS (Linux only) |\n| curl | HTTP (Linux only) |\n\nmacOS uses system frameworks (Foundation, Security, Metal, AVFoundation, Accelerate) instead of curl/mbedtls.\n\n## License\n\nMIT\n","summary":"Adam is an embeddable C library that provides a complete AI agent loop, including tool calling, memory, sessions, voice, streaming, and structured (validated) outputs, all via a single `#include`. It can run against multiple cloud model providers (Anthropic, OpenAI, Google Gemini, Groq, Together, xAI) or locally through llama.cpp, with support for multimodal vision and even native image generation. Adam also includes optional SQLite/PostgreSQL extensions to expose agent capabilities as SQL functions, plus built-in tools for tasks like file I/O, web/HTTP actions, and multi-agent workflows. Developers building offline-capable or cross-platform native applications, especially those who want to integrate AI agents directly into C/C++ systems with minimal glue code, would benefit most.","description":"An embeddable cross-platform AI agent library written in C. Cloud and local LLMs, tool calling, long-term memory, voice, sessions, research mode, self-evolving loops. The SQLite of agent frameworks: small, portable, just works.","stars":89,"language":"C"},{"owner":"kageroumado","repo":"phosphene","url":"https://github.com/kageroumado/phosphene","readme":"# Phosphene\n\nA video wallpaper engine for macOS Tahoe.\n\nPhosphene is a menu bar app + wallpaper extension that plays your own video files as the macOS desktop and lock-screen wallpaper. It plugs into the system's native wallpaper picker, so videos appear alongside Apple's built-in Aerials in **System Settings → Wallpaper**.\n\nIt is built on top of Apple's private `WallpaperExtensionKit` framework — the same one Apple's own Aerials use — which means playback runs out-of-process, survives app quits, and integrates with the OS-level lock-screen / idle / sleep lifecycle.\n\n> ⚠️ **Private framework.** Phosphene loads `WallpaperExtensionKit` via `dlopen` and uses Mirror-based runtime introspection to talk to its XPC types. Apple could change this at any major OS release. The project tracks macOS 26 (Tahoe).\n\n## Features\n\n- **Bring your own videos.** Import MP4 / MOV / any AVFoundation-readable file. They show up in the system wallpaper picker.\n- **Gapless looping.** Frame-accurate loops by offsetting PTS/DTS across loop boundaries — no flush, no stutter.\n- **Multi-display + per-Space selections.** Different wallpapers per display, persisted by macOS.\n- **Power-aware playback.** A graduated `PlaybackPolicy` reduces work or pauses entirely based on thermal state, battery level, on-battery vs AC, Game Mode, and presentation mode (active / locked / idle).\n- **Smooth lock-screen ramp.** When *Only on Lock Screen* is enabled, the wallpaper eases in/out with a cubic curve as you lock and unlock, matching Apple's own Aerials behavior.\n- **Pause when occluded.** Detects when every display is fully covered by windows and pauses rendering until the desktop is visible again.\n- **Adaptive variants.** Optionally pre-render lower-resolution / lower-fps variants of a video; the renderer swaps to the cheapest variant that satisfies the current policy at each loop boundary.\n- **Menu bar control.** Preview the current wallpaper, toggle pause, switch displays, configure behavior, launch at login.\n\n## Requirements\n\n- **macOS Tahoe (26.0+).** Phosphene depends on the Wallpaper extension point introduced in macOS 14 but uses Tahoe-only SwiftUI and `glassEffect()` APIs.\n- **Apple Silicon.** Targets `arm64-apple-macos26.0`.\n- **Xcode 17+** to build, with Swift 6 strict concurrency enabled.\n\n## Building\n\n```sh\ngit clone https://github.com/kageroumado/phosphene.git\ncd phosphene\nopen Phosphene.xcodeproj\n```\n\nIn Xcode, select the **Phosphene** scheme and Run. The project uses synchronized filesystem groups, so adding/removing files in `Phosphene/` or `PhospheneExtension/` requires no pbxproj edits.\n\nYou'll need to set a development team for code signing. The wallpaper extension is embedded into the app bundle and registered with the system when the app launches.\n\nFor a headless compile check without local signing identities:\n\n```sh\nxcodebuild -project Phosphene.xcodeproj -scheme Phosphene -configuration Debug \\\n  -destination 'generic/platform=macOS' \\\n  CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY='' build\n```\n\nOn the default DerivedData path, the unsigned debug app is produced at:\n\n```text\n~/Library/Developer/Xcode/DerivedData/Phosphene-*/Build/Products/Debug/Phosphene.app\n```\n\nTo install that local debug build into Applications:\n\n```sh\nrm -rf /Applications/Phosphene.app\ncp -R ~/Library/Developer/Xcode/DerivedData/Phosphene-*/Build/Products/Debug/Phosphene.app /Applications/\n```\n\n### Using a video wallpaper\n\n1. Launch Phosphene. Use the menu bar icon to **Manage Library** and add one or more videos.\n2. Open **System Settings → Wallpaper**. Phosphene's videos appear under their own collection.\n3. Pick a video. macOS handles the actual wallpaper assignment — Phosphene's extension provides the frames.\n\n## Architecture\n\n```\n┌─────────────────────────┐         ┌──────────────────────────────┐\n│  Phosphene.app          │         │  PhospheneExtension.appex     │\n│  (menu bar UI)          │         │  (host: WallpaperAgent)       │\n│                         │         │                              │\n│  • Library management   │  Darwin │  • XPC handler                │\n│  • Per-video metadata   │ ──────▶ │  • AVSampleBufferDisplayLayer │\n│  • Optimization (HEVC)  │  notif. │  • Power / thermal monitor    │\n│  • Preferences          │         │  • Snapshot generator         │\n└─────────────────────────┘         └──────────────────────────────┘\n                  │                              │\n                  └──────────────┬───────────────┘\n                                 ▼\n                  Shared App Group container\n                  (~/Library/Group Containers/glass.kagerou.phosphene)\n                  • Video library + variants\n                  • WallpaperPrefs.plist\n                  • BMP snapshot cache\n```\n\n**App side** (`Phosphene/`) — SwiftUI menu-bar app. Manages the on-disk video library, transcodes optional lower-resolution variants via `VideoOptimizationService`, exposes preferences, and posts a Darwin notification when the library changes.\n\n**Extension side** (`PhospheneExtension/`) — runs inside the system `WallpaperAgent` process when a Phosphene wallpaper is active. Loads `WallpaperExtensionKit.framework` at runtime, registers as a wallpaper provider, and renders frames into a remote `CAContext` via `AVSampleBufferDisplayLayer`. It receives XPC `acquire` / `update` / `invalidate` / `snapshot` calls from `WallpaperAgent` and routes presentation-mode changes through `PlaybackPolicy`.\n\n**`PlaybackPolicy`** is the single source of truth for playback behavior. Inputs (thermal state, battery, presentation mode, user pause, occlusion, etc.) collapse to one of `full / reduced / minimal / paused`. The renderer applies the policy on every state change.\n\n**`VideoRenderer`** owns the decode pipeline. Instead of `AVPlayerLayer` — which silently fails inside a remote `CAContext` — it drives `AVSampleBufferDisplayLayer` manually: one `AVAssetReader` for the current loop, a preloaded one for the next, and a PTS offset that grows across loops to keep the timeline monotonically increasing. Result is glitch-free looping without flushing the renderer.\n\n## Quirks worth knowing\n\n- **`WallpaperSnapshotXPC` swizzle.** The system's snapshot encoder checks `type(of: coder) == NSXPCCoder.self`, but the real coder is a subclass. Without the runtime swizzle in `PhospheneExtension.swift`, snapshots silently encode to nothing and you get a grey lock screen during transitions.\n- **Mirror-based XPC parsing.** Apple's request types (`WallpaperCreationRequestXPC` etc.) aren't part of any public SDK header. The extension reads them via `Mirror` reflection. If Apple renames fields, expect surgical breakage.\n- **Variants are advisory.** A \"1080p@30\" variant won't be selected if Power-Monitor thinks we're on AC and idle — `PlaybackPolicy` always picks the highest tier that's still allowed.\n\n## License\n\n[MIT](LICENSE). Do whatever you want, no warranty.\n\n## Acknowledgements\n\nBuilt by [@kageroumado](https://x.com/kageroumado). Phosphene was originally a commercial project; it's open-source now because the market for \"video wallpaper apps on macOS\" turned out to be more crowded than it looked.\n","summary":"Phosphene is a macOS menu bar app and wallpaper extension that lets you use your own video files as desktop and lock-screen wallpapers, integrated directly into System Settings’ native wallpaper picker alongside Apple’s Aerials. It supports features like frame-accurate gapless looping, per-display and per-Space wallpaper selections, power- and thermal-aware playback policies, smooth lock-screen transitions, and pausing when the desktop is fully occluded. It also offers adaptive lower-resolution/lower-fps variants for efficient playback and provides menu bar controls for previewing, pausing, and managing your library. This project is best for macOS users on Tahoe who want customizable animated video wallpapers with system-level lifecycle integration, and for developers curious about using (and managing risk from) Apple’s private WallpaperExtensionKit framework.","description":"A video wallpaper engine for macOS Tahoe","stars":706,"language":"Swift"},{"owner":"xataio","repo":"deltax","url":"https://github.com/xataio/deltax","readme":"<p align=\"center\">\n  <a href=\"https://github.com/xataio/xata/blob/main/LICENSE\"><img src=\"https://img.shields.io/badge/License-Apache_2.0-green\" alt=\"License - Apache 2.0\"></a>&nbsp;\n  <a href=\"https://twitter.com/xata\"><img src=\"https://img.shields.io/badge/@xata-6c47ff?label=Follow&logo=x\" alt=\"X (formerly Twitter) Follow\" /></a>&nbsp;\n  <a href=\"https://bsky.app/profile/xata.io\"><img src=\"https://img.shields.io/badge/@xata-6c47ff?label=Follow&logo=bluesky\" alt=\"Bluesky Follow\" /></a>&nbsp;\n  <a href=\"https://www.youtube.com/@xataio\"><img src=\"https://img.shields.io/badge/@xataio-6c47ff?label=Youtube&logo=youtube\" alt=\"Youtube Subscribe\" /></a>&nbsp;\n</p>\n\n# DeltaX (δx) - Fast time-series extension for PostgreSQL\n\nDeltaX (δx) is a PostgreSQL extension offering compression and columnar storage for time-series \ndata. It can be used as a pure open-source (Apache 2.0) alternative to TimescaleDB or\nas a PostgreSQL-native alternative to dedicated analytics stores like ClickHouse, when\nyou'd like your data to stay in Postgres.\n\nδx stores the compressed columnar data in regular Postgres tables. It does _not_ use \nits own storage format on disk. The advantage of this approach is that features like \nphysical/logical replication, crash recovery, backups, and pg_dump work as for any other \nPostgres table.\n\n## Contents\n\n- [Benchmarks](#benchmarks)\n- [How it works](#how-it-works)\n- [Features](#features)\n- [Limitations](#limitations)\n- [Installation and quick start](#installation-and-quick-start)\n- [Correctness testing](#correctness-testing)\n- [Reference](#reference)\n- [How can I help](#how-can-i-help)\n- [License](#license)\n\n## Benchmarks\n\nThese results are as of May 19th, 2026.\n\n### ClickBench\n\nOn the [ClickBench](https://benchmark.clickhouse.com/) benchmark, which runs 43 analytical\nqueries against a web analytics dataset of 100M rows × 105 columns, δx currently ranks lower than \nspecialized analytical stores like ClickHouse and DuckDB, but it is the highest-ranking of \nall the systems that are storing the data in PostgreSQL.\n\nThe following screenshot contains a selection of Postgres extensions/projects + ClickHouse for reference.\nIt displays the \"combined\" metric, which is a weighted average combining hot times, cold time, load time,\nand storage size.\n\n<img src=\"images/clickbench-combined.png\" width=\"800\" alt=\"ClickBench combined: pg_deltax ranks in-between ClickHouse and TimescaleDB\">\n\n#### Compression / storage size\n\nLooking at the **compression ratio / storage size**, δx offers a compression ratio of about 7× on\nthis particular dataset. Compression ratios vary considerably by data characteristics.\n\n<img src=\"images/clickbench-storage-size.png\" width=\"800\" alt=\"ClickBench storage size: pg_deltax compression ratio is ~7x\">\n\n#### Load time\n\n<img src=\"images/clickbench-load-time.png\" width=\"800\" alt=\"ClickBench load times result\">\n\nNote: The reason δx can load the data faster than Postgres is that it has support for backfilling data directly\nfrom Parquet files. On a more standard setup where the data is loaded into normal Postgres tables and\nthen compressed, the load time would be similar to the PostgreSQL result plus the compression time.\n\n\n### JSONBench\n\n[JSONBench](https://jsonbench.com/) is a benchmark similar to ClickBench but for measuring performance\non semi-structured data. The dataset contains Bluesky firehose data exported as ndjson.\n\nδx has support for extracting particular fields from JSONB columns and compressing them with the same\ncolumnar algorithms as the native columns. This enables the following results on JSONBench.\n\n<img src=\"images/jsonbench-hot-run.png\" width=\"800\" alt=\"JSONBench hot run results\">\n\n\n## How it works\n\nLet's start with an example time-series table partitioned by a timestamp column. The data itself can be metrics, \nlogs, events, etc. Anything that contains a timestamp. PostgreSQL has built-in partitioning, so it's very common\nto partition time-series data in fixed-interval partitions (e.g. daily, weekly, or monthly). In our example, let's\nassume monthly. The partitioned table might look something like this:\n\n<img src=\"images/deltax-partitioned-table.png\" width=\"800\" alt=\"PostgreSQL partitioned table\">\n\nUnder typical time-series workloads, only the last partition (the current month) receives writes. The rest typically\nonly receive reads. Based on this observation, the idea is that we can compress older partitions so that they take \nless space.\n\n<img src=\"images/deltax-compressed-partitions.png\" width=\"800\" alt=\"Compressed partitions\">\n\nA naive way to do this is to compress all the data in a given partition with a single algorithm (say, LZ4). However,\nit turns out that compressing column by column has two important advantages:\n- we can use type-specific compression algorithms which can be a lot more efficient in compression.\n- if all the values of a given column are stored together one by one, filtering by that column becomes very efficient.\n\n<img src=\"images/deltax-columnar-compress.png\" width=\"400\" alt=\"Switching to columnar-oriented storage during compression\">\n\nIn other words, during the compression process, we also switch from row-oriented to column-oriented storage. This is \ndone on a per-segment basis, meaning that each partition is split into segments of roughly equal size (by default, 30K rows)\nand compressed segment by segment.\n\nδx is currently using the following algorithms to compress the data of columns of given types:\n\n- **Integers** (`int2`, `int4`, `int8`): tries three encodings, Constant (single repeated value), Frame-of-Reference + bit-packing (small range around a base), and Delta-Varint (variable-length encoded deltas between consecutive values), and picks whichever produces the smallest blob per segment.\n- **Floats** (`float4`, `float8`): Gorilla XOR encoding (the scheme from Facebook's Gorilla paper), which exploits the fact that consecutive floats in time-series data tend to share most of their binary representation.\n- **Timestamps and dates** (`timestamp`, `timestamptz`, `date`): Gorilla delta-of-delta encoding, very compact when timestamps are evenly or near-evenly spaced.\n- **Booleans** (`bool`): bitmap encoding, 1 bit per value.\n- **Text with low cardinality** (`text`, `varchar`, `bpchar`): dictionary encoding when cardinality is &lt; 50% of rows and &lt; 65,536 distinct values, with the dictionary indices optionally further LZ4-compressed.\n- **Text with high cardinality** (`text`, `varchar`, `bpchar`): block-LZ4 over the raw strings.\n- **JSONB** (`jsonb`): the raw JSONB bytes go through the same pipeline as text (dictionary or block-LZ4). In addition, when compression is enabled you can pass a `json_extract` spec to pull selected fields out of a JSONB column into synthetic columns of a chosen type (`text`, `bigint`, `timestamptz`, etc.) at compression time. These synthetic columns are then compressed with the matching type-specific codec above, just like native columns, and can be filtered, ordered, and aggregated on directly.\n\nAcross all of these, NULLs are extracted into a separate null bitmap before compression, so the codec only sees non-null values.\n\nDuring compression, δx also collects metadata about the values in each segment: \n\n- Time bounds and row count per segment.\n- Per-column min, max, sum, non-null count, and non-zero count.\n- Per-column distinct-value count.\n- Bloom filters for numeric, date, and timestamp columns.\n- Value-presence bitmaps for low-cardinality (≤32 distinct values per partition) text columns.\n- Per-row text-length sidecars: an LZ4-compressed array of character counts for every text column.\n\nThis metadata can be used during planning and execution to speed up queries, either by skipping segments that can't contribute to the result, or by answering queries directly from the metadata without touching the compressed blobs at all.\n\nThe compressed data and the metadata are stored in companion tables for each partition, with a layout carefully chosen to minimize IO for the usual access patterns. The companion tables are normal Postgres tables, meaning that they benefit from the Postgres infrastructure for replication and crash recovery. They are used transparently by the Postgres planner and executor hooks to speed up queries.\n\n<img src=\"images/deltax-compressed-columnar-partitions.png\" width=\"800\" alt=\"DeltaX compressed columnar partitions\">\n\nAn important design trade-off of δx is that compressed partitions become read-only. Writes to them are rejected and the only way to update individual rows is to decompress and re-compress the whole partition.\n\n\n## Features\n\nCurrent features include:\n\n**Storage & compression**\n\n- Auto-partitioning: turn any table with a timestamp column into a time-range partitioned table; out-of-range inserts land in a default partition.\n- Per-column codecs: type-specific compression (Gorilla XOR for floats, Gorilla delta-of-delta for timestamps, Constant / FOR + bit-packing / Delta-Varint for integers, dictionary + LZ4 for text, bitmap for booleans), best codec picked per segment.\n- Rich segment metadata: per-column min / max / sum / non-null / non-zero / distinct counts, bloom filters for numeric / date / timestamp columns, value-presence bitmaps for low-cardinality text, and per-row text-length sidecars.\n\n**Query path**\n\n- Transparent decompression: queries against compressed partitions work unchanged; the planner injects custom scan nodes that decompress on the fly.\n- Segment pruning: skip whole segments using time bounds, segment-by equality, min/max, bloom filters, value-presence bitmaps, or dictionary entries — before reading the compressed blob.\n- Vectorized batch filters: `=`, `<>`, `<`, `<=`, `>`, `>=`, `LIKE`, `IN` evaluated in tight Rust loops over decoded batches, bypassing PostgreSQL's per-row `ExecQual`.\n- Aggregate pushdown: `COUNT(*)`, `MIN` / `MAX`, `SUM`, `AVG`, `COUNT(col)`, and `GROUP BY` answered either from segment metadata or by a vectorized aggregator inside the scan node.\n- Top-N fast path: `ORDER BY ts LIMIT N` uses a two-pass scan that decodes only the sort column for most segments, then the remaining columns for the ~N winning rows.\n- Parallel aggregation: parallel-aware `Partial → Gather → FinalAgg` for `SUM` / `AVG` / `COUNT` with numeric `WHERE`.\n- Shared-memory blob cache: cross-backend DSA-backed cache of detoasted compressed blobs, so hot-cache scans don't pay TOAST cost.\n- Text-length sidecar fast path: `length(col)` / `col = ''` / `col <> ''` queries read a few-KB sidecar instead of detoasting the multi-MB text blob.\n\n**JSON field extraction**\n\n- Selective JSONB field extraction: pull selected JSON paths out of a JSONB column into synthetic typed columns at compression time and compress them with the matching native codec.\n- Automatic query rewrite: queries written against the original JSONB column (`data->>'field'`-style chains) are transparently rewritten to read from the synthetic columns.\n\n**Ingest & operations**\n\n- Direct backfill: `COPY ... WITH (FORMAT deltax_compress)` writes straight to compressed companion tables from TSV / CSV / Parquet, bypassing the heap and its WAL / index / MVCC overhead.\n- Background worker: drains the default partition into proper ones, pre-creates future partitions, compresses partitions past `compress_after`, drops partitions past `drop_after`.\n- PostgreSQL 17 and 18 supported.\n\n## Limitations\n\n- Compressed partitions are read-only. Writes are rejected; whole-partition operations (`DROP`, `TRUNCATE`) still work. If you need to update individual rows in an old partition, you must decompress, modify, and re-compress.\n- No continuous (auto-refreshed) materialized aggregates yet. It is on our roadmap.\n- No offloading of old partitions to S3. Data tiering is on our roadmap.\n- Postgres 17 and 18 only.\n\n## Installation and quick start\n\n### Installation from deb file\n\nDownload the `.deb` matching your PG major version and architecture from the [latest release](https://github.com/xataio/pg_deltax/releases/latest), then:\n\n```sh\napt-get install -y ./pg-deltax-pg17_<version>_amd64.deb\n```\n\nδx registers a background worker from `_PG_init`, so it must be in `shared_preload_libraries`:\n\n```sh\necho \"shared_preload_libraries = 'pg_deltax'\" >> $PGDATA/postgresql.conf\n# restart PostgreSQL, then:\npsql -c \"CREATE EXTENSION pg_deltax;\"\n```\n\n### Installation from source\n\nRequires a Rust toolchain, the PostgreSQL server dev headers (`postgresql-server-dev-17` or `-18` on Debian / Ubuntu), and `cargo-pgrx` matching the `pgrx` version in `Cargo.toml`:\n\n```sh\ncargo install cargo-pgrx --version 0.17.0 --locked\ncargo pgrx init --pg17=$(which pg_config)\n```\n\nThen build and install the extension into the PostgreSQL instance pointed at by `pg_config`:\n\n```sh\ncargo pgrx install --release --pg-config $(which pg_config) \\\n    --features pg17 --no-default-features\n```\n\nReplace `pg17` with `pg18` to target PostgreSQL 18. Then add `pg_deltax` to `shared_preload_libraries`, restart PostgreSQL, and `CREATE EXTENSION pg_deltax;` as above.\n\n### Quickstart\n\nEither install pg_deltax as per above or run in this repo:\n\n```sh\nmake run     # starts Postgres in docker with the extension loaded\nmake psql    # connects to it via psql\n```\n\nThen: \n\npg_deltax installs all its functions and internal catalog tables into a dedicated `deltax` schema (so its `time_bucket`, `first`, `last`, etc. don't collide with TimescaleDB or pg_duckdb). Call them schema-qualified as `deltax.<fn>(...)` — or `SET search_path TO public, deltax;` once if you'd rather call them bare.\n\n```sql\nCREATE EXTENSION IF NOT EXISTS pg_deltax;\nCREATE TABLE metrics (ts TIMESTAMPTZ NOT NULL, device TEXT, value FLOAT8);\nSELECT deltax.deltax_create_table('metrics', 'ts', '1 day');\n\n-- Insert ~100,000 rows spanning the last ~2.3 days across 5 devices. The past\n-- (sealed) partition needs enough data that the per-partition companion-table\n-- overhead is dwarfed by the compression savings — at very small scales the\n-- fixed overhead can actually grow the database after compression.\nINSERT INTO metrics (ts, device, value)\nSELECT\n    now() - (i * interval '2 seconds'),\n    'sensor-' || (i % 5),\n    20.0 + sin(i::float / 100) * 5\nFROM generate_series(0, 100000) AS i;\n\n-- simulate a bg worker run which would drain the defualt partition every 60s\nSELECT deltax.deltax_drain_default_partition('metrics');\n\n-- Check size and info before compression\nSELECT pg_size_pretty(pg_database_size(current_database())) AS size;\nSELECT * FROM deltax.deltax_partition_info('metrics');\n\n-- Compression — compresses every partition whose window is fully in the past\n-- (today's still-open partition is skipped). Normally done by the bg thread automatically.\nSELECT deltax.deltax_enable_compression('metrics', order_by => ARRAY['device', 'ts']);\nSELECT * FROM deltax.deltax_compress_all_partitions('metrics');\nSELECT * FROM deltax.deltax_compression_stats('metrics');\n\n-- Demo queries\nSELECT deltax.time_bucket('1 day', ts) AS day, avg(value) FROM metrics GROUP BY 1 ORDER BY 1;\nSELECT deltax.first(value, ts), deltax.last(value, ts) FROM metrics;\n\n-- Size reporting after compression — both the deltatable's catalog-truthful\n-- size and the whole database for comparison with the value above.\nSELECT pg_size_pretty(deltax.deltax_table_size('metrics'));\nSELECT pg_size_pretty(pg_database_size(current_database())) AS size;\n```\n\n## Correctness testing\n\nThe main correctness invariant in the test suite is: δx must always respond with the same results as plain Postgres returns from the uncompressed version of the table. Whenever the response is different, it is a bug. There are cases where this condition is relaxed: for example, on a `LIMIT 10` query, if the 10th row has ties, any of them is accepted. We have the following comparison policies:\n\n- `ordered_exact` — rows and row order must match exactly.\n- `unordered_exact` — row multiset must match, order is ignored.\n- `limit_ties` — relaxed policy for non-unique `ORDER BY ... LIMIT` cases; boundary rows can differ as long as they're tied with rows the other side returned.\n- `float_tolerant` — ordered comparison with a small numeric tolerance.\n\nWe have four layers of automated tests:\n\n- Rust unit tests (`make test`)\n- Integration tests (`make integration-test`): end-to-end tests against a running PostgreSQL with the extension loaded, run against both PG 17 and 18. They cover partitioning, compression / decompression round-trips, the background worker, parallel scans, parquet loading, JSONB field extraction, the blob cache, value bitmaps, meta-only aggregation, and more.\n- Plain-PG-vs-δx correctness harness (`make correctness`): the implementation of the invariant above. Loads identical logical data into a regular PostgreSQL table and a δx table, runs the same query against both, and compares the results. The suite covers aggregates, ordering, predicates, codec round-trips via direct backfill, planner-mode coverage, partition / segment edges, joins with uncompressed tables.\n- Benchmark correctness (e.g. `make -C clickbench verify`). The benchmark harnesses also act as cross-implementation parity checks, so a query that benchmarks fast but returns wrong results fails the run.\n\n## Reference\n\n- [Function reference](docs/FUNCTIONS.md) — partitioning, retention, compression, analytics, and blob-cache observability functions.\n- [Configuration reference](docs/CONFIGURATION.md) — all `pg_deltax.*` GUCs.\n- [Logical replication](docs/LOGICAL_REPLICATION.md) — setting up native PostgreSQL logical replication with pg_deltax-managed tables.\n\n## How can I help\n\nAt the moment, the best way to contribute to this project is to:\n\n- Spread the word: star the repo, post about it on social media, tell your friends.\n- If you have a use-case in your company where δx would be beneficial, please [get in touch](mailto:info@xata.io) and we'll evaluate if δx is ready for it, or what it would take to make it ready.\n- Ask your Postgres cloud provider to add support for δx. We'd like to explicitly encourage other Postgres cloud providers to adopt it.\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for the developer guide. We recommend getting in touch before contributing new features.\n\n## License\n\nLicensed under the Apache License, Version 2.0. See [LICENSE](LICENSE) for the full text.\n\n<br>\n<p align=\"right\">Made with 💜 by <a href=\"https://xata.io\">Xata 🦋</a></p>\n","summary":"DeltaX (δx) is a fast time-series extension for PostgreSQL that adds compression and columnar storage while keeping the data inside ordinary PostgreSQL tables. It improves storage efficiency and query performance using compressed columnar representations, including support for extracting and compressing specific fields from JSONB data. Because it does not introduce a custom on-disk format, it preserves PostgreSQL-native capabilities like replication, crash recovery, backups, and dump/restore workflows. It’s best suited for teams who want to run analytics-style time-series workloads while staying in Postgres rather than adopting separate engines like ClickHouse or TimescaleDB.","description":"Fast time-series extension for PostgreSQL","stars":198,"language":"Rust"},{"owner":"eigenpal","repo":"docx-editor","url":"https://github.com/eigenpal/docx-editor","readme":"<p align=\"center\">\n  <a href=\"https://www.docx-editor.dev/\">\n    <img src=\"./.github/assets/header.png\" alt=\"DOCX Editor — .docx in, .docx out. Open source, agent ready, client-side.\" width=\"500\" />\n  </a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://www.npmjs.com/package/@eigenpal/docx-editor-core\"><img src=\"https://img.shields.io/npm/v/@eigenpal/docx-editor-core.svg?style=flat-square&color=3B5BDB\" alt=\"npm version\" /></a>\n  <a href=\"https://www.npmjs.com/package/@eigenpal/docx-js-editor\"><img src=\"https://img.shields.io/npm/dm/@eigenpal/docx-js-editor.svg?style=flat-square&color=3B5BDB\" alt=\"npm downloads\" /></a>\n  <a href=\"https://github.com/eigenpal/docx-editor/blob/main/LICENSE\"><img src=\"https://img.shields.io/badge/license-Apache_2.0-blue.svg?style=flat-square&color=3B5BDB\" alt=\"license\" /></a>\n  <a href=\"https://docx-editor.dev/editor\"><img src=\"https://img.shields.io/badge/Live_Demo-3B5BDB?style=flat-square&logo=vercel&logoColor=white\" alt=\"Demo\" /></a>\n  <a href=\"https://www.docx-editor.dev/docs\"><img src=\"https://img.shields.io/badge/Docs-3B5BDB?style=flat-square&logo=readthedocs&logoColor=white\" alt=\"Documentation\" /></a>\n</p>\n\nOpen-source WYSIWYG `.docx` editor for React and Vue with canonical OOXML, tracked changes, and real-time collaboration. Agent-ready. **[Live demo](https://docx-editor.dev/editor)** | **[Documentation](https://www.docx-editor.dev/docs)**\n\n## Quick Start\n\n```bash\nnpm install @eigenpal/docx-editor-react\n```\n\nSee the [React quick start](#react) below.\n\n```bash\nnpm install @eigenpal/docx-editor-vue\n```\n\nSee the [Vue quick start](#vue) below.\n\n```bash\nnpm install @eigenpal/nuxt-docx-editor\n```\n\nSee the [Nuxt quick start](#nuxt) below.\n\n<p align=\"center\">\n  <a href=\"https://docx-editor.dev/editor\">\n    <img src=\"./.github/assets/editor.png\" alt=\"docx-editor screenshot\" width=\"100%\" />\n  </a>\n</p>\n\n## Packages\n\n| Package                                                                                      | Description                                                                                                                                | Docs                                                  |\n| -------------------------------------------------------------------------------------------- | ------------------------------------------------------------------------------------------------------------------------------------------ | ----------------------------------------------------- |\n| [`@eigenpal/docx-editor-react`](https://www.npmjs.com/package/@eigenpal/docx-editor-react)   | <img src=\"https://cdn.simpleicons.org/react/61DAFB\" width=\"20\" align=\"middle\" /> &nbsp; React adapter. Toolbar, paged editor, plugins.     | [Docs](https://www.docx-editor.dev/docs/1.x/react)    |\n| [`@eigenpal/docx-editor-vue`](https://www.npmjs.com/package/@eigenpal/docx-editor-vue)       | <img src=\"https://cdn.simpleicons.org/vuedotjs/4FC08D\" width=\"20\" align=\"middle\" /> &nbsp; Vue 3 adapter. Toolbar, paged editor, plugins.  | [Docs](https://www.docx-editor.dev/docs/1.x/vue)      |\n| [`@eigenpal/nuxt-docx-editor`](https://www.npmjs.com/package/@eigenpal/nuxt-docx-editor)     | <img src=\"https://cdn.simpleicons.org/nuxt/00DC82\" width=\"20\" align=\"middle\" /> &nbsp; Nuxt 3 & 4 module wrapping the Vue adapter.         | [Docs](https://www.docx-editor.dev/docs/1.x/vue/nuxt) |\n| [`@eigenpal/docx-editor-core`](https://www.npmjs.com/package/@eigenpal/docx-editor-core)     | Framework-agnostic core: OOXML parser, serializer, layout engine, ProseMirror schema. Depend on this if you fork the React or Vue adapter. | [Docs](https://www.docx-editor.dev/docs/1.x/core)     |\n| [`@eigenpal/docx-editor-i18n`](https://www.npmjs.com/package/@eigenpal/docx-editor-i18n)     | Shared locale strings and types consumed by both adapters.                                                                                 | [Docs](https://www.docx-editor.dev/docs/1.x/i18n)     |\n| [`@eigenpal/docx-editor-agents`](https://www.npmjs.com/package/@eigenpal/docx-editor-agents) | Agent SDK and chat UI: framework-agnostic bridge, MCP server, AI SDK adapters, plus UI components.                                         | [Docs](https://www.docx-editor.dev/docs/1.x/agents)   |\n\n> **Forking the adapter?** Keep your fork thin. Depend on `@eigenpal/docx-editor-core` directly so parser, serializer, and rendering fixes land in your build automatically, without backporting each upstream change by hand.\n\n## React\n\n```tsx\nimport { useState } from 'react';\nimport { DocxEditor } from '@eigenpal/docx-editor-react';\nimport '@eigenpal/docx-editor-react/styles.css';\n\nexport function App() {\n  const [buffer, setBuffer] = useState<ArrayBuffer | null>(null);\n\n  return (\n    <>\n      <input\n        type=\"file\"\n        accept=\".docx\"\n        onChange={async (e) => setBuffer((await e.target.files?.[0]?.arrayBuffer()) ?? null)}\n      />\n      {buffer && <DocxEditor documentBuffer={buffer} mode=\"editing\" />}\n    </>\n  );\n}\n```\n\n> **Next.js / SSR:** Use dynamic import. The editor requires the DOM.\n\nFull docs: [`packages/react`](packages/react) · [API reference](https://www.docx-editor.dev/docs/props).\n\n## Vue\n\n```vue\n<script setup lang=\"ts\">\nimport { ref } from 'vue';\nimport { DocxEditor } from '@eigenpal/docx-editor-vue';\nimport '@eigenpal/docx-editor-vue/styles.css';\n\nconst buffer = ref<ArrayBuffer | null>(null);\n\nasync function loadFile(e: Event) {\n  const file = (e.target as HTMLInputElement).files?.[0];\n  buffer.value = file ? await file.arrayBuffer() : null;\n}\n<\/script>\n\n<template>\n  <input type=\"file\" accept=\".docx\" @change=\"loadFile\" />\n  <DocxEditor v-if=\"buffer\" :document-buffer=\"buffer\" mode=\"editing\" />\n</template>\n```\n\nFull docs: [`packages/vue`](packages/vue) · [API reference](https://www.docx-editor.dev/docs/props).\n\n## Nuxt\n\n```ts\n// nuxt.config.ts\nexport default defineNuxtConfig({\n  modules: ['@eigenpal/nuxt-docx-editor'],\n});\n```\n\n`@eigenpal/nuxt-docx-editor` wraps the Vue adapter as a Nuxt 3 & 4 module: it auto-imports an SSR-safe `<DocxEditor>` component (no manual import, no `<ClientOnly>` wrapper) and the Vue composables.\n\nFull docs: [`packages/nuxt`](packages/nuxt).\n\n## Plugins\n\n```tsx\nimport { DocxEditor } from '@eigenpal/docx-editor-react';\nimport { PluginHost, templatePlugin } from '@eigenpal/docx-editor-react/plugin-api';\n\n<PluginHost plugins={[templatePlugin]}>\n  <DocxEditor documentBuffer={buffer} />\n</PluginHost>;\n```\n\nSee the [plugin documentation](https://www.docx-editor.dev/docs/plugins) for the full plugin API.\n\n## Development\n\n```bash\nbun install\nbun run dev        # localhost:5173\nbun run build\nbun run typecheck\n```\n\nA live preview of `main` is auto-deployed at **[latest.docx-editor.dev](https://latest.docx-editor.dev/)** — useful for trying out changes before they ship to npm.\n\nExamples: [Vite](examples/vite) | [Next.js](examples/nextjs) | [Remix](examples/remix) | [Astro](examples/astro) | [Vue](examples/vue) | [Nuxt](examples/nuxt)\n\n**[Documentation](https://www.docx-editor.dev/docs)** | **[Props & Ref Methods](https://www.docx-editor.dev/docs/props)** | **[Plugins](https://www.docx-editor.dev/docs/plugins)** | **[Architecture](https://www.docx-editor.dev/docs/architecture)**\n\n## Contributing\n\nContributions welcome. See [CONTRIBUTING.md](CONTRIBUTING.md) for setup, tests, and the one-time CLA signature.\n\n## Translations\n\n| Locale  | Language             |\n| ------- | -------------------- |\n| `en`    | English              |\n| `de`    | German               |\n| `fr`    | French               |\n| `he`    | Hebrew               |\n| `hi`    | Hindi                |\n| `pl`    | Polish               |\n| `pt-BR` | Portuguese (Brazil)  |\n| `tr`    | Turkish              |\n| `zh-CN` | Chinese (Simplified) |\n\nHelp translate the editor into your language! See the full **[i18n contribution guide](docs/i18n.md)**.\n\n```bash\nbun run i18n:new de      # scaffold German locale\nbun run i18n:status      # check translation coverage\n```\n\n## Commercial Support\n\n> [!TIP]\n> Questions or custom features? Email **[docx-editor@eigenpal.com](mailto:docx-editor@eigenpal.com)**.\n","summary":"eigenpal/docx-editor is an open-source, client-side WYSIWYG editor for Microsoft Word `.docx` files built for React and Vue. It focuses on producing and consuming canonical OOXML while supporting collaborative workflows such as tracked changes, and it provides an extensible editor experience via toolbars, paged editing, and plugins. The repository includes framework adapters plus a framework-agnostic core (OOXML parsing/serialization and a layout/editor model), making it suitable for teams that want to embed full document editing directly in web apps. It benefits developers building document review/editing products, collaborative writing tools, and agent-ready integrations where accurate `.docx` round-tripping and collaboration features are required.","description":"Open-source WYSIWYG .docx editor library with canonical OOXML, tracked changes, and real-time collaboration.","stars":1339,"language":"TypeScript"},{"owner":"zakirullin","repo":"files.md","url":"https://github.com/zakirullin/files.md","readme":"<img src=\"https://github.com/zakirullin/files.md/raw/main/web/img/icon.png\" alt=\"Files.md icon\" title=\"Files.md\" align=\"right\" height=\"76\" />\n\n# Files.md  \nPrivate, quiet space for thinking. A simple app for your `.md` files.  \n\n<img src=\"https://github.com/zakirullin/files.md/raw/main/web/img/appdark.png\" alt=\"Files.md screenshot\" title=\"Files.md\"/>\n\nYou can store your whole life:\n- 📌 Notes\n- 📝 Documents, Projects\n- 💚 Journal, Habits\n- ✅ Checklists, Tasks\n\nAll in plain `.md` files, local-first. LLM-friendly. **Private - your data stays at your device**.    \n\nTry it out: [app.files.md](https://app.files.md) (Beta). Main site: [files.md](https://files.md).  \n\n> Own your data as plain local files.  \n> Own the software that opens those files.   \n> Grow your knowledge with files and your own brain.  \n> Grow the software around it with an LLM.  \n> **Plain files and self-owned software can last through the ages**.  \n\n**I have been building this project for 5 years**. Consider **[supporting on GitHub 💚](https://github.com/sponsors/zakirullin)**.  \n\nYou can use this app for Zettelkasten, Second Brain, Notes, Journaling, To Do lists, Checklists, and more.  \n\n[Dump your thoughts](#dump-your-thoughts) · [How to think deeply](#how-to-think-deeply) · [Second Brain?](#second-brain) · [Journal, tasks and checklists](#journal) · [Files structure](#files-structure)\n\n## Another note taking app? \nMaybe. But this time:\n- Only necessary features, **restrictions foster creativity**\n- Free and open source\n- No need to install anything, all you need is a browser\n- Works offline\n- **Local-first, files don't leave your device**\n- Extremely simple code. **One person or an LLM can fit the whole project in head**\n- The codebase is ready for your LLM to extend to your needs\n- Portable, no build systems, no Electron, just open `web/index.html` \n- Optional out of the box synchronization \n- The server is just one binary (or use iCloud/Dropbox/Google Drive for sync)\n- Telegram chatbot for on-the-go access to your files\n- **Chat-like flow for effortless thought capture**\n\n## How to use\n- Open [app.files.md](https://app.files.md)\n- Click \"Install files.md\" on the right side of the address bar:\n<div align=\"center\">\n    <img src=\"https://github.com/zakirullin/files.md/raw/main/web/img/install.png\" alt=\"Install\" title=\"Install\" width=\"350\"/>\n</div>  \n\n- Open a local folder to persist changes  \n- Occasionally hit force-refresh (`Cmd+Shift+R`) to get new updates.  \n\nP.S. For now, Chrome-based browsers are best at [File System API support](https://caniuse.com/native-filesystem-api).  \n\n## Dump your thoughts\nYou can use chat to quickly dump your thoughts.  \n\n<div align=\"center\">\n    <img src=\"https://github.com/zakirullin/files.md/raw/main/web/img/app.png\" alt=\"Files.md screenshot\" title=\"Files.md\" width=\"700\"/>\n</div>\n\nOpen the chat and send a message:\n<div align=\"center\">\n    <img src=\"https://github.com/zakirullin/files.md/raw/main/web/img/note1.png\"  width=\"350\"/>\n</div>\n\nChoose where to save (can do later):\n<div align=\"center\">\n    <img src=\"https://github.com/zakirullin/files.md/raw/main/web/img/note2.png\" width=\"350\"/>\n</div>\n\n**With this flow you can quickly save notes, tasks, journal records and checklists**.  \n\n## Dump stuff in the chatbot\nOpen the chat, write something and press `Enter`:\n\n<div align=\"center\">\n    <img src=\"https://github.com/zakirullin/files.md/raw/main/web/img/bot.gif\" alt=\"Saving things in bot\" title=\"Saving things in bot\" width=\"350\"/>\n</div>\n\nThat's it.\n\n[Telegram Bot](https://t.me/FilesMDBot). **Other messengers will follow**.\n\n## How to think deeply \n**Connect ideas. Let them compound. Think through.**\n\n1) I used [app.files.md](https://app.files.md) to grow my knowledge about brain and software development\n2) I added new notes to either `brain` or `dev` folders. One idea per note\n3) I made connections between the relevant notes in the web app (type `[`)  \n4) Everything is connected, just as in our brain\n5) **I spent time travelling through the notes and thinking it through**\n6) At one point, some `brain` and `dev` notes appeared very related\n7) This connection between two different domains produced an insight\n8) I wrote an article based on that insight: [Cognitive Load in Software Development](https://github.com/zakirullin/cognitive-load)\n\nAll this activity helped me to:\n- **Think deeply** (which is very important in the AI-age)\n- **Think systematically and see the bigger picture**\n- **Write insightful texts**\n\nTo achieve all that, **you'll have to use your brain**, not advanced templates or AI workflows.\n\n- Start with no structure at all, 0 folders\n- One idea per note\n- Every note should be understood without context\n- Apply new knowledge immediately, don't save it for future self\n- Link related notes\n- **Revisit your notes and think through**\n\nMy friends and I have been using this simple setup for five years, and it works well.\n\n## Second Brain?\nI'll quote [I Deleted My Second Brain](https://www.joanwestenberg.com/i-deleted-my-second-brain-692aa40d59d5f06dd5131e43/):\n\n> Obsidian is a brilliant piece of software. I love it, dearly. But like anything, without restraint, it can also be a trap. Markdown files in nested folders. Plugins that track your productivity. Graph views that suggest omniscience. There’s an illusion of mastery in watching your notes web into constellations. But constellations are projections. They tell stories. They do not guarantee understanding.\n>\n> When I first started using PKM tools, I believed I was solving a problem of forgetting. Later, I believed I was solving a problem of integration.\n> \n> **Eventually, I realized I had created a new problem: deferral. The more my system grew, the more I deferred the work of thought to some future self who would sort, tag, distill, and extract the gold.**\n> \n> **That self never arrived.**\n\nThe Second Brain is thrilling.  \nAdvanced guru templates, plugins and AI workflows...  \nOne wants to scrape the wisdom of the whole internet.  \nThere's some beauty in this neat system. Every new note brings dopamine.  \n\n*Second Brain is getting better*.    \n**But the first brain is not improving**.  \nAnd that’s an issue.  \nIn the AI age, your first brain is as valuable as ever.  \n\nUse **your brain** to think through the notes.  \nThe tool is not important, your thinking is.  \n\nBefore adding a new note, try to answer these questions:  \n- How this new knowledge can sharpen my judgment or expand my taxonomy?  \n- How can I see the world differently, given this new knowledge?  \n- How can I act differently?\n\n## Notes can prevent experience\n- Reading and taking notes can easily fool us into believing that we understand a text\n- We think we understand, but in reality **we just know**  \n- **At some point our \"knowing\" is so good, that we start feeling that we actually do it (or at least tried)**\n\nThe worst thing is that **we don’t let new experiences emerge because we already have knowledge**. It's a knowledge barrier. Life gives us opportunities to live through new experiences, but we refuse, because \"we already know\".\n\n## Self-help through reading and taking notes?\n**Harm caused at the emotional level must be healed at the emotional level.**\n\nNot through intellectual work and taking notes.  \nReading without action is entertainment. A form of procrastination.  \n**No amount of self-help books can heal emotional wounds.**  \nWhat can help is psychotherapy, rescripting and chair work. Meditation.  \n**Healing happens by feeling.**\n\n## When to take notes\nIf your goal is to:\n- Develop a deeper, more structured understanding of something\n- Do research\n- Write an article or a book\n\nThen taking notes is perfectly fine.\n\n## Journal\nAre you feeling good about something? Send a message.\n\n<div align=\"center\">\n    <img src=\"https://github.com/zakirullin/files.md/raw/main/web/img/journal.png\" title=\"Journaling\" width=\"350\"/>\n</div>\n\nThen click \"To Journal\".  \nOr just add ` jj` or ` жж` at the end of your message.\n\nYour record is gonna be saved nicely in the `journal/YYYY.MM Month.md` file.\n\n## Tasks ✅\nYou're in the flow.  \nA colleague asks you to send a report.  \nHolding that in your head drains energy.  \nDrop a message and stay in flow.\n\n<div align=\"center\">\n    <img src=\"https://github.com/zakirullin/files.md/raw/main/web/img/task.png\" title=\"Adding a task\" width=\"350\"/>\n</div>\n\nAdd only small, actionable items. Not things like \"Plan a vacation\".  \nYour task should be the first, small step of what should be done anyway.  \n**Not what you wish to be done, but don't have motivation just yet.**   \nYour task list should not create a feeling of guilt.  \n\nFor tasks that should be done later press \"To Later\".  \n\n## Checklists 🛒\nA friend recommends a book to you.  \nYou're out of butter and buns.  \nHolding things like this in your head is taxing.   \n\nDrop all that to chat, then move to a matching checklist.  \n\n## How to sync\n| Setup                                                 | Where your files live                 | Sync across devices | Server needed      | Best for                                             |\n|-------------------------------------------------------|---------------------------------------|-------------------|--------------------|------------------------------------------------------|\n| **Local-first**, `app.files.md` doesn't send any data  | A folder on your device               | No                | None               | Maximum privacy, your data doesn't leave your device |\n| **Cloud-folder sync** (iCloud/Dropbox/Google Drive)   | Your existing cloud folder | Yes               | None (cloud provider) | Sync across devices without running a server         |\n| **[Self-hosted sync server](docs/your-own-server.md)** | Your own (or local) server | Yes               | One Go binary      | Sync between devices inside your network             |\n| **Hosted sync server**                                | Our managed server         | Yes               | `api.files.md`      | Try it instantly, no setup                           |\n\n## Files structure\nYou don't have to think about the structure, it is predefined.  \nAlthough, you're free to use whatever structure you want.  \n\n- Chat: `Chat.md`\n- Notes: `brain/Note.md`, `<category>/*.md`\n- Projects: `Project.md`, `*.md`\n- Checklists: `Read.md`, `Watch.md`, `Shop.md`\n- Journal: `journal/2024.08 August.md`\n- Tasks: `Later.md`\n- Habits: `habits/Ate consciously.md`, `habits/*.md`\n- Images: `media/*` (png, jpg, webp, gif)\n- Archive: `archive/*.md`\n- Config: `config.json`\n\nScheme is also available at [files.md/llms.txt](https://files.md/llms.txt).  \nYou can copy-paste it into `CLAUDE.md` or `AGENTS.md`, so that your AI agent would understand the structure.  \n\n## Hotkeys\n\n| Hotkey                                 | Action                       |\n|----------------------------------------|------------------------------|\n| `[`                                    | Insert a link to a file      |  \n| `Cmd+K` / `Ctrl+K`                     | Open file search modal       |\n| `Cmd+N` / `Ctrl+N`                     | New file                     |\n| `Cmd+M` / `Ctrl+M`                     | Move file                    |\n| `Cmd+D` / `Ctrl+D`                     | Delete file                  |\n| `Cmd+Enter` / `Ctrl+Enter`             | Open chat                    |\n| `Cmd+Shift+Enter` / `Ctrl+Shift+Enter` | Toggle chat dialog           |\n| `Cmd+[` / `Ctrl+[`                     | Go to previous file          |\n| `Cmd+]` / `Ctrl+]`                     | Go to next file              |\n| `Cmd+~` / `Ctrl+~`                     | Toggle sidebar               |\n| `Cmd+B` / `Ctrl+B`                     | Toggle **bold**              |\n| `Cmd+I` / `Ctrl+I`                     | Toggle *italic*              |\n| `Cmd+Y` / `Ctrl+Y`                     | Insert checkbox              |\n| `Cmd/Ctrl` + `Click`                   | Copy inline text / open link |\n| `Ctrl+Cmd+Space`                       | Insert emoji (macOS)         |\n\n## Useful scripts for your files\nAll scripts are in `cmd` and can be run **inside your files directory**. Install [Go](https://go.dev/doc/install) first.\n\n### Add Whoop metrics to journal\n```\ngo run /abs/path/to/files.md/cmd/whoop/whoop.go\n```\n\n### Convert wikilinks to markdown links\nConvert `[[wikilinks]]` to standard `[Name](/path.md)` (`--dry-run` available):\n```\ngo run /abs/path/to/files.md/cmd/tomdlinks/tomdlinks.go .\n```\n\n### Insert backlinks\nAdds links back to referencing files (`--dry-run` available):\n```\ngo run /abs/path/to/files.md/cmd/backlink/backlink.go\n```\n\n### Shift journal timestamps\nShift timestamps in journal files by N hours (useful after timezone change):\n```\ngo run /abs/path/to/files.md/cmd/shifttime/shifttime.go\n```\n\n## Documentation\n[Deploy on your own server](docs/your-own-server.md)    \n[Chatbot](docs/bot.md)    \n[Sync flow](docs/sync-flow.md)  \n[End-to-end tests](docs/e2e-tests.md)  \n\n## Repository structure\n- `web` - web app (PWA)\n- `web/index.html` entrypoint for the web app\n- `web/lib` - web app libs\n- `cmd/server` - entrypoint for the server\n- `cmd/*/` - useful scripts for `.md` files\n- `server` - server code\n- `server/bot.go` - chatbot\n- `server/sync/` - sync API server code\n- `vendor` - backend libs\n- `tests` - E2E tests, test both the web app and the server\n\n## How to contribute\n- Junior developers should be able to understand the code\n- Ideally, eve
