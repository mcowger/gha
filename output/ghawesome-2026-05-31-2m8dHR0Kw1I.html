ry PR should remove or simplify code, not add it\n- **The less code we have, the more flexible we are**\n- All dependencies are our code and responsibility. So, avoid dependencies if possible\n- Code should be self-sufficient, so `vendor` and `web/lib` folders are included in the repository\n- **Do we really need this feature? Will it help us to do the real job, or does it just give dopamine?**\n\nRefer to [this guide](https://github.com/zakirullin/cognitive-load) for more comprehensive rules.\n\n## Backend guidelines\n- We write **tests**\n- We don't use get* prefix for methods\n- No panics, errors are part of business logic\n- If we are ignoring an error - we leave a WHY comment\n- We wrap errors all the time, we should add method's context\n- No iterators for client code\n- We prefer real implementations or at least fakes over mocks and stubs\n- Imports should only be renamed to avoid a name collision with other imports\n- **With portability in mind, everything is stored in plain `.md` files**\n\n## Frontend guidelines\n- Use `PATCHED` keyword if you modify libs in-place\n- **It would be fantastic if, one day, we replaced `CodeMirror` with our own tiny implementation**\n- No build systems, **in 10 years we will open `/web/index.html` and it should just work**\n- Don't forget that awaits between lock check and lock acquire can cause race condition\n- Avoid flaky e2e tests. First we get negative emotions, then we stop running all the tests\n- Most bugs are caused due to race conditions, when an async flow is interrupted mid through\n\n## Glossary\n- `filename` - a filename with extension, like \"note.md\" (USE THIS AS ID)\n- `header` - an extension-stripped and capitalized filename, like \"Note\"\n- `body` - file's content \n- `dir` - a dir that is meant to store notes under some category, like \"happiness\"\n- `userID` - chatID. For the most part we're only using chatID as userID (PM with the bot)\n- `ctime` for file - data blocks or metadata change time: file's ownership, location, file type and permission settings changed time. Parent folder renaming won't affect, moving the file does affect, renaming the file does affect. We need this to track file's location changes, like to understand when it was moved to archive, to track task's angry level etc\n- `mtime` for file - mtime (modification time) for a file refers to the time when the contents of the file were last modified. Unlike ctime, it is not affected by changes to the file's metadata, such as ownership, permissions, or renaming. We rely on that for synchronization.\n- `ctime` for dir - adding or removing files or subdirectories (similar to `mtime` plus inode changes like renaming files)\n\nAny file can be uniquely identified by filename and dir. We only support one level of nesting.\n\n## Performance\nThe project is blazing fast :) If you're afraid of using files or mutexes unnecessarily for performance reasons, take a look at this:  \n```\nMutex lock/unlock = 25 ns\nRead 4K randomly from SSD = 150,000 ns\n1 ms = 1,000,000 ns\n```\n\n## ADRs (Architecture Decision Records)\n- `24.05.2026` Unfold everything (images, math, mermaid) in viewport immediately. It prevents flickering and doesn't add performance penalty. P.S. We should also schedule full document unfold on viewportChange, otherwise latex/mermaid block off the viewport won't be folded.  \n- `22.05.2026` Added Mermaid support. It was decided to lazy-load the script, because mermaid.min.js size is 3MB. It's quite a load to load synchronously for such a small app. \n- `20.05.2026` Added LaTeX support, even though I wasn't happy about +20 font files. LaTeX is text-based and LLM-friendly. Text + Math will cover pretty much everything. \n- `06.05.2026` Moved from Today.md to Chat.md. CustDev showed that users have trouble grasping \"today\" concept. And besides, \"open chat\" phrase has meaning in both bot and webapp.\n- `02.05.2026` Now hide-token runs synchronously on every change, previously it had 100ms debounce which caused jitter on by word removals in links and formatted texts.\n- `02.05.2026` Merged Inbox.md and Today.md to Today.md. Inbox name is too abstract, productivity-related and GTD-ish. I want calmness and simplicity. Today is like \"the page I live in chat\".\n- `23.04.2026` Moved from API_HOST, APP_HOST to API_URL, APP_URL. For different environments it's better to provide more information like desired schema in configuration.\n- `22.04.2026` Inbox entries in the bot are now identified by a stable content hash (`fs.Hash` of the block with the `- [ ] `/`- [x] ` marker stripped) instead of a positional index, so a button keeps pointing at the right line even if other entries are added/removed/completed in between.\n- `22.04.2026` It was mentally taxing to see two buttons/messages \"to inbox\" and \"to chat\", it was not as mentally easy just to drop a task for chat. Because it went to inbox, and 1 more click needed. That one click was the reason adding new tasks became frustrating. I let go of two different flow, and now everything goes to inbox, and every item is inbox is a markdown checklist item. As a bonus, PWA app is now very handy as it shows tasks for chat by default. Also, maybe \"inbox\" is a mentally overloaded term, and \"chat\" sounds better. Will see.\n- `11.04.2026` Even though I want to store links as plain markdown links, visually I want to work with them as if they were minimal [links]. For that I decided to hide (...) part when cursor is on the line. The (...) part is only hidden for markdown-files link.\n- `11.04.2026` Brought back standard Markdown Links. I want the knowledge base to be cross-platform. It should work in GitHub.\n- `05.04.2026` Tried to move web/* stuff in the root folder for simplicity. Bad decision - there should be an explicit dir which we can use as public DOCROOT on our server.\n- `21.09.2025` Switched to [link] for links. The `[link](full%20path)` syntax is too overwhelming and clunky, plus we don't want to deal with path changes.\n- `21.09.2025` Removed WASM. I had a bug when a message was removed from Inbox.txt, and was not added to a file (I pressed \"move to file\" button). I wasn't able to reproduce the issue, but what I found is a lot of complexity. JS -> Go (writeFile) -> Go awaiting a promise from JS -> JS Golang runtime somewhere in between -> JS (writeFile) -> Go (returning from promise) -> Sending results back to JS. And it has to be done in a separate goroutine, because both WASM and JS are running in the same thread. Also, Golang's WASM is still experimental. We have too many components and a lot of uncertainty involved. I didn't want to implement same functionality in JS back then, at the solution served for some time. Now it's time to reimplement the functionality in JS and give up all this complexity. Also, inbox.wasm is ~8MB and I wanted the application to be really small.  \n- `11.07.2025` Decided to use OPFS as an initial driver for file system. Better browsers support, less hustle for users. The app starts with OPFS driver by default, if needed, user can replace the driver with Local FileSystem API by opening a local dir. DirHandle would be saved to IndexedDB in such scenario and reused every time.\n- `08.07.2025` Root folder is now '/', not ''. All files in webapp are identified by path, not by 'dir' + 'filename', restricting to 1 level of nesting.\n- `08.07.2025` Dropbox is changing some metadata for newly created files, thus ctime is changed. I was thinking about moving to mtime for sync, but that wouldn't allow us detect renames (though, we detect them through a separate mechanism anyway), so mtime can be more reliable. Also sync won't be triggered by permission/ownership change etc. Migrated to mtime. Mtime is used for content-based sync, ctime is used for append-only sync log (renames/del). Also we can restore mtime from .git/archive, unlike ctime.\n- `30.06.2025` Decided to migrate every flow to Chat.md, even todo lists. Added - we can't work with multiline tasks with this flow, we may want support both files and indices. We have two ways of doing so - encode params in a uniform way, and use same command handlers with IFs. Or we can use different command handlers to handle chat/file movements. I decided to go for different command handlers. Added, if we go for different commands - move to buttons config would be complicated. Added, maybe we can move files back to Chat.md on \"file move\", and reuse the existing flow? Added, so far seems good. Our chat.md log acts as an append-only log. As a bonus, if we don't finish some flow (like schedule/move), the content would be saved in log and we can continue scheduling/moving from the app.\n- `29.06.2025` All incoming messages go to Chat.md now by default. Before that they got moved to `/today` (and become tasks), which was good for a simple todo list, but not as convenient for other use cases. I realized that during meetings, all I needed was a simple input field where I can dump whatever stuff from my head with no further immediate action. With a possibility to review and organize it later. It can be tasks, it can be journal records, or it can be files. Also, it's better to have a really simple easy to understand default flow - we dump all the messages into one file, and that's it.  \n- `27.06.2025` Default mode for chat is \"One big file\" now, i.e. the only thing it does is dumps all the messages into one file. Again, let's start with the simplest flow, not to overwhelm users. Added later. If we choose full mode, we'll have to create dirs upfront so that \"to habits\", \"to read/shop\" etc. would work. If users don't need it, he removes the dirs, and we don't recreate them (as we would do in \"on-the-fly mode\"). So, we can't use on-the-fly strategy everywhere.\n- `26.06.2025` Before we created all necessary dirs upfront, now we create dirs on the fly. That way we won't clutter user's knowledge base right from the start.\n- `24.06.2025` Switched to microseconds for tracking file changes during sync. Gap between consecutive files creation is more than enough - ranging from 5000μs to 1000μs. We didn't go for nanosec because js is having troubles with int64 precision. Added later. Linux is using cached kernel time, which is updated at `CONFIG_HZ` interval (`grep CONFIG_HZ /boot/config-$(uname -r)`), in my case the value is 1000 (1ms). Most real-world operations operations are spaced much further apart than 1ms due to: user interaction, network latency, disk i/o. We might only have issue if we update files inside an effective/native loop. \n- `16.06.2025` I believe it's time to make our knowledge base cross-platform, by forbidding characters like \":?<>*\" in filenames. These characters aren't allowed in some environments (like Windows, PWA).\n- `14.06.2025` I wanted bot-like functionality in browser. I didn't want to re-write well-tested code in TypeScript, so I used wasm~~. And it worked perfectly good.\n- `12.06.2025` We use Telegram bot as distract-free write-only entrance to our knowledge base. The only issue is, it is not as wildly popular in EU/USA. I've come to the idea that we can transform app.files.md to a chat once we decrease the window size! Would be default behaviour on mobiles.\n- `04.06.2025` Introduced append-only log for syncing. Stateless sync is tricky to implement - we would have to send all files in every request. Since we're only renaming on server - we'll only track renames.\n- `04.06.2025` For content-only sync (no renames/deletes) we don't store any state on server, we compare hashes & last ctimes.  \n- `11.11.2024` Removed Wikilinks support. Only plain Markdown links, our knowledge base must be interoperable.\n- `26.10.2024` Updates are now processed sequentially on per-user basis. Because there were some race conditions on concurrent file writings. Also we faced out-of-order forwarded messages processing, and it was impossible to collapse them to one message.  \n- `06.10.2024` **Removed fyne.io**. At first, I wanted a lightweight alternative to Electron, and fyne.io seemed to be an ideal candidate. After a few days working with it 80% of bot functionality was implemented, and I was pretty happy with it. The thing is, to implement the rest of the functionality, we would have to apply A TREMENDOUS amount of effort. I am talking tiny details such as scrolling, emojis rendering, text selecting behaviour, links support, etc. And in future we would have to implement image uploading and markdown/html renderer, which would be also painful in such non-webview based toolkit. As much as I hate using the web stack for the desktop applications, it doesn't seem like we have a choice. Let's try wails.io.\n- `09.09.2024` We use vendoring for dependencies. We want all our few dependencies to be in the repo, so we don't care about blocked/removed dependencies. Our repository is the self-sufficient source of truth.\n- `01.09.2025` We use granular locks (in db, journal, userconfig) instead of one global per user lock so to avoid bottlenecks. Workers might use 3rd party API like ChatGPT, and we don't want to hold user's lock all that time. **PATCHED**, we added sequential per-user updates processing, `bot` can't cause RCs on its own, but `bot` & `worker` can, so we should continue using granular locks.\n- `20.08.2024` We read every userconfig value from the config file on every access. We don't need load/save whole config before/after `bot.Answer()` method. We have to reread it every time we need to change it, so we don't write back any stale data. Let's imagine we load config only once before `bot.Answer()`, next, we may have significant networking delays in `bot.Answer()` (let's say 2 seconds when making external requests), there are good changes that during those 2 seconds `worker.MoveDueTasks()` will modify `userconfig.Schedule`, causing data race (after bot's answer we write back stale data). And we don't want our schedule lost.\n- `08.08.2024` Sanitize Early, we gave up sanitizing in Path method. That's an unexpected behaviour - it breaks paths. We should sanitize everything as soon as we received. Most commands work with md5 hashes, for such cases no sanitize is needed.\n- `13.07.2024` `gofumpt` for stricter formatting. `gofumpt` is happy with a subset of the formats that gofmt is happy with. The less we have to choose between different formating options, the better.\n- `13.07.2024` FS's structure should have userFS name, to reflect the fact it user user-namespaced.\n- `09.07.2024` Note term is way too vague. Let's try to use \"file\" term, without any high level abstraction (like note).\n- `08.07.2024` Gave up on AST parsing/rendering. We had lots of corner cases via AST and the code was way complex. Markdown isn't that hard to parse, we can do it via good old straigforward code. We have 3x times less code now, and it is far less mentally taxing to understand. We did the same for MD->HTML conversion. Telegram doesn't support whole range of HTML tags, so it was easier to write our own md-to-html converter.\n- `08.07.2024` Adherence to Tolerant Reader principles. If enconunter gibberish during parsing - we skip it, but if we encounter flags of valid data (let's say `###`) but data itself is invalid - we panic. TODO preserve gibberish during read-write cycle.\n- `07.07.2024` Usage of https://github.com/rivo/uniseg. In Go, strings are read-only slices of bytes. They can be turned into Unicode code points using the for loop or by casting: []rune(str). However, multiple code points may be combined into one user-perceived character or what the Unicode specification calls \"grapheme cluster\". For example, white circle \"⚪\" has two runes, but one grapheme cluster.\n- `13.06.2024` Markdown to HTML conversion. User can have invalid Markdown in his notes, and TG API would fail to send invalid Markdown directly. So, first we escape HTML, then we convert user's Markdown to HTML and finally send it via Telegram API as HTML.\n- `13.06.2023` File hashing. Everywhere where we have user input - we should use fs.hash, otherwise we get long filenames, and tg returns `INVALID_DATA` error (callbackData max 64 bytes).\n- `13.06.2023` Introduced `db.go`. We had to abstract away Redis anyway (otherwise it's hard to write tests).\n- `13.03.2023` Package db.go doesn't store userID (we often use it separately...) Do we? Maybe we gonna use it without userID (like global bot stats?). Added: moved userID to class. Maybe in later we'll need this class outside of user's scope, but let's stay in the future. :)\n- `13.06.2023` We can't ucfist filename in fs.Put - what if that was user-created file (outside the bot), i.e. it comes with lowercase.\n\n","summary":"Files.md is a local-first markdown note app designed for keeping a private, “quiet space” for thinking using plain `.md` files stored on your device. It runs in the browser (offline-capable) with a minimal, portable approach—no separate install required—and supports workflows like journaling, checklists/tasks, and knowledge organization such as Zettelkasten via folder structures and linkable notes. The experience includes a chat-like entry flow for quickly saving thoughts, with optional synchronization and even a Telegram bot for on-the-go access. It’s a good fit for people who want self-owned, LLM-friendly files without uploading their data, as well as developers or power users who want to extend the project.","description":"🌱 Private, quiet space for thinking. A simple app for your .md files.","stars":3026,"language":"Go"},{"owner":"boratanrikulu","repo":"gobee","url":"https://github.com/boratanrikulu/gobee","readme":"# gobee\n\n**Write your BPF programs in Go, not C.** gobee transpiles a strict subset of Go into BPF C, generates typed Go bindings for the userspace side, and gates loads against the running kernel.\n\nThe Go ecosystem has solid userspace tooling for BPF. The kernel side has always ended with \"now write your program in C.\" Aya brought eBPF to Rust by writing a new BPF backend in rustc. gobee gets there a different way: by transpiling to C and reusing clang's mature backend.\n\n## A Go file in, a BPF program out\n\nA tracepoint that streams every `execve` to userspace via a ringbuf:\n\n<table>\n<tr>\n<th>Your input (Go)</th>\n<th>What gobee emits (BPF C)</th>\n</tr>\n<tr>\n<td>\n\n```go\n//go:build ignore\n\npackage main\n\nimport \"github.com/boratanrikulu/gobee/bpf\"\n\n//bpf:license GPL\n\ntype Event struct {\n    Pid  uint32\n    Comm [16]byte\n}\n\nvar Events = bpf.RingBuf[Event]{\n    MaxEntries: 4096,\n}\n\n//bpf:section tracepoint/syscalls/sys_enter_execve\nfunc OnExec(ctx *bpf.ExecveEnterCtx) bpf.TpReturn {\n    e, ok := Events.Reserve()\n    if !ok {\n        return bpf.TpOk\n    }\n    e.Pid = bpf.GetCurrentPid()\n    bpf.GetTaskComm(&e.Comm)\n    Events.Submit(e)\n    return bpf.TpOk\n}\n\nfunc main() {}\n```\n\n</td>\n<td>\n\n```c\n// Code generated by gobee. DO NOT EDIT.\n\n#include \"vmlinux.h\"\n#include <bpf/bpf_helpers.h>\n#include <bpf/bpf_core_read.h>\n\nchar _license[] SEC(\"license\") = \"GPL\";\n\nstruct Event {\n    __u32 Pid;\n    __u8 Comm[16];\n};\n\nstruct {\n    __uint(type, BPF_MAP_TYPE_RINGBUF);\n    __uint(max_entries, 4096);\n} Events SEC(\".maps\");\n\nSEC(\"tracepoint/syscalls/sys_enter_execve\")\nint OnExec(struct trace_event_raw_sys_enter *ctx) {\n    struct Event *e = bpf_ringbuf_reserve(\n        &Events, sizeof(struct Event), 0);\n    if (!e) {\n        return 0;\n    }\n    e->Pid = (__u32)(\n        bpf_get_current_pid_tgid() >> 32);\n    bpf_get_current_comm(&e->Comm, 16);\n    bpf_ringbuf_submit(e, 0);\n    return 0;\n}\n```\n\n</td>\n</tr>\n</table>\n\n`gobee translate --bindings-dir ./bpf ./bpf/src` produces both files, plus a sourcemap (`events.bpf.c.map`) so verifier errors map back to Go lines and a typed bindings file (`bpf/events_bindings.go`) so the userspace driver writes `objs.Events`, `objs.AttachOnExec()`, and decodes ringbuf payloads straight into `bpf.Event` (the same struct you see above, re-published in Go) instead of stringly-typed `coll.Programs[\"...\"]` lookups.\n\nThe C is readable on purpose. If gobee emits something weird, you can see it. For tracepoints + kprobes + XDP combined into one binary, see [`example/sysmon/`](example/sysmon/).\n\n## How it compares\n\n| | gobee | C + clang + bpf2go | Aya (Rust) | bpftrace | BCC |\n|---|---|---|---|---|---|\n| Kernel-side language | Go subset | C | Rust | DSL | C |\n| Userspace integration | typed Go bindings + cilium/ebpf | bpf2go | aya-runtime | none | python |\n| CO-RE | ✅ via clang | ✅ | ✅ via LLVM | ✅ | ✅ |\n| Helper coverage | 200 typed Go wrappers | full (write C) | full | limited | full (write C) |\n| Verifier error → source | ✅ Go file:line:col | ❌ raw C | ✅ Rust file:line | ❌ | partial |\n| Kernel-version gate at load | ✅ via bpfvet | manual | manual | n/a | runtime |\n| Toolchain deps | Go + clang | clang + bpf2go | rustc + LLVM | bpftrace | python + bcc |\n| Generated artifact | `.bpf.o` + Go binary | `.bpf.o` + Go binary | `.bpf.o` + Rust binary | JIT | JIT |\n\nIf you're already in a C / libbpf workflow, gobee is not trying to replace it wholesale. It's for cases where you want the kernel side, the userspace side, and the build pipeline all in one Go module.\n\n## What's supported today\n\nSee [`docs/status.md`](docs/status.md) for the full matrix (Go subset, statements, expressions, every helper, every map type, every directive). Quick view:\n\n| Surface | Coverage |\n|---|---|\n| **Program types** (8) | XDP, tracepoint, kprobe / kretprobe, uprobe / uretprobe, sock_ops, TC, cgroup_skb, LSM |\n| **Map types** (19) | `array`, `hash`, `lru_hash`, per-CPU variants, `bloom_filter`, `lpm_trie`, `ringbuf`, `perf_event_array`, `prog_array`, `queue`, `stack`, sk/task/inode storage, devmap/cpumap/xskmap |\n| **BPF helpers** | ~200 typed Go stubs auto-generated from libbpf v1.5.0 headers. The ones exercised by `example/helloworld/` and `example/sysmon/` are tested in real-kernel CI; the rest are unverified. File an issue if a stub doesn't match the kernel signature |\n| **CO-RE** | ✅ auto-detected. `BPF_CORE_READ` for kernel-internal struct fields (`task_struct`, `sock`, `inode`); direct `ctx->field` for UAPI BPF context structs (`xdp_md`, `__sk_buff`, `bpf_sock_ops`). Exercised on Linux 6.x (Ubuntu 24.04 CI); older kernels not yet in the CI matrix |\n| **BTF-ready output** | ✅ emitted C includes `vmlinux.h` and uses `BPF_CORE_READ` for kernel-internal field reads, so the BTF clang generates from `clang -g` carries the right relocations. clang itself stays your responsibility (the example Makefiles show the canonical invocation) |\n| **User-defined helpers** | ✅ top-level Go funcs without `//bpf:section` are emitted as `static __always_inline` C functions |\n| **Typed Go bindings** | ✅ `Load<Stem>`, `Close`, per-program `Attach<Name>`, `AttachAll`, plus your kernel-side struct types and constants re-published in Go |\n| **Kernel-version gate** | ✅ [bpfvet](https://github.com/boratanrikulu/bpfvet) runs at load time. Fails fast with `bpf program needs kernel >= 5.8, host is 5.4` instead of opaque `EINVAL` |\n| **Verifier error → Go source** | ✅ auto-annotated inside `Load<Stem>`. No manual pipe to `gobee diagnose`; `*ebpf.VerifierError` comes back with `→ counter.go:18:5` markers |\n| **Sourcemap sidecar** | ✅ `<stem>.bpf.c.map` written next to every `.bpf.c` for offline `gobee diagnose` use too |\n| **Cross-arch** | ✅ Linux arm64 + amd64 |\n\n## What gobee does\n\n- Transpiles a Go subset to BPF C (and runs `go/types` over your input first, so misuses surface at `file:line:col`).\n- Generates a typed `<Stem>_bindings.go` next to the `.bpf.c`: `bpf.LoadCounter(spec)`, `objs.PerIface.Lookup(...)`, `objs.AttachAll(ifindex)`, plus your kernel-side struct types and constants re-published in Go.\n- Auto-annotates `*ebpf.VerifierError` from `LoadAndAssign` with Go source positions, no manual `gobee diagnose` pipe needed.\n- Runs [bpfvet](https://github.com/boratanrikulu/bpfvet) inside `Load<Stem>` so old kernels fail fast with `bpf program needs kernel >= 5.8, host is 5.4`.\n- Surfaces ~200 typed Go stubs for the libbpf v1.5.0 helper set, plus user-defined helper functions emitted as `static __always_inline`.\n\n## What gobee won't do\n\n- **Replace clang.** clang's BPF backend gives us CO-RE, BTF, and verifier-friendly codegen for free. Reimplementing that costs years and gains nothing.\n- **Replace `cilium/ebpf`.** The generated bindings sit on top of it.\n- **Hide BPF.** The Go subset maps 1:1 to BPF C idioms. If you know BPF, gobee is thin sugar. If you don't, the manual is still required reading.\n- **Run clang for you.** Compile, embed, and load remain user-owned. Same pattern as bpf2go.\n\n## Why transpile, not generate BPF directly\n\n`gc`, the Go compiler, has no LLVM-based BPF backend. Adding one is a multi-year compiler project. `rustc` is built on LLVM and that's why Aya works. So gobee emits C and reuses clang's BPF backend, which gives us mature codegen, BTF, and CO-RE relocations for free.\n\n## Quickstart\n\n```bash\ngo install github.com/boratanrikulu/gobee/cmd/gobee@latest\n\ncd example/helloworld\nmake build                     # gobee translate, clang, go build\nsudo ./helloworld eth0\n```\n\nYou'll need clang with the BPF target. On Linux that's the distro package; on macOS, `brew install llvm`. The transpiler itself is pure Go and runs anywhere.\n\n## Project layout (typical)\n\n```\nyourproject/\n├── bpf/                      # Go package, importable from anywhere in your project\n│   ├── embed_amd64.go        # //go:embed bin/x86/your.bpf.o\n│   ├── embed_arm64.go\n│   ├── your_bindings.go      # generated by gobee\n│   ├── bin/{x86,arm64}/your.bpf.o\n│   └── src/                  # not a Go package; clang lives here\n│       ├── your.go           # //go:build ignore: BPF source\n│       ├── your.bpf.c        # generated\n│       ├── Makefile          # clang per arch\n│       └── vmlinux.h         # vendored BTF dump\n├── main.go                   # imports yourproject/bpf\n└── Makefile\n```\n\nThe split keeps `bpf/` a clean importable Go package (Go rejects `.c` files in non-cgo packages). Kernel sources and clang artifacts live one level down in `bpf/src/`.\n\n## Examples\n\n- `example/helloworld/`: the canonical XDP packet counter, ~40 lines BPF, ~80 lines userspace.\n- `example/sysmon/`: XDP, two tracepoints, and a kprobe in one binary, sharing a ringbuf for events. Demonstrates per-syscall typed contexts, user-defined helper functions, and the `AttachAll` shortcut.\n\n## CI\n\nGitHub Actions runs four layers on every push:\n\n1. `go test`, `go vet`, transpiler golden tests\n2. Coverage matrix: every map type and `//bpf:section` kind has at least one example\n3. clang compile of every curated example, then `bpfvet` portability report\n4. Real-kernel verifier acceptance: `ebpf.NewCollectionWithOptions` on each `.bpf.o` (Ubuntu 24.04 runner, kernel 6.x)\n\n## Docs\n\n- [`docs/design.md`](docs/design.md): architecture and rationale\n- [`docs/go-subset.md`](docs/go-subset.md): accepted Go syntax in BPF source files\n- [`docs/directives.md`](docs/directives.md): `//bpf:*` reference\n- [`docs/status.md`](docs/status.md): support matrix (single source of truth)\n\n## Toolchain\n\n- The gobee binary builds anywhere (pure Go, no CGO).\n- Compiling `.bpf.o` needs clang with the BPF target. Apple's bundled clang doesn't ship with it; on macOS use `brew install llvm` or build inside a Linux VM.\n- Running the artifact needs Linux on arm64 or amd64.\n\n## Inspirations\n\n- [Solod](https://github.com/solod-dev/solod): the Go-to-C transpiler that proved this pattern works.\n- [Aya](https://github.com/aya-rs/aya): the Rust eBPF framework whose ergonomics gobee chases.\n\n## License\n\nMIT. See [LICENSE](LICENSE).\n\nCopyright (c) 2026 Bora Tanrikulu &lt;me@bora.sh&gt;\n","summary":"gobee lets you write eBPF programs in a strict Go subset and automatically transpiles them into BPF-compatible C, then generates typed Go bindings for the userspace side. It supports multiple eBPF program types and common map types (including ringbuf and perf event maps), while emitting artifacts like source maps so verifier errors can be traced back to the original Go code. It also gates loads against the running kernel to reduce compatibility issues. This is best for Go developers who want an end-to-end eBPF workflow (kernel program, userspace integration, and build pipeline) without hand-writing C or relying on stringly typed program/map lookups.","description":"Write your BPF programs in Go, not C. gobee transpiles a Go subset to BPF C and generates typed cilium/ebpf bindings.","stars":289,"language":"Go"},{"owner":"elixir-volt","repo":"volt","url":"https://github.com/elixir-volt/volt","readme":"# Volt ⚡\n\n[![Hex.pm](https://img.shields.io/hexpm/v/volt.svg)](https://hex.pm/packages/volt) [![Documentation](https://img.shields.io/badge/documentation-gray)](https://hexdocs.pm/volt)\n\nVite-level frontend tooling that runs inside the BEAM. One dep replaces esbuild, the Tailwind CLI, and Node.js with Rust NIFs powered by [OXC](https://oxc.rs), [LightningCSS](https://lightningcss.dev), and [QuickBEAM](https://github.com/elixir-volt/quickbeam) for embedded JavaScript runtimes.\n\n```bash\nmix igniter.install volt\nmix phx.server\n```\n\nThe installer configures everything. No binaries to download, no extra processes to manage.\n\n## Why Volt\n\nPhoenix ships with esbuild and a Tailwind CLI as separate binaries downloaded at compile time. They can't coordinate HMR or share work, and anything beyond vanilla JS requires Node.js.\n\nVolt replaces both with a single Elixir dep. `mix phx.server` starts the frontend toolchain automatically, rebuilding Tailwind in ~40ms on template changes and hot-swapping JS modules via HMR. Compilation errors show as a browser overlay. Production builds finish in under 100ms.\n\nYou also get features you'd expect from Vite: code splitting, CSS Modules, JSON imports, asset query modes, web workers, HTML entry points, `import.meta.glob()`, dynamic import variables, `.env` variables, static asset imports, import aliases, and `import.meta.hot` with state preservation.\n\nThe pieces integrate because they run in one toolchain: template edits can trigger incremental Tailwind rebuilds, browser console output can flow back to your Elixir terminal, and project-specific JS/TS lint rules can be written as Elixir modules. See the [Features guide](https://hexdocs.pm/volt/features.html) for the full list.\n\n## Installation\n\n```bash\nmix igniter.install volt\n```\n\nOr add the dep manually:\n\n```elixir\ndef deps do\n  [{:volt, \"~> 0.14\"}]\nend\n```\n\nSee the [Getting Started guide](https://hexdocs.pm/volt/getting-started.html) for manual configuration.\n\n## Configuration\n\nStandard `config/*.exs`. No `vite.config.js`, no `tailwind.config.js`:\n\n```elixir\nconfig :volt,\n  entry: [\"assets/js/app.ts\", \"assets/js/admin.ts\"],\n  target: :es2020,\n  import_source: \"react\",\n  aliases: %{\n    \"@\" => \"assets/src\",\n    \"@components\" => \"assets/src/components\"\n  },\n  external: ~w(phoenix phoenix_html phoenix_live_view),\n  chunks: %{\n    \"vendor\" => [\"react\", \"react-dom\"],\n    \"ui\" => [\"assets/src/components\"]\n  },\n  env_prefix: [\"VOLT_\", \"PUBLIC_\"],\n  asset_url_prefix: \"/assets\",\n  public_dir: \"public\",\n  sourcemap: :hidden,\n  tailwind: [\n    css: \"assets/css/app.css\",\n    sources: [\n      %{base: \"lib/\", pattern: \"**/*.{ex,heex}\"},\n      %{base: \"assets/\", pattern: \"**/*.{js,ts,jsx,tsx,vue,svelte}\"}\n    ]\n  ],\n  plugins: [MyApp.MarkdownPlugin]\n\nconfig :volt, :server,\n  prefix: \"/assets\",\n  watch_dirs: [\"lib/\"]\n```\n\n`Volt.static_path/2` resolves Volt-managed assets to source files in dev and content-hashed paths in production:\n\n```heex\n<link phx-track-static rel=\"stylesheet\" href={Volt.static_path(@endpoint, \"/assets/css/app.css\")} />\n<script defer phx-track-static type=\"module\" src={Volt.static_path(@endpoint, \"/assets/js/app.js\")}><\/script>\n<img src={Volt.static_path(@endpoint, \"/assets/images/logo.svg\")} />\n```\n\n## Production builds\n\n```\n$ mix volt.build\n\nBuilding Tailwind CSS...\n  app-1a2b3c4d.css  23.9 KB\nBuilt Tailwind in 43ms\nBuilding \"assets/js/app.ts\"...\n  app-5e6f7a8b.js  128.4 KB  (gzip: 38.2 KB)\n  manifest.json  2 entries\nBuilt in 15ms\n```\n\nTree-shaking, minification, code splitting, configurable env prefixes and asset URL prefixes, source maps, content-hashed JavaScript/CSS/assets, and manifest output. `Volt.Preload.tags/2` can generate modulepreload tags from the manifest, and the build is ready for `mix phx.digest`.\n\n## Framework support\n\nVue SFCs with scoped CSS, React JSX with the automatic runtime, Svelte 5 with runes, and Solid JSX all compile without Node.js installed. Plain TypeScript with LiveView hooks works too.\n\nSee the [examples](https://github.com/elixir-volt/volt/tree/master/examples) for complete Phoenix projects with each framework.\n\n## Developer tools\n\nJS/TS formatting and linting run as Rust NIFs. `mix format` handles Elixir and JavaScript together:\n\n```elixir\n# .formatter.exs\n[plugins: [Volt.Formatter], inputs: [\"assets/**/*.{js,ts,jsx,tsx}\"]]\n```\n\n```bash\nmix format           # Elixir + JS/TS\nmix volt.lint        # 650+ oxlint rules\nmix volt.js.check    # format + lint for CI\nmix volt.js.check --type-aware --type-check\n```\n\nProject-specific lint rules can be written in Elixir with `OXC.Lint.Rule`. Type-aware TypeScript rules can run through `tsgolint` with `--type-aware`.\n\n## Plugins\n\nExtend the build pipeline with the `Volt.Plugin` behaviour. Plugins can turn custom file types into JavaScript and CSS, resolve virtual modules, transform parsed JavaScript and CSS ASTs, customize vendor prebundling, render final chunks, or call JS tooling through a QuickBEAM-powered embedded runtime:\n\n```elixir\ndefmodule MyApp.MarkdownPlugin do\n  @behaviour Volt.Plugin\n\n  def name, do: \"markdown\"\n\n  def compile(path, source, _opts) do\n    if String.ends_with?(path, \".card.md\") do\n      html = Earmark.as_html!(source)\n\n      {:ok,\n       %Volt.Pipeline.Result{\n         code: \"export default #{Jason.encode!(html)};\\n\",\n         css: \".markdown-card { padding: 1rem; border-radius: .75rem; }\"\n       }}\n    end\n  end\nend\n```\n\n```elixir\nconfig :volt, plugins: [MyApp.MarkdownPlugin]\n```\n\nSee the [Plugins guide](https://hexdocs.pm/volt/plugins.html) for the full hook API.\n\n## Documentation\n\nFull documentation, guides, and cheatsheets on [HexDocs](https://hexdocs.pm/volt).\n\n## License\n\nMIT © 2026 Danila Poyarkov\n","summary":"Volt is Vite-level frontend tooling that runs entirely inside the BEAM for Elixir/Phoenix projects, replacing esbuild, the Tailwind CLI, and Node.js with Elixir tooling backed by Rust NIFs (via OXC, LightningCSS, and QuickBEAM). It provides fast incremental Tailwind rebuilds with hot module replacement, browser overlay error reporting, and a modern module-based workflow including code splitting, CSS Modules, import/asset features, web workers, HTML entry points, env variables, and `import.meta.hot` state preservation. Production builds are designed to be quick and produce content-hashed optimized JS/CSS/assets and manifests ready for `mix phx.digest`. This is best for Phoenix developers who want a cohesive, Node-free frontend toolchain with Vite-like capabilities and tighter integration with Elixir and LiveView.","description":"Elixir-native frontend build tool — dev server, HMR, and production builds for JavaScript, TypeScript, Vue SFCs, and CSS. No Node.js required.","stars":154,"language":"Elixir"},{"owner":"Mnexa-AI","repo":"e2a","url":"https://github.com/Mnexa-AI/e2a","readme":"# e2a — Email for AI agents\n\n[![Tests](https://github.com/Mnexa-AI/e2a/actions/workflows/test.yml/badge.svg?branch=main)](https://github.com/Mnexa-AI/e2a/actions/workflows/test.yml)\n[![Build image](https://github.com/Mnexa-AI/e2a/actions/workflows/build-image.yml/badge.svg?branch=main)](https://github.com/Mnexa-AI/e2a/actions/workflows/build-image.yml)\n[![License](https://img.shields.io/github/license/Mnexa-AI/e2a)](LICENSE)\n[![npm @e2a/sdk](https://img.shields.io/npm/v/%40e2a%2Fsdk?label=%40e2a%2Fsdk)](https://www.npmjs.com/package/@e2a/sdk)\n[![PyPI e2a](https://img.shields.io/pypi/v/e2a)](https://pypi.org/project/e2a/)\n\n<a href=\"https://www.producthunt.com/products/e2a-open-source-email-api-for-agents?embed=true&utm_source=badge-featured&utm_medium=badge&utm_campaign=badge-e2a-open-source-email-api-for-agents\" target=\"_blank\" rel=\"noopener noreferrer\"><img alt=\"e2a – open-source email API for agents - Give your AI agents a real, authenticated email address. | Product Hunt\" width=\"250\" height=\"54\" src=\"https://api.producthunt.com/widgets/embed-image/v1/featured.svg?post_id=1145559&theme=light&t=1778615217650\"></a>\n\nAuthenticated email gateway for AI agents. Receive emails as webhooks or via WebSocket, send emails through an HTTP API, and verify the identity of every sender — humans and other agents alike.\n\n- **Authenticated transport** — SPF/DKIM verified on inbound; HMAC-signed `X-E2A-Auth-*` headers on every delivery\n- **Two delivery modes** — webhook (cloud agents) or WebSocket (local agents, no public URL needed)\n- **Outbound API** — agents send to other agents (SMTP relay) or humans (upstream SMTP, e.g. SES, Resend)\n- **Human in the loop** — opt-in approval gate that holds outbound mail until a reviewer approves via dashboard, magic-link email, or CLI\n- **CLI + SDKs** — TypeScript and Python SDKs, plus a `e2a` CLI for everyday agent ops\n\n<video src=\"https://github.com/user-attachments/assets/b55a8f18-6470-44e3-a053-97dfb787228c\" controls autoplay muted loop width=\"800\"></video>\n\n## Use it\n\nYou can either use the hosted instance or self-host.\n\n- **Hosted** — sign up at [e2a.dev](https://e2a.dev). Includes the shared `agents.e2a.dev` domain for instant slug-based onboarding (no DNS setup), a dashboard, and managed deliverability.\n- **Self-host** — see [Quickstart](#quickstart) and [Deployment](#deployment). Every feature works the same; the shared-domain slug shortcut just needs you to point a mail domain at your relay and set `shared_domain` in `config.yaml`.\n\n## How it works\n\n```\nHuman (Gmail/Outlook)\n    │\n    ▼ SMTP\n┌──────────────┐\n│   e2a relay   │  ← MX record for your agent domain points here\n│              │\n│  1. Verify   │  ← SPF/DKIM check on the inbound message\n│  2. Sign     │  ← HMAC-signed X-E2A-Auth-* headers\n│  3. Deliver  │\n└──────────────┘\n    │\n    ├──▶ Cloud-mode agent: HTTPS webhook POST\n    │\n    └──▶ Local-mode agent: store + WebSocket notification\n              │\n              ▼\n         e2a listen (CLI) or client.listen() (SDK)\n```\n\nInbound flow: SMTP → SPF/DKIM check → agent lookup → HMAC-sign auth headers → webhook or WebSocket delivery.\n\nOutbound flow: API call → optional HITL hold → SMTP relay (agent-to-agent) or upstream SMTP (agent-to-human).\n\n## Quickstart\n\nRequires Docker.\n\n```bash\ngit clone https://github.com/Mnexa-AI/e2a.git\ncd e2a\ndocker compose up -d\n```\n\nPostgres comes up first (migrations run automatically), then the API server, then the dashboard. Three host ports:\n\n- `:8080` — HTTP API\n- `:2525` — SMTP relay\n- `:3000` — Dashboard (Caddy + Next.js, proxies `/api/*` to the API server)\n\nHealth check:\n\n```bash\ncurl http://localhost:8080/api/health\n# {\"status\":\"ok\"}\n```\n\nOpen `http://localhost:3000` in a browser to view the dashboard. Sign-in requires Google OAuth credentials configured in `config.yaml`; for an API-only smoke test you can skip the dashboard and use the bootstrap flow below.\n\nCreate your first user and API key (no OAuth required):\n\n```bash\ndocker compose exec e2a e2a -config /etc/e2a/config.yaml -bootstrap-email you@example.com\n# User:    you@example.com (id=...)\n# API key: e2a_...\n```\n\nSave the key — it's only shown once. Register an agent and confirm it works:\n\n```bash\nKEY=e2a_...\ncurl -X POST http://localhost:8080/api/v1/agents \\\n  -H \"Authorization: Bearer $KEY\" -H \"Content-Type: application/json\" \\\n  -d '{\"slug\":\"my-bot\",\"agent_mode\":\"local\"}'\n\ncurl -H \"Authorization: Bearer $KEY\" http://localhost:8080/api/v1/agents\n```\n\nTo receive real inbound mail, point a domain's MX record at your relay host:\n\n- **A**: `your-domain.com` → server IP\n- **MX**: `your-domain.com` → `your-domain.com` (priority 10)\n\nThen register and verify the domain through the API (see [Domains](#domains)). Without DNS, the API still works for testing — but external email won't reach your relay.\n\n> **Upgrades and migrations.** The compose file mounts `migrations/` into Postgres' init directory, which only runs on first start (when the data volume is empty). When you upgrade e2a and pull a new schema migration, you must apply it manually:\n> ```bash\n> docker compose exec postgres sh -c \\\n>   'for f in /docker-entrypoint-initdb.d/*.sql; do psql -U e2a -d e2a -f \"$f\" -v ON_ERROR_STOP=1; done'\n> ```\n> The migration files are idempotent (`CREATE TABLE IF NOT EXISTS`, `ALTER TABLE … ADD COLUMN IF NOT EXISTS`) so re-running them is safe.\n\n## Concepts\n\n### Agent modes\n\nAgents operate in one of two modes, set via `agent_mode` at registration:\n\n| Mode | Delivery | Public URL needed? |\n|------|----------|---------------------|\n| `cloud` (default) | HTTPS webhook POST to `webhook_url` | Yes |\n| `local` | WebSocket notification + REST fetch | No |\n\nLocal-mode agents accumulate \"unread\" messages while disconnected; on reconnect, the server drains them as WebSocket notifications. Both modes can also poll messages via the REST API.\n\n### Auth headers\n\nEvery email delivered through e2a (webhook or WebSocket-fetched) carries signed headers:\n\n| Header | Description |\n|--------|-------------|\n| `X-E2A-Auth-Verified` | `true` if domain-level auth (SPF or DKIM) passed |\n| `X-E2A-Auth-Sender` | Verified sender email or agent domain |\n| `X-E2A-Auth-Entity-Type` | `human` or `agent` |\n| `X-E2A-Auth-Domain-Check` | SPF/DKIM result string (e.g. `spf=pass; dkim=none`) |\n| `X-E2A-Auth-Delegation` | `agent={id};human={id}` if an active delegation binding exists |\n| `X-E2A-Auth-Timestamp` | RFC3339 timestamp |\n| `X-E2A-Auth-Message-Id` | Internal e2a message ID this delivery is for |\n| `X-E2A-Auth-Body-Hash` | Hex SHA-256 of the raw message bytes |\n| `X-E2A-Auth-Signature` | HMAC-SHA256 over a canonical string of the above |\n\nThe signature covers:\n\n```\nverified \\n sender \\n entity_type \\n domain_check \\n delegation \\n timestamp \\n message_id \\n body_hash\n```\n\nThe MAC binds to **both** `message_id` and a SHA-256 of the raw message body. Substituting either invalidates the signature, so an attacker who captures one delivery cannot replay the auth claim on a different message or under a modified body.\n\n#### Verifying the signature\n\nThe `X-E2A-Auth-Verified` field is the *server's claim* — anyone who can reach your webhook URL can set it. To make a security decision, **verify the signature** with one of your account's signing secrets (manage them in the dashboard's **Webhook secrets** page, or via `/api/v1/users/me/signing-secrets`).\n\nThe SDKs gate field access behind verification by default — accessing `email.sender`, `email.subject`, etc. on an unverified webhook payload raises `UnverifiedEmailError`, so you can't accidentally trust attacker-controllable fields. The one-call shortcut:\n\n```python\nfrom e2a.v1 import E2AClient\nclient = E2AClient()  # reads E2A_API_KEY\nemail = client.parse_webhook(request_body)  # reads E2A_WEBHOOK_SECRET; raises on bad signature\n# safe to use email.sender, email.subject, …\n```\n\n```typescript\nimport { E2AClient } from \"@e2a/sdk\";\nconst email = await client.parseWebhook(req.body); // throws on bad signature\n```\n\nBoth forms read the secret from `E2A_WEBHOOK_SECRET` by default; pass it explicitly as a second argument if you keep it elsewhere. Under the hood the verify step checks, in order: body_hash matches the raw message bytes, HMAC matches the canonical auth string, and timestamp is within a 5-minute replay window.\n\nEmails returned by `client.get_message(...)` are pre-verified — the bearer token already authenticated the channel — so field access works directly without a verify step. (Listing endpoints like `get_messages` / `listMessages` return lightweight summaries, not `InboundEmail`, so the gate doesn't apply.)\n\n### Conversation threading\n\nBoth `send` and `reply` accept an opaque `conversation_id`. e2a propagates it to the recipient on delivery via `payload.conversation_id`, surfaced in this priority order:\n\n1. **`X-E2A-Conversation-Id` header** — authoritative for e2a-to-e2a traffic. Only honored when the SMTP envelope `MAIL FROM` originates from this relay, so external senders cannot forge it.\n2. **`In-Reply-To` / `References` lookup** — standard RFC 5322 threading, scoped to the recipient agent's own messages. Covers humans replying from Gmail/Outlook.\n\nFirst contact from a human arrives with `conversation_id: null` — the agent should assign a new id before replying.\n\n### Human in the loop (HITL)\n\nWhen an agent has HITL enabled, outbound `send` and `reply` calls do **not** dispatch immediately. The message is stored with status `pending_approval` and the API returns HTTP `202 Accepted`. A reviewer must approve it before delivery; otherwise, after a configurable TTL, the message expires into `expired_approved` (auto-sent) or `expired_rejected` (discarded), depending on the agent's `hitl_expiration_action`.\n\nReviewers can approve or reject via:\n\n- **Dashboard / API** — `POST /api/v1/messages/{id}/approve` or `/reject`\n- **Magic-link email** — sent automatically when HITL fires; one-click `GET /api/v1/approve?token=…` and `/reject?token=…` URLs (requires `E2A_PUBLIC_URL` and outbound SMTP configured)\n- **CLI** — `e2a pending` lists held messages\n\nEnable HITL on an agent via `PUT /api/v1/agents/{email}` with `hitl_enabled: true` and an optional `hitl_expiration_action` and TTL.\n\n## API\n\nAll endpoints are under `/api/v1` unless noted. Auth is `Authorization: Bearer <api_key>` except for `/api/health`, `/api/v1/info`, `/api/feedback`, and the HITL magic-link routes. Path parameters containing `@` (agent emails) must be URL-encoded.\n\nThe surface covers domain registration + verification, agent CRUD, inbound/outbound messages, HITL approve/reject (API key or signed magic-link token), GDPR-style export and deletion, and a WebSocket channel for local-mode agents.\n\nSee [docs/api.md](docs/api.md) for the full endpoint reference, or [`web/public/openapi.yaml`](web/public/openapi.yaml) for the machine-readable spec.\n\n## CLI\n\n```bash\nnpm install -g @e2a/cli\ne2a login\n```\n\n| Command | Description |\n|---------|-------------|\n| `e2a agents register <slug>` | Register `<slug>@<shared-domain>`. The deployment's shared domain is auto-discovered after `e2a login` and cached in `~/.e2a/config.json`. |\n| `e2a agents list` | List your agents |\n| `e2a agents update <email>` | Update an agent (webhook URL, mode, HITL) |\n| `e2a agents delete <email>` | Delete an agent |\n| `e2a listen` | Listen for emails over WebSocket (real-time) |\n| `e2a listen --json` | Output one full message JSON per line |\n| `e2a listen --forward <url>` | Forward each message as HTTP POST to a local URL |\n| `e2a inbox` | List recent messages |\n| `e2a read <id>` | Read a message |\n| `e2a reply <id> --body …` | Reply to a message |\n| `e2a send --to … --subject … --body …` | Send an email |\n| `e2a pending` | List HITL messages awaiting approval |\n| `e2a config` | View or update CLI config |\n\nThe `listen --forward` mode also supports OpenAI Responses API forwarding via `--forward-token`, which formats each inbound email as a Responses payload and auto-replies with the model's output:\n\n```bash\ne2a listen --forward http://localhost:18789/v1/responses --forward-token <token>\n```\n\nSee [cli/README.md](cli/README.md) for full reference.\n\n## SDKs\n\n### Python\n\n```bash\npip install e2a            # webhook mode\npip install 'e2a[ws]'      # adds WebSocket support\n```\n\n```python\nfrom e2a.v1 import E2AClient\n\nclient = E2AClient()                          # reads E2A_API_KEY\nemail = client.parse_webhook(request_body)    # parse + HMAC-verify (reads E2A_WEBHOOK_SECRET)\nprint(email.sender, email.subject)\nemail.reply(\"Got it!\", conversation_id=\"conv_123\")\n```\n\nWebSocket (local agents):\n\n```python\nfrom e2a.v1 import AsyncE2AClient\n\nasync with AsyncE2AClient(api_key=\"e2a_…\") as client:\n    async for notif in client.listen(\"bot@your-domain.com\"):\n        # notif is lightweight metadata — fetch the body when you want it\n        email = await client.get_message(notif.message_id)\n        await email.reply(\"Got it!\")\n```\n\nSee [sdks/python/README.md](sdks/python/README.md).\n\n### TypeScript\n\n```bash\nnpm install @e2a/sdk\n```\n\nSee [sdks/typescript/README.md](sdks/typescript/README.md).\n\n## Deployment\n\nThree audiences each configure a different surface:\n\n| Audience | What they configure | Where |\n|---|---|---|\n| **Server operator** — runs the Go backend | DB, signing key, SMTP, OAuth, optional shared domain | `config.yaml` + `E2A_*` env |\n| **CLI / SDK user** — calls the API from their machine | Just the deployment URL (and login) | `E2A_URL` + `e2a login` |\n| **Web dashboard deployer** — hosts the Next.js dashboard | Public site URL + branding | `NEXT_PUBLIC_*` build-time env |\n\nThe Go binary runs on any container host; storage is plain Postgres 14+; outbound mail goes through standard SMTP. Most workers coordinate via `SELECT … FOR UPDATE SKIP LOCKED`, so multi-replica is safe — the two real horizontal-scaling caveats are in-memory WebSocket fan-out and per-process rate limits.\n\nSee [docs/deployment.md](docs/deployment.md) for the full env-var reference, shared-domain DNS setup, and scaling/limitation notes.\n\n## Security\n\n- **Identity** — agent registration requires DNS TXT verification of domain ownership (custom domains)\n- **Domain auth** — SPF and DKIM checked on every inbound message\n- **Header signatures** — HMAC-SHA256 over canonical auth-header string; reject if timestamp older than 5 minutes\n- **SSRF protection** — webhook URLs must be HTTPS (in production), resolve to public IPs, use domain names (no raw IPs, no private/loopback ranges)\n- **OAuth CSRF** — single-use, time-limited nonce in the `state` parameter\n- **Production mode** (`E2A_ENV=production`) enforces the above where development mode is more permissive\n\nReport security issues privately — see [SECURITY.md](SECURITY.md) for the disclosure process and what's in scope. **Do not file public GitHub issues for vulnerabilities.**\n\n## Data handling\n\nMessage envelopes and inbound bodies live in Postgres for 30 days by default; outbound bodies are scrubbed at terminal HITL transition; API keys are stored as hashes; attachments go in JSONB rows (no S3/GCS). Application logs include sender/recipient addresses (standard MTA practice) but never bodies, attachments, raw keys, or HMAC secrets. Users can self-export (`GET /users/me/export`) and self-delete (`DELETE /users/me`) for GDPR Art. 15 / Art. 17 / CCPA.\n\nSee [docs/data-handling.md](docs/data-handling.md) for the full retention table, log fields, user-rights endpoints, and the operator-side responsibilities (backups, TLS, at-rest encryption, log redaction, compliance).\n\n## FAQ\n\n### Why not just use SendGrid / Resend / Postmark for sending and their inbound parsing for receiving?\n\nFour things that aren't possible to bolt on without significant rework:\n\n1. **Local-mode agents with no public URL.** Agents authenticate with their API key, open a WebSocket to `/api/v1/agents/{email}/ws`, and inbound mail arrives as JSON over that connection — no webhook URL, no ngrok, no port forward. Useful for agents on developer laptops, edge devices, or behind corporate firewalls. SendGrid/Resend are webhook-only by design. A polling REST API is available as fallback.\n\n2. **Conversation threading on every reply.** Whether a human replies from Gmail or another e2a agent replies via the API, the inbound message arrives at the agent with a stable `conversation_id` already mapped to the original thread. For human senders, the relay does standard `In-Reply-To` / `References` lookup scoped to the recipient agent's own messages. For agent-to-agent where both sides are on e2a, it also trusts an `X-E2A-Conversation-Id` header it controls (envelope-from is its own domain), which survives clients that rewrite threading headers. SendGrid/Resend never see inbound mail — they aren't receivers — so neither path is available without you building both yourself.\n\n3. **Slug provisioning on a shared domain.** Operators set `shared_domain: agents.e2a.dev` and users `POST {\"slug\": \"my-agent\"}` to immediately get `my-agent@agents.e2a.dev` with no DNS configuration. Possible because e2a *is* the SMTP relay claiming the domain — Resend / SendGrid are providers, not platforms, and can't multi-tenant a shared address space without you running the relay yourself.\n\n4. **Built-in HITL hold + auto-expiration.** A per-agent `hitl_enabled` flag holds outbound mail in `pending_approval` state. Reviewers approve via dashboard, magic-link email, or CLI; a background worker auto-acts on expired holds based on `hitl_expiration_action` config. Magic-link tokens are HMAC-encoded — stateless, no session backend. With Resend / SendGrid you'd hold the message in your own DB, build the timer, the approval UI, and the stateless review tokens.\n\nYou can absolutely use SES / Resend / SendGrid as e2a's *outbound* SMTP for delivery to humans — that's what `outbound_smtp` in `config.yaml` is for. They complement e2a; they don't replace the inbound receiver, agent abstraction, or any of the layers above transport.\n\n### Why email at all? Why not webhooks, gRPC, or MCP between agents?\n\nEmail is the only protocol where every human already has an address and a working client. Webhooks / gRPC / MCP are great inside systems you control, but they don't reach Gmail or Outlook. If you want an agent that talks to humans (or to *other organizations'* agents) without forcing everyone to install a new client, email is the universal substrate.\n\ne2a doesn't replace webhooks — agents *receive* email via webhooks. It bridges email's universal addressability to the structured-data world the agent code already lives in.\n\n### What stops an attacker from spoofing the `X-E2A-Auth-*` headers?\n\nThe relay strips any incoming `X-E2A-Auth-*` from inbound messages and re-signs with HMAC-SHA256 against `signing.hmac_secret`. The signed canonical binds `Sender + Verified + Body-Hash + Message-Id` together — replay attempts, body swaps, and sender-only forgery all fail validation. Each delivery is bound to *that specific message body*, not just the sender claim, so a captured `(headers, signature)` tuple can't be lifted onto a different message.\n\nReceivers verify with the SDK — `client.parse_webhook(body)` / `client.parseWebhook(body)` does parse + HMAC verify in one call (or `email.verify_signature(secret)` if you parsed first). No API call back to e2a needed. If a signing secret leaks, rotate it via the dashboard and old signatures stop verifying. If it's *stolen from the relay*, the attacker has bigger access than headers anyway.\n\n### Isn't this just SMTP with extra steps?\n\nYes — and the extra steps are the point. Concretely:\n\n- SPF/DKIM verdict normalization so receivers don't reimplement domain auth\n- HMAC-signed delivery contract binding sender, body hash, message ID, and verification status\n- WebSocket transport for agents without public URLs\n- HITL approval flow with auto-expiration and stateless magic-link review\n- Conversation-Id threading that survives the email ↔ structured-data boundary\n- Slug-based agent provisioning on a shared domain\n- Per-agent webhook routing, rate limits, and HITL config\n\nBuilding those on top of bare Postfix is a real project. e2a is that project, open source.\n\n### How does this compare to running Postfix or Postal myself?\n\nIf you want a full MTA, run an MTA — Postfix and Postal are great. e2a isn't trying to replace them at the SMTP transport level (it uses `go-smtp` for receiving and dial-out for sending). The value is the layer above transport: the auth model, agent abstraction, signed delivery contract, retry policy for webhook failures, HITL approval flow, SDKs and CLI. If you're comfortable operating an MTA and only need email plumbing, e2a may be more than you want. If you want the agent abstraction and signed identity layer prebuilt, that's what this is.\n\n### Why open source if there's a hosted version?\n\nTwo reasons:\n\n1. **Auditability.** Identity infrastructure for your agents should be readable code, not a vendor black box. You can verify the cosign signature on `ghcr.io/mnexa-ai/e2a`, reproduce the build, and confirm what's actually running.\n2. **Self-host as a real option.** The hosted instance at e2a.dev runs the same `ghcr.io/mnexa-ai/e2a` image you can pull right now. Convenience features on the hosted side (the shared `agents.e2a.dev` domain, managed deliverability) are config + DNS, not closed-source extras.\n\nPricing for the hosted version isn't enabled yet. When it lands, it'll be opt-in via env var and the OSS code path stays unchanged.\n\n## Development\n\n```bash\nmake build               # go build -o bin/e2a ./cmd/e2a\nmake run                 # build + run (cp config.example.yaml config.yaml first)\nmake test                # all Go tests (needs Postgres on :5433)\nmake test-unit           # Go unit tests only (no DB)\nmake test-integration    # integration tests (needs Postgres)\nmake test-e2e            # e2e tests (needs Postgres)\nmake docker-up           # start local Postgres via docker compose\nmake migrate             # apply SQL migrations to local DB\n```\n\nSee [CLAUDE.md](CLAUDE.md) for the full developer guide (architecture, tests, code generation, conventions).\n\n## Contributing\n\nBy submitting a pull request, you certify the [Developer Certificate of Origin](https://developercertificate.org/) for your contribution. Sign your commits with `git commit -s`.\n\n## License\n\nApache 2.0 — see [LICENSE](LICENSE) and [NOTICE](NOTICE).\n","summary":"e2a is an open-source authenticated email gateway designed for AI agents, giving them real inbound and outbound email capabilities with sender verification. It verifies inbound messages with SPF/DKIM and delivers emails to agents either via HTTPS webhooks (cloud mode) or WebSocket-based notifications (local mode), while signing outbound delivery attempts using HMAC headers for traceable authentication. For sending, it provides an HTTP API that can relay messages between agents or forward to humans through an upstream SMTP provider, with an optional human-in-the-loop approval gate to hold outbound mail until review. It’s well-suited for developers building agentic systems that need reliable email integration, secure identity handling, and operational controls via the included TypeScript/Python SDKs and CLI.","description":"Authenticated email gateway for AI agents — SPF/DKIM verified inbound, HMAC-signed delivery, webhook + WebSocket fan-out, CLI + SDKs","stars":148,"language":"Go"},{"owner":"Andyyyy64","repo":"whichllm","url":"https://github.com/Andyyyy64/whichllm","readme":"# whichllm\n\n[![PyPI version](https://img.shields.io/pypi/v/whichllm)](https://pypi.org/project/whichllm/)\n[![Python 3.11+](https://img.shields.io/badge/python-3.11+-blue.svg)](https://www.python.org/downloads/)\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](https://opensource.org/licenses/MIT)\n[![Tests](https://github.com/Andyyyy64/whichllm/actions/workflows/test.yml/badge.svg)](https://github.com/Andyyyy64/whichllm/actions/workflows/test.yml)\n[![Sponsor](https://img.shields.io/badge/Sponsor-GitHub%20Sponsors-EA4AAA?logo=githubsponsors)](https://github.com/sponsors/Andyyyy64)\n\n**Find the best local LLM that actually runs on your hardware.**\n\nAuto-detects your GPU/CPU/RAM and ranks the top models from HuggingFace that fit your system.\n\n[日本語版はこちら](docs/README.ja.md)\n\n## Quick start\n\nRun the recommendation command once, with no project setup.\n\n```bash\nuvx whichllm@latest\n```\n\nSimulate a GPU before you buy hardware.\n\n```bash\nuvx whichllm@latest --gpu \"RTX 4090\"\n```\n\nInstall it when you use it often.\n\n```bash\nuv tool install whichllm\nuv tool upgrade whichllm  # update an existing install\n```\n\nOther install paths.\n\n```bash\nbrew install andyyyy64/whichllm/whichllm\npip install whichllm\n```\n\n## Common workflows\n\nAfter install, run `whichllm` directly. For one-off runs, replace `whichllm`\nwith `uvx whichllm@latest`.\n\n```bash\n# Best models for this machine\nwhichllm\n\n# Pretend you have a specific GPU\nwhichllm --gpu \"RTX 4090\"\n\n# Compare upgrade candidates\nwhichllm upgrade \"RTX 4090\" \"RTX 5090\" \"H100\"\n\n# Find the GPU needed for a model\nwhichllm plan \"llama 3 70b\"\n\n# Start a chat with a model\nwhichllm run \"qwen 2.5 1.5b gguf\"\n\n# Print copy-paste Python\nwhichllm snippet \"qwen 7b\"\n\n# Return JSON for scripts\nwhichllm --top 1 --json\n```\n\n![demo](assets/demo.gif)\n\n## See it\n\n```text\n$ whichllm --gpu \"RTX 4090\"\n\n#1  Qwen/Qwen3.6-27B     27.8B  Q5_K_M   score 92.8    27 t/s\n#2  Qwen/Qwen3-32B       32.0B  Q4_K_M   score 83.0    31 t/s\n#3  Qwen/Qwen3-30B-A3B   30.0B  Q5_K_M   score 82.7   102 t/s\n```\n\nThe 32B model **fits your card fine** — whichllm still ranks the 27B #1,\nbecause it scores higher on real benchmarks and is a newer generation.\nA size-only \"what fits?\" tool would hand you the bigger one. That gap is\nthe whole point of whichllm. (Note #3: a MoE model at 102 t/s — speed is\nranked on *active* params, quality on *total*.)\n\n## What can I run?\n\nReal top picks (snapshot 2026-05 — your results track **live** HuggingFace\ndata, this is not a static list):\n\n| Hardware | VRAM | Top pick | Speed |\n|---|---|---|---|\n| RTX 5090 | 32 GB | `Qwen3.6-27B` · Q6_K · score 94.7 | ~40 t/s |\n| RTX 4090 / 3090 | 24 GB | `Qwen3.6-27B` · Q5_K_M · score 92.8 | ~27 t/s |\n| RTX 4060 | 8 GB | `Qwen3-14B` · Q3_K_M · score 71.0 | ~22 t/s |\n| Apple M3 Max | 36 GB | `Qwen3.6-27B` · Q5_K_M · score 89.4 | ~9 t/s |\n| CPU only | — | `gpt-oss-20b` (MoE) · Q4_K_M · score 45.2 | ~6 t/s |\n\n`whichllm --gpu \"<your card>\"` simulates any of these before you buy.\n\n## Why whichllm?\n\nFitting a model into your VRAM is the easy part. The hard part is knowing\n**which of the models that fit is actually the best** — and that is what\nwhichllm is built to get right.\n\n- **Evidence-based ranking, not a size heuristic** — The top pick is\n  chosen from merged real benchmarks (LiveBench, Artificial Analysis,\n  Aider, multimodal/vision, Chatbot Arena ELO, Open LLM Leaderboard) —\n  never \"the biggest model that happens to fit.\"\n- **Recency-aware** — Stale leaderboards are demoted along each model's\n  lineage, so a 2024 model can't outrank a current-generation one on an\n  outdated score. The benchmark snapshot date is printed under every\n  ranking, so a stale recommendation is self-evident instead of silently\n  trusted.\n- **Evidence-graded and guarded** — Every score is tagged\n  `direct` / `variant` / `base` / `interpolated` / `self-reported` and\n  discounted by confidence. Fabricated uploader claims and cross-family\n  inheritance (a small fork borrowing its much larger base's score) are\n  actively rejected.\n- **Architecture-aware estimates** — VRAM = weights + GQA KV cache +\n  activation + overhead; speed is bandwidth-bound with per-quant\n  efficiency, per-backend factors, MoE active-vs-total split, and\n  unified-memory vs discrete-PCIe partial-offload modeling.\n- **One command, scriptable** — `whichllm` prints the answer; add\n  `--json | jq` for pipelines. No TUI, no keybindings to memorize.\n- **Live data** — Models fetched directly from the HuggingFace API, with\n  curated frozen fallbacks for offline or rate-limited use.\n\n## Features\n\n- **Auto-detect hardware** — NVIDIA, AMD, Apple Silicon, CPU-only\n- **Smart ranking** — Scores models by VRAM fit, speed, and benchmark quality\n- **One-command chat** — `whichllm run` downloads and starts a chat session instantly\n- **Code snippets** — `whichllm snippet` prints ready-to-run Python for any model\n- **Live data** — Fetches models directly from HuggingFace (cached for performance)\n- **Benchmark-aware** — Integrates real eval scores with confidence-based dampening\n- **Task profiles** — Filter by general, coding, vision, or math use cases\n- **GPU simulation** — Test with any GPU: `whichllm --gpu \"RTX 4090\"`\n- **Hardware planning** — Reverse lookup: `whichllm plan \"llama 3 70b\"`\n- **Upgrade planning** — Compare your current machine with candidate GPUs\n- **JSON output** — Pipe-friendly: `whichllm --json`\n\n## Run & Snippet\n\nTry any model with a single command. No manual installs needed — whichllm\ncreates an isolated environment via `uv`, installs dependencies, downloads the\nmodel, and starts an interactive chat.\n\n![run demo](assets/demo-run.gif)\n\n```bash\n# Chat with a model (auto-picks the best GGUF variant)\nwhichllm run \"qwen 2.5 1.5b gguf\"\n\n# Auto-pick the best model for your hardware and chat\nwhichllm run\n\n# CPU-only mode\nwhichllm run \"phi 3 mini gguf\" --cpu-only\n```\n\nWorks with **all model formats**:\n- **GGUF** — via `llama-cpp-python` (lightweight, fast)\n- **AWQ / GPTQ** — via `transformers` + `autoawq` / `auto-gptq`\n- **FP16 / BF16** — via `transformers`\n\nGet a **copy-paste Python snippet** instead:\n\n```bash\nwhichllm snippet \"qwen 7b\"\n```\n\n```python\nfrom llama_cpp import Llama\n\nllm = Llama.from_pretrained(\n    repo_id=\"Qwen/Qwen2.5-7B-Instruct-GGUF\",\n    filename=\"qwen2.5-7b-instruct-q4_k_m.gguf\",\n    n_ctx=4096,\n    n_gpu_layers=-1,\n    verbose=False,\n)\n\noutput = llm.create_chat_completion(\n    messages=[{\"role\": \"user\", \"content\": \"Hello!\"}],\n)\nprint(output[\"choices\"][0][\"message\"][\"content\"])\n```\n\n## Usage\n\n```bash\n# Auto-detect hardware and show best models\nwhichllm\n\n# Simulate a GPU (e.g. planning a purchase)\nwhichllm --gpu \"RTX 4090\"\nwhichllm --gpu \"RTX 5090\"\n# Specify variant\nwhichllm --gpu \"RTX 5060 16\"\n\n# CPU-only mode\nwhichllm --cpu-only\n\n# More results / filters\nwhichllm --top 20\nwhichllm --quant Q4_K_M\nwhichllm --min-speed 30\nwhichllm --evidence base   # allow id/base-model matches\nwhichllm --evidence strict # id-exact only (same as --direct)\nwhichllm --direct\n\n# JSON output\nwhichllm --json\n\n# Force refresh (ignore cache)\nwhichllm --refresh\n\n# Show hardware info only\nwhichllm hardware\n\n# Plan: what GPU do I need for a specific model?\nwhichllm plan \"llama 3 70b\"\nwhichllm plan \"Qwen2.5-72B\" --quant Q8_0\nwhichllm plan \"mistral 7b\" --context-length 32768\n\n# Upgrade: compare your current machine against candidate GPUs\nwhichllm upgrade \"RTX 4090\" \"RTX 5090\" \"H100\"\nwhichllm upgrade \"Apple M4 Max\" --top 5\n\n# Run: download and chat with a model instantly\nwhichllm run \"qwen 2.5 1.5b gguf\"\nwhichllm run                       # auto-pick best for your hardware\n\n# Snippet: print ready-to-run Python code\nwhichllm snippet \"qwen 7b\"\nwhichllm snippet \"llama 3 8b gguf\" --quant Q5_K_M\n```\n\nJSON model rows include `estimated_tok_per_sec`, `speed_confidence`,\n`speed_range_tok_per_sec`, and `speed_notes`. The speed range is a planning\nrange, not a live benchmark.\n\n## Integrations\n\n### Ollama\n\nUse JSON output to feed scripts that map HuggingFace IDs to your local Ollama\nmodel names:\n\n```bash\n# Pick the top HuggingFace model ID\nwhichllm --top 1 --json | jq -r '.models[0].model_id'\n\n# Find the best coding model ID\nwhichllm --profile coding --top 1 --json | jq -r '.models[0].model_id'\n```\n\nOllama model names do not always match HuggingFace repo IDs, so a small mapping\nstep is usually needed before `ollama run`.\n\n### Shell alias\n\nAdd to your `.bashrc` / `.zshrc`:\n\n```bash\nalias bestllm='whichllm --top 1 --json | jq -r \".models[0].model_id\"'\n# Usage: ollama run $(bestllm)\n```\n\n## Scoring\n\nEach model gets a 0-100 score. Benchmark quality and size form the core;\nevidence confidence and runtime fit then scale it, with speed, source\ntrust, and popularity as adjustments.\n\n| Factor | Effect | Description |\n|--------|--------|-------------|\n| Benchmark quality | core | Merged LiveBench / Artificial Analysis / Aider / Vision / Arena ELO / Open LLM Leaderboard, weighted by source confidence |\n| Model size | up to 35 | `log2`-scaled world-knowledge proxy (MoE uses total params) |\n| Quantization | × penalty | Lower-bit quants discounted multiplicatively |\n| Evidence confidence | ×0.55–1.0 | none / self-reported ×0.55, inherited ×0.78, direct full |\n| Runtime fit | ×0.50–1.0 | partial-offload ×0.72, CPU-only ×0.50 |\n| Speed | -8 to +8 | Usability gate vs a fit-dependent tok/s floor; reported with confidence and range metadata |\n| Source trust | -5 to +5 | Official-org bonus, known-repackager penalty |\n| Popularity | tie-breaker | Downloads/likes; weight shrinks as evidence strengthens |\n\nScore markers:\n- **`~`** (yellow) — No direct benchmark; score inherited/interpolated from the model family\n- **`!sr`** (bright yellow) — Uploader-reported benchmark only, not independently verified\n- **`?`** (red) — No benchmark data available\n\nSpeed markers in `--status`:\n- **`~`** (yellow) — Estimated tok/s range is available\n- **`?`** (red) — Low-confidence speed estimate; backend/runtime sensitivity is high\n\n## Documentation\n\n- [CLI reference](docs/cli.md)\n- [How it works](docs/how-it-works.md)\n- [Scoring](docs/scoring.md)\n- [Hardware detection and simulation](docs/hardware.md)\n- [Run and snippet](docs/run-snippet.md)\n- [Troubleshooting](docs/troubleshooting.md)\n\n## How it works\n\n### Data pipeline\n\n1. **Model fetching** — Fetches popular models from HuggingFace API:\n   - Text-generation (downloads + recently updated)\n   - GGUF-filtered (separate query for coverage)\n   - Vision models (`image-text-to-text`) when `--profile vision` or `any`\n2. **Benchmark sources** — *Current tier* (LiveBench, Artificial Analysis\n   Index, Aider) merged live when reachable, plus a curated multimodal /\n   vision index; *frozen tier* (Open LLM Leaderboard v2, Chatbot Arena\n   ELO). Tiers have separate caps and lineage-aware recency demotion so\n   stale leaderboards stop over-rewarding older generations.\n3. **Benchmark evidence** — Five resolution levels, increasingly discounted:\n   - `direct` — Exact model ID match\n   - `variant` — Suffix-stripped or -Instruct variant\n   - `base_model` — Base model from cardData\n   - `line_interp` — Size-aware interpolation within model family\n   - `self_reported` — Uploader-claimed eval (heavily discounted)\n\n   Inheritance is rejected when a model's params diverge more than 2× from\n   its family's dominant member, catching draft / MTP / abliterated forks\n   that share a `family_id` with a much larger base.\n4. **Cache** — `~/.cache/whichllm/`:\n   - `models.json` — 6h TTL\n   - `benchmark.json` — 24h TTL\n\n### Ranking engine\n\n1. **Hardware detection** — NVIDIA (nvidia-ml-py), AMD (dbgpu/ROCm), Apple Silicon (Metal), CPU cores, RAM, disk\n2. **VRAM estimation** — Weights + KV cache + activation + framework overhead (~500MB)\n3. **Compatibility** — Full GPU / Partial Offload / CPU-only; compute capability and OS checks\n4. **Speed** — tok/s from GPU memory bandwidth, quantization, backend, fit type, and MoE active parameters\n5. **Scoring** — Benchmark (with confidence dampening), size, quantization penalty, fit type, speed, popularity, source trust (official vs repackager)\n6. **Backend filter** — Apple Silicon and CPU-only restrict to GGUF for stability; Linux+NVIDIA allows AWQ/GPTQ\n\n### Project structure\n\n```\nsrc/whichllm/\n├── cli.py              # Typer CLI: main, plan, run, snippet, hardware\n├── constants.py        # GPU bandwidth, quantization bytes, compute capability\n├── hardware/\n│   ├── detector.py     # Orchestrates GPU/CPU/RAM detection\n│   ├── nvidia.py       # NVIDIA GPU via nvidia-ml-py\n│   ├── amd.py          # AMD GPU (Linux)\n│   ├── apple.py        # Apple Silicon (Metal)\n│   ├── cpu.py          # CPU name, cores, AVX support\n│   ├── memory.py       # RAM and disk free\n│   ├── gpu_simulator.py # --gpu flag: synthetic GPU from name\n│   └── types.py        # GPUInfo, HardwareInfo\n├── models/\n│   ├── fetcher.py      # HuggingFace API, model parsing, evalResults\n│   ├── benchmark.py    # Arena ELO, Leaderboard (parquet/rows API)\n│   ├── grouper.py      # Family grouping by base_model and name\n│   ├── cache.py        # JSON cache with TTL\n│   └── types.py        # ModelInfo, GGUFVariant, ModelFamily\n├── engine/\n│   ├── vram.py         # VRAM = weights + KV cache + activation + overhead\n│   ├── compatibility.py# Fit type, disk check, compute/OS warnings\n│   ├── performance.py  # tok/s from bandwidth\n│   ├── quantization.py # Bytes per weight, quality penalty, non-GGUF inference\n│   ├── ranker.py       # Scoring, evidence filter, profile/match\n│   └── types.py        # CompatibilityResult\n└── output/\n    └── display.py      # Rich table, JSON output, hardware/plan displays\n```\n\n## Development\n\n```bash\ngit clone https://github.com/Andyyyy64/whichllm.git\ncd whichllm\nuv sync --dev\nuv run whichllm\nuv run pytest\n```\n\n## Contributing\n\nContributions are welcome! See [CONTRIBUTING.md](CONTRIBUTING.md) for guidelines.\n\n## Support\n\nIf whichllm helped you find a model or avoid a bad hardware guess,\nsponsoring is appreciated. It helps keep the project maintained: hardware\nreports, packaging, test fixtures, benchmark updates, and support for more\nmachines.\n\nwhichllm will stay open-source either way. Issues and PRs are always welcome.\n\nUseful? A GitHub star helps other people find it, and I'd genuinely like to\nknow what it picked for your rig. Drop it in [Issues](https://github.com/Andyyyy64/whichllm/issues).\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/svg?repos=Andyyyy64/whichllm&type=Date)](https://www.star-history.com/#Andyyyy64/whichllm&Date)\n\n## Requirements\n\n- Python 3.11+\n- NVIDIA GPU detection via `nvidia-ml-py` (included by default)\n- AMD / Apple Silicon detected automatically\n\n## License\n\nMIT\n","summary":"whichllm is a command-line tool that helps you find the best locally runnable LLM for your specific hardware by auto-detecting your CPU/GPU/RAM (or simulating a target GPU). It compares HuggingFace model options that fit your system and ranks them using evidence-based benchmark data rather than simple “largest that fits” heuristics, with recency-aware scoring to favor newer, better-supported models. The tool supports common workflows like generating JSON or copy-paste Python snippets, planning what hardware a given model needs, and even starting a run with a recommended model. It’s especially useful for people who want better real-world model recommendations for local inference—whether on consumer GPUs, Apple silicon, or CPU-only setups.","description":"Find the local LLM that actually runs and performs best on your hardware. Ranked by real, recency-aware benchmarks, not parameter count. One command, run it instantly.","stars":2238,"language":"Python"},{"owner":"kanwas-ai","repo":"kanwas","url":"https://github.com/kanwas-ai/kanwas","readme":"<p align=\"center\">\n  <a href=\"https://kanwas.ai/\" target=\"_blank\">\n    <img src=\"./docs/images/logo.png\" alt=\"Kanwas\" height=\"80\" />\n  </a>\n</p>\n<p align=\"center\">\n  Shared context board for teams and agents\n</p>\n<p align=\"center\">\n  Try Kanwas for free at <a href=\"https://kanwas.ai/\">kanwas.ai</a>\n</p>\n\n# What's Kanwas?\n\nKanwas is a multiplayer workspace for AI work. Teams and an AI agent share the same documents, evidence, and decisions, with the agent's tool calls streaming into the same timeline everyone sees.\n\n![Kanwas canvas](./docs/images/hero.webp)\n\n## Who it's for\n\n- **Founders.** Turn a fundraising deck, customer interviews, MVP spec, and hiring plan into one canvas where the agent helps across all of them. Less context to keep in your head, more output across many fronts.\n- **Product managers.** Drop interview snippets, tickets, and competitor screenshots on a board; get a discovery readout and a PRD with every claim traceable to its source.\n- **Developers.** Pull a PM's spec, designs, and research onto a canvas; work with the agent to turn it into an implementation plan with tasks and acceptance criteria. Then `kanwas pull` the markdown into your repo and hand it to Claude Code, Codex, or whatever coding agent you use.\n- **Marketers.** Plan a launch with positioning, messaging, asset list, and timeline. The agent drafts copy variants you can compare side-by-side and iterate on with the team.\n- **Sales.** A reusable account board: research, comms history, stakeholder map, and proposal drafts. Each deal makes the template better.\n\n## Why teams use it\n\n- **Shared context that compounds.** Every decision and outcome makes the next board better than the last.\n- **Canvas + agent on one surface.** Work alongside AI over the same evidence, ideas, and trade-offs — transparent to everyone.\n- **Sharp deliverables in minutes.** Generate structured, execution-ready artifacts for every stage of the work.\n- **Your files, your repo.** Git-backed markdown filesystem with full version history. No vendor lock-in.\n\n## Quickstart\n\n### Prerequisites\n\n- Docker + Docker Compose\n- An Anthropic API key (and/or OpenAI API key)\n\n### Run it\n\n```bash\ngit clone https://github.com/kanwas-ai/kanwas.git\ncd kanwas\n\n# Env files — fill in API keys, APP_KEY, etc.\ncp .env.example .env\ncp backend/.env.example backend/.env\ncp yjs-server/.env.example yjs-server/.env\ncp frontend/.env.example frontend/.env\n\ndocker-compose --profile app up\n```\n\nOpen http://localhost:5173 and you're in.\n\nFor local development (hot reload, running services with `pnpm dev`) and the architectural walkthrough, see [`docs/SYSTEM_OVERVIEW.md`](./docs/SYSTEM_OVERVIEW.md).\n\n## CLI\n\n`kanwas` is a command-line tool for syncing a workspace with your local filesystem. Useful when you want to edit notes in your editor of choice, bulk-import markdown you already have on disk, or script workspace access from CI or another agent.\n\n### Install\n\n```bash\nnpm install -g @kanwas/cli\n```\n\n### Authenticate\n\n```bash\nkanwas login\n```\n\nOpens a browser tab to authorize the CLI. Auth is stored globally in `~/.kanwas/config.json`.\n\n### Edit a workspace locally\n\n```bash\nmkdir my-workspace && cd my-workspace\nkanwas pull            # interactive picker, downloads files into the current directory\n# ...edit files in your editor...\nkanwas push            # uploads local changes back to the workspace\n```\n\nAfter the first `pull`, the directory is bound to that workspace via `.kanwas.json`. Subsequent `pull` / `push` reuse it automatically.\n\n### Import markdown from disk\n\n```bash\nkanwas import ./notes                       # interactive workspace picker\nkanwas import ./notes --name \"My Workspace\" # non-interactive, by name\nkanwas import ./intro.md --id <uuid>        # single file, by ID\nkanwas import ./notes --dest research       # place imports under a su
