ms that need durable orchestration without a multi-service stack, and especially for applications that must run workflows on both servers and mobile devices with offline-first execution and human-in-the-loop approvals.","description":null,"stars":58,"language":"Rust"},{"owner":"statewright","repo":"statewright","url":"https://github.com/statewright/statewright","readme":"# statewright\n\n> Agents are suggestions, states are laws.\n\nState machine guardrails that control which tools your AI agent can use in each phase. Define a workflow once, enforce it across Claude Code, Codex, Cursor, opencode, and Pi. [Full docs →](https://docs.statewright.ai)\n\n![Statewright workflow editor](docs/images/workflow-editor.png)\n\n## The problem\n\nAI agents are brittle. Give a model 40+ tools and an open-ended problem and it re-reads the same file five times, calls Edit during review, deploys before tests pass. The common fix is bigger models and longer prompts... it helps sometimes. Observability tells you what went wrong after the fact; it doesn't prevent it.\n\n## The approach\n\nInstead of making the model bigger, make the problem smaller.\n\nState machines constrain the tool and solution spaces so the model reasons in a focused context at each step. A planning state gets read-only tools. When the agent transitions to implementation, edit tools unlock with limited shell access. Write-via-redirect and destructive ops are still blocked even when Bash is allowed. Testing only permits designated test commands.\n\nCall a tool that's not in the current phase and you get rejected with a message telling you what IS available and how to transition. State machines loop and retry (unlike DAGs), which is what agentic work actually needs.\n\nWorks on frontier and local models alike. Below 13GB, models can produce tool calls but can't retain enough file content to make accurate edits. Above that threshold, the guardrails start turning failures into completions.\n\n## Quickstart\n\nInstall into Claude Code:\n\n```\n/plugin marketplace add statewright/statewright\n/plugin install statewright\n```\n\nYour browser opens → sign up at [statewright.ai](https://statewright.ai) → generate a key → paste it → done.\n\nThen start a workflow:\n\n```\n❯ start the bugfix workflow — fix the failing tests in calc.py\n\n◆ statewright — statewright_start (workflow: bugfix)\n◆ [statewright] Workflow activated: bugfix\n\n◆ statewright — statewright_get_state (MCP)\n\n◆ Current phase: planning. Let me read the code first.\n\n  Read 2 files\n\n  [statewright] planning => implementing\n\n◆ statewright — statewright_transition (READY)\n\n  Edit calc.py: 1 line changed\n\n  [statewright] implementing => testing\n\n◆ statewright — statewright_transition (DONE)\n\n  Bash: pytest -x — 7 passed\n\n  [statewright] testing => completed\n◆ [statewright] Workflow complete. 46 seconds.\n```\n\nYou can also use the slash command directly: `/statewright start bugfix`.\n\n## Research results\n\nIn our 5-task SWE-bench subset (not the full 2294-instance benchmark), two local models **went from 2 of 10 attempts passing to 10 of 10** with statewright constraints. Same tasks, same hardware.\n\n| Model | Size | Bug Fix (26 lines) | SWE-bench (5 tasks) |\n|-------|------|--------------------|---------------------|\n| gemma3 | 3.3GB | FAIL | FAIL |\n| gemma4:e2b | 7.2GB | PASS* | FAIL |\n| gpt-oss:20b | 13.8GB | PASS | PASS (5/5) |\n| gemma4:31b | 19.9GB | PASS | PASS (5/5) |\n| llama3.3 | 42.5GB | PASS | PASS (2/2)† |\n\n*\\*with specialized edit_line tool adaptation*\n*†tested on 2 of the 5 tasks (added after initial experiment run)*\n\nThe floor is around 13GB. Below that, models identify bugs correctly but can't serialize surgical edits (they rewrite entire files). That's a model limitation, not ours.\n\nThe structural win on larger models is breaking read-loop death spirals and keeping the tool space small enough that the model reasons instead of flailing. [Research brief →](https://statewright.ai/research)\n\n## How it works\n\nThe core is a Rust engine that evaluates state machine definitions: states, transitions, guards, tool restrictions. It's deterministic. No LLM in the loop.\n\nOn top of that sits a plugin layer that integrates with your coding agent via MCP. When you activate a workflow, hooks enforce tool restrictions per state. The model sees 5 tools instead of 30. It gets clear instructions for the current phase and transitions when conditions are met.\n\n### Guardrails\n\n| Guardrail | What it does |\n|-----------|-------------|\n| Per-state tool enforcement | Agent can't see or call tools outside `allowed_tools` for the current state |\n| Bash discernment | Blocks `echo > file`, `rm -rf`, `sed -i`, and scripting interpreters (`python`, `node`) when Write/Edit aren't allowed. Even if Bash itself is permitted. |\n| Edit guards | Rejects diffs exceeding `max_edit_lines`, caps files edited per state |\n| Command allow-lists | Only prefix-matched commands run (e.g. `pytest`, `cargo test`) |\n| Conditional transitions | Programmatic guards on context data: `test_result eq pass`, `coverage gt 80` |\n| Approval gates | `requires_approval` pauses for human review |\n| Interrupts | Edit a file matching a glob pattern? Auto-transition to a validation state, then return where you were |\n| Fork/join | Run branches sequentially or in parallel, join when all (or any) complete |\n| Environment scoping | Hide `PROD_DB_URL` via `blocked_env`, substitute with `env_overrides` |\n| Session isolation | Per-session state via `CLAUDE_SESSION_ID` |\n\nFull guardrail reference in [the docs](https://docs.statewright.ai/tools/reference).\n\n## Define your own workflows\n\n```json\n{\n  \"id\": \"bugfix\",\n  \"initial\": \"planning\",\n  \"states\": {\n    \"planning\": {\n      \"allowed_tools\": [\"Read\", \"Grep\", \"Glob\"],\n      \"max_iterations\": 8,\n      \"on\": { \"READY\": \"implementing\" }\n    },\n    \"implementing\": {\n      \"allowed_tools\": [\"Read\", \"Edit\", \"Write\"],\n      \"max_edit_lines\": 20,\n      \"max_files_per_state\": 3,\n      \"on\": { \"DONE\": \"testing\" }\n    },\n    \"testing\": {\n      \"allowed_tools\": [\"Read\", \"Bash\"],\n      \"allowed_commands\": [\"pytest\", \"cargo test\", \"npm test\"],\n      \"on\": {\n        \"PASS\": { \"target\": \"completed\", \"guard\": \"tests_passed\" },\n        \"FAIL_TEST\": \"implementing\"\n      }\n    },\n    \"completed\": { \"type\": \"final\" }\n  },\n  \"guards\": {\n    \"tests_passed\": { \"field\": \"test_result\", \"op\": \"eq\", \"value\": \"pass\" }\n  }\n}\n```\n\nPoint your agent at the [JSON schema](https://statewright.ai/workflow-schema.json) and it generates a workflow via `statewright_create_workflow`. Tweak tools, commands, and environment blocks in the [visual editor](https://statewright.ai/workflows).\n\n## Supported agents\n\n**Hard** enforcement means tool calls are intercepted at the hook layer before execution. **Advisory** means rules are injected into context but the model isn't prevented from ignoring them.\n\n| Agent | Integration | Enforcement |\n|-------|------------|-------------|\n| [Claude Code](plugins/claude-code/) | Hooks + MCP | Hard |\n| [Codex](plugins/codex/) | Hooks + MCP | Hard |\n| [Oh My Codex](plugins/omx/) | Hooks + MCP | Hard |\n| [Pi](plugins/pi/) | TypeScript extension | Hard* |\n| [opencode](plugins/opencode/) | TypeScript plugin | Hard (alpha) |\n| [Cursor](plugins/cursor/) | MCP + rules | Advisory |\n\n*\\*Pi includes tool name normalization and tool-call recovery for local models (Ollama, LM Studio).*\n\n## Pricing\n\nThe managed cloud at [statewright.ai](https://statewright.ai) handles workflow storage, run history, and the MCP gateway. Prices won't go up.\n\n| Plan | Workflows | Transitions/mo | Run History | Price |\n|------|-----------|-------------|----------------|-------|\n| Free | 3 | 200 | 72 hours | $0 |\n| Pro | 10 | 2500 | 7 days | $29/mo |\n| Team | 30 | 10000 | 90 days | $99/mo |\n| Enterprise | Unlimited | Unlimited | to Specification | [Contact us](mailto:sales@statewright.ai) |\n\n## Self-hosting\n\nRun the full stack locally with Docker Compose — PocketBase, MCP gateway, and workflow editor. BYO Ollama. [Self-hosted guide →](https://docs.statewright.ai/getting-started/self-hosted)\n\n```bash\ncd self-hosted && docker compose up --build\n```\n\nThe engine (`crates/engine`) and agent layer (`crates/agent`) are Apache 2.0, embeddable with no runtime dependencies. The MCP gateway is FSL-1.1-ALv2 (converts to Apache 2.0 in 2029). Single-developer and single-team self-hosting is permitted under the FSL license.\n\n## Tradeoffs\n\n- Requires MCP support in the agent (or hooks for non-MCP agents like Codex)\n- Workflow definitions are authored by hand, though agents can generate them via `statewright_create_workflow`\n- Cursor enforcement is advisory, not hard. MCP alone can't gate tool calls in Cursor's architecture\n- Research results are from a 5-task SWE-bench subset, not the full 2294-instance benchmark\n- If a workflow is too restrictive, the agent gets stuck. `statewright_deactivate` is the escape hatch\n\n## Docs\n\n[docs.statewright.ai](https://docs.statewright.ai) — install guide, workflow authoring, [schema reference](https://docs.statewright.ai/workflows/schema-reference), [MCP tool reference](https://docs.statewright.ai/tools/reference), and [agent-generated workflows](https://docs.statewright.ai/tools/agent-generated-workflows).\n\n## Contributing\n\nWorkflow definitions, templates, and bug reports welcome. See [Create Your Own](https://docs.statewright.ai/workflows/create-your-own/) for how to write workflows.\n\n- [Report an issue](https://github.com/statewright/statewright/issues/new)\n- [Discussions & feedback](https://github.com/statewright/statewright/discussions)\n\n## License\n\nApache 2.0 — portions [FSL-1.1-ALv2](https://fsl.software) (converts to Apache 2.0 on May 3, 2029). Managed cloud at [statewright.ai](https://statewright.ai).\n\nThis project includes a [patent pledge](./PATENTS.md) covering independent implementations of the techniques described in the patent. Solo developers, researchers, open source projects, and single-team self-hosted deployments are covered regardless of whether they use Statewright software.\n\n> One hook to rule them all.\n\n<img src=\"https://statewright.ai/api/px/github\" width=\"1\" height=\"1\" alt=\"\" />\n","summary":"Statewright provides state machine guardrails for AI coding agents, constraining which tools an agent may use in each workflow phase so it can’t flail or take destructive actions out of turn. You define a workflow once (e.g., planning as read-only, implementing with limited edits, testing with designated commands), and the plugin enforces allowed tool access across multiple agent environments like Claude Code, Codex, Cursor, and more. Its deterministic Rust-based engine rejects invalid tool calls and guides the agent toward explicit state transitions, helping prevent common failure modes like read-looping, premature deployment, or edits during review. Developers and teams who want more reliable, safer agent-assisted software changes—especially for multi-step bugfix or CI-style tasks—will benefit most.","description":"State machine guardrails for AI agents","stars":372,"language":"Rust"},{"owner":"adamjgmiller","repo":"adamsreview","url":"https://github.com/adamjgmiller/adamsreview","readme":"# adamsreview\n\nMulti-stage code review for Claude Code — parallel sub-agent detection, validation passes, persistent JSON state, and an automated fix loop that re-reviews and reverts regressions before committing.\n\nOn my own PRs, it's been catching dramatically more real bugs than Claude Code's built-in `/review`, `/ultrareview`, CodeRabbit, Greptile, and Codex's built-in review — while producing fewer false positives. (Anecdotal, n=me.) Modeled after the built-in `/review` and extended into a six-command pipeline. Runs against your regular Claude Code subscription (Max plan recommended) — unlike `/ultrareview`, which charges against your Extra Usage pool.\n\n```\n/plugin marketplace add adamjgmiller/adamsreview\n/plugin install adamsreview@adamsreview\n```\n\nThe six commands:\n\n- **`/adamsreview:review`** — multi-lens code review of a branch or PR. Up to seven parallel sub-agent lenses (correctness, security, UX, etc.) feed a dedup pass, a cheap-then-deep validation gate, and (optionally) a holistic Opus cross-cutting pass. High-confidence auto-fix proposals are pre-computed so `:fix` and `:walkthrough` can batch-accept them in one confirm. `--ensemble` adds a Codex CLI pass and PR bot-comment scrape on top of the internal Claude lenses.\n- **`/adamsreview:codex-review`** — Codex CLI peer to `:review`. Same artifact shape, drop-in for everything downstream (`:fix`, `:add`, `:walkthrough`, `:promote`). Effort tunable via `--effort low|medium|high|xhigh` (default `high`).\n- **`/adamsreview:add`** — inject externally-sourced findings (a Claude Code cloud `/ultrareview` paste, an Opus once-over, a teammate's note) into the most recent review's artifact. Deduped against what's already there, validated by the same gates, re-published to the existing PR comment.\n- **`/adamsreview:walkthrough`** — interactive driver for findings `:fix` would skip. Uses the harness's `AskUserQuestion` UI to walk through uncertain or human-judgment items one by one — promote what you want auto-fixed, skip the rest. Pre-computed auto-fix proposals are batch-accepted up front; the remainder get per-finding briefing + options + recommendation. Posts a decisions log to the PR.\n- **`/adamsreview:fix`** — automated fix loop. Dispatches per-fix-group sub-agents in parallel, then re-reviews the work with Opus, **reverts any regressions, and commits the survivors** (one combined commit by default; `--granular-commits` for one per group).\n- **`/adamsreview:promote`** — human override that promotes a single finding to auto-fixable, bypassing the lane filter and score threshold.\n\nCommand files live at bare-stem paths under `commands/`; shared phase fragments and prompt references live under `fragments/`; helper scripts and the artifact schema live under `bin/`. The plugin runtime auto-adds `bin/` to `$PATH` on load — no symlinks, no install script.\n\n## Recommended flow\n\nOn a non-trivial PR, the commands work best in this order:\n\n1. **Review.** `/adamsreview:review` — or `/adamsreview:review --ensemble` if you have the Codex CLI installed and want to pool a Codex pass plus a PR bot-comment scrape on top of the internal Claude lenses (higher token cost). **Or** `/adamsreview:codex-review [--effort <level>]` for a Codex-driven peer review (drop-in for everything downstream; effort tunable; no `--ensemble`).\n2. **Add.** *(optional)* `/adamsreview:add <paste...>` — if you ran a parallel review (cloud `/ultrareview`, Opus once-over, manual scan, etc.) that surfaced bugs the original review missed, paste the result here. The findings are validated by Phase 4 and land in the same artifact, deduped against what's already there. Auto-eligible additions feed step 4; non-eligible ones surface in step 3.\n3. **Walkthrough.** *(optional)* `/adamsreview:walkthrough [threshold]` — step through findings the fix command would skip (deep-manual, deep-report, and the entire light lane including light `confirmed_mechanical`), restricted to those scoring at or above `$threshold` (default 60) so low-signal items don't pad the session. Step 4.5 batch-accepts all findings carrying a pre-computed auto-fix proposal in one confirm (the fast path); the rest get per-finding briefing + options + recommendation via the harness's `AskUserQuestion` UI. Promote the ones you want auto-fixed with tailored fix-hints, skip the rest. Posts a decisions log to the PR for audit. Pass a lower threshold (e.g. `/adamsreview:walkthrough 30`) and pick the **Full** tier at the preflight prompt to audit Phase-3-demoted `below_gate` findings too.\n4. **Fix.** `/adamsreview:fix` — applies every auto-eligible finding (including whatever was added in step 2 and promoted in step 3). Phase 7.5 surfaces any remaining auto-fix proposals (light-lane / manual / report findings) for one-confirm batch-accept before Phase 8 dispatch. Default: one combined commit for all surviving fixes; pass `--granular-commits` for one commit per fix group. Per-group Phase-9 outcome lands in the commit message either way.\n\nEach command is independent — you can go straight from review to fix if you only care about auto-eligible findings, or skip review entirely and run `:fix` against an existing artifact. Steps 2–4 can land days or weeks after step 1; the review artifact persists under `~/.adams-reviews/<slug>/<branch>/`.\n\n`/adamsreview:promote <id>` remains useful for one-off manual promotions outside the walkthrough flow (e.g. promoting a `disproven` finding with `--force`, or conceptually looping over a set of IDs — `F003`, `F037`, `F039` — with `--defer-publish` on each so only the final invocation re-publishes to the PR).\n\n## Documents\n\n- **`CLAUDE.md`** — operational guide for Claude Code sessions working in this repo. Self-contained for routine work; read first on a fresh session.\n- **`docs/state-and-gates.md`** — finding state model, score gates, deep/light lanes (the normative spec).\n- **`docs/pipeline.md`** — phase trees and token-tally semantics for every command.\n- **`docs/helpers.md`** — helper-script inventory and the batched-helper pattern.\n- **`bin/schema-v1.json`** — JSON Schema for `artifact.json` (source of truth for artifact shape).\n- **`docs/archive/`** — frozen design + build docs (2026-04-19 onward). `DESIGN.md` (rev 8) is the original normative spec; `BUILD.md` is the stage-by-stage journal. Not maintained; consult only for historical rationale.\n- **`plans/`** — per-branch plan files. Active follow-ups live in GitHub issues; historical backlog at `plans/old-backlog.md` (frozen 2026-05-04).\n\n## Dependencies\n\n### Runtime\n\n| Tool | Version | Used by | Notes |\n|---|---|---|---|\n| `uv` | 0.7+ | `artifact-patch.py`, `artifact-render.py` | `brew install uv`. Scripts use a PEP 723 inline-script shebang (`#!/usr/bin/env -S uv run --quiet --script`) so `uv` fetches and caches `jsonschema` on first run — no venv, no global pip install |\n| `python3` | 3.10+ | invoked by `uv` | `uv` will install a matching Python if needed |\n| `bash` | 3.2+ | all `*.sh` helpers | Helpers are intentionally 3.2-portable (no `declare -A`, `mapfile`, `${var,,}`), so macOS's default `/bin/bash` works as-is. On Windows, Git for Windows ships bash 5+ via Git Bash and Claude Code auto-routes through it |\n| `jq` | 1.6+ | `artifact-read.sh`, log helpers | `brew install jq` |\n| `gh` | 2.x | `artifact-publish.sh`, `external-scrape.sh` | `brew install gh`, `gh auth login` |\n| `git` | 2.x | everywhere | standard |\n\n## Installation\n\n### macOS / Linux\n\n1. Install deps: `brew install uv jq gh git` (macOS) or the distro equivalent. (macOS's default `/bin/bash` 3.2 is fine — helpers are 3.2-portable.)\n2. In a Claude Code session: `/plugin marketplace add adamjgmiller/adamsreview`\n3. In the same session: `/plugin install adamsreview@adamsreview`\n\n### Windows (native)\n\n1. Install [Git for Windows](https://git-scm.com/downloads/win) — provides Git Bash (bash 5+) and `git`, which Claude Code uses internally. Claude Code auto-routes `#!/usr/bin/env bash` helpers through Git Bash; set `CLAUDE_CODE_GIT_BASH_PATH` if Git Bash lives in a non-default location (see *Troubleshooting*).\n2. Install [uv](https://docs.astral.sh/uv/), [jq](https://jqlang.github.io/jq/download/), and the [GitHub CLI](https://cli.github.com/).\n3. In a Claude Code session: `/plugin marketplace add adamjgmiller/adamsreview` and `/plugin install adamsreview@adamsreview`.\n\n### Install from a local checkout\n\nIf you've cloned this repo and prefer running from source — or you want to pin to a specific commit — two paths work without the GitHub marketplace round-trip:\n\n- **Persistent install from a local path.** In a Claude Code session, run `/plugin marketplace add /path/to/adamsreview` then `/plugin install adamsreview@adamsreview`. Same end state as the GitHub marketplace flow above — the plugin is registered under `~/.claude/` and survives restarts. Use `.` in place of the absolute path if your cwd is already the clone.\n- **One-shot via `--plugin-dir`.** `claude --plugin-dir /path/to/adamsreview` launches Claude Code with the clone loaded as a plugin for that session only. Nothing is written to `~/.claude/`; re-launch without the flag and the plugin is gone. Handy for trying the plugin without any persistent state, or for running a specific checkout side-by-side with an installed version.\n\nBoth paths still require the runtime deps listed above (`uv`, `jq`, `gh`, `bash`, `git`).\n\n### Commands (post-install)\n\nAll invocations are plugin-namespaced:\n\n- `/adamsreview:review [--ensemble] [--full]`\n- `/adamsreview:codex-review [--effort <low|medium|high|xhigh>] [--full]`\n- `/adamsreview:add [<paste...>] [--file <path> --line <N> --claim \"...\"]`\n- `/adamsreview:walkthrough [threshold]`\n- `/adamsreview:fix [threshold]`\n- `/adamsreview:promote <finding_id> [--reason \"...\"] [--fix-hint \"...\"]`\n\n`--full` (on `:review` and `:codex-review`) opts out of the trivial-mode optimization, forcing every detection lens to run even on small or docs-only diffs. Useful when you want full coverage on a deliberately-small PR; otherwise the default trivial-mode classifier is the right call.\n\nNo separate Python dep install. First invocation of any `*.py` helper triggers `uv` to resolve declared deps (`jsonschema` etc.) and cache them — this can take a few seconds on a fresh machine (see *Troubleshooting*). Subsequent runs are fast.\n\n### Plugin-author iteration\n\nIf you're hacking on the plugin itself (not just using it), `scripts/dev-run.sh` launches Claude Code with the working tree loaded as a plugin via `claude --plugin-dir \"$(pwd)\"` — no marketplace install needed. For install-path simulation from a working tree, run `/plugin marketplace add .` inside a Claude Code session.\n\n### Review state location\n\n`/adamsreview:review` writes per-run state (artifact, trace, phase logs, token logs) under `~/.adams-reviews/<repo-slug>/<branch>/<review_id>/`. Override with `export ADAMS_REVIEW_REVIEWS_ROOT=/some/other/path` if you want state elsewhere.\n\n**Why not `~/.claude/reviews/`?** Claude Code hardcodes a sensitive-file permission prompt for writes to `~/.claude/...` that survives even `bypassPermissions` mode, and `~/.claude/reviews` is not on the short list of exempt subdirs (`.claude/commands`, `.claude/agents`, `.claude/skills`). Keeping review state outside `~/.claude/` avoids dozens of permission prompts per run.\n\n**Migrating from pre-Stage-2.5 state.** If you have reviews under `~/.claude/reviews/`, either:\n\n```bash\n# Option A: move state to the new canonical root (recommended).\nmv ~/.claude/reviews ~/.adams-reviews\n\n# Option B: keep state at the old location via the env var (accepts the prompts).\nexport ADAMS_REVIEW_REVIEWS_ROOT=~/.claude/reviews\n```\n\n### Token counts: what they measure\n\nThe rendered report can surface two numbers:\n\n- **Sub-agent tokens** — rolled up from the per-review `tokens.jsonl` log. Counts every dispatched sub-agent (lenses, validators, fix agents, post-fix reviewer, etc.) for this specific review. Precise. Always shown.\n- **Orchestrator tokens** — rolled up from the Claude Code session transcripts under `~/.claude/projects/<cwd-slug>/`, filtered to assistant turns with `timestamp >= review_started_at`. Captures the main-session spend that `subagent_tokens` deliberately excludes. **Opt-in** — see below.\n\nWhen both are populated they're complementary (no overlap), and together estimate total cost.\n\n#### Orchestrator tokens are opt-in\n\nmacOS Sequoia and Tahoe show an \"*kitty (or your terminal) would like to access data from other apps*\" prompt the first time a shell helper reads files marked with the `com.apple.provenance` extended attribute. Every Claude Code transcript carries one, and `bin/orchestrator-tokens.sh` reads them — so the helper would trigger the prompt on the first lifecycle command of every review and (because the TCC cache for this gate is partial) repeatedly thereafter. To avoid pestering users, the helper defaults to skip.\n\nTo enable, do **either**:\n\n- **Recommended** — grant your terminal app **Full Disk Access** (System Settings → Privacy & Security → Full Disk Access → `+` your terminal). One toggle, permanent, silences this prompt class for everything launched from your terminal. Then `export ADAMS_REVIEW_TALLY_ORCHESTRATOR=1` in your shell rc (`~/.zshrc`, `~/.bashrc`, etc.) so the helper actually runs.\n- **Just opt in without FDA** — `export ADAMS_REVIEW_TALLY_ORCHESTRATOR=1` and accept the macOS prompts when they fire. Each grant survives until the next OS update or terminal-app update; choose this if you want narrower permissions at the cost of clicking *Allow* periodically.\n\nWhen opted out (the default), the helper exits 0 with one `orchestrator-tally: skipped` line and leaves the artifact's `orchestrator_tokens` field absent. The PR comment shows only **Sub-agent tokens** — still the precise per-review counter and the primary cost signal. Sub-agent tokens log under `~/.adams-reviews/`, which carries no provenance xattr, so that path triggers no prompts.\n\n**Stale-data behavior.** If you opt in for the initial review and then opt out before running `/adamsreview:fix`, the helper preserves the previously-written `orchestrator_tokens` value rather than wiping it. The rendered line shows the last-measured value, not a freshly-skipped zero — meaning it can under-report subsequent fix-time activity. Re-opt-in on the next lifecycle command refreshes. The reverse direction (opt out for review, opt in for fix) has no staleness: the fix-time tally's `--since review_started_at` window covers the full review→fix arc, so the first opt-in write captures everything.\n\n#### Orchestrator tokens can over-count (when opted in)\n\nThe transcript scan is a pure time-window filter, so any Claude Code turn in the same working directory between `review_started_at` and the last tally gets counted — even if it's unrelated work. In practice that means:\n\n- **Clean:** review → fix back-to-back, or review → new review on updated codebase (each review's `review_started_at` excludes the prior one's turns).\n- **Over-counts:** review → unrelated work in the same cwd → fix (the unrelated turns land in the fix run's re-tally).\n- **Mitigation:** run the lifecycle commands close together, or do unrelated work in a different worktree (different cwd → different transcript directory → not scanned).\n\nSub-agent tokens don't have this problem — their log is per-review. If you need a precise total, trust sub-agent tokens and treat orchestrator tokens as a rough ceiling. See `bin/orchestrator-tokens.sh` header for the full list of caveats.\n\n### Why `uv` instead of plain pip\n\nPEP 668 (Python 3.12+ with Homebrew) marks system and user site-packages as externally managed and refuses direct `pip install`. The original plan assumed plain pip; `uv`'s inline-script dep spec is the cleanest workaround: each Python helper is self-contained, runs without activation ceremony, and its dep list lives next to the code that imports it. Tradeoff: requires `uv` on the machine running the scripts.\n\n## Layout\n\n```\nadamsreview/                           ← this repo (plugin root)\n├── CLAUDE.md                          ← operational guide (read first)\n├── README.md                          ← this file\n├── .claude-plugin/\n│   ├── plugin.json                    ← plugin manifest (name: adamsreview)\n│   └── marketplace.json               ← single-plugin marketplace\n├── .gitattributes                     ← LF enforcement\n├── docs/\n│   └── archive/                       ← frozen historical references (not maintained)\n│       ├── README.md                  ← frozen-as-of banner\n│       ├── DESIGN.md                  ← original normative design (rev 8)\n│       └── BUILD.md                   ← build journal (Stages 1–3 + hardening + walkthrough)\n├── plans/                             ← per-branch plan files (umbrella + optional PRD/PLAN/JOURNAL)\n├── test/                              ← smoke harness + fixtures\n├── commands/                          ← bare-stem command files (plugin namespacing)\n│   ├── review.md                      ← /adamsreview:review\n│   ├── codex-review.md                ← /adamsreview:codex-review\n│   ├── add.md                         ← /adamsreview:add\n│   ├── walkthrough.md                 ← /adamsreview:walkthrough\n│   ├── fix.md                         ← /adamsreview:fix\n│   └── promote.md                     ← /adamsreview:promote\n├── fragments/                         ← shared phase fragments + prompt references\n│   ├── _prelude-shared.md             ← loaded by every command\n│   ├── promote-core.md                ← shared precondition + patch (promote + walkthrough)\n│   ├── 00-preflight.md … 10-post-fix-and-commit.md\n│   │     (incl. 06b-auto-fix-hint.md for Phase 5.5)\n│   ├── 02-ensemble-adapter.md         ← --ensemble pooling\n│   ├── 01-codex-detection.md          ← Codex Phase 1 variant\n│   ├── 05-codex-validation.md         ← Codex Phase 4 variant\n│   ├── 06-codex-cross-cutting.md      ← Codex Phase 5 variant\n│   ├── lens-prompts/                  ← per-lens detection prompts\n│   └── lens-*-reference.md\n├── bin/                               ← helper scripts (plugin runtime auto-adds to $PATH)\n│   ├── include                        ← `!include <fragment>.md` wrapper\n│   ├── schema-v1.json                 ← JSON Schema for artifact.json\n│   ├── _common.py                     ← shared Python helpers\n│   ├── artifact-patch.py              ← machine-state writer\n│   ├── artifact-render.py             ← JSON → Markdown\n│   ├── artifact-validate.sh           ← schema check (bash wrapper)\n│   ├── artifact-read.sh               ← jq wrapper\n│   ├── artifact-publish.sh            ← PR comment post/patch\n│   ├── artifact-seed.sh               ← initial artifact scaffold\n│   ├── claude-md-paths.sh             ← walk-up CLAUDE.md finder\n│   ├── staleness.sh                   ← git diff intersection\n│   ├── freshness-gate.sh              ← trace freshness check\n│   ├── trivial-check.sh               ← trivial-mode classifier\n│   ├── codex-poll.sh                  ← Codex CLI invocation + watchdog\n│   ├── parse-validator-result.py      ← validator-output parser\n│   ├── parse-with-repair.py           ← JSON-with-repair parser\n│   ├── source-family-map.py           ← source-family lookup\n│   ├── log-phase.sh                   ← trace.md + phases.jsonl appender\n│   ├── log-tokens.sh                  ← tokens.jsonl appender\n│   └── (other helpers: group-fixes.py, repo-slug.sh, comment-freshness.sh,\n│      origin-crosscheck.sh, prior-fix-diff.sh, external-scrape.sh,\n│      assign-finding-ids.sh, line-range-check.sh, tally-subagent-tokens.sh,\n│      orchestrator-tokens.sh)\n├── hooks/\n│   ├── hooks.json                     ← SessionStart registration\n│   └── dep-check.sh                   ← soft dep-missing warning at session start\n└── scripts/\n    └── dev-run.sh                     ← `claude --plugin-dir` wrapper (plugin-author iteration)\n```\n\nNo symlinks, no install script. The plugin runtime discovers `commands/`, `fragments/`, `bin/`, and `hooks/` by convention once the plugin is installed via `/plugin install adamsreview@adamsreview`.\n\n## Troubleshooting\n\n### First invocation is slow\n\nThe Python helpers (`artifact-patch.py`, `artifact-render.py`) use a PEP 723 inline-script shebang (`#!/usr/bin/env -S uv run --quiet --script`). On a fresh machine, the first run pauses for a few seconds while `uv` resolves a matching Python interpreter and fetches the `jsonschema` dep into its cache. Subsequent runs hit the cache and are effectively instant. This is a one-time cost per machine, not per review.\n\n### `--ensemble` mode requirements\n\n`/adamsreview:review --ensemble` additionally requires the `codex` Claude Code plugin (the local Codex CLI is invoked through the plugin's `codex-companion.mjs`, not as a standalone CLI on `$PATH`). Without the plugin installed, the readiness gate prompts you to either continue without Codex (in PR mode that means PR-comment scraping only; in local mode it means internal lenses only — Phase 1.5 has no work to do) or stop and run `/codex:setup` first. The default (non-ensemble) mode has no such requirement.\n\n### Windows: Git Bash not found\n\nClaude Code auto-discovers Git Bash on Windows and routes `#!/usr/bin/env bash` helpers through it. If the auto-discovery fails (non-default Git Bash install path, portable install, etc.), set `CLAUDE_CODE_GIT_BASH_PATH` to the absolute path of `bash.exe` before launching Claude Code — for example:\n\n```\nset CLAUDE_CODE_GIT_BASH_PATH=C:\\Program Files\\Git\\bin\\bash.exe\n```\n\nor the `$env:CLAUDE_CODE_GIT_BASH_PATH = ...` equivalent in PowerShell.\n\n## Status\n\nCurrent release: **v0.4.0** (auto-fix-hint feature: Phase 5.5 + Phase 7.5 + Step 4.5). All six commands are shipped and in daily use. `/adamsreview:codex-review` landed in v0.3.0; recent releases have focused on hardening (anti-serialization callouts at fan-out sites, parallel-dispatch correctness, JSON-pipeline backslash safety) and the auto-fix-hint flow that lets `:fix` and `:walkthrough` batch-accept Sonnet-proposed fixes in one confirm.\n\nActive follow-ups live in GitHub issues. Frozen historical context: `plans/old-backlog.md` and `docs/archive/`.\n","summary":"adamsreview is a Claude Code plugin that performs multi-stage, multi-lens code reviews for PRs, with an emphasis on finding real bugs while reducing false positives. It runs parallel sub-agent “lenses” (e.g., correctness, security, UX), deduplicates results, gates findings through validation passes, and can optionally add a cross-cutting Opus check and/or a Codex CLI review. It also supports an automated fix loop that applies grouped high-confidence fixes, re-reviews the changes, reverts regressions, and commits only the surviving improvements, plus interactive walkthrough and promotion workflows for human judgment items. This is best for developers and teams who want a more reliable, repeatable review-and-fix pipeline than Claude Code’s built-in review commands or other single-pass review tools.","description":"Multi-lens code review pipeline for Claude Code: deep review (Claude or Codex), auto-fix loop, interactive walkthrough, external-finding injection.","stars":219,"language":"Shell"},{"owner":"glouw","repo":"nibble","url":"https://github.com/glouw/nibble","readme":"![](img/logo.png)\n\nNibble is C-like systems programming language.\n\n![](img/art.gif)\n\nNibble was written in 3000 lines of C to demonstrate an approach to LLVM IR\ngeneration without relying on external dependencies or heap allocations.\n\n![](img/tree.gif)\n\nNibble supports defer, recursion, integer, floating, and boolean types,\nstructs (simply named types), GLSL-like struct operators, pointers,\nfunction pointers, branching, loops, type checking, basic C interoperability via generic pointers,\nand reasonable error messages.\n\n![](img/creation.gif)\n\nIncluded are these four graphical demos demonstrating Nibble's ability. To try\nthem out, ensure SDL2 is first installed, as well as Clang, and then run `make`.\nClang will compile `main.c` and output the `nibble` compiler, and `nibble` will\nthen compile and run the graphical demos. Of these four demos, two demos are multithreaded software renditions\nof popular shader-toy demos, one demo is a demonstration of a red-black tree implementation, and the final\ndemo demonstrates a basic setup for game programming.\n\n![](img/chickens.gif)\n\n### Thoughts\n\nNibble compiles top down in a single pass and allocas freely, even within loops,\nby design. This simplified front-end design greatly improves `main.c` readability but causes\nstack overflows with lower (and sometimes even higher) clang back-end optimizations.\nI _was_ under the impression clang's back-end optimizer would hoist all allocas to a function's top level,\nbut so we learn in life. I have been meaning to explore stacksave/stackrestore but my LLVM\ncuriosity has more or less been satisfied, and I deem this compiler momentarily complete.\n","summary":"Nibble is a C-like systems programming language implemented in a small codebase to generate LLVM IR in a single pass, without external dependencies or heap allocations. It includes core language features such as defer, recursion, integer/float/bool types, structs and GLSL-like struct operators, pointers and function pointers, along with branching, loops, type checking, and readable error messages, plus basic C interoperability via generic pointers. The project also ships with graphical demos (requiring SDL2 and Clang) that compile and run the language in practice, including multithreaded shader-style renditions, a red-black tree example, and a starter for game programming. This is a great fit for learners and tinkerers interested in understanding how a small LLVM-based compiler/front-end can be built and experimented with, as well as developers who want to prototype performant, low-allocation systems-style code.","description":"Generating LLVM IR without malloc or external dependencies ","stars":104,"language":"C"},{"owner":"skrun-dev","repo":"skrun","url":"https://github.com/skrun-dev/skrun","readme":"<p align=\"center\">\n  <img src=\"assets/banner.svg\" alt=\"Skrun — Deploy any Agent Skill as an API\" width=\"600\">\n</p>\n\n<h1 align=\"center\">Skrun</h1>\n\n<p align=\"center\">\n  <b>Deploy any Agent as an API via <code>POST /run</code>.</b><br>\n  The open, multi-model runtime for AI agents — works with any LLM, on any infrastructure.\n</p>\n\n<p align=\"center\">\n  <sub>The open-source alternative to Claude Managed Agents (CMA) and Google's\n  Gemini Enterprise Agent Platform (GEAP) — multi-model, self-hostable, MIT.</sub>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/skrun-dev/skrun/actions\"><img alt=\"CI\" src=\"https://img.shields.io/github/actions/workflow/status/skrun-dev/skrun/ci.yml?branch=main&style=for-the-badge&logo=github&label=CI\"></a>\n  <a href=\"https://www.npmjs.com/package/@skrun-dev/cli\"><img alt=\"npm CLI\" src=\"https://img.shields.io/npm/v/@skrun-dev/cli?style=for-the-badge&logo=npm&label=CLI&color=CB3837\"></a>\n  <a href=\"https://www.npmjs.com/package/@skrun-dev/sdk\"><img alt=\"npm SDK\" src=\"https://img.shields.io/npm/v/@skrun-dev/sdk?style=for-the-badge&logo=npm&label=SDK&color=CB3837\"></a>\n  <a href=\"https://github.com/skrun-dev/skrun/stargazers\"><img alt=\"GitHub stars\" src=\"https://img.shields.io/github/stars/skrun-dev/skrun?style=for-the-badge&logo=github&color=FFD700\"></a>\n  <a href=\"LICENSE\"><img alt=\"License\" src=\"https://img.shields.io/badge/License-MIT-blue?style=for-the-badge\"></a>\n</p>\n\n<p align=\"center\">\n  <img alt=\"Node\" src=\"https://img.shields.io/badge/Node-%E2%89%A520-339933?style=for-the-badge&logo=node.js&logoColor=white\">\n  <img alt=\"TypeScript\" src=\"https://img.shields.io/badge/TypeScript-strict-3178C6?style=for-the-badge&logo=typescript&logoColor=white\">\n  <img alt=\"MCP\" src=\"https://img.shields.io/badge/MCP-compatible-8B5CF6?style=for-the-badge\">\n</p>\n\n<p align=\"center\">\n  <a href=\"#-why-skrun\">Why</a> ·\n  <a href=\"#️-use-cases\">Use Cases</a> ·\n  <a href=\"#-quick-start\">Quick Start</a> ·\n  <a href=\"#-dashboard\">Dashboard</a> ·\n  <a href=\"#-sdk\">SDK</a> ·\n  <a href=\"#-features\">Features</a> ·\n  <a href=\"#-documentation\">Docs</a>\n</p>\n\n<p align=\"center\">\n  <img src=\"docs/assets/flow.gif\" alt=\"Skrun demo: push an agent, explore the dashboard, run it in the playground\" width=\"800\">\n</p>\n\n<p align=\"center\"><sub>\n  <b>4 steps:</b> (1) <code>skrun deploy -m \"initial release\"</code> from your terminal →\n  (2) the agent appears in the dashboard →\n  (3) open the Playground, fill the input →\n  (4) click Run, watch SSE events stream in real time, see the result.\n</sub></p>\n\n---\n\n## 🎯 Why Skrun?\n\nYou shipped an AI capability. It works on your machine. But every user, every customer, every new model brings new plumbing.\n\n**Skrun is the open agent runtime.** Turn your skill — declared as `SKILL.md`, `AGENTS.md`, or your own format — into a `POST /run` endpoint. Without building your own agent loop. Without picking a vendor. Without locking your users behind a wall.\n\n**Any model. Any cloud. BYOK. MIT.** Your skill stays portable.\n\n### What you get\n\n- ✅ Your skill stays in your repo, in the format you choose. Skrun is a deployment target — your repo stays the source of truth.\n- ✅ Compatible with the [Agent Skills open standard](https://agentskills.io) (`SKILL.md`) and [AGENTS.md](https://agents.md) (Linux Foundation). Your existing skill works.\n- ✅ Users bring their own LLM keys. You're never on the hook for their costs.\n- ✅ Self-host on your infrastructure (Node 20+, SQLite or Postgres). [Self-hosting guide](docs/self-hosting.md). Cloud (coming soon).\n- ✅ MIT. Multi-model: Claude, GPT, Gemini, Mistral, Groq, Grok, Ollama.\n- ✅ Wrap existing scripts gradually. No big-bang rewrite required.\n\n### Skrun vs vendor runtimes\n\n| | Skrun | CMA / GEAP / Vendor runtimes |\n|--|-------|-----------------|\n| **Models** | Claude, GPT, Gemini, Mistral, Groq, Grok + any OpenAI-compatible endpoint (DeepSeek, Kimi, Qwen, Ollama, vLLM…) | One provider only |\n| **Deployment** | Self-hosted (Node + SQLite/Postgres) or our cloud (coming soon) | Vendor cloud only |\n| **Format** | `SKILL.md` ([agentskills.io](https://agentskills.io), 40+ platforms), `AGENTS.md` ([Linux Foundation](https://agents.md)), or your own | Proprietary |\n| **Streaming** | SSE + async webhooks | Varies |\n| **License** | MIT | Closed |\n| **Auth** | GitHub OAuth + API keys — multi-tenant namespaces | Vendor console only |\n| **LLM keys** | Bring your own keys | Vendor billing only |\n\n---\n\n## 🏗️ Use Cases\n\n### 🚀 For OSS skill maintainers — close the issues you can't answer today\n\nYou wrote `changelog-generator` (or `research-to-brief`, or `incident-postmortem`). It works in Claude Code. Stars are climbing. Then someone opens issue #34: *\"How do I run this from a CI pipeline?\"* Issue #41: *\"Can I integrate this with Linear?\"* Issue #58: *\"My status-page automation needs this.\"*\n\nToday you respond: *\"Sorry, this is a SKILL.md — you need Claude Code installed.\"* Half abandon.\n\n**With Skrun:** `skrun deploy`, you reply with a curl command. Issue closed in 5 minutes instead of 3 hours of setup. The drop-off between \"starred it\" and \"actually running it\" disappears.\n\n### 🛠️ For internal AI platforms — visibility and standardization without rewriting\n\nYour team has accumulated 12 LLM-powered scripts in 2 years. Each engineer rolled their own. One left last week — three of his scripts are crashing silently. Your LLM bill went 5x without explanation. The board asked twice \"what's our AI strategy?\" — you don't have one.\n\n**With Skrun:** wrap existing scripts gradually as skills (or `AGENTS.md`, or your own format). No big-bang rewrite. One dashboard for all AI calls — cost per feature, failure modes, ownership. Your team standardizes on one declarative format. New engineers read a manifest in 30 seconds instead of reverse-engineering 800 lines.\n\n### 🎯 For freelance & agencies — stop bricolating per-client AI deliveries\n\nEach new client means 2-3 weeks of build. You glue Express + Anthropic SDK + Vercel for each delivery. The plumbing is identical 70% of the time. Worse: when a client wants to switch from Anthropic to OpenAI 3 months later, you're back rewriting auth + retry + fallback logic.\n\n**With Skrun:** same skill format, deploy per client. Model swap is a YAML edit. Your client gets a stable `POST /run` endpoint **they own** — they can host on their infra, swap models, take over anytime. You ship the skill, not a server you maintain.\n\n---\n\n## 💬 What would *you* deploy?\n\nWhat skill would you turn into an API tomorrow? What's missing in your current agent setup?\n\n**[Tell us in Discussions](https://github.com/skrun-dev/skrun/discussions)** — we read every post, and it shapes what we build next.\n\n---\n\n## 🚀 Quick Start\n\n```bash\nnpm install -g @skrun-dev/cli\n\nskrun init --from-skill ./my-skill        # or: skrun init my-agent\nskrun deploy -m \"initial release\"         # build + push + get your API URL\nskrun verify dev/my-skill@1.0.0           # admin step — auto-admin in local dev\nskrun run dev/my-skill -i '{\"query\":\"analyze this\"}'\n```\n\nThat's it. Your agent is verified, callable via the CLI, and reachable as a `POST /run` HTTP endpoint:\n\n```bash\ncurl -X POST http://localhost:4000/api/agents/dev/my-skill/run \\\n  -H \"Authorization: Bearer dev-token\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"input\": {\"query\": \"analyze this\"}}'\n```\n\n> `dev-token` is for local development. In production, authenticate via [GitHub OAuth or API keys](docs/api.md#authentication) — your GitHub username becomes your namespace, and a separate admin role gates `skrun verify`.\n\n→ **[10-minute tutorial](docs/getting-started.md)** · **[Concepts](docs/concepts.md)** · **[API reference](docs/api.md)**\n\n---\n\n## 📊 Dashboard\n\n<p align=\"center\">\n  <img src=\"docs/assets/dashboard/home.png\" alt=\"Skrun Operator Dashboard — Home\" width=\"900\">\n</p>\n\nEvery Skrun registry ships with a full operator dashboard at `/dashboard`. No separate install, no extra env var.\n\n- **Home** — workspace stats, 24h/7d toggles, recent activity, top agents.\n- **Agents** — sortable list with run counts, token usage, verification status.\n- **Agent detail** — per-agent metrics, versions with notes, metadata, try-it curl.\n- **Runs** — every execution across all agents, filterable by agent/ID/status/model.\n- **Run detail** — full I/O, tokens, cost, model, event timeline (tool calls, LLM calls).\n- **Playground** — call any agent interactively, watch SSE events live, save outputs.\n- **Settings** — profile + API keys (`sk_live_*`) with one-shot reveal and revocation.\n\n→ **[Screenshot tour of all 7 pages](docs/getting-started.md#6-explore-the-dashboard)**\n\n---\n\n## 📦 SDK\n\n```bash\nnpm install @skrun-dev/sdk\n```\n\n```typescript\nimport { SkrunClient } from \"@skrun-dev/sdk\";\n\nconst client = new SkrunClient({\n  baseUrl: \"http://localhost:4000\",\n  token: \"dev-token\",\n});\n\n// Sync — get the result\nconst result = await client.run(\"dev/code-review\", { code: \"const x = 1;\" });\nconsole.log(result.output);\n\n// Stream — real-time events\nfor await (const event of client.stream(\"dev/code-review\", { code: \"...\" })) {\n  console.log(event.type); // run_start, tool_call, llm_complete, run_complete\n}\n\n// Async — fire and forget with webhook callback\nconst { run_id } = await client.runAsync(\"dev/agent\", input, \"https://your-app.com/hook\");\n\n// Pin a specific agent version — reproducible, no silent drift\nconst pinned = await client.run(\"dev/code-review\", input, { version: \"1.2.0\" });\nconsole.log(pinned.agent_version); // \"1.2.0\" — always echoed back\n\n// Push with a note (like a git commit message)\nawait client.push(\"dev/code-review\", bundle, \"1.3.0\", { message: \"Added retry logic\" });\n```\n\n9 methods: `run`, `stream`, `runAsync`, `push`, `pull`, `list`, `getAgent`, `getVersions`, `verify`. **Zero runtime dependencies**, Node.js 20+.\n\n---\n\n## ✨ Features\n\n| Feature | Description |\n|---------|-------------|\n| 🤖 **Multi-model** | 6 built-in providers (Anthropic, OpenAI, Google, Mistral, Groq, xAI) + any OpenAI-compatible endpoint (DeepSeek, Kimi, Qwen, Ollama, vLLM…) — with automatic fallback |\n| 🔧 **Tool calling** | Local scripts (`scripts/`) + MCP servers (`npx`) — same ecosystem as Claude Desktop |\n| 💾 **Stateful** | Agents remember across runs via key-value state |\n| 📡 **Streaming** | SSE real-time events (`run_start` → `tool_call` → `run_complete`) + async webhooks |\n| 📦 **Typed SDK** | `npm install @skrun-dev/sdk` — `run()`, `stream()`, `runAsync()` + 6 more methods |\n| 📊 **Operator Dashboard** | Web UI at `/dashboard` — agents, runs, stats, settings, integrated playground with SSE streaming |\n| 📖 **Interactive API docs** | OpenAPI 3.1 schema + Scalar explorer at `GET /docs` |\n| 🔐 **Production auth** | GitHub OAuth login + API keys (`sk_live_*`) + multi-tenant namespaces |\n| 🗄️ **Persistent storage** | Pluggable database — SQLite for local dev (zero-config, file-based), Supabase PostgreSQL for production |\n| 🔑 **Caller keys** | Users bring their own LLM keys via `X-LLM-API-Key` — zero cost for operators |\n| ✅ **Agent verification** | Verified flag controls script execution — safe for third-party agents |\n| 📌 **Version pinning + notes** | Pin a specific agent version per call (`version: \"1.2.0\"`) or attach a note at push (`-m \"...\"`) — reproducible integrations, visible changelog |\n| 🌍 **Environment separation** | Agent behavior (model, tools) separated from runtime environment (networking, timeout, sandbox). Per-run overrides via POST /run body |\n| 📁 **Files API** | Unified `/api/files` namespace for both directions — upload binary inputs (image/PDF/audio) via `POST /api/files`, download agent-produced artifacts via `GET /api/files/:id/content` |\n| 🖼️ **Multimodal inputs** | Declare `type: file` inputs (image / PDF / audio) in `agent.yaml`. Agents read images directly via vision (no OCR upstream). 3 transports: file_id ref, base64 inline, URL. Capability check at `skrun deploy/push` refuses incompatible model+media. |\n| 📦 **Script dependencies** | Drop a standard `package.json` (Node) or `requirements.txt` / `pyproject.toml` (Python) at the bundle root. Skrun resolves deps on first run, caches at `~/.skrun/deps/<hash>/` for instant subsequent runs. Auto-detects pnpm/yarn/npm + uv/poetry lockfiles for reproducible installs. |\n| 🎯 **Tool choice** | Force the LLM to invoke a specific tool (top-level `tool_choice: <name>`), require any tool (`tool_choice: required`), block tool use (`none`), or mark per-tool invariants with `required: true`. Native cross-provider support (Anthropic / Gemini / OpenAI / xAI) with graceful soft-fallback when a directive isn't natively supported. |\n| 💸 **Native prompt caching** | Automatic across 5 providers (Anthropic / OpenAI / Gemini / xAI / Groq) — 30-90% input cost savings on repeated content (system prompts + tools + reference documents). Anthropic gets explicit `cache_control` injection on the system + tools prefixes; OpenAI / xAI / Groq / Gemini benefit from implicit caching. Cost-tracking accuracy improves to ±5% of provider invoice via the new `cache_read_tokens` / `cache_write_tokens` fields in `usage`. Track dollar savings live (`cost.saved`) and on the dashboard. |\n| 📊 **Structured logs** | JSON to stdout via pino — pipe to Axiom, Datadog, ELK. `LOG_LEVEL` env var controls verbosity |\n\n---\n\n## 🧪 Demo agents\n\nEight runnable demos under [`agents/`](./agents/) — each produces a real, downloadable artifact (PDF, XLSX, PPTX, ZIP, CSV, MD). All use Google Gemini Flash by default (free tier). Change the `model` section in `agent.yaml` to use any [supported provider](#-features).\n\n### For OSS developers\n\n| Agent | What it does | Artifact |\n|-------|--------------|----------|\n| 📝 [changelog-generator](agents/changelog-generator/) | Reads your local `git log` between two tags, groups commits by Conventional Commit type, drafts release notes | `CHANGELOG.md` + `release-notes.md` |\n| 📐 [adr-writer](agents/adr-writer/) | Captures an architectural decision (context / options / decision / consequences) as a numbered Markdown ADR — auto-numbers from your existing `adrs/` folder | `NNNN-<slug>.md` |\n\n### For internal-platform / engineering teams\n\n| Agent | What it does | Artifact |\n|-------|--------------|----------|\n| 🎯 [meeting-transcript-to-action-items](agents/meeting-transcript-to-action-items/) | Extracts decisions + action items from a Zoom/Teams transcript. **Stateful** — auto-resolves prior actions when next meeting mentions them as done | `actions.csv` + `recap.md` |\n| 🛡️ [semgrep-rule-creator](agents/semgrep-rule-creator/) | Turns a CVE description + bad-code snippet into a complete Semgrep rule bundle (rule + tests + rationale) | `rule.yml` + `tests.md` + `README.md` |\n\n### For freelancers / analysts / biz operators\n\n| Agent | What it does | Artifact |\n|-------|--------------|----------|\n| 📊 [csv-to-executive-report](agents/csv-to-executive-report/) | CSV → analyzed multi-page PDF with charts + narrative + summary table | `report.pdf` |\n| 🎤 [slide-deck-generator](agents/slide-deck-generator/) | Markdown outline → polished `.pptx` with brand color, title/content/closing layouts, speaker notes | `deck.pptx` |\n| 🧾 [receipts-to-expenses](agents/receipts-to-expenses/) | Receipt photos (vision-native) + optional bank statement → categorized expense workbook + summary PDF | `expenses.xlsx` + `monthly.pdf` |\n\n### Universal\n\n| Agent | What it does | Artifact |\n|-------|--------------|----------|\n| 🧠 [knowledge-base-from-vault](agents/knowledge-base-from-vault/) | Folder of Markdown notes (Obsidian/Notion/raw) → navigable static HTML site. **Stateful** — concept index densifies across runs | `kb.zip` (HTML+CSS) |\n\n<details>\n<summary><b>Earlier minimal demos</b></summary>\n\nShorter examples that each illustrate one primitive (model fallback, MCP, state, scripts) without producing artifacts:\n\n[code-review](agents/code-review/) · [pdf-processing](agents/pdf-processing/) · [seo-audit](agents/seo-audit/) · [data-analyst](agents/data-analyst/) · [email-drafter](agents/email-drafter/) · [web-scraper](agents/web-scraper/)\n\n</details>\n\n<details>\n<summary><b>Try one locally</b></summary>\n\n```bash\n# 1. Start the registry (uses SQLite — data persists across restarts)\ncp .env.example .env          # add your GOOGLE_API_KEY\npnpm dev:registry              # keep this terminal open\n\n# 2. In another terminal — pick any agent (changelog-generator is the lightest)\nskrun login --token dev-token\ncd agents/changelog-generator\nskrun build && skrun push -m \"v1 — first push\"\nskrun verify dev/changelog-generator@1.0.0   # admin step; dev-token = auto-admin\n\n# 3. Call it (uses the bundled fixture — no real git repo needed)\nskrun run dev/changelog-generator \\\n  -i '{\"repo_path\": \"./fixtures/sample-repo.git-log.txt\", \"project_name\": \"demo\"}'\n\n# Or via raw HTTP:\ncurl -X POST http://localhost:4000/api/agents/dev/changelog-generator/run \\\n  -H \"Authorization: Bearer dev-token\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"input\": {\"repo_path\": \"./fixtures/sample-repo.git-log.txt\", \"project_name\": \"demo\"}}'\n\n# 4. Download the artifacts via the Files API (run_id from response)\ncurl http://localhost:4000/api/runs/<run_id>/files/CHANGELOG.md \\\n  -H \"Authorization: Bearer dev-token\" -o CHANGELOG.md\n```\n\n> **Windows (PowerShell):** use `curl.exe` instead of `curl`, and pass `-d \"@input.json\"` for the body.\n> **Python demos** (slide-deck-generator, csv-to-executive-report, receipts-to-expenses) and the **Node demo** (knowledge-base-from-vault): no manual install. Skrun's runtime auto-resolves each agent's `requirements.txt` / `package.json` on first call and caches at `~/.skrun/deps/<hash>/`. See the [Script dependencies](docs/agent-yaml.md#script-dependencies) reference.\n\n</details>\n\n---\n\n## 💻 CLI\n\n| Command | Description |\n|---------|-------------|\n| `skrun init [dir]` | Create a new agent |\n| `skrun init --from-skill <path>` | Import existing skill |\n| `skrun dev` | Local server with POST /run (mock, free) |\n| `skrun test` | Run agent tests (real LLM) |\n| `skrun build` | Package `.agent` bundle |\n| `skrun push -m \"note\"` | Push with a version note |\n| `skrun verify <ns>/<name>@<v>` | Mint admin-verified trust on a version (admin only) |\n| `skrun unverify <ns>/<name>@<v>` | Revoke verification (admin only) |\n| `skrun run <ns>/<name>[@<v>]` | Invoke an agent — `-i` inline, `-f` file, `--stdin` pipe |\n| `skrun deploy -m \"note\"` | Build + push + live URL |\n| `skrun pull <agent>` | Download agent bundle |\n| `skrun login` / `logout` | Authentication (OAuth or token) |\n| `skrun logs <agent>` | Execution logs (planned) |\n\n→ **[Full CLI reference](docs/cli.md)**\n\n---\n\n## 🌐 Self-hosting\n\nSkrun is MIT — deploy anywhere.\n\n- **SQLite (default)** — zero config, file-based, survives restarts. Good for local dev and single-node.\n- **Supabase** — production-grade PostgreSQL. Set `DATABASE_URL` + `SUPABASE_KEY`.\n- **Any cloud** — Fly.io, AWS, GCP, Hetzner, bare metal. Caddy or nginx in front.\n- **GitHub OAuth** — users sign in with GitHub, their username becomes their namespace.\n\n→ **[Self-hosting guide](docs/self-hosting.md)** — step-by-step with env vars, reverse proxy, migrations.\n\n---\n\n## 📚 Documentation\n\n- 📖 **[Getting Started](docs/getting-started.md)** — 10-minute tutorial with dashboard screenshots\n- 🧠 **[Concepts](docs/concepts.md)** — vocabulary reference (agent, skill, run, namespace…)\n- 🌐 **[Self-hosting](docs/self-hosting.md)** — deploy on your own infrastructure\n- 🔧 [agent.yaml](docs/agent-yaml.md) · [CLI](docs/cli.md) · [API](docs/api.md) — full references\n- 🎮 [Interactive API explorer](http://localhost:4000/docs) — live Scalar UI (start the registry first)\n- 📋 [OpenAPI schema](http://localhost:4000/openapi.json) — import into Postman / Insomnia\n- 📝 [Changelog](CHANGELOG.md) · 🤝 [Contributing](CONTRIBUTING.md)\n\n---\n\n## 👥 Community\n\n- 💬 [GitHub Discussions](https://github.com/skrun-dev/skrun/discussions) — ask questions, share agents\n- 🐛 [Issues](https://github.com/skrun-dev/skrun/issues) — report bugs, request features\n- ⭐ [Star the repo](https://github.com/skrun-dev/skrun) if you like the project!\n\n---\n\n## 🤝 Contributing\n\n```bash\ngit clone https://github.com/skrun-dev/skrun.git\ncd skrun\npnpm install && pnpm build && pnpm test\n```\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for conventions and setup.\n\n---\n\n## 📜 License\n\n[MIT](LICENSE) — free to use, modify, self-host, and build on top.\n\n","summary":"Skrun is an open, multi-model runtime that deploys AI agent “skills” from your repository as a simple API endpoint, using `POST /run`. It supports common skill formats like `SKILL.md` and `AGENTS.md`, lets users bring their own model/API keys, and can run on any infrastructure with self-hosting options (Node 20+ with SQLite or Postgres). The runtime is designed to work with many LLM providers and also supports gradual wrapping of existing scripts instead of forcing a full rewrite. This makes it a good fit for developers and teams who want to productize agent capabilities while keeping model choice and hosting portable rather than locked to a single vendor platform.","description":"Deploy any Agent Skill as an API via POST /run. The open-source multi-model alternative to Claude Managed Agents, Microsoft Foundry & Mistral/Koyeb — works with any LLM.","stars":191,"language":"TypeScript"},{"owner":"aragossa","repo":"pii-shield","url":"https://github.com/aragossa/pii-shield","readme":"# PII-Shield 🛡️\n\n**Zero-code log sanitization sidecar for Kubernetes.**\nPrevents data leaks (GDPR/SOC2) by redacting PII from logs *before* they leave the pod.\n\n![License](https://img.shields.io/badge/License-Apache_2.0-blue.svg)\n![Docker Pulls](https://img.shields.io/docker/pulls/thelisdeep/pii-shield)\n![Go Report Card](https://goreportcard.com/badge/github.com/pii-shield/pii-shield?v=1)\n![Go Reference](https://pkg.go.dev/badge/github.com/pii-shield/pii-shield.svg)\n![Build Status](https://github.com/pii-shield/pii-shield/actions/workflows/test.yml/badge.svg)\n![Coverage Status](https://codecov.io/gh/pii-shield/pii-shield/branch/main/graph/badge.svg)\n![GitHub release (latest SemVer)](https://img.shields.io/github/v/release/pii-shield/pii-shield?sort=semver)\n[![OpenSSF Best Practices](https://www.bestpractices.dev/projects/12945/badge)](https://www.bestpractices.dev/projects/12945)\n[![Artifact Hub](https://img.shields.io/endpoint?url=https://artifacthub.io/badge/repository/pii-shield)](https://artifacthub.io/packages/search?repo=pii-shield)\n![PyPI Downloads](https://img.shields.io/pypi/dm/pii-shield-wasi?label=PyPI%20Downloads&color=blue)\n![npm Downloads](https://img.shields.io/npm/dw/@aragossa/pii-shield-wasi?label=npm%20Downloads&color=green)\n[![Sponsor](https://img.shields.io/badge/Sponsor-GitHub%20Sponsors-ea4aaa?logo=githubsponsors)](https://github.com/sponsors/pii-shield)\n\n\"Don't let PII poison your AI models.\" PII-Shield ensures that sensitive data never reaches your training dataset, saving you from GDPR-forced model retraining.\n\n> [!WARNING]\n> **Upgrading to v2.0.0?**\n> We have moved entirely to a Helm-based distribution and Distroless Native Sidecars. Kustomize deployment and `/bin/sh` access inside the sidecar are no longer supported. Read the Migration Guide.\n\n## Two Deployment Models\n\nPII-Shield offers two distinct ways to integrate into your stack:\n\n1. **Kubernetes Operator (Zero-code)**: Our flagship deployment model. A fully automated K8s Operator that injects a highly-secure Distroless Sidecar into your pods to intercept and sanitize logs on the fly.\n2. **In-Process WASM (For core integrations)**: For extreme performance, the core engine can be embedded directly via WASM, providing `<1ms` latency without network hops.\n\n## Project Status & Roadmap\n\nPII-Shield is an actively developed open-source security tool in a production-hardening phase. The v2.x release line ships usable CLI, container, Helm/operator, and WASM SDK artifacts. Core redaction paths are ready for controlled deployments, while some Kubernetes deployment modes and supply-chain guarantees are still being stabilized.\n\n| Component | Status |\n| --- | --- |\n| Core scanner | Released / controlled deployments |\n| CLI sidecar | Released / controlled deployments |\n| Kubernetes operator | Stabilization phase |\n| WASM SDKs | Released beta |\n| Proxy-Wasm gateway integration | Planned R&D |\n| Control Plane UI | Planned R&D |\n| eBPF interception | Experimental R&D |\n\nSee [KNOWN_LIMITATIONS.md](KNOWN_LIMITATIONS.md) for the current production-hardening boundaries.\n\n## Why PII-Shield?\n\nDevelopers often forget to mask sensitive data. Traditional regex filters in Fluentd/Logstash are slow, hard to maintain, and consume expensive CPU on log aggregators.\n\n**PII-Shield sits right next to your app container:**\n- **Production-hardening Core Engine:** Optimized for Kubernetes sidecars with low memory allocations on hot paths and deterministic regex matching.\n- **Context-Aware Entropy Analysis:** Detected high-entropy secrets even without keys (e.g. `Error: ... 44saCk9...`) by analyzing context keywords.\n- **Custom Regex Rules:** Deterministic redaction for structured data (UUIDs, IDs) that overrides entropy checks for known patterns.\n- **Regression & Fuzz Coverage:** Tested against stress cases including binary garbage, JSON nesting, and multilingual logs.\n- **Deterministic Hashing:** Replaces secrets with unique hashes (e.g., `[HIDDEN:a1b2c]`), allowing QA to correlate errors without seeing the raw data.\n- **Drop-in:** No code changes required. Works with any language (Node, Python, Java, Go).\n- **Whitelist Support:** Explicitly allow safe patterns (e.g., git hashes, system IDs) using `PII_SAFE_REGEX_LIST` to prevent false positives.\n\n\n## Managing PII-Shield across dozens of clusters?\nWe are building a hosted Control Plane with centralized rule management, Slack alerting, and redaction analytics. \n[![Join the Waitlist](https://img.shields.io/badge/Join_the_Waitlist-PII--Shield_Cloud-blue?style=for-the-badge)](https://tally.so/r/PdY7Ze)\n\n## Trusted By\n\n**GuardSpine** (AI Governance Kernel) integrated PII-Shield's **In-Process WASM** to sanitize sensitive evidence trails directly within their Node.js and Python agents.\n\n> We chose the WASM architecture to ensure **zero network overhead** and **<1ms latency**. PII-Shield runs directly in-process, preserving the referential integrity of our hash chains while keeping logs compliant.\n\n## Performance Considerations\n\nWhile PII-Shield is highly optimized, deep inspection of complex logs requires careful attention to configuration.\n- **Text Logs:** Extremely fast (>100k lines/s).\n- **JSON Logs:** Zero-allocation parsing (no `encoding/json` overhead). The scanner manually parses JSON structures to ensure high throughput (~7MB/s) without memory spikes.\n- **Recommendation:** Usage is safe for high throughput. We use recursion safeguards to prevent stack overflows on deeply nested JSON.\n\n## Installation\n\n### Helm Chart (Kubernetes Operator)\nThe official and recommended way to deploy PII-Shield in Kubernetes is via our fully-automated Operator:\n\n```bash\nhelm repo add pii-shield https://pii-shield.github.io/pii-shield/\nhelm repo update\nhelm install pii-shield-operator pii-shield/pii-shield-operator -n operator-system --create-namespace\n```\nThis deploys the PII-Shield Operator which automatically injects highly-secure, distroless sidecars into your Pods without requiring any code or Dockerfile changes.\n\n### Docker\nGet the latest lightweight image from Docker Hub or GHCR:\n```bash\ndocker pull thelisdeep/pii-shield:v2.0.5\n# OR from GitHub Container Registry (Enterprise):\ndocker pull ghcr.io/pii-shield/pii-shield:v2.0.5\n```\n\n### Build from Source\n\nYou can build the binary directly from the source code:\n\n```bash\ngo build -o pii-shield ./cmd/cleaner/main.go\n```\n\n## Configuration\nSee [CONFIGURATION.md](CONFIGURATION.md) for a full list of environment variables, including:\n- `PII_SALT`: Custom HMAC salt (Required for production).\n- `PII_ADAPTIVE_THRESHOLD`: Enable dynamic entropy baselines.\n- `PII_DISABLE_BIGRAM_CHECK`: Optimize for non-English logs.\n- `PII_CUSTOM_REGEX_LIST`: Custom regex rules for deterministic redaction.\n- `PII_SAFE_REGEX_LIST`: Whitelist regex rules to ignore (matches are returned as-is).\n\n### Entropy Sensitivity Table (Default Threshold: 3.6)\n\n| Entropy | Data Type | Example |\n|---------|-----------|---------|\n| **0.0 - 3.0** | Common words, repeats | `password`, `admin`, `111111` |\n| **3.0 - 3.6** | CamelCase, partial hashes | `ProgramCampaignInstanceJob`, `8f3a11b2c` |\n| **3.6 - 4.5** | Paths, UUIDs, Weak Passwords | `/opt/application/runtime`, `P@ssw0rd2026!` |\n| **4.5 - 5.0** | Medium Tokens | `E8s9d_2kL1` |\n| **5.0+** | High Entropy Keys | (SHA-256, API Keys) |\n\n## Quick Start\n1. Test Locally (CLI)\nYou can pipe any log output through PII-Shield to see it in action immediately:\n\n```bash\n# Emulate a log with a sensitive password\necho \"Error: User password=MySecretPass123! failed login\" | docker run -i --rm ghcr.io/pii-shield/pii-shield:v2.0.5\n\n# Output: Error: User password=[HIDDEN:8f3a11] failed login\n```\n\n2. Kubernetes (Automated Sidecar Injection)\nWith the PII-Shield Operator installed, protecting an application is as simple as creating a `PiiPolicy` and labeling your Pods.\n\n**Create a Policy:**\n```yaml\napiVersion: core.pii-shield.io/v1alpha1\nkind: PiiPolicy\nmetadata:\n  name: strict-policy\n  namespace: default\nspec:\n  injectionMode: \"file\"\n```\n\n**Label your Deployment:**\n```yaml\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: secure-app\nspec:\n  template:\n    metadata:\n      labels:\n        pii-shield.io/inject: \"true\"\n      annotations:\n        pii-shield.io/policy: \"strict-policy\"\n# ...\n```\n\nThe Operator will automatically inject the `pii-shield-agent` using the Native Sidecar pattern (K8s 1.28+) and securely mask all logs!\n\n## Verification\nThis project is verified with a growing testing suite intended to raise confidence before production hardening:\n1. **Unit Tests**: Cover edge cases, multilingual support, and JSON integrity with >85% coverage.\n2. **Fuzzing**: Native Go fuzzing ensures crash safety against invalid and random binary inputs.\n3. **Smoke Testing**: `./scripts/test-smoke.sh` exercises mixed workloads and reports detection accuracy.\n4. **End-to-End (E2E) Testing**: The `operator/tests/run_e2e.sh` suite performs full-stack validation using Minikube and Helm. It builds local images, provisions the Operator without cert-manager, deploys target Jobs, and verifies actual log redaction by intercepting sidecar outputs.\n\n### Performance Benchmarks\n\nTo compare end-to-end CLI throughput between the current branch and a baseline ref:\n\n```bash\n./benchmark/run_benchmarks.sh\n```\n\nBy default, the benchmark compares `HEAD` against `origin/main`, refreshes `origin/main`, generates a mixed log corpus, alternates old/new run order, and reports median, p95, min/max, and MiB/s:\n\n```bash\nBASE_REF=origin/main RUNS=9 LINES=500000 ./benchmark/run_benchmarks.sh\n```\n\nThis measures the full stdin-to-stdout CLI path. For scanner-only microbenchmarks, run:\n\n```bash\ngo test -bench=. -benchmem ./pkg/scanner\n```\n\n### Operator Integration Tests\n\nThe operator keeps fast unit tests separate from Kubernetes API integration tests. Regular operator tests do not start a local API server:\n\n```bash\ncd operator\ngo test ./...\n```\n\nTo run the envtest-based controller integration suite:\n\n```bash\n./scripts/test-operator-integration.sh\n```\n\nThese tests start a local Kubernetes API server and etcd through `envtest`, so they require permission to bind to `127.0.0.1`. In restricted sandboxes, run them in a local shell, Docker environment, or CI runner that allows localhost bind.\n\n## Support\n\nPII-Shield is open-source infrastructure for privacy-preserving logs. If this project is useful to you or your organization, you can support its development through [GitHub Sponsors](https://github.com/sponsors/pii-shield).\n\n## Release Verification\n\nRelease checksum and image-digest verification guidance is documented in [docs/release-verification.md](docs/release-verification.md). Signature and provenance-backed releases are tracked as part of the supply-chain hardening roadmap.\n\n## License\nDistributed under the Apache 2.0 License. See `LICENSE` for more information.\n","summary":"PII-Shield is a zero-code Kubernetes sidecar that sanitizes application logs to prevent personally identifiable information (PII) from leaving the pod, helping teams meet GDPR/SOC2 requirements and avoid costly downstream issues like model retraining. It provides context-aware redaction, including entropy-based detection of likely secrets, deterministic regex rules for structured identifiers, and deterministic hashing to preserve traceability without exposing sensitive values. The project is delivered via a Kubernetes Operator that injects a secure distroless sidecar, with an additional high-performance option to embed the core redaction engine via WASM. It benefits engineering and security teams that want reliable, low-maintenance PII protection for production workloads, especially where centralized log filtering is too slow or error-prone.","description":"Zero-code K8s sidecar for log sanitization. Detects secrets via Entropy Analysis, preserves JSON integrity, and redacts PII deterministically. 🛡️","stars":135,"language":"Go"},{"owner":"olivier-ls","repo":"php-fts","url":"https://github.com/olivier-ls/php-fts","readme":"# php-fts\n\n![Packagist Version](https://img.shields.io/packagist/v/ols/php-fts)\n![PHP Version](https://img.shields.io/packagist/dependency-v/ols/php-fts/php)\n![License](https://img.shields.io/github/license/olivier-ls/php-fts)\n![Downloads](https://img.shields.io/packagist/dt/ols/php-fts)\n\nA self-contained full-text search engine written in pure PHP.  \nNo extensions. No external services. No dependencies. Just files.\n\n---\n\n## Who is this for?\n\nphp-fts is designed for projects where deploying a dedicated search service is not an option — shared hosting, small VPS, or simply situations where you want to keep your stack minimal and portable.\n\nIf you have access to Elasticsearch, Meilisearch or Typesense and the infrastructure to run them, use those. They are more powerful and built for high-traffic, large-scale workloads.\n\nIf you don't — or if you'd rather not — php-fts gives you solid full-text search with ranked results, filters, and tolerant matching, with nothing to install and nothing to configure beyond a directory path.\n\n**It is a good fit if:**\n- You are on shared hosting (OVH, Infomaniak, o2switch, etc.)\n- You want zero infrastructure overhead\n- Your dataset is in the range of hundreds to tens of thousands of documents\n- You index offline or on a schedule, and serve searches at runtime\n\n**It is not a good fit if:**\n- You need real-time indexing under heavy concurrent write load\n- Your dataset is in the millions of documents\n- You need geo search or multi-tenant isolation\n\n---\n\n## Features\n\n- **Full-text search** with trigram indexing — tolerant to typos and partial matches\n- **BM25 + IDF scoring** — industry-standard relevance ranking (same algorithm as Lucene / Elasticsearch)\n- **Per-document score** — exposed in results, usable to build facet counts, sorting, or custom ranking\n- **Field boosting** — weight some fields (e.g. title) more than others\n- **Filters** — exact match, comparisons, range, `in`, `not in`, `contains` on array fields\n- **Combined AND / OR filtering** — flexible condition logic\n- **Bulk insertion** — up to 12× faster than individual inserts, single lock for the whole batch, crash-safe\n- **Soft delete** with tombstones — fast deletes, cleaned up on compaction\n- **Atomic update** — soft delete + re-insert in a single lock\n- **Compaction** — rebuilds index files cleanly, removes deleted documents and fragmentation\n- **Fragmentation monitoring** — know when to compact\n- **Binary file storage** — portable across servers, no rebuild needed\n- **O(1) trigram lookup** — fixed-size index (~810 KB), no tree traversal\n- **No extensions required** — runs on any standard PHP 8.1+ installation\n\n---\n\n## Requirements\n\n- PHP **8.1** or higher\n- Read/write access to a directory for index files\n\n---\n\n## Installation\n\n**Via Composer**\n\n```bash\ncomposer require ols/php-fts\n```\n\n**Manual install** — if you are not using Composer, copy the `src/` directory into your project and include the autoloader:\n\n```php\nrequire '/path/to/php-fts/src/autoload.php';\n```\n\n---\n\n## Quick start\n\n```php\nuse Ols\\PhpFts\\SearchEngine;\n\n$engine = new SearchEngine();\n$engine->open('./search_data');\n\n// Insert a document\n$docId = $engine->insert([\n    'title'       => 'Brown leather shoe',\n    'description' => 'Elegant city shoe in soft leather',\n    'price'       => 129.90,\n    'stock'       => 42,\n    'active'      => true,\n    'category'    => 'Shoes',\n    'brand'       => 'Adidas',\n    'tags'        => ['summer', 'luxury', 'city'],\n]);\n\n// Search\n$results = $engine->search('leather shoe', limit: 20, boosts: [\n    'title'       => 3.0,\n    'description' => 1.0,\n]);\n\nforeach ($results as $result) {\n    echo $result['document']['title'] . ' — score: ' . $result['score'] . PHP_EOL;\n}\n\n$engine->close();\n```\n\n---\n\n## API Reference\n\n### Open / Close\n\n```php\n$engine->open('./search_data');   // Creates directory and files if they don't exist\n$engine->close();                 // Flushes and closes all file handles\n```\n\n### Insert\n\n```php\n// Single document — returns the doc ID (binary offset, keep it if you need update/delete)\n$docId = $engine->insert([\n    'title'  => 'My product',\n    'price'  => 49.90,\n    'active' => true,\n    'tags'   => ['new', 'sale'],\n]);\n\n// Bulk insert — one lock for the entire batch, significantly faster\n$docIds = $engine->insertBulk([\n    ['title' => 'Product A', 'price' => 29.90],\n    ['title' => 'Product B', 'price' => 59.90],\n]);\n```\n\nSupported field types: `string`, `int`, `float`, `bool`, `array` of strings.\n\n### Search\n\n```php\n$results = $engine->search(\n    query:         'leather shoe',\n    limit:         20,\n    maxCandidates: 5000,\n    boosts:        ['title' => 3.0, 'description' => 1.0],\n    filters:       [...],\n);\n```\n\nEach result:\n\n```php\n[\n    'docId'    => 942222,   // document identifier\n    'score'    => 43.74,    // BM25+IDF relevance score, 0-100\n    'document' => [...],    // original document array\n]\n```\n\nThe `score` field is available on every result and can be used to build facet counts, custom sorting, or relevance thresholds.\n\n### Filters\n\n```php\n$results = $engine->search('shoe', filters: [\n\n    'and' => [\n        ['field' => 'active',   'op' => '=',        'value' => true],\n        ['field' => 'stock',    'op' => '>',         'value' => 0],\n        ['field' => 'price',    'op' => '<=',        'value' => 300],\n        ['field' => 'category', 'op' => 'in',        'value' => ['Shoes', 'Sport']],\n        ['field' => 'tags',     'op' => 'contains',  'value' => 'luxury'],\n    ],\n\n    'or' => [\n        ['field' => 'brand', 'op' => '=', 'value' => 'Adidas'],\n        ['field' => 'brand', 'op' => '=', 'value' => 'Puma'],\n    ],\n\n]);\n```\n\nBoth `and` and `or` are optional, but at least one must be present.  \nWhen both are used: all AND conditions must pass **and** at least one OR condition must pass.  \nA document missing a filtered field is excluded from results.\n\n| Operator                  | Supported types          |\n|---------------------------|--------------------------|\n| `=` `!=`                  | int, float, bool, string |\n| `>` `>=` `<` `<=`         | int, float               |\n| `in` `not in`             | int, float, string       |\n| `contains` `not contains` | array (document field)   |\n\n### Update / Delete\n\n```php\n// Atomic update: soft delete + re-insert in a single lock\n$newDocId = $engine->update($docId, ['title' => 'Updated title', 'price' => 149.90]);\n\n// Soft delete (cleaned up on compaction)\n$engine->delete($docId);\n```\n\n### Maintenance\n\n```php\n$count = $engine->count();               // Number of live documents\n$rate  = $engine->fragmentationRate();   // Fragmentation percentage (0 = clean, 100 = all deleted)\n\nif ($engine->fragmentationRate() > 20) {\n    $engine->compact();                  // Rebuild index files, remove deleted documents\n}\n\n$engine->reset();                        // Wipe all index files and start fresh\n```\n\n---\n\n## Index files\n\n```\nsearch_data/\n  documents.bin    — serialized documents (JSON, binary format)\n  trigrams.bin     — fixed-size trigram index ~810 KB (37^3 entries, O(1) access)\n  postings.bin     — doc_id lists per trigram\n  tombstones.bin   — deleted doc_ids (cleared on compaction)\n```\n\nFiles are fully portable — copy them between servers without rebuilding.\n\n---\n\n## Scoring\n\nRelevance is computed using **BM25 + IDF**:\n\n- **BM25** — term frequency saturation (a word appearing 10x doesn't score 10x higher) and document length normalization. Parameters: k1 = 1.5, b = 0.75 (standard Lucene defaults).\n- **IDF** — a trigram present in every document contributes little; a rare trigram contributes a lot.\n- The final score is normalized between 0 and 100.\n\n---\n\n## Benchmark\n\nBenchmarks were run on two environments:\n\n- **Windows 11** — local machine, NVMe SSD, PHP 8.3\n- **Linux (OVH shared hosting)** — standar
