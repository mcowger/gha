<script id="project-data" type="application/json">[{"owner":"microsoft","repo":"AI-Engineering-Coach","url":"https://github.com/microsoft/AI-Engineering-Coach","readme":"<h1 align=\"center\">AI Engineer Coach</h1>\n\n<p align=\"center\">\n<strong>better agentic engineering.</strong><br>\nAnalyze your AI coding assistant usage — any harness, one dashboard.\n</p>\n\n<p align=\"center\">\n<a href=\"LICENSE\"><img alt=\"License: MIT\" src=\"https://img.shields.io/badge/license-MIT-blue.svg\"></a>\n<img alt=\"VS Code 1.115+\" src=\"https://img.shields.io/badge/VS%20Code-1.115%2B-007ACC\">\n</p>\n\n<br>\n\n<p align=\"center\">\n  \nhttps://github.com/user-attachments/assets/9f0239bf-20e0-459f-b137-17cce0edd1b2\n\n</p>\n\n---\n\n## What it does\n\nAI Engineer Coach reads your local AI session logs and turns them into actionable insights — no data leaves your machine.\n\n- **Track progress** -- practice scores, weekly trends, daily activity charts\n- **Detect anti-patterns** -- 45 rules across prompt quality, session hygiene, code review, tool mastery, and context management\n- **Measure output** -- AI-generated code volume by language, workspace, model, and harness\n- **Discover skills** -- find repeated prompts and turn them into reusable skills\n- **Score context health** — agentic readiness checks, instruction-file audits, workspace context maps\n\n<details>\n<summary><strong>Screenshots</strong></summary>\n<br>\n<p align=\"center\"><img src=\"assets/screen-timeline.png\" alt=\"Timeline\" width=\"820\"></p>\n<p align=\"center\"><img src=\"assets/screen-output.png\" alt=\"Code Output\" width=\"820\"></p>\n<p align=\"center\"><img src=\"assets/screen-consumption.png\" alt=\"Premium Request Consumption\" width=\"820\"></p>\n<p align=\"center\"><img src=\"assets/screen-patterns-projects.png\" alt=\"Activity Patterns - Projects\" width=\"820\"></p>\n<p align=\"center\"><img src=\"assets/screen-patterns-workhours.png\" alt=\"Activity Patterns - Work Hours\" width=\"820\"></p>\n<p align=\"center\"><img src=\"assets/screen-antipatterns.png\" alt=\"Anti-Patterns\" width=\"820\"></p>\n<p align=\"center\"><img src=\"assets/screen-skill-finder.png\" alt=\"Skill Finder\" width=\"820\"></p>\n<p align=\"center\"><img src=\"assets/screen-context-quality.png\" alt=\"Context Quality\" width=\"820\"></p>\n<p align=\"center\"><img src=\"assets/screen-context-management.png\" alt=\"Context Management\" width=\"820\"></p>\n<p align=\"center\"><img src=\"assets/screen-learning.png\" alt=\"Learning Center\" width=\"820\"></p>\n<p align=\"center\"><img src=\"assets/screen-achievements.png\" alt=\"Achievements\" width=\"820\"></p>\n<p align=\"center\"><img src=\"assets/screen-sdlc.png\" alt=\"Agentic SDLC\" width=\"820\"></p>\n<p align=\"center\"><img src=\"assets/screen-share.png\" alt=\"Share Your Stats\" width=\"820\"></p>\n</details>\n\n---\n\n## Installation\n\nChoose one of these paths.\n\n### Path 1 -- Prebuilt VSIX (easiest)\n\nPrerequisites:\n\n- VS Code\n- Access to the repository Releases page\n\nSteps:\n\n1. Download the latest `ai-engineer-coach-*.vsix` from Releases.\n2. Install it in VS Code:\n\n**macOS / Linux**\n\n```bash\ncode --install-extension ai-engineer-coach-*.vsix\n```\n\n**Windows / PowerShell**\n\n```powershell\ncode --install-extension (Get-ChildItem . -Filter 'ai-engineer-coach-*.vsix' | Select-Object -First 1).FullName\n```\n\n### Path 2 -- Dev Container build (no local Node.js/npm)\n\nPrerequisites:\n\n- VS Code\n- Dev Containers extension\n- Docker or Podman\n\nSteps:\n\n1. Clone the repo and open it in VS Code.\n2. Reopen in container.\n3. Run:\n\n```bash\nnpm ci\nnpm run package\n```\n\n4. Install the generated `.vsix` using one of the commands above.\n\n### Path 3 -- Local build\n\nPrerequisites:\n\n- VS Code\n- Node.js and npm\n\nSteps:\n\n```bash\ngit clone https://github.com/microsoft/ai-engineering-coach.git\ncd ai-engineering-coach\nnpm ci\nnpm run package\n```\n\nThen install the generated `.vsix` using one of the commands above.\n\n### Release permissions and contribution path\n\nIf you do not have permission to publish a Release artifact, open a PR with your changes and ask a maintainer to publish the `.vsix` in Releases.\n\nAfter install:\n\n1. Open the command palette (`Cmd+Shift+P` / `Ctrl+Shift+P`)\n2. Run **AI Engineer Coach: Open Dashboard**\n3. Navigate pages from the sidebar, filter by workspace or harness\n\n---\n\n## Pages\n\n### Observe\n\n| Page               | Description                                                                           |\n| ------------------ | ------------------------------------------------------------------------------------- |\n| **Dashboard**      | Practice scores with week-over-week trends, daily activity chart, top workspace stats |\n| **Timeline**       | Gantt-style session timeline with per-day drill-down and overlap detection            |\n| **Coding Moments** | Screenshot gallery from AI coding sessions with story reels and workspace filtering   |\n\n### Measure\n\n| Page         | Description                                                                                 |\n| ------------ | ------------------------------------------------------------------------------------------- |\n| **Output**   | Generated code volume by language, model usage table _(token breakdown temporarily hidden)_ |\n| **Burndown** | Monthly AI token budget progress with projections _(temporarily disabled)_                  |\n| **Patterns** | 7×24 activity heatmap and work-life balance signals                                         |\n\n### Improve\n\n| Page                | Description                                                                                                                                |\n| ------------------- | ------------------------------------------------------------------------------------------------------------------------------------------ |\n| **Anti-Patterns**   | Five practice score cards with severity ratings, concrete actions, and example prompts. 45 editable markdown rules plus a coverage heatmap |\n| **Rule Editor**     | Create, edit, and tune detection rules visually or as raw markdown. Live-test against your data                                            |\n| **Rule Playground** | Interactive REPL for the rule DSL with field browser, function catalog, and metric list                                                    |\n| **Data Explorer**   | Browse session fields, view distributions, run ad-hoc filters                                                                              |\n| **Skill Finder**    | Discover repeated prompt patterns and matching community skills from the open-source catalog                                               |\n| **Context Health**  | Overall context score, agentic readiness checklist, workspace context map, AI-powered instruction-file review                              |\n\n### Level Up\n\n| Page                | Description                                                                      |\n| ------------------- | -------------------------------------------------------------------------------- |\n| **Learning Center** | Personalized quizzes and code-comparison rounds generated from your actual usage |\n| **Achievements**    | XP-based progression with Bronze → Silver → Gold → Diamond tiers                 |\n| **Agentic SDLC**    | How you use AI across the full software-development lifecycle                    |\n| **Share**           | Generate a shareable stat card and export Markdown/JSON summaries               |\n\n---\n\n## Privacy\n\n- **Read-only** — the extension never modifies your session files\n- **Local analysis** — all parsing and analytics run entirely on your machine\n- **No proprietary telemetry** — the extension does not phone home or collect usage data\n- **Optional AI features** — some features (rule compiler, skill finder, context review) use the VS Code built-in Copilot language model API when explicitly invoked by the user\n\n---\n\n## Code of Conduct\n\nThis project has adopted the [Microsoft Open Source Code of Conduct](https://opensource.microsoft.com/codeofconduct/).\nFor more information see the [Code of Conduct FAQ](https://opensource.microsoft.com/codeofconduct/faq/) or\ncontact [opencode@microsoft.com](mailto:opencode@microsoft.com) with any additional questions or comments.\n\n## Trademarks\n\nThis project may contain trademarks or logos for projects, products, or services. Authorized use of Microsoft\ntrademarks or logos is subject to and must follow\n[Microsoft's Trademark & Brand Guidelines](https://www.microsoft.com/en-us/legal/intellectualproperty/trademarks/usage/general).\nUse of Microsoft trademarks or logos in modified versions of this project must not cause confusion or imply Microsoft sponsorship.\nAny use of third-party trademarks or logos are subject to those third-party's policies.\n\n## License\n\n[MIT](LICENSE)\n\n## Disclaimer\n\nThis project is an open-source community effort by Microsoft employees. It is **not** an official Microsoft product and is not part of any Microsoft service or support offering. It is provided as-is with no warranties or guarantees.\n","summary":"Microsoft’s AI-Engineering-Coach helps you improve “agentic” software development by analyzing your local AI coding assistant session logs and turning them into a single dashboard—no data is sent off your machine. It tracks practice and activity over time, measures output by language/workspace/model/harness, and flags anti-patterns using a set of rules covering prompt quality, session hygiene, code review, tool usage, and context management. It also surfaces repeated prompt patterns as reusable skills and evaluates context health to support a more reliable, agent-ready workflow. This is especially useful for developers and teams using AI coding assistants regularly who want to quantify progress and pinpoint concrete improvements.","description":"better agentic engineering","stars":1754,"language":"TypeScript"},{"owner":"gonemedia","repo":"aipointer","url":"https://github.com/gonemedia/aipointer","readme":"<div align=\"center\">\n\n<img width=\"84\" height=\"84\" alt=\"AIPointer icon\" src=\"https://github.com/user-attachments/assets/9037b6e6-f525-40fa-a386-67512a4f05ad\" />\n\n<h1>AIPointer ⦿</h1>\n\n<p><strong>The AI cursor companion. Hold a key, ask a question, get an answer about whatever your cursor is pointing at.</strong></p>\n\n<p>\n  <a href=\"https://github.com/gonemedia/aipointer/releases/latest/\"><strong>macOS Apple Silicon</strong></a> ·\n  <a href=\"https://github.com/gonemedia/aipointer/releases/latest/\"><strong>macOS Intel</strong></a> ·\n  <a href=\"https://github.com/gonemedia/aipointer/releases/latest/\"><strong>Windows</strong></a> ·\n  <a href=\"https://github.com/gonemedia/aipointer/releases/latest/\"><strong>Linux</strong></a>\n<br><br>\n  🖱️ \n</p>\n\n<img width=\"800\" height=\"450\" alt=\"AIPointer screenshot\" src=\"https://github.com/user-attachments/assets/3d174dda-b961-4ce8-8474-e05e07e27009\" />\n\n</div>\n\n\n\n\n\n\n\n\n\n<br>\n<div align=\"center\">\n\n<sub>If AIPointer ⦿ is useful to you,<br>\n<a href=\"https://github.com/gonemedia/aipointer\">a star 🌟 on GitHub</a> helps the project stay alive.</sub>\n\n</div>\n</div>\n\n---\n\n## What it is\n\nAIPointer is an open-source desktop overlay. You hold a key (default: Right-Cmd on macOS, Right-Ctrl on Windows/Linux), a glassmorphism box pops up next to your cursor, you ask a question, and a vision-capable LLM answers about whatever's around the cursor. A screenshot of the cursor region, your prompt, and (optionally) your clipboard get sent to the provider you configured. You keep your own API key, you pay for your own tokens, nothing is logged anywhere.\n\nBSL-1.1 source-available, no framework lock-in, no cloud account. For longer autonomous tasks, AIPointer points you at [Skales](https://skales.app), the same author's larger AI agent.\n\n## Common use cases\n\nAIPointer is useful when you want to ask an AI about something on your screen without copying, pasting, or switching apps:\n\n- **Quick translation** of text you're reading in any app or website\n- **Explain code** in your editor without leaving it\n- **Identify** an object, product, landmark, or chart from a screenshot\n- **Summarize** a long article or document you have open\n- **Ask about your files (v1.1.5)** — select up to 5 files in Finder / Explorer, press the AIPointer hotkey, and they're attached to your next query automatically. Zero clicks. Hit Enter without typing and AIPointer auto-summarizes them.\n- **Get a reply suggestion** for a message visible on screen\n- **Define a word** without leaving your current app\n- **Solve a math or logic problem** by pointing at it\n- **Voice queries** when typing isn't convenient\n\nIt works as an alternative to switching to ChatGPT, Claude, or Gemini in a browser tab — you stay where you are, the answer comes to you.\n\n---\n## Demo\n\n<br>\n<a href=\"https://youtu.be/NRIlG32hvLg\">\n  <img src=\"https://img.youtube.com/vi/NRIlG32hvLg/maxresdefault.jpg\" alt=\"AIPointer demo\" width=\"720\">\n</a>\n\n<br>\n\n## Why use it\n\n- **Cursor-anchored.** It answers about what you're already looking at, not what you have to describe in text.\n- **Fast.** Vision-capable Gemini 3 Flash by default. Sub-2-second answers for most questions.\n- **Multi-provider.** Bring your own OpenRouter key (recommended) or a direct Anthropic, OpenAI, or Google Gemini key. Fallback chain handles outages automatically.\n- **Agentic when it helps.** Seven built-in tools: fetch a URL, open a URL, copy text, save the answer as a styled document, reveal your workspace, read clipboard, and (new in v1.1.0) launch a desktop app from a curated whitelist. All action tools sit behind a green-check / red-x approval.\n- **Child Mode (v1.1.0).** Kid-friendly response layer. PIN-locked switch, per-language safe-browsing whitelist (EN+DE), stricter HTML rendering, restricted tool set, voice-first by default with slower TTS. Visually identical to Adult mode — pure behavior layer.\n- **Onboarding wizard (v1.1.0).** Separate framed window on first launch. Five steps: welcome, mode pick, PIN setup, autostart preferences, provider + API key.\n- **Voice commands (v1.1.1).** Say \"open settings\" or \"einstellungen öffnen\" — works in EN, DE, FR, ES, IT, PT, NL. Pre-LLM phrase matcher with Levenshtein tolerance for transcription wobble. New voice tools: **\"play <song>\"** / **\"spiele Bach\"** (YouTube / YouTube Kids in Child Mode), **\"search for X\"** / **\"such nach X\"** (DuckDuckGo / Kiddle), **\"louder / quieter / mute / volume 30\"** / **\"lauter / leiser / stumm\"** for system volume. Say **\"stop\"** / **\"halt\"** / **\"sei ruhig\"** to interrupt the voice loop.\n- **Live model picker (v1.1.5).** Each provider row now has a `↻ Refresh models` button. Click it to hit the provider's list-models endpoint with your saved key — the dropdown populates with every model your account can use, so you can pin a specific model without waiting for an app update. Leave on Auto to keep the cheapest-viable behaviour.\n- **Primary + Fallback chain (v1.1.5).** Pick a primary provider explicitly, then arrange up to 3 fallback providers underneath it. Each row can pin its own model. The router walks the chain on transient failures (5xx / 429). Reachable via `/fallback`.\n- **Finder / Explorer auto-attach + multi-file upload (v1.1.5) — the v1.1.5 USP.** Two workflows for attaching up to **5 files** to your next AIPointer query: (1) select the files in macOS Finder or Windows Explorer and just press the hotkey — AIPointer reads the active file-manager selection at trigger time and queues the highlighted files automatically (zero clicks, no drag-and-drop); (2) click the paperclip icon right of the mic (or type `/attach`) and pick the files manually. A **dark-orange \"N files attached\" pill** floats above the BottomPill (hover to expand, × to clear). The next AIPointer trigger attaches them — images via vision, text / JSON / CSV / Markdown / code inlined into the prompt, binary docs (PDF / DOCX / XLSX) referenced by name. While files are queued the cursor screenshot is auto-suppressed so the model focuses on the files. Hit Enter with no prompt typed → AIPointer auto-routes through `/summary` against the files. macOS uses an AppleScript that guards on Finder being frontmost; Windows reads the foreground Explorer window via `Shell.Application`; Linux has no universal selection mechanism so the paperclip is the only path there.\n- **Readable selection hint (v1.1.5).** The \"Drag to capture a region\" pill is now solid near-black with bright white text and an accent dot border — legible against every backdrop. (Previously rendered in accent text on a translucent dark pill that looked black-on-grey on certain wallpapers.)\n- **Chat-only mode (v1.1.2).** Settings → Behaviour. Toggle on to open AIPointer as a pure chat window — no screenshot auto-attached. A small camera button inside the prompt lets you attach one per query when you want visual context. Good for follow-up questions, quick lookups, and people who already know what they want to ask.\n- **Cursor accent picker (v1.1.2).** Settings → Appearance → Cursor accent. Three brand presets — lime (default), macOS system blue, or cyberpunk magenta. The comet trail + halo and every accent-tinted UI surface re-tint live without a restart.\n- **Floating chip bubbles (v1.1.2).** Screenshot and Clipboard chips now render as toast-style rounded-full pills floating *above* the BottomPill — same frosted micro-grain + premium shadow as the pill, high-opacity tint with white text so they stay readable over any backdrop (light AIPointer on a dark website, dark AIPointer on a bright editor — all fine).\n- **TTS pause / resume (v1.1.2).** The Read button under each response is now a real play / pause toggle: click to play, click to pause at the exact position, click again to resume. Stop-words (\"stop\" / \"halt\" / \"sei ruhig\"), ESC, and a new query still fully end playback.\n- **Activation section in Settings (v1.1.2).** Keyboard hotkey + mouse-wiggle on/off toggle, both live-applied. The wiggle has been there since v1.1.0 but had no UI control — now it does.\n- **Screenshot + Clipboard chips (v1.1.1).** macOS-blue \"Screenshot attached\" chip (default on, dismiss with ×) and a paperclip toggle for opt-in clipboard. Explicit per-query control replaces the v1.0 always-on clipboard polling.\n- **Theme picker (v1.1.1).** Settings → Appearance: System (follows your OS), Light, or Dark. Pick AIPointer's appearance independently of macOS / Windows — keep your system on light and run AIPointer dark (or vice versa). The picked theme survives macOS appearance changes (fixed in v1.1.2).\n- **Premium pill surface (v1.1.1).** The BottomPill / PromptInput render as a macOS-Control-Center-style tile with a fractalNoise micro-grain and a five-layer shadow for perceived depth. Same warm-grey light surface (`#f5f5f5`) and Claude-sidebar dark surface (`#262626`) macOS users expect.\n- **Mouse-wiggle activation (v1.1.0).** Wiggle the cursor left-right-left within ~700ms to summon AIPointer. Toggle off in Settings.\n- **Voice in and voice out.** Microphone input with auto-stop on silence. Text-to-speech read-aloud for the answer. Optional voice-first conversation mode: trigger opens listening, transcript auto-submits, answer is read back, mic re-opens for follow-up. Hands-free loop.\n- **Region screenshots.** While the box is open, hold the trigger key again and drag a rectangle to capture exactly the region you want. Replaces the default cursor-centered crop for that query.\n- **API key tester.** A Test button per provider checks the key against the live endpoint. For OpenRouter the result includes your remaining credit balance.\n- **Templates that work.** `/summary`, `/brief`, `/translate`, `/explain`, `/code`, `/improve`, `/define`, `/solve`, `/reply`, `/identify`. Plain prose works too. AIPointer detects intent across languages.\n- **Save the answer.** A4-styled HTML, PDF, or Markdown. Print-ready.\n- **Auto-updater.** Quiet check on launch and once per day. Downloads the next version when ready, prompts you on restart. Disable in settings if you prefer manual updates.\n- **Local-first.** No telemetry, no analytics, no crash reporting. Your config lives on your machine, your sessions stay on disk if you opt in.\n- **Light and dark theme.** Adapts to your system in real time.\n\n## Install\n\nDownload a signed build for your OS at [aipointer.app](https://aipointer.app), or build from source:\n\n```bash\ngit clone https://github.com/gonemedia/aipointer\ncd aipointer\nnpm install\nnpm run dev\n```\n\nOn first launch you'll be prompted to grant **Accessibility** (for the global key listener) and **Screen Recording** (for the cursor-region screenshot). Both are required on macOS. The Settings panel opens automatically the first time so you can paste an API key. Get one at:\n\n- [openrouter.ai/keys](https://openrouter.ai/keys) recommended, single key, automatic routing across providers.\n- [console.anthropic.com/settings/keys](https://console.anthropic.com/settings/keys)\n- [platform.openai.com/api-keys](https://platform.openai.com/api-keys)\n- [aistudio.google.com/apikey](https://aistudio.google.com/apikey)\n\n## Permissions AIPointer needs\n\nAIPointer asks for the minimum required to do its job. Nothing else is touched.\n\n**macOS**\n- **Accessibility** *(required)* — lets AIPointer detect the global trigger hotkey from inside any app. Without this, the hotkey is dead. Grant in System Settings → Privacy & Security → Accessibility.\n- **Screen Recording** *(required)* — capture the small region around your cursor for vision context. Triggers only on hotkey hold, never in the background.\n- **Microphone** *(optional)* — needed only for voice input or the voice-first conversation loop. Recordings stream to the AI provider you configured and are never stored locally.\n- **Automation → Finder & System Events** *(optional, v1.1.5)* — needed only for the Finder auto-attach workflow (select files → press hotkey → files attach). On first use macOS asks *\"AIPointer wants to control Finder\"* → pick **OK**. If you click Deny or dismiss it, the trigger shows an amber banner explaining how to re-enable in System Settings → Privacy & Security → Automation → AIPointer → Finder. Without it, the paperclip button still works for manual attachment.\n\n**Windows**\n- No special permissions at install. Microphone prompted on first use when needed.\n- Explorer auto-attach (v1.1.5) walks `Shell.Application` via PowerShell. Some Defender configurations block this — it degrades gracefully to the paperclip button.\n\n**Linux**\n- `libsecret` (gnome-keyring) or KWallet for OS-encrypted API key storage. Without one, keys store base64-encoded with a warning banner.\n- File-manager auto-attach is not supported (no universal selection mechanism across DEs). Paperclip button works.\n\n**All platforms — network access**\nYour prompts, screenshots, queued files, and voice recordings (if used) go directly to the LLM provider you configured. The auto-updater fetches `aipointer.app/updates/latest.json`. Nothing else leaves your machine. No telemetry, no analytics.\n\n### Voice (TTS + STT) — 3 engines, System by default (v1.1.5)\n\nAIPointer ships a 3-state Voice engine picker in **Settings → Voice**. Fresh installs land on **System** so read-aloud and voice input work for 100% of users without any setup. Local and Cloud are explicit opt-ins.\n\n| Engine | TTS | STT | Setup | Cost | Quality |\n|---|---|---|---|---|---|\n| **System** (default) | OS Web Speech API | OS Web Speech Recognition | None — works out of the box | Free | OS-native |\n| **Local** (opt-in) | Kokoro 82M (ONNX) | Whisper base (GGML) | One-time ~233 MB download, offline forever after | Free | High |\n| **Cloud** (opt-in) | OpenAI/Gemini/OpenRouter cascade | Same cascade | User API key | Per-token | Max |\n\n**System** = default for fresh installs. Users carrying over the prototype `ttsMode='auto'` setting are mapped to **Cloud** so their working setup is preserved; `ttsMode='system'` users stay on **System**.\n\n**Local engine in v1.1.5:** download manager + storage + **real Kokoro TTS inference live now**. Settings → Voice → Local discloses the ~231 MB download size BEFORE pulling and shows live progress; atomic writes prevent partial-file activation. Models pull from Hugging Face Hub: [Kokoro-82M ONNX](https://huggingface.co/onnx-community/Kokoro-82M-ONNX) (Apache-2.0) and [whisper.cpp GGML](https://huggingface.co/ggerganov/whisper.cpp) (MIT). TTS inference runs via [`kokoro-js`](https://www.npmjs.com/package/kokoro-js) — first call ~500 ms cold-start, then ~1.5–15 s per response depending on CPU and text length (real on-device neural inference; longer than a cloud call but fully private + free). 28 voices ship bundled with kokoro-js, default `af_heart`. **STT** still uses the Cloud cascade in v1.1.5 — [`@kutalia/whisper-node-addon`](https://www.npmjs.com/package/@kutalia/whisper-node-addon) integration lands in v1.2.0 for fully-offline transcription. Until then voice input on Local engine surfaces a clear notice and falls back to System Web Speech Recognition.\n\n**Safety net.** Every engine fails into System with a yellow inline strip under the Read button showing the actual reason. No silent dead button. The pillbox UI is unchanged — engine routing is a behavior layer.\n\n> An HuggingFace Inference TTS integration was prototyped earlier in this version cycle and removed before ship — too unreliable in practice. The Local engine takes the cleaner path: download once, run on the user's machine.\n\n## How to use\n\n<img width=\"1342\" height=\"1080\" alt=\"133541\" src=\"https://github.com/user-attachments/assets/10acaa2b-99b4-4fa0-a45b-82e9465b2261\" />\n\n\n1. Hold **Right-Cmd** (macOS) or **Right-Ctrl** (Windows / Linux) for 200 ms over the content you want help with. Or click the small status pill at the bottom of your screen.\n2. The box opens beside your cursor. Type a question, press Enter.\n3. Use **/** to see the commands. Plain language works too. AIPointer auto-detects the intent (summarise, translate, explain, code, etc.) across languages.\n4. Hover the answer for **Read** (text-to-speech), **Save** (HTML/PDF/MD), **Copy**.\n5. Press **ESC** to dismiss. Open **/settings** any time to adjust providers, hotkey, voice, profile, workspace.\n\n## Commands\n\n- `/web <question>` force a web-grounded answer for this one query.\n- `/summary <topic>` long structured doc, ready to save as A4 PDF.\n- `/brief <topic>` TL;DR + 3-5 bullets.\n- `/translate [language] <text>` translate visible, selected, or pasted text.\n- `/explain <thing>` plain-English explainer.\n- `/code <task or error>` code-focused answer with a snippet.\n- `/improve <text>` rewrite for clarity and rhythm.\n- `/define <word>` dictionary entry with pronunciation and example.\n- `/solve <problem>` math or logic answer with steps.\n- `/reply [guidance]` three reply variants for a visible message.\n- `/identify [hint]` what is this object, product, or landmark.\n- `/history` list past sessions (workspace).\n- `/lastsession` restore the most recent saved session (useful when you closed the box by accident).\n- `/settings` open settings.\n- `/help` show this list.\n- `/clear` dismiss the response.\n- `/quit` quit AIPointer.\n\n## Build for distribution\n\n```bash\nnpm run dist:mac        # macOS .dmg (arm64 + x64)\nnpm run dist:win        # Windows .exe (NSIS x64)\nnpm run dist:linux      # Linux .AppImage (x64)\nnpm run dist            # all three on supported hosts\n```\n\nFor signed and notarised macOS builds, set your Apple credentials in the environment before running:\n\n```bash\nexport APPLE_ID=\"you@example.com\"\nexport APPLE_TEAM_ID=\"ABCDE12345\"\nexport APPLE_APP_SPECIFIC_PASSWORD=\"xxxx-xxxx-xxxx-xxxx\"\nexport CSC_IDENTITY=\"Your Name (ABCDE12345)\"\nnpm run dist:mac\n```\n\nWithout Apple credentials, electron-builder produces unsigned builds suitable for local testing.\n\n## Tech stack\n\nElectron 30 · React 18 · TypeScript 5 · Tailwind 3 · Framer Motion · Vite 5 · `uiohook-napi` (global key + mouse hook) · Electron's `nativeImage` (cursor-region screenshots, no native image library) · `electron-store` + Electron `safeStorage` (config + secret storage) · `react-markdown` with `rehype-sanitize` · native `fetch` (no SDK dependency on any LLM provider).\n\n## What it isn't\n\n- Not a long-running autonomous agent. For multi-step automation, computer-use, persistent goals, and complex workflows, use **[Skales](https://skales.app)**. Same author, same design philosophy, much bigger scope. AIPointer will recommend it when you ask for something out of its lane.\n- Not a chat app. There is no permanent thread. Sessions live until you press ESC.\n- Not a model picker. You pick a provider, AIPointer picks the model.\n- Not telemetry-equipped. Nothing leaves your machine except the queries you submit, to the provider you chose.\n\n## FAQ\n\n**Is AIPointer free?** Yes. Source is on GitHub under BSL-1.1. You bring your own API key and pay the LLM provider directly.\n\n**Does it work offline?** No. The vision-capable LLMs run server-side. AIPointer itself runs locally, but the answers come from your chosen provider.\n\n**Which providers are supported?** OpenRouter, Anthropic (Claude), OpenAI, Google Gemini. OpenRouter is recommended — one key, automatic routing. From v1.1.5 you can also pick a primary provider explicitly and arrange up to 3 fallback providers underneath it (each pinning its own model).\n\n**Can I pick a specific model? (v1.1.5)** Yes — each provider row in Settings → Providers has a `↻ Refresh models` button that pulls the live model list from the provider with your saved key. Pick one to pin it, or leave on Auto for AIPointer's cheapest-viable default.\n\n**Can I attach files? (v1.1.5)** Yes — click the paperclip icon next to the mic (or type `/attach`) to queue up to 5 files. They auto-attach on the next trigger. You can also select files in Finder/Explorer first and just press the hotkey; AIPointer auto-attaches the selection (zero clicks).\n\n**Does it collect my data?** No telemetry, no analytics. Your prompts and screenshots go directly to the LLM provider you configured.\n\n**Does it work on macOS / Windows / Linux?** Yes, all three.\n\n**How does it compare to other AI overlay tools?** AIPointer is single-shot Q&A with vision and bounded tools. For longer autonomous tasks and multi-step automation, use [Skales](https://skales.app).\n\n## Privacy\n\n- Screenshots (a 1024 × 768 region around your cursor) and any clipboard text you don't dismiss go only to the LLM provider you configured. Nowhere else.\n- API keys are stored in your OS keychain (macOS Keychain, Windows DPAPI, Linux libsecret) via Electron `safeStorage`. The local config file is plain JSON with encrypted key fields.\n- No telemetry, no analytics, no crash reporting.\n- The auto-updater fetches `aipointer.app/updates/latest.json` on launch and once per day. The request contains no user identifier, only a standard HTTPS request to a static file. Disable in settings if you want manual updates instead.\n- Full disclaimer in Settings → About and at [aipointer.app/privacy](https://aipointer.app/privacy).\n\n## Documentation\n\n- [CHANGELOG.md](CHANGELOG.md) release history.\n\n## Credits\n\nBuilt by **[Mario Simic](https://github.com/talentsache)** in Vienna, May 2026. Same author behind **[Skales](https://skales.app)**, an open-source local AI agent.\n\n## License\n\n**Business Source License 1.1.** See [LICENSE](LICENSE), [NOTICE.md](NOTICE.md), and [COMMERCIAL-LICENSE.md](COMMERCIAL-LICENSE.md).\n\nFree for personal, educational, and internal business use. Source remains public on GitHub — fork it, audit it, build on it. Commercial redistribution, SaaS hosting, white-labeling, bundling, and resale require a written commercial license from the Licensor (dev@mariosimic.at). Reverts automatically to Apache 2.0 on 2030-05-19. The DNA marks in [docs/AUTHORSHIP.md](docs/AUTHORSHIP.md) help identify cases where license compliance has been violated.\n\n---\n\n<div align=\"center\">\n\n**aipointer.app** · **[github.com/gonemedia/aipointer](https://github.com/gonemedia/aipointer)** · **[aipointer.app](https://aipointer.app)**\n\nNo telemetry. No cloud. BSL-1.1.\n\n</div>\n","summary":"AIPointer is an open-source desktop “AI cursor companion” that lets you hold a hotkey, see a small overlay next to your cursor, and ask a vision-capable LLM about what’s on-screen where your cursor is pointing—without copying, pasting, or switching apps. It captures the relevant cursor region (and optionally your clipboard) and sends it to the model provider you configure using your own API key, with no logging or cloud account required. Key capabilities include fast cursor-anchored Q&A, support for multiple providers with fallback, optional file attachments (up to a small batch), and safe, approval-gated “agentic” tools for actions like opening/copying/saving. It’s a good fit for people who want quick explanations and assistance in-place—such as translating or summarizing content, understanding code, identifying items from screenshots, or drafting responses from what they can already see.","description":"AI cursor assistant for macOS, Windows, Linux. Hold a hotkey, ask a question about what's on your screen, get an instant answer. Vision-capable AI overlay with OpenRouter, Anthropic, OpenAI, Gemini. Local-first, BYO key, no telemetry.","stars":294,"language":"TypeScript"},{"owner":"Helvesec","repo":"rmux","url":"https://github.com/Helvesec/rmux","readme":"<div align=\"center\">\n\n<a href=\"https://rmux.io\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://rmux.io/rmux-header-dark.svg\">\n    <img src=\"https://rmux.io/rmux-header.svg\" alt=\"RMUX\" width=\"500\">\n  </picture>\n</a>\n\n\n**Universal Rust multiplexer for the agentic era: detachable, scriptable, and inspectable, with a tmux-compatible CLI, daemon-backed SDK, and native [Ratatui](https://ratatui.rs) integration.**\n\nEnglish · [Français](README.fr.md) · [简体中文](README.zh-CN.md) · [日本語](README.ja.md)\n\n[![License: MIT OR Apache-2.0](https://img.shields.io/badge/license-MIT%20OR%20Apache--2.0-blue.svg)](LICENSE-MIT)\n[![Release validation](https://github.com/Helvesec/rmux/actions/workflows/ci.yml/badge.svg)](https://github.com/Helvesec/rmux/actions/workflows/ci.yml)\n[![rmux 0.3.1](https://img.shields.io/badge/rmux-0.3.1-informational.svg)](#install)\n[![Platform: Linux | macOS | Windows](https://img.shields.io/badge/platform-Linux%20%7C%20macOS%20%7C%20Windows-lightgrey.svg)](#platform-support)\n[![Unsafe policy](https://img.shields.io/badge/unsafe-restricted-success.svg)](#verification)\n\n<br />\n<a href=\"https://rmux.io\">\n  <img src=\"https://rmux.io/rmux-terminal-demo.gif\" width=\"500\" alt=\"RMUX terminal session demo\" />\n</a>\n\n</div>\n\n> [!IMPORTANT]\n> Current release: **v0.3.1**, published on **25 May 2026**. All 90 tmux-compatible commands are implemented, but bugs are expected — this is a fresh public preview. Please [file issues](https://github.com/helvesec/rmux/issues) if you hit one.\n\n## Why RMUX\n\nRMUX exists because I believe the tmux use case has only been partially explored. My own starting point was simple: I wanted to run long-lived agents over SSH without losing their terminals, while still being able to inspect, script, and orchestrate everything around them.\n\nSo I rebuilt that idea from scratch in Rust: a blazing-fast, tmux-compatible multiplexer with a typed SDK, persistent sessions, structured snapshots, and native local transports on Linux, macOS, and Windows, including Windows Named Pipes.\n\nRMUX is usable by agents, headless CLI workflows, and humans alike: you can give terminal apps detachable execution, reconnect later, inspect their state, drive them from code, or simply use it for normal tmux-style terminal work.\n\n## Demos\n\nShort, real examples of what RMUX can be used for.\n\n<table>\n  <tr>\n    <td align=\"center\" width=\"20%\"><a href=\"https://rmux.io/#demo-orchestration\"><img src=\"https://rmux.io/demos/demo-orchestration.png\" width=\"150\" alt=\"Multi Agents Orchestration demo preview\"></a><br><sub><a href=\"https://github.com/Helvesec/rmux-demos/tree/main/demo-orchestration\"><strong>Multi Agents Orchestration</strong></a></sub><br><sub>≃ 514 lines</sub></td>\n    <td align=\"center\" width=\"20%\"><a href=\"https://rmux.io/#demo-broadcast\"><img src=\"https://rmux.io/demos/demo-broadcast.png\" width=\"150\" alt=\"Agent Broadcast Arena demo preview\"></a><br><sub><a href=\"https://github.com/Helvesec/rmux-demos/tree/main/broadcast-demo\"><strong>Agent Broadcast Arena</strong></a></sub><br><sub>≃ 2,171 lines</sub></td>\n    <td align=\"center\" width=\"20%\"><a href=\"https://rmux.io/#demo-zellij\"><img src=\"https://rmux.io/demos/demo-zellij.png\" width=\"150\" alt=\"Mini-Zellij demo preview\"></a><br><sub><a href=\"https://github.com/Helvesec/rmux-demos/tree/main/mini-zellij\"><strong>Mini-Zellij</strong></a></sub><br><sub>≃ 944 lines</sub></td>\n    <td align=\"center\" width=\"20%\"><a href=\"https://rmux.io/#demo-mirroring\"><img src=\"https://rmux.io/demos/demo-mirroring.png\" width=\"150\" alt=\"Terminal browser mirroring demo preview\"></a><br><sub><a href=\"https://rmux.io/#demo-mirroring\"><strong>Terminal &lt;&gt; Browser Mirroring</strong></a></sub><br><sub>≃ 649 lines</sub></td>\n    <td align=\"center\" width=\"20%\"><a href=\"https://rmux.io/#demo-playwright\"><img src=\"https://rmux.io/demos/demo-playwright.png\" width=\"150\" alt=\"Playwright Testing demo preview\"></a><br><sub><a href=\"https://github.com/Helvesec/rmux-demos/tree/main/terminal-playwright-demo\"><strong>Playwright Testing</strong></a></sub><br><sub>≃ 1,495 lines</sub></td>\n  </tr>\n</table>\n\n## Install\n\nPrebuilt binary for macOS and Linux:\n\n```sh\ncurl -fsSL https://rmux.io/install.sh | sh\n```\n\nPrebuilt binary for Windows PowerShell:\n\n```powershell\nirm https://rmux.io/install.ps1 | iex\n```\n\nDirect downloads and SHA256 checksums are available from the [v0.3.1 GitHub Release](https://github.com/helvesec/rmux/releases/tag/v0.3.1).\n\nFrom crates.io with Cargo:\n\n```sh\ncargo install rmux --locked\n```\n\nFrom a local checkout:\n\n```sh\ncargo install --path . --locked\n```\n\nFor Rust applications:\n\n```sh\ncargo add rmux-sdk\ncargo add ratatui-rmux\n```\n\n## Documentation\n\nThe full RMUX documentation is available at [rmux.io/docs](https://rmux.io/docs/).\n\nIt includes [installation guides](https://rmux.io/docs/get-started/), [CLI references](https://rmux.io/docs/cli/), [SDK examples](https://rmux.io/docs/examples/), [terminal automation examples](https://rmux.io/docs/examples/#/terminal-playwright), and [API documentation](https://rmux.io/docs/api/).\n\nFor an ergonomic, human-oriented profile that keeps native terminal selection intuitive while adding easier split bindings and clipboard integration, see [docs/human-friendly-config.md](docs/human-friendly-config.md).\n\n## CLI Quickstart\n\n```sh\nrmux new-session -d -s work\nrmux split-window -h -t work\nrmux send-keys -t work 'echo \"hello from rmux\"' Enter\nrmux attach-session -t work\n```\n\nUse command help locally:\n\n```sh\nrmux list-commands\nrmux new-session --help\nrmux split-window --help\n```\n\nUse `rmux -V` for the RMUX package version. For build and support details,\nuse `rmux diagnose --human` or `rmux diagnose --json`.\n\n## SDK Quickstart\n\n```toml\n[dependencies]\nrmux-sdk = \"0.3\"\ntokio = { version = \"1\", features = [\"rt-multi-thread\", \"macros\"] }\n```\n\n```rust\nuse std::time::Duration;\n\nuse rmux_sdk::{\n    EnsureSession, EnsureSessionPolicy, Rmux, SessionName, TerminalSizeSpec,\n};\n\n#[tokio::main]\nasync fn main() -> rmux_sdk::Result<()> {\n    let rmux = Rmux::builder()\n        .default_timeout(Duration::from_secs(5))\n        .connect_or_start()\n        .await?;\n\n    let session_name = SessionName::new(\"work\").expect(\"valid session name\");\n    let session = rmux\n        .ensure_session(\n            EnsureSession::named(session_name)\n                .policy(EnsureSessionPolicy::CreateOrReuse)\n                .detached(true)\n                .size(TerminalSizeSpec::new(120, 32)),\n        )\n        .await?;\n\n    let pane = session.pane(0, 0);\n    pane.send_text(\"printf 'ready\\\\n' && sleep 1\\n\").await?;\n\n    pane.wait_for_text(\"ready\").await?;\n    let snapshot = pane.snapshot().await?;\n    println!(\"{}x{}\", snapshot.cols, snapshot.rows);\n\n    Ok(())\n}\n```\n\n## Ratatui Widget\n\n```rust\nuse ratatui::{buffer::Buffer, layout::Rect, widgets::Widget};\nuse ratatui_rmux::{PaneState, PaneWidget};\nuse rmux_sdk::PaneSnapshot;\n\nfn render(snapshot: PaneSnapshot, area: Rect, buffer: &mut Buffer) {\n    let state = PaneState::from_snapshot(snapshot);\n    PaneWidget::new(&state).render(area, buffer);\n}\n```\n\n## Architecture\n\n<div align=\"center\">\n\n<picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://rmux.io/rmux-architecture-dark.png\">\n  <source media=\"(prefers-color-scheme: light)\" srcset=\"https://rmux.io/rmux-architecture-light.png\">\n  <img src=\"https://rmux.io/rmux-architecture-dark.png\" alt=\"RMUX runtime architecture\" width=\"800\">\n</picture>\n\n</div>\n\nThree public surfaces — a `rmux` CLI, a `rmux-sdk` Rust crate, and a `ratatui-rmux` widget — share a single local protocol to talk to the daemon. Anything one surface can do, the others can do too.\n\n## Workspace\n\n| Crate | Role | Publication |\n| :--- | :--- | :--- |\n| `rmux-types` | Shared platform-neutral value types | public |\n| `rmux-proto` | Detached IPC DTOs, framing, wire-safe errors | public |\n| `rmux-os` | Small OS boundary helpers | public |\n| `rmux-ipc` | Local IPC endpoints and transports | public |\n| `rmux-sdk` | Daemon-backed Rust SDK | public |\n| `ratatui-rmux` | Ratatui integration widget | public |\n| `rmux-pty` | PTY allocation, resize, child process control | support crate |\n| `rmux-core` | Sessions, panes, layouts, formats, hooks, buffers | support crate |\n| `rmux-server` | Tokio daemon and request dispatch | support crate |\n| `rmux-client` | Local IPC client and attach plumbing | support crate |\n| `rmux` | CLI and hidden daemon entrypoint | public binary |\n| `rmux-render-core` | Shared snapshot rendering core | workspace-internal |\n\n## Platform Support\n\n| Platform | PTY backend | IPC backend | Default endpoint |\n| :--- | :--- | :--- | :--- |\n| Linux | Unix PTY | Unix socket | `/tmp/rmux-{uid}/default` |\n| macOS | Unix PTY | Unix socket | `/tmp/rmux-{uid}/default` |\n| Windows | ConPTY | Named pipe | per-user named pipe |\n\n## Configuration\n\nOn Linux and macOS, RMUX reads `.rmux.conf` from the standard system and user locations:\n\n1. `/etc/rmux.conf`\n2. `~/.rmux.conf`\n3. `$XDG_CONFIG_HOME/rmux/rmux.conf`\n4. `~/.config/rmux/rmux.conf`\n\nOn Windows, RMUX reads `.rmux.conf` as well, from the following locations:\n\n1. `%XDG_CONFIG_HOME%\\rmux\\rmux.conf`\n2. `%USERPROFILE%\\.rmux.conf`\n3. `%APPDATA%\\rmux\\rmux.conf`\n4. `%RMUX_CONFIG_FILE%`\n\n### `tmux.conf` migration fallback\n\nWhen RMUX starts with the default config search and no RMUX config file is\nloaded, it can import a filtered `tmux.conf` as a migration fallback. Explicit\nconfig loading with `-f` does not use this fallback.\n\nFallback paths:\n\n- Linux and macOS: `/etc/tmux.conf`, `~/.tmux.conf`, `$XDG_CONFIG_HOME/tmux/tmux.conf`, `~/.config/tmux/tmux.conf`\n- Windows: `%XDG_CONFIG_HOME%\\tmux\\tmux.conf`, `%USERPROFILE%\\.tmux.conf`, `%APPDATA%\\tmux\\tmux.conf`\n\nThe import is intentionally narrow: RMUX keeps supported static options and\nkey unbindings, but skips tmux key bindings, environment or terminal capability\nmutations, plugin user options and hooks, shell commands, command blocks,\nconditionals, format jobs such as `#(cmd)`, recursive `source-file` entries,\nand unsupported options instead of executing them. Set\n`RMUX_DISABLE_TMUX_FALLBACK=1` to disable it entirely. Fallback files are read\nbest-effort: non-regular files and files larger than 1 MiB are ignored.\n\n### Terminal compatibility notes\n\nRMUX works with shells that query terminal capabilities, including fish. It\nanswers terminal device-attribute probes and handles Escape-key timing so fish\nprompts and key sequences behave normally inside RMUX panes.\n\nGraphics passthrough is available for outer terminals that support Kitty\ngraphics or SIXEL. RMUX detects Kitty graphics for Kitty, Ghostty, and WezTerm,\nand detects SIXEL for terminals such as foot, mintty, mlterm, and WezTerm. It\nis opt-in:\n\n```tmux\nset -g allow-passthrough on\n# or, for tmux-compatible \"all\" passthrough:\nset -g allow-passthrough all\n```\n\nIf your terminal supports either protocol but is not detected automatically,\nadd a terminal feature override:\n\n```tmux\nset -as terminal-features 'xterm-kitty:kitty-graphics'\nset -as terminal-features 'xterm*:sixel'\n```\n\nSIXEL passthrough is covered by the automated Unix PTY attach regression suite.\nOn Windows, RMUX enables modern ConPTY passthrough when the OS supports it, but\nSIXEL display still depends on the outer terminal. Set\n`RMUX_CONPTY_NO_PASSTHROUGH=1` to disable that backend mode for troubleshooting.\n\n## Verification\n\nThe workspace is designed to be checked from source with locked dependencies:\n\n```sh\ncargo fmt --all -- --check\ncargo clippy --workspace --all-targets --locked -- -D warnings\ncargo test --workspace --locked --no-fail-fast\n```\n\nAdditional local checks:\n\n```sh\nscripts/cfg-check.sh\nscripts/unsafe-check.sh\nscripts/no-network-in-runtime.sh\nscripts/check-platform-neutrality.sh\nscripts/ratatui-rmux-budget.sh\nscripts/verify-package.sh\n```\n\nRelease artifact checks are driven by:\n\n```sh\nscripts/release-local.sh\nscripts/package-unix.sh\n```\n\n`#![forbid(unsafe_code)]` is used in the upper-level crates. OS and terminal boundary code is isolated in the lower-level runtime crates.\n\n## License\n\nRMUX is dual-licensed under either:\n\n- [MIT License](LICENSE-MIT)\n- [Apache License 2.0](LICENSE-APACHE)\n\nat your option.\n","summary":"Helvesec/rmux is a Rust-based, tmux-compatible terminal multiplexer designed for long-lived “agentic” workloads that need to be detachable, scriptable, and inspectable. It provides a daemon-backed SDK and native Ratatui integration, enabling persistent sessions, structured state/snapshots, and local transport support across Linux, macOS, and Windows (including Windows Named Pipes). With a tmux-like CLI (all tmux-compatible commands are implemented in the current preview), it’s suitable for developers, automation/headless workflows, and users who want to run and orchestrate terminal apps or agents over SSH without losing their interactive context.","description":"Universal Rust multiplexer with a typed SDK — drive any CLI or TUI app from code. Native on Linux, macOS, and Windows.","stars":1337,"language":"Rust"},{"owner":"jmerelnyc","repo":"Photo-agents","url":"https://github.com/jmerelnyc/Photo-agents","readme":"# Photo Agents\n\n<img width=\"2688\" height=\"1520\" alt=\"hf_20260504_103619_aaebb60a-ba3e-4763-a5b2-7771293ce9d6\" src=\"https://github.com/user-attachments/assets/b190236d-d0cc-448f-a6eb-4c7bf4c6f7b7\" />\n\nAutonomous self-evolving **Photo Agents**. A perceive / reason / act framework for photo-aware agents that operate your computer the way you do.\n\n> \"100% autonomous, self-evolving agents.\"\n> [photo-agents.com](https://photo-agents.com)\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=jmerelnyc%2FPhoto-agents&type=date&legend=top-left\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=jmerelnyc/Photo-agents&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=jmerelnyc/Photo-agents&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=jmerelnyc/Photo-agents&type=date&legend=top-left\" />\n </picture>\n</a>\n\n## About\n\nPhoto Agents is building the next generation of LLM-driven agents that ground in what they actually see on screen. Instead of dumping longer chat transcripts into a model and hoping for the best we treat memory the way biology does. Vision in. Bound observations stored in layers. Skills written by the agent itself from real success.\n\nThe package in this repo is the runtime that ships that idea. It runs locally so you keep ownership of your screen your data and your keys.\n\n- Website: https://photo-agents.com\n- X / Twitter: https://x.com/photoagents\n\nFollow [@photo_agents](https://x.com/photo_agents) on X for build notes demos and the occasional rant about why text-only agents will never see your UI.\n\n## What it is\n\nPhoto Agents is a single Python package that bundles:\n\n- A streaming **agent loop** (`photoagents.core.loop.run_agent_session`) that drives any tool-calling LLM through a perceive → reason → act cycle.\n- A **multi-provider LLM router** (`photoagents.llm.router`) with first-class support for Anthropic Claude (native) OpenAI GPT (native) and a mixin failover session.\n- A **physical-execution toolset**: file I/O, sandboxed code execution (Python / PowerShell / bash), browser automation via a Chrome DevTools Protocol bridge and a layered memory system (working / global / SOP / session archive).\n- Pluggable **clients**: a polished Streamlit web app, a PyQt desktop app, a desktop companion and ready-to-run bots for Telegram, QQ, Feishu, WeCom and DingTalk.\n- Optional **observability** via Langfuse and a cron-style scheduler.\n\nThe whole thing is gated by a remote-validated **Photo Agents API key** so usage stays accountable.\n\n## Install\n\n```bash\npip install photoagents\n# or, with every optional client and integration\npip install \"photoagents[all]\"\n```\n\nPhoto Agents needs Python 3.10+.\n\n## Get an API key\n\nPhoto Agents requires a license key, validated against `https://photo-agents.com/v1/keys/validate`. Sign in and create one at:\n\n> **https://photo-agents.com/dashboard/keys**\n\nThen make it available to the runtime in any of these ways (checked in order):\n\n1. Environment variable: `PHOTOAGENTS_API_KEY=pk_live_...`\n2. Saved config: `~/.photoagents/config.json` field `api_key`\n3. Interactive prompt on first run (offered to be saved automatically)\n\nA successful validation is cached for 24 hours so the gate stays fast.\n\n## LLM credentials\n\nCopy the credentials template and fill in your provider key:\n\n```bash\n# from the repo root\ncp photoagents/config/keys_template.py credentials.py\n# then edit credentials.py and uncomment one of the provider configs\n```\n\nThe runtime also accepts a JSON form (`credentials.json`) with the same shape.\n\n## Run\n\n```bash\n# Interactive REPL on your terminal\npython -m photoagents\n\n# One-shot file-IO mode\npython -m photoagents --task my_task --input \"List the largest files in this directory.\"\n\n# Reflect / watchdog mode (your check() function fires the next task)\npython -m photoagents --reflect photoagents/evolution/scheduler.py\n```\n\n## GUI clients\n\nPhoto Agents ships several optional frontends. Pick whichever fits your workflow:\n\n| Client                         | Launch command                                      |\n| ------------------------------ | --------------------------------------------------- |\n| Streamlit web app + webview    | `pythonw -m photoagents.cli.launcher`               |\n| Service hub (start/stop)       | `pythonw -m photoagents.cli.hub`                    |\n| Desktop app (PyQt)             | `python -m photoagents.clients.desktop_app`         |\n| Desktop companion              | `pythonw -m photoagents.clients.companion_v2`      |\n| Telegram bot                   | `python -m photoagents.clients.telegram_client`     |\n| Feishu / WeCom / DingTalk / QQ | `python -m photoagents.clients.<feishu|wecom|...>_client` |\n\nThe launcher and hub both call the same API key gate before starting any service, so they will refuse to launch anything if your key is missing or revoked.\n\n## On-disk state\n\n| Path                              | What lives there                                  |\n| --------------------------------- | -------------------------------------------------- |\n| `~/.photoagents/config.json`      | API key + license validation cache                 |\n| `~/.photoagents/global_mem.txt`   | Long-term L2 facts                                 |\n| `~/.photoagents/sessions/`        | L4 raw session archives                            |\n| `~/.photoagents/skill_index/`     | Vector index for skill / SOP search                |\n| `~/.photoagents/temp/`            | Per-task scratch (logs, intermediate output)       |\n\n## Project layout\n\n```\nphotoagents/\n├── auth/        License gate (remote-validated API key)\n├── cli/         python -m photoagents, GUI launcher, service hub\n├── clients/     Web / desktop / chat-platform frontends\n├── config/      credentials.py template\n├── core/        Agent loop and tool dispatcher\n├── evolution/   Reflection / scheduler scripts (the \"self-evolving\" loop)\n├── integrations/Optional third-party hooks (Langfuse, etc.)\n├── llm/         Multi-provider session router\n├── resources/   System prompt, tool schema, CDP bridge, demo media\n├── skills/      L3 SOPs and helper modules (browser, vision, OCR, ...)\n└── web/         DOM simplifier and Chrome DevTools Protocol driver\n```\n\n## License\n\nMIT. See [LICENSE](LICENSE).\n\n## Status\n\nStatus: beta. APIs may change before 1.0.\n\n\n\n","summary":"Photo-agents (jmerelnyc/Photo-agents) is a local Python runtime for building autonomous “photo-aware” LLM agents that perceive what’s on your computer, reason about it, and then act through tools. It provides an agent loop, a multi-provider LLM router (Claude and OpenAI with failover options), and practical execution capabilities like file I/O, sandboxed code execution, browser automation, and a layered memory system designed to store observations and learned skills over time. The project also includes ready-to-use client interfaces (Streamlit, PyQt, and messaging-platform bots such as Telegram/Feishu/WeCom) plus optional observability and scheduling. This is best for developers and teams who want to create desktop- and UI-grounded agents while keeping data, keys, and screen ownership local.","description":"Autonomous self-evolving agents. Vision-grounded layered memory and self-written skills for LLM agents that operate your computer.","stars":968,"language":"Python"},{"owner":"gi-dellav","repo":"zerostack","url":"https://github.com/gi-dellav/zerostack","readme":"![banner](https://github.com/gi-dellav/zerostack/blob/main/assets/banner.png?raw=true)\n\n---\n\n# zerostack\nMinimal coding agent written in Rust, inspired by [pi](https://pi.dev/docs/latest/usage) and [opencode](https://opencode.ai/).\n\n## Features\n\n- **Multi-provider**: OpenRouter, OpenAI, Anthropic, Gemini, Ollama, plus custom providers\n- **Standard tools**: all of the standard tools exposed to coding agents, as described by the opencode documentation.\n- **Permission system**: five configurable modes with per-tool patterns, session allowlists, and configurable mode-to-rule application policies\n- **Session management**: save/load/resume sessions, auto-compaction to stay within context windows\n- **Terminal UI**: crossterm-based, markdown rendering, mouse selection/copy, scrollback, reasoning visibility toggle\n- **Prompts system**: switch between system prompt modes at runtime (`code`, `plan`, `review`, `debug`, etc.) to tailor the agent's behavior to the task without having to manage Skills.\n- **MCP support**: connect MCP servers for extended tooling (exposed as an optional compile-time feature)\n- **Integrated Exa search**: allows for WebFetch and WebSearch tools\n- **Integrated Ralph Wiggum loops**: looping capabilities for long-horizon tasks\n- **Integrated Git Worktrees integration**: Use `/worktree` to move the agent from one worktree to another.\n- **ACP support** (gated): Agent Communication Protocol server — lets editors (Zed, etc.) connect to zerostack as an ACP agent\n\n**NOTE**: Windows support is not tested is any way, but feel free to try and open an issue if you encounter any bugs!\n\n## Performance\n\n_zerostack_ is one of the smallest and most performant coding agents on the market.\n\n- Lines of code: ~13k LoC\n- Binary size: 12.9MB\n- RAM footprint: ~16MB on average, with peaks at ~24MB (vs ~300MB with peaks at ~700MB for opencode or other JS-based coding agents)\n- CPU usage: 0.0% on idle, ~1.5% when using tools (measured on an Intel i5 7th gen, vs ~2% on idle and ~20% when working for opencode)\n\n## Installation\n\nIn order to install _zerostack_, you must have Cargo and git installed. Then, run:\n\n```bash\n# Default — MCP, loop, and git-worktree included\ncargo install zerostack\n\n# With ACP (Agent Communication Protocol) support for editor integration\ncargo install zerostack --features acp\n```\n\nYou are now ready to work with a lightweight coding agent! (You can also find pre-built binaries on Github Releases)\n\nOnce installed, run `/prompt autoconfig` inside zerostack to explore the documentation and configure the tool interactively.\n\n*note:* If you have questions or you want to collaborate on the project, please join the [dedicated Matrix chatroom](https://app.element.io/#/room/#zerostack-general:matrix.org).\n\n### Optional: sandbox mode\n\nInstall [bubblewrap](https://github.com/containers/bubblewrap) for `--sandbox`,\nwhich runs every bash command inside an isolated environment to protect your\nsystem from accidental or malicious damage:\n\n```bash\n# Debian/Ubuntu\napt install bubblewrap\n\n# Fedora\ndnf install bubblewrap\n\n# Arch\npacman -S bubblewrap\n```\n\nThere is also support for zerobox as an alternative sandbox backend.\n\n## Quick start\n\n```bash\n# Set your API key (OpenRouter is default)\nexport OPENROUTER_API_KEY=\"[api_key]\"\n\n# Interactive session (default prompt: code)\nzerostack\n\n# Monochrome TUI\nzerostack --no-color\n\n# One-shot mode\nzerostack -p \"Explain this project\"\n\n# Continue last session\nzerostack -c\n\n# Explicit provider/model\nzerostack --provider openrouter --model deepseek/deepseek-v4-flash\n```\n\n## Configuration\n\nSee [docs/CONFIG.md](docs/CONFIG.md) for config file location, accepted keys, provider\naliases, permission rules, and MCP server configuration.\n\nYou can run `/prompt autoconfig` in order to use a specialized agent that allows to navigate the documentation and customize your zerostack setup.\n\n## Prompts system\n\n_zerostack_ includes a set of built-in system prompts that change the agent's behavior and tone.\nThe idea is to build a complete suite of prompts that can fully substitute skills like [superpower](https://github.com/obra/superpowers) or the [Claude's official skills](https://github.com/anthropics/claude-plugins-official/tree/main).\nYou can switch between different prompts or list all registered prompts using `/prompt`.\n\nBuilt-in prompts:\n\n| Prompt                | Description                                                              |\n| --------------------- | ------------------------------------------------------------------------ |\n| **`code`** (default)  | Coding mode with full file and bash tool access, TDD workflow            |\n| **`plan`**            | Planning-only mode — explores and produces a plan without writing code   |\n| **`review`**          | Code review mode — reviews for correctness, design, testing, and impact  |\n| **`debug`**           | Debug mode — finds root cause before proposing fixes                     |\n| **`ask`**             | Read-only mode — only read/grep/glob permitted, no writes or bash        |\n| **`brainstorm`**      | Design-only mode — explores ideas and presents designs without code      |\n| **`frontend-design`** | Frontend design mode — distinctive, production-grade UI                  |\n| **`review-security`** | Security review mode — finds exploitable vulnerabilities                 |\n| **`simplify`**        | Code simplification mode — refines for clarity without changing behavior |\n| **`write-prompt`**    | Prompt writing mode — creates and optimizes agent prompts                |\n\nYou can also create custom prompts by placing markdown files in\n`$XDG_CONFIG_HOME/zerostack/prompts/` and referencing them by name.\n\nAdditionally, the agent automatically loads `AGENTS.md` or `CLAUDE.md` from the\nproject root or any ancestor directory, injecting their contents into the\nsystem prompt. Use `-n` / `--no-context-files` to disable this.\n\n## Permission system\n\nzerostack has five permission modes:\n\n| Mode | CLI flag | Behavior |\n|------|----------|----------|\n| **restrictive** | `-R` / `--restrictive` | Ask for every operation. Config rules are ignored by default (can be enabled via `permission-modes`). |\n| **readonly** | `--read-only` | Allow read/grep/find_files/list_dir. Deny writes, edits, bash, and everything else. Config rules ignored by default. |\n| **guarded** | `--guarded` | Allow read tools. Ask for writes, edits, bash, and everything else. Config rules apply. |\n| **standard** | (default) | Allow path tools (read/write/edit/list_dir) within CWD and subdirectories. Safe bash commands (ls, cat, git log, cargo check) auto-allowed. Ask for external paths and unrecognized commands. Config rules apply and override mode defaults. |\n| **yolo** | `--yolo` | Allow everything, but prompt for destructive bash commands (rm, dd, mkfs, etc.). Config rules apply. |\n\nThe `--dangerously-skip-permissions` flag completely bypasses all permission\nchecks, allowing every tool operation without any guard. This is not a mode\nand cannot be toggled at runtime.\n\nPermissions can be configured per-tool with granular glob patterns in the\nconfig file. For example, you can allow `write **.rs` automatically while\nalways asking before writing to other files.\n\nA **session allowlist** persists approved decisions for the duration of the\nsession, so you don't have to repeatedly confirm the same operation.\n\n**Doom-loop detection**: identical tool calls repeated 3+ times trigger a\nwarning prompt (or denial depending on your config), preventing runaway agents\nfrom spamming destructive operations.\n\n## Slash commands\n\nThis is a list of the most important slash commands:\n\n- `/model` — Switch model\n- `/thinking` — Set thinking level\n- `/clear` — Clear conversation\n- `/session` — List/save/load sessions\n- `/loop` — Schedule recurring prompts\n- `/prompt` — List or change the agent's prompt\n- `/mode` — Set the permission system's mode\n\nTo see all of the commands, use `/help`.\n\n## Session management\n\nSessions are saved to `$XDG_DATA_HOME/zerostack/sessions/`. Use `-c` to\nresume the most recent session, `-r` to browse and select one, or\n`--session <id>` to load a specific session.\n\n## Parallel Agent\n\nIf you want to make multiple agents work on the same repository without having to work with git worktrees,\nzerostack now ships with `--parallel`, which enables full management of a temporary git worktree that will\nbe merged and removed before exiting the agent. \n\n## Loop system\n\n_zerostack_ includes an iterative coding loop for long-horizon tasks. The agent repeatedly reads the task, picks an item from the plan, works on it, runs tests, updates the plan, and loops until the task is complete or the iteration limit is reached.\n\n**NOTE** The loop system is an _experimental_ feature.\n\n### Loop usage\n\n```\n/loop Implement the user authentication system\n/loop stop\n/loop status\n```\n\n- `/loop <prompt>` — Start a loop with the given prompt\n- `/loop stop` — Stop the active loop\n- `/loop status` — Show current loop state\n\nEach iteration includes the original task, the evolving `LOOP_PLAN.md`, a summary of the previous iteration, and any validation output. Non-slash input is blocked while a loop is active.\n\n### Headless loops via CLI\n\n```\nzerostack --loop --loop-prompt \"Refactor the API\" --loop-max 10 --loop-run \"cargo test\"\n```\n\n| Flag                   | Description                                     |\n| ---------------------- | ----------------------------------------------- |\n| `--loop`               | Enable headless loop mode                       |\n| `--loop-prompt <text>` | Prompt for each iteration                       |\n| `--loop-plan <path>`   | Custom plan file path (default: `LOOP_PLAN.md`) |\n| `--loop-max <N>`       | Maximum iterations (default: unlimited)         |\n| `--loop-run <cmd>`     | Validation command to run after each iteration  |\n\n## Git worktrees integration\n\n_zerostack_ provides a branch-per-task workflow using git worktrees. You can create, work in, merge, and exit worktrees entirely from the chat UI.\n\n**NOTE** The git worktrees integration is an _experimental_ feature.\n\n### Git worktree usage\n\nThe worktrees integrations offers 3 slash commands:\n\n| Command              | Description                                                                                                       |\n| -------------------- | ----------------------------------------------------------------------------------------------------------------- |\n| `/worktree <name>`   | Create a git worktree on branch `<name>` and move into it (skips creating it if it already exists)                |\n| `/wt-merge [branch]` | Merge the worktree branch into `[branch]` (default: `main`/`master`), push, clean up, and return to the main repo |\n| `/wt-exit`           | Return to the main repo without merging                                                                           |\n\n### Example workflow for git worktrees\n\n1. **Create** — `/worktree feature-x` creates a new branch and worktree directory and moves you there.\n2. **Work** — Use zerostack normally; changes stay on the feature branch.\n3. **Merge** — `/wt-merge` tells the agent to merge the branch, push, clean up, and return to the main repo.\n4. **Exit** — `/wt-exit` immediately returns to the main repo without merging.\n\n## ACP (Agent Communication Protocol) support\n\n**ACP** is a JSON-RPC based protocol that standardizes communication between code editors\n(IDEs, text-editors, etc.) and coding agents. With the `acp` feature enabled, zerostack\nacts as an ACP **Agent** server, allowing editors like **Zed** to connect to it as a\ncoding agent backend.\n\n**NOTE:** ACP support is gated behind the `acp` feature and is not included in the\ndefault build.\n\n### ACP usage\n\n```bash\n# Start zerostack in ACP stdio mode (editor spawns this as a subprocess)\nzerostack --acp\n\n# Start zerostack in ACP TCP mode (listen on 0.0.0.0:7243)\nzerostack --acp --acp-host 0.0.0.0 --acp-port 7243\n```\n\n### ACP config\n\nIn `~/.local/share/zerostack/config.json`:\n\n```json\n{\n  \"acp_servers\": {\n    \"my-editor\": {\n      \"host\": \"127.0.0.1\",\n      \"port\": 7243\n    }\n  }\n}\n```\n\nACP mode requires setting up an LLM provider (the standard `--provider`, `--model`,\nand API key env vars apply). Without it, zerostack cannot process prompts.\n\n## Supported providers\n\n- OpenRouter (default)\n- OpenAI-compatible (vLLM, LiteLLM, etc.)\n- Anthropic\n- Gemini\n- Ollama\n\nCustom providers can be configured with any base URL and API key environment\nvariable in  `~/.local/share/zerostack/config.json`.\n\n## License\n\nGPL-3.0-only\n","summary":"zerostack is a lightweight coding agent written in Rust, inspired by tools like pi and opencode, designed to help you generate, plan, review, and debug code with minimal overhead. It supports multiple LLM providers (including OpenRouter, OpenAI, Anthropic, Gemini, and Ollama, plus custom providers), standard coding-agent tools, and an advanced permissions system with configurable tool patterns and session allowlists. It also includes session save/load and auto-compaction for long-running work, a crossterm-based terminal UI with helpful UX features, and optional integrations like MCP-based tooling, Exa search (WebFetch/WebSearch), ACP server support for editor connectivity, plus git worktree support for switching project contexts. This project is best suited for developers who want a fast, resource-efficient local terminal agent with strong control over what tools it can use, and who may want to plug it into their editor or extend it via MCP.","description":"Minimalistic coding agent written in Rust, optimized for memory footprint and performance","stars":1028,"language":"Rust"},{"owner":"crynta","repo":"terax-ai","url":"https://github.com/crynta/terax-ai","readme":"<div align=\"center\">\n  <img src=\"public/logo.png\" width=\"144\" height=\"144\" alt=\"Terax\" />\n  <h1>Terax</h1>\n\n  <p><strong>Lightweight Terminal-first AI-native dev workspace.</strong></p>\n\n  <p>\n    <img src=\"https://img.shields.io/github/v/release/crynta/terax-ai?label=version&color=blue\" alt=\"version\" />\n    <img src=\"https://img.shields.io/badge/license-Apache--2.0-green\" alt=\"license\" />\n    <img src=\"https://img.shields.io/badge/platform-macOS%20%7C%20Linux%20%7C%20Windows-lightgrey\" alt=\"platform\" />\n  </p>\n\n  <p>\n    <a href=\"https://terax.app\">Website</a>\n    ·\n    <a href=\"https://terax.app/docs\">Docs</a>\n    ·\n    <a href=\"https://github.com/crynta/Terax-website\">Website's source code</a>\n  </p>\n</div>\n\n---\n\nTerax is a lightweight open-source terminal (ADE) built on Tauri 2 + Rust and React 19. A native PTY backend with a WebGL renderer, an agentic AI side-panel that runs against your own keys or fully local models, plus a code editor, file explorer, source control with a git graph, and a web preview pane built in. About 7-8 MB on disk. No telemetry. No account.\n\n## Screenshots\n\n<table>\n  <tr>\n    <td align=\"center\"><img src=\"docs/terminal.png\" alt=\"Terminal\" /><br/><sub>Multi-tab terminal with WebGL rendering</sub></td>\n    <td align=\"center\"><img src=\"docs/themes.png\" alt=\"Themes and background image\" /><br/><sub>Custom themes, presets, and background images</sub></td>\n  </tr>\n  <tr>\n    <td align=\"center\"><img src=\"docs/web-preview.png\" alt=\"Web preview\" /><br/><sub>Web preview of local dev servers</sub></td>\n    <td align=\"center\"><img src=\"docs/source-control.png\" alt=\"Source control and git graph\" /><br/><sub>Source control panel with git graph in history</sub></td>\n  </tr>\n  <tr>\n    <td colspan=\"2\" align=\"center\"><img src=\"docs/ai-workflow.png\" alt=\"AI window\" /><br/><sub>Agentic AI workflow with edit diffs in the code editor</sub></td>\n  </tr>\n</table>\n\n## Features\n\n### Terminal\n\n- xterm.js with WebGL renderer, multi-tab with background streaming\n- Native PTY backend via `portable-pty` (zsh, bash, pwsh, fish, cmd)\n- Split panels (horizontal and vertical)\n- Inline search, link detection, true-color\n- Per-tab workspace environments on Windows (Local, or any installed WSL distro)\n\n### Code editor\n\n- CodeMirror 6 (supports all popular languages - TS/JS, Rust, Python, Go, C/C++, Java, HTML/CSS, JSON, Markdown, etc.)\n- Inline AI autocomplete with local model support\n- AI edit diffs, accept or reject hunk by hunk\n- Vim mode\n- Ten built-in editor themes: Atom One, Aura, Copilot, GitHub Dark / Light, Gruvbox Dark, Nord, Tokyo Night, Xcode Dark / Light\n\n### Source control\n\n- Stage / unstage hunks, commit (Cmd+Enter / Ctrl+Enter), push with upstream awareness\n- Branch display including detached HEAD state\n- Git history pane with a real commit graph (lane rendering for merges and branches)\n- Commit search and filter, click through to the remote commit page\n\n### File explorer\n\n- Catppuccin icon theme\n- Fuzzy search, keyboard navigation, inline rename, context actions\n- Attach files and selections directly to the AI side-panel\n\n### Web preview\n\n- Auto-detects local dev servers and opens them in a preview tab\n- External URL preview via a native child webview\n\n### Themes and customization\n\n- Custom themes built in-app, switch between bundled presets and your own\n- Create your own themes, share them or import from the community\n- Background images with adjustable opacity and blur\n- Editor theme is independent from the app theme\n\n### AI\n\n- **BYOK providers:** OpenAI, Anthropic, Google (Gemini), Groq, xAI (Grok), Cerebras, OpenRouter, DeepSeek, Mistral, plus any OpenAI-compatible endpoint\n- **Local / offline:** LM Studio, MLX, Ollama\n- **Agentic workflow:** plans, sub-agents, project memory via `TERAX.md`, file read / write / edit / multi-edit / grep / glob, bash with approval gating, background processes\n- **Composer:** snippets via `#handle`, files via `@path`, slash commands, voice input, attach-to-agent from explorer or selection\n- **Custom agents** with their own system prompt and tool subset\n- **Plan mode** for multi-step work, generates and confirms before doing\n\n## Install\n\nLatest installers are on the [Releases](https://github.com/crynta/terax-ai/releases/latest) page. Terax auto-updates from there.\n\n### Windows notes\n\n- On first launch Windows shows \"Windows protected your PC\" because Terax isn't code-signed yet. Click **More info** then **Run anyway**.\n- Default shell detection: `pwsh.exe` (PowerShell 7+) -> `powershell.exe` (Windows PowerShell 5.1) -> `cmd.exe`.\n- WSL is a first-class workspace environment, not a wrapped subprocess.\n\n### Linux notes\n\n- **Arch / AUR:** `yay -S terax-bin` (or `paru`, etc.). Tracks the latest release.\n- **AppImage:** needs FUSE. Without it: `./Terax_*.AppImage --appimage-extract-and-run`. On Wayland with rendering glitches, try `WEBKIT_DISABLE_DMABUF_RENDERER=1`. Otherwise the `.deb` / `.rpm` packages link against the system GTK stack and tend to be smoother.\n\n## Configure AI\n\n1. Open **Settings -> AI**.\n2. Pick a provider and paste your API key. For local inference, point Terax at your LM Studio / MLX / Ollama endpoint.\n3. Keys are written to the OS keychain via `keyring`. They never touch disk or localStorage.\n\n## Build from source\n\n**Prerequisites**\n- Rust (stable), https://rustup.rs\n- Node 20+ and [pnpm](https://pnpm.io)\n- Tauri prerequisites for your platform, https://tauri.app/start/prerequisites/\n\n**Run**\n```bash\npnpm install\npnpm tauri dev          # development\npnpm tauri build        # production bundle\n```\n\n**Checks**\n```bash\npnpm exec tsc --noEmit                                            # frontend type-check\ncd src-tauri && cargo clippy --all-targets --locked -D warnings   # Rust lint (matches CI)\ncd src-tauri && cargo test --locked                               # Rust tests\n```\n\n## Tech stack\n\nTauri 2, Rust, `portable-pty`, React 19, TypeScript, Vite, xterm.js, CodeMirror 6, Vercel AI SDK v6, Tailwind v4, shadcn/ui, Zustand.\n\n## Contributing\n\nIssues and PRs are welcome! Feel free to open issues, suggest features, or submit pull requests. See [CONTRIBUTING.md](CONTRIBUTING.md) for more details.\n\n## License\n\nTerax is licensed under the Apache-2.0 License. For more information on our dependencies, see [Apache License 2.0](LICENSE).\n\n## Star history\n\n<div align=\"center\">\n  <a href=\"https://www.star-history.com/#crynta/terax-ai&Date\">\n    <picture>\n      <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=crynta/terax-ai&type=Date&theme=dark\" />\n      <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=crynta/terax-ai&type=Date\" />\n      <img alt=\"Star History Chart\" src=\"https://api.star-history.com/svg?repos=crynta/terax-ai&type=Date\" />\n    </picture>\n  </a>\n</div>\n","summary":"Terax (crynta/terax-ai) is a lightweight, terminal-first AI-native development workspace for macOS, Linux, and Windows, built with Tauri 2, Rust, and React. It combines a WebGL-rendered, multi-tab terminal with a native PTY backend, a built-in code editor, file explorer, and Git tooling including a commit graph and hunk-based staging. An agentic AI side panel lets you run AI workflows against your own API keys or fully local/offline models, supporting plan-and-execute editing with accept/reject diffs and project memory via TERAX.md. Developers who want an all-in-one, account-free environment with tight terminal/editor integration and flexible AI privacy options would benefit most from using it.","description":"Lightweight (7MB) Terminal-first AI-native dev workspace","stars":5635,"language":"TypeScript"},{"owner":"OpenSquilla","repo":"opensquilla","url":"https://github.com/OpenSquilla/opensquilla","readme":"# OpenSquilla — Token-Efficient AI Agent\n\n<p align=\"center\">\n  <img src=\"assets/opensquilla-long-logo.png\" alt=\"OpenSquilla logo\" width=\"500\">\n</p>\n\n<p align=\"center\">\n  <b>Same budget, more capability, better results.</b><br>\n  A microkernel AI agent for your CLI, Web UI, and chat channels.\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/opensquilla/opensquilla/actions/workflows/ci.yml\"><img src=\"https://img.shields.io/github/actions/workflow/status/opensquilla/opensquilla/ci.yml?style=for-the-badge\" alt=\"CI\"></a>\n  <a href=\"https://opensquilla.ai/\"><img src=\"https://img.shields.io/badge/website-opensquilla.ai-blue?style=for-the-badge\" alt=\"Website\"></a>\n  <a href=\"https://github.com/opensquilla/opensquilla/releases\"><img src=\"https://img.shields.io/github/v/release/opensquilla/opensquilla?include_prereleases&style=for-the-badge\" alt=\"GitHub release\"></a>\n  <a href=\"https://www.python.org/downloads/\"><img src=\"https://img.shields.io/badge/python-3.12%2B-blue?style=for-the-badge\" alt=\"Python 3.12+\"></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/badge/license-Apache%202.0-blue?style=for-the-badge\" alt=\"Apache 2.0 License\"></a>\n</p>\n\n---\n\n## Overview\n\nOpenSquilla is a token-efficient, microkernel AI agent. A local model\nrouter sends each turn to the cheapest model that can handle it, while\npersistent memory, a layered sandbox, built-in web search, and\non-device embeddings round out a single shared turn loop.\n\nEvery entry point — Web UI, CLI, and chat channels — runs through that\nsame loop, so tool dispatch, retries, and decision logging behave\nidentically everywhere. A pluggable provider layer speaks to\nOpenRouter, OpenAI, Anthropic, Ollama, DeepSeek, Gemini, Qwen/DashScope,\nand 20+ other LLM providers with no change to your code or config\nschema.\n\nOpenSquilla 0.2.1 is the current release.\n\n---\n\n## Installation\n\nOpenSquilla runs on Windows, macOS, and Linux. Pick the path that\nmatches your use case.\n\nWindows portable and Quick terminal install give you a prebuilt\n**release** — no Git required. The other two — Install from source\nand Develop from source — build **from a Git checkout** (`git clone` +\nGit LFS).\n\nRelease install commands use published GitHub release assets. The\nWindows portable zip also has a `/releases/latest/download/` alias for\nthe current release. Python wheel installs use versioned wheel filenames\nbecause installers validate the version embedded in the wheel filename.\n\n| Path | Audience | When to use |\n| --- | --- | --- |\n| [Windows portable](#windows-portable-no-python) | Windows users | No Python toolchain; one-zip launch |\n| [Quick terminal install](#quick-terminal-install) **(recommended)** | End use
