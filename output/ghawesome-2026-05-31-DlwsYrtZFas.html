     | Move the cursor to the start.        |\n| `MoveCursorEnd`        | `\"end\"`                                   | Move the cursor to the end.          |\n\n##### Focused pane actions\n\n`OpenFocusedPaneAction` opens the action menu for the pane that currently has\nfocus. Server, channel, message, and member pane actions can be configured in\nscoped tables. Focused-pane action menus keep their actions visible, and actions\nthat do not apply to the current selection are shown dimmed and disabled.\n\nServer pane actions:\n\n```toml\n[keymap.guild_actions]\nMarkAsRead = { keys = [\"m\"], description = \"mark server as read\" }\nMuteServer = { keys = [\"u\"], description = \"mute server\" }\nLeaveServer = { keys = [\"l\"], description = \"leave server\" }\n```\n\n| Scoped action | Default | Action                                                                     |\n| ------------- | ------- | -------------------------------------------------------------------------- |\n| `MarkAsRead`  | `m`     | Mark all unread viewable channels in the selected server read.             |\n| `MuteServer`  | `u`     | Mute or unmute the selected server. Also accepts `ToggleMute` as an alias. |\n| `LeaveServer` | `l`     | Open confirmation to leave the selected server.                            |\n\nChannel pane actions:\n\n```toml\n[keymap.channel_actions]\nJoinVoice = { keys = [\"j\"], description = \"join voice\" }\nLeaveVoice = { keys = [\"l\"], description = \"leave voice\" }\nShowPinnedMessages = { keys = [\"p\"], description = \"show pinned messages\" }\nShowThreads = { keys = [\"t\"], description = \"show threads\" }\nMarkAsRead = { keys = [\"m\"], description = \"mark as read\" }\nMuteChannel = { keys = [\"u\"], description = \"mute channel\" }\n```\n\n| Scoped action        | Default | Action                                                                                      |\n| -------------------- | ------- | ------------------------------------------------------------------------------------------- |\n| `JoinVoice`          | `j`     | Join the selected voice channel.                                                            |\n| `LeaveVoice`         | `l`     | Leave the current Concord voice channel.                                                    |\n| `ShowPinnedMessages` | `p`     | Open the selected channel's pinned messages. Also accepts `LoadPinnedMessages` as an alias. |\n| `ShowThreads`        | `t`     | List threads for the selected channel.                                                      |\n| `MarkAsRead`         | `m`     | Mark the selected channel read.                                                             |\n| `MuteChannel`        | `u`     | Mute or unmute the selected channel or category. Also accepts `ToggleMute` as an alias.     |\n\nMember pane actions:\n\n```toml\n[keymap.member_actions]\nShowProfile = { keys = [\"p\"], description = \"show profile\" }\n```\n\n| Scoped action | Default | Action                              |\n| ------------- | ------- | ----------------------------------- |\n| `ShowProfile` | `p`     | Open the selected member's profile. |\n\nMessage pane actions:\n\n```toml\n[keymap.message_actions]\nCopyMessage = \"y\"\nReactMessage = \"r\"\nReplyMessage = \"R\"\nDeleteMessage = \"d\"\nEditMessage = \"e\"\nOpenMessageUrl = \"o\"\nViewMessageAttachment = \"v\"\nGoToReferencedMessage = \"g\"\nShowMessageProfile = \"p\"\nPinMessage = \"P\"\nOpenThread = \"t\"\nShowReactionUsers = \"u\"\nOpenPollVotePicker = \"c\"\n```\n\n| Scoped action           | Default | Action                                          |\n| ----------------------- | ------- | ----------------------------------------------- |\n| `CopyMessage`           | `y`     | Copy selected message content.                  |\n| `ReactMessage`          | `r`     | Add or remove a reaction.                       |\n| `ReplyMessage`          | `R`     | Start a reply.                                  |\n| `DeleteMessage`         | `d`     | Open delete confirmation.                       |\n| `EditMessage`           | `e`     | Start editing the selected message.             |\n| `OpenMessageUrl`        | `o`     | Open the selected message URL.                  |\n| `ViewMessageAttachment` | `v`     | Open the selected message attachment viewer.    |\n| `GoToReferencedMessage` | `g`     | Go to the replied or forwarded message.         |\n| `ShowMessageProfile`    | `p`     | Open the selected message author's profile.     |\n| `PinMessage`            | `P`     | Open pin or unpin confirmation.                 |\n| `OpenThread`            | `t`     | Open the selected message's thread.             |\n| `ShowReactionUsers`     | `u`     | Show users who reacted to the selected message. |\n| `OpenPollVotePicker`    | `c`     | Choose poll votes for the selected message.     |\n\nDirect `[keymap]` message action bindings are separate. For example,\n`GoToReferencedMessage = \"gd\"` under `[keymap]` makes `gd` work directly from the\nMessages pane, while `[keymap.message_actions] GoToReferencedMessage = \"g\"`\ncontrols the action menu shortcut.\n\nScoped action `description` changes the label shown in server, channel, and\nmessage, and member action menus. Multiple configured `keys` work as aliases\nwhen they are unique in the current action menu, and the popup shows them\ntogether, such as `[x/u]`. If two actions in the same menu use the same\nconfigured key, that key is ignored for both actions. If\nan action has no unique configured key, it falls back to `1` through `9`, then\n`0`.\n\n<details>\n<summary>Default keymap config</summary>\n\n```toml\n[keymap]\nleader = \"space\"\nStartComposer = \"i\"\nOpenPaneFilter = \"/\"\nFocusGuildPane = \"1\"\nFocusChannelPane = \"2\"\nFocusMessagePane = \"3\"\nFocusMemberPane = \"4\"\nSelectNext = \"j\"\nSelectPrevious = \"k\"\nCycleFocusNext = { keys = [\"tab\", \"l\", \"right\"] }\nCycleFocusPrevious = { keys = [\"<S-tab>\", \"h\", \"left\"] }\nHalfPageDown = \"<C-d>\"\nHalfPageUp = \"<C-u>\"\nScrollMessageViewportDown = \"J\"\nScrollMessageViewportUp = \"K\"\nJumpTop = \"gg\"\nJumpBottom = \"G\"\nScrollHorizontalLeft = \"H\"\nScrollHorizontalRight = \"L\"\nResizePaneLeft = { keys = [\"<A-h>\", \"<A-left>\"] }\nResizePaneRight = { keys = [\"<A-l>\", \"<A-right>\"] }\nQuit = \"q\"\nCopyMessage = \"y\"\nReactMessage = \"r\"\nReplyMessage = \"R\"\nDeleteMessage = \"d\"\nEditMessage = \"e\"\nOpenMessageUrl = \"o\"\nViewMessageAttachment = \"v\"\nToggleGuildPane = \"<leader>1\"\nToggleChannelPane = \"<leader>2\"\nToggleMemberPane = \"<leader>4\"\nOpenFocusedPaneAction = \"<leader>a\"\nOpenOptions = \"<leader>o\"\nChannelSwitcher = \"<leader><leader>\"\nVoiceDeafen = \"<leader>vd\"\nVoiceMute = \"<leader>vm\"\nVoiceLeave = \"<leader>vl\"\n\n[keymap.groups]\n\"<leader>v\" = \"Voice\"\n\n[keymap.guild_actions]\nMarkAsRead = \"m\"\nMuteServer = \"u\"\nLeaveServer = \"l\"\n\n[keymap.channel_actions]\nJoinVoice = \"j\"\nLeaveVoice = \"l\"\nShowPinnedMessages = \"p\"\nShowThreads = \"t\"\nMarkAsRead = \"m\"\nMuteChannel = \"u\"\n\n[keymap.message_actions]\nCopyMessage = \"y\"\nReactMessage = \"r\"\nReplyMessage = \"R\"\nDeleteMessage = \"d\"\nEditMessage = \"e\"\nOpenMessageUrl = \"o\"\nViewMessageAttachment = \"v\"\nGoToReferencedMessage = \"g\"\nShowMessageProfile = \"p\"\nPinMessage = \"P\"\nOpenThread = \"t\"\nShowReactionUsers = \"u\"\nOpenPollVotePicker = \"c\"\n\n[keymap.member_actions]\nShowProfile = \"p\"\n\n[keymap.composer]\nOpenEditor = \"<C-e>\"\nPasteClipboard = \"<C-v>\"\nInsertNewline = { keys = [\"<S-enter>\", \"<C-enter>\", \"<A-enter>\"] }\nSubmit = \"enter\"\nClose = \"esc\"\nClearInput = \"<C-c>\"\nRemoveLastAttachment = \"delete\"\nDeletePreviousChar = \"backspace\"\nDeletePreviousWord = { keys = [\"<C-backspace>\", \"<C-w>\"] }\nMoveCursorUp = \"up\"\nMoveCursorDown = \"down\"\nMoveCursorWordLeft = \"<C-left>\"\nMoveCursorLeft = \"left\"\nMoveCursorWordRight = \"<C-right>\"\nMoveCursorRight = \"right\"\nMoveCursorHome = \"home\"\nMoveCursorEnd = \"end\"\n```\n\n</details>\n\n## Performance\n\nConcord is designed to stay lightweight in normal terminal use. In observed\ntypical use, it usually uses about 20-40 MB of memory.\n\nImage-heavy screens can temporarily use more memory because compressed image\nbytes need to be decoded before they can be rendered in the terminal. When many\nimages are loaded, memory can briefly rise to around 100-200 MB while decoding\nand then drop again as work completes and caches are pruned.\n\nTo keep resource usage bounded, Concord limits media work in several places:\n\n- Attachment previews are downloaded with an 8 MiB per-preview cap.\n- Attachment downloads are capped at 64 MiB.\n- Up to 4 attachment previews are fetched at once.\n- Up to 2 inline image previews are decoded at once.\n- Inline image previews, avatars, and custom emoji use small LRU caches.\n- Image preview requests prefer resized Discord proxy URLs sized for the\n  terminal instead of original full-size media when possible.\n- The preview quality preset can lower preview source dimensions or opt into\n  original source images. It does not change avatar or custom emoji sizing.\n\nMessage history is also cached with a per-channel limit, so long-running\nsessions do not keep every message in memory forever.\n\n## FAQ\n\n### Can my account be blocked?\n\nHonestly, no.\n\nThere are some path that did trigger a account block:\n\n- Trying to **create a new DM channel and send a message to an unknown user**(meaning there was no pre-existing DM created through the Discord client) can immediately block your account temporarily.\n- Some features that requires a hCapcha challenge on Discord's side.\n\nOther features have not caused blocks in my testing.\n\nThat said, Concord is not an official Discord client. Using unofficial clients, automated user accounts, or self-bots can violate Discord's TOS, so there is always some risk. Use it at your own discretion.\n\n### Does Concord support CAPTCHA?\n\nNo. If Discord requires a CAPTCHA during login, use token login instead.\n\n## Security\n\n- Tokens are stored as **plain text** in Concord's config directory. So keep that file secure and do not share it. You can use the token from that file to log in to the official Discord client, so treat it like a password.\n- On Unix, the credential's parent directory is created with `0700` and the credential file with `0600` permissions.\n- All concord state (config, keymap, credential, log) lives under a single `concord/` directory inside `XDG_CONFIG_HOME` when it is set, or inside the platform config directory otherwise.\n- No system keychain integration yet.\n\n## Contributing\n\nAny issues, pull requests, and feedback are welcome. See [CONTRIBUTING.md](./CONTRIBUTING.md) for details.\n\n## License\n\nConcord is licensed under GPL-3.0-only.\n","summary":"Concord is a feature-rich terminal (TUI) client for Discord, built in Rust with ratatui, aiming to deliver a “full Discord experience” inside your command line. It supports Discord authentication options including token, email/password with MFA, and QR login, along with browsing guilds and channels, navigating threads and forum channels, loading pinned content, and tracking unread/mentions. For voice, it can join voice channels and handle audio playback, with optional local microphone support depending on build features. This project is a good fit for power users and developers who prefer keyboard-driven terminal workflows and want an immersive Discord client without leaving their terminal.","description":"A feature-rich TUI client for Discord, written in Rust.","stars":628,"language":"Rust"},{"owner":"kunchenguid","repo":"autopreso","url":"https://github.com/kunchenguid/autopreso","readme":"<h1 align=\"center\">autopreso</h1>\n\n<p align=\"center\">\n  <a href=\"https://github.com/kunchenguid/autopreso/actions/workflows/ci.yml\"><img alt=\"CI\" src=\"https://img.shields.io/github/actions/workflow/status/kunchenguid/autopreso/ci.yml?style=flat-square&label=ci\" /></a>\n  <a href=\"https://github.com/kunchenguid/autopreso/actions/workflows/release-please.yml\"><img alt=\"Release\" src=\"https://img.shields.io/github/actions/workflow/status/kunchenguid/autopreso/release-please.yml?style=flat-square&label=release\" /></a>\n  <a href=\"https://www.npmjs.com/package/autopreso\"><img alt=\"npm\" src=\"https://img.shields.io/npm/v/autopreso?style=flat-square\" /></a>\n  <a href=\"https://img.shields.io/badge/platform-macOS-blue?style=flat-square\"><img alt=\"Platform\" src=\"https://img.shields.io/badge/platform-macOS-blue?style=flat-square\" /></a>\n  <a href=\"https://x.com/kunchenguid\"><img alt=\"X\" src=\"https://img.shields.io/badge/X-@kunchenguid-black?style=flat-square\" /></a>\n  <a href=\"https://discord.gg/Wsy2NpnZDu\"><img alt=\"Discord\" src=\"https://img.shields.io/discord/1439901831038763092?style=flat-square&label=discord\" /></a>\n</p>\n\n<h3 align=\"center\">Let the whiteboard whiteboard itself.</h3>\n\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/kunchenguid/autopreso/main/assets/autopreso.png\" alt=\"autopreso whiteboard hero screenshot\" width=\"960\" />\n</p>\n\n> [!WARNING]\n> autopreso is in **alpha** and under active development. Expect rough edges, breaking changes, and the occasional weird drawing. Bug reports welcome.\n\nYou wanted to give the talk, not build the deck.\n\nautopreso runs a local web app with a live Excalidraw canvas and a listening agent.\nYou speak; transcripts stream to a model; the model draws, labels, and rearranges the whiteboard in real time.\nStage a few seed elements, hit start, and present.\n\n- **Hands free** - your speech drives an agent that edits an Excalidraw scene as you talk, no clicking required.\n- **Bring your own model** - use your OpenAI API key or Codex subscription. Auto Preso itself is completely free and open source.\n- **Can run locally** - use Moonshine for transcription and Ollama for the agent and you get a fully local setup.\n\n## Quick Start\n\n```sh\n$ npx autopreso              # boots the server, opens the browser\nautopreso listening at http://127.0.0.1:3210\n\n# In the browser:\n# 1. Drop reference materials onto the staging canvas (title, agenda, etc).\n# 2. Pick your microphone, transcription model, agent model, and optional Agent instructions.\n# 3. Click \"Start Preso\" and start talking.\n```\n\n## Install\n\n**npm (recommended)**\n\n```sh\nnpm install -g autopreso\nautopreso\n```\n\n**npx (no install)**\n\n```sh\nnpx autopreso\n```\n\n**From source**\n\n```sh\ngit clone https://github.com/kunchenguid/autopreso.git\ncd autopreso\nnpm install\nnpm start\n```\n\n## How It Works\n\n```\n  ┌──────────┐   audio    ┌──────────────┐   text   ┌──────────────┐\n  │   mic    │──────────► │     STT      │────────► │  whiteboard  │\n  │ (browser)│   24kHz    │ Moonshine /  │ chunks   │    agent     │\n  └──────────┘            │ OpenAI WS    │          │ (OpenAI /    │\n                          └──────────────┘          │  Codex /     │\n                                                    │  Ollama)     │\n                                                    └──────┬───────┘\n                                                           │ tool calls\n                                                           ▼\n                                                  ┌────────────────┐\n                                                  │   Excalidraw   │\n                                                  │  scene (live)  │\n                                                  └────────────────┘\n```\n\n- **Two modes** - \"staging\" lets you sketch seed content client-side; \"live\" hands the canvas over to the agent, biases OpenAI Realtime transcription toward staging text and labels, and starts streaming transcripts.\n- **Local server, local network only** - the Express + WebSocket server binds to 127.0.0.1; nothing is exposed beyond your machine.\n- **Persistent settings** - models, API keys, STT engine choices, and Agent instructions live in `~/.config/autopreso/settings.json` and survive restarts.\n- **Warmup loop** - after you hit start the agent primes itself against your staging content and Agent instructions so the first sentence you say doesn't get a cold model.\n\n## CLI Reference\n\n| Command        | Description                                  |\n| -------------- | -------------------------------------------- |\n| `autopreso`    | Start the local server and open the browser. |\n| `autopreso -h` | Show help.                                   |\n\n### Flags\n\n| Flag         | Description                                   |\n| ------------ | --------------------------------------------- |\n| `--no-open`  | Start the server without opening the browser. |\n| `-h, --help` | Show help.                                    |\n\n## Configuration\n\nSettings persist at `~/.config/autopreso/settings.json` and are managed from the in-app status panel.\nAgent instructions are saved automatically from staging, can be up to 100,000 characters, and take effect on the next Start Preso.\nThe live Session cost card estimates agent token costs and OpenAI Realtime audio costs for the current presentation, resetting on Start Preso or session reset.\nOpenAI prices use the built-in May 2026 rate table; local providers show `$0.0000`, Codex shows token volume because it routes through your subscription, and unknown models show `n/a`.\n\n### Defaults on first run\n\nWhen no settings file exists, autopreso picks providers based on what it finds in your environment:\n\n| You have...                                | Agent provider                 | Transcription              |\n| ------------------------------------------ | ------------------------------ | -------------------------- |\n| Nothing                                    | OpenAI `gpt-5.5` (needs a key) | Moonshine `medium` (macOS) |\n| `OPENAI_API_KEY` in env                    | OpenAI `gpt-5.5`               | OpenAI Realtime            |\n| Codex CLI signed in (`~/.codex/auth.json`) | Codex `gpt-5.5-fast`           | Moonshine `medium`         |\n| Codex CLI signed in + `OPENAI_API_KEY`     | Codex `gpt-5.5-fast`           | OpenAI Realtime            |\n| `OLLAMA_MODEL` set                         | Ollama (your model)            | Moonshine `medium`         |\n\nAuto-detection precedence: **Codex CLI auth wins over `OLLAMA_MODEL` wins over `OPENAI_API_KEY`** for the agent. Transcription flips to OpenAI Realtime any time an OpenAI key is present, otherwise Moonshine. After first run, this auto-detection no longer applies - change providers from the in-app status panel.\n\n### Environment variables\n\nProvider variables only seed `settings.json` on first run. Once the file exists, they're ignored - edit the file or use the in-app panel. Log path variables are read on each process start.\n\n| Variable               | Purpose                                               |\n| ---------------------- | ----------------------------------------------------- |\n| `PORT`                 | Port to listen on. Default: `3210`.                   |\n| `OPENAI_API_KEY`       | Seeds the OpenAI key for both agent and Realtime STT. |\n| `OPENAI_MODEL`         | Seeds the OpenAI agent model.                         |\n| `OPENAI_BASE_URL`      | Seeds the OpenAI agent API base URL.                  |\n| `CODEX_MODEL`          | Seeds the Codex model.                                |\n| `OLLAMA_MODEL`         | Seeds the Ollama model.                               |\n| `AUTOPRESO_CACHE_LOG`  | Cache usage log path. Default: `~/.config/autopreso/logs/cache.log`. |\n| `AUTOPRESO_DEBUG_LOG`  | Agent debug log path. Default: `~/.config/autopreso/logs/debug.log`. |\n\nLocal Moonshine transcription ships as an optional native sidecar for `darwin-arm64` and `darwin-x64`. On other platforms, choose OpenAI Realtime in the STT panel.\n\n## Credits\n\n- [Excalidraw](https://github.com/excalidraw/excalidraw) - the whiteboard canvas, scene model, and rendering.\n- [Moonshine](https://github.com/moonshine-ai/moonshine) the local speech-to-text model that makes the offline path possible.\n- [Vercel AI SDK](https://github.com/vercel/ai) - tool-calling agent loop and provider abstraction.\n\n## Development\n\n```sh\nnpm install                       # install deps\nnpm run dev                       # run the CLI from source\nnpm run typecheck                 # tsc --noEmit\nnpm test                          # node --test\nnpm run build:moonshine-sidecars  # build the Python sidecar binaries\n```\n","summary":"autopreso is an alpha, open-source “hands-free” presentation tool that listens to your speech and automatically drives a live Excalidraw whiteboard. It runs a local web app with a streaming speech-to-text pipeline and an agent (powered by OpenAI/Codex or an entirely local setup via Moonshine and Ollama) that draws, labels, and rearranges the scene in real time while you talk. The project includes a staging mode where you pre-seed key elements (like title or agenda) before starting, reducing the need to build your deck. It’s best for speakers, educators, and teams who want to focus on presenting rather than manually creating slide or diagram content.","description":"Realtime speech to presentation. Let the whiteboard whiteboard itself.","stars":359,"language":"JavaScript"},{"owner":"ronaldo-avalos","repo":"Maya","url":"https://github.com/ronaldo-avalos/Maya","readme":"<div align=\"center\">\n  <img src=\"docs/icon.png\" width=\"128\" height=\"128\" alt=\"Maya app icon\" />\n\n  # Maya\n\n  **Wrap your iPhone screen recordings in a beautiful device frame, add cinematic zoom moments, and export ready-to-share videos.**\n\n  A native macOS app for turning raw screen recordings into polished marketing clips, social-media posts, and in-app tutorial overlays.\n\n  ![Maya screenshot](docs/screenshot.png)\n</div>\n\n---\n\n## ⬇️ Download\n\n**[Download Maya for macOS](https://github.com/ronaldo-avalos/Maya/releases/latest/download/Maya.dmg)**  ·  [Website](https://ronaldo-avalos.github.io/Maya/)\n\nRequires **macOS 26.3 (Tahoe)** or later. Maya is signed with a Developer ID and notarized by Apple — it opens with a normal double-click, no security workaround needed.\n\nWant the latest unreleased changes? [Build from source](#-build--run). Maintainers: see [RELEASING.md](RELEASING.md).\n\n---\n\n## ✨ Features\n\n### 🎬 Device framing\n- Drop an iPhone screen recording — Maya wraps it in a clean device mockup with the correct screen cutout and corner radius.\n- **Multiple devices**: iPhone 17 Pro, iPhone 16 Pro, iPhone 15 Pro, each with their official titanium color variants (Cosmic Orange, Deep Blue, Silver, Natural / Black / White / Desert Titanium…). Switch model and color from the sidebar in one click.\n- **Generic** mode: a brand-agnostic frame with user-defined **bezel width** and **bezel color**.\n- **No frame** mode: ship the bare screen recording with rounded corners only.\n- A **corner radius slider** appears in Generic / No-frame modes so you can dial from sharp to stadium.\n- The framed phone lives inside a configurable canvas — **1:1**, **9:16**, **4:5**, **4:3 landscape**, **16:9 widescreen** — so you can target Reels, Shorts, TikTok, YouTube, X, or in-app overlays from a single source.\n- Manually scale and reposition the phone on the canvas via slider + drag.\n- Optional **drop shadow** under the phone with controls for color, blur, X/Y offset, and opacity.\n\n### 🎨 Backgrounds\nA single picker, five modes:\n- **None** — Photoshop-style checkered preview, exports to `.mov` with **HEVC + alpha**.\n- **Solid** — brand-aligned palette + custom hex.\n- **Gradient** — eight curated brand presets, all derived from the app's official color (`#6466FA`).\n- **Image** — drop in any image, scale-to-fill.\n- **Video Blur** — Keynote-style blurred poster of your own video as the backdrop.\n\n### ⏱ Timeline & zoom animations\nLike shots.so for Mac:\n- Bottom track: live video thumbnails strip.\n- Top track: hover anywhere to drop a **zoom event** with a `+` affordance.\n- Each zoom event has a **start**, **duration**, **scale**, **focus** (Top / Center / Bottom), independent **zoom-in / zoom-out timing**, and a chosen **animation curve**.\n- Drag the block to move it; drag the edges to resize. Everything snaps to **0.25 s** intervals and to the **playhead** when nearby.\n- Live tooltips show timestamps while dragging.\n- The playhead is scrubbable.\n- Selecting a zoom event opens an inline **right-side editor panel** so every slider tweak updates the canvas in real time — no modal, no lost context.\n\n### 🌀 Six animation curves\n| Curve | Feel |\n|---|---|\n| **Spring** | Soft overshoot, lively (default) |\n| **Bouncy** | More overshoot, playful |\n| **Smooth** | Classic ease in/out |\n| **Snappy** | Fast attack, slow settle |\n| **Gentle** | Soft and organic |\n| **Linear** | Constant rate, mechanical |\n\n### 🚀 One-click presets\nPre-baked combinations of scale + focus + duration + curve: *Subtle Pop, Quick Punch, Dramatic, Top Focus, Bottom Focus, Long Hold, Mechanical, Soft Reveal.*\n\n### 📤 Smart export\n- **With background** → 1080×1080 (or your aspect) `.mp4`, H.264. Drop straight into Reels / TikTok / Shorts.\n- **Transparent** (background set to *None*) → `.mov` with HEVC + alpha channel. Composite the framed phone over any UI inside another `AVPlayer` / `AVKit` consumer — perfect for in-app tutorials, Final Cut, Motion.\n- All zoom animations bake into both exports.\n\n### ⌨️ Keyboard shortcuts\n| Key | Action |\n|---|---|\n| <kbd>Space</kbd> | Play / pause |\n| <kbd>M</kbd> | Mute / unmute |\n| <kbd>←</kbd> / <kbd>→</kbd> | Scrub ±0.25 s |\n| <kbd>⇧</kbd>+<kbd>←</kbd> / <kbd>⇧</kbd>+<kbd>→</kbd> | Scrub ±1 s |\n| <kbd>⌫</kbd> | Delete selected zoom event |\n| <kbd>⌘</kbd>+<kbd>D</kbd> | Duplicate selected zoom event |\n\n---\n\n## 🛠 Tech stack\n\n- **SwiftUI** + **AppKit** (custom `NSViewRepresentable` for `AVPlayerLayer`)\n- **AVFoundation**: `AVMutableComposition`, custom `AVVideoCompositing`, `AVAssetExportSession`, manual `AVAssetReader` / `AVAssetWriter` pipeline for HEVC + alpha\n- **Core Image** + **Metal** for per-frame compositing\n- **VideoToolbox** for HEVC-with-alpha encoder properties\n- **Swift Concurrency** (`@Observable`, actors, async/await) — export runs on a dedicated actor so the UI never blocks\n- **App Sandbox** with file hard-link/copy adoption strategy (videos are brought into the sandbox container on load so AVFoundation reads work from any thread)\n\n### Requirements\n- macOS 26.3 (Tahoe) or later\n- Xcode 26.5 or later\n- An iPhone screen recording in `.mp4` / `.mov` format\n\n### Build & run\n```bash\ngit clone https://github.com/ronaldo-avalos/Maya.git\ncd Maya\nopen Maya.xcodeproj\n# In Xcode: ⌘R\n```\n\n---\n\n## 🤝 Contributing — Maya is open source\n\nThis project is in active development and **contributions are very welcome**. Whether you're an iOS/macOS dev, a designer, or someone who just loves polished tools, there's a place for you.\n\n### High-impact contribution areas\n\n#### 📱 More device frames\nMaya currently ships **iPhone 17 Pro**, **16 Pro**, and **15 Pro** (each with multiple color variants), plus a configurable Generic frame and a No-frame mode. PRs that add more devices are very welcome:\n- iPhone 16 / 16 Plus, iPhone 15 / 15 Plus\n- iPhone SE\n- iPad mini / iPad Pro\n- Older models (iPhone 14, 13, 12 family)\n- Android devices (Pixel, Galaxy)\n\nTo add a frame:\n1. Drop transparent-screen PNG(s) into `Maya/Assets.xcassets/iphone frames/` — one imageset per color variant.\n2. Register the model in `Maya/Models/DeviceFrame.swift` (`DeviceModel`) with the frame aspect, normalized screen rect, corner radius, and a `DeviceColor` per variant. Append it to `DeviceModel.all`.\n3. Submit a PR with a screenshot of the result. That's it.\n\n#### 🎯 Feature ideas (good first issues)\n- **Undo / Redo** for canvas, animations, and background changes (`⌘Z` / `⌘⇧Z`).\n- **Saved projects** — persist a `.mayaproj` document on disk so users can come back to a layout.\n- **Animation presets gallery** — visual previews of each preset playing on a sample phone in the editor sheet.\n- **Trim controls** on the video track (drag in/out points to crop the recording).\n- **Click-spot animations** — automatically zoom toward where the user tapped in the screen recording (parse the `.mp4` metadata if available, or expose a click-to-mark workflow).\n- **Caption / annotation overlays** with their own timeline track.\n- **Watermark toggle** for users who want a \"Made with Maya\" footer.\n\n#### 🎨 Design / UX polish\n- A more refined **empty state** for the canvas before any video is loaded.\n- A **welcome screen** with recent projects.\n- **Onboarding tooltips** for first-launch.\n- An **export progress sheet** with thumbnail preview of the result.\n- A **keyboard shortcuts cheat sheet** accessible from a menu item.\n- More **gradient and solid color presets** that work for non-indigo brands.\n\n#### 🐛 Engineering improvements\n- **More iPhone screen orientations** (currently the compositor assumes portrait recordings).\n- **HDR pass-through** for HDR screen recordings.\n- **Audio waveform** rendering on the timeline.\n- **Apple Silicon performance profiling** of the export pipeline.\n- **CI** with GitHub Actions (build + lint).\n- **Unit tests** for `AnimationSampler`, `DeviceFrame` coordinate math, and `BlurPosterCache`.\n\n### How to contribute\n\n1. **Fork** the repo and create a feature branch: `git checkout -b feature/iphone-16-pro`\n2. **Code** the change. Try to match the existing style — small files, no unnecessary comments, single-responsibility views.\n3. **Test** locally (⌘R). Take a screenshot or short GIF showing the change.\n4. **Open a PR** with a clear title, a short description, and the screenshot/GIF.\n\nFor larger features, **open an issue first** so we can align on the approach before you spend hours on it.\n\n### Code map\n\n```\nMaya/\n├── MayaApp.swift                 App entry\n├── ContentView.swift             Root → EditorView\n├── Models/                       State + value types\n│   ├── Project                   Root @Observable state (video, canvas, devices, shadow, animations…)\n│   ├── DeviceFrame               DeviceModel + DeviceColor catalog (iPhone Pro family, Generic, None)\n│   ├── CanvasAspectRatio         1:1, 9:16, 4:5, 4:3, 16:9 — pixel sizes + chip metadata\n│   ├── PhoneShadow               Drop-shadow parameters (color, blur, offsets, opacity)\n│   ├── BackgroundOption          Solid / gradient / image / video-blur / transparent\n│   └── ZoomSegment               Per-segment zoom animation spec\n├── Services/                     AVFoundation + Core Image plumbing\n│   ├── DeviceFrameCompositor     Custom AVVideoCompositing (per-frame compositing)\n│   ├── ExportService             Actor that runs both .mp4 and .mov exports\n│   ├── AnimationSampler          Envelope math for zoom segments\n│   ├── BlurPosterCache           One-shot blurred-frame cache\n│   └── VideoThumbnailGenerator   Async timeline thumbnails\n├── Views/                        SwiftUI views\n│   ├── EditorView                Top-level layout (sidebar / canvas / timeline / editor panel)\n│   ├── CanvasView                Configurable-ratio canvas with framed phone + background\n│   ├── FramedDeviceView          Composite of video + frame overlay + shadow\n│   ├── BackgroundPicker          Mode tabs + per-mode controls\n│   ├── SettingsSidebar           Left sidebar (recording, canvas, device, transform, background, shadow, export)\n│   ├── AnimationEditorSheet      Right panel for editing a selected zoom event (live preview)\n│   └── Timeline/                 Ruler, video strip, animations track, draggable playhead\n└── Assets.xcassets/              iPhone frame PNGs + app icon\n```\n\n---\n\n## 📄 License\n\nMIT — see [LICENSE](LICENSE).\n\nYou can fork, use Maya in personal or commercial projects, and ship derived work. Attribution is appreciated but not required.\n\n---\n\n## 🙏 Acknowledgements\n\n- The app's brand color `#6466FA` borrows from the Tailwind/Indigo family.\n- iPhone 15 / 16 / 17 Pro frame PNGs generated by the project owner.\n- Built with ❤️ on macOS Tahoe.\n\nIf Maya helps you ship a video, tag [@ronaldo-avalos](https://github.com/ronaldo-avalos) — we'd love to see it.\n","summary":"Maya is a native macOS app for transforming raw iPhone screen recordings into polished, marketing-ready videos. It automatically wraps recordings in realistic device frames (including multiple iPhone Pro models and color variants or generic/custom frames), supports configurable canvases for common social aspect ratios, and lets you add cinematic zoom moments on a timeline with editable event parameters. Users can choose styled backgrounds (solid, gradient, images, or video-blur) and export either compressed MP4 for social sharing or transparent MOV with HEVC + alpha for compositing in apps and video tools. This is well-suited for marketers, creators, and product teams who need fast, high-quality social clips and in-app tutorial overlays from screen recordings.","description":"🖥️ 📱 ▶️ Wrap your iPhone screen recordings in a beautiful device frame, add cinematic zoom moments, and export ready-to-share videos.","stars":160,"language":"Swift"},{"owner":"backnotprop","repo":"rig","url":"https://github.com/backnotprop/rig","readme":"# Rig\n\nRig is a small macOS sidecar for Ghostty.\n\nIt gives engineers a fast way to create, focus, arrange, and track terminal sessions across projects and coding harnesses. It controls real Ghostty windows through Ghostty AppleScript and macOS Accessibility APIs.\n\n## Demo\n\nhttps://github.com/user-attachments/assets/4eabc7a1-01ab-460b-bd5c-87b496cd4299\n\n## What It Does\n\n- Launch Ghostty sessions for configured harnesses\n- Keep session windows reachable from a floating side panel\n- Switch directly to a session's Space\n- Arrange managed Ghostty windows as grid, cascade, side by side, or fill screen\n- Detect local servers started from sessions and show clickable URLs\n- Open a detected URL beside its Ghostty session on the current desktop\n\n## Requirements\n\n- macOS\n- Ghostty\n- Accessibility permission for window arrangement\n- Automation permission to control Ghostty\n\n## Development\n\n```sh\n./dev.sh\n```\n\nThis builds, signs, and launches the local development app.\n\n## Release\n\n```sh\n./release.sh\n```\n\nThis builds the distributable macOS app.\n\n## License\n\nDual-licensed under MIT and Apache 2.0. See [LICENSE](LICENSE) and [LICENSE-APACHE](LICENSE-APACHE).\n\n## Notes\n\nRig keeps runtime session state in memory. Ghostty window IDs and Accessibility references are not durable across app or Ghostty restarts.\n","summary":"Rig is a small macOS sidecar app for Ghostty that helps engineers create, focus, arrange, and track terminal sessions across projects and coding harnesses. It launches Ghostty sessions for configured harnesses and keeps them reachable from a floating panel, including switching to the Space where a session lives and arranging managed windows in layouts like grid, cascade, side-by-side, or fullscreen via AppleScript and macOS Accessibility APIs. It can detect local servers started within sessions and present clickable URLs, opening them next to the relevant Ghostty window on the current desktop. Developers who frequently juggle multiple terminal sessions on macOS will benefit from faster session management and tighter visual organization, especially when working across projects.","description":null,"stars":308,"language":"Swift"},{"owner":"stephenlthorn","repo":"auto-identity-remove","url":"https://github.com/stephenlthorn/auto-identity-remove","readme":"# auto-identity-remove\n\n![CI](https://github.com/stephenlthorn/auto-identity-remove/actions/workflows/test.yml/badge.svg)\n\nAutomated data broker opt-out runner for macOS, Linux, and Windows. Removes your personal information from **500+ people-search sites and data broker databases** on a monthly schedule - with CAPTCHA solving, persistent state tracking (so completed opt-outs aren't resubmitted every run), and an iMessage notification when done. [**Privacy & data flow ->**](docs/PRIVACY.md)\n\n## What it does\n\nEach month, the script:\n\n1. **Searches** each data broker site for your name + state\n2. **Finds your specific listing** (for sites that need a profile URL)\n3. **Fills and submits** the opt-out form automatically\n4. **Solves CAPTCHAs** via [CapSolver](https://capsolver.com) (AI-powered, ~$0.001/solve)\n5. **Skips** brokers you were already removed from recently (90-day re-check window)\n6. **Sends you an iMessage** with the results summary\n7. **Opens** any sites that require manual action in your browser\n\n---\n\n## Requirements\n\n- Node.js 18+\n- macOS, Linux, or Windows (scheduling adapts automatically)\n- [Playwright](https://playwright.dev) browsers installed\n\n```bash\nnpx playwright install chromium\n```\n\n---\n\n## Quick Start\n\n```bash\n# 1. Clone the repo\ngit clone https://github.com/stephenlthorn/auto-identity-remove.git\ncd auto-identity-remove\n\n# 2. Install dependencies\nnpm install\n\n# 3. Run interactive setup (creates config.json and schedules the monthly job)\nnode setup.js\n\n# 4. Run manually anytime\n./run.sh\n```\n\n---\n\n## Setup walkthrough\n\n`node setup.js` guides you through:\n\n| Step | What it does |\n|------|-------------|\n| **Personal info** | Name, city, state, ZIP, email, phone |\n| **Aliases** | Past names or variations (e.g. \"Steve Doe\") |\n| **CapSolver key** | For CAPTCHA-protected opt-out forms |\n| **One-time accounts** | Creates accounts on sites that require login (stored in `config.json`, gitignored) |\n| **iMessage** | Phone number to text the results summary to |\n| **Monthly schedule** | Registers a monthly job to run on the 1st at 9am (launchd / systemd / crontab / schtasks - detected automatically) |\n\n**Your personal info never leaves your machine.** `config.json` and `state.json` are both gitignored.\n\n---\n\n## CapSolver (optional but recommended)\n\nSome opt-out forms have reCAPTCHA. Without CapSolver, those sites go to your manual list instead of being handled automatically.\n\n1. Sign up at [capsolver.com](https://capsolver.com) - free, pay-as-you-go\n2. Add $1-2 of credits (enough for months of use at ~$0.001/solve)\n3. Paste your API key when `setup.js` asks, or add it to `config.json`:\n\n```json\n\"capsolver\": {\n  \"apiKey\": \"CAP-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx\"\n}\n```\n\n> **CapSolver is optional.** Without it, CAPTCHA-protected sites are flagged as\n> manual and opened in your browser for completion. Pass `--no-capsolver` to skip\n> them entirely rather than opening the browser.\n\n---\n\n## Running with Docker\n\nThe included `Dockerfile` uses the official Playwright image, so Chromium and\nall system dependencies are pre-installed. No Mac required.\n\n```bash\n# Build the image (once)\ndocker build -t auto-identity-remove .\n\n# Dry-run (no opt-out forms submitted, no network calls)\ndocker run --rm \\\n  -v $(pwd)/config.json:/app/config.json \\\n  -v $(pwd)/state.json:/app/state.json \\\n  auto-identity-remove node watcher.js --dry-run\n\n# Full run\ndocker run --rm \\\n  -v $(pwd)/config.json:/app/config.json \\\n  -v $(pwd)/state.json:/app/state.json \\\n  auto-identity-remove\n```\n\n**Persistent state:** mount `state.json` so completed opt-outs are remembered\nbetween container runs. If the file does not exist yet, create an empty one\nfirst: `echo '{}' > state.json`.\n\n### Webhook notifications (any OS)\n\nWhen running headless or in Docker you won't have iMessage or a desktop - use\na webhook instead. Set `notify.webhook` in `config.json` to any ntfy.sh,\nSlack incoming-webhook, or Discord webhook URL:\n\n```json\n\"notify\": {\n  \"textTo\": \"\",\n  \"webhook\": \"https://ntfy.sh/my-private-channel\"\n}\n```\n\nThe tool POSTs `{\"text\": \"<summary>\"}` after every run. Works on macOS, Linux,\nand Windows - the webhook fires in addition to (not instead of) any platform\nnotification that is available.\n\n---\n\n## Files\n\n```\nauto-identity-remove/\n├── setup.js            ← Run once: interactive setup + scheduling\n├── watcher.js          ← Main runner\n├── brokers.js          ← Broker list with opt-out strategies\n├── run.sh              ← Manual trigger\n├── config.example.json ← Template (copy → config.json)\n├── package.json\n├── .gitignore\n│\n├── config.json         ← YOUR personal info (gitignored, created by setup.js)\n├── state.json          ← Opt-out history / skip logic (gitignored)\n└── logs/               ← Per-run JSON logs (gitignored)\n```\n\n---\n\n## State tracking\n\n`state.json` tracks when each broker was last successfully opted out. The default re-check window is **90 days** - brokers typically re-add your data within that window, so the script re-submits when it's time.\n\n```json\n{\n  \"optOuts\": {\n    \"Spokeo\": {\n      \"lastSuccess\": \"2026-05-01T09:00:00.000Z\",\n      \"totalRuns\": 3,\n      \"detail\": \"\"\n    }\n  }\n}\n```\n\nOn each run you'll see:\n- `✅ Submitted (form accepted)` - opt-out form was submitted this run\n- `📧 Awaiting email confirm` - broker replied \"check your email to confirm\"; click the link in your inbox. Auto-retried after 14 days if still pending.\n- `⏭  Skipped (fresh)` - removed recently, re-check not due yet\n- `🔍 Not listed` - your name wasn't found on that site\n- `📋 Manual needed` - opened in your browser for you to handle\n- `❌ Error` - network/timeout issue, will retry next run\n- `💀 Dead (stale URL)` - broker URL is gone (DNS/404); not counted as an error\n\n> **Submitted ≠ confirmed deleted.** Use `node watcher.js --verify` for spot-check verification. See [STATUS.md](STATUS.md) for a per-broker confidence table.\n\n## How confident should I be?\n\nThis tool covers 500+ data brokers in two tiers:\n\n| Tier | Count | Confidence |\n|---|---|---|\n| **Explicit brokers** ([STATUS.md](STATUS.md)) | 42 | Hand-mapped with specific selectors. `verified` entries have been tested live; `untested` ones may have drifted since they were added. |\n| **Generic runner** | ~490 | Best-effort heuristic - tries 4 strategies (Do Not Sell click, OneTrust/TrustArc, generic form, DSAR link). Many succeed; some fail silently. |\n\nThe `✅ Submitted` count means the form was accepted by the broker. It does **not** prove deletion. To check:\n\n1. Run `node watcher.js --verify` - re-searches each broker where a successful opt-out was recorded and reports whether your name still appears.\n2. Look at the `📧 Awaiting email confirm` section after each run - these are half-done until you click the link.\n\nIf you want to know exactly which brokers are hand-verified vs heuristic, see [STATUS.md](STATUS.md).\n\n---\n\n## Brokers covered\n\n### Auto-removed (30+)\n\n| Site | Method |\n|------|--------|\n| Spokeo | Search → find listing → opt-out form |\n| WhitePages | Search → find listing → suppression form |\n| FastPeopleSearch | Search → opt-out form |\n| TruePeopleSearch | Direct opt-out form |\n| BeenVerified | Opt-out search form |\n| Radaris | Search → privacy form |\n| Intelius | Direct opt-out form |\n| PeopleFinders | Direct opt-out form |\n| PeopleSmart | Direct opt-out form |\n| MyLife | Search → opt-out |\n| Nuwber | Search → removal form |\n| FamilyTreeNow | Direct opt-out form |\n| CheckPeople | Direct opt-out form |\n| ThatsThem | Direct opt-out form |\n| USPhonebook | Direct opt-out form |\n| PublicDataUSA | Direct opt-out form |\n| SmartBackgroundChecks | Direct opt-out form |\n| SearchPeopleFree | Direct opt-out form |\n| PeopleSearchNow | Direct opt-out form |\n| InfoTracer | Direct opt-out form |\n| SocialCatfish | Direct opt-out form |\n| NationalPublicData | Direct opt-out form |\n| ClustrMaps | Direct opt-out form |\n| PrivateRecords | Direct opt-out form |\n| **Acxiom** | Direct form (feeds dozens of downstream brokers) |\n| **LexisNexis** | Direct form (legal/financial data) |\n| **ZoomInfo** | Direct form (B2B professional data) |\n| **Clearbit** | Direct form (B2B enrichment data) |\n| Pipl | Email opt-out via Mail.app |\n\n### Generic - 500+ additional brokers (auto-detected)\n\n`generic-runner.js` handles the remaining ~470 brokers from two public datasets:\n\n| Dataset | Source | Count |\n|---------|--------|-------|\n| [The Markup's data broker list](https://themarkup.org/privacy/2023/01/26/which-data-brokers-offer-opt-outs) | Journalism research, 494 opt-out URLs | ~494 |\n| [BADBOOL](https://github.com/yaelwrites/Big-Ass-Data-Broker-Opt-Out-List) | Community-maintained people-search list | ~27 extra |\n\nFor each site it tries four strategies in order:\n1. Click a \"Do Not Sell My Personal Information\" button\n2. Opt out via OneTrust / TrustArc / Osano privacy manager\n3. Fill any generic opt-out form (email, name, state) and submit\n4. Find and record a DSAR / data request link for manual follow-up\n\nSites requiring manual action are opened in your browser automatically.\n\n### Manual (opened in browser for you)\n\n| Site | Why manual |\n|------|-----------|\n| Google - Results About You | Requires Google account interaction |\n| Google - Outdated Content | Case-by-case URL submission |\n\n---\n\n## Adding more brokers\n\nEdit `brokers.js` and add an entry:\n\n```js\n{\n  name: 'NewBrokerSite',\n  method: 'direct-form',           // or 'search-form', 'email', 'manual'\n  optOutUrl: 'https://example.com/opt-out',\n  formFields: {\n    'input[name*=\"first\" i]': F,   // F, L, N, E, ST, Z are from config\n    'input[name*=\"last\"  i]': L,\n    'input[type=\"email\"]':    E,\n  },\n  submitSelector: 'button[type=\"submit\"]',\n  captchaLikely: false,\n  priority: 2,\n}\n```\n\nPRs welcome - especially for brokers with verified working selectors.\n\n---\n\n## Manual run\n\n```bash\n./run.sh\n```\n\n**Dry-run mode** - navigates to each site and fills forms but does NOT submit anything. Good for verifying what the script will do before your first real run:\n\n```bash\nnode watcher.js --dry-run\n```\n\nOr to run in the background and log output:\n\n```bash\n./run.sh >> logs/manual-run.log 2>&1 &\n```\n\n### Verifying removals (`--verify`)\n\nRun a read-only spot-check to see whether previous opt-outs are still in effect:\n\n```bash\nnode watcher.js --verify\n```\n\nThis opens a browser, searches each broker where you have a recorded successful opt-out, and reports what it finds. No forms are submitted, nothing is written to `state.json`.\n\nOutput is grouped into three sections:\n\n| Section | Meaning |\n|---------|---------|\n| `VERIFIED CLEAR` | Your name was not found in the broker's search today |\n| `STILL LISTED` | A listing was found - the opt-out may have failed, or your data was re-added |\n| `UNVERIFIABLE` | The broker uses a direct-form, email, or manual method - no automated search signal exists to check |\n\nA dated JSON report is saved to `logs/verify-YYYY-MM-DD.json`.\n\n**Important caveats:**\n\n- Only `search-form` brokers (those with a `searchUrl` and `listingPattern`) can be checked automatically. Direct-form and email opt-outs are always `unverifiable`.\n- \"Verified clear\" means your name was not found in one search today. It is **not** a legal guarantee of deletion. Brokers routinely re-ingest data from upstream sources.\n- \"Still listed\" can mean the opt-out failed **or** the broker re-added your data since the last successful opt-out was recorded. Either way, re-running `node watcher.js` will attempt removal again.\n- If the broker's search page is down or slow, the result is classified as `unverifiable` (a timeout is not counted as \"still listed\").\n\n---\n\n## Experimental: noise mode\n\n> **WARNING: This feature may violate broker Terms of Service.** Submitting fabricated opt-out requests to data broker sites is ethically questionable and could expose you to legal risk. Use at your own discretion. This feature is **off by default** and is provided only as a research/experimental tool.\n\nThe `--pollute N` flag submits `N` randomly-generated fake person records to data brokers that are explicitly tagged `acceptsBogus: true` in `brokers.js`. The goal (inspired by a suggestion on HN) is to flood broker databases with junk records, degrading the accuracy of their search results.\n\n```bash\n# Submit 10 bogus records to each acceptsBogus broker\nnode watcher.js --pollute 10\n```\n\nEach fake record uses:\n- A random name from a small fixture list (not real people)\n- A US city/state/zip from a fixture of 50+ valid combos (not your address)\n- A 10-digit phone with an area code valid for the fake state\n- A randomised `firstname.lastname+XXXXXX@gmail.com` email\n\nOnly brokers tagged `acceptsBogus: true` in `brokers.js` will receive noise submissions. Currently tagged: ThatsThem, SearchPeopleFree, PeopleSearchNow, InfoTracer, SocialCatfish. These are direct-form brokers with no SSN/DOB gate.\n\n**Regular opt-outs run first** - noise submissions happen after the normal run. The `--pollute` flag has no effect on your real opt-out submissions.\n\n---\n\n## Maintenance\n\n### Pruning stale / dead URLs\n\nThe Markup dataset is years old; many of the ~489 generic opt-out URLs now 404 or fail DNS lookup. These are classified as `💀 Dead (stale URL)` in run output and do **not** count as errors.\n\nAfter several runs have accumulated in `logs/`, trim permanently-dead hostnames from future runs so they are skipped without any network request:\n\n```bash\nnode scripts/prune-dead.js\n```\n\nThe script:\n1. Reads every `logs/run-*.json` file\n2. Finds hostnames whose status was `dead` in **every** run they appeared in\n3. Merges them into `data/dead-urls.json` (deduped, sorted)\n4. Prints a summary of how many new hosts were added\n\nThe script is **idempotent** - running it twice produces no change. You can add it as a post-run step or run it manually whenever you want to prune the dead list.\n\n`data/dead-urls.json` is committed to the repo so the dead list is shared with all clones.\n\n---\n\n## Uninstall / disable schedule\n\n| Platform | Command |\n|----------|---------|\n| **macOS** (launchd) | `launchctl unload ~/Library/LaunchAgents/com.auto-identity-remove.plist` then `rm ~/Library/LaunchAgents/com.auto-identity-remove.plist` |\n| **Linux** (systemd) | `systemctl --user disable --now auto-identity-remove.timer` then `rm ~/.config/systemd/user/auto-identity-remove.{service,timer}` |\n| **Linux** (crontab fallback) | Run `crontab -e` and delete the `auto-identity-remove` line |\n| **Windows** (schtasks) | `schtasks /Delete /TN auto-identity-remove /F` |\n\n---\n\n## International users\n\nThis tool supports non-US users with a few important caveats.\n\n### What works\n\n- `setup.js` will prompt for **Country** (2-letter ISO code, e.g. `CA`, `GB`, `AU`) and then replace the US-centric \"State\" / \"ZIP code\" prompts with **Province/Region** and **Postal code** prompts that accept any format (`K1A 0A6`, `SW1A 1AA`, `2000`, etc.) with no coercion.\n- Phone numbers for non-US users are stored verbatim - no `(xxx) xxx-xxxx` reformatting is applied.\n- `lib/forms.js` automatically tries province/postal/postcode HTML field variants (e.g. `input[name*=\"province\"]`, `input[name*=\"postcode\"]`) when filling forms for non-US users, with no change needed in broker definitions.\n- A country `<select>` on opt-out forms is targeted and filled with your 2-letter country code when present.\n- Global brokers (ZoomInfo, Clearbit, Acxiom, Radaris, etc.) are attempted for all users.\n\n### US-only brokers (automatically skipped for non-US users)\n\nThe following brokers are flagged `usOnly: true` and are silently skipped when your configured country is not `US`. These sites index US public records, voter data, or phone directories - a non-US person definitionally has no record to remove there:\n\n| Broker | Reason |\n|--------|--------|\n| Spokeo | US people-search (state-keyed search) |\n| WhitePages | US white-pages directory |\n| FastPeopleSearch | US people-search |\n| TruePeopleSearch | US people-search |\n| BeenVerified | US background-check (requires US state) |\n| USPhonebook | US phone directory |\n| PublicDataUSA | US public records |\n\nAll other brokers in the list are attempted regardless of country.\n\n### What won't help much\n\nUS people-search sites (`Spokeo`, `WhitePages`, etc.) hold records sourced from US public records - if you have never lived in the US, your data is very unlikely to appear on these sites. The script skips them for you automatically.\n\n---\n\n## Is it safe to submit my info to 500 opt-out forms?\n\nA fair concern raised by some users: aren't you just confirming your data to the brokers by filling out their forms?\n\nA few things worth knowing:\n\n- **These brokers already have your info.** You're not revealing anything new - you're using the legally-required removal mechanism they're obligated to provide.\n- **CCPA (California) and similar state laws require brokers to honor opt-out requests.** Submitting the form creates a legal obligation to remove you. Doing nothing does not.\n- **The script uses info you're already listed under** - your name as it appears publicly, your state, your email. It doesn't add new data points.\n- **The alternative is worse.** Every month that passes, more brokers scrape and resell your data. Opt-outs are imperfect, but they work more often than not.\n\nThat said: if you're in a situation where even confirming your email address to a broker is a risk, this tool is not the right approach. Consider a paid service that uses a proxy email.\n\n---\n\n### California residents: DROP delete portal (SB 362)\n\nCalifornia's Delete Request and Opt-out Platform (DROP), established by SB 362,\nwill eventually let residents submit a single deletion request that all\nCalifornia-registered data brokers must honor. The platform is operated by the\nCalifornia Privacy Protection Agency (CPPA).\n\n**Status as of late 2025: not yet live.** The broker-side compliance deadline\nin SB 362 is August 1, 2026. CPPA has missed several preceding milestones and\nongoing litigation (Data Brokers Association v. Bonta) may further delay things.\n\nSee: https://cppa.ca.gov/data_broker_registry/\n\nUntil DROP is live, this tool falls back to per-broker opt-out flows for\nCalifornia-registered brokers.\n\n---\n\n## Why not just use a paid service?\n\nPaid services like [Incogni](https://incogni.com) ($96/yr) or [Optery](https://optery.com) ($39/yr) are excellent and cover more brokers with professionally maintained opt-out flows. This tool is for people who want full control, transparency, and no recurring subscription - or who want to handle the gaps those services miss (Acxiom, LexisNexis, ZoomInfo, Clearbit).\n\nUsing both is the strongest approach: a paid service for the bulk of brokers + this script for the gaps.\n\n---\n\n## License\n\nMIT\n","summary":"auto-identity-remove is an automated opt-out runner that helps remove personal information from 500+ people-search sites and data broker databases on a monthly schedule across macOS, Linux, and Windows. It searches for your listings, fills and submits opt-out forms, and can automatically solve CAPTCHA challenges using CapSolver while maintaining persistent state so completed opt-outs aren’t retried for a 90-day window. The project also sends you an iMessage with a results summary and opens any sites requiring manual action in your browser. It’s best for privacy-focused users who want a hands-off, repeatable way to reduce exposure on data broker platforms without doing each opt-out manually.","description":"Automated data broker opt-out runner — removes your personal info from 30+ people-search sites on a monthly schedule","stars":695,"language":"JavaScript"},{"owner":"PentHertz","repo":"LUKSbox","url":"https://github.com/PentHertz/LUKSbox","readme":"<!-- markdownlint-disable MD041 -->\n\n<p align=\"center\">\n  <a href=\"https://luksbox.penthertz.com/\">\n    <img src=\"assets/luksbox-logo.png\" alt=\"LUKSbox\" width=\"180\">\n  </a>\n</p>\n\n<h1 align=\"center\">LUKSbox</h1>\n\n<p align=\"center\">\n  <strong>Encrypted vaults that survive the next decade.</strong><br>\n  Open-source, FIDO2 + TPM 2.0 native, post-quantum-ready.<br>\n  <em>Store sensitive files in the cloud or on shared media without trusting the host.</em>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://penthertz.com\" title=\"By Penthertz\">\n    Built by\n    <img src=\"assets/penthertz-logo.png\" alt=\"Penthertz\" height=\"22\" valign=\"middle\">\n  </a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://luksbox.penthertz.com/\"><strong>Website</strong></a> |\n  <a href=\"https://luksbox.penthertz.com/docs/\"><strong>Docs</strong></a> |\n  <a href=\"https://luksbox.penthertz.com/docs/security/architecture/\"><strong>Security</strong></a> |\n  <a href=\"https://luksbox.penthertz.com/docs/security/tests/\"><strong>Fuzzing</strong></a> |\n  <a href=\"https://luksbox.penthertz.com/compare/\"><strong>Compare</strong></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"LICENSE\"><img alt=\"License: Apache-2.0\" src=\"https://img.shields.io/badge/license-Apache--2.0-blue.svg\"></a>\n  <a href=\"https://www.rust-lang.org/\"><img alt=\"Made with Rust\" src=\"https://img.shields.io/badge/made%20with-Rust-orange.svg\"></a>\n  <img alt=\"Status: pre-1.0\" src=\"https://img.shields.io/badge/status-pre--1.0-yellow.svg\">\n</p>\n\n---\n\n## What it solves\n\nYou probably already store sensitive files where you don't fully\ncontrol the storage: cloud sync (iCloud, Drive, Dropbox, OneDrive,\nS3, Backblaze), NAS units, USB sticks that travel, backup tapes that\nend up at a recycler. The provider promises encryption-at-rest \"with\ntheir keys.\" LUKSbox encrypts the file before it ever leaves your\nmachine, under **your** keys, in a single container that is opaque to\nthe provider and tamper-evident on the way back.\n\nA LUKSbox vault is one file (`.lbx`), optionally with a separate\nheader (`.hdr`) and post-quantum sidecar (`.kyber`) that you keep on\ndifferent storage. Drop it on any cloud or shared medium. The\nprovider sees one indistinguishable-from-random blob and cannot\ndecrypt it even under legal compulsion. Mount it locally as a real\ndrive when you need to use it.\n\n| Concern | Plain cloud upload | Cloud + provider encryption | LUKSbox vault on cloud |\n|---|---|---|---|\n| Provider can read your files | Yes | Yes (they hold the key) | **No** |\n| Government request to provider exposes data | Yes | Yes | **No** |\n| Silent file tamper detected | No | Sometimes (TLS in transit only) | **Yes** (per-chunk AEAD) |\n| Whole-vault rollback detected | No | No | **Yes** (anchor sidecar) |\n| \"Harvest now, decrypt later\" (post-quantum) | Vulnerable | Vulnerable | **ML-KEM-768/1024 hybrid slot** |\n| Hardware-key requirement to open | N/A | Provider-specific | **FIDO2 / TPM / Windows Hello** |\n| Vault file looks like random data | No | No | **Yes** (with detached header) |\n| Source you can audit | No | No | **Yes** (Apache-2.0) |\n\nThe full per-tool comparison (vs LUKS2 / VeraCrypt / age / gocryptfs /\nCryptomator / BitLocker / FileVault) lives at\n<https://luksbox.penthertz.com/compare/>.\n\n> **A LUKSbox vault is a *travelling* copy, not a *master* copy.**\n> Use it for the cloud, a USB stick, a vault you share with a\n> colleague or client, anywhere you would not put plaintext. Like\n> every encrypted container it is a single point of failure: if the\n> `.lbx` file is corrupted or every keyslot becomes inaccessible,\n> the data is gone. The forensic toolkit (`header-backup`, `check`,\n> `extract --tolerate-errors`) helps in many damage scenarios but\n> cannot recover bytes that are no longer on disk or no longer\n> AEAD-tagged. Always keep an unencrypted copy somewhere you trust\n> for any file you cannot afford to lose.\n\n---\n\n## Status\n\nThis is a **pre-1.0** release. The on-disk format is locked, the\ncryptographic primitives are NIST/RFC standards built on RustCrypto,\nand 9 internal audit rounds have shipped. External paid audit and\nbroader real-world deployment are the next milestones. The\ncloud-storage threat model, provider can't read your data even under\nsubpoena, is what LUKSbox is built for and what it does today.\n\n| Surface | State |\n|---|---|\n| `cargo test --workspace` | 200+ passing, 0 failing, 0 ignored |\n| `cargo audit` (Linux/macOS) | 0 vulns / 0 unsound / 0 unmaintained |\n| `cargo audit` (Windows) | 1 unmaintained (`registry`, transitive via WinFsp) |\n| Internal audit rounds | 9 documented at <https://luksbox.penthertz.com/docs/security/audit/> (per-round details kept internal) |\n| Third-party audit | not yet performed; engagement scope package available on request to `security@penthertz.com` |\n| Fuzz iterations across 10 libFuzzer harnesses | 30M+ |\n\n---\n\n## How a vault is opened\n\n```mermaid\nflowchart LR\n    User[User knowledge<br/>passphrase or PIN] --> Unlock[Unlock material]\n    FIDO[FIDO2 authenticator<br/>hmac-secret] --> Unlock\n    TPM[TPM 2.0<br/>sealed KEK] --> Unlock\n    PQ[ML-KEM seed file<br/>separate storage] --> Unlock\n\n    Unlock --> KEK[Key encryption key]\n    KEK --> MVK[Master volume key]\n    MVK --> HeaderMac[Header HMAC key]\n    MVK --> MetadataKey[Metadata AEAD key]\n    MVK --> FileKeys[Per-file HKDF keys]\n    MVK --> AnchorKey[Anchor HMAC key]\n\n    HeaderMac --> Header[Authenticated header]\n    MetadataKey --> Metadata[Encrypted metadata tree]\n    FileKeys --> Chunks[Encrypted file chunks]\n    AnchorKey --> Anchor[Rollback anchor]\n```\n\nThe Master Volume Key (MVK) is the root secret. Keyslots do not\nencrypt files directly; they wrap the MVK. Once a valid keyslot\nunwraps the MVK, every other key in the vault is derived from it via\nHKDF-SHA256 with a per-purpose `info` string. Lose the keyslot\nmaterial, lose the MVK; revoke a slot and that material is\npermanently unable to recover the MVK from this vault.\n\nFor the full architecture map (on-disk graph, unlock sequence,\nconcurrency / crash-safety pipeline, on-disk footprint), see\n<https://luksbox.penthertz.com/docs/security/architecture/>.\n\n---\n\n## Security mechanisms\n\n| Mechanism | What it does | Where it lives |\n|---|---|---|\n| AES-256-GCM-SIV (default) / AES-256-GCM / ChaCha20-Poly1305 | AEAD on every file chunk and on the metadata blob | `crates/luksbox-core/src/aead.rs` |\n| HMAC-SHA256 over the entire 8 KiB header | Detects header tampering once a keyslot unwraps the MVK | `crates/luksbox-core/src/header.rs` |\n| HKDF-SHA256 with per-purpose `info` strings | Derives every subkey from the MVK; uniqueness verified by regression test | `crates/luksbox-core/src/key.rs` |\n| Argon2id (default 256 MiB / 3 / 4) | Stretches passphrases; cost params bounded by parser to reject DoS attempts | `crates/luksbox-core/src/kdf.rs` |\n| FIDO2 hmac-secret (CTAP2 sec.6.5) | Hardware-backed unlock, wrap mode or direct mode | `crates/luksbox-fido2/` |\n| TPM 2.0 sealed KEK (Linux) | Bind a vault to the local chip; optional PIN; fused TPM+FIDO2 mode | `crates/luksbox-tpm/` |\n| ML-KEM-768 / ML-KEM-1024 (FIPS 203) | Post-quantum half of every hybrid keyslot; classical+PQ mixed via HKDF | `crates/luksbox-pq/` |\n| Per-chunk AAD (`file_id || chunk_index || generation`) | Detects chunk substitution, position swap, and replay of older chunks at the same position | `crates/luksbox-vfs/src/chunk.rs` |\n| Detached header sidecar (`.hdr`) | Vault file alone is opaque random, no magic, no version, no keyslots | `crates/luksbox-format/src/container.rs` |\n| Anchor sidecar (`.anchor`) | External rollback detection via MVK-keyed HMAC over a generation counter | `crates/luksbox-format/src/anchor.rs` |\n| Lock-before-read open | Concurrent enrolls / revokes can't race on the keyslot table | `crates/luksbox-format/src/container.rs::open` |\n| Post-lock path-inode re-stat | Catches narrow open-then-rename TOCTOU swaps with `Error::PathSubstituted` | `crates/luksbox-format/src/container.rs::verify_path_inode` |\n| Atomic temp + rename + parent-dir fsync | All sidecar writes survive power loss; works on POSIX (`fsync` on dir handle) and Windows (`FILE_FLAG_BACKUP_SEMANTICS` + `FlushFileBuffers`) | `crates/luksbox-core/src/file_util.rs` |\n| `O_NOFOLLOW` on plaintext extraction | `luksbox get` refuses pre-existing symlink destinations to defeat attacker-staged symlink-target overwrites | `crates/luksbox-core/src/file_util.rs::secure_create_or_truncate` |\n| `memfd_secret(2)` for the unlocked MVK on Linux 5.14+ | Excludes the MVK from coredumps and hibernate images; `mlock` + `Zeroize` fallback elsewhere | `crates/luksbox-core/src/secret_box.rs` |\n| Workspace-wide `Zeroizing` audit on every secret-bearing intermediate | AEAD plaintext, HKDF I/O, ML-KEM shared, CLI/GUI PIN copies all scrub on drop | covered across `luksbox-core`, `luksbox-pq`, `luksbox-tpm`, `luksbox-cli` |\n\nThe full attack matrix (defended vs not defended) is at\n<https://luksbox.penthertz.com/docs/security/threat-model/>.\n\n---\n\n## Quick start\n\n```bash\n# Create a vault (defaults: AES-256-GCM-SIV, Argon2id interactive)\nluksbox create my-vault.lbx\n\n# Mount it on a drive letter / mountpoint\nluksbox mount my-vault.lbx /mnt/v       # Linux/macOS\nluksbox mount my-vault.lbx Z:           # Windows\n\n# Add a FIDO2 hardware factor\nluksbox enroll my-vault.lbx --kind fido2\n\n# Add a TPM 2.0 keyslot bound to this machine (Linux)\nluksbox enroll my-vault.lbx --kind tpm2\n\n# Hybrid post-quantum: needs a separate `.kyber` seed file\nluksbox create my-vault.lbx --kind hybrid-pq \\\n    --pq-hybrid /media/usb/my.kyber\n\n# v3 format: no per-vault size ceiling (default v2 caps around 10 GiB).\n# Old LUKSbox binaries refuse v3 vaults -- opt in only when you need\n# bigger vaults than the v2 default can hold.\nluksbox create my-vault.lbx --format v3\n\n# Migrate an existing v2 vault to v3 (source untouched)\nluksbox migrate-to-v3 old-v2.lbx --dst new-v3.lbx\n\n# Interactive walkthrough, no flags to remember\nluksbox wizard\n```\n\nThree interfaces, one on-disk format: the `luksbox` CLI for scripts,\nthe `luksbox wizard` interactive TUI, and the `luksbox-gui` desktop\napplication. See <https://luksbox.penthertz.com/docs/> for per-flow\nwalkthroughs.\n\n---\n\n## Install\n\n| Platform | Method |\n|---|---|\n| Debian / Ubuntu / Mint | `.deb` from [Releases](https://github.com/penthertz/LUKSbox/releases), `sudo apt install ./luksbox_*_amd64.deb` |\n| Fedora / RHEL / Rocky | `.rpm` from Releases, `sudo dnf install ./luksbox-*.x86_64.rpm` |\n| macOS | `.dmg` from Releases, drag to /Applications, install macFUSE on first run |\n| Windows | `LUKSboxSetup.exe` from Releases (bundles WinFsp); IT admins can use the bare `.msi` and install WinFsp separately |\n| From source | `cargo build --release -p luksbox-cli -p luksbox-gui` after the deps in [`BUILDING.md`](BUILDING.md) |\n\nThe `.deb` and `.rpm` packages now Recommend `tpm-udev` + `tpm2-tools`\n(Debian / Ubuntu) and `tpm2-tss` + `tpm2-tools` (Fedora / RHEL /\nopenSUSE), so installing them via `apt` / `dnf` brings the\n`/dev/tpm*` udev rules and the `tss` system group along for the ride.\nAfter install you still need to add yourself to the group once and\nlog back in, that is the Debian / Fedora convention for any package\nthat grants new device access:\n\n```bash\nsudo usermod -aG tss \"$USER\"\n# log out + log back in, then verify:\nid | tr , '\\n' | grep tss\n```\n\nThe Linux release tarball's `dist/install.sh --tpm-setup` does the\nsame thing for users who installed via tarball instead of `apt` /\n`dnf` and don't have `tpm-udev` / `tpm2-tss` already.\n\n---\n\n## Help find bugs\n\nLUKSbox is a young codebase. The cryptography rests on standardised\nprimitives and well-audited Rust libraries (RustCrypto, libfido2,\ntss-esapi), but the integration layer and the on-disk format are\nours. We **want** external eyes on this.\n\n### Run the fuzzers\n\nEvery parser that touches attacker-controlled bytes has a libFuzzer\nharness in [`fuzz/`](fuzz/) and an AFL++ harness in\n[`fuzz-afl/`](fuzz-afl/). PR CI runs each libFuzzer target for 5\nminutes on the persistent corpus; a dedicated server runs the AFL++\ncampaigns for hours per release.\n\n```bash\ncargo install cargo-fuzz\ncd fuzz\ncargo +nightly fuzz run header_parse -- -max_total_time=300\n```\n\nThe current target list (`header_parse`, `keyslot_parse`,\n`metadata_parse`, `hybrid_sidecar_parse`, `seed_file_parse`,\n`auth_then_process`, `header_roundtrip`, `winfsp_path_parse`,\n`webauthn_device_path`, `vfs_ops`) plus per-target invariants is in\n[`FUZZING.md`](FUZZING.md).\n\n### Add corpus seeds\n\nThe fastest way to push fuzzing further is dropping a real-world input\nfile into [`fuzz/corpus/<target_name>/`](fuzz/corpus/) and opening a\nPR. Examples that would help today:\n\n- Real headers from old vault layouts (V1 / V2) for `header_parse`\n- Authenticator-specific cred IDs (Google Titan, SoloKey stateless,\n  Trezor) for `keyslot_parse`\n- Edge-case Windows paths (UNC, network share, long path with\n  device-namespace prefix) for `winfsp_path_parse`\n- Truncated / extended `.hybrid` sidecars for `hybrid_sidecar_parse`\n\n### Add a new fuzz target\n\nIf a parser doesn't have a harness yet and you can imagine an attacker\nshaping its input, please add one. See the harness template in\n[`FUZZING.md`](FUZZING.md).\n\n### Suggest a regression test\n\nIf you spot a code path where invariants aren't tested but feel like\nthey should be, file a regular GitHub issue (label\n`security-regression`) with the invariant in plain English. We write\nthe test and credit the suggestion in the changelog.\n\n### Run the AFL++ campaign\n\n[`scripts/fuzz_server.sh`](scripts/fuzz_server.sh) runs an AFL++\ncampaign indefinitely against any target. If you have spare cycles\nand want to find something the libFuzzer 5-minute PR run misses, this\nis the lever.\n\n---\n\n## Reporting issues\n\n| Category | Channel | Priority |\n|---|---|---|\n| **Suspected vulnerability** (key recovery, plaintext disclosure, authentication bypass, FUSE/WinFsp escape, integer / memory unsafety reachable via a crafted vault file) | Email `security@penthertz.com` (PGP key in [`SECURITY.md`](SECURITY.md)). 72-hour acknowledgement SLA. **Do not** open a public issue. | **P0**, fix + advisory + coordinated disclosure |\n| **Crash on a malformed input** that you can reproduce | GitHub issue with the input file attached and the crashing target name. Use the `fuzz-crash` label. | **P1**, reproducer + regression test in next release |\n| **Functional bug** (CLI/GUI/wizard misbehaviour, mount problem, recovery-flow gap, on-disk format edge case) | GitHub issue with reproduction steps. Use the `bug` label. | **P2**, triaged within a week |\n| **Documentation issue** (wrong claim, missing instruction, broken link, unclear wording) | GitHub issue or PR. Use the `docs` label. | **P3**, fixed in the next docs pass |\n| **Feature request** | GitHub issue. Use the `feature` label. State your threat model so we can decide whether it fits the project's scope. | **P3**, discussed; may end up on the [roadmap](docs/TPM_FUTURE_IMPROVEMENTS.md) or declined with reason |\n| **Audit assignment** (you want a scoped mandate to review a specific surface) | Email `security@penthertz.com`. We hand you a focused scope (e.g. unsafe Rust in the FIDO2 FFI, CLI argument parser, FUSE adapter) plus a write-up template. | scheduled |\n\nSuspected vulnerabilities take priority over everything else. We\nrespond within 72 hours and credit reporters in the public changelog\n+ in any advisory we publish.\n\n---\n\n## Repository layout\n\n```mermaid\nflowchart LR\n    Root[\"luksbox/\"]\n    Root --> Crates[\"crates/<br/>(Rust workspace)\"]\n    Root --> Fuzz[\"fuzz/<br/>cargo-fuzz (libFuzzer)\"]\n    Root --> FuzzAfl[\"fuzz-afl/<br/>cargo-afl (AFL++)\"]\n    Root --> Assets[\"assets/<br/>repo branding\"]\n    Root --> Dist[\"dist/<br/>packaging + install.sh\"]\n    Root --> Scripts[\"scripts/<br/>release, fuzz, audit\"]\n    Root --> Docs[\"docs/<br/>spec, architecture, side-channels\"]\n    Root --> Top[\"top-level .md files\"]\n\n    Crates --> Core[\"luksbox-core<br/>crypto primitives + on-disk header\"]\n    Crates --> Format[\"luksbox-format<br/>container I/O, anchor, hybrid sidecar\"]\n    Crates --> Vfs[\"luksbox-vfs<br/>directory tree atop a Container\"]\n    Crates --> Fido2[\"luksbox-fido2<br/>libfido2 + webauthn FFI\"]\n    Crates --> Tpm[\"luksbox-tpm<br/>Linux TPM 2.0 wrap/unwrap\"]\n    Crates --> Pq[\"luksbox-pq<br/>ML-KEM-768/1024 + .kyber\"]\n    Crates --> Mount[\"luksbox-mount<br/>FUSE3, FUSE-T, WinFsp\"]\n    Crates --> Cli[\"luksbox-cli<br/>luksbox binary + wizard TUI\"]\n    Crates --> Gui[\"luksbox-gui<br/>luksbox-gui egui desktop app\"]\n\n    Top --> Building[\"BUILDING.md\"]\n    Top --> Devel[\"DEVELOPMENT.md\"]\n    Top --> Fuzzing[\"FUZZING.md\"]\n    Top --> Testing[\"TESTING.md\"]\n    Top --> Security[\"SECURITY.md\"]\n    Top --> Trademark[\"TRADEMARK.md\"]\n    Top --> License[\"LICENSE / NOTICE\"]\n```\n\n---\n\n## Documentation\n\nThe full documentation lives at <https://luksbox.penthertz.com/>:\n\n| Section | Contents |\n|---|---|\n| [Documentation hub](https://luksbox.penthertz.com/docs/) | Install + per-flow walkthroughs (CLI / TUI / GUI) |\n| [Keyslots](https://luksbox.penthertz.com/docs/keyslots/) | Passphrase, FIDO2, TPM 2.0, hybrid post-quantum |\n| [Security](https://luksbox.penthertz.com/docs/security/) | Architecture (with diagrams), threat model, cryptography, tests, audit, disclosure |\n| [Compare](https://luksbox.penthertz.com/compare/) | LUKSbox vs LUKS2 / VeraCrypt / age / gocryptfs / Cryptomator / BitLocker / FileVault |\n| [FAQ](https://luksbox.penthertz.com/docs/faq/) | Cloud use, maturity, licensing, hardware support, recovery |\n\nIn-repo references for contributors:\n\n- [`SECURITY.md`](SECURITY.md), disclosure policy + threat model summary\n- [`BUILDING.md`](BUILDING.md), per-platform build instructions\n- [`TESTING.md`](TESTING.md), test taxonomy + how to run each tier\n- [`FUZZING.md`](FUZZING.md), fuzz harness setup + target list\n- [`DEVELOPMENT.md`](DEVELOPMENT.md), maintainer dev workflow + release process\n- [`docs/CRYPTO_SPEC.md`](docs/CRYPTO_SPEC.md), per-operation cryptographic walkthrough\n- [`docs/SECURITY_ARCHITECTURE.md`](docs/SECURITY_ARCHITECTURE.md), security architecture map (mirrors the website page)\n- [`docs/HARDWARE_SIDE_CHANNEL_NOTES.md`](docs/HARDWARE_SIDE_CHANNEL_NOTES.md), published side-channel attacks against FIDO2 silicon\n- [`docs/TPM_LINUX_PERMISSIONS.md`](docs/TPM_LINUX_PERMISSIONS.md), end-user playbook for `/dev/tpmrm0` access\n- [`docs/PROJECT_OVERVIEW.md`](docs/PROJECT_OVERVIEW.md), project overview + comparison vs LUKS2 / VeraCrypt\n- [`docs/TPM_FUTURE_IMPROVEMENTS.md`](docs/TPM_FUTURE_IMPROVEMENTS.md), TPM roadmap (Windows TBS, PCR sealing)\n\n---\n\n## License\n\nSource code is licensed under the\n[Apache License, Version 2.0](LICENSE). LUKSbox is **OSI-approved\nopen source**: read the source, audit the cryptography, build it\nyourself, modify it, redistribute it, and use it in any product\nincluding commercial offerings that compete with LUKSbox. The Apache\n2.0 grant includes an explicit patent license from every contributor,\nwhich matters for a cryptography project.\n\nWhat's explicitly NOT granted by the copyright license is the right\nto use the LUKSbox or Penthertz **trademarks** in your derived work;\nsee [TRADEMARK.md](TRADEMARK.md). You can fork the code and ship it;\nyou cannot call your fork \"LUKSbox\" or imply endorsement by Penthertz.\n\nThe [NOTICE](NOTICE) file contains the attribution that downstream\nredistributors must propagate (per the license's Notices section).\n\nThe [DISCLAIMER](DISCLAIMER.md) restates the no-warranty / no-liability\nclauses (LICENSE sections 7 and 8), the data-loss reality of any\nencrypted container, and the export-control responsibility, in plain\nEnglish. Read it once before relying on LUKSbox to protect material\ninformation.\n\n---\n\n## Author\n\nMaintained by **Sébastien Dudek**, Penthertz\n([penthertz.com](https://penthertz.com),\n[@PentHertz](https://x.com/PentHertz),\n`security@penthertz.com`).\nSee [`SECURITY.md`](SECURITY.md) sec.1 for the responsible-disclosure flow.\n","summary":"LUKSbox is an open-source tool for creating encrypted “vault” files that you can store on untrusted locations like cloud storage, shared media, NAS devices, or USB drives without the host being able to read the contents. It encrypts files locally into a single opaque container, supports tamper detection during transport/storage, and includes optional separate header and post-quantum sidecar components. Access can be protected with modern hardware-backed authentication such as FIDO2 and TPM 2.0 (with additional platform options), making it suitable for users who want stronger confidentiality guarantees than provider-side encryption. It’s a good fit for anyone handling sensitive documents who needs portable, auditable encryption with security-focused integrity and post-quantum readiness.","description":"Store sensitive files in the cloud, or on shared media without trusting the host. LUKSbox is a Rust-based encrypted-container tool with passphrase, FIDO2 (YubiKey, Titan, Nitrokey, Windows Hello), TPM 2.0, and hybrid post-quantum (ML-KEM-768 / 1024) keyslots. Mounts as a real drive on Linux, macOS, and Windows.","stars":558,"language":"Rust"},{"owner":"nkzw-tech","repo":"codiff","url":"https://github.com/nkzw-tech/codiff","readme":"# Codiff\n\nCodiff is a beautiful, minimal, local diff viewer for reviewing staged and unstaged Git changes before committing.\n\n<img width=\"2824\" height=\"1856\" src=\"https://github.com/user-attachments/assets/b8cd9b57-cb7a-4d7f-8a61-9ef7f40fa6b8\" />\n\n## Why Codiff\n\n- **Fast Local Reviews:** See changes in any Git repository to review code before committing.\n- **LLM Walkthroughs:** Run `codiff -w` to ask Codex to give you a review order and more context.\n- **Inline Review Comments:** Comment directly on changed lines and copy all review comments as Markdown for follow-ups.\n\n## Download\n\nInstall with Homebrew:\n\n```bash\nbrew install --cask nkzw-tech/tap/codiff\n```\n\nDownload the latest Codiff app from [GitHub Releases](https://github.com/nkzw-tech/codiff/releases).\n\nAfter installing the app, run `Codiff > Install Terminal Helper` to make the `codiff` command available in your shell.\n\n## Command Line\n\n```bash\ncodiff\n```\n\nRun it from any Git repository, or pass a path:\n\n```bash\ncodiff /path/to/repository\n```\n\nReview a specific commit:\n\n```bash\ncodiff a1b2c3d\n```\n\nStart with an LLM-generated walkthrough order:\n\n```bash\ncodiff -w\ncodiff -w a1b2c3d\n```\n\nShow all available options:\n\n```bash\ncodiff --help\n```\n\nLaunching Codiff in multiple repositories opens a separate native window for each repository.\n\n## Command Bar\n\nOpen the command bar with <kbd>Cmd</kbd>+<kbd>Shift</kbd>+<kbd>P</kbd> on macOS, or\n<kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>P</kbd> on other platforms. Type to filter commands, use\n<kbd>Up</kbd>/<kbd>Down</kbd> to move through results, press <kbd>Enter</kbd> to run the selected\ncommand, and press <kbd>Esc</kbd> to close it.\n\nThe command bar includes actions for common review workflows:\n\n- Focus File Filter\n- Find in Diffs\n- Show File Tree, Show History, and Show Walkthrough\n- Copy Review Comments\n- Copy Review Comments and Close\n- Toggle Viewed for the currently selected file\n- Toggle Diff Layout, with the target layout action shown as the hint\n- Open the currently selected file in your e
