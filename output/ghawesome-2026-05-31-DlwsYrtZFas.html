rs on any OS | Release wheel from a terminal |\n| [Install from source](#install-from-source) | Users tracking `main` | Run from a checkout, not edit it |\n| [Develop from source](#develop-from-source) | Contributors | Edit, test, or debug the source |\n\n### Prerequisites\n\n| Requirement | Windows portable | Quick terminal install | Install from source | Develop from source |\n| --- | :---: | :---: | :---: | :---: |\n| Python 3.12+ | bundled | via `uv` | via `uv` or system | via `uv` |\n| Git + Git LFS | — | — | required | required |\n| `uv` | — | installed if missing | recommended | required |\n\nThe default `recommended` profile installs **SquillaRouter** —\nOpenSquilla's on-device model router — and its model assets;\n`OPENSQUILLA_INSTALL_PROFILE=core` omits those dependencies. The\nseparate `--router disabled` onboarding flag keeps the dependencies\ninstalled but turns the router off at runtime.\n\nOn Windows, SquillaRouter's bundled ONNX runtime also needs the Visual\nC++ runtime. The Windows portable launcher and the from-source\nPowerShell installer install it automatically via `winget`; the\n**Quick terminal install** (`uv tool install`) path does not — if\nstartup logs a `DLL load failed` error, install it manually (see\n[Troubleshooting](#troubleshooting)). OpenSquilla keeps running with\ndirect single-model routing until it is installed.\n\nInstall links: [Git](https://git-scm.com/downloads) ·\n[Git LFS](https://git-lfs.com/) ·\n[uv](https://docs.astral.sh/uv/getting-started/installation/).\n\n### Windows portable (no Python)\n\nThe fastest path on Windows — the zip ships a bundled CPython runtime,\nso no separate Python install is required.\n\n1. Download the current portable zip:\n   <https://github.com/opensquilla/opensquilla/releases/latest/download/OpenSquilla-windows-x64-portable.zip>\n2. Extract it to a writable folder such as Downloads or Documents,\n   then right-click `Start OpenSquilla.cmd` and choose **Run as\n   administrator**.\n3. Complete the first-run setup, then open <http://127.0.0.1:18791/control/>.\n\n> [!NOTE]\n> Preview builds are unsigned; administrator launch is the supported\n> path. If SmartScreen appears, choose **More info** → **Run anyway**.\n> If Smart App Control or enterprise policy blocks the unsigned app,\n> use [Quick terminal install](#quick-terminal-install) instead.\n\n<details>\n<summary>Advanced portable usage</summary>\n\nProvide an OpenRouter key before first start:\n\n```powershell\n$env:OPENROUTER_API_KEY=\"sk-...\"\nSet-ExecutionPolicy -Scope Process Bypass\n.\\start.ps1\n```\n\nIf `OPENROUTER_API_KEY` is set and no local config exists, the launcher\nwrites an env-reference config and starts the gateway without\nprompting. If unset, the onboarding wizard lets you pick any supported\nprovider.\n\nThe portable zip does not install a global `opensquilla` command. For a\nterminal where `opensquilla …` works, run `OpenSquilla Shell.cmd`, or\ncall the bundled launcher directly:\n\n```powershell\n.\\opensquilla.cmd onboard --provider openrouter --api-key-env OPENROUTER_API_KEY\n```\n\n</details>\n\n### Quick terminal install\n\nThe recommended path on Windows, macOS, and Linux. `uv` installs\nOpenSquilla into its own isolated environment and manages its own\nPython — no system Python required. This path installs published\nreleases only; for `main`, development branches, or local checkouts\nuse [Install from source](#install-from-source).\n\n**1. Install `uv`** — skip if `uv --version` already works.\n\nLinux / macOS:\n\n```sh\ncurl -LsSf https://astral.sh/uv/install.sh | sh\n. \"$HOME/.local/bin/env\"\n```\n\nWindows PowerShell:\n\n```powershell\npowershell -c \"irm https://astral.sh/uv/install.ps1 | iex\"\n$env:Path = \"$env:USERPROFILE\\.local\\bin;\" + $env:Path\n```\n\n**2. Install OpenSquilla** — the same command on every platform.\n\n```sh\nuv tool install --python 3.12 \"opensquilla[recommended] @ https://github.com/opensquilla/opensquilla/releases/download/v0.2.1/opensquilla-0.2.1-py3-none-any.whl\"\n```\n\nThis installs the OpenSquilla wheel from the release URL, then lets\n`uv` download the dependencies declared by the selected extras. The\ndefault `recommended` extra includes SquillaRouter runtime dependencies\nsuch as ONNX Runtime, LightGBM, NumPy, and tokenizers, so a first install\nneeds network access unless those wheels are already cached.\n\n**3. Configure and run.**\n\n```sh\nopensquilla onboard\nopensquilla gateway run\n```\n\n> [!NOTE]\n> If `opensquilla` is not found right after a fresh `uv` install, open\n> a new terminal, or re-run the PATH line from step 1.\n\nFor a fully pinned install, use the versioned wheel URL:\n`https://github.com/opensquilla/opensquilla/releases/download/v0.2.1/opensquilla-0.2.1-py3-none-any.whl`.\n\n### Install from source\n\nUse this path to run OpenSquilla from a checkout without editing it.\nThe clone is only the package source for the installer; after install,\nuse the `opensquilla` command — do not run `uv run`. Choose\n[Develop from source](#develop-from-source) instead if you intend to\nmodify the code.\n\n1. **Clone with LFS assets**\n\n   ```sh\n   git lfs install\n   git clone https://github.com/opensquilla/opensquilla.git\n   cd opensquilla\n   git lfs pull --include=\"src/opensquilla/squilla_router/models/**\"\n   ```\n\n2. **Run the installer**\n\n   **macOS / Linux**\n\n   ```sh\n   bash scripts/install_source.sh\n   ```\n\n   **Windows PowerShell**\n\n   ```powershell\n   powershell -ExecutionPolicy Bypass -File ./scripts/install_source.ps1\n   ```\n\n   The script installs `.[recommended]` (SquillaRouter + memory + local\n   models) into a dedicated user environment via `uv tool install`,\n   falling back to `python -m pip install --user` when `uv` is\n   unavailable. Open a new terminal if `opensquilla` is not on `PATH`\n   after install.\n\n3. **(optional) Install advanced extras.** Most channels — Feishu,\n   Telegram, DingTalk, QQ, WeCom, Slack, and Discord — work from the\n   base install. The opt-in extras are:\n\n   - `matrix` — Matrix channel (pulls in `matrix-nio`)\n   - `matrix-e2e` — Matrix channel with end-to-end encryption (requires\n     libolm)\n   - `document-extras` — PDF generation via WeasyPrint\n\n   ```sh\n   OPENSQUILLA_INSTALL_EXTRAS=matrix bash scripts/install_source.sh        # macOS / Linux\n   ```\n\n   ```powershell\n   powershell -ExecutionPolicy Bypass -File ./scripts/install_source.ps1 -Extras matrix   # Windows\n   ```\n\n4. **Configure and run** — see [Configuration](#configuration).\n\n<details>\n<summary>Install from source — terminal prerequisites and installer options</summary>\n\n**Install prerequisites (Git, Git LFS, uv) from a terminal**\n\nWindows PowerShell:\n\n```powershell\nwinget install --id Git.Git -e\nwinget install --id GitHub.GitLFS -e\npowershell -ExecutionPolicy Bypass -c \"irm https://astral.sh/uv/install.ps1 | iex\"\ngit lfs install\n```\n\nmacOS (Homebrew):\n\n```sh\nbrew install git git-lfs uv\ngit lfs install\n```\n\nDebian / Ubuntu:\n\n```sh\nsudo apt update && sudo apt install -y git git-lfs\ncurl -LsSf https://astral.sh/uv/install.sh | sh\ngit lfs install\n```\n\nOn Fedora use `sudo dnf install -y git git-lfs`; on Arch use\n`sudo pacman -S --needed git git-lfs`; then install `uv` with the\n`curl` command above. PATH changes from these installers apply to new\nterminal sessions.\n\n**Installer environment variables and PATH checks**\n\n```sh\nOPENSQUILLA_INSTALL_PROFILE=core   bash scripts/install_source.sh   # minimal runtime, no SquillaRouter\nOPENSQUILLA_INSTALL_DRY_RUN=1      bash scripts/install_source.sh   # print the plan only\n```\n\nVerify which `opensquilla` your shell runs with `command -v\nopensquilla` (macOS/Linux) or `where.exe opensquilla` (Windows). If it\nis not on `PATH`, run `uv tool update-shell`. After reinstalling from a\nlocal checkout, restart the gateway so it loads the updated package.\n\n</details>\n\n### Develop from source\n\nUse this path when you are working on OpenSquilla's source code:\nmaking changes, running tests, or debugging behavior against this\ncheckout. It is not the normal install path. Unlike\n[Install from source](#install-from-source), this path requires `uv`:\n`uv sync` creates a repository-local `.venv`, and `uv run` executes\ncommands against the files in this checkout.\n\n```sh\nuv sync --extra recommended --extra dev\nuv run opensquilla --help\n```\n\nThe `recommended` extra includes SquillaRouter for development too;\nthe `dev` extra installs the test, lint, and typecheck tools. Install\nadditional extras into the same environment you run:\n\n```sh\nuv sync --extra recommended --extra dev --extra matrix\nuv run opensquilla channels status matrix --json\n```\n\nIn this mode, prefix every `opensquilla` command in\n[Configuration](#configuration) with `uv run`. Do not debug a\ndevelopment checkout through a user-local `opensquilla` command — that\ncommand runs in a different Python environment.\n\n---\n\n## Configuration\n\n### First-run setup\n\n`opensquilla onboard` is the interactive first-run wizard. It writes\nthe active config file and keeps provider secrets in environment\nvariables when you pass `--api-key-env`. The router defaults to\n`recommended` (SquillaRouter on supported providers); pass\n`--router disabled` for direct single-model routing.\n\n```sh\nopensquilla onboard                # full interactive wizard\nopensquilla onboard --if-needed    # idempotent: safe for scripts and re-installs\nopensquilla onboard --minimal      # provider only; skip channels and search\n```\n\nIn SSH, CI, or any environment without a TTY, use the non-interactive\nform — keep the secret in the environment and pass its **name**, not\nits value:\n\n**Linux / macOS**\n\n```sh\nexport OPENROUTER_API_KEY=\"sk-...\"\nopensquilla onboard --provider openrouter --api-key-env OPENROUTER_API_KEY\n```\n\n**Windows PowerShell**\n\n```powershell\n$env:OPENROUTER_API_KEY=\"sk-...\"\nopensquilla onboard --provider openrouter --api-key-env OPENROUTER_API_KEY\n```\n\nOpenRouter is only an example — substitute any supported provider and\nits API-key variable.\n\nRe-configure one section later without redoing the whole wizard (these\nexamples assume the relevant API key is already in the environment):\n\n```sh\nopensquilla configure provider --provider openai --model gpt-4o --api-key-env OPENAI_API_KEY\nopensquilla configure router --router recommended\nopensquilla configure search   --search-provider brave --api-key-env BRAVE_SEARCH_API_KEY\nopensquilla configure channels\n```\n\nSections: `provider`, `router`, `channels`, `search`,\n`image-generation`, `memory-embedding`. The Web UI exposes the same\nflow at `/control/setup`.\n\n**Config load order:** `OPENSQUILLA_GATEWAY_CONFIG_PATH` →\n`./opensquilla.toml` → `~/.opensquilla/config.toml` → built-in\ndefaults. Environment values for individual secrets always win over\nfile values.\n\n### Migrate from OpenClaw or Hermes Agent\n\nIf you already have state under `~/.openclaw` or `~/.hermes`, run a\ndry run first to inspect the migration report, then apply it explicitly:\n\n```sh\nopensquilla migrate openclaw --json\nopensquilla migrate openclaw --apply\n\nopensquilla migrate hermes --json\nopensquilla migrate hermes --apply\n```\n\nUse `opensquilla migrate --source openclaw,hermes --apply` to import\nboth default homes. Add `--migrate-secrets` only after reviewing the dry-run\nreport. See [`MIGRATION.md`](MIGRATION.md) for custom paths and conflict\nhandling.\n\n### Run\n\n```sh\nopensquilla gateway run                # foreground, 127.0.0.1:18791\nopensquilla gateway start --json       # background + health wait\nopensquilla chat                       # interactive REPL\nopensquilla agent -m \"your prompt\"     # one-shot, automation-friendly\n```\n\nOpen the Web UI at <http://127.0.0.1:18791/control/> and check health\nwith `curl http://127.0.0.1:18791/health`. Press `Ctrl+C` to stop a\nforeground gateway.\n\nOther command groups include `sessions`, `skills`, `memory`, `migrate`,\n`cron`, `channels`, `providers`, `models`, and `cost`. Run\n`opensquilla --help` or `opensquilla <group> --help` for details.\n\n<details>\n<summary>Advanced configuration — verify a channel, public network binding, Docker</summary>\n\n**Connect and verify a messaging channel**\n\nChannel saves are config changes, not runtime-connectivity proof.\nRestart the gateway after channel edits, then verify the live channel:\n\n```sh\nopensquilla gateway restart\nopensquilla channels status <name> --json\n```\n\nTreat a channel as connected only when the status payload reports\n`enabled=true`, `configured=true`, and `connected=true`. Feishu\ndefaults to websocket mode and Telegram to polling — neither needs a\npublic URL. Feishu webhook mode, Telegram webhook mode, Slack, and\nWeCom require a public, provider-reachable URL.\n\n**Public network binding**\n\nTo reach the Web UI from another machine, bind the gateway to all\ninterfaces and use the host's public IP:\n\n```sh\nopensquilla gateway run --listen 0.0.0.0 --port 18791\n```\n\nPublic access also requires the host firewall or cloud security group\nto allow inbound TCP on that port. Do not expose the gateway with\n`[auth] mode = \"none\"` — configure token auth before binding to\n`0.0.0.0`.\n\n**Docker**\n\nThe compose path runs an `opensquilla:local` image you build yourself.\nBuild it from a source checkout with the Git LFS router assets pulled\n(see [Install from source](#install-from-source) for the clone and\n`git lfs pull`):\n\n```sh\ndocker build -t opensquilla:local .\n```\n\n`./start.sh` (or `start.ps1` on Windows) then runs `docker compose\nup -d` and tails the gateway logs. Docker avoids a host Python\ntoolchain — not the local image build.\n\n</details>\n\nProvider tiers, sandbox tuning, image generation, and concurrency\nsettings live in `opensquilla.toml.example`.\n\n---\n\n## What's New in 0.2.1\n\nOpenSquilla 0.2.1 is a maintenance release focused on release-package\nstartup and long-running agent reliability:\n\n- **Windows portable startup** — the portable launcher better detects and\n  bootstraps the Visual C++ runtime needed by the bundled ONNX router.\n- **Long-running agent turns** — tool-heavy WebUI sessions recover more\n  cleanly from oversized tool results, malformed tool calls, artifact\n  delivery handoffs, and degraded final responses.\n- **Cleaner WebUI output** — generated artifact markers are kept out of\n  normal chat replay while delivered files remain visible.\n- **Memory recall scoring** — local and OpenAI-compatible embedding vectors\n  are normalized before semantic search, and strong keyword matches remain\n  usable when vector scores are low.\n\nFull notes: [`CHANGELOG.md`](CHANGELOG.md) ·\n[release notes](https://opensquilla.ai/news/).\n\n## What's New in 0.2.0\n\nThis release expands OpenSquilla across migration, CLI chat, channels,\nscheduling, and long-running tool work:\n\n- **Migration path from existing agent homes** — `opensquilla migrate` previews\n  and applies imports from existing OpenClaw/Hermes homes, including memory,\n  persona files, skills, MCP/channel config, conflict handling, and migration\n  reports.\n- **Usable chat CLI** — `opensquilla chat` now has a persistent terminal UI,\n  streaming output, queued input, slash-mode discovery, tool/status strips, and\n  more deterministic live prompt behavior.\n- **Cross-surface cron automation** — cron jobs now cover structured schedules,\n  timezone-aware exact/every/cron runs, channel or webhook delivery, failure\n  destinations, manual runs, and WebUI/CLI/RPC parity.\n- **Better Feishu and Discord channels** — channel adapters expose clearer\n  capability metadata, safer DM/group handling, native file and artifact paths,\n  and improved attachment/thread behavior while privileged actions stay scoped.\n- **Sturdier long-running turns** — failed turns are kept out of provider\n  replay, malformed tool calls are handled more safely, and approval-gated\n  retries wait for operator decisions.\n- **Smarter context and tool budgeting** — provider-budget compaction, prompt\n  cache preservation, bounded tool results, and side-effect-aware concurrency\n  make large tool-heavy sessions more predictable.\n- **Web UI and release polish** — recency ordering, table layout, mobile\n  controls, duplicate notifications, setup forms, release URLs, and install\n  paths are tightened for 0.2.0.\n\nFull notes: [`CHANGELOG.md`](CHANGELOG.md) ·\n[release notes](https://opensquilla.ai/news/).\n\n---\n\n## Key Features\n\n| Capability | What it does |\n| --- | --- |\n| **Token-efficient routing** | `SquillaRouter` — a local LightGBM + ONNX classifier in the `recommended` extra — scores each turn on length, language, code, keywords, and semantic embeddings, then routes it across four tiers (T0–T3) to the cheapest capable model. Classification runs on-device; your prompt never leaves the machine to make that decision. |\n| **Adaptive reasoning and prompts** | OpenSquilla requests extended reasoning only for turns the router scores as complex, and the system prompt scales with task complexity — lightweight for trivial turns, full instructions for complex ones. |\n| **20+ LLM providers** | The provider registry targets 20+ LLM backends — OpenRouter, OpenAI, Anthropic, Ollama, DeepSeek, Gemini, DashScope/Qwen, Moonshot, Mistral, Groq, Zhipu, SiliconFlow, vLLM, LM Studio, and more, with primary-plus-fallback selection; first-run onboarding exposes the verified subset. |\n| **On-demand skills and MCP** | 15 bundled skills (coding, GitHub, cron, pptx/docx/xlsx/pdf, summarization, tmux, weather, and more) load only when the task needs them. OpenSquilla is an MCP client, and can also run as an MCP server — `opensquilla mcp-server run` needs the `mcp` extra (install `opensquilla[recommended,mcp]`). Skills can be authored, installed, and published from the CLI. |\n| **Persistent local memory** | A curated `MEMORY.md` plus dated Markdown notes, searched with SQLite full-text keyword search and `sqlite-vec` semantic recall. Embeddings run on-device via bundled ONNX, or swap to OpenAI/Ollama. Optional exponential decay and opt-in \"dream\" consolidation are available. |\n| **Layered security sandbox** | Three policy tiers (Standard / Strict / Locked) on a permission matrix. Bubblewrap isolates code execution on Linux; the macOS Seatbelt backend currently renders profiles only (execution pending), and there is no sandbox backend on Windows yet. A denial ledger auto-pauses autonomous runs after repeated denials, rejected outputs are purged, and skill metadata and tool results are XML-escaped against prompt injection. |\n| **Built-in tools** | File read/write/edit, shell and background processes, git, web search (Brave or DuckDuckGo) and fetch behind an SSRF guard, spreadsheet/PPTX/PDF authoring, image generation, and text-to-speech. |\n| **Unified gateway** | A Starlette ASGI server on `127.0.0.1:18791` with WebSocket RPC and an embedded control console (`/control/`). Web UI, CLI, and channels for Terminal, WebSocket, Slack, Telegram, Discord, Feishu, DingTalk, WeCom, Matrix, and QQ all share one `TurnRunner`. |\n| **Durable sessions, subagents, and scheduling** | SQLite-backed session, transcript, and replay storage with per-agent workspaces. Agents spawn depth-bounded subagents, and a `SchedulerEngine` with an in-tree cron parser runs recurring jobs via `opensquilla cron`. |\n| **Operator controls** | Human-in-the-loop approvals can pause sensitive tool calls for a decision; per-turn and per-session token and cost rollups (`opensquilla cost`) and diagnostics are available from the CLI and Web UI. |\n\n---\n\n## Benchmark Results\n\nPinchBench 1.2.1 average results across 25 tasks:\n\n| Agent | Base Model | Avg. score | Total input tokens | Total output tokens | Total cost |\n| --- | ---: | ---: | ---: | ---: | ---: |\n| OpenSquilla | Model router (Opus4.7, GLM5.1, DS4 Flash) | 0.9251 | 1,721,328 | 61,475 | $0.688 |\n| OpenClaw | Claude Opus 4.7 | 0.9255 | 3,066,243 | 50,890 | $6.233 |\n\nScore is the mean across the 25 tasks; token counts and cost are\ntotals for the full run.\n\n---\n\n## Troubleshooting\n\n<details>\n<summary>Windows: <code>DLL load failed</code> / Visual C++ runtime</summary>\n\nIf startup logs `DLL load failed while importing\nonnxruntime_pybind11_state`, OpenSquilla keeps running with direct\nsingle-model routing, but the bundled `SquillaRouter` runtime stays\ninactive until the Visual C++ Redistributable for Visual Studio\n2015–2022 (x64) is installed.\n\nThe Windows portable launcher and the from-source PowerShell installer\nattempt to install the redistributable via `winget`. If you used Quick\nterminal install, or `winget` is unavailable, install it manually and\nrestart PowerShell: <https://aka.ms/vs/17/release/vc_redist.x64.exe>.\nThen restore the recommended router:\n\n```powershell\nopensquilla onboard --provider openrouter --api-key-env OPENROUTER_API_KEY --router recommended\nopensquilla gateway restart\n```\n\n</details>\n\n---\n\n## Credits\n\nOpenSquilla is inspired by\n[OpenClaw](https://github.com/openclaw/openclaw). Bundled third-party\ncontent is attributed in\n[`THIRD_PARTY_NOTICES.md`](THIRD_PARTY_NOTICES.md).\n\n---\n\n## Contributing\n\nContributions of every kind are welcome — bug reports, feature ideas,\ndocumentation, new provider or channel adapters, skills, and core\nruntime work. See [`CONTRIBUTING.md`](CONTRIBUTING.md), then open an\nissue or pull request on\n[GitHub](https://github.com/opensquilla/opensquilla).\n\n[Code of Conduct](CODE_OF_CONDUCT.md) · [Security](SECURITY.md) ·\n[Support](SUPPORT.md) · [License](LICENSE) (Apache-2.0)\n","summary":"OpenSquilla is an open-source, token-efficient “microkernel” AI agent that runs a single shared turn loop across a CLI, Web UI, and chat channels. It uses an on-device model router to send each turn to the most cost-effective model that can handle the task, while supporting persistent memory, a layered sandbox, built-in web search, and embeddings. A pluggable provider layer lets it work with OpenRouter, OpenAI, Anthropic, Ollama, DeepSeek, Gemini, and many others without changing your integration setup. It’s well-suited for developers and teams who want consistent tool dispatch, retries, and logging across multiple interfaces while reducing LLM spend and improving result quality.","description":"OpenSquilla — Token-Efficient AI Agent with same budget, higher intelligence density","stars":2136,"language":"Python"},{"owner":"alvinunreal","repo":"openpets","url":"https://github.com/alvinunreal/openpets","readme":"<p align=\"center\">\n  <img src=\"assets/openpets.png\" alt=\"OpenPets - pixel art desktop companion\" width=\"100%\" />\n</p>\n\n<p align=\"center\">\n  <strong>A tiny desktop companion that keeps you company.</strong>\n</p>\n\n<p align=\"center\">\n  A playful pet that lives on your desktop, keeps you company, and can grow with bundled abilities and developer integrations.\n</p>\n\n<p align=\"center\">\n  <img src=\"assets/intro.png\" alt=\"OpenPets reacting across multiple coding agent sessions\" width=\"100%\" />\n</p>\n\n<div align=\"center\">\n  <p><sub>by <b>Boring Dystopia Development</b></sub></p>\n  <p>\n    <a href=\"https://boringdystopia.ai/\"><img src=\"https://img.shields.io/badge/boringdystopia.ai-111111?style=for-the-badge&logo=vercel&logoColor=white\" alt=\"boringdystopia.ai\"></a>&nbsp;\n    <a href=\"https://x.com/alvinunreal\"><img src=\"https://img.shields.io/badge/X-@alvinunreal-000000?style=for-the-badge&logo=x&logoColor=white\" alt=\"X @alvinunreal\"></a>&nbsp;\n    <a href=\"https://t.me/boringdystopiadevelopment\"><img src=\"https://img.shields.io/badge/Telegram-Join%20channel-2CA5E0?style=for-the-badge&logo=telegram&logoColor=white\" alt=\"Telegram Join channel\"></a>&nbsp;\n  </p>\n</div>\n\n\n\n---\n\n## 2-minute Quick Start\n\nDownload and launch the desktop app from [OpenPets Releases](https://github.com/alvinunreal/openpets/releases/latest). A companion pet appears immediately; bundled abilities make it feel alive without requiring an agent setup.\n\nIf you also want coding-agent integration, install the OpenPets Agent Skill with [skills.sh](https://skills.sh/):\n\n```bash\nnpx skills add alvinunreal/openpets --skill openpets\n```\n\nThen open Claude Code, OpenCode, Codex, or another skill-aware agent and say:\n\n```text\nUse the OpenPets skill. Install OpenPets for me, connect this agent, and verify the integration works.\n```\n\nFor project setup, open your agent inside the repo and say:\n\n```text\nUse the OpenPets skill. Help me choose or install a pet, configure it for this project, and verify the project integration.\n```\n\nUseful prompts:\n\n```text\nUse the OpenPets skill. Configure this project for Claude Code with a pet.\nUse the OpenPets skill. Configure this project for OpenCode with a pet.\nUse the OpenPets skill. Debug why openpets_status is unavailable.\n```\n\n## Star OpenPets\n\nHere is an extra GIF of me starring my own repo to encourage you to do the same. If OpenPets makes your coding setup a little more fun, please give the repo a star.\n\n<p align=\"center\">\n  <img src=\"assets/star-repo.gif\" alt=\"Starring the OpenPets repository\" width=\"100%\" />\n</p>\n\n## What is OpenPets?\n\nOpenPets is a tray-first desktop companion app. A pet appears on your desktop, keeps you company, and can use bundled abilities for ambient presence, breaks, playful actions, and focus sessions. Coding-agent integrations are still supported as an advanced developer layer.\n\n- **Desktop companion** - a small pet that idles, reacts, and gives OpenPets a friendly presence even before developer tools are configured.\n- **Bundled abilities** - first-party plugins can add ambient check-ins, break nudges, playful pet actions, focus timers, safe little walks, and optional developer notifications.\n- **Developer integrations** - advanced setup for Claude Code, OpenCode, Cursor, Pi, and MCP-capable tools when you want coding activity to drive the pet.\n- **MCP ready** - any MCP-capable agent can send short safe speech bubbles and reactions through the OpenPets MCP server.\n- **Pet-pack friendly** - loads installed animated pet packs and can route a selected agent/project to its own pet window.\n- **Privacy-conscious by design** - automatic hook speech is static and local; prompts, code, logs, command output, URLs, paths, and secrets are not shown in bubbles.\n\n## Manage your pets\n\nBrowse installed pets, preview their animations, and choose which companion should follow each coding agent from the OpenPets desktop app.\n\n<p align=\"center\">\n  <img src=\"assets/manage-pets.png\" alt=\"Managing pets in the OpenPets desktop app\" width=\"100%\" />\n</p>\n\n## Quick start\n\nInstall the desktop app, then optionally connect your coding agent.\n\n### 1. Install OpenPets Desktop\n\nDownload the latest app from [OpenPets Releases](https://github.com/alvinunreal/openpets/releases/latest):\n\n- **macOS Apple Silicon**: `OpenPets-*-mac-arm64.dmg`\n- **macOS Intel**: `OpenPets-*-mac-x64.dmg`\n- **Windows**: `OpenPets-*-win-x64-setup.exe`\n- **Linux**: `OpenPets-*-linux-x86_64.AppImage`\n\nLaunch OpenPets. You should see the desktop pet and the OpenPets tray/menu-bar icon.\n\n> Current builds may be unsigned. macOS or Windows may show a security warning the first time you open the app.\n\nIf macOS says the app is damaged or should be moved to Trash, remove the quarantine flag and open it again:\n\n```bash\nxattr -dr com.apple.quarantine /Applications/OpenPets.app\nopen /Applications/OpenPets.app\n```\n\n### 2. Optional: connect your agent\n\nUse the desktop **Integrations** screen for global setup when available:\n\n- **Claude Code** - installs OpenPets MCP, Claude memory instructions, and optional Claude hooks.\n- **OpenCode** - installs OpenPets MCP, an OpenCode instruction file, and the `@open-pets/opencode` plugin.\n\n<p align=\"center\">\n  <img src=\"assets/integrations.png\" alt=\"OpenPets desktop integrations screen\" width=\"100%\" />\n</p>\n\nFor project-local setup, run the CLI from the project you want to configure:\n\n```bash\nnpx -y @open-pets/cli@latest configure --agent claude --pet <petId>\nnpx -y @open-pets/cli@latest configure --agent opencode --pet <petId>\n```\n\nIf you prefer a permanent `openpets` shell command, install the CLI once with `npm install -g @open-pets/cli` and replace `npx -y @open-pets/cli@latest` with `openpets`.\n\nProject-local setup can create project files such as `.claude/settings.local.json` or `.opencode/opencode.jsonc`. Review them before committing because they may include the selected pet id.\n\n## Advanced: agent integrations\n\nOpenPets integrations have three layers:\n\n1. **MCP tools** for explicit agent actions.\n2. **Agent instructions** so agents know when to use those tools.\n3. **Hooks/plugins** for automatic decorative reactions during normal agent work.\n\n### Claude Code\n\nClaude Code integration supports:\n\n- `openpets` MCP setup via Claude Code.\n- Managed Claude memory instructions in `~/.claude/CLAUDE.md` and `~/.claude/openpets.md`.\n- Managed Claude hooks in `~/.claude/settings.json`.\n- Project-local setup through `npx -y @open-pets/cli@latest configure --agent claude --pet <petId>` or the optional global `openpets` CLI.\n\nTypical global MCP command shape:\n\n```bash\nclaude mcp add --scope user openpets -- npx -y @open-pets/mcp@latest\n```\n\nWith a selected pet:\n\n```bash\nclaude mcp add --scope user openpets -- npx -y @open-pets/mcp@latest --pet <petId>\n```\n\nSee [`docs/claude-integration.md`](docs/claude-integration.md) for the full file layout, hook mapping, project-local behavior, and safety rules.\n\n### OpenCode\n\nOpenCode integration supports:\n\n- An MCP entry using `@open-pets/cli mcp`.\n- A managed `openpets.md` instruction file.\n- The `@open-pets/opencode` plugin for automatic reactions.\n- Global desktop setup and project-local `.opencode` setup.\n\nProject-local setup:\n\n```bash\nnpx -y @open-pets/cli@latest configure --agent opencode --pet <petId>\n```\n\nSee [`docs/opencode.md`](docs/opencode.md) for global config selection, plugin behavior, project-local setup, and safety rules.\n\n### Generic MCP clients\n\nAny MCP-capable editor or coding agent can talk to OpenPets through the MCP server while the desktop app is running.\n\n```json\n{\n  \"mcpServers\": {\n    \"openpets\": {\n      \"type\": \"stdio\",\n      \"command\": \"npx\",\n      \"args\": [\"-y\", \"@open-pets/mcp@latest\"]\n    }\n  }\n}\n```\n\nTo target a specific installed non-default pet:\n\n```json\n{\n  \"mcpServers\": {\n    \"openpets\": {\n      \"type\": \"stdio\",\n      \"command\": \"npx\",\n      \"args\": [\"-y\", \"@open-pets/mcp@latest\", \"--pet\", \"<petId>\"]\n    }\n  }\n}\n```\n\nAvailable MCP tools:\n\n- `openpets_status` - check whether OpenPets is reachable and which pet is targeted.\n- `openpets_react` - set a short reaction on the target pet.\n- `openpets_say` - show a short safe speech bubble, optionally with a reaction.\n\n`openpets_say` messages must be short, single-line, and must not look like code, logs, secrets, URLs, or file paths.\n\n## How it works\n\n```text\nClaude Code / OpenCode / Pi / MCP client\n  -> @open-pets/mcp, @open-pets/cli mcp, @open-pets/claude hook, @open-pets/opencode plugin, or @open-pets/pi extension\n  -> @open-pets/client\n  -> OpenPets desktop local IPC discovery file\n  -> OpenPets desktop IPC socket/pipe\n  -> default pet or selected agent pet window\n```\n\nThe desktop app writes a local discovery file containing an IPC endpoint and a per-run token. Clients must send that token with every request.\n\nFor Windows desktop + WSL agent setups, see [`docs/wsl-ipc.md`](docs/wsl-ipc.md) for the opt-in TCP transport.\n\nWhen an integration is configured with `--pet <petId>`, OpenPets asks the desktop app for a short-lived lease. Valid installed non-default pets open as explicit agent pet windows. Missing, invalid, broken, built-in, or default pet requests fall back to the desktop default pet.\n\n## Reactions and speech\n\nAutomatic hooks are decorative and best-effort. They do not approve, deny, block, or change agent behavior.\n\nCommon reaction mapping:\n\n| Agent activity | Reaction |\n| --- | --- |\n| Prompt/chat starts | `thinking` |\n| File edit/write/patch | `editing` |\n| Test-like shell command | `testing` |\n| Permission request | `waiting` |\n| Successful idle/stop | `success` |\n| Session/error stop | `error` |\n\nGeneric shell activity is intentionally quiet by default. Hook/plugin speech is throttled and selected from local static message pools such as `Approval needed` or `Something failed`.\n\n### Pi extension package\n\nOpenPets includes an experimental Pi extension package at `@open-pets/pi`. Pi support is extension-first rather than MCP-first: the extension listens to Pi lifecycle/tool events and sends local best-effort reactions through `@open-pets/client`.\n\n```bash\npi install npm:@open-pets/pi\npi install -l npm:@open-pets/pi\n```\n\nInside Pi, the extension registers `/openpets status`, `/openpets test`, `/openpets react <reaction>`, and `/openpets say <message>`. Automatic events do not forward prompts, assistant text, tool output, file contents, paths, URLs, or secrets. Real Pi CLI install validation is still required before marking the integration fully supported.\n\n## Development\n\n### Requirements\n\n- Node.js 20+\n- pnpm 11+\n- TypeScript\n\nNo Bun runtime is required for development.\n\n### Install\n\n```bash\npnpm install\n```\n\n### Run the desktop app\n\n```bash\npnpm dev:desktop\n```\n\nEquivalent package command:\n\n```bash\npnpm --filter @open-pets/desktop dev\n```\n\n### Checks\n\n```bash\npnpm check\npnpm typecheck\npnpm build\npnpm test\n```\n\nOpenPets currently uses lightweight Node contract checks instead of a full test framework. See [`docs/testing.md`](docs/testing.md).\n\n### Package desktop builds\n\n```bash\npnpm package:desktop:dir\npnpm package:desktop\n```\n\nRelease process details live in [`docs/release.md`](docs/release.md).\n\n## Workspace layout\n\n```text\napps/desktop              Electron desktop app\npackages/client           @open-pets/client, local IPC client\npackages/mcp              @open-pets/mcp, MCP stdio server\npackages/claude           @open-pets/claude, Claude command and hook helpers\npackages/opencode         @open-pets/opencode, OpenCode config and plugin integration\npackages/pi               @open-pets/pi, Pi extension package\npackages/agent-events     Shared safe agent event speech helpers\npackages/cli              @open-pets/cli, user-run CLI and MCP/hook entrypoints\npackages/pet-format       @open-pets/pet-format, pet/catalog format types\ndocs/                     Documentation\n```\n\n## Documentation\n\n- [`docs/claude-integration.md`](docs/claude-integration.md) - Claude Code setup, MCP, memory, hooks, and safety.\n- [`docs/opencode.md`](docs/opencode.md) - OpenCode global/project setup, plugin behavior, and safety.\n- [`docs/wsl-ipc.md`](docs/wsl-ipc.md) - Windows desktop + WSL MCP transport setup.\n- [`docs/testing.md`](docs/testing.md) - test/check strategy.\n- [`docs/release.md`](docs/release.md) - desktop release process.\n- [`docs/workflow.md`](docs/workflow.md) - project workflow notes.\n\n## Safety and privacy notes\n\n- OpenPets local IPC is local-only and protected by a per-run token.\n- Hook/plugin errors are swallowed unless debug logging is enabled.\n- Automatic speech is static and local; it does not include model-generated prompt text.\n- Tool inputs and command text are used only for coarse reaction classification.\n- Managed setup preserves unrelated user config and removes only OpenPets-managed entries.\n- Speech validation rejects code-like, secret-like, URL-like, path-like, or multiline messages.\n","summary":"OpenPets is a tray-first desktop companion that places a playful, reactive pet on your desktop to keep you company. It comes with bundled abilities for ambient presence like check-ins, break nudges, focus timers, and other lighthearted behaviors, and it also supports optional developer integrations for coding agents. The project is especially useful for developers who use agent-driven coding tools (including MCP-capable agents) and want their workspace to feel more human and engaging without exposing sensitive information in on-screen chat bubbles.","description":"Desktop pets for AI coding agents. Install pets, connect Claude Code via MCP, and see live coding status on your desktop.","stars":988,"language":"TypeScript"},{"owner":"bytedance","repo":"Lance","url":"https://github.com/bytedance/Lance","readme":"<div align=\"center\">\n  <img src=\"assets/logo/lance-logo.webp\" alt=\"Lance logo\" width=\"300\">\n\n  <h1 align=\"center\"><sup>Lance: Unified Multimodal Modeling by Multi-Task Synergy</sup></h1>\n  <p>\n    <strong>\n    <a href=\"https://scholar.google.com.hk/citations?user=FXxoQlsAAAAJ&hl=zh-CN&oi=ao\" style=\"text-decoration: none; color: inherit;\">Fengyi Fu</a><sup>*</sup>,\n    <a href=\"https://corleone-huang.github.io/\" style=\"text-decoration: none; color: inherit;\">Mengqi Huang</a><sup>*,✉</sup>,\n    <a href=\"https://scholar.google.com.hk/citations?user=9ER6nVkAAAAJ&hl=zh-CN&oi=ao\" style=\"text-decoration: none; color: inherit;\">Shaojin Wu</a><sup>*</sup>,\n    Yunsheng Jiang<sup>*</sup>,\n    Yufei Huo,\n    <a href=\"https://guojianzhu.com/\" style=\"text-decoration: none; color: inherit;\">Jianzhu Guo</a><sup>✉,§</sup>\n    </strong><br>\n    Hao Li,\n    Yinghang Song,\n    Fei Ding,\n    Qian He,\n    Zheren Fu,\n    Zhendong Mao,\n    Yongdong Zhang\n    <br>\n    <em>ByteDance</em>\n    <br>\n    <sup>*</sup> Equal contribution &nbsp;&nbsp; <sup>✉</sup> Corresponding authors &nbsp;&nbsp; <sup>§</sup> Project lead\n  </p>\n  <p>\n    <a href=\"https://lance-project.github.io/\" style=\"text-decoration: none; margin: 0 8px;\"><img src=\"https://img.shields.io/badge/Homepage-Lance-blue?style=flat\" alt=\"Homepage\"></a>\n    <a href=\"http://arxiv.org/abs/2605.18678\" style=\"text-decoration: none; margin: 0 8px;\"><img src=\"https://img.shields.io/badge/Paper-arXiv-red?style=flat&logo=arxiv\" alt=\"arXiv\"></a>\n    <a href=\"https://huggingface.co/bytedance-research/Lance\" style=\"text-decoration: none; margin: 0 8px;\"><img src=\"https://img.shields.io/badge/Model-HuggingFace-yellow?style=flat&logo=huggingface\" alt=\"Model\"></a>\n    <a href=\"https://huggingface.co/spaces/bytedance-research/Lance\" style=\"text-decoration: none; margin: 0 8px;\"><img src=\"https://img.shields.io/badge/Demo-HuggingFace-40bfe6?style=flat&logo=huggingface\" alt=\"Demo\"></a>\n    <br>\n    English | <a href=\"./README_zh.md\"><ins>简体中文</ins></a>\n  </p>\n</div>\n\n> **Note:** Lance is a research project rather than a polished product model. The released checkpoint was trained with up to 128 A100 GPUs, with training conducted up to 768x768 image generation and 480p, 12 FPS video generation. Our goal is to share a research artifact for studying unified image/video understanding, generation, and editing under a relatively small model and limited compute budget. Output quality may vary across prompts, resolutions, duration, motion complexity, and editing scenarios, and we see further opportunities to improve the post-training recipe. We appreciate constructive feedback from the community as we continue improving the project.\n\n## 🔥 Updates\n\n- **`2026/05/29`**: 💪 Added code support for Text-Image-to-Video (First-Frame-to-Video). [More to see](assets/docs/changelog/2026-05-29.md)!\n- **`2026/05/26`**: 🎨 The Gradio interface now supports image and video generation, editing, and understanding. [Try it out](assets/docs/changelog/2026-05-26.md)!\n- **`2026/05/25`**: ✨ The [Hugging Face Space](https://huggingface.co/spaces/bytedance-research/Lance) is now live, thanks to the HF team!\n- **`2026/05/19`**: 🤗 The technical report is now available on [arXiv](http://arxiv.org/abs/2605.18678).\n- **`2026/05/18`**: 🔥 We launched the [project homepage](https://lance-project.github.io/) and released the initial inference code and model weights on [GitHub](https://github.com/bytedance/Lance/) and [Hugging Face](https://huggingface.co/bytedance-research/Lance).\n\n## 🌟 Highlights\n\n**Lance** is a 3B native unified multimodal model that supports **image and video understanding, generation, and editing** within a single framework.\n\n- **Efficient at 3B scale.** With only **3B active parameters**, Lance achieves competitive performance across image generation, image editing, and video generation benchmarks.\n- **Training from scratch.** Lance is trained from scratch with a staged multi-task recipe and within a budget of **up to 128 A100 GPUs**.\n\nWe are actively updating and improving this repository. If you find any bugs or have suggestions, please feel free to open an issue or submit a pull request (PR) 💖.\n\n<div align=\"center\">\n  <img src=\"assets/benchmarks/benchmark-overview.png\" alt=\"Lance benchmark overview across image generation, image editing, video generation, and video understanding\" width=\"980\">\n</div>\n\n## 📅 Roadmap\n\n- [ ] Release the fine-tuning code.\n\n## 🎨 Demo\n\n<details>\n<summary><strong>Show demo results</strong></summary>\n\n<div align=\"center\">\n  <strong>🔥 We recommend visiting our <a href=\"https://lance-project.github.io/\">homepage</a> for more visual results. 🔥</strong>\n</div>\n\n<h3 align=\"center\">Text-to-Video</h3>\n\n<table align=\"center\">\n  <tr>\n    <td><a href=\"assets/text-to-video/videos/text-to-video-demo-01.mp4\"><img src=\"assets/text-to-video/previews/text-to-video-demo-01.gif\" width=\"100%\"></a></td>\n    <td><a href=\"assets/text-to-video/videos/text-to-video-demo-02.mp4\"><img src=\"assets/text-to-video/previews/text-to-video-demo-02.gif\" width=\"100%\"></a></td>\n    <td><a href=\"assets/text-to-video/videos/text-to-video-demo-03.mp4\"><img src=\"assets/text-to-video/previews/text-to-video-demo-03.gif\" width=\"100%\"></a></td>\n    <td><a href=\"assets/text-to-video/videos/text-to-video-demo-04.mp4\"><img src=\"assets/text-to-video/previews/text-to-video-demo-04.gif\" width=\"100%\"></a></td>\n  </tr>\n  <tr>\n    <td><a href=\"assets/text-to-video/videos/text-to-video-demo-05.mp4\"><img src=\"assets/text-to-video/previews/text-to-video-demo-05.gif\" width=\"100%\"></a></td>\n    <td><a href=\"assets/text-to-video/videos/text-to-video-demo-06.mp4\"><img src=\"assets/text-to-video/previews/text-to-video-demo-06.gif\" width=\"100%\"></a></td>\n    <td><a href=\"assets/text-to-video/videos/text-to-video-demo-07.mp4\"><img src=\"assets/text-to-video/previews/text-to-video-demo-07.gif\" width=\"100%\"></a></td>\n    <td><a href=\"assets/text-to-video/videos/text-to-video-demo-08.mp4\"><img src=\"assets/text-to-video/previews/text-to-video-demo-08.gif\" width=\"100%\"></a></td>\n  </tr>\n</table>\n\n<h3 align=\"center\">Video Editing</h3>\n\n<table align=\"center\">\n  <tr>\n    <td><a href=\"assets/video-editing/videos/video-editing-demo-01.mp4\"><img src=\"assets/video-editing/previews/video-editing-demo-01.gif\" width=\"100%\"></a></td>\n    <td><a href=\"assets/video-editing/videos/video-editing-demo-02.mp4\"><img src=\"assets/video-editing/previews/video-editing-demo-02.gif\" width=\"100%\"></a></td>\n    <td><a href=\"assets/video-editing/videos/video-editing-demo-03.mp4\"><img src=\"assets/video-editing/previews/video-editing-demo-03.gif\" width=\"100%\"></a></td>\n    <td><a href=\"assets/video-editing/videos/video-editing-demo-04.mp4\"><img src=\"assets/video-editing/previews/video-editing-demo-04.gif\" width=\"100%\"></a></td>\n  </tr>\n  <tr>\n    <td><a href=\"assets/video-editing/videos/video-editing-demo-05.mp4\"><img src=\"assets/video-editing/previews/video-editing-demo-05.gif\" width=\"100%\"></a></td>\n    <td><a href=\"assets/video-editing/videos/video-editing-demo-06.mp4\"><img src=\"assets/video-editing/previews/video-editing-demo-06.gif\" width=\"100%\"></a></td>\n    <td><a href=\"assets/video-editing/videos/video-editing-demo-07.mp4\"><img src=\"assets/video-editing/previews/video-editing-demo-07.gif\" width=\"100%\"></a></td>\n    <td><a href=\"assets/video-editing/videos/video-editing-demo-08.mp4\"><img src=\"assets/video-editing/previews/video-editing-demo-08.gif\" width=\"100%\"></a></td>\n  </tr>\n</table>\n\n<h3 align=\"center\">Multi-turn Consistency Editing</h3>\n\n<div align=\"center\">\n  <a href=\"assets/multi-turn-editing/videos/multi-turn-editing-demo-01.mp4\">\n    <img src=\"assets/multi-turn-editing/previews/multi-turn-editing-demo-01.gif\" width=\"100%\">\n  </a>\n</div>\n\n<h3 align=\"center\">Intelligent Video Generation</h3>\n\n<table align=\"center\">\n  <tr>\n    <td><a href=\"assets/intelligent-video/videos/intelligent-video-demo-01.mp4\"><img src=\"assets/intelligent-video/previews/intelligent-video-demo-01.gif\" width=\"100%\"></a></td>\n    <td><a href=\"assets/intelligent-video/videos/intelligent-video-demo-02.mp4\"><img src=\"assets/intelligent-video/previews/intelligent-video-demo-02.gif\" width=\"100%\"></a></td>\n    <td><a href=\"assets/intelligent-video/videos/intelligent-video-demo-03.mp4\"><img src=\"assets/intelligent-video/previews/intelligent-video-demo-03.gif\" width=\"100%\"></a></td>\n    <td><a href=\"assets/intelligent-video/videos/intelligent-video-demo-04.mp4\"><img src=\"assets/intelligent-video/previews/intelligent-video-demo-04.gif\" width=\"100%\"></a></td>\n  </tr>\n</table>\n\n</details>\n\n## 🚀 Installation\n\n### Recommended Environment\n\n- **Software:** Python 3.10+, CUDA 12.4+ (required)\n- **Hardware:** A GPU with at least 40GB VRAM is required for inference\n\nWe have tested the following dependency combinations on NVIDIA A100:\n\n- PyTorch 2.8.0 + cu126 + flash-attn 2.8.3\n- PyTorch 2.5.1 + cu124 + flash-attn 2.6.3\n\nThe default installation commands use the PyTorch 2.8.0 + cu126 setup. For other GPU models, please choose and validate a PyTorch build and a matching `flash-attn` version according to your driver, CUDA runtime, Python version, and GPU architecture.\n\n### Installation Steps\n\nFirst, clone the repository:\n\n```bash\ngit clone https://github.com/bytedance/Lance.git\ncd Lance\n```\n\nThen, set up the environment:\n\n```bash\nconda create -n Lance python=3.11 -y\nconda activate Lance\npip install torch==2.8.0 torchvision==0.23.0 torchaudio==2.8.0 --index-url https://download.pytorch.org/whl/cu126\npip install -r requirements.txt\npip install flash-attn==2.8.3 --no-build-isolation\n```\n\n> **Note:** If installing `flash-attn` from source fails, you can install a prebuilt wheel instead. The wheelhouse below is from a third-party repository and is provided for **reference only**; please verify that any wheel you install matches your Python, PyTorch and CUDA versions.\n\n> ```bash\n> pip install --no-cache-dir --no-deps --force-reinstall \\\n> \"https://huggingface.co/strangertoolshf/flash_attention_2_wheelhouse/resolve/main/wheelhouse-flash_attn-2.8.3/linux_x86_64/torch2.8/cu12/abiTRUE/cp311/flash_attn-2.8.3+cu12torch2.8cxx11abiTRUE-cp311-cp311-linux_x86_64.whl\"\n> ```\n\n\nThen, download the model weights from [Lance-3B on Hugging Face](https://huggingface.co/bytedance-research/Lance) and place them in the `downloads/` directory:\n\n```bash\nfrom huggingface_hub import snapshot_download\n\nsave_dir = \"./downloads/\"\nrepo_id = \"bytedance-research/Lance\"\ncache_dir = save_dir + \"/cache\"\n\nsnapshot_download(cache_dir=cache_dir,\n  local_dir=save_dir,\n  repo_id=repo_id,\n  local_dir_use_symlinks=False,\n  resume_download=True,\n  allow_patterns=[\"*.json\", \"*.safetensors\", \"*.bin\", \"*.py\", \"*.md\", \"*.txt\",\"*.pth\",],\n)\n```\n\n\n## 📚 Usage\n\n### Inference\n\n#### Basic Usage\n\n```bash\nbash inference_lance.sh\n```\n\n- Before running, please configure the inference parameters at the top of `inference_lance.sh`.\n- **Supported tasks:** `t2i`, `t2v`, `i2v`, `image_edit`, `video_edit`, `x2t_image`, and `x2t_video`. You can modify `TASK_DEFAULT_CONFIGS` in `inference_lance.py` to customize the default data samples for each task.\n- **Note:** For all tasks, we recommend following the `prompt` format used in the provided examples when writing input prompts, as this typically leads to better generation quality.\n\n#### Task Examples\n\n##### Text-to-Video\n\n```bash\nbash inference_lance.sh \\\n  --TASK_NAME t2v \\\n  --MODEL_PATH downloads/Lance_3B_Video \\\n  --RESOLUTION video_480p \\\n  --NUM_FRAMES 121 \\\n  --VIDEO_HEIGHT 480 \\\n  --VIDEO_WIDTH 848 \\\n  --SAVE_PATH_GEN results/t2v\n```\n\n##### Text-Image-to-Video\n\n```bash\nbash inference_lance.sh \\\n  --TASK_NAME i2v \\\n  --MODEL_PATH downloads/Lance_3B_Video \\\n  --RESOLUTION video_480p \\\n  --NUM_FRAMES 61 \\\n  --VIDEO_HEIGHT 480 \\\n  --VIDEO_WIDTH 848 \\\n  --SAVE_PATH_GEN results/i2v\n```\n\nOptional parameters for video generation task examples:\n\n- `--ENHANCE_PROMPT true`: enable prompt rewrite for T2V/I2V. Prompt enhancement generally improves generation quality. Before enabling it, set `API_KEY`, `MODEL_NAME`, and `client` in `common/utils/caption_rewrite.py`. If no API key is configured there, prompt rewrite is skipped; in that case, we recommend **writing prompts in the style of the provided examples**.\n\n##### Text-to-Image\n\n```bash\nbash inference_lance.sh \\\n  --TASK_NAME t2i \\\n  --MODEL_PATH downloads/Lance_3B \\\n  --RESOLUTION image_768res \\\n  --VIDEO_HEIGHT 768 \\\n  --VIDEO_WIDTH 768 \\\n  --SAVE_PATH_GEN results/t2i\n```\n\n##### Video Editing\n\n```bash\nbash inference_lance.sh \\\n  --TASK_NAME video_edit \\\n  --MODEL_PATH downloads/Lance_3B_Video \\\n  --RESOLUTION video_480p \\\n  --SAVE_PATH_GEN results/video_edit\n```\n\n##### Image Editing\n\n```bash\nbash inference_lance.sh \\\n  --TASK_NAME image_edit \\\n  --MODEL_PATH downloads/Lance_3B \\\n  --RESOLUTION image_768res \\\n  --SAVE_PATH_GEN results/image_edit\n```\n\n##### Video Understanding\n\n```bash\nbash inference_lance.sh \\\n  --TASK_NAME x2t_video \\\n  --MODEL_PATH downloads/Lance_3B_Video \\\n  --RESOLUTION video_480p \\\n  --NUM_FRAMES 50 \\\n  --SAVE_PATH_GEN results/x2t_video\n```\n\n##### Image Understanding\n\n```bash\nbash inference_lance.sh \\\n  --TASK_NAME x2t_image \\\n  --MODEL_PATH downloads/Lance_3B \\\n  --RESOLUTION image_768res \\\n  --SAVE_PATH_GEN results/x2t_image\n```\n\nOptional parameters for all task examples:\n\n- `--CONFIG_PATH path/to/config.json`: use a custom validation JSON/JSONL file instead of the task default example config.\n\n\n<details>\n<summary><strong>Show task and parameter reference</strong></summary>\n\n#### Available Tasks\n\n| Task Name              | Description                                      | Example JSON                                 |\n|------------------------|--------------------------------------------------|----------------------------------------------|\n| `t2v`                  | Text-to-Video generation                         | `config/examples/t2v_example.json`           |\n| `t2i`                  | Text-to-Image generation                         | `config/examples/t2i_example.json`           |\n| `i2v`                 | First-Frame-to-Video generation                  | `config/examples/i2v_example.json`          |\n| `image_edit`           | Image editing                                    | `config/examples/image_edit_example.json`    |\n| `video_edit`           | Video editing                                    | `config/examples/video_edit_example.json`    |\n| `x2t_image`            | Image understanding            | `config/examples/x2t_image_example.json`    |\n| `x2t_video`            | Video understanding            | `config/examples/x2t_video_example.json`    |\n\nFor understanding examples:\n\n- `config/examples/x2t_image_example.json`: image understanding examples for visual question answering, reasoning and image captioning.\n- `config/examples/x2t_video_example.json`: video understanding examples for video question answering and video captioning.\n\n#### Parameters\n\nYou can configure the following hyperparameters at the top of the `inference_lance.sh` script:\n\n| Parameter | Default Value | Description |\n| --- | --- | --- |\n| `MODEL_PATH` | `\"downloads/Lance_3B\"` | Path to the downloaded Lance model weights  (`Lance_3B` or `Lance_3B_Video`). |\n| `NUM_GPUS` | `1` | Number of GPUs to use for inference. |\n| `VALIDATION_NUM_TIMESTEPS` | `30` | Number of denoising steps (e.g., 30 or 50). |\n| `VALIDATION_TIMESTEP_SHIFT` | `3.5` | Timestep shift parameter for flow matching scheduling. |\n| `CFG_TEXT_SCALE` | `4.0` | Classifier-Free Guidance (CFG) scale for text conditioning. |\n| `VALIDATION_DATA_SEED` | `42` | Random seed for generation reproducibility. |\n| `NUM_FRAMES` | `50` | Number of frames for video generation (Max: 121). *Unused for image tasks.* |\n| `VIDEO_HEIGHT` / `VIDEO_WIDTH`| `768` | Spatial resolution. *Unused for editing tasks (determined by input image/video).* |\n| `RESOLUTION` | `\"video_480p\"` | Base resolution preset (`image_768res` or `video_480p`). |\n| `CONFIG_PATH` | `\"\"` | Optional path to a custom validation JSON/JSONL file. When empty, the task default example config is used. |\n| `ENHANCE_PROMPT` | `false` | Optional T2V/I2V prompt rewrite switch. T2V uses text-only rewrite; I2V uses text plus the input image. Prompt enhancement generally improves generation quality. Configure the rewrite API key and client in `common/utils/caption_rewrite.py` before setting this to `true`; without a key, we recommend writing prompts in the style of the provided examples. |\n\n</details>\n\n### 🖥️ Gradio\n\nYou can launch the local Gradio demo for video/image generation, editing, and understanding:\n\n```bash\npython lance_gradio.py --ser \">80.27</td>\n    </tr>\n    <tr>\n      <td align=\"left\">VideoCrafter-2.0</td><td align=\"center\">-</td><td align=\"center\">80.44</td>\n    </tr>\n    <tr>\n      <td align=\"left\">CogVideoX</td><td align=\"center\">5B</td><td align=\"center\">81.61</td>\n    </tr>\n    <tr>\n      <td align=\"left\">Kling</td><td align=\"center\">-</td><td align=\"center\">81.85</td>\n    </tr>\n    <tr>\n      <td align=\"left\">Open-Sora-2.0</td><td align=\"center\">-</td><td align=\"center\">81.71</td>\n    </tr>\n    <tr>\n      <td align=\"left\">Gen-3</td><td align=\"center\">-</td><td align=\"center\">82.32</td>\n    </tr>\n    <tr>\n      <td align=\"left\">Step-Video-T2V</td><td align=\"center\">30B</td><td align=\"center\">81.83</td>\n    </tr>\n    <tr>\n      <td align=\"left\">Hunyuan Video</td><td align=\"center\">-</td><td align=\"center\">83.43</td>\n    </tr>\n    <tr>\n      <td align=\"left\">Wan2.1-T2V</td><td align=\"center\">14B</td><td align=\"center\">83.69</td>\n    </tr>\n    <tr>\n      <td align=\"center\" rowspan=\"6\"><i>Unified</i></td>\n      <td align=\"left\">HaproOmni</td><td align=\"center\">7B</td><td align=\"center\">78.10</td>\n    </tr>\n    <tr>\n      <td align=\"left\">Emu3</td><td align=\"center\">8B</td><td align=\"center\">80.96</td>\n    </tr>\n    <tr>\n      <td align=\"left\">VILA-U</td><td align=\"center\">7B</td><td align=\"center\">74.01</td>\n    </tr>\n    <tr>\n      <td align=\"left\">Show-o2</td><td align=\"center\">2B</td><td align=\"center\">81.34</td>\n    </tr>\n    <tr>\n      <td align=\"left\">TUNA</td><td align=\"center\">1.5B</td><td align=\"center\"><u>84.06</u></td>\n    </tr>\n    <tr>\n      <td align=\"left\">🌟 <b>Lance (Ours)</b></td><td align=\"center\"><b>3B</b></td><td align=\"center\"><b>85.11</b></td>\n    </tr>\n  </tbody>\n</table>\n</div>\n\n</details>\n\n#### Running Benchmarks\n\nReady-to-run benchmark scripts are provided under `benchmarks/`:\n\n| Benchmark              | Modality | Script                                                        |\n|------------------------|----------|---------------------------------------------------------------|\n| GenEVAL (image gen)    | Image    | `benchmarks/image_gen/GenEVAL/sample_GenEVAL.sh`              |\n| DPG (image gen)        | Image    | `benchmarks/image_gen/DPG/sample_DPG.sh`                      |\n| GEdit (image edit)     | Image    | `benchmarks/image_gen/GEdit/sample_GEdit.sh`                  |\n| VBench (video gen)     | Video    | `benchmarks/video_gen/Vbench/sample_vbench.sh`                |\n\n\n## 📄 License\n\nCopyright 2025 ByteDance Ltd. and/or its affiliates.\n\n## 🙏 Acknowledgements\n\nWe would like to thank the contributors of [BAGEL](https://github.com/ByteDance-Seed/bagel), [Qwen2.5-VL-3B-Instruct](https://huggingface.co/Qwen/Qwen2.5-VL-3B-Instruct), and [Wan2.2](https://github.com/Wan-Video/Wan2.2) for their open research and contributions.\n\n## 💖 Citation\n\nIf you find **Lance** useful for your project or research, welcome to 🌟 this repo and cite our work using the following BibTeX:\n\n```bibtex\n@misc{fu2026lanceunifiedmultimodalmodeling,\n      title         = {Lance: Unified Multimodal Modeling by Multi-Task Synergy},\n      author        = {Fengyi Fu and Mengqi Huang and Shaojin Wu and Yunsheng Jiang and Yufei Huo and Hao Li and Yinghang Song and Fei Ding and Jianzhu Guo and Qian He and Zheren Fu and Zhendong Mao and Yongdong Zhang},\n      year          = {2026},\n      eprint        = {2605.18678},\n      archivePrefix = {arXiv},\n      primaryClass  = {cs.CV},\n      url           = {https://arxiv.org/abs/2605.18678},\n}\n```\n\n## 📞 Contact\n\nFor questions, issues, or collaborations, please contact [Mengqi Huang](https://corleone-huang.github.io/) and [Jianzhu Guo](https://guojianzhu.com/).\n","summary":"Lance (bytedance/Lance) is a research-oriented unified multimodal model designed to handle image and video tasks in one framework, covering understanding, generation, and editing. It is built at a native 3B scale and trained from scratch using a staged multi-task recipe, aiming to achieve strong benchmark results across image generation/editing and video generation. The project provides initial inference code, model checkpoints on GitHub and Hugging Face, and a Gradio-based demo interface for trying text-to-image/video and related capabilities. Researchers and developers exploring unified image/video modeling—especially those working with limited compute—will benefit most from studying and experimenting with this shared research artifact.","description":"A 3B-active-parameter native unified multimodal model for image and video understanding, generation, and editing.","stars":1048,"language":"Python"},{"owner":"orailnoor","repo":"DroidDesk","url":"https://github.com/orailnoor/DroidDesk","readme":"# DroidDesk\n\nRun a full Linux desktop on any Android phone. Not a terminal. Not an emulator. A complete desktop environment with direct kernel access -- VS Code, Blender, Metasploit, local AI, all of it.\n\nConnect your phone to a monitor and it becomes a Linux PC. Unplug it and your entire setup comes with you.\n\n## Video\n\n[![Watch the video](https://img.youtube.com/vi/QCr4WWsfVv8/maxresdefault.jpg)](https://youtu.be/QCr4WWsfVv8)\n\n## What This Actually Runs\n\nEverything below has been tested and confirmed working:\n\n- **LibreOffice** -- Word processing, spreadsheets, presentations. Fully functional.\n- **VS Code** -- Full version. Python, PIP, extensions, everything.\n- **Claude Code** -- AI coding agent running directly in terminal.\n- **Blender** -- Installs and opens. Laggy on mobile hardware, but it runs.\n- **Wireshark** -- Full network analysis, every packet and protocol.\n- **Metasploit** -- Pentesting framework, runs fine.\n- **Local AI** -- Offline LLM inference, 5+ tokens/second, no API needed.\n\nIf it runs on Ubuntu, it runs here.\n\n## How It Works\n\nThe Linux environment runs through Termux with direct access to the phone's kernel. No emulation, no translation -- native performance.\n\nThe setup script installs a full desktop (XFCE4/LXQt/MATE/KDE) inside Termux using the Termux User Repository (TUR) for GUI apps. For tools not available in TUR (Wireshark, Metasploit, etc.), a Proot container provides a standard Ubuntu/Debian/Kali environment where you install anything with `apt`.\n\nThe automatic menu sync scans what you install inside Proot and adds it directly to your desktop app menu. No need to enter the container every time.\n\n## Requirements\n\n- Any Android phone (ARM64)\n- [Termux](https://f-droid.org/en/packages/com.termux/) (install from F-Droid, not Play Store)\n- [Termux-X11](https://github.com/termux/termux-x11/releases/tag/nightly) (for on-phone display)\n\n### For Monitor Output ( Optional )\n\n**Option A: USB-C Display Output**\nIf your phone supports display output over USB-C, just use a USB-C to HDMI adapter. Done.\n\n**Option B: Raspberry Pi Bridge**\nFor phones without display output (most mid-range phones with USB 2.0), use a Raspberry Pi Zero 2W as a bridge:\n- Raspberry Pi Zero 2W with Raspberry Pi OS\n- Micro USB to USB-C cable\n- USB-C hub\n- Micro HDMI to HDMI adapter\n- SD card with Pi firmware\n- Wireless keyboard and mouse\n\nThe Pi connects to the phone via USB tethering, detects the phone's IP automatically, and opens a VNC viewer to display the phone's desktop on the monitor.\n\n## Installation\n\n### Step 1: Install Termux\n\nDownload and install Termux from F-Droid:\nhttps://f-droid.org/en/packages/com.termux/\n\nDo NOT use the Play Store version. It is outdated and will not work.\n\n### Step 2: Install Termux-X11\n\nDownload the latest APK from:\nhttps://github.com/termux/termux-x11/releases/tag/nightly\n\nInstall it on your phone. This is the display server that renders the desktop.\n\n### Step 3: Run the Setup Script\n\nOpen Termux and run:\n\n```bash\ncurl -sL https://raw.githubusercontent.com/orailnoor/DroidDesk/main/termux-linux-setup.sh -o setup.sh\nbash setup.sh\n```\n\nThe script will:\n1. Update Termux packages\n2. Add X11 and TUR repositories\n3. Install your chosen desktop environment (XFCE4/LXQt/MATE/KDE)\n4. Set up GPU acceleration (Turnip for Adreno, Zink fallback for others)\n5. Install Firefox, Git, Python, and core tools\n6. Set up a Proot Linux container (Ubuntu/Debian/Kali)\n7. Create the App Bridge for automatic menu syncing\n8. Apply a modern dark theme\n9. Optionally set up VNC for remote access\n\n### Step 4: Start the Desktop\n\nAfter installation completes:\n\n```bash\nbash ~/start-x11.sh\n```\n\nThen open the Termux-X11 app on your phone. Your desktop is ready.\n\n### Step 5: Install Apps Inside Proot\n\nTo install tools that are not in TUR:\n\n```bash\nbash ~/start-proot.sh\napt install wireshark    # or any other package\nexit\nbash ~/proot-menu-sync.sh\n```\n\nThe app will appear in your desktop menu automatically.\n\n## Raspberry Pi Monitor Bridge Setup\n\nIf you are using a Raspberry Pi Zero 2W to output to a monitor:\n\n### Step 1: Flash Raspberry Pi OS\n\nFlash standard Raspberry Pi OS to an SD card and boot the Pi.\n\n### Step 2: Install VNC Viewer on the Pi\n\n```bash\nsudo apt update\nsudo apt install realvnc-vnc-viewer\n```\n\n### Step 3: Copy the Launcher Script\n\nCopy `pi-launch_phone.sh` to your Pi:\n\n```bash\ncurl -sL https://raw.githubusercontent.com/orailnoor/DroidDesk/main/pi-launch_phone.sh -o ~/pi-launch_phone.sh\nchmod +x ~/pi-launch_phone.sh\n```\n\n### Step 4: Connect and Launch\n\n1. Connect the phone to the Pi via USB cable\n2. Enable USB Tethering on the phone\n3. Start VNC on the phone: `bash ~/start-vnc.sh` (in Termux)\n4. Run the bridge script on the Pi:\n\n```bash\nbash ~/pi-launch_phone.sh\n```\n\nThe script auto-detects the phone's IP and opens a fullscreen VNC session on the monitor.\n\n### Optional: Auto-Launch on Boot\n\nTo make the Pi automatically connect when powered on, add to crontab:\n\n```bash\ncrontab -e\n```\n\nAdd this line:\n\n```\n@reboot sleep 15 && /home/pi/pi-launch_phone.sh\n```\n\n## Commands Reference\n\n| Command | What It Does |\n|---|---|\n| `bash ~/start-x11.sh` | Start desktop via Termux-X11 |\n| `bash ~/start-vnc.sh` | Start desktop via VNC (if installed) |\n| `bash ~/start-proot.sh` | Open Proot Linux shell |\n| `bash ~/proot-menu-sync.sh` | Sync Proot apps to desktop menu |\n| `bash ~/stop-linux.sh` | Stop all sessions |\n\n## Notes\n\n> [!WARNING]\n> **Disable Child Process in Developer Options**\n> On some Android versions (MIUI, One UI, stock Android 13+), the system may kill Termux background processes and drop your desktop session. To prevent this:\n> 1. Go to **Settings → Developer Options**\n> 2. Find **\"Child process\"** (may be labeled differently depending on your ROM)\n> 3. Disable child process restrictions for Termux\n>\n> Without this, long-running sessions (VNC, Termux-X11) may be killed by the OS without warning.\n\n- Termux-X11 directly on the phone is faster than VNC. Use VNC only when you need monitor output through the Pi bridge or remote access from another device.\n- For standalone phone use without a monitor, Termux-X11 is the recommended option.\n- The Proot container shares the display with the native Termux desktop. Apps installed in Proot render on the same screen.\n- GPU acceleration works best on Adreno GPUs (Qualcomm Snapdragon phones). Other GPUs fall back to software rendering.\n\n## Credits\n\nCreated by [orailnoor](https://youtube.com/@orailnoor)\n","summary":"DroidDesk lets you run a full Linux desktop directly on an ARM64 Android phone, turning it into a portable “PC” you can use with a monitor and take with you. It provides real GUI desktop environments (XFCE4, LXQt, MATE, or KDE) via Termux with direct kernel access, and uses a Proot Ubuntu/Debian/Kali container for apps not available in the Termux User Repository. The project supports a wide range of heavyweight tools and workflows, including LibreOffice, VS Code, Blender, Wireshark, Metasploit, and offline/local AI via on-device inference. It’s best for developers, power users, and security/IT practitioners who want a desktop-grade Linux environment on mobile hardware without emulation.","description":"DroidDesk turns your Android phone into a real Linux desktop using Termux, Termux X11, TUR, and Proot. Run VS Code, Firefox, LibreOffice, Blender, and more with X11 or VNC support for monitor setup.","stars":1969,"language":"Shell"},{"owner":"Doorman11991","repo":"smallcode","url":"https://github.com/Doorman11991/smallcode","readme":"# SmallCode\n\n[简体中文](README_zh-CN.md) | [English](README.md)\n\n---\n\n[![npm](https://img.shields.io/npm/v/smallcode)](https://www.npmjs.com/package/smallcode)\n\n**AI coding agent optimized for small LLMs (8B-35B parameters)**\n\nSmallCode is a terminal-native coding agent designed from the ground up to extract useful work from local models (8B-35B) running on consumer hardware. While tools like OpenCode assume frontier models with 128k+ context and perfect tool calling, SmallCode compensates for the limitations of small models through intelligent architecture.\n\n> **Recommended model size: 8B-35B parameters.** Smaller models (≤4B) struggle with multi-step tool use and lose context across turns. Larger models (>35B) don't need SmallCode's adaptations and are better served by tools designed for frontier models.\n\n## Why SmallCode?\n\n| | OpenCode | SmallCode |\n|---|----------|-----------|\n| **Target** | Frontier models (Claude, GPT-5) | 8B-35B local models |\n| **Context** | Dumps everything | Budget-managed, summarized |\n| **Tool calling** | Assumes reliable JSON | Forgiving multi-format parser |\n| **Planning** | Single-shot | TODO-file decomposed steps |\n| **Editing** | Full file write | Search-and-replace patch |\n| **Privacy** | API calls to cloud | Fully local, no network needed |\n\n## Quick Start\n\n```bash\n# Install globally via npm\nnpm install -g smallcode\n\n# Or run directly with npx\nnpx smallcode\n\n# Start in your project directory\ncd my-project\nsmallcode\n# Or use the packaged command alias:\nsmolv2\n```\n\n### Prebuilt Binaries (no Node.js needed)\n\nPre-compiled tarballs for Windows, macOS, and Linux are built on every release — they bundle Node.js plus all native addons so you never need `node-gyp` or C++ build tools.\n\n| Platform | One‑line install |\n|---|---|\n| Linux / macOS | `bash <(curl -fsSL https://raw.githubusercontent.com/Doorman11991/smallcode/master/install.sh)` |\n| Windows | `iwr -Uri https://raw.githubusercontent.com/Doorman11991/smallcode/master/install.ps1 -UseBasicParsing \\| iex` |\n\nThe install script downloads the correct tarball for your platform, extracts it to `~/.smallcode`, and adds it to your PATH. Run `smallcode --help` to verify.\n\nSmallCode includes [BoneScript](https://github.com/Doorman11991/BoneScript) and [budget-aware-mcp](https://github.com/Doorman11991/budget-aware-mcp) as dependencies — everything installs in one go.\n\n### Fresh GitHub checkout quick start\n\nIf you just cloned/pulled this repository, run it directly from the checkout first:\n\n```bash\ncd smallcode\nnpm install\n\n# Start your local model server first (LM Studio, llama.cpp, Ollama, etc.)\ncat > .env <<'EOF'\nSMALLCODE_MODEL=your-local-model-name\nSMALLCODE_BASE_URL=http://localhost:1234/v1\nEOF\n\nnode bin/smallcode.js\n```\n\nOptional: make the `smallcode` and `smallcode-rag-index` commands available globally from this checkout:\n\n```bash\nnpm link\nsmallcode --help\n```\n\nIf the fullscreen UI has display issues in your terminal, start with `node bin/smallcode.js --classic`.\n\nThe fullscreen TUI enables raw mode, mouse tracking, and bracketed paste. SmallCode always restores your terminal on exit — including when you suspend it with `Ctrl+Z` (it cleans up before stopping, then redraws on `fg`), when it is terminated, or if it crashes. If a hard kill (`kill -9`) ever leaves your shell echoing raw escape sequences, run `reset` to restore it.\n\n### RAG harness quick run\n\nSmallCode runs as a terminal UI harness by default:\n\n```bash\nsmallcode                 # fullscreen TUI\nsmallcode --classic       # readline UI fallback\nnode bin/smallcode.js     # from a repo checkout\n```\n\nTo build the local GitHub RAG database, run the Python scraper/indexer with the curated starter corpus, or use the broader preset for a larger multi-language corpus:\n\n```bash\nnpm run rag:index\nnpm run rag:index -- --preset broad\n# or, after install:\nsmallcode-rag-index --preset broad\n```\n\nFor custom repos, create `.smallcode/rag/repos.json` with `preset`, `repos`, and chunking limits.\n\nSee [docs/rag-harness.md](docs/rag-harness.md) for the full LM Studio/llama.cpp setup, UI walkthrough, RAG config, indexing, and web-fallback flow.\n\n### Requirements\n\n- Node.js 18+ (LTS recommended — 20.x or 22.x have prebuilt binaries for SQLite)\n- Python 3 + Git for the RAG scraper/indexer (`npm run rag:index`)\n- A local LLM server (LM Studio, Ollama, or any OpenAI-compatible endpoint)\n\n**Optional** (for code graph + FTS5 memory search):\n- `better-sqlite3` needs native compilation if prebuilt binaries aren't available for your Node version\n- Prebuilt binaries exist for Node LTS (20.x, 22.x) on Linux/macOS/Windows. no build tools needed\n- If you're on a non-LTS Node (23+, 25+), you'll need:\n  - **Linux**: `python3`, `make`, `gcc`/`g++` (`sudo apt install build-essential python3` or `pacman -S base-devel python`)\n  - **macOS**: Xcode Command Line Tools (`xcode-select --install`)\n  - **Windows**: Visual Studio Build Tools with \"Desktop development with C++\" workload, or `npm install -g windows-build-tools`\n- **If build fails, SmallCode still works** — it falls back to JSON-based memory automatically\n\n> **Note on the `prebuild-install@7.1.3: No longer maintained` warning** (issue #57):\n> this is a harmless upstream deprecation notice from a transitive dependency\n> (`budget-aware-mcp` → `better-sqlite3` → `prebuild-install`). `prebuild-install`\n> has no newer published version, and `better-sqlite3` still depends on it, so the\n> warning cannot be silenced by a version bump. It does **not** affect the install —\n> npm warnings are advisory and the package installs normally. If you prefer to skip\n> the native dependency entirely, install without optional deps:\n> `npm install -g smallcode --omit=optional` (you lose FTS5 memory search but keep the\n> JSON memory fallback).\n\n### Configuration\n\nCreate a `.env` file in your project root:\n\n```bash\n# Required\nSMALLCODE_MODEL=your-model-name\nSMALLCODE_BASE_URL=http://localhost:1234/v1\n\n# Optional: escalation (auto-fallback to cloud on hard fail)\n# ANTHROPIC_API_KEY=sk-ant-...\n# OPENAI_API_KEY=sk-...\n# OPENROUTER_API_KEY=sk-or-v1-...\n# DEEPSEEK_API_KEY=sk-...\n```\n\nSee `.env.example` for all options. Also supports `smallcode.toml` for backwards compatibility.\n\nSmallCode can route each model tier to a different endpoint. This lets you keep\nfast/default work local while sending complex tasks to a larger OpenRouter model:\n\n```bash\nSMALLCODE_MODEL=qwen3:8b\nSMALLCODE_BASE_URL=http://localhost:11434/v1\n\nSMALLCODE_MODEL_STRONG=openai/gpt-4o-mini\nSMALLCODE_BASE_URL_STRONG=https://openrouter.ai/api/v1\nOPENROUTER_API_KEY=sk-or-v1-...\n```\n\nEquivalent `smallcode.toml`:\n\n```toml\n[model]\nprovider = \"openai\"\nname = \"qwen3:8b\"\nbaseUrl = \"http://localhost:11434/v1\"\n\n[models.strong]\nname = \"openai/gpt-4o-mini\"\nbaseUrl = \"https://openrouter.ai/api/v1\"\n```\n\nTier URLs are optional. If `SMALLCODE_BASE_URL_STRONG` or\n`[models.strong].baseUrl` is omitted, that tier uses the primary base URL.\n\n## Architecture\n\nSmallCode is built with a modular architecture:\n\n```\nbin/\n├── smallcode.js        Entry point, agent loop, TUI orchestration (1570 lines)\n├── config.js           Config loading, endpoint detection, auth headers\n├── executor.js         Tool execution (all 18 tools)\n├── tools.js            Tool definitions + 2-stage routing\n├── mcp_bridge.js       Built-in code graph MCP communication\n├── model_client.js     LLM API calls, streaming, validation\n├── governor.js         Tool scoring, verification, decompose\n├── escalation.js       Cloud model fallback (Claude/OpenAI/DeepSeek)\n├── commands.js         TUI slash commands\n├── tui.js              Classic TUI renderer\n└── bonescript_guide.js BoneScript syntax reference\n\nsrc/\n├── api/index.js        Programmatic API (require('smallcode'))\n├── tui/fullscreen.js   Fullscreen alternate-buffer TUI\n├── tui/terminal.js     Terminal lifecycle (raw mode / mouse / guaranteed restore)\n├── plugins/loader.js   Plugin system\n├── plugins/skills.js   Skill system\n├── tools/              Tool routing, MCP client, validators\n├── governor/           Early-stop detection, verifier, tool scorer\n├── model/              Multi-model profiles + routing\n└── session/            Persistence, undo, sharing, references\n```\n\n## Key Features\n\n### MarrowScript Cognition Layer\nSmallCode's intelligence is declared in [MarrowScript](https://github.com/Doorman11991/MarrowScript) and compiled to a production runtime. One 50-line `.marrow` declaration generates 1400+ lines of TypeScript with caching, retry, validation, traces, and budget enforcement — all for free.\n\n```marrow\nprompt classify_task_type(user_message: string) {\n  model: TinyClassifier\n  timeout: 3s\n  cache: { key: hash(user_message), ttl: 10m }\n  retry: { max_attempts: 2, backoff: fixed, interval: 100ms }\n  constraints: [output in [\"coding\", \"editing\", \"search\", ...]]\n}\n```\n\nThe compiled cognition layer provides:\n- **Prompt caching** — 0ms on cache hit, content-hash keys with TTL\n- **Structured traces** — trace_id/span_id for every LLM call (enable with `SMALLCODE_COGNITION_LOG=stderr`)\n- **Tier-based routing** — trivial tasks → tiny model, complex tasks → medium model\n- **Token budgets** — per-cost-class enforcement, never overspend\n- **Validation + repair** — schema checks with auto-retry on malformed output\n\n### BoneScript Integration\nFor Node.js/TypeScript backends, SmallCode uses BoneScript — write ONE `.bone` file and compile it to a complete project (routes, auth, DB, events, migrations, SDK, admin panel, Docker, CI). Reduces 8-15 tool calls to 1-2, dramatically improving reliability with small models.\n\n### Model Escalation\nWhen the local model hard fails after retry + decompose, SmallCode can optionally escalate to a stronger cloud model (Claude, OpenAI, DeepSeek). Fully opt-in — requires an API key. Session-limited to prevent runaway costs.\n\n**Escalation targets** (cloud, used only on hard fail):\n- Claude Sonnet 4.5 / 4.6, Haiku 4.5\n- GPT-5.4 Mini / Nano\n- DeepSeek V4 / V4 Pro / V4 Flash\n\n### Context Budget Engine\nNever exceeds your model's context window. Tool results capped at 4k chars, mid-turn eviction drops old results when context grows too large, and semantic compression summarizes history instead of dropping it.\n\n### 2-Stage Tool Routing\nHalves the schema context overhead. Model picks a category (read/write/search/run/plan) first, then gets only relevant tool schemas. Critical for models with 8-16k context.\n\n### Hybrid Code Search (\"grep on steroids\")\nThe `hybrid_search` tool answers a single query with both exact matching (regex/keyword, the precision of grep) and semantic ranking (find code that *does* a thing even when it doesn't contain the query words) over a symbol-aware local index. It's fully offline with zero model downloads — it reuses SmallCode's local BM25 + hashed-vector engine, so it runs instantly on CPU with no external services. Modes: `hybrid` (default, exact + semantic), `regex`, `keyword`, `semantic`. Inspired by [colgrep](https://github.com/lightonai/next-plaid) and [semble](https://github.com/MinishLab/semble) ([#67](https://github.com/Doorman11991/smallcode/issues/67)), kept dependency-free to match SmallCode's local-first design. Tune with `SMALLCODE_HYBRID_MAX_FILES` / `SMALLCODE_HYBRID_MAX_BYTES`.\n\n### Early-Stop Detection\nDetects repetition loops, patch spirals (stuck on corrupted file → forces rewrite), and greeting regression (model lost context → re-injects task). Saves tokens and time.\n\n### Forgiving Tool Call Parser\nSmall models produce messy output. SmallCode parses tool calls from JSON, YAML, XML, Hermes format, Liquid AI's `<|tool_call_start|>[func(kw='val')]<|tool_call_end|>` markers (lfm2.x), or plain text. Auto-repairs common mistakes (wrong param names, type mismatches). Falls back to scanning `reasoning_content` when `content` is empty (LM Studio reasoning models).\n\n### Patch-First Editing\nSearch-and-replace as the primary edit primitive. Small models can't reliably reproduce entire files — they truncate, hallucinate, or drift. `patch` is safer and more context-efficient.\n\n### TODO-Driven Planning\nComplex tasks get decomposed into atomic steps. The model reads a TODO file each turn to know where it is. Each step is validated (lint/compile) before moving on.\n\n### Model Profiles\nPer-model configuration: context length, tool format (native/hermes/json/xml/text), chat template, strengths/weaknesses. Auto-adapts prompting strategy.\n\n### Working Memory\nPersistent scratchpad that survives across turns. Compensates for limited reasoning depth — the model can write notes to itself.\n\n### Persistent Shell Sessions\n`bash` calls share a long-lived shell process so `cd`, env vars, and shell variables persist across calls. Without this, every bash call is a fresh process, breaking multi-step tasks like \"cd src then run pytest\". Optional cwd-containment refuses any `cd` (or `pushd`/`chdir`/sub-shell escape) that would leave the project root. Disable with `SMALLCODE_SHELL_PERSIST=false`.\n\n### Thinking Budget Control\nModern reasoning models (Qwen3, DeepSeek R1, GPT-5 reasoning) can spend thousands of tokens \"thinking\" about trivial tasks. SmallCode caps thinking budg
