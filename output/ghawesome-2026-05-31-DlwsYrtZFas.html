ditor\n- Toggle Sidebar\n- Reload Window\n\n## Configuration\n\nCodiff reads configuration from `~/.codiff/codiff.jsonc`. Open `Codiff > Open Config File...` to\ncreate the file with defaults and open it in your editor. The file supports JSONC comments and\ntrailing commas, includes a JSON schema reference for editor completion, and is watched while Codiff\nis running so changes apply to open windows.\n\n```jsonc\n{\n  \"$schema\": \"https://raw.githubusercontent.com/nkzw-tech/codiff/main/src/config/codiff-config.schema.json\",\n  \"settings\": {\n    \"copyCommentsOnClose\": false,\n    \"diffStyle\": \"split\",\n    \"lastRepositoryPath\": \"\",\n    \"openAIModel\": \"gpt-5.3-codex-spark\",\n    \"showWhitespace\": false,\n    \"theme\": \"system\",\n  },\n  \"keymap\": {\n    \"commandBar\": \"Mod+Shift+p\",\n    \"diffSearch\": \"Mod+f\",\n    \"fileFilter\": \"Mod+p\",\n    \"nextSearchMatch\": \"Enter\",\n    \"prevSearchMatch\": \"Shift+Enter\",\n    \"closeSearch\": \"Escape\",\n    \"submitComment\": \"Mod+Enter\",\n    \"discardComment\": \"Escape\",\n    \"toggleSidebar\": \"Mod+b\",\n  },\n}\n```\n\nChoose `View > Split Diff` or `View > Unified Diff`, use Toggle Diff Layout in the command bar,\nor set `settings.diffStyle` to `split` for side-by-side diffs or `unified` for unified diffs.\nUse `Mod` for <kbd>Cmd</kbd> on macOS and <kbd>Ctrl</kbd> on other platforms. Shortcut strings can\ncombine `Mod`, `Ctrl`, `Alt`, `Shift`, or `Meta` with a key, for example `Mod+Shift+p` or\n`Alt+Enter`.\n\n## Codex Walkthroughs\n\nCodiff uses the local Codex CLI for walkthroughs and inline review assistance. Install Codex and\nverify it is available before using `codiff -w`:\n\n```bash\ncodex --version\n```\n\nCodiff looks for Codex on `PATH`, `/opt/homebrew/bin/codex`, and `/usr/local/bin/codex`. It does not\nrun your shell startup files to discover Codex. If Codex is installed somewhere else, launch Codiff\nwith an explicit path:\n\n```bash\nCODIFF_CODEX_PATH=/absolute/path/to/codex codiff -w\n```\n\nTo seed a walkthrough with the Codex conversation that produced the change, choose\n`Codiff > Install Codex Skill`, then invoke it from Codex:\n\n```text\n$codiff\n```\n\nThe skill opens Codiff with `codiff -w --codex-session <id>`. Codiff then generates its normal diff\ndigest and runs the walkthrough prompt by ephemerally resuming that Codex session, so the\nwalkthrough sees the original conversation without a lossy summary handoff.\n\n## Development\n\n```bash\nvp install\nvp build\nvpr codiff\n```\n\nFor live development:\n\n```bash\nvpr dev\nELECTRON_RENDERER_URL=http://127.0.0.1:5173 vpr electron\n```\n\nUseful checks:\n\n```bash\nvp check\nvp test\nvp build\n```\n","summary":"Codiff is a minimal desktop diff viewer for locally reviewing both staged and unstaged Git changes before you commit. It provides fast, in-repo comparison with a command bar workflow for filtering and navigating diffs, plus the ability to add inline comments on changed lines and copy those review comments as Markdown for follow-ups. Advanced users can also request LLM-assisted “walkthroughs” (via the local Codex CLI) to generate a review order and extra context. Developers who frequently review changes in Git and want a quick, offline-first review experience with optional AI support would benefit most.","description":"a fast local diff viewer","stars":498,"language":"TypeScript"},{"owner":"lukeed","repo":"comptime","url":"https://github.com/lukeed/comptime","readme":"# comptime\n\n> A Zig-inspired build-time evaluation primitive, exposed as Vite and Rolldown plugins.\n\n```ts\nimport { comptime } from \"comptime\";\nimport { fibonacci } from \"./math\";\n\nexport const value = comptime(() => fibonacci(10));\n```\n\nWith the plugin enabled, the call is evaluated during the build and replaced with a serialized expression:\n\n```ts\nexport const value = 55;\n```\n\nIf the plugin is not enabled, the runtime helper throws so missed transforms fail loudly.\n\n> View [more complex examples](/examples/)\n\n## Install\n\n```sh\n# via rolldown\nbun add --dev comptime rolldown\n\n# via vite\nbun add --dev comptime vite\n```\n\n## Vite\n\n```ts\nimport { defineConfig } from \"vite\";\nimport { comptime } from \"comptime/vite\";\n\nexport default defineConfig({\n  plugins: [comptime()],\n});\n```\n\n## Rolldown\n\n```ts\nimport { defineConfig } from \"rolldown\";\nimport { comptime } from \"comptime/rolldown\";\n\nexport default defineConfig({\n  input: \"src/app.ts\",\n  plugins: [comptime()],\n});\n```\n\n## API\n\n```ts\nimport { comptime } from \"comptime\";\n\nlet value = comptime(() => expensivePureWork());\n```\n\n`comptime<T>(fn: () => T | Promise<T>): T` is typed as an identity helper. The plugin requires a single zero-argument arrow function or function expression.\n\nSupported behavior:\n\n- Imported `comptime` bindings from `\"comptime\"`, including aliases.\n- Shadowed local bindings are ignored.\n- Referenced value imports are captured into virtual modules with absolute import paths.\n- Referenced top-level declarations from the origin module are copied into the virtual module.\n- Promise-returning bodies are awaited.\n- Values are serialized with `devalue`.\n- Build errors include the original call-site location.\n- Vite dev uses `server.ssrLoadModule`; Vite build and Rolldown build use an internal Rolldown evaluator.\n\n## Options\n\n```ts\ntype ComptimeOptions = {\n  include?: string | string[];\n  exclude?: string | string[];\n  timeout?: number;\n  env?: string[] | \"all\" | \"declared\";\n  serializers?: Array<{\n    test: (value: unknown) => boolean;\n    serialize: (value: unknown) => string;\n  }>;\n};\n```\n\nDefaults:\n\n- `timeout`: `10_000`\n- `env`: `\"all\"`\n\nWhen `env` is a string list, static `process.env.KEY` reads must be listed. Dynamic env reads are rejected unless `env` is `\"all\"`.\n\n## Common Errors\n\nThese fail during transform:\n\n```ts\ncomptime(1);\n// comptime() requires a single arrow function with no parameters\n```\n\n```ts\ncomptime((value) => value);\n// comptime() requires a single arrow function with no parameters\n```\n\n```ts\ncomptime(() => () => 1);\n// comptime returned a value that cannot be serialized\n```\n\n```ts\ncomptime(() => {\n  throw new Error(\"something happened\");\n});\n// build fails\n```\n\n## Limits\n\nThis package does not add browser-side evaluation, disk caching, Webpack support, or esbuild standalone support.\n\n## License\n\nMIT © [Luke Edwards](https://lukeed.com)\n","summary":"comptime is a Zig-inspired build-time evaluation utility for JavaScript/TypeScript, exposed as Vite and Rolldown plugins. It lets you wrap a zero-argument function in `comptime(() => ...)` so the plugin evaluates the expression during build and replaces it with a serialized result, failing loudly at build time if the code can’t be safely evaluated or transformed. It supports promise-returning bodies, captures referenced imports into virtual modules, serializes values with `devalue`, and can be configured with options like include/exclude paths, timeouts, and environment handling. This is best for developers who want to compute expensive-but-pure values (like constants, lookup tables, or generated data) at build time to reduce runtime cost and improve bundle determinism.","description":"A Zig-inspired build-time evaluation primitive, exposed as Vite and Rolldown plugins","stars":167,"language":"TypeScript"},{"owner":"Evokoa","repo":"pgGraph","url":"https://github.com/Evokoa/pgGraph","readme":"<p align=\"center\">\n  <img src=\"assets/pggraph-banner.png\" alt=\"pgGraph Banner\" />\n</p>\n\n<h1 align=\"center\">pgGraph    <a href=\"https://docs.evokoa.com/pggraph/user_guide\">\n    <img src=\"https://img.shields.io/badge/docs-pgGraph-0ea5e9?style=flat-square\" alt=\"pgGraph documentation\">\n  </a></h1>\n\n<p align=\"center\">\n  <strong>Graph database superpowers for your existing Postgres data.</strong>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/evokoa/pggraph/stargazers\">\n    <img src=\"https://img.shields.io/github/stars/evokoa/pggraph?style=flat-square&logo=github&label=stars\" alt=\"GitHub stars\">\n  </a>\n  <a href=\"https://github.com/evokoa/pggraph/releases\">\n    <img src=\"https://img.shields.io/badge/version-0.1.4-2ea44f?style=flat-square\" alt=\"Version 0.1.4\">\n  </a>\n  <a href=\"LICENSE\">\n    <img src=\"https://img.shields.io/badge/license-Apache--2.0-blue?style=flat-square\" alt=\"License: Apache-2.0\">\n  </a>\n  <a href=\"https://www.postgresql.org/\">\n    <img src=\"https://img.shields.io/badge/PostgreSQL-14--18-336791?style=flat-square&logo=postgresql&logoColor=white\" alt=\"PostgreSQL 14-18\">\n  </a>\n  <a href=\"https://ghcr.io/evokoa/pggraph\">\n    <img src=\"https://img.shields.io/badge/Docker-ghcr.io%2Fevokoa%2Fpggraph-blue?style=flat-square&logo=docker&logoColor=white\" alt=\"Docker image\">\n  </a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/evokoa/pggraph/issues\">\n    <img src=\"https://img.shields.io/github/issues/evokoa/pggraph?style=flat-square&logo=github&label=issues\" alt=\"GitHub issues\">\n  </a>\n  <a href=\"https://github.com/evokoa/pggraph/pulls\">\n    <img src=\"https://img.shields.io/github/issues-pr/evokoa/pggraph?style=flat-square&logo=github&label=PRs\" alt=\"GitHub pull requests\">\n  </a>\n  <a href=\"https://github.com/evokoa/pggraph/commits/main\">\n    <img src=\"https://img.shields.io/github/last-commit/evokoa/pggraph?style=flat-square&logo=github&label=last%20commit\" alt=\"Last commit\">\n  </a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://evokoa.com\" target=\"_blank\" rel=\"noreferrer\">\n  <img\n    src=\"https://img.shields.io/badge/Built%20by-Evokoa-ff6b35?style=for-the-badge\"\n    alt=\"Built by Evokoa\"\n  >\n  </a>\n  <a href=\"https://x.com/evokoa_ai\" target=\"_blank\" rel=\"noreferrer\">\n    <img\n      src=\"https://img.shields.io/badge/Follow%20on%20X-000000?style=for-the-badge&logo=x&logoColor=white\"\n      alt=\"Follow on X\"\n    >\n  </a>\n  <a href=\"https://discord.gg/GnHR8ezuwG\" target=\"_blank\" rel=\"noreferrer\">\n    <img\n      src=\"https://img.shields.io/discord/1496159762704896022?style=for-the-badge&label=Join%20Discord&logo=discord&logoColor=white&color=5865F2\"\n      alt=\"Join the Evokoa Discord\"\n    >\n  </a>\n  <a href=\"https://www.producthunt.com/@evokoa\" target=\"_blank\" rel=\"noreferrer\">\n    <img\n      src=\"https://img.shields.io/badge/Follow%20on%20Product%20Hunt-DA552E?style=for-the-badge&logo=product-hunt&logoColor=white\"\n      alt=\"Follow on Product Hunt\"\n    >\n  </a>\n</p>\npgGraph is a PostgreSQL extension for running graph search, traversal, shortest\npath, and relationship queries directly against ordinary PostgreSQL tables.\n\nYour tables stay the source of truth. pgGraph builds a derived graph index and\nlets you query it from SQL using functions in the `graph` schema.\n\n> [!IMPORTANT]\n> pgGraph is in early alpha. Even though we have tested it to be stable,\n> please avoid production use for now; try it in\n> Docker or a dedicated development database and share feedback to help the\n> project grow.\n\n## Why pgGraph?\n\nPostgreSQL is great at relational queries, but graph-style questions often\nrequire custom recursive SQL for each schema:\n\n- “Find records related to Alice within 2 hops.”\n- “Find the shortest path between this person and this company.”\n- “Search nodes across registered tables.”\n\npgGraph adds graph queries on top of your existing PostgreSQL tables, without\nrequiring a separate graph database, graph-specific storage system, or a new\nquery language.\n\n## Quickstart\n\nThe fastest way to try pgGraph is to pull the pre-built Docker image — no\nbuild step needed.\n\nThe image is multi-arch (`linux/amd64` and `linux/arm64`) and works on macOS,\nLinux, and Windows via Docker Desktop.\n\n```bash\ndocker pull ghcr.io/evokoa/pggraph:0.1.4\ndocker run -d --rm \\\n  --name pggraph \\\n  -e POSTGRES_PASSWORD=postgres \\\n  -p 5432:5432 \\\n  ghcr.io/evokoa/pggraph:0.1.4\n```\n\nThe default database is `graph` with `pg_cron` and a maintenance job\npre-configured.\n\nVerify the extensions are loaded (uses `psql` inside the container, so you\ndon't need a local PostgreSQL client):\n\n```bash\ndocker exec pggraph psql -U postgres -d graph \\\n  -c \"SELECT extname, extversion FROM pg_extension WHERE extname IN ('graph', 'pg_cron');\"\n```\n\nIf you have `psql` installed locally you can also connect directly:\n\n```bash\npsql -h localhost -U postgres -d graph\n```\n\nTo build from source or run the full interactive demo instead, use the included\nquickstart script. It starts a disposable Docker-backed PostgreSQL database,\ninstalls pgGraph, creates two normal PostgreSQL tables, discovers the foreign\nkey relationship, builds the graph, and runs example queries.\n\nYou need Docker or Docker Desktop installed and running:\n\n- macOS: install Docker Desktop.\n- Windows: install Docker Desktop with WSL2 enabled, then run the script from\n  WSL2 or Git Bash.\n- Linux: install Docker Engine and the Docker Compose plugin.\n\n```bash\ngit clone https://github.com/evokoa/pggraph.git\ncd pggraph\n\n# run the full quickstart demo\nscripts/quickstart.sh\n\n# install into existing Postgres Docker container\nscripts/quickstart.sh docker my-postgres 17 appdb postgres\n\n# source build/install with pgrx into local PostgreSQL\nscripts/quickstart.sh pgrx\n\n# start Streamlit playground with a preset dataset (panama|ldbc)\nscripts/quickstart.sh playground panama\n```\n\nSupported modes:\n\n- `quickstart` / `demo`: build and start the Docker Postgres service, load demo\n  data, and run example graph queries. This is the default mode.\n- `setup`: build and start Postgres with pgGraph installed, but do not load the\n  sample graph.\n- `psql`: build and start Postgres, prepare demo data, then open `psql`.\n- `docker CONTAINER [PG_MAJOR] [DB_NAME] [DB_USER]`: install pgGraph into an\n  existing running Postgres Docker container via\n  `scripts/install_into_docker_postgres.sh`.\n- `pgrx [PG_MAJOR]`: build and install pgGraph into a local PostgreSQL using\n  `cargo pgrx install`.\n- `playground [panama|ldbc]`: start the Streamlit playground using a preset\n  dataset.\n- `clean`: stop the Compose database and remove its volume.\n\nThe script works on macOS and Linux from a normal terminal, and on Windows from\nWSL2 or Git Bash with Docker Desktop. It is not a native PowerShell or Command\nPrompt script.\n\nThe root Docker image currently runs PostgreSQL 17. Package scripts can build\nextension artifacts for officially supported PostgreSQL 14 through 18 targets.\nPostgreSQL 13 is no longer an official support target after upstream EOL, though\nthe legacy `pg13` pgrx feature remains available on a best-effort basis. The\nPostgreSQL major version of the extension package must match the target server.\n\n## PGXN Source Installation\n\npgGraph is available on PGXN as a source distribution. Because pgGraph is a\nRust/pgrx extension, building from source requires the Rust toolchain.\n\n### Prerequisites\n\n- PostgreSQL development headers and `pg_config`\n- Rust toolchain (`1.95`, pinned by `graph/rust-toolchain.toml`)\n- `cargo-pgrx` 0.18.0\n\n### Install with pgxn-client\n\n```bash\ncargo install cargo-pgrx --version 0.18.0 --locked\n# Register the installed PostgreSQL with pgrx (auto-detects the major):\nPG_MAJOR=$(pg_config --version | sed -E 's/[^0-9]*([0-9]+).*/\\1/')\ncargo pgrx init --pg${PG_MAJOR}=\"$(which pg_config)\"\npgxn install pgGraph\n```\n\n### Manual source install\n\n```bash\ngit clone https://github.com/evokoa/pggraph.git\ncd pggraph\nmake install # may need sudo\npsql -d postgres -c \"CREATE EXTENSION graph;\"\n```\n\nIf you have multiple PostgreSQL installations, set `PG_CONFIG` to the target\nserver's `pg_config`, then re-run the installation:\n\n```bash\nexport PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config\nmake install\n```\n\nIf `sudo` is needed for `make install`, preserve `PG_CONFIG`:\n\n```bash\nsudo --preserve-env=PG_CONFIG make install\n```\n\nIf compilation fails with `fatal error: postgres.h: No such file or directory`,\ninstall the PostgreSQL server development package for the target PostgreSQL\nmajor, such as `postgresql-server-dev-17` on Ubuntu or Debian.\n\n> **Note:** The PGXN distribution name is `pgGraph` but the PostgreSQL extension\n> name is `graph`. Use `CREATE EXTENSION graph;` after installation.\n\n## Documentation\nMore information is available in the pgGraph docs:\n\n**[Overview](https://docs.evokoa.com/pggraph/user_guide)** ·\n**[Quickstart](https://docs.evokoa.com/pggraph/quickstart)** ·\n**[Installation](https://docs.evokoa.com/pggraph/user_guide/installation)** ·\n**[Playground](https://docs.evokoa.com/pggraph/user_guide/playground)** ·\n**[Querying](https://docs.evokoa.com/pggraph/user_guide/querying)** ·\n**[SQL API](https://docs.evokoa.com/pggraph/user_guide/api-reference)**\n\n## pgGraph: High-Speed Graph Execution Inside PostgreSQL\n\npgGraph is not \"Postgres plus graph syntax.\" It is a cache-friendly graph\nexecution layer for data that already lives in your ordinary relational tables.\n\nThe core idea is simple but powerful: keep PostgreSQL as your system of record,\nbut build a highly optimized, read-heavy graph runtime from that relational\nmetadata. The result is closer to a rebuildable graph index than a graph\ndatabase: it is built from Postgres tables, operated with Postgres controls,\nand optimized for repeated bounded traversal over known topology.\n\n### The Tech: Why It's So Fast\n\nGraph traversals usually die on recursive SQL queries or endless joins. pgGraph\nbypasses this by compiling your relational data into a specialized memory\nstructure.\n\n- **O(1) adjacency via CSR.** `graph.build()` compiles your relationships into\n  forward and reverse compressed sparse row (CSR) edge stores. A node's\n  neighbors are stored as a contiguous array slice. Instead of rediscovering\n  relationships via SQL, traversals are executed as raw, graph-native memory\n  scans.\n- **A tight traversal loop.** SQL-facing calls resolve coordinates, labels,\n  filters, and tenant scopes before entering the traversal loop. Once inside,\n  the engine streams CSR neighbors, checking compact `u8` edge-label IDs,\n  typed `FilterIndex` values, tenant bitmaps, active bits, and sync overlays.\n- **Read-only artifact mapping.** Persisted `.pggraph` artifacts are written\n  atomically. When a new Postgres backend spins up, it validates the artifact\n  and maps immutable forward graph arrays and the resolution index read-only.\n  The operating system page cache can then share those physical pages across\n  isolated PostgreSQL backends without copying the base graph into each\n  backend's Rust heap. This is not a replacement for PostgreSQL's buffer pool:\n  PostgreSQL remains responsible for table storage, WAL, MVCC, durability, and\n  crash recovery, while pgGraph's artifact is derived state that can be rebuilt\n  from source tables.\n- **Predictable and safe.** Unbounded graph expansion can crash a database.\n  pgGraph includes explicit circuit breakers: depth limits, visited-node\n  tracking, frontier limits, pagination, and strict OOM/memory safeguards.\n\n### PostgreSQL Remains Authoritative\n\nYour application data does not move. Source tables, constraints, indexes, ACLs,\nRLS, backups, and app writes remain 100% standard PostgreSQL concerns.\n\npgGraph is strictly derived state. You run the algorithms over internal node\nindexes, and the engine returns source table coordinates or hydrates the raw\nPostgreSQL rows on the fly. Build, sync, vacuum, and maintenance operations are\nfully visible and SQL-callable.\n\n### How pgGraph Compares\n\n#### vs. Apache AGE: Execution Layer vs. Storage Layer\n\nApache AGE is a property graph database inside Postgres. It uses graph\nnamespaces, vertex and edge tables, `agtype`, and openCypher.\n\npgGraph does not ask you to move your data or learn Cypher. You keep your\nexisting schema and accelerate it with SQL functions like `graph.search()` and\n`graph.shortest_path()`. Use AGE for a dedicated property graph model; use\npgGraph to add bounded, high-speed graph traversal to an existing relational\nschema.\n\n#### vs. PostgreSQL 19 SQL/PGQ\n\nSQL:2023 and PostgreSQL 19 introduce `CREATE PROPERTY GRAPH`, `GRAPH_TABLE`,\nand standard graph pattern matching backed by PostgreSQL's planner and\noptimizer — the same engine that makes PostgreSQL's relational queries strong.\n\npgGraph operates at a different layer. SQL/PGQ expresses graph patterns and lets\nthe optimizer choose how to execute them. pgGraph precomputes CSR adjacency\nstores and rebuildable artifacts for workloads that repeatedly traverse the same\ntopology with bounded depth, path limits, filters, tenants, and application\npagination. The two can be complementary: future adapters could map eligible\nSQL/PGQ patterns onto pgGraph's precomputed runtime, while general graph queries\ncontinue to use PostgreSQL's relational execution path.\n\n## Community\n\npgGraph is built by [Evokoa](https://evokoa.com). \nFollow the project through\nthe links at the top of this README.\n\n## License\n\nApache-2.0. See [LICENSE](LICENSE).\n","summary":"pgGraph is a PostgreSQL extension that enables powerful graph analysis capabilities, including traversal, shortest path calculation, and complex relationship searching, directly on your existing relational data. By building a derived graph index from your current tables, it allows you to execute sophisticated graph queries using standard SQL without the need for a separate graph database or proprietary query languages. This tool is ideal for developers and database administrators who need to perform deep data relationship analysis while maintaining PostgreSQL as their single source of truth.","description":"Open-source graph database superpowers for your existing Postgres data.","stars":345,"language":"Rust"},{"owner":"seochecks-ai","repo":"slopless","url":"https://github.com/seochecks-ai/slopless","readme":"# slopless\n\n[![npm](https://img.shields.io/npm/v/slopless?label=npm)](https://www.npmjs.com/package/slopless)\n[![downloads](https://img.shields.io/npm/dm/slopless)](https://www.npmjs.com/package/slopless)\n[![bundle size](https://img.shields.io/bundlephobia/minzip/slopless?label=minzip)](https://bundlephobia.com/package/slopless)\n[![install size](https://packagephobia.com/badge?p=slopless)](https://packagephobia.com/result?p=slopless)\n[![license](https://img.shields.io/npm/l/slopless)](LICENSE)\n[![node](https://img.shields.io/badge/node-22%2B-brightgreen)](package.json)\n\n[![ci](https://img.shields.io/github/actions/workflow/status/seochecks-ai%2Fslopless/ci.yml?branch=main&label=ci)](/actions/workflows/ci.yml)\n[![scorecard](https://api.scorecard.dev/projects/github.com/seochecks-ai/slopless/badge)](https://scorecard.dev/viewer/?uri=github.com/seochecks-ai/slopless)\n[![socket](https://socket.dev/api/badge/npm/package/slopless)](https://socket.dev/npm/package/slopless)\n[![snyk advisor](https://snyk.io/advisor/npm-package/slopless/badge.svg)](https://snyk.io/advisor/npm-package/slopless)\n\nCatch AI and human slop in English Markdown without calling an LLM. Slopless ships 50+ deterministic textlint rules and a CLI that emits structured JSON findings.\n\n## What it catches\n\nGiven this paragraph (typical LLM prose):\n\n```markdown\nIn today's rapidly evolving landscape, it's important to note that AI tools\nare revolutionizing how we work - truly transforming workflows in\nunprecedented ways. By harnessing the power of large language models, teams\ncan delve into complex challenges, streamline operations, and unlock new\npossibilities. But what does this really mean for you? In essence, the\nfuture belongs to those who embrace these tools today. Not just to keep up,\nnot just to stay competitive, but to thrive.\n```\n\n`npx slopless` returns nine findings across seven rules:\n\n```\n[slopless/generic-signposting]  it's important to note\n[slopless/prohibited-phrases]   it's important to note\n[slopless/llm-vocabulary]       landscape\n[slopless/llm-vocabulary]       delve\n[slopless/prohibited-words]     delve\n[slopless/prohibited-words]     unlock\n[slopless/prohibited-phrases]   the future belongs to\n[slopless/negation-reframe]     Not just X, not just Y, but Z\n[slopless/flesch-kincaid]       Flesch Reading Ease 56.05 (keep >= 61)\n```\n\nFull JSON output is the default. See the [Rules](https://github.com/seochecks-ai/slopless/wiki/Rules) page for the complete inventory.\n\n## Intended Usage Loop\n\n```bash\nnpm install -D slopless\nnpx slopless install-skill codex\nnpx slopless install-skill claude\n```\n\nThen start a fresh writing-agent session and tell it to use the Slopless skill:\n\n```text\nUse the Slopless skill. Check this Markdown, rewrite the prose, and keep iterating until Slopless passes.\n```\n\nLoop:\n\n1. Install Slopless.\n2. Install the agent skill for Codex or Claude Code.\n3. Tell the writing agent to use the skill.\n4. Let the agent run Slopless, rewrite, and rerun until the JSON output has no findings.\n5. Profit.\n\n## Direct CLI Use\n\n```bash\nnpx slopless \"docs/**/*.md\"\n```\n\nSlopless is English-only. It requires a file path, glob, or stdin input. A bare `npx slopless` exits with code `2`.\n\nExit `0` means clean. Exit `1` means findings. Exit `2` means failure.\n\nOutput is always JSON:\n\n```bash\nmkdir -p .slopless/findings\nnpx slopless \"docs/**/*.md\" > \".slopless/findings/$(date +%Y-%m-%d-%H%M%S)--review.json\"\n```\n\n## Agent Use\n\nAgents should run help first:\n\n```bash\nnpx slopless --help\n```\n\nAgents should save raw JSON findings under `.slopless/findings/` in the current working directory. Slopless does not choose redirected output filenames, slugs, or timestamps.\n\nInstall the Codex skill into the current repo:\n\n```bash\nnpx slopless install-skill codex\n```\n\nInstall the Claude Code skill into the current repo:\n\n```bash\nnpx slopless install-skill claude\n```\n\nBoth commands install the same `slopless` skill body. Start a new agent session after installing if the skill is not visible.\n\n## Ignore rules\n\nUse textlint comments around intentional exceptions:\n\n```markdown\n<!-- textlint-disable slopless/semantic-thinness -->\n\nSomething shifted in the room.\n\n<!-- textlint-enable slopless/semantic-thinness -->\n```\n\n## More\n\n- [Philosophy](https://github.com/seochecks-ai/slopless/wiki/Philosophy) - what slopless is for, design principles, why deterministic.\n- [Comparison](https://github.com/seochecks-ai/slopless/wiki/Comparison) - slopless vs proselint, write-good, alex, vale, default textlint presets.\n- [Rules](https://github.com/seochecks-ai/slopless/wiki/Rules) - full 50+ rule inventory across seven families.\n- [Behavior](https://github.com/seochecks-ai/slopless/wiki/Behavior) - CLI flags, exit codes, JSON output shape, direct textlint integration.\n- [Ignore rules](https://github.com/seochecks-ai/slopless/wiki/Ignore-Rules) - inline `textlint-disable` block syntax.\n- [Thanks](https://github.com/seochecks-ai/slopless/wiki/Thanks) - direct rule sources, dependencies, and acknowledgments.\n- [Roadmap](ROADMAP.md) - near-term direction and links to active plans.\n- [Contributing](.github/CONTRIBUTING.md) - open a detailed issue first; PRs must pass the G3TS pre-commit gate.\n\n## Verify the package\n\nEvery release since 0.2.13 is published from GitHub Actions via OIDC and carries a [SLSA v1 provenance attestation](https://registry.npmjs.org/-/npm/v1/attestations/slopless@latest) recorded in the [Sigstore](https://www.sigstore.dev/) transparency log.\n\n```bash\nnpm audit signatures slopless\n```\n\nThis confirms the tarball you installed was built in the published source repository's Actions environment, from the commit the GitHub Release points at.\n\n## Star history\n\n[![Star History Chart](https://api.star-history.com/svg?repos=seochecks-ai/slopless&type=Date)](https://star-history.com/#seochecks-ai/slopless&Date)\n\n---\n\nDeveloped by [seochecks.ai](https://seochecks.ai) to keep content specific, useful, and recognizably human.\n","summary":"slopless is a Node.js CLI and text-checking library that detects “slop” in English Markdown by flagging common AI and human writing problems without calling an LLM. It provides 50+ deterministic textlint-style rules and outputs structured JSON findings, making it easy to review issues and drive rewrite loops. You can run it directly on files or integrate it into writing agents via compatible “skills” (for Codex and Claude Code) to iteratively rewrite content until checks pass. It’s best for teams and individuals who want automated, explainable prose quality control for documentation, blogs, and other Markdown-based content.","description":"Deterministic textlint rules and CLI for catching prose slop in English Markdown.","stars":306,"language":"TypeScript"},{"owner":"smithersai","repo":"claude-p","url":"https://github.com/smithersai/claude-p","readme":"# claude-p\n\n> **Use at your own risk.** This package and repository exist for\n> **educational purposes** and demonstrates why client-side restrictions\n> on how a product is used are fundamentally unenforceable.\n\nA drop-in replacement for `claude -p` that drives the interactive\n`claude` UI inside an in-process [zmux][zmux] PTY session.\n\n[zmux]: https://github.com/smithersai/zmux\n\nBuilt using [smithers](https://github.com/smithersai/smithers) self-improving harness\n\n## Use\n\n```bash\nnpx claude-p \"your prompt here\"\n```\n\nOutput on stdout matches `claude -p` byte-for-byte.\n\n```bash\nnpx claude-p --output-format json \"summarize this commit\" < commit.diff\nnpx claude-p --output-format stream-json \"audit src/\" --verbose | jq .\nnpx claude-p --model opus \"explain quicksort to a 10-year-old\"\n```\n\n## How it works\n\n1. Spawns `claude` interactively inside a [zmux][zmux] `NativeSession`\n   (a real PTY with a reader thread and bounded scrollback).\n2. A small ANSI scanner answers the DA1 / DA2 / DSR / XTVERSION /\n   window-size queries Ink (the React-for-terminals runtime Claude\n   Code uses) issues at startup. Without these, the TUI hangs.\n3. Registers two hooks via `--settings '<inline-json>'` — never\n   touches your `~/.claude/` config:\n   - **`SessionStart`** — the wrapper types the prompt + Enter.\n   - **`Stop`** — fires when the model finishes; payload carries\n     `transcript_path`.\n4. Reads the transcript JSONL, extracts the final assistant message\n   plus usage, and prints in the requested format.\n\n## Flags\n\n```\n--output-format <text|json|stream-json>   default: text\n--model <name>\n--fallback-model <name>\n--max-turns <N>\n--allowedTools <list>\n--disallowedTools <list>\n--permission-mode <acceptEdits|auto|bypassPermissions|default|dontAsk|plan>\n--dangerously-skip-permissions\n--system-prompt <text>\n--append-system-prompt <text>\n--add-dir <dir>...                        repeatable, variadic\n--mcp-config <cfg>...                     repeatable, variadic\n--setting-sources <user,project,local>\n--resume <id> | --continue | --session-id <uuid>\n--cwd <path>\n--input-file <path>\n--verbose\n--timeout <seconds>                       default: 300\n--debug\n--                                        end-of-options, remaining tokens go to PROMPT\n```\n\nUnrecognized flags are forwarded verbatim to `claude`. `-p`/`--print` and\nuser-supplied `--settings` are rejected — claude-p emulates print mode and\ninjects its own settings to register the Stop hook.\n\n## Exit codes\n\n| Code  | Meaning                                                               |\n| ----- | --------------------------------------------------------------------- |\n| `0`   | Success.                                                              |\n| `1`   | Assistant returned an error (`is_error: true`) or transcript missing. |\n| `2`   | Wrapper internal error (PTY failure, spawn failed, etc.).             |\n| `124` | Timed out or `--max-turns` exceeded.                                  |\n| `130` | Interrupted (SIGINT).                                                 |\n\n## Caveats\n\n- **macOS / Linux only.** No Windows (no `forkpty`).\n- **Requires `claude` on `$PATH`.** The wrapper invokes the real CLI.\n- **Per-message streaming, not per-token.** With\n  `--output-format stream-json`, transcript lines (user messages, tool\n  uses, assistant turns, the trailing `result` envelope) are emitted\n  to stdout the moment `claude` flushes them. Individual tokens within\n  a single assistant message are not streamed — those require\n  `claude -p --include-partial-messages` which is only available in\n  claude's native `--print` mode.\n- **Adds ~50–200 ms** over `claude -p` due to PTY + Ink startup\n  overhead.\n- **Multiline prompts** must come via `--input-file` or stdin to keep\n  shell escaping sane.\n- **API instability.** `claude` is not designed to be driven this way.\n  A future Claude Code release that changes the hook payload schema or\n  adds a new terminal probe at startup can break us; the wrapper will\n  surface the failure rather than hide it.\n\n## From source\n\n```bash\ngit clone https://github.com/smithersai/claude-p\ncd claude-p\nzig build -Doptimize=ReleaseSafe\n```\n\nRequires Zig **0.15.2**. Dependencies are fetched by `zig build`.\n\n## As a Zig library\n\n```sh\nzig fetch --save=claude_p git+https://github.com/smithersai/claude-p\n```\n\n```zig\nconst std = @import(\"std\");\nconst claude_p = @import(\"claude_p\");\n\npub fn main() !void {\n    var gpa: std.heap.GeneralPurposeAllocator(.{}) = .{};\n    defer _ = gpa.deinit();\n    const alloc = gpa.allocator();\n\n    var result = try claude_p.run(alloc, .{\n        .prompt = \"what is the capital of France?\",\n        .output_format = .text,\n        .skip_permissions = true,\n    });\n    defer result.deinit(alloc);\n\n    std.debug.print(\"{s}\\n\", .{result.summary.final_text});\n}\n```\n\nThe `Options` struct mirrors the CLI flags 1:1. See `src/root.zig` and\n[`SPEC.md`](./SPEC.md) for the full API.\n\n## License\n\nMIT.\n","summary":"claude-p is a drop-in wrapper for `claude -p` that runs the interactive Claude UI inside an in-process PTY (via zmux) so it can be invoked from the command line. It handles the terminal startup handshake needed by the Claude Code/Ink TUI, injects its own settings to capture a start and stop hook, then reads the resulting transcript JSONL to print the final assistant response in text or JSON (including stream-json). The project is especially useful for developers and power users who want to automate Claude’s “print mode”-like behavior from scripts while preserving byte-for-byte output compatibility as much as possible. It will benefit anyone building tooling around Claude, but the README cautions it’s educational, macOS/Linux only, depends on `claude` being on PATH, and may break if Claude Code’s internal hook schema changes.","description":"Drop-in replacement for `claude -p` that drives the interactive Claude Code TUI inside an in-process zmux PTY session.","stars":338,"language":"Zig"},{"owner":"agentic-in","repo":"elephant-agent","url":"https://github.com/agentic-in/elephant-agent","readme":"<p align=\"center\">\n  <img src=\"apps/site/static/assets/resources/readme-1.png\" alt=\"Elephant Agent follows a personal path with people, places, risks, rhythms, decisions, and a Personal Model\" width=\"920\" />\n</p>\n\n<div align=\"center\">\n  <h1>Elephant Agent</h1>\n  <p>\n    <strong>Do more without thinking less.</strong><br />\n    A Mother Elephant that grows to understand you, then helps shape the paths you are trying to move.\n  </p>\n  <p>\n    <a href=\"https://elephant.agentic-in.ai/\">Website</a>\n    ·\n    <a href=\"https://elephant.agentic-in.ai/blog/personal-ai-you-create/\">Blog</a>\n    ·\n    <a href=\"https://elephant.agentic-in.ai/paper/\">Paper</a>\n  </p>\n</div>\n\n\n## What It Is\n\nElephant Agent starts from the person, not the task.\n\nThe mother elephant grows a correctable **Personal Model** of who you are, what\nsurrounds you, what is alive right now, and what your path has taught you. That\nunderstanding keeps deepening through interaction, correction, and gentle\nquestions.\n\nOnce Elephant Agent understands enough, it can help design living **Paths**:\nwork, health, habits, learning, relationships, recovery, research, code, and any\nother long-running direction you want to move. It can break a Path into Steps,\nbring in baby elephants when useful, and return to you at Checkpoints where your\njudgment matters.\n\n## Personal Agent Levels\n\n<p align=\"center\">\n  <img src=\"apps/site/static/assets/brand/agent-levels-positioning.png\" alt=\"Four levels of personal AI with Elephant Agent positioned at L4\" width=\"920\" />\n</p>\n\n<table>\n  <tr>\n    <td width=\"25%\">\n      <strong>L1</strong>\n      <br />\n      <strong>Executes tasks.</strong>\n      <br />\n      <sub>Claude Code, Cursor, Devin, and Codex-style agents make execution cheaper and faster.</sub>\n    </td>\n    <td width=\"25%\">\n      <strong>L2</strong>\n      <br />\n      <strong>Carries context.</strong>\n      <br />\n      <sub><a href=\"https://openclaw.ai/\">OpenClaw</a> publicly emphasizes local agents, persistent memory, full system access, skills, plugins, and integrations.</sub>\n    </td>\n    <td width=\"25%\">\n      <strong>L3</strong>\n      <br />\n      <strong>Improves procedures.</strong>\n      <br />\n      <sub><a href=\"https://hermes-ai.net/\">Hermes Agent</a> publicly positions itself around a self-improving learning loop, skill creation, recall, and user modeling.</sub>\n    </td>\n    <td width=\"25%\">\n      <strong>L4</strong>\n      <br />\n      <strong>Grows with the person.</strong>\n      <br />\n      <sub>Elephant Agent's product position: Mother understands the person, shapes Paths, and keeps judgment, evidence, questions, and learning close to the person.</sub>\n    </td>\n  </tr>\n</table>\n\n## Personal Model\n\n- **Identity** — who you are, your values, boundaries, decision style, and stable preferences.\n- **World** — the people, projects, tools, places, and relationships around you.\n- **Pulse** — what is alive right now: focus, pressure, constraints, energy, and priorities.\n- **Journey** — what your path has taught: lessons, failures, recovery patterns, and long-running growth.\n\n<p align=\"center\">\n  <img src=\"apps/site/static/assets/resources/readme-2.png\" alt=\"The four Personal Model lenses: Identity, World, Pulse, and Journey\" width=\"68%\" />\n</p>\n\nThe goal is not to remember everything. The goal is to understand what matters,\nshow why it matters, let you change it, and turn that understanding into better\nPaths over time.\n\n## macOS Desktop App\n\nThe macOS app is the recommended product surface. Chat / Wake is where you talk\nto Mother; Paths are where long-running life and work arcs become visible; the\nrest of the app keeps the Personal Model, Herd, skills, messaging, calendar,\nusage, and advanced runtime settings inspectable instead of hidden behind a chat\nbox.\n\n<p align=\"center\">\n  <img src=\"apps/site/static/assets/screenshots/macos-home.jpg\" alt=\"Elephant Agent macOS Home screen with the Personal Model map, current context, and next useful question\" width=\"920\" />\n  <br />\n  <sub><strong>Home</strong> — start from what Mother understands before shaping the next Path.</sub>\n</p>\n\n<table>\n  <tr>\n    <td width=\"50%\">\n      <img src=\"apps/site/static/assets/screenshots/macos-onboarding-language.jpg\" alt=\"Elephant Agent onboarding language screen\" />\n      <br />\n      <strong>Preferences</strong>\n      <br />\n      <sub>Choose language, boundaries, model posture, and curiosity effort.</sub>\n    </td>\n    <td width=\"50%\">\n      <img src=\"apps/site/static/assets/screenshots/macos-wake.jpg\" alt=\"Elephant Agent Wake chat surface\" />\n      <br />\n      <strong>Chat / Wake</strong>\n      <br />\n      <sub>Return to Mother and the same path, not a blank prompt.</sub>\n    </td>\n  </tr>\n  <tr>\n    <td width=\"50%\">\n      <img src=\"apps/site/static/assets/screenshots/macos-personal-model.jpg\" alt=\"Elephant Agent Personal Model map\" />\n      <br />\n      <strong>Personal Model</strong>\n      <br />\n      <sub>Inspect the understanding that shapes future Paths.</sub>\n    </td>\n    <td width=\"50%\">\n      <img src=\"apps/site/static/assets/screenshots/macos-providers.jpg\" alt=\"Elephant Agent model provider settings\" />\n      <br />\n      <strong>Providers</strong>\n      <br />\n      <sub>Use local or hosted models as advanced posture, not the product center.</sub>\n    </td>\n  </tr>\n  <tr>\n    <td width=\"50%\">\n      <img src=\"apps/site/static/assets/screenshots/macos-skills.jpg\" alt=\"Elephant Agent skills screen\" />\n      <br />\n      <strong>Skills</strong>\n      <br />\n      <sub>See which skills help Mother and the Herd move a Path.</sub>\n    </td>\n    <td width=\"50%\">\n      <img src=\"apps/site/static/assets/screenshots/macos-tools.jpg\" alt=\"Elephant Agent tools screen\" />\n      <br />\n      <strong>Tools</strong>\n      <br />\n      <sub>Keep browser, filesystem, MCP, and operator actions explicit.</sub>\n    </td>\n  </tr>\n  <tr>\n    <td width=\"50%\">\n      <img src=\"apps/site/static/assets/screenshots/macos-herd.jpg\" alt=\"Elephant Agent herd screen\" />\n      <br />\n      <strong>Herd</strong>\n      <br />\n      <sub>Coordinate Mother and baby elephants under one understanding.</sub>\n    </td>\n    <td width=\"50%\">\n      <img src=\"apps/site/static/assets/screenshots/macos-messaging.jpg\" alt=\"Elephant Agent messaging integrations\" />\n      <br />\n      <strong>Messaging</strong>\n      <br />\n      <sub>Connect WeChat, Feishu, Discord, DingDing, or WeCom when you want it.</sub>\n    </td>\n  </tr>\n  <tr>\n    <td width=\"50%\">\n      <img src=\"apps/site/static/assets/screenshots/macos-calendar.jpg\" alt=\"Elephant Agent calendar and reminders\" />\n      <br />\n      <strong>Calendar</strong>\n      <br />\n      <sub>Keep routines, reminders, and long-running Paths visible.</sub>\n    </td>\n    <td width=\"50%\">\n      <img src=\"apps/site/static/assets/screenshots/macos-usage.jpg\" alt=\"Elephant Agent token usage screen\" />\n      <br />\n      <strong>Usage</strong>\n      <br />\n      <sub>Inspect local token flow and runtime events instead of treating cost as a black box.</sub>\n    </td>\n  </tr>\n</table>\n\n## Quickstart\n\nElephant Agent has two supported product shapes.\n\n### 1. macOS desktop app (recommended)\n\nUse this path for the full local desktop workspace: Chat / Wake, Paths, Personal\nModel, Herd, skills, messaging, calendar, usage, and settings in one native app.\n\n1. Download the latest macOS build from [GitHub Releases](https://github.com/agentic-in/elephant-agent/releases/latest).\n2. Open `Elephant Agent.app`.\n3. Create your first elephant, choose a provider, and set curiosity effort.\n4. Return through Chat / Wake when you want Mother to continue the same path.\n\n### 2. CLI + Dashboard (Linux / Cloud)\n\nUse this path for Linux, cloud machines, SSH workflows, and terminal-first\noperators. The CLI is the daily terminal surface; the Dashboard is the visual\ninspection surface for Personal Model, evidence, jobs, skills, and runtime\nstate.\n\n<table>\n  <tr>\n    <td width=\"50%\">\n      <img src=\"apps/site/static/assets/screenshots/cli-wake.jpg\" alt=\"Elephant Agent CLI wake session\" />\n      <br />\n      <strong>CLI</strong>\n    </td>\n    <td width=\"50%\">\n      <img src=\"apps/site/static/assets/screenshots/dashboard-personal-model.jpg\" alt=\"Elephant Agent Dashboard Personal Model map\" />\n      <br />\n      <strong>Dashboard</strong>\n    </td>\n  </tr>\n</table>\n\nInstall:\n\n```bash\ncurl -fsSL https://elephant.agentic-in.ai/install.sh | bash\n```\n\nFirst run:\n\n```bash\nelephant init        # choose identity, provider, and curiosity effort\nelephant status      # check provider and local runtime readiness\nelephant wake        # enter the chat TUI\nelephant dashboard   # open Personal Model, questions, evidence, and runtime state\n```\n\nFor remote or cloud use, `elephant dashboard --no-open` prints the local URL so\nyou can attach through your preferred tunnel or browser setup.\n\n## Read More\n\nREADME and the homepage stay product-first. The deeper system story lives here:\n\n- [Read the docs →](https://elephant.agentic-in.ai/docs/)\n- [Read the paper →](https://elephant.agentic-in.ai/paper/)\n- [Read the blog →](https://elephant.agentic-in.ai/blog/personal-ai-you-create/)\n\n## Contributors\n\n<p align=\"center\">\n  <img src=\"docs/paper/assets/agentic-intelligence-lab-lockup.png\" alt=\"Agentic Intelligence Lab\" width=\"320\" />\n</p>\n\n<p align=\"center\">\n  <bold>\n    Agentic Intelligence Lab\n  </bold>\n</p>\n","summary":"Elephant Agent is an “agentic” personal AI that starts from the person rather than a one-off task, progressively building a correctable Personal Model of your identity, surrounding world, current pulse, and your journey. With that understanding, it helps you design and manage long-running “Paths” like work, health, habits, learning, relationships, recovery, research, and even coding—breaking Paths into Steps and revisiting decision Checkpoints where you stay in control. It also uses a macOS desktop app to keep context, the Personal Model, Herd components, skills, and advanced runtime details inspectable instead of hidden behind a chat. This is best for people who want persistent, adaptive planning and coaching across evolving goals, not just faster execution.","description":"Personal-Model First Self Evolving AI Agent 🐘","stars":563,"language":"Python"},{"owner":"imtomt","repo":"ymawky","url":"https://github.com/imtomt/ymawky","readme":"![](docs/ymawky.png)\n\n# *ymawky* -- web server in ARM assembly\nThis is *ymawky* (yuh maw kee), a web server written entirely in ARM64 assembly. ymawky is a syscall-only, no libc, fork-per-connection web server written by hand. While it is developed for MacOS, I've tried to make it as portable as possible -- *however*, it's likely you will still need to make some ~~(hopefully minor)~~ Significant tweaks to get this to run on Linux/other Unix systems. See [Implementation Notes](#implementation-notes) for more details.\n\n## Building\nRequires Xcode Command Line Tools. Install with `xcode-select --install`.\nymawky only runs on apple silicon (arm64).\n\nRun `make` to build.\n\nEnsure there is a `www/` directory next to the `ymawky` executable. That's the document root where *ymawky* searches for files.\n`GET` with an empty filename (`GET /`) will search for `www/index.html`, so you might want to make sure there's an `index.html` as well.\n\n*ymawky* will try to serve static error pages when a client's request results in error, eg 404. The pages it searches for in `err/(code).html`, so ensure `err/` exists alongisde `ymawky` and `www/`.\nSee [Configuration](#configuration) to modify the default file and docroot.\n\n## Running\n- `./ymawky` to start running the web server on `127.0.0.1:8080`.\n- `./ymawky [port]` to start running the web server on `127.0.0.1:[port]`\n- `./ymawky [literally-any-character-other-than-0-9]` to start running the web server on 127.0.0.1:8080 in debug mode. Debug mode disables forking, and makes ymawky only handle one request. (*I needed to do this because `lldb` wasn't letting me debug the children, ugh.*)\n\nUnfortunately, while custom ports are supported, custom addresses are not. as of right now, ymawky can only run on `127.0.0.1`. This is solely because I haven't implemented it -- but if you'd like to consider this a safety feature, then I guess it could be intentional.\n\nTo see ymawky in action, start running ymawky with `./ymawky [port]`. Then open your web browser of choice (or use curl), and visit `127.0.0.1:8080/` or `127.0.0.1:8080/pretty/index.html`. Bask in the warmth of assembly.\n\n## What can it do?\nymawky is a ~~static-file~~ dynamic web server. It ~~doesn't~~ **does** support server-side code to generate content on-the-fly, and more advanced URL parsing such as `/search?query=term`, through CGI scripts.\n- Supported HTTP methods:\n    - GET\n    - PUT\n    - DELETE\n    - OPTIONS\n    - HEAD\n    - POST, through CGI scripts\n- Basic protection from slowloris-like Denial of Service attacks\n- Decodes % hex encoding, eg, `%20` decodes to a space in filenames, and `%61` decodes to `a`\n- Smart path traversal detection and prevention. Blocks `..` from traversing paths, while not disallowing multiple periods when they're part of a file:\n  - `GET /../../../etc/passwd` -> `403 Forbidden`\n  - `GET /ohwell...txt` -> `200 OK`\n  - `GET /../src/ymawky.S` -> `403 Forbidden`\n  - `GET /hehe..txt` -> `200 OK`\n- Automatically prepends `www/` to requested files. `GET /index.html` will retrieve `www/index.html`\n- Empty `GET /` requests default to `GET www/index.html`\n- `PUT` requests support uploads of up to 1GiB, though this can be configured for larger files\n- `PUT` is atomic due to writing to a temporary file then renaming, allowing concurrent `PUT` requests without leaving partially-written files\n- `Content-Length:` parsing and verification in `PUT` requests\n- MIME type detection, giving `Content-Type` in the response header with the corresponding MIME type\n- Accepts `Range: bytes=` ranges in GET requests, supporting full ranges `bytes=X-N`, suffix ranges `bytes=-N`, and open-ended ranges `bytes=X-`. Video scrubbing is well supported\n- Basic HTTP version parsing. Requests need to specify `HTTP/1.1` or `HTTP/1.0`, and if requesting `HTTP/1.1`, a `Host:` field needs to be present in the header. Currently, ymawky doesn't do anything with Host, but per RFC 9112 Section 3.2, the Header must be sent\n- Serves custom HTML pages for error codes, such as 404, or 500. Look in the `err/` directory for an example\n- If the requested resource is a directory, list all files and subdirs in the directory. Note that this excludes www/ (or whatever your docroot is): GET / will always search for index.html if no file is given.\n- CGI script support. All CGI scripts must be located within `CGI_DIR` (defined in `config.S`, default to `(docroot)/cgi-bin/`).\n  - Query strings (`/cgi-bin/ratbook?q=do+you+like+rats&a=yes!`) are supported\n  - ymawky parses the CGI script's headers and forwards them to the client response\n  - Enforces some minimal CGI compliance: all CGI scripts must begin their response with a header, if the response has a body as well, the header must contain a Content-Length field.\n  - HTTP response code is determined by the CGI script's Status: header field, so scripts can send their own 404 or 500 or what have you. If no Status is provided, a default of `200 OK` is used.\n\n## \"Safety\"\nThis is a web server written entirely by-hand in ARM64 assembly as a fun project. It's probably got a lot of vulnerabilities I'm unaware of. However, I did do my best to make it safer. Here are some safety precautions ymawky takes.\n- Rejects paths >= PATH_MAX (4096 bytes)\n- Reject any paths that include path traversal -- `/../..`\n- Reject any requests that do not contain a path within 16 bytes\n- Confined to `www/`. Any path requested gets `www/` prepended to it\n- Rejects any path containing symlinks, with O_NOFOLLOW_ANY\n- PUT writes to a temporary file, `www/.ymawky_tmp_<pid>`. Upon successfully receiving the whole file, this temporary file is then renamed to the requested filename. This prevents partial or corrupted PUT requests from overwriting existing files.\n- Reject any requests whose path starts with `www/.ymawky_tmp_`. This prevents someone from `GET`ing a temporary file, and prevents someone from sending `PUT /.ymawky_tmp_4533` or something.\n- Must receive data within 10 seconds. If it's slower, the connection will close. If the entire header is not received within 10 seconds total, the connection will be closed. This is to prevent slowloris-like attacks.\n- CGI script support limited to the (configurable) `cgi-bin/` directory. Any request sent through `cgi-bin` gets treated the same, so you can't PUT a file with a destination inside `cgi-bin`, it just gets executed as a CGI script (if it exists).\n- Please note that CGI script support is currently *experimental*, and doesn't have the same strict timeout settings as PUT does. A CGI script could theoretically loop forever, read input forever, hang somewhere forever, and ymawky will not kill the script. You shouldn't run ymawky on a real server (lol), but if you *have* to, remove the `www/cgi-bin/` directory, and don't allow CGI support.\n\n## CGI Script Support\nCGI, or Common Gateway Interface, is an interface specification that enables web servers to execute an external program to process HTTP user requests (thank you, wikipedia). Basically, a CGI script is an executable script on the server. The script runs and generates dynamic content in response to user requests, rather than serving one static file.\n\nymawky supports query strings: everything after the `?` in URLs. So if you have a CGI script called `logbook`, you could send a request for `/cgi-bin/logbook?q=nice+job`, and ymawky will execute logbook with the `QUERY_STRING` environmental variable set to `q=nice+job`.\n\n# CGI Limitations\nCGI support in ymawky is limited. ymawky does not support `PATH_INFO`; in a request like `/blog/2024/01`, `blog` could be the executable path and `/2024/01` is passed in the `PATH_INFO` environmental variable. ymawky just treats every path as being a literal path, it would look for the file `/blog/2024/01`.\n\n# CGI Security note\nCGI scripts can have their own vulnerabilities, since they're full programs on their own. They need to do their own error handling, input parsing, etc. What ymawky does is simple (in a manner of speaking): find the executable file, set some environmental variables, fork, execute the CGI script, and write HTTP content between the user and the CGI script.\n\n## HTTP Status Codes\nymawky currently supports and can reply with the following status codes:\n- `200 OK`\n- `201 Created`\n- `204 No Content`\n- `206 Partial Content`\n- `400 Bad Request`\n- `403 Forbidden`\n- `404 Not Found`\n- `408 Request Timeout`\n- `409 Conflict`\n- `411 Length Required`\n- `413 Content Too Large`\n- `414 URI Too Long`\n- `416 Range Not Satisfiable`\n- `418 I'm a teapot`\n- `431 Request Header Fields Too Large`\n- `500 Internal Server Error`\n- `501 Not Implemented`\n- `502 Bad Gateway`\n- `503 Service Unavailable`\n- `505 HTTP Version Not Supported`\n- `507 Insufficient Storage`\n\nCustom HTML pages will be served alongside the error codes (400+). These HTML files are located in `err/(code).html`. You can use `build_err_pages.sh` to create a page for each code, with different text at your leisure. Edit the source code of `build_err_pages.sh` to modify the text per-page, and modify `err/template.html` to modify the base template. In `err/template.html`:\n- `{{CODE}}`  - HTTP Code: eg, 404\n- `{{TITLE}}` - Title text: eg, \"Not Found\"\n- `{{MSG}}`   - Custom message: eg, \"the rats ate this page\"\n\n## MIME Types\nMIME types are detected by analyzing the file extension. The following MIME types are recognized.\n\nWeb-related files:\n- `.html`  -> `text/html; charset=utf-8`\n- `.htm`   -> `text/html; charset=utf-8`\n- `.css`   -> `text/css; charset=utf-8`\n- `.csv`   -> `text/csv; charset=utf-8`\n- `.xml`   -> `text/xml; charset=utf-8`\n- `.js`    -> `text/javascript; charset=utf-8`\n- `.json`  -> `application/json`\n- `.wasm`  -> `application/wasm`\n- `.mjs`   -> `text/javascript; charset=utf-8`\n- `.map`   -> `application/json`\n\nImage files:\n- `.png`   -> `image/png`\n- `.jpg`   -> `image/jpeg`\n- `.jpeg`  -> `image/jpeg`\n- `.gif`   -> `image/gif`\n- `.svg`   -> `image/svg+xml`\n- `.ico`   -> `image/x-icon`\n- `.webp`  -> `image/webp`\n- `.avif`  -> `image/avif`\n- `.bmp`   -> `image/bmp`\n- `.tiff`  -> `image/tiff`\n- `.apng`  -> `image/apng`\n\nFont files:\n- `.woff`  -> `font/woff`\n- `.woff2` -> `font/woff2`\n- `.ttf`   -> `font/ttf`\n- `.otf`   -> `font/otf`\n\nDocument files:\n- `.txt`   -> `text/plain; charset=utf-8`\n- `.pdf`   -> `application/pdf`\n- `.doc`   -> `application/msword`\n- `.docx`  -> `application/vnd.openxmlformats-officedocument.wordprocessingml.document`\n- `.epub`  -> `application/epub+zip`\n- `.rtf`   -> `application/rtf`\n\nVideo files:\n- `.mp4`   -> `video/mp4`\n- `.webm`  -> `video/webm`\n- `.mkv`   -> `video/x-matroska`\n- `.avi`   -> `video/x-msvideo`\n- `.mov`   -> `video/quicktime`\n\nAudio files:\n- `.mp3`   -> `audio/mpeg`\n- `.ogg`   -> `audio/ogg`\n- `.wav`   -> `audio/wav`\n- `.flac`  -> `audio/flac`\n- `.aac`   -> `audio/aac`\n- `.m4a`   -> `audio/mp4`\n- `.opus`  -> `audio/opus`\n\nArchive files:\n- `.zip`   -> `application/zip`\n- `.gz`    -> `application/gzip`\n- `.tar`   -> `application/x-tar`\n- `.7z`    -> `application/x-7z-compressed`\n- `.bz2`   -> `application/x-bzip2`\n- `.rar`   -> `application/vnd.rar`\n\n## Configuration\nYou can configure ymawky with the `config.S` file. The options are documented here.\n- `#define DOCROOT \"www/\"` -- This is the docroot. Change it to wherever your HTML files are, relative to ymawky, or use an absolute path:\n  - `#define DOCROOT \"www/\"`\n  - `#define DOCROOT \"/Library/WebServer/Documents`\n  - `#define DOCROOT \"./\"`\n- `#define CGI_DIR \"cgi-bin/\"` -- This is the directory in which CGI scripts are stored. Only CGI scripts are to be stored in here! Any request within CGI_DIR will execute the requested file\n- `#default ERR_DIR \"err/\"` -- This is the directory in which ymawky will search for custom error HTML pages, eg, `err/404.html` or `err/500.html`\n- `#define DEFAULT_FILE \"index.html\"` -- This is the default file ymawky will serve when it receives an empty `GET / HTTP/1.1` request\n- `.equ RECV_TIMEOUT, 10` -- Number of seconds ymawky will wait to receive datta before closing the connection. If it's more than `RECV_TIMEOUT` seconds between `read()`s, ymawky will close the connection with `408 Request Timed Out`\n- `.equ HEADER_REQ_TIMEOUT_SECS, 10` -- Maximum number of seconds ymawky will wait to receive the full header before timing out. If it takes, longer than this to receive the header, ymawky will close the connection with `408 Request Timed Out`\n- `.equ PUT_GRACE_SECS, 5` -- ymawky dynamically calculates a max-time-per-PUT based on `Content-Length`. The max time is defined as `PUT_GRACE_SECS + Content-Length / PUT_MIN_BPS`. This is the minimum grace period allowed if it calculates a file should take <1 second to upload\n- `.equ PUT_MIN_BPS, 1024 * 16` -- Minimum bytes-per-second. Higher if you want to be stricter, smaller if you want to be more lenient. Since this uses the `.equ` directive, arithmetic is supported, and `1024 * 16` gets calculated at assembly time becoming `16384` or 16KB\n- `.equ MAX_BODY_SIZE, 1024 * 1024 * 1024` -- Maximum bytes PUT allows for Content-Length. By default, 1GB (1024*1024*1024 = 1073741824 bytes). Files with a larger Content-Length larger than this will be rejected with `413 Content Too Large`\n- `.equ MAX_PROCS, 256` -- Maximum number of concurrent proccesses ymawky is allowed to run. Since ymawky is a fork-per-connection server, you want to ensure ymawky doesn't exhaust your PID space. ymawky will reply with `503 Service Unavailable`\n\n## Implementation Notes\nymawky is written for MacOS (sorry...). There are a few (well, more than a *few*) things that are MacOS-specific in this code that won't be portable.\n- Syscalls on MacOS use `x16` for the number and `svc #0x80` to call it. Linux uses `x8` and `svc #0`.\n- Error reporting is different. MacOS sets the carry flag on error, and puts `errno` in `x0`. Linux returns a negative value in `x0`, like `-ENOENT`. Ever `b.cs` would need to be replaced with `cmp x0, #0` / `b.lt ...`, and you'd negate `x0` to get errno.\n- `fork()` works differently, MacOS puts 1 in `x1` in the child process, whereas Linux puts `0` in `x0`.\n- `SO_NOSIGPIPE` doesn't exist on Linux.\n- `O_NOFOLLOW_ANY` is also MacOS-specific.\n- `renameatx_np()` is also MacOS-specific. Linux has `renameat2()`, with different flag values.\n- Struct layouts and offsets will differ. The `stat64` struct, `itimerval` struct, and `sockaddr_in` struct, will all need to be reconsidered.\n- `adr xN, foo@PAGE` / `add xN, xN, foo@PAGEOFF` are Mach-O relocation operators. Linux ELF uses different syntax, like `:pg_hi21:` and `:lo12:`. The `adr_l`, `ldr_l` and `str_l` macros would need to be rewritten or replaced.\n- My personal favorite :3 Signal handling works differently on Linux and MacOS. MacOS's `sigaction` struct contains a `sa_tramp` field that the kernel jumps to before your handler. ymawky utilizes `sa_tramp` directly *as the handler itself*, skipping the libc trampoline and `sigreturn` entirely. Since the handler only sends a 408 and exits, without needing to return, that's fine and works wonderfully without libc. The `sigaction` call would need to be rewritten for POSIX systems.\n\n### Special Thanks:\n- [asmhttpd](https://github.com/jcalvinowens/asmhttpd), an x86_64 Linux HTTP server, was a big inspiration\n- *Bob Johnson*\n- *Bob Johnson's Therapist*\n","summary":"ymawky is a lightweight web server implemented entirely in ARM64 assembly, using only system calls (no libc) and designed to run on Apple silicon. It serves files from a local document root by default, supports common HTTP methods (GET plus PUT/DELETE/OPTIONS/HEAD, with POST handled via CGI scripts), and includes practical features like path traversal protection, URL percent-decoding, MIME type detection, atomic and large-file uploads, and byte-range requests for media scrubbing. It also provides configurable error pages and includes basic slowloris-style defenses. This is best suited for developers interested in low-level systems programming, learning HTTP server internals, or experimenting with a minimal static/dynamic server without a conventional runtime.","description":"MacOS Web Server written entirely in ARM64 assembly","stars":523,"language":"Assembly"},{"owner":"iampedii","repo":"WhiteDNS","url":"https://github.com/iampedii/WhiteDNS","readme":"<p align=\"center\">\n  <img src=\"app/src/main/play_store_512.png\" width=\"128\" alt=\"WhiteDNS logo\">\n</p>\n\n# WhiteDNS\n\nWhiteDNS is an Android application for running a local DNS tunneling client with proxy and VPN modes.\n\n> **NOTICE:** WhiteDNS is source-available proprietary software. The code is published for transparency, review, and contribution to this official project only. You may not copy the app into a separate product, publish modified builds, repackage APKs, redistribute binaries, clone the branding, or reuse the WhiteDNS name, logo, icon, design, or visual identity.\n\n> **APP STORE WARNING:** WhiteDNS does not have any publication on Google Play. Any WhiteDNS APK, listing, or package found on Google Play or another app marketplace is not an official release from this project and may be modified, outdated, or unsafe. Use only this repository and the official Telegram channel for project updates.\n\nOfficial channel: [https://t.me/whitedns](https://t.me/whitedns)\n\n## Credits\n\nWhiteDNS is backed by the [MasterDNS Client](https://github.com/masterking32/MasterDnsVPN) project and uses StormDNS, a fork from MasterDNS, from [nullroute1970/StormDNS](https://github.com/nullroute1970/StormDNS).\n\nThe Android VPN path also packages `tun2proxy`; see [THIRD_PARTY_NOTICES.md](./THIRD_PARTY_NOTICES.md) for third-party license details.\n\n## Features\n\n- Android client for WhiteDNS / StormDNS based DNS tunneling.\n- Proxy mode with local SOCKS5 support and optional HTTP proxy bridge.\n- VPN mode using Android `VpnService` and packaged `tun2proxy` native libraries.\n- Built-in and custom server profile support.\n- `stormdns://` profile import and export helpers.\n- Resolver profile management with validation and default resolver assets.\n- Split tunnel options for VPN routing.\n- Runtime connection logs, resolver state, progress, and traffic statistics.\n- Foreground service notifications for long-running proxy and VPN sessions.\n- Jetpack Compose UI with Material 3 components.\n\n## Project Structure\n\n```text\n.\n|-- app/\n|   |-- build.gradle.kts\n|   `-- src/\n|       |-- main/\n|       |   |-- AndroidManifest.xml\n|       |   |-- assets/\n|       |   |-- java/shop/whitedns/client/\n|       |   |   |-- model/      # settings, profiles, validation, profile links\n|       |   |   |-- proxy/      # foreground proxy service and HTTP bridge\n|       |   |   |-- runtime/    # runtime state, traffic, progress parsing\n|       |   |   |-- storm/      # StormDNS config and process management\n|       |   |   |-- ui/         # Compose UI, theme, view model\n|       |   |   `-- vpn/        # Android VPN service and tun2proxy management\n|       |   |-- jniLibs/        # packaged native StormDNS and tun2proxy libraries\n|       |   `-- res/            # app icons, strings, themes, XML resources\n|       |-- test/\n|       `-- androidTest/\n|-- gradle/\n|-- third_party/\n|   `-- StormDNS/       # pinned StormDNS source used for native client builds\n|-- build.gradle.kts\n|-- settings.gradle.kts\n`-- THIRD_PARTY_NOTICES.md\n```\n\n## Local Development Build\n\nThese instructions are for local review, testing, and contribution to the official WhiteDNS project only. They do not grant permission to publish, redistribute, re-sign, or upload APKs.\n\nRequirements:\n\n- Android Studio or Android SDK command line tools.\n- JDK 17.\n- Go matching the version in `third_party/StormDNS/go.mod`.\n- Android SDK platform for `compileSdk = 36`.\n- Android NDK `26.3.11579264`.\n- Android NDK `29.0.14206865` for rebuilding the StormDNS native client.\n\nBuild and test a local debug copy:\n\n```bash\ngit submodule update --init --recursive\n./gradlew testDebugUnitTest\nmake debug\n```\n\nThe debug APK uses package `shop.whitedns.client.debug` and the app label\n`WhiteDNS Debug`, so QA can install it next to the production app without\nuninstalling the original WhiteDNS build.\n\nIf Go is installed outside your shell `PATH`, pass it explicitly:\n\n```bash\nmake debug GO=/path/to/go\n```\n\nRelease builds are produced only by the official WhiteDNS maintainers. Do not publish APKs, AABs, modified builds, re-signed packages, keystores, signing passwords, or local SDK files.\n\n## License\n\nWhiteDNS is source-available proprietary software.\n\nCommunity contributions are welcome through the official repository, but this project is not open-source.\n\nYou may view the code and submit contributions, but you may not fork it into another app, redistribute builds, repackage APKs, sell modified versions, clone the project, or reuse the WhiteDNS name, logo, icon, design, or branding.\n\nSee:\n\n- [LICENSE](./LICENSE.MD)\n- [CONTRIBUTING.md](./CONTRIBUTING.md)\n- [CLA.md](./CLA.md)\n- [TRADEMARK.MD](./TRADEMARK.MD)\n","summary":"WhiteDNS is an Android app that runs a local DNS tunneling client in either proxy mode or full VPN mode. It integrates a StormDNS-based tunneling engine and provides SOCKS5-capable proxying with optional HTTP bridging, along with a VPN path built on Android’s `VpnService` and packaged native `tun2proxy` libraries. Users can manage built-in or custom server profiles (including importing/exporting `stormdns://` profiles), configure resolver behavior with validation, and use split tunneling controls. This project is most useful for users who need DNS tunneling for privacy, routing, or network control on Android, as well as developers/QA performing local review and testing via the published source.","description":"Source-available Android DNS tunneling client with VPN and proxy modes, backed by MasterDNS & StormDNS.","stars":778,"language":"Kotlin"},{"owner":"mitsuhiko","repo":"pi-ds4","url":"https://github.com/mitsuhiko/pi-ds4","readme":"# pi-ds4\n\nPi provider extension for running [antirez/ds4](https://github.com/antirez/ds4)\nas a local DeepSeek V4 Flash model.  The goal here is to see how good the UX\nand behavior can be around local models.\n\nThe extension registers `ds4/deepseek-v4-flash` and\n`ds4/deepseek-v4-flash-q2-imatrix` as models for `/model`, starts `ds4-server`\non demand, downloads/builds the runtime if needed, keeps a per-pi-process lease,\nand stops the server via a bundled watchdog when no clients are left.\n\n## Requirements and Behavior\n\nYou will need a mac with at least 128GB of RAM.  The default\n`ds4/deepseek-v4-flash` model installs the 2-bit quantized model if you have\n128GB of RAM and picks the 4-bit quantized model if you have 256GB or more.\nSelect `ds4/deepseek-v4-flash-q2-imatrix` to use the imatrix-tuned q2 model.\n\nIf you are signed into huggingface then your token is used for faster downloads.\nThe server is compiled/started and models are downloaded automatically on first\nuse.\n\n## Install\n\n```sh\npi install https://github.com/mitsuhiko/pi-ds4\n```\n\nFor local development from this checkout, pass the path to an existing ds4 server checkout:\n\n```sh\n./install-pi-extension-local.sh /path/to/antirez-ds4-checkout\n```\n\nIf `~/.pi/ds4/support` already exists and points elsewhere, use `--force` to\nmove it aside and install a symlink to the checkout you passed. Any existing\n`gguf/*.gguf` model files (and resumable `.gguf.part` downloads) are preserved\ninto the new checkout first, using APFS clone-on-write copies on macOS when\navailable.\n\nThen restart pi or run `/reload`.\n\n## Runtime layout\n\nRuntime state is kept under `~/.pi/ds4`:\n\n- `support/` — shallow checkout of `https://github.com/antirez/ds4` (`main` by default)\n- `kv/` — on-disk KV cache for the default model choice\n- `kv-q2-imatrix/` — on-disk KV cache for the q2-imatrix model choice\n- `clients/` — active pi process leases\n- `settings.json` — optional extension configuration overrides\n- `log` — build/download/server/watchdog log\n\nThe watchdog is bundled in this package (`ds4-watchdog.sh`), not expected to\nexist in the ds4 runtime checkout.\n\n## Configuration\n\nEnvironment overrides can also be placed in `~/.pi/ds4/settings.json`.  In the\nJSON file, use the env var name (for example `\"DS4_READY_TIMEOUT_MS\"`), the\ncamel-case key without `DS4_` (for example `\"readyTimeoutMs\"`), or the lower\nsnake-case key without `DS4_` (for example `\"ready_timeout_ms\"`). Environment\nvariables win over the settings file.\n\n- `DS4_PROTOCOL`: Pi wire protocol. Supported values are `openai` (default,\n  OpenAI Chat Completions), `openai-responses`, and `anthropic`.\n- `DS4_SUPPORT_REPO`: runtime repo URL (default `https://github.com/antirez/ds4`)\n- `DS4_SUPPORT_BRANCH`: runtime branch (default `main`)\n- `DS4_RUNTIME_DIR`: use an existing ds4 checkout instead of `~/.pi/ds4/support`\n- `DS4_MODEL_QUANT`: force `q2`, `q2-imatrix`, or `q4` for the default model\n  choice (otherwise picked from system memory)\n- `DS4_READY_TIMEOUT_MS`: server startup timeout\n- `DS4_SERVER_BINARY`: custom `ds4-server` binary path\n- `DS4_WATCHDOG_SCRIPT`: custom watchdog script path\n- `DS4_API_KEY`: provider API key/token sent by Pi (default `dsv4-local`)\n\nSee `settings.example.json` for a complete example with a JSON schema reference.\nA minimal `~/.pi/ds4/settings.json` can look like this:\n\n```json\n{\n  \"$schema\": \"https://raw.githubusercontent.com/mitsuhiko/pi-ds4/main/settings.schema.json\",\n  \"protocol\": \"openai-responses\",\n  \"modelQuant\": \"q2-imatrix\",\n  \"readyTimeoutMs\": 900000\n}\n```\n\nUse `/ds4` inside pi to show the live ds4 log.\n","summary":"mitsuhiko/pi-ds4 is a pi provider extension that runs antirez/ds4 locally as a DeepSeek V4 Flash model, exposing it to pi under `ds4/deepseek-v4-flash` (and an imatrix-tuned `...-q2-imatrix` variant). It handles first-use setup by registering the models, downloading/building the ds4 runtime when needed, managing per-process leases, and stopping the server automatically via a bundled watchdog when no clients remain. The extension can auto-select model quantization based on available RAM (q2 for ~128GB, q4 for larger machines) and supports faster Hugging Face downloads via an optional token. It’s aimed at developers and teams who want to experiment with local model UX and behavior through pi’s provider interface, without manual server lifecycle management.","description":"Run deepseek4 locally on metal right from within Pi","stars":144,"language":"TypeScript"},{"owner":"yui540","repo":"comimi","url":"https://github.com/yui540/comimi","readme":"# comimi\n\n![comimi バナー画像](assets/banner.png)\n\ncomimiは、Webサイトに漫画ビューワーを組み込むことができるTypeScript/JavaScriptライブラリです。\n\nReactなどのUIライブラリに依存していないため、単体で動作します。\n\nhttps://github.com/user-attachments/assets/3e37b9fb-6381-4f43-9b27-7ae8056a1905\n\n[yui540.com/comimi](https://yui540.com/comimi)\n\n## インストール\n\n```sh\nnpm install @yui540/comimi\n```\n\n## クイックスタート\n\n```ts\nimport { createMangaViewer } from \"@yui540/comimi\";\n\ncreateMangaViewer(document.querySelector(\"#viewer\")!, {\n  manga: {\n    id: \"sample\",\n    title: \"サンプル漫画\",\n    author: \"yui540\",\n    pages: [\n      { id: \"p0\", type: \"image\", src: \"/pages/0.webp\" },\n      { id: \"p1\", type: \"image\", src: \"/pages/1.webp\" },\n      { id: \"p2\", type: \"image\", src: \"/pages/2.webp\" },\n    ],\n  },\n});\n```\n\nこれが最小構成です。ビューワーは `#viewer` にマウントされ、DOMを自動的に管理します。戻り値のインスタンスを通じて、ページ送りや設定・イベント操作も行えます。\n\n## ドキュメント\n\nAPIの詳細、オプション、設定、キーボードショートカット、永続化、i18n については [`docs/USAGE.md`](./docs/USAGE.md) に記載しています。\n\n## ライセンス\n\nMIT\n","summary":"comimi は Web サイトに漫画ビューアーを組み込める TypeScript/JavaScript ライブラリで、React などの UI ライブラリに依存せず単体で動作します。漫画データ（ページ一覧など）を渡すことで、指定した要素にビューアーをマウントし、DOM の管理やページ送り、設定・イベント操作をインスタンス経由で扱えます。キーボードショートカットや永続化、i18n などもドキュメントで提供されており、既存サイトに手軽に漫画閲覧体験を追加したい開発者に向いています。","description":"Open-source comic reader library for JS/TS","stars":344,"language":"TypeScript"},{"owner":"modaic-ai","repo":"gepa-viz","url":"https://github.com/modaic-ai/gepa-viz","readme":"# gepa-viz\n\n![demo](assets/ful-gepa-run-viz-trimmed.gif)\n\nLive visualization for [GEPA](https://github.com/gepa-ai/gepa) prompt-optimization runs. Renders the candidate tree as a force-directed graph so you can watch prompts evolve over a pareto frontier in real time.\n\n- **Accepted candidates** are donuts whose ring segments are green/red per per-example valset score.\n- **Rejected proposals** are small grey nodes (hover to see the feedback that produced them).\n- **Click a node** for a detail view: the candidate prompt, prompt diff vs parent, reflection minibatch with per-example feedback, and the pareto frontier as a clickable pixel grid.\n\n\n## Install (end users)\n\n```bash\npip install gepa-viz\n```\n\n`GepaVizCallback` is a context manager. Entering it streams the run into the\ndashboard; exiting dumps a `run.json` artifact. There are three ways to use it.\n\n### 1. Embedded (default) — the callback runs its own viewer\n\nEntering `with GepaVizCallback(...)` spins up a local server and opens a browser\ntab; the graph extends node-by-node over SSE as GEPA accepts and rejects\nproposals. Exiting dumps `run.json` and keeps the viewer alive until you Ctrl+C.\nNo second terminal, no CLI step. Works equally with DSPy or base `gepa`:\n\n```python\nfrom gepa_viz import GepaVizCallback\n\n# DSPy\nwith GepaVizCallback(valset=valset, trainset=trainset) as cb:\n    dspy.GEPA(\n        metric=..., auto=\"light\", reflection_lm=...,\n        gepa_kwargs={\"callbacks\": [cb]},\n    ).compile(student, trainset=trainset, valset=valset)\n\n# Base gepa\nwith GepaVizCallback(valset=valset, trainset=trainset) as cb:\n    gepa.optimize(..., callbacks=[cb])\n```\n\n### 2. Remote — stream into a standalone server\n\nRun one long-lived server and point the callback at it with `endpoint=`. The\ncallback starts no server of its own; it POSTs snapshots to `<endpoint>/ingest`\nand the server fans them out to connected browsers over SSE. Useful when the\noptimizer runs on a different machine (`gepa-viz live --host 0.0.0.0`).\n\n```bash\ngepa-viz live          # serves the SPA + /events + /ingest on :5151\n```\n\n```python\nwith GepaVizCallback(valset=valset, trainset=trainset,\n                     endpoint=\"http://127.0.0.1:5151\") as cb:\n    dspy.GEPA(..., gepa_kwargs={\"callbacks\": [cb]}).compile(student, ...)\n```\n\n### 3. Static — dump now, view later\n\nPass `live=False` for a headless/CI run that just writes `run.json` at the end,\nthen re-open it any time in a static viewer (loads once, no streaming):\n\n```python\nwith GepaVizCallback(valset=valset, live=False, path=\"run.json\") as cb:\n    dspy.GEPA(..., gepa_kwargs={\"callbacks\": [cb]}).compile(student, ...)\n```\n\n```bash\ngepa-viz serve --file run.json\n```\n\n`GepaVizCallback` options: `path`, `trainset`, `live` (default `True`), `host`\n(`127.0.0.1`), `port` (`5151`), `open_browser` (`True`), `keep_alive` (`True`),\n`endpoint` (`None`), `endpoint_timeout` (`5.0`).\n\n## Reading the Visualization\n\n### Big Nodes\n![big-nodes](assets/pareto-comparison.gif)\nBig nodes are candidates that were evaluated on the valset. Each segment on the ring is a seperate example. Red segments are examples the candidate got wrong and green are examples the candidate got right.\n\nAs you can see candidates 1 and 2 have the same accuracy but performed well on different examples.\n\n## Node Details\n![node-details](assets/node-details-page.gif)\nNode details page shows information for the candidate in more depth.\n**Valset Results**\nThe grid at the top shows the candidates response to each example and whether it got it right or wrong. \n\n**Prompt**\nShows the prompt for the candidate. Use the toggle switch to see the diff between the prompt and its parent.\n\n**Mini-Batch**\nThe mini batch results for the candidate. Diffs show the difference between the initial attempt and the post-reflection attempt on the minibatch.\n\n## Small Nodes\n![small-nodes](assets/rejected-node.gif)\nThe small grey nodes are candidates that were rejected at the minibatch phase. After reflection the mini-batch was retried and the score didn't go up. Therefore they were never evaluated on the valset and aren't on the pareto frontier, however you can view their in depth details all the same.\n\n## Edges\n![edges-hover](assets/feedback-edges.gif)\nIf you hover on the edges in the graph you will see the feedback that was given to the reflection model to generate the child candidate.\n\n\n\n\n\n## CLI\n\n```\ngepa-viz serve [--file PATH] [--host HOST] [--port N] [--open | --no-open]\ngepa-viz live  [--host HOST] [--port N] [--open | --no-open]\n```\n\n- `serve` — **static** viewer for a dumped `run.json` (loads once, no polling).\n  Defaults: `--file ./run.json`, `--host 127.0.0.1`, `--port 5151`.\n- `live` — **live** server a remote producer streams into via `/ingest`; serves\n  the SPA and pushes updates to browsers over SSE.\n\nThe server is a tiny stdlib `ThreadingHTTPServer` — no Node, no extra runtime.\n\n## Repo layout\n\n```\ngepa-viz/\n  client/      # Vite SPA (React + react-router + d3 + Tailwind)\n  python/      # gepa_viz Python package (callback + CLI + bundled SPA)\n  justfile     # build automation\n```\n\nThe end-user wheel ships the pre-built SPA inside `gepa_viz/static/` so installation is just `pip install`.\n\n## Develop\n\nPrerequisites: `node`, `npm`, `uv`, `just`.\n\n```bash\njust install         # npm ci + uv sync\njust dev-client      # Vite dev server with HMR on :5173\njust dev-py          # run examples/demo_ru
