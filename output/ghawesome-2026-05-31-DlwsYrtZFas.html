et per call (Anthropic `budget_tokens`, OpenAI `reasoning_effort`, Qwen `enable_thinking`, DeepSeek style — all set defensively) and hard-truncates oversize thinking blocks before they enter conversation history. Configure with `SMALLCODE_THINKING_BUDGET=2000` (default), or `SMALLCODE_THINKING_DISABLE=true` to turn off entirely.\n\n### Knowledge Injection\nDrop short reference notes into a `knowledge/` directory and the most relevant ones get injected into the system prompt based on keyword overlap with your message. Designed for small models that benefit from algorithm cheat sheets or syntax reminders inline. See `knowledge/README.md` for the format. Configurable budget (default 1500 tokens) via `SMALLCODE_KNOWLEDGE_MAX_TOKENS`.\n\n### Bundled Skills\nSix dev-methodology skills ship in `skills/` (brainstorming, debugging, tdd, iterative-retrieval, learn, external-guard). They load automatically alongside project skills in `.smallcode/skills/`. Use `/skill list` and `/skill use <name>`. See `skills/README.md`. Adapted from [Willow 2.0 Fylgja](https://github.com/rudi193-cmd/willow-2.0/tree/master/willow/fylgja/skills).\n\nSmallCode also auto-detects skills in two nested layouts already used by other agents in the ecosystem:\n\n- `.agents/skills/<name>/SKILL.md` — itsy / jukefr layout (closes #53)\n- `.claude/skills/<name>/SKILL.md` — Claude Code layout (closes #53)\n\nSkills loaded from these layouts are accepted without YAML frontmatter; the directory name becomes the skill name. Skill files with CRLF line endings now load correctly on Windows (closes #52).\n\n### Plugin System\nPlugins live under `.smallcode/plugins/<name>/` (project), `~/.smallcode/plugins/<name>/` (user), or `~/.config/smallcode/plugins/<name>/` (global). Each plugin has a `plugin.json` manifest declaring tools, commands, hooks, prompt injections, providers, permissions, and MCP servers. Five lifecycle hooks fire at the right points in the agent loop: `pre_request`, `post_request`, `on_error`, `session_start`, `session_end`. Plugin-contributed providers register with the `ProviderRegistry` and `resolveProvider()` looks them up by name before falling back to the OpenAI-compat adapter. An example Anthropic provider plugin ships in `.smallcode/plugins/anthropic-provider/`. Install with `/plugin install <pkg> [--scope project|user|global]`.\n\n### `/provider` — Interactive Provider Wizard\nConfigure your LLM provider without hand-editing `.env`. The wizard walks through provider selection (LM Studio, Ollama, OpenRouter, OpenAI, Anthropic, DeepSeek, custom), base URL (with provider defaults), API key (probed against `/v1/models` to validate), model name, and an optional escalation fallback. Saves to `~/.config/smallcode/.env` (global), `./.env` (project), or both. Available as the `configure_provider` tool for the model and `/provider` (or `/provider status`) in the REPL.\n\n### Quality Monitor (itsy port)\nCatches four structural failure modes per turn — empty turns, blank tool names, hallucinated tool names (returns closest matches as suggestions), and exact-repeat tool calls across turns. On a hit it injects a `[QUALITY-MONITOR]` steer back into the conversation; capped at 2 consecutive corrections to prevent spirals. Disable with `SMALLCODE_QUALITY_MONITOR=false`.\n\n### Context-Aware Read Guard (itsy port)\nReplaces the dumb fixed-byte tool-result cap. When live context usage is past the budget OR the file alone exceeds 50% of the model's window, returns the first 30 lines of the file (imports + signatures) plus an explicit \"use grep / read a smaller line range\" directive instead of a silent middle-of-file truncation. Falls back to head/tail trim with a clearer redirect hint for read-shaped tools. Disable with `SMALLCODE_READ_GUARD=false`. Tune head size with `SMALLCODE_READ_GUARD_HEAD_LINES=30`.\n\n### Read-Before-Write Guard\nTracks which paths the model has read this session. First `write_file` to an existing unread file is refused with a hint to `read_file` first; second attempt allowed (so legitimate full-replace intents succeed). New files always permitted. `patch` counts as a read. Disable with `SMALLCODE_WRITE_GUARD=false`.\n\n### Tool-Call Deduplication\nIdentical pure-tool calls within a sliding window are short-circuited with a cached result instead of re-executing. Only applies to read-only tools (`read_file`, `search`, `graph_search`, etc.) — never to anything with side effects. Saves both context and latency on small models that loop. Disable with `SMALLCODE_DEDUP=false`.\n\nA second, stricter guard handles **idempotent-write tools** (`memory_remember`, `memory_forget`): identical calls in the same turn are short-circuited with `[already stored this turn]` instead of re-executing. Resets between turns rather than between sessions. Closes the spam-loop gap where small models could call `memory_remember` 30+ times with the same args. Disable with `SMALLCODE_IDEMPOTENT_WRITE_DEDUP=false`.\n\n### Evidence Store\nAutomated capture of \"what was tried, what worked, what failed\" per task. Stored as searchable memory objects in the existing memory MCP module so they flow through FTS5 + staleness-decay loading on future tasks rather than always hogging context. The model learns from past sessions: it sees that `pip install` failed last time on this Python version, or that `npm test` hangs without `--run`. Disable with `SMALLCODE_EVIDENCE_DISABLE=true`.\n\n### Plan-Then-Execute Mode\nFor multi-step tasks (refactors, multi-file features, multi-imperative prompts), SmallCode asks the model to emit a numbered plan FIRST, then re-injects that plan as an anchor on subsequent turns. Reduces drift on long traces — the model can't \"forget\" step 3 by the time it finishes step 1. Heuristic-based — simple tasks like \"create hello.py\" don't trigger planning. Configure with `SMALLCODE_PLAN=true|false`.\n\n### Contract / Definition of Done\nFor tasks where \"done\" should be hard-fail rather than self-reported, SmallCode supports per-project **contracts** — a declarative list of testable assertions the model commits to up-front. The agent cannot deliver a final \"I'm done\"-shaped response while any assertion remains `pending` or `failed`. The model uses `contract_create` to declare assertions, `contract_assert_pass` / `contract_assert_fail` / `contract_assert_skip` to record progress with command-line evidence, and `contract_status` to inspect remaining blockers. State persists to `.smallcode/contracts/<id>/` (state.json, contract.md, assertions.md, log.jsonl). Slash command `/contract` lists, activates, and aborts contracts. Inspired by [jukefr/itsy](https://github.com/jukefr/itsy)'s same-named feature. Disable the done-guard with `SMALLCODE_CONTRACT=false`.\n\n### Snapshot & Auto-Rollback\nBefore each agent turn, SmallCode opens a file snapshot checkpoint. Every `write_file` and `patch` records its pre-edit content. If validation hard-fails and all retries are exhausted, set `SMALLCODE_SNAPSHOT_AUTO_ROLLBACK=true` to automatically revert all edits in the turn back to the checkpoint state. All snapshots persisted to `.smallcode/snapshots/` for manual audit. Disable with `SMALLCODE_SNAPSHOT=false`.\n\n### Test-Runner Auto-Discovery\nDetects your project's test command from config files (package.json, pytest.ini, pyproject.toml, Cargo.toml, go.mod, pom.xml, etc.) and injects it into the system prompt once. The model knows how to run tests without wasting tool calls on discovery. Also surfaces in AUTO-VALIDATE fix prompts. Override with `SMALLCODE_TEST_RUNNER=<cmd>` or disable with `SMALLCODE_TEST_DISABLE=true`.\n\n### Bootstrap Detection\nOn first turn, scans the workspace and injects a compact project summary: runtime + version, package manager, framework (Next.js/FastAPI/Express/Django/React/Vue/…), entry point, and build/test/run commands. Covers Node, Python, Rust, Go, .NET, Java, Ruby. Eliminates the 3-5 tool calls small models usually spend figuring out what kind of project they're in. Disable with `SMALLCODE_BOOTSTRAP=false`.\n\n### Adaptive Retry Temperature\nWhen the improvement loop retries a failed edit, each attempt uses a different temperature so it doesn't produce the same broken output three times. Attempt 1 lowers temperature (deterministic fix), attempt 2 raises it (explore alternatives), attempt 3 returns to base. Delta defaults to 0.15. Disable with `SMALLCODE_TEMP_ADAPT=false`.\n\n### Per-Tool Trust Score Decay\nTracks consecutive failures per tool within a session. Tools that fail 3+ times in a row are soft-demoted (schema list back). Tools that fail 5+ times are dropped from the schema entirely for the session. Prevents the model from looping on a broken MCP server or a search that keeps returning nothing. Resets between runs. Disable with `SMALLCODE_TRUST_DECAY=false`.\n\n### Code Intel Category (Rank 2)\nA new `code_intel` tool routing category detects semantic code questions (\"how does X work\", \"what calls Y\", \"who inherits from Z\"). Routes exclusively to `[graph_search, explain_symbol, read_file, find_files, search]` — skipping write/run tools. Placed before `search` in the priority order so inheritance/callers questions get the right tools without any write noise.\n\n### Error Diagnosis (Rank 4)\nWhen a bash command exits non-zero, `diagnoseError()` makes a quick LLM call to classify the error type (`syntax|runtime|permission|notfound|timeout|unknown`), locate the relevant file/line, and emit a one-line fix suggestion. The structured hint is prepended as `[ERROR-DIAGNOSIS]` to the tool result so the model has typed, located context to act on immediately. Cached 5 min. TTL configurable.\n\n### Decompose Task (Rank 5)\n`decomposeTask()` replaces the hand-rolled `pickDecomposeStrategy()` regex when a file keeps failing after all retries. The LLM selects a strategy (`split_file|one_error_at_a_time|rewrite_section|extract_function`) with a reason and concrete 2-3 sentence instruction. Falls back to the regex governor. Cached 5 min.\n\n### Multi-File Edit Coordination (Rank 6)\nWhen 3 or more files are edited in a single agent turn, `coordinateMultiFileEdit()` injects a `[MULTI-FILE-EDIT]` header listing all files that need changes. Keeps small models from forgetting file 3 while editing file 2. De-duplicates: only injects once per turn even if called repeatedly.\n\n### Semantic Merge (Rank 7)\nWhen `patch` fails because `old_str` no longer exists in the file, `semanticMerge()` asks the model to merge the intended change into the current file content. Returns the complete corrected file. Replaces the hard error with a recovery attempt. TTL 1 min (content-specific).\n\n### Adaptive Model Select (Rank 8)\n`AdaptiveModelRouter` in `src/model/adaptive_router.js` tracks per-model call/fail counts. When the primary model's failure rate exceeds 0.3 (medium) or 0.6 (strong), `chatCompletion` automatically routes to `SMALLCODE_MODEL_MEDIUM` or `SMALLCODE_MODEL_STRONG` and their matching `SMALLCODE_BASE_URL_*` endpoint when configured. Requires at least 3 calls before routing decisions activate. Reset via `router.reset()`.\n\n```bash\n# Optional: configure fallback models for adaptive routing\nSMALLCODE_MODEL_MEDIUM=qwen2.5-coder:32b\nSMALLCODE_MODEL_STRONG=gpt-4o\nSMALLCODE_BASE_URL_STRONG=https://openrouter.ai/api/v1\n```\n\n### Benchmark Harness\nRun the included benchmark suite against any local model to measure pass rate across small coding tasks. Three suites: `smoke` (5 trivial tasks, ~30s), `polyglot-mini` (19 tasks across Python/JS/TS/Bash/Markdown/JSON), `tool-use` (10 multi-step tool sequencing tasks). Results persisted to `.smallcode/benchmarks/`.\n\n```bash\nnpm run bench:smoke\nnpm run bench:polyglot\nnpm run bench:tools\n```\n\n### Benchmark Diff Tool\nCompare two harness runs (or a stored baseline against a fresh run) and get an exit-coded verdict you can use in CI: `0` improved, `1` regressed, `2` noise.\n\n```bash\nnpm run bench:diff bench/baselines/main bench/baselines/feature\n# or with a custom threshold:\nnode bench/diff.js bench/baselines/main bench/baselines/feature --threshold 0.05 --json\n```\n\nReports mean reward delta, per-task pass-count moves (no task should regress), wall-clock delta, and tool-call delta. Pairs with the `benchmark-driven-development` skill at `skills/benchmark-driven-development.md` — the discipline of measure-first / change-second / measure-again before any agent-behaviour change ships. Adapted from [jukefr/itsy](https://github.com/jukefr/itsy).\n\n\n## Commands\n\n| Command | Description |\n|---------|-------------|\n| `/quit`, `/q` | Exit SmallCode |\n| `/clear` | Reset conversation |\n| `/stats` | Show session statistics |\n| `/tokens` | Detailed token usage report |\n| `/budget` | Context window budget + visual bar |\n| `/trace` | List/show/export execution traces |\n| `/eval` | Run prompt evaluation suites |\n| `/memory` | Show working memory |\n| `/contract` | Definition-of-Done contract: list / activate / abort |\n| `/plan` | Show current task plan |\n| `/model` | Show/switch model |\n| `/profile` | Show detected model profile + routing mode |\n| `/cognition` | Show MarrowScript cognition layer status |\n| `/mcp` | Show connected external MCP servers |\n| `/skill` | Manage reusable skills |\n| `/plugin` | Install/manage plugins (`--scope project|user|global`) |\n| `/provider` | Configure LLM provider (interactive wizard) |\n| `/sessions` | List/resume saved sessions |\n| `/version`, `/v` | Show SmallCode version + Node/platform |\n| `/help` | Show all commands |\n\n## Observability\n\nSmallCode tracks token usage and execution traces automatically:\n\n- **Token Monitor** — Every LLM call records prompt/completion tokens. View with `/tokens`.\n- **Context Budget** — Visual indicator of context window usage. View with `/budget`.\n- **Execution Traces** — Every agent turn is recorded to `.smallcode/traces/`. View with `/trace list`.\n- **Trace-to-Test** — Generate regression tests from traces: `/trace test <id>`.\n- **Prompt Evaluations** — Measure classifier accuracy and tool selection: `/eval classify_accuracy`.\n\n```bash\n# Run evaluations from CLI\nsmallcode --eval classify_accuracy\nsmallcode --eval tool_selection\n```\n\n## Programmatic API\n\nUse SmallCode as a library in your own tools, CI pipelines, or TypeScript frameworks:\n\n```javascript\nconst { SmallCode } = require('smallcode');\n\nconst agent = new SmallCode({\n  model: 'gemma-4-e4b',\n  baseUrl: 'http://localhost:1234/v1',\n});\n\n// Run a task\nconst result = await agent.run(\"create hello.py that prints hello world\");\nconsole.log(result.filesCreated);  // ['hello.py']\nconsole.log(result.toolCalls.length);  // 1\nconsole.log(result.success);  // true\n\n// Subscribe to events\nagent.on('tool_start', ({ name, args }) => console.log(`Using: ${name}`));\nagent.on('tool_end', ({ name, ms }) => console.log(`Done: ${name} (${ms}ms)`));\nagent.on('error', (err) => console.error(err));\n```\n\nReturns a structured `RunResult` with: response text, tool call records, files created/edited, token usage, duration, and success status.\n\n## Tools\n\n| Tool | Description |\n|------|-------------|\n| `bone_compile` | Compile .bone to full backend project |\n| `bone_check` | Validate .bone file (type errors, constraints) |\n| `list_projects` | List all indexed projects with stats |\n| `graph_search` | Code graph symbol search |\n| `explain_symbol` | Full symbol explanation (callers, callees) |\n| `read_file` | Read file contents |\n| `write_file` | Create/overwrite files |\n| `patch` | Search-and-replace edit |\n| `bash` | Run shell commands |\n| `search` | Regex search (ripgrep) |\n| `find_files` | Glob file search |\n| `memory_load` | Load relevant project memory |\n| `memory_remember` | Save knowledge to memory |\n| `web_search` | Search the web via DuckDuckGo (requires `SMALLCODE_WEB_BROWSE=true`) |\n| `web_fetch` | Fetch and extract text from a URL (requires `SMALLCODE_WEB_BROWSE=true`) |\n| `contract_create` | Declare a Definition-of-Done with a list of testable assertions |\n| `contract_status` | Show the active contract: assertions, state, blockers |\n| `contract_assert_pass` | Mark an assertion passed (with command-line evidence) |\n| `contract_assert_fail` | Mark an assertion failed (with evidence) |\n| `contract_assert_skip` | Mark an assertion skipped (out of scope) |\n\n### Web Browsing\n\nSmallCode includes Playwright with stealth mode for undetected web browsing. Disabled by default — enable for medium/large models (20B+) that can synthesize web context effectively:\n\n```bash\n# In your .env\nSMALLCODE_WEB_BROWSE=true\n```\n\nThe browser packages are **opt-in peer dependencies** so a default install is light and skips a few deprecated transitives. Install them once when you actually want web browsing:\n\n```bash\nnpm install -g playwright-extra puppeteer-extra-plugin-stealth\nnpx playwright install chromium\n```\n\nWhen enabled, the model can search the web and fetch documentation during tasks. Uses headless Chromium with anti-detection to avoid CAPTCHAs and bot blocks. Falls back to simple HTTP fetch if Playwright isn't available.\n\n## License\n\nMIT\n","summary":"SmallCode is a terminal-native AI coding agent designed to get reliable results from local small language models in the 8B–35B range on consumer hardware. It focuses on coping with smaller-model limitations by using budget-managed context, a more forgiving tool-calling/parsing approach, and stepwise “TODO-file” driven edits via search-and-replace style patches rather than full-file rewrites. The project offers an easy install (including prebuilt binaries so you don’t need to build Node/C++ toolchains) and includes a fullscreen TUI plus a classic readline fallback, with optional local RAG indexing to improve repository-aware coding. Developers who want privacy-preserving, offline-ish coding assistance from their own local model(s)—especially on smaller machines—will benefit most.","description":"AI coding agent optimized for small LLMs. 87% benchmark with 4B-active model.","stars":1671,"language":"JavaScript"},{"owner":"DenisSergeevitch","repo":"agents-best-practices","url":"https://github.com/DenisSergeevitch/agents-best-practices","readme":"<div align=\"center\">\n\n# agents-best-practices\n\n<img src=\"icon.jpeg\" alt=\"agents-best-practices icon\" width=\"300\" />\n\n> *\"The model proposes actions; the harness validates, authorizes, executes, records, and returns observations.\"*\n\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](LICENSE)\n[![Agent Skill](https://img.shields.io/badge/Agent-Skill-7c3aed)](SKILL.md)\n[![Codex](https://img.shields.io/badge/Codex-compatible-111827)](SKILL.md)\n[![Claude Code](https://img.shields.io/badge/Claude_Code-compatible-8b5cf6)](SKILL.md)\n\n<br>\n\n**A provider-neutral Agent Skill for designing, generating MVP blueprints for, auditing, refactoring, and explaining agentic harnesses.**\n\nIt applies beyond coding agents: research, support, operations, sales, finance, data analysis, procurement, legal workflows, healthcare workflows, education, and workflow automation agents all need the same core runtime discipline.\n\n<br>\n\n**Install** - pick one:\n\n</div>\n\n**A. With [`skills`](https://github.com/vercel-labs/skills) (any compatible agent):**\n\n```bash\nnpx skills add DenisSergeevitch/agents-best-practices -g\n```\n\nThe `-g` flag installs globally at user level so every project can discover it.\n\n**B. Or paste this prompt to your AI agent:**\n\n```text\nInstall the agents-best-practices skill for me:\n\n1. Clone https://github.com/DenisSergeevitch/agents-best-practices into my\n   user-level skills directory as `agents-best-practices/`.\n   Use the skill directory my agent reads on this machine, for example:\n   - Codex: ~/.codex/skills/\n   - Claude Code: ~/.claude/skills/\n2. Verify that SKILL.md, icon.jpeg, and the references/ directory are present.\n3. Confirm the install path when done.\n```\n\n**C. Manual install paths:**\n\n```bash\n# Codex\nmkdir -p \"${CODEX_HOME:-$HOME/.codex}/skills\"\ngit clone https://github.com/DenisSergeevitch/agents-best-practices.git \\\n  \"${CODEX_HOME:-$HOME/.codex}/skills/agents-best-practices\"\n\n# Claude Code, user-level\nmkdir -p \"$HOME/.claude/skills\"\ngit clone https://github.com/DenisSergeevitch/agents-best-practices.git \\\n  \"$HOME/.claude/skills/agents-best-practices\"\n\n# Claude Code, project-level\nmkdir -p .claude/skills\ngit clone https://github.com/DenisSergeevitch/agents-best-practices.git \\\n  .claude/skills/agents-best-practices\n```\n\n<div align=\"center\">\n\n[Use cases](#use-cases) · [What this is](#what-this-is) · [Philosophy](#philosophy) · [Layout](#layout) · [Sources](#sources)\n\n</div>\n\n---\n\n## Use cases\n\nOnce installed, the skill activates when a conversation touches agent architecture, harness design, tool permissions, planning mode, workflow orchestration, context and memory, skills, connectors, observability, evals, prompt caching, or production readiness. Three common ways to use it:\n\n### Case 1 - Generate an MVP agent blueprint\n\nYou have a domain and need the smallest useful production-safe agent harness, not a vague list of best practices.\n\n```text\nYou    > Build an agent for account renewal risk. It should read CRM,\n         support tickets, and usage data, then draft renewal actions.\n\nAgent  > Start with an approval-gated Level 2 harness.\n         The MVP has one job: produce a renewal-risk brief plus draft\n         next actions for a human account owner.\n\n         Core loop:\n           user/task -> context builder -> model call -> typed tool call\n           -> schema validation -> permission check -> execution or pause\n           -> structured observation -> next step or final brief\n\n         Minimal tools:\n           - read_account_profile      read_private_data\n           - list_support_tickets      read_private_data\n           - fetch_usage_summary       read_private_data\n           - draft_customer_email      draft_external_message\n           - request_approval          approval_gate\n\n         Launch gate:\n           20 historical accounts, trace review, no unapproved external\n           sends, and human acceptance on at least 80% of draft actions.\n```\n\nThe primary reference is [`references/mvp-agent-blueprint.md`](references/mvp-agent-blueprint.md).\n\n### Case 2 - Audit an existing agent harness\n\nYou already have a working agent, but it is brittle, expensive, too broad, or hard to debug.\n\n```text\nYou    > Our research agent sometimes runs tools forever and forgets why\n         it made a decision after context compaction. Audit the harness.\n\nAgent  > The failure points are runtime-level, not prompt-level:\n           - no hard step/tool/time/cost budget\n           - compaction preserves prose but loses active approvals\n           - tool results are unbounded and mix trusted/untrusted data\n           - no event trace for model output -> tool call -> observation\n\n         Fix order:\n           1. Add loop budgets and termination reasons.\n           2. Store plan, approvals, todos, and artifacts outside the prompt.\n           3. Make compaction rehydrate active state, not chat history.\n           4. Add evals for injection, missing tool result, timeout, and\n              budget exhaustion.\n```\n\nStart with [`references/agentic-loop.md`](references/agentic-loop.md), [`references/context-memory-compaction.md`](references/context-memory-compaction.md), and [`references/security-evals-observability.md`](references/security-evals-observability.md).\n\n### Case 3 - Design tools, permissions, and connectors\n\nYou need an agent to work with real systems without turning every API into an unsafe broad tool.\n\n```text\nYou    > The ops agent needs Slack, Linear, Google Drive, and our internal\n         deploy API. How should tools and permissions work?\n\nAgent  > Split by risk class. Reads can be autonomous when scoped.\n         Drafts can be autonomous when labeled. External writes, deploys,\n         destructive actions, privileged access, and financial operations\n         require an approval record outside the model.\n\n         Do not expose generic send_message, write_database, or run_command.\n         Wrap each action as a narrow typed tool with structured results and\n         deterministic permission checks.\n```\n\nUse [`references/tools-and-permissions.md`](references/tools-and-permissions.md) and [`references/skills-and-connectors.md`](references/skills-and-connectors.md).\n\n### Other things the skill is good for\n\n- **\"How do I add planning mode without making the agent passive?\"** -> use [`references/planning-and-goals.md`](references/planning-and-goals.md).\n- **\"When should a large task become a decomposed workflow?\"** -> use [`references/workflow-orchestration.md`](references/workflow-orchestration.md).\n- **\"How should auto-compaction preserve active work?\"** -> use [`references/context-memory-compaction.md`](references/context-memory-compaction.md).\n- **\"How do I make prompt caching work in a long-running agent?\"** -> use [`references/prompt-caching-and-cost.md`](references/prompt-caching-and-cost.md).\n- **\"How do I support OpenAI, Anthropic, and OpenAI-compatible APIs?\"** -> use [`references/provider-api-patterns.md`](references/provider-api-patterns.md).\n- **\"What should I check before launch?\"** -> use [`references/checklists.md`](references/checklists.md).\n\n---\n\n> *\"Keep the loop simple and make the runtime rigorous.\"*\n\n## What this is\n\nA reference for people building agentic systems where the model is only one part of the runtime. It helps design a harness that includes:\n\n- a provider-neutral model-tool-observation loop,\n- narrow typed tools and structured tool results,\n- runtime permission checks outside the model,\n- planning mode and approval-gated execution,\n- workflow orchestration for large decomposable tasks,\n- goal-like loops with budgets, checkpoints, validation, and stop rules,\n- context, memory, retrieval, and auto-compaction,\n- skills, MCP, and external connector governance,\n- prompt-cache-aware context layout and cost telemetry,\n- observability, evals, launch gates, and incident response.\n\nThis is the control plane around an agent: **instructions -> context builder -> model call -> tool proposal -> validation -> permission decision -> execution or approval pause -> observation -> next step or final answer**.\n\n## What this is not\n\n- Not only for coding agents.\n- Not a multi-agent framework by default.\n- Not a replacement for runtime authorization, sandboxing, or audit logs.\n- Not a prompt-only safety strategy.\n- Not a reason to expose broad tools like `execute_anything`, `send_message`, or `write_database`.\n\nUse the single-agent MVP first. Add goal loops, connectors, and broader autonomy only after measured failures justify them.\n\n## Layout\n\n```text\nagents-best-practices/\n├── README.md                                 # public-facing overview and install notes\n├── SKILL.md                                  # skill entry point and trigger rules\n├── icon.jpeg                                 # skill image used by the README\n└── references/\n    ├── mvp-agent-blueprint.md                # domain-specific MVP harness blueprint\n    ├── architecture.md                       # component model and harness boundaries\n    ├── agentic-loop.md                       # loop invariants, retries, budgets, stopping\n    ├── tools-and-permissions.md              # typed tools, risk classes, approvals\n    ├── planning-and-goals.md                 # planning mode and long-running goals\n    ├── workflow-orchestration.md             # decomposed workflows, packets, verification\n    ├── context-memory-compaction.md          # context, memory, retrieval, compaction\n    ├── prompt-caching-and-cost.md            # stable prefixes and cost-aware context\n    ├── skills-and-connectors.md              # Agent Skills, MCP, connectors, tool search\n    ├── system-prompts-instructions.md        # instruction hierarchy and templates\n    ├── provider-api-patterns.md              # OpenAI, Anthropic, compatible APIs\n    ├── security-evals-observability.md       # guardrails, tracing, evals, launch gates\n    ├── agent-legibility-feedback-loops.md    # source-of-truth artifacts and cleanup\n    ├── checklists.md                         # implementation and audit checklists\n    ├── coverage-audit.md                     # topic coverage verification\n    └── source-links.md                       # official references and further reading\n```\n\n## Philosophy\n\nThe central tension this skill resolves: **how can an agent do useful work in real systems without turning the model into an unaudited operator?** The answer is a small set of runtime rules:\n\n1. **The harness acts, not the model** - the model proposes; application code validates, authorizes, executes, and records.\n2. **Every tool call gets a result** - denial, timeout, malformed arguments, and aborts are observations too.\n3. **Risk changes the loop** - reads, drafts, writes, external communications, financial actions, destructive actions, and privileged actions need different permission paths.\n4. **Draft and commit are separate** - high-risk side effects require approval records outside the prompt.\n5. **Context is built, not dumped** - retrieve just enough, label trust boundaries, and preserve active state across compaction.\n6. **Long-running work needs budgets** - step, time, token, cost, and tool-call budgets are part of the product.\n7. **Skills and connectors are progressively disclosed** - expose names and descriptions first; load detailed workflows only when relevant.\n8. **Repeated failures become harness features** - validators, tools, docs, evals, or policies beat repeating prompt advice.\n\nRead [`SKILL.md`](SKILL.md) first. Use [`references/mvp-agent-blueprint.md`](references/mvp-agent-blueprint.md) when the user asks to make or build an agent.\n\n## About Agent Skills\n\nAgent Skills package reusable domain knowledge so compatible agents can discover, load, and apply a workflow only when it is relevant. This repository uses the portable `SKILL.md` entrypoint and works as a Codex skill, a Claude Code skill, or a skill for other Agent-Skill-aware runtimes.\n\n## Sources\n\n- Agent Skills specification: [agentskills.io/specification](https://agentskills.io/specification)\n- OpenAI function calling, tools, agents, guardrails, sandboxing, Responses, and prompt caching docs are listed in [`references/source-links.md`](references/source-links.md).\n- Anthropic agent, context engineering, tool writing, long-running harness, MCP, and Agent Skills references are listed in [`references/source-links.md`](references/source-links.md).\n- MCP specification and governance references are listed in [`references/source-links.md`](references/source-links.md).\n\n## License\n\nMIT - see [`LICENSE`](LICENSE).\n\n## Credits\n\nAuthored as an Agent Skill for provider-neutral agent harness design. The recommendations synthesize common production harness patterns across OpenAI, Anthropic, OpenAI-compatible APIs, Agent Skills, MCP, and external connector workflows.\n","summary":"agents-best-practices is a provider-neutral \"Agent Skill\" designed to help users architect, audit, and refactor secure agentic workflows. By providing a structured framework for validation, authorization, and execution, it enables the creation of production-ready blueprints for diverse domains ranging from data analysis to legal and healthcare operations. This project is ideal for developers and AI engineers who need a disciplined, standardized approach to building reliable agent harnesses that move beyond simple prototypes.","description":"Provider-neutral Agent Skill for Codex, Claude Code, and agentic harness design.","stars":1177,"language":null},{"owner":"vercel-labs","repo":"zerolang","url":"https://github.com/vercel-labs/zerolang","readme":"# zerolang\n\nzerolang is an experimental graph-first programming language where agents work with semantic program structure instead of raw source text.\n\nSource code is still the source of truth. The graph is the compiler-derived interface agents use to inspect and change programs with less guessing.\n\nThe current model:\n\n- Human-readable `.0` source stays reviewable, auditable, and durable.\n- The compiler derives a checked ProgramGraph from source.\n- Agents inspect graph facts such as node IDs, graph hashes, types, effects, ownership facts, capabilities, helper use, and module edges.\n- Agents can submit checked graph edits instead of only patching text ranges.\n- Where source rewriting is supported, the compiler validates the edit before writing source.\n\nDesign goals:\n\n- Token efficiency\n- Low memory usage\n- Fast startup\n- Fast builds\n- Low runtime latency\n- Zero dependencies\n\n> **Safety status**\n>\n> Security vulnerabilities should be expected. zerolang is not ready for production systems, sensitive data, or trusted infrastructure. Run and develop it in isolated, disposable environments.\n\n## Why Graph\n\nAgents can edit source text, but source text is a lossy interface for program understanding. A text patch has to guess which references are related, whether a range is stale, whether a call resolves to the intended function, and whether an edit preserved ownership, fallibility, effects, imports, and target constraints.\n\nThe ProgramGraph is zerolang's compiler-owned structure for that work. It is meant to give agents a map they can navigate in slices: start from a symbol, diagnostic, call, capability, module, or node ID, then ask for the surrounding semantic facts instead of loading unrelated source. That keeps context gathering focused while leaving source code as the durable artifact humans review.\n\nThe edit loop is also different. A graph edit can target `node #610c78bf` instead of a line range, require the inspected `graphHash`, require an expected field value, and let the compiler validate, lower, write, format, reparse, and check the result as one path. Refactors can be expressed as semantic operations such as renaming a function node or replacing a resolved callee, rather than search-and-replace over text followed by separate cleanup commands.\n\n## Source Text\n\n`.0` source is intentionally regular. The goal is source that behaves like durable data: easy to index, compare, format, audit, and regenerate, while still reading like normal code.\n\nA small program shows typed signatures, infix expressions, fallibility, and explicit capability passing:\n\n```zero\nfn answer() -> i32 {\n    return 40 + 2\n}\n\npub fn main(world: World) -> Void raises {\n    if answer() == 42 {\n        check world.out.write(\"math works\\n\")\n    }\n}\n```\n\nSource code remains the stored representation. ProgramGraph artifacts are derived inspection and interchange data, not the primary project files.\n\n## ProgramGraph\n\nAgents do not have to infer every fact from text. The compiler can expose the checked structure of a program directly:\n\n```bash\nzero graph dump examples/hello.0\n```\n\nExample output:\n\n```text\nzero-graph v1\norigin source-text\nmodule \"hello\"\nhash \"graph:b8a019041020df03\"\n\nnode #ea5ea1ca Function name:\"main\" type:\"Void\" public:true fallible:true\nnode #f9ce8b3e Param name:\"world\" type:\"World\"\nnode #421a4d4b MethodCall name:\"write\" type:\"Void\"\nnode #610c78bf Literal type:\"String\" value:\"hello from zero\\n\"\nedge #421a4d4b arg #610c78bf order:0\nedge #ea5ea1ca body #6c48dda8\n```\n\nThe graph gives agents explicit handles such as node IDs, graph hashes, resolved types, effects, ownership facts, capability facts, helper use, and module edges. The hash is a stale-context check; node IDs are edit targets for the graph that was inspected.\n\n## Checked Graph Edits\n\nFor supported canonical `.0` source, `zero graph patch` applies checked edits to the graph and rewrites source only after validation. The command is intended to collapse the normal agent loop of edit, format, reparse, check, and fix into a compiler-mediated operation:\n\n```bash\nzero graph patch examples/hello.0 \\\n  --expect-graph-hash graph:b8a019041020df03 \\\n  --op 'set node=\"#610c78bf\" field=\"value\" expect=\"hello from zero\\n\" value=\"hello graph\\n\"'\n```\n\nThis is different from a source-text patch. The operation targets a checked semantic node and field. The graph hash rejects stale context, and `expect` rejects the edit if the current field value is different from what the agent inspected.\n\n## Agent Workflow Interfaces\n\nThe compiler exposes the workflow through CLI commands with stable structured output.\n\n### Load Version-Matched Rules\n\nThe compiler ships skill text that matches the binary being used:\n\n```bash\nzero skills list\nzero skills get language\nzero skills get diagnostics\nzero skills get stdlib\n```\n\nPrint the language guide bundled with the compiler:\n\n```bash\nzero skills get language\n```\n\n### Inspect Compiler Facts\n\nCompiler state is exposed through structured command output instead of prose-only output. The important contract is the stable fields and repair identifiers; today the CLI exposes those fields with `--json`:\n\n```bash\nzero tokens --json examples/hello.0\nzero parse --json examples/hello.0\nzero check --json examples/hello.0\nzero graph dump examples/hello.0\nzero graph --json examples/systems-package\nzero size --json examples/point.0\n```\n\nThe structured contracts include diagnostic codes and spans, public symbols, import edges, target readiness, compile-time sandbox facts, retained helpers, graph hashes, node IDs, and size retention reasons.\n\n### Compiler-Native Contracts\n\nMost language ecosystems expose some of these facts through separate tools, editor protocols, or library APIs. zerolang keeps the agent-facing inspection and repair path in the compiler CLI.\n\nThe inspection and repair surfaces are compiler commands, not editor-only features or a separate analysis service:\n\n| Command | Contract |\n| --- | --- |\n| `zero skills get language` | Version-matched language rules bundled with the compiler binary. |\n| `zero check --json` | Diagnostics with code, span, expected/actual fields, fix safety, repair metadata, compile-time sandbox facts, target readiness, and safety facts. |\n| `zero parse --json` | A stable parse summary with declarations, function signatures, and body node kinds. |\n| `zero graph --json` | Modules, imports, public symbols, capabilities, effects, ownership facts, safety facts, helper use, and interface fingerprints. |\n| `zero graph dump` | Deterministic ProgramGraph text with graph hashes, node IDs, nodes, and edges. |\n| `zero graph patch` | Checked graph edits with graph-hash and field-value preconditions. |\n| `zero fix --plan --json` | Typed repair plans that describe proposed fixes without editing files. |\n| `zero size --json` | Retained helpers, size reasons, profile policy, safety facts, backend facts, and artifact budget data. |\n\n### Repair With Diagnostics\n\nA failing fixture reports a diagnostic with stable fields:\n\n```bash\nzero check --json conformance/check/fail/unknown-name.0\n```\n\nToday that output includes fields like:\n\n```json\n{\n  \"code\": \"NAM003\",\n  \"message\": \"unknown identifier 'message'\",\n  \"expected\": \"visible local, parameter, function, or builtin\",\n  \"actual\": \"no matching visible symbol\",\n  \"repair\": {\n    \"id\": \"declare-missing-symbol\"\n  }\n}\n```\n\nDiagnostics can be explained and turned into typed fix plans:\n\n```bash\nzero explain --json TYP009\nzero fix --plan --json examples/agent-repair-demo/broken.0\n```\n\nRun the repair demo:\n\n```bash\npnpm run agent:demo\n```\n\nSee `examples/agent-repair-demo/` for the broken fixture, suggested edit, fixed fixture, and scripted check-explain-plan-rerun flow.\n\n### Compatibility Policy\n\nzerolang is experimental and intentionally unstable. The repo prefers one current syntax and one formatted style over compatibility layers:\n\n```bash\nzero fmt --check examples/hello.0\nzero check --json examples/hello.0\n```\n\nThe project may make breaking changes to simplify the language, standard library, diagnostics, graph APIs, or inspection surfaces for agent use.\n\n## Quick Start\n\nInstall the latest release:\n\n```bash\ncurl -fsSL https://zerolang.ai/install.sh | bash\nexport PATH=\"$HOME/.zero/bin:$PATH\"\nzero --version\n```\n\nCheck a program:\n\n```bash\nzero check examples/hello.0\n```\n\nRun a small executable:\n\n```bash\nzero run examples/add.0\n```\n\nExpected output:\n\n```text\nmath works\n```\n\n## Common Commands\n\n```bash\nzero check examples/hello.0\nzero run examples/add.0\nzero build --emit exe --target linux-musl-x64 examples/add.0 --out .zero/out/add\nzero graph --json examples/systems-package\nzero size --json examples/point.0\nzero skills get zero --full\nzero doctor --json\n```\n\n## Validation\n\n```bash\npnpm run docs:test\npnpm run conformance\npnpm run native:test\npnpm run command-contracts\n```\n\nBenchmarks run locally by default:\n\n```bash\npnpm run bench\n```\n","summary":"Zerolang (vercel-labs/zerolang) is an experimental, graph-first programming language where agents interact with a compiler-derived semantic ProgramGraph instead of relying on raw text patches. It keeps `.0` source as the durable, reviewable source of truth, while exposing checked graph facts like node IDs, graph hashes, types, effects, capabilities, ownership, and module edges so agent edits are precise and validated. Supported workflows let agents submit semantic “graph edits” (and optionally rewrite source only after the compiler confirms correctness), reducing guesswork that comes with stale ranges and ambiguous references. This project is best suited for researchers and developers building agent-driven code transformation, refactoring, and program analysis in isolated environments, rather than production use.","description":"The programming language for agents","stars":4739,"language":"C"},{"owner":"haydenbleasel","repo":"files-sdk","url":"https://github.com/haydenbleasel/files-sdk","readme":"# Files SDK\n\nA unified storage SDK for object and blob backends. One small, honest API. Web-standards I/O. An escape hatch when you need the native client.\n\n## Install\n\n```sh\nnpm install files-sdk\n```\n\nEach provider's native SDK is an **optional peer dependency** — install only the ones you actually use, alongside `files-sdk` itself. A few examples:\n\n```sh\n# S3 (and any S3-compatible: R2, MinIO, DigitalOcean Spaces, Backblaze B2, Wasabi, …)\nnpm install files-sdk @aws-sdk/client-s3 @aws-sdk/s3-presigned-post @aws-sdk/s3-request-presigner\n\n# Google Cloud Storage\nnpm install files-sdk @google-cloud/storage google-auth-library\n\n# Azure Blob Storage\nnpm install files-sdk @azure/storage-blob @azure/core-auth @azure/identity\n\n# Vercel Blob\nnpm install files-sdk @vercel/blob\n```\n\nSee [files-sdk.dev](https://files-sdk.dev) for the per-adapter install command. If you import an adapter without its peer installed, Node will throw `ERR_MODULE_NOT_FOUND` naming the missing package.\n\n## Quick start\n\n```ts\nimport { Files } from \"files-sdk\";\nimport { s3 } from \"files-sdk/s3\";\n\nconst files = new Files({\n  adapter: s3({ bucket: \"uploads\" }),\n});\n\nawait files.upload(\"avatars/abc.png\", file, { contentType: \"image/png\" });\nconst got = await files.download(\"avatars/abc.png\");\nconst exists = await files.exists(\"avatars/abc.png\");\n```\n\nSwap the adapter import (`files-sdk/r2`, `files-sdk/gcs`, `files-sdk/azure`, …) and the rest of your code stays the same.\n\n## File handles\n\nUse `files.file(key)` when your application code works with the same object repeatedly:\n\n```ts\nconst avatar = files.file(\"avatars/abc.png\");\n\nawait avatar.upload(file, { contentType: \"image/png\" });\n\nif (await avatar.exists()) {\n  const meta = await avatar.head();\n  const url = await avatar.url({ expiresIn: 300 });\n}\n\nawait avatar.delete();\n```\n\nFile handles are a thin layer over the same adapter methods, so adapters do not need to implement anything extra.\n\n## What you get\n\n- **One API across providers** — `upload`, `download`, `head`, `exists`, `delete`, `copy`, `move`, `list`/`listAll`, `url`, `signedUploadUrl`, plus `file(key)` for a key-scoped handle. The shape is the same on S3, GCS, Azure, Vercel Blob, the local filesystem, and consumer providers like Dropbox. `exists` returns `false` only when the provider reports `NotFound`; auth, permission, and transport failures still throw.\n- **Web-standard I/O** — bodies are `Blob`, `File`, `ReadableStream`, `Uint8Array`, `ArrayBuffer`, or `string`. No provider-specific types leak into your code.\n- **Escape hatch** — every adapter exposes its native client at `files.raw`, so provider-specific features are one property access away.\n- **Tree-shakeable** — each adapter is a separate entry point. You only bundle what you import.\n\n## Adapters\n\nA growing catalog covering S3 and S3-compatible stores, the major cloud blob platforms, edge/serverless blob services, the local filesystem, and consumer file providers. See [files-sdk.dev](https://files-sdk.dev) for the current list and per-adapter setup.\n\n## AI tools\n\nA growing set of subpaths wrap a configured `Files` instance as ready-made tools for popular AI SDKs — currently the [Vercel AI SDK](https://ai-sdk.dev) (`files-sdk/ai-sdk`), OpenAI's [Responses API](https://platform.openai.com/docs/api-reference/responses) and [Agents SDK](https://openai.github.io/openai-agents-js/) (`files-sdk/openai`), and Anthropic's [Claude Agent SDK](https://docs.claude.com/en/api/agent-sdk/overview) (`files-sdk/claude`). All share the same file operations and approval-gating defaults, so models can browse, read, and (optionally) mutate your bucket through the same unified surface as your application code. See [files-sdk.dev](https://files-sdk.dev) for the current list and per-SDK setup.\n\n## License\n\nMIT\n","summary":"files-sdk provides a single unified JavaScript/TypeScript storage SDK for uploading, downloading, and managing files across many object and blob backends using one consistent API. It supports major providers like S3 (and S3-compatible), Google Cloud Storage, Azure Blob Storage, Vercel Blob, the local filesystem, and additional consumer providers, offering the same operations and web-standard input types (Blob, File, streams, ArrayBuffer, strings) regardless of backend. Adapters are installed as optional peer dependencies and are tree-shakeable, so you only bundle what you use, while still offering an “escape hatch” to access the native provider client via `files.raw`. This is especially useful for teams building apps or AI integrations that need to swap storage providers without rewriting file-handling logic.","description":"A unified storage SDK for object and blob backends. One small, honest API. Web-standards I/O.","stars":1087,"language":"TypeScript"},{"owner":"chojs23","repo":"concord","url":"https://github.com/chojs23/concord","readme":"# Concord\n\n<img width=\"1613\" height=\"848\" alt=\"concord - a feature-rich TUI client for\n  Discord\" src=\"./docs/example.png\" />\n\nConcord is a feature-rich TUI (terminal user interface) client for Discord, written in Rust with ratatui. Full Discord experience, right in your terminal.\n\n## Installation\n\n### Homebrew\n\n```sh\nbrew install chojs23/tap/concord\n```\n\n### Cargo\n\n`cargo install` builds Concord from source. The default build includes voice\nplayback, so it requires pkg-config, the Opus development library, and ALSA\ndevelopment files on Linux.\n\nOn Fedora:\n\n```sh\nsudo dnf install opus-devel alsa-lib-devel pkgconf-pkg-config\n```\n\nOn Debian or Ubuntu:\n\n```sh\nsudo apt install libopus-dev libasound2-dev pkg-config\n```\n\nOn macOS with Homebrew:\n\n```sh\nbrew install opus pkg-config\n```\n\n```sh\ncargo install concord\n```\n\nTo install without local voice playback and microphone support:\n\n```sh\ncargo install concord --no-default-features\n```\n\nTo install the latest unreleased version directly from the Git repository:\n\n```sh\ncargo install --git https://github.com/chojs23/concord\n```\n\n### Nix\n\nRun without installing (requires flakes enabled):\n\n```sh\nnix run github:chojs23/concord\n```\n\nInstall into your profile:\n\n```sh\nnix profile install github:chojs23/concord\n```\n\nOr add the flake as an input in your own `flake.nix`:\n\n```nix\n{\n  inputs.concord.url = \"github:chojs23/concord\";\n}\n```\n\nThen reference it as `concord.packages.${system}.default` in your configuration.\n\nA development shell with the pinned Rust toolchain and `rust-analyzer` is also\navailable:\n\n```sh\nnix develop github:chojs23/concord\n```\n\n### GitHub Release installer\n\nInstall the latest release with the cargo-dist shell installer:\n\n```sh\ncurl --proto '=https' --tlsv1.2 -LsSf https://github.com/chojs23/concord/releases/latest/download/concord-installer.sh | sh\n```\n\nOn Windows, use the PowerShell installer instead:\n\n```powershell\npowershell -ExecutionPolicy Bypass -c \"irm https://github.com/chojs23/concord/releases/latest/download/concord-installer.ps1 | iex\"\n```\n\nThe installer places `concord` under `$CARGO_HOME/bin`, which is usually\n`~/.cargo/bin` on Unix and `%USERPROFILE%\\.cargo\\bin` on Windows.\n\n### Build from source\n\nYou need the Rust stable toolchain, Cargo, and the native dependencies listed in\nthe Cargo install section.\n\n```sh\ngit clone https://github.com/chojs23/concord.git\ncd concord\ncargo build --release\n```\n\nThe release binary is produced at:\n\n```sh\ntarget/release/concord\n```\n\nBy default, source builds can join voice channels, decode received voice audio,\nand open local audio devices for playback and gated microphone transmit. To\nbuild without local voice playback and microphone support, disable default\nfeatures:\n\n```sh\ncargo build --release --no-default-features\n```\n\nOn WSLg, audio is usually exposed through PulseAudio instead of a real ALSA\nsound card. If playback does not start, check that PulseAudio and ALSA routing\nwork before debugging Discord voice itself:\n\n```sh\npactl info\npaplay /usr/share/sounds/alsa/Front_Center.wav\naplay -D pulse /usr/share/sounds/alsa/Front_Center.wav\n```\n\n## Features\n\n### Authentication\n\n- **Token** : paste an existing Discord token.\n- **Email / Password** : login with credentials. MFA (TOTP, SMS) is fully supported.\n- **QR Code** : scan the code from the Discord mobile app.\n\nEmail and QR code logins may trigger a CAPTCHA challenge on Discord's side. We cannot solve that, so I strongly recommend using token authentication.\n\nTokens are saved under Concord's config directory in plain text. See the Security section below for details.\n\n### Guilds & Channels\n\n- Browse servers with guild folder grouping\n- Navigate text channels, threads, and forum channels\n- View and filter forum posts (active / archived)\n- Load pinned messages per channel\n- Open channel actions for pinned messages, thread lists, and mark-as-read\n- Join and leave voice channels\n- Highlight active voice speakers in voice channel participant rows\n- Track unread messages and mention counts per channel\n- Mute and unmute channels and servers\n- Leave the selected server after confirmation\n\n### Messaging\n\n- Send, edit, and delete messages\n- Upload / Download attachments\n- Search messages with filters with `/`\n- Use @mention autocomplete\n- View full message history\n- Rich content display (embeds, attachments, stickers, and mentions)\n- Detect URLs in message bodies and markdown links, then open them in your default browser\n- Direct message shortcuts for copy, reply, edit, delete, reactions, URL opening,\n  and image viewing. More message actions are available from the action menu.\n\n#### Markdown Rendering\n\n![Markdown rendering example](./docs/markdown-example.png)\n\nConcord renders a practical subset of Discord-style Markdown in message bodies:\n\n- Headings: `# H1`, `## H2`, `### H3`\n- Quotes: `> quoted text`\n- Bullets: `- item` and `* item`\n- Inline styles: `**bold**`, `*italic*`, and `` `inline code` ``\n- Fenced code blocks with optional language labels, rendered as compact boxes\n- Raw URLs and markdown link destinations are underlined and can be opened from message actions\n\n### Reactions & Polls\n\n- View, add, and remove emoji reactions (Unicode and custom server emoji)\n- Browse who reacted with a specific emoji\n- View and vote on polls\n\n### Media & Images\n\n- Inline image previews directly in the terminal\n- Avatar and custom emoji rendering\n- Download attachments to your platform Downloads directory (`XDG_DOWNLOAD_DIR` on Linux)\n- Large centered attachment viewer with navigation\n\nImage rendering is powered by [ratatui-image](https://github.com/benjajaja/ratatui-image). On startup, Concord queries the terminal to detect the best available graphics protocol. Supported protocols:\n\n- **Kitty Graphics Protocol** - Kitty, WezTerm, Ghostty, etc.\n- **iTerm2 Inline Images** - iTerm2, WezTerm, mintty, etc.\n- **Sixel** - foot, mlterm, xterm (if compiled with Sixel support), etc.\n- **Halfblocks** (fallback) - works on any terminal, but uses block characters instead of true pixels.\n\nIf your terminal does not support any graphics protocol, images will be rendered as halfblock approximations. For the best experience, use a terminal that supports the Kitty or iTerm2 protocol.\n\nYou can toggle image viewing on or off in the configuration file. When image viewing is off, attachments and emojis will be shown as text placeholders.\n\n### Members & Profiles\n\n- Member list with grouping\n- Presence indicators (Online, Idle, DND, Offline)\n- View User profile\n\n### Typing Indicators & Read State\n\n- Live \"user is typing...\" indicators\n- Unread message tracking with mention counts\n- Mark server, channel as read\n\n### Notifications\n\n- Desktop notifications for Discord messages that pass your Discord\n  notification settings\n- Active channel notifications are suppressed so Concord does not notify for\n  the conversation you are already viewing\n- Voice join and leave notification sounds while you are connected to voice.\n  You can keep the built-in tones or configure custom WAV files.\n\n### Navigation & Keyboard shortcuts\n\n> ⚠️ Keymap action names and default bindings may have breaking changes between releases.\n\nAll default key settings in this section can be customized. See\n[Keymap options](#keymap-options) for the config format and supported actions.\n\nConcord has a four-pane layout like Discord.\n**Guilds (1)**, **Channels (2)**, **Messages (3)**, **Members (4)**\n\nWith default vim-style navigation:\n\n| Key                                       | Action                                          |\n| ----------------------------------------- | ----------------------------------------------- |\n| `1` `2` `3` `4`                           | Focus pane                                      |\n| `Tab` / `Shift+Tab`                       | Cycle focus forward / backward                  |\n| `h` / `l`, `←` / `→`                      | Move focus left / right                         |\n| `j` / `k`, `↑` / `↓`, `Ctrl+n` / `Ctrl+p` | Move down / up                                  |\n| `J`, `K` / `H`, `L`                       | Scroll viewport                                 |\n| `Ctrl+d` / `Ctrl+u`                       | Half-page scroll                                |\n| `Alt+h/l/←/→`                             | Resize focused pane width                       |\n| `gg` / `G`                                | Jump or scroll to top / bottom                  |\n| `Enter`                                   | Open or activate the selected item              |\n| `/`                                       | Filter Guilds/Channels, search Messages/Members |\n| `Space`                                   | Open leader shortcut window                     |\n| `i`                                       | Text insert mode                                |\n| `Esc`                                     | Close popup, cancel mode, or go back            |\n| `q`                                       | Quit Concord                                    |\n\n`Ctrl+n` and `Ctrl+p` are fixed row movement keys. The default `j` and `k`\nrow movement keys are `SelectNext` and `SelectPrevious` and can be changed in\n`keymap.toml`.\n\n#### Leader key\n\nPress `Space` to open the leader shortcut window.\n\n| Key sequence     | Action                            |\n| ---------------- | --------------------------------- |\n| `Space`, `1`     | Toggle the Servers pane           |\n| `Space`, `2`     | Toggle the Channels pane          |\n| `Space`, `4`     | Toggle the Members pane           |\n| `Space`, `a`     | Open actions for the focused pane |\n| `Space`, `o`     | Choose concord option category    |\n| `Space`, `v`     | Voice command prefix              |\n| `Space`, `Space` | Open the fuzzy channel switcher   |\n\n#### Action menus\n\nFocus a pane, then press `Space`, `a` to open actions for that pane. Action\nshortcuts are shown inside the leader popup and only run when the action is\nenabled. In the Messages pane, the selected message also supports these direct\nshortcuts:\n\nMessage shortcuts:\n\n| Shortcut | Action              | Description                                                 |\n| -------- | ------------------- | ----------------------------------------------------------- |\n| `y`      | Copy                | Copy the selected message text and show a short toast       |\n| `r`      | Add/remove reaction | Open the reaction picker for the selected message           |\n| `R`      | Reply               | Start a reply to the selected message                       |\n| `d`      | Delete              | Open a delete confirmation before deleting the message      |\n| `e`      | Edit                | Start editing the selected message when editing is allowed  |\n| `o`      | Open URL            | Open the selected message URL, or choose from multiple URLs |\n| `v`      | View attachment     | Open the selected message's attachment viewer               |\n\nMessage action menu shortcuts:\n\n| Shortcut | Action                      | Description                                                 |\n| -------- | --------------------------- | ----------------------------------------------------------- |\n| `y`      | Copy                        | Copy the selected message text and show a short toast       |\n| `r`      | Add/remove reaction         | Open the reaction picker for the selected message           |\n| `R`      | Reply                       | Start a reply to the selected message                       |\n| `d`      | Delete                      | Open a delete confirmation before deleting the message      |\n| `e`      | Edit                        | Start editing the selected message when editing is allowed  |\n| `o`      | Open URL                    | Open the selected message URL, or choose from multiple URLs |\n| `v`      | View attachment             | Open the selected message's attachment viewer               |\n| `g`      | Go to referenced message    | Go to the replied or forwarded message                      |\n| `p`      | show message sender profile | Open the selected message author's profile                  |\n| `P`      | Pin / unpin                 | Open a pin or unpin confirmation for the selected message   |\n| `t`      | Open thread                 | Open the selected message's thread                          |\n| `u`      | Show reacted users          | Show users who reacted to the selected message              |\n| `c`      | Choose poll votes           | Choose poll votes for the selected message                  |\n\nIf a message contains more than one detected URL, `o` opens a numbered URL picker inside the leader popup so you can choose which link to open.\n\nServer actions:\n\n| Shortcut | Action              | Description                                           |\n| -------- | ------------------- | ----------------------------------------------------- |\n| `m`      | Mark server as read | Mark all unread viewable channels in this server read |\n| `u`      | Mute / unmute       | Toggle server notification mute                       |\n| `l`      | Leave server        | Open a confirmation before leaving this server        |\n\nChannel actions:\n\n| Shortcut | Action               | Description                                  |\n| -------- | -------------------- | -------------------------------------------- |\n| `j`      | Join voice           | Join the selected voice channel              |\n| `l`      | Leave voice          | Leave the current voice channel              |\n| `p`      | Show pinned messages | Open the selected channel's pinned messages  |\n| `t`      | Show threads         | List threads for the selected channel        |\n| `m`      | Mark as read         | Mark the selected channel read               |\n| `u`      | Mute / unmute        | Toggle channel or category notification mute |\n\nVoice commands:\n\n| Sequence          | Action       | Description                               |\n| ----------------- | ------------ | ----------------------------------------- |\n| `Space`, `v`, `d` | Deafen voice | Toggle Concord's Discord voice deaf state |\n| `Space`, `v`, `m` | Mute voice   | Toggle Concord's Discord voice mute state |\n| `Space`, `v`, `l` | Leave voice  | Leave the current Concord voice channel   |\n\nWhen the attachment viewer is open, press `d` to download the current attachment directly.\n\nHidden side panes give their width back to Messages. Pressing a hidden pane's\nnumber key directly shows and focuses it again.\n\n#### Composer\n\nYou can paste copied files into the composer to attach them. Pending uploads\nare shown above the input before sending.\n\n| Shortcut                   | Action            | Description                                                      |\n| -------------------------- | ----------------- | ---------------------------------------------------------------- |\n| `Ctrl+v`                   | paste clipboard   | Attach copied files or images when present, otherwise paste text |\n| `Ctrl+e`                   | open $EDITOR      | Open $EDITOR on the current draft for long editing               |\n| `Ctrl+c`                   | clear             | Clear current draft                                              |\n| `Ctrl+Left`/ `Ctrl+Right`  | Jump word         | Jump the cursor by word                                          |\n| `Ctrl+Backspace`/ `Ctrl+w` | Delete word       | Delete the word before the cursor                                |\n| `Delete`                   | Detach attachment | Removes the last pending attachment                              |\n\n#### Mention picker\n\nWhen the @mention picker is open, use `Up` / `Down`,\n`Ctrl+p` / `Ctrl+n`, `Tab`, or `Enter` to choose a mention.\n\n#### Emoji picker\n\nType `:` plus at least two letters, such as `:he`, to pick Unicode or server\nemoji while writing a message.\n\nTo react from the composer, select a message, enter insert mode, then type\n`+:`. The reaction picker opens for that message. Press `/` to search, Enter to\nlock the filter, then Enter again or use a shown shortcut to react.\n\n#### Bot commands\n\nWhen the composer input starts with a slash `/`, the command suggestion popup\n\n#### Mouse support\n\nMouse support is also available: click to focus or select rows, double-click to\nopen or activate items, and use the wheel to scroll panes and popups.\n\n### Configuration\n\nConcord options are stored under Concord's config directory. If\n`XDG_CONFIG_HOME` is set, Concord uses `$XDG_CONFIG_HOME/concord/config.toml`\nfor app options and `$XDG_CONFIG_HOME/concord/keymap.toml` for key settings.\nOtherwise it uses the platform config directory. The usual fallback is\n`~/.config/concord/config.toml` and `~/.config/concord/keymap.toml` on Linux,\nmatching files under `~/Library/Application Support/concord/` on macOS, and the\nroaming AppData config directory on Windows.\n\n- Disable all image previews with one master switch\n- Toggle inline image previews\n- Set image preview quality for attachments, embeds, and the attachment viewer\n- Toggle avatar display\n- Toggle custom emoji rendering\n- Toggle desktop notifications\n- Set your Discord voice mute and deaf state\n- Set microphone and received voice volume from 0 to 100\n- Allow gated microphone transmit while joined from this Concord session and not\n  self-muted\n\nYou can change these from the in-app Options menu, and Concord saves them back\nto `config.toml`. Key settings are read from `keymap.toml`.\n\nExample:\n\n```toml\n[display]\n# Master switch that hides all image previews when true.\ndisable_image_preview = false\n\n# Show user avatars next to messages and in profile views.\nshow_avatars = true\n\n# Render inline image previews for attachments and embeds.\nshow_images = true\n\n# Preview quality: efficient, balanced, high, or original.\nimage_preview_quality = \"balanced\"\n\n# Render custom Discord emoji as images when possible.\nshow_custom_emoji = true\n\n# Crop avatars into circles instead of showing square images.\ncircular_avatars = false\n\n[notifications]\n# Show desktop notifications for Discord messages that pass notification rules.\ndesktop_notifications = true\n\n# Optional WAV files for voice join and leave notification sounds.\n# When unset, Concord uses built-in generated tones.\nvoice_join_sound = \"/path/to/join.wav\"\nvoice_leave_sound = \"/path/to/leave.wav\"\n\n[voice]\n# Join or update Discord voice with Concord self-muted.\nself_mute = false\n\n# Join or update Discord voice with Concord self-deafened.\nself_deaf = false\n\n# Allow microphone transmit while this session is joined and not self-muted.\nallow_microphone_transmit = false\n\n# Voice activity threshold in dB. Lower values transmit quieter input.\nmicrophone_sensitivity = -30\n\n# Microphone input volume percentage, from 0 to 100.\nmicrophone_volume = 100\n\n# Received voice playback volume percentage, from 0 to 100.\nvoice_output_volume = 100\n```\n\n`image_preview_quality` supports these values:\n\n- `efficient`: smaller preview requests to reduce bandwidth and memory use.\n- `balanced`: default quality with bounded resource use.\n- `high`: sharper resized previews using lossless quality.\n- `original`: request the original source image for previews when possible.\n\nThis setting only applies to attachment, embed, and attachment viewer previews.\nAvatars and custom emoji keep their separate small-image behavior.\n\n`desktop_notifications` under `[notifications]` controls OS notifications for Discord messages that\npass Discord notification settings.\n\n`microphone_volume` and `voice_output_volume` accept `0` to `100` percent\nand default to `100`, which preserves the normal audio level. In Voice Options, select\nsensitivity and press `h`/`l` to adjust by 1 dB or `H`/`L` to adjust by 10 dB.\n\n#### Keymap options\n\n> ⚠️ Keymap action names and default bindings may have breaking changes between releases.\n\nConcord reads key settings from the `[keymap]` section in `keymap.toml`.\n\nExample `keymap.toml`:\n\n```toml\n[keymap]\nStartComposer = { keys = [\"c\"] }\nReplyMessage = \"<leader>mr\"\nVoiceDeafen = \"<leader>vd\"\nVoiceMute = \"<leader>vm\"\nVoiceLeave = \"<leader>vl\"\n\n[keymap.groups]\n\"<leader>v\" = \"Voice\"\n\n[keymap.guild_actions]\nLeaveServer = { keys = [\"l\"], description = \"leave server\" }\n\n[keymap.channel_actions]\nMuteChannel = { keys = [\"x\"], description = \"mute channel\" }\n\n[keymap.message_actions]\nOpenThread = { keys = [\"t\"], description = \"open thread\" }\nGoToReferencedMessage = \"g\"\n\n[keymap.composer]\nOpenEditor = \"<C-o>\"\nDeletePreviousWord = \"<A-backspace>\"\n```\n\nThere are six kinds of keymap settings:\n\n| Config path                                                                                                 | What it controls                                                                          |\n| ----------------------------------------------------------------------------------------------------------- | ----------------------------------------------------------------------------------------- |\n| `[keymap] leader`                                                                                           | The key that opens the leader popup. Defaults to `Space`.                                 |\n| `[keymap] <ActionName>`                                                                                     | Directly assignable UI actions such as `StartComposer`, `ReplyMessage`, and `OpenThread`. |\n| `[keymap.groups]`                                                                                           | Optional titles for prefix popups, such as naming `<leader>v` as `Voice`.                 |\n| `[keymap.guild_actions]`, `[keymap.channel_actions]`, `[keymap.message_actions]`, `[keymap.member_actions]` | Shortcuts shown inside focused-pane action menus opened by `OpenFocusedPaneAction`.       |\n| `[keymap.composer]`                                                                                         | Shortcuts used while the message composer is open, such as editor and cursor commands.    |\n\n`[keymap]` action values can be either a string or an object with `keys` and an\noptional `description`:\n\n```toml\n[keymap]\nStartComposer = \"<leader>e\"\nChannelSwitcher = { keys = [\"<C-w>f\", \"<leader><C-w>\"], description = \"find channel\" }\n```\n\n`keys` accepts one sequence or a list of sequences. Modifier chords use\nVim-style angle syntax, such as `<C-f>`, `<S-tab>`, and `<A-backspace>`.\nLeader sequences like `<leader><C-w>`, compact plain sequences like `fd`, and\ngeneral multi-key prefixes like `<C-w>f` are supported. Prefix sequences show a\n[which-key.nvim](https://github.com/folke/which-key.nvim) style popup. For example, `fd` opens an `f` popup after `f`, then runs\nthe action after `d`.\n\nScoped action tables use the same string or object shape, but each `keys` entry\nmust be a single key chord. Multi-key sequences such as `gt` are only supported\nby direct `[keymap]` actions, not by `[keymap.guild_actions]`,\n`[keymap.channel_actions]`, `[keymap.message_actions]`, or\n`[keymap.member_actions]`.\n\n```toml\n[keymap.channel_actions]\nMuteChannel = { keys = [\"u\", \"<C-u>\"], description = \"mute channel\" }\n\n[keymap.message_actions]\nGoToReferencedMessage = { keys = [\"g\"], description = \"go to referenced message\" }\n```\n\nComposer action values under `[keymap.composer]` use the same string or object\nshape, but each `keys` entry must be one key chord because composer commands run\nimmediately while text is being typed:\n\n```toml\n[keymap.composer]\nOpenEditor = { keys = [\"<C-o>\"], description = \"open editor\" }\nDeletePreviousWord = \"<A-backspace>\"\n```\n\nDirect `[keymap]` actions and `leader` cannot use reserved keys: `Enter`, `Esc`,\n`Backspace`, `Delete`, `Ctrl+c`, `Ctrl+n`, or `Ctrl+p`. Invalid, reserved, or\nconflicting bindings are ignored for that action. `[keymap.composer]` is separate\nand can remap those editing keys. `Ctrl+n` and `Ctrl+p` always move row\nselection down and up.\n\n##### Directly assignable actions\n\nThese action names can be assigned directly under `[keymap]`. Defaults\nthat start with `<leader>` are shown without the leading `Space` in the leader\npopup. `OpenDisplayOptions`, `OpenNotificationOptions`, and `OpenVoiceOptions`\nhave contextual defaults inside the Options popup, so assign your own full\nsequence if you want direct keys for them.\n\nNavigation and app actions:\n\n| Action name                 | Default config             | Action                                   |\n| --------------------------- | -------------------------- | ---------------------------------------- |\n| `StartComposer`             | `\"i\"`                      | Start the message composer.              |\n| `OpenPaneFilter`            | `\"/\"`                      | Open the focused pane filter or search.  |\n| `FocusGuildPane`            | `\"1\"`                      | Show and focus the Servers pane.         |\n| `FocusChannelPane`          | `\"2\"`                      | Show and focus the Channels pane.        |\n| `FocusMessagePane`          | `\"3\"`                      | Focus the Messages pane.                 |\n| `FocusMemberPane`           | `\"4\"`                      | Show and focus the Members pane.         |\n| `SelectNext`                | `\"j\"`                      | Move selection down in navigation lists. |\n| `SelectPrevious`            | `\"k\"`                      | Move selection up in navigation lists.   |\n| `CycleFocusNext`            | `[\"tab\", \"l\", \"right\"]`    | Cycle focus forward.                     |\n| `CycleFocusPrevious`        | `[\"<S-tab>\", \"h\", \"left\"]` | Cycle focus backward.                    |\n| `HalfPageDown`              | `\"<C-d>\"`                  | Half-page down.                          |\n| `HalfPageUp`                | `\"<C-u>\"`                  | Half-page up.                            |\n| `ScrollMessageViewportDown` | `\"J\"`                      | Scroll the message viewport down.        |\n| `ScrollMessageViewportUp`   | `\"K\"`                      | Scroll the message viewport up.          |\n| `JumpTop`                   | `\"gg\"`                     | Jump to the top.                         |\n| `JumpBottom`                | `\"G\"`                      | Jump to the bottom.                      |\n| `ScrollHorizontalLeft`      | `\"H\"`                      | Scroll focused pane horizontally left.   |\n| `ScrollHorizontalRight`     | `\"L\"`                      | Scroll focused pane horizontally right.  |\n| `ResizePaneLeft`            | `[\"<A-h>\", \"<A-left>\"]`    | Shrink the focused pane width.           |\n| `ResizePaneRight`           | `[\"<A-l>\", \"<A-right>\"]`   | Grow the focused pane width.             |\n| `Quit`                      | `\"q\"`                      | Quit Concord.                            |\n\nMessage actions:\n\n| Action name             | Default config | Action                                          |\n| ----------------------- | -------------- | ----------------------------------------------- |\n| `CopyMessage`           | `\"y\"`          | Copy selected message content.                  |\n| `ReactMessage`          | `\"r\"`          | Add or remove a reaction.                       |\n| `ReplyMessage`          | `\"R\"`          | Start a reply.                                  |\n| `DeleteMessage`         | `\"d\"`          | Open delete confirmation.                       |\n| `EditMessage`           | `\"e\"`          | Start editing the selected message.             |\n| `OpenMessageUrl`        | `\"o\"`          | Open the selected message URL.                  |\n| `ViewMessageAttachment` | `\"v\"`          | Open the selected message attachment viewer.    |\n| `GoToReferencedMessage` | none           | Go to the replied or forwarded message.         |\n| `ShowMessageProfile`    | none           | Open the selected message author's profile.     |\n| `PinMessage`            | none           | Open pin or unpin confirmation.                 |\n| `OpenThread`            | none           | Open the selected message's thread.             |\n| `ShowReactionUsers`     | none           | Show users who reacted to the selected message. |\n| `OpenPollVotePicker`    | none           | Choose poll votes for the selected message.     |\n\nPane, options, and voice actions:\n\n| Action name               | Default config                     | Action                                       |\n| ------------------------- | ---------------------------------- | -------------------------------------------- |\n| `ToggleGuildPane`         | `\"<leader>1\"`                      | Toggle the Servers pane.                     |\n| `ToggleChannelPane`       | `\"<leader>2\"`                      | Toggle the Channels pane.                    |\n| `ToggleMemberPane`        | `\"<leader>4\"`                      | Toggle the Members pane.                     |\n| `OpenFocusedPaneAction`   | `\"<leader>a\"`                      | Open actions for the currently focused pane. |\n| `OpenOptions`             | `\"<leader>o\"`                      | Open the options category picker.            |\n| `ChannelSwitcher`         | `\"<leader><leader>\"`               | Open channel switcher.                       |\n| `OpenDisplayOptions`      | Contextual `d` after `OpenOptions` | Open Display options.                        |\n| `OpenNotificationOptions` | Contextual `n` after `OpenOptions` | Open Notification options.                   |\n| `OpenVoiceOptions`        | Contextual `v` after `OpenOptions` | Open Voice options.                          |\n| `VoiceDeafen`             | `\"<leader>vd\"`                     | Toggle voice deafen.                         |\n| `VoiceMute`               | `\"<leader>vm\"`                     | Toggle voice mute.                           |\n| `VoiceLeave`              | `\"<leader>vl\"`                     | Leave the current Concord voice channel.     |\n\n##### Composer actions\n\nThese action names can be assigned under `[keymap.composer]`. Configured keys\nreplace that action's defaults. Any printable single character can be configured,\nbut that key will run the composer action instead of inserting text.\n\n| Composer action        | Default config                            | Action                               |\n| ---------------------- | ----------------------------------------- | ------------------------------------ |\n| `OpenEditor`           | `\"<C-e>\"`                                 | Open the current draft in `$EDITOR`. |\n| `PasteClipboard`       | `\"<C-v>\"`                                 | Request clipboard paste.             |\n| `InsertNewline`        | `[\"<S-enter>\", \"<C-enter>\", \"<A-enter>\"]` | Insert a newline.                    |\n| `Submit`               | `\"enter\"`                                 | Submit the composer.                 |\n| `Close`                | `\"esc\"`                                   | Close the composer.                  |\n| `ClearInput`           | `\"<C-c>\"`                                 | Clear the composer input.            |\n| `RemoveLastAttachment` | `\"delete\"`                                | Remove the last pending attachment.  |\n| `DeletePreviousChar`   | `\"backspace\"`                             | Delete the previous character.       |\n| `DeletePreviousWord`   | `[\"<C-backspace>\", \"<C-w>\"]`              | Delete the word before the cursor.   |\n| `MoveCursorUp`         | `\"up\"`                                    | Move the cursor up.                  |\n| `MoveCursorDown`       | `\"down\"`                                  | Move the cursor down.                |\n| `MoveCursorWordLeft`   | `\"<C-left>\"`                              | Move the cursor one word left.       |\n| `MoveCursorLeft`       | `\"left\"`                                  | Move the cursor left.                |\n| `MoveCursorWordRight`  | `\"<C-right>\"`                             | Move the cursor one word right.      |\n| `MoveCursorRight`      | `\"right\"`                                 | Move the cursor right.               |\n| `MoveCursorHome`       | `\"home\"`
