n.py (needs OPENAI_API_KEY)\njust build           # build SPA + bundle into wheel → python/dist/*.whl\njust serve           # run gepa-viz serve from the source tree\njust lint            # ESLint on src/\njust clean\n```\n\nDuring development the SPA reads `run.json` from `client/public/run.json` (Vite serves it as a static asset). The Python callback writes there by default when it detects it's running inside the repo. For production-style testing, run `just build` and `pip install python/dist/*.whl` into a throwaway venv.\n\n## Schema\n\nThe callback writes a JSON file with this shape (the SPA reads from it; you can also hand-craft a `run.json` for offline browsing):\n\n```jsonc\n{\n  \"examples\": [\n    { /* arbitrary input fields */, \"ground_truth\": { /* output fields */ } }\n  ],\n  \"candidates\": {\n    \"0\":   { \"prompt\": \"...\", \"parent\": null, \"score\": 0.62,\n             \"predictions\": [{\"prediction\": {...}, \"score\": 1.0}], \"minibatch\": null },\n    \"0.1\": { \"prompt\": \"...\", \"parent\": \"0\",  \"score\": null,\n             \"predictions\": null,\n             \"minibatch\": [{\"example\": {...}, \"parent_prediction\": {...},\n                            \"parent_score\": 0.0, \"prediction\": {...},\n                            \"score\": 0.0, \"feedback\": \"...\"}] },\n    \"1\":   { \"prompt\": \"...\", \"parent\": \"0\",  \"score\": 0.81, \"predictions\": [...], \"minibatch\": [...] }\n  }\n}\n```\n\n- **Accepted candidate ids** are integer strings (`\"0\"`, `\"1\"`, `\"2\"`, …), matching gepa's internal index.\n- **Rejected candidate ids** are `\"<parent>.<n>\"` with `n` starting at 1 per parent.\n\n## License\n\nMIT.\n","summary":"gepa-viz (modaic-ai/gepa-viz) provides live visualization for GEPA prompt-optimization runs by rendering the evolving candidate tree as an interactive force-directed graph. It shows accepted candidates as larger nodes with per-example valset results (green/red segments), while rejected proposals appear as smaller nodes that reveal the feedback that caused their rejection. Clicking any node opens a detail view with the candidate prompt, diffs vs its parent, reflection minibatch results with per-example feedback, and a clickable pareto frontier grid. It’s aimed at developers and researchers using GEPA (including via DSPy or base GEPA) who want real-time insight into how prompts improve and trade off across the pareto frontier.","description":"Interactive live visualizer for gepa runs","stars":362,"language":"TypeScript"},{"owner":"open-gsd","repo":"gsd-pi","url":"https://github.com/open-gsd/gsd-pi","readme":"<!-- GSD Pi - Project overview and setup guide -->\n\n# GSD Pi\n\n[![npm version](https://img.shields.io/npm/v/@opengsd/gsd-pi?label=npm&logo=npm)](https://www.npmjs.com/package/@opengsd/gsd-pi)\n[![npm downloads](https://img.shields.io/npm/dm/@opengsd/gsd-pi?label=downloads&logo=npm&color=red)](https://www.npmjs.com/package/@opengsd/gsd-pi)\n[![CI](https://img.shields.io/github/actions/workflow/status/open-gsd/gsd-pi/ci.yml?branch=main&label=tests&logo=github)](https://github.com/open-gsd/gsd-pi/actions/workflows/ci.yml)\n[![Discord](https://img.shields.io/badge/discord-join-5865F2?logo=discord&logoColor=white)](https://discord.gg/8NnkKuepmQ)\n[![GitHub stars](https://img.shields.io/github/stars/open-gsd/gsd-pi?label=stars&logo=github)](https://github.com/open-gsd/gsd-pi/stargazers)\n[![License: MIT](https://img.shields.io/github/license/open-gsd/gsd-pi?label=license)](https://github.com/open-gsd/gsd-pi/blob/main/LICENSE)\n\nGSD Pi is a local-first coding agent for planning, implementing, verifying, and tracking project work from the command line.\n\nIt combines a terminal agent, project workflow tools, worktree-aware Git automation, and optional UI integrations so a project can move from idea to reviewed implementation with less manual coordination.\n\n## Screenshots\n\nGSD runs as a terminal-first TUI with optional browser dashboard controls.\n\n![GSD TUI running an agent workflow](./docs/assets/screenshots/gsd-tui-agent-run.png)\n\n![GSD TUI progress dashboard](./docs/assets/screenshots/gsd-tui-progress-dashboard.png)\n\n![GSD TUI metrics dashboard](./docs/assets/screenshots/gsd-tui-metrics-dashboard.png)\n\n## Feature Roll-Up\n\n- **Guided terminal agent** — Start with `gsd`, configure providers, and run planned or quick coding sessions from your shell.\n- **Autonomous project workflow** — Break work into milestones, slices, and tasks, then let auto mode plan, implement, verify, and advance.\n- **Worktree-aware Git automation** — Keep implementation work isolated while preserving a reviewable main checkout.\n- **Local project memory** — Store project requirements, decisions, runtime notes, generated plans, summaries, and validation evidence under `.gsd/`.\n- **Multi-provider model routing** — Use the provider your team already has, with configurable defaults and per-phase model preferences.\n- **Extension surface** — Add project-specific commands, tools, skills, and UI integrations through bundled or community extensions.\n- **Terminal and web surfaces** — Use the TUI by default, or launch `gsd --web` when a visual control plane fits the work better than a terminal.\n\nSee [CHANGELOG.md](./CHANGELOG.md) for release-by-release fixes and [Legacy Release History](./docs/archive/legacy-release-history.md) for archived history before the `open-gsd/gsd-pi` baseline.\n\n## Status\n\nThis repository is starting a new development baseline at version `1.0.0` under the `open-gsd/gsd-pi` project.\n\nOlder release history has been archived outside the active changelog so new work can be reviewed from a clean project surface.\n\n## Install\n\nRecommended — guided installer:\n\n```bash\nnpx @opengsd/gsd-pi@latest\n```\n\nFor CI or scripted installs:\n\n```bash\nnpx @opengsd/gsd-pi@latest --yes\n```\n\nAlternative — direct npm global install:\n\n```bash\nnpm install -g @opengsd/gsd-pi@latest\n```\n\nIf you want pnpm to own the global install, use pnpm's runner:\n\n```bash\npnpm setup\nexec $SHELL -l\npnpm dlx @opengsd/gsd-pi@latest\n```\n\nSource: [`open-gsd/gsd-pi`](https://github.com/open-gsd/gsd-pi).\n\n## Migrate From Older Installs\n\nGSD Pi now installs from the scoped package `@opengsd/gsd-pi`. If you previously installed the older unscoped `gsd-pi` package, remove it first so the old global binary does not shadow the new package.\n\nRecommended migration with the guided `npx` installer:\n\n```bash\nnpm uninstall -g gsd-pi @opengsd/gsd-pi\nrm -f ~/.gsd/.update-check ~/.gsd/agent/managed-resources.json\nnpx @opengsd/gsd-pi@latest\ncommand -v gsd\ngsd --version\n```\n\nIf the old package was installed with `sudo npm install -g`, use `sudo npm uninstall -g gsd-pi` for the old package removal.\n\nTo migrate from old npm globals to a pnpm-owned global install:\n\n```bash\nnpm uninstall -g gsd-pi @opengsd/gsd-pi\nrm -f ~/.gsd/.update-check ~/.gsd/agent/managed-resources.json\npnpm setup\nexec $SHELL -l\npnpm dlx @opengsd/gsd-pi@latest\ncommand -v gsd\ngsd --version\n```\n\nWindows PowerShell with the guided `npx` installer:\n\n```powershell\nnpm uninstall -g gsd-pi @opengsd/gsd-pi\nRemove-Item \"$env:USERPROFILE\\.gsd\\.update-check\" -Force -ErrorAction SilentlyContinue\nRemove-Item \"$env:USERPROFILE\\.gsd\\agent\\managed-resources.json\" -Force -ErrorAction SilentlyContinue\nnpx @opengsd/gsd-pi@latest\nwhere.exe gsd\ngsd --version\n```\n\nAfter migration, routine upgrades use:\n\n```bash\ngsd upgrade\n```\n\nYou can also run `npx @opengsd/gsd-pi@latest` to launch the guided installer (recommended for new installs). For deeper recovery steps, see [Upgrade GSD Pi](./docs/user-docs/getting-started.md#upgrade-gsd-pi) and [Upgrade from older gsd-pi installs](./docs/user-docs/troubleshooting.md#upgrade-from-older-gsd-pi-installs).\n\n## Uninstall\n\nRemove the global package and optional local GSD state files.\n\nmacOS / Linux:\n\n```bash\nnpm uninstall -g @opengsd/gsd-pi gsd-pi\nrm -rf ~/.gsd\n```\n\nIf you installed GSD with pnpm, use pnpm for the pnpm-owned package. If pnpm reports that its global bin directory is not on `PATH`, run `pnpm setup`, restart your shell, then retry.\n\n```bash\npnpm remove -g @opengsd/gsd-pi\nnpm uninstall -g gsd-pi\nrm -rf ~/.gsd\n```\n\nWindows PowerShell:\n\n```powershell\nnpm uninstall -g @opengsd/gsd-pi gsd-pi\nRemove-Item \"$env:USERPROFILE\\.gsd\" -Recurse -Force -ErrorAction SilentlyContinue\n```\n\n## Quick Start\n\nNeed help choosing settings? Use the [GSD Pi web configurator](https://pi.opengsd.net/) to build a configuration in your browser.\n\n```bash\ngsd\n```\n\nRun the setup flow, choose your preferred model provider, and open a project directory. GSD stores project planning and runtime state in `.gsd/`.\n\nFor a full first-run walkthrough, see [Getting Started With gsd-pi](./docs/user-docs/getting-started.md).\n\n## Common Session Commands\n\nStart GSD from your shell:\n\n```bash\ngsd\n```\n\nThen use slash commands inside the GSD session:\n\n```text\n/gsd config\n/gsd auto\n/gsd quick \"Describe the task\"\n/gsd status\n```\n\n## What GSD Pi Does\n\n- Plans work into milestones, slices, and tasks.\n- Runs coding sessions with project context and verification steps.\n- Uses Git worktrees to isolate implementation work.\n- Tracks project state in a local database with markdown projections for review.\n- Supports extension-based tools and provider integrations.\n- Produces artifacts such as plans, summaries, validation notes, and reports.\n\n## Repository Layout\n\n| Path | Purpose |\n| --- | --- |\n| `src/` | Core runtime resources and bundled extensions |\n| `packages/` | Workspace packages used by the CLI, agent, TUI, RPC, and native bridge |\n| `native/` | Native engine packaging and platform binaries |\n| `studio/` | Desktop studio app |\n| `web/` | Web UI and API surface |\n| `docs/` | User and developer documentation |\n| `scripts/` | Build, release, migration, and maintenance scripts |\n\n## Development\n\n```bash\npnpm install --frozen-lockfile\npnpm run build\npnpm test\n```\n\nBefore opening a pull request, run:\n\n```bash\npnpm run verify:fast    # CI fast-gates locally (scans + policy)\npnpm run verify:pr      # Fast loop: build + typecheck + unit tests\npnpm run verify:merge   # Before PR review: full CI blocking parity\n```\n\n## Versioning\n\nThe active public baseline starts at `1.0.0`.\n\nHistorical tags and archived refs may exist for traceability, but active release notes should be written from this baseline forward.\n\n## Community\n\nJoin the [GSD Discord community](https://discord.gg/8NnkKuepmQ).\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=open-gsd%2Fgsd-pi&type=date&legend=top-left\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=open-gsd/gsd-pi&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=open-gsd/gsd-pi&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=open-gsd/gsd-pi&type=date&legend=top-left\" />\n </picture>\n</a>\n\n## License\n\nMIT\n","summary":"GSD Pi is a local-first command-line coding agent designed to plan, implement, verify, and track project work from your terminal. It combines a guided TUI agent workflow with milestone/slice/task automation, worktree-aware Git handling to keep changes reviewable, and a local `.gsd/` memory for storing requirements, decisions, plans, and validation evidence. The project also supports multi-provider model routing, allowing teams to use their preferred AI providers, and offers optional web/UI controls or extensibility via built-in and community extensions. It’s well-suited for developers and teams who want less manual coordination when moving from ideas to reviewed code using repeatable, trackable workflows.","description":"A powerful meta-prompting, context engineering and spec-driven development system that enables agents to work for long periods of time autonomously without losing track of the big picture","stars":384,"language":"TypeScript"},{"owner":"akitaonrails","repo":"ai-memory","url":"https://github.com/akitaonrails/ai-memory","readme":"<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/logo-dark.png\">\n    <img alt=\"ai-memory\" src=\"docs/logo.png\" width=\"480\">\n  </picture>\n</p>\n\n> Long-term memory for AI coding agents. Quit Claude Code mid-task,\n> start OpenAI Codex in the same directory, continue without\n> re-explaining the architecture, the failed approaches, or the open\n> questions.\n\n[![status: v0.2 milestones complete](https://img.shields.io/badge/status-v0.2--complete-green)](docs/ARCHITECTURE.md)\n[![Rust](https://img.shields.io/badge/rust-1.95+-blue)](rust-toolchain.toml)\n[![License](https://img.shields.io/badge/license-MIT-blue)](LICENSE)\n\n## Support Matrix\n\n| Area | Status | Notes |\n|---|---|---|\n| Linux | Supported | Primary Docker/server target and CI platform. Published Docker images support `linux/amd64` and `linux/arm64`. Native Arch/AUR packages include system and user systemd units. |\n| macOS | Supported | Workspace tests run in CI; native source builds are supported. Docker images run natively on Apple Silicon via the `linux/arm64` manifest. |\n| Windows via WSL2 | Supported | Use the Linux install path inside WSL2 when the agent runs there. |\n| Native Windows | Experimental | PowerShell wrapper is available. Claude Code uses Git Bash `.sh` hooks on native Windows; other script-hook agents use the current PowerShell defaults pending harness feedback. See [`docs/windows.md`](docs/windows.md). |\n| Claude Code | Supported | MCP config + lifecycle hooks. |\n| Codex | Supported | MCP config + lifecycle hooks. |\n| OpenCode | Supported | Remote MCP config + generated TypeScript plugin. |\n| Cursor | Supported | MCP config + lifecycle hooks. |\n| Gemini CLI | Supported | MCP config + lifecycle hooks. |\n| Oh My Pi / OMP | Supported | `pi` / `omp` aliases for MCP config + TypeScript extension. |\n| Claude Desktop | MCP-only | Uses `mcp-remote`; no lifecycle hooks. |\n| OpenClaw | Supported | MCP config + native plugin lifecycle hooks. |\n| Antigravity CLI | Supported | MCP config (`serverUrl`) + lifecycle hooks (`agy` alias). |\n| LLM providers | Supported | Anthropic, OpenAI, OpenAI OAuth/Codex, GitHub Copilot, Gemini, and OpenAI-compatible endpoints. |\n| Embedding providers | Supported | OpenAI, Voyage, and Google Gemini. |\n\n## What it is\n\nLLM coding agents lose all context when a session ends. ai-memory\ngives them a shared, persistent wiki: every prompt, tool call, and\ndecision is captured automatically; when a session ends, the relevant\npages get rewritten as a coherent narrative; when the next agent\nstarts (Claude Code, Codex, OpenCode, …) it sees a handoff with\n\"where you left off\" already prepended.\n\nThe wiki is plain markdown in a git repo - `grep`-able, openable in\nObsidian, backed up with `rsync`. No vector database to babysit, no\n`write_note` ceremony, no manual context-loading. The full design is\nin [`docs/ARCHITECTURE.md`](docs/ARCHITECTURE.md); the influences and\npriors are at the [bottom](#influences-and-prior-art).\n\n## Key features\n\n- **Zero-friction capture.** Lifecycle hooks fire-and-forget every\n  prompt + tool call + session boundary. You never type `write_note`.\n- **Cross-agent handoffs.** Quit Claude Code mid-task, start Codex\n  in the same directory hours later - the next agent sees a\n  \"where you left off\" block before its first prompt.\n- **Per-project isolation by construction.** Each project lives at\n  `<wiki_root>/<workspace_id>/<project_id>/…` keyed by stable UUIDs.\n  By default `workspace = \"default\"` and `project = basename($cwd)`.\n  Drop a [`.ai-memory.toml` marker file](docs/marker-file.md) in any\n  ancestor directory to override either or opt into repo-root project\n  identity — perfect for multi-client consultancies, work/personal split,\n  mono-repos, or linked git worktrees.\n  Same page path can exist in two projects without collision; a\n  rename is one column update; a purge is one `rm -rf`.\n- **Karpathy-style LLM wiki.** Pages are compiled from observations\n  at session-end (or PreCompact), not retrieved over raw logs.\n  Supersession chain + git-versioned markdown means you can\n  time-travel with `git log`.\n- **Built-in `/web` browser.** Read-only HTML UI for the wiki -\n  project list, folder tree, FTS5 search, markdown rendering, dark\n  mode. Mounted on the same axum server as MCP.\n- **Multi-agent + multi-machine ready.** Supported clients: Claude\n  Code, Codex, OpenCode, Cursor, Claude Desktop (via `mcp-remote`),\n  Gemini CLI, Antigravity CLI, OpenClaw, and Oh My Pi / OMP\n  (`pi` / `omp` aliases).\n  Server runs local (loopback) OR on a homelab box (LAN/VPN/cloud)\n  with bearer-token auth.\n- **Thin-client CLI.** `ai-memory status`, `bootstrap`, `purge-project`,\n  `rename-project`, `lint`, `embed`, `forget-sweep`, `backup` are\n  all HTTP clients of the running server - never touch SQLite or\n  wiki files directly. `status` also reports passive LLM/embedding\n  provider health from the last real provider call. Server is the\n  single source of truth.\n- **LLM is opt-in.** Zero-LLM mode still gives you FTS5 search +\n  rule-based summarisation. Add a provider when you want consolidated\n  pages and lint contradictions.\n\n## Use cases\n\n- **\"Quit at 4 PM, pick up at 9 AM in a different agent.\"** The\n  classic. SessionStart hook in the next agent (any of the\n  supported CLIs) prepends a typed handoff with the open questions,\n  next steps, and a session summary.\n- **\"What did we decide about X six weeks ago?\"** Type\n  `memory_query X` from the agent (or `ai-memory search X` from a\n  terminal) - FTS5 over the wiki. Pages are LLM-consolidated, so\n  the hit is a coherent decision page, not a raw chat log.\n- **\"Remember this permanently.\"** When something is worth keeping\n  beyond auto-captured session logs - a decision, a convention, a\n  gotcha - tell the agent \"save a permanent note that we standardised\n  on Postgres for X\" or \"annotate this as a project rule\" and it calls\n  `memory_write_page` to write a durable, git-versioned wiki page. From\n  a terminal it's `ai-memory write-page --path decisions/0007-db.md\n  --title \"Standardised on Postgres\" --body \"...\" --pinned` (`--pinned`\n  exempts it from the decay sweep). Unlike a handoff (single-use) or an\n  auto-synthesised session page (rewritten on consolidation), a\n  write-page note is yours: it shows up in `memory_query`, renders in\n  `/web`, and stays until you change it.\n- **\"This new project has months of history before ai-memory.\"**\n  `cd /path/to/my-project && ai-memory bootstrap` collects\n  `git log`, README, `docs/`, module headers, project rules and\n  one-shot-summarises them into seed wiki pages. Future sessions\n  build on top.\n- **\"Run one ai-memory for the whole household.\"** Stand the server\n  up on a homelab box at `0.0.0.0:49374` with a bearer token; every\n  laptop/desktop talks to it. Per-cwd routing keeps each project's\n  pages cleanly separated; the `/web` UI is reachable from a\n  browser anywhere on the LAN.\n- **\"Audit what landed before sharing with a teammate.\"** Browse\n  the wiki at `http://<server>:49374/web` - HTTP Basic dialog if\n  auth is on, paste the token as password. Per-project tree view,\n  rendered markdown, supersession chain visible per page.\n- **\"Drop an experiment, keep the rest.\"**\n  `ai-memory purge-project --project experimental --confirm`.\n  Atomic: that project's DB rows cascade away, its wiki subdir gets\n  `rm -rf`'d, every sibling project is untouched by construction.\n\n## Quick start\n\n### Arch Linux (AUR)\n\nFor native Arch installs, use the AUR packages. They install\n`/usr/bin/ai-memory`, packaged hook sources, and both system-level and\nuser-level systemd units.\n\n```bash\nyay -S ai-memory-bin    # prebuilt Linux x86_64/aarch64 binary\nyay -S ai-memory        # builds from source\n```\n\nSingle-user workstation:\n\n```bash\nmkdir -p ~/.config/ai-memory ~/.local/share/ai-memory\nai-memory --data-dir ~/.local/share/ai-memory \\\n  --config ~/.config/ai-memory/config.toml init\nsystemctl --user enable --now ai-memory.service\nai-memory install-mcp --client claude-code --apply\nai-memory install-hooks --agent claude-code --apply\n```\n\nSystem service installs use `/var/lib/ai-memory` and `/etc/ai-memory/` via the\npackaged unit. Full user-service, system-service, auth, and provider setup is in\n[`docs/install.md#arch-linux-native-packages-aur`](docs/install.md#arch-linux-native-packages-aur).\n\n### Docker\n\nYou need: Docker + an agent CLI (Claude Code, Codex, OpenCode, OMP, Cursor,\nAntigravity CLI, or anything else that speaks MCP).\n\nThe published Docker image includes `linux/amd64` and `linux/arm64` variants,\nso Apple Silicon Macs and ARM64 Linux hosts can pull `akitaonrails/ai-memory`\nwithout `--platform linux/amd64` emulation.\n\nThe default quick-start has **no authentication** - the server binds\nto loopback only, so on a single-user laptop nothing else can reach\nit. Adding a bearer token is a one-line change once you're ready to\nexpose the server on the LAN; see [Security](#security) below.\n\n```bash\n# 1. Install the ai-memory CLI wrapper (a ~3 KB shell script that\n#    runs the binary inside docker with your $HOME mounted). This is\n#    the only thing that needs to live on the host filesystem.\nmkdir -p ~/.local/bin\ncurl -fsSL https://raw.githubusercontent.com/akitaonrails/ai-memory/main/bin/ai-memory \\\n    -o ~/.local/bin/ai-memory\nchmod +x ~/.local/bin/ai-memory\n# Most distros put ~/.local/bin on PATH automatically. If `which\n# ai-memory` comes up empty, add this to ~/.bashrc / ~/.zshrc:\n#     export PATH=\"$HOME/.local/bin:$PATH\"\n\n# 2. Start the server. `--restart unless-stopped` makes it come back\n#    on docker daemon restart and on machine boot (provided your\n#    docker service is enabled at boot — `sudo systemctl enable\n#    docker` on most distros). Loopback-only bind (`127.0.0.1:49374`)\n#    so nothing outside this machine can reach it. Omit the LLM /\n#    EMBEDDING lines for zero-LLM mode — FTS5 search still works\n#    without any keys.\ndocker run -d --name ai-memory \\\n    --restart unless-stopped \\\n    -p 127.0.0.1:49374:49374 \\\n    -v ai-memory-data:/data \\\n    -e AI_MEMORY_LLM_PROVIDER=anthropic \\\n    -e ANTHROPIC_API_KEY=sk-ant-... \\\n    -e AI_MEMORY_EMBEDDING_PROVIDER=openai \\\n    -e OPENAI_API_KEY=sk-... \\\n    akitaonrails/ai-memory:latest\n\n# 3. Wire your agent CLI in two commands. The wrapper takes care of\n#    mounts + auto-detecting ~/.claude/settings.json. Re-run with\n#    `--agent codex`, `--agent opencode`, `--agent gemini-cli`,\n#    `--agent omp`/`pi`, `--client cursor`, `--client gemini-cli`, etc.\n#    for additional agents; full list in docs/install.md.\nai-memory install-mcp   --client claude-code --apply\nai-memory install-hooks --agent  claude-code --apply\n```\n\nOn Linux/macOS, that's it. Start a Claude Code session as usual - every\nprompt and tool call now lands in ai-memory, and the next session you\nopen in this project will see a handoff with where you left off.\n\nThe `install-mcp` / `install-hooks` commands use\n`AI_MEMORY_SERVER_URL` / `AI_MEMORY_AUTH_TOKEN` when set; otherwise\nthey default to `http://127.0.0.1:49374` (matching the server above)\nand no bearer token. If hooks are installed after an ai-memory MCP\nentry already exists, `install-hooks` reuses that endpoint so a remote\nMCP setup cannot silently regenerate loopback-only hooks. Both commands\nare idempotent - re-runs replace ai-memory's entry, preserve every\nother server / hook you have configured, and write a timestamped\n`.bak-<ts>` next to the file before each modifying write. The hook\nscripts are staged into `~/.local/share/ai-memory/hooks/<agent>/`\nautomatically; re-running overwrites them so future image updates ship\nupdated hooks. Drop `--apply` to print the snippet instead of mutating.\n\nThe Docker wrapper also bridges thin-client commands such as\n`ai-memory status` and `ai-memory bootstrap` back to the host's\nloopback server. With the local Docker quick start above, no\n`AI_MEMORY_SERVER_URL` override is needed.\n\nTo remove ai-memory later, run `ai-memory uninstall --apply` from the\nsame host environment. It removes ai-memory-owned config entries and\ngenerated plugin files only after matching their ai-memory signatures;\nuse `--mcp-url` if you installed MCP with a custom endpoint, and\n`--mcp-name` only when you need to narrow removal to one matching entry.\n\n### Install Notes\n\n- **Windows:** use the Linux path inside WSL2, or the native Windows wrapper\n  from PowerShell/cmd. Native Claude Code uses Git Bash `.sh` hooks; other\n  script-hook agents use PowerShell defaults. Do not mix path worlds. See\n  [`docs/windows.md`](docs/windows.md).\n- **Docker compose:** `docker compose -f docker/docker-compose.yml up -d`\n  is supported; agent setup is the same as step 3 above.\n- **Remote server:** set `AI_MEMORY_SERVER_URL=http://<server-ip>:49374`\n  and `AI_MEMORY_AUTH_TOKEN=<token>` on the client before installing\n  MCP/hooks. Explicit `--server-url` flags still work, but are no longer\n  required when the env vars are set. Any non-loopback server should use\n  bearer auth.\n- **Upgrades:** run `ai-memory upgrade` to refresh the wrapper, image,\n  and staged hook scripts. Redeploy remote servers separately.\n\nFor Codex, OpenCode, OMP, Cursor, Claude Desktop, Gemini CLI, Antigravity CLI,\nOpenClaw, curl-based hook installs, source builds, CLI env vars, and the full\nsubcommand reference, see [`docs/install.md`](docs/install.md).\n\n## Security\n\nLoopback-only (`127.0.0.1:49374`) with no auth is the default because\nit is safe for a single-user laptop: no process outside the machine can\nreach the server.\n\nEnable bearer auth when the server is exposed beyond loopback, when\nuntrusted local processes share the machine, or when the data dir holds\nsensitive project history:\n\n```bash\nTOKEN=$(ai-memory generate-auth-token)\n\ndocker run -d --name ai-memory \\\n    --restart unless-stopped \\\n    -p 0.0.0.0:49374:49374 \\\n    -v ai-memory-data:/data \\\n    -e AI_MEMORY_AUTH_TOKEN=\"$TOKEN\" \\\n    -e AI_MEMORY_ALLOWED_HOSTS=\"<server-ip>,localhost,127.0.0.1\" \\\n    akitaonrails/ai-memory:latest\n\nai-memory install-mcp   --client claude-code --apply \\\n    --server-url \"http://<server-ip>:49374/mcp\" --auth-token \"$TOKEN\"\nai-memory install-hooks --agent  claude-code --apply \\\n    --server-url \"http://<server-ip>:49374\" --auth-token \"$TOKEN\"\n```\n\nBearer auth protects `/mcp`, `/hook`, `/handoff`, `/admin/*`, and\n`/web/*`. Browser access to `/web` uses HTTP Basic auth with the token\nas the password. Non-loopback binds should also set\n`AI_MEMORY_ALLOWED_HOSTS` to guard against DNS rebinding.\n\n**Want HTTPS?** ai-memory deliberately does not terminate TLS itself —\nthe right answer is a battle-tested reverse proxy in front of it.\n[`docs/https-via-proxy.md`](docs/https-via-proxy.md) is the deployment\nguide, with copy-paste docker compose templates in\n[`docker/compose.tls.caddy.yml`](docker/compose.tls.caddy.yml) (Caddy\nwith Let's Encrypt or internal CA) and\n[`docker/compose.tls.cloudflared.yml`](docker/compose.tls.cloudflared.yml)\n(Cloudflare Tunnel — no open ports). Both are recommended once you\nturn on multi-user or bind beyond loopback. The Quick Start happy\npath of single-user on loopback doesn't need TLS — that case is\ncalled out explicitly in the guide so you don't add ceremony where\nit doesn't earn its keep.\n\n**Multi-user attribution (v0.8, optional).** When more than one human\nshares a server, ai-memory can attribute each write to a named user.\nThe bearer token continues to authenticate at the wire level; users\ncreated via `ai-memory user add` get their own tokens that resolve to\ntheir identity in audit logs (and, in subsequent milestones, page\nfrontmatter + the web UI). Data stays single-tenant — there is no\nRBAC. Existing single-user installs are not affected unless you opt\nin by setting `[auth].token_pepper` (auto-generated for new installs\nby `ai-memory init`). See [`docs/users.md`](docs/users.md) for the\nfull walkthrough and the four-rung auth ladder.\n\nSee [`docs/deploy.md`](docs/deploy.md) for the full homelab pattern\nwith bearer auth, host allowlisting, and TLS/reverse-proxy options.\n\n## Using Memory\n\nDay to day, you mostly do not think about ai-memory. Lifecycle hooks\ncapture prompts, tool calls, compaction checkpoints, and session\nboundaries. SessionStart hooks fetch pending handoffs before your first\nprompt in the next agent.\n\nUseful entry points:\n\n- Ask \"where did we leave off?\" to continue from the pending handoff.\n- Ask \"have we discussed X?\" or \"search memory for Y\" to query the wiki.\n- Ask \"catch me up\" for a prose digest of recent project activity.\n- Run `ai-memory bootstrap` once when adopting ai-memory in an existing\n  project with months of history.\n- Start the server with `--enable-web` and visit `/web` for a read-only\n  browser view of the markdown wiki. `--enable-web` also mounts a\n  read-only JSON frontend API at `/api/v1` (workspaces, projects, pages,\n  recent, briefing, search) so custom web UIs can read the memory without\n  opening SQLite or wiki files directly:\n\n  ```text\n  GET  /api/v1/workspaces\n  GET  /api/v1/projects?workspace=...\n  GET  /api/v1/workspaces/{workspace}/projects/{project}/pages\n  GET  /api/v1/workspaces/{workspace}/projects/{project}/pages/{path}\n  GET  /api/v1/workspaces/{workspace}/projects/{project}/recent?limit=...\n  GET  /api/v1/workspaces/{workspace}/projects/{project}/briefing?limit=...\n  GET  /api/v1/workspaces/{workspace}/overview?limit=...\n  GET  /api/v1/workspaces/{workspace}/projects/{project}/overview?limit=...\n  GET  /api/v1/search?q=...&workspace=...&project=...&limit=...\n  POST /api/v1/search   { \"q\": \"...\", \"scopes\": [{ \"workspace\": \"...\", \"project\": \"...\" }] }\n  ```\n\n  `overview` bundles the open handoff + briefing + memory-health for a workspace\n  or project in one call (the data a project overview screen needs).\n\n  **Full integration guide:** see [`docs/frontend-api.md`](docs/frontend-api.md)\n  for auth setup, response schemas, error model, limits/pagination,\n  custom-UI hosting, a worked `fetch`/`curl` example, and the canonical\n  source-of-truth files. Read that first if you're building a frontend.\n\n  To serve your own static frontend instead of the built-in UI, point\n  `--web-ui-dir` at the frontend's build output (same-origin with\n  `/api/v1`, `/mcp`, `/admin/*`, so the existing auth applies):\n\n  ```bash\n  ai-memory serve --transport http --bind 127.0.0.1:49374 \\\n    --enable-web --web-ui-dir ../ai-memory-ui/dist\n  ```\n\n  A reference implementation — a SolidJS knowledge browser with\n  screenshots and e2e tests — lives at\n  [djalmajr/ai-memory-ui](https://github.com/djalmajr/ai-memory-ui).\n\nInstall the routing snippet once so agents proactively call the right\nMCP tool for those prompts:\n\n```bash\nai-memory install-instructions\n```\n\nSee [`docs/usage.md`](docs/usage.md) for handoff examples, proactive\nquery routing, bootstrap details, web UI screenshots, and the raw-wiki\ninspection commands. CLI URL/auth configuration lives in\n[`docs/install.md`](docs/install.md#configuring-the-cli-url-and-auth).\n\n## LLM Providers\n\nai-memory runs without an LLM: hooks still capture sessions, search uses\nFTS5, and summaries fall back to rule-based output. Add an LLM provider\nwhen you want LLM consolidation (on PreCompact, on demand via\n`memory_consolidate`, or opt-in at session end with\n`AI_MEMORY_CONSOLIDATE_ON_SESSION_END`), richer linting, and bootstrap.\nSession end always writes a rule-based summary page + handoff either way.\n\nRecommended defaults:\n\n| Provider | Default | Use when |\n|---|---|---|\n| `anthropic` | `claude-haiku-4-5` | Best default for consolidation quality and rule classification. |\n| `anthropic-oauth` | `claude-sonnet-4-6` | Use a Claude Pro/Max subscription via `claude setup-token`, no API key. |\n| `openai` | `gpt-5.4-mini` | Cheaper and faster hosted option. |\n| `openai-oauth` | `gpt-5.5` | ChatGPT Pro/Plus/Codex backend via `ai-memory auth login openai-oauth`; no Platform API key. |\n| `copilot` | `gpt-5.5` | GitHub Copilot Chat backend via `ai-memory auth login copilot` or `COPILOT_GITHUB_TOKEN`; requires a Copilot subscription. |\n| `gemini` | `gemini-2.5-flash` | Google-hosted option with a generous free tier. |\n| `openai-compat` | no default | OpenRouter, Ollama, vLLM, LM Studio, and other compatible endpoints. |\n\n`openai-oauth` stores a refresh token in `<data_dir>/auth.json` and talks to\nthe ChatGPT/Codex Responses backend, not `api.openai.com`. For Docker quick\nstarts, run `ai-memory auth login openai-oauth` with the wrapper so the token\nlands in the same `ai-memory-data` volume as the server.\n\n`anthropic-oauth` hits the same `/v1/messages` endpoint as `anthropic` but\nauthenticates with an OAuth bearer token instead of an API key. Run\n`claude setup-token` once, then set `AI_MEMORY_LLM_PROVIDER=anthropic-oauth` and\n`ANTHROPIC_OAUTH_TOKEN=<token>` (or `CLAUDE_CODE_OAUTH_TOKEN`, which `claude\nsetup-token` writes automatically). No `ANTHROPIC_API_KEY` is needed.\n**⚠️ Unofficial and against Anthropic's usage policies — use at your own risk;\nit may get your account rate-limited or banned. See\n[the warning in `docs/install.md`](docs/install.md#anthropic-via-claude-subscription-oauth).**\n\n`copilot` stores a GitHub user token in the same auth file, exchanges it for a\nshort-lived Copilot API token via GitHub's `/copilot_internal/v2/token`, and\nuses the Copilot Chat endpoint with `vscode-chat` integration headers. You can\nalso set `COPILOT_GITHUB_TOKEN`, `GH_TOKEN`, or `GITHUB_TOKEN` on the server.\n\n> [!TIP]\n> **For the OAuth/subscription backends (`anthropic-oauth`, `openai-oauth`,\n> `copilot`), pick a small, fast model** via `AI_MEMORY_LLM_MODEL` — e.g.\n> `claude-haiku-4-5` or `gpt-5-mini`. ai-memory's LLM work (consolidation,\n> lint, explore) is summarisation, not hard reasoning, so a Haiku/mini-class\n> model is plenty and is much easier on subscription rate limits. Save the\n> high-effort thinking models for your coding agent.\n\nEmbeddings are optional and separate from the LLM provider. Set\n`AI_MEMORY_EMBEDDING_PROVIDER=openai`, `voyage`, `google`, or `gemini` when\nyou want vector reranking in addition to FTS5 + graph-neighbor retrieval.\n\nSee [`docs/install.md#llm-provider-tiers`](docs/install.md#llm-provider-tiers)\nfor env vars and Ollama/OpenRouter examples, and\n[`docs/llm-provider-comparison.md`](docs/llm-provider-comparison.md)\nfor the empirical model comparison.\n\n## Architecture\n\nOne Rust binary runs an MCP/HTTP server and owns one data directory:\n\n```text\n<data_dir>/\n├── wiki/    # markdown source of truth, git-versioned\n├── raw/     # immutable session log archive\n├── db/      # SQLite indexes, including FTS5 and embeddings\n├── models/  # reserved for local embedding models\n└── logs/    # rolling tracing output\n```\n\nHooks POST observations to the server. The server serializes writes\nthrough one SQLite writer, compiles session observations into markdown\npages, and serves retrieval through FTS5, graph-neighbor RRF, optional\nvector RRF, and bounded raw-observation fallback.\n\nSee [`docs/ARCHITECTURE.md`](docs/ARCHITECTURE.md) for the data-flow\ndiagram, crate breakdown, schema notes, and invariants.\n\n## Docs\n\n| File | What it is |\n|---|---|\n| [`docs/install.md`](docs/install.md) | **Installation cookbook.** Every agent CLI, every alternative (curl, source build, no-docker, no-auth), and the server-on-a-different-machine (homelab/LAN) walkthrough. Read after the Quick start if your setup doesn't match the happy path. |\n| [`docs/usage.md`](docs/usage.md) | Handoffs, proactive memory queries, routing snippet, web UI, raw-wiki inspection, and rules-vs-facts workflow. |\n| [`docs/marker-file.md`](docs/marker-file.md) | `.ai-memory.toml` workspace/project routing for multi-client trees, mono-repos, worktrees, and work/personal separation. |\n| [`docs/windows.md`](docs/windows.md) | Windows install modes: full WSL2, native Windows with Docker Desktop, native source builds, and current hook/MCP harness caveats. |\n| [`docs/mcp-install.md`](docs/mcp-install.md) | Per-client MCP and lifecycle notes (Cursor, Claude Desktop, Gemini CLI, Antigravity CLI, OpenClaw, OMP). |\n| [`docs/deploy.md`](docs/deploy.md) | Homelab deploy: bin/deploy, bearer-token auth, pointers to the TLS guide. |\n| [`docs/users.md`](docs/users.md) | **Multi-user attribution (v0.8).** Four-rung auth ladder, `ai-memory user add/list/expire/revive/rotate-token` walkthrough, backward-compat migration for pre-v0.8 installs, token storage rationale. |\n| [`docs/https-via-proxy.md`](docs/https-via-proxy.md) | **HTTPS via a reverse proxy.** When you need TLS (multi-user, non-loopback) and when you don't (loopback / stdio). Copy-paste docker compose templates for Caddy + Let's Encrypt, Caddy + internal CA (LAN-only), Cloudflare Tunnel (no open ports), and external cert files; plus native-Caddy + nginx recipes. The \"thinking you're secure when you're not\" failure modes explicitly called out. |\n| [`docs/lifecycle-ops.md`](docs/lifecycle-ops.md) | **Read before running purge / rename / backup / restore / reset.** Safety matrix for the state-touching commands, per-project disk layout (how isolation actually works), and operator workflows for \"fresh start\", \"snapshot before risky op\", \"drop one project\". |\n| [`docs/llm-provider-comparison.md`](docs/llm-provider-comparison.md) | Empirical notes behind the recommended LLM defaults. |\n| [`docs/ARCHITECTURE.md`](docs/ARCHITECTURE.md) | Operational summary: data flow, crate layout, cross-cutting invariants, schema. |\n| [`docs/design-decisions.md`](docs/design-decisions.md) | The full v1 spec. |\n| Research docs under `docs/` | Karpathy LLM Wiki notes, agentmemory / basic-memory / cognee deep-dives, lessons-learned from upstream issues. |\n\n## Influences and prior art\n\n- **[Karpathy LLM Wiki](https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f)** - the compile-not-retrieve pattern.\n- **[agentmemory](https://github.com/rohitg00/agentmemory)** - most of the right ideas; this project is the Rust successor.\n- **[basic-memory](https://github.com/basicmachines-co/basic-memory)** - the markdown-on-disk source-of-truth model.\n- **[cognee](https://github.com/topoteretes/cognee)** - pipeline composition and triplet embeddings.\n- **[A-MEM](https://arxiv.org/abs/2502.12110)** - Zettelkasten-style atomic notes with link evolution.\n\n## License\n\nMIT - see [LICENSE](LICENSE).\n\n## Acknowledgements\n\nThis codebase is being built collaboratively with Claude Code\n(Anthropic Claude Opus 4.7) following the plan documented in\n`docs/design-decisions.md`.\n","summary":"ai-memory provides long-term, persistent “wiki” memory for LLM coding agents so they don’t lose context when a session ends. It automatically captures prompts, tool calls, and decisions via agent lifecycle hooks, then rewrites the most relevant material into a coherent set of plain Markdown pages in a git-backed repository that’s easy to grep, open in Obsidian, and back up. The project supports cross-agent handoffs—switching between tools like Claude Code, Codex, Cursor, Gemini CLI, and others—by prepending a “where you left off” summary in the same workspace. It’s especially useful for developers and teams who frequently stop and resume coding sessions or use multiple agent tools across the same project, without manually writing notes or managing vector databases.","description":"Solution for long term memory for agent coding CLIs and to facilitate handoff between different agent vendors","stars":432,"language":"Rust"},{"owner":"scheidydude","repo":"codeindex","url":"https://github.com/scheidydude/codeindex","readme":"# codeindex\n\nRepo dependency analyzer with **blast-radius impact scoring** and **symbol indexing** for AI-assisted development.\n\nPoint it at any project — Python, JavaScript/TypeScript, Go, Ruby, Rust, Java, PHP, and more — and get:\n\n- A `codeindex.json` dependency index written directly into your repo\n- Per-file blast-radius scores (how many files break if this one changes)\n- A `symbolindex.json` symbol map so AI can find any function/class without scanning every file\n- Five ways to consume the data: CLI, markdown report, MCP server, pre-commit hook, CLAUDE.md injection\n- An interactive visualization UI (2D/3D graphs, dependency matrix, treemap)\n\nNo build step. No npm. Pure Python stdlib — zero required dependencies.\n\n---\n\n## Install\n\n```bash\npip install codeindex\n```\n\nOr from source:\n\n```bash\ngit clone https://github.com/scheidydude/codeindex\ncd codeindex\npip install -e .\n```\n\n---\n\n## Quickstart\n\n```bash\n# Build the dependency index\ncodeindex analyze ./myapp\n\n# Build the symbol index (where every function and class lives)\ncodeindex symbols ./myapp\n\n# See blast radius for a file before touching it\ncodeindex impact src/auth.py\n\n# Launch the visualization UI\ncodeindex serve --viz --repo ./myapp\nopen http://localhost:8080\n```\n\n---\n\n## Commands\n\n### `codeindex analyze`\n\n```bash\ncodeindex analyze [REPO_PATH] [--output PATH] [--watch]\n```\n\nAnalyzes the repo and writes `codeindex.json` to the repo root. Detects 12+ languages automatically.\n\n| Flag | Default | Description |\n|------|---------|-------------|\n| `REPO_PATH` | `.` | Path to repo root |\n| `--output` | `<repo>/codeindex.json` | Override output path |\n| `--watch` | off | Re-index on file changes (requires `watchdog`) |\n\n---\n\n### `codeindex symbols`\n\n```bash\ncodeindex symbols [REPO_PATH] [--output PATH] [--inline] [--index PATH]\n                  [--claude-md] [--claude-md-path PATH] [--all-symbols]\n```\n\nBuilds a symbol index — a map of every function, class, struct, and type to its exact file and line number. Lets AI tools (and humans) find any symbol in one lookup instead of scanning the entire repo.\n\n**Modes:**\n\n| Flag | Description |\n|------|-------------|\n| _(none)_ | Write a standalone `symbolindex.json` |\n| `--inline` | Embed symbols into each node in `codeindex.json` instead |\n| `--claude-md` | Append a compressed symbol summary to `CLAUDE.md` |\n\nBoth `--inline` and `--claude-md` can be combined in a single run.\n\n**Options:**\n\n| Flag | Default | Description |\n|------|---------|-------------|\n| `REPO_PATH` | `.` | Path to repo root |\n| `--output` | `<repo>/symbolindex.json` | Output path (standalone mode) |\n| `--index` | auto-discovered | Path to `codeindex.json` (for `--inline`) |\n| `--claude-md-path` | `<repo>/CLAUDE.md` | Override CLAUDE.md path |\n| `--all-symbols` | off | Include non-exported symbols in CLAUDE.md (default: exported only) |\n\n**Examples:**\n\n```bash\n# Standalone symbol index\ncodeindex symbols ./myapp\n\n# Embed into codeindex.json (one file for blast radius + symbols)\ncodeindex symbols ./myapp --inline\n\n# Write CLAUDE.md summary so Claude Code loads symbols automatically\ncodeindex symbols ./myapp --claude-md\n\n# All three at once\ncodeindex symbols ./myapp --inline --claude-md\n\n# Re-generate when code changes\ncodeindex symbols ./myapp --inline --claude-md\n```\n\n**Why it matters:** Claude Code and other AI tools normally scan every file to find a function definition. With a symbol index, Claude can load one file, do an O(1) lookup, and open only the relevant file — cutting token usage 60–90% on symbol-location tasks.\n\n**CLAUDE.md injection** is opt-in because it increases base context size on every prompt. Use it when symbol lookups are frequent in your workflow; skip it for simple tasks where the overhead outweighs the benefit.\n\n---\n\n### `codeindex impact`\n\n```bash\ncodeindex impact FILE [--index PATH] [--out FILE] [--json]\n```\n\nShows the blast-radius impact for a specific file: direct dependents, transitive dependents, blast score, and risk level.\n\n```\nImpact: src/auth.py\nBlast Score: 8.5  (2 direct · 7 transitive)  [HIGH]\n\nDirect dependents (2)\n  src/api.py\n  src/middleware.py\n\nTransitive dependents (5 additional)\n  src/main.py  ← src/api.py\n  src/app.py   ← src/middleware.py\n  ...\n\nRisk: HIGH — affects 7/42 files (16.7% of codebase)\n```\n\n**Blast score formula:** `direct + (0.5 × transitive)`\n\n| Flag | Description |\n|------|-------------|\n| `--index PATH` | Path to `codeindex.json` (auto-discovered if omitted) |\n| `--out FILE` | Write a markdown report to this file |\n| `--json` | Output raw JSON |\n\n---\n\n### `codeindex serve`\n\n```bash\ncodeindex serve --viz [--repo PATH] [--port PORT] [--watch]\ncodeindex serve --mcp\n```\n\n`--viz` launches an interactive visualization UI in your browser (5 modes: 2D force graph, 3D network, dependency matrix, treemap, infrastructure graph).\n\n`--mcp` starts a stdio MCP server that exposes codeindex tools directly to Claude and other MCP clients.\n\n**MCP tools:**\n\n| Tool | Description |\n|------|-------------|\n| `analyze_repo` | Build or refresh the dependency index |\n| `get_impact` | Blast-radius report for a file |\n| `get_dependencies` | imports + imported-by for a file |\n| `get_high_blast_files` | All files above a blast score threshold |\n| `build_symbol_index` | Build or refresh the symbol index |\n| `lookup_symbol` | Find where any function/class/type is defined (file + line) |\n\n**Claude Code MCP config** (`.claude/settings.json`):\n\n```json\n{\n  \"mcpServers\": {\n    \"codeindex\": {\n      \"command\": \"codeindex\",\n      \"args\": [\"serve\", \"--mcp\"]\n    }\n  }\n}\n```\n\n---\n\n### `codeindex lookup`\n\n```bash\ncodeindex lookup SYMBOL [--index PATH] [--json]\n```\n\nFinds where a function, class, struct, or other symbol is defined. O(1) lookup against `symbolindex.json` — no file scanning.\n\n```\n$ codeindex lookup compute_blast_radius\ncodeindex/impact.py:6  (function)\n\n$ codeindex lookup AuthService\nsrc/auth.py:44  (class)  methods: login, logout, refresh\n```\n\n| Flag | Description |\n|------|-------------|\n| `--index PATH` | Path to `symbolindex.json` (auto-discovered if omitted) |\n| `--json` | Output raw JSON |\n\n---\n\n### `codeindex dependencies`\n\n```bash\ncodeindex dependencies FILE [--index PATH] [--json]\n```\n\nShows what a file imports and what imports it, plus its blast score.\n\n```\n$ codeindex dependencies src/auth.py\nFile: src/auth.py  (blast score: 8.5)\n\nImports (3):\n  src/db.py\n  src/config.py\n  src/utils.py\n\nImported by (2):\n  src/api.py\n  src/middleware.py\n```\n\n| Flag | Description |\n|------|-------------|\n| `--index PATH` | Path to `codeindex.json` (auto-discovered if omitted) |\n| `--json` | Output raw JSON |\n\n---\n\n### `codeindex high-blast`\n\n```bash\ncodeindex high-blast [--threshold N] [--index PATH] [--json]\n```\n\nLists all files whose blast score exceeds the threshold, sorted by score descending. Useful for identifying the riskiest files before a refactor.\n\n```\n$ codeindex high-blast --threshold 5\nFiles with blast score ≥ 5.0  (3 found)\n\n  13.0  src/db.py          (12d / 2t)\n   8.5  src/auth.py        (3d / 7t)\n   5.5  src/config.py      (5d / 1t)\n```\n\n`d` = direct dependents · `t` = transitive dependents\n\n| Flag | Default | Description |\n|------|---------|-------------|\n| `--threshold N` | `5` | Minimum blast score to include |\n| `--index PATH` | auto-discovered | Path to `codeindex.json` |\n| `--json` | off | Output raw JSON |\n\n---\n\n### `codeindex install-hook`\n\n```bash\ncodeindex install-hook [--repo PATH] [--threshold N] [--strict] [--remove]\n```\n\nInstalls a git pre-commit hook that warns when staged files exceed the blast score threshold.\n\n| Flag | Default | Description |\n|------|---------|-------------|\n| `--threshold N` | `10` | Blast score above which to warn |\n| `--strict` | off | Block the commit instead of just warning |\n| `--remove` | — | Uninstall the hook |\n\n---\n\n## Using codeindex in another repo with Claude\n\nThree workflows, ordered by automation level.\n\n### Workflow 1 — MCP server (recommended for active coding)\n\nClaude gets symbol lookup, dependency, and impact tools it calls automatically. No extra prompting needed.\n\n**One-time setup:**\n```bash\ncd /your/other/repo\ncodeindex analyze .\ncodeindex symbols .\n```\n\nRegister the MCP server with Claude Code using `claude mcp add`. Use `--scope project` to limit it to this repo, or `--scope global` to use it everywhere:\n\n```bash\n# Project-scoped (recommended — stored in .claude/settings.json)\nclaude mcp add --scope project codeindex -- /path/to/codeindex serve --mcp\n\n# Global (available in all repos)\nclaude mcp add --scope global codeindex -- /path/to/codeindex serve --mcp\n```\n\nFind the full path to your codeindex binary with `which codeindex`, then substitute it above.\n\n```bash\n# Example with conda install\nclaude mcp add --scope project codeindex -- /opt/homebrew/Caskroom/miniforge/base/bin/codeindex serve --mcp\n```\n\nVerify it registered:\n```bash\nclaude mcp list\n```\n\n> **Note:** Do not use `\"command\": \"codeindex\"` with a bare name — Claude Code does not inherit your shell PATH, so the binary won't be found unless you use the absolute path.\n\nClaude now has all 6 MCP tools available in every session. When it needs to find `processPayment`, it calls `lookup_symbol(\"processPayment\")` and gets `src/billing.py:142` back in one shot — no file scanning.\n\n**Keep the index fresh:**\n```bash\n# Auto-rebuild on file changes (leave running in a terminal)\ncodeindex symbols . --watch\n```\n\n---\n\n### Workflow 2 — CLAUDE.md injection (best for repos you revisit often)\n\nSymbol table is embedded in `CLAUDE.md` so it loads into every session automatically — no tool call needed at all.\n\n```bash\ncd /your/other/repo\ncodeindex symbols . --claude-md\n```\n\nThis upserts a `symbolindex` code fence into `CLAUDE.md`. Every Claude Code session in that repo loads it at startup. Claude can answer \"where is `X` defined?\" from context alone with zero tool calls.\n\n**Tradeoff:** adds ~500–2000 tokens to every prompt depending on repo size. Worth it for repos where symbol lookups are frequent; skip it for repos where you mostly write new code.\n\n**Keep it fresh:**\n```bash\n# Re-run after significant refactors\ncodeindex analyze . && codeindex symbols . --claude-md\n```\n\n---\n\n### Workflow 3 — Hybrid (large repos)\n\nFor large repos where the `--claude-md` section would be too large, use the MCP server for lookups and add a short hint to `CLAUDE.md` so Claude reaches for the tool first:\n\n```bash\ncodeindex analyze .\ncodeindex symbols .\n```\n\nThen add to `CLAUDE.md`:\n```markdown\n## Codeindex\nSymbol index: `symbolindex.json` — use the `lookup_symbol` MCP tool before grepping for any function or class.\nDependency index: `codeindex.json` — use `get_impact` before modifying high-blast files.\n```\n\nThis costs almost no tokens but primes Claude to use the index rather than defaulting to grep.\n\n---\n\n### CLI quick reference for human use\n\nThe same data available via MCP is also accessible directly from the terminal:\n\n```bash\n# Find where a symbol is defined\ncodeindex lookup MyClassName\ncodeindex lookup process_payment --json\n\n# Show what a file imports and what depends on it\ncodeindex dependencies src/auth.py\n\n# List the riskiest files to change\ncodeindex high-blast --threshold 5\n\n# Blast-radius report before touching a file\ncodeindex impact src/auth.py\n```\n\n---\n\n### Which workflow to pick\n\n| Situation | Workflow |\n|-----------|----------|\n| Daily driver repo, active feature work | MCP server |\n| Medium repo, frequent symbol lookups | CLAUDE.md injection |\n| Large repo (1000+ files) | MCP server + short CLAUDE.md hint |\n| Quick one-off in an unfamiliar repo | `codeindex symbols . --claude-md`, delete after |\n| Terminal / scripting use | CLI commands (`lookup`, `dependencies`, `high-blast`) |\n\n---\n\n## Supported Languages\n\n| Language | Dependency analysis | Symbol extraction |\n|----------|--------------------|--------------------|\n| Python | AST imports, type detection | Functions, classes, methods (AST-precise) |\n| JavaScript / TypeScript | ES modules, `require()`, framework detection | Exported functions, classes, types, enums, consts |\n| Vue | SFC `<script>` imports | Exported symbols from `<script>` block |\n| Go | Package-level nodes, `import` blocks | Functions, structs, interfaces (exported flag) |\n| Ruby | `require`, `require_relative`, `autoload` | Classes, modules, methods |\n| Rust | `mod`, `use crate::` | `pub fn`, structs, enums, traits |\n| Java / Kotlin | FQN imports, wildcard imports | Classes, interfaces, methods |\n| PHP | PSR-4 namespace resolution | Classes, interfaces, functions |\n| CSS / SCSS / Less | `@import`, `@use`, `@forward` | — |\n| Docker | Services, `depends_on` edges | — |\n| CI/CD | GitHub Actions + GitLab CI jobs, `needs:` edges | — |\n| SQL / Prisma | Tables/models, foreign key edges | — |\n\n---\n\n## Output schemas\n\n### `codeindex.json`\n\n```json\n{\n  \"meta\": {\n    \"root\": \"myapp/\",\n    \"total_files\": 60,\n    \"total_loc\": 4085,\n    \"languages\": [\"python\", \"javascript\"]\n  },\n  \"nodes\": [\n    {\n      \"id\": \"src/auth.py\",\n      \"type\": \"module\",\n      \"language\": \"python\",\n      \"layer\": \"backend\",\n      \"loc\": 142,\n      \"imports\": [\"src/db.py\"],\n      \"imported_by\": [\"src/api.py\", \"src/middleware.py\"],\n      \"direct_dependents\": 2,\n      \"transitive_dependents\": 7,\n      \"blast_score\": 5.5,\n      \"symbols\": [\n        { \"name\": \"verify_token\", \"line\": 18, \"kind\": \"function\", \"exported\": true },\n        { \"name\": \"AuthService\",  \"line\": 44, \"kind\": \"class\",    \"exported\": true,\n          \"methods\": [\"login\", \"logout\", \"refresh\"] }\n      ]\n    }\n  ],\n  \"links\": [\n    { \"source\": \"src/api.py\", \"target\": \"src/auth.py\", \"weight\": 1, \"kind\": \"imports\" }\n  ]\n}\n```\n\nThe `symbols` field is only present when `codeindex symbols --inline` has been run.\n\n---\n\n### `symbolindex.json`\n\n```json\n{\n  \"meta\": {\n    \"generated\": \"2026-05-21\",\n    \"repo\": \"myapp/\",\n    \"total_symbols\": 312\n  },\n  \"symbols\": {\n    \"verify_token\": [\n      {\n        \"file\": \"src/auth.py\",\n        \"line\": 18,\n        \"kind\": \"function\",\n        \"exported\": true,\n        \"doc\": \"Verify a JWT and return the decoded payload.\"\n      }\n    ],\n    \"AuthService\": [\n      {\n        \"file\": \"src/auth.py\",\n        \"line\": 44,\n        \"kind\": \"class\",\n        \"exported\": true,\n        \"methods\": [\"login\", \"logout\", \"refresh\"]\n      }\n    ]\n  },\n  \"file_symbols\": {\n    \"src/auth.py\": [\n      { \"name\": \"verify_token\", \"line\": 18, \"kind\": \"function\", \"exported\": true },\n      { \"name\": \"AuthService\",  \"line\": 44, \"kind\": \"class\",    \"exported\": true,\n        \"methods\": [\"login\", \"logout\", \"refresh\"] }\n    ]\n  }\n}\n```\n\n**Lookup patterns:**\n\n- *\"Where is `verify_token` defined?\"* → `symbols[\"verify_token\"][0].file` + `.line` — O(1)\n- *\"What symbols live in `src/auth.py`?\"* → `file_symbols[\"src/auth.py\"]` — O(1)\n- *\"What's the blast radius of changing `verify_token`?\"* → cross-reference `codeindex.json` via the file\n\n---\n\n### CLAUDE.md symbol section\n\nWhen `--claude-md` is used, a compact section is upserted into `CLAUDE.md` bounded by HTML comment markers so re-runs update in place:\n\n```\n<!-- codeindex-symbols-start -->\n## Symbol Index\n_Generated by codeindex. Update: `codeindex symbols --claude-md`_\n\n```symbolindex\nsrc/auth.py: verify_token:fn:18 AuthService:cls:44[login,logout,refresh]\nsrc/db.py: connect:fn:12 query:fn:28 close:fn:55\n```\n<!-- codeindex-symbols-end -->\n```\n\nFormat per symbol: `name:kind_abbr:line[methods...]`\nKind abbreviations: `fn` function · `cls` class · `st` struct · `en` enum · `tr` trait · `if` interface · `ty` type · `co` const\n\n---\n\n## AI workflow comparison\n\n| Task | Without codeindex | With symbolindex.json |\n|------|-------------------|----------------------|\n| Find where `process_payment` is defined | Grep / scan ~200 files | Load 1 file, O(1) lookup |\n| Understand blast radius of a change | Manual tracing | `codeindex impact <file>` |\n| Load only relevant context | Full repo scan | File + line from symbol map |\n| Estimated token savings | baseline | **60–90% on symbol tasks** |\n\n---\n\n## Optional dependencies\n\n| Package | Purpose | Install |\n|---------|---------|---------|\n| `watchdog` | `--watch` file change detection | `pip install 'codeindex[watch]'` |\n| `PyYAML` | Better Docker Compose / CI YAML parsing | `pip install 'codeindex[yaml]'` |\n| `tomli` | Rust `Cargo.toml` on Python < 3.11 | `pip install 'codeindex[toml]'` |\n\n---\n\n## Requirements\n\n- Python 3.9+\n- A modern browser (for `--viz` mode)\n\n---\n\n## License\n\nApache 2.0 — free to use and build on; attribution required in derivative works and documentation. Copyright 2026 David Scheiderman.\n","summary":"codeindex is a pure-Python (stdlib-only) repo dependency analyzer that builds two artifacts for AI-assisted development: a `codeindex.json` dependency index and a `symbolindex.json` symbol map. It estimates per-file “blast-radius” impact scoring—how many files would break if a given file changes—while also indexing functions, classes, and other symbols with exact file/line locations for fast lookup. Developers and teams working across large, multi-language codebases (Python, JS/TS, Go, Rust, Java, PHP, and more) will benefit from reduced token-heavy repo scanning and clearer change-risk visibility. It’s designed to integrate via multiple consumption options including a CLI, reports, an MCP server, pre-commit hook workflows, CLAUDE.md injection, and an interactive visualization UI.","description":"Repo dependency analyzer with **blast-radius impact scoring** for AI-assisted development.","stars":252,"language":"Python"},{"owner":"haidang1810","repo":"md2html","url":"https://github.com/haidang1810/md2html","readme":"# md2html\n\n> **Your AI writes docs. md2html turns them into pages people actually read.**\n> A portable skill for Claude Code, Codex, Antigravity — or any AI agent — that turns long-form Markdown (plans, specs, system designs, RFCs, runbooks, postmortems, brainstorms, notes) into a single self-contained HTML page with sidebar TOC, Mermaid diagrams, step timelines, callouts, comparison cards, and a light/dark Claude-orange theme.\n\n[![License: MIT](https://img.shields.io/badge/license-MIT-D97757.svg)](LICENSE)\n[![Zero install](https://img.shields.io/badge/install-zero%20deps-success.svg)](#install)\n[![Multi-agent](https://img.shields.io/badge/works%20with-Claude%20%C2%B7%20Codex%20%C2%B7%20Antigravity-D97757.svg)](#install)\n[![Multi-language](https://img.shields.io/badge/lang-EN%20%C2%B7%20VI%20%C2%B7%20ZH%20%C2%B7%20JA%20%C2%B7%20KO%20%C2%B7%20%E2%80%A6-blue.svg)](#multi-language)\n\n<p align=\"center\">\n  <img src=\"docs/preview-light.png\" alt=\"md2html light theme preview\" width=\"49%\" />\n  <img src=\"docs/preview-dark.png\" alt=\"md2html dark theme preview\" width=\"49%\" />\n</p>\n\n## The problem\n\nYour AI just produced 2,000 words of system design. Beautiful logic, careful tradeoffs, three architecture options compared — and you can't bring yourself to read past section 2 because it's a monospace wall of text in a terminal scrollback. Same goes for the brainstorm doc you asked it for last week, the migration plan from this morning, the postmortem draft you've been ignoring. Nobody on the team will click your `plan.md` link either.\n\n## What this skill does\n\nYou type `/md2html anydoc.md`. Your agent reads the file, opens `template.html` + `components.md` from this repo, and writes one polished HTML file next to the source. No build step, no server, no Node, no Python.\n\nWorks on anything long-form your AI hands you:\n\n- **Plans** — multi-week roadmaps, migration steps, rollout strategies\n- **Specs** — feature specs, API specs, data-model designs\n- **System designs** — architecture docs, RFC-style proposals\n- **Runbooks** — operational procedures, incident response steps\n- **Postmortems** — incident reviews with timeline + root cause + action items\n- **Brainstorms** — option lists with rationale, idea dumps to organize\n- **Notes** — meeting notes, research summaries, anything else markdown\n\nIt's not a Markdown-to-HTML converter. **It's an analyzer.** The agent decides which sections become Mermaid diagrams, which become numbered step cards, which become pros-cons tables, which become collapsible \"deep dive\" panels. The result feels designed, not converted.\n\n## Why it's worth your `~/.claude/skills` slot\n\n- **Reads like a product page, not a spec.** Sidebar TOC with scroll-spy, anchor links on every heading, copy-to-clipboard on every code block, a scroll progress bar at the top. Things you'd build into a real docs site.\n- **Diagrams instead of paragraphs.** Three-hop flows automatically become Mermaid `flowchart` blocks. Trade-off discussions become side-by-side comparison cards. The agent decides — you don't write any of it.\n- **One file. Email it. Drop it in Slack. Open it on a plane.** Self-contained HTML with embedded CSS and theme JS. The only network request is the Mermaid CDN, and you can inline that too if you care.\n- **Zero install for your users.** No `npm install`. No Docker. The whole skill is three markdown/HTML files. Anyone with an AI agent and `git clone` can use it in under a minute.\n- **Portable across agents.** Works the same way in Claude Code, Codex CLI, Antigravity, Cursor, Continue.dev — anywhere an agent can read a file and write a file. No agent-specific code.\n- **Source language → output language, automatically.** Vietnamese spec? Vietnamese UI. Chinese plan? `目录` instead of `Contents`. Eight languages built into the label table; the agent fills in any other language by translation.\n- **Production-grade UX, not a weekend hack.** WCAG AA contrast, ≥ 40 px touch targets, `prefers-reduced-motion`, focus-visible rings, mobile TOC drawer with backdrop and ESC-to-close, skip-to-content link, full print stylesheet. Reviewed by a UI/UX engineer who didn't pull punches.\n\n## Install\n\n### Claude Code\n\n```bash\ngit clone https://github.com/haidang1810/md2html ~/.claude/skills/md2html\n```\n\nReload your session and run:\n\n```\n/md2html plan.md\n```\n\n→ outputs `plan.html` next to the source.\n\n### Codex CLI\n\n```bash\ngit clone https://github.com/haidang1810/md2html ~/.config/md2html\nmkdir -p ~/.codex/prompts\nln -s ~/.config/md2html/SKILL.md ~/.codex/prompts/md2html.md\n```\n\n(Codex's prompts directory has shifted across versions — adjust the symlink target if needed.)\n\n### Antigravity\n\n```bash\ngit clone https://github.com/haidang1810/md2html ~/projects/md2html\n```\n\nOpen Antigravity → **Settings → Custom Agents → New**, paste the contents of `SKILL.md`, and give the agent file-read access to `~/projects/md2html/`.\n\n### Any other AI agent\n\nIf the agent supports a system prompt or custom instructions AND can read/write local files, it can run this skill. Clone the repo to a stable path, paste `SKILL.md` into the agent's custom instructions, done.\n\n## Usage\n\n```\n/md2html plan.md                    # writes plan.html\n/md2html plan.md --out docs/x.html  # custom output path\n/md2html                            # prompts for a file\n```\n\nThe agent picks components based on what's actually in the doc:\n\n| What's in the Markdown                          | What you get                          |\n| ---                                             | ---                                   |\n| Numbered list of actions                        | Step cards with timeline rail         |\n| \"A calls B, B writes to DB\" prose               | Mermaid `flowchart`                   |\n| \"Pros / Cons\", \"Trade-offs of X\"                | Two-column pros-cons box              |\n| \"Option A vs B vs C\"                            | Comparison cards (with ★ Recommended) |\n| \"Don't do X\" / \"Must do Y\"                      | Danger / decision callout             |\n| Long appendix or code dump                      | Collapsible deep-dive panel           |\n| Key conclusion                                  | Accent-bordered highlight box         |\n\n## Multi-language\n\nUI labels follow the source. The label table covers **English, Vietnamese, Chinese (中文), Japanese (日本語), Korean (한국어), Spanish, French, German** out of the box. Anything else, the agent translates equivalently and sets `<html lang=\"...\">` plus the `--rec-label` CSS variable. RTL languages are LTR-only for now.\n\n## Demo\n\nSee [`examples/example-plan.md`](examples/example-plan.md) (Vietnamese source) → [`examples/example-plan.html`](examples/example-plan.html) (rendered). The screenshots at the top of this README are from a longer test spec — a game economy design doc.\n\n## Customize the theme\n\nAll visual tokens are CSS variables at the top of `template.html`. Change accent color, surface, fonts, radii by editing the `:root` and `[data-theme=\"dark\"]` blocks. Don't rename classes — `components.md` references them.\n\n```css\n:root {\n  --accent: #D97757;    /* Claude orange — change me */\n  --bg: #FAFAF7;\n  /* … */\n}\n```\n\n## Update\n\n```bash\ncd ~/.claude/skills/md2html && git pull\n```\n\n## Uninstall\n\n```bash\nrm -rf ~/.claude/skills/md2html\n```\n\n## What's in the box\n\n```\nmd2html/\n├── SKILL.md         # Instructions the agent loads on /md2html\n├── template.html    # HTML skeleton: CSS + Mermaid + theme JS\n├── components.md    # Component catalog the agent assembles from\n├── examples/        # Reference .md → .html pair (gold standard)\n├── docs/            # Screenshots for this README\n├── LICENSE\n└── README.md\n```\n\n## Roadmap\n\n- [ ] Inline Mermaid bundle (true offline mode)\n- [ ] More themes (forest green, midnight blue, paper)\n- [ ] Gantt / roadmap component\n- [ ] Auto-detect images in source and inline them\n- [ ] RTL language support (Arabic, Hebrew)\n\nPRs welcome — especially translation tables for additional languages and theme variants.\n\n## License\n\n[MIT](LICENSE) © 2026 [haidang1810](https://github.com/haidang1810)\n","summary":"md2html is a portable “docs-to-readable-page” skill that turns long-form Markdown produced by AI agents into a single polished, self-contained HTML document. Instead of doing a basic Markdown-to-HTML conversion, the agent analyzes the content to generate structured UX elements like a sidebar table of contents, Mermaid diagrams, step timelines, callouts, and comparison cards, styled with a light/dark theme. It also supports copyable code blocks and localized UI labels to match the source language. This is best for teams and developers who want AI-generated specs, system designs, runbooks, postmortems, and plans to be easy to share and actually read (e.g., in email, Slack, or offline) without requiring any build pipeline or dependencies.","description":"Your AI writes docs — md2html turns them into pages people actually read. A portable skill for Claude Code / Codex / Antigravity that converts long-form Markdown (plans, specs, system designs, RFCs, runbooks, postmortems, brainstorms) into self-contained HTML with Mermaid, timelines, callouts, TOC. Multi-language.","stars":351,"language":"HTML"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
</body>
