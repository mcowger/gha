* two billing methods. Elastic billing supports per-request billing / token billing / no billing / anonymous calls and **minimum request points** detection and other powerful features\n14. 🎉 **Innovative Model Caching**: Supports enabling model caching: i.e., under the same request parameter hash, if it has been requested before, it will directly return the cached result (hitting the cache will not be billed), reducing the number of requests. You can customize whether to cache models, cache time, multiple cache result numbers, and other advanced cache settings\n15. 🥪 **Additional Features** (Support Discontinued): 🍎 **AI Project Generator Function** / 📂 **Batch Article Generation Function** / 🥪 **AI Card Function** (Deprecated)\n16. 😎 **Excellent Channel Management**: Self-written excellent channel algorithm, supports ⚡ **multi-channel management**, supports 🥳**priority** setting for channel call order, supports 🥳**weight** setting for load balancing probability distribution of channels at the same priority, supports 🥳**user grouping**, 🥳**automatic retry on failure**, 🥳**model redirection**, 🥳**built-in upstream hiding**, 🥳**channel status management** and other powerful **enterprise-level functions**\n17. ⭐ **OpenAI API Distribution & Proxy System**: Supports calling various large models in **OpenAI API** standard format, integrates powerful channel management functions, only needs to deploy one site to achieve simultaneous development of B/C-end business💖\n18. 👌 **Quick Upstream Synchronization**: Channel settings, model market, price settings, and other settings can quickly synchronize with upstream sites, modify your site configuration based on this, quickly build your site, save time and effort, one-click synchronization, quick launch\n19. 👋 **SEO Optimization**: Supports SEO optimization, supports custom site name, site logo, and other SEO optimization settings to make search engines crawl faster, making your site stand out👋\n20. 🎫 **Multiple Redemption Code Vision)*\n7. Alibaba Tongyi Qwen\n8. Tencent Hunyuan\n9. Baichuan AI\n10. Moonshot AI (👉 OpenAI)\n11. DeepSeek AI (👉 OpenAI)\n12. ByteDance Skylark *(✅ Function Calling)*\n13. Groq Cloud AI\n14. OpenRouter (👉 OpenAI)\n15. 360 GPT\n16. LocalAI / Ollama (👉 OpenAI)\n\n## 👻 OpenAI Compatible API Proxy\n   - [x] Chat Completions _(/v1/chat/completions)_\n   - [x] Image Generation _(/v1/images)_\n   - [x] Model List _(/v1/models)_\n   - [x] Dashboard Billing _(/v1/billing)_\n\n\n## 📦 Deployment\n> [!TIP]\n> **After successful deployment, the admin account is `root`, with the default password `chatnio123456`**\n\n### ✨ Zeabur (One-Click)\n[![Deploy on Zeabur](https://zeabur.com/button.svg)](https://zeabur.com/templates/M86XJI)\n\n> Zeabur provides a certain free quota, you can use non-paid regions for one-click deployment, and also supports plan subscriptions and elastic billing for flexible expansion.\n> 1. Click `Deploy` to deploy, and enter the domain name you wish to bind, wait for the deployment to complete.\n> 2. After deployment is complete, please visit your domain name and log in to the backend management using the username `root` and password `chatnio123456`. Please follow the prompts to change the password in the chatnio backend in a timely manner.\n\n### 🐳 BTPanel (One-Click)\n\n1. Install Baota Panel by visiting [BTPanel](https://www.bt.cn/new/download.html) and install using the stable version script.\n2. Log in to the panel and click **Docker** on the left to enter Docker management.\n3. If prompted that Docker / Docker Compose is not installed, you can install according to the guide above.\n4. After installation is complete, enter **App Store**, search for `CoAI` and click **Install**.\n5. Configure basic application information such as your domain name, port, etc., and click **Confirm** (default configuration can be used).\n6. First-time installation may take 1-2 minutes to complete database initialization. If you encounter issues, please check the panel running logs for troubleshooting.\n7. Visit your configured domain or server `http://[ip]:[port]`, log in to the backend management using username `root` and password `chatnio123456`.\n\n### AlibabaCloud ComputeNest (One-Click)\n[![Deploy on AlibabaCloud ComputeNest International Edition](https://service-info-public.oss-cn-hangzhou.aliyuncs.com/computenest-en.svg)](https://computenest.console.aliyun.com/service/instance/create/ap-southeast-1?type=user&ServiceName=CoAI%20%20Community%20Edition)\n1. Access the CoAI service on [ComputeNest International Edition](https://computenest.console.aliyun.com/service/instance/create/ap-southeast-1?type=user&ServiceName=CoAI%20%20Community%20Edition). If you are in China, please visit [ComputeNest](https://computenest.console.aliyun.com/service/instance/create/default?type=user&ServiceName=CoAI社区版), and fill in the deployment parameters as prompted.\n2. Select the payment type, fill in the instance parameters and network parameters, and click **Next: Confirm Order**.\n3. After confirming the deployment parameters and checking the estimated price, click Create Now and wait for the service instance to be deployed.\n4. Click **Service Instance** on the left. After the service instance is deployed, click the instance ID to enter the details interface.\n5. Click the address in **Use Now** on the details interface to enter the CoAI interface. The default username is `root` and the password is `chatnio123456` to log in to the backend management.\n6. For more operation details and payment information, see：[Service Details](https://computenest.console.aliyun.com/service/detail/ap-southeast-1/service-27e11d3a5c9b40628505/1?type=user&isRecommend=true).\n\n\n### ⚡ Docker Compose Installation (Recommended)\n> [!NOTE]\n> After successful execution, the host machine mapping address is `http://localhost:8000`\n\n```shell\ngit clone --depth=1 --branch=main --single-branch https://github.com/coaidev/coai.git\ncd chatnio\ndocker-compose up -d # Run the service\n# To use the stable version, use docker-compose -f docker-compose.stable.yaml up -d instead\n# To use Watchtower for automatic updates, use docker-compose -f docker-compose.watch.yaml up -d instead\n```\n\nVersion update (_If Watchtower automatic updates are enabled, manual updates are not necessary_):\n```shell\ndocker-compose down \ndocker-compose pull\ndocker-compose up -d\n```\n\n> - MySQL database mount directory: ~/**db**\n> - Redis database mount directory: ~/**redis**\n> - Configuration file mount directory: ~/**config**\n\n### ⚡ Docker Installation (Lightweight runtime, commonly used for external _MYSQL/RDS_ services)\n> [!NOTE]\n> After successful execution, the host machine address is `http://localhost:8094`.\n> \n> To use the stable version, use `programzmh/chatnio:stable` instead of `programzmh/chatnio:latest`\n\n```shell\ndocker run -d --name chatnio \\\n   --network host \\\n   -v ~/config:/config \\\n   -v ~/logs:/logs \\\n   -v ~/storage:/storage \\\n   -e MYSQL_HOST=localhost \\\n   -e MYSQL_PORT=3306 \\\n   -e MYSQL_DB=chatnio \\\n   -e MYSQL_USER=root \\\n   -e MYSQL_PASSWORD=chatnio123456 \\\n   -e REDIS_HOST=localhost \\\n   -e REDIS_PORT=6379 \\\n   -e SECRET=secret \\\n   -e SERVE_STATIC=true \\\n   programzmh/chatnio:latest\n```\n\n> - *--network host* means using the host machine's network, allowing the Docker container to use the host's network. You can modify this as needed.\n> - SECRET: JWT secret key, generate a random string and modify accordingly\n> - SERVE_STATIC: Whether to enable static file serving (normally this doesn't need to be changed, see FAQ below for details)\n> - *-v ~/config:/config* mounts the configuration file, *-v ~/logs:/logs* mounts the host machine directory for log files, *-v ~/storage:/storage* mounts the directory for additional feature generated files\n> - MySQL and Redis services need to be configured. Please refer to the information above to modify the environment variables accordingly\n\nVersion update (_After enabling Watchtower, manual updates are not necessary. After execution, follow the steps above to run again_):\n\n```shell\ndocker stop chatnio\ndocker rm chatnio\ndocker pull programzmh/chatnio:latest\n```\n\n### ⚒ Compile and Install\n\n> [!NOTE]\n> After successful deployment, the default port is **8094**, and the access address is `http://localhost:8094`\n> \n> Config settings (~/config/**config.yaml**) can be overridden using environment variables. For example, the `MYSQL_HOST` environment variable can override the `mysql.host` configuration item\n\n```shell\ngit clone https://github.com/coaidev/coai.git\ncd chatnio\n\ncd app\nnpm install -g pnpm\npnpm install\npnpm build\n\ncd ..\ngo build -o chatnio\n\n# e.g. using nohup (you can also use systemd or other service manager)\nnohup ./chatnio > output.log & # using nohup to run in background\n```\n\n## 📦 Tech Stack\n\n- 🥗 Frontend: React + Redux + Radix UI + Tailwind CSS\n- 🍎 Backend: Golang + Gin + Redis + MySQL\n- 🍒 Application Technology: PWA + WebSocket\n\n## 🤯 Why Create This Project & Project Advantages\n\n- We found that most AIGC commercial sites on the market are frontend-oriented lightweight deployment projects with beautiful UI interface designs, such as the commercial version of [Next Chat](https://github.com/ChatGPTNextWeb/ChatGPT-Next-Web). Due to its personal privatization-oriented design, there are some limitations in secondary commercial development, presenting some issues, such as:\n  1. **Difficult conversation synchronization**, for example, requiring services like WebDav, high user learning costs, and difficulties in real-time cross-device synchronization.\n  2. **Insufficient billing**, for example, only supporting elastic billing or only subscription-based, unable to meet the needs of different users.\n  3. **Inconvenient file parsing**, for example, only supporting uploading images to an image hosting service first, then returning to the site to input the URL direct link in the input box, without built-in file parsing functionality.\n  4. **No support for conversation URL sharing**, for example, only supporting conversation screenshot sharing, unable to support conversation URL sharing (or only supporting tools like ShareGPT, which cannot promote the site).\n  5. **Insufficient channel management**, for example, the backend only supports OpenAI format channels, making it difficult to be compatible with other format channels. And only one channel can be filled in, unable to support multi-channel management.\n  6. **No API call support**, for example, only supporting user interface calls, unable to support API proxying and management.\n\n- Another type is API distribution-oriented sites with powerful distribution systems, such as projects based on [One API](https://github.com/songquanpeng/one-api).\nAlthough these projects support powerful API proxying and management, they lack interface design and some C-end features, such as:\n  1. **Insufficient user interface**, for example, only supporting API calls, without built-in user interface chat. User interface chat requires manually copying the key and going to other sites to use, which has a high learning cost for ordinary users.\n  2. **No subscription system**, for example, only supporting elastic billing, lacking billing design for C-end users, unable to meet different user needs, and not user-friendly in terms of cost perception for users without a foundation.\n  3. **Insufficient C-end features**, for example, only supporting API calls, not supporting conversation synchronization, conversation sharing, file parsing, and other functions.\n  4. **Insufficient load balancing**, the open-source version does not support the **weight** parameter, unable to achieve balanced load distribution probability for channels at the same priority ([New API](https://github.com/Calcium-Ion/new-api) also solves this pain point, with a more beautiful UI).\n\nTherefore, we hope to combine the advantages of these two types of projects to create a project that has both a powerful API distribution system and a rich user interface design,\nthus meeting the needs of C-end users while developing B-end business, improving user experience, reducing user learning costs, and increasing user stickiness.\n\nThus, **CoAI.Dev** was born. We hope to create a project that has both a powerful API distribution system and a rich user interface design, becoming the next-generation open-source AIGC project's one-stop commercial solution.\n\n\n## ❤ Donations\n\nIf you find this project helpful, you can give it a Star to show your support!\n","summary":"Chatnio (CoAI.Dev) is a comprehensive, one-stop business solution designed to provide a unified interface for multiple AI service providers, including LLMs, text-to-image models, and internet search engines. The platform features a highly customizable, cross-device interface with advanced Markdown support, PWA functionality, and a robust backend management system that handles user subscriptions, billing, and model configuration. It is an ideal choice for businesses and developers seeking to deploy a professional, feature-rich AI application that integrates seamlessly with diverse AI backends and file storage services.","description":"🚀 Next Gen Multi-tenant AI One-Stop Solution. Builtin Admin & Billing System. Enterprise-Grade Unified LLM Gateway Support for 200+ Models And 35+ Providers, Load Balacing w/ Priority-base Routing, Cost Management, Chat Share, Cloud Sync, Credit/Subscription Billing, All File Parsing, Web Search, Built-in Model Cache.","stars":9186,"language":"TypeScript"},{"owner":"Tencent","repo":"Hunyuan3D-1","url":"https://github.com/Tencent/Hunyuan3D-1","readme":"[English](README.md) | [简体中文](README_zh_cn.md)\n\n<!-- ## **Hunyuan3D-1.0** -->\n\n<p align=\"center\">\n  <img src=\"./assets/logo.png\"  height=200>\n</p>\n\n# Tencent Hunyuan3D-1.0: A Unified Framework for Text-to-3D and Image-to-3D Generation\n\n<div align=\"center\">\n  <a href=\"https://github.com/tencent/Hunyuan3D-1\"><img src=\"https://img.shields.io/static/v1?label=Code&message=Github&color=blue&logo=github-pages\"></a> &ensp;\n  <a href=\"http://3d-models.hunyuan.tencent.com\"><img src=\"https://img.shields.io/static/v1?label=Homepage&message=Tencent%20Hunyuan3D&color=blue&logo=github-pages\"></a> &ensp;\n  <a href=\"https://arxiv.org/pdf/2411.02293\"><img src=\"https://img.shields.io/static/v1?label=Tech Report&message=Arxiv&color=red&logo=arxiv\"></a> &ensp;\n  <a href=\"https://huggingface.co/Tencent/Hunyuan3D-1\"><img src=\"https://img.shields.io/static/v1?label=Checkpoints&message=HuggingFace&color=yellow\"></a> &ensp;\n  <a href=\"https://huggingface.co/spaces/Tencent/Hunyuan3D-1\"><img src=\"https://img.shields.io/static/v1?label=Demo&message=HuggingFace&color=yellow\"></a> &ensp;\n</div>\n\n\n## 🔥🔥🔥 News!!\n\n- Jul 26, 2025: 🤗 We release the first open-source, simulation-capable, immersive 3D world generation model, [HunyuanWorld-1.0](https://github.com/Tencent-Hunyuan/HunyuanWorld-1.0)!\n- Jun 13, 2025: 🤗 We release the first production-ready 3D asset generation model [Hunyuan3D 2.1](https://github.com/Tencent-Hunyuan/Hunyuan3D-2.1)!\n- Jan 21, 2025: 🤗 Enjoy exciting 3D generation on our website [Hunyuan3D Studio](https://3d.hunyuan.tencent.com)!\n- Jan 21, 2025: 🤗 Release inference code and pretrained models of [Hunyuan3D 2.0](https://huggingface.co/tencent/Hunyuan3D-2).\n- Jan 21, 2025: 🤗 Release Hunyuan3D 2.0. Please give it a try via [huggingface space](https://huggingface.co/spaces/tencent/Hunyuan3D-2) our [official site](https://3d.hunyuan.tencent.com)!\n\n- Nov 21, 2024: 🤗 We have introduced the new Baking module. Please give it a try!\n- Nov 20, 2024: 🤗 We have added a Chinese version of the README.\n- Nov 18, 2024: 🤗 Third-party developers have uploaded their ComfyUI. We appreciate their contributions! [[1]](https://github.com/jtydhr88/ComfyUI-Hunyuan3D-1-wrapper)[[2]](https://github.com/MrForExample/ComfyUI-3D-Pack)[[3]](https://github.com/TTPlanetPig/Comfyui_Hunyuan3D)\n- Nov 5, 2024: 🤗 We support demo running  image_to_3d generation now. Please check the [script](#using-gradio) below.\n- Nov 5, 2024: 🤗 We support demo running  text_to_3d generation now. Please check the [script](#using-gradio) below.\n\n\n## 📑 Open-source Plan\n\n- [x] Inference \n- [x] Checkpoints\n- [x] Baking\n- [ ] ComfyUI\n- [ ] Training\n- [ ] Distillation Version\n- [ ] TensorRT Version\n\n\n## **Abstract**\n<p align=\"center\">\n  <img src=\"./assets/teaser.png\"  height=450>\n</p>\n\nWhile 3D generative models have greatly improved artists' workflows, the existing diffusion models for 3D generation suffer from slow generation and poor generalization. To address this issue, we propose a two-stage approach named Hunyuan3D-1.0 including a lite version and a standard version, that both support text- and image-conditioned generation.\n\nIn the first stage, we employ a multi-view diffusion model that efficiently generates multi-view RGB in approximately 4 seconds. These multi-view images capture rich details of the 3D asset from different viewpoints, relaxing the tasks from single-view to multi-view reconstruction. In the second stage, we introduce a feed-forward reconstruction model that rapidly and faithfully reconstructs the 3D asset given the generated multi-view images in approximately 7 seconds. The reconstruction network learns to handle noises and in-consistency introduced by the multi-view diffusion and leverages the available information from the condition image to efficiently recover the 3D structure.\n\nOur framework involves the text-to-image model, i.e., Hunyuan-DiT, making it a unified framework to support both text- and image-conditioned 3D generation. Our standard version has 3x more parameters than our lite and other existing model. Our Hunyuan3D-1.0 achieves an impressive balance between speed and quality, significantly reducing generation time while maintaining the quality and diversity of the produced assets.\n\n\n## 🎉 **Hunyuan3D-1 Architecture**\n\n<p align=\"center\">\n  <img src=\"./assets/overview_3.png\"  height=400>\n</p>\n\n\n## 📈 Comparisons\n\nWe have evaluated Hunyuan3D-1.0 with other open-source 3d-generation methods, our Hunyuan3D-1.0 received the highest user preference across 5 metrics. Details in the picture on the lower left.\n\nThe lite model takes around 10 seconds to produce a 3D mesh from a single image, while the standard model takes roughly 25 seconds. The plot laid out in the lower right demonstrates that Hunyuan3D-1.0 achieves an optimal balance between quality and efficiency.\n\n<p align=\"center\">\n  <img src=\"./assets/radar.png\"  height=300>\n  <img src=\"./assets/runtime.png\"  height=300>\n</p>\n\n## Get Started\n\n#### Begin by cloning the repository:\n\n```shell\ngit clone https://github.com/tencent/Hunyuan3D-1\ncd Hunyuan3D-1\n```\n\n#### Installation Guide for Linux\n\nWe provide an env_install.sh script file for setting up environment. \n\n```\nconda create -n hunyuan3d-1 python=3.9 or 3.10 or 3.11 or 3.12\nconda activate hunyuan3d-1\n\npip3 install torch torchvision --index-url https://download.pytorch.org/whl/cu121\nbash env_install.sh\n\n# or\npip3 install -r requirements.txt --index-url https://download.pytorch.org/whl/cu121\npip3 install git+https://github.com/facebookresearch/pytorch3d@stable\npip3 install git+https://github.com/NVlabs/nvdiffrast\n```\n\nbecause of dust3r, we offer a guide:\n\n```\ncd third_party\ngit clone --recursive https://github.com/naver/dust3r.git\n\ncd ../third_party/weights\nwget https://download.europe.naverlabs.com/ComputerVision/DUSt3R/DUSt3R_ViTLarge_BaseDecoder_512_dpt.pth\n\n```\n\n<details>\n<summary>💡Other tips for envrionment installation</summary>\n    \nOptionally, you can install xformers or flash_attn to acclerate computation:\n\n```\npip install xformers --index-url https://download.pytorch.org/whl/cu121\n```\n```\npip install flash_attn\n```\n\nMost environment errors are caused by a mismatch between machine and packages. You can try manually specifying the version, as shown in the following successful cases:\n```\n# python3.9\npip install torch==2.0.1 torchvision==0.15.2 --index-url https://download.pytorch.org/whl/cu118 \n```\n\nwhen install pytorch3d, the gcc version is preferably greater than 9, and the gpu driver should not be too old.\n\n</details>\n\n#### Download Pretrained Models\n\nThe models are available at [https://huggingface.co/tencent/Hunyuan3D-1](https://huggingface.co/tencent/Hunyuan3D-1):\n\n+ `Hunyuan3D-1/lite`, lite model for multi-view generation.\n+ `Hunyuan3D-1/std`, standard model for multi-view generation.\n+ `Hunyuan3D-1/svrm`, sparse-view reconstruction model.\n\n\nTo download the model, first install the huggingface-cli. (Detailed instructions are available [here](https://huggingface.co/docs/huggingface_hub/guides/cli).)\n\n```shell\npython3 -m pip install \"huggingface_hub[cli]\"\n```\n\nThen download the model using the following commands:\n\n```shell\nmkdir weights\nhuggingface-cli download tencent/Hunyuan3D-1 --local-dir ./weights\n\nmkdir weights/hunyuanDiT\nhuggingface-cli download Tencent-Hunyuan/HunyuanDiT-v1.1-Diffusers-Distilled --local-dir ./weights/hunyuanDiT\n```\n\n#### Inference \nFor text to 3d generation, we supports bilingual Chinese and English, you can use the following command to inference.\n```python\npython3 main.py \\\n    --text_prompt \"a lovely rabbit\" \\\n    --save_folder ./outputs/test/ \\\n    --max_faces_num 90000 \\\n    --do_texture_mapping \\\n    --do_render\n```\n\nFor image to 3d generation, you can use the following command to inference.\n```python\npython3 main.py \\\n    --image_prompt \"/path/to/your/image\" \\\n    --save_folder ./outputs/test/ \\\n    --max_faces_num 90000 \\\n    --do_texture_mapping \\\n    --do_render\n```\nWe list some more useful configurations for easy usage:\n\n|    Argument        |  Default  |                     Description                     |\n|:------------------:|:---------:|:---------------------------------------------------:|\n|`--text_prompt`  |   None    |The text prompt for 3D generation         |\n|`--image_prompt` |   None    |The image prompt for 3D generation         |\n|`--t2i_seed`     |    0      |The random seed for generating images        |\n|`--t2i_steps`    |    25     |The number of steps for sampling of text to image  |\n|`--gen_seed`     |    0      |The random seed for generating 3d generation        |\n|`--gen_steps`    |    50     |The number of steps for sampling of 3d generation  |\n|`--max_faces_numm` | 90000  |The limit number of faces of 3d mesh |\n|`--save_memory`   | False   |module will move to cpu automatically|\n|`--do_texture_mapping` |   False    |Change vertex shadding to texture shading  |\n|`--do_render`  |   False   |render gif   |\n\n\nWe have also prepared scripts with different configurations for reference\n- Inference Std-pipeline requires 30GB VRAM (24G VRAM with --save_memory).\n- Inference Lite-pipeline requires 22GB VRAM (18G VRAM with --save_memory).\n- Note: --save_memory will increase inference time\n\n```bash\nbash scripts/text_to_3d_std.sh \nbash scripts/text_to_3d_lite.sh \nbash scripts/image_to_3d_std.sh \nbash scripts/image_to_3d_lite.sh \n```\n\nIf your gpu memory is 16G, you can try to run modules in pipeline seperately:\n```bash\nbash scripts/text_to_3d_std_separately.sh 'a lovely rabbit' ./outputs/test # >= 16G\nbash scripts/text_to_3d_lite_separately.sh 'a lovely rabbit' ./outputs/test # >= 14G\nbash scripts/image_to_3d_std_separately.sh ./demos/example_000.png ./outputs/test  # >= 16G\nbash scripts/image_to_3d_lite_separately.sh ./demos/example_000.png ./outputs/test # >= 10G\n```\n\n#### Baking\nWe have provided the texture baking module here. The matching and warpping processes are completed using Dust3R, which is licensed under the CC BY-NC-SA 4.0 license. Please note that this is a non-commercial license, and therefore, this module cannot be used for commercial purposes.\n\n```bash\nmkdir -p ./third_party/weights/DUSt3R_ViTLarge_BaseDecoder_512_dpt\nhuggingface-cli download naver/DUSt3R_ViTLarge_BaseDecoder_512_dpt \\\n    --local-dir ./third_party/weights/DUSt3R_ViTLarge_BaseDecoder_512_dpt\n\ncd ./third_party\ngit clone --recursive https://github.com/naver/dust3r.git\n\ncd ..\n```\n\nIf you download related code and weights, we list some additional arg:\n\n|    Argument        |  Default  |                     Description                     |\n|:------------------:|:---------:|:---------------------------------------------------:|\n|`--do_bake`  |   False   | baking multi-view images onto mesh   |\n|`--bake_align_times`  |   3   | alignment number of image and mesh |\n\n\nNote: If you need baking, please ensure that `--do_bake` is set to `True` and `--do_texture_mapping` is also set to `True`.\n\n```bash\npython main.py ... --do_texture_mapping --do_bake (--do_render)\n```\n\n#### Using Gradio\n\nWe have prepared two versions of multi-view generation, std and lite.\n\n```shell\n# std \npython3 app.py\npython3 app.py --save_memory\n\n# lite\npython3 app.py --use_lite\npython3 app.py --use_lite --save_memory\n```\n\nThen the demo can be accessed through http://0.0.0.0:8080. It should be noted that the 0.0.0.0 here needs to be X.X.X.X with your server IP.\n\n## Camera Parameters\n\nOutput views are a fixed set of camera poses:\n\n+ Azimuth (relative to input view): `+0, +60, +120, +180, +240, +300`.\n\n\n## Citation\n\nIf you found this repository helpful, please cite our report:\n```bibtex\n@misc{yang2024tencent,\n    title={Tencent Hunyuan3D-1.0: A Unified Framework for Text-to-3D and Image-to-3D Generation},\n    author={Xianghui Yang and Huiwen Shi and Bowen Zhang and Fan Yang and Jiacheng Wang and Hongxu Zhao and Xinhai Liu and Xinzhou Wang and Qingxiang Lin and Jiaao Yu and Lifu Wang and Zhuo Chen and Sicong Liu and Yuhong Liu and Yong Yang and Di Wang and Jie Jiang and Chunchao Guo},\n    year={2024},\n    eprint={2411.02293},\n    archivePrefix={arXiv},\n    primaryClass={cs.CV}\n}\n```\n","summary":"Tencent’s Hunyuan3D-1 is an open-source unified framework for generating 3D assets from either text prompts or single images, designed to be significantly faster and more robust than many existing single-view 3D diffusion approaches. It uses a two-stage pipeline: a multi-view diffusion stage to synthesize multi-view RGB images quickly, followed by a fast feed-forward reconstruction stage that turns those views into a coherent 3D model while correcting noise and inconsistencies. The project provides pretrained checkpoints and inference code (with options such as “baking” and demos via Hugging Face/Gradio), making it practical for creators and developers who want rapid text/image-to-3D generation without building the full training stack. It is especially useful for artists, prototypers, and research teams exploring efficient 3D generative workflows and conditioning strategies.","description":"Tencent Hunyuan3D-1.0: A Unified Framework for Text-to-3D and Image-to-3D Generation","stars":3476,"language":"Python"},{"owner":"MightyMoud","repo":"sidekick","url":"https://github.com/MightyMoud/sidekick","readme":"<div align=\"center\">\n  <div>\n    <img width=\"110px\" src=\"https://emoji.aranja.com/static/emoji-data/img-apple-160/1f91c-1f3fb.png\">\n    <img width=\"110px\" src=\"https://emoji.aranja.com/static/emoji-data/img-apple-160/1f91b-1f3fb.png\">\n  </div>\n\nBare metal to production ready in mins; imagine fly.io on your VPS\n\n  <div>\n    <img width=\"600px\" src=\"/demo/imgs/hero.png\">\n  </div>\n\n![GitHub](https://img.shields.io/github/license/mightymoud/sidekick)\n![GitHub go.mod Go version](https://img.shields.io/github/go-mod/go-version/mightymoud/sidekick)\n![GitHub tag (latest SemVer)](https://img.shields.io/github/v/tag/mightymoud/sidekick)\n\n</div>\n\n## Features\n\n- 👍 One command VPS setup (docker, traefik, sops, age)\n- 💻 deploy any application from a dockerfile\n- ✊ Zero downtime deployment\n- 🌏 High availability and load balancing\n- 🔒 Zero config SSL Certs\n- ✅ Connect domains or use sslip.io out of the box\n- 🔥 Built in integration with SOPS\n- 🛸 Escape the vendorlock forever\n\n## Motivation\n\nI'm tired of the complexity involved in hosting my side projects. While some platforms, like Fly.io, stand out in the crowded field of Heroku replacements, I believe a simple VPS can be just as effective. That's why I created Sidekick: to make hosting side projects as straightforward, affordable, and production-ready as possible. You'll be surprised how much traffic a $8/month instance on DigitalOcean can handle.\n\n## Installation\n\nUsing brew:\n\n```bash\nbrew install sidekick\n```\n\nNOTE: Sidekick uses `brew` later on to handle installing `sops` on your local. So `brew` is a requirement at this point. Sidekick will throw an error if `brew` is not found. You can install `brew` from [here](https://brew.sh/).\n\n## Usage\n\nSidekick helps you along all the steps of deployment on your VPS. From basic setup to zero downtime deploys, we got you! ✊\n\nFirst you need a VPS with Ubuntu LTS. I recommend DigitalOcean. Hetzner also gets very good reviews. You can host your own silicon too. As long as you have a public IP address you can use Sidekick.\n\nJust make sure the following is true:\n\n- VPS running Ubuntu - LTS recommended\n- SSH Key available on your machine to login to VPS.\n\nThat's it!\n\n### VPS Setup\n\n  <div align=\"center\" >\n    <img width=\"600px\" src=\"/demo/imgs/init.png\">\n  </div>\n\nFirst you need to setup your VPS. To do this you need to run:\n\n```bash\nsidekick init\n```\n\nThen you need to enter the following:\n\n- IP Address of your VPS\n- An email address to use for setting up SSL certs\n\nAfter that Sidekick will setup many things on your VPS - Usually takes around 2 mins.\nIf you run this command once more and enter a different IP Address, Sidekick will warn you that you are overriding the current config with a prompt.\n\nYou can use flags instead. Read more [in the docs](https://www.sidekickdeploy.com/docs/command/init/).\n\n<details>\n  <summary>What does Sidekick do when I run this command?</summary>\n  \n* Login with `root` user\n* Make a new user `sidekick` and grant sudo access\n* Logout from `root` and login with `sidekick`\n* Disable login with `root` user - security best practice\n* Update and upgrade your Ubuntu system\n* Install `sops` and copy over the public key to your sidekick config file\n* Use `age` to make secret and public keys to use later for encrypting env file.\n* Send public key back to host machine to be used later for encryption\n* Install Docker\n* Add user sidekick to docker group\n* Setup Traefik and SSL certs on your VPS\n</details>\n\n<details>\n  <summary>Which SSH key will Sidekick use to login?</summary>\n\nSidekick will look up the default keys in your default .ssh directory in the following order:\n\n- id_rsa.pub\n- id_ecdsa.pub\n- id_ed25519.pub\n\nSidekick will also get all keys from the `ssh-agent` and try them as well. If you want to use a custom key and not a default one, you would need to add the to your agent first by running `ssh-add KEY_FILE`\n\n</details>\n\nRead more details about flags and other options for this command [on the docs](https://www.sidekickdeploy.com/docs/command/init/)\n\n### Launch a new application\n\n  <div align=\"center\" >\n    <img width=\"600px\" src=\"/demo/imgs/launch.png\">\n  </div>\n\nIn your application folder, make sure you have a working `Dockerfile` that you can build and run. Also make sure you know at which port your app is expecting to receive traffic.\n\nThen run:\n\n```bash\nsidekick launch\n```\n\nThen you need to enter the following:\n\n- Url friendly name of your app - if you opt to use `sslip.io` domain for testing this would be your subdomain\n- HTTP exposed port for your app to get requests - Sidekick will scan your docker file to try to extract this number and default it.\n- Domain at which you want this application to be reachable - If you choose your own domain make sure to point the domain to your VPS IP address; otherwise we default to `sslip.io` domain so you can play around.\n- If you have any `env` file with secrets in it. Sidekick will attempt to find `.env` file in the root of your folder. Sidekick will use `sops` to encrypt your env file and inject the values securely at run time.\n\nShould take around 2 more mins to be able to visit your application live on the web if all goes well.\n\n<details>\n  <summary>What does Sidekick do when I run this command</summary>\n  \n* Build your docker image locally for linux\n* Move the docker image to your VPS directly\n* Encrypt your env file, if available and push it to your VPS\n* Use sops to decrypt your env file and start and env with the values injected\n* Spin up your docker image using docker compose and route traffic to it using Traefik on the specified port\n</details>\n\n### Deploy a new version\n\n  <div align=\"center\" >\n    <img width=\"600px\" src=\"/demo/imgs/deploy.png\">\n  </div>\nWith your application deployed, it's super simple to deploy a new version.\n\nAt any point any time you need to only run:\n\n```bash\nsidekick deploy\n```\n\nThat's all. It won't take long, we use cache from earlier docker images, your latest version should be up soon.\nSidekick will deploy the new version without any downtime - you can see more in the source code.\nThis command will also do a couple of things behind the scenes. You can check that below\n\n<details>\n  <summary>What does Sidekick do when I run this command</summary>\n  \n* Build your docker image locally for linux\n* Compare your latest env file checksum for changes from last time you deployed your application.\n* If your env file has changed, sidekick will re-encrypt it and replace the encrypted.env file on your server.\n* Deploy the new version with zero downtime deploys so you don't miss any traffic. \n</details>\n\n### Deploy a preview environment/app\n\n  <div align=\"center\" >\n    <img width=\"600px\" src=\"/demo/imgs/preview.png\">\n  </div>\nSidekick also allows you to deploy preview apps at any point from your application. Preview apps are attached to your commit hash and require a clean git tree before you can initiate them. \nOnce you have a clean git tree, you can run the following command to deploy a preview app:\n\n```bash\nsidekick deploy preview\n```\n\n<details>\n  <summary>What does Sidekick do when I run this command</summary>\n  \n* Build your docker image locally for linux\n* Tag the new image with the short checksum of your git commit\n* Encrypt your env file, if available and push it to your VPS\n* Add a new folder inside your app folder called \"preview\" where Sidekick will store and manage all your preview deployments\n* Deploy a new version of your app reachable on a short hash based subdomain\n</details>\n\n## Inspiration\n\n- https://fly.io/\n- https://kamal-deploy.org/\n\n## Vision\n\nSimple CLI tool that can help you:\n\n- Setup your VPS\n- Deploy all your side projects on a single VPS\n- Load balance multiple container per project\n- Deploy new versions with Zero downtime\n- Deploy preview environments with ease\n- Manage env secrets in a secure way\n- Connect any number of domains and subdomains to your projects with ease\n\n## Remove sidekick\n\nYou can easily remove sidekick if you hate it.\n\n```bash\nbrew uninstall sidekick\n```\n\n---\n\n## Roadmap\n\nI still have a couple more feature I want to add here. Also considering some of those to be on a paid version.\n\n- ✅ Preview env deployments\n- A way to deploy more complicated projects defined in docker compose file\n- Better zero downtime deploys with watchtower\n- Firewall setup\n- Managing multiple VPSs\n- Easy way to deploy databases with one command\n- TUI for monitoring your VPS\n- Streaming down compose logs - ala `fly logs`\n- Auto deploy on image push - to work with CICD better\n- Git hooks setup for managing migrations and other concerns\n","summary":"Sidekick is a command-line tool that transforms a standard Ubuntu VPS into a production-ready application hosting environment in minutes. It automates complex infrastructure tasks, including Docker configuration, load balancing with Traefik, zero-downtime deployments, and automatic SSL certificate management. Designed to provide a self-hosted alternative to platforms like Fly.io, it is ideal for developers looking to simplify the deployment of side projects while avoiding vendor lock-in and minimizing hosting costs.","description":"Bare metal to production ready in mins; your own fly server on your VPS.","stars":7406,"language":"Go"},{"owner":"Sinaptik-AI","repo":"pandas-ai","url":"https://github.com/Sinaptik-AI/pandas-ai","readme":"# ![PandasAI](assets/logo.png)\n\n[![Release](https://img.shields.io/pypi/v/pandasai?label=Release&style=flat-square)](https://pypi.org/project/pandasai/)\n[![CI](https://github.com/sinaptik-ai/pandas-ai/actions/workflows/ci-core.yml/badge.svg)](https://github.com/sinaptik-ai/pandas-ai/actions/workflows/ci-core.yml/badge.svg)\n[![CD](https://github.com/sinaptik-ai/pandas-ai/actions/workflows/cd.yml/badge.svg)](https://github.com/sinaptik-ai/pandas-ai/actions/workflows/cd.yml/badge.svg)\n[![Coverage](https://codecov.io/gh/sinaptik-ai/pandas-ai/branch/main/graph/badge.svg)](https://codecov.io/gh/sinaptik-ai/pandas-ai)\n[![Discord](https://dcbadge.vercel.app/api/server/kF7FqH2FwS?style=flat&compact=true)](https://discord.gg/KYKj9F2FRH)\n[![Downloads](https://static.pepy.tech/badge/pandasai)](https://pepy.tech/project/pandasai) [![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](https://opensource.org/licenses/MIT)\n[![Open in Colab](https://colab.research.google.com/assets/colab-badge.svg)](https://colab.research.google.com/drive/1ZnO-njhL7TBOYPZaqvMvGtsjckZKrv2E?usp=sharing)\n\nPandasAI is a Python library that makes it easy to ask questions to your data in natural language. It helps non-technical users to interact with their data in a more natural way, and it helps technical users to save time, and effort when working with data.\n\n# 🔧 Getting started\n\nYou can find the full documentation for PandasAI [here](https://docs.pandas-ai.com/).\n\n\n## 📚 Using the library\n\n### Python Requirements\n\nPython version `3.8+ <=3.11`\n\n### 📦 Installation\n\nYou can install the PandasAI library using pip or poetry.\n\nWith pip:\n\n```bash\npip install pandasai\npip install pandasai-litellm\n```\n\nWith poetry:\n\n```bash\npoetry add pandasai\npoetry add pandasai-litellm\n```\n\n### 💻 Usage\n\n#### Ask questions\n\n```python\nimport pandasai as pai\nfrom pandasai_litellm.litellm import LiteLLM\n\n# Initialize LiteLLM with your OpenAI model\nllm = LiteLLM(model=\"gpt-4.1-mini\", api_key=\"YOUR_OPENAI_API_KEY\")\n\n# Configure PandasAI to use this LLM\npai.config.set({\n    \"llm\": llm\n})\n\n# Load your data\ndf = pai.read_csv(\"data/companies.csv\")\n\nresponse = df.chat(\"What is the average revenue by region?\")\nprint(response)\n```\n\n---\n\nOr you can ask more complex questions:\n\n```python\ndf.chat(\n    \"What is the total sales for the top 3 countries by sales?\"\n)\n```\n\n```\nThe total sales for the top 3 countries by sales is 16500.\n```\n\n#### Visualize charts\n\nYou can also ask PandasAI to generate charts for you:\n\n```python\ndf.chat(\n    \"Plot the histogram of countries showing for each one the gdp. Use different colors for each bar\",\n)\n```\n\n![Chart](assets/histogram-chart.png?raw=true)\n\n#### Multiple DataFrames\n\nYou can also pass in multiple dataframes to PandasAI and ask questions relating them.\n\n```python\nimport pandasai as pai\nfrom pandasai_litellm.litellm import LiteLLM\n\n# Initialize LiteLLM with your OpenAI model\nllm = LiteLLM(model=\"gpt-4.1-mini\", api_key=\"YOUR_OPENAI_API_KEY\")\n\n# Configure PandasAI to use this LLM\npai.config.set({\n    \"llm\": llm\n})\n\nemployees_data = {\n    'EmployeeID': [1, 2, 3, 4, 5],\n    'Name': ['John', 'Emma', 'Liam', 'Olivia', 'William'],\n    'Department': ['HR', 'Sales', 'IT', 'Marketing', 'Finance']\n}\n\nsalaries_data = {\n    'EmployeeID': [1, 2, 3, 4, 5],\n    'Salary': [5000, 6000, 4500, 7000, 5500]\n}\n\nemployees_df = pai.DataFrame(employees_data)\nsalaries_df = pai.DataFrame(salaries_data)\n\n\npai.chat(\"Who gets paid the most?\", employees_df, salaries_df)\n```\n\n```\nOlivia gets paid the most.\n```\n\n#### Docker Sandbox\n\nYou can run PandasAI in a Docker sandbox, providing a secure, isolated environment to execute code safely and mitigate the risk of malicious attacks.\n\n##### Python Requirements\n\n```bash\npip install \"pandasai-docker\"\n```\n\n##### Usage\n\n```python\nimport pandasai as pai\nfrom pandasai_docker import DockerSandbox\nfrom pandasai_litellm.litellm import LiteLLM\n\n# Initialize LiteLLM with your OpenAI model\nllm = LiteLLM(model=\"gpt-4.1-mini\", api_key=\"YOUR_OPENAI_API_KEY\")\n\n# Configure PandasAI to use this LLM\npai.config.set({\n    \"llm\": llm\n})\n\n# Initialize the sandbox\nsandbox = DockerSandbox()\nsandbox.start()\n\nemployees_data = {\n    'EmployeeID': [1, 2, 3, 4, 5],\n    'Name': ['John', 'Emma', 'Liam', 'Olivia', 'William'],\n    'Department': ['HR', 'Sales', 'IT', 'Marketing', 'Finance']\n}\n\nsalaries_data = {\n    'EmployeeID': [1, 2, 3, 4, 5],\n    'Salary': [5000, 6000, 4500, 7000, 5500]\n}\n\nemployees_df = pai.DataFrame(employees_data)\nsalaries_df = pai.DataFrame(salaries_data)\n\npai.chat(\"Who gets paid the most?\", employees_df, salaries_df, sandbox=sandbox)\n\n# Don't forget to stop the sandbox when done\nsandbox.stop()\n```\n\n```\nOlivia gets paid the most.\n```\n\nYou can find more examples in the [examples](examples) directory.\n\n## 📜 License\n\nPandasAI is available under the MIT expat license, except for the `pandasai/ee` directory of this repository, which has its [license here](https://github.com/sinaptik-ai/pandas-ai/blob/main/ee/LICENSE).\n\nIf you are interested in managed PandasAI Cloud or self-hosted Enterprise Offering, [contact us](https://pandas-ai.com).\n\n## Resources\n\n- [Docs](https://docs.pandas-ai.com/) for comprehensive documentation\n- [Examples](examples) for example notebooks\n- [Discord](https://discord.gg/KYKj9F2FRH) for discussion with the community and PandasAI team\n\n## 🤝 Contributing\n\nContributions are welcome! Please check the outstanding issues and feel free to open a pull request.\nFor more information, please check out the [contributing guidelines](CONTRIBUTING.md).\n\n### Thank you!\n\n[![Contributors](https://contrib.rocks/image?repo=sinaptik-ai/pandas-ai)](https://github.com/sinaptik-ai/pandas-ai/graphs/contributors)\n","summary":"PandasAI is a Python library that integrates generative AI capabilities into data workflows, allowing users to query dataframes using natural language. It simplifies data analysis by automatically generating insights, producing visualizations, and performing complex operations across multiple datasets. This tool is ideal for non-technical users seeking intuitive data interaction as well as developers looking to accelerate their data exploration and reporting tasks.","description":"Chat with your database or your datalake (SQL, CSV, parquet). PandasAI makes data analysis conversational using LLMs and RAG.","stars":23567,"language":"Python"},{"owner":"XInTheDark","repo":"raycast-g4f","url":"https://github.com/XInTheDark/raycast-g4f","readme":"# Raycast-G4F (GPT4Free)\n\n**Use the powerful GPT-4, Llama-3 and more AI models on Raycast, for FREE! + Full support for custom APIs.**\n\nHomepage · [Privacy Policy](Privacy.md) · [FAQs](#FAQs) · [Discord][discord-invite]\n\n## Screenshots\n\n<img src=https://github.com/user-attachments/assets/1085b901-c72f-4bd9-9a37-473057e95393 width=400 alt=\"1\">\n<img src=https://github.com/user-attachments/assets/fb74f124-f1ac-4957-928e-363394ac0c3b width=400 alt=\"2\">\n<img src=https://github.com/user-attachments/assets/cf425e1a-8eaa-49d1-af31-e5fe8c6702db width=400 alt=\"3\">\n<img src=https://github.com/user-attachments/assets/7ab0da34-8f4d-4414-9548-901336e85588 width=400 alt=\"4\">\n\n## Getting Started\n\n\"If you like the extension, please consider giving it a ✨star✨ tysm!\" - the developer, probably\n\n### Prerequisites\n\n- Install the [Raycast app](https://raycast.com/).\n    - Currently, Raycast is only available for macOS. Windows support is [in progress](https://www.raycast.com/windows).\n- Install [Node.js](https://nodejs.org/).\n    - The minimum version recommended is `v20.18.1`. If you're using an older version, you may encounter issues.\n\n### Installation\n\nThis extension is currently not available on the Raycast Extension store, but\ninstallation from source is extremely simple.\n\n1. Download the source code from [the latest release](https://github.com/XInTheDark/raycast-g4f/releases/latest), or\n   clone the repository.\n2. Navigate to the directory, and open a Terminal window at the downloaded folder.\n3. Run `npm ci --production` to install required dependencies.\n4. (Optional) Run `pip3 install -r requirements.txt` to install Python dependencies. These are required for\n   some features, e.g. web search.\n5. Run `npm run dev` to build and import the extension.\n\nThe extension, and its full set of commands, should then show up in your Raycast app.\n\n#### Troubleshooting\n\nPlease open an issue if any unexpected problems occur during installation.\n\n### Updating\n\n#### Automatically\n\nThere is built-in support for updating within the extension itself! Simply run the \"Check for Updates\" command in the\nextension, and it will take care of the update process for you. Furthermore, the \"Automatically Check for Updates\"\nfeature is available in the preferences (enabled by default).\n\n#### Manually\n\nIn the command line, run `git pull`, `npm ci --production` and `npm run dev` (in that order).\n\nYou might want to update manually if the automatic update doesn't work (please also open a GitHub issue if this is the\ncase);\nupdating manually also allows you to fetch and view the latest changes to the source code.\n\n## Summary\n\n- ▶️️ Streaming support - see messages load in real-time, providing a seamless experience.\n- ⚡ Ask anything from anywhere - with 18 commands available, there's something for you no matter what you need.\n- 💪 Support for many providers & models (more info below!)\n- 💬 Chat command - interact with the AI in a conversation, and your chat history will be stored in the extension.\n- 🌐 Web search - let GPT search the web for the latest information.\n- 📄 File upload - you can upload image, video, audio and text files to the AI. (only available for a few providers, more\n  to come!)\n- 🎨 Image generation capabilities - imagine anything, and make it reality with state-of-the-art models.\n- ✏️ Custom AI Commands - create your own commands with custom prompts!\n\n## Providers & Models\n\n<details>\n\n<summary>List of built-in providers</summary>\n\n*Note: May not be up-to-date; please refer to the extension.*\n\n| Provider                     | Model                                   | Features | Status                      | Speed          | Rating and remarks by extension author                                                      |\n|------------------------------|-----------------------------------------|----------|-----------------------------|----------------|---------------------------------------------------------------------------------------------|\n| Nexra                        | gpt-4o (default)                        | ▶️       | ![Active][active-badge]     | Very fast      | 8.5/10, the best performing model.                                                          |\n| Nexra                        | gpt-4-32k                               |          | ![Active][active-badge]     | Medium         | 6.5/10, no streaming support but otherwise a great model.                                   |\n| Nexra                        | chatgpt                                 | ▶️       | ![Unknown][unknown-badge]   | Very fast      | 7.5/10                                                                                      |\n| Nexra                        | Bing                                    | ▶️       | ![Active][active-badge]     | Medium         | 8/10, GPT-4 based with web search capabilities.                                             |\n| Nexra                        | llama-3.1                               | ▶️       | ![Active][active-badge]     | Fast           | 7/10                                                                                        |\n| Nexra                        | gemini-1.0-pro                          | ▶️       | ![Active][active-badge]     | Fast           | 6.5/10                                                                                      |\n| DeepInfra                    | meta-llama-3.3-70b                      | ▶️       | ![Active][active-badge]     | Fast           | 8.5/10, recent model with large context size.                                               |\n| DeepInfra                    | meta-llama-3.2-90b-vision               | ▶️ 📄¹   | ![Active][active-badge]     | Fast           | 8/10, recent model with vision capabilities.                                                |\n| DeepInfra                    | meta-llama-3.2-11b-vision               | ▶️ 📄¹   | ![Active][active-badge]     | Very fast      | 7.5/10                                                                                      |\n| DeepInfra                    | meta-llama-3.1-405b                     | ▶️       | ![Inactive][inactive-badge] | Medium         | 8.5/10, state-of-the-art open model, suitable for complex tasks.                            |\n| DeepInfra                    | meta-llama-3.1-70b                      | ▶️       | ![Active][active-badge]     | Fast           | 8/10                                                                                        |\n| DeepInfra                    | meta-llama-3.1-8b                       | ▶️       | ![Active][active-badge]     | Very fast      | 7.5/10                                                                                      |\n| DeepInfra                    | llama-3.1-nemotron-70b                  | ▶️       | ![Active][active-badge]     | Fast           | 8/10                                                                                        |\n| DeepInfra                    | WizardLM-2-8x22B                        | ▶️       | ![Active][active-badge]     | Medium         | 7/10                                                                                        |\n| DeepInfra                    | DeepSeek-V2.5                           | ▶️       | ![Active][active-badge]     | Fast           | 7.5/10                                                                                      |\n| DeepInfra                    | Qwen2.5-72B                             | ▶️       | ![Active][active-badge]     | Medium         | 7.5/10                                                                                      |\n| DeepInfra                    | Qwen2.5-Coder-32B                       | ▶️       | ![Active][active-badge]     | Fast           | 7/10                                                                                        |\n| DeepInfra                    | QwQ-32B-Preview                         | ▶️       | ![Active][active-badge]     | Very fast      | 7.5/10                                                                                      |\n| Blackbox                     | custom model                            | ▶️       | ![Active][active-badge]     | Fast           | 7.5/10, very fast generation with built-in web search ability, but is optimized for coding. |\n| Blackbox                     | llama-3.1-405b                          | ▶️       | ![Active][active-badge]     | Fast           | 8.5/10                                                                                      |\n| Blackbox                     | llama-3.1-70b                           | ▶️       | ![Active][active-badge]     | Very fast      | 8/10                                                                                        |\n| Blackbox                     | llama-3.3-70b                           | ▶️       | ![Active][active-badge]     | Very fast      | 8/10                                                                                        |\n| Blackbox                     | gemini-1.5-flash                        | ▶️       | ![Active][active-badge]     | Extremely fast | 7.5/10                                                                                      |\n| Blackbox                     | qwq-32b-preview                         | ▶️       | ![Active][active-badge]     | Extremely fast | 6.5/10                                                                                      |\n| Blackbox                     | gpt-4o                                  | ▶️       | ![Active][active-badge]     | Very fast      | 7.5/10                                                                                      |\n| Blackbox                     | claude-3.5-sonnet                       | ▶️       | ![Active][active-badge]     | Fast           | 8.5/10                                                                                      |\n| Blackbox                     | gemini-pro                              | ▶️       | ![Active][active-badge]     | Fast           | 8/10                                                                                        |\n| DuckDuckGo                   | gpt-4o-mini                             | ▶️       | ![Active][active-badge]     | Extremely fast | 8/10, authentic GPT-4o-mini model with strong privacy.                                      |\n| DuckDuckGo                   | claude-3-haiku                          | ▶️️      | ![Active][active-badge]     | Extremely fast | 7/10                                                                                        |\n| DuckDuckGo                   | meta-llama-3.1-70b                      | ▶️️      | ![Active][active-badge]     | Very fast      | 7.5/10                                                                                      |\n| DuckDuckGo                   | mixtral-8x7b                            | ▶️️      | ![Active][active-badge]     | Extremely fast | 7.5/10                                                                                      |\n| BestIM                       | gpt-4o-mini                             | ▶️       | ![Inactive][inactive-badge] | Extremely fast | 8.5/10                                                                                      |\n| AI4Chat                      | gpt-4                                   |          | ![Active][active-badge]     | Very fast      | 7.5/10                                                                                      |\n| DarkAI                       | gpt-4o                                  | ▶️       | ![Active][active-badge]     | Very fast      | 8/10                                                                                        |\n| Mhystical                    | gpt-4-32k                               |          | ![Active][active-badge]     | Very fast      | 6.5/10                                                                                      |\n| PizzaGPT                     | gpt-4o-mini                             |          | ![Active][active-badge]     | Extremely fast | 7.5/10                                                                                      |\n| Meta AI                      | meta-llama-3.1                          | ▶️       | ![Active][active-badge]     | Medium         | 7/10, recent model with internet access.                                                    |\n| Replicate                    | mixtral-8x7b                            | ▶️       | ![Active][active-badge]     | Medium         | ?/10                                                                                        |\n| Replicate                    | meta-llama-3.1-405b                     | ▶️       | ![Active][active-badge]     | Medium         | ?/10                                                                                        |\n| Replicate                    | meta-llama-3-70b                        | ▶️       | ![Active][active-badge]     | Medium         | ?/10                                                                                        |\n| Replicate                    | meta-llama-3-8b                         | ▶️       | ![Active][active-badge]     | Fast           | ?/10                                                                                        |\n| Phind                        | Phind Instant                           | ▶️       | ![Active][active-badge]     | Extremely fast | 8/10                                                                                        |\n| Google Gemini                | auto (gemini-1.5-pro, gemini-1.5-flash) | ▶️ 📄    | ![Active][active-badge]     | Very fast      | 9/10, very good overall model but requires an API Key. (It's *free*, see the section below) |\n| Google Gemini (Experimental) | auto (changes frequently)               | ▶️ 📄    | ![Active][active-badge]     | Very fast      | -                                                                                           |\n| Google Gemini (Thinking)     | auto (changes frequently)               | ▶️ 📄    | ![Active][active-badge]     | Very fast      | -                                                                                           |\n| Custom OpenAI-compatible API | -                                       | ▶️       | ![Active][active-badge]     | -              | allows you to use any custom OpenAI-compatible API. [read more][local-api-help]             |\n\n▶️ - Supports streaming.\n\n📄 - Supports file upload.\n**Note**: By default, all providers support basic file upload functionality for text-based files, like .txt, .md, etc.\n\n*¹: Supports images only.*\n\n</details>\n\n### Custom APIs\n\nThe extension fully supports custom APIs! You can use any OpenAI-compatible API and connect it.\n\nGet started by reading the [help page][local-api-help].\n\n### Provider-specific notes\n\n- **Google Gemini**: An API Key is required to use this model. You can get one *completely for free*:\n\n1. Go to https://aistudio.google.com/app/apikey\n2. Sign in to your Google account if you haven't done so.\n3. Click on \"Create API Key\" and follow the instructions there.\n4. Copy the API Key and paste it into the corresponding box in the extension preferences.\n\nThe rate limit for Google Gemini is 1500 requests per day (as of the time of writing). This should be much more than\nenough for any normal usage.\nIf your use case needs an increased rate limit, you can even create multiple API Keys with different Google accounts;\nseparate them with commas in the preferences.\n\n- **Google Gemini**: This provider supports **File upload** functionality, as well as the **Ask About Screen Content**\n  command!\n  To upload a file in AI Chat, press Command-Enter or select \"Compose Message\" from the actions. Then, simply click on\n  the upload button to get started.\n\n### File Processing Backends\n\nThe extension supports multiple backends for processing uploaded files:\n\n- **Simple**: Basic text file processing for .txt, .md, .js, .py and other text-based files\n- **MarkItDown**: Advanced processing for PDF, Word, Excel, PowerPoint and other document formats\n  - Requires: `pip install markitdown`\n- **Docling**: State-of-the-art document processing with OCR support\n  - Requires: `pip install docling`\n\nYou can configure the file processing backend in Preferences → General → File Processing Backend.\n\n## Features\n\n> [!NOTE]\n> As of v5.0, the extension preferences are now found in the \"Preferences\" command. Please use this command to access\n> the preferences instead of the Raycast preferences.\n\n### Web Search\n\nLet GPT decide to search the web for information if it does not have enough knowledge or context. Uses DuckDuckGo\nsearch, fast and free.\n\n#### Usage\n\nEnabling web search is fast and easy. Go to the extension preferences, and the \"Web Search\" option will be available.\nThere are 4 options:\n\n- Disabled (default)\n- Automatic: Enable Web Search only in AI Chat. GPT will automatically decide when to use it.\n- Balanced: Use Web Search in every query for AI commands¹, and automatically in AI Chat. This is basically an extension\n  of the \"Automatic\" option.\n- Always: Always use Web Search for every query, both in AI Chat and in commands¹.\n\n*¹: Commands that support Web Search are: Ask AI, Ask About Selected Text, Explain. Other commands will not use Web\nSearch.*\n\nWeb Search is also available in the following commands:\n\n- Custom AI Commands: You can enable Web Search for each command individually.\n- AI Chat: You can enable Web Search for each chat individually.\n- AI Presets: You can enable Web Search for each preset individually.\n\n### Smart Chat Naming\n\nLet GPT automatically come up with a name for the current chat session after you send the first message. For example,\nthis is similar to what the ChatGPT web UI does.\n\n### Automatically Check for Updates\n\nLet the extension automatically check for updates every day. If a new version is available, you will be notified,\nalong with the option to update the extension with a single click.\n\n### Persistent Storage\n\nEnable more persistent storage of the extension's data, like AI Chat data or Custom Commands.\nThis will back up a copy of this data to files on your computer. Useful for saving large amounts of data.\n*Note: With this option off, your data is already well preserved. Do not enable this if you have sensitive data.*\n\n### Enable Cursor Icon\n\nShow a cursor icon when the response is loading - cosmetic option only.\n\n### Code Interpreter (BETA)\n\nAllows GPT to execute Python code locally. The model has been instructed to strictly only produce safe code,\nbut use at your own risk!\n\nOnly models with function calling capabilities support this feature. Currently, this includes only selected DeepInfra\nmodels.\n\n---\n\n## FAQs\n\n### Why is this extension not on the official Raycast store?\n\n- By default, this extension comes with a number of third-party providers which you can use for free. Raycast doesn't\n  like that because it's not possible to entirely verify the quality of these providers. (I do provide all the privacy\n  details [here](Privacy.md), though, and the extension is open-source.) ...and also because they're selling their own\n  AI.\n- Also, for me as a developer, publishing updates to the Raycast store is too slow and troublesome; I have to submit a\n  PR, wait a week for it to be reviewed, and possibly have it rejected. This is not a good experience for me or for\n  users.\n- Thus, the extension will have to be installed from source. Regarding this, I apologize as it's indeed more complicated\n  than downloading it from the store. I have tried my best to make the installation process quick and streamlined -\n  please do provide feedback on whether it was simple enough!\n\n### How does this extension compare to the paid Raycast AI? Why should I use this instead?\n\nI’ve noticed many users subscribing to Raycast AI, which is quite expensive, and then only using it for a few casual\nchats a day. Honestly, that’s unnecessary.\n**Here’s my honest suggestion: Everyone should first try out raycast-g4f.** Here’s why:\n\n- **Freedom**. You get to choose whatever provider/API to use, and can even add multiple at once. OpenAI, Anthropic,\n  Google…\n  basically any API out there. (“Can I use my OpenAI API Key in Raycast AI?” No, you can’t.) That also means your AI\n  access isn’t just locked inside Raycast. (“Can I use my Raycast AI in other apps?” No, you can’t.)\n- **Price**. This extension is completely free to use if you're sticking with the built-in providers. And if you want to\n  use\n  your own API, you pay only for what you use. That’s cheaper than raycast AI. There is no fixed price - you can choose\n  whatever provider you want. You can even run models locally and connect them to the extension.\n- **Privacy**. The extension is open source and it respects your privacy. Everything is stored only on your device, and\n  you\n  choose what data you send.\n\n### Why is the UI worse than Raycast AI?\n\n- Because the developer API that Raycast provides is limited, it's not possible to replicate the Raycast AI interface\n  exactly.\n  The components I can use are very simple, and a lot of the features in built-in Raycast commands are not available to\n  extension developers.\n- However, I've spent a lot of effort trying to make the UI really intuitive, and I'm always open to feedback on how to\n  improve it!\n\n### The extension isn't working! (e.g. I sent a message but there is no response)\n\n- Sometimes third party providers can be slow or unresponsive. If you're experiencing this issue, please try again in a\n  few minutes; or if the problem persists, please try switching to another provider.\n- If you've tried various providers and the issue still persists, please open an issue on GitHub!\n\n### How do I contribute to the extension?\n\n- I welcome all contributions! If you have an idea for a new feature, or if you've found a bug, please open an issue.\n- If you'd like to contribute code, please open a pull request, and I'll make sure to review it as soon as possible.\n\n---\n\n[![Powered by DartNode](https://dartnode.com/branding/DN-Open-Source-sm.png)](https://dartnode.com \"Powered by DartNode - Free VPS for Open Source\")\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/svg?repos=XInTheDark/raycast-g4f&type=Date)](https://star-history.com/#XInTheDark/raycast-g4f&Date)\n\n## License & Acknowledgements\n\nLicense: GPLv3. Full license is found in LICENSE.txt.\n\nThe code base is derived from [Raycast Gemini](\nhttps://github.com/raycast/extensions/tree/main/extensions/raycast-gemini) by Evan Zhou.\n\nThird-party libraries used for generation:\n\n- [g4f-image](https://www.npmjs.com/package/g4f-image)\n- [gemini-ai-sdk](https://www.npmjs.com/package/gemini-ai-sdk)\n\n*(Both packages are maintained by the extension author.)*\n\nSome of the code in this repository was inspired or ported from the\noriginal [gpt4free](https://github.com/xtekky/gpt4free) project (written in Python).\n\n\n[active-badge]: https://img.shields.io/badge/Active-brightgreen\n\n[inactive-badge]: https://img.shields.io/badge/Inactive-red\n\n[unknown-badge]: https://img.shields.io/badge/Unknown-grey\n\n[local-api-help]: https://github.com/XInTheDark/raycast-g4f/wiki/Help-page:-Using-Custom-APIs\n\n[discord-invite]: https://discord.gg/u3xTX79DkJ\n","summary":"Raycast-G4F is a Raycast extension that enables users to access powerful AI models, such as GPT-4 and Llama-3, directly within their macOS workflow for free. The extension supports a wide range of features, including real-time streaming, web search, image generation, and the ability to upload various file types for AI analysis. Furthermore, it offers extensive customization through personal prompts and support for custom APIs, making it an ideal tool for Raycast users looking to integrate advanced AI capabilities into their desktop productivity suite without subscription costs.","description":"Raycast extension to use GPT, Claude, Llama, and more... all for FREE! + Full support for custom APIs.","stars":1075,"language":"JavaScript"},{"owner":"google-ai-edge","repo":"mediapipe","url":"https://github.com/google-ai-edge/mediapipe","readme":"---\nlayout: forward\ntarget: https://developers.google.com/mediapipe\ntitle: Home\nnav_order: 1\n---\n\n----\n\n**Attention:** *We have moved to\n[https://developers.google.com/mediapipe](https://developers.google.com/mediapipe)\nas the primary developer documentation site for MediaPipe as of April 3, 2023.*\n\n![MediaPipe](https://developers.google.com/static/mediapipe/images/home/hero_01_1920.png)\n\n**Attention**: MediaPipe Solutions Preview is an early release. [Learn\nmore](https://developers.google.com/mediapipe/solutions/about#notice).\n\n**On-device machine learning for everyone**\n\nDelight your customers with innovative machine learning features. MediaPipe\ncontains everything that you need to customize and deploy to mobile (Android,\niOS), web, desktop, edge devices, and IoT, effortlessly.\n\n*   [See demos](https://goo.gle/mediapipe-studio)\n*   [Learn more](https://developers.google.com/mediapipe/solutions)\n\n## Get started\n\nYou can get started with MediaPipe Solutions by by checking out any of the\ndeveloper guides for\n[vision](https://developers.google.com/mediapipe/solutions/vision/object_detector),\n[text](https://developers.google.com/mediapipe/solutions/text/text_classifier),\nand\n[audio](https://developers.google.com/mediapipe/solutions/audio/audio_classifier)\ntasks. If you need help setting up a development environment for use with\nMediaPipe Tasks, check out the setup guides for\n[Android](https://developers.google.com/mediapipe/solutions/setup_android), [web\napps](https://developers.google.com/mediapipe/solutions/setup_web), and\n[Python](https://developers.google.com/mediapipe/solutions/setup_python).\n\n## Solutions\n\nMediaPipe Solutions provides a suite of libraries and tools for you to quickly\napply artificial intelligence (AI) and machine learning (ML) techniques in your\napplications. You can plug these solutions into your applications immediately,\ncustomize them to your needs, and use them across multiple development\nplatforms. MediaPipe Solutions is part of the MediaPipe [open source\nproject](https://github.com/google/mediapipe), so you can further customize the\nsolutions code to meet your application needs.\n\nThese libraries and resources provide the core functionality for each MediaPipe\nSolution:\n\n*   **MediaPipe Tasks**: Cross-platform APIs and libraries for deploying\n    solutions. [Learn\n    more](https://developers.google.com/mediapipe/solutions/tasks).\n*   **MediaPipe models**: Pre-trained, ready-to-run models for use with each\n    solution.\n\nThese tools let you customize and evaluate solutions:\n\n*   **MediaPipe Model Maker**: Customize models for solutions with your data.\n    [Learn more](https://developers.google.com/mediapipe/solutions/model_maker).\n*   **MediaPipe Studio**: Visualize, evaluate, and benchmark solutions in your\n    browser. [Learn\n    more](https://developers.google.com/mediapipe/solutions/studio).\n\n### Legacy solutions\n\nWe have ended support for [these MediaPipe Legacy Solutions](https://developers.google.com/mediapipe/solutions/guide#legacy)\nas of March 1, 2023. All other MediaPipe Legacy Solutions will be upgraded to\na new MediaPipe Solution. See the [Solutions guide](https://developers.google.com/mediapipe/solutions/guide#legacy)\nfor details. The [code repository](https://github.com/google/mediapipe/tree/master/mediapipe)\nand prebuilt binaries for all MediaPipe Legacy Solutions will continue to be\nprovided on an as-is basis.\n\nFor more on the legacy solutions, see the [documentation](https://github.com/google/mediapipe/tree/master/docs/solutions).\n\n## Framework\n\nTo start using MediaPipe Framework, [install MediaPipe\nFramework](https://developers.google.com/mediapipe/framework/getting_started/install)\nand start building example applications in C++, Android, and iOS.\n\n[MediaPipe Framework](https://developers.google.com/mediapipe/framework) is the\nlow-level component used to build efficient on-device machine learning\npipelines, similar to the premade MediaPipe Solutions.\n\nBefore using MediaPipe Framework, familiarize yourself with the following key\n[Framework\nconcepts](https://developers.google.com/mediapipe/framework/framework_concepts/overview.md):\n\n*   [Packets](https://developers.google.com/mediapipe/framework/framework_concepts/packets.md)\n*   [Graphs](https://developers.google.com/mediapipe/framework/framework_concepts/graphs.md)\n*   [Calculators](https://developers.google.com/mediapipe/framework/framework_concepts/calculators.md)\n\n## Community\n\n*   [Slack community](https://mediapipe.page.link/joinslack) for MediaPipe\n    users.\n*   [Discuss](https://groups.google.com/forum/#!forum/mediapipe) - General\n    community discussion around MediaPipe.\n*   [Awesome MediaPipe](https://mediapipe.page.link/awesome-mediapipe) - A\n    curated list of awesome MediaPipe related frameworks, libraries and\n    software.\n\n## Contributing\n\nWe welcome contributions. Please follow these\n[guidelines](https://github.com/google/mediapipe/blob/master/CONTRIBUTING.md).\n\nWe use GitHub issues for tracking requests and bugs. Please post questions to\nthe MediaPipe Stack Overflow with a `mediapipe` tag.\n\n## Resources\n\n### Publications\n\n*   [Bringing artworks to life with AR](https://developers.googleblog.com/2021/07/bringing-artworks-to-life-with-ar.html)\n    in Google Developers Blog\n*   [Prosthesis control via Mirru App using MediaPipe hand tracking](https://developers.googleblog.com/2021/05/control-your-mirru-prosthesis-with-mediapipe-hand-tracking.html)\n    in Google Developers Blog\n*   [SignAll SDK: Sign language interface using MediaPipe is now available for\n    developers](https://developers.googleblog.com/2021/04/signall-sdk-sign-language-interface-using-mediapipe-now-available.html)\n    in Google Developers Blog\n*   [MediaPipe Holistic - Simultaneous Face, Hand and Pose Prediction, on\n    Device](https://ai.googleblog.com/2020/12/mediapipe-holistic-simultaneous-face.html)\n    in Google AI Blog\n*   [Background Features in Google Meet, Powered by Web ML](https://ai.googleblog.com/2020/10/background-features-in-google-meet.html)\n    in Google AI Blog\n*   [MediaPipe 3D Face Transform](https://developers.googleblog.com/2020/09/mediapipe-3d-face-transform.html)\n    in Google Developers Blog\n*   [Instant Motion Tracking With MediaPipe](https://developers.googleblog.com/2020/08/instant-motion-tracking-with-mediapipe.html)\n    in Google Developers Blog\n*   [BlazePose - On-device Real-time Body Pose Tracking](https://ai.googleblog.com/2020/08/on-device-real-time-body-pose-tracking.html)\n    in Google AI Blog\n*   [MediaPipe Iris: Real-time Eye Tracking and Depth Estimation](https://ai.googleblog.com/2020/08/mediapipe-iris-real-time-iris-tracking.html)\n    in Google AI Blog\n*   [MediaPipe KNIFT: Template-based feature matching](https://developers.googleblog.com/2020/04/mediapipe-knift-template-based-feature-matching.html)\n    in Google Developers Blog\n*   [Alfred Camera: Smart camera features using MediaPipe](https://developers.googleblog.com/2020/03/alfred-camera-smart-camera-features-using-mediapipe.html)\n    in Google Developers Blog\n*   [Real-Time 3D Object Detection on Mobile Devices with MediaPipe](https://ai.googleblog.com/2020/03/real-time-3d-object-detection-on-mobile.html)\n    in Google AI Blog\n*   [AutoFlip: An Open Source Framework for Intelligent Video Reframing](https://ai.googleblog.com/2020/02/autoflip-open-source-framework-for.html)\n    in Google AI Blog\n*   [MediaPipe on the Web](https://developers.googleblog.com/2020/01/mediapipe-on-web.html)\n    in Google Developers Blog\n*   [Object Detection and Tracking using MediaPipe](https://developers.googleblog.com/2019/12/object-detection-and-tracking-using-mediapipe.html)\n    in Google Developers Blog\n*   [On-Device, Real-Time Hand Tracking with MediaPipe](https://ai.googleblog.com/2019/08/on-device-real-time-hand-tracking-with.html)\n    in Google AI Blog\n*   [MediaPipe: A Framework for Building Perception Pipelines](https://arxiv.org/abs/1906.08172)\n\n### Videos\n\n*   [YouTube Channel](https://www.youtube.com/c/MediaPipe)\n","summary":"MediaPipe is a comprehensive framework and suite of tools designed for building and deploying on-device machine learning pipelines across mobile, web, desktop, and IoT devices. The project provides pre-trained models and cross-platform APIs for common computer vision, audio, and text tasks, while offering specialized utilities like Model Maker and MediaPipe Studio for customizing and evaluating these models. It is an ideal solution for developers who want to integrate innovative AI features into their applications without managing the complexities of low-level machine learning infrastructure.","description":"Cross-platform, customizable ML solutions for live and streaming media.","stars":35462,"language":"C++"},{"owner":"dataease","repo":"dataease","url":"https://github.com/dataease/dataease","readme":"<p align=\"center\"><a href=\"https://dataease.cn\"><img src=\"https://dataease.oss-cn-hangzhou.aliyuncs.com/img/dataease-logo.png\" alt=\"DataEase\" width=\"300\" /></a></p>\n<h3 align=\"center\">人人可用的开源 BI 工具</h3>\n<p align=\"center\">\n  <a href=\"https://www.gnu.org/licenses/gpl-3.0.html\"><img src=\"https://img.shields.io/github/license/dataease/dataease?color=%231890FF\" alt=\"License: GPL v3\"></a>\n  <a href=\"https://app.codacy.com/gh/dataease/dataease?utm_source=github.com&utm_medium=referral&utm_content=dataease/dataease&utm_campaign=Badge_Grade_Dashboard\"><img src=\"https://app.codacy.com/project/badge/Grade/da67574fd82b473992781d1386b937ef\" alt=\"Codacy\"></a>\n  <a href=\"https://github.com/dataease/dataease\"><img src=\"https://img.shields.io/github/stars/dataease/dataease?color=%231890FF&style=flat-square\" alt=\"GitHub Stars\"></a>\n  <a href=\"https://github.com/dataease/dataease/releases\"><img src=\"https://img.shields.io/github/v/release/dataease/dataease\" alt=\"GitHub release\"></a>\n  <a href=\"https://gitee.com/fit2cloud-feizhiyun/DataEase\"><img src=\"https://gitee.com/fit2cloud-feizhiyun/DataEase/badge/star.svg?theme=gvp\" alt=\"Gitee Stars\"></a>\n  <a href=\"https://gitcode.com/feizhiyun/DataEase\"><img src=\"https://gitcode.com/feizhiyun/DataEase/star/badge.svg\" alt=\"GitCode Stars\"></a>\n</p>\n<p align=\"center\">\n  <a href=\"/README.md\"><img alt=\"中文(简体)\" src=\"https://img.shields.io/badge/中文(简体)-d9d9d9\"></a>\n  <a href=\"/docs/README.en.md\"><img alt=\"English\" src=\"https://img.shields.io/badge/English-d9d9d9\"></a>\n  <a href=\"/docs/README.zh-Hant.md\"><img alt=\"中文(繁體)\" src=\"https://img.shields.io/badge/中文(繁體)-d9d9d9\"></a>\n  <a href=\"/docs/README.ja.md\"><img alt=\"日本語\" src=\"https://img.shields.io/badge/日本語-d9d9d9\"></a>\n  <a href=\"/docs/README.pt-br.md\"><img alt=\"Português (Brasil)\" src=\"https://img.shields.io/badge/Português (Brasil)-d9d9d9\"></a>\n  <a href=\"/docs/README.ar.md\"><img alt=\"العربية\" src=\"https://img.shields.io/badge/العربية-d9d9d9\"></a>\n  <a href=\"/docs/README.de.md\"><img alt=\"Deutsch\" src=\"https://img.shields.io/badge/Deutsch-d9d9d9\"></a>\n  <a href=\"/docs/README.es.md\"><img alt=\"Español\" src=\"https://img.shields.io/badge/Español-d9d9d9\"></a>\n  <a href=\"/docs/README.fr.md\"><img alt=\"français\" src=\"https://img.shields.io/badge/français-d9d9d9\"></a>\n  <a href=\"/docs/README.ko.md\"><img alt=\"한국어\" src=\"https://img.shields.io/badge/한국어-d9d9d9\"></a>\n  <a href=\"/docs/README.id.md\"><img alt=\"Bahasa Indonesia\" src=\"https://img.shields.io/badge/Bahasa Indonesia-d9d9d9\"></a>\n  <a href=\"/docs/README.tr.md\"><img alt=\"Türkçe\" src=\"https://img.shields.io/badge/Türkçe-d9d9d9\"></a>\n</p>\n<p align=\"center\">\n  <a href=\"https://trendshift.io/repositories/1563\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/1563\" alt=\"dataease%2Fdataease | Trendshift\" style=\"wi
