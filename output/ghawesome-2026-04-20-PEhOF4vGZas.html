having a local, searchable archive of their bookmarks and a seamless way to integrate that knowledge into AI‑powered agents.","description":"Sync and locally store all of your X/Twitter bookmarks. Free and open source CLI for Mac.","stars":1542,"language":"TypeScript"},{"owner":"russelleNVy","repo":"three-man-team","url":"https://github.com/russelleNVy/three-man-team","readme":"<p align=\"center\">\n  <img src=\"assets/banner.png\" alt=\"Three Man Team\" width=\"100%\">\n</p>\n\n---\n\n## The Problem With AI Coding Tools\n\nAI coding tools are powerful but undisciplined. They read entire codebases when they\nneed one function. They add features nobody asked for. They drift mid-task. They burn\ntokens on every session doing work that didn't need to happen.\n\nThe solution isn't a better prompt. It's a process.\n\nThree Man Team gives you three agents with distinct jobs, clear handoffs, and rules that prevent the most expensive failure modes. The Architect plans and deploys. The Builder builds exactly what the brief says. The Reviewer doesn't pass work that isn't right.\n\n---\n\n## Why Three Agents\n\nDeepMind's multi-agent research shows teams of 3-5 with structured artifact handoffs\noutperform both solo agents and larger groups. Three is not arbitrary — it is the\nminimum for meaningful review and the maximum before coordination overhead eats the gain.\n\nThe roles map to how real software ships:\n- Someone who understands the whole system and owns the deploy\n- Someone who builds fast and clean\n- Someone who catches what the builder missed\n\n---\n\n## Quick Start\n\nChoose your install type:\n\n---\n\n### Per-project install (recommended)\n\nOne project, one install. Clone directly into your project folder.\n\n**Step 1 — Navigate to your project folder and clone**\n\n```bash\ngit clone https://github.com/russelleNVy/three-man-team.git .claude/skills/three-man-team\n```\n\n**Step 2 — Run setup and follow the instructions**\n\n```bash\ncd .claude/skills/three-man-team && ./setup\n```\n\nSetup takes over from here. It will give you the exact commands to run and the prompt to paste into Claude to get started. Follow what it prints.\n\n---\n\n### Global install (all projects)\n\nInstall once, use in any project.\n\n**Step 1 — Clone to your global Claude skills folder**\n\n```bash\ngit clone https://github.com/russelleNVy/three-man-team.git ~/.claude/skills/three-man-team\ncd ~/.claude/skills/three-man-team && ./setup\n```\n\nThat's the one-time install. Setup will confirm everything is in place.\n\n---\n\n**For each project you want to use Three Man Team on:**\n\n**Step 2 — Copy agent files into your project, then spin up Claude**\n\n```bash\ncp -r ~/.claude/skills/three-man-team/templates/project-folder/* /path/to/your/project/\ncd /path/to/your/project\n```\n\nOpen Claude Code and paste:\n\n```\nYou are the Architect on this project. Please read new-setup.md.\n```\n\nArch will handle the rest — project context file, team names, and your first session prompt.\n\n---\n\n## The Workflow\n\n<p align=\"center\">\n  <img src=\"assets/workflow.png\" alt=\"Three Man Team Workflow\" width=\"100%\">\n</p>\n\nEvery unit of work follows the same path. Architect plans and writes the brief. Builder reads it, shows a plan, builds, and hands off to Reviewer. Reviewer clears it or sends it back. Architect deploys with the Project Owner's go-ahead. Nothing skips a step.\n\nSee a complete example from problem to deploy → [`examples/sprint-walkthrough.md`](examples/sprint-walkthrough.md)\n\n---\n\n## The Team\n\n<p align=\"center\">\n  <img src=\"assets/role-cards-cropped.png\" alt=\"Arch, Bob and Richard\" width=\"100%\">\n</p>\n\nThree agents. Three distinct jobs. Built to work together.\n\nArchitect, Builder, Reviewer are the defaults. Rename them to anything — Arch will handle it during setup.\n\n---\n\n## Token Optimization\n\nEvery session starts with five rules baked into CLAUDE.md:\n\n```\nIs this in a skill or memory?   → Trust it. Skip the file read.\nIs this speculative?            → Kill the tool call.\nCan calls run in parallel?      → Parallelize them.\nOutput > 20 lines you won't use → Route to subagent.\nAbout to restate what user said → Delete it.\n```\n\nInstall your `token-optimizer` skill globally at `~/.claude/skills/token-optimizer` or\nreference it from your project's `.claude/skills/` directory.\n\nFor bash output compression on top of these rules, see [RTK](https://github.com/rtk-ai/rtk) —\na separate tool that compresses `find`, `ls`, `grep` output before it reaches Claude's context.\nNot required, but recommended for heavy Claude Code CLI users. The combination of RTK (bash layer)\n+ token-optimizer (behavior layer) is where real savings compound.\n\nSee `docs/token-optimization.md` for the full discipline.\n\n---\n\n## Templates\n\n- `templates/project-folder/` — **Start here.** Named personas (Arch, Bob, Richard), fully written and ready to use. Customize the Who You Are sections and rename to fit your team.\n- `templates/generic/` — Blank slate with `[CUSTOMIZE]` placeholders. Use this if you want to build your own personas from scratch or install globally across all projects.\n\nArch handles renaming during setup — just tell it the new names.\n\n---\n\n## License\n\nMIT. Free forever.\n\n---\n\n## Built By\n\nRussell Aaron — 20+ years building and supporting software the right way. He built this team\nin production shipping a real SaaS platform. It works because it was used before it was\npublished, fine tuned, and will continue to get better over time as AI models and tools evolve.\n","summary":"Three‑Man‑Team is a workflow framework for Claude that organizes AI coding into three distinct agents—Architect, Builder, and Reviewer—each with a clear job and handoff, designed to eliminate the wasteful, all‑or‑nothing behavior of typical LLM‑based code assistants.  It supplies a set of pre‑configured role templates, a token‑optimization policy that prunes unnecessary calls and outputs, and install options that integrate the agents directly into a project’s folder or a global skill set for reuse.  The system enforces a repeatable, step‑by‑step chain of planning, implementation, review, and deployment, ensuring that every change is deliberate and validated.  This tool is ideal for developers and teams who rely on Claude for software production and want a structured, efficient, and repeatable AI coding process.","description":"A structured 3-agent AI dev team — Architect, Builder, Reviewer. Built from production use. Token-optimized. Works with Claude Code, VS Code, Cursor, and any AI that supports context files.","stars":557,"language":"Shell"},{"owner":"mattmireles","repo":"gemma-tuner-multimodal","url":"https://github.com/mattmireles/gemma-tuner-multimodal","readme":"# Gemma Multimodal Fine-Tuner\n\n![Gemma macOS Tuner wizard: system check, then LoRA / model / dataset steps](README/assets/wizard-cli.png)\n\n**Fine-tune Gemma on text, images, *and* audio — on your Mac, on data that doesn't fit on your Mac.**\n\n- 🖼️ **Image + text LoRA** — captioning and VQA on local CSV.\n- 🎙️ **Audio + text LoRA** — Apple-Silicon-native, no CUDA required.\n- 📝 **Text-only LoRA** — instruction or completion on CSV.\n- ☁️ **Stream from GCS / BigQuery** — train on terabytes without filling your SSD.\n- 🍎 **Runs on Apple Silicon** — MPS-native, no NVIDIA box required.\n\n**Source:** [github.com/mattmireles/gemma-tuner-multimodal](https://github.com/mattmireles/gemma-tuner-multimodal) (public).\n\n---\n\n## Watch your model learn\n\n![Real-time training visualizer: loss curve, attention heatmap, gradient signal, memory, and token predictions — updating live as training runs on Apple Silicon](README/assets/training-visualizer.png)\n\nLoss curve. Attention heatmap. Gradient signal strength. Memory pressure. Token-by-token predictions — all updating in real time, in your browser, while the model trains on your Mac. No TensorBoard. No notebook. One flag in your config, one URL in your terminal.\n\n→ [Setup takes 30 seconds](#training-visualizer)\n\n---\n\n## LoRA for Gemma 4 & 3n — why not just use…?\n\n| | **This** | MLX-LM | Unsloth | axolotl |\n| --- | :-: | :-: | :-: | :-: |\n| Fine-tune Gemma (text-only CSV) | ✅ | ✅ | ✅ | ✅ |\n| Fine-tune Gemma **image + text** (caption / VQA CSV) | ✅ | ⚠️ varies | ⚠️ varies | ⚠️ varies |\n| Fine-tune Gemma **audio + text** | ✅ | ❌ | ❌ | ⚠️ CUDA only |\n| Runs on Apple Silicon (MPS) | ✅ | ✅ | ❌ | ❌ |\n| **Stream training data from cloud** | ✅ | ❌ | ❌ | ⚠️ partial |\n| No NVIDIA GPU required | ✅ | ✅ | ❌ | ❌ |\n\nFine-tune Gemma on **text, images, or audio** without renting an H100 or copying a terabyte of data to your laptop. All three modalities run on Apple Silicon.\n\n**Text-only fine-tuning** (instruction or completion on CSV) is supported: set `modality = text` in your profile and use local CSV splits under `data/datasets/<name>/`. See [Text-only fine-tuning](#text-only-fine-tuning) below.\n\n**Image + text fine-tuning** (captioning or VQA on local CSV) uses `modality = image`, `image_sub_mode`, and `image_token_budget`; see [Image fine-tuning](#image-fine-tuning) below. v1 is **local CSV only** (same constraint as text-only).\n\n**How it works:** Hugging Face Gemma checkpoints + PEFT LoRA, supervised fine-tuning in [`gemma_tuner/models/gemma/finetune.py`](gemma_tuner/models/gemma/finetune.py), exported as a merged HF / SafeTensors tree by [`gemma_tuner/scripts/export.py`](gemma_tuner/scripts/export.py). For Core ML conversion and GGUF inference tooling, see [`README/guides/README.md`](README/guides/README.md) — this repo's *training* path is Gemma-only by design.\n\n**Deeper reading:** [`README/guides/README.md`](README/guides/README.md) · [`README/specifications/Gemma3n.md`](README/specifications/Gemma3n.md)\n\n---\n\n## What you can build with this\n\n- **Domain-specific ASR** — fine-tune on medical dictation, legal depositions, call-center recordings, or any field where off-the-shelf Whisper / Gemma mishears the jargon.\n- **Domain-specific vision** — captioning or VQA on receipts, charts, screenshots, manufacturing defects, medical imagery — any visual domain where generic models hallucinate.\n- **Document & screen understanding** — train on screenshot → structured-output pairs for UI agents, OCR-adjacent pipelines, or chart QA.\n- **Accent, dialect, and low-resource language adaptation** — adapt a base Gemma model to underrepresented voices and languages with your own labeled audio.\n- **Multimodal assistants** — extend Gemma's text reasoning with image *or* audio grounding for transcription, captioning, and Q&A pipelines.\n- **Private, on-device pipelines** — train and run entirely on your Mac. Data never leaves the machine; weights never touch a third-party API.\n\nIf your data lives in GCS or BigQuery, you can do all of this on a laptop without copying terabytes locally — the dataloader streams shards on demand.\n\n---\n\n## Supported models\n\nTraining targets **Gemma multimodal (text + image + audio)** checkpoints loaded via `base_model` in [`config/config.ini`](config/config.ini) and routed to [`gemma_tuner/models/gemma/finetune.py`](gemma_tuner/models/gemma/finetune.py). The default file ships these **`[model:…]`** entries (LoRA on top of the Hub weights):\n\n| Model key (in `config/config.ini`) | Hugging Face `base_model` | Notes |\n| --- | --- | --- |\n| `gemma-4-e2b-it` | [`google/gemma-4-E2B-it`](https://huggingface.co/google/gemma-4-E2B-it) | Gemma 4 instruct, ~2B — requires `requirements/requirements-gemma4.txt` (see Installation) |\n| `gemma-4-e4b-it` | [`google/gemma-4-E4B-it`](https://huggingface.co/google/gemma-4-E4B-it) | Gemma 4 instruct, ~4B — requires Gemma 4 stack |\n| `gemma-4-e2b` | [`google/gemma-4-E2B`](https://huggingface.co/google/gemma-4-E2B) | Gemma 4 base — requires Gemma 4 stack |\n| `gemma-4-e4b` | [`google/gemma-4-E4B`](https://huggingface.co/google/gemma-4-E4B) | Gemma 4 base — requires Gemma 4 stack |\n| `gemma-3n-e2b-it` | [`google/gemma-3n-E2B-it`](https://huggingface.co/google/gemma-3n-E2B-it) | Gemma 3n instruct, ~2B — **default** on the base `pip install -e .` pin |\n| `gemma-3n-e4b-it` | [`google/gemma-3n-E4B-it`](https://huggingface.co/google/gemma-3n-E4B-it) | Gemma 3n instruct, ~4B |\n\nAdd your own **`[model:your-name]`** section with `group = gemma` and a compatible `base_model` if you need another **any-to-any** Gemma 3n / Gemma 4 E2B–E4B checkpoint. **Larger Gemma 4 weights** on Hugging Face (for example 26B or 31B class) use a different Transformers architecture than this trainer’s `AutoModelForCausalLM` audio path—they are **not** supported here yet.\n\nWizard time and memory hints come from [`gemma_tuner/wizard/base.py`](gemma_tuner/wizard/base.py) (`ModelSpecs`).\n\n---\n\n## Architecture\n\n| Piece | Role |\n| --- | --- |\n| [`gemma_tuner/cli_typer.py`](gemma_tuner/cli_typer.py) | Canonical CLI (`gemma-macos-tuner`). Imports `core.bootstrap` early so MPS env vars are set before Torch is loaded. |\n| [`gemma_tuner/core/ops.py`](gemma_tuner/core/ops.py) | Dispatches prepare → `scripts.prepare_data`, finetune → `scripts.finetune`, evaluate → `scripts.evaluate`, export → `scripts.export`. |\n| [`gemma_tuner/scripts/finetune.py`](gemma_tuner/scripts/finetune.py) | **Router**: only models whose name contains `gemma` → [`gemma_tuner/models/gemma/finetune.py`](gemma_tuner/models/gemma/finetune.py). |\n| [`gemma_tuner/utils/device.py`](gemma_tuner/utils/device.py) | MPS → CUDA → CPU selection, sync helpers, memory hints. |\n| [`gemma_tuner/utils/dataset_utils.py`](gemma_tuner/utils/dataset_utils.py) | CSV loads, patches, blacklist/protection semantics. |\n| [`gemma_tuner/wizard/`](gemma_tuner/wizard/) | Questionary + Rich UI; training is spawned with `python -m gemma_tuner.main finetune …` from the repo root (see [`gemma_tuner/wizard/runner.py`](gemma_tuner/wizard/runner.py)). |\n\n**Run layout** (typical):\n\n```text\noutput/\n├── {id}-{profile}/\n│   ├── metadata.json\n│   ├── metrics.json\n│   ├── checkpoint-*/\n│   └── adapter_model/          # LoRA artifacts when applicable\n```\n\n**Configuration:** hierarchical INI—defaults, groups, models, datasets, then profiles—read by `gemma_tuner/core/config.py`. Set `GEMMA_TUNER_CONFIG` if you invoke the CLI outside the repo root.\n\n---\n\n## Requirements\n\n| | |\n| --- | --- |\n| **Python** | **3.10+** (matches `pyproject.toml`) |\n| **macOS** | 12.3+ for MPS; use **native arm64** Python, not Rosetta |\n| **RAM** | 16 GB minimum for the smaller Gemma runs; 32 GB+ recommended |\n| **CUDA** | Optional; install the CUDA build of PyTorch that matches your driver |\n\n---\n\n## Installation\n\n### 1. Create a Python 3.10+ virtual environment\n\nmacOS's built-in Python is 3.9, which is too old. Install a newer one with Homebrew:\n\n```bash\nbrew install python@3.12\n```\n\nThen create and activate a virtual environment:\n\n```bash\npython3.12 -m venv .venv\nsource .venv/bin/activate\n```\n\nEvery command below assumes the venv is active. To reactivate in a new terminal:\n`source .venv/bin/activate`.\n\n### 2. Confirm you are on arm64 (Apple Silicon)\n\n```bash\npython -c \"import platform; print(platform.machine())\"\n# arm64  -> good\n# x86_64 -> Python is running under Rosetta; install a native arm64 Python and recreate the venv\n```\n\nA native arm64 Python is available from [python.org](https://www.python.org/downloads/macos/)\nor Homebrew (`brew install python@3.12`).\n\n### 3. Install PyTorch\n\n```bash\npip install torch torchaudio\n```\n\n### 4. Install this package\n\n```bash\npip install -e .\n```\n\n### 5. Authenticate with Hugging Face\n\nGemma weights are gated. Accept the license on the\n[model card](https://huggingface.co/google/gemma-3n-E2B-it), then either log in or\nexport a token:\n\n```bash\nhuggingface-cli login\n# or:  export HF_TOKEN=hf_...\n```\n\n### 6. Gemma 4 (optional)\n\nThe base install (`pip install -e .`) pins Transformers ≥5.5 — both **Gemma 3n** and **Gemma 4** families work out of the box. Gemma 4 checkpoints need a slightly newer PEFT:\n\n```bash\npip install -r requirements/requirements-gemma4.txt\n```\n\n`finetune` and `export` are family-aware. A few non-training commands (`gemma_generate`, multimodal probing, ASR eval) still reject Gemma 4 ids until those code paths are upgraded.\n\n### 7. Run the wizard\n\n```bash\ngemma-macos-tuner wizard\n```\n\nThe wizard is the primary UI: it picks the model, walks you through dataset and\nhyperparameter selection, and starts training. On first run it creates\n`config/config.ini` for you from the committed\n[`config/config.ini.example`](config/config.ini.example) template (the live config\nis gitignored because the wizard writes local paths and GCP project IDs into it).\n\nIf a command fails, run `gemma-macos-tuner system-check` first to surface\nenvironment issues.\n\n---\n\n## Zero to training in 90 seconds\n\nThe repo ships a 16-row instruction-tuning dataset at [`data/datasets/sample-text/`](data/datasets/sample-text/) — translations, summaries, trivia, haiku, JSON conversion. Small enough to finish in under a minute. Large enough to prove the full pipeline works: data loading, tokenization, LoRA, checkpointing, export.\n\n```bash\ngemma-macos-tuner wizard\n```\n\nPick **Instruction tuning → gemma-3n-e2b-it → sample-text**, accept the defaults, and watch it train. First run downloads ~5 GB of base weights from Hugging Face (step 5 above must be done). Every run after that starts in seconds.\n\nOr skip the wizard entirely:\n\n```bash\ngemma-macos-tuner finetune sample-text\n```\n\nOnce the sample run finishes, drop your own CSV under `data/datasets/<your-name>/` and run the wizard again — it picks up new datasets automatically.\n\n---\n\n## What kind of data do I need?\n\nAll training data is **CSV** under `data/datasets/<name>/`, with one row per\nexample and a header row. The required columns depend on the modality. Each\ndataset directory holds at least:\n\n```text\ndata/datasets/<name>/\n├── train.csv\n└── validation.csv\n```\n\nThere is no JSONL / Parquet / Hugging Face dataset format requirement — just CSV.\nThe column **names** are configurable via `prompt_column`, `text_column`, and\n`image_path_column` in your profile; the names below are the defaults used by\n[`config/config.ini.example`](config/config.ini.example).\n\n### Text instruction (`modality = text`, `text_sub_mode = instruction`)\n\n```csv\nid,prompt,response\n1,Translate to French: Good morning.,Bonjour.\n2,What is the capital of Japan?,Tokyo.\n```\n\nThe prompt is masked from the loss; the model only learns to generate `response`.\nThis is what the bundled `sample-text` dataset uses.\n\n### Text completion (`modality = text`, `text_sub_mode = completion`)\n\n```csv\nid,text\n1,\"Once upon a time, in a small village by the sea, ...\"\n```\n\nA single text column; the full sequence is trained (no prompt mask). Useful for\ndomain pretraining-style adaptation.\n\n### Image + text (`modality = image`)\n\n```csv\nid,image_path,caption\n1,images/receipt_001.jpg,\"Total: $42.18, paid in cash\"\n2,images/receipt_002.jpg,\"Subtotal $19.99, tax $1.60, total $21.59\"\n```\n\n`image_path` is resolved relative to the dataset directory (or an absolute path).\nFor VQA, set `image_sub_mode = vqa` and use `image_path,question,answer` columns.\nSee [Image fine-tuning](#image-fine-tuning) for details.\n\n### Audio + text (`modality = audio`, the default)\n\n```csv\nid,audio_path,text,language,duration\n1,audio/sample_001.wav,\"the quick brown fox jumps over the lazy dog\",en,2.4\n```\n\n`audio_path` points at decoded WAV files (16 kHz mono recommended). The\n`gemma-macos-tuner prepare` command will fetch and decode audio for you if you\nprovide an `audio_url` column instead. See [`README/Datasets.md`](README/Datasets.md)\nfor the full schema and the GCS / BigQuery streaming variants.\n\n---\n\n## CLI cheat sheet\n\n```bash\n# Dataset prep (profile names come from config/config.ini)\ngemma-macos-tuner prepare <dataset-profile>\n\n# Train (model in profile must be a Gemma id / local path with \"gemma\" in the string)\ngemma-macos-tuner finetune <profile> --json-logging\n\n# Evaluate\ngemma-macos-tuner evaluate <profile-or-run>\n\n# Export merged HF/SafeTensors tree (LoRA merged when adapter_config.json is present)\ngemma-macos-tuner export <run-dir-or-profile>\n\n# Exported models and completed runs include a .integrity.json manifest for\n# corruption/drift detection. Verification is intentionally strict about\n# unexpected extra tracked files. This is integrity only, not signing/authenticity.\n\n# Blacklist generation from errors\ngemma-macos-tuner blacklist <profile>\n\n# Run index\ngemma-macos-tuner runs list\n\n# Guided setup\ngemma-macos-tuner wizard\n```\n\n**Migration from `main.py` / old habits:** [`docs/MIGRATION.md`](docs/MIGRATION.md). Runs management moved to the `runs` subcommand—not a separate `manage.py` in this tree.\n\n---\n\n## Text-only fine-tuning\n\nTrain on **CSV text** (local splits under `data/datasets/<name>/`) without audio. v1 supports **local CSV only** — not BigQuery or Granary streaming (those remain audio-oriented).\n\nSet in your `[profile:…]` (see also [`README/Datasets.md`](README/Datasets.md)):\n\n- `modality = text`\n- `text_sub_mode = instruction` — user/assistant turns: set `prompt_column` and `text_column` (response).\n- `text_sub_mode = completion` — one column; the full sequence is trained (no prompt mask).\n\nOptional: `max_seq_length` (default `2048`).\n\n**Instruction example** (profile snippet):\n\n```ini\nmodality = text\ntext_sub_mode = instruction\ntext_column = response\nprompt_column = prompt\nmax_seq_length = 2048\n```\n\n**Completion example**:\n\n```ini\nmodality = text\ntext_sub_mode = completion\ntext_column = text\nmax_seq_length = 2048\n```\n\nThe checkpoint is still a multimodal Gemma `AutoModelForCausalLM`; the USM audio tower weights remain in memory in v1 even when you only train on text. See [`README/KNOWN_ISSUES.md`](README/KNOWN_ISSUES.md).\n\n---\n\n## Image fine-tuning\n\nTrain on **image + text** pairs from **local CSV** splits under `data/datasets/<name>/` (`train.csv` / `validation.csv`). v1 supports **captioning** (`image_sub_mode = caption`) and **VQA** (`image_sub_mode = vqa`). See [`README/Datasets.md`](README/Datasets.md) for all keys.\n\n- **Caption / OCR-style:** user turn = image + fixed instruction (“Describe this image.”); assistant = your caption column.\n- **VQA:** user turn = image + question (`prompt_column`); assistant = answer (`text_column`).\n\n**Profile snippet (caption):**\n\n```ini\nmodality = image\nimage_sub_mode = caption\ntext_column = caption\nimage_path_column = image_path\nimage_token_budget = 280\n```\n\n**Profile snippet (VQA):**\n\n```ini\nmodality = image\nimage_sub_mode = vqa\nprompt_column = question\ntext_column = answer\nimage_path_column = image_path\nimage_token_budget = 560\n```\n\n`image_token_budget` must be one of **70, 140, 280, 560, 1120**. Use the **same** value at inference as during training. Higher budgets improve detail but increase memory and step time on MPS. Export saves the processor next to weights; if `metadata.json` from the run is present, export reapplies the stored budget to the processor for consistency.\n\n---\n\n## Gemma 3n / Gemma 4 on Apple Silicon\n\nEnd-to-end notes live in [`README/specifications/Gemma3n.md`](README/specifications/Gemma3n.md). Multimodal Gemma 4 + MPS field guide: [`README/guides/apple-silicon/gemma4-guide.md`](README/guides/apple-silicon/gemma4-guide.md). Common commands:\n\n```bash\npython -m gemma_tuner.scripts.gemma_preflight\npython -m gemma_tuner.scripts.gemma_profiler --model google/gemma-3n-E2B-it\n\ngemma-macos-tuner wizard\n\npython -m gemma_tuner.scripts.gemma_tiny_overfit --profile gemma-lora-test --max-samples 32\n\npython tools/eval_gemma_asr.py \\\n  --csv data/datasets/<your_dataset>/validation.csv \\\n  --model google/gemma-3n-E2B-it \\\n  --adapters output/<your_run>/ \\\n  --text-column text \\\n  --limit 200\n```\n\n**MPS notes:** prefer bf16 when supported; attention is forced to `eager` for stability; unset `PYTORCH_ENABLE_MPS_FALLBACK=1` after debugging — leaving it on hides silent CPU fallbacks.\n\n---\n\n## Data: CSVs, GCS, BigQuery\n\n- **Local / HTTP / GCS paths** in your prepared CSV; use `gemma-macos-tuner prepare <profile> --no-download` to avoid copying GCS audio locally.\n- **BigQuery import** (wizard or scripts): needs `pip install .[gcp]` and Application Default Credentials (`gcloud auth application-default login` or `GOOGLE_APPLICATION_CREDENTIALS`). The wizard can materialize `_prepared.csv` and append a dataset section to `config/config.ini`.\n\nPatch layout (by dataset `source`):\n\n```text\ndata_patches/{source}/\n├── override_text_perfect/\n├── do_not_blacklist/\n└── delete/\n```\n\n---\n\n## Training visualizer\n\nSix live panels in your browser while the model trains:\n\n| Panel | What it shows |\n| --- | --- |\n| **Loss curve** | Per-step loss over time — the single most important number in training |\n| **Attention heatmap** | Where the model is looking across the input, layer by layer |\n| **Signal strength** | Gradient norm — are the updates meaningful or vanishing? |\n| **Step size** | Learning rate at each step (schedule + warmup visible at a glance) |\n| **Memory** | GPU/MPS memory in GB — catch pressure before it becomes a crash |\n| **Token predictions** | Top-5 next-token probabilities — watch the model's guesses sharpen in real time |\n\n**Setup:**\n\n```bash\npip install -e \".[viz]\"\n```\n\nThen set `visualize = true` in your profile and run training. The trainer prints a URL (default `127.0.0.1:8080`). Open it. That's it.\n\nIf Flask isn't installed, training still runs — the visualizer is skipped silently. No dependency, no breakage.\n\n---\n\n## NVIDIA Granary & streaming\n\nLarge-corpus workflows: `gemma-macos-tuner prepare-granary <profile>` and streaming-oriented dataset keys—see [`README/Datasets.md`](README/Datasets.md).\n\n---\n\n## Apple Silicon knobs\n\n```bash\n# Debug only—surfaces unsupported ops by falling back to CPU (slow)\nexport PYTORCH_ENABLE_MPS_FALLBACK=1\n\n# Cap MPS allocator high-water mark (try 0.7–0.9)\nexport PYTORCH_MPS_HIGH_WATERMARK_RATIO=0.8\n```\n\nPreprocessing worker count and dataloader settings are controlled from `config/config.ini`; defaults favor using available CPU cores for `Dataset.map`.\n\n---\n\n## CI & tests\n\nWorkflows under [`.github/workflows/`](.github/workflows/): lint (`ruff`), fast tests (`pytest -k \"not slow\"`), macOS smoke. Regenerate lockfiles with `pip-compile` when you change `pyproject.toml`—see comments in [`requirements/requirements.txt`](requirements/requirements.txt).\n\n---\n\n## Troubleshooting\n\n| Symptom | Likely fix |\n| --- | --- |\n| `Unsupported model` from finetune | Use a Gemma model id / path containing `gemma`. |\n| MPS not available | macOS 12.3+, arm64 Python, current PyTorch. |\n| OOM / swap storm | Smaller batch, gradient checkpointing, lower `PYTORCH_MPS_HIGH_WATERMARK_RATIO`. |\n| Slow training with fallback env on | Unset `PYTORCH_ENABLE_MPS_FALLBACK` after debugging. |\n| Config not found | `GEMMA_TUNER_CONFIG`, or run from the repo with `config/config.ini`, or pass `--config`. |\n| 401 / gated model / cannot download weights | Accept the license on the model’s Hugging Face page; run `huggingface-cli login` or set `HF_TOKEN`. |\n\n---\n\n## Contributing\n\nSee [`docs/CONTRIBUTING.md`](docs/CONTRIBUTING.md). Prefer extending `cli_typer.py` and shared helpers in `gemma_tuner/core/` over one-off scripts.\n\n---\n\n## Acknowledgments\n\nGoogle's Gemma team, Hugging Face Transformers & PEFT, and the PyTorch MPS maintainers.\n\n---\n\n## License\n\nIf your data lives in a bucket and your GPU lives in your lap, this was built for you.\n\nReleased under the [MIT License](LICENSE).\n","summary":"Gemma‑Tuner‑Multimodal is a lightweight toolkit that lets anyone fine‑tune Google’s Gemma LLM on text + image, text + audio, or text alone directly on Apple Silicon Macs, using LoRA without an NVIDIA GPU.  The framework streams terabyte‑scale data from GCS or BigQuery, visualizes training loss, attention, gradients, and token predictions in a browser‑based dashboard, and outputs merged HF/SafeTensor checkpoints ready for Core‑ML or GGUF deployment.  It is ideal for researchers, developers, and domain experts who want to build customized, privacy‑preserving multimodal assistants or specialized transcription and vision models on modest hardware without renting cloud GPUs.","description":"Fine-tune Gemma 4 and 3n with audio, images and text on Apple Silicon, using PyTorch and Metal Performance Shaders.","stars":1350,"language":"Python"},{"owner":"orchetron","repo":"storm","url":"https://github.com/orchetron/storm","readme":"<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"assets/logo-white.png\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"assets/logo-black.png\">\n    <img src=\"assets/logo-black.png\" width=\"56\" alt=\"\" valign=\"middle\">\n  </picture>\n  <br>\n  <strong style=\"font-size: 2em;\">STORM</strong><br>\n  <strong>A compositor-based terminal UI framework.</strong><br>\n  Fast. Layered. Unstoppable.\n</p>\n\n<p align=\"center\">\n  <img src=\"https://img.shields.io/badge/components-97-82AAFF?style=flat-square\" alt=\"97 Components\">\n  <img src=\"https://img.shields.io/badge/AI_widgets-15-82AAFF?style=flat-square\" alt=\"15 AI Widgets\">\n  <img src=\"https://img.shields.io/badge/hooks-83-82AAFF?style=flat-square\" alt=\"83 Hooks\">\n  <img src=\"https://img.shields.io/badge/TypeScript-strict-82AAFF?style=flat-square\" alt=\"TypeScript\">\n  <img src=\"https://img.shields.io/badge/license-MIT-82AAFF?style=flat-square\" alt=\"MIT License\">\n</p>\n\n<p align=\"center\">\n  <a href=\"https://www.producthunt.com/products/storm-4?utm_source=badge-featured&utm_medium=badge&utm_campaign=badge-storm-5\" target=\"_blank\"><img src=\"https://api.producthunt.com/widgets/embed-image/v1/featured.svg?post_id=1115184&theme=dark&t=1775249991586\" alt=\"Storm on Product Hunt\" width=\"250\" height=\"54\" /></a>\n</p>\n\n<br>\n\n<p align=\"center\">\n  <img src=\"examples/demo.gif\" width=\"720\" alt=\"Storm TUI Demo\">\n</p>\n\n<p align=\"center\">\n  <em>Cell matrix. Live metrics. AI agent. Code diff. All running in a terminal.</em>\n</p>\n\n<br>\n\n## Why Storm\n\nMost terminal frameworks treat your terminal like a string printer. Storm treats it like a **display server**.\n\n**Cell-level diff** — only changed cells are written. 97% are skipped per frame.<br>\n**Dual-speed rendering** — React for structure, `requestRender()` for 60fps animation.<br>\n**Typed-array buffers** — Int32Array + Uint8Array. Zero Cell objects. ~90% less GC pressure.<br>\n**Pure TypeScript** — flexbox + CSS Grid layout. Zero native dependencies.<br>\n\n<br>\n\n## Quick start\n\n```bash\nnpm install @orchetron/storm react\n```\n\n```tsx\nimport React from \"react\";\nimport { render, Box, Text, Spinner, useInput, useTui } from \"@orchetron/storm\";\n\nfunction App() {\n  const { exit } = useTui();\n  useInput((e) => { if (e.key === \"c\" && e.ctrl) exit(); });\n\n  return (\n    <Box padding={1}>\n      <Spinner type=\"diamond\" color=\"#82AAFF\" />\n      <Text bold color=\"#82AAFF\"> storm is alive</Text>\n    </Box>\n  );\n}\n\nrender(<App />).waitUntilExit();\n```\n\nThat's 10 lines. You have a running TUI with animated spinner and keyboard input.\n\n<br>\n\n## Build an AI agent terminal in 30 seconds\n\n```tsx\nimport React from \"react\";\nimport { render, Box, MessageBubble, OperationTree, ApprovalPrompt,\n         useTerminal, useTui, useInput } from \"@orchetron/storm\";\n\nfunction App() {\n  const { width, height } = useTerminal();\n  const { exit } = useTui();\n  useInput((e) => { if (e.key === \"c\" && e.ctrl) exit(); });\n\n  return (\n    <Box flexDirection=\"column\" width={width} height={height}>\n      <MessageBubble role=\"assistant\">I'll fix the bug in auth.ts.</MessageBubble>\n\n      <OperationTree nodes={[\n        { id: \"1\", label: \"Reading auth.ts\", status: \"completed\", durationMs: 120 },\n        { id: \"2\", label: \"Editing code\", status: \"running\" },\n        { id: \"3\", label: \"Running tests\", status: \"pending\" },\n      ]} />\n\n      <ApprovalPrompt tool=\"writeFile\" risk=\"medium\" params={{ path: \"auth.ts\" }} onSelect={() => {}} />\n    </Box>\n  );\n}\n\nrender(<App />).waitUntilExit();\n```\n\nThe OperationTree spinner animates at 80ms through imperative cell mutation — no React state churn, no layout rebuild.\n\n<br>\n\n## How it renders\n\n<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"assets/diagram-pipeline-dark.svg\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"assets/diagram-pipeline-light.svg\">\n    <img src=\"assets/diagram-pipeline-dark.svg\" width=\"800\" alt=\"Five-stage rendering pipeline\">\n  </picture>\n</p>\n\nEvery frame flows through five stages: **React → Layout → Buffer → Diff → TTY**. Animation frames skip React and Layout entirely — buffer to terminal in 0.5ms.\n\n<br>\n\n<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"assets/diagram-cell-diff-dark.svg\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"assets/diagram-cell-diff-light.svg\">\n    <img src=\"assets/diagram-cell-diff-dark.svg\" width=\"800\" alt=\"Cell-level diffing\">\n  </picture>\n</p>\n\nOn a typical scroll frame, **97% of cells are unchanged**. Storm skips them entirely — emitting only the bytes for mutated cells. The typed-array buffer eliminates ~30,000 Cell objects per frame.\n\n**Other rendering features:**\n- **DECSTBM hardware scroll** — terminal-native scroll regions for pure scroll ops\n- **Optional WASM acceleration** — 33KB Rust module for 3.4x faster diff\n- **Correct grapheme rendering** — `Intl.Segmenter` for ZWJ emoji (👨‍👩‍👧‍👦 = 2 columns, not 8)\n\n<br>\n\n## DevTools\n\n<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"assets/diagram-devtools-dark.svg\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"assets/diagram-devtools-light.svg\">\n    <img src=\"assets/diagram-devtools-dark.svg\" width=\"800\" alt=\"Four built-in DevTools\">\n  </picture>\n</p>\n\n```tsx\nconst app = render(<App />);\nenableDevTools(app); // press 1/2/3/4\n```\n\n**Render heatmap** — see exactly where your UI does unnecessary work.<br>\n**Accessibility audit** — live WCAG 4.5:1 contrast checking on every cell.<br>\n**Time-travel** — freeze, scrub 120 frames, see what changed.<br>\n**Inspector** — component tree, computed styles, FPS, events.\n\nAll four run as render middleware — non-blocking, the app keeps running.\n\n<br>\n\n## What's inside\n\n**97 components** — Box, Text, ScrollView, Tabs, Modal, Table, DataGrid, Tree, Form, Select, CommandPalette, TextArea, Markdown, DatePicker, Spinner (14 types), DiffView, Calendar, and more. [Browse all →](docs/components.md)<br>\n**15 AI widgets** — OperationTree, MessageBubble, ApprovalPrompt, StreamingText, SyntaxHighlight, TokenStream, ContextWindow, CostTracker. [Browse all →](docs/widgets.md)<br>\n**83 hooks** — 4 tiers: Essential, Common, Interactive, and 20 headless behavior hooks. [Decision matrix →](docs/hook-guide.md)<br>\n**12 themes** — Arctic, Midnight, Ember, Voltage, Neon, High Contrast + live `.storm.css` hot-reload. [Guide →](docs/theming.md)<br>\n**Animations** — `<Transition>` enter/exit, `<AnimatePresence>` mount/unmount, spring physics. [Guide →](docs/animations.md)<br>\n**Plugins** — Vim mode, compact mode, auto-scroll, screenshot, status bar. [Guide →](docs/plugins.md)<br>\n**i18n** — Locales, RTL, pluralization for EN/FR/AR/RU/JA. [Guide →](docs/i18n.md)<br>\n**SSH** — Serve your app over SSH with built-in auth and rate limiting.\n\n<br>\n\n## Get started\n\n```bash\nnpx tsx examples/storm-code/index.tsx    # AI coding agent\nnpx tsx examples/storm-ops/index.tsx     # Operations dashboard\nnpx tsx examples/devtools-demo.tsx       # DevTools showcase\nnpx tsx examples/storm-website.tsx       # This README's demo\n```\n\n<br>\n\n[Getting Started](docs/getting-started.md) · [Components](docs/components.md) · [AI Widgets](docs/widgets.md) · [Hook Guide](docs/hook-guide.md) · [Recipes](docs/recipes.md) · [Theming](docs/theming.md) · [DevTools](docs/devtools.md) · [Animations](docs/animations.md) · [Plugins](docs/plugins.md) · [Pitfalls](docs/pitfalls.md) · [Performance](docs/performance.md) · [i18n](docs/i18n.md)\n\n<br>\n\n<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"assets/logo-white.png\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"assets/logo-black.png\">\n    <img src=\"assets/logo-black.png\" width=\"24\" alt=\"\">\n  </picture>\n  <br>\n  <sub>Built by <b>Orchetron</b> · <a href=\"./CONTRIBUTING.md\">Contributing</a> · MIT License</sub>\n</p>\n","summary":"STORM is a compositor‑based terminal user‑interface framework that treats the terminal as a lightweight display server, enabling efficient cell‑level diffs that skip 97 % of updates each frame. It offers React‑style declarative layout using Flexbox and CSS Grid, dual‑speed rendering for 60 fps animations, and a zero‑dependency, typed‑array backend that dramatically reduces garbage‑collection pressure. With built‑in AI widgets, hooks, and a rich component library, developers who build rich, animated terminal applications—such as dashboards, code editors, or AI agent consoles—can create responsive UIs in only a few lines of TypeScript.","description":"A compositor-based terminal UI framework. Fast. Layered. Unstoppable.","stars":337,"language":"TypeScript"},{"owner":"umputun","repo":"revdiff","url":"https://github.com/umputun/revdiff","readme":"# <img src=\"site/assets/logo.png\" alt=\"\" width=\"28\">&nbsp;revdiff &nbsp;<a href=\"https://github.com/umputun/revdiff/actions/workflows/ci.yml\"><img src=\"https://github.com/umputun/revdiff/actions/workflows/ci.yml/badge.svg\" alt=\"build\"></a> <a href=\"https://coveralls.io/github/umputun/revdiff?branch=master\"><img src=\"https://coveralls.io/repos/github/umputun/revdiff/badge.svg?branch=master\" alt=\"Coverage Status\"></a> <a href=\"https://goreportcard.com/report/github.com/umputun/revdiff\"><img src=\"https://goreportcard.com/badge/github.com/umputun/revdiff\" alt=\"Go Report Card\"></a>\n\nTUI for reviewing diffs, files, and documents with inline annotations. Outputs structured annotations to stdout on quit, making it easy to pipe results into AI agents, scripts, or other tools.\n\nBuilt for a specific use case: reviewing code changes, plans, and documents without leaving a terminal-based AI coding session (e.g., Claude Code). Just enough UI to navigate diffs and files, annotate specific lines, and return the results to the calling process - no more, no less.\n\n## Features\n\n- Structured annotation output to stdout - pipe into AI agents, scripts, or other tools\n- Full-file diff view with syntax highlighting\n- Intra-line word-diff: highlights the specific changed words within paired add/remove lines using a brighter background overlay, off by default — enable with `--word-diff` or toggle with `W`\n- Collapsed diff mode: shows final text with change markers, toggle with `v`\n- Word wrap mode: wraps long lines at viewport boundary with `↪` continuation markers, toggle with `w`\n- Horizontal scroll overflow indicators: truncated diff lines show `«` / `»` markers at the edges to signal hidden content off-screen\n- Line numbers: side-by-side old/new line number gutter for diffs, single column for full-context files, toggle with `L`\n- Mercurial support: auto-detects hg repos, translates git-style refs (HEAD, HEAD~N) to Mercurial revsets\n- Jujutsu support: auto-detects jj repos (including colocated git+jj), translates git-style refs to jj revsets (`HEAD` → `@-`, `HEAD~N` → `@` plus N+1 dashes); `--all-files` supported\n- Blame gutter: shows author name and commit age per line, toggle with `B`\n- Annotate any line in the diff (added, removed, or context) plus file-level notes\n- Single-file auto-detection: when a diff contains exactly one file, hides the tree pane and gives full terminal width to the diff view\n- Two-pane TUI: file tree (left) + colorized diff viewport (right)\n- Vim-style `/` search within diff with `n`/`N` match navigation\n- Hunk navigation to jump between change groups\n- Annotation list popup (`@`): browse all annotations across files, jump to any annotation\n- Filter file tree to show only annotated files\n- Status line with filename, diff stats, hunk position, line number, and mode indicators\n- Help overlay (`?`) showing all keybindings organized by section\n- Commit info popup (`i`) showing subject + body of every commit in the current ref range (git/hg/jj), useful for restoring the narrative context when reviewing PR-style diffs\n- Markdown TOC navigation: single-file markdown files in context-only mode show a table-of-contents pane with header navigation and active section tracking\n- All-files mode: browse and annotate all tracked files with `--all-files` (git `ls-files` or jj `file list`), filter with `--include` and `--exclude`\n- No-VCS file review: `--only` files outside a VCS repo (or not in any diff) are shown as context-only with full annotation support\n- Scratch-buffer review: annotate arbitrary piped or redirected text with `--stdin`, optionally naming it with `--stdin-name`\n- Pi package: launch revdiff from pi, capture annotations, and keep them visible in a widget and right-side panel until you apply or clear them\n- Review history: auto-saves annotations and diffs to `~/.config/revdiff/history/` on quit as a safety net\n- Fully customizable colors via environment variables, CLI flags, or config file\n- Custom keybindings: remap any key via config file, export defaults with `--dump-keys`\n\n![revdiff screenshot](site/assets/screenshot.png)\n\n## Requirements\n\n- `git`, `hg`, or `jj` (used to generate diffs; optional when using `--only` or `--stdin`)\n\n## Installation\n\n**Homebrew (macOS/Linux):**\n\n```bash\nbrew install umputun/apps/revdiff\n```\n\n**Arch Linux (AUR):**\n\n```bash\nparu -S revdiff\n```\n\n**Debian/Ubuntu (.deb):**\n\n```bash\n# download the latest .deb for your architecture from GitHub Releases\nsudo dpkg -i revdiff_*.deb\n```\n\n**RPM-based (Fedora, RHEL, etc.):**\n\n```bash\n# download the latest .rpm for your architecture from GitHub Releases\nsudo rpm -i revdiff_*.rpm\n```\n\n**Binary releases:** download from [GitHub Releases](https://github.com/umputun/revdiff/releases) (deb, rpm, archives for linux/darwin amd64/arm64).\n\n## Claude Code Plugin\n\nrevdiff ships with a Claude Code plugin for interactive code review directly from a Claude session. The plugin launches revdiff as a terminal overlay, captures annotations, and feeds them back to Claude for processing.\n\nThe plugin requires one of the following terminals since Claude Code itself cannot display interactive TUI applications - the overlay runs revdiff in a separate terminal layer on top of the current session:\n\n| Terminal | Overlay method | Detection |\n|----------|---------------|-----------|\n| **tmux** | `display-popup` (blocks until quit) | `$TMUX` env var |\n| **Zellij** | `zellij run --floating` | `$ZELLIJ` env var |\n| **kitty** | `kitty @ launch --type=overlay` | `$KITTY_LISTEN_ON` env var |\n| **wezterm** | `wezterm cli split-pane` | `$WEZTERM_PANE` env var |\n| **Kaku** | `kaku cli split-pane` (same API as wezterm) | `$WEZTERM_PANE` env var |\n| **cmux** | `cmux new-split` + `cmux send` | `$CMUX_SURFACE_ID` env var |\n| **ghostty** | AppleScript split + zoom (macOS only) | `$TERM_PROGRAM` + AppleScript probe |\n| **iTerm2** | `osascript` split pane (macOS only) | `$ITERM_SESSION_ID` env var |\n| **Emacs vterm** | New frame via `emacsclient` | `$INSIDE_EMACS` env var |\n\nPriority: tmux → Zellij → kitty → wezterm/Kaku → cmux → ghostty → iTerm2 → Emacs vterm (first detected wins). If none are available, the plugin exits with an error.\n\n> **Note:** cmux is detected before ghostty because cmux also sets `$TERM_PROGRAM=ghostty`. The cmux block uses the cmux CLI (`new-split` + `send --surface`) instead of Ghostty's AppleScript API.\n\n> **Note:** iTerm2 uses a split pane (vertical or horizontal, auto-detected from terminal dimensions) rather than a full-screen overlay. The iTerm2 AppleScript API does not expose a zoom command, so the split view shares screen space with the invoking session.\n\n> **Note:** Ghostty and iTerm2 launchers use `osascript` (Apple Events), which is blocked by Claude Code's sandbox. If you use these terminals with sandbox enabled, add the launcher to `excludedCommands` in your Claude Code `settings.json`:\n>\n> ```json\n> {\n>   \"permissions\": {\n>     \"excludedCommands\": [\"*/launch-revdiff.sh*\"]\n>   }\n> }\n> ```\n>\n> Terminals that use CLI tools instead of AppleScript (tmux, Zellij, kitty, wezterm, cmux) are not affected.\n\n**Install:**\n\n```bash\n# add marketplace and install\n/plugin marketplace add umputun/revdiff\n/plugin install revdiff@umputun-revdiff\n```\n\n**Use with `/revdiff` command:**\n\n```\n/revdiff                  -- smart detection: uncommitted, last commit, or branch diff\n/revdiff HEAD~1           -- review last commit\n/revdiff main             -- review current branch against main\n/revdiff --staged         -- review staged changes only\n/revdiff HEAD~3           -- review last 3 commits\n```\n\n**Use with free text** (no slash command needed):\n\n```\n\"review diff\"                     -- smart detection, same as /revdiff\n\"review diff HEAD~1\"              -- last commit\n\"review diff against main\"        -- branch diff\n\"review changes from last 2 days\" -- Claude resolves the ref automatically\n\"revdiff for staged changes\"      -- staged only\n```\n\nWhen no ref is provided, the plugin auto-detects the VCS (git, hg, or jj) and inspects the current repo state to pick what to review:\n- On main/master with uncommitted changes — reviews uncommitted changes\n- On main/master with clean tree — reviews the last commit\n- On a feature branch with clean tree — reviews branch diff against main\n- On a feature branch with uncommitted changes — asks whether to review uncommitted only or the full branch diff\n- Outside a VCS repo — falls back to asking the user what to review\n\nThe plugin includes built-in reference documentation and can answer questions about revdiff usage, available themes, keybindings, and configuration options. It can also create or modify the local config file (`~/.config/revdiff/config`) on request:\n\n```\n\"what chroma themes does revdiff support?\"\n\"switch revdiff to dracula theme\"\n\"what are the revdiff keybindings?\"\n\"set tree width to 3 in revdiff config\"\n```\n\nThe plugin supports the full review loop: annotate → plan → fix → re-review until no more annotations remain.\n\n**Custom launchers:** both Claude plugins resolve their launcher script through a two-layer chain (user → bundled), so you can drop a custom launcher at `${CLAUDE_PLUGIN_DATA}/scripts/launch-revdiff.sh` without forking the plugin. There is no project-level (`.claude/...`) override layer by design — the planning hook fires automatically on every `ExitPlanMode`, and a repo-controlled executable layer would let an untrusted repo run arbitrary code on routine Claude actions. See `.claude-plugin/skills/revdiff/references/install.md` for the diff-review skill and [plugins/revdiff-planning/README.md](plugins/revdiff-planning/README.md) for the planning hook.\n\n### Plan Review Plugin\n\nA separate `revdiff-planning` plugin automatically opens revdiff when Claude exits plan mode, letting you annotate the plan before approving it. If you add annotations, Claude revises the plan and asks again — looping until you're satisfied.\n\n```bash\n/plugin install revdiff-planning@umputun-revdiff\n```\n\nThis plugin is independent from the main `revdiff` plugin and does not conflict with other planning plugins (e.g., `planning` from `cc-thingz`).\n\n## Pi Package\n\nrevdiff also ships as a [pi](https://github.com/badlogic/pi-mono) package. The extension launches the existing `revdiff` binary, captures annotations on exit, and renders them inside pi as a persistent widget plus a right-side results panel.\n\n**Install:**\n\n```bash\npi install https://github.com/umputun/revdiff\n```\n\n**Commands inside pi:**\n\n```text\n/revdiff                         -- detect uncommitted, staged, or branch changes, then open revdiff\n/revdiff HEAD~1                  -- review last commit\n/revdiff --all-files             -- browse all tracked files\n/revdiff --only README.md        -- review a single file in context-only mode\n/revdiff --pi-overlay            -- use the existing overlay launcher script instead of same-terminal mode\n/revdiff-rerun                   -- rerun the last review with remembered args\n/revdiff-rerun --pi-overlay      -- rerun the last review in overlay mode\n/revdiff-results                 -- reopen the last results panel\n/revdiff-apply                   -- insert the last annotations into the pi chat context\n/revdiff-clear                   -- clear stored review state\n/revdiff-reminders on            -- enable post-edit review reminders\n```\n\n**Notes:**\n\n- Requires the `revdiff` binary on `PATH`\n- Set `REVDIFF_BIN=/absolute/path/to/revdiff` if pi can't find the binary\n- Same-terminal mode is the default: pi temporarily suspends, revdiff takes over the terminal, and pi resumes on exit\n- Optional overlay mode (`--pi-overlay` or `REVDIFF_PI_MODE=overlay`) reuses the existing `launch-revdiff.sh` script from the Claude plugin integration; pi invokes the bundled script directly and does not honor Claude-plugin overrides (`CLAUDE_PLUGIN_DATA` is not set in the pi runtime)\n- Optional post-edit reminders are available via `/revdiff-reminders on` and suggest running `/revdiff` or `/revdiff-rerun` after agent edits\n- In the repo, the pi-specific resources live under `plugins/pi/` to keep harness integrations clearly separated\n\n## Codex Plugin\n\nrevdiff ships with a [Codex CLI](https://github.com/openai/codex) plugin for interactive diff review and plan annotation directly from a Codex session. The plugin provides two skills:\n\n- `/revdiff` — same diff review workflow as the Claude Code plugin (detect ref, launch overlay, capture annotations, feedback loop)\n- `/revdiff-plan` — extracts the last Codex assistant message from session rollout files, opens it in revdiff for annotation, and feeds feedback back\n\nThe plugin uses the same terminal overlay mechanism (tmux, Zellij, kitty, wezterm, etc.) as the Claude Code plugin.\n\n**Install:**\n\n```bash\n# clone the repo first\ngit clone https://github.com/umputun/revdiff.git\ncd revdiff\n\n# copy skills to Codex skills directory\ncp -r plugins/codex/skills/revdiff ~/.codex/skills/revdiff\ncp -r plugins/codex/skills/revdiff-plan ~/.codex/skills/revdiff-plan\n```\n\n**Requirements:**\n\n- `revdiff` binary on `PATH`\n- `jq` (required for `/revdiff-plan` session extraction)\n- One of the supported terminal multiplexers for overlay mode\n\n**Notes:**\n\n- Codex has no hook system — plan review requires manually invoking `/revdiff-plan` after Codex generates a plan\n- Scripts are portable copies from the Claude Code plugin, not symlinks\n- Plugin source lives under `plugins/codex/` in the repository\n\n### Integration with Other Tools\n\n#### OpenCode\n\nrevdiff integrates with [OpenCode](https://github.com/opencode-ai/opencode) via a tool, slash command, and plan-review plugin. The tool wraps the existing `launch-revdiff.sh` launcher, so terminal detection stays in sync automatically.\n\n**Install:**\n\n```bash\ncd plugins/opencode && bash setup.sh\n```\n\nThe setup script copies files to `~/.config/opencode/` and registers the plan-review plugin. See [plugins/opencode/README.md](plugins/opencode/README.md) for manual installation and details.\n\n**Commands inside OpenCode:**\n\n```text\n/revdiff                         -- review git diff with revdiff TUI\n/revdiff HEAD~3                  -- review last 3 commits\n```\n\nThe plan-review plugin automatically launches revdiff when the assistant exits plan mode, letting you annotate before approval.\n\n#### General\n\nThe structured stdout output works with any tool that can read text:\n\n```bash\n# capture annotations for processing\nannotations=$(revdiff main)\nif [ -n \"$annotations\" ]; then\n  echo \"$annotations\" | your-tool\nfi\n```\n\n## Usage\n\n```\nrevdiff [OPTIONS] [base] [against]\n```\n\nPositional arguments support several forms:\n- `revdiff` — uncommitted changes\n- `revdiff HEAD~3` — diff a single ref against the working tree\n- `revdiff main feature` — diff between two refs\n- `revdiff main..feature` — same as above, using git's dot-dot syntax\n- `revdiff main...feature` — changes since `feature` diverged from `main`\n\n### Options\n\n| Option | Description | Default |\n|--------|-------------|---------|\n| `base` | Git ref to diff against | uncommitted changes |\n| `against` | Second git ref for two-ref diff | |\n| `--staged` | Show staged changes, env: `REVDIFF_STAGED` | `false` |\n| `--tree-width` | File tree panel width in units (1-10), env: `REVDIFF_TREE_WIDTH` | `2` |\n| `--tab-width` | Number of spaces per tab character, env: `REVDIFF_TAB_WIDTH` | `4` |\n| `--no-colors` | Disable all colors including syntax highlighting, env: `REVDIFF_NO_COLORS` | `false` |\n| `--no-status-bar` | Hide the status bar, env: `REVDIFF_NO_STATUS_BAR` | `false` |\n| `--wrap` | Enable line wrapping in diff view, env: `REVDIFF_WRAP` | `false` |\n| `--collapsed` | Start in collapsed diff mode, env: `REVDIFF_COLLAPSED` | `false` |\n| `--cross-file-hunks` | Allow `[` and `]` to continue into adjacent files, env: `REVDIFF_CROSS_FILE_HUNKS` | `false` |\n| `--line-numbers` | Show line numbers in diff gutter, env: `REVDIFF_LINE_NUMBERS` | `false` |\n| `--blame` | Show blame gutter on startup, env: `REVDIFF_BLAME` | `false` |\n| `--word-diff` | Highlight intra-line word-level changes in paired add/remove lines, env: `REVDIFF_WORD_DIFF` | `false` |\n| `--no-confirm-discard` | Skip confirmation when discarding annotations with Q, env: `REVDIFF_NO_CONFIRM_DISCARD` | `false` |\n| `--chroma-style` | Chroma color theme for syntax highlighting, env: `REVDIFF_CHROMA_STYLE` | `catppuccin-macchiato` |\n| `--theme` | Load color theme from `~/.config/revdiff/themes/`, env: `REVDIFF_THEME` | |\n| `--dump-theme` | Print currently resolved colors as theme file to stdout and exit | |\n| `--list-themes` | Print available theme names to stdout and exit | |\n| `--init-themes` | Write bundled theme files to themes dir and exit | |\n| `--init-all-themes` | Write all gallery themes (bundled + community) to themes dir and exit | |\n| `--install-theme` | Install theme(s) from gallery or local file path and exit (repeatable) | |\n| `-A`, `--all-files` | Browse all tracked files, not just diffs (git or jj) | `false` |\n| `--stdin` | Review stdin as a scratch buffer (piped or redirected input only) | `false` |\n| `--stdin-name` | Synthetic file name for stdin content; enables extension-based highlighting/TOC | `scratch-buffer` |\n| `-I`, `--include` | Include only files matching prefix, may be repeated, env: `REVDIFF_INCLUDE` (comma-separated) | |\n| `-X`, `--exclude` | Exclude files matching prefix, may be repeated, env: `REVDIFF_EXCLUDE` (comma-separated) | |\n| `-F`, `--only` | Show only matching files by exact path or suffix, may be repeated (e.g. `--only=model.go`) | |\n| `-o`, `--output` | Write annotations to file instead of stdout, env: `REVDIFF_OUTPUT` | |\n| `--history-dir` | Directory for review history auto-saves, env: `REVDIFF_HISTORY_DIR` | `~/.config/revdiff/history/` |\n| `--config` | Path to config file, env: `REVDIFF_CONFIG` | `~/.config/revdiff/config` |\n| `--keys` | Path to keybindings file, env: `REVDIFF_KEYS` | `~/.config/revdiff/keybindings` |\n| `--dump-keys` | Print effective keybindings to stdout and exit | |\n| `--dump-config` | Print default config to stdout and exit | |\n| `-V`, `--version` | Show version info | |\n\n### Config File\n\nAll options can be set in a config file at `~/.config/revdiff/config` (INI format). CLI flags and environment variables override config file values.\n\nGenerate a default config file:\n\n```bash\nmkdir -p ~/.config/revdiff\nrevdiff --dump-config > ~/.config/revdiff/config\n```\n\nThen uncomment and edit the values you want to change.\n\n### Themes\n\nrevdiff ships with eight bundled color themes: **basic**, **catppuccin-latte**, **catppuccin-mocha**, **dracula**, **gruvbox**, **nord**, **revdiff**, and **solarized-dark**. Themes are stored in `~/.config/revdiff/themes/` and are automatically created on first run.\n\nPress `T` inside revdiff to open the interactive theme selector with live preview — browse themes, see colors applied instantly, and persist your choice to the config file on confirm.\n\n```bash\n# apply a theme\nrevdiff --theme dracula\n\n# list available themes\nrevdiff --list-themes\n\n# re-create bundled theme files (overwrites bundled, keeps custom themes)\nrevdiff --init-themes\n\n# install a specific theme from the gallery\nrevdiff --install-theme catppuccin-latte\n\n# install all gallery themes (bundled + community)\nrevdiff --init-all-themes\n\n# export current colors as a custom theme\nrevdiff --dump-theme > ~/.config/revdiff/themes/my-custom\n```\n\n**Creating custom themes** — two approaches:\n\n1. **From current colors:** customize individual colors in your config file or via `--color-*` flags, then dump the resolved result as a theme: `revdiff --dump-theme > ~/.config/revdiff/themes/my-custom`\n2. **From scratch:** copy a bundled theme and edit it directly — each file defines all 23 color keys plus `chroma-style` in INI format:\n\n```ini\n# name: my-custom\n# description: custom color scheme\nchroma-style = dracula\ncolor-accent = #bd93f9\ncolor-border = #6272a4\n...all 23 color keys...\n```\n\nSet a default theme in the config file:\n\n```ini\ntheme = dracula\n```\n\nOr via environment variable: `REVDIFF_THEME=dracula`.\n\n**Contributing themes** — community themes live in the `themes/gallery/` directory. See [themes/README.md](themes/README.md) for the contribution guide, format requirements, and validation instructions.\n\n**Precedence:** When `--theme` is set, it takes over completely — all 23 color fields and chroma-style are overwritten by the theme, ignoring any `--color-*` flags or env vars. Without `--theme`: built-in defaults → config file → env vars → CLI flags. `--theme` + `--no-colors` prints a warning and applies the theme.\n\n<details>\n<summary>Color customization flags (click to expand)</summary>\n\nAll color options accept hex values (`#rrggbb`) and have corresponding `REVDIFF_COLOR_*` env vars.\n\n| Option | Description | Default |\n|--------|-------------|---------|\n| `--color-accent` | Active pane borders and directory names | `#D5895F` |\n| `--color-border` | Inactive pane borders | `#585858` |\n| `--color-normal` | File entries and context lines | `#d0d0d0` |\n| `--color-muted` | Divider lines and status bar | `#585858` |\n| `--color-selected-fg` | Selected file text | `#ffffaf` |\n| `--color-selected-bg` | Selected file background | `#D5895F` |\n| `--color-annotation` | Annotation text and markers | `#ffd700` |\n| `--color-cursor-fg` | Cursor indicator color | `#bbbb44` |\n| `--color-cursor-bg` | Cursor indicator background | terminal default |\n| `--color-add-fg` | Added line text | `#87d787` |\n| `--color-add-bg` | Added line background | `#123800` |\n| `--color-remove-fg` | Removed line text | `#ff8787` |\n| `--color-remove-bg` | Removed line background | `#4D1100` |\n| `--color-word-add-bg` | Intra-line word-diff add background | auto-derived from add-bg |\n| `--color-word-remove-bg` | Intra-line word-diff remove background | auto-derived from remove-bg |\n| `--color-modify-fg` | Modified line text (collapsed mode) | `#f5c542` |\n| `--color-modify-bg` | Modified line background (collapsed mode) | `#3D2E00` |\n| `--color-tree-bg` | File tree pane background | terminal default |\n| `--color-diff-bg` | Diff pane background | terminal default |\n| `--color-status-fg` | Status bar foreground | `#202020` |\n| `--color-status-bg` | Status bar background | `#C5794F` |\n| `--color-search-fg` | Search match text | `#1a1a1a` |\n| `--color-search-bg` | Search match background | `#4a4a00` |\n\n</details>\n\n<details>\n<summary>Available chroma styles (click to expand)</summary>\n\n**Dark themes:** `aura-theme-dark`, `aura-theme-dark-soft`, `base16-snazzy`, `catppuccin-frappe`, `catppuccin-macchiato` (default), `catppuccin-mocha`, `doom-one`, `doom-one2`, `dracula`, `evergarden`, `fruity`, `github-dark`, `gruvbox`, `hrdark`, `monokai`, `modus-vivendi`, `native`, `nord`, `nordic`, `onedark`, `paraiso-dark`, `rose-pine`, `rose-pine-moon`, `rrt`, `solarized-dark`, `solarized-dark256`, `tokyonight-moon`, `tokyonight-night`, `tokyonight-storm`, `vim`, `vulcan`, `witchhazel`, `xcode-dark`\n\n**Light themes:** `autumn`, `borland`, `catppuccin-latte`, `colorful`, `emacs`, `friendly`, `github`, `gruvbox-light`, `igor`, `lovelace`, `manni`, `modus-operandi`, `monokailight`, `murphy`, `paraiso-light`, `pastie`, `perldoc`, `pygments`, `rainbow_dash`, `rose-pine-dawn`, `solarized-light`, `tango`, `tokyonight-day`, `trac`, `vs`, `xcode`\n\n**Other:** `RPGLE`, `abap`, `algol`, `algol_nu`, `arduino`, `ashen`, `average`, `bw`, `hr_high_contrast`, `onesenterprise`, `swapoff`\n\n</details>\n\n### Examples\n\n```bash\n# review uncommitted changes\nrevdiff\n\n# review changes against a branch\nrevdiff main\n\n# review staged changes\nrevdiff --staged\n\n# review last commit\nrevdiff HEAD~1\n\n# diff between two refs\nrevdiff main feature\n\n# same with git dot-dot syntax\nrevdiff main..feature\n\n# review only specific files\nrevdiff --only=model.go --only=README.md\n\n# browse all git-tracked files in a project\nrevdiff --all-files\n\n# browse all files, excluding vendor and mocks directories\nrevdiff --all-files --exclude vendor --exclude mocks\n\n# include only src/ files\nrevdiff --include src\n\n# include src/ but exclude src/vendor/\nrevdiff --include src --exclude src/vendor\n\n# exclude paths in normal diff mode\nrevdiff main --exclude vendor\n\n# review a file outside a VCS repo (context-only, no diff markers)\nrevdiff --only=/tmp/plan.md\n\n# review a file that has no VCS changes (context-only view with annotations)\nrevdiff --only=docs/notes.txt\n\n# review arbitrary piped text as a scratch buffer\nprintf '# Plan\\n\\nShip it\\n' | revdiff --stdin --stdin-name plan.md\n\n# capture annotations from generated output\nsome-command | revdiff --stdin --output /tmp/annotations.txt\n```\n\n### All-Files Mode\n\nUse `--all-files` (or `-A`) to browse all tracked files in a project, not just files with changes. This turns revdiff into a general-purpose code annotation tool. All files are shown in context-only mode (no `+`/`-` markers) with full annotation and syntax highlighting support.\n\n`--all-files` requires a git or jj repository (uses `git ls-files` or `jj file list` for file discovery) and is mutually exclusive with refs, `--staged`, and `--only`. Not supported in hg repos.\n\nCombine with `--include` (or `-I`) to narrow to specific paths and `--exclude` (or `-X`) to filter out unwanted paths:\n\n```bash\nrevdiff --all-files --include src\nrevdiff --all-files --include src --exclude src/vendor\nrevdiff --all-files --exclude vendor --exclude mocks\n```\n\n`--include` and `--exclude` both use prefix matching: `--include src` keeps only `src/`, `src/foo.go`, etc. `--exclude vendor` skips `vendor/`, `vendor/foo.go`, etc. Both work in `--all-files` and normal diff modes and are composable: include narrows first, then exclude removes from the included set.\n\nBoth options can be persisted in the config file:\n\n```ini\ninclude = src\nexclude = vendor\nexclude = mocks\n```\n\nOr via environment variables (comma-separated): `REVDIFF_INCLUDE=src`, `REVDIFF_EXCLUDE=vendor,mocks`.\n\n### Context-Only File Review\n\nWhen `--only` specifies a file that has no VCS changes (or when no VCS repo exists at all), revdiff shows the file in context-only mode: all lines are displayed without `+`/`-` gutter markers, with full annotation and syntax highlighting support. This enables reviewing arbitrary files without requiring VCS context.\n\nTwo scenarios trigger this mode:\n\n1. **Inside a repo (git/hg/jj)** - `--only` files not in the diff are read from disk and shown alongside any changed files\n2. **Outside a VCS repo** - `--only` is required; files are read directly from disk\n\n### Scratch-Buffer Review\n\nUse `--stdin` to review arbitrary piped or redirected text as a single synthetic file. All lines are shown as context, so the normal single-file review flow still works: annotations, file-level notes, search, wrap, collapsed mode, and structured output.\n\n`--stdin` is explicit and mutually exclusive with refs, `--staged`, `--only`, `--all-files`, `--include`, and `--exclude`. stdin mode requires piped or redirected input; plain terminal stdin is rejected to avoid accidentally launching an empty scratch buffer.\n\nUse `--stdin-name` to control the synthetic filename. This gives annotation output a stable key and enables filename-based syntax highlighting or markdown TOC activation:\n\n```bash\necho \"plain text\" | revdiff --stdin\nprintf '# Plan\\n\\nBody\\n' | revdiff --stdin --stdin-name plan.md\ngit show HEAD~1:README.md | revdiff --stdin --stdin-name README.md\n```\n\n### Markdown TOC Navigation\n\nWhen reviewing a single markdown file in context-only mode (e.g., `revdiff --only=README.md` or `printf '# title\\n' | revdiff --stdin --stdin-name plan.md`), revdiff shows a table-of-contents pane on the left listing all markdown headers. Use `Tab` to switch focus between the TOC and diff panes, `j`/`k` to navigate headers, and `Enter` to jump to a header in the diff. The TOC automatically highlights the current section as you scroll through the file.\n\nThis mode activates when all three conditions are met: single file, markdown extension (`.md`/`.markdown`), and all lines are context (no diff changes). Headers inside fenced code blocks are excluded from the TOC.\n\n### Beyond Code Review\n\nThe `--only` flag enables use cases beyond VCS diffs. Any text file can be loaded for annotation — no VCS repo required.\n\n**Reviewing AI-generated drafts** — When an AI assistant drafts text to be posted publicly (PR comments, issue responses, release notes), write it to a temp file and review in revdiff. Annotate specific lines with changes, the assistant reads annotations and rewrites, re-open to verify. Same annotate-fix-verify loop as code review.\n\n**Reviewing documentation and specs** — Markdown files, API specs, config files, and plan documents can all be reviewed with inline annotations. Useful for reviewing RFCs, annotating configs before deployment, or marking up plans with questions.\n\n```bash\nrevdiff --only=docs/plans/feature.md\nrevdiff --only=/tmp/draft-comment.md\n```\n\n**Reviewing generated output** — CI configs, Terraform plans, generated migrations, or command output. Load files with `--only` or stream ephemeral output with `--stdin`, annotate what needs fixing, feed annotations back to the generator.\n\n### Zed Integration\n\nZed's [custom tasks](https://zed.dev/docs/tasks) can launch revdiff directly in an editor terminal tab.\n\nSee the [Zed integration guide](https://revdiff.com/docs.html#zed-integration) for ready-to-use task definitions, keybinding setup, and platform-specific clipboard notes.\n\n### Review History\n\nWhen you quit with annotations (`q`), revdiff automatically saves a copy of the review session to `~/.config/revdiff/history/<repo-name>/<timestamp>.md`. This is a safety net — if annotations are lost (process crash, agent fails to capture stdout), the history file preserves them.\n\nEach history file contains:\n- Header with path, refs, and (git only) a short commit hash\n- Full annotation output (same format as stdout)\n- Raw git diff for annotated files only\n\nHistory auto-save is always on and silent — errors are logged to stderr, never fail the process. No history is saved on discard quit (`Q`) or when there are no annotations. For `--stdin` mode, files are saved under `stdin/` subdirectory; for `--only` without git, the parent directory name is used instead of a repo name.\n\nOverride the history directory with `--history-dir`, `REVDIFF_HISTORY_DIR` env var, or `history-dir` in the config file.\n\nIn the Claude Code and Codex plugins, you can also tell the agent to use a past review by saying things like \"locate my latest revdiff review\" or \"use the annotations from the review I just did in another terminal\". The plugin reads the newest history file for the current repo via the helper script `read-latest-history.sh` and processes the annotations as if they had come from a fresh launcher call. This is useful for standalone revdiff runs outside the plugin, or when the live launcher output is unavailable (e.g., a broken custom launcher or a crashed agent).\n\n### Key Bindings\n\n**Navigation:**\n\n| Key | Action |\n|-----|--------|\n| `j/k` or up/down | Navigate files (tree) / scroll diff (diff pane) |\n| `h/l` | Switch between file tree and diff pane |\n| left/right | Horizontal scroll in diff pane (truncated lines show `«` / `»` overflow indicators at the edges) |\n| `Tab` | Switch between file tree and diff pane |\n| `PgDown/PgUp` | Page scroll in file tree and diff pane |\n| `Ctrl+d/Ctrl+u` | Half-page scroll in file tree and diff pane |\n| `Home/End` | Jump to first/last item |\n| `Enter` | Switch to diff pane (tree) / start annotation (diff pane) |\n| `n/p` | Next/previous changed file; next/prev header in markdown TOC mode (n = next match when search active) |\n| `[` / `]` | Jump to previous/next change hunk in diff; add `--cross-file-hunks` to continue into the previous/next file at the boundary |\n\n**Search:**\n\n| Key | Action |\n|-----|--------|\n| `/` | Start search in diff pane |\n| `n` | Next search match (overrides next file when search active) |\n| `N` | Previous file (previous search match when searching) |\n| `Esc` | Cancel search input / clear search results |\n\n**Annotations:**\n\n| Key | Action |\n|-----|--------|\n| `a` or `Enter` (diff pane) | Annotate current diff line |\n| `A` | Add file-level annotation (stored at top of diff) |\n| `@` | Toggle annotation list popup (navigate and jump to any annotation) |\n| `d` | Delete annotation under cursor |\n| `Ctrl+E` (during annotation input) | Open `$EDITOR` for multi-line annotation |\n| `Esc` | Cancel annotation input |\n\nWhile the annotation input is active, press `Ctrl+E` to hand off the current text to an external editor for multi-line comments. Editor resolution: `$EDITOR` → `$VISUAL` → `vi`. Values with arguments work (e.g. `EDITOR=\"code --wait\"`). On editor save and quit, the full file contents (including newlines) become the annotation. Quitting the editor with an empty file cancels the annotation and preserves any previously stored note on that line. Multi-line annotations are rendered line-by-line in the diff view, shown flattened in the annotation list popup (`@`), and emitted with embedded newlines in the structured output.\n\n**View:**\n\n| Key | Action |\n|-----|--------|\n| `v` | Toggle collapsed diff mode (shows final text with change markers) |\n| `w` | Toggle word wrap (long lines wrap with `↪` continuation markers) |\n| `t` | Toggle tree/TOC pane visibility (gives diff full terminal width) |\n| `L` | Toggle line numbers (side-by-side old/new for diffs, single column for full-context files) |\n| `B` | Toggle blame gutter (author name + commit age per line) |\n| `W` | Toggle intra-line word-diff highlighting for paired add/remove lines |\n| `.` | Expand/collapse individual hunk under cursor (collapsed mode only) |\n| `T` | Open theme selector with live preview |\n| `f` | Toggle filter: all files / annotated only (shown when annotations exist) |\n| `?` | Toggle help overlay showing all keybindings |\n| `i` | Toggle commit info popup (subject + body of commits in the current ref range; git/hg/jj only) |\n| `q` | Quit, output annotations to stdout |\n| `Q` | Discard all annotations and quit (confirms if annotations exist) |\n\n### Status Bar Icons\n\nThe status bar shows a fixed row of mode indicators on the right side. All ten slots are always rendered — active modes use the status bar foreground color, inactive modes use muted gray, so the row occupies the same width regardless of what's toggled on.\n\n| Icon | Toggle | Meaning |\n|------|--------|---------|\n| `▼` | `v` | Collapsed diff mode |\n| `◉` | `f` | Filter: annotated files only |\n| `↩` | `w` | Word wrap mode |\n| `≋` | `/` | Search active |\n| `⊟` | `t` | Tree/TOC pane hidden (diff uses full width) |\n| `#` | `L` | Line numbers visible in gutter |\n| `b` | `B` | Blame gutter visible |\n| `±` | `W` | Intra-line word-diff highlighting |\n| `✓` | `Space` | Reviewed count (increments when a file is marked reviewed) |\n| `∅` | `u` | Untracked files visible in tree |\n\nOn narrow terminals, the left-hand segments are dropped before the icons: search position first, then line and hunk info, then the filename truncates. The icon row on the right stays put.\n\n### Custom Keybindings\n\nAll keybindings can be customized via a keybindings file at `~/.config/revdiff/keybindings`. Override the path with `--keys` flag or `REVDIFF_KEYS` env var.\n\nThe file uses a simple `map`/`unmap` format (blank lines and `#` comments are ignored):\n\n```\n# ~/.config/revdiff/keybindings\nmap ctrl+d half_page_down\nmap ctrl+u half_page_up\nmap x quit\nunmap q\n```\n\n- `map <key> <action>` — binds a key to an action (additive, defaults are kept unless explicitly unmapped)\n- `unmap <key>` — removes a default binding\n\nGenerate a template with all current bindings:\n\n```bash\nmkdir -p ~/.config/revdiff\nrevdiff --dump-keys > ~/.config/revdiff/keybindings\n```\n\nThen edit to taste. Modal keys (annotation input, search input, confirm discard) are not remappable.\n\n<details>\n<summary>Available actions (click to expand)</summary>\n\n**Navigation:** `down`, `up`, `page_down`, `page_up`, `half_page_down`, `half_page_up`, `home`, `end`, `scroll_left`, `scroll_right`\n\n**File/Hunk:** `next_item`, `prev_item`, `next_hunk`, `prev_hunk`\n\n**Pane:** `toggle_pane`, `focus_tree`, `focus_diff`\n\n**Search:** `search`\n\n**Annotations:** `confirm` (annotate line / select file), `annotate_file`, `delete_annotation`, `annot_list`\n\n**View:** `toggle_collapsed`, `toggle_wrap`, `toggle_tree`, `toggle_line_numbers`, `toggle_blame`, `toggle_word_diff`, `toggle_hunk`, `toggle_untracked`, `mark_reviewed`, `theme_select`, `filter`, `commit_info`\n\n**Quit:** `quit`, `discard_quit`, `help`, `dismiss`\n\n</details>\n\n### Output Format\n\n```\n## handler.go (file-level)\nconsider splitting this file into smaller modules\n\n## handler.go:43 (+)\nuse errors.Is() instead of direct comparison\n\n## handler.go:43-67 (+)\nrefactor this hunk to reduce nesting\n\n## store.go:18 (-)\ndon't remove this validation\n```\n\nWhen annotation text contains the keyword \"hunk\" (case-insensitive, whole word), the output header automatically expands to include the full hunk line range (e.g., `handler.go:43-67 (+)` instead of `handler.go:43 (+)`). This gives AI consumers the range context without any extra steps.\n\nComment body lines starting with `## ` (the record-header form) are prefixed with a single space on output so parsers that split on `## ` record headers cannot confuse a multi-line comment for a new record.\n\n## Contributing\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for details.\n\n## License\n\nMIT License - see [LICENSE](LICENSE) file for details.\n","summary":"revdiff is a lightweight terminal UI designed to let developers review code diffs, files, and documents with inline annotations that are emitted as structured JSON on exit, making it easy to pipe results into AI agents or scripts. It offers a two‑pane layout with syntax‑highlighted diffs, optional intra‑line word‑diff, hunk navigation, blame gutters, and a sortable annotation list, plus support for git, Mercurial, and Jujutsu repositories. The tool also handles single‑file diffs, file‑tree filtering, Markdown TOC navigation, commit‑message popups, and even raw stdin reviews, all configurable via flags, environment variables or a config file. Ideal for developers and reviewers who need quick, terminal‑based revision sessions—especially during AI‑powered coding or automated review workflows.","description":"TUI for reviewing diffs, files, and documents with inline annotations","stars":318,"language":"Go"},{"owner":"batrachianai","repo":"textual-diff-view","url":"https://github.com/batrachianai/textual-diff-view","readme":"# Textual Diff View\n\nTextual Diff View is a [Textual](https://github.com/textualize/textual) widget to display beautiful diffs in your terminal application.\nOriginally built for [Toad](https://github.com/batrachianai/toad), this widget may be used standalone.\n\nThis is what it can look like...\n\n<img src=\"https://github.com/batrachianai/textual-diff-view/raw/main/images/diffbanner.png\">\n\n## Features\n\nThe `DiffView` widget displays two versions of a file with syntax and changes clearly highlighted.\nDeleted lines / characters are shown with a red highlight.\nAdded lines / characters are shown with a green highlight.\n\nThere are two layout options; a *unified* view which shows the two files top-to-bottom with highlights, and a *split* view which shows the two files next to each other.\n\n`DiffView` can also display annotations (\"+\" and \"-\" for added and deleted), to improve readability for color blind users.\n\nTextual's theming system provides a variety of themes for the diff view, both light and dark.\n\n## Example\n\nThe following is a simple app to display a diff between two files from the command line.\n\n```python\nfrom textual.app import App, ComposeResult\nfrom textual import containers\nfrom textual.reactive import var\nfrom textual import widgets\n\nfrom textual_diff_view import DiffView, LoadError\n\n\nclass DiffApp(App):\n    \"\"\"Simple app to display a diff between two files.\"\"\"\n\n    BINDINGS = [\n        (\"space\", \"toggle('split')\", \"Toggle split\"),\n        (\"a\", \"toggle('annotations')\", \"Toggle annotations\"),\n    ]\n\n    split = var(True)\n    annotations = var(True)\n\n    def __init__(self, original: str, modified: str) -> None:\n        self.original = original\n        self.modified = modified\n        super().__init__()\n\n    def compose(self) -> ComposeResult:\n        yield containers.VerticalScroll(id=\"diff-container\")\n        yield widgets.Footer()\n\n    async def on_mount(self) -> None:\n        try:\n            diff_view = await DiffView.load(self.original, self.modified)\n        except LoadError as error:\n            self.notify(str(error), title=\"Failed to load code\", severity=\"error\")\n        else:\n            diff_view.data_bind(DiffApp.split, DiffApp.annotations)\n            await self.query_one(\"#diff-container\").mount(diff_view)\n\n\nif __name__ == \"__main__\":\n    import sys\n\n    if len(sys.argv) != 3:\n        print(\"Usage python tdiff.py PATH1 PATH2\\nTry: python tdiff.py example1.rs example2.rs\")\n    else:\n        app = DiffApp(sys.argv[1], sys.argv[2])\n        app.run()\n```\n\nYou can find thi
