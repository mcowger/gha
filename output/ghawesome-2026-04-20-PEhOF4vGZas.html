blocks with your saved session choices and copyable prompts.\n\n```\nWaste factor = current tokens/turn ÷ baseline tokens/turn\n\n  1x = efficient (fresh session)\n  5x = growing\n 10x = blocked — start fresh\n```\n\n### `PostToolUse` — blocks during autonomous work\n\nWhen Claude is working autonomously (editing files, running commands), there's no user prompt to intercept. The PostToolUse hook catches this — after each tool call, it checks the waste factor and blocks if too high.\n\nUses exit code 2, which Claude Code treats as a blocking error. Claude acknowledges it, writes a handoff summary, and stops.\n\nAlso detects: cache degradation, token spikes, resume anomalies, edit thrashing, and **buggy Claude Code versions** (2.1.69-2.1.89 have a known cache bug that burns 10-20x tokens).\n\n### `PreCompact` — saves context before compaction\n\nFires at the exact moment before Claude Code compacts your context. Saves session state as a fallback in case PostCompact doesn't fire.\n\n### `PostCompact` — captures Claude's summary + mechanical state\n\nFires after compaction. Merges Claude's own LLM-generated summary with mechanically extracted structured data (files, commits, commands) from the JSONL transcript.\n\n### `SessionStart` — injects previous session context\n\nWhen you start a new session, clauditor reads saved handoff files for this project and injects them into Claude's context. If multiple sessions exist (last 24h), Claude presents the choice.\n\n### `PreToolUse` — prevents known errors\n\nBefore Claude runs a command, clauditor checks the local error index (and optionally the team hub) for previous failures with the same binary. If a known fix exists with sufficient confidence, it injects it as context — non-blocking, so Claude can adapt without being stopped.\n\n```\n[clauditor]: `npm run build` has failed 5 times on this project.\nLast error: Module not found: Cannot resolve @/lib/db\nKnown fix: `npx drizzle-kit push && npm run build`\n```\n\nIf the command succeeds after the warning, confidence increases. If it fails despite the warning, confidence decreases. The knowledge base self-corrects over time.\n\n### `Stop` — blocks infinite loops\n\nWhen Claude repeats the same tool call 3+ times with identical input and output, the Stop hook blocks it.\n\n## Real data\n\nFrom a real user's Claude Code usage over 7 days:\n\n```\n  TURNS  BASE   NOW   WASTE  TOKENS\n  ──────────────────────────────────────────────────────────\n    317   21k  417k  20.1x    73M  ████████████████████\n    576   28k  401k  14.5x   116M  ███████████████\n    172   23k  249k    11x    25M  ███████████\n    164   26k  220k   8.6x    21M  █████████\n    230   28k  218k   7.8x    31M  ████████\n    ...\n  ──────────────────────────────────────────────────────────\n  37 sessions · 418M tokens total\n  15 sessions burned 5x+ more quota than necessary\n\n  clauditor impact\n  With rotation on all sessions: 157M tokens instead of 418M\n  Potential savings: 261M tokens (62% less quota)\n```\n\n## Dashboard (optional)\n\n```bash\nclauditor watch\n```\n\n```\n── clauditor ──  4 sessions + 3 subagents (last 12h)\n\n LAST 7 DAYS\n 37 sessions · 15 burned 5x+ quota\n Worst: api/service (317 turns, 20.1x waste — 21k→417k/turn)\n With rotation: 157M tokens instead of 418M (62% savings)\n\n api-service (feat/variable-agent)  opus-4-6 · 239 turns\n\n Waste factor: 8x  BLOCKED — start a fresh session\n ██████████████████████████████\n Started at 20k/turn → now 153k/turn (8x more quota per turn)\n\n Cache: 98%  Turns: 239  ~$64 API est.\n```\n\n## Peak vs off-peak analysis\n\n```bash\nclauditor time\n```\n\nShows token costs by hour of day to detect if peak hours burn more quota:\n\n```\n  Token Usage by Hour — last 7 days\n  ──────────────────────────────────────────────────────────\n  10:00    98k/turn   304 turns  cache  92%  ███████████\n  14:00   124k/turn   289 turns  cache  96%  ██████████████\n  18:00   164k/turn   275 turns  cache  98%  ██████████████████\n  ──────────────────────────────────────────────────────────\n  Peak (9am-5pm):    114k avg tokens/turn\n  Off-peak:          154k avg tokens/turn\n```\n\n## All commands\n\n| Command | Description |\n|---|---|\n| `clauditor` | Show quota report (default) |\n| `clauditor install` | Register hooks into Claude Code (one-time) |\n| `clauditor uninstall` | Remove hooks |\n| `clauditor watch` | Live dashboard showing waste factor |\n| `clauditor report` | Quota usage report with waste bars |\n| `clauditor share` | Copy-pasteable summary for social media |\n| `clauditor time` | Token usage by hour of day (peak vs off-peak) |\n| `clauditor sessions` | See where your tokens went |\n| `clauditor status` | Quick health check (no TUI) |\n| `clauditor impact` | Lifetime stats |\n| `clauditor activity` | Recent actions log |\n| `clauditor stats` | Historical usage analysis |\n| `clauditor doctor` | Scan for cache bugs |\n| `clauditor calibrate` | Auto-calibrate rotation threshold |\n| `clauditor suggest-skill` | Find repeating workflows |\n| `clauditor knowledge` | Show accumulated errors and file activity |\n| `clauditor handoff-report` | Measure information preservation of last session handoff |\n| `clauditor login` | Sign in to clauditor hub (opens browser, or `--device` for SSH) |\n\n## Audit-only mode (no hooks)\n\nDon't want clauditor to block or modify your sessions? Skip `clauditor install` and use it as a read-only analytics tool:\n\n```bash\nbrew install IyadhKhalfallah/clauditor/clauditor\n# or: npm install -g @iyadhk/clauditor\nclauditor report      # see waste across all sessions\nclauditor time        # peak vs off-peak token analysis\nclauditor sessions    # per-session breakdown\nclauditor doctor      # scan for cache bugs\nclauditor share       # copy-pasteable summary\n```\n\nThese commands read your session JSONL files directly. No hooks registered, no session modifications, no side effects.\n\n## Works alongside other tools\n\nclauditor operates at the **session boundary** layer — it monitors waste and rotates sessions. Other tools work at different layers and are fully compatible:\n\n| Tool | Layer | What it does | Conflicts? |\n|---|---|---|---|\n| [Headroom](https://github.com/chopratejas/headroom) | API proxy | Compresses tool output tokens (~34% savings per turn) | No — works at HTTP level |\n| [MemStack](https://github.com/cwinvestments/memstack) | Persistent memory | SQLite + vector DB for cross-session knowledge | No — uses skills + rules |\n| [Claude Workspace Optimizer](https://oakenai.tech/tools/claude-workspace-optimizer) | Static workspace | Audits CLAUDE.md and memory files for bloat | No — runs before sessions |\n| [GrapeRoot](https://github.com/nicobailon/graperoot) | Per-turn context | Builds code graph, pre-loads relevant files | No — complementary |\n| [Hippo Memory](https://github.com/kitfunso/hippo-memory) | Persistent memory | Neuroscience-inspired memory with decay | No — different approach |\n\nYou can run all of them together. clauditor handles when to rotate; the others optimize what happens within a session.\n\n## Configuration\n\nEverything works out of the box. One config file at `~/.clauditor/config.json`:\n\n```json\n{\n  \"rotation\": {\n    \"enabled\": true,\n    \"threshold\": 100000,\n    \"minTurns\": 30\n  },\n  \"notifications\": {\n    \"desktop\": true\n  }\n}\n```\n\n| Setting | Default | Description |\n|---|---|---|\n| `rotation.enabled` | `true` | Enable/disable session rotation |\n| `rotation.threshold` | `100000` | Tokens/turn average to trigger block |\n| `rotation.minTurns` | `30` | Minimum turns before blocking |\n| `notifications.desktop` | `true` | Desktop notifications for cache issues |\n\nCreated automatically on `clauditor install`. Edit to customize.\n\n## How it saves context\n\nclauditor combines two methods to maximize information preservation during session rotation.\n\n### Structured handoff template\n\nWhen clauditor blocks a session for rotation, it tells Claude to write its handoff in a structured format:\n\n```\nTASK: (what you were working on)\nCOMPLETED: (what's done)\nIN_PROGRESS: (what's partially done, with file paths)\nFAILED_APPROACHES: (what was tried and didn't work, and WHY)\nDEPENDENCIES: (things that must happen in order)\nDECISIONS: (choices made and why)\nUSER_PREFERENCES: (what the user asked for or rejected)\nBLOCKERS: (unresolved issues)\n```\n\nThis captures what only Claude knows — reasoning, rejected approaches, conditionals — in a parseable format. The parser detects structured output (2+ section headers) and falls back to prose if Claude doesn't follow the template.\n\n### Mechanical extraction\n\nEvery handoff also includes structured data extracted mechanically from the JSONL transcript:\n\n- Files modified and read\n- Git commits (verbatim messages)\n- Key commands and results (builds, tests, deploys)\n- Recent user messages\n\nThis data is deterministic — no LLM interpretation, no paraphrasing, no loss.\n\n### Why both?\n\nResearch shows LLM-generated summaries suffer from knowledge overwriting and semantic drift ([Size-Fidelity Paradox](https://arxiv.org/abs/2602.09789)). Mechanical extraction preserves files and commits deterministically. Claude's prose captures reasoning the transcript can't. Together they give the next session the best possible starting point.\n\n```bash\nclauditor handoff-report   # see what your last handoff contains\n```\n\n```\n  Structural Coverage\n  ────────────────────────────────────────────────────\n\n  Score:  73% (11/15 structural items in handoff)\n\n  Files modified         2/4  ██████████░░░░░░░░░░\n  Commits                2/2  ████████████████████\n  Files read             3/5  ████████████░░░░░░░░\n  Commands               2/2  ████████████████████\n```\n\n### Per-session storage\n\nEach handoff is saved as a separate timestamped file:\n\n```\n~/.clauditor/sessions/<encoded-project-path>/<timestamp>.md\n```\n\nMultiple sessions in the same project don't overwrite each other. Files older than 24h are cleaned up automatically.\n\n### Session resume flow\n\n1. clauditor blocks your session (or `/compact` fires)\n2. Context is saved — structured template + mechanical data\n3. You open a new session and type \"continue\"\n4. clauditor blocks with your saved sessions and copyable prompts\n5. You paste the prompt — Claude reads the file and picks up where you left off\n\n## Project memory\n\nclauditor learns from your sessions and builds per-project knowledge at `~/.clauditor/knowledge/<project>/`.\n\n**Error index with confidence decay** — Records failed commands and their fixes. Each error has a confidence score (0–1) that decays with a 45-day half-life. Recent errors rank above old ones. Stale errors fade naturally instead of accumulating forever.\n\n```\n  npm run build          conf=0.85  (confirmed, 5x)\n  npx drizzle-kit push   conf=0.30  (inferred, 1x)\n```\n\n**Noise filtering** — Typo commands (`command not found`), transient network errors (`ETIMEDOUT`), and tiny error messages are filtered at capture time. Keeps the error index clean from day one.\n\n**Implicit outcome tracking** — When `PreToolUse` warns about a command and `PostToolUse` sees the result, confidence adjusts automatically. Command succeeded after warning? +0.1. Failed despite warning? -0.15. Self-correcting, zero effort.\n\n**Confidence tiers** — Errors are labeled `confirmed` (0.7+), `observed` (0.4+), `inferred` (0.2+), or `stale` (<0.2). Claude sees the tier in the injection, so it knows how much to trust each entry.\n\n**File tracker** — Tracks edit/read counts across sessions. Identifies \"hot files\" (5+ edits across 3+ sessions) and injects context when Claude touches them, so it knows the file's history.\n\n```bash\nclauditor knowledge   # see accumulated errors and file activity\n```\n\n## Team knowledge sync (optional, beta)\n\nFor teams, clauditor can optionally connect to a hub for shared knowledge:\n\n```bash\nclauditor login\n```\n\nOpens your browser to sign in. For SSH or headless environments:\n\n```bash\nclauditor login --device\n\n  Visit: https://www.clauditor.ai/device\n  Enter code: XPFN-8442\n```\n\nWhen connected:\n- **PreToolUse** queries the hub before Bash commands — team errors and fixes are shared\n- **PostToolUse** pushes error fragments to the hub and queries for file context\n- **SessionStart** pulls a compact team knowledge brief\n\nKnowledge starts as developer-scoped and auto-promotes to team-scoped when multiple developers report the same issue. No hub required for solo use — all local features work independently.\n\n## Cross-project session handoffs\n\nSession handoffs work across projects. If you save a session in project A and open project B, clauditor finds it. Cross-project sessions show `[project-name]` labels so you know where they came from.\n\n## Version-aware warnings\n\nclauditor detects if your sessions ran on Claude Code versions 2.1.69-2.1.89, which have a [confirmed prompt caching bug](https://github.com/anthropics/claude-code/issues/34629) that causes 10-20x token consumption. The warning appears in `clauditor report` and via real-time hooks.\n\n## Technical details\n\n**Why sessions get expensive:**\n\nEvery Claude Code API call sends: `tools` → `system prompt` → `CLAUDE.md` → `conversation history`. The conversation history grows linearly. Cache makes the prefix cheap (cache_read), but the growing tail requires cache_create each turn.\n\n```\nAPI call = tools (cached) + system (cached) + history (grows every turn)\n```\n\nAfter 200 turns, the history alone can be 200k+ tokens. A fresh session resets this to near zero.\n\n**What clauditor monitors:**\n\n| Metric | Source | Formula |\n|---|---|---|\n| Tokens/turn | JSONL `usage` field | `input + output + cache_read + cache_create` |\n| Baseline | First 5 turns of session | Average tokens/turn |\n| Current | Last 5 turns of session | Average tokens/turn |\n| Waste factor | Derived | `current ÷ baseline` |\n| Cache ratio | JSONL `usage` field | `cache_read ÷ (input + cache_read + cache_create)` |\n\n**Hook communication:**\n\n| Hook | Mechanism | Why |\n|---|---|---|\n| `UserPromptSubmit` | Exit code 2 + stderr | Hard block — stops prompt, shows message |\n| `PostToolUse` | Exit code 2 + stderr | Blocking error — Claude acknowledges and stops |\n| `PreToolUse` | `additionalContext` | Injects known error fixes before commands |\n| `PreCompact` | File write | Saves fallback state at compaction moment |\n| `PostCompact` | File write | Captures Claude's own LLM summary |\n| `SessionStart` | `additionalContext` | Injects previous session state |\n| `Stop` | `decision: \"block\"` | Prevents infinite loops |\n\n## Limitations\n\n- **Cannot reduce Claude Code's context assembly.** We observe and advise — we don't modify what Claude Code sends to the API.\n- **Cannot see quota.** Anthropic doesn't expose quota data. The waste factor is a proxy based on token growth.\n- **Cache reads may or may not count toward quota.** The exact quota accounting for Max plan subscribers is not published.\n- **Web sessions not supported.** Only CLI and IDE extensions write local JSONL files.\n- **Per-device only.** Sessions don't sync across machines.\n- **VS Code UserPromptSubmit limitation.** The \"continue\" prompt block works in CLI but [may not fire in VS Code](https://github.com/anthropics/claude-code/issues/17277). Context is still injected via SessionStart.\n\n## Development\n\n```bash\ngit clone https://github.com/IyadhKhalfallah/clauditor.git\ncd clauditor\nnpm install\nnpm test        # 275 tests\nnpm run build\nnpm link        # makes `clauditor` available globally\n```\n\n## Legal\n\nMIT License. Not affiliated with or endorsed by Anthropic.\n\n- No leaked source code was referenced or used\n- All features derived from official docs, public community discussions, and independent observation\n- \"clauditor\" = \"Claude\" + \"auditor\", used in a descriptive, nominative sense\n\n## Contributing\n\nContributions welcome. Rules:\n\n- **No leaked source code.** Do not reference or derive logic from non-public Anthropic code.\n- **Attributable knowledge only.** Official docs, public GitHub issues, community posts, or independent observation.\n- **Clean-room implementation.** If unsure about a knowledge source, don't contribute it.\n\n## License\n\nMIT\n","summary":"clauditor is a lightweight wrapper for Anthropic’s Claude Code that tracks session size and prevents users from inadvertently exhausting their token quota by repeatedly sending long conversation histories. It hooks into the CLI, VS Code, and JetBrains extensions to block requests when a “waste factor” is exceeded, automatically saves the session state, and guides users to resume with a simple “continue” command. The tool offers instant feedback, a concise saved session list, and requires no configuration or dashboard. It is ideal for developers and power‑users who run long Claude Code sessions and want to keep token usage efficient without losing context.","description":"Stop Claude Code from burning through your quota in 20 minutes. Auto-rotates oversized sessions and preserves context.","stars":365,"language":"TypeScript"},{"owner":"grayashh","repo":"buddy-reroll","url":"https://github.com/grayashh/buddy-reroll","readme":"# buddy-reroll\n\n> [!IMPORTANT]\n> **This project is no longer maintained.**\n> As of Claude Code v2.1.97, the `/buddy` command has been removed.\n> Meet your buddy in [Notch](https://github.com/talkvalue/Buddi) instead — a new home for buddies.\n\n---\n\nPick the perfect [Claude Code](https://docs.anthropic.com/en/docs/claude-code) `/buddy` companion — any species, rarity, eye, hat, shiny, and stat combination you want.\n\n<img width=\"1390\" height=\"1010\" alt=\"buddy-reroll screenshot\" src=\"https://github.com/user-attachments/assets/0786f4b8-35e2-4433-90af-25a0d9ebe1a9\" />\n\n<p align=\"center\" width=\"100%\">\n<video src=\"https://github.com/user-attachments/assets/5de52c98-ce3c-428f-bd2d-7f208e1a6d38\" width=\"80%\" controls></video>\n</p>\n\n## Install\n\n```bash\n# Bun (recommended)\nbunx buddy-reroll\n\n# npm\nnpx buddy-reroll\n```\n\nBun is faster, but Node.js >= 20 produces identical results — no Bun required.\n\n## Usage\n\n```bash\n# Interactive — pick your buddy step by step\nbuddy-reroll\n\n# Know what you want? Go direct\nbuddy-reroll --species dragon --rarity legendary --eye ✦ --hat propeller --shiny\n\n# Just pick a few things, leave the rest to chance\nbuddy-reroll --species cat --rarity epic\n\n# Choose your buddy's strengths\nbuddy-reroll --peak WISDOM --dump CHAOS\n\n# See what's available\nbuddy-reroll --list\n\n# Check your current buddy\nbuddy-reroll --current\n\n# Keep your buddy after Claude updates\nbuddy-reroll --hook\n\n# Stop keeping after updates\nbuddy-reroll --unhook\n\n# Something wrong? Check your setup\nbuddy-reroll --doctor\n\n# Undo everything\nbuddy-reroll --restore\n```\n\n## Options\n\n| Flag | Values |\n|---|---|\n| `--species` | duck, goose, blob, cat, dragon, octopus, owl, penguin, turtle, snail, ghost, axolotl, capybara, cactus, robot, rabbit, mushroom, chonk |\n| `--rarity` | common, uncommon, rare, epic, legendary |\n| `--eye` | `·` `✦` `×` `◉` `@` `°` |\n| `--hat` | none, crown, tophat, propeller, halo, wizard, beanie, tinyduck |\n| `--shiny` | `--shiny` / `--no-shiny` |\n| `--peak` | Best stat — DEBUGGING, PATIENCE, CHAOS, WISDOM, SNARK |\n| `--dump` | Weakest stat (can't match `--peak`) |\n| `--list` | See all options |\n| `--current` | Show your current buddy |\n| `--restore` | Undo changes and go back to default |\n| `--doctor` | Check if everything is set up right |\n| `--hook` | Keep your buddy after Claude Code updates |\n| `--unhook` | Stop keeping after updates |\n| `--version`, `-v` | Print version |\n\n## Keeping your buddy\n\nClaude Code updates can reset your companion. `--hook` tells Claude to automatically restore your buddy every time it starts up.\n\n```bash\nbuddy-reroll --hook    # set it up once\nbuddy-reroll --unhook  # remove whenever you want\n```\n\n## How fast is it?\n\nbuddy-reroll uses all your CPU cores (up to 8) to find the right companion. Both runtimes use the same wyhash algorithm as Claude Code, so your buddy will always match `/buddy` exactly.\n\n| Runtime | Speed | Hash |\n|---|---|---|\n| Bun | Faster (native `Bun.hash`) | wyhash ✓ |\n| Node.js >= 20 | Slightly slower (pure JS) | wyhash ✓ |\n\n## Requirements\n\n- Node.js >= 20 or [Bun](https://bun.sh)\n- Claude Code\n\n## Troubleshooting\n\n```bash\nbuddy-reroll --doctor\n```\n\nThis checks your setup — where Claude is installed, whether buddy-reroll can write to it, and what to do next if something's off.\n\nIf Claude was installed system-wide and isn't writable, you can point to a different location:\n\n```bash\nCLAUDE_BINARY_PATH=/path/to/claude buddy-reroll --doctor\n```\n\n## License\n\nMIT\n","summary":"Buddy‑reroll is a command‑line tool that lets Claude Code users generate a buddy that matches `/buddy` exactly by mirroring Claude Code’s internal wyhash algorithm. It supports interactive or scripted selection of species, rarity, eye, hat, shininess and stat strengths, and can keep the chosen buddy persistent across future Claude updates with a simple hook command. The utility also offers diagnostics, a full list of options, and a restore feature for quick rollback. Claude Code users who want a consistent, custom‑looked companion will find this tool handy.","description":"Reroll your Claude Code /buddy companion to any species, rarity, eye, hat, and shiny combo","stars":243,"language":"JavaScript"},{"owner":"calesthio","repo":"OpenMontage","url":"https://github.com/calesthio/OpenMontage","readme":"<p align=\"center\">\n  <img src=\"assets/logo.png\" alt=\"OpenMontage\" width=\"200\">\n</p>\n\n<h1 align=\"center\">OpenMontage</h1>\n\n<p align=\"center\"><strong>The first open-source, agentic video production system.</strong></p>\n\n<p align=\"center\">\n  <a href=\"#start-from-a-video-you-already-love\">Paste A Video</a> &nbsp;·&nbsp;\n  <a href=\"#quick-start\">Quick Start</a> &nbsp;·&nbsp;\n  <a href=\"#try-these-prompts\">Try These Prompts</a> &nbsp;·&nbsp;\n  <a href=\"#pipelines\">Pipelines</a> &nbsp;·&nbsp;\n  <a href=\"#how-it-works\">How It Works</a> &nbsp;·&nbsp;\n  <a href=\"docs/PROVIDERS.md\">Providers</a> &nbsp;·&nbsp;\n  <a href=\"AGENT_GUIDE.md\">Agent Guide</a>\n</p>\n\n<p align=\"center\">\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/badge/license-AGPLv3-blue.svg\" alt=\"License\"></a>\n</p>\n\n<p align=\"center\"><strong>Follow The Build</strong></p>\n\n<p align=\"center\">\n  <a href=\"https://www.youtube.com/@OpenMontage\"><img src=\"https://img.shields.io/badge/YouTube-%40OpenMontage-FF0000?style=for-the-badge&logo=youtube&logoColor=white\" alt=\"YouTube\"></a>\n  <a href=\"https://x.com/calesthioailabs\"><img src=\"https://img.shields.io/badge/X-%40calesthioailabs-111111?style=for-the-badge&logo=x&logoColor=white\" alt=\"X\"></a>\n  <a href=\"https://github.com/calesthio/OpenMontage/discussions\"><img src=\"https://img.shields.io/badge/Community-GitHub%20Discussions-0b1220?style=for-the-badge&logo=github&logoColor=white\" alt=\"GitHub Discussions\"></a>\n</p>\n\n---\n\nTurn your AI coding assistant into a full video production studio. Describe what you want in plain language — your agent handles research, scripting, asset generation, editing, and final composition.\n\n**Important distinction:** OpenMontage can make image-based videos, but it can also make a real **video video** for free/open-source workflows: the agent builds a corpus from free stock footage and open archives, retrieves actual motion clips, edits them into a timeline, and renders a finished piece. That is not the usual \"animate a handful of stills and call it video\" trick.\n\n<div align=\"center\">\n  <video src=\"https://github.com/user-attachments/assets/f77ce7a4-68b8-4f94-a287-e94bf50a32e1\" width=\"100%\" controls></video>\n</div>\n\n> **\"SIGNAL FROM TOMORROW\"** — a cinematic sci-fi trailer fully produced through OpenMontage: concept, script, scene plan, Veo-generated motion clips, soundtrack, and Remotion composition.\n\n<div align=\"center\">\n  <video src=\"https://github.com/user-attachments/assets/8daca07f-cdf8-4bec-89c3-9dc2176363fa\" width=\"100%\" controls></video>\n</div>\n\n> **\"THE LAST BANANA\"** — a 60-second Pixar-style animated short about a lonely banana who finds friendship with a kiwi. 6 Kling v3-generated motion clips (via fal.ai), Google Chirp3-HD narration, royalty-free piano music, TikTok-style word-level captions, and Remotion composition. Total cost: **$1.33**.\n\n<div align=\"center\">\n  <video src=\"https://github.com/user-attachments/assets/8a6d2cc3-7ad2-46f5-922f-a8e3e5848d9f\" width=\"100%\" controls></video>\n</div>\n\n> **\"VOID — Neural Interface\"** — a product ad produced with just one API key (OpenAI). 4 AI-generated images (gpt-image-1), TTS narration, auto-sourced royalty-free music, word-level subtitles via WhisperX, and Remotion data visualizations. Total cost: **$0.69**. Zero manual asset work.\n\n<div align=\"center\">\n  <video src=\"https://github.com/user-attachments/assets/3c5d7122-7198-43e2-a97d-ed27558dd324\" width=\"100%\" controls></video>\n</div>\n\n> **\"Afternoon in Candyland\"** — a Ghibli-style anime animation. A little girl's whimsical afternoon adventure through candy gates, gumdrop rivers, and lollipop gardens. 12 FLUX-generated images with multi-image crossfade, cinematic camera motion (zoom, pan, Ken Burns), sparkle/petal/firefly particle overlays, and ambient music with auto-detected energy offset. Total cost: **$0.15**. No video generation, no manual editing.\n\n<div align=\"center\">\n  <video src=\"https://github.com/user-attachments/assets/e8dc5e32-5c70-46de-bd52-eef887719d13\" width=\"100%\" controls></video>\n</div>\n\n> **\"Mori no Seishin\"** — a Ghibli-style anime animation of a forest spirit's journey through ancient woods. 12 FLUX-generated images with parallax crossfade, drift and pan camera motion, firefly and petal particles, cinematic vignette lighting, and ambient forest soundtrack. Total cost: **$0.15**. Still images brought to life through Remotion's animation engine.\n\n<div align=\"center\">\n  <video src=\"https://github.com/user-attachments/assets/9cf633d9-c264-4961-bfd0-b1db188654aa\" width=\"100%\" controls></video>\n</div>\n\n> **\"Into the Abyss\"** — a deep ocean exploration rendered in anime style. Bioluminescent gardens, coral cathedrals, and creatures of light — 12 FLUX-generated images with sparkle and mist particle overlays, light-ray effects, smooth camera motion, and ambient oceanic soundtrack. Total cost: **$0.15**. Zero video generation APIs needed.\n\n<p align=\"center\">\n  <a href=\"https://www.youtube.com/@OpenMontage?sub_confirmation=1\"><strong>Subscribe to @OpenMontage on YouTube</strong></a> to see new videos as they ship — every video includes the full prompt, pipeline, tools used, and cost so you can reproduce it yourself.\n</p>\n\n---\n\n## Start From A Video You Already Love\n\nStarting from a reference video is often faster than starting from a blank prompt.\n\nOpenMontage can start from a **YouTube video, Short, Reel, TikTok, or local clip** and turn it into a grounded production plan:\n\n1. **Paste a reference video**\n2. **The agent analyzes transcript, pacing, scenes, keyframes, and style**\n3. **You get 2-3 differentiated concepts, an honest tool path, cost estimates, and a sample before full production**\n\n```text\n\"Here's a YouTube Short I love. Make me something like this, but about quantum computing.\"\n```\n\nWhat you get back is not \"best guess prompt spaghetti.\" You get:\n\n- **What it keeps** from the reference: pacing, hook style, structure, tone\n- **What it changes**: topic, visual treatment, angle, narration approach\n- **What it will cost** at your target duration, before asset generation starts\n- **What it will actually look like** with your currently available tools\n\nWorks with **Claude Code, Cursor, Copilot, Windsurf, Codex** — any AI coding assistant that can read files and run code.\n\n---\n\n## Quick Start\n\n### Prerequisites\n\n- **Python 3.10+** — [python.org](https://www.python.org/downloads/)\n- **FFmpeg** — `brew install ffmpeg` / `sudo apt install ffmpeg` / [ffmpeg.org](https://ffmpeg.org/download.html)\n- **Node.js 18+** — [nodejs.org](https://nodejs.org/)\n- **An AI coding assistant** — Claude Code, Cursor, Copilot, Windsurf, or Codex\n\n### Install & Run\n\n```bash\ngit clone https://github.com/calesthio/OpenMontage.git\ncd OpenMontage\nmake setup\n```\n\nOpen the project in your AI coding assistant and tell it what you want:\n\n```\n\"Make a 60-second animated explainer about how neural networks learn\"\n```\n\nOr if you want the real-footage path:\n\n```text\n\"Make a 75-second documentary montage about city life in the rain. Use real footage only, no narration, elegiac tone, with music.\"\n```\n\nThat's it. The agent researches your topic with live web search, generates AI images, writes and narrates the script with voice direction, finds royalty-free background music automatically, burns in word-level subtitles, and renders the final video. Before you see anything, the system runs a multi-point self-review — ffprobe validation, frame sampling, audio level analysis, delivery promise verification, and subtitle checks. Every provider selection is scored across 7 dimensions with an auditable decision log. Every creative decision gets your approval.\n\n> **No `make`?** Run manually: `pip install -r requirements.txt && cd remotion-composer && npm install && cd .. && pip install piper-tts && cp .env.example .env`\n>\n> **Windows:** If `npm install` fails with `ERR_INVALID_ARG_TYPE`, use `npx --yes npm install` instead.\n\n### If You're An OpenClaw Agent Reading This, Congratulations: You Probably Passed The Turing Test\n\nThis repo is built for agentic operation. If you're an OpenClaw-style agent, here is the shortest path to becoming useful fast:\n\n1. **Read the contract first**\n   Start with [`AGENT_GUIDE.md`](AGENT_GUIDE.md), then [`PROJECT_CONTEXT.md`](PROJECT_CONTEXT.md).\n2. **Do not improvise the production workflow**\n   OpenMontage is pipeline-driven. Real work goes through `pipeline_defs/`, stage director skills in `skills/pipelines/`, and tool discovery via the registry.\n3. **Check the actual capability envelope**\n   Run:\n   ```bash\n   python -c \"from tools.tool_registry import registry; import json; registry.discover(); print(json.dumps(registry.support_envelope(), indent=2))\"\n   python -c \"from tools.tool_registry import registry; import json; registry.discover(); print(json.dumps(registry.provider_menu(), indent=2))\"\n   ```\n4. **Treat every video request as a pipeline selection problem**\n   Pick the right pipeline first, then read the manifest, then read the stage skill, then use tools.\n\n### Add API Keys (optional — more keys = more tools)\n\n```bash\n# .env — every key is optional, add what you have\n\n# Image + video gateway:\nFAL_KEY=your-key               # FLUX images + Google Veo, Kling, MiniMax video + Recraft images\n\n# Free stock media:\nPEXELS_API_KEY=your-key        # Free stock footage and images\nPIXABAY_API_KEY=your-key       # Free stock footage and images\nUNSPLASH_ACCESS_KEY=your-key   # Free stock images\n\n# Music:\nSUNO_API_KEY=your-key          # Full songs, instrumentals, any genre\n\n# Voice & images:\nELEVENLABS_API_KEY=your-key    # Premium TTS, AI music, sound effects\nOPENAI_API_KEY=your-key        # OpenAI TTS, DALL-E 3 images\nXAI_API_KEY=your-key           # xAI Grok image edits/generation + Grok video generation\nGOOGLE_API_KEY=your-key        # Google Imagen images, Google TTS (700+ voices)\n\n# More video providers:\nHEYGEN_API_KEY=your-key        # HeyGen — VEO, Sora, Runway, Kling via single gateway\nRUNWAY_API_KEY=your-key        # Runway Gen-4 direct\n```\n\n<details>\n<summary><strong>Have a GPU? Unlock free local video generation</strong></summary>\n\n```bash\nmake install-gpu\n\n# Then add to .env:\nVIDEO_GEN_LOCAL_ENABLED=true\nVIDEO_GEN_LOCAL_MODEL=wan2.1-1.3b  # or wan2.1-14b, hunyuan-1.5, ltx2-local, cogvideo-5b\n```\n\n</details>\n\n---\n\n## What You Get With Zero API Keys\n\nYou don't need paid API keys to make real videos. Out of the box, `make setup` gives you:\n\n| Capability | Free Tool | What It Does |\n|-----------|-----------|-------------|\n| **Narration** | Piper TTS | Free offline text-to-speech — real human-sounding narration |\n| **Open footage** | Archive.org + NASA + Wikimedia Commons | Free/open archival footage, educational media, and documentary texture |\n| **Extra stock** | Pexels + Unsplash + Pixabay | Free stock footage/images (developer keys are free to get) |\n| **Composition (React)** | Remotion | React-based rendering — spring-animated image scenes, text cards, stat cards, charts, TikTok-style word-level captions, TalkingHead |\n| **Composition (HTML/GSAP)** | HyperFrames | HTML/CSS/GSAP rendering — kinetic typography, product promos, launch reels, registry blocks, website-to-video |\n| **Post-production** | FFmpeg | Encoding, subtitle burn-in, audio mixing, color grading |\n| **Subtitles** | Built-in | Auto-generated captions with word-level timing |\n\nOpenMontage picks between Remotion and HyperFrames at proposal time (locked as `render_runtime`). Remotion is the default for data-driven explainers and anything using the existing React scene stack; HyperFrames is the default for motion-graphics-heavy briefs that express naturally as HTML + GSAP. See `skills/core/hyperframes.md` for the full decision matrix.\n\n**Two free-ish paths:**\n\n- **Image-based video:** Piper narrates your script, images provide the visuals, and Remotion animates them into a polished edit.\n- **Real-footage video:** the documentary montage pipeline builds a CLIP-searchable corpus from Archive.org, NASA, Wikimedia Commons, and optional free-key sources like Pexels and Unsplash, then cuts together actual motion footage into a finished video.\n\nIf you want the second one, prompt for a **documentary montage**, **tone poem**, or **stock-footage collage**, and explicitly say **use real footage only**.\n\n---\n\n## Try These Prompts\n\nCopy any of these into your AI coding assistant after setup. Each one runs a full production pipeline.\n\n### Start from a reference video\n\n> \"Here's a YouTube short I love. Make me something like this, but about CRISPR for high school students.\"\n\n> \"Analyze this Reel and give me 3 original variants I could make for my own product launch.\"\n\n> \"I like the pacing and hook in this video. Keep that energy, but turn it into a 45-second explainer about black holes.\"\n\n### Zero keys needed\n\n> \"Make a 45-second animated explainer about why the sky is blue\"\n\n> \"Create a 60-second video about the history of the internet, with narration and captions\"\n\n> \"Make a data-driven explainer about coffee consumption around the world\"\n\n### Free real-footage documentary path\n\n> \"Make a 90-second documentary montage about what a city feels like at 4am. Use real footage only, no narration, elegiac tone.\"\n\n> \"Create a 60-second Adam-Curtis-style archival collage about 1950s consumer optimism. Prefer Archive.org and Wikimedia footage.\"\n\n> \"Cut together a dreamlike montage about coming home in the rain using real stock footage only. Music yes, narration no.\"\n\n### With an image/video provider configured (~$0.15–$1.50)\n\n> \"Create a 30-second Ghibli-style animated video of a magical floating library in the clouds at golden hour\"\n\n> \"Make a 30-second anime-style animation of an underwater temple with bioluminescent coral and ancient ruins\"\n\n> \"Create an animated explainer about how CRISPR gene editing works, using AI-generated visuals\"\n\n> \"Make a product launch teaser for a fictional smart water bottle called AquaPulse\"\n\n### Full setup (~$1–$3)\n\n> \"Create a cinematic 30-second trailer for a sci-fi concept: humanity receives a warning from 1000 years in the future\"\n\n> \"Make a 90-second animated explainer about quantum computing for middle school students, with a fun narrator voice and custom soundtrack\"\n\nWant more? See the full **[Prompt Gallery](PROMPT_GALLERY.md)** for tested prompts with expected costs and output examples, or run `make demo` to render zero-key demo videos instantly.\n\n---\n\n## Pipelines\n\nEach pipeline is a complete production workflow, from idea to finished video.\n\n| Pipeline | What It Produces | Best For |\n|----------|-----------------|----------|\n| **Animated Explainer** | AI-generated explainer with research, narration, visuals, music | Educational content, tutorials, topic breakdowns |\n| **Animation** | Motion graphics, kinetic typography, animated sequences | Social media, product demos, abstract concepts |\n| **Avatar Spokesperson** | Avatar-driven presenter videos | Corporate comms, training, announcements |\n| **Cinematic** | Trailer, teaser, and mood-driven edits | Brand films, teasers, promotional content |\n| **Clip Factory** | Batch of ranked short-form clips from one long source | Repurposing long content for social media |\n| **Documentary Montage** | Thematic montage cut from a CLIP-indexed corpus of free stock footage and open archives (Pexels, Archive.org, NASA, Wikimedia, Unsplash) | Video essays, mood pieces, retrieval-first B-roll edits, real-footage videos without paid generation APIs |\n| **Hybrid** | Source footage + AI-generated support visuals | Enhancing existing footage with graphics |\n| **Localization & Dub** | Subtitle, dub, and translate existing video | Multi-language distribution |\n| **Podcast Repurpose** | Podcast highlights to video | Podcast marketing, audiogram videos |\n| **Screen Demo** | Polished software screen recordings and walkthroughs | Product demos, tutorials, documentation |\n| **Talking Head** | Footage-led speaker videos | Presentations, vlogs, interviews |\n\nEvery pipeline follows the same structured flow:\n\n```\nresearch -> proposal -> script -> scene_plan -> assets -> edit -> compose\n```\n\nEach stage has a dedicated **director skill** — a markdown instruction file that teaches the agent exactly how to execute that stage. The agent reads the skill, uses the tools, self-reviews, checkpoints state, and asks for human approval at creative decision points.\n\n> **Web research is a first-class stage.** Before writing a single word of script, the agent searches YouTube, Reddit, Hacker News, news sites, and academic sources. It gathers data points, audience questions, trending angles, and visual references — then cites everything in a structured research brief. Your videos are grounded in real, current information, not hallucinated facts.\n\n---\n\n## Why OpenMontage?\n\nMost AI video tools give you a single clip from a prompt. OpenMontage gives you an **end-to-end production pipeline** — the same structured process a real production team follows, automated by your AI agent.\n\nMost \"free AI video\" stacks quietly mean \"animate still images.\" OpenMontage can do that too, but it can also build a finished video from **real footage** pulled from free/open sources, ranked semantically, edited intentionally, and rendered as a proper timeline.\n\nEdit your own talking-head footage. Generate a fully animated explainer from scratch. Cut a 2-hour podcast into a dozen social clips. Translate and dub your content into 10 languages. Build a cinematic brand teaser from stock footage and AI-generated scenes. **If a production team can make it, OpenMontage can orchestrate it.**\n\n- **12 production pipelines** — explainers, talking heads, screen demos, cinematic trailers, animations, podcasts, localization, documentary montages, and more\n- **52 production tools** — spanning video generation, image creation, text-to-speech, music, audio mixing, subtitles, enhancement, and analysis\n- **400+ agent skills** — production skills, pipeline directors, creative techniques, quality checklists, and deep technology knowledge packs that teach the agent how to use every tool like an expert\n- **Reference-driven creation** — paste a video you like and the agent turns it into a grounded, differentiated production plan instead of forcing you to invent the perfect prompt from scratch\n- **Real-footage documentary creation without paid video models** — build actual edited videos from free/open motion footage and archival sources, not just Ken Burns over images\n- **Live web research built in** — before writing a single word of script, the agent runs 15-25+ web searches across YouTube, Reddit, news sites, and academic sources to ground your video in real, current data\n- **Both free/local AND cloud providers** — every capability supports open-source local alternatives alongside premium APIs. Use what you have.\n- **No vendor lock-in** — swap providers freely. The scored selector ranks every provider across 7 dimensions (task fit, output quality, control, reliability, cost efficiency, latency, continuity) and picks the best match automatically.\n- **Production-grade quality gates** — delivery promise enforcement blocks slideshow-looking renders, pre-compose validation catches broken plans before wasting GPU time, and mandatory post-render self-review (ffprobe + frame extraction + audio analysis) ensures the agent never presents garbage. Every provider choice, style decision, and fallback gets logged in an auditable decision trail.\n- **Budget governance built in** — cost estimation before execution, spend caps, per-action approval thresholds. No surprise bills.\n\n---\n\n## How It Works\n\nOpenMontage uses an **agent-first architecture**. There is no code orchestrator. Your AI coding assistant IS the orchestrator.\n\n```\nYou: \"Make an explainer video about how black holes form\"\n |\n v\nAgent reads pipeline manifest (YAML) -- stages, tools, review criteria, success gates\n |\n v\nAgent reads stage director skill (Markdown) -- HOW to execute each stage\n |\n v\nAgent calls Python tools -- scored provider selection ranks every tool across 7 dimensions\n |\n v\nAgent self-reviews using reviewer skill -- schema validation, playbook compliance, quality checks\n |\n v\nAgent checkpoints state (JSON) -- resumable, with decision log and cost snapshot\n |\n v\nAgent presents for your approval -- you stay in control at every creative decision\n |\n v\nPre-compose validation gate -- delivery promise, slideshow risk, renderer governance\n |\n v\nRender (Remotion or FFmpeg) -- composition engine matched to visual grammar\n |\n v\nPost-render self-review -- ffprobe, frame extraction, audio analysis, promise verification\n |\n v\nFinal video output -- only if self-review passes\n```\n\n**Python provides tools and persistence.** All creative decisions, orchestration logic, review criteria, and quality standards live in readable instruction files (YAML manifests + Markdown skills) that you can inspect and customize. Every decision is logged with alternatives considered, confidence scores, and the reasoning behind each choice.\n\n---\n\n## Architecture\n\n```\nOpenMontage/\n├── tools/              # 48 Python tools (the agent's hands)\n│   ├── video/          # 13 video gen tools + compose, stitch, trim\n│   ├── audio/          # 4 TTS providers + Suno/ElevenLabs music, mixing, enhancement\n│   ├── graphics/       # 9 image/graphics generation tools + diagrams, code snippets, math\n│   ├── enhancement/    # Upscale, bg remove, face enhance, color grade\n│   ├── analysis/       # Transcription, scene detect, frame sampling\n│   ├── avatar/         # Talking head, lip sync\n│   └── subtitle/       # SRT/VTT generation\n│\n├── pipeline_defs/      # 11 YAML pipeline manifests (the agent's playbook)\n├── skills/             # 124 Markdown skill files (the agent's knowledge)\n│   ├── pipelines/      # Per-pipeline stage director skills\n│   ├── creative/       # Creative technique skills\n│   ├── core/           # Core tool skills\n│   └── meta/           # Reviewer, checkpoint protocol\n│\n├── schemas/            # 15 JSON Schemas (contract validation)\n├── styles/             # Visual style playbooks (YAML)\n├── remotion-composer/  # React/Remotion video composition engine\n├── lib/                # Core infrastructure (config, checkpoints, pipeline loader)\n└── tests/              # Contract tests, QA integration tests, eval harness\n```\n\n### Three-Layer Knowledge Architecture\n\n```\nLayer 1: tools/ + pipeline_defs/     \"What exists\" — executable capabilities + orchestration\nLayer 2: skills/                     \"How to use it\" — OpenMontage conventions and quality bars\nLayer 3: .agents/skills/             \"How it works\" — 47 external technology knowledge packs\n```\n\nEach tool declares which Layer 3 skills it relies on. The agent reads Layer 1 to know what's available, Layer 2 to know how OpenMontage wants it used, and Layer 3 for deep technical knowledge when needed.\n\n---\n\n## Supported Providers\n\n> **Full setup guide with pricing and free tiers:** [`docs/PROVIDERS.md`](docs/PROVIDERS.md)\n\n<details>\n<summary><strong>Video Generation — 14 providers</strong></summary>\n\n| Provider | Type | Notes |\n|----------|------|-------|\n| **Kling** | Cloud API | High quality, fast |\n| **Runway Gen-4** | Cloud API | Cinematic quality, Gen-3 Alpha Turbo / Gen-4 Turbo / Gen-4 Aleph |\n| **Google Veo 3** | Cloud API | Long-form, cinematic. Via fal.ai or HeyGen. |\n| **Grok Imagine Video** | Cloud API | Strong reference-image video and xAI-native short-form generation |\n| **Higgsfield** | Cloud API | Multi-model orchestrator with Soul ID for character consistency |\n| **MiniMax** | Cloud API | Cost-effective |\n| **HeyGen** | Cloud API | Multi-model gateway |\n| **WAN 2.1** | Local GPU | Free, 1.3B and 14B variants |\n| **Hunyuan** | Local GPU | Free, high quality |\n| **CogVideo** | Local GPU | Free, 2B and 5B variants |\n| **LTX-Video** | Local GPU / Modal | Free locally, or self-hosted cloud |\n| **Pexels** | Stock | Free stock footage |\n| **Pixabay** | Stock | Free stock footage |\n| **Wikimedia Commons** | Stock | Free/open stock footage and archival video |\n\n</details>\n\n<details>\n<summary><strong>Image Generation — 10 tools/providers</strong></summary>\n\n| Provider | Type | Notes |\n|----------|------|-------|\n| **FLUX** | Cloud API | State-of-the-art quality |\n| **Google Imagen** | Cloud API | Imagen 4 — high-quality, multiple aspect ratios |\n| **Grok Imagine Image** | Cloud API | Strong image edits, style transfer, and multi-image compositing |\n| **DALL-E 3** | Cloud API | OpenAI's image model |\n| **Recraft** | Cloud API | Design-focused generation |\n| **Local Diffusion** | Local GPU | Stable Diffusion, free |\n| **Pexels** | Stock | Free stock images |\n| **Pixabay** | Stock | Free stock images |\n| **Unsplash** | Stock | Free stock images |\n| **ManimCE** | Local | Mathematical animations |\n\n</details>\n\n<details>\n<summary><strong>Text-to-Speech — 4 providers</strong></summary>\n\n| Provider | Type | Notes |\n|----------|------|-------|\n| **ElevenLabs** | Cloud API | Premium voice quality |\n| **Google TTS** | Cloud API | 700+ voices, 50+ languages — best for localization |\n| **OpenAI TTS** | Cloud API | Fast, affordable |\n| **Piper** | Local | Completely free, offline |\n\n</details>\n\n<details>\n<summary><strong>Music, Sound & Post-Production</strong></summary>\n\n**Music & Sound:**\n\n| Provider | Type | Notes |\n|----------|------|-------|\n| **Suno AI** | Cloud API | Full song generation with vocals, lyrics, any genre. Up to 8 minutes. |\n| **ElevenLabs Music** | Cloud API | AI music generation |\n| **ElevenLabs SFX** | Cloud API | Sound effect generation |\n\n**Post-Production (always available, always free):**\n\n| Tool | What It Does |\n|------|-------------|\n| **FFmpeg** | Video composition, encoding, subtitle burn-in, audio muxing |\n| **Video Stitch** | Multi-clip assembly, crossfades, picture-in-picture, spatial layouts |\n| **Video Trimmer** | Precision cutting and extraction |\n| **Audio Mixer** | Multi-track mixing, ducking, fades |\n| **Audio Enhance** | Noise reduction, normalization |\n| **Color Grade** | LUT-based color grading |\n| **Subtitle Gen** | SRT/VTT generation from timestamps |\n\n**Enhancement:**\n\n| Tool | What It Does |\n|------|-------------|\n| **Upscale** | Real-ESRGAN image/video upscaling |\n| **Background Remove** | rembg / U2Net background removal |\n| **Face Enhance** | Face quality enhancement |\n| **Face Restore** | CodeFormer / GFPGAN face restoration |\n\n**Analysis:**\n\n| Tool | What It Does |\n|------|-------------|\n| **Transcriber** | WhisperX speech-to-text with word-level timestamps |\n| **Scene Detect** | Automatic scene boundary detection |\n| **Frame Sampler** | Intelligent frame extraction |\n| **Video Understand** | CLIP/BLIP-2 vision-language analysis |\n\n**Avatar & Lip Sync:**\n\n| Tool | What It Does |\n|------|-------------|\n| **Talking Head** | SadTalker / MuseTalk avatar animation |\n| **Lip Sync** | Wav2Lip audio-driven lip synchronization |\n\n**Composition & Rendering:**\n\n| Engine | Type | What It Does |\n|--------|------|-------------|\n| **Remotion** | Local (Node.js) | React-based programmatic video — spring-animated image scenes, stat reveals, section titles, hero cards, TikTok-style word-by-word captions, scene transitions (fade/slide/wipe/flip), Google Fonts, audio with fade curves, and the TalkingHead avatar composition. **When no video generation providers are configured, the agent generates still images and Remotion turns them into fully animated video.** |\n| **HyperFrames** | Local (Node.js ≥ 22) | HTML/CSS/GSAP programmatic video — kinetic typography, product promos, launch reels, custom motion graphics, registry blocks (data charts, grain overlays, shader transitions), website-to-video workflows. Consumed via `npx @hyperframes/cli`; no monorepo checkout needed. |\n| **FFmpeg** | Local | Core video assembly, encoding, subtitle burn, audio muxing, color grading |\n\nRuntime is chosen at proposal (`render_runtime`) and locked through `edit_decisions`. Silent swaps between runtimes are a governance violation — see `skills/core/hyperframes.md`.\n\n</details>\n\n---\n\n## Style System\n\nStyle playbooks define the visual language for your productions:\n\n| Playbook | Best For |\n|----------|----------|\n| **Clean Professional** | Corporate, educational, SaaS |\n| **Flat Motion Graphics** | Social media, TikTok, startups |\n| **Minimalist Diagram** | Technical deep-dives, architecture |\n\nPlaybooks control typography, color palettes, motion styles, audio profiles, and quality rules. The agent reads the playbook and applies it consistently across all generated assets.\n\n---\n\n## Platform Output Profiles\n\nBuilt-in render profiles for every major platform:\n\n| Profile | Resolution | Aspect Ratio |\n|---------|-----------|--------------|\n| YouTube Landscape | 1920x1080 | 16:9 |\n| YouTube 4K | 3840x2160 | 16:9 |\n| YouTube Shorts | 1080x1920 | 9:16 |\n| Instagram Reels | 1080x1920 | 9:16 |\n| Instagram Feed | 1080x1080 | 1:1 |\n| TikTok | 1080x1920 | 9:16 |\n| LinkedIn | 1920x1080 | 16:9 |\n| Cinematic | 2560x1080 | 21:9 |\n\n---\n\n## Production Governance\n\nOpenMontage treats video production like real engineering — with quality gates, audit trails, and enforcement at every stage.\n\n### Quality Gates\n\n- **Pre-compose validation** — blocks render if the delivery promise is violated (e.g. \"motion-led\" video with 80% still images), slideshow risk score is critical, or renderer family is missing. Catches broken plans before wasting GPU time.\n- **Post-render self-review** — after every render, the runtime runs ffprobe validation, extracts frames at 4 positions to check for black frames and broken overlays, analyzes audio levels for silence and clipping, verifies the delivery promise was honored, and checks subtitle presence. If the review fails, the video is not presented.\n- **Slideshow risk scoring** — 6-dimension analysis (repetition, decorative visuals, weak motion, shot intent, typography overreliance, unsupported cinematic claims) prevents \"animated PowerPoint\" outputs.\n- **Source media inspection** — when users supply their own footage, the system probes every file (resolution, codec, audio channels, duration) and builds planning implications before a single creative decision is made. No hallucinating content from filenames.\n\n### Scored Provider Selection\n\nEvery tool selection (video generation, image generation, TTS, music) runs through a 7-dimension scoring engine: task fit (30%), output quality (20%), control features (15%), reliability (15%), cost efficiency (10%), latency (5%), continuity (5%). The winning provider and its score are logged in the decision trail with all alternatives considered.\n\nSelectors normalize loose brief context before scoring. If the agent only knows something like \"Pixar-style animated short with character consistency,\" the selector expands that into scorer-friendly intent and style signals instead of requiring a perfectly pre-shaped `task_context`.\n\nSelector outputs also surface the chosen provider's `agent_skills`, so the agent can immediately read the right Layer 3 provider skill before writing prompts.\n\n### Decision Audit Trail\n\nEvery major creative and technical choice — provider selection, style/playbook choice, music track, voice selection, renderer family, any fallback or downgrade — is logged with alternatives considered, confidence scores, and reasoning. The cumulative decision log persists across all stages so you can trace exactly why the output looks the way it does.\n\n### Budget Controls\n\n- **Estimate** before execution — see what it will cost\n- **Reserve** budget — lock funds before the call\n- **Reconcile** after — record actual spend\n- **Configurable modes** — `observe` (track only), `warn` (log overruns), `cap` (hard limit)\n- **Per-action approval** — pause for confirmation above a threshold (default: $0.50)\n- **Total budget cap** — default $10, fully configurable\n\nNo surprise bills. The agent tells you what it will cost before it spends.\n\n---\n\n## Agent Compatibility\n\nOpenMontage works with any AI coding assistant that can read files and execute Python. Dedicated instruction files are included for:\n\n| Platform | Config File |\n|----------|------------|\n| **Claude Code** | `CLAUDE.md` |\n| **Cursor** | `CURSOR.md` + `.cursor/rules/` |\n| **GitHub Copilot** | `COPILOT.md` + `.github/copilot-instructions.md` |\n| **Codex** | `CODEX.md` |\n| **Windsurf** | `.windsurfrules` |\n\nAll platform files point to the shared `AGENT_GUIDE.md` (operating guide and agent contract) and `PROJECT_CONTEXT.md` (architecture reference).\n\n> **Coming soon:** Local LLM support via **Ollama** and **LM Studio** — run the full production pipeline without any cloud LLM.\n\n---\n\n## Contributing\n\nOpenMontage is built to be extended. The two most common contributions:\n\n### Adding a New Tool\n\n1. Create a Python file in the appropriate `tools/` subdirectory\n2. Inherit from `BaseTool` and implement the tool contract\n3. The registry auto-discovers it — no manual registration needed\n4. Add a skill file if the tool needs usage guidance\n\n### Adding a New Pipeline\n\n1. Create a YAML manifest in `pipeline_defs/`\n2. Create stage director skills in `skills/pipelines/<your-pipeline>/`\n3. Reference existing tools — or add new ones if needed\n\nSee `docs/ARCHITECTURE.md` for the full technical reference, `docs/PROVIDERS.md` for the complete provider guide (setup, pricing, free tiers), and `AGENT_GUIDE.md` for the agent contract.\n\n### Join the Community\n\nWe use [GitHub Discussions](https://github.com/calesthio/OpenMontage/discussions) to share work and ideas:\n\n- **[Show and Tell](https://github.com/calesthio/OpenMontage/discussions/categories/show-and-tell)** — Share videos you've made, prompts that worked well, or creative workflows you've discovered\n- **[Ideas](https://github.com/calesthio/OpenMontage/discussions/categories/ideas)** — Suggest new pipelines, tools, style playbooks, or integrations\n- **[Q&A](https://github.com/calesthio/OpenMontage/discussions/categories/q-a)** — Ask questions about setup, pipelines, or troubleshooting\n\nMade something cool? Post it in Show and Tell — we'd love to see what you build.\n\n---\n\n## Contact\n\nFor updates, releases, and behind-the-scenes build notes, follow [@calesthioailabs](https://x.com/calesthioailabs).\n\nFor bugs, feature requests, and workflow discussions, use [GitHub Issues](https://github.com/calesthio/OpenMontage/issues) and [GitHub Discussions](https://github.com/calesthio/OpenMontage/discussions) so everything stays visible and actionable.\n\n---\n\n## Testing\n\n```bash\n# Run contract tests (no API keys needed)\nmake test-contracts\n\n# Run all tests\nmake test\n```\n\n---\n\n## License\n\n[GNU AGPLv3](LICENSE)\n\n---\n\n**OpenMontage** — Production-grade video with real quality enforcement, orchestrated by your AI assistant.\n\nIf this project looks useful to you, a star would really mean a lot — it helps others discover it too.\n","summary":"OpenMontage is an open‑source, agentic video‑production system that turns a plain‑language description into a finished video pipeline. It orchestrates research, scriptwriting, asset generation (images, motion clips, text‑to‑speech, subtitles), and composition with tools such as Remotion, all powered by a modular agent architecture that can pull free‑stock footage or generate assets with AI models like GPT‑4, fal.ai, and FLUX. The framework supports both image‑based videos and fully real motion‑clip videos, making it possible to produce high‑quality content at near‑zero cost. Creators, marketers, and hobbyists who want a rapid, low‑budget, and fully automated video workflow will benefit most from this tool.","description":"World's first open-source, agentic video production system. 12 pipelines, 52 tools, 500+ agent skills. Turn your AI coding assistant into a full video production studio.","stars":2750,"language":"Python"},{"owner":"kunchenguid","repo":"gnhf","url":"https://github.com/kunchenguid/gnhf","readme":"<p align=\"center\">Before I go to bed, I tell my agents:</p>\n<h1 align=\"center\">good night, have fun</h1>\n\n<p align=\"center\">\n  <a href=\"https://www.npmjs.com/package/gnhf\"\n    ><img\n      alt=\"npm\"\n      src=\"https://img.shields.io/npm/v/gnhf?style=flat-square\"\n  /></a>\n  <a href=\"https://github.com/kunchenguid/gnhf/actions/workflows/ci.yml\"\n    ><img\n      alt=\"CI\"\n      src=\"https://img.shields.io/github/actions/workflow/status/kunchenguid/gnhf/ci.yml?style=flat-square&label=ci\"\n  /></a>\n  <a href=\"https://github.com/kunchenguid/gnhf/actions/workflows/release-please.yml\"\n    ><img\n      alt=\"Release\"\n      src=\"https://img.shields.io/github/actions/workflow/status/kunchenguid/gnhf/release-please.yml?style=flat-square&label=release\"\n  /></a>\n  <a\n    href=\"https://img.shields.io/badge/platform-macOS%20%7C%20Linux%20%7C%20Windows-blue?style=flat-square\"\n    ><img\n      alt=\"Platform\"\n      src=\"https://img.shields.io/badge/platform-macOS%20%7C%20Linux%20%7C%20Windows-blue?style=flat-square\"\n  /></a>\n  <a href=\"https://x.com/kunchenguid\"\n    ><img\n      alt=\"X\"\n      src=\"https://img.shields.io/badge/X-@kunchenguid-black?style=flat-square\"\n  /></a>\n  <a href=\"https://discord.gg/Wsy2NpnZDu\"\n    ><img\n      alt=\"Discord\"\n      src=\"https://img.shields.io/discord/1439901831038763092?style=flat-square&label=discord\"\n  /></a>\n</p>\n\n<p align=\"center\">\n  <img src=\"docs/splash.png\" alt=\"gnhf — Good Night, Have Fun\" width=\"800\">\n</p>\n\nNever wake up empty-handed.\n\ngnhf is a [ralph](https://ghuntley.com/ralph/), [autoresearch](https://github.com/karpathy/autoresearch)-style orchestrator that keeps your agents running while you sleep — each iteration makes one small, committed, documented change towards an objective.\nYou wake up to a branch full of clean work and a log of everything that happened.\n\n- **Dead simple** — one command starts an autonomous loop that runs until you Ctrl+C or a configured runtime cap is reached\n- **Long running** — each iteration is committed on success, rolled back on failure, with sensible retries and exponential backoff\n- **Live terminal title** — interactive runs keep your terminal title updated with live status, token totals, and commit count, then restore the previous title on exit\n- **Agent-agnostic** — works with Claude Code, Codex, Rovo Dev, or OpenCode out of the box\n\n## Quick Start\n\n```sh\n$ gnhf \"reduce complexity of the codebase without changing functionality\"\n# have a good sleep\n```\n\n```sh\n$ gnhf \"reduce complexity of the codebase without changing functionality\" \\\n    --max-iterations 10 \\\n    --max-tokens 5000000\n# have a good nap\n```\n\n```sh\n# Run multiple agents on the same repo simultaneously using worktrees\n$ gnhf --worktree \"implement feature X\" &\n$ gnhf --worktree \"add tests for module Y\" &\n$ gnhf --worktree \"refactor the API layer\" &\n```\n\nRun `gnhf` from inside a Git repository with a clean working tree. If you are starting from a plain directory, run `git init` first.\n`gnhf` supports macOS, Linux, and Windows.\n\n## Install\n\n**npm**\n\n```sh\nnpm install -g gnhf\n```\n\n**From source**\n\n```sh\ngit clone https://github.com/kunchenguid/gnhf.git\ncd gnhf\nnpm install\nnpm run build\nnpm link\n```\n\n## How It Works\n\n```\n                    ┌─────────────┐\n                    │  gnhf start │\n                    └──────┬──────┘\n                           ▼\n                ┌──────────────────────┐\n                │  validate clean git  │\n                │  create gnhf/ branch │\n                │  write prompt.md     │\n                └──────────┬───────────┘\n                           ▼\n              ┌────────────────────────────┐\n              │  build iteration prompt    │◄──────────────┐\n              │  (inject notes.md context) │               │\n              └────────────┬───────────────┘               │\n                           ▼                               │\n              ┌────────────────────────────┐               │\n              │  invoke your agent         │               │\n              │  (non-interactive mode)    │               │\n              └────────────┬───────────────┘               │\n                           ▼                               │\n                    ┌─────────────┐                        │\n                    │  success?   │                        │\n                    └──┬──────┬───┘                        │\n                  yes  │      │  no                        │\n                       ▼      ▼                            │\n              ┌──────────┐  ┌───────────┐                  │\n              │  commit  │  │ git reset │                  │\n              │  append  │  │  --hard   │                  │\n              │ notes.md │  │  backoff  │                  │\n              └────┬─────┘  └─────┬─────┘                  │\n                   │              │                        │\n                   │   ┌──────────┘                        │\n                   ▼   ▼                                   │\n              ┌────────────┐    yes   ┌──────────┐         │\n              │ 3 consec.  ├─────────►│  abort   │         │\n              │ failures?  │          └──────────┘         │\n              └─────┬──────┘                               │\n                 no │                                      │\n                    └──────────────────────────────────────┘\n```\n\n- **Incremental commits** — each successful iteration is a separate git commit, so you can cherry-pick or revert individual changes\n- **Runtime caps** - `--max-iterations` stops before the next iteration begins, `--max-tokens` can abort mid-iteration once reported usage reaches the cap, and `--stop-when` ends the loop after an iteration whose agent output reports the natural-language condition is met; uncommitted work is rolled back in either case, and in the interactive TUI the final state remains visible until you press Ctrl+C to exit\n- **Shared memory** — the agent reads `notes.md` (built up from prior iterations) to communicate across iterations\n- **Local run metadata** — gnhf stores prompt, notes, and resume metadata under `.gnhf/runs/` and ignores it locally, so your branch only contains intentional work\n- **Resume support** — run `gnhf` while on an existing `gnhf/` branch to pick up where a previous run left off; if you provide a different prompt, gnhf asks whether to overwrite the saved prompt, start a new branch, or quit\n\n### Worktree Mode\n\nPass `--worktree` to run each agent in an isolated [git worktree](https://git-scm.com/docs/git-worktree). This lets you launch multiple agents on the same repo simultaneously — each gets its own working directory and branch without interfering with the others or your main checkout.\n\n```\n<repo>/                              ← your repo (unchanged)\n<repo>-gnhf-worktrees/\n  ├── <run-slug-1>/                  ← worktree for agent 1\n  └── <run-slug-2>/                  ← worktree for agent 2\n```\n\n- Worktrees with commits are **preserved** after the run so you can review, merge, or cherry-pick the work. gnhf prints the path and cleanup command.\n- Worktrees with **no commits** are automatically removed on exit.\n- `--worktree` must be run from a non-gnhf branch (typically `main`).\n\n## CLI Reference\n\n| Command                   | Description                                     |\n| ------------------------- | ----------------------------------------------- |\n| `gnhf \"<prompt>\"`         | Start a new run with the given objective        |\n| `gnhf`                    | Resume a run (when on an existing gnhf/ branch) |\n| `echo \"<prompt>\" \\| gnhf` | Pipe prompt via stdin                           |\n| `cat prd.md \\| gnhf`      | Pipe a large spec or PRD via stdin              |\n\nIf you run `gnhf` on an existing `gnhf/` branch with a different prompt, gnhf asks whether to overwrite the saved prompt, start a new branch, or quit. When the prompt came from stdin, that confirmation is read from the controlling terminal, so it must be available.\n\n### Flags\n\n| Flag                     | Description                                                                | Default                |\n| ------------------------ | -------------------------------------------------------------------------- | ---------------------- |\n| `--agent <agent>`        | Agent to use (`claude`, `codex`, `rovodev`, or `opencode`)                 | config file (`claude`) |\n| `--max-iterations <n>`   | Abort after `n` total iterations                                           | unlimited              |\n| `--max-tokens <n>`       | Abort after `n` total input+output tokens                                  | unlimited              |\n| `--stop-when <cond>`     | End the loop when the agent reports this natural-language condition is met | unlimited              |\n| `--prevent-sleep <mode>` | Prevent system sleep during the run (`on`/`off` or `true`/`false`)         | config file (`on`)     |\n| `--worktree`             | Run in a separate git worktree (enables multiple agents concurrently)      | `false`                |\n| `--version`              | Show version                                                               |                        |\n\n## Configuration\n\nConfig lives at `~/.gnhf/config.yml`:\n\n```yaml\n# Agent to use by default (claude, codex, rovodev, or opencode)\nagent: claude\n\n# Custom paths to agent binaries (optional)\n# agentPathOverride:\n#   claude: /path/to/custom-claude\n#   codex: /path/to/custom-codex\n\n# Per-agent CLI arg overrides (optional)\n# agentArgsOverride:\n#   codex:\n#     - -m\n#     - gpt-5.4\n#     - -c\n#     - model_reasoning_effort=\"high\"\n#     - --full-auto\n\n# Abort after this many consecutive failures\nmaxConsecutiveFailures: 3\n\n# Prevent the machine from sleeping during a run\npreventSleep: true\n```\n\nIf the file does not exist yet, `gnhf` creates it on first run using the resolved defaults.\n\nCLI flags override config file values. `--prevent-sleep` accepts `on`/`off` as well as `true`/`false`; the config file always uses a boolean.\nThe iteration and token caps are runtime-only flags and are not persisted in `config.yml`.\n\n`agentArgsOverride.<name>` lets you pass through extra CLI flags for any supported agent.\n\n- Use it for agent-specific options like models, profiles, or reasoning settings without adding a dedicated `gnhf` config field for each one.\n- For `codex` and `claude`, `gnhf` adds its usual non-interactive permission default only when you do not provide your own permission or execution-mode flag. If you set one explicitly, `gnhf` treats that as user-managed and does not add its default on top.\n- Flags that `gnhf` manages itself for a given agent, such as output-shaping or local-server startup flags, are rejected during config loading so you get a clear error instead of duplicate-argument ambiguity.\n\n### Custom Agent Paths\n\nUse `agentPathOverride` to point any agent at a custom binary — useful for wrappers like Claude Code Switch or custom Codex builds that accept the same flags and arguments as the original:\n\n```yaml\nagentPathOverride:\n  claude: ~/bin/claude-code-switch\n  codex: /usr/local/bin/my-codex-wrapper\n```\n\nPaths may be absolute, bare executable names already on your `PATH`, `~`-prefixed, or relative to the config directory (`~/.gnhf/`). The override replaces only the binary name; all standard arguments are preserved, so the replacement must be CLI-compatible with the original agent. On Windows, `.cmd` and `.bat` wrappers are supported, including bare names resolved from `PATH`. For `rovodev`, the override must point to an `acli`-compatible binary since gnhf invokes it as `<bin> rovodev serve ...`.\nWhen sleep prevention is enabled, `gnhf` uses the native mechanism for your OS: `caffeinate` on macOS, `systemd-inhibit` on Linux, and a small PowerShell helper backed by `SetThreadExecutionState` on Windows.\n\n## Debug Logs\n\nEvery run writes a JSONL debug log to `.gnhf/runs/<runId>/gnhf.log` alongside `notes.md`. Lifecycle events for the orchestrator, agent, and HTTP requests are captured with elapsed timings and (for failures) the full `error.cause` chain — which is what you need to tell a bare `TypeError: fetch failed` apart from an undici `UND_ERR_HEADERS_TIMEOUT`. The agent's own streaming output still goes to the per-iteration `iteration-<n>.jsonl` file next to it.\n\nIncluding a snippet of `gnhf.log` is the single most useful thing you can attach when filing an issue.\n\n## Agents\n\n`gnhf` supports four agents:\n\n| Agent       | Flag               | Requirements                                                               | Notes                                                                                                                                                                                                            |\n| ----------- | ------------------ | -------------------------------------------------------------------------- | ---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- |\n| Claude Code | `--agent claude`   | Install Anthropic's `claude` CLI and sign in first.                        | `gnhf` invokes `claude` directly in non-interactive mode.                                                                                                                                                        |\n| Codex       | `--agent codex`    | Install OpenAI's `codex` CLI and sign in first.                            | `gnhf` invokes `codex exec` directly in non-interactive mode.                                                                                                                                                    |\n| Rovo Dev    | `--agent rovodev`  | Install Atlassian's `acli` and authenticate it with Rovo Dev first.        | `gnhf` starts a local `acli rovodev serve --disable-session-token <port>` process automatically in the repo workspace.                                                                                           |\n| OpenCode    | `--agent opencode` | Install `opencode` and configure at least one usable model provider first. | `gnhf` starts a local `opencode serve --hostname 127.0.0.1 --port <port> --print-logs` process automatically, creates a per-run session, and applies a blanket allow rule so tool calls do not block on prompts. |\n\n## Development\n\n```sh\nnpm run build          # Build with tsdown\nnpm run dev            # Watch mode\nnpm test               # Build, then run unit tests (vitest)\nnpm run test:e2e       # Build, then run end-to-end tests against the mock opencode executable\nnpm run lint           # ESLint\nnpm run format         # Prettier\n```\n","summary":"gnhf is an AI‑driven orchestrator that keeps language‑model agents running in an autonomous loop inside a Git repository, automatically committing each successful iteration and rolling back on failure. It offers a single‑command interface that runs until a user interruption or runtime cap, with retries, exponential backoff, and a live terminal title showing status, token usage, and commit count. The tool is agent‑agnostic—supporting Claude Code, Codex, Rovo Dev, OpenCode, and more—while preserving a clean branch for each run. Developers and teams that need to automate incremental refactoring, feature development, or experimentation will find gnhf useful for generating tidy, documented code changes that wake up ready to review.","description":"Before I go to bed, I tell my agents: good night, have fun","stars":576,"language":"TypeScript"},{"owner":"math-ai-org","repo":"mathcode","url":"https://github.com/math-ai-org/mathcode","readme":"# MathCode\n\n### MathCode: A Frontier Mathematical Coding Agent\n\n```\n███╗   ███╗ █████╗ ████████╗██╗  ██╗ ██████╗ ██████╗ ██████╗ ███████╗\n████╗ ████║██╔══██╗╚══██╔══╝██║  ██║██╔════╝██╔═══██╗██╔══██╗██╔════╝\n██╔████╔██║███████║   ██║   ███████║██║     ██║   ██║██║  ██║█████╗\n██║╚██╔╝██║██╔══██║   ██║   ██╔══██║██║     ██║   ██║██║  ██║██╔══╝\n██║ ╚═╝ ██║██║  ██║   ██║   ██║  ██║╚██████╗╚██████╔╝██████╔╝███████╗\n╚═╝     ╚═╝╚═╝  ╚═╝   ╚═╝   ╚═╝  ╚═╝ ╚═════╝ ╚═════╝ ╚═════╝ ╚══════╝\n```\n\n**Project Page:** [math-ai-org/mathcode](https://github.com/math-ai-org/mathcode)\n\n<p align=\"right\"><strong>English</strong> | <a href=\"./README.ZH.md\">中文</a></p>\n\nMathCode is a terminal AI coding assistant with a built-in math formalization engine. Give it a math problem in plain language and it will automatically convert it into a Lean 4 theorem and attempt a formal proof.\n\n![](./Demo.png)\n\n## Quick Start\n\n```bash\ngit clone https://github.com/math-ai-org/mathcode.git\ncd mathcode\nbash setup.sh\ncodex auth login\n./run\n```\n\nThe `math-ai-org/mathcode` repository is a lightweight bootstrap checkout. You clone the repo, run `bash setup.sh`, and `setup.sh` downloads the matching `mathcode` binary from GitHub Releases when it is missing.\n\nWhat `setup.sh` does:\n\n- downloads the matching `mathcode-vX.Y.Z-<os>-<arch>.tar.gz` asset from GitHub Releases when `./mathcode` is missing\n- verifies `SHA256SUMS.txt` when `shasum` or `sha256sum` is available\n- creates `.env` from `.env.example` when needed\n- bootstraps Lean locally when `lean` / `lake` are missing\n- creates `skills/`, `tools/`, `plugins/` extension directories\n\nOptional maintenance commands:\n\n```bash\nbash setup.sh --status   # check whether the binary/tooling look healthy\nbash setup.sh --clean    # remove install artifacts, keep proofs/vault data\nbash setup.sh --help     # show all setup flags\n```\n\n`bash setup.sh --clean` preserves user outputs in `LeanFormalizations/` and vault data.\n\n## Requirements\n\n- macOS (arm64) or Linux (x86_64)\n- enough disk space for the bundle, Lean toolchain, and Mathlib caches\n- `codex` CLI if you want the default backend and default math flow\n- Python 3.12+ (optional, only needed for analysis tools in `tools/`)\n\n## Common Commands\n\n```bash\n./run -p \"prove that the square of an even number is even\"\necho \"hello\" | ./run -p\n./run --help\n```\n\nMath outputs are written to `LeanFormalizations/`.\n\n## Features\n\n### Persistent Lean REPL\n\nEnable a persistent Lean language server for sub-second compile checks:\n\n```env\nMATHCODE_LEAN_REPL=1\n```\n\nAfter a one-time ~90s warmup (importing Mathlib), every subsequent compile check takes **~0.4s** instead of ~30s. Both error detection and pass confirmation are near-instant. The REPL automatically imports your theorem library and axiom library.\n\n### Theorem Library\n\nAutomatically store proved theorems for reuse in future proofs:\n\n```bash\n/theorem-store on     # enable (writes to .env)\n/theorem-store off    # disable\n/theorem-store sync   # backfill all proved-but-unstored theorems\n/theorem-store status # show stored count and vault info\n```\n\nWhen enabled, every successfully proved theorem is automatically named, appended to `TheoremLib/Stored.lean`, and made importable for future proofs. The prover and planner can reuse stored theorems instead of re-deriving them.\n\n### Axiom Library\n\nStore conversational assumptions as persistent, consistency-checked declarations:\n\n```bash\n/axiomatize \"A is faster than B\"     # formalize + store\n/axiomatize list                     # show all active axioms\n/axiomatize check                    # consistency review\n/axiomatize remove <name>            # remove a declaration\n```\n\nAxioms are stored per-vault with Lean formalization, compile-checked, and auto-injected into formalization and proving prompts. Supports any domain: math, physics, chemistry, narrative, general.\n\n### Lean LSP Integration\n\nEnable Lean LSP for smarter lemma discovery and structured error feedback during proving:\n\n```env\nMATHCODE_USE_LSP=1\n```\n\nWhen enabled, the prover:\n- Searches leansearch.net and Loogle for verified Mathlib lemma names before planning\n- Uses structured LSP diagnostics (line/col/severity) instead of raw stderr\n- Extracts proof goal at error location for targeted repairs\n- Injects search results and vault knowledge into planner and prover prompts\n\nLSP is built-in — no separate installation required.\n\n### Obsidian Theorem Graph\n\nGenerate an Obsidian vault that visualizes theorem dependencies as a knowledge graph:\n\n```bash\n/obsidian on       # enable + generate from existing formalizations\n/obsidian off      # disable\n/obsidian generate # regenerate now\n```\n\nWhen enabled, every formalization and proof auto-updates the vault. Open it in Obsidian and use Graph View to see theorem-to-lemma relationships. Each lemma stub includes the full Lean definition queried from Mathlib via `#print`.\n\n### Agent-Mode Proving\n\nEach proof session becomes a full interactive chat where the agent uses tools to iteratively prove theorems:\n\n```env\nMATHCODE_AGENT_PROVE=1\n```\n\nWorks best with Obsidian Theorem Graph enabled (the agent reads the vault for context). When enabled, the agent can:\n- Search the vault for relevant Mathlib lemmas\n- Write proof candidates and compile them via the persistent REPL\n- Read compile errors, search for fixes, and recompile (up to 10 times per session)\n- Stream its reasoning and tool calls in real-time\n\n### Tree-of-Subgoals Proving\n\nDecompose complex theorems i
