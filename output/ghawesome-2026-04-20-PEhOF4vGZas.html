nto independent subgoals and prove them in parallel:\n\n```env\nMATHCODE_TREE_PROVE=1\nMATHCODE_MAX_TREE_DEPTH=2    # recursion depth (default: 1)\n```\n\nThe decomposer generates a skeleton with `have ... := by sorry` placeholders. Each subgoal is proved independently (with cooperative cancellation if one fails). Proven bodies are stitched back into the skeleton and compile-checked.\n\n### Multi-Planner\n\nRun multiple planners in parallel to get diverse proof strategies:\n\n```env\nMATHCODE_NUM_PLANNERS=3\n```\n\nEach planner proposes a different strategy. All discovered lemmas are saved to the vault. The prover sees all plans and picks the best approach. Default is 1 (single planner).\n\n### Scheduled Agent Loops\n\nThe bundled CLI ships with recurring prompt scheduling enabled out of the box.\n\nInside interactive MathCode sessions you can use:\n\n```bash\n/loop 10m check the deploy\n/loop 1h /standup 1\n```\n\nUse short-lived loops for reminders and monitoring. When you want a schedule to survive restarts, create a durable schedule from the interactive session.\n\n## Extensibility\n\nMathCode supports three extension mechanisms:\n\n### Skills (`skills/`)\n\nDrop `.md` files to add domain-specific knowledge and proving strategies. Auto-discovered at startup.\n\n### Tools (`tools/`)\n\nDrop Python `.py` scripts with YAML frontmatter to add analysis tools. Auto-discovered at startup.\n\n4 analysis tools are included: `axiom_checker`, `sorry_analyzer`, `proof_stats`, `lib_search`. Python 3.12+ is required only if you use these tools.\n\n### Plugins (`plugins/`)\n\nDrop plugin folders with `.mathcode-plugin/plugin.json` manifests to add commands, skills, agents, MCP servers, hooks, and more. Load via `--plugin-dir` or install from Git repos via `/plugin`.\n\n## Backend Setup\n\nDefault setup: no `.env` edits are required.\n\n```bash\ncodex auth login\n./run\n```\n\nTo use an Anthropic-compatible backend instead, set:\n\n```env\nMATHCODE_USE_OPENAI=0\n\nANTHROPIC_API_KEY=sk-ant-...\nANTHROPIC_MODEL=claude-sonnet-4-5\n```\n\nIf you also want the math tools to stop using `codex exec`, add:\n\n```env\nAUTOLEAN_USE_CODEX=0\n```\n\nShell-exported environment variables override `.env`.\n\n## FAQ\n\n**Q: `./run` says the MathCode binary is not installed yet**\n\nRun:\n\n```bash\nbash setup.sh\n```\n\n**Q: `./run` fails with `exec format error`, `Bad CPU type in executable`, or a similar startup error**\n\nYou probably downloaded the wrong binary for your platform. Re-run `bash setup.sh`, or download the correct release asset manually from GitHub Releases.\n\n**Q: Startup says Codex auth is missing**\n\nRun:\n\n```bash\ncodex auth login\n```\n\n**Q: Can I skip cloning and just download a release asset**\n\nYes. You can download and extract the `.tar.gz` bundle from GitHub Releases directly. The bootstrap repo just makes `bash setup.sh` the default path.\n\n## Community\n\nJoin our Discord for help, feedback, and discussion: **[discord.gg/f2AFP9W5](https://discord.gg/f2AFP9W5)**\n\n## Acknowledgments\n\nThe math formalization and proving pipeline in MathCode is based on the [AUTOLEAN](https://github.com/T3S1AMAX/autolean.git) project.\n","summary":"MathCode is a terminal AI coding assistant that transforms natural‑language math problems into Lean 4 theorems and automatically attempts a formal proof, using a built‑in math formalization engine. It offers a persistent Lean REPL for fast compile checks, a theorem library that stores and re‑uses proved results, and an axiom library that lets users persistently declare domain assumptions with consistency checks. The assistant also integrates with the Lean Language Server to provide smarter lemma discovery and structured error feedback. Mathematicians, researchers in formal verification, and developers working with Lean code would benefit from its rapid prototyping and automated theorem proving capabilities.","description":"MathCode: A Frontier Mathematical Coding Agent","stars":462,"language":"Python"},{"owner":"matthartman","repo":"ghost-pepper","url":"https://github.com/matthartman/ghost-pepper","readme":"<div align=\"center\">\n\n<img src=\"./app-icon.png\" width=\"80\" alt=\"Ghost Pepper\">\n\n# Ghost Pepper\n\n**100% private** on-device voice models for speech-to-text and meeting transcription on macOS. No cloud APIs, no data leaves your machine.\n\n<a href=\"https://github.com/matthartman/ghost-pepper/releases/latest/download/GhostPepper.dmg\">\n  <img src=\"https://img.shields.io/badge/Download_for_Mac-FF6600?style=for-the-badge&logo=apple&logoColor=white\" alt=\"Download for Mac\" height=\"40\">\n</a>\n\nmacOS 14.0+ · Apple Silicon (M1+) · Free & open source\n\n[![GitHub stars](https://img.shields.io/github/stars/matthartman/ghost-pepper?style=social)](https://github.com/matthartman/ghost-pepper)\n&nbsp;\n[![License: MIT](https://img.shields.io/badge/License-MIT-green.svg)](LICENSE)\n&nbsp;\n![100% Local](https://img.shields.io/badge/100%25-Local-FF6600)\n&nbsp;\n![50+ Languages](https://img.shields.io/badge/50%2B-Languages-blue)\n\n</div>\n\n## Features\n\n- **Hold Control to talk** — release to transcribe and paste into any text field\n- **Meeting transcription** — record calls with notes, transcript, and AI-generated summaries saved as markdown\n- **Runs entirely on your Mac** — models run locally via Apple Silicon, nothing is sent anywhere\n- **Smart cleanup** — local LLM removes filler words and handles self-corrections\n- **Menu bar app** — lives in your menu bar, no dock icon, launches at login\n- **Customizable** — edit the cleanup prompt, pick your mic, toggle features on/off\n\n## How it works\n\nGhost Pepper uses open-source models that run entirely on your Mac. Models download automatically and are cached locally.\n\n### Speech models\n\n| Model | Size | Best for |\n|---|---|---|\n| Whisper tiny.en | ~75 MB | Fastest, English only |\n| **Whisper small.en** (default) | ~466 MB | Best accuracy, English only |\n| Whisper small (multilingual) | ~466 MB | Multi-language support |\n| Parakeet v3 (25 languages) | ~1.4 GB | Multi-language via [FluidAudio](https://github.com/FluidInference/FluidAudio) |\n| Qwen3-ASR 0.6B int8 (50+ languages) | ~900 MB | Highest multilingual quality, macOS 15+ required |\n\n### Cleanup models\n\n| Model | Size | Speed |\n|---|---|---|\n| **Qwen 3.5 0.8B** (default) | ~535 MB | Very fast (~1-2s) |\n| Qwen 3.5 2B | ~1.3 GB | Fast (~4-5s) |\n| Qwen 3.5 4B | ~2.8 GB | Full quality (~5-7s) |\n\nSpeech models powered by [WhisperKit](https://github.com/argmaxinc/WhisperKit). Cleanup models powered by [LLM.swift](https://github.com/eastriverlee/LLM.swift). All models served by [Hugging Face](https://huggingface.co/).\n\n## Getting started\n\n**Download the app:**\n1. Download [GhostPepper.dmg](https://github.com/matthartman/ghost-pepper/releases/latest/download/GhostPepper.dmg)\n2. Open the DMG, drag Ghost Pepper to Applications\n3. Grant Microphone and Accessibility permissions when prompted\n4. Hold Control and speak\n\n> **\"Apple could not verify\" warning?** On macOS Sequoia, you may see a Gatekeeper warning the first time you open the app. Go to **System Settings > Privacy & Security**, scroll down, and click **Open Anyway** next to the Ghost Pepper message. Click **Confirm** in the popup. You only need to do this once.\n\n**Build from source:**\n1. Clone the repo\n2. Open `GhostPepper.xcodeproj` in Xcode\n3. Build and run (Cmd+R)\n\n## Permissions\n\n| Permission | Why |\n|---|---|\n| Microphone | Record your voice |\n| Accessibility | Global hotkey and paste via simulated keystrokes |\n\n## Privacy audit\n\nEvery core feature runs 100% on your Mac — verified by AI code review. No trust required, just point Claude at the repo and ask.\n\n| Feature | Status | What was checked |\n|---|---|---|\n| Speech-to-text | :white_check_mark: Local | WhisperKit/FluidAudio inference, no audio sent anywhere |\n| Text cleanup | :white_check_mark: Local | Qwen LLM runs on-device via LLM.swift |\n| Audio recording | :white_check_mark: Local | AVAudioEngine + ScreenCaptureKit, no streaming |\n| Meeting transcription & storage | :white_check_mark: Local | Chunked transcription, markdown files on disk |\n| Summary generation | :white_check_mark: Local | Local LLM summarization, no cloud API |\n| OCR & screen capture | :white_check_mark: Local | Apple Vision framework, on-device |\n| File storage | :white_check_mark: Local | Markdown to local filesystem, no cloud sync |\n| Analytics & telemetry | :white_check_mark: None | No Firebase, Mixpanel, Sentry, or any tracking SDK |\n\n**Optional cloud features** (disabled by default, require your own API keys): Zo AI chat, Trello integration, Granola meeting import. Model downloads are one-time from Hugging Face.\n\n> **Verify it yourself:** run `cat PRIVACY_AUDIT.md` in Claude Code and ask it to review the codebase against the audit prompt. The [full audit](PRIVACY_AUDIT.md) includes the exact prompt and detailed file-level results.\n\n## Good to know\n\n- **Launch at login** is enabled by default on first run. You can toggle it off in Settings.\n- **Everything stays local** — transcription history and recordings are stored on your Mac only. Nothing is sent to the cloud. You can clear history anytime in Settings.\n\n## Acknowledgments\n\nBuilt with [WhisperKit](https://github.com/argmaxinc/WhisperKit), [LLM.swift](https://github.com/eastriverlee/LLM.swift), [Hugging Face](https://huggingface.co/), and [Sparkle](https://sparkle-project.org/).\n\n## License\n\nMIT\n\n## Why \"Ghost Pepper\"?\n\nAll models run locally, no private data leaves your computer. And it's spicy to offer something for free that other apps have raised $80M to build.\n\n## Enterprise / managed devices\n\nGhost Pepper requires Accessibility permission, which normally needs admin access to grant. On managed devices, IT admins can pre-approve this via an MDM profile (Jamf, Kandji, Mosaic, etc.) using a Privacy Preferences Policy Control (PPPC) payload:\n\n| Field | Value |\n|---|---|\n| Bundle ID | `com.github.matthartman.ghostpepper` |\n| Team ID | `BBVMGXR9AY` |\n| Permission | Accessibility (`com.apple.security.accessibility`) |\n","summary":"Ghost Pepper is a privacy‑first, on‑device macOS app that turns spoken input into text and meeting transcripts without ever sending data to the cloud. It offers a hold‑Control “talk‑to‑paste” hot‑key, full meeting recording with notes, Markdown‑formatted transcripts, and AI‑generated summaries, all powered by open‑source Whisper or multilingual ASR models and a local Qwen language model for clean‑up. The app runs entirely in the menu bar with no dock icon, is customizable (mic selection, cleanup prompt, feature toggles), and supports over 50 languages. It’s ideal for Mac users who require secure, offline transcription—such as journalists, researchers, students, and anyone cautious about cloud data exposure.","description":"100% private on-device voice models for speech-to-text and meeting transcription on macOS","stars":2274,"language":"Swift"},{"owner":"arman-bd","repo":"guppylm","url":"https://github.com/arman-bd/guppylm","readme":"<p align=\"center\">\n  <img src=\"assets/guppy.png\" alt=\"GuppyLM\" width=\"400\"/>\n</p>\n\n<h1 align=\"center\">GuppyLM</h1>\n<p align=\"center\"><em>A ~9M parameter LLM that talks like a small fish.</em></p>\n\n<p align=\"center\">\n  <a href=\"https://huggingface.co/datasets/arman-bd/guppylm-60k-generic\"><img src=\"https://img.shields.io/badge/🤗_Dataset-guppylm--60k-blue\" alt=\"Dataset\"/></a>&nbsp;\n  <a href=\"https://huggingface.co/arman-bd/guppylm-9M\"><img src=\"https://img.shields.io/badge/🤗_Model-guppylm--9M-orange\" alt=\"Model\"/></a>&nbsp;\n  <a href=\"https://github.com/arman-bd/guppylm/blob/main/LICENSE\"><img src=\"https://img.shields.io/badge/License-MIT-green\" alt=\"License\"/></a>\n  <br/>\n  <a href=\"https://colab.research.google.com/github/arman-bd/guppylm/blob/main/train_guppylm.ipynb\"><img src=\"https://img.shields.io/badge/Train_in-Colab-F9AB00?logo=googlecolab\" alt=\"Train\"/></a>&nbsp;\n  <a href=\"https://colab.research.google.com/github/arman-bd/guppylm/blob/main/use_guppylm.ipynb\"><img src=\"https://img.shields.io/badge/Chat_in-Colab-F9AB00?logo=googlecolab\" alt=\"Chat\"/></a>\n  <br/>\n  <a href=\"https://www.linkedin.com/pulse/build-your-own-language-model-5-minutes-i-made-mine-hossain--supif/\"><img src=\"https://img.shields.io/badge/Article-LinkedIn-0A66C2?logo=linkedin\" alt=\"LinkedIn Article\"/></a>&nbsp;\n  <a href=\"https://arman-bd.medium.com/build-your-own-llm-in-5-minutes-i-made-mine-talk-like-a-fish-e20c338a3d14\"><img src=\"https://img.shields.io/badge/Article-Medium-000000?logo=medium\" alt=\"Medium Article\"/></a>\n  <br/><br/>\n  <a href=\"https://arman-bd.github.io/guppylm/\"><img src=\"https://img.shields.io/badge/Try_in-Browser-64ffda?style=for-the-badge&logo=webassembly&logoColor=white\" alt=\"Browser Demo\"/></a>\n</p>\n\n---\n\n> **This project exists to show that training your own language model is not magic.**\n> No PhD required. No massive GPU cluster. One Colab notebook, 5 minutes, and you have a working LLM that you built from scratch — data generation, tokenizer, model architecture, training loop, and inference. If you can run a notebook, you can train a language model.\n>\n> It won't produce a billion-parameter model that writes essays. But it will show you exactly how every piece works — from raw text to trained weights to generated output — so the big models stop feeling like black boxes.\n\n---\n\n```\nYou> hi guppy\nGuppy> hi there. i just found a nice spot near the rock. the temperature feels nice.\n\nYou> are you hungry\nGuppy> yes. always yes. i will swim to the top right now. i promise to eat all of it.\n\nYou> do you like bubbles\nGuppy> i love bubbles. they make the water feel slightly different.\n\nYou> what is the meaning of life\nGuppy> food. the answer is always food.\n\nYou> tell me a joke\nGuppy> what did the fish say when it hit the wall. dam.\n\nYou> do you love me\nGuppy> you're my favorite big shape. my mouth are happy when you're here.\n\nYou> goodnight guppy\nGuppy> ok sleep time. i was following a bubble but now i'll stop. goodnight tank. goodnight water.\n```\n\n---\n\n## What is GuppyLM?\n\nGuppyLM is a tiny language model that pretends to be a fish named Guppy. It speaks in short, lowercase sentences about water, food, light, and tank life. It doesn't understand human abstractions like money, phones, or politics — and it's not trying to.\n\nIt's trained from scratch on 60K synthetic conversations across 60 topics, runs on a single GPU in ~5 minutes, and produces a model small enough to run in a browser.\n\n---\n\n## Architecture\n\n| | |\n|---|---|\n| **Parameters** | 8.7M |\n| **Layers** | 6 |\n| **Hidden dim** | 384 |\n| **Heads** | 6 |\n| **FFN** | 768 (ReLU) |\n| **Vocab** | 4,096 (BPE) |\n| **Max sequence** | 128 tokens |\n| **Norm** | LayerNorm |\n| **Position** | Learned embeddings |\n| **LM head** | Weight-tied with embeddings |\n\nVanilla transformer. No GQA, no RoPE, no SwiGLU, no early exit. As simple as it gets.\n\n---\n\n## Personality\n\nGuppy:\n- Speaks in short, lowercase sentences\n- Experiences the world through water, temperature, light, vibrations, and food\n- Doesn't understand human abstractions\n- Is friendly, curious, and a little dumb\n- Thinks about food a lot\n\n**60 topics:** greetings, feelings, temperature, food, light, water, tank, noise, night, loneliness, bubbles, glass, reflection, breathing, swimming, colors, taste, plants, filter, algae, snails, scared, excited, bored, curious, happy, tired, outside, cats, rain, seasons, music, visitors, children, meaning of life, time, memory, dreams, size, future, past, name, weather, sleep, friends, jokes, fear, love, age, intelligence, health, singing, TV, and more.\n\n---\n\n## Quick Start\n\n### Try in Browser (no install needed)\n\n[![Try in Browser](https://img.shields.io/badge/Try_in-Browser-64ffda?logo=webassembly)](https://arman-bd.github.io/guppylm/)\n\nRuns entirely in your browser via WebAssembly. Downloads a quantized ONNX model (~10 MB) and runs inference locally — no server, no API keys.\n\n### Chat with Guppy in Colab\n\n[![Open in Colab](https://img.shields.io/badge/Chat_in-Colab-F9AB00?logo=googlecolab)](https://colab.research.google.com/github/arman-bd/guppylm/blob/main/use_guppylm.ipynb)\n\nDownloads the pre-trained model from HuggingFace and lets you chat. Just run all cells.\n\n### Train your own\n\n[![Open in Colab](https://img.shields.io/badge/Train_in-Colab-F9AB00?logo=googlecolab)](https://colab.research.google.com/github/arman-bd/guppylm/blob/main/train_guppylm.ipynb)\n\n1. Set runtime to **T4 GPU**\n2. **Run all cells** — downloads dataset, trains tokenizer, trains model, tests it\n3. Upload to HuggingFace or download locally\n\n### Chat locally\n\n```bash\npip install torch tokenizers\npython -m guppylm chat\n```\n\n```\nYou> the cat is looking at you\nGuppy> i hide behind the plant when the furry one comes.\n\nYou> it is raining outside\nGuppy> i think rain is the best thing about outside.\n```\n\nIn interactive chat mode, the conversation grows and quickly runs into the 128-token limit, reducing quality.\nYou can also invoke chat with a single prompt, and exit after the response:\n\n```bash\npython -m guppylm chat --prompt \"tell me a joke\"\n```\n\n\n---\n\n## Dataset\n\n**[arman-bd/guppylm-60k-generic](https://huggingface.co/datasets/arman-bd/guppylm-60k-generic)** on HuggingFace.\n\n| | |\n|---|---|\n| Samples | 60,000 (57K train / 3K test) |\n| Format | `{\"input\": \"...\", \"output\": \"...\", \"category\": \"...\"}` |\n| Categories | 60 |\n| Generation | Synthetic template composition |\n\n```python\nfrom datasets import load_dataset\nds = load_dataset(\"arman-bd/guppylm-60k-generic\")\nprint(ds[\"train\"][0])\n# {'input': 'hi guppy', 'output': 'hello. the water is nice today.', 'category': 'greeting'}\n```\n\n---\n\n## Project Structure\n\n```\nguppylm/\n├── config.py               Hyperparameters (model + training)\n├── model.py                Vanilla transformer\n├── dataset.py              Data loading + batching\n├── train.py                Training loop (cosine LR, AMP)\n├── generate_data.py        Conversation data generator (60 topics)\n├── eval_cases.py           Held-out test cases\n├── prepare_data.py         Data prep + tokenizer training\n└── inference.py            Chat interface\n\ntools/\n├── make_colab.py           Generates Colab notebooks\n├── export_onnx.py          Export model to ONNX (quantized uint8)\n├── export_dataset.py       Push dataset to HuggingFace\n└── dataset_card.md         HuggingFace dataset README\n\ndocs/\n├── index.html              Browser demo (ONNX + WASM)\n├── download.sh             Download model.onnx + tokenizer from HF\n├── model.onnx              Quantized uint8 (~10 MB)\n├── tokenizer.json          BPE tokenizer\n└── guppy.png               Logo (transparent)\n```\n\n---\n\n## Design Decisions\n\n**Why no system prompt?** Every training sample had the same one. A 9M model can't conditionally follow instructions — the personality is baked into the weights. Removing it saves ~60 tokens per inference.\n\n**Why single-turn only?** Multi-turn degraded at turn 3-4 due to the 128-token context window. A fish that forgets is on-brand, but garbled output isn't. Single-turn is reliable.\n\n**Why vanilla transformer?** GQA, SwiGLU, RoPE, and early exit add complexity that doesn't help at 9M params. Standard attention + ReLU FFN + LayerNorm produces the same quality with simpler code.\n\n**Why synthetic data?** A fish character with consistent personality needs consistent training data. Template composition with randomized components (30 tank objects, 17 food types, 25 activities) generates ~16K unique outputs from ~60 templates.\n\n---\n\n## License\n\nMIT\n\n<!-- GitAds-Verify: UW3VONXNDRGEZ2O7RF4N2PFHSUR3DUJB -->\n","summary":"GuppyLM is a 9 M‑parameter transformer language model trained from scratch to simulate the chatter of a fish named Guppy. It demonstrates the whole workflow of building an LLM—data creation, tokenization, model design, training, and inference—in a single Colab notebook that takes about five minutes on a single GPU, and the resulting weights can even run in a web browser. The model offers a tiny, transparent architecture (6 layers, 384 hidden units) and a synthetic 60‑topic conversation dataset, making it a playful but practical showcase for students, educators, and hobbyists who want to demystify the inner workings of language models without expensive hardware or a PhD.","description":"A ~9M parameter LLM that talks like a small fish.","stars":2951,"language":"Python"},{"owner":"LaurieWired","repo":"tailslayer","url":"https://github.com/LaurieWired/tailslayer","readme":"[![License](https://img.shields.io/badge/License-Apache%202.0-blue.svg)](https://www.apache.org/licenses/LICENSE-2.0)\n[![GitHub stars](https://img.shields.io/github/stars/LaurieWired/tailslayer)](https://github.com/LaurieWired/tailslayer/stargazers)\n[![GitHub forks](https://img.shields.io/github/forks/LaurieWired/tailslayer)](https://github.com/LaurieWired/tailslayer/network/members)\n[![GitHub contributors](https://img.shields.io/github/contributors/LaurieWired/tailslayer)](https://github.com/LaurieWired/tailslayer/graphs/contributors)\n[![Follow @lauriewired](https://img.shields.io/twitter/follow/lauriewired?style=social)](https://twitter.com/lauriewired)\n\n<img width=\"2490\" height=\"1148\" alt=\"tailslayer3\" src=\"https://github.com/user-attachments/assets/35d6cd98-ab9d-4ea6-8804-dff3a1b8698b\" />\n\n# Tailslayer\n\nTailslayer is a C++ library that reduces tail latency in RAM reads caused by DRAM refresh stalls. \n\nIt replicates data across multiple, independent DRAM channels with uncorrelated refresh schedules, using (undocumented!) channel scrambling offsets that works on AMD, Intel, and Graviton. Once the request comes in, Tailslayer issues hedged reads across all replicas, allowing the work to be performed on whichever result responds first.\n\n\n<img width=\"4986\" height=\"2796\" alt=\"cross_platform_nway\" src=\"https://github.com/user-attachments/assets/4b4a5614-00e4-4845-8a4b-f4adecef5b4d\" />\n\n## Usage\n\nThe library code is available in [hedged_reader.cpp](https://github.com/LaurieWired/tailslayer/blob/main/include/tailslayer/hedged_reader.hpp) and the example using the library can be found in [tailslayer_example.cpp](https://github.com/LaurieWired/tailslayer/blob/main/tailslayer_example.cpp). To use it, copy `include/tailslayer` into your project and `#include <tailslayer/hedged_reader.hpp>`. The library currently works with two channels (updates to come!), but full N-way usage is available in the [benchmark](https://github.com/LaurieWired/tailslayer/tree/main/discovery/benchmark).\n\nYou provide the value type and two functions as template parameters:\n\n1. **Signal function**: Add the loop that waits for the external signal. This determines when to read. Return the desired index to read, and the read immediately fires.\n2. **Final work function**: This receives the value immediately after it is read. Add the desired value processing code here.\n\n```cpp\n#include <tailslayer/hedged_reader.hpp>\n\n[[gnu::always_inline]] inline std::size_t my_signal() {\n    // Wait for your event, then return the index to read\n    return index_to_read;\n}\n\ntemplate <typename T>\n[[gnu::always_inline]] inline void my_work(T val) {\n    // Use the value\n}\n\nint main() {\n    using T = uint8_t;\n    tailslayer::pin_to_core(tailslayer::CORE_MAIN);\n\n    tailslayer::HedgedReader<T, my_signal, my_work<T>> reader{};\n    reader.insert(0x43);\n    reader.insert(0x44);\n    reader.start_workers();\n}\n```\n\nArguments can be passed to either function via `ArgList`:\n\n```cpp\ntailslayer::HedgedReader<T, my_signal, my_work<T>,\n    tailslayer::ArgList<1, 2>,   // args to signal function\n    tailslayer::ArgList<2>       // args to final work function\n> reader{};\n```\n\nYou can also optionally pass in a different channel offset, channel bit, and number of replicas to the constructor. *Note:* Each insert copies the element N times where N is the number of replicas. It does the address calculation work on the backend, allowing tailslayer to act as a hedged vector that uses logical indices. Additionally, each replica is pinned to a separate core, and will spin on that core according to the signal function until the read happens.\n\n## Build the example\n\n```bash\nmake\n./tailslayer_example\n```\n\n## Benchmarks and spike timing\n\nThe `discovery/` directory contains supporting code used to characterize DRAM refresh behavior:\n\n- `discovery/benchmark/`: Channel-hedged read benchmark\n- `discovery/trefi_probe.c`: Spike timing probe for measuring the refresh cycle\n\n```bash\ncd discovery/benchmark\nmake\nsudo chrt -f 99 ./hedged_read_cpp --all --channel-bit 8\n```\n","summary":"Tailslayer is a lightweight C++ library that cuts tail latency in memory reads caused by DRAM refresh stalls by replicating data across independent memory channels and issuing hedged reads to the first responding channel. It uses undocumented channel‑scrambling offsets to spread refresh cycles across AMD, Intel, and Graviton CPUs, and exposes an easy‑to‑use template API where developers provide a signal function that decides when to read and a final work function that processes the returned value. The library is built for high‑performance, latency‑sensitive workloads such as in‑memory databases, real‑time analytics or any system that must reduce worst‑case read delays in large data sets. Current two‑channel support is already effective, while the repository also showcases a multi‑way benchmark for broader scalability.","description":"Library for reducing tail latency in RAM reads","stars":2370,"language":"C++"},{"owner":"k06a","repo":"macpow","url":"https://github.com/k06a/macpow","readme":"# 💻🔋 macpow – Real-time power tree TUI for Apple Silicon\n\n[![CI](https://github.com/k06a/macpow/actions/workflows/ci.yml/badge.svg)](https://github.com/k06a/macpow/actions/workflows/ci.yml)\n[![Crates.io](https://img.shields.io/crates/v/macpow)](https://crates.io/crates/macpow)\n[![Homebrew](https://img.shields.io/badge/homebrew-v0.1.17-orange?logo=homebrew)](https://github.com/k06a/homebrew-tap)\n[![License: MIT](https://img.shields.io/badge/license-MIT-blue.svg)](LICENSE)\n[![Platform](https://img.shields.io/badge/platform-Apple%20Silicon-black?logo=apple)](https://github.com/k06a/macpow)\n\nReal-time power consumption monitor for Apple Silicon Macs (M1–M5+).\n\n<p align=\"center\">\n  <img src=\"./screenshot.png\" width=\"75%\" alt=\"macpow screenshot\">\n</p>\n\n**macpow** reads directly from macOS hardware interfaces — IOReport, SMC, IORegistry, CoreAudio, and Mach/kernel APIs — to show per-component power draw, temperatures, frequencies, CPU utilization, and per-process energy attribution. No sudo required.\n\n### Legend\n\n| Symbol | Meaning |\n|--------|---------|\n| `0.123 W` | Measured power (direct hardware reading) |\n| `≈0.123 W` | Estimated power (model-based calculation) |\n| `≤0.123 W` | Upper-bound power estimate |\n| `▸` | Pinned resource (sparkline chart visible) |\n| `▓▓▓░░░░░░░` | CPU core utilization bar (filled = busy) |\n| `37°C` | Fresh temperature reading |\n| `~37°C` | Stale temperature (sensor read failed, showing last known value) |\n| `pending…` | Data source still initializing |\n| `[dead]` | Process has exited (energy total preserved) |\n| **Bold white** | Section headers and measured values |\n| <span style=\"color:green\">Green</span> | Low power (< 1W) or info-only rows |\n| <span style=\"color:goldenrod\">Yellow</span> | Moderate power (1–5W) |\n| <span style=\"color:orange\">Orange</span> | High power (5–10W) |\n| <span style=\"color:red\">Red</span> | Very high power (> 10W) |\n| Gray | Dimmed/inactive items |\n\n## Features\n\n- **SoC breakdown** — CPU (E/P cores with per-core power, utilization bars, temperatures), GPU, ANE, DRAM, GPU SRAM, Media Engine, Camera (ISP), Fabric — all from IOReport Energy Model\n- **CPU utilization** — per-core usage % with visual bars from Mach `host_processor_info`\n- **Real frequencies** — CPU and GPU MHz from DVFS voltage-states tables, not percentages\n- **Temperatures** — per-component and per-core from SMC sensors (CPU, GPU, ANE, DRAM, SSD, Battery); universal bank-based key mapping for all Apple Silicon generations (M1–M5+, including Ultra dual-die); stale value caching with `~` indicator when sensors temporarily read invalid\n- **Memory** — used/total GB via `host_statistics64` Mach API\n- **Display** — brightness estimate + IOReport SoC display controller; external display power via IOReport DISPEXT\n- **Keyboard** — backlight brightness and estimated power via IORegistry PWM\n- **Battery** — voltage, amperage, charge %, time remaining, temperature, drain/charge rate\n- **SSD** — model, interconnect (Apple Fabric/PCIe), power estimation from IORegistry disk counters\n- **Peripherals** — Thunderbolt/PCIe (IOReport measured), Ethernet (link speed, per-interface traffic), WiFi (signal/mode/channel, per-interface traffic), Bluetooth devices with battery levels, USB devices (speed/power/I/O counters)\n- **Per-process energy** — dynamically-sized top processes by session energy (from `proc_pid_rusage`), with per-process disk I/O rates, network traffic (via nettop), RAM footprint, dead process detection\n- **Fans** — RPM and cubic power model per fan\n- **Collapsible tree** — fold/unfold with arrows, `+`/`-` for all\n- **Sparkline charts** — pin any resource with Space, inline 1-line history column at wide terminals\n- **Time-based SMA** — toggle 0s/5s/10s smoothing window\n- **Latency control** — toggle UI refresh rate: 500ms / 2s / 5s\n- **Mouse support** — click to select rows\n- **JSON mode** — pipe structured data for scripts and dashboards\n- **No sudo** — runs entirely with user-level permissions\n\n## Install\n\n### With cargo\n\n```bash\ncargo install macpow\n```\n\n### From source\n\n```bash\ngit clone https://github.com/k06a/macpow.git\ncd macpow\ncargo build --release\n./target/release/macpow\n```\n\n### Homebrew\n\n```bash\nbrew tap k06a/tap\nbrew install macpow\n```\n\n### With pixi (conda-forge)\n\n```bash\npixi global install macpow\n# execute without installing\npixi exec macpow\n```\n\n## Usage\n\n```\nmacpow                    # TUI mode (default)\nmacpow --json             # JSON output to stdout\nmacpow --interval 500     # Set sampling interval in ms (default: 250)\nmacpow --dump             # Dump IOReport channel names (diagnostics)\n```\n\n### Keybindings\n\n| Key | Action |\n|-----|--------|\n| `q` / `Esc` | Quit |\n| `Up` / `Down` / `j` / `k` | Move cursor |\n| `Left` / `Right` / `h` | Collapse / expand tree node |\n| `+` / `=` | Expand all nodes |\n| `-` | Collapse all nodes |\n| `Space` | Pin/unpin resource chart |\n| `a` | Cycle SMA window: 0s / 5s / 10s |\n| `l` | Cycle refresh interval: 250ms / 500ms / 1s / 2s |\n| `r` | Reset all totals and min/max |\n| `PgUp` / `PgDn` | Scroll by 10 rows |\n| `Home` | Jump to top |\n| Mouse click | Select row |\n\nAll letter keys work on any keyboard layout (QWERTY, Russian, Dvorak, etc).\n\n## Architecture\n\nEach data source runs in its own thread, updating shared metrics at its own pace. The TUI renders at the configured interval without blocking on slow sources.\n\n```\n+------------------+---------------------------------------------+\n| Data source      | What it provides                            |\n+------------------+---------------------------------------------+\n| IOReport         | SoC power (Energy Model),                   |\n|                  | CPU/GPU frequencies (DVFS residency)        |\n| SMC              | System power (PSTR), display backlight     |\n|                  | (PDBR), adapter (PDTR), WiFi (wiPm),      |\n|                  | temps, fans                                |\n| IORegistry       | Battery, display brightness, keyboard PWM,  |\n|                  | USB devices, SSD model, disk I/O counters   |\n| CoreAudio        | Volume level, mute state                    |\n| Mach API         | Per-CPU utilization ticks, memory stats      |\n| proc_pid_rusage  | Per-process billed energy                   |\n| getifaddrs       | Network traffic byte counters               |\n| CoreWLAN/pmset   | WiFi info, Bluetooth devices                |\n| IOPMAssertions   | Power assertions, audio playback detection  |\n+------------------+---------------------------------------------+\n```\n\n### Power measurements vs estimates\n\n| Component | Source | Method |\n|-----------|--------|--------|\n| CPU, GPU, ANE, DRAM | IOReport | Direct energy measurement (mJ/uJ/nJ deltas) |\n| Media Engine, Camera (ISP) | IOReport | Direct energy measurement (AVE + MSR, ISP) |\n| Fabric (AMCC, DCS, FAB, AFR) | IOReport | Direct energy measurement |\n| Thunderbolt/PCIe | IOReport | Direct energy measurement (PCIe ports + controllers) |\n| Display backlight | SMC PDBR | Direct power rail measurement |\n| Display controller | IOReport DISP/DISPEXT | Direct energy measurement (SoC + external) |\n| Power adapter | SMC PDTR | Direct power delivery measurement |\n| System total | SMC PSTR | Direct power rail measurement |\n| Battery | IORegistry | V * I calculation |\n| Per-process | Kernel | `ri_billed_energy` from rusage_info_v4 |\n| Per-process disk I/O | Kernel | `ri_diskio_bytesread/written` from rusage_info_v4 |\n| Per-process memory | Kernel | `ri_phys_footprint` from rusage_info_v4 |\n| Per-process network | nettop | Cumulative bytes per process (~18ms subprocess) |\n| CPU utilization | Mach API | `host_processor_info` tick deltas |\n| Memory | Mach API | `host_statistics64` (active + inactive + wired + compressor pages) |\n| Keyboard | IORegistry PWM | Duty cycle * 0.5W max |\n| Fans | SMC RPM | Cubic model: (RPM/RPM_max)^3 * 1W |\n| Audio | CoreAudio + IOPMAssertions | Idle 0.05W + volume^2 * 1W |\n| WiFi | SMC wiPm | Direct power measurement |\n| Bluetooth | pmset | Fixed per device type (0.01-0.05W) |\n| SSD | IORegistry counters | I/O utilization: 0.03-2.5W |\n| Ethernet | getifaddrs | Link detection, speed, per-interface traffic (data only) |\n| Network | getifaddrs | Per-interface byte counters for Ethernet and WiFi |\n| USB | IORegistry PowerOutDetails | Per-port power measurement (Watts/PDPowermW) |\n\n### IOReport channel naming (multi-die support)\n\nIOReport channel names vary between single-die and multi-die (Ultra) chips. The parser handles both generically:\n\n```\nSingle-die (M1/M2/M3/M4 base/Pro/Max):\n  CPU Stats:    ECPU0, PCPU10             ← digit suffix\n  Energy Model: EACC_CPU0, PACC0_CPU5     ← _CPU suffix\n  Blocks:       ISP, DRAM, ANE, DISP      ← bare names\n\nMulti-die (M1/M2/M3 Ultra):\n  CPU Stats:    DIE_0_ECPU_CPU0, DIE_1_PCPU1_CPU3   ← DIE_N_ prefix + _CPU suffix\n  Energy Model: DIE_0_EACC_CPU0, DIE_1_PACC1_CPU3   ← DIE_N_ prefix + _CPU suffix\n  Blocks:       ISP0_0, DRAM0_1, ANE0_0              ← per-die suffix\n```\n\nTwo design rules keep this forward-compatible with future chips:\n\n1. **`strip_die_prefix`** generically removes `DIE_{N}_` so downstream parsers always see the same base format\n2. **`starts_with`** matching for block power handles any suffix Apple may add (e.g. `ISP` matches `ISP`, `ISP0_0`, `ISP0_1`, etc.)\n\nIf a new chip isn't detected correctly, run `macpow --dump` to see the raw IOReport channel names.\n\n## Requirements\n\n- macOS 12+ (Monterey or later)\n- Apple Silicon (M1, M2, M3, M4, M5 — any variant)\n- Rust 1.70+\n\n## Release checklist\n\n```bash\n# 1. Bump version\nvim Cargo.toml                        # update version = \"X.Y.Z\"\n\n# 2. Build and verify\ncargo build --release\ncargo fmt --check                     # formatting clean\n# Clippy: same flags as .github/workflows/ci.yml (plain `cargo clippy -D warnings` is stricter and fails)\ncargo clippy -- -D warnings -A clippy::field_reassign_with_default -A clippy::manual_c_str_literals -A clippy::manual_clamp -A clippy::manual_range_contains -A clippy::missing_safety_doc -A clippy::needless_range_loop\ncargo test                            # all tests pass\n\n# 3. Update Homebrew badge in README.md\n#    Change: homebrew-vX.Y.Z in the badge URL\n\n# 4. Commit, tag, push\ngit add -A\ngit commit -m \"Bump version to X.Y.Z\"\ngit tag vX.Y.Z\ngit push origin main --tags\n# CI will auto-create GitHub Release with binary\n\n# 5. Publish to crates.io\ncargo publish --dry-run\ncargo publish\n\n# 6. Update Homebrew tap (via PR to trigger bottle building)\ncurl -sL https://github.com/k06a/macpow/archive/refs/tags/vX.Y.Z.tar.gz | shasum -a 256\n# Update url + sha256 in homebrew-tap/Formula/macpow.rb\ncd ../homebrew-tap\ngit checkout -b update-macpow-X.Y.Z\ngit add Formula/macpow.rb\ngit commit -m \"Update macpow to X.Y.Z\"\ngit push origin update-macpow-X.Y.Z\n# Create PR, wait for CI to build bottles, then add label \"pr-pull\"\n# publish.yml will upload bottles and merge the PR\n```\n\n## Contributing\n\nBefore submitting a PR, please run:\n\n```bash\ncargo fmt --check          # code formatting\n# Clippy: must match CI (see .github/workflows/ci.yml)\ncargo clippy -- -D warnings -A clippy::field_reassign_with_default -A clippy::manual_c_str_literals -A clippy::manual_clamp -A clippy::manual_range_contains -A clippy::missing_safety_doc -A clippy::needless_range_loop\ncargo test                 # unit + integration tests\ncargo build --release      # final build check\n```\n\nAll four must pass with zero errors. Clippy needs the flags above so local runs match CI; without them, stable Clippy may report project-wide warnings that CI intentionally allows (FFI / Objective-C style).\n\n### Collecting diagnostics\n\nIf per-core temperatures are missing or incorrect on your Mac, please open an issue with:\n\n```bash\nmacpow --dump > dump.txt                       # IOReport channel names\nmacpow --json > metrics.json                   # full metrics (Ctrl+C after ~15s)\nsystem_profiler SPHardwareDataType | head -10   # chip model\n```\n\nThis helps add support for new Apple Silicon variants.\n\n## License\n\n[MIT](LICENSE)\n","summary":"macpow is a terminal‑based tool that displays real‑time power consumption and system metrics for Apple Silicon Macs (M1–M5+). It pulls raw data from IOReport, SMC, IORegistry, CoreAudio and Mach APIs to show per‑component power draw, temperatures, CPU/GPU frequencies, utilization bars, and per‑process energy usage, all without requiring root privileges. Additional capabilities include memory usage, battery status, peripheral and network statistics, fan monitoring, collapsible sensor trees, sparkline charts, smoothing windows, and JSON output for scripting. Developers, power analysts, and Mac power‑monitoring enthusiasts will find macpow useful for diagnosing energy usage and optimizing performance on Apple Silicon devices.","description":"💻🔋 Real-time power tree TUI for Apple Silicon","stars":713,"language":"Rust"},{"owner":"xoai","repo":"sage-wiki","url":"https://github.com/xoai/sage-wiki","readme":"**English** | [中文](README_zh.md)\n\n# sage-wiki\n\nAn implementation of [Andrej Karpathy's idea](https://x.com/karpathy/status/2039805659525644595) for an LLM-compiled personal knowledge base. Developed using [Sage Framework](https://github.com/xoai/sage).\n\nSome lessons learned after building sage-wiki [here](https://x.com/xoai/status/2040936964799795503).\n\nDrop in your papers, articles, and notes. sage-wiki compiles them into a structured, interlinked wiki — with concepts extracted, cross-references discovered, and everything searchable.\n\n- **Your sources in, a wiki out.** Add documents to a folder. The LLM reads, summarizes, extracts concepts, and writes interconnected articles.\n- **Scales to 100K+ documents.** Tiered compilation indexes everything fast, compiles only what matters. A 100K vault is searchable in hours, not months.\n- **Compounding knowledge.** Every new source enriches existing articles. The wiki gets smarter as it grows.\n- **Works with your tools.** Opens natively in Obsidian. Connects to any LLM agent via MCP. Runs as a single binary — nothing to install beyond the API key.\n- **Ask your wiki questions.** Enhanced search with chunk-level indexing, LLM query expansion, and re-ranking. Ask natural language questions and get cited answers.\n- **Compile on demand.** Agents can trigger compilation for specific topics via MCP. Search results signal when uncompiled sources are available.\n\nhttps://github.com/user-attachments/assets/c35ee202-e9df-4ccd-b520-8f057163ff26\n\n_Dots on the outer boundary represent summaries of all documents in the knowledge base, while dots in the inner circle represent concepts extracted from the knowledge base, with links showing how those concepts connect to one another._\n\n## Install\n\n```bash\n# CLI only (no web UI)\ngo install github.com/xoai/sage-wiki/cmd/sage-wiki@latest\n\n# With web UI (requires Node.js for building frontend assets)\ngit clone https://github.com/xoai/sage-wiki.git && cd sage-wiki\ncd web && npm install && npm run build && cd ..\ngo build -tags webui -o sage-wiki ./cmd/sage-wiki/\n```\n\n## Supported Source Formats\n\n| Format      | Extensions                              | What gets extracted                                         |\n| ----------- | --------------------------------------- | ----------------------------------------------------------- |\n| Markdown    | `.md`                                   | Body text with frontmatter parsed separately                |\n| PDF         | `.pdf`                                  | Full text via pure-Go extraction                            |\n| Word        | `.docx`                                 | Document text from XML                                      |\n| Excel       | `.xlsx`                                 | Cell values and sheet data                                  |\n| PowerPoint  | `.pptx`                                 | Slide text content                                          |\n| CSV         | `.csv`                                  | Headers + rows (up to 1000 rows)                            |\n| EPUB        | `.epub`                                 | Chapter text from XHTML                                     |\n| Email       | `.eml`                                  | Headers (from/to/subject/date) + body                       |\n| Plain text  | `.txt`, `.log`                          | Raw content                                                 |\n| Transcripts | `.vtt`, `.srt`                          | Raw content                                                 |\n| Images      | `.png`, `.jpg`, `.gif`, `.webp`, `.svg` | Description via vision LLM (caption, content, visible text) |\n| Code        | `.go`, `.py`, `.js`, `.ts`, `.rs`, etc. | Source code                                                 |\n\nJust drop files into your source folder — sage-wiki detects the format automatically. Images require a vision-capable LLM (Gemini, Claude, GPT-4o).\n\n## Quickstart\n\n![Compiler Pipeline](sage-wiki-compiler-pipeline.png)\n\n### Greenfield (new project)\n\n```bash\nmkdir my-wiki && cd my-wiki\nsage-wiki init\n# Add sources to raw/\ncp ~/papers/*.pdf raw/papers/\ncp ~/articles/*.md raw/articles/\n# Edit config.yaml to add api key, and pick LLMs\n# First Compile\nsage-wiki compile\n# Search\nsage-wiki search \"attention mechanism\"\n# Ask questions\nsage-wiki query \"How does flash attention optimize memory?\"\n# Interactive terminal dashboard\nsage-wiki tui\n# Browse in the browser (requires -tags webui build)\nsage-wiki serve --ui\n# Watch folder\nsage-wiki compile --watch\n```\n\n### Vault Overlay (existing Obsidian vault)\n\n```bash\ncd ~/Documents/MyVault\nsage-wiki init --vault\n# Edit config.yaml to set source/ignore folders, add api key, pick LLMs\n# First Compile\nsage-wiki compile\n# Watch the vault\nsage-wiki compile --watch\n```\n\n### Docker\n\n```bash\n# Pull from GitHub Container Registry\ndocker pull ghcr.io/xoai/sage-wiki:latest\n\n# Or from Docker Hub\ndocker pull xoai/sage-wiki:latest\n\n# Run with your wiki directory mounted\ndocker run -d -p 3333:3333 -v ./my-wiki:/wiki -e GEMINI_API_KEY=... ghcr.io/xoai/sage-wiki\n\n# Or build from source\ndocker build -t sage-wiki .\ndocker run -d -p 3333:3333 -v ./my-wiki:/wiki -e GEMINI_API_KEY=... sage-wiki\n```\n\nAvailable tags: `:latest` (main branch), `:v1.0.0` (releases), `:sha-abc1234` (specific commits). Multi-arch: `linux/amd64` and `linux/arm64`.\n\nSee the [self-hosting guide](docs/guides/self-hosted-server.md) for Docker Compose, Syncthing sync, reverse proxy, and LLM provider setup.\n\n## Commands\n\n| Command                                                                                 | Description                                      |\n| --------------------------------------------------------------------------------------- | ------------------------------------------------ |\n| `sage-wiki init [--vault] [--skill <agent>]`                                            | Initialize project (greenfield or vault overlay) |\n| `sage-wiki compile [--watch] [--dry-run] [--batch] [--estimate] [--no-cache] [--prune]` | Compile sources into wiki articles               |\n| `sage-wiki serve [--transport stdio\\|sse]`                                              | Start MCP server for LLM agents                  |\n| `sage-wiki serve --ui [--port 3333]`                                                    | Start web UI (requires `-tags webui` build)      |\n| `sage-wiki lint [--fix] [--pass name]`                                                  | Run linting passes                               |\n| `sage-wiki search \"query\" [--tags ...]`                                                 | Hybrid search (BM25 + vector)                    |\n| `sage-wiki query \"question\"`                                                            | Q&A against the wiki                             |\n| `sage-wiki tui`                                                                         | Launch interactive terminal dashboard            |\n| `sage-wiki ingest <url\\|path>`                                                          | Add a source                                     |\n| `sage-wiki status`                                                                      | Wiki stats and health                            |\n| `sage-wiki provenance <source-or-concept>`                                              | Show source↔article provenance mappings          |\n| `sage-wiki doctor`                                                                      | Validate config and connectivity                 |\n| `sage-wiki diff`                                                                        | Show pending source changes against manifest     |\n| `sage-wiki list`                                                                        | List wiki entities, concepts, or sources         |\n| `sage-wiki write <summary\\|article>`                                                    | Write a summary or article                       |\n| `sage-wiki ontology <query\\|list\\|add>`                                                 | Query, list, and manage the ontology graph       |\n| `sage-wiki hub <add\\|remove\\|search\\|status\\|list>`                                    | Multi-project hub commands                       |\n| `sage-wiki learn \"text\"`                                                                | Store a learning entry                           |\n| `sage-wiki capture \"text\"`                                                              | Capture knowledge from text                      |\n| `sage-wiki add-source <path>`                                                           | Register a source file in the manifest           |\n| `sage-wiki skill <refresh\\|preview> [--target <agent>]`                                 | Generate or refresh agent skill files            |\n| `sage-wiki scribe <session-file>`                                                       | Extract entities from a session transcript       |\n\n## TUI\n\n```bash\nsage-wiki tui\n```\n\nA full-featured terminal dashboard with 4 tabs:\n\n- **[F1] Browse** — Navigate articles by section (concepts, summaries, outputs). Arrow keys to select, Enter to read with glamour-rendered markdown, Esc to go back.\n- **[F2] Search** — Fuzzy search with split-pane preview. Type to filter, results ranked by hybrid score, Enter to open in `$EDITOR`.\n- **[F3] Q&A** — Conversational streaming Q&A. Ask questions, get LLM-synthesized answers with source citations. Ctrl+S saves answer to outputs/.\n- **[F4] Compile** — Live compile dashboard. Watches source directories for changes and auto-recompiles. Browse compiled files with preview.\n\nTab switching: `F1`-`F4` from any tab, `1`-`4` on Browse/Compile, `Esc` returns to Browse. Quit with `Ctrl+C`.\n\n## Web UI\n\n![Sage-Wiki Architecture](sage-wiki-webui.png)\n\nsage-wiki includes an optional browser-based viewer for reading and exploring your wiki.\n\n```bash\nsage-wiki serve --ui\n# Opens at http://127.0.0.1:3333\n```\n\nFeatures:\n\n- **Article browser** with rendered markdown, syntax highlighting, and clickable `[[wikilinks]]`\n- **Hybrid search** with ranked results and snippets\n- **Knowledge graph** — interactive force-directed visualization of concepts and their connections\n- **Streaming Q&A** — ask questions and get LLM-synthesized answers with source citations\n- **Table of contents** with scroll-spy, or toggle to graph view\n- **Dark/light mode** toggle with system preference detection\n- **Broken link detection** — missing article links shown in gray\n\nThe web UI is built with Preact + Tailwind CSS and embedded into the Go binary via `go:embed`. It adds ~1.2 MB (gzipped) to the binary size. To build without the web UI, omit the `-tags webui` flag — the binary will still work for all CLI and MCP operations.\n\nOptions:\n\n- `--port 3333` — change the port (default 3333)\n- `--bind 0.0.0.0` — expose on the network (default localhost only, no auth)\n\n## Configuration\n\n`config.yaml` is created by `sage-wiki init`. Full example:\n\n```yaml\nversion: 1\nproject: my-research\ndescription: \"Personal research wiki\"\n\n# Source folders to watch and compile\nsources:\n  - path: raw # or vault folders like Clippings/, Papers/\n    type: auto # auto-detect from file extension\n    watch: true\n\noutput: wiki # compiled output directory (_wiki for vault overlay)\n\n# Folders to never read or send to APIs (vault overlay mode)\n# ignore:\n#   - Daily Notes\n#   - Personal\n\n# LLM provider\n# Supported: anthropic, openai, gemini, ollama, openai-compatible, qwen\n# For OpenRouter or other OpenAI-compatible providers:\n#   provider: openai-compatible\n#   base_url: https://openrouter.ai/api/v1\n# For Alibaba Cloud DashScope Qwen:\n#   provider: qwen\n#   api_key: ${DASHSCOPE_API_KEY}\napi:\n  provider: gemini\n  api_key: ${GEMINI_API_KEY} # env var expansion supported\n  # base_url:                   # custom endpoint (OpenRouter, Azure, etc.)\n  # rate_limit: 60              # requests per minute\n  # extra_params:               # provider-specific params merged into request body\n  #   enable_thinking: false    # e.g., disable Qwen thinking mode\n  #   reasoning_effort: low     # e.g., DeepSeek reasoning control\n\n# Model per task — use cheaper models for high-volume, quality for writing\nmodels:\n  summarize: gemini-3-flash-preview\n  extract: gemini-3-flash-preview\n  write: gemini-3-flash-preview\n  lint: gemini-3-flash-preview\n  query: gemini-3-flash-preview\n\n# Embedding provider (optional — auto-detected from api provider)\n# Override to use a different provider for embeddings\nembed:\n  provider: auto # auto, openai, gemini, ollama, voyage, mistral\n  # model: text-embedding-3-small\n  # api_key: ${OPENAI_API_KEY}  # separate key for embeddings\n  # base_url:                   # separate endpoint\n\ncompiler:\n  max_parallel: 20 # concurrent LLM calls (with adaptive backpressure)\n  debounce_seconds: 2 # watch mode debounce\n  summary_max_tokens: 2000\n  article_max_tokens: 4000\n  auto_commit: true # git commit after compile\n  auto_lint: true # run lint after compile\n  mode: auto # standard, batch, or auto (auto = batch when 10+ sources)\n  # estimate_before: false    # prompt with cost estimate before compiling\n  # prompt_cache: true        # enable prompt caching (default: true)\n  # batch_threshold: 10       # min sources for auto-batch mode\n  # token_price_per_million: 0  # override pricing (0 = use built-in)\n  # timezone: Asia/Shanghai   # IANA timezone for user-facing timestamps (default: UTC)\n  # article_fields:           # custom frontmatter fields extracted from LLM response\n  #   - language\n  #   - domain\n\n  # Tiered compilation — index fast, compile what matters\n  default_tier: 3 # 0=index, 1=index+embed, 3=full compile\n  # tier_defaults:             # per-extension tier overrides\n  #   json: 0                  # structured data — index only\n  #   yaml: 0\n  #   lock: 0\n  #   md: 1                    # prose — index + embed\n  #   go: 1                    # code — index + embed + parse\n  # auto_promote: true         # promote to tier 3 based on query hits\n  # auto_demote: true          # demote stale articles\n  # split_threshold: 15000     # chars — split large docs for faster writing\n  # dedup_threshold: 0.85      # cosine similarity for concept dedup\n  # backpressure: true         # adaptive concurrency on rate limits\n\nsearch:\n  hybrid_weight_bm25: 0.7 # BM25 vs vector weight\n  hybrid_weight_vector: 0.3\n  default_limit: 10\n  # query_expansion: true     # LLM query expansion for Q&A (default: true)\n  # rerank: true              # LLM re-ranking for Q&A (default: true)\n  # chunk_size: 800           # tokens per chunk for indexing (100-5000)\n  # graph_expansion: true     # graph-based context expansion for Q&A (default: true)\n  # graph_max_expand: 10      # max articles added via graph expansion\n  # graph_depth: 2            # ontology traversal depth (1-5)\n  # context_max_tokens: 8000  # token budget for query context\n  # weight_direct_link: 3.0   # graph signal: ontology relation between concepts\n  # weight_source_overlap: 4.0 # graph signal: shared source documents\n  # weight_common_neighbor: 1.5 # graph signal: Adamic-Adar common neighbors\n  # weight_type_affinity: 1.0  # graph signal: entity type pair bonus\n\nserve:\n  transport: stdio # stdio or sse\n  port: 3333 # SSE mode only\n\n\n# Ontology types (optional)\n# Extend built-in types with additional synonyms or add custom types.\n# ontology:\n#   relation_types:\n#     - name: implements           # extend built-in with more synonyms\n#       synonyms: [\"thực hiện\", \"triển khai\"]\n#     - name: regulates            # add a custom relation type\n#       synonyms: [\"regulates\", \"regulated by\", \"调控\"]\n#   entity_types:\n#     - name: decision\n#       description: \"A recorded decision with rationale\"\n```\n\n### Configurable Relations\n\nThe ontology has 8 built-in relation types: `implements`, `extends`, `optimizes`, `contradicts`, `cites`, `prerequisite_of`, `trades_off`, `derived_from`. Each has default keyword synonyms used for automatic extraction.\n\nYou can customize relations via `ontology.relations` in `config.yaml`:\n\n- **Extend a built-in type** — add synonyms (e.g., multilingual keywords) to an existing type. The default synonyms are kept; yours are appended.\n- **Add a custom type** — define a new relation name with its keyword synonyms. Relation names must be lowercase `[a-z][a-z0-9_]*`.\n\nZero config = identical to current behavior. Existing databases are migrated automatically on first open. See the [full guide](docs/guides/configurable-relations.md) for domain-specific examples, built-in synonym tables, and how extraction works.\n\n## Cost Optimization\n\nsage-wiki tracks token usage and estimates cost for every compile. Three strategies to reduce cost:\n\n**Prompt caching** (default: on) — Reuses system prompts across LLM calls within a compile pass. Anthropic and Gemini cache explicitly; OpenAI caches automatically. Saves 50-90% on input tokens.\n\n**Batch API** — Submit all sources as a single async batch for 50% cost reduction. Available for Anthropic and OpenAI.\n\n```bash\nsage-wiki compile --batch       # submit batch, checkpoint, exit\nsage-wiki compile               # poll status, retrieve when done\n```\n\n**Cost estimation** — Preview cost before committing:\n\n```bash\nsage-wiki compile --estimate    # show cost breakdown, exit\n```\n\nOr set `compiler.estimate_before: true` in config to prompt every time.\n\n**Auto mode** — Set `compiler.mode: auto` and `compiler.batch_threshold: 10` to automatically use batch when compiling 10+ sources.\n\n## Scaling to Large Vaults\n\nsage-wiki uses **tiered compilation** to handle vaults of 10K-100K+ documents. Instead of compiling everything through the full LLM pipeline, sources are routed through tiers based on file type and usage:\n\n| Tier | What happens | Cost | Time per doc |\n|------|-------------|------|-------------|\n| **0** — Index only | FTS5 full-text search | Free | ~5ms |\n| **1** — Index + embed | FTS5 + vector embedding | ~$0.00002 | ~200ms |\n| **2** — Code parse | Structural summary via regex parser (no LLM) | Free | ~10ms |\n| **3** — Full compile | Summarize + extract concepts + write articles | ~$0.05-0.15 | ~5-8 min |\n\nBy default (`default_tier: 3`), all sources go through the full LLM pipeline — the same behavior as before tiered compilation. For large vaults (10K+), set `default_tier: 1` to index everything in ~5.5 hours, then compile on demand — when an agent queries a topic, search signals uncompiled sources, and `wiki_compile_topic` compiles just that cluster (~2 min for 20 sources).\n\n**Key features:**\n- **File-type defaults** — JSON, YAML, and lock files skip to Tier 0 automatically. Configure per-extension via `tier_defaults`.\n- **Auto-promotion** — Sources promote to Tier 3 after 3+ search hits or when a topic cluster reaches 5+ sources.\n- **Auto-demotion** — Stale articles (90 days without queries) demote to Tier 1 for recompilation on next access.\n- **Adaptive backpressure** — Concurrency self-tunes to your provider's rate limits. Starts at 20 parallel, halves on 429s, recovers automatically.\n- **10 code parsers** — Go (via go/ast), TypeScript, JavaScript, Python, Rust, Java, C, C++, Ruby, plus JSON/YAML/TOML key extraction. Code gets structural summaries without LLM calls.\n- **Compile-on-demand** — `wiki_compile_topic(\"flash attention\")` via MCP compiles relevant sources in real time.\n- **Quality scoring** — Per-article source coverage, extraction completeness, and cross-reference density tracked automatically.\n\nSee the [full scaling guide](docs/guides/large-vault-performance.md) for configuration, tier override examples, and performance targets.\n\n## Search Quality\n\nsage-wiki uses an enhanced search pipeline for Q&A queries, inspired by analyzing [qmd](https://github.com/dmayboroda/qmd)'s retrieval approach:\n\n- **Chunk-level indexing** — Articles are split into ~800-token chunks, each with its own FTS5 entry and vector embedding. A search for \"flash attention\" finds the relevant paragraph inside a 3000-token Transformer article.\n- **LLM query expansion** — A single LLM call generates keyword rewrites (for BM25), semantic rewrites (for vector search), and a hypothetical answer (for embedding similarity). A strong-signal check skips expansion when the top BM25 result is already confident.\n- **LLM re-ranking** — Top 15 candidates are scored by the LLM for relevance. Position-aware blending protects high-confidence retrieval results (ranks 1-3 get 75% retrieval weight, ranks 11+ get 60% reranker weight).\n- **BM25-prefiltered vector search** — Vector comparisons are limited to chunks from BM25 candidate documents, capping cosine computations at ~250 regardless of wiki size.\n- **Graph-enhanced context expansion** — After retrieval, a 4-signal graph scorer finds related articles via the ontology: direct relations (×3.0), shared source documents (×4.0), common neighbors via Adamic-Adar (×1.5), and entity type affinity (×1.0). This surfaces articles that are structurally related but missed by keyword/vector search.\n- **Token budget control** — Query context is capped at a configurable token limit (default 8000), with articles truncated at 4000 tokens each. Greedy filling prioritizes the highest-scored articles.\n\n|                 | sage-wiki                                  | qmd               |\n| --------------- | ------------------------------------------ | ----------------- |\n| Chunk search    | FTS5 + vector (dual-channel)               | Vector-only       |\n| Query expansion | LLM-based (lex/vec/hyde)                   | LLM-based         |\n| Re-ranking      | LLM + position-aware blending              | Cross-encoder     |\n| Graph context   | 4-signal graph expansion + 1-hop traversal | No graph          |\n| Cost per query  | Free (Ollama) / ~$0.0006 (cloud)           | Free (local GGUF) |\n\nZero config = all features enabled. With Ollama or other local models, enhanced search is completely free — re-ranking is auto-disabled (local models struggle with structured JSON scoring) but chunk-level search and query expansion still work. With cloud LLMs, the additional cost is negligible (~$0.0006/query). Both expansion and re-ranking can be toggled via config. See the [full search quality guide](docs/guides/search-quality.md) for configuration, cost breakdown, and detailed comparison.\n\n## Customizing Prompts\n\nsage-wiki uses built-in prompts for summarization and article writing. To customize:\n\n```bash\nsage-wiki init --prompts    # scaffolds prompts/ directory with defaults\n```\n\nThis creates editable markdown files:\n\n```\nprompts/\n├── summarize-article.md    # how articles are summarized\n├── summarize-paper.md      # how papers are summarized\n├── write-article.md        # how concept articles are written\n├── extract-concepts.md     # how concepts are identified\n└── caption-image.md        # how images are described\n```\n\nEdit any file to change how sage-wiki processes that type. Add new source types by creating `summarize-{type}.md` (e.g., `summarize-dataset.md`). Delete a file to revert to the built-in default.\n\n### Custom Frontmatter Fields\n\nArticle frontmatter is built from two sources: **ground-truth data** (concept name, aliases, sources, timestamp) is always generated by code, while **semantic fields** are assessed by the LLM.\n\nBy default, `confidence` is the only LLM-assessed field. To add custom fields:\n\n1. Declare them in `config.yaml`:\n\n```yaml\ncompiler:\n  article_fields:\n    - language\n    - domain\n```\n\n2. Update your `prompts/write-article.md` template to ask the LLM for these fields:\n\n```\nAt the end of your response, state:\nLanguage: (the primary language of the concept)\nDomain: (the academic field, e.g., machine learning, biology)\nConfidence: high, medium, or low\n```\n\nThe LLM's responses are extracted from the article body and merged into the YAML frontmatter automatically. The resulting frontmatter looks like:\n\n```yaml\n---\nconcept: self-attention\naliases: [\"scaled dot-product attention\"]\nsources: [\"raw/transformer-paper.md\"]\nconfidence: high\nlanguage: English\ndomain: machine learning\ncreated_at: 2026-04-10T08:00:00+08:00\n---\n```\n\nGround-truth fields (`concept`, `aliases`, `sources`, `created_at`) are always accurate — they come from the extraction pass, not the LLM. Semantic fields (`confidence` + your custom fields) reflect the LLM's judgment.\n\n## Agent Skill Files\n\nsage-wiki has 17 MCP tools, but agents won't use them unless something in their context says *when* to check the wiki. Skill files bridge that gap — generated snippets that teach agents when to search, what to capture, and how to query effectively.\n\n```bash\n# Generate during project init\nsage-wiki init --skill claude-code\n\n# Or add to an existing project\nsage-wiki skill refresh --target claude-code\n\n# Preview without writing\nsage-wiki skill preview --target cursor\n```\n\nThis appends a behavioral skill section to the agent's instruction file (CLAUDE.md, .cursorrules, etc.) with project-specific triggers, capture guidelines, and query examples derived from your config.yaml.\n\n**Supported agents:** `claude-code`, `cursor`, `windsurf`, `agents-md` (Antigravity/Codex), `gemini`, `generic`\n\n**Domain packs:** The generator auto-selects a pack based on your source types:\n- `codebase-memory` — code projects (default). Triggers on API changes, refactors, breaking changes.\n- `research-library` — paper/article projects. Triggers on domain questions, related work.\n- `meeting-notes` — operational use (override only: `--pack meeting-notes`).\n- `documentation-curator` — documentation projects (override only: `--pack documentation-curator`).\n\nRunning `skill refresh` regenerates only the marked skill section — your other content is preserved.\n\n## MCP Integration\n\n![MCP Integration](sage-wiki-interfaces.png)\n\n### Claude Code\n\nAdd to `.mcp.json`:\n\n```json\n{\n  \"mcpServers\": {\n    \"sage-wiki\": {\n      \"command\": \"sage-wiki\",\n      \"args\": [\"serve\", \"--project\", \"/path/to/wiki\"]\n    }\n  }\n}\n```\n\n### SSE (network clients)\n\n```bash\nsage-wiki serve --transport sse --port 3333\n```\n\n## Knowledge Capture from AI Conversations\n\nsage-wiki runs as an MCP server, so you can capture knowledge directly from your AI conversations. Connect it to Claude Code, ChatGPT, Cursor, or any MCP client — then just ask:\n\n> \"Save what we just figured out about connection pooling to my wiki\"\n\n> \"Capture the key decisions from this debugging session\"\n\nThe `wiki_capture` tool extracts knowledge items (decisions, discoveries, corrections) from conversation text via your LLM, writes them as source files, and queues them for compilation. Noise (greetings, retries, dead ends) is filtered out automatically.\n\nFor single facts, `wiki_learn` stores a nugget directly. For full documents, `wiki_add_source` ingests a file. Run `wiki_compile` to process everything into articles.\n\nSee the full setup guide: [Agent Memory Layer Guide](docs/guides/agent-memory-layer.md)\n\n## Benchmarks\n\nEvaluated on a real wiki compiled from 1,107 sources (49.4 MB database, 2,832 wiki files).\n\nRun `python3 eval.py .` on your own project to reproduce. See [eval.py](eval.py) for details.\n\n### Performance\n\n| Operation                            |   p50 |   Throughput |\n| ------------------------------------ | ----: | -----------: |\n| FTS5 keyword search (top-10)         | 411µs |    1,775 qps |\n| Vector cosine search (2,858 × 3072d) |  81ms |       15 qps |\n| Hybrid RRF (BM25 + vector)           |  80ms |       16 qps |\n| Graph traversal (BFS depth ≤ 5)      |   1µs |     738K qps |\n| Cycle detection (full graph)         | 1.4ms |            — |\n| FTS insert (batch 100)               |     — |    89,802 /s |\n| Sustained mixed reads                |  77µs | 8,500+ ops/s |\n\nNon-LLM compile overhead (hashing + dependency analysis) is under 1 second. The compiler's wall time is dominated entirely by LLM API calls.\n\n### Quality\n\n| Metric                    |     Score |\n| ------------------------- | --------: |\n| Search recall@10          |  **100%** |\n| Search recall@1           |     91.6% |\n| Source citation rate      |     94.6% |\n| Alias coverage            |     90.0% |\n| Fact extraction rate      |     68.5% |\n| Wiki connectivity         |     60.5% |\n| Cross-reference integrity |     50.0% |\n| **Overall quality score** | **73.0%** |\n\n### Running the eval\n\n```bash\n# Full evaluation (performance + quality)\npython3 eval.py /path/to/your/wiki\n\n# Performance only\npython3 eval.py --perf-only .\n\n# Quality only\npython3 eval.py --quality-only .\n\n# Machine-readable JSON\npython3 eval.py --json . > report.json\n```\n\nRequires Python 3.10+. Install `numpy` for ~10x faster vector benchmarks.\n\n### Running the tests\n\n```bash\n# Run the full test suite (generates synthetic fixtures, no real data needed)\npython3 -m unittest eval_test -v\n\n# Generate a standalone test fixture\npython3 eval_test.py --generate-fixture ./test-fixture\npython3 eval.py ./test-fixture\n```\n\n24 tests covering: fixture generation, CLI modes (`--perf-only`, `--quality-only`, `--json`), JSON schema validation, score bounds, search recall, edge cases (empty wikis, large datasets, missing paths).\n\n## Architecture\n\n![Sage-Wiki Architecture](sage-wiki-architecture.png)\n\n- **Storage:** SQLite with FTS5 (BM25 search) + BLOB vectors (cosine similarity) + compile_items table for per-source tier/state tracking\n- **Ontology:** Typed entity-relation graph with BFS traversal and cycle detection\n- **Search:** Enhanced pipeline with chunk-level FTS5 + vector indexing, LLM query expansion, LLM re-ranking, RRF fusion, and 4-signal graph expansion. Search responses signal uncompiled sources for compile-on-demand.\n- **Compiler:** Tiered pipeline (Tier 0: index, Tier 1: embed, Tier 2: code parse, Tier 3: full LLM compile) with adaptive backpressure, prompt caching, batch API, cost tracking, compile-on-demand via MCP, quality scoring, and cascade awareness. 10 built-in code parsers (Go via go/ast, 8 languages via regex, structured data key extraction).\n- **MCP:** 17 tools (6 read, 9 write, 2 compound) via stdio or SSE, including `wiki_compile_topic` for on-demand compilation and `wiki_capture` for knowledge extraction\n- **TUI:** bubbletea + glamour 4-tab terminal dashboard (browse, search, Q&A, compile) with tier distribution display\n- **Web UI:** Preact + Tailwind CSS embedded via `go:embed` with build tag (`-tags webui`)\n- **Scribe:** Extensible interface for ingesting knowledge from conversations. Session scribe processes Claude Code JSONL transcripts.\n\nZero CGO. Pure Go. Cross-platform.\n\n## License\n\nMIT\n","summary":"Sage‑wiki builds a personal knowledge base by letting an LLM ingest, summarize, and interlink documents you drop into a folder, producing a wiki‑style set of articles that automatically reference one another. It scales to over 100 K files with tiered indexing, supports a wide spectrum of formats (Markdown, PDFs, Office files, images, code, etc.), and can be queried in natural language with chunk‑level search, LLM‑powered expansion, and re‑ranking. The tool works natively in Obsidian, can be called from any LLM agent via the MCP protocol, and runs as a single‑binary command‑line app requiring only an API key. Researchers, writers, and knowledge‑centric teams who need a searchable, ever‑enriching personal wiki would benefit most from Sage‑wiki.","description":"An LLM-compiled personal knowledge base.  Drop in your papers, articles, and notes. sage-wiki compiles them into a structured, interlinked wiki — with concepts extracted, cross-references discovered, and everything searchable.","stars":430,"language":"Go"},{"owner":"afar1","repo":"fieldtheory-cli","url":"https://github.com/afar1/fieldtheory-cli","readme":"# Field Theory CLI\n\nSync and store locally all of your X/Twitter bookmarks. Search, classify, and make them available to Claude Code, Codex, or any agent with shell access.\n\nFree and open source. Designed for Mac.\n\n## Install\n\n```bash\nnpm install -g fieldtheory\n```\n\nRequires Node.js 20+. Chrome recommended for session sync; OAuth available for all platforms.\n\n## Quick start\n\n```bash\n# 1. Sync your bookmarks (needs Chrome logged into X)\nft sync\n\n# 2. Search them\nft search \"distributed systems\"\n\n# 3. Explore\nft viz\nft categories\nft stats\n```\n\nOn first run, `ft sync` extracts your X session from Chrome and downloads your bookmarks into `~/.ft-bookmarks/`.\n\n## Commands\n\n### Sync\n\n| Command | Description |\n|---------|-------------|\n| `ft sync` | Download and sync bookmarks (no API required) |\n| `ft sync --rebuild` | Full re-crawl of all bookmarks |\n| `ft sync --continue` | Resume a paused or interrupted sync from the saved cursor |\n| `ft sync --gaps` | Backfill quoted tweets, expand truncated articles, enrich linked article content |\n| `ft sync --folders` | Also sync X bookmark folder tags (read-only mirror of X state) |\n| `ft sync --folder <name>` | Sync a single folder by name (exact or unambiguous prefix) |\n| `ft sync --classify` | Sync then classify new bookmarks with LLM |\n| `ft sync --media` | Sync bookmarks, then download X media assets locally (photos, video posters, capped videos) |\n| `ft sync --api` | Sync via OAuth API (cross-platform) |\n| `ft auth` | Set up OAuth for API-based sync (optional) |\n\n### Search and browse\n\n| Command | Description |\n|---------|-------------|\n| `ft search <query>` | Full-text search with BM25 ranking |\n| `ft list` | Filter by author, date, category, domain, or folder |\n| `ft list --folder <name>` | Show bookmarks in an X bookmark folder |\n| `ft show <id>` | Show one bookmark in detail |\n| `ft sample <category>` | Random sample from a category |\n| `ft stats` | Top authors, languages, date range |\n| `ft viz` | Terminal dashboard with sparklines, categories, and domains |\n| `ft categories` | Show category distribution |\n| `ft domains` | Subject domain distribution |\n| `ft folders` | Show X bookmark folder distribution (requires `ft sync --folders` first) |\n\n### Classification\n\n| Command | Description |\n|---------|-------------|\n| `ft classify` | Classify by category and domain using LLM |\n| `ft classify --regex` | Classify by category using simple regex |\n| `ft classify-domains` | Classify by subject domain only (LLM) |\n| `ft classify --engine <name>` | Override the LLM engine for one run (also works on `ft sync --classify` and `ft classify-domains`) |\n| `ft model` | View or change the default LLM engine |\n\n### Knowledge base\n\n| Command | Description |\n|---------|-------------|\n| `ft md` | Export bookmarks as individual markdown files |\n| `ft wiki` | Compile a Karpathy-style interlinked knowledge base |\n| `ft ask <question>` | Ask questions against the knowledge base |\n| `ft ask <question> --save` | Ask and save the answer as a concept page |\n| `ft lint` | Health-check the wiki for broken links and missing pages |\n| `ft lint --fix` | Auto-fix fixable wiki issues |\n\n### Agent integration\n\n| Command | Description |\n|---------|-------------|\n| `ft skill install` | Install `/fieldtheory` skill for Claude Code and Codex |\n| `ft skill show` | Print skill content to stdout |\n| `ft skill uninstall` | Remove installed skill files |\n\n### Utilities\n\n| Command | Description |\n|---------|-------------|\n| `ft index` | Rebuild search index from JSONL cache (preserves classifications) |\n| `ft fetch-media` | Backfill/download X media assets for existing bookmarks (default: all pending bookmarks) |\n| `ft status` | Show sync status and data location |\n| `ft path` | Print data directory path |\n\n## Agent integration\n\nInstall the `/fieldtheory` skill so your agent automatically searches your bookmarks when relevant:\n\n```bash\nft skill install     # Auto-detects Claude Code and Codex\n```\n\nThen ask your agent:\n\n> \"What have I bookmarked about cancer research in the last three years and how has it progressed?\"\n\n> \"I bookmarked a number of new open source AI memory tools. Pick the best one and figure out how to incorporate it in this repo.\"\n\n> \"Every day please sync any new X bookmarks using the Field Theory CLI.\"\n\nWorks with Claude Code, Codex, or any agent with shell access.\n\n## Scheduling\n\n```bash\n# Sync every morning at 7am\n0 7 * * * ft sync\n\n# Sync and classify every morning\n0 7 * * * ft sync --classify\n```\n\n## Data\n\nAll data is stored locally at `~/.ft-bookmarks/`:\n\n```\n~/.ft-bookmarks/\n  bookmarks.jsonl         # raw bookmark cache (one per line)\n  bookmarks.db            # SQLite FTS5 search index\n  bookmarks-meta.json     # sync metadata\n  oauth-token.json        # OAuth token (if using API mode, chmod 600)\n  md/                     # markdown knowledge base (ft wiki / ft md)\n```\n\nOverride the location with `FT_DATA_DIR`:\n\n```bash\nexport FT_DATA_DIR=/path/to/custom/dir\n```\n\nTo remove all data: `rm -rf ~/.ft-bookmarks`\n\n## Categories\n\n| Category | What it catches |\n|----------|----------------|\n| **tool** | GitHub repos, CLI tools, npm packages, open-source projects |\n| **security** | CVEs, vulnerabilities, exploits, supply chain |\n| **technique** | Tutorials, demos, code patterns, \"how I built X\" |\n| **launch** | Product launches, announcements, \"just shipped\" |\n| **research** | ArXiv papers, studies, academic findings |\n| **opinion** | Takes, analysis, commentary, threads |\n| **commerce** | Products, shopping, physical goods |\n\nUse `ft classify` for LLM-powered classification that catches what regex misses.\n\n## Platform support\n\n| Feature | macOS | Linux | Windows |\n|---------|-------|-------|---------|\n| Session sync (`ft sync`) | Chrome, Chromium, Brave, Helium, Comet, Dia, Firefox | Chrome, Chromium, Brave, Firefox | Chrome, Chromium, Brave, Firefox |\n| OAuth API sync (`ft sync --api`) | Yes | Yes | Yes |\n| Search, list, classify, viz, wiki | Yes | Yes | Yes |\n\nSession sync extracts cookies from your browser's local database. Use `ft sync --browser <name>` to pick a browser. On Windows, Firefox requires Node.js 22.5+ or `sqlite3` on PATH. For unsupported browsers or platforms, use `ft auth` + `ft sync --api`.\n\n## Security\n\n**Your data stays local.** No telemetry, no analytics, nothing phoned home. The CLI only makes network requests to X's API during sync.\n\n**Chrome session sync** reads cookies from Chrome's local database, uses them for the sync request, and discards them. Cookies are never stored separately.\n\n**OAuth tokens** are stored with `chmod 600` (owner-only). Treat `~/.ft-bookmarks/oauth-token.json` like a password.\n\n**The default sync uses X's internal GraphQL API**, the same API that x.com uses in your browser. For the official v2 API, use `ft auth` + `ft sync --api`.\n\n## License\n\nMIT — [fieldtheory.dev/cli](https://fieldtheory.dev/cli)\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=afar1%2Ffieldtheory-cli&type=date&legend=top-left\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=afar1/fieldtheory-cli&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=afar1/fieldtheory-cli&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=afar1/fieldtheory-cli&type=date&legend=top-left\" />\n </picture>\n</a>\n","summary":"Fieldtheory‑cli is a command‑line tool that synchronizes all of your X/Twitter bookmarks to a local JSONL store, allowing you to search, classify, and visualize your saved content without relying on an external API. It offers powerful features such as full‑text BM25 search, LLM‑based topic and domain classification, media downloading, and a Karpathy‑style markdown knowledge base that can be queried or linted for integrity. The tool also bundles an easy‑to‑install skill that plugs the bookmark search into Claude Code, Codex, or any agent with shell access, making it trivial to surface relevant social‑media references during code or research workflows. Developers, writers, and researchers who curate online material will benefit from
