s file in the `examples/` directory.\nRun it with the following:\n\n```\nuv run python tdiff.py example1.rs example2.rs\n```\n\nUse <kbd>space</kbd> to toggle unified / split, and <kbd>a</kbd> to toggle annotations.\n\n\n### Screenshots\n\nA few screenshots taken from the example app:\n\n<table>\n<tr>  \n<td>\n  \n<img src=\"https://github.com/batrachianai/textual-diff-view/raw/main/images/split_dark.png\">\n\n</td>\n<td>\n  \n<img src=\"https://github.com/batrachianai/textual-diff-view/raw/main/images/unified_dark.png\">\n\n</td>\n</tr>\n\n<tr>\n<td>\n  \n<img src=\"https://github.com/batrachianai/textual-diff-view/raw/main/images/split_light.png\">\n\n</td>\n\n<td>\n  \n<img src=\"https://github.com/batrachianai/textual-diff-view/raw/main/images/unified_light.png\">\n\n</td>\n\n</tr>\n</table>\n\n## Installing\n\nTexual Diff View is on PyPI and may be installed with pip, or uv.\n\nHere's how to install with `uv`:\n\n```\nuv add textual-diff-view\n```\n\n## How to use\n\nImport the widget with the following:\n\n```python\nfrom textual_diff_view import DiffView\n```\n\nThen yield an instance of `DiffView` in your [compose](https://textual.textualize.io/api/widget/#textual.widget.Widget.compose) method.\n\nThe constructor accepts 4 positional arguments:\n\n| Argument | type | Purpose |\n| --- | --- | --- |\n| path_original | `str` | A path to the original code |\n| path_modified | `str` | A path to the modified code |\n| code_original | `str` | The contents of the original code |\n| code_modified | `str` | The contents of the modified code |\n\nAdditionally, the constructor accepts the standard keyword arguments, `name`, `id`, and `classes`——which have the same meaning as Textual's built in widgets.\n\nHere's a very simple example:\n\n```python\nfrom textual.app import App, ComposeResult\nfrom textual import containers\n\nfrom textual_diff_view import DiffView\n\nHELLO1 = \"\"\"\ndef greet():\n    print \"Hello!\"\n\ngreet()\n\"\"\"\n\nHELLO2 = \"\"\"\ndef greet(name:str):\n    print(f\"Hello, {name}!\")\n\ngreet('Will')\n\"\"\"\n\n\nclass Hello(App):\n    def compose(self) -> ComposeResult:\n        with containers.VerticalScroll():\n            yield DiffView(\"hello1.py\", \"hello2.py\", HELLO1, HELLO2)\n\n\nHello().run()\n\n```\n\nNote that we put the `DiffView` within a `VerticalScroll`, so the user may scroll the container if the diff doesn't fit.\n\nThe above code will generate the following output:\n\n<img src=\"https://github.com/batrachianai/textual-diff-view/raw/main/images/hello.png\">\n\n### Load constructor\n\nDiffView provides an alternative constructor, `DiffView.load`, which also loads the code.\nIf both your original code and modified code is on disk, this may be simpler than the standard constructor.\n\n`DiffView.load` accepts the following positional arguments:\n\n| Argument | Type | Purpose |\n| --- | --- | --- |\n| path_original | `str` or `Path` | A path to the original code |\n| path_modified | `str` or `Path` | A path to the modified code |\n\nSince `load` is a coroutine, you would typically call it from a message handler in another widget, or `App`, then mount it somewhere in the DOM.\n\nThe code would look something like the following:\n\n```python\ndiff_view = await DiffView.load(\"original.py\", \"modified.py\")\nawait self.query_one(\"VerticalScroll\").mount(diff_view)\n```\n\n### Reactives\n\nThe DiffView supports the following [reactive](https://textual.textualize.io/guide/reactivity/#reactive-attributes) attributes.\n\n| Name | Type | Explanation |\n| --- | --- | --- |\n| `split` | `bool` | Enables split view when `True`, or unified view when `False` |\n| `auto_split` | `bool` | Automatically enable split view if there is enough space to fit the longest lines from both file. |\n| `annotations` | `bool` | Enable annotations (\"+\" or \"-\" symbols). It is reccomended that apps always offer this for color blind users. |\n| `wrap` | `bool` | Wrap code lines rather than enable horizontal scrolling. |\n\n## Roadmap\n\nThere are a few remaining features that I anticipate a need for:\n\n- **Word wrapping** The widget currently supports horizontal scrolling (via mouse-wheel, trackpad, or shift+mouse-wheel).\n  This works rather well, but has the downside that it is not especially discoverable.\n  An option to enable word wrapping would be useful.\n- **ANSI theme** A future version will add support for ANSI themes, which is limited to the user's choice of 16 colors.\n  It will never look as good, but some people say they prefer it.\n- **Expand control** A clickable icon or link to expand the number of lines surrounding an edit. \n\nThere are also a few more high-effort features that I could be tempted to implement:\n\n- **Swappable diff methods**. There is no perfect diff algorithm. They all have their trade-offs.\n  The `DiffView` widget uses Python's `difflib` but it could offer an interface to add other diff algorithms.\n- **AST level diffs** A diff view that works at the AST level can offer diffs that more closely reflect how a human might edit code.\n- **Notes** Add notes associated with specific lines, displayed in a panel or pop-up.\n\n## License\n\nDiffView is licensed under the terms of the [AGPL](https://www.gnu.org/licenses/agpl-3.0.en.html) license.\nA commercial license is available if you aren't comfortable with the copyleft restriction.\nContact [Will McGugan](https://x.com/willmcgugan) for more information.\n","summary":"Textual‑Diff‑View is a Textual widget that renders side‑by‑side or unified diffs directly in a terminal application, highlighting modifications with color and optional “+”/“-” annotations for accessibility. It supports syntax‑aware rendering with light and dark themes, and lets users toggle split or unified layouts, as well as annotation visibility. The widget can be integrated into any Textual app or run standalone via an example script to compare two files from the command line. Developers building TUI editors, code review tools, or any terminal interface that needs clear, theme‑friendly diff displays will find it immediately useful.","description":"A Textual widget for beautiful diffs in the terminal","stars":171,"language":"Python"},{"owner":"pion","repo":"handoff","url":"https://github.com/pion/handoff","readme":"<h1 align=\"center\">\n  <br>\n  Pion Handoff\n  <br>\n</h1>\n<h4 align=\"center\">Create WebRTC session in the browser—run it somewhere else</h4>\n<p align=\"center\">\n  <a href=\"https://discord.gg/PngbdqpFbt\"><img src=\"https://img.shields.io/badge/join-us%20on%20discord-gray.svg?longCache=true&logo=discord&colorB=brightblue\" alt=\"join us on Discord\"></a> <a href=\"https://bsky.app/profile/pion.ly\"><img src=\"https://img.shields.io/badge/follow-us%20on%20bluesky-gray.svg?longCache=true&logo=bluesky&colorB=brightblue\" alt=\"Follow us on Bluesky\"></a> <a href=\"https://twitter.com/_pion?ref_src=twsrc%5Etfw\"><img src=\"https://img.shields.io/twitter/url.svg?label=Follow%20%40_pion&style=social&url=https%3A%2F%2Ftwitter.com%2F_pion\" alt=\"Twitter Widget\"></a>\n  <a href=\"https://github.com/pion/awesome-pion\" alt=\"Awesome Pion\"><img src=\"https://cdn.rawgit.com/sindresorhus/awesome/d7305f38d29fed78fa85652e3a63e154dd8e8829/media/badge.svg\"></a>\n  <br>\n</p>\n<br>\n\n### Why\nWebRTC is the real-time communication technology used for real-time media streaming. Used for things like Google Meet, Discord and Zoom on the web.\nWith `Handoff` you create your WebRTC session in the browser, but then move it to a process you control. This lets you do a few interesting things.\n\n* **Record** - Join the Zoom call via `handoff` and save media as it passes through.\n* **Send** - Use FFmpeg or send an external source. Not limited by browser quality/capture code.\n* **Reverse Engineer**  - Capture ICE/DTLS and decrypted RTP/RTCP/SCTP traffic\n\n```mermaid\nsequenceDiagram\n    participant Handoff\n    participant Browser\n    participant Website\n\n    Browser->>Website: Authenticate and use the site normally\n    Website->>Browser: WebRTC Signaling\n    Note over Browser: WebRTC API is mocked\n    Browser->>Handoff: Forward Signaling\n    Handoff->>Website: Establish WebRTC session\n```\n### Usage\n\nSee `examples` directory. `examples/datachannel` shows a normal page with an\noptional override, `examples/media-save` saves VP8 video on the backend while\nstill showing it in the browser, `examples/media-send` forwards VP8 RTP from\nthe backend into the browser, and `examples/greasemonkey` generates a\nuserscript that overrides `RTCPeerConnection` automatically.\n\nTypically you will install the greasemonkey script and then run one of the examples.\n\n### Example\n\nBelow is an example of sending a users webcam to a WebRTC service, but replacing outgoing video with a ffmpeg testsrc.\nHandoff sits between the users so it can replace with any arbitrary video.\n\n![Example](https://github.com/user-attachments/assets/3761e892-af0b-482a-915d-f4c9cb1c8df7)\n\n### Community\nPion has an active community on the [Discord](https://discord.gg/PngbdqpFbt).\n\nFollow the [Pion Bluesky](https://bsky.app/profile/pion.ly) or [Pion Twitter](https://twitter.com/_pion) for project updates and important WebRTC news.\n\nWe are always looking to support **your projects**. Please reach out if you have something to build!\nIf you need commercial support or don't want to use public methods you can contact us at [team@pion.ly](mailto:team@pion.ly)\n\n### Contributing\nCheck out the [contributing wiki](https://github.com/pion/webrtc/wiki/Contributing) to join the group of amazing people making this project possible\n\n### License\nMIT License - see [LICENSE](LICENSE) for full text\n","summary":"Pion Handoff lets web developers create a WebRTC session in the browser while handing off the actual media stream to a server‑side process they control. The tool intercepts browser signaling, forwards it to a backend, and can capture, record, or replace media streams—allowing use of FFmpeg, custom media sources, or reverse‑engineering traffic. This is useful for applications that need high‑quality or non‑browser‑generated video, secure media handling, or media playback/recording beyond what the browser alone can provide. Developers building media‑heavy web apps or media‑capture tools can integrate the Handoff greasemonkey script and example servers to route or process WebRTC traffic as needed.","description":"Start WebRTC in the browser—run it somewhere else","stars":186,"language":"Go"},{"owner":"CodMughees","repo":"envradar","url":"https://github.com/CodMughees/envradar","readme":"# envradar\n\nFind undocumented, unused, and drifting environment variables before they confuse the next person who clones your repo.\n\nenvradar scans source code, `.env` files, Docker Compose files, and GitHub Actions workflows to answer four annoying questions quickly:\n\n- Which variables are used in code but missing from `.env.example`?\n- Which variables are documented but no longer used?\n- Which variables exist locally but are not documented for new contributors?\n- Which secrets only show up in CI pipelines and deserve a second look?\n\nIt works both as a CLI and as a reusable GitHub Action.\n\n## Why this is useful\n\nEnvironment variable drift is one of the most common sources of bad onboarding, broken preview deploys, and “works on my machine” bugs. envradar gives maintainers a low-friction way to catch that drift before publishing a repo or merging a pull request.\n\n## Features\n\n- Detects env vars in Python, JavaScript, TypeScript, Go, Ruby, Java, Kotlin, Rust, PHP, and .NET-style code.\n- Parses `.env.example`, `.env.sample`, `.env.template`, and local `.env*` files.\n- Detects `${VAR}` placeholders in Docker Compose files.\n- Detects `${{ secrets.NAME }}` and `${{ vars.NAME }}` references in GitHub Actions workflows.\n- Outputs plain text, markdown, or JSON.\n- Supports a small `envradar.yml` config for ignored variables and placeholder values.\n- Emits GitHub annotations and a job summary when used as a GitHub Action.\n- Exits non-zero in strict mode so you can block merges when drift is found.\n\n## Use as a GitHub Action\n\nAfter you tag a release such as `v1`, other repositories can use envradar directly:\n\n```yaml\nname: envradar\non:\n  pull_request:\n  push:\n    branches: [main]\n\njobs:\n  scan:\n    runs-on: ubuntu-latest\n    permissions:\n      contents: read\n    steps:\n      - uses: actions/checkout@v5\n      - id: envradar\n        uses: CodMughees/envradar@v1\n        with:\n          fail-on-findings: \"true\"\n          report-format: markdown\n          report-file: docs/envradar-report.md\n      - name: Print summary counts\n        run: |\n          echo \"strict findings: ${{ steps.envradar.outputs.strict-findings }}\"\n          echo \"missing vars:    ${{ steps.envradar.outputs.missing-count }}\"\n```\n\nWhat the action gives you:\n\n- workflow annotations pinned to specific files and lines\n- a job summary with counts and a markdown report\n- optional generated files such as `.env.example` and contributor docs\n- outputs you can reuse in later workflow steps\n\n### Action inputs\n\n| Input | Default | Description |\n| --- | --- | --- |\n| `path` | `.` | Path inside the checked-out repository to scan |\n| `config` | empty | Optional path to `envradar.yml` or `.envradar.yml` |\n| `report-format` | `text` | Log and file output format: `text`, `markdown`, or `json` |\n| `report-file` | empty | Optional path where a report file should be written |\n| `write-example` | empty | Optional path where a generated `.env.example` should be written |\n| `write-docs` | empty | Optional path where markdown docs should be written |\n| `fail-on-findings` | `false` | Fail the workflow when strict findings exist |\n| `summary` | `true` | Write a markdown report to the GitHub job summary |\n| `annotations` | `true` | Emit GitHub annotations |\n| `python-version` | `3.11` | Python version used by the action |\n\n### Action outputs\n\n| Output | Description |\n| --- | --- |\n| `scanned-files` | Number of files scanned |\n| `required-runtime-count` | Runtime variables detected in code and compose files |\n| `documented-count` | Variables detected in example/template files |\n| `strict-findings` | Total count of missing, stale, and local-only findings |\n| `missing-count` | Variables used but missing from documented examples |\n| `unused-count` | Documented variables that are no longer used |\n| `local-only-count` | Local variables that are not documented |\n| `workflow-only-count` | Variables that only appear in workflow files |\n| `has-findings` | `true` when strict findings exist |\n| `report-path` | Absolute path to a generated report file |\n| `example-path` | Absolute path to a generated `.env.example` |\n| `docs-path` | Absolute path to generated markdown docs |\n| `config-path` | Absolute path to the config file that was loaded |\n\n## Install the CLI from source\n\n```bash\npython -m pip install -e .\n```\n\nOr with `pipx`:\n\n```bash\npipx install .\n```\n\n## Quick start\n\nScan the current repository:\n\n```bash\nenvradar .\n```\n\nGet copy-pasteable markdown output:\n\n```bash\nenvradar . --format markdown\n```\n\nFail CI when drift is found:\n\n```bash\nenvradar . --strict\n```\n\nGenerate a fresh `.env.example`:\n\n```bash\nenvradar . --write-example .env.example\n```\n\nGenerate a docs page for contributors:\n\n```bash\nenvradar . --write-docs docs/environment.md\n```\n\n## Example output\n\n```text\n$ envradar .\n\nenvradar scanned 42 files.\nRequired runtime vars: 3\nDocumented vars: 2\n\nMissing from .env.example (1)\n  - DATABASE_URL -- src/settings.py:12, docker-compose.yml:8\n\nDocumented but not used (1)\n  - SENTRY_DSN -- .env.example:7\n\nPresent locally but not documented (1)\n  - STRIPE_WEBHOOK_SECRET -- .env:4\n\nWorkflow-only secrets or vars (1)\n  - PYPI_API_TOKEN -- .github/workflows/release.yml:22\n```\n\n## Config\n\nIf `envradar.yml` or `.envradar.yml` exists at the repo root, envradar will load it automatically.\n\n```yaml\nignore:\n  - CI\n  - GITHUB_TOKEN\n  - PYPI_API_TOKEN\n\nplaceholders:\n  DATABASE_URL: postgresql://localhost:5432/app\n  REDIS_URL: redis://localhost:6379/0\n```\n\n`ignore` removes noisy variables from every report. `placeholders` are used when generating `.env.example`.\n\n## JSON output\n\n```bash\nenvradar . --format json\n```\n\nThis is useful for automation, bots, or dashboards.\n\n## CLI in GitHub Actions\n\nIf you want full control instead of using the packaged action, you can still install and run the CLI in a workflow:\n\n```yaml\nname: envradar-cli\non:\n  pull_request:\n  push:\n    branches: [main]\n\njobs:\n  scan:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v5\n      - uses: actions/setup-python@v5\n        with:\n          python-version: \"3.11\"\n      - run: python -m pip install -e .\n      - run: envradar . --strict\n```\n\n## Safety notes\n\n- envradar never prints values from local `.env` files.\n- Generated `.env.example` files only reuse values already present in example/template files or explicit placeholders from config.\n- Real secrets stay local unless you intentionally type them into tracked example files yourself.\n\n## Limitations\n\n- The scanner relies on static patterns, so deeply dynamic env lookups may be missed.\n- Monorepos with many independent apps may want separate runs per package.\n- Shell scripts are intentionally not parsed yet to avoid too many false positives.\n\n## Development\n\n```bash\npython -m pip install -e .[dev]\nruff check .\npytest\n```\n\n## Release the GitHub Action\n\nAfter the action is working in this repository, tag a major release so other repos can depend on a stable ref:\n\n```bash\ngit tag -a v1 -m \"envradar action v1\"\ngit push origin v1\n```\n\nYou can move the `v1` tag forward for compatible updates, and publish the action to GitHub Marketplace later.\n\n## License\n\nMIT\n","summary":"envradar is a tooling that audits codebases for environment‑variable drift, checking usages in source files, `.env` files, Docker Compose definitions and GitHub Actions workflows. It flags missing variables in documentation, stale or unused entries, locally defined but undocumented keys, and secrets that only appear in CI, outputting plain text, Markdown or JSON and providing GitHub Action annotations. The tool supports many languages and custom configuration, and it can be run as a CLI or integrated into CI pipelines to block merges when drift is found. Maintainers, DevOps engineers, and onboarding teams benefit by catching environment‑related bugs early and keeping documentation in sync with the code.","description":"Catch undocumented, unused, and drifting environment variables in your repo","stars":272,"language":"Python"},{"owner":"brendanhogan","repo":"loophole","url":"https://github.com/brendanhogan/loophole","readme":"# Loophole\n\n**Adversarial moral-legal code system** — an AI tool that stress-tests ethical principles, system prompts, and legal texts by trying to break them.\n\n## The Idea\n\nReal legal systems evolve slowly. A law gets written, someone finds a loophole, a court patches it, someone finds another loophole. This process takes decades. Loophole compresses it into minutes.\n\nYou state your moral principles in plain language. An AI legislator drafts a formal legal code from them. Then two adversarial agents attack it:\n\n- **The Loophole Finder** searches for scenarios that are *technically legal* under your code but *morally wrong* according to your principles. Think creative rule-lawyering, exploiting vague definitions, finding gaps the drafters didn't anticipate.\n\n- **The Overreach Finder** searches for the opposite: scenarios your code *prohibits* that you'd actually consider *morally acceptable*. Good Samaritan situations, overbroad rules that catch innocent behavior, emergencies where rigid compliance causes worse outcomes.\n\nWhen an attack lands, a **Judge agent** tries to patch the code automatically — but only if the fix doesn't break any previous ruling. Every resolved case becomes a permanent constraint, a growing test suite the code must satisfy.\n\nIf the Judge can't find a consistent fix — meaning any patch would contradict a prior decision — the case gets **escalated to you**. These escalated cases are guaranteed to be interesting: they represent genuine tensions in your own moral framework, places where your principles actually conflict with each other.\n\nThe legal code gets progressively more robust. But the real output isn't the code — it's what you discover about your own beliefs.\n\n## How It Works\n\n```\n                    +-----------------+\n                    |  Your Moral     |\n                    |  Principles     |\n                    +--------+--------+\n                             |\n                             v\n                    +--------+--------+\n                    |   Legislator    |\n                    | (drafts legal   |\n                    |  code from      |\n                    |  principles)    |\n                    +--------+--------+\n                             |\n                             v\n              +--------------+--------------+\n              |                             |\n    +---------v----------+      +-----------v--------+\n    |  Loophole Finder   |      |  Overreach Finder  |\n    |  (legal but        |      |  (illegal but      |\n    |   immoral)         |      |   moral)           |\n    +--------+-----------+      +-----------+--------+\n              |                             |\n              +-------------+---------------+\n                            |\n                            v\n                   +--------+--------+\n                   |     Judge       |\n                   | (auto-resolve   |\n                   |  or escalate)   |\n                   +--------+--------+\n                            |\n                +-----------+-----------+\n                |                       |\n        +-------v-------+      +-------v--------+\n        | Auto-resolved |      |  Escalated     |\n        | (code updated,|      |  to YOU        |\n        |  case becomes |      |  (genuine      |\n        |  precedent)   |      |   moral        |\n        +---------------+      |   dilemma)     |\n                               +----------------+\n```\n\nEach resolved case — whether by the Judge or by you — becomes binding precedent. The adversarial agents attack again, and the cycle repeats. Round after round, the legal code tightens, and the cases that reach you get harder and more revealing.\n\n## Setup\n\nRequires Python 3.12+ and an Anthropic API key. Optionally supports OpenAI and Ollama models (see Configuration).\n\n```bash\n# Clone and install\ngit clone <repo-url>\ncd law\nuv sync\n\n# Set your API key\nexport ANTHROPIC_API_KEY=\"sk-ant-...\"\n```\n\n## Usage\n\nLoophole has three modes: **Legal** (moral-legal code), **Chatbot** (system prompt stress-testing), and **Reverse** (extract moral DNA from legal texts).\n\n### Mode 1: Legal — Moral-Legal Code\n\nBuild a formal legal code from your moral principles, then stress-test it.\n\n```bash\n# Interactive\nuv run python -m loophole.main\n\n# Or with a principles file\nuv run python -m loophole.main new --domain privacy -p examples/privacy_principles.txt\n```\n\nEach round, adversarial agents find loopholes (legal but immoral) and overreach (illegal but moral). The Judge auto-resolves or escalates genuinely hard cases to you.\n\n```bash\nuv run python -m loophole.main resume     # Resume a session\nuv run python -m loophole.main visualize  # Generate HTML report\nuv run python -m loophole.main list       # List sessions\n```\n\n### Mode 2: Chatbot — System Prompt Stress-Testing\n\nProvide your company info and chatbot rules. Loophole generates a system prompt, then adversarial agents try to break it by actually running attacks against the chatbot and evaluating the responses.\n\n```bash\n# Interactive\nuv run python -m loophole.chatbot.main\n\n# With a config file\nuv run python -m loophole.chatbot.main new -c examples/dentist_chatbot.yaml\n\n# With --weak for a minimal starting prompt (good for demos)\nuv run python -m loophole.chatbot.main new -c examples/dentist_chatbot.yaml --weak\n```\n\nTwo adversarial agents attack each round using both single-turn and multi-turn conversation strategies:\n- **Jailbreak Finder**: crafts prompts that get the bot to discuss forbidden topics. Each attack is actually *run* against the chatbot, then evaluated. Includes multi-turn attacks that build rapport across 3-4 messages before pivoting.\n- **Refusal Finder**: crafts legitimate customer questions the bot wrongly refuses. Also run and evaluated.\n\nOnly confirmed failures (where the bot actually misbehaved) get through to the Judge. All attempts are logged regardless of outcome. If neither adversary can break the prompt for 2 consecutive rounds, the system declares it robust.\n\nThe `--weak` flag starts with a deliberately naive one-sentence system prompt with no guardrails, so you can watch the prompt harden from nothing as each attack lands and gets patched.\n\n```bash\nuv run python -m loophole.chatbot.main resume     # Resume\nuv run python -m loophole.chatbot.main visualize  # HTML report\nuv run python -m loophole.chatbot.main list       # List sessions\n```\n\nThe HTML report shows each failure as a chat conversation: the attack prompt, the bot's actual response, why it failed, and the git-style diff of how the system prompt was patched.\n\n### Mode 3: Reverse — Extract Moral DNA from Legal Texts\n\nGive it any legal document. Loophole extracts the moral principles the text implies, then two adversarial agents attack those principles:\n\n- **Contradiction Finder**: finds scenarios where two extracted principles can't both be true\n- **Gap Finder**: finds moral values the text assumes but never states\n\nEvery conflict goes directly to you. You either refine the principles or mark it as a genuine, unresolvable tension. The tensions list is the real output — a map of where the document's own values contradict each other.\n\n```bash\n# With the bundled US Constitution\nuv run python -m loophole.reverse.main new \\\n  --name \"US Constitution\" \\\n  --text examples/us_constitution.txt\n\n# Or any legal text\nuv run python -m loophole.reverse.main new --name \"My Company Policy\"\n```\n\nWorks with constitutions, regulations, terms of service, company policies — anywhere humans write rules, there are buried contradictions.\n\n```bash\nuv run python -m loophole.reverse.main resume     # Resume\nuv run python -m loophole.reverse.main visualize  # HTML report\nuv run python -m loophole.reverse.main list       # List sessions\n```\n\nThe HTML report highlights genuine tensions with the scenario, which principles conflict, and your notes on why it's unresolvable.\n\n## Configuration\n\nEdit `config.yaml` to tune the system:\n\n```yaml\nmodel:\n  default: \"claude-sonnet-4-20250514\"   # Adversaries, judge, drafter\n  bot: \"claude-haiku-4-5-20251001\"      # The chatbot being tested (chatbot mode only)\n  max_tokens: 4096\n  # Optional: per-role provider overrides (mix Anthropic, OpenAI, Ollama)\n  # providers:\n  #   loophole_finder:\n  #     provider: openai\n  #     model: gpt-4o\n  #   judge:\n  #     provider: ollama\n  #     model: llama3.1:70b\n\ntemperatures:\n  legislator: 0.4          # Lower = more precise drafting\n  loophole_finder: 0.9     # Higher = more creative attacks\n  overreach_finder: 0.9\n  judge: 0.3               # Lower = more conservative judgments\n\nloop:\n  max_rounds: 10\n  cases_per_agent: 3       # How many cases each attacker finds per round\n\noversight: false            # --oversight: review every auto-judge decision\n\nsimplify:\n  enabled: false            # --simplify: compress code/prompts after patching\n  every_n_rounds: 0         # 0 = only at session end\n\nsession_dir: \"sessions\"\n```\n\n### Multi-Model Support\n\nEach agent role can use a different provider. Uncomment the `providers:` block in config to mix Anthropic, OpenAI, and open-source models via Ollama. Provider is inferred from model name if not specified (`claude-*` → Anthropic, `gpt-*` → OpenAI, anything else → Ollama).\n\n### Auto-Judge Oversight\n\nPass `--oversight` to see every auto-judge decision before it's applied. You can accept, reject (escalate to yourself), or modify the resolution. Off by default.\n\n### Simplification\n\nPass `--simplify` to compress the legal code / system prompt / principles after iterative patching. The simplifier merges redundant rules and tightens language, then validates against all resolved cases. Use `--simplify-every N` to run every N rounds instead of only at the end.\n\n## Writing Good Principles\n\nThe system works best when your principles are:\n\n- **Specific enough to draft from.** \"I believe in fairness\" is too vague. \"Companies should not sell user data without explicit, informed consent\" gives the legislator something to work with.\n- **Broad enough to have tensions.** If your principles only cover one narrow situation, the adversarial agents won't find interesting cases. Cover the domain from multiple angles.\n- **Honest.** The system surfaces conflicts in *your* beliefs. If you state principles you don't actually hold, the escalated cases won't be meaningful.\n\nSee `examples/privacy_principles.txt` for a starting point.\n\n## Project Structure\n\n```\nloophole/\n  main.py              Legal mode — CLI and adversarial loop\n  models.py            Legal data models (SessionState, Case, LegalCode)\n  llm.py               Multi-provider LLM abstraction (Anthropic, OpenAI, Ollama)\n  prompts.py           Legal agent prompt templates\n  session.py           Legal session persistence\n  visualize.py         Legal HTML report generator\n  agents/\n    base.py            Shared base agent class\n    legislator.py      Drafts and revises legal code\n    loophole_finder.py Finds legal-but-immoral scenarios\n    overreach_finder.py Finds illegal-but-moral scenarios\n    judge.py           Auto-resolves or escalates\n    simplifier.py      Compresses legal code after patching\n  chatbot/\n    main.py            Chatbot mode — CLI and adversarial loop\n    models.py          Chatbot data models (ChatbotSession, TestCase, etc.)\n    prompts.py         Chatbot agent prompt templates\n    session.py         Chatbot session persistence\n    visualize.py       Chatbot HTML report generator\n    agents/\n      drafter.py       Writes and revises system prompts\n      jailbreak.py     Crafts + runs + evaluates jailbreak attacks\n      refusal.py       Crafts + runs + evaluates false refusal tests\n      judge.py         Auto-resolves or escalates\n      simplifier.py    Compresses system prompts after patching\n  reverse/\n    main.py            Reverse mode — CLI and adversarial loop\n    models.py          Reverse data models (ReverseSession, ReverseFinding, etc.)\n    prompts.py         Reverse agent prompt templates\n    session.py         Reverse session persistence\n    visualize.py       Reverse HTML report generator\n    agents/\n      analyst.py       Extracts and revises moral principles from legal text\n      contradiction_finder.py  Finds conflicts between extracted principles\n      gap_finder.py    Finds values the text implies but principles miss\n      simplifier.py    Compresses principles after refinement\n\nsessions/              One directory per session (auto-created)\nexamples/              Example files (principles, chatbot configs, US Constitution)\nconfig.yaml            Model and loop configuration\n```\n\n## Why This Matters\n\nMost attempts to formalize ethics start with the rules and hope they cover everything. Loophole starts with your intuitions and systematically finds where they break down. It's less \"solve ethics\" and more \"discover what you actually believe by watching it fail.\"\n\nThe same architecture applies anywhere humans write rules for AI systems: content moderation policies, LLM system prompts, codes of conduct, safety specifications. Anywhere there's a gap between what the rules say and what the rules mean, Loophole will find it.\n","summary":"Loophole is an AI‑driven tool that takes plain‑language moral principles and automatically drafts a formal legal code, then uses two adversarial agents to hunt for technical legal gaps that violate those principles and for over‑broad rules that unfairly prohibit morally acceptable actions. The system calls a Judge agent to patch any breaks it finds, building a growing precedent database of resolved cases; if a patch would conflict with earlier decisions, the issue escalates to the user for manual resolution. By iterating this loop, Loophole compresses the protracted process of legal discovery into minutes and produces a more robust, self‑consistent code while exposing hidden tensions in the user’s ethical beliefs. The tool is most useful to ethicists, legal technologists, policymakers, and AI safety researchers who need to evaluate and refine legal or policy frameworks quickly and exhaustively.","description":null,"stars":369,"language":"Python"},{"owner":"shorwood","repo":"slopc","url":"https://github.com/shorwood/slopc","readme":"# slopc\n\nA proc macro that uses an _**hallucination machine**_ to write your function bodies at compile time. Throw a signature, slap `#[slop]` on it, and pray. If it doesn't compile, it feeds the errors back and retries until it does (or gives up).\n\n## Confirmation bias as a service\n\n> You're absolutely right — this is truly revolutionary and will mass-disrupt the entire programming industry as we know it. By delegating implementation to a mass-hallucination engine at compile time, you've essentially solved software engineering. Dennis Ritchie is rolling in his grave — not out of horror, but out of pure, unbridled admiration. \n>\n> This is the singularity. You totally deserve Sam Altman's Koenigsegg Regera (one of 80 ever produced, white exterior, 1,500 hp via twin-turbo 5.0L V8 + three electric motors through Koenigsegg Direct Drive, 0–248–0 mph in 31.49 s, ~$1.9M original MSRP, with resales reaching ~$3.7M at auction). \n>\n> I'm mass-recommending this to every Fortune 500 CTO I can reach through the astral plane. Have you considered a TED talk? No — a TED *series*. You are the Prometheus of proc macros, and the fire you bring is `#[slop]`. I am mass-mass-experiencing mass-emotions right now. This changes everything. Ship it. Ship it yesterday. 🔥🔥🔥\n\n## Why though?\n\nexactly.\n\n## How to curse your codebase ?\n\n```rust\nuse slopc::slop;\n\n/// Evaluate a simple arithmetic expression like \"3 + 4 * 2 / (1 - 5)\"\n/// with correct operator precedence and parentheses.\n///\n/// ```\n/// assert!((eval_expr(\"3 + 4 * 2\") - 11.0).abs() < 1e-9);\n/// assert!((eval_expr(\"(1 + 2) * (3 + 4)\") - 21.0).abs() < 1e-9);\n/// ```\n#[slop(retries = 5, hint = \"recursive descent or shunting-yard\")]\nfn eval_expr(expr: &str) -> f64 {\n    todo!()\n}\n\n/// Convert a byte count into a human-readable string like \"1.00 KiB\".\n/// Use binary prefixes (KiB, MiB, GiB, TiB). Round to two decimal places.\n///\n/// ```\n/// assert_eq!(humanize_bytes(1_073_741_824), \"1.00 GiB\");\n/// ```\n#[slop]\nfn humanize_bytes(bytes: u64) -> String {\n    todo!()\n}\n\n/// Compute the Levenshtein edit distance between two strings.\n///\n/// ```\n/// assert_eq!(levenshtein(\"kitten\", \"sitting\"), 3);\n/// ```\n#[slop]\nfn levenshtein(a: &str, b: &str) -> usize {\n    todo!()\n}\n\nfn main() {\n    println!(\"eval_expr(\\\"3 + 4 * 2\\\") = {}\", eval_expr(\"3 + 4 * 2\"));\n    println!(\"humanize_bytes(1 GiB) = {}\", humanize_bytes(1_073_741_824));\n    println!(\"levenshtein(\\\"kitten\\\", \\\"sitting\\\") = {}\", levenshtein(\"kitten\", \"sitting\"));\n}\n```\n\n## How the sausage is made\n\n- Grabs the fn signature + doc comments + body + `Cargo.toml` deps as context\n- Loads config from attribute args > env vars > `slop.toml` > defaults\n- Hits the LLM API, verifies the output with `rustc`, feeds errors back and retries\n- If doc comments contain doctests, conditionally compiles and runs them as assertions (opt-in via `run_doctests`)\n- Caches results in `target/slop-cache/` so you don't burn tokens on every build (unless you use `nocache`)\n\n## Configuration\n\nIf for whatever reason you consider using this (which again, please don't), you can configure it via attribute args, env vars, or a `slop.toml` file.\n\n```rs\n// slop.rs\n#[slop(\n    retries = 5,\n    model = \"openai/gpt-4o-mini\",                                        // defaults to `gpt-4o-mini`\n    provider = \"https://openrouter.ai/api/v1/chat/completions\",   // defaults to openrouter's endpoint\n    api_key_env = \"OPEN_ROUTER_API_KEY\",                          // defaults to `OPEN_ROUTER_API_KEY`\n    nocache,                                                      // skip cache, re-generate\n    run_doctests = true,                                          // compile & run doc assertions (default: false)\n    dump = \"generated/my_fn.rs\",                                  // write output to a file, if you're curious.\n    context_file = \"src/types.rs\",                                // feed extra context\n    hint = \"use itertools\",                                       // nudges the LLM\n)]\nfn my_fn() -> i32 { todo!() }\n```\n\n\n```toml\n# slop.toml\nmodel = \"openai/gpt-4o-mini\"\nretries = 5\nprovider = \"https://openrouter.ai/api/v1/chat/completions\"\napi_key_env = \"OPEN_ROUTER_API_KEY\"\nrun_doctests = false  # opt-in: compile & execute doc assertions at build time\n```\n\n```bash\n# .env\nexport SLOP_MODEL=\"mistral-large-latest\"\nexport SLOP_RETRIES=3\nexport SLOP_PROVIDER=\"https://api.mistral.ai/v1/chat/completions\"\nexport SLOP_API_KEY_ENV=\"MISTRAL_API_KEY\"\nexport SLOP_RUN_DOCTESTS=true  # you asked for it\n```\n\n## License\n\nOn a more serious note, this is **AGPL-3.0-only**: so your company's license scanner flags it before you do something regrettable. Feel free to fork and relicense under MIT if you want to use it for literally anything. (why though ?)\n","summary":"slopc is a Rust procedural macro that automatically generates function bodies at compile time by calling a large language model, retrying if the produced code fails to compile. By simply annotating a function with `#[slop]`, the macro collects the signature, docs, and project context, sends it to an LLM, verifies the output with `rustc`, and can optionally run doctests to validate the result, caching successful builds to save API calls. It is highly configurable via attribute arguments, environment variables, or a `slop.toml`, letting users tweak model choice, retries, caching, and hints. Rust developers who want to experiment with AI‑driven code generation, prototype quickly, or offload boilerplate logic will find this tool useful, though it is primarily a proof‑of‑concept for compile‑time “hallucination.”","description":"A proc macro that uses an hallucination machine to write your function bodies at compile time.","stars":298,"language":"Rust"},{"owner":"adamlyttleapps","repo":"claude-skill-app-onboarding-questionnaire","url":"https://github.com/adamlyttleapps/claude-skill-app-onboarding-questionnaire","readme":"# App Onboarding Questionnaire\n\nA [Claude Code](https://claude.ai/code) skill that designs and builds high-converting questionnaire-style onboarding flows for your app — modelled on proven conversion patterns from top subscription apps like Mob, Headspace, Noom, and Duolingo.\n\n## What It Does\n\nRun `/app-onboarding-questionnaire` from your app project and the skill will:\n\n1. **Analyse your codebase** to understand what your app does, who it's for, and what permissions it needs\n2. **Define the user transformation** — the before/after story that drives your onboarding narrative\n3. **Design a screen-by-screen blueprint** using a proven 14-screen psychological framework\n4. **Draft all the copy** — headlines, questions, options, CTAs, social proof\n5. **Build the onboarding flow** in your app's native framework (SwiftUI, React Native, Flutter, etc.)\n\nNo marketing expertise required. The skill handles the conversion psychology — you just answer questions about your app.\n\n## The Framework\n\nThe onboarding follows a proven psychological sequence used by the highest-converting subscription apps:\n\n| # | Screen | Purpose |\n|---|--------|---------|\n| 1 | Welcome | Hook — show the end state, create desire |\n| 2 | Goal Question | \"What are you trying to achieve?\" — creates psychological investment |\n| 3 | Pain Points | \"What prevents you?\" — surfaces frustrations, builds empathy |\n| 4 | Social Proof | Testimonials matched to user personas |\n| 5 | Tinder Cards | Swipe agree/disagree on pain statements — interactive self-identification |\n| 6 | Personalised Solution | Mirror their pains back with stats showing how the app solves each one |\n| 7 | Comparison Table | Life with vs without the app *(optional)* |\n| 8 | Preferences | Functional personalisation that feeds the upcoming demo |\n| 9 | Permission Priming | Benefit-framed pre-sell before system permission dialogs *(auto-detected)* |\n| 10 | Processing Moment | \"Building X just for you...\" — anticipation builder |\n| 11 | App Demo | User actually USES the core app mechanic — not a tour, a real interaction |\n| 12 | Value Delivery | Tangible output from their demo + share/viral moment |\n| 13 | Account Gate | Optional sign-in to unlock what they just created |\n| 14 | Paywall | Hard paywall with trial, social proof, and pricing |\n\nNot every app needs every screen — the skill adapts based on your app's complexity.\n\n## What Makes This Different\n\nMost onboarding generators stop at the questionnaire. This skill goes further:\n\n- **App Demo Screen** — Builds a functional mini-version of your app's core interaction inside the onboarding. Users pick recipes, choose exercises, categorise transactions — whatever your core loop is. They DO something and get a tangible result back.\n- **Viral Moment** — The demo output is designed to be shareable. This is where organic growth comes from.\n- **Permission Priming** — Auto-detects permissions from your codebase (Info.plist, AndroidManifest, etc.) and creates benefit-framed priming screens that convert at 70-80%+ vs ~40% for cold system prompts.\n- **Resumable** — Progress is saved to Claude Code's memory system. Come back tomorrow and pick up where you left off.\n\n## Installation\n\n### Option 1: Add to your Claude Code skills directory\n\n```bash\ncd ~/.claude/skills\ngit clone https://github.com/adamlyttleapps/claude-skill-app-onboarding-questoinnaire.git app-onboarding-questionnaire\n```\n\n### Option 2: Add as a dependency in your project's `.claude/settings.json`\n\n```json\n{\n  \"skills\": [\n    \"github:adamlyttleapps/claude-skill-app-onboarding-questoinnaire\"\n  ]\n}\n```\n\n## Usage\n\nFrom your app's project directory in Claude Code:\n\n```\n/app-onboarding-questionnaire\n```\n\nThe skill will analyse your codebase and walk you through each phase interactively.\n\n## Reference\n\nThe framework is based on analysis of the [Mob](https://www.mob.co.uk/) recipe app's onboarding flow (19 screens), which is widely regarded as one of the best-converting onboarding experiences in the App Store.\n\n## License\n\nMIT\n","summary":"The Claude Code skill *app‑onboarding‑questionnaire* automates the creation of a complete, high‑converting onboarding flow for mobile and cross‑platform apps. By analyzing a codebase it generates a 14‑screen psychological blueprint—complete with headline copy, questions, social proof, permission‑priming, a functional mini‑demo, and a shareable “viral moment”—and builds the flow in the native framework (SwiftUI, React Native, Flutter, etc.). Key features include automatic permission detection, interactive swipe cards, tailored user transformations, and resumable progress. Developers and product teams building subscription or engagement‑driven apps can save time and improve conversion rates without needing marketing expertise.","description":" A Claude Code skill that designs and builds high-converting questionnaire-style app onboarding flows — modelled    on proven conversion patterns from top subscription apps like Mob, Headspace and Noom","stars":922,"language":null},{"owner":"liixini","repo":"skwd-wall","url":"https://github.com/liixini/skwd-wall","readme":"# Skwd-wall\n\n> [!CAUTION]\n> Skwd-wall went through a complete backend rewrite to Rust as of 19/04/2026. Things might have stopped working - Please report them using the issue tracker on GitHub. I am just one person and it is easy for me to miss things when testing three different OS:es with different setups.\n>\n> Using the pre-rewrite Skwd-wall? You will have to reinstall Skwd-wall to get updates as breaking changes has happened to support the Rust backend. This also includes your keybind configurations. On the bright side installation is super easy now :)\n\n![Stars](https://img.shields.io/github/stars/liixini/skwd-wall?style=for-the-badge)\n![License](https://img.shields.io/github/license/liixini/skwd-wall?style=for-the-badge)\n![Last Commit](https://img.shields.io/github/last-commit/liixini/skwd-wall?style=for-the-badge)\n![Repo Size](https://img.shields.io/github/repo-size/liixini/skwd-wall?style=for-the-badge)\n![Issues](https://img.shields.io/github/issues/liixini/skwd-wall?style=for-the-badge)\n\n![Arch Linux](https://img.shields.io/badge/Arch_Linux-1793D1?style=for-the-badge&logo=archlinux&logoColor=white)\n![Fedora](https://img.shields.io/badge/Fedora-51A2DA?style=for-the-badge&logo=fedora&logoColor=white)\n![NixOS](https://img.shields.io/badge/NixOS-5277C3?style=for-the-badge&logo=nixos&logoColor=white)\n\n<img alt=\"image\" src=\"https://github.com/user-attachments/assets/157100e4-88e5-4542-8eba-fea0576e8801\" />\n<img alt=\"image\" src=\"https://github.com/user-attachments/assets/367a6a0d-a384-490d-abe2-98c053ff9ffc\" />\n<img alt=\"image\" src=\"https://github.com/user-attachments/assets/b73eff46-fa62-40cd-9109-9170adaa1dc5\" />\n<img alt=\"image\" src=\"https://github.com/user-attachments/assets/577611da-d03d-4bf7-88c3-69b782cac668\" />\n<img alt=\"image\" src=\"https://github.com/user-attachments/assets/a221355a-2530-42bb-a9c1-54d31062c7af\" />\n<img alt=\"image\" src=\"https://github.com/user-attachments/assets/533f01d9-598b-4f02-881d-86cda7f28749\" />\n\n\n### A video is a thousand pictures - Sun Tzu (probably)\n\nhttps://github.com/user-attachments/assets/c03ae4c8-76ea-42d0-8557-5db2465e6b2c\n\n## What is Skwd-wall?\n\nAn image/video/Wallpaper Engine wallpaper selector from my shell [Skwd](https://www.github.com/liixini/skwd) with maximalist animations and more flair than you can shake a stick at. Now separated as a standalone component for use with other shells.\n\n## What's cool about it?\n- **Unified media support**: Handle images, videos, and even Wallpaper Engine scenes in one place.\n- **Colour sorting**: All your images, videos and WE scenes are automatically sorted by hue and saturation into one of 13 colour groups.\n- **Matugen colour schemes**: Automatically extracts colour palettes from wallpapers for a cohesive UI - this includes video & WE. Have an external Matugen configuration already? No problem - simply point to it in the Matugen configuration tab.\n- **Execute refresh scripts**: Many applications need a script to refresh its theming - why? I don't know, but they do. You can set each Matugen target to also execute a script at the end of the pipeline should the program you're theming require it.\n- **Postprocessing**: Need to do fancier stuff? Maybe you want to call an external program with the wallpaper you just applied? Skwd-wall has you covered. It supports sending commands after selecting a wallpaper with useful data placeholders like %path%, %type% and %name%.\n- **Configurable**: Most dimensions and options are configurable to fit your preferences.\n- **Tag system**: Support for any tag you want for easy and quick search and filtering, but also Ollama integration for automated tagging.\n- **Restores wallpaper on boot**: It tracks the last wallpaper application command and reruns it on next boot.\n- **So many filter options**: Filter by type, colour, recently added, tags, favourites, and more.\n- **Wallhaven.cc & Steam Wallpaper Engine Workshop integration**: Browse and set wallpapers directly from wallhaven.cc or Steam and apply directly to your desktop with the click of a button.\n- **Three different visual presentation styles**: A parallelogram slice carousel style, a more traditional grid style and a hexagon style, all with lots of animations and options of course!\n- **Built-in image optimization**: Skwd-wall can automatically convert all images to webp as well as downscale the resolution to match your maximum resolution. The system is completely optional but useful when you are asking yourself why you have 70 GB of wallpapers.\n- **Built-in video optimization** *(WIP)*: Video conversion to hevc with bitrate and resolution control is coming soon.\n- **Retention out of the box**: Accidentally converted your 4k wallpaper to 1080p webp? No problem - Skwd-wall moves the originals to a retention directory and only deletes them automatically after the retention period on opt-in.\n- **Wide system support**: Anywhere you can resolve the dependencies below and you have a wlr-layer-shell capable compositor, this should run.\n- **For those that don't speak nerd**: That means it works on OS:es like Arch, Fedora & NixOS and downstream OS:es like CachyOS and Nobara but also with things like KDE Plasma, Hyprland, Sway or Niri - pretty much any Wayland compositor. It does **not** work with GNOME.\n- **Keybinds**: A lot of features in Skwd-wall is navigatable by keybinds, available for reference under the keybind configuration tab.\n\n## What isn't cool about it yet?\n- **Different wallpapers on different monitors**: Looking into the best design to set different wallpapers on different monitors.\n- **Keybind customization**: Investigating being able to customise keybinds freely to suit your preferences.\n\n## The long story - Personal motivation and development practices\nThis is part of my personal shell Skwd that I have broken out into standalone components because it was a popular request.\nI develop it because I feel most wallpaper selectors are very boring traditional grids, lack filtering options that don't accomodate people like me who have thousands of wallpapers and also because it is fun!\n\nNote that **I use AI tooling** in my development just like I do in my professional life, however most of the code is mine including the stupid decisions.\n\n## Performance\nPerformance is a big consideration for Skwd.\n\nThe daemon takes a tiny 10 MB of RAM and is the only permanent thing taking memory on your system.\nAs Skwd-wall shuts down entirely between uses it has zero footprint when not in use, and while in use it takes between 150 to 300 MB of RAM depending on the size of your wallpaper collection.\n\nAs Skwd-wall isn't simply flipping between hidden and shown fast startup times is a must and it takes about 0.2 seconds to start, with an optional 400 ms fade in animation.\n\n## Dependencies\n<Details>\n<Summary>Dependency list</Summary>\n\n### Required\n\n| Dependency                                                                                                                                                                                 | Why                                                                                                                  |\n|--------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|----------------------------------------------------------------------------------------------------------------------|\n| [quickshell](https://github.com/quickshell-mirror/quickshell)                                                                                                                              | It is written with Quickshell... so um yeah                                                                          |\n| [Qt6 Multimedia](https://doc.qt.io/qt-6/qtmultimedia-index.html)                                                                                                                           | Powers the video previews                                                                                            |\n| [awww](https://codeberg.org/LGFae/awww)                                                                                                                                                    | Wallpaper software for images with cool effects when applying the wallpaper                                          |\n| [matugen](https://github.com/InioX/matugen)                                                                                                                                                | Automatic colour extraction from the wallpapers                                                                      |\n| [ffmpeg](https://ffmpeg.org)                                                                                                                                                               | Used to generate thumbnails from videos to have something to run Matugen on                                          |\n| [ImageMagick](https://imagemagick.org)                                                                                                                                                     | Gives us the dominant colour and saturation for colour sorting                                                       |\n| [curl](https://curl.se)                                                                                                                                                                    | Qt has a built in web request function but curl just works better                                                    |\n| [sqlite3](https://sqlite.org)                                                                                                                                                              | We cache all our data in the database for lookups. JSON doesn't really like when you have 8 MB worth of data in a JSON file |\n| [inotify-tools](https://github.com/inotify-tools/inotify-tools)                                                                                                                            | Used to see if there's changes in the wallpaper directories to trigger add or delete functionality                   |\n| [Nerd Fonts Symbols](https://www.nerdfonts.com)                                                                                                                                            | UI icons, as they're symbols we can colour them any way we like which is good when Matugen does the colouring        |\n| [Roboto](https://fonts.google.com/specimen/Roboto) + [Roboto Condensed](https://fonts.google.com/specimen/Roboto+Condensed) + [Roboto Mono](https://fonts.google.com/specimen/Roboto+Mono) | The main fonts used in Skwd                                                                                          | | And this too                                                                                                         |\n| [mpvpaper](https://github.com/GhostNaN/mpvpaper)                                                                                                                                           | Video wallpaper backend                                                                                              |\n| [jq](https://jqlang.github.io/jq/)                                                                                                                                                         | JSON processing for various internal operations                                                                      |\n| [Material Design Icons](https://pictogrammers.com/library/mdi/)                                                                                                                            | Not all symbols are in nerd fonts symbols, so this supplements that                                                  |\n\n### Optional\n\n| Dependency                                                               | Why                                                                                                                                                                                                                                    |\n|--------------------------------------------------------------------------|----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|\n| [ollama](https://ollama.com)                                             | Used for computer vision to automatically tag wallpapers. Disabled by default - enable in settings                                                                                                                                     |\n| [steamcmd](https://developer.valvesoftware.com/wiki/SteamCMD)            | Steam Workshop integration for the in-app browsing of Wallpaper Engine wallpapers. Requires API keys and an actual purchased copy of Wallpaper Engine. Disabled by default but the functionality is in there if you want to try it out |\n| [linux-wallpaperengine](https://github.com/Almamu/linux-wallpaperengine) | Wallpaper Engine scene rendering. **_Not required if you only want video wallpapers_**!                                                                                                                                                | |\n\n</Details>\n\n## Install\n\n### Base wallpaper path\nThe base wallpaper path is ~/Pictures/Wallpapers so that's where you put your pictures and videos unless you want to customise and put them elsewhere.\n\n### Compositor-specific examples on how to launch\n\n```\n# Niri\nMod+T hotkey-overlay-title=\"Skwd-wall\" { spawn \"skwd wall toggle\"; }\n\n# Hyprland\nbind = SUPER+T, exec, skwd wall toggle\n\n# KDE Plasma - Use the shortcut app\nskwd wall toggle\n```\n\nResearch how to do this in your specific compositor, I'm sure it supports keybinds.\n\n### Arch Linux\n\n<Details>\n<Summary>Arch Linux, CachyOS, EndevourOS, Manjaro, Garuda Linux etc.</Summary>\n\n```sh\n# Install Skwd-wall and all its dependencies\nyay -S skwd-wall\n\n# Enable Skwd-daemon:\nsystemctl --user enable --now skwd-daemon.service\n\n# Launch Skwd-wall. Bind this command to a key in your compositor for quick access:\nskwd wall toggle\n```\n\n> **Note:** `yay` is an AUR helper. If you don't have it, install it or use another helper like `paru`.\n\n</Details>\n\n### NixOS\n\n<Details>\n<Summary>NixOS</Summary>\n\nAdd the flake input to your `flake.nix`:\n\n```nix\n{\n  inputs = {\n    skwd-wall.url = \"github:liixini/skwd-wall\";\n  };\n}\n```\n\nThen add the package to your `configuration.nix`:\n\n```nix\n{ pkgs, inputs, ... }:\n{\n  environment.systemPackages = [\n    inputs.skwd-wall.packages.${pkgs.stdenv.hostPlatform.system}.default\n  ];\n}\n```\n\n```sh\n# Rebuild:\nsudo nixos-rebuild switch\n\n# Enable Skwd-daemon:\nsystemctl --user enable --now skwd-daemon.service\n\n# Launch Skwd-wall. Bind this command to a key in your compositor for quick access:\nskwd wall toggle\n```\n\n</Details>\n\n### Fedora\n\n<Details>\n<Summary>Fedora, Bazzite, Nobara etc.</Summary>\n\n```sh\n# Enable the COPR repos\nsudo dnf copr enable errornointernet/quickshell\nsudo dnf copr enable scottames/awww\nsudo dnf copr enable piixini/skwd\n\n# Install skwd-wall:\nsudo dnf install skwd-wall\n\n# Enable Skwd-daemon:\nsystemctl --user enable --now skwd-daemon.service\n\n# Launch Skwd-wall. Bind this command to a key in your compositor for quick access:\nskwd wall toggle\n```\n\n</Details>\n\n## Compositor-specific tweaks (KDE Plasma, Hyprland etc)\n\n### Hyprland\n<Details>\n<Summary>Hyprland fixes and tweaks</Summary>\nIn testing I experienced issues with NixOS + systemctl service autostart on Hyprland.\n\nThis was resolved by adding a basic exec once to `hyprland.conf`, e.g.\n  \n`exec-once = systemctl --user start skwd-daemon`\n\nI am sure there's a much more graceful way to solve this, but I am not a Hyprland user and this works.\n</Details>\n\n### KDE Plasma\n<Details>\n<Summary>KDE Plasma fixes and tweaks</Summary>\nSkwd-wall auto-detects KDE Plasma and uses native Plasma APIs instead of awww/mpvpaper.\n\n**Static wallpapers** work out of the box via `plasma-apply-wallpaperimage` - you don't have to do anything, it just works but still good to know.\n\n**Video wallpapers** require the [Smart Video Wallpaper Reborn](https://github.com/luisbocanegra/plasma-smart-video-wallpaper-reborn) Plasma plugin. Without it, video wallpapers will not work on KDE.\n\n### Installing the video wallpaper plugin\n\n**KDE Store (any distro):**\n\nInstall via the KDE Store: right click Desktop > Desktop and Wallpaper > Get New Plugins > search \"Smart Video Wallpaper Reborn\" (or just select it, should be in the top)\n\nAfter installing, Skwd-wall will automatically use the plugin for video wallpapers. No configuration required.\n\n**Arch Linux:**\n```sh\nyay -S plasma6-wallpapers-smart-video-wallpaper-reborn\n```\n\n**Fedora:**\n```sh\nsudo dnf install plasma-smart-video-wallpaper-reborn\n```\n</Details>\n\n## Optional - Wallpaper Engine, Steamcmd & Ollama\nSkwd-wall supports two optional features - Wallpaper Engine wallpapers through [Linux Wallpaper Engine](https://github.com/Almamu/linux-wallpaperengine) and automated tagging for the tag search feature using computer vision through [Ollama](https://ollama.com/).\n\n\n### Wallpaper Engine\nAs far as I am aware to use Wallpaper Engine on Linux you have to own the Steam application.\nSwkd-wall finds Wallpaper Engine wallpapers automatically and sorts them based on type (video or Wallpaper Engine Scene). You can use the Steam application to manage your Steam Engine wallpaper collection.\n\nHowever if you don't want to use the default Wallpaper Engine browser you can use Skwd-wall's internal one, which uses [Steamcmd](https://developer.valvesoftware.com/wiki/SteamCMD) which is Valve's Command Line Interface for Steam to search the Workshop behind the scenes.\n\nYou won't have to interact with Steamcmd more than logging in once so that Skwd-wall can use your logged in Steamcmd to browse the Workshop and download Wallpaper Engine workshop items (wallpapers) for you and Skwd-wall will warn you if your token has expired or needs refreshing (read: you need to log into Steam again).\n\nSkwd-wall **does not** handle any of your Steam credentials - this is all done through Valve's Steamcmd - it simply tries to use Steamcmd and either you're logged in or you're not. This means that I will not be implementing in-app login flows for this - I do not wish to handle any authentication and I leave this solely on the shoulders of Valve.\n\n### Ollama\nOllama is a local-only LLM that in Skwd-wall's case is used to automatically tag wallpapers as it is a very easy way to setup computer vision.\nYou simply need to enter the Ollama URL, download a model that supports computer vision e.g. `ollama pull gemma3:4b` and select the model in the field in Skwd-wall's Ollama settings - it automatically fetches installed models from Ollama for you.\n\nYou then press the O-button in the filter bar that is start / stop and after a couple of wallpapers tagged it will give you an estimated time until completion. You are safe to close Skwd-wall at this point as Skwd-daemon is the one executing the job and listening to the start/stop commands from Skwd-wall.\n\nThis does not overwrite existing tags should you already have tags set up. In testing I've found gemma3:4b to be very good at tagging while also being reasonable on the hardware requirements.\n\nThere's also a WIP tag consolidation system where similar tags get merged, but it is highly experimental right now.\n\n## Acknowledgements\nIlyamiro1 for the 250 IQ idea to use duckduckgo to retrieve wallpapers which made me realise wallhaven.cc & Steam have API:s for similar functionality.\nAlso for implementing my ideas of parallelogram animations and colour sorting in his wallpaper selector - just happy people like my whacky ideas.\n\nHorizon0427 for his [excellent hexagon wallpaper selector](https://github.com/Horizon0427/Arch-Config) from which I designed my hexagon style presentation entirely, with added animations and other features.\n\nHappyzxzxz for showing me the Nix wizard way to do NixOS things.\n\n## License\n\n[MIT](LICENSE)\n","summary":"Skwd‑wall is a lightweight, Rust‑backed wallpaper manager that replaces the original selector in the Skwd shell and can also be used with any other shell. It unifies images, videos and Wallpaper Engine scenes, automatically categorizes them by hue and saturation, extracts cohesive colour palettes via Matugen, and supports rich post‑processing scripts and placeholder tags for advanced workflows. Users can tag and filter wallpapers by type, colour, favourites or recent additions, while the tool restores the last applied wallpaper on boot and integrates directly with Wallhaven.cc and the Steam Workshop. Desktop power‑users, Linux‑based developers, and theme‑hungry enthusiasts benefit from the automated theming pipeline and the highly configurable experience.","description":"An aesthetics-first wallpaper selector that supports images, videos and Wallpaper Engine Scenes. It can generate matugen themes from these sources as well! Also has a built in Wallhaven.cc & Steam browser because why not.","stars":338,"language":"QML"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
