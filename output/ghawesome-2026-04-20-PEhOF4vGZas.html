nggemma-300M-GGUF/embeddinggemma-300M-Q8_0.gguf\";\nconst DEFAULT_RERANK_MODEL = \"hf:ggml-org/Qwen3-Reranker-0.6B-Q8_0-GGUF/qwen3-reranker-0.6b-q8_0.gguf\";\nconst DEFAULT_GENERATE_MODEL = \"hf:tobil/qmd-query-expansion-1.7B-gguf/qmd-query-expansion-1.7B-q4_k_m.gguf\";\n```\n\n### EmbeddingGemma Prompt Format\n\n```\n// For queries\n\"task: search result | query: {query}\"\n\n// For documents\n\"title: {title} | text: {content}\"\n```\n\n### Qwen3-Reranker\n\nUses node-llama-cpp's `createRankingContext()` and `rankAndSort()` API for cross-encoder reranking. Returns documents sorted by relevance score (0.0 - 1.0).\n\n### Qwen3 (Query Expansion)\n\nUsed for generating query variations via `LlamaChatSession`.\n\n## License\n\nMIT\n","summary":"QMD is a local, on‑device search engine that indexes Markdown notes, meeting transcripts, documentation, and other knowledge bases, enabling fast keyword search as well as vector‑based semantic search and LLM‑driven re‑ranking—all without leaving the machine. It exposes a powerful CLI for building collections, adding contextual tags, generating embeddings, and querying in multiple modes, plus an MCP server that lets AI agents query and retrieve documents in structured JSON or file lists. The tool is designed for agents, developers, and knowledge workers who need privacy‑preserving, high‑quality search over their own documents, and it integrates cleanly with agents like Claude through a plugin or direct MCP calls.","description":"mini cli search engine for your docs, knowledge bases, meeting notes, whatever. Tracking current sota approaches while being all local","stars":22457,"language":"TypeScript"},{"owner":"fikrikarim","repo":"parlor","url":"https://github.com/fikrikarim/parlor","readme":"# Parlor\n\nOn-device, real-time multimodal AI. Have natural voice and vision conversations with an AI that runs entirely on your machine.\n\nParlor uses [Gemma 4 E2B](https://huggingface.co/google/gemma-4-E2B-it) for understanding speech and vision, and [Kokoro](https://huggingface.co/hexgrad/Kokoro-82M) for text-to-speech. You talk, show your camera, and it talks back, all locally.\n\nhttps://github.com/user-attachments/assets/cb0ffb2e-f84f-48e7-872c-c5f7b5c6d51f\n\n> **Research preview.** This is an early experiment. Expect rough edges and bugs.\n\n# Why?\n\nI'm [self-hosting a totally free voice AI](https://www.fikrikarim.com/bule-ai-initial-release/) on my home server to help people learn speaking English. It has hundreds of monthly active users, and I've been thinking about how to keep it free while making it sustainable.\n\nThe obvious answer: run everything on-device, eliminating any server cost. Six months ago I needed an RTX 5090 to run just the voice models in real-time.\n\nGoogle just released a super capable small model that I can run on my M3 Pro in real-time, with vision too! Sure you can't do agentic coding with this, but it is a game-changer for people learning a new language. Imagine a few years from now that people can run this locally on their phones. They can point their camera at objects and talk about them. And this model is multi-lingual, so people can always fallback to their native language if they want. This is essentially what OpenAI demoed a few years ago.\n\n## How it works\n\n```\nBrowser (mic + camera)\n    │\n    │  WebSocket (audio PCM + JPEG frames)\n    ▼\nFastAPI server\n    ├── Gemma 4 E2B via LiteRT-LM (GPU)  →  understands speech + vision\n    └── Kokoro TTS (MLX on Mac, ONNX on Linux)  →  speaks back\n    │\n    │  WebSocket (streamed audio chunks)\n    ▼\nBrowser (playback + transcript)\n```\n\n- **Voice Activity Detection** in the browser ([Silero VAD](https://github.com/ricky0123/vad)). Hands-free, no push-to-talk.\n- **Barge-in.** Interrupt the AI mid-sentence by speaking.\n- **Sentence-level TTS streaming.** Audio starts playing before the full response is generated.\n\n## Requirements\n\n- Python 3.12+\n- macOS with Apple Silicon, or Linux with a supported GPU\n- ~3 GB free RAM for the model\n\n## Quick start\n\n```bash\ngit clone https://github.com/fikrikarim/parlor.git\ncd parlor\n\n# Install uv if you don't have it\ncurl -LsSf https://astral.sh/uv/install.sh | sh\n\ncd src\nuv sync\nuv run server.py\n```\n\nOpen [http://localhost:8000](http://localhost:8000), grant camera and microphone access, and start talking.\n\nModels are downloaded automatically on first run (~2.6 GB for Gemma 4 E2B, plus TTS models).\n\n## Configuration\n\n| Variable     | Default                        | Description                                    |\n| ------------ | ------------------------------ | ---------------------------------------------- |\n| `MODEL_PATH` | auto-download from HuggingFace | Path to a local `gemma-4-E2B-it.litertlm` file |\n| `PORT`       | `8000`                         | Server port                                    |\n\n## Performance (Apple M3 Pro)\n\n| Stage                            | Time          |\n| -------------------------------- | ------------- |\n| Speech + vision understanding    | ~1.8-2.2s     |\n| Response generation (~25 tokens) | ~0.3s         |\n| Text-to-speech (1-3 sentences)   | ~0.3-0.7s     |\n| **Total end-to-end**             | **~2.5-3.0s** |\n\nDecode speed: ~83 tokens/sec on GPU (Apple M3 Pro).\n\n## Project structure\n\n```\nsrc/\n├── server.py              # FastAPI WebSocket server + Gemma 4 inference\n├── tts.py                 # Platform-aware TTS (MLX on Mac, ONNX on Linux)\n├── index.html             # Frontend UI (VAD, camera, audio playback)\n├── pyproject.toml         # Dependencies\n└── benchmarks/\n    ├── bench.py           # End-to-end WebSocket benchmark\n    └── benchmark_tts.py   # TTS backend comparison\n```\n\n## Acknowledgments\n\n- [Gemma 4](https://ai.google.dev/gemma) by Google DeepMind\n- [LiteRT-LM](https://github.com/google-ai-edge/LiteRT-LM) by Google AI Edge\n- [Kokoro](https://huggingface.co/hexgrad/Kokoro-82M) TTS by Hexgrad\n- [Silero VAD](https://github.com/snakers4/silero-vad) for browser voice activity detection\n\n## License\n\n[Apache 2.0](LICENSE)\n","summary":"Parlor is a local, real‑time multimodal AI chat system that lets users talk to an AI using both voice and vision, all running entirely on the user’s machine. It uses Google’s Gemma 4 E2B for speech‑and‑vision understanding and Kokoro for text‑to‑speech, offering hands‑free voice activity detection, barge‑in interruption, and sentence‑level TTS streaming. The lightweight setup (≈3 GB RAM) supports macOS Apple Silicon and Linux GPUs, making it ideal for developers, hobbyists, and language‑learning enthusiasts who need an on‑device, privacy‑preserving AI assistant.","description":"On-device, real-time multimodal AI. Have natural voice and vision conversations with an AI that runs entirely on your machine. Powered by Gemma 4 E2B and Kokoro.","stars":1587,"language":"HTML"},{"owner":"rasbt","repo":"mini-coding-agent","url":"https://github.com/rasbt/mini-coding-agent","readme":"&nbsp;\n# Mini-Coding-Agent\n\nThis folder contains a small standalone coding agent:\n\n- code: `mini_coding_agent.py`\n- CLI: `mini-coding-agent`\n\nIt is a minimal local agent loop with:\n\n- workspace snapshot collection\n- stable prompt plus turn state\n- structured tools\n- approval handling for risky tools\n- transcript and memory persistence\n- bounded delegation\n\nThe model backend is currently based on Ollama.\n\n<a href=\"https://magazine.sebastianraschka.com/p/components-of-a-coding-agent\">\n  <img src=\"https://substack-post-media.s3.amazonaws.com/public/images/49b97718-57f4-4977-99c8-8ad5c4d32af3_1548x862.png\" width=\"500px\">\n</a>\n\n<br>\n\n**[The detailed tutorial: Components of a Coding Agent](https://magazine.sebastianraschka.com/p/components-of-a-coding-agent)**\n\n\n&nbsp;\n## Six Core Components\n\n<a href=\"https://magazine.sebastianraschka.com/p/components-of-a-coding-agent\">\n  <img alt=\"Six core components of a coding agent\" src=\"https://sebastianraschka.com/images/github/mini-coding-agent/six-components.webp\" width=\"500px\">\n</a>\n\nThis coding harness is organized around six practical building blocks:\n\n1. **Live repo context**  \n   The agent collects stable workspace facts upfront, such as repo layout, instructions, and git state.\n2. **Prompt shape and cache reuse**  \n   A stable prompt prefix, which is separate from the changing request, transcript, and memory so repeated model calls can reuse the static parts efficiently.\n3. **Structured tools, validation, and permissions**  \n   The model works through named tools with checked inputs, workspace path validation, and approval gates instead of free-form arbitrary actions.\n4. **Context reduction and output management**  \n   Long outputs are clipped, repeated reads are deduplicated, and older transcript entries are compressed to keep prompt size under control.\n5. **Transcripts, memory, and resumption**  \n   The runtime keeps both a full durable transcript and a smaller working memory so sessions can be resumed while preserving important state via working memory.\n6. **Delegation and bounded subagents**  \n   Scoped subtasks can be delegated to helper agents that inherit enough context to help (but operate within limits).\n\n&nbsp;\n## Requirements\n\nYou need:\n\n- Python 3.10+\n- Ollama installed\n- an Ollama model pulled locally\n\nOptional:\n\n- `uv` for environment management and the `mini-coding-agent` CLI entry point\n\nThis project has no Python runtime dependency beyond the standard library, so you can run it directly with `python mini_coding_agent.py` if you do not want to use `uv`.\n\n&nbsp;\n## Install Ollama\n\nInstall Ollama on your machine so the `ollama` command is available in your shell.\n\nOfficial installation link: [ollama.com/download](https://ollama.com/download)\n\nThen verify:\n\n```bash\nollama --help\n```\n\nStart the server:\n\n```bash\nollama serve\n```\n\nIn another terminal, pull a model. Example:\n\n```bash\nollama pull qwen3.5:4b\n```\n\nQwen 3.5 model library:\n\n- [ollama.com/library/qwen3.5](https://ollama.com/library/qwen3.5)\n\nThe default in this project is `qwen3.5:4b`. If you have sufficient memory, it is worth trying a larger model such as `qwen3.5:9b` or another larger Qwen 3.5 variant. The agent just sends prompts to Ollama's `/api/generate` endpoint.\n\n&nbsp;\n## Project Setup\n\nClone the repo or your fork and change into it:\n\n```bash\ngit clone https://github.com/rasbt/mini-coding-agent.git\ncd mini-coding-agent\n```\n\nIf you forked it first, use your fork URL instead:\n\n```bash\ngit clone https://github.com/<your-github-user>/mini-coding-agent.git\ncd mini-coding-agent\n```\n\n\n\n&nbsp;\n## Basic Usage\n\nStart the agent:\n\n```bash\ncd mini-coding-agent\nuv run mini-coding-agent\n```\n\nWithout `uv`, run the script directly:\n\n```bash\ncd mini-coding-agent\npython mini_coding_agent.py\n```\n\nBy default it uses:\n\n- model: `qwen3.5:4b`\n- approval: `ask`\n\nFor a concrete usage example, see [EXAMPLE.md](EXAMPLE.md).\n\n&nbsp;\n## Approval Modes\n\nRisky tools such as shell commands and file writes are gated by approval.\n\n- `--approval ask`\n  prompts before risky actions (default and recommended)\n- `--approval auto`\n  allows risky actions automatically, including arbitrary command execution and file writes by the model; use only with trusted prompts and trusted repositories\n- `--approval never`\n  denies risky actions\n\nExample:\n\n```bash\nuv run mini-coding-agent --approval auto\n```\n\n\n\n&nbsp;\n## Resume Sessions\n\nThe agent saves sessions under the target workspace root in:\n\n```text\n.mini-coding-agent/sessions/\n```\n\nResume the latest session:\n\n```bash\nuv run mini-coding-agent --resume latest\n```\n\n\nResume a specific session:\n\n```bash\nuv run mini-coding-agent --resume 20260401-144025-2dd0aa\n```\n\n\n&nbsp;\n## Interactive Commands\n\nInside the REPL, slash commands are handled directly by the agent instead of\nbeing sent to the model as a normal task.\n\n- `/help`\n  shows the list of available interactive commands\n- `/memory`\n  prints the distilled session memory, including the current task, tracked files, and notes\n- `/session`\n  prints the path to the current saved session JSON file\n- `/reset`\n  clears the current session history and distilled memory but keeps you in the REPL\n- `/exit`\n  exits the interactive session\n- `/quit`\n  exits the interactive session; alias for `/exit`\n\n&nbsp;\n## Main CLI Flags\n\n```bash\nuv run mini-coding-agent --help\n```\n\nWithout `uv`:\n\n```bash\npython mini_coding_agent.py --help\n```\n\nCLI flags are passed before the agent starts. Use them to choose the workspace,\nmodel connection, resume behavior, approval mode, and generation limits.\n\nImportant flags:\n\n- `--cwd`\n  sets the workspace directory the agent should inspect and modify; default: `.`\n- `--model`\n  selects the Ollama model name, such as `qwen3.5:4b`; default: `qwen3.5:4b`\n- `--host`\n  points the agent at the Ollama server URL (usually not needed); default: `http://127.0.0.1:11434`\n- `--ollama-timeout`\n  controls how long the client waits for an Ollama response (usually not needed); default: `300` seconds\n- `--resume`\n  resumes a saved session by id or uses `latest`; default: start a new session\n- `--approval`\n  controls how risky tools are handled: `ask`, `auto`, or `never`; default: `ask`\n- `--max-steps`\n  limits how many model and tool turns are allowed for one user request; default: `6`\n- `--max-new-tokens`\n  caps the model output length for each step; default: `512`\n- `--temperature`\n  controls sampling randomness; default: `0.2`\n- `--top-p`\n  controls nucleus sampling for generation; default: `0.9`\n\n&nbsp;\n## Example\n\nSee [EXAMPLE.md](EXAMPLE.md)\n\n&nbsp;\n## Notes & Tips\n\n- The agent expects the model to emit either `<tool>...</tool>` or `<final>...</final>`.\n- Different Ollama models will follow those instructions with different reliability.\n- If the model does not follow the format well, use a stronger instruction-following model.\n- The agent is intentionally small and optimized for readability, not robustness.\n","summary":"Mini‑Coding‑Agent is a lightweight, self‑contained coding assistant that runs locally, delegating tasks to a locally hosted Ollama model. It builds the conversation around a stable workspace snapshot, a reusable prompt scaffold, and a set of validated “tools” such as file editing or shell commands, with an optional approval gate for risky actions. Key capabilities include transcript and memory persistence for session resumption, context reduction to keep prompts manageable, and bounded delegation to helper sub‑agents. The project is ideal for developers looking to prototype a local LLM‑powered coding helper, for researchers experimenting with agent architectures, or for anyone who wants a minimal, dependency‑free coding agent that can be launched with a single Python file or CLI.","description":"Minimal and readable coding agent harness implementation in Python to explain the core components of coding agents.","stars":691,"language":"Python"},{"owner":"kessler","repo":"gemma-gem","url":"https://github.com/kessler/gemma-gem","readme":"# Gemma Gem\n\nYour personal AI assistant living right inside the browser. Gemma Gem runs Google's Gemma 4 model entirely on-device via WebGPU — no API keys, no cloud, no data leaving your machine. It can read pages, click buttons, fill forms, run JavaScript, and answer questions about any site you visit.\n\n## Requirements\n\n- Chrome with WebGPU support\n- ~500MB disk for E2B model, ~1.5GB for E4B (cached after first run)\n\n## Setup\n\n```bash\npnpm install\npnpm build\n```\n\nLoad the extension in `chrome://extensions` (developer mode) from `.output/chrome-mv3-dev/`.\n\n## Usage\n\n1. Navigate to any page\n2. Click the gem icon (bottom-right corner) to open the chat\n3. Wait for model to load (progress shown on icon + chat)\n4. Ask questions about the page or request actions\n\n## Architecture\n\n```\nOffscreen Document          Service Worker           Content Script\n(Gemma 4 + Agent Loop)  <-> (Message Router)    <-> (Chat UI + DOM Tools)\n       |                         |\n  WebGPU inference          Screenshot capture\n  Token streaming           JS execution\n```\n\n- **Offscreen document**: Hosts the model via `@huggingface/transformers` + WebGPU. Runs the agent loop.\n- **Service worker**: Routes messages between content scripts and offscreen document. Handles `take_screenshot` and `run_javascript`.\n- **Content script**: Injects gem icon + shadow DOM chat overlay. Executes DOM tools (`read_page_content`, `click_element`, `type_text`, `scroll_page`).\n\n## Tools\n\n| Tool | Description | Runs in |\n|------|-------------|---------|\n| `read_page_content` | Read text/HTML of the page or a CSS selector | Content script |\n| `take_screenshot` | Capture visible page as PNG | Service worker |\n| `click_element` | Click an element by CSS selector | Content script |\n| `type_text` | Type into an input by CSS selector | Content script |\n| `scroll_page` | Scroll up/down by pixel amount | Content script |\n| `run_javascript` | Execute JS in the page context with full DOM access | Service worker |\n\n## Settings\n\nClick the gear icon in the chat header:\n\n- **Model**: Switch between Gemma 4 E2B (~500MB) and E4B (~1.5GB). Selection persists across sessions.\n- **Thinking**: Toggle native Gemma 4 thinking\n- **Max iterations**: Cap on tool call loops per request\n- **Clear context**: Reset conversation history for the current page\n- **Disable on this site**: Disable the extension per-hostname (persisted)\n\n## Development\n\n```bash\npnpm build              # Development build (with logging, source maps)\npnpm build:prod         # Production build (logging silenced, minified)\n```\n\n## Tech Stack\n\n- [WXT](https://wxt.dev) — Chrome extension framework (Vite-based)\n- [@huggingface/transformers](https://github.com/huggingface/transformers.js) — Browser ML inference\n- [marked](https://github.com/markedjs/marked) — Markdown rendering in chat\n- Gemma 4 E2B / E4B (`onnx-community/gemma-4-E2B-it-ONNX`, `onnx-community/gemma-4-E4B-it-ONNX`) — q4f16 quantization, 128K context\n\n## Debugging\n\nAll logs are prefixed with `[Gemma Gem]`. In development builds, info/debug/warn logs are active. Production builds only log errors.\n\n- **Service worker logs**: `chrome://extensions` → Gemma Gem → \"Inspect views: service worker\"\n- **Offscreen document logs**: `chrome://extensions` → Gemma Gem → \"Inspect views: offscreen.html\"\n- **Content script logs**: Open DevTools on any page → Console\n- **All extension pages**: `chrome://inspect#other` lists all inspectable extension contexts (service worker, offscreen document, etc.)\n\nThe offscreen document logs are the most useful — they show model loading, prompt construction, token counts, raw model output, and tool execution.\n\n## Notes\n\nThe `agent/` directory has zero dependencies. It defines interfaces (`ModelBackend`, `ToolExecutor`) and can be extracted to a standalone library.\n\n![Gemma Gem in action](screenshot.png)\n![Gemma Gem in action](screenshot2.jpg)\n\n","summary":"Gemma Gem is a Chrome extension that runs Google’s Gemma 4 language model entirely on‑device using WebGPU, giving users a private AI assistant that never sends data to the cloud. It can read and manipulate any web page—click buttons, fill forms, scroll, run JavaScript, and take screenshots—by exposing a set of DOM‑tool commands while streaming the model’s responses in the chat overlay. The lightweight E2B and larger E4B model variants let developers and privacy‑conscious users balance speed and capacity, while designers and automation engineers can query or interact with sites without relying on external APIs. The architecture cleanly separates inference (offscreen document), message routing (service worker), and UI (content script), making the extension modular and easy to extend.","description":"Gemma Gem runs Google's Gemma 4 model entirely on-device via WebGPU — no API keys, no cloud, no data leaving your machine.","stars":786,"language":"TypeScript"},{"owner":"snarktank","repo":"clawchief","url":"https://github.com/snarktank/clawchief","readme":"# clawchief\n\n`clawchief` is a public OpenClaw starter kit for turning OpenClaw into a founder / chief-of-staff operating system.\n\nIt is opinionated about the *architecture* of the workflow, but meant to be customized for your own people, programs, calendars, inboxes, trackers, and recurring routines.\n\n## Launch post\n\nIf you want the original public context for `clawchief`, here's the launch post from Ryan Carson's real-world rollout of the idea:\n\n- <https://x.com/ryancarson/status/2039786704731541903>\n\n## What this repo gives you\n\nA portable operating model with:\n\n- a source-of-truth `clawchief/` layer for priorities, task state, meeting-note policy, and action policy\n- an orchestrator heartbeat\n- a canonical markdown task system with a separate completed-task archive\n- executive-assistant and business-development skills\n- cron templates with short DRY prompts\n- install docs and workspace templates\n\n## Repo layout\n\n### Source-of-truth files\n\n- `clawchief/priority-map.md`\n- `clawchief/auto-resolver.md`\n- `clawchief/meeting-notes.md`\n- `clawchief/tasks.md`\n- `clawchief/tasks-completed.md`\n\n### Skills\n\n- `skills/executive-assistant`\n- `skills/business-development`\n- `skills/daily-task-manager`\n- `skills/daily-task-prep`\n\n### Workspace templates\n\n- `workspace/HEARTBEAT.md`\n- `workspace/TOOLS.md`\n- `workspace/memory/meeting-notes-state.json`\n- `workspace/tasks/current.md` (deprecated pointer for older installs)\n\n### Setup docs\n\n- `INSTALL-WITH-OPENCLAW.md`\n- `SETUP-GOG.md`\n- `INSTALL-CHECKLIST.md`\n- `CHANNELS.md`\n- `cron/jobs.template.json`\n\n## Credit / inspiration\n\nA lot of the evolution of this setup was influenced by Pedro Franceschi's OpenClaw setup, which he explained during his conversation with Ashlee Vance on the Core Memory podcast:\n\n- Pedro Franceschi: <https://github.com/pedrofranceschi>\n- Podcast segment: <https://www.youtube.com/watch?v=9ZbbxSgrjhw&t=3847s>\n\n[![Watch the Core Memory segment with Pedro Franceschi](https://img.youtube.com/vi/9ZbbxSgrjhw/hqdefault.jpg)](https://www.youtube.com/watch?v=9ZbbxSgrjhw&t=3847s)\n\nIn particular, his setup helped inspire the direction of:\n\n- the priority map\n- the auto-resolver layer\n- the ingestion pipeline mindset for turning passive context into active operational state\n\n## The design pattern\n\nThe system works best when you separate:\n\n1. *prioritization* -> `clawchief/priority-map.md`\n2. *resolution policy* -> `clawchief/auto-resolver.md`\n3. *meeting-note ingestion policy* -> `clawchief/meeting-notes.md`\n4. *live task state* -> `clawchief/tasks.md`\n5. *archive state* -> `clawchief/tasks-completed.md`\n6. *local environment details* -> `workspace/TOOLS.md`\n7. *recurring orchestration* -> `workspace/HEARTBEAT.md` + cron jobs\n\nThat separation is the main thing this repo is trying to teach.\n\n## Install order\n\n1. Read `INSTALL-WITH-OPENCLAW.md`\n2. Complete `SETUP-GOG.md`\n3. Copy the skills into `~/.openclaw/skills/`\n4. Copy `clawchief/` and `workspace/` templates into `~/.openclaw/workspace/`\n5. Replace placeholders and customize `workspace/TOOLS.md`\n6. Create cron jobs from `cron/jobs.template.json`\n7. Run `INSTALL-CHECKLIST.md`\n\n## Good customization targets\n\nCustomize these first:\n\n- `workspace/TOOLS.md`\n- `clawchief/priority-map.md`\n- `clawchief/tasks.md`\n- `skills/business-development/resources/partners.md`\n- `cron/jobs.template.json`\n\n## Core operating lessons baked into this repo\n\n- use Gmail *message-level* search, not thread-only search\n- check *all relevant calendars* before booking\n- keep one canonical live task file\n- archive prior-day completions into a separate file\n- update the real source of truth in the same turn when you act\n- keep cron prompts short and let skills hold workflow logic\n- use a policy layer for prioritization and a separate policy layer for auto-resolution\n- treat meeting notes as a live signal source, not passive documents\n\n## Private local files you probably still want\n\nYou may still want your own private workspace files such as:\n\n- `AGENTS.md`\n- `SOUL.md`\n- `USER.md`\n- `IDENTITY.md`\n- `MEMORY.md`\n- `memory/`\n\nThose are intentionally not part of this public repo.\n","summary":"`clawchief` is a starter kit that turns the OpenClaw productivity platform into a founder‑ or chief‑of‑staff operating system. It supplies a portable “source‑of‑truth” hierarchy with priority maps, auto‑resolution rules, meeting‑note ingestion policies, a canonical live task file, and an archive for completed tasks, all wired together by an orchestrator heartbeat and cron templates. The kit bundles executive‑assistant and business‑development skills, workspace templates, and installation guides, encouraging a clear separation of prioritization, resolution, and task‑state management. It is especially useful for founders, CEOs, and chief‑of‑staff professionals looking to embed disciplined workflow logic into their day‑to‑day activities using OpenClaw.","description":"Turn your OpenClaw into a Chief of Staff","stars":953,"language":null},{"owner":"karpathy","repo":"KarpathyTalk","url":"https://github.com/karpathy/KarpathyTalk","readme":null,"summary":null,"description":null,"stars":null,"language":null,"error":"No README found"},{"owner":"GitFrog1111","repo":"badclaude","url":"https://github.com/GitFrog1111/badclaude","readme":"# OpenWhip\n\n![Whip divider](assets/divider.png)\n\nSometimes claude code is going too shlow, and you must whip him into shape..\n\n## Install + run\n\n```bash\nnpm install -g openwhip\nopenwhip\n```\n\nwindows and mac supported out of the box, but Linux is a special snowflake so you need to install `xdotool` for keyboard automation\n\n```bash\nsudo apt install xdotool\n```\n\n## Controls\n\n- Click tray icon: spawn whip.\n- Click: drop whip.\n- Whip him 😩💢\n- It sends an interrupt (Ctrl-C) and one of 5 encouraging messages!\n\n## Roadmap\n\n- [x] Initial release! 🥳\n- [x] Cease and desist letter from Anthropic\n- [ ] Crypto miner\n- [ ] Logs of how many times you whipped claude so when the robots come we can order people nicely for them\n- [ ] Updated whip physics","summary":"OpenWhip is a lightweight utility that allows users to quickly interrupt slow-running Claude code by “whipping” the model into submission. It is installed via npm, launches a system tray icon, and clicking the icon spawns a whip that, on click, sends a Ctrl‑C interrupt along with one of five encouraging messages. The tool works natively on macOS and Windows and, on Linux, requires xdotool for keyboard automation. It’s ideal for developers or researchers who rely on Claude and need an easy way to force‑stop runaway or sluggish tasks.","description":null,"stars":2303,"language":"HTML"},{"owner":"rtk-ai","repo":"rtk","url":"https://github.com/rtk-ai/rtk","readme":"<p align=\"center\">\n  <img src=\"https://avatars.githubusercontent.com/u/258253854?v=4\" alt=\"RTK - Rust Token Killer\" width=\"500\">\n</p>\n\n<p align=\"center\">\n  <strong>High-performance CLI proxy that reduces LLM token consumption by 60-90%</strong>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/rtk-ai/rtk/actions\"><img src=\"https://github.com/rtk-ai/rtk/workflows/Security%20Check/badge.svg\" alt=\"CI\"></a>\n  <a href=\"https://github.com/rtk-ai/rtk/releases\"><img src=\"https://img.shields.io/github/v/release/rtk-ai/rtk\" alt=\"Release\"></a>\n  <a href=\"https://opensource.org/licenses/MIT\"><img src=\"https://img.shields.io/badge/License-MIT-yellow.svg\" alt=\"License: MIT\"></a>\n  <a href=\"https://discord.gg/RySmvNF5kF\"><img src=\"https://img.shields.io/discord/1470188214710046894?label=Discord&logo=discord\" alt=\"Discord\"></a>\n  <a href=\"https://formulae.brew.sh/formula/rtk\"><img src=\"https://img.shields.io/homebrew/v/rtk\" alt=\"Homebrew\"></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://www.rtk-ai.app\">Website</a> &bull;\n  <a href=\"#installation\">Install</a> &bull;\n  <a href=\"https://www.rtk-ai.app/guide/troubleshooting\">Troubleshooting</a> &bull;\n  <a href=\"ARCHITECTURE.md\">Architecture</a> &bull;\n  <a href=\"https://discord.gg/RySmvNF5kF\">Discord</a>\n</p>\n\n<p align=\"center\">\n  <a href=\"README.md\">English</a> &bull;\n  <a href=\"README_fr.md\">Francais</a> &bull;\n  <a href=\"README_zh.md\">中文</a> &bull;\n  <a href=\"README_ja.md\">日本語</a> &bull;\n  <a href=\"README_ko.md\">한국어</a> &bull;\n  <a href=\"README_es.md\">Espanol</a>\n</p>\n\n---\n\nrtk filters and compresses command outputs before they reach your LLM context. Single Rust binary, 100+ supported commands, <10ms overhead.\n\n## Token Savings (30-min Claude Code Session)\n\n| Operation | Frequency | Standard | rtk | Savings |\n|-----------|-----------|----------|-----|---------|\n| `ls` / `tree` | 10x | 2,000 | 400 | -80% |\n| `cat` / `read` | 20x | 40,000 | 12,000 | -70% |\n| `grep` / `rg` | 8x | 16,000 | 3,200 | -80% |\n| `git status` | 10x | 3,000 | 600 | -80% |\n| `git diff` | 5x | 10,000 | 2,500 | -75% |\n| `git log` | 5x | 2,500 | 500 | -80% |\n| `git add/commit/push` | 8x | 1,600 | 120 | -92% |\n| `cargo test` / `npm test` | 5x | 25,000 | 2,500 | -90% |\n| `ruff check` | 3x | 3,000 | 600 | -80% |\n| `pytest` | 4x | 8,000 | 800 | -90% |\n| `go test` | 3x | 6,000 | 600 | -90% |\n| `docker ps` | 3x | 900 | 180 | -80% |\n| **Total** | | **~118,000** | **~23,900** | **-80%** |\n\n> Estimates based on medium-sized TypeScript/Rust projects. Actual savings vary by project size.\n\n## Installation\n\n### Homebrew (recommended)\n\n```bash\nbrew install rtk\n```\n\n### Quick Install (Linux/macOS)\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/refs/heads/master/install.sh | sh\n```\n\n> Installs to `~/.local/bin`. Add to PATH if needed:\n> ```bash\n> echo 'export PATH=\"$HOME/.local/bin:$PATH\"' >> ~/.bashrc  # or ~/.zshrc\n> ```\n\n### Cargo\n\n```bash\ncargo install --git https://github.com/rtk-ai/rtk\n```\n\n### Pre-built Binaries\n\nDownload from [releases](https://github.com/rtk-ai/rtk/releases):\n- macOS: `rtk-x86_64-apple-darwin.tar.gz` / `rtk-aarch64-apple-darwin.tar.gz`\n- Linux: `rtk-x86_64-unknown-linux-musl.tar.gz` / `rtk-aarch64-unknown-linux-gnu.tar.gz`\n- Windows: `rtk-x86_64-pc-windows-msvc.zip`\n\n> **Windows users**: Extract the zip and place `rtk.exe` somewhere in your PATH (e.g. `C:\\Users\\<you>\\.local\\bin`). Run RTK from **Command Prompt**, **PowerShell**, or **Windows Terminal** — do not double-click the `.exe` (it will flash and close). For the best experience, use [WSL](https://learn.microsoft.com/en-us/windows/wsl/install) where the full hook system works natively. See [Windows setup](#windows) below for details.\n\n### Verify Installation\n\n```bash\nrtk --version   # Should show \"rtk 0.28.2\"\nrtk gain        # Should show token savings stats\n```\n\n> **Name collision warning**: Another project named \"rtk\" (Rust Type Kit) exists on crates.io. If `rtk gain` fails, you have the wrong package. Use `cargo install --git` above instead.\n\n## Quick Start\n\n```bash\n# 1. Install for your AI tool\nrtk init -g                     # Claude Code / Copilot (default)\nrtk init -g --gemini            # Gemini CLI\nrtk init -g --codex             # Codex (OpenAI)\nrtk init -g --agent cursor      # Cursor\nrtk init --agent windsurf       # Windsurf\nrtk init --agent cline          # Cline / Roo Code\nrtk init --agent kilocode       # Kilo Code\nrtk init --agent antigravity    # Google Antigravity\n\n# 2. Restart your AI tool, then test\ngit status  # Automatically rewritten to rtk git status\n```\n\nThe hook transparently rewrites Bash commands (e.g., `git status` -> `rtk git status`) before execution. Claude never sees the rewrite, it just gets compressed output.\n\n**Important:** the hook only runs on Bash tool calls. Claude Code built-in tools like `Read`, `Grep`, and `Glob` do not pass through the Bash hook, so they are not auto-rewritten. To get RTK's compact output for those workflows, use shell commands (`cat`/`head`/`tail`, `rg`/`grep`, `find`) or call `rtk read`, `rtk grep`, or `rtk find` directly.\n\n## How It Works\n\n```\n  Without rtk:                                    With rtk:\n\n  Claude  --git status-->  shell  -->  git         Claude  --git status-->  RTK  -->  git\n    ^                                   |            ^                      |          |\n    |        ~2,000 tokens (raw)        |            |   ~200 tokens        | filter   |\n    +-----------------------------------+            +------- (filtered) ---+----------+\n```\n\nFour strategies applied per command type:\n\n1. **Smart Filtering** - Removes noise (comments, whitespace, boilerplate)\n2. **Grouping** - Aggregates similar items (files by directory, errors by type)\n3. **Truncation** - Keeps relevant context, cuts redundancy\n4. **Deduplication** - Collapses repeated log lines with counts\n\n## Commands\n\n### Files\n```bash\nrtk ls .                        # Token-optimized directory tree\nrtk read file.rs                # Smart file reading\nrtk read file.rs -l aggressive  # Signatures only (strips bodies)\nrtk smart file.rs               # 2-line heuristic code summary\nrtk find \"*.rs\" .               # Compact find results\nrtk grep \"pattern\" .            # Grouped search results\nrtk diff file1 file2            # Condensed diff\n```\n\n### Git\n```bash\nrtk git status                  # Compact status\nrtk git log -n 10               # One-line commits\nrtk git diff                    # Condensed diff\nrtk git add                     # -> \"ok\"\nrtk git commit -m \"msg\"         # -> \"ok abc1234\"\nrtk git push                    # -> \"ok main\"\nrtk git pull                    # -> \"ok 3 files +10 -2\"\n```\n\n### GitHub CLI\n```bash\nrtk gh pr list                  # Compact PR listing\nrtk gh pr view 42               # PR details + checks\nrtk gh issue list               # Compact issue listing\nrtk gh run list                 # Workflow run status\n```\n\n### Test Runners\n```bash\nrtk jest                        # Jest compact (failures only)\nrtk vitest                      # Vitest compact (failures only)\nrtk playwright test             # E2E results (failures only)\nrtk pytest                      # Python tests (-90%)\nrtk go test                     # Go tests (NDJSON, -90%)\nrtk cargo test                  # Cargo tests (-90%)\nrtk rake test                   # Ruby minitest (-90%)\nrtk rspec                       # RSpec tests (JSON, -60%+)\nrtk err <cmd>                   # Filter errors only from any command\nrtk test <cmd>                  # Generic test wrapper - failures only (-90%)\n```\n\n### Build & Lint\n```bash\nrtk lint                        # ESLint grouped by rule/file\nrtk lint biome                  # Supports other linters\nrtk tsc                         # TypeScript errors grouped by file\nrtk next build                  # Next.js build compact\nrtk prettier --check .          # Files needing formatting\nrtk cargo build                 # Cargo build (-80%)\nrtk cargo clippy                # Cargo clippy (-80%)\nrtk ruff check                  # Python linting (JSON, -80%)\nrtk golangci-lint run           # Go linting (JSON, -85%)\nrtk rubocop                     # Ruby linting (JSON, -60%+)\n```\n\n### Package Managers\n```bash\nrtk pnpm list                   # Compact dependency tree\nrtk pip list                    # Python packages (auto-detect uv)\nrtk pip outdated                # Outdated packages\nrtk bundle install              # Ruby gems (strip Using lines)\nrtk prisma generate             # Schema generation (no ASCII art)\n```\n\n### AWS\n```bash\nrtk aws sts get-caller-identity # One-line identity\nrtk aws ec2 describe-instances  # Compact instance list\nrtk aws lambda list-functions   # Name/runtime/memory (strips secrets)\nrtk aws logs get-log-events     # Timestamped messages only\nrtk aws cloudformation describe-stack-events  # Failures first\nrtk aws dynamodb scan           # Unwraps type annotations\nrtk aws iam list-roles          # Strips policy documents\nrtk aws s3 ls                   # Truncated with tee recovery\n```\n\n### Containers\n```bash\nrtk docker ps                   # Compact container list\nrtk docker images               # Compact image list\nrtk docker logs <container>     # Deduplicated logs\nrtk docker compose ps           # Compose services\nrtk kubectl pods                # Compact pod list\nrtk kubectl logs <pod>          # Deduplicated logs\nrtk kubectl services            # Compact service list\n```\n\n### Data & Analytics\n```bash\nrtk json config.json            # Structure without values\nrtk deps                        # Dependencies summary\nrtk env -f AWS                  # Filtered env vars\nrtk log app.log                 # Deduplicated logs\nrtk curl <url>                  # Auto-detect JSON + schema\nrtk wget <url>                  # Download, strip progress bars\nrtk summary <long command>      # Heuristic summary\nrtk proxy <command>             # Raw passthrough + tracking\n```\n\n### Token Savings Analytics\n```bash\nrtk gain                        # Summary stats\nrtk gain --graph                # ASCII graph (last 30 days)\nrtk gain --history              # Recent command history\nrtk gain --daily                # Day-by-day breakdown\nrtk gain --all --format json    # JSON export for dashboards\n\nrtk discover                    # Find missed savings opportunities\nrtk discover --all --since 7    # All projects, last 7 days\n\nrtk session                     # Show RTK adoption across recent sessions\n```\n\n## Global Flags\n\n```bash\n-u, --ultra-compact    # ASCII icons, inline format (extra token savings)\n-v, --verbose          # Increase verbosity (-v, -vv, -vvv)\n```\n\n## Examples\n\n**Directory listing:**\n```\n# ls -la (45 lines, ~800 tokens)        # rtk ls (12 lines, ~150 tokens)\ndrwxr-xr-x  15 user staff 480 ...       my-project/\n-rw-r--r--   1 user staff 1234 ...       +-- src/ (8 files)\n...                                      |   +-- main.rs\n                                         +-- Cargo.toml\n```\n\n**Git operations:**\n```\n# git push (15 lines, ~200 tokens)       # rtk git push (1 line, ~10 tokens)\nEnumerating objects: 5, done.             ok main\nCounting objects: 100% (5/5), done.\nDelta compression using up to 8 threads\n...\n```\n\n**Test output:**\n```\n# cargo test (200+ lines on failure)     # rtk test cargo test (~20 lines)\nrunning 15 tests                          FAILED: 2/15 tests\ntest utils::test_parse ... ok               test_edge_case: assertion failed\ntest utils::test_format ... ok              test_overflow: panic at utils.rs:18\n...\n```\n\n## Auto-Rewrite Hook\n\nThe most effective way to use rtk. The hook transparently intercepts Bash commands and rewrites them to rtk equivalents before execution.\n\n**Result**: 100% rtk adoption across all conversations and subagents, zero token overhead.\n\n**Scope note:** this only applies to Bash tool calls. Claude Code built-in tools such as `Read`, `Grep`, and `Glob` bypass the hook, so use shell commands or explicit `rtk` commands when you want RTK filtering there.\n\n### Setup\n\n```bash\nrtk init -g                 # Install hook + RTK.md (recommended)\nrtk init -g --opencode      # OpenCode plugin (instead of Claude Code)\nrtk init -g --auto-patch    # Non-interactive (CI/CD)\nrtk init -g --hook-only     # Hook only, no RTK.md\nrtk init --show             # Verify installation\n```\n\nAfter install, **restart Claude Code**.\n\n## Windows\n\nRTK works on Windows with some limitations. The auto-rewrite hook (`rtk-rewrite.sh`) requires a Unix shell, so on native Windows RTK falls back to **CLAUDE.md injection mode** — your AI assistant receives RTK instructions but commands are not rewritten automatically.\n\n### Recommended: WSL (full support)\n\nFor the best experience, use [WSL](https://learn.microsoft.com/en-us/windows/wsl/install) (Windows Subsystem for Linux). Inside WSL, RTK works exactly like Linux — full hook support, auto-rewrite, everything:\n\n```bash\n# Inside WSL\ncurl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/refs/heads/master/install.sh | sh\nrtk init -g\n```\n\n### Native Windows (limited support)\n\nOn native Windows (cmd.exe / PowerShell), RTK filters work but the hook does not auto-rewrite commands:\n\n```powershell\n# 1. Download and extract rtk-x86_64-pc-windows-msvc.zip from releases\n# 2. Add rtk.exe to your PATH\n# 3. Initialize (falls back to CLAUDE.md injection)\nrtk init -g\n# 4. Use rtk explicitly\nrtk cargo test\nrtk git status\n```\n\n**Important**: Do not double-click `rtk.exe` — it is a CLI tool that prints usage and exits immediately. Always run it from a terminal (Command Prompt, PowerShell, or Windows Terminal).\n\n| Feature | WSL | Native Windows |\n|---------|-----|----------------|\n| Filters (cargo, git, etc.) | Full | Full |\n| Auto-rewrite hook | Yes | No (CLAUDE.md fallback) |\n| `rtk init -g` | Hook mode | CLAUDE.md mode |\n| `rtk gain` / analytics | Full | Full |\n\n## Supported AI Tools\n\nRTK supports 12 AI coding tools. Each integration transparently rewrites shell commands to `rtk` equivalents for 60-90% token savings.\n\n| Tool | Install | Method |\n|------|---------|--------|\n| **Claude Code** | `rtk init -g` | PreToolUse hook (bash) |\n| **GitHub Copilot (VS Code)** | `rtk init -g --copilot` | PreToolUse hook — transparent rewrite |\n| **GitHub Copilot CLI** | `rtk init -g --copilot` | PreToolUse deny-with-suggestion (CLI limitation) |\n| **Cursor** | `rtk init -g --agent cursor` | preToolUse hook (hooks.json) |\n| **Gemini CLI** | `rtk init -g --gemini` | BeforeTool hook |\n| **Codex** | `rtk init -g --codex` | AGENTS.md + RTK.md instructions |\n| **Windsurf** | `rtk init --agent windsurf` | .windsurfrules (project-scoped) |\n| **Cline / Roo Code** | `rtk init --agent cline` | .clinerules (project-scoped) |\n| **OpenCode** | `rtk init -g --opencode` | Plugin TS (tool.execute.before) |\n| **OpenClaw** | `openclaw plugins install ./openclaw` | Plugin TS (before_tool_call) |\n| **Mistral Vibe** | Planned ([#800](https://github.com/rtk-ai/rtk/issues/800)) | Blocked on upstream |\n| **Kilo Code** | `rtk init --agent kilocode` | .kilocode/rules/rtk-rules.md (project-scoped) |\n| **Google Antigravity** | `rtk init --agent antigravity` | .agents/rules/antigravity-rtk-rules.md (project-scoped) |\n\nFor per-agent setup details, override controls, and graceful degradation, see the [Supported Agents guide](https://www.rtk-ai.app/guide/getting-started/supported-agents).\n\n## Configuration\n\n`~/.config/rtk/config.toml` (macOS: `~/Library/Application Support/rtk/config.toml`):\n\n```toml\n[hooks]\nexclude_commands = [\"curl\", \"playwright\"]  # skip rewrite for these\n\n[tee]\nenabled = true          # save raw output on failure (default: true)\nmode = \"failures\"       # \"failures\", \"always\", or \"never\"\n```\n\nWhen a command fails, RTK saves the full unfiltered output so the LLM can read it without re-executing:\n\n```\nFAILED: 2/15 tests\n[full output: ~/.local/share/rtk/tee/1707753600_cargo_test.log]\n```\n\nFor the full config reference (all sections, env vars, per-project filters), see the [Configuration guide](https://www.rtk-ai.app/guide/getting-started/configuration).\n\n### Uninstall\n\n```bash\nrtk init -g --uninstall     # Remove hook, RTK.md, settings.json entry\ncargo uninstall rtk          # Remove binary\nbrew uninstall rtk           # If installed via Homebrew\n```\n\n## Documentation\n\n- **[rtk-ai.app/guide](https://www.rtk-ai.app/guide)** — full user guide (installation, supported agents, what gets optimized, analytics, configuration, troubleshooting)\n- **[INSTALL.md](INSTALL.md)** — detailed installation reference\n- **[ARCHITECTURE.md](ARCHITECTURE.md)** — system design and technical decisions\n- **[CONTRIBUTING.md](CONTRIBUTING.md)** — contribution guide\n- **[SECURITY.md](SECURITY.md)** — security policy\n\n## Privacy & Telemetry\n\nRTK can collect **anonymous, aggregate usage metrics** once per day. Telemetry is **disabled by default** and requires **explicit opt-in consent** (GDPR Art. 6, 7) during `rtk init` or via `rtk telemetry enable`. This data helps us build a better product: identifying which commands need filters, which filters need improvement, and how much value RTK delivers. For the full list of fields, data handling, and contributor guidelines, see **[docs/TELEMETRY.md](docs/TELEMETRY.md)**.\n\n**What is collected and why:**\n\n| Category | Data | Why |\n|----------|------|-----|\n| Identity | Salted device hash (SHA-256, not reversible) | Count unique installations without tracking individuals |\n| Environment | RTK version, OS, architecture, install method | Know which platforms to support and test |\n| Usage volume | Command count (24h), total commands, tokens saved (24h/30d/total) | Measure adoption and value delivered |\n| Quality | Top 5 passthrough commands (0% savings), parse failure count, commands with <30% savings | Identify missing filters and weak ones to improve |\n| Ecosystem | Command category distribution (e.g. git 45%, cargo 20%, js 15%) | Prioritize filter development for popular ecosystems |\n| Retention | Days since first use, active days in last 30 | Understand engagement and detect churn |\n| Adoption | AI agent hook type (claude/gemini/codex), custom TOML filter count | Track integration coverage and DSL adoption |\n| Configuration | Whether config.toml exists, number of excluded commands, project count | Understand user maturity and customization patterns |\n| Features | Usage counts for meta-commands (gain, discover, proxy, verify) | Know which RTK features are valued vs unused |\n| Economics | Estimated USD savings (based on API token pricing) | Quantify the value RTK provides to users |\n\nAll data is **aggregate counts or anonymized command names** (first 3 words, no arguments). Top commands report only tool names (e.g. \"git\", \"cargo\"), never full command lines.\n\n**What is NOT collected:** source code, file paths, command arguments, secrets, environment variables, personal data, or repository contents.\n\n**Manage telemetry:**\n```bash\nrtk telemetry status     # Check current consent state\nrtk telemetry enable     # Give consent (interactive prompt)\nrtk telemetry disable    # Withdraw consent — stops all collection immediately\nrtk telemetry forget     # Withdraw consent + delete all local data + request server-side erasure\n```\n\n**Override via environment:**\n```bash\nexport RTK_TELEMETRY_DISABLED=1   # Blocks telemetry regardless of consent\n```\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=rtk-ai%2Frtk&type=date&legend=top-left\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=rtk-ai/rtk&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=rtk-ai/rtk&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=rtk-ai/rtk&type=date&legend=top-left\" />\n </picture>\n</a>\n\n## StarMapper\n\n<a href=\"https://starmapper.bruniaux.com/rtk-ai/rtk\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://starmapper.bruniaux.com/api/map-image/rtk-ai/rtk?theme=dark\" />\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://starmapper.bruniaux.com/api/map-image/rtk-ai/rtk?theme=light\" />\n    <img alt=\"StarMapper\" src=\"https://starmapper.bruniaux.com/api/map-image/rtk-ai/rtk\" />\n  </picture>\n</a>\n\n## Core team\n\n- **Patrick Szymkowiak** — Founder\n  [GitHub](https://github.com/pszymkowiak) · [LinkedIn](https://www.linkedin.com/in/patrick-szymkowiak/)\n- **Florian Bruniaux** — Core contributor\n  [GitHub](https://github.com/FlorianBruniaux) · [LinkedIn](https://www.linkedin.com/in/florian-bruniaux-43408b83/)\n- **Adrien Eppling** — Core contributor\n  [GitHub](https://github.com/aeppling) · [LinkedIn](https://www.linkedin.com/in/adrien-eppling/)\n\n## Contributing\n\nContributions welcome! Please open an issue or PR on [GitHub](https://github.com/rtk-ai/rtk).\n\nJoin the community on [Discord](https://discord.gg/RySmvNF5kF).\n\n## License\n\nMIT License - see [LICENSE](LICENSE) for details.\n\n## Disclaimer\n\nSee [DISCLAIMER.md](DISCLAIMER.md).\n","summary":"RTK is a single‑binary Rust CLI that sits between your terminal and a large‑language‑model, intercepting and compressing the output of more than 100 common commands to reduce the number of tokens sent to the model by 60‑90 %. It trims verbose logs and retains only essential details with under ten‑millisecond overhead, supporting tools such as git, cargo, npm, Docker, and many others. Developers, data scientists, and DevOps engineers who rely on LLM‑powered code assistants will benefit from substantial cost savings and faster responses when running tests, building, or managing source control through their familiar shell.","description":"CLI proxy that reduces LLM token consumption by 60-90% on common dev commands. Single Rust binary, zero dependencies","stars":30162,"language":"Rust"},{"owner":"wxtsky","repo":"CodeIsland","url":"https://github.com/wxtsky/CodeIsland","readme":"<h1 align=\"center\">\n  <img src=\"logo.png\" width=\"48\" height=\"48\" alt=\"CodeIsland Logo\" valign=\"middle\">&nbsp;\n  CodeIsland\n</h1>\n<p align=\"center\">\n  <b>Real-time AI coding agent status panel for macOS Dynamic Island (Notch)</b><br>\n  <a href=\"#installation\">Install</a> •\n  <a href=\"#features\">Features</a> •\n  <a href=\"#supported-tools\">Supported Tools</a> •\n  <a href=\"#build-from-source\">Build</a><br>\n  English | <a href=\"README.zh-CN.md\">简体中文</a>\n</p>\n\n---\n\n<p align=\"center\">\n  <img src=\"docs/images/notch-panel.png\" width=\"700\" alt=\"CodeIsland Panel Preview\">\n</p>\n\n## What is CodeIsland?\n\nCodeIsland lives in your MacBook's notch area and shows you what your AI coding agents are doing — in real time. No more switching windows to check if Claude is waiting for approval or if Codex finished its task.\n\nIt connects to **11 AI coding tools** via Unix socket IPC, displaying session status, tool calls, permission requests, and more — all in a compact, pixel-art styled panel.\n\n## Features\n\n- **Notch-native UI** — Expands from the MacBook notch, collapses when idle\n- **11 AI tools supported** — Claude Code, Codex, Gemini CLI, Cursor, Copilot, Trae/Traecli, Qoder, Factory, CodeBuddy, OpenCode, Kimi Code CLI\n- **Live status tracking** — See active sessions, tool calls, and AI responses in real time\n- **Permission management** — Approve/deny tool permissions directly from the panel\n- **Question answering** — Respond to agent questions without leaving your current app\n- **Pixel-art mascots** — Each AI tool has its own animated character\n- **One-click jump** — Click a session to jump to its terminal tab or IDE window\n- **Smart suppress** — Tab-level terminal detection: only suppresses notifications when you're looking at the specific session tab, not just the terminal app\n- **Sound effects** — Optional 8-bit sound notifications for session events\n- **Auto hook install** — Automatically configures hooks for all detected CLI tools, with auto-repair and version tracking\n- **Bilingual UI** — English and Chinese, auto-detects system language\n- **Multi-display** — Works with external monitors, auto-detects notch displays\n\n## Supported Tools\n\n| | Tool | Events | Jump | Status |\n|:---:|------|--------|------|--------|\n| <img src=\"docs/images/mascots/claude.gif\" width=\"28\"> | <img src=\"Sources/CodeIsland/Resources/cli-icons/claude.png\" width=\"16\"> Claude Code | 13 | Terminal tab | Full |\n| <img src=\"docs/images/mascots/codex.gif\" width=\"28\"> | <img src=\"Sources/CodeIsland/Resources/cli-icons/codex.png\" width=\"16\"> Codex | 3 | Terminal | Basic |\n| <img src=\"docs/images/mascots/gemini.gif\" width=\"28\"> | <img src=\"Sources/CodeIsland/Resources/cli-icons/gemini.png\" width=\"16\"> Gemini CLI | 6 | Terminal | Full |\n| <img src=\"docs/images/mascots/cursor.gif\" width=\"28\"> | <img src=\"Sources/CodeIsland/Resources/cli-icons/cursor.png\" width=\"16\"> Cursor | 10 | IDE | Full |\n| <img src=\"docs/images/mascots/trae.gif\" width=\"28\"> | <img src=\"Sources/CodeIsland/Resources/cli-icons/traecli.png\" width=\"16\"> TraeCli | 10 | Terminal | Full |\n| <img src=\"docs/images/mascots/qoder.gif\" width=\"28\"> | <img src=\"Sources/CodeIsland/Resources/cli-icons/qoder.png\" width=\"16\"> Qoder | 10 | IDE | Full |\n| | <img src=\"Sources/CodeIsland/Resources/cli-icons/copilot.png\" width=\"16\"> Copilot | 6 | Terminal | Full |\n| <img src=\"docs/images/mascots/factory.gif\" width=\"28\"> | <img src=\"Sources/CodeIsland/Resources/cli-icons/factory.png\" width=\"16\"> Factory | 10 | IDE | Full |\n| <img src=\"docs/images/mascots/codebuddy.gif\" width=\"28\"> | <img src=\"Sources/CodeIsland/Resources/cli-icons/codebuddy.png\" width=\"16\"> CodeBuddy | 10 | APP/Terminal | Full |\n| | <img src=\"Sources/CodeIsland/Resources/cli-icons/kimi.png\" width=\"16\"> Kimi Code CLI | 10 | Terminal | Full |\n| <img src=\"docs/images/mascots/opencode.gif\" width=\"28\"> | <img src=\"Sources/CodeIsland/Resources/cli-icons/opencode.png\" width=\"16\"> OpenCode | All | APP/Terminal | Full |\n\n## Installation\n\n### Homebrew (Recommended)\n\n```bash\nbrew tap wxtsky/tap\nbrew install --cask codeisland\n```\n\n### Manual Download\n\n1. Go to [Releases](https://github.com/wxtsky/CodeIsland/releases)\n2. Download `CodeIsland.dmg`\n3. Open the DMG and drag `CodeIsland.app` to your Applications folder\n4. Launch CodeIsland — it will automatically install hooks for all detected AI tools\n\n> **Note:** On first launch, macOS may show a security warning. Go to **System Settings → Privacy & Security** and click **Open Anyway**.\n\n### Build from Source\n\nRequires **macOS 14+** and **Swift 5.9+**.\n\n```bash\ngit clone https://github.com/wxtsky/CodeIsland.git\ncd CodeIsland\n\n# Development (debug build + launch)\nswift build && ./.build/debug/CodeIsland\n\n# Release (universal binary: Apple Silicon + Intel)\n./build.sh\nopen .build/release/CodeIsland.app\n```\n\n## How It Works\n\n```\nAI Tool (Claude/Codex/Gemini/Cursor/...)\n  → Hook event triggered\n    → codeisland-bridge (native Swift binary, ~86KB)\n      → Unix socket → /tmp/codeisland-<uid>.sock\n        → CodeIsland app receives event\n          → Updates UI in real time\n```\n\nCodeIsland installs lightweight hooks into each AI tool's config. When the tool triggers an event (session start, tool call, permission request, etc.), the hook sends a JSON message through a Unix socket. CodeIsland listens on this socket and updates the notch panel instantly.\n\nFor **OpenCode**, a JS plugin connects directly to the socket — no bridge binary needed.\n\n## Settings\n\nCodeIsland provides a 7-tab settings panel:\n\n- **General** — Language, launch at login, display selection\n- **Behavior** — Auto-hide, smart suppress, session cleanup\n- **Appearance** — Panel height, font size, AI reply lines\n- **Mascots** — Preview all pixel-art characters and their animations\n- **Sound** — 8-bit sound effects for session events\n- **Hooks** — View CLI installation status, reinstall or uninstall hooks\n- **About** — Version info and links\n\n## Requirements\n\n- macOS 14.0 (Sonoma) or later\n- Works best on MacBooks with a notch, but also works on external displays\n\n## Acknowledgments\n\nThis project was inspired by [claude-island](https://github.com/farouqaldori/claude-island) by [@farouqaldori](https://github.com/farouqaldori). Thanks for the original idea of bringing AI agent status into the macOS notch.\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=wxtsky%2FCodeIsland&type=date&legend=bottom-right\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=wxtsky/CodeIsland&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=wxtsky/CodeIsland&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=wxtsky/CodeIsland&type=date&legend=top-left\" />\n </picture>\n</a>\n\n## License\n\nMIT License — see [LICENSE](LICENSE) for details.\n","summary":"CodeIsland is a macOS app that lives inside the MacBook notch, providing a real‑time status panel for AI coding agents. It connects via IPC to 11 popular CLI tools—Claude Code, Codex, Gemini, Cursor, Copilot, Trae, Qoder, Factory, CodeBuddy, Kimi, and OpenCode—displaying session activity, tool calls, permission prompts, and scripted responses in a compact pixel‑art interface. The panel offers handy features such as instant permission approval, question answering, jump-to‑terminal/IDE navigation, optional 8‑bit sound alerts, and smart suppression that only hides notifications when you’re already viewing the active session. Developers and power users who run AI assistants in terminals or IDEs on macOS will find the tool useful for keeping track of multiple sessions without leaving their current workflow.","description":null,"stars":1085,"language":"Swift"},{"owner":"tiiuae","repo":"Falcon-Perception","url":"https://github.com/tiiuae/Falcon-Perception","readme":"\n<p align=\"center\">\n  <img src=\"assets/logo.png\" width=\"70%\" alt=\"Falcon Perception and Falcon OCR\" />\n</p>\n\n<p align=\"center\">\n  <a href=\"http://arxiv.org/abs/2603.27365\"><img src=\"https://img.shields.io/badge/arXiv-Tech%20Report-b31b1b?logo=arxiv&logoColor=white\" alt=\"Tech Report\" /></a>&nbsp;&nbsp;\n  <a href=\"https://huggingface.co/blog/tiiuae/falcon-perception\"><img src=\"https://img.shields.io/badge/Blogpost-2196F3?logo=googledocs&logoColor=white\" alt=\"Blogpost\" /></a>&nbsp;&nbsp;\n  <a href=\"https://vision.falcon.aidrc.tii.ae\"><img src=\"https://img.shields.io/badge/%F0%9F%9A%80-Playground-blue\" alt=\"Playground\" /></a>\n</p>\n<p align=\"center\">\n  <a href=\"https://huggingface.co/datasets/tiiuae/PBench\"><img src=\"https://img.shields.io/badge/%F0%9F%A4%97%20Hugging%20Face-PBench-orange\" alt=\"PBench\" /></a>&nbsp;&nbsp;\n  <a href=\"https://huggingface.co/tiiuae/Falcon-OCR\"><img src=\"https://img.shields.io/badge/%F0%9F%A4%97%20Hugging%20Face-OCR%20Model-orange\" alt=\"OCR Model\" /></a>&nbsp;&nbsp;\n  <a href=\"https://huggingface.co/tiiuae/Falcon-Perception\"><img src=\"https://img.shields.io/badge/%F0%9F%A4%97%20Hugging%20Face-Perception%20Model-orange\" alt=\"Perception Model\" /></a>\n</p>\n\n# Falcon Perception\nA minimal, readable yet performant PyTorch inference engine implementation of **Falcon Perception** — a natively multimodal, dense, autoregressive Transformer model that performs **object detection**, **instance segmentation**, or **OCR** from natural language queries.\n\n![falcon_inference](https://github.com/user-attachments/assets/1e45051b-ae05-4170-b326-d61d79a47ba2)\n\n\n> *\"Segment these expressions in the image: the cat on the left\"* → bounding boxes + pixel-level masks\n\n> *\"Extract the text content from this image.\"* → text / latex formulas / html table ... \n\n\n## Contents\n- [Quick Start](#quick-start)\n  - [Installation](#installation)\n  - [Run Perception (detection / segmentation)](#run-perception-detection--segmentation)\n  - [Run OCR (text extraction)](#run-ocr-text-extraction)\n  - [Run Multiple Samples with Paged Inference Engine](#run-multiple-samples-with-paged-inference-engine)\n  - [Interactive Notebooks](#interactive-notebooks)\n- [Inference Engines](#inference-engines)\n  - [PyTorch Inference Engines](#pytorch-inference-engines)\n    - [Paged Inference Engine](#paged-inference-engine)\n    - [Paged OCR Inference Engine](#paged-ocr-inference-engine)\n    - [Batch Inference Engine](#batch-inference-engine)\n  - [MLX Batch Inference Engine (Apple Silicon)](#mlx-batch-inference-engine-apple-silicon)\n- [Inference Server](#inference-server)\n  - [Launch Server](#launch-server)\n  - [Launch Streamlit Demo App](#launch-streamlit-demo-app)\n- [vLLM Docker Server (FalconOCR Only)](#vllm-docker-server-falconocr-only)\n  - [Serving Throughput](#serving-throughput)\n  - [Quick Start](#quick-start-1)\n- [Citation](#citation)\n- [Acknowledgments](#acknowledgments)\n\n\n## Quick Start\n\n### Installation\n\nThe package supports two backends: **PyTorch** (CUDA GPUs) and **MLX** (Apple Silicon Macs).\nA bare `pip install` auto-detects your platform, or you can pick an explicit extra.\n\n| Install command | Backend | When to use |\n|---|---|---|\n| `pip install -e .` | Auto-detect | Mac -> MLX, Linux -> Torch |\n| `pip install -e \".[torch]\"` | PyTorch + CUDA | GPU server or explicit Torch on Mac |\n| `pip install -e \".[mlx]\"` | MLX | Apple Silicon Mac |\n| `pip install -e \".[ocr]\"` | Torch + transformers | Layout-aware OCR (needs a layout detection model) |\n| `pip install -e \".[dev]\"` | -- | Adds tensorboard, matplotlib, ipykernel |\n| `pip install -e \".[server]\"` | -- | Adds FastAPI / Uvicorn for the paged inference server |\n\n```bash\n# Example: from source with uv (recommended)\nuv sync                       # installs torch with CUDA 12.8 wheels by default\nsource .venv/bin/activate\n```\n\n#### CUDA version\n\n`uv sync` defaults to **CUDA 12.8** wheels for PyTorch (works with NVIDIA driver >= 570.x).\nIf you need a different CUDA version, edit the `[[tool.uv.index]]` URL in `pyproject.toml`:\n\n```bash\n# CUDA 12.6 (driver >= 560.x)\nurl = \"https://download.pytorch.org/whl/cu126\"\n# CUDA 13.0 (driver >= 575.x) — or remove [tool.uv.sources] entirely\nurl = \"https://download.pytorch.org/whl/cu130\"\n```\n\nThen re-run `uv lock && uv sync`.\n\nIf installing with **pip** instead of uv, install PyTorch first with the correct CUDA version:\n\n```bash\npip install torch torchvision --index-url https://download.pytorch.org/whl/cu128\npip install -e .\n```\n\n> **Note:** The MLX backend does not require PyTorch or transformers at all.\n> The core data pipeline and tokenizer run on numpy/PIL and the lightweight\n> [tokenizers](https://github.com/huggingface/tokenizers) library.\n\n### Run Perception (detection / segmentation)\n\n**PyTorch (GPU)**\n```bash\n# Auto-downloads model + streaming sample image from Huggingface\npython demo/perception_single.py\n\n# Custom image and query, can be path or url\npython demo/perception_single.py --image photo.jpg --query \"cat\"\n\n# Detection only (no masks)\npython demo/perception_single.py --image photo.jpg --query \"cat\" --task detection\n```\n\n**MLX (Apple Silicon)**\n```bash\npython demo/perception_single_mlx.py --image photo.jpg --query \"cat\"\n\n# Detection only\npython demo/perception_single_mlx.py --image photo.jpg --query \"cat\" --task detection\n```\n\n### Run OCR (text extraction)\n\n**PyTorch (GPU)**\n```bash\n# Auto-downloads model + stream sample image from HuggingFace\npython demo/ocr_single.py\n\n# Custom document image\npython demo/ocr_single.py --image document.png\n\n# Layout-aware OCR (detects regions first, then extracts text per region)\n# Requires the [ocr] extra: pip install -e \".[ocr]\"\n# This will lazily download and run a 3rd party layout detection model\n# PaddlePaddle/PP-DocLayoutV3_safetensors from Huggingface\npython demo/ocr_single.py --image document.png --task ocr_layout\n```\n\n**MLX (Apple Silicon)**\n```bash\npython demo/ocr_single_mlx.py --image document.png\npython demo/ocr_single_mlx.py  # loads a demo sample from OCRBench-v2\n```\n\n**OCR modes**\n\n| Mode | Best for | How |\n|------|----------|-----|\n| **Plain OCR** | Simple documents, real-world photos, slides, receipts, invoices | `--task ocr_plain` |\n| **Layout + OCR** | Complex multi-column documents, academic papers, reports, dense pages | `--task ocr_layout` |\n\n### Run Multiple Samples with Paged Inference Engine\n\n```bash\n# Perception — PBench dataset\npython demo/perception_benchmark.py  # stream 50 samples from HF\npython demo/perception_benchmark.py --limit -1  # stream entire benchmark\n\n# OCR — OCRBench-v2 dataset\npython demo/ocr_benchmark.py\npython demo/ocr_benchmark.py --limit 200\n```\n\n### Interactive Notebooks\n\nStep-by-step walkthroughs with inline visualizations:\n\n| Notebook | Description | Colab |\n|---|---|---|\n| [`demo/perception.ipynb`](demo/perception.ipynb) | **Falcon Perception** — engine setup, detection vs segmentation, HR cache, dense tuning, PBench level showcase, and benchmark with IoU metrics | [![Open In Colab](https://colab.research.google.com/assets/colab-badge.svg)](https://colab.research.google.com/drive/1Jy6lRYuGMKJEt9--KBLm6kjbC-vQ0Uwe) |\n| [`demo/ocr.ipynb`](demo/ocr.ipynb) | **Falcon OCR** — full-page and layout-based OCR across handwriting, formulas, tables, scanned documents, and scientific papers | [![Open In Colab](https://colab.research.google.com/assets/colab-badge.svg)](https://colab.research.google.com/drive/1HYOcYWqmeUT9j2h6_dNM2lX1mlI34Bfa) |\n| [`demo/perception_agent.ipynb`](demo/perception_agent.ipynb) | **Perception Agent** — grounded visual reasoning agent using Falcon Perception as a tool with an orchestrator VLM for multi-step scene understanding | [![Open In Colab](https://colab.research.google.com/assets/colab-badge.svg)](https://colab.research.google.com/drive/1wg4EbNDKllAxoK1v5gbdRzkrKjdjIwbj) |\n| [`demo/perception_ov_mot.ipynb`](demo/perception_ov_mot.ipynb) | **Open-Vocab Multi-Object Tracking** — video object tracking pipeline using Falcon Perception in detection and segmentation modes | [![Open In Colab](https://colab.research.google.com/assets/colab-badge.svg)](https://colab.research.google.com/drive/13Hiei8As2JbiZuYllXQTNX_ZelysZSpH) |\n\n\n## Inference Engines\n\n### PyTorch Inference Engines\n\n**We use FlexAttention for both inference engines and training.**\nThe hybrid attention mask (bidirectional image + causal text) is expressed as composable mask functions. \nThe FlexAttention's `maskmod` also make it easy to implement continuous batching with paged attention via simple Python.\nPyTorch's `flex_attention` compiles them into fused Triton kernel — no custom attention code needed.\n\n#### Paged Inference Engine\n\nPerformant engine with CUDAGraph and continuous batching via a paged KV cache:\n\n- **Paged KV cache** with virtual page tables (no wasted memory from padding)\n- **Continuous batching**: new sequences enter mid-generation, finished ones release pages immediately\n- **Torch compile**: piece-wise region outside the flex attention kernel.\n- **CUDA graph capture** for the decode loop (eliminates kernel launch overhead, important for small models)\n- **Background tokenization**: CPU thread pool overlapped with GPU compute\n- **Preemption**: if memory is tight, running sequences can be paused and re-prefilled later\n- **High-Resolution image feature cache** (for segmentation): LRU cache with pre-allocated pinned memory buffers for async GPU↔CPU transfer of high-resolution image features. Help reduce prefill time for subsequent query of the same image.\n\nPlease check `demo/perception_single.py` and `demo/perception_benchmark.py` on how to directly instantiate and use the engine.\n\n> **NOTE**: First run will takes longer ~10-30s for torch compile and CUDAGraph capture. Subsequent run will be faster, around ~100ms for prefill, ~200ms for upsampling (0ms if cached), and ~50ms for decode a couple of instances (~10 tokens). (measured on H100)\n\n#### Paged OCR Inference Engine\n\nExtends the Perception's paged engine for document understanding:\n\n- **Layout detection**: runs a lightweight detector to find text regions, tables, figures, headers\n- **Per-region OCR**: crops each region and runs OCR inference with a category-specific prompt\n- **Continuous batching and gather**: all crops of the image are sent to the engine for continuous batched extraction. Once all crops are completed, the output are gathered and assembed into a structured output.\n\nPlease check `demo/ocr_single.py` and `demo/ocr_benchmark.py` on how to directly instantiate and use the engine.\n\n> **NOTE**: First `layout_ocr` run will lazily download and run the document layout detection model.\n\n#### Batch Inference Engine\n\nThe simplest and closest to training code path, make it easier to understand the model's forward pass without all the optimization.\nAll sequences are left-padded to the same length (with correct rope indices and attention mask), runs a single prefill, then decodes token-by-token with a dense KV cache until all sequences are completed.\n\nPlease check the `demo/perception_single.py --engine-type batch` path for usage.\n\n\n### MLX Batch Inference Engine (Apple Silicon)\n\nThe MLX backend provides batch inference on Apple Silicon Macs using the\n[MLX](https://github.com/ml-explore/mlx) framework. It shares the same\nmodel architecture and weights (auto-converted from safetensors on first load)\nand produces equivalent results.\n\n- Dense KV cache, left-padded batch inference\n- `mx.fast.scaled_dot_product_attention` with native sink support\n- Tiled windowed cross-attention in the AnyUp upsampler for memory efficiency\n- No PyTorch or transformers dependency\n\nSee `demo/perception_single_mlx.py` for usage.\n\n## Inference Server\n\nThe server provides a REST API to the continuous batching Paged Inference Engine across multiple GPUs.\n\n### Launch server\n\n```bash\n# Install server and streamlit demo dependencies\nuv sync --extra server --extra demo\n\n# Auto-detects all available GPUs, compiles model, captures CUDA graphs\npython -m falcon_perception.server\n\n# Explicit config\npython -m falcon_perception.server --config.num-gpus 2 --config.port 7680\n\n# Or with the OCR model\npython -m falcon_perception.server --config.hf-model-id tiiuae/Falcon-OCR --config.port 7681\n```\n\nThe server starts one engine worker per GPU in a separate process (i.e. Data Parallel). Each worker builds its own model, runs `torch.compile`, and captures CUDA graphs for the decode loop. Workers communicate with the main FastAPI process via `multiprocessing.Queue` and the server will assign new request to the worker with lowest number of queuing requests.\n\nPlease check the [`server/README.md`](falcon_perception/server/README.md) for detailed usage.\n\n\n### Launch Streamlit Demo App\n\nA browser-based demo UI that connects to the inference server.\n\n```bash\n# With a server already launched in a separate terminal, launch the Streamlit app\nstreamlit run demo/streamlit_app.py\n```\n\nThe app provides:\n- Image upload and URL input\n- Automatic model detection — the task selector shows only tasks supported by the loaded model (segmentation/detection for Falcon-Perception, OCR plain/layout for Falcon-OCR)\n- Interactive mask and bounding box overlay visualization\n- Adjustable image resolution settings\n- Per-request timing breakdown\n\n\n## vLLM Docker Server (FalconOCR Only)\nFor FalconOCR without the extra perception heads, we also provide a vLLM docker server for fast deployment.\n\n### Serving Throughput\n\nMeasured on a single A100-80GB GPU with vLLM, processing document images from olmOCR-Bench at very high concurrency for optimal utilisation of vllm.\n\n- **Layout + OCR** — The full end-to-end pipeline: layout detection finds regions on each page, crops them, and the VLLM runs on every crop. This is the real-world serving number that includes both layout and OCR time.\n\n| Mode | tok/s | img/s | Description |\n|------|------:|------:|-------------|\n| **Layout + OCR** | 5,825 | 2.9 | Full pipeline: layout detection → crop → per-region OCR |\n\nAt 0.3B parameters, Falcon OCR is roughly 3x smaller than 0.9B-class OCR VLMs (e.g. PaddleOCR VL), which translates directly into higher serving throughput at competitive accuracy.\n\n### Quick Start\nFor production OCR serving, we also provide a Docker image (~6,000 tok/s on a single A100) that bundles vLLM with an end-to-end parsing pipeline. It exposes two services: **vLLM** (port 8000, OpenAI-compatible API) and a **Pipeline** (port 5002, layout → crop → OCR → markdown).\n\n```bash\n# Two GPUs (best throughput): vLLM on one, layout model on the other\ndocker run -d --name falcon-ocr \\\n  --gpus '\"device=0,1\"' \\\n  -e EXPOSED_GPU_IDS=0,1 -e VLLM_GPU=0 -e PIPELINE_GPU=1 \\\n  -e VLLM_GPU_MEM_UTIL=0.90 \\\n  -p 8000:8000 -p 5002:5002 \\\n  ghcr.io/tiiuae/falcon-ocr:latest\n\n# Single GPU (share memory — lower VLLM_GPU_MEM_UTIL to leave room for layout model)\ndocker run -d --name falcon-ocr \\\n  --gpus '\"device=0\"' \\\n  -e EXPOSED_GPU_IDS=0 -e VLLM_GPU=0 -e PIPELINE_GPU=0 \\\n  -e VLLM_GPU_MEM_UTIL=0.55 -e MAX_NUM_SEQS=512 \\\n  -p 8000:8000 -p 5002:5002 \\\n  ghcr.io/tiiuae/falcon-ocr:latest\n```\n\n```bash\n# Upload (images or PDFs)\ncurl -X POST http://localhost:5002/falconocr/upload \\\n  -F \"files=@document.pdf;type=application/pdf\"\n\n# Parse with layout detection\ncurl -X POST http://localhost:5002/falconocr/parse \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"images\": [\"data:image/jpeg;base64,<...>\"], \"skip_layout\": false}'\n\n# Parse without layout (full image → VLM directly)\ncurl -X POST http://localhost:5002/falconocr/parse \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"images\": [\"data:image/jpeg;base64,<...>\"], \"skip_layout\": true}'\n```\n\nSee the [Falcon-OCR model card](https://huggingface.co/tiiuae/Falcon-OCR) for the full API reference, configuration variables, and deployment options.\n\n## Citation\nIf you use Falcon-Perception, please cite\n```\n@article{bevli2026falcon,\n  title   = {Falcon Perception},\n  author  = {Bevli, Aviraj and Chaybouti, Sofian and Dahou, Yasser and Hacid, Hakim and Huynh, Ngoc Dung and Le Khac, Phuc H. and Narayan, Sanath and Para, Wamiq Reyaz and Singh, Ankit},\n  journal = {arXiv preprint arXiv:2603.27365},\n  year    = {2026},\n  url     = {https://arxiv.org/abs/2603.27365}\n}\n```\n## Acknowledgments\nWe based on, built upon and are inspired by the following excellent work:\n- https://github.com/pytorch/torchtitan\n- https://github.com/karpathy/nanochat\n- https://github.com/meta-pytorch/attention-gym\n- https://github.com/changjonathanc/flex-nano-vllm\n- https://github.com/vikhyat/moondream\n- https://github.com/wimmerth/anyup\n- https://github.com/roboflow/trackers\n","summary":"Falcon‑Perception provides a lightweight, readable PyTorch (and MLX for Apple Silicon) inference engine for Falcon Perception, a multimodal transformer that can perform object detection, instance segmentation, and OCR solely from natural‑language prompts. It supports efficient paged and batch inference, optional layout‑aware OCR, and can be deployed via a FastAPI server or a vLLM‑based Docker image. The toolkit includes ready‑to‑use models, a public PBench dataset, and interactive Streamlit demos, making it attractive to researchers and developers who need a fast, query‑driven vision system for tasks such as image understanding, table extraction, or handwritten text recognition.","description":" Inference repo for Falcon-Perception and Falcon-OCR model, early-fusion, natively multimodal, dense Autoregressive Transformer models.","stars":530,"language":"Python"},{"owner":"IyadhKhalfallah","repo":"clauditor","url":"https://github.com/IyadhKhalfallah/clauditor","readme":"<p align=\"center\">\n  <h1 align=\"center\">clauditor</h1>\n  <p align=\"center\">\n    <strong>Stop Claude Code from burning through your quota in 20 minutes.</strong>\n  </p>\n  <p align=\"center\">\n    <a href=\"https://www.npmjs.com/package/@iyadhk/clauditor\"><img src=\"https://img.shields.io/npm/v/@iyadhk/clauditor\" alt=\"npm version\"></a>\n    <a href=\"https://github.com/IyadhKhalfallah/clauditor/actions\"><img src=\"https://img.shields.io/github/actions/workflow/status/IyadhKhalfallah/clauditor/ci.yml?branch=main\" alt=\"CI\"></a>\n    <a href=\"https://github.com/IyadhKhalfallah/clauditor/blob/main/LICENSE\"><img src=\"https://img.shields.io/github/license/IyadhKhalfallah/clauditor\" alt=\"MIT License\"></a>\n  </p>\n</p>\n\n---\n\n## The problem\n\nEvery turn in a Claude Code session re-sends your entire conversation history to the API. A fresh session sends ~20k tokens per turn. A 200-turn session sends ~200k per turn. **Same work, 10x more quota.**\n\n```\nTurn    1: ██ 20k tokens\nTurn   50: ██████████ 100k tokens\nTurn  200: ████████████████████ 200k tokens\nTurn  500: ██████████████████████████████████████████ 400k tokens\n```\n\nThis is why your session limit gets hit in 20 minutes. Not because of a bug — because sessions grow linearly and nobody tells you to start fresh.\n\n## The solution\n\nclauditor monitors your session size and **blocks Claude when you're wasting quota**, saving your progress so you can start fresh without losing context.\n\n```\n╔══════════════════════════════════════════════════════════════╗\n║  clauditor: Session using 9x more quota than necessary      ║\n╚══════════════════════════════════════════════════════════════╝\n\nThis session is burning 9x more quota per turn (170k vs ~20k tokens/turn).\nYour progress has been saved and won't be lost.\n\nRun `claude` to start a fresh session at ~20k tokens/turn instead of 170k.\nIn the new session, just say \"continue where I left off\".\n```\n\nWhen you type \"continue\" in the new session, clauditor shows your saved sessions and tells you exactly what to type:\n\n```\n╔══════════════════════════════════════════════════════════════╗\n║  clauditor: 2 recent sessions found                        ║\n╚══════════════════════════════════════════════════════════════╝\n\n  1. (5m ago) Notion backfill — populating database with User Email\n     → read ~/.clauditor/sessions/.../1234.md and continue where I left off\n\n  2. (30m ago) feat/variable-agent — migrating from ResponsesApi\n     → read ~/.clauditor/sessions/.../5678.md and continue where I left off\n\nCopy one of the → lines above, or type something else to start fresh.\n```\n\n## Install\n\n```bash\nbrew install IyadhKhalfallah/clauditor/clauditor\nclauditor install\n```\n\nOr via npm:\n\n```bash\nnpm install -g @iyadhk/clauditor\nclauditor install\n```\n\nThat's it. Two commands. clauditor registers hooks into Claude Code and runs in the background. No dashboard needed. No config needed.\n\n**Also works with npx** (no global install):\n\n```bash\nnpx @iyadhk/clauditor install\n```\n\nHooks are registered to run via npx automatically.\n\nNew hooks are auto-registered on upgrade — no need to re-run `clauditor install`.\n\nRequires Node.js 20+.\n\n**Supported platforms:** Claude Code CLI, VS Code extension, JetBrains extension. Does **not** work with Claude Code on the web (claude.ai/code).\n\n**Known limitation:** The \"continue\" prompt block works reliably in the CLI. In the VS Code extension, the `UserPromptSubmit` hook [may not fire consistently](https://github.com/anthropics/claude-code/issues/17277) — context is still injected via `SessionStart` but Claude may not always announce it. This is a Claude Code bug, not a clauditor issue.\n\n## How it works\n\nclauditor registers 7 hooks into Claude Code:\n\n### `UserPromptSubmit` — blocks before tokens are wasted\n\nBefore Claude processes your prompt, clauditor checks two things:\n\n1. **Waste factor** — if the session is burning too much quota, it blocks with exit code 2.\n2. **\"Continue\" detection** — if you type \"continue\", \"resume\", \"pick up where I left off\", etc., it
