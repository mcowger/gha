<script id="project-data" type="application/json">[{"owner":"farzaa","repo":"clicky","url":"https://github.com/farzaa/clicky","readme":"# Hi, this is Clicky.\nIt's an AI teacher that lives as a buddy next to your cursor. It can see your screen, talk to you, and even point at stuff. Kinda like having a real teacher next to you.\n\nDownload it [here](https://www.clicky.so/) for free.\n\nHere's the [original tweet](https://x.com/FarzaTV/status/2041314633978659092) that kinda blew up for a demo for more context.\n\n![Clicky — an ai buddy that lives on your mac](clicky-demo.gif)\n\nThis is the open-source version of Clicky for those that want to hack on it, build their own features, or just see how it works under the hood.\n\n## Get started with Claude Code\n\nThe fastest way to get this running is with [Claude Code](https://docs.anthropic.com/en/docs/claude-code).\n\nOnce you get Claude running, paste this:\n\n```\nHi Claude.\n\nClone https://github.com/farzaa/clicky.git into my current directory.\n\nThen read the CLAUDE.md. I want to get Clicky running locally on my Mac.\n\nHelp me set up everything — the Cloudflare Worker with my own API keys, the proxy URLs, and getting it building in Xcode. Walk me through it.\n```\n\nThat's it. It'll clone the repo, read the docs, and walk you through the whole setup. Once you're running you can just keep talking to it — build features, fix bugs, whatever. Go crazy.\n\n## Manual setup\n\nIf you want to do it yourself, here's the deal.\n\n### Prerequisites\n\n- macOS 14.2+ (for ScreenCaptureKit)\n- Xcode 15+\n- Node.js 18+ (for the Cloudflare Worker)\n- A [Cloudflare](https://cloudflare.com) account (free tier works)\n- API keys for: [Anthropic](https://console.anthropic.com), [AssemblyAI](https://www.assemblyai.com), [ElevenLabs](https://elevenlabs.io)\n\n### 1. Set up the Cloudflare Worker\n\nThe Worker is a tiny proxy that holds your API keys. The app talks to the Worker, the Worker talks to the APIs. This way your keys never ship in the app binary.\n\n```bash\ncd worker\nnpm install\n```\n\nNow add your secrets. Wrangler will prompt you to paste each one:\n\n```bash\nnpx wrangler secret put ANTHROPIC_API_KEY\nnpx wrangler secret put ASSEMBLYAI_API_KEY\nnpx wrangler secret put ELEVENLABS_API_KEY\n```\n\nFor the ElevenLabs voice ID, open `wrangler.toml` and set it there (it's not sensitive):\n\n```toml\n[vars]\nELEVENLABS_VOICE_ID = \"your-voice-id-here\"\n```\n\nDeploy it:\n\n```bash\nnpx wrangler deploy\n```\n\nIt'll give you a URL like `https://your-worker-name.your-subdomain.workers.dev`. Copy that.\n\n### 2. Run the Worker locally (for development)\n\nIf you want to test changes to the Worker without deploying:\n\n```bash\ncd worker\nnpx wrangler dev\n```\n\nThis starts a local server (usually `http://localhost:8787`) that behaves exactly like the deployed Worker. You'll need to create a `.dev.vars` file in the `worker/` directory with your keys:\n\n```\nANTHROPIC_API_KEY=sk-ant-...\nASSEMBLYAI_API_KEY=...\nELEVENLABS_API_KEY=...\nELEVENLABS_VOICE_ID=...\n```\n\nThen update the proxy URLs in the Swift code to point to `http://localhost:8787` instead of the deployed Worker URL while developing. Grep for `clicky-proxy` to find them all.\n\n### 3. Update the proxy URLs in the app\n\nThe app has the Worker URL hardcoded in a few places. Search for `your-worker-name.your-subdomain.workers.dev` and replace it with your Worker URL:\n\n```bash\ngrep -r \"clicky-proxy\" leanring-buddy/\n```\n\nYou'll find it in:\n- `CompanionManager.swift` — Claude chat + ElevenLabs TTS\n- `AssemblyAIStreamingTranscriptionProvider.swift` — AssemblyAI token endpoint\n\n### 4. Open in Xcode and run\n\n```bash\nopen leanring-buddy.xcodeproj\n```\n\nIn Xcode:\n1. Select the `leanring-buddy` scheme (yes, the typo is intentional, long story)\n2. Set your signing team under Signing & Capabilities\n3. Hit **Cmd + R** to build and run\n\nThe app will appear in your menu bar (not the dock). Click the icon to open the panel, grant the permissions it asks for, and you're good.\n\n### Permissions the app needs\n\n- **Microphone** — for push-to-talk voice capture\n- **Accessibility** — for the global keyboard shortcut (Control + Option)\n- **Screen Recording** — for taking screenshots when you use the hotkey\n- **Screen Content** — for ScreenCaptureKit access\n\n## Architecture\n\nIf you want the full technical breakdown, read `CLAUDE.md`. But here's the short version:\n\n**Menu bar app** (no dock icon) with two `NSPanel` windows — one for the control panel dropdown, one for the full-screen transparent cursor overlay. Push-to-talk streams audio over a websocket to AssemblyAI, sends the transcript + screenshot to Claude via streaming SSE, and plays the response through ElevenLabs TTS. Claude can embed `[POINT:x,y:label:screenN]` tags in its responses to make the cursor fly to specific UI elements across multiple monitors. All three APIs are proxied through a Cloudflare Worker.\n\n## Project structure\n\n```\nleanring-buddy/          # Swift source (yes, the typo stays)\n  CompanionManager.swift    # Central state machine\n  CompanionPanelView.swift  # Menu bar panel UI\n  ClaudeAPI.swift           # Claude streaming client\n  ElevenLabsTTSClient.swift # Text-to-speech playback\n  OverlayWindow.swift       # Blue cursor overlay\n  AssemblyAI*.swift         # Real-time transcription\n  BuddyDictation*.swift     # Push-to-talk pipeline\nworker/                  # Cloudflare Worker proxy\n  src/index.ts              # Three routes: /chat, /tts, /transcribe-token\nCLAUDE.md                # Full architecture doc (agents read this)\n```\n\n## Contributing\n\nPRs welcome. If you're using Claude Code, it already knows the codebase — just tell it what you want to build and point it at `CLAUDE.md`.\n\nGot feedback? DM me on X [@farzatv](https://x.com/farzatv).\n","summary":"Clicky is an AI teaching companion that sits beside your macOS cursor, able to see what’s on your screen, talk to you, and even point at items like a real instructor. It combines ScreenCaptureKit for visual context, assemblyAI‑based transcription, ElevenLabs text‑to‑speech, and Claude for natural‑language dialogue, routing all API calls through a Cloudflare Worker that hides your keys. The project ships as a SwiftXcode app plus a lightweight Node.js worker, so developers can run it locally, swap in their own API tokens, or extend its behavior in real time. It’s especially useful for educators, developers, or power‑users who need an on‑screen AI tutor or want to experiment with an open‑source AI‑augmented workflow.","description":null,"stars":4475,"language":"Swift"},{"owner":"zmeyer44","repo":"Locker","url":"https://github.com/zmeyer44/Locker","readme":"# Locker\n\nOpen-source file storage and knowledge platform. A self-hostable alternative to Dropbox and Google Drive — with built-in search, document transcription, and an AI-powered knowledge base.\n\n## Features\n\n- **File Explorer** — Upload, organize, rename, move, and delete files and folders with grid and list views\n- **File Previews** — In-app viewers for PDFs, images, Markdown, CSV, audio, video, and plain text\n- **Tags** — Organize files with color-coded, workspace-scoped tags and filter by them\n- **Share Links** — Generate shareable links with optional password protection, expiration, and download limits\n- **Upload Links** — Let others upload files to your storage without an account\n- **Command Palette** — Cmd+K search across file names and content with keyboard navigation\n- **Knowledge Base** — AI-powered wiki that ingests tagged documents, supports chat, and visualizes page relationships in an interactive graph view\n- **Plugins** — Extensible plugin system with built-in plugins for search (QMD, FTS), document transcription, Google Drive sync, and knowledge base\n- **Document Transcription** — AI-powered OCR/transcription for images and PDFs, making non-text files searchable\n- **Notifications** — In-app notifications for workspace invites and announcements\n- **Workspace Invites** — Invite users via email with token-based onboarding flow\n- **Multi-Store Storage** — Attach multiple storage backends (Local, S3, R2, Vercel Blob) per workspace with automatic replication across stores\n- **Read-Only Ingest** — Scan external buckets or directories for new files and import them into Locker without moving originals\n- **Storage Quotas** — Per-user storage limits with usage tracking\n- **Virtual Bash Filesystem** — Traverse workspace files with `ls`, `cd`, `find`, `cat`, `grep`, etc. via `just-bash`\n\n## Tech Stack\n\n- **Framework**: Next.js 16 (App Router, Turbopack)\n- **Monorepo**: Turborepo + pnpm workspaces\n- **Database**: PostgreSQL 16 + Drizzle ORM\n- **API**: tRPC 11 (end-to-end type safety)\n- **Auth**: BetterAuth (email/password, Google OAuth)\n- **AI**: Vercel AI SDK for transcription and knowledge base chat\n- **UI**: Tailwind CSS 4, Radix UI, Geist fonts, Lucide icons\n- **Email**: Resend\n- **Testing**: Playwright (E2E)\n- **Language**: TypeScript (strict mode)\n\n## Project Structure\n\n```\nlocker/\n├── apps/web/              Next.js web app\n│   ├── app/               Pages and API routes\n│   ├── components/        Shared UI components\n│   ├── features/          Feature modules (files, knowledge-bases)\n│   ├── server/            tRPC routers, auth, and plugin system\n│   └── lib/               Utilities\n├── packages/\n│   ├── common/            Shared types, validation, constants\n│   ├── database/          Drizzle schema and database client\n│   ├── email/             Email templates and sending (Resend)\n│   └── storage/           Storage provider adapters\n├── services/\n│   ├── fts/               Full-text search microservice (SQLite FTS5)\n│   └── qmd/              Semantic search microservice\n├── e2e/                   Playwright end-to-end tests\n├── docker-compose.yml     PostgreSQL + optional search services\n└── turbo.json             Build pipeline\n```\n\n## Getting Started\n\n### Prerequisites\n\n- [Node.js](https://nodejs.org/) 20+\n- [pnpm](https://pnpm.io/) 9+\n- [Docker](https://www.docker.com/) (for PostgreSQL)\n\n### 1. Install dependencies\n\n```bash\npnpm install\n```\n\n### 2. Start PostgreSQL\n\n```bash\ndocker compose up -d\n```\n\n### 3. Configure environment\n\n```bash\ncp .env.example .env\n```\n\nThe defaults work out of the box for local development. Edit `.env` to change the storage provider or add OAuth credentials.\n\n### 4. Run database migrations\n\n```bash\npnpm db:generate\npnpm db:migrate\n```\n\n### 5. Start the dev server\n\n```bash\npnpm dev\n```\n\nOpen [http://localhost:3000](http://localhost:3000), create an account, and start uploading files.\n\n## Self-Hosting Guide\n\nLocker auto-detects which platform it's running on and adjusts its capabilities accordingly. Persistent runtimes (Docker, Fly.io, Railway) support all features. Serverless runtimes (Vercel) disable long-running operations like store sync and bulk KB ingestion.\n\n### Requirements\n\nEvery deployment needs:\n\n- **PostgreSQL 16+** — the primary database\n- **`BETTER_AUTH_SECRET`** — generate with `openssl rand -base64 32`\n- **`NEXT_PUBLIC_APP_URL`** — the public URL of your deployment\n- **A storage provider** — local filesystem (persistent runtimes only) or a cloud provider (S3, R2, Vercel Blob)\n\n### Docker Compose (recommended)\n\nThe included `docker-compose.yml` bundles PostgreSQL, migrations, and the web app. This is the fastest way to self-host.\n\n```bash\n# 1. Clone and configure\ngit clone https://github.com/zmeyer44/Locker.git && cd Locker\ncp .env.example .env\n\n# 2. Set the required secret\n#    Replace the placeholder in .env or export it:\nexport BETTER_AUTH_SECRET=$(openssl rand -base64 32)\n\n# 3. Start everything\ndocker compose up -d\n```\n\nOpen [http://localhost:3000](http://localhost:3000). Files are stored on a Docker volume (`blob_data`) by default.\n\nTo use S3 or R2 instead of local storage, set `BLOB_STORAGE_PROVIDER` and the matching credentials in your `.env` before starting.\n\nTo enable optional search services:\n\n```bash\ndocker compose --profile search up -d\n```\n\n### Railway\n\nRailway provides managed PostgreSQL and persistent disk, so all features work out of the box.\n\n1. Create a new project and add a **PostgreSQL** service. Copy the `DATABASE_URL`.\n2. Add a new service from the Locker repo. Railway will detect the `Dockerfile` automatically.\n3. Set these environment variables on the web service:\n\n   | Variable | Value |\n   | --- | --- |\n   | `DATABASE_URL` | The PostgreSQL connection string from step 1 |\n   | `BETTER_AUTH_SECRET` | `openssl rand -base64 32` |\n   | `BETTER_AUTH_URL` | Your Railway public URL (e.g. `https://locker-production.up.railway.app`) |\n   | `NEXT_PUBLIC_APP_URL` | Same as `BETTER_AUTH_URL` |\n   | `BLOB_STORAGE_PROVIDER` | `local` (default) or `s3` / `r2` with matching credentials |\n\n4. If using local storage, attach a **volume** mounted at `/app/local-blobs`.\n5. Deploy. Railway runs migrations automatically via the `migrate` service in Docker Compose, or you can add a deploy command: `pnpm db:migrate && node apps/web/server.js`.\n\n### Fly.io\n\nFly provides persistent VMs with attached volumes.\n\n1. Create a PostgreSQL cluster:\n\n   ```bash\n   fly postgres create --name locker-db\n   ```\n\n2. Launch the app from the repo root:\n\n   ```bash\n   fly launch --dockerfile Dockerfile\n   ```\n\n3. Attach the database:\n\n   ```bash\n   fly postgres attach locker-db\n   ```\n\n4. Create a volume for local storage:\n\n   ```bash\n   fly volumes create blob_data --size 10 --region your-region\n   ```\n\n   Add to `fly.toml`:\n\n   ```toml\n   [mounts]\n     source = \"blob_data\"\n     destination = \"/app/local-blobs\"\n   ```\n\n5. Set secrets:\n\n   ```bash\n   fly secrets set \\\n     BETTER_AUTH_SECRET=$(openssl rand -base64 32) \\\n     BETTER_AUTH_URL=https://your-app.fly.dev \\\n     NEXT_PUBLIC_APP_URL=https://your-app.fly.dev\n   ```\n\n6. Run migrations and deploy:\n\n   ```bash\n   fly deploy\n   ```\n\n### Render\n\n1. Create a **PostgreSQL** database in Render. Copy the internal connection string.\n2. Create a new **Web Service** from the Locker repo. Set the Dockerfile path to `./Dockerfile`.\n3. Add a **Disk** mounted at `/app/local-blobs` for local file storage.\n4. Set environment variables: `DATABASE_URL`, `BETTER_AUTH_SECRET`, `BETTER_AUTH_URL`, `NEXT_PUBLIC_APP_URL`.\n5. Deploy.\n\n### Vercel\n\nVercel runs Next.js on serverless functions. Locker auto-detects this and disables features that require a persistent runtime:\n\n- Store sync and ingest are disabled\n- Bulk KB ingestion is disabled\n- Local filesystem storage is unavailable\n\nYou must use a cloud storage provider (Vercel Blob, S3, or R2).\n\n1. Import the repo into Vercel.\n2. Set the framework preset to **Next.js** and the root directory to `apps/web`.\n3. Add a PostgreSQL database (Vercel Postgres, Neon, Supabase, etc.) and set `DATABASE_URL`.\n4. Set environment variables:\n\n   | Variable | Value |\n   | --- | --- |\n   | `BETTER_AUTH_SECRET` | `openssl rand -base64 32` |\n   | `BETTER_AUTH_URL` | Your Vercel deployment URL |\n   | `NEXT_PUBLIC_APP_URL` | Same as `BETTER_AUTH_URL` |\n   | `BLOB_STORAGE_PROVIDER` | `vercel` (recommended) or `s3` / `r2` |\n   | `BLOB_READ_WRITE_TOKEN` | From Vercel Blob (if using `vercel` provider) |\n\n5. Deploy. Run migrations manually or via a build command: `pnpm db:migrate && pnpm build`.\n\n### Runtime override\n\nLocker detects the hosting platform automatically from environment variables (`VERCEL`, `FLY_REGION`, `RAILWAY_ENVIRONMENT`, etc.). If detection is wrong or you want to test serverless behavior locally, set:\n\n```bash\nLOCKER_RUNTIME_ENV=vercel  # or: docker, fly, railway, render, development\n```\n\n## Storage\n\n### Platform default\n\nSet `BLOB_STORAGE_PROVIDER` in `.env` to configure the default storage backend for new workspaces:\n\n| Provider         | Value    | Required Env Vars                                                        |\n| ---------------- | -------- | ------------------------------------------------------------------------ |\n| Local filesystem | `local`  | `LOCAL_BLOB_DIR`                                                         |\n| AWS S3           | `s3`     | `AWS_ACCESS_KEY_ID`, `AWS_SECRET_ACCESS_KEY`, `AWS_REGION`, `S3_BUCKET`  |\n| Cloudflare R2    | `r2`     | `R2_ACCOUNT_ID`, `R2_ACCESS_KEY_ID`, `R2_SECRET_ACCESS_KEY`, `R2_BUCKET` |\n| Vercel Blob      | `vercel` | `BLOB_READ_WRITE_TOKEN`                                                  |\n\n### Multi-store\n\nWorkspace admins can attach additional stores from **Settings > Stores**. Each store can be configured as:\n\n- **Writable replica** — files are automatically synced to this store for redundancy\n- **Read-only ingest** — Locker scans the store for new files and imports them without moving the originals\n\nStores use their own credentials (BYOB), so different teams can bring different backends. A primary store is designated per workspace for new uploads; replicas receive copies automatically.\n\n## Plugins\n\nLocker ships with a built-in plugin system. Plugins are installed per-workspace and can add search, transcription, file actions, and more.\n\n| Plugin                  | Description                                                                 |\n| ----------------------- | --------------------------------------------------------------------------- |\n| **QMD Search**          | Semantic document search powered by QMD embeddings                          |\n| **Full-Text Search**    | Lightweight SQLite FTS5 search — no external service required               |\n| **Document Transcription** | AI-powered OCR for images and PDFs, making non-text files searchable     |\n| **Google Drive Sync**   | Import files from and export files to Google Drive                          |\n| **Knowledge Base**      | Build an AI-powered wiki from tagged documents with chat and graph view     |\n\n### Optional search services\n\nQMD and FTS run as standalone microservices. Enable them with the `search` Docker Compose profile:\n\n```bash\ndocker compose --profile search up -d\n```\n\n## Scripts\n\n| Command            | Description                      |\n| ------------------ | -------------------------------- |\n| `pnpm dev`         | Start all packages in dev mode   |\n| `pnpm build`       | Production build                 |\n| `pnpm typecheck`   | Type-check all packages          |\n| `pnpm lint`        | Lint all packages                |\n| `pnpm db:generate` | Generate a new Drizzle migration |\n| `pnpm db:migrate`  | Apply pending migrations         |\n| `pnpm db:seed`     | Seed the database                |\n| `pnpm format`      | Format code with Prettier        |\n\n## Virtual Filesystem Shell API\n\nLocker includes a read-only virtual filesystem over workspace files/folders, powered by [`just-bash`](https://github.com/vercel-labs/just-bash).\n\nThe shell API is available on tRPC router `vfsShell`:\n\n- `vfsShell.createSession({ cwd? })` → create a workspace-scoped shell session\n- `vfsShell.exec({ sessionId, command, timeoutMs? })` → run a bash command\n- `vfsShell.session({ sessionId })` → get session `cwd` + expiry\n- `vfsShell.closeSession({ sessionId })` → close a session\n\nImplementation details:\n\n- Directory tree is bootstrapped from `folders` + `files` and cached in memory.\n- File contents are fetched lazily from the configured storage provider and cached.\n- All write operations (`rm`, `mv`, redirections, etc.) fail with `EROFS` (read-only filesystem).\n- Access is workspace-scoped and enforced by existing workspace membership checks.\n\n## License\n\nMIT\n","summary":"Locker is a self‑hostable file storage and knowledge platform that replaces cloud services like Dropbox and Google Drive with built‑in search, OCR, and an AI‑powered knowledge base, making it easy to upload, organize, and discover documents. Its core interface offers an explorer with preview support for PDFs, images, Markdown, CSV and media, alongside color‑coded tags, shareable and upload links, and a command palette for fast search across names and content. The platform extends beyond file storage with a chat‑enabled wiki that ingests tagged documents, visualises relationships, and can be expanded through a plugin system for search, transcription, Google Drive sync, and more, while supporting local, S3, R2, or Vercel Blob back‑ends with automatic replication. This makes it ideal for teams or solo developers who require a private, extensible cloud‑storage solution, an internal knowledge hub, or a fully typed, Next.js‑powered web application they can run on their own infrastructure.","description":null,"stars":725,"language":"TypeScript"},{"owner":"safishamsi","repo":"graphify","url":"https://github.com/safishamsi/graphify","readme":"# graphify\n\n[English](README.md) | [简体中文](README.zh-CN.md) | [日本語](README.ja-JP.md) | [한국어](README.ko-KR.md)\n\n[![CI](https://github.com/safishamsi/graphify/actions/workflows/ci.yml/badge.svg?branch=v4)](https://github.com/safishamsi/graphify/actions/workflows/ci.yml)\n[![PyPI](https://img.shields.io/pypi/v/graphifyy)](https://pypi.org/project/graphifyy/)\n[![Downloads](https://static.pepy.tech/badge/graphifyy)](https://pepy.tech/project/graphifyy)\n[![Sponsor](https://img.shields.io/badge/sponsor-safishamsi-ea4aaa?logo=github-sponsors)](https://github.com/sponsors/safishamsi)\n[![LinkedIn](https://img.shields.io/badge/LinkedIn-Safi%20Shamsi-0077B5?logo=linkedin)](https://www.linkedin.com/in/safi-shamsi)\n\n**An AI coding assistant skill.** Type `/graphify` in Claude Code, Codex, OpenCode, Cursor, Gemini CLI, GitHub Copilot CLI, VS Code Copilot Chat, Aider, OpenClaw, Factory Droid, Trae, Hermes, Kiro, or Google Antigravity - it reads your files, builds a knowledge graph, and gives you back structure you didn't know was there. Understand a codebase faster. Find the \"why\" behind architectural decisions.\n\nFully multimodal. Drop in code, PDFs, markdown, screenshots, diagrams, whiteboard photos, images in other languages, or video and audio files - graphify extracts concepts and relationships from all of it and connects them into one graph. Videos are transcribed with Whisper using a domain-aware prompt derived from your corpus. 25 languages supported via tree-sitter AST (Python, JS, TS, Go, Rust, Java, C, C++, Ruby, C#, Kotlin, Scala, PHP, Swift, Lua, Zig, PowerShell, Elixir, Objective-C, Julia, Verilog, SystemVerilog, Vue, Svelte, Dart).\n\n> Andrej Karpathy keeps a `/raw` folder where he drops papers, tweets, screenshots, and notes. graphify is the answer to that problem - 71.5x fewer tokens per query vs reading the raw files, persistent across sessions, honest about what it found vs guessed.\n\n```\n/graphify .                        # works on any folder - your codebase, notes, papers, anything\n```\n\n```\ngraphify-out/\n├── graph.html       interactive graph - open in any browser, click nodes, search, filter by community\n├── GRAPH_REPORT.md  god nodes, surprising connections, suggested questions\n├── graph.json       persistent graph - query weeks later without re-reading\n└── cache/           SHA256 cache - re-runs only process changed files\n```\n\nAdd a `.graphifyignore` file to exclude folders you don't want in the graph:\n\n```\n# .graphifyignore\nvendor/\nnode_modules/\ndist/\n*.generated.py\n```\n\nSame syntax as `.gitignore`. You can keep a single `.graphifyignore` at your repo root — patterns work correctly even when graphify is run on a subfolder.\n\n## How it works\n\ngraphify runs in three passes. First, a deterministic AST pass extracts structure from code files (classes, functions, imports, call graphs, docstrings, rationale comments) with no LLM needed. Second, video and audio files are transcribed locally with faster-whisper using a domain-aware prompt derived from corpus god nodes — transcripts are cached so re-runs are instant. Third, Claude subagents run in parallel over docs, papers, images, and transcripts to extract concepts, relationships, and design rationale. The results are merged into a NetworkX graph, clustered with Leiden community detection, and exported as interactive HTML, queryable JSON, and a plain-language audit report.\n\n**Clustering is graph-topology-based — no embeddings.** Leiden finds communities by edge density. The semantic similarity edges that Claude extracts (`semantically_similar_to`, marked INFERRED) are already in the graph, so they influence community detection directly. The graph structure is the similarity signal — no separate embedding step or vector database needed.\n\nEvery relationship is tagged `EXTRACTED` (found directly in source), `INFERRED` (reasonable inference, with a confidence score), or `AMBIGUOUS` (flagged for review). You always know what was found vs guessed.\n\n## Install\n\n**Requires:** Python 3.10+ and one of: [Claude Code](https://claude.ai/code), [Codex](https://openai.com/codex), [OpenCode](https://opencode.ai), [Cursor](https://cursor.com), [Gemini CLI](https://github.com/google-gemini/gemini-cli), [GitHub Copilot CLI](https://docs.github.com/en/copilot/how-tos/copilot-cli), [VS Code Copilot Chat](https://code.visualstudio.com/docs/copilot/overview), [Aider](https://aider.chat), [OpenClaw](https://openclaw.ai), [Factory Droid](https://factory.ai), [Trae](https://trae.ai), [Kiro](https://kiro.dev), Hermes, or [Google Antigravity](https://antigravity.google)\n\n```bash\npip install graphifyy && graphify install\n# or with pipx (keeps the CLI isolated from your project environments)\npipx install graphifyy && graphify install\n```\n\n> **Official package:** The PyPI package is named `graphifyy` (install with `pip install graphifyy`). Other packages named `graphify*` on PyPI are not affiliated with this project. The only official repository is [safishamsi/graphify](https://github.com/safishamsi/graphify). The CLI and skill command are still `graphify`.\n\n> **`graphify: command not found`?** On Windows, pip user scripts land in `%APPDATA%\\Python\\PythonXY\\Scripts` — add that to your PATH or use `python -m graphify` instead. On macOS with pipx, run `pipx ensurepath` then restart your terminal.\n\n### Platform support\n\n| Platform | Install command |\n|----------|----------------|\n| Claude Code (Linux/Mac) | `graphify install` |\n| Claude Code (Windows) | `graphify install` (auto-detected) or `graphify install --platform windows` |\n| Codex | `graphify install --platform codex` |\n| OpenCode | `graphify install --platform opencode` |\n| GitHub Copilot CLI | `graphify install --platform copilot` |\n| VS Code Copilot Chat | `graphify vscode install` |\n| Aider | `graphify install --platform aider` |\n| OpenClaw | `graphify install --platform claw` |\n| Factory Droid | `graphify install --platform droid` |\n| Trae | `graphify install --platform trae` |\n| Trae CN | `graphify install --platform trae-cn` |\n| Gemini CLI | `graphify install --platform gemini` |\n| Hermes | `graphify install --platform hermes` |\n| Kiro IDE/CLI | `graphify kiro install` |\n| Cursor | `graphify cursor install` |\n| Google Antigravity | `graphify antigravity install` |\n\nCodex users also need `multi_agent = true` under `[features]` in `~/.codex/config.toml` for parallel extraction. Factory Droid uses the `Task` tool for parallel subagent dispatch. OpenClaw and Aider use sequential extraction (parallel agent support is still early on those platforms). Trae uses the Agent tool for parallel subagent dispatch and does **not** support PreToolUse hooks — AGENTS.md is the always-on mechanism. Codex supports PreToolUse hooks — `graphify codex install` installs one in `.codex/hooks.json` in addition to writing AGENTS.md.\n\nThen open your AI coding assistant and type:\n\n```\n/graphify .\n```\n\nNote: Codex uses `$` instead of `/` for skill calling, so type `$graphify .` instead.\n\n### Make your assistant always use the graph (recommended)\n\nAfter building a graph, run this once in your project:\n\n| Platform | Command |\n|----------|---------|\n| Claude Code | `graphify claude install` |\n| Codex | `graphify codex install` |\n| OpenCode | `graphify opencode install` |\n| GitHub Copilot CLI | `graphify copilot install` |\n| VS Code Copilot Chat | `graphify vscode install` |\n| Aider | `graphify aider install` |\n| OpenClaw | `graphify claw install` |\n| Factory Droid | `graphify droid install` |\n| Trae | `graphify trae install` |\n| Trae CN | `graphify trae-cn install` |\n| Cursor | `graphify cursor install` |\n| Gemini CLI | `graphify gemini install` |\n| Hermes | `graphify hermes install` |\n| Kiro IDE/CLI | `graphify kiro install` |\n| Google Antigravity | `graphify antigravity install` |\n\n**Claude Code** does two things: writes a `CLAUDE.md` section telling Claude to read `graphify-out/GRAPH_REPORT.md` before answering architecture questions, and installs a **PreToolUse hook** (`settings.json`) that fires before every Glob and Grep call. If a knowledge graph exists, Claude sees: _\"graphify: Knowledge graph exists. Read GRAPH_REPORT.md for god nodes and community structure before searching raw files.\"_ — so Claude navigates via the graph instead of grepping through every file.\n\n**Codex** writes to `AGENTS.md` and also installs a **PreToolUse hook** in `.codex/hooks.json` that fires before every Bash tool call — same always-on mechanism as Claude Code.\n\n**OpenCode** writes to `AGENTS.md` and also installs a **`tool.execute.before` plugin** (`.opencode/plugins/graphify.js` + `opencode.json` registration) that fires before bash tool calls and injects the graph reminder into tool output when the graph exists.\n\n**Cursor** writes `.cursor/rules/graphify.mdc` with `alwaysApply: true` — Cursor includes it in every conversation automatically, no hook needed.\n\n**Gemini CLI** copies the skill to `~/.gemini/skills/graphify/SKILL.md`, writes a `GEMINI.md` section, and installs a `BeforeTool` hook in `.gemini/settings.json` that fires before file-read tool calls — same always-on mechanism as Claude Code.\n\n**Aider, OpenClaw, Factory Droid, Trae, and Hermes** write the same rules to `AGENTS.md` in your project root and copy the skill to the platform's global skill directory. These platforms don't support tool hooks, so AGENTS.md is the always-on mechanism.\n\n**Kiro IDE/CLI** writes the skill to `.kiro/skills/graphify/SKILL.md` (invoked via `/graphify`) and a steering file to `.kiro/steering/graphify.md` with `inclusion: always` — Kiro injects this into every conversation automatically, no hook needed.\n\n**Google Antigravity** writes `.agent/rules/graphify.md` (always-on rules) and `.agent/workflows/graphify.md` (registers `/graphify` as a slash command). No hook equivalent exists in Antigravity — rules are the always-on mechanism.\n\n**GitHub Copilot CLI** copies the skill to `~/.copilot/skills/graphify/SKILL.md`. Run `graphify copilot install` to set it up.\n\n**VS Code Copilot Chat** installs a Python-only skill (works on Windows PowerShell and macOS/Linux alike) and writes `.github/copilot-instructions.md` in your project root — VS Code reads this automatically every session, making graph context always-on without any hook mechanism. Run `graphify vscode install`. Note: this configures the chat panel in VS Code, not the Copilot CLI terminal tool.\n\nUninstall with the matching uninstall command (e.g. `graphify claude uninstall`).\n\n**Always-on vs explicit trigger — what's the difference?**\n\nThe always-on hook surfaces `GRAPH_REPORT.md` — a one-page summary of god nodes, communities, and surprising connections. Your assistant reads this before searching files, so it navigates by structure instead of keyword matching. That covers most everyday questions.\n\n`/graphify query`, `/graphify path`, and `/graphify explain` go deeper: they traverse the raw `graph.json` hop by hop, trace exact paths between nodes, and surface edge-level detail (relation type, confidence score, source location). Use them when you want a specific question answered from the graph rather than a general orientation.\n\nThink of it this way: the always-on hook gives your assistant a map. The `/graphify` commands let it navigate the map precisely.\n\n### Team workflows\n\n`graphify-out/` is designed to be committed to git so every teammate starts with a fresh map.\n\n**Recommended `.gitignore` additions:**\n```\n# commit graph outputs, ignore the extraction cache\ngraphify-out/cache/\n```\n\n**Shared setup:**\n1. One person runs `/graphify .` to build the initial graph and commits `graphify-out/`.\n2. Everyone else pulls — their assistant reads `GRAPH_REPORT.md` immediately with no extra steps.\n3. Install the post-commit hook (`graphify hook install`) so the graph rebuilds automatically after code changes — no LLM calls needed for code-only updates.\n4. For doc/paper changes, whoever edits the files runs `/graphify --update` to refresh semantic nodes.\n\n**Excluding paths** — create `.graphifyignore` in your project root (same syntax as `.gitignore`). Files matching those patterns are skipped during detection and extraction.\n\n## Using `graph.json` with an LLM\n\n`graph.json` is not meant to be pasted into a prompt all at once. The useful\nworkflow is:\n\n1. Start with `graphify-out/GRAPH_REPORT.md` for the high-level overview.\n2. Use `graphify query` to pull a smaller subgraph for the specific question\n   you want to answer.\n3. Give that focused output to your assistant instead of dumping the full raw\n   corpus.\n\nFor example, after running graphify on a project:\n\n```bash\ngraphify query \"show the auth flow\" --graph graphify-out/graph.json\ngraphify query \"what connects DigestAuth to Response?\" --graph graphify-out/graph.json\n```\n\nThe output includes node labels, edge types, confidence tags, source files, and\nsource locations. That makes it a good intermediate context block for an LLM:\n\n```text\nUse this graph query output to answer the question. Prefer the graph structure\nover guessing, and cite the source files when possible.\n```\n\nIf your assistant supports tool calling or MCP, use the graph directly instead\nof pasting text. graphify can expose `graph.json` as an MCP server:\n\n```bash\npython -m graphify.serve graphify-out/graph.json\n```\n\nThat gives the assistant structured graph access for repeated queries such as\n`query_graph`, `get_node`, `get_neighbors`, and `shortest_path`.\n\n> **WSL / Linux note:** Ubuntu ships `python3`, not `python`. Install into a project venv to avoid PEP 668 conflicts, and use the full venv path in your `.mcp.json`:\n> ```bash\n> python3 -m venv .venv && .venv/bin/pip install \"graphifyy[mcp]\"\n> ```\n> ```json\n> { \"mcpServers\": { \"graphify\": { \"type\": \"stdio\", \"command\": \".venv/bin/python3\", \"args\": [\"-m\", \"graphify.serve\", \"graphify-out/graph.json\"] } } }\n> ```\n> Also note: the PyPI package is `graphifyy` (double-y) — `pip install graphify` installs an unrelated package.\n\n<details>\n<summary>Manual install (curl)</summary>\n\n```bash\nmkdir -p ~/.claude/skills/graphify\ncurl -fsSL https://raw.githubusercontent.com/safishamsi/graphify/v4/graphify/skill.md \\\n  > ~/.claude/skills/graphify/SKILL.md\n```\n\nAdd to `~/.claude/CLAUDE.md`:\n\n```\n- **graphify** (`~/.claude/skills/graphify/SKILL.md`) - any input to knowledge graph. Trigger: `/graphify`\nWhen the user types `/graphify`, invoke the Skill tool with `skill: \"graphify\"` before doing anything else.\n```\n\n</details>\n\n## Usage\n\n```\n/graphify                          # run on current directory\n/graphify ./raw                    # run on a specific folder\n/graphify ./raw --mode deep        # more aggressive INFERRED edge extraction\n/graphify ./raw --update           # re-extract only changed files, merge into existing graph\n/graphify ./raw --directed          # build directed graph (preserves edge direction: source→target)\n/graphify ./raw --cluster-only     # rerun clustering on existing graph, no re-extraction\n/graphify ./raw --no-viz           # skip HTML, just produce report + JSON\n/graphify ./raw --obsidian                          # also generate Obsidian vault (opt-in)\n/graphify ./raw --obsidian --obsidian-dir ~/vaults/myproject  # write vault to a specific directory\n\n/graphify add https://arxiv.org/abs/1706.03762        # fetch a paper, save, update graph\n/graphify add https://x.com/karpathy/status/...       # fetch a tweet\n/graphify add <video-url>                              # download audio, transcribe, add to graph\n/graphify add https://... --author \"Name\"             # tag the original author\n/graphify add https://... --contributor \"Name\"        # tag who added it to the corpus\n\n/graphify query \"what connects attention to the optimizer?\"\n/graphify query \"what connects attention to the optimizer?\" --dfs   # trace a specific path\n/graphify query \"what connects attention to the optimizer?\" --budget 1500  # cap at N tokens\n/graphify path \"DigestAuth\" \"Response\"\n/graphify explain \"SwinTransformer\"\n\n/graphify ./raw --watch            # auto-sync graph as files change (code: instant, docs: notifies you)\n/graphify ./raw --wiki             # build agent-crawlable wiki (index.md + article per community)\n/graphify ./raw --svg              # export graph.svg\n/graphify ./raw --graphml          # export graph.graphml (Gephi, yEd)\n/graphify ./raw --neo4j            # generate cypher.txt for Neo4j\n/graphify ./raw --neo4j-push bolt://localhost:7687    # push directly to a running Neo4j instance\n/graphify ./raw --mcp              # start MCP stdio server\n\n# git hooks - platform-agnostic, rebuild graph on commit and branch switch\ngraphify hook install\ngraphify hook uninstall\ngraphify hook status\n\n# always-on assistant instructions - platform-specific\ngraphify claude install            # CLAUDE.md + PreToolUse hook (Claude Code)\ngraphify claude uninstall\ngraphify codex install             # AGENTS.md + PreToolUse hook in .codex/hooks.json (Codex)\ngraphify opencode install          # AGENTS.md + tool.execute.before plugin (OpenCode)\ngraphify cursor install            # .cursor/rules/graphify.mdc (Cursor)\ngraphify cursor uninstall\ngraphify gemini install            # GEMINI.md + BeforeTool hook (Gemini CLI)\ngraphify gemini uninstall\ngraphify copilot install           # skill file (GitHub Copilot CLI)\ngraphify copilot uninstall\ngraphify aider install             # AGENTS.md (Aider)\ngraphify aider uninstall\ngraphify claw install              # AGENTS.md (OpenClaw)\ngraphify droid install             # AGENTS.md (Factory Droid)\ngraphify trae install              # AGENTS.md (Trae)\ngraphify trae uninstall\ngraphify trae-cn install           # AGENTS.md (Trae CN)\ngraphify trae-cn uninstall\ngraphify hermes install             # AGENTS.md + ~/.hermes/skills/ (Hermes)\ngraphify hermes uninstall\ngraphify kiro install               # .kiro/skills/ + .kiro/steering/graphify.md (Kiro IDE/CLI)\ngraphify kiro uninstall\ngraphify antigravity install       # .agent/rules + .agent/workflows (Google Antigravity)\ngraphify antigravity uninstall\n\n# query and navigate the graph directly from the terminal (no AI assistant needed)\ngraphify query \"what connects attention to the optimizer?\"\ngraphify query \"show the auth flow\" --dfs\ngraphify query \"what is CfgNode?\" --budget 500\ngraphify query \"...\" --graph path/to/graph.json\ngraphify path \"DigestAuth\" \"Response\"       # shortest path between two nodes\ngraphify explain \"SwinTransformer\"           # plain-language explanation of a node\n\n# add content and update the graph from the terminal\ngraphify add https://arxiv.org/abs/1706.03762          # fetch paper, save to ./raw, update graph\ngraphify add https://... --author \"Name\" --contributor \"Name\"\n\n# incremental update and maintenance\ngraphify watch ./src                         # auto-rebuild on code changes\ngraphify update ./src                        # re-extract code files, no LLM needed\ngraphify cluster-only ./my-project           # rerun clustering on existing graph.json\n```\n\nWorks with any mix of file types:\n\n| Type | Extensions | Extraction |\n|------|-----------|------------|\n| Code | `.py .ts .js .jsx .tsx .mjs .go .rs .java .c .cpp .rb .cs .kt .scala .php .swift .lua .zig .ps1 .ex .exs .m .mm .jl .vue .svelte` | AST via tree-sitter + call-graph (cross-file for all languages) + docstring/comment rationale |\n| Docs | `.md .mdx .html .txt .rst` | Concepts + relationships + design rationale via Claude |\n| Office | `.docx .xlsx` | Converted to markdown then extracted via Claude (requires `pip install graphifyy[office]`) |\n| Papers | `.pdf` | Citation mining + concept extraction |\n| Images | `.png .jpg .webp .gif` | Claude vision - screenshots, diagrams, any language |\n| Video / Audio | `.mp4 .mov .mkv .webm .avi .m4v .mp3 .wav .m4a .ogg` | Transcribed locally with faster-whisper, transcript fed into Claude extraction (requires `pip install graphifyy[video]`) |\n| YouTube / URLs | any video URL | Audio downloaded via yt-dlp, then same Whisper pipeline (requires `pip install graphifyy[video]`) |\n\n## Video and audio corpus\n\nDrop video or audio files into your corpus folder alongside your code and docs — graphify picks them up automatically:\n\n```bash\npip install 'graphifyy[video]'   # one-time setup\n/graphify ./my-corpus            # transcribes any video/audio files it finds\n```\n\nAdd a YouTube video (or any public video URL) directly:\n\n```bash\n/graphify add <video-url>\n```\n\nyt-dlp downloads audio-only (fast, small), Whisper transcribes it locally, and the transcript is fed into the same extraction pipeline as your other docs. Transcripts are cached in `graphify-out/transcripts/` so re-runs skip already-transcribed files.\n\nFor better accuracy on technical content, use a larger model:\n\n```bash\n/graphify ./my-corpus --whisper-model medium\n```\n\nAudio never leaves your machine. All transcription runs locally.\n\n## What you get\n\n**God nodes** - highest-degree concepts (what everything connects through)\n\n**Surprising connections** - ranked by composite score. Code-paper edges rank higher than code-code. Each result includes a plain-English why.\n\n**Suggested questions** - 4-5 questions the graph is uniquely positioned to answer\n\n**The \"why\"** - docstrings, inline comments (`# NOTE:`, `# IMPORTANT:`, `# HACK:`, `# WHY:`), and design rationale from docs are extracted as `rationale_for` nodes. Not just what the code does - why it was written that way.\n\n**Confidence scores** - every INFERRED edge has a `confidence_score` (0.0-1.0). You know not just what was guessed but how confident the model was. EXTRACTED edges are always 1.0.\n\n**Semantic similarity edges** - cross-file conceptual links with no structural connection. Two functions solving the same problem without calling each other, a class in code and a concept in a paper describing the same algorithm.\n\n**Hyperedges** - group relationships connecting 3+ nodes that pairwise edges can't express. All classes implementing a shared protocol, all functions in an auth flow, all concepts from a paper section forming one idea.\n\n**Token benchmark** - printed automatically after every run. On a mixed corpus (Karpathy repos + papers + images): **71.5x** fewer tokens per query vs reading raw files. The first run extracts and builds the graph (this costs tokens). Every subsequent query reads the compact graph instead of raw files — that's where the savings compound. The SHA256 cache means re-runs only re-process changed files.\n\n**Auto-sync** (`--watch`) - run in a background terminal and the graph updates itself as your codebase changes. Code file saves trigger an instant rebuild (AST only, no LLM). Doc/image changes notify you to run `--update` for the LLM re-pass.\n\n**Git hooks** (`graphify hook install`) - installs post-commit and post-checkout hooks. Graph rebuilds automatically after every commit and every branch switch. If a rebuild fails, the hook exits with a non-zero code so git surfaces the error instead of silently continuing. No background process needed.\n\n**Wiki** (`--wiki`) - Wikipedia-style markdown articles per community and god node, with an `index.md` entry point. Point any agent at `index.md` and it can navigate the knowledge base by reading files instead of parsing JSON.\n\n## Worked examples\n\n| Corpus | Files | Reduction | Output |\n|--------|-------|-----------|--------|\n| Karpathy repos + 5 papers + 4 images | 52 | **71.5x** | [`worked/karpathy-repos/`](worked/karpathy-repos/) |\n| graphify source + Transformer paper | 4 | **5.4x** | [`worked/mixed-corpus/`](worked/mixed-corpus/) |\n| httpx (synthetic Python library) | 6 | ~1x | [`worked/httpx/`](worked/httpx/) |\n\nToken reduction scales with corpus size. 6 files fits in a context window anyway, so graph value there is structural clarity, not compression. At 52 files (code + papers + images) you get 71x+. Each `worked/` folder has the raw input files and the actual output (`GRAPH_REPORT.md`, `graph.json`) so you can run it yourself and verify the numbers.\n\n## Privacy\n\ngraphify sends file contents to your AI coding assistant's underlying model API for semantic extraction of docs, papers, and images — Anthropic (Claude Code), OpenAI (Codex), or whichever provider your platform uses. Code files are processed locally via tree-sitter AST — no file contents leave your machine for code. Video and audio files are transcribed locally with faster-whisper — audio never leaves your machine. No telemetry, usage tracking, or analytics of any kind. The only network calls are to your platform's model API during extraction, using your own API key.\n\n## Tech stack\n\nNetworkX + Leiden (graspologic) + tree-sitter + vis.js. Semantic extraction via Claude (Claude Code), GPT-4 (Codex), or whichever model your platform runs. Video transcription via faster-whisper + yt-dlp (optional, `pip install graphifyy[video]`). No Neo4j required, no server, runs entirely locally.\n\n## Built on graphify — Penpax\n\n[**Penpax**](https://safishamsi.github.io/penpax.ai) is the enterprise layer on top of graphify. Where graphify turns a folder of files into a knowledge graph, Penpax applies the same graph to your entire working life — continuously.\n\n| | graphify | Penpax |\n|---|---|---|\n| Input | A folder of files | Browser history, meetings, emails, files, code — everything |\n| Runs | On demand | Continuously in the background |\n| Scope | A project | Your entire working life |\n| Query | CLI / MCP / AI skill | Natural language, always on |\n| Privacy | Local by default | Fully on-device, no cloud |\n\nBuilt for lawyers, consultants, executives, doctors, researchers — anyone whose work lives across hundreds of conversations and documents they can never fully reconstruct.\n\n**Free trial launching soon.** [Join the waitlist →](https://safishamsi.github.io/penpax.ai)\n\n## What we are building next\n\ngraphify is the graph layer. Penpax is the always-on layer on top of it — an on-device digital twin that connects your meetings, browser history, files, emails, and code into one continuously updating knowledge graph. No cloud, no training on your data. [Join the waitlist.](https://safishamsi.github.io/penpax.ai)\n\n## Star history\n\n[![Star History Chart](https://api.star-history.com/svg?repos=safishamsi/graphify&type=Date)](https://star-history.com/#safishamsi/graphify&Date)\n\n<details>\n<summary>Contributing</summary>\n\n**Worked examples** are the most trust-building contribution. Run `/graphify` on a real corpus, save output to `worked/{slug}/`, write an honest `review.md` evaluating what the graph got right and wrong, submit a PR.\n\n**Extraction bugs** - open an issue with the input file, the cache entry (`graphify-out/cache/`), and what was missed or invented.\n\nSee [ARCHITECTURE.md](ARCHITECTURE.md) for module responsibilities and how to add a language.\n\n</details>\n","summary":"graphify is an AI‑enabled coding‑assistant tool that scans a directory, extracts structure from code, documents, images, and even audio or video files, and builds an interactive knowledge graph in minutes. By combining a deterministic AST pass, local Whisper transcription, and Claude sub‑agents, it surfaces classes, functions, import dependencies, design rationale and semantic connections across a range of languages while clustering communities with Leiden. The output—an explorable HTML graph, JSON data, and a plain‑language audit report—lets developers quickly grasp the “why” behind a codebase and discover unfamiliar relationships. Engineers, code reviewers, and technical writers can use it to understand unfamiliar projects, refactor, and document decisions more efficiently.","description":"AI coding assistant skill (Claude Code, Codex, OpenCode, Cursor, Gemini CLI, GitHub Copilot CLI, OpenClaw, Factory Droid, Trae, Google Antigravity). Turn any folder of code, docs, papers, images, or videos into a queryable knowledge graph","stars":30771,"language":"Python"},{"owner":"tobi","repo":"qmd","url":"https://github.com/tobi/qmd","readme":"# QMD - Query Markup Documents\n\nAn on-device search engine for everything you need to remember. Index your markdown notes, meeting transcripts, documentation, and knowledge bases. Search with keywords or natural language. Ideal for your agentic flows.\n\nQMD combines BM25 full-text search, vector semantic search, and LLM re-ranking—all running locally via node-llama-cpp with GGUF models.\n\n![QMD Architecture](assets/qmd-architecture.png)\n\nYou can read more about QMD's progress in the [CHANGELOG](CHANGELOG.md).\n\n## Quick Start\n\n```sh\n# Install globally (Node or Bun)\nnpm install -g @tobilu/qmd\n# or\nbun install -g @tobilu/qmd\n\n# Or run directly\nnpx @tobilu/qmd ...\nbunx @tobilu/qmd ...\n\n# Create collections for your notes, docs, and meeting transcripts\nqmd collection add ~/notes --name notes\nqmd collection add ~/Documents/meetings --name meetings\nqmd collection add ~/work/docs --name docs\n\n# Add context to help with search results, each piece of context will be returned when matching sub documents are returned. This works as a tree. This is the key feature of QMD as it allows LLMs to make much better contextual choices when selecting documents. Don't sleep on it!\nqmd context add qmd://notes \"Personal notes and ideas\"\nqmd context add qmd://meetings \"Meeting transcripts and notes\"\nqmd context add qmd://docs \"Work documentation\"\n\n# Generate embeddings for semantic search\nqmd embed\n\n# Search across everything\nqmd search \"project timeline\"           # Fast keyword search\nqmd vsearch \"how to deploy\"             # Semantic search\nqmd query \"quarterly planning process\"  # Hybrid + reranking (best quality)\n\n# Get a specific document\nqmd get \"meetings/2024-01-15.md\"\n\n# Get a document by docid (shown in search results)\nqmd get \"#abc123\"\n\n# Get multiple documents by glob pattern\nqmd multi-get \"journals/2025-05*.md\"\n\n# Search within a specific collection\nqmd search \"API\" -c notes\n\n# Export all matches for an agent\nqmd search \"API\" --all --files --min-score 0.3\n```\n\n### Using with AI Agents\n\nQMD's `--json` and `--files` output formats are designed for agentic workflows:\n\n```sh\n# Get structured results for an LLM\nqmd search \"authentication\" --json -n 10\n\n# List all relevant files above a threshold\nqmd query \"error handling\" --all --files --min-score 0.4\n\n# Retrieve full document content\nqmd get \"docs/api-reference.md\" --full\n```\n\n### MCP Server\n\nAlthough the tool works perfectly fine when you just tell your agent to use it on the command line, it also exposes an MCP (Model Context Protocol) server for tighter integration.\n\n**Tools exposed:**\n- `query` — Search with typed sub-queries (`lex`/`vec`/`hyde`), combined via RRF + reranking\n- `get` — Retrieve a document by path or docid (with fuzzy matching suggestions)\n- `multi_get` — Batch retrieve by glob pattern, comma-separated list, or docids\n- `status` — Index health and collection info\n\n**Claude Desktop configuration** (`~/Library/Application Support/Claude/claude_desktop_config.json`):\n\n```json\n{\n  \"mcpServers\": {\n    \"qmd\": {\n      \"command\": \"qmd\",\n      \"args\": [\"mcp\"]\n    }\n  }\n}\n```\n\n**Claude Code** — Install the plugin (recommended):\n\n```bash\nclaude plugin marketplace add tobi/qmd\nclaude plugin install qmd@qmd\n```\n\nOr configure MCP manually in `~/.claude/settings.json`:\n\n```json\n{\n  \"mcpServers\": {\n    \"qmd\": {\n      \"command\": \"qmd\",\n      \"args\": [\"mcp\"]\n    }\n  }\n}\n```\n\n#### HTTP Transport\n\nBy default, QMD's MCP server uses stdio (launched as a subprocess by each client). For a shared, long-lived server that avoids repeated model loading, use the HTTP transport:\n\n```sh\n# Foreground (Ctrl-C to stop)\nqmd mcp --http                    # localhost:8181\nqmd mcp --http --port 8080        # custom port\n\n# Background daemon\nqmd mcp --http --daemon           # start, writes PID to ~/.cache/qmd/mcp.pid\nqmd mcp stop                      # stop via PID file\nqmd status                        # shows \"MCP: running (PID ...)\" when active\n```\n\nThe HTTP server exposes two endpoints:\n- `POST /mcp` — MCP Streamable HTTP (JSON responses, stateless)\n- `GET /health` — liveness check with uptime\n\nLLM models stay loaded in VRAM across requests. Embedding/reranking contexts are disposed after 5 min idle and transparently recreated on the next request (~1s penalty, models remain loaded).\n\nPoint any MCP client at `http://localhost:8181/mcp` to connect.\n\n### SDK / Library Usage\n\nUse QMD as a library in your own Node.js or Bun applications.\n\n#### Installation\n\n```sh\nnpm install @tobilu/qmd\n```\n\n#### Quick Start\n\n```typescript\nimport { createStore } from '@tobilu/qmd'\n\nconst store = await createStore({\n  dbPath: './my-index.sqlite',\n  config: {\n    collections: {\n      docs: { path: '/path/to/docs', pattern: '**/*.md' },\n    },\n  },\n})\n\nconst results = await store.search({ query: \"authentication flow\" })\nconsole.log(results.map(r => `${r.title} (${Math.round(r.score * 100)}%)`))\n\nawait store.close()\n```\n\n#### Store Creation\n\n`createStore()` accepts three modes:\n\n```typescript\nimport { createStore } from '@tobilu/qmd'\n\n// 1. Inline config — no files needed besides the DB\nconst store = await createStore({\n  dbPath: './index.sqlite',\n  config: {\n    collections: {\n      docs: { path: '/path/to/docs', pattern: '**/*.md' },\n      notes: { path: '/path/to/notes' },\n    },\n  },\n})\n\n// 2. YAML config file — collections defined in a file\nconst store2 = await createStore({\n  dbPath: './index.sqlite',\n  configPath: './qmd.yml',\n})\n\n// 3. DB-only — reopen a previously configured store\nconst store3 = await createStore({ dbPath: './index.sqlite' })\n```\n\n#### Search\n\nThe unified `search()` method handles both simple queries and pre-expanded structured queries:\n\n```typescript\n// Simple query — auto-expanded via LLM, then BM25 + vector + reranking\nconst results = await store.search({ query: \"authentication flow\" })\n\n// With options\nconst results2 = await store.search({\n  query: \"rate limiting\",\n  intent: \"API throttling and abuse prevention\",\n  collection: \"docs\",\n  limit: 5,\n  minScore: 0.3,\n  explain: true,\n})\n\n// Pre-expanded queries — skip auto-expansion, control each sub-query\nconst results3 = await store.search({\n  queries: [\n    { type: 'lex', query: '\"connection pool\" timeout -redis' },\n    { type: 'vec', query: 'why do database connections time out under load' },\n  ],\n  collections: [\"docs\", \"notes\"],\n})\n\n// Skip reranking for faster results\nconst fast = await store.search({ query: \"auth\", rerank: false })\n```\n\nFor direct backend access:\n\n```typescript\n// BM25 keyword search (fast, no LLM)\nconst lexResults = await store.searchLex(\"auth middleware\", { limit: 10 })\n\n// Vector similarity search (embedding model, no reranking)\nconst vecResults = await store.searchVector(\"how users log in\", { limit: 10 })\n\n// Manual query expansion for full control\nconst expanded = await store.expandQuery(\"auth flow\", { intent: \"user login\" })\nconst results4 = await store.search({ queries: expanded })\n```\n\n#### Retrieval\n\n```typescript\n// Get a document by path or docid\nconst doc = await store.get(\"docs/readme.md\")\nconst byId = await store.get(\"#abc123\")\n\nif (!(\"error\" in doc)) {\n  console.log(doc.title, doc.displayPath, doc.context)\n}\n\n// Get document body with line range\nconst body = await store.getDocumentBody(\"docs/readme.md\", {\n  fromLine: 50,\n  maxLines: 100,\n})\n\n// Batch retrieve by glob or comma-separated list\nconst { docs, errors } = await store.multiGet(\"docs/**/*.md\", {\n  maxBytes: 20480,\n})\n```\n\n#### Collections\n\n```typescript\n// Add a collection\nawait store.addCollection(\"myapp\", {\n  path: \"/src/myapp\",\n  pattern: \"**/*.ts\",\n  ignore: [\"node_modules/**\", \"*.test.ts\"],\n})\n\n// List collections with document stats\nconst collections = await store.listCollections()\n// => [{ name, pwd, glob_pattern, doc_count, active_count, last_modified, includeByDefault }]\n\n// Get names of collections included in queries by default\nconst defaults = await store.getDefaultCollectionNames()\n\n// Remove / rename\nawait store.removeCollection(\"myapp\")\nawait store.renameCollection(\"old-name\", \"new-name\")\n```\n\n#### Context\n\nContext adds descriptive metadata that improves search relevance and is returned alongside results:\n\n```typescript\n// Add context for a path within a collection\nawait store.addContext(\"docs\", \"/api\", \"REST API reference documentation\")\n\n// Set global context (applies to all collections)\nawait store.setGlobalContext(\"Internal engineering documentation\")\n\n// List all contexts\nconst contexts = await store.listContexts()\n// => [{ collection, path, context }]\n\n// Remove context\nawait store.removeContext(\"docs\", \"/api\")\nawait store.setGlobalContext(undefined)  // clear global\n```\n\n#### Indexing\n\n```typescript\n// Re-index collections by scanning the filesystem\nconst result = await store.update({\n  collections: [\"docs\"],  // optional — defaults to all\n  onProgress: ({ collection, file, current, total }) => {\n    console.log(`[${collection}] ${current}/${total} ${file}`)\n  },\n})\n// => { collections, indexed, updated, unchanged, removed, needsEmbedding }\n\n// Generate vector embeddings\nconst embedResult = await store.embed({\n  force: false,           // true to re-embed everything\n  chunkStrategy: \"auto\",  // \"regex\" (default) or \"auto\" (AST for code files)\n  onProgress: ({ current, total, collection }) => {\n    console.log(`Embedding ${current}/${total}`)\n  },\n})\n```\n\n#### Types\n\nKey types exported for SDK consumers:\n\n```typescript\nimport type {\n  QMDStore,            // The store interface\n  SearchOptions,       // Options for search()\n  LexSearchOptions,    // Options for searchLex()\n  VectorSearchOptions, // Options for searchVector()\n  HybridQueryResult,   // Search result with score, snippet, context\n  SearchResult,        // Result from searchLex/searchVector\n  ExpandedQuery,       // Typed sub-query { type: 'lex'|'vec'|'hyde', query }\n  DocumentResult,      // Document metadata + body\n  DocumentNotFound,    // Error with similarFiles suggestions\n  MultiGetResult,      // Batch retrieval result\n  UpdateProgress,      // Progress callback info for update()\n  UpdateResult,        // Aggregated update result\n  EmbedProgress,       // Progress callback info for embed()\n  EmbedResult,         // Embedding result\n  StoreOptions,        // createStore() options\n  CollectionConfig,    // Inline config shape\n  IndexStatus,         // From getStatus()\n  IndexHealthInfo,     // From getIndexHealth()\n} from '@tobilu/qmd'\n```\n\nUtility exports:\n\n```typescript\nimport {\n  extractSnippet,              // Extract a relevant snippet from text\n  addLineNumbers,              // Add line numbers to text\n  DEFAULT_MULTI_GET_MAX_BYTES, // Default max file size for multiGet (10KB)\n  Maintenance,                 // Database maintenance operations\n} from '@tobilu/qmd'\n```\n\n#### Lifecycle\n\n```typescript\n// Close the store — disposes LLM models and DB connection\nawait store.close()\n```\n\nThe SDK requires explicit `dbPath` — no defaults are assumed. This makes it safe to embed in any application without side effects.\n\n## Architecture\n\n```\n┌─────────────────────────────────────────────────────────────────────────────┐\n│                         QMD Hybrid Search Pipeline                          │\n└─────────────────────────────────────────────────────────────────────────────┘\n\n                              ┌─────────────────┐\n                              │   User Query    │\n                              └────────┬────────┘\n                                       │\n                        ┌──────────────┴──────────────┐\n                        ▼                             ▼\n               ┌────────────────┐            ┌────────────────┐\n               │ Query Expansion│            │  Original Query│\n               │  (fine-tuned)  │            │   (×2 weight)  │\n               └───────┬────────┘            └───────┬────────┘\n                       │                             │\n                       │ 2 alternative queries       │\n                       └──────────────┬──────────────┘\n                                      │\n              ┌───────────────────────┼───────────────────────┐\n              ▼                       ▼                       ▼\n     ┌─────────────────┐     ┌─────────────────┐     ┌─────────────────┐\n     │ Original Query  │     │ Expanded Query 1│     │ Expanded Query 2│\n     └────────┬────────┘     └────────┬────────┘     └────────┬────────┘\n              │                       │                       │\n      ┌───────┴───────┐       ┌───────┴───────┐       ┌───────┴───────┐\n      ▼               ▼       ▼               ▼       ▼               ▼\n  ┌───────┐       ┌───────┐ ┌───────┐     ┌───────┐ ┌───────┐     ┌───────┐\n  │ BM25  │       │Vector │ │ BM25  │     │Vector │ │ BM25  │     │Vector │\n  │(FTS5) │       │Search │ │(FTS5) │     │Search │ │(FTS5) │     │Search │\n  └───┬───┘       └───┬───┘ └───┬───┘     └───┬───┘ └───┬───┘     └───┬───┘\n      │               │         │             │         │             │\n      └───────┬───────┘         └──────┬──────┘         └──────┬──────┘\n              │                        │                       │\n              └────────────────────────┼───────────────────────┘\n                                       │\n                                       ▼\n                          ┌───────────────────────┐\n                          │   RRF Fusion + Bonus  │\n                          │  Original query: ×2   │\n                          │  Top-rank bonus: +0.05│\n                          │     Top 30 Kept       │\n                          └───────────┬───────────┘\n                                      │\n                                      ▼\n                          ┌───────────────────────┐\n                          │    LLM Re-ranking     │\n                          │  (qwen3-reranker)     │\n                          │  Yes/No + logprobs    │\n                          └───────────┬───────────┘\n                                      │\n                                      ▼\n                          ┌───────────────────────┐\n                          │  Position-Aware Blend │\n                          │  Top 1-3:  75% RRF    │\n                          │  Top 4-10: 60% RRF    │\n                          │  Top 11+:  40% RRF    │\n                          └───────────────────────┘\n```\n\n## Score Normalization & Fusion\n\n### Search Backends\n\n| Backend | Raw Score | Conversion | Range |\n|---------|-----------|------------|-------|\n| **FTS (BM25)** | SQLite FTS5 BM25 | `Math.abs(score)` | 0 to ~25+ |\n| **Vector** | Cosine distance | `1 / (1 + distance)` | 0.0 to 1.0 |\n| **Reranker** | LLM 0-10 rating | `score / 10` | 0.0 to 1.0 |\n\n### Fusion Strategy\n\nThe `query` command uses **Reciprocal Rank Fusion (RRF)** with position-aware blending:\n\n1. **Query Expansion**: Original query (×2 for weighting) + 1 LLM variation\n2. **Parallel Retrieval**: Each query searches both FTS and vector indexes\n3. **RRF Fusion**: Combine all result lists using `score = Σ(1/(k+rank+1))` where k=60\n4. **Top-Rank Bonus**: Documents ranking #1 in any list get +0.05, #2-3 get +0.02\n5. **Top-K Selection**: Take top 30 candidates for reranking\n6. **Re-ranking**: LLM scores each document (yes/no with logprobs confidence)\n7. **Position-Aware Blending**:\n   - RRF rank 1-3: 75% retrieval, 25% reranker (preserves exact matches)\n   - RRF rank 4-10: 60% retrieval, 40% reranker\n   - RRF rank 11+: 40% retrieval, 60% reranker (trust reranker more)\n\n**Why this approach**: Pure RRF can dilute exact matches when expanded queries don't match. The top-rank bonus preserves documents that score #1 for the original query. Position-aware blending prevents the reranker from destroying high-confidence retrieval results.\n\n### Score Interpretation\n\n| Score | Meaning |\n|-------|---------|\n| 0.8 - 1.0 | Highly relevant |\n| 0.5 - 0.8 | Moderately relevant |\n| 0.2 - 0.5 | Somewhat relevant |\n| 0.0 - 0.2 | Low relevance |\n\n## Requirements\n\n### System Requirements\n\n- **Node.js** >= 22\n- **Bun** >= 1.0.0\n- **macOS**: Homebrew SQLite (for extension support)\n  ```sh\n  brew install sqlite\n  ```\n\n### GGUF Models (via node-llama-cpp)\n\nQMD uses three local GGUF models (auto-downloaded on first use):\n\n| Model | Purpose | Size |\n|-------|---------|------|\n| `embeddinggemma-300M-Q8_0` | Vector embeddings (default) | ~300MB |\n| `qwen3-reranker-0.6b-q8_0` | Re-ranking | ~640MB |\n| `qmd-query-expansion-1.7B-q4_k_m` | Query expansion (fine-tuned) | ~1.1GB |\n\nModels are downloaded from HuggingFace and cached in `~/.cache/qmd/models/`.\n\n### Custom Embedding Model\n\nOverride the default embedding model via the `QMD_EMBED_MODEL` environment variable.\nThis is useful for multilingual corpora (e.g. Chinese, Japanese, Korean) where\n`embeddinggemma-300M` has limited coverage.\n\n```sh\n# Use Qwen3-Embedding-0.6B for better multilingual (CJK) support\nexport QMD_EMBED_MODEL=\"hf:Qwen/Qwen3-Embedding-0.6B-GGUF/Qwen3-Embedding-0.6B-Q8_0.gguf\"\n\n# After changing the model, re-embed all collections:\nqmd embed -f\n```\n\nSupported model families:\n- **embeddinggemma** (default) — English-optimized, small footprint\n- **Qwen3-Embedding** — Multilingual (119 languages including CJK), MTEB top-ranked\n\n> **Note:** When switching embedding models, you must re-index with `qmd embed -f`\n> since vectors are not cross-compatible between models. The prompt format is\n> automatically adjusted for each model family.\n\n## Installation\n\n```sh\nnpm install -g @tobilu/qmd\n# or\nbun install -g @tobilu/qmd\n```\n\n### Development\n\n```sh\ngit clone https://github.com/tobi/qmd\ncd qmd\nnpm install\nnpm link\n```\n\n## Usage\n\n### Collection Management\n\n```sh\n# Create a collection from current directory\nqmd collection add . --name myproject\n\n# Create a collection with explicit path and custom glob mask\nqmd collection add ~/Documents/notes --name notes --mask \"**/*.md\"\n\n# List all collections\nqmd collection list\n\n# Remove a collection\nqmd collection remove myproject\n\n# Rename a collection\nqmd collection rename myproject my-project\n\n# List files in a collection\nqmd ls notes\nqmd ls notes/subfolder\n```\n\n### Generate Vector Embeddings\n\n```sh\n# Embed all indexed documents (900 tokens/chunk, 15% overlap)\nqmd embed\n\n# Force re-embed everything\nqmd embed -f\n\n# Enable AST-aware chunking for code files (TS, JS, Python, Go, Rust)\nqmd embed --chunk-strategy auto\n\n# Also works with query for consistent chunk selection\nqmd query \"auth flow\" --chunk-strategy auto\n```\n\n**AST-aware chunking** (`--chunk-strategy auto`) uses tree-sitter to chunk code\nfiles at function, class, and import boundaries instead of arbitrary text\npositions. This produces higher-quality chunks and better search results for\ncodebases. Markdown and other file types always use regex-based chunking\nregardless of strategy.\n\nThe default is `regex` (existing behavior). Use `--chunk-strategy auto` to\nopt in. Run `qmd status` to verify which grammars are available.\n\n> **Note:** Tree-sitter grammars are optional dependencies. If they are not\n> installed, `--chunk-strategy auto` falls back to regex-only chunking\n> automatically. Tested on both Node.js and Bun.\n\n### Context Management\n\nContext adds descriptive metadata to collections and paths, helping search understand your content.\n\n```sh\n# Add context to a collection (using qmd:// virtual paths)\nqmd context add qmd://notes \"Personal notes and ideas\"\nqmd context add qmd://docs/api \"API documentation\"\n\n# Add context from within a collection directory\ncd ~/notes && qmd context add \"Personal notes and ideas\"\ncd ~/notes/work && qmd context add \"Work-related notes\"\n\n# Add global context (applies to all collections)\nqmd context add / \"Knowledge base for my projects\"\n\n# List all contexts\nqmd context list\n\n# Remove context\nqmd context rm qmd://notes/old\n```\n\n### Search Commands\n\n```\n┌──────────────────────────────────────────────────────────────────┐\n│                        Search Modes                              │\n├──────────┬───────────────────────────────────────────────────────┤\n│ search   │ BM25 full-text search only                           │\n│ vsearch  │ Vector semantic search only                          │\n│ query    │ Hybrid: FTS + Vector + Query Expansion + Re-ranking  │\n└──────────┴───────────────────────────────────────────────────────┘\n```\n\n```sh\n# Full-text search (fast, keyword-based)\nqmd search \"authentication flow\"\n\n# Vector search (semantic similarity)\nqmd vsearch \"how to login\"\n\n# Hybrid search with re-ranking (best quality)\nqmd query \"user authentication\"\n```\n\n### Options\n\n```sh\n# Search options\n-n <num>           # Number of results (default: 5, or 20 for --files/--json)\n-c, --collection   # Restrict search to a specific collection\n--all              # Return all matches (use with --min-score to filter)\n--min-score <num>  # Minimum score threshold (default: 0)\n--full             # Show full document content\n--line-numbers     # Add line numbers to output\n--explain          # Include retrieval score traces (query, JSON/CLI output)\n--index <name>     # Use named index\n\n# Output formats (for search and multi-get)\n--files            # Output: docid,score,filepath,context\n--json             # JSON output with snippets\n--csv              # CSV output\n--md               # Markdown output\n--xml              # XML output\n\n# Get options\nqmd get <file>[:line]  # Get document, optionally starting at line\n-l <num>               # Maximum lines to return\n--from <num>           # Start from line number\n\n# Multi-get options\n-l <num>           # Maximum lines per file\n--max-bytes <num>  # Skip files larger than N bytes (default: 10KB)\n```\n\n### Output Format\n\nDefault output is colorized CLI format (respects `NO_COLOR` env).\n\nWhen stdout is a TTY, result paths are emitted as clickable terminal hyperlinks (OSC 8). Clicking a path opens the file in your editor using an editor URI template.\n\nWhen stdout is not a TTY (for example piped to another command or redirected to a file), QMD emits plain text paths with no escape sequences.\n\nTTY example:\n\n```\ndocs/guide.md:42 #a1b2c3\nTitle: Software Craftsmanship\nContext: Work documentation\nScore: 93%\n\nThis section covers the **craftsmanship** of building\nquality software with attention to detail.\nSee also: engineering principles\n\n\nnotes/meeting.md:15 #d4e5f6\nTitle: Q4 Planning\nContext: Personal notes and ideas\nScore: 67%\n\nDiscussion about code quality and craftsmanship\nin the development process.\n```\n\nConfigure the editor link target with `QMD_EDITOR_URI` (or `editor_uri` in config):\n\n```sh\n# VS Code (default)\nexport QMD_EDITOR_URI=\"vscode://file/{path}:{line}:{col}\"\n\n# Cursor\nexport QMD_EDITOR_URI=\"cursor://file/{path}:{line}:{col}\"\n\n# Zed\nexport QMD_EDITOR_URI=\"zed://file/{path}:{line}:{col}\"\n\n# Sublime Text\nexport QMD_EDITOR_URI=\"subl://open?url=file://{path}&line={line}\"\n```\n\nTemplate placeholders:\n- `{path}` absolute filesystem path (URI-encoded)\n- `{line}` 1-based line number\n- `{col}` or `{column}` 1-based column number\n\n- **Path**: Collection-relative path (e.g., `docs/guide.md`)\n- **Docid**: Short hash identifier (e.g., `#a1b2c3`) - use with `qmd get #a1b2c3`\n- **Title**: Extracted from document (first heading or filename)\n- **Context**: Path context if configured via `qmd context add`\n- **Score**: Color-coded (green >70%, yellow >40%, dim otherwise)\n- **Snippet**: Context around match with query terms highlighted\n\n### Examples\n\n```sh\n# Get 10 results with minimum score 0.3\nqmd query -n 10 --min-score 0.3 \"API design patterns\"\n\n# Output as markdown for LLM context\nqmd search --md --full \"error handling\"\n\n# JSON output for scripting\nqmd query --json \"quarterly reports\"\n\n# Inspect how each result was scored (RRF + rerank blend)\nqmd query --json --explain \"quarterly reports\"\n\n# Use separate index for different knowledge base\nqmd --index work search \"quarterly reports\"\n```\n\n### Index Maintenance\n\n```sh\n# Show index status and collections with contexts\nqmd status\n\n# Re-index all collections\nqmd update\n\n# Re-index with git pull first (for remote repos)\nqmd update --pull\n\n# Get document by filepath (with fuzzy matching suggestions)\nqmd get notes/meeting.md\n\n# Get document by docid (from search results)\nqmd get \"#abc123\"\n\n# Get document starting at line 50, max 100 lines\nqmd get notes/meeting.md:50 -l 100\n\n# Get multiple documents by glob pattern\nqmd multi-get \"journals/2025-05*.md\"\n\n# Get multiple documents by comma-separated list (supports docids)\nqmd multi-get \"doc1.md, doc2.md, #abc123\"\n\n# Limit multi-get to files under 20KB\nqmd multi-get \"docs/*.md\" --max-bytes 20480\n\n# Output multi-get as JSON for agent processing\nqmd multi-get \"docs/*.md\" --json\n\n# Clean up cache and orphaned data\nqmd cleanup\n```\n\n## Data Storage\n\nIndex stored in: `~/.cache/qmd/index.sqlite`\n\n### Schema\n\n```sql\ncollections     -- Indexed directories with name and glob patterns\npath_contexts   -- Context descriptions by virtual path (qmd://...)\ndocuments       -- Markdown content with metadata and docid (6-char hash)\ndocuments_fts   -- FTS5 full-text index\ncontent_vectors -- Embedding chunks (hash, seq, pos, 900 tokens each)\nvectors_vec     -- sqlite-vec vector index (hash_seq key)\nllm_cache       -- Cached LLM responses (query expansion, rerank scores)\n```\n\n## Environment Variables\n\n| Variable | Default | Description |\n|----------|---------|-------------|\n| `XDG_CACHE_HOME` | `~/.cache` | Cache directory location |\n\n## How It Works\n\n### Indexing Flow\n\n```\nCollection ──► Glob Pattern ──► Markdown Files ──► Parse Title ──► Hash Content\n    │                                                   │              │\n    │                                                   │              ▼\n    │                                                   │         Generate docid\n    │                                                   │         (6-char hash)\n    │                                                   │              │\n    └──────────────────────────────────────────────────►└──► Store in SQLite\n                                                                       │\n                                                                       ▼\n                                                                  FTS5 Index\n```\n\n### Embedding Flow\n\nDocuments are chunked into ~900-token pieces with 15% overlap using smart boundary detection:\n\n```\nDocument ──► Smart Chunk (~900 tokens) ──► Format each chunk ──► node-llama-cpp ──► Store Vectors\n                │                           \"title | text\"        embedBatch()\n                │\n                └─► Chunks stored with:\n                    - hash: document hash\n                    - seq: chunk sequence (0, 1, 2...)\n                    - pos: character position in original\n```\n\n### Smart Chunking\n\nInstead of cutting at hard token boundaries, QMD uses a scoring algorithm to find natural markdown break points. This keeps semantic units (sections, paragraphs, code blocks) together.\n\n**Break Point Scores:**\n\n| Pattern | Score | Description |\n|---------|-------|-------------|\n| `# Heading` | 100 | H1 - major section |\n| `## Heading` | 90 | H2 - subsection |\n| `### Heading` | 80 | H3 |\n| `#### Heading` | 70 | H4 |\n| `##### Heading` | 60 | H5 |\n| `###### Heading` | 50 | H6 |\n| ` ``` ` | 80 | Code block boundary |\n| `---` / `***` | 60 | Horizontal rule |\n| Blank line | 20 | Paragraph boundary |\n| `- item` / `1. item` | 5 | List item |\n| Line break | 1 | Minimal break |\n\n**Algorithm:**\n\n1. Scan document for all break points with scores\n2. When approaching the 900-token target, search a 200-token window before the cutoff\n3. Score each break point: `finalScore = baseScore × (1 - (distance/window)² × 0.7)`\n4. Cut at the highest-scoring break point\n\nThe squared distance decay means a heading 200 tokens back (score ~30) still beats a simple line break at the target (score 1), but a closer heading wins over a distant one.\n\n**Code Fence Protection:** Break points inside code blocks are ignored—code stays together. If a code block exceeds the chunk size, it's kept whole when possible.\n\n**AST-Aware Chunking (Code Files):**\n\nFor supported code files, QMD also parses the source with [tree-sitter](https://tree-sitter.github.io/) and adds AST-derived break points that are merged with the regex scores above:\n\n| AST Node | Score | Languages |\n|----------|-------|-----------|\n| Class / interface / struct / impl / trait | 100 | All |\n| Function / method | 90 | All |\n| Type alias / enum | 80 | All |\n| Import / use declaration | 60 | All |\n\nSupported for `.ts`, `.tsx`, `.js`, `.jsx`, `.py`, `.go`, and `.rs` files. Enable with `--chunk-strategy auto`. Markdown and other file types always use regex chunking.\n\n### Query Flow (Hybrid)\n\n```\nQuery ──► LLM Expansion ──► [Original, Variant 1, Variant 2]\n                │\n      ┌─────────┴─────────┐\n      ▼                   ▼\n   For each query:     FTS (BM25)\n      │                   │\n      ▼                   ▼\n   Vector Search      Ranked List\n      │\n      ▼\n   Ranked List\n      │\n      └─────────┬─────────┘\n                ▼\n         RRF Fusion (k=60)\n         Original query ×2 weight\n         Top-rank bonus: +0.05/#1, +0.02/#2-3\n                │\n                ▼\n         Top 30 candidates\n                │\n                ▼\n         LLM Re-ranking\n         (yes/no + logprob confidence)\n                │\n                ▼\n         Position-Aware Blend\n         Rank 1-3:  75% RRF / 25% reranker\n         Rank 4-10: 60% RRF / 40% reranker\n         Rank 11+:  40% RRF / 60% reranker\n                │\n                ▼\n         Final Results\n```\n\n## Model Configuration\n\nModels are configured in `src/llm.ts` as HuggingFace URIs:\n\n```typescript\nconst DEFAULT_EMBED_MODEL = \"hf:ggml-org/embeddi
