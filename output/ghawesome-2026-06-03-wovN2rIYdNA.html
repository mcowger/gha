ror sound (*\"I can't do that.\"*, *\"Son of a bitch!\"*)\n- `on_tool_permission` ŌåÆ Permission prompt sound (*\"Something need doing?\"*, *\"Hmm?\"*)\n\n**Features:**\n\n- **Sound playback** via `afplay` (macOS), `pw-play`/`paplay`/`ffplay` (Linux) ŌĆö same priority chain as the shell hook\n- **CESP event mapping** ŌĆö Rovo Dev events map to standard CESP categories (`task.complete`, `task.error`, `input.required`)\n- **Desktop notifications** ŌĆö large overlay banners by default, or standard notifications\n- **Debounce** ŌĆö suppresses duplicate sounds from rapid completions\n\n### Kimi Code setup\n\nA filesystem watcher adapter for [Kimi Code CLI](https://github.com/MoonshotAI/kimi-cli) (MoonshotAI). Kimi Code writes Wire Mode events to `~/.kimi/sessions/` ŌĆö this adapter watches those files as a background daemon and translates events to CESP format.\n\n```bash\n# Install (starts background daemon)\nbash ~/.claude/hooks/peon-ping/adapters/kimi.sh --install\n\n# Check status / stop\nbash ~/.claude/hooks/peon-ping/adapters/kimi.sh --status\nbash ~/.claude/hooks/peon-ping/adapters/kimi.sh --uninstall\n```\n\nRequires `fswatch` (`brew install fswatch`) on macOS or `inotifywait` (`apt install inotify-tools`) on Linux. The `curl | bash` installer auto-detects Kimi Code and starts the daemon.\n\n**On macOS, `--install` registers a LaunchAgent** at `~/Library/LaunchAgents/com.peonping.kimi-adapter.plist` so the watcher auto-starts on login and auto-restarts on crash ŌĆö survives reboots without re-running `--install`. Set `KIMI_NO_LAUNCHD=1` to fall back to `nohup`+pidfile (e.g. for tests). Linux always uses `nohup`+pidfile.\n\n**Kimi-only install (no Claude required):**\n\nIf you don't have Claude Code and just want peon-ping for Kimi, install with `--kimi`:\n\n```bash\ncurl -fsSL peonping.com/install | bash -s -- --kimi\n```\n\nFiles land in `~/.kimi/hooks/peon-ping/` instead of `~/.claude/hooks/peon-ping/`, and no `~/.claude/` directory is created. The installer also auto-detects this layout: running it with no flags on a machine that has `~/.kimi/` but no `~/.claude/` selects `--kimi` mode automatically. The watcher daemon starts during install and re-starts on every login via the LaunchAgent.\n\n**Sharing voice packs with a Claude install:**\n\nIf `~/.claude/hooks/peon-ping/packs/` already exists with packs, a `--kimi` install symlinks `~/.kimi/hooks/peon-ping/packs` at it instead of re-downloading. One pack download serves both IDEs, and `peon packs install <name>` from either side updates the shared set. State, config, and mute toggles stay isolated per install. Pass `--no-shared-packs` (or `--packs=` / `--all`) to download a separate copy.\n\n**Event mapping:**\n\n- New session ŌåÆ Greeting sound (*\"Ready to work?\"*, *\"Yes?\"*)\n- Agent finishes turn ŌåÆ Completion sound (*\"Work, work.\"*, *\"Job's done!\"*)\n- Context compaction ŌåÆ Token limit sound\n- Sub-agent spawned ŌåÆ Sub-agent tracking\n\n### oh-my-pi (omp) setup\n\nA native TypeScript extension for [oh-my-pi](https://github.com/can1357/oh-my-pi) (`omp`) with full [CESP v1.0](https://github.com/PeonPing/openpeon) conformance. Subscribes to omp's `ExtensionAPI` lifecycle events and routes them through `peon.sh` so omp users get every peon-ping feature: sound packs, desktop notifications, trainer reminders, mobile push, SSH/devcontainer relay, and tab-title updates.\n\n**Quick install:**\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/PeonPing/peon-ping/main/adapters/omp.sh | bash\n```\n\nThe installer copies `peon-ping.ts` and `package.json` to `~/.omp/agent/extensions/peon-ping/`. Restart omp afterward.\n\n**Event mapping:**\n\n| omp event                              | peon-ping event       |\n|----------------------------------------|-----------------------|\n| `session_start`                        | `SessionStart`        |\n| `turn_start`                           | `UserPromptSubmit`    |\n| `turn_end`                             | `Stop`                |\n| `tool_result` with `isError: true`     | `PostToolUseFailure`  |\n| `auto_compaction_start`                | `PreCompact`          |\n| `session_shutdown`                     | `SessionEnd`          |\n\n**Uninstall:**\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/PeonPing/peon-ping/main/adapters/omp.sh | bash -s -- --uninstall\n```\n\n## Remote development (SSH / Devcontainers / Codespaces)\n\nCoding on a remote server or inside a container? peon-ping auto-detects SSH sessions, devcontainers, and Codespaces, then routes audio and notifications through a lightweight relay running on your local machine.\n\n### SSH setup\n\n1. **On your local machine**, start the relay:\n   ```bash\n   peon relay --daemon\n   ```\n\n2. **SSH with port forwarding**:\n   ```bash\n   ssh -R 19998:localhost:19998 your-server\n   ```\n\n3. **Install peon-ping on the remote** ŌĆö it auto-detects the SSH session and sends audio requests back through the forwarded port to your local relay.\n\nThat's it. Sounds play on your laptop, not the remote server.\n\nOptional SSH routing modes:\n\n```bash\npeon ssh-audio relay   # default, always use relay\npeon ssh-audio auto    # try relay, fall back to local playback on SSH host\npeon ssh-audio local   # always play on SSH host\n```\n\n### Devcontainers / Codespaces\n\nNo port forwarding needed ŌĆö peon-ping auto-detects `REMOTE_CONTAINERS` and `CODESPACES` environment variables and routes audio to `host.docker.internal:19998`. Just run `peon relay --daemon` on your host machine.\n\n### Relay commands\n\n```bash\npeon relay                # Start relay in foreground\npeon relay --daemon       # Start in background\npeon relay --stop         # Stop background relay\npeon relay --status       # Check if relay is running\npeon relay --port=12345   # Custom port (default: 19998)\npeon relay --bind=0.0.0.0 # Listen on all interfaces (less secure)\n```\n\nEnvironment variables: `PEON_RELAY_PORT`, `PEON_RELAY_HOST`, `PEON_RELAY_BIND`.\n\nIf peon-ping detects an SSH or container session but can't reach the relay, it prints setup instructions on `SessionStart`.\n\n### Category-based API (for lightweight remote hooks)\n\nThe relay supports a category-based endpoint that handles sound selection server-side. This is useful for remote machines where peon-ping isn't installed ŌĆö the remote hook only needs to send a category name, and the relay picks a random sound from the active pack.\n\n**Endpoints:**\n\n| Endpoint | Description |\n|---|---|\n| `GET /health` | Health check (returns \"OK\") |\n| `GET /play?file=<path>` | Play a specific sound file (legacy) |\n| `GET /play?category=<cat>` | Play random sound from category (recommended) |\n| `POST /notify` | Send desktop notification |\n\n**Example remote hook (`scripts/remote-hook.sh`):**\n\n```bash\n#!/bin/bash\nRELAY_URL=\"${PEON_RELAY_URL:-http://127.0.0.1:19998}\"\nEVENT=$(cat | python3 -c \"import sys,json; d=json.load(sys.stdin); print(d.get('hook_event_name',''))\" 2>/dev/null)\ncase \"$EVENT\" in\n  SessionStart)      CATEGORY=\"session.start\" ;;\n  Stop)              CATEGORY=\"task.complete\" ;;\n  PermissionRequest) CATEGORY=\"input.required\" ;;\n  *)                 exit 0 ;;\nesac\ncurl -sf \"${RELAY_URL}/play?category=${CATEGORY}\" >/dev/null 2>&1 &\n```\n\nCopy this to your remote machine and register it in `~/.claude/settings.json`:\n\n```json\n{\n  \"hooks\": {\n    \"SessionStart\": [{\"command\": \"bash /path/to/remote-hook.sh\"}],\n    \"Stop\": [{\"command\": \"bash /path/to/remote-hook.sh\"}],\n    \"PermissionRequest\": [{\"command\": \"bash /path/to/remote-hook.sh\"}]\n  }\n}\n```\n\nThe relay reads `config.json` on your local machine to get the active pack and volume, loads the pack's manifest, and picks a random sound while avoiding repeats.\n\n## Mobile notifications\n\nGet push notifications on your phone when tasks finish or need attention ŌĆö useful when you're away from your desk.\n\n### Quick start (ntfy.sh ŌĆö free, no account needed)\n\n1. Install the [ntfy app](https://ntfy.sh) on your phone\n2. Subscribe to a unique topic in the app (e.g. `my-peon-notifications`)\n3. Run:\n   ```bash\n   peon mobile ntfy my-peon-notifications\n   ```\n\nAlso supports [Pushover](https://pushover.net) and [Telegram](https://core.telegram.org/bots):\n\n```bash\npeon mobile pushover <user_key> <app_token>\npeon mobile telegram <bot_token> <chat_id>\n```\n\n### Mobile commands\n\n```bash\npeon mobile on            # Enable mobile notifications\npeon mobile off           # Disable mobile notifications\npeon mobile status        # Show current config\npeon mobile test          # Send a test notification\n```\n\nMobile notifications fire on every event regardless of window focus ŌĆö they're independent from desktop notifications and sounds.\n\n## Sound packs\n\n165 packs across Warcraft, StarCraft, Red Alert, Portal, Zelda, Dota 2, Helldivers 2, Elder Scrolls, and more. The default install includes a curated starter set; commonly used packs include:\n\n| Pack | Character | Sounds |\n|---|---|---|\n| `peon` (default) | Orc Peon (Warcraft III) | \"Ready to work?\", \"Work, work.\", \"Okie dokie.\" |\n| `peasant` | Human Peasant (Warcraft III) | \"Yes, milord?\", \"Job's done!\", \"Ready, sir.\" |\n| `sc_kerrigan` | Sarah Kerrigan (StarCraft) | \"I gotcha\", \"What now?\", \"Easily amused, huh?\" |\n| `sc_battlecruiser` | Battlecruiser (StarCraft) | \"Battlecruiser operational\", \"Make it happen\", \"Engage\" |\n| `glados` | GLaDOS (Portal) | \"Oh, it's you.\", \"You monster.\", \"Your entire team is dead.\" |\n\n**[Browse all packs with audio previews &rarr; openpeon.com/packs](https://openpeon.com/packs)**\n\nInstall all with `--all`, or switch packs anytime:\n\n```bash\npeon packs use glados             # switch to a specific pack\npeon packs use --install glados   # install (or update) and switch in one step\npeon packs next                   # cycle to the next pack\npeon packs list                   # list all installed packs\npeon packs list --registry        # browse all available packs\npeon packs install glados,murloc  # install specific packs\npeon packs install --all          # install every pack in the registry\n```\n\nWant to add your own pack? See the [full guide at openpeon.com/create](https://openpeon.com/create) or [CONTRIBUTING.md](CONTRIBUTING.md).\n\n## Debugging\n\nWhen sounds aren't playing or notifications aren't appearing, structured debug logging helps you trace exactly what happened during a hook invocation.\n\n### Enabling debug logs\n\n```bash\npeon debug on             # Enable ŌĆö logs written to ~/.claude/hooks/peon-ping/logs/\npeon debug off            # Disable\npeon debug status         # Show state, log directory, file count, total size\n```\n\nYou can also enable debug logging per-invocation without changing config by setting the environment variable `PEON_DEBUG=1`.\n\n### Reading logs\n\n```bash\npeon logs                 # Last 50 lines of today's log\npeon logs --last 100      # Last 100 lines across all log files\npeon logs --session <ID>  # Filter today's log by session ID\npeon logs --session <ID> --all  # Search all log files for session ID\npeon logs --clear         # Delete all log files (with confirmation)\n```\n\n### Log format\n\nEach log line is a structured key=value record:\n\n```\n2026-03-26T14:32:01.042 [config] inv=a3f1 loaded=/path/to/config.json volume=0.5 pack=peon enabled=True\n2026-03-26T14:32:01.045 [event] inv=a3f1 hook_event=Stop cesp=task.complete session=abc123\n2026-03-26T14:32:01.048 [sound] inv=a3f1 file=work-work.wav label=\"Work, work.\" category=task.complete\n2026-03-26T14:32:01.120 [play] inv=a3f1 player=afplay file=work-work.wav\n2026-03-26T14:32:01.125 [notify] inv=a3f1 title=\"peon: done\" body=\"Work, work.\"\n```\n\n- **inv** -- unique 4-character invocation ID linking all phases of a single hook call\n- **Phases**: `[config]`, `[event]`, `[sound]`, `[play]`, `[notify]` -- each represents a stage in the hook pipeline\n- Values containing spaces or special characters are quoted\n\n### Common failure examples\n\n| Symptom | What to look for in logs |\n|---|---|\n| No sound plays | `[event]` line shows `exit=early` (category disabled, paused, or debounced) |\n| Wrong pack | `[config]` line shows unexpected `pack=` value -- check path_rules or rotation |\n| Missing sound file | `[sound]` line shows `error=` with file path |\n| Notification missing | `[notify]` line absent -- check `desktop_notifications` in config |\n\n### Config keys\n\n| Key | Default | Description |\n|---|---|---|\n| `debug` | `false` | Enable structured debug logging |\n| `debug_retention_days` | `7` | Auto-prune logs older than N days |\n\nLogs are stored at `~/.claude/hooks/peon-ping/logs/peon-ping-YYYY-MM-DD.log` (one file per day). Old logs are automatically pruned based on `debug_retention_days` when a new day's log is created.\n\n## Uninstall\n\n**macOS/Linux:**\n\n```bash\nbash \"${CLAUDE_CONFIG_DIR:-$HOME/.claude}\"/hooks/peon-ping/uninstall.sh        # global\nbash .claude/hooks/peon-ping/uninstall.sh           # project-local\n```\n\n**Windows (PowerShell):**\n\n```powershell\n# Standard uninstall (prompts before deleting sounds)\npowershell -File \"$env:USERPROFILE\\.claude\\hooks\\peon-ping\\uninstall.ps1\"\n\n# Keep sound packs (removes everything else)\npowershell -File \"$env:USERPROFILE\\.claude\\hooks\\peon-ping\\uninstall.ps1\" -KeepSounds\n```\n\n## Requirements\n\n- **macOS** ŌĆö `afplay` (built-in), JXA Cocoa overlay or AppleScript for notifications\n- **Linux** ŌĆö one of: `pw-play`, `paplay`, `ffplay`, `mpv`, `play` (SoX), or `aplay`; `notify-send` for notifications\n- **Windows** ŌĆö native PowerShell with `MediaPlayer` and WinForms (no WSL required), or WSL2\n- **MSYS2 / Git Bash** ŌĆö `python3`, `cygpath` (built-in); audio via `ffplay`/`mpv`/`play` or PowerShell fallback\n- **All platforms** ŌĆö `python3` (not required for native Windows)\n- **SSH/remote** ŌĆö `curl` on the remote host\n- **IDE** ŌĆö Claude Code with hooks support, Amp, or any supported IDE via [adapters](#multi-ide-support)\n\n## How it works\n\n`peon.sh` is a Claude Code hook registered for `SessionStart`, `SessionEnd`, `SubagentStart`, `Stop`, `Notification`, `PermissionRequest`, `PostToolUseFailure`, and `PreCompact` events. On each event:\n\n1. **Event mapping** ŌĆö an embedded Python block maps the hook event to a [CESP](https://github.com/PeonPing/openpeon) sound category (`session.start`, `task.complete`, `input.required`, etc.)\n2. **Sound selection** ŌĆö picks a random voice line from the active pack's manifest, avoiding repeats\n3. **Audio playback** ŌĆö plays the sound asynchronously via `afplay` (macOS), PowerShell `MediaPlayer` (WSL2/MSYS2 fallback), or `pw-play`/`paplay`/`ffplay`/`mpv`/`aplay` (Linux/MSYS2)\n4. **Notifications** ŌĆö updates the Terminal tab title and sends a desktop notification if the terminal isn't focused\n5. **Remote routing** ŌĆö in SSH sessions, devcontainers, and Codespaces, audio and notification requests are forwarded over HTTP to a [relay server](#remote-development-ssh--devcontainers--codespaces) on your local machine\n\nSound packs are downloaded from the [OpenPeon registry](https://github.com/PeonPing/registry) at install time. The official packs are hosted in [PeonPing/og-packs](https://github.com/PeonPing/og-packs). Sound files are property of their respective publishers (Blizzard, Valve, EA, etc.) and are distributed under fair use for personal notification purposes.\n\n## Links\n\n- [@peonping on X](https://x.com/peonping) ŌĆö updates and announcements\n- [peonping.com](https://peonping.com/) ŌĆö landing page\n- [openpeon.com](https://openpeon.com/) ŌĆö CESP spec, pack browser, [integration guide](https://openpeon.com/integrate), creation guide\n- [OpenPeon registry](https://github.com/PeonPing/registry) ŌĆö pack registry (GitHub Pages)\n- [og-packs](https://github.com/PeonPing/og-packs) ŌĆö official sound packs\n- [peon-pet](https://github.com/PeonPing/peon-pet) ŌĆö macOS desktop pet (orc sprite, reacts to hook events)\n- [License (MIT)](LICENSE)\n\n## Support the project\n\n- Venmo: [@garysheng](https://venmo.com/garysheng)\n- Community Token (DYOR / have fun): Someone created a $PEON token on Base ŌĆö we receive TX fees which help fund development. [`0xf4ba744229afb64e2571eef89aacec2f524e8ba3`](https://dexscreener.com/base/0xf4bA744229aFB64E2571eef89AaceC2F524e8bA3)\n","summary":"Peon-ping is a notification utility designed to keep developers focused by providing audio cues and visual banners when AI coding agents require attention. It bridges the communication gap between popular AI tools like Claude Code, Cursor, and GitHub Copilot and the user, preventing lost time when agents finish tasks or pause for input. With support for iconic sound packs from classic games and integration via MCP, this tool is ideal for developers who frequently multitask while running automated coding assistants.","description":"Warcraft III Peon voice notifications (+ more!) for Claude Code, Codex, IDEs, and any AI agent. Stop babysitting your terminal. Employ a Peon today.","stars":4792,"language":"Shell"},{"owner":"tw93","repo":"Kaku","url":"https://github.com/tw93/Kaku","readme":"<div align=\"center\">\n  <img src=\"https://gw.alipayobjects.com/zos/k/6h/dwarf.svg\" width=\"120\" />\n  <h1>Kaku</h1>\n  <p><em>A fast, out-of-the-box terminal built for AI coding.</em></p>\n</div>\n\n<p align=\"center\">\n  <a href=\"https://github.com/tw93/Kaku/stargazers\"><img src=\"https://img.shields.io/github/stars/tw93/Kaku?style=flat-square\" alt=\"Stars\"></a>\n  <a href=\"https://github.com/tw93/Kaku/releases\"><img src=\"https://img.shields.io/github/v/tag/tw93/Kaku?label=version&style=flat-square\" alt=\"Version\"></a>\n  <a href=\"LICENSE.md\"><img src=\"https://img.shields.io/badge/license-MIT-blue.svg?style=flat-square\" alt=\"License\"></a>\n  <a href=\"https://github.com/tw93/Kaku/commits\"><img src=\"https://img.shields.io/github/commit-activity/m/tw93/Kaku?style=flat-square\" alt=\"Commits\"></a>\n  <a href=\"https://twitter.com/HiTw93\"><img src=\"https://img.shields.io/badge/follow-Tw93-red?style=flat-square&logo=Twitter\" alt=\"Twitter\"></a>\n</p>\n\n<p align=\"center\">\n  <img src=\"assets/kaku.jpg\" alt=\"Kaku Screenshot\" width=\"1000\" />\n</p>\n\n## Why\n\nKaku (µøĖŃüÅ, ŃüŗŃüÅ) is the Japanese word for writing: the act of putting thought into form. A deeply customized fork of WezTerm, built for practical defaults on day one while keeping full Lua customization and a fast, lightweight feel.\n\nPart of a trilogy: [Kaku](https://github.com/tw93/Kaku) (µøĖŃüÅ) writes code, [Waza](https://github.com/tw93/Waza) (µŖĆ) drills habits, [Kami](https://github.com/tw93/Kami) (ń┤Ö) ships documents. Think of them as a family: Kaku is the dad, Waza the big sister, Kami the little sister.\n\n## Features\n\n- **Zero Config**: Defaults with JetBrains Mono, macOS font rendering, and low-res font sizing.\n- **Theme-Aware Experience**: Auto-switches between dark and light modes with macOS, with tuned selection colors, font weight, and practical color overrides support.\n- **Curated Shell Suite**: Built-in zsh plugins with optional CLI tools for prompt, diff, and navigation workflows.\n- **Fast & Lightweight**: 40% smaller binary, instant startup, lazy loading, stripped-down GPU-accelerated core.\n- **WezTerm-Compatible Config**: Use WezTerm's Lua config directly with full API compatibility and no migration.\n- **Polished Defaults**: Copy on select, clickable file paths, history peek from full-screen apps, pane input broadcast, and visual bell on background tab completion.\n\n## Quick Start\n\n1. [Download Kaku DMG](https://github.com/tw93/Kaku/releases/latest) & Drag to Applications\n2. Or install with Homebrew: `brew install tw93/tap/kakuku`\n3. Open Kaku. The app is notarized by Apple, so it opens without security warnings\n4. On first launch, Kaku will automatically set up your shell environment\n\n## Usage Guide\n\n| Action | Shortcut |\n| :--- | :--- |\n| New Tab | `Cmd + T` |\n| New Window | `Cmd + N` |\n| Close Tab/Pane | `Cmd + W` |\n| Navigate Tabs | `Cmd + Shift + [` / `]` or `Cmd + 1ŌĆō9` |\n| Navigate Panes | `Cmd + Opt + Arrows` |\n| Split Pane Vertical | `Cmd + D` |\n| Split Pane Horizontal | `Cmd + Shift + D` |\n| Open Settings Panel | `Cmd + ,` |\n| AI Panel | `Cmd + Shift + A` |\n| Apply AI Suggestion | `Cmd + Shift + E` |\n| Open Lazygit | `Cmd + Shift + G` |\n| Yazi File Manager | `Cmd + Shift + Y` or `y` |\n| Clear Screen | `Cmd + K` |\n\nFull keybinding reference: [docs/keybindings.md](docs/keybindings.md)\n\n## Kaku AI\n\nKaku has a built-in assistant with two modes and a settings page for AI coding tools.\n\n- **Error recovery**: When a command fails, Kaku automatically suggests a fix. Press `Cmd + Shift + E` to apply.\n- **Natural language to command**: Type `# <description>` at the prompt and press Enter. Kaku sends the query to the LLM and injects the resulting command back into the prompt, ready to review and run.\n- **AI Tools Config**: Manage settings for Claude Code, Codex, Gemini CLI, Copilot CLI, Kimi Code, and more.\n\n### Provider Presets\n\nSelect a provider in `kaku ai` to auto-fill the base URL and models:\n\n| Provider | Base URL | Models |\n| :--- | :--- | :--- |\n| OpenAI | `https://api.openai.com/v1` | (free text) |\n| Custom | (manual) | (manual) |\n\nFull AI assistant docs: [docs/features.md](docs/features.md)\n\n## Performance\n\n| Metric | Upstream | Kaku | Methodology |\n| :--- | :--- | :--- | :--- |\n| **Executable Size** | ~67 MB | ~40 MB | Aggressive symbol stripping & feature pruning |\n| **Resources Volume** | ~100 MB | ~80 MB | Asset optimization & lazy-loaded assets |\n| **Launch Latency** | Standard | Instant | Just-in-time initialization |\n| **Shell Bootstrap** | ~200ms | ~100ms | Optimized environment provisioning |\n\n## FAQ\n\n**Is there a Windows or Linux version?** Not currently. Kaku is macOS-only for now.\n\n**Can I use transparent windows?** Yes, set `config.window_background_opacity` in `~/.config/kaku/kaku.lua`.\n\n**The `kaku` command is missing.** Run `/Applications/Kaku.app/Contents/MacOS/kaku init --update-only && exec zsh -l`, then `kaku doctor`.\n\nFull FAQ: [docs/faq.md](docs/faq.md)\n\n## Docs\n\n- [Keybindings](docs/keybindings.md) - full shortcut reference\n- [Features](docs/features.md) - AI assistant, lazygit, yazi, remote files, shell suite\n- [Configuration](docs/configuration.md) - themes, fonts, custom keybindings, Lua API\n- [CLI Reference](docs/cli.md) - `kaku ai`, `kaku config`, `kaku doctor`, and more\n- [FAQ](docs/faq.md) - common questions and troubleshooting\n\n## Background\n\nI heavily rely on the CLI for both work and personal projects. Tools I've built, like [Mole](https://github.com/tw93/mole) and [Pake](https://github.com/tw93/pake), reflect this.\n\nI used Alacritty for years and learned to value speed and simplicity. As my workflow shifted toward AI-assisted coding, I wanted stronger tab and pane ergonomics. I also explored Kitty, Ghostty, Warp, and iTerm2. Each is strong in different areas, but I still wanted a setup that matched my own balance of performance, defaults, and control.\n\nWezTerm is robust and highly hackable, and I am grateful for its engine and ecosystem. So I built Kaku to be that environment: fast, polished, and ready to work.\n\n## Contributors\n\nBig thanks to all contributors who helped build Kaku. Go follow them! ŌØż’ĖÅ\n\n<a href=\"https://github.com/tw93/Kaku/graphs/contributors\">\n  <img src=\"./CONTRIBUTORS.svg?v=2\" width=\"1000\" />\n</a>\n\n## Support\n\n- If Kaku helped you, [share it](https://twitter.com/intent/tweet?url=https://github.com/tw93/Kaku&text=Kaku%20-%20A%20fast%20terminal%20built%20for%20AI%20coding.) with friends or give it a star.\n- Got ideas or bugs? Open an issue or PR, feel free to contribute your best AI model.\n- I have two cats, TangYuan and Coke. If you think Kaku delights your life, you can feed them <a href=\"https://cats.tw93.fun?name=Kaku\" target=\"_blank\">canned food ­¤ź®</a>.\n\n<a href=\"https://cats.tw93.fun?name=Kaku\"><img src=\"https://cdn.jsdelivr.net/gh/tw93/sponsors@main/assets/sponsors.svg\" width=\"1000\" loading=\"lazy\" /></a>\n\n## License\n\nMIT License, feel free to enjoy and participate in open source.\n","summary":"Kaku is a high-performance, open-source terminal emulator based on WezTerm, specifically engineered to streamline AI-assisted coding workflows. It offers a \"zero-config\" experience with curated shell plugins, theme-aware rendering, and native integrations for tools like Lazygit and Yazi. Built-in AI capabilities, such as automated command error recovery and natural language-to-command generation, make it an ideal choice for developers looking for a fast, modern terminal that requires minimal setup to become highly productive.","description":"­¤Äā A fast, out-of-the-box terminal built for AI coding.","stars":5247,"language":"Rust"},{"owner":"davegoldblatt","repo":"total-recall","url":"https://github.com/davegoldblatt/total-recall","readme":"# Total Recall\n\nA memory system for Claude Code that remembers what matters and forgets what doesn't.\n\n## The Problem\n\nClaude Code forgets everything between sessions. Every time you start a new conversation, it's like talking to someone with amnesia. You end up repeating yourself:\n\n- \"We already tried that approach, it didn't work.\"\n- \"Don't touch the auth file.\"\n- \"I prefer tabs over spaces.\"\n- \"The client's name is Sarah, not Sara.\"\n\nThis gets old fast.\n\n## What Total Recall Does\n\nIt gives Claude Code a notepad that carries over between sessions, but a *picky* notepad. Not everything goes in. Before anything gets saved permanently, it has to pass a simple test: **will this matter tomorrow?**\n\nA preference you'll have for months? Saved. A decision you made and why? Saved. The fact that you ran a test five minutes ago? Not saved. The system keeps itself clean so Claude isn't wading through junk to find what's relevant.\n\n## How It Works\n\nThink of it like a kitchen with four storage areas:\n\n**Counter** (`CLAUDE.local.md`): The stuff you reach for every day. Loads automatically, every session. Kept small on purpose, around a page of text.\n\n**Pantry** (`memory/registers/`): Organized by category. Your preferences, key decisions, project details, people you work with. Claude checks here when it needs something specific.\n\n**Daily notebook** (`memory/daily/`): Timestamped scratch notes from each day. Everything gets written here first. You decide later what's worth keeping permanently.\n\n**Storage closet** (`memory/archive/`): Old stuff that's done or outdated. Still searchable, but never loaded automatically.\n\nThe key idea: **notes hit the daily notebook first, then you promote the keepers.** Claude doesn't get to decide on its own what's important enough to remember permanently. You do.\n\n## Quick Start\n\n### Install as a plugin (recommended)\n\n```\n/plugin marketplace add davegoldblatt/recall-marketplace\n/plugin install recall@recall-marketplace\n```\n\n### Or install standalone\n\n```\ngit clone https://github.com/davegoldblatt/total-recall.git\ncd total-recall\n./install.sh /path/to/your/project\n```\n\nAfter installing, restart Claude Code or run `/hooks` to activate.\n\n## Using It\n\nHere's your day-to-day:\n\n**Claude notices something worth remembering.** It writes to your daily notebook and tells you. You don't have to do anything.\n\n**You want Claude to remember something.** Just say \"remember this\" or use the write command:\n\n```\n/recall-write Dave prefers concise error messages, no stack traces in prod\n```\n\n**End of day (or whenever).** Review what piled up and promote the good stuff:\n\n```\n/recall-promote\n```\n\n**Find something from last week.** Search across everything:\n\n```\n/recall-search authentication decision\n```\n\n**You correct Claude.** The correction updates everywhere at once: daily notebook, registers, and the counter. The same mistake won't happen again.\n\n### All Commands\n\n| Command | What it does |\n|---|---|\n| `/recall-init` | Set up the memory folders for the first time |\n| `/recall-write <note>` | Save a note (checks if it's worth keeping, suggests where) |\n| `/recall-log <note>` | Quick note to the daily notebook, no questions asked |\n| `/recall-search <query>` | Search everything |\n| `/recall-promote` | Review daily notes, move the keepers to registers |\n| `/recall-status` | Health check. Is everything working? |\n| `/recall-maintain` | Clean up stale or duplicate entries |\n| `/recall-forget <query>` | Mark something as outdated |\n| `/recall-context` | Show what memory Claude has loaded right now |\n\nIf installed as a plugin, commands are namespaced: `/recall:recall-write` instead of `/recall-write`.\n\n## The Write Gate\n\nThis is the core idea. Before anything gets promoted to permanent memory, it has to pass at least one of these checks:\n\n1. **Will it change how Claude behaves next time?** (a preference, a boundary, a pattern)\n2. **Is it a commitment someone's counting on?** (a deadline, a deliverable, a follow-up)\n3. **Is it a decision worth remembering the reasoning for?** (why you picked X over Y)\n4. **Is it a stable fact that'll come up again?** (not something that'll be different tomorrow)\n5. **Did you explicitly say \"remember this\"?**\n\nIf none of those are true, it stays in the daily notebook and eventually ages out. This keeps memory lean. No junk drawer.\n\n## When Corrections Happen\n\nIf you tell Claude it got something wrong, it doesn't just say \"sorry\" and move on. It updates the daily notebook, the relevant register, and the counter, all in one shot. The old information gets marked as superseded (not deleted) so there's a trail of what changed and when.\n\n## What Loads Automatically\n\nOnly two things, every session:\n\n| What | Where | How |\n|---|---|---|\n| The rules (write gate, correction protocol) | `rules/total-recall.md` | Claude Code loads all rules files automatically |\n| Counter / working memory | `CLAUDE.local.md` | Claude Code loads this automatically |\n\nEverything else loads on demand: when you search, when it's relevant, or at session start via hooks.\n\n## Hooks\n\nTwo things happen automatically in the background:\n\n**When a session starts:** Claude gets a summary of open items and recent daily notes. This is the \"here's where we left off\" briefing.\n\n**Before memory gets compacted:** A timestamp gets written to the daily notebook so there's a record. This one is silent. Claude doesn't see it, it's just bookkeeping.\n\nBoth hooks fail safely. If something goes wrong, they don't block Claude Code from working.\n\nHooks use `$CLAUDE_PROJECT_DIR` (standalone) or `${CLAUDE_PLUGIN_ROOT}` (plugin) to resolve paths. No transcript parsing. The PreCompact hook only writes a timestamp marker to the daily log. It does not read or parse conversation transcripts.\n\n## Architecture\n\nFor those who want the technical details.\n\n```\nConversation (ephemeral, compacted/discarded)\n    |\n    v  WRITE GATE: \"Does this change future behavior?\"\n    |\nDaily Log (memory/daily/YYYY-MM-DD.md)\n    All writes land here first. Raw, timestamped.\n    |\n    v  PROMOTION: user-controlled via /recall-promote\n    |\nRegisters (memory/registers/*.md)\n    Structured claims with metadata (confidence, evidence, last_verified)\n    |\n    v  DISTILLATION: only what's essential for every session\n    |\nWorking Memory (CLAUDE.local.md)\n    ~1500 words. Auto-loaded. The persistent \"personality.\"\n    |\n    v  EXPIRY\n    |\nArchive (memory/archive/)\n    Searchable history. Never auto-loaded.\n```\n\n### Key Mechanisms\n\n**Write Gate:** Filters out noise. Only behavior-changing facts, commitments, decisions, and explicit \"remember this\" requests pass through.\n\n**Daily Log First:** All writes land in the daily log. Promotion to registers is a separate step, controlled by the user. This prevents the model from prematurely solidifying inferences.\n\n**Contradiction Protocol:** Never silently overwrites. Old claims are marked `[superseded]` with date and reason. The pattern of change is preserved.\n\n**Correction Gate:** Human corrections get highest priority. One correction triggers writes to daily log + register + working memory.\n\n### File Structure\n\n**Plugin format** (installed via `/plugin install`):\n\n```\ntotal-recall/                     # Plugin root\nŌö£ŌöĆŌöĆ .claude-plugin/\nŌöé   ŌööŌöĆŌöĆ plugin.json               # Plugin manifest\nŌö£ŌöĆŌöĆ skills/                       # Slash commands (namespaced)\nŌöé   Ōö£ŌöĆŌöĆ recall-write/SKILL.md\nŌöé   Ōö£ŌöĆŌöĆ recall-search/SKILL.md\nŌöé   ŌööŌöĆŌöĆ ...\nŌö£ŌöĆŌöĆ hooks/\nŌöé   Ōö£ŌöĆŌöĆ hooks.json                # Hook configuration\nŌöé   Ōö£ŌöĆŌöĆ session-start.sh\nŌöé   ŌööŌöĆŌöĆ pre-compact.sh\nŌö£ŌöĆŌöĆ rules/\nŌöé   ŌööŌöĆŌöĆ total-recall.md           # Protocol (auto-loaded)\nŌööŌöĆŌöĆ templates/                    # Scaffolding templates\n    Ōö£ŌöĆŌöĆ SCHEMA.md\n    Ōö£ŌöĆŌöĆ CLAUDE.local.md\n    ŌööŌöĆŌöĆ registers/\n```\n\n**Standalone format** (installed via `install.sh`):\n\n```\nyour-project/\nŌö£ŌöĆŌöĆ .claude/\nŌöé   Ōö£ŌöĆŌöĆ commands/recall-*.md      # Slash commands\nŌöé   Ōö£ŌöĆŌöĆ rules/total-recall.md     # Protocol (auto-loaded)\nŌöé   Ōö£ŌöĆŌöĆ hooks/*.sh                # Hook scripts\nŌöé   ŌööŌöĆŌöĆ settings.local.json       # Hook configuration\nŌö£ŌöĆŌöĆ memory/\nŌöé   Ōö£ŌöĆŌöĆ SCHEMA.md\nŌöé   Ōö£ŌöĆŌöĆ daily/YYYY-MM-DD.md\nŌöé   Ōö£ŌöĆŌöĆ registers/*.md\nŌöé   ŌööŌöĆŌöĆ archive/\nŌö£ŌöĆŌöĆ CLAUDE.md\nŌööŌöĆŌöĆ CLAUDE.local.md               # Working memory (gitignored)\n```\n\n### Compared to Other Memory Tools\n\n|  | Total Recall | Auto-ingest tools |\n|---|---|---|\n| **What gets saved** | Only what passes the write gate | Everything |\n| **Default destination** | Daily log (promote later) | Permanent storage |\n| **Context cost** | ~1500 words working memory | Grows unbounded |\n| **Corrections** | Propagate to all tiers immediately | Varies |\n| **User control** | Promotion is explicit | Automatic |\n| **Architecture** | 4-tier with metadata | Flat or 2-tier |\n\n## Privacy\n\n- Everything is local. No network calls, no telemetry, no external services.\n- All memory is plain markdown files you can read and edit yourself.\n- `CLAUDE.local.md` is gitignored by default (it's personal).\n- `memory/` is gitignored by default (it can contain personal notes).\n- Hooks never read your conversation transcripts.\n- To see exactly what's happening: check `hooks/*.sh` and `memory/`. It's all plain text.\n- To uninstall: delete `memory/`, `CLAUDE.local.md`, and the `.claude/` entries (or `/plugin uninstall recall`).\n\n## Works Alongside Superpowers\n\nIf you use [Superpowers](https://github.com/obra/superpowers), there are no conflicts. Superpowers handles *how* Claude works (methodology, TDD, plans). Total Recall handles *what* Claude remembers. Different jobs, same project.\n\n## License\n\nMIT\n","summary":"Total Recall is a persistent memory system for Claude Code that overcomes the limitations of session-based amnesia by allowing the AI to retain relevant project information and user preferences over time. The project utilizes a tiered storage structureŌĆöranging from active daily notes to long-term archivesŌĆöensuring that Claude remains informed without being overwhelmed by irrelevant data. By implementing a human-in-the-loop \"write gate,\" users maintain control over what information is promoted to permanent storage, making it an ideal tool for developers who want a more consistent and context-aware coding assistant.","description":"Persistent memory plugin for Claude Code. Tiered memory system with write gates, correction propagation, and slash commands.","stars":200,"language":"Shell"},{"owner":"R44VC0RP","repo":"pgrok","url":"https://github.com/R44VC0RP/pgrok","readme":"# pgrok\n\nPersonal ngrok alternative. Expose local ports to the internet with automatic HTTPS, an interactive TUI dashboard, and HTTP request inspection -- all through your own VPS.\n\n<img width=\"1956\" height=\"1900\" alt=\"image\" src=\"https://github.com/user-attachments/assets/277ef194-a135-407a-83a4-deaad4330dee\" />\n\n## Quick Start\n\n### Prerequisites\n\n- A **VPS** (any provider) with ports 80 and 443 open (nothing else running on them for now)\n- **Docker** + **Docker Compose** on the VPS\n- A **domain name** you control\n- An **SSH key** on your Mac/Linux (You can run `ssh-keygen` to generate one if you don't have one)\n\n### 1. DNS Setup: Point your domain at the VPS\n\nAdd a wildcard A record with your DNS provider (Cloudflare, Vercel, Namecheap, etc):\n\n| Type | Name | Value |\n|------|------|-------|\n| A    | *    | `<your-vps-ip>` |\n\n### 2. Client Setup: Install on your Mac/Linux (run this first)\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/R44VC0RP/pgrok/main/install.sh | bash -s client\n```\n\n(if you have a windows machine, and you get this running, please open a PR!)\n\nYou'll be prompted for your VPS IP, domain, and email. The installer will:\n- Auto-detects your SSH key\n- Builds and installs the `pgrok` command\n- **Copies a server setup command to your clipboard** (with your SSH key embedded)\n\n### 3. Server -- Set up your VPS\n\nSSH into your VPS and **paste the command from step 2**. Or run:\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/R44VC0RP/pgrok/main/install.sh | sudo bash -s server\n```\n\nThe script installs Caddy, configures SSH tunneling, adds your SSH key, and starts everything.\n\n### 4. Use it\n\n```bash\npgrok myapp 4000\n# => https://myapp.yourdomain.com -> localhost:4000\n```\n\n## Usage\n\n```bash\n# Expose a local dev server\npgrok myapp 4000\n# -> https://myapp.yourdomain.com\n\n# Expose an API\npgrok api 3000\n# -> https://api.yourdomain.com\n\n# Any subdomain works instantly\npgrok staging 8080\n# -> https://staging.yourdomain.com\n\n# Debug mode -- dumps raw tunnel logs on exit\npgrok myapp 4000 --print-logs\n```\n\nPress `Ctrl+C` to stop. The route is cleaned up automatically.\n\n**Rebuild the binary** after pulling updates:\n\n```bash\n./setup.sh client --rebuild\n```\n\n## How it works\n\n<img width=\"932\" height=\"331\" alt=\"image\" src=\"https://github.com/user-attachments/assets/9d56fb43-bafe-4697-9c72-3e001a0c92aa\" />\n\n- **Caddy** on the VPS handles HTTPS with on-demand TLS -- certs are auto-provisioned per subdomain. Falls back to ZeroSSL if Let's Encrypt is rate-limited.\n- **SSH reverse tunnels** carry traffic -- no extra tunnel software.\n- A small **Python script** on the server dynamically configures Caddy routes when tunnels connect/disconnect.\n- The **TUI client** (built with [OpenTUI](https://opentui.com)) provides a live dashboard with request inspection, connection stats, and color-coded HTTP logs.\n\n### TUI Dashboard\n\nThe dashboard shows in real-time:\n\n- **Session Status** -- connecting / provisioning TLS / online / error\n- **Forwarding** -- your public URL and local port\n- **TLS Certificate** -- provisioning status (Let's Encrypt)\n- **Connection Stats** -- total requests, open connections, request rates (1m/5m), response time percentiles (p50/p90)\n- **HTTP Request Log** -- scrollable, color-coded log of every request through the tunnel\n\nRequest log colors:\n- Methods: GET (blue), POST (purple), PUT/PATCH (yellow), DELETE (red)\n- Status: 2xx (green), 3xx (cyan), 4xx (yellow), 5xx (red)\n- Duration: <100ms (green), 100-500ms (yellow), >500ms (red)\n\n## How SSL Works\n\n1. A request arrives for `myapp.yourdomain.com`\n2. Caddy checks with `pgrok-ask`: \"Should I get a cert for this domain?\"\n3. `pgrok-ask` verifies it's a single-level subdomain of `*.yourdomain.com`\n4. Caddy uses HTTP-01 challenge to get a cert -- tries Let's Encrypt first, falls back to ZeroSSL if rate-limited\n5. Cert is cached and auto-renewed\n6. The TUI client triggers cert provisioning during tunnel setup, so it's ready before you open the URL\n\n## Security\n\n- SSH key authentication only (no passwords)\n- Dedicated `pgrok` user with restricted SSH (remote forwarding only)\n- Caddy admin API only on localhost (not exposed externally)\n- SSH tunnels bind to localhost only (`GatewayPorts no`)\n- `pgrok-ask` prevents cert abuse -- only allows single-level subdomains\n\n## Configuration\n\n### Client (`~/.pgrok/config`)\n\nGenerated by the installer. Edit manually if needed:\n\n```bash\nPGROK_HOST=your-vps-ip\nPGROK_DOMAIN=yourdomain.com\nPGROK_USER=pgrok\nPGROK_SSH_KEY=~/.ssh/id_ed25519\n```\n\n### Server (`/opt/pgrok/`)\n\n| File | Purpose |\n|------|---------|\n| `Caddyfile` | On-demand TLS config with LE + ZeroSSL |\n| `docker-compose.yml` | Caddy container |\n\n| Script (`/usr/local/bin/`) | Purpose |\n|----------------------------|---------|\n| `pgrok-tunnel` | Manages Caddy routes + provisions TLS certs |\n| `pgrok-ask` | Validates cert requests (systemd service) |\n\n## Troubleshooting\n\n**Stuck on \"connecting\" in the TUI:**\n- Run with `--print-logs`, press Ctrl+C, check `/tmp/pgrok-debug.log`\n- Verify SSH works: `ssh pgrok@your-vps-ip echo ok`\n\n**Stuck on \"provisioning TLS...\":**\n- Let's Encrypt may be rate-limited (50 certs/week). ZeroSSL fallback handles this.\n- Check Caddy logs: `docker compose logs caddy` in `/opt/pgrok`\n\n**SSL certificate errors:**\n- Verify `pgrok-ask` is running: `systemctl status pgrok-ask`\n- Make sure ports 80 and 443 are open\n- Cloudflare proxy (orange cloud) must be OFF for the wildcard record\n\n## Development\n\n```bash\ncd client/tui\nbun install\nbun run index.ts myapp 4000    # dev mode\nbun run build                   # compile binary\nbun run tsc --noEmit            # type-check\n```\n\n## Limitations\n\n- Single user (personal tool, not multi-tenant)\n- Mac and Linux only (no Windows)\n- No automatic reconnection (restart `pgrok` if connection drops)\n- Stale routes possible on abrupt disconnection (self-heal on next connect)\n- HTTP request logging only (WebSocket passthrough works but isn't logged)\n\n## CONTRIBUTING\n\nWe welcome contributions! Please open an issue or PR.\n\n## LICENSE\n\nMIT\n","summary":"pgrok is a self-hosted alternative to ngrok that allows you to expose local services to the internet via your own VPS. It leverages SSH reverse tunneling and Caddy for automatic HTTPS, providing a seamless way to tunnel traffic with features like request inspection and live traffic monitoring. Developers and system administrators who want a private, customizable, and free tunneling solution will benefit from its interactive TUI dashboard and comprehensive connection statistics.","description":"Personal ngrok alternative. Expose local ports to the internet with automatic HTTPS via SSH tunnels + Caddy.","stars":888,"language":"TypeScript"},{"owner":"hallucinogen","repo":"agent-viewer","url":"https://github.com/hallucinogen/agent-viewer","readme":"# Agent Viewer\n\nA kanban board for managing multiple Claude Code agents running in tmux sessions. Spawn, monitor, and interact with agents from a single web UI.\n\n<img width=\"1466\" height=\"725\" alt=\"Screenshot 2026-02-09 at 14 54 21\" src=\"https://github.com/user-attachments/assets/cd31b988-f649-4e92-9844-7a1ece9aa634\" />\n\nManage your agents from your mobile phone with Tailscale\n\n![IMG_7782](https://github.com/user-attachments/assets/c7298d61-dd37-4d0f-8b0a-d9d1f0231782)\n\n\n## Prerequisites\n\n- [Node.js](https://nodejs.org/) (v18+)\n- [tmux](https://github.com/tmux/tmux)\n- [Claude CLI](https://docs.anthropic.com/en/docs/claude-code) (`claude` command available in your PATH)\n\n### Install prerequisites (macOS)\n\n```bash\nbrew install node tmux\nnpm install -g @anthropic-ai/claude-code\n```\n\n## Setup\n\n```bash\ngit clone <repo-url> && cd agent-viewer\nnpm install\n```\n\n## Usage\n\n```bash\nnpm start\n```\n\nOpen http://localhost:4200 in your browser.\n\n### Configuration\n\n| Variable | Default     | Description              |\n|----------|-------------|--------------------------|\n| `PORT`   | `4200`      | Server port              |\n| `HOST`   | `localhost`  | Bind address (`0.0.0.0` for network access) |\n\nExample:\n\n```bash\nHOST=0.0.0.0 PORT=3000 npm start\n```\n\n## Remote Access via Tailscale\n\nYou can access Agent Viewer from your phone (or any device) by using [Tailscale](https://tailscale.com/).\n\n### 1. Install Tailscale on your Mac\n\n```bash\nbrew install tailscale\n```\n\nOr download from [tailscale.com/download](https://tailscale.com/download).\n\n### 2. Install Tailscale on your phone\n\nDownload the Tailscale app from the [App Store](https://apps.apple.com/app/tailscale/id1470499037) or [Google Play](https://play.google.com/store/apps/details?id=com.tailscale.ipn). Sign in with the same account.\n\n### 3. Start the server\n\n```bash\nnpm start\n```\n\nThe server binds to `0.0.0.0` by default, so it's already accessible on all network interfaces including Tailscale.\n\n### 4. Open on your phone\n\nFind your Mac's Tailscale IP (shown in the Tailscale app or via `tailscale ip`), then visit:\n\n```\nhttp://<tailscale-ip>:4200\n```\n\nIf you have [MagicDNS](https://tailscale.com/kb/1081/magicdns) enabled, you can use your machine name instead:\n\n```\nhttp://<machine-name>:4200\n```\n\n## Features\n\n- **Spawn agents** ŌĆö Click `[+ SPAWN]` or press `N`, enter a project path and prompt. Each agent launches in its own tmux session running `claude`.\n- **Kanban columns** ŌĆö Agents are sorted into Running, Idle, and Completed columns based on their state.\n- **Auto-discovery** ŌĆö Existing tmux sessions running Claude are automatically detected and added to the board.\n- **Live output** ŌĆö Click `VIEW OUTPUT` to see the full terminal output with ANSI color rendering.\n- **Send messages** ŌĆö Type in the prompt field on any card and press `Ctrl+Enter` to send follow-up messages to an agent.\n- **File uploads** ŌĆö Drag and drop files onto a card or click `FILE` to send files to an agent.\n- **Re-spawn** ŌĆö Completed agents can be re-spawned with a new prompt from the same project directory.\n- **Attach** ŌĆö Click `ATTACH` to copy the `tmux attach` command for direct terminal access.\n","summary":"Agent Viewer is a web-based kanban dashboard designed to streamline the management of multiple Claude Code agents running in tmux sessions. It allows users to spawn new agents, monitor their progress, and interact directly with them through features like live terminal output, file uploads, and follow-up messaging. The project includes built-in support for remote access via Tailscale, making it an ideal tool for developers who need to manage automated coding tasks on the go.","description":"Kanban board for managing Claude Code agents in tmux","stars":385,"language":"HTML"},{"owner":"lukilabs","repo":"beautiful-mermaid-swift","url":"https://github.com/lukilabs/beautiful-mermaid-swift","readme":"<div align=\"center\">\n\n# BeautifulMermaid\n\n**Render Mermaid diagrams as beautiful native images, SVGs, and ASCII art**\n\nA native Swift implementation of [beautiful-mermaid](https://github.com/lukilabs/beautiful-mermaid), powered by the [ELK](https://www.eclipse.org/elk/) layout engine.\n\n[![Swift 5.9+](https://img.shields.io/badge/Swift-5.9+-orange.svg)](https://swift.org)\n[![Platforms](https://img.shields.io/badge/Platforms-iOS%20|%20macOS%20|%20visionOS-blue.svg)](https://developer.apple.com)\n[![SPM Compatible](https://img.shields.io/badge/SPM-Compatible-brightgreen.svg)](https://swift.org/package-manager/)\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](LICENSE)\n\n</div>\n\n## Overview\n\nBeautifulMermaid is a native Swift port of [beautiful-mermaid](https://github.com/lukilabs/beautiful-mermaid). Parse and render Mermaid diagrams without WebViews or JavaScript. Uses [elk-swift](https://github.com/lukilabs/elk-swift) for graph layout ŌĆö a minimal Swift port of the Eclipse Layout Kernel.\n\n## Features\n\n- **6 diagram types** ŌĆö Flowcharts, State, Sequence, Class, ER, and XY Charts\n- **Multiple output formats** ŌĆö Native images (`UIImage` / `NSImage`), SVG, and ASCII art\n- **17 built-in themes** ŌĆö Tokyo Night, Dracula, Nord, Gruvbox, and more\n- **VS Code theme import** ŌĆö Load any Shiki/VS Code theme via `ShikiTheme`\n- **Mono mode** ŌĆö Beautiful diagrams from just 2 colors\n- **SwiftUI integration** ŌĆö Built-in `MermaidDiagramView` with a value-type `MermaidDiagram` model\n- **CALayer rendering** ŌĆö `MermaidLayer` for lightweight, direct Core Graphics rendering\n- **Async rendering** ŌĆö All render methods available as `async` variants\n- **Pure Swift** ŌĆö No WebView, no JavaScript\n- **Cross-platform** ŌĆö iOS 15+, macOS 12+, Mac Catalyst 15+, visionOS 1.0+\n\n## Installation\n\n### Swift Package Manager\n\nAdd BeautifulMermaid to your `Package.swift`:\n\n```swift\ndependencies: [\n    .package(url: \"https://github.com/lukilabs/beautiful-mermaid-swift\", from: \"1.0.0\")\n]\n```\n\nThen add it to your target dependencies:\n\n```swift\n.target(\n    name: \"YourTarget\",\n    dependencies: [.product(name: \"BeautifulMermaid\", package: \"beautiful-mermaid-swift\")]\n)\n```\n\n## Quick Start\n\n```swift\nimport BeautifulMermaid\n\nlet mermaidCode = \"\"\"\ngraph TD\n    A[Start] --> B{Decision}\n    B -->|Yes| C[Do Something]\n    B -->|No| D[Do Something Else]\n    C --> E[End]\n    D --> E\n\"\"\"\n\n// Render as image\nlet image = try MermaidRenderer.renderImage(source: mermaidCode)\n\n// Render as SVG\nlet svg = try MermaidRenderer.renderSVG(source: mermaidCode, theme: .tokyoNight)\n\n// Render as ASCII art\nlet ascii = try MermaidRenderer.renderASCII(source: mermaidCode, theme: .zincDark)\n```\n\n### SwiftUI\n\nUse the built-in `MermaidDiagramView`:\n\n```swift\nimport SwiftUI\nimport BeautifulMermaid\n\nstruct ContentView: View {\n    var body: some View {\n        MermaidDiagramView(\n            source: \"graph TD; A-->B; B-->C;\",\n            theme: .catppuccinMocha\n        )\n    }\n}\n```\n\n### UIKit / AppKit\n\n`MermaidView` is a native `UIView` (iOS) / `NSView` (macOS) subclass:\n\n```swift\nimport BeautifulMermaid\n\nlet mermaidView = MermaidView(frame: CGRect(x: 0, y: 0, width: 400, height: 300))\nmermaidView.source = \"graph TD; A-->B; B-->C;\"\nmermaidView.theme = .catppuccinMocha\nview.addSubview(mermaidView)\n```\n\n### Image Export\n\nExport diagrams as PNG or JPEG data:\n\n```swift\nlet renderer = MermaidImageRenderer()\nrenderer.theme = .dracula\nrenderer.scale = 3.0\n\nlet pngData = try renderer.renderPNG(from: mermaidCode)\nlet jpegData = try renderer.renderJPEG(from: mermaidCode, quality: 0.9)\n```\n\n### Async Rendering\n\nAll render methods have async variants for background processing:\n\n```swift\nlet image = try await MermaidRenderer.renderImageAsync(source: mermaidCode, theme: .nord)\nlet svg = try await MermaidRenderer.renderSVGAsync(source: mermaidCode)\nlet ascii = try await MermaidRenderer.renderASCIIAsync(source: mermaidCode)\n```\n\n## Theming\n\n### Two-Color Theming\n\nAt minimum, you only need **two colors**:\n\n```swift\nlet theme = DiagramTheme(\n    background: \"#1a1b26\",  // Background color\n    foreground: \"#c0caf5\"   // Text/line color\n)\n```\n\nFrom these two colors, the system automatically derives text colors, node fills, strokes, edge colors, and all other UI elements.\n\n### Optional Enrichment Colors\n\nFor more control, add optional accent colors:\n\n```swift\nlet theme = DiagramTheme(\n    background: \"#1a1b26\",\n    foreground: \"#c0caf5\",\n    line: \"#565f89\",        // Edge lines\n    accent: \"#7aa2f7\",      // Highlighted elements\n    muted: \"#414868\",       // De-emphasized elements\n    surface: \"#24283b\",     // Node backgrounds\n    border: \"#414868\"       // Node borders\n)\n```\n\n### VS Code / Shiki Theme Import\n\nImport any VS Code color theme:\n\n```swift\nlet shikiTheme = DiagramTheme.ShikiTheme(\n    type: \"dark\",\n    colors: [\n        \"editor.background\": \"#1e1e1e\",\n        \"editor.foreground\": \"#d4d4d4\",\n        \"focusBorder\": \"#007acc\"\n    ],\n    tokenColors: []\n)\n\nlet theme = DiagramTheme.fromShikiTheme(shikiTheme)\n```\n\n### Built-in Themes\n\n| Theme | Description |\n|-------|-------------|\n| `.zincLight` / `.zincDark` | Default, clean appearance |\n| `.tokyoNight` / `.tokyoNightStorm` / `.tokyoNightLight` | Popular VS Code theme |\n| `.catppuccinMocha` / `.catppuccinLatte` | Soothing pastel colors |\n| `.nord` / `.nordLight` | Arctic-inspired palette |\n| `.dracula` | Classic dark theme |\n| `.githubLight` / `.githubDark` | Familiar GitHub style |\n| `.solarizedLight` / `.solarizedDark` | Eye-friendly colors |\n| `.oneDark` | Atom editor style |\n| `.gruvboxDark` / `.gruvboxLight` | Retro groove colors |\n\n## Supported Diagrams\n\n### Flowcharts\n\n<picture>\n  <source media=\"(prefers-color-scheme: dark)\" srcset=\"assets/examples/flowchart-dark.png\">\n  <source media=\"(prefers-color-scheme: light)\" srcset=\"assets/examples/flowchart-light.png\">\n  <img src=\"assets/examples/flowchart-light.png\" alt=\"Flowchart Example\" width=\"400\">\n</picture>\n\n<details>\n<summary>ASCII art output</summary>\n\n```\nŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ\nŌöé              CI Pipeline               Ōöé\nŌöé                                        Ōöé\nŌöé                                        Ōöé\nŌöé ŌöīŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöÉ                     Ōöé\nŌöé Ōöé                Ōöé                     Ōöé\nŌöé Ōöé   Push Code    ŌöéŌŚäŌöäŌöäŌöäŌöäŌöäŌöäŌöäŌöäŌöäŌöäŌöäŌöÉ        Ōöé\nŌöé Ōöé                Ōöé            Ōöå        Ōöé\nŌöé ŌööŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌö¼ŌöĆŌöĆŌ
