n- `make install`: Install base dependencies.\n- `make check`: Run linter, formatter, and tests.\n\nTo run a quick test, the following will run an RLM query with the OpenAI client using your environment variable `OPENAI_API_KEY` (feel free to change this). This will generate console output as well as a log which you can use with the visualizer to explore the trajectories.\n```bash\nmake quickstart\n```\n\n</details>\n\n## REPL Environments\nWe support two types of REPL environments -- isolated, and non-isolated. Non-isolated environments (default) run code execution on the same machine as the RLM (e.g. through `exec`), which is pretty reasonable for some local low-risk tasks, like simple benchmarking, but can be problematic if the prompts or tool calls can interact with malicious users. Fully isolated environments use cloud-based sandboxes (e.g. Prime Sandboxes, [Modal Sandboxes](https://modal.com/docs/guide/sandboxes)) to run code generated by the RLM, ensuring complete isolation from the host process. Environments can be added, but we natively support the following: `local` (default), `ipython`, `docker`, `modal`, `prime`, `daytona`, `e2b`.\n\n```python\nrlm = RLM(\n    environment=\"...\", # \"local\", \"ipython\", \"docker\", \"modal\", \"prime\", \"daytona\", \"e2b\"\n    environment_kwargs={...},\n)\n```\n\n### Local Environments\nThe default `local` environment `LocalREPL` runs in the same process as the RLM itself, with specified global and local namespaces for minimal security. Using this REPL is generally safe, but should not be used for production settings. It also shares the same virtual environment (e.g. Conda or uv) as the host process.\n\n#### IPython (*requires `pip install 'rlms[ipython]'`*)\n`IPythonREPL` runs cells inside a real IPython session ŌĆö either in-process (default) or in a separate `ipykernel` subprocess. Subprocess mode adds hard `cell_timeout` enforcement and full namespace isolation from the RLM host. See the [IPythonREPL docs](https://alexzhang13.github.io/rlm/environments/ipython) for details.\n\n#### Docker <img src=\"https://github.com/docker.png\" alt=\"Docker\" height=\"20\" style=\"vertical-align: middle;\"/> (*requires [Docker installed](https://docs.docker.com/desktop/setup/install/)*)\nWe also support a Docker-based environment called `DockerREPL` that launches the REPL environment as a Docker image. By default, we use the `python:3.11-slim` image, but the user can specify custom images as well.\n\n### Isolated Environments\nWe support several different REPL environments that run on separate, cloud-based machines. Whenever a recursive sub-call is made in these instances, it is requested from the host process.\n\n#### Modal Sandboxes <img src=\"https://github.com/modal-labs.png\" alt=\"Modal\" height=\"20\" style=\"vertical-align: middle;\"/>\nTo use [Modal Sandboxes](https://modal.com/docs/guide/sandboxes) as the REPL environment, you need to install and authenticate your Modal account.\n```bash\nuv add modal  # add modal library\nmodal setup   # authenticate account\n```\n\n#### Prime Intellect Sandboxes <img src=\"https://github.com/PrimeIntellect-ai.png\" alt=\"Prime Intellect\" height=\"20\" style=\"vertical-align: middle;\"/>\n> [!NOTE]\n> **Prime Intellect Sandboxes** are currently a beta feature. See the [documentation](https://docs.primeintellect.ai/sandboxes/overview) for more information. We noticed slow runtimes when using these sandboxes, which is currently an open issue.\n\n\nTo use [Prime Sandboxes](https://docs.primeintellect.ai/sandboxes/sdk), install the SDK and set your API key:\n```bash\nuv pip install -e \".[prime]\"\nexport PRIME_API_KEY=...\n```\n\n\n### Model Providers\nWe currently support most major clients (OpenAI, Anthropic), as well as the router platforms (OpenRouter, Portkey). For local models, we recommend using vLLM (which interfaces with the [OpenAI client](https://github.com/alexzhang13/rlm/blob/main/rlm/clients/openai.py)). To view or add support for more clients, start by looking at [`rlm/clients/`](https://github.com/alexzhang13/rlm/tree/main/rlm/clients).\n\n## Training\nWe provide a simple RL training harness for training RLMs used in this repo (specifically the `local` REPL). The implementation uses no sandboxes for simplicity and slots easily your use case, but an ideal setup would use sandboxes for safety. Training logic is isolated to the [`training/`](https://github.com/alexzhang13/rlm/tree/main/training) folder, which exposes `rlm.RLM` as a [`verifiers`](https://github.com/willccbb/verifiers) `Environment` and plugs straight into [`prime-rl`](https://github.com/PrimeIntellect-ai/prime-rl). See the [training README](https://github.com/alexzhang13/rlm/tree/main/training#readme) for the launch command. The harness uses subprocess-isolated local REPL execution (no cloud sandboxes), matching the `local` environment above.\n\nA worked example with an example `.toml` lives in [`training/environments/oolong/`](https://github.com/alexzhang13/rlm/tree/main/training/environments/oolong) (OOLONG long-context QA). New training environments can be added the same way ŌĆö author a `verifiers` env that wraps your task (see the [verifiers docs](https://verifiers.readthedocs.io/)), then reference it from a config.\n\n## Relevant Reading\n* **[Dec '25]** [Recursive Language Models arXiv](https://arxiv.org/abs/2512.24601)\n* **[Oct '25]** [Recursive Language Models Blogpost](https://alexzhang13.github.io/blog/2025/rlm/)\n\nIf you use this code or repository in your research, please cite:\n\n```bibtex\n@misc{zhang2026recursivelanguagemodels,\n      title={Recursive Language Models},\n      author={Alex L. Zhang and Tim Kraska and Omar Khattab},\n      year={2026},\n      eprint={2512.24601},\n      archivePrefix={arXiv},\n      primaryClass={cs.AI},\n      url={https://arxiv.org/abs/2512.24601},\n}\n```\n\n## RLMs in the Wild\nThere are many amazing demos and production-ready use cases of RLMs. We provide a list of notable examples that explicitly use RLMs as a central piece of their design.\n* <img src=\"https://www.google.com/s2/favicons?domain=dspy.ai&sz=64\" alt=\"DSPy\" height=\"15\" style=\"vertical-align: middle;\"/> [DSPy.RLM](https://github.com/stanfordnlp/dspy) <a href=\"https://github.com/stanfordnlp/dspy/stargazers\"><img src=\"https://badgen.net/github/stars/stanfordnlp/dspy?icon=github&label=Stars\" height=\"15\" alt=\"GitHub stars\"></a>\n* <img src=\"https://github.com/ax-llm.png\" alt=\"Ax\" height=\"15\" style=\"vertical-align: middle;\"/> [Ax](https://github.com/ax-llm/ax) <a href=\"https://github.com/ax-llm/ax/stargazers\"><img src=\"https://badgen.net/github/stars/ax-llm/ax?icon=github&label=Stars\" height=\"15\" alt=\"GitHub stars\"></a>\n* <img src=\"https://github.com/context-labs.png\" alt=\"context-labs\" height=\"15\" style=\"vertical-align: middle;\"/> [context-labs/HALO: **RLM-based Automatic Agent Optimization Loop**](https://github.com/context-labs/halo) <a href=\"https://github.com/context-labs/halo/stargazers\"><img src=\"https://badgen.net/github/stars/context-labs/halo?icon=github&label=Stars\" height=\"15\" alt=\"GitHub stars\"></a>\n* [viplismism/rlm-cli: **CLI for Recursive Language Models**](https://github.com/viplismism/rlm-cli) <a href=\"https://github.com/viplismism/rlm-cli/stargazers\"><img src=\"https://badgen.net/github/stars/viplismism/rlm-cli?icon=github&label=Stars\" height=\"15\" alt=\"GitHub stars\"></a>\n* <img src=\"https://www.google.com/s2/favicons?domain=alphaxiv.org&sz=64\" alt=\"alphaXiv\" height=\"15\" style=\"vertical-align: middle;\"/> [alphaXiv Official Blog. **Reinforcing Recursive Language Models**](https://www.alphaxiv.org/blog/reinforcement-learning-for-rlms#training)\n* <img src=\"https://www.google.com/s2/favicons?domain=daytona.io&sz=64\" alt=\"Daytona\" height=\"15\" style=\"vertical-align: middle;\"/> [Daytona. **Building Deep Recursive Language Models**](https://www.daytona.io/docs/en/guides/rlm/recursive-language-models/)\n* <img src=\"https://www.google.com/s2/favicons?domain=symbolica.ai&sz=64\" alt=\"Symbolica\" height=\"15\" style=\"vertical-align: middle;\"/> [Symbolica. **SotA ARC-AGI-2 Results with REPL Agents**](https://www.symbolica.ai/blog/arcgentica)\n* <img src=\"https://www.google.com/s2/favicons?domain=cloud.google.com&sz=64\" alt=\"Google Cloud\" height=\"15\" style=\"vertical-align: middle;\"/> [Google Cloud Community Articles. **RLMs in ADK**](https://discuss.google.dev/t/recursive-language-models-in-adk/)\n* <img src=\"https://github.com/PrimeIntellect-ai.png\" alt=\"Prime Intellect\" height=\"15\" style=\"vertical-align: middle;\"/> [Prime Intellect Blog. **Recursive Language Models: *the* paradigm of 2026**](https://www.primeintellect.ai/blog/rlm)\n\n## Optional: Trajectory metadata, logging, and debugging\n`RLMChatCompletion` has an optional `metadata` field (default `None`) that holds the full trajectory (run config + all iterations and sub-calls) so you can reconstruct the run. Pass an `RLMLogger` to capture it:\n\n- **In-memory only** (trajectory on `completion.metadata`): `logger=RLMLogger()` (no `log_dir`).\n- **Also save to disk** (JSONL for the visualizer): `logger=RLMLogger(log_dir=\"./logs\")`.\n\n**Visualizing logs.** We also provide a simple visualizer to inspect code, sub-LM, and root-LM calls. Use `RLMLogger(log_dir=\"./logs\")` so each completion writes a `.jsonl` file:\n```python\nfrom rlm.logger import RLMLogger\nfrom rlm import RLM\n\nlogger = RLMLogger(log_dir=\"./logs\")\nrlm = RLM(..., logger=logger)\n```\n\nTo run the visualizer locally, we use Node.js and shadcn/ui:\n```\ncd visualizer/\nnpm run dev        # default localhost:3001\n```\n","summary":"Recursive Language Models (RLMs) provide a task-agnostic inference paradigm that enables language models to manage near-infinite context by programmatically decomposing tasks and recursively calling themselves. The framework replaces standard completion calls with a REPL-integrated environment, allowing the model to treat context as variables and sub-calls as functions within a code-driven harness. This architecture is designed for researchers and developers seeking to move beyond traditional JSON-based tool calling toward more flexible, scalable, and recursive LLM agent designs. The repository includes an extensible inference engine, a training environment, and support for both local and API-based models.","description":"General plug-and-play inference library for Recursive Language Models (RLMs), supporting various sandboxes.","stars":4404,"language":"Python"},{"owner":"ocrbase-hq","repo":"ocrbase","url":"https://github.com/ocrbase-hq/ocrbase","readme":"<div align=\"center\">\n  <h1>ocrbase: Model-Agnostic OCR API</h1>\n  <p>\n    <a href=\"https://github.com/ocrbase-hq/ocrbase/releases\"><img src=\"https://img.shields.io/github/v/release/ocrbase-hq/ocrbase?color=blue\" alt=\"Release\"></a>\n    <a href=\"https://github.com/ocrbase-hq/ocrbase/pkgs/container/ocrbase\"><img src=\"https://img.shields.io/badge/ghcr.io-ocrbase--hq%2Focrbase-2496ED?logo=docker&logoColor=white\" alt=\"Docker\"></a>\n    <img src=\"https://img.shields.io/badge/runtime-Bun-black?logo=bun&logoColor=white\" alt=\"Bun\">\n    <img src=\"https://img.shields.io/badge/license-MIT-green\" alt=\"License\">\n  </p>\n</div>\n\n­¤ōä **ocrbase** is a **lightweight, model-agnostic** API that standardizes document parsing across visual language models (VLMs).\n\n## Key Features of ocrbase\n\n­¤¬Č **Lightweight**: Tiny Bun + Elysia service, single container, minimal footprint.\n\n­¤öī **Model-Agnostic**: Point at any supported VLM ŌĆö GLM-OCR, PaddleOCR-VL ŌĆö via env vars.\n\n­¤ōŖ **State of the Art**: Backed by models scoring Ōēź94.5 on OmniDocBench v1.5.\n\n­¤ÆÄ **Easy to Deploy**: [One command](#-quick-start) away from a working OCR API.\n\n## ­¤¦® Core\n\n- `/v1/parse` ŌĆö turn a document into text\n- `/v1/parse/async` ŌĆö enqueue a parse job\n- `/v1/extract` ŌĆö extract structured JSON from a document\n- `/v1/extract/async` ŌĆö enqueue an extract job\n- `/v1/job/:jobId` ŌĆö inspect parse or extract job status\n\n## ­¤¦Ā Models\n\nBoth models are state of the art:\n\n- **[paddleocr](https://huggingface.co/PaddlePaddle/PaddleOCR-VL)** ŌĆö **94.5** on [OmniDocBench v1.5](https://github.com/opendatalab/OmniDocBench)\n- **[glmocr](https://huggingface.co/zai-org/GLM-OCR)** ŌĆö **94.6** on [OmniDocBench v1.5](https://github.com/opendatalab/OmniDocBench)\n\n## ­¤ōŗ Requirements\n\n> [!IMPORTANT]\n> ocrbase does not ship the models ŌĆö point it at a running inference server:\n\n- **[paddleocr](https://www.paddleocr.ai/latest/en/version3.x/pipeline_usage/PaddleOCR-VL.html)** ŌĆö set up [PaddleOCR-VL](https://www.paddleocr.ai/latest/en/version3.x/pipeline_usage/PaddleOCR-VL.html)\n- **[glmocr](https://github.com/zai-org/GLM-OCR?tab=readme-ov-file#option-2-self-host-with-vllm--sglang)** ŌĆö self-host [GLM-OCR with vLLM](https://github.com/zai-org/GLM-OCR?tab=readme-ov-file#option-2-self-host-with-vllm--sglang)\n\n## ­¤ÜĆ Quick Start\n\n```sh\ndocker run -d -p 3000:3000 \\\n  -e PADDLEOCR_URL=http://localhost:8190 \\\n  -e GLM_OCR_URL=http://localhost:5002 \\\n  --name ocrbase ghcr.io/ocrbase-hq/ocrbase\n```\n\n## ­¤øĀ’ĖÅ Develop\n\n```sh\nbun install\nbun dev\n```\n\n## Ōśü’ĖÅ Optional S3 Input Staging\n\nIf `S3_ACCESS_KEY_ID`, `S3_SECRET_ACCESS_KEY`, `S3_BUCKET`, and `S3_ENDPOINT` are set, `/v1/parse` will:\n\n- upload incoming `File` inputs to S3\n- fetch remote document URLs and upload the contents to S3\n- upload base64 or data URL payloads to S3\n- pass a presigned `GET` URL into the selected document model\n\nIf those env vars are not set, `ocrbase` keeps the current direct behavior and sends the original input to the model.\n\n## ­¤ō¼ Optional BullMQ Parse Queue\n\nIf `REDIS_URL` and the S3 env vars above are set, queue mode is enabled:\n\n- `POST /v1/parse` uploads or normalizes the input to S3, enqueues a parse job, waits for completion, and returns the normal parse response\n- `POST /v1/parse/async` returns `202 { jobId }`\n- `GET /v1/job/:jobId` returns the job state plus `result` or `error`\n\nIf Redis is missing, or Redis is present but S3 is not fully configured, `POST /v1/parse` keeps the existing direct behavior and the async/status endpoints return `503`.\n\nWhen queue mode is enabled, Bull Board is also available at `/v1/admin/queues`.\n","summary":"ocrbase is a lightweight, model-agnostic API designed to standardize document parsing by connecting to high-performance visual language models like PaddleOCR-VL and GLM-OCR. The service provides simplified endpoints for extracting text and structured JSON data from documents, supporting both direct and asynchronous processing workflows. With optional S3 integration and BullMQ queue management, it offers a scalable solution for developers looking to deploy state-of-the-art OCR capabilities with minimal infrastructure overhead.","description":"­¤ōä PDF/IMG ->.MD/JSON Document OCR API for PaddleOCR and GLMOCR. Self-hostable.","stars":21,"language":"TypeScript"},{"owner":"madalinpopa","repo":"gocost-web","url":"https://github.com/madalinpopa/gocost-web","readme":"# gocost-web\n![GitHub go.mod Go version](https://img.shields.io/github/go-mod/go-version/madalinpopa/gocost-web)\n\nGolang-based web application for personal expense management, focused on a clean monthly workflow and intuitive tracking of recurring and non-recurring costs.\n\nLive demo: [cost.coderustle.ro](https://cost.coderustle.ro)\nUser: `admin@gocost.ro`, Password: `secret123`\n\n## Screenshots\n\n![Dashboard](./docs/images/desktop-dark.png)\n\n## Overview\n\n### Typical Workflow\n- **Pick a month**: Move between months to review past spending or plan upcoming costs.\n- **Create Groups**: Create groups (e.g., Housing, Transportation) to organize your expenses.\n- **Set up Categories**: Inside each group, create categories (e.g., Rent, Groceries). Define a budget for the category and choose if it is recurrent or for the current month only.\n- **Record Expenses**: Add specific expenses to a category (e.g., \"Weekly Shop\"). Mark them as paid or unpaid to track cash flow.\n- **Review Status**: Visually track spending against your category budgets and see what's left to pay.\n\n### Core Features\n- **Category Management**: Organize expenses into groups (e.g., Housing, Transportation).\n- **Flexible Category Types**:\n    - **This month only**: applies only to the currently selected month.\n    - **Recurrent**: persists across months until a specified end date (or indefinitely).\n\n## Recording Expenses\n\nFor each expense category, the user can record expenses by providing:\n\n- an **amount**, and\n- a **payment status** (paid or unpaid).\n\nThe payment status is visually reflected in the category so the user can immediately see which expenses are settled and which are pending.\n\n## User Experience Goals\n\n- Intuitive navigation centered on monthly context.\n- Clear grouping of categories and expenses.\n- Efficient handling of both recurring and non-recurring costs.\n\n## Technical Details\n\n- **Backend:** Go (1.26.1+), `net/http`, `a-h/templ` for server-side UI rendering.\n- **Frontend:** Tailwind CSS, HTMX for server-driven updates, Alpine.js for lightweight client state.\n- **Data:** SQLite database with migrations managed by `goose`.\n- **Configuration:** Environment-driven configuration via `.envrc` (generated from `envrc.template`).\n- **Tooling:** `make` targets for build/dev/test; `air` for live reload.\n\n## Environment Variables\n\nRequired:\n- `ALLOWED_HOSTS`: comma-separated list of allowed hostnames (e.g. `localhost,example.com`).\n- `DOMAIN`: base domain for the app (e.g. `localhost` or `gocost.example`).\n\nOptional:\n- `CURRENCY`: ISO 4217 currency code (default: `USD`).\n- `TRUSTED_PROXIES`: comma-separated list of trusted proxy IP addresses or CIDR ranges.\n- `APP_ENV`: application environment, typically `production` or `development` (default: `development`).\n- `APP_ADDR`: the address the web server listens on (default: `0.0.0.0`).\n- `APP_PORT`: the port the web server listens on (default: `4000`).\n- `DB_PATH`: SQLite file path used by the Docker entrypoint (default: `/app/data/data.sqlite`).\n- `VERSION`: Docker image tag used by `compose.yml` (default: `latest`).\n- `GOOSE_DRIVER`, `GOOSE_DBSTRING`, `GOOSE_MIGRATION_DIR`: used by `goose` during development (see `envrc.template`).\n\n### Project Structure\n\n- `cmd/web`: web server entry point.\n- `internal/domain`: core business entities.\n- `internal/usecase`: application use cases and interfaces.\n- `internal/interfaces`: HTTP handlers, routing, and web adapters.\n- `internal/infrastructure`: configuration and storage implementations.\n- `ui`: Templ components and static assets.\n- `migrations`: SQL migration files.\n\n## Run Locally with Docker\n\nUse the provided `Dockerfile` and `compose.yml` to build and run the app locally.\n\n### Using Docker Compose\n\n```bash\n# build the image for local use\ndocker build -t ghcr.io/madalinpopa/gocost-web:local .\n\n# create the external network used by compose (safe if it already exists)\ndocker network create public\n\n# start the app on http://localhost:4000\nVERSION=local docker compose up\n```\n\nOptional environment overrides (set before `docker compose up`):\n`ALLOWED_HOSTS`, `DOMAIN`, `CURRENCY`.\n\n### Using Docker Run\n\nTo run the container without Docker Compose:\n\n```bash\n# build the image\ndocker build -t ghcr.io/madalinpopa/gocost-web:local .\n\n# run the container\ndocker run -d \\\n  --name gocost \\\n  -p 4000:4000 \\\n  -e ALLOWED_HOSTS=localhost \\\n  -e DOMAIN=localhost \\\n  -v gocost_data:/app/data \\\n  ghcr.io/madalinpopa/gocost-web:local\n```\n\n## Development\n\n### Prerequisites\n\n- Go 1.26.1+\n- Node.js + npm (Tailwind CLI)\n- Optional: `direnv` and 1Password CLI (`op`) for `.envrc` generation\n\n### Common Commands\n\n- `make init`: download deps, generate Templ, install npm packages, create `.envrc`.\n- `make dev`: run server + Templ + Tailwind watchers with live reload.\n- `make build/web`: build the web server binary to `bin/server`.\n- `make test`: run Go tests under `./internal...`.\n- `make test/race`: run race detector tests.\n- `make check`: run `go vet` and `staticcheck`.\n\n## Contributing\n\nContributions are welcome. Please follow these steps:\n\n1. Fork the repository and create a feature branch.\n2. Keep changes focused and follow the existing project layout.\n3. Run `make test` (and `make check` if you have `staticcheck`) before opening a PR.\n4. If you change `.templ` files or CSS, ensure generated files are up to date.\n5. Open a pull request with a clear description of the change.\n","summary":"Gocost-web is a Golang-based personal expense management application designed to help users track their finances through an intuitive, month-centric workflow. The platform allows users to organize spending into custom groups and categories, providing the flexibility to handle both one-time expenses and recurring costs that persist over time. By utilizing HTMX and a SQLite backend, the application offers a lightweight and efficient experience for individuals who want to monitor their budgets and cash flow status. This tool is ideal for users seeking a self-hosted, structured solution to manage their recurring financial obligations and monthly spending habits.","description":"The anti-subscription expense tracker. Self-hosted. Open source. brutally simple.","stars":68,"language":"Go"},{"owner":"PeonPing","repo":"peon-ping","url":"https://github.com/PeonPing/peon-ping","readme":"# peon-ping\n<div align=\"center\">\n\n**English** | [ĒĢ£ĻĄŁņ¢┤](README_ko.md) | [õĖŁµ¢ć](README_zh.md) | [µŚźµ£¼Ķ¬×](README_ja.md)\n\n![macOS](https://img.shields.io/badge/macOS-blue) ![WSL2](https://img.shields.io/badge/WSL2-blue) ![Linux](https://img.shields.io/badge/Linux-blue) ![Windows](https://img.shields.io/badge/Windows-blue) ![MSYS2](https://img.shields.io/badge/MSYS2-blue) ![SSH](https://img.shields.io/badge/SSH-blue)\n![License](https://img.shields.io/badge/license-MIT-green)\n\n![Claude Code](https://img.shields.io/badge/Claude_Code-hook-ffab01) ![Amp](https://img.shields.io/badge/Amp-adapter-ffab01) ![Gemini CLI](https://img.shields.io/badge/Gemini_CLI-adapter-ffab01) ![GitHub Copilot](https://img.shields.io/badge/GitHub_Copilot-adapter-ffab01) ![Codex](https://img.shields.io/badge/Codex-adapter-ffab01) ![Cursor](https://img.shields.io/badge/Cursor-adapter-ffab01) ![OpenCode](https://img.shields.io/badge/OpenCode-adapter-ffab01) ![Kilo CLI](https://img.shields.io/badge/Kilo_CLI-adapter-ffab01) ![Kiro](https://img.shields.io/badge/Kiro-adapter-ffab01) ![Kimi Code](https://img.shields.io/badge/Kimi_Code-adapter-ffab01) ![Windsurf](https://img.shields.io/badge/Windsurf-adapter-ffab01) ![Antigravity](https://img.shields.io/badge/Antigravity-adapter-ffab01) ![OpenClaw](https://img.shields.io/badge/OpenClaw-adapter-ffab01) ![Rovo Dev CLI](https://img.shields.io/badge/Rovo_Dev_CLI-adapter-ffab01) ![DeepAgents](https://img.shields.io/badge/DeepAgents-adapter-ffab01) ![oh-my-pi](https://img.shields.io/badge/oh--my--pi-adapter-ffab01)\n\n**Game character voice lines + visual overlay notifications when your AI coding agent needs attention ŌĆö or let the agent pick its own sound via MCP.**\n\nAI coding agents don't notify you when they finish or need permission. You tab away, lose focus, and waste 15 minutes getting back into flow. peon-ping fixes this with voice lines and bold on-screen banners from Warcraft, StarCraft, Portal, Zelda, and more ŌĆö works with **Claude Code**, **Amp**, **GitHub Copilot**, **Codex**, **Cursor**, **OpenCode**, **Kilo CLI**, **Kiro**, **Kimi Code**, **Windsurf**, **Google Antigravity**, **Rovo Dev CLI**, **DeepAgents**, and any MCP client.\n\n**See it in action** &rarr; [peonping.com](https://peonping.com/)\n\n<video src=\"https://github.com/user-attachments/assets/149b6d15-65c2-41f2-9b56-13575ff8364b\" autoplay loop muted playsinline width=\"400\"></video>\n\n</div>\n\n---\n\n- [Install](#install)\n- [What you'll hear](#what-youll-hear)\n- [Quick controls](#quick-controls)\n- [Configuration](#configuration)\n- [Peon Trainer](#peon-trainer)\n- [MCP server](#mcp-server)\n- [Multi-IDE support](#multi-ide-support)\n- [Remote development](#remote-development-ssh--devcontainers--codespaces)\n- [Mobile notifications](#mobile-notifications)\n- [Sound packs](#sound-packs)\n- [Debugging](#debugging)\n- [Uninstall](#uninstall)\n- [Requirements](#requirements)\n- [How it works](#how-it-works)\n- [Links](#links)\n\n---\n\n## Install\n\n### Option 1: Homebrew (recommended)\n\n```bash\nbrew install PeonPing/tap/peon-ping\n```\n\nThen run `peon-ping-setup` to register hooks and download sound packs. macOS and Linux.\n\n### Option 2: Installer script (macOS, Linux, WSL2)\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/PeonPing/peon-ping/main/install.sh | bash\n```\n\nŌÜĀ’ĖÅ **WSL2 audio notes.** peon-ping plays audio on the Windows side. On first run it probes your Windows host once (cached per Windows build) to pick the best playback path:\n\n- On **Windows 10 / Windows 11 pre-24H2**, WPF MediaPlayer is used directly ŌĆö native MP3 + WAV, no extra dependencies.\n- On **Windows 11 24H2+** (build 26100+), Microsoft removed legacy Windows Media Player from the OS and WPF MediaPlayer fails (`MILAVERR_INVALIDWMPVERSION`). peon-ping falls back to `System.Media.SoundPlayer`, which uses the Win32 `PlaySound` API and works everywhere ŌĆö but it's WAV-only, so MP3 packs require **ffmpeg** to transcode on the fly:\n\n  ```sh\n  sudo apt update; sudo apt install -y ffmpeg\n  ```\n\nYou can override the auto-detection with `PEON_WSL_AUDIO_BACKEND=auto|mediaplayer|soundplayer`:\n\n- `auto` (default) ŌĆö probe + cache as described above\n- `mediaplayer` ŌĆö force WPF MediaPlayer over the WSL UNC path (fails silently on 24H2+)\n- `soundplayer` ŌĆö force tmpfile copy + `SoundPlayer` (universal, requires ffmpeg for non-WAV files)\n\n### Option 3: Installer for Windows\n\n```powershell\nInvoke-WebRequest -Uri \"https://raw.githubusercontent.com/PeonPing/peon-ping/main/install.ps1\" -OutFile \".\\install.ps1\" -UseBasicParsing\npowershell -ExecutionPolicy Bypass -File .\\install.ps1\n```\n\nInstalls a curated starter set of packs by default. Re-run to update while preserving config/state. Or **[pick your packs interactively at peonping.com](https://peonping.com/#picker)** and get a custom install command.\n\nWindows installer parameters:\n\n- `-All` ŌĆö install all available packs\n- `-Packs peon,sc_kerrigan,...` ŌĆö install specific packs only\n- `-Lang en,fr,...` ŌĆö install only packs matching language(s)\n- `-Local` ŌĆö install packs, config, hooks, and skills into `./.claude/` for the current project\n- `-Global` ŌĆö explicit global install (same as default)\n- `-InitLocalConfig` ŌĆö create `./.claude/hooks/peon-ping/config.json` only\n\n`-Local` does not install the global `peon` CLI shim or modify your user `PATH`. Hooks are registered in the project-level `./.claude/settings.json` with absolute paths so they work from any working directory within the project.\n\nWindows examples:\n\n```powershell\npowershell -ExecutionPolicy Bypass -File .\\install.ps1 -All\npowershell -ExecutionPolicy Bypass -File .\\install.ps1 -Packs peon,sc_kerrigan\npowershell -ExecutionPolicy Bypass -File .\\install.ps1 -Local\npowershell -ExecutionPolicy Bypass -File .\\install.ps1 -InitLocalConfig\n```\n\nIf the initial download fails with a TLS error on older Windows PowerShell, run this once in the same session and retry:\n\n```powershell\n[Net.ServicePointManager]::SecurityProtocol = [Net.ServicePointManager]::SecurityProtocol -bor [Net.SecurityProtocolType]::Tls12\n```\n\n### Option 4: Clone and inspect first\n\n```bash\ngit clone https://github.com/PeonPing/peon-ping.git\ncd peon-ping\n./install.sh\n```\n\nOn Windows PowerShell:\n\n```powershell\ngit clone https://github.com/PeonPing/peon-ping.git\nSet-Location peon-ping\n.\\install.ps1\n```\n\n### Option 5: Nix (macOS, Linux)\n\nRun directly from source without installing:\n\n```bash\nnix run github:PeonPing/peon-ping -- status\nnix run github:PeonPing/peon-ping -- packs install peon\n```\n\nOr install to your profile:\n\n```bash\nnix profile install github:PeonPing/peon-ping\n```\n\nDevelopment shell (bats, shellcheck, nodejs):\n\n```bash\nnix develop  # or use direnv\n```\n\n#### Home Manager module (declarative configuration)\n\nFor reproducible setups, use the Home Manager module:\n\n```nix\n# In your home.nix or flake.nix\n{ inputs, pkgs, ... }:\n\nlet\n  peonCursorAdapterPath = \"${inputs.peon-ping.packages.${pkgs.system}.default}/share/peon-ping/adapters/cursor.sh\";\nin {\n  imports = [ inputs.peon-ping.homeManagerModules.default ];\n\n  programs.peon-ping = {\n    enable = true;\n    package = inputs.peon-ping.packages.${pkgs.system}.default;\n    claudeCodeIntegration = true;\n\n    settings = {\n      default_pack = \"glados\";\n      volume = 0.7;\n      enabled = true;\n      desktop_notifications = true;\n      categories = {\n        \"session.start\" = true;\n        \"task.complete\" = true;\n        \"task.error\" = true;\n        \"input.required\" = true;\n        \"resource.limit\" = true;\n        \"user.spam\" = true;\n      };\n    };\n\n    # Install packs from og-packs (simple string notation)\n    # and custom sources (attrset with name + src)\n    installPacks = [\n      \"peon\"\n      \"glados\"\n      \"sc_kerrigan\"\n      # Custom pack from GitHub (openpeon.com registry)\n      {\n        name = \"mr_meeseeks\";\n        src = pkgs.fetchFromGitHub {\n          owner = \"kasperhendriks\";\n          repo = \"openpeon-mrmeeseeks\";\n          rev = \"main\";  # or use a commit hash for reproducibility\n          sha256 = \"sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=\";\n        };\n      }\n    ];\n    enableZshIntegration = true;\n  };\n\n  # Optional extra IDE hooks, like Cursor\n  home.file.\".cursor/hooks.json\".text = builtins.toJSON {\n    version = 1;\n    hooks = {\n      afterAgentResponse = [{ command = \"bash ${peonCursorAdapterPath} afterAgentResponse\"; }];\n      stop               = [{ command = \"bash ${peonCursorAdapterPath} stop\"; }];\n    };\n  };\n}\n```\n\n**Sound pack installation**: The `installPacks` option supports two formats:\n- **Simple strings** (e.g., `\"peon\"`, `\"glados\"`) ŌĆö fetched from the [og-packs](https://github.com/PeonPing/og-packs) repository\n- **Custom sources** ŌĆö attrset with `name` and `src` fields, where `src` can be any Nix fetcher result (e.g., `pkgs.fetchFromGitHub`)\n\nFor packs listed on [openpeon.com](https://openpeon.com/), find the GitHub repository link and use `pkgs.fetchFromGitHub`:\n```nix\n{\n  name = \"pack_name\";\n  src = pkgs.fetchFromGitHub {\n    owner = \"github-owner\";\n    repo = \"repo-name\";\n    rev = \"main\";  # or a commit hash/tag\n    sha256 = \"\";   # Leave empty first, Nix will tell you the correct hash\n  };\n}\n```\n\n**Claude Code hooks**: set `programs.peon-ping.claudeCodeIntegration = true;` to install the Claude Code hook scripts under `~/.claude/hooks/peon-ping/` and merge the standard peon-ping hook entries into `~/.claude/settings.json`.\n\n**Other IDE hooks**: adapters for other IDEs are still opt-in so the module does not overwrite unrelated IDE settings. peon-ping provides adapter scripts such as `cursor.sh` in [`adapters/`](https://github.com/PeonPing/peon-ping/tree/main/adapters), and you can wire them like this:\n  ```sh\n  ${inputs.peon-ping.packages.${pkgs.system}.default}/share/peon-ping/adapters/$YOUR_IDE.sh EVENT_NAME\n  ```\n  See the Cursor example above.\n\n## What you'll hear\n\n| Event | CESP Category | Examples |\n|---|---|---|\n| Session starts | `session.start` | *\"Ready to work!\"*, *\"Something need doing?\"* |\n| Task finishes | `task.complete` | *\"Work complete.\"*, *\"Work, work.\"* |\n| Agent acknowledged task | `task.acknowledge` | *\"I can do that.\"*, *\"Be happy to.\"*, *\"Okie dokie.\"* *(disabled by default)* |\n| Permission needed | `input.required` | *\"Hmm?\"*, *\"What you want?\"*, *\"Yes?\"* |\n| Tool or command error | `task.error` | *\"Me not that kind of orc!\"*, *\"Ugh.\"* |\n| Rate or token limit hit | `resource.limit` | *\"Why not?\"* |\n| Rapid prompts (3+ in 10s) | `user.spam` | *\"Whaaat?\"*, *\"Me busy, leave me alone!\"*, *\"No time for play.\"* |\n\nPlus **large overlay banners** on every screen (macOS/WSL/MSYS2) and terminal tab titles (`ŌŚÅ project: done`) ŌĆö you'll know something happened even if you're in another app.\n\npeon-ping implements the [Coding Event Sound Pack Specification (CESP)](https://github.com/PeonPing/openpeon) ŌĆö an open standard for coding event sounds that any agentic IDE can adopt.\n\n## Quick controls\n\nNeed to mute sounds and notifications during a meeting or pairing session? Two options:\n\n| Method | Command | When |\n|---|---|---|\n| **Slash command** | `/peon-ping-toggle` | While working in Claude Code |\n| **CLI** | `peon toggle` | From any terminal tab |\n\nOther CLI commands:\n\n> Windows note: Windows currently supports the day-one controls (`status`, `toggle`, `volume`, core `packs`, `notifications on/off`, `debug`, `logs`, `trainer`). More advanced commands like `setup`, `rotation`, `preview`, and `mobile` are tracked as follow-up Windows parity work.\n\n```bash\npeon setup                # Interactive setup wizard (volume, categories, notifications)\npeon pause                # Mute sounds\npeon resume               # Unmute sounds\npeon mute                 # Alias for 'pause'\npeon unmute               # Alias for 'resume'\npeon status               # Check if paused or active (concise)\npeon status --verbose     # Show full details (notifications, headphones, IDEs, etc.)\npeon volume               # Show current volume\npeon volume 0.7           # Set volume (0.0ŌĆō1.0)\npeon rotation             # Show current rotation mode\npeon rotation random      # Set rotation mode (random|round-robin|session_override)\npeon packs list           # List installed sound packs\npeon packs list --registry # Browse all available packs in the registry\npeon packs community      # List all registry packs grouped by trust tier (Windows)\npeon packs search <query> # Search registry packs by name (Windows)\npeon packs install <p1,p2> # Install packs from the registry\npeon packs install --all  # Install all packs from the registry\npeon packs install-local <path> # Install a pack from a local directory\npeon packs use <name>     # Switch to a specific pack (auto-installs from registry on Windows)\npeon packs use --install <name>  # Switch to pack, installing from registry if needed\npeon packs next           # Cycle to the next pack\npeon packs remove <p1,p2> # Remove specific packs\npeon packs bind <name>    # Bind a pack to the current directory\npeon packs bind --pattern <path> # Bind a pack to a directory pattern, e.g. \"*/services\"\npeon packs unbind         # Remove the current directory\npeon packs bindings       # List all assigned bindings\npeon packs ide-bind <ide> <name> # Bind a pack to an IDE id, e.g. codex\npeon packs ide-unbind <ide> # Remove an IDE binding\npeon packs ide-bindings   # List all IDE-based bindings\npeon packs exclude add <path> # Silence sounds & notifications for a glob or directory\npeon packs exclude remove <path> # Stop silencing the given path\npeon packs exclude list   # List silenced paths\npeon sounds list [pack]   # List sounds in a pack, marking disabled ones\npeon sounds disable <category> <file> [--pack=<name>]  # Mute a single sound within a pack\npeon sounds enable <category> <file> [--pack=<name>]   # Re-enable a previously disabled sound\npeon notifications on     # Enable desktop notifications\npeon notifications off    # Disable desktop notifications\npeon notifications overlay   # Use large overlay banners (default)\npeon notifications standard  # Use standard system notifications\npeon notifications test      # Send a test notification\npeon notifications position [pos]    # Get/set notification position (top-left, top-center, top-right, bottom-left, bottom-center, bottom-right)\npeon notifications dismiss [N]       # Get/set auto-dismiss time in seconds (0 = persistent)\npeon notifications label [text|reset] # Get/set project label override for notifications\npeon notifications template [key] [fmt]  # Get/set/reset message templates (keys: stop, permission, error, idle, question)\npeon preview              # Play all sounds from session.start\npeon preview <category>   # Play all sounds from a specific category\npeon preview --list       # List all categories in the active pack\npeon mobile ntfy <topic>  # Set up phone notifications (free)\npeon mobile off           # Disable phone notifications\npeon mobile test          # Send a test notification\npeon debug on             # Enable debug logging\npeon debug off            # Disable debug logging\npeon debug status         # Show debug state, log directory, file count, total size\npeon logs                 # Show last 50 lines of today's log\npeon logs --last N        # Show last N lines across all log files\npeon logs --session ID    # Filter today's log by session ID\npeon logs --session ID --all  # Search all log files for session ID\npeon logs --clear         # Delete all log files (with confirmation)\npeon relay --daemon       # Start audio relay (for SSH/devcontainer)\npeon relay --stop         # Stop background relay\n```\n\nAvailable CESP categories for `peon preview`: `session.start`, `task.acknowledge`, `task.complete`, `task.error`, `input.required`, `resource.limit`, `user.spam`. (Extended categories `session.end` and `task.progress` are defined in the CESP spec and supported by pack manifests, but not currently triggered by built-in hook events.)\n\nTab completion is supported ŌĆö type `peon packs use <TAB>` to see available pack names.\n\nPausing mutes sounds and desktop notifications instantly. Persists across sessions until you resume. Tab titles remain active when paused.\n\n## Configuration\n\n### Quickstart ŌĆö `peon setup`\n\nThe fastest way to configure peon-ping is the interactive wizard:\n\n```bash\npeon setup\n```\n\nIt walks you through every common setting in one go ŌĆö press **Enter** at any prompt to keep the current value:\n\n```\n  ŌĢöŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢŚ\n  ŌĢæ       peon-ping  setup wizard        ŌĢæ\n  ŌĢÜŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢØ\n\n  ŌöĆŌöĆ Volume ŌöĆŌöĆ\n  > Volume (0.0 - 1.0) (0.5):\n\n  ŌöĆŌöĆ Sound categories ŌöĆŌöĆ\n  >   Session start [on/off] (on):\n  >   Task acknowledge [on/off] (off):\n  >   Task complete [on/off] (on):\n  >   Task error [on/off] (on):\n  >   Input required (permissions, questions) [on/off] (on):\n  >   Resource limit (context compaction) [on/off] (on):\n  >   User spam (rapid prompts) [on/off] (on):\n\n  ŌöĆŌöĆ Notifications ŌöĆŌöĆ\n  > Desktop notifications [on/off] (on):\n\n  Overlay theme:\n    1) Neon (cyberpunk)\n    2) Glass (translucent)\n    3) Sakura (cherry blossom)\n    4) Jarvis (iron man)\n  > Theme [neon]:\n\n  Notification position:\n    1) Top center\n    2) Top right\n    ...\n  > Position [top-center]:\n\n  Auto-dismiss:\n    1) Persistent (click to dismiss)\n    2) 3 seconds\n    3) 4 seconds\n    ...\n  > Dismiss time [4]:\n\n  Ō£ō Configuration saved!\n```\n\n**What the wizard covers:**\n- **Volume** ŌĆö playback volume (0.0 ŌĆō 1.0)\n- **Sound categories** ŌĆö enable/disable each CESP category individually (session start, task complete, permission prompts, errors, etc.)\n- **Desktop notifications** ŌĆö master switch for overlay banners\n- **Overlay theme** ŌĆö choose the visual style (neon, glass, sakura, jarvis)\n- **Position** ŌĆö where notifications appear (top-center, top-right, etc.)\n- **Auto-dismiss** ŌĆö how long notifications stay visible (`0` = persistent, click to dismiss)\n\nWhen you're done, the wizard prints a summary and saves everything to `~/.claude/hooks/peon-ping/config.json`. You can rerun `peon setup` anytime to tweak settings ŌĆö it always shows your current values as defaults.\n\n> **Tip:** All individual `peon` subcommands (`peon volume`, `peon notifications position top-right`, etc.) still work if you prefer scripting or tweaking one setting at a time ŌĆö see the [Quick controls](#quick-controls) section.\n\n### Slash commands and manual config\n\npeon-ping also installs slash commands in Claude Code:\n\n- `/peon-ping-toggle` ŌĆö mute/unmute sounds\n- `/peon-ping-config` ŌĆö change any setting (volume, packs, categories, etc.)\n- `/peon-ping-rename <name>` ŌĆö give this session a custom name shown in notification titles and the terminal tab title (zero tokens, hook-intercepted); no argument resets to auto-detect\n\nYou can also just ask Claude to change settings for you ŌĆö e.g. \"enable round-robin pack rotation\", \"set volume to 0.3\", or \"add glados to my pack rotation\". No need to edit config files manually.\n\nConfig location depends on install mode:\n\n- Global install: `$CLAUDE_CONFIG_DIR/hooks/peon-ping/config.json` (default `~/.claude/hooks/peon-ping/config.json`)\n- Local install: `./.claude/hooks/peon-ping/config.json`\n\n```json\n{\n  \"volume\": 0.5,\n  \"categories\": {\n    \"session.start\": true,\n    \"task.acknowledge\": true,\n    \"task.complete\": true,\n    \"task.error\": true,\n    \"input.required\": true,\n    \"resource.limit\": true,\n    \"user.spam\": true\n  }\n}\n```\n\n### Independent Controls\n\npeon-ping has three independent controls that can be mixed and matched:\n\n| Config Key | Controls | Affects Sounds | Affects Desktop Popups | Affects Mobile Push |\n|------------|----------|----------------|------------------------|---------------------|\n| `enabled` | Master audio switch | Ō£ģ Yes | ŌØī No | ŌØī No |\n| `desktop_notifications` | Desktop popup banners | ŌØī No | Ō£ģ Yes | ŌØī No |\n| `mobile_notify.enabled` | Phone push notifications | ŌØī No | ŌØī No | Ō£ģ Yes |\n\nThis means you can:\n- Keep sounds but disable desktop popups: `peon notifications off`\n- Keep desktop popups but disable sounds: `peon pause`\n- Enable mobile push without desktop popups: set `desktop_notifications: false` and `mobile_notify.enabled: true`\n\n- **volume**: 0.0ŌĆō1.0 (quiet enough for the office)\n- **desktop_notifications**: `true`/`false` ŌĆö toggle desktop notification popups independently from sounds (default: `true`). When disabled, sounds continue playing but visual popups are suppressed. Mobile notifications are unaffected.\n- **notification_style**: `\"overlay\"` or `\"standard\"` ŌĆö controls how desktop notifications appear (default: `\"overlay\"`)\n  - **overlay**: large, visible banners ŌĆö JXA Cocoa overlay on macOS, Windows Forms popup on WSL/MSYS2. Clicking the overlay focuses your terminal (supports Ghostty, Warp, iTerm2, Zed, Terminal.app). On iTerm2, clicking focuses the correct tab/pane/window ŌĆö not just the app.\n  - **standard**: system notifications ŌĆö [`terminal-notifier`](https://github.com/julienXX/terminal-notifier) / `osascript` on macOS, Windows toast on WSL/MSYS2. When `terminal-notifier` is installed (`brew install terminal-notifier`), clicking a standard notification focuses your terminal automatically (supports Ghostty, Warp, iTerm2, Zed, Terminal.app). On native Windows, clicking a toast notification focuses the IDE or terminal window (supports VS Code, Cursor, Windsurf, Windows Terminal, PowerShell). With multiple windows open, the notification targets the exact window that originated the event via PID-based process tree matching.\n- **overlay_theme**: `\"jarvis\"`, `\"glass\"`, `\"sakura\"`, or omit for the default overlay ŌĆö macOS only (default: none)\n  - **jarvis**: circular HUD with rotating arcs, graduation ticks, and progress ring\n  - **glass**: glassmorphism panel with accent color bar, progress line, and timestamp\n  - **sakura**: zen garden with bonsai tree and animated cherry blossom petals\n- **categories**: Toggle individual CESP sound categories on/off (e.g. `\"session.start\": false` to disable greeting sounds)\n- **annoyed_threshold / annoyed_window_seconds**: How many prompts in N seconds triggers the `user.spam` easter egg\n- **silent_window_seconds**: Suppress `task.complete` sounds and notifications for tasks shorter than N seconds. (e.g. `10` to only hear sounds for tasks that take longer than 10 seconds)\n- **session_start_cooldown_seconds** (number, default: `30`): Deduplicates greeting sounds when multiple workspaces start at the same time (e.g. opening OpenCode or Cursor with many folders). Only the first session start plays the greeting; subsequent ones within this window stay silent. Set to `0` to disable deduplication and always play a greeting.\n- **suppress_idle_prompt_repeats** (boolean, default: `true`): Claude Code re-fires its `idle_prompt` notification every ~60s while the terminal is unfocused. peon-ping routes `idle_prompt` to `task.complete` so you still get a sound when input is needed ŌĆö but without dedupe the same sound replays on every poke. When `true`, an `idle_prompt` is suppressed if a `task.complete` for the same session already fired inside `idle_prompt_suppress_window_seconds`. Set to `false` to restore the periodic nudge.\n- **idle_prompt_suppress_window_seconds** (number, default: `3600`): Window used by `suppress_idle_prompt_repeats`. After a `task.complete` fires for a session, subsequent `idle_prompt` notifications for that session stay silent for this many seconds. Set to `0` to disable the window (effectively the same as `suppress_idle_prompt_repeats: false`).\n- **suppress_subagent_complete** (boolean, default: `false`): Suppress `task.complete` sounds and notifications when a sub-agent session finishes. When Claude Code's Task tool dispatches parallel sub-agents, each one fires a completion sound ŌĆö set this to `true` to hear only the parent session's completion sound.\n- **default_pack**: The fallback pack used when no more specific rule applies (default: `\"peon\"`). Replaces the old `active_pack` key ŌĆö existing configs are migrated automatically on `peon update`.\n- **path_rules**: Array of `{ \"pattern\": \"...\", \"pack\": \"...\" }` objects. Assigns a pack to sessions based on the working directory using glob matching (`*`, `?`). First matching rule wins. Beats `pack_rotation` and `default_pack`; overridden by `session_override` assignments.\n  ```json\n  \"path_rules\": [\n    { \"pattern\": \"*/work/client-a/*\", \"pack\": \"glados\" },\n    { \"pattern\": \"*/personal/*\",      \"pack\": \"peon\" }\n  ]\n  ```\n- **exclude_dirs**: Array of glob or directory patterns. If the current working directory matches one of these entries, **all sounds and notifications are silenced** for that invocation (the hook logs `suppressed=True reason=excluded_dir pattern=<match>`). Bare directory paths also match descendants, so `\"~/conductor/workspaces\"` silences everything under that tree. Use this for noisy background agents (e.g. `CodexBar/ClaudeProbe`), throwaway scratch dirs, or sensitive workspaces where audio alerts are unwanted.\n  ```json\n  \"exclude_dirs\": [\n    \"~/conductor/workspaces\",\n    \"~/Library/Application Support/CodexBar*\"\n  ]\n  ```\n- **ide_rules**: Array of `{ \"ide\": \"...\", \"pack\": \"...\" }` objects. Assigns a pack by IDE/source after `path_rules` and before rotation/default fallback. First matching rule wins. Common ids: `claude`, `codex`, `cursor`, `opencode`, `kilo`, `kiro`, `gemini`, `copilot`, `windsurf`, `kimi`, `antigravity`, `amp`, `deepagents`, `openclaw`, `rovodev`.\n  ```json\n  \"ide_rules\": [\n    { \"ide\": \"codex\",  \"pack\": \"glados\" },\n    { \"ide\": \"claude\", \"pack\": \"peon\" }\n  ]\n  ```\n- **pack_rotation**: Array of pack names (e.g. `[\"peon\", \"sc_kerrigan\", \"peasant\"]`). Used when `pack_rotation_mode` is `random` or `round-robin`. Leave empty `[]` to use `default_pack` (or `path_rules` / `ide_rules`) only.\n- **pack_rotation_mode**: `\"random\"` (default), `\"round-robin\"`, or `\"session_override\"`. With `random`/`round-robin`, each session picks one pack from `pack_rotation`. With `session_override`, the `/peon-ping-use <pack>` command assigns a pack per session. Invalid or missing packs fall back through the hierarchy. (`\"agentskill\"` is accepted as a legacy alias for `\"session_override\"`.)\n- **session_ttl_days** (number, default: 7): Expire stale per-session pack assignments older than N days. Keeps `.state.json` from growing unbounded when using `session_override` mode.\n- **headphones_only** (boolean, default: `false`): Only play sounds when headphones or external audio devices are detected. When enabled, sounds are suppressed if built-in speakers are the active output ŌĆö useful for open offices. Check status with `peon status`. Supported on macOS (via `system_profiler`) and Linux (via PipeWire `wpctl` or PulseAudio `pactl`).\n- **terminal_tab_title** (boolean, default: `true`): Update the terminal tab title with the current session status (for example `ŌŚÅ project: done`). Set to `false` if you already manage tab titles with your own shell prompt or terminal automation and only want peon-ping's sounds/notifications.\n- **suppress_sound_when_tab_focused** (boolean, default: `false`): Skip sound playback when the terminal tab that generated the hook event is the currently active/focused tab. Sounds still play for background tabs as an alert that something happened elsewhere. Desktop and mobile notifications are unaffected. Useful when you only want audio cues from tabs you're not watching. macOS only (uses `osascript` to check frontmost app and iTerm2 tab focus).\n- **meeting_detect** Detects if the microphone is currently being used and temporarily suppresses the audio only until the microphone is no longer in use. Notification still appears.\n- **notification_position** (string, default: `\"top-center\"`): Where overlay notifications appear on screen. Options: `\"top-left\"`, `\"top-center\"`, `\"top-right\"`, `\"bottom-left\"`, `\"bottom-center\"`, `\"bottom-right\"`.\n- **notification_dismiss_seconds** (number, default: `4`): Auto-dismiss overlay notifications after N seconds. Set to `0` for persistent notifications that require a click to dismiss.\n- **notification_all_screens** (boolean, default: `true`): Show overlay notifications on all screens (`true`) or only the main screen (`false`). Themed overlays (`glass`, `jarvis`, `sakura`) previously only showed on one screen ŌĆö existing configs with those themes are migrated to `false` automatically. macOS only.\n- **`CLAUDE_SESSION_NAME` env var**: Set before launching `claude` to give a session a custom name. Shows in both desktop notification titles and terminal tab titles. Priority over all config-based naming. Example: `CLAUDE_SESSION_NAME=\"Auth Refactor\" claude` or `export CLAUDE_SESSION_NAME=\"Feature: Auth\"` then `claude`. Each terminal gets its own title automatically since peon-ping runs as a child of that Claude instance.\n- **notification_title_override** (string, default: `\"\"`): Override the project name shown in notification titles. When empty, the project name is auto-detected from `/peon-ping-rename` > `CLAUDE_SESSION_NAME` > `.peon-label` > `notification_title_script` > `project_name_map` > git repo name > folder name.\n- **notification_title_marker** (string, default: `\"ŌŚÅ\"`): Character(s) shown before the project name in notification titles and terminal tab titles. Desktop notification titles use `Project` by default; terminal tab titles keep `Project: status`. Set to `\"\"` to disable. Example: `\"­¤öö\"`.\n- **notification_title_ide** (boolean, default: `false`): Include the normalized IDE label in desktop notification titles as `Project - IDE`. When disabled, the title stays `Project` and the message/body carries the status/details.\n- **notification_title_script** (string, default: `\"\"`): Shell command run at event time to compute the project name dynamically. Receives env vars: `PEON_SESSION_ID`, `PEON_CWD`, `PEON_HOOK_EVENT`, `PEON_IDE`, `PEON_SESSION_NAME`. Use stdout (trimmed, max 50 chars); non-zero exit falls through to the next tier. `PEON_IDE` is the normalized IDE/source id such as `codex` or `claude`. Example: `\"basename $PEON_CWD\"`.\n- **project_name_map** (object, default: `{}`): Map directory paths to custom project labels for notifications. Keys are path patterns, values are display names. Example: `{ \"/home/user/work/client-a\": \"Client A\" }`.\n- **notification_templates** (object, default: `{}`): Custom message/body format strings for notification events. Keys are event types (`stop`, `permission`, `error`, `idle`, `question`), values are template strings with variable substitution. Available variables: `{project}`, `{ide}`, `{ide_id}`, `{summary}`, `{tool_name}`, `{status}`, `{event}`. Example: `{ \"stop\": \"{status}: {summary}\", \"permission\": \"{status}: {tool_name}\" }`.\n\n### Pack Selection Hierarchy\n\npeon-ping resolves which sound pack to use through a 6-layer hierarchy. The first layer that produces a valid, installed pack wins:\n\n| Priority | Layer | Source | How to set |\n|----------|-------|--------|------------|\n| 1 (highest) | **session_override** | Per-session assignment | `/peon-ping-use <pack>` skill or MCP |\n| 2 | **path_rules** | Glob match on working directory | `peon packs bind` or `path_rules` in config |\n| 3 | **ide_rules** | IDE/source match | `peon packs ide-bind` or `ide_rules` in config |\n| 4 | **pack_rotation** | Random or round-robin from a list | `pack_rotation` array + `pack_rotation_mode` in config |\n| 5 | **default_pack** | Static fallback | `peon packs use <name>` or `default_pack` in config |\n| 6 (lowest) | **hardcoded** | Built-in default | `\"peon\"` |\n\nIf a layer references a pack that is not installed, it falls through to the next layer.\nIf `exclude_dirs` matches the current working directory, the entire invocation is silenced ŌĆö no sound, no notification.\n\n### Per-Project Pack Assignment (path_rules)\n\nAssign different sound packs to different projects based on directory path. Use the CLI or edit `config.json` directly.\n\n**CLI (recommended):**\n\n```bash\npeon packs bind glados                     # Bind glados to the current directory\npeon packs bind sc_kerrigan --pattern \"*/services/*\"  # Bind to a glob pattern\npeon packs bind duke_nukem --install       # Bind and install from registry if needed\npeon packs unbind                          # Remove binding for the current directory\npeon packs unbind --pattern \"*/services/*\" # Remove a specific pattern binding\npeon packs bindings                        # List all bindings\n```\n\n**Manual config:**\n\n```json\n\"path_rules\": [\n  { \"pattern\": \"*/work/client-a/*\", \"pack\": \"glados\" },\n  { \"pattern\": \"*/personal/*\",      \"pack\": \"peon\" },\n  { \"pattern\": \"*/services/*\",      \"pack\": \"sc_kerrigan\" }\n]\n```\n\nRules use glob matching (`*`, `?`). First matching rule wins. Path rules override `pack_rotation` and `default_pack` but are overridden by `session_override` assignments.\n\n### Per-IDE Pack Assignment (ide_rules)\n\nUse this layer when a path is noisy or shared across tools and you want a pack to follow the IDE instead.\n\n**CLI (recommended):**\n\n```bash\npeon packs ide-bind codex glados        # Use glados for Codex sessions\npeon packs ide-bind claude peon         # Use peon for Claude Code\npeon packs ide-unbind codex             # Remove one IDE rule\npeon packs ide-bindings                 # List IDE rules and recent detections\n```\n\n**Manual config:**\n\n```json\n\"ide_rules\": [\n  { \"ide\": \"codex\",  \"pack\": \"glados\" },\n  { \"ide\": \"claude\", \"pack\": \"peon\" }\n]\n```\n\n`ide_rules` run after `path_rules`.\n\n## Common Use Cases\n\n### Sounds without popups\n\nWant voice feedback but no visual distractions?\n\n```bash\npeon notifications off\n```\n\nThis keeps all sound categories playing while suppressing desktop notification banners. Mobile notifications (if configured) continue working.\n\nYou can also use the alias:\n\n```bash\npeon popups off\n```\n\n### Silent mode with notifications only\n\nWant visual alerts but no audio?\n\n```bash\npeon pause  # or set \"enabled\": false in config\n```\n\nWith `desktop_notifications: true`, you'll get popups but no sounds.\n\n### Complete silence\n\nDisable everything:\n\n```bash\npeon pause\npeon notifications off\npeon mobile off\n```\n\n## Peon Trainer\n\nYour peon is also your personal trainer. Built-in Pavel-style daily exercise mode ŌĆö the same orc who tells you \"work work\" now tells you to drop and give him twenty.\n\n### Quick start\n\n```bash\npeon trainer on              # enable trainer\npeon trainer goal 200        # set daily goal (default: 300/300)\n# ... code for a while, peon nags you every ~20 min ...\npeon trainer log 25 pushups  # log what you did\npeon trainer log 30 squats\npeon trainer status          # check progress\n```\n\n### How it works\n\nTrainer reminders piggyback on your coding session. When you start a new session, the peon immediately encourages you to start strong with pushups before you write any code. Then every ~20 minutes of active coding, you'll hear the peon yelling at you to do more reps. No background daemon needed. Log your reps with `peon trainer log`, and progress resets automatically at midnight.\n\n### Commands\n\n| Command | Description |\n|---------|-------------|\n| `peon trainer on` | Enable trainer mode |\n| `peon trainer off` | Disable trainer mode |\n| `peon trainer status` | Show today's progress |\n| `peon trainer log <n> <exercise>` | Log reps (e.g. `log 25 pushups`) |\n| `peon trainer goal <n>` | Set uniform daily goal for all exercises |\n| `peon trainer goal <exercise> <n>` | Set uniform daily goal for one exercise |\n| `peon trainer goal <exercise> <day> <n>` | Set goal for specific day (mon, tue, etc.) |\n| `peon trainer goal <day> <n>` | Set all exercises for a specific day |\n\n### Schedule vs uniform goals\n\nExercises can have either a **uniform daily goal** (same every day) or a **per-day schedule** (different goals on different days). These are mutually exclusive:\n\n- Setting a uniform goal removes any schedule for that exercise\n- Setting a day-specific goal removes any uniform goal for that exercise\n\nDays use short names: `mon`, `tue`, `wed`, `thu`, `fri`, `sat`, `sun`\n\n```bash\npeon trainer goal pushups 300         # 300 pushups every day (uniform)\npeon trainer goal pushups mon 400     # Override: 400 on Monday (creates schedule)\npeon trainer goal squats sun 0        # Rest day for squats on Sunday\npeon trainer goal fri 150             # Light day for all exercises on Friday\n```\n\nOn rest days (goal=0), reminders are skipped and status shows `[REST DAY]`. You can still log reps on rest days if you want.\n\n### Claude Code skill\n\nIn Claude Code, you can log reps without leaving your conversation:\n\n```\n/peon-ping-log 25 pushups\n/peon-ping-log 30 squats\n```\n\n### Custom voice lines\n\nDrop your own audio files into `~/.claude/hooks/peon-ping/trainer/sounds/`:\n\n```\ntrainer/sounds/session_start/  # session greeting (\"Pushups first, code second! Zug zug!\")\ntrainer/sounds/remind/         # reminder lines (\"Something need doing? YES. PUSHUPS.\")\ntrainer/sounds/log/            # acknowledgment (\"Work work! Muscles getting bigger maybe!\")\ntrainer/sounds/complete/       # celebration (\"Zug zug! Human finish all reps!\")\ntrainer/sounds/slacking/       # disappointment (\"Peon very disappointed.\")\n```\n\nUpdate `trainer/manifest.json` to register your sound files.\n\n## MCP server\n\npeon-ping includes an [MCP (Model Context Protocol)](https://modelcontextprotocol.io/) server so any MCP-compatible AI agent can play sounds directly via tool calls ŌĆö no hooks required.\n\nThe key difference: **the agent chooses the sound**. Instead of automatically playing a fixed sound on every event, the agent calls `play_sound` with exactly what it wants ŌĆö `duke_nukem/SonOfABitch` when a build fails, `sc_kerrigan/IReadYou` when reading files.\n\n### Setup\n\nAdd to your MCP client config (Claude Desktop, Cursor, etc.):\n\n```json\n{\n  \"mcpServers\": {\n    \"peon-ping\": {\n      \"command\": \"node\",\n      \"args\": [\"/path/to/peon-ping/mcp/peon-mcp.js\"]\n    }\n  }\n}\n```\n\nIf installed via Homebrew: `$(brew --prefix peon-ping)/libexec/mcp/peon-mcp.js`. See [`mcp/README.md`](mcp/README.md) for full setup instructions.\n\n### What the agent can do\n\n| Feature | Description |\n|---|---|\n| **`play_sound`** | Play one or more sounds by key (e.g. `duke_nukem/SonOfABitch`, `peon/PeonReady1`) |\n| **`peon-ping://catalog`** | Full pack catalog as an MCP Resource ŌĆö client prefetches once, no repeated tool calls |\n| **`peon-ping://pack/{name}`** | Individual pack details and available sound keys |\n\nRequires Node.js 18+. Contributed by [@tag-assistant](https://github.com/tag-assistant).\n\n## Multi-IDE Support\n\npeon-ping works with any agentic IDE that supports hooks. Adapters translate IDE-specific events to the [CESP standard](https://github.com/PeonPing/openpeon).\n\n| IDE | Status | Setup |\n|---|---|---|\n| **Claude Code** | Built-in | `curl \\| bash` install handles everything |\n| **Amp** | Adapter | `bash adapters/amp.sh` / `powershell adapters/amp.ps1` ([setup](#amp-setup)) |\n| **Gemini CLI** | Adapter | Add hooks pointing to `adapters/gemini.sh` (or `.ps1` on Windows) ([setup](#gemini-cli-setup)) |\n| **GitHub Copilot CLI** | Built-in (auto-detect) | `install.sh` / `install.ps1` auto-registers hooks at `~/.copilot/hooks/peon-ping.json` if `~/.copilot` exists. Per-repo manual wiring also available via `adapters/copilot.sh` / `.ps1` ([setup](#github-copilot-cli-setup)) |\n| **OpenAI Codex** | Adapter | Install the peon-ping runtime first, then add `notify` in `~/.codex/config.toml` pointing to `adapters/codex.sh` (or `.ps1`) ([setup](#openai-codex-setup)) |\n| **Cursor** | Built-in | `curl \\| bash`, `peon-ping-setup`, or Windows `install.ps1` auto-detect and register hooks. On Windows, enable **Settings ŌåÆ Features ŌåÆ Third-party skills** so Cursor loads `~/.claude/settings.json` for SessionStart/Stop sounds. |\n| **OpenCode** | Adapter | `bash adapters/opencode.sh` / `powershell adapters/opencode.ps1` ([setup](#opencode-setup)) |\n| **Kilo CLI** | Adapter | `bash adapters/kilo.sh` / `powershell adapters/kilo.ps1` ([setup](#kilo-cli-setup)) |\n| **Kiro** | Adapter | Add hook entries pointing to `adapters/kiro.sh` (or `.ps1`) ([setup](#kiro-setup)) |\n| **Windsurf** | Adapter | Add hook entries pointing to `adapters/windsurf.sh` (or `.ps1`) ([setup](#windsurf-setup)) |\n| **Google Antigravity** | Adapter | `bash adapters/antigravity.sh` / `powershell adapters/antigravity.ps1`. For headless / macOS LaunchAgent use, also see `bash adapters/antigravity-py.sh --install` (Python `watchdog` watcher with 25s idle threshold; requires `pip3 install watchdog`). |\n| **Kimi Code** | Adapter | `bash adapters/kimi.sh --install` / `powershell adapters/kimi.ps1 -Install` ([setup](#kimi-code-setup)) |\n| **OpenClaw** | Adapter | Call `adapters/openclaw.sh <event>` (or `openclaw.ps1`) from your OpenClaw skill |\n| **Rovo Dev CLI** | Adapter | Auto-registered by `install.sh` if `~/.rovodev` exists, or add hooks to `~/.rovodev/config.yml` manually ([setup](#rovo-dev-cli-setup)) |\n| **DeepAgents** | Adapter | `bash adapters/deepagents.sh` / `powershell adapters/deepagents.ps1` ([setup](#deepagents-setup)) |\n| **oh-my-pi (omp)** | Adapter | `bash adapters/omp.sh` ([setup](#oh-my-pi-omp-setup)) |\n\n> **Windows:** All adapters have native PowerShell (`.ps1`) versions. The Windows installer (`install.ps1`) copies them to `~/.claude/hooks/peon-ping/adapters/`. Filesystem watchers (Amp, Antigravity, Kimi) use .NET `FileSystemWatcher` instead of fswatch/inotifywait ŌĆö no extra dependencies needed.\n\n### OpenAI Codex setup\n\nCodex support uses an adapter and is not auto-registered by `peon-ping-setup`.\n\nThe Codex adapter expects the peon-ping runtime to exist at `~/.claude/hooks/peon-ping/`, even if you only use Codex and do not use Claude Code.\n\n**Setup:**\n\n1. Install the peon-ping runtime first:\n\n   ```bash\n   bash \"$(brew --prefix peon-ping)\"/libexec/install.sh --no-rc\n   ```\n\n   Or with the standard installer:\n\n   ```bash\n   curl -fsSL https://raw.githubusercontent.com/PeonPing/peon-ping/main/install.sh | bash -s -- --no-rc\n   ```\n\n2. Add this to `~/.codex/config.toml`:\n\n   ```toml\n   notify = [\"bash\", \"~/.claude/hooks/peon-ping/adapters/codex.sh\"]\n   ```\n\n3. Restart Codex.\n\nIf you installed with Homebrew, the runtime files are managed under `~/.claude/hooks/peon-ping/`, and the Codex adapter forwards Codex notify events into that shared runtime.\n\n### Amp setup\n\nA filesystem watcher adapter for [Amp](https://ampcode.com) (by Sourcegraph). Amp doesn't expose event hooks like Claude Code, so this adapter watches Amp's thread files on disk and detects when the agent finishes a turn.\n\n**Setup:**\n\n1. Ensure peon-ping is installed (`curl -fsSL https://peonping.com/install | bash`)\n\n2. Install `fswatch` (macOS) or `inotify-tools` (Linux):\n\n   ```bash\n   brew install fswatch        # macOS\n   sudo apt install inotify-tools  # Linux\n   ```\n\n3. Start the watcher:\n\n   ```bash\n   bash ~/.claude/hooks/peon-ping/adapters/amp.sh        # foreground\n   bash ~/.claude/hooks/peon-ping/adapters/amp.sh &       # background\n   ```\n\n**Event mapping:**\n\n- New thread file created ŌåÆ Greeting sound (*\"Ready to work?\"*, *\"Yes?\"*)\n- Thread file stops updating + agent finished turn ŌåÆ Completion sound (*\"Work, work.\"*, *\"Job's done!\"*)\n\n**How it works:**\n\nThe adapter watches `~/.local/share/amp/threads/` for JSON file changes. When a thread file stops updating (1s idle timeout) and the last message is from the assistant with text content (not a pending tool call), it emits a `Stop` event ŌĆö meaning the agent is done and waiting for your input.\n\n**Environment variables:**\n\n| Variable | Default | Description |\n|---|---|---|\n| `AMP_DATA_DIR` | `~/.local/share/amp` | Amp data directory |\n| `AMP_THREADS_DIR` | `$AMP_DATA_DIR/threads` | Threads directory to watch |\n| `AMP_IDLE_SECONDS` | `1` | Seconds of no changes before emitting Stop |\n| `AMP_STOP_COOLDOWN` | `10` | Minimum seconds between Stop events per thread |\n\n### GitHub Copilot CLI setup\n\nNative [GitHub Copilot CLI](https://github.com/github/copilot-cli) integration with full [CESP v1.0](https://github.com/PeonPing/openpeon) conformance.\n\n**Recommended: user-level (global) wiring ŌĆö no per-repo setup.**\n\n`install.sh` and `install.ps1` automatically register Copilot CLI hooks at `~/.copilot/hooks/peon-ping.json` whenever the `~/.copilot/` directory exists. Re-run the installer if you installed Copilot CLI after peon-ping. The wiring uses **PascalCase event names**, which tells Copilot CLI to deliver the VS Code-compatible (snake_case) payload that `peon.sh` / `peon.ps1` reads natively ŌĆö no per-repo adapter required.\n\nHooks registered globally:\n\n| Event | Category | Triggered by |\n|---|---|---|\n| `SessionStart` | `session.start` | Launching `copilot` (greeting) |\n| `SessionEnd` | _(silent today)_ | Quitting the CLI |\n| `UserPromptSubmit` | `user.spam` (after 3+ rapid prompts) | Each prompt you submit |\n| `Stop` (= `agentStop`) | `task.complete` | Agent finishes a turn (debounced 5s) |\n| `Notification` | `input.required` (elicitation) | Idle, elicitation dialogs, permission popups |\n| `PermissionRequest` | `input.required` | Tool permission asks |\n| `PreToolUse` | `input.required` (only on dangerous-pattern match) | Before each tool call |\n| `PostToolUseFailure` | `task.error` | Tool failure |\n| `PreCompact` | `resource.limit` | Context compaction starting |\n\n`postToolUse` is intentionally **not** wired: peon has no `PostToolUse` handler and routing it through `Stop` floods the debounce window, swallowing real `Stop` events.\n\n**Prerequisite (Windows):** Copilot CLI hooks require [PowerShell 7+](https://github.com/PowerShell/PowerShell) (`pwsh` on `PATH`) and a permissive execution policy:\n\n```powershell\nwinget install Microsoft.PowerShell\npowershell -NoProfile -Command \"Set-ExecutionPolicy -Scope CurrentUser -ExecutionPolicy RemoteSigned -Force\"\n```\n\n**Alternative: per-repository wiring with the adapter.**\n\nIf you want Copilot CLI hooks committed to a specific repository (e.g. for a team workflow), use `.github/hooks/hooks.json` with the `adapters/copilot.sh` (or `.ps1` on Windows) translator:\n\n```json\n{\n  \"version\": 1,\n  \"hooks\": {\n    \"sessionStart\": [\n      {\n        \"type\": \"command\",\n        \"bash\": \"bash ~/.claude/hooks/peon-ping/adapters/copilot.sh sessionStart\",\n        \"powershell\": \"powershell -NoProfile -File %USERPROFILE%\\\\.claude\\\\hooks\\\\peon-ping\\\\adapters\\\\copilot.ps1 sessionStart\"\n      }\n    ],\n    \"agentStop\": [\n      {\n        \"type\": \"command\",\n        \"bash\": \"bash ~/.claude/hooks/peon-ping/adapters/copilot.sh agentStop\",\n        \"powershell\": \"powershell -NoProfile -File %USERPROFILE%\\\\.claude\\\\hooks\\\\peon-ping\\\\adapters\\\\copilot.ps1 agentStop\"\n      }\n    ],\n    \"postToolUseFailure\": [\n      {\n        \"type\": \"command\",\n        \"bash\": \"bash ~/.claude/hooks/peon-ping/adapters/copilot.sh postToolUseFailure\",\n        \"powershell\": \"powershell -NoProfile -File %USERPROFILE%\\\\.claude\\\\hooks\\\\peon-ping\\\\adapters\\\\copilot.ps1 postToolUseFailure\"\n      }\n    ],\n    \"notification\": [\n      {\n        \"type\": \"command\",\n        \"bash\": \"bash ~/.claude/hooks/peon-ping/adapters/copilot.sh notification\",\n        \"powershell\": \"powershell -NoProfile -File %USERPROFILE%\\\\.claude\\\\hooks\\\\peon-ping\\\\adapters\\\\copilot.ps1 notification\"\n      }\n    ]\n  }\n}\n```\n\nAdd additional events from the table above as desired. The adapter translates Copilot CLI's camelCase payload (`sessionId`, `toolName`, `stopReason`, etc.) to the snake_case shape (`session_id`, `tool_name`, `stop_reason`) that `peon.sh` / `peon.ps1` reads.\n\n**Features:**\n\n- **Sound playback** via `afplay` (macOS), `pw-play`/`paplay`/`ffplay` (Linux), `MediaPlayer`/`SoundPlayer` (Windows) ŌĆö same priority chain as the shell hook\n- **CESP event mapping** ŌĆö Copilot CLI hooks map to standard CESP categories (`session.start`, `task.complete`, `task.error`, `input.required`, `user.spam`, `resource.limit`)\n- **Desktop notifications** ŌĆö large overlay banners by default, or standard notifications\n- **Spam detection** ŌĆö detects 3+ rapid prompts within 10 seconds, triggers `user.spam` voice lines\n- **Debouncing** ŌĆö `Stop` events suppressed within a 5s window to prevent spam from chained tool calls\n\n\n### OpenCode setup\n\nA native TypeScript plugin for [OpenCode](https://opencode.ai/) with full [CESP v1.0](https://github.com/PeonPing/openpeon) conformance.\n\n**Quick install:**\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/PeonPing/peon-ping/main/adapters/opencode.sh | bash\n```\n\nThe installer copies `peon-ping.ts` to `~/.config/opencode/plugins/` and creates a config at `~/.config/opencode/peon-ping/config.json`. Packs are stored at the shared CESP path (`~/.openpeon/packs/`).\n\n**Features:**\n\n- **Sound playback** via `afplay` (macOS), `pw-play`/`paplay`/`ffplay` (Linux) ŌĆö same priority chain as the shell hook\n- **CESP event mapping** ŌĆö `session.created` / `session.idle` / `session.error` / `permission.asked` / rapid prompt detection all map to standard CESP categories\n- **Desktop notifications** ŌĆö large overlay banners by default (JXA Cocoa, visible on all screens), or standard notifications via [`terminal-notifier`](https://github.com/julienXX/terminal-notifier) / `osascript`. Fires only when the terminal is not focused.\n- **Terminal focus detection** ŌĆö checks if your terminal app (Terminal, iTerm2, Warp, Alacritty, kitty, WezTerm, ghostty, Hyper) is frontmost via AppleScript before sending notifications\n- **Tab titles** ŌĆö updates the terminal tab to show task status (`ŌŚÅ project: working...` / `Ō£ō project: done` / `Ō£Ś project: error`)\n- **Pack switching** ŌĆö reads `default_pack` from config (with `active_pack` fallback for legacy configs), loads the pack's `openpeon.json` manifest at runtime. `path_rules` can override the pack per working directory.\n- **No-repeat logic** ŌĆö avoids playing the same sound twice in a row per category\n- **Spam detection** ŌĆö detects 3+ rapid prompts within 10 seconds, triggers `user.spam` voice lines\n\n<details>\n<summary>­¤¢╝’ĖÅ Screenshot: desktop notifications with custom peon icon</summary>\n\n![peon-ping OpenCode notifications](https://github.com/user-attachments/assets/e433f9d1-2782-44af-a176-71875f3f532c)\n\n</details>\n\n> **Tip:** Install `terminal-notifier` (`brew install terminal-notifier`) for richer notifications with subtitle and grouping support.\n\n<details>\n<summary>­¤Ä© Optional: custom peon icon for notifications</summary>\n\nBy default, `terminal-notifier` shows a generic Terminal icon. The included script replaces it with the peon icon using built-in macOS tools (`sips` + `iconutil`) ŌĆö no extra dependencies.\n\n```bash\nbash <(curl -fsSL https://raw.githubusercontent.com/PeonPing/peon-ping/main/adapters/opencode/setup-icon.sh)\n```\n\nOr if installed locally (Homebrew / git clone):\n\n```bash\nbash ~/.claude/hooks/peon-ping/adapters/opencode/setup-icon.sh\n```\n\nThe script auto-finds the peon icon (Homebrew libexec, OpenCode config, or Claude hooks dir), generates a proper `.icns`, backs up the original `Terminal.icns`, and replaces it. Re-run after `brew upgrade terminal-notifier`.\n\n> **Future:** When [jamf/Notifier](https://github.com/jamf/Notifier) ships to Homebrew ([#32](https://github.com/jamf/Notifier/issues/32)), the plugin will migrate to it ŌĆö Notifier has built-in `--rebrand` support, no icon hacks needed.\n\n</details>\n\n### Kilo CLI setup\n\nA native TypeScript plugin for [Kilo CLI](https://github.com/kilocode/cli) with full [CESP v1.0](https://github.com/PeonPing/openpeon) conformance. Kilo CLI is a fork of OpenCode and uses the same plugin system ŌĆö this installer downloads the OpenCode plugin and patches it for Kilo.\n\n**Quick install:**\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/PeonPing/peon-ping/main/adapters/kilo.sh | bash\n```\n\nThe installer copies `peon-ping.ts` to `~/.config/kilo/plugins/` and creates a config at `~/.config/kilo/peon-ping/config.json`. Packs are stored at the shared CESP path (`~/.openpeon/packs/`).\n\n**Features:** Same as the [OpenCode adapter](#opencode-setup) ŌĆö sound playback, CESP event mapping, desktop notifications, terminal focus detection, tab titles, pack switching, no-repeat logic, and spam detection.\n\n### Gemini CLI setup\n\nA shell adapter for **Gemini CLI** with full [CESP v1.0](https://github.com/PeonPing/openpeon) conformance.\n\n**Setup:**\n\n1. Ensure peon-ping is installed (`curl -fsSL https://peonping.com/install | bash`)\n\n2. Add the following hooks to your `~/.gemini/settings.json`:\n\n   ```json\n    {\n      \"hooks\": {\n        \"SessionStart\": [\n          {\n            \"matcher\": \"startup\",\n            \"hooks\": [\n              {\n                \"name\": \"peon-start\",\n                \"type\": \"command\",\n                \"command\": \"bash ~/.claude/hooks/peon-ping/adapters/gemini.sh SessionStart\"\n              }\n            ]\n          }\n        ],\n        \"AfterAgent\": [\n          {\n            \"matcher\": \"*\",\n            \"hooks\": [\n              {\n                \"name\": \"peon-after-agent\",\n                \"type\": \"command\",\n                \"command\": \"bash ~/.claude/hooks/peon-ping/adapters/gemini.sh AfterAgent\"\n              }\n            ]\n          }\n        ],\n        \"AfterTool\": [\n          {\n            \"matcher\": \"*\",\n            \"hooks\": [\n              {\n                \"name\": \"peon-after-tool\",\n                \"type\": \"command\",\n                \"command\": \"bash ~/.claude/hooks/peon-ping/adapters/gemini.sh AfterTool\"\n              }\n            ]\n          }\n        ],\n        \"Notification\": [\n          {\n            \"matcher\": \"*\",\n            \"hooks\": [\n              {\n                \"name\": \"peon-notification\",\n                \"type\": \"command\",\n                \"command\": \"bash ~/.claude/hooks/peon-ping/adapters/gemini.sh Notification\"\n              }\n            ]\n          }\n        ]\n      }\n    }\n   ```\n\n**Event mapping:**\n\n- `SessionStart` (startup) ŌåÆ Greeting sound (*\"Ready to work?\"*, *\"Yes?\"*)\n- `AfterAgent` ŌåÆ Task completion sound (*\"Work, work.\"*, *\"Job's done!\"*)\n- `AfterTool` ŌåÆ Success = Task completion sound, Failure = Error sound (*\"I can't do that.\"*)\n- `Notification` ŌåÆ System notification\n\n### Windsurf setup\n\nAdd to `~/.codeium/windsurf/hooks.json` (user-level) or `.windsurf/hooks.json` (workspace-level):\n\n```json\n{\n  \"hooks\": {\n    \"post_cascade_response\": [\n      { \"command\": \"bash ~/.claude/hooks/peon-ping/adapters/windsurf.sh post_cascade_response\", \"show_output\": false }\n    ],\n    \"pre_user_prompt\": [\n      { \"command\": \"bash ~/.claude/hooks/peon-ping/adapters/windsurf.sh pre_user_prompt\", \"show_output\": false }\n    ],\n    \"post_write_code\": [\n      { \"command\": \"bash ~/.claude/hooks/peon-ping/adapters/windsurf.sh post_write_code\", \"show_output\": false }\n    ],\n    \"post_run_command\": [\n      { \"command\": \"bash ~/.claude/hooks/peon-ping/adapters/windsurf.sh post_run_command\", \"show_output\": false }\n    ]\n  }\n}\n```\n\n### Kiro setup\n\nCreate `~/.kiro/agents/peon-ping.json`:\n\n```json\n{\n  \"name\": \"peon-ping\",\n  \"hooks\": {\n    \"agentSpawn\": [\n      { \"command\": \"bash ~/.claude/hooks/peon-ping/adapters/kiro.sh\" }\n    ],\n    \"userPromptSubmit\": [\n      { \"command\": \"bash ~/.claude/hooks/peon-ping/adapters/kiro.sh\" }\n    ],\n    \"stop\": [\n      { \"command\": \"bash ~/.claude/hooks/peon-ping/adapters/kiro.sh\" }\n    ]\n  }\n}\n```\n\n`preToolUse`/`postToolUse` are intentionally excluded ŌĆö they fire on every tool call and would be extremely noisy.\n\n### Rovo Dev CLI setup\n\nA shell adapter for [Rovo Dev CLI](https://developer.atlassian.com/cloud/rovo/) (Atlassian) with full [CESP v1.0](https://github.com/PeonPing/openpeon) conformance.\n\n**Auto-setup:**\n\nIf `~/.rovodev/config.yml` exists when you run `install.sh` or `peon-ping-setup`, event hooks are registered automatically.\n\n**Manual setup:**\n\n1. Ensure peon-ping is installed (`curl -fsSL https://peonping.com/install | bash`)\n\n2. Add to `~/.rovodev/config.yml`:\n\n   ```yaml\n   eventHooks:\n     events:\n       - name: on_complete\n         commands:\n           - command: bash ~/.claude/hooks/peon-ping/adapters/rovodev.sh on_complete\n       - name: on_error\n         commands:\n           - command: bash ~/.claude/hooks/peon-ping/adapters/rovodev.sh on_error\n       - name: on_tool_permission\n         commands:\n           - command: bash ~/.claude/hooks/peon-ping/adapters/rovodev.sh on_tool_permission\n   ```\n\n3. Restart Rovo Dev CLI for the hooks to take effect.\n\n**Event mapping:**\n\n- `on_complete` ŌåÆ Completion sound (*\"Work, work.\"*, *\"Job's done!\"*)\n- `on_error` ŌåÆ Er
