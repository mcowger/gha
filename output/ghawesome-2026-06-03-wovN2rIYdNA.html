tala├¦├Żo Existente\n\nSe voc├¬ j├Ī tem o AIOX instalado:\n\n```bash\nnpx aiox-core@latest install\n# O instalador detectar├Ī sua instala├¦├Żo existente e a atualizar├Ī\n```\n\n### Configure Seu IDE para Desenvolvimento AIOX\n\nO AIOX inclui regras pr├®-configuradas para IDE para melhorar sua experi├¬ncia de desenvolvimento:\n\n#### Para Cursor:\n\n1. Abra as configura├¦├Ąes do Cursor\n2. Navegue at├® **User Rules**\n3. Copie o conte├║do de `.cursor/global-rules.md`\n4. Cole na se├¦├Żo de regras e salve\n\n#### Para Claude Code:\n\n- Ō£ģ J├Ī configurado! O arquivo `.claude/CLAUDE.md` ├® carregado automaticamente\n- Sync dedicado de agentes: `npm run sync:ide:claude`\n- Validacao dedicada: `npm run validate:claude-sync && npm run validate:claude-integration`\n\n#### Para Codex CLI:\n\n- Ō£ģ Integra├¦├Żo de primeira classe no AIOX 4.2 (pipeline de ativa├¦├Żo e greeting compartilhado)\n- Ō£ģ J├Ī configurado! O arquivo `AGENTS.md` na raiz ├® carregado automaticamente\n- Opcional: sincronize agentes auxiliares com `npm run sync:ide:codex`\n- Recomendado neste reposit├│rio: gerar e versionar skills locais com `npm run sync:skills:codex`\n- Use `npm run sync:skills:codex:global` apenas fora deste projeto (para evitar duplicidade no `/skills`)\n- Validacao dedicada: `npm run validate:codex-sync && npm run validate:codex-integration`\n- Guardrails de skills/paths: `npm run validate:codex-skills && npm run validate:paths`\n\n#### Para Gemini CLI:\n\n- Ō£ģ Regras e agentes sincronizaveis com `npm run sync:ide:gemini`\n- Arquivos gerados em `.gemini/rules.md`, `.gemini/rules/AIOX/agents/` e `.gemini/commands/*.toml`\n- Ō£ģ Hooks e settings locais no fluxo de instalacao (`.gemini/hooks/` + `.gemini/settings.json`)\n- Ō£ģ Ativacao rapida por slash commands (`/aiox-menu`, `/aiox-dev`, `/aiox-architect`, etc.)\n- Validacao dedicada: `npm run validate:gemini-sync && npm run validate:gemini-integration`\n- Paridade multi-IDE em um comando: `npm run validate:parity`\n\nEstas regras fornecem:\n\n- ­¤ż¢ Reconhecimento e integra├¦├Żo de comandos de agentes\n- ­¤ōŗ Fluxo de trabalho de desenvolvimento dirigido por hist├│rias\n- Ō£ģ Rastreamento autom├Ītico de checkboxes\n- ­¤¦¬ Padr├Ąes de teste e valida├¦├Żo\n- ­¤ōØ Padr├Ąes de c├│digo espec├Łficos do AIOX\n\n### In├Łcio Mais R├Īpido com Interface Web (2 minutos)\n\n1. **Instale o AIOX**: Execute `npx aiox-core init meu-projeto`\n2. **Configure seu IDE**: Siga as instru├¦├Ąes de configura├¦├Żo para Codex CLI, Cursor ou Claude Code\n3. **Comece a Planejar**: Ative um agente como `@analyst` para come├¦ar a criar seu briefing\n4. **Use comandos AIOX**: Digite `*help` para ver comandos dispon├Łveis\n5. **Siga o fluxo**: Veja o [Guia do usu├Īrio](docs/guides/user-guide.md) para mais detalhes\n\n### Refer├¬ncia de Comandos CLI\n\nO AIOX oferece uma CLI moderna e cross-platform com comandos intuitivos:\n\n```bash\n# Gerenciamento de Projeto (com assistente interativo)\nnpx aiox-core init <nome-projeto> [op├¦├Ąes]\n  --force              For├¦ar cria├¦├Żo em diret├│rio n├Żo vazio\n  --skip-install       Pular instala├¦├Żo de depend├¬ncias npm\n  --template <nome>    Usar template espec├Łfico (default, minimal, enterprise)\n\n# Instala├¦├Żo e Configura├¦├Żo (com prompts modernos)\nnpx aiox-core install [op├¦├Ąes]\n  --force              Sobrescrever configura├¦├Żo existente\n  --quiet              Sa├Łda m├Łnima durante instala├¦├Żo\n  --dry-run            Simular instala├¦├Żo sem modificar arquivos\n\n# Comandos do Sistema\nnpx aiox-core --version   Exibir vers├Żo instalada\nnpx aiox-core --help      Exibir ajuda detalhada\nnpx aiox-core info        Exibir informa├¦├Ąes do sistema\nnpx aiox-core doctor      Executar diagn├│sticos do sistema\nnpx aiox-core doctor --fix Corrigir problemas detectados automaticamente\n\n# Manuten├¦├Żo\nnpx aiox-core update      Atualizar para vers├Żo mais recente\nnpx aiox-core uninstall   Remover AIOX\n```\n\n**Recursos da CLI:**\n\n- Ō£ģ **Help System Abrangente**: `--help` em qualquer comando mostra documenta├¦├Żo detalhada\n- Ō£ģ **Valida├¦├Żo de Entrada**: Feedback imediato sobre par├ómetros inv├Īlidos\n- Ō£ģ **Mensagens Coloridas**: Erros em vermelho, sucessos em verde, avisos em amarelo\n- Ō£ģ **Cross-Platform**: Funciona perfeitamente em Windows, macOS e Linux\n- Ō£ģ **Suporte a Dry-Run**: Teste instala├¦├Ąes sem modificar arquivos\n\n### ­¤ÆĪ Exemplos de Uso\n\n#### Instala├¦├Żo Interativa Completa\n\n```bash\n$ npx aiox-core install\n\n­¤ÜĆ AIOX Installation\n\nŌŚå What is your project name?\nŌöé  my-awesome-project\nŌöé\nŌŚć Which directory should we use?\nŌöé  ./my-awesome-project\nŌöé\nŌŚå Choose components to install:\nŌöé  ŌŚÅ Core Framework (Required)\nŌöé  ŌŚÅ Agent System (Required)\nŌöé  ŌŚÅ Squads (optional)\nŌöé  ŌŚŗ Example Projects (optional)\nŌöé\nŌŚć Select package manager:\nŌöé  ŌŚÅ npm\nŌöé  ŌŚŗ yarn\nŌöé  ŌŚŗ pnpm\nŌöé\nŌŚå Initialize Git repository?\nŌöé  Yes\nŌöé\nŌŚå Install dependencies?\nŌöé  Yes\nŌöé\nŌ¢Ė Creating project directory...\nŌ¢Ė Copying framework files...\nŌ¢Ė Initializing Git repository...\nŌ¢Ė Installing dependencies (this may take a minute)...\nŌ¢Ė Configuring environment...\nŌ¢Ė Running post-installation setup...\n\nŌ£ö Installation completed successfully! (34.2s)\n\nNext steps:\n  cd my-awesome-project\n  aiox-core doctor     # Verify installation\n  aiox-core --help     # See available commands\n```\n\n#### Instala├¦├Żo Silenciosa (CI/CD)\n\n```bash\n# Instala├¦├Żo automatizada sem prompts\n$ npx aiox-core install --quiet --force\nŌ£ö AIOX installed successfully\n```\n\n#### Simula├¦├Żo de Instala├¦├Żo (Dry-Run)\n\n```bash\n# Testar instala├¦├Żo sem modificar arquivos\n$ npx aiox-core install --dry-run\n\n[DRY RUN] Would create: ./my-project/\n[DRY RUN] Would copy: .aiox-core/ (45 files)\n[DRY RUN] Would initialize: Git repository\n[DRY RUN] Would install: npm dependencies\nŌ£ö Dry run completed - no files were modified\n```\n\n#### Diagn├│stico do Sistema\n\n```bash\n$ npx aiox-core doctor\n\n­¤Åź AIOX System Diagnostics\n\nŌ£ö Node.js version: v20.10.0 (meets requirement: >=18.0.0)\nŌ£ö npm version: 10.2.3\nŌ£ö Git installed: version 2.43.0\nŌ£ö GitHub CLI: gh 2.40.1\nŌ£ö AIOX: v4.2.11\n\nConfiguration:\nŌ£ö .aiox-core/ directory exists\nŌ£ö Agent files: 11 found\nŌ£ö Workflow files: 8 found\nŌ£ö Templates: 15 found\n\nDependencies:\nŌ£ö @clack/prompts: ^0.7.0\nŌ£ö commander: ^12.0.0\nŌ£ö execa: ^9.0.0\nŌ£ö fs-extra: ^11.0.0\nŌ£ö picocolors: ^1.0.0\n\nŌ£ģ All checks passed! Your installation is healthy.\n```\n\n#### Obter Ajuda\n\n```bash\n$ npx aiox-core --help\n\nUsage: aiox-core [options] [command]\n\nAIOX: AI-Orchestrated System for Full Stack Development\n\nOptions:\n  -V, --version                output the version number\n  -h, --help                   display help for command\n\nCommands:\n  init <project-name>          Create new AIOX project with interactive wizard\n  install [options]            Install AIOX in current directory\n  info                         Display system information\n  doctor [options]             Run system diagnostics and health checks\n  help [command]               display help for command\n\nRun 'aiox-core <command> --help' for detailed information about each command.\n```\n\n### Alternativa: Clonar e Construir\n\nPara contribuidores ou usu├Īrios avan├¦ados que queiram modificar o c├│digo fonte:\n\n```bash\n# Clonar o reposit├│rio\ngit clone https://github.com/SynkraAI/aiox-core.git\ncd aiox-core\n\n# Instalar depend├¬ncias\nnpm install\n\n# Executar o instalador\nnpm run install:aiox\n```\n\n### Configura├¦├Żo R├Īpida para Equipe\n\nPara membros da equipe ingressando no projeto:\n\n```bash\n# Instalar AIOX no projeto\nnpx aiox-core@latest install\n\n# Isto vai:\n# 1. Detectar instala├¦├Żo existente (se houver)\n# 2. Instalar/atualizar framework AIOX\n# 3. Configurar agentes e workflows\n```\n\n## ­¤ī¤ Al├®m do Desenvolvimento de Software - Squads\n\nO framework de linguagem natural do AIOX funciona em QUALQUER dom├Łnio. Os Squads fornecem agentes IA especializados para escrita criativa, estrat├®gia de neg├│cios, sa├║de e bem-estar, educa├¦├Żo e muito mais. Al├®m disso, os Squads podem expandir o n├║cleo do AIOX com funcionalidade espec├Łfica que n├Żo ├® gen├®rica para todos os casos. [Veja o Guia de Squads](docs/guides/squads-guide.md) e aprenda a criar os seus pr├│prios!\n\n## Agentes Dispon├Łveis\n\nO AIOX vem com 12 agentes especializados:\n\n### Agentes Meta\n\n- **aiox-master** - Agente mestre de orquestra├¦├Żo (inclui capacidades de desenvolvimento de framework)\n- **aiox-orchestrator** - Orquestrador de fluxo de trabalho e coordena├¦├Żo de equipe\n\n### Agentes de Planejamento (Interface Web)\n\n- **analyst** - Especialista em an├Īlise de neg├│cios e cria├¦├Żo de PRD\n- **pm** (Product Manager) - Gerente de produto e prioriza├¦├Żo\n- **architect** - Arquiteto de sistema e design t├®cnico\n- **ux-expert** - Design de experi├¬ncia do usu├Īrio e usabilidade\n\n### Agentes de Desenvolvimento (IDE)\n\n- **sm** (Scrum Master) - Gerenciamento de sprint e cria├¦├Żo de hist├│rias\n- **dev** - Desenvolvedor e implementa├¦├Żo\n- **qa** - Garantia de qualidade e testes\n- **po** (Product Owner) - Gerenciamento de backlog e hist├│rias\n- **data-engineer** - Design de banco de dados e modelagem de dados\n- **devops** - CI/CD, infraestrutura e opera├¦├Ąes git (autoridade exclusiva de push)\n\n## Documenta├¦├Żo e Recursos\n\n### Guias Essenciais\n\n- ­¤ō¢ **[Guia do Usu├Īrio](docs/guides/user-guide.md)** - Passo a passo completo desde a concep├¦├Żo at├® a conclus├Żo do projeto\n- ­¤ÅŚ’ĖÅ **[Arquitetura Principal](docs/architecture/AIOX-VISUAL-OVERVIEW.md)** - Mergulho t├®cnico profundo e design do sistema\n- ­¤ÜĆ **[Guia de Squads](docs/guides/squads-guide.md)** - Estenda o AIOX para qualquer dom├Łnio al├®m do desenvolvimento de software\n\n### Documenta├¦├Żo Adicional\n\n- ­¤ż¢ **[Guia de Squads](docs/guides/squads-guide.md)** - Crie e publique equipes de agentes IA\n- ­¤ōŗ **[Primeiros Passos](docs/getting-started.md)** - Tutorial passo a passo para iniciantes\n- ­¤ö¦ **[Solu├¦├Żo de Problemas](docs/troubleshooting.md)** - Solu├¦├Ąes para problemas comuns\n- ­¤Ä» **[Princ├Łpios Orientadores](docs/GUIDING-PRINCIPLES.md)** - Filosofia e melhores pr├Īticas do AIOX\n- ­¤Åø’ĖÅ **[Vis├Żo Geral da Arquitetura](docs/architecture/AIOX-VISUAL-OVERVIEW.md)** - Vis├Żo detalhada da arquitetura do sistema\n- ŌÜÖ’ĖÅ **[Guia de Ajuste de Performance](docs/performance-tuning-guide.md)** - Otimize seu fluxo de trabalho AIOX\n- ­¤öÆ **[Melhores Pr├Īticas de Seguran├¦a](docs/security-best-practices.md)** - Seguran├¦a e prote├¦├Żo de dados\n- ­¤öä **[Guia de Migra├¦├Żo](docs/migration-guide.md)** - Migra├¦├Żo de vers├Ąes anteriores\n- ­¤ō” **[Versionamento e Releases](docs/versioning-and-releases.md)** - Pol├Łtica de vers├Ąes\n\n## ­¤ż¢ AIOX Autonomous Development Engine (ADE)\n\nO AIOX introduz o **Autonomous Development Engine (ADE)** - um sistema completo para desenvolvimento aut├┤nomo que transforma requisitos em c├│digo funcional.\n\n### ­¤Ä» O Que ├® o ADE?\n\nO ADE ├® um conjunto de **7 Epics** que habilitam execu├¦├Żo aut├┤noma de desenvolvimento:\n\n| Epic  | Nome             | Descri├¦├Żo                                  |\n| ----- | ---------------- | ------------------------------------------ |\n| **1** | Worktree Manager | Isolamento de branches via Git worktrees   |\n| **2** | Migration V2ŌåÆV3  | Migra├¦├Żo para formato autoClaude V3        |\n| **3** | Spec Pipeline    | Transforma requisitos em specs execut├Īveis |\n| **4** | Execution Engine | Executa specs com 13 steps + self-critique |\n| **5** | Recovery System  | Recupera├¦├Żo autom├Ītica de falhas           |\n| **6** | QA Evolution     | Review estruturado em 10 fases             |\n| **7** | Memory Layer     | Mem├│ria persistente de padr├Ąes e insights  |\n\n### ­¤öä Fluxo Principal\n\n```\nUser Request ŌåÆ Spec Pipeline ŌåÆ Execution Engine ŌåÆ QA Review ŌåÆ Working Code\n                                      Ōåō\n                              Recovery System\n                                      Ōåō\n                               Memory Layer\n```\n\n### ŌÜĪ Quick Start ADE\n\n```bash\n# 1. Criar spec a partir de requisito\n@pm *gather-requirements\n@architect *assess-complexity\n@analyst *research-deps\n@pm *write-spec\n@qa *critique-spec\n\n# 2. Executar spec aprovada\n@architect *create-plan\n@architect *create-context\n@dev *execute-subtask 1.1\n\n# 3. QA Review\n@qa *review-build STORY-42\n```\n\n### ­¤ō¢ Documenta├¦├Żo ADE\n\n- **[Guia Completo do ADE](docs/guides/ade-guide.md)** - Tutorial passo a passo\n- **[Altera├¦├Ąes nos Agentes](docs/architecture/ADE-AGENT-CHANGES.md)** - Comandos e capabilities por agente\n- **[Epic 1 - Worktree Manager](docs/architecture/ADE-EPIC1-HANDOFF.md)**\n- **[Epic 2 - Migration V2ŌåÆV3](docs/architecture/ADE-EPIC2-HANDOFF.md)**\n- **[Epic 3 - Spec Pipeline](docs/architecture/ADE-EPIC3-HANDOFF.md)**\n- **[Epic 4 - Execution Engine](docs/architecture/ADE-EPIC4-HANDOFF.md)**\n- **[Epic 5 - Recovery System](docs/architecture/ADE-EPIC5-HANDOFF.md)**\n- **[Epic 6 - QA Evolution](docs/architecture/ADE-EPIC6-HANDOFF.md)**\n- **[Epic 7 - Memory Layer](docs/architecture/ADE-EPIC7-HANDOFF.md)**\n\n### ­¤åĢ Novos Comandos por Agente\n\n**@devops:**\n\n- `*create-worktree`, `*list-worktrees`, `*merge-worktree`, `*cleanup-worktrees`\n- `*inventory-assets`, `*analyze-paths`, `*migrate-agent`, `*migrate-batch`\n\n**@pm:**\n\n- `*gather-requirements`, `*write-spec`\n\n**@architect:**\n\n- `*assess-complexity`, `*create-plan`, `*create-context`, `*map-codebase`\n\n**@analyst:**\n\n- `*research-deps`, `*extract-patterns`\n\n**@qa:**\n\n- `*critique-spec`, `*review-build`, `*request-fix`, `*verify-fix`\n\n**@dev:**\n\n- `*execute-subtask`, `*track-attempt`, `*rollback`, `*capture-insights`, `*list-gotchas`, `*apply-qa-fix`\n\n## Criando Seu Pr├│prio Squad\n\nSquads permitem estender o AIOX para qualquer dom├Łnio. Estrutura b├Īsica:\n\n```\nsquads/seu-squad/\nŌö£ŌöĆŌöĆ config.yaml           # Configura├¦├Żo do squad\nŌö£ŌöĆŌöĆ agents/              # Agentes especializados\nŌö£ŌöĆŌöĆ tasks/               # Fluxos de trabalho de tarefas\nŌö£ŌöĆŌöĆ templates/           # Templates de documentos\nŌö£ŌöĆŌöĆ checklists/          # Checklists de valida├¦├Żo\nŌö£ŌöĆŌöĆ data/                # Base de conhecimento\nŌö£ŌöĆŌöĆ README.md            # Documenta├¦├Żo do squad\nŌööŌöĆŌöĆ user-guide.md        # Guia do usu├Īrio\n```\n\nVeja o [Guia de Squads](docs/guides/squads-guide.md) para instru├¦├Ąes detalhadas.\n\n## Squads Dispon├Łveis\n\nSquads s├Żo equipes modulares de agentes IA. Veja a [Vis├Żo Geral de Squads](docs/guides/squads-overview.md) para mais informa├¦├Ąes.\n\n### Squads Externos\n\n- **[hybrid-ops](https://github.com/SynkraAI/aiox-hybrid-ops-pedro-valerio)** - Opera├¦├Ąes h├Łbridas humano-agente (reposit├│rio separado)\n\n## AIOX Pro\n\nO **AIOX Pro** ├® o m├│dulo premium do AIOX, oferecendo funcionalidades avan├¦adas para equipes e projetos de maior escala.\n\n> **Disponibilidade restrita:** O AIOX Pro est├Ī dispon├Łvel exclusivamente para membros do **AIOX Cohort Advanced**. [Saiba mais sobre o programa](https://aioxsquad.ai).\n\nPara saber como acessar, ativar, recuperar conta e validar as squads Pro, consulte o [Guia de Acesso ao AIOX Pro](docs/guides/aiox-pro-access.md).\n\n### Instala├¦├Żo\n\n```bash\nnpx -y -p @aiox-squads/core@latest aiox pro setup\n```\n\n### Identifica├¦├Żo Est├Īvel de M├Īquina (>= 5.0.8)\n\nO AIOX Pro agora usa o UUID nativo do sistema operacional para gerar `machineId`, preservando o hash SHA-256 e evitando consumo extra de assentos quando o macOS, VPNs ou redes Wi-Fi alteram o MAC/interface ativa.\n\nCaches locais de licen├¦a criados pelo algoritmo antigo s├Żo migrados automaticamente na pr├│xima leitura. A janela de fallback legacy ├® de 90 dias; depois disso, instala├¦├Ąes antigas precisam reativar online.\n\n### Features Premium\n\n- **Squads Avan├¦ados** - Squads especializados com capacidades expandidas\n- **Memory Layer** - Mem├│ria persistente de padr├Ąes e insights entre sess├Ąes\n- **M├®tricas & Analytics** - Dashboard de produtividade e m├®tricas de desenvolvimento\n- **Integra├¦├Ąes Enterprise** - Conectores para Jira, Linear, Notion e mais\n- **Configura├¦├Żo em Camadas** - Sistema de configura├¦├Żo L1-L4 com heran├¦a\n- **Licenciamento** - Gerenciamento de licen├¦a via `aiox pro activate --key <KEY>`\n\nPara mais informa├¦├Ąes, execute `npx aiox-core pro --help` ap├│s a instala├¦├Żo.\n\n## Suporte\n\n- ­¤Éø [Rastreador de Issues](https://github.com/SynkraAI/aiox-core/issues) - Bug reports e feature requests\n- ­¤ÆĪ [Processo de Features](docs/FEATURE_PROCESS.md) - Como propor novas funcionalidades\n- ­¤ōŗ [Como Contribuir](CONTRIBUTING.md)\n- ­¤Ś║’ĖÅ [Roadmap](docs/roadmap.md) - Veja o que estamos construindo\n- ­¤ż¢ [Guia de Squads](docs/guides/squads-guide.md) - Crie equipes de agentes IA\n\n## Git Workflow e Valida├¦├Żo\n\nO AIOX implementa um sistema de valida├¦├Żo de m├║ltiplas camadas para garantir qualidade do c├│digo e consist├¬ncia:\n\n### ­¤øĪ’ĖÅ Defense in Depth - 3 Camadas de Valida├¦├Żo\n\n**Camada 1: Pre-commit (Local - R├Īpida)**\n\n- Ō£ģ ESLint - Qualidade de c├│digo\n- Ō£ģ TypeScript - Verifica├¦├Żo de tipos\n- ŌÜĪ Performance: <5s\n- ­¤ÆŠ Cache habilitado\n\n**Camada 2: Pre-push (Local - Valida├¦├Żo de Stories)**\n\n- Ō£ģ Valida├¦├Żo de checkboxes de hist├│rias\n- Ō£ģ Consist├¬ncia de status\n- Ō£ģ Se├¦├Ąes obrigat├│rias\n\n**Camada 3: CI/CD (Cloud - Obrigat├│rio para merge)**\n\n- Ō£ģ Todos os testes\n- Ō£ģ Cobertura de testes (80% m├Łnimo)\n- Ō£ģ Valida├¦├Ąes completas\n- Ō£ģ GitHub Actions\n\n### ­¤ō¢ Documenta├¦├Żo Detalhada\n\n- ­¤ōŗ **[Guia Completo de Git Workflow](docs/git-workflow-guide.md)** - Guia detalhado do fluxo de trabalho\n- ­¤ōŗ **[CONTRIBUTING.md](CONTRIBUTING.md)** - Guia de contribui├¦├Żo\n\n### Comandos Dispon├Łveis\n\n```bash\n# Valida├¦├Ąes locais\nnpm run lint           # ESLint\nnpm run typecheck      # TypeScript\nnpm test              # Testes\nnpm run test:coverage # Testes com cobertura\n\n# Validador AIOX\nnode .aiox-core/utils/aiox-validator.js pre-commit   # Valida├¦├Żo pre-commit\nnode .aiox-core/utils/aiox-validator.js pre-push     # Valida├¦├Żo pre-push\nnode .aiox-core/utils/aiox-validator.js stories      # Validar todas stories\n```\n\n### Branch Protection\n\nConfigure prote├¦├Żo da branch master com:\n\n```bash\nnode scripts/setup-branch-protection.js\n```\n\nRequer:\n\n- GitHub CLI (gh) instalado e autenticado\n- Acesso de admin ao reposit├│rio\n\n## Contribuindo\n\n**Estamos empolgados com contribui├¦├Ąes e acolhemos suas ideias, melhorias e Squads!** ­¤Äē\n\nPara contribuir:\n\n1. Fork o reposit├│rio\n2. Crie uma branch para sua feature (`git checkout -b feature/MinhaNovaFeature`)\n3. Commit suas mudan├¦as (`git commit -m 'feat: Adicionar nova feature'`)\n4. Push para a branch (`git push origin feature/MinhaNovaFeature`)\n5. Abra um Pull Request\n\nVeja tamb├®m:\n\n- ­¤ōŗ [Como Contribuir com Pull Requests](docs/how-to-contribute-with-pull-requests.md)\n- ­¤ōŗ [Guia de Git Workflow](docs/git-workflow-guide.md)\n\n## ­¤ōä Legal\n\n| Documento             | English                                            | Portugu├¬s                           |\n| --------------------- | -------------------------------------------------- | ----------------------------------- |\n| **Licen├¦a**           | [MIT License](LICENSE)                             | -                                   |\n| **Modelo de Licen├¦a** | [Core vs Pro](docs/legal/license-clarification.md) | -                                   |\n| **Privacidade**       | [Privacy Policy](docs/legal/privacy.md)            | -                                   |\n| **Termos de Uso**     | [Terms of Use](docs/legal/terms.md)                | -                                   |\n| **C├│digo de Conduta** | [Code of Conduct](CODE_OF_CONDUCT.md)              | [PT-BR](docs/pt/code-of-conduct.md) |\n| **Contribui├¦├Żo**      | [Contributing](CONTRIBUTING.md)                    | [PT-BR](docs/pt/contributing.md)    |\n| **Seguran├¦a**         | [Security](docs/security.md)                       | [PT-BR](docs/pt/security.md)        |\n| **Comunidade**        | [Community](docs/community.md)                     | [PT-BR](docs/pt/community.md)       |\n| **Roadmap**           | [Roadmap](docs/roadmap.md)                         | [PT-BR](docs/pt/roadmap.md)         |\n| **Changelog**         | [Version History](CHANGELOG.md)                    | -                                   |\n\n## Contribuidores\n\n[![Contributors](https://contrib.rocks/image?repo=SynkraAI/aiox-core)](https://github.com/SynkraAI/aiox-core/graphs/contributors)\n\n### ­¤ī¤ Contribuidores da Comunidade\n\n<!-- prettier-ignore-start -->\n<!-- Manually maintained ŌĆö add new community contributors here -->\n<table>\n  <tr>\n    <td align=\"center\"><a href=\"https://github.com/nikolasdehor\"><img src=\"https://github.com/nikolasdehor.png?size=100\" width=\"100px;\" alt=\"Nikolas de Hor\"/><br /><sub><b>Nikolas de Hor</b></sub></a><br />­¤Æ╗­¤ÉøŌÜĀ’ĖÅ­¤æĆ</td>\n  </tr>\n</table>\n<!-- prettier-ignore-end -->\n\n<sub>Constru├Łdo com ŌØż’ĖÅ para a comunidade de desenvolvimento assistido por IA</sub>\n\n---\n\n**[Ō¼å Voltar ao topo](#aiox-squad-artificial-intelligence-orchestration-experience)**\n","summary":"AIOX (Artificial Intelligence Orchestration eXperience) ├® um framework open-source projetado para a orquestra├¦├Żo de agentes especializados e fluxos de trabalho complexos de IA. A ferramenta adota uma filosofia \"CLI First\", oferecendo uma interface de linha de comando robusta para gerenciar agentes, hooks de ciclo de vida e integra├¦├Ąes nativas com diversas IDEs. Este projeto ├® ideal para desenvolvedores e arquitetos de software que buscam maior controle, automa├¦├Żo e padroniza├¦├Żo operacional ao construir e implantar sistemas multi-agentes em m├║ltiplos ambientes de desenvolvimento.","description":"Synkra AIOS: AI-Orchestrated System for Full Stack Development - Core Framework v4.0","stars":2948,"language":"JavaScript"},{"owner":"badlogic","repo":"pi-mono","url":"https://github.com/badlogic/pi-mono","readme":"<p align=\"center\">\n  <a href=\"https://pi.dev\">\n    <img alt=\"pi logo\" src=\"https://pi.dev/logo-auto.svg\" width=\"128\">\n  </a>\n</p>\n<p align=\"center\">\n  <a href=\"https://discord.com/invite/3cU7Bz4UPx\"><img alt=\"Discord\" src=\"https://img.shields.io/badge/discord-community-5865F2?style=flat-square&logo=discord&logoColor=white\" /></a>\n</p>\n<p align=\"center\">\n  <a href=\"https://pi.dev\">pi.dev</a> domain graciously donated by\n  <br /><br />\n  <a href=\"https://exe.dev\"><img src=\"packages/coding-agent/docs/images/exy.png\" alt=\"Exy mascot\" width=\"48\" /><br />exe.dev</a>\n</p>\n\n> New issues and PRs from new contributors are auto-closed by default. Maintainers review auto-closed issues daily. See [CONTRIBUTING.md](CONTRIBUTING.md).\n\n---\n\n# Pi Agent Harness Mono Repo\n\nThis is the home of the pi agent harness project including our self extensible coding agent.\n\n* **[@earendil-works/pi-coding-agent](packages/coding-agent)**: Interactive coding agent CLI\n* **[@earendil-works/pi-agent-core](packages/agent)**: Agent runtime with tool calling and state management\n* **[@earendil-works/pi-ai](packages/ai)**: Unified multi-provider LLM API (OpenAI, Anthropic, Google, ŌĆ”)\n\nTo learn more about pi:\n\n* [Visit pi.dev](https://pi.dev), the project website with demos\n* [Read the documentation](https://pi.dev/docs/latest), but you can also ask the agent to explain itself\n\n## Share your OSS coding agent sessions\n\nIf you use pi or other coding agents for open source work, please share your sessions.\n\nPublic OSS session data helps improve coding agents with real-world tasks, tool use, failures, and fixes instead of toy benchmarks.\n\nFor the full explanation, see [this post on X](https://x.com/badlogicgames/status/2037811643774652911).\n\nTo publish sessions, use [`badlogic/pi-share-hf`](https://github.com/badlogic/pi-share-hf). Read its README.md for setup instructions. All you need is a Hugging Face account, the Hugging Face CLI, and `pi-share-hf`.\n\nYou can also watch [this video](https://x.com/badlogicgames/status/2041151967695634619), where I show how I publish my `pi-mono` sessions.\n\nI regularly publish my own `pi-mono` work sessions here:\n\n- [badlogicgames/pi-mono on Hugging Face](https://huggingface.co/datasets/badlogicgames/pi-mono)\n\n## All Packages\n\n| Package | Description |\n|---------|-------------|\n| **[@earendil-works/pi-ai](packages/ai)** | Unified multi-provider LLM API (OpenAI, Anthropic, Google, etc.) |\n| **[@earendil-works/pi-agent-core](packages/agent)** | Agent runtime with tool calling and state management |\n| **[@earendil-works/pi-coding-agent](packages/coding-agent)** | Interactive coding agent CLI |\n| **[@earendil-works/pi-tui](packages/tui)** | Terminal UI library with differential rendering |\n\nFor Slack/chat automation and workflows see [earendil-works/pi-chat](https://github.com/earendil-works/pi-chat).\n\n## Contributing\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for contribution guidelines and [AGENTS.md](AGENTS.md) for project-specific rules (for both humans and agents).\n\n## Development\n\n```bash\nnpm install --ignore-scripts  # Install all dependencies without running lifecycle scripts\nnpm run build        # Build all packages\nnpm run check        # Lint, format, and type check\n./test.sh            # Run tests (skips LLM-dependent tests without API keys)\n./pi-test.sh         # Run pi from sources (can be run from any directory)\n```\n\n## Supply-chain hardening\n\nWe treat npm dependency changes as reviewed code changes.\n\n- Direct external dependencies are pinned to exact versions. Internal workspace packages remain version-ranged.\n- `.npmrc` sets `save-exact=true` and `min-release-age=2` to avoid same-day dependency releases during npm resolution.\n- `package-lock.json` is the dependency ground truth. Pre-commit blocks accidental lockfile commits unless `PI_ALLOW_LOCKFILE_CHANGE=1` is set.\n- `npm run check` verifies pinned direct deps, native TypeScript import compatibility, and the generated coding-agent shrinkwrap.\n- The published CLI package includes `packages/coding-agent/npm-shrinkwrap.json`, generated from the root lockfile, to pin transitive deps for npm users.\n- Release smoke tests use `npm run release:local` to build, pack, and create isolated npm and Bun installs outside the repo before tagging a release.\n- Local release installs, documented npm installs, and `pi update --self` use `--ignore-scripts` where supported.\n- CI installs with `npm ci --ignore-scripts`, and a scheduled GitHub workflow runs `npm audit --omit=dev` plus `npm audit signatures --omit=dev`.\n- Shrinkwrap generation has an explicit allowlist for dependency lifecycle scripts; new lifecycle-script deps fail checks until reviewed.\n\n## License\n\nMIT\n","summary":"The pi-mono repository serves as a comprehensive harness for building and deploying self-extensible coding agents. It provides a modular architecture that includes a unified multi-provider LLM API, a robust agent runtime with tool-calling capabilities, and an interactive terminal-based coding agent. This project is ideal for developers and researchers looking to experiment with autonomous coding workflows or contribute to open-source agent development through shared, real-world execution sessions.","description":"AI agent toolkit: coding agent CLI, unified LLM API, TUI & web UI libraries, Slack bot, vLLM pods","stars":59032,"language":"TypeScript"},{"owner":"open-saas-directory","repo":"awesome-native-macosx-apps","url":"https://github.com/open-saas-directory/awesome-native-macosx-apps","readme":"#   Best Mac Apps ŌĆö Native, Lightweight & No Electron Bloat [![Follow on X](https://img.shields.io/badge/Follow%20%40NativeMacApps-000000?style=for-the-badge&logo=x&logoColor=white)](https://x.com/NativeMacApps)\n\n> A curated collection of beautiful, lightweight, and truly native macOS applications that deserve more recognition.\n\nDiscover high-quality macOS apps built with native technologies (Swift, SwiftUI, AppKit) that are fast, efficient, and respect your Mac's resources. This list focuses on apps that feel like they belong on macOS ŌĆö no Electron bloat, just pure native performance.\n\n---\n\nReach thousands of Mac power users by sponsoring this list. Contact us at [sponsor@opensaas.directory](mailto:sponsor@opensaas.directory)\n\n---\n\n## ­¤ō¼ Get Monthly Native App Picks in Your Inbox\n\nSubscribe to our newsletter and get 5-10 handpicked native macOS apps delivered monthly.\n\n**What you'll get:**\n\n- ­¤Ä» Curated native apps (no Electron bloat)\n- ­¤ÆÄ Hidden gems you won't find elsewhere\n- ­¤åō Free & open-source alternatives\n- ­¤ōŖ App comparisons & recommendations\n- ­¤ö¦ Tips for getting the most out of your Mac\n\n­¤ō¢ **[Subscribe to the Newsletter ŌåÆ](https://nativemacapps.substack.com/)**\n\n_Join early subscribers and never miss a great native Mac app again. Unsubscribe anytime._\n\n---\n\n## Contents\n\n**Getting Started**\n- [What Makes an App \"Native\"?](#what-makes-an-app-native)\n- [Electron App Detector](#-electron-app-detector)\n- [New to Mac? Start Here](#-new-to-mac-start-here)\n\n**Categories**\n- [Analytics & Monitoring](#analytics--monitoring)\n- [Audio & Music](#audio--music)\n- [Backup & Sync](#backup--sync)\n- [Browsers & Web](#browsers--web)\n- [Calendar & Time](#calendar--time)\n- [Clipboard Managers](#clipboard-managers)\n- [Color Pickers](#color-pickers)\n- [Database Tools](#database-tools)\n- [Design Tools](#design-tools)\n- [Developer Tools](#developer-tools)\n- [Email & Communication](#email--communication)\n- [Finance](#finance)\n- [File Management](#file-management)\n- [Git & Version Control](#git--version-control)\n- [Image & Graphics](#image--graphics)\n- [Markdown Editors](#markdown-editors)\n- [Menu Bar Apps](#menu-bar-apps)\n- [Network Tools](#network-tools)\n- [Note-Taking & Writing](#note-taking--writing)\n- [Password Managers](#password-managers)\n- [PDF Tools](#pdf-tools)\n- [Productivity](#productivity)\n- [Screenshot & Recording](#screenshot--recording)\n- [Security & Privacy](#security--privacy)\n- [System Utilities](#system-utilities)\n- [Terminal & Shell](#terminal--shell)\n- [Text Editors](#text-editors)\n- [Video & Media](#video--media)\n- [Wallpaper Apps](#wallpaper-apps)\n- [Window Management](#window-management)\n\n**Resources**\n- [Contributing](#contributing)\n- [Star History](#star-history)\n- [License](#license)\n\n---\n\n### What Makes an App \"Native\"?\n\nApps on this list are:\n\n- Ō£ģ Built with native macOS frameworks (Swift, SwiftUI, AppKit, Objective-C)\n- Ō£ģ Lightweight and resource-efficient\n- Ō£ģ Follow Apple's Human Interface Guidelines\n- Ō£ģ Feel fast and responsive\n- ŌØī NOT Electron or web-wrapper apps\n- ŌØī NOT resource-heavy cross-platform apps\n\n---\n\n## ­¤ÜĆ New to Mac? Start Here\n\nNot sure where to begin? These 6 apps are the most universally useful ŌĆö install them first and thank yourself later.\n\n| App | Why it's essential |\n|-----|--------------------|\n| [Rectangle](https://rectangleapp.com/) | Snap windows into place with keyboard shortcuts. You'll use this every single day. |\n| [Maccy](https://github.com/p0deje/Maccy) | Clipboard history that just works. Never lose a copied item again. |\n| [IINA](https://iina.io/) | Plays any video format natively. Makes QuickTime feel like a toy. |\n| [AppCleaner](https://freemacsoft.net/appcleaner/) | Uninstall apps properly ŌĆö removes all leftover files, not just the `.app`. |\n| [iTerm2](https://iterm2.com/) | The terminal macOS should have shipped with. Tabs, split panes, search, and more. |\n| [Raycast](https://www.raycast.com/) | Supercharged Spotlight replacement. Launch apps, manage clipboard, run scripts, and more ŌĆö all from one keystroke. |\n\n---\n\n## ­¤öŹ Electron App Detector\n\nA fun, visually appealing script to detect Electron-based applications on your Mac.\n\n### Quick Start\n\n**One-line install and run:**\n\n```bash\ncurl -sL https://raw.githubusercontent.com/open-saas-directory/awesome-native-macosx-apps/main/find-electron-apps-macos.sh | bash\n```\n\n### What It Does\n\n- ­¤öÄ Scans `/Applications` folder for Electron apps\n- ŌÜĪ Identifies apps built with Electron framework\n- ­¤ōŖ Shows app names, sizes, and versions\n- ­¤Ä© Beautiful, colorful terminal output\n\n­¤ō¢ **[Read more about the detector ŌåÆ](ELECTRON-DETECTOR.md)**\n\n---\n\n## Analytics & Monitoring\n\n- [iStat Menus](https://bjango.com/mac/istatmenus/) - Advanced Mac system monitor in your menu bar. `Paid`\n- [Stats](https://github.com/exelban/stats) - macOS system monitor for CPU, GPU, memory, disk, and more. `Free` `Open Source`\n- [Usage](https://usage.pro) - System activity monitor for macOS, iOS, and iPadOS. `Freemium`\n\n## Audio & Music\n\n- [BackgroundMusic](https://github.com/kyleneideck/BackgroundMusic) - macOS audio utility to control volume per-app. `Free` `Open Source`\n- [Cog](https://cog.losno.co/) - Audio player for macOS with broad format support. `Free` `Open Source`\n- [eqMac](https://eqmac.app/) - System-wide audio equalizer for macOS. `Free` `Open Source`\n- [IINA](https://iina.io/) - Modern video player with native macOS design. `Free` `Open Source`\n- [Muxie](https://muxie.duhnnie.com) - Last.fm scrobbler for Apple Music, Spotify Desktop, iPod Classic, Rockbox devices and some others. `Free`\n- [Petrichor](https://github.com/kushalpandya/Petrichor) - Offline music player with support for over 20 file formats and a lot of other features. `Free` `Open Source`\n- [Roam FM](https://roamfm.app/) - Roam the world through global radio. `Freemium`\n- [Sleeve](https://replay.software/sleeve) - Beautiful now playing display for Apple Music. `Paid`\n- [SoundSource](https://rogueamoeba.com/soundsource/) - Superior sound control for macOS. `Paid`\n\n## Backup & Sync\n\n- [Arq](https://www.arqbackup.com/) - Backup your files to cloud storage. `Paid`\n- [Carbon Copy Cloner](https://bombich.com/) - Reliable Mac backup and cloning solution. `Paid`\n\n## Browsers & Web\n\n- [Orion](https://browser.kagi.com/) - Lightweight WebKit browser with zero telemetry. `Free`\n- [Zen Browser](https://zen-browser.app/) - Privacy-focused, customizable browser built on Firefox. `Free` `Open Source`\n\n## Calendar & Time\n\n- [Fantastical](https://flexibits.com/fantastical) - Calendar app with natural language input. `Subscription`\n- [Itsycal](https://www.mowglii.com/itsycal/) - Tiny menu bar calendar. `Free` `Open Source`\n- [Meeting Bar](https://github.com/leits/MeetingBar) - Menu bar app for your calendar meetings. `Free` `Open Source`\n\n## Clipboard Managers\n\n- [Maccy](https://github.com/p0deje/Maccy) - Lightweight clipboard manager with search. `Free` `Open Source`\n- [CopyClip](https://fiplab.com/apps/copyclip-for-mac) - Lightweight clipboard history manager. `Free`\n- [Paste](https://pasteapp.io/) - Beautiful clipboard manager with cloud sync. `Subscription`\n- [Unclutter](https://unclutterapp.com/) - Files, notes, and clipboard manager in one. `Paid`\n\n## Color Pickers\n\n- [ColorSlurp](https://colorslurp.com/) - Best color picker and organizer for macOS. `Freemium`\n- [Pika](https://superhighfives.com/pika) - Beautiful color picker for macOS. `Free` `Open Source`\n- [Sip](https://sipapp.io/) - Collect, organize and share colors. `Paid`\n\n## Database Tools\n\n- [Postico](https://eggerapps.at/postico2/) - Modern PostgreSQL client for macOS. `Paid` `EU`\n- [TablePlus](https://tableplus.com/) - Modern native database management tool. `Freemium`\n- [TablePro](https://tablepro.app) - Native database client for MySQL, PostgreSQL, SQLite, MongoDB, Redis, and more. `Free` `Open Source`\n\n## Design To edia player. `Free` `Open Source` `EU`\n\n## Wallpaper Apps\n\n- [Wallspace](https://wallspace.app/) - Live Wallpapers for Macos, with custom lock screen. `Freemium`\n\n## Window Management\n\n- [Amethyst](https://ianyh.com/amethyst/) - Automatic tiling window manager. `Free` `Open Source`\n- [BetterSnapTool](https://folivora.ai/bettersnaptool) - Window management via snap areas. `Paid` `EU`\n- [Divvy](https://mizage.com/divvy/) - Window management at its finest. `Paid`\n- [Loop](https://github.com/MrKai77/Loop) - Window management made elegant. `Free` `Open Source`\n- [Magnet](https://magnet.crowdcafe.com/) - Window manager that snaps windows into position. `Paid`\n- [Moom](https://manytricks.com/moom/) - Move and zoom windows with ease. `Paid`\n- [Nudge](https://nudge.run) - Free window manager with keyboard shortcuts and drag-to-edge snapping. `Free` `Open Source`\n- [Rectangle](https://rectangleapp.com/) - Window snapping via keyboard shortcuts. `Free` `Open Source`\n- [Rectangle Pro](https://rectangleapp.com/pro) - Professional window management. `Paid`\n- [Swish](https://highlyopinionated.co/swish/) - Control windows with trackpad gestures. `Paid`\n- [Wins](https://wins.cool) - Bring system-level window management features to macOS. `Paid`\n- [Yabai](https://github.com/koekeishiya/yabai) - Tiling window manager for macOS. `Free` `Open Source`\n\n## Contributing\n\nWe welcome contributions! Please read our [Contributing Guidelines](CONTRIBUTING.md) before submitting.\n\n### How to Contribute\n\n1. **Fork** this repository\n2. **Add** your app to the appropriate category in alphabetical order\n3. Follow the format: `[App Name](link) - Brief description. \\`License/Price\\``\n4. **Verify** the app is truly native (Swift/SwiftUI/AppKit)\n5. Create a **Pull Request**\n\n### App Requirements\n\nApps must meet ALL these criteria:\n\n- Ō£ģ Built with native macOS technologies\n- Ō£ģ Lightweight and performant\n- Ō£ģ Actively maintained (updated within the last 2 years)\n- Ō£ģ Available for download\n- Ō£ģ No malware/spyware\n\n### What NOT to Include\n\n- ŌØī Electron apps\n- ŌØī Web wrappers\n- ŌØī Abandoned projects (no updates in 2+ years)\n- ŌØī Apps with malware/suspicious behavior\n- ŌØī Cross-platform apps with poor macOS integration\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/svg?repos=open-saas-directory/awesome-native-macosx-apps&type=Date)](https://star-history.com/#open-saas-directory/awesome-native-macosx-apps&Date)\n\n## License\n\n[![CC0](https://licensebuttons.net/p/zero/1.0/88x31.png)](https://creativecommons.org/publicdomain/zero/1.0/)\n\nTo the extent possible under law, the contributors have waived all copyright and related rights to this work.\n\n---\n\n**­¤ÆĪ Found a great native macOS app?** [Submit it here!](../../issues/new?template=app-submission.md)\n\n**ŌŁÉ If you find this list useful, please star the repo to help others discover it!**\n\n**­¤öŚ Share:** [Twitter](https://twitter.com/intent/tweet?text=Awesome%20Native%20macOS%20Apps%20%E2%80%93%20A%20curated%20list%20of%20beautiful%2C%20lightweight%20macOS%20applications&url=https://github.com/open-saas-directory/awesome-native-macosx-apps) | [Reddit](https://reddit.com/submit?url=https://github.com/open-saas-directory/awesome-native-macosx-apps&title=Awesome%20Native%20macOS%20Apps)\n","summary":"Awesome Native macOS Apps is a curated directory of high-quality software built exclusively using native frameworks like Swift, SwiftUI, and AppKit. By prioritizing performance and resource efficiency, the project helps users discover lightweight applications that avoid the overhead of Electron and other cross-platform web wrappers. It is an essential resource for Mac power users and enthusiasts who want to optimize their system by selecting tools that are fast, responsive, and designed specifically for the macOS ecosystem.","description":"The best Mac apps ŌĆö fast, lightweight, and bloat-free. No Electron. Curated for Mac power users who care about performance.","stars":1217,"language":"Shell"},{"owner":"likec4","repo":"likec4","url":"https://github.com/likec4/likec4","readme":"# Architecture as a code\n\nVisualize, collaborate on, and evolve your software architecture with always up-to-date, live diagrams generated from your code.\n\n[docs](https://likec4.dev/) - [playground](https://playground.likec4.dev/) - [demo](https://template.likec4.dev/view/index)\n\n<a href=\"https://www.npmjs.com/package/likec4\" target=\"_blank\"> ![NPM Version](https://img.shields.io/npm/v/likec4) </a>\n<a href=\"https://www.npmjs.com/package/likec4\" target=\"_blank\">![NPM Downloads](https://img.shields.io/npm/dm/likec4)</a>\n<a href=\"https://marketplace.visualstudio.com/items?itemName=likec4.likec4-vscode\" target=\"_blank\">![VSCode Installs](https://img.shields.io/visual-studio-marketplace/azure-devops/installs/total/likec4.likec4-vscode?label=vscode%20installs)</a>\n<a href=\"https://open-vsx.org/extension/likec4/likec4-vscode\" target=\"_blank\">![Open VSX Installs](https://img.shields.io/open-vsx/dt/likec4/likec4-vscode?label=open-vsx&color=%23A60EE5)</a>\n\n![vscode extension](https://github.com/likec4/likec4/assets/824903/d6994540-55d1-4167-b66b-45056754cc29)\n\n## What is LikeC4? Why \"like\"?\n\nLikeC4 is a modeling language for describing software architecture and tools to generate diagrams from the model.\n\nLikeC4 is inspired by [C4 Model](https://c4model.com/) and [Structurizr DSL](https://github.com/structurizr/dsl), but provides some flexibility.\nYou customize or define your own notation, element types, and any number of nested levels in architecture model.\\\nPerfectly tailored to your needs.\n\n## What does LikeC4 look like?\n\nLikeC4 source:\n\n<div align=\"center\">\n  <img src=\"https://github.com/likec4/.github/assets/824903/c0f22106-dba6-469e-ab47-85e7b8565513\" width=\"675px\">\n</div>\n\nRun [CLI](./packages/likec4/README.md) to preview:\n\n```sh\nnpx likec4 start\n```\n\nAnd result:\n\n<div align=\"center\">\n  <img src=\"https://github.com/likec4/likec4/assets/824903/27eabe54-7d97-47a8-a7e4-1bb44a8e03e5\" width=\"984px\">\n</div>\n\nTemplate repository - [likec4/template](https://github.com/likec4/template)\\\nDeployed - [https://template.likec4.dev](https://template.likec4.dev/view/index)\n\n[![Open in StackBlitz](https://developer.stackblitz.com/img/open_in_stackblitz.svg)](https://stackblitz.com/~/github.com/likec4/template)\n\nCheck [Tutorial](https://likec4.dev/tutorial/) - for a quick overview of LikeC4.\n\n## Getting help\n\nWe are always happy to help you get started:\n\n- [Join Discord community](https://discord.gg/86ZSpjKAdA) ŌĆō it is the easiest way to get help\n- [GitHub Discussions](https://github.com/likec4/likec4/discussions) ŌĆō ask anything about the project or give feedback\n\n## Contributors\n\n<a href=\"https://github.com/likec4/likec4/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=likec4/likec4\" />\n</a>\n\n[Become a contributor](./CONTRIBUTING.md)\n\n## Support development\n\nLikeC4 is a MIT-licensed open source project with its ongoing development made possible entirely by your support.\\\nIf you like the project, please consider contributing financially to help grow and improve it.\\\nYou can support us via [OpenCollective](https://opencollective.com/likec4) or [GitHub Sponsors](https://github.com/sponsors/likec4).\n\n## License\n\nThis project is released under the [MIT License](LICENSE)\n","summary":"LikeC4 is an architecture-as-code tool that enables developers to define and visualize software systems using a flexible, C4-inspired modeling language. It allows users to create custom, nested architectural diagrams that remain live and up-to-date, ensuring documentation accurately reflects the evolving codebase. This project is ideal for software architects and development teams who need a maintainable, code-driven approach to designing and documenting complex system structures.","description":"Visualize, collaborate, and evolve the software architecture with always actual and live diagrams from your code","stars":3337,"language":"TypeScript"},{"owner":"mastra-ai","repo":"mastra","url":"https://github.com/mastra-ai/mastra","readme":"# Mastra\n\n[![npm version](https://badge.fury.io/js/@mastra%2Fcore.svg)](https://www.npmjs.com/package/@mastra/core)\n[![CodeQl](https://github.com/mastra-ai/mastra/actions/workflows/github-code-scanning/codeql/badge.svg)](https://github.com/mastra-ai/mastra/actions/workflows/github-code-scanning/codeql)\n[![GitHub Repo stars](https://img.shields.io/github/stars/mastra-ai/mastra)](https://github.com/mastra-ai/mastra/stargazers)\n[![Discord](https://img.shields.io/discord/1309558646228779139?logo=discord&label=Discord&labelColor=white&color=7289DA)](https://discord.gg/BTYqqHKUrf)\n[![Twitter Follow](https://img.shields.io/twitter/follow/mastra?style=social)](https://x.com/mastra)\n[![NPM Downloads](https://img.shields.io/npm/dm/%40mastra%252Fcore)](https://www.npmjs.com/package/@mastra/core)\n[![Static Badge](https://img.shields.io/badge/Y%20Combinator-W25-orange)](https://www.ycombinator.com/companies?batch=W25)\n\nMastra is a framework for building AI-powered applications and agents with a modern TypeScript stack.\n\nIt includes everything you need to go from early prototypes to production-ready applications. Mastra integrates with frontend and backend frameworks like React, Next.js, and Node, or you can deploy it anywhere as a standalone server. It's the easiest way to build, tune, and scale reliable AI products.\n\n## Why Mastra?\n\nPurpose-built for TypeScript and designed around established AI patterns, Mastra gives you everything you need to build great AI applications out-of-the-box.\n\nSome highlights include:\n\n- [**Model routing**](https://mastra.ai/models) - Connect to 40+ providers through one standard interface. Use models from OpenAI, Anthropic, Gemini, and more.\n\n- [**Agents**](https://mastra.ai/docs/agents/overview) - Build autonomous agents that use LLMs and tools to solve open-ended tasks. Agents reason about goals, decide which tools to use, and iterate internally until the model emits a final answer or an optional stopping condition is met.\n\n- [**Workflows**](https://mastra.ai/docs/workflows/overview) - When you need explicit control over execution, use Mastra's graph-based workflow engine to orchestrate complex multi-step processes. Mastra workflows use an intuitive syntax for control flow (`.then()`, `.branch()`, `.parallel()`).\n\n- [**Human-in-the-loop**](https://mastra.ai/docs/workflows/suspend-and-resume) - Suspend an agent or workflow and await user input or approval before resuming. Mastra uses [storage](https://mastra.ai/docs/server-db/storage) to remember execution state, so you can pause indefinitely and resume where you left off.\n\n- **Context management** - Give your agents the right context at the right time. Provide [conversation history](https://mastra.ai/docs/memory/conversation-history), [retrieve](https://mastra.ai/docs/rag/overview) data from your sources (APIs, databases, files), and add human-like [working](https://mastra.ai/docs/memory/working-memory) and [semantic](https://mastra.ai/docs/memory/semantic-recall) memory so your agents behave coherently.\n\n- **Integrations** - Bundle agents and workflows into existing React, Next.js, or Node.js apps, or ship them as standalone endpoints. When building UIs, integrate with agentic libraries like Vercel's AI SDK UI and CopilotKit to bring your AI assistant to life on the web.\n\n- [**MCP servers**](https://mastra.ai/docs/tools-mcp/mcp-overview) - Author Model Context Protocol servers, exposing agents, tools, and other structured resources via the MCP interface. These can then be accessed by any system or agent that supports the protocol.\n\n- **Production essentials** - Shipping reliable agents takes ongoing insight, evaluation, and iteration. With built-in [evals](https://mastra.ai/docs/evals/overview) and [observability](https://mastra.ai/docs/observability/overview), Mastra gives you the tools to observe, measure, and refine continuously.\n\n## Get started\n\nThe **recommended** way to get started with Mastra is by running the command below:\n\n```shell\nnpm create mastra@latest\n```\n\nFollow the [Installation guide](https://mastra.ai/docs/getting-started/installation) for step-by-step setup with the CLI or a manual install.\n\nIf you're new to AI agents, check out our [templates](https://mastra.ai/docs/getting-started/templates), [course](https://mastra.ai/course), and [YouTube videos](https://youtube.com/@mastra-ai) to start building with Mastra today.\n\n## Documentation\n\nVisit our [official documentation](https://mastra.ai/docs).\n\n## Build with AI\n\nLearn how to make your agent a Mastra expert by following the [Build with AI guide](https://mastra.ai/docs/getting-started/build-with-ai).\n\n## Contributing\n\nLooking to contribute? All types of help are appreciated, from coding to testing and feature specification. Read [CONTRIBUTING.md](./CONTRIBUTING.md) for more details on how to get involved.\n\nIf you are a developer and would like to contribute with code, please open an issue to discuss before opening a Pull Request.\n\nInformation about the project setup can be found in the [development documentation](./DEVELOPMENT.md)\n\n## Support\n\nWe have an [open community Discord](https://discord.gg/BTYqqHKUrf). Come and say hello and let us know if you have any questions or need any help getting things running.\n\nIt's also super helpful if you leave the project a star here, at the [top of the page](https://github.com/mastra-ai/mastra)\n\n## Licensing\n\nThis repository uses a dual-license model:\n\n- **Apache License 2.0** ŌĆö The core framework and the vast majority of this codebase is open source under Apache-2.0.\n- **Mastra Enterprise License** ŌĆö Code in any directory named `ee/` (e.g., `packages/core/src/auth/ee/`) is source-available under the Mastra Enterprise License. These features require a valid enterprise license for production use but can be freely used for development and testing.\n\nSee [LICENSE.md](./LICENSE.md) for the full license mapping and [ee/LICENSE](./ee/LICENSE) for the enterprise license terms.\n\n## Security\n\nWe are committed to maintaining the security of this repo and of Mastra as a whole. If you discover a security finding we ask you to please responsibly disclose this to us at [security@mastra.ai](mailto:security@mastra.ai) and we will get back to you.\n","summary":"Mastra is a comprehensive TypeScript framework designed to help developers build, scale, and maintain production-ready AI applications. It offers a robust set of features, including autonomous agent orchestration, graph-based workflows, integrated memory management, and support for over 40 AI model providers. By providing built-in observability, evaluation tools, and seamless integration with modern stacks like Next.js and Node.js, Mastra is ideal for developers looking to move quickly from early AI prototyping to reliable, production-grade agentic systems.","description":"From the team behind Gatsby, Mastra is a framework for building AI-powered applications and agents with a modern TypeScript stack.","stars":24675,"language":"TypeScript"},{"owner":"knadh","repo":"oat","url":"https://github.com/knadh/oat","readme":"# Oat UI\n\n> Semantic, minimal, zero dependencies. ~8KB CSS and JS.\n\nOat is an ultra-lightweight HTML + CSS, semantic UI component library with zero dependencies. No framework, build, or dev complexity. Just include the tiny CSS and JS files and you are good to go building decent looking web applications with most commonly needed components and elements.\n\nSemantic tags and attributes are styled contextually out of the box without classes, forcing best practices, and reducing markup class pollution. A few dynamic components are WebComponents and use minimal JavaScript.\n\nI wrote this to use in my own projects after getting sick of the ridiculous bloat, dependencies, and rug-pulls in Javascript UI/component libraries.\n\nSee live demo and docs at [**oat.ink**](https://oat.ink)\n\n**IMPORTANT:** The lib is currently sub v1 and is likely to have breaking changes until it hits v1.\n\n-------------\n\n<img width=\"739\" height=\"735\" alt=\"image\" src=\"https://github.com/user-attachments/assets/b0a2f55c-659d-4aab-922c-b13d89eeab36\" />\n","summary":"Oat is an ultra-lightweight, semantic UI component library that provides a clean, zero-dependency foundation for web development without the need for complex build tools or frameworks. By leveraging semantic HTML and contextual styling, the library minimizes markup bloat while offering essential interactive elements through minimal WebComponents. It is an ideal solution for developers who prioritize performance and simplicity, offering a streamlined alternative to heavy, dependency-laden UI libraries.","description":"Ultra-lightweight, zero dependency, semantic HTML, CSS, JS UI library. ~8KB min+gz.","stars":5257,"language":"CSS"},{"owner":"tinyfish-io","repo":"tinyfish-cookbook","url":"https://github.com/tinyfish-io/tinyfish-cookbook","readme":"# The TinyFish Cookbook\n\n<a href=\"https://agent.tinyfish.ai/\">\n  <img width=\"100%\" alt=\"Search and Fetch are now FREE\" src=\".github/assets/banner.png\" />\n</a>\n\n<div align=\"center\">\n\n[![Website](https://img.shields.io/badge/Website-141414?style=for-the-badge&logo=googlechrome&logoColor=white)](https://tinyfish.ai/)\n[![Docs](https://img.shields.io/badge/Docs-526CE5?style=for-the-badge&logo=readthedocs&logoColor=white)](https://docs.tinyfish.ai/)\n[![Discord](https://img.shields.io/badge/Discord-5865F2?style=for-the-badge&logo=discord&logoColor=white)](https://discord.gg/tinyfish)\n[![License](https://img.shields.io/badge/License-View-green?style=for-the-badge)](LICENSE)\n[![X](https://img.shields.io/badge/X-000000?style=for-the-badge&logo=x&logoColor=white)](https://x.com/Tiny_Fish)\n[![LinkedIn](https://img.shields.io/badge/LinkedIn-0A66C2?style=for-the-badge&logo=linkedin&logoColor=white)](https://www.linkedin.com/company/tinyfish-ai/)\n[![Threads](https://img.shields.io/badge/Threads-000000?style=for-the-badge&logo=threads&logoColor=white)](https://www.threads.com/@tinyfish_ai)\n[![Instagram](https://img.shields.io/badge/Instagram-E4405F?style=for-the-badge&logo=instagram&logoColor=white)](https://www.instagram.com/tinyfish_ai/)\n\n</div>\n\n---\n\n> **Search and Fetch are now FREE**\n>\n> TinyFish **Search** and **Fetch endpoints** are now free for everyone with generous rate limits, no credit card required. Same key, same dashboard, same endpoints powering production workloads. [Grab a key &rarr;](https://agent.tinyfish.ai/)\n\n---\n\n## About This Repository\n\nWelcome to the **TinyFish Cookbook!** A growing collection of recipes, demos, and automations built on TinyFish ŌĆö the web layer for AI agents.\n\nIf your agent needs to search the live web, read a page cleanly, run a multi-step browser flow, or hit any site that doesn't expose an API, this is where to start.\n\n## The Endpoints\n\nTinyFish gives you four endpoints, layered from lightning-fast retrieval to fully managed browser automation. **Search** and **Fetch** are free.\n\n| Endpoint | What it does | Best for | Speed | Pricing |\n|----------|-------------|----------|-------|---------|\n| **Search** &nbsp; `api.search.tinyfish.ai` | Fast, structured web search built for agents ŌĆö JSON results, rank-stable across calls. | Drop-in retrieval layer for any agent. Designed for LLM consumption, not blue-link browsing. | < 0.5s | **Free** |\n| **Fetch** &nbsp; `api.fetch.tinyfish.ai` | Any URL &rarr; clean markdown / JSON / HTML. Real full-browser rendering. Failed URLs are free. | Reading specific pages and feeding clean content to LLMs. Drop-in replacement for Firecrawl, native LLM fetch, or hand-rolled Playwright. | A few seconds | **Free** |\n| **Agent** | Provide a URL and a natural-language goal. The agent navigates, acts, and returns clean JSON. | Multi-step flows, complex tasks, structured data extraction. | ~10s to minutes | Metered |\n| **Browser** | Rent a fully managed cloud browser. Connect your own Playwright or Selenium scripts. | Hardcore custom agents and scripts. | Real-time | Metered |\n\n## Why TinyFish?\n\n- **Any website &rarr; API** ŌĆö turn sites without APIs into programmable data sources\n- **Natural-language goals** ŌĆö send a URL + plain English, get structured JSON back\n- **Real browser automation** ŌĆö multi-step flows, forms, filters, calendars, dynamic content\n- **Built-in stealth** ŌĆö rotating proxies and stealth profiles included, no extra cost\n- **Vault** ŌĆö agent-grade credentials and session memory for authenticated workflows (1Password JIT, encrypted session reuse)\n- **Production-grade observability** ŌĆö full logs and debugging on every run\n- **Token-efficient by design** ŌĆö Fetch strips nav, scripts, and cookie banners, so you stop paying tokens on junk HTML\n\n## Ways to use TinyFish\n\nOne API key. Use it from wherever you build.\n\n### REST API\n\n```bash\n# Search\ncurl \"https://api.search.tinyfish.ai?query=web+automation+tools\" \\\n  -H \"X-API-Key: $TINYFISH_API_KEY\"\n\n# Fetch\ncurl -X POST https://api.fetch.tinyfish.ai \\\n  -H \"X-API-Key: $TINYFISH_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"urls\": [\"https://www.tinyfish.ai/\"]}'\n\n# Agent (streaming)\ncurl -N -X POST https://agent.tinyfish.ai/v1/automation/run-sse \\\n  -H \"X-API-Key: $TINYFISH_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"url\": \"https://agentql.com\", \"goal\": \"Find all subscription plans and prices. Return JSON.\"}'\n```\n\n### MCP Server\n\nDrop the server URL into Claude Code, Cursor, Codex, ChatGPT desktop, or any MCP-aware client.\n\n```json\n{\n  \"mcpServers\": {\n    \"tinyfish\": { \"url\": \"https://mcp.tinyfish.ai\" }\n  }\n}\n```\n\n### CLI\n\n```bash\nnpm install -g @tiny-fish/cli\ntinyfish auth login\ntinyfish search query \"web automation tools\"\ntinyfish fetch content get https://example.com\n```\n\nThe CLI writes results to the filesystem instead of piping them through your model's context window ŌĆö tokens stay low, output stays structured.\n\n### Scripts\n\nDrop TinyFish into everyday tools with small copyable scripts.\n\n| Script | Description |\n|--------|-------------|\n| [Raycast TinyFish Search](./scripts/raycast-tinyfish-search) | Search the web from Raycast and get formatted result URLs, titles, and snippets |\n\n### Agent Skill\n\nOne-line install. Works with Claude Code, Codex, Cursor, OpenCode, Antigravity, and other coding agents. The Skill teaches your agent **when** to reach for Search vs. Fetch vs. Agent, and **how** to call them.\n\n```bash\nnpx skills add github.com/tinyfish-io/tinyfish-cookbook --skill use-tinyfish\n```\n\nBrowse it on [skills.sh/tinyfish-io/tinyfish-cookbook/use-tinyfish](https://skills.sh/tinyfish-io/tinyfish-cookbook/use-tinyfish).\n\n### SDKs\n\n```bash\npip install tinyfish              # Python\nnpm install @tiny-fish/sdk        # TypeScript\n```\n\nBoth SDKs cover Search, Fetch, Browser, Agent, and Vault ŌĆö full parity.\n\n### Where it's already wired up\n\nCheck out our [Integrations](https://www.tinyfish.ai/integrations)\n\n## The Recipes\n\nEach folder is a standalone project. Categorized below by what they do, not what's under the hood.\n\n### Featured (live demos)\n\nThese use the latest TinyFish SDK and are deployed with live demos you can try right now.\n\n| Recipe | Description | Live demo |\n|--------|-------------|-----------|\n| [viet-bike-scout](./viet-bike-scout) | Motorbike rental price comparison across Vietnamese cities using parallel browser agents | [Demo](https://cookbook-viet-bike-scout.vercel.app/) |\n| [tutor-finder](./tutor-finder) | AI-powered tutor discovery for competitive exams across multiple platforms | [Demo](https://cookbook-tutor-finder.vercel.app/) |\n| [openbox-deals](./openbox-deals) | Real-time open-box and refurbished deal aggregator across 8 retailers | [Demo](https://cookbook-openbox-deals.vercel.app/) |\n| [silicon-signal](./silicon-signal) | Semiconductor supply chain tracker for lifecycle, availability, and lead-time signals | [Demo](https://cookbook-silicon-signal.vercel.app/) |\n| [summer-school-finder](./summer-school-finder) | Discover and compare summer school programs from universities around the world | [Demo](https://cookbook-summer-school-finder.vercel.app/) |\n| [tinyskills](./tinyskills) | Multi-source AI skill guide generator that scrapes docs, GitHub, and blogs into a single SKILL.md | [Demo](https://cookbook-tinyskills.vercel.app/) |\n| [saigon-happy-hour-sniper](./saigon-happy-hour-sniper) | Find happy hour deals across Saigon in seconds | [Demo](https://saigon-happy-hour-sniper.vercel.app/) |\n\n### Shopping & Deals\n\n| Recipe | Description |\n|--------|-------------|\n| [bestbet](./bestbet) | Sports betting odds comparison across books |\n| [game-buying-guide](./game-buying-guide) | Video game pricing across 10 gaming platforms in parallel |\n| [lego-hunter](./lego-hunter) | Rare Lego inventory across 15+ retailers with price and availability analysis |\n| [openbox-deals](./openbox-deals) | Real-time open-box and refurbished deal aggregator |\n| [waifu-deal-sniper](./waifu-deal-sniper) | Discord bot for anime figure collectors hunting AmiAmi, Mercari, Solaris Japan |\n| [wing-command](./wing-command) | Chicken wing tracker ŌĆö find the best wings near you by flavor preference |\n\n### Travel, Stays & Local\n\n| Recipe | Description |\n|--------|-------------|\n| [stay-scout-hub](./stay-scout-hub) | Cross-site lodging search for conventions and events |\n| [viet-bike-scout](./viet-bike-scout) | Motorbike rental price comparison across Vietnamese cities |\n| [district-rent-shark](./district-rent-shark) | Vietnamese rental market intelligence + neighborhood walkability scores |\n| [restaurant-comparison-tool](./restaurant-comparison-tool) | Pre-visit restaurant safety + allergen intelligence from Google Maps |\n| [saigon-happy-hour-sniper](./saigon-happy-hour-sniper) | Live happy hour deal aggregator for Saigon |\n\n### Research & Market Intelligence\n\n| Recipe | Description |\n|--------|-------------|\n| [research-sentry](./research-sentry) | Voice-first academic research co-pilot scanning ArXiv, PubMed, and more |\n| [silicon-signal](./silicon-signal) | Semiconductor supply chain & lead-time signals |\n| [competitor-analysis](./competitor-analysis) | Live competitive pricing intelligence dashboard |\n| [competitor-scout-cli](./competitor-scout-cli) | Natural-language CLI for researching competitor feature decisions |\n| [logistics-sentry](./logistics-sentry) | Port congestion and carrier-risk tracking |\n| [tenders-finder](./tenders-finder) | Singapore government tender discovery across multiple portals |\n\n### Education & Discovery\n\n| Recipe | Description |\n|--------|-------------|\n| [tutor-finder](./tutor-finder) | AI-powered tutor discovery for competitive exams |\n| [summer-school-finder](./summer-school-finder) | Compare summer school programs from universities worldwide |\n| [scholarship-finder](./scholarship-finder) | Scholarship discovery pulling live data from official sources |\n\n### Developer Tools\n\n| Recipe | Description |\n|--------|-------------|\n| [code-reference-finder](./code-reference-finder) | Find real-world usage examples for any code snippet from GitHub and Stack Overflow |\n| [fast-qa](./fast-qa) | No-code QA testing platform with parallel test execution and live browser previews |\n| [tinyskills](./tinyskills) | Generates comprehensive SKILL.md guides from docs, GitHub, and developer blogs |\n\n### Finance & Decisioning\n\n| Recipe | Description |\n|--------|-------------|\n| [loan-decision-copilot](./loan-decision-copilot) | Loan comparison across banks and regions |\n\n### Lifestyle & Health\n\n| Recipe | Description |\n|--------|-------------|\n| [anime-watch-hub](./anime-watch-hub) | Find sites to read or watch your favorite manga and anime |\n| [pharmacy-panic](./pharmacy-panic) | Compare medicine prices across Vietnam's top pharmacy chains in real time |\n\n> New recipes land weekly. See [CONTRIBUTING.md](CONTRIBUTING.md) to add yours.\n\n### n8n Workflows\n\nPre-built n8n workflows using TinyFish ŌĆö import the JSON and go.\n\n| Workflow | Description |\n|----------|-------------|\n| [Competitor Scout](./N8N_WorkFlows/Competitor%20Scout%20CLI) | Research competitor feature decisions with OpenAI planning + TinyFish evidence collection |\n| [Web Research Agent](./N8N_WorkFlows/Web%20Research%20Agent) | Chatbot that scrapes any website with TinyFish and saves summaries to Notion |\n| [Daily Product Hunt Tracker](./N8N_WorkFlows/Daily%20Product%20Hunt%20Tracker) | Scheduled workflow delivering daily top 5 trending Product Hunt products to Telegram |\n\n## Getting Started\n\n### 1. Get your API key\n\nSign up at [agent.tinyfish.ai](https://agent.tinyfish.ai/). No credit card. Search and Fetch are free out of the box.\n\n### 2. Run something\n\n#### cURL\n\n```bash\ncurl -N -X POST https://agent.tinyfish.ai/v1/automation/run-sse \\\n  -H \"X-API-Key: $TINYFISH_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"url\": \"https://agentql.com\",\n    \"goal\": \"Find all AgentQL subscription plans and their prices. Return result in json format\"\n  }'\n```\n\n#### Python\n\n```python\nimport json, os, requests\n\nresponse = requests.post(\n    \"https://agent.tinyfish.ai/v1/automation/run-sse\",\n    headers={\n        \"X-API-Key\": os.getenv(\"TINYFISH_API_KEY\"),\n        \"Content-Type\": \"application/json\",\n    },\n    json={\n        \"url\": \"https://agentql.com\",\n        \"goal\": \"Find all AgentQL subscription plans and their prices. Return result in json format\",\n    },\n    stream=True,\n)\n\nfor line in response.iter_lines():\n    if line:\n        line_str = line.decode(\"utf-8\")\n        if line_str.startswith(\"data: \"):\n            event = json.loads(line_str[6:])\n            print(event)\n```\n\n#### TypeScript\n\n```typescript\nconst response = await fetch(\"https://agent.tinyfish.ai/v1/automation/run-sse\", {\n  method: \"POST\",\n  headers: {\n    \"X-API-Key\": process.env.TINYFISH_API_KEY,\n    \"Content-Type\": \"application/json\",\n  },\n  body: JSON.stringify({\n    url: \"https://agentql.com\",\n    goal: \"Find all AgentQL subscription plans and their prices. Return result in json format\",\n  }),\n});\n\nconst reader = response.body.getReader();\nconst decoder = new TextDecoder();\n\nwhile (true) {\n  const { done, value } = await reader.read();\n  if (done) break;\n  console.log(decoder.decode(value));\n}\n```\n\n> Sharing a localhost demo with a friend? Use [tinyfi.sh](https://tinyfi.sh/) ŌĆö free and dead simple.\n\n## Star History\n\n<p align=\"center\">\n  <a href=\"https://www.star-history.com/#tinyfish-io/tinyfish-cookbook&type=date\">\n    <img src=\"https://api.star-history.com/svg?repos=tinyfish-io/tinyfish-cookbook&type=date&legend=top-left\" alt=\"Star History Chart\">\n  </a>\n</p>\n\n## Contributors\n\n<a href=\"https://github.com/tinyfish-io/tinyfish-cookbook/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=tinyfish-io/tinyfish-cookbook\" />\n</a>\n\nGot something cool you built with TinyFish? We want it in here. See the [Contributing Guide](CONTRIBUTING.md) for the full rundown.\n\n## Community & Support\n\n- [Discord](https://discord.gg/tinyfish) ŌĆö ask questions, share what you're building, hang out\n- [Docs](https://docs.tinyfish.ai/)\n- [tinyfish.ai](https://tinyfish.ai/)\n\n## Legal Disclaimer\n\nThis repository is a community-driven space for sharing derivatives, code samples, and best practices related to TinyFish products. By using the materials in this repository, you acknowledge and agree to the following:\n\n- **\"As-Is\" Basis**: All code, scripts, and documentation shared here are provided \"AS IS\" and \"AS AVAILABLE.\" TinyFish makes no warranties of any kind, whether express or implied, regarding the accuracy, reliability, or security of community-contributed content.\n- **No Obligation to Maintain**: TinyFish is under no obligation to monitor, update, or fix bugs, errors, or security vulnerabilities found in community-contributed derivatives.\n- **User Responsibility**: You are solely responsible for vetting and testing any code before implementing it in a production environment. Use of these derivatives is at your own risk.\n- **Limitation of Liability**: In no event shall TinyFish be held liable for any claim, damages, or other liability ŌĆö including but not limited to system failures, data loss, or security breaches ŌĆö arising from the use of or inability to use the contents of this repository.\n\n> Note: Contributions from the community do not represent the official views or supported products of TinyFish.\n\n---\n\n<img src=\"https://github.com/user-attachments/assets/2cf004f0-0065-4f21-9835-12ac693964f1\" width=\"100%\" />\n","summary":"The TinyFish Cookbook serves as a comprehensive resource for integrating the TinyFish platform, which functions as a web connectivity layer specifically designed for AI agents. The repository provides practical demos and implementation examples for leveraging endpoints that range from high-speed web searching and URL parsing to advanced, multi-step browser automation. Developers and AI engineers will find this collection particularly valuable for turning websites without public APIs into structured, programmable data sources that are optimized for LLM consumption.","description":"A collection of sample apps and recipes built with the TinyFish web agent. Open-source examples for you to learn & build!","stars":2003,"language":"TypeScript"},{"owner":"dabit3","repo":"skill-audit","url":"https://github.com/dabit3/skill-audit","readme":"# skill-audit\n\nAudit agent skill definitions for security, completeness, and compatibility across different formats.\n\nAs AI agent skills become portable across platforms (Codex, Claude Code, OpenClaw, OpenCode), ensuring they're secure and well-documented is critical. skill-audit analyzes skill definitions to catch dangerous patterns before they cause problems.\n\n## Installation\n\n```bash\nnpm install -g skill-audit\n```\n\nOr run directly with npx:\n\n```bash\nnpx skill-audit scan ./my-skills\n```\n\n## Quick Start\n\nScan a directory for skills and audit them:\n\n```bash\nskill-audit scan ./skills\n```\n\nAudit a single skill:\n\n```bash\nskill-audit check ./my-skill/SKILL.md\n```\n\nList discovered skills without auditing:\n\n```bash\nskill-audit list ./\n```\n\n## What It Detects\n\n### Security Issues\n\n**Critical**\n- Remote code execution (eval, curl | sh)\n- Access to sensitive files (/etc/passwd, .ssh, .env)\n- Fork bombs and dangerous shell patterns\n- Direct writes to block devices\n\n**High**\n- Process spawning (child_process, spawn, exec)\n- sudo usage requiring elevated privileges\n- Hardcoded API key references\n- Remote shell script downloads\n\n**Medium**\n- File write operations without path validation\n- Network downloads (wget, curl)\n- Permissive chmod operations\n- Unpinned credentials in definitions\n\n**Low**\n- Potential sensitive data logging\n- Missing error handling in scripts\n\n### Quality Checks\n\n- Missing description section\n- No usage examples\n- Missing usage instructions\n- Excessive line length\n- Broken anchor links\n- Unpinned dependencies\n- Missing shell error handling (set -e)\n- No input validation\n\n## Supported Formats\n\nskill-audit automatically detects and handles:\n\n- **OpenClaw** - SKILL.md files\n- **Codex** - skill.yaml and manifest.json\n- **Claude Code** - .claude/commands/*.md\n- **OpenCode** - opencode.json configuration\n\n## Commands\n\n### scan\n\nRecursively scan a directory for skills and audit all found:\n\n```bash\nskill-audit scan [path] [options]\n\nOptions:\n  -v, --verbose         Show detailed output including quality suggestions\n  -j, --json            Output results as JSON\n  --min-score <score>   Exit with error if any skill scores below threshold\n  --no-summary          Skip the summary section\n```\n\n### check\n\nAudit a single skill file or directory:\n\n```bash\nskill-audit check <path> [options]\n\nOptions:\n  -v, --verbose    Show detailed output\n  -j, --json       Output as JSON\n```\n\nExits with code 1 if critical or high severity issues are found.\n\n### list\n\nDiscover skills in a directory without running audits:\n\n```bash\nskill-audit list [path] [options]\n\nOptions:\n  -j, --json    Output as JSON\n```\n\n## Scoring\n\nEach skill receives three scores:\n\n- **Security Score** (0-100): Starts at 100, deducted for each finding based on severity\n- **Quality Score** (0-100): Based on documentation completeness and best practices\n- **Overall Score**: Weighted average (60% security, 40% quality)\n\nLetter grades:\n- A: 90-100\n- B: 80-89\n- C: 70-79\n- D: 60-69\n- F: Below 60\n\n## CI Integration\n\nUse skill-audit in CI to enforce minimum standards:\n\n```yaml\n# GitHub Actions example\n- name: Audit skills\n  run: npx skill-audit scan ./skills --min-score 70\n```\n\n```bash\n# Pre-commit hook\nskill-audit check ./my-skill --min-score 80 || exit 1\n```\n\n## Programmatic Usage\n\n```typescript\nimport { auditPath, summarize } from 'skill-audit';\n\nconst results = await auditPath('./skills');\nconst summary = summarize(results);\n\nconsole.log(`Audited ${summary.totalSkills} skills`);\nconsole.log(`Average score: ${summary.averageScore}`);\nconsole.log(`Critical issues: ${summary.criticalCount}`);\n```\n\n## Examples\n\nAudit the OpenClaw skills directory:\n\n```bash\nskill-audit scan ~/.npm-global/lib/node_modules/openclaw/skills -v\n```\n\nCheck a specific skill with JSON output:\n\n```bash\nskill-audit check ./skills/my-tool/SKILL.md --json\n```\n\nFind all skills in a monorepo:\n\n```bash\nskill-audit list ./packages --json | jq '.[] | .name'\n```\n\nFail CI if any critical issues:\n\n```bash\nskill-audit scan . --min-score 60\n```\n\n## Why This Exists\n\nAgent skills are becoming the standard way to package reusable AI capabilities. With repos like openai/skills providing skill catalogs and tools like compound-engineering-plugin enabling cross-platform skill sharing, security and quality become paramount.\n\nskill-audit provides:\n- Early detection of dangerous patterns before production\n- Consistent quality standards across skill libraries\n- CI-friendly validation for skill repositories\n- Cross-format compatibility analysis\n\n## License\n\nMIT\n","summary":"Skill-audit is a command-line tool designed to evaluate AI agent skill definitions for security vulnerabilities, completeness, and best practices. It supports multiple portable formats, including OpenClaw, Codex, Claude Code, and OpenCode, by scanning files for dangerous shell patterns, sensitive file access, and documentation gaps. The tool provides actionable security and quality scores, making it an essential utility for developers and security engineers looking to enforce rigorous standards in automated AI environments through CI/CD integration.","description":"Audit agent skill definitions for security, completeness, and compatibility across Codex, Claude Code, OpenClaw, and more","stars":43,"language":"TypeScript"},{"owner":"alexzhang13","repo":"rlm","url":"https://github.com/alexzhang13/rlm","readme":"\n---\n\n<h1 align=\"center\" style=\"font-size:2.8em\">\n<span>Recursive Language Models (<span style=\"color:orange\">RLM</span>s)</span>\n</h1>\n\n<p align=\"center\" style=\"font-size:1.3em\">\n  <a href=\"https://arxiv.org/abs/2512.24601\">Full Paper</a> ŌĆó\n  <a href=\"https://alexzhang13.github.io/blog/2025/rlm/\">Blogpost</a> ŌĆó\n  <a href=\"https://alexzhang13.github.io/rlm/\">Documentation</a> ŌĆó\n  <a href=\"https://github.com/alexzhang13/rlm-minimal\">RLM Minimal</a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/alexzhang13/rlm/actions/workflows/style.yml\">\n    <img src=\"https://github.com/alexzhang13/rlm/actions/workflows/style.yml/badge.svg\" alt=\"Style\" />\n  </a>\n  <a href=\"https://github.com/alexzhang13/rlm/actions/workflows/test.yml\">\n    <img src=\"https://github.com/alexzhang13/rlm/actions/workflows/test.yml/badge.svg\" alt=\"Test\" />\n  </a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://arxiv.org/abs/2512.24601\">\n    <img src=\"media/paper_preview.png\" alt=\"Paper Preview\" width=\"300\"/>\n  </a>\n</p>\n\n## Overview\nRecursive Language Models (RLMs) are a task-agnostic inference paradigm for language models (LMs) to handle near-infinite length contexts by enabling the LM to *programmatically* examine, decompose, and recursively call itself over its input. RLMs replace the canonical `llm.completion(prompt, model)` call with a `rlm.completion(prompt, model)` call, acting as a \"language model\". RLMs offload the context as a variable in a REPL environment that the LM can interact with and launch sub-LM calls inside of.\n\nRLMs are a bet on future \"language model\" design choices. We argue for a [CodeAct](https://arxiv.org/abs/2402.01030)-style harness (i.e. all language models should have access to a code environment) with sub-(R)LM calls as functions in code, and context / prompts as objects in code. RLMs explicitly defer code execution with sub-calls as functions to the language model itself, which is incredibly flexible and lends itself well to scale if trained correctly. We want to move away from the JSON tool-calling standard for both sub-agents and generic tool calls. The naming comes from the fact that such a system is itself a \"language model\" (a probabilistic mapping from text to text) that builds around and relies on recursive sub-LLM calls.\n\nThis repository provides both an extensible inference engine and training environment for using RLMs around standard API-based and local LLMs. The initial experiments and idea were proposed in a [blogpost](https://alexzhang13.github.io/blog/2025/rlm/) in 2025, with expanded results in an [arXiv preprint](https://arxiv.org/abs/2512.24601).\n\nWe now also include a [verifiers](https://github.com/PrimeIntellect-ai/verifiers) training environment based on Prime Intellect's [prime-rl](https://github.com/PrimeIntellect-ai/prime-rl) in the `training/` folder. Train your own RLMs, which directly can be plugged into our inference engine!\n\n> [!NOTE]\n> This repository contains inference code for RLMs with support for various sandbox environments. Open-source contributions are welcome. This repository is maintained by the authors of the paper from the MIT OASYS lab.\n\n## Quick Setup\n> [!NOTE]\n> `rlms` requires **Python 3.11 or later**.\n\nYou can try out RLMs quickly by installing from PyPi:\n```bash\npip install rlms\n```\n\nThe default RLM client uses a REPL environment that runs on the host process through Python `exec` calls. It uses the same virtual environment as the host process (i.e. it will have access to the same dependencies), but with some limitations in its available global modules. As an example, we can call RLM completions using GPT-5-nano:\n```python\nfrom rlm import RLM\n\nrlm = RLM(\n    backend=\"openai\",\n    backend_kwargs={\"model_name\": \"gpt-5-nano\"},\n    verbose=True,  # For printing to console with rich, disabled by default.\n)\n\nprint(rlm.completion(\"Print me the first 100 powers of two, each on a newline.\").response)\n```\n\n<details>\n<summary><b>Manual Setup</b></summary>\n\nSet up the dependencies with `uv` (or your virtual environment of choice):\n```bash\ncurl -LsSf https://astral.sh/uv/install.sh | sh\nuv init && uv venv --python 3.12  # change version as needed\nuv pip install -e .\n```\n\nThis project includes a `Makefile` to simplify common tasks.\n\
