ĆŌĢ»Ō¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢ł┬Ę┬ĘŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢ł┬Ę┬ĘŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢ł┬Ę┬ĘŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢ł┬Ę┬ĘŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢ł┬Ę\n      Ōöé Ō¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢ł  Ō¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢ł  Ō¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢ł  Ō¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢ł  Ō¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢ł  Ō¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢ł\n      Ōöé Ō¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢ł  Ō¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢ł  Ō¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢ł  Ō¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢ł  Ō¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢ł  Ō¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢ł\n  4000Ōö╝┬ĘŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢ł┬Ę┬ĘŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢ł┬Ę┬ĘŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢ł┬Ę┬ĘŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢ł┬Ę┬ĘŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢ł┬Ę┬ĘŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢łŌ¢ł┬Ę\n      Ōö╝ŌöĆŌöĆŌöĆŌöĆŌöĆŌö¼ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌö¼ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌö¼ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌö¼ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌö¼ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌö¼ŌöĆŌöĆŌöĆŌöĆ\n           jan       feb       mar       apr       may       jun\n```\n</details>\n\n```\nxychart-beta\n    title \"Sales Revenue\"\n    x-axis [jan, feb, mar, apr, may, jun]\n    y-axis \"Revenue (in $)\" 4000 --> 11000\n    bar [5000, 6000, 7500, 8200, 9800, 10500]\n    line [5000, 6000, 7500, 8200, 9800, 10500]\n```\n\n### Parser Limitations\n\nThe parser handles standard Mermaid syntax for supported diagram types. The following features are **not supported**:\n\n- HTML in node labels\n- Click callbacks and links\n- Tooltips\n- FontAwesome icons\n- Multiline labels with `<br>` tags\n- Styling via `style` and `linkStyle` directives (partial support)\n- Subgraph styling\n\nIf your diagram uses these features, they will be silently ignored or may cause unexpected output.\n\n## Configuration\n\n### Render Options\n\n```swift\nlet image = try MermaidRenderer.renderImage(\n    source: code,\n    theme: .tokyoNight,\n    scale: 2.0                // Retina scale (default: 2.0)\n)\n```\n\n### Layout Configuration\n\n```swift\nlet config = LayoutConfig(\n    padding: 20,\n    nodeSpacing: 40,\n    layerSpacing: 60,\n    componentSpacing: 40\n)\n\nlet renderer = MermaidImageRenderer()\nrenderer.layoutConfig = config\n```\n\n### Layout Directions\n\nSpecify direction in your Mermaid code:\n\n- `graph TD` or `graph TB` ŌĆö Top to bottom (default)\n- `graph BT` ŌĆö Bottom to top\n- `graph LR` ŌĆö Left to right\n- `graph RL` ŌĆö Right to left\n\n## Requirements\n\n- Swift 5.9+\n- iOS 15+ / macOS 12+ / Mac Catalyst 15+ / visionOS 1.0+\n\n## License\n\nMIT License ŌĆö see [LICENSE](LICENSE) for details.\n\n## Acknowledgments\n\n- [beautiful-mermaid](https://github.com/lukilabs/beautiful-mermaid) ŌĆö Original TypeScript implementation by Craft\n- [elk-swift](https://github.com/lukilabs/elk-swift) ŌĆö ELK layout engine, Swift port of Eclipse Layout Kernel\n- [Mermaid](https://mermaid.js.org/) ŌĆö Diagramming syntax specification\n","summary":"BeautifulMermaid is a native Swift library that enables the parsing and rendering of Mermaid diagrams directly within Apple applications without requiring WebViews or JavaScript. It supports six diagram types and offers highly customizable output formats, including native images, SVGs, and ASCII art, all powered by the Eclipse Layout Kernel (ELK). With built-in SwiftUI integration and extensive theming options, this tool is ideal for developers looking to incorporate high-quality, programmatic visualizations into their iOS, macOS, or visionOS projects.","description":"Native Mermaid diagram renderer for Swift","stars":326,"language":"Swift"},{"owner":"AMAP-ML","repo":"Code2World","url":"https://github.com/AMAP-ML/Code2World","readme":"# <img src=\"figure/logo.png\" alt=\"icon\" width=\"50\" height=\"50\"> Code2World: A GUI World Model via Renderable Code Generation\n<p align=\"center\">\n<a href=\"https://amap-ml.github.io/Code2World\" target=\"_blank\"><img src=\"https://img.shields.io/badge/Project-Page-brightgreen\"></a>\n<a href=\"https://arxiv.org/abs/2602.09856\" target=\"_blank\"><img src=\"https://img.shields.io/badge/arXiv-2602.09856-red\"></a>\n<a href=\"https://huggingface.co/datasets/GD-ML/AndroidCode\" target=\"_blank\"><img src=\"https://img.shields.io/badge/­¤żŚ%20Dataset-AndroidCode-ffd21e\"></a>\n<a href=\"https://huggingface.co/GD-ML/Code2World\" target=\"_blank\"><img src=\"https://img.shields.io/badge/­¤żŚ%20Model-Code2World(8B)-ffd21e\"></a>\n</p>\n<!-- This is the official repo for Code2World, a novel VLM-based GUI World Model that predicts dynamic transitions via renderable code generation. -->\n\n­¤ō¢ **TL;DR:** Coder with Next-State Rendering as GUI World Model.\n\n\n## ­¤Ä» Overview\nAutonomous GUI agents interact with environments by perceiving interfaces and executing actions.As a virtual sandbox, GUI World model empowers agents with human-like foresight by enabling action-conditioned prediction.However, existing text- and pixel- based approaches struggle to simultaneously achieve high visual fidelity and fine-grained structural controllability.To this end, we propose **Code2World**, a vision-language coder that simulates next visual state via **renderable code generation**. Especially, to address the data scarcity problem, we construct **AndroidCode** by translating GUI trajectories into high-fidelity HTML and refining synthesized code through a visual-feedback revision loop, resulting in **over 80K** high-quality screen-action pairs. To adapt existing VLMs into code prediction, we first perform SFT as a cold start for format layout following, then further apply **Render-Aware Reinforcement Learning** which uses the final rendered outcome by enforcing visual semantic fidelity and action consistency. Extensive experiments demonstrate that Code2World-8B achieves the top-performing next UI prediction, rivaling the competitive GPT-5 and Gemini-3-Pro-Image. Notably, _Code2World significantly enhances downstream navigation success rates in a flexible manner_, boosting Gemini-2.5-Flash by **+9.5%** on AndroidWorld navigation.\n<!-- ![pipeline](figure/pipeline.jpg) -->\n![teaser](figure/teaser.png)\n_Figure 1. Illustration of Code2World. Given a current GUI observation and an action, Code2World predicts the next screenshot via renderable code generation._\n\n\n## ­¤Ģ╣’ĖÅ Usage\n### Environment Setup\n1. We recommend setting up a clean Python environment:\n```bash\nconda create -n c2w python=3.10 -y\nconda activate c2w\ncd Code2World\npip install -r requirements.txt\n```\n2. Set up the Android emulator environment by referring to the [Android World](https://github.com/google-research/android_world/tree/main) configuration.\n3. Configure the OPENAI_API_KEY in the environment variables.\n4. Download the pretrained Code2World weights from Hugging Face, and set the path at line 38 in android_world/agents/m3a_qwen.py.\n```python\nmodel_name=\"ckpt/Code2World\"\n```\n\n\n### Use Code2World for Enhancing GUI Agent\nTo test AndroidWorld, you can run the following command:\n```python\npython -u run.py --agent_name='m3a_gemini25f_Code2World'  --console_port=5556 --grpc_port=8554  --checkpoint_dir='ckpt/m3a_gemini25f_Code2World' \n```\n\n\n## ­¤Åģ Experiments\nTable 1. **Quantitative Comparison** of various image and  code generation models on Android Control **(ID)** to assess basic capabilities on the same device, and GUI Odyssey **(OOD)** to test generalization robustness across unseen devices and cross-app scenarios. The best scores are in **bold** while the second best are in <ins>underlined</ins>.\n![Tab1](figure/Tab1.png)\n\n\n\n## ­¤ōī Examples\nHere are more qualitative comparison of next GUI state generation over Code2World and three baselines.\n![case1](figure/case1.png)\n_Figure 2. Launch the email application from the home screen to access the inbox._ \n![case2](figure/case2.png)\\\n_Figure 3. Click on \"All News\" button in the Cerebra Research application to view news content._ \n![case3](figure/case3.png)\n_Figure 4. Mark a reminder task as completed by tapping the \"Complete\" button in the Reminder app._ \n![case4](figure/case4.png)\n_Figure 5. Apply product filters by tapping the \"Apply Filter\" button in the e-commerce app to refresh the item list._\n\n\n## ­¤ōæ Citation\nIf you find our project useful, we hope you can star our repo and cite our paper as follows:\n```\n@article{zheng2026code2world,\n  title={Code2World: A GUI World Model via Renderable Code Generation},\n  author={Zheng, Yuhao and Zhong, Li'an and Wang, Yi and Dai, Rui and Liu, Kaikui and Chu, Xiangxiang and Lv, Linyuan and Torr, Philip and Lin, Kevin Qinghong},\n  journal={arXiv preprint arXiv:2602.09856},\n  year={2026}\n}\n```\n\n","summary":"Code2World is a vision-language model designed to serve as a GUI world model by predicting the next visual state of an interface through the generation of renderable code. By utilizing the AndroidCode dataset and render-aware reinforcement learning, the system provides high-fidelity, structurally accurate interface previews that overcome the limitations of traditional text- or pixel-based approaches. This project is particularly beneficial for researchers and developers building autonomous GUI agents, as it significantly improves navigation success rates by granting models human-like foresight.","description":"Code2World: A GUI World Model via Renderable Code Generation","stars":321,"language":"Python"},{"owner":"stepfun-ai","repo":"Step-3.5-Flash","url":"https://github.com/stepfun-ai/Step-3.5-Flash","readme":"<!-- ---\nlicense: apache-2.0\nbase_model:\n  - stepfun-ai/step-3.5-flash\n--- -->\n\n<div align=\"center\"> \n  <h1 style=\"margin: 0; border-bottom: none;\"> <img src=\"assets/stepfun-1.png\" width=\"25\" style=\"margin-right: 10px;\"/>  Step 3.5 Flash</h1>\n</div>\n\n<p align=\"center\">\n    <strong>English</strong>&nbsp; | &nbsp;<a href=\"README.zh-CN.md\">ń«ĆõĮōõĖŁµ¢ć</a>\n</p>\n\n\n<p align=\"center\">\n    <a href=\"./cookbooks/openclaw\">OpenClaw Guide</a>&nbsp; | &nbsp;<a href=\"./cookbooks/claude-code-best-practices/README.en.md\">Claude Code Guide</a>&nbsp; | &nbsp;<a href=\"./cookbooks/roo-code-integration-guide\">Roo Code Guide</a>&nbsp; | &nbsp;<a href=\"./cookbooks/hybrid-local-agent-macos\">Local Agent Guide</a>\n</p>\n\n\n\n[![Hugging Face](https://img.shields.io/badge/%F0%9F%A4%97%20HF-StepFun/STEP3p5-preview)](https://huggingface.co/stepfun-ai/Step-3.5-Flash/tree/main)\n[![ModelScope](https://img.shields.io/badge/ModelScope-StepFun/STEP3p5-preview)](https://modelscope.cn/models/stepfun-ai/Step-3.5-Flash)\n[![Discord](https://img.shields.io/badge/Discord-Join-5865F2?logo=discord&logoColor=white)](https://discord.gg/RcMJhNVAQc)\n[![Paper](https://img.shields.io/badge/Paper-Arxiv-red)](https://arxiv.org/pdf/2602.10604)\n[![Webpage](https://img.shields.io/badge/Webpage-Blog-blue)](https://static.stepfun.com/blog/step-3.5-flash/)\n[![License](https://img.shields.io/badge/License-Apache%202.0-green)]()\n[![Chat with the model on OpenRouter](https://img.shields.io/badge/Chat%20with%20the%20model-OpenRouter-5B3DF5?logo=chatbot&logoColor=white)](https://openrouter.ai/chat?models=stepfun/step-3.5-flash:free)\n[![Chat with the model on HuggingfaceSpace](https://img.shields.io/badge/Chat%20with%20the%20model-HuggingfaceSpace-5B3DF5?logo=chatbot&logoColor=white)](https://huggingface.co/spaces/stepfun-ai/Step-3.5-Flash)\n[![OpenClaw Integration](https://img.shields.io/badge/Agent-OpenClaw-purple?logo=robot&logoColor=white)](./cookbooks/openclaw)\n\n</div>\n\n## 1. Introduction \n\n**Step 3.5 Flash** ([visit website](https://static.stepfun.com/blog/step-3.5-flash/)) is our most capable open-source foundation model, engineered to deliver frontier reasoning and agentic capabilities with exceptional efficiency. Built on a sparse Mixture of Experts (MoE) architecture, it selectively activates only 11B of its 196B parameters per token. This \"intelligence density\" allows it to rival the reasoning depth of top-tier proprietary models, while maintaining the agility required for real-time interaction.\n\n### Contents\n- [Key Capabilities](#2-key-capabilities)\n- [Performance](#3-performance)\n- [Architecture Details](#4-architecture-details)\n- [Quick Start](#5-quick-start)\n- [Local Deployment](#6-local-deployment)\n- [Using Step 3.5 Flash on Agent Platforms](#7-using-step-35-flash-on-agent-platforms)\n- [Cookbooks](#8-cookbooks)\n- [Known Issues and Future Directions](#9-known-issues-and-future-directions)\n- [Co-Developing the Future](#10-co-developing-the-future)\n- [License](#license)\n\n## 2. Key Capabilities\n\n- **Deep Reasoning at Speed**: While chatbots are built for reading, agents must reason fast. Powered by 3-way Multi-Token Prediction (MTP-3), Step 3.5 Flash achieves a generation throughput of **100ŌĆō300 tok/s** in typical usage (peaking at **350 tok/s** for single-stream coding tasks). This allows for complex, multi-step reasoning chains with immediate responsiveness.\n\n- **A Robust Engine for Coding & Agents**: Step 3.5 Flash is purpose-built for agentic tasks, integrating a scalable RL framework that drives consistent self-improvement. It achieves **74.4% on SWE-bench Verified** and **51.0% on Terminal-Bench 2.0**, proving its ability to handle sophisticated, long-horizon tasks with unwavering stability.\n\n- **Efficient Long Context**: The model supports a cost-efficient **256K context window** by employing a 3:1 Sliding Window Attention (SWA) ratioŌĆöintegrating three SWA layers for every full-attention layer. This hybrid approach ensures consistent performance across massive datasets or long codebases while significantly reducing the computational overhead typical of standard long-context models.\n\n- **Accessible Local Deployment**: Optimized for accessibility, Step 3.5 Flash brings elite-level intelligence to local environments. It runs securely on high-end consumer hardware (e.g., Mac Studio M4 Max, NVIDIA DGX Spark), ensuring data privacy without sacrificing performance.\n\n## 3. Performance\n\nStep 3.5 Flash delivers performance parity with leading closed-source systems while remaining open and efficient.\n\n![](assets/step-bar-chart.png)\n\nPerformance of Step 3.5 Flash measured across **Reasoning**, **Coding**, and **Agentic Capabilities**. Open-source models (left) are sorted by their total parameter count, while top-tier proprietary models are shown on the right. xbench-DeepSearch scores are sourced from [official publications](https://xbench.org/agi/aisearch) for consistency. The shadowed bars represent the enhanced performance of Step 3.5 Flash using [Parallel Thinking](https://arxiv.org/pdf/2601.05593).\n\n### Detailed Benchmarks\n\n| Benchmark | Step 3.5 Flash | DeepSeek V3.2 | Kimi K2 Thinking / K2.5 | GLM-4.7 | MiniMax M2.1 | MiMo-V2 Flash |\n| --- | --- | --- | --- | --- | --- | --- |\n| # Activated Params | 11B | 37B | 32B | 32B | 10B | 15B |\n| # Total Params (MoE) | 196B | 671B | 1T | 355B | 230B | 309B |\n| Est. decoding cost @ 128K context, Hopper GPU** | **1.0x**<br>100 tok/s, MTP-3, EP8 | **6.0x**<br>33 tok/s, MTP-1, EP32 | **18.9x**<br>33 tok/s, no MTP, EP32 | **18.9x**<br>100 tok/s, MTP-3, EP8 | **3.9x**<br>100 tok/s, MTP-3, EP8 | **1.2x**<br>100 tok/s, MTP-3, EP8 |\n| | | | **Agent** | | | |\n| Žä┬▓-Bench | 88.2 | 80.3 (85.2*) | 74.3*/85.4* | 87.4 | 86.6* | 80.3 (84.1*) |\n| BrowseComp | 51.6 | 51.4 | 41.5* / 60.6 | 52.0 | 47.4 | 45.4 |\n| BrowseComp (w/ Context Manager) | 69.0 | 67.6 | 60.2/74.9 | 67.5 | 62.0 | 58.3 |\n| BrowseComp-ZH | 66.9 | 65.0 | 62.3 / 62.3* | 66.6 | 47.8* | 51.2* |\n| BrowseComp-ZH (w/ Context Manager) | 73.7 | ŌĆö | ŌĆö/ŌĆö | ŌĆö | ŌĆö | ŌĆö |\n| GAIA (no file) | 84.5 | 75.1* | 75.6*/75.9* | 61.9* | 64.3* | 78.2* |\n| xbench-DeepSearch (2025.05) | 83.7 | 78.0* | 76.0*/76.7* | 72.0* | 68.7* | 69.3* |\n| xbench-DeepSearch (2025.10) | 56.3 | 55.7* | ŌĆö/40+ | 52.3* | 43.0* | 44.0* |\n| ResearchRubrics | 65.3 | 55.8* | 56.2*/59.5* | 62.0* | 60.2* | 54.3* |\n| | | | **Reasoning** | | | |\n| AIME 2025 | 97.3 | 93.1 | 94.5/96.1 | 95.7 | 83.0 | 94.1 (95.1*) |\n| HMMT 2025 (Feb.) | 98.4 | 92.5 | 89.4/95.4 | 97.1 | 71.0* | 84.4 (95.4*) |\n| HMMT 2025 (Nov.) | 94.0 | 90.2 | 89.2*/ŌĆö | 93.5 | 74.3* | 91.0* |\n| IMOAnswerBench | 85.4 | 78.3 | 78.6/81.8 | 82.0 | 60.4* | 80.9* |\n| | | | **Coding** | | | |\n| LiveCodeBench-V6 | 86.4 | 83.3 | 83.1/85.0 | 84.9 | ŌĆö | 80.6 (81.6*) |\n| SWE-bench Verified | 74.4 | 73.1 | 71.3/76.8 | 73.8 | 74.0 | 73.4 |\n| Terminal-Bench 2.0 | 51.0 | 46.4 | 35.7*/50.8 | 41.0 | 47.9 | 38.5 |\n\n## Notes\n\n- \"ŌĆö\" indicates the score is not publicly available or not tested.\n- \"*\" indicates the original score was inaccessible or lower than our reproduced, so we report the evaluation under the same test conditions as Step 3.5 Flash to ensure fair comparability.\n- BrowseComp (with Context Manager): when the effective context length exceeds a predefined threshold, the agent resets the context and restarts the agent loop. (By contrast, Kimi K2.5 and DeepSeek-V3.2 used a discard-all strategy.)\n- In decoding cost section, decoding is estimated using a similar but more accurate approach than [arxiv.org/abs/2507.19427](https://arxiv.org/abs/2507.19427).\n\n## 4. Architecture Details\n\nStep 3.5 Flash is built on a **Sparse Mixture-of-Experts (MoE)** transformer architecture, optimized for high throughput and low VRAM usage during inference.\n\n### 4.1 Technical Specifications\n\n| Component | Specification |\n| :--- | :--- |\n| **Backbone** | 45-layer Transformer (4,096 hidden dim) |\n| **Context Window** | 256K |\n| **Vocabulary** | 128,896 tokens |\n| **Total Parameters** | **196.81B** (196B Backbone + 0.81B Head) |\n| **Active Parameters** | **~11B** (per token generation) |\n\n### 4.2 Mixture of Experts (MoE) Routing\n\nUnlike traditional dense models, Step 3.5 Flash uses a fine-grained routing strategy to maximize efficiency:\n- **Fine-Grained Experts**: 288 routed experts per layer + 1 shared expert (always active).\n- **Sparse Activation**: Only the Top-8 experts are selected per token.\n- **Result**: The model retains the \"memory\" of a 196B parameter model but executes with the speed of an 11B model. \n\n### 4.3 Multi-Token Prediction (MTP)\n\nTo improve inference speed, we utilize a specialized MTP Head consisting of a sliding-window attention mechanism and a dense Feed-Forward Network (FFN). This module predicts 4 tokens simultaneously in a single forward pass, significantly accelerating inference without degrading quality.\n\n## 5. Quick Start\n\nYou can get started with Step 3.5 Flash in minutes using Cloud API via our supported providers.\n\n### 5.1 OpenRouter\n\n[OpenRouter](https://openrouter.ai) provides uniform access to Step 3.5 Flash with both free and paid tiers.\n\n**Models:**\n- **Free Tier:** [`stepfun/step-3.5-flash:free`](https://openrouter.ai/stepfun/step-3.5-flash:free)\n- **Standard Tier:** [`stepfun/step-3.5-flash`](https://openrouter.ai/stepfun/step-3.5-flash)\n\n**Configuration:**\n- **Base URL:** `https://openrouter.ai/api/v1`\n- **API Key:** Sign up at [OpenRouter](https://openrouter.ai) to get your key.\n\n### 5.2 StepFun Platform\n\nStepFun offers official API endpoints for both International and Chinese users.\n\n| Region | Website | Base URL |\n| :--- | :--- | :--- |\n| **International** | [platform.stepfun.ai](https://platform.stepfun.ai) | `https://api.stepfun.ai/v1` |\n| **China** | [platform.stepfun.com](https://platform.stepfun.com) | `https://api.stepfun.com/v1` |\n\n> **Note:** China platform requires +86 phone number verification.\n\n### 5.3 OpenClaw (Recommended)\n\nFor a full agentic experience, we recommend using [OpenClaw](https://openclaw.ai).\n­¤æē **[View the OpenClaw Cookbook](./cookbooks/openclaw)** to get started in minutes.\n\n### 5.4 Implementation Example\n\nInstall the standard OpenAI SDK (compatible with both platforms):\n\n```bash\npip install --upgrade \"openai>=1.0\"\n```\n\n**Python Example:**\n\n```python\nfrom openai import OpenAI\n\n# Configuration for OpenRouter\n# base_url = \"https://openrouter.ai/api/v1\"\n# api_key = \"sk-or-...\" \n# model = \"stepfun/step-3.5-flash\"\n\n# Configuration for StepFun (International)\nbase_url = \"https://api.stepfun.ai/v1\" \n# For China: base_url = \"https://api.stepfun.com/v1\"\napi_key = \"your-stepfun-api-key\"\nmodel = \"step-3.5-flash\"\n\nclient = OpenAI(api_key=api_key, base_url=base_url)\n\ncompletion = client.chat.completions.create(\n    model=model,\n    messages=[\n        {\"role\": \"system\", \"content\": \"You are a helpful assistant.\"},\n        {\"role\": \"user\", \"content\": \"Hello! Introduce yourself.\"}\n    ]\n)\n\nprint(completion.choices[0].message.content)\n```\n\n## 6. Local Deployment\n\nStep 3.5 Flash is optimized for local inference and supports industry-standard backends including vLLM, SGLang, Hugging Face Transformers and llama.cpp.\n\n### 6.1 vLLM \nWe recommend using the latest nightly build of vLLM.\n1. Install vLLM.\n\n```bash\n# via Docker\ndocker pull vllm/vllm-openai:nightly\n\n# or via pip (nightly wheels)\npip install -U vllm --pre \\\n  --index-url https://pypi.org/simple \\\n  --extra-index-url https://wheels.vllm.ai/nightly\n```\n\n**Note**: Bug fixes for tool parser and reasoning parser, as well as support for the `v1/messages` interface, are being merged into vLLM. In the meantime, you can use the `vllm/vllm-openai:v0.15.1-x86_64` image with `step3.5_vllm_v0.15.1.patch` for deployment. The patch file `step3.5_vllm_v0.15.1.patch` is provided in this repository; download or copy it and ensure it is accessible from the directory where you run `git apply` (or use its absolute path).\n```bash \n# via Docker\n# refer to \"step3.5_vllm_v0.15.1.Dockerfile\"\n\n# or via pip \npip install -U vllm==0.15.1\ncd /path/to/lib/python3.12/site-packages  # Replace with the parent dir of vLLM installation path.\ngit apply /path/to/step3.5_vllm_v0.15.1.patch  # Replace with the actual path to the patch file (e.g., from the repository root).\n```\n\n2. Launch the server.\n\n**Note**: Full MTP3 support is not yet available in vLLM. We are actively working on a Pull Request to integrate this feature, which is expected to significantly enhance decoding performance.\n\n  - For fp8 model\n```bash  \nvllm serve <MODEL_PATH_OR_HF_ID> \\\n  --served-model-name step3p5-flash \\\n  --tensor-parallel-size 8 \\\n  --enable-expert-parallel \\\n  --disable-cascade-attn \\\n  --reasoning-parser step3p5 \\\n  --enable-auto-tool-choice \\\n  --tool-call-parser step3p5 \\\n  --hf-overrides '{\"num_nextn_predict_layers\": 1}' \\\n  --speculative_config '{\"method\": \"step3p5_mtp\", \"num_speculative_tokens\": 1}' \\\n  --trust-remote-code \\\n  --quantization fp8\n```\n\n  - For bf16 model\n```bash\nvllm serve <MODEL_PATH_OR_HF_ID> \\\n  --served-model-name step3p5-flash \\\n  --tensor-parallel-size 8 \\\n  --enable-expert-parallel \\\n  --disable-cascade-attn \\\n  --reasoning-parser step3p5 \\\n  --enable-auto-tool-choice \\\n  --tool-call-parser step3p5 \\\n  --hf-overrides '{\"num_nextn_predict_layers\": 1}' \\\n  --speculative_config '{\"method\": \"step3p5_mtp\", \"num_speculative_tokens\": 1}' \\\n  --trust-remote-code    \n```\n\n### 6.2 SGLang\n\n1. Install SGLang.\n```bash\n# via Docker\ndocker pull lmsysorg/sglang:dev-pr-18084\n# or from source (pip)\npip install \"sglang[all] @ git+https://github.com/sgl-project/sglang.git\"\n```\n\n2. Launch the server.\n  - For bf16 model\n```\nSGLANG_ENABLE_SPEC_V2=1\nsglang serve \\\n  --model-path <MODEL_PATH_OR_HF_ID> \\\n  --served-model-name step3p5-flash \\\n  --tp-size 8 \\\n  --tool-call-parser step3p5 \\\n  --reasoning-parser step3p5 \\\n  --speculative-algorithm EAGLE \\\n  --speculative-num-steps 3 \\\n  --speculative-eagle-topk 1 \\\n  --speculative-num-draft-tokens 4 \\\n  --enable-multi-layer-eagle \\\n  --host 0.0.0.0 \\\n  --port 8000\n```\n  - For fp8 model\n```bash\nSGLANG_ENABLE_SPEC_V2=1\nsglang serve \\\n  --model-path <MODEL_PATH_OR_HF_ID> \\\n  --served-model-name step3p5-flash \\\n  --tp-size 8 \\\n  --ep-size 8 \\\n  --tool-call-parser step3p5 \\\n  --reasoning-parser step3p5 \\\n  --speculative-algorithm EAGLE \\\n  --speculative-num-steps 3 \\\n  --speculative-eagle-topk 1 \\\n  --speculative-num-draft-tokens 4 \\\n  --enable-multi-layer-eagle \\\n  --host 0.0.0.0 \\\n  --port 8000\n```\n\n### 6.3 Transformers (Debug / Verification)\n\nUse this snippet for quick functional verification. For high-throughput serving, use vLLM or SGLang.\n```python\nfrom transformers import AutoModelForCausalLM, AutoTokenizer\n\nMODEL_PATH = \"<MODEL_PATH_OR_HF_ID>\"\n\n# 1. Setup\ntokenizer = AutoTokenizer.from_pretrained(MODEL_PATH)\nmodel = AutoModelForCausalLM.from_pretrained(\n    MODEL_PATH,\n    trust_remote_code=True,\n    torch_dtype=\"auto\",\n    device_map=\"auto\",\n)\n\n# 2. Prepare Input\nmessages = [{\"role\": \"user\", \"content\": \"Explain the significance of the number 42.\"}]\ninputs = tokenizer.apply_chat_template(\n    messages,\n    tokenize=True,\n    add_generation_prompt=True,\n    return_dict=True,\n    return_tensors=\"pt\",\n).to(model.device)\n\n# 3. Generate\ngenerated_ids = model.generate(**inputs, max_new_tokens=128, do_sample=False)\noutput_text = tokenizer.decode(generated_ids[0][inputs.input_ids.shape[1]:], skip_special_tokens=True)\n\nprint(output_text)\n```\n\n### 6.4 llama.cpp\n\n#### System Requirements\n- GGUF Model Weights(int4): 111.5 GB\n- Runtime Overhead: ~7 GB\n- Minimum VRAM: 120 GB (e.g., Mac studio, DGX-Spark, AMD Ryzen AI Max+ 395)\n- Recommended: 128GB unified memory\n#### Notes\n- llama.cpp build **must include** [PR #19283](https://github.com/ggml-org/llama.cpp/pull/19283)\n- If you encounter tool calling issues on llama.cpp mainline, try building with: [PR #18675](https://github.com/ggml-org/llama.cpp/pull/18675)\n- Community GGUF quantizations: [Step-3.5-Flash Quant Collection](https://huggingface.co/ubergarm/Step-3.5-Flash-GGUF#quant-collection)\n#### Steps\n1. Use official llama.cpp\n> the folder `Step-3.5-Flash/tree/main/llama.cpp` is **obsolete**\n```bash\ngit clone https://github.com/ggml-org/llama.cpp\ncd llama.cpp\n```\n2. Build llama.cpp on Mac:\n```bash\ncmake -S . -B build-macos \\\n  -DCMAKE_BUILD_TYPE=Release \\\n  -DGGML_METAL=ON \\\n  -DGGML_ACCELERATE=ON \\\n  -DLLAMA_BUILD_EXAMPLES=ON \\\n  -DLLAMA_BUILD_COMMON=ON \\\n  -DGGML_LTO=ON\ncmake --build build-macos -j8\n```\n3. Build llama.cpp on DGX-Spark:\n```bash\ncmake -S . -B build-cuda \\\n  -DCMAKE_BUILD_TYPE=Release \\\n  -DGGML_CUDA=ON \\\n  -DGGML_CUDA_GRAPHS=ON \\\n  -DLLAMA_CURL=OFF \\\n  -DLLAMA_BUILD_EXAMPLES=ON \\\n  -DLLAMA_BUILD_COMMON=ON\ncmake --build build-cuda -j8\n```\n4. Build llama.cpp on AMD Windows:\n```bash\ncmake -S . -B build-vulkan \\\n  -DCMAKE_BUILD_TYPE=Release \\\n  -DLLAMA_CURL=OFF \\\n  -DGGML_OPENMP=ON \\\n  -DGGML_VULKAN=ON\ncmake --build build-vulkan -j8\n```\n5. Run with llama-cli\n```bash\n./llama-cli -m step3.5_flash_Q4_K_S.gguf -c 16384 -b 2048 -ub 2048 -fa on --temp 1.0 -p \"What's your name?\"\n```\n6. Test performance with llama-batched-bench ([Benchmark details](llama.cpp/docs/step3.5-flash.md))\n```bash\n./llama-batched-bench -m step3.5_flash_Q4_K_S.gguf -c 32768 -b 2048 -ub 2048 -npp 0,2048,8192,16384,32768 -ntg 128 -npl 1\n```\n\n## 7. Using Step 3.5 Flash on Agent Platforms\n\n> **Note:** As mentioned in the [Quick Start](#5-quick-start), you can access Step 3.5 Flash via **OpenRouter** or the **StepFun Platform**. Choose the base URL and API key corresponding to your preferred provider when configuring these agents.\n\n### 7.1 OpenClaw (Recommended)\n\n[OpenClaw](https://openclaw.ai) is a powerful agentic platform that works seamlessly with Step 3.5 Flash. \nStep 3.5 Flash is a perfect fit for OpenClaw due to its high speed and strong agentic capabilities (maintaining deep reasoning and consistency during execution).\n\n**Quick Setup:**\n1. **Install:** `curl -fsSL https://openclaw.ai/install.sh | bash`\n2. **Onboard:** Run `openclaw onboard`.\n3. **Configure:** In WebUI (`Config` -> `Models`), add a new provider:\n   - **Type:** `openai-completions`\n   - **Base URL:**\n     - **StepFun:** `https://api.stepfun.ai/v1` (International) or `https://api.stepfun.com/v1` (China)\n     - **OpenRouter:** `https://openrouter.ai/api/v1`\n   - **Model ID:** `step-3.5-flash` (or `stepfun/step-3.5-flash` for OpenRouter)\n\nFor a full walkthrough, see our [OpenClaw Cookbook](./cookbooks/openclaw).\n\n### 7.2 Claude Code\n\nYou can configure [Claude Code](https://docs.anthropic.com/en/docs/agents-and-tools/claude-code/overview) to use Step 3.5 Flash by modifying your settings.\n\n**Update `~/.claude/settings.json`:**\n\n```json\n{\n  \"env\": {\n    \"ANTHROPIC_AUTH_TOKEN\": \"YOUR_STEPFUN_API_KEY\",\n    \"ANTHROPIC_BASE_URL\": \"https://api.stepfun.ai/\"  // Use \"https://api.stepfun.com/\" for China endpoint\n  },\n  \"model\": \"step-3.5-flash\"\n}\n```\n\n> **Note:** For more advanced routing or OpenAI-style usage, we recommend [claude-code-router](https://github.com/musistudio/claude-code-router).\n\n### 7.3 OpenAI Codex (CLI)\n\nTo use Step 3.5 Flash with the `@openai/codex` CLI, update your `~/.codex/config.toml`:\n\n```toml\nmodel=\"step-3.5-flash\"\nmodel_provider = \"stepfun-chat\"\npreferred_auth_method = \"apikey\"\n\n[model_providers.stepfun-chat]\nname = \"OpenAI using response\"\nbase_url = \"https://api.stepfun.ai/v1\"\nenv_key = \"OPENAI_API_KEY\"\nwire_api = \"chat\"\n```\n\n### 7.4 Step-DeepResearch\n\nStep 3.5 Flash powers the reasoning core of Step-DeepResearch.\nTo use it, simply set `MODEL_NAME` to `Step-3.5-Flash` in your `.env` file.\n\nSee the [Step-DeepResearch Repository](https://github.com/stepfun-ai/StepDeepResearch) for full setup instructions.\n\n\n## 8. Cookbooks\n\nExplore our [Cookbooks](./cookbooks) directory for practical examples and integration guides, including:\n\n- **[Hybrid Local Agent](./cookbooks/hybrid-local-agent-macos)**: Build a local, privacy-first agentic sandbox.\n- **[OpenClaw Integration](./cookbooks/openclaw)**: Deploy and integrate with OpenClaw.\n- **[Roo Code Integration](./cookbooks/roo-code-integration-guide)**: Use Step 3.5 Flash as the backend for Roo Code in VS Code.\n\nVisit the [Cookbooks README](./cookbooks/README.md) for more details and contribution guidelines.\n\n## 9. Known Issues and Future Directions\n\n1. **Token Efficiency**. Step 3.5 Flash achieves frontier-level agentic intelligence but currently relies on longer generation trajectories than Gemini 3.0 Pro to reach comparable quality.\n2. **Efficient Universal Mastery**. We aim to unify generalist versatility with deep domain expertise. To achieve this efficiently, we are advancing variants of on-policy distillation, allowing the model to internalize expert behaviors with higher sample efficiency.\n3. **RL for More Agentic Tasks**. While Step 3.5 Flash demonstrates competitive performance on academic agentic benchmarks, the next frontier of agentic AI necessitates the application of RL to intricate, expert-level tasks found in professional work, engineering, and research.\n4. **Operational Scope and Constraints**. Step 3.5 Flash is tailored for coding and work-centric tasks, but may experience reduced stability during distribution shifts. This typically occurs in highly specialized domains or long-horizon, multi-turn dialogues, where the model may exhibit repetitive reasoning, mixed-language outputs, or inconsistencies in time and identity awareness.\n\n## 10. Co-Developing the Future\n\nWe view our roadmap as a living document, evolving continuously based on real-world usage and developer feedback.\nAs we work to shape the future of AGI by expanding broad model capabilities, we want to ensure we are solving the right problems. We invite you to be part of this continuous feedback loopŌĆöyour insights directly influence our priorities.\n\n- **Join the Conversation**: Our Discord community is the primary hub for brainstorming future architectures, proposing capabilities, and getting early access updates ­¤ÜĆ\n- **Report Friction**: Encountering limitations? You can open an issue on GitHub or flag it directly in our Discord support channels.\n\n## License\nThis project is open-sourced under the [Apache 2.0 License](https://www.apache.org/licenses/LICENSE-2.0).\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=stepfun-ai%2FStep-3.5-Flash&type=date&legend=top-left\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/image?repos=stepfun-ai/Step-3.5-Flash&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/image?repos=stepfun-ai/Step-3.5-Flash&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/image?repos=stepfun-ai/Step-3.5-Flash&type=date&legend=top-left\" />\n </picture>\n</a>\n","summary":"Step 3.5 Flash is a high-performance, open-source foundation model built on a sparse Mixture of Experts (MoE) architecture designed to balance deep reasoning with exceptional inference speed. By utilizing 3-way Multi-Token Prediction, the model delivers impressive throughput for complex, multi-step tasks while supporting a 256K context window for long-form data processing. It is specifically optimized for agentic workflows and coding, making it an ideal tool for developers and researchers who require a robust, efficient engine for building autonomous agents and sophisticated reasoning systems.","description":"Fast, Sharp & Reliable Agentic Intelligence","stars":2067,"language":"C++"},{"owner":"cloudflare","repo":"kumo","url":"https://github.com/cloudflare/kumo","readme":"# Kumo\n\nCloudflare's component library for building modern web applications.\n\nKumo provides accessible, design-system-compliant UI components built on [Base UI](https://base-ui.com/). It handles keyboard navigation, focus management, and ARIA attributes so you can build accessible applications without thinking through every detail.\n\n<img width=\"2560\" height=\"1456\" alt=\"image\" src=\"https://github.com/user-attachments/assets/032f5a0e-b686-4440-b1ca-6182379479aa\" />\n\n## Installation\n\n```bash\npnpm add @cloudflare/kumo\n```\n\n### Peer Dependencies\n\n```bash\npnpm add react react-dom @phosphor-icons/react\n```\n\n## Usage\n\n```tsx\nimport { Button, Input, Dialog } from \"@cloudflare/kumo\";\nimport \"@cloudflare/kumo/styles\";\n```\n\n### Granular Imports (Tree-Shaking)\n\n```tsx\nimport { Button } from \"@cloudflare/kumo/components/button\";\n```\n\n### Base UI Primitives\n\nKumo re-exports all Base UI primitives for advanced use cases:\n\n```tsx\nimport { Popover } from \"@cloudflare/kumo/primitives/popover\";\n```\n\n## CLI\n\nQuery component documentation from the command line:\n\n```bash\nnpx @cloudflare/kumo ls          # List all components\nnpx @cloudflare/kumo doc Button  # Get component docs\nnpx @cloudflare/kumo docs        # Get all docs\n```\n\n## Development\n\nSee [AGENTS.md](./AGENTS.md) for comprehensive development documentation including:\n\n- Component patterns and styling system\n- Semantic color tokens\n- Development workflows\n- CI/CD pipeline\n- Figma plugin\n\n### Quick Start\n\n```bash\npnpm install\npnpm dev                    # Start docs site at localhost:4321\npnpm --filter @cloudflare/kumo test\n```\n\n### Figma Plugin\n\n```bash\n# Optional: enable token sync during build\n# cp packages/kumo-figma/scripts/.env.example packages/kumo-figma/scripts/.env\n# $EDITOR packages/kumo-figma/scripts/.env  # set FIGMA_TOKEN (and optionally FIGMA_FILE_KEY)\n\npnpm --filter @cloudflare/kumo-figma build\n# In Figma: Plugins > Development > Import plugin from manifest...\n# Select: packages/kumo-figma/src/manifest.json\n```\n\n### Creating Components\n\n```bash\npnpm --filter @cloudflare/kumo new-component\n```\n\n## Documentation\n\n- **Live Docs**: [kumo-ui.com](https://kumo-ui.com)\n- **AI/Agent Guide**: [AGENTS.md](./AGENTS.md)\n\n## License\n\nMIT\n","summary":"Kumo is a component library developed by Cloudflare that provides a set of design-system-compliant, accessible UI elements built on top of Base UI. It streamlines front-end development by automatically handling complex requirements like keyboard navigation, focus management, and ARIA attributes. Developers who need to build high-quality, inclusive web applications efficiently will benefit from its pre-styled components, granular imports, and integrated CLI documentation tools.","description":"Cloudflare's component library for building modern web applications.","stars":2139,"language":"TypeScript"}]</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = 'Ōśģ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
