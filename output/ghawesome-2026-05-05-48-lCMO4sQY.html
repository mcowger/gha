<script id="project-data" type="application/json">[{"owner":"bradautomates","repo":"claude-video","url":"https://github.com/bradautomates/claude-video","readme":"# /watch\n\n**Give Claude the ability to watch any video.**\n\nClaude Code:\n```\n/plugin marketplace add bradautomates/claude-video\n/plugin install watch@claude-video\n```\n\nclaude.ai (web): [download `watch.skill`](https://github.com/bradautomates/claude-video/releases/latest) and drop it into Settings → Capabilities → Skills.\n\nCodex / generic skills:\n```bash\ngit clone https://github.com/bradautomates/claude-video.git ~/.codex/skills/watch\n```\n\nZero config to start — `yt-dlp` and `ffmpeg` install on first run via `brew` on macOS (Linux/Windows print exact commands). Captions cover most public videos for free. Whisper API key is only needed when a video has no captions.\n\n---\n\nClaude can read a webpage, run a script, browse a repo. What it can't do, out of the box, is *watch a video*. You paste a YouTube link and it has to either guess from the title or pull a transcript that's missing 90% of what's on screen.\n\nWith Claude Video `/watch` you can paste a URL or a local path, ask a question, and Claude downloads the video, extracts frames at an auto-scaled rate, pulls a timestamped transcript (free captions when available, Whisper API as fallback), and `Read`s every frame as an image. By the time it answers, it has *seen* the video and *heard* the audio.\n\n```\n/watch https://youtu.be/dQw4w9WgXcQ what happens at the 30 second mark?\n```\n\n## Why this exists\n\nI built this because I'm constantly using video to keep up with content. If I see a YouTube video that's blowing up, I want to know how the creator structured the hook — what's on screen in the first 3 seconds, what they said, why it worked. That used to mean watching it myself with a notepad. Now I just paste the URL and ask.\n\nThe other half is summarization. Most YouTube videos don't deserve 20 minutes of my attention. I hand the URL to Claude, it pulls the transcript, and tells me what actually happened. If the visual matters, frames come along too. If it's a podcast or a talking head, transcript is enough.\n\nClaude is great at reading and synthesizing — but until now, video was the one input I couldn't hand it. Pasting a YouTube link got you nothing useful. `/watch` closes that gap.\n\n## What people actually use it for\n\n**Analyze someone else's content.** `/watch https://youtu.be/<viral-video> what hook did they open with?` Claude looks at the first frames, reads the opening transcript, breaks down the structure. Same for ad creative, competitor launches, podcast intros, anything where the *how* matters as much as the *what*.\n\n**Diagnose a bug from a video.** Someone sends you a screen recording of something broken. `/watch bug-repro.mov what's going wrong?` Claude watches the recording, finds the frame where the issue appears, describes what's on screen, often catches the cause without you ever opening the file.\n\n**Summarize a video.** `/watch https://youtu.be/<long-thing> summarize this` does the obvious thing — pulls the structure, the key moments, what was actually said and shown. Faster than watching at 2x.\n\n## How it works\n\n1. **You paste a video and a question.** URL (anything yt-dlp supports — YouTube, Loom, TikTok, X, Instagram, plus a few hundred more) or a local path (`.mp4`, `.mov`, `.mkv`, `.webm`).\n2. **`yt-dlp` downloads it.** For URLs, into a temp working directory. For local files, no download — just probed in place.\n3. **`ffmpeg` extracts frames at an auto-scaled rate.** The frame budget is duration-aware: ≤30s gets ~30 frames, 30-60s gets ~40, 1-3min gets ~60, 3-10min gets ~80, longer gets 100 sparsely. Hard ceilings: 2 fps, 100 frames. JPEGs at 512px wide by default — bump with `--resolution 1024` if Claude needs to read on-screen text.\n4. **The transcript comes from one of two places.** First try: `yt-dlp` pulls native captions (manual or auto-generated) from the source. Free, instant, accurate-ish. Fallback: extract a mono 16 kHz audio clip and ship it to Whisper — Groq's `whisper-large-v3` (preferred — cheaper and faster) or OpenAI's `whisper-1`.\n5. **Frames + transcript are handed to Claude.** The script prints frame paths with `t=MM:SS` markers and the transcript with timestamps. Claude `Read`s each frame in parallel — JPEGs render directly as images in its context.\n6. **Claude answers grounded in what's actually on screen and in the audio.** Not \"based on the description\" or \"according to the title.\" It saw the frames. It heard the transcript. It answers the way someone who watched the video would.\n7. **Cleanup.** The script prints a working directory at the end. If you're not asking follow-ups, Claude removes it.\n\n## Frame budget — why it matters\n\nToken cost is dominated by frames. Every frame is an image; image tokens add up fast. The script's auto-fps logic exists so you don't blow your context budget on a sparse scan of a 30-minute video that would have been better answered by a focused 30-second window.\n\n| Duration | Default frame budget | What you get |\n|----------|---------------------|--------------|\n| ≤30 s | ~30 frames | Dense — basically every key moment |\n| 30 s - 1 min | ~40 frames | Still dense |\n| 1 - 3 min | ~60 frames | Comfortable |\n| 3 - 10 min | ~80 frames | Sparse but workable |\n| > 10 min | 100 frames | \"Sparse scan\" warning — re-run focused |\n\nWhen the user names a moment (\"around 2:30\", \"the last 30 seconds\", \"from 0:45 to 1:00\"), pass `--start` / `--end`. Focused mode gets denser per-second budgets, capped at 2 fps. Far more useful than a sparse pass over the whole thing.\n\n## Install\n\n| Surface | Install |\n|---------|---------|\n| **Claude Code** | `/plugin marketplace add bradautomates/claude-video` then `/plugin install watch@claude-video` |\n| **claude.ai** (web) | [Download `watch.skill`](https://github.com/bradautomates/claude-video/releases/latest) → Settings → Capabilities → Skills → `+` |\n| **Codex** | `git clone https://github.com/bradautomates/claude-video.git ~/.codex/skills/watch` |\n| **Manual / dev** | `git clone https://github.com/bradautomates/claude-video.git ~/.claude/skills/watch` |\n\n### Claude Code\n\n```\n/plugin marketplace add bradautomates/claude-video\n/plugin install watch@claude-video\n```\n\nUpdate later with `/plugin update watch@claude-video`.\n\n### claude.ai (web)\n\n1. [Download `watch.skill`](https://github.com/bradautomates/claude-video/releases/latest) from the latest release.\n2. Go to Settings → Capabilities → Skills.\n3. Click `+` and drop the file in.\n\nEnable \"Code execution and file creation\" under Capabilities first — the skill shells out to `ffmpeg` and `yt-dlp`, so it won't run without it.\n\n### Codex\n\n```bash\ngit clone https://github.com/bradautomates/claude-video.git ~/.codex/skills/watch\n```\n\n### Manual (developer)\n\n```bash\ngit clone https://github.com/bradautomates/claude-video.git ~/.claude/skills/watch\n```\n\n## First run\n\nOn the first `/watch` call, the skill runs `scripts/setup.py --check`. If `ffmpeg` / `yt-dlp` aren't on your PATH, or no Whisper API key is set, it walks you through fixing it:\n\n- **macOS** — auto-runs `brew install ffmpeg yt-dlp`.\n- **Linux** — prints the exact `apt` / `dnf` / `pipx` commands.\n- **Windows** — prints the `winget` / `pip` commands.\n- **API key** — scaffolds `~/.config/watch/.env` (mode `0600`) with commented placeholders for `GROQ_API_KEY` (preferred) and `OPENAI_API_KEY`.\n\nAfter setup, preflight is silent and `/watch` just works. The check is a sub-100ms lookup, so it doesn't slow you down on subsequent runs.\n\n## Bring your own keys\n\nCaptions cover the majority of public videos for free. The Whisper fallback only kicks in when a video genuinely has no caption track — typically local files, TikToks, some Vimeos, and the occasional caption-less YouTube upload.\n\n| Capability | What you need | Cost |\n|------------|---------------|------|\n| Download + native captions | `yt-dlp` + `ffmpeg` | Free |\n| Whisper fallback (preferred) | [Groq API key](https://console.groq.com/keys) — `whisper-large-v3` | Cheap, fast |\n| Whisper fallback (alt) | [OpenAI API key](https://platform.openai.com/api-keys) — `whisper-1` | Standard pricing |\n| Disable Whisper entirely | `--no-whisper` | Free, frames-only when no captions |\n\n## Usage\n\n```\n/watch https://youtu.be/dQw4w9WgXcQ what happens at the 30 second mark?\n/watch https://www.tiktok.com/@user/video/123 summarize this\n/watch ~/Movies/screen-recording.mp4 when does the UI break?\n/watch https://vimeo.com/123 what tools does she mention?\n```\n\nFocused on a specific section — denser frame budget, lower token cost:\n```\n/watch https://youtu.be/abc --start 2:15 --end 2:45\n/watch video.mp4 --start 50 --end 60\n/watch \"$URL\" --start 1:12:00            # from 1h12m to end\n```\n\nOther knobs (passed to `scripts/watch.py`):\n\n- `--max-frames N` — lower the frame cap for a tighter token budget.\n- `--resolution W` — bump frame width to 1024 px when Claude needs to read on-screen text (slides, terminals, code).\n- `--fps F` — override the auto-fps calculation (still capped at 2 fps).\n- `--whisper groq|openai` — force a specific Whisper backend.\n- `--no-whisper` — disable transcription entirely; frames only.\n- `--out-dir DIR` — keep working files somewhere specific (default: auto-generated tmp dir).\n\n## Limits\n\n- **Best accuracy: under 10 minutes.** Past that the script prints a \"sparse scan\" warning — re-run focused on the part you actually care about with `--start`/`--end`.\n- **Hard caps: 2 fps, 100 frames.** Frame count drives token cost; the script enforces this even when the auto-fps math would imply higher.\n- **Whisper upload limit: 25 MB.** At mono 16 kHz that's about 50 minutes of audio. Longer videos need either captions or `--start`/`--end` to a smaller window.\n- **No private platforms.** This skill doesn't log into anything. Public URLs and local files only. If yt-dlp can't reach it without auth, neither can `/watch`.\n\n## Structure\n\n```\n.\n├── SKILL.md                 # skill contract — loaded by all three surfaces\n├── scripts/\n│   ├── watch.py             # entry point — orchestrates download → frames → transcript\n│   ├── download.py          # yt-dlp wrapper\n│   ├── frames.py            # ffmpeg frame extraction + auto-fps logic\n│   ├── transcribe.py        # VTT parsing + dedupe + Whisper orchestration\n│   ├── whisper.py           # Groq / OpenAI clients (pure stdlib)\n│   ├── setup.py             # preflight + installer\n│   └── build-skill.sh       # build dist/watch.skill for claude.ai upload\n├── hooks/                   # SessionStart status hook (Claude Code only)\n├── .claude-plugin/          # plugin.json + marketplace.json (Claude Code)\n├── .codex-plugin/           # codex packaging\n└── .github/workflows/       # release.yml — auto-builds watch.skill on tag push\n```\n\n## Develop\n\n```bash\n# Build the claude.ai upload bundle:\nbash scripts/build-skill.sh      # → dist/watch.skill\n```\n\nReleasing: tag `vX.Y.Z`, push the tag. The workflow builds `dist/watch.skill` and attaches it to the GitHub release.\n\nSee [CHANGELOG.md](CHANGELOG.md) for version history.\n\n## Open source\n\nMIT license.\n\nBuilt on `yt-dlp`, `ffmpeg`, and Claude's multimodal `Read` tool. Whisper transcription via [Groq](https://groq.com) or [OpenAI](https://openai.com).\n\n---\n\n[github.com/bradautomates/claude-video](https://github.com/bradautomates/claude-video) · [LICENSE](LICENSE)\n","summary":"`bradautomates/claude-video` adds an out‑of‑the‑box `/watch` skill to Claude, enabling the model to “watch” any video you paste a URL or local path for. The skill automatically downloads the media with yt‑dlp, extracts frames at a smart rate, pulls a timestamped transcript from free captions or falls back to Whisper, and then feeds both images and audio into Claude so it can answer questions, locate bugs, or summarize content. It is ideal for content creators, marketers, and QA engineers who want to analyze hooks, ad creatives, competitor launches or screen‑capture bugs without manually watching hours of video. The setup requires no configuration—yt‑dlp and ffmpeg install on first run, and the only optional key is for Whisper when captions are missing.","description":"Give Claude the ability to watch any video. /watch downloads, extracts frames, transcribes, hands it all to Claude.","stars":723,"language":"Python"},{"owner":"Anbeeld","repo":"WRITING.md","url":"https://github.com/Anbeeld/WRITING.md","readme":"# Anbeeld's WRITING.md — AI Writing Rules\n\nA prose ruleset that makes AI-assisted text sharper, not as generic, and less like default model output. It targets the patterns that make generated prose feel recognizable without breaking grammar, faking typos, or gutting useful structure. The result reads better than unguided output and avoids the most common tells.\n\nThe rules combine writing standards, web readability research, documentation guidance, detector-limit research, and direct observation of what LLMs produce when left to defaults.\n\n[![Support my work!](https://anbeeld.com/images/support.jpg)](https://anbeeld.com/support)\n\n## What it does\n\n- Starts with context: medium, audience, reader need, and the job of the text.\n- Calibrates voice to genre. Opinion pieces can sound like a person; summaries and docs stay neutral.\n- Keeps the format appropriate. Docs stay scannable; casual replies do not get over-structured. Does not remove useful structure just to look less templated.\n- Replaces polished generality with concrete anchors. If a paragraph has no checkable detail, it gets revised.\n- Guards against fake specificity. Quotes, numbers, dates, causal claims, and named claims need support.\n- Breaks the patterns that make model prose look templated: repeated cadence, hidden lists, generic signposts, and too-neat paragraph shapes.\n- Prefers ordinary words over inflated phrasing. Allows repetition when the ordinary word is the right one.\n- Cuts the staged parts: keynote cadence, service-desk tone, ceremonial openings, and filler closings.\n- Does not fake humanity with some specific tricks. No invented typos, no forced slang, no programmatic sentence-length variation, no staged messiness. You can add it yourself, if needed.\n- Revises by reading and cutting. Collapses restatements, drops announcement sentences, and replaces the most generic clause with something specific.\n\n## How to use it\n\n### 1. Manually as direct instructions\n\nGive [the ruleset](WRITING.md) to an AI and tell it to follow every rule strictly. The explicit instructions (~4400 words) compensate for habits the model would otherwise default to: regular sentence structure, generic phrasing, parallel enumeration, overly neat conclusions, and many others.\n\nOne pattern that works well: ask for a first draft with the rules applied, then request an audit of that draft against the required checks, and have the model rewrite based on what the audit caught. Repeat one or two more times if the text is on a larger side. Further rewrites after that usually circulate around the same model-level limitations.\n\nThis is meant for legitimate uses, like iterating on a human draft or turning loosely organized thinking into something you would actually publish. The output avoids the most common LLM tells and will read better than unguided model text, but it will not pass an experienced eye test or an advanced detector. Prompt-level instructions have a ceiling and can't overcome model-level defaults.\n\n### 2. As a skill in an agent harness\n\nUse the packaged skill in [/skills/writing](skills/writing) with tools that support skills: Claude Code, Codex, OpenCode, Cursor, and others. The skill loads on demand when the agent is doing writing, so it costs almost no context until needed.\n\n**Installation:** copy the [/skills/writing](skills/writing) directory to your global skills folder:\n\n- **Claude Code:** `~/.claude/skills/`\n- **Codex:** `~/.codex/skills/`\n- **Cursor:** `~/.cursor/skills/`\n- **OpenCode:** `~/.config/opencode/skills/`\n\nThe skill description is scoped to public-facing prose, like blog posts, articles, documentation, criticism, long-form, emails, marketing, SEO copy, or UI text. It explicitly excludes code comments, commit messages, and private notes.\n\n### 3. Compact as agent/chat instructions\n\n[WRITING-compact.md](WRITING-compact.md) is the same rules at ~1200 words. Use as AGENTS.md or CLAUDE.md for writing agents, or as instructions in custom chats like GPTs and Gemini Gems. Cuts examples, long-form diagnostics, and provenance; keeps every behavior-changing rule, required check, and the watchlist.\n\n### 4. Mini as a section in AGENTS.md\n\n[WRITING-mini.md](WRITING-mini.md) is ~240 words, fits on one screen. All ten concepts compressed to bullet-pointed aphorisms. Designed to embed as a persistent section in global AGENTS.md or CLAUDE.md so the rules are always in context without dominating it.\n\n## See also\n\n- [Anbeeld's Global AGENTS.md / CLAUDE.md](https://github.com/Anbeeld/AGENTS.md)\n\n[![Support my work!](https://anbeeld.com/images/support.jpg)](https://anbeeld.com/support)","summary":"Anbeeld’s WRITING.md is a comprehensive prose ruleset designed to sharpen AI‑assisted text, making it feel less generic and more human‑like without sacrificing grammar or structure. It guides writers to set context, calibrate voice, maintain appropriate formatting, anchor content with concrete details, and eliminate templated patterns while encouraging ordinary diction and targeted specificity. The rules can be applied directly to an AI prompt, integrated as a lightweight skill in various agent frameworks, or used as compact chat instructions to audit and refine drafts. Designers, content creators, and documentation specialists looking to elevate the quality of machine‑generated prose would benefit most from this structured approach.","description":"Rules to make AI text sharper and genre-aware, with concrete anchors and built-in self-auditing workflow","stars":214,"language":null},{"owner":"fancyai-official","repo":"skills","url":"https://github.com/fancyai-official/skills","readme":"# FancyAI Skills Collection\n\n**Premium AI insights and creative tools for creators, marketers, and retailers.**\n\nFancyAI Skills are expert-level workflows designed for **all industries** — fashion, FMCG, beauty, tech, sportswear, luxury, and beyond. Each skill combines real business case studies with behind-the-scenes creative knowledge, giving AI assistants the ability to execute professional campaigns, direct photoshoots, generate product assets, and guide visual storytelling with the nuance of experienced creative directors.\n\nWhether you're a brand marketer, a creative director, an e-commerce retailer, or a social media manager, FancyAI Skills help you move faster without sacrificing quality.\n\n---\n\n## About This Repository\n\nThis repository contains professionally crafted skills for **Marketing, E-Commerce, Fashion & Editorial, Digital Marketing, and Design** — all backed by real-world case studies and production knowledge.\n\nEach skill is self-contained in its own folder with a `SKILL.md` file containing detailed instructions, prompt templates, and workflow guidelines.\n\nAll skills in this repository are open source under the **Apache 2.0 License** — free to use, modify, and distribute.\n\n---\n\n## Skill Sets\n\n### 🛍️ E-Commerce (Product Asset Creation)\n\nSkills organized by product category for professional e-commerce visual production.\n\n| Product Category | Skill | Description |\n| :--- | :--- | :--- |\n| **Beverage** | `beverage-photography` | Professional beverage photography — lighting setups, composition, styling, and background selection |\n| **Beauty & Cosmetics** | `beauty-photography` | Beauty photography workflows — skincare, makeup application shots, and editorial beauty lighting |\n| **Kidswear** | `kidswear-photography` | Children's apparel photography — natural posing, playful lighting, and lifestyle compositions |\n| **Footwear** | `footwear-campaign` | Comprehensive shot lists for footwear — angles, detail shots, styling specifications, and retail-ready asset planning |\n| **Small Appliances** | `small-appliance-photography` | Hero visuals for small appliances — lighting for glossy surfaces, tech aesthetics, and kitchen/lifestyle integration |\n\n### 👗 Fashion & Editorial\n\nSkills for fashion design, campaign direction, and editorial storytelling.\n\n| Skill | Description |\n| :--- | :--- |\n| `fashion-campaign` | End-to-end fashion campaign direction — concept development, mood boards, talent briefing, production coordination, and post-production |\n| `fashion-editorial` | Editorial fashion storytelling — narrative-driven shoots, avant-garde styling, and publication-ready outputs for magazines and lookbooks |\n| `fashion-design` | Fashion design workflows — sketching, fabric selection, silhouette development, and collection planning |\n| `street-style-photography` | Street fashion photography — candid urban documentation, trend capture, and authentic styling references for campaigns and show coverage |\n\n*(Fashion show coverage skills coming soon)*\n\n### 📱 Digital Marketing *(New — expanding)*\n\nSkills for social content creation, digital campaigns, and KOC/KOL workflows.\n\n| Skill | Description |\n| :--- | :--- |\n| *Coming soon* | Product animation for social, KOC content generation, short-form video storyboarding, platform-specific asset optimization, and digital campaign management |\n\n### 🎨 Design & Branding\n\n| Skill | Description |\n| :--- | :--- |\n| *Coming soon* | Icon and logo design workflows — grid systems, consistency guidelines, and multi-format export specifications for brand identity systems |\n\n---\n\n## What Makes FancyAI Skills Different?\n\nFancyAI Skills are designed by **seasoned experts across industries** — fashion directors, e-commerce producers, beauty photographers, and creative strategists who have worked on real campaigns for world-class brands.\n\n**Brands we've worked with:**  \nWe've collaborated with **1000+ brands globally** across fashion, FMCG, beauty, tech, sportswear, luxury, and more — including Adidas, Skechers, MLB, HOKA, Starbucks, LVMH, Burberry, Stuart Weitzman, Microsoft, Samsung, and Daraz.\n\n**Recognition:**  \n🏆 2024 Viva Tech LVMH Innovation Awards — Grand Winner  \n🏆 Forbes Asia 100 to Watch 2024\n\nUnlike generic prompts, FancyAI Skills embed **real production knowledge and creative sensibility** into every workflow. They teach AI how creative professionals actually work — from brief to final asset.\n\n---\n\n## In Development\n\nWe're continuously expanding our skill collection. Future releases include:\n\n- **User-generated content (UGC) strategy workflows** — Short-form video storyboards, KOC asset generation, and authentic community-driven content\n- **Social media asset generation and campaign tracking** — Platform-specific optimizations, performance analytics, and multi-format content adaptation\n- **Product design** — Visual concept development and design brief generation\n\nHave a request? [Open an issue](https://github.com/fancyai-official/skills/issues).\n\n---\n\n## Disclaimer\n\n**These skills are provided for demonstration and educational purposes.** While these skills represent real-world workflows used in professional creative production, you should always test and adapt them thoroughly in your own environment before relying on them for critical commercial projects.\n\n---\n\n## Contributing\n\nWe welcome contributions! To add a skill:\n\n1. Fork this repository\n2. Create a branch (`git checkout -b skill/your-skill-name`)\n3. Add your skill in its own folder with a `SKILL.md` file\n4. Commit (`git commit -m 'Add your-skill-name'`)\n5. Push (`git push origin skill/your-skill-name`)\n6. Open a Pull Request\n\nPlease ensure your skill follows the standard structure and includes clear documentation.\n\n---\n\n## License\n\nThis project is licensed under the **Apache License, Version 2.0**. See the [LICENSE](LICENSE) file for details.\n\n---\n\n**Maintained by [FancyAI](https://github.com/fancyai-official) — The AI for Aesthetics**\n\n[![License](https://img.shields.io/badge/License-Apache%202.0-blue.svg)](LICENSE)\n[![Stars](https://img.shields.io/github/stars/fancyai-official/skills?style=social)](https://github.com/fancyai-official/skills/stargazers)","summary":"FancyAI Skills is an open‑source library of expert‑crafted AI workflows that help marketers, creative directors, e‑commerce retailers, and social‑media managers generate professional campaigns, product imagery, and brand assets at scale.  \nEach skill is a self‑contained folder with a `SKILL.md` that contains step‑by‑step prompt templates, production guidelines, and real‑world case studies for categories such as beverage photography, beauty shoots, footwear assets, and fashion campaign direction.  \nUsers can copy, modify, or extend these ready‑to‑deploy workflows to jump‑start high‑quality work without sacrificing creative nuance, making it ideal for brands that need to move fast while maintaining professional standards.  \nLicensed under Apache 2.0, the repository is freely available for adaptation and redistribution.","description":null,"stars":1039,"language":"Python"},{"owner":"PrathamLearnsToCode","repo":"paper2code","url":"https://github.com/PrathamLearnsToCode/paper2code","readme":"# paper2code\n\n> **arxiv URL in → citation-anchored implementation out**\n\n```\n┌─────────────────────────────┐         ┌──────────────────────────────────────┐\n│                             │         │  {paper_slug}/                       │\n│  /paper2code                │         │  ├── README.md                       │\n│  https://arxiv.org/abs/     │  ───▶   │  ├── REPRODUCTION_NOTES.md          │\n│  1706.03762                 │         │  ├── requirements.txt               │\n│                             │         │  ├── src/                            │\n│                             │         │  │   ├── model.py     # §3.2 cited  │\n│                             │         │  │   ├── loss.py      # §3.4 cited  │\n│                             │         │  │   ├── train.py     # §4.1 cited  │\n│                             │         │  │   ├── data.py                    │\n│                             │         │  │   ├── evaluate.py                │\n│                             │         │  │   └── utils.py                   │\n│                             │         │  ├── configs/                        │\n│                             │         │  │   └── base.yaml   # all params   │\n│                             │         │  └── notebooks/                      │\n│                             │         │      └── walkthrough.ipynb           │\n└─────────────────────────────┘         └──────────────────────────────────────┘\n```\n\n*[placeholder: animated GIF showing the full pipeline — paper fetch → parsing → ambiguity audit → code generation → walkthrough notebook]*\n\n---\n\n## Why this exists\n\n**The problem:** ML papers are vague. Critical hyperparameters are buried in appendices or omitted entirely. Prose contradicts equations. \"Standard settings\" refers to nothing specific. When you implement a paper, you spend more time detective-working than coding.\n\n**What LLMs get wrong:** Naive code generation fills in every gap silently and confidently. You get something that runs but doesn't match the paper. Worse, you can't tell which parts are from the paper and which were invented by the model.\n\n**What paper2code does differently:**\n\n1. **Citation anchoring** — every line of generated code references the exact paper section and equation it implements (`§3.2, Eq. 4`)\n2. **Ambiguity auditing** — before writing a single line of code, every implementation choice is classified as `SPECIFIED`, `PARTIALLY_SPECIFIED`, or `UNSPECIFIED`\n3. **Honest uncertainty** — unspecified choices are flagged with `[UNSPECIFIED]` comments at the exact line where the choice is made, with common alternatives listed\n4. **Appendix mining** — appendices, footnotes, and figure captions are treated as first-class sources, not ignored\n\nThe result: code you can trust because you can verify every decision against the paper.\n\n---\n\n## Install\n\n```bash\nnpx skills add PrathamLearnsToCode/paper2code/skills/paper2code\n```\n\nYou'll be prompted to:\n1. **Select agents** — pick the coding agents you want to use this skill with (e.g., Claude Code)\n2. **Choose scope** — Global (recommended) or project-level\n3. **Choose method** — Symlink (recommended) or copy\n\nOnce installed, open your agent and run the skill:\n\n```bash\nclaude  # or your preferred agent\n```\n\n---\n\n## Usage\n\n### Basic — generate a minimal implementation\n\n```\n/paper2code https://arxiv.org/abs/1706.03762\n```\n\n### Specify framework\n\n```\n/paper2code https://arxiv.org/abs/2006.11239 --framework jax\n```\n\n### Full mode — includes training loop and data pipeline\n\n```\n/paper2code 2106.09685 --mode full\n```\n\n### Educational mode — extra comments and pedagogical notebook\n\n```\n/paper2code https://arxiv.org/abs/2010.11929 --mode educational\n```\n\n### Using bare arxiv ID\n\n```\n/paper2code 1706.03762\n```\n\n---\n\n## What you get\n\n```\nattention_is_all_you_need/\n├── README.md                    # Paper summary, contribution statement, quick-start\n├── REPRODUCTION_NOTES.md        # Ambiguity audit, unspecified choices, known deviations\n├── requirements.txt             # Pinned dependencies\n├── src/\n│   ├── model.py                 # Architecture — every layer cited to paper section\n│   ├── loss.py                  # Loss functions with equation references\n│   ├── data.py                  # Dataset class skeleton with preprocessing TODOs\n│   ├── train.py                 # Training loop (if in scope)\n│   ├── evaluate.py              # Metric computation code\n│   └── utils.py                 # Shared utilities (masking, positional encoding, etc.)\n├── configs/\n│   └── base.yaml                # All hyperparams — each one cited or flagged [UNSPECIFIED]\n└── notebooks/\n    └── walkthrough.ipynb        # Pedagogical notebook linking paper sections → code → sanity checks\n```\n\n### Key files explained\n\n| File | Purpose |\n|------|---------|\n| `model.py` | Architecture only. Each class maps to a paper section. Variable names match paper notation. |\n| `REPRODUCTION_NOTES.md` | The ambiguity audit. Lists every choice, whether the paper specified it, and what alternatives exist. |\n| `base.yaml` | Single source of truth for all hyperparameters. |\n| `walkthrough.ipynb` | Runnable on CPU with toy dimensions. Quotes paper passages, shows corresponding code, runs shape checks. |\n\n---\n\n## What this skill will NOT do\n\n- **Won't guarantee correctness.** The implementation matches what the paper describes. If the paper is wrong, the code is wrong. If the paper is vague, the code flags it.\n- **Won't invent details.** If the paper doesn't specify a hyperparameter, the code uses a common default and marks it `[UNSPECIFIED]`. It will never silently fill in gaps.\n- **Won't download datasets.** The `data.py` provides a `Dataset` class skeleton with clear instructions on where to get the data and how to preprocess it.\n- **Won't set up training infrastructure.** No distributed training, no experiment tracking, no checkpointing beyond what the paper's contribution requires.\n- **Won't implement baselines.** Only the core contribution of the paper is implemented.\n- **Won't reimplement standard components.** If the paper says \"standard transformer encoder,\" the code imports it or notes the dependency — it doesn't reimplement attention from scratch.\n\n---\n\n## Design principles\n\n### Citation anchoring convention\n\nEvery non-trivial code decision is anchored to the paper:\n\n```python\n# §3.2 — \"We apply layer normalization before each sub-layer\" (Pre-LN variant)\nclass TransformerBlock(nn.Module):\n    def forward(self, x):\n        # §3.2, Eq. 2 — attention_weights = softmax(QK^T / sqrt(d_k))\n        attn_out = self.attention(self.norm1(x))  # (batch, seq_len, d_model)\n        x = x + attn_out  # §3.2 — residual connection\n```\n\n### The UNSPECIFIED flag system\n\n```python\n# [UNSPECIFIED] Paper does not state epsilon for LayerNorm — using 1e-6 (common default)\n# Alternatives: 1e-5 (PyTorch default), 1e-8 (some implementations)\nself.norm = nn.LayerNorm(d_model, eps=1e-6)\n```\n\n```python\n# [ASSUMPTION] Using pre-norm based on \"we found pre-norm more stable\" in §4.1\n# The paper uses post-norm in Figure 1 but pre-norm in experiments — ambiguous\n```\n\n### Ambiguity classification\n\n| Tag | Meaning |\n|-----|---------|\n| `§X.Y` | Directly specified in paper section X.Y |\n| `§X.Y, Eq. N` | Implements equation N from section X.Y |\n| `[UNSPECIFIED]` | Paper does not state this — our choice with alternatives listed |\n| `[PARTIALLY_SPECIFIED]` | Paper mentions this but is ambiguous — quote included |\n| `[ASSUMPTION]` | Reasonable inference from paper context — reasoning explained |\n| `[FROM_OFFICIAL_CODE]` | Taken from the authors' official implementation |\n\n---\n\n## Contributing\n\n### Adding worked examples\n\nWorked examples are the most trust-building part of this project. To add one:\n\n1. Pick a well-known paper (people should be able to verify the output)\n2. Run the skill: `/paper2code https://arxiv.org/abs/XXXX.XXXXX`\n3. Save the full output to `skills/paper2code/worked/{paper_slug}/`\n4. Write a `review.md` that honestly evaluates:\n   - What the skill got right\n   - What it correctly flagged as unspecified\n   - Any mistakes it made\n   - Any edge cases it handled well or poorly\n5. Submit a PR with all of the above\n\n### Improving guardrails\n\nIf you find a pattern where the skill hallucinates or makes a silent assumption, add it to the appropriate file in `guardrails/`.\n\n### Adding domain knowledge\n\nIf papers in your subfield consistently reference components that the skill doesn't know about (e.g., graph neural network primitives, RL components), add a knowledge file in `knowledge/`.\n\n---\n\n## Worked examples\n\nThis repo includes fully worked examples to demonstrate output quality:\n\n| Paper | Type | Command |\n|-------|------|---------|\n| Attention Is All You Need (1706.03762) | Architecture | `/paper2code https://arxiv.org/abs/1706.03762` |\n| DDPM (2006.11239) | Training method | `/paper2code https://arxiv.org/abs/2006.11239` |\n\nEach includes the complete generated output plus an honest `review.md` evaluating what the skill got right and wrong.\n\n---\n","summary":"paper2code automates the conversion of a research paper into a runnable code base while preserving the provenance of every implementation decision. It pulls the paper from arXiv, parses its sections, equations, and appendices, and generates source files that are annotated with citations to the exact locations they implement. Unresolved design choices are flagged with `[UNSPECIFIED]` comments and alternative options are listed, giving users a transparent audit trail of assumptions. Researchers, students, and ML engineers who need reliable, traceable re‑implementations of academic work will find this tool especially useful.","description":"Agent skill to turn any arxiv paper into a working implementation","stars":1238,"language":"Python"},{"owner":"ConardLi","repo":"garden-skills","url":"https://github.com/ConardLi/garden-skills","readme":"<div align=\"center\">\n\n# Garden Skills\n\n**A curated collection of production-ready [Agent Skills](https://support.claude.com/en/articles/12512176-what-are-skills) for Claude Code, Cursor, Codex, and other AI coding agents.**\n\n<a id=\"skills-gallery\"></a>\n\n<table>\n<tr>\n<td width=\"50%\" valign=\"top\">\n<a href=\"#web-video-presentation\"><img src=\"./dist/imgs/web-video-presentation-skill.png\" alt=\"Web Video Presentation Skill\" width=\"100%\"></a>\n<br/><a href=\"#web-video-presentation\"><strong>web-video-presentation</strong></a>\n<br/><sub>Web video / presentation</sub>\n</td>\n<td width=\"50%\" valign=\"top\">\n<a href=\"#web-design-engineer\"><img src=\"./dist/imgs/web-design-skill.png\" alt=\"Web Design Skill\" width=\"100%\"></a>\n<br/><a href=\"#web-design-engineer\"><strong>web-design-engineer</strong></a>\n<br/><sub>Design / frontend</sub>\n</td>\n</tr>\n<tr>\n<td width=\"50%\" valign=\"top\">\n<a href=\"#gpt-image-2\"><img src=\"./dist/imgs/gpt-image-2-skill.png\" alt=\"GPT Image 2 Skill\" width=\"100%\"></a>\n<br/><a href=\"#gpt-image-2\"><strong>gpt-image-2</strong></a>\n<br/><sub>Image generation / prompting</sub>\n</td>\n<td width=\"50%\" valign=\"top\">\n<a href=\"#kb-retriever\"><img src=\"./dist/imgs/kb-retriever-skill.png\" alt=\"KB Retriever Skill\" width=\"100%\"></a>\n<br/><a href=\"#kb-retriever\"><strong>kb-retriever</strong></a>\n<br/><sub>Local knowledge retrieval</sub>\n</td>\n</tr>\n</table>\n\n[![License: MIT](https://img.shields.io/github/license/ConardLi/garden-skills?style=flat-square&color=blue)](./LICENSE)\n[![GitHub stars](https://img.shields.io/github/stars/ConardLi/garden-skills?style=flat-square)](https://github.com/ConardLi/garden-skills/stargazers)\n[![PRs welcome](https://img.shields.io/badge/PRs-welcome-brightgreen?style=flat-square)](#contributing)\n[![Skills count](https://img.shields.io/badge/skills-4-orange?style=flat-square)](#skills-gallery)\n[![Spec](https://img.shields.io/badge/spec-SKILL.md-black?style=flat-square)](https://agentskills.io)\n\n[English](./README.md) · [中文文档](./README.zh-CN.md)\n\n</div>\n\n---\n\n## Table of contents\n\n| Install | Use | Contribute |\n|---|---|---|\n| [Install](#install)<br>[`skills` CLI (npx)](#option-a--skills-cli-npx)<br>[Claude Code plugin marketplace](#option-b--claude-code-plugin-marketplace)<br>[Pinned `.zip` from Releases](#option-c--pinned-zip-from-releases)<br>[Manual copy](#option-d--manual-copy-into-your-project)<br>[Git submodule](#option-e--git-submodule) | [Compatibility](#compatibility)<br>[What is a Skill?](#what-is-a-skill) | [Contributing](#contributing)<br>[Acknowledgments](#acknowledgments)<br>[License](#license) |\n\n---\n\n### [`web-video-presentation`](./skills/web-video-presentation)\n\n![Web Video Presentation Skill](./dist/imgs/web-video-presentation-skill.png)\n\n**Category:** Web Video / Presentation Engineering  \n**Best for:** turning scripts, articles, lessons, product demos, and talks into click-driven 16:9 web presentations that can be screen-recorded as cinematic videos.\n\n`web-video-presentation` builds record-ready Vite + React + TypeScript presentations that behave like video production surfaces. The workflow turns raw articles into narration scripts, maps script beats to full-screen scenes, pauses at required checkpoints, and can optionally synthesize narration audio after the visual outline is approved.\n\nHighlights:\n\n- Fixed 1920×1080 stage that scales to the viewport for stable screen recording\n- Click / keyboard driven `(chapter, step)` cursor, with one narration beat per visual step\n- Hard collaboration checkpoints for script, theme, outline, implementation mode, and optional audio\n- Hidden hover-only progress controls so the stage stays clean while recording\n- Theme-token architecture with multiple visual languages, from `paper-press` to `terminal-green`\n- Scaffolded Vite + React + TypeScript project with reusable stage primitives and recording guidance\n\nLinks: [README](./skills/web-video-presentation/README.md) · [SKILL.md](./skills/web-video-presentation/SKILL.md) · <!-- DOWNLOAD:web-video-presentation:start -->[Download v1.1.1 .zip](https://github.com/ConardLi/garden-skills/releases/download/web-video-presentation-v1.1.1/web-video-presentation-1.1.1.zip)<!-- DOWNLOAD:web-video-presentation:end -->\n\n---\n\n### [`web-design-engineer`](./skills/web-design-engineer)\n\n![Web Design Skill](./dist/imgs/web-design-skill.png)\n\n**Category:** Design / Frontend  \n**Best for:** web pages, landing pages, dashboards, interactive prototypes, HTML slide decks, animations, UI mockups, data visualizations, and design-system explorations.\n\n`web-design-engineer` turns AI-generated web artifacts from merely functional into polished, deliberate, and visually memorable front-end work. It treats the agent as a design engineer: first understanding product context, then declaring a design system, showing an early v0, building the full experience, and verifying the result.\n\nHighlights:\n\n- Defines a six-step design workflow: requirements → context → design system → v0 → full build → verification\n- Pushes beyond generic AI UI patterns with an anti-cliché blocklist and stronger visual judgment\n- Covers HTML / CSS / JavaScript / React prototypes, with guidance for responsive layout, motion, and interaction polish\n- Includes practical implementation rules for inline React + Babel, CSS tokens, `oklch()` color work, container queries, and reduced-motion handling\n- Ships an advanced patterns reference for device frames, slide engines, animation timelines, dashboards, and other reusable web artifacts\n\nLinks: [README](./skills/web-design-engineer/README.md) · [SKILL.md](./skills/web-design-engineer/SKILL.md) · [Website](./website/web-design-website) · [Demo](./demo/web-design-demo) · <!-- DOWNLOAD:web-design-engineer:start -->[Download v1.0.0 .zip](https://github.com/ConardLi/garden-skills/releases/download/web-design-engineer-v1.0.0/web-design-engineer-1.0.0.zip)<!-- DOWNLOAD:web-design-engineer:end -->\n\n---\n\n### [`gpt-image-2`](./skills/gpt-image-2)\n\n![GPT Image 2 Skill](./dist/imgs/gpt-image-2-skill.png)\n\n**Category:** Image Generation / Prompt Engineering  \n**Best for:** posters, UI mockups, product visuals, infographics, academic figures, technical diagrams, comics, avatars, storyboards, branding boards, and image-editing workflows.\n\n`gpt-image-2` is a focused image-generation skill for GPT Image 2 and OpenAI-compatible image APIs. It is designed to work across different agent environments: fully local Garden generation, host-native image-tool delegation, or prompt-only advisor mode when no image tool is available.\n\nHighlights:\n\n- Supports three runtime modes: **Mode A Garden local**, **Mode B host-native delegation**, and **Mode C advisor-only prompt writing**\n- Starts every task with mode detection so the skill does not silently choose the wrong execution path\n- Provides 18 visual categories and 80+ structured prompt templates under `references/`\n- Covers both image generation and image editing through dedicated workflows and scripts\n- Saves prompts and generated images under `garden-gpt-image-2/` in Garden mode for reuse, review, and versioning\n\nLinks: [README](./skills/gpt-image-2/README.md) · [SKILL.md](./skills/gpt-image-2/SKILL.md) · [Website](./website/gpt-image2-website) · <!-- DOWNLOAD:gpt-image-2:start -->[Download v1.0.3 .zip](https://github.com/ConardLi/garden-skills/releases/download/gpt-image-2-v1.0.3/gpt-image-2-1.0.3.zip)<!-- DOWNLOAD:gpt-image-2:end -->\n\n---\n\n### [`kb-retriever`](./skills/kb-retriever)\n\n![Kb Retriever Skill](./dist/imgs/kb-retriever-skill.png)\n\n**Category:** Retrieval / Local Knowledge Base  \n**Best for:** answering questions from a local `knowledge/` directory, searching structured documentation, and extracting evidence from Markdown, text, PDF, and Excel files without flooding the agent context.\n\n`kb-retriever` is a local knowledge-base retriever built around careful, progressive search. Instead of loading whole files, it navigates hierarchical index files, narrows the candidate set, processes complex file types correctly, and answers with sources.\n\nHighlights:\n\n- Uses layered `data_structure.md` files to navigate the knowledge base before searching content\n- Enforces a **learn-before-process** rule for PDF and Excel files, using the included reference docs before extraction or analysis\n- Combines precise keyword search, local windowed reads, synonyms, and iterative refinement\n- Bounds retrieval to at most 5 search rounds so exploration stays controlled\n- Includes workflows for `grep`, `pdftotext`, `pdfplumber`, and `pandas`, with source-aware answer formatting\n\nLinks: [README](./skills/kb-retriever/README.md) · [SKILL.md](./skills/kb-retriever/SKILL.md) · <!-- DOWNLOAD:kb-retriever:start -->[Download v1.0.0 .zip](https://github.com/ConardLi/garden-skills/releases/download/kb-retriever-v1.0.0/kb-retriever-1.0.0.zip)<!-- DOWNLOAD:kb-retriever:end -->\n\n---\n\n## Install\n\nThere are five supported install paths. Pick the one that fits your stack:\n\n| # | Method | Best for | Pinned version? |\n|---|---|---|---|\n| A | [`skills` CLI (`npx skills add`)](#option-a--skills-cli-npx) | Any agent, one-line install, pick & choose skills | ✅ via tag URL |\n| B | [Claude Code plugin marketplace](#option-b--claude-code-plugin-marketplace) | Claude Code users who want to subscribe to plugin packs | ✅ via marketplace version |\n| C | [Pinned `.zip` from GitHub Releases](#option-c--pinned-zip-from-releases) | CI / air-gapped envs / reproducible installs | ✅ ✅ (immutable) |\n| D | [Manual copy after `git clone`](#option-d--manual-copy-into-your-project) | Local hacking on the skill itself | ❌ (tracks `main`) |\n| E | [Git submodule](#option-e--git-submodule) | Vendored into a larger project, want upstream updates | ✅ via submodule SHA |\n\n> Each skill section above also has a **`Download v<version> .zip`** link in\n> its \"Links:\" row that points at the current pinned release artifact. Those\n> URLs are auto-rewritten by [`scripts/release/update-readme.mjs`](./scripts/release/update-readme.mjs)\n> on every release, so they always advertise the latest immutable version.\n\n### Option A · `skills` CLI (npx)\n\nThe fastest agent-agnostic path. Uses the standard [`npx skills` CLI](https://www.npmjs.com/package/skills),\nwhich auto-detects your agent (Claude Code, Cursor, Codex, etc.) and drops the\nskill into the right directory.\n\n```bash\n# Install all four skills (latest)\nnpx skills add ConardLi/garden-skills\n\n# Install just one skill (latest)\nnpx skills add ConardLi/garden-skills -s web-design-engineer\n\n# Install globally (~/.skills) instead of per-project (./.skills)\nnpx skills add ConardLi/garden-skills -s gpt-image-2 --global\n\n# Target a specific agent\nnpx skills add ConardLi/garden-skills -s kb-retriever -a claude-code\n```\n\n> **Defaults to the latest commit on `main`.** That's what you want 95% of the\n> time — the CLI tracks each skill's most recent published `SKILL.md` straight\n> from the source tree.\n\n**Want a pinned version? (CI / production)** Use a tag-scoped `tree/` URL —\nthis points at the exact commit a release was cut from:\n\n```bash\n# Pin one skill to a specific release\nnpx skills add ConardLi/garden-skills/tree/web-design-engineer-v1.0.0/skills/web-design-engineer\n```\n\nFor each skill, the current pinned `.zip` URL is also shown inline in its\n\"Links:\" row above (the `Download v<version> .zip` link).\n\nUseful sub-commands:\n\n```bash\nnpx skills list                 # what's installed\nnpx skills find web-design      # search registries\nnpx skills update               # bump everything\nnpx skills remove kb-retriever  # uninstall\n```\n\n### Option B · Claude Code plugin marketplace\n\nIf you use [Claude Code](https://docs.anthropic.com/en/docs/claude-code), you\ncan subscribe to the marketplace and install plugin packs that bundle one or\nmore skills together:\n\n```bash\n/plugin marketplace add ConardLi/garden-skills\n/plugin install presentation-skills@garden-skills\n/plugin install web-design-skills@garden-skills\n/plugin install knowledge-base-skills@garden-skills\n/plugin install image-generation-skills@garden-skills\n```\n\nPlugin packs are declared in [`.claude-plugin/marketplace.json`](./.claude-plugin/marketplace.json):\n\n| Plugin pack | Skills included |\n|---|---|\n| `presentation-skills` | `web-video-presentation` |\n| `web-design-skills` | `web-design-engineer` |\n| `knowledge-base-skills` | `kb-retriever` |\n| `image-generation-skills` | `gpt-image-2` |\n\n### Option C · Pinned `.zip` from Releases\n\nEvery formal release publishes an immutable `.zip` (with a SHA-256 checksum) to\n[GitHub Releases](https://github.com/ConardLi/garden-skills/releases). Pin to\nthis from CI, Dockerfiles, or air-gapped installers when you need the exact\nbytes to never move under you.\n\n```bash\n# Replace <skill> and <version> with the version you want.\nSKILL=web-design-engineer\nVERSION=1.0.0\n\ncurl -fsSL -o \"${SKILL}.zip\" \\\n  \"https://github.com/ConardLi/garden-skills/releases/download/${SKILL}-v${VERSION}/${SKILL}-${VERSION}.zip\"\n\n# Verify the checksum (highly recommended for unattended installs)\ncurl -fsSL -o \"${SKILL}.zip.sha256\" \\\n  \"https://github.com/ConardLi/garden-skills/releases/download/${SKILL}-v${VERSION}/${SKILL}-${VERSION}.zip.sha256\"\nshasum -a 256 -c \"${SKILL}.zip.sha256\"\n\n# Drop the folder into the agent's skills directory\nunzip -q \"${SKILL}.zip\" -d .claude/skills/   # or .agents/skills/, .codex/skills/, ...\n```\n\nA floating \"always-latest\" URL is also available — useful for one-off installs:\n\n```bash\nhttps://github.com/ConardLi/garden-skills/releases/latest/download/<skill>-<version>.zip\n```\n\n> **Pinned URLs for every skill are listed inline in this README** — see the\n> \"Download\" line under each skill's \"Links\" entry above. They are kept in sync\n> automatically by the release pipeline.\n\n### Option D · Manual copy into your project\n\nClone the repo and copy the skill folder you want — handy if you want to fork\nor hack on the skill itself.\n\n```bash\ngit clone https://github.com/ConardLi/garden-skills.git\ncp -r garden-skills/skills/web-design-engineer  your-project/.claude/skills/\n# Cursor / generic agent:\ncp -r garden-skills/skills/web-design-engineer  your-project/.agents/skills/\n```\n\nThe agent discovers the skill the next time it scans the workspace.\n\n### Option E · Git submodule\n\nFor vendoring into a larger project where you want to track upstream updates:\n\n```bash\ngit submodule add https://github.com/ConardLi/garden-skills.git vendor/garden-skills\nln -s ../../vendor/garden-skills/skills/web-design-engineer .claude/skills/web-design-engineer\n```\n\nPin to a release tag for reproducibility:\n\n```bash\ncd vendor/garden-skills\ngit checkout web-design-engineer-v1.0.0\n```\n\n---\n\n## Compatibility\n\n| Agent / Runtime | Skill location | Status |\n|---|---|---|\n| **Claude Code** | `.claude/skills/<name>/` or via plugin marketplace | ✅ Tested |\n| **Claude.ai** (web) | Settings → Capabilities → Skills | ✅ Tested |\n| **Cursor** | `.agents/skills/<name>/` | ✅ Tested |\n| **Codex CLI** | `.codex/skills/<name>/` | ✅ Tested |\n| **Gemini CLI** | extension manifest | ✅ Tested |\n| **OpenCode** | `.opencode/skills/<name>/` | ✅ Tested |\n\n> The `SKILL.md` format is portable by design — if your agent supports skills, copy the folder into the directory it scans, and it should work. PRs welcome to extend this matrix.\n\n---\n\n## What is a Skill?\n\nA **Skill** is a self-contained folder the agent can load on-demand. It's\njust a `SKILL.md` (YAML frontmatter + instructions), optionally accompanied\nby reference docs, scripts, and assets:\n\n```text\n<skill-name>/\n├── SKILL.md      ← required: when to use it + how to do it\n├── README.md     ← human-facing docs\n├── references/   ← optional: extended docs the agent loads on demand\n├── scripts/      ← optional: deterministic executable helpers\n└── assets/       ← optional: templates, fonts, icons\n```\n\nThe agent decides whether to activate the skill from the `description` line\nin the frontmatter — so the description is the contract between you and the\nagent. For the full spec, see [agentskills.io](https://agentskills.io) and\n[Anthropic's reference repository](https://github.com/anthropics/skills).\n\n---\n\n## Contributing\n\nBug reports, new skills, and tooling improvements are all welcome.\n\nThe maintainer-facing docs — repository layout, release process, version\nrules, CI workflow, troubleshooting — live in\n[**`CONTRIBUTING.md`**](./CONTRIBUTING.md) ([中文](./CONTRIBUTING.zh-CN.md)).\nRead that first if you want to add a skill or cut a release.\n\nQuick orientation:\n\n```bash\ngit clone https://github.com/ConardLi/garden-skills.git\ncd garden-skills\nnpm run list      # show all skills + manifest status\nnpm run validate  # the same check CI runs on every PR\n```\n\n---\n\n## Acknowledgments\n\nThis collection stands on the shoulders of:\n\n- **[Anthropic](https://www.anthropic.com)** for the [Agent Skills spec](https://agentskills.io) and the [`anthropics/skills`](https://github.com/anthropics/skills) reference repository.\n- **[Claude Design](https://www.anthropic.com/news/claude-design-anthropic-labs)** — the system prompt that inspired `web-design-engineer`. The original is preserved in [`dist/prompt/claude-design-system-prompt.md`](./dist/prompt/claude-design-system-prompt.md) for reference.\n- The broader OSS skill community — see [`travisvn/awesome-claude-skills`](https://github.com/travisvn/awesome-claude-skills) and [`obra/superpowers`](https://github.com/obra/superpowers) for further discovery.\n\n---\n\n## License\n\n[MIT](./LICENSE) © [ConardLi](https://github.com/ConardLi)\n","summary":"Garden Skills is a curated set of production‑ready “skills” that extend Claude Code and other AI coding agents with specialized development tasks. Each skill—such as web‑video‑presentation, web‑design‑engineer, gpt‑image‑2, or kb‑retriever—packages a self‑contained Vite/React/TypeScript workflow, ready‑to‑run templates, and training data for a specific domain, allowing agents to convert text scripts into interactive slides, generate images with prompts, or pull local knowledge. The project makes it easy to install the skills via CLI, a plugin marketplace, or as submodules, and includes configuration guides and templates for rapid adoption. Developers, designers, and AI enthusiasts who want to scaffold polished web apps, analytics dashboards, or media content directly from prompts will benefit from this ready‑to‑deploy skill set.","description":"ConardLi's open-source Skills collection, featuring web design, knowledge retrieval, image generation, and more.","stars":2368,"language":"CSS"},{"owner":"charlie947","repo":"social-media-skills","url":"https://github.com/charlie947/social-media-skills","readme":"<p align=\"center\">\n  <img src=\"assets/banner.svg\" alt=\"Social Media Skills by Charlie Hills\" width=\"100%\"/>\n</p>\n\n# Social Media Skills for AI Agents\n\nThe complete set of Claude skills behind Charlie Hills' content system. 350k+ followers across LinkedIn, Instagram, Substack, X and YouTube. 100m+ views per year. All running through one system that starts with the newsletter and flows out to every other channel.\n\nBuilt by [Charlie Hills](https://charliehills.substack.com). Subscribe to the [MarTech AI newsletter](https://charliehills.substack.com) for weekly breakdowns of how this system works in practice.\n\n**Contributions welcome.** Found a way to improve a skill? [Open a PR](https://github.com/charlie947/social-media-skills/pulls). Run into a problem? [Open an issue](https://github.com/charlie947/social-media-skills/issues).\n\n## What are Skills?\n\nSkills are markdown files that give AI agents specialised knowledge and workflows for specific tasks. When you install these in your project, Claude recognises when you're working on a social media task and applies the right patterns, voice rules, and platform constraints.\n\n## How Skills Work Together\n\nEvery skill reads shared context. The `voice-builder` skill is the foundation. Every other skill checks it first (via `about-me.md` and `voice.md`) before drafting a line.\n\n```\n                    ┌──────────────────────────────────────┐\n                    │           voice-builder              │\n                    │   about-me.md + voice.md             │\n                    │   (read by every skill below)        │\n                    └──────────────────┬───────────────────┘\n                                       │\n                    ┌──────────────────▼───────────────────┐\n                    │         newsletter-voice             │\n                    │   newsletter-voice.md                │\n                    │   (the source every piece comes from)│\n                    └──────────────────┬───────────────────┘\n                                       │\n     ┌────────────┬────────────┬───────┴───────┬────────────┬────────────┐\n     ▼            ▼            ▼               ▼            ▼            ▼\n┌──────────┐ ┌──────────┐ ┌──────────┐ ┌──────────────┐ ┌──────────┐ ┌──────────┐\n│ Profile  │ │LinkedIn  │ │ Video    │ │ Analytics &  │ │Community │ │Standalone│\n│          │ │ posts    │ │          │ │ Scoring      │ │          │ │          │\n├──────────┤ ├──────────┤ ├──────────┤ ├──────────────┤ ├──────────┤ ├──────────┤\n│profile-  │ │post-     │ │reels-    │ │post-scorer   │ │pinned-   │ │hook-gen  │\n│ optimizer│ │ writer   │ │ scripting│ │              │ │ comment  │ │content-  │\n│          │ │graphic-  │ │youtube-  │ │analytics-    │ │          │ │ matrix   │\n│          │ │ designer │ │ thumbnail│ │ dashboard    │ │          │ │niche-    │\n│          │ │          │ │          │ │              │ │          │ │ research │\n│          │ │post-form │ │          │ │              │ │          │ │gemini-*  │\n│          │ │          │ │          │ │              │ │          │ │quote-post│\n└──────────┘ └──────────┘ └──────────┘ └──────────────┘ └──────────┘ └──────────┘\n```\n\nSee each skill's `SKILL.md` for trigger phrases, inputs, and dependencies.\n\n## Available Skills\n\n<!-- SKILLS:START -->\n| Skill | Description |\n|---|---|\n| [voice-builder](skills/voice-builder/) | Build `about-me.md` and `voice.md` from an interview plus 3 to 5 writing samples. The foundation every other skill reads. |\n| [newsletter-voice](skills/newsletter-voice/) | Add newsletter-specific writing instructions on top of voice-builder. Produces `newsletter-voice.md`. |\n| [profile-optimizer](skills/profile-optimizer/) | Rebuild a LinkedIn profile for conversions. Headline, about, experience, featured section, plus 4 image generation prompts. |\n| [post-writer](skills/post-writer/) | Draft LinkedIn posts in your voice using the voice files. |\n| [graphic-designer](skills/graphic-designer/) | Pick between HTML/CSS graphic and AI-generated infographic based on the post content. |\n| [post-scorer](skills/post-scorer/) | Pull your post history via Apify and score any draft against what actually performs for you. |\n| [reels-scripting](skills/reels-scripting/) | Reverse-engineer an outlier Reel via Apify + Gemini 2.5 Flash. Write a new script in your voice from your newsletter. |\n| [youtube-thumbnail](skills/youtube-thumbnail/) | Turn a video title into a branded YouTube thumbnail prompt for Gemini. |\n| [pinned-comment](skills/pinned-comment/) | Meme-style pinned comments with a matching image generation prompt. |\n| [hook-generator](skills/hook-generator/) | 6 clickbait-style two-line hook variations per topic. |\n| [post-formatter](skills/post-formatter/) | Topic to ready-to-publish post using PAS, AIDA, BAB, STAR, or SLAY. |\n| [content-matrix](skills/content-matrix/) | Pair your pillars with 8 formats for 32+ post ideas in one table. Justin Welsh style. |\n| [niche-research](skills/niche-research/) | Drive Claude for Chrome to scroll Reddit, X, and Google with verified dates. Surfaces the 20 most relevant stories in your niche from the last 7 days. |\n| [gemini-infographic](skills/gemini-infographic/) | The whiteboard style that pulled 480k impressions from 3 posts. |\n| [gemini-carousel](skills/gemini-carousel/) | Slide-by-slide carousel generator with an approval gate. |\n| [quote-post](skills/quote-post/) | Claude writes the quote, Gemini recreates the image with the quote baked in. |\n| [analytics-dashboard](skills/analytics-dashboard/) | LinkedIn Analytics export to interactive React dashboard plus 5 data-backed recommendations. |\n<!-- SKILLS:END -->\n\n## Installation\n\n### Option 1: Claude Code plugin marketplace\n\n```bash\n# Add the marketplace\n/plugin marketplace add charlie947/social-media-skills\n\n# Install the plugin\n/plugin install social-media-skills\n```\n\n### Option 2: Clone and copy\n\n```bash\ngit clone https://github.com/charlie947/social-media-skills.git\ncp -r social-media-skills/skills/* ~/.claude/skills/\n```\n\n### Option 3: Individual skill upload (Claude Desktop)\n\nDownload any skill folder, zip it, and upload via Customise skills in Claude.\n\n```bash\ncd social-media-skills/skills\nzip -r voice-builder.skill voice-builder\n# Upload voice-builder.skill through Customise skills in the Claude app\n```\n\n### Option 4: Git submodule\n\n```bash\ngit submodule add https://github.com/charlie947/social-media-skills.git .agents/social-media-skills\n```\n\nThen reference skills from `.agents/social-media-skills/skills/`.\n\n### Option 5: Fork and customise\n\nFork the repo, swap the voice rules for your own, and clone your fork into your projects.\n\n## Usage\n\nRun `voice-builder` first. Every other skill needs `about-me.md` and `voice.md` to work properly.\n\nOnce installed, ask Claude to help with content tasks and it will pick the right skill:\n\n```\n\"Build my voice\" → voice-builder\n\"Write me a post about AI agents\" → post-writer\n\"Score this draft against my history\" → post-scorer\n\"Make me a carousel from this\" → gemini-carousel\n\"What should I post this week\" → niche-research or content-matrix\n\"Turn this outlier Reel into a script\" → reels-scripting\n\"I need a thumbnail for 'How I fired my team'\" → youtube-thumbnail\n\"Write me a pinned comment\" → pinned-comment\n```\n\n## Skill Categories\n\n### Voice foundation\n- `voice-builder` — interview + sample analysis, writes about-me.md and voice.md\n- `newsletter-voice` — newsletter-specific writing rules on top of voice-builder\n\n### LinkedIn\n- `profile-optimizer` — full profile rebuild\n- `post-writer` — drafts in your voice\n- `graphic-designer` — HTML/CSS graphic or AI infographic, auto-selected\n- `post-formatter` — topic to post via named framework (PAS, AIDA, BAB, STAR, SLAY)\n- `hook-generator` — 6 hook variations per topic\n- `post-scorer` — scores drafts against your post history\n- `content-matrix` — pillars x formats ideation\n- `niche-research` — 7-day niche research via Claude for Chrome\n- `gemini-infographic` — whiteboard style for Gemini\n- `gemini-carousel` — slide-by-slide carousel\n- `quote-post` — two-step quote workflow\n\n### Instagram Reels\n- `reels-scripting` — Apify + Gemini 2.5 Flash reference analysis, newsletter-aligned script\n\n### YouTube\n- `youtube-thumbnail` — title to Gemini thumbnail prompt\n\n### Community\n- `pinned-comment` — meme-style pin + image prompt\n\n### Analytics\n- `analytics-dashboard` — LinkedIn export to dashboard + 5 recommendations\n\n## Prerequisites\n\nA few skills need external services. Set these environment variables before use:\n\n| Variable | Needed for |\n|---|---|\n| `APIFY_API_TOKEN` | post-scorer, reels-scripting |\n| `GOOGLE_AI_API_KEY` | reels-scripting (Gemini 2.5 Flash video analysis) |\n\nSet them with:\n\n```bash\nexport APIFY_API_TOKEN=your_token\nexport GOOGLE_AI_API_KEY=your_key\n```\n\nThe image generation skills (`gemini-infographic`, `gemini-carousel`, `quote-post`, `youtube-thumbnail`, `profile-optimizer`) output ready-to-paste prompts. You run them in a separate Gemini chat with Create Image enabled. No API key needed.\n\n## Contributing\n\nPRs and issues welcome. See [CONTRIBUTING.md](CONTRIBUTING.md) for guidelines on adding or improving skills.\n\nRun `./validate-skills.sh` before submitting to check your skill against the spec.\n\n## License\n\n[MIT](LICENSE). Use these however you like. If they help you, a link back to the [newsletter](https://charliehills.substack.com) is appreciated.\n\n— Charlie\n","summary":"Social Media Skills for AI Agents is a collection of Claude‑compatible markdown “skills” that automate content creation across LinkedIn, Instagram, Substack, X, YouTube, and more, all driven from a single newsletter‑oriented voice. The framework begins with a base voice-builder skill that ingests interview notes and writing samples, then layers specialized skills such as profile optimizer, post writer, graphic designer, and analytics‑scorer to generate posts, images, and conversion‑focused LinkedIn profiles. Each skill reads shared context from the voice files, enabling consistent tone, platform constraints, and workflow logic across channels. The toolbox is ideal for marketers, content strategists, and AI developers who want to scale personalized, cross‑platform social media output without writing repetitive code.","description":null,"stars":794,"language":"Shell"},{"owner":"mattpocock","repo":"skills","url":"https://github.com/mattpocock/skills","readme":"<p>\n  <a href=\"https://www.aihero.dev/s/skills-newsletter\">\n    <picture>\n      <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://res.cloudinary.com/total-typescript/image/upload/v1777382277/skills-repo-dark_2x.png\">\n      <source media=\"(prefers-color-scheme: light)\" srcset=\"https://res.cloudinary.com/total-typescript/image/upload/v1777382277/skill-repo-light_2x.png\">\n      <img alt=\"Skills\" src=\"https://res.cloudinary.com/total-typescript/image/upload/v1777382277/skill-repo-light_2x.png\" width=\"369\">\n    </picture>\n  </a>\n</p>\n\n# Skills For Real Engineers\n\nMy agent skills that I use every day to do real engineering - not vibe coding.\n\nDeveloping real applications is hard. Approaches like GSD, BMAD, and Spec-Kit try to help by owning the process. But while doing so, they take away your control and make bugs in the process hard to resolve.\n\nThese skills are designed to be small, easy to adapt, and composable. They work with any model. They're based on decades of engineering experience. Hack around with them. Make them your own. Enjoy.\n\nIf you want to keep up with changes to these skills, and any new ones I create, you can join ~60,000 other devs on my newsletter:\n\n[Sign Up To The Newsletter](https://www.aihero.dev/s/skills-newsletter)\n\n## Quickstart (30-second setup)\n\n1. Run the skills.sh installer:\n\n```bash\nnpx skills@latest add mattpocock/skills\n```\n\n2. Pick the skills you want, and which coding agents you want to install them on. **Make sure you select `/setup-matt-pocock-skills`**.\n\n3. Run `/setup-matt-pocock-skills` in your agent. It will:\n   - Ask you which issue tracker you want to use (GitHub, Linear, or local files)\n   - Ask you what labels you apply to ticks when you triage them (`/triage` uses labels)\n   - Ask you where you want to save any docs we create\n\n4. Bam - you're ready to go.\n\n## Why These Skills Exist\n\nI built these skills as a way to fix common failure modes I see with Claude Code, Codex, and other coding agents.\n\n### #1: The Agent Didn't Do What I Want\n\n> \"No-one knows exactly what they want\"\n>\n> David Thomas & Andrew Hunt, [The Pragmatic Programmer](https://www.amazon.co.uk/Pragmatic-Programmer-Anniversary-Journey-Mastery/dp/B0833F1T3V)\n\n**The Problem**. The most common failure mode in software development is misalignment. You think the dev knows what you want. Then you see what they've built - and you realize it didn't understand you at all.\n\nThis is just the same in the AI age. There is a communication gap between you and the agent. The fix for this is a **grilling session** - getting the agent to ask you detailed questions about what you're building.\n\n**The Fix** is to use:\n\n- [`/grill-me`](./skills/productivity/grill-me/SKILL.md) - for non-code uses\n- [`/grill-with-docs`](./skills/engineering/grill-with-docs/SKILL.md) - same as [`/grill-me`](./skills/productivity/grill-me/SKILL.md), but adds more goodies (see below)\n\nThese are my most popular skills. They help you align with the agent before you get started, and think deeply about the change you're making. Use them _every_ time you want to make a change.\n\n### #2: The Agent Is Way Too Verbose\n\n> With a ubiquitous language, conversations among developers and expressions of the code are all derived from the same domain model.\n>\n> Eric Evans, [Domain-Driven-Design](https://www.amazon.co.uk/Domain-Driven-Design-Tackling-Complexity-Software/dp/0321125215)\n\n**The Problem**: At the start of a project, devs and the people they're building the software for (the domain experts) are usually speaking different languages.\n\nI felt the same tension with my agents. Agents are usually dropped into a project and asked to figure out the jargon as they go. So they use 20 words where 1 will do.\n\n**The Fix** for this is a shared language. It's a document that helps agents decode the jargon used in the project.\n\n<details>\n<summary>\nExample\n</summary>\n\nHere's an example [`CONTEXT.md`](https://github.com/mattpocock/course-video-manager/blob/076a5a7a182db0fe1e62971dd7a68bcadf010f1c/CONTEXT.md), from my `course-video-manager` repo. Which one is easier to read?\n\n- **BEFORE**: \"There's a problem when a lesson inside a section of a course is made 'real' (i.e. given a spot in the file system)\"\n- **AFTER**: \"There's a problem with the materialization cascade\"\n\nThis concision pays off session after session.\n\n</details>\n\nThis is built into [`/grill-with-docs`](./skills/engineering/grill-with-docs/SKILL.md). It's a grilling session, but that helps you build a shared language with the AI, and document hard-to-explain decisions in ADR's.\n\nIt's hard to explain how powerful this is. It might be the single coolest technique in this repo. Try it, and see.\n\n> [!TIP]\n> A shared language has many other benefits than reducing verbosity:\n>\n> - **Variables, functions and files are named consistently**, using the shared language\n> - As a result, the **codebase is easier to navigate** for the agent\n> - The agent also **spends fewer tokens on thinking**, because it has access to a more concise language\n\n### #3: The Code Doesn't Work\n\n> \"Always take small, deliberate steps. The rate of feedback is your speed limit. Never take on a task that’s too big.\"\n>\n> David Thomas & Andrew Hunt, [The Pragmatic Programmer](https://www.amazon.co.uk/Pragmatic-Programmer-Anniversary-Journey-Mastery/dp/B0833F1T3V)\n\n**The Problem**: Let's say that you and the agent are aligned on what to build. What happens when the agent _still_ produces crap?\n\nIt's time to look at your feedback loops. Without feedback on how the code it produces actually runs, the agent will be flying blind.\n\n**The Fix**: You need the usual tranche of feedback loops: static types, browser access, and automated tests.\n\nFor automated tests, a red-green-refactor loop is critical. This is where the agent writes a failing test first, then fixes the test. This helps give the agent a consistent level of feedback that results in far better code.\n\nI've built a **[`/tdd`](./skills/engineering/tdd/SKILL.md) skill** you can slot into any project. It encourages red-green-refactor and gives the agent plenty of guidance on what makes good and bad tests.\n\nFor debugging, I've also built a **[`/diagnose`](./skills/engineering/diagnose/SKILL.md)** skill that wraps best debugging practices into a simple loop.\n\n### #4: We Built A Ball Of Mud\n\n> \"Invest in the design of the system _every day_.\"\n>\n> Kent Beck, [Extreme Programming Explained](https://www.amazon.co.uk/Extreme-Programming-Explained-Embrace-Change/dp/0321278658)\n\n> \"The best modules are deep. They allow a lot of functionality to be accessed through a simple interface.\"\n>\n> John Ousterhout, [A Philosophy Of Software Design](https://www.amazon.co.uk/Philosophy-Software-Design-2nd/dp/173210221X)\n\n**The Problem**: Most apps built with agents are complex and hard to change. Because agents can radically speed up coding, they also accelerate software entropy. Codebases get more complex at an unprecedented rate.\n\n**The Fix** for this is a radical new approach to AI-powered development: caring about the design of the code.\n\nThis is built in to every layer of these skills:\n\n- [`/to-prd`](./skills/engineering/to-prd/SKILL.md) quizzes you about which modules you're touching before creating a PRD\n- [`/zoom-out`](./skills/engineering/zoom-out/SKILL.md) tells the agent to explain code in the context of the whole system\n\nAnd crucially, [`/improve-codebase-architecture`](./skills/engineering/improve-codebase-architecture/SKILL.md) helps you rescue a codebase that has become a ball of mud. I recommend running it on your codebase once every few days.\n\n### Summary\n\nSoftware engineering fundamentals matter more than ever. These skills are my best effort at condensing these fundamentals into repeatable practices, to help you ship the best apps of your career. Enjoy.\n\n## Reference\n\n### Engineering\n\nSkills I use daily for code work.\n\n- **[diagnose](./skills/engineering/diagnose/SKILL.md)** — Disciplined diagnosis loop for hard bugs and performance regressions: reproduce → minimise → hypothesise → instrument → fix → regression-test.\n- **[grill-with-docs](./skills/engineering/grill-with-docs/SKILL.md)** — Grilling session that challenges your plan against the existing domain model, sharpens terminology, and updates `CONTEXT.md` and ADRs inline.\n- **[triage](./skills/engineering/triage/SKILL.md)** — Triage issues through a state machine of triage roles.\n- **[improve-codebase-architecture](./skills/engineering/improve-codebase-architecture/SKILL.md)** — Find deepening opportunities in a codebase, informed by the domain language in `CONTEXT.md` and the decisions in `docs/adr/`.\n- **[setup-matt-pocock-skills](./skills/engineering/setup-matt-pocock-skills/SKILL.md)** — Scaffold the per-repo config (issue tracker, triage label vocabulary, domain doc layout) that the other engineering skills consume. Run once per repo before using `to-issues`, `to-prd`, `triage`, `diagnose`, `tdd`, `improve-codebase-architecture`, or `zoom-out`.\n- **[tdd](./skills/engineering/tdd/SKILL.md)** — Test-driven development with a red-green-refactor loop. Builds features or fixes bugs one vertical slice at a time.\n- **[to-issues](./skills/engineering/to-issues/SKILL.md)** — Break any plan, spec, or PRD into independently-grabbable GitHub issues using vertical slices.\n- **[to-prd](./skills/engineering/to-prd/SKILL.md)** — Turn the current conversation context into a PRD and submit it as a GitHub issue. No interview — just synthesizes what you've already discussed.\n- **[zoom-out](./skills/engineering/zoom-out/SKILL.md)** — Tell the agent to zoom out and give broader context or a higher-level perspective on an unfamiliar section of code.\n\n### Productivity\n\nGeneral workflow tools, not code-specific.\n\n- **[caveman](./skills/productivity/caveman/SKILL.md)** — Ultra-compressed communication mode. Cuts token usage ~75% by dropping filler while keeping full technical accuracy.\n- **[grill-me](./skills/productivity/grill-me/SKILL.md)** — Get relentlessly interviewed about a plan or design until every branch of the decision tree is resolved.\n- **[write-a-skill](./skills/productivity/write-a-skill/SKILL.md)** — Create new skills with proper structure, progressive disclosure, and bundled resources.\n\n### Misc\n\nTools I keep around but rarely use.\n\n- **[git-guardrails-claude-code](./skills/misc/git-guardrails-claude-code/SKILL.md)** — Set up Claude Code hooks to block dangerous git commands (push, reset --hard, clean, etc.) before they execute.\n- **[migrate-to-shoehorn](./skills/misc/migrate-to-shoehorn/SKILL.md)** — Migrate test files from `as` type assertions to @total-typescript/shoehorn.\n- **[scaffold-exercises](./skills/misc/scaffold-exercises/SKILL.md)** — Create exercise directory structures with sections, problems, solutions, and explainers.\n- **[setup-pre-commit](./skills/misc/setup-pre-commit/SKILL.md)** — Set up Husky pre-commit hooks with lint-staged, Prettier, type checking, and tests.\n","summary":"Skills For Real Engineers provides a set of lightweight, composable prompts that let developers keep control while using AI coding agents. The toolkit installs quickly, configures issue trackers and label conventions, and generates documentation, while interactive skills such as /grill‑me and /grill‑with‑docs guide the agent through detailed questions to avoid misalignment. By tightening communication, reducing verbosity, and standardizing terminology, the project helps engineers, product owners, and AI‑augmented developers produce code that truly matches their intent. Updates and new skills are shared through a newsletter, keeping users in the loop as new capabilities are added.","description":"Skills for Real Engineers. Straight from my .claude directory.","stars":60548,"language":"Shell"},{"owner":"kwakseongjae","repo":"oh-my-design","url":"https://github.com/kwakseongjae/oh-my-design","readme":"<p align=\"center\">\n  <img src=\"logo-bg.png\" width=\"480\" alt=\"oh-my-design\" />\n</p>\n\n<h1 align=\"center\">oh-my-design</h1>\n\n<p align=\"center\">\n  <strong>One-command bootstrap for skill-driven design with your AI coding agent.</strong> 67 real company design systems. Zero AI calls in the install. Then you just talk to your agent.\n</p>\n\n<p align=\"center\">\n  <a href=\"https://www.npmjs.com/package/oh-my-design-cli\"><img src=\"https://img.shields.io/npm/v/oh-my-design-cli?style=flat-square&color=cb3837\" alt=\"npm version\" /></a>\n  <a href=\"https://www.npmjs.com/package/oh-my-design-cli\"><img src=\"https://img.shields.io/npm/dm/oh-my-design-cli?style=flat-square&color=cb3837\" alt=\"npm downloads\" /></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/github/license/kwakseongjae/oh-my-design?style=flat-square\" alt=\"License\" /></a>\n  <a href=\"https://github.com/kwakseongjae/oh-my-design/stargazers\"><img src=\"https://img.shields.io/github/stars/kwakseongjae/oh-my-design?style=social\" alt=\"GitHub Stars\" /></a>\n  <img src=\"https://img.shields.io/badge/references-67-7c5cfc?style=flat-square\" alt=\"67 References\" />\n  <img src=\"https://img.shields.io/badge/CLI%20commands-1-blue?style=flat-square\" alt=\"One CLI command\" />\n</p>\n\n---\n\n## What is this?\n\n**oh-my-design (OmD)** turns your AI coding agent (Claude Code / Codex / OpenCode / Cursor) into a senior product designer with a working memory of your brand. You install once. After that, you just describe what you want — components, screens, copy, assets, charts — and the agent applies your project's design system, picks the right asset medium, and ships.\n\n`DESIGN.md` is the brand spec ([Google Stitch](https://stitch.withgoogle.com/docs/design-md/overview/) tokens + the OmD v0.1 brand-philosophy layer: Voice / Narrative / Principles / Personas / States / Motion). 67 real-company DESIGN.md files ship in this package. Pick one, customize through conversation, ship.\n\n**No API keys. No external infra. Everything runs inside your existing CLI session.**\n\n## Install\n\n```bash\ncd my-project\nnpx oh-my-design-cli install-skills\n```\n\nThen restart your agent (Cmd+Q in Claude Code, then relaunch) so the new skills + agents are loaded.\n\nThat is the only CLI command you will run. Everything else is natural language to your agent.\n\n## How you use it\n\nOpen Claude Code (or Codex / OpenCode) in your project. Just talk:\n\n> \"Set up the
