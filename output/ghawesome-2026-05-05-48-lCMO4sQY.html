 Kiro loads it at session start for every interaction in the workspace.\n\nFor `print-only` and `multi-file-required`, the JSON output carries `manual_step_required: true` and `enabled: false`; exit code stays 0 (the CLI did everything it can do) and the first line of human output is exactly `manual step required:` followed by the specific action.\n\n</details>\n\n<details>\n<summary><b>Per-surface install table (v0.3.5 primary set)</b></summary>\n<br>\n\n| Tool | install_mode | Target path |\n| --- | --- | --- |\n| Claude Code | `import-marker` | `CLAUDE.md` (marker block with `@.agent-style/claude-code.md`) |\n| AGENTS.md (Codex, Jules, Zed, Warp, Gemini CLI, VS Code, and others) | `append-block` | `AGENTS.md` at repo root |\n| GitHub Copilot (repo-wide) | `append-block` | `.github/copilot-instructions.md` |\n| GitHub Copilot (path-scoped) | `owned-file` | `.github/instructions/agent-style.instructions.md` |\n| Cursor | `owned-file` | `.cursor/rules/agent-style.mdc` |\n| Anthropic Skills | `owned-file` | `.claude/skills/agent-style/SKILL.md` |\n| Codex (API / manual paste) | `print-only` | `.agent-style/codex-system-prompt.md` (user pastes into API system prompt) |\n| Aider | `multi-file-required` | `.agent-style/aider-conventions.md` + `.aider.conf.yml` snippet |\n| Kiro (AWS IDE) | `owned-file` | `.kiro/steering/agent-style.md` |\n| **style-review** (skill) | `skill-with-references` | `.claude/skills/style-review/SKILL.md` + `.agent-style/skills/style-review/references/` |\n\nAmazon Q Developer, JetBrains AI Assistant, Windsurf, Ollama, Replit, OpenCode, Continue.dev, Tabnine, OpenAI Agents SDK skills, and Copilot path-scoped variants beyond the above are planned for v1.1; see the \"Planned adapters\" section of [`adapter-matrix.md`](adapter-matrix.md).\n\n</details>\n\n<details>\n<summary><b>No-install path: pinned <code>curl</code> recipe</b></summary>\n<br>\n\nSkip the package install; pin to a specific release so adapters and `RULES.md` stay consistent:\n\n```bash\nAGENT_STYLE_REF=v0.3.5\nmkdir -p .agent-style\ncurl -fsSLo .agent-style/RULES.md       \"https://raw.githubusercontent.com/yzhao062/agent-style/${AGENT_STYLE_REF}/RULES.md\"\ncurl -fsSLo .agent-style/claude-code.md \"https://raw.githubusercontent.com/yzhao062/agent-style/${AGENT_STYLE_REF}/agents/claude-code.md\"\n```\n\nThen add ONE line to your `CLAUDE.md` (create the file only if absent; never overwrite):\n\n```text\n@.agent-style/claude-code.md\n```\n\nFor other surfaces, substitute the adapter filename. The `curl` commands only write under `.agent-style/`; the one-line import is the only edit you make to files you own.\n\n</details>\n\n### 2. Skill — `style-review` (opt-in second pass)\n\nTwo ways to use it depending on whether you have a skill-capable host:\n\n```bash\n# Skill-host path (Claude Code / Anthropic Skills): install once, then /style-review <file>\nagent-style enable style-review                       # auto-detects active skill-capable surfaces\n# inside Claude Code:\n/style-review DESIGN.md\n\n# CLI path (works anywhere pip/npm runs; no skill host needed):\nagent-style review DESIGN.md                          # human-readable audit\nagent-style review DESIGN.md --audit-only             # machine-readable JSON\nagent-style review --compare a.md b.md                # A/B delta per rule\n```\n\n**What happens on `/style-review DESIGN.md`** (skill path):\n\n1. Deterministic audit of the file against all 21 rules.\n2. Skill asks: *\"produce a polished draft at `DESIGN.reviewed.md`?\"*\n3. On yes: writes a revised copy beside the original and shows the diff. **Source file is never touched.**\n\n**What you get from `agent-style review DESIGN.md`** (CLI path): the same deterministic audit — mechanical + structural detectors for em-dashes, jargon, transition openers, clichés, contractions, sentence length, bullet overuse, same-starts, paragraph closers. Semantic rules (vague claims, unsupported claims, etc.) return `status: \"skipped\"` because they need a skill host's model. No polish from the plain CLI.\n\nSee the [Does It Work?](#does-it-work) section above for measured mechanical-violation reductions on Claude Opus 4.7 and OpenAI GPT-5.4.\n\n<details>\n<summary><b>Skill workflow in detail (what the SKILL.md tells Claude Code to do)</b></summary>\n<br>\n\n1. Shells out to `agent-style review --audit-only DESIGN.md` for the deterministic audit (same JSON as the CLI path).\n2. Adds semantic judgment via the host model for the 7 rules that need context-aware reasoning: RULE-01 curse of knowledge, RULE-03 vague language, RULE-04 needless words, RULE-08 uncalibrated claims, RULE-11 stress position, RULE-F term drift, RULE-H citation discipline.\n3. Merges deterministic + semantic scorecard; reports per-rule counts and first 5 violations each.\n4. Asks the user: *\"produce a polished draft at DESIGN.reviewed.md?\"*\n5. On yes, composes a revision prompt using `references/revision-prompt.md` with hard invariants:\n   - **No new facts, metrics, citations, links, or code behavior** not in the source.\n   - Preserve Markdown structure (code fences, tables, frontmatter, links, heading levels, list nesting).\n   - Preserve meaning and length budget.\n6. Writes `DESIGN.reviewed.md` alongside `DESIGN.md`.\n7. Re-audits the revised draft; shows before → after scorecard and `diff DESIGN.md DESIGN.reviewed.md`.\n\nSource file is never touched. You merge hunks from the `.reviewed.md` by hand.\n\n</details>\n\n<details>\n<summary><b>Uninstall</b></summary>\n<br>\n\nPer-tool disable:\n\n```bash\nagent-style disable claude-code                       # or any other tool you enabled\nagent-style disable style-review                      # manifest-based safe removal\n```\n\nFor `style-review`, disable reads `.agent-style/skills/style-review/manifest.json`, removes only files whose current sha256 still matches (leaves user-edited files alone and reports them as `drifted`), and cleans up empty directories. Never touches `.agent-style/RULES.md` or other-tool adapters.\n\nFull cleanup of the shared `.agent-style/` data (after disabling every tool you enabled):\n\n```bash\nrm -rf .agent-style/                                   # POSIX\nRemove-Item -Recurse -Force .agent-style               # PowerShell\n```\n\n</details>\n\n<details>\n<summary><b>Self-verification probe</b></summary>\n<br>\n\nAfter running `agent-style enable <tool>`, ask your agent:\n\n> Is agent-style active?\n\nExpected reply:\n\n> agent-style v0.3.5 active: 21 rules (RULE-01..12 canonical + RULE-A..I field-observed); full bodies at .agent-style/RULES.md.\n\nFor `style-review` specifically, ask:\n\n> Is style-review active?\n\nExpected reply:\n\n> style-review active: audit 21 rules (deterministic: RULE-B, D, G, I, 12, 05, 06, A, C, E; semantic via host: RULE-01, 03, 04, 08, 11, F, H); workflow at skills/style-review/SKILL.md.\n\nIf the version string or rule count is missing, the file is on disk but not in your agent's active context. Check that your tool's instruction-file reload behavior picked up the new content (some tools require a session restart).\n\n</details>\n\n<details>\n<summary><b>Complementary Post-Hoc Linting</b></summary>\n<br>\n\nThis repo is read at generation time. For a linter that runs over committed prose in CI, see [ProseLint](https://github.com/amperser/proselint); per-rule check-ID mappings are in [`enforcement/proselint-map.md`](enforcement/proselint-map.md). Vale users can plug ProseLint via its existing style-pack ecosystem.\n\n</details>\n\n### 3. Bundled via [anywhere-agents](https://github.com/yzhao062/anywhere-agents) (zero-config)\n\nIf your project already uses [`anywhere-agents`](https://github.com/yzhao062/anywhere-agents) — a maintained agent configuration for Claude Code, Codex, and other AGENTS.md-compliant tools — `agent-style` is the default rule pack: no `enable` step needed. The `anywhere-agents` bootstrap fetches agent-style's canonical rules at a pinned git tag and composes them into your project's `AGENTS.md` automatically on every run.\n\n```bash\npipx run anywhere-agents   # Python path\nnpx anywhere-agents        # Node.js path\n```\n\nOpt out by adding `rule_packs: []` to `agent-config.yaml` at your project root; pin to a specific ref or swap for a fork via `rule_packs: - name: agent-style\\n    ref: <tag>`. See [anywhere-agents rule-pack composition docs](https://github.com/yzhao062/anywhere-agents/blob/main/docs/rule-pack-composition.md) for the full contract.\n\n### v0.3.0 Roadmap\n\nPlanned CLI additions: `agent-style update` (refresh installed adapters to latest), `agent-style override <RULE-ID> disable` (per-rule opt-out), `agent-style clean` (one-command uninstall), `.agent-style/config.toml` (project-level config), RULE-02 / 07 / 09 / 10 structural detectors filled in, and filled adapters for the planned-adapter set above (v1.1). Track progress in [`CHANGELOG.md`](CHANGELOG.md).\n\n<details>\n<summary><b>Curation and method</b></summary>\n<br>\n\nThe 12 canonical rules are not a generated digest of the four source works. I read each source, extracted the rules most applicable to English technical prose, filtered for AI-agent failure modes I had seen in practice, and phrased each rule using the negative-versus-positive split that Zhang et al. 2026 found empirically effective for coding-agent instructions. Rules that are supported by a source but that do not map to a concrete AI-R&D failure mode are excluded. The intersection is what this repo ships as the canonical set.\n\nThe 9 field-observed rules (`RULE-A` through `RULE-I`) come from my own observation of AI output across dozens of writing projects and code releases, 2022 to 2026. Each pattern appeared often enough across distinct projects to warrant a named rule. These rules are labeled transparently as field observations in `RULES.md` and sit next to the canonical rules in all adapter files.\n\nNew contributions are welcome. A canonical-track rule must cite a source from the writing-authority bucket or the agent-instruction-evidence bucket below, include BAD/GOOD examples drawn from real technical-prose output, and include a rationale for why the rule matters specifically for AI-agent-generated prose. I curate field-observed rule additions to keep the list tight.\n\n</details>\n\n<details>\n<summary><b>Canonical sources</b></summary>\n<br>\n\nFour writing authorities for prose content, plus two recent empirical papers for rule format and phrasing. Every one of the 12 canonical rules cites its source explicitly; **I verified every citation against the original work, not scraped or summarized from search results.** When the final text disagrees with an authority, the disagreement is stated in the rule's rationale.\n\n#### Writing Authorities (Prose Content)\n\n1. **Strunk, W., Jr., & White, E. B. (1959).** *The Elements of Style* (revised from Strunk 1918). The Macmillan Company. Especially Part II, \"Elementary Principles of Composition\" (§§12-22).\n2. **Orwell, G. (1946).** \"Politics and the English Language.\" *Horizon*, April 1946. Public domain; freely available online.\n3. **Pinker, S. (2014).** *The Sense of Style: The Thinking Person's Guide to Writing in the 21st Century*. Viking. Especially Ch. 2 (classic style), Ch. 3 (curse of knowledge), Ch. 6 (calibrated claims).\n4. **Gopen, G. D., & Swan, J. A. (1990).** \"The Science of Scientific Writing.\" *American Scientist*, 78(6), pp. 550-558.\n\n#### Agent-Instruction Evidence (Rule Format and Phrasing)\n\n5. **Zhang, X. et al. (2026).** \"Do Agent Rules Shape or Distort? Guardrails Beat Guidance in Coding Agents.\" arXiv:2604.11088. 25,532 rules across 679 instruction files; motivates negative-constraint phrasing for anti-pattern rules.\n6. **Bohr, J. (2025).** \"Show and Tell: Prompt Strategies for Style Control in Multi-Turn LLM Code Generation.\" arXiv:2511.13972. Motivates the directive + BAD/GOOD example format used throughout `RULES.md`.\n\nSee [`SOURCES.md`](SOURCES.md) for the full bibliography and recommended reading ranges per source.\n\n</details>\n\n## License\n\nDual license with file-level SPDX boundaries:\n\n| Content | License |\n| --- | --- |\n| `RULES.md`, `SOURCES.md`, `NOTICE.md`, `agents/`, `adapter-matrix.md` | [CC BY 4.0](LICENSES/CC-BY-4.0.txt) |\n| `enforcement/`, `.github/workflows/`, generator scripts | [MIT](LICENSES/MIT.txt) |\n\nEvery source file carries an SPDX-License-Identifier header. See [`NOTICE.md`](NOTICE.md) for the attribution snippet consumers should retain on reuse.\n\n## Maintenance\n\nMaintained by [Yue Zhao](https://yzhao062.github.io), USC CS faculty and author of [PyOD](https://github.com/yzhao062/pyod). Issues and pull requests welcome; contributions that add a canonical rule must cite a source from the buckets above. See [`CHANGELOG.md`](CHANGELOG.md) for release history and upcoming work.\n\n<div align=\"center\">\n\n<a href=\"#readme-top\">↑ back to top</a>\n\n</div>\n","summary":"**Agent‑Style** is a lightweight library that embeds a set of 21 English‑writing rules—12 drawn from classic style guides and 9 derived from observed LLM failures—directly into the generation process of AI agents, rather than applying them post‑hoc. It supplies a runtime clause that monitors and restructures drafts for API docs, design docs, research papers and grant proposals, ensuring adherence to canonical principles like clarity, brevity, and citation discipline while also capturing field‑specific failures such as curse‑of‑knowledge and over‑summarisation. The project ships as a Python package and an npm module, providing example before‑and‑after snippets and a `agent-style review` tool to quantify style compliance. It is ideal for AI prompt engineers, technical writers, and researchers who need their agents to produce clean, disciplined technical prose at the moment of creation.","description":"21 writing rules for AI coding and writing agents. Drop-in for Claude Code, Codex, Copilot, Cursor, and Aider, so their output reads like a tech pro.","stars":405,"language":"Python"},{"owner":"Dubibubii","repo":"usage-limit-reducer","url":"https://github.com/Dubibubii/usage-limit-reducer","readme":"# usage-limit-reducer\n\nA Claude Code skill that stops you from burning through your usage limit.\n\nClaude re-reads the entire conversation on every turn. One developer measured it: **98.5% of his tokens went to re-reading history, only 1.5% to generating responses.** This skill diagnoses where your tokens are actually going and applies Dubi's 11 rules for cutting usage — using real data from the JSONL logs Claude Code already writes to your disk.\n\n## What it does\n\nWhen you trigger the skill, it:\n\n1. **Measures** — runs `scripts/usage-report.py` against `~/.claude/projects/*/*.jsonl` and shows token/cost breakdowns by model, project, and day (with cache-hit % and heuristic callouts).\n2. **Diagnoses** the current session — conversation length, `CLAUDE.md` presence, model in use.\n3. **Applies** the 2–4 rules most relevant to what it finds. No dumping all 11 on you.\n4. **Suggests** concrete next actions (`/compact`, `/clear`, `/model claude-haiku-4-5`, create CLAUDE.md, etc.) and acts only on confirmation.\n\n## Install\n\n```bash\ngit clone <this-repo> ~/.claude/skills/usage-limit-reducer\n```\n\nOr, if you already cloned it elsewhere:\n\n```bash\ncp -r . ~/.claude/skills/usage-limit-reducer/\n```\n\nRestart Claude Code. It will show up in the skills list and auto-trigger on phrases like:\n\n- \"hit my limit\" / \"usage limit\" / \"running out of tokens\"\n- \"save tokens\" / \"reduce usage\" / \"am I wasting tokens\"\n- \"this chat is getting long\"\n- \"which model should I use\"\n\nYou can also invoke it directly: `/usage-limit-reducer`.\n\n## Standalone: the token report\n\nThe script is useful on its own, outside the skill:\n\n```bash\npython3 ~/.claude/skills/usage-limit-reducer/scripts/usage-report.py --days 7\npython3 ~/.claude/skills/usage-limit-reducer/scripts/usage-report.py --days 30 --project myrepo\npython3 ~/.claude/skills/usage-limit-reducer/scripts/usage-report.py --json   # machine-readable\n```\n\nExample output:\n\n```\nClaude Code usage — last 7 day(s)\n------------------------------------------------------------------------\nTurns:        110\nInput:        274 fresh  +  6.16M cache-read  +  934.3K cache-write\nOutput:       152.9K\nCache hit:    86.8% of input tokens came from cache\nEstimated $:  ~$38.22 (API list prices; subscription is flat)\n\nBy model (top by cost):\n  claude-opus-4-7     turns= 109  in=   274  out= 152.9K  cache_r= 6.16M (86.8%)  ~$38.22\n\nHeuristics:\n  - Cache hit is 86.8% — healthy.\n  - Opus is 100% of spend. Consider Haiku (/model claude-haiku-4-5) for simple edits.\n```\n\n**What's read:** every JSONL file under `~/.claude/projects/`. **What leaves your machine:** nothing. No network calls.\n\n**Pricing note:** the `$` figure uses API list prices as a relative-comparison tool. If you're on a Claude Code subscription plan, billing is flat — treat the number as \"what this would cost on the API.\"\n\n## The 11 rules, and what each maps to\n\n| # | Rule | Implementation in Claude Code |\n|---|------|-------------------------------|\n| 1 | Don't follow up to correct — restart | Skill suggests `/clear` + re-prompt instead of piling on corrections |\n| 2 | Fresh chat every 15–20 turns | Skill suggests `/compact` or `/clear` + paste summary |\n| 3 | Batch questions into one message | Skill coaches on combining related asks |\n| 4 | Track actual token usage | **`scripts/usage-report.py`** — reads local JSONL logs |\n| 5 | Reuse recurring context | Skill points at `CLAUDE.md`, skills, `.context/` |\n| 6 | Set up memory / user preferences | Skill checks for `CLAUDE.md`, offers to create it |\n| 7 | Turn off features you don't use | Skill flags unused MCPs/hooks in `settings.json` |\n| 8 | Use Haiku for simple tasks | Skill recommends `/model claude-haiku-4-5` when Opus share is high |\n| 9 | Spread work across the day | Skill advises splitting into 2–3 sessions (5-hour rolling window) |\n| 10 | Work off-peak | Skill flags peak hours (5–11am PT / 8am–2pm ET weekdays) |\n| 11 | Enable Overage as a safety net | Skill mentions the Settings → Usage option on Pro/Max |\n\n**Not implementable in Claude Code** (flagged honestly by the skill):\n\n- Rule #1's \"edit the original prompt\" is a claude.ai web UI feature.\n- Rule #5's \"upload to Projects\" is also web-only.\n- Rule #11's Overage toggle is plan-level.\n\n## Layout\n\n```\nusage-limit-reducer/\n├── SKILL.md                  # what Claude reads when the skill triggers\n├── README.md                 # this file (for humans)\n└── scripts/\n    ├── usage-report.py       # the local token dashboard\n    └── test_usage_report.py  # 16 unit + CLI tests\n```\n\n## Tests\n\n```bash\npython3 scripts/test_usage_report.py\n```\n\nCovers price lookups, aggregation math, `--days` cutoff, `--project` filter, malformed-JSONL handling, CLI text/JSON output, and a regression test for the `defaultdict(lambda: dict(totals))` shared-state bug.\n\n## Credit\n\nThe 11 rules are from Dubi's article. This skill just wires them into Claude Code with real measurement.\n","summary":"The **usage-limit-reducer** skill for Claude Code automatically audits and reports how your tokens are spent, showing detailed breakdowns by model, project, and day directly from local JSONL logs without any network calls. It diagnoses the current session—conversation length, model in use, presence of a CLAUDE.md—and then applies the most relevant of Dubi’s 11 token‑saving rules, offering concrete next actions such as `/compact`, `/clear`, switching to a cheaper model, or creating a CLAUDE.md file. Targeted at Claude Code users who want to avoid “burning through” their usage limits, the skill integrates with common trigger phrases and can be invoked manually or used as a standalone token‑reporting script. By highlighting cache efficiency and cost estimates, it empowers developers and power‑users to keep token usage low and predictable.","description":"A Claude Code skill that stops you from burning through your usage limit.","stars":129,"language":"Python"},{"owner":"rampstackco","repo":"claude-skills","url":"https://github.com/rampstackco/claude-skills","readme":"<div align=\"center\">\n\n<img src=\"docs/rampstack-complete-banner.jpg\" alt=\"Complete Claude Skills for the full web lifecycle. Build, ship, audit, optimize.\" />\n\n# Brand Build Skills for Claude\n\n**A complete, opinionated library of [Claude Skills](https://docs.claude.com/en/docs/agents-and-tools/agent-skills/overview) covering the full lifecycle of building, launching, running, and growing a brand and a website.**\n\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](LICENSE)\n[![PRs Welcome](https://img.shields.io/badge/PRs-welcome-brightgreen.svg)](CONTRIBUTING.md)\n[![Skills](https://img.shields.io/badge/Skills-69-blue.svg)](#the-69-skill-catalog)\n[![Made for Claude](https://img.shields.io/badge/Made%20for-Claude-orange.svg)](https://claude.ai)\n\n[![Website](https://img.shields.io/badge/rampstack.co-FF6B35?style=for-the-badge&logo=googlechrome&logoColor=white)](https://rampstack.co)\n[![LinkedIn](https://img.shields.io/badge/LinkedIn-0A66C2?style=for-the-badge&logo=linkedin&logoColor=white)](https://linkedin.com/company/rampstack/)\n[![X](https://img.shields.io/badge/Follow-000000?style=for-the-badge&logo=x&logoColor=white)](https://x.com/RampStackco)\n[![Facebook](https://img.shields.io/badge/Facebook-1877F2?style=for-the-badge&logo=facebook&logoColor=white)](https://facebook.com/rampstack)\n\n</div>\n\n<!-- COUNT_INTRO:START -->\n> 69 stack-agnostic skills covering brand, design, content, SEO, dev, ops, growth, and research. Includes an Ahrefs MCP-powered SEO audit suite. Use them on Next.js, WordPress, Shopify, Webflow, plain HTML, or anything else.\n<!-- COUNT_INTRO:END -->\n\n*Featured in [awesome-claude-skills](https://github.com/ComposioHQ/awesome-claude-skills) under Business & Marketing.*\n\n---\n\n## Table of contents\n\n- [What are Claude Skills?](#what-are-claude-skills)\n- [What is in this library](#what-is-in-this-library)\n- [See it in action](#see-it-in-action)\n- [Getting started](#getting-started)\n- [Quick example](#quick-example)\n- [How they compose](#how-they-compose)\n<!-- COUNT_TOC:START -->\n- [The 69-skill catalog](#the-69-skill-catalog)\n<!-- COUNT_TOC:END -->\n- [Recommended MCPs](#recommended-mcps)\n- [Authoring conventions](#authoring-conventions)\n- [Repository structure](#repository-structure)\n- [Contributing](#contributing)\n- [Resources](#resources)\n- [License](#license)\n\n---\n\n## What are Claude Skills?\n\nClaude Skills are reusable capability packages that teach Claude how to handle a specific kind of task with a consistent framework, vocabulary, and output format. Each skill is a folder containing a `SKILL.md` (instructions plus YAML metadata) and optional reference files (templates, checklists, worked examples). Claude loads a skill automatically when a user request matches the skill's description.\n\nSkills work across [Claude.ai](https://claude.ai), [Claude Code](https://docs.claude.com/en/docs/claude-code/overview), and the [Anthropic API](https://docs.claude.com/en/api/agent-skills). Once you write a skill, it is portable across all three.\n\nFor the official deep dive, see [Anthropic's Agent Skills documentation](https://docs.claude.com/en/docs/agents-and-tools/agent-skills/overview).\n\n---\n\n## What is in this library\n\nThis is not a curated list of other people's skills. It is a single, opinionated library where every skill follows the same structure and conventions, so the skills compose cleanly across a real project lifecycle.\n\nWhat you get:\n\n<!-- COUNT_WHATYOUGET:START -->\n- **69 skills** across 15 categories, every one with a complete `SKILL.md` and at least one reference file\n- **160 reference files** (templates, checklists, decision matrices, worked examples)\n<!-- COUNT_WHATYOUGET:END -->\n- **Stack-agnostic.** Works on any web stack. The only named-tool exception is the SEO audit suite, which assumes the Ahrefs MCP.\n- **Future-proof.** Principles over tools. Stable concepts over trending techniques. References to durable specs (W3C, WHATWG, Schema.org, MDN, NN/g, WCAG) over content that ages with each algorithm update.\n- **Uniform structure.** Every skill uses the same section order, the same tone, and the same authoring conventions. Predictable in, predictable out.\n- **Composable.** Skills reference each other. `creative-brief` points to `brand-voice`. `incident-response` points to `monitoring-and-alerting`. Each skill's \"When NOT to use\" tells you which sibling fits your adjacent work.\n\nHighlight categories: brand strategy, design systems, content production, full SEO suite, frontend dev, accessibility, performance, QA, launch and incident ops, growth and CRO, UX research, plus a meta-skill that teaches you to write your own.\n\n---\n\n## See it in action\n\n**[The creative-direction skill rendered as a live showcase →](https://rampstack.co/showcase/creative-direction)**\n\nThirty fictional brands generated from briefs that all use the same skill. Each is a fully styled brand site, not a mockup. The showcase demonstrates what the four-axis framework produces in practice and lets you filter by axis position to see how each combination renders.\n\n<p align=\"center\">\n  <img src=\"assets/showcase/showcase-grid-hero.png\" alt=\"Showcase grid of brand archetypes including Pulse, Volt, Anode, Drift, and others, with type and motion intensity filter pills above the cards.\" />\n</p>\n\n### Filter by any axis position\n\nThe skill defines four axes: tone, aesthetic, relationship, sensory. The showcase lets you filter by any combination and see which examples match. Pre-filtered URLs deep-link from the [SKILL.md](skills/creative-direction/SKILL.md) and [axes-explained reference](skills/creative-direction/references/axes-explained.md), so you can read about a position and click straight through to the rendered examples.\n\n<p align=\"center\">\n  <img src=\"assets/showcase/showcase-filter-active.png\" alt=\"Showcase grid filtered by Tone equals Provocative and Sensory equals Resonant, showing eight matching brand cards with the axis disclosure auto-expanded.\" />\n</p>\n\n### The empty state is the lesson\n\nThe framework is generative. The showcase is illustrative. Most rare-but-powerful combinations are valid creative choices that simply have not been built yet. Set Provocative + Editorial Restrained + Coach + Resonant and the grid is empty.\n\n<p align=\"center\">\n  <img src=\"assets/showcase/showcase-empty-state.png\" alt=\"Showcase grid with all four axis filters set to Provocative, Editorial Restrained, Coach, and Resonant, showing zero matching examples and the empty state copy: No example yet. The framework allows this combination, it just hasn't been built as one of the thirty worked examples.\" />\n</p>\n\n### The framework's range\n\nSame skill, same brief format. Four completely different visual systems. Notice that Pulse and Bloom share identical axis positions yet read as opposite visual languages. The reference brands and aesthetic interpretation do the rest.\n\n<table>\n  <tr>\n    <td width=\"50%\"><img src=\"assets/showcase/archetype-pulse.png\" alt=\"Pulse music streaming brand. Saturated gradient hero with the headline 'Sound that moves with you' and pink-to-cyan equalizer bars below.\" /></td>\n    <td width=\"50%\"><img src=\"assets/showcase/archetype-forge-fitness.png\" alt=\"Forge boutique fitness studio. Dark industrial hero with intense typography and motivational copy.\" /></td>\n  </tr>\n  <tr>\n    <td><strong>Pulse</strong> · music streaming<br/><em>Sound that moves with you.</em><br/>Playful / Expressive Maximalist / Companion / Resonant</td>\n    <td><strong>Forge</strong> · boutique fitness<br/><em>Show up. Get hammered.</em><br/>Provocative / Expressive Maximalist / Coach / Resonant</td>\n  </tr>\n  <tr>\n    <td><img src=\"assets/showcase/archetype-bloom-soda.png\" alt=\"Bloom adaptogenic soda brand. Peachy gradient hero with tri-color headline 'Soda that loves you back' and a strawberries-around-soda-can product photo.\" /></td>\n    <td><img src=\"assets/showcase/archetype-observatory-editorial.png\" alt=\"Observatory Editorial. Cream paper hero with restrained serif headline 'An observability tool for the engineers who already know what they are doing'.\" /></td>\n  </tr>\n  <tr>\n    <td><strong>Bloom</strong> · adaptogenic soda<br/><em>Soda that loves you back.</em><br/>Playful / Expressive Maximalist / Companion / Resonant</td>\n    <td><strong>Observatory Editorial</strong> · observability tool<br/><em>An open-source tool that respects engineer time.</em><br/>Conversational / Editorial Restrained / Peer / Considered</td>\n  </tr>\n</table>\n\n### Run this on your own brand\n\nThe creative-direction skill lives at [`skills/creative-direction/`](skills/creative-direction/). Install it (see below), give Claude a project name and a few inspiration references, and the skill walks you through producing a brief that downstream skills can consume. The brand sites in the showcase were built from briefs of exactly that shape.\n\n---\n\n## Getting started\n\nSkills install in three different places depending on where you use Claude. Pick the platform that matches your workflow.\n\n### Option 1: Claude.ai (web and desktop)\n\nIf your Claude.ai plan supports custom Skills:\n\n1. Go to **Settings → Capabilities → Skills**.\n2. Upload the skill folder you want as a `.zip` (one zip per skill folder containing `SKILL.md` and the `references/` subfolder).\n3. Enable the skill in the chat interface.\n\nClaude will load the skill automatically when your request matches its description.\n\nFor current plan availability and the exact upload UI, see [Anthropic's Skills user guide](https://docs.claude.com/en/docs/agents-and-tools/agent-skills/overview).\n\n### Option 2: Claude Code (recommended)\n\nSkills are first-class citizens in Claude Code. Drop them into your skills directory and Claude Code picks them up automatically.\n\n**User-level skills** (available in every project):\n\n```bash\n# macOS / Linux\nmkdir -p ~/.claude/skills\ncp -r skills/* ~/.claude/skills/\n\n# Windows (PowerShell)\nNew-Item -ItemType Directory -Force -Path \"$HOME\\.claude\\skills\"\nCopy-Item -Recurse skills\\* \"$HOME\\.claude\\skills\\\"\n```\n\n**Project-level skills** (available only in a specific project):\n\n```bash\nmkdir -p .claude/skills\ncp -r path/to/this-repo/skills/* .claude/skills/\n```\n\nStart (or restart) Claude Code. Skills load automatically.\n\nFor exact current paths and config flags, see the [Claude Code documentation](https://docs.claude.com/en/docs/claude-code/overview).\n\n### Option 3: Anthropic API\n\nUse Skills programmatically by referencing them in your API calls. Skills must first be uploaded to your workspace (via the Console or API), then referenced by ID when creating messages.\n\nFor the current API surface, request format, and limits, see the [Agent Skills API documentation](https://docs.claude.com/en/api/agent-skills).\n\n### Want only a few skills?\n\nYou do not have to install all 60. Pick the categories that match your work. The library is modular: each skill stands on its own.\n\n---\n\n## Quick example\n\nOnce installed, skills trigger automatically based on your request. You do not have to name the skill or change how you talk to Claude.\n\n**You ask:**\n\n> \"Our organic traffic dropped 30% last week. Help me figure out why.\"\n\n**What happens:**\n\nClaude recognizes the request matches `seo-traffic-diagnosis`, loads the skill, and walks through its 5-layer root cause framework: confirm the change is real → localize the change → page-level analysis → technical analysis → external analysis. By the end, you have a hypothesis statement, evidence, and an action plan, structured the same way every time.\n\n**Other natural triggers:**\n\n- \"Help me write a creative brief\" → `creative-brief`\n- \"Audit my homepage for SEO\" → `seo-onpage`\n- \"We need a backlink audit\" → `seo-backlink-audit`\n- \"Plan our content roadmap for Q3\" → `seo-content-gap-audit` plus `content-strategy`\n- \"Postmortem template for last night's incident\" → `after-action-report`\n- \"How do I write my own skill?\" → `skill-creation-walkthrough`\n\nYou can also call a skill explicitly: \"Use the `seo-audit-orchestration` skill to run a full audit on example.com.\"\n\n---\n\n## How they compose\n\nThe skills compose into a full project flow:\n\n```\nbrand-discovery → brand-ideation → brand-identity → brand-style-guide → brand-voice\n                                                                        ↓\ncreative-brief → information-architecture → content-strategy → design-system\n                                                              ↓\nseo-keyword → seo-content-audit → content-and-copy → landing-page-copy\n                                                    ↓\nseo-onpage → seo-technical → seo-aeo-geo → seo-offpage → seo-competitor\n                                          ↓\nfrontend-component-build → accessibility-audit → performance-optimization\n                                                ↓\ncode-review-web → qa-testing → security-baseline → launch-runbook\n                                                  ↓\ndomain-strategy → monitoring-and-alerting → backup-and-disaster-recovery\n                                          ↓\nincident-response → after-action-report\n                  ↓\nanalytics-strategy → cro-optimization → ux-research → usability-testing → journey-mapping\n```\n\nThe SEO audit suite (Ahrefs MCP-powered) wraps around the SEO foundation skills:\n\n```\nseo-audit-orchestration\n  ├── seo-site-health-audit\n  ├── seo-backlink-audit\n  ├── seo-keyword-gap-audit\n  ├── seo-content-gap-audit\n  ├── seo-traffic-diagnosis  (also runs standalone for incident-style work)\n  └── seo-rank-tracking      (ongoing, feeds the others)\n```\n\nOperations, cross-cutting, and team skills (`stakeholder-communication`, `documentation-strategy`, `vendor-evaluation`, `team-onboarding-playbook`, `dependency-management`, `cost-optimization`, etc.) cut across the lifecycle.\n\nYou can also pull individual skills for one-off work. Need just a backlink audit? Use `seo-backlink-audit`. Need to write a creative brief? Use `creative-brief`. Each skill stands on its own.\n\n---\n\n<!-- COUNT_CATALOG_HEADER:START -->\n## The 69-skill catalog\n<!-- COUNT_CATALOG_HEADER:END -->\n\n<!-- COUNT_CATALOG_INTRO:START -->\nAll 69 skills are shipped. Each has a complete SKILL.md plus at least one reference file (template, checklist, or playbook).\n<!-- COUNT_CATALOG_INTRO:END -->\n\n<!-- AUTO-GENERATED CATALOG: do not edit by hand. Run scripts/generate_readme_catalog.py --write -->\n<!-- CATALOG:START -->\n### Strategy and discovery (5)\n\n| # | Skill | What it does |\n|---|---|---|\n| 1 | [`brand-discovery`](skills/brand-discovery/SKILL.md) | Audience research, competitive scan, positioning territory exploration |\n| 2 | [`creative-brief`](skills/creative-brief/SKILL.md) | Project briefs that align stakeholders before work starts |\n| 3 | [`creative-direction`](skills/creative-direction/SKILL.md) | Four-axis aesthetic brief (tone, aesthetic, audience, sensory ambition) for cross-skill coherence |\n| 4 | [`information-architecture`](skills/information-architecture/SKILL.md) | Sitemap, navigation, URL structure, content types, taxonomy |\n| 5 | [`content-strategy`](skills/content-strategy/SKILL.md) | Editorial strategy, content calendar, topical authority planning |\n\n### Brand (5)\n\n| # | Skill | What it does |\n|---|---|---|\n| 6 | [`brand-ideation`](skills/brand-ideation/SKILL.md) | Naming, positioning territories, mood directions, narrative angles |\n| 7 | [`bran eo-competitor/SKILL.md) | SERP overlap, content gaps, backlink gaps, technical comparison |\n| 21 | [`seo-offpage`](skills/seo-offpage/SKILL.md) | Link building, digital PR, citations, linkable assets |\n| 22 | [`seo-content-audit`](skills/seo-content-audit/SKILL.md) | Keep/update/merge/redirect/delete decisions across a site |\n| 23 | [`seo-aeo-geo`](skills/seo-aeo-geo/SKILL.md) | AI search optimization, llms.txt, extraction-friendly content |\n\n### SEO audit suite (Ahrefs MCP-powered) (7)\n\nEnd-to-end SEO audit workflows that pull data from the Ahrefs MCP and produce concrete deliverables. These skills assume the Ahrefs MCP is connected.\n\n| # | Skill | What it does |\n|---|---|---|\n| 24 | [`seo-audit-orchestration`](skills/seo-audit-orchestration/SKILL.md) | Master orchestrator: sequences the suite, produces a rollup report |\n| 25 | [`seo-backlink-audit`](skills/seo-backlink-audit/SKILL.md) | Profile health, anchor mix, toxic links, reclamation, gap analysis |\n| 26 | [`seo-keyword-gap-audit`](skills/seo-keyword-gap-audit/SKILL.md) | Competitor keyword gaps with opportunity scoring and clustering |\n| 27 | [`seo-content-gap-audit`](skills/seo-content-gap-audit/SKILL.md) | Missing topics, thin coverage, outdated content, decay diagnosis |\n| 28 | [`seo-traffic-diagnosis`](skills/seo-traffic-diagnosis/SKILL.md) | Diagnose drops, stalls, or wins via 5-layer root cause analysis |\n| 29 | [`seo-site-health-audit`](skills/seo-site-health-audit/SKILL.md) | Triage Ahrefs Site Audit findings by SEO impact, not severity |\n| 30 | [`seo-rank-tracking`](skills/seo-rank-tracking/SKILL.md) | Setup, baseline, segmentation, alerting, dashboarding |\n\n### Product (7)\n\n| # | Skill | What it does |\n|---|---|---|\n| 31 | [`pm-spec-writing`](skills/pm-spec-writing/SKILL.md) | PRDs, user stories, acceptance criteria, dev briefs |\n| 32 | [`roadmap-planning`](skills/roadmap-planning/SKILL.md) | Quarterly planning, prioritization, dependency mapping |\n| 33 | [`integration-orch L.md) | Go-live runbook, DNS cutover, deploy day procedures |\n| 44 | [`incident-response`](skills/incident-response/SKILL.md) | Incident triage, comms, mitigation, escalation |\n| 45 | [`after-action-report`](skills/after-action-report/SKILL.md) | Post-mortems, retros, learnings documentation |\n| 46 | [`domain-strategy`](skills/domain-strategy/SKILL.md) | DNS architecture, redirects, registrars, multi-domain portfolios |\n| 47 | [`monitoring-and-alerting`](skills/monitoring-and-alerting/SKILL.md) | SLO design, uptime checks, alert routing, on-call rotations |\n| 48 | [`backup-and-disaster-recovery`](skills/backup-and-disaster-recovery/SKILL.md) | RPO/RTO targets, backup strategy, restoration drills |\n| 49 | [`security-baseline`](skills/security-baseline/SKILL.md) | HTTPS, security headers, CSP, secrets management, vulnerability scans |\n| 50 | [`email-deliverability`](skills/email-deliverability/SKILL.md) | DMARC, SPF, DKIM, sender reputation, deliverability monitoring |\n| 51 | [`media-asset-management`](skills/media-asset-management/SKILL.md) | Image pipelines, video hosting, asset libraries, format selection |\n\n### Growth (2)\n\n| # | Skill | What it does |\n|---|---|---|\n| 52 | [`analytics-strategy`](skills/analytics-strategy/SKILL.md) | Measurement frameworks, dashboard design, event taxonomy |\n| 53 | [`cro-optimization`](skills/cro-optimization/SKILL.md) | Hypothesis-driven testing, conversion optimization |\n\n### Marketing (3)\n\nPaid media discipline: strategy, creative, and performance analytics. Pairs with the paid media platforms in the /integrations catalog at rampstack.co.\n\n| # | Skill | What it does |\n|---|---|---|\n| 54 | [`paid-media-strategy`](skills/paid-media-strategy/SKILL.md) | Hypothesis to spend: channel selection, budget allocation, audience targeting, bid strategy, attribution reality, and the failure modes that burn agency-scale budgets |\n| 55 | [`ads-creative-development`](skills/ads-creative-development/SKILL.md) | Hook patterns, format selection, video pacing, variation systems, testing methodology, fatigue detection, and the platform-specific creative norms that separate ads from clutter |\n| 56 | [`ads-performance-analytics`](skills/ads-performance-analytics/SKILL.md) | Read paid media dashboards without fooling yourself: attribution models, platform reporting quirks, ROAS vs LTV, multi-platform reconciliation, incrementality testing, and the interpretation failures that compound into wasted budget |\n\n### Research (3)\n\n| # | Skill | What it does |\n|---|---|---|\n| 57 | [`ux-research`](skills/ux-research/SKILL.md) | Research planning, user interviews, qualitative synthesis |\n| 58 | [`usability-testing`](skills/usability-testing/SKILL.md) | Test design, moderation, findings reports |\n| 59 | [`journey-mapping`](skills/journey-mapping/SKILL.md) | Customer journey maps, service blueprints, friction analysis |\n\n### Cross-cutting workflows (5)\n\n| # | Skill | What it does |\n|---|---|---|\n| 60 | [`form-strategy`](skills/form-strategy/SKILL.md) | Form design, validation patterns, spam prevention, conversion tuning |\n| 61 | [`content-migration`](skills/content-migration/SKILL.md) | Platform migrations with SEO equity preservation |\n| 62 | [`internationalization`](skills/internationalization/SKILL.md) | Locale strategy, hreflang, translation workflow, RTL design |\n| 63 | [`dependency-management`](skills/dependency-management/SKILL.md) | Package updates, security patches, lockfile hygiene |\n| 64 | [`cost-optimization`](skills/cost-optimization/SKILL.md) | Infrastructure spend audits, rightsizing, contract negotiation |\n\n### Process and team (5)\n\n| # | Skill | What it does |\n|---|---|---|\n| 65 | [`stakeholder-communication`](skills/stakeholder-communication/SKILL.md) | Status updates, exec readouts, project communications |\n| 66 | [`documentation-strategy`](skills/documentation-strategy/SKILL.md) | Documentation systems, what to document, maintenance cadence |\n| 67 | [`vendor-evaluation`](skills/vendor-evaluation/SKILL.md) | Tool and vendor selection using a structured rubric |\n| 68 | [`team-onboarding-playbook`](skills/team-onboarding-playbook/SKILL.md) | 30-60-90 onboarding plans for new hires and contractors |\n| 69 | [`skill-creation-walkthrough`](skills/skill-creation-walkthrough/SKILL.md) | The meta-skill: how to write your own custom skills |\n<!-- CATALOG:END -->\n\n---\n\n## Recommended MCPs\n\nSkills compose best when Claude has live access to your data and tools. [Model Context Protocol (MCP)](https://modelcontextprotocol.io/) servers provide that bridge. The skills in this library work without any MCPs, but pair them with the right ones and they go from \"frameworks Claude follows\" to \"workflows Claude executes against your real systems.\"\n\nBelow is the MCP shortlist by skill area. None of these are required (except the Ahrefs MCP for the SEO audit suite). All are categorical recommendations: where multiple options exist for the same job, pick the one that fits your stack.\n\n### SEO and search data\n\nThe SEO audit suite (skills 23-29) is built around the Ahrefs MCP. The foundation SEO skills (16-22) work with any equivalent.\n\n- **Ahrefs MCP** - referenced explicitly by `seo-audit-orchestration` and the 6 audit suite skills (backlink, keyword gap, content gap, traffic, site health, rank tracking)\n- **DataForSEO MCP** - alternative for SERP, keyword, and backlink data; useful as a complement to Ahrefs for cross-validation\n- **Google Search Console MCP** - free, official Google data; essential for `seo-traffic-diagnosis` and any audit that needs ground-truth click and impression data\n- **PageSpeed Insights MCP** - free, paired with `performance-optimization` and `seo-site-health-audit` for Core Web Vitals field data\n\n### Development and code\n\n- **GitHub MCP** - paired with `code-review-web`, `pm-spec-writing`, `roadmap-planning`, `incident-response`. Lets Claude read PRs, file issues, search code, and reference real commits.\n- **Filesystem MCP** - local file and code operations; pairs with most dev and content skills\n- **Sentry MCP** - paired with `monitoring-and-alerting` and `incident-response`. Real error data turns generic incident frameworks into specific diagnoses.\n\n### Hosting and infrastructure\n\n- **Cloudflare MCP** - paired with `domain-strategy`, `security-baseline`, `performance-optimization`. DNS records, redirects, page rules, security headers.\n- **Vercel MCP** - paired with `launch-runbook` and `incident-response`. Deployments, env vars, build logs.\n- **Supabase MCP** - paired with `code-review-web`, `pm-spec-writing`, `backup-and-disaster-recovery`. Schema, queries, edge functions.\n\n### Analytics and monitoring\n\n- **PostHog MCP** - paired with `analytics-strategy`, `cro-optimization`, `journey-mapping`. Event taxonomy review and funnel analysis grounded in real data.\n- **Datadog MCP** - paired with `monitoring-and-alerting`, `incident-response`. SLO design and alert routing against actual metrics.\n\n### Communication and project management\n\n- **Slack MCP** - paired with `incident-response`, `stakeholder-communication`, `after-action-report`. Read channel context, draft updates, post incident comms.\n- **Linear MCP** (or Jira MCP) - paired with `pm-spec-writing`, `roadmap-planning`. Spec writing against the actual issue tracker, not a generic template.\n\n### Research and search\n\n- **Web search** (built into Claude in most environments) - paired with `brand-discovery`, `seo-keyword`, `seo-competitor`, `ux-research`\n- **Tavily MCP** or **Brave Search MCP** - alternatives for deeper research workflows\n\n### Where to find them\n\n- [modelcontextprotocol.io/servers](https://modelcontextprotocol.io/servers) - the canonical directory of MCP servers\n- The Connectors directory inside Claude.ai (Settings → Connectors)\n- `claude mcp add` in Claude Code for direct installation\n- Vendor websites for first-party servers (most major SaaS tools now ship official MCPs)\n\n### Building your own MCP\n\nIf a skill in this library would benefit from a tool integration that does not yet exist, the [MCP documentation](https://modelcontextprotocol.io/) walks through building one. The `seo-audit-orchestration` skill is a worked example of how to design a skill suite around a specific MCP's capabilities.\n\n---\n\n## Authoring conventions\n\nEvery skill follows the same structure. See [SKILL_AUTHORING.md](SKILL_AUTHORING.md) for the full spec.\n\nHighlights:\n\n- **Stack-agnostic.** No specific framework versions in SKILL.md. Stack-specific patterns go in reference files. The Ahrefs-powered audit suite is the single named-tool exception.\n- **Future-proof.** Reference durable specs (W3C, WHATWG, Schema.org, MDN, NN/g, WCAG). Avoid trend pieces.\n- **Uniform structure.** Every SKILL.md has the same section order: When to use, When NOT to use, Required inputs, The framework, Workflow, Failure patterns, Output format, Reference files.\n- **Tight length.** SKILL.md under 250 lines. References under 400.\n- **Punchy voice.** Short sentences. Concrete examples beat abstract advice.\n\n---\n\n## Repository structure\n\n```\nskills/\n  skill-name/\n    SKILL.md\n    references/\n      template.md\n      checklist.md\n      example.md\nSKILL_AUTHORING.md          (the authoring guide)\nCONTRIBUTING.md             (how to contribute)\nMAPPING.md                  (origin notes for skills ported from existing work)\nREADME.md                   (this file)\nLICENSE                     (MIT)\n```\n\n---\n\n## Contributing\n\nContributions are welcome. Whether you want to fix a typo, add a reference file, or propose an entirely new skill, the bar is the same: follow the uniform structure, keep the voice consistent, and prove the skill earns its place.\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for the full process.\n\nThe fastest path: use the [`skill-creation-walkthrough`](skills/skill-creation-walkthrough/SKILL.md) skill itself. It teaches the same authoring discipline used across all 60 skills, with worked examples and a blank template.\n\n---\n\n## Resources\n\n### Official Anthropic documentation\n\n- [Agent Skills overview](https://docs.claude.com/en/docs/agents-and-tools/agent-skills/overview) - The canonical reference\n- [Anthropic engineering blog on Skills](https://www.anthropic.com/engineering) - Background on the design\n- [Claude Code documentation](https://docs.claude.com/en/docs/claude-code/overview) - Where most of these skills will run\n- [Anthropic API reference](https://docs.claude.com/en/api/getting-started) - For programmatic use\n\n### Other skill libraries worth knowing\n\n- [Anthropic's official skills repository](https://github.com/anthropics/skills) - Examples and primitives published by Anthropic\n- [Awesome Claude Skills (Composio)](https://github.com/ComposioHQ/awesome-claude-skills) - A curated index of community skills, where this library is featured under Business & Marketing\n\n### Companion concepts\n\n- [Model Context Protocol (MCP)](https://modelcontextprotocol.io/) - The protocol behind the Ahrefs MCP and other tool integrations referenced in this library\n- [WCAG quick reference](https://www.w3.org/WAI/WCAG22/quickref/) - Accessibility standard cited by the accessibility audit and design skills\n- [Schema.org](https://schema.org/) - Structured data vocabulary cited across the SEO suite\n\n---\n\n## License\n\n[MIT](LICENSE). Use it. Fork it. Ship things with it.\n","summary":"Rampstackco/claude‑skills is a curated library of 69 opinionated Claude Skills that cover every phase of building, launching, running and growing a brand and website—from design and content creation to SEO, development, operations and growth research. Each skill comes with a full `SKILL.md` definition, templates, checklists, and worked examples, and the set is stack‑agnostic so it works on Next.js, WordPress, Shopify, Webflow, plain HTML and more, only the SEO suite requires an Ahrefs MCP. The library is designed to compose cleanly across a project lifecycle, enabling Claude to execute consistent, high‑quality tasks across Claude.ai, Claude Code, and the Anthropic API. Developers, marketers, and brand‑builders who want to automate and standardise web‑lifecycle workflows with Claude will benefit most from this resource.","description":"Stack-agnostic Claude Skills covering the full website lifecycle: brand, design, content, SEO, dev, ops, growth, and research. Build, ship, audit, optimize.","stars":121,"language":"Python"},{"owner":"cloudflare","repo":"skills","url":"https://github.com/cloudflare/skills","readme":"# Cloudflare Skills\n\nA collection of [Agent Skills](https://www.anthropic.com/engineering/equipping-agents-for-the-real-world-with-agent-skills) for building on Cloudflare, Workers, the Agents SDK, and the wider Cloudflare Developer Platform.\n\n## Installing\n\nThese skills work with any agent that supports the Agent Skills standard, including Claude Code, OpenCode, OpenAI Codex, and Pi.\n\n### Claude Code\n\nInstall using the [plugin marketplace](https://code.claude.com/docs/en/discover-plugins#add-from-github):\n\n```\n/plugin marketplace add cloudflare/skills\n/plugin install cloudflare@cloudflare\n```\n\n### Cursor\n\nInstall from the Cursor Marketplace or add manually via **Settings > Rules > Add Rule > Remote Rule (Github)** with `cloudflare/skills`.\n\n### npx skills\n\nInstall using the [`npx skills`](https://skills.sh) CLI:\n\n```\nnpx skills add https://github.com/cloudflare/skills\n```\n\n### Clone / Copy\n\nClone this repo and copy the skill folders into the appropriate directory for your agent:\n\n| Agent | Skill Directory | Docs |\n|-------|-----------------|------|\n| Claude Code | `~/.claude/skills/` | [docs](https://code.claude.com/docs/en/skills) |\n| Cursor | `~/.cursor/skills/` | [docs](https://cursor.com/docs/context/skills) |\n| OpenCode | `~/.config/opencode/skills/` | [docs](https://opencode.ai/docs/skills/) |\n| OpenAI Codex | `~/.codex/skills/` | [docs](https://developers.openai.com/codex/skills/) |\n| Pi | `~/.pi/agent/skills/` | [docs](https://github.com/badlogic/pi-mono/tree/main/packages/coding-agent#skills) |\n\n## Commands\n\nCommands are user-invocable slash commands that you explicitly call.\n\n| Command | Description |\n|---------|-------------|\n| `/cloudflare:build-agent` | Build an AI agent on Cloudflare using the Agents SDK |\n| `/cloudflare:build-mcp` | Build an MCP server on Cloudflare |\n\n## Skills\n\nSkills are contextual and auto-loaded based on your conversation. When a request matches a skill's triggers, the agent loads and applies the relevant skill to provide accurate, up-to-date guidance.\n\n| Skill | Useful for |\n|-------|------------|\n| cloudflare | Comprehensive platform skill covering Workers, Pages, storage (KV, D1, R2), AI (Workers AI, Vectorize, Agents SDK), networking (Tunnel, Spectrum), security (WAF, DDoS), and IaC (Terraform, Pulumi) |\n| agents-sdk | Building stateful AI agents with state, scheduling, RPC, MCP servers, email, and streaming chat |\n| durable-objects | Stateful coordination (chat rooms, games, booking), RPC, SQLite, alarms, WebSockets |\n| sandbox-sdk | Secure code execution for AI code execution, code interpreters, CI/CD systems, and interactive dev environments |\n| wrangler | Deploying and managing Workers, KV, R2, D1, Vectorize, Queues, Workflows |\n| web-perf | Auditing Core Web Vitals (FCP, LCP, TBT, CLS), render-blocking resources, network chains |\n| building-mcp-server-on-cloudflare | Building remote MCP servers with tools, OAuth, and deployment |\n| building-ai-agent-on-cloudflare | Building AI agents with state, WebSockets, and tool integration |\n\n## MCP Servers\n\nThis plugin includes [Cloudflare's remote MCP servers](https://developers.cloudflare.com/agents/model-context-protocol/mcp-servers-for-cloudflare/) for enhanced functionality:\n\n| Server | Purpose |\n|--------|---------|\n| cloudflare-api | Manage Cloudflare account resources, zones, and settings |\n| cloudflare-docs | Up-to-date Cloudflare documentation and reference |\n| cloudflare-bindings | Build Workers applications with storage, AI, and compute primitives |\n| cloudflare-builds | Manage and get insights into Workers builds |\n| cloudflare-observability | Debug and analyze application logs and analytics |\n\n## Resources\n\n- [Cloudflare Agents Documentation](https://developers.cloudflare.com/agents/)\n- [Cloudflare MCP Guide](https://developers.cloudflare.com/agents/model-context-protocol/)\n- [Agents SDK Repository](https://github.com/cloudflare/agents)\n- [Agents Starter Template](https://github.com/cloudflare/agents-starter)\n","summary":"Cloudflare Skills is a curated set of “Agent Skills” that embed the breadth of the Cloudflare Developer Platform into AI agents. It offers install instructions for leading code‑assistant frameworks, auto‑loaded skill tricks for Workers, KV/D1/R2 storage, AI services, networking, and IaC tools, as well as slash‑commands for building agents and MCP servers directly on Cloudflare. The collection also bundles Cloudflare’s MCP server endpoints—like account‑management, documentation, bindings, build insight, and observability—to give agents fresh, authoritative data. Developers building stateful AI agents, CI/CD systems, or automation on the Cloudflare edge will find this toolkit invaluable for rapid, secure integration and deployment.","description":"Skills for teaching agents how to build on Cloudflare.","stars":1416,"language":null},{"owner":"heyadam","repo":"claudedesign-to-swiftui","url":"https://github.com/heyadam/claudedesign-to-swiftui","readme":"# claudedesign-to-swiftui\n\nTurn a **Claude-generated HTML design prototype** (a URL from `api.anthropic.com/v1/design/h/...` or a local `.tar.gz`) into a **SwiftUI `View` file** written directly into your active Xcode workspace — built, previewed, and visually diff'd against the prototype until it matches.\n\nOne prototype in, one self-contained `.swift` file out.\n\n## What it does, end to end\n\n1. **Fetches** the design (URL or tarball), unpacks it, and serves it locally over `http://127.0.0.1:<port>` (Claude designs commonly use ES modules and `fetch()`, which fail under `file://`).\n2. **Renders** the prototype in Chrome at iPhone 15 Pro size (390×844) and screenshots it.\n3. **Reads** the HTML + every linked CSS file, and inventories assets (inline SVGs, Google Fonts, `<img>` tags).\n4. **Translates** the DOM and styles to SwiftUI using bundled reference mappings (layout, typography, styling, component patterns, plus three asset handlers: SVG → SF Symbol or `Path`, Google Fonts → SF system equivalents, `<img>` → `Assets.xcassets` import or `AsyncImage`) and two worked examples.\n5. **Writes** the generated file into your open Xcode workspace (via Apple's Xcode 26.3 MCP).\n6. **Builds** the project and patches any errors from the navigator diagnostics.\n7. **Renders** the SwiftUI preview and **visually diffs** it against the prototype screenshot, iterating until they match.\n\nOutput is a **single `.swift` file**: one `View` struct + a `#Preview` + (if used) a `fileprivate` `Color(hex:)` extension and one `fileprivate struct FooIcon: View` per custom SVG icon. No external packages, no multi-screen navigation, no JS interactivity — visual layout fidelity only.\n\n## Requirements\n\n| | |\n|---|---|\n| **Claude Code** | latest |\n| **Xcode** | **26.3 or later** |\n| **Xcode setting** | Settings → Intelligence → **Xcode Tools = ON** |\n| **Xcode state** | target project/workspace **open** when you run the command |\n| **MCP: `xcode-tools`** | bundled in this plugin's `.mcp.json` (ships with Xcode 26.3+ as `xcrun mcpbridge`) |\n| **MCP: `claude-in-chrome`** | **user-installed** — used to render and screenshot the HTML prototype |\n\nIf either MCP is missing, the skill degrades gracefully: it'll emit the `.swift` file via the standard `Write` tool and ask you to preview/diff manually.\n\n## Install\n\n```\n/plugin marketplace add heyadam/claudedesign-to-swiftui\n/plugin install claudedesign-to-swiftui@claudedesign-to-swiftui\n```\n\n### Verify the install\n```\n/plugin list\n```\nYou should see `claudedesign-to-swiftui` listed and the `/convert` command available.\n\n## Usage\n\n```\n/convert <design-url-or-tarball-path>\n```\n\n**Examples:**\n\n```\n/convert https://api.anthropic.com/v1/design/h/abc123?open_file=index.html\n```\n\n```\n/convert ~/Downloads/my-prototype.tar.gz\n```\n\nRunning `/convert` with no argument will prompt you for a URL or path.\n\n> **Design URLs are short-lived / one-shot.** If yours 404s, generate a fresh one from Claude and retry.\n\n### What happens next\n\n- The skill prints the resolved entry HTML, renders it in Chrome, and shows you the screenshot.\n- It picks a meaningful filename (e.g. `OnboardingView.swift`) based on the prototype's purpose. If your workspace has multiple groups it'll ask which to write into.\n- It builds, fixes any errors, renders the preview, and compares. You'll see a concrete discrepancy list (layout, sizing, colors, typography) each iteration.\n- After three iterations without convergence, it stops and hands you the remaining diff.\n\n## What's inside the plugin\n\n- **Command** — `/convert` (`commands/convert.md`): the entry point; orchestrates the skill.\n- **Skill** — `claude-design-to-swiftui` (`skills/claude-design-to-swiftui/SKILL.md`): the full workflow.\n  - `scripts/fetch.sh` — download, unpack, start a localhost-bound `python3 -m http.server` on a free port, and print URL + PID + dir.\n  - `scripts/stop.sh` — kill the local server and remove the unpack dir at end of run.\n  - `references/layout-mapping.md` — flex / grid / block → `VStack` / `HStack` / `ZStack` / `Grid` / `ScrollView`.\n  - `references/styling-mapping.md` — CSS padding / background / border / shadow → SwiftUI modifiers.\n  - `references/typography-mapping.md` — font-family / size / weight → `.font()` / `.fontWeight()` / `.lineSpacing()`.\n  - `references/component-patterns.md` — cards, buttons, list rows, nav bars.\n  - `references/svg-to-sfsymbol.md` — curated visual fingerprints for ~30 common UI icons → SF Symbol names.\n  - `references/svg-path-translation.md` — SVG path commands → SwiftUI `Path` builder; the fallback when no SF Symbol matches.\n  - `references/font-mapping.md` — Google Font families (Newsreader, Geist, Fraunces, IBM Plex…) → SF system equivalents, plus a manual recipe for original-font fidelity.\n  - `references/asset-catalog-import.md` — local `<img>` files → `Assets.xcassets/<name>.imageset/`; CDN URLs → `AsyncImage`.\n  - `references/swiftui-gotchas.md` — known SwiftUI compile pitfalls (expression-too-complex, `ForEach` Identifiable, `Color(hex:)`, etc.) and their fixes.\n  - `examples/01-landing-card/` and `examples/02-list-with-rows/` — before/after HTML → SwiftUI pairs.\n- **MCP bundle** — `.mcp.json` registers the `xcode-tools` server automatically when the plugin is installed. Tools register under the namespace `mcp__plugin_claudedesign-to-swiftui_xcode-tools__*` (Claude Code's plugin-MCP convention).\n\n## Translation rules at a glance\n\n- Preserve DOM hierarchy — a wrapping `<div>` becomes a wrapping `VStack` (or the container that fits).\n- Inline literal pixel values (`padding: 16px` → `.padding(16)`). No design tokens in v1.\n- Hex colors go through a `fileprivate extension Color { init(hex:) }` at the bottom of the file.\n- **Inline `<svg>` icons** — first try the curated SF Symbol map (`Image(systemName:)`). On miss, fall back to a `fileprivate struct FooIcon: View` with a translated `Path`.\n- **Google Fonts** — mapped to closest SF system family (e.g. Newsreader → `.system(.body, design: .serif)`); a top-of-file comment lists what got mapped. Original fonts require manual user setup (the Xcode 26.3 MCP can't register fonts).\n- **`<img>` tags** — local files import into `Assets.xcassets/<name>.imageset/`; external URLs become `AsyncImage`.\n- Content taller than 844pt → wrapped in `ScrollView`.\n\n## Scope and non-goals\n\n**In scope**\n- One HTML prototype → one SwiftUI `View` file.\n- Visual layout fidelity (structure, spacing, color, type, placement).\n- Asset handling: inline SVGs (SF Symbol or `Path`), Google Fonts (system mapping), local `<img>` import to `.xcassets`, CDN images via `AsyncImage`.\n- Automatic build + preview + diff loop.\n\n**Out of scope**\n- Multi-screen navigation flows, full app scaffolds.\n- Prototypes whose value is JS behavior (animations, drag/drop, state machines).\n- Figma, Sketch, or screenshot-only inputs (HTML source required).\n- Custom-font registration (downloading `.ttf` files into the project + editing `Info.plist`) — the Xcode 26.3 MCP doesn't expose tools for `.xcodeproj` or `Info.plist` mutation, so the skill emits a manual checklist for the user instead.\n\n## Troubleshooting\n\n| Symptom | Likely cause | Fix |\n|---|---|---|\n| `xcrun mcpbridge` not found | Xcode < 26.3 | Update Xcode, or let the skill fall back to `Write` + manual preview. |\n| Tools disabled / no workspace found | Xcode Tools off, or project not open | Settings → Intelligence → **Xcode Tools = ON**, then open your project. |\n| `tool not found: mcp__xcode-tools__...` errors | Stale install referencing the pre-v0.3.1 bare prefix | Uninstall + reinstall. Plugin-bundled MCPs register under `mcp__plugin_claudedesign-to-swiftui_xcode-tools__*`; v0.3.0 and earlier referenced the wrong prefix. |\n| Design URL returns 404 | URL was short-lived / already consumed | Ask Claude to regenerate the design and run `/convert` with the fresh URL. |\n| Chrome render step skipped | `claude-in-chrome` MCP not installed | Install it, or run in degraded mode (paste a screenshot back manually). |\n| Custom font in prototype renders as system font | Default behavior — system mapping | Ask \"use the actual fonts\" and the skill will emit `.font(.custom(...))` plus a manual setup checklist. |\n| Preview doesn't match after 3 iterations | Layout edge case not covered by the reference mappings | The skill will stop and show the remaining diff — patch by hand from there. |\n\n## Uninstall\n\n```\n/plugin uninstall claudedesign-to-swiftui\n/plugin marketplace remove claudedesign-to-swiftui\n```\n\n## Development\n\nClone the repo, then point a local marketplace at the folder:\n\n```\ngit clone https://github.com/heyadam/claudedesign-to-swiftui.git\ncd claudedesign-to-swiftui\n/plugin marketplace add $(pwd)\n/plugin install claudedesign-to-swiftui@claudedesign-to-swiftui\n```\n\nEdits to files under `commands/`, `skills/`, or `.claude-plugin/` take effect on the next Claude Code session (or `/plugin reload`).\n\nValidate before publishing:\n```\n/plugin validate\n```\n\n## Versioning & releases\n\nTag releases with semver:\n```\ngit tag v0.1.0 && git push --tags\n```\n\nUsers can then pin a specific version by appending `@v0.1.0` when adding the marketplace.\n\n## License\n\nMIT. See [`LICENSE`](LICENSE).\n\n## Author\n\n**Adam Presson** — <me@heyadam.com>\n","summary":"Claudedesign-to-swiftui is a Xcode plugin that automatically turns a Claude‑generated HTML design prototype into a standalone SwiftUI view file inside an open workspace. It fetches the prototype, serves it locally, screenshots the rendered layout, parses HTML, CSS and assets, and translates the DOM and styles into SwiftUI code using built‑in mappings for layout, typography, SVG, Google Fonts, and images. The generated file is written directly into Xcode, built, previewed, and visually diffed against the original prototype until the layout matches, providing developers with a quick, code‑first bridge from AI‑generated web mockups to functional SwiftUI interfaces. This tool is ideal for iOS developers who want to prototype faster by converting AI‑driven design prototypes into usable SwiftUI components without manual hand‑coding.","description":"Claude Code plugin: convert Claude-generated HTML design prototypes into SwiftUI Views inside your active Xcode workspace.","stars":77,"language":"Swift"},{"owner":"sjsyrek","repo":"design-council","url":"https://github.com/sjsyrek/design-council","readme":"# Design Council\n\n> Convene a parallel team of specialist Claude agents with independent contexts — they argue your call, partition the work, and ship it.\n\n## What problem it solves\n\nA single context, no matter how capable, evaluates a cross-cutting design decision from one vantage point. \"Should this API paginate cursor-style or offset-style?\" touches integration, performance, security, docs, and product — and the answer you get depends on which hat you happened to be wearing when asked. Iterating with the same context doesn't fix this: each turn inherits the prior framing.\n\nDesign Council spawns each seat as an **independent Claude agent with its own context**. They don't inherit yours. The `security-engineer` has no cached rationale for the principal-engineer's architecture; the `accessibility-specialist` doesn't share the `performance-engineer`'s priors about batching. Disagreement is structural, not simulated. The CEO's job is to route the disagreement productively and write the decision down.\n\n## How it works\n\n0. **Plan card (you confirm before anything spawns).** The CEO shows a one-screen card: mode (debate / review), roster with per-seat model, rough token/wall-clock budget, and the drafted opening question. You reply `go`, `swap X for Y`, `drop X`, `add X`, or `abort`.\n1. **Brief (single context, yours).** The CEO gathers binding constraints from `CLAUDE.md`, referenced specs, and the project's memory system (including beads if detected). **Skill self-audit runs here too:** the CEO greps auto-memory and prior decision logs for entries about the council skill itself; any memory that contradicts the skill's own prescriptions wins (memory is written after real failures, so it's ground truth). Everything lands **once** in `~/.claude/councils/<slug>/brief.md` — every seat's spawn prompt points to that path, so prompt caching hits across parallel spawns (~7–12k tokens saved per 8-seat council).\n2. **Convene (parallel fan-out).** In one multi-tool-call message, the CEO spawns every seat via `TeamCreate` + `Agent(... run_in_background: true, team_name: ...)`. Every spawn prompt inlines the four delivery rules (handshake, SendMessage-only, final-via-SendMessage, idle-summary-short).\n3. **Handshake verify (Phase 2.5).** The CEO counts incoming handshake DMs, inspects team config for empty `tmuxPaneId`s, remediates silent-spawn failures, and emits a structured `HANDSHAKE: N/N ok | verdict=PROCEED` line.\n4. **Cross-talk (peer DMs, bounded).** Seats post opening verdicts (`APPROVE` / `CONCERNS` / `BLOCK`), then DM each other directly via `SendMessage` to argue the live disagreements. The CEO routes — pairs disagreers, invites tiebreakers, forces narrowing questions, bridges converged tracks. Hard cap of 3 rounds. Review mode skips cross-talk by default.\n5. **Arbitrate (CEO writes).** For every disagreement cross-talk didn't resolve, the CEO writes a 3–5 sentence decision with rationale engaging the loser's argument. Strategic / budget / legal / cross-team calls escalate to the user.\n6. **Log + teardown.** The CEO posts the draft decision log to chat for your `save` / `amend` / `discard`. On save: `~/.claude/councils/<yyyy-mm-dd>-<slug>/log.md` (outside any project repo). Includes opening prompt, roster, resolved disagreements, arbitration decisions, deferred items with tracker IDs, and an execution plan with file-ownership mapping. Team shuts down via `shutdown_request`; `TeamDelete` removes the shared task list.\n\n**Stop early** at any phase by saying \"stop the council\" — the CEO broadcasts shutdown, saves a partial log with `status: halted`, and cleans up.\n\n## Benefits\n\n- **Genuine parallelism.** Independent contexts reasoning concurrently, not sequential turns. Wall-clock cost ≈ slowest seat, not sum of seats.\n- **Structurally independent perspectives.** Each seat is a separate Claude with its own context — no priming bleeds across roles.\n- **Direct peer debate.** `SendMessage` lets seats argue with each other without round-tripping through the CEO, which is how real cross-discipline reviews work.\n- **Cheap fan-out via prompt cache.** The shared `brief.md` pattern means identical constraints hit the 5-minute prompt cache across every spawn, recovering meaningful tokens on constraint-heavy projects.\n- **Durable artifact outside any repo.** Decision logs are portable — they outlive branch pivots, repo renames, and migrations. `~/.claude/councils/` is per-user artifact space.\n- **Merge-conflict-aware execution plan.** Phase 5 closes with file-ownership mapping so parallel implementers — spawned as fresh agents with `isolation: \"worktree\"` after teardown — can ship the decision without colliding. See `references/implementation-handoff.md` for the full playbook (including why `git checkout <SHA> -- <files>` beats `cherry-pick` for mixed-base handoffs).\n\n## Tradeoffs\n\n- **Token cost.** 8+ parallel contexts, each receiving a role brief + opening prompt + `Read` of the shared brief, then 1–3 cross-talk rounds. Expect roughly **10–20×** the tokens of a single-context review. This is why the \"Do not invoke\" list is explicit: small decisions don't earn the cost.\n- **Orchestration latency.** Even parallel, each round ends only when the last-to-respond seat is in. Debates where one seat goes deep on research dominate wall-clock.\n- **Not a substitute for domain expertise.** Seats are strong generalists shaped by their role briefs, not replacements for a named SME. Use the `domain-expert` opt-in or escalate to a human for narrowly technical calls.\n- **Silent-promise risk on DEFER.** A deferred decision without a tracker item decays to nothing. The Phase 5 silent-promise guard catches this when a tracker is detected; without one, the prose entry in the log is the only handle.\n\n## When to invoke\n\nBoth conditions must hold:\n\n- Decision or review crosses **≥2 specialist domains**, AND\n- Output must **survive handoff** — a decision log, tracker items, or an execution plan.\n\nNatural trigger phrases: \"convene the council\", \"design debate\", \"council review\", \"get the team together\", \"run a design review\", \"debate this design\".\n\n**Do not invoke** for simple bug fixes, single-specialist questions, library/tool picks, or pure exploration (→ `Explore`). The token cost isn't earned.\n\n## Default roster (size matches decision shape)\n\n**Full 11 seats:** `principal-engineer` · `platform-engineer` · `integration-engineer` · `test-engineer` · `qa-engineer` · `security-engineer` · `performance-engineer` · `product-manager` · `ui-ux-designer` · `accessibility-specialist` · `technical-writer`\n\n**Opt-ins** (CEO adds based on decision shape): `devops-engineer` · `finops-engineer` · `legal-compliance` · `domain-expert` · `historian`\n\n**Dynamic sizing is the default.** No runtime UI → drop `ui-ux-designer` + `accessibility-specialist`. No user input / no infra → drop `security-engineer` + `platform-engineer` too. Internal-tooling decisions often land on 4–6 seats. The plan card (Phase 0) shows the chosen roster; you can adjust before spawn.\n\n## Model defaults (surfaced up-front)\n\n- **Opus** for synthesis-heavy seats (`principal-engineer`, `product-manager`, `technical-writer`, `historian`).\n- **Sonnet** for analytical seats (`test-engineer`, `performance-engineer`, `platform-engineer`, `qa-engineer`).\n- **All-Opus** when the user frames the task as \"high quality bar\" or \"ship to production.\"\n\nThe plan card displays the chosen models per seat so you never discover them mid-debate.\n\n## Integrations\n\n### Beads\n\nWhen the invoking project uses [beads](https://github.com/gastownhall/beads), this skill automatically:\n\n- Includes `bd memories`, `bd ready`, and `bd show <id>` output in the Phase 1 brief.\n- Translates Phase 4 `DEFER` decisions into `bd create` commands before Phase 5 teardown.\n- Closes the primary bead under debate during teardown (with `--force` if beads flags a known dependency-inversion).\n- Records filed bead IDs in the decision log frontmatter (`primary-tracker-id`, `linked-tracker-ids`).\n\nDetection: `.beads/` at the invoking project's git root, OR `bd` on `$PATH`. Concretely: `test -d .beads || command -v bd`.\n\nWhen no tracker is detected, deferred items remain prose in the decision log and no tracker commands are run. The protocol is strictly additive — beads is never required. See `skills/design-council/references/tracker-integration.md` for the adapter contract used to wire new trackers.\n\n### Split-pane observability\n\nTo watch seats debate in real time, run Claude Code inside **tmux** or **iTerm2** and set `\"teammateMode\": \"tmux\"` (or the default `\"auto\"`) in your Claude Code `settings.json`. Each seat renders in its own pane. Without a split-pane-capable terminal, seats still run — they just share the main pane and you cycle through them with Shift+Down.\n\nThis is a Claude Code harness setting, not a plugin requirement.\n\n## Installation\n\n```\n/plugin marketplace add sjsyrek/claude-plugins\n/plugin install design-council@sjsyrek\n```\n\nThe marketplace lives at [sjsyrek/claude-plugins](https://github.com/sjsyrek/claude-plugins) and points at this repo. To pin a version, clone this repo at a tag (e.g., `v0.2.0`) and load via `/plugin marketplace add <local-path>` pointing at a checkout with its own `.claude-plugin/marketplace.json`.\n\n## Runtime requirements\n\n- `TeamCreate` / `TeamDelete` — team lifecycle + shared task list\n- `Agent` with `name`, `run_in_background`, `team_name`, `model` — spawns each seat as a peer\n- `SendMessage` — CEO-to-seat and seat-to-seat DMs, plus broadcast\n- `TaskCreate` — shared task list\n\nSome of these are deferred tools in Claude Code; they're resolved at spawn time.\n\n## Decision log location\n\n`~/.claude/councils/<yyyy-mm-dd>-<slug>/log.md` — per-user artifact space, **not** plugin-owned. The shared brief artifact lives alongside at `~/.claude/councils/<slug>/brief.md`.\n\n## Version history\n\nSee [CHANGELOG.md](./CHANGELOG.md).\n\n## License\n\nMIT\n","summary":"Design Council is a tool that orchestrates a group of independent Claude agents to debate and evaluate design decisions in real‑time, each agent running with its own context so that perspectives do not bleed across roles. It lets you configure a “council” through a brief plan card, automatically spawn and “handshake” the agents, manage their direct peer exchanges, and then have a human CEO arbitrate unresolved disagreements and produce a detailed decision log. The system saves time by running all seats in parallel, structures arbitration to surface true conflicts, and keeps a versioned record for later reference. It is aimed at software architects, product managers, and design teams who need a repeatable, impartial way to surface and resolve cross‑cutting decisions around APIs, architecture, and policy.","description":"Claude Code plugin: convene 11 role-specialized peer agents to debate a technical decision in real time, with the invoking Claude acting as CEO.","stars":122,"language":null},{"owner":"intertwine","repo":"dspy-agent-skills","url":"https://github.com/intertwine/dspy-agent-skills","readme":"# DSPy Agent Skills\n\n[![DSPy 3.2.x](https://img.shields.io/badge/DSPy-3.2.x-0A7B83)](https://dspy.ai/)\n\n**Production-grade DSPy 3.2.x skills for coding agents.** A synthesized, spec-compliant pack of five agent skills that turns Claude Code, Codex CLI, and any other [agentskills.io](https://agentskills.io)-compatible agent into a DSPy expert.\n\n- ✅ Validated against DSPy 3.2.0 (the real API, not inferred from stale docs)\n- ✅ Single source of truth for both **Claude Code** and **Codex CLI**\n- ✅ Progressive disclosure (short `SKILL.md` + deep `reference.md`)\n- ✅ Runnable `example_*.py` scripts with offline `--dry-run`\n- ✅ Includes a DSPy 3.2.0 `BetterTogether` chaining example\n- ✅ Plugin manifest + marketplace manifest for one-click install\n- ✅ 80 validation tests (frontmatter spec, JSON schema, Python AST, skill-doc correctness guards)\n\n## What's inside\n\n| Skill | When it auto-invokes |\n|---|---|\n| [`dspy-fundamentals`](skills/dspy-fundamentals/SKILL.md) | Any new DSPy code: Signatures, Modules, Predict/ChainOfThought/ReAct, save/load |\n| [`dspy-evaluation-harness`](skills/dspy-evaluation-harness/SKILL.md) | Writing metrics, splitting dev/val sets, calling `dspy.Evaluate` |\n| [`dspy-gepa-optimizer`](skills/dspy-gepa-optimizer/SKILL.md) | Optimizing/compiling DSPy programs with `dspy.GEPA` |\n| [`dspy-rlm-module`](skills/dspy-rlm-module/SKILL.md) | Long context, codebase QA, recursive exploration via `dspy.RLM` |\n| [`dspy-advanced-workflow`](skills/dspy-advanced-workflow/SKILL.md) | End-to-end builds — orchestrates the other four |\n\n## Install\n\n### Claude Code (via marketplace)\n\n```text\n/plugin marketplace add intertwine/dspy-agent-skills\n/plugin install dspy-agent-skills@dspy-agent-skills\n```\n\n### Agent Skills CLI (`npx skills`)\n\n```bash\nnpx skills add intertwine/dspy-agent-skills --list\nnpx skills add intertwine/dspy-agent-skills --skill '*' -a codex -y\n```\n\nThe Vercel `skills` CLI currently expects a GitHub `owner/repo`, URL, well-known HTTPS endpoint, or local path as its source. The bare form `npx skills add dspy-agent-skills` is not resolvable unless the upstream CLI adds a source alias, so use `intertwine/dspy-agent-skills`.\n\n### Claude Code + Codex (repo checkout)\n\n```bash\ngit clone https://github.com/intertwine/dspy-agent-skills\ncd dspy-agent-skills\n./scripts/install.sh           # symlinks into ~/.claude/skills/ and ~/.agents/skills/\n```\n\nFlags: `--claude-only`, `--codex-only`, `--copy` (copy instead of symlink), `--uninstall`, `--dry-run`.\n\n### Manual\n\nDrop `skills/*` into `~/.claude/ski
