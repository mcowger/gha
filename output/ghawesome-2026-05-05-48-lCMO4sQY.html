design system for a calm B2B fintech dashboard.\"\n> Agent picks a reference from 67 (likely Linear or Stripe), proposes a hybrid DESIGN.md, asks for confirmation, writes the file plus shims.\n\n> \"Make the empty-state for the search results page.\"\n> Agent reads DESIGN.md, builds the component with brand tokens, picks an inline SVG illustration matching the voice, drops in microcopy that follows the §10 voice rules.\n\n> \"Design the entire onboarding from scratch — Toss-style for a family meal-tracking app.\"\n> Agent invokes the harness — runs the 10-phase pipeline (discovery, research, IA, wireframes, components, assets, microcopy, validation, handoff), spawns sub-agents in parallel where possible, asks you 3 mandatory checkpoints, hands back a v0/Cursor-ready package.\n\n> \"Render a 3D water glass for the hero.\"\n> Agent recommends Blender, walks you through install-on-demand (it does not bundle it in the upfront bootstrap), then renders with materials cited from DESIGN.md §2 and §6.\n\n> \"Add a daily-intake line chart.\"\n> Agent reads your `package.json`, sees `recharts` is installed, builds the chart with brand colors, no library mismatch.\n\n> \"We never use uppercase CTAs.\"\n> Agent silently appends to `.omd/preferences.md`. Next time anyone makes a CTA, that rule applies. Later you can say \"fold preferences into DESIGN.md\" and the agent merges by scope.\n\n## What gets installed\n\n| Path | Owner | Purpose |\n|---|---|---|\n| `.claude/skills/omd-*/SKILL.md` | install-skills | Claude Code skill bundle (apply / harness / init / learn / remember / sync) |\n| `.codex/skills/omd-*/SKILL.md` | install-skills | Codex skill bundle |\n| `.opencode/agents/omd-*.md` | install-skills | OpenCode agent bundle |\n| `.claude/agents/omd-*.md` | install-skills | 11 canonical sub-agents (master + 10 specialists) |\n| `.claude/data/*` | install-skills | 67-reference fingerprints, vocabulary, opt-out corpus |\n| `.claude/hooks/*.cjs` | install-skills | UserPromptSubmit / SessionStart / PostToolUse hooks |\n| `.claude/skills/skill-rules.json` | install-skills | Skill activation rules |\n| `references/*/DESIGN.md` | bundled | 67 real design systems |\n| `DESIGN.md` | your agent (after init flow) | Your project's authoritative brand spec |\n| `CLAUDE.md` / `AGENTS.md` / `.cursor/rules/omd-design.mdc` | omd-sync skill | Pointers so every agent reads DESIGN.md |\n| `.omd/preferences.md` | omd-remember skill | Append-only design correction log |\n| `.omd/runs/<id>/` | omd-harness skill | Per-harness-run artifacts (briefs, wireframes, eval, handoff zips) |\n\n## The 6 skills + 11 agents\n\nSkills (loaded into your agent's context based on prompt triggers):\n\n- **omd:apply** — DESIGN.md as authoritative context for every UI task. Routes complex requests (assets, charts, full screens, a11y audit) to specialized sub-agents.\n- **omd:init** — Bootstrap DESIGN.md from a reference + project description. 67 references, hybrid variation that preserves the reference voice while shifting only user-named axes.\n- **omd:harness** — `/omd-harness <task>` to run the 10-phase design pipeline with checkpoints. Spawns sub-agents in parallel.\n- **omd:remember** — Captures user corrections to `.omd/preferences.md` automatically when the agent detects them.\n- **omd:learn** — Folds pending corrections back into DESIGN.md by scope.\n- **omd:sync** — Maintains the shim files (CLAUDE.md / AGENTS.md / Cursor mdc) so every agent reads your DESIGN.md.\n\nSub-agents — 1 orchestrator + 10 specialists (invoked by the master or directly by skills):\n\n- **omd-master** — Conversational state machine, runs the harness phases. opus.\n- **omd-ux-researcher** — Reads bundled references, validates Tier-1 official design system URLs. opus.\n- **omd-ui-junior** — Generates wireframes and component manifests from DESIGN.md. sonnet.\n- **omd-ux-engineer** — Section-level interaction / motion / IA / mobile / perceived-perf audit + code-level fixes. NN/g heuristics + Refactoring UI + Web Vitals + WAI-ARIA. Senior advisor; pairs with `omd-ui-junior` (generator). opus.\n- **omd-asset-curator** — Picks asset medium (inline SVG / chart library / Lottie / Rive / Unsplash / 3D), generates inline code or sources external. Stack-aware (recharts vs chartjs vs custom SVG, lucide vs heroicons, etc.). sonnet.\n- **omd-3d-blender** — Blender MCP renderer with just-in-time install walkthrough. opus.\n- **omd-microcopy** — Voice-consistent copy generation tied to DESIGN.md §10. sonnet.\n- **omd-ux-writer** — Section-level copy audit + 2-3 strong alternatives + A/B hypothesis. Podmajersky / Erika Hall / Mailchimp / Stripe / GitHub voice docs integrated. Senior advisor; pairs with `omd-microcopy` (generator). opus.\n- **omd-a11y-auditor** — WCAG checks. haiku.\n- **omd-persona-tester** — Adversarial 4-persona walkthrough (V/J/F/S). sonnet.\n- **omd-critic** — Root-cause analysis when the user iterates. opus.\n\n## What 1.0.0 is not\n\n- It is not a collection of CLI commands. There is one bootstrap command. Everything else is skill prose.\n- It is not an SDK. The `dist/index.js` programmatic API is gone. If you need the matching algorithm or shim format, look at the skill markdown directly.\n- It does not generate emojis as icons. Asset agent prefers inline SVG (Lucide-matched or custom).\n\nIf you were on 0.1.x: see [MIGRATION.md](MIGRATION.md). All your old CLI commands are now spoken to your agent.\n\n## Status\n\n`v1.0.0` — first skill-first release. Surface area collapsed by ~92% versus 0.1.x. Stable for the install bootstrap; the harness is improving every release as the agent prose tightens.\n\n## License\n\nMIT. References belong to their respective companies — they are reproduced for educational reference.\n","summary":"oh-my-design (OmD) transforms an AI coding agent into a senior product designer by installing a library of 67 real‑world design system specs directly into the agent’s working memory. With a single CLI command, the package injects template “skills” and a brand‑spec file (DESIGN.md) that the agent consults to generate components, screens, copy, illustrations, and even charts, all while respecting custom voice and motion guidelines. The system requires no external APIs or additional code; once installed, designers communicate through natural language prompts to stitch design assets, produce onboarding flows, render 3D assets, or enforce style rules. It’s ideal for UI/UX designers, product managers, and front‑end developers who need rapid, brand‑consistent design production powered by an AI assistant.","description":"Generate DESIGN.md from 67 real company design systems. Now with OmD v0.1 Philosophy Layer — brand context for Claude Code.","stars":106,"language":"HTML"},{"owner":"xigua-wang","repo":"skill-doctor","url":"https://github.com/xigua-wang/skill-doctor","readme":"<div align=\"center\">\n\n# Skill Doctor\n\n**Audit coding-agent skills like infrastructure, not hidden prompt glue.**\n\n[中文文档](./README.zh-CN.md)\n\n<p>\n  <img alt=\"npm\" src=\"https://img.shields.io/badge/npm-package-161b22?style=for-the-badge&logo=npm&logoColor=white\">\n  <img alt=\"react\" src=\"https://img.shields.io/badge/react-ui-161b22?style=for-the-badge&logo=react&logoColor=61dafb\">\n  <img alt=\"typescript\" src=\"https://img.shields.io/badge/typescript-core-161b22?style=for-the-badge&logo=typescript&logoColor=3178c6\">\n  <img alt=\"local first\" src=\"https://img.shields.io/badge/local--first-workflow-161b22?style=for-the-badge\">\n  <img alt=\"bilingual\" src=\"https://img.shields.io/badge/i18n-en%20%7C%20zh--CN-161b22?style=for-the-badge\">\n</p>\n\n<p>\n  Skill Doctor is a local-first inspector for coding-agent skills. It shows what is installed,\n  which definition wins, where risk accumulates, and how a workspace behaves across project,\n  global, and system scopes.\n</p>\n\n</div>\n\n> Find the skill that actually wins, the trigger that overlaps, and the risky instruction that should not stay hidden.\n\n## Navigate\n\n- [Why People Install It](#why-people-install-it)\n- [Quick Proof](#quick-proof)\n- [Highlights](#highlights)\n- [Installation](#installation)\n- [Quick Start](#quick-start)\n- [CLI](#cli)\n- [What It Detects](#what-it-detects)\n- [Model Analysis](#model-analysis)\n- [Architecture](#architecture)\n- [Development](#development)\n\n## Why People Install It\n\nSkill Doctor is for the moment when your local agent setup stops being obvious.\n\n- \"Why did Codex or OpenClaw trigger this skill instead of the other one?\"\n- \"Which project skill overrides the global one I thought was active?\"\n- \"Which skills contain shell, secret, subprocess, network, or destructive patterns?\"\n- \"What changed between yesterday's scan and today's workspace state?\"\n\nIt gives you a local inspector for precedence, conflicts, risky patterns, and scan history before those problems turn into invisible prompt behavior.\n\n## Quick Proof\n\nRun the UI for the current project:\n\n```bash\nnpx --package @xiguawang/skill-doctor skill-doctor\n```\n\nThen click `Run new scan`.\n\nWithout any model configuration, you can already inspect:\n\n- discovered skill roots\n- precedence winners and competing definitions\n- duplicate names and trigger overlap\n- local static risk signals\n- stored scan snapshots and history\n\nIf you later configure a model provider, Skill Doctor adds summarized findings and recommendations on top of the same local scan.\n\n## Highlights\n\n| Inspect | Explain | Operate |\n| --- | --- | --- |\n| Scans OpenClaw, Codex, Claude, Cursor, Copilot, GitHub, and generic skill roots | Shows precedence chains, overrides, duplicate names, and trigger overlap | Stores snapshots and config globally in `~/.skill-doctor/` |\n| Flags shell, network, subprocess, secret, and destructive patterns | Adds model-assisted findings on top of local static analysis | Provides a local React UI with history, filtering, deletion, and bilingual support |\n\n## At A Glance\n\n```text\nscan local skill roots\n        ->\nderive precedence, conflicts, and risk signals\n        ->\nbuild a structured model-analysis payload\n        ->\nstore immutable snapshots globally\n        ->\ninspect everything in a local React UI\n```\n\n## Why Skill Doctor\n\nAs local and project-level agent skills grow, it becomes difficult to answer simple operational questions:\n\n- Which skill is actually active?\n- Why did one skill override another?\n- Which trigger phrase is ambiguous?\n- Which skill definitions deserve closer review?\n\nSkill Doctor treats skills as inspectable infrastructure instead of hidden behavior.\n\n## Installation\n\n### One-line app launch\n\n```bash\nnpx --package @xiguawang/skill-doctor skill-doctor\n```\n\n### Use as an npm package\n\n```bash\nnpm install -g @xiguawang/skill-doctor\nskill-doctor\n```\n\nOr run it without a global install:\n\n```bash\nnpx --package @xiguawang/skill-doctor skill-doctor\n```\n\nBy default, `skill-doctor`:\n\n- uses the current working directory as the default project context\n- binds the local server to `127.0.0.1`\n- starts the local UI on `http://localhost:4173`\n- attempts to open the browser\n- does not run a scan until you trigger one in the UI or pass `--scan`\n\n### Run from this repository\n\n```bash\nnpm install\nnpm run build\nnpm run serve\n```\n\n## Quick Start\n\n### Start the local UI\n\n```bash\nskill-doctor\n```\n\n### Start the UI and run an initial scan\n\n```bash\nskill-doctor --scan\n```\n\n### Scan a project from the CLI only\n\n```bash\nskill-doctor-scan --project /path/to/project\n```\n\n### Generate a Markdown report\n\n```bash\nskill-doctor-scan --project /path/to/project --markdown ./skill-report.md\n```\n\n## Product Surface\n\n| Surface | Purpose |\n| --- | --- |\n| `skill-doctor` | Starts the local UI for the current project context |\n| `skill-doctor --scan` | Starts the UI and performs an initial scan |\n| `skill-doctor-scan` | Runs scans without starting the UI |\n| React dashboard | History, settings, roots, analysis, and skill inspection |\n| Global storage | Config and immutable snapshots outside the target project |\n\n## CLI\n\n### `skill-doctor`\n\nStarts the local web application.\n\n```bash\nskill-doctor [--project <path>] [--port <number>] [--app-home <path>] [--no-open] [--scan]\n```\n\nCommon examples:\n\n```bash\nskill-doctor\nskill-doctor --scan\nskill-doctor --project /path/to/project\nskill-doctor --no-open\nskill-doctor --host 0.0.0.0\n```\n\n### `skill-doctor-scan`\n\nRuns a scan without starting the UI.\n\n```bash\nskill-doctor-scan [--project <path>] [--output <file>] [--markdown <file>] [--analysis-language <en|zh-CN>] [--app-home <path>]\n```\n\nCommon examples:\n\n```bash\nskill-doctor-scan --project .\nskill-doctor-scan --project . --output ./scan.json\nskill-doctor-scan --project . --markdown ./report.md\nskill-doctor-scan --project . --analysis-language zh-CN\n```\n\n## What It Detects\n\n- Installed skills across project, global, and system scopes\n- Standard OpenClaw roots including `<workspace>/skills`, `<workspace>/.agents/skills`, `~/.agents/skills`, and `~/.openclaw/skills`\n- OpenClaw `skills.load.extraDirs` imported automatically from `~/.openclaw/openclaw.json` when present\n- Root discovery confidence and discovery method\n- Precedence chains and likely winners\n- Duplicate normalized skill names\n- Trigger overlaps and ambiguous activations\n- Static local risk patterns in skill files\n- Missing or weak metadata such as absent trigger phrases\n\nFor OpenClaw, Skill Doctor now discovers the standard roots above and also imports `skills.load.extraDirs` from `~/.openclaw/openclaw.json` when that file is present. Manual `extraRoots` still work as an override for custom or non-standard layouts. Bundled OpenClaw install-time skills are not modeled yet.\n\n## Screenshots\n\nThe repository currently describes the key views below, but still needs committed screenshot or GIF assets. That is the next documentation upgrade for conversion.\n\n### Overview\n\nThe main dashboard is built around a single reading path: current workspace context, top-level metrics, history access, settings, and scan entry points. The hero panel keeps the product value obvious, while the right-hand summary block surfaces the current dataset and key counts without forcing the user into drawers first.\n\n### Analysis And Roots\n\nThe analysis view focuses on two things side by side: model-generated findings on the left and concrete scanned roots on the right. This keeps conclusions and evidence in the same viewport, which is especially useful when reviewing multi-agent workspaces with mixed confidence levels across project and global roots.\n\n## Model Analysis\n\nSkill Doctor can enrich each scan with model analysis through an OpenAI-compatible `chat/completions` endpoint.\n\nThe flow is:\n\n1. Skill Doctor performs a local static scan.\n2. It builds a structured compact payload from the scan.\n3. If model configuration is present, it sends that payload to the configured model endpoint.\n4. It stores the model summary, findings, recommendations, and spotlights in the snapshot.\n\nImportant details:\n\n- Configure `apiKey`, `baseUrl`, and `model` in the UI when you want model-assisted review\n- The UI does not read back the full stored API key; it only shows configured state and a masked hint\n- The local scanner ranks skills before sending them to the model\n- UI-triggered scans request model output in the current UI language\n- CLI scans default to English and support `--analysis-language zh-CN`\n- If model config is missing or the provider fails, the local scan still completes and records the analysis state\n\n## Storage\n\nSkill Doctor keeps its state outside the inspected project by default:\n\n```bash\n~/.skill-doctor/\n```\n\nThis includes:\n\n- `config.json`\n- scan snapshots\n- local history used by the UI\n\n## Architecture\n\nSkill Doctor is a local-first application with four runtime layers:\n\n```text\nCurrent project\n    |\n    v\nRoot discovery + local static scanner\n    |\n    +--> precedence / conflicts / risk signals / local priority\n    |\n    v\nStructured analysis payload\n    |\n    +--> OpenAI-compatible model analysis\n    |\n    v\nGlobal storage (~/.skill-doctor/)\n    |\n    +--> config.json\n    +--> scan snapshots\n    +--> history metadata\n    |\n    v\nLocal Node API\n    |\n    v\nReact UI\n```\n\n### Runtime Layers\n\n- `src-core/scanner/`: discovers roots, parses skills, computes precedence, conflicts, issues, and local risk signals\n- `src-core/analysis/`: builds the structured compact payload, calls the configured model endpoint, and normalizes analysis output\n- `src-core/storage/`: manages global config and immutable scan snapshots under `~/.skill-doctor/`\n- `scripts/dev-server.ts`: serves the built frontend and exposes local APIs for config, scans, history, and directory browsing\n- `src/`: renders the React UI for history, settings, scan creation, analysis, and skill inspection\n\n### Data Flow\n\n1. The user opens the local UI with the current directory as the default project context.\n2. A scan request triggers root discovery and local static analysis.\n3. The scanner builds a typed snapshot and a structured payload for the model.\n4. Model analysis returns summary, findings, recommendations, and skill spotlights.\n5. The final snapshot is stored in `~/.skill-doctor/` and immediately becomes available in the history-backed UI.\n\n## UI Features\n\n- English and Simplified Chinese interface\n- Top-bar language switcher\n- History drawer with filtering, deletion, and broken-record handling\n- Settings drawer for global model config and extra scan roots\n- Project path input and home-directory-based folder picker\n- Recent project paths from local history\n- Skill detail view with local priority breakdown\n\n## Supported Roots\n\nBuilt-in discovery currently covers common project and global roots for:\n\n- OpenClaw\n- Codex\n- Claude\n- Cursor\n- Copilot\n- GitHub\n\nYou can also define extra absolute scan roots in settings when your environment uses custom paths.\n\n## OpenClaw Support\n\nSkill Doctor supports lightweight OpenClaw integration out of the box.\n\nCovered OpenClaw roots:\n\n- `<workspace>/skills`\n- `<workspace>/.agents/skills`\n- `~/.agents/skills`\n- `~/.openclaw/skills`\n- `skills.load.extraDirs` imported automatically from `~/.openclaw/openclaw.json`\n\nCurrent OpenClaw coverage:\n\n- scans OpenClaw workspace, project-agent, personal-agent, managed, and config-driven extra skill roots\n- models the common precedence chain across those roots\n- shows conflicts, override chains, risks, and skill details in the same UI as other agent ecosystems\n- does not yet model bundled OpenClaw install-time skills\n\nFastest way to use it from an OpenClaw workspace:\n\n```bash\nnpx skill-doctor --scan\n```\n\nOr scan only and keep the output local:\n\n```bash\nnpx skill-doctor-scan --project . --output ./skill-doctor-openclaw-scan.json\n```\n\n## OpenClaw Onboarding Prompt\n\nCopy this prompt into OpenClaw when you want a lightweight Skill Doctor integration in the current workspace:\n\n```text\nIntegrate Skill Doctor into the current OpenClaw workspace with the lightest possible setup.\n\nRequirements:\n1. Treat the current directory as the target workspace.\n2. Do not modify existing OpenClaw skills unless absolutely necessary.\n3. Use Skill Doctor as an external inspector, not as a replacement for the current skill layout.\n4. Prefer one-command usage first: `npx skill-doctor --scan`.\n5. If a scan-only artifact is more appropriate, run `npx skill-doctor-scan --project . --output ./skill-doctor-openclaw-scan.json`.\n6. Preserve any existing OpenClaw `skills.load.extraDirs` behavior.\n7. After setup, summarize:\n   - which OpenClaw roots were detected\n   - which skill copy wins in each precedence chain\n   - any high-risk skills or trigger conflicts\n   - the exact command to rerun the inspection later\n\nConstraints:\n- Keep the integration local-first.\n- Do not add unnecessary dependencies.\n- Do not rewrite the repository structure.\n- If configuration is missing for model analysis, still complete the local scan and report that model analysis was skipped or failed.\n```\n\n## Demo Workspace\n\nThis repository includes a demo workspace for validation:\n\n```bash\nexamples/demo-workspace/\n```\n\nIt is useful for testing:\n\n- override behavior\n- trigger overlap detection\n- high-risk and medium-risk local patterns\n- missing metadata issues\n- local-priority ranking before model analysis\n- OpenClaw precedence across workspace, project agent, personal agent, managed local, and config-driven extra roots\n\nRun it with:\n\n```bash\nnpm run scan:demo\n```\n\nRun the OpenClaw-specific fixture with:\n\n```bash\nnpm run scan:demo:openclaw\n```\n\n## Development\n\nInstall dependencies:\n\n```bash\nnpm install\n```\n\nType-check:\n\n```bash\nnpm run typecheck\n```\n\nBuild the frontend:\n\n```bash\nnpm run build\n```\n\nRun the local app from the repository:\n\n```bash\nnpm run serve\n```\n\nBuild package artifacts:\n\n```bash\nnpm run build:package\n```\n\n## Project Structure\n\n```text\nsrc/          React frontend\nsrc-core/     scanner, analysis, storage, validation\nscripts/      CLI and local server entry points\npublic/       demo data and static assets\ndocs/         plans, reports, and product notes\nexamples/     demo workspace for validation\n```\n\n## Roadmap\n\n- Per-agent precedence rules instead of a single generic precedence model\n- Better diffing across projects or machines\n- Stronger repair suggestions and fix generation\n- More portable packaging and installation workflows\n\n## License\n\nNo license file is included in this repository snapshot yet.\n","summary":"Skill Doctor is a local‑first inspector that audits coding‑agent skill setups, revealing which skill definitions actually win, how they overlap, and where risky patterns such as shell, network or destructive code appear. It scans commonly used skill roots (OpenClaw, Codex, Claude, Cursor, Copilot, GitHub, and generic ones), builds precedence chains, flags duplicate names and trigger conflicts, and stores immutable snapshots for history. The findings can be viewed in a bilingual React UI that supports filtering, deletion, and optional model assistance, while all configuration lives locally under ~/.skill‑doctor/. Developers and operators of local or project‑level agent skills benefit from this tool by gaining clear visibility into skill activation, resolve hidden prompt behavior, and proactively spot dangerous instructions.","description":"Local-first inspector for coding-agent skills, conflicts, precedence, and risk   analysis.","stars":296,"language":"TypeScript"},{"owner":"iamzhihuix","repo":"skills-manage","url":"https://github.com/iamzhihuix/skills-manage","readme":"# skills-manage\n\n`skills-manage` is a Tauri desktop app for managing AI coding agent skills across multiple platforms from one place.\n\n[中文文档](README_CN.md)\n\n> **Disclaimer**\n>\n> `skills-manage` is an independent, unofficial desktop application for managing local skill directories and importing public skill metadata. It is not affiliated with, endorsed by, or sponsored by Anthropic, OpenAI, GitHub, MiniMax, or any other supported platform, publisher, or trademark owner.\n\n## Overview\n\n`skills-manage` follows the [Agent Skills](https://github.com/anthropics/agent-skills) open pattern and uses `~/.agents/skills/` as the canonical central directory. Skills can then be installed to individual platforms through symlinks, so one source of truth can drive multiple AI coding tools.\n\n## Highlights\n\n- Central skill library plus per-platform install and uninstall flows.\n- Claude Code can surface native skills and read-only marketplace plugin skills in one platform view.\n- Full skill detail view with Markdown preview, raw source view, and AI explanation generation.\n- Collections for organizing skills and batch-installing them to platforms.\n- Discover scan for project-level skill libraries, including an Obsidian sidebar category for vault skills (`.skills/`, `.agents/skills/`, `.claude/skills/`).\n- Marketplace browsing and GitHub repository import with authenticated requests and retry fallback.\n- Fast search for large skill libraries with deferred queries, lazy indexing, and virtualization.\n- Bilingual UI, Catppuccin themes, accent colors, onboarding, and responsive navigation.\n\n## Screenshots\n\n### Central skills and platform installs\n\n![Central skills library view](images/01.png)\n\n### Review installed skills on a specific platform\n\n![Platform skill view](images/06.png)\n\n### Discover local project skill libraries\n\n![Discover project skill libraries](images/03.png)\n\n### Browse marketplace publishers and skills\n\n![Marketplace view](images/04.png)\n\n### Import skills from a GitHub repository\n\n![GitHub repository import wizard](images/02.png)\n\n### Organize reusable collections\n\n![Skill collections view](images/05.png)\n\n## Download\n\n- Latest release: <https://github.com/iamzhihuix/skills-manage/releases/latest>\n- Current prebuilt packages: Apple Silicon macOS (`.dmg` and `.app.zip`)\n- Other platforms: run from source for now\n\n### macOS Unsigned Build\n\nThe current public macOS build is not notarized. If macOS shows a warning such as:\n\n![macOS damaged app warning](images/app-damaged.png)\n\n- `\"skills-manage\" is damaged and can't be opened`\n- `\"skills-manage\" cannot be opened because Apple could not verify it`\n\nthe app is usually not actually corrupted; it is being blocked by Gatekeeper quarantine on an unsigned build.\n\nAfter moving the app to `/Applications`, run:\n\n```bash\nxattr -dr com.apple.quarantine \"/Applications/skills-manage.app\"\n```\n\nThen launch the app again from Finder. If your app is stored somewhere else, replace the path with the actual `.app` path.\n\n## Supported Platforms\n\n| Category | Platform | Skills Directory |\n|----------|----------|-----------------|\n| Coding | Claude Code | `~/.claude/skills/` |\n| Coding | Codex CLI | `~/.agents/skills/` |\n| Coding | Cursor | `~/.cursor/skills/` |\n| Coding | Gemini CLI | `~/.gemini/skills/` |\n| Coding | Trae | `~/.trae/skills/` |\n| Coding | Factory Droid | `~/.factory/skills/` |\n| Coding | Junie | `~/.junie/skills/` |\n| Coding | Qwen | `~/.qwen/skills/` |\n| Coding | Trae CN | `~/.trae-cn/skills/` |\n| Coding | Windsurf | `~/.windsurf/skills/` |\n| Coding | Qoder | `~/.qoder/skills/` |\n| Coding | Augment | `~/.augment/skills/` |\n| Coding | OpenCode | `~/.opencode/skills/` |\n| Coding | KiloCode | `~/.kilocode/skills/` |\n| Coding | OB1 | `~/.ob1/skills/` |\n| Coding | Amp | `~/.amp/skills/` |\n| Coding | Kiro | `~/.kiro/skills/` |\n| Coding | CodeBuddy | `~/.codebuddy/skills/` |\n| Coding | Hermes | `~/.hermes/skills/` |\n| Coding | Copilot | `~/.copilot/skills/` |\n| Coding | Aider | `~/.aider/skills/` |\n| Lobster | OpenClaw (开爪) | `~/.openclaw/skills/` |\n| Lobster | QClaw (千爪) | `~/.qclaw/skills/` |\n| Lobster | EasyClaw (简爪) | `~/.easyclaw/skills/` |\n| Lobster | EasyClaw V2 | `~/.easyclaw-20260322-01/skills/` |\n| Lobster | AutoClaw | `~/.openclaw-autoclaw/skills/` |\n| Lobster | WorkBuddy (打工搭子) | `~/.workbuddy/skills-marketplace/skills/` |\n| Central | Central Skills | `~/.agents/skills/` |\n\n> Note: Claude Code also surfaces marketplace plugin directories under `~/.claude/plugins/marketplaces/*` as read-only rows in the Claude view. Those entries are display-only and are not managed like native skills in `~/.claude/skills/`.\n\nCustom platforms can be added through Settings.\n\n## Privacy & Security\n\n- **Local-first storage** — metadata, collections, scan results, settings, and cached AI explanations stay in `~/.skillsmanage/db.sqlite` or the local skill directories you manage.\n- **No telemetry** — the app does not include analytics, crash reporting, or usage tracking.\n- **Network access is feature-driven** — outbound requests only happen when you explicitly use marketplace sync/download, GitHub import, or AI explanation generation.\n- **Credentials are stored locally** — GitHub PAT and AI API keys are kept in the local SQLite settings table and are not encrypted at rest by the app.\n- Never post real secrets in issues, pull requests, screenshots, or logs.\n\n## Tech Stack\n\n| Layer | Technology |\n|-------|-----------|\n| Desktop framework | Tauri v2 |\n| Frontend | React 19, TypeScript, Tailwind CSS 4 |\n| UI components | shadcn/ui, Lucide icons |\n| State management | Zustand |\n| Markdown | react-markdown |\n| i18n | react-i18next, i18next-browser-languagedetector |\n| Theming | Catppuccin 4-flavor palette |\n| Backend | Rust (serde, sqlx, chrono, uuid) |\n| Database | SQLite via sqlx (WAL mode) |\n| Routing | react-router-dom v7 |\n\n## Development\n\n### Prerequisites\n\n- [Node.js](https://nodejs.org/) (LTS)\n- [pnpm](https://pnpm.io/)\n- [Rust toolchain](https://rustup.rs/) (stable)\n- Tauri v2 system dependencies: <https://v2.tauri.app/start/prerequisites/>\n\n### Install Dependencies\n\n```bash\npnpm install\n```\n\n### Run in Development\n\n```bash\npnpm tauri dev\n```\n\nThe Vite dev server runs on port `24200`.\n\n### Validation\n\n```bash\npnpm test\npnpm typecheck\npnpm lint\ncd src-tauri && cargo test\ncd src-tauri && cargo clippy -- -D warnings\n```\n\n## Project Structure\n\n```text\nskills-manage/\n├── src/                        # React frontend\n│   ├── components/             # UI components\n│   ├── i18n/                   # Locale files and i18n setup\n│   ├── lib/                    # Frontend helpers\n│   ├── pages/                  # Route views\n│   ├── stores/                 # Zustand stores\n│   ├── test/                   # Vitest + RTL tests\n│   └── types/                  # Shared TypeScript types\n├── src-tauri/                  # Rust backend\n│   └── src/\n│       ├── commands/           # Tauri IPC handlers\n│       ├── db.rs               # SQLite schema, migrations, queries\n│       ├── lib.rs              # Tauri app setup\n│       └── main.rs             # Desktop entry point\n├── public/                     # Static assets\n├── CHANGELOG.md                # English changelog\n├── CHANGELOG.zh.md             # Chinese changelog\n└── release-notes/              # GitHub release notes\n```\n\n## Database\n\nThe SQLite database lives at `~/.skillsmanage/db.sqlite` and is initialized automatically on first launch.\n\n## Changelog\n\n- English: [CHANGELOG.md](CHANGELOG.md)\n- Chinese: [CHANGELOG.zh.md](CHANGELOG.zh.md)\n\n## Contributing\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for development setup, validation commands, and pull request expectations.\n\n## Community\n\nJoin the Discord community: <https://discord.gg/fuGURex5fV>\n\n## Security\n\nSee [SECURITY.md](SECURITY.md) for vulnerability reporting and data-handling notes.\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/svg?repos=iamzhihuix/skills-manage&type=Date)](https://www.star-history.com/#iamzhihuix/skills-manage&Date)\n\n## License\n\nThis project is licensed under the Apache License 2.0. See [LICENSE](LICENSE).\n","summary":"`skills‑manage` is a Tauri‑based desktop application that centralises the management of AI coding agent skills for a wide array of platforms such as Claude Code, Codex CLI, Cursor, Gemini CLI, and many others. It stores skills in a single canonical directory (`~/.agents/skills/`) and installs them to each platform via symlinks, while offering features like a full‑fledged skill detail view, curated collections, marketplace browsing, and GitHub repo import. The UI includes fast, virtualised search, Markdown previews, and bilingual themes, making it easy for developers to discover, organise, and deploy reusable skills across multiple AI‑coding tools in one place. Those building or maintaining AI coding workflows—especially developers using Claude, Codex, Cursor, or similar agents—will find this tool invaluable for streamlining skill management.","description":"Desktop app to manage AI coding agent skills across Claude Code, Cursor, Gemini CLI, Codex, and 20+ platforms from one place.","stars":1614,"language":"TypeScript"},{"owner":"nateherkai","repo":"AIS-OS","url":"https://github.com/nateherkai/AIS-OS","readme":"# AIS-OS — AI Operating System starter kit for Claude Code\n\nA free, MIT-licensed starter kit that turns Claude Code into your personal **AI Operating System (AIOS)**. Audience: anyone building automations — solopreneurs, small business operators, managers, creators, AI consultants. Pairs with a companion masterclass video.\n\nThe kit personalizes itself to you via an `/onboard` interview, then gives you two recurring thinking skills (`/audit`, `/level-up`) to keep building leverage week over week.\n\n> **AIS-OS** stands for **AI Automation Society OS** — the way Nate designed this AIOS to be set up for members of his community, [AI Automation Society](https://www.skool.com/ai-automation-society). The kit is universal (it works for anyone), but the structure mirrors how AIS members run their own businesses on top of it.\n\n---\n\n## The litmus test\n\n> **\"While you're not at your desk, your AIS-OS observes one real-world event and produces an output that's faster and more accurate than what you'd produce yourself.\"**\n\nEvery design decision in this kit rolls up to that test. If a layer, skill, or template doesn't contribute to it, it doesn't ship.\n\n---\n\n## How you'll know it's working\n\nThree felt **success indicators** tell you the AIOS is actually changing how you work. Not KPIs — there's no objective metric. These are lived experiences that show up in your week.\n\n**1. Team-reaches-out:**\n\n> *\"A teammate messages you with a question. You realize your AIOS would answer it better, faster, and with exact sources — even if you were awake and free. So you ask your AIOS too. That's the moment you stop being a bottleneck for your own knowledge.\"*\n\n**2. Context-switching reduction:**\n\n> *\"You stop opening new tabs. You stop launching the desktop app. When something new lands, your first move is to ask the AIOS, not to open six things. The default surface for thought work shifts. Silent. Compounding.\"*\n\n**3. Knowledge-leaves-your-head:**\n\n> *\"You stop trying to remember business facts. You don't rehearse what you decided last quarter or what your customer said in that meeting. You trust the retrieval. The AIOS holds the truth, you hold the questions.\"*\n\n**Personal foundation → company AI-readiness.** Once these indicators show up for one person, the same data architecture powers everything else. Custom dashboards on the data you already collect. Automations on top of the connections you already wired. Team rollout where everyone has theirs. *A company where every operator runs a personal AIOS is a company that's actually AI-ready.*\n\nThe kit teaches personal AIOS first. Everything scales from there.\n\n---\n\n## Two frameworks\n\nThe kit teaches two complementary frameworks. **Three Ms first, Four Cs second.** Without the brain rewire, the architecture is just a folder structure.\n\n### The Three Ms — operator brain (how you think)\n\n| M | One-liner |\n|---|---|\n| **Mindset** | Default Shift, Function Breakdown, Curiosity Rule. *To what extent can AI be leveraged here?* |\n| **Method** | Find Constraint → EAD (Eliminate, Automate, Delegate) → Map Process → Pick Autonomy Level → Tie to KPI. |\n| **Machine** | Lego Principle, Validation Chain, Bike Method, Intern Rule, Kill Switch. *Boring is beautiful. Workflows beat agents.* |\n\nFull breakdown in `references/3ms-framework.md`. The `/level-up` skill walks you through all three weekly.\n\n> *The Three Ms of AI™ is a trademark of Nate Herk. © 2026 Nate Herk.*\n\n### The Four Cs — architecture (what you build)\n\n| # | Layer | One-liner | \"This layer is in place\" test |\n|---|---|---|---|\n| 1 | **Context** | Knows your business | Fresh Claude session answers \"what does this business do and who works here?\" without browsing |\n| 2 | **Connections** | Reaches your stuff | \"What's on my calendar tomorrow and what tasks are due?\" → live data, no paste |\n| 3 | **Capabilities** | Knows how to do the work | A short phrase triggers a multi-step workflow that produces an artifact |\n| 4 | **Cadence** | Runs without being asked | Laptop closed. A brief lands in the inbox. A teammate messages it and gets a real answer |\n\n**Brand line:** Context. Connections. Capabilities. Cadence.\n\n> *The Four Cs of an AIOS™ is a trademark of Nate Herk. © 2026 Nate Herk.*\n\nDependency graph: Context is non-skippable. Connections + Capabilities can build in parallel. Cadence is last — don't automate workflows that don't work manually.\n\n---\n\n## What ships — 3 skills\n\nThe kit is intentionally lean. Skills here are ideation prompts and thinking tools, not heavy automations. You hack on top of the structure.\n\n| Skill | Type | When to run |\n|---|---|---|\n| `/onboard` | Setup wizard (one-time) | Day 1, immediately after clone. 7-question interview. Generates Day-1 file set + fills `CLAUDE.md`. |\n| `/audit` | Recurring thinking skill | Day 7, then weekly. Four-Cs gap report. Read-only. Watch the score climb. |\n| `/level-up` | Recurring thinking skill | Day 14, then weekly. Three Ms interview (Mindset → Method → Machine). One run = one shipped artifact. |\n\n`/audit` asks *\"is the AIOS built right?\"* (form). `/level-up` asks *\"what business leverage am I missing?\"* (function). They work in series — fix structure first, then capability planning becomes meaningful.\n\n---\n\n## Quick start\n\n1. **Clone the repo** to a working folder on your machine.\n2. **Open it in Claude Code** and run `/onboard`. Answer the 7 questions honestly. Voice samples must be pasted, not described. Takes ~15 minutes. Day-1 file set drops at the end.\n3. **Use it for a week.** Bring real questions. Make real decisions. Log them via `/decision` (or just append to `decisions/log.md`).\n4. **Day 7:** run `/audit`. Read the Four-Cs gap report. Pick one gap to close.\n5. **Day 14:** run `/level-up`. The Three Ms interview surfaces one automation worth building. Build it.\n6. **Week 3+:** weekly `/level-up` ritual. One shipped artifact per week.\n\n---\n\n## Repo layout\n\n```\nAIS-OS/\n├── README.md\n├── CLAUDE.md                        ← Your operating manual (filled by /onboard)\n├── EXPANSIONS.md                    ← What to add as you grow\n├── LICENSE\n├── .gitignore\n├── aios-intake.md                   ← Source-of-truth for /onboard. Edit + re-run any time.\n├── connections.md                   ← Registry of every system your AIOS can reach\n├── context/                         ← About you, your business (filled by /onboard)\n├── references/\n│   └── 3ms-framework.md             ← The operator brain\n├── decisions/\n│   └── log.md                       ← Append-only record of what was decided and why\n├── archives/                        ← Old stuff. Don't delete. Move here.\n└── .claude/\n    └── skills/\n        ├── onboard/SKILL.md\n        ├── audit/SKILL.md\n        └── level-up/SKILL.md\n```\n\nSee `EXPANSIONS.md` for what to add as you grow (`projects/`, `templates/`, `scripts/`, `.claude/agents/`, sub-OS folders, etc.).\n\n---\n\n## License + attribution\n\nMIT License. © 2026 Nate Herk.\n\nThe Three Ms of AI™ and The Four Cs of an AIOS™ are trademarks of Nate Herk. Both frameworks ship in this repo with attribution. Use freely; don't repackage as your own.\n\nThe companion masterclass video walks you through the kit step by step. Link will land here once it ships.\n","summary":"AIS‑OS is a free, MIT‑licensed starter kit that transforms Claude Code into a personal AI Operating System, guiding users through an onboarding interview and ongoing “audit” and “level‑up” skills to build lasting leverage. It teaches a dual‑framework approach—mind‑set, method, and machine concepts in the “Three Ms”, and a layered architecture of context, connections, capabilities, and cadence in the “Four Cs”—so the system automatically understands a business, pulls live data, executes workflows, and runs quietly in the background. The kit is designed for anyone building automations, from solopreneurs and small‑business operators to managers, creators, and AI consultants, and it can scale from an individual to an entire team. Success is measured by how the AIOS becomes the go‑to source of knowledge, reduces the need to switch contexts, and frees users from memorizing business facts.","description":"AI Operating System starter kit for Claude Code — three-skill kit (/onboard, /audit, /level-up) + 3Ms framework. Companion to the AIOS masterclass.","stars":234,"language":null},{"owner":"ksimback","repo":"tech-debt-skill","url":"https://github.com/ksimback/tech-debt-skill","readme":"# tech-debt-audit\n\nA Claude Code skill that produces a thorough, citable tech debt audit of your entire codebase — not a generic best-practices checklist.\n\n```\n/tech-debt-audit\n```\n\nThat's the whole interface. Run it in any repo, get back `TECH_DEBT_AUDIT.md` with file-cited findings, severity, effort estimates, and a ranked list of what to actually fix.\n\n## Why this exists\n\nLLM-generated code reviews fail in a predictable way: they pattern-match against generic heuristics, surface obvious findings without grounding them in the actual code, and produce comprehensive-feeling output that nobody acts on. The result is a tab nobody opens twice.\n\nThis skill is opinionated about avoiding that failure mode. Three design choices do most of the work:\n\n**Forced orientation before judgment.** The protocol requires the model to read the manifest, map the directory structure, analyze git churn, and write a mental model of the architecture *before* it forms any opinions. Phase 1 isn't optional. Findings without context are vibes.\n\n**File:line citations on every finding.** A finding without a citation is unfalsifiable, and unfalsifiable findings don't get fixed. The skill rejects vague claims like \"the code generally...\" and requires `path/to/file.ext:LINE` on every concrete finding.\n\n**A required \"looks bad but is actually fine\" section.** This is the single biggest separator between a real audit and a checklist regurgitation. Forcing the model to surface calls it considered making and chose not to is what catches shallow analysis. If that section comes back empty, the audit didn't look hard enough.\n\nThe skill also explicitly forbids recommending rewrites, forbids padding categories with filler, and produces a persistent artifact (`TECH_DEBT_AUDIT.md`) you can commit and track over time.\n\n## Why not the built-in Claude Code skills?\n\nClaude Code ships several skills that touch this space. None of them do what a debt audit needs to do.\n\n| Built-in | What it does | Why it's not a debt audit |\n|----------|--------------|----------------------------|\n| `/review` | PR-style code review of changes | Diff-scoped. Useful before merging a branch, not useful when you've inherited 80k LOC and want to know what's rotten. |\n| `/simplify` | Reduces over-engineered code in a specific area | Tactical, not architectural. Doesn't survey, doesn't cite, doesn't produce an artifact. |\n| `/debug` | Targets a specific failure or unexpected behavior | Reactive. You point it at a known problem; an audit's job is to *find* the problems. |\n| `/loop`, `/batch` | Workflow primitives for repeated or grouped tasks | Orchestration, not analysis. |\n\nWhat this skill adds:\n\n- **Whole-repo scope** across the nine dimensions that actually matter for debt: architectural decay, consistency rot, type & contract debt, test debt, dep & config debt, performance & resource hygiene, error handling & observability, security hygiene, and documentation drift.\n- **Multi-tool grounding.** Detects the stack and runs the right tools — `npm audit`, `knip`, `madge`, `depcheck` for TS/JS; `pip-audit`, `ruff`, `vulture`, `pydeps` for Python; `cargo audit`, `cargo udeps`, `cargo machete` for Rust; `govulncheck`, `staticcheck`, `golangci-lint` for Go — and folds the findings into the report.\n- **Subagent dispatch for large repos.** For codebases over ~50k LOC, the protocol parallelizes across modules so the main agent doesn't run out of context window before Phase 3.\n- **Persistent, citable artifact.** `TECH_DEBT_AUDIT.md` lives in your repo. You can commit it, review it in PRs, link to specific findings.\n- **Repeat-run mode.** On subsequent runs, resolved findings are marked `RESOLVED`, stale ones are updated, and new ones are tagged `NEW`. The audit becomes a living document.\n\n## Installation\n\nPersonal install (available across all your projects):\n\n```bash\nmkdir -p ~/.claude/skills/tech-debt-audit\n```\n\n```bash\ncurl -o ~/.claude/skills/tech-debt-audit/SKILL.md https://raw.githubusercontent.com/ksimback/tech-debt-skill/main/SKILL.md\n```\n\nProject-only install (just this repo):\n\n```bash\nmkdir -p .claude/skills/tech-debt-audit && curl -o .claude/skills/tech-debt-audit/SKILL.md https://raw.githubusercontent.com/ksimback/tech-debt-skill/main/SKILL.md\n```\n\nVerify it's available:\n\n```bash\nclaude --print \"/skills\" | grep tech-debt-audit\n```\n\n## Usage\n\nIn Claude Code, in the repo you want audited:\n\n```\n/tech-debt-audit\n```\n\nThat's it. Output goes to `TECH_DEBT_AUDIT.md` in the repo root. First run takes 5–20 minutes depending on repo size. Subsequent runs in repeat-run mode are faster because the existing audit is used as a baseline.\n\nTo audit only a specific subtree (useful for very large monorepos):\n\n```\n/tech-debt-audit src/payments\n```\n\nTo get a mid-audit course correction (recommended on first run for any new codebase), interrupt after Phase 1 with:\n\n> Before Phase 2, tell me what surprised you in Phase 1 and what you want to investigate that isn't in the dimensions list.\n\nThe best findings often come from things the prompt didn't anticipate.\n\n## How it works\n\nThree phases:\n\n1. **Orient** — read the manifest, map the structure, analyze `git log` for churn, identify the largest and most-modified files (their intersection is where debt usually hides), write a mental model.\n2. **Audit** — sweep across nine dimensions using `rg`, `ast-grep`, and language-native tooling. Cite `file:line` on every finding.\n3. **Deliverable** — write `TECH_DEBT_AUDIT.md` with executive summary, mental model, findings table, top-5 priorities, quick wins, the \"looks bad but is fine\" section, and open questions.\n\nThe full protocol is in [`SKILL.md`](./SKILL.md).\n\n## What the output looks like\n\n`TECH_DEBT_AUDIT.md` has this shape:\n\n```\n## Executive summary\n- 3 Critical findings, 12 High, 31 Medium, 18 Low\n- Largest debt concentration: src/payments/* (3 of 3 Critical findings)\n- ...\n\n## Findings\n| ID   | Category            | File:Line                       | Severity | Effort | Description | Recommendation |\n| F001 | Architectural decay | src/payments/processor.ts:1240  | Critical | L      | 1,400-line god class handling routing, validation, retry, and reconciliation | Extract retry and reconciliation into separate services |\n| ...\n\n## Top 5\n1. F001 — Decompose payments/processor.ts: ...\n\n## Quick wins\n- [ ] F042: Remove unused dep `lodash.merge` (replaced by native ...)\n- [ ] ...\n\n## Things that look bad but are actually fine\n- The deeply nested callback pattern in src/legacy/webhooks.ts looks like a refactor target, but it preserves ordering guarantees the queue-based replacement would break. Leave it.\n- ...\n\n## Open questions for the maintainer\n- Is src/experiments/ intentionally untested, or did it fall through?\n- ...\n```\n\n## Customization\n\nThe skill is designed to be forked and adapted. Common modifications:\n\n- **Add domain-specific dimensions.** The nine in Phase 2 are a starting point. Frontend repos can add accessibility; ML repos can add eval drift; LLM apps can add prompt versioning and tool-call cost; infra can add IaC drift.\n- **Tune severity thresholds.** If your codebase has a higher baseline (e.g., god files defined as >800 LOC instead of >500), edit the dimension definitions directly.\n- **Override per project.** A `.claude/skills/tech-debt-audit/SKILL.md` in a specific repo overrides the global one. Useful when one project needs custom dimensions the others don't.\n- **Split into supporting files.** As `SKILL.md` grows, extract sections into sibling files (`severity-rubric.md`, `stack-tooling.md`) and reference them. Claude Code lazy-loads supporting files, keeping the main protocol tight.\n\n## Limitations\n\nThis is a static audit, not a security audit. It catches obvious security hygiene issues (hardcoded secrets, SQL injection patterns, weak crypto) but won't replace a real pen test or threat model.\n\nIt won't catch business-logic bugs. Those require domain knowledge the model doesn't have.\n\nIt can't perfectly distinguish intentional simplicity from accidental simplicity. The \"open questions\" section exists for exactly this reason — when the skill is unsure, it asks rather than asserting.\n\nFor very large repos (>200k LOC), even subagent dispatch can produce shallow results. Scope to a module or run section-by-section.\n\n## Contributing\n\nPRs welcome. Before submitting:\n\n1. Test against at least two real codebases of different stacks.\n2. If you're adding a dimension, include a justification for why it isn't covered by the existing nine.\n3. If you're tightening a rule, show a before/after audit excerpt demonstrating the improvement.\n\nThe single design constraint: this skill must produce findings that engineers act on. Anything that pushes toward \"feels comprehensive but nothing changes\" is a regression and will be rejected.\n\n## License\n\nMIT. Use it, fork it, ship it. Attribution appreciated but not required.\n\n## Credits\n\nBuilt on the [Claude Code Agent Skills](https://code.claude.com/docs/en/skills) standard.\n\nInspired by the experience of working with Claude Code on codebases that got really messy over time.\n\n","summary":"The tech‑debt‑audit skill creates a thorough, citable audit of an entire codebase, producing a `TECH_DEBT_AUDIT.md` file that lists architecture, consistency, test, dependency, security, and documentation issues with file‑line citations. It forces the model to first build an architectural mental model, requires concrete evidence for every finding, and includes a “looks bad but is actually fine” section to weed out shallow checks. The audit runs across a repository’s whole scope, dispatching sub‑agents for large projects, integrates native tools for multiple languages, and retains a persistent, version‑controlled record that updates on repeat runs. Developers and maintainers of large or legacy codebases can use it to trace, prioritize, and track tech debt remediation in a reproducible, actionable format.","description":"Claude Code skill that produces a thorough, file-cited tech debt audit of an entire codebase","stars":358,"language":null},{"owner":"LayrKits","repo":"Sprite-Pipeline","url":"https://github.com/LayrKits/Sprite-Pipeline","readme":"# Sprite Sheet Pipeline\n\nReusable video-to-sprite-sheet pipeline for turning ordered animation frames into\nclean horizontal `256 x 256` sprite strips.\n\nThis repo includes reusable workflow docs, processing tools, a static viewer,\nand a generic AI-assistant skill. It intentionally excludes generated assets,\nvideos, scratch outputs, demo sheets, and project-specific art.\n\n## Quick Start\n\n1. If using an AI assistant, give it\n   `skills/sprite-sheet-pipeline/SKILL.md` or install that folder in the\n   assistant's skill system. Ask it to use the `sprite-sheet-pipeline` skill.\n2. Set up Python dependencies:\n\n   ```bash\n   python3 -m venv .venv\n   ./.venv/bin/python -m pip install -r requirements.txt\n   ```\n\n   FFmpeg is not installed by `requirements.txt`; install it separately so\n   `tools/extract_frames_ffmpeg.py` can call the `ffmpeg` command:\n\n   ```bash\n   # macOS\n   brew install ffmpeg\n\n   # Windows, with winget\n   winget install Gyan.FFmpeg\n\n   # Ubuntu/Debian Linux\n   sudo apt install ffmpeg\n   ```\n3. To create source footage, use:\n   - `docs/reference/PROMPTING_IMAGE_MODELS.md` for first poses, character\n     references, and transition frames.\n   - `docs/reference/PROMPTING_VIDEO_MODELS.md` for Kling or other\n     image-to-video prompts.\n4. To process footage, follow `docs/QUICKSTART.md`: extract frames, matte if\n   needed, build the sprite sheet, review the preview/report, and promote only\n   approved outputs.\n5. After promotion, run:\n\n   ```bash\n   python tools/build_sprite_gallery_manifest.py\n   ```\n\n6. Open `sprite_viewer.html` directly in a browser to inspect final sheets.\n\n## Included\n\n- `tools/`: frame extraction, matting, cleanup/repack, contact sheet, resize, and\n  viewer manifest utilities.\n- `docs/`: active workflow notes, quickstart, folder conventions, extraction\n  notes, and game integration guidance.\n- `docs/reference/`: text-only image/video prompting references for creating\n  clean animation source footage when needed.\n- `skills/sprite-sheet-pipeline/`: generic AI-assistant skill that routes\n  image prompting, video prompting, processing, validation, and promotion tasks\n  to the right docs.\n- `sprite_viewer.html`: static browser viewer for horizontal sprite sheets.\n- `sprite_gallery_manifest.js`: empty starter manifest for the viewer.\n- `sprite_gallery_pins.json`: empty starter pin list for the viewer.\n- Empty `Videos/`, `work/`, `Final Sprite Sheets/`, and `Cleanup/` folders with\n  `.gitkeep` files so the repo starts with the expected shape.\n\n## Basic Flow\n\n1. Put source animation videos in `Videos/` or `Videos/To Be Processed/`.\n2. Extract ordered frames into `work/extracted/<character>/<action>/`.\n3. Matte light backgrounds into `work/matted/<character>/<action>/` when needed.\n4. Build a sprite strip with `tools/animation_pipeline.py`.\n5. Review the preview image and JSON report.\n6. Promote only approved sheets and matching cells into\n   `Final Sprite Sheets/<GameName>/<CharacterName>/<animation>/`.\n7. Run `python tools/build_sprite_gallery_manifest.py`.\n8. Open `sprite_viewer.html` directly in a browser.\n\nSee `docs/QUICKSTART.md` for copy-paste commands.\n\n## Asset Policy\n\nKeep generated materials out of this repo unless they are tiny, intentional,\ntext-documented references that are required to explain or test pipeline\nbehavior. Normal source videos, extracted frames, matted frames, previews,\nreports, final sheets, and game/demo art should stay ignored by default.\n","summary":"The Sprite‑Sheet Pipeline is a reusable workflow for turning ordered animation frames into clean 256 × 256 horizontal sprite strips. It bundles frame‑extraction, matting, cleanup, gallery‑manifest generation, and a simple browser viewer, while also offering an AI‑assistant skill that guides users through the entire process. Game developers, indie studios, and animators who need a consistent, programmable way to convert video footage into game‑ready sprite sheets will find the tool useful, as it preserves a clean repo structure and keeps generated assets out of source control.","description":"2D Sprite Sheet Creation Pipeline","stars":376,"language":"Python"},{"owner":"tiangolo","repo":"library-skills","url":"https://github.com/tiangolo/library-skills","readme":"<p align=\"center\">\n  <a href=\"https://library-skills.io\"><img src=\"https://library-skills.io/img/logo-margin/logo-margin-vector.svg#only-light\" alt=\"Library Skills\"></a>\n\n</p>\n<p align=\"center\">\n    <em>Library Skills, AI Agents using libraries, as intended, always up to date.</em>\n</p>\n<p align=\"center\">\n<a href=\"https://github.com/tiangolo/library-skills/actions?query=workflow%3ATest+event%3Apush+branch%3Amain\">\n    <img src=\"https://github.com/tiangolo/library-skills/actions/workflows/test.yml/badge.svg?event=push&branch=main\" alt=\"Test\">\n</a>\n<a href=\"https://github.com/tiangolo/library-skills/actions?query=workflow%3APublish\">\n    <img src=\"https://github.com/tiangolo/library-skills/actions/workflows/publish.yml/badge.svg\" alt=\"Publish\">\n</a>\n<a href=\"https://coverage-badge.samuelcolvin.workers.dev/redirect/tiangolo/library-skills\">\n    <img src=\"https://coverage-badge.samuelcolvin.workers.dev/tiangolo/library-skills.svg\" alt=\"Coverage\">\n</a>\n<a href=\"https://pypi.org/project/library-skills\">\n    <img src=\"https://img.shields.io/pypi/v/library-skills?color=%2334D058&label=pypi%20package\" alt=\"Python package version\">\n</a>\n<a href=\"https://www.npmjs.com/package/library-skills\">\n    <img src=\"https://img.shields.io/npm/v/library-skills?color=%2334D058&label=npm%20package\" alt=\"npm package version\">\n</a>\n</p>\n\n---\n\n**Documentation**: [https://library-skills.io](https://library-skills.io)\n\n**Source Code**: [https://github.com/tiangolo/library-skills](https://github.com/tiangolo/library-skills)\n\n---\n\nLet your AI agents use libraries as intended, **always up to date**.\n\nSupporting libraries (e.g. [FastAPI](https://fastapi.tiangolo.com), [Streamlit](https://streamlit.io)) include their own AI skills ([https://agentskills.io](https://agentskills.io)) embedded, updated in sync with each new version of the library.\n\nIn Python, you can install them with:\n\n```console\n$ uvx library-skills\n```\n\nIn JavaScript/TypeScript, you can install them with:\n\n```console\n$ npx library-skills\n```\n\nThis will scan the dependencies for the current project, find the installed libraries, and ask you which of their skills you want to install in the project.\n\nThen it will add them to the `.agents` directory as symbolic links, so when you update the libraries, the skills are updated too.\n\n/// tip\n\nIf you are using Claude Code, add the `--claude` CLI Option to install the skills in the `.claude/skills` directory too, as Claude Code doesn't support the standard `.agents` directory.\n\n///\n\n## Why Library Skills\n\n<abbr title=\"Large Language Models\">LLMs</abbr> are great at helping you code, but are trained on data that existed until a certain point in time, which in the end, is always **old data**.\n\nAdditionally, they are trained on a lot of code examples, that in many cases use **old patterns**.\n\nWhen there are **new features** or changes in the libraries, agents normally don't know about them, don't know how to use them, and insist on using old, deprecated, and sometimes hallucinated patterns.\n\nBut library authors can help them, providing **official library *skills*** that are always up to date, included in each new version of the package, in sync with the version of the library installed.\n\nAnd you can install and use these official **Library Skills for Agents** with one command.\n\n## License\n\nThis project is licensed under the terms of the [MIT license](https://github.com/tiangolo/library-skills/blob/main/LICENSE).\n","summary":"Library‑Skills is a tool that lets AI agents tap into the official “skills” bundled with popular libraries such as FastAPI and Streamlit. By installing the package with a single command it scans your project’s dependencies, offers the relevant skills, and places them in a `.agents` directory as symlinks, ensuring the code always matches the latest library version. The system supports both Python and JavaScript/TypeScript environments and even integrates with Claude Code via a dedicated CLI flag. Developers building AI‑powered assistants or generative‑coding workflows will benefit from having up‑to‑date library knowledge without needing to manually rewrite patterns.","description":"Library Agent Skills","stars":438,"language":"Python"},{"owner":"KAOPU-XiaoPu","repo":"web-design","url":"https://github.com/KAOPU-XiaoPu/web-design","readme":"<div align=\"center\">\n\n# web-design\n\n**A Claude Code SKILL for designing beautiful, consistent web pages — spec first, code second.**\n\n[![Live Demo](https://img.shields.io/badge/Live_Demo-kaopu--xiaopu.github.io/web--design-5EEAD4?style=for-the-badge)](https://kaopu-xiaopu.github.io/web-design/)\n\n[![License: MIT](https://img.shields.io/badge/License-MIT-FB923C.svg?style=flat-square)](./LICENSE)\n[![GitHub Pages](https://img.shields.io/badge/GitHub_Pages-Live-5EEAD4?style=flat-square)](https://kaopu-xiaopu.github.io/web-design/)\n![HTML](https://img.shields.io/badge/HTML-E34F26?style=flat-square&logo=html5&logoColor=white)\n![CSS](https://img.shields.io/badge/CSS-1572B6?style=flat-square&logo=css3&logoColor=white)\n![JavaScript](https://img.shields.io/badge/JavaScript-F7DF1E?style=flat-square&logo=javascript&logoColor=black)\n\n<br>\n\n[![web-design landing page](./docs/images/preview/hero.webp)](https://kaopu-xiaopu.github.io/web-design/)\n\n</div>\n\n\n## ✨ What it does\n\nFeed the SKILL a **PRD**, a **reference URL**, or a **screenshot** — any combination works. It produces a readable, editable, portable `DESIGN.md` **first**. Only then does it generate the web code.\n\nThe result: UI, visuals, motion, and responsiveness that all land. Consistent across pages, portable across AI tools, editable by hand.\n\n## 🧭 How it works\n\n**Phase A · Understand.** Extracts design cues from PRD / URL / screenshot / keywords / brand name. A graceful fallback chain keeps it working even with sparse inputs.\n\n**Phase B · Produce `DESIGN.md`.** A full 9-section spec: color · type · component · layout · motion · depth · do's & don'ts · responsive · accessibility. Once you approve it, the spec lives in your project and can be edited by hand.\n\n**Phase C · Generate code.** Strictly follows the spec. Self-audits against a 100-score quality checklist. Diff-audits when a reference URL exists.\n\n\n## 📦 Repository layout\n\n```\nweb-design/\n├── SKILL.md            # the skill itself (instructions for Claude)\n├── references/         # design systems, style seeds, motion library,\n│                       # interaction patterns, quality checklist\n├── scripts/            # Playwright crawler, static token extractor,\n│                       # Unsplash image fetcher\n└── docs/               # landing page (served by GitHub Pages)\n    ├── index.html\n    ├── styles.css\n    ├── app.js\n    ├── DESIGN.md       # the page's own spec (produced by the SKILL itself)\n    └── images/\n```\n\n## 🚀 Install\n\nClone into your Claude Code skills directory:\n\n```bash\ngit clone https://github.com/KAOPU-XiaoPu/web-design ~/.claude/skills/web-design\n```\n\nClaude Code will auto-discover the SKILL the next time you start a session.\n\n## 💻 Run the landing page locally\n\n```bash\ncd web-design/docs\npython3 -m http.server 8000\n# open http://localhost:8000\n```\n\nOpening `index.html` directly with `file://` won't work — Google Fonts and the OGL ES module need an HTTP origin.\n\n\n## 🙏 Credits\n\nMotion effects on the landing page derive from work by [David Haz](https://github.com/DavidHDev):\n\n- [vue-bits](https://github.com/DavidHDev/vue-bits) (MIT) — GradientBlinds, RollingGallery\n- [react-bits](https://github.com/DavidHDev/react-bits) (MIT) — DomeGallery\n\nReference inspirations for the `DESIGN.md` structure draw from [awesome-design-md](https://github.com/VoltAgent/awesome-design-md) (MIT).\n\n## 📄 License\n\n[MIT](./LICENSE) — use it, fork it, ship it.\n\n---\n\n<div align=\"center\">\n\n**Built with ❤️ by [@KAOPU-XiaoPu](https://github.com/KAOPU-XiaoPu)**\n\n[Live Demo](https://kaopu-xiaopu.github.io/web-design/) · [Report Issues](https://github.com/KAOPU-XiaoPu/web-design/issues) · [Install](#-install)\n\n</div>\n","summary":"Web-design is a Claude Code skill that turns a product‑requirement document, reference URL, screenshot, or a mix of these into a detailed, editable `DESIGN.md` spec before generating fully‑responsive web code that follows that spec. The skill extracts visual and interaction cues across three phases—understanding the brief, producing a nine‑section design document (color, type, component, layout, motion, etc.), and then coding with a built‑in quality checklist and optional diff‑audit against a reference URL. By producing a portable, human‑editable design spec, it allows developers and designers to collaborate cleanly, maintain consistency across pages, and quickly iterate on design changes. Teams building or refactoring web interfaces benefit from automated, spec‑driven output that remains editable and version‑controlled.","description":"A Claude Code SKILL for designing beautiful, consistent web pages — spec first, code second. ","stars":277,"language":"Python"},{"owner":"yzhao062","repo":"agent-style","url":"https://github.com/yzhao062/agent-style","readme":"<!-- SPDX-License-Identifier: CC-BY-4.0 -->\n\n<a id=\"readme-top\"></a>\n\n<div align=\"center\">\n\n# The Elements of Agent Style\n\n**Make your AI agent write like a tech pro.**\n\n*21 rules: 12 from classic writing guides, 9 from field observation of LLM output, 2022-2026.*\n\n[![PyPI](https://img.shields.io/pypi/v/agent-style.svg?color=blue&cacheSeconds=300)](https://pypi.org/project/agent-style/)\n[![npm](https://img.shields.io/npm/v/agent-style.svg?color=blue&cacheSeconds=300)](https://www.npmjs.com/package/agent-style)\n[![License](https://img.shields.io/badge/license-CC%20BY%204.0%20%2B%20MIT-blue.svg)](NOTICE.md)\n[![CI](https://github.com/yzhao062/agent-style/actions/workflows/validate.yml/badge.svg)](https://github.com/yzhao062/agent-style/actions/workflows/validate.yml)\n[![GitHub stars](https://img.shields.io/github/stars/yzhao062/agent-style?style=social&cacheSeconds=300)](https://github.com/yzhao062/agent-style)\n\n[Before / after](#before-and-after) &nbsp;·&nbsp;\n[What it is](#what-it-is) &nbsp;·&nbsp;\n[Does it work?](#does-it-work) &nbsp;·&nbsp;\n[Use](#use)\n\n</div>\n\n## Before and After\n\n![agent-style hero: 21 rules, then three real v0.3.0 bench before/after pairs (product description, design-doc section, paper related-work section) with rule violations highlighted in the AI drafts and concrete details highlighted in the agent-style-loaded revisions](docs/hero.png)\n\nThe top row is the identity: 21 rules, 12 canonical plus 9 field-observed; bordered red marks the two critical rules (RULE-01 curse-of-knowledge and RULE-H citation discipline). The bottom three rows are the mechanism, each pulled from a real v0.3.0 bench draft pair (same prompt, independent generations with and without the ruleset): a product description on Gemini 3 Flash (8 → 0 violations), a design-doc section on Claude Opus 4.7 (14 → 7), and a paper related-work section on Gemini 3 Flash (6 → 4; the source drafts are anchored to three prompt-named benchmarks (AgentBench, BFCL, tau-bench) so the style delta measured by `agent-style review` is isolated from fabricated-citation noise, though the displayed baseline snippet stops before the third name to keep the panel to three sentences). Each row shows the AI draft on the left with rule-violating phrases highlighted, the specific rules that fire in the middle, and the revised version on the right at the same length budget, same register, same document type.\n\n## What It Is\n\nA curated set of English writing rules formatted for AI coding and writing agents to follow **at generation time**, not as a post-hoc linter.\n\n### Scope\n\n| In scope | Out of scope |\n| --- | --- |\n| API docs, design docs, research papers, grant proposals | Fiction, poetry, marketing copy |\n| READMEs, runbooks, commit messages, error messages | Long-form narrative non-fiction |\n| Technical blog posts, postmortems, issue reports | Non-English prose; any context where rhythm or affect matter more than precision |\n\n### Two Rule Groups, Peer Inputs\n\nThe 21 rules split by origin. The agent reads both as equal peers; no group is annotated as higher-priority than the other.\n\n- **`RULE-01..12` (canonical).** Distilled from Strunk & White, Orwell, Pinker, and Gopen & Swan. Each rule cites its source by chapter, section, or essay rule; I verified every citation against the original works. Full names in the table below.\n- **`RULE-A..I` (field-observed).** Patterns I logged from AI output across dozens of writing projects (papers, grant proposals, technical documentation, agent configs) and code releases, 2022 to 2026. Transparent attribution: these are not literature-backed but capture LLM-specific failure modes that the canonical set alone misses (RULE-H citation discipline is the critical one). Full names in the table below.\n\nNamed in homage to Strunk & White's *The Elements of Style* (1918/1959), one of the four canonical sources.\n\n### Canonical Rules (RULE-01 through RULE-12)\n\n![Four writing authorities cited by RULE-01..12: Strunk & White (Elements of Style, 1959), Orwell (Politics and the English Language, 1946), Pinker (Sense of Style, 2014), Gopen & Swan (Science of Scientific Writing, 1990), with the rule IDs distilled from each](docs/sources.png)\n\nSourced from writing authorities; each rule cites its source by chapter, section, or essay rule.\n\n| # | Rule | Primary source |\n| --- | --- | --- |\n| 01 | Do not assume the reader shares your tacit knowledge | Pinker 2014, Ch. 3 |\n| 02 | Do not use passive voice when the agent matters | Orwell 1946 Rule 3; S&W §II.14 |\n| 03 | Do not use abstract or general language when a concrete, specific term exists | S&W §II.16; Pinker 2014 Ch. 3 |\n| 04 | Do not include needless words | S&W §II.17; Orwell 1946 Rule 3 |\n| 05 | Do not use dying metaphors or prefabricated phrases | Orwell 1946 Rule 1 |\n| 06 | Do not use avoidable jargon where an everyday English word exists | Orwell 1946 Rule 5; Pinker 2014 Ch. 2 |\n| 07 | Use affirmative form for affirmative claims | S&W §II.15 |\n| 08 | Do not linguistically overstate or understate claims relative to the evidence | Pinker 2014 Ch. 6; Gopen & Swan 1990 |\n| 09 | Express coordinate ideas in similar form (parallel structure) | S&W §II.19 |\n| 10 | Keep related words together | S&W §II.20; Gopen & Swan 1990 |\n| 11 | Place new or important information in the stress position at the end of the sentence | Gopen & Swan 1990 |\n| 12 | Break long sentences; vary length (split sentences over 30 words) | S&W §II.18; Pinker 2014 Ch. 4 |\n\n### Field-Observed Rules (RULE-A through RULE-I)\n\nStructural patterns logged from LLM output across research, proposal, documentation, and agent-configuration work, 2022 to 2026. Treated as peer input to the canonical rules when an agent consumes the ruleset.\n\n| # | Rule |\n| --- | --- |\n| A | Do not convert prose into bullet points unless the content is a genuine list (and do not over-bullet where 2 items or a sentence fit) |\n| B | Do not use em or en dashes as casual sentence punctuation |\n| C | Do not start consecutive sentences with the same word or phrase |\n| D | Do not overuse transition words (\"Additionally\", \"Furthermore\", \"Moreover\") |\n| E | Do not close every paragraph with a summary sentence |\n| F | Use consistent terms; do not redefine abbreviations mid-document |\n| G | Use title case for section and subsection headings (articles, short prepositions, and coordinating conjunctions stay lowercase) |\n| H | **Support factual claims with citation or concrete evidence; do not be handwavy (critical)** |\n| I | Prefer full forms over contractions in formal technical prose (\"it is\" over \"it's\") |\n\n**Escape hatch** (Orwell 1946 Rule 6): *\"Break any of these rules sooner than say anything outright barbarous.\"* Rules are guides to clarity, not ends in themselves.\n\nSee [`RULES.md`](RULES.md) for the full per-rule blocks with BAD/GOOD examples, enforcement tier, and rationale.\n\n## Does It Work?\n\n![agent-style v0.3.0 sanity bench across Claude Opus 4.7, OpenAI GPT-5.4 via Codex CLI, and Gemini 3 Flash: 105 to 58 (-45%), 51 to 28 (-45%), and 79 to 14 (-82%) AI-tell violations across 10 fixed prose tasks, per-rule breakdown, directional-not-statsig caveat](docs/bench.png)\n\nSanity bench on 10 fixed prose tasks (2 PR descriptions, 1 design-doc section, 1 commit message, 4 paper sections, 1 product description, 1 NSF-style specific aim), 2 generations per condition, flagship models drafting with `agent-style` loaded at generation time vs not. Three models shown: **Claude Opus 4.7 dropped 45% (105 → 58 violations); OpenAI GPT-5.4 via Codex CLI dropped 45% (51 → 28); Gemini 3 Flash dropped 82% (79 → 14).** The GitHub Copilot CLI runner was tested but excluded from the figure because its `-p` programmatic mode does not load instruction files (+3% noise; see [`CHANGELOG.md`](CHANGELOG.md) Notes). See [`docs/bench-0.3.0.md`](docs/bench-0.3.0.md) for the full scorecard across all 4 runners plus per-runner drafts under [`docs/bench-0.3.0-drafts/`](docs/bench-0.3.0-drafts/), and [`RELEASING.md`](RELEASING.md) \"Bench (Local Only)\" for reproduction steps.\n\nNumbers are directional, not statsig: 10 tasks × 2 generations × 2 conditions = 40 calls per runner. The takeaway is that the ruleset reduces mechanical AI-tell density across every frontier family where the instruction file actually reaches the model's context; the exact size of the drop varies with each model's baseline (heavier in models that emit more long sentences / em-dashes by default, smaller or zero in already-clean models).\n\n## Who It Is For\n\n- **AI coding and writing agents:** Claude Code, Codex, GitHub Copilot, Cursor, Aider, Anthropic Skills, Kiro, Replit Agent, Windsurf, Amazon Q Developer, JetBrains AI Assistant, Ollama, Continue.dev, Tabnine, OpenCode, OpenAI Agents SDK skills, and any `AGENTS.md`-compliant tool. Each agent reads the ruleset as part of its system prompt or project config.\n- **Maintainers of those agents' configurations** who want generated prose to follow literature-backed writing conventions rather than reproduce common LLM tell-patterns.\n\n## Use\n\nTwo ways to enforce the rules in your AI agent's output. You typically use both:\n\n- **1. Soft enforcement** (default): the rules are loaded at generation time, so the agent tries to follow them while writing the first draft. One `enable` command per tool; then the agent reads `agent-style`'s 21 rules as part of its context.\n- **2. Skill** (opt-in second pass): after the draft exists, you ask for a review. `style-review` audits the draft against the same 21 rules and, on your confirmation, writes a polished copy beside the original. Your source file is never touched.\n\nInstall the CLI once; then pick the paths you want.\n\n```bash\npip install agent-style                              # Python users\n# or: npm install -g agent-style                     # Node users\n# or: npx --yes agent-style@0.3.5 <subcommand>       # no install needed\n```\n\n### 1. Soft Enforcement — rules at generation time\n\n<details>\n<summary><b>Set up via AI Agent</b></summary>\n<br>\n\nOnce the CLI is installed (per the install block above), paste the block below into your AI agent — it picks the right adapter, runs `enable`, verifies, and offers `style-review` if your host supports skills. Works with any AI agent that can run shell commands: Claude Code, Codex, Cursor, Aider, Kiro, GitHub Copilot, etc.\n\n```text\nSet up agent-style in this project. Steps:\n\n(If `agent-style` is not on PATH, substitute `npx --yes agent-style`\nfor `agent-style` in every command below.)\n\n1. Pick the adapter. Check more specific signals before broader\n   directory signals, and when more than one row fits, ask me which\n   host I want to configure.\n\n   | Signal in project or requested host                                | Adapter           |\n   | ------------------------------------------------------------------ | ----------------- |\n   | `.claude/skills/` (Anthropic Skills host)                          | `anthropic-skill` |\n   | `CLAUDE.md` or `.claude/` (Claude Code)                            | `claude-code`     |\n   | `AGENTS.md` (Codex CLI, Jules, Zed, Warp, Gemini CLI, VS Code, ...) | `agents-md`       |\n   | Codex API (manual system-prompt paste, no CLI host)                | `codex`           |\n   | `.github/copilot-instructions.md`                                  | `copilot`         |\n   | `.github/instructions/`                                            | `copilot-path`    |\n   | `.cursor/`                                                         | `cursor`          |\n   | `.aider.conf.yml`                                                  | `aider`           |\n   | `.kiro/`                                                           | `kiro`            |\n   | (none of the above)                                                | run `agent-style list-tools` and ask me which to use |\n\n2. Run `agent-style enable <adapter> --dry-run --json` first. Check the\n   `actions` array, then run the real `agent-style enable <adapter>`\n   and confirm each listed path was created.\n\n3. If the JSON has `manual_step_required: true` (Codex API, Aider),\n   surface the CLI's printed `manual step required:` line to me\n   verbatim. Do not claim setup is complete on my behalf.\n\n4. If any of `CLAUDE.md` / `.claude/` / `.claude/skills/` exists in\n   this project (skill-capable host available), also offer to run\n   `agent-style enable style-review` for the opt-in second-pass\n   review skill alongside soft enforcement.\n\n5. Report the adapter name and the created paths, then tell me to\n   restart my agent session and ask \"Is agent-style active?\".\n```\n\n</details>\n\nOr run it yourself:\n\n```bash\nagent-style enable claude-code                       # wire up Claude Code\n# Inside a Claude Code session, your prose now follows agent-style's 21 rules.\n```\n\nOther tools work the same way — substitute the tool name:\n\n```bash\nagent-style list-tools                               # see all supported tools\nagent-style enable agents-md                         # Codex, Jules, Zed, Warp, Gemini CLI, VS Code, others\nagent-style enable cursor                            # Cursor\nagent-style enable copilot                           # GitHub Copilot (repo-wide)\n# ...\nagent-style disable <tool>                           # reverse an enable\n```\n\n**Caveats:** soft enforcement *nudges* the model. Training-prior vocabulary like `leverages`, `cutting-edge`, `Additionally`-openers, and closer sentences can still appear in the first draft, especially for prose over 200 words. That's why path 2 exists.\n\n<details>\n<summary><b>What <code>enable</code> Does per Tool (All Safe, All Idempotent)</b></summary>\n<br>\n\n- **Claude Code (`import-marker`)**: writes `.agent-style/RULES.md` and `.agent-style/claude-code.md`; safe-appends `@.agent-style/claude-code.md` in a marker block to your existing `CLAUDE.md`. Creates `CLAUDE.md` only if absent.\n- **AGENTS.md, Copilot repo-wide (`append-block`)**: safe-appends a marker-wrapped compact adapter block to your existing instruction file. Content above and below the marker is preserved.\n- **Cursor, Copilot path-scoped, Anthropic Skills (`owned-file`)**: writes a new agent-style-owned file at the tool's rule-directory path (`.cursor/rules/agent-style.mdc`, `.github/instructions/agent-style.instructions.md`, `.claude/skills/agent-style/SKILL.md`). Fails closed if a non-agent-style file is already there.\n- **Codex API (`print-only`)**: writes `.agent-style/codex-system-prompt.md`; prints the prompt body to stdout, manual-step instructions to stderr. You paste the prompt into your Codex API `system_prompt`.\n- **Aider (`multi-file-required`)**: writes `.agent-style/aider-conventions.md`; prints a `.aider.conf.yml` snippet to stderr. You paste both files into the config.\n- **Kiro (`owned-file`)**: writes `.kiro/steering/agent-style.md` as an auto-included steering file.
