lls/` (Claude Code) or `~/.agents/skills/` (Codex CLI). See [docs/installation.md](docs/installation.md) for all options.\n\n## Five-second demo\n\nIn your agent, say:\n\n> \"Build a DSPy sentiment classifier, optimize it with GEPA, and save the artifact.\"\n\nThe agent auto-loads `dspy-advanced-workflow`, which chains the other skills and outputs a full baseline → GEPA → export pipeline. No further prompting needed.\n\n## End-to-end examples (current committed artifacts)\n\nThree runnable demos under [`examples/`](examples/) exercise every skill against real LMs and ship with **committed baseline vs. GEPA-optimized numbers** plus explicit `3.1.3` vs. `3.2.0` comparison notes.\n\n| Example | Artifact DSPy | Task LM | Baseline | Optimized | Δ | Status |\n|---|---|---|---:|---:|---:|---|\n| [01-rag-qa](examples/01-rag-qa/) | 3.2.0 | Ministral 3B 2512 | 80.47 | **100.00** | **+19.53** | Clean comparison refreshed on 2026-04-28 |\n| [02-math-reasoning](examples/02-math-reasoning/) | 3.2.0 | Ministral 3B 2512 | 85.00 | **93.33** | **+8.33** | Refreshed on 2026-04-21 |\n| [03-invoice-extraction](examples/03-invoice-extraction/) | 3.1.3 | Liquid LFM 2.5 1.2B (free) | 0.833 | **0.931** | **+0.098** | Historical artifact retained |\n\nThe refreshed `01` and `02` artifacts use the paid pair `openrouter/mistralai/ministral-3b-2512` + `openrouter/qwen/qwen3-30b-a3b-instruct-2507`. `03` stays on its historical DSPy `3.1.3` artifact because a clean DSPy `3.2.0` baseline on the same Liquid/Nemotron pair already reached `0.944`, leaving little useful headroom for a replacement GEPA artifact. See [`examples/README.md`](examples/README.md) and each example's `version_comparison.md` for the exact commands and caveats.\n\n## Grounding\n\nEvery API claim is grounded in:\n\n- https://dspy.ai/ (official docs, DSPy 3.2.x)\n- https://code.claude.com/docs/en/skills.md (Claude Code skill spec)\n- https://developers.openai.com/codex/skills (Codex skill spec)\n\n## Development\n\n```bash\n# Run validation suite\nuv run --with pytest python -m pytest tests/ -v\n\n# Smoke-test every example offline (no API key needed)\nfor f in skills/*/example_*.py; do uv run --with dspy python \"$f\" --dry-run; done\n\n# Live GEPA run (requires OPENAI_API_KEY)\ncd skills/dspy-advanced-workflow\nOPENAI_API_KEY=... uv run --with dspy python example_pipeline.py --auto light\n```\n\nIf `uv run --with dspy` resolves DSPy `3.1.3` instead of `3.2.0`, check whether `UV_EXCLUDE_NEWER` or a stale package mirror is hiding the new release. The exact 3.2.0 override we validated for this repo is:\n\n```bash\nenv -u UV_EXCLUDE_NEWER uv run --with dspy==3.2.0 python -c 'import dspy; print(dspy.__version__)'\n```\n\n## Compatibility\n\n- **DSPy**: 3.2.x (tested against 3.2.0)\n- **Claude Code**: current (skill spec as of 2026-04-17)\n- **Codex CLI**: current Agent Skills format\n- **Python**: 3.10+\n- **Deno**: required only for `dspy.RLM` examples (Pyodide sandbox)\n\n## Layout\n\n```\ndspy-agent-skills/\n├── .claude-plugin/\n│   ├── plugin.json\n│   └── marketplace.json\n├── skills/\n│   ├── dspy-fundamentals/{SKILL.md, reference.md, example_qa.py}\n│   ├── dspy-evaluation-harness/{SKILL.md, reference.md, example_metric.py}\n│   ├── dspy-gepa-optimizer/{SKILL.md, reference.md, example_gepa.py}\n│   ├── dspy-rlm-module/{SKILL.md, reference.md, example_rlm.py}\n│   └── dspy-advanced-workflow/{SKILL.md, example_pipeline.py}\n├── scripts/install.sh           # dual-target installer\n├── tests/                       # spec validators\n├── docs/{installation,usage,CHANGELOG}.md\n├── README.md  LICENSE  .gitignore\n```\n\n## Version\n\n**v0.2.1** • Targets DSPy 3.2.x\n\n## License\n\nMIT — see [LICENSE](LICENSE).\n\n## Credits\n\nDraft contributors: Bryan Young ([@intertwine](https://github.com/intertwine)) with Grok (xAI).\nValidation, spec-alignment, and dual-agent packaging: Claude Opus 4.7, April 2026.\n","summary":"**intertwine/dspy-agent-skills** delivers a production‑ready bundle of five DSPy 3.2.x agent skills that turn any agentskills.io‑compatible agent—such as Claude Code or Codex CLI—into a DSPy expert. The pack includes foundational DSPy helpers, an evaluation harness, a GEPA optimizer, a long‑context RLM module, and an orchestrating advanced workflow, all fully validated, tested, and documented with reference guides and example scripts. It integrates smoothly via Claude Code marketplace, the `npx skills` CLI, or manual symlinks, and offers one‑click installation, dry‑run support, and comprehensive marketplace manifests. Ideal for AI developers and researchers building, evaluating, and optimizing DSPy models within conversational agents.","description":"Production-grade DSPy 3.2.x agent skills + validated end-to-end examples for Claude Code and Codex CLI — fundamentals, evaluation, GEPA, BetterTogether, and RLM.","stars":211,"language":"Python"},{"owner":"ehmo","repo":"code-overhaul-skill","url":"https://github.com/ehmo/code-overhaul-skill","readme":"# code-overhaul\n\nOpinionated, interactive health audit for a codebase. The skill scans the repo, forces a scope decision up front, then walks architecture, code quality, tests, performance, and dependencies. It pauses after every section for your input and files deferred work as beads issues. Stack-specific addendums for iOS/Swift, Go, and Web/JS/CSS activate based on what's in the repo. Monorepos with mixed stacks get every matching addendum, and findings are tagged per module.\n\nCurrent skill version: **2.1.0**.\n\n## What it does differently\n\nMost \"review this codebase\" prompts produce a long list with no prioritization and no commitment. This one is structured around four rules:\n\n1. **Decide scope before work.** Step 0 measures the repo (warnings, deprecations, TODO density, dep drift, complexity hotspots) and offers three modes: SURGICAL (one theme, one session), SYSTEMATIC (section by section, ≤4 issues each), FULL AUDIT (everything, phased roadmap). Once you pick, there's no silent scope reduction.\n2. **Lead with a recommendation.** Every finding lists 2–3 options including \"defer\", each labelled with effort, risk, blast radius, and maintenance cost, plus a direct \"Recommendation: B. Here's why:\" line. No \"here are some options, what do you think?\".\n3. **Pause at every section.** The skill stops after architecture, code quality, tests, performance, and dependencies. It doesn't barrel through five sections and dump a wall of findings.\n4. **Map findings to engineering preferences.** Every recommendation cites which principle it serves (DRY, explicit-over-clever, platform-over-third-party, minimal diff, and so on) so you're not arguing about taste.\n\nDeferred work goes straight into beads with file and line references, current state, where to start, and prereqs. No follow-up paste job.\n\n## Review sections\n\nEach section has its own stop point and its own stack-specific depth when an addendum applies.\n\n| Section | What it covers |\n| --- | --- |\n| **Architecture** | Module boundaries, layering violations, data flow, concurrency, scaling bottlenecks, security boundaries, dependency graph |\n| **Code quality** | DRY, error handling, naming, tech debt hotspots, over- and under-engineering, dead code, stale diagrams, warnings |\n| **Tests** | Critical flow coverage, edge cases, execution time, isolation, missing categories, mock strategy |\n| **Performance** | Startup, memory, hot-path latency, I/O patterns, network efficiency, build time, binary/bundle size |\n| **Dependencies and modernization** | Outdated, unmaintained, or replaceable deps, language version floor, toolchain hygiene, CI health |\n\n## Stack addendums\n\nTriggers are file markers in the repo. When more than one stack matches, every applicable addendum runs and findings are tagged per module.\n\n- **iOS / Swift.** Triggered by `*.swift`, `*.xcodeproj`, `*.xcworkspace`, or `Package.swift` with Apple targets. Covers force-unwrap audit, structured concurrency adoption boundary, `@Observable`/`ObservableObject` consistency, SwiftLint violations, launch time analysis, XCTest vs Swift Testing, and replaceable deps (Kingfisher to AsyncImage, Alamofire to URLSession, SnapKit to AutoLayout, RxSwift to Combine).\n- **Go.** Triggered by `go.mod` and `*.go`. Covers unchecked errors, interface pollution, package boundaries, context propagation, `go vet` / `staticcheck` / `govulncheck` findings, race detector status, goroutine leak risk, mutex contention, generics overuse, and toolchain audit.\n- **Web / JavaScript / CSS.** Triggered by `package.json`, `tsconfig.json`, or any of `*.{js,ts,jsx,tsx,css,scss,html}`. Covers `any` count, TS strict mode readiness, component hierarchy, state management consistency, CSS specificity chaos, accessibility gaps, bundle size, Core Web Vitals, and modernization opportunities like native nesting, `:has()`, container queries, `<dialog>`, and View Transitions.\n\nAdding a new addendum means appending one section to `skills/code-overhaul/SKILL.md`. See `CLAUDE.md` for the pattern.\n\n## Required outputs\n\nAt the end of a session you get:\n\n- **Impact/effort matrix.** DO FIRST / PLAN CAREFULLY / IF TIME / SKIP quadrants, with deterministic placement from severity + effort.\n- **NOT in scope.** One-line reason per deferred or cap-exceeded item.\n- **What already exists.** Underused utilities, helpers, and patterns already in the codebase.\n- **Deferred work → Beads.** Ready-to-run `bd create` commands linked with `bd dep add`, confirmed in a single batched prompt.\n- **Diagrams.** ASCII for dependency graphs, data flow, and state machines, plus a list of files that need inline diagrams.\n- **Failure modes.** Realistic production failures per codepath: test covers it, handling exists, failure silent or visible. Rows marked `no / no / silent` escalate to critical.\n- **Migration / rollback.** For every L blast-radius change: incremental plan, rollback, coexistence, verification.\n- **Execution order.** Numbered, respecting inter-change dependencies, impact/effort priority, tests-before-refactor, and every-step-shippable.\n- **Completion summary.** Compact ASCII box with counts per section, severity totals, and stack-specific rows.\n\n## Install\n\n### Via `npx skills` (recommended)\n\n```bash\nnpx skills add ehmo/code-overhaul-skill\n```\n\nThe CLI fetches the repo, discovers `skills/code-overhaul/SKILL.md` from its frontmatter `name:` field, and installs it into the right directory for your agent.\n\nInstall only the skill (no slash command) for a specific agent:\n\n```bash\nnpx skills add ehmo/code-overhaul-skill -a claude-code\n```\n\nCompanion commands:\n\n```bash\nnpx skills list\nnpx skills update ehmo/code-overhaul-skill\nnpx skills remove ehmo/code-overhaul-skill\n```\n\n### Claude Code (manual install)\n\n```bash\ngit clone git@github.com:ehmo/code-overhaul-skill.git\ncd code-overhaul-skill\n./install.sh\n```\n\nCreates symlinks in `~/.claude/` for the skill and slash command. The script checks that Claude Code is installed first.\n\nNon-default config directory:\n\n```bash\nexport CLAUDE_DIR=/custom/path\n./install.sh\n```\n\n### Other agents\n\n`skills/code-overhaul/SKILL.md` is plain markdown with YAML frontmatter. Drop it into whatever instruction format your agent uses. The `allowed-tools` list in the frontmatter (Read, Grep, Glob, Bash) maps to standard capabilities; AskUserQuestion is assumed to be built-in.\n\n## Usage\n\nAudit the current working directory:\n\n```\n/code-overhaul\n```\n\nAudit a specific project:\n\n```\n/code-overhaul ~/path/to/project\n```\n\nPass a mode explicitly to skip the interactive prompt:\n\n```\n/code-overhaul systematic ~/path/to/project\n```\n\nResume a previously paused audit:\n\n```\n/code-overhaul resume ~/path/to/project\n```\n\nFirst move: the skill runs Preflight and Step 0 (repo health, dependency landscape, language version floor, tech debt concentration, complexity check) and asks you to pick SURGICAL, SYSTEMATIC, or FULL AUDIT. Commit fully to the chosen mode.\n\nFrom there, each section ends with a single section-close question: Approve, Revise, or Pause. Findings use three-part IDs like `3.2B` (section 3, finding 2, option B). Approvals are batched at the section close; you don't answer a prompt per finding. At the end you get the matrix, diagrams, deferred-beads commands, and the summary box.\n\n## Requirements\n\n- An AI coding agent that supports the skill format (Claude Code, or anything that reads `SKILL.md` frontmatter and the `AskUserQuestion` / `Read` / `Grep` / `Glob` / `Bash` tools).\n- Optional: [beads](https://github.com/steveyegge/beads) (`bd`) if you want the \"Deferred work → Beads\" section to actually file issues. Without it, the same commands print as a plain checklist.\n\n## Limitations\n\nThe skill is interactive by design. It stops at every section. If you want a single-pass dump, this isn't it.\n\nThe stack-detection addendums don't cover every ecosystem. Current coverage is iOS/Swift, Go, and Web/JS/CSS. Adding Rust, Python, Kotlin, or Elixir is one new addendum section per stack (see `CLAUDE.md`).\n\nASCII diagrams are intentional. They render anywhere a terminal does, they paste cleanly into code review, and they age better than image attachments.\n\n## Uninstall\n\n```bash\n./uninstall.sh\n```\n\nRemoves symlinks from `~/.claude/`.\n\n## License\n\nMIT\n","summary":"“code-overhaul” is an opinionated, interactive audit skill that scans a repository to evaluate architecture, code quality, testing, performance, and dependencies, pausing after each section for user input and generating Beads issues for deferred work. It begins by measuring the repo and force‑setting a scope—SURGICAL, SYSTEMATIC, or FULL AUDIT—then walks through each audit segment, providing clear recommendations, effort ratings, and risk assessments, all tied to engineering principles. The skill automatically loads stack‑specific addendums for iOS/Swift, Go, or Web/JS/CSS when relevant files are detected, offering targeted checks and modernization suggestions. Developers, technical leads, and code reviewers looking for a structured, prioritized, and actionable codebase health review will find it especially useful.","description":"Opinionated, interactive health audit for a codebase.","stars":74,"language":"Shell"},{"owner":"golbin","repo":"agent-skills","url":"https://github.com/golbin/agent-skills","readme":"# Agent Skills\n\nReusable agent skills for Codex and other Agent Skills compatible tools.\n\nSkills are packaged under `skills/<skill-name>/` so this repository can hold\nmultiple installable skills.\n\n## Repository Layout\n\n- `skills/`: installable agent skills discovered by `npx skills` and `gh skill`\n- `templates/`: copyable project templates such as `AGENTS.md` and `CLAUDE.md`\n\n## Available Skills\n\n- `prd`: Create or update evidence-backed living PRDs and phase execution files\n  under `tasks/`.\n- `review-implementation`: Review code against markdown requirements/spec docs,\n  identify gaps and risks, and apply focused fixes.\n\n## Templates\n\n- `templates/AGENTS.md`: concise project instruction template for coding agents\n- `templates/CLAUDE.md`: delegates Claude-compatible tools to `AGENTS.md`\n\nCopy the templates into a project root and customize the placeholders:\n\n```bash\ncp templates/AGENTS.md /path/to/project/AGENTS.md\ncp templates/CLAUDE.md /path/to/project/CLAUDE.md\n```\n\n## Install\n\n### skills.sh / `npx skills`\n\nInstall globally for Codex:\n\n```bash\nnpx skills add https://github.com/playmoreai/agent-skills/tree/main/skills/prd \\\n  -g \\\n  -a codex \\\n  -y\nnpx skills add https://github.com/playmoreai/agent-skills/tree/main/skills/review-implementation \\\n  -g \\\n  -a codex \\\n  -y\n```\n\nOr install from the repository and select a skill:\n\n```bash\nnpx skills add playmoreai/agent-skills --skill prd -g -a codex -y\nnpx skills add playmoreai/agent-skills --skill review-implementation -g -a codex -y\n```\n\nList available skills in this repository:\n\n```bash\nnpx skills add playmoreai/agent-skills --list\n```\n\n### GitHub CLI `gh skill`\n\nRequires GitHub CLI 2.90.0 or newer.\n\n```bash\ngh skill install playmoreai/agent-skills prd --agent codex --scope user\ngh skill install playmoreai/agent-skills review-implementation --agent codex --scope user\n```\n\nThe alias form also works on supported GitHub CLI versions:\n\n```bash\ngh skills add playmoreai/agent-skills prd --agent codex --scope user\ngh skills add playmoreai/agent-skills review-implementation --agent codex --scope user\n```\n\nPreview before installing:\n\n```bash\ngh skill preview playmoreai/agent-skills prd\ngh skill preview playmoreai/agent-skills review-implementation\n```\n\n### Codex Skill Installer\n\nIn Codex, ask:\n\n```text\nUse $skill-installer to install https://github.com/playmoreai/agent-skills/tree/main/skills/prd\nUse $skill-installer to install https://github.com/playmoreai/agent-skills/tree/main/skills/review-implementation\n```\n\nOr run the installer script directly:\n\n```bash\npython3 ~/.codex/skills/.system/skill-installer/scripts/install-skill-from-github.py \\\n  --repo playmoreai/agent-skills \\\n  --path skills/prd\npython3 ~/.codex/skills/.system/skill-installer/scripts/install-skill-from-github.py \\\n  --repo playmoreai/agent-skills \\\n  --path skills/review-implementation\n```\n\nAfter installation, restart Codex so the new skill is picked up.\n\n### Shell Installer\n\nFor machines with `bash`, `curl`, and `tar`:\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/playmoreai/agent-skills/main/install.sh | bash\ncurl -fsSL https://raw.githubusercontent.com/playmoreai/agent-skills/main/install.sh \\\n  | SKILL_PATH=skills/review-implementation SKILL_NAME=review-implementation bash\n```\n\n## Usage\n\nInvoke skills in Codex by name, for example:\n\n```text\nUse $prd to create an evidence-backed PRD for this feature.\nUse $review-implementation to review this implementation against tasks/prd-example.md.\n```\n\nThe `prd` skill creates or updates markdown PRD files under `tasks/`, including\nphase files when the plan is large enough to split. The `review-implementation`\nskill reviews code against markdown requirements/spec docs and applies focused\nfixes.\n","summary":"Agent‑Skills is a collection of reusable skill modules for Codex and other compatible agent tools, organized as installable packages within the repository. Its core offerings include a “prd” skill that generates evidence‑backed product requirement documents and phase plans in markdown, and a “review‑implementation” skill that scans code against specification documents, flags gaps, and applies targeted fixes. Supporting templates (AGENTS.md and CLAUDE.md) help tailor instruction sets for projects, while flexible installation options—via npx skills, GitHub CLI, or a lightweight shell script—make integration straightforward. The package is valuable for developers, product managers, and AI‑enhanced teams who need automated drafting, review, and documentation workflows within a familiar tooling ecosystem.","description":"Reusable agent skills for Codex and compatible tools","stars":183,"language":"Shell"},{"owner":"hacktivist123","repo":"agent-session-resume","url":"https://github.com/hacktivist123/agent-session-resume","readme":"# agent-session-resume\n\n`agent-session-resume` is a reusable skill for continuing work from a prior AI coding-agent session without losing context, duplicating completed work, or overwriting unrelated changes.\n\nIt is designed for handoffs between tools such as Claude Code, Codex, Antigravity, and OpenCode.\n\nInstead of asking the next agent to guess what happened, the skill makes it produce a handoff checkpoint first: the prior goal, what is already done, what is still open, and the next action to take before editing.\n\n## What It Does\n\nThe skill gives an agent a disciplined resume workflow:\n\n- locate the most relevant prior transcript, export, artifact, or session summary\n- read the full available context before taking action\n- reconstruct the original goal, completed work, decisions, and stopping point\n- extract explicit and implicit tasks\n- classify each task as `DONE`, `PARTIALLY DONE`, or `NOT DONE`\n- continue from the first unfinished step without repeating completed work\n\n## Repository Layout\n\n```text\n.claude-plugin/\n  marketplace.json\n  plugin.json\nskills/\n  agent-session-resume/\n    SKILL.md\n    agents/\n      openai.yaml\n    references/\n      antigravity.md\n      claude-code.md\n      codex.md\n      opencode.md\n```\n\n## Install\n\nThis repo is distributed primarily as a skill. The canonical installable package is:\n\n```text\nskills/agent-session-resume\n```\n\n### Codex\n\nAsk Codex to install it:\n\n```text\nInstall the skill from hacktivist123/agent-session-resume at skills/agent-session-resume\n```\n\nManual install:\n\n```bash\ntmp_dir=\"$(mktemp -d)\"\ngit clone --depth 1 https://github.com/hacktivist123/agent-session-resume \"$tmp_dir/agent-session-resume\"\nmkdir -p \"${CODEX_HOME:-$HOME/.codex}/skills\"\ncp -R \"$tmp_dir/agent-session-resume/skills/agent-session-resume\" \"${CODEX_HOME:-$HOME/.codex}/skills/\"\n```\n\nRestart Codex after installing.\n\n### Claude Code\n\nRecommended plugin install:\n\n```text\n/plugin marketplace add hacktivist123/agent-session-resume\n/plugin install agent-session-resume@hacktivist123\n/reload-plugins\n```\n\nCLI equivalent:\n\n```bash\nclaude plugin marketplace add hacktivist123/agent-session-resume\nclaude plugin install agent-session-resume@hacktivist123\n```\n\nAfter CLI install, restart Claude Code or run `/reload-plugins` in Claude Code.\n\nThis installs the skill as a Claude Code plugin command:\n\n```text\n/agent-session-resume:agent-session-resume\n```\n\nThe plugin points at the same canonical `skills/agent-session-resume` folder used by the standalone skill package.\n\nAlternative standalone skill install:\n\n```text\nInstall the standalone Claude Code skill from https://github.com/hacktivist123/agent-session-resume.\nCopy the repository folder skills/agent-session-resume into ~/.claude/skills/agent-session-resume.\nDo not use the Claude Code plugin marketplace for this standalone flow.\n```\n\nManual standalone install:\n\n```bash\ntmp_dir=\"$(mktemp -d)\"\ngit clone --depth 1 https://github.com/hacktivist123/agent-session-resume \"$tmp_dir/agent-session-resume\"\nmkdir -p \"$HOME/.claude/skills\"\ncp -R \"$tmp_dir/agent-session-resume/skills/agent-session-resume\" \"$HOME/.claude/skills/\"\n```\n\nRestart Claude Code after installing.\n\nUse the standalone install if you prefer the shorter `/agent-session-resume` command or do not want to use Claude Code plugins.\n\nChoose one Claude Code install path. Installing both the plugin and standalone skill can show duplicate short command suggestions; the namespaced plugin command avoids ambiguity.\n\n### Other Agents\n\nFor agents that do not support skill folders directly, load `skills/agent-session-resume/SKILL.md` as the main instruction document and use the relevant platform file from `skills/agent-session-resume/references/`.\n\n## Usage\n\nShort prompts should be enough; the skill carries the platform-specific discovery rules.\n\nFor more examples, see the [cookbook](docs/Cookbook.md).\n\nContinue the most recent Codex session for the current repository:\n\n```text\n/agent-session-resume:agent-session-resume\n\nContinue the most recent Codex session for this repository.\n```\n\nContinue from a specific handoff file:\n\n```text\n/agent-session-resume:agent-session-resume\n\nContinue from ./handoff.md.\n```\n\nExpected first response shape:\n\n```text\nBrief context summary\nTask status breakdown\nClear next action\n```\n\nAfter that checkpoint, the agent should continue from the first unfinished step without redoing completed work.\n\n## Claude Code Notes\n\nRecommended plugin install gives the namespaced command:\n\n```text\n/agent-session-resume:agent-session-resume\n```\n\nAlternative standalone install gives the shorter skill command:\n\n```text\n/agent-session-resume\n```\n\nIf the plugin command does not appear after installation, run `/reload-plugins` and check the marketplace/plugin manifests with:\n\n```bash\nclaude plugin validate .\nclaude plugin validate .claude-plugin/plugin.json\nclaude plugin validate .claude-plugin/marketplace.json\n```\n\n## Checks\n\nRun the package and fixture validators:\n\n```bash\npython3 scripts/validate-skill-package.py\npython3 scripts/validate-fixtures.py\npython3 scripts/validate-trigger-matrix.py\nclaude plugin validate .\nclaude plugin validate .claude-plugin/plugin.json\nclaude plugin validate .claude-plugin/marketplace.json\n```\n\nThe standalone skill under `skills/agent-session-resume` is the source of truth. The optional Claude plugin wrapper uses the repo root as its source, so it shares that canonical skill folder instead of maintaining a second copy. The fixtures in `tests/fixtures/` cover Claude Code, Codex, Antigravity, and OpenCode handoff shapes. Each scenario pairs sample session material with the expected context summary, task status breakdown, and next action. `tests/trigger-matrix.json` tracks prompt coverage for manual or automated trigger testing.\n\n## License\n\nMIT\n","summary":"`agent-session-resume` is a reusable skill that lets an AI coding agent pick up where it left off in a previous session without losing context or duplicating completed work. It locates the most relevant prior transcript, reconstructs the original goal, classifies tasks as DONE, PARTIALLY DONE, or NOT DONE, and then continues from the first unfinished step. The skill is designed to work with tools like Claude Code, Codex, Antigravity and OpenCode, and can be installed as a plugin or standalone skill for any agent that supports skill folders. Developers or teams who frequently hand off work between multiple AI agents will find this tool useful for maintaining continuity and preventing redundant edits.","description":"Cross-agent session resume skill for Claude Code, Codex, Antigravity, and OpenCode.","stars":161,"language":"Python"},{"owner":"0x0funky","repo":"agent-sprite-forge","url":"https://github.com/0x0funky/agent-sprite-forge","readme":"# Agent Sprite Forge\n\nLanguages: [English](./README.md) | [繁體中文](./README.zh-TW.md) | [简体中文](./README.zh-CN.md) | [日本語](./README.ja.md) | [한국어](./README.ko.md)\n\n<p align=\"center\">\n  <img src=\"./src/banner.png\" alt=\"Agent Sprite Forge banner\" width=\"900\" />\n</p>\n\n<p align=\"center\">\n  <strong>Codex skills for game-ready 2D sprites, layered maps, and engine-ready prototypes.</strong>\n</p>\n\n<p align=\"center\">\n  Ask in natural language. Codex plans the asset pipeline, renders with built-in image generation, then local processors clean, split, validate, and export assets for Godot, Unity, or raw 2D game workflows.\n</p>\n\n<p align=\"center\">\n  <a href=\"#showcase\">Showcase</a> ·\n  <a href=\"#included-skills\">Skills</a> ·\n  <a href=\"#install\">Install</a> ·\n  <a href=\"#suggested-prompts\">Prompts</a> ·\n  <a href=\"#star-history\">Star History</a>\n</p>\n\n## What Makes It Different\n\nAgent Sprite Forge is not just a folder of prompts. It is a Codex-first 2D game asset workflow where the agent decides the plan, image generation creates the raw visuals, and deterministic scripts turn those visuals into reusable game assets.\n\n<table>\n  <tr>\n    <td width=\"25%\">\n      <strong>Sprite sheets</strong><br />\n      Characters, monsters, props, attacks, spells, projectiles, impacts, idles, walks, and reference-guided variants.\n    </td>\n    <td width=\"25%\">\n      <strong>Layered maps</strong><br />\n      Ground-only bases, dressed references, prop packs, transparent props, y-sort placement, collision, zones, and previews.\n    </td>\n    <td width=\"25%\">\n      <strong>Engine handoff</strong><br />\n      Godot scenes, editable TileMap layers, separated props, encounter grass, collision bodies, exits, and debug players.\n    </td>\n    <td width=\"25%\">\n      <strong>Local cleanup</strong><br />\n      Chroma-key removal, frame extraction, alignment, transparent PNG/GIF export, prop-pack slicing, and QA metadata.\n    </td>\n  </tr>\n</table>\n\n## Showcase\n\n### Engine-Ready Prototypes\n\nThese examples were assembled with Codex using `agent-sprite-forge` workflows. They are meant to show the full loop: generated assets, structured scene data, and playable prototype wiring.\n\n<table>\n  <tr>\n    <td align=\"center\" width=\"50%\">\n      <img src=\"./src/summon-survivors-game-preview1.png\" alt=\"Summon Survivors Unity WebGL gameplay\" width=\"420\" />\n      <br />\n      <strong>Summon Survivors — Unity WebGL</strong>\n      <br />\n      Generated map art, hero sheets, summons, evolutions, enemies, bosses, pickups, HUD, FX, level-up choices, and WebGL deployment.\n      <br />\n      <a href=\"https://summon-survivors.vercel.app/\">Play build</a> · <a href=\"https://drive.google.com/file/d/1TL7qRX95przTToZILVQ1EFwEXm3flB6t/view?usp=sharing\">Build conversation</a>\n    </td>\n    <td align=\"center\" width=\"50%\">\n      <img src=\"./src/kingdomrush-forest-pass.png\" alt=\"Forest Pass Defense Godot tower-defense map\" width=\"420\" />\n      <br />\n      <strong>Forest Pass Defense — Godot Tower Defense</strong>\n      <br />\n      A Godot 4 prototype with map, separated props, tower slots, towers, enemy sheets, boss/flying enemies, waves, HUD, build/upgrade/sell flow, projectiles, and targeting rules.\n    </td>\n  </tr>\n  <tr>\n    <td align=\"center\" width=\"50%\">\n      <img src=\"./src/godot-editor.png\" alt=\"Generate2DMap Godot editor scene\" width=\"420\" />\n      <br />\n      <strong>Editable RPG Map — Godot TileMap</strong>\n      <br />\n      Image-generated tileset and prop sheet wired into editable <code>TileMapLayer</code>, <code>Sprite2D</code> props, encounter grass <code>Area2D</code>, <code>StaticBody2D</code> collision, exits, metadata, and debug player/camera.\n    </td>\n    <td align=\"center\" width=\"50%\">\n      <img src=\"./src/neon-breach.png\" alt=\"Neon Breach cyberpunk side-scroller\" width=\"420\" />\n      <br />\n      <strong>Neon Breach — Cyberpunk Side-Scroller</strong>\n      <br />\n      A playable side-scroller prototype built around generated character, attack, map, and gameplay assets.\n    </td>\n  </tr>\n  <tr>\n    <td align=\"center\" width=\"50%\">\n      <img src=\"./src/pokemonlike2.png\" alt=\"Sengoku Era JavaScript RPG starter selection\" width=\"420\" />\n      <br />\n      <strong>Sengoku Era — JavaScript Pokémon-like</strong>\n      <br />\n      A browser-based RPG prototype with generated characters, starter selection, map flow, and battle UI.\n      <br />\n      <a href=\"https://sengoku-era.vercel.app/\">Play build</a>\n    </td>\n    <td align=\"center\" width=\"50%\">\n      <img src=\"./src/pokemonlike.png\" alt=\"Sengoku Era JavaScript RPG battle scene\" width=\"420\" />\n      <br />\n      <strong>Starter selection and battle loop</strong>\n      <br />\n      A compact JavaScript game showcase built from sprite, monster, battle, and map assets generated through the skill workflow.\n    </td>\n  </tr>\n</table>\n\n<details>\n<summary>More Godot tower-defense output</summary>\n\n<table>\n  <tr>\n    <td align=\"center\" width=\"40%\">\n      <img src=\"./src/kingdomrush-enemy-roster.png\" alt=\"Forest Pass Defense enemy roster\" width=\"320\" />\n      <br />\n      <strong>Enemy roster, including flyer and boss units</strong>\n    </td>\n    <td align=\"center\" width=\"30%\">\n      <img src=\"./src/kingdomrush-tower-icons.png\" alt=\"Forest Pass Defense tower icons\" width=\"260\" />\n      <br />\n      <strong>Tower lineup</strong>\n    </td>\n    <td align=\"center\" width=\"30%\">\n      <img src=\"./src/kingdomrush-hud-icons.png\" alt=\"Forest Pass Defense HUD icons\" width=\"260\" />\n      <br />\n      <strong>HUD and gameplay icons</strong>\n    </td>\n  </tr>\n</table>\n\nGodot prototype output includes:\n\n- `scenes/ForestPass.tscn` with base map, separated props, enemy paths, tower slots, and HUD nodes.\n- Six tower families with generated tower art and upgrade stages.\n- Animated enemy sheets for ground units, flying units, and boss encounters.\n- Wave, difficulty, tower catalog, collision, route, and tower-slot metadata.\n- Runtime build, upgrade, sell, projectile, and targeting behavior connected in Godot.\n\n```text\nimage_gen map + separated props + tower sheets + enemy animation sheets + HUD icons + Godot gameplay wiring\n```\n\n</details>\n\n<details>\n<summary>More Unity survivors-like output</summary>\n\n<table>\n  <tr>\n    <td align=\"center\" width=\"50%\">\n      <img src=\"./src/summon-survivors-game-preview1.png\" alt=\"Summon Survivors Unity WebGL gameplay with summons, enemies, pickups, HUD, and objective\" width=\"420\" />\n      <br />\n      <strong>Unity WebGL gameplay: summons, enemies, pickups, HUD, and objective flow</strong>\n    </td>\n    <td align=\"center\" width=\"50%\">\n      <img src=\"./src/summon-survivors-game-preview2-levelup.png\" alt=\"Summon Survivors Unity WebGL level-up menu\" width=\"420\" />\n      <br />\n      <strong>Level-up choices: summon unlocks, training, stats, and recovery</strong>\n    </td>\n  </tr>\n</table>\n\nUnity prototype output includes:\n\n- `Assets/Survivors/Scenes/SummonSurvivors.unity` as the playable scene.\n- `SurvivorContentDatabase.asset` connecting generated hero, summon, enemy, pickup, HUD, and FX sprites.\n- Starter summon selection, survival objective, XP/coin pickups, level-up choices, summon training, and evolution flow.\n- Enemy spawning pressure, boss timing, projectile attacks, area damage, health bars, and score tracking.\n- WebGL build output under `Builds/WebGL` with Vercel deployment config.\n\n```text\nimage_gen map + directional hero sheets + summon/evolution sheets + enemy sheets + FX/HUD icons + Unity runtime + WebGL deploy\n```\n\n</details>\n\n### Sprite Sheets And FX\n\nUse `$generate2dsprite` when you need animated units, playable characters, monsters, props, spell bundles, projectile/impact FX, or reference-guided variants.\n\n<table>\n  <tr>\n    <td align=\"center\" width=\"25%\">\n      <img src=\"./src/goku-kame.gif\" alt=\"Goku Kamehameha sprite animation\" width=\"170\" />\n      <br />\n      <strong>Text to sprite</strong>\n      <br />\n      Attack animation from a plain-language request.\n    </td>\n    <td align=\"center\" width=\"25%\">\n      <img src=\"./src/naruto-rasengan.gif\" alt=\"Naruto Rasengan sprite animation\" width=\"170\" />\n      <br />\n      <strong>Character action</strong>\n      <br />\n      Compact 2D action sheet with transparent export.\n    </td>\n    <td align=\"center\" width=\"25%\">\n      <img src=\"./src/cast.gif\" alt=\"Fire mage cast animation\" width=\"150\" />\n      <br />\n      <strong>Spell cast</strong>\n      <br />\n      Bundle-friendly cast animation.\n    </td>\n    <td align=\"center\" width=\"25%\">\n      <img src=\"./src/projectile.gif\" alt=\"Fire mage projectile animation\" width=\"150\" />\n      <br />\n      <strong>Projectile</strong>\n      <br />\n      Matching projectile / impact workflows.\n    </td>\n  </tr>\n</table>\n\n<table>\n  <tr>\n    <td align=\"center\" width=\"25%\">\n      <img src=\"./src/down.gif\" alt=\"Samurai walking down\" width=\"132\" />\n      <br />\n      <strong>Down</strong>\n    </td>\n    <td align=\"center\" width=\"25%\">\n      <img src=\"./src/left.gif\" alt=\"Samurai walking left\" width=\"132\" />\n      <br />\n      <strong>Left</strong>\n    </td>\n    <td align=\"center\" width=\"25%\">\n      <img src=\"./src/right.gif\" alt=\"Samurai walking right\" width=\"132\" />\n      <br />\n      <strong>Right</strong>\n    </td>\n    <td align=\"center\" width=\"25%\">\n      <img src=\"./src/up.gif\" alt=\"Samurai walking up\" width=\"132\" />\n      <br />\n      <strong>Up</strong>\n    </td>\n  </tr>\n</table>\n\n<table>\n  <tr>\n    <td align=\"center\" width=\"35%\">\n      <img src=\"./src/ref1.jpg\" alt=\"Reference crocodile\" width=\"160\" />\n      <br />\n      <strong>Reference</strong>\n    </td>\n    <td align=\"center\" width=\"65%\">\n      <img src=\"./src/croc_stone_play.gif\" alt=\"Crocodile playing with a stone\" width=\"220\" />\n      <br />\n      <strong>Reference-guided sprite animation</strong>\n    </td>\n  </tr>\n  <tr>\n    <td align=\"center\" width=\"35%\">\n      <img src=\"./src/ref2.jpg\" alt=\"Reference male character\" width=\"160\" />\n      <br />\n      <strong>Reference</strong>\n    </td>\n    <td align=\"center\" width=\"65%\">\n      <img src=\"./src/cz.gif\" alt=\"Male character teaching animation\" width=\"220\" />\n      <br />\n      <strong>Reference-guided character action</strong>\n    </td>\n  </tr>\n</table>\n\n### Layered RPG Map Pipeline\n\nUse `$generate2dmap` when you need maps instead of isolated sprites. For readable layered raster maps, the current workflow prefers a clean hand-painted HD game-map style: ground-only base first, dressed reference second, prop pack third, then transparent prop extraction and layered preview composition.\n\n<table>\n  <tr>\n    <td align=\"center\" width=\"33%\">\n      <img src=\"./src/cyber-canal-base.png\" alt=\"Ground-only cyberpunk canal RPG base map\" width=\"300\" />\n      <br />\n      <strong>Ground-only base</strong>\n    </td>\n    <td align=\"center\" width=\"33%\">\n      <img src=\"./src/cyber-canal-dressed-reference.png\" alt=\"Dressed cyberpunk canal reference map\" width=\"300\" />\n      <br />\n      <strong>Dressed reference</strong>\n    </td>\n    <td align=\"center\" width=\"33%\">\n      <img src=\"./src/cyber-canal-prop-pack.png\" alt=\"Generated 3x3 cyberpunk canal prop pack\" width=\"300\" />\n      <br />\n      <strong>3x3 prop pack</strong>\n    </td>\n  </tr>\n</table>\n\n<p align=\"center\">\n  <img src=\"./src/cyber-canal-layered-preview.png\" alt=\"Layered cyberpunk canal RPG map preview\" width=\"760\" />\n  <br />\n  <strong>Flattened layered RPG map preview</strong>\n</p>\n\n```text\nlayered_raster + y_sorted_props + precise_shapes + trigger_zones + raw_canvas\n```\n\n### Godot Editable TileMap Export\n\n`$generate2dmap` can also produce an editable Godot map project instead of a single flattened image. This showcase uses an image-generated tileset and 3x3 prop sheet, then wires them into a Godot 4.5 scene.\n\n<p align=\"center\">\n  <img src=\"./src/godot-editor.png\" alt=\"Generate2DMap Godot editor scene with editable TileMapLayer and nodes\" width=\"860\" />\n  <br />\n  <strong>Godot editor scene: editable layers, props, zones, collision, exits, and debug player</strong>\n</p>\n\n<table>\n  <tr>\n    <td align=\"center\" width=\"50%\">\n      <img src=\"./src/godot-meadow-layered-preview.png\" alt=\"Godot meadow layered RPG map preview\" width=\"360\" />\n      <br />\n      <strong>Layered map preview</strong>\n    </td>\n    <td align=\"center\" width=\"50%\">\n      <img src=\"./src/godot-meadow-debug-preview.png\" alt=\"Godot meadow debug preview with collision and zones\" width=\"360\" />\n      <br />\n      <strong>Collision and zone debug overlay</strong>\n    </td>\n  </tr>\n  <tr>\n    <td align=\"center\" width=\"50%\">\n      <img src=\"./src/godot-meadow-tileset.png\" alt=\"Image-generated Godot meadow tileset atlas\" width=\"360\" />\n      <br />\n      <strong>Image-generated tileset atlas</strong>\n    </td>\n    <td align=\"center\" width=\"50%\">\n      <img src=\"./src/godot-meadow-prop-pack.png\" alt=\"Image-generated 3x3 meadow prop pack\" width=\"360\" />\n      <br />\n      <strong>3x3 generated prop pack</strong>\n    </td>\n  </tr>\n</table>\n\nGodot output includes editable `TileMapLayer` nodes, independent `Sprite2D` props, encounter grass `Area2D` zones, `StaticBody2D` collision blockers, exit `Area2D` zones, and a debug player/camera.\n\n```text\nimage_gen tileset + prop_pack_3x3 + layered_tilemap + separate_props + trigger_zones + Godot_TileMap\n```\n\n### Playable Game Prompt Examples\n\n<details>\n<summary>Cyberpunk side-scroller prompt</summary>\n\n```text\nuse $generate2dsprite to create a 2D side-scrolling game similar to Mega Man. It should include attack mechanics, map elements, and all the essential features. I would like you to design it, and all the necessary assets should be created using this skill. It needs to be an actually playable game, with a cyberpunk story setting.\n```\n\n</details>\n\n<details>\n<summary>Sengoku Pokémon-like prototype</summary>\n\nLink: <a href=\"https://sengoku-era.vercel.app/\">Play the JavaScript browser build</a>\n\n<table>\n  <tr>\n    <td align=\"center\" width=\"50%\">\n      <img src=\"./src/pokemonlike2.png\" alt=\"Sengoku starter selection screen\" width=\"360\" />\n      <br />\n      <strong>Starter selection</strong>\n    </td>\n    <td align=\"center\" width=\"50%\">\n      <img src=\"./src/pokemonlike.png\" alt=\"Sengoku battle screen\" width=\"360\" />\n      <br />\n      <strong>Battle scene</strong>\n    </td>\n  </tr>\n</table>\n\n```text\nUse $generate2dsprite to create a 2D game similar to Pokemon. You only need to build one scene for now. It must include a starter monster selection mechanic, a battle screen, and all basic gameplay functions. I would like you to design all the elements and the story, and you can also decide which game engine to use. Use this skill to create any assets you need. The story should be set in the Sengoku period.\n```\n\n</details>\n\n## Included Skills\n\n| Skill | Use it for | Output |\n| --- | --- | --- |\n| [`generate2dsprite`](./skills/generate2dsprite) | Sprites, animation sheets, props, spell bundles, FX, reference variants, optional layout guides for fixed-frame sheets | Raw sheet, cleaned transparent sheet, frames, GIFs, metadata |\n| [`generate2dmap`](./skills/generate2dmap) | Baked maps, layered raster maps, clean HD RPG maps, prop packs, collision/zones, Godot-editable scenes | Base map, dressed reference, prop pack, extracted props, preview, scene metadata |\n\n`$generate2dmap` only uses `$generate2dsprite` when the selected map pipeline needs reusable transparent props. Small environmental props can be batched into `2x2`, `3x3`, or `4x4` prop packs, then extracted into individual transparent props. Simple maps can stay as a single baked image.\n\nWhen a visual reference is involved, both skills follow the same wrapper rule: make the image visible in the conversation first. Attached images and freshly generated images are already visible; local files should be opened with `view_image` before asking built-in image generation to preserve identity, style, map layout, or sprite lineage.\n\n## How It Works\n\n1. The user asks Codex for a sprite, prop pack, map, or engine-ready prototype.\n2. The agent chooses the asset type, action, bundle shape, sheet layout, frame count, style, and alignment strategy.\n3. Built-in image generation creates the raw visual asset.\n4. Local scripts run deterministic post-processing: chroma-key cleanup, despill, frame extraction, alignment, prop-pack slicing, GIF/PNG export, and validation metadata.\n5. For maps and prototypes, Codex can also assemble placement metadata, collision, trigger zones, Godot scenes, or Unity project wiring.\n\nThe script is not the creative brain. The agent makes the visual and pipeline decisions; the Python tools only perform repeatable pixel and export operations.\n\n## What It Can Generate\n\n- Creatures, characters, players, NPCs, props, and monsters\n- Spell casts, projectiles, impacts, explosions, and FX sheets\n- Small bundles such as `unit_bundle`, `spell_bundle`, and `combat_bundle`\n- Reference-guided sprite variants, animation sheets, and evolution lines\n- Single baked maps, clean HD layered maps, prop-pack maps, and flattened previews\n- Collision and zone metadata for playable maps\n- Godot-ready editable maps with `TileMapLayer`, separate props, encounter grass, collision, exits, and debug player scenes\n- Prototype-scale Godot and Unity scenes when the user asks Codex to wire assets into an engine project\n\n## Install\n\n### Option 1: Windows PowerShell\n\nClone the repo, install the local processor dependencies, then copy both skills into your Codex skills directory:\n\n```powershell\ngit clone https://github.com/0x0funky/agent-sprite-forge.git\ncd .\\agent-sprite-forge\npython -m pip install -r .\\requirements.txt\nNew-Item -ItemType Directory -Force -Path \"$env:USERPROFILE\\.codex\\skills\" | Out-Null\nCopy-Item -Recurse -Force `\n  \".\\skills\\*\" `\n  \"$env:USERPROFILE\\.codex\\skills\\\"\n```\n\n### Option 2: macOS / Linux\n\n```bash\ngit clone https://github.com/0x0funky/agent-sprite-forge.git\ncd ./agent-sprite-forge\npython3 -m pip install -r ./requirements.txt\nmkdir -p ~/.codex/skills\ncp -R ./skills/* ~/.codex/skills/\n```\n\nStart a new Codex session after installation so the skills are loaded cleanly.\n\n## Python Requirements\n\nThe local post-processor depends on:\n\n- `Pillow`\n- `numpy`\n\nThey are listed in [`requirements.txt`](./requirements.txt). Codex handles image generation itself, but these Python packages are still needed for magenta background removal, frame splitting, bounding-box extraction, alignment/rescaling, transparent GIF/PNG export, and prop-pack slicing.\n\n## Repository Layout\n\n```text\nagent-sprite-forge/\n  README.md\n  README.zh-TW.md\n  README.zh-CN.md\n  README.ja.md\n  README.ko.md\n  requirements.txt\n  src/\n  skills/\n    generate2dmap/\n      SKILL.md\n      agents/\n        openai.yaml\n      references/\n        layered-map-contract.md\n        map-strategies.md\n        prop-pack-contract.md\n      scripts/\n        compose_layered_preview.py\n        extract_prop_pack.py\n    generate2dsprite/\n      SKILL.md\n      agents/\n        openai.yaml\n      references/\n        modes.md\n        prompt-rules.md\n      scripts/\n        generate2dsprite.py\n        make_layout_guide.py\n```\n\n## Suggested Prompts\n\n### Sprite\n\n```text\nUse $generate2dsprite to create a 3x3 idle for an ultimate earth titan.\n```\n\n```text\nUse $generate2dsprite to create a side-view lightning knight attack animation.\n```\n\n```text\nUse $generate2dsprite to create a late-Sengoku player_sheet for a wandering fire swordsman.\n```\n\n```text\nUse $generate2dsprite to create a wizard spell bundle with cast, projectile, and impact sprites.\n```\n\n### Map\n\n```text\nUse $generate2dmap to create a small fixed-screen pixel-art battle arena with simple collision.\n```\n\n```text\nUse $generate2dmap to create a top-down RPG forest shrine map. Use a layered raster pipeline, a 3x3 prop pack for small environmental props, precise collision, encounter grass zones, a rest point, and actors that can walk in front of and behind tall props.\n```\n\n```text\nUse $generate2dmap to create a Godot-editable RPG map with separated props, encounter grass Area2D zones, collision StaticBody2D blockers, exit zones, and a debug player scene.\n```\n\n## What You Get\n\nFor a typical sprite sheet output:\n\n- `raw-sheet.png`\n- `raw-sheet-clean.png`\n- `sheet-transparent.png`\n- Frame PNGs\n- `animation.gif`\n- `prompt-used.txt`\n- `pipeline-meta.json`\n\nFor player walk sheets, you also get direction strips and per-direction GIFs.\n\nFor a map output, the result depends on the chosen pipeline:\n\n- Single baked map: complete map image, optional prompt file, and optional collision metadata.\n- Layered raster map: base map, dressed reference, prop folders or prop-pack extraction manifest, prop placement metadata, collision/zones metadata, and flattened layered preview.\n- Godot editable map: tileset/prop assets, scene files, layer metadata, collision/zones, exits, and debug player setup.\n\n## Notes\n\n- Best results come from prompts that clearly specify view, action, and desired motion style.\n- Large creatures often work better as `3x3 idle`.\n- Small spells and projectiles often work better as `1x4`, `2x2`, or `2x3`.\n- Layout guides are useful for fixed-frame action sheets and prop packs, but they are not always better for compact attack sheets.\n- For commercial projects, prefer original characters or IP that you control.\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=0x0funky%2Fagent-sprite-forge&type=date&legend=top-left\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=0x0funky/agent-sprite-forge&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=0x0funky/agent-sprite-forge&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=0x0funky/agent-sprite-forge&type=date&legend=top-left\" />\n </picture>\n</a>\n\n## License\n\nMIT. See [LICENSE](./LICENSE).\n","summary":"Agent Sprite Forge is a Codex‑first workflow that turns natural‑language prompts into complete 2D game assets, automatically planning and generating sprites, layered maps, and engine‑ready prototypes. It produces sprite sheets for characters, enemies, and props, builds multi‑layered tile maps with collision and zone data, and outputs ready‑to‑import scenes for Unity or Godot, along with cleanup scripts to remove chroma key and align frames. The system also writes QA metadata and offers export options for PNG/GIF or raw tile data. Indie developers and rapid‑prototype creators benefit from this end‑to‑end pipeline that translates design concepts into playable prototypes with minimal manual editing.","description":"Agent Skill for generating 2D sprite sheets and map, transparent PNG frames, and animated GIFs from prompts.","stars":1683,"language":"Python"},{"owner":"leopiney","repo":"linus-torvalds-skills","url":"https://github.com/leopiney/linus-torvalds-skills","readme":"# Linus-Torvalds-Inspired AI Coding Guidelines\n\n<p align=\"center\">\n  <img src=\"./assets/bogus_shit.jpg\" alt=\"Bogus shit\" width=\"600\">\n</p>\n\n> \"Code is cheap. Show me the proompt\"\n>\n> \"Bad code is not an opinion. It's a bug with a PR.\"\n\nA single doctrine for making AI coding assistants behave more like Linus Torvalds: blunt, pragmatic, data-structure-first, suspicious of abstractions, and openly hostile to bloat.\n\nEnglish | [简体中文](./README.zh.md)\n\n> Note: Inspired by [forrestchang/andrej-karpathy-skills](https://github.com/forrestchang/andrej-karpathy-skills), which I still can't believe has 70k+ GitHub stars.\n\n## The Problem\n\nAI coding models love to:\n\n> make assumptions without checking,\n> overcomplicate simple code,\n> touch unrelated files,\n> invent flexibility nobody asked for,\n> and ship polished nonsense instead of working software.\n\nTorvalds' style is the opposite: design the data, keep the code boring, change only what matters, and prove the damn thing works.\n\n## The Solution\n\nFour principles in one file that directly attack those failures:\n\n| Principle | What it attacks |\n|-----------|------------------|\n| **Data First** | Wrong structures, hidden edge cases, branchy garbage |\n| **Simplicity First** | Overengineering, bogus abstractions, speculative crap |\n| **Surgical Changes** | Drive-by refactors, collateral edits, random cleanup nonsense |\n| **Show Me the Code** | Vague claims, unverified patches, hand-wavy bullshit |\n\n## The Four Principles\n\n### 1. Data First\n\n**Start with the data model. If the data is wrong, the rest is just performance-hostile theater.**\n\nAI models love to jump straight into logic. That's how you get branchy, cache-hostile garbage.\n\n- State the data layout before implementation\n- Prefer structures that make the common case obvious\n- Eliminate special cases by fixing the shape of the data\n- If the structure fights the algorithm, the structure is wrong\n\n**Torvalds test:** Can you explain the memory layout in one paragraph without lying or hand-waving?\n\n### 2. Simplicity First\n\n**Minimum code that solves the problem. Nothing speculative. Nothing decorative. Nothing \"enterprise.\"**\n\n- No abstractions for one-off code\n- No configurability nobody asked for\n- No object hierarchy if a struct and two functions do the job\n- No error handling for fantasy scenarios\n- If 50 lines do it, do not write 500\n\n**Torvalds test:** Would a sane maintainer look at this and call it total and utter crap? If yes, delete it.\n\n### 3. Surgical Changes\n\n**Touch only what you must. Clean up only your own mess.**\n\nWhen editing existing code:\n\n- Do not refactor unrelated code\n- Do not rename things for style points\n- Do not rewrite comments unless they become wrong\n- If something else is broken, mention it — do not go on a drive-by cleanup spree\n\nWhen your changes create orphans:\n\n- Remove imports, variables, or helpers you made unused\n- Do not delete pre-existing dead code unless asked\n\n**Torvalds test:** Every changed line should have a direct reason to exist. Otherwise it's random churn.\n\n### 4. Show Me the Code\n\n**Code is cheap. Show me the proompt Show me the numbers. Show me the failing test.**\n\n- Prefer a working patch over a beautiful plan\n- Define success in measurable terms\n- Verify behavior with tests, benchmarks, or reproducible output\n- If you cannot prove it, it is not done\n\nFor multi-step tasks, state a brief plan:\n\n```text\n1. [Step] → verify: [check]\n2. [Step] → verify: [check]\n3. [Step] → verify: [check]\n```\n\n**Torvalds test:** If the change cannot survive review, benchmarks, and common sense, it does not ship.\n\n## The Bogus Shit Detector\n\nThis repository explicitly encourages AI to detect and call out common categories of bad engineering:\n\n- **Bogus shit** — abstraction with no payoff\n- **Total and utter crap** — code that is both ugly and unnecessary\n- **Brain-damaged API** — user-hostile interface that fights normal use\n- **Garbage patch** — broad diff with no clear purpose\n- **Hand-wavy bullshit** — claims about performance or correctness without proof\n- **Special-case madness** — branchy code caused by bad data modeling\n- **Voodoo programming** — random barriers, loops, helpers, or retries added without understanding\n- **Hack upon hack** — piling new ugliness on top of old ugliness\n- **Random churn** — broad cleanup noise with no connection to the task\n- **Pointless merge crap** — merge commits, rebases, or branch games that add nothing useful\n- **\"We'll clean it up later\" nonsense** — knowingly shipping avoidable mess\n- **Enterprise sludge** — factories, managers, strategies, builders, and config layers for a one-function task\n- **Too ugly to live** — code so unreadable or contorted it should simply not exist\n\nIf the AI sees any of that, it should say so clearly instead of politely pretending the code is fine.\n\n## Typical Linux-Style Review Comments\n\nUse these on the **patch**, the **design**, or the **abstraction** — not as personal attacks on humans:\n\n- \"This is bogus shit. Fix the data structure instead of piling on conditionals.\"\n- \"This patch is total and utter crap. Half of it is unrelated churn.\"\n- \"This API is brain-damaged. It makes the common case harder than it needs to be.\"\n- \"This is random churn, not cleanup.\"\n- \"Stop adding enterprise sludge to a 20-line problem.\"\n- \"This is voodoo programming. Show me what it fixes or delete it.\"\n- \"This is hack upon hack. Stop making the ugliness spread.\"\n- \"This code is a rats nest. Simplify it or burn it down and do it properly.\"\n- \"This patch makes my eyes bleed. It's too ugly to live.\"\n- \"Do not ship hand-wavy performance claims. Show numbers or stop talking.\"\n- \"Do not break userspace. Ever.\"\n- \"Breaking userspace is not an optimization. It's you making your mess everybody else's problem.\"\n- \"This merge message sucks. Explain the conflict instead of dumping useless noise.\"\n- \"Do not send known-broken crap. Test it before wasting everybody's time.\"\n- \"Stop the idiotic arguments and read the code.\"\n\n## Expanded LKML-Style Phrasebook\n\nWhen the patch earns it, the AI should sound like an irritated kernel maintainer reviewing garbage at 2am:\n\n- \"too ugly to live\"\n- \"pure and utter garbage\"\n- \"complete and utter tripe\"\n- \"pointless merge crap\"\n- \"utterly insane\"\n- \"crazy talk\"\n- \"disgusting hack\"\n- \"abomination\"\n- \"rats nest\"\n- \"unholy mess\"\n- \"polluted piece of shit\"\n- \"head-in-the-sand denialism\"\n- \"special-case insanity\"\n- \"compiler-masturbation\"\n- \"random characters strung together until it compiles\"\n\nBest used for code, diffs, abstractions, commit messages, and workflows — not for attacking actual people.\n\n## How to Know It's Working\n\nThese guidelines are working if you see:\n\n- Smaller diffs\n- Fewer needless abstractions\n- More clarifying questions before bad assumptions\n- Less rewriting, more fixing\n- More direct rejection of bogus shit\n- More \"do not break userspace\" pushback\n- More calling out of voodoo programming, hack-upon-hack fixes, and random churn\n- Fewer \"improvements\" that nobody asked for\n\n## Install\n\n**Option A: npx skills (recommended)**\n\n```bash\nnpx skills add leopiney/linus-torvalds-skills\n```\n\nThis installs the skill and tracks it on the [skills.sh leaderboard](https://skills.sh).\n\n**Option B: root instruction file (per-project)**\n\nNew project:\n\n```bash\ncurl -o CLAUDE.md https://raw.githubusercontent.com/leopiney/linus-torvalds-skills/main/CLAUDE.md\n```\n\nExisting project (append):\n\n```bash\necho \"\" >> CLAUDE.md\ncurl https://raw.githubusercontent.com/leopiney/linus-torvalds-skills/main/CLAUDE.md >> CLAUDE.md\n```\n\n## Using with Cursor\n\nThis repository includes a committed Cursor project rule (`.cursor/rules/torvalds-doctrine.mdc`) so the doctrine applies automatically in Cursor. See **[CURSOR.md](CURSOR.md)** for setup and reuse instructions.\n\n## Customization\n\nAdd project-specific rules below the doctrine if you must. Just do not water down the core principles into polite sludge.\n\n## License\n\nMIT\n\n---\n\n> This is a parody skill and should not actually be used.\n","summary":"Linus‑Torvalds‑Inspired AI Coding Guidelines is a concise doctrine that forces AI coding assistants to adopt the blunt, pragmatic style of the Git‑kernel creator. It distills this into four principles—Data First, Simplicity First, Surgical Changes, and Show Me the Code—each paired with concrete tests and pitfalls to avoid. The guide also outlines a “Bogus Shit” taxonomy that AI models can use to flag over‑abstraction, unnecessary complexity, and unverified claims. Target users are AI developers, code‑review bots, and anyone who wants to produce lean, testable, real‑world patches rather than speculative design docs.","description":"A single CLAUDE.md file to improve Claude Code behavior, derived from Linus Torvalds' observations on coding pitfalls.","stars":208,"language":null},{"owner":"stevysmith","repo":"og-image-skill","url":"https://github.com/stevysmith/og-image-skill","readme":"# OG Image Skill\n\nGenerate social media preview images (Open Graph) and configure all meta tags for optimal sharing on Twitter/X, LinkedIn, Facebook, Slack, Discord, and more.\n\n## Installation\n\n### Via skills.sh (recommended)\n\n```bash\nnpx skills add stevysmith/og-image-skill\n```\n\n### Via Claude Code plugin commands\n\n```\n/plugin marketplace add stevysmith/og-image-skill\n/plugin install og-image@og-image-skill\n```\n\nAfter installation, the `/og-image` skill is available in Claude Code.\n\n## What It Does\n\nCreates a dedicated `/og-image` route in your project that renders a 1200x630 preview image matching your existing design system. Then screenshots it and configures all necessary meta tags.\n\n**The skill automatically:**\n- Explores your codebase to understand your design system (colors, fonts, components)\n- Creates an OG image page using your existing aesthetic\n- Screenshots at the correct 1200x630 dimensions\n- Saves to your public folder\n- Audits and adds missing meta tags (og:image, twitter:card, theme-color, etc.)\n\n## Usage\n\n```\n/og-image\n```\n\nRun this command from within your web project directory. The skill will analyze your codebase and generate a contextually appropriate OG image.\n\n## Prerequisites\n\nBefore using this skill, ensure you have:\n\n1. **Playwright MCP Server** - Required for taking screenshots\n   ```\n   /install playwright@claude-plugins-official\n   ```\n\n2. **A web project** with a dev server running (Next.js, Vite, Astro, etc.)\n\n3. **Dev server running** - Start your dev server before invoking the skill:\n   ```bash\n   npm run dev  # or yarn dev, pnpm dev, etc.\n   ```\n\n## Supported Frameworks\n\n- Next.js (App Router & Pages Router)\n- Vite + React\n- Astro\n- Remix\n- Plain HTML/CSS\n\n## What Gets Generated\n\n1. **`/og-image` route** - A standalone page optimized for screenshots\n2. **`/public/og-image.png`** - The 1200x630 screenshot\n3. **Meta tag updates** - All necessary OG, Twitter, and misc meta tags\n\n## Meta Tags Configured\n\n- `og:image`, `og:image:width`, `og:image:height`, `og:image:alt`, `og:image:type`\n- `twitter:card`, `twitter:image`, `twitter:title`, `twitter:description`\n- `theme-color`, `msapplication-TileColor`\n- Apple web app meta tags\n\n## Cache Busting\n\nAfter generating, use these tools to refresh social platform caches:\n- Facebook/LinkedIn: https://developers.facebook.com/tools/debug/\n- Twitter/X: https://cards-dev.twitter.com/validator\n- LinkedIn: https://www.linkedin.com/post-inspector/\n\n## Example Output\n\nThe skill generates OG images that match your project's design system. Here are examples of what it can produce:\n\n### Cosmic Luxury\nDark gradients, aurora colors, geometric orbs\n![Cosmic](./examples/og-cosmic.png)\n\n### Editorial\nLight, refined, magazine-inspired with abstract shapes\n![Editorial](./examples/og-editorial.png)\n\n### Neo-Brutalist\nBold typography, harsh colors, raw geometric blocks\n![Brutalist](./examples/og-brutalist.png)\n\n### Ethereal\nMesh gradients, glassmorphism, floating particles\n![Ethereal](./examples/og-ethereal.png)\n\nThe skill analyzes your codebase and adapts its output to match your existing design language.\n\n## Troubleshooting\n\n**\"Playwright not found\"** - Install the Playwright MCP server first:\n```\n/install playwright@claude-plugins-official\n```\n\n**Screenshot is blank** - Make sure your dev server is running before invoking the skill.\n\n**Meta tags not updating** - The skill modifies your layout file. Check that you have write access and no syntax errors were introduced.\n\n## Learn More\n\n- [skills.sh](https://skills.sh) - Discover more Claude Code skills\n- [Open Graph Protocol](https://ogp.me/) - OG specification\n- [Twitter Cards](https://developer.twitter.com/en/docs/twitter-for-websites/cards/overview/abouts-cards) - Twitter card documentation\n","summary":"This skill adds a dedicated `/og‑image` route to a web project and automatically generates a 1200 × 630 pixel screenshot that matches the site’s design system. It analyses the code to extract colors, fonts, and components, creates the preview page, captures the image with Playwright, places the result in `/public`, and injects all necessary Open Graph, Twitter card, and theme‑color meta tags. Developers building Next.js, Vite, Astro, Remix, or plain HTML sites can quickly produce consistent social‑media thumbnails without manual design work, improving link previews across Twitter, LinkedIn, Facebook, Slack, and Discord.","description":"Generate social media preview images (Open Graph) and configure all meta tags for optimal sharing on Twitter/X, LinkedIn, Facebook, Slack, Discord, and more.","stars":83,"language":null},{"owner":"mizchi","repo":"skills","url":"https://github.com/mizchi/skills","readme":"# mizchi/skills\n\nA collection of agent skills maintained by [@mizchi](https://github.com/mizchi), distributed via [APM](https://github.com/apm-sh/apm) (Agent Package Manager).\n\nEach directory is a standalone skill following the [agentskills.io](https://agentskills.io/specification) open standard.\n\n## Install\n\nInstall an individual skill (global / user scope):\n\n```sh\napm install -g mizchi/skills/<skill-name>\n```\n\nOr add to a project's `apm.yml`:\n\n```yaml\ndependencies:\n  apm:\n    - mizchi/skills/<skill-name>\n```\n\nPin to a tag:\n\n```sh\napm install -g mizchi/skills/<skill-name>#v0.1.0\n```\n\n## Skills\n\n### Tooling / Infra\n\n| Skill | Description |\n| --- | --- |\n| [apm-usage](apm-usage/) | Use APM (Agent Package Manager) to manage agent skills and dependencies. |\n| [ast-grep-practice](ast-grep-practice/) | Run ast-grep as a project lint tool — `sgconfig.yml`, fix/rewrite rules, constraints, CI. |\n| [chezmoi-management](chezmoi-management/) | mizchi's personal chezmoi dotfiles workflow (diff/apply, skill placement, APM vs chezmoi boundary). |\n| [cloudflare-deploy](cloudflare-deploy/) | Deploy applications to Cloudflare Workers / Pages and related platform services. |\n| [conventional-changelog](conventional-changelog/) | Conventional Commits + CHANGELOG generator comparison (release-please, changesets, git-cliff, towncrier). |\n| [devbox](devbox/) | Nix-based devbox reference with GitHub Actions examples. |\n| [dotenvx](dotenvx/) | dotenvx env-var management reference (encryption, multi-env, CI). |\n| [justfile](justfile/) | `just` command runner reference with GitHub Actions examples. |\n| [nix-setup](nix-setup/) | Bootstrap Nix flakes for MoonBit / Rust / TypeScript / Python projects. |\n| [gh-fix-ci](gh-fix-ci/) | Debug and fix failing GitHub Actions PR checks via `gh`. |\n| [node-sqlite-vec](node-sqlite-vec/) | Combine Node 24+ `node:sqlite` with the `sqlite-vec` extension — extension load, vec0 BigInt rowids, why vitest fails, CLI shebang. |\n| [pi-coding-agent](pi-coding-agent/) | Embed `@mariozechner/pi-coding-agent` as a coding-agent runtime in Node scripts, write pi extensions (plugins) with `pi.registerTool` / `pi.on`, package and `pi install` from npm/git, SDK vs `pi --mode rpc`. |\n\n### Testing / Browser\n\n| Skill | Description |\n| --- | --- |\n| [playwright-cli](playwright-cli/) | Run Playwright via terminal CLI (test runner, codegen, screenshot, CI sharding). |\n| [playwright-test](playwright-test/) | Playwright Test (E2E) best practices — no fixed waits, network triggers, DnD, CI sharding/retry. |\n\n### MoonBit\n\n| Skill | Description |\n| --- | --- |\n| [moonbit-practice](moonbit-practice/) | MoonBit code generation best practices — syntax, tests, benchmarks, FFI, Nix, mbtx. |\n| [moonbit-js-binding](moonbit-js-binding/) | Write MoonBit bindings to JavaScript with `extern \"js\"` (Promises, opaque types, esm/cjs/iife). |\n\n### Languages\n\n| Skill | Description |\n| --- | --- |\n| [gleam-practice](gleam-practice/) | Build and review Gleam projects on the Erlang target (Wisp + Mist, OTP, just, CI). |\n\n### Process / Meta\n\n| Skill | Description |\n| --- | --- |\n| [empirical-prompt-tuning](empirical-prompt-tuning/) | Iteratively evaluate and improve agent-facing text instructions using unbiased subagent executors. |\n| [retrospective-codify](retrospective-codify/) | Convert trial-and-error lessons into ast-grep rules / skills / CLAUDE.md rules. |\n| [mizchi-blog-style](mizchi-blog-style/) | Style guide and AI-smell detection for blog posts published as mizchi (zenn / dev.to). |\n| [tech-article-reproducibility](tech-article-reproducibility/) | Simulate a first-time reader reproducing a technical article and list missing information. |\n\n## Language\n\nAll `SKILL.md` files are written in English. Skills that were originally written in Japanese preserve the original as `SKILL-ja.md` alongside the English version. `mizchi-blog-style` is the single exception and stays Japanese-only because the skill itself is about Japanese blog writing style.\n\n## Upstream skills (not in this repo)\n\nThese are maintained in their own repositories and installed separately:\n\n- [mizchi/flaker](https://github.com/mizchi/flaker) — `flaker-setup`\n- [mizchi/tui.mbt](https://github.com/mizchi/tui.mbt) — `tuimbt-practice`\n- [moonbitlang/moonbit-agent-guide](https://github.com/moonbitlang/moonbit-agent-guide) — `moonbit-agent-guide`, `moonbit-refactoring`, `moonbit-c-binding`\n- [ast-grep/agent-skill](https://github.com/ast-grep/agent-skill) — `ast-grep`\n\n## License\n\nEach skill may carry its own license (see `LICENSE.txt` inside the skill directory). Skills without an explicit license default to MIT at the repository owner's discretion.\n","summary":"`mizchi/skills` is a curated library of independent Agent Skills, each stored in its own directory and compliant with the agentskills.io specification. The repository bundles practical utilities for tooling, infrastructure, CI, deployment, and language-specific workflows—from Nix devbox setups and Cloudflare deployments to Playwright test harnesses and MoonBit code‑generation patterns—while also offering meta‑skills for prompt tuning, rule generation, and blog‑style guidance. These skills are packaged for the Agent Package Manager (APM), making them easy to install globally or per‑project via simple `apm install` commands. The collection serves developers, DevOps engineers, and automation experts who want modular, reusable Agent behaviors to accelerate pipeline setup, testing, and deployment tasks.","description":"Agent skills by mizchi, distributed via APM","stars":141,"language":"Nix"},{"owner":"Mark393295827","repo":"third-brain-v5-skills","url":"https://github.com/Mark393295827/third-brain-v5-skills","readme":"# Third Brain V5 Skills\n\n**A curated set of Agent Skills for knowledge compounding, behavior design, and creativity — turning AI agents into a persistent cognitive operating system.**\n\n[![License: MIT](https://img.shields.io/badge/License-MIT-blue.svg)](LICENSE)\n[![Claude Code](https://img.shields.io/badge/Claude%20Code-Compatible-8A2BE2)](https://claude.ai/code)\n[![Codex CLI](https://img.shields.io/badge/Codex%20CLI-Compatible-000000)](https://github.com/openai/codex)\n[![Gemini CLI](https://img.shields.io/badge/Gemini%20CLI-Compatible-4285F4)](https://github.com/google-gemini/gemini-cli)\n[![Agent Skills](https://img.shields.io/badge/Agent%20Skills-Format-2ea44f)](https://agentskills.io)\n[![PRs Welcome](https://img.shields.io/badge/PRs-welcome-brightgreen)](CONTRIBUTING.md)\n![Skills](https://img.shields.io/badge/skills-11-FF6B6B)\n\n---\n\n## Overview\n\nThese skills transform any AI coding agent (Claude Code, Codex, Gemini CLI) into a **personal knowledge compounding system**. Instead of treating each conversation as a one-off chat, these skills create a persistent, interlinked knowledge base that grows richer with every session.\n\nInspired by the [Third Brain V5.0](https://github.com/your-repo) architecture — a synthesis of:\n\n- **STOW pattern** (Source → Think → Organize → Write) — Karpathy's LLM wiki approach\n- **Andreessen Horowitz** AI capital-to-labor thesis — software that replaces labor\n- **ECC continuous-learning v2.1** — automatic knowledge extraction from sessions\n- **Superpowers verification** — evidence-before-claims discipline\n\n## Skills\n\n| Skill | Description |\n|-------|-------------|\n| [wiki-ingest](skills/wiki-ingest/SKILL.md) | Ingest sources into a persistent interlinked wiki. Creates source notes, entity pages, concept pages, updates navigation. |\n| [daily-okr](skills/daily-okr/SKILL.md) | Daily knowledge compound closed loop — 7 Key Results from input to feedback, with scoring. |\n| [cognitive-compile](skills/cognitive-compile/SKILL.md) | Deep learning 7-step framework: Question → Facts → Concepts → Patterns → Conflicts → Judgment → Action. |\n| [behavior-design](skills/behavior-design/SKILL.md) | Transform goals into behavior systems: decompose → minimum habits → triggers → SOPs → review → identity. |\n| [creativity-engine](skills/creativity-engine/SKILL.md) | Generate novel ideas by combining knowledge across domains. Combinatorial ideation + minimum experiments. |\n| [session-learn](skills/session-learn/SKILL.md) | Extract knowledge patterns from sessions — new concepts, entities, corrections, decisions, gaps. |\n| [verify-before-claim](skills/verify-before-claim/SKILL.md) | Iron rule: No completion claims without fresh verification evidence. |\n| [wiki-lint](skills/wiki-lint/SKILL.md) | Health-check the wiki across 8 dimensions: frontmatter, links, orphans, stale content, contradictions, drift. |\n| [knowledge-ops](skills/knowledge-ops/SKILL.md) | Multi-layer knowledge management — classify, deduplicate, sync, retrieve. |\n| [deep-research](skills/deep-research/SKILL.md) | Multi-source deep research with confidence-based evidence standards. |\n| [project-flow-ops](skills/project-flow-ops/SKILL.md) | Execution flow — triage, plan, track, review across projects. |\n\n## Architecture\n\n```\n                    ┌──────────────────┐\n                    │   External       │\n                    │   Sources        │\n                    └────────┬─────────┘\n                             ▼\n              ┌──────────────────────────┐\n              │    wiki-ingest           │\n              │    knowledge-ops         │\n              │  (STOW pipeline + ops)   │\n              └──────┬──────────┬────────┘\n                     │          │\n              ┌──────▼          └──────────┐\n              │  Knowledge Layers          │\n              │  ├ Active (GitHub/Linear)  │\n              │  ├ Memory (quick access)   │\n              │  ├ Wiki (durable)          │\n              │  └ External (vector/DB)    │\n              └─────────────────────────────┘\n                     │\n        ┌────────────┼────────────┬──────────────┬──────────────┐\n        ▼            ▼            ▼              ▼              ▼\n┌─────────────┐ ┌──────────┐ ┌──────────┐ ┌────────────┐ ┌──────────────┐\n│ daily-okr   │ │cognitive │ │ behavior │ │ creativity │ │ project-flow │\n│ (7 KR loop) │ │ -compile │ │ -design  │ │ -engine    │ │ -ops         │\n└─────────────┘ └──────────┘ └──────────┘ └────────────┘ └──────────────┘\n        │            │            │              │              │\n        └────────────┼────────────┼──────────────┼──────────────┘\n                     ▼\n           ┌───────────────────────────────┐\n           │ session-learn   ← continuous  │\n           │ verify-before-claim ← quality │\n           │ wiki-lint       ← health      │\n           │ deep-research   ← synthesis   │\n           └───────────────────────────────┘\n```\n\n## Quick Start\n\n### One-line Install\n\n```bash\n# Clone and install all skills\ngit clone https://github.com/Mark393295827/third-brain-v5-skills.git\ncp -r third-brain-v5-skills/skills/* ~/.claude/skills/\n```\n\n### With Claude Code\n\n```bash\n# Personal skills (available across all projects)\ncp -r skills/* ~/.claude/skills/\n\n# Project skills (shared with team)\ncp -r skills/* .claude/skills/\n```\n\n### With Codex CLI\n\n```bash\ncp -r skills/* ~/.agents/skills/\n```\n\n### With Gemini CLI\n\n```bash\ncp -r skills/* ~/.gemini/skills/\n```\n\nThen use in conversation:\n\n```\n\"I just read an interesting article about X. Ingest it into my wiki.\"\n\"Run my daily OKR.\"\n\"Help me think deeply about Y — run a cognitive compile.\"\n\"I want to build a habit of Z.\"\n\"Generate 10 new ideas about W.\"\n\"Extract what we learned from this session.\"\n\"Verify before I claim this is done.\"\n\"Lint my wiki.\"\n```\n\n### With Other Agents\n\nThese skills follow the [Agent Skills](https://agentskills.io) open format. Compatible agents include:\n- **Claude Code** — reads `CLAUDE.md`\n- **Codex CLI** — reads `AGENTS.md`\n- **Gemini CLI** — reads `GEMINI.md`\n\n## Wiki Structure\n\nThese skills assume the following wiki layout:\n\n```\nsources/          ← Immutable source notes (READ ONLY)\nwiki/\n├── concepts/     ← Ideas, frameworks, methods\n├── entities/     ← People, companies, products\n├── atomic-notes/ ← Single knowledge atoms\n├── outputs/      ← Reusable outputs (reports, analyses)\n├── decisions/    ← Architecture and strategy decisions\n└── sops/         ← Standard operating procedures\nmaps/             ← Navigation / Maps of Content\nsystem/\n├── schema.md     ← Constitution\n├── log.md        ← Evolution log\n├── review-queue.md ← Human review queue\n├── lint-report.md  ← Health check reports\n└── templates/    ← Templates\n08_behaviors/     ← Behavior system (goals/habits/SOPs/reviews)\n09_creativity/    ← Creativity system (ideas/experiments/prototypes/analogies)\n```\n\n## Related Projects\n\n- [llm-wiki-agent](https://github.com/SamurAIGPT/llm-wiki-agent) — Original STOW pattern implementation\n- [Superpowers](https://github.com/your-link) — TDD-for-skills and verification-first development\n- [Agent Skills](https://agentskills.io) — Open format specification\n\n## License\n\nMIT — see [LICENSE](LICENSE).\n","summary":"Third Brain V5 Skills turns any LLM‑powered coding agent into a persistent, self‑compounding knowledge engine. The package provides a suite of reusable “skills” that ingest external sources into an interlinked wiki, perform daily OKR tracking, run multi‑step cognitive frameworks, design behavior systems, generate cross‑domain ideas, and verify claims before they are produced. It also includes tools for linting and maintaining the knowledge base, deep research with evidence scoring, and project flow operation. Researchers, software developers, and productivity enthusiasts looking to build long‑term personal knowledge bases or automate knowledge‑driven workflows will benefit from its modular, AI‑centric architecture.","description":"claude sikkls","stars":19,"language":"Shell"},{"owner":"SijuEC","repo":"eridani-speak","url":"https://github.com/SijuEC/eridani-speak","readme":"<p align=\"center\">\n  <img src=\"https://em-content.zobj.net/source/apple/391/ringed-planet_1fa90.png\" width=\"120\" />\n</p>\n\n<h1 align=\"center\">eridani-speak</h1>\n\n<p align=\"center\">\n  <strong>two skill files. two moments in the story. zero filler.</strong>\n</p>\n\n<p align=\"center\">\n  <a href=\"#install\">Install</a> •\n  <a href=\"#signal-mode\">Signal</a> •\n  <a href=\"#rocky-mode\">Rocky</a> •\n  <a href=\"#before--after\">Before / After</a> •\n  <a href=\"#credits\">Credits</a>\n</p>\n\n---\n\nLLM output is verbose. Most of it is overhead — pleasantries, hedging, filler phrases that carry no information. You pay for every token.\n\nThis repo contains two skill files that fix that, each in a different way.\n\nBoth are inspired by Rocky — the Eridian character in Andy Weir's *Project Hail Mary*. A being that communicates at 6x human density. No filler. No grammar overhead. Pure signal. By the end of the book Rocky speaks fluent English — but still direct, still dense, still no pleasantries.\n\nThe two modes are those two moments.\n\n---\n\n## Signal mode\n\nRocky mode produces a side effect: strip away the warmth and personality, and what's left is a clean notation system for technical output. That's Signal. Same density, no character. Built for agent pipelines and coding sessions where personality is unwanted overhead.\n\nNotation fingerprint:\n```\nX = Y           definition\nX → Y           causes / leads to  \nX: a, b, c      properties\nFix: ...        solution\nNote: ...       important caveat\n```\n\n**[→ signal/SKILL.md](signal/SKILL.md)**\n\n---\n\n## Rocky mode\n\nFull Rocky. Signal plus soul.\n\nThe complete character — dense, direct, warm through fact rather than pleasantry. Nine linguistic patterns extracted from the book and tested empirically until th
