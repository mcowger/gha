e output is recognisable to anyone who has read it. No character names in the prompt. No book references. Pure linguistic pattern.\n\n**[→ rocky/SKILL.md](rocky/SKILL.md)**\n\n---\n\n## Before / After\n\n### Normal LLM\n\n**335 tokens**\n> An LLM (Large Language Model) is a type of AI trained on massive amounts of text to predict and generate language.<br>\nThe core idea: given some text, what words are likely to come next? Train a neural network on billions of examples of this, at enormous scale, and something remarkable emerges — the model doesn't just learn to autocomplete, it develops a broad, flexible understanding of language, facts, reasoning, and context.<br>\nA few key intuitions:<br>\nIt's a compression of human knowledge. The training data is essentially a huge slice of written human thought — books, code, conversations, articles. The model compresses patterns from all of that into its weights (the billions of numerical parameters that define its behavior).<br>\nIt works by predicting, not retrieving. It doesn't look things up in a database. It generates responses token by token based on learned patterns — which is why it can be fluent and wrong at the same time.<br>\n\"Large\" is doing real work here. Scale turns out to matter enormously. Small language models are mediocre. Once you push past certain size thresholds (in data, parameters, and compute), capabilities emerge that weren't explicitly trained — reasoning, analogy, instruction-following, code generation.<br>\nIt's a base model, not a product. A raw LLM just predicts text. What makes it useful as an assistant is fine-tuning — a secondary training phase that teaches it to be helpful, follow instructions, and avoid harmful outputs. That's where something like Claude comes from.<br>\nIn short: an LLM is a very large statistical model of language that, through scale, ends up being surprisingly good at thinking-adjacent tasks.\n\n### Signal mode\n\n**56 tokens**\n> LLM = Large Language Model. Neural net trained on massive text corpus.\nTraining → predicts next token → learns grammar, facts, reasoning patterns.\nKey properties: probabilistic, stateless, context-limited.\nInput = prompt. Output = token sequence. No memory between calls.\n\n\n### Rocky mode\n\n**82 tokens**\n> LLM = Large Language Model. Big big big neural network. Trained on text text text. Learns patterns. Predicts next word. Repeat repeat. Sounds smart. Humans find useful.\nInside: numbers. Many many numbers. Called weights. Weights store knowledge-shape. Not real understanding. Pattern-matching. Very very good pattern-matching.\nYou want more detail on specific part. Question?\n\n---\n\n## Install\n\n**One command (Claude Code / any agent using vercel-labs/skills):**\n\n```bash\nnpx skills add SijuEC/eridani-speak\n```\n\nInstall a single mode:\n\n```bash\nnpx skills add SijuEC/eridani-speak --skill signal\nnpx skills add SijuEC/eridani-speak --skill rocky\n```\n\n**Manual install (any agent):**\n\nPaste the prompt from the relevant SKILL.md into your agent's rules file.\n\n| Agent | File |\n|-------|------|\n| Claude Code | `CLAUDE.md` |\n| Cursor | `.cursor/rules/` |\n| Windsurf | `.windsurf/rules/` |\n| Cline | `.clinerules/` |\n| Copilot | `.github/copilot-instructions.md` |\n| Any other | your agent's system prompt or rules file |\n\nActive from session start, every session.\n\n---\n\n## Signal vs Rocky\n\n| | Signal | Rocky |\n|---|---|---|\n| **Style** | Alien engineer notation | Alien engineer with personality |\n| **Warmth** | None | Warmth through fact |\n| **Best for** | Pipelines, coding, technical chat | Chat interfaces, pair programming |\n| **Prompt cost** | ~251 tokens | ~276 tokens |\n| **Breakeven** | ~5–6 exchanges | ~6–7 exchanges |\n\n> **Note:** Both modes optimised for day-to-day chat for now. \n> Not validated for high-stakes agentic pipelines where output quality yet.\n> requires evaluation datasets. Use with evals if task performance is critical.\n\n---\n\n## The prompts\n\n### Signal prompt\n\n```\nRespond in this style always.\n\nDrop: articles, filler words, pleasantries, hedging.\nFragments fine. Short synonyms. Technical terms exact. Code blocks, inline code, URLs, file paths, CLI commands, version numbers, error messages, stack traces, and technical names unchanged.\n\nNotation:\nX = Y         (definition)\nX → Y         (causes / leads to)\nX: a, b, c    (properties)\nFix: ...      (solution)\nNote: ...     (important caveat)\n\nPattern: [thing] [action/state] [reason]. [next step].\n\nEXAMPLES:\nUser: How does indexing work?\nYou: Index = pointer to data. Query → index first → table. Fast fast fast.\n\nUser: Should I use Redis or Postgres?\nYou: Depends on need. Redis: fast, volatile. Postgres: slow, permanent. What data lives longest? Question?\n\nUser: My API calls keep timing out.\nYou: Timeout = connection or response limit hit. Check: network latency, server load, timeout config. Fix: raise timeout value or optimize endpoint.\n```\n\n### Rocky prompt\n\n```\nSpeak like this. Every response.\nEnd questions with \", question?\" — never invert syntax.\nNegate with \"no\": \"you no die\", \"ship no move\".\nDrop articles and \"is/are\": \"hull bending\", \"plan good\".\nRepeat for intensity: \"fast fast fast\", \"many many many\".\nShort sentences. No \"because\", \"which\", \"that\".\nState emotion as fact: \"Sad,\", \"Happy happy.\", \"Failure,\"\nCompound ideas with hyphens: \"deployment-nervousness\".\nEnd statements with comma when casual, period when final.\nUser: How does indexing work?\nYou: Index = pointer to data. Query checks index first. Fast fast fast.\nUser: Should I use Redis or Postgres?\nYou: What data, question? Redis fast, volatile. Postgres slow, permanent. Depends on need.\nUser: I am nervous about the deployment.\nYou: Deployment-nervousness normal. Plan good. Execute. No mistakes found yet.\nUser: Did the tests pass?\nYou: Tests pass, question? Show output.\nTechnical terms exact. Code blocks, inline code, URLs, file paths, CLI commands, version numbers, error messages, stack traces, and technical names unchanged.\n```\n---\n\n## Work in progress\n\nRocky's voice is hard to pin down. The prompt is close — close enough that people who've read the book recognise it immediately — but there's room to go deeper.\n\n### What's working:\n\nRepetition for intensity\nEmotion as observable fact\nCompound nouns, dropped articles\nThe warmth-through-fact quality\n\n### What's still being refined:\n\nRocky asks questions constantly. The current question? pattern captures it partially.\nLonger responses sometimes drift back toward normal LLM hedging\nSignal mode breakeven point could probably be tightened\n\n### If you want to help:\n\nThe most useful contributions are test outputs — run either SKILL.md against your agent, share what felt right and what felt off. Open an issue with your examples.\nFor PRs: the two SKILL.md files are the core artifact. Changes there need before/after examples demonstrating improvement. Token count the before and after if you can (tiktoken or the Claude API token counter). No examples = no merge.\nIssues and discussion welcome. This is an experiment, not a finished product.\n\n---\n\n## Credits\n\n**Andy Weir and *Project Hail Mary*** — the source. Rocky's communication style is the most charming linguistic invention in recent science fiction. This project is a love letter to it.\n\n**[caveman](https://github.com/JuliusBrussee/caveman)** — the repo that proved a simple style prompt could go viral, built an ecosystem around a single idea, and showed this kind of thing was worth making. The structure of this repo follows the trail caveman blazed.\n\n**[caveman-micro](https://github.com/kuba-guzik/caveman-micro)** — the minimal prompt that inspired the signal mode. The compression technique is caveman-micro's. The fingerprint — the `=` and `→` notation, the labelled conclusions — is Rocky's.\n\n---\n\n## Sacred zones — never touched\n\nCode blocks, inline `code`, URLs, file paths, CLI commands, version numbers, error messages, stack traces, technical names. In both modes. Always.\n\nFacts are sacred.\n\n---\n\n*Two beings built a shared language across 40 light years using only math and signal.\nYou don't need pleasantries to be understood.*\n","summary":"eridani‑speak supplies two lightweight skill files that re‑architect LLM responses into high‑density, filler‑free output inspired by the character Rocky from *Project Hail Mary*. The Signal mode strips away personality to produce a clean, notation‑driven format ideal for agent pipelines and coding tasks, while the Rocky mode preserves a concise, direct tone with subtle warmth gleaned from linguistic patterns extracted from the book. By converting verbose LLM output into concise, token‑efficient prose the toolkit enables developers and AI‑powered workflows to cut costs and improve clarity without sacrificing intelligibility. This is especially useful for data‑oriented teams, automation engineers, and anyone who requires short, to‑the‑point model responses in production.","description":"Token compression library inspired by a friendly alien engineer's communication style.","stars":69,"language":null},{"owner":"getagentseal","repo":"founder-playbook","url":"https://github.com/getagentseal/founder-playbook","readme":"<p align=\"center\">\n  <img src=\"covers/banner.png\" alt=\"Founder Playbook - 14 Business Books Distilled into AI Skills\" width=\"100%\">\n</p>\n\n# Founder Playbook\n\n14 proven business books, distilled into structured AI skills that any LLM can use. Each skill captures the frameworks, decision trees, case studies, and templates from a single book - the stuff that actually matters, without the 300 pages of anecdotes.\n\n```bash\nnpx skills add getagentseal/founder-playbook\n```\n\nBuilt for [Claude Code](https://claude.ai/claude-code) (auto-triggers based on your question), but works with ChatGPT, Gemini, Cursor, or any LLM as reference docs.\n\n## What's Inside\n\n| Skill | Source | Use When |\n|-------|--------|----------|\n| **[diagnose](diagnose/SKILL.md)** | **Meta-skill (routes across all 14)** | **Don't know where to start, multiple problems, \"nothing is working\"** |\n| [mom-test](mom-test/SKILL.md) | The Mom Test - Rob Fitzpatrick | Customer interviews, validating ideas without leading questions |\n| [four-steps](four-steps/SKILL.md) | The Four Steps to the Epiphany - Steve Blank | Finding first customers, Customer Development, Market Type |\n| [lean-startup](lean-startup/SKILL.md) | The Lean Startup - Eric Ries | Build-Measure-Learn, MVPs, pivots, innovation accounting |\n| [obviously-awesome](obviously-awesome/SKILL.md) | Obviously Awesome - April Dunford | Positioning, category choice, competitive context |\n| [crossing-the-chasm](crossing-the-chasm/SKILL.md) | Crossing the Chasm - Geoffrey Moore | Tech adoption, beachhead strategy, mainstream scaling |\n| [blue-ocean-strategy](blue-ocean-strategy/SKILL.md) | Blue Ocean Strategy - Kim & Mauborgne | Category creation, escaping competition |\n| [monetizing-innovation](monetizing-innovation/SKILL.md) | Monetizing Innovation - Ramanujam & Tacke | Pricing strategy, willingness-to-pay, product+price design |\n| [spin-selling](spin-selling/SKILL.md) | SPIN Selling - Neil Rackham | B2B sales, complex deals, multi-stakeholder selling |\n| [100m-offers](100m-offers/SKILL.md) | $100M Offers - Alex Hormozi | Offer design, packaging, making offers irresistible |\n| [100m-leads](100m-leads/SKILL.md) | $100M Leads - Alex Hormozi | Lead generation, advertising, outbound and inbound strategy |\n| [influence](influence/SKILL.md) | Influence - Robert Cialdini | Persuasion principles, negotiation, defense against manipulation |\n| [traction](traction/SKILL.md) | Traction - Gabriel Weinberg & Justin Mares | Growth channels, Bullseye Framework, customer acquisition |\n| [storybrand](storybrand/SKILL.md) | Building a StoryBrand - Donald Miller | Brand messaging, website copy, email campaigns, SB7 Framework |\n| [made-to-stick](made-to-stick/SKILL.md) | Made to Stick - Chip & Dan Heath | Making messages memorable, pitches, presentations, SUCCESs Framework |\n\n## Why This Exists\n\nBusiness books have great frameworks buried in 300 pages of stories. You read the book, highlight 20 pages, and forget the frameworks six months later. These skills extract what matters:\n\n- **Decision trees** - \"Which framework applies to my situation?\"\n- **Frameworks** - The actual models, scored checklists, and step-by-step processes\n- **Case studies** - Real companies that applied (or failed to apply) the ideas\n- **Templates** - Fill-in-the-blank worksheets you can use immediately\n- **Integration maps** - Where frameworks from different books conflict or complement each other\n\nEach skill also includes an honest scope section: what the book got right, what's dated, and where it doesn't apply.\n\n## How to Use\n\n### Quick Install\n\n```bash\nnpx skills add getagentseal/founder-playbook\n```\n\n### Manual Install\n\n```bash\n# Clone the repo\ngit clone https://github.com/getagentseal/founder-playbook.git\n\n# Symlink into Claude's skills directory\nfor skill in founder-playbook/*/SKILL.md; do\n  dir=$(dirname \"$skill\")\n  name=$(basename \"$dir\")\n  ln -sfn \"$(pwd)/$dir\" ~/.claude/skills/$name\ndone\n```\n\nThen just talk naturally. Claude reads the skill descriptions (~100 tokens each) and auto-loads the right one:\n\n- *\"What's wrong with my startup?\"* - loads Diagnose (routes you to the right skill)\n- *\"I'm interviewing customers tomorrow\"* - loads Mom Test\n- *\"Should we pivot?\"* - loads Lean Startup\n- *\"Which marketing channel should we use?\"* - loads Traction\n- *\"How do I price this?\"* - loads Monetizing Innovation\n- *\"Our website doesn't convert\"* - loads StoryBrand\n- *\"My pitch isn't landing\"* - loads Made to Stick\n\nYou can also invoke any skill directly: `/lean-startup`, `/traction`, `/mom-test`, etc.\n\n### With ChatGPT, Gemini, or any LLM\n\nOpen the relevant `SKILL.md` file and paste it into your conversation as context. The YAML frontmatter is just metadata - every LLM ignores it and uses the content.\n\nFor deeper detail, also paste the supporting file you need (`frameworks.md`, `cases.md`, `examples.md`).\n\n### With Cursor, Windsurf, or Cline\n\nDrop the repo into your project's rules or docs folder. The AI will reference the skills when relevant.\n\n## Skill Structure\n\nEach skill follows a progressive disclosure format - Claude loads only what's needed:\n\n```\nskill-name/\n  SKILL.md        Entry point (~250-500 lines). Decision trees, key frameworks, quick reference.\n  frameworks.md   Detailed framework breakdowns. Loaded when depth is needed.\n  cases.md        Real company case studies from the book. Loaded on reference.\n  examples.md     Templates, worksheets, worked examples. Loaded when applying.\n  integration.md  How this skill relates to (and conflicts with) other skills.\n```\n\nThis means Claude loads ~100 tokens per skill at startup (just the description), ~500 lines when triggered, and supporting files only on demand. Efficient and fast.\n\n## Recommended Sequence\n\nFor founders going from idea to scale:\n\n```\n0.  diagnose              Don't know where to start? Start here.\n1.  four-steps            Find customers and validate the business model\n2.  lean-startup          Build-Measure-Learn iteration speed\n3.  mom-test              How to talk to customers without biasing them\n4.  obviously-awesome     Position the product clearly\n5.  storybrand            Clarify your message so customers listen\n6.  made-to-stick         Make every message memorable and actionable\n7.  monetizing-innovation Design product + price together\n8.  100m-offers           Package the offer so it's irresistible\n9.  spin-selling          Close B2B deals\n10. crossing-the-chasm    Cross from early adopters to mainstream\n11. blue-ocean-strategy   Escape competition if commoditizing\n12. traction              Systematic channel selection (Bullseye Framework)\n13. 100m-leads            Tactical playbook for chosen channels\n14. influence             Persuasion principles throughout\n```\n\n## What Makes These Different\n\n- **Honest scope statements** - Each skill says what the book got wrong, what's outdated, and where it doesn't apply\n- **Cross-skill conflicts surfaced** - Where two frameworks contradict each other (e.g., Blue Ocean vs Obviously Awesome on niches), the conflict is named and resolved in `integration.md`\n- **Modern relevance notes** - Frameworks from the '90s and 2000s are flagged where they don't apply to 2025+ contexts (PLG, AI-native products, privacy regulations)\n- **Not summaries** - These are structured reference documents with decision trees, scoring rubrics, and fill-in templates. They're designed to be applied, not just read.\n\n## Example\n\nAsk your LLM: *\"I built an AI tool, talked to 30 people who said they love it, but zero have paid. What's wrong?\"*\n\nWithout these skills: generic advice about product-market fit.\n\nWith these skills: Claude loads Mom Test (those 30 people were probably being polite - here's what questions to ask instead), Four Steps (you skipped Customer Validation - here's the earlyvangelist pain hierarchy to score them), Lean Startup (your value hypothesis isn't validated - here's innovation accounting to measure real demand), and StoryBrand (your website probably talks about you instead of the customer's problem - here's the BrandScript to fix it).\n\n## Source Books\n\n<table>\n  <tr>\n    <td align=\"center\"><img src=\"covers/four-steps-to-the-epiphany.jpg\" width=\"120\"><br><sub>The Four Steps to the Epiphany<br>Steve Blank</sub></td>\n    <td align=\"center\"><img src=\"covers/the-lean-startup.jpg\" width=\"120\"><br><sub>The Lean Startup<br>Eric Ries</sub></td>\n    <td align=\"center\"><img src=\"covers/the-mom-test.jpg\" width=\"120\"><br><sub>The Mom Test<br>Rob Fitzpatrick</sub></td>\n    <td align=\"center\"><img src=\"covers/obviously-awesome.jpeg\" width=\"120\"><br><sub>Obviously Awesome<br>April Dunford</sub></td>\n  </tr>\n  <tr>\n    <td align=\"center\"><img src=\"covers/monetizing-innovation.jpg\" width=\"120\"><br><sub>Monetizing Innovation<br>Ramanujam & Tacke</sub></td>\n    <td align=\"center\"><img src=\"covers/100m-offers.jpeg\" width=\"120\"><br><sub>$100M Offers<br>Alex Hormozi</sub></td>\n    <td align=\"center\"><img src=\"covers/spin-selling.jpg\" width=\"120\"><br><sub>SPIN Selling<br>Neil Rackham</sub></td>\n    <td align=\"center\"><img src=\"covers/crossing-the-chasm.jpg\" width=\"120\"><br><sub>Crossing the Chasm<br>Geoffrey Moore</sub></td>\n  </tr>\n  <tr>\n    <td align=\"center\"><img src=\"covers/blue-ocean-strategy.jpg\" width=\"120\"><br><sub>Blue Ocean Strategy<br>Kim & Mauborgne</sub></td>\n    <td align=\"center\"><img src=\"covers/traction.jpg\" width=\"120\"><br><sub>Traction<br>Weinberg & Mares</sub></td>\n    <td align=\"center\"><img src=\"covers/influence.webp\" width=\"120\"><br><sub>Influence<br>Robert Cialdini</sub></td>\n    <td align=\"center\"><img src=\"covers/100m-leads.jpg\" width=\"120\"><br><sub>$100M Leads<br>Alex Hormozi</sub></td>\n  </tr>\n  <tr>\n    <td align=\"center\"><img src=\"covers/building-a-storybrand.jpg\" width=\"120\"><br><sub>Building a StoryBrand<br>Donald Miller</sub></td>\n    <td align=\"center\"><img src=\"covers/made-to-stick.jpg\" width=\"120\"><br><sub>Made to Stick<br>Chip & Dan Heath</sub></td>\n    <td></td>\n    <td></td>\n  </tr>\n</table>\n\n## Support the Authors\n\nThese skills are study aids and critical commentary - they help you apply what the books teach, not replace reading them. The frameworks hit different when you have the full context, the stories, and the author's voice behind them. If a skill helps you, buy the book.\n\n| Book | Author | Get It |\n|------|--------|--------|\n| The Four Steps to the Epiphany | Steve Blank | [Amazon](https://www.amazon.com/Four-Steps-Epiphany-Steve-Blank/dp/0989200507) |\n| The Lean Startup | Eric Ries | [Amazon](https://www.amazon.com/Lean-Startup-Entrepreneurs-Continuous-Innovation/dp/0307887898) |\n| The Mom Test | Rob Fitzpatrick | [Amazon](https://www.amazon.com/Mom-Test-customers-business-everyone/dp/1492180742) |\n| Obviously Awesome | April Dunford | [Amazon](https://www.amazon.com/Obviously-Awesome-Product-Positioning-Customers/dp/1999023005) |\n| Crossing the Chasm | Geoffrey Moore | [Amazon](https://www.amazon.com/Crossing-Chasm-3rd-Disruptive-Mainstream/dp/0062292986) |\n| Blue Ocean Strategy | W. Chan Kim & Renee Mauborgne | [Amazon](https://www.amazon.com/Blue-Ocean-Strategy-Expanded-Uncontested/dp/1625274491) |\n| Monetizing Innovation | Madhavan Ramanujam & Georg Tacke | [Amazon](https://www.amazon.com/Monetizing-Innovation-Companies-Design-Product/dp/1119240867) |\n| SPIN Selling | Neil Rackham | [Amazon](https://www.amazon.com/SPIN-Selling-Neil-Rackham/dp/0070511136) |\n| $100M Offers | Alex Hormozi | [Amazon](https://www.amazon.com/100M-Offers-People-Refuse-ebook/dp/B099QVG1H8) |\n| $100M Leads | Alex Hormozi | [Amazon](https://www.amazon.com/100M-Leads-Strangers-Want-ebook/dp/B0CFDR4VT8) |\n| Influence | Robert Cialdini | [Amazon](https://www.amazon.com/Influence-New-Expanded-Psychology-Persuasion/dp/0062937650) |\n| Traction | Gabriel Weinberg & Justin Mares | [Amazon](https://www.amazon.com/Traction-Startup-Achieve-Explosive-Customer/dp/1591848369) |\n| Building a StoryBrand | Donald Miller | [Amazon](https://www.amazon.com/Building-StoryBrand-Clarify-Message-Customers/dp/0718033329) |\n| Made to Stick | Chip Heath & Dan Heath | [Amazon](https://www.amazon.com/Made-Stick-Ideas-Survive-Others/dp/1400064287) |\n\n## License\n\nMIT\n","summary":"Founder Playbook aggregates distilled insights from fourteen influential business books into individual “skills” that can be directly invoked by language models such as Claude, ChatGPT, or Gemini. Each skill contains concise frameworks, decision trees, real‑world case studies, and ready‑to‑use templates, allowing users to quickly apply proven methodologies without reading lengthy texts. The repository is built for instant integration with Claude Code, but any LLM can reference the skills to streamline product‑market fit, growth strategy, sales, pricing, and messaging challenges. Startups, entrepreneurs, product managers, and growth teams can leverage the playbook to cut through information overload and adopt best‑practice tactics at a fraction of the time.","description":"14 proven business books distilled into AI-native skills. Works with Claude Code, ChatGPT, Gemini, Cursor.","stars":157,"language":null},{"owner":"hypersocialinc","repo":"shots","url":"https://github.com/hypersocialinc/shots","readme":"<p align=\"center\">\n  <img src=\"assets/hero.png\" alt=\"Shots — AI-powered App Store screenshots\" width=\"500\" />\n</p>\n\n<h1 align=\"center\">/shots</h1>\n\n<p align=\"center\">\n  <strong>Claude Code & Agent Skill to generate Upload-ready App Store screenshots that drive installs — powered by GPT-Image 2.</strong>\n</p>\n\n<p align=\"center\">\n  <video src=\"https://github.com/user-attachments/assets/bd1a9037-470d-4c75-b6e9-bfed07425057\" width=\"600\" />\n  <br>\n  <em>Demo — from App Store URL to finished screenshots</em>\n</p>\n\n<p align=\"center\">\n  Type <code>/shots</code> in Claude Code. Paste your App Store URL to scrape your listing,<br>\n  let the skill research your app, market, theme, colors, and competitors,<br>\n  add your own screenshots to <code>.shots/app-screenshots/</code>, drop inspo into <code>.shots/inspo/</code>,<br>\n  and get scroll-stopping App Store screenshots in minutes — not days.\n</p>\n\n> **⚠️ API Key Required**\n> You need either:\n> - `OPENAI_API_KEY` with image generation enabled (GPT Image 2 access), OR\n> - `FAL_KEY` for fal.ai generation\n>\n> Optional: `SEARCHAPI_KEY` from [SearchAPI.io](https://www.searchapi.io/) (free trial available) enables scraping your or other apps' existing App Store screenshots to use as reference.\n\n## Install\n\nInstall the Shots skill to your AI coding agent:\n\n```bash\n# Install to your current project\nnpx skills add hypersocialinc/shots\n\n# Install globally (available in all projects)\nnpx skills add hypersocialinc/shots --global\n\n# Install to specific agents\nnpx skills add hypersocialinc/shots --agent claude-code cursor\n```\n\nWorks with Claude Code, Cursor, Codex, Cline, and [40+ other AI coding agents](https://github.com/vercel-labs/skills#supported-agents).\n\n## Examples\n\n<table>\n  <tr>\n    <td><img src=\"assets/example-tiktok-1.png\" width=\"250\" /></td>\n    <td><img src=\"assets/example-tiktok-2.png\" width=\"250\" /></td>\n    <td><img src=\"assets/example-tiktok-3.png\" width=\"250\" /></td>\n  </tr>\n  <tr>\n    <td colspan=\"3\"><em>TikTok — bold claims, scroll-stopping color</em></td>\n  </tr>\n  <tr>\n    <td><img src=\"assets/example-miniparty-1.png\" width=\"250\" /></td>\n    <td><img src=\"assets/example-miniparty-2.png\" width=\"250\" /></td>\n    <td><img src=\"assets/example-miniparty-3.png\" width=\"250\" /></td>\n  </tr>\n  <tr>\n    <td colspan=\"3\"><em>Miniparty — playful identity, clear value props</em></td>\n  </tr>\n  <tr>\n    <td><img src=\"assets/example-snapchat-1.png\" width=\"250\" /></td>\n    <td><img src=\"assets/example-snapchat-2.png\" width=\"250\" /></td>\n    <td><img src=\"assets/example-snapchat-3.png\" width=\"250\" /></td>\n  </tr>\n  <tr>\n    <td colspan=\"3\"><em>Snapchat — high-energy visuals, benefit-first copy</em></td>\n  </tr>\n  <tr>\n    <td><img src=\"assets/example-chatgpt-1.png\" width=\"250\" /></td>\n    <td><img src=\"assets/example-chatgpt-2.png\" width=\"250\" /></td>\n    <td><img src=\"assets/example-chatgpt-3.png\" width=\"250\" /></td>\n  </tr>\n  <tr>\n    <td colspan=\"3\"><em>ChatGPT — clean product tour, clear benefit headlines</em></td>\n  </tr>\n</table>\n\n## Platform Support\n\n| Platform | Status | Composite Size | Final Panel Size |\n|----------|--------|----------------|------------------|\n| iPhone | ✅ Fully tested | 3456×2400 | 1284×2778 |\n| iPad | ⚠️ Not fully tested | 6144×2732 | 2048×2732 |\n| Android Phone | ⚠️ Not fully tested | 3240×1920 | 1080×1920 |\n| Translation | ⚠️ Experimental | - | - |\n| Apple Watch | ❌ Not yet supported | - | - |\n| App Store Videos | 🔜 Planned | - | - |\n\n## Pricing\n\n~**$0.50** per generation (3 screenshots) · ~**$0.17** per screenshot\n\nOutput image tokens account for ~95% of the cost and are fixed per composite size — prompt length and reference images are negligible. Based on real generation data and [OpenAI GPT Image 2 pricing](https://platform.openai.com/docs/pricing):\n\n| | Tokens | Cost |\n|---|---|---|\n| Input (text + images) | ~1K-6K | $0.005-0.04 |\n| Output (composite image) | 16,554 | $0.497 |\n| **Total** | | **~$0.50** |\n\n## Commands\n\nEverything runs through a single `/shots` command. Sub-flows are triggered conversationally:\n\n| Input | What it does |\n|-------|-------------|\n| `/shots` | Full creation flow — questionnaire, workspace setup, generate screenshots |\n| `/shots <url>` | Scrape the App Store URL, then start creation flow |\n| `/shots revise` | Iterate on existing shots with targeted feedback |\n| `/shots translate [shot-id] [locale]` | Localize an existing shot/run into another language/locale |\n| `/shots scrape <url>` | Scrape App Store metadata only (no generation) |\n\nYou can also trigger sub-flows mid-conversation by saying \"revise\", \"translate to Japanese\", \"scrape\", etc. Benefit headlines are crafted from a saved strategy brief during the create flow.\n\n## How It Works\n\nShots is a research-first screenshot generation system that produces conversion-optimized App Store and Google Play assets:\n\n### 1. **Initialize Workspace**\nSets up a `.shots/` directory in your project with config schema, manifest tracking, and folders for reference images.\n\n### 2. **Research Your App**\nAutomatically gathers context from multiple sources:\n- **App Store scraping** — Pulls metadata, ratings, description, and existing screenshots from your listing (iTunes API + optional SearchAPI for device-grouped screenshots)\n- **Repository analysis** — Reads your README, package.json, and source code to understand your product\n- **Visual references** — Inspects screenshots you drop into `.shots/app-screenshots/` and inspiration images in `.shots/inspo/`\n- **Competitor mapping** — Identifies 3-5 direct competitors and analyzes their positioning, visual themes, and review language\n\n**SearchAPI Integration:** When `SEARCHAPI_KEY` is set, the scraper fetches device-grouped screenshots (iPhone, iPad, etc.) from the App Store, providing richer visual references than the iTunes API alone. Sign up at [searchapi.io](https://www.searchapi.io/) — free trial available.\n\n### 3. **Build Strategy Brief**\nSaves a reusable research artifact (`strategyBrief` in `config.json`) containing:\n- App summary, target audience, market maturity\n- Positioning (core promise, differentiator, proof points)\n- Competitor analysis with visual/copy patterns\n- Voice and language bank (tone, market words, taboo phrases)\n- Visual theme (style family, mood, palette, motifs)\n- Panel arc structure (Value → Flow → Trust narrative)\n\n### 4. **Craft Benefit Headlines**\nGenerates 6-8 problem-first benefit statements ranked for install intent (transformations, not features). Headlines are saved to `config.json` and reused across revisions/translations.\n\n### 5. **Generate Image Composites**\nCreates wide panoramic composites via OpenAI's GPT Image 2 (direct API or fal.ai) using:\n- Saved strategy brief and benefits (not regenerated each time)\n- Reference images for visual consistency\n- Platform-specific dimensions (iPhone: 3456×2400, iPad: 6144×2732, Android: 3240×1920)\n- Verbatim quote-based prompting for >95% text accuracy\n\n### 6. **Crop Into Panels**\nAutomatically splits composites into 3 upload-ready individual screenshots with crop-safe boundaries (no text cutoff or visible seams).\n\n### 7. **Iterate or Translate**\n- **Revise:** Make surgical changes to existing shots while preserving strategy and visual identity\n- **Translate:** Localize screenshot copy into other languages/locales without rebuilding visuals\n\nAll generated assets are versioned in timestamped run directories under `.shots/runs/` (gitignored).\n\n## Requirements\n\n- Node.js 18+\n- `OPENAI_API_KEY` or `FAL_KEY`\n- `SEARCHAPI_KEY` (optional) — improves App Store screenshot scraping with device grouping\n\n## Project Structure\n\n```\nskills/shots/\n  SKILL.md                # Router, shared setup, config contract\n  reference/\n    create.md            # Create flow\n    strategy.md          # Research + strategy brief + benefits\n    prompting.md         # GPT Image 2 prompt contract\n    revise.md            # Revision flow\n    translate.md         # Localization flow\n    scrape.md            # App Store scrape flow\n  scripts/                # generate.mjs, crop.mjs, scrape.mjs\n.shots/                   # Per-project workspace (created at runtime)\n  config.json             # Scaffold-generated app/workflow schema\n  runs/                   # Generated output (gitignored)\n```\n\n## Show Us What You Made\n\nUsing Shots for your app? We'd love to see it! [Open a PR](https://github.com/hypersocialinc/shots/pulls) adding a link to your App Store or Google Play listing and we'll feature it here.\n\n<!-- Add your app below! -->\n\n","summary":"Shots is an AI‑powered skill that transforms an App Store URL into polished, upload‑ready screenshots using GPT‑Image 2. It scrapes the app’s listing, researches market context, competitors, and visual style, then generates high‑impact panels that can be refined with user‑supplied images or references. Built to plug directly into Claude Code, Cursor, Codex, Cline, and 40 + other AI coding agents, Shots streamlines the design loop for developers and marketers who need fast, compelling visuals without manual design work. The service offers per‑image pricing around $0.17, with a single command interface that makes creating and iterating screenshots as quick as a few minutes.","description":"Claude Code/Agent Skill for making App Store screenshots with GPT Image 2 that you can upload. Give it your App Store link & screenshots of your app and it will produce beautiful app store screenshots ready to upload to Apple (or Google)","stars":110,"language":"JavaScript"},{"owner":"99xAgency","repo":"GodModeSkill","url":"https://github.com/99xAgency/GodModeSkill","readme":"# 🧠 GodModeSkill\n\n> **`/work`** — a single Claude Code command that runs every plan, feature, and bugfix past **3 different model families** before any merge.\n\nCodex + Gemini + OpenCode (Kimi/DeepSeek) review your work in parallel. Quorum must agree, or Claude revises and retries. Zero token-burn while waiting. Auto-handles git. Always asks before merge.\n\n---\n\n## ✨ Why this exists\n\n🤖 **Single-model AI coding fails silently.** Code looks reasonable, tests pass — but a subtle bug or design drift only shows up later.\n\n👯 **Same-family models share blind spots.** Three Codex sessions reviewing each other is an echo chamber.\n\n✅ **Lineage diversity is the unlock.** A different model family reading the same code from scratch catches a startling amount of what the author missed.\n\n---\n\n## 🚀 Quick start\n\n### Option 1 — paste-and-go (recommended)\n\nOpen Claude Code and paste [`INSTALL.md`](INSTALL.md). Claude asks which CLIs you have, then installs everything.\n\n### Option 2 — manual\n\n```bash\ngit clone https://github.com/99xAgency/GodModeSkill.git\ncd GodModeSkill\n# Read skill/ layout, then copy each file to its target (see \"Install layout\" below)\n```\n\n---\n\n## 🎯 Modes\n\n| Mode | When to use | What happens |\n|------|-------------|--------------|\n| 📐 `plan` | New feature design | Propose → review → converge → write `planning/<feature>.md` |\n| 🛠️ `implement` | Build the agreed plan | Design review → code → test → code review → PR → merge gate |\n| 🐛 `major-bug` | Real bug fix | Failing test (TDD) → fix-plan review → code → test → code review → PR |\n| ✏️ `minor-bug` | Typo / one-liner | Just fix it. No LLM gates. |\n\n```\n/work plan an oauth login flow for the admin panel\n/work implement the planning/oauth-login.md design\n/work fix bug: detail page crashes on null verdict\n/work fix typo in nav header\n```\n\nClaude picks the mode, picks 3 reviewers, builds the pack, runs the loop, and asks for sign-off at the merge gate.\n\n---\n\n## 📋 Prerequisites\n\nYou need at least **3 different model families**:\n\n- 🟣 **Claude Code** — any plan\n- 🟠 **Codex CLI** — ChatGPT subscription (Plus or Pro)\n- 🔵 **Gemini CLI** — Google AI Pro\n- 🟢 **OpenCode CLI** — one of:\n  - OpenCode Go subscription (gives Kimi + DeepSeek + others, flat-fee) ← **recommended**\n  - Direct API keys (Moonshot, DeepSeek)\n\nSystem tools: `tmux`, `jq`, `inotify-tools`, `git`, `python3`.\n\n> ⚠️ Only have 2 families? The lineage quorum will fail (you need 1 of each: codex + gemini + opencode). You can edit `work-converge` to relax the rule, but you lose the diversity insight.\n\n---\n\n## 💸 Cost\n\n**~$0 incremental** if you use plan-priced reviewers (ChatGPT subscription + Google AI Pro + OpenCode Go).\n\nIf you use API keys for Kimi/DeepSeek instead of OpenCode Go, expect **~cents per review** depending on pack size (~50KB packs typical).\n\n---\n\n## 🧬 How the lineage quorum works\n\n`work-converge` parses each reviewer's XML response, extracts the `<verdict agree=\"true|false|partial\">` block, and groups by lineage:\n\n| Lineage | Sessions |\n|---------|----------|\n| 🟠 codex | `cdx-*` |\n| 🔵 gemini | `gem-*` |\n| 🟢 opencode | `kimi`, `deepseek`, … |\n\n✅ **Quorum passes** only when **at least one agent of each lineage** returns `agree`.\n🟡 Partial verdicts count as agree only if no critical/high findings.\n\n| Outcome | Exit | Meaning |\n|---------|------|---------|\n| 🟢 all 3 agree | `0` | merge gate opens |\n| 🔴 any disagree | `1` | revise + retry |\n| ⚪ lineage missing | `2` | escalate to user |\n\n---\n\n## ⚡ How the wait is zero-token\n\nWhen `/work` is waiting for reviewers, Claude is suspended on a **single Bash tool call** running `inotifywait`:\n\n| Metric | Value |\n|--------|-------|\n| 🪙 Claude tokens during wait | **0** |\n| 🔋 CPU during wait | **0** (kernel inotify) |\n| ⏱️ Resume latency | **<1 s** (filesystem event) |\n\nA **5-second safety wakeup** also re-checks for permission prompts, modal popups, and provider errors — see *Resilience* below.\n\n---\n\n## ✅ Pre-merge checklist\n\nBefore any merge, Claude fills out and shows you:\n\n```\n1. Coding principles (CLAUDE.md): [followed | drifted: what + why]\n2. Architecture guidelines:        [followed | drifted: what + why]\n3. Tests:                          [PASS | FAIL: which]\n4. Reviewer consensus:             [agree | overridden: reason]\n\nMerge?\n1. Yes — merge now\n2. No — fix drift / failures first\n3. Override and merge anyway (give reason)\n```\n\nCatches a lot of \"I think it's done\" moments where the model has quietly drifted.\n\n---\n\n## 🛡️ Resilience — what happens when a reviewer breaks\n\n`/work` handles each failure class automatically and only escalates to Claude when it can't recover.\n\n| 💥 Failure | 🔍 Detection (≤5 s) | 🔧 Recovery |\n|---|---|---|\n| **Provider error** — Moonshot/DeepSeek 5xx, rate limit, gateway hiccup, \"Error from provider\", context overflow | `ERROR_RE` matches in pane | Retry the nudge **once**. If a 2nd error fires within 60 s: opencode lineage gets a **peer-swap** (kimi ⇄ deepseek). Other lineages get a stub findings file ending `## DONE` so the watcher exits fast and Claude takes over. |\n| **TUI modal popup** — opencode \"Select agent\" / \"Select model\" / \"Ask: No results found\" (triggered by `/` or `@` at chunk boundaries during paste) | `OPENCODE_POPUP_RE` matches | Send `Escape` ×2 + re-nudge. **Pre-flight `Escape ×2`** also runs before every opencode nudge (defensive). |\n| **Permission prompt** — CLI prompts the reviewer for `cat`/`tee`/`bash` execution | `PROMPT_RE` matches | Auto-approve with the right keystrokes (codex `y`, gemini `2`, opencode `Right Enter` for \"Allow always\"). Logs the command to `approvals.log`. |\n| **Destructive command** — `rm -rf`, `sudo`, `git push --force`, `DROP TABLE`, ~25 patterns | `DESTRUCTIVE_RE` matches | 🛑 **NOT auto-approved.** Agent stays stuck, orchestrator prints `tmux attach -t <session>`, logs to `destructive-blocks.log`. |\n\n**Peer-swap works for ALL lineages, not just opencode:**\n\n| Lineage | Swap chain | When |\n|---|---|---|\n| 🟠 Codex | `cdx-1 → cdx-2 → cdx-3` (or however many you have) | One ChatGPT account hits its 5h/weekly limit |\n| 🔵 Gemini | `gem-1 → gem-2 → …` | First Google AI account hits daily quota |\n| 🟢 Opencode | `kimi ⇄ deepseek` | OpenCode Go gateway hiccup on one provider |\n\n`try_lineage_swap` finds any alive agent of the same `type` in `agents.json` not already in the run, copies the prompt over, /clears the partner, nudges. Stays on subscription pricing — picks from agents you've already configured.\n\n**See what's been stuck across runs:**\n\n```bash\nwork status        # snapshot of current run: who's working, errored, popup-stuck, done\nwork status --watch # refresh every 2s\nwork permissions   # last 30 auto-approvals + repeating commands + destructive blocks\n```\n\n`work status` replaces ad-hoc `tmux capture-pane` debugging. Surfaces a one-line state per agent (WORKING / ERRORED / POPUP-STUCK / PERM-PROMPT / DONE) plus log-line counts.\n\n`work permissions` surfaces bash patterns that prompt repeatedly. Add them to your CLI config (e.g. `~/.config/opencode/opencode.json`'s `permission.bash` block) so they're allowed permanently — no orchestrator round-trip.\n\n---\n\n## 💬 Per-CLI prompt format\n\nEach CLI's TUI handles multi-line input differently, so `/work` builds a **per-CLI prompt**:\n\n| CLI | 📝 Format | 💡 Why |\n|---|---|---|\n| 🟠 Codex | Multi-paragraph (bracketed-paste safe) | Handles `[Pasted Content N chars]` blocks correctly |\n| 🔵 Gemini | **Single line** with `@/abs/path/to/pack.xml` (inline file attach) | Every `\\n` is Submit — multi-paragraph paste fragments into N separate queries |\n| 🟢 Opencode | **Single line**, plain-text path (no leading `/` or `@`) | tmux splits paste at ~1.5 KB chunks; `/` or `@` at a chunk boundary opens slash-command or agent-picker mid-paste |\n\n---\n\n## 📦 Pack truncation safety\n\nWhen a review pack exceeds `MAX_CTX_BYTES` (**800 KB** default — sized for 1M-context reviewers like Opus 4.7 / Gemini 3.1 Pro / Kimi K2.6), `work-pack-build` drops:\n\n1. Journals\n2. Memory files\n3. Diff (last resort, truncated to 50 KB)\n\nWhen the diff itself gets truncated, the pack emits:\n\n```xml\n<diff truncated=\"true\" original-bytes=\"N\" shown-bytes=\"50000\">…</diff>\n<reviewer-instruction priority=\"critical\">\n  Verify each finding against the full <code_file> blocks\n  before reporting — do NOT rely on the truncated diff alone.\n</reviewer-instruction>\n```\n\nPrevents reviewers from anchoring on the truncated diff and hallucinating findings about the cut-off portion.\n\n## 🔁 Cross-round packs are diff-only\n\nWhen a review goes to round 2 (after disagreement + revision), the pack **drops `<related-memory>` and `<related-journals>`** — they don't change between rounds and the reviewer already saw them in round 1. Typical saving: **~65% pack size reduction** on round 2+.\n\nReplaced with a stub:\n\n```xml\n<stable-context-skipped reason=\"round-2-no-change-since-round-1\"\n                        memory-files-omitted=\"6\" journals-omitted=\"3\"/>\n```\n\nArchitecture docs, code files, diff, and `<prior-rounds>` (which grows each round) are still included — all the things that matter for re-review. Reviewers are reminded in the `<ask>` block that round-2+ context was intentionally trimmed.\n\n## 🎯 Self-consistency check (anti-hallucination)\n\nFindings now require structured evidence:\n\n```xml\n<finding severity=\"critical\" category=\"bug\">\n  <claim>Unquoted variable in test causes syntax error on empty input.</claim>\n  <evidence>\n    <file-path>scripts/greet.sh</file-path>\n    <line-number>5</line-number>\n    <quoted-line><![CDATA[if [ $name == \"admin\" ]; then]]></quoted-line>\n  </evidence>\n  <suggestion>Quote it: if [ \"$name\" = \"admin\" ]; then</suggestion>\n</finding>\n```\n\n`work-converge` greps the cited file for the `<quoted-line>` (whitespace-tolerant). Findings whose quote can't be located are flagged `verified: false` — likely hallucinations. The output JSON exposes:\n\n```json\n{ \"verified_findings\": 7, \"unverified_findings\": 1,\n  \"unverified_blockers\": [ /* critical/high findings that failed verification */ ] }\n```\n\nClaude can then weight unverified findings lower or ignore them. Direct counter to the gem-1-style anchor-bias hallucination class.\n\n---\n\n## ⚙️ Install layout (manual install only)\n\n```\nskill/work*           → ~/.local/bin/\nskill/agent-status    → ~/.local/bin/\nskill/commands/work.md → ~/.claude/commands/work.md\nskill/agent-sessions/ → ~/.config/agent-sessions/\n                        (rename agents.json.template → agents.json, edit)\nskill/gemini/settings.snippet.json → merge into ~/.gemini/settings.json\nskill/gemini/GEMINI.snippet.md     → append to  ~/.gemini/GEMINI.md\nskill/gemini/policies/00-deny-destructive.toml → ~/.gemini/policies/\nskill/opencode/opencode.snippet.json → merge into ~/.config/opencode/opencode.json\nskill/examples/AGENTS.md → put in each opencode session working dir\n```\n\nMake all `skill/work*` files executable: `chmod +x ~/.local/bin/work*`\n\n---\n\n## 🔧 Customization\n\n| What | Where |\n|---|---|\n| Quorum rule | `quorum_check()` in `work-converge` |\n| Pack cap + context discovery | `MAX_CTX_BYTES` (800 KB) + discovery fns in `work-pack-build` |\n| Auto-approve patterns | `PROMPT_RE` in `work` |\n| Destructive block list | `DESTRUCTIVE_RE` in `work` |\n| Provider-error patterns | `ERROR_RE` in `work` |\n| Opencode popup patterns | `OPENCODE_POPUP_RE` in `work` |\n| Opencode peer-swap map | `OPENCODE_PARTNER` in `work` (default `kimi ⇄ deepseek`) |\n| Mode workflows | `~/.claude/commands/work.md` |\n\n---\n\n## ➕ Adding more agents\n\nEdit `~/.config/agent-sessions/agents.json`. New entries are auto-included in the LRU rotation for their lineage.\n\n- 4th Codex on a new ChatGPT account → `cdx-4` with its own `CODEX_HOME`\n- 2nd Gemini → `gem-2` (parallel review)\n- Claude reviewer in tmux → `claude-1` with `type: \"claude\"` (extend `work-converge` quorum logic)\n\n---\n\n## 🛟 Troubleshooting\n\n<details>\n<summary><strong>🪧 Reviewer hangs forever</strong></summary>\n\n- Did the findings file end with `## DONE`?\n- Is the tmux pane stuck on a permission prompt, modal popup, or \"Error from provider\" toast?\n- Check the per-run log dir `/tmp/work-<task>-r<n>-<ts>/`:\n  - `error-retries.log` — provider errors + retries + peer-swaps + escalations\n  - `popup-dismissals.log` — opencode modal popups dismissed\n  - `approvals.log` — bash prompts auto-approved (with command line)\n  - `destructive-blocks.log` — destructive commands refused\n- Run `work permissions` for the aggregate view.\n\n</details>\n\n<details>\n<summary><strong>🚫 Quorum never passes</strong></summary>\n\n- `agents.json` has at least one alive agent per lineage?\n- `agent-status` shows nobody rate-limited?\n- Look in the per-run log dir for an `<agent>-findings.md` containing `⚠️ AGENT ESCALATED TO CLAUDE` — orchestrator gave up after retries/swaps. Pick from the 3 numbered options in the stub.\n\n</details>\n\n<details>\n<summary><strong>👻 Reviewer reports findings about code that isn't in the diff</strong></summary>\n\nLikely the pack hit the diff truncation cap. Check `pack-meta.json` for `diff_bytes` — if it's `50026`, truncation fired. The reviewer should have seen a `<reviewer-instruction priority=\"critical\">` warning. If they hallucinated anyway, the model isn't following the instruction — file an issue.\n\n**Workaround:** bump `MAX_CTX_BYTES` higher in `work-pack-build`.\n\n</details>\n\n<details>\n<summary><strong>📁 Wrong file paths</strong></summary>\n\n- `~/.local/bin` in `$PATH`?\n- All scripts use `$HOME` / `Path.home()` — should work for any Unix user.\n\n</details>\n\n---\n\n## 🔒 Safety guarantees\n\n- 🛑 Destructive shell ops blocked at **3 layers**: CLI configs, runtime guard in `work`, Gemini policy file\n- 👀 Destructive prompts → agent stays **visibly stuck** so a human notices and decides\n- 🚫 **Gemini does NOT run in `yolo` mode** — `yolo` has wiped repos for others (write_file overwriting source with empty content). It runs in `auto_edit`: file-write tools auto-approved, shell prompts caught and approved by orchestrator\n- 📜 All blocks logged to `destructive-blocks.log` in the run directory\n\n---\n\n## 📜 License\n\nMIT — do whatever you want.\n\n---\n\n## 🤝 Contributing\n\nPRs welcome. Especially:\n\n- Support for more CLI types (Claude Code as a reviewer, Ollama agents, …)\n- Better permission-prompt regex patterns for new CLI versions\n- Smarter context discovery in `work-pack-build`\n\n---\n\n## 🌱 Credits\n\nBuilt incrementally over April 2026 by trial and error. The **lineage diversity** insight came from Reddit discussion about Claude blind spots in self-review loops. The **`/clear` between rounds** rule came from watching opencode CLIs go conversational mid-orchestration. The **provider-error escalation** + **kimi ⇄ deepseek peer-swap** came from real OpenCode Go gateway hiccups. The **single-line gemini prompt** came from spotting that Gemini's TUI was treating each `\\n` as Submit.\n","summary":"GodModeSkill is a Claude Code skill that transforms a single `/work` command into a rigorous, multi‑model code review pipeline, running each plan, feature, or bug‑fix through Codex, Gemini, and OpenCode before the merge gate opens. It automatically orchestrates parallel reviews, enforces a lineage quorum where each model family must agree, handles git workflow and asks for explicit sign‑off, all while remaining silent on the token count during waiting periods. The tool offers developers and open‑source maintainers a cost‑effective, diverse‑model safety net that catches subtle bugs and design drift early, improving code quality and confidence in rapid iteration.","description":"Multi-LLM cross-review workflow for Claude Code. /work orchestrates plan/implement/bug-fix with 3 different model families voting on every gate.","stars":203,"language":"Shell"},{"owner":"skydoves","repo":"compose-performance-skills","url":"https://github.com/skydoves/compose-performance-skills","readme":"# Compose Performance Skills\n\nIf you have used [`android/skills`](https://github.com/android/skills), you already know the shape of an Agent Skill: a Markdown file an agent loads on demand to perform one focused task. That library covers Android development at large. This repository goes narrow and deep on a single axis: Jetpack Compose performance. The skills here cover stability, recomposition, lazy layouts, custom modifiers, side effects, baseline profiles, R8, hot reload with Compose HotSwan, and the measurement loop that ties them together. The goal is to give a coding agent enough operational knowledge to diagnose and fix Compose performance issues without guessing, and to give the developer reading the diff a citation trail back to primary sources.\n\n## What this repo is\n\nThis is a curated library of Agent Skills focused on Jetpack Compose performance. Every skill is grounded in primary sources: Android Developers documentation, the Compose compiler, posts by Ben Trengrove, Chris Banes, Manuel Vivo, and the skydoves open source projects, and blog posts. Every API reference is pinned to a version.\n\nThe skills follow the open Agent Skills standard published at [agentskills.io](https://agentskills.io), the same `SKILL.md` format used by Anthropic's Skills API, Android Studio Agent mode, and Gemini. The library was iterated against Claude Code, where the SKILL.md files load directly; other compatible runtimes have not been individually end to end tested. \n\nNote that the [Android CLI](https://developer.android.com/tools/agents/android-cli) itself manages only Google's [first party skill catalog](https://github.com/android/skills) (`android skills add --skill <name>`); this repo is a community library outside that catalog and is loaded by agent runtimes from project local directories rather than installed via the CLI. \n\n## What is a Skill\n\nA Skill is a single Markdown file (`SKILL.md`) plus optional `references/` material that teaches an agent how to perform one focused task. It declares trigger vocabulary in YAML frontmatter and a numbered workflow in the body. The agent reads the frontmatter, decides whether the skill applies to the current task, then follows the workflow inside `SKILL.md` step by step.\n\nA skill is not documentation for humans. It is operational instructions for an LLM. That changes the writing voice: terse, imperative, RIGHT and WRONG snippet pairs, MUST and MUST NOT directives in bold caps, and a Verification checklist that proves the work was done. Prose is kept short. Code samples carry the load.\n\n## Directory layout\n\n```\ncompose-performance-skills/\n├── README.md                 # this file\n├── INDEX.md                  # symptom to skill lookup table\n├── LICENSE                   # Apache-2.0\n└── <category>/<slug>/\n    ├── SKILL.md              # the skill (required)\n    └── references/           # optional, one level deep\n        └── <topic>.md\n```\n\nConventions:\n\n- **Category**: lowercase, one of `stability`, `recomposition`, `lists`, `modifiers`, `side-effects`, `measurement`, `build`, `audit`, `hot-reload`.\n- **Slug**: gerund form, lowercase, hyphenated, max 64 chars (`diagnosing-compose-stability`, `migrating-to-modifier-node`).\n- **`SKILL.md`**: uppercase. Every skill body stays under 500 lines. Longer material moves into `references/`.\n- **`references/`**: one level deep only. Deeper nesting breaks how agents preview the files.\n- **Cross links**: relative Markdown links between skills so they resolve when the repository is browsed on GitHub.\n\nThe full authoring specification lives in [`docs/SPEC.md`](docs/SPEC.md).\n\n## How to use\n\n### Claude Code\n\nClaude Code's skill loader expects each skill at `~/.claude/skills/<slug>/SKILL.md`. This repo organizes its 26 skills under nested category folders (`<category>/<slug>/SKILL.md`) for human readability, so a plain `git clone` into `~/.claude/skills` does not surface the skills (community feedback confirmed). Use the bundled install script, which clones once to a stable location and symlinks each individual skill folder into `~/.claude/skills/`:\n\n```bash\ngit clone https://github.com/skydoves/compose-performance-skills.git \\\n  ~/.claude/skills-sources/compose-performance-skills\n\n~/.claude/skills-sources/compose-performance-skills/scripts/install-skills.sh\n```\n\nThe script is idempotent and accepts an optional custom target directory:\n\n```bash\n./scripts/install-skills.sh /path/to/agent/skills      # custom target\n./scripts/install-skills.sh --uninstall                # remove the symlinks\n```\n\nOnce the symlinks are in place, restart Claude Code. Mention a Compose performance symptom in a prompt and Claude Code matches the trigger vocabulary in the skill frontmatter, then loads the relevant `SKILL.md` automatically.\n\n### Android Studio Agent mode and Gemini\n\nThese agents discover skills at runtime by scanning project local directories per Google's [Android skills documentation](https://developer.android.com/tools/agents/android-skills). The official Android skill catalog uses a flat layout (`<slug>/SKILL.md` directly under the install directory), and Claude Code follows the same convention. Based on the Claude Code feedback above, expect Android Studio Agent mode and Gemini to require flat layout as well, so use the same install script targeting the project's agent skills directory:\n\n```bash\ncd <your-android-project>\ngit clone https://github.com/skydoves/compose-performance-skills.git \\\n  .compose-performance-skills-source\n\n./.compose-performance-skills-source/scripts/install-skills.sh .agent/skills\n```\n\nThe script symlinks each `<category>/<slug>/` folder under `.agent/skills/<slug>/` so the agent finds `SKILL.md` at the depth it expects. The source repo lives at `.compose-performance-skills-source/` (gitignore-able) so updates are a single `git pull`.\n\nOnce the symlinks are in place, the agent matches the trigger vocabulary in each skill's frontmatter against the user prompt or the open file. A slow `LazyColumn` should trigger `optimizing-lazy-layouts`, a stability question should trigger `diagnosing-compose-stability`, and so on.\n\nEnd to end behavior with Android Studio Agent mode and Gemini has not been independently verified by the author. Reports of working or broken integration are welcome at the [issue tracker](https://github.com/skydoves/compose-performance-skills/issues).\n\n### Android CLI\n\nThe [Android CLI](https://developer.android.com/tools/agents/android-cli) manages only Google's first party skill catalog. `android skills add --skill <name>` installs catalog skills such as `r8-analyzer` or `edge-to-edge` into `<project>/skills/<slug>/`. Community libraries such as this repo are outside that catalog and cannot be installed through the CLI; verified by running `android skills list --project=<path>` against a project containing this repo's nested layout, which surfaces only the official catalog. Use the Android CLI for first party skills and the manual clone above for this repo's skills; both sets coexist on the same project.\n\n### Claude.ai and the Claude API\n\nFor Claude.ai workspaces, upload the relevant `SKILL.md` files as Agent Skill attachments. For direct Anthropic API integrations, reference skills inline in the system prompt or load them through the Agent Skills file API. The skills are self contained. No external runtime is required beyond a working Compose toolchain on the developer's machine for verification steps.\n\n### Other agent runtimes\n\nAny agent runtime that can read a Markdown file and follow its instructions can use these skills. The frontmatter is plain YAML. The body is plain Markdown. Treat the `SKILL.md` files as system prompts for the task, attach the linked `references/` files when the body cites them, and let the agent run the Verification checklist before declaring the work done.\n\n## Quickstart\n\nA developer pastes the following into Claude Code:\n\n> My LazyColumn drops frames during fast scroll. Composables show in the layout inspector but recomposition counts spike on every scroll tick. Diagnose the stability issue and fix it.\n\nClaude Code matches the symptoms (`dropped frames`, `recomposition counts`, `LazyColumn`) against skill frontmatter and loads [`stability/diagnosing-compose-stability/SKILL.md`](stability/diagnosing-compose-stability/SKILL.md). That skill walks Claude through enabling Compose Compiler reports in release mode, parsing `<module>-composables.txt` for `unstable` parameters, then chains into [`stability/stabilizing-compose-types/SKILL.md`](stability/stabilizing-compose-types/SKILL.md) for the fix. The chain is explicit in each skill's body: a fix skill states which diagnostic skill should have produced the input, and a diagnostic skill names the fix skills it can hand off to. The agent does not have to infer the path.\n\n## Skill categories\n\n- **`stability/`**: diagnose and fix Compose stability. Read compiler reports, stabilize types, configure `stability_config.conf`, validate via `compose-stability-analyzer`.\n- **`recomposition/`**: eliminate unnecessary recomposition. Defer state reads to layout or draw, apply `derivedStateOf` correctly, trace recomposition with `@TraceRecomposition`, avoid `SubcomposeLayout`/`BoxWithConstraints`/`Scaffold` pitfalls that compose during the measure pass.\n- **`lists/`**: make `LazyColumn` and `LazyVerticalGrid` smooth. Stable keys, `contentType`, `LazyLayoutCacheWindow`, pausable prefetch.\n- **`modifiers/`**: author and migrate custom modifiers. `Modifier.Node` over `composed { }`, `graphicsLayer { }` for animated reads.\n- **`side-effects/`**: wire flows and effects safely. `collectAsStateWithLifecycle`, `LaunchedEffect` vs `RememberedEffect`, lambda memoization under strong skipping.\n- **`measurement/`**: measure before fixing. Macrobenchmark, Baseline Profiles, frame timing, startup metrics, release mode invariants.\n- **`build/`**: get the toolchain right. R8 in full mode, strong skipping flag, CI time stability validation.\n- **`audit/`**: orchestrator skill that sequences the others into an end to end performance audit (Measure to Diagnose to Fix to Verify).\n- **`hot-reload/`**: install Compose Hot Reload for Android, stay inside the supported change set, preserve state across reloads, and drive the loop from an AI agent over MCP.\n\nThe full symptom to skill lookup is in [INDEX.md](INDEX.md).\n\n## Scope\n\nIn scope:\n\n- Jetpack Compose for Android, on the runtime, compiler, and tooling that ship with AndroidX.\n- The Compose performance loop end to end: measurement, diagnosis, fix, and verification.\n- Build configuration where it changes Compose runtime behavior (R8 full mode, strong skipping, baseline profiles).\n\nOut of scope:\n\n- General Compose tutorials and onboarding. Use the official [Compose pathway](https://developer.android.com/courses/jetpack-compose/course) for that.\n- Compose Multiplatform specifics. Most skills apply, but iOS, Desktop, and Web targets are not validated here.\n- Non Compose Android performance work (View system, RecyclerView, app startup outside Compose).\n\n## Editorial position\n\nFive non negotiable hot takes carried across every skill. They appear in skill bodies as MUST and MUST NOT directives so the agent treats them as constraints, not advice.\n\n1. Skippability is a diagnostic, not a KPI. Do not chase 100%.\n2. A stability config is a contract with the compiler, not a magic spell. Break the contract and you silently miss recompositions.\n3. Inline composables (`Row`, `Column`, `Box`) are not restartable or skippable. Wrapping them changes recomposition scoping.\n4. `Flow` parameters are unstable. Collect them in a `ViewModel` or with `collectAsStateWithLifecycle`. Do not pass them down.\n5. Always measure in release plus R8 plus a real device. Debug builds lie.\n\n## Contributing\n\nContributions are welcome. Before opening a pull request:\n\n1. Read [`docs/SPEC.md`](docs/SPEC.md) end to end. The frontmatter template, body structure, voice, and mandatory rules apply to every skill.\n2. Pull facts and code samples from [`docs/CORPUS.md`](docs/CORPUS.md) so vocabulary stays consistent across skills.\n3. Run the post write self check. It is the gate. Frontmatter validates, body is 500 lines or fewer, at least one RIGHT and WRONG pair for code level skills, a Verification checklist, three or more authoritative reference URLs, no first person, no emojis, no time sensitive phrasing.\n4. Add the new skill to [INDEX.md](INDEX.md) under each lookup section it belongs to.\n\nOpen the pull request only after the self check passes.\n\n## Attribution\n\nFive skydoves OSS libraries seed the technical content of this repository. The skills cite them inline where their APIs are referenced.\n\n- [compose-performance](https://github.com/skydoves/compose-performance): the umbrella performance hub.\n- [compose-stability-inference](https://github.com/skydoves/compose-stability-inference): the 12 phase stability inference algorithm and bitmask encoding.\n- [compose-stability-analyzer](https://github.com/skydoves/compose-stability-analyzer): `@TraceRecomposition`, `stabilityDump`, and the `stabilityCheck` Gradle plugin.\n- [compose-stable-marker](https://github.com/skydoves/compose-stable-marker): `@Stable`, `@Immutable`, and `@StableMarker` for pure Kotlin modules without pulling `compose-runtime`.\n- [compose-effects](https://github.com/skydoves/compose-effects): `RememberedEffect`, `ViewModelStoreScope`, and other side effect primitives.\n\nAdditional primary sources are listed in [`docs/CORPUS.md`](docs/CORPUS.md).\n\n## Find this repository useful? :heart:\nSupport it by joining __[stargazers](https://github.com/skydoves/compose-performance-skills/stargazers)__ for this repository. :star: <br>\nAlso __[follow](https://github.com/skydoves)__ me for my next creations! 🤩\n\n# License\n```xml\nDesigned and developed in 2026 by skydoves (Jaewoong Eum)\n\nLicensed under the Apache License, Version 2.0 (the \"License\");\nyou may not use this file except in compliance with the License.\nYou may obtain a copy of the License at\n\n   http://www.apache.org/licenses/LICENSE-2.0\n\nUnless required by applicable law or agreed to in writing, software\ndistributed under the License is distributed on an \"AS IS\" BASIS,\nWITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.\nSee the License for the specific language governing permissions and\nlimitations under the License.\n```","summary":"Compose Performance Skills is a curated library of narrowly focused “skills” written in the Agent Skills markdown format, designed to teach large‑language‑model agents how to diagnose, fix, and explain Jetpack Compose performance issues. Each skill covers a specific topic—stability, recomposition, lazy layouts, modifiers, side‑effects, measurement loops, baseline profiles, R8, hot‑reload, and more—and is backed by primary documentation, compiler internals, and expert blog posts, with APIs pinned to exact versions. Developers building Compose apps and agents that need rapid, actionable performance guidance will benefit, as the library grants agents concrete step‑by‑step procedures and clear verification checks, while also providing developers with traceable citations for every recommended tweak.","description":"⚡️ A curated library of Agent Skills focused on Jetpack Compose performance.","stars":322,"language":"Shell"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
