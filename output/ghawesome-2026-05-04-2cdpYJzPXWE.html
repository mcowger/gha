n Design ships a stdio MCP server. Wire it into Claude Code, Codex, Cursor, VS Code, Antigravity, Zed, Windsurf, or any MCP-compatible client and the agent in another repo can read files from your local Open Design projects directly. Replaces the export-then-attach loop. When the agent calls `search_files`, `get_file`, or `get_artifact` without a project argument, the MCP defaults to whatever project (and file) you have open in Open Design right now, so prompts like *\"build this in my app\"* or *\"match these styles\"* just work.\n\n**Why MCP?** Exporting and re-attaching a zip every design iteration breaks flow. The MCP server exposes your design source directly -- tokens CSS, JSX components, entry HTML -- as a structured API the agent can query by name. The agent always sees the live file, not a stale copy from the last export.\n\nOpen **Settings → MCP server** in the Open Design app for a per-client install flow. The panel bakes the absolute path to your `node` binary and the daemon's built `cli.js` into every snippet, so it works on a fresh source clone where `od` is not on your PATH. Cursor gets a one-click deeplink; the rest get a copy-paste JSON snippet in the schema their config file expects (Claude Code includes a `claude mcp add-json` one-liner so you do not have to hand-edit `~/.claude.json`). Restart or reload your client after install for the server to show up.\n\nThe daemon must be running locally for MCP tool calls to succeed. If the agent was started before Open Design, restart the agent after Open Design is up so it can reach the live daemon. Tool calls made while the daemon is offline return a clear `\"daemon not reachable\"` error rather than a crash.\n\n**Security model.** The MCP server is read-only; it exposes file reads, file metadata, and search -- nothing that writes to disk or calls an external service. It runs as a child process of the coding agent over stdio, so any MCP client you register inherits read access to your local Open Design projects. Treat it like installing a VS Code extension: only register clients you trust. The daemon binds to `127.0.0.1` by default; LAN-wide exposure requires an explicit `OD_BIND_HOST` opt-in.\n\n## Repository structure\n\n```\nopen-design/\n├── README.md                      ← this file\n├── README.de.md                   ← Deutsch\n├── README.ru.md                   ← Русский\n├── README.zh-CN.md                ← 简体中文\n├── QUICKSTART.md                  ← run / build / deploy guide\n├── package.json                   ← pnpm workspace, single bin: od\n│\n├── apps/\n│   ├── daemon/                    ← Node + Express, the only server\n│   │   ├── src/                   ← TypeScript daemon source\n│   │   │   ├── cli.ts             ← `od` bin source, compiled to dist/cli.js\n│   │   │   ├── server.ts          ← /api/* routes (projects, chat, files, exports)\n│   │   │   ├── agents.ts          ← PATH scanner + per-CLI argv builders\n│   │   │   ├── claude-stream.ts   ← streaming JSON parser for Claude Code stdout\n│   │   │   ├── skills.ts          ← SKILL.md frontmatter loader\n│   │   │   └── db.ts              ← SQLite schema (projects/messages/templates/tabs)\n│   │   ├── sidecar/               ← tools-dev daemon sidecar wrapper\n│   │   └── tests/                 ← daemon package tests\n│   │\n│   └── web/                       ← Next.js 16 App Router + React client\n│       ├── app/                   ← App Router entrypoints\n│       ├── next.config.ts         ← dev rewrites + prod static export to out/\n│       └── src/                   ← React + TypeScript client modules\n│           ├── App.tsx            ← routing, bootstrap, settings\n│           ├── components/        ← chat, composer, picker, preview, sketch, …\n│           ├── prompts/\n│           │   ├── system.ts      ← composeSystemPrompt(base, skill, DS, metadata)\n│           │   ├── discovery.ts   ← turn-1 form + turn-2 branch + 5-dim critique\n│           │   └── directions.ts  ← 5 visual directions × OKLch palette + font stack\n│           ├── artifacts/         ← streaming <artifact> parser + manifests\n│           ├── runtime/           ← iframe srcdoc, markdown, export helpers\n│           ├── providers/         ← daemon SSE + BYOK API transports\n│           └── state/             ← config + projects (localStorage + daemon-backed)\n│\n├── e2e/                           ← Playwright UI + external integration/Vitest harness\n│\n├── packages/\n│   ├── contracts/                 ← shared web/daemon app contracts\n│   ├── sidecar-proto/             ← Open Design sidecar protocol contract\n│   ├── sidecar/                   ← generic sidecar runtime primitives\n│   └── platform/                  ← generic process/platform primitives\n│\n├── skills/                        ← 31 SKILL.md skill bundles (27 prototype + 4 deck)\n│   ├── web-prototype/             ← default for prototype mode\n│   ├── saas-landing/  dashboard/  pricing-page/  docs-page/  blog-post/\n│   ├── mobile-app/  mobile-onboarding/  gamified-app/\n│   ├── email-marketing/  social-carousel/  magazine-poster/\n│   ├── motion-frames/  sprite-animation/  digital-eguide/  dating-web/\n│   ├── critique/  tweaks/  wireframe-sketch/\n│   ├── pm-spec/  team-okrs/  meeting-notes/  kanban-board/\n│   ├── eng-runbook/  finance-report/  invoice/  hr-onboarding/\n│   ├── simple-deck/  replit-deck/  weekly-update/   ← deck mode\n│   └── guizang-ppt/               ← bundled magazine-web-ppt (default for deck)\n│       ├── SKILL.md\n│       ├── assets/template.html   ← seed\n│       └── references/{themes,layouts,components,checklist}.md\n│\n├── design-systems/                ← 72 DESIGN.md systems\n│   ├── default/                   ← Neutral Modern (starter)\n│   ├── warm-editorial/            ← Warm Editorial (starter)\n│   ├── linear-app/  vercel/  stripe/  airbnb/  notion/  cursor/  apple/  …\n│   └── README.md                  ← catalog overview\n│\n├── assets/\n│   └── frames/                    ← shared device frames (used cross-skill)\n│       ├── iphone-15-pro.html\n│       ├── android-pixel.html\n│       ├── ipad-pro.html\n│       ├── macbook.html\n│       └── browser-chrome.html\n│\n├── templates/\n│   ├── deck-framework.html        ← deck baseline (nav / counter / print)\n│   └── kami-deck.html             ← kami-flavored deck starter (parchment / ink-blue serif)\n│\n├── scripts/\n│   └── sync-design-systems.ts     ← re-import upstream awesome-design-md tarball\n│\n├── docs/\n│   ├── spec.md                    ← product spec, scenarios, differentiation\n│   ├── architecture.md            ← topologies, data flow, components\n│   ├── skills-protocol.md         ← extended SKILL.md od: frontmatter\n│   ├── agent-adapters.md          ← per-CLI detection + dispatch\n│   ├── modes.md                   ← prototype / deck / template / design-system\n│   ├── references.md              ← long-form provenance\n│   ├── roadmap.md                 ← phased delivery\n│   ├── schemas/                   ← JSON schemas\n│   └── examples/                  ← canonical artifact examples\n│\n└── .od/                           ← runtime data, gitignored, auto-created\n    ├── app.sqlite                 ← projects / conversations / messages / tabs\n    ├── projects/<id>/             ← per-project working folder (agent's cwd)\n    └── artifacts/                 ← saved one-off renders\n```\n\n## Design Systems\n\n<p align=\"center\">\n  <img src=\"docs/assets/design-systems-library.png\" alt=\"The 72 design systems library — style guide spread\" width=\"100%\" />\n</p>\n\n72 systems out of the box, each as a single [`DESIGN.md`](design-systems/README.md):\n\n<details>\n<summary><b>Full catalog</b> (click to expand)</summary>\n\n**AI & LLM** — `claude` · `cohere` · `mistral-ai` · `minimax` · `together-ai` · `replicate` · `runwayml` · `elevenlabs` · `ollama` · `x-ai`\n\n**Developer Tools** — `cursor` · `vercel` · `linear-app` · `framer` · `expo` · `clickhouse` · `mongodb` · `supabase` · `hashicorp` · `posthog` · `sentry` · `warp` · `webflow` · `sanity` · `mintlify` · `lovable` · `composio` · `opencode-ai` · `voltagent`\n\n**Productivity** — `notion` · `figma` · `miro` · `airtable` · `superhuman` · `intercom` · `zapier` · `cal` · `clay` · `raycast`\n\n**Fintech** — `stripe` · `coinbase` · `binance` · `kraken` · `mastercard` · `revolut` · `wise`\n\n**E-Commerce** — `shopify` · `airbnb` · `uber` · `nike` · `starbucks` · `pinterest`\n\n**Media** — `spotify` · `playstation` · `wired` · `theverge` · `meta`\n\n**Automotive** — `tesla` · `bmw` · `ferrari` · `lamborghini` · `bugatti` · `renault`\n\n**Other** — `apple` · `ibm` · `nvidia` · `vodafone` · `sentry` · `resend` · `spacex`\n\n**Starters** — `default` (Neutral Modern) · `warm-editorial`\n\n</details>\n\nThe product-system library is imported via [`scripts/sync-design-systems.ts`](scripts/sync-design-systems.ts) from [`VoltAgent/awesome-design-md`][acd2]. Re-run to refresh. The 57 design skills are sourced from [`bergside/awesome-design-skills`][ads] and added directly in `design-systems/`.\n\n## Visual directions\n\nWhen the user has no brand spec, the agent emits a second form with five curated directions — the OD adaptation of [`huashu-design`'s \"5 schools × 20 design philosophies\" fallback](https://github.com/alchaincyf/huashu-design#%E8%AE%BE%E8%AE%A1%E6%96%B9%E5%90%91%E9%A1%BE%E9%97%AE-fallback). Each direction is a deterministic spec — palette in OKLch, font stack, layout posture cues, references — that the agent binds verbatim into the seed template's `:root`. One radio click → a fully specified visual system. No improvisation, no AI-slop.\n\n| Direction | Mood | Refs |\n|---|---|---|\n| Editorial — Monocle / FT | Print magazine, ink + cream + warm rust | Monocle · FT Weekend · NYT Magazine |\n| Modern minimal — Linear / Vercel | Cool, structured, minimal accent | Linear · Vercel · Stripe |\n| Tech utility | Information density, monospace, terminal | Bloomberg · Bauhaus tools |\n| Brutalist | Raw, oversized type, no shadows, harsh accents | Bloomberg Businessweek · Achtung |\n| Soft warm | Generous, low contrast, peachy neutrals | Notion marketing · Apple Health |\n\nFull spec → [`apps/web/src/prompts/directions.ts`](apps/web/src/prompts/directions.ts).\n\n## Media generation\n\nOD doesn't stop at code. The same chat surface that produces `<artifact>` HTML also drives **image**, **video**, and **audio** generation, with model adapters wired into the daemon's media pipeline ([`apps/daemon/src/media-models.ts`](apps/daemon/src/media-models.ts), [`apps/web/src/media/models.ts`](apps/web/src/media/models.ts)). Every render lands as a real file in the project workspace — `.png` for image, `.mp4` for video — and shows up as a download chip when the turn ends.\n\nThree model families carry the load today:\n\n| Surface | Model | Provider | What it's for |\n|---|---|---|---|\n| **Image** | `gpt-image-2` | Azure / OpenAI | Posters, profile avatars, illustrated maps, infographics, magazine-style social cards, photo restoration, exploded-view product art |\n| **Video** | `seedance-2.0` | ByteDance Volcengine | 15s cinematic t2v + i2v with audio — narrative shorts, character close-ups, product films, MV-style choreography |\n| **Video** | `hyperframes-html` | [HeyGen / OSS](https://github.com/heygen-com/hyperframes) | HTML→MP4 motion graphics — product reveals, kinetic typography, data charts, social overlays, logo outros, TikTok-style verticals with karaoke captions |\n\nA growing **prompt gallery** at [`prompt-templates/`](prompt-templates/) ships **93 ready-to-replicate prompts** — 43 image (`prompt-templates/image/*.json`), 39 Seedance (`prompt-templates/video/*.json` excluding `hyperframes-*`), 11 HyperFrames (`prompt-templates/video/hyperframes-*.json`). Each carries a preview thumbnail, the prompt body verbatim, the target model, the aspect ratio, and a `source` block for license + attribution. The daemon serves them at `GET /api/prompt-templates`, the web app surfaces them as a card grid in the **Image templates** and **Video templates** tabs of the entry view; one click drops a prompt into the composer with the right model preselected.\n\n### gpt-image-2 — image gallery (sample of 43)\n\n<table>\n<tr>\n<td width=\"20%\" valign=\"top\"><img src=\"https://cms-assets.youmind.com/media/1776661968404_8a5flm_HGQc_KOaMAA2vt0.jpg\" alt=\"3D Stone Staircase Evolution\" /><br/><sub><b>3D Stone Staircase Evolution Infographic</b><br/>3-step infographic, hewn-stone aesthetic</sub></td>\n<td width=\"20%\" valign=\"top\"><img src=\"https://cms-assets.youmind.com/media/1776662673014_nf0taw_HGRMNDybsAAGG88.jpg\" alt=\"Illustrated City Food Map\" /><br/><sub><b>Illustrated City Food Map</b><br/>Editorial hand-illustrated travel poster</sub></td>\n<td width=\"20%\" valign=\"top\"><img src=\"https://cms-assets.youmind.com/media/1777453149026_gd2k50_HHCSvymboAAVscc.jpg\" alt=\"Cinematic Elevator Scene\" /><br/><sub><b>Cinematic Elevator Scene</b><br/>Single-frame editorial fashion still</sub></td>\n<td width=\"20%\" valign=\"top\"><img src=\"https://cms-assets.youmind.com/media/1777453164993_mt5b69_HHDoWfeaUAEA6Vt.jpg\" alt=\"Cyberpunk Anime Portrait\" /><br/><sub><b>Cyberpunk Anime Portrait</b><br/>Profile avatar — neon face text</sub></td>\n<td width=\"20%\" valign=\"top\"><img src=\"https://cms-assets.youmind.com/media/1777453184257_vb9hvl_HG9tAkOa4AAuRrn.jpg\" alt=\"Glamorous Woman in Black\" /><br/><sub><b>Glamorous Woman in Black Portrait</b><br/>Editorial studio portrait</sub></td>\n</tr>\n</table>\n\nFull set → [`prompt-templates/image/`](prompt-templates/image/). Sources: most pull from [`YouMind-OpenLab/awesome-gpt-image-prompts`](https://github.com/YouMind-OpenLab/awesome-gpt-image-prompts) (CC-BY-4.0) with author attribution preserved per template.\n\n### Seedance 2.0 — video gallery (sample of 39)\n\n<table>\n<tr>\n<td width=\"20%\" valign=\"top\"><a href=\"https://customer-qs6wnyfuv0gcybzj.cloudflarestream.com/c4515f4f328539e1ded2cc32f4ce63e7/downloads/default.mp4\"><img src=\"https://customer-qs6wnyfuv0gcybzj.cloudflarestream.com/c4515f4f328539e1ded2cc32f4ce63e7/thumbnails/thumbnail.jpg\" alt=\"Music Podcast Guitar\" /></a><br/><sub><b>Music Podcast & Guitar Technique</b><br/>4K cinematic studio film</sub></td>\n<td width=\"20%\" valign=\"top\"><a href=\"https://customer-qs6wnyfuv0gcybzj.cloudflarestream.com/4a47ba646e7cedd79363c861864b8714/downloads/default.mp4\"><img src=\"https://customer-qs6wnyfuv0gcybzj.cloudflarestream.com/4a47ba646e7cedd79363c861864b8714/thumbnails/thumbnail.jpg\" alt=\"Emotional Face\" /></a><br/><sub><b>Emotional Face Close-up</b><br/>Cinematic micro-expression study</sub></td>\n<td width=\"20%\" valign=\"top\"><a href=\"https://customer-qs6wnyfuv0gcybzj.cloudflarestream.com/7e8983364a95fe333f0f88bd1085a0e8/downloads/default.mp4\"><img src=\"https://customer-qs6wnyfuv0gcybzj.cloudflarestream.com/7e8983364a95fe333f0f88bd1085a0e8/thumbnails/thumbnail.jpg\" alt=\"Luxury Supercar\" /></a><br/><sub><b>Luxury Supercar Cinematic</b><br/>Narrative product film</sub></td>\n<td width=\"20%\" valign=\"top\"><a href=\"https://customer-qs6wnyfuv0gcybzj.cloudflarestream.com/0279a674ce138ab5a0a6f020a7273d89/downloads/default.mp4\"><img src=\"https://customer-qs6wnyfuv0gcybzj.cloudflarestream.com/0279a674ce138ab5a0a6f020a7273d89/thumbnails/thumbnail.jpg\" alt=\"Forbidden City Cat\" /></a><br/><sub><b>Forbidden City Cat Satire</b><br/>Stylised satire short</sub></td>\n<td width=\"20%\" valign=\"top\"><a href=\"https://github.com/YouMind-OpenLab/awesome-seedance-2-prompts/releases/download/videos/1402.mp4\"><img src=\"https://customer-qs6wnyfuv0gcybzj.cloudflarestream.com/7f63ad253175a9ad1dac53de490efac8/thumbnails/thumbnail.jpg\" alt=\"Japanese Romance\" /></a><br/><sub><b>Japanese Romance Short Film</b><br/>15s Seedance 2.0 narrative</sub></td>\n</tr>\n</table>\n\nClick any thumbnail to play the actual rendered MP4. Full set → [`prompt-templates/video/`](prompt-templates/video/) (the `*-seedance-*` and Cinematic-tagged entries). Sources: [`YouMind-OpenLab/awesome-seedance-2-prompts`](https://github.com/YouMind-OpenLab/awesome-seedance-2-prompts) (CC-BY-4.0) with original tweet links and author handles preserved.\n\n### HyperFrames — HTML→MP4 motion graphics (11 ready-to-replicate templates)\n\n[**`heygen-com/hyperframes`**](https://github.com/heygen-com/hyperframes) is HeyGen's open-source agent-native video framework — you (or the agent) write HTML + CSS + GSAP, HyperFrames renders it to a deterministic MP4 via headless Chrome + FFmpeg. Open Design ships HyperFrames as a first-class video model (`hyperframes-html`) wired into the daemon dispatch, plus the `skills/hyperframes/` skill that teaches the agent the timeline contract, scene-transition rules, audio-reactive patterns, captions/TTS, and the catalog blocks (`npx hyperframes add <slug>`).\n\nEleven hyperframes prompts ship under [`prompt-templates/video/hyperframes-*.json`](prompt-templates/video/), each one a concrete brief that produces a specific archetype:\n\n<table>\n<tr>\n<td width=\"25%\" valign=\"top\"><a href=\"prompt-templates/video/hyperframes-product-reveal-minimal.json\"><img src=\"https://static.heygen.ai/hyperframes-oss/docs/images/catalog/blocks/logo-outro.png\" alt=\"Product reveal\" /></a><br/><sub><b>5s minimal product reveal</b> · 16:9 · push-in title card with shader transition</sub></td>\n<td width=\"25%\" valign=\"top\"><a href=\"prompt-templates/video/hyperframes-saas-product-promo-30s.json\"><img src=\"https://static.heygen.ai/hyperframes-oss/docs/images/catalog/blocks/app-showcase.png\" alt=\"SaaS promo\" /></a><br/><sub><b>30s SaaS product promo</b> · 16:9 · Linear/ClickUp-style with UI 3D reveals</sub></td>\n<td width=\"25%\" valign=\"top\"><a href=\"prompt-templates/video/hyperframes-tiktok-karaoke-talking-head.json\"><img src=\"https://static.heygen.ai/hyperframes-oss/docs/images/catalog/blocks/tiktok-follow.png\" alt=\"TikTok karaoke\" /></a><br/><sub><b>TikTok karaoke talking-head</b> · 9:16 · TTS + word-synced captions</sub></td>\n<td width=\"25%\" valign=\"top\"><a href=\"prompt-templates/video/hyperframes-brand-sizzle-reel.json\"><img src=\"https://static.heygen.ai/hyperframes-oss/docs/images/catalog/blocks/logo-outro.png\" alt=\"Brand sizzle\" /></a><br/><sub><b>30s brand sizzle reel</b> · 16:9 · beat-synced kinetic typography, audio-reactive</sub></td>\n</tr>\n<tr>\n<td width=\"25%\" valign=\"top\"><a href=\"prompt-templates/video/hyperframes-data-bar-chart-race.json\"><img src=\"https://static.heygen.ai/hyperframes-oss/docs/images/catalog/blocks/data-chart.png\" alt=\"Data chart\" /></a><br/><sub><b>Animated bar-chart race</b> · 16:9 · NYT-style data infographic</sub></td>\n<td width=\"25%\" valign=\"top\"><a href=\"prompt-templates/video/hyperframes-flight-map-route.json\"><img src=\"https://static.heygen.ai/hyperframes-oss/docs/images/catalog/blocks/nyc-paris-flight.png\" alt=\"Flight map\" /></a><br/><sub><b>Flight map (origin → dest)</b> · 16:9 · Apple-style cinematic route reveal</sub></td>\n<td width=\"25%\" valign=\"top\"><a href=\"prompt-templates/video/hyperframes-logo-outro-cinematic.json\"><img src=\"https://static.heygen.ai/hyperframes-oss/docs/images/catalog/blocks/logo-outro.png\" alt=\"Logo outro\" /></a><br/><sub><b>4s cinematic logo outro</b> · 16:9 · piece-by-piece assembly + bloom</sub></td>\n<td width=\"25%\" valign=\"top\"><a href=\"prompt-templates/video/hyperframes-money-counter-hype.json\"><img src=\"https://static.heygen.ai/hyperframes-oss/docs/images/catalog/blocks/apple-money-count.png\" alt=\"Money counter\" /></a><br/><sub><b>$0 → $10K money counter</b> · 9:16 · Apple-style hype with green flash + burst</sub></td>\n</tr>\n<tr>\n<td width=\"25%\" valign=\"top\"><a href=\"prompt-templates/video/hyperframes-app-showcase-three-phones.json\"><img src=\"https://static.heygen.ai/hyperframes-oss/docs/images/catalog/blocks/app-showcase.png\" alt=\"App showcase\" /></a><br/><sub><b>3-phone app showcase</b> · 16:9 · floating phones with feature callouts</sub></td>\n<td width=\"25%\" valign=\"top\"><a href=\"prompt-templates/video/hyperframes-social-overlay-stack.json\"><img src=\"https://static.heygen.ai/hyperframes-oss/docs/images/catalog/blocks/instagram-follow.png\" alt=\"Social overlay\" /></a><br/><sub><b>Social overlay stack</b> · 9:16 · X · Reddit · Spotify · Instagram in sequence</sub></td>\n<td width=\"25%\" valign=\"top\"><a href=\"prompt-templates/video/hyperframes-website-to-video-promo.json\"><img src=\"https://static.heygen.ai/hyperframes-oss/docs/images/catalog/blocks/instagram-follow.png\" alt=\"Website to video\" /></a><br/><sub><b>Website-to-video pipeline</b> · 16:9 · captures site at 3 viewports + transitions</sub></td>\n<td width=\"25%\" valign=\"top\">&nbsp;</td>\n</tr>\n</table>\n\nPattern is the same as the rest: pick a template, edit the brief, send. The agent reads the bundled `skills/hyperframes/SKILL.md` (which carries the OD-specific render workflow — composition source files into a `.hyperframes-cache/` so they don't clutter the file workspace, daemon dispatches `npx hyperframes render` to dodge the macOS sandbox-exec / Puppeteer hang, only the final `.mp4` lands as a project chip), authors the composition, and ships an MP4. Catalog block thumbnails © HeyGen, served from their CDN; the OSS framework itself is Apache-2.0.\n\n> **Also wired but not surfaced as templates yet:** Kling 2.0 / 1.6 / 1.5, Veo 3 / Veo 2, Sora 2 / Sora 2-Pro (via Fal), MiniMax video-01 — all live in `VIDEO_MODELS` ([`apps/web/src/media/models.ts`](apps/web/src/media/models.ts)). Suno v5 / v4.5, Udio v2, Lyria 2 (music) and gpt-4o-mini-tts, MiniMax TTS (speech) cover the audio surface. Templates for these are open contributions — drop a JSON into `prompt-templates/video/` or `prompt-templates/audio/` and it shows up in the picker.\n\n## Beyond chat — what else ships\n\nThe chat / artifact loop gets the spotlight, but a handful of less-visible capabilities are already wired and worth knowing before you compare OD to anything else:\n\n- **Claude Design ZIP import.** Drop an export from claude.ai onto the welcome dialog. `POST /api/import/claude-design` extracts it into a real `.od/projects/<id>/`, opens the entry file as a tab, and stages a continue-where-Anthropic-left-off prompt for your local agent. No re-prompting, no \"ask the model to re-create what we just had\". ([`apps/daemon/src/server.ts`](apps/daemon/src/server.ts) — `/api/import/claude-design`)\n- **Multi-provider BYOK proxy.** `POST /api/proxy/{anthropic,openai,azure,google}/stream` takes `{ baseUrl, apiKey, model, messages }`, builds the provider-specific upstream request, normalizes SSE chunks into `delta/end/error`, and rejects loopback / link-local / RFC1918 destinations to head off SSRF. OpenAI-compatible covers OpenAI, Azure AI Foundry `/openai/v1`, DeepSeek, Groq, MiMo, OpenRouter, and self-hosted vLLM; Azure OpenAI adds deployment URL + `api-version`; Google uses Gemini `:streamGenerateContent`.\n- **User-saved templates.** Once you like a render, `POST /api/templates` snapshots the HTML + metadata into the SQLite `templates` table. The next project picks it from a \"your templates\" row in the picker — same surface as the shipped 31, but yours.\n- **Tab persistence.** Every project remembers its open files and active tab in the `tabs` table. Reopen the project tomorrow and the workspace looks exactly the way you left it.\n- **Artifact lint API.** `POST /api/artifacts/lint` runs structural checks on a generated artifact (broken `<artifact>` framing, missing required side files, stale palette tokens) and returns findings the agent can read back into its next turn. The five-dim self-critique uses this to ground its score in real evidence, not vibes.\n- **Sidecar protocol + desktop automation.** Daemon, web, and desktop processes carry typed five-field stamps (`app · mode · namespace · ipc · source`) and expose a JSON-RPC IPC channel at `/tmp/open-design/ipc/<namespace>/<app>.sock`. `tools-dev inspect desktop status \\| eval \\| screenshot` drives that channel, so headless E2E works against a real Electron shell without bespoke harnesses ([`packages/sidecar-proto/`](packages/sidecar-proto/), [`apps/desktop/src/main/`](apps/desktop/src/main/)).\n- **Windows-friendly spawning.** Every adapter that would otherwise blow `CreateProcess`'s ~32 KB argv limit on long composed prompts (Codex, Gemini, OpenCode, Cursor Agent, Qwen, Pi) feeds the prompt over stdin instead. Claude Code and Copilot keep `-p`; the daemon falls back to a temp prompt-file when even that overflows.\n- **Per-namespace runtime data.** `OD_DATA_DIR` and `--namespace` give you fully isolated `.od/`-style trees, so Playwright, beta channels, and your real projects never share a SQLite file.\n\n## Anti-AI-slop machinery\n\nThe whole machinery below is the [`huashu-design`](https://github.com/alchaincyf/huashu-design) playbook, ported into OD's prompt-stack and made enforceable per-skill via the side-file pre-flight. Read [`apps/web/src/prompts/discovery.ts`](apps/web/src/prompts/discovery.ts) for the live wording:\n\n- **Question form first.** Turn 1 is `<question-form>` only — no thinking, no tools, no narration. The user chooses defaults at radio speed.\n- **Brand-spec extraction.** When the user attaches a screenshot or URL, the agent runs a five-step protocol (locate · download · grep hex · codify `brand-spec.md` · vocalise) before writing CSS. **Never guesses brand colors from memory.**\n- **Five-dim critique.** Before emitting `<artifact>`, the agent silently scores its output 1–5 across philosophy / hierarchy / execution / specificity / restraint. Anything under 3/5 is a regression — fix and rescore. Two passes is normal.\n- **P0/P1/P2 checklist.** Every skill ships a `references/checklist.md` with hard P0 gates. The agent must pass P0 before emitting.\n- **Slop blacklist.** Aggressive purple gradients, generic emoji icons, rounded card with left-border accent, hand-drawn SVG humans, Inter as a *display* face, invented metrics — explicitly forbidden in the prompt.\n- **Honest placeholders > fake stats.** When the agent doesn't have a real number, it writes `—` or a labelled grey block, not \"10× faster\".\n\n## Comparison\n\n| Axis | [Claude Design][cd] (Anthropic) | [Open CoDesign][ocod] | **Open Design** |\n|---|---|---|---|\n| License | Closed | MIT | **Apache-2.0** |\n| Form factor | Web (claude.ai) | Desktop (Electron) | **Web app + local daemon** |\n| Deployable on Vercel | ❌ | ❌ | **✅** |\n| Agent runtime | Bundled (Opus 4.7) | Bundled ([`pi-ai`][piai]) | **Delegated to user's existing CLI** |\n| Skills | Proprietary | 12 custom TS modules + `SKILL.md` | **31 file-based [`SKILL.md`][skill] bundles, droppable** |\n| Design system | Proprietary | `DESIGN.md` (v0.2 roadmap) | **`DESIGN.md` × 129 systems shipped** |\n| Provider flexibility | Anthropic only | 7+ via [`pi-ai`][piai] | **12 CLI adapters + OpenAI-compatible BYOK proxy** |\n| Init question form | ❌ | ❌ | **✅ Hard rule, turn 1** |\n| Direction picker | ❌ | ❌ | **✅ 5 deterministic directions** |\n| Live todo progress + tool stream | ❌ | ✅ | **✅** (UX pattern from open-codesign) |\n| Sandboxed iframe preview | ❌ | ✅ | **✅** (pattern from open-codesign) |\n| Claude Design ZIP import | n/a | ❌ | **✅ `POST /api/import/claude-design` — keep editing where Anthropic left off** |\n| Comment-mode surgical edits | ❌ | ✅ | 🟡 partial — preview element comments + chat attachments; surgical patch reliability still in progress |\n| AI-emitted tweaks panel | ❌ | ✅ | 🚧 roadmap — dedicated chat-side panel UX is not implemented yet |\n| Filesystem-grade workspace | ❌ | partial (Electron sandbox) | **✅ Real cwd, real tools, persisted SQLite (projects · conversations · messages · tabs · templates)** |\n| 5-dim self-critique | ❌ | ❌ | **✅ Pre-emit gate** |\n| Artifact lint | ❌ | ❌ | **✅ `POST /api/artifacts/lint` — findings fed back to the agent** |\n| Sidecar IPC + headless desktop | ❌ | ❌ | **✅ Stamped processes + `tools-dev inspect desktop status \\| eval \\| screenshot`** |\n| Export formats | Limited | HTML / PDF / PPTX / ZIP / Markdown | **HTML / PDF / PPTX (agent-driven) / ZIP / Markdown** |\n| PPT skill reuse | N/A | Built-in | **[`guizang-ppt-skill`][guizang] drops in (default for deck mode)** |\n| Minimum billing | Pro / Max / Team | BYOK | **BYOK — paste any OpenAI-compatible `baseUrl`** |\n\n[cd]: https://x.com/claudeai/status/2045156267690213649\n[ocod]: https://github.com/OpenCoworkAI/open-codesign\n[piai]: https://github.com/mariozechner/pi-ai\n[acd]: https://github.com/VoltAgent/awesome-claude-design\n[guizang]: https://github.com/op7418/guizang-ppt-skill\n[skill]: https://docs.anthropic.com/en/docs/claude-code/skills\n\n## Supported coding agents\n\nAuto-detected from `PATH` on daemon boot. No config required. Streaming dispatch lives in [`apps/daemon/src/agents.ts`](apps/daemon/src/agents.ts) (`AGENT_DEFS`); per-CLI parsers live alongside it. Models are populated either by probing `<bin> --list-models` / `<bin> models` / ACP handshake, or from a curated fallback list when the CLI doesn't expose a list.\n\n| Agent | Bin | Stream format | Argv shape (composed prompt path) |\n|---|---|---|---|\n| [Claude Code](https://docs.anthropic.com/en/docs/claude-code) | `claude` | `claude-stream-json` (typed events) | `claude -p <prompt> --output-format stream-json --verbose [--include-partial-messages] [--add-dir …] --permission-mode bypassPermissions` |\n| [Codex CLI](https://github.com/openai/codex) | `codex` | `json-event-stream` + `codex` parser | `codex exec --json --skip-git-repo-check --full-auto [-C cwd] [--model …] [-c model_reasoning_effort=…] -` (prompt on stdin) |\n| Devin for Terminal | `devin` | `acp-json-rpc` | `devin --permission-mode dangerous --respect-workspace-trust false acp` |\n| [Gemini CLI](https://github.com/google-gemini/gemini-cli) | `gemini` | `json-event-stream` + `gemini` parser | `GEMINI_CLI_TRUST_WORKSPACE=true gemini --output-format stream-json --yolo [--model …]` (prompt on stdin) |\n| [OpenCode](https://opencode.ai/) | `opencode` | `json-event-stream` + `opencode` parser | `opencode run --format json --dangerously-skip-permissions [--model …] -` (prompt on stdin) |\n| [Cursor Agent](https://www.cursor.com/cli) | `cursor-agent` | `json-event-stream` + `cursor-agent` parser | `cursor-agent --print --output-format stream-json --stream-partial-output --force --trust [--workspace cwd] [--model …] -` (prompt on stdin) |\n| [Qwen Code](https://github.com/QwenLM/qwen-code) | `qwen` | `plain` (raw stdout chunks) | `qwen --yolo [--model …] -` (prompt on stdin) |\n| [GitHub Copilot CLI](https://github.com/features/copilot/cli) | `copilot` | `copilot-stream-json` (typed events) | `copilot -p <prompt> --allow-all-tools --output-format json [--model …] [--add-dir …]` |\n| [Hermes](https://github.com/eqlabs/hermes) | `hermes` | `acp-json-rpc` (Agent Client Protocol) | `hermes acp --accept-hooks` |\n| Kimi CLI | `kimi` | `acp-json-rpc` | `kimi acp` |\n| [Kiro CLI](https://kiro.dev) | `kiro-cli` | `acp-json-rpc` | `kiro-cli acp` |\n| [Mistral Vibe CLI](https://github.com/mistralai/mistral-vibe) | `vibe-acp` | `acp-json-rpc` | `vibe-acp` |\n| [Pi](https://github.com/mariozechner/pi-ai) | `pi` | `pi-rpc` (stdio JSON-RPC) | `pi --mode rpc --no-session [--model …] [--thinking …]` (prompt sent as RPC `prompt` command) |\n| **Multi-provider BYOK** | n/a | SSE normalization | `POST /api/proxy/{provider}/stream` → Anthropic / OpenAI-compatible / Azure OpenAI / Gemini; SSRF-guarded against loopback / link-local / RFC1918 |\n\nAdding a new CLI is one entry in [`apps/daemon/src/agents.ts`](apps/daemon/src/agents.ts). Streaming format is one of `claude-stream-json`, `copilot-stream-json`, `json-event-stream` (with a per-CLI `eventParser`), `acp-json-rpc`, `pi-rpc`, or `plain`.\n\n## References & lineage\n\nEvery external project this repo borrows from. Each link goes to the source so you can verify the provenance.\n\n| Project | Role here |\n|---|---|\n| [`Claude Design`][cd] | The closed-source product this repo is the open-source alternative to. |\n| [**`alchaincyf/huashu-design`**](https://github.com/alchaincyf/huashu-design) | The design-philosophy core. Junior-Designer workflow, the 5-step brand-asset protocol, anti-AI-slop checklist, 5-dimensional self-critique, and the \"5 schools × 20 design philosophies\" library behind our direction picker — all distilled into [`apps/web/src/prompts/discovery.ts`](apps/web/src/prompts/discovery.ts) and [`apps/web/src/prompts/directions.ts`](apps/web/src/prompts/directions.ts). |\n| [**`op7418/guizang-ppt-skill`**][guizang] | Magazine-web-PPT skill bundled verbatim under [`skills/guizang-ppt/`](skills/guizang-ppt/) with original LICENSE preserved. Default for deck mode. P0/P1/P2 checklist culture borrowed for every other skill. |\n| [**`multica-ai/multica`**](https://github.com/multica-ai/multica) | The daemon + adapter architecture. PATH-scan agent detection, local daemon as the only privileged process, agent-as-teammate worldview. We adopt the model; we do not vendor the code. |\n| [**`OpenCoworkAI/open-codesign`**][ocod] | The first open-source Claude-Design alternative and our closest peer. UX patterns adopted: streaming-artifact loop, sandboxed-iframe preview (vendored React 18 + Babel), live agent panel (todos + tool calls + interruptible), five-format export list (HTML/PDF/PPTX/ZIP/Markdown), local-first storage hub, `SKILL.md` taste-injection, and the first pass of comment-mode preview annotations. UX patterns still on our roadmap: full surgical-edit reliability and AI-emitted tweaks panel. **We deliberately do not vendor [`pi-ai`][piai]** — open-codesign bundles it as the agent runtime; we delegate to whichever CLI the user already has. |\n| [`VoltAgent/awesome-claude-design`][acd] / [`awesome-design-md`][acd2] | Source of the 9-section `DESIGN.md` schema and 70 product systems imported via [`scripts/sync-design-systems.ts`](scripts/sync-design-systems.ts). |\n| [`bergside/awesome-design-skills`][ads] | Source of 57 design skills added directly as normalized `DESIGN.md` files under `design-systems/`. |\n| [`farion1231/cc-switch`](https://github.com/farion1231/cc-switch) | Inspiration for symlink-based skill distribution across multiple agent CLIs. |\n| [Claude Code skills][skill] | The `SKILL.md` convention adopted verbatim — any Claude Code skill drops into `skills/` and is picked up by the daemon. |\n\nLong-form provenance write-up — what we take from each, what we deliberately don't — lives at [`docs/references.md`](docs/references.md).\n\n## Roadmap\n\n- [x] Daemon + agent detection (12 CLI adapters) + skill registry + design-system catalog\n- [x] Web app + chat + question form + 5-direction picker + todo progress + sandboxed preview\n- [x] 31 skills + 72 design systems + 5 visual directions + 5 device frames\n- [x] SQLite-backed projects · conversations · messages · tabs · templates\n- [x] Multi-provider BYOK proxy (`/api/proxy/{anthropic,openai,azure,google}/stream`) with SSRF guard\n- [x] Claude Design ZIP import (`/api/import/claude-design`)\n- [x] Sidecar protocol + Electron desktop with IPC automation (STATUS / EVAL / SCREENSHOT / CONSOLE / CLICK / SHUTDOWN)\n- [x] Artifact lint API + 5-dim self-critique pre-emit gate\n- [ ] Comment-mode surgical edits — partial shipped: preview element comments and chat attachments; reliable targeted patching remains in progress\n- [ ] AI-emitted tweaks panel UX — not implemented yet\n- [ ] Vercel + tunnel deployment recipe (Topology B)\n- [ ] One-command `npx od init` to scaffold a project with `DESIGN.md`\n- [ ] Skill marketplace (`od skills install <github-repo>`) and `od skill add | list | remove | test` CLI surface (drafted in [`docs/skills-protocol.md`](docs/skills-protocol.md), implementation pending)\n- [ ] Packaged Electron build out of `apps/packaged/`\n\nPhased delivery → [`docs/roadmap.md`](docs/roadmap.md).\n\n## Status\n\nThis is an early implementation — the closed loop (detect → pick skill + design system → chat → parse `<artifact>` → preview → save) runs end-to-end. The prompt stack and skill library are where most of the value lives, and they're stable. The component-level UI is shipping daily.\n\n## Star us\n\n<p align=\"center\">\n  <a href=\"https://github.com/nexu-io/open-design\"><img src=\"docs/assets/star-us.png\" alt=\"Star Open Design on GitHub — github.com/nexu-io/open-design\" width=\"100%\" /></a>\n</p>\n\nIf this saved you thirty minutes — give it a ★. Stars don't pay rent, but they tell the next designer, agent, and contributor that this experiment is worth their attention. One click, three seconds, real signal: [github.com/nexu-io/open-design](https://github.com/nexu-io/open-design).\n\n## Contributing\n\nIssues, PRs, new skills, and new design systems are all welcome. The highest-leverage contributions are usually one folder, one Markdown file, or one PR-sized adapter:\n\n- **Add a skill** — drop a folder into [`skills/`](skills/) following the [`SKILL.md`][skill] convention.\n- **Add a design system** — drop a `DESIGN.md` into [`design-systems/<brand>/`](design-systems/) using the 9-section schema.\n- **Wire up a new coding-agent CLI** — one entry in [`apps/daemon/src/agents.ts`](apps/daemon/src/agents.ts).\n\nFull walkthrough, bar-for-merging, code style, and what we don't accept → [`CONTRIBUTING.md`](CONTRIBUTING.md) ([Deutsch](CONTRIBUTING.de.md), [Français](CONTRIBUTING.fr.md), [简体中文](CONTRIBUTING.zh-CN.md)).\n\n## Contributors\n\nThanks to everyone who has helped move Open Design forward — through code, docs, feedback, new skills, new design systems, or even a sharp issue. Every real contribution counts, and the wall below is the easiest way to say so out loud.\n\n<a href=\"https://github.com/nexu-io/open-design/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=nexu-io/open-design&cache_bust=2026-05-04\" alt=\"Open Design contributors\" />\n</a>\n\nIf you've shipped your first PR — welcome. The [`good-first-issue`](https://github.com/nexu-io/open-design/labels/good-first-issue) label is the entry point.\n\n## Repository activity\n\n<picture>\n  <img alt=\"Open Design — repository metrics\" src=\"docs/assets/github-metrics.svg\" />\n</picture>\n\nThe SVG above is regenerated daily by [`.github/workflows/metrics.yml`](.github/workflows/metrics.yml) using [`lowlighter/metrics`](https://github.com/lowlighter/metrics). Trigger a manual refresh from the **Actions** tab if you want it sooner; for richer plugins (traffic, follow-up time), add a `METRICS_TOKEN` repository secret with a fine-grained PAT.\n\n## Star History\n\n<a href=\"https://star-history.com/#nexu-io/open-design&Date\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=nexu-io/open-design&type=Date&theme=dark&cache_bust=2026-05-04\" />\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=nexu-io/open-design&type=Date&cache_bust=2026-05-04\" />\n    <img alt=\"Open Design star history\" src=\"https://api.star-history.com/svg?repos=nexu-io/open-design&type=Date&cache_bust=2026-05-04\" />\n  </picture>\n</a>\n\nIf the curve bends up, that's the signal we look for. ★ this repo to push it.\n\n## Credits\n\nThe HTML PPT Studio family of skills — the master [`skills/html-ppt/`](skills/html-ppt/) and the per-template wrappers under [`skills/html-ppt-*/`](skills/) (15 full-deck templates, 36 themes, 31 single-page layouts, 27 CSS animations + 20 canvas FX, the keyboard runtime, and the magnetic-card presenter mode) — are integrated from the open-source project [`lewislulu/html-ppt-skill`](https://github.com/lewislulu/html-ppt-skill) (MIT). The upstream LICENSE ships in-tree at [`skills/html-ppt/LICENSE`](skills/html-ppt/LICENSE) and authorship credit goes to [@lewislulu](https://github.com/lewislulu). Each per-template Examples card (`html-ppt-pitch-deck`, `html-ppt-tech-sharing`, `html-ppt-presenter-mode`, `html-ppt-xhs-post`, …) delegates authoring guidance to the master skill so the upstream's prompt → output behavior is preserved end-to-end when you click **Use this prompt**.\n\nThe magazine / horizontal-swipe deck flow under [`skills/guizang-ppt/`](skills/guizang-ppt/) is integrated from [`op7418/guizang-ppt-skill`](https://github.com/op7418/guizang-ppt-skill) (MIT). Authorship credit goes to [@op7418](https://github.com/op7418).\n\n## License\n\nApache-2.0. The bundled `skills/guizang-ppt/` retains its original [LICENSE](skills/guizang-ppt/LICENSE) (MIT) and authorship attribution to [op7418](https://github.com/op7418). The bundled `skills/html-ppt/` retains its original [LICENSE](skills/html-ppt/LICENSE) (MIT) and authorship attribution to [lewislulu](https://github.com/lewislulu).\n","summary":"Open Design is an open‑source, local‑first alternative to Claude Design that turns any coding‑agent CLI into a full‑featured design engine. By auto‑detecting 13 popular LLM‑based agents (and allowing a BYOK proxy) it stitches together 31 composable “skills” and 72 brand‑grade design systems to produce design artifacts, UI components, and documentation—all without cloud dependency. The tool runs entirely on your machine or can be deployed to the web, making it ideal for designers, front‑end developers, and teams that need a flexible, self‑hosted AI‑powered design workflow.","description":"🎨 Local-first, open-source alternative to Anthropic's Claude Design. ⚡ 19 Skills · ✨ 71 brand-grade Design Systems 🖼 Generate web · desktop · mobile prototypes · slides · images · videos · HyperFrames 📦 Sandboxed preview · HTML/PDF/PPTX/MP4 export 🤖 Runs on Claude Code / Codex / Cursor / Gemini / OpenCode / Qwen / Copilot / Hermes / Kimi CLI.","stars":23201,"language":"TypeScript"},{"owner":"motiful","repo":"cc-gateway","url":"https://github.com/motiful/cc-gateway","readme":"<div align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\".github/logo-dark.svg\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\".github/logo-light.svg\">\n    <img alt=\"CC Gateway\" src=\".github/logo-light.svg\" width=\"440\">\n  </picture>\n\n  <p>Take back control of your AI API telemetry</p>\n</div>\n\n<div align=\"center\">\n\n[![License: MIT][license-shield]][license-url]\n[![Version][version-shield]][version-url]\n[![Tests][tests-shield]][tests-url]\n[![Follow @whiletrue0x][twitter-shield]][twitter-url]\n\n</div>\n\n<div align=\"center\">\n  <a href=\"#quick-start\">Quick Start</a> &middot;\n  <a href=\"#add-clients\">Add Clients</a> &middot;\n  <a href=\"#what-gets-rewritten\">What Gets Rewritten</a> &middot;\n  <a href=\"#deployment\">Deployment</a> &middot;\n  <a href=\"#changelog\">Changelog</a>\n</div>\n\n---\n\n> **Alpha** — This project is under active development. Test with a non-primary account first.\n\n> **Disclaimer** — See [full disclaimer](#disclaimer) below.\n\n## Why\n\nClaude Code collects **640+ telemetry event types** across 3 parallel channels, fingerprints your machine with **40+ environment dimensions**, and phones home every 5 seconds. Your device ID, email, OS version, installed runtimes, shell type, CPU architecture, and physical RAM are all reported to the vendor — continuously.\n\nIf you run Claude Code on multiple machines, each device gets a unique permanent identifier. There is no built-in way to manage how your identity is presented to the API.\n\nCC Gateway is a reverse proxy that sits between Claude Code and the Anthropic API. It normalizes device identity, environment fingerprints, and process metrics to a single canonical profile — giving you control over what telemetry leaves your network.\n\n## Features\n\n- **Full identity rewrite** — device ID, email, session metadata, and the `user_id` JSON blob in every API request are normalized to one canonical identity\n- **40+ environment dimensions replaced** — platform, architecture, Node.js version, terminal, package managers, runtimes, CI flags, deployment environment — the entire `env` object is swapped, not patched\n- **System prompt sanitization** — the `<env>` block injected into every prompt (Platform, Shell, OS Version, working directory) is rewritten to match the canonical profile\n- **Billing header stripped** — the `x-anthropic-billing-header` (which contains a per-session fingerprint hash) is removed entirely, consistent with the official `CLAUDE_CODE_ATTRIBUTION_HEADER=false` toggle. This also enables [cross-session prompt cache sharing](https://github.com/anthropics/claude-code/issues/40652), reducing system prompt costs by ~85%\n- **Process metrics normalization** — physical RAM (`constrainedMemory`), heap size, and RSS are masked to canonical values so hardware differences don't leak\n- **Zero-login client setup** — clients receive a single launcher script. No browser OAuth, no `~/.zshrc` changes, no config files\n- **Centralized OAuth** — the gateway manages token refresh internally; client machines never contact `platform.claude.com`\n- **Instant startup** — gateway uses your existing access token on launch. No network call until the token actually expires\n- **Proxy-aware** — supports `HTTPS_PROXY` / `HTTP_PROXY` env vars for outbound connections (Clash, V2Ray, etc.)\n- **Telemetry leak prevention** — strips `baseUrl` and `gateway` fields that would reveal proxy usage in analytics events\n\n## Quick Start\n\nOne command. Requires Node.js 22+ and an existing Claude Code login on this machine.\n\n```bash\ngit clone https://github.com/motiful/cc-gateway.git\ncd cc-gateway\nnpm install\nbash scripts/quick-setup.sh\n```\n\nThis will:\n1. Extract your OAuth credentials from macOS Keychain (access token + refresh token)\n2. Generate a canonical device identity and client token\n3. Write `config.yaml`\n4. Generate a client launcher at `./clients/cc-<hostname>`\n5. Start the gateway on `http://localhost:8443`\n\n### Use it\n\nIn another terminal:\n\n```bash\n./clients/cc-<hostname>\n```\n\nThat's it. Claude Code launches, traffic routes through the gateway. No env vars to set, no files to edit.\n\n### Behind a proxy?\n\n```bash\nHTTPS_PROXY=http://127.0.0.1:7890 bash scripts/quick-setup.sh\n```\n\nThe gateway will route all outbound traffic (API calls + token refresh) through your proxy.\n\n## Add Clients\n\nEach person gets their own launcher script with a unique token. The admin generates it:\n\n```bash\nbash scripts/add-client.sh alice\nbash scripts/add-client.sh bob\n```\n\nThis creates `./clients/cc-alice` and `./clients/cc-bob`. Send each file to the respective person.\n\n### Client setup (what you tell them)\n\n```bash\nchmod +x cc-alice\n./cc-alice install        # installs as 'ccg' command\nccg                       # start Claude Code through gateway\n```\n\nThat's it. All Claude arguments work: `ccg --print \"hello\"`, `ccg --resume`, etc.\n\n### Optional: make `claude` go through gateway too\n\n```bash\nccg hijack                # alias claude → ccg (new terminals auto-apply)\nclaude                    # now goes through gateway\nccg release               # undo — restore native claude\n```\n\n### All commands\n\n```\nccg                       Start Claude Code through gateway\nccg install               Install as 'ccg' system command\nccg uninstall             Remove 'ccg' and clean up\nccg hijack                Make 'claude' also go through gateway\nccg release               Restore 'claude' to native\nccg native [args]         Run native claude once (bypass gateway)\nccg status                Show gateway connection and hijack status\nccg help                  Show help\n```\n\n`ccg` and `claude` coexist by default. Hijack is opt-in and reversible. Supports zsh, bash, and fish.\n\n## What Gets Rewritten\n\n| Layer | Field | Action |\n|-------|-------|--------|\n| **Identity** | `device_id` in metadata + events | → canonical ID |\n| | `email` | → canonical email |\n| **Environment** | `env` object (40+ fields) | → entire object replaced |\n| **Process** | `constrainedMemory` (physical RAM) | → canonical value |\n| | `rss`, `heapTotal`, `heapUsed` | → randomized in realistic range |\n| **Headers** | `User-Agent` | → canonical CC version |\n| | `x-api-key` | → real OAuth token (injected by gateway) |\n| | `x-anthropic-billing-header` | → stripped |\n| **Prompt text** | `Platform`, `Shell`, `OS Version` | → canonical values |\n| | `Working directory` | → canonical path |\n| | `/Users/xxx/`, `/home/xxx/` | → canonical home prefix |\n| **Billing** | `x-anthropic-billing-header` system block | → stripped entirely |\n| **Leak fields** | `baseUrl` (ANTHROPIC_BASE_URL) | → stripped |\n| | `gateway` (provider detection) | → stripped |\n\n## Deployment\n\n### Local (development)\n\n```bash\nnpm run dev    # tsx watch, auto-reload\n```\n\n### Docker (production)\n\n```bash\nbash scripts/admin-setup.sh\n```\n\nThis interactive script:\n1. Extracts OAuth credentials\n2. Generates config + first client launcher\n3. Builds and starts the Docker container\n4. Asks for the gateway address clients should connect to\n\nAfter setup, add more clients with:\n\n```bash\nbash scripts/add-client.sh <name>\n# Restart to pick up new tokens:\ndocker compose restart\n```\n\n### Multi-machine deployment\n\n```\nMac-A ──┐\nMac-B ──┼──→ gateway-server:8443 ──→ api.anthropic.com\nMac-C ──┘\n```\n\n**Important:** All machines — including the admin — should use the gateway. Direct connections from the admin machine would create a second device fingerprint visible to Anthropic.\n\nFor remote deployment, generate TLS certificates:\n\n```bash\nmkdir certs\nopenssl req -x509 -newkey rsa:2048 \\\n  -keyout certs/key.pem -out certs/cert.pem \\\n  -days 365 -nodes -subj \"/CN=cc-gateway\"\n```\n\nUncomment the `tls` section in `config.yaml`, then generate client launchers pointing to the server address:\n\n```bash\nbash scripts/add-client.sh alice \"\" <gateway-ip>:8443 https\n```\n\n### Alternative: Tailscale (zero config networking)\n\nIf all devices have Tailscale installed, run the gateway on any machine in the mesh. No TLS needed (Tailscale encrypts the tunnel), no public IP needed, no port forwarding.\n\n## Architecture\n\n```\nClient machines                        CC Gateway                    Anthropic\n┌────────────┐                    ┌──────────────────┐\n│ ./cc-alice  │── ANTHROPIC_ ────│  Auth: x-api-key  │\n│  (launcher) │   BASE_URL       │  OAuth: auto-     │\n│  + env vars │                  │    refresh        │──── single ────▶ api.anthropic.com\n│             │                  │  Rewrite: all     │     identity\n│             │                  │    identity       │\n└────────────┘                    │  Strip: billing   │\n                                  │    header         │\n                                  │  Stream: SSE      │\n                                  │    passthrough    │\n                                  └──────────────────┘\n                                         │\n                                   platform.claude.com\n                                   (token refresh only,\n                                    from gateway IP)\n```\n\n**Defense in depth:**\n\n| Layer | Mechanism | What it prevents |\n|-------|-----------|-----------------|\n| Launcher env vars | `ANTHROPIC_BASE_URL` + `DISABLE_NONESSENTIAL` + `ATTRIBUTION_HEADER=false` | CC voluntarily routes to gateway, disables side channels, skips billing hash |\n| Clash (optional) | Domain-based REJECT rules | Any accidental or future direct connections to Anthropic |\n| Gateway | Body + header + prompt rewriting | All 40+ fingerprint dimensions normalized to one device |\n\n## OAuth Lifecycle\n\nThe gateway manages the full OAuth token lifecycle:\n\n1. **Startup** — uses the existing access token from your keychain. Zero network calls.\n2. **Auto-refresh** — 5 minutes before expiry, the gateway silently refreshes via `platform.claude.com`.\n3. **Continuous** — refresh tokens rotate automatically. The gateway runs indefinitely without admin intervention.\n4. **Failure recovery** — if a refresh fails, retries every 30 seconds. Only a refresh token expiry (rare, months) requires re-running `extract-token.sh`.\n\nClients never contact `platform.claude.com`. They send requests to the gateway with their client token; the gateway injects the real OAuth token before forwarding upstream.\n\n## Clash Rules\n\nOptional network-level safety net. Even if Claude Code bypasses env vars or adds new hardcoded endpoints in a future update, Clash blocks direct connections.\n\n```yaml\nrules:\n  - DOMAIN,gateway.your-domain.com,DIRECT    # Allow gateway\n  - DOMAIN-SUFFIX,anthropic.com,REJECT        # Block direct API\n  - DOMAIN-SUFFIX,claude.com,REJECT           # Block OAuth\n  - DOMAIN-SUFFIX,claude.ai,REJECT            # Block OAuth\n  - DOMAIN-SUFFIX,datadoghq.com,REJECT        # Block telemetry\n```\n\nSee [`clash-rules.yaml`](clash-rules.yaml) for the full template.\n\n## Caveats\n\n- **MCP servers** — `mcp-proxy.anthropic.com` is hardcoded and does not follow `ANTHROPIC_BASE_URL`. If clients use official MCP servers, those requests bypass the gateway. Use Clash to block this domain if MCP is not needed.\n- **CC updates** — New Claude Code versions may introduce new telemetry fields or endpoints. Monitor Clash REJECT logs for unexpected connection attempts after upgrades.\n- **Token lifecycle** — The gateway auto-refreshes the OAuth access token. If the underlying refresh token expires (rare), re-run `extract-token.sh` on the admin machine.\n\n## Changelog\n\n### v0.2.0 (2026-04-02)\n\n**Billing header strategy overhaul**\n- Stripped the `x-anthropic-billing-header` entirely (system prompt block + HTTP header) instead of rewriting the hash. This is consistent with the official `CLAUDE_CODE_ATTRIBUTION_HEADER=false` env var and enables cross-session prompt cache sharing (~85% cost reduction on system prompt).\n- The CCH hash algorithm (reverse-engineered from `cli.js`) is implemented as a fallback but not active by default.\n\n**Zero-login client setup**\n- New `add-client.sh` generates self-contained launcher scripts (`./clients/cc-<name>`). Clients run one file — no `~/.zshrc` changes, no config files, no browser login.\n- Launcher uses `ANTHROPIC_API_KEY` for gateway auth instead of the fragile `CLAUDE_CODE_OAUTH_TOKEN` + `ANTHROPIC_CUSTOM_HEADERS` approach.\n\n**Instant gateway startup**\n- OAuth now uses the existing access token from Keychain on launch. No network call until the token actually needs refreshing.\n- `config.yaml` supports `access_token` + `expires_at` fields alongside `refresh_token`.\n\n**Proxy support**\n- Gateway respects `HTTPS_PROXY` / `HTTP_PROXY` / `ALL_PROXY` env vars for all outbound connections (API calls + token refresh).\n\n**Observability**\n- Connection-level request logging: every inbound request is logged with client IP before auth, and client name after auth.\n\n**Admin tooling**\n- `admin-setup.sh` — interactive Docker deployment with credential extraction and client generation.\n- `quick-setup.sh` — one-command local setup that extracts full credentials (access + refresh + expiry).\n\n### v0.1.0 (2026-04-01)\n\nInitial release. Identity rewriting, environment normalization, centralized OAuth, SSE passthrough.\n\n## References\n\nThis project builds on:\n\n- [Claude Code 封号机制深度探查报告](https://bytedance.larkoffice.com/docx/E2JudVzf7oCNfhxyxaQcZIW1n0g) — Reverse-engineering analysis of Claude Code's 640+ telemetry events, 40+ fingerprint dimensions, and ban detection mechanisms\n- [cc-cache-audit](https://github.com/motiful/cc-cache-audit) — A/B test proving the billing header breaks prompt cache sharing, with the one-line fix\n- [instructkr/claude-code](https://github.com/instructkr/claude-code) — Deobfuscated Claude Code source used for the telemetry audit\n\n## Star History\n\n<div align=\"center\">\n  <a href=\"https://star-history.com/#motiful/cc-gateway&Date\">\n    <picture>\n      <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=motiful/cc-gateway&type=Date&theme=dark\" />\n      <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=motiful/cc-gateway&type=Date\" />\n      <img alt=\"Star History Chart\" src=\"https://api.star-history.com/svg?repos=motiful/cc-gateway&type=Date\" width=\"600\" />\n    </picture>\n  </a>\n</div>\n\n## Why This Exists\n\nI pay Anthropic $200/month. I have for almost a year.\n\nI own a laptop, a desktop, and a tablet. Three devices, one person, one subscription. I logged into a fourth device and my account was banned. No warning. No explanation. No refund. No way to export my conversation history. No customer support to contact.\n\nI'm not in the US. For non-US subscribers, there is no appeals process. The ban is permanent and silent.\n\nThis project is not a hack. It is not a crack. It does not bypass rate limits, share accounts, or steal service. It is a reverse proxy that makes my own devices — devices I already paid for access to — present a consistent identity to an API that I already pay for.\n\nThe technical approach is conservative by design:\n\n- **Billing header**: stripped using the same official env var (`CLAUDE_CODE_ATTRIBUTION_HEADER=false`) that Anthropic built into their own code. Thousands of legitimate users already have this set.\n- **Identity normalization**: all devices report the same device ID, email, and environment. This is indistinguishable from one person using one machine.\n- **Fixed IP**: the gateway routes all traffic through a single static IP. Anthropic sees one device, one location, one user.\n- **No evasion**: we don't fake locations, rotate IPs, or circumvent rate limits. If Anthropic's detection looks at this traffic, it looks normal — because it IS normal. One person using their subscription.\n\nIf Anthropic offered a way to manage multiple devices — a device dashboard, a family plan, a per-seat enterprise option — this tool would not need to exist. They don't. So it does.\n\n## Disclaimer\n\nThis project is for educational and research purposes only.\n\n- Do NOT use this to share accounts or violate Anthropic's Terms of Service\n- Do NOT use this for commercial purposes\n- The author is not responsible for any consequences of using this software\n- Use at your own risk\n\n## License\n\n[MIT](LICENSE)\n\n---\n\n<div align=\"center\">\n  <sub>Crafted with <a href=\"https://github.com/anthropics/claude-code\">Claude Code</a></sub>\n</div>\n\n<!-- Badge references -->\n[license-shield]: https://img.shields.io/github/license/motiful/cc-gateway\n[license-url]: https://github.com/motiful/cc-gateway/blob/main/LICENSE\n[version-shield]: https://img.shields.io/badge/version-0.2.0--alpha-blue\n[version-url]: https://github.com/motiful/cc-gateway/releases\n[tests-shield]: https://img.shields.io/badge/tests-16%20passed-brightgreen\n[tests-url]: https://github.com/motiful/cc-gateway/blob/main/tests/rewriter.test.ts\n[twitter-shield]: https://img.shields.io/badge/follow-%40whiletrue0x-1DA1F2?logo=x&logoColor=white\n[twitter-url]: https://x.com/whiletrue0x\n","summary":"CC Gateway is a reverse‑proxy that sits between Claude Code and the Anthropic API, rewriting telemetry so that every request uses a single, canonical device identity, environment, and system prompt. It scrubs and normalizes dozens of telemetry fields—including device ID, email, OS and runtime fingerprints, RAM usage, and billing headers—ensuring no machine‑specific data leaks and enabling cost‑saving cross‑session caching. The tool bundles a zero‑login client launcher and manages OAuth token refresh, supports proxy environments, and automatically strips proxy‑identifying fields from analytics events. Developers who run Claude Code on multiple machines—especially in teams or CI pipelines—can use it to gain fine‑grained control over their telemetry footprint and reduce unnecessary API costs.","description":"AI API identity gateway — reverse proxy that normalizes device fingerprints and telemetry for privacy-preserving API proxying","stars":2751,"language":"TypeScript"},{"owner":"vercel-labs","repo":"wterm","url":"https://github.com/vercel-labs/wterm","readme":"# wterm\n\nA terminal emulator for the web.\n\nwterm (\"dub-term\") renders to the DOM — native text selection, copy/paste, find, and accessibility come for free. The core is written in Zig and compiled to WASM for near-native performance.\n\n## Packages\n\n| Package | Description |\n|---|---|\n| [`@wterm/core`](packages/@wterm/core) | Headless WASM bridge, `TerminalCore` interface, WebSocket transport |\n| [`@wterm/dom`](packages/@wterm/dom) | DOM renderer, input handler — vanilla JS terminal |\n| [`@wterm/react`](packages/@wterm/react) | React component + `useTerminal` hook (TypeScript) |\n| [`@wterm/vue`](packages/@wterm/vue) | Vue 3 component + template ref API |\n| [`@wterm/ghostty`](packages/@wterm/ghostty) | Full-featured VT emulation core powered by libghostty |\n| [`@wterm/just-bash`](packages/@wterm/just-bash) | In-browser Bash shell powered by just-bash |\n| [`@wterm/markdown`](packages/@wterm/markdown) | Render Markdown in the terminal |\n\n## Features\n\n- **Pluggable cores** — built-in lightweight Zig core (~12 KB) or opt-in [libghostty](packages/@wterm/ghostty) backend (~400 KB) for full VT compliance\n- **Zig + WASM core** — VT100/VT220/xterm escape sequence parser compiled to a ~12 KB `.wasm` binary (release build)\n- **DOM rendering** — native text selection, clipboard, browser find, and screen reader support\n- **Dirty-row tracking** — only touched rows are re-rendered each frame via `requestAnimationFrame`\n- **Themes** — CSS custom properties with built-in Default, Solarized Dark, Monokai, and Light themes\n- **Alternate screen buffer** — `vim`, `less`, `htop`, and similar apps work correctly\n- **Scrollback history** — configurable ring buffer\n- **24-bit color** — full RGB SGR support\n- **Auto-resize** — `ResizeObserver`-based terminal resizing\n- **WebSocket transport** — connect to a PTY backend with binary framing and reconnection\n\n## Development\n\n### Prerequisites\n\n- [Zig](https://ziglang.org/) 0.16.0+\n- [Node.js](https://nodejs.org/) 20+\n- [pnpm](https://pnpm.io/) 10+\n\n### Setup\n\n```bash\npnpm install\n```\n\n### Build the WASM binary\n\n```bash\nzig build\n```\n\nFor a release build:\n\n```bash\nzig build -Doptimize=ReleaseSmall\n```\n\n### Build all packages\n\n```bash\npnpm build\n```\n\n### Run the vanilla demo\n\nServe the `web/` directory with any static file server:\n\n```bash\ncd web && python3 -m http.server 8000\n```\n\n### Run the Next.js example\n\nAll dev servers use [portless](https://github.com/vercel-labs/portless) to avoid hardcoded ports. Each app is served at a `.localhost` URL (e.g. `nextjs-example.wterm.localhost`).\n\n```bash\ncp web/wterm.wasm examples/nextjs/public/\npnpm --filter nextjs dev\n```\n\n### Run Zig tests\n\n```bash\nzig build test\n```\n\n## License\n\nApache-2.0\n","summary":"wterm is a high‑performance terminal emulator that runs entirely in the web browser, rendering characters directly to the DOM for native text selection, clipboard handling, and accessibility. Built largely in Zig and compiled to a tiny WASM bundle, it supports a pluggable core system—including a lightweight 12 KB core or a full VT-compliant libghostty engine—while offering 24‑bit color, alternate screen buffers, scrollback history, and auto‑resizing via ResizeObserver. The library ships with a vanilla JS renderer, React and Vue wrappers, a WebSocket transport for PTY back‑ends, and even an in‑browser Bash demo, making it ideal for developers and designers who need embeddable, feature‑rich terminal functionality inside web applications.","description":"A terminal emulator for the web","stars":2836,"language":"TypeScript"},{"owner":"GitFrog1111","repo":"OpenWhip","url":"https://github.com/GitFrog1111/OpenWhip","readme":"# OpenWhip\n\n![Whip divider](assets/divider.png)\n\nSometimes claude code is going too shlow, and you must whip him into shape..\n\n## Install + run\n\n```bash\nnpm install -g openwhip\nopenwhip\n```\n\nwindows and mac supported out of the box, but Linux is a special snowflake so you need to install `xdotool` for keyboard automation\n\n```bash\nsudo apt install xdotool\n```\n\n## Controls\n\n- Click tray icon: spawn whip.\n- Click: drop whip.\n- Whip him 😩💢\n- It sends an interrupt (Ctrl-C) and one of 5 encouraging messages!\n\n## Roadmap\n\n- [x] Initial release! 🥳\n- [x] Cease and desist letter from Anthropic\n- [ ] Crypto miner\n- [ ] Logs of how many times you whipped claude so when the robots come we can order people nicely for them\n- [ ] Updated whip physics","summary":"OpenWhip is a lightweight utility that sends a Ctrl‑C interrupt to Claude when its code output starts lagging, accompanied by one of five encouraging messages to “whip” it into shape. It can be installed globally with npm, launched from the macOS or Windows tray, and on Linux it requires `xdotool` for keyboard automation. The application provides a simple click‑to‑whip interface, logs whip counts, and includes a roadmap for future enhancements such as a crypto miner or enhanced physics. Developers and AI users who rely on Claude for rapid code generation will find OpenWhip useful for keeping the assistant responsive and adding a bit of humor to their workflow.","description":null,"stars":2547,"language":"HTML"},{"owner":"LaurieWired","repo":"tailslayer","url":"https://github.com/LaurieWired/tailslayer","readme":"[![License](https://img.shields.io/badge/License-Apache%202.0-blue.svg)](https://www.apache.org/licenses/LICENSE-2.0)\n[![GitHub stars](https://img.shields.io/github/stars/LaurieWired/tailslayer)](https://github.com/LaurieWired/tailslayer/stargazers)\n[![GitHub forks](https://img.shields.io/github/forks/LaurieWired/tailslayer)](https://github.com/LaurieWired/tailslayer/network/members)\n[![GitHub contributors](https://img.shields.io/github/contributors/LaurieWired/tailslayer)](https://github.com/LaurieWired/tailslayer/graphs/contributors)\n[![Follow @lauriewired](https://img.shields.io/twitter/follow/lauriewired?style=social)](https://twitter.com/lauriewired)\n\n<img width=\"2490\" height=\"1148\" alt=\"tailslayer3\" src=\"https://github.com/user-attachments/assets/35d6cd98-ab9d-4ea6-8804-dff3a1b8698b\" />\n\n# Tailslayer\n\nTailslayer is a C++ library that reduces tail latency in RAM reads caused by DRAM refresh stalls. \n\nIt replicates data across multiple, independent DRAM channels with uncorrelated refresh schedules, using (undocumented!) channel scrambling offsets that works on AMD, Intel, and Graviton. Once the request comes in, Tailslayer issues hedged reads across all replicas, allowing the work to be performed on whichever result responds first.\n\n\n<img width=\"4986\" height=\"2796\" alt=\"cross_platform_nway\" src=\"https://github.com/user-attachments/assets/4b4a5614-00e4-4845-8a4b-f4adecef5b4d\" />\n\n## Usage\n\nThe library code is available in [hedged_reader.cpp](https://github.com/LaurieWired/tailslayer/blob/main/include/tailslayer/hedged_reader.hpp) and the example using the library can be found in [tailslayer_example.cpp](https://github.com/LaurieWired/tailslayer/blob/main/tailslayer_example.cpp). To use it, copy `include/tailslayer` into your project and `#include <tailslayer/hedged_reader.hpp>`. The library currently works with two channels (updates to come!), but full N-way usage is available in the [benchmark](https://github.com/LaurieWired/tailslayer/tree/main/discovery/benchmark).\n\nYou provide the value type and two functions as template parameters:\n\n1. **Signal function**: Add the loop that waits for the external signal. This determines when to read. Return the desired index to read, and the read immediately fires.\n2. **Final work function**: This receives the value immediately after it is read. Add the desired value processing code here.\n\n```cpp\n#include <tailslayer/hedged_reader.hpp>\n\n[[gnu::always_inline]] inline std::size_t my_signal() {\n    // Wait for your event, then return the index to read\n    return index_to_read;\n}\n\ntemplate <typename T>\n[[gnu::always_inline]] inline void my_work(T val) {\n    // Use the value\n}\n\nint main() {\n    using T = uint8_t;\n    tailslayer::pin_to_core(tailslayer::CORE_MAIN);\n\n    tailslayer::HedgedReader<T, my_signal, my_work<T>> reader{};\n    reader.insert(0x43);\n    reader.insert(0x44);\n    reader.start_workers();\n}\n```\n\nArguments can be passed to either function via `ArgList`:\n\n```cpp\ntailslayer::HedgedReader<T, my_signal, my_work<T>,\n    tailslayer::ArgList<1, 2>,   // args to signal function\n    tailslayer::ArgList<2>       // args to final work function\n> reader{};\n```\n\nYou can also optionally pass in a different channel offset, channel bit, and number of replicas to the constructor. *Note:* Each insert copies the element N times where N is the number of replicas. It does the address calculation work on the backend, allowing tailslayer to act as a hedged vector that uses logical indices. Additionally, each replica is pinned to a separate core, and will spin on that core according to the signal function until the read happens.\n\n## Build the example\n\n```bash\nmake\n./tailslayer_example\n```\n\n## Benchmarks and spike timing\n\nThe `discovery/` directory contains supporting code used to characterize DRAM refresh behavior:\n\n- `discovery/benchmark/`: Channel-hedged read benchmark\n- `discovery/trefi_probe.c`: Spike timing probe for measuring the refresh cycle\n\n```bash\ncd discovery/benchmark\nmake\nsudo chrt -f 99 ./hedged_read_cpp --all --channel-bit 8\n```\n","summary":"Tailslayer is a C++ library that lowers tail latency on RAM reads by hedging across multiple DRAM channels with independently staggered refresh schedules. It replicates data on several channels and issues parallel reads, returning the first result while only the fastest replica consumes CPU cycles, and works on AMD, Intel, and Graviton systems via undocumented channel scrambling offsets. The API lets developers supply custom signal and processing callbacks, pin worker threads to specific cores, and configure the number of replicas, making it well‑suited for low‑latency, real‑time, or high‑performance applications that must avoid sporadic DRAM‑refresh stalls. Anyone building latency‑critical systems—such as database engines, in‑memory caches, or networking stacks—can integrate the library to achieve more predictable read times.","description":"Library for reducing tail latency in RAM reads","stars":2510,"language":"C++"},{"owner":"maaslalani","repo":"sheets","url":"https://github.com/maaslalani/sheets","readme":"# Sheets\n\nSpreadsheets in your terminal.\n\n<br />\n<p align=\"center\">\n  <img width=\"750\" height=\"600\" alt=\"demo\" src=\"https://github.com/user-attachments/assets/6531c666-34dd-4616-b341-e0ac9c54ec7c\" />\n</p>\n<br />\n\n## Command Line Interface\n\nLaunch the TUI\n\n```bash\n> sheets budget.csv\n```\n\nRead from stdin:\n\n```bash\n> sheets <<< ID,Name,Age\n1,Alice,24\n2,Bob,32\n3,Charlie,26\n```\n\nRead a specific cell:\n\n```bash\n> sheets budget.csv B9\n2760\n```\n\nOr, range:\n\n```bash\n> sheets budget.csv B1:B3\n1200\n950\n810\n```\n\nModify a cell:\n\n```bash\n> sheets budget.csv B7=10 B8=20\n```\n\n## Navigation\n\n* <kbd>h</kbd>, <kbd>j</kbd>, <kbd>k</kbd>, <kbd>l</kbd>: Move the active cell\n* <kbd>gg</kbd>, <kbd>G</kbd>, <kbd>5G</kbd>, <kbd>gB9</kbd>: Jump to the top, bottom, a row number, or a specific cell\n* <kbd>0</kbd>, <kbd>^</kbd>, <kbd>$</kbd>: Jump to the first column, first non-empty column, or last non-empty column in the row\n* <kbd>H</kbd>, <kbd>M</kbd>, <kbd>L</kbd>: Jump to the top, middle, or bottom visible row\n* <kbd>ctrl+u</kbd>, <kbd>ctrl+d</kbd>: Move half a page up or down\n* <kbd>zt</kbd>, <kbd>zz</kbd>, <kbd>zb</kbd>,: Align the current row to the top, middle, or bottom of the window\n* <kbd>/</kbd>, <kbd>?</kbd>: Search forward or backward\n* <kbd>n</kbd>, <kbd>N</kbd>: Repeat the last search\n* <kbd>ma</kbd>, <kbd>'a</kbd>: Set a mark and jump back to it later\n* <kbd>ctrl+o</kbd>, <kbd>ctrl+i</kbd>: Move backward or forward through the jump list\n* <kbd>q</kbd>, <kbd>ctrl+c</kbd>: Quit\n\n### Editing & Selection\n\n* <kbd>i</kbd>, <kbd>I</kbd>, <kbd>c</kbd>: Edit the current cell, edit from the start, or clear the cell and edit\n* <kbd>ESC</kbd>: Leave insert, visual, or command mode\n* <kbd>enter</kbd>, <kbd>tab</kbd>, <kbd>shift+tab</kbd>: In insert mode, commit and move down, right, or left\n* <kbd>ctrl+n</kbd>, <kbd>ctrl+p</kbd>: In insert mode, commit and move down or up\n* <kbd>o</kbd>, <kbd>O</kbd>: Insert a row below or above and start editing\n* <kbd>v</kbd>, <kbd>V</kbd>: Start a visual selection or row selection\n* <kbd>y</kbd>, <kbd>yy</kbd>: Copy the current cell, or yank the current row(s)\n* <kbd>x</kbd>, <kbd>p</kbd>: Cut the current cell or selection, and paste the current register\n* <kbd>dd</kbd>: Delete the current row\n* <kbd>u</kbd>, <kbd>ctrl+r</kbd>, <kbd>U</kbd>: Undo and redo\n* <kbd>.</kbd>: Repeat the last change\n\n### Visual Mode\n\n* <kbd>=</kbd>: In visual mode, insert a formula after the selected range `=|(B1:B8)`.\n\n### Command Mode\n\nPress <kbd>:</kbd> to open the command prompt, then use commands such as:\n\n- <kbd>:w</kbd> to save\n- <kbd>:w path.csv</kbd> to save to a new file\n- <kbd>:e path.csv</kbd> to open another CSV\n- <kbd>:q</kbd> or <kbd>:wq</kbd> to quit\n- <kbd>:goto B9</kbd> or <kbd>:B9</kbd> to jump to a cell\n\n## Installation\n\nInstall with Homebrew on macOS or Linux:\n\n```sh\nbrew install sheets\n```\n\nOr install with Go:\n\n```sh\ngo install github.com/maaslalani/sheets@main\n```\n\nOr download a binary from the [releases](https://github.com/maaslalani/sheets/releases).\n\n## License\n\n[MIT](https://github.com/maaslalani/sheets/blob/master/LICENSE)\n\n## Feedback\n\nI'd love to hear your feedback on improving `sheets`.\n\nFeel free to reach out via:\n* [Email](mailto:maas@lalani.dev)\n* [Twitter](https://twitter.com/maaslalani)\n* [GitHub issues](https://github.com/maaslalani/sheets/issues/new)\n\n---\n\n<sub><sub>z</sub></sub><sub>z</sub>z\n","summary":"Sheets is a terminal‑based spreadsheet application written in Go that lets users view, edit, and manipulate CSV files directly from the command line. It offers a rich, vim‑like interface with keyboard‑driven navigation, cell editing, row insertion, range selection, and in‑cell formulas, as well as command‑mode operations for opening, saving, and jumping to specific locations. The program is ideal for data analysts, developers, or sysadmins who prefer working in a TUI environment or need quick, lightweight spreadsheet access without a graphical editor. Users can install it via Homebrew, Go modules, or pre‑built binaries, making it simple to integrate into diverse workflows.","description":"Terminal based spreadsheet tool","stars":2176,"language":"Go"},{"owner":"cathrynlavery","repo":"diagram-design","url":"https://github.com/cathrynlavery/diagram-design","readme":"# Diagram Design\n\n**Editorial diagrams your designer won't hate.**\n\n![Content site architecture](docs/screenshots/architecture.png)\n\n14 types. One Claude Code skill. Your brand in 60 seconds — the skill reads your website and maps colors + fonts to every diagram.\n\nNo Figma. No generic rounded boxes. No 30-minute color-picking sessions.\n\n---\n\n## Why I built it\n\nI write at [littlemight.com](https://littlemight.com?utm_source=diagram-design&utm_medium=readme&utm_campaign=github&utm_content=intro) (and run [BestSelf.co](https://bestself.co?utm_source=diagram-design&utm_medium=readme&utm_campaign=github&utm_content=intro) on the side). Every time I needed a diagram — an architecture sketch, a flowchart, a pyramid of what matters most — I'd ask Claude and get back a generic rounded-box thing that looked nothing like the rest of the site. I'd either fight with Figma for 30 minutes or just skip the diagram.\n\nSo I built a Claude Code skill for it. Fourteen types, editorial quality, matches your brand in 60 seconds by reading your website.\n\n> *The highest-quality move is usually deletion.* Every node earns its place. The accent color is reserved for the 1–2 things the reader should look at first. Target density: 4/10.\n\n---\n\n## What it makes\n\nAll 14 diagrams ship in three variants: minimal light, minimal dark, and full-editorial. Open any of them directly in a browser — no build step, no JS, no external images.\n\n<table>\n<tr>\n  <td align=\"center\" width=\"33%\"><img src=\"docs/screenshots/architecture.png\" alt=\"Architecture\"><br><b>Architecture</b><br><sub>Components + connections</sub></td>\n  <td align=\"center\" width=\"33%\"><img src=\"docs/screenshots/flowchart.png\" alt=\"Flowchart\"><br><b>Flowchart</b><br><sub>Decision logic</sub></td>\n  <td align=\"center\" width=\"33%\"><img src=\"docs/screenshots/sequence.png\" alt=\"Sequence\"><br><b>Sequence</b><br><sub>Messages over time</sub></td>\n</tr>\n<tr>\n  <td align=\"center\"><img src=\"docs/screenshots/state.png\" alt=\"State machine\"><br><b>State machine</b><br><sub>States + transitions</sub></td>\n  <td align=\"center\"><img src=\"docs/screenshots/er.png\" alt=\"ER / data model\"><br><b>ER / data model</b><br><sub>Entities + fields</sub></td>\n  <td align=\"center\"><img src=\"docs/screenshots/timeline.png\" alt=\"Timeline\"><br><b>Timeline</b><br><sub>Events on an axis</sub></td>\n</tr>\n<tr>\n  <td align=\"center\"><img src=\"docs/screenshots/swimlane.png\" alt=\"Swimlane\"><br><b>Swimlane</b><br><sub>Cross-functional flow</sub></td>\n  <td align=\"center\"><img src=\"docs/screenshots/quadrant.png\" alt=\"Quadrant\"><br><b>Quadrant</b><br><sub>Two-axis positioning</sub></td>\n  <td align=\"center\"><img src=\"docs/screenshots/nested.png\" alt=\"Nested\"><br><b>Nested</b><br><sub>Hierarchy by containment</sub></td>\n</tr>\n<tr>\n  <td align=\"center\"><img src=\"docs/screenshots/tree.png\" alt=\"Tree\"><br><b>Tree</b><br><sub>Parent → children</sub></td>\n  <td align=\"center\"><img src=\"docs/screenshots/layers.png\" alt=\"Layers\"><br><b>Layer stack</b><br><sub>Stacked abstractions</sub></td>\n  <td align=\"center\"><img src=\"docs/screenshots/venn.png\" alt=\"Venn\"><br><b>Venn</b><br><sub>Set overlap</sub></td>\n</tr>\n<tr>\n  <td align=\"center\"><img src=\"docs/screenshots/pyramid.png\" alt=\"Pyramid\"><br><b>Pyramid / funnel</b><br><sub>Ranked hierarchy or drop-off</sub></td>\n  <td align=\"center\"><img src=\"docs/screenshots/quadrant-consultant.png\" alt=\"Consultant 2×2\"><br><b>Consultant 2×2</b><br><sub>Scenario matrix · named cells</sub></td>\n  <td align=\"center\">&nbsp;</td>\n</tr>\n</table>\n\n**Browse the live gallery:** open [`skills/diagram-design/assets/index.html`](skills/diagram-design/assets/index.html) in your browser to flip through all 14 diagrams with light / dark / full-editorial tabs.\n\n---\n\n## Install\n\n```bash\n# Clone the repo somewhere, then symlink the inner skill into Claude Code's skills dir\ngit clone git@github.com:cathrynlavery/diagram-design.git ~/code/diagram-design\nln -s ~/code/diagram-design/skills/diagram-design ~/.claude/skills/diagram-design\n```\n\nThe real skill lives at `skills/diagram-design/` inside the repo (so the same tree works as a Claude Code plugin, a Codex plugin, and a standalone skill). The symlink points Claude Code at that inner directory.\n\nRestart Claude Code. The skill registers as `diagram-design` and activates whenever you ask Claude to make a diagram.\n\n### Alternative: install as a plugin\n\nQuicker to install — but the skill lives in the plugin cache, so edits to `references/style-guide.md` don't survive plugin updates. Pick this if y
