,\n    \"n_heads\": 8,\n    \"max_seq_len\": 128,\n    \"max_loop_iters\": 4,\n    \"prelude_layers\": 1,\n    \"coda_layers\": 1,\n    \"n_experts\": 8,\n    \"n_shared_experts\": 1,\n    \"n_experts_per_tok\": 2,\n    \"expert_dim\": 64,\n    \"lora_rank\": 8,\n    \"attn_type\": attn_type,\n}\n\nif attn_type == \"gqa\":\n    cfg = MythosConfig(**base, n_kv_heads=2)\nelse:\n    cfg = MythosConfig(\n        **base,\n        n_kv_heads=8,\n        kv_lora_rank=32,\n        q_lora_rank=64,\n        qk_rope_head_dim=16,\n        qk_nope_head_dim=16,\n        v_head_dim=16,\n    )\n\nmodel = OpenMythos(cfg)\ntotal = sum(p.numel() for p in model.parameters())\nprint(f\"\\n[{attn_type.upper()}] Parameters: {total:,}\")\n\nids = torch.randint(0, cfg.vocab_size, (2, 16))\nlogits = model(ids, n_loops=4)\nprint(f\"[{attn_type.upper()}] Logits shape: {logits.shape}\")\n\nout = model.generate(ids, max_new_tokens=8, n_loops=8)\nprint(f\"[{attn_type.upper()}] Generated shape: {out.shape}\")\n\nA = model.recurrent.injection.get_A()\nrho = torch.linalg.eigvals(A).abs().max().item()\nprint(\n    f\"[{attn_type.upper()}] Spectral radius ρ(A) = {rho:.4f} (must be < 1)\"\n)\n```\n\n\n\n## Model Variants\n\nPre-configured scales from 1B to 1T parameters:\n\n```python\nfrom open_mythos import (\n    mythos_1b,\n    mythos_3b,\n    mythos_10b,\n    mythos_50b,\n    mythos_100b,\n    mythos_500b,\n    mythos_1t,\n    OpenMythos,\n)\n\ncfg = mythos_7b()  # returns a MythosConfig\nmodel = OpenMythos(cfg)\n\ntotal = sum(p.numel() for p in model.parameters())\nprint(f\"Parameters: {total:,}\")\n```\n\n| Variant | `dim` | Experts | `expert_dim` | Loop iters | Context | Max output |\n|---|---|---|---|---|---|---|\n| `mythos_1b` | 2048 | 64 | 2048 | 16 | 4k | 4k |\n| `mythos_3b` | 3072 | 64 | 4096 | 16 | 4k | 4k |\n| `mythos_10b` | 4096 | 128 | 5632 | 24 | 8k | 4k |\n| `mythos_50b` | 6144 | 256 | 9728 | 32 | 8k | 4k |\n| `mythos_100b` | 8192 | 256 | 13568 | 32 | 1M | 128k |\n| `mythos_500b` | 12288 | 512 | 23040 | 48 | 1M | 128k |\n| `mythos_1t` | 16384 | 512 | 34560 | 64 | 1M | 128k |\n\n---\n\n## Training\n\nThe training script for the 3B model on FineWeb-Edu is at [`training/3b_fine_web_edu.py`](training/3b_fine_web_edu.py).\n\n**Single GPU:**\n```bash\npython training/3b_fine_web_edu.py\n```\n\n**Multi-GPU (auto-detects GPU count):**\n```bash\ntorchrun --nproc_per_node=$(python -c \"import torch; print(torch.cuda.device_count())\") training/3b_fine_web_edu.py\n```\n\nKey design choices:\n\n| Feature | Detail |\n|---|---|\n| Optimizer | AdamW |\n| Dataset | `HuggingFaceFW/fineweb-edu` (`sample-10BT` by default, swap to `sample-100BT` or `default` for full run) |\n| Tokenizer | `openai/gpt-oss-20b` via `MythosTokenizer` |\n| Parallelism | PyTorch DDP via `torchrun`, sharded streaming dataset |\n| Precision | bfloat16 on H100/A100, float16 + GradScaler on older GPUs |\n| Schedule | Linear warmup (2000 steps) → cosine decay |\n| Target | 30B tokens (~Chinchilla-adjusted for looped architecture) |\n\n---\n\n## Documentation\n\n| Page | Description |\n|---|---|\n| [`docs/open_mythos.md`](docs/open_mythos.md) | Full API reference for the `OpenMythos` class — constructor, `forward`, `generate`, all sub-modules, configuration reference, and usage examples |\n| [`docs/datasets.md`](docs/datasets.md) | Recommended training datasets with token budget guidance per model size |\n\n---\n\n## The Central Hypothesis\n\nClaude Mythos is suspected to be a **Recurrent-Depth Transformer (RDT)** — also called a Looped Transformer (LT). Rather than stacking hundreds of unique layers, a subset of layers is recycled and run through multiple times per forward pass. Same weights. More loops. Deeper thinking.\n\nThis is not chain-of-thought. There is no intermediate token output. All of this reasoning happens **silently, inside a single forward pass**, in continuous latent space.\n\n---\n\n## Architecture\n\nA looped transformer divides its layers into three functional blocks:\n\n```\nInput\n  ↓\n[Prelude P]        — standard transformer layers, run once\n  ↓\n[Recurrent Block R] — looped T times\n  ↑_______↓         (hidden state h updated each loop with input injection e)\n  ↓\n[Coda C]           — standard transformer layers, run once\n  ↓\nOutput\n```\n\nThe recurrent block update rule at each loop step t:\n\n```\nh_{t+1} = A·h_t + B·e + Transformer(h_t, e)\n```\n\nWhere:\n- `h_t` is the hidden state after loop t\n- `e` is the encoded input (from the Prelude), injected at every loop\n- `A` and `B` are learned injection parameters\n- The Transformer blocks apply attention and MLP as usual\n\nThe injection of `e` at every step is what prevents the model from drifting — it keeps the original input signal alive throughout the entire recurrence depth.\n\nThe full implementation is in [`open_mythos/main.py`](open_mythos/main.py). See the [`OpenMythos` class reference](docs/open_mythos.md) for a detailed API walkthrough, configuration options, and usage examples.\n\n### Attention Implementations\n\nThe attention layer is switchable via `cfg.attn_type`:\n\n| Option | Class | Description |\n|---|---|---|\n| `\"gqa\"` | `GQAttention` | Grouped Query Attention (Ainslie et al., 2023) — fewer KV heads than Q heads (`n_kv_heads < n_heads`), reducing KV-cache memory by `n_heads / n_kv_heads`. Uses **Flash Attention 2** (Dao et al., 2023) when `flash-attn>=2.8.3` is installed: GQA is handled natively (no KV head expansion), I/O-bound-optimal, with a transparent fallback to manual scaled dot-product attention when the package is absent. |\n| `\"mla\"` | `MLAttention` | Multi-Latent Attention (DeepSeek-V2) — caches a compressed KV latent (`kv_lora_rank`) rather than full K/V, with split RoPE / no-RoPE head dims for position-aware compression. |\n\nRoPE is applied to Q and K before caching, so cached values do not need to be re-rotated on retrieval.\n\n---\n\n## Why This Explains Mythos\n\n### 1. Systematic Generalization\n\nVanilla transformers fail to combine knowledge in ways they have never seen during training. Looped transformers pass this test. The ability emerges through a **three-stage grokking process**:\n\n1. Memorization — model fits training distribution\n2. In-distribution generalization — model handles known compositions\n3. Systematic generalization — model handles novel compositions OOD, abruptly and suddenly\n\nThis is why Mythos feels qualitatively different from other models on novel questions — the capability phase-transitions in, rather than emerging gradually.\n\n### 2. Depth Extrapolation\n\nTrain on 5-hop reasoning chains. Test on 10-hop. Vanilla transformer fails. Looped transformer succeeds — by running more inference-time loops. This maps directly to the observation that Mythos handles deeply compositional problems (multi-step math, long-horizon planning, layered arguments) without explicit chain-of-thought.\n\nMore loops at inference = deeper reasoning chains = harder problems solved.\n\n### 3. Latent Thoughts as Implicit Chain-of-Thought\n\nEach loop iteration is the functional equivalent of one step of chain-of-thought, but operating in continuous latent space rather than token space. A looped model running T loops implicitly simulates T steps of CoT reasoning. This has been formally proven (Saunshi et al., 2025).\n\nFurthermore, continuous latent thoughts — unlike discrete token outputs — can encode **multiple alternative next steps simultaneously**. This allows something closer to breadth-first search over the reasoning space, rather than a single committed reasoning path. The model is effectively exploring many possible directions inside each forward pass before converging.\n\n### 4. No Parameter Explosion\n\nA looped model with k layers run L times achieves the quality of a kL-layer non-looped model, with only k layers worth of parameters. For Mythos-scale deployments, this matters enormously:\n\n- Memory footprint does not grow with reasoning depth\n- Inference-time compute scales with loop count, not model size\n- This makes deeper reasoning \"free\" in terms of parameters\n\n---\n\n## The Stability Problem (and How It Was Likely Solved)\n\nTraining looped models is notoriously unstable. Two failure modes dominate:\n\n- **Residual explosion** — the hidden state `h_t` grows unboundedly across loops\n- **Loss spikes** — training diverges suddenly due to large spectral norms in injection parameters\n\n### The Dynamical Systems View\n\nRecast looping as a discrete linear time-invariant (LTI) dynamical system over the residual stream. Ignoring the nonlinear Transformer contribution, the recurrence becomes:\n\n```\nh_{t+1} = A·h_t + B·e\n```\n\nFor this LTI system, stability is governed entirely by the **spectral radius** of A:\n- `ρ(A) < 1` → stable, convergent\n- `ρ(A) ≥ 1` → unstable, divergent\n\nEmpirically, every divergent training run learns `ρ(A) ≥ 1`. Every convergent run maintains `ρ(A) < 1`.\n\n### The Fix\n\nConstrain the injection parameters so that stability is guaranteed **by construction**:\n\n1. Parameterize A as a continuous negative diagonal matrix\n2. Discretize using ZOH/Euler schemes: `A_discrete = exp(Δt · A_continuous)`\n3. Enforce negativity via `A := Diag(-exp(log_A))` with a learned scalar `Δt`\n4. This ensures `ρ(A) < 1` always holds, regardless of learning rate or batch noise\n\nThe result: the looped model becomes significantly more robust to hyperparameter selection and trains cleanly even at high learning rates. This is the Parcae architecture (Prairie et al., 2026), and it represents the most likely class of solution Anthropic used to make Mythos trainable.\n\n---\n\n## Scaling Laws for Looped Models\n\nParcae establishes the first predictable scaling laws for looped training:\n\n- **Training**: For a fixed FLOP budget with fixed parameters, increasing mean recurrence and reducing token count yields a lower loss than training with minimal loops on more data. Optimal recurrence and optimal token count both follow **power laws** with consistent exponents across scales.\n- **Inference**: More test-time loops improves quality following a **predictable, saturating exponential decay** — gains are real but diminishing. This mirrors the inference-time scaling of chain-of-thought.\n\nAt 770M parameters, a looped model achieves the downstream quality of a 1.3B fixed-depth Transformer trained on the same data — roughly **half the parameters for the same quality**.\n\nApplied to Mythos: if trained under these scaling laws, Mythos could be dramatically more parameter-efficient than it appears, with a large fraction of its apparent \"capability\" coming from loop depth rather than raw parameter count.\n\n---\n\n## The Loop Index Embedding Hypothesis\n\nA key open question is whether the looped block behaves **identically** on every iteration, or whether it can learn to do different things at different loop depths.\n\nWithout any positional signal across loops, the same weights must handle both early-stage pattern matching and late-stage refinement — a tight constraint. A **RoPE-like embedding of the loop index** injected alongside the input at each step would allow the same parameters to implement functionally distinct operations across iterations, much like how RoPE allows the same attention heads to behave differently at different sequence positions.\n\nIf Mythos uses this technique, each loop is not a repetition — it is a distinct computational phase, all sharing weights but operating in different representational regimes. This would substantially increase the expressiveness of the recurrent block without increasing parameter count.\n\n---\n\n## The Overthinking Problem\n\nMore loops is not always better. Beyond a certain depth, excessive recurrence **degrades predictions** — the hidden state drifts past the solution and into noise. This is the \"overthinking\" failure mode.\n\nThe original Universal Transformer (Dehghani et al., 2018) addressed this with an **Adaptive Computation Time (ACT)** halting mechanism: a learned scalar per position that dynamically decides when to stop looping. Positions that are harder to process receive more computation; simple tokens halt early.\n\nMythos almost certainly has some version of this. The model cannot naively run the maximum number of loops on every input — it needs a learned signal for when the answer has converged. The ACT mechanism also makes the model **Turing-complete** under certain assumptions, which has theoretical implications for the class of problems it can solve.\n\n---\n\n## Mixture of Experts — Suspected for Large Parameter Counts\n\nThe looped transformer explains the depth of Mythos's reasoning, but not the breadth. Handling wildly different domains — code, math, literature, science, law — with the same weights requires **Mixture of Experts (MoE)**. The suspected design replaces every FFN in the Recurrent Block with a fine-grained MoE layer: each FFN is split into many small experts (1/m the normal size), a router selects the top-mK of them per token via learned affinity scores, and a small number of **shared experts** are always activated regardless of routing to absorb common cross-domain knowledge — syntax, basic reasoning, general context — that would otherwise be redundantly learned by every routed expert. Routing collapse is prevented through a bias term on the router logits adjusted dynamically during training, keeping load balanced across experts without distorting the loss signal. \n\nAs the hidden state `h_t` evolves across loop iterations, the router may select different expert subsets at each depth, making every loop computationally distinct despite shared weights. MoE provides breadth; looping provides depth. If the activation ratio is ~5%, Mythos could hold hundreds of billions of total parameters while activating only a small fraction per token — the true parameter count, if ever disclosed, would be a storage number, not a compute number.\n\n---\n\n## The Memorization-Reasoning Tradeoff\n\nLooped models exhibit an interesting dichotomy: looping improves reasoning but can hurt memorization. The recurrent structure is optimized for iterative composition — running a reasoning chain forward — but does not inherently improve the storage of rote facts.\n\nThis maps to an observable characteristic of Mythos: it reasons exceptionally well about novel problems it has never seen, but its factual recall can be inconsistent. The architecture is structurally biased toward composition over memorization.\n\nLooping-based regularization (Saunshi et al., 2025) can be used to balance this tradeoff during training — applying stronger looping constraints for reasoning tasks while relaxing them for retrieval tasks.\n\n---\n\n## Parameter Reuse via LoRA Adaptation\n\nA complementary approach from Relaxed Recursive Transformers (Bae et al., 2024): rather than requiring fully identical weights at every loop, add a small **depth-wise LoRA module** at each iteration. This preserves the compactness of weight sharing while allowing each loop to adapt its behavior slightly.\n\nThe result:\n- Each loop shares a large common weight matrix (the recursive base)\n- A small rank-r adaptation matrix shifts behavior per iteration depth\n- The total parameter overhead is minimal\n\nThis bridges the gap between pure weight-tying (maximally parameter-efficient, less expressive) and fully distinct layers (maximally expressive, no parameter savings). Mythos likely sits somewhere on this spectrum.\n\n---\n\n## Continuous Depth-wise Batching\n\nA downstream consequence of the recursive architecture: **Continuous Depth-wise Batching**. Because all tokens share the same recurrent block, the model can exit the loop at different depths for different tokens or sequences — processing easy inputs quickly and hard inputs with more iterations, all within the same batch.\n\nTheoretical analysis suggests 2-3x improvements in inference throughput. For a deployed model like Mythos serving many users simultaneously, this would be a substantial efficiency gain.\n\n---\n\n## Summary: What Mythos Probably Is\n\n| Property | Description |\n|---|---|\n| Architecture | Recurrent-Depth Transformer (Prelude + Looped Recurrent Block + Coda) |\n| FFN layer | Suspected MoE — fine-grained experts + always-on shared experts |\n| Parameter count | Very large total; small fraction activated per token (~5% estimate) |\n| Reasoning mechanism | Implicit multi-hop via iterative latent updates — no token output between steps |\n| Inference-time scaling | More loops = deeper reasoning, following predictable exponential decay |\n| Training stability | LTI-constrained injection parameters with spectral radius < 1 |\n| Loop differentiation | Likely uses loop-index positional embedding (à la RoPE) per iteration |\n| Halting | Adaptive Computation Time or learned convergence criterion |\n| Attention | GQA (with optional Flash Attention 2) or MLA with compressed KV latent cache |\n| Scaling law | Optimal training scales looping and data together, not parameters alone |\n| Reasoning vs. memory | Structurally biased toward composition; memorization requires separate treatment |\n| Deployment | Continuous Depth-wise Batching enables variable compute per request |\n\n---\n\n## References\n\n### Twitter / X\n\n- Why Claude Mythos is so good — looped transformer theory (Sigrid Jin): https://x.com/realsigridjin/status/2044620031410266276\n- LT implicit reasoning over parametric knowledge unlocks generalization (Yuekun Yao): https://x.com/yuekun_yao/status/2044229171627639004\n- Looped transformer cyclic trajectories and input injection (rosinality): https://x.com/rosinality/status/2043953033428541853\n- Parcae scaling laws for stable looped language models — thread (Hayden Prairie): https://x.com/hayden_prairie/status/2044453231913537927\n- RoPE-like loop index embedding idea to differentiate functions across iterations (davidad): https://x.com/davidad/status/2044453231913537927\n- On the Looped Transformers Controversy by ChrisHayduk: https://x.com/ChrisHayduk/status/2045947623572688943\n- On the Looped Transformers Controversy Summary by @realsigridjin https://x.com/realsigridjin/status/2046012743778766875\n\n\n### Papers\n\n- Fine-grained expert segmentation and shared expert isolation in MoE: https://arxiv.org/abs/2401.06066\n- Loop, Think, & Generalize — Implicit Reasoning in Recurrent Depth Transformers: https://arxiv.org/pdf/2604.07822\n- Parcae — Scaling Laws for Stable Looped Language Models: https://arxiv.org/abs/2604.12946\n- Parcae blog: https://sandyresearch.github.io/parcae/\n- Universal Transformers: https://arxiv.org/pdf/1807.03819\n- Reasoning with Latent Thoughts — On the Power of Looped Transformers: https://arxiv.org/abs/2502.17416\n- Training Large Language Models to Reason in a Continuous Latent Space: https://arxiv.org/abs/2412.06769\n- Relaxed Recursive Transformers — Effective Parameter Sharing with Layer-wise LoRA: https://arxiv.org/pdf/2410.20672\n- Mixture-of-Depths Attention: https://arxiv.org/abs/2603.15619\n- Hyperloop Transformers: https://arxiv.org/abs/2604.21254\n- The Recurrent Transformer: Greater Effective Depth and Efficient Decoding: https://arxiv.org/abs/2604.21215\n\n---\n\n## Citation\n\nIf you use OpenMythos in your research or build on this work, please cite:\n\n```bibtex\n@software{gomez2026openmythos,\n  author    = {Kye Gomez},\n  title     = {OpenMythos: A Theoretical Reconstruction of the Claude Mythos Architecture},\n  year      = {2026},\n  url       = {https://github.com/kyegomez/OpenMythos},\n  note      = {Recurrent-Depth Transformer with MoE, MLA, LTI-stable injection, and ACT halting}\n}\n```\n\n---\n\n## License\n\nMIT License — Copyright (c) 2026 Kye Gomez. See [`LICENSE`](LICENSE) for the full text.\n","summary":"OpenMythos implements a theoretical variant of Claude’s Mythos model, providing a reproducible Recurrent‑Depth Transformer (RDT) that cycles through a Prelude, a recurrent block, and a Coda.  It supports interchangeable attention modes (MLA or GQA), a sparse mixture‑of‑experts feed‑forward layer, and compute‑adaptive looping, making it a versatile playground for exploring depth‑variable reasoning and efficient transformer design.  With pre‑configured scales from 1 B to 1 T parameters and an easy‑to‑install PyPI package, researchers, ML engineers, and hobbyists can experiment with large‑scale language models without requiring proprietary code or heavy compute.  The project is community‑driven and offers a clear API for training, inference, and custom architecture tweaks.","description":"A theoretical reconstruction of the Claude Mythos architecture, built from first principles using the available research literature.","stars":11656,"language":"Python"},{"owner":"emdash-cms","repo":"emdash","url":"https://github.com/emdash-cms/emdash","readme":"# EmDash\n\nA full-stack TypeScript CMS built on [Astro](https://astro.build/) and [Cloudflare](https://www.cloudflare.com/). EmDash takes the ideas that made WordPress dominant -- extensibility, admin UX, a plugin ecosystem -- and rebuilds them on serverless, type-safe foundations. Plugins run in sandboxed Worker isolates, solving the fundamental security problem with WordPress's plugin architecture.\n\n## Get Started\n\n> [!IMPORTANT]\n> EmDash depends on Dynamic Workers to run secure sandboxed plugins. Dynamic Workers are currently only available on paid accounts. [Upgrade your account](https://www.cloudflare.com/plans/developer-platform/) (starting at $5/mo) or comment out the `worker_loaders` block of your `wrangler.jsonc` configuration file to disable plugins.\n\n```bash\nnpm create emdash@latest\n```\n\nOr deploy directly to your Cloudflare account:\n\n[![Deploy to Cloudflare](https://deploy.workers.cloudflare.com/button)](https://deploy.workers.cloudflare.com/?url=https://github.com/emdash-cms/templates/tree/main/blog-cloudflare)\n\nEmDash runs on Cloudflare (D1 + R2 + Workers) or any Node.js server with SQLite. No PHP, no separate hosting tier -- just deploy your Astro site.\n\n## Templates\n\nEmDash ships with three starter templates:\n\n<table>\n<tr>\n<td width=\"33%\" valign=\"top\">\n\n### Blog\n\n<a href=\"assets/templates/blog/latest/\"><img src=\"assets/templates/blog/latest/homepage-light-desktop.jpg\" alt=\"Blog template\" width=\"100%\"></a>\n\nA classic blog with sidebar widgets, search, and RSS.\n\n- Categories & tags\n- Full-text search\n- Comment-ready\n- RSS feed\n- Dark / light mode\n\n</td>\n<td width=\"33%\" valign=\"top\">\n\n### Marketing\n\n<a href=\"assets/templates/marketing/latest/\"><img src=\"assets/templates/marketing/latest/homepage-light-desktop.jpg\" alt=\"Marketing template\" width=\"100%\"></a>\n\nA conversion-focused landing page with pricing and contact form.\n\n- Hero with CTAs\n- Feature grid\n- Pricing cards\n- FAQ and contact form\n- Dark / light mode\n\n</td>\n<td width=\"33%\" valign=\"top\">\n\n### Portfolio\n\n<a href=\"assets/templates/portfolio/latest/\"><img src=\"assets/templates/portfolio/latest/work-light-desktop.jpg\" alt=\"Portfolio template\" width=\"100%\"></a>\n\nA visual portfolio for showcasing creative work.\n\n- Project grid\n- Tag filtering\n- Case study pages\n- RSS feed\n- Dark / light mode\n<br /><br />\n</td>\n</tr>\n</table>\n\n## Why EmDash?\n\n**WordPress was built for a different era.** Running WordPress today means managing PHP alongside JavaScript, layering caches to get acceptable performance, and knowing that [96% of WordPress security vulnerabilities come from plugins](https://patchstack.com/whitepaper/state-of-wordpress-security-in-2024/). EmDash is what WordPress would look like if you started from scratch with today's tools.\n\n**Sandboxed plugins.** WordPress plugins have full access to the database, filesystem, and user data. A single vulnerable plugin can compromise the entire site. EmDash plugins run in isolated [Worker sandboxes](https://developers.cloudflare.com/workers/runtime-apis/bindings/worker-loader/) via Dynamic Worker Loaders, each with a declared capability manifest. A plugin that requests `read:content` and `email:send` can do exactly that and nothing else.\n\n```typescript\nexport default () =>\n\tdefinePlugin({\n\t\tid: \"notify-on-publish\",\n\t\tcapabilities: [\"read:content\", \"email:send\"],\n\t\thooks: {\n\t\t\t\"content:afterSave\": async (event, ctx) => {\n\t\t\t\tif (event.content.status !== \"published\") return;\n\t\t\t\tawait ctx.email.send({\n\t\t\t\t\tto: \"editors@example.com\",\n\t\t\t\t\tsubject: `New post: ${event.content.title}`,\n\t\t\t\t});\n\t\t\t},\n\t\t},\n\t});\n```\n\n**Structured content, not serialized HTML.** WordPress stores rich text as HTML with metadata embedded in comments -- tying your content to its DOM representation. EmDash uses [Portable Text](https://www.portabletext.org/), a structured JSON format that decouples content from presentation. Your content can render as a web page, a mobile app, an email, or an API response without parsing HTML.\n\n**Built for agents.** EmDash ships with agent skills for building plugins and themes, a CLI that lets agents manage content and schema programmatically, and a built-in [MCP server](https://modelcontextprotocol.io/) so AI tools like Claude and ChatGPT can interact with your site directly.\n\n**Runs anywhere.** EmDash uses portable abstractions at every layer -- Kysely for SQL, S3 API for storage -- that work with SQLite, D1, Turso, PostgreSQL, R2, AWS S3, or local files. It runs best on Cloudflare, but it's not locked to it.\n\n## How It Works\n\nEmDash is an Astro integration. Add it to your config and you get a complete CMS: admin panel, REST API, authentication, media library, and plugin system.\n\n```typescript\n// astro.config.mjs\nimport emdash from \"emdash/astro\";\nimport { d1 } from \"emdash/db\";\n\nexport default defineConfig({\n\tintegrations: [emdash({ database: d1() })],\n});\n```\n\nContent types are defined in the database, not in code. Non-developers create and modify collections through the admin UI. Each collection gets a real SQL table with typed columns. Developers generate TypeScript types from the live schema:\n\n```bash\nnpx emdash types\n```\n\nQuery content using Astro's Live Collections -- no rebuilds, no separate API:\n\n```astro\n---\nimport { getEmDashCollection } from \"emdash\";\nconst { entries: posts } = await getEmDashCollection(\"posts\");\n---\n\n{posts.map((post) => <article>{post.data.title}</article>)}\n```\n\n## Features\n\n**Content** -- Blog posts, pages, custom content types. Rich text editing via TipTap with Portable Text storage. Revisions, drafts, scheduled publishing, full-text search (FTS5), inline visual editing.\n\n**Admin** -- Full admin panel with visual schema builder, media library (drag-drop uploads via signed URLs), navigation menus, taxonomies, widgets, and a WordPress import wizard.\n\n**Auth** -- Passkey-first (WebAuthn) with OAuth and magic link fallbacks. Role-based access control: Administrator, Editor, Author, Contributor.\n\n**Plugins** -- `definePlugin()` API with lifecycle hooks, KV storage, settings, admin pages, dashboard widgets, custom block types, and API routes. Sandboxed execution on Cloudflare via Dynamic Worker Loaders.\n\n**Agents** -- Skill files for AI-assisted plugin and theme development. CLI for programmatic site management. Built-in MCP server for direct AI tool integration.\n\n**WordPress migration** -- Import posts, pages, media, and taxonomies from WXR exports, the WordPress REST API, or WordPress.com. Agent skills help port plugins and themes.\n\n## Portable Platforms\n\n| Layer    | Cloudflare                  | Also works with                                     |\n| -------- | --------------------------- | --------------------------------------------------- |\n| Database | D1                          | SQLite, Turso/libSQL, PostgreSQL                    |\n| Storage  | R2                          | AWS S3, any S3-compatible service, local filesystem |\n| Sessions | KV                          | Redis, file-based                                   |\n| Plugins  | Worker isolates (sandboxed) | In-process (safe mode)                              |\n\n## Status\n\nEmDash is in **beta preview**. We welcome contributions, feedback, plugins, themes, and ideas.\n\n```bash\nnpm create emdash@latest\n```\n\nSee the [documentation](https://docs.emdashcms.com/) for guides, API reference, and plugin development.\n\n## Development\n\nThis is a pnpm monorepo. To contribute:\n\n```bash\ngit clone https://github.com/emdash-cms/emdash.git && cd emdash\npnpm install\npnpm build\n```\n\nRun the demo (Node.js + SQLite, no Cloudflare account needed):\n\n```bash\npnpm --filter emdash-demo seed\npnpm --filter emdash-demo dev\n```\n\nOpen the admin at [http://localhost:4321/\\_emdash/admin](http://localhost:4321/_emdash/admin).\n\n```bash\npnpm test          # run all tests\npnpm typecheck     # type check\npnpm lint:quick    # fast lint (< 1s)\npnpm format        # format with oxfmt\n```\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for the full contributor guide.\n\n## Repository Structure\n\n```\npackages/\n  core/           Astro integration, APIs, admin UI, CLI\n  auth/           Authentication library\n  blocks/         Portable Text block definitions\n  cloudflare/     Cloudflare adapter (D1, R2, Worker Loader)\n  plugins/        First-party plugins (forms, embeds, SEO, audit-log, etc.)\n  create-emdash/  npm create emdash scaffolding\n  gutenberg-to-portable-text/  WordPress block converter\n\ntemplates/        Starter templates (blog, marketing, portfolio, starter, blank)\ndemos/            Development and example sites\ndocs/             Documentation site (Starlight)\n```\n","summary":"EmDash is a full‑stack, TypeScript‑based CMS that rebuilds WordPress‑style extensibility on modern, serverless infrastructure using Astro and Cloudflare workers. It delivers secure, sandboxed plugins that run inside isolated Cloudflare Workers, each limited to a declared capability set so that a compromised plugin cannot access the rest of the site. The system stores content in Portable Text, a structured JSON format that decouples content from presentation and can be rendered on the web, mobile, or as APIs without parsing HTML. Developers who build sites on Cloudflare, appreciate type‑safe modern tooling, or need a zero‑PHP, secure CMS with ready‑to‑use blog, marketing, or portfolio templates will find EmDash a compelling alternative.","description":"EmDash is a full-stack TypeScript CMS based on Astro; the spiritual successor to WordPress","stars":10271,"language":"TypeScript"},{"owner":"google-labs-code","repo":"design.md","url":"https://github.com/google-labs-code/design.md","readme":"# DESIGN.md\n\nA format specification for describing a visual identity to coding agents. DESIGN.md gives agents a persistent, structured understanding of a design system.\n\n## The Format\n\nA DESIGN.md file combines machine-readable design tokens (YAML front matter) with human-readable design rationale (markdown prose). Tokens give agents exact values. Prose tells them *why* those values exist and how to apply them.\n\n```md\n---\nname: Heritage\ncolors:\n  primary: \"#1A1C1E\"\n  secondary: \"#6C7278\"\n  tertiary: \"#B8422E\"\n  neutral: \"#F7F5F2\"\ntypography:\n  h1:\n    fontFamily: Public Sans\n    fontSize: 3rem\n  body-md:\n    fontFamily: Public Sans\n    fontSize: 1rem\n  label-caps:\n    fontFamily: Space Grotesk\n    fontSize: 0.75rem\nrounded:\n  sm: 4px\n  md: 8px\nspacing:\n  sm: 8px\n  md: 16px\n---\n\n## Overview\n\nArchitectural Minimalism meets Journalistic Gravitas. The UI evokes a\npremium matte finish — a high-end broadsheet or contemporary gallery.\n\n## Colors\n\nThe palette is rooted in high-contrast neutrals and a single accent color.\n\n- **Primary (#1A1C1E):** Deep ink for headlines and core text.\n- **Secondary (#6C7278):** Sophisticated slate for borders, captions, metadata.\n- **Tertiary (#B8422E):** \"Boston Clay\" — the sole driver for interaction.\n- **Neutral (#F7F5F2):** Warm limestone foundation, softer than pure white.\n```\n\nAn agent that reads this file will produce a UI with deep ink headlines in Public Sans, a warm limestone background, and Boston Clay call-to-action buttons.\n\n## Getting Started\n\nValidate a DESIGN.md against the spec, catch broken token references, check WCAG contrast ratios, and surface structural findings — all as structured JSON that agents can act on.\n\n```bash\nnpx @google/design.md lint DESIGN.md\n```\n\n```json\n{\n  \"findings\": [\n    {\n      \"severity\": \"warning\",\n      \"path\": \"components.button-primary\",\n      \"message\": \"textColor (#ffffff) on backgroundColor (#1A1C1E) has contrast ratio 15.42:1 — passes WCAG AA.\"\n    }\n  ],\n  \"summary\": { \"errors\": 0, \"warnings\": 1, \"info\": 1 }\n}\n```\n\nCompare two versions of a design system to detect token-level and prose regressions:\n\n```bash\nnpx @google/design.md diff DESIGN.md DESIGN-v2.md\n```\n\n```json\n{\n  \"tokens\": {\n    \"colors\": { \"added\": [\"accent\"], \"removed\": [], \"modified\": [\"tertiary\"] },\n    \"typography\": { \"added\": [], \"removed\": [], \"modified\": [] }\n  },\n  \"regression\": false\n}\n```\n\n## The Specification\n\nThe full DESIGN.md spec lives at [`docs/spec.md`](docs/spec.md). What follows is a condensed reference.\n\n### File Structure\n\nA DESIGN.md file has two layers:\n\n1. **YAML front matter** — Machine-readable design tokens, delimited by `---` fences at the top of the file.\n2. **Markdown body** — Human-readable design rationale organized into `##` sections.\n\nThe tokens are the normative values. The prose provides context for how to apply them.\n\n### Token Schema\n\n```yaml\nversion: <string>          # optional, current: \"alpha\"\nname: <string>\ndescription: <string>      # optional\ncolors:\n  <token-name>: <Color>\ntypography:\n  <token-name>: <Typography>\nrounded:\n  <scale-level>: <Dimension>\nspacing:\n  <scale-level>: <Dimension | number>\ncomponents:\n  <component-name>:\n    <token-name>: <string | token reference>\n```\n\n### Token Types\n\n| Type | Format | Example |\n|:-----|:-------|:--------|\n| Color | `#` + hex (sRGB) | `\"#1A1C1E\"` |\n| Dimension | number + unit (`px`, `em`, `rem`) | `48px`, `-0.02em` |\n| Token Reference | `{path.to.token}` | `{colors.primary}` |\n| Typography | object with `fontFamily`, `fontSize`, `fontWeight`, `lineHeight`, `letterSpacing`, `fontFeature`, `fontVariation` | See example above |\n\n### Section Order\n\nSections use `##` headings. They can be omitted, but those present must appear in this order:\n\n| # | Section | Aliases |\n|:--|:--------|:--------|\n| 1 | Overview | Brand & Style |\n| 2 | Colors | |\n| 3 | Typography | |\n| 4 | Layout | Layout & Spacing |\n| 5 | Elevation & Depth | Elevation |\n| 6 | Shapes | |\n| 7 | Components | |\n| 8 | Do's and Don'ts | |\n\n### Component Tokens\n\nComponents map a name to a group of sub-token properties:\n\n```yaml\ncomponents:\n  button-primary:\n    backgroundColor: \"{colors.tertiary}\"\n    textColor: \"{colors.on-tertiary}\"\n    rounded: \"{rounded.sm}\"\n    padding: 12px\n  button-primary-hover:\n    backgroundColor: \"{colors.tertiary-container}\"\n```\n\nValid component properties: `backgroundColor`, `textColor`, `typography`, `rounded`, `padding`, `size`, `height`, `width`.\n\nVariants (hover, active, pressed) are expressed as separate component entries with a related key name.\n\n### Consumer Behavior for Unknown Content\n\n| Scenario | Behavior |\n|:---------|:---------|\n| Unknown section heading | Preserve; do not error |\n| Unknown color token name | Accept if value is valid |\n| Unknown typography token name | Accept as valid typography |\n| Unknown component property | Accept with warning |\n| Duplicate section heading | Error; reject the file |\n\n## CLI Reference\n\n### Installation\n\n```bash\nnpm install @google/design.md\n```\n\nOn **Windows**, quote the package name if your shell treats `@` specially (PowerShell, some terminals):\n\n```bash\nnpm install \"@google/design.md\"\n```\n\nOr run directly (always resolves from the public npm registry):\n\n```bash\nnpx @google/design.md lint DESIGN.md\n```\n\n#### `npm error ENOVERSIONS` (“No versions available for @google/design.md”)\n\nThe CLI is published as [`@google/design.md` on npm](https://www.npmjs.com/package/@google/design.md). `ENOVERSIONS` almost always means npm is not querying the public registry (custom `registry=` in `.npmrc`, a corporate mirror that has not synced this package, or a misconfigured `@google:registry` for the `@google` scope).\n\nCheck your effective registry:\n\n```bash\nnpm config get registry\n```\n\nFor a normal install from the internet it should be `https://registry.npmjs.org/`. After fixing config, retry with `npm cache clean --force` if a stale 404 was cached.\n\nAll commands accept a file path or `-` for stdin. Output defaults to JSON.\n\n> **Windows tip**: when invoking the CLI directly from a `package.json` script\n> (rather than through `npx`), use the `designmd` alias instead of `design.md`.\n> The `.md` suffix in the original bin name confuses Windows command resolution\n> with the file association for Markdown files. The `designmd` shim resolves to\n> the same entrypoint and works identically across all platforms.\n>\n> ```jsonc\n> // package.json\n> {\n>   \"scripts\": {\n>     \"design:lint\": \"designmd lint DESIGN.md\"\n>   }\n> }\n> ```\n\n### `lint`\n\nValidate a DESIGN.md file for structural correctness.\n\n```bash\nnpx @google/design.md lint DESIGN.md\nnpx @google/design.md lint --format json DESIGN.md\ncat DESIGN.md | npx @google/design.md lint -\n```\n\n| Option | Type | Default | Description |\n|:-------|:-----|:--------|:------------|\n| `file` | positional | required | Path to DESIGN.md (or `-` for stdin) |\n| `--format` | `json` | `json` | Output format |\n\nExit code `1` if errors are found, `0` otherwise.\n\n### `diff`\n\nCompare two DESIGN.md files and report token-level changes.\n\n```bash\nnpx @google/design.md diff DESIGN.md DESIGN-v2.md\n```\n\n| Option | Type | Default | Description |\n|:-------|:-----|:--------|:------------|\n| `before` | positional | required | Path to the \"before\" DESIGN.md |\n| `after` | positional | required | Path to the \"after\" DESIGN.md |\n| `--format` | `json` | `json` | Output format |\n\nExit code `1` if regressions are detected (more errors or warnings in the \"after\" file).\n\n### `export`\n\nExport DESIGN.md tokens to other formats.\n\n```bash\nnpx @google/design.md export --format json-tailwind DESIGN.md > tailwind.theme.json\nnpx @google/design.md export --format css-tailwind DESIGN.md > theme.css\nnpx @google/design.md export --format dtcg DESIGN.md > tokens.json\n```\n\n| Option | Type | Default | Description |\n|:-------|:-----|:--------|:------------|\n| `file` | positional | required | Path to DESIGN.md (or `-` for stdin) |\n| `--format` | `json-tailwind` \\| `css-tailwind` \\| `tailwind` \\| `dtcg` | required | Output format |\n\n| Format | Output | Description |\n|:-------|:-------|:------------|\n| `json-tailwind` | JSON | Tailwind v3 `theme.extend` config object |\n| `css-tailwind` | CSS | Tailwind v4 `@theme { ... }` block with CSS custom properties |\n| `tailwind` | JSON | Alias for `json-tailwind` |\n| `dtcg` | JSON | W3C Design Tokens Format Module |\n\n### `spec`\n\nOutput the DESIGN.md format specification (useful for injecting spec context into agent prompts).\n\n```bash\nnpx @google/design.md spec\nnpx @google/design.md spec --rules\nnpx @google/design.md spec --rules-only --format json\n```\n\n| Option | Type | Default | Description |\n|:-------|:-----|:--------|:------------|\n| `--rules` | boolean | `false` | Append the active linting rules table |\n| `--rules-only` | boolean | `false` | Output only the linting rules table |\n| `--format` | `markdown` \\| `json` | `markdown` | Output format |\n\n## Linting Rules\n\nThe linter runs seven rules against a parsed DESIGN.md. Each rule produces findings at a fixed severity level.\n\n| Rule | Severity | What it checks |\n|:-----|:---------|:---------------|\n| `broken-ref` | error | Token references (`{colors.primary}`) that don't resolve to any defined token |\n| `missing-primary` | warning | Colors are defined but no `primary` color exists — agents will auto-generate one |\n| `contrast-ratio` | warning | Component `backgroundColor`/`textColor` pairs below WCAG AA minimum (4.5:1) |\n| `orphaned-tokens` | warning | Color tokens defined but never referenced by any component |\n| `token-summary` | info | Summary of how many tokens are defined in each section |\n| `missing-sections` | info | Optional sections (spacing, rounded) absent when other tokens exist |\n| `missing-typography` | warning | Colors are defined but no typography tokens exist — agents will use default fonts |\n| `section-order` | warning | Sections appear out of the canonical order defined by the spec |\n\n### Programmatic API\n\nThe linter is also available as a library:\n\n```typescript\nimport { lint } from '@google/design.md/linter';\n\nconst report = lint(markdownString);\n\nconsole.log(report.findings);       // Finding[]\nconsole.log(report.summary);        // { errors, warnings, info }\nconsole.log(report.designSystem);   // Parsed DesignSystemState\n```\n\n## Design Token Interoperability\n\nDESIGN.md tokens are inspired by the [W3C Design Token Format](https://www.designtokens.org/). The `export` command converts tokens to other formats:\n\n- **Tailwind v3 config (JSON)** — `npx @google/design.md export --format json-tailwind DESIGN.md` — emits a `theme.extend` JSON object for `tailwind.config.js`. `--format tailwind` is a backwards-compatible alias.\n- **Tailwind v4 theme (CSS)** — `npx @google/design.md export --format css-tailwind DESIGN.md` — emits a CSS `@theme { ... }` block using Tailwind v4's CSS-variable token namespaces (`--color-*`, `--font-*`, `--text-*`, `--leading-*`, `--tracking-*`, `--font-weight-*`, `--radius-*`, `--spacing-*`).\n- **DTCG tokens.json** ([W3C Design Tokens Format Module](https://tr.designtokens.org/format/)) — `npx @google/design.md export --format dtcg DESIGN.md`\n\n## Status\n\nThe DESIGN.md format is at version `alpha`. The spec, token schema, and CLI are under active development. Expect changes to the format as it matures.\n\n## Disclaimer\n\nThis project is not eligible for the [Google Open Source Software Vulnerability\nRewards Program](https://bughunters.google.com/open-source-security).","summary":"The DESIGN.md project defines a concise, two‑layer format for declaring a design system that coding agents can consume. A YAML front‑matter section supplies machine‑readable design tokens—colors, typography, spacing, components—while markdown prose provides the rationale and usage notes. Built tools validate a DESIGN.md file, check WCAG contrast ratios, surface structural issues, and generate JSON reports; a diff utility compares successive versions to detect token and prose regressions. The spec is ideal for front‑end developers, design‑system engineers, and AI agents who need a persistent, structured understanding of visual identity in a UI.","description":"A format specification for describing a visual identity to coding agents. DESIGN.md gives agents a persistent, structured understanding of a design system.","stars":11508,"language":"TypeScript"},{"owner":"browser-use","repo":"browser-harness","url":"https://github.com/browser-use/browser-harness","readme":"<img src=\"https://raw.githubusercontent.com/browser-use/media/main/browser-harness/banner-ink.svg\" alt=\"Browser Harness\" width=\"100%\" />\n\n# Browser Harness ♞\n\nConnect an LLM directly to your real browser with a thin, editable CDP harness. For browser tasks where you need **complete freedom**.\n\nOne websocket to Chrome, nothing between. The agent writes what's missing during execution. The harness improves itself every run.\n\n```\n  ● agent: wants to upload a file\n  │\n  ● agent-workspace/agent_helpers.py → helper missing\n  │\n  ● agent writes it                         agent_helpers.py\n  │                                                       + custom helper\n  ✓ file uploaded\n```\n\n**You will never use the browser again.**\n\n## Setup prompt\n\nPaste into Claude Code or Codex:\n\n```text\nSet up https://github.com/browser-use/browser-harness for me.\n\nRead `install.md` and follow the steps to install browser-harness and connect it to my browser.\n```\n\nThe agent will open `chrome://inspect/#remote-debugging`. Tick the checkbox so the agent can connect to your browser:\n\n<img src=\"docs/setup-remote-debugging.png\" alt=\"Remote debugging setup\" width=\"520\" style=\"border-radius: 12px;\" />\n\nClick Allow when the per-attach popup appears (Chrome 144+):\n\n<img src=\"docs/allow-remote-debugging.png\" alt=\"Allow remote debugging popup\" width=\"520\" style=\"border-radius: 12px;\" />\n\nSee [agent-workspace/domain-skills/](agent-workspace/domain-skills/) for example tasks.\n\n## Free Browser Use Cloud browsers\n\nStealth, sub-agents, or headless deployment.<br>\n**Browser Use Cloud free tier: 3 concurrent browsers, proxies, captcha solving, and more. No card required.**\n\n- Grab a key at [cloud.browser-use.com/new-api-key](https://cloud.browser-use.com/new-api-key)\n- Or let the agent sign up itself via [docs.browser-use.com/llms.txt](https://docs.browser-use.com/llms.txt) (setup flow + challenge context included).\n\n## Architecture (~1k lines across 4 core files)\n\n- `install.md` — first-time install and browser bootstrap\n- `SKILL.md` — day-to-day usage\n- `src/browser_harness/` — protected core package\n- `agent-workspace/agent_helpers.py` — helper code the agent edits\n- `agent-workspace/domain-skills/` — reusable site-specific skills the agent edits\n\n## Contributing\n\nPRs and improvements welcome. The best way to help: **contribute a new domain skill** under [agent-workspace/domain-skills/](agent-workspace/domain-skills/) for a site or task you use often (LinkedIn outreach, ordering on Amazon, filing expenses, etc.). Each skill teaches the agent the selectors, flows, and edge cases it would otherwise have to rediscover.\n\n- **Skills are written by the harness, not by you.** Just run your task with the agent — when it figures something non-obvious out, it files the skill itself (see [SKILL.md](SKILL.md)). Please don't hand-author skill files; agent-generated ones reflect what actually works in the browser.\n- Open a PR with the generated `agent-workspace/domain-skills/<site>/` folder — small and focused is great.\n- Bug fixes, docs tweaks, and helper improvements are equally welcome.\n- Browse existing skills (`github/`, `linkedin/`, `amazon/`, ...) to see the shape.\n\nIf you're not sure where to start, open an issue and we'll point you somewhere useful.\n\n## Domain skills\n\nSet `BH_DOMAIN_SKILLS=1` to enable [agent-workspace/domain-skills/](agent-workspace/domain-skills/) — community-contributed per-site playbooks `goto_url` surfaces by domain. Contribute via PR.\n\n---\n\n[The Bitter Lesson of Agent Harnesses](https://browser-use.com/posts/bitter-lesson-agent-harnesses) · [Web Agents That Actually Learn](https://browser-use.com/posts/web-agents-that-actually-learn)\n","summary":"Browser Harness gives a large‑language‑model a direct, one‑wire connection to a real Chrome instance via the Chrome DevTools Protocol, so the agent can issue arbitrary actions without any intermediary layer. During execution the harness automatically edits and adds helper files in the workspace, allowing it to learn missing selectors, flows, or edge‑case workarounds on the fly and improve with each run. This makes it ideal for developers, researchers, and power users who need full control over browsing tasks—such as automating outreach on LinkedIn, ordering on Amazon, or filing expenses—while letting the system teach itself the required browser interactions. The project also offers a free cloud‑hosted browser tier, enabling stealth, headless, or multi‑browser deployments without manual setup.","description":"Browser Harness | Self-healing harness that enables LLMs to complete any task.","stars":10264,"language":"Python"},{"owner":"h4ckf0r0day","repo":"obscura","url":"https://github.com/h4ckf0r0day/obscura","readme":"<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/h4ckf0r0day/obscura/main/assets/icon.png\" alt=\"Obscura\" width=\"80\" />\n</p>\n\n<h2 align=\"center\">Obscura</h2>\n\n<p align=\"center\">\n  <strong>The open-source headless browser for AI agents and web scraping.</strong><br>\n  Lightweight, stealthy, and built in Rust.\n</p>\n\n---\n\nObscura is a headless browser engine written in Rust, built for web scraping and AI agent automation. It runs real JavaScript via V8, supports the Chrome DevTools Protocol, and acts as a drop-in replacement for headless Chrome with Puppeteer and Playwright.\n\n### Why Obscura over headless Chrome?\n\nDesigned for automation at scale, not desktop browsing.\n\n| Metric       | Obscura      | Headless Chrome |\n|--------------|--------------|------------------|\n| Memory       | **30 MB**    | 200+ MB          |\n| Binary size  | **70 MB**    | 300+ MB          |\n| Anti-detect  | **Built-in** | None          |\n| Page load    | **85 ms**    | ~500 ms          |\n| Startup      | **Instant**  | ~2s              |\n| Puppeteer    | **Yes**      | Yes              |\n| Playwright   | **Yes**      | Yes              |\n\n## Install\n\n### Download\n\nGrab the latest binary from [Releases](https://github.com/h4ckf0r0day/obscura/releases):\n\n```bash\n# Linux x86_64\ncurl -LO https://github.com/h4ckf0r0day/obscura/releases/latest/download/obscura-x86_64-linux.tar.gz\ntar xzf obscura-x86_64-linux.tar.gz\n./obscura fetch https://example.com --eval \"document.title\"\n\n# macOS Apple Silicon\ncurl -LO https://github.com/h4ckf0r0day/obscura/releases/latest/download/obscura-aarch64-macos.tar.gz\ntar xzf obscura-aarch64-macos.tar.gz\n\n# macOS Intel\ncurl -LO https://github.com/h4ckf0r0day/obscura/releases/latest/download/obscura-x86_64-macos.tar.gz\ntar xzf obscura-x86_64-macos.tar.gz\n\n# Windows\nDownload the `.zip` from the releases page and extract it manually.\n```\n\nNo Chrome, no Node.js, no dependencies. Release archives include both\n`obscura` and `obscura-worker`; keep them in the same directory for the\nparallel `scrape` command.\n\nLinux release builds target Ubuntu 22.04 so the downloaded binary remains\nusable on common LTS servers with glibc 2.35+.\n\n### Build from source\n\n```bash\ngit clone https://github.com/h4ckf0r0day/obscura.git\ncd obscura\ncargo build --release\n\n# With stealth mode (anti-detection + tracker blocking)\ncargo build --release --features stealth\n```\n\nRequires Rust 1.75+ ([rustup.rs](https://rustup.rs)). First build takes ~5 min (V8 compiles from source, cached after).\n\n## Quick Start\n\n### Fetch a page\n\n```bash\n# Get the page title\nobscura fetch https://example.com --eval \"document.title\"\n\n# Extract all links\nobscura fetch https://example.com --dump links\n\n# Render JavaScript and dump HTML\nobscura fetch https://news.ycombinator.com --dump html\n\n# Wait for dynamic content\nobscura fetch https://example.com --wait-until networkidle0\n\n# Bound navigation time for slow or broken pages\nobscura fetch https://example.com --timeout 10\n```\n\n### Start the CDP server\n\n```bash\nobscura serve --port 9222\n\n# With stealth mode (anti-detection + tracker blocking)\nobscura serve --port 9222 --stealth\n```\n\n### Scrape in parallel\n\n```bash\nobscura scrape url1 url2 url3 ... \\\n  --concurrency 25 \\\n  --eval \"document.querySelector('h1').textContent\" \\\n  --format json\n```\n\n## Puppeteer / Playwright\n\n### Puppeteer\n\n```bash\nnpm install puppeteer-core\n```\n\n```javascript\nimport puppeteer from 'puppeteer-core';\n\nconst browser = await puppeteer.connect({\n  browserWSEndpoint: 'ws://127.0.0.1:9222/devtools/browser',\n});\n\nconst page = await browser.newPage();\nawait page.goto('https://news.ycombinator.com');\n\nconst stories = await page.evaluate(() =>\n  Array.from(document.querySelectorAll('.titleline > a'))\n    .map(a => ({ title: a.textContent, url: a.href }))\n);\nconsole.log(stories);\n\nawait browser.disconnect();\n```\n\n### Playwright\n\n```bash\nnpm install playwright-core\n```\n\n```javascript\nimport { chromium } from 'playwright-core';\n\nconst browser = await chromium.connectOverCDP({\n  endpointURL: 'ws://127.0.0.1:9222',\n});\n\nconst page = await browser.newContext().then(ctx => ctx.newPage());\nawait page.goto('https://en.wikipedia.org/wiki/Web_scraping');\nconsole.log(await page.title());\n\nawait browser.close();\n```\n\n### Form submission & login\n\n```javascript\nawait page.goto('https://quotes.toscrape.com/login');\nawait page.evaluate(() => {\n  document.querySelector('#username').value = 'admin';\n  document.querySelector('#password').value = 'admin';\n  document.querySelector('form').submit();\n});\n// Obscura handles the POST, follows the 302 redirect, maintains cookies\n```\n\n## Benchmarks\n\nPage load:\n\n| Page | Obscura | Chrome |\n|------|---------|--------|\n| Static HTML | **51 ms** | ~500 ms |\n| JS + XHR + fetch | **84 ms** | ~800 ms |\n| Dynamic scripts | **78 ms** | ~700 ms |\n\n## Stealth Mode\n\nEnable with `--features stealth`.\n\n### Anti-fingerprinting\n- Per-session fingerprint randomization (GPU, screen, canvas, audio, battery)\n- Realistic `navigator.userAgentData` (Chrome 145, high-entropy values)\n- `event.isTrusted = true` for dispatched events\n- Hidden internal properties (`Object.keys(window)` safe)\n- Native function masking (`Function.prototype.toString()` → `[native code]`)\n- `navigator.webdriver = undefined` (matches real Chrome)\n\n### Tracker Blocking\n- 3,520 domains blocked\n- Blocks analytics, ads, telemetry, and fingerprinting scripts\n- Prevents trackers from loading entirely\n- Enabled automatically with `--stealth`\n\n## CDP API\n\nObscura implements the Chrome DevTools Protocol for Puppeteer/Playwright compatibility.\n\n| Domain | Methods |\n|--------|---------|\n| **Target** | createTarget, closeTarget, attachToTarget, createBrowserContext, disposeBrowserContext |\n| **Page** | navigate, getFrameTree, addScriptToEvaluateOnNewDocument, lifecycleEvents |\n| **Runtime** | evaluate, callFunctionOn, getProperties, addBinding |\n| **DOM** | getDocument, querySelector, querySelectorAll, getOuterHTML, resolveNode |\n| **Network** | enable, setCookies, getCookies, setExtraHTTPHeaders, setUserAgentOverride |\n| **Fetch** | enable, continueRequest, fulfillRequest, failRequest (live interception) |\n| **Storage** | getCookies, setCookies, deleteCookies |\n| **Input** | dispatchMouseEvent, dispatchKeyEvent |\n| **LP** | getMarkdown (DOM-to-Markdown conversion) |\n## CLI Reference\n\n### `obscura serve`\n\nStart a CDP WebSocket server.\n\n| Flag | Default | Description |\n|------|---------|-------------|\n| `--port` | `9222` | WebSocket port |\n| `--proxy` | — | HTTP/SOCKS5 proxy URL |\n| `--stealth` | off | Enable anti-detection + tracker blocking |\n| `--workers` | `1` | Number of parallel worker processes |\n| `--obey-robots` | off | Respect robots.txt |\n\n### `obscura fetch <URL>`\n\nFetch and render a single page.\n\n| Flag | Default | Description |\n|------|---------|-------------|\n| `--dump` | `html` | Output: `html`, `text`, or `links` |\n| `--eval` | — | JavaScript expression to evaluate |\n| `--wait-until` | `load` | Wait: `load`, `domcontentloaded`, `networkidle0` |\n| `--timeout` | `30` | Maximum navigation time in seconds |\n| `--selector` | — | Wait for CSS selector |\n| `--stealth` | off | Anti-detection mode |\n| `--quiet` | off | Suppress banner |\n\n### `obscura scrape <URL...>`\n\nScrape multiple URLs in parallel with worker processes.\n\n| Flag | Default | Description |\n|------|---------|-------------|\n| `--concurrency` | `10` | Parallel workers |\n| `--eval` | — | JS expression per page |\n| `--format` | `json` | Output: `json` or `text` |\n\n## License\n\nApache 2.0\n\n---\n","summary":"Obscura is a lightweight, open‑source headless browser engine written in Rust, designed for AI agent automation and web scraping workloads. It executes real JavaScript via V8, implements the Chrome DevTools Protocol, and can be used as a drop‑in replacement for headless Chrome with Puppeteer or Playwright, featuring built‑in stealth modes, tracker blocking, and minimal memory usage. The tool offers fast startup, sub‑second page loads, and concurrent scraping commands, making it ideal for developers building large‑scale, scalable web‑automation pipelines. Anyone who needs a dependable, low‑resource browser engine for server‑side automation without the overhead of Chrome or Node.js will benefit from Obscura’s performance‑optimized Rust implementation.","description":"The headless browser for AI agents and web scraping","stars":10040,"language":"Rust"},{"owner":"JackChen-me","repo":"open-multi-agent","url":"https://github.com/JackChen-me/open-multi-agent","readme":"<br />\n\n<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://raw.githubusercontent.com/JackChen-me/open-multi-agent/main/.github/brand/logo-mark-dark.svg\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://raw.githubusercontent.com/JackChen-me/open-multi-agent/main/.github/brand/logo-mark-light.svg\">\n    <img alt=\"Open Multi-Agent\" src=\"https://raw.githubusercontent.com/JackChen-me/open-multi-agent/main/.github/brand/logo-mark-light.svg\" width=\"96\">\n  </picture>\n</p>\n\n<br />\n\n<h1 align=\"center\">Open Multi-Agent</h1>\n\n<p align=\"center\">\n  <strong>From a goal to a task DAG, automatically.</strong><br/>\n  TypeScript-native multi-agent orchestration. Three runtime dependencies.<br/>\n  10 native LLM adapters · MCP · token budgets · retries · context compaction · live tracing.\n</p>\n\n<p align=\"center\">\n  <a href=\"https://www.npmjs.com/package/@jackchen_me/open-multi-agent\"><img src=\"https://img.shields.io/npm/v/@jackchen_me/open-multi-agent\" alt=\"npm version\"></a>\n  <a href=\"./LICENSE\"><img src=\"https://img.shields.io/github/license/JackChen-me/open-multi-agent\" alt=\"license\"></a>\n  <a href=\"https://www.typescriptlang.org/\"><img src=\"https://img.shields.io/badge/TypeScript-5.6-blue\" alt=\"TypeScript\"></a>\n  <a href=\"https://codecov.io/gh/JackChen-me/open-multi-agent\"><img src=\"https://codecov.io/gh/JackChen-me/open-multi-agent/graph/badge.svg\" alt=\"codecov\"></a>\n  <a href=\"https://github.com/JackChen-me/open-multi-agent/blob/main/package.json\"><img src=\"https://img.shields.io/badge/runtime_deps-3-brightgreen\" alt=\"runtime deps\"></a>\n  <a href=\"https://github.com/JackChen-me/open-multi-agent/stargazers\"><img src=\"https://img.shields.io/github/stars/JackChen-me/open-multi-agent\" alt=\"GitHub stars\"></a>\n  <a href=\"https://github.com/JackChen-me/open-multi-agent/network/members\"><img src=\"https://img.shields.io/github/forks/JackChen-me/open-multi-agent\" alt=\"GitHub forks\"></a>\n</p>\n\n<p align=\"center\">\n  <strong>English</strong> · <a href=\"./README_zh.md\">中文</a>\n</p>\n\n<br />\n\n`open-multi-agent` is a multi-agent orchestration framework for TypeScript backends. Give it a goal; a coordinator agent decomposes it into a task DAG, parallelizes independents, and synthesizes the result. Three runtime dependencies, drops into any Node.js backend.\n\n> **Your engineers describe the goal, not the graph.**\n\nA typical run, streamed live through `onProgress`:\n\n```\nagent_start coordinator\ntask_start design-api\ntask_complete design-api\ntask_start implement-handlers\ntask_start scaffold-tests         // independent tasks run in parallel\ntask_complete scaffold-tests\ntask_complete implement-handlers\ntask_start review-code            // unblocked after implementation\ntask_complete review-code\nagent_complete coordinator        // synthesizes final result\nSuccess: true\nTokens: 12847 output tokens\n```\n\n## Features\n\n| Capability | What you get |\n|------------|--------------|\n| **Goal-driven coordinator** | One `runTeam(team, goal)` call. The coordinator decomposes the goal into a task DAG, parallelizes independents, and synthesizes the result. |\n| **Mix providers in one team** | 10 native: Anthropic, OpenAI, Azure, Bedrock, Gemini, Grok, DeepSeek, MiniMax, Qiniu, Copilot. Ollama / vLLM / LM Studio / OpenRouter / Groq via OpenAI-compatible. ([full list](#supported-providers)) |\n| **Tools + MCP** | 6 built-in (`bash`, `file_*`, `grep`, `glob`), opt-in `delegate_to_agent`, custom tools via `defineTool()` + Zod, any MCP server via `connectMCPTools()`. |\n| **Streaming + structured output** | Token-by-token streaming on every adapter; Zod-validated final answer with auto-retry on parse failure. ([`structured-output`](examples/patterns/structured-output.ts)) |\n| **Observability** | `onProgress` events, `onTrace` spans, post-run HTML dashboard rendering the executed task DAG. ([`trace-observability`](examples/integrations/trace-observability.ts)) |\n| **Pluggable shared memory** | Default in-process KV; swap in Redis / Postgres / your own backend by implementing `MemoryStore`. |\n\nProduction controls (context strategies, task retry with backoff, loop detection, tool output truncation/compression) are covered in the [Production Checklist](#production-checklist).\n\n## Quick Start\n\nRequires Node.js >= 18.\n\n### Try it locally\n\nClone, install, run.\n\n```bash\ngit clone https://github.com/JackChen-me/open-multi-agent && cd open-multi-agent\nnpm install\nexport ANTHROPIC_API_KEY=sk-...\nnpx tsx examples/basics/team-collaboration.ts\n```\n\nThree agents (architect, developer, reviewer) collaborate on a REST API in `/tmp/express-api/`. You watch the coordinator decompose the goal and run independent tasks in parallel as the progress events stream in.\n\nLocal models via Ollama need no API key, see [`providers/ollama`](examples/providers/ollama.ts). For other providers (`OPENAI_API_KEY`, `GEMINI_API_KEY`, etc.), check [Supported Providers](#supported-providers).\n\n### Use it in your project\n\n```bash\nnpm install @jackchen_me/open-multi-agent\n```\n\nThree agents, one goal. The framework handles the rest:\n\n```typescript\nimport { OpenMultiAgent } from '@jackchen_me/open-multi-agent'\nimport type { AgentConfig } from '@jackchen_me/open-multi-agent'\n\nconst architect: AgentConfig = {\n  name: 'architect',\n  model: 'claude-sonnet-4-6',\n  systemPrompt: 'You design clean API contracts and file structures.',\n  tools: ['file_write'],\n}\n\nconst developer: AgentConfig = {\n  name: 'developer',\n  model: 'claude-sonnet-4-6',\n  systemPrompt: 'You implement what the architect specifies. Write clean, runnable TypeScript.',\n  tools: ['bash', 'file_read', 'file_write', 'file_edit'],\n}\n\nconst reviewer: AgentConfig = {\n  name: 'reviewer',\n  model: 'claude-sonnet-4-6',\n  systemPrompt: 'You review code for correctness, security, and clarity.',\n  tools: ['file_read', 'grep'],\n}\n\nconst orchestrator = new OpenMultiAgent({\n  defaultModel: 'claude-sonnet-4-6',\n  onProgress: (event) => console.log(event.type, event.task ?? event.agent ?? ''),\n})\n\nconst team = orchestrator.createTeam('api-team', {\n  name: 'api-team',\n  agents: [architect, developer, reviewer],\n  sharedMemory: true,\n})\n\n// Describe a goal. The framework breaks it into tasks and orchestrates execution\nconst result = await orchestrator.runTeam(team, 'Create a REST API for a todo list in /tmp/todo-api/')\n\nconsole.log(`Success: ${result.success}`)\nconsole.log(`Tokens: ${result.totalTokenUsage.output_tokens} output tokens`)\n```\n\n### Three Ways to Run\n\n| Mode | Method | When to use | Example |\n|------|--------|-------------|---------|\n| Single agent | `runAgent()` | One agent, one prompt. Simplest entry point | [`basics/single-agent`](examples/basics/single-agent.ts) |\n| Auto-orchestrated team | `runTeam()` | Give a goal, framework plans and executes | [`basics/team-collaboration`](examples/basics/team-collaboration.ts) |\n| Explicit pipeline | `runTasks()` | You define the task graph and assignments | [`basics/task-pipeline`](examples/basics/task-pipeline.ts) |\n\nFor MapReduce-style fan-out without task dependencies, use `AgentPool.runParallel()` directly. See [`patterns/fan-out-aggregate`](examples/patterns/fan-out-aggregate.ts).\n\n### Preview the plan without running it\n\nPass `planOnly: true` to `runTeam()` and the coordinator decomposes the goal but no task agents execute. The result carries `planOnly: true`, populated `tasks` (no metrics), and only the coordinator's token usage. Useful for asserting on the task DAG in integration tests, or previewing cost before a real run.\n\n```ts\nconst plan = await orchestrator.runTeam(team, goal, { planOnly: true })\n\nfor (const task of plan.tasks ?? []) {\n  console.log(`${task.title} → ${task.assignee} (deps: ${task.dependsOn.length})`)\n}\n```\n\n### Run from the shell\n\nFor shell and CI, the package exposes a JSON-first binary. See [docs/cli.md](./docs/cli.md) for `oma run`, `oma task`, `oma provider`, exit codes, and file formats.\n\n## Examples\n\n[`examples/`](./examples/) is organized by category: basics, cookbook, patterns, providers, integrations, and production. See [`examples/README.md`](./examples/README.md) for the full index.\n\n### Real-world workflows ([`cookbook/`](./examples/cookbook/))\n\nEnd-to-end scenarios you can run today. Each one is a complete, opinionated workflow.\n\n- [`contract-review-dag`](examples/cookbook/contract-review-dag.ts): four-task DAG for contract review with parallel branches and step-level retry on failure.\n- [`meeting-summarizer`](examples/cookbook/meeting-summarizer.ts): three specialised agents fan out on a transcript, an aggregator merges them into one Markdown report with action items and sentiment.\n- [`competitive-monitoring`](examples/cookbook/competitive-monitoring.ts): three parallel source agents extract claims from feeds; an aggregator cross-checks them and flags contradictions.\n- [`translation-backtranslation`](examples/cookbook/translation-backtranslation.ts): translate EN to target with one provider, back-translate with another, flag semantic drift.\n\n### Patterns and integrations\n\n- [`basics/team-collaboration`](examples/basics/team-collaboration.ts): `runTeam()` coordinator pattern.\n- [`patterns/structured-output`](examples/patterns/structured-output.ts): any agent returns Zod-validated JSON.\n- [`patterns/agent-handoff`](examples/patterns/agent-handoff.ts): synchronous sub-agent delegation via `delegate_to_agent`.\n- [`integrations/trace-observability`](examples/integrations/trace-observability.ts): `onTrace` spans for LLM calls, tools, and tasks.\n- [`integrations/mcp-github`](examples/integrations/mcp-github.ts): expose an MCP server's tools to an agent via `connectMCPTools()`.\n- [`integrations/with-vercel-ai-sdk`](examples/integrations/with-vercel-ai-sdk/): Next.js app combining OMA `runTeam()` with AI SDK `useChat` streaming.\n- **Provider examples**: three-agent teams under [`examples/providers/`](examples/providers/), including hosted providers, OpenAI-compatible endpoints, and local models.\n\nRun any script with `npx tsx examples/<path>.ts`.\n\n## How is this different from X?\n\nA quick router. Mechanism breakdown follows.\n\n| If you need | Pick |\n|-------------|------|\n| Fixed production topology with mature checkpointing | [LangGraph JS](https://github.com/langchain-ai/langgraphjs) |\n| Explicit Supervisor + hand-wired workflows | [Mastra](https://github.com/mastra-ai/mastra) |\n| Python stack with mature multi-agent ecosystem | [CrewAI](https://github.com/crewAIInc/crewAI) |\n| Single-agent LLM call layer for 60+ providers | [Vercel AI SDK](https://github.com/vercel/ai) |\n| **TypeScript, goal to result with auto task decomposition** | **open-multi-agent** |\n\n**vs. LangGraph JS.** LangGraph compiles a declarative graph (nodes, edges, conditional routing) into an invokable. `open-multi-agent` runs a Coordinator that decomposes the goal into a task DAG at runtime, then auto-parallelizes independents. Same end (orchestrated execution), opposite directions: LangGraph is graph-first, OMA is goal-first.\n\n**vs. Mastra.** Both are TypeScript-native. Mastra's Supervisor pattern requires you to wire agents and workflows by hand; OMA's Coordinator does the wiring at runtime from the goal string. If the workflow is known up front, Mastra's explicitness pays off. If you'd rather not enumerate every step, OMA's `runTeam(team, goal)` is one call.\n\n**vs. CrewAI.** CrewAI is the mature multi-agent option in Python. OMA targets TypeScript backends with three runtime dependencies and direct Node.js embedding. Roughly comparable orchestration surface; the choice is language stack.\n\n**vs. Vercel AI SDK.** AI SDK is the LLM call layer (unified client for 60+ providers, streaming, tool calls, structured outputs). It does not orchestrate multi-agent teams. The two compose: AI SDK for single-agent work, OMA when you need a team.\n\n## Ecosystem\n\n`open-multi-agent` launched 2026-04-01 under MIT. Public users and integrations to date:\n\n### In production\n\n- **[temodar-agent](https://github.com/xeloxa/temodar-agent)** (~60 stars). WordPress security analysis platform by [Ali Sünbül](https://github.com/xeloxa). Uses our built-in tools (`bash`, `file_*`, `grep`) directly in its Docker runtime. Confirmed production use.\n- **Cybersecurity SOC (home lab).** A private setup running Qwen 2.5 + DeepSeek Coder entirely offline via Ollama, building an autonomous SOC pipeline on Wazuh + Proxmox. Early user, not yet public.\n\nUsing `open-multi-agent` in production or a side project? [Open a discussion](https://github.com/JackChen-me/open-multi-agent/discussions) and we will list it here.\n\n### Integrations\n\n- **[Engram](https://www.engram-memory.com)** — \"Git for AI memory.\" Syncs knowledge across agents instantly and flags conflicts. ([repo](https://github.com/Agentscreator/engram-memory))\n- **[@agentsonar/oma](https://github.com/agentsonar/agentsonar-oma)** — Sidecar detecting cross-run delegation cycles, repetition, and rate bursts.\n\nBuilt an integration? [Open a discussion](https://github.com/JackChen-me/open-multi-agent/discussions) to get listed.\n\n### Featured partner\n\nFor products and platforms with a deep `open-multi-agent` integration. See the [Featured partner program](./docs/featured-partner.md) for terms and how to apply.\n\n## Architecture\n\n```\n┌─────────────────────────────────────────────────────────────────┐\n│  OpenMultiAgent (Orchestrator)                                  │\n│                                                                 │\n│  createTeam()  runTeam()  runTasks()  runAgent()  getStatus()   │\n└──────────────────────┬──────────────────────────────────────────┘\n                       │\n            ┌──────────▼──────────┐\n            │  Team               │\n            │  - AgentConfig[]    │\n            │  - MessageBus       │\n            │  - TaskQueue        │\n            │  - SharedMemory     │\n            └──────────┬──────────┘\n                       │\n         ┌─────────────┴─────────────┐\n         │                           │\n┌────────▼──────────┐    ┌───────────▼───────────┐\n│  AgentPool        │    │  TaskQueue             │\n│  - Semaphore      │    │  - dependency graph    │\n│  - runParallel()  │    │  - auto unblock        │\n└────────┬──────────┘    │  - cascade failure     │\n         │               └───────────────────────┘\n┌────────▼──────────┐\n│  Agent            │\n│  - run()          │    ┌────────────────────────┐\n│  - prompt()       │───►│  LLMAdapter            │\n│  - stream()       │    │  - AnthropicAdapter    │\n└────────┬──────────┘    │  - OpenAIAdapter       │\n         │               │  - AzureOpenAIAdapter  │\n         │               │  - BedrockAdapter      │\n         │               │  - CopilotAdapter      │\n         │               │  - GeminiAdapter       │\n         │               │  - GrokAdapter         │\n         │               │  - MiniMaxAdapter      │\n         │               │  - DeepSeekAdapter     │\n         │               │  - QiniuAdapter        │\n         │               └────────────────────────┘\n┌────────▼──────────┐\n│  AgentRunner      │    ┌──────────────────────┐\n│  - conversation   │───►│  ToolRegistry        │\n│    loop           │    │  - defineTool()      │\n│  - tool dispatch  │    │  - 6 built-in tools  │\n└───────────────────┘    │  + delegate (opt-in) │\n                         └──────────────────────┘\n```\n\n## Observability\n\nThree layers of telemetry, each independently consumable.\n\n| Layer | What it gives you | Where to wire it |\n|-------|-------------------|------------------|\n| **`onProgress`** | Per-task lifecycle events: `task_start`, `task_complete`, `task_retry`, `task_skipped`, `agent_start`, `agent_complete`, `budget_exceeded`, `error`. Lightweight, sync. | `OrchestratorConfig.onProgress`; pipe to your logger or a live dashboard. |\n| **`onTrace`** | Structured spans for LLM calls, tool executions, and tasks. Each span carries parent IDs, durations, token counts, and tool I/O. | `OrchestratorConfig.onTrace`; forward to OpenTelemetry, Datadog, Honeycomb, Langfuse, etc. ([`integrations/trace-observability`](examples/integrations/trace-observability.ts)) |\n| **Post-run HTML dashboard** | Static HTML page rendering the executed task DAG with timing, token usage, and per-task status. No server, no D3, just `string`. | `import { renderTeamRunDashboard } from '@jackchen_me/open-multi-agent'`, then `fs.writeFileSync('run.html', renderTeamRunDashboard(result))`. |\n\nTogether: live progress for ops, traces for debugging and cost attribution, a shareable post-mortem artifact for any run.\n\n## Built-in Tools\n\n| Tool | Description |\n|------|-------------|\n| `bash` | Execute shell commands. Returns stdout + stderr. Supports timeout and cwd. |\n| `file_read` | Read file contents at an absolute path. Supports offset/limit for large files. |\n| `file_write` | Write or create a file. Auto-creates parent directories. |\n| `file_edit` | Edit a file by replacing an exact string match. |\n| `grep` | Search file contents with regex. Uses ripgrep when available, falls back to Node.js. |\n| `glob` | Find files by glob pattern. Returns matching paths sorted by modification time. |\n\n## Tool Configuration\n\n- **Pick a preset.** `toolPreset: 'readonly' | 'readwrite' | 'full'` covers most agents.\n- **Narrow further.** Combine `tools` (allowlist) and `disallowedTools` (denylist) on top of the preset.\n- **Bring your own.** `defineTool()` + `customTools`, or `agent.addTool()` at runtime.\n- **Cap output cost.** `outputSchema`, `maxToolOutputChars`, and `compressToolResults`.\n- **MCP.** Connect external servers via `connectMCPTools()` from `open-multi-agent/mcp`.\n\nFull details in [docs/tool-configuration.md](./docs/tool-configuration.md).\n\n## Shared Memory\n\nTeams can share a namespaced key-value store so later agents see earlier agents' findings. Use `sharedMemory: true` for the default in-process store, or implement `MemoryStore` and pass it via `sharedMemoryStore` for Redis, Postgres, Engram, etc. Keys are namespaced as `<agentName>/<key>` before they reach the store. SDK-only: the CLI cannot pass runtime objects.\n\nSee [docs/shared-memory.md](./docs/shared-memory.md).\n\n## Context Management\n\nLong-running agents hit input token ceilings fast. `AgentConfig.contextStrategy` controls how the conversation shrinks:\n\n- `sliding-window`: keep the last N turns, drop the rest. Cheapest.\n- `summarize`: send old turns to a summary model, keep the summary in place.\n- `compact`: rule-based truncation, no extra LLM call.\n- `custom`: supply your own `compress(messages, estimatedTokens)`.\n\nSee [docs/context-management.md](./docs/context-management.md).\n\n## Supported Providers\n\nChange `provider`, `model`, and set the env var. The agent config shape stays the same:\n\n```typescript\nconst agent: AgentConfig = {\n  name: 'my-agent',\n  provider: 'anthropic',\n  model: 'claude-sonnet-4-6',\n  systemPrompt: 'You are a helpful assistant.',\n}\n```\n\n### First-class providers (named shortcuts)\n\nThe framework ships a wired-in provider name for each of these. You set `provider` and the env var, that's it.\n\n> Under the hood, Anthropic and Gemini use their own SDKs; the rest are pre-configured shortcuts on top of the OpenAI Chat Completions protocol. Same wire format as the second table, the framework just wrote the `baseURL` for you.\n\n| Provider | Config | Env var | Example model | Notes |\n|----------|--------|---------|--------------|-------|\n| Anthropic (Claude) | `provider: 'anthropic'` | `ANTHROPIC_API_KEY` | `claude-sonnet-4-6` | Native Anthropic SDK. |\n| Gemini | `provider: 'gemini'` | `GEMINI_API_KEY` | `gemini-2.5-pro` | Native Google GenAI SDK. Requires `npm install @google/genai`. |\n| OpenAI (GPT) | `provider: 'openai'` | `OPENAI_API_KEY` | `gpt-4o` | |\n| Azure OpenAI | `provider: 'azure-openai'` | `AZURE_OPENAI_API_KEY`, `AZURE_OPENAI_ENDPOINT` | `gpt-4` | Optional `AZURE_OPENAI_API_VERSION`, `AZURE_OPENAI_DEPLOYMENT`. |\n| GitHub Copilot | `provider: 'copilot'` | `GITHUB_COPILOT_TOKEN` (falls back to `GITHUB_TOKEN`) | `gpt-4o` | Custom token-exchange flow on top of OpenAI protocol. |\n| Grok (xAI) | `provider: 'grok'` | `XAI_API_KEY` | `grok-4` | OpenAI-compatible; endpoint is `api.x.ai/v1`. |\n| DeepSeek | `provider: 'deepseek'` | `DEEPSEEK_API_KEY` | `deepseek-chat` | OpenAI-compatible. `deepseek-chat` (V3, coding) or `deepseek-reasoner` (thinking mode). |\n| MiniMax (global) | `provider: 'minimax'` | `MINIMAX_API_KEY` | `MiniMax-M2.7` | OpenAI-compatible. |\n| MiniMax (China) | `provider: 'minimax'` + `MINIMAX_BASE_URL` | `MINIMAX_API_KEY` | `MiniMax-M2.7` | Set `MINIMAX_BASE_URL=https://api.minimaxi.com/v1`. |\n| Qiniu | `provider: 'qiniu'` | `QINIU_API_KEY` | `deepseek-v3` | OpenAI-compatible. Endpoint `https://api.qnaigc.com/v1`; multiple model families, see [Qiniu AI docs](https://developer.qiniu.com/aitokenapi/12882/ai-inference-api). |\n| AWS Bedrock | `provider: 'bedrock'` | none (AWS SDK credential chain) | `anthropic.claude-3-5-haiku-20241022-v1:0` | No API key. Set `AWS_REGION` or pass `region` as the 4th arg to `createAdapter`. Credentials from env vars, shared config, or IAM role. Newer Claude models (Sonnet 4.x, Haiku 4.x) require a cross-region inference profile prefix like `us.` — check the Bedrock console for IDs available in your region. Also supports Llama, Mistral, Cohere — see [`providers/bedrock`](examples/providers/bedrock.ts) example. Requires `npm install @aws-sdk/client-bedrock-runtime`. |\n\n### Anything else OpenAI-compatible (manual `baseURL`)\n\nNo bundled shortcut, but it works the same. Use `provider: 'openai'` and point `baseURL` at any server that speaks OpenAI Chat Completions.\n\n| Service | Config | Env var | Example model |\n|---------|--------|---------|---------------|\n| Ollama (local) | `provider: 'openai'` + `baseURL: 'http://localhost:11434/v1'` | none | `llama3.1` |\n| vLLM (local) | `provider: 'openai'` + `baseURL` | none | (server-loaded) |\n| LM Studio (local) | `provider: 'openai'` + `baseURL` | none | (server-loaded) |\n| llama.cpp server (local) | `provider: 'openai'` + `baseURL` | none | (server-loaded) |\n| OpenRouter | `provider: 'openai'` + `baseURL: 'https://openrouter.ai/api/v1'` + `apiKey` | `OPENROUTER_API_KEY` | `openai/gpt-4o-mini` |\n| Groq | `provider: 'openai'` + `baseURL: 'https://api.groq.com/openai/v1'` | `GROQ_API_KEY` | `llama-3.3-70b-versatile`
