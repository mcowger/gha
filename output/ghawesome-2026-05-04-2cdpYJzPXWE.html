gent metadata for compatible runtimes\n├── fixtures/\n│   ├── mem0-style1.json         # Style 1 regression fixture\n│   ├── tool-call-style2.json    # Style 2 regression fixture\n│   └── ...                      # Additional sample-grade fixtures per style\n├── scripts/\n│   ├── generate-diagram.sh       # Validate SVG + export PNG\n│   ├── generate-from-template.py # Create starter SVGs from templates\n│   ├── validate-svg.sh           # Validate SVG syntax\n│   └── test-all-styles.sh        # Batch test all styles\n├── assets/\n│   └── samples/                  # Showcase diagram PNGs\n├── templates/\n│   ├── architecture.svg         # Architecture starter template\n│   ├── data-flow.svg            # Data-flow starter template\n│   └── ...                      # Additional diagram templates\n└── agentloop-core.svg           # Included sample SVG\n```\n\n---\n\n## Product Icon Coverage\n\n**AI/ML:** OpenAI, Anthropic/Claude, Google Gemini, Meta LLaMA, Mistral, Cohere, Groq, Hugging Face\n\n**AI Frameworks:** Mem0, LangChain, LlamaIndex, LangGraph, CrewAI, AutoGen, DSPy, Haystack\n\n**Vector DBs:** Pinecone, Weaviate, Qdrant, Chroma, Milvus, pgvector, Faiss\n\n**Databases:** PostgreSQL, MySQL, MongoDB, Redis, Elasticsearch, Neo4j, Cassandra\n\n**Messaging:** Kafka, RabbitMQ, NATS, Pulsar\n\n**Cloud:** AWS, GCP, Azure, Cloudflare, Vercel, Docker, Kubernetes\n\n**Observability:** Grafana, Prometheus, Datadog, LangSmith, Langfuse, Arize\n\n---\n\n## Troubleshooting\n\n| Symptom | Cause | Fix |\n|---------|-------|-----|\n| PNG is blank or all-black | `@import url()` in SVG — rsvg-convert can't fetch fonts | Remove `@import`, use system font stack |\n| PNG not generated | `rsvg-convert` not installed | `brew install librsvg` (macOS) or `apt install librsvg2-bin` |\n| Diagram cut off at bottom | ViewBox height too short | Increase `height` in `viewBox=\"0 0 960 <height>\"` |\n| Text overflowing boxes | Labels too long | Add `text-anchor=\"middle\"` + `<clipPath>` or shorten label |\n| Icons not rendering | External CDN URL in rsvg-convert context | Use inline SVG paths from `references/icons.md` |\n\n---\n\n## License\n\nMIT © 2025 fireworks-tech-graph contributors\n","summary":"Fireworks‑tech‑graph is an AI‑driven tool that turns natural‑language descriptions of system designs into publication‑ready SVG and PNG diagrams in seconds, supporting 14 UML types and 7 distinct visual styles. It can generate complex diagrams such as memory architectures, agent workflows, and micro‑service layouts, then export high‑resolution images optimized for technical documentation. The solution is especially useful for AI infrastructure teams, IDE builders, internal copilots, and anyone who needs rapid, high‑quality visualizations of agent‑oriented or software architectures.","description":"Generate production-quality SVG+PNG technical diagrams from natural language. 7 styles, UML support, and AI/Agent workflow patterns.","stars":5416,"language":"Python"},{"owner":"TencentCloud","repo":"CubeSandbox","url":"https://github.com/TencentCloud/CubeSandbox","readme":"<p align=\"center\">\n  <img src=\"docs/assets/cube-sandbox-logo.png\" alt=\"Cube Sandbox Logo\" width=\"140\" />\n</p>\n\n<h1 align=\"center\">CubeSandbox</h1>\n\n<p align=\"center\">\n  <strong>Instant, Concurrent, Secure & Lightweight Sandbox Service for AI Agents</strong>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/tencentcloud/CubeSandbox/stargazers\"><img src=\"https://img.shields.io/github/stars/tencentcloud/cubesandbox?style=social\" alt=\"GitHub Stars\" /></a>\n  <a href=\"https://github.com/tencentcloud/CubeSandbox/issues\"><img src=\"https://img.shields.io/github/issues/tencentcloud/cubesandbox\" alt=\"GitHub Issues\" /></a>\n  <a href=\"./LICENSE\"><img src=\"https://img.shields.io/badge/License-Apache_2.0-green\" alt=\"Apache 2.0 License\" /></a>\n  <a href=\"./CONTRIBUTING.md\"><img src=\"https://img.shields.io/badge/PRs-welcome-brightgreen\" alt=\"PRs Welcome\" /></a>\n</p>\n\n<p align=\"center\">\n  <img src=\"https://img.shields.io/badge/⚡_Startup-Tens_of_ms-blue\" alt=\"Fast startup\" />\n  <img src=\"https://img.shields.io/badge/🔒_Isolation-Hardware_Level-critical\" alt=\"Hardware-level isolation\" />\n  <img src=\"https://img.shields.io/badge/🔌_API-E2B_Compatible-blueviolet\" alt=\"E2B compatible\" />\n  <img src=\"https://img.shields.io/badge/📦_Deploy-High_Concurrency·High_Density-orange\" alt=\"High concurrency & high density\" />\n</p>\n\n<p align=\"center\">\n  <a href=\"./README_zh.md\"><strong>中文文档</strong></a> ·\n  <a href=\"./docs/guide/quickstart.md\"><strong>Quick Start</strong></a> ·\n  <a href=\"./docs/index.md\"><strong>Documentation</strong></a> ·\n  <a href=\"./docs/changelog.md\"><strong>Changelog</strong></a>\n</p>\n\n---\n\nCube Sandbox is a high-performance, out-of-the-box secure sandbox service built on RustVMM and KVM. It supports both single-node deployment and can be easily scaled to a multi-node cluster. It is compatible with the E2B SDK, capable of creating a hardware-isolated sandbox environment with full service capabilities in under 60ms, while maintaining less than 5MB memory overhead.\n\n\n<p align=\"center\">\n  <img src=\"./docs/assets/readme_speed_en_1.png\" width=\"400\" />\n  <img src=\"./docs/assets/readme_overhead_en_1.png\" width=\"400\" />\n</p>\n\n\n## Demos\n\n<table align=\"center\">\n  <tr align=\"center\" valign=\"middle\">\n    <td width=\"33%\" valign=\"middle\">\n      <video src=\"https://github.com/user-attachments/assets/f87c409e-29fc-4e86-9eac-dbeaff2aca18\" controls=\"controls\" muted=\"muted\" style=\"max-width: 100%;\"></video>\n    </td>\n    <td width=\"33%\" valign=\"middle\">\n      <video src=\"https://github.com/user-attachments/assets/50e7126e-bb73-4abc-aa85-677fdf2e8c67\" controls=\"controls\" muted=\"muted\" style=\"max-width: 100%;\"></video>\n    </td>\n    <td width=\"33%\" valign=\"middle\">\n      <video src=\"https://github.com/user-attachments/assets/052e0e77-e2d9-409e-90b8-d13c28b80495\" controls=\"controls\" muted=\"muted\" style=\"max-width: 100%;\"></video>\n    </td>\n  </tr>\n  <tr align=\"center\" valign=\"top\">\n    <td>\n      <em>Installation & Demo</em>\n    </td>\n    <td>\n      <em>Performance Test</em>\n    </td>\n    <td>\n      <em>RL (SWE-Bench)</em>\n    </td>\n  </tr>\n</table>\n\n\n## Core Highlights\n\n- **Blazing-fast cold start:** Built on resource pool pre-provisioning and snapshot cloning technology, skipping time-consuming initialization entirely. Average end-to-end cold start time for a fully serviceable sandbox is < 60ms.\n- **High-density deployment on a single node:** Extreme memory reuse via CoW technology combined with a Rust-rebuilt, aggressively trimmed runtime keeps per-instance memory overhead below 5MB — run thousands of Agents on a single machine.\n- **True kernel-level isolation:** No more unsafe Docker shared-kernel (Namespace) hacks. Each Agent runs with its own dedicated Guest OS kernel, eliminating container escape risks and enabling safe execution of any LLM-generated code.\n- **Zero-cost migration (E2B drop-in replacement):** Natively compatible with the E2B SDK interface. Just swap one URL environment variable — no business logic changes needed — to migrate from expensive closed-source sandboxes to free Cube Sandbox with better performance.\n- **Network security:** CubeVS, powered by eBPF, enforces strict inter-sandbox network isolation at the kernel level with fine-grained egress traffic filtering policies.\n- **Ready to use out of the box:** One-click deployment with support for both single-node and cluster setups.\n- **Event-level snapshot rollback (coming soon):** High-frequency snapshot rollback at millisecond granularity, enabling rapid fork-based exploration environments from any saved state.\n- **Production-ready:** Cube Sandbox has been validated at scale in Tencent Cloud production environments, proven stable and reliable.\n\n## Benchmarks\n\nIn the context of AI Agent code execution, CubeSandbox achieves the perfect balance of security and performance:\n\n| Metric | Docker Container | Traditional VM | CubeSandbox |\n|---|---|---|---|\n| **Isolation Level** | Low (Shared Kernel Namespaces) | High (Dedicated Kernel) | **Extreme (Dedicated Kernel + eBPF)** |\n| **Boot Speed** <br>*Full-OS boot duration | 200ms | Seconds | **Sub-millisecond (<60ms)** |\n| **Memory Overhead** | Low (Shared Kernel) | High (Full OS) | **Ultra-low (Aggressively stripped, <5MB)** |\n| **Deployment Density** | High | Low | **Extreme (Thousands per node)** |\n| **E2B SDK Compatible** | / | / | **✅ Drop-in** |\n\n*   *Cold start benchmarked on bare-metal. 60ms at single concurrency; under 50 concurrent creations, avg 67ms, P95 90ms, P99 137ms — consistently sub-150ms.*\n*   *Memory overhead measured with sandbox specs ≤ 32GB. Larger configurations may see a marginal increase.*\n\nFor detailed metrics on startup latency and resource overhead, please refer to:\n\n\n<table align=\"center\">\n  <tr align=\"center\" valign=\"middle\">\n    <td width=\"33%\" valign=\"middle\">\n      <img src=\"./docs/assets/1-concurrency-create.png\" />\n    </td>\n    <td width=\"33%\" valign=\"middle\">\n      <img src=\"./docs/assets/50-concurrency-create.png\" />\n    </td>\n    <td width=\"33%\" valign=\"middle\">\n      <img src=\"./docs/assets/cube-sandbox-mem-overhead.png\" />\n    </td>\n  </tr>\n  <tr align=\"center\" valign=\"top\">\n    <td colspan=\"2\">\n      <em>Sub-150ms sandbox delivery under both single and high-concurrency workloads</em>\n    </td>\n    <td>\n      <em>CubeSandbox base memory footprint across various instance sizes</em><br>\n      <sup>(*Blue: Sandbox specifications; Orange: Base memory overhead). Note that memory consumption increases only marginally as instance sizes scale up.\n</sup>\n    </td>\n  </tr>\n</table>\n\n\n</br>\n\n## Quick Start\n\n<p align=\"center\">\n  <a href=\"./docs/guide/quickstart.md\">\n    <img src=\"docs/assets/fast-start.gif\" alt=\"Cube Sandbox fast start walkthrough\" width=\"720\" />\n  </a>\n</p>\n\n<p align=\"center\">\n  <em>⚡ Millisecond-level startup — watch the fast-start flow, then jump into the <a href=\"./docs/guide/quickstart.md\" target=\"_blank\">Quick Start guide</a>.</em>\n</p>\n\n\n\n\nCube Sandbox requires a KVM-enabled x86_64 Linux environment — **WSL 2**, a **Linux physical machine**, or a **cloud bare-metal server** all work.\n\n> Don't have one yet?\n> - **Windows users**: run `wsl --install` in an admin PowerShell to set up WSL 2 (requires Windows 11 22H2+, with nested virtualization enabled in BIOS / WSL).\n> - **Others**: grab an x86_64 Linux physical machine, or rent a bare-metal server from a cloud provider.\n\nOnce your environment is ready, launch your first sandbox in four steps:\n\n1. **Prepare the runtime environment** (skip this step if you already have an x86_64 bare-metal Linux server)\n\nRun the following on your WSL / Linux machine:\n\n```bash\ngit clone https://github.com/tencentcloud/CubeSandbox.git\n# For faster access from mainland China, clone from the mirror instead:\n# git clone https://cnb.cool/CubeSandbox/CubeSandbox\n\ncd CubeSandbox/dev-env\n./prepare_image.sh   # one-off: download and initialize the runtime image\n./run_vm.sh          # boot the environment; keep this terminal open (Ctrl+a x to exit)\n```\n\nIn a second terminal, log into the environment you just prepared:\n\n```bash\ncd CubeSandbox/dev-env && ./login.sh\n```\n\n> This drops you into a disposable Linux environment where all the subsequent installation happens, so your host stays clean. See [Development Environment](./docs/guide/dev-environment.md) for details.\n\n2. **Start the Cube Sandbox Service**\n\nInside the environment you entered via `login.sh` (or directly on your bare-metal server), run **one** of the following commands depending on your location:\n\n- **Global Users** (downloads from GitHub):\n\n  ```bash\n  curl -sL https://github.com/tencentcloud/CubeSandbox/raw/master/deploy/one-click/online-install.sh | bash\n  ```\n\n- **中国用户请执行这条命令 (Mainland China)**:\n\n  ```bash\n  curl -sL https://cnb.cool/CubeSandbox/CubeSandbox/-/git/raw/master/deploy/one-click/online-install.sh | MIRROR=cn bash\n  ```\n\n> See [Quick Start — China mainland mirror](./docs/guide/quickstart.md#step-2-install) for details.\n\n3. **Create a Code Interpreter Sandbox Template**\n\nAfter installation, create a code interpreter template from the prebuilt image:\n\n```bash\ncubemastercli tpl create-from-image \\\n  --image ccr.ccs.tencentyun.com/ags-image/sandbox-code:latest \\\n  --writable-layer-size 1G \\\n  --expose-port 49999 \\\n  --expose-port 49983 \\\n  --probe 49999\n```\n\nThen run the following command to monitor the build progress:\n\n```bash\ncubemastercli tpl watch --job-id <job_id>\n```\n\n**⚠️ The image is fairly large** — downloading, extracting, and building the template may take a while; please be patient.\n\nWait for the command above to finish and the template status to reach `READY`. Note the **template ID** (`template_id`) from the output — you will need it in the next step.\n\n4. **Run Your First Agent Code**\n\nInstall the Python SDK:\n\n```bash\nyum install -y python3 python3-pip\npip install e2b-code-interpreter\n```\n\nSet environment variables:\n\n```bash\nexport E2B_API_URL=\"http://127.0.0.1:3000\"\nexport E2B_API_KEY=\"dummy\"\nexport CUBE_TEMPLATE_ID=\"<your-template-id>\"  # template ID obtained from Step 3\nexport SSL_CERT_FILE=\"/root/.local/share/mkcert/rootCA.pem\"\n```\n\nRun code inside an isolated sandbox:\n\n```python\nimport os\nfrom e2b_code_interpreter import Sandbox  # drop-in E2B SDK\n\n# Cube Sandbox transparently intercepts all requests\nwith Sandbox.create(template=os.environ[\"CUBE_TEMPLATE_ID\"]) as sandbox:\n    result = sandbox.run_code(\"print('Hello from Cube Sandbox, safely isolated!')\")\n    print(result)\n```\n\n> See [Quick Start — Step 4](./docs/guide/quickstart.md#step-4-run-your-first-agent) for the full variable reference and more examples.\n\nWant to explore more? Check out the 📂 [`examples/`](./examples/) directory, covering scenarios like: code execution, Shell commands, file operations, browser automation, network policies, pause/resume, OpenClaw integration, and RL training.\n\n### Deep Dive\n\n- 📖 [Documentation Home](./docs/index.md) - Complete guide and API reference\n- 🔧 [Template Concepts](./docs/guide/templates.md) - Image-to-Template concepts and workflows\n- 🌟 [Example Projects](./docs/guide/tutorials/examples.md) - Hands-on examples demonstrating various Cube Sandbox use cases (Browser automation, OpenClaw integration, RL training workflows, etc.)\n- 💻 [Development Environment (QEMU VM)](./docs/guide/dev-environment.md) - No bare-metal? Spin up a disposable OpenCloudOS 9 VM and run Cube Sandbox inside it\n\n## Architecture\n\n<p align=\"center\">\n  <img src=\"docs/assets/cube-sandbox-arch.png\" alt=\"Cube Sandbox Architecture\" />\n</p>\n\n| Component | Responsibility |\n|---|---|\n| **CubeAPI** | High-concurrency REST API Gateway (Rust), compatible with E2B. Swap the URL for seamless migration. |\n| **CubeMaster** | Cluster orchestrator. Receives API requests and dispatches them to corresponding Cubelets. Manages resource scheduling and cluster state. |\n| **CubeProxy** | Reverse proxy, compatible with the E2B protocol, routing requests to the appropriate sandbox instances. |\n| **Cubelet** | Compute node local scheduling component. Manages the complete lifecycle of all sandbox instances on the node. |\n| **CubeVS** | eBPF-based virtual switch, providing kernel-level network isolation and security policy enforcement. |\n| **CubeHypervisor & CubeShim** | Virtualization layer — CubeHypervisor manages KVM MicroVMs, CubeShim implements the containerd Shim v2 API to integrate sandboxes into the container runtime. |\n\n👉 For more details, please read the [Architecture Design Document](./docs/architecture/overview.md) and [CubeVS Network Model](./docs/architecture/network.md).\n\n## Community & Contributing\n\nWe welcome contributions of all kinds—whether it’s a bug report, feature suggestion, documentation improvement, or code submission!\n\n- 🐞 **Found a Bug or have questions?** Submit an issue on <a href=\"https://github.com/tencentcloud/CubeSandbox/issues\" target=\"_blank\">GitHub Issues</a>.\n- 💡 **Have an Idea?** Join the conversation in <a href=\"https://github.com/tencentcloud/CubeSandbox/discussions\" target=\"_blank\">GitHub Discussions</a>.\n- 🛠️ **Want to Code?** Check out our <a href=\"./CONTRIBUTING.md\" target=\"_blank\">CONTRIBUTING.md</a> to learn how to submit a Pull Request.\n- 💬 **Want to Chat?** Join our <a href=\"https://discord.gg/kkapzDXShb\" target=\"_blank\">Discord</a>.\n\n## License\n\nCubeSandbox is released under the [Apache License 2.0](./LICENSE).\n\nThe birth of CubeSandbox stands on the shoulders of open-source giants. Special thanks to [Cloud Hypervisor](https://github.com/cloud-hypervisor/cloud-hypervisor), [Kata Containers](https://github.com/kata-containers/kata-containers), virtiofsd, containerd-shim-rs, ttrpc-rust, and others. We have made tailored modifications to some components to fit the CubeSandbox execution model, and the original in-file copyright notices are preserved.\n","summary":"CubeSandbox is a lightweight, high‑performance sandbox service designed for AI agents, built on RustVMM and KVM. It delivers instant, hardware‑level isolation and runs a fully serviceable guest OS in under 60 ms while keeping per‑instance memory overhead below 5 MB. The platform supports both single‑node and cluster deployments, offers seamless drop‑in compatibility with the E2B SDK, and enables high‑density, concurrent execution of thousands of isolated agents. Developers, LLM researchers, and ops teams looking for secure, low‑latency code execution environments can deploy CubeSandbox without changing existing logic.","description":"Instant, Concurrent, Secure & Lightweight Sandbox for AI Agents.","stars":4975,"language":"Rust"},{"owner":"nashsu","repo":"llm_wiki","url":"https://github.com/nashsu/llm_wiki","readme":"# LLM Wiki\n\n<p align=\"center\">\n  <img src=\"logo.jpg\" width=\"128\" height=\"128\" style=\"border-radius: 22%;\" alt=\"LLM Wiki Logo\">\n</p>\n\n<p align=\"center\">\n  <strong>A personal knowledge base that builds itself.</strong><br>\n  LLM reads your documents, builds a structured wiki, and keeps it current.\n</p>\n\n<p align=\"center\">\n  <a href=\"#what-is-this\">What is this?</a> •\n  <a href=\"#what-we-changed--added\">Features</a> •\n  <a href=\"#tech-stack\">Tech Stack</a> •\n  <a href=\"#installation\">Installation</a> •\n  <a href=\"#credits\">Credits</a> •\n  <a href=\"#license\">License</a>\n</p>\n\n<p align=\"center\">\n  English | <a href=\"README_CN.md\">中文</a>\n</p>\n\n---\n\n<p align=\"center\">\n  <img src=\"assets/overview.jpg\" width=\"100%\" alt=\"Overview\">\n</p>\n\n## Features\n\n- **Two-Step Chain-of-Thought Ingest** — LLM analyzes first, then generates wiki pages with source traceability and incremental cache\n- **Multimodal Image Ingestion** — extract embedded images from PDFs, generate factual captions with a vision LLM, surface them in image-aware search results with lightbox preview and jump-to-source\n- **4-Signal Knowledge Graph** — relevance model with direct links, source overlap, Adamic-Adar, and type affinity\n- **Louvain Community Detection** — automatic knowledge cluster discovery with cohesion scoring\n- **Graph Insights** — surprising connections and knowledge gaps with one-click Deep Research\n- **Vector Semantic Search** — optional embedding-based retrieval via LanceDB, supports any OpenAI-compatible endpoint\n- **Persistent Ingest Queue** — serial processing with crash recovery, cancel, retry, and progress visualization\n- **Folder Import** — recursive folder import preserving directory structure, folder context as LLM classification hint\n- **Deep Research** — LLM-optimized search topics, multi-query web search, auto-ingest results into wiki\n- **Async Review System** — LLM flags items for human judgment, predefined actions, pre-generated search queries\n- **Chrome Web Clipper** — one-click web page capture with auto-ingest into knowledge base\n\n## What is this?\n\nLLM Wiki is a cross-platform desktop application that turns your documents into an organized, interlinked knowledge base — automatically. Instead of traditional RAG (retrieve-and-answer from scratch every time), the LLM **incrementally builds and maintains a persistent wiki** from your sources. Knowledge is compiled once and kept current, not re-derived on every query.\n\nThis project is based on [Karpathy's LLM Wiki pattern](https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f) — a methodology for building personal knowledge bases using LLMs. We implemented the core ideas as a full desktop application with significant enhancements.\n\n<p align=\"center\">\n  <img src=\"assets/llm_wiki_arch.jpg\" width=\"100%\" alt=\"LLM Wiki Architecture\">\n</p>\n\n## Credits\n\nThe foundational methodology comes from **Andrej Karpathy**'s [llm-wiki.md](https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f), which describes the pattern of using LLMs to incrementally build and maintain a personal wiki. The original document is an abstract design pattern; this project is a concrete implementation with substantial extensions.\n\n## What We Kept from the Original\n\nThe core architecture follows Karpathy's design faithfully:\n\n- **Three-layer architecture**: Raw Sources (immutable) → Wiki (LLM-generated) → Schema (rules & config)\n- **Three core operations**: Ingest, Query, Lint\n- **index.md** as the content catalog and LLM navigation entry point\n- **log.md** as the chronological operation record with parseable format\n- **[[wikilink]]** syntax for cross-references\n- **YAML frontmatter** on every wiki page\n- **Obsidian compatibility** — the wiki directory works as an Obsidian vault\n- **Human curates, LLM maintains** — the fundamental role division\n\n<p align=\"center\">\n  <img src=\"assets/5-obsidian_compatibility.jpg\" width=\"100%\" alt=\"Obsidian Compatibility\">\n</p>\n\n## What We Changed & Added\n\n### 1. From CLI to Desktop Application\n\nThe original is an abstract pattern document designed to be copy-pasted to an LLM agent. We built it into a **full cross-platform desktop application** with:\n- **Three-column layout**: Knowledge Tree / File Tree (left) + Chat (center) + Preview (right)\n- **Icon sidebar** for switching between Wiki, Sources, Search, Graph, Lint, Review, Deep Research, Settings\n- **Custom resizable panels** — drag-to-resize left and right panels with min/max constraints\n- **Activity panel** — real-time processing status showing file-by-file ingest progress\n- **All state persisted** — conversations, settings, review items, project config survive restarts\n- **Scenario templates** — Research, Reading, Personal Growth, Business, General — each pre-configures purpose.md and schema.md\n\n### 2. Purpose.md — The Wiki's Soul\n\nThe original has Schema (how the wiki works) but no formal place for **why** the wiki exists. We added `purpose.md`:\n- Defines goals, key questions, research scope, evolving thesis\n- LLM reads it during every ingest and query for context\n- LLM can suggest updates based on usage patterns\n- Different from schema — schema is structural rules, purpose is directional intent\n\n### 3. Two-Step Chain-of-Thought Ingest\n\nThe original describes a single-step ingest where the LLM reads and writes simultaneously. We split it into **two sequential LLM calls** for significantly better quality:\n\n```\nStep 1 (Analysis): LLM reads source → structured analysis\n  - Key entities, concepts, arguments\n  - Connections to existing wiki content\n  - Contradictions & tensions with existing knowledge\n  - Recommendations for wiki structure\n\nStep 2 (Generation): LLM takes analysis → generates wiki files\n  - Source summary with frontmatter (type, title, sources[])\n  - Entity pages, concept pages with cross-references\n  - Updated index.md, log.md, overview.md\n  - Review items for human judgment\n  - Search queries for Deep Research\n```\n\nAdditional ingest enhancements beyond the original:\n- **SHA256 incremental cache** — source file content is hashed before ingest; unchanged files are skipped automatically, saving LLM tokens and time\n- **Persistent ingest queue** — serial processing prevents concurrent LLM calls; queue persisted to disk, survives app restart; failed tasks auto-retry up to 3 times\n- **Folder import** — recursive folder import preserving directory structure; folder path passed to LLM as classification context (e.g., \"papers > energy\" helps categorize content)\n- **Queue visualization** — Activity Panel shows progress bar, pending/processing/failed tasks with cancel and retry buttons\n- **Auto-embedding** — when vector search is enabled, new pages are automatically embedded after ingest\n- **Source traceability** — every generated wiki page includes a `sources: []` field in YAML frontmatter, linking back to the raw source files that contributed to it\n- **overview.md auto-update** — global summary page regenerated on every ingest to reflect the latest state of the wiki\n- **Guaranteed source summary** — fallback ensures a source summary page is always created, even if the LLM omits it\n- **Language-aware generation** — LLM responds in the user's configured language (English or Chinese)\n\n### 4. Knowledge Graph with Relevance Model\n\n<p align=\"center\">\n  <img src=\"assets/3-knowledge_graph.jpg\" width=\"100%\" alt=\"Knowledge Graph\">\n</p>\n\nThe original mentions `[[wikilinks]]` for cross-references but has no graph analysis. We built a **full knowledge graph visualization and relevance engine**:\n\n**4-Signal Relevance Model:**\n| Signal | Weight | Description |\n|--------|--------|-------------|\n| Direct link | ×3.0 | Pages linked via `[[wikilinks]]` |\n| Source overlap | ×4.0 | Pages sharing the same raw source (via frontmatter `sources[]`) |\n| Adamic-Adar | ×1.5 | Pages sharing common neighbors (weighted by neighbor degree) |\n| Type affinity | ×1.0 | Bonus for same page type (entity↔entity, concept↔concept) |\n\n**Graph Visualization (sigma.js + graphology + ForceAtlas2):**\n- Node colors by page type or community, sizes scaled by link count (√ scaling)\n- Edge thickness and color by relevance weight (green=strong, gray=weak)\n- Hover interaction: neighbors stay visible, non-neighbors dim, edges highlight with relevance score label\n- Zoom controls (ZoomIn, ZoomOut, Fit-to-screen)\n- Position caching prevents layout jumps when data updates\n- Legend switches between type counts and community info based on coloring mode\n\n### 5. Louvain Community Detection\n\nNot in the original. Automatic discovery of knowledge clusters using the **Louvain algorithm** (graphology-communities-louvain):\n\n- **Auto-clustering** — discovers which pages naturally group together based on link topology, independent of predefined page types\n- **Type / Community toggle** — switch between coloring nodes by page type (entity, concept, source...) or by discovered knowledge cluster\n- **Cohesion scoring** — each community scored by intra-edge density (actual edges / possible edges); low-cohesion clusters (< 0.15) flagged with warning\n- **12-color palette** — distinct visual separation between clusters\n- **Community legend** — shows top node label, member count, and cohesion per cluster\n\n<p align=\"center\">\n  <img src=\"assets/kg_community.jpg\" width=\"100%\" alt=\"Louvain Community Detection\">\n</p>\n\n### 6. Graph Insights — Surprising Connections & Knowledge Gaps\n\nNot in the original. The system **automatically analyzes graph structure** to surface actionable insights:\n\n**Surprising Connections:**\n- Detects unexpected relationships: cross-community edges, cross-type links, peripheral↔hub couplings\n- Composite surprise score ranks the most noteworthy connections\n- Dismissable — mark connections as reviewed so they don't reappear\n\n**Knowledge Gaps:**\n- **Isolated pages** (degree ≤ 1) — pages with few or no connections to the rest of the wiki\n- **Sparse communities** (cohesion < 0.15, ≥ 3 pages) — knowledge areas with weak internal cross-references\n- **Bridge nodes** (connecting 3+ clusters) — critical junction pages that hold multiple knowledge areas together\n\n**Interactive:**\n- Click any insight card to **highlight** corresponding nodes and edges in the graph; click again to deselect\n- Knowledge gaps and bridge nodes have a **Deep Research button** — triggers LLM-optimized research with domain-aware topics (reads overview.md + purpose.md for context)\n- Research topic shown in **editable confirmation dialog** before starting — user can refine topic and search queries\n\n<p align=\"center\">\n  <img src=\"assets/kg_insights.jpg\" width=\"100%\" alt=\"Graph Insights\">\n</p>\n\n### 7. Optimized Query Retrieval Pipeline\n\nThe original describes a simple query where the LLM reads relevant pages. We built a **multi-phase retrieval pipeline** with optional vector search and budget control:\n\n```\nPhase 1: Tokenized Search\n  - English: word splitting + stop word removal\n  - Chinese: CJK bigram tokenization (每个 → [每个, 个…])\n  - Title match bonus (+10 score)\n  - Searches both wiki/ and raw/sources/\n\nPhase 1.5: Vector Semantic Search (optional)\n  - Embedding via any OpenAI-compatible /v1/embeddings endpoint\n  - Stored in LanceDB (Rust backend) for fast ANN retrieval\n  - Cosine similarity finds semantically related pages even without keyword overlap\n  - Results merged into search: boosts existing matches + adds new discoveries\n\nPhase 2: Graph Expansion\n  - Top search results used as seed nodes\n  - 4-signal relevance model finds related pages\n  - 2-hop traversal with decay for deeper connections\n\nPhase 3: Budget Control\n  - Configurable context window: 4K → 1M tokens\n  - Proportional allocation: 60% wiki pages, 20% chat history, 5% index, 15% system\n  - Pages prioritized by combined search + graph relevance score\n\nPhase 4: Context Assembly\n  - Numbered pages with full content (not just summaries)\n  - System prompt includes: purpose.md, language rules, citation format, index.md\n  - LLM instructed to cite pages by number: [1], [2], etc.\n```\n\n**Vector Search** is fully optional — disabled by default, enabled in Settings with independent endpoint, API key, and model configuration. When disabled, the pipeline falls back to tokenized search + graph expansion. Benchmark: overall recall improved from 58.2% to 71.4% with vector search enabled.\n\n### 8. Multi-Conversation Chat with Persistence\n\nThe original has a single query interface. We built **full multi-conversation support**:\n\n- **Independent chat sessions** — create, rename, delete conversations\n- **Conversation sidebar** — quick switching between topics\n- **Per-conversation persistence** — each conversation saved to `.llm-wiki/chats/{id}.json`\n- **Configurable history depth** — limit how many messages are sent as context (default: 10)\n- **Cited references panel** — collapsible section on each response showing which wiki pages were used, grouped by type with icons\n- **Reference persistence** — cited pages stored directly in message data, stable across restarts\n- **Regenerate** — re-generate the last response with one click (removes last assistant + user message pair, re-sends)\n- **Save to Wiki** — archive valuable answers to `wiki/queries/`, then auto-ingest to extract entities/concepts into the knowledge network\n\n### 9. Thinking / Reasoning Display\n\nNot in the original. For LLMs that emit `<think>` blocks (DeepSeek, QwQ, etc.):\n\n- **Streaming thinking** — rolling 5-line display with opacity fade during generation\n- **Collapsed by default** — thinking blocks hidden after completion, click to expand\n- **Visual separation** — thinking content shown in distinct style, separate from the main response\n\n### 10. KaTeX Math Rendering\n\nNot in the original. Full LaTeX math support across all views:\n\n- **KaTeX rendering** — inline `$...$` and block `$$...$$` formulas rendered via remark-math + rehype-katex\n- **Milkdown math plugin** — preview editor renders math natively via @milkdown/plugin-math\n- **Auto-detection** — bare `\\begin{aligned}` and other LaTeX environments automatically wrapped with `$$` delimiters\n- **Unicode fallback** — 100+ symbol mappings (α, ∑, →, ≤, etc.) for simple inline notation outside math blocks\n\n### 11. Review System (Async Human-in-the-Loop)\n\nThe original suggests staying involved during ingest. We added an **asynchronous review queue**:\n\n- LLM flags items needing human judgment during ingest\n- **Predefined action types**: Create Page, Deep Research, Skip — constrained to prevent LLM hallucination of arbitrary actions\n- **Search queries generated at ingest time** — LLM pre-generates optimized web search queries for each review item\n- User handles reviews at their convenience — doesn't block ingest\n\n### 12. Deep Research\n\n<p align=\"center\">\n  <img src=\"assets/1-deepresearch.jpg\" width=\"100%\" alt=\"Deep Research\">\n</p>\n\nNot in the original. When the LLM identifies knowledge gaps:\n\n- **Web search** (Tavily API) finds relevant sources with full content extraction (no truncation)\n- **Multiple search queries** per topic — LLM-generated at ingest time, optimized for search engines\n- **LLM-optimized research topics** — when triggered from Graph Insights, LLM reads overview.md + purpose.md to generate domain-specific topics and queries (not generic keywords)\n- **User confirmation dialog** — editable topic and search queries shown for review before research starts\n- **LLM synthesizes** findings into a wiki research page with cross-references to existing wiki\n- **Thinking display** — `<think>` blocks shown as collapsible sections during synthesis, auto-scroll to latest content\n- **Auto-ingest** — research results automatically processed to extract entities/concepts into the wiki\n- **Task queue** with 3 concurrent tasks\n- **Research Panel** — dedicated sidebar panel with dynamic height, real-time streaming progress\n\n### 13. Browser Extension (Web Clipper)\n\n<p align=\"center\">\n  <img src=\"assets/4-chrome_extension_webclipper.jpg\" width=\"100%\" alt=\"Chrome Extension Web Clipper\">\n</p>\n\nThe original mentions Obsidian Web Clipper. We built a **dedicated Chrome Extension** (Manifest V3):\n\n- **Mozilla Readability.js** for accurate article extraction (strips ads, nav, sidebars)\n- **Turndown.js** for HTML → Markdown conversion with table support\n- **Project picker** — choose which wiki to clip into (supports multi-project)\n- **Local HTTP API** (port 19827, tiny_http) — Extension ↔ App communication\n- **Auto-ingest** — clipped content automatically triggers the two-step ingest pipeline\n- **Clip watcher** — polls every 3 seconds for new clips, processes automatically\n- **Offline preview** — shows extracted content even when app is not running\n\n### 14. Multi-format Document Support\n\nThe original focuses on text/markdown. We support structured extraction preserving document semantics:\n\n| Format | Method |\n|--------|--------|\n| PDF | pdf-extract (Rust) with file caching |\n| DOCX | docx-rs — headings, bold/italic, lists, tables → structured Markdown |\n| PPTX | ZIP + XML — slide-by-slide extraction with heading/list structure |\n| XLSX/XLS/ODS | calamine — proper cell types, multi-sheet support, Markdown tables |\n| Images | Native preview (png, jpg, gif, webp, svg, etc.) |\n| Video/Audio | Built-in player |\n| Web clips | Readability.js + Turndown.js → clean Markdown |\n\n### 15. File Deletion with Cascade Cleanup\n\nThe original has no deletion mechanism. We added **intelligent cascade deletion**:\n\n- Deleting a source file removes its wiki summary page\n- **3-method matching** finds related wiki pages: frontmatter `sources[]` field, source summary page name, frontmatter section references\n- **Shared entity preservation** — entity/concept pages linked to multiple sources only have the deleted source removed from their `sources[]` array, not deleted entirely\n- **Index cleanup** — removed pages are purged from index.md\n- **Wikilink cleanup** — dead `[[wikilinks]]` to deleted pages are removed from remaining wiki pages\n\n### 16. Configurable Context Window\n\nNot in the original. Users can configure how much context the LLM receives:\n\n- **Slider from 4K to 1M tokens** — adapts to different LLM capabilities\n- **Proportional budget allocation** — larger windows get proportionally more wiki content\n- **60/20/5/15 split** — wiki pages / chat history / index / system prompt\n\n### 17. Cross-Platform Compatibility\n\nThe original is platform-agnostic (abstract pattern). We handle concrete cross-platform concerns:\n\n- **Path normalization** — unified `normalizePath()` used across 22+ files, backslash → forward slash\n- **Unicode-safe string handling** — char-based slicing instead of byte-based (prevents crashes on CJK filenames)\n- **macOS close-to-hide** — close button hides window (app stays running in background), click dock icon to restore, Cmd+Q to quit\n- **Windows/Linux close confirmation** — confirmation dialog before quitting to prevent accidental data loss\n- **Tauri v2** — native desktop on macOS, Windows, Linux\n- **GitHub Actions CI/CD** — automated builds for macOS (ARM + Intel), Windows (.msi), Linux (.deb / .AppImage)\n\n### 18. Other Additions\n\n- **i18n** — English + Chinese interface (react-i18next)\n- **Settings persistence** — LLM provider, API key, model, context size, language saved via Tauri Store\n- **Obsidian config** — auto-generated `.obsidian/` directory with recommended settings\n- **Markdown rendering** — GFM tables with borders, proper code blocks, wikilink processing in chat and preview\n- **Multi-provider LLM support** — OpenAI, Anthropic, Google, Ollama, Custom — each with provider-specific streaming and headers\n- **15-minute timeout** — long ingest operations won't fail prematurely\n- **dataVersion signaling** — graph and UI automatically refresh when wiki content changes\n\n## Tech Stack\n\n| Layer | Technology |\n|-------|-----------|\n| Desktop | Tauri v2 (Rust backend) |\n| Frontend | React 19 + TypeScript + Vite |\n| UI | shadcn/ui + Tailwind CSS v4 |\n| Editor | Milkdown (ProseMirror-based WYSIWYG) |\n| Graph | sigma.js + graphology + ForceAtlas2 |\n| Search | Tokenized search + graph relevance + optional vector (LanceDB) |\n| Vector DB | LanceDB (Rust, embedded, optional) |\n| PDF | pdf-extract |\n| Office | docx-rs + calamine |\n| i18n | react-i18next |\n| State | Zustand |\n| LLM | Streaming fetch (OpenAI, Anthropic, Google, Ollama, Custom) |\n| Web Search | Tavily API |\n\n## Installation\n\n### Pre-built Binaries\n\nDownload from [Releases](https://github.com/nashsu/llm_wiki/releases):\n- **macOS**: `.dmg` (Apple Silicon + Intel)\n- **Windows**: `.msi`\n- **Linux**: `.deb` / `.AppImage`\n\n### Build from Source\n\n```bash\n# Prerequisites: Node.js 20+, Rust 1.70+\ngit clone https://github.com/nashsu/llm_wiki.git\ncd llm_wiki\nnpm install\nnpm run tauri dev      # Development\nnpm run tauri build    # Production build\n```\n\n### Chrome Extension\n\n1. Open `chrome://extensions`\n2. Enable \"Developer mode\"\n3. Click \"Load unpacked\"\n4. Select the `extension/` directory\n\n## Quick Start\n\n1. Launch the app → Create a new project (choose a template)\n2. Go to **Settings** → Configure your LLM provider (API key + model)\n3. Go to **Sources** → Import documents (PDF, DOCX, MD, etc.)\n4. Watch the **Activity Panel** — LLM automatically builds wiki pages\n5. Use **Chat** to query your knowledge base\n6. Browse the **Knowledge Graph** to see connections\n7. Check **Review** for items needing your attention\n8. Run **Lint** periodically to maintain wiki health\n\n## Project Structure\n\n```\nmy-wiki/\n├── purpose.md              # Goals, key questions, research scope\n├── schema.md               # Wiki structure rules, page types\n├── raw/\n│   ├── sources/            # Uploaded documents (immutable)\n│   └── assets/             # Local images\n├── wiki/\n│   ├── index.md            # Content catalog\n│   ├── log.md              # Operation history\n│   ├── overview.md         # Global summary (auto-updated)\n│   ├── entities/           # People, organizations, products\n│   ├── concepts/           # Theories, methods, techniques\n│   ├── sources/            # Source summaries\n│   ├── queries/            # Saved chat answers + research\n│   ├── synthesis/          # Cross-source analysis\n│   └── comparisons/        # Side-by-side comparisons\n├── .obsidian/              # Obsidian vault config (auto-generated)\n└── .llm-wiki/              # App config, chat history, review items\n```\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=nashsu%2Fllm_wiki&type=date&legend=top-left\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=nashsu/llm_wiki&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=nashsu/llm_wiki&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=nashsu/llm_wiki&type=date&legend=top-left\" />\n </picture>\n</a>\n\n## License\n\nThis project is licensed under the **GNU General Public License v3.0** — see [LICENSE](LICENSE) for details.\n","summary":"LLM Wiki is a cross‑platform desktop app that automatically turns your files into an interlinked personal knowledge base, letting an LLM build and maintain the wiki incrementally instead of reconstructing answers on every query. It offers advanced ingest capabilities—two‑step chain‑of‑thought analysis, multimodal image extraction and captioning, a 4‑signal knowledge graph, community detection, and a persistent queue with crash recovery—while coupling in‑app semantic search (LanceDB) and web‑clipper integration. The system generates well‑structured markdown pages with wikilinks and YAML frontmatter, making the output compatible with Obsidian and other note tools. Anyone who works with large collections of documents—researchers, writers, personal knowledge managers—can leverage LLM Wiki to keep an up‑to‑date, searchable knowledge hub without manual curation.","description":"LLM Wiki is a cross-platform desktop application that turns your documents into an organized, interlinked knowledge base — automatically. Instead of traditional RAG (retrieve-and-answer from scratch every time), the LLM incrementally builds and maintains a persistent wiki from your sources。","stars":5740,"language":"TypeScript"},{"owner":"getagentseal","repo":"codeburn","url":"https://github.com/getagentseal/codeburn","readme":"<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/getagentseal/codeburn/main/assets/providers.png\" alt=\"CodeBurn\" width=\"520\" />\n</p>\n\n<p align=\"center\"><strong>See where your AI coding tokens go.</strong></p>\n\n<p align=\"center\">                                                                                                                                                                          \n    <a href=\"https://www.npmjs.com/package/codeburn\"><img src=\"https://img.shields.io/npm/v/codeburn.svg\" alt=\"npm version\" /></a>\n    <a href=\"https://www.npmjs.com/package/codeburn\"><img src=\"https://img.shields.io/npm/dt/codeburn.svg\" alt=\"total downloads\" /></a>                                                       \n    <a href=\"https://github.com/getagentseal/codeburn/blob/main/LICENSE\"><img src=\"https://img.shields.io/npm/l/codeburn.svg\" alt=\"license\" /></a>                                            \n    <a href=\"https://github.com/getagentseal/codeburn\"><img src=\"https://img.shields.io/badge/node-%3E%3D20-brightgreen.svg\" alt=\"node version\" /></a>                                        \n    <a href=\"https://discord.gg/pJ2DMWvtAx\"><img src=\"https://img.shields.io/badge/discord-join-5865F2?logo=discord&logoColor=white\" alt=\"Discord\" /></a>                                     \n    <a href=\"https://github.com/sponsors/iamtoruk\"><img src=\"https://img.shields.io/badge/sponsor-♥-ea4aaa?logo=github\" alt=\"Sponsor\" /></a>                                                  \n  </p> \n\nCodeBurn tracks token usage, cost, and performance across **18 AI coding tools**. It breaks down spending by task type, model, tool, project, and provider so you can see exactly where your budget goes.\n\nEverything runs locally. No wrapper, no proxy, no API keys. CodeBurn reads session data directly from disk and prices every call using [LiteLLM](https://github.com/BerriAI/litellm).\n\n<table>\n<tr>\n<td align=\"center\"><strong>Dashboard</strong></td>\n<td align=\"center\"><strong>Menu Bar</strong></td>\n</tr>\n<tr>\n<td><img src=\"https://raw.githubusercontent.com/getagentseal/codeburn/main/assets/dashboard.jpg\" alt=\"CodeBurn TUI dashboard\" width=\"440\" /></td>\n<td><img src=\"https://cdn.jsdelivr.net/gh/getagentseal/codeburn@main/assets/menubar-0.8.0.png\" alt=\"CodeBurn macOS menubar\" width=\"440\" /></td>\n</tr>\n<tr>\n<td align=\"center\"><strong>Optimize</strong></td>\n<td align=\"center\"><strong>Compare</strong></td>\n</tr>\n<tr>\n<td><img src=\"https://raw.githubusercontent.com/getagentseal/codeburn/main/assets/optimize.jpg\" alt=\"CodeBurn optimize\" width=\"440\" /></td>\n<td><img src=\"https://raw.githubusercontent.com/getagentseal/codeburn/main/assets/compare.jpg\" alt=\"CodeBurn compare\" width=\"440\" /></td>\n</tr>\n</table>\n\n## Requirements\n\n- Node.js 20+\n- At least one supported AI coding tool with session data on disk\n- For Cursor and OpenCode support, `better-sqlite3` is installed automatically as an optional dependency\n\n## Install\n\n```bash\nnpm install -g codeburn\n```\n\nOr with Homebrew:\n\n```bash\nbrew tap getagentseal/codeburn\nbrew install codeburn\n```\n\nOr run directly without installing:\n\n```bash\nnpx codeburn\nbunx codeburn\ndx codeburn\n```\n\n## Usage\n\n```bash\ncodeburn                        # interactive dashboard (default: 7 days)\ncodeburn today                  # today's usage\ncodeburn month                  # this month's usage\ncodeburn report -p 30days       # rolling 30-day window\ncodeburn report -p all          # every recorded session\ncodeburn report --from 2026-04-01 --to 2026-04-10  # exact date range\ncodeburn report --format json   # full dashboard data as JSON\ncodeburn report --refresh 60    # auto-refresh every 60s (default: 30s)\ncodeburn status                 # compact one-liner (today + month)\ncodeburn status --format json\ncodeburn export                 # CSV with today, 7 days, 30 days\ncodeburn export -f json         # JSON export\ncodeburn optimize               # find waste, get copy-paste fixes\ncodeburn optimize -p week       # scope the scan to last 7 days\ncodeburn compare                # side-by-side model comparison\ncodeburn yield                  # track productive vs reverted/abandoned spend\ncodeburn yield -p 30days        # yield analysis for last 30 days\n```\n\nArrow keys switch between Today, 7 Days, 30 Days, Month, and All Time. Press `q` to quit, `1` `2` `3` `4` `5` as shortcuts, `c` to open model comparison, `o` to open optimize. The dashboard auto-refreshes every 30 seconds by default (`--refresh 0` to disable). It also shows average cost per session and the five most expensive sessions across all projects.\n\n## Supported Providers\n\n| Provider | Data Location | Supported |\n|----------|--------------|-----------|\n| Claude Code | `~/.claude/projects/` | Yes |\n| Claude Desktop | `~/Library/Application Support/Claude/local-agent-mode-sessions/` | Yes |\n| Codex (OpenAI) | `~/.codex/sessions/` | Yes |\n| Cursor | `~/Library/Application Support/Cursor/User/globalStorage/state.vscdb` | Yes |\n| cursor-agent | `~/.cursor/projects/` | Yes |\n| Gemini CLI | `~/.gemini/tmp/<project>/chats/` | Yes |\n| GitHub Copilot | `~/.copilot/session-state/` + VS Code `workspaceStorage/` | Yes |\n| Kiro | `~/Library/Application Support/Kiro/User/globalStorage/kiro.kiroagent/` | Yes |\n| OpenCode | `~/.local/share/opencode/` (SQLite) | Yes |\n| OpenClaw | `~/.openclaw/agents/` (+ legacy `.clawdbot`, `.moltbot`, `.moldbot`) | Yes |\n| Pi | `~/.pi/agent/sessions/` | Yes |\n| OMP (Oh My Pi) | `~/.omp/agent/sessions/` | Yes |\n| Droid | `~/.factory/projects/` | Yes |\n| Roo Code | VS Code `globalStorage/rooveterinaryinc.roo-cline/tasks/` | Yes |\n| KiloCode | VS Code `globalStorage/kilocode.kilo-code/tasks/` | Yes |\n| Qwen | `~/.qwen/projects/<project>/chats/` | Yes |\n| Goose | `~/.local/share/goose/sessions/sessions.db` (SQLite) | Yes |\n| Antigravity | `~/.gemini/antigravity/conversations/` | Yes |\n\nPaths shown are for macOS. Linux and Windows equivalents are detected automatically. If a path has changed or is wrong, please [open an issue](https://github.com/getagentseal/codeburn/issues).\n\nCodeBurn auto-detects which AI coding tools you use. If multiple providers have session data on disk, press `p` in the dashboard to toggle between them.\n\nThe `--provider` flag filters any command to a single provider: `codeburn report --provider claude`, `codeburn today --provider codex`, `codeburn export --provider cursor`. Works on all commands: `report`, `today`, `month`, `status`, `export`, `optimize`, `compare`, `yield`.\n\n### Provider Notes\n\n**Cursor** reads token usage from its local SQLite database. Since Cursor's \"Auto\" mode hides the actual model used, costs are estimated using Sonnet pricing (labeled \"Auto (Sonnet est.)\" in the dashboard). The Cursor view shows a Languages panel instead of Core Tools/Shell/MCP panels, since Cursor does not log individual tool calls. First run on a large Cursor database may take up to a minute; results are cached and subsequent runs are instant.\n\n**Gemini CLI** stores sessions as single JSON files. Each session embeds real token counts (input, output, cached, thoughts) per message, so no estimation is needed. Gemini reports input tokens inclusive of cached; CodeBurn subtracts cached from input before pricing to avoid double charging.\n\n**Kiro** stores conversations as `.chat` JSON files. Token counts are estimated from content length. The underlying model is not exposed, so sessions are labeled `kiro-auto` and costed at Sonnet rates.\n\n**GitHub Copilot** reads from both `~/.copilot/session-state/` (legacy CLI) and VS Code's `workspaceStorage/*/GitHub.copilot-chat/transcripts/`. The VS Code format has no explicit token counts; tokens are estimated from content length and the model is inferred from tool call ID prefixes.\n\n**OpenClaw** reads JSONL agent logs from `~/.openclaw/agents/` and also checks legacy paths (`.clawdbot`, `.moltbot`, `.moldbot`).\n\n**Roo Code and KiloCode** are Cline-family VS Code extensions. CodeBurn reads `ui_messages.json` from each task directory and extracts token usage from `api_req_started` entries.\n\nAdding a new provider is a single file. See `src/providers/codex.ts` for an example.\n\n## Features\n\n### Cost Tracking\n\nPrices every API call using input, output, cache read, cache write, and web search token counts. Fast mode multiplier for Claude. Pricing fetched from [LiteLLM](https://github.com/BerriAI/litellm) and cached locally for 24 hours. Hardcoded fallbacks for all Claude and GPT models to prevent mispricing.\n\n### Task Categories\n\n13 categories classified from tool usage patterns and user message keywords. No LLM calls, fully deterministic.\n\n| Category | What triggers it |\n|---|---|\n| Coding | Edit, Write tools |\n| Debugging | Error/fix keywords + tool usage |\n| Feature Dev | \"add\", \"create\", \"implement\" keywords |\n| Refactoring | \"refactor\", \"rename\", \"simplify\" |\n| Testing | pytest, vitest, jest in Bash |\n| Exploration | Read, Grep, WebSearch without edits |\n| Planning | EnterPlanMode, TaskCreate tools |\n| Delegation | Agent tool spawns |\n| Git Ops | git push/commit/merge in Bash |\n| Build/Deploy | npm build, docker, pm2 |\n| Brainstorming | \"brainstorm\", \"what if\", \"design\" |\n| Conversation | No tools, pure text exchange |\n| General | Skill tool, uncategorized |\n\n### Breakdowns\n\nDaily cost chart, per-project, per-model (Opus, Sonnet, Haiku, GPT-5, GPT-4o, Gemini, Kiro, and more), per-activity with one-shot rate, core tools, shell commands, and MCP servers.\n\n### One-Shot Rate\n\nFor categories that involve code edits, CodeBurn detects edit/test/fix retry cycles (Edit, Bash, Edit patterns). The one-shot column shows the percentage of edit turns that succeeded without retries. Coding at 90% means the AI got it right first try 9 out of 10 times.\n\n### Pricing\n\nFetched from [LiteLLM](https://github.com/BerriAI/litellm) model prices (auto-cached 24 hours at `~/.cache/codeburn/`). Handles input, output, cache write, cache read, and web search costs. Fast mode multiplier for Claude. Hardcoded fallbacks for all Claude and GPT-5 models to prevent fuzzy matching mispricing.\n\n### Optimize\n\n```bash\ncodeburn optimize                       # scan the last 30 days\ncodeburn optimize -p today              # today only\ncodeburn optimize -p week               # last 7 days\ncodeburn optimize --provider claude     # restrict to one provider\n```\n\nScans your sessions and your `~/.claude/` setup for waste patterns:\n\n- Files Claude re-reads across sessions (same content, same context, over and over)\n- Low Read:Edit ratio (editing without reading leads to retries and wasted tokens)\n- Wasted bash output (uncapped `BASH_MAX_OUTPUT_LENGTH`, trailing noise)\n- Unused MCP servers still paying their tool-schema overhead every session\n- Ghost agents, skills, and slash commands defined in `~/.claude/` but never invoked\n- Bloated `CLAUDE.md` files (with `@-import` expansion counted)\n- Cache creation overhead and junk directory reads\n\nEach finding shows the estimated token and dollar savings plus a ready-to-paste fix: a `CLAUDE.md` line, an environment variable, or a `mv` command to archive unused items. Findings are ranked by urgency (impact weighted against observed waste) and rolled up into an A to F setup health grade. Repeat runs classify each finding as new, improving, or resolved against a 48-hour recent window.\n\nYou can also open it inline from the dashboard: press `o` when a finding count appears in the status bar, `b` to return.\n\n### Compare\n\n```bash\ncodeburn compare                        # interactive model picker (default: all time)\ncodeburn compare -p week                # last 7 days\ncodeburn compare -p today               # today only\ncodeburn compare --provider claude      # Claude Code sessions only\n```\n\nOr press `c` in the dashboard to enter compare mode. Arrow keys switch periods, `b` to return.\n\n| Section | Metric | What it measures |\n|---------|--------|-----------------|\n| Performance | One-shot rate | Edits that succeed without retries |\n| Performance | Retry rate | Average retries per edit turn |\n| Performance | Self-correction | Turns where the model corrected its own mistake |\n| Efficiency | Cost per call | Average cost per API call |\n| Efficiency | Cost per edit | Average cost per edit turn |\n| Efficiency | Output tokens per call | Average output tokens per call |\n| Efficiency | Cache hit rate | Proportion of input from cache |\n\nAlso compares per-category one-shot rates, delegation rate, planning rate, average tools per turn, and fast mode usage.\n\n### Yield\n\n```bash\ncodeburn yield                  # last 7 days (default)\ncodeburn yield -p today         # today only\ncodeburn yield -p 30days        # last 30 days\ncodeburn yield -p month         # this calendar month\n```\n\nCorrelates AI sessions with git commits by timestamp:\n\n| Category | Meaning |\n|----------|---------|\n| Productive | Commits from this session landed in main |\n| Reverted | Commits were later reverted |\n| Abandoned | No commits near session, or commits never merged |\n\nRequires a git repository. Run from your project directory.\n\n### Plans\n\n```bash\ncodeburn plan set claude-max                                  # $200/month\ncodeburn plan set claude-pro                                  # $20/month\ncodeburn plan set cursor-pro                                  # $20/month\ncodeburn plan set custom --monthly-usd 150 --provider claude  # custom\ncodeburn plan set none                                        # disable plan view\ncodeburn plan                                                 # show current\ncodeburn plan reset                                           # remove plan config\n```\n\nSubscription tracking for Claude Pro, Claude Max, and Cursor Pro. The dashboard shows a progress bar of API-equivalent cost against your plan price. Supports custom plans. Presets use publicly stated plan prices (as of April 2026); they do not model exact token allowances, because vendors do not publish precise consumer-plan limits.\n\n### Currency\n\n```bash\ncodeburn currency GBP          # set to British Pounds\ncodeburn currency AUD          # set to Australian Dollars\ncodeburn currency JPY          # set to Japanese Yen\ncodeburn currency              # show current setting\ncodeburn currency --reset      # back to USD\n```\n\nAny [ISO 4217 currency code](https://en.wikipedia.org/wiki/ISO_4217#List_of_ISO_4217_currency_codes) is supported (162 currencies). Exchange rates fetched from [Frankfurter](https://www.frankfurter.app/) (European Central Bank data, free, no API key) and cached for 24 hours. Config stored at `~/.config/codeburn/config.json`. The currency setting applies everywhere: dashboard, status bar, menu bar, CSV/JSON exports, and JSON API output.\n\n### Model Aliases\n\nIf you see `$0.00` for some models, the model name reported by your provider does not match any entry in the LiteLLM pricing data. This commonly happens when using a proxy that rewrites model names.\n\n```bash\ncodeburn model-alias \"my-proxy-model\" \"claude-opus-4-6\"   # add alias\ncodeburn model-alias --list                                # show configured aliases\ncodeburn model-alias --remove \"my-proxy-model\"             # remove alias\n```\n\nAliases are stored in `~/.config/codeburn/config.json` and applied at runtime before pricing lookup. The target name can be anything in the [LiteLLM model list](https://github.com/BerriAI/litellm/blob/main/model_prices_and_context_window.json) or a canonical name from the fallback table (e.g. `claude-sonnet-4-6`, `claude-opus-4-5`, `gpt-4o`). Built-in aliases ship for known proxy model name variants. User-configured aliases take precedence over built-ins.\n\n### Filtering\n\n```bash\ncodeburn report --project myapp                  # show only projects matching \"myapp\"\ncodeburn report --exclude myapp                  # show everything except \"myapp\"\ncodeburn report --exclude myapp --exclude tests  # exclude multiple projects\ncodeburn month --project api --project web       # include multiple projects\ncodeburn export --project inventory              # export only \"inventory\" project data\n```\n\nFilter by provider, project name (case-insensitive substring), or exact date range. The `--project` and `--exclude` flags work on all commands and can be combined with `--provider`.\n\n```bash\ncodeburn report --from 2026-04-01 --to 2026-04-10   # explicit window\ncodeburn report --from 2026-04-01                    # this date through today\ncodeburn report --to 2026-04-10                      # earliest data through this date\n```\n\nEither flag alone is valid. Inverted or malformed dates exit with a clear error. In the TUI, the custom range sets the initial load only; pressing `1` through `5` switches back to predefined periods.\n\n### JSON Output\n\n`report`, `today`, and `month` support `--format json` to output the full dashboard data as structured JSON to stdout:\n\n```bash\ncodeburn report --format json             # 7-day JSON report\ncodeburn today --format json              # today's data as JSON\ncodeburn month --format json              # this month as JSON\ncodeburn report -p 30days --format json   # 30-day window\n```\n\nThe JSON includes all dashboard panels: overview (cost, calls, sessions, cache hit %), daily breakdown, projects (with `avgCostPerSession`), models with token counts, activities with one-shot rates, core tools, MCP servers, and shell commands. Pipe to `jq` for filtering:\n\n```bash\ncodeburn report --format json | jq '.projects'\ncodeburn today --format json | jq '.overview.cost'\n```\n\nFor lighter output, use `status --format json` (today and month totals only) or file exports (`export -f json`).\n\n## Menu Bar\n\n```bash\ncodeburn menubar\n```\n\nOne command: downloads the latest `.app`, installs into `~/Applications`, and launches it. Re-run with `--force` to reinstall. Native Swift and SwiftUI app lives in `mac/` (see `mac/README.md` for build details).\n\nThe menubar icon always shows today's spend (so $0 is normal if you have not used AI tools today). Click to open a popover with agent tabs, period switcher (Today, 7 Days, 30 Days, Month, All), Trend, Forecast, Pulse, Stats, and Plan insights, activity and model breakdowns, optimize findings, and CSV/JSON export. Refreshes every 30 seconds.\n\n**Compact mode** shrinks the menubar item to fit the text, dropping decimals (e.g. `$110` instead of `$110.20`):\n\n```bash\ndefaults write org.agentseal.codeburn-menubar CodeBurnMenubarCompact -bool true\n```\n\nRelaunch the app to apply. To revert: `defaults delete org.agentseal.codeburn-menubar CodeBurnMenubarCompact`.\n\n## Reading the Dashboard\n\nCodeBurn surfaces the data, you read the story. A few patterns worth knowing:\n\n| Signal you see | What it might mean |\n|---|---|\n| Cache hit < 80% | System prompt or context is not stable, or caching not enabled |\n| Lots of `Read` calls per session | Agent re-reading same files, missing context |\n| Low 1-shot rate (Coding 30%) | Agent struggling with edits, retry loops |\n| Opus 4.6 dominating cost on small turns | Overpowered model for simple tasks |\n| `dispatch_agent` / `task` heavy | Sub-agent fan-out, expected or excessive |\n| No MCP usage shown | Either you don't use MCP servers, or your config is broken |\n| Bash dominated by `git status`, `ls` | Agent exploring instead of executing |\n| Conversation category dominant | Agent talking instead of doing |\n\nThese are starting points, not verdicts. A 60% cache hit on a single experimental session is fine. A persistent 60% cache hit across weeks of work is a config issue.\n\n## How It Reads Data\n\n**Claude Code** stores session transcripts as JSONL at `~/.claude/projects/<sanitized-path>/<session-id>.jsonl`. Each assistant entry contains model name, token usage (input, output, cache read, cache write), tool_use blocks, and timestamps.\n\n**Codex** stores sessions at `~/.codex/sessions/YYYY/MM/DD/rollout-*.jsonl` with `token_count` events containing per-call and cumulative token usage, and `function_call` entries for tool tracking.\n\n**Cursor** stores session data in a SQLite database at `~/Library/Application Support/Cursor/User/globalStorage/state.vscdb` (macOS), `~/.config/Cursor/User/globalStorage/state.vscdb` (Linux), or `%APPDATA%/Cursor/User/globalStorage/state.vscdb` (Windows). Token counts are in `cursorDiskKV` table entries with `bubbleId:` key prefix. Requires `better-sqlite3` (installed as optional dependency). Parsed results are cached at `~/.cache/codeburn/cursor-results.json` and auto-invalidate when the database changes.\n\n**OpenCode** stores sessions in SQLite databases at `~/.local/share/opencode/opencode*.db`. CodeBurn queries the `session`, `message`, and `part` tables read-only, extracts token counts and tool usage, and recalculates cost using the LiteLLM pricing engine. Falls back to OpenCode's own cost field for models not in our pricing data. Subtask sessions (`parent_id IS NOT NULL`) are excluded to avoid double counting. Supports multiple channel databases and respects `XDG_DATA_HOME`.\n\n**Pi / OMP** stores sessions as JSONL at `~/.pi/agent/sessions/<sanitized-cwd>/*.jsonl` (Pi) and `~/.omp/agent/sessions/<sanitized-cwd>/*.jsonl` (OMP). Each assistant message carries token usage (input, output, cacheRead, cacheWrite) plus inline `toolCall` content blocks. CodeBurn extracts token counts, normalizes tool names to the standard set (`bash` to `Bash`, `dispatch_agent` to `Agent`), and pulls bash commands from `toolCall.arguments.command` for the shell breakdown.\n\n**Gemini CLI** stores sessions as single JSON files at `~/.gemini/tmp/<project>/chats/session-*.json`. Each session embeds real token counts (input, output, cached, thoughts) per message. Gemini reports input tokens inclusive of cached; CodeBurn subtracts cached from input before pricing to avoid double charging.\n\n**OpenClaw** stores agent sessions as JSONL at `~/.openclaw/agents/*.jsonl`. Also checks legacy paths `.clawdbot`, `.moltbot`, `.moldbot`. Token usage comes from assistant message `usage` blocks; model from `modelId` or `message.model` fields.\n\n**Roo Code / KiloCode** are Cline-family VS Code extensions. CodeBurn reads `ui_messages.json` from each task directory in VS Code's `globalStorage`, filtering `type: \"say\"` entries with `say: \"api_req_started\"` to extract token counts.\n\nCodeBurn deduplicates messages (by API message ID for Claude, by cumulative token cross-check for Codex, by conversation/timestamp for Cursor, by session ID for Gemini, by session+message ID for OpenCode, by responseId for Pi/OMP), filters by date range per entry, and classifies each turn.\n\n## Environment Variables\n\n| Variable | Description |\n|----------|-------------|\n| `CLAUDE_CONFIG_DIR` | Override Claude Code data directory (default: `~/.claude`) |\n| `CODEX_HOME` | Override Codex data directory (default: `~/.codex`) |\n| `FACTORY_DIR` | Override Droid data directory (default: `~/.factory`) |\n| `QWEN_DATA_DIR` | Override Qwen data directory (default: `~/.qwen/projects`) |\n\n## Project Structure\n\n```\nsrc/\n  cli.ts            Commander.js entry point\n  dashboard.tsx     Ink TUI (React for terminals)\n  parser.ts         JSONL reader, dedup, date filter, provider orchestration\n  models.ts         LiteLLM pricing, cost calculation\n  classifier.ts     13-category task classifier\n  compare-stats.ts  Model comparison engine\n  daily-cache.ts    Persistent daily cache with migration\n  day-aggregator.ts Daily aggregation from session data\n  types.ts          Type definitions\n  format.ts         Text rendering (status bar)\n  menubar-json.ts   Payload builder for the macOS menubar app\n  export.ts         CSV/JSON multi-period export\n  config.ts         Config file management (~/.config/codeburn/)\n  currency.ts       Currency conversion, exchange rates\n  sqlite.ts         SQLite adapter (lazy-loads better-sqlite3)\n  optimize.ts       Waste pattern detection engine\n  providers/\n    types.ts        Provider interface definitions\n    index.ts        Provider registry\n    claude.ts       Claude Code session discovery\n    codex.ts        Codex session discovery and JSONL parsing\n    copilot.ts      GitHub Copilot session parsing\n    cursor.ts       Cursor SQLite parsing, language extraction\n    cursor-agent.ts cursor-agent CLI session parsing\n    droid.ts        Droid session discovery\n    gemini.ts       Gemini CLI session JSON parsing\n    kilo-code.ts    KiloCode VS Code extension parsing\n    kiro.ts         Kiro .chat JSON session parsing\n    openclaw.ts     OpenClaw agent JSONL parsing\n    opencode.ts     OpenCode SQLite session parsing\n    pi.ts           Pi/OMP agent JSONL session parsing\n    qwen.ts         Qwen CLI JSONL session parsing\n    roo-code.ts     Roo Code VS Code extension parsing\n    goose.ts        Goose SQLite session parsing\n    antigravity.ts  Antigravity conversation parsing\n```\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=getagentseal%2Fcodeburn&type=date&legend=top-left\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=getagentseal/codeburn&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=getagentseal/codeburn&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=getagentseal/codeburn&type=date&legend=top-left\" />\n </picture>\n</a>\n\n## License\n\nMIT\n\n## Credits\n\nInspired by [ccusage](https://github.com/ryoppippi/ccusage) and [CodexBar](https://github.com/nicobailon/codexbar). Pricing data from [LiteLLM](https://github.com/BerriAI/litellm). Exchange rates from [Frankfurter](https://www.frankfurter.app/).\n\nBuilt by [AgentSeal](https://agentseal.org).\n","summary":"CodeBurn is a local, no‑config, cost‑tracking tool for developers that aggregates token usage, spending, and performance metrics from over 18 AI‑coding services. It parses session logs directly from disk, then prices each call with LiteLLM and presents the data in a tidy TUI dashboard or macOS menu‑bar interface, breaking expenses down by task type, model, tool, project, and provider. Built on Node 20+, it lets users run reports for arbitrary periods, export CSV/JSON summaries, and run optimization routines to flag inefficiencies and suggest copy‑paste fixes. The result is a quick, privacy‑respecting way for coders and teams to see exactly where their AI budget is going and to keep spending under control.","description":"See where your AI coding tokens go. Interactive TUI dashboard for Claude Code, Codex, and Cursor cost observability.","stars":5293,"language":"TypeScript"},{"owner":"kevinrgu","repo":"autoagent","url":"https://github.com/kevinrgu/autoagent","readme":"<p align=\"center\">\n  <a href=\"https://www.thirdlayer.inc\">\n    <img src=\"https://www.thirdlayer.inc/thirdlayer-logo.svg\" alt=\"thirdlayer\" width=\"200\">\n  </a>\n</p>\n\n<blockquote>\n<p>We're launching a product around self-configuring agents soon. <a href=\"https://form.typeform.com/to/ZQbnbO09\">Sign up here.</a><br>We're hiring engineers. If this work interests you, reach out to <a href=\"mailto:hello@thirdlayer.inc\">hello@thirdlayer.inc</a> with your Github link.</p>\n</blockquote>\n\n# AutoAgent\n\n> Like autoresearch but for agent engineering. Give an AI agent a task, let it build and iterate on an agent harness autonomously overnight. It modifies the system prompt, tools, agent configuration, and orchestration, runs the benchmark, checks the score, keeps or discards the change, and repeats.\n\n![teaser](progress.png)\n\nThe core idea is the same: you're not touching the harness Python files like you normally would as an engineer. Instead, you program `program.md`, the Markdown file that provides context to the meta-agent and defines the agent-engineering loop.\n\n## How it works\n\nThe repo has a few files and directories that matter:\n\n- **`agent.py`** -- the entire harness under test in a single file. It contains\n  config, tool definitions, agent registry, routing/orchestration, and the\n  Harbor adapter boundary. The adapter section is explicitly marked as fixed;\n  the rest is the primary edit surface for the meta-agent.\n- **`program.md`** -- instructions for the meta-agent + the directive (what\n  kind of agent to build). **This file is edited by the human**.\n- **`tasks/`** -- evaluation tasks in\n  [harbor](https://github.com/laude-institute/harbor) format. In a clean\n  baseline branch, benchmark payloads may be omitted and added in\n  benchmark-specific branches.\n- **`.agent/`** -- optional workspace artifacts for reusable instructions,\n  notes, prompts, or skills.\n\nThe metric is total **score** produced by the benchmark's task test suites. The\nmeta-agent hill-climbs on this score.\n\n## Quick start\n\n**Requirements:** Docker, Python 3.10+, [uv](https://docs.astral.sh/uv/), and\nwhatever model-provider credentials your current `agent.py` harness requires.\n\n```bash\n# 1. Install uv (if you don't have it)\ncurl -LsSf https://astral.sh/uv/install.sh | sh\n\n# 2. Install dependencies\nuv sync\n\n# 3. Set up the environment variables required by your current agent/runtime\n# Example:\ncat > .env << 'EOF'\nOPENAI_API_KEY=...\nEOF\n\n# 4. Build base image\ndocker build -f Dockerfile.base -t autoagent-base .\n\n# 5. Add tasks to tasks/ (see Task format section below)\n\n# 6. Run a single benchmark task\nrm -rf jobs; mkdir -p jobs && uv run harbor run -p tasks/ --task-name \"<task-name>\" -l 1 -n 1 --agent-import-path agent:AutoAgent -o jobs --job-name latest > run.log 2>&1\n\n# 7. Run all tasks in parallel (-n = concurrency, default 4)\nrm -rf jobs; mkdir -p jobs && uv run harbor run -p tasks/ -n 100 --agent-import-path agent:AutoAgent -o jobs --job-name latest > run.log 2>&1\n```\n\n## Running the meta-agent\n\nPoint your coding agent at the repo and prompt:\n\n```\nRead program.md and let's kick off a new experiment!\n```\n\nThe meta-agent will read the directive, inspect the current harness, run the\nbenchmark, diagnose failures, modify `agent.py`, and iterate.\n\n## Project structure\n\n```text\nagent.py                       -- single-file harness under test\n  editable harness section     -- prompt, registries, tools, routing\n  fixed adapter section        -- Harbor integration + trajectory serialization\nprogram.md                     -- meta-agent instructions + directive\nDockerfile.base                -- base image\n.agent/                        -- optional agent workspace artifacts\ntasks/                         -- benchmark tasks, typically added in benchmark-specific branches\njobs/                          -- Harbor job outputs\nresults.tsv                    -- experiment log (created by meta-agent, gitignored)\nrun.log                        -- latest run output\n```\n\n## Task format\n\nThe repo ships without tasks. Add your own to `tasks/` following [Harbor's task format](https://harborframework.com/docs/tasks):\n\n```text\ntasks/my-task/\n  task.toml           -- config (timeouts, metadata)\n  instruction.md      -- prompt sent to the agent\n  tests/\n    test.sh           -- entry point, writes /logs/reward.txt\n    test.py           -- verification (deterministic or LLM-as-judge)\n  environment/\n    Dockerfile        -- task container (FROM autoagent-base)\n  files/              -- reference files mounted into container\n```\n\nTests write a score (0.0-1.0) to the verifier logs. The meta-agent hill-climbs\non this. See the [Harbor docs](https://harborframework.com/docs) for full details on writing and porting tasks.\n\n## Design choices\n\n- **Program the meta-agent, not the harness directly.** The human steers the\n  loop through `program.md`, while the meta-agent edits `agent.py`.\n- **Single-file, registry-driven harness.** The implementation lives in one\n  file for simplicity, but agent and tool registration stay structured so the\n  harness can still evolve cleanly.\n- **Docker isolation.** The agent runs in a container. It can't damage the host.\n- **Score-driven.** Every experiment produces a numeric score. Keep if better,\n  discard if not. Same loop as autoresearch.\n- **Harbor-compatible tasks.** Tasks use the same format as harbor benchmarks,\n  so the same harness can be evaluated on different datasets.\n\n## Cleanup\n\nDocker images and containers accumulate across runs. Clean up regularly:\n\n```bash\n# Harbor's cached task images + task cache\nuv run harbor cache clean -f\n\n# Full Docker nuke (all unused images, build cache, etc.)\ndocker system prune -a -f\n\n# Lighter: just dead containers\ndocker container prune -f\n```\n\nIf Docker becomes unresponsive (for example after many concurrent runs), restart\nDocker Desktop:\n\n```bash\nkillall Docker && open -a Docker\n```\n\n## Improving performance with skills\n\nYou can equip the agent with [Agent Skills for Context Engineering](https://github.com/muratcankoylan/Agent-Skills-for-Context-Engineering) and [context7](https://github.com/upstash/context7) skills to improve performance.\n\n## License\n\nMIT\n\n","summary":"AutoAgent is a framework that automates the engineering of LLM‑powered agents by letting a meta‑agent iteratively modify an agent harness and optimize it against a benchmark.  Users specify a high‑level directive in a Markdown file; the system then edits prompts, tools, routing and agent configuration in a single‑file harness, runs Harbor‑formatted tasks, records performance scores, and retains improvements.  The project ships with Docker support, UV‑based dependency handling, and a straightforward CLI for launching parallel benchmarks.  It is especially useful for AI researchers and engineers who want to explore self‑configuring agents or accelerate experiment cycles in agent design.","description":"autonomous harness engineering","stars":4377,"language":"Python"},{"owner":"tw93","repo":"Kami","url":"https://github.com/tw93/Kami","readme":"<div align=\"center\">\n  <img src=\"https://gw.alipayobjects.com/zos/k/vl/logo.svg\" width=\"120\" />\n  <h1>Kami</h1>\n  <p><b>Good content deserves good paper.</b></p>\n  <a href=\"https://github.com/tw93/kami/stargazers\"><img src=\"https://img.shields.io/github/stars/tw93/kami?style=flat-square\" alt=\"Stars\"></a>\n  <a href=\"https://github.com/tw93/kami/releases\"><img src=\"https://img.shields.io/github/v/tag/tw93/kami?label=version&style=flat-square\" alt=\"Version\"></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/badge/license-MIT-blue.svg?style=flat-square\" alt=\"License\"></a>\n  <a href=\"https://twitter.com/HiTw93\"><img src=\"https://img.shields.io/badge/follow-Tw93-red?style=flat-square&logo=Twitter\" alt=\"Twitter\"></a>\n</div>\n\n## Why\n\nKami (紙, かみ) means paper in Japanese: the surface where a finished idea lands. AI can produce documents better than most humans do manually. The missing piece is not capability but constraint: without a design system, every session drifts into generic gray and inconsistent layouts.\n\nKami fills that gap: one constraint language, eight templates, simple enough for agents to run reliably, strict enough that every output is something you actually want to ship. English and Chinese are first-class; Japanese works via a best-effort CJK path with visual QA before delivery.\n\nPart of a trilogy: [Kaku](https://github.com/tw93/Kaku) (書く) writes code, [Waza](https://github.com/tw93/Waza) (技) drills habits, [Kami](https://github.com/tw93/Kami) (紙) delivers documents.\n\n## See it\n\n<table>\n<tr>\n  <td align=\"center\" width=\"25%\">\n    <a href=\"assets/demos/demo-tesla.pdf\"><img src=\"assets/demos/demo-tesla.png\" alt=\"Tesla company one-pager\"></a>\n    <br><b>One-Pager</b> · 中文\n    <br><sub>Tesla 公司介绍 · 单页</sub>\n  </td>\n  <td align=\"center\" width=\"25%\">\n    <a href=\"assets/demos/demo-agent-slides.pdf\"><img src=\"assets/demos/demo-agent-slides.png\" alt=\"Agent keynote slides\" /></a>\n    <br><b>Slides</b> · English\n    <br><sub>Agent keynote, 6 slides</sub>\n  </td>\n  <td align=\"center\" width=\"25%\">\n    <a href=\"assets/demos/demo-musk-resume.pdf\"><img src=\"assets/demos/demo-musk-resume.png\" alt=\"Elon Musk resume\"></a>\n    <br><b>Resume</b> · English\n    <br><sub>Founder CV, 2 pages</sub>\n  </td>\n  <td align=\"center\" width=\"25%\">\n    <a href=\"assets/demos/demo-kaku.pdf\"><img src=\"assets/demos/demo-kaku.png\" alt=\"Kaku portfolio\"></a>\n    <br><b>Portfolio</b> · 日本語\n    <br><sub>Kaku ターミナル作品集 · 7 ページ</sub>\n  </td>\n</tr>\n</table>\n\n## U
