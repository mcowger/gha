sage\n\n**Claude Code**\n\n```bash\nnpx skills add tw93/kami -a claude-code -g -y\n```\n\nOr via the Claude Code plugin marketplace:\n\n```bash\n/plugin marketplace add tw93/Kami\n/plugin install kami@kami\n```\n\n**Generic agents** (Codex, OpenCode, Pi, and other tools that read from `~/.agents/`)\n\n```bash\nnpx skills add tw93/kami -a '*' -g -y\n```\n\n**Claude Desktop**\n\nDownload [kami.zip](https://github.com/tw93/kami/releases/latest/download/kami.zip), open Customize > Skills > \"+\" > Create skill, and upload the ZIP directly (no need to unzip).\n\nThe ZIP is lightweight: Chinese fonts load from local checkout first, then jsDelivr CDN. If rendering is off, Claude downloads them on the next run. To update: download the same URL, click \"...\" on the skill card, choose Replace, upload.\n\nThe skill auto-triggers from natural requests, no slash command needed. Optimized for English and Chinese; Japanese supported via a best-effort CJK path with visual QA before delivery.\n\nExample prompts by language:\n\n- English: `make a one-pager for my startup` / `turn this research into a long doc` / `write a formal letter` / `make a portfolio of my projects` / `build me a resume` / `design a slide deck for my talk`\n- 中文: `帮我做一份一页纸` / `帮我排版一份长文档` / `帮我写一封正式信件` / `帮我做一份作品集` / `帮我做一份简历` / `帮我做一套演讲幻灯片`\n- 日本語: `スタートアップ向けの一枚資料を作って` / `この調査を長文レポートに整えて` / `正式な依頼文を作って` / `プロジェクト作品集を作って` / `履歴書を作って` / `登壇用スライドを作って`\n\n**Optional: brand profile**\n\nCreate `~/.config/kami/brand.md` to persist identity, brand, defaults, and writing habits. See [brand.example.md](references/brand.example.md) for a full template.\n\nThe file has YAML frontmatter (structured fields: name, role, email, website, GitHub, brand color, language, page size, currency locale, tone, and more) plus a Markdown body for freeform notes. Kami treats it as the lowest-resolution context: applied only when the current request is ambiguous, and always overridable by what the specific document needs. The goal is to feel familiar across your work without making every output look the same.\n\n## Design\n\nWarm parchment canvas, ink blue as the sole accent, serif carries hierarchy, no hard shadows or flashy palettes. Not a UI framework; a constraint system for printed matter. Documents should read as composed pages, not dashboards.\n\nSix document types (One-Pager, Long Doc, Letter, Portfolio, Resume, Slides) with dedicated EN/CN templates and a best-effort Japanese path. Fourteen inline SVG diagram types included. Kami picks the right variant based on the language you write in.\n\n| Element | Rule |\n|---|---|\n| Canvas | `#f5f4ed` parchment, never pure white |\n| Accent | Ink blue `#1B365D` only, no second chromatic hue |\n| Neutrals | All warm-toned (yellow-brown undertone), no cool blue-grays |\n| Serif | Body 400, headings 500. Avoid synthetic bold |\n| Line-height | Tight titles 1.1-1.3, dense body 1.4-1.45, reading body 1.5-1.55 |\n| Shadows | Ring or whisper only, no hard drop shadows |\n| Tags | Solid hex backgrounds only. `rgba()` triggers a WeasyPrint double-rectangle bug |\n\n**Fonts**: Each language uses a single serif font for the entire page. Chinese: TsangerJinKai02. Japanese: YuMincho. English: Charter. TsangerJinKai is free for personal use, commercial use requires a license from [tsanger.cn](https://tsanger.cn). All other fonts are system-bundled.\n\nFull spec: [design.md](references/design.md). Cheatsheet: [CHEATSHEET.md](CHEATSHEET.md).\n\n## Travel\n\nThe same constraint system doubles as a brief you can hand to any drawing tool. Point it at the [references folder](references/) and the output inherits warm parchment, ink-blue restraint, single-line geometric icons, and editorial typography.\n\n> Apply the Kami design system from github.com/tw93/kami/tree/main/references\n\n<table>\n<tr>\n  <td align=\"center\" width=\"33%\">\n    <img src=\"assets/illustrations/travel-tesla-optimus.png\" alt=\"Tesla Optimus patent overview\">\n    <br><b>Evidence layout</b> · 中文\n    <br><sub>Tesla Optimus 手部和前臂专利图一览</sub>\n  </td>\n  <td align=\"center\" width=\"33%\">\n    <img src=\"assets/illustrations/travel-spatialvla.png\" alt=\"SpatialVLA architecture redraw\">\n    <br><b>Architecture redraw</b> · English\n    <br><sub>SpatialVLA Figure 1, schematic</sub>\n  </td>\n  <td align=\"center\" width=\"33%\">\n    <img src=\"assets/illustrations/travel-3d-representations.png\" alt=\"3D representation tradeoffs\">\n    <br><b>Concept tradeoff</b> · 中文\n    <br><sub>3D 表示的算力-推理性取舍</sub>\n  </td>\n</tr>\n</table>\n\n<sub>Rendered by ChatGPT Images 2.0 in a single pass with no manual touch-up. Kami specifies, the renderer draws.</sub>\n\n## Background\n\nI like investing in US equities and ask Claude to write research reports all the time. Every output landed in the same default-doc look: gray, flat, a different layout each session. The structure was hard to scan, the formatting felt dated, and nothing about the page made me want to keep reading. So I started fixing the typography, the palette, the spacing, one rule at a time, until the report became a page I actually enjoyed.\n\nLater I needed to present \"The Agent You Don't Know: Principles, Architecture and Engineering Practice.\" I already had the document and didn't want to build slides from scratch, so I used Claude Design to lay it out in my own style, tweaked it round after round, and eventually got it to a place I was happy with. That process added inline SVG charts, a unified warm palette, and a tighter editorial rhythm. It kept growing until it covered every document I regularly ship, so I kept abstracting the process, and it became kami: one quiet design system I can hand to any agent and trust the output.\n\n## Support\n\n- If kami helped you, [share it](https://twitter.com/intent/tweet?url=https://github.com/tw93/kami&text=Kami%20-%20A%20quiet%20design%20system%20for%20professional%20documents.) with friends or give it a star.\n- Got ideas or bugs? Open an issue or PR.\n- I have two cats, TangYuan and Coke. If you think kami delights your life, you can feed them <a href=\"https://miaoyan.app/cats.html?name=Kami\" target=\"_blank\">canned food</a>.\n\n## License\n\nMIT License for kami code and templates. Feel free to use and contribute.\n\n**Fonts**: TsangerJinKai02 (Chinese) is free for personal use only; commercial use requires a license from [tsanger.cn](https://tsanger.cn). Charter (English), YuMincho (Japanese), and CJK fallbacks are system-bundled or open-licensed.\n","summary":"Kami is a design‑driven AI document generator that turns raw content into consistently styled PDFs, PowerPoints, resumes, or one‑pagers. It uses a single constraint language and eight ready‑made templates, enabling agents such as Claude Code or generic tools to produce polished work without drifting into generic layouts, with first‑class support for English and Chinese and a best‑effort Japanese path. The lightweight Skill package can be installed through the Claude Code marketplace or directly from a ZIP, and optional brand profiles allow users to embed company voice and visual identity. Creators, marketers, small‑business owners, and anyone who needs professional‑looking documents quickly will benefit from Kami’s rapid, high‑quality output.","description":"👩‍🚒 Good content deserves good paper.","stars":4316,"language":"HTML"},{"owner":"AgriciDaniel","repo":"claude-obsidian","url":"https://github.com/AgriciDaniel/claude-obsidian","readme":"\n# claude-obsidian\n\n<p align=\"center\">\n  <img src=\"wiki/meta/claude-obsidian-gif-cover-16x9.gif\" alt=\"claude-obsidian\" width=\"100%\" />\n</p>\n\n[![GitHub stars](https://img.shields.io/github/stars/AgriciDaniel/claude-obsidian?style=flat&color=e8734a)](https://github.com/AgriciDaniel/claude-obsidian/stargazers)\n[![License: MIT](https://img.shields.io/badge/License-MIT-blue.svg)](LICENSE)\n[![Claude Code](https://img.shields.io/badge/Claude_Code-plugin-8B5CF6)](https://code.claude.com/docs/en/discover-plugins)\n[![Blog Post](https://img.shields.io/badge/Deep_Dive-Blog_Post-22c55e)](https://agricidaniel.com/blog/claude-obsidian-ai-second-brain)\n\nClaude + Obsidian knowledge companion. A running notetaker that builds and maintains a persistent, compounding wiki vault. Every source you add gets integrated. Every question you ask pulls from everything that has been read. Knowledge compounds like interest.\n\nBased on [Andrej Karpathy's LLM Wiki pattern](https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f). **11 skills. Zero manual filing. Multi-agent support. Optional [DragonScale Memory](docs/dragonscale-guide.md) extension** (log folds, deterministic page addresses, semantic tiling lint, boundary-first autoresearch).\n\n---\n\n## What It Does\n### [Youtube Demo](https://www.youtube.com/watch?v=a2hgayvr-H4)\n<p align=\"center\">\n  <img src=\"wiki/meta/welcome-canvas.gif\" alt=\"Welcome canvas. Visual demo board\" width=\"96%\" />\n</p>\n\nYou drop sources. Claude reads them, extracts entities and concepts, updates cross-references, and files everything into a structured Obsidian vault. The wiki gets richer with every ingest.\n\nYou ask questions. Claude reads the hot cache (recent context), scans the index, drills into relevant pages, and synthesizes an answer. It cites specific wiki pages, not training data.\n\nYou lint. Claude finds orphans, dead links, stale claims, and missing cross-references. Your wiki stays healthy without manual cleanup.\n\nAt the end of every session, Claude updates a hot cache. The next session starts with full recent context, no recap needed.\n\n<p align=\"center\">\n  <img src=\"wiki/meta/image-example-graph-view.png\" alt=\"Graph view. Color-coded wiki nodes\" width=\"48%\" />\n  <img src=\"wiki/meta/image-example-wiki-map-view.png\" alt=\"Wiki Map canvas\" width=\"48%\" />\n</p>\n\n---\n\n## Why claude-obsidian?\n\nMost Obsidian AI plugins are chat interfaces - they answer questions about your existing notes. claude-obsidian is a knowledge engine - it creates, organizes, maintains, and evolves your notes autonomously.\n\n| Capability | claude-obsidian | Smart Connections | Copilot |\n|---|---|---|---|\n| **Auto-organize notes** | Creates entities, concepts, cross-references | No | No |\n| **Contradiction flagging** | `[!contradiction]` callouts with sources | No | No |\n| **Session memory** | Hot cache persists between conversations | No | No |\n| **Vault maintenance** | 8-category lint (orphans, dead links, gaps) | No | No |\n| **Autonomous research** | 3-round web research with gap-filling | No | No |\n| **Multi-model support** | Claude, Gemini, Codex, Cursor, Windsurf | Claude only | Multiple |\n| **Visual canvas** | Via [claude-canvas](https://github.com/AgriciDaniel/claude-canvas) companion | No | No |\n| **Query with citations** | Cites specific wiki pages | Cites similar notes | Cites notes |\n| **Batch ingestion** | Parallel agents for multiple sources | No | No |\n| **Open source** | MIT | MIT | Freemium |\n\n> **Deep dive:** [I Turned Obsidian Into a Self-Organizing AI Brain](https://agricidaniel.com/blog/claude-obsidian-ai-second-brain) - full breakdown with data visualizations, market context, and workflow demos.\n\n---\n\n## Quick Start\n\n### Option 1: Clone as vault (recommended: full setup in 2 minutes)\n\n```bash\ngit clone https://github.com/AgriciDaniel/claude-obsidian\ncd claude-obsidian\nbash bin/setup-vault.sh\n```\n\nOpen the folder in Obsidian: **Manage Vaults → Open folder as vault → select `claude-obsidian/`**\n\nOpen Claude Code in the same folder. Type `/wiki`.\n\n> `setup-vault.sh` configures `graph.json` (filter + colors), `app.json` (excludes plugin dirs), and `appearance.json` (enables CSS). Run it once before the first Obsidian open. You get the fully pre-configured graph view, color scheme, and wiki structure out of the box.\n\n---\n\n### Option 2: Install as Claude Code plugin\n\nPlugin installation is a two-step process in Claude Code. First add the marketplace catalog, then install the plugin from it.\n\n```bash\n# Step 1: add the marketplace\nclaude plugin marketplace add AgriciDaniel/claude-obsidian\n\n# Step 2: install the plugin\nclaude plugin install claude-obsidian@claude-obsidian-marketplace\n```\n\nIn any Claude Code session: `/wiki`. Claude walks you through vault setup.\n\nTo check it worked:\n```bash\nclaude plugin list\n```\n\n---\n\n### Option 3: Add to an existing vault\n\nCopy `WIKI.md` into your vault root. Paste into Claude:\n\n```\nRead WIKI.md in this project. Then:\n1. Check if Obsidian is installed. If not, install it.\n2. Check if the Local REST API plugin is running on port 27124.\n3. Configure the MCP server.\n4. Ask me ONE question: \"What is this vault for?\"\nThen scaffold the full wiki structure.\n```\n\n---\n\n## Commands\n\n| You say | Claude does |\n|---------|------------|\n| `/wiki` | Setup check, scaffold, or continue where you left off |\n| `ingest [file]` | Read source, create 8-15 wiki pages, update index and log |\n| `ingest all of these` | Batch process multiple sources, then cross-reference |\n| `what do you know about X?` | Read index > relevant pages > synthesize answer |\n| `/save` | File the current conversation as a wiki note |\n| `/save [name]` | Save with a specific title (skips the naming question) |\n| `/autoresearch [topic]` | Run the autonomous research loop: search, fetch, synthesize, file |\n| `/canvas` | Open or create the visual canvas, list zones and nodes |\n| `/canvas add image [path]` | Add an image (URL or local path) to the canvas with auto-layout |\n| `/canvas add text [content]` | Add a markdown text card to the canvas |\n| `/canvas add pdf [path]` | Add a PDF document as a rendered preview node |\n| `/canvas add note [page]` | Pin a wiki page as a linked card on the canvas |\n| `/canvas zone [name]` | Add a new labeled zone to organize visual content |\n| `/canvas from banana` | Capture recently generated images onto the canvas |\n| `lint the wiki` | Health check: orphans, dead links, gaps, suggestions |\n| `update hot cache` | Refresh hot.md with latest context summary |\n\n> **Want more?** [claude-canvas](https://github.com/AgriciDaniel/claude-canvas) adds 12 templates, 6 layout algorithms, AI image generation, presentations, and full canvas orchestration. Install both — they complement each other.\n\n---\n\n## Cross-Project Power Move\n\nPoint any Claude Code project at this vault. Add to that project's `CLAUDE.md`:\n\n```markdown\n## Wiki Knowledge Base\nPath: ~/path/to/vault\n\nWhen you need context not already in this project:\n1. Read wiki/hot.md first (recent context cache)\n2. If not enough, read wiki/index.md\n3. If you need domain details, read the relevant domain sub-index\n4. Only then drill into specific wiki pages\n\nDo NOT read the wiki for general coding questions or tasks unrelated to [domain].\n```\n\nYour executive assistant, coding projects, and content workflows all draw from the same knowledge base.\n\n---\n\n## Six Wiki Modes\n\n| Mode | Use when |\n|------|---------|\n| A: Website | Sitemap, content audit, SEO wiki |\n| B: GitHub | Codebase map, architecture wiki |\n| C: Business | Project wiki, competitive intelligence |\n| D: Personal | Second brain, goals, journal synthesis |\n| E: Research | Papers, concepts, thesis |\n| F: Book/Course | Chapter tracker, course notes |\n\nModes can be combined.\n\n---\n\n## What Gets Created\n\nA typical scaffold creates:\n- Folder structure for your chosen mode\n- `wiki/index.md`: master catalog\n- `wiki/log.md`: append-only operation log\n- `wiki/hot.md`: recent context cache\n- `wiki/overview.md`: executive summary\n- `wiki/meta/dashboard.base`: Bases dashboard (primary, native Obsidian)\n- `wiki/meta/dashboard.md`: Legacy Dataview dashboard (optional fallback)\n- `_templates/`: Obsidian Templater templates for each note type\n- `.obsidian/snippets/vault-colors.css`: color-coded file explorer\n- Vault `CLAUDE.md`: auto-loaded project instructions\n\n---\n\n## MCP Setup (Optional)\n\nMCP lets Claude read and write vault notes directly without copy-paste.\n\nOption A (REST API based):\n1. Install the Local REST API plugin in Obsidian\n2. Copy your API key\n3. Run:\n```bash\nclaude mcp add-json obsidian-vault '{\n  \"type\": \"stdio\",\n  \"command\": \"uvx\",\n  \"args\": [\"mcp-obsidian\"],\n  \"env\": {\n    \"OBSIDIAN_API_KEY\": \"your-key\",\n    \"OBSIDIAN_HOST\": \"127.0.0.1\",\n    \"OBSIDIAN_PORT\": \"27124\",\n    \"NODE_TLS_REJECT_UNAUTHORIZED\": \"0\"\n  }\n}' --scope user\n```\n\nOption B (filesystem based, no plugin needed):\n```bash\nclaude mcp add-json obsidian-vault '{\n  \"type\": \"stdio\",\n  \"command\": \"npx\",\n  \"args\": [\"-y\", \"@bitbonsai/mcpvault@latest\", \"/path/to/your/vault\"]\n}' --scope user\n```\n\n---\n\n## Plugins\n\n### Core Plugins (built into Obsidian: no install needed)\n\n| Plugin | Purpose |\n|--------|---------|\n| **Bases** | Powers `wiki/meta/dashboard.base`: native database views. Available since Obsidian v1.9.10 (August 2025). **Replaces Dataview for the primary dashboard.** |\n| **Properties** | Visual frontmatter editor |\n| **Backlinks**, **Outline**, **Graph view** | Standard navigation |\n\n### Pre-installed Community Plugins (ship with this vault)\n\nEnable in **Settings → Community Plugins → enable**:\n\n| Plugin | Purpose | Notes |\n|--------|---------|-------|\n| **Calendar** | Right-sidebar calendar with word count + task dots | Pre-installed |\n| **Thino** | Quick memo capture panel | Pre-installed |\n| **Excalidraw** | Freehand drawing canvas, annotate images | Pre-installed* |\n| **Banners** | Notion-style header image via `banner:` frontmatter | Pre-installed |\n\n\\* Excalidraw `main.js` (8MB) is downloaded automatically by `setup-vault.sh`. It is not tracked in git.\n\n### Also install from Community Plugins (not pre-installed)\n\n| Plugin | Purpose |\n|--------|---------|\n| **Templater** | Auto-fills frontmatter from `_templates/` |\n| **Obsidian Git** | Auto-commits vault every 15 minutes |\n| **Dataview** *(optional/legacy)* | Only needed for the legacy `wiki/meta/dashboard.md` queries. The primary dashboard now uses Bases. |\n\nAlso install the **[Obsidian Web Clipper](https://obsidian.md/clipper)** browser extension. Sends web pages to `.raw/` in one click.\n\n---\n\n## CSS Snippets (auto-enabled by setup-vault.sh)\n\nThree snippets ship with the vault and are enabled automatically:\n\n| Snippet | Effect |\n|---------|--------|\n| `vault-colors` | Color-codes `wiki/` folders by type in the file explorer (blue = concepts, green = sources, purple = entities) |\n| `ITS-Dataview-Cards` | Turns Dataview `TABLE` queries into visual card grids: use ` ```dataviewjs ` with `.cards` class |\n| `ITS-Image-Adjustments` | Fine-grained image sizing in notes: append `\\|100` to any image embed |\n\n---\n\n## Banner Plugin\n\nAdd to any wiki page frontmatter:\n\n```yaml\nbanner: \"_attachments/images/your-image.png\"\nbanner_icon: \"🧠\"\n```\n\nThe page renders a full-width header image in Obsidian. Works great for hub pages and overviews.\n\n---\n\n## File Structure\n\n```\nclaude-obsidian/\n├── .claude-plugin/\n│   ├── plugin.json              # manifest\n│   └── marketplace.json         # distribution\n├── skills/\n│   ├── wiki/                    # orchestrator + references (7 ref files)\n│   ├── wiki-ingest/             # INGEST operation\n│   ├── wiki-query/              # QUERY operation\n│   ├── wiki-lint/               # LINT operation\n│   ├── save/                    # /save: file conversations to wiki\n│   ├── autoresearch/            # /autoresearch: autonomous research loop\n│   │   └── references/\n│   │       └── program.md       # configurable research objectives\n│   └── canvas/                  # /canvas: visual layer (images, PDFs, notes)\n│       └── references/\n│           └── canvas-spec.md   # Obsidian canvas JSON format reference\n├── agents/\n│   ├── wiki-ingest.md           # parallel ingestion agent\n│   └── wiki-lint.md             # health check agent\n├── commands/\n│   ├── wiki.md                  # /wiki bootstrap command\n│   ├── save.md                  # /save command\n│   ├── autoresearch.md          # /autoresearch command\n│   └── canvas.md                # /canvas visual layer command\n├── hooks/\n│   └── hooks.json               # SessionStart + Stop hot cache hooks\n├── _templates/                  # Obsidian Templater templates\n├── wiki/\n│   ├── Wiki Map.canvas          # visual hub, central graph node\n│   ├── canvases/                # welcome.canvas + main.canvas (visual demos)\n│   ├── getting-started.md       # onboarding walkthrough (inside the vault)\n│   ├── concepts/                # seeded: LLM Wiki Pattern, Hot Cache, Compounding Knowledge\n│   ├── entities/                # seeded: Andrej Karpathy\n│   ├── sources/                 # populated by your first ingest\n│   └── meta/\n│       ├── dashboard.base       # Bases dashboard (primary)\n│       └── dashboard.md         # Legacy Dataview dashboard (optional)\n├── .raw/                        # source documents (hidden in Obsidian)\n├── .obsidian/snippets/          # vault-colors.css (3-color scheme)\n├── WIKI.md                      # full schema reference\n├── CLAUDE.md                    # project instructions\n└── README.md                    # this file\n```\n\n---\n\n## AutoResearch: program.md\n\nThe `/autoresearch` command is configurable. Edit `skills/autoresearch/references/program.md` to control:\n\n- What sources to prefer (academic, official docs, news)\n- Confidence scoring rules\n- Max rounds and max pages per session\n- Domain-specific constraints\n\nThe default program works for general research. Override it for your domain. A medical researcher would add \"prefer PubMed\". A business analyst would add \"focus on market data and filings\".\n\n---\n\n## Seed Vault\n\nThis repo ships with a seeded vault. Open it in Obsidian and you'll see:\n\n- `wiki/concepts/`: LLM Wiki Pattern, Hot Cache, Compounding Knowledge\n- `wiki/entities/`: Andrej Karpathy\n- `wiki/sources/`: empty until your first ingest\n- `wiki/meta/dashboard.base`: Bases dashboard (works in any Obsidian v1.9.10+)\n- `wiki/meta/dashboard.md`: Legacy Dataview dashboard (optional fallback)\n\nThe graph view will show a connected cluster of 5 pages. This is what the wiki looks like after one ingest. Add more sources and it grows from there.\n\n<p align=\"center\">\n  <img src=\"wiki/meta/wiki-graph-grow.gif\" alt=\"Knowledge graph growing\" width=\"48%\" />\n  <img src=\"wiki/meta/workflow-loop.gif\" alt=\"Workflow loop\" width=\"48%\" />\n</p>\n\n---\n\n## Companion: claude-canvas\n\nFor the visual layer, [claude-canvas](https://github.com/AgriciDaniel/claude-canvas) adds AI-orchestrated canvas creation - knowledge graphs, presentations, flowcharts, mood boards with 12 templates and 6 layout algorithms. Auto-detects claude-obsidian vaults.\n\n```bash\nclaude plugin install AgriciDaniel/claude-canvas\n```\n\n---\n\n## Community\n\n- [Blog post](https://agricidaniel.com/blog/claude-obsidian-ai-second-brain) - deep dive with competitor analysis, data charts, and workflow demos\n- [AI Marketing Hub](https://www.skool.com/ai-marketing-hub) - 2,800+ members, free community\n- [YouTube](https://www.youtube.com/@AgriciDaniel) - tutorials and demos\n- [All open-source tools](https://github.com/AgriciDaniel) - claude-seo, claude-ads, claude-blog, and more\n\n---\n\n*Based on [Andrej Karpathy's LLM Wiki pattern](https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f). Built by [Agrici Daniel](https://agricidaniel.com/about).*\n","summary":"claude‑obsidian is an open‑source plugin that turns Obsidian into a self‑organizing, AI‑powered knowledge base. It ingests arbitrary sources, lets Claude auto‑extract entities and concepts, and continuously updates a structured Obsidian vault with cross‑references, citations, and linting for orphaned or stale content. The system supports session‑persistence (“hot cache”), multi‑round autonomous research, multi‑model compatibility, and batch ingestion via parallel agents. Researchers, writers, and serious note‑takers who already use Obsidian will benefit from a continuously evolving wiki that requires no manual filing and always cites source pages for answers.","description":"Claude + Obsidian knowledge companion. Persistent, compounding wiki vault based on Karpathy's LLM Wiki pattern. /wiki /save /autoresearch","stars":4162,"language":"Python"},{"owner":"momenbasel","repo":"PureMac","url":"https://github.com/momenbasel/PureMac","readme":"<p align=\"center\">\n  <img src=\"screenshot.png\" alt=\"PureMac\" width=\"700\">\n</p>\n\n<p align=\"center\">\n  <b>English</b> |\n  <a href=\"docs/README.es.md\">Español</a> |\n  <a href=\"docs/README.ja.md\">日本語</a> |\n  <a href=\"docs/README.zh-Hans.md\">简体中文</a> |\n  <a href=\"docs/README.zh-Hant.md\">繁體中文</a>\n</p>\n\n<h1 align=\"center\">PureMac</h1>\n\n<p align=\"center\">\n  <b>Free, open-source macOS app manager and system cleaner.</b><br>\n  Uninstall apps completely. Find orphaned files. Clean system junk.<br>\n  No subscriptions. No telemetry. No data collection.\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/momenbasel/PureMac/releases/latest\"><img src=\"https://img.shields.io/github/v/release/momenbasel/PureMac?style=flat-square&label=Download\" alt=\"Latest Release\"></a>\n  <a href=\"https://github.com/momenbasel/PureMac/actions/workflows/build.yml\"><img src=\"https://img.shields.io/github/actions/workflow/status/momenbasel/PureMac/build.yml?style=flat-square&label=Build\" alt=\"Build Status\"></a>\n  <img src=\"https://img.shields.io/badge/macOS-13.0+-blue?style=flat-square\" alt=\"macOS 13.0+\">\n  <img src=\"https://img.shields.io/badge/Swift-5.9-orange?style=flat-square\" alt=\"Swift 5.9\">\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/github/license/momenbasel/PureMac?style=flat-square\" alt=\"MIT License\"></a>\n  <a href=\"https://github.com/momenbasel/PureMac/stargazers\"><img src=\"https://img.shields.io/github/stars/momenbasel/PureMac?style=flat-square\" alt=\"Stars\"></a>\n  <a href=\"https://github.com/momenbasel/PureMac/releases\"><img src=\"https://img.shields.io/github/downloads/momenbasel/PureMac/total?style=flat-square&label=Downloads\" alt=\"Downloads\"></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"#install\">Install</a> -\n  <a href=\"#features\">Features</a> -\n  <a href=\"#screenshots\">Screenshots</a> -\n  <a href=\"#contributing\">Contributing</a>\n</p>\n\n---\n\n## Install\n\n### Homebrew (recommended)\n\n```bash\nbrew update\nbrew install --cask puremac\n```\n\n### Direct Download\n\nDownload the latest `.dmg` from [Releases](https://github.com/momenbasel/PureMac/releases/latest), open it, and drag PureMac to `/Applications`.\n\n> Signed and notarized with Apple Developer ID - installs without Gatekeeper warnings.\n\n### Build from source\n\n```bash\nbrew install xcodegen\ngit clone https://github.com/momenbasel/PureMac.git\ncd PureMac\nxcodegen generate\nxcodebuild -project PureMac.xcodeproj -scheme PureMac -configuration Release -derivedDataPath build build\nopen build/Build/Products/Release/PureMac.app\n```\n\n## Features\n\n### App Uninstaller\n- Discovers all installed apps from `/Applications` and `~/Applications`\n- Heuristic file discovery engine with **10-level matching** (bundle ID, company name, entitlements, team identifier, Spotlight metadata, container discovery)\n- **3 sensitivity levels**: Strict (safe), Enhanced (balanced), Deep (thorough)\n- Shows all related files: caches, preferences, containers, logs, support files, launch agents\n- System app protection - 27 Apple apps are excluded from the uninstall list\n- Master-detail view: app table on left, discovered files on right\n\n### Orphaned File Finder\n- Detects leftover files in `~/Library` from apps that have been uninstalled\n- Compares Library contents against all installed app identifiers\n- One-click cleanup of orphaned files\n\n### System Cleaner\n- **Smart Scan** - one-click scan across all categories\n- **System Junk** - system caches, logs, and temporary files\n- **User Cache** - dynamically discovers all app caches (no hardcoded app list)\n- **Mail Attachments** - downloaded mail attachments\n- **Trash Bins** - empty all Trash\n- **Large & Old Files** - files over 100 MB or older than 1 year\n- **Purgeable Space** - APFS purgeable disk space detection\n- **Xcode Junk** - DerivedData, Archives, simulator caches\n- **Brew Cache** - Homebrew download cache (detects custom HOMEBREW_CACHE)\n- **Scheduled Cleaning** - automatic scans on configurable intervals\n\n### Native macOS Experience\n- Built with SwiftUI using native macOS components\n- `NavigationSplitView`, `Toggle`, `ProgressView`, `Form`, `GroupBox`, `Table`\n- Respects system light/dark mode automatically\n- No custom gradients, glows, or web-app styling\n- First-launch onboarding with Full Disk Access setup\n\n### Safety\n- Confirmation dialogs before all destructive operations\n- Symlink attack prevention - resolves and validates paths before deletion\n- System app protection - Apple apps cannot be uninstalled\n- Large & Old Files are never auto-selected\n- Structured logging via `os.log` (visible in Console.app)\n\n## Screenshots\n\n| Onboarding | App Uninstaller |\n|---|---|\n| ![Onboarding](screenshots/onboarding.png) | ![App Uninstaller](screenshots/app-uninstaller.png) |\n\n| System Junk | Xcode Junk |\n|---|---|\n| ![System Junk](screenshots/system-junk.png) | ![Xcode Junk](screenshots/xcode-junk.png) |\n\n| User Cache |\n|---|\n| ![User Cache](screenshots/user-cache.png) |\n\n## Architecture\n\n```\nPureMac/\n  Logic/Scanning/     - Heuristic scan engine, locations database, conditions\n  Logic/Utilities/    - Structured logging\n  Models/             - Data models, typed errors\n  Services/           - Scan engine, cleaning engine, scheduler\n  ViewModels/         - Centralized app state\n  Views/              - Native SwiftUI views\n    Apps/             - App uninstaller views\n    Cleaning/         - Smart scan and category views\n    Orphans/          - Orphan finder\n    Settings/         - Native Form-based settings\n    Components/       - Shared components\n```\n\nKey components:\n- **AppPathFinder** - 10-level heuristic matching engine for discovering app-related files\n- **Locations** - 120+ macOS filesystem search paths\n- **Conditions** - 25 per-app matching rules for edge cases (Xcode, Chrome, VS Code, etc.)\n- **AppInfoFetcher** - Spotlight metadata + Info.plist fallback for app discovery\n- **Logger** - Apple `os.log` unified logging\n\n## Contributing\n\nContributions are welcome. See [CONTRIBUTING.md](CONTRIBUTING.md) for guidelines.\n\nAreas where help is especially welcome:\n- Size/date filter presets in category views\n- XCTest coverage for AppState and scan engine\n- Localization (zh-Hans, zh-Hant, and other languages)\n- App icon design\n\n## Acknowledgments\n\nv2.0 was shaped by community feedback and contributions:\n\n- **[@nguyenhuy158](https://github.com/nguyenhuy158)** - Search and filter feature request ([#18](https://github.com/momenbasel/PureMac/issues/18)) and implementation ([#29](https://github.com/momenbasel/PureMac/pull/29))\n- **[@edufalcao](https://github.com/edufalcao)** - Cleaning safety guards and confirmation dialogs ([#30](https://github.com/momenbasel/PureMac/pull/30))\n- **[@zeck00](https://github.com/zeck00)** - UI overhaul ([#31](https://github.com/momenbasel/PureMac/pull/31)), app uninstaller with system app protection ([#32](https://github.com/momenbasel/PureMac/pull/32)), and onboarding experience ([#33](https://github.com/momenbasel/PureMac/pull/33))\n- **[@0x-man](https://github.com/0x-man)** - Symlink security vulnerability report ([#25](https://github.com/momenbasel/PureMac/issues/25))\n- **[@ansidev](https://github.com/ansidev)** - Checkbox interaction bug report ([#34](https://github.com/momenbasel/PureMac/issues/34))\n- **[@fengcheng01](https://github.com/fengcheng01)** - App uninstaller feature request ([#28](https://github.com/momenbasel/PureMac/issues/28))\n- **[@scholzfuni](https://github.com/scholzfuni)** - Modularization proposal ([#23](https://github.com/momenbasel/PureMac/issues/23))\n\n## License\n\nMIT License. See [LICENSE](LICENSE) for details.\n","summary":"PureMac is a free, open‑source macOS utility that lets users uninstall applications completely, locate orphaned library files, and clean system junk—all without subscriptions or telemetry. Its core capabilities include an intelligent app‑uninstaller that uses a 10‑level matching engine and adjustable sensitivity levels to capture every cache, log, container, and launch agent; a quick orphan‑file finder that cleans up stray Library remnants; and a smart system cleaner that removes caches, logs, mail attachments, large or old files, Xcode artefacts, Homebrew caches, and APFS purgeable space. Built with SwiftUI, PureMac offers a native macOS interface with a master‑detail view, scheduled cleaning, and a wide range of cleanup categories. The tool is ideal for power users, developers, and privacy‑concerned individuals who want a dependable, cost‑free way to keep their macOS clean and free of hidden files.","description":"Free, open-source macOS cleaner. CleanMyMac alternative with zero telemetry. Native SwiftUI, scheduled auto-cleaning, Xcode/Homebrew/system cache cleanup. MIT licensed.","stars":3729,"language":"Swift"},{"owner":"Keychron","repo":"Keychron-Keyboards-Hardware-Design","url":"https://github.com/Keychron/Keychron-Keyboards-Hardware-Design","readme":"# Keychron Hardware Design\n\n[![Models Uploaded](https://img.shields.io/endpoint?url=https://raw.githubusercontent.com/Keychron/Keychron-Keyboards-Hardware-Design/main/.github/badges/model-count.json)](https://github.com/Keychron/Keychron-Keyboards-Hardware-Design)\n[![Repo](https://img.shields.io/badge/repo-source--available-4c1)](https://github.com/Keychron/Keychron-Keyboards-Hardware-Design)\n[![Docs](https://img.shields.io/badge/docs-ready-brightgreen)](https://github.com/Keychron/Keychron-Keyboards-Hardware-Design/tree/main/docs)\n[![Star this repo](https://img.shields.io/badge/GitHub-Star%20this%20repo-black?logo=github)](https://github.com/Keychron/Keychron-Keyboards-Hardware-Design)\n\nProduction-grade hardware design files for Keychron keyboards and mice.\n\nStudy real CAD. Remix plates and cases. Design compatible accessories. Learn from how real products are built.\n\n> This project is source-available. Personal and educational use is allowed. Original compatible accessories and add-ons are not subject to the commercial-use restriction in this license, but you may not copy and sell Keychron keyboards or mice, and you may not use Keychron trademarks as your own branding.\n\n![Keychron hardware design hero](docs/assets/hero-keychron-hardware-design.jpg)\n\n## Latest Updates\n\n- **2026-04-29:** Added more K4 Pro and more K8 Pro files.\n- **2026-04-28:** Added K6 HE, Q10 Max, Q60 Max, and Q65 Max files.\n- **2026-04-27:** Added K8 files.\n- **2026-04-24:** Added Q0 Max, Q5 Max, Q12 Max, Q13 Max, Q15 Max and K8 QMK files.\n- **2026-04-22:** Added V3 and V3 8K files.\n- **2026-04-21:** Added more K7 Pro files.\n- **2026-04-17:** Added Q1 Max, Q8 Max and Q14 Max files.\n- **2026-04-14:** Added more P6 Ultra 8K, K10 QMK and B6 Pro files.\n- **2026-04-13:** Added P6 Ultra 8K, K2 QMK, K10 QMK files.\n- **2026-04-12:** Added V1 8K, V3 8K, V5 8K, and V6 8K series folders and README pages.\n- **2026-04-12:** Added V0 Ultra 8K, V1 Ultra 8K, V3 Ultra 8K, V5 Ultra 8K, V6 Ultra 8K, and V10 Ultra 8K series folders and README pages.\n- **2026-04-12:** Added Q1 HE 8K, Q2 HE 8K, Q3 HE 8K, Q5 HE 8K, Q6 HE 8K, and Q16 HE 8K series folders and README pages.\n- **2026-04-12:** Added Q1 Ultra 8K, Q3 Ultra 8K, Q5 Ultra 8K, and Q13 Ultra 8K series folders and README pages.\n- **2026-04-11:** Added C3 Pro 8K, K4 HE, K8 HE, K2 QMK, Q0 HE, and Q12 HE.\n- **2026-04-10:** Added more K0 Max files, Q12 HE and more Q6 Max files and more keycap profiles.\n- **2026-04-09:** Added K10 HE, Q6 Max and K0 Max design files. Update: make the accessories not subject to licensing.\n- **2026-04:** Added Q HE and mouse design files.\n- **2026-03:** Expanded K Max coverage.\n- More milestone updates will be published in [GitHub Releases](https://github.com/Keychron/Keychron-Keyboards-Hardware-Design/releases).\n\n## Start Here\n\nIf you're new, begin with one of these paths:\n\n- **Browse keyboard files**  \n  Explore C Pro 8K, Q, Q Pro, Q HE, Q Max, Q Ultra 8K, K Pro, K Max, K HE, K QMK, V Max, and P HE models.\n\n- **Browse mouse files**  \n  Explore shell and full-model files for M and G series mice.\n\n- **Open the files in CAD software**  \n  Read the [File Format Guide](docs/file-format-guide.md) for STEP, DWG, DXF, and PDF compatibility.\n\n- **Learn how to remix or modify a design**  \n  Start with the [Getting Started Guide](docs/getting-started.md).\n\n- **See the current filesystem inventory**  \n  Open the [Repository Inventory](docs/repo-inventory.md) generated from the repo itself.\n\n- **Contribute fixes or improvements**  \n  Read [Contributing](docs/CONTRIBUTING.md) for workflow, file standards, and submission rules.\n\n- **Join the community**  \n  Join the [Keychron Discord](https://discord.com/invite/HAYbRrTsjN) to share builds, ask questions, and help grow the hardware modding community.\n\n- **Understand the license before building**  \n  Read the [License FAQ](docs/license-faq.md).\n\n## What You Can Do With This Repository\n\n- Study real industrial design and hardware packaging files\n- Create case, plate, and accessory remixes\n- Inspect dimensions, structure, and component integration\n- Build community mods and compatible add-ons\n- Contribute documentation, corrections, and new variants that fit the license\n\n## What's Inside\n\n| Series | Type | Models | Components |\n|---|---|---|---|\n| **C Pro 8K Series** | Keyboard | C1 Pro 8K, C2 Pro 8K, C3 Pro 8K | Case, Plate, Full Model, Stabilizer |\n| **Q Series** | Keyboard | Q0 Plus, Q1–Q12, Q60, Q65 | Case, Plate, Encoder, Full Model, Stabilizer, OSA Keycap |\n| **Q Pro Series** | Keyboard | Q1 Pro–Q14 Pro (10 models) | Case, Plate, Encoder, Full Model, Stabilizer, KSA Keycap |\n| **Q HE Series** | Hall Effect | Q0 HE, Q1 HE, Q2 HE, Q3 HE, Q4 HE, Q5 HE, Q6 HE, Q12 HE | Published files for selected models; newer Q HE folders also include README/model pages for future CAD uploads |\n| **Q HE 8K Series** | Hall Effect | Q1 HE 8K, Q2 HE 8K, Q3 HE 8K, Q5 HE 8K, Q6 HE 8K, Q16 HE 8K | README/model pages prepared for future CAD uploads |\n| **Q Max Series** | Keyboard | Q0 Max, Q1 Max, Q2 Max, Q3 Max, Q5 Max, Q6 Max, Q8 Max, Q10 Max, Q12 Max, Q13 Max, Q14 Max, Q15 Max | Published CAD files for Q6 Max; README/model pages prepared for the others |\n| **Q Ultra 8K Series** | Keyboard | Q1 Ultra 8K, Q3 Ultra 8K, Q5 Ultra 8K, Q6 Ultra 8K, Q13 Ultra 8K | Published plate files for Q6 Ultra 8K; README/model pages prepared for the others |\n| **K Pro Series** | Keyboard | K1 Pro–K17 Pro (16 models) | Case, Plate, Full Model, Stabilizer |\n| **K Max Series** | Keyboard | K0 Max, K1 Max, K2 Max, K3 Max, K4 Max, K5 Max, K7 Max, K8 Max, K9 Max, K10 Max, K11 Max, K13 Max, K15 Max, K17 Max | Case, Plate, Full Model, Stabilizer, Keycap on selected models; README/model pages prepared for K4 Max and K9 Max |\n| **K HE Series** | Hall Effect | K2 HE, K4 HE, K6 HE, K8 HE, K10 HE | Published models include case, plate, full model, stabilizer, and selected keycap files; K6 HE is currently folder-only |\n| **K QMK Series** | Keyboard | K1 QMK, K2 QMK, K3 QMK, K4 QMK, K5 QMK, K8 QMK, K10 QMK | Published CAD files for K2 QMK; README/model pages prepared for the others |\n| **L Series** | Keyboard | L1, L3 | Case, Plate, Knob, Full Model, Stabilizer |\n| **V 8K Series** | Keyboard | V1 8K, V3 8K, V5 8K, V6 8K | README/model pages prepared for future CAD uploads |\n| **V Ultra 8K Series** | Keyboard | V0 Ultra 8K, V1 Ultra 8K, V3 Ultra 8K, V5 Ultra 8K, V6 Ultra 8K, V10 Ultra 8K | README/model pages prepared for future CAD uploads |\n| **V Max Series** | Keyboard | V1 Max–V10 Max | Case, Plate, Encoder, Full Model, Stabilizer, OSA Keycap |\n| **P HE Series** | Hall Effect | P1 HE, P2 HE, P3 HE | Published files for P1 HE; README/model pages prepared for P2 HE and P3 HE |\n| **Mouse Series** | Mouse | M1–M7, G1, G2 (11 models) | Shell, Full Model |\n\n**135 device models. 734+ design files. Source-available. Accessory-friendly.**\n![Keychron keyboards structure design](docs/assets/keychron-keyboards-structures.webp)\n\n## Directory Structure\n\n```\nC-Pro-8K-Series/\n  C3 Pro 8K/            — Wired C Pro 8K hardware files, with C1 Pro 8K and C2 Pro 8K also present\nQ-Series/\n  Q0 Plus/              — Numpad files alongside Q1–Q12, Q60, and Q65\nQ-HE-Series/\n  Q0 HE/                — Hall Effect numpad files alongside Q1, Q2, Q3, Q4, Q5, Q6, and Q12 HE models\nQ-HE-8K-Series/\n  Q1 HE 8K/             — README and product page reference, ready for future CAD uploads alongside Q2, Q3, Q5, Q6, and Q16 HE 8K\nQ-Pro-Series/\n  Q1 Pro/               — Wireless Q-series hardware files across 10 models\nQ-Max-Series/\n  Q0 Max/               — README and product page reference, with Q1, Q2, Q3, Q5, Q6, Q8, Q10, Q12, Q13, Q14, and Q15 Max model folders also present\nQ-Ultra-8K-Series/\n  Q1 Ultra 8K/          — README and product page reference, ready for future CAD uploads alongside Q3, Q5, Q6, and Q13 Ultra 8K\nK-Pro-Series/\n  K1 Pro/               — Low-profile and standard K Pro models through K17 Pro\n  K8 Pro/               — Example model folder with `K8-Pro-Keycap.stp`\nK-Max-Series/\n  K0 Max/               — Numpad files alongside K1, K2, K3, K4, K5, K7, K8, K9, K10, K11, K13, K15, and K17 Max keyboard model folders\nK-HE-Series/\n  K2 HE/                — Example model folder with Cherry and OSA keycap STEP files\nK-QMK-Series/\n  K1 QMK/               — README and product page reference, with K2, K3, K4, K5, K8, and K10 QMK model folders also present\nV-Max-Series/\n  V1 Max/               — Tri-mode keyboard hardware files across V1–V10 Max\nV-Ultra-8K-Series/\n  V0 Ultra 8K/          — README and product page reference, ready for future CAD uploads alongside V1, V3, V5, V6, and V10 Ultra 8K\nV-8K-Series/\n  V1 8K/                — README and product page reference, ready for future CAD uploads alongside V3, V5, and V6 8K\nP-HE-Series/\n  P1 HE/                — Lemokey Hall Effect keyboard files, with P2 HE and P3 HE model pages also present\nL-Series/\n  L1/                   — Aluminum keyboard files with plate, case, knob, and stabilizers\nMice/\n  M1/                   — Shell and full model\nKeycap Profiles/\n  Cherry Profile/       — Reference profile docs alongside KSA, LSA, MDA, OEM, and OSA\ndocs/\n  file-format-guide.md  — How to open and edit these files\n  getting-started.md    — First-stop guide for browsing and remixing\n  3d-printing-guide.md  — Practical printing guidance for compatible parts\n  CONTRIBUTING.md       — Contribution workflow and file standards\n  CODE_OF_CONDUCT.md    — Community participation guidelines\n  scripts/\n    repo_inventory.py   — Regenerates the repository inventory from the live tree\n```\n\n## Why This Matters\n\nMaking production hardware files available is a meaningful contribution to the broader hardware and keyboard community.\n\n- It lowers the barrier to entry by giving hobbyists, students, and engineers real STEP and DXF files they can study, remix, and build from instead of starting from zero.\n- It expands what customization can mean. With access to case, plate, and component designs, the community can explore deeper hardware changes, new materials, structural tweaks, and original variations.\n- It offers real educational value. These are production-level designs, so people can learn from actual decisions around mounting systems, tolerances, and component integration.\n- It helps the ecosystem grow by enabling compatible accessories, modifications, and personal projects that build around existing designs.\n- It also reflects trust and transparency. Sharing internal design files signals confidence in the products and supports users as creators, not just customers.\n\nThe license is designed to support the ecosystem around Keychron products while still protecting Keychron's core hardware business. In practice, original compatible accessories and add-ons are not subject to the commercial-use restriction in this license, but copying and selling Keychron keyboards or mice, or trading on Keychron trademarks, is not allowed.\n\n## Contributing\n\n**Ways to contribute:**\n- Fix dimensional errors or tolerances in existing models\n- Add ISO layout plate variants\n- Improve documentation and guides\n- Report issues with downloaded files\n\n**Note:** This project is source-available. Original compatible accessories and add-ons are not subject to the commercial-use restriction in this license. By contributing, you agree your work falls under the same license.\n\n## License\n\nThis project is **source-available**. The files may be used for personal and educational work. Original compatible accessories and add-ons are not subject to the commercial-use restriction in this license.\n\n**You may not use these files to copy, manufacture, sell, or distribute Keychron keyboards or mice, or substantially similar products, and you may not use Keychron trademarks as your own branding.**\n\nSee the [LICENSE](LICENSE) file for full terms.\n\n## Links\n\n- [Keychron Website](https://www.keychron.com)\n- [Keychron Discord Community](https://discord.com/invite/HAYbRrTsjN)\n- [Keychron Firmware (QMK, main branch)](https://github.com/Keychron/qmk_firmware/tree/master/keyboards/keychron)\n- [Keychron Firmware (Bluetooth boards)](https://github.com/Keychron/qmk_firmware/tree/bluetooth_playground/keyboards/keychron)\n- [Keychron Firmware (2.4 GHz wireless boards)](https://github.com/Keychron/qmk_firmware/tree/wireless_playground/keyboards/keychron)\n- [Keychron Firmware (Hall Effect boards)](https://github.com/Keychron/qmk_firmware/tree/hall_effect_playground/keyboards/keychron)\n- [Keychron Firmware (ZMK)](https://github.com/Keychron/zmk)\n- [Open source gaming mouse firmware (ZGM）](https://zgm.gg/)\n\n---\n\n*Built by [Keychron](https://www.keychron.com) — source-available hardware design files for the community.*\n","summary":"The Keychron‑Hardware‑Design repository hosts production‑grade CAD files for a wide range of Keychron keyboards and mice, making the real industrial design resources publicly available. It provides files in STEP, DWG, DXF, and PDF format, along with guides for opening, remixing, and extending the designs, and regularly adds new models and accessory files. Users can study authentic product construction, create custom cases or compatible accessories, and learn how to modify or improve existing designs. The project is ideal for keyboard enthusiasts, modders, product designers, and educational users who want to experiment with or build upon Keychron hardware.","description":"Industrial design files for Keychron keyboards and mice. 100+ models with CAD assets in STEP, DXF, DWG, and PDF. Source-available, with commercial use allowed for original compatible accessories within the license terms.","stars":3332,"language":null},{"owner":"nexu-io","repo":"open-design","url":"https://github.com/nexu-io/open-design","readme":"# Open Design\n\n> **The open-source alternative to [Claude Design][cd].** Local-first, web-deployable, BYOK at every layer — **13 coding-agent CLIs** auto-detected on your `PATH` (Claude Code, Codex, Devin for Terminal, Cursor Agent, Gemini CLI, OpenCode, Qwen, GitHub Copilot CLI, Hermes, Kimi, Pi, Kiro, Mistral Vibe) become the design engine, driven by **31 composable Skills** and **72 brand-grade Design Systems**. No CLI? An OpenAI-compatible BYOK proxy is the same loop minus the spawn.\n\n<p align=\"center\">\n  <img src=\"docs/assets/banner.png\" alt=\"Open Design — editorial cover: design with the agent on your laptop\" width=\"100%\" />\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/nexu-io/open-design/stargazers\"><img alt=\"Stars\" src=\"https://img.shields.io/github/stars/nexu-io/open-design?style=for-the-badge&labelColor=0d1117&color=ffd700&logo=github&logoColor=white\" /></a>\n  <a href=\"https://github.com/nexu-io/open-design/network/members\"><img alt=\"Forks\" src=\"https://img.shields.io/github/forks/nexu-io/open-design?style=for-the-badge&labelColor=0d1117&color=2ecc71&logo=github&logoColor=white\" /></a>\n  <a href=\"https://github.com/nexu-io/open-design/issues\"><img alt=\"Issues\" src=\"https://img.shields.io/github/issues/nexu-io/open-design?style=for-the-badge&labelColor=0d1117&color=ff6b6b&logo=github&logoColor=white\" /></a>\n  <a href=\"https://github.com/nexu-io/open-design/pulls\"><img alt=\"Pull Requests\" src=\"https://img.shields.io/github/issues-pr/nexu-io/open-design?style=for-the-badge&labelColor=0d1117&color=9b59b6&logo=github&logoColor=white\" /></a>\n  <a href=\"https://github.com/nexu-io/open-design/graphs/contributors\"><img alt=\"Contributors\" src=\"https://img.shields.io/github/contributors/nexu-io/open-design?style=for-the-badge&labelColor=0d1117&color=3498db&logo=github&logoColor=white\" /></a>\n  <a href=\"https://github.com/nexu-io/open-design/commits/main\"><img alt=\"Commit activity\" src=\"https://img.shields.io/github/commit-activity/m/nexu-io/open-design?style=for-the-badge&labelColor=0d1117&color=e67e22&logo=git&logoColor=white\" /></a>\n  <a href=\"https://github.com/nexu-io/open-design/commits/main\"><img alt=\"Last commit\" src=\"https://img.shields.io/github/last-commit/nexu-io/open-design?style=for-the-badge&labelColor=0d1117&color=8e44ad&logo=git&logoColor=white\" /></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/nexu-io/open-design/releases/latest\"><img alt=\"Latest release\" src=\"https://img.shields.io/github/v/release/nexu-io/open-design?style=flat-square&color=blueviolet&label=release&include_prereleases\" /></a>\n  <a href=\"LICENSE\"><img alt=\"License\" src=\"https://img.shields.io/badge/license-Apache%202.0-blue.svg?style=flat-square\" /></a>\n  <a href=\"#supported-coding-agents\"><img alt=\"Agents\" src=\"https://img.shields.io/badge/agents-12%20CLIs%20%2B%20BYOK%20proxy-black?style=flat-square\" /></a>\n  <a href=\"#design-systems\"><img alt=\"Design systems\" src=\"https://img.shields.io/badge/design%20systems-72-orange?style=flat-square\" /></a>\n  <a href=\"#skills\"><img alt=\"Skills\" src=\"https://img.shields.io/badge/skills-31-teal?style=flat-square\" /></a>\n  <a href=\"QUICKSTART.md\"><img alt=\"Quickstart\" src=\"https://img.shields.io/badge/quickstart-3%20commands-green?style=flat-square\" /></a>\n</p>\n\n<p align=\"center\"><b>English</b> · <a href=\"README.de.md\">Deutsch</a> · <a href=\"README.fr.md\">Français</a> · <a href=\"README.zh-CN.md\">简体中文</a> · <a href=\"README.zh-TW.md\">繁體中文</a> · <a href=\"README.ko.md\">한국어</a> · <a href=\"README.ja-JP.md\">日本語</a> · العربية · <a href=\"README.ru.md\">Русский</a> · <a href=\"README.uk.md\">Українська</a></p>\n\n---\n\n## Why this exists\n\nAnthropic's [Claude Design][cd] (released 2026-04-17, Opus 4.7) showed what happens when an LLM stops writing prose and starts shipping design artifacts. It went viral — and stayed closed-source, paid-only, cloud-only, locked to Anthropic's model and Anthropic's skills. There is no checkout, no self-host, no Vercel deploy, no swap-in-your-own-agent.\n\n**Open Design (OD) is the open-source alternative.** Same loop, same artifact-first mental model, none of the lock-in. We don't ship an agent — the strongest coding agents already live on your laptop. We wire them into a skill-driven design workflow that runs locally with `pnpm tools-dev`, can deploy the web layer to Vercel, and stays BYOK at every layer.\n\nType `make me a magazine-style pitch deck for our seed round`. The interactive question form pops up before the model improvises a single pixel. The agent picks one of five curated visual directions. A live `TodoWrite` plan streams into the UI. The daemon builds a real on-disk project folder with a seed template, layout library, and self-check checklist. The agent reads them — pre-flight enforced — runs a five-dimensional critique against its own output, and emits a single `<artifact>` that renders in a sandboxed iframe seconds later.\n\nThat's not \"AI tries to design something\". That's an AI that has been trained, by the prompt stack, to behave like a senior designer with a working filesystem, a deterministic palette library, and a checklist culture — exactly the bar Claude Design set, but open and yours.\n\nOD stands on four open-source shoulders:\n\n- [**`alchaincyf/huashu-design`**](https://github.com/alchaincyf/huashu-design) — the design-philosophy compass. Junior-Designer workflow, the 5-step brand-asset protocol, the anti-AI-slop checklist, the 5-dimensional self-critique, and the \"5 schools × 20 design philosophies\" idea behind our direction picker — all distilled into [`apps/web/src/prompts/discovery.ts`](apps/web/src/prompts/discovery.ts).\n- [**`op7418/guizang-ppt-skill`**](https://github.com/op7418/guizang-ppt-skill) — the deck mode. Bundled verbatim under [`skills/guizang-ppt/`](skills/guizang-ppt/) with original LICENSE preserved; magazine-style layouts, WebGL hero, P0/P1/P2 checklists.\n- [**`OpenCoworkAI/open-codesign`**](https://github.com/OpenCoworkAI/open-codesign) — the UX north star and our closest peer. The first open-source Claude-Design alternative. We borrow its streaming-artifact loop, its sandboxed-iframe preview pattern (vendored React 18 + Babel), its live agent panel (todos + tool calls + interruptible generation), and its five-format export list (HTML / PDF / PPTX / ZIP / Markdown). We deliberately diverge on form factor — they are a desktop Electron app bundling [`pi-ai`][piai]; we are a web app + local daemon that delegates to your existing CLI.\n- [**`multica-ai/multica`**](https://github.com/multica-ai/multica) — the daemon-and-runtime architecture. PATH-scan agent detection, the local daemon as the only privileged process, the agent-as-teammate worldview.\n\n## At a glance\n\n| | What you get |\n|---|---|\n| **Coding-agent CLIs (13)** | Claude Code · Codex CLI · Devin for Terminal · Cursor Agent · Gemini CLI · OpenCode · Qwen Code · GitHub Copilot CLI · Hermes (ACP) · Kimi CLI (ACP) · Pi (RPC) · Kiro CLI (ACP) · Mistral Vibe CLI (ACP) — auto-detected on `PATH`, swap with one click |\n| **BYOK fallback** | Protocol-specific API proxy at `/api/proxy/{anthropic,openai,azure,google}/stream` — paste `baseUrl` + `apiKey` + `model`, choose Anthropic / OpenAI / Azure OpenAI / Google Gemini, and the daemon normalizes SSE back to the same chat stream. Internal-IP/SSRF blocked at the daemon edge. |\n| **Design systems built-in** | **129** — 2 hand-authored starters + 70 product systems (Linear, Stripe, Vercel, Airbnb, Tesla, Notion, Anthropic, Apple, Cursor, Supabase, Figma, Xiaohongshu, …) from [`awesome-design-md`][acd2], plus 57 design skills from [`awesome-design-skills`][ads] added directly under `design-systems/` |\n| **Skills built-in** | **31** — 27 in `prototype` mode (web-prototype, saas-landing, dashboard, mobile-app, gamified-app, social-carousel, magazine-poster, dating-web, sprite-animation, motion-frames, critique, tweaks, wireframe-sketch, pm-spec, eng-runbook, finance-report, hr-onboarding, invoice, kanban-board, team-okrs, …) + 4 in `deck` mode (`guizang-ppt` · `simple-deck` · `replit-deck` · `weekly-update`). Grouped in the picker by `scenario`: design / marketing / operation / engineering / product / finance / hr / sale / personal. |\n| **Media generation** | Image · video · audio surfaces ship alongside the design loop. **gpt-image-2** (Azure / OpenAI) for posters, avatars, infographics, illustrated maps · **Seedance 2.0** (ByteDance) for cinematic 15s text-to-video and image-to-video · **HyperFrames** ([heygen-com/hyperframes](https://github.com/heygen-com/hyperframes)) for HTML→MP4 motion graphics (product reveals, kinetic typography, data charts, social overlays, logo outros). **93** ready-to-replicate prompts gallery — 43 gpt-image-2 + 39 Seedance + 11 HyperFrames — under [`prompt-templates/`](prompt-templates/), with preview thumbnails and source attribution. Same chat surface as code; outputs a real `.mp4` / `.png` chip into the project workspace. |\n| **Visual directions** | 5 curated schools (Editorial Monocle · Modern Minimal · Warm Soft · Tech Utility · Brutalist Experimental) — each ships a deterministic OKLch palette + font stack ([`apps/web/src/prompts/directions.ts`](apps/web/src/prompts/directions.ts)) |\n| **Device frames** | iPhone 15 Pro · Pixel · iPad Pro · MacBook · Browser Chrome — pixel-accurate, shared across skills under [`assets/frames/`](assets/frames/) |\n| **Agent runtime** | Local daemon spawns the CLI in your project folder — agent gets real `Read`, `Write`, `Bash`, `WebFetch` against a real on-disk environment, with Windows `ENAMETOOLONG` fallbacks (stdin / prompt-file) on every adapter |\n| **Imports** | Drop a [Claude Design][cd] export ZIP onto the welcome dialog — `POST /api/import/claude-design` parses it into a real project so your agent can keep editing where Anthropic left off |\n| **Persistence** | SQLite at `.od/app.sqlite`: projects · conversations · messages · tabs · saved templates. Reopen tomorrow, todo card and open files are exactly where you left them. |\n| **Lifecycle** | One entry point: `pnpm tools-dev` (start / stop / run / status / logs / inspect / check) — boots daemon + web (+ desktop) under typed sidecar stamps |\n| **Desktop** | Optional Electron shell with sandboxed renderer + sidecar IPC (STATUS / EVAL / SCREENSHOT / CONSOLE / CLICK / SHUTDOWN) — drives `tools-dev inspect desktop screenshot` for E2E |\n| **Deployable to** | Local (`pnpm tools-dev`) · Vercel web layer · packaged Electron (placeholder, in-flight) |\n| **License** | Apache-2.0 |\n\n[acd2]: https://github.com/VoltAgent/awesome-design-md\n[ads]: https://github.com/bergside/awesome-design-skills\n\n## Demo\n\n<table>\n<tr>\n<td width=\"50%\">\n<img src=\"docs/screenshots/01-entry-view.png\" alt=\"01 · Entry view\" /><br/>\n<sub><b>Entry view</b> — pick a skill, pick a design system, type the brief. The same surface for prototypes, decks, mobile apps, dashboards, and editorial pages.</sub>\n</td>\n<td width=\"50%\">\n<img src=\"docs/screenshots/02-question-form.png\" alt=\"02 · Turn-1 discovery form\" /><br/>\n<sub><b>Turn-1 discovery form</b> — before the model writes a pixel, OD locks the brief: surface, audience, tone, brand context, scale. 30 seconds of radios beats 30 minutes of redirects.</sub>\n</td>\n</tr>\n<tr>\n<td width=\"50%\">\n<img src=\"docs/screenshots/03-direction-picker.png\" alt=\"03 · Direction picker\" /><br/>\n<sub><b>Direction picker</b> — when the user has no brand, the agent emits a second form with 5 curated directions (Monocle / Modern Minimal / Tech Utility / Brutalist / Soft Warm). One radio click → a deterministic palette + font stack, no model freestyle.</sub>\n</td>\n<td width=\"50%\">\n<img src=\"docs/screenshots/04-todo-progress.png\" alt=\"04 · Live todo progress\" /><br/>\n<sub><b>Live todo progress</b> — the agent's plan streams as a live card. <code>in_progress</code> → <code>completed</code> updates land in real time. The user can redirect cheaply, mid-flight.</sub>\n</td>\n</tr>\n<tr>\n<td width=\"50%\">\n<img src=\"docs/screenshots/05-preview-iframe.png\" alt=\"05 · Sandboxed preview\" /><br/>\n<sub><b>Sandboxed preview</b> — every <code>&lt;artifact&gt;</code> renders in a clean srcdoc iframe. Editable in place via the file workspace; downloadable as HTML, PDF, ZIP.</sub>\n</td>\n<td width=\"50%\">\n<img src=\"docs/screenshots/06-design-systems-library.png\" alt=\"06 · 72-system library\" /><br/>\n<sub><b>72-system library</b> — every product system shows its 4-color signature. Click for the full <code>DESIGN.md</code>, swatch grid, and live showcase.</sub>\n</td>\n</tr>\n<tr>\n<td width=\"50%\">\n<img src=\"docs/screenshots/07-magazine-deck.png\" alt=\"07 · Magazine deck\" /><br/>\n<sub><b>Deck mode (guizang-ppt)</b> — the bundled <a href=\"https://github.com/op7418/guizang-ppt-skill\"><code>guizang-ppt-skill</code></a> drops in unchanged. Magazine layouts, WebGL hero backgrounds, single-file HTML output, PDF export.</sub>\n</td>\n<td width=\"50%\">\n<img src=\"docs/screenshots/08-mobile-app.png\" alt=\"08 · Mobile prototype\" /><br/>\n<sub><b>Mobile prototype</b> — pixel-accurate iPhone 15 Pro chrome (Dynamic Island, status bar SVGs, home indicator). Multi-screen prototypes use the shared <code>/frames/</code> assets so the agent never re-draws a phone.</sub>\n</td>\n</tr>\n</table>\n\n## Skills\n\n**31 skills ship in the box.** Each is a folder under [`skills/`](skills/) following the Claude Code [`SKILL.md`][skill] convention with an extended `od:` frontmatter that the daemon parses verbatim — `mode`, `platform`, `scenario`, `preview.type`, `design_system.requires`, `default_for`, `featured`, `fidelity`, `speaker_notes`, `animations`, `example_prompt` ([`apps/daemon/src/skills.ts`](apps/daemon/src/skills.ts)).\n\nTwo top-level **modes** carry the catalog: **`prototype`** (27 skills — anything that renders as a single-page artifact, from a magazine landing to a phone screen to a PM spec doc) and **`deck`** (4 skills — horizontal-swipe presentations with deck-framework chrome). The **`scenario`** field is what the picker groups them by: `design` · `marketing` · `operation` · `engineering` · `product` · `finance` · `hr` · `sale` · `personal`.\n\n### Showcase examples\n\nThe visually distinctive skills you'll most likely run first. Each ships a real `example.html` you can open straight from the repo to see exactly what the agent will produce — no auth, no setup.\n\n<table>\n<tr>\n<td width=\"50%\" valign=\"top\">\n<a href=\"skills/dating-web/\"><img src=\"docs/screenshots/skills/dating-web.png\" alt=\"dating-web\" /></a><br/>\n<sub><b><a href=\"skills/dating-web/\"><code>dating-web</code></a></b> · <i>prototype</i><br/>Consumer dating / matchmaking dashboard — left rail nav, ticker bar, KPIs, 30-day mutual-matches chart, editorial typography.</sub>\n</td>\n<td width=\"50%\" valign=\"top\">\n<a href=\"skills/digital-eguide/\"><img src=\"docs/screenshots/skills/digital-eguide.png\" alt=\"digital-eguide\" /></a><br/>\n<sub><b><a href=\"skills/digital-eguide/\"><code>digital-eguide</code></a></b> · <i>template</i><br/>Two-spread digital e-guide — cover (title, author, TOC teaser) + lesson spread with pull-quote and step list. Creator / lifestyle tone.</sub>\n</td>\n</tr>\n<tr>\n<td width=\"50%\" valign=\"top\">\n<a href=\"skills/email-marketing/\"><img src=\"docs/screenshots/skills/email-marketing.png\" alt=\"email-marketing\" /></a><br/>\n<sub><b><a href=\"skills/email-marketing/\"><code>email-marketing</code></a></b> · <i>prototype</i><br/>Brand product-launch HTML email — masthead, hero image, headline lockup, CTA, specs grid. Centered single-column, table-fallback safe.</sub>\n</td>\n<td width=\"50%\" valign=\"top\">\n<a href=\"skills/gamified-app/\"><img src=\"docs/screenshots/skills/gamified-app.png\" alt=\"gamified-app\" /></a><br/>\n<sub><b><a href=\"skills/gamified-app/\"><code>gamified-app</code></a></b> · <i>prototype</i><br/>Three-frame gamified mobile-app prototype on a dark showcase stage — cover, today's quests with XP ribbons + level bar, quest detail.</sub>\n</td>\n</tr>\n<tr>\n<td width=\"50%\" valign=\"top\">\n<a href=\"skills/mobile-onboarding/\"><img src=\"docs/screenshots/skills/mobile-onboarding.png\" alt=\"mobile-onboarding\" /></a><br/>\n<sub><b><a href=\"skills/mobile-onboarding/\"><code>mobile-onboarding</code></a></b> · <i>prototype</i><br/>Three-frame mobile onboarding flow — splash, value-prop, sign-in. Status bar, swipe dots, primary CTA.</sub>\n</td>\n<td width=\"50%\" valign=\"top\">\n<a href=\"skills/motion-frames/\"><img src=\"docs/screenshots/skills/motion-frames.png\" alt=\"motion-frames\" /></a><br/>\n<sub><b><a href=\"skills/motion-frames/\"><code>motion-frames</code></a></b> · <i>prototype</i><br/>Single-frame motion-design hero with looping CSS animations — rotating type ring, animated globe, ticking timer. Hand-off ready for HyperFrames.</sub>\n</td>\n</tr>\n<tr>\n<td width=\"50%\" valign=\"top\">\n<a href=\"skills/social-carousel/\"><img src=\"docs/screenshots/skills/social-carousel.png\" alt=\"social-carousel\" /></a><br/>\n<sub><b><a href=\"skills/social-carousel/\"><code>social-carousel</code></a></b> · <i>prototype</i><br/>Three-card 1080×1080 social-media carousel — cinematic panels with display headlines that connect across the series, brand mark, loop affordance.</sub>\n</td>\n<td width=\"50%\" valign=\"top\">\n<a href=\"skills/sprite-animation/\"><img src=\"docs/screenshots/skills/sprite-animation.png\" alt=\"sprite-animation\" /></a><br/>\n<sub><b><a href=\"skills/sprite-animation/\"><code>sprite-animation</code></a></b> · <i>prototype</i><br/>Pixel / 8-bit animated explainer slide — full-bleed cream stage, animated pixel mascot, kinetic Japanese display type, looping CSS keyframes.</sub>\n</td>\n</tr>\n</table>\n\n### Design & marketing surfaces (prototype mode)\n\n| Skill | Platform | Scenario | What it produces |\n|---|---|---|---|\n| [`web-prototype`](skills/web-prototype/) | desktop | design | Single-page HTML — landings, marketing, hero pages (default for prototype) |\n| [`saas-landing`](skills/saas-landing/) | desktop | marketing | Hero / features / pricing / CTA marketing layout |\n| [`dashboard`](skills/dashboard/) | desktop | operation | Admin / analytics with sidebar + dense data layout |\n| [`pricing-page`](skills/pricing-page/) | desktop | sale | Standalone pricing + comparison tables |\n| [`docs-page`](skills/docs-page/) | desktop | engineering | 3-column documentation layout |\n| [`blog-post`](skills/blog-post/) | desktop | marketing | Editorial long-form |\n| [`mobile-app`](skills/mobile-app/) | mobile | design | iPhone 15 Pro / Pixel framed app screen(s) |\n| [`mobile-onboarding`](skills/mobile-onboarding/) | mobile | design | Multi-screen mobile onboarding flow (splash · value-prop · sign-in) |\n| [`gamified-app`](skills/gamified-app/) | mobile | personal | Three-frame gamified mobile-app prototype |\n| [`email-marketing`](skills/email-marketing/) | desktop | marketing | Brand product-launch HTML email (table-fallback safe) |\n| [`social-carousel`](skills/social-carousel/) | desktop | marketing | 3-card 1080×1080 social carousel |\n| [`magazine-poster`](skills/magazine-poster/) | desktop | marketing | Single-page magazine-style poster |\n| [`motion-frames`](skills/motion-frames/) | desktop | marketing | Motion-design hero with looping CSS animations |\n| [`sprite-animation`](skills/sprite-animation/) | desktop | marketing | Pixel / 8-bit animated explainer slide |\n| [`dating-web`](skills/dating-web/) | desktop | personal | Consumer dating dashboard mockup |\n| [`digital-eguide`](skills/digital-eguide/) | desktop | marketing | Two-spread digital e-guide (cover + lesson) |\n| [`wireframe-sketch`](skills/wireframe-sketch/) | desktop | design | Hand-drawn ideation sketch — for the \"show something visible early\" pass |\n| [`critique`](skills/critique/) | desktop | design | Five-dimensional self-critique scoresheet (Philosophy · Hierarchy · Detail · Function · Innovation) |\n| [`tweaks`](skills/tweaks/) | desktop | design | AI-emitted tweaks panel — the model surfaces the parameters worth nudging |\n\n### Deck surfaces (deck mode)\n\n| Skill | Default for | What it produces |\n|---|---|---|\n| [`guizang-ppt`](skills/guizang-ppt/) | **default** for deck | Magazine-style web PPT — bundled verbatim from [op7418/guizang-ppt-skill][guizang], original LICENSE preserved |\n| [`simple-deck`](skills/simple-deck/) | — | Minimal horizontal-swipe deck |\n| [`replit-deck`](skills/replit-deck/) | — | Product-walkthrough deck (Replit-style) |\n| [`weekly-update`](skills/weekly-update/) | — | Team weekly cadence as a swipe deck (progress · blockers · next) |\n\n### Office & operations surfaces (prototype mode, document-flavored scenarios)\n\n| Skill | Scenario | What it produces |\n|---|---|---|\n| [`pm-spec`](skills/pm-spec/) | product | PM specification doc with TOC + decision log |\n| [`team-okrs`](skills/team-okrs/) | product | OKR scoresheet |\n| [`meeting-notes`](skills/meeting-notes/) | operation | Meeting decision log |\n| [`kanban-board`](skills/kanban-board/) | operation | Board snapshot |\n| [`eng-runbook`](skills/eng-runbook/) | engineering | Incident runbook |\n| [`finance-report`](skills/finance-report/) | finance | Exec finance summary |\n| [`invoice`](skills/invoice/) | finance | Single-page invoice |\n| [`hr-onboarding`](skills/hr-onboarding/) | hr | Role onboarding plan |\n\nAdding a skill takes one folder. Read [`docs/skills-protocol.md`](docs/skills-protocol.md) for the extended frontmatter, fork an existing skill, restart the daemon, it appears in the picker. The catalog endpoint is `GET /api/skills`; per-skill seed assembly (template + side-file references) lives at `GET /api/skills/:id/example`.\n\n## Six load-bearing ideas\n\n### 1 · We don't ship an agent. Yours is good enough.\n\nThe daemon scans your `PATH` for [`claude`](https://docs.anthropic.com/en/docs/claude-code), [`codex`](https://github.com/openai/codex), `devin`, [`cursor-agent`](https://www.cursor.com/cli), [`gemini`](https://github.com/google-gemini/gemini-cli), [`opencode`](https://opencode.ai/), [`qwen`](https://github.com/QwenLM/qwen-code), [`copilot`](https://github.com/features/copilot/cli), `hermes`, `kimi`, [`pi`](https://github.com/mariozechner/pi-ai), [`kiro-cli`](https://kiro.dev), and [`vibe-acp`](https://github.com/mistralai/mistral-vibe) on startup. Whichever ones it finds become candidate design engines — driven over stdio with one adapter per CLI, swappable from the model picker. Inspired by [`multica`](https://github.com/multica-ai/multica) and [`cc-switch`](https://github.com/farion1231/cc-switch). No CLI installed? The API mode is the same pipeline minus the spawn — choose Anthropic, OpenAI-compatible, Azure OpenAI, or Google Gemini and the daemon forwards normalized SSE chunks back, with loopback / link-local / RFC1918 destinations rejected at the edge.\n\n### 2 · Skills are files, not plugins.\n\nFollowing Claude Code's [`SKILL.md` convention](https://docs.anthropic.com/en/docs/claude-code/skills), each skill is `SKILL.md` + `assets/` + `references/`. Drop a folder into [`skills/`](skills/), restart the daemon, it appears in the picker. The bundled `magazine-web-ppt` is [`op7418/guizang-ppt-skill`](https://github.com/op7418/guizang-ppt-skill) committed verbatim — original license preserved, attribution preserved.\n\n### 3 · Design Systems are portable Markdown, not theme JSON.\n\nThe 9-section `DESIGN.md` schema from [`VoltAgent/awesome-design-md`][acd2] — color, typography, spacing, layout, components, motion, voice, brand, anti-patterns. Every artifact reads from the active system. Switch system → next render uses the new tokens. The dropdown ships with **Linear, Stripe, Vercel, Airbnb, Tesla, Notion, Apple, Anthropic, Cursor, Supabase, Figma, Resend, Raycast, Lovable, Cohere, Mistral, ElevenLabs, X.AI, Spotify, Webflow, Sanity, PostHog, Sentry, MongoDB, ClickHouse, Cal, Replicate, Clay, Composio, Xiaohongshu…** — plus 57 design skills sourced from [`awesome-design-skills`][ads].\n\n### 4 · The interactive question form prevents 80% of redirects.\n\nOD's prompt stack hard-codes a `RULE 1`: every fresh design brief begins with a `<question-form id=\"discovery\">` instead of code. Surface · audience · tone · brand context · scale · constraints. A long brief still leaves design decisions open — visual tone, color stance, scale — exactly the things the form locks down in 30 seconds. The cost of a wrong direction is one chat round, not one finished deck.\n\nThis is the **Junior-Designer mode** distilled from [`huashu-design`](https://github.com/alchaincyf/huashu-design): batch the questions up front, show something visible early (even a wireframe with grey blocks), let the user redirect cheaply. Combined with the brand-asset protocol (locate · download · `grep` hex · write `brand-spec.md` · vocalise), it's the single biggest reason output stops feeling like AI freestyle and starts feeling like a designer who paid attention before painting.\n\n### 5 · The daemon makes the agent feel like it's on your laptop, because it is.\n\nThe daemon spawns the CLI with `cwd` set to the project's artifact folder under `.od/projects/<id>/`. The agent gets `Read`, `Write`, `Bash`, `WebFetch` — real tools against a real filesystem. It can `Read` the skill's `assets/template.html`, `grep` your CSS for hex values, write a `brand-spec.md`, drop generated images, and produce `.pptx` / `.zip` / `.pdf` files that show up in the file workspace as download chips when the turn ends. Sessions, conversations, messages, tabs persist in a local SQLite DB — pop the project open tomorrow and the agent's todo card is right where you left it.\n\n### 6 · The prompt stack is the product.\n\nWhat you compose at send time isn't \"system + user\". It's:\n\n```\nDISCOVERY directives  (turn-1 form, turn-2 brand branch, TodoWrite, 5-dim critique)\n  + identity charter   (OFFICIAL_DESIGNER_PROMPT, anti-AI-slop, junior-pass)\n  + active DESIGN.md   (72 systems available)\n  + active SKILL.md    (31 skills available)\n  + project metadata   (kind, fidelity, speakerNotes, animations, inspiration ids)\n  + skill side files   (auto-injected pre-flight: read assets/template.html + references/*.md)\n  + (deck kind, no skill seed) DECK_FRAMEWORK_DIRECTIVE   (nav / counter / scroll / print)\n```\n\nEvery layer is composable. Every layer is a file you can edit. Read [`apps/web/src/prompts/system.ts`](apps/web/src/prompts/system.ts) and [`apps/web/src/prompts/discovery.ts`](apps/web/src/prompts/discovery.ts) to see the actual contract.\n\n## Architecture\n\n```\n┌────────────────────── browser (Next.js 16) ──────────────────────┐\n│  chat · file workspace · iframe preview · settings · imports     │\n└──────────────┬───────────────────────────────────┬───────────────┘\n               │ /api/* (rewritten in dev)          │\n               ▼                                    ▼\n   ┌──────────────────────────────────┐   /api/proxy/{provider}/stream (SSE)\n   │  Local daemon (Express + SQLite) │   ─→ any OpenAI-compat\n   │                                  │       endpoint (BYOK)\n   │  /api/agents          /api/skills│       w/ SSRF blocking\n   │  /api/design-systems  /api/projects/…\n   │  /api/chat (SSE)      /api/proxy/{provider}/stream (SSE)\n   │  /api/templates       /api/import/claude-design\n   │  /api/artifacts/save  /api/artifacts/lint\n   │  /api/upload          /api/projects/:id/files…\n   │  /artifacts (static)  /frames (static)\n   │\n   │  optional: sidecar IPC at /tmp/open-design/ipc/<ns>/<app>.sock\n   │  (STATUS · EVAL · SCREENSHOT · CONSOLE · CLICK · SHUTDOWN)\n   └─────────┬────────────────────────┘\n             │ spawn(cli, [...], { cwd: .od/projects/<id> })\n             ▼\n   ┌──────────────────────────────────────────────────────────────────┐\n   │  claude · codex · devin (ACP) · gemini · opencode · cursor-agent │\n   │  qwen · copilot · hermes (ACP) · kimi (ACP) · pi (RPC) · kiro (ACP) · vibe (ACP)     │\n   │  reads SKILL.md + DESIGN.md, writes artifacts to disk            │\n   └──────────────────────────────────────────────────────────────────┘\n```\n\n| Layer | Stack |\n|---|---|\n| Frontend | Next.js 16 App Router + React 18 + TypeScript, Vercel-deployable |\n| Daemon | Node 24 · Express · SSE streaming · `better-sqlite3`; tables: `projects` · `conversations` · `messages` · `tabs` · `templates` |\n| Agent transport | `child_process.spawn`; typed-event parsers for `claude-stream-json` (Claude Code), `copilot-stream-json` (Copilot), `json-event-stream` per-CLI parsers (Codex / Gemini / OpenCode / Cursor Agent), `acp-json-rpc` (Devin / Hermes / Kimi / Kiro / Mistral Vibe via Agent Client Protocol), `pi-rpc` (Pi via stdio JSON-RPC), `plain` (Qwen Code) |\n| BYOK proxy | `POST /api/proxy/{anthropic,openai,azure,google}/stream` → provider-specific upstream APIs, normalized `delta/end/error` SSE; rejects loopback / link-local / RFC1918 hosts at the daemon edge |\n| Storage | Plain files in `.od/projects/<id>/` + SQLite at `.od/app.sqlite` + credentials at `.od/media-config.json` (gitignored, auto-created). `OD_DATA_DIR=<dir>` relocates all daemon data (used for test isolation and read-only-install setups); `OD_MEDIA_CONFIG_DIR=<dir>` further narrows the override to just `media-config.json` for setups that want to keep API keys outside the data dir |\n| Preview | Sandboxed iframe via `srcdoc` + per-skill `<artifact>` parser ([`apps/web/src/artifacts/parser.ts`](apps/web/src/artifacts/parser.ts)) |\n| Export | HTML (inline assets) · PDF (browser print, deck-aware) · PPTX (agent-driven via skill) · ZIP (archiver) · Markdown |\n| Lifecycle | `pnpm tools-dev start \\| stop \\| run \\| status \\| logs \\| inspect \\| check`; ports via `--daemon-port` / `--web-port`, namespaces via `--namespace` |\n| Desktop (optional) | Electron shell — discovers the web URL through sidecar IPC, no port guessing; same `STATUS`/`EVAL`/`SCREENSHOT`/`CONSOLE`/`CLICK`/`SHUTDOWN` channel powers `tools-dev inspect desktop …` for E2E |\n\n## Quickstart\n\n```bash\ngit clone https://github.com/nexu-io/open-design.git\ncd open-design\ncorepack enable\ncorepack pnpm --version   # should print 10.33.2\npnpm install\npnpm tools-dev run web\n# open the web URL printed by tools-dev\n```\n\nEnvironment requirements: Node `~24` and pnpm `10.33.x`. `nvm`/`fnm` are optional helpers only; if you use one, run `nvm install 24 && nvm use 24` or `fnm install 24 && fnm use 24` before `pnpm install`.\n\nFor desktop/background startup, fixed-port restarts, and media generation dispatcher checks (`OD_BIN`, `OD_DAEMON_URL`, `apps/daemon/dist/cli.js`), see [`QUICKSTART.md`](QUICKSTART.md).\n\nThe first load:\n\n1. Detects which agent CLIs you have on `PATH` and picks one automatically.\n2. Loads 31 skills + 72 design systems.\n3. Pops the welcome dialog so you can paste an Anthropic key (only needed for the BYOK fallback path).\n4. **Auto-creates `./.od/`** — the local runtime folder for the SQLite project DB, per-project artifacts, and saved renders. There is no `od init` step; the daemon `mkdir`s everything it needs on boot.\n\nType a prompt, hit **Send**, watch the question form arrive, fill it, watch the todo card stream, watch the artifact render. Click **Save to disk** or download as a project ZIP.\n\n### First-run state (`./.od/`)\n\nThe daemon owns one hidden folder at the repo root. Everything in it is gitignored and machine-local — never commit it.\n\n```\n.od/\n├── app.sqlite                 ← projects · conversations · messages · open tabs\n├── artifacts/                 ← one-off \"Save to disk\" renders (timestamped)\n└── projects/<id>/             ← per-project working dir, also the agent's cwd\n```\n\n| Want to… | Do this |\n|---|---|\n| Inspect what's in there | `ls -la .od && sqlite3 .od/app.sqlite '.tables'` |\n| Reset to a clean slate | `pnpm tools-dev stop`, `rm -rf .od`, run `pnpm tools-dev run web` again |\n| Move it elsewhere | not supported yet — the path is hard-coded relative to the repo |\n\nFull file map, scripts, and troubleshooting → [`QUICKSTART.md`](QUICKSTART.md).\n\n## Use Open Design from your coding agent\n\nOpe
