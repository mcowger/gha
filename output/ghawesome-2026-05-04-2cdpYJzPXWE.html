 |\n\nMistral, Qwen, Moonshot, Doubao, Together AI, Fireworks, etc. all plug in the same way. For services where the key is not `OPENAI_API_KEY` (OpenRouter is one), pass it explicitly via the `apiKey` config field; otherwise the `openai` adapter falls back to `OPENAI_API_KEY` from the environment.\n\n### Local Model Tool-Calling\n\nThe framework supports tool-calling with local models served by Ollama, vLLM, LM Studio, or llama.cpp. Tool-calling is handled natively by these servers via the OpenAI-compatible API.\n\n**Verified models:** Gemma 4, Llama 3.1, Qwen 3, Mistral, Phi-4. See the full list at [ollama.com/search?c=tools](https://ollama.com/search?c=tools).\n\n**Fallback extraction:** If a local model returns tool calls as text instead of using the `tool_calls` wire format (common with thinking models or misconfigured servers), the framework automatically extracts them from the text output.\n\n**Timeout:** Local inference can be slow. Use `timeoutMs` on `AgentConfig` to prevent indefinite hangs:\n\n```typescript\nconst localAgent: AgentConfig = {\n  name: 'local',\n  model: 'llama3.1',\n  provider: 'openai',\n  baseURL: 'http://localhost:11434/v1',\n  apiKey: 'ollama',\n  tools: ['bash', 'file_read'],\n  timeoutMs: 120_000, // abort after 2 minutes\n}\n```\n\n**Quantized model tuning.** Highly quantized MoE models on consumer hardware (Qwen2.5-MoE @ Q4, DeepSeek-MoE @ Q4, etc.) tend to fall into repetition loops or hallucinate tool-call schemas under default sampling. `AgentConfig` exposes `topK`, `minP`, `frequencyPenalty`, `presencePenalty`, `parallelToolCalls` (set `false` to force one tool call per turn on shaky tool-callers), and an `extraBody` escape hatch for server-specific knobs (e.g. vLLM's `repetition_penalty`). Cloud OpenAI users do not need these — defaults are tuned for full-precision models. See [`providers/local-quantized`](examples/providers/local-quantized.ts) for a full setup.\n\n**Troubleshooting:**\n- Model not calling tools? Ensure it appears in Ollama's [Tools category](https://ollama.com/search?c=tools). Not all models support tool-calling.\n- Using Ollama? Update to the latest version (`ollama update`). Older versions have known tool-calling bugs.\n- Proxy interfering? Use `no_proxy=localhost` when running against local servers.\n\n## Production Checklist\n\nBefore going live, wire up the controls that protect token spend, recover from failure, and let you debug.\n\n| Concern | Knob | Where it lives |\n|---------|------|----------------|\n| Bound the conversation | `maxTurns` per agent + `contextStrategy` (`sliding-window` / `summarize` / `compact` / `custom`) | `AgentConfig` |\n| Cap tool output | `maxToolOutputChars` (or per-tool `maxOutputChars`) + `compressToolResults: true` | `AgentConfig` and `defineTool()` |\n| Recover from failure | Per-task `maxRetries`, `retryDelayMs`, `retryBackoff` (exponential multiplier) | Task config used via `runTasks()` |\n| Hard-cap spend | `maxTokenBudget` on the orchestrator | `OrchestratorConfig` |\n| Catch stuck agents | `loopDetection` with `onLoopDetected: 'terminate'` (or a custom handler) | `AgentConfig` |\n| Trace and audit | `onTrace` to your tracing backend; persist `renderTeamRunDashboard(result)` | `OrchestratorConfig` |\n\n## Contributing\n\nIssues, feature requests, and PRs are welcome. Some areas where contributions would be especially valuable:\n\n- **Production examples.** Real-world end-to-end workflows. See [`examples/production/README.md`](./examples/production/README.md) for the acceptance criteria and submission format.\n- **Documentation.** Guides, tutorials, and API docs.\n- **Translations.** Help translate this README into other languages. [Open a PR](https://github.com/JackChen-me/open-multi-agent/pulls).\n\n## Contributors\n\n**Project lead:** [Jack Chen](https://github.com/JackChen-me)\n\n**Framework features**\n\n- [@ibrahimkzmv](https://github.com/ibrahimkzmv) (token budget, context strategy, dependency-scoped context, tool presets, glob, MCP integration, configurable coordinator, CLI, dashboard rendering)\n- [@apollo-mg](https://github.com/apollo-mg) (context compaction fix, sampling parameters)\n- [@tizerluo](https://github.com/tizerluo) (onPlanReady, onAgentStream)\n- [@Xin-Mai](https://github.com/Xin-Mai) (output schema validation)\n- [@JasonOA888](https://github.com/JasonOA888) (AbortSignal support)\n- [@EchoOfZion](https://github.com/EchoOfZion) (coordinator skip for simple goals)\n- [@voidborne-d](https://github.com/voidborne-d) (OpenAI mixed content fix)\n- [@hamzarstar](https://github.com/hamzarstar) (agent delegation co-author)\n- [@MyPrototypeWhat](https://github.com/MyPrototypeWhat) (trace input/output)\n- [@SiMinus](https://github.com/SiMinus) (streaming reasoning events)\n\n**Provider integrations**\n\n- [@ibrahimkzmv](https://github.com/ibrahimkzmv) (Gemini)\n- [@hkalex](https://github.com/hkalex) (DeepSeek, MiniMax)\n- [@marceloceccon](https://github.com/marceloceccon) (Grok)\n- [@Klarline](https://github.com/Klarline) (Azure OpenAI)\n- [@Deathwing](https://github.com/Deathwing) (GitHub Copilot)\n- [@JackChiang233](https://github.com/JackChiang233) and [@jiangzhuo](https://github.com/jiangzhuo) (Qiniu)\n- [@CodingBangboo](https://github.com/CodingBangboo) (AWS Bedrock)\n\n**Examples & cookbook**\n\n- [@mvanhorn](https://github.com/mvanhorn) (research aggregation, code review, meeting summarizer, Groq example)\n- [@Kinoo0](https://github.com/Kinoo0) (code review upgrade)\n- [@Optimisttt](https://github.com/Optimisttt) (research aggregation upgrade)\n- [@Agentscreator](https://github.com/Agentscreator) (Engram memory integration)\n- [@fault-segment](https://github.com/fault-segment) and yanzizheng (contract-review DAG)\n- [@HuXiangyu123](https://github.com/HuXiangyu123) (cost-tiered example)\n- [@zouhh22333-beep](https://github.com/zouhh22333-beep) (translation/backtranslation)\n- [@pei-pei45](https://github.com/pei-pei45) (competitive monitoring)\n- [@mmjwxbc](https://github.com/mmjwxbc) (interview simulator)\n- [@binghuaren96](https://github.com/binghuaren96) (incident postmortem DAG)\n- [@CodingBangboo](https://github.com/CodingBangboo) (Express customer support pipeline)\n\n**Docs & tests**\n\n- [@tmchow](https://github.com/tmchow) (llama.cpp docs)\n- [@kenrogers](https://github.com/kenrogers) (OpenRouter docs)\n- [@jadegold55](https://github.com/jadegold55) (LLM adapter test coverage)\n\n<a href=\"https://github.com/JackChen-me/open-multi-agent/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=JackChen-me/open-multi-agent&max=100&v=20260501\" />\n</a>\n\n## Star History\n\n<a href=\"https://star-history.com/#JackChen-me/open-multi-agent&Date\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=JackChen-me/open-multi-agent&type=Date&theme=dark&v=20260425\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=JackChen-me/open-multi-agent&type=Date&v=20260425\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/svg?repos=JackChen-me/open-multi-agent&type=Date&v=20260425\" />\n </picture>\n</a>\n\n## License\n\nMIT\n","summary":"Open‑Multi‑Agent is a lightweight TypeScript framework that turns a high‑level goal into an automatically generated, parallelised task DAG, recruiting multiple LLM agents and synthesising their outputs into a final result. A single `runTeam(team, goal)` call lets the coordinator orchestrate proprietary and OpenAI‑compatible models, built‑in tools, MCP support, token‑budgeting, retries, and live streaming of each step. The library offers structured, Zod‑validated outputs, live progress events, trace spans, and an HTML dashboard, while a pluggable KV layer makes shared memory easy. Developers building Node.js backends that need flexible, goal‑driven LLM pipelines will benefit from its lightweight three‑runtime‑dependency footprint and rich observability.","description":"From a goal to a task DAG, automatically. TypeScript-native multi-agent orchestration with MCP and live tracing. Three runtime dependencies.","stars":6040,"language":"TypeScript"},{"owner":"QuipNetwork","repo":"xq-rs","url":"https://github.com/QuipNetwork/xq-rs","readme":"<!--\nCopyright (C) 2026 Postquant Labs Incorporated\nSPDX-License-Identifier: AGPL-3.0-or-later\n-->\n\n# Aglais XQVM\n\n> **Work in progress.** The instruction set, binary format, and public API are\n> unstable and will change without notice until a stable release is tagged.\n> Production use is not recommended at this time.\n\nAglais is a hardware-agnostic virtual machine for quantum computing. XQVM is\nthe module within Aglais responsible for expressing binary optimization models\nand objective functions. The current scope targets X-quadratic models for\nquantum annealers (QUBO/Ising formulations).\n\nThink of it as LLVM for quantum computing.\n\n## Goals\n\n- **Hardware-agnostic** -- write a problem once, run it on any supported backend.\n- **Unified bytecode** -- a common intermediate representation for binary\n  optimization problems targeting quantum annealers.\n- **Embeddable** -- the core VM and bytecode crates support `no_std + alloc`,\n  enabling deployment in WASM runtimes and bare-metal environments.\n\n## Workspace Crates\n\n| Crate | Binary | Description |\n|---|---|---|\n| `aglais-xqvm-bytecode` | -- | Opcode table, instruction types, builder, binary codec, stream reader |\n| `aglais-xqvm-asm` | `xqasm` | Text assembler: `.xqasm` source -> bytecode |\n| `aglais-xqvm-disasm` | `xqdism` | Bytecode -> human-readable listing |\n| `aglais-xqvm-vm` | `xqvm` | Bytecode interpreter: stack, register file, QUBO/Ising model execution |\n\n## Getting Started\n\n### Prerequisites\n\n```sh\n# Install Rust (stable)\ncurl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh\n\n# Install dev tools\nmake deps\n```\n\n### Build\n\n```sh\ncargo build --release\n```\n\nThe binaries are placed at `target/release/xqasm`, `target/release/xqdism`,\nand `target/release/xqvm`.\n\n### Run an example\n\n```sh\n# Assemble a source file\nxqasm program.xqasm -o program.xqbc\n\n# Disassemble to inspect the encoding\nxqdism program.xqbc\n\n# Execute\nxqvm program.xqbc\n```\n\n### A minimal program\n\n```asm\n; push two integers and add them\nPUSH 10\nPUSH 32\nADD\nHALT\n```\n\nAssemble and run:\n\n```sh\nxqasm add.xqasm -o add.xqbc && xqvm add.xqbc\n```\n\n## Architecture\n\nAglais is a stack-based interpreter with a 256-slot register file. XQVM is the\nmodule that handles X-quadratic model construction: registers hold typed values\n-- integers, integer vectors, QUBO/Ising models (`XqmxModel`), and candidate\nsolutions (`XqmxSample`). A dedicated loop stack drives `RANGE`/`ITER`\niteration.\n\nThe opcode table (`opcodes!` x-macro in `crates/bytecode/src/types/table.rs`) is\nthe single source of truth for all 76 instructions. The `Opcode` enum, `Instruction`\nenum, mnemonic strings, and operand arity are all derived from it.\n\nThe binary format is a bare instruction stream with no header. Each instruction is\nan opcode byte followed by its operands in big-endian byte order.\n\nSee `crates/vm/examples/tsp/` for a complete worked example: a Travelling Salesman\nProblem encoded as a QUBO via three `.xqasm` programs driven by a Rust harness.\n\n## Contributing\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for the development workflow, commit\nconventions, and sign-off requirements.\n\n```sh\nmake all   # lint + test (what CI runs)\n```\n\n## License\n\nLicensed under the [GNU Affero General Public License v3.0 or later](LICENSE).\n","summary":"Aglais XQVM is a work‑in‑progress, hardware‑agnostic virtual machine that compiles quantum‑annealing problems into a unified bytecode format comparable to LLVM for classical code. It offers a lightweight assembler (`xqasm`), disassembler (`xqdism`), and a stack‑based interpreter (`xqvm`) that can execute X‑quadratic (QUBO/Ising) models on any backend that supports the minimal `no_std + alloc` runtime, making it suitable for WASM and bare‑metal deployment. The VM handles integers, vectors, models, and solutions with a 256‑slot register file, allowing developers to write a problem once and run it on multiple quantum annealers. Researchers, quantum software engineers, and early adopters of quantum hardware would benefit from its portable, extensible bytecode and embeddable interpreter.","description":"A rust implementation of the Quip Network's quantum virtual machine.","stars":5738,"language":"Rust"},{"owner":"browser-use","repo":"video-use","url":"https://github.com/browser-use/video-use","readme":"<p align=\"center\">\n  <img src=\"static/video-use-banner.png\" alt=\"video-use\" width=\"100%\">\n</p>\n\n# video-use\n\nIntroducing **video-use** — edit videos with Claude Code. 100% open source.\n\nDrop raw footage in a folder, chat with Claude Code, get `final.mp4` back. Works for any content — talking heads, montages, tutorials, travel, interviews — without presets or menus.\n\n## What it does\n\n- **Cuts out filler words** (`umm`, `uh`, false starts) and dead space between takes\n- **Auto color grades** every segment (warm cinematic, neutral punch, or any custom ffmpeg chain)\n- **30ms audio fades** at every cut so you never hear a pop\n- **Burns subtitles** in your style — 2-word UPPERCASE chunks by default, fully customizable\n- **Generates animation overlays** via [HyperFrames](https://github.com/heygen-com/hyperframes), [Remotion](https://www.remotion.dev/), [Manim](https://www.manim.community/), or PIL — spawned in parallel sub-agents, one per animation\n- **Self-evaluates the rendered output** at every cut boundary before showing you anything\n- **Persists session memory** in `project.md` so next week's session picks up where you left off\n\n## Setup prompt\n\nPaste into Claude Code, Codex, Hermes, Openclaw, or any agent with shell access:\n\n```text\nSet up https://github.com/browser-use/video-use for me.\n\nRead install.md first to install this repo, wire up ffmpeg, register the skill with whichever agent you're running under, and set up the ElevenLabs API key — ask me to paste it when you need it. Then read SKILL.md for daily usage, and always read helpers/ because that's where the editing scripts live. After install, don't transcribe anything on your own — just tell me it's ready and wait for me to drop footage into a folder.\n```\n\nThe agent handles the clone, dependencies, skill registration, and prompts you once for your ElevenLabs API key (grab one at [elevenlabs.io/app/settings/api-keys](https://elevenlabs.io/app/settings/api-keys)).\n\nThen point your agent at a folder of raw takes:\n\n```bash\ncd /path/to/your/videos\nclaude    # or codex, hermes, etc.\n```\n\nAnd in the session:\n\n> edit these into a launch video\n\nIt inventories the sources, proposes a strategy, waits for your OK, then produces `edit/final.mp4` next to your sources. All outputs live in `<videos_dir>/edit/` — the skill directory stays clean.\n\n## Manual install\n\nIf you'd rather do it by hand:\n\n```bash\n# 1. Clone and symlink into your agent's skills directory\ngit clone https://github.com/browser-use/video-use ~/Developer/video-use\nln -sfn ~/Developer/video-use ~/.claude/skills/video-use        # Claude Code\n# ln -sfn ~/Developer/video-use ~/.codex/skills/video-use       # Codex\n\n# 2. Install deps\ncd ~/Developer/video-use\nuv sync                         # or: pip install -e .\nbrew install ffmpeg             # required\nbrew install yt-dlp             # optional, for downloading online sources\n\n# 3. Add your ElevenLabs API key\ncp .env.example .env\n$EDITOR .env                    # ELEVENLABS_API_KEY=...\n```\n\n## How it works\n\nThe LLM never watches the video. It **reads** it — through two layers that together give it everything it needs to cut with word-boundary precision.\n\n<p align=\"center\">\n  <img src=\"static/timeline-view.svg\" alt=\"timeline_view composite — filmstrip + speaker track + waveform + word labels + silence-gap cut candidates\" width=\"100%\">\n</p>\n\n**Layer 1 — Audio transcript (always loaded).** One ElevenLabs Scribe call per source gives word-level timestamps, speaker diarization, and audio events (`(laughter)`, `(applause)`, `(sigh)`). All takes pack into a single ~12KB `takes_packed.md` — the LLM's primary reading view.\n\n```\n## C0103  (duration: 43.0s, 8 phrases)\n  [002.52-005.36] S0 Ninety percent of what a web agent does is completely wasted.\n  [006.08-006.74] S0 We fixed this.\n```\n\n**Layer 2 — Visual composite (on demand).** `timeline_view` produces a filmstrip + waveform + word labels PNG for any time range. Called only at decision points — ambiguous pauses, retake comparisons, cut-point sanity checks.\n\n> Naive approach: 30,000 frames × 1,500 tokens = **45M tokens of noise**.\n> Video Use: **12KB text + a handful of PNGs**.\n\nSame idea as browser-use giving an LLM a structured DOM instead of a screenshot — but for video.\n\n## Pipeline\n\n```\nTranscribe ──> Pack ──> LLM Reasons ──> EDL ──> Render ──> Self-Eval\n                                                              │\n                                                              └─ issue? fix + re-render (max 3)\n```\n\nThe self-eval loop runs `timeline_view` on the _rendered output_ at every cut boundary — catches visual jumps, audio pops, hidden subtitles. You see the preview only after it passes.\n\n## Design principles\n\n1. **Text + on-demand visuals.** No frame-dumping. The transcript is the surface.\n2. **Audio is primary, visuals follow.** Cuts come from speech boundaries and silence gaps.\n3. **Ask → confirm → execute → self-eval → persist.** Never touch the cut without strategy approval.\n4. **Zero assumptions about content type.** Look, ask, then edit.\n5. **12 hard rules, artistic freedom elsewhere.** Production-correctness is non-negotiable. Taste isn't.\n\nSee [`SKILL.md`](./SKILL.md) for the full production rules and editing craft.\n","summary":"video‑use is a 100 % open‑source video‑editing toolkit that lets you edit raw footage through a conversational interface with Claude Code (or other shell‑enabled agents). By transcribing audio with ElevenLabs and building a visual composite, the system automatically removes filler words, cuts dead space, applies preset or custom color grading, fades audio, and burns style‑customisable subtitles, while also spawning animation overlays with HyperFrames, Remotion, Manim or PIL. It self‑evaluates each cut boundary, preserves session state in a markdown file for multi‑week projects, and outputs the finished clip to an `edit/` folder. Creators, content‑production teams, or anyone wanting a hands‑off, menu‑free editing workflow will find it especially useful.","description":"Edit videos with coding agents","stars":6219,"language":"Python"},{"owner":"0xGF","repo":"boneyard","url":"https://github.com/0xGF/boneyard","readme":"<p align=\"center\">\n  <img src=\"boneyard-logo.gif\" alt=\"Boneyard\" width=\"1000\" />\n</p>\n\n# boneyard\n\nPixel-perfect skeleton loading screens, extracted from your real UI. No manual measurement, no hand-tuned placeholders.\n\nWorks with **React**, **Preact**, **Vue**, **Svelte 5**, **Angular**, and **React Native**.\n\n## Quick start\n\n```bash\nnpm install boneyard-js\n```\n\n### React\n\n```tsx\nimport { Skeleton } from 'boneyard-js/react'\n\nfunction BlogPage() {\n  const { data, isLoading } = useFetch('/api/post')\n  return (\n    <Skeleton name=\"blog-card\" loading={isLoading}>\n      {data && <BlogCard data={data} />}\n    </Skeleton>\n  )\n}\n```\n\n### Vue\n\n```vue\n<script setup>\nimport Skeleton from 'boneyard-js/vue'\nimport './bones/registry'\nconst loading = ref(true)\n<\/script>\n\n<template>\n  <Skeleton name=\"card\" :loading=\"loading\">\n    <Card />\n  </Skeleton>\n</template>\n```\n\n### Svelte 5\n\n```svelte\n<script>\n  import Skeleton from 'boneyard-js/svelte'\n  import '$lib/bones/registry'\n  let loading = true\n<\/script>\n\n<Skeleton name=\"card\" {loading}>\n  <Card />\n</Skeleton>\n```\n\n### Preact\n\n```tsx\nimport { Skeleton } from 'boneyard-js/preact'\n\nfunction BlogPage() {\n  const { data, isLoading } = useFetch('/api/post')\n  return (\n    <Skeleton name=\"blog-card\" loading={isLoading}>\n      {data && <BlogCard data={data} />}\n    </Skeleton>\n  )\n}\n```\n\n### Angular\n\n```typescript\nimport { SkeletonComponent } from 'boneyard-js/angular'\n\n@Component({\n  imports: [SkeletonComponent],\n  template: `\n    <boneyard-skeleton name=\"card\" [loading]=\"isLoading\">\n      <app-card />\n    </boneyard-skeleton>\n  `\n})\n```\n\n### React Native\n\n```tsx\nimport { Skeleton } from 'boneyard-js/native'\n\n<Skeleton name=\"profile-card\" loading={isLoading}>\n  <ProfileCard />\n</Skeleton>\n```\n\n```bash\nnpx boneyard-js build --native --out ./bones\n# Open your app on device — bones capture automatically\n```\n\n> **Dynamic Type:** Generate bones at default font scale. Boneyard automatically scales bone positions at runtime to match the user's text size setting.\n\n## Generate bones\n\n```bash\n# CLI — works with any framework\nnpx boneyard-js build\n\n# Watch mode — re-captures on HMR changes\nnpx boneyard-js build --watch\n\n# React Native — scans from device\nnpx boneyard-js build --native\n```\n\nThen import the registry once in your app entry:\n\n```ts\nimport './bones/registry'\n```\n\n### Vite plugin\n\nFor Vite-based projects (React, Preact, Vue, Svelte), use the plugin instead of the CLI — no second terminal needed:\n\n```ts\n// vite.config.ts\nimport { boneyardPlugin } from 'boneyard-js/vite'\n\nexport default defineConfig({\n  plugins: [boneyardPlugin()]\n})\n```\n\nBones are captured automatically when the dev server starts and re-captured on every HMR update.\n\n## How it works\n\n**Web:** The CLI (or Vite plugin) opens a headless browser, visits your app, finds every `<Skeleton name=\"...\">`, and snapshots their layout at multiple breakpoints.\n\n**React Native:** The `<Skeleton>` component auto-scans in dev mode when the CLI is running. It walks the fiber tree, measures views via `UIManager`, and sends bone data to the CLI. Zero overhead in production.\n\nAll frameworks output the same `.bones.json` format — cross-platform compatible.\n\n## CLI flags\n\n| Flag | Default | Description |\n|------|---------|-------------|\n| `[url]` | auto-detected | URL to visit |\n| `--breakpoints` | 375,768,1280 | Viewport widths, comma-separated |\n| `--wait` | 800 | ms to wait after page load |\n| `--out` | ./src/bones | Output directory |\n| `--force` | — | Skip incremental cache |\n| `--watch` | — | Re-capture on HMR changes |\n| `--native` | — | React Native device scanning |\n| `--no-scan` | — | Skip filesystem route scanning |\n| `--cdp` | — | Connect to existing Chrome via debug port |\n| `--env-file` | — | Load env vars from file |\n\n## Props\n\n| Prop | Type | Default | Description |\n|------|------|---------|-------------|\n| `loading` | boolean | — | Show skeleton or real content |\n| `name` | string | — | Unique name (generates `name.bones.json`) |\n| `color` | string | `rgba(0,0,0,0.08)` | Bone fill color |\n| `darkColor` | string | `rgba(255,255,255,0.06)` | Bone color in dark mode |\n| `animate` | `'pulse'` \\| `'shimmer'` \\| `'solid'` | `'pulse'` | Animation style |\n| `stagger` | `number` \\| `boolean` | `false` | Stagger delay between bones in ms (`true` = 80ms) |\n| `transition` | `number` \\| `boolean` | `false` | Fade out duration when loading ends (`true` = 300ms) |\n| `boneClass` | string | — | CSS class applied to each bone element |\n| `fixture` | ReactNode / Snippet / Slot | — | Mock content for CLI capture (dev only) |\n| `initialBones` | ResponsiveBones | — | Pass bones directly (overrides registry) |\n| `fallback` | ReactNode / Snippet / Slot | — | Shown when loading but no bones available |\n\n## Config file\n\n```json\n{\n  \"breakpoints\": [375, 768, 1280],\n  \"out\": \"./src/bones\",\n  \"wait\": 800,\n  \"color\": \"#e5e5e5\",\n  \"animate\": \"pulse\"\n}\n```\n\nSave as `boneyard.config.json`. Per-component props override config values.\n\n## Package exports\n\n| Import | Use |\n|--------|-----|\n| `boneyard-js` | `snapshotBones`, `renderBones`, `computeLayout` |\n| `boneyard-js/react` | React `<Skeleton>` |\n| `boneyard-js/preact` | Preact `<Skeleton>` (no compat needed) |\n| `boneyard-js/vue` | Vue `<Skeleton>` |\n| `boneyard-js/svelte` | Svelte `<Skeleton>` |\n| `boneyard-js/angular` | Angular `<boneyard-skeleton>` |\n| `boneyard-js/native` | React Native `<Skeleton>` |\n| `boneyard-js/vite` | Vite plugin `boneyardPlugin()` |\n\n## Links\n\n- [Docs](https://boneyard.vercel.app/overview)\n- [npm](https://www.npmjs.com/package/boneyard-js)\n- [Twitter](https://x.com/0xGoodfuture/status/2039818750568878245)\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/svg?repos=0xGF/boneyard&type=Date)](https://star-history.com/#0xGF/boneyard&Date)\n\n## License\n\nMIT\n","summary":"Boneyard is a tool that automatically generates pixel‑perfect skeleton loading screens from the actual layout of your UI, eliminating manual measurement and hand‑tuned placeholders. It captures “bones” for React, Preact, Vue, Svelte, Angular and React Native through a CLI or a Vite plugin, producing a unified JSON format that scales with dynamic font sizes and different viewports. The generated skeletons can be toggled in code with a simple `loading` prop, allowing developers to swap between real content and a realistic loading state on the fly. Front‑end and mobile developers looking to speed up polish and improve perceived performance will benefit from this zero‑overhead, framework‑agnostic approach to skeleton screens.","description":"Auto generated skeleton loading framework","stars":5396,"language":"TypeScript"},{"owner":"google","repo":"skills","url":"https://github.com/google/skills","readme":"# Agent Skills \n\n[![Install via skills.sh](https://img.shields.io/badge/skills.sh-install-green)](https://skills.sh/google/skills)\n\nThis repository contains [Agent Skills](https://agentskills.io/home) for Google products and technologies, including [Google Cloud](https://cloud.google.com).\n\n> [!NOTE]\n> This repository is under active development.\n\n\n## Installation\n\n```bash\nnpx skills add google/skills\n```\n\nFrom the `npx install` command, you can select the specific skills from this\nrepo to install.\n\n## Available Skills\n\n- [**Gemini API in Agent Platform**](./skills/cloud/gemini-api)\n- [**AlloyDB Basics**](./skills/cloud/alloydb-basics)\n- [**BigQuery Basics**](./skills/cloud/bigquery-basics)\n- [**Cloud Run Basics**](./skills/cloud/cloud-run-basics)\n- [**Cloud SQL Basics**](./skills/cloud/cloud-sql-basics)\n- [**Firebase Basics**](./skills/cloud/firebase-basics)\n- [**Kubernetes Engine (GKE) Basics**](./skills/cloud/gke-basics)\n- [**Recipe: Onboarding to Google Cloud**](./skills/cloud/google-cloud-recipe-onboarding)\n- [**Recipe: Authenticating to Google Cloud**](./skills/cloud/google-cloud-recipe-auth)\n- [**Recipe: Google Cloud Network Observability**](./skills/cloud/google-cloud-networking-observability)\n- [**Google Cloud Well-Architected Framework: Security**](./skills/cloud/google-cloud-waf-security)\n- [**Google Cloud Well-Architected Framework: Reliability**](./skills/cloud/google-cloud-waf-reliability)\n- [**Google Cloud Well-Architected Framework: Cost Optimization**](./skills/cloud/google-cloud-waf-cost-optimization)\n\n## Support\n\nIf you need help or encounter issues with these skills, search for existing issues or open a new one in the [GitHub Issue Tracker](https://github.com/google/skills/issues).\n\n## Contributing\n\nWe welcome contributions to improve our skills. You can help by:\n\n*   [Reporting bugs or inaccuracies](https://github.com/google/skills/issues) in the skill Markdown files.\n*   Suggesting new skills to add to this repository (for example, Google technologies or recipes) by filing a feature request.\n\n## License\n\nYou are free to copy, modify, and distribute these skills under the terms of the\nApache 2.0 license. See the `LICENSE` file for details.\n\n","summary":"The Google “skills” repository delivers a catalog of Agent Skills that expose Google products—particularly Google Cloud services—to conversational AI agents. It bundles ready‑to‑install modules for accessing Gemini, AlloyDB, BigQuery, Cloud Run, Cloud SQL, Firebase, GKE, and a variety of recipes that help onboard users, authenticate, and monitor network traffic or apply the Well‑Architected Framework. By installing these skills with a single npx command, developers and cloud engineers can rapidly embed Google Cloud capabilities into chatbots or other AI‑powered interfaces, gaining automated support for common cloud operations and best‑practice guidance.","description":"Agent Skills for Google products and technologies","stars":6530,"language":null},{"owner":"farzaa","repo":"clicky","url":"https://github.com/farzaa/clicky","readme":"Update: April 27, 2026.\n\nHi there! I'm Farza, the guy that made Clicky.\n\nThe existing codebase remains open source. Tinker with it, make it yours, start a company out of it, do whatever you want I don't mind. But, for all the new stuff I'm hacking on, gonna keep it private. To get the latest Clicky, you can go [here](https://www.heyclicky.com/).\n\nI also tweeted about this [here](https://x.com/FarzaTV/status/2043402737828962489).\n\nGo crazy with this repo!! It's an MIT license.\n\n# Hi, this is Clicky.\nIt's an AI teacher that lives as a buddy next to your cursor. It can see your screen, talk to you, and even point at stuff. Kinda like having a real teacher next to you.\n\nDownload it [here](https://www.clicky.so/) for free.\n\nHere's the [original tweet](https://x.com/FarzaTV/status/2041314633978659092) that kinda blew up for a demo for more context.\n\n![Clicky — an ai buddy that lives on your mac](clicky-demo.gif)\n\nThis is the open-source version of Clicky for those that want to hack on it, build their own features, or just see how it works under the hood.\n\n## Get started with Claude Code\n\nThe fastest way to get this running is with [Claude Code](https://docs.anthropic.com/en/docs/claude-code).\n\nOnce you get Claude running, paste this:\n\n```\nHi Claude.\n\nClone https://github.com/farzaa/clicky.git into my current directory.\n\nThen read the CLAUDE.md. I want to get Clicky running locally on my Mac.\n\nHelp me set up everything — the Cloudflare Worker with my own API keys, the proxy URLs, and getting it building in Xcode. Walk me through it.\n```\n\nThat's it. It'll clone the repo, read the docs, and walk you through the whole setup. Once you're running you can just keep talking to it — build features, fix bugs, whatever. Go crazy.\n\n## Manual setup\n\nIf you want to do it yourself, here's the deal.\n\n### Prerequisites\n\n- macOS 14.2+ (for ScreenCaptureKit)\n- Xcode 15+\n- Node.js 18+ (for the Cloudflare Worker)\n- A [Cloudflare](https://cloudflare.com) account (free tier works)\n- API keys for: [Anthropic](https://console.anthropic.com), [AssemblyAI](https://www.assemblyai.com), [ElevenLabs](https://elevenlabs.io)\n\n### 1. Set up the Cloudflare Worker\n\nThe Worker is a tiny proxy that holds your API keys. The app talks to the Worker, the Worker talks to the APIs. This way your keys never ship in the app binary.\n\n```bash\ncd worker\nnpm install\n```\n\nNow add your secrets. Wrangler will prompt you to paste each one:\n\n```bash\nnpx wrangler secret put ANTHROPIC_API_KEY\nnpx wrangler secret put ASSEMBLYAI_API_KEY\nnpx wrangler secret put ELEVENLABS_API_KEY\n```\n\nFor the ElevenLabs voice ID, open `wrangler.toml` and set it there (it's not sensitive):\n\n```toml\n[vars]\nELEVENLABS_VOICE_ID = \"your-voice-id-here\"\n```\n\nDeploy it:\n\n```bash\nnpx wrangler deploy\n```\n\nIt'll give you a URL like `https://your-worker-name.your-subdomain.workers.dev`. Copy that.\n\n### 2. Run the Worker locally (for development)\n\nIf you want to test changes to the Worker without deploying:\n\n```bash\ncd worker\nnpx wrangler dev\n```\n\nThis starts a local server (usually `http://localhost:8787`) that behaves exactly like the deployed Worker. You'll need to create a `.dev.vars` file in the `worker/` directory with your keys:\n\n```\nANTHROPIC_API_KEY=sk-ant-...\nASSEMBLYAI_API_KEY=...\nELEVENLABS_API_KEY=...\nELEVENLABS_VOICE_ID=...\n```\n\nThen update the proxy URLs in the Swift code to point to `http://localhost:8787` instead of the deployed Worker URL while developing. Grep for `clicky-proxy` to find them all.\n\n### 3. Update the proxy URLs in the app\n\nThe app has the Worker URL hardcoded in a few places. Search for `your-worker-name.your-subdomain.workers.dev` and replace it with your Worker URL:\n\n```bash\ngrep -r \"clicky-proxy\" leanring-buddy/\n```\n\nYou'll find it in:\n- `CompanionManager.swift` — Claude chat + ElevenLabs TTS\n- `AssemblyAIStreamingTranscriptionProvider.swift` — AssemblyAI token endpoint\n\n### 4. Open in Xcode and run\n\n```bash\nopen leanring-buddy.xcodeproj\n```\n\nIn Xcode:\n1. Select the `leanring-buddy` scheme (yes, the typo is intentional, long story)\n2. Set your signing team under Signing & Capabilities\n3. Hit **Cmd + R** to build and run\n\nThe app will appear in your menu bar (not the dock). Click the icon to open the panel, grant the permissions it asks for, and you're good.\n\n### Permissions the app needs\n\n- **Microphone** — for push-to-talk voice capture\n- **Accessibility** — for the global keyboard shortcut (Control + Option)\n- **Screen Recording** — for taking screenshots when you use the hotkey\n- **Screen Content** — for ScreenCaptureKit access\n\n## Architecture\n\nIf you want the full technical breakdown, read `CLAUDE.md`. But here's the short version:\n\n**Menu bar app** (no dock icon) with two `NSPanel` windows — one for the control panel dropdown, one for the full-screen transparent cursor overlay. Push-to-talk streams audio over a websocket to AssemblyAI, sends the transcript + screenshot to Claude via streaming SSE, and plays the response through ElevenLabs TTS. Claude can embed `[POINT:x,y:label:screenN]` tags in its responses to make the cursor fly to specific UI elements across multiple monitors. All three APIs are proxied through a Cloudflare Worker.\n\n## Project structure\n\n```\nleanring-buddy/          # Swift source (yes, the typo stays)\n  CompanionManager.swift    # Central state machine\n  CompanionPanelView.swift  # Menu bar panel UI\n  ClaudeAPI.swift           # Claude streaming client\n  ElevenLabsTTSClient.swift # Text-to-speech playback\n  OverlayWindow.swift       # Blue cursor overlay\n  AssemblyAI*.swift         # Real-time transcription\n  BuddyDictation*.swift     # Push-to-talk pipeline\nworker/                  # Cloudflare Worker proxy\n  src/index.ts              # Three routes: /chat, /tts, /transcribe-token\nCLAUDE.md                # Full architecture doc (agents read this)\n```\n\n## Contributing\n\nPRs welcome. If you're using Claude Code, it already knows the codebase — just tell it what you want to build and point it at `CLAUDE.md`.\n\nGot feedback? DM me on X [@farzatv](https://x.com/farzatv).\n","summary":"Clicky is an AI‑powered teaching assistant that sits by your cursor on macOS, letting you view your screen, converse with it, and have it point out elements in real time—essentially a “real teacher” companion for your desktop. The open‑source app combines ScreenCaptureKit, Claude for natural‑language understanding, AssemblyAI for speech‑to‑text, and ElevenLabs for text‑to‑speech, all wired through a Cloudflare Worker that keeps API keys secure. Developers can clone the repo, deploy the Worker locally or on Cloudflare, and build the Swift Xcode project to run or extend the assistant on a Mac. The project is ideal for educators, developers, or power users who want an on‑screen AI buddy for learning, coding help, or productivity.","description":null,"stars":5354,"language":"Swift"},{"owner":"Robbyant","repo":"lingbot-map","url":"https://github.com/Robbyant/lingbot-map","readme":"<div align=\"center\">\n  <img src=\"assets/teaser.png\" width=\"100%\">\n\n<h1>LingBot-Map: Geometric Context Transformer for Streaming 3D Reconstruction</h1>\n\nRobbyant Team\n\n</div>\n\n<div align=\"center\">\n\n[![Paper](https://img.shields.io/static/v1?label=Paper&message=arXiv&color=red&logo=arxiv)](https://arxiv.org/abs/2604.14141)\n[![PDF](https://img.shields.io/static/v1?label=Paper&message=PDF&color=red&logo=adobeacrobatreader)](lingbot-map_paper.pdf)\n[![Project](https://img.shields.io/badge/Project-Website-blue)](https://technology.robbyant.com/lingbot-map)\n[![HuggingFace](https://img.shields.io/static/v1?label=%F0%9F%A4%97%20Model&message=HuggingFace&color=orange)](https://huggingface.co/robbyant/lingbot-map)\n[![ModelScope](https://img.shields.io/static/v1?label=%F0%9F%A4%96%20Model&message=ModelScope&color=purple)](https://www.modelscope.cn/models/Robbyant/lingbot-map)\n[![License](https://img.shields.io/badge/License-Apache--2.0-green)](LICENSE.txt)\n\n</div>\n\nhttps://github.com/user-attachments/assets/fe39e095-af2c-4ec9-b68d-a8ba97e505ab\n\n-----\n\n### 🗺️ Meet LingBot-Map! We've built a feed-forward 3D foundation model for streaming 3D reconstruction! 🏗️🌍\n\nLingBot-Map has focused on:\n\n- **Geometric Context Transformer**: Architecturally unifies coordinate grounding, dense geometric cues, and long-range drift correction within a single streaming framework through anchor context, pose-reference window, and trajectory memory.\n- **High-Efficiency Streaming Inference**: A feed-forward architecture with paged KV cache attention, enabling stable inference at ~20 FPS on 518×378 resolution over long sequences exceeding 10,000 frames.\n- **State-of-the-Art Reconstruction**: Superior performance on diverse benchmarks compared to both existing streaming and iterative optimization-based approaches.\n\n---\n\n## 📑 Table of Contents\n\n<details>\n<summary>Click to expand</summary>\n\n- [📰 News](#-news)\n- [📋 TODO](#-todo)\n- [⚙️ Installation](#️-installation)\n- [📦 Model Download](#-model-download)\n- [🚀 Quick Start](#-quick-start)\n- [🎬 Interactive Demo (`demo.py`)](#-interactive-demo-demopy)\n  - [Try the Example Scenes](#try-the-example-scenes)\n  - [Streaming with Keyframe Interval](#streaming-with-keyframe-interval)\n  - [Windowed Inference (for long sequences, >3000 frames)](#windowed-inference-for-long-sequences-3000-frames)\n  - [Sky Masking](#sky-masking)\n  - [Visualization Options](#visualization-options)\n  - [Performance & Memory](#performance--memory)\n- [🎥 Offline Rendering Pipeline (`demo_render/batch_demo.py`)](#-offline-rendering-pipeline-demo_renderbatch_demopy)\n- [📜 License](#-license)\n- [📖 Citation](#-citation)\n- [✨ Acknowledgments](#-acknowledgments)\n\n</details>\n\n---\n\n## 📰 News\n\n- **2026-04-29** — 📹 **Long-video demo released**. We released a very-long-video example (~25 000 frames, 13-minute indoor walkthrough) rendered with the offline pipeline — see [Worked Example](#worked-example--long-indoor-walkthrough-25-000-frames-13-minutes) for the command, flag rationale, and rendered output.\n- **2026-04-27** — 🚀 **LingBot-Map accelerated**. Pull the latest `main` and run `python demo.py --compile ...` or `python gct_profile.py --backend flashinfer --dtype bf16 --compile` to verify on your hardware.\n- **2026-04-24** — Fixed a FlashInfer KV cache bug where `--keyframe_interval > 1` silently cached non-keyframes. **You should now see better pose and reconstruction quality when running with more than 320 frames**.\n\n---\n\n## 📋 TODO\n\n- ⬜ Release evaluation benchmark\n- ✅ Release demo scripts\n  - ✅ Indoor long-video demo ([Featured indoor walkthrough](#-featured-indoor-walkthrough-25-000-frames-13-minutes))\n  - ⬜ Outdoor long-video demo\n  - ⬜ LingBot-World demo\n  - ⬜ Aerial long-video demo\n\n---\n\n## ⚙️ Installation\n\n**1. Create conda environment**\n\n```bash\nconda create -n lingbot-map python=3.10 -y\nconda activate lingbot-map\n```\n\n**2. Install PyTorch (CUDA 12.8)**\n\n```bash\npip install torch==2.8.0 torchvision==0.23.0 --index-url https://download.pytorch.org/whl/cu128\n```\n\n> PyTorch 2.8.0 is the recommended version because NVIDIA Kaolin (required by the batch rendering pipeline) has prebuilt wheels for `torch-2.8.0_cu128`. If you only need `demo.py` you may use a newer PyTorch, but the batch renderer then requires building Kaolin from source.\n> For other CUDA versions, see [PyTorch Get Started](https://pytorch.org/get-started/locally/).\n\n**3. Install lingbot-map**\n\n```bash\npip install -e .\n```\n\n**4. Install FlashInfer (recommended)**\n\nFlashInfer provides paged KV cache attention for efficient streaming inference. It is a pure-Python package that JIT-compiles CUDA kernels on first use, so a single wheel works across CUDA/PyTorch versions:\n\n```bash\npip install --index-url https://pypi.org/simple flashinfer-python\n```\n\n> `--index-url https://pypi.org/simple` is only needed if your default pip index is an internal mirror that doesn't have `flashinfer-python`.\n> (Optional) For faster first-use, you can additionally install a CUDA-specific JIT cache: `pip install flashinfer-jit-cache -f https://flashinfer.ai/whl/cu128/flashinfer-jit-cache/`.\n> See [FlashInfer installation](https://docs.flashinfer.ai/installation.html) for details. If FlashInfer is not installed, the model falls back to SDPA (PyTorch native attention) via `--use_sdpa`.\n\n**5. Visualization dependencies (optional)**\n\n```bash\npip install -e \".[vis]\"\n```\n\n## 📦 Model Download\n\n| Model Name | Huggingface Repository | ModelScope Repository | Description |\n| :--- | :--- | :--- | :--- |\n| lingbot-map-long | [robbyant/lingbot-map](https://huggingface.co/robbyant/lingbot-map) | [Robbyant/lingbot-map](https://www.modelscope.cn/models/Robbyant/lingbot-map) | Better suited for long sequences and large scale scenes (Recommend). |\n| lingbot-map | [robbyant/lingbot-map](https://huggingface.co/robbyant/lingbot-map) | [Robbyant/lingbot-map](https://www.modelscope.cn/models/Robbyant/lingbot-map) | Balanced checkpoint — trade off all-around performance across short and long sequences. |\n| lingbot-map-stage1 | [robbyant/lingbot-map](https://huggingface.co/robbyant/lingbot-map) | [Robbyant/lingbot-map](https://www.modelscope.cn/models/Robbyant/lingbot-map) | Stage-1 training checkpoint of lingbot-map — can be loaded into the VGGT model for bidirectional inference (c2w). |\n\n> 🚧 **Coming soon:** we're training an stronger model that supports longer sequences — stay tuned.\n\n## 🚀 Quick Start\n\nAfter installation, run your first scene with one command:\n\n```bash\npython demo.py --model_path /path/to/lingbot-map-long.pt \\\n    --image_folder example/courthouse --mask_sky\n```\n\nThis launches an interactive [viser](https://github.com/nerfstudio-project/viser) viewer at `http://localhost:8080`. See [Interactive Demo](#-interactive-demo-demopy) below for the full set of scenes and flags, or jump to [Offline Rendering Pipeline](#-offline-rendering-pipeline-demo_renderbatch_demopy) for long-sequence batch rendering.\n\n## 🎬 Interactive Demo (`demo.py`)\n\nRun `demo.py` for interactive 3D visualization via a browser-based [viser](https://github.com/nerfstudio-project/viser) viewer (default `http://localhost:8080`).\n\n### Try the Example Scenes\n\nWe provide four example scenes in `example/` that you can run out of the box:\n```bash\n# courthouse scene\npython demo.py --model_path /path/to/lingbot-map-long.pt \\\n    --image_folder example/courthouse --mask_sky\n```\n\n\nhttps://github.com/user-attachments/assets/aa10f7ab-8024-43c7-92f8-d56159ec85c8\n\n\n\n\n\n\n```bash\n# University scene\npython demo.py --model_path /path/to/lingbot-map-long.pt \\\n    --image_folder example/university --mask_sky\n```\n\n\nhttps://github.com/user-attachments/assets/212a1744-6ff5-4ccf-9bd4-728608248b57\n\n\n\n\n\n\n\n```bash\n# Loop scene (loop closure trajectory)\npython demo.py --model_path /path/to/lingbot-map-long.pt \\\n    --image_folder example/loop\n```\n\n\nhttps://github.com/user-attachments/assets/5ae0a292-b081-40c6-838c-b7c1a0538d75\n\n\n\n\n\n```bash\n# Oxford scene with sky masking (outdoor, large scale scene)\npython demo.py --model_path /path/to/lingbot-map-long.pt \\\n    --image_folder example/oxford --mask_sky\n```\n\n\nhttps://github.com/user-attachments/assets/6b8daa95-9ed4-40b2-9902-7435779b886d\n\n\n\n\n\n\n#### 🎯 Featured: indoor walkthrough (~25 000 frames, 13 minutes)\n\n\n*Sequence is too long for the interactive viser viewer — this clip was rendered with the [Offline Rendering Pipeline](#-offline-rendering-pipeline-demo_renderbatch_demopy). See that section for the full command.*\n\nWe will provide more examples in the follow-up.\n\n### Streaming with Keyframe Interval\n\nUse `--keyframe_interval` to reduce KV cache memory by only keeping every N-th frame as a keyframe. Non-keyframe frames still produce predictions but are not stored in the cache. This is useful for long sequences which exceed 320 frames (We train with video RoPE on 320 views, so performance degrades when the KV cache stores more than 320 views. Using a keyframe strategy allows inference over longer sequences.).\n\n\n**Dataset:** Download the demo sequences from [robbyant/lingbot-map-demo](https://huggingface.co/datasets/robbyant/lingbot-map-demo/tree/main) on Hugging Face.\n\nExample run on the `travel` sequence from the dataset above (sky masking on, 4 camera optimization iterations, keyframe every 2 frames):\n\n```bash\npython demo.py \\\n    --image_folder /path/to/lingbot-map-demo/travel/ \\\n    --model_path /path/to/lingbot-map-long.pt \\\n    --mask_sky \\\n    --camera_num_iterations 4 \\\n    --keyframe_interval 2\n```\n\n\nhttps://github.com/user-attachments/assets/d350b590-d036-4363-af8c-7af3918338ef\n\n\n\n> **Note on inference range.** Our method does not perform state resetting by default, so the maximum inference range is bounded by the longest distance seen during training on the dataset. Beyond that distance, state resetting becomes necessary. If you observe pose collapse, switch to windowed mode (`--mode windowed`) — in most cases tuning `--keyframe_interval` alone is enough and the rest of the windowed parameters can stay at their defaults.\n\n\n### Windowed Inference (for long sequences, >3000 frames)\n\n```bash\npython demo.py --model_path /path/to/lingbot-map-long.pt \\\n    --video_path video.mp4 --fps 10 \\\n    --mode windowed --window_size 128 --overlap_keyframes 16 --keyframe_interval 2 \n```\n\n\n### Sky Masking\n\nSky masking uses an ONNX sky segmentation model to filter out sky points from the reconstructed point cloud, which improves visualization quality for outdoor scenes.\n\n**Setup:**\n\n```bash\n# Install onnxruntime (required)\npip install onnxruntime        # CPU\n# or\npip install onnxruntime-gpu    # GPU (faster for large image sets)\n```\n\nThe sky segmentation model (`skyseg.onnx`) will be automatically downloaded from [HuggingFace](https://huggingface.co/JianyuanWang/skyseg/resolve/main/skyseg.onnx) on first use.\n\n**Usage:**\n\n```bash\npython demo.py --model_path /path/to/checkpoint.pt \\\n    --image_folder /path/to/images/ --mask_sky\n```\n\nSky masks are cached in `<image_folder>_sky_masks/` so subsequent runs skip regeneration. You can also specify a custom cache directory with `--sky_mask_dir`, or save side-by-side mask visualizations with `--sky_mask_visualization_dir`:\n\n```bash\npython demo.py --model_path /path/to/checkpoint.pt \\\n    --image_folder /path/to/images/ --mask_sky \\\n    --sky_mask_dir /path/to/cached_masks/ \\\n    --sky_mask_visualization_dir /path/to/mask_viz/\n```\n\n### Visualization Options\n\n| Argument | Default | Description |\n|:---|:---|:---|\n| `--port` | `8080` | Viser viewer port |\n| `--conf_threshold` | `1.5` | Visibility threshold for filtering low-confidence points |\n| `--point_size` | `0.00001` | Point cloud point size |\n| `--downsample_factor` | `10` | Spatial downsampling for point cloud display |\n\n### Performance & Memory\n\n#### Without FlashInfer (SDPA fallback)\n\n```bash\npython demo.py --model_path /path/to/checkpoint.pt \\\n    --image_folder /path/to/images/ --use_sdpa\n```\n\n#### Running on Limited GPU Memory\n\nIf you run into out-of-memory issues, try one (or both) of the following:\n\n- **`--offload_to_cpu`** — offload per-frame predictions to CPU during inference (on by default; use `--no-offload_to_cpu` only if you have memory to spare).\n- **`--num_scale_frames 2`** — reduce the number of bidirectional scale frames from the default 8 down to 2, which shrinks the activation peak of the initial scale phase.\n\n#### Faster Inference\n\nLower the number of iterative refinement steps in the camera head to trade a small amount of pose accuracy for wall-clock speed:\n\n```bash\npython demo.py --model_path /path/to/checkpoint.pt \\\n    --image_folder /path/to/images/ --camera_num_iterations 1\n```\n\n`--camera_num_iterations` defaults to `4`; setting it to `1` skips three refinement passes in the camera head (and shrinks its KV cache by 4×).\n\n## 🎥 Offline Rendering Pipeline (`demo_render/batch_demo.py`)\n\nUse this pipeline when your sequence is too long for the interactive viser viewer — for example, the [indoor walkthrough featured above](#-featured-indoor-walkthrough-25-000-frames-13-minutes). `demo_render/batch_demo.py` is the all-in-one offline entry point: feed it a video or a folder of images and it will run model inference and produce a headless point-cloud flythrough MP4 in a single command. It shares the same PyTorch / FlashInfer / checkpoint stack as `demo.py`.\n\n### Install (extends the main install)\n\n**1. Rendering Python dependencies**\n\n```bash\npip install -e \".[vis,render]\"\n```\n\n`render` pulls in `open3d>=0.19` and `pyyaml` (the core `numpy<2` constraint comes from the base `lingbot-map` install). Sky masking in this pipeline uses `onnxruntime-gpu` for batched segmentation; install it if you don't already have the CPU `onnxruntime`:\n\n```bash\npip install onnxruntime-gpu\n```\n\n**2. Kaolin** — matches the PyTorch 2.8.0 + CUDA 12.8 recommended above:\n\n```bash\npip install --index-url https://pypi.org/simple \\\n    kaolin -f https://nvidia-kaolin.s3.us-east-2.amazonaws.com/torch-2.8.0_cu128.html\n```\n\n> `--index-url https://pypi.org/simple` bypasses any internal mirror that might otherwise serve the PyPI placeholder wheel (which raises `ImportError` on import).\n> NVIDIA Kaolin does not publish prebuilt wheels for PyTorch 2.9.x — if you're on 2.9 for other reasons, build Kaolin from source (`pip install --no-build-isolation git+https://github.com/NVIDIAGameWorks/kaolin.git`, needs local CUDA toolkit). For other torch/CUDA combinations see [NVIDIA Kaolin installation](https://kaolin.readthedocs.io/en/latest/notes/installation.html).\n\n**3. ffmpeg**\n\n```bash\nsudo apt install ffmpeg    # or: brew install ffmpeg\n```\n\n**4. CUDA extensions** (required before first run)\n\n```bash\ncd demo_render/render_cuda_ext && python setup.py build_ext --inplace && cd ../..\n```\n\nThis builds `voxel_morton_ext` and `frustum_cull_ext` in place — both are imported by `rgbd_render` for GPU voxelization and frustum culling.\n\n### Worked Example — long indoor walkthrough (~25 000 frames, 13 minutes)\n\n**Dataset:** Download the example video from [robbyant/lingbot-map-demo](https://huggingface.co/datasets/robbyant/lingbot-map-demo/tree/main) on Hugging Face.\n\n```bash\n    python demo_render/batch_demo.py \\\n    --video_path /data/demo_videos/indoor_travel.MP4 \\\n    --output_folder /data/outputs/indoor_travel/ \\\n    --model_path /path/to/lingbot-map.pt \\\n    --config demo_render/config/indoor.yaml \\\n    --mode windowed --window_size 128 \\\n    --keyframe_interval 13 --overlap_keyframes 8 \\\n    --sky_mask_dir /data/outputs/sky_masks \\\n    --sky_mask_visualization_dir /data/outputs/sky_mask_viz \\\n    --camera_vis default --keyframes_only_points \\\n    --frame_tag --frame_tag_position top_right \\\n    --save_predictions\n```\n\n<img width=\"1920\" height=\"1080\" alt=\"image\" src=\"https://github.com/user-attachments/assets/f4f5e555-22a8-4cc9-b380-dfde5fe1c809\" />\n\n\nFlag-by-flag rationale:\n\n| Flag | Why it's there |\n|---|---|\n| `--mode windowed --window_size 128` | Sliding-window inference is required once the sequence exceeds the ~320-frame RoPE training range; each window resets the KV cache. **`window_size` counts KV-cache slots, not actual frames** — the first `num_scale_frames` (=8) slots hold the scale frames and the remaining `128 − 8 = 120` slots hold keyframes. With `keyframe_interval = 13`, one window therefore covers `8 + 120 × 13 = 1568` actual frames. |\n| `--keyframe_interval 13` | Cache only every 13th frame as a keyframe. Non-keyframes still emit per-frame predictions but don't grow the KV cache|\n| `--overlap_keyframes 8` | Adjacent windows share 8 keyframes of context, resolved internally to `max(num_scale_frames, 8 × keyframe_interval) = 8 × 13 = 104` actual frames of overlap. Recommended whenever `keyframe_interval > 1`, to keep cross-window pose alignment stable. |\n| `--config demo_render/config/indoor.yaml` | Seed render/scene/camera/overlay defaults from the indoor preset (short depth, tighter follow cam). Any CLI flag the user explicitly passes still overrides the YAML value. |\n| `--sky_mask_dir` / `--sky_mask_visualization_dir` | Persist sky masks and their side-by-side visualizations to disk so subsequent reruns reuse them instead of re-running ONNX segmentation. (The render pipeline only consumes them when sky masking is enabled — by the YAML preset or by `--mask_sky`.) |\n| `--camera_vis default` | Overlay the trajectory trail + recent-frame points on the rendered video. |\n| `--keyframes_only_points` | Only unproject keyframe depth into the point cloud; non-keyframes still contribute their pose to the trajectory/frustum overlay. Keeps the cloud sparse for very long sequences. |\n| `--frame_tag --frame_tag_position top_right` | Stamp a `<i> / <N> Frames` counter in the top-right corner of the MP4. |\n| `--save_predictions` | Persist per-frame NPZs alongside the MP4. Useful for inspection or for re-rendering with different camera/overlay settings later. |\n\n### Camera Path (YAML)\n\nThe virtual camera path is described by the `camera.segments` list in the YAML preset passed via `--config`. Edit the YAML to design your own shot — no need to touch CLI flags.\n\nBuilt-in presets live in `demo_render/config/`: `default.yaml`, `indoor.yaml`, `indoor_overview.yaml`, `outdoor_large.yaml`, `outdoor_large_overview.yaml`, `surrounding.yaml`, `lingbo_world.yaml`. Copy one and edit the `camera:` block.\n\n#### YAML structure\n\n```yaml\ncamera:\n  fov: 60.0          # camera field of view in degrees\n  transition: 30     # frames blended between adjacent segments\n  segments:\n    - mode: follow            # chase cam following the input trajectory\n      frames: [0, 1500]       # rendered-frame range this segment covers (-1 = end)\n      back_offset: 0.3        # how far behind the input camera (fraction of scene scale)\n      up_offset: 0.08         # vertical lift above the input camera\n      look_offset: 0.4        # how far ahead the lookat target points\n      smooth_window: 30       # trajectory smoothing window in frames\n    - mode: birdeye           # rise up for a top-down reveal of the whole scene\n      frames: [1500, 1800]\n      reveal_height_mult: 2.5 # birdeye height = scene scale × this factor\n    - mode: follow            # drop back into chase cam\n      frames: [1800, -1]\n      back_offset: 0.3\n      up_offset: 0.08\n      look_offset: 0.4\n```\n\n`transition` controls how many frames are blended between adjacent segments; `frames: [0, -1]` means \"the whole sequence\".\n\n#### Available modes\n\n| `mode` | Behavior | Tunable fields |\n|---|---|---|\n| `follow` | Chase cam tracks the input trajectory with smooth offsets. The most cinematic option for walkthroughs. | `back_offset`, `up_offset`, `look_offset`, `smooth_window`, `scale_frames` |\n| `birdeye` | Top-down reveal of the whole scene. Useful for hero / overview shots. | `reveal_height_mult` |\n| `static` | Fixed eye + lookat, auto-derived from the segment's start frame. | — |\n| `pivot` | Fixed eye, lookat sweeps along the trajectory. | — |\n\n#### Single-shot YAML examples\n\n**Pure follow** (most common):\n\n```yaml\ncamera:\n  fov: 60.0\n  segments:\n    - mode: follow\n      frames: [0, -1]\n      back_offset: 0.3\n      up_offset: 0.08\n      look_offset: 0.4\n      smooth_window: 30\n```\n\n**Full birdeye** (good for overview / hero shots):\n\n```yaml\ncamera:\n  fov: 60.0\n  segments:\n    - mode: birdeye\n      frames: [0, -1]\n      reveal_height_mult: 2.5\n```\n\n**Follow with birdeye inserts**: just list multiple segments in order under `segments:` — adjacent segments are interpolated using `transition` frames.\n\n> Caveat: when `--config` loads a YAML preset, passing **any** segment-shaping CLI flag (`--camera_mode`, `--back_offset`, `--up_offset`, `--look_offset`, `--smooth_window`, `--follow_scale_frames`, `--birdeye_start`, `--birdeye_duration`, `--reveal_height_mult`) discards the YAML's `segments` and rebuilds the camera path from those flags instead. To stay fully YAML-driven, don't pass any of them on the command line.\n\n### Output files\n\nFor a given output name (e.g. `<scene>` or `<video_name>`):\n\n| File | Description |\n|------|-------------|\n| `<name>_pointcloud.mp4` | Rendered point-cloud flythrough |\n| `<name>_pointcloud_rgb.mp4` | Original RGB frames encoded as video |\n| `<name>_pointcloud_config.yaml` | Full config snapshot of this run |\n| `batch_results.json` | Per-scene success / duration summary |\n\n## 📜 License\n\nThis project is released under the Apache License 2.0. See [LICENSE](LICENSE.txt) file for details.\n\n## 📖 Citation\n\n```bibtex\n@article{chen2026geometric,\n  title={Geometric Context Transformer for Streaming 3D Reconstruction},\n  author={Chen, Lin-Zhuo and Gao, Jian and Chen, Yihang and Cheng, Ka Leong and Sun, Yipengjing and Hu, Liangxiao and Xue, Nan and Zhu, Xing and Shen, Yujun and Yao, Yao and Xu, Yinghao},\n  journal={arXiv preprint arXiv:2604.14141},\n  year={2026}\n}\n```\n\n## ✨ Acknowledgments\n\nWe thank Shangzhan Zhang, Jianyuan Wang, Yudong Jin, Christian Rupprecht, and Xun Cao for their helpful discussions and support.\n\nThis work builds upon several excellent open-source projects:\n\n- [VGGT](https://github.com/facebookresearch/vggt)\n- [DINOv2](https://github.com/facebookresearch/dinov2)\n- [Flashinfer](https://github.com/flashinfer-ai/flashinfer)\n\n---\n","summary":"LingBot‑Map is a feed‑forward 3D foundation model that performs streaming 3D reconstruction from RGB‑depth video, unifying coordinate grounding, dense geometric cues, and long‑range drift correction in a single geometric context transformer. It delivers near‑real‑time inference (~20 FPS on 518 × 378 frames) and can handle continuous sequences of more than 10 000 frames thanks to a paged KV‑cache attention mechanism and trajectory memory. The model achieves state‑of‑the‑art reconstruction quality on diverse benchmarks, outperforming both streaming and optimisation‑based rivals. Researchers and engineers working in robotics, AR/VR, autonomous navigation or any application that requires fast, high‑fidelity reconstruction of large scenes would benefit from adopting LingBot‑Map.","description":"A feed-forward 3D foundation model for reconstructing scenes from streaming data","stars":5723,"language":"Python"},{"owner":"yizhiyanhua-ai","repo":"fireworks-tech-graph","url":"https://github.com/yizhiyanhua-ai/fireworks-tech-graph","readme":"[English](README.md) | [中文](README.zh.md)\n\n# fireworks-tech-graph\n\n> **Stop drawing diagrams by hand.** Describe your system in English or Chinese — get publication-ready SVG + PNG technical diagrams in seconds.\n\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](LICENSE)\n[![Claude Code Skill](https://img.shields.io/badge/Claude%20Code-Skill-blue)](https://claude.ai/code)\n[![7 Visual Styles](https://img.shields.io/badge/Styles-7-purple)]()\n[![14 Diagram Types](https://img.shields.io/badge/Diagram%20Types-14-green)]()\n[![UML Support](https://img.shields.io/badge/UML-Full%20Support-orange)]()\n\n---\n\n## Overview\n\n`fireworks-tech-graph` turns natural language descriptions into polished SVG diagrams, then exports them as high-resolution PNG via `rsvg-convert`. It ships with **7 visual styles** and deep knowledge of AI/Agent domain patterns (RAG, Agentic Search, Mem0, Multi-Agent, Tool Call flows), plus full support for all 14 UML diagram types.\n\n```\nUser: \"Generate a Mem0 memory architecture diagram, dark style\"\n  → Skill classifies: Memory Architecture Diagram, Style 2\n  → Generates SVG with swim lanes, cylinders, semantic arrows\n  → Exports 1920px PNG\n  → Reports: mem0-architecture.svg / mem0-architecture.png\n```\n\n---\n\n## Work With the Builder\n\nThis project is also a proof surface for a broader capability: turning vague AI/devtool workflows into constrained, reusable systems with validation, documentation, export paths, and product-facing polish.\n\nIf you are building agent infrastructure, AI IDEs, internal copilots, developer tools, technical documentation systems, or applied AI workflow products, I am open to scoped paid sprints, design-partner work, and founding engineer conversations.\n\n- Founder-facing profile: https://bradzhang.dev/en\n- Commercial case study: https://bradzhang.dev/en/case-studies/fireworks-tech-graph\n- Work with me: https://bradzhang.dev/en/work-with-me\n\n---\n\n## Showcase\n\n> All samples exported at 1920px width (2× retina) via `rsvg-convert`. PNG is lossless and the right choice for technical diagrams — sharp edges, no JPEG compression artifacts on text/lines.\n\n### Style 1 — Flat Icon (default)\n*Mem0 Memory Architecture — white background, semantic arrows, layered memory system*\n![Style 1 — Flat Icon](assets/samples/sample-style1-flat.png)\n\n### Style 2 — Dark Terminal\n*Tool Call Flow — dark background, neon accents, monospace font*\n![Style 2 — Dark Terminal](assets/samples/sample-style2-dark.png)\n\n### Style 3 — Blueprint\n*Microservices Architecture — deep blue background, grid lines, cyan strokes*\n![Style 3 — Blueprint](assets/samples/sample-style3-blueprint.png)\n\n### Style 4 — Notion Clean\n*Agent Memory Types — minimal white, single accent color*\n![Style 4 — Notion Clean](assets/samples/sample-style4-notion.png)\n\n### Style 5 — Glassmorphism\n*Multi-Agent Collaboration — dark gradient background, frosted glass cards*\n![Style 5 — Glassmorphism](assets/samples/sample-style5-glass.png)\n\n### Style 6 — Claude Official\n*System Architecture — warm cream background (#f8f6f3), Anthropic brand colors, clean professional aesthetic*\n![Style 6 — Claude Official](assets/samples/sample-style6-claude.png)\n\n### Style 7 — OpenAI Official\n*API Integration Flow — pure white background, OpenAI brand palette, modern minimalist design*\n![Style 7 — OpenAI Official](assets/samples/sample-style7-openai.png)\n\n---\n\n## Stable Prompt Recipes\n\nUse prompts like these when you want the model to stay close to the repo's strongest regression-tested outputs:\n\n### Style 1 — Flat Icon\n```text\nDraw a Mem0 memory architecture diagram in style 1 (Flat Icon).\nUse four horizontal sections: Input Layer, Memory Manager, Storage Layer, Output / Retrieval.\nInclude User, AI App / Agent, LLM, mem0 Client, Memory Manager, Vector Store, Graph DB, Key-Value Store, History Store, Context Builder, Ranked Results, Personalized Response.\nUse semantic arrows for read, write, control, and data flow. Keep the layout clean and product-doc friendly.\n```\n\n### Style 2 — Dark Terminal\n```text\nDraw a tool call flow diagram in style 2 (Dark Terminal).\nShow User query, Retrieve chunks, Generate answer, Knowledge base, Agent, Terminal, Source documents, and Grounded answer.\nUse terminal chrome, neon accents, monospace typography, and semantic arrows for retrieval, synthesis, and embedding update.\n```\n\n### Style 3 — Blueprint\n```text\nDraw a microservices architecture diagram in style 3 (Blueprint).\nCreate numbered engineering sections like 01 // EDGE, 02 // APPLICATION SERVICES, 03 // DATA + EVENT INFRA, 04 // OBSERVABILITY.\nInclude Client Apps, API Gateway, Auth / Policy, three services, Event Router, Postgres, Redis Cache, Warehouse, and Metrics / Traces.\nUse blueprint grid, cyan strokes, and a bottom-right title block.\n```\n\n### Style 4 — Notion Clean\n```text\nDraw an agent memory types diagram in style 4 (Notion Clean).\nCompare Sensory Memory, Working Memory, Episodic Memory, Semantic Memory, and Procedural Memory around a central Agent core.\nUse a minimal white layout, neutral borders, one accent color for arrows, and short storage tags for each memory type.\n```\n\n### Style 5 — Glassmorphism\n```text\nDraw a multi-agent collaboration diagram in style 5 (Glassmorphism).\nUse three sections: Mission Control, Specialist Agents, and Synthesis.\nInclude User brief, Coordinator Agent, Research Agent, Coding Agent, Review Agent, Shared Memory, Synthesis Engine, and Final response.\nUse frosted cards, soft glow, and semantic arrows for delegation, shared memory writes, and synthesis output.\n```\n\n### Style 6 — Claude Official\n```text\nDraw a system architecture diagram in style 6 (Claude Official).\nUse left-side layer labels: Interface Layer, Core Layer, Foundation Layer.\nInclude Client Surface, Gateway, Task Planner, Model Runtime, Policy Guardrails, Memory Store, Tool Runtime, Observability, and Registry.\nUse warm cream background, restrained brand-like palette, generous whitespace, and a bottom-right legend.\n```\n\n### Style 7 — OpenAI Official\n```text\nDraw an API integration flow diagram in style 7 (OpenAI Official).\nUse three sections: Entry, Model + Tools, and Delivery.\nInclude Application, OpenAI SDK Layer, Prompt Builder, Model Runtime, Tool Calls, Response Formatter, Observability, and Release Control.\nKeep the look minimal, white, precise, and modern with clean green-accented arrows.\n```\n\n---\n\n## Features\n\n- **7 visual styles** — from clean white docs to dark neon to frosted glass to official brand styles\n- **Executable style system** — style guides are encoded into the generator, not only documented in markdown\n- **14 diagram types** — Full UML support (Class, Component, Deployment, Package, Composite Structure, Object, Use Case, Activity, State Machine, Sequence, Communication, Timing, Interaction Overview, ER Diagram) plus AI/Agent domain diagrams\n- **AI/Agent domain patterns** — RAG, Agentic Search, Mem0, Multi-Agent, Tool Call, and more built-in\n- **Semantic shape vocabulary** — LLM = double-border rect, Agent = hexagon, Vector Store = ringed cylinder\n- **Semantic arrow system** — color + dash pattern encode meaning (write vs read vs async vs loop)\n- **Product icons** — 40+ products with brand colors: OpenAI, Anthropic, Pinecone, Weaviate, Kafka, PostgreSQL…\n- **Swim lane grouping** — automatic layer labeling for complex architectures\n- **SVG + PNG output** — SVG for editing, 1920px PNG for embedding\n- **rsvg-convert compatible** — no external font fetching, pure inline SVG\n\n---\n\n## Installation\n\n```bash\nnpx skills add yizhiyanhua-ai/fireworks-tech-graph\n```\n\nThis skill is installed from the GitHub repository. The npm package page is the public package/distribution page:\n\n```text\nhttps://www.npmjs.com/package/@yizhiyanhua-ai/fireworks-tech-graph\n```\n\nDo not use the npm package name with `skills add`, because the CLI resolves install sources as GitHub/local paths.\n\n## Update\n\n```bash\nnpx skills add yizhiyanhua-ai/fireworks-tech-graph --force -g -y\n```\n\nRe-run `add --force` to pull the latest version of this skill.\n\nOr clone directly:\n\n```bash\ngit clone https://github.com/yizhiyanhua-ai/fireworks-tech-graph.git ~/.claude/skills/fireworks-tech-graph\n```\n\n---\n\n## Requirements\n\n```bash\n# macOS\nbrew install librsvg\n\n# Ubuntu/Debian\nsudo apt install librsvg2-bin\n\n# Verify\nrsvg-convert --version\n```\n\n---\n\n## Why Not Mermaid or draw.io?\n\n| | Mermaid | draw.io | **fireworks-tech-graph** |\n|--|---------|---------|--------------------------|\n| Natural language input | ✗ | ✗ | ✅ |\n| AI/Agent domain patterns | ✗ | ✗ | ✅ |\n| Multiple visual styles | ✗ | manual | ✅ 5 built-in |\n| High-res PNG export | ✗ | manual | ✅ auto 1920px |\n| Semantic arrow colors | ✗ | manual | ✅ auto |\n| No online tool needed | ✅ | ✗ | ✅ |\n\nMermaid is great for quick inline diagrams in markdown. draw.io is great for manual polishing. `fireworks-tech-graph` is optimized for **describing a system and getting a polished diagram immediately**, without writing DSL syntax or clicking around a GUI.\n\n---\n\n## Usage\n\n### Trigger phrases\n\nThe skill auto-triggers on:\n\n```\ngenerate diagram / draw diagram / create chart / visualize\narchitecture diagram / flowchart / sequence diagram / data flow\n```\n\n### Basic usage\n\n```\nDraw a RAG pipeline flowchart\n```\n\n```\nGenerate an Agentic Search architecture diagram\n```\n\n### Specify style\n\n```\nDraw a microservices architecture diagram, style 2 (dark terminal)\n```\n\n```\nDraw a multi-agent collaboration diagram --style glassmorphism\n```\n\n### Specify output path\n\n```\nGenerate a Mem0 architecture diagram, output to ~/Desktop/\n```\n\n```\nCreate a tool call flow diagram --output /tmp/diagrams/\n```\n\n---\n\n## Example Prompts by Scenario\n\n### AI/Agent Systems\n\n```\nCompare Agentic RAG vs standard RAG in a feature matrix, Notion clean style\n```\n→ Comparison matrix: RAG vs Agentic RAG, covering retrieval strategy, agent loop, tool use\n\n```\nGenerate a Mem0 memory architecture diagram with vector store, graph DB, KV store, and memory manager\n```\n→ Memory Architecture with swim lanes: Input → Memory Manager → Storage tiers → Retrieval\n\n```\nDraw a Multi-Agent diagram: Orchestrator dispatches 3 SubAgents (search / compute / code execution), results aggregated\n```\n→ Agent Architecture with hexagons, tool layers, and result aggregation\n\n```\nVisualize the Tool Call execution flow: LLM → Tool Selector → Execution → Parser → back to LLM\n```\n→ Flowchart with decision loop showing tool invocation cycle\n\n```\nDraw the 5 agent memory types: Sensory, Working, Episodic, Semantic, Procedural\n```\n→ Mind map or layered architecture showing memory tiers from sensory to procedural\n\n### Infrastructure & Cloud\n\n```\nDraw a microservices architecture: Client → API Gateway → [User Service / Order Service / Payment Service] → PostgreSQL + Redis\n```\n→ Architecture diagram with horizontal layers, swim lanes per service cluster\n\n```\nGenerate a data pipeline diagram: Kafka → Spark processing → write to S3 → Athena query\n```\n→ Data flow diagram with labeled arrows (stream / batch / query)\n\n```\nDraw a Kubernetes deployment: Ingress → Service → [Pod × 3] → ConfigMap + PersistentVolume\n```\n→ Architecture with dashed containers per namespace, solid arrows for traffic flow\n\n### API & Sequence Flows\n\n```\nDraw an OAuth2 authorization code flow sequence diagram: User → Client → Auth Server → Resource Server\n```\n→ Sequence diagram with vertical lifelines and activation boxes\n\n```\nDraw the ChatGPT Plugin call sequence diagram\n```\n→ Sequence: User → ChatGPT → Plugin Manifest → API → Response chain\n\n### Decision & Process Flows\n\n```\nDraw a pre-launch QA flowchart for an AI app: Code Review → Security Scan → Performance Test → Manual Approval → Deploy\n```\n→ Flowchart with diamond decision nodes and parallel branches\n\n```\nGenerate a feature comparison matrix: RAG vs Fine-tuning vs Prompt Engineering\n```\n→ Comparison matrix with checked/unchecked cells across cost, latency, accuracy, flexibility\n\n### Concept Maps\n\n```\nVisualize the LLM application tech stack: from foundation model to SDK to app framework to deployment\n```\n→ Layered architecture or mind map from model layer to product layer\n\n```\nDraw an AI Agent capability map: Perception / Memory / Reasoning / Action / Learning\n```\n→ Mind map with central \"AI Agent\" node and 5 radial branches\n\n---\n\n## Styles\n\n| # | Name | Background | Font | Best For |\n|---|------|-----------|------|----------|\n| 1 | **Flat Icon** *(default)* | `#ffffff` | Helvetica | Blogs, slides, docs |\n| 2 | **Dark Terminal** | `#0f0f1a` | SF Mono / Fira Code | GitHub README, dev articles |\n| 3 | **Blueprint** | `#0a1628` | Courier New | Architecture docs, engineering |\n| 4 | **Notion Clean** | `#ffffff` | system-ui | Notion, Confluence, wikis |\n| 5 | **Glassmorphism** | `#0d1117` gradient | Inter | Product sites, keynotes |\n| 6 | **Claude Official** | `#f8f6f3` | system-ui | Anthropic-style diagrams, warm aesthetic |\n| 7 | **OpenAI Official** | `#ffffff` | system-ui | OpenAI-style diagrams, clean modern look |\n\nEach style has a dedicated reference file in `references/` with exact color tokens, SVG patterns, and templates.\nThe generator also consumes style-aware structure fields such as `containers`, semantic `nodes[].kind`, `arrows[].flow`, and explicit port anchors so sample-grade layouts can be reproduced more consistently.\n\nUseful high-leverage fields for style-specific polish:\n- `style_overrides` to nudge title alignment or palette tokens without forking a full style\n- `containers[].header_prefix` / `containers[].header_text` for blueprint-style numbered section headers such as `01 // EDGE`\n- `containers[].side_label` for Claude-style left layer labels\n- `window_controls`, `meta_left`, `meta_center`, `meta_right` for terminal / document chrome\n- `blueprint_title_block` for engineering title boxes in style 3\n\n### Style Selection Guide\n\n**For UML Diagrams:**\n- **Class/Component/Package**: Style 1 (Flat Icon) or Style 4 (Notion Clean) — clear structure, easy to read\n- **Sequence/Timing**: Style 2 (Dark Terminal) — monospace fonts help with alignment\n- **State Machine/Activity**: Style 3 (Blueprint) — engineering aesthetic fits process flows\n- **Use Case/Interview**: Style 1 (Flat Icon) — colorful, accessible\n\n**For AI/Agent Diagrams:**\n- **RAG/Agentic Search**: Style 2 (Dark Terminal) or Style 5 (Glassmorphism) — tech-forward aesthetic\n- **Memory Architecture**: Style 3 (Blueprint) — emphasizes layered storage tiers\n- **Multi-Agent**: Style 5 (Glassmorphism) — frosted cards distinguish agent boundaries\n\n**For Documentation:**\n- **Internal docs**: Style 4 (Notion Clean) — minimal, wiki-friendly\n- **Blog posts**: Style 1 (Flat Icon) — colorful, engaging\n- **GitHub README**: Style 2 (Dark Terminal) — matches dark theme\n- **Presentations**: Style 5 (Glassmorphism) or Style 6 (Claude Official) — polished\n\n**Brand-Specific:**\n- **Anthropic/Claude projects**: Style 6 (Claude Official) — warm cream background, brand colors\n- **OpenAI projects**: Style 7 (OpenAI Official) — clean white, OpenAI palette\n\n---\n\n## Diagram Types\n\n| Type | Description | Key Layout Rule |\n|------|-------------|-----------------|\n| **Architecture** | Services, components, cloud infra | Horizontal layers top→bottom |\n| **Data Flow** | What data moves where | Label every arrow with data type |\n| **Flowchart** | Decisions, process steps | Diamond = decision, top→bottom |\n| **Agent Architecture** | LLM + tools + memory | 5-layer model: Input/Agent/Memory/Tool/Output |\n| **Memory Architecture** | Mem0, MemGPT-style | Separate read/write paths, memory tiers |\n| **Sequence** | API call chains, time-ordered | Vertical lifelines, horizontal messages |\n| **Comparison** | Feature matrix, side-by-side | Column = system, row = attribute |\n| **Mind Map** | Concept maps, radial | Central node, bezier branches |\n\n### UML Diagram Support (14 Types)\n\n| UML Type | Description | Best Style |\n|----------|-------------|------------|\n| **Class Diagram** | Classes, attributes, methods, relationships | Style 1, 4 |\n| **Component Diagram** | Software components and dependencies | Style 1, 3 |\n| **Deployment Diagram** | Hardware nodes and software deployment | Style 3 |\n| **Package Diagram** | Package organization and dependencies | Style 1, 4 |\n| **Composite Structure** | Internal structure of classes/components | Style 1, 3 |\n| **Object Diagram** | Object instances and relationships | Style 1, 4 |\n| **Use Case Diagram** | Actors, use cases, system boundaries | Style 1 |\n| **Activity Diagram** | Workflows, parallel processes | Style 3 |\n| **State Machine** | State transitions and events | Style 2, 3 |\n| **Sequence Diagram** | Message exchanges over time | Style 2 |\n| **Communication Diagram** | Object interactions and messages | Style 1, 2 |\n| **Timing Diagram** | State changes over time | Style 2 |\n| **Interaction Overview** | High-level interaction flow | Style 1, 2 |\n| **ER Diagram** | Entity-relationship data models | Style 1, 3 |\n\n---\n\n## AI/Agent Domain Patterns\n\nBuilt-in pattern knowledge:\n\n```\nRAG Pipeline         → Query → Embed → VectorSearch → Retrieve → LLM → Response\nAgentic RAG          → adds Agent loop + Tool use\nAgentic Search       → Query → Planner → [Search/Calc/Code] → Synthesizer\nMem0 Memory Layer    → Input → Memory Manager → [VectorDB + GraphDB] → Context\nAgent Memory Types   → Sensory → Working → Episodic → Semantic → Procedural\nMulti-Agent          → Orchestrator → [SubAgent×N] → Aggregator → Output\nTool Call Flow       → LLM → Tool Selector → Execution → Parser → LLM (loop)\n```\n\n---\n\n## Shape Vocabulary\n\nShapes encode semantic meaning consistently across all styles:\n\n| Concept | Shape |\n|---------|-------|\n| User / Human | Circle + body |\n| LLM / Model | Rounded rect, double border, ⚡ |\n| Agent / Orchestrator | Hexagon |\n| Memory (short-term) | Dashed-border rounded rect |\n| Memory (long-term) | Solid cylinder |\n| Vector Store | Cylinder with inner rings |\n| Graph DB | 3-circle cluster |\n| Tool / Function | Rect with ⚙ |\n| API / Gateway | Hexagon (single border) |\n| Queue / Stream | Horizontal pipe/tube |\n| Document / File | Folded-corner rect |\n| Browser / UI | Rect with 3-dot titlebar |\n| Decision | Diamond |\n| External Service | Dashed-border rect |\n\n---\n\n## Arrow Semantics\n\n| Flow Type | Stroke | Dash | Meaning |\n|-----------|--------|------|---------|\n| Primary data flow | 2px solid | — | Main request/response |\n| Control / trigger | 1.5px solid | — | System A triggers B |\n| Memory read | 1.5px solid | — | Retrieve from store |\n| Memory write | 1.5px | `5,3` | Write/store operation |\n| Async / event | 1.5px | `4,2` | Non-blocking |\n| Feedback / loop | 1.5px curved | — | Iterative reasoning |\n\n---\n\n## File Structure\n\n```\nfireworks-tech-graph/\n├── SKILL.md                      # Main skill — diagram types, layout rules, shape vocab\n├── README.md                     # This file (English)\n├── README.zh.md                  # Chinese version\n├── references/\n│   ├── style-1-flat-icon.md      # White background, colored accents\n│   ├── style-2-dark-terminal.md  # Dark bg, neon accents, monospace\n│   ├── style-3-blueprint.md      # Blueprint grid, cyan lines\n│   ├── style-4-notion-clean.md   # Minimal, white, single arrow color\n│   ├── style-5-glassmorphism.md  # Dark gradient, frosted glass cards\n│   ├── style-6-claude-official.md # Warm cream background, Anthropic brand\n│   ├── style-7-openai.md      # Clean white, OpenAI brand palette\n│   └── icons.md                  # 40+ product icons + semantic shapes\n├── agents/\n│   └── openai.yaml              # A
