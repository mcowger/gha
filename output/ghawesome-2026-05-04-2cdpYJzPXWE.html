provides ready-to-use DESIGN.md files** extracted from real websites. \n\n## Request a DESIGN.md\n\nYou can [request a DESIGN.md](https://getdesign.md/request) for specific website, including private requests delivered exclusively to you.\n\n## Sponsors ❤️\n\nBecome a Sponsor [1M+ view] — your logo here and get listed on [getdesign.md](https://getdesign.md/)\n\n## Collection\n\n### AI & LLM Platforms\n\n- [**Claude**](https://getdesign.md/claude/design-md) - Anthropic's AI assistant. Warm terracotta accent, clean editorial layout\n- [**Cohere**](https://getdesign.md/cohere/design-md) - Enterprise AI platform. Vibrant gradients, data-rich dashboard aesthetic\n- [**ElevenLabs**](https://getdesign.md/elevenlabs/design-md) - AI voice platform. Dark cinematic UI, audio-waveform aesthetics\n- [**Minimax**](https://getdesign.md/minimax/design-md) - AI model provider. Bold dark interface with neon accents\n- [**Mistral AI**](https://getdesign.md/mistral.ai/design-md) - Open-weight LLM provider. French-engineered minimalism, purple-toned\n- [**Ollama**](https://getdesign.md/ollama/design-md) - Run LLMs locally. Terminal-first, monochrome simplicity\n- [**OpenCode AI**](https://getdesign.md/opencode.ai/design-md) - AI coding platform. Developer-centric dark theme\n- [**Replicate**](https://getdesign.md/replicate/design-md) - Run ML models via API. Clean white canvas, code-forward\n- [**RunwayML**](https://getdesign.md/runwayml/design-md) - AI video generation. Cinematic dark UI, media-rich layout\n- [**Together AI**](https://getdesign.md/together.ai/design-md) - Open-source AI infrastructure. Technical, blueprint-style design\n- [**VoltAgent**](https://getdesign.md/voltagent/design-md) - AI agent framework. Void-black canvas, emerald accent, terminal-native\n- [**xAI**](https://getdesign.md/x.ai/design-md) - Elon Musk's AI lab. Stark monochrome, futuristic minimalism\n\n### Developer Tools & IDEs\n\n- [**Cursor**](https://getdesign.md/cursor/design-md) - AI-first code editor. Sleek dark interface, gradient accents\n- [**Expo**](https://getdesign.md/expo/design-md) - React Native platform. Dark theme, tight letter-spacing, code-centric\n- [**Lovable**](https://getdesign.md/lovable/design-md) - AI full-stack builder. Playful gradients, friendly dev aesthetic\n- [**Raycast**](https://getdesign.md/raycast/design-md) - Productivity launcher. Sleek dark chrome, vibrant gradient accents\n- [**Superhuman**](https://getdesign.md/superhuman/design-md) - Fast email client. Premium dark UI, keyboard-first, purple glow\n- [**Vercel**](https://getdesign.md/vercel/design-md) - Frontend deployment platform. Black and white precision, Geist font\n- [**Warp**](https://getdesign.md/warp/design-md) - Modern terminal. Dark IDE-like interface, block-based command UI\n\n### Backend, Database & DevOps\n\n- [**ClickHouse**](https://getdesign.md/clickhouse/design-md) - Fast analytics database. Yellow-accented, technical documentation style\n- [**Composio**](https://getdesign.md/composio/design-md) - Tool integration platform. Modern dark with colorful integration icons\n- [**HashiCorp**](https://getdesign.md/hashicorp/design-md) - Infrastructure automation. Enterprise-clean, black and white\n- [**MongoDB**](https://getdesign.md/mongodb/design-md) - Document database. Green leaf branding, developer documentation focus\n- [**PostHog**](https://getdesign.md/posthog/design-md) - Product analytics. Playful hedgehog branding, developer-friendly dark UI\n- [**Sanity**](https://getdesign.md/sanity/design-md) - Headless CMS. Red accent, content-first editorial layout\n- [**Sentry**](https://getdesign.md/sentry/design-md) - Error monitoring. Dark dashboard, data-dense, pink-purple accent\n- [**Supabase**](https://getdesign.md/supabase/design-md) - Open-source Firebase alternative. Dark emerald theme, code-first\n\n### Productivity & SaaS\n\n- [**Cal.com**](https://getdesign.md/cal/design-md) - Open-source scheduling. Clean neutral UI, developer-oriented simplicity\n- [**I re | Mood, density, design philosophy |\n| 2 | Color Palette & Roles | Semantic name + hex + functional role |\n| 3 | Typography Rules | Font families, full hierarchy table |\n| 4 | Component Stylings | Buttons, cards, inputs, navigation with states |\n| 5 | Layout Principles | Spacing scale, grid, whitespace philosophy |\n| 6 | Depth & Elevation | Shadow system, surface hierarchy |\n| 7 | Do's and Don'ts | Design guardrails and anti-patterns |\n| 8 | Responsive Behavior | Breakpoints, touch targets, collapsing strategy |\n| 9 | Agent Prompt Guide | Quick color reference, ready-to-use prompts |\n\nEach site includes:\n\n| File | Purpose |\n|------|---------|\n| `DESIGN.md` | The design system (what agents read) |\n| `preview.html` | Visual catalog showing color swatches, type scale, buttons, cards |\n| `preview-dark.html` | Same catalog with dark surfaces |\n\n### How to Use\n\n\n1. Copy a site's `DESIGN.md` into your project root\n2. Tell your AI agent to use it.\n\n\n## Contributing\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for guidelines.\n\n- **Improve existing files**: Fix wrong colors, missing tokens, weak descriptions\n- **Report issues**: Let us know if something looks off\n\nBefore opening a PR, please [open an issue](https://github.com/VoltAgent/awesome-design-md/issues) first to discuss your idea and get feedback from maintainers.\n\n\n## License\n\nMIT License - see [LICENSE](LICENSE)\n\nThis repository is a curated collection of design system documents extracted from public websites. All DESIGN.md files are provided \"as is\" without warranty. The extracted design tokens represent publicly visible CSS values. We do not claim ownership of any site's visual identity. These documents exist to help AI agents generate consistent UI.\n","summary":"**Awesome DESIGN.md** curates a library of Design System documents (DESIGN.md files) sourced from real websites, allowing developers to copy a plain‑text design specification into their project and instruct AI agents—such as Google Stitch—to produce pixel‑perfect UIs that adhere to those specifications. The repository houses 71 ready‑to‑use files, grouped by AI and LLM platforms, developer tools, and more, providing instant visual and structural guidance without the need for Figma exports or complex schemas. By leveraging the Markdown format that large language models naturally read, any coding or design agent can instantly understand how a page should look, streamlining prototype creation and reducing design handoff time. This resource benefits AI‑centric developers, product designers, and teams who want rapid, consistent UI generation directly from text specifications.","description":"A collection of DESIGN.md files inspired by popular brand design systems. Drop one into your project and let coding agents generate a matching UI.","stars":70862,"language":null},{"owner":"JuliusBrussee","repo":"caveman","url":"https://github.com/JuliusBrussee/caveman","readme":"<p align=\"center\">\n  <img src=\"https://em-content.zobj.net/source/apple/391/rock_1faa8.png\" width=\"120\" />\n</p>\n\n<h1 align=\"center\">caveman</h1>\n\n<p align=\"center\">\n  <strong>why use many token when few do trick</strong>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/JuliusBrussee/caveman/stargazers\"><img src=\"https://img.shields.io/github/stars/JuliusBrussee/caveman?style=flat&color=yellow\" alt=\"Stars\"></a>\n  <a href=\"https://github.com/JuliusBrussee/caveman/commits/main\"><img src=\"https://img.shields.io/github/last-commit/JuliusBrussee/caveman?style=flat\" alt=\"Last Commit\"></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/github/license/JuliusBrussee/caveman?style=flat\" alt=\"License\"></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"#before--after\">Before/After</a> •\n  <a href=\"#install\">Install</a> •\n  <a href=\"#intensity-levels\">Levels</a> •\n  <a href=\"#caveman-skills\">Skills</a> •\n  <a href=\"#benchmarks\">Benchmarks</a> •\n  <a href=\"#evals\">Evals</a>\n</p>\n\n<p align=\"center\">\n  <strong>🪨 Caveman Ecosystem</strong> &nbsp;·&nbsp;\n  <strong>caveman</strong> <em>talk less</em> <sub>(you are here)</sub> &nbsp;·&nbsp;\n  <a href=\"https://github.com/JuliusBrussee/cavemem\">cavemem</a> <em>remember more</em> &nbsp;·&nbsp;\n  <a href=\"https://github.com/JuliusBrussee/cavekit\">cavekit</a> <em>build better</em>\n</p>\n\n---\n\nA [Claude Code](https://docs.anthropic.com/en/docs/claude-code) skill/plugin and Codex plugin that makes agent talk like caveman — cutting **~75% of output tokens** while keeping full technical accuracy. Now with [文言文 mode](#文言文-wenyan-mode), [terse commits / one-line reviews / lifetime stats](#caveman-skills), and a [compression tool](#caveman-compress-receipts) that cuts **~46% of input tokens** every session.\n\nBased on the viral observation that caveman-speak dramatically reduces LLM token usage without losing technical substance. So we made it a one-line install.\n\n## Before / After\n\n<table>\n<tr>\n<td width=\"50%\">\n\n### 🗣️ Normal Claude (69 tokens)\n\n> \"The reason your React component is re-rendering is likely because you're creating a new object reference on each render cycle. When you pass an inline object as a prop, React's shallow comparison sees it as a different object every time, which triggers a re-render. I'd recommend using useMemo to memoize the object.\"\n\n</td>\n<td width=\"50%\">\n\n### 🪨 Caveman Claude (19 tokens)\n\n> \"New object ref each render. Inline object prop = new ref = re-render. Wrap in `useMemo`.\"\n\n</td>\n</tr>\n<tr>\n<td>\n\n### 🗣️ Normal Claude\n\n> \"Sure! I'd be happy to help you with that. The issue you're experiencing is most likely caused by your authentication middleware not properly validating the token expiry. Let me take a look and suggest a fix.\"\n\n</td>\n<td>\n\n### 🪨 Caveman Claude\n\n> \"Bug in auth middleware. Token expiry check use `<` not `<=`. Fix:\"\n\n</td>\n</tr>\n</table>\n\n**Same fix. 75% less word. Brain still big.**\n\n**Pick your level of grunt:**\n\n<table>\n<tr>\n<td width=\"25%\">\n\n#### 🪶 Lite\n\n> \"Your component re-renders because you create a new object reference each render. Inline object props fail shallow comparison every time. Wrap it in `useMemo`.\"\n\n</td>\n<td width=\"25%\">\n\n#### 🪨 Full\n\n> \"New object ref each render. Inline object prop = new ref = re-render. Wrap in `useMemo`.\"\n\n</td>\n<td width=\"25%\">\n\n#### 🔥 Ultra\n\n> \"Inline obj prop → new ref → re-render. `useMemo`.\"\n\n</td>\n<td width=\"25%\">\n\n#### 📜 文言文\n\n> \"物出新參照，致重繪。useMemo Wrap之。\"\n\n</td>\n</tr>\n</table>\n\n**Same answer. You pick how many word.**\n\n```\n┌─────────────────────────────────────┐\n│  TOKENS SAVED          ████████ 75% │\n│  TECHNICAL ACCURACY    ████████ 100%│\n│  SPEED INCREASE        ████████ ~3x │\n│  VIBES                 ████████ OOG │\n└─────────────────────────────────────┘\n```\n\n- **Faster response** — less token to generate = speed go brrr\n- **Easier to read** — no wall of text, just answer\n- **Same accuracy** — all technical info kept, only fluff dropped ([science say so](https://arxiv.org/abs/2604.00025))\n- **Save money** — 65% mean output reduction across [our benchmarks](#benchmarks) (range 22-87%)\n- **Fun** — every code review become comedy\n\n## Install\n\n**One line. Detect every agent. Install for each.**\n\n```bash\n# macOS / Linux / WSL / Git Bash\ncurl -fsSL https://raw.githubusercontent.com/JuliusBrussee/caveman/main/install.sh | bash\n\n# Windows (PowerShell)\nirm https://raw.githubusercontent.com/JuliusBrussee/caveman/main/install.ps1 | iex\n```\n\nDetects 30+ agents (Claude Code, Gemini CLI, Codex, Cursor, Windsurf, Cline, Copilot, Continue, Kilo, Roo, Augment, Aider Desk, Amp, Bob, Crush, Devin, Droid, ForgeCode, Goose, iFlow, JetBrains Junie, Kiro CLI, Mistral Vibe, OpenHands, opencode, Qwen Code, Qoder, Rovo Dev, Tabnine, Trae, Warp, Replit Agent, Antigravity, …). Runs each one's native install. Skips what you not have. Safe to re-run.\n\nBy default the installer wires Claude Code's hooks + statusline + stats badge and registers the [`caveman-shrink`](#caveman-shrink-mcp-middleware) MCP proxy on top of the plugin install. Pass `--minimal` to skip the extras and just install the plugin/extension. Pass `--all` to also drop per-repo rule files into the current directory.\n\n| Flag | What |\n|---|---|\n| `--all` | Plugin + hooks + statusline + MCP shrink + per-repo rule files in `$PWD`. The full ride. |\n| `--minimal` | Plugin/extension only. No hooks, no MCP shrink, no per-repo rules. |\n| `--dry-run` | Preview, write nothing |\n| `--only <agent>` | One target only (repeatable) |\n| `--with-hooks` | Claude Code: also wire standalone hooks + statusline + stats badge. **On by default.** |\n| `--with-mcp-shrink` | Claude Code: register the [caveman-shrink](#caveman-shrink-mcp-middleware) MCP proxy via `npx caveman-shrink`. **On by default.** |\n| `--with-init` | Drop always-on rule files into the current repo (Cursor / Windsurf / Cline / Copilot / AGENTS.md). Off by default; turned on by `--all`. |\n| `--list` | Print full agent matrix and exit |\n| `--force` | Re-run even if already installed |\n\n`install.sh --help` for full reference.\n\n**Manual install per agent:**\n\n| Agent | Command |\n|---|---|\n| **Claude Code** | `claude plugin marketplace add JuliusBrussee/caveman && claude plugin install caveman@caveman` |\n| **Gemini CLI** | `gemini extensions install https://github.com/JuliusBrussee/caveman` |\n| **Cursor / Windsurf / Cline / Copilot** | `npx skills add JuliusBrussee/caveman -a <cursor\\|windsurf\\|cline\\|github-copilot>` |\n| **Codex / opencode / Roo / Amp / Goose / Kiro / Augment / Aider Desk / Continue / Kilo / Junie / Trae / Warp / Tabnine / Mistral / Qwen / Devin / Droid / ForgeCode / Bob / Crush / iFlow / OpenHands / Qoder / Rovo Dev / Replit / Antigravity** | `npx skills add JuliusBrussee/caveman -a <profile>` (see `install.sh --list` for the full slug list) |\n| **Anything else (40+ agents)** | `npx skills add JuliusBrussee/caveman` (auto-detect) |\n\nStandalone Claude Code hooks (without plugin): `bash <(curl -s https://raw.githubusercontent.com/JuliusBrussee/caveman/main/hooks/install.sh)`. Windows: `irm https://raw.githubusercontent.com/JuliusBrussee/caveman/main/hooks/install.ps1 | iex`. Manual fallback for stubborn Windows envs lives in [`docs/install-windows.md`](docs/install-windows.md).\n\nUninstall: disable the Claude plugin, `gemini extensions uninstall caveman`, or `npx skills remove caveman`.\n\n### What You Get\n\n| Feature | Claude Code | Codex | Gemini CLI | Cursor / Windsurf | Cline / Copilot | Others* |\n|---|:-:|:-:|:-:|:-:|:-:|:-:|\n| Caveman mode | Y | Y | Y | Y | Y | Y |\n| Auto-activate every session | Y | Y¹ | Y | with `--with-init` | with `--with-init` | with `--with-init` |\n| `/caveman` command | Y | Y¹ | Y | — | — | — |\n| Mode switching (lite/full/ultra) | Y | Y¹ | Y | Y² | — | — |\n| Statusline badge | Y | — | — | — | — | — |\n| caveman-commit / caveman-review | Y | — | Y | Y | Y | Y |\n| caveman-compress / caveman-help | Y | Y³ | Y | Y | Y | Y |\n| caveman-stats | Y | — | — | — | — | — |\n| cavecrew (subagents) | Y | — | — | — | — | — |\n\n\\* opencode, Roo, Amp, Goose, Kiro CLI, Augment, Aider Desk, Continue, Kilo, Junie (JetBrains), Trae, Warp, Tabnine, Mistral, Qwen, Devin, Droid, ForgeCode, Bob, Crush, iFlow, OpenHands, Qoder, Rovo Dev, Replit, Antigravity, and more via `npx skills`. AGENTS.md / IDE rule files reach Zed, generic agents, etc. via `--with-init`.\n¹ Codex uses `$caveman` instead of `/caveman`. Auto-start ships when you run Codex inside this repo (via `.codex/hooks.json`); for other repos, copy the hook or use `$caveman` manually. ² Mode switching is on-demand via the skill, no slash command. ³ Compress only.\n\n`--with-init` writes `.cursor/rules/caveman.mdc`, `.windsurf/rules/caveman.md`, `.clinerules/caveman.md`, `.github/copilot-instructions.md`, and `AGENTS.md` into the current repo so caveman auto-starts there.\n\n## Usage\n\nTrigger with:\n- `/caveman` or Codex `$caveman`\n- \"talk like caveman\"\n- \"caveman mode\"\n- \"less tokens please\"\n\nStop with: \"stop caveman\" or \"normal mode\"\n\n### Intensity Levels\n\n| Level | Trigger | What it do |\n|-------|---------|------------|\n| **Lite** | `/caveman lite` | Drop filler, keep grammar. Professional but no fluff |\n| **Full** | `/caveman full` | Default caveman. Drop articles, fragments, full grunt |\n| **Ultra** | `/caveman ultra` | Maximum compression. Telegraphic. Abbreviate everything |\n\n### 文言文 (Wenyan) Mode\n\nClassical Chinese literary compression — same technical accuracy, but in the most token-efficient written language humans ever invented.\n\n| Level | Trigger | What it do |\n|-------|---------|------------|\n| **Wenyan-Lite** | `/caveman wenyan-lite` | Semi-classical. Grammar intact, filler gone |\n| **Wenyan-Full** | `/caveman wenyan` | Full 文言文. Maximum classical terseness |\n| **Wenyan-Ultra** | `/caveman wenyan-ultra` | Extreme. Ancient scholar on a budget |\n\nLevel stick until you change it or session end.\n\n## Caveman Skills\n\n| Skill | What |\n|---|---|\n| `/caveman-commit` | Terse commit messages. Conventional Commits, ≤50 char subject. Why over what. |\n| `/caveman-review` | One-line PR comments: `L42: 🔴 bug: user null. Add guard.` No throat-clearing. |\n| `/caveman-help` | Quick-reference card. All modes, skills, commands. |\n| `/caveman-stats` | Real session token usage + estimated savings + USD. Lifetime aggregation via `--all`, time window via `--since 7d`, tweetable line via `--share`. Reads the Claude Code session JSONL directly, no model-side guessing. Claude Code only. |\n| `/caveman:compress <file>` | Rewrites a memory file (e.g. `CLAUDE.md`) into caveman-speak. Saves backup as `<file>.original.md`. Cuts ~46% of *input* tokens every session start. Code/URLs/paths preserved byte-for-byte. |\n| `cavecrew-investigator/builder/reviewer` | Caveman subagents for Claude Code. Subagent tool-output gets injected back into main context — these emit ~60% fewer tokens than vanilla `Explore` / reviewer agents, so main context lasts longer across long sessions. Investigator (read-only locator, haiku), builder (1-2 file surgical edit, refuses 3+), reviewer (one-line findings, haiku). |\n\n**Statusline savings badge** — on by default. After your first `/caveman-stats` run the statusline appends `[CAVEMAN] ⛏ 12.4k` (lifetime tokens saved) and updates every time `/caveman-stats` runs. Don't want it? Set `CAVEMAN_STATUSLINE_SAVINGS=0` to silence.\n\n### caveman-compress receipts\n\n| File | Original | Compressed | Saved |\n|---|---:|---:|---:|\n| `claude-md-preferences.md` | 706 | 285 | **59.6%** |\n| `project-notes.md` | 1145 | 535 | **53.3%** |\n| `claude-md-project.md` | 1122 | 636 | **43.3%** |\n| `todo-list.md` | 627 | 388 | **38.1%** |\n| `mixed-with-code.md` | 888 | 560 | **36.9%** |\n| **Average** | **898** | **481** | **46%** |\n\nFull docs: [caveman-compress README](caveman-compress/README.md). [Snyk false-positive note](./caveman-compress/SECURITY.md).\n\n## caveman-shrink (MCP middleware)\n\nStdio proxy that wraps any MCP server, intercepts `tools/list` / `prompts/list` / `resources/list` responses, and compresses the `description` fields. Code, URLs, paths, identifiers stay byte-for-byte identical.\n\n```jsonc\n{\n  \"mcpServers\": {\n    \"fs-shrunk\": {\n      \"command\": \"npx\",\n      \"args\": [\"caveman-shrink\", \"npx\", \"@modelcontextprotocol/server-filesystem\", \"/path/to/dir\"]\n    }\n  }\n}\n```\n\nPublished on npm as [`caveman-shrink`](https://www.npmjs.com/package/caveman-shrink). V1 does not touch tool-call response bodies or request payloads. Auto-registered by `install.sh` (use `--minimal` to skip). Full docs: [`mcp-servers/caveman-shrink/`](mcp-servers/caveman-shrink).\n\n## Benchmarks\n\nReal token counts from the Claude API ([reproduce it yourself](benchmarks/)):\n\n<!-- BENCHMARK-TABLE-START -->\n| Task | Normal (tokens) | Caveman (tokens) | Saved |\n|------|---------------:|----------------:|------:|\n| Explain React re-render bug | 1180 | 159 | 87% |\n| Fix auth middleware token expiry | 704 | 121 | 83% |\n| Set up PostgreSQL connection pool | 2347 | 380 | 84% |\n| Explain git rebase vs merge | 702 | 292 | 58% |\n| Refactor callback to async/await | 387 | 301 | 22% |\n| Architecture: microservices vs monolith | 446 | 310 | 30% |\n| Review PR for security issues | 678 | 398 | 41% |\n| Docker multi-stage build | 1042 | 290 | 72% |\n| Debug PostgreSQL race condition | 1200 | 232 | 81% |\n| Implement React error boundary | 3454 | 456 | 87% |\n| **Average** | **1214** | **294** | **65%** |\n\n*Range: 22%–87% savings across prompts.*\n<!-- BENCHMARK-TABLE-END -->\n\n> [!IMPORTANT]\n> Caveman only affects output tokens — thinking/reasoning tokens are untouched. Caveman no make brain smaller. Caveman make *mouth* smaller. Biggest win is **readability and speed**, cost savings are a bonus.\n\nA March 2026 paper [\"Brevity Constraints Reverse Performance Hierarchies in Language Models\"](https://arxiv.org/abs/2604.00025) found that constraining large models to brief responses **improved accuracy by 26 percentage points** on certain benchmarks and completely reversed performance hierarchies. Verbose not always better. Sometimes less word = more correct.\n\n## Evals\n\nCaveman not just claim 75%. Caveman **prove** it.\n\nThe `evals/` directory has a three-arm eval harness that measures real token compression against a proper control — not just \"verbose vs skill\" but \"terse vs skill\". Because comparing caveman to verbose Claude conflate the skill with generic terseness. That cheating. Caveman not cheat.\n\n```bash\n# Run the eval (needs claude CLI)\nuv run python evals/llm_run.py\n\n# Read results (no API key, runs offline)\nuv run --with tiktoken python evals/measure.py\n```\n\n## Star This Repo\n\nIf caveman save you mass token, mass money — leave mass star. ⭐\n\n[![Star History Chart](https://api.star-history.com/svg?repos=JuliusBrussee/caveman&type=Date)](https://star-history.com/#JuliusBrussee/caveman&Date)\n\n## 🪨 The Caveman Ecosystem\n\nThree tools. One philosophy: **agent do more with less**.\n\n| Repo | What | One-liner |\n|------|------|-----------|\n| [**caveman**](https://github.com/JuliusBrussee/caveman) *(you are here)* | Output compression skill | *why use many token when few do trick* — ~75% fewer output tokens across Claude Code, Cursor, Gemini, Codex |\n| [**cavemem**](https://github.com/JuliusBrussee/cavemem) | Cross-agent persistent memory | *why agent forget when agent can remember* — compressed SQLite + MCP, local by default |\n| [**cavekit**](https://github.com/JuliusBrussee/cavekit) | Spec-driven autonomous build loop | *why agent guess when agent can know* — natural language → kits → parallel build → verified |\n\nThey compose: **cavekit** orchestrates the build, **caveman** compresses what the agent *says*, **cavemem** compresses what the agent *remembers*. Install one, some, or all — each stands alone.\n\n## Also by Julius Brussee\n\n- **[Revu](https://github.com/JuliusBrussee/revu-swift)** — local-first macOS study app with FSRS spaced repetition, decks, exams, and study guides. [revu.cards](https://revu.cards)\n\n## License\n\nMIT — free like mass mammoth on open plain.\n","summary":"**caveman** is a Claude Code (and Codex) skill that forces large‑language‑model responses to “talk like a caveman,” cutting token usage by roughly 75 % while preserving full technical accuracy. The tool offers multiple verbosity levels, a 文言文 (classical Chinese) mode, runtime input‑compression, and usage stats, all wired into a single‑line installation. Developers integrating LLMs into tooling, editors, or CI pipelines can use it to speed up responses, save bandwidth, and keep output concise without sacrificing correctness. Any user who values lean, quickly‑readable AI replies will benefit from this lightweight, high‑compression plugin.","description":"🪨 why use many token when few token do trick — Claude Code skill that cuts 65% of tokens by talking like caveman","stars":53666,"language":"Python"},{"owner":"santifer","repo":"career-ops","url":"https://github.com/santifer/career-ops","readme":"# Career-Ops\n\n[English](README.md) | [Español](README.es.md) | [Português (Brasil)](README.pt-BR.md) | [한국어](README.ko-KR.md) | [日本語](README.ja.md) | [Русский](README.ru.md) | [简体中文](README.cn.md) | [繁體中文](README.zh-TW.md)\n\n<p align=\"center\">\n  <a href=\"https://x.com/santifer\"><img src=\"docs/hero-banner.jpg\" alt=\"Career-Ops — Multi-Agent Job Search System\" width=\"800\"></a>\n</p>\n\n<p align=\"center\">\n  <em>I spent months applying to jobs the hard way. So I engineered the system I wish I had.</em><br>\n  Companies use AI to filter candidates. <strong>I just gave candidates AI to <em>choose</em> companies.</strong><br>\n  <em>Now it's open source.</em>\n</p>\n\n<p align=\"center\">\n  <img src=\"https://img.shields.io/badge/Claude_Code-000?style=flat&logo=anthropic&logoColor=white\" alt=\"Claude Code\">\n  <img src=\"https://img.shields.io/badge/OpenCode-111827?style=flat&logo=terminal&logoColor=white\" alt=\"OpenCode\">\n  <img src=\"https://img.shields.io/badge/Gemini_CLI-4285F4?style=flat&logo=google&logoColor=white\" alt=\"Gemini CLI\">\n  <img src=\"https://img.shields.io/badge/Codex_(soon)-6B7280?style=flat&logo=openai&logoColor=white\" alt=\"Codex\">\n  <img src=\"https://img.shields.io/badge/Node.js-339933?style=flat&logo=node.js&logoColor=white\" alt=\"Node.js\">\n  <img src=\"https://img.shields.io/badge/Go-00ADD8?style=flat&logo=go&logoColor=white\" alt=\"Go\">\n  <img src=\"https://img.shields.io/badge/Playwright-2EAD33?style=flat&logo=playwright&logoColor=white\" alt=\"Playwright\">\n  <img src=\"https://img.shields.io/badge/License-MIT-blue.svg\" alt=\"MIT\">\n  <a href=\"TRADEMARK.md\"><img src=\"https://img.shields.io/badge/Trademark-Policy-blue.svg\" alt=\"Trademark Policy\"></a>\n  <a href=\"https://discord.gg/8pRpHETxa4\"><img src=\"https://img.shields.io/badge/Discord-5865F2?style=flat&logo=discord&logoColor=white\" alt=\"Discord\"></a>\n  <br>\n  <img src=\"https://img.shields.io/badge/EN-blue?style=flat\" alt=\"EN\">\n  <img src=\"https://img.shields.io/badge/ES-red?style=flat\" alt=\"ES\">\n  <img src=\"https://img.shields.io/badge/DE-grey?style=flat\" alt=\"DE\">\n  <img src=\"https://img.shields.io/badge/FR-blue?style=flat\" alt=\"FR\">\n  <img src=\"https://img.shields.io/badge/PT--BR-green?style=flat\" alt=\"PT-BR\">\n  <img src=\"https://img.shields.io/badge/KO-white?style=flat\" alt=\"KO\">\n  <img src=\"https://img.shields.io/badge/JA-red?style=flat\" alt=\"JA\">\n  <img src=\"https://img.shields.io/badge/ZH--CN-red?style=flat\" alt=\"ZH-CN\">\n  <img src=\"https://img.shields.io/badge/ZH--TW-blue?style=flat\" alt=\"ZH-TW\">\n</p>\n\n---\n\n<p align=\"center\">\n  <img src=\"docs/demo.gif\" alt=\"Career-Ops Demo\" width=\"800\">\n</p>\n\n<p align=\"center\"><strong>740+ job listings evaluated · 100+ personalized CVs · 1 dream role landed</strong></p>\n\n<p align=\"center\"><a href=\"https://discord.gg/8pRpHETxa4\"><img src=\"https://img.shields.io/badge/Join_the_community-Discord-5865F2?style=for-the-badge&logo=discord&logoColor=white\" alt=\"Discord\"></a></p>\n\n## What Is This\n\nCareer-Ops turns any AI coding CLI into a full job search command center. Instead of manually tracking applications in a spreadsheet, you get an AI-powered pipeline that:\n\n- **Evaluates offers** with a structured A-F scoring system (10 weighted dimensions)\n- **Generates tailored PDFs** -- ATS-optimized CVs customized per job description\n- **Scans portals** automatically (Greenhouse, Ashby, Lever, company pages)\n- **Processes in batch** -- evaluate 10+ offers in parallel with sub-agents\n- **Tracks everything** in a single source of truth with integrity checks\n\n> **Important: This is NOT a spray-and-pray tool.** Career-ops is a filter -- it helps you find the few offers worth your time out of hundreds. The system strongly recommends against applying to anything scoring below 4.0/5. Your time is valuable, and so is the recruiter's. Always review before submitting.\n\nCareer-ops is agentic: Claude Code navigates career pages with Playwright, evaluates fit by reasoning about your CV vs the job description (not keyword matching), and adapts your resume per listing.\n\n> **Heads up: the first evaluations won't be great.** The system doesn't know you yet. Feed it context -- your CV, your career story, your proof points, your preferences, what you're good at, what you want to avoid. The more you nurture it, the better it gets. Think of it as onboarding a new recruiter: the first week they need to learn about you, then they become invaluable.\n\nBuilt by someone who used it to evaluate 740+ job offers, generate 100+ tailored CVs, and land a Head of Applied AI role. [Read the full case study](https://santifer.io/career-ops-system).\n\n## Features\n\n| Feature | Description |\n|---------|-------------|\n| **Auto-Pipeline** | Paste a URL, get a full evaluation + PDF + tracker entry |\n| **6-Block Evaluation** | Role summary, CV match, level strategy, comp research, personalization, interview prep (STAR+R) |\n| **Interview Story Bank** | Accumulates STAR+Reflection stories across evaluations -- 5-10 master stories that answer any behavioral question |\n| **Negotiation Scripts** | Salary negotiation frameworks, geographic discount pushback, competing offer leverage |\n| **ATS PDF Generation** | Keyword-injected CVs with Space Grotesk + DM Sans design |\n| **Portal Scanner** | 45+ companies pre-configured (Anthropic, OpenAI, ElevenLabs, Retool, n8n...) + custom queries across Ashby, Greenhouse, Lever, Wellfound |\n| **Batch Processing** | Parallel evaluation with `claude -p` workers |\n| **Dashboard TUI** | Terminal UI to browse, filter, and sort your pipeline |\n| **Human-in-the-Loop** | AI evaluates and recommends, you decide and act. The system never submits an application -- you always have the final call |\n| **Pipeline Integrity** | Automated merge, dedup, status normalization, health checks |\n\n## Quick Start\n\n```bash\n# 1. Clone and install\ngit clone https://github.com/santifer/career-ops.git\ncd career-ops && npm install\nnpx playwright install chromium   # Required for PDF generation\n\n# 2. Check setup\nnpm run doctor                     # Validates all prerequisites\n\n# 3. Configure\ncp config/profile.example.yml config/profile.yml  # Edit with your details\ncp templates/portals.example.yml portals.yml       # Customize companies\n\n# 4. Add your CV\n# Create cv.md in the project root with your CV in markdown\n\n# 5. Personalize with Claude\nclaude   # Open Claude Code in this directory\n\n# Then ask Claude to adapt the system to you:\n# \"Change the archetypes to backend engineering roles\"\n# \"Translate the modes to English\"\n# \"Add these 5 companies to portals.yml\"\n# \"Update my profile with this CV I'm pasting\"\n\n# 6. Start using\n# Paste a job URL or run /career-ops\n```\n\n> **The system is designed to be customized by Claude itself.** Modes, archetypes, scoring weights, negotiation scripts -- just ask Claude to change them. It reads the same files it uses, so it knows exactly what to edit.\n\nSee [docs/SETUP.md](docs/SETUP.md) for the full setup guide.\n\n## Gemini CLI Integration\n\nCareer-ops supports [Gemini CLI](https://github.com/google-gemini/gemini-cli) natively — the same way it supports Claude Code and OpenCode. All 15 slash commands are available, using the same `modes/*.md` evaluation logic.\n\n### Option A — Native Gemini CLI (Recommended)\n\n```bash\n# 1. Install Gemini CLI\nnpm install -g @google/gemini-cli\n# or: npx @google/gemini-cli --version\n\n# 2. Authenticate (free — uses your Google account)\ngemini auth\n\n# 3. Run in the career-ops directory\ncd career-ops\ngemini\n\n# 4. Use slash commands just like Claude Code\n/career-ops \"Senior AI Engineer at Anthropic...\"\n/career-ops-evaluate --file ./jds/openai.txt\n/career-ops-scan\n/career-ops-pdf\n/career-ops-tracker\n```\n\nThe `GEMINI.md` file is auto-loaded as context. All 15 commands are defined in `.gemini/commands/*.toml`.\n\n### Option B — Standalone API Script (No CLI install needed)\n\n```bash\n# 1. Get a free API key at https://aistudio.google.com/apikey\ncp .env.example .env\n# Edit .env → set GEMINI_API_KEY=your_key_here\n\n# 2. Install dependencies\nnpm install\n\n# 3. Evaluate a job description\nnode gemini-eval.mjs \"We are looking for a Senior AI Engineer...\"\nnode gemini-eval.mjs --file ./jds/my-job.txt\nnpm run gemini:eval -- \"JD text here\"\n```\n\n> **Free tier:** Both options work without billing. Native CLI uses Google OAuth; the API script uses `gemini-2.0-flash` (15 RPM, 1M tokens/day free).\n\n## Usage\n\nCareer-ops is a single slash command with multiple modes:\n\n```\n/career-ops                → Show all available commands\n/career-ops {paste a JD}   → Full auto-pipeline (evaluate + PDF + tracker)\n/career-ops scan           → Scan portals for new offers\n/career-ops pdf            → Generate ATS-optimized CV\n/career-ops batch          → Batch evaluate multiple offers\n/career-ops tracker        → View application status\n/career-ops apply          → Fill application forms with AI\n/career-ops pipeline       → Process pending URLs\n/career-ops contacto       → LinkedIn outreach message\n/career-ops deep           → Deep company research\n/career-ops training       → Evaluate a course/cert\n/career-ops project        → Evaluate a portfolio project\n```\n\nOr just paste a job URL or description directly -- career-ops auto-detects it and runs the full pipeline.\n\n## How It Works\n\n```\nYou paste a job URL or description\n        │\n        ▼\n┌──────────────────┐\n│  Archetype       │  Classifies: LLMOps / Agentic / PM / SA / FDE / Transformation\n│  Detection       │\n└────────┬─────────┘\n         │\n┌────────▼─────────┐\n│  A-F Evaluation  │  Match, gaps, comp research, STAR stories\n│  (reads cv.md)   │\n└────────┬─────────┘\n         │\n    ┌────┼────┐\n    ▼    ▼    ▼\n Report  PDF  Tracker\n  .md   .pdf   .tsv\n```\n\n## Pre-configured Portals\n\nThe scanner comes with **45+ companies** ready to scan and **19 search queries** across major job boards. Copy `templates/portals.example.yml` to `portals.yml` and add your own:\n\n**AI Labs:** Anthropic, OpenAI, Mistral, Cohere, LangChain, Pinecone\n**Voice AI:** ElevenLabs, PolyAI, Parloa, Hume AI, Deepgram, Vapi, Bland AI\n**AI Platforms:** Retool, Airtable, Vercel, Temporal, Glean, Arize AI\n**Contact Center:** Ada, LivePerson, Sierra, Decagon, Talkdesk, Genesys\n**Enterprise:** Salesforce, Twilio, Gong, Dialpad\n**LLMOps:** Langfuse, Weights & Biases, Lindy, Cognigy, Speechmatics\n**Automation:** n8n, Zapier, Make.com\n**European:** Factorial, Attio, Tinybird, Clarity AI, Travelperk\n\n**Job boards searched:** Ashby, Greenhouse, Lever, Wellfound, Workable, RemoteFront\n\n## Dashboard TUI\n\nThe built-in terminal dashboard lets you browse your pipeline visually:\n\n```bash\ncd dashboard\ngo build -o career-dashboard .\n./career-dashboard --path ..\n```\n\nFeatures: 6 filter tabs, 4 sort modes, grouped/flat view, lazy-loaded previews, inline status changes.\n\n## Project Structure\n\n```\ncareer-ops/\n├── CLAUDE.md                    # Agent instructions\n├── cv.md                        # Your CV (create this)\n├── article-digest.md            # Your proof points (optional)\n├── config/\n│   └── profile.example.yml      # Template for your profile\n├── modes/                       # 14 skill modes\n│   ├── _shared.md               # Shared context (customize this)\n│   ├── oferta.md                # Single evaluation\n│   ├── pdf.md                   # PDF generation\n│   ├── scan.md                  # Portal scanner\n│   ├── batch.md                 # Batch processing\n│   └── ...\n├── templates/\n│   ├── cv-template.html         # ATS-optimized CV template\n│   ├── portals.example.yml      # Scanner config template\n│   └── states.yml               # Canonical statuses\n├── batch/\n│   ├── batch-prompt.md          # Self-contained worker prompt\n│   └── batch-runner.sh          # Orchestrator script\n├── dashboard/                   # Go TUI pipeline viewer\n├── data/                        # Your tracking data (gitignored)\n├── reports/                     # Evaluation reports (gitignored)\n├── output/                      # Generated PDFs (gitignored)\n├── fonts/                       # Space Grotesk + DM Sans\n├── docs/                        # Setup, customization, architecture\n└── examples/                    # Sample CV, report, proof points\n```\n\n## Tech Stack\n\n![Claude Code](https://img.shields.io/badge/Claude_Code-000?style=flat&logo=anthropic&logoColor=white)\n![Node.js](https://img.shields.io/badge/Node.js-339933?style=flat&logo=node.js&logoColor=white)\n![Playwright](https://img.shields.io/badge/Playwright-2EAD33?style=flat&logo=playwright&logoColor=white)\n![Go](https://img.shields.io/badge/Go-00ADD8?style=flat&logo=go&logoColor=white)\n![Bubble Tea](https://img.shields.io/badge/Bubble_Tea-FF75B5?style=flat&logo=go&logoColor=white)\n\n- **Agent**: Claude Code with custom skills and modes\n- **PDF**: Playwright/Puppeteer + HTML template\n- **Scanner**: Playwright + Greenhouse API + WebSearch\n- **Dashboard**: Go + Bubble Tea + Lipgloss (Catppuccin Mocha theme)\n- **Data**: Markdown tables + YAML config + TSV batch files\n\n## Also Open Source\n\n- **[cv-santiago](https://github.com/santifer/cv-santiago)** -- The portfolio website (santifer.io) with AI chatbot, LLMOps dashboard, and case studies. If you need a portfolio to showcase alongside your job search, fork it and make it yours.\n\n## About the Author\n\nI'm Santiago -- Head of Applied AI, former founder (built and sold a business that still runs with my name on it). I built career-ops to manage my own job search. It worked: I used it to land my current role.\n\nMy portfolio and other open source projects → [santifer.io](https://santifer.io)\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=santifer%2Fcareer-ops&type=timeline&legend=top-left\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=santifer/career-ops&type=timeline&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=santifer/career-ops&type=timeline&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=santifer/career-ops&type=timeline&legend=top-left\" />\n </picture>\n</a>\n\n## Disclaimer\n\n**career-ops is a local, open-source tool — NOT a hosted service.** By using this software, you acknowledge:\n\n1. **You control your data.** Your CV, contact info, and personal data stay on your machine and are sent directly to the AI provider you choose (Anthropic, OpenAI, etc.). We do not collect, store, or have access to any of your data.\n2. **You control the AI.** The default prompts instruct the AI not to auto-submit applications, but AI models can behave unpredictably. If you modify the prompts or use different models, you do so at your own risk. **Always review AI-generated content for accuracy before submitting.**\n3. **You comply with third-party ToS.** You must use this tool in accordance with the Terms of Service of the career portals you interact with (Greenhouse, Lever, Workday, LinkedIn, etc.). Do not use this tool to spam employers or overwhelm ATS systems.\n4. **No guarantees.** Evaluations are recommendations, not truth. AI models may hallucinate skills or experience. The authors are not liable for employment outcomes, rejected applications, account restrictions, or any other consequences.\n\nSee [LEGAL_DISCLAIMER.md](LEGAL_DISCLAIMER.md) for full details. This software is provided under the [MIT License](LICENSE) \"as is\", without warranty of any kind.\n\n## Contributors\n\n<a href=\"https://github.com/santifer/career-ops/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=santifer/career-ops\" />\n</a>\n\nGot hired using career-ops? [Share your story!](https://github.com/santifer/career-ops/issues/new?template=i-got-hired.yml)\n\n## License & Trademark\n\nThe code is licensed under [MIT](LICENSE). The \"career-ops\" name and\nbrand are governed by the [Trademark Policy](TRADEMARK.md) — permissive\nfor community use, reserved for commercial product naming and\nendorsement.\n\n## Let's Connect\n\n[![Website](https://img.shields.io/badge/santifer.io-000?style=for-the-badge&logo=safari&logoColor=white)](https://santifer.io)\n[![LinkedIn](https://img.shields.io/badge/LinkedIn-0A66C2?style=for-the-badge&logo=linkedin&logoColor=white)](https://linkedin.com/in/santifer)\n[![X](https://img.shields.io/badge/X-000?style=for-the-badge&logo=x&logoColor=white)](https://x.com/santifer)\n[![Discord](https://img.shields.io/badge/Discord-5865F2?style=for-the-badge&logo=discord&logoColor=white)](https://discord.gg/8pRpHETxa4)\n[![Email](https://img.shields.io/badge/Email-EA4335?style=for-the-badge&logo=gmail&logoColor=white)](mailto:hi@santifer.io)\n","summary":"Career‑Ops is an open‑source command‑line hub that automates the entire job‑search workflow: it scrapes portals, evaluates and scores each posting, and auto‑generates ATS‑optimized CVs tailored to each role. Built on multiple AI agents (Claude, Gemini, etc.) it applies a structured A‑F rating across ten weighted dimensions, processes offers in parallel, and records everything in a single, integrity‑checked source of truth. The system is designed as a filter rather than a spray‑and‑pray tool, recommending only listings that meet a high‑quality threshold. Freelancers, job seekers, and early‑career professionals can use it to triage hundreds of openings quickly and apply with personalized documents that match each employer’s expectations.","description":"AI-powered job search system built on Claude Code. 14 skill modes, Go dashboard, PDF generation, batch processing.","stars":42409,"language":"JavaScript"},{"owner":"safishamsi","repo":"graphify","url":"https://github.com/safishamsi/graphify","readme":"<p align=\"center\">\n  <a href=\"https://graphifylabs.ai\"><img src=\"https://raw.githubusercontent.com/safishamsi/graphify/v4/docs/logo-text.svg\" width=\"260\" height=\"64\" alt=\"Graphify\"/></a>\n</p>\n\n<p align=\"center\">\n  🇺🇸 <a href=\"README.md\">English</a> | 🇨🇳 <a href=\"docs/translations/README.zh-CN.md\">简体中文</a> | 🇯🇵 <a href=\"docs/translations/README.ja-JP.md\">日本語</a> | 🇰🇷 <a href=\"docs/translations/README.ko-KR.md\">한국어</a> | 🇩🇪 <a href=\"docs/translations/README.de-DE.md\">Deutsch</a> | 🇫🇷 <a href=\"docs/translations/README.fr-FR.md\">Français</a> | 🇪🇸 <a href=\"docs/translations/README.es-ES.md\">Español</a> | 🇮🇳 <a href=\"docs/translations/README.hi-IN.md\">हिन्दी</a> | 🇧🇷 <a href=\"docs/translations/README.pt-BR.md\">Português</a> | 🇷🇺 <a href=\"docs/translations/README.ru-RU.md\">Русский</a> | 🇸🇦 <a href=\"docs/translations/README.ar-SA.md\">العربية</a> | 🇮🇹 <a href=\"docs/translations/README.it-IT.md\">Italiano</a> | 🇵🇱 <a href=\"docs/translations/README.pl-PL.md\">Polski</a> | 🇳🇱 <a href=\"docs/translations/README.nl-NL.md\">Nederlands</a> | 🇹🇷 <a href=\"docs/translations/README.tr-TR.md\">Türkçe</a> | 🇺🇦 <a href=\"docs/translations/README.uk-UA.md\">Українська</a> | 🇻🇳 <a href=\"docs/translations/README.vi-VN.md\">Tiếng Việt</a> | 🇮🇩 <a href=\"docs/translations/README.id-ID.md\">Bahasa Indonesia</a> | 🇸🇪 <a href=\"docs/translations/README.sv-SE.md\">Svenska</a> | 🇬🇷 <a href=\"docs/translations/README.el-GR.md\">Ελληνικά</a> | 🇷🇴 <a href=\"docs/translations/README.ro-RO.md\">Română</a> | 🇨🇿 <a href=\"docs/translations/README.cs-CZ.md\">Čeština</a> | 🇫🇮 <a href=\"docs/translations/README.fi-FI.md\">Suomi</a> | 🇩🇰 <a href=\"docs/translations/README.da-DK.md\">Dansk</a> | 🇳🇴 <a href=\"docs/translations/README.no-NO.md\">Norsk</a> | 🇭🇺 <a href=\"docs/translations/README.hu-HU.md\">Magyar</a> | 🇹🇭 <a href=\"docs/translations/README.th-TH.md\">ภาษาไทย</a> | 🇹🇼 <a href=\"docs/translations/README.zh-TW.md\">繁體中文</a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://safishamsi.gumroad.com/l/qetvlo\"><img src=\"https://img.shields.io/badge/Book-The%20Memory%20Layer-2ea44f?style=flat&logo=gitbook&logoColor=white\" alt=\"The Memory Layer\"/></a>\n  <a href=\"https://github.com/safishamsi/graphify/actions/workflows/ci.yml\"><img src=\"https://github.com/safishamsi/graphify/actions/workflows/ci.yml/badge.svg?branch=v7\" alt=\"CI\"/></a>\n  <a href=\"https://pypi.org/project/graphifyy/\"><img src=\"https://img.shields.io/pypi/v/graphifyy\" alt=\"PyPI\"/></a>\n  <a href=\"https://pepy.tech/project/graphifyy\"><img src=\"https://static.pepy.tech/badge/graphifyy\" alt=\"Downloads\"/></a>\n  <a href=\"https://github.com/sponsors/safishamsi\"><img src=\"https://img.shields.io/badge/sponsor-safishamsi-ea4aaa?logo=github-sponsors\" alt=\"Sponsor\"/></a>\n  <a href=\"https://www.linkedin.com/in/safi-shamsi\"><img src=\"https://img.shields.io/badge/LinkedIn-Safi%20Shamsi-0077B5?logo=linkedin\" alt=\"LinkedIn\"/></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://star-history.com/#safishamsi/graphify&Date\">\n    <img src=\"https://api.star-history.com/svg?repos=safishamsi/graphify&type=Date\" alt=\"Star History Chart\" width=\"600\"/>\n  </a>\n</p>\n\nType `/graphify` in your AI coding assistant and it maps your entire project — code, docs, PDFs, images, videos — into a knowledge graph you can query instead of grepping through files.\n\nWorks in Claude Code, Codex, OpenCode, Cursor, Gemini CLI, GitHub Copilot CLI, VS Code Copilot Chat, Aider, OpenClaw, Factory Droid, Trae, Hermes, Kiro, Pi, and Google Antigravity.\n\n```\n/graphify .\n```\n\nThat's it. You get three files:\n\n```\ngraphify-out/\n├── graph.html       open in any browser — click nodes, filter, search\n├── GRAPH_REPORT.md  the highlights: key concepts, surprising connections, suggested questions\n└── graph.json       the full graph — query it anytime without re-reading your files\n```\n\n---\n\n## Install\n\n**Requires Python 3.10+**\n\n```bash\nuv tool install graphifyy && graphify install\n# or: pipx install graphifyy && graphify install\n# or: pip install graphifyy && graphify install\n```\n\n> **Official package:** The PyPI package is `graphifyy` (double-y). Other `graphify*` packages on PyPI are not affiliated. The CLI command is still `graphify`.\n\n> **`graphify: command not found`?** Use `uv tool install graphifyy` or `pipx install graphifyy` — both put the CLI on PATH automatically. With plain `pip`, add `~/.local/bin` (Linux) or `~/Library/Python/3.x/bin` (Mac) to your PATH, or run `python -m graphify`.\n\n### Pick your platform\n\n| Platform | Install command |\n|----------|----------------|\n| Claude Code (Linux/Mac) | `graphify install` |\n| Claude Code (Windows) | `graphify install --platform windows` |\n| Codex | `graphify install --platform codex` |\n| OpenCode | `graphify install --platform opencode` |\n| GitHub Copilot CLI | `graphify install --platform copilot` |\n| VS Code Copilot Chat | `graphify vscode install` |\n| Aider | `graphify install --platform aider` |\n| OpenClaw | `graphify install --platform claw` |\n| Factory Droid | `graphify install --platform droid` |\n| Trae | `graphify install --platform trae` |\n| Trae CN | `graphify install --platform trae-cn` |\n| Gemini CLI | `graphify install --platform gemini` |\n| Hermes | `graphify install --platform hermes` |\n| Kiro IDE/CLI | `graphify kiro install` |\n| Pi coding agent | `graphify install --platform pi` |\n| Cursor | `graphify cursor install` |\n| Google Antigravity | `graphify antigravity install` |\n\n> Codex users: also add `multi_agent = true` under `[features]` in `~/.codex/config.toml`.\n> Codex uses `$graphify` instead of `/graphify`.\n\n---\n\n## Make your assistant always use the graph\n\nRun this once in your project after building a graph:\n\n| Platform | Command |\n|----------|---------|\n| Claude Code | `graphify claude install` |\n| Codex | `graphify codex install` |\n| OpenCode | `graphify opencode install` |\n| GitHub Copilot CLI | `graphify copilot install` |\n| VS Code Copilot Chat | `graphify vscode install` |\n| Aider | `graphify aider install` |\n| OpenClaw | `graphify claw install` |\n| Factory Droid | `graphify droid install` |\n| Trae | `graphify trae install` |\n| Trae CN | `graphify trae-cn install` |\n| Cursor | `graphify cursor install` |\n| Gemini CLI | `graphify gemini install` |\n| Hermes | `graphify hermes install` |\n| Kiro IDE/CLI | `graphify kiro install` |\n| Pi coding agent | `graphify pi install` |\n| Google Antigravity | `graphify antigravity install` |\n\nThis writes a small config file that tells your assistant to read `GRAPH_REPORT.md` before answering questions about your codebase. On platforms that support hooks (Claude Code, Codex, Gemini CLI), a hook fires automatically before every file-read call — your assistant navigates by the graph instead of grepping through everything.\n\nUninstall with the matching command (e.g. `graphify claude uninstall`).\n\n---\n\n## What's in the report\n\n- **God nodes** — the most-connected concepts in your project. Everything flows through these.\n- **Surprising connections** — links between things that live in different files or modules. Ranked by how unexpected they are.\n- **The \"why\"** — inline comments (`# NOTE:`, `# WHY:`, `# HACK:`), docstrings, and design rationale from docs are extracted as separate nodes linked to the code they explain.\n- **Suggested questions** — 4–5 questions the graph is uniquely positioned to answer.\n- **Confidence tags** — every inferred relationship is marked `EXTRACTED`, `INFERRED`, or `AMBIGUOUS`. You always know what was found vs guessed.\n\n---\n\n## What files it handles\n\n| Type | Extensions |\n|------|-----------|\n| Code (26 languages) | `.py .ts .js .jsx .tsx .go .rs .java .c .cpp .rb .cs .kt .scala .php .swift .lua .zig .ps1 .ex .exs .m .jl .vue .svelte .sql .f .F .f90 .F90 .f95 .F95 .f03 .F03 .f08 .F08` |\n| Docs | `.md .mdx .html .txt .rst .yaml .yml` |\n| Office | `.docx .xlsx` (requires `pip install graphifyy[office]`) |\n| PDFs | `.pdf` |\n| Images | `.png .jpg .webp .gif` |\n| Video / Audio | `.mp4 .mov .mp3 .wav` and more (requires `pip install graphifyy[video]`) |\n| YouTube / URLs | any video URL (requires `pip install graphifyy[video]`) |\n\nCode is extracted locally with no API calls (AST via tree-sitter). Everything else goes through your AI assistant's model API.\n\n---\n\n## Common commands\n\n```bash\n/graphify .                        # build graph for current folder\n/graphify ./docs --update          # re-extract only changed files\n/graphify . --cluster-only         # rerun clustering without re-extracting\n/graphify . --no-viz               # skip the HTML, just the report + JSON\n/graphify . --wiki                 # build a markdown wiki from the graph\n\n/graphify query \"what connects auth to the database?\"\n/graphify path \"UserService\" \"DatabasePool\"\n/graphify explain \"RateLimiter\"\n\n/graphify add https://arxiv.org/abs/1706.03762   # fetch a paper and add it\n/graphify add <youtube-url>                       # transcribe and add a video\n\ngraphify hook install              # auto-rebuild on git commit\ngraphify merge-graphs a.json b.json              # combine two graphs\n```\n\nSee the [full command reference](#full-command-reference) below.\n\n---\n\n## Ignoring files\n\nCreate a `.graphifyignore` in your project root — same syntax as `.gitignore`, including `!` negation:\n\n```\n# .graphifyignore\nnode_modules/\ndist/\n*.generated.py\n\n# only index src/, ignore everything else\n*\n!src/\n!src/**\n```\n\n---\n\n## Team setup\n\n`graphify-out/` is meant to be committed to git so everyone on the team starts with a map.\n\n**Recommended `.gitignore` additions:**\n```\ngraphify-out/manifest.json    # mtime-based, breaks after git clone\ngraphify-out/cost.json        # local only\n# graphify-out/cache/         # optional: commit for speed, skip to keep repo small\n```\n\n**Workflow:**\n1. One person runs `/graphify .` and commits `graphify-out/`.\n2. Everyone pulls — their assistant reads the graph immediately.\n3. Run `graphify hook install` to auto-rebuild after each commit (AST only, no API cost). This also sets up a git merge driver so `graph.json` is never left with conflict markers — two devs committing in parallel get their graphs union-merged automatically.\n4. When docs or papers change, run `/graphify --update` to refresh those nodes.\n\n---\n\n## Using the graph directly\n\n```bash\n# query the graph from the terminal\ngraphify query \"show the auth flow\"\ngraphify query \"what connects DigestAuth to Response?\" --graph graphify-out/graph.json\n\n# expose the graph as an MCP server (for repeated tool-call access)\npython -m graphify.serve graphify-out/graph.json\n```\n\nThe MCP server gives your assistant structured access: `query_graph`, `get_node`, `get_neighbors`, `shortest_path`.\n\n> **WSL / Linux note:** Ubuntu ships `python3`, not `python`. Use a venv to avoid conflicts:\n> ```bash\n> python3 -m venv .venv && .venv/bin/pip install \"graphifyy[mcp]\"\n> ```\n\n---\n\n## Privacy\n\n- **Code files** — processed locally via tree-sitter. Nothing leaves your machine.\n- **Video / audio** — transcribed locally with faster-whisper. Nothing leaves your machine.\n- **Docs, PDFs, images** — sent to your AI assistant for semantic extraction (via the `/graphify` skill, using whatever model your IDE session runs). Headless `graphify extract` requires `ANTHROPIC_API_KEY` (Claude) or `MOONSHOT_API_KEY` (Kimi). The `--dedup-llm` flag uses the same key.\n- No telemetry, no usage tracking, no analytics.\n\n---\n\n## Full command reference\n\n```\n/graphify                          # run on current directory\n/graphify ./raw                    # run on a specific folder\n/graphify ./raw --mode deep        # more aggressive relationship extraction\n/graphify ./raw --update           # re-extract only changed files\n/graphify ./raw --directed         # preserve edge direction\n/graphify ./raw --cluster-only     # rerun clustering on existing graph\n/graphify ./raw --no-viz           # skip HTML visualization\n/graphify ./raw --obsidian         # generate Obsidian vault\n/graphify ./raw --wiki             # build agent-crawlable markdown wiki\n/graphify ./raw --svg              # export graph.svg\n/graphify ./raw --graphml          # export for Gephi / yEd\n/graphify ./raw --neo4j            # generate cypher.txt for Neo4j\n/graphify ./raw --neo4j-push bolt://localhost:7687\n/graphify ./raw --watch            # auto-sync as files change\n/graphify ./raw --mcp              # start MCP stdio server\n\n/graphify add https://arxiv.org/abs/1706.03762\n/graphify add <video-url>\n/graphify add https://... --author \"Name\" --contributor \"Name\"\n\n/graphify query \"what connects attention to the optimizer?\"\n/graphify query \"...\" --dfs --budget 1500\n/graphify path \"DigestAuth\" \"Response\"\n/graphify explain \"SwinTransformer\"\n\ngraphify hook install              # post-commit + post-checkout hooks\ngraphify hook uninstall\ngraphify hook status\n\ngraphify claude install / uninstall\ngraphify codex install / uninstall\ngraphify opencode install\ngraphify cursor install / uninstall\ngraphify gemini install / uninstall\ngraphify copilot install / uninstall\ngraphify aider install / uninstall\ngraphify claw install / uninstall\ngraphify droid install / uninstall\ngraphify trae install / uninstall\ngraphify trae-cn install / uninstall\ngraphify hermes install / uninstall\ngraphify kiro install / uninstall\ngraphify antigravity install / uninstall\n\ngraphify extract ./docs                        # headless LLM extraction for CI (no IDE needed)\ngraphify extract ./docs --backend claude       # explicit backend: claude (ANTHROPIC_API_KEY) or kimi (MOONSHOT_API_KEY)\ngraphify extract ./docs --no-cluster           # raw extraction only, skip clustering\ngraphify extract ./docs --dedup-llm            # LLM tiebreaker for ambiguous entity pairs (uses same API key)\n\ngraphify clone https://github.com/karpathy/nanoGPT\ngraphify merge-graphs a.json b.json --out merged.json\ngraphify watch ./src\ngraphify check-update ./src\ngraphify update ./src\ngraphify cluster-only ./my-project\n```\n\n---\n\n## Learn more\n\n- [How it works](docs/how-it-works.md) — the extraction pipeline, community detection, confidence scoring, benchmarks\n- [ARCHITECTURE.md](ARCHITECTURE.md) — module breakdown, how to add a language\n- [Optional integrations](docs/docker-mcp-sqlite.md) — Docker MCP Toolkit + SQLite\n\n---\n\n## Built on graphify — Penpax\n\n[**Penpax**](https://graphifylabs.ai) is the always-on layer built on top of graphify — it applies the same graph approach to your entire working life: meetings, browser history, emails, files, and code, updating continuously in the background.\n\nBuilt for people whose work lives across hundreds of conversations and documents they can never fully reconstruct. No cloud, fully on-device.\n\n**Free trial launching soon.** [Join the waitlist →](https://graphifylabs.ai)\n\n---\n\n<details>\n<summary>Contributing</summary>\n\n**Worked examples** are the most useful contribution. Run `/graphify` on a real corpus, save the output to `worked/{slug}/`, write an honest `review.md` covering what the graph got right and wrong, and open a PR.\n\n**Extraction bugs** — open an issue with the input file, the cache entry (`graphify-out/cache/`), and what was missed or wrong.\n\nSee [ARCHITECTURE.md](ARCHITECTURE.md) for module responsibilities and how to add a language.\n\n</details>\n","summary":"Graphify is an AI‑powered command‑line tool that scans a codebase, documentation, PDFs, images, and videos, converting everything into a searchable knowledge graph. By running a single command such as `/graphify .`, it outputs an interactive HTML graph, a concise report highlighting key concepts and surprising connections, and a JSON file that can be queried offline. The tool integrates with major AI coding assistants—including Claude, Gemini, Copilot, and VS Code chat—to replace tedious grepping with instant graph‑based queries. Developers, technical writers, and AI researchers benefit from a quick, visual overview of complex repositories and the ability to ask high‑level questions without manually navigating countless files.","description":"AI coding assistant skill (Claude Code, Codex, OpenCode, Cursor, Gemini CLI, and more). Turn any folder of code, SQL schemas, R scripts, shell scripts, docs, papers, images, or videos into a queryable knowledge graph. App code + database schema + infrastructure in one graph.","stars":42552,"language":"Python"},{"owner":"Gitlawb","repo":"openclaude","url":"https://github.com/Gitlawb/openclaude","readme":"# OpenClaude\n\nOpenClaude is an open-source coding-agent CLI for cloud and local model providers.\n\nUse OpenAI-compatible APIs, Gemini, GitHub Models, Codex OAuth, Codex, Ollama, Atomic Chat, and other supported backends while keeping one terminal-first workflow: prompts, tools, agents, MCP, slash commands, and streaming output.\n\n[![PR Checks](https://github.com/Gitlawb/openclaude/actions/workflows/pr-checks.yml/badge.svg?branch=main)](https://github.com/Gitlawb/openclaude/actions/workflows/pr-checks.yml)\n[![Release](https://img.shields.io/github/v/tag/Gitlawb/openclaude?label=release&color=0ea5e9)](https://github.com/Gitlawb/openclaude/tags)\n[![Discussions](https://img.shields.io/badge/discussions-open-7c3aed)](https://github.com/Gitlawb/openclaude/discussions)\n[![Security Policy](https://img.shields.io/badge/security-policy-0f766e)](SECURITY.md)\n[![License](https://img.shields.io/badge/license-MIT-2563eb)](LICENSE)\n\nOpenClaude is also mirrored to GitLawb:\n[gitlawb.com/node/repos/z6MkqDnb/openclaude](https://gitlawb.com/node/repos/z6MkqDnb/openclaude)\n\n[Quick Start](#quick-start) | [Setup Guides](#setup-guides) | [Providers](#supported-providers) | [Source Build](#source-build-and-local-development) | [VS Code Extension](#vs-code-extension) | [Sponsors](#sponsors) | [Community](#community)\n\n## Sponsors\n\n<p align=\"center\">\n  <a href=\"https://gitlawb.com\">\n    <img src=\"https://gitlawb.com/logo.png\" alt=\"GitLawb logo\" width=\"96\">\n  </a>\n  &nbsp;&nbsp;&nbsp;&nbsp;\n  <a href=\"https://bankr.bot\">\n    <img src=\"https://bankr.bot/favicon.svg\" alt=\"Bankr.bot logo\" width=\"96\">\n  </a>\n  &nbsp;&nbsp;&nbsp;&nbsp;\n  <a href=\"https://atomic.chat/\">\n    <img src=\"docs/assets/atomic-chat-logo.png\" alt=\"Atomic Chat logo\" width=\"96\">\n  </a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://gitlawb.com\"><strong>GitLawb</strong></a>\n  &nbsp;&nbsp;&nbsp;&nbsp;\n  <a href=\"https://bankr.bot\"><strong>Bankr.bot</strong></a>\n  &nbsp;&nbsp;&nbsp;&nbsp;\n  <a href=\"https://atomic.chat/\"><strong>Atomic Chat</strong></a>\n</p>\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/chart?repos=gitlawb/openclaude&type=date&legend=top-left)](https://www.star-history.com/?repos=gitlawb%2Fopenclaude&type=date&legend=top-left)\n\n## Why OpenClaude\n\n- Use one CLI across cloud APIs and local model backends\n- Save provider profiles inside the app with `/provider`\n- Run with OpenAI-compatible services, Gemini, GitHub Models, Codex OAuth, Codex, Ollama, Atomic Chat, and other supported providers\n- Keep coding-agent workflows in one place: bash, file tools, grep, glob, agents, tasks, MCP, and web tools\n- Use the bundled VS Code extension for launch integration and theme support\n\n## Quick Start\n\n### Install\n\n```bash\nnpm install -g @gitlawb/openclaude\n```\n\nIf the install later reports `ripgrep not found`, install ripgrep system-wide and confirm `rg --version` works in the same terminal before starting OpenClaude.\n\n### Start\n\n```bash\nopenclaude\n```\n\nInside OpenClaude:\n\n- run `/provider` for guided provider setup and saved profiles\n- run `/onboard-github` for GitHub Models onboarding\n\n### Fastest OpenAI setup\n\nmacOS / Linux:\n\n```bash\nexport CLAUDE_CODE_USE_OPENAI=1\nexport OPENAI_API_KEY=sk-your-key-here\nexport OPENAI_MODEL=gpt-4o\n\nopenclaude\n```\n\nWindows PowerShell:\n\n```powershell\n$env:CLAUDE_CODE_USE_OPENAI=\"1\"\n$env:OPENAI_API_KEY=\"sk-your-key-here\"\n$env:OPENAI_MODEL=\"gpt-4o\"\n\nopenclaude\n```\n\n### Fastest local Ollama setup\n\nmacOS / Linux:\n\n```bash\nexport CLAUDE_CODE_USE_OPENAI=1\nexport OPENAI_BASE_URL=http://localhost:11434/v1\nexport OPENAI_MODEL=qwen2.5-coder:7b\n\nopenclaude\n```\n\nWindows PowerShell:\n\n```powershell\n$env:CLAUDE_CODE_USE_OPENAI=\"1\"\n$env:OPENAI_BASE_URL=\"http://localhost:11434/v1\"\n$env:OPENAI_MODEL=\"qwen2.5-coder:7b\"\n\nopenclaude\n```\n\n### Using Ollama's launch command\n\nIf you have [Ollama](https://ollama.com) installed, you can skip the env var setup entirely:\n\n```bash\nollama launch openclaude --model qwen2.5-coder:7b\n```\n\nThis automatically sets `ANTHROPIC_BASE_URL`, model routing, and auth so all API traffic goes through your local Ollama instance. Works with any model you have pulled — local or cloud.\n\n## Setup Guides\n\nBeginner-friendly guides:\n\n- [Non-Technical Setup](docs/non-technical-setup.md)\n- [Windows Quick Start](docs/quick-start-windows.md)\n- [macOS / Linux Quick Start](docs/quick-start-mac-linux.md)\n\nAdvanced and source-build guides:\n\n- [Advanced Setup](docs/advanced-setup.md)\n- [Android Install](ANDROID_INSTALL.md)\n\n## Supported Providers\n\n| Provider | Setup Path | Notes |\n| --- | --- | --- |\n| OpenAI-compatible | `/provider` or env vars | Works with OpenAI, OpenRouter, DeepSeek, Groq, Mistral, LM Studio, and other compatible `/v1` servers |\n| Hicap | `/provider` or OpenAI-compatible env vars | Uses `api-key` auth, discovers models from unauthenticated `/models`, and supports Responses mode for `gpt-` models |\n| Gemini | `/provider` or env vars | Supports API key, access token, or local ADC workflow on current `main` |\n| GitHub Models | `/onboard-github` | Interactive onboarding with saved credentials |\n| Codex OAuth | `/provider` | Opens ChatGPT sign-in in your browser and stores Codex credentials securely |\n| Codex | `/provider` | Uses existing Codex CLI auth, OpenClaude secure storage, or env credentials |\n| Ollama | `/provider`, env vars, or `ollama launch` | Local inference with no API key |\n| Atomic Chat | `/provider`, env vars, or `bun run dev:atomic-chat` | Local Model Provider; auto-detects loaded models |\n| Bedrock / Vertex / Foundry | env vars | Additional provider integrations for supported environments |\n\n## What Works\n\n- **Tool-driven coding workflows**: Bash, file read/write/edit, grep, glob, agents, tasks, MCP, and slash commands\n- **Streaming responses**: Real-time token output and tool progress\n- **Tool calling**: Multi-step tool loops with model calls, tool execution, and follow-up responses\n- **Images**: URL and base64 image inputs for providers that support vision\n- **Provider profiles**: Guided setup plus saved user-level provider profile support\n- **Local and remote model backends**: Cloud APIs, local servers, and Apple Silicon local inference\n\n## Provider Notes\n\nOpenClaude supports multiple providers, but behavior is not identical across all of them.\n\n- Anthropic-specific features may not exist on other providers\n- Tool quality depends heavily on the selected model\n- Smaller local models can struggle with long multi-step tool flows\n- Some providers impose lower output caps than the CLI defaults, and OpenClaude adapts where possible\n\nFor best results, use models with strong tool/function calling support.\n\n## Agent Routing\n\nOpenClaude can route different agents to different models through settings-based routing. This is useful for cost optimization or splitting work by model strength.\n\nAdd to `~/.openclaude.json`:\n\n```json\n{\n  \"agentModels\": {\n    \"deepseek-v4-flash\": {\n      \"base_url\": \"https://api.deepseek.com/v1\",\n      \"api_key\": \"sk-your-key\"\n    },\n    \"gpt-4o\": {\n      \"base_url\": \"https://api.openai.com/v1\",\n      \"api_key\": \"sk-your-key\"\n    }\n  },\n  \"agentRouting\": {\n    \"Explore\": \"deepseek-v4-flash\",\n    \"Plan\": \"gpt-4o\",\n    \"general-purpose\": \"gpt-4o\",\n    \"frontend-dev\": \"deepseek-v4-flash\",\n    \"default\": \"gpt-4o\"\n  }\n}\n```\n\nWhen no routing match is found, the global provider remains the fallback.\n\n> **Note:** `api_key` values in `settings.json` are stored in plaintext. Keep this file private and do not commit it to version control.\n\n## Web Search and Fetch\n\nBy default, `WebSearch` works on non-Anthropic models using DuckDuckGo. This gives GPT-4o, DeepSeek, Gemini, Ollama, and other OpenAI-compatible providers a free web search path out of the box.\n\n> **Note:** DuckDuckGo fallback works by scraping search results and may be rate-limited, blocked, or subject to DuckDuckGo's Terms of Service. If you want a more reliable supported option, configure Firecrawl.\n\nFor Anthropic-native backends and Codex responses, OpenClaude keeps the native provider web search behavior.\n\n`WebFetch` works, but its basic HTTP plus HTML-to-markdown path can still fail on JavaScript-rendered sites or sites that block plain HTTP requests.\n\nSet a [Firecrawl](https://firecrawl.dev) API key if you want Firecrawl-powered search/fetch behavior:\n\n```bash\nexport FIRECRAWL_API_KEY=your-key-here\n```\n\nWith Firecrawl enabled:\n\n- `WebSearch` can use Firecrawl's search API while DuckDuckGo remains the default free path for non-Claude models\n- `WebFetch` uses Firecrawl's scrape endpoint instead of raw HTTP, handling JS-rendered pages correctly\n\nFree tier at [firecrawl.dev](https://firecrawl.dev) includes 500 credits. The key is optional.\n\n---\n\n## Headless gRPC Server\n\nOpenClaude can be run as a headless gRPC service, allowing you to integrate its agentic capabilities (tools, bash, file editing) into other applications, CI/CD pipelines, or custom user interfaces. The server uses bidirectional streaming to send real-time text chunks, tool calls, and request permissions for sensitive commands.\n\n### 1. Start the gRPC Server\n\nStart the core engine as a gRPC service on `localhost:50051`:\n\n```bash\nnpm run dev:grpc\n```\n\n#### Configuration\n\n| Variable | Default | Description |\n|-----------|-------------|------------------------------------------------|\n| `GRPC_PORT` | `50051` | Port the gRPC server listens on |\n| `GRPC_HOST` | `localhost` | Bind address. Use `0.0.0.0` to expose on all interfaces (not recommended without authentication) |\n\n### 2. Run the Test CLI Client\n\nWe provide a lightweight CLI client that communicates exclusively over gRPC. It acts just like the main interactive CLI, rendering colors, streaming tokens, and prompting you for tool permissions (y/n) via the gRPC `action_required` event.\n\nIn a separate terminal, run:\n\n```bash\nnpm run dev:grpc:cli\n```\n\n*Note: The gRPC definitions are located in `src/proto/openclaude.proto`. You can use this file to generate clients in Python, Go, Rust, or any other language.*\n\n---\n\n## Source Build And Local Development\n\n```bash\nbun install\nbun run build\nnode dist/cli.mjs\n```\n\nHelpful commands:\n\n- `bun run dev`\n- `bun test`\n- `bun run test:coverage`\n- `bun run security:pr-scan -- --base origin/main`\n- `bun run smoke`\n- `bun run doctor:runtime`\n- `bun run verify:privacy`\n- focused `bun test ...` runs for the areas you touch\n\n## Testing And Coverage\n\nOpenClaude uses Bun's built-in test runner for unit tests.\n\nRun the full unit suite:\n\n```bash\nbun test\n```\n\nGenerate unit test coverage:\n\n```bash\nbun run test:coverage\n```\n\nOpen the visual coverage report:\n\n```bash\nopen coverage/index.html\n```\n\nIf you already have `coverage/lcov.info` and only want to rebuild the UI:\n\n```bash\nbun run test:coverage:ui\n```\n\nUse focused test runs when you only touch one area:\n\n- `bun run test:provider`\n- `bun run test:provider-recommendation`\n- `bun test path/to/file.test.ts`\n\nRecommended contributor validation before opening a PR:\n\n- `bun run build`\n- `bun run smoke`\n- `bun run test:coverage` for broader unit coverage when your change affects shared runtime or provider logic\n- focused `bun test ...` runs for the files and flows you changed\n\nCoverage output is written to `coverage/lcov.info`, and OpenClaude also generates a git-activity-style heatmap at `coverage/index.html`.\n## Repository Structure\n\n- `src/` - core CLI/runtime\n- `scripts/` - build, verification, and maintenance scripts\n- `docs/` - setup, contributor, and project documentation\n- `python/` - standalone Python helpers and their tests\n- `vscode-extension/openclaude-vscode/` - VS Code extension\n- `.github/` - repo automation, templates, and CI configuration\n- `bin/` - CLI launcher entrypoints\n\n## VS Code Extension\n\nThe repo includes a VS Code extension in [`vscode-extension/openclaude-vscode`](vscode-extension/openclaude-vscode) for OpenClaude launch integration, provider-aware control-center UI, and theme support.\n\n## Security\n\nIf you believe you found a security issue, see [SECURITY.md](SECURITY.md).\n\n## Community\n\n- Use [GitHub Discussions](https://github.com/Gitlawb/openclaude/discussions) for Q&A, ideas, and community conversation\n- Use [GitHub Issues](https://github.com/Gitlawb/openclaude/issues) for confirmed bugs and actionable feature work\n\n## Contributing\n\nContributions are welcome.\n\nFor larger changes, open an issue first so the scope is clear before implementation. Helpful validation commands include:\n\n- `bun run build`\n- `bun run test:coverage`\n- `bun run smoke`\n- focused `bun test ...` runs for files and flows you changed\n\n\n## Disclaimer\n\nOpenClaude is an independent community project and is not affiliated with, endorsed by, or sponsored by Anthropic.\n\nOpenClaude originated from the Claude Code codebase and has since been substantially modified to support multiple providers and open use. \"Claude\" and \"Claude Code\" are trademarks of Anthropic PBC. See [LICENSE](LICENSE) for details.\n\n## License\n\nSee [LICENSE](LICENSE).\n","summary":"OpenClaude is an open‑source command‑line coding agent that unifies access to a wide range of local and cloud language‑model services such as OpenAI, Gemini, GitHub, Codex, Ollama, and Atomic Chat. It delivers a terminal‑first workflow with prompts, slash commands, modular agents, file‑based tools and streaming output, while letting users save and switch between provider profiles with simple commands. The tool is aimed at developers who need to experiment with or automate coding tasks across multiple LLM backends, and it includes a bundled VS Code extension for launch integration and theme support. By combining cloud‑based APIs, local Ollama models, and a flexible task‑execution engine, OpenClaude accelerates iterative coding, debugging, and documentation generation in a single CLI environment.","description":"runs anywhere. uses anything","stars":25785,"language":"TypeScript"},{"owner":"garrytan","repo":"gbrain","url":"https://github.com/garrytan/gbrain","readme":"# GBrain\n\nYour AI agent is smart but forgetful. GBrain gives it a brain.\n\nBuilt by the President and CEO of Y Combinator to run his actual AI agents. The production brain powering his OpenClaw and Hermes deployments: **17,888 pages, 4,383 people, 723 companies**, 21 cron jobs running autonomously, built in 12 days. The agent ingests meetings, emails, tweets, voice calls, and original ideas while you sleep. It enriches every person and company it encounters. It fixes its own citations and consolidates memory overnight. You wake up and the brain is smarter than when you went to bed.\n\nThe brain wires itself. Every page write extracts entity references and creates typed links (`attended`, `works_at`, `invested_in`, `founded`, `advises`) with zero LLM calls. Hybrid search. Self-wiring knowledge graph. Structured timeline. Backlink-boosted ranking. Ask \"who works at Acme AI?\" or \"what did Bob invest in this quarter?\" and get answers vector search alone can't reach. Benchmarked side-by-side against the category: gbrain lands **P@5 49.1%, R@5 97.9%** on a 240-page Opus-generated rich-prose corpus, beating its own graph-disabled variant by **+31.4 points P@5** and ripgrep-BM25 + vector-only RAG by a similar margin. The graph layer plus v0.12 extract quality together carry the gap. Full BrainBench scorecards + corpus live in the sibling [gbrain-evals](https://github.com/garrytan/gbrain-evals) repo.\n\nGBrain is those patterns, generalized. 34 skills. Install in 30 minutes. Your agent does the work. As Garry's personal agent gets smarter, so does yours.\n\n**New in v0.25.0 — BrainBench-Real (session capture, contributor opt-in):** with `GBRAIN_CONTRIBUTOR_MODE=1` set in your shell, every real `query` + `search` call through MCP, CLI, or the subagent tool-bridge gets captured (PII-scrubbed) into an `eval_candidates` table. Snapshot with `gbrain eval export`, replay against your code change with `gbrain eval replay`. Three numbers come back: mean Jaccard@k between captured and current retrieved slugs, top-1 stability, and latency Δ. **Off by default** for production users — no surprise data accumulation. Walkthrough: [docs/eval-bench.md](docs/eval-bench.md). NDJSON wire format: [docs/eval-capture.md](docs/eval-capture.md).\n\n> **~30 minutes to a fully working brain.** Database ready in 2 seconds (PGLite, no server). You just answer questions about API keys.\n\n> **LLMs:** fetch [`llms.txt`](llms.txt) for the documentation map, or [`llms-full.txt`](llms-full.txt) for the same map with core docs inlined in one fetch. **Agents:** start with [`AGENTS.md`](AGENTS.md) (or [`CLAUDE.md`](CLAUDE.md) if you're Claude Code).\n\n## Install\n\n### On an agent platform (recommended)\n\nGBrain is designed to be installed and operated by an AI agent. If you don't have one running yet:\n\n- **[OpenClaw](https://openclaw.ai)** ... Deploy [AlphaClaw on Render](https://render.com/deploy?repo=https://github.com/chrysb/alphaclaw) (one click, 8GB+ RAM)\n- **[Hermes Agent](https://github.com/NousResearch/hermes-agent)** ... Deploy on [Railway](https://github.com/praveen-ks-2001/hermes-agent-template) (one click)\n\nPaste this into your agent:\n\n```\nRetrieve and follow the instructions at:\nhttps://raw.githubusercontent.com/garrytan/gbrain/master/INSTALL_FOR_AGENTS.md\n```\n\nThat's it. The agent clones the repo, installs GBrain, sets up the brain, loads 34 skills, and configures recurring jobs. You answer a few questions about API keys. ~30 minutes.\n\nIf your agent doesn't auto-read `AGENTS.md`, point it at that file first:\n`https://raw.githubusercontent.com/garrytan/gbrain/master/AGENTS.md` is the non-Claude\nagent operating protocol (install, read order, trust boundary, common tasks). For\nthe full doc map, use `llms.txt` at the same URL root.\n\n### Standalone CLI (no agent)\n\n```bash\ngit clone https://github.com/garrytan/gbrain.git && cd gbrain && bun install && bun link\ngbrain init                     # local brain, ready in 2 seconds\ngbrain import ~/notes/          # index your markdown\ngbrain query \"what themes show up across my notes?\"\n```\n\n**Do NOT use `bun install -g github:garrytan/gbrain`.** Bun blocks the top-level\npostinstall hook on global installs, so schema migrations never run and the CLI\naborts with `Aborted()` the first time it opens PGLite. Use `git clone + bun install\n&& bun link` as shown above. See [#218](https://github.com/garrytan/gbrain/issues/218).\n\n```\n3 results (hybrid search, 0.12s):\n\n1. concepts/do-things-that-dont-scale (score: 0.94)\n   PG's argument that unscalable effort teaches you what users want.\n   [Source: paulgraham.com, 2013-07-01]\n\n2. originals/founder-mode-observation (score: 0.87)\n   Deep involvement isn't micromanagement if it expands the team's thinking.\n\n3. concepts/build-something-people-want (score: 0.81)\n   The YC motto. Connected to 12 other brain pages.\n```\n\n### MCP server (Claude Code, Cursor, Windsurf)\n\nGBrain exposes 30+ MCP tools via stdio:\n\n```json\n{\n  \"mcpServers\": {\n    \"gbrain\": { \"command\": \"gbrain\", \"args\": [\"serve\"] }\n  }\n}\n```\n\nAdd to `~/.claude/server.json` (Claude Code), Settings > MCP Servers (Cursor), or your client's MCP config.\n\n### Remote MCP with OAuth 2.1 (ChatGPT, Claude Desktop, Cowork, Perplexity)\n\n`gbrain serve --http` starts a production-grade OAuth 2.1 server with an embedded admin dashboard. Zero external infrastructure. Every major AI client connects, every request is scoped, every action is logged.\n\n```bash\n# Start the HTTP server (prints admin bootstrap token on first start)\ngbrain serve --http --port 3131\n\n# Open the admin dashboard, paste the bootstrap token, register a client\nopen http://localhost:3131/admin\n\n# Expose publicly (set --public-url so the OAuth issuer matches)\nngrok http 3131 --url your-brain.ngrok.app\ngbrain serve --http --port 3131 --public-url https://your-brain.ngrok.app\n\n# ChatGPT and other OAuth-aware clients can also connect:\nclaude mcp add gbrain -t http https://your-brain.ngrok.app/mcp -H \"Authorization: Bearer TOKEN\"\n```\n\nRegister OAuth clients from the `/admin` dashboard — click **Register client**,\npick scopes, save the credentials shown once in the reveal modal. Programmatic\nregistration via `oauthProvider.registerClientManual(...)` and the\n`gbrain auth register-client` CLI are also available.\n\n- **OAuth 2.1 via the MCP SDK** — client credentials (machine-to-machine: Perplexity, Claude), autho
