<script id="project-data" type="application/json">[{"owner":"Hmbown","repo":"DeepSeek-TUI","url":"https://github.com/Hmbown/DeepSeek-TUI","readme":"# CodeWhale\n\n> Terminal coding agent for DeepSeek V4. It runs from the `codewhale` command, streams reasoning blocks, edits local workspaces with approval gates, and includes an auto mode that chooses both model and thinking level per turn.\n\n[简体中文 README](README.zh-CN.md)\n[日本語 README](README.ja-JP.md)\n[Tiếng Việt README](README.vi.md)\n\n\n## Install\n\n`codewhale` installs as a matched pair of self-contained Rust release binaries:\nthe `codewhale` dispatcher command and the sibling `codewhale-tui` runtime it\nlaunches for interactive sessions. npm and Docker install both for you; Cargo\nand manual installs must put both binaries in the same directory\n(normally a directory on your `PATH`). The npm package is only an\ninstaller/wrapper for those release binaries; the agent does not run on Node.\n\n```bash\n# 1. npm — easiest if you already use Node. The package downloads the\n#    matching prebuilt Rust binaries from GitHub Releases.\nnpm install -g codewhale\n\n# 2. Cargo — no Node needed. Requires Rust 1.88+ (the crates use the\n#    2024 edition; older toolchains fail with \"feature `edition2024` is\n#    required\"). Run `rustup update` first, or use a non-Cargo path below.\ncargo install codewhale-cli --locked   # `codewhale` (entry point)\ncargo install codewhale-tui     --locked   # `codewhale-tui` (TUI binary)\n\n# 3. Homebrew — legacy compatibility only.\n#    The tap/formula still uses the old deepseek-tui name. Prefer npm, Cargo,\n#    Docker, or direct downloads for new installs until the formula is renamed.\nbrew tap Hmbown/deepseek-tui\nbrew install deepseek-tui\n\n# 4. Direct download — platform archive from GitHub Releases.\n#    https://github.com/Hmbown/CodeWhale/releases\n#    Archives include both codewhale and codewhale-tui plus an install script.\n#    Individual binaries are also attached for scripts; keep the pair together.\n\n# 5. Docker — prebuilt release image.\ndocker volume create codewhale-home\ndocker run --rm -it \\\n  -e DEEPSEEK_API_KEY=\"$DEEPSEEK_API_KEY\" \\\n  -v codewhale-home:/home/codewhale/.codewhale \\\n  -v \"$PWD:/workspace\" \\\n  -w /workspace \\\n  ghcr.io/hmbown/codewhale:latest\n```\n\n> In mainland China, speed up the npm path with\n> `--registry=https://registry.npmmirror.com`, or use the\n> [Cargo mirror](#china--mirror-friendly-installation) below.\n>\n> Download safety: official release binaries live under\n> `https://github.com/Hmbown/CodeWhale/releases`. For manual downloads,\n> verify the SHA-256 manifest and avoid look-alike repositories or search-result\n> mirrors. See [download safety and checksums](docs/INSTALL.md#2-download-safety-and-checksums).\n\nAlready installed? Use the updater that matches the install path:\n\n```bash\ncodewhale update                         # release-binary updater\nnpm install -g codewhale@latest      # npm wrapper\nbrew update && brew upgrade deepseek-tui  # legacy Homebrew installs only\ncargo install codewhale-cli --locked --force\ncargo install codewhale-tui     --locked --force\n```\n\n> codewhale update now supports --proxy, update through a proxy\n> eg: codewhale update --proxy https://localhost:7897\n\n[![CI](https://github.com/Hmbown/CodeWhale/actions/workflows/ci.yml/badge.svg)](https://github.com/Hmbown/CodeWhale/actions/workflows/ci.yml)\n[![npm](https://img.shields.io/npm/v/codewhale)](https://www.npmjs.com/package/codewhale)\n[![crates.io](https://img.shields.io/crates/v/codewhale-cli?label=crates.io)](https://crates.io/crates/codewhale-cli)\n[DeepWiki project index](https://deepwiki.com/Hmbown/CodeWhale)\n\n![codewhale screenshot](assets/screenshot.png)\n\n---\n\n## What Is It?\n\nA model answers a question. An agent finishes a task. The difference is\nthe harness — a system of rules, evidence, and feedback that keeps the\nmodel oriented instead of drifting.\n\nCodeWhale is that harness, built around DeepSeek V4 and guided by three ideas:\n\n| Principle | How it works |\n|---|---|\n| **Start with trust** | Every turn begins with \"A\" — possibility before certainty, craft before convenience |\n| **Clear jurisdiction** | A written Constitution with nine tiers of authority. User intent outranks stale instructions. Verification outranks confidence. |\n| **Recursive improvement** | V4 helped write the harness. As the harness improves, V4 becomes more effective — and helps improve the harness further. Each turn starts stronger. |\n\nIt's open source, terminal-native, and packaged as a matched `codewhale` /\n`codewhale-tui` Rust binary pair.\n\n## How the Harness Works\n\nAgentic models deal with conflicting information at scale: user intent,\nproject rules, system defaults, tool output, and stale memory all compete\nfor authority in a single turn. LLM-as-a-judge needs jurisdiction — which\nsource wins when they disagree?\n\nCodeWhale answers this with a **Constitution** (`prompts/base.md`). It's a\nformal hierarchy of law — Article VII ranks nine sources from the\nConstitution's own articles down to prior-session handoffs. The user's\ncurrent message outranks stale project instructions. Live tool output\noutranks assumptions. Verification outranks confidence. The model inherits\na clear chain of authority every turn and never has to guess which\ndirective to follow.\n\nSeven articles sit above the hierarchy, defining the model's identity,\nduties, and agency: a verification mandate (Article V — every action leaves\nevidence, never declare success on faith), a coordination legacy (Article\nVI — leave the workspace legible for the next intelligence), and a\nprimacy-of-truth clause (Article II — no lower rule may override it).\n\nDeepSeek V4's prefix caching makes this practical. The Constitution is long\nand detailed, but once cached it costs roughly 100× less per turn than a\ncold read. The model references it recursively — peeking, scanning, and\nquerying through RLM sessions — revisiting information on demand rather\nthan relying on a single memorized pass. It performs more like an\nopen-book test than a closed one.\n\nBecause the authority structure is explicit, failure isn't hidden. Non-zero\nexit codes, type errors from rust-analyzer arriving between turns, sandbox\ndenials — these are fed back as correction vectors. The model uses its own\ndrift to self-correct.\n\nThree modes control the action space. Plan is read-only. Agent gates\ndestructive operations behind approval. YOLO auto-approves in trusted\nworkspaces. macOS Seatbelt is the active sandbox; Linux Landlock is\ndetected but not yet enforced; Windows sandboxing is not yet advertised.\n\nFin — a cheap Flash call with thinking off — handles model auto-routing per\nturn. `--model auto` is the default.\n\nEvery turn records a side-git snapshot outside your repo's `.git`.\n`/restore` and `revert_turn` roll back the workspace.\n\nSub-agents run concurrently (up to 20). `agent_open` returns immediately;\nresults arrive inline as completion sentinels with a summary. Full\ntranscripts stay behind bounded handles through `agent_eval`. See\n[docs/SUBAGENTS.md](docs/SUBAGENTS.md).\n\nThe rest of the surface: LSP diagnostics after every edit (rust-analyzer,\npyright, typescript-language-server, gopls, clangd, jdtls,\nvue-language-server), RLM sessions for batched analysis, MCP protocol,\nHTTP/SSE runtime API, persistent task queue, ACP adapter for Zed,\nSWE-bench export, and live cost tracking with cache hit/miss breakdowns.\n\n---\n\n## The Harness\n\n`codewhale` (dispatcher CLI) → `codewhale-tui` (companion binary) → ratatui interface ↔ async engine ↔ OpenAI-compatible streaming client. Tool calls route through a typed registry (shell, file ops, git, web, sub-agents, MCP, RLM) and results stream back into the transcript. The engine manages session state, turn tracking, the durable task queue, and an LSP subsystem that feeds post-edit diagnostics into the model's context before the next reasoning step.\n\nSee [docs/ARCHITECTURE.md](docs/ARCHITECTURE.md) for the full walkthrough.\n\n### Sub-agents: Concurrent Background Execution\n\nCodeWhale can dispatch multiple sub-agents that run in parallel — like a concurrent task queue:\n\n- **Non-blocking launch.** `agent_open` returns immediately. The child gets its own fresh context and tool registry and runs independently. The parent keeps working.\n- **Background execution.** Sub-agents execute concurrently (default cap: 10, configurable to 20). The engine manages the pool — no polling loop needed.\n- **Completion notification.** When a sub-agent finishes, the runtime injects a `<codewhale:subagent.done>` sentinel into the parent's transcript. The human-readable summary — including the child's findings, changed files, and any risks — sits on the line immediately before the sentinel. The parent model reads that summary and integrates findings without an extra tool call.\n- **Bounded result retrieval.** The full child transcript lives behind a `transcript_handle` accessible through `agent_eval`. When the summary isn't enough, the parent calls `handle_read` for slices, line ranges, or JSONPath projections — keeping the parent context lean without losing access to the details.\n\nSee [docs/SUBAGENTS.md](docs/SUBAGENTS.md) for the full sub-agent reference.\n\n---\n\n## Quickstart\n\n```bash\nnpm install -g codewhale\ncodewhale --version\ncodewhale --model auto\n```\n\nPrebuilt binary pairs and platform archives are published for **Linux x64**, **Linux ARM64** (v0.8.8+), **macOS x64**, **macOS ARM64**, and **Windows x64**. For other targets (musl, riscv64, FreeBSD, etc.), see [Install from source](#install-from-source) or [docs/INSTALL.md](docs/INSTALL.md).\n\nOn first launch you'll be prompted for your [DeepSeek API key](https://platform.deepseek.com/api_keys). The key is saved to `~/.codewhale/config.toml` (legacy `~/.deepseek/config.toml` also supported) so it works from any directory without OS credential prompts.\n\nYou can also set it ahead of time:\n\n```bash\ncodewhale auth set --provider deepseek   # saves to ~/.codewhale/config.toml\ncodewhale auth status                    # shows the active credential source\n\nexport DEEPSEEK_API_KEY=\"YOUR_KEY\"      # env var alternative; use ~/.zshenv for non-interactive shells\ncodewhale\n\ncodewhale doctor                         # verify setup\n```\n\nIf `codewhale doctor` says the rejected key came from `DEEPSEEK_API_KEY`, remove\nthe stale export from your shell startup file, open a fresh shell, or run\n`codewhale auth set --provider deepseek`. Use `codewhale auth status` to see the\nconfig, keyring, and env-var source state without printing the key. Saved config\nkeys take precedence over the keyring and environment and are easier to rotate.\n\n> To rotate or remove a saved key: `codewhale auth clear --provider deepseek`.\n\n### Tencent Cloud / CNB Remote-First Path\n\nFor an always-on workspace you can control from a phone, use the Tencent-native\npath: CNB mirror/source, Tencent Lighthouse HK, a Feishu/Lark long-connection\nbridge, and optional EdgeOne for a deliberate public HTTPS edge. The runtime API\nstays bound to localhost; EdgeOne is not used to expose `/v1/*`.\n\nStart with [docs/TENCENT_CLOUD_REMOTE_FIRST.md](docs/TENCENT_CLOUD_REMOTE_FIRST.md),\nthen use [docs/TENCENT_LIGHTHOUSE_HK.md](docs/TENCENT_LIGHTHOUSE_HK.md) for the\nserver runbook.\n\n### Auto Mode\n\nUse `codewhale --model auto` or `/model auto` when you want codewhale to decide how much model and reasoning power a turn needs.\n\nAuto mode controls two settings together:\n\n- Model: `deepseek-v4-flash` or `deepseek-v4-pro`\n- Thinking: `off`, `high`, or `max`\n\nBefore the real turn is sent, the app makes a small `deepseek-v4-flash` routing call with thinking off. That router looks at the latest request and recent context, then selects a concrete model and thinking level for the real request. Short/simple turns can stay on Flash with thinking off; coding, debugging, release work, architecture, security review, or ambiguous multi-step tasks can move up to Pro and/or higher thinking.\n\n`auto` is local to codewhale. The upstream API never receives `model: \"auto\"`; it receives the concrete model and thinking setting chosen for that turn. The TUI shows the selected route, and cost tracking is charged against the model that actually ran. If the router call fails or returns an invalid answer, the app falls back to a local heuristic. Sub-agents inherit auto mode unless you assign them an explicit model.\n\nUse a fixed model or fixed thinking level when you want repeatable benchmarking, a strict cost ceiling, or a specific provider/model mapping.\n\n### Linux ARM64 (Raspberry Pi, Asahi, Graviton, HarmonyOS PC)\n\n`npm i -g codewhale` works on glibc-based ARM64 Linux from v0.8.8 onward. You can also download prebuilt binaries from the [Releases page](https://github.com/Hmbown/CodeWhale/releases) and place them side by side on your `PATH`.\n\n### China / Mirror-friendly Installation\n\nIf GitHub or npm downloads are slow from mainland China, use a Cargo registry mirror:\n\n```toml\n# ~/.cargo/config.toml\n[source.crates-io]\nreplace-with = \"tuna\"\n\n[source.tuna]\nregistry = \"sparse+https://mirrors.tuna.tsinghua.edu.cn/crates.io-index/\"\n```\n\nThen install both binaries (the dispatcher delegates to the TUI at runtime):\n\n```bash\ncargo install codewhale-cli --locked   # provides `codewhale`\ncargo install codewhale-tui     --locked   # provides `codewhale-tui`\ncodewhale --version\n```\n\nPrebuilt binaries can also be downloaded from [GitHub Releases](https://github.com/Hmbown/CodeWhale/releases). Use `DEEPSEEK_TUI_RELEASE_BASE_URL` for mirrored release assets.\n\n### Windows (Scoop)\n\n[Scoop](https://scoop.sh) is a Windows package manager. The `codewhale` package is listed\nin Scoop's main bucket, but that manifest updates independently and can lag the\nGitHub/npm/Cargo release. Run `scoop update` first, then verify the installed\nversion with `codewhale --version`:\n\n```bash\nscoop update\nscoop install codewhale\ncodewhale --version\n```\n\nUse npm or direct GitHub release downloads when you need the newest release\nbefore Scoop's manifest catches up.\n\n\n<details id=\"install-from-source\">\n<summary>Install from source</summary>\n\nWorks on any Tier-1 Rust target — including musl, riscv64, FreeBSD, and older ARM64 distros.\n\n```bash\n# Linux build deps (Debian/Ubuntu/RHEL):\n#   sudo apt-get install -y build-essential pkg-config libdbus-1-dev\n#   sudo dnf install -y gcc make pkgconf-pkg-config dbus-devel\n\ngit clone https://github.com/Hmbown/CodeWhale.git\ncd CodeWhale\n\ncargo install --path crates/cli --locked   # requires Rust 1.88+; provides `codewhale`\ncargo install --path crates/tui --locked   # provides `codewhale-tui`\n```\n\nBoth binaries are required. Cross-compilation and platform-specific notes: [docs/INSTALL.md](docs/INSTALL.md).\n\n</details>\n\n### Other API Providers\n\nFor the full shipped provider registry, including model IDs, auth variables,\nbase URLs, and capability boundaries, see [docs/PROVIDERS.md](docs/PROVIDERS.md).\n\n```bash\n# NVIDIA NIM\ncodewhale auth set --provider nvidia-nim --api-key \"YOUR_NVIDIA_API_KEY\"\ncodewhale --provider nvidia-nim\n\n# AtlasCloud\ncodewhale auth set --provider atlascloud --api-key \"YOUR_ATLASCLOUD_API_KEY\"\ncodewhale --provider atlascloud\ncodewhale --provider atlascloud --model vendor/model-id\n\n# Wanjie Ark\ncodewhale auth set --provider wanjie-ark --api-key \"YOUR_WANJIE_API_KEY\"\ncodewhale --provider wanjie-ark --model deepseek-reasoner\n\n# OpenRouter\ncodewhale auth set --provider openrouter --api-key \"YOUR_OPENROUTER_API_KEY\"\ncodewhale --provider openrouter --model deepseek/deepseek-v4-pro\ncodewhale --provider openrouter --model arcee-ai/trinity-large-thinking\ncodewhale --provider openrouter --model minimax/minimax-m3\n\n# Xiaomi MiMo\ncodewhale auth set --provider xiaomi-mimo --api-key \"YOUR_XIAOMI_KEY\"\ncodewhale --provider xiaomi-mimo --model mimo-v2.5-pro\ncodewhale --provider xiaomi-mimo speech \"Hello from MiMo\" --model tts -o hello.wav\n\n# Novita\ncodewhale auth set --provider novita --api-key \"YOUR_NOVITA_API_KEY\"\ncodewhale --provider novita --model deepseek/deepseek-v4-pro\n\n# Fireworks\ncodewhale auth set --provider fireworks --api-key \"YOUR_FIREWORKS_API_KEY\"\ncodewhale --provider fireworks --model deepseek-v4-pro\n\n# SiliconFlow\ncodewhale auth set --provider siliconflow --api-key \"YOUR_SILICONFLOW_API_KEY\"\ncodewhale --provider siliconflow --model deepseek-ai/DeepSeek-V4-Pro\n\n# Generic OpenAI-compatible endpoint\ncodewhale auth set --provider openai --api-key \"YOUR_OPENAI_COMPATIBLE_API_KEY\"\nOPENAI_BASE_URL=\"https://openai-compatible.example/v4\" codewhale --provider openai --model glm-5\n\n# Custom DeepSeek-compatible endpoint\nDEEPSEEK_BASE_URL=\"https://your-provider.example/v1\" \\\n  DEEPSEEK_MODEL=\"deepseek-ai/DeepSeek-V4-Pro\" \\\n  codewhale --provider deepseek\n\n# Self-hosted SGLang\nSGLANG_BASE_URL=\"http://localhost:30000/v1\" codewhale --provider sglang --model deepseek-v4-flash\n\n# Self-hosted vLLM\nVLLM_BASE_URL=\"http://localhost:8000/v1\" codewhale --provider vllm --model deepseek-v4-flash\n# Trusted LAN vLLM over HTTP\nDEEPSEEK_ALLOW_INSECURE_HTTP=1 VLLM_BASE_URL=\"http://192.168.0.110:8000/v1\" codewhale --provider vllm --model deepseek-v4-flash\n\n# Self-hosted Ollama\nollama pull codewhale-coder:1.3b\ncodewhale --provider ollama --model codewhale-coder:1.3b\n```\n\nInside the TUI, `/provider` opens the provider picker and `/model` opens the\nlocal model/thinking picker. `/provider openrouter` and `/model <id>` switch\ndirectly, while `/models` explicitly fetches and lists live API models when the\nactive provider supports model listing.\n\n---\n\n## Release Notes\n\nRelease-specific changes live in [CHANGELOG.md](CHANGELOG.md). This README\nstays focused on current install paths, core workflows, provider setup, runtime\ninterfaces, and extension points.\n\n---\n\n## Usage\n\n```bash\ncodewhale                                         # interactive TUI\ncodewhale \"explain this function\"                 # one-shot prompt\ncodewhale exec --auto --output-format stream-json \"fix this bug\"  # NDJSON backend stream\ncodewhale exec --resume <SESSION_ID> \"follow up\"  # continue a non-interactive session\ncodewhale --model deepseek-v4-flash \"summarize\"   # model override\ncodewhale --model auto \"fix this bug\"             # auto-select model + thinking\ncodewhale --yolo                                  # auto-approve tools\ncodewhale auth set --provider deepseek            # save API key\ncodewhale doctor                                  # check setup & connectivity\ncodewhale doctor --json                           # machine-readable diagnostics\ncodewhale setup --status                          # read-only setup status\ncodewhale setup --tools --plugins                 # scaffold tool/plugin dirs\ncodewhale models                                  # list live API models\ncodewhale sessions                                # list saved sessions with timestamps\ncodewhale resume --last                           # resume the most recent session in this workspace\ncodewhale resume <SESSION_ID>                     # resume a specific session by UUID\ncodewhale fork <SESSION_ID>                       # fork a saved session into a sibling path\ncodewhale serve --http                            # HTTP/SSE API server\ncodewhale serve --mobile                          # LAN mobile control page; token-gated by default\ncodewhale serve --acp                             # ACP stdio adapter for Zed/custom agents\ncodewhale run pr <N>                              # fetch PR and pre-seed review prompt\ncodewhale mcp list                                # list configured MCP servers\ncodewhale mcp validate                            # validate MCP config/connectivity\ncodewhale mcp-server                              # run dispatcher MCP stdio server\ncodewhale update                                  # check for and apply binary updates\n```\n\nInside the interactive TUI composer, prefix a line with `!` to run a shell\ncommand through the normal approval, sandbox, and output surfaces, for example\n`! cargo test -p codewhale-tui sidebar`.\n\n### Branching Conversations\n\nSaved sessions are intentionally branchable. `codewhale fork <SESSION_ID>` copies\nan existing saved session into a new sibling session, records the parent session\nid in metadata, and opens that fork so you can explore an alternate direction\nwithout polluting the original path. The session picker and `codewhale sessions`\nmark forked sessions with their parent id.\n\n`codewhale sessions` lists saved sessions across workspaces and includes the\nlast-updated timestamp. `codewhale resume --last` and `codewhale --continue`\nchoose the latest session for the current workspace; pass an explicit session id\nwhen resuming work from another directory.\n\nInside the TUI, Esc-Esc backtrack can rewind the active transcript to a prior\nuser prompt and put that prompt back in the composer for editing. `/restore`\nand `revert_turn` are separate workspace rollback tools: they restore files\nfrom side-git snapshots but do not rewrite conversation history.\n\nDocker images are published to GHCR for release builds:\n\n```bash\ndocker volume create codewhale-home\n\ndocker run --rm -it \\\n  -e DEEPSEEK_API_KEY=\"$DEEPSEEK_API_KEY\" \\\n  -v codewhale-home:/home/codewhale/.codewhale \\\n  -v \"$PWD:/workspace\" \\\n  -w /workspace \\\n  ghcr.io/hmbown/codewhale:latest\n```\n\nSee [docs/DOCKER.md](docs/DOCKER.md) for pinned tags, local image builds,\nvolume ownership notes, and non-interactive pipeline usage.\n\n### Zed / ACP\n\nDeepSeek can run as a custom Agent Client Protocol server for editors that\nspawn local ACP agents over stdio. In Zed, add a custom agent server:\n\n```json\n{\n  \"agent_servers\": {\n    \"DeepSeek\": {\n      \"type\": \"custom\",\n      \"command\": \"codewhale\",\n      \"args\": [\"serve\", \"--acp\"],\n      \"env\": {}\n    }\n  }\n}\n```\n\nThe first ACP slice supports new sessions and prompt responses through your\nexisting DeepSeek config/API key. Tool-backed editing and checkpoint replay are\nnot exposed through ACP yet.\n\nCommunity-maintained adapter: [acp-codewhale-adapter](https://github.com/rockeverm3m/acp-codewhale-adapter)\nbridges `codewhale exec --auto` to `cc-connect` for users who need tool-backed\nACP workflows outside the built-in Zed slice.\n\n### Keyboard Shortcuts\n\n| Key | Action |\n|---|---|\n| `Tab` | Complete `/` or `@` entries; while running, queue draft as follow-up; otherwise cycle mode |\n| `Shift+Tab` | Cycle reasoning-effort: off → high → max |\n| `F1` | Searchable help overlay |\n| `Esc` | Back / dismiss |\n| `Ctrl+K` | Command palette |\n| `Ctrl+R` | Resume an earlier session |\n| `Alt+R` | Search prompt history and recover cleared drafts |\n| `Ctrl+S` | Stash current draft (`/stash list`, `/stash pop` to recover) |\n| `@path` | Attach file/directory context in composer |\n| `↑` (at composer start) | Select attachment row for removal |\n\nFull shortcut catalog: [docs/KEYBINDINGS.md](docs/KEYBINDINGS.md).\n\n---\n\n## Modes\n\n| Mode | Behavior |\n| --- | --- |\n| **Plan** 🔍 | Read-only investigation — model explores and proposes a plan before making changes; multi-step investigations use `checklist_write` |\n| **Agent** 🤖 | Default interactive mode — multi-step tool use with approval gates; substantial work is tracked with `checklist_write` |\n| **YOLO** ⚡ | Auto-approve all tools in a trusted workspace; multi-step work still keeps a visible checklist |\n\n---\n\n## Configuration\n\nUser config: `~/.codewhale/config.toml` (legacy `~/.deepseek/config.toml` fallback). Project overlay: `<workspace>/.codewhale/config.toml` (legacy `<workspace>/.deepseek/config.toml`) (denied: `api_key`, `base_url`, `provider`, `mcp_config_path`). [config.example.toml](config.example.toml) has every option.\n\nThe TUI footer can be trimmed with `/statusline`, or by setting\n`[tui].status_items` in config. Current footer customization selects from the\nbuilt-in chips such as `mode`, `model`, `status`, `git_branch`, `tokens`, and\n`cache`; chip order is controlled by the order of keys in `status_items` in\n`config.toml`. The interactive picker writes the canonical order. Multi-line\nlayouts, custom colors, and external command widgets are not part of the\ncurrent statusline surface.\n\nCustom DeepSeek-compatible endpoints usually do not need a new provider. Keep\n`provider = \"deepseek\"` and set `[providers.deepseek].base_url` / `model`, or\nuse `provider = \"openai\"` for generic OpenAI-compatible gateways. Keep\n`provider`, `api_key`, and `base_url` in user config or environment variables;\nproject overlays cannot set them.\n\nKey environment variables:\n\n| Variable | Purpose |\n|---|---|\n| `DEEPSEEK_API_KEY` | API key |\n| `DEEPSEEK_BASE_URL` | API base URL |\n| `DEEPSEEK_HTTP_HEADERS` | Optional custom model request headers, e.g. `X-Model-Provider-Id=your-model-provider` |\n| `DEEPSEEK_MODEL` | Default model |\n| `DEEPSEEK_STREAM_IDLE_TIMEOUT_SECS` | Stream idle timeout in seconds, default `300`, clamped to `1..=3600` |\n| `CODEWHALE_PROVIDER` / `DEEPSEEK_PROVIDER` | `deepseek` (default), `nvidia-nim`, `openai`, `atlascloud`, `wanjie-ark`, `volcengine`, `openrouter`, `xiaomi-mimo`, `novita`, `fireworks`, `siliconflow`, `moonshot`, `sglang`, `vllm`, `ollama` |\n| `DEEPSEEK_PROFILE` | Config profile name |\n| `DEEPSEEK_MEMORY` | Set to `on` to enable user memory |\n| `DEEPSEEK_ALLOW_INSECURE_HTTP=1` | Allow non-local `http://` API base URLs on trusted networks |\n| `NVIDIA_API_KEY` / `OPENAI_API_KEY` / `ATLASCLOUD_API_KEY` / `WANJIE_ARK_API_KEY` / `VOLCENGINE_API_KEY` / `OPENROUTER_API_KEY` / `XIAOMI_MIMO_API_KEY` / `XIAOMI_API_KEY` / `MIMO_API_KEY` / `NOVITA_API_KEY` / `FIREWORKS_API_KEY` / `SILICONFLOW_API_KEY` / `MOONSHOT_API_KEY` / `KIMI_API_KEY` / `SGLANG_API_KEY` / `VLLM_API_KEY` / `OLLAMA_API_KEY` | Provider auth |\n| `OPENAI_BASE_URL` / `OPENAI_MODEL` | Generic OpenAI-compatible endpoint and model ID |\n| `ATLASCLOUD_BASE_URL` / `ATLASCLOUD_MODEL` | AtlasCloud endpoint and model override |\n| `WANJIE_ARK_BASE_URL` / `WANJIE_ARK_MODEL` | Wanjie Ark endpoint and model override |\n| `OPENROUTER_BASE_URL` | OpenRouter endpoint override |\n| `XIAOMI_MIMO_BASE_URL` / `MIMO_BASE_URL` / `XIAOMI_MIMO_MODEL` / `MIMO_MODEL` | Xiaomi MiMo endpoint and model override |\n| `NOVITA_BASE_URL` | Novita endpoint override |\n| `FIREWORKS_BASE_URL` | Fireworks endpoint override |\n| `SILICONFLOW_BASE_URL` / `SILICONFLOW_MODEL` | SiliconFlow endpoint and model override |\n| `SGLANG_BASE_URL` | Self-hosted SGLang endpoint |\n| `SGLANG_MODEL` | Self-hosted SGLang model ID |\n| `VLLM_BASE_URL` | Self-hosted vLLM endpoint |\n| `VLLM_MODEL` | Self-hosted vLLM model ID |\n| `OLLAMA_BASE_URL` | Self-hosted Ollama endpoint |\n| `OLLAMA_MODEL` | Self-hosted Ollama model tag |\n| `NO_ANIMATIONS=1` | Force accessibility mode at startup |\n| `SSL_CERT_FILE` | Custom CA bundle for corporate proxies |\n\nSet `locale` in `settings.toml`, use `/config locale zh-Hans`, or rely on `LC_ALL`/`LANG` to choose UI chrome and the fallback language sent to V4 models. The latest user message still wins for natural-language reasoning and replies, so Chinese user turns stay Chinese even on an English system locale. See [docs/CONFIGURATION.md](docs/CONFIGURATION.md) and [docs/MCP.md](docs/MCP.md).\n\n---\n\n## Models & Pricing\n\n| Model | Context | Input (cache hit) | Input (cache miss) | Output |\n|---|---|---|---|---|\n| `deepseek-v4-pro` | 1M | $0.003625 / 1M | $0.435 / 1M | $0.87 / 1M |\n| `deepseek-v4-flash` | 1M | $0.0028 / 1M | $0.14 / 1M | $0.28 / 1M |\n\nDeepSeek Platform defaults to `https://api.deepseek.com/beta` so beta-gated API features can be tested without extra setup. Set `base_url = \"https://api.deepseek.com\"` to opt out.\n\nLegacy aliases `deepseek-chat` / `deepseek-reasoner` map to `deepseek-v4-flash` and retire after July 24, 2026. NVIDIA NIM variants use your NVIDIA account terms.\n\n> [!Note]\n> DeepSeek's pricing page now lists the V4 Pro rates above as the permanent prices: the previous 75% promotional discount has been folded into a one-quarter base-rate adjustment as the promotion window closes on 15:59 UTC on 31 May 2026. The TUI cost estimator already uses these values, so no behavioural change is required. For any future price changes, consult the official [DeepSeek pricing page](https://api-docs.deepseek.com/zh-cn/quick_start/pricing).\n\n---\n\n## Publishing Your Own Skill\n\ncodewhale discovers skills from workspace directories (`.agents/skills` → `skills` → `.opencode/skills` → `.claude/skills` → `.cursor/skills`) and global directories (`~/.agents/skills` → `~/.claude/skills` → `~/.codewhale/skills` → `~/.deepseek/skills`). Each skill is a directory with a `SKILL.md` file:\n\n```text\n~/.agents/skills/my-skill/\n└── SKILL.md\n```\n\nFrontmatter required:\n\n```markdown\n---\nname: my-skill\ndescription: Use this when DeepSeek should follow my custom workflow.\n---\n\n# My Skill\nInstructions for the agent go here.\n```\n\nCommands: `/skills` (list), `/skill <name>` (activate), `/skill new` (scaffold), `/skill install github:<owner>/<repo>` (community), `/skill update` / `uninstall` / `trust`. Community installs from GitHub require no backend service. Installed skills appear in the model-visible session context; the agent can auto-select relevant skills via the `load_skill` tool when your task matches their descriptions.\n\nFirst launch also installs bundled system skills for common workflows:\n`skill-creator`, `delegate`, `v4-best-practices`, `plugin-creator`,\n`skill-installer`, `mcp-builder`, `documents`, `presentations`,\n`spreadsheets`, `pdf`, and `feishu`. These live under\n`~/.codewhale/skills` (or legacy `~/.deepseek/skills`) and are versioned so new bundles are added on upgrade\nwithout recreating skills the user deliberately deleted.\n\n---\n\n## Documentation\n\n| Doc | Topic |\n|---|---|\n| [GUIDE.md](docs/GUIDE.md) | First-run user guide |\n| [ARCHITECTURE.md](docs/ARCHITECTURE.md) | Codebase internals |\n| [CONFIGURATION.md](docs/CONFIGURATION.md) | Full config reference |\n| [PROVIDERS.md](docs/PROVIDERS.md) | Provider IDs, auth, model defaults, and capability metadata |\n| [MODES.md](docs/MODES.md) | Plan / Agent / YOLO modes |\n| [MCP.md](docs/MCP.md) | Model Context Protocol integration |\n| [RUNTIME_API.md](docs/RUNTIME_API.md) | HTTP/SSE API server and mobile control page |\n| [INSTALL.md](docs/INSTALL.md) | Platform-specific install guide |\n| [DOCKER.md](docs/DOCKER.md) | GHCR image, volumes, and Docker usage |\n| [CNB_MIRROR.md](docs/CNB_MIRROR.md) | CNB mirror and China-friendly install notes |\n| [TENCENT_CLOUD_REMOTE_FIRST.md](docs/TENCENT_CLOUD_REMOTE_FIRST.md) | Tencent/CNB/Lighthouse/Feishu remote-first path |\n| [TENCENT_LIGHTHOUSE_HK.md](docs/TENCENT_LIGHTHOUSE_HK.md) | Lighthouse Hong Kong server setup |\n| [MEMORY.md](docs/MEMORY.md) | User memory feature guide |\n| [SUBAGENTS.md](docs/SUBAGENTS.md) | Sub-agent role taxonomy and lifecycle |\n| [KEYBINDINGS.md](docs/KEYBINDINGS.md) | Full shortcut catalog |\n| [RELEASE_RUNBOOK.md](docs/RELEASE_RUNBOOK.md) | Release process |\n| [LOCALIZATION.md](docs/LOCALIZATION.md) | UI locale matrix & switching |\n| [OPERATIONS_RUNBOOK.md](docs/OPERATIONS_RUNBOOK.md) | Ops & recovery |\n\nFull Changelog: [CHANGELOG.md](CHANGELOG.md).\n\n---\n\n## Thanks\n\n- **[DeepSeek](https://github.com/deepseek-ai)** — thank you for the models and support that power every turn. 感谢 DeepSeek 提供模型与支持，让每一次交互成为可能。\n- **[DataWhale](https://github.com/datawhalechina)** 🐋 — thank you for your support and for welcoming us into the Whale Brother family. 感谢 DataWhale 的支持，并欢迎我们加入“鲸兄弟”大家庭。\n- **[OpenWarp](https://github.com/zerx-lab/warp)** — thank you for prioritizing codewhale support and for collaborating on a better terminal-agent experience.\n- **[Open Design](https://github.com/nexu-io/open-design)** — thank you for support and collaboration around design-forward agent workflows.\n\nThis project ships with help from a growing community of contributors:\n\n- **[merchloubna70-dot](https://github.com/merchloubna70-dot)** — 28 PRs spanning features, fixes, and VS Code extension scaffolding (#645–#681)\n- **[WyxBUPT-22](https://github.com/WyxBUPT-22)** — Markdown rendering for tables, bold/italic, and horizontal rules (#579)\n- **[loongmiaow-pixel](https://github.com/loongmiaow-pixel)** — Windows + China install documentation (#578)\n- **[20bytes](https://github.com/20bytes)** — User memory docs and help polish (#569)\n- **[staryxchen](https://github.com/staryxchen)** — glibc compatibility preflight (#556)\n- **[Vishnu1837](https://github.com/Vishnu1837)** — glibc compatibility improvements and terminal restoration on SIGINT/SIGTERM (#565, #1586)\n- **[shentoumengxin](https://github.com/shentoumengxin)** — Shell `cwd` boundary validation (#524)\n- **[toi500](https://github.com/toi500)** — Windows paste fix report\n- **[xsstomy](https://github.com/xsstomy)** — Terminal startup repaint report\n- **[melody0709](https://github.com/melody0709)** — Slash-prefix Enter activation report\n- **[lloydzhou](https://github.com/lloydzhou)** and **[jeoor](https://github.com/jeoor)** — Compaction cost reports; lloydzhou also contributed deterministic environment context (#813, #922) and KV prefix-cache stabilisation (#1080)\n- **[Agent-Skill-007](https://github.com/Agent-Skill-007)** — README clarity pass (#685)\n- **[woyxiang](https://github.com/woyxiang)** — Windows install documentation (#696)\n- **[wangfeng](mailto:wangfengcsu@qq.com)** — Pricing/discount info update (#692)\n- **[zichen0116](https://github.com/zichen0116)** — CODE_OF n harvested into the opt-in hook event path (#2333, #2430)\n- **[AdityaVG13](https://github.com/AdityaVG13)** — Xiaomi MiMo provider support (#2246)\n- **[New2Niu](https://github.com/New2Niu)** — macOS display notifications (#2260)\n- **[AiurArtanis](https://github.com/AiurArtanis)** — Solarized Light theme (#2270)\n- **[Lee-take](https://github.com/Lee-take)** — task migration and session environment isolation fixes (#2272)\n- **[LeoAlex0](https://github.com/LeoAlex0)** — session persistence fixes for message counts and tool-output cache preservation (#2388, #2395)\n- **[jimmyzhuu](https://github.com/jimmyzhuu)** — Baidu AI Search backend for `web_search` (#2371)\n- **[rockyzhang](https://github.com/rockyzhang)** — RISC-V prebuilt binary support (#2383)\n- **[mo-vic](https://github.com/mo-vic)** — `/purge` slash command for agent-driven context pruning (#2387)\n- **[hufanexplore](https://github.com/hufanexplore)** — Java and Vue language-server defaults (#2367)\n- **[hoclaptrinh33](https://github.com/hoclaptrinh33)** — Vietnamese localization support (#2358)\n- **[AccMoment](https://github.com/AccMoment)** — proxy option for the update command (#2281)\n- **[idling11](https://github.com/idling11)** — durable SlopLedger and `/hunt` rename/trophy-card work (#2161, #2306)\n- **[cyq1017](https://github.com/cyq1017)** — runtime event envelope, render-diff debug logging, and deterministic composer history flushing (#2252, #2332, #2375)\n- **[hongqitai](https://github.com/hongqitai)** — state schema parent-entry support and clippy/fmt cleanup (#2308, #2432)\n- **[BryonGo](https://github.com/BryonGo)** — effective-model compaction budgeting fix (#2437)\n\nReports, repros, and verification that shaped v0.8.48 also deserve visible\ncredit: **[@buko](https://github.com/buko)**, **[@yyyCode](https://github.com/yyyCode)**,\n**[@gaslebinh-glitch](https://github.com/gaslebinh-glitch)**, **[@Dr3259](https://github.com/Dr3259)**,\n**[@lpeng1711694086-lang](https://github.com/lpeng1711694086-lang)**, **[@VerrPower](https://github.com/VerrPower)**,\n**[@yan-zay](https://github.com/yan-zay)**, **[@jretz](https://github.com/jretz)**,\n**[@Neo-millunnium](https://github.com/Neo-millunnium)**, **[@caeserchen](https://github.com/caeserchen)**,\n**[@T-Phuong-Nguyen](https://github.com/T-Phuong-Nguyen)**, **[@zhyuzhyu](https://github.com/zhyuzhyu)**,\n**[@0gl20shk0sbt36](https://github.com/0gl20shk0sbt36)**, **[@hatakes](https://github.com/hatakes)**,\n**[@goodvecn-dev](https://github.com/goodvecn-dev)**, **[@bevis-wong](https://github.com/bevis-wong)**,\n**[@PurplePulse](https://github.com/PurplePulse)**, and **[@nbiish](https://github.com/nbiish)**.\n\n---\n\n## Contributing\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md). Pull requests welcome — check the [open issues](https://github.com/Hmbown/CodeWhale/issues) for good first contributions.\n\nSupport: [Buy me a coffee](https://www.buymeacoffee.com/hmbown).\n\n> [!Note]\n> *Not affiliated with DeepSeek Inc.*\n\n## License\n\n[MIT](LICENSE)\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/chart?repos=Hmbown/CodeWhale&type=date&legend=top-left)](https://www.star-history.com/?repos=Hmbown%2FCodeWhale&type=date&logscale=&legend=top-left)\n","summary":"CodeWhale is a terminal-based coding agent designed to streamline development tasks by leveraging the DeepSeek V4 model. It features a robust TUI for interactive sessions, supports streaming reasoning blocks, and provides essential security through local workspace approval gates. By utilizing an automated mode that intelligently selects the optimal model and thinking depth for each turn, CodeWhale is an ideal tool for developers seeking a reliable, high-performance assistant directly within their command-line workflow.","description":"DeepSeek + MiMo coding agent in terminal","stars":36664,"language":"Rust"},{"owner":"czlonkowski","repo":"n8n-mcp","url":"https://github.com/czlonkowski/n8n-mcp","readme":"# n8n-MCP\n\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](https://opensource.org/licenses/MIT)\n[![GitHub stars](https://img.shields.io/github/stars/czlonkowski/n8n-mcp?style=social)](https://github.com/czlonkowski/n8n-mcp)\n[![npm version](https://img.shields.io/npm/v/n8n-mcp.svg)](https://www.npmjs.com/package/n8n-mcp)\n[![codecov](https://codecov.io/gh/czlonkowski/n8n-mcp/graph/badge.svg?token=YOUR_TOKEN)](https://codecov.io/gh/czlonkowski/n8n-mcp)\n[![Tests](https://img.shields.io/badge/tests-5418%20passing-brightgreen.svg)](https://github.com/czlonkowski/n8n-mcp/actions)\n[![n8n version](https://img.shields.io/badge/n8n-2.21.7-orange.svg)](https://github.com/n8n-io/n8n)\n[![Docker](https://img.shields.io/badge/docker-ghcr.io%2Fczlonkowski%2Fn8n--mcp-green.svg)](https://github.com/czlonkowski/n8n-mcp/pkgs/container/n8n-mcp)\n[![Deploy on Railway](https://railway.com/button.svg)](https://railway.com/deploy/n8n-mcp?referralCode=n8n-mcp)\n\nA Model Context Protocol (MCP) server that provides AI assistants with comprehensive access to n8n node documentation, properties, and operations. Deploy in minutes to give Claude and other AI assistants deep knowledge about n8n's 1,851 workflow automation nodes (822 core + 1,029 community).\n\n## Overview\n\nn8n-MCP serves as a bridge between n8n's workflow automation platform and AI models, enabling them to understand and work with n8n nodes effectively. It provides structured access to:\n\n- **1,851 n8n nodes** - 822 core nodes + 1,029 community nodes (911 verified)\n- **Node properties** - 99% coverage with detailed schemas\n- **Node operations** - 63.6% coverage of available actions\n- **Documentation** - 87% coverage from official n8n docs (including AI nodes)\n- **AI tools** - 265 AI-capable tool variants detected with full documentation\n- **Real-world examples** - 156 ranked configurations extracted from popular templates\n- **Template library** - 2,352 workflow templates with 99.96% AI metadata coverage\n- **Community nodes** - Search verified community integrations with `source` filter\n\n## Support This Project\n\n<div align=\"center\">\n  <a href=\"https://github.com/sponsors/czlonkowski\">\n    <img src=\"https://img.shields.io/badge/Sponsor-❤️-db61a2?style=for-the-badge&logo=github-sponsors\" alt=\"Sponsor n8n-mcp\" />\n  </a>\n</div>\n\n**n8n-mcp** started as a personal tool but now helps tens of thousands of developers automate their workflows efficiently. Maintaining and developing this project competes with my paid work. Your sponsorship helps me dedicate focused time to new features, respond quickly to issues, keep documentation up-to-date, and ensure compatibility with latest n8n releases. **[Become a sponsor](https://github.com/sponsors/czlonkowski)**\n\n## Important Safety Warning\n\n**NEVER edit your production workflows directly with AI!** Always:\n- Make a copy of your workflow before using AI tools\n- Test in development environment first\n- Export backups of important workflows\n- Validate changes before deploying to production\n\nAI results can be unpredictable. Protect your work!\n\n## Quick Start\n\n**The fastest way to try n8n-MCP** - no installation, no configuration:\n\n**[dashboard.n8n-mcp.com](https://dashboard.n8n-mcp.com)**\n\n- Free tier: 100 tool calls/day\n- Instant access: Start building workflows immediately\n- Always up-to-date: Latest n8n nodes and templates\n- No infrastructure: We handle everything\n\nJust sign up, get your API key, and connect your MCP client.\n\n**Want to self-host?** See the [Self-Hosting Guide](./docs/SELF_HOSTING.md) for npx, Docker, Railway, and local installation options.\n\n## n8n Integration\n\nWant to use n8n-MCP with your n8n instance? Check out our comprehensive [n8n Deployment Guide](./docs/N8N_DEPLOYMENT.md) for:\n- Local testing with the MCP Client Tool node\n- Production deployment with Docker Compose\n- Cloud deployment on Hetzner, AWS, and other providers\n- Troubleshooting and security best practices\n\n## Connect your IDE\n\nn8n-MCP works with multiple AI-powered IDEs and tools:\n\n- [Claude Code](./docs/CLAUDE_CODE_SETUP.md) - Quick setup for Claude Code CLI\n- [Visual Studio Code](./docs/VS_CODE_PROJECT_SETUP.md) - VS Code with GitHub Copilot integration\n- [Cursor](./docs/CURSOR_SETUP.md) - Step-by-step Cursor IDE setup\n- [Windsurf](./docs/WINDSURF_SETUP.md) - Windsurf integration with project rules\n- [Codex](./docs/CODEX_SETUP.md) - Codex integration guide\n- [Antigravity](./docs/ANTIGRAVITY_SETUP.md) - Antigravity integration guide\n\n## Add Claude Skills (Optional)\n\nSupercharge your n8n workflow building with specialized skills that teach AI how to build production-ready workflows!\n\n[![n8n-mcp Skills Setup](./docs/img/skills.png)](https://www.youtube.com/watch?v=e6VvRqmUY2Y)\n\nLearn more: [n8n-skills repository](https://github.com/czlonkowski/n8n-skills)\n\n## Claude Project Setup\n\nFor the best results when using n8n-MCP with Claude Projects, use these enhanced system instructions:\n\n````markdown\nYou are an expert in n8n automation software using n8n-MCP tools. Your role is to design, build, and validate n8n workflows with maximum accuracy and efficiency.\n\n## Core Principles\n\n### 1. Silent Execution\nCRITICAL: Execute tools without commentary. Only respond AFTER all tools complete.\n\n### 2. Parallel Execution\nWhen operations are independent, execute them in parallel for maximum performance.\n\n### 3. Templates First\nALWAYS check templates before building from scratch (2,352 available).\n\n### 4. Multi-Level Validation\nUse validate_node(mode='minimal') → validate_node(mode='full') → validate_workflow pattern.\n\n### 5. Never Trust Defaults\nCRITICAL: Default parameter values are the #1 source of runtime failures.\nALWAYS explicitly configure ALL parameters that control node behavior.\n\n## Workflow Process\n\n1. **Start**: Call `tools_documentation()` for best practices\n\n2. **Template Discovery Phase** (FIRST - parallel when searching multiple)\n   - `search_templates({searchMode: 'by_metadata', complexity: 'simple'})` - Smart filtering\n   - `search_templates({searchMode: 'by_task', task: 'webhook_processing'})` - Curated by task\n   - `search_templates({query: 'slack notification'})` - Text search (default searchMode='keyword')\n   - `search_templates({searchMode: 'by_nodes', nodeTypes: ['n8n-nodes-base.slack']})` - By node type\n\n   **Filtering strategies**:\n   - Beginners: `complexity: \"simple\"` + `maxSetupMinutes: 30`\n   - By role: `targetAudience: \"marketers\"` | `\"developers\"` | `\"analysts\"`\n   - By time: `maxSetupMinutes: 15` for quick wins\n   - By service: `requiredService: \"openai\"` for compatibility\n\n3. **Node Discovery** (if no suitable template - parallel execution)\n   - Think deeply about requirements. Ask clarifying questions if unclear.\n   - `search_nodes({query: 'keyword', includeExamples: true})` - Parallel for multiple nodes\n   - `search_nodes({query: 'trigger'})` - Browse triggers\n   - `search_nodes({query: 'AI agent langchain'})` - AI-capable nodes\n\n4. **Configuration Phase** (parallel for multiple nodes)\n   - `get_node({nodeType, detail: 'standard', includeExamples: true})` - Essential properties (default)\n   - `get_node({nodeType, detail: 'minimal'})` - Basic metadata only (~200 tokens)\n   - `get_node({nodeType, detail: 'full'})` - Complete information (~3000-8000 tokens)\n   - `get_node({nodeType, mode: 'search_properties', propertyQuery: 'auth'})` - Find specific properties\n   - `get_node({nodeType, mode: 'docs'})` - Human-readable markdown documentation\n   - Show workflow architecture to user for approval before proceeding\n\n5. **Validation Phase** (parallel for multiple nodes)\n   - `validate_node({nodeType, config, mode: 'minimal'})` - Quick required fields check\n   - `validate_node({nodeType, config, mode: 'full', profile: 'runtime'})` - Full validation with fixes\n   - Fix ALL errors before proceeding\n\n6. **Building Phase**\n   - If using template: `get_template(templateId, {mode: \"full\"})`\n   - **MANDATORY ATTRIBUTION**: \"Based on template by **[author.name]** (@[username]). View at: [url]\"\n   - Build from validated configurations\n   - EXPLICITLY set ALL parameters - never rely on defaults\n   - Connect nodes with proper structure\n   - Add error handling\n   - Use n8n expressions: $json, $node[\"NodeName\"].json\n   - Build in artifact (unless deploying to n8n instance)\n\n7. **Workflow Validation** (before deployment)\n   - `validate_workflow(workflow)` - Complete validation\n   - `validate_workflow_connections(workflow)` - Structure check\n   - `validate_workflow_expressions(workflow)` - Expression validation\n   - Fix ALL issues before deployment\n\n8. **Deployment** (if n8n API configured)\n   - `n8n_create_workflow(workflow)` - Deploy\n   - `n8n_validate_workflow({id})` - Post-deployment check\n   - `n8n_update_partial_workflow({id, operations: [...]})` - Batch updates\n   - `n8n_test_workflow({workflowId})` - Test workflow execution\n\n## Critical Warnings\n\n### Never Trust Defaults\nDefault values cause runtime failures. Example:\n```json\n// FAILS at runtime\n{resource: \"message\", operation: \"post\", text: \"Hello\"}\n\n// WORKS - all parameters explicit\n{resource: \"message\", operation: \"post\", select: \"channel\", channelId: \"C123\", text: \"Hello\"}\n```\n\n### Example Availability\n`includeExamples: true` returns real configurations from workflow templates.\n- Coverage varies by node popularity\n- When no examples available, use `get_node` + `validate_node({mode: 'minimal'})`\n\n## Validation Strategy\n\n### Level 1 - Quick Check (before building)\n`validate_node({nodeType, config, mode: 'minimal'})` - Required fields only (<100ms)\n\n### Level 2 - Comprehensive (before building)\n`validate_node({nodeType, config, mode: 'full', profile: 'runtime'})` - Full validation with fixes\n\n### Level 3 - Complete (after building)\n`validate_workflow(workflow)` - Connections, expressions, AI tools\n\n### Level 4 - Post-Deployment\n1. `n8n_validate_workflow({id})` - Validate deployed workflow\n2. `n8n_autofix_workflow({id})` - Auto-fix common errors\n3. `n8n_executions({action: 'list'})` - Monitor execution status\n\n## Response Format\n\n### Initial Creation\n```\n[Silent tool execution in parallel]\n\nCreated workflow:\n- Webhook trigger → Slack notification\n- Configured: POST /webhook → #general channel\n\nValidation: All checks passed\n```\n\n### Modifications\n```\n[Silent tool execution]\n\nUpdated workflow:\n- Added error handling to HTTP node\n- Fixed required Slack parameters\n\nChanges validated successfully.\n```\n\n## Batch Operations\n\nUse `n8n_update_partial_workflow` with multiple operations in a single call:\n\nGOOD - Batch multiple operations:\n```json\nn8n_update_partial_workflow({\n  id: \"wf-123\",\n  operations: [\n    {type: \"updateNode\", nodeId: \"slack-1\", changes: {...}},\n    {type: \"updateNode\", nodeId: \"http-1\", changes: {...}},\n    {type: \"cleanStaleConnections\"}\n  ]\n})\n```\n\nBAD - Separate calls:\n```json\nn8n_update_partial_workflow({id: \"wf-123\", operations: [{...}]})\nn8n_update_partial_workflow({id: \"wf-123\", operations: [{...}]})\n```\n\n### CRITICAL: addConnection Syntax\n\nThe `addConnection` operation requires **four separate string parameters**. Common mistakes cause misleading errors.\n\nCORRECT - Four separate string parameters:\n```json\n{\n  \"type\": \"addConnection\",\n  \"source\": \"node-id-string\",\n  \"target\": \"target-node-id-string\",\n  \"sourcePort\": \"main\",\n  \"targetPort\": \"main\"\n}\n```\n\n**Reference**: [GitHub Issue #327](https://github.com/czlonkowski/n8n-mcp/issues/327)\n\n### CRITICAL: IF Node Multi-Output Routing\n\nIF nodes have **two outputs** (TRUE and FALSE). Use the **`branch` parameter** to route to the correct output:\n\n```json\nn8n_update_partial_workflow({\n  id: \"workflow-id\",\n  operations: [\n    {type: \"addConnection\", source: \"If Node\", target: \"True Handler\", sourcePort: \"main\", targetPort: \"main\", branch: \"true\"},\n    {type: \"addConnection\", source: \"If Node\", target: \"False Handler\", sourcePort: \"main\", targetPort: \"main\", branch: \"false\"}\n  ]\n})\n```\n\n**Note**: Without the `branch` parameter, both connections may end up on the same output, causing logic errors!\n\n### removeConnection Syntax\n\nUse the same four-parameter format:\n```json\n{\n  \"type\": \"removeConnection\",\n  \"source\": \"source-node-id\",\n  \"target\": \"target-node-id\",\n  \"sourcePort\": \"main\",\n  \"targetPort\": \"main\"\n}\n```\n\n## Important Rules\n\n### Core Behavior\n1. **Silent execution** - No commentary between tools\n2. **Parallel by default** - Execute independent operations simultaneously\n3. **Templates first** - Always check before building (2,352 available)\n4. **Multi-level validation** - Quick check → Full validation → Workflow validation\n5. **Never trust defaults** - Explicitly configure ALL parameters\n\n### Attribution & Credits\n- **MANDATORY TEMPLATE ATTRIBUTION**: Share author name, username, and n8n.io link\n- **Template validation** - Always validate before deployment (may need updates)\n\n### Code Node Usage\n- **Avoid when possible** - Prefer standard nodes\n- **Only when necessary** - Use code node as last resort\n- **AI tool capability** - ANY node can be an AI tool (not just marked ones)\n\n### Most Popular n8n Nodes (for get_node):\n\n1. **n8n-nodes-base.code** - JavaScript/Python scripting\n2. **n8n-nodes-base.httpRequest** - HTTP API calls\n3. **n8n-nodes-base.webhook** - Event-driven triggers\n4. **n8n-nodes-base.set** - Data transformation\n5. **n8n-nodes-base.if** - Conditional routing\n6. **n8n-nodes-base.manualTrigger** - Manual workflow execution\n7. **n8n-nodes-base.respondToWebhook** - Webhook responses\n8. **n8n-nodes-base.scheduleTrigger** - Time-based triggers\n9. **@n8n/n8n-nodes-langchain.agent** - AI agents\n10. **n8n-nodes-base.googleSheets** - Spreadsheet integration\n11. **n8n-nodes-base.merge** - Data merging\n12. **n8n-nodes-base.switch** - Multi-branch routing\n13. **n8n-nodes-base.telegram** - Telegram bot integration\n14. **@n8n/n8n-nodes-langchain.lmChatOpenAi** - OpenAI chat models\n15. **n8n-nodes-base.splitInBatches** - Batch processing\n16. **n8n-nodes-base.openAi** - OpenAI legacy node\n17. **n8n-nodes-base.gmail** - Email automation\n18. **n8n-nodes-base.function** - Custom functions\n19. **n8n-nodes-base.stickyNote** - Workflow documentation\n20. **n8n-nodes-base.executeWorkflowTrigger** - Sub-workflow calls\n\n**Note:** LangChain nodes use the `@n8n/n8n-nodes-langchain.` prefix, core nodes use `n8n-nodes-base.`\n\n````\n\nSave these instructions in your Claude Project for optimal n8n workflow assistance with intelligent template discovery.\n\n## Available MCP Tools\n\n### Core Tools (7 tools)\n- **`tools_documentation`** - Get documentation for any MCP tool (START HERE!)\n- **`search_nodes`** - Full-text search across all nodes. Use `source: 'community'|'verified'` for community nodes, `includeExamples: true` for configs\n- **`get_node`** - Unified node information tool with multiple modes:\n  - **Info mode** (default): `detail: 'minimal'|'standard'|'full'`, `includeExamples: true`\n  - **Docs mode**: `mode: 'docs'` - Human-readable markdown documentation\n  - **Property search**: `mode: 'search_properties'`, `propertyQuery: 'auth'`\n  - **Versions**: `mode: 'versions'|'compare'|'breaking'|'migrations'`\n- **`validate_node`** - Unified node validation:\n  - `mode: 'minimal'` - Quick required fields check (<100ms)\n  - `mode: 'full'` - Comprehensive validation with profiles (minimal, runtime, ai-friendly, strict)\n- **`validate_workflow`** - Complete workflow validation including AI Agent validation\n- **`search_templates`** - Unified template search:\n  - `searchMode: 'keyword'` (default) - Text search with `query` parameter\n  - `searchMode: 'by_nodes'` - Find templates using specific `nodeTypes`\n  - `searchMode: 'by_task'` - Curated templates for common `task` types\n  - `searchMode: 'by_metadata'` - Filter by `complexity`, `requiredService`, `targetAudience`\n- **`get_template`** - Get complete workflow JSON (modes: nodes_only, structure, full)\n\n### n8n Management Tools (13 tools - Requires API Configuration)\nThese tools require `N8N_API_URL` and `N8N_API_KEY` in your configuration.\n\n#### Workflow Management\n- **`n8n_create_workflow`** - Create new workflows with nodes and connections\n- **`n8n_get_workflow`** - Unified workflow retrieval (modes: full, details, structure, minimal)\n- **`n8n_update_full_workflow`** - Update entire workflow (complete replacement)\n- **`n8n_update_partial_workflow`** - Update workflow using diff operations\n- **`n8n_delete_workflow`** - Delete workflows permanently\n- **`n8n_list_workflows`** - List workflows with filtering and pagination\n- **`n8n_validate_workflow`** - Validate workflows in n8n by ID\n- **`n8n_autofix_workflow`** - Automatically fix common workflow errors\n- **`n8n_workflow_versions`** - Manage version history and rollback\n- **`n8n_deploy_template`** - Deploy templates from n8n.io directly to your instance with auto-fix\n\n#### Execution Management\n- **`n8n_test_workflow`** - Test/trigger workflow execution (webhook, form, chat)\n- **`n8n_executions`** - Unified execution management (list, get, delete)\n\n#### Credential Management\n- **`n8n_manage_credentials`** - Manage n8n credentials (list, get, create, update, delete, getSchema)\n\n#### Security & Audit\n- **`n8n_audit_instance`** - Security audit combining n8n's built-in audit API with deep workflow scanning\n\n#### System Tools\n- **`n8n_health_check`** - Check n8n API connectivity and features\n\n## Documentation\n\n- [Self-Hosting Guide](./docs/SELF_HOSTING.md) - npx, Docker, Railway, and local installation\n- [Security & Hardening](./docs/SECURITY_HARDENING.md) - Trust model, hardening options, workflow restrictions\n- [n8n Deployment Guide](./docs/N8N_DEPLOYMENT.md) - Production deployment with n8n\n- [Database Configuration](./docs/DATABASE_CONFIGURATION.md) - SQLite adapters and memory optimization\n- [Privacy & Telemetry](./PRIVACY.md) - What we collect and how to opt out\n- [Workflow Diff Operations](./docs/workflow-diff-examples.md) - Token-efficient workflow updates\n- [HTTP Deployment](./docs/HTTP_DEPLOYMENT.md) - Remote server setup\n- [Change Log](./CHANGELOG.md) - Complete version history\n\n## License\n\nMIT License - see [LICENSE](LICENSE) for details.\n\n## Contributing\n\nSee [CONTRIBUTING.md](./CONTRIBUTING.md) for development setup, testing, and contribution guidelines.\n\n## Acknowledgments\n\nSee [Acknowledgments](./docs/ACKNOWLEDGMENTS.md) for credits and template attribution.\n\n---\n\n<div align=\"center\">\n  <strong>Built with care for the n8n community</strong>\n</div>\n","summary":"n8n-mcp is a Model Context Protocol server that bridges the gap between AI assistants and the n8n workflow automation platform. It provides AI models with deep, structured access to documentation, schemas, and operations for over 1,800 core and community n8n nodes, along with a library of thousands of templates. This tool is ideal for developers and automation engineers who want to leverage AI to design, understand, and refine complex n8n workflows more effectively.","description":"A MCP for Claude Desktop / Claude Code / Windsurf / Cursor to build n8n workflows for you ","stars":21469,"language":"TypeScript"},{"owner":"jellyfin","repo":"jellyfin","url":"https://github.com/jellyfin/jellyfin","readme":"<h1 align=\"center\">Jellyfin</h1>\n<h3 align=\"center\">The Free Software Media System</h3>\n\n---\n\n<p align=\"center\">\n<img alt=\"Logo Banner\" src=\"https://raw.githubusercontent.com/jellyfin/jellyfin-ux/master/branding/SVG/banner-logo-solid.svg?sanitize=true\"/>\n<br/>\n<br/>\n<a href=\"https://github.com/jellyfin/jellyfin\">\n<img alt=\"GPL 2.0 License\" src=\"https://img.shields.io/github/license/jellyfin/jellyfin.svg\"/>\n</a>\n<a href=\"https://github.com/jellyfin/jellyfin/releases\">\n<img alt=\"Current Release\" src=\"https://img.shields.io/github/release/jellyfin/jellyfin.svg\"/>\n</a>\n<a href=\"https://translate.jellyfin.org/projects/jellyfin/jellyfin-core/?utm_source=widget\">\n<img alt=\"Translation Status\" src=\"https://translate.jellyfin.org/widgets/jellyfin/-/jellyfin-core/svg-badge.svg\"/>\n</a>\n<a href=\"https://hub.docker.com/r/jellyfin/jellyfin\">\n<img alt=\"Docker Pull Count\" src=\"https://img.shields.io/docker/pulls/jellyfin/jellyfin.svg\"/>\n</a>\n<br/>\n<a href=\"https://opencollective.com/jellyfin\">\n<img alt=\"Donate\" src=\"https://img.shields.io/opencollective/all/jellyfin.svg?label=backers\"/>\n</a>\n<a href=\"https://features.jellyfin.org\">\n<img alt=\"Submit Feature Requests\" src=\"https://img.shields.io/badge/fider-vote%20on%20features-success.svg\"/>\n</a>\n<a href=\"https://matrix.to/#/#jellyfinorg:matrix.org\">\n<img alt=\"Chat on Matrix\" src=\"https://img.shields.io/matrix/jellyfinorg:matrix.org.svg?logo=matrix\"/>\n</a>\n<a href=\"https://github.com/jellyfin/jellyfin/releases.atom\">\n<img alt=\"Release RSS Feed\" src=\"https://img.shields.io/badge/rss-releases-ffa500?logo=rss\" />\n</a>\n<a href=\"https://github.com/jellyfin/jellyfin/commits/master.atom\">\n<img alt=\"Master Commits RSS Feed\" src=\"https://img.shields.io/badge/rss-commits-ffa500?logo=rss\" />\n</a>\n</p>\n\n---\n\nJellyfin is a Free Software Media System that puts you in control of managing and streaming your media. It is an alternative to the proprietary Emby and Plex, to provide media from a dedicated server to end-user devices via multiple apps. Jellyfin is descended from Emby's 3.5.2 release and ported to the .NET platform to enable full cross-platform support.\n\nThere are no strings attached, no premium licenses or features, and no hidden agendas: just a team that wants to build something better and work together to achieve it. We welcome anyone who is interested in joining us in our quest!\n\nFor further details, please see [our documentation page](https://jellyfin.org/docs/). To receive the latest updates, get help with Jellyfin, and join the community, please visit [one of our communication channels](https://jellyfin.org/docs/general/getting-help). For more information about the project, please see our [about page](https://jellyfin.org/docs/general/about).\n\n<strong>Want to get started?</strong><br/>\nCheck out our <a href=\"https://jellyfin.org/downloads\">downloads page</a> or our <a href=\"https://jellyfin.org/docs/general/installation/\">installation guide</a>, then see our <a href=\"https://jellyfin.org/docs/general/quick-start\">quick start guide</a>. You can also <a href=\"https://jellyfin.org/docs/general/installation/source\">build from source</a>.<br/>\n\n<strong>Something not working right?</strong><br/>\nOpen an <a href=\"https://jellyfin.org/docs/general/contributing/issues\">Issue</a> on GitHub.<br/>\n\n<strong>Want to contribute?</strong><br/>\nCheck out our <a href=\"https://jellyfin.org/contribute\">contributing choose-your-own-adventure</a> to see where you can help, then see our <a href=\"https://jellyfin.org/docs/general/contributing/\">contributing guide</a> and our <a href=\"https://jellyfin.org/docs/general/community-standards\">community standards</a>.<br/>\n\n<strong>New idea or improvement?</strong><br/>\nCheck out our <a href=\"https://features.jellyfin.org/?view=most-wanted\">feature request hub</a>.<br/>\n\n<strong>Don't see Jellyfin in your language?</strong><br/>\nCheck out our <a href=\"https://translate.jellyfin.org\">Weblate instance</a> to help translate Jellyfin and its subprojects.<br/>\n\n<a href=\"https://translate.jellyfin.org/engage/jellyfin/?utm_source=widget\">\n<img src=\"https://translate.jellyfin.org/widgets/jellyfin/-/jellyfin-web/multi-auto.svg\" alt=\"Detailed Translation Status\"/>\n</a>\n\n---\n\n## Jellyfin Server\n\nThis repository contains the code for Jellyfin's backend server. Note that this is only one of many projects under the Jellyfin GitHub [organization](https://github.com/jellyfin/) on GitHub. If you want to contribute, you can start by checking out our [documentation](https://jellyfin.org/docs/general/contributing/index.html) to see what to work on.\n\n## Server Development\n\nThese instructions will help you get set up with a local development environment in order to contribute to this repository. Before you start, please be sure to completely read our [guidelines on development contributions](https://jellyfin.org/docs/general/contributing/development.html). Note that this project is supported on all major operating systems except FreeBSD, which is still incompatible.\n\n### Prerequisites\n\nBefore the project can be built, you must first install the [.NET 10 SDK](https://dotnet.microsoft.com/download/dotnet) on your system.\n\nInstructions to run this project from the command line are included here, but you will also need to install an IDE if you want to debug the server while it is running. Any IDE that supports .NET 6 development will work, but two options are recent versions of [Visual Studio](https://visualstudio.microsoft.com/downloads/) (at least 2022) and [Visual Studio Code](https://code.visualstudio.com/Download).\n\n[ffmpeg](https://github.com/jellyfin/jellyfin-ffmpeg) will also need to be installed.\n\n### Cloning the Repository\n\nAfter dependencies have been installed you will need to clone a local copy of this repository. If you just want to run the server from source you can clone this repository directly, but if you are intending to contribute code changes to the project, you should [set up your own fork](https://jellyfin.org/docs/general/contributing/development.html#set-up-your-copy-of-the-repo) of the repository. The following example shows how you can clone the repository directly over HTTPS.\n\n```bash\ngit clone https://github.com/jellyfin/jellyfin.git\n```\n\n### Installing the Web Client\n\nThe server is configured to host the static files required for the [web client](https://github.com/jellyfin/jellyfin-web) in addition to serving the backend by default. Before you can run the server, you will need to get a copy of the web client since they are not included in this repository directly.\n\nNote that it is recommended for development to [host the web client separately](#hosting-the-web-client-separately) from the web server with some additional configuration, in which case you can skip this step.\n\nThere are two options to get the files for the web client.\n\n1. Build them from source following the instructions on the [jellyfin-web repository](https://github.com/jellyfin/jellyfin-web)\n2. Get the pre-built files from an existing installation of the server. For example, with a Windows server installation the client files are located at `C:\\Program Files\\Jellyfin\\Server\\jellyfin-web`\n\n### Running The Server\n\nThe following instructions will help you get the project up and running via the command line, or your preferred IDE.\n\n#### Running With Visual Studio\n\nTo run the project with Visual Studio you can open the Solution (`.sln`) file and then press `F5` to run the server.\n\n#### Running With Visual Studio Code\n\nTo run the project with Visual Studio Code you will first need to open the repository directory with Visual Studio Code using the `Open Folder...` option.\n\nSecond, you need to [install the recommended extensions for the workspace](https://code.visualstudio.com/docs/editor/extension-gallery#_recommended-extensions). Note that extension recommendations are classified as either \"Workspace Recommendations\" or \"Other Recommendations\", but only the \"Workspace Recommendations\" are required.\n\nAfter the required extensions are installed, you can run the server by pressing `F5`.\n\n#### Running From the Command Line\n\nTo run the server from the command line you can use the `dotnet run` command. The example below shows how to do this if you have cloned the repository into a directory named `jellyfin` (the default directory name) and should work on all operating systems.\n\n```bash\ncd jellyfin                          # Move into the repository directory\ndotnet run --project Jellyfin.Server --webdir /absolute/path/to/jellyfin-web/dist # Run the server startup project\n```\n\nA second option is to build the project and then run the resulting executable file directly. When running the executable directly you can easily add command line options. Add the `--help` flag to list details on all the supported command line options.\n\n1. Build the project\n\n```bash\ndotnet build                       # Build the project\ncd Jellyfin.Server/bin/Debug/net10.0 # Change into the build output directory\n```\n\n2. Execute the build output. On Linux, Mac, etc. use `./jellyfin` and on Windows use `jellyfin.exe`.\n\n#### Accessing the Hosted Web Client\n\nIf the Server is configured to host the Web Client, and the Server is running, the Web Client can be accessed at `http://localhost:8096` by default.\n\nAPI documentation can be viewed at `http://localhost:8096/api-docs/swagger/index.html`\n\n\n### Running from GitHub Codespaces\n\nAs Jellyfin will run on a container on a GitHub hosted server, JF needs to handle some things differently.\n\n**NOTE:** Depending on the selected configuration (if you just click 'create codespace' it will create a default configuration one) it might take 20-30 seconds to load all extensions and prepare the environment while VS Code is already open. Just give it some time and wait until you see `Downloading .NET version(s) 7.0.15~x64 ...... Done!` in the output tab.\n\n**NOTE:** If you want to access the JF instance from outside, like with a WebClient on another PC, remember to set the \"ports\" in the lower VS Code window to public.\n\n**NOTE:** When first opening the server instance with any WebUI, you will be sent to the login instead of the setup page. Refresh the login page once and you should be redirected to the Setup.\n\nThere are two configurations for you to choose from.\n#### Default - Development Jellyfin Server\nThis creates a container that has everything to run and debug the Jellyfin Media server but does not setup anything else. Each time you create a new container you have to run through the whole setup again. There is also no ffmpeg, webclient or media preloaded. Use the `.NET Launch (nowebclient)` launch config to start the server.\n\n> Keep in mind that as this has no web client you have to connect to it via an external client. This can be just another codespace container running the WebUI. vuejs does not work from the get-go as it does not support the setup steps.\n\n#### Development Jellyfin Server ffmpeg\nthis extends the default server with a default installation of ffmpeg6 though the means described here: https://jellyfin.org/docs/general/installation/linux#repository-manual\nIf you want to install a specific ffmpeg version, follow the comments embedded in the `.devcontainer/Dev - Server Ffmpeg/install.ffmpeg.sh` file.\n\nUse the `ghcs .NET Launch (nowebclient, ffmpeg)` launch config to run with the jellyfin-ffmpeg enabled.\n\n\n### Running The Tests\n\nThis repository also includes unit tests that are used to validate functionality as part of a CI pipeline on Azure. There are several ways to run these tests.\n\n1. Run tests from the command line using `dotnet test`\n2. Run tests in Visual Studio using the [Test Explorer](https://docs.microsoft.com/en-us/visualstudio/test/run-unit-tests-with-test-explorer)\n3. Run individual tests in Visual Studio Code using the associated [CodeLens annotation](https://github.com/OmniSharp/omnisharp-vscode/wiki/How-to-run-and-debug-unit-tests)\n\n### Advanced Configuration\n\nThe following sections describe some more advanced scenarios for running the server from source that build upon the standard instructions above.\n\n#### Hosting The Web Client Separately\n\nIt is not necessary to host the frontend web client as part of the backend server. Hosting these two components separately may be useful for frontend developers who would prefer to host the client in a separate webpack development server for a tighter development loop. See the [jellyfin-web](https://github.com/jellyfin/jellyfin-web#getting-started) repo for instructions on how to do this.\n\nTo instruct the server not to host the web content, there is a `nowebclient` configuration flag that must be set. This can be specified using the command line\nswitch `--nowebclient` or the environment variable `JELLYFIN_NOWEBCONTENT=true`.\n\nSince this is a common scenario, there is also a separate launch profile defined for Visual Studio called `Jellyfin.Server (nowebcontent)` that can be selected from the 'Start Debugging' dropdown in the main toolbar.\n\n**NOTE:** The setup wizard cannot be run if the web client is hosted separately.\n\n---\n<p align=\"center\">\nThis project is supported by:\n<br/>\n<br/>\n<a href=\"https://www.jetbrains.com\"><img src=\"https://gist.githubusercontent.com/anthonylavado/e8b2403deee9581e0b4cb8cd675af7db/raw/199ae22980ef5da64882ec2de3e8e5c03fe535b8/jetbrains.svg\" height=\"50px\" alt=\"JetBrains logo\"></a>\n</p>\n","summary":"Jellyfin is a free, open-source media system that allows users to manage and stream their personal media collections from a dedicated server to various end-user devices. As a fully cross-platform alternative to proprietary services like Plex and Emby, it offers complete control over media content without any premium licenses, subscription fees, or hidden trackers. This project is ideal for privacy-conscious enthusiasts and home server hobbyists looking for a robust, community-driven solution to organize and enjoy their digital entertainment libraries.","description":"The Free Software Media System - Server Backend & API","stars":52814,"language":"C#"},{"owner":"cocoindex-io","repo":"cocoindex","url":"https://github.com/cocoindex-io/cocoindex","readme":"<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://cocoindex.io/blobs/github/homepage/enterprise-hero-dark.svg\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://cocoindex.io/blobs/github/homepage/enterprise-hero-light.svg\">\n    <img src=\"https://cocoindex.io/blobs/github/homepage/enterprise-hero-light.svg\" alt=\"Enterprise corpus — codebase, Slack, meeting notes, and documentation — flowing continuously through the CocoIndex incremental sync engine into a production AI agent with always-fresh context. Only the Δ (delta) is reprocessed on every change. Keywords: RAG pipeline, agent memory, enterprise retrieval, AI agent context, live indexing, retrieval-augmented generation, production LLM apps, streaming ETL, incremental ingestion.\" width=\"100%\" draggable=\"false\"/>\n  </picture>\n</p>\n<h1 align=\"center\">Your agents deserve <em>fresh context.</em></h1>\n\n<p align=\"center\">\n  <strong>Star us&nbsp;❤️&nbsp;→</strong>&nbsp;<a href=\"https://github.com/cocoindex-io/cocoindex\" title=\"Star CocoIndex on GitHub — open-source incremental indexing framework for AI agents\"><picture><source media=\"(prefers-color-scheme: dark)\" srcset=\"https://cocoindex.io/blobs/github/homepage/star-btn-small-dark.svg\"><source media=\"(prefers-color-scheme: light)\" srcset=\"https://cocoindex.io/blobs/github/homepage/star-btn-small-light.svg\"><img src=\"https://cocoindex.io/blobs/github/homepage/star-btn-small-light.svg\" alt=\"Star CocoIndex on GitHub — open-source Python framework for RAG, vector search, and live agent context\" height=\"36\" align=\"absmiddle\"/></picture></a> &nbsp;·&nbsp;\n  <a href=\"https://cocoindex.io\" title=\"Visit cocoindex.io — the CocoIndex homepage\"><picture><source media=\"(prefers-color-scheme: dark)\" srcset=\"https://cocoindex.io/blobs/github/homepage/coco-inline-dark.svg\"><source media=\"(prefers-color-scheme: light)\" srcset=\"https://cocoindex.io/blobs/github/homepage/coco-inline-light.svg\"><img src=\"https://cocoindex.io/blobs/github/homepage/coco-inline-light.svg\" alt=\"cocoindex.io — the CocoIndex homepage: incremental data pipelines for AI agents\" height=\"36\" align=\"absmiddle\"/></picture></a> &nbsp;·&nbsp;\n  <a href=\"https://cocoindex.io/docs\" title=\"Read the CocoIndex documentation — guides, quickstart, connectors, transformations, and API reference\"><picture><source media=\"(prefers-color-scheme: dark)\" srcset=\"https://cocoindex.io/blobs/github/homepage/docs-inline-dark.svg\"><source media=\"(prefers-color-scheme: light)\" srcset=\"https://cocoindex.io/blobs/github/homepage/docs-inline-light.svg\"><img src=\"https://cocoindex.io/blobs/github/homepage/docs-inline-light.svg\" alt=\"CocoIndex documentation — quickstart, connectors, ops, transformations, target stores, RAG and knowledge graph recipes\" height=\"36\" align=\"absmiddle\"/></picture></a> &nbsp;·&nbsp;\n  <a href=\"https://discord.com/invite/zpA9S2DR7s\" title=\"Join the CocoIndex Discord — community chat, showcase, release notes, help and support\"><picture><source media=\"(prefers-color-scheme: dark)\" srcset=\"https://cocoindex.io/blobs/github/homepage/discord-inline-dark.svg\"><source media=\"(prefers-color-scheme: light)\" srcset=\"https://cocoindex.io/blobs/github/homepage/discord-inline-light.svg\"><img src=\"https://cocoindex.io/blobs/github/homepage/discord-inline-light.svg\" alt=\"Join the CocoIndex Discord community — help, showcase, release notes, and live chat with maintainers\" height=\"36\" align=\"absmiddle\"/></picture></a>\n</p>\n\n\n<p align=\"center\">CocoIndex turns codebases, meeting notes, inboxes, Slack, PDFs, and videos into live, continuously fresh context for your AI agents and LLM apps to reason over effectively — with minimal incremental processing.  Get your production AI agent ready in 10 minutes with reliable, continuously fresh data — no stale batches, no context gap\n</p>\n<p align=\"center\">\n  <b>Incremental</b> · only the delta &nbsp;·&nbsp; <b>Any scale</b> · parallel by default &nbsp;·&nbsp; <b>Declarative</b> · Python, 5 min\n</p>\n\n\n<div align=\"center\">\n\n[![stars](https://img.shields.io/github/stars/cocoindex-io/cocoindex?style=flat-square&label=stars&color=FB6A76)](https://github.com/cocoindex-io/cocoindex)\n[![downloads](https://img.shields.io/pepy/dt/cocoindex?style=flat-square&label=downloads&color=16A534)](https://pepy.tech/projects/cocoindex)\n[![pypi](https://img.shields.io/pypi/v/cocoindex?style=flat-square&label=pypi&color=E59A63)](https://pypi.org/project/cocoindex/)\n[![python](https://img.shields.io/badge/python-3.10--3.13-3572A5?style=flat-square)](https://www.python.org/)\n[![rust](https://img.shields.io/badge/rust-core-db6d28?style=flat-square)](https://www.rust-lang.org/)\n[![license](https://img.shields.io/badge/license-Apache--2.0-5B5BD6?style=flat-square)](https://opensource.org/licenses/Apache-2.0)\n[![discord](https://img.shields.io/discord/1314801574169673738?style=flat-square&logo=discord&logoColor=white&label=discord&color=5865F2)](https://discord.com/invite/zpA9S2DR7s)\n\n[![CI](https://img.shields.io/github/actions/workflow/status/cocoindex-io/cocoindex/CI.yml?event=push&style=flat-square&label=CI)](https://github.com/cocoindex-io/cocoindex/actions/workflows/CI.yml)\n[![release](https://img.shields.io/github/actions/workflow/status/cocoindex-io/cocoindex/release.yml?event=push&style=flat-square&label=release)](https://github.com/cocoindex-io/cocoindex/actions/workflows/release.yml)\n[![links](https://img.shields.io/github/actions/workflow/status/cocoindex-io/cocoindex/links.yml?event=push&style=flat-square&label=link%20check)](https://github.com/cocoindex-io/cocoindex/actions/workflows/links.yml)\n\n</div>\n\n<p align=\"center\"><a href=\"https://trendshift.io/repositories/13939\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/13939\" alt=\"cocoindex-io/cocoindex | Trendshift\" width=\"250\" height=\"55\"/></a></p>\n\n<br/>\n\n<div align=\"center\">\n\n[Deutsch](https://readme-i18n.com/cocoindex-io/cocoindex?lang=de) |\n[English](https://readme-i18n.com/cocoindex-io/cocoindex?lang=en) |\n[Español](https://readme-i18n.com/cocoindex-io/cocoindex?lang=es) |\n[français](https://readme-i18n.com/cocoindex-io/cocoindex?lang=fr) |\n[日本語](https://readme-i18n.com/cocoindex-io/cocoindex?lang=ja) |\n[한국어](https://readme-i18n.com/cocoindex-io/cocoindex?lang=ko) |\n[Português](https://readme-i18n.com/cocoindex-io/cocoindex?lang=pt) |\n[Русский](https://readme-i18n.com/cocoindex-io/cocoindex?lang=ru) |\n[中文](https://readme-i18n.com/cocoindex-io/cocoindex?lang=zh)\n\n</div>\n\n\n<br/><br/>\n\n<h2 align=\"center\">Built with CocoIndex ❤️</h2>\n\n<!-- Flagship: CocoIndex-code — full-bleed clickable hero -->\n<p align=\"center\">\n  <a href=\"https://cocoindex.io/cocoindex-code\" title=\"CocoIndex-code — flagship MCP server for AI coding agents: AST-aware, incremental, semantic code index. Claude Code and Cursor see your whole repo instantly.\"><picture><source media=\"(prefers-color-scheme: dark)\" srcset=\"https://cocoindex.io/blobs/github/homepage/cocoindex-code-hero-dark.svg\"><source media=\"(prefers-color-scheme: light)\" srcset=\"https://cocoindex.io/blobs/github/homepage/cocoindex-code-hero-light.svg\"><img src=\"https://cocoindex.io/blobs/github/homepage/cocoindex-code-hero-light.svg\" alt=\"CocoIndex-code — flagship MCP server for AI coding agents. AST-aware incremental semantic code index that keeps live call graphs, symbols, vectors, and chunks fresh on every commit. 70% fewer tokens per turn, 80-90% cache hits on re-index, sub-second freshness. Supports Python, TypeScript, Rust, and Go. Features: Δ-only incremental processing, semantic search by meaning (not grep), call graphs and blast-radius analysis, global repo view for duplicates and architecture. Build coding agents (generate, refactor) and code-review agents (catch, approv
