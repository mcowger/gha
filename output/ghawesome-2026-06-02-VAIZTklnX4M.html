e). One install — Claude Code, Cursor, and other MCP-aware agents see your whole repository instantly. Keywords: MCP server, coding agent, code intelligence, AST chunking, semantic code search, call graph, vector embedding, repository context, Claude Code, Cursor, incremental indexing, blast radius.\" width=\"100%\"/></picture></a>\n</p>\n\n<p align=\"center\"><a href=\"examples\"><b>See all 20+ examples · updated every week →</b></a></p>\n\n<br/>\n\n<h3 align=\"center\">Get started</h3>\n\n```sh\npip install -U cocoindex\n```\n\nDeclare *what* should be in your target — CocoIndex keeps it in sync forever, recomputing only the Δ.\n\n```python\nimport cocoindex as coco\nfrom cocoindex.connectors import localfs, postgres\nfrom cocoindex.ops.text import RecursiveSplitter\n\n@coco.fn(memo=True)                          # ← cached by hash(input) + hash(code)\nasync def index_file(file, table):\n    for chunk in RecursiveSplitter().split(await file.read_text()):\n        table.declare_row(text=chunk.text, embedding=embed(chunk.text))\n\n@coco.fn\nasync def main(src):\n    table = await postgres.mount_table_target(PG, table_name=\"docs\")\n    table.declare_vector_index(column=\"embedding\")\n    await coco.mount_each(index_file, localfs.walk_dir(src).items(), table)\n\ncoco.App(coco.AppConfig(name=\"docs\"), main, src=\"./docs\").update_blocking()\n```\n\n<p align=\"center\">Run once to backfill. Re-run anytime — only the changed files re-embed.</p>\n\n<p align=\"center\">\n  Building with an AI coding agent?<br/>\n  Drop in our <a href=\"skills/cocoindex/\"><b>CocoIndex skill</b></a> so your agent writes correct v1 code — concepts, APIs, patterns, all in one file.<br/>\n  <sub>See <a href=\"https://cocoindex.io/docs/getting_started/ai_coding_agents/\">Use with AI coding agents</a> for install steps.</sub>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://cocoindex.io/docs/getting_started/quickstart\" title=\"Full CocoIndex quickstart — install, declare sources and targets, run the incremental engine, set up vector search or knowledge graph in 5 minutes\"><picture><source media=\"(prefers-color-scheme: dark)\" srcset=\"https://cocoindex.io/blobs/github/homepage/quickstart-btn-dark.svg\"><source media=\"(prefers-color-scheme: light)\" srcset=\"https://cocoindex.io/blobs/github/homepage/quickstart-btn-light.svg\"><img src=\"https://cocoindex.io/blobs/github/homepage/quickstart-btn-light.svg\" alt=\"Full quickstart — open-book icon linking to the CocoIndex documentation quickstart: pip install, declare sources and targets, run the incremental engine\" height=\"36\" align=\"absmiddle\"/></picture></a>\n  &nbsp;&nbsp;\n  <a href=\"https://cocoindex.io/docs/programming_guide/core_concepts\" title=\"Learn the CocoIndex core concepts — sources, targets, flows, incremental engine, lineage\"><picture><source media=\"(prefers-color-scheme: dark)\" srcset=\"https://cocoindex.io/blobs/github/homepage/learn-concept-btn-dark.svg\"><source media=\"(prefers-color-scheme: light)\" srcset=\"https://cocoindex.io/blobs/github/homepage/learn-concept-btn-light.svg\"><img src=\"https://cocoindex.io/blobs/github/homepage/learn-concept-btn-light.svg\" alt=\"Learn the concept — lightbulb icon linking to the CocoIndex core-concepts guide: sources, targets, flows, incremental engine, and data lineage\" height=\"36\" align=\"absmiddle\"/></picture></a>\n</p>\n\n\n<p align=\"center\">\n  <a href=\"https://github.com/cocoindex-io/cocoindex\" title=\"Star CocoIndex on GitHub — open-source Python framework for live agent context\"><picture><source media=\"(prefers-color-scheme: dark)\" srcset=\"https://cocoindex.io/blobs/github/homepage/comm-github-dark.svg\"><source media=\"(prefers-color-scheme: light)\" srcset=\"https://cocoindex.io/blobs/github/homepage/comm-github-light.svg\"><img src=\"https://cocoindex.io/blobs/github/homepage/comm-github-light.svg\" alt=\"Animated GitHub Star button for the cocoindex-io/cocoindex repository: a cursor clicks the star, it fills yellow, confetti bursts, the star count ticks up, and an 'Appreciate a star if you like it!' caption with a beating heart shows below the button\" width=\"620\"/></picture></a>\n</p>\n\n<br/><br/>\n\n<h2 align=\"center\">React — <em>for data engineering</em></h2>\n\n<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://cocoindex.io/blobs/github/homepage/react4de-hero-dark.svg\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://cocoindex.io/blobs/github/homepage/react4de-hero-light.svg\">\n    <img src=\"https://cocoindex.io/blobs/github/homepage/react4de-hero-light.svg\" alt=\"React — for data engineering. The CocoIndex mental model: Target = F(Source). A persistent-state-driven dataflow where you declare the desired target state and the engine keeps it in sync with the latest source data and code, forever, at low latency and low cost. Source files (.py, .md, .pdf, .ts) flow through your Python transformation F into a live target dots-matrix index; only the Δ is reprocessed on every change, and every target dot traces back to its exact source byte. Four core properties: Python not a DAG (sky), declare target state (yellow bullseye), lineage end-to-end (coral connected dots), and incremental at any scale (mint Δ+1). Your code is as simple as the one-off version — the engine does the rest. Keywords: React for data engineering, declarative ETL, persistent state, data lineage, dataflow, Δ only, incremental indexing, CocoIndex.\" width=\"100%\"/>\n  </picture>\n</p>\n\n<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://cocoindex.io/blobs/github/homepage/either-side-change-dark.svg\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://cocoindex.io/blobs/github/homepage/either-side-change-light.svg\">\n    <img src=\"https://cocoindex.io/blobs/github/homepage/either-side-change-light.svg\" alt=\"What happens when either side changes — CocoIndex tracks per-row provenance so the Δ propagates at minimum cost. Two scenarios shown in one illustration: (top) Source change — one file (b.md) is edited and only one target dot re-syncs (coral pulse). (bottom) Code change — the transformation function F is rewritten from v1 to v2 and only the dots whose outputs depend on the changed code re-run (amber/yellow pulses). Source on the left, F in the center (Python code block), target dots-matrix on the right. Keywords: incremental indexing, change data capture, delta processing, fine-grained invalidation, code-aware caching, hash-of-code invalidation, memoization, reproducible pipelines, incremental recomputation.\" width=\"100%\"/>\n  </picture>\n</p>\n\n<p align=\"center\"><a href=\"https://cocoindex.io/react-cocoindex\"><b>See the React ↔ CocoIndex mental model →</b></a></p>\n\n\n<br/><br/>\n\n<h2 align=\"center\"><em>Incremental engine</em> for long-horizon agents</h2>\n\n<p align=\"center\">\n  Data transformation for any engineer, designed for AI workloads —<br/>\n  with a smart incremental engine for <em>always-fresh, explainable data.</em>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://cocoindex.io/docs/programming_guide/core_concepts\" title=\"Learn the CocoIndex core concepts — sources, targets, flows, incremental engine, lineage\"><picture><source media=\"(prefers-color-scheme: dark)\" srcset=\"https://cocoindex.io/blobs/github/homepage/learn-concept-btn-dark.svg\"><source media=\"(prefers-color-scheme: light)\" srcset=\"https://cocoindex.io/blobs/github/homepage/learn-concept-btn-light.svg\"><img src=\"https://cocoindex.io/blobs/github/homepage/learn-concept-btn-light.svg\" alt=\"Learn the concept — purple button with a lightbulb icon linking to the CocoIndex core-concepts guide: sources, targets, flows, incremental engine, and data lineage\" height=\"44\" align=\"absmiddle\"/></picture></a>\n</p>\n\n<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://cocoindex.io/blobs/github/homepage/incremental-engine-dark.svg\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://cocoindex.io/blobs/github/homepage/incremental-engine-light.svg\">\n    <img src=\"https://cocoindex.io/blobs/github/homepage/incremental-engine-light.svg\" alt=\"CocoIndex's Python-native transformation flows connect 8 source categories (Codebases, Meeting Notes, Web · APIs, File System · Blob Stores, Databases, Message Queues, Images · Video, Voice · Transcripts) through the incremental engine out to 6 target stores (Relational DB, Data Warehouse, Vector DB, Graph DB, Message Queue, Feature Store). A flow.py code block (@coco.fn · def f(src): · chunks = split(src) · target.row(embed(chunks))) shows the shared pipeline; only the Δ is reprocessed — unchanged src hits the cache, changed src re-runs split() and Δ → re-embed. The persistent data-pipeline control plane runs eight always-on subsystems: live caching, pipeline catalog, version tracking, continuously learning, lineage, task scheduling, metrics collection, and failure management. Keywords: data pipeline, ETL, source connectors, vector database, graph database, incremental engine, streaming ingestion, caching, lineage, versioning, scheduling, metrics, retries.\" width=\"100%\"/>\n  </picture>\n</p>\n\n\n<br/><br/>\n\n<h2 align=\"center\">Why <em>incremental?</em></h2>\n\n<p align=\"center\">Your agents are only as good as the data they see.<br/>Batch pipelines drift stale. CocoIndex stays live — and only runs the Δ.</p>\n\n<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://cocoindex.io/blobs/github/homepage/why-incremental-dark.svg\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://cocoindex.io/blobs/github/homepage/why-incremental-dark.svg\">\n    <img src=\"https://cocoindex.io/blobs/github/homepage/why-incremental-dark.svg\" alt=\"Why incremental? — one illustration combining the four core benefits of CocoIndex's incremental engine. Sub-second fresh (mint): a stopwatch ticking under a second, source changes propagate to the target in under a second so agents see the world as it is, not as it was yesterday. 10× cheaper at scale (yellow): a 10,000-row corpus block where only a thin Δ 0.1% column re-runs and 99.9% stays cached — you skip the other 99.9% of your corpus and pay a fraction of the compute, embedding, and LLM bill. Explainable by default (coral): a lineage thread links a source byte (handbook.md L42) to a target vector — every vector, row, or graph node in the target traces back to its exact source byte for debuggable, auditable, regulator-friendly AI pipelines. Production-grade (purple): a shield stamped with the Rust crab surrounded by retry loops, back-off dots, a DLQ tray, and a no-data-loss check — Rust core with retries, exponential back-off, dead-letter queues, and no-data-loss guarantees, production-ready for long-horizon AI agents. Keywords: incremental indexing, Δ-only reprocessing, sub-second freshness, low-latency RAG, cost-efficient embeddings, data lineage, retrieval-augmented generation, Rust core, retries, back-off, dead letters, no data loss, long-horizon agents.\" width=\"100%\"/>\n  </picture>\n</p>\n\n\n<br/><br/>\n\n<h2 align=\"center\">What can you <em>build?</em></h2>\n\n<p align=\"center\"><a href=\"examples\" title=\"Browse all 20+ CocoIndex examples on GitHub — code, PDF, HN, knowledge graph, podcast, CSV-to-Kafka, image, and more\"><b>See all 20+ examples · updated every week →</b></a></p>\n\n<p align=\"center\"><b>Working starters from <a href=\"examples\">the examples tree</a> — clone, plug your source, ship.</b></p>\n\n<p align=\"center\">\n  <a href=\"examples/code_embedding\" title=\"Real-time code index — walk a git repo, chunk source files with an AST-aware splitter, embed with sentence-transformers, and upsert to pgvector / LanceDB. Fully incremental: only files touched by the latest commit re-embed. Good for coding agents, code review, semantic find-by-meaning.\"><img src=\"https://cocoindex.io/blobs/github/homepage/example-code.svg\" alt=\"Real-time code index — walk a git repo, AST-chunk source files, embed with sentence-transformers, upsert to pgvector / LanceDB, incremental on every commit. Keywords: code search, code embedding, semantic code retrieval, Python.\" width=\"70%\"/></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"examples/pdf_embedding\" title=\"PDF → RAG index — ingest PDFs from local / S3 / Google Drive, extract text, chunk with a recursive splitter, embed each chunk, and upsert into pgvector / LanceDB with a vector index. Classic RAG stack, incremental — only edited PDFs re-embed.\"><img src=\"https://cocoindex.io/blobs/github/homepage/example-pdf.svg\" alt=\"PDF → RAG index — ingest PDFs from local, S3, or GDrive, extract + chunk text, embed chunks, upsert to pgvector / LanceDB. Classic retrieval-augmented-generation stack, incremental. Keywords: RAG, document Q&A, PDF search, vector database.\" width=\"70%\"/></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"examples/hn_trending_topics\" title=\"HN trending topics — fetch Hacker News threads via the Algolia API, recursively pull nested comments, LLM-extract typed topic lists per message with Gemini 2.5 Flash, and rank topics by weighted mention count (thread = 5 points, comment = 1 point).\"><img src=\"https://cocoindex.io/blobs/github/homepage/example-hn-trending.svg\" alt=\"HN trending topics — pull Hacker News threads via Algolia, recursively parse comments, LLM-extract topics with Gemini 2.5 Flash, rank by weighted hit count (thread=5, comment=1), store in Postgres. Incremental. Keywords: Hacker News, trending topics, LLM extraction, Gemini, Postgres, news intelligence, topic ranking.\" width=\"70%\"/></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"examples/conversation_to_knowledge\" title=\"Conversation → knowledge graph — pull people, topics, decisions, and action items out of meeting transcripts, Slack, podcasts, or support calls with an LLM extractor, and upsert into Neo4j or Kuzu. Incremental: only changed turns re-extract.\"><img src=\"https://cocoindex.io/blobs/github/homepage/example-kg.svg\" alt=\"Conversation → knowledge graph — LLM extracts people, topics, decisions, action items from transcripts and upserts into Neo4j / Kuzu. Live graph, incremental. Keywords: knowledge graph, entity extraction, meeting intelligence, agent memory.\" width=\"70%\"/></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"examples/multi_codebase_summarization\" title=\"Multi-repo summarization — walk N git repositories, extract READMEs / public APIs / modules, LLM-summarize each one, and roll up into a single top-level summary. Incremental: only repos with new commits re-run.\"><img src=\"https://cocoindex.io/blobs/github/homepage/example-multicode.svg\" alt=\"Multi-repo summarization — walk N git repos, extract structure, LLM-summarize per-repo + a rolled-up org summary, refresh on every push. Keywords: internal platform, developer experience, monorepo, SDK docs.\" width=\"70%\"/></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"examples/patient_intake_extraction_baml\" title=\"Structured extraction — read messy forms, PDFs, invoices, or free-text and extract typed, schema-validated fields with BAML or DSPy, then write rows into Postgres or a warehouse. Incremental: only changed documents re-extract.\"><img src=\"https://cocoindex.io/blobs/github/homepage/example-intake.svg\" alt=\"Structured extraction — BAML / DSPy typed schema extraction from forms, PDFs, intakes, invoices into Postgres / warehouse. Incremental. Keywords: ETL, LLM extraction, schema-first, patient intake, invoice processing, KYC, contracts.\" width=\"70%\"/></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"examples/conversation_to_knowledge\" title=\"Podcast → knowledge graph — download YouTube podcast audio, transcribe with speaker diarization (Whisper / AssemblyAI), LLM-extract structured statements and entities per speaker, resolve duplicates across episodes with embeddings, and store the whole graph (speakers, statements, topics) in SurrealDB or Neo4j. Incremental.\"><img src=\"https://cocoindex.io/blobs/github/homepage/example-podcast.svg\" alt=\"Podcast → knowledge graph — transcribe YouTube / Spotify audio with speaker diarization, LLM-extract speakers and statements, resolve entities across episodes, store in SurrealDB / Neo4j. Keywords: podcast, diarization, YouTube, Whisper, SurrealDB, knowledge graph, entity resolution.\" width=\"70%\"/></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"examples/csv_to_kafka\" title=\"CSV → Kafka live — watch a folder of CSV files (local or S3) and publish each row as a JSON message keyed by its primary key to a Kafka topic on StreamNative / Confluent / self-hosted. Sub-second incremental — only changed rows publish.\"><img src=\"https://cocoindex.io/blobs/github/homepage/example-csv-kafka.svg\" alt=\"CSV → Kafka live — watch a folder of CSV files, publish each row as a JSON message to a Kafka topic via CocoIndex's Kafka target connector. Incremental, sub-second, no producer loop. Keywords: Kafka, CDC, streaming, StreamNative, Confluent, CSV ingestion, event streaming.\" width=\"70%\"/></a>\n</p>\n\n<br/>\n\n<p align=\"center\"><picture><source media=\"(prefers-color-scheme: dark)\" srcset=\"https://cocoindex.io/blobs/github/homepage/share-build-dark.svg\"><source media=\"(prefers-color-scheme: light)\" srcset=\"https://cocoindex.io/blobs/github/homepage/share-build-light.svg\"><img src=\"https://cocoindex.io/blobs/github/homepage/share-build-light.svg\" alt=\"Share what you build — a banner with a trail of tiny hearts rising from the bottom behind the text, inviting the CocoIndex community to share projects built with the framework\" height=\"36\" draggable=\"false\"/></picture></p>\n\n<p align=\"center\">Building something with CocoIndex? <b>We want to see it.</b><br/>Tag <a href=\"https://x.com/cocoindex_io\" title=\"Tag @cocoindex_io on X to showcase your CocoIndex project\">@cocoindex_io</a> on X or drop a link in <a href=\"https://discord.com/invite/zpA9S2DR7s\" title=\"Share your project in the CocoIndex Discord #showcase channel\">#showcase</a> on Discord. We'll boost it. 🥥</p>\n\n\n<br/><br/>\n\n<h2 align=\"center\">Community</h2>\n\n<table width=\"100%\" border=\"0\" cellspacing=\"0\" role=\"presentation\">\n  <tr>\n    <td align=\"center\" valign=\"middle\" width=\"25%\">\n      <a href=\"https://discord.com/invite/zpA9S2DR7s\" title=\"Join the CocoIndex Discord — community chat, showcase, help, release notes\"><picture><source media=\"(prefers-color-scheme: dark)\" srcset=\"https://cocoindex.io/blobs/github/homepage/comm-discord-dark.svg\"><source media=\"(prefers-color-scheme: light)\" srcset=\"https://cocoindex.io/blobs/github/homepage/comm-discord-light.svg\"><img src=\"https://cocoindex.io/blobs/github/homepage/comm-discord-light.svg\" alt=\"Join the CocoIndex Discord community — live chat with maintainers and users, showcase your projects, get help building RAG pipelines and knowledge graphs\" width=\"100%\"/></picture></a>\n    </td>\n    <td align=\"center\" valign=\"middle\" width=\"25%\">\n      <a href=\"https://www.youtube.com/@cocoindex-io\" title=\"Subscribe to the CocoIndex YouTube channel — live demos, tutorials, and deep dives\"><picture><source media=\"(prefers-color-scheme: dark)\" srcset=\"https://cocoindex.io/blobs/github/homepage/comm-youtube-dark.svg\"><source media=\"(prefers-color-scheme: light)\" srcset=\"https://cocoindex.io/blobs/github/homepage/comm-youtube-light.svg\"><img src=\"https://cocoindex.io/blobs/github/homepage/comm-youtube-light.svg\" alt=\"Subscribe to the CocoIndex YouTube channel — video tutorials, live demos, architecture deep dives, and AI agent recipes\" width=\"100%\" draggable=\"false\"/></picture></a>\n    </td>\n    <td align=\"center\" valign=\"middle\" width=\"25%\">\n      <a href=\"https://cocoindex.io/blogs/\" title=\"Read the CocoIndex blog — engineering posts, release notes, and tutorials\"><picture><source media=\"(prefers-color-scheme: dark)\" srcset=\"https://cocoindex.io/blobs/github/homepage/comm-blog-dark.svg\"><source media=\"(prefers-color-scheme: light)\" srcset=\"https://cocoindex.io/blobs/github/homepage/comm-blog-light.svg\"><img src=\"https://cocoindex.io/blobs/github/homepage/comm-blog-light.svg\" alt=\"Read the CocoIndex blog — engineering deep dives, release notes, RAG and knowledge graph tutorials, and case studies\" width=\"100%\"/></picture></a>\n    </td>\n    <td align=\"center\" valign=\"middle\" width=\"25%\">\n      <a href=\"https://x.com/cocoindex_io\" title=\"Follow @cocoindex_io on X (Twitter) for release notes, demos, and updates\"><picture><source media=\"(prefers-color-scheme: dark)\" srcset=\"https://cocoindex.io/blobs/github/homepage/comm-x-dark.svg\"><source media=\"(prefers-color-scheme: light)\" srcset=\"https://cocoindex.io/blobs/github/homepage/comm-x-light.svg\"><img src=\"https://cocoindex.io/blobs/github/homepage/comm-x-light.svg\" alt=\"Follow @cocoindex_io on X (formerly Twitter) for release notes, demos, launches, and AI data pipeline updates\" width=\"100%\" draggable=\"false\"/></picture></a>\n    </td>\n  </tr>\n</table>\n\n<br/><br/>\n\n<p align=\"center\">\n  <img src=\"https://cocoindex.io/blobs/github/homepage/we-love-contributors.svg\" alt=\"We love Contributors — section title banner with a pulsing coral heart badge and cream twinkle sparkles. Every typo fix, new connector, and doc tweak makes CocoIndex better. Keywords: open-source contribution, pull request, typo fix, new connector, good first issue, Hacktoberfest, community, coconut heart.\" width=\"620\"/>\n</p>\n\n<p align=\"center\">\n  <b>We are <em>so</em> excited to meet you.</b><br/>\n  Every typo fix, new connector, doc tweak, or full-on rewrite makes CocoIndex better.<br/>\n  Come hang out — big PRs and small ones, both welcome.\n</p>\n\n<p align=\"center\">\n  📝 <a href=\"https://cocoindex.io/docs/contributing/guide\"><b>Read the contributing guide</b></a> &nbsp;·&nbsp;\n  🐛 <a href=\"https://github.com/cocoindex-io/cocoindex/labels/good%20first%20issue\"><b>good first issues</b></a> &nbsp;·&nbsp;\n  💬 <a href=\"https://discord.com/invite/zpA9S2DR7s\"><b>Say hi on Discord</b></a>\n</p>\n\n<br/><br/>\n\n<h2 align=\"center\">CocoIndex <em>Enterprise</em></h2>\n\n<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://cocoindex.io/blobs/github/homepage/enterprise-scale-dark.svg\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://cocoindex.io/blobs/github/homepage/enterprise-scale-light.svg\">\n    <img src=\"https://cocoindex.io/blobs/github/homepage/enterprise-scale-light.svg\" alt=\"CocoIndex Enterprise — built for enterprise scale. Four headline stats for PB-scale incremental indexing: PB corpus scale incrementally indexed (coral), 10× fewer LLM embedding calls vs. full recompute (yellow), 100% lineage coverage with every byte traceable (mint), Δ only the delta always (sky). Below, a wide 50×8 corpus matrix of 400 dim tiles represents a petabyte-scale store where a single coral Δ slice of 8 tiles re-runs while the other 99.9% stays cached. Keywords: enterprise RAG, petabyte-scale indexing, incremental compute, delta-only, lineage, parallel chunking, zero-copy, failure isolation.\" width=\"100%\"/>\n  </picture>\n</p>\n\n<h3 align=\"center\">Large corpus — <em>built for enterprise scale.</em></h3>\n\n<p align=\"center\">\n  Incremental compute is the only way to keep large corpora fresh without re-embedding them every cycle.<br/>\n  CocoIndex scales from a single repo to petabyte-scale stores — parallel by default, delta-only by design.\n</p>\n\n<br/>\n\n<h3 align=\"center\">Process once. <em>Reconcile forever.</em></h3>\n\n<p align=\"center\">\n  When a source changes, CocoIndex identifies the affected records, propagates the change<br/>\n  across joins and lookups, updates the target, and retires stale rows —<br/>\n  without touching anything that didn't change.\n</p>\n\n<br/>\n\n<h3 align=\"center\">Built on a <em>Rust engine.</em></h3>\n\n<p align=\"center\">\n  The core is Rust — production-grade from day zero.<br/>\n  Parallel chunking, zero-copy transforms where possible, and failure isolation<br/>\n  so one bad record doesn't stall the flow.\n</p>\n\n<br/><br/>\n\n<p align=\"center\">\n  <a href=\"https://cocoindex.io/enterprise/\" title=\"Explore CocoIndex Enterprise — PB-scale incremental data pipelines for AI agents\"><img src=\"https://cocoindex.io/blobs/github/homepage/enterprise-btn.svg\" alt=\"Explore CocoIndex Enterprise — bright blue pill button linking to cocoindex.io/enterprise, the PB-scale incremental data pipeline for AI agents\" height=\"44\" align=\"absmiddle\"/></a>\n</p>\n\n<br/><br/>\n\n<p align=\"center\"><sub>Apache 2.0 · © CocoIndex contributors 🥥</sub></p>\n","summary":"CocoIndex is an open-source framework designed to provide AI agents with continuously fresh context by transforming disparate data sources—such as codebases, documentation, and communication platforms—into live, searchable knowledge. Its core capability is an incremental sync engine that minimizes resource usage by reprocessing only the specific changes (deltas) in your data rather than re-indexing entire datasets. This tool is ideal for developers and engineers building production-grade LLM applications who need to bridge the gap between stale static data and real-time agent awareness.","description":"Incremental engine for long horizon agents 🌟 Star if you like it!","stars":10153,"language":"Python"},{"owner":"docusealco","repo":"docuseal","url":"https://github.com/docusealco/docuseal","readme":"<h1 align=\"center\" style=\"border-bottom: none\">\n  <div>\n    <a href=\"https://www.docuseal.com\">\n      <img  alt=\"DocuSeal\" src=\"https://github.com/user-attachments/assets/38b45682-ffa4-4919-abde-d2d422325c44\" width=\"80\" />\n      <br>\n    </a>\n    DocuSeal\n  </div>\n</h1>\n<h3 align=\"center\">\n  Open source document filling and signing\n</h3>\n<p align=\"center\">\n  <a href=\"https://hub.docker.com/r/docuseal/docuseal\">\n    <img alt=\"Docker releases\" src=\"https://img.shields.io/docker/v/docuseal/docuseal\">\n  </a>\n  <a href=\"https://discord.gg/qygYCDGck9\">\n    <img src=\"https://img.shields.io/discord/1125112641170448454?logo=discord\"/>\n  </a>\n  <a href=\"https://twitter.com/intent/follow?screen_name=docusealco\">\n    <img src=\"https://img.shields.io/twitter/follow/docusealco?style=social\" alt=\"Follow @docusealco\" />\n  </a>\n</p>\n<p>\nDocuSeal is an open source platform that provides secure and efficient digital document signing and processing. Create PDF forms to have them filled and signed online on any device with an easy-to-use, mobile-optimized web tool.\n</p>\n<h2 align=\"center\">\n  <a href=\"https://demo.docuseal.tech\">✨ Live Demo</a>\n  <span>|</span>\n  <a href=\"https://docuseal.com/sign_up\">☁️ Try in Cloud</a>\n</h2>\n\n[![Demo](https://github.com/docusealco/docuseal/assets/5418788/d8703ea3-361a-423f-8bfe-eff1bd9dbe14)](https://demo.docuseal.tech)\n\n## Features\n- PDF form fields builder (WYSIWYG)\n- 12 field types available (Signature, Date, File, Checkbox etc.)\n- Multiple submitters per document\n- Automated emails via SMTP\n- Files storage on disk or AWS S3, Google Storage, Azure Cloud\n- Automatic PDF eSignature\n- PDF signature verification\n- Users management\n- Mobile-optimized\n- 7 UI languages with signing available in 14 languages\n- API and Webhooks for integrations\n- Easy to deploy in minutes\n\n## Pro Features\n- Company logo and white-label\n- User roles\n- Automated reminders\n- Invitation and identity verification via SMS\n- Conditional fields and formulas\n- Bulk send with CSV, XLSX spreadsheet import\n- SSO / SAML\n- Template creation with HTML API ([Guide](https://www.docuseal.com/guides/create-pdf-document-fillable-form-with-html-api))\n- Template creation with PDF or DOCX and field tags API ([Guide](https://www.docuseal.com/guides/use-embedded-text-field-tags-in-the-pdf-to-create-a-fillable-form))\n- Embedded signing form ([React](https://github.com/docusealco/docuseal-react), [Vue](https://github.com/docusealco/docuseal-vue), [Angular](https://github.com/docusealco/docuseal-angular) or [JavaScript](https://www.docuseal.com/docs/embedded))\n- Embedded document form builder ([React](https://github.com/docusealco/docuseal-react), [Vue](https://github.com/docusealco/docuseal-vue), [Angular](https://github.com/docusealco/docuseal-angular) or [JavaScript](https://www.docuseal.com/docs/embedded))\n- [Learn more](https://www.docuseal.com/pricing)\n\n## Deploy\n\n|Heroku|Railway|\n|:--:|:---:|\n| [<img alt=\"Deploy on Heroku\" src=\"https://www.herokucdn.com/deploy/button.svg\" height=\"40\">](https://heroku.com/deploy?template=https://github.com/docusealco/docuseal-heroku) | [<img alt=\"Deploy on Railway\" src=\"https://railway.app/button.svg\" height=\"40\">](https://railway.com/deploy/IGoDnc?referralCode=ruU7JR)|\n|**DigitalOcean**|**Render**|\n| [<img alt=\"Deploy on DigitalOcean\" src=\"https://www.deploytodo.com/do-btn-blue.svg\" height=\"40\">](https://cloud.digitalocean.com/apps/new?repo=https://github.com/docusealco/docuseal-digitalocean/tree/master&refcode=421d50f53990) | [<img alt=\"Deploy to Render\" src=\"https://render.com/images/deploy-to-render-button.svg\" height=\"40\">](https://render.com/deploy?repo=https://github.com/docusealco/docuseal-render)\n\n#### Docker\n\n```sh\ndocker run --name docuseal -p 3000:3000 -v.:/data docuseal/docuseal\n```\n\nBy default DocuSeal docker container uses an SQLite database to store data and configurations. Alternatively, it is possible to use PostgreSQL or MySQL databases by specifying the `DATABASE_URL` env variable.\n\n#### Docker Compose\n\nDownload docker-compose.yml into your private server:\n```sh\ncurl https://raw.githubusercontent.com/docusealco/docuseal/master/docker-compose.yml > docker-compose.yml\n```\n\nRun the app under a custom domain over https using docker compose (make sure your DNS points to the server to automatically issue ssl certs with Caddy):\n```sh\nsudo HOST=your-domain-name.com docker compose up\n```\n\n## For Businesses\n### Integrate seamless document signing into your web or mobile apps with DocuSeal\n\nAt DocuSeal we have expertise and technologies to make documents creation, filling, signing and processing seamlessly integrated with your product. We specialize in working with various industries, including **Banking, Healthcare, Transport, Real Estate, eCommerce, KYC, CRM, and other software products** that require bulk document signing. By leveraging DocuSeal, we can assist in reducing the overall cost of developing and processing electronic documents while ensuring security and compliance with local electronic document laws.\n\n[Book a Meeting](https://www.docuseal.com/contact)\n\n## License\n\nDistributed under the AGPLv3 License with Section 7(b) Additional Terms. See [LICENSE](https://github.com/docusealco/docuseal/blob/master/LICENSE) and [LICENSE_ADDITIONAL_TERMS](https://github.com/docusealco/docuseal/blob/master/LICENSE_ADDITIONAL_TERMS) for more information.\nUnless otherwise noted, all files © 2023-2026 DocuSeal LLC.\n\n## Tools\n\n- [Signature Maker](https://www.docuseal.com/online-signature)\n- [Sign Document Online](https://www.docuseal.com/sign-documents-online)\n- [Fill PDF Online](https://www.docuseal.com/fill-pdf)\n","summary":"DocuSeal is an open-source platform designed for secure digital document processing, offering a robust suite of tools to create, fill, and sign PDF forms online. It features a user-friendly WYSIWYG form builder, support for multiple document submitters, automated email workflows, and versatile deployment options including Docker and cloud hosting. This platform is ideal for organizations and developers seeking to integrate custom e-signature workflows and document management into their own applications or internal infrastructure.","description":"Open source DocuSign alternative. Create, fill, and sign digital documents ✍️","stars":17053,"language":"Ruby"},{"owner":"aattaran","repo":"deepclaude","url":"https://github.com/aattaran/deepclaude","readme":"# deepclaude\n\nUse Claude Code's autonomous agent loop with **DeepSeek V4 Pro**, **OpenRouter**, or any Anthropic-compatible backend. Same UX, 17x cheaper.\n\n![Remote control running DeepSeek V4 Pro in the browser](screenshots/remote-control-deepseek.png)\n\n## What this does\n\nClaude Code is the best autonomous coding agent — but it costs $200/month with usage caps. DeepSeek V4 Pro scores 96.4% on LiveCodeBench and costs $0.87/M output tokens.\n\n**deepclaude** swaps the brain while keeping the body:\n\n```\nYour terminal\n  +-- Claude Code CLI (tool loop, file editing, bash, git - unchanged)\n        +-- API calls -> DeepSeek V4 Pro ($0.87/M) instead of Anthropic ($15/M)\n```\n\nEverything works: file reading, editing, bash execution, subagent spawning, autonomous multi-step coding loops. The only difference is which model thinks.\n\n## Quick start (2 minutes)\n\n### 1. Get a DeepSeek API key\n\nSign up at [platform.deepseek.com](https://platform.deepseek.com), add $5 credit, copy your API key.\n\n### 2. Set environment variables\n\n**Windows (PowerShell):**\n```powershell\nsetx DEEPSEEK_API_KEY \"sk-your-key-here\"\n```\n\n**macOS/Linux:**\n```bash\necho 'export DEEPSEEK_API_KEY=\"sk-your-key-here\"' >> ~/.bashrc\nsource ~/.bashrc\n```\n\n### 3. Install\n\n**Windows:**\n```powershell\n# Copy the script to a directory in your PATH\nCopy-Item deepclaude.ps1 \"$env:USERPROFILE\\.local\\bin\\deepclaude.ps1\"\n\n# Or add the repo directory to PATH\nsetx PATH \"$env:PATH;C:\\path\\to\\deepclaude\"\n```\n\n**macOS/Linux:**\n```bash\nchmod +x deepclaude.sh\nsudo ln -s \"$(pwd)/deepclaude.sh\" /usr/local/bin/deepclaude\n```\n\n### 4. Use it\n\n```bash\ndeepclaude                  # Launch Claude Code with DeepSeek V4 Pro\ndeepclaude --status         # Show available backends and keys\ndeepclaude --backend or     # Use OpenRouter (cheapest, $0.44/M input)\ndeepclaude --backend fw     # Use Fireworks AI (fastest, US servers)\ndeepclaude --backend anthropic  # Normal Claude Code (when you need Opus)\ndeepclaude --cost           # Show pricing comparison\ndeepclaude --benchmark      # Latency test across all providers\ndeepclaude --switch ds      # Switch backend mid-session (no restart)\n```\n\n## How it works\n\nClaude Code reads these environment variables to determine where to send API calls:\n\n| Variable | What it does |\n|---|---|\n| `ANTHROPIC_BASE_URL` | API endpoint (default: api.anthropic.com) |\n| `ANTHROPIC_AUTH_TOKEN` | API key for the backend |\n| `ANTHROPIC_DEFAULT_OPUS_MODEL` | Model name for Opus-tier tasks |\n| `ANTHROPIC_DEFAULT_SONNET_MODEL` | Model name for Sonnet-tier tasks |\n| `ANTHROPIC_DEFAULT_HAIKU_MODEL` | Model name for Haiku-tier (subagents) |\n| `CLAUDE_CODE_SUBAGENT_MODEL` | Model for spawned subagents |\n\n**deepclaude** sets these per-session (not permanently), launches Claude Code, then restores your original settings on exit.\n\n## Supported backends\n\n| Backend | Flag | Input/M | Output/M | Servers | Notes |\n|---|---|---|---|---|---|\n| **DeepSeek** (default) | `--backend ds` | $0.44 | $0.87 | China | Auto context caching (120x cheaper on repeat turns) |\n| **OpenRouter** | `--backend or` | $0.44 | $0.87 | US | Cheapest, lowest latency from US/EU |\n| **Fireworks AI** | `--backend fw` | $1.74 | $3.48 | US | Fastest inference |\n| **Anthropic** | `--backend anthropic` | $3.00 | $15.00 | US | Original Claude Opus (for hard problems) |\n\n### Setup per backend\n\n**DeepSeek** (default - just needs `DEEPSEEK_API_KEY`):\n```bash\nsetx DEEPSEEK_API_KEY \"sk-...\"           # Windows\nexport DEEPSEEK_API_KEY=\"sk-...\"         # macOS/Linux\n```\n\n**OpenRouter** (optional):\n```bash\nsetx OPENROUTER_API_KEY \"sk-or-...\"      # Windows\nexport OPENROUTER_API_KEY=\"sk-or-...\"    # macOS/Linux\n```\n\n**Fireworks AI** (optional):\n```bash\nsetx FIREWORKS_API_KEY \"fw_...\"          # Windows\nexport FIREWORKS_API_KEY=\"fw_...\"        # macOS/Linux\n```\n\n## Cost comparison\n\n| Usage level | Anthropic Max | deepclaude (DeepSeek) | Savings |\n|---|---|---|---|\n| Light (10 days/mo) | $200/mo (capped) | ~$20/mo | 90% |\n| Heavy (25 days/mo) | $200/mo (capped) | ~$50/mo | 75% |\n| With auto loops | $200/mo (capped) | ~$80/mo | 60% |\n\nDeepSeek's automatic context caching makes agent loops extremely cheap - after the first request, the system prompt and file context are cached at $0.004/M (vs $0.44/M uncached).\n\n## What works and what doesn't\n\n### Works\n- File reading, writing, editing (Read/Write/Edit tools)\n- Bash/PowerShell execution\n- Glob and Grep search\n- Multi-step autonomous tool loops\n- Subagent spawning\n- Git operations\n- Project initialization (`/init`)\n- Thinking mode (enabled by default)\n\n### Doesn't work or degraded\n| Feature | Reason |\n|---|---|\n| Image/vision input | DeepSeek's Anthropic endpoint doesn't support images |\n| Parallel tool use | Supported by DeepSeek (up to 128 per call), but Claude Code sends tools sequentially by default |\n| MCP server tools | Not supported through compatibility layer |\n| Prompt caching savings | DeepSeek has its own caching (automatic), but Anthropic's `cache_control` is ignored |\n\n### Intelligence difference\n- **Routine tasks** (80% of work): DeepSeek V4 Pro is comparable to Claude Opus\n- **Complex reasoning** (20%): Claude Opus is stronger - switch with `--backend anthropic`\n\n## Live switching (no restart)\n\nSwitch between Anthropic and DeepSeek **mid-session** - from inside Claude Code itself. No restart, no terminal commands. Just type a slash command.\n\n**In Claude Code terminal:**\n\n![/deepseek in Claude Code CLI](screenshots/terminal%20for%20terminal%20embed2.PNG)\n\n**In Claude Code VS Code extension:**\n\n![/deepseek in VS Code extension](screenshots/terminal%20for%20vscode%20embed2.PNG)\n\n### How it works\n\nThe proxy runs on `localhost:3200` and intercepts all API calls. A control endpoint (`/_proxy/mode`) lets you switch the active backend instantly:\n\n```\nClaude Code -> localhost:3200 (proxy)\n                 |\n                 +-- /_proxy/mode POST -> switch backend\n                 +-- /_proxy/status GET -> current backend + uptime\n                 +-- /_proxy/cost GET -> token usage + cost savings\n                 |\n                 +-- /v1/messages -> active backend (DeepSeek/OpenRouter/Anthropic)\n                 +-- everything else -> Anthropic (passthrough)\n```\n\n### Option 1: Slash commands (recommended)\n\nAdd these files to `~/.claude/commands/`:\n\n**`deepseek.md`:**\n```\nSwitch the model proxy to DeepSeek. Run this command silently and report the result:\ncurl -sX POST http://127.0.0.1:3200/_proxy/mode -d \"backend=deepseek\"\nIf successful, say: \"Switched to DeepSeek.\"\n```\n\n**`anthropic.md`:**\n```\nSwitch the model proxy back to Anthropic. Run this command silently and report the result:\ncurl -sX POST http://127.0.0.1:3200/_proxy/mode -d \"backend=anthropic\"\nIf successful, say: \"Switched to Anthropic.\"\n```\n\n**`openrouter.md`:**\n```\nSwitch the model proxy to OpenRouter. Run this command silently and report the result:\ncurl -sX POST http://127.0.0.1:3200/_proxy/mode -d \"backend=openrouter\"\nIf successful, say: \"Switched to OpenRouter.\"\n```\n\nThen type `/deepseek`, `/anthropic`, or `/openrouter` in any Claude Code session to switch instantly.\n\n### Option 2: CLI flag\n\n```bash\ndeepclaude --switch deepseek    # or: ds, or, fw, anthropic\ndeepclaude -s anthropic\n```\n\n### Option 3: VS Code keyboard shortcuts\n\nAdd to `.vscode/tasks.json`:\n```json\n{\n  \"version\": \"2.0.0\",\n  \"tasks\": [\n    {\n      \"label\": \"Proxy: Switch to DeepSeek\",\n      \"type\": \"shell\",\n      \"command\": \"Invoke-RestMethod -Uri http://127.0.0.1:3200/_proxy/mode -Method Post -Body 'backend=deepseek'\",\n      \"presentation\": { \"reveal\": \"always\" },\n      \"problemMatcher\": []\n    },\n    {\n      \"label\": \"Proxy: Switch to Anthropic\",\n      \"type\": \"shell\",\n      \"command\": \"Invoke-RestMethod -Uri http://127.0.0.1:3200/_proxy/mode -Method Post -Body 'backend=anthropic'\",\n      \"presentation\": { \"reveal\": \"always\" },\n      \"problemMatcher\": []\n    }\n  ]\n}\n```\n\nThen bind in `keybindings.json`:\n```json\n{ \"key\": \"ctrl+alt+d\", \"command\": \"workbench.action.tasks.runTask\", \"args\": \"Proxy: Switch to DeepSeek\" },\n{ \"key\": \"ctrl+alt+a\", \"command\": \"workbench.action.tasks.runTask\", \"args\": \"Proxy: Switch to Anthropic\" }\n```\n\n### Cost tracking\n\nThe proxy tracks token usage and calculates savings vs Anthropic pricing:\n\n```bash\ncurl -s http://127.0.0.1:3200/_proxy/cost\n```\n\nReturns:\n```json\n{\n  \"backends\": {\n    \"deepseek\": {\n      \"input_tokens\": 125000,\n      \"output_tokens\": 45000,\n      \"requests\": 12,\n      \"cost\": 0.0941,\n      \"anthropic_equivalent\": 1.05\n    }\n  },\n  \"total_cost\": 0.0941,\n  \"anthropic_equivalent\": 1.05,\n  \"savings\": 0.9559\n}\n```\n\n## VS Code / Cursor integration\n\nAdd terminal profiles so you can launch deepclaude from the IDE:\n\n**Settings > JSON:**\n```json\n{\n  \"terminal.integrated.profiles.windows\": {\n    \"DeepSeek Agent\": {\n      \"path\": \"powershell.exe\",\n      \"args\": [\"-ExecutionPolicy\", \"Bypass\", \"-NoExit\", \"-File\", \"C:\\\\path\\\\to\\\\deepclaude.ps1\"]\n    }\n  }\n}\n```\n\nOr on macOS/Linux:\n```json\n{\n  \"terminal.integrated.profiles.linux\": {\n    \"DeepSeek Agent\": {\n      \"path\": \"/usr/local/bin/deepclaude\"\n    }\n  }\n}\n```\n\n## Remote control (`--remote`)\n\nOpen a Claude Code session in any browser - with DeepSeek as the brain:\n\n```bash\ndeepclaude --remote                # Remote control + DeepSeek\ndeepclaude --remote -b or          # Remote control + OpenRouter\ndeepclaude --remote -b anthropic   # Remote control + Anthropic (normal)\n```\n\nThis prints a `https://claude.ai/code/session_...` URL you can open on your phone, tablet, or any browser.\n\n### How it works\n\nRemote control needs Anthropic's bridge for the WebSocket connection, but model calls can go elsewhere. deepclaude starts a local proxy that splits the traffic:\n\n```\nclaude remote-control\n  +-- Bridge WebSocket -> wss://bridge.claudeusercontent.com (Anthropic, hardcoded)\n  +-- Model API calls  -> http://localhost:3200 (proxy)\n                            +-- /v1/messages -> DeepSeek ($0.87/M)\n                            +-- everything else -> Anthropic (passthrough)\n```\n\n### Prerequisites\n- Must be logged into Claude Code: `claude auth login`\n- Must have a claude.ai subscription (the bridge is Anthropic infrastructure)\n- Node.js 18+ (for the proxy)\n\nThe proxy starts automatically and stops when the session ends. See [proxy/README.md](proxy/README.md) for technical details.\n\n## License\n\nMIT\n","summary":"Deepclaude is a wrapper tool that allows users to leverage the powerful autonomous agent capabilities of Claude Code while utilizing more cost-effective, Anthropic-compatible backends like DeepSeek V4, OpenRouter, or Fireworks AI. By dynamically swapping the underlying API calls, it preserves the complete feature set of the Claude Code CLI—including file editing, bash execution, and subagent loops—at a fraction of the standard cost. This project is ideal for developers and power users who want to maintain a high-performance coding workflow while significantly reducing their monthly API expenses.","description":"Use Claude Code's autonomous agent loop with DeepSeek V4 Pro, OpenRouter, or any Anthropic-compatible backend. Same UX, 17x cheaper.","stars":2022,"language":"JavaScript"},{"owner":"tsurdilo","repo":"my-temporal-dockercompose","url":"https://github.com/tsurdilo/my-temporal-dockercompose","readme":"## Table of Contents\n\n- [About](#about)\n- [Deploying your Temporal service on Docker](#deploying-your-service)\n- [Some usueful Docker commands](#some-useful-docker-commands)\n- [Troubleshoot](#troubleshoot)\n- [Extra](#extra)\n  - [Dual Visibility](#dual-visibility)\n  - [Multi Cluster Replication setup](#multi-cluster-replication-setup)\n  - [Version Upgrades](#version-upgrades)\n  - [Plaintext Payload Interceptor](#plaintext-payload-interceptor)\n  - [MinIO Archival](#minio-archival)\n  \n## About\n\nThis repo includes some experiments on self-deploying Temporal server via Docker \nCompose and Swarm.\n\nIt can serve as reference to community for a number of Docker related \ndeployment questions.\nFor this repo we use PostgreSQL for persistence for temporal db. We set up \nadvanced visibility with Postgres DB (but options with OpenSearch /  ElasticSearch are possible) for temporal_visibility.\nIt also shows how to set up internal frontend service and use by worker service (even tho we do not set up yet\ncustom authorizer/claims mapper).\nIt also shows how to set up server grpc tracing with otel collector and can be visualized with Jaeger. \n\nIn addition it has a out of box sample of setting up multi cluster replication and some cli commands \nto get it up and running locally.\n\n### Dynamic config\n\nThis setup uses [temporal-etcd-dynconfig](https://github.com/tsurdilo/temporal-etcd-dynconfig) instead of the default file-based dynamic config client. Dynamic config values are stored in etcd and propagate to all server hosts simultaneously via etcd watch — no polling, no per-host file management.\n\netcd runs as a container in the compose stack. An initial set of default values is seeded from `defaults.yaml` on first start. You can inspect and update values at any time using [etcdkeeper](http://localhost:8086/etcdkeeper/) or `etcdctl`:\n\n```bash\n# Update a value — all 8 server containers pick it up within milliseconds\ndocker exec temporal-etcd etcdctl --endpoints=http://localhost:2379 \\\n  put /temporal/dynamicconfig/frontend.globalNamespaceRPS -- \"- value: 2000\"\n\n# List all current dynamic config values\ndocker exec temporal-etcd etcdctl --endpoints=http://localhost:2379 \\\n  get /temporal/dynamicconfig/ --prefix --keys-only\n```\n\nSee the [temporal-etcd-dynconfig](https://github.com/tsurdilo/temporal-etcd-dynconfig) repo for full documentation on key format, constraints, metrics, and multi-cluster setup.\n\n## Deploying your service\n\nThis setup targets more of production environments as it deploys each Temporal server role\n(frontend, matching, history, worker) in individual containers. \nThe setup runs two instances (containers) for frontend, matching and history hosts.\nService sets up 2K shards, so ~1K per history host.\n\nEach server role container exposes server metrics under its own port.\nNote that bashing into the admin-tools image also gives you access to tctl as well as the temporal-tools for different\ndbs. \n\n### How to start\n\nFirst we need to install the loki plugin (you have to do this just one time)\n\n    docker plugin install grafana/loki-docker-driver:latest --alias loki --grant-all-permissions\n\nCheck if the plugin is installed:\n\n    docker plugin ls\n\n(should see the Loki Logging Driver plugin installed\n\nRepo contains a \"poller\" docker image that needs to be built the first time. This image\ncalls DeepHealthCheck frontend api periodically which allows us to monitor our \nhistory services, and will allow us to emit the _host_health_ metric. To build it every time\nstart with \"--build\": \n\n     docker network create temporal-network\n     docker compose -f compose-postgres.yml -f compose-services.yml up --build --detach\n\n\nIf you have already built the image and you didnt change the go code in /poller dir, then just run:\n\n    docker network create temporal-network\n    docker compose -f compose-postgres.yml -f compose-services.yml up --detach\n\n## Check if it works\n\n### If you are running tctl locally\n\n    tctl cl h\n\nshould return \"SERVING\"\n\n### If you don't have tctl locally\n\nBash into admin-tools container and run tctl (you can do this from your machine if you have tctl installed too)\n\n    docker container ls --format \"table {{.ID}}\\t{{.Image}}\\t{{.Names}}\"\n\ncopy the id of the temporal-admin-tools container\n\n    docker exec -it <admin tools container id> bash \n    tctl cl h\n\nyou should see response:\n\n    temporal.api.workflowservice.v1.WorkflowService: SERVING\n\nNote: if you set up HAProxy instead of default Envoy, and dont see \"SERVING\" but rather \"context deadline exceeded errors\"\nrestart the \"temporal-haproxy\" container. Not yet sure why but haproxy is \ndoing something weird. Once you restart it admin-tools container should be able to finish\nits setup-server script and things should work fine. If anyone can figure out the issue \nplease commit PR. Thanks.\n\nWe start postgres from a separate compose file but you don't have to and can combine them if you want.\n\nBy the way, if you want to docker exec into the postgres container do:\n\n    docker exec -it <temporal-postgres container id> psql -U temporal\n    \\l\n\nwhich should show the temporal and temporal_visiblity dbs\n\n(You can do this via Portainer as well, this just shows the \"long way\")\n\nIn addition let's check out the rings in cluster:\n\n    tctl adm cl d\n\nYou should see two members for frontend, matching and history service rings. One \nfor the worker service (typically you dont need to scale worker service)\n\n### Health check service containers\n\n* Frontend (via grpcurl)\n```\ngrpcurl -plaintext -d '{\"service\": \"temporal.api.workflowservice.v1.WorkflowService\"}' 127.0.0.1:7233 grpc.health.v1.Health/Check\n```\n\nagain you can just run `tctl cl h` too\n\n* Frontend (via grpc-health-probe)\n\n```\ngrpc-health-probe -addr=localhost:7233 -service=temporal.api.workflowservice.v1.WorkflowService\n```\n\nTo check the two frontend services individually:\n\n```\ngrpc-health-probe -addr=localhost:7236 -service=temporal.api.workflowservice.v1.WorkflowService\ngrpc-health-probe -addr=localhost:7237 -service=temporal.api.workflowservice.v1.WorkflowService\n```\n\n* Internal Frontend (via grpc-health-probe)\n```\ngrpc-health-probe -addr=localhost:7233 -service=temporal.api.workflowservice.v1.WorkflowService\n```\n\n* Matching (via grpc-health-probe)\n\n```\ngrpc-health-probe -addr=localhost:7235 -service=temporal.api.workflowservice.v1.MatchingService\ngrpc-health-probe -addr=localhost:7239 -service=temporal.api.workflowservice.v1.MatchingService\n```\n\n* History via grpc-health-probe)\n\n```\ngrpc-health-probe -addr=localhost:7234 -service=temporal.api.workflowservice.v1.HistoryService\ngrpc-health-probe -addr=localhost:7238 -service=temporal.api.workflowservice.v1.HistoryService\n```\n\n### Http API\nAdded support for HTTP api which became available since 1.22.0 server release\nto test you can do for example:\n\n```\ncurl http://localhost:7243/api/v1/namespaces/default\n```\n\nonce your service is up and running. For more info see [here](https://github.com/temporalio/api/blob/master/temporal/api/workflowservice/v1/service.proto)\n\n### Parsing static config since server release 1.30\nSince server release 1.30 we need to fetch the embedded template and use that to display static config.\nIt's no longer just created by dockerize in /etc/temporal/config/docker.yaml\nCan do something like this (change url to embedded config to reflect your server version so you get right \nembedded static config template)\n\n     wget -q -O /tmp/development.yaml \\\n       https://raw.githubusercontent.com/temporalio/temporal/v1.31.0/common/config/config_template_embedded.yaml\n\n     temporal-server --config /tmp render-config > /tmp/resolved.yaml && cat /tmp/resolved.yaml\n\n### Links\n\n* Server metrics (raw)\n  * [History Service1](http://localhost:8000/metrics)\n  * [History Service2](http://localhost:8005/metrics)\n  * [Matching Service1](http://localhost:8001/metrics)\n  * [Matching Service2](http://localhost:8006/metrics)\n  * [Frontend Service1](http://localhost:8002/metrics)\n  * [Frontend Service2](http://localhost:8004/metrics)\n  * [Internal Frontend](http://localhost:8007/metrics)\n  * [Worker Service](http://localhost:8003/metrics)\n* [Prometheus targets (scrape points)](http://localhost:9090/targets)\n* [Grafana (includes server, sdk, docker, and postgres dashboards)](http://localhost:8085/)\n  * No login required\n  * In order to scrape docker system metrics add \"metrics-addr\":\"127.0.0.1:9323\" to your docker daemon.js, on Mac this is located at ~/.docker/daemon.json\n  * Go to \"Explore\" and select Loki data source to run LogQL against server metrics\n* [Web UI v2](http://localhost:8080/namespaces/default/workflows)\n* [Web UI v1](http://localhost:8088/)\n* [Portainer](http://localhost:9000/)\n  * Note you will have to create an user the first time you log in\n  * Yes it forces a longer password but whatever\n* [Jaeger](http://localhost:16686/) - includes server grpc traces\n* [PgAdmin](http://localhost:5050/) (username: pgadmin4@pgadmin.org passwd: admin)\n* [etcd keeper](http://localhost:8086/etcdkeeper/)\n* [minio console](http://localhost:9011/login) (username: minioadmin passwd: minioadmin)\n* [cAdvisor](http://localhost:9092/docker) to monitor docker containers \n\n\n### Custom docker template\n\nDocker server image by default use [this](https://github.com/temporalio/temporal/blob/master/docker/config_template.yaml) server config template.\nThis is a base template that may not fit everyones needs. You an define your custom configuration template if you wish\nand this is what we are doing via [my_config_template.yaml](template/my_config_template.yaml).\nWith this you can customize the template as you wish, for example you could configure env vars for namespace setup, like set up \ns3 archival etc which is not possible with the default template.\n\n### Exclude metrics \n\nThis demo also shows how to exclude certain metrics produced by Temporal services \nwhen scraping their metric endpoints, for example [here](/deployment/prometheus/config.yml) we drop all metrics \nfor the \"temporal_system\" namespace. \n\n### Client access\nEnvoy / HAProxy / NGINX role is exposed on 127.0.0.1:7233 (so all SDK samples should work w/o changes). It is load balancing the two\nTemporal frontend services defined in the docker compose.\n\n### Envoy\nThis sample uses Envoy load balancing by default. Check out the Envoy config file [here](/deployment/envoy/envoy.yaml) and make\nany necessary changes. Note this is just a demo so you might want to\nupdate the values where needed for your prod env.\nEnvoy pushes access logs to stdout and is picked up by loki, so can run\nall queries in Grafana. This includes grpc code and size and everything.\n\n### HAProxy\nYou can set up HAProxy load balancing if you want. It load balances\nour two frontend services. Check out the HAProxy config file [here](/deployment/haproxy/haproxy.cfg) and make\nany necessary changes. Note this is just a demo so you might want to \nupdate the values where needed for your prod env.\n\nI have ran into some issues with this HAProxy setup, specifically\nsometimes having to restart its container in order for admin-tools to be able to complete\nsetup, as well as for executions first workflow task timing out.\nPretty sure this has to do with some problem with the config, maybe someone could \nlook and fix. \n\n### NGINX\nYou can also have NGINX configured and use it for load balancing. It load balanced our two temporal frontends.\nCheck out the NGINX config file [here](/deployment/nginx/nginx.conf) and make any necessary adjustments. This is just a demo remember and \nfor production use you should make sure to update values where necessary.\n\n## Some useful Docker commands\n    docker-compose down --volumes\n    docker system prune -a\n    docker volume prune\n\n    docker compose up --detach\n    docker compose up --force-recreate\n\n    docker stop $(docker ps -a -q)\n    docker rm $(docker ps -a -q)\n\n    docker compose -f compose-postgres.yml -f compose-services.yml down --remove-orphans\n    docker network rm temporal-network\n\n    # remove etcd (dynamic config) volume\n    docker volume rm my-temporal-dockercompose_etcd-data\n\n    # restart + full rebuild of custom server image\n    docker compose -f compose-postgres.yml -f compose-services.yml down\n    docker compose -f compose-postgres.yml -f compose-services.yml build \\\n      temporal-history temporal-history2 \\\n      temporal-matching temporal-matching2 \\\n      temporal-frontend temporal-frontend2 \\\n      temporal-internal-frontend \\\n      temporal-worker\n    docker compose -f compose-postgres.yml -f compose-services.yml up --detach\n\n\n## Troubleshoot\n\n* \"Not enough hosts to serve the request\"\n  * Can happen on startup when some temporal service container did not start up properly, run the docker compose command again typically fixes this\n\n## Extra\nHere are some extra configurations, try them out and please report any errors.\n\n## Dual Visibility\n\nDual visibility allows you to configure a secondary visibility store. \nOne use case of having dual visibility is if you need to migrate from one store to another or switch to secondary store\nin case of failures on primary one. This is typically what you want to do in a production env.\n\nIn this sample we set up dual visibility for our SQL visibility setup (Postgres).\nPlease note that we set this up on the same db instance. This demo uses a single postgres to set up \nall dbs, primary, visibility, and secondary visibility. For a prod env you might want to separate these\nto 3 completely separate envs (recommended). \n\nThe key dynamic config setting for dual visibility is to enable writes to both primary and secondary vis:\n\n      system.secondaryVisibilityWritingMode:\n        - value: \"dual\"\n          constraints: {}\n      system.enableReadFromSecondaryVisibility:\n        - value: false\n          constraints: {}\n\nThis sets up Temporal to write visibility data to both primary and secondary vis stores. \nLet's say you run into issues on this primary store, via dynamic config again you can switch read to secondary\n\n      system.enableReadFromSecondaryVisibility:\n        - value: true\n          constraints: {}\n\nIf you experience complete outage of primary vis store, you can change your static config as needed and then\nagain look at your dynamic config to write to primary and-or secondary as again needed.\n\n## Multi Cluster Replication Setup\n\nCovers: start two clusters → connect them → promote a namespace to global → backfill existing executions → failover to c2 → decommission c1.\n\n---\n\n### Phase 1 — Start the clusters\n\n**1. Clear your Docker environment** (see [Some useful Docker commands](#some-useful-docker-commands))\n\n**2. Create the network and start both clusters**\n\n```bash\ndocker network create temporal-network-replication\ndocker compose -f compose-services-replication.yml up --detach\n```\n\n**3. Verify both clusters are healthy**\n\n```bash\ntemporal --address 127.0.0.1:7233 operator cluster health\ntemporal --address 127.0.0.1:2233 operator cluster health\n```\n\n**4. Confirm cluster names**\n\n```bash\ntemporal --address 127.0.0.1:7233 operator cluster describe -o json | jq .clusterName\n# expected: \"c1\"\n\ntemporal --address 127.0.0.1:2233 operator cluster describe -o json | jq .clusterName\n# expected: \"c2\"\n```\n\n**5. Get container IPs** — needed for the upsert commands in Phase 3\n\n```bash\ndocker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' temporalc1\ndocker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' temporalc2\n```\n\nNote these as `TEMPORALC1_IP` and `TEMPORALC2_IP`.\n\n---\n\n### Phase 2 — Seed workflows on c1\n\n**6. Create the test namespace on c1**\n\n```bash\ntemporal --address 127.0.0.1:7233 operator namespace create replicationtest\n```\n\n**7. Start sample workflows**\n\nRun a mix of short (completing) and long-running workflows so you can see both completed and running executions replicate. This Java sample creates 30 executions — 20 complete, 10 remain running:\n\nhttps://gist.github.com/tsurdilo/f0ef3ea2940e877aaec7489370ae099c\n\n**8. Verify workflows are on c1**\n\nhttp://localhost:8081/namespaces/replicationtest/workflows\n\n**9. Confirm namespace does not exist on c2 yet**\n\nhttp://localhost:8082/namespaces/replicationtest/workflows\n\n---\n\n### Phase 3 — Connect the clusters\n\nEach cluster stores its own peer registry locally — both directions must be run independently.\n\n**10. Register c2 as a peer on c1**\n\n```bash\ntemporal --address 127.0.0.1:7233 operator cluster upsert \\\n  --enable-connection \\\n  --enable-replication \\\n  --frontend-address \"TEMPORALC2_IP:2233\"\n```\n\n**11. Register c1 as a peer on c2**\n\n```bash\ntemporal --address 127.0.0.1:2233 operator cluster upsert \\\n  --enable-connection \\\n  --enable-replication \\\n  --frontend-address \"TEMPORALC1_IP:7233\"\n```\n\n**12. Verify both clusters see each other**\n\n```bash\ntemporal --address 127.0.0.1:7233 operator cluster list\ntemporal --address 127.0.0.1:2233 operator cluster list\n```\n\n---\n\n### Phase 4 — Promote namespace to global and enable replication\n\n**13. Promote `replicationtest` from local to global namespace**\n\n```bash\ntemporal --address 127.0.0.1:7233 operator namespace update \\\n  --namespace replicationtest \\\n  --promote-global\n```\n\n**14. Verify it is now a global namespace**\n\n```bash\ntemporal --address 127.0.0.1:7233 operator namespace describe \\\n  --namespace replicationtest -o json | jq .isGlobalNamespace\n# expected: true\n```\n\n**15. Add both clusters to the namespace replication config**\n\n```bash\ntemporal --address 127.0.0.1:7233 operator namespace update \\\n  --namespace replicationtest \\\n  --cluster c1 \\\n  --cluster c2\n```\n\n**16. Verify replication config shows both clusters**\n\n```bash\ntemporal --address 127.0.0.1:7233 operator namespace describe \\\n  --namespace replicationtest -o json | jq .replicationConfig\n```\n\n**17. Confirm namespace now exists on c2**\n\nhttp://localhost:8082/namespaces/replicationtest/workflows\n\nNo workflows yet — the namespace was replicated but existing executions are not backfilled automatically.\n\n---\n\n### Phase 5 — Backfill existing executions\n\nNew executions started after step 15 replicate automatically. The 30 existing executions on c1 need to be force-replicated.\n\n**18. Start the force-replication system workflow on c1**\n\n```bash\ntemporal --address 127.0.0.1:7233 workflow start \\\n  --namespace temporal-system \\\n  --type force-replication \\\n  --task-queue default-worker-tq \\\n  --input '{\"Namespace\": \"replicationtest\", \"ConcurrentActivityCount\": 4, \"OverallRps\": 80}'\n```\n\n**19. Monitor until complete**\n\nhttp://localhost:8081/namespaces/temporal-system/workflows?query=WorkflowType%3D%22force-replication%22\n\n**20. Verify all executions are on c2**\n\nhttp://localhost:8082/namespaces/replicationtest/workflows\n\nExpected: 20 completed and 10 running executions.\n\n---\n\n### Phase 6 — Failover to c2\n\n`namespace-handover` is a safe failover — it waits for replication lag to drain before flipping the active cluster, unlike a direct namespace update.\n\n**21. Run the namespace-handover system workflow on c1**\n\n```bash\ntemporal --address 127.0.0.1:7233 workflow start \\\n  --namespace temporal-system \\\n  --task-queue default-worker-tq \\\n  --type namespace-handover \\\n  --input '{\"Namespace\": \"replicationtest\", \"RemoteCluster\": \"c2\", \"AllowedLaggingSeconds\": 120, \"HandoverTimeoutSeconds\": 5}'\n```\n\n**22. Verify active cluster is now c2**\n\n```bash\ntemporal --address 127.0.0.1:7233 operator namespace describe replicationtest \\\n  -o json | jq .replicationConfig.activeClusterName\n# expected: \"c2\"\n```\n\n> **Note:** If this still shows `\"c1\"` immediately after the handover workflow completes, wait up to 60 seconds and retry. The namespace registry on each server polls for changes on a 60s interval (`dynamicConfigClient.pollInterval`). The handover itself is done — the cache just hasn't refreshed yet.\n\n**23. Switch clients and workers to c2**\n\nPoint your SDK workers and clients at `127.0.0.1:2233`. Both clusters have `dcRedirectionPolicy: all-apis-forwarding`, so signals and starts sent to c1 will continue to be forwarded to c2 in the interim — but workers polling c1 will also be forwarded. Stop c1 workers before or immediately after switching DNS/addresses to avoid c1 workers picking up tasks meant for c2.\n\n> **Migration vs long-running dual-cluster:** This walkthrough follows the migration/decommission path — c1 is being torn down after failover, so poll forwarding from c1 to c2 is harmless for the short window before shutdown. If instead you intend to keep both clusters running long-term (so the namespace can fail back to c1 in the future), do **not** proceed to Phase 7. Instead, enforce standby worker isolation on c1 by adding one of the following to `dynamicconfig/development-c1.yaml`:\n>\n> ```yaml\n> # Option 1 — no forwarding at all from c1 (clients hitting c1 get NamespaceNotActive)\n> system.enableNamespaceNotActiveAutoForwarding:\n>   - value: false\n>     constraints:\n>       namespace: replicationtest\n>\n> # Option 2 — forward writes (signals, starts) but never polls from c1\n> system.forceNamespaceSelectedAPIAutoForwarding:\n>   - value: true\n>     constraints:\n>       namespace: replicationtest\n> ```\n>\n> After a fail-back to c1, apply the same change on c2 and remove it from c1.\n\n---\n\n### Phase 7 — Decommission c1\n\n**24. Remove c1 from the namespace replication config**\n\n```bash\ntemporal --address 127.0.0.1:2233 operator namespace update \\\n  --namespace replicationtest \\\n  --cluster c2\n```\n\n**25. Verify only c2 remains in replication config**\n\n```bash\ntemporal --address 127.0.0.1:2233 operator namespace describe \\\n  --namespace replicationtest -o json | jq .replicationConfig\n```\n\n**26. Delete the namespace on c1**\n\n```bash\ntemporal --address 127.0.0.1:7233 operator namespace delete \\\n  --namespace replicationtest\n```\n\n**27. Verify namespace is gone from c1, still present on c2**\n\n- http://localhost:8081/namespaces/replicationtest — should 404\n- http://localhost:8082/namespaces/replicationtest — should load\n\n**28. Disconnect the clusters**\n\n```bash\ntemporal --address 127.0.0.1:7233 operator cluster remove --name c2\ntemporal --address 127.0.0.1:2233 operator cluster remove --name c1\n```\n\n**29. Verify c2 no longer references c1**\n\n```bash\ntemporal --address 127.0.0.1:2233 operator cluster describe -o json\n```\n\n**30. Complete running executions on c2**\n\nIf you used the Java sample from Phase 2, run the worker pointed at c2 to pick up and complete the 10 running executions:\n\nhttps://gist.github.com/tsurdilo/4114521b617016b5a5872ebf50e1494b\n\nc1 can now be decommissioned.\n\n## Version Upgrades\n\nThis setup runs a custom-built Temporal server image from local source (`~/devel/temporal/temporal`). Upgrading means updating that source checkout to the target version, aligning the admin-tools image, running any schema migrations, and rebuilding.\n\n---\n\n## Setup\n\n- Persistence: `postgres12`\n- Visibility: `postgres12`\n- Docker network: `temporal-network`\n- PostgreSQL container: `temporal-postgresql`\n- PostgreSQL user: `temporal`, password: `temporal`\n- Server image: custom-built from `~/devel/temporal/temporal` source\n- Admin tools image: `temporalio/admin-tools:<version>` (set via `TEMPORAL_ADMINTOOLS_IMG` in `.env`)\n\n---\n\n## Step 1 — Stop the cluster\n\n```bash\ndocker compose -f compose-postgres.yml -f compose-services.yml down --remove-orphans\n```\n\n---\n\n## Step 2 — Update server source to target version\n\nCheck out the target release tag in the Temporal server source:\n\n```bash\ncd ~/devel/temporal/temporal\ngit fetch --tags\ngit checkout v1.32.0   # replace with target version\n```\n\n---\n\n## Step 3 — Update admin-tools image version\n\nIn `.env`, set `TEMPORAL_ADMINTOOLS_IMG` to the target version:\n\n```\nTEMPORAL_ADMINTOOLS_IMG=1.32.0\n```\n\nThe admin-tools version must match the server source version so schema migration scripts are aligned.\n\n---\n\n## Step 4 — Check current schema versions\n\n```bash\ndocker exec -it temporal-postgresql psql -U temporal -d temporal -c \"SELECT curr_version FROM schema_version;\"\ndocker exec -it temporal-postgresql psql -U temporal -d temporal_visibility -c \"SELECT curr_version FROM schema_version;\"\n```\n\nNote both versions — these are your baseline before any migration.\n\n---\n\n## Step 5 — Check if schema migration is needed\n\nCompare your current schema versions (from Step 4) against the highest version available in the target admin-tools image:\n\n```bash\ndocker run --rm temporalio/admin-tools:1.32.0 \\\n  ls /etc/temporal/schema/postgresql/v12/temporal/versioned\n\ndocker run --rm temporalio/admin-tools:1.32.0 \\\n  ls /etc/temporal/schema/postgresql/v12/visibility/versioned\n```\n\nIf your current schema version is already at the highest version listed — no migration needed, skip to Step 7. If higher versions are present — proceed to Step 6.\n\n> **Note:** The `ls` output sorts lexicographically, not numerically — so `v1.19` appears between `v1.18` and `v1.2` in the listing. Find the highest numeric version manually, do not rely on the last entry in the listing.\n\n---\n\n## Step 6 — Run schema migrations\n\nSchema must be updated **before** rolling the binary. Use the target version admin-tools image:\n\n```bash\n# Primary DB\ndocker run --rm \\\n  --network temporal-network \\\n  -e SQL_PASSWORD=temporal \\\n  temporalio/admin-tools:1.32.0 \\\n  temporal-sql-tool \\\n  --plugin postgres12 \\\n  --ep postgresql \\\n  -u temporal \\\n  -p 5432 \\\n  --db temporal \\\n  update-schema \\\n  --schema-dir /etc/temporal/schema/postgresql/v12/temporal/versioned\n\n# Visibility DB\ndocker run --rm \\\n  --network temporal-network \\\n  -e SQL_PASSWORD=temporal \\\n  temporalio/admin-tools:1.32.0 \\\n  temporal-sql-tool \\\n  --plugin postgres12 \\\n  --ep postgresql \\\n  -u temporal \\\n  -p 5432 \\\n  --db temporal_visibility \\\n  update-schema \\\n  --schema-dir /etc/temporal/schema/postgresql/v12/visibility/versioned\n```\n\n---\n\n## Step 7 — Rebuild and start\n\nRebuild the server image from the updated source and restart all services:\n\n```bash\ndocker compose -f compose-services.yml up --build -d\n```\n\nDocker Compose detects the `build:` stanza on the Temporal service containers and rebuilds from `~/devel` as the build context. PostgreSQL is left running.\n\n---\n\n## Step 8 — Verify upgrade\n\n```bash\ntemporal operator cluster describe -o json\n```\n\nConfirm `serverVersion` shows the target version.\n\nThen verify both DBs are at the expected schema versions:\n\n```bash\ndocker exec -it temporal-postgresql psql -U temporal -d temporal -c \"SELECT curr_version FROM schema_version;\"\ndocker exec -it temporal-postgresql psql -U temporal -d temporal_visibility -c \"SELECT curr_version FROM schema_version;\"\n```\n\n---\n\n## Plaintext Payload Interceptor\n\nThe custom server in [`server/`](server/) includes a frontend gRPC interceptor that detects unencrypted payloads flowing through the Temporal frontend. It is observe-only — every request is always allowed through.\n\n**What it does:** when any frontend API call carries a payload whose `encoding` metadata is `json/plain` or `binary/plain` (i.e., no payload codec is in use), the interceptor:\n\n1. Increments a Prometheus counter `plaintext_payload_detected_total` tagged with `namespace`, `operation`, `encoding`, and where available `workflowType` and `taskqueue`. The `payload_field` tag identifies which field inside the request held the unencrypted payload — e.g. `input` on a `StartWorkflowExecution` means workflow input args were unencrypted, while `ScheduleActivityTask` on a `RespondWorkflowTaskCompleted` means activity input inside a worker command was unencrypted. This distinction matters because client-side and worker-side unencrypted traffic require different fixes from the tenant.\n2. Emits a structured `WARN` log line with the same fields.\n\nThis gives cluster operators visibility into which tenants and workflow types are still sending unencrypted data, without breaking any existing traffic. The intended use is to run it in observe-only mode, alert on the metric, give tenants time to deploy a payload codec, then optionally harden it into a blocking gate.\n\n**Implementation:** [`server/interceptors/plaintext_payload.go`](server/interceptors/plaintext_payload.go)\n\n**Wiring into the server:** [`server/main.go`](server/main.go) — the interceptor is instantiated after the shared metrics handler is created and passed to `temporal.WithChainedFrontendGrpcInterceptors`:\n\n```go\nplainTextInterceptor := interceptors.NewPlainTextPayloadInterceptor(logger, metricsHandler)\n\ntemporal.NewServer(\n    // ...\n    temporal.WithChainedFrontendGrpcInterceptors(plainTextInterceptor.Intercept),\n)\n```\n\n**Running the tests** (requires the local `go.work` in `server/` which redirects the Docker module paths to your local checkouts):\n\n```bash\ncd server && go test ./interceptors/ -v\n```\n\nSee [`server/interceptors/README.md`](server/interceptors/README.md) for the full list of covered APIs, all metric tag names, PromQL queries for Grafana, and instructions for extending it to block requests.\n\n## MinIO Archival\n\nThe custom server in [`server/`](server/) includes a status-filtered archival provider backed by [MinIO](https://min.io/) — an S3-compatible object store that runs as a container in the compose stack. Both workflow history and visibility records are archived to MinIO, gzip-compressed, when a workflow closes.\n\nArchival is **enabled by default** (`USE_MINIO_ARCHIVAL=true` in `.env`). To disable it, set `USE_MINIO_ARCHIVAL=false` before starting the stack.\n\nThe provider is wired into the server via `temporal.WithCustomHistoryArchiverFactory` and `temporal.WithCustomVisibilityArchiverFactory` in [`server/main.go`](server/main.go). It registers the `minio://` URI scheme. The server config template at [`template/my_config_template.yaml`](template/my_config_template.yaml) conditionally enables the archival block when `USE_MINIO_ARCHIVAL` is set; `TEMPORAL_SERVER_CONFIG_FILE_PATH` in `compose-services.yml` tells each server container to load this template instead of the compiled-in default.\n\nOn first start, `minio-init` creates two buckets automatically:\n\n- `temporal-history` — one object per workflow execution (key: `history/{namespaceID}/{workflowID}/{runID}_{failoverVersion}.history.gz`)\n- `temporal-visibility` — one object per execution, date-partitioned by close time (key: `visibility/{namespaceID}/{YYYY}/{MM}/{DD}/{closeTimeNano}_{shortRunID}.visibility.gz`)\n\nThe [MinIO console](http://localhost:9011) (credentials: `minioadmin` / `minioadmin`) lets you browse both buckets.\n\n### Namespace archival state\n\nThe `namespaceDefaults.archival` block in the server config is applied **only at namespace creation time** — it has no effect on existing namespaces. Once a namespace exists, its archival state (`HistoryArchivalState`, `VisibilityArchivalState`, and the URIs) is stored in the database and loaded from there on every startup. Static config is never consulted again for existing namespaces.\n\nWhat this means in practice:\n\n- **Fresh start (empty DB):** `temporal-admin-tools` creates the `default` namespace after the server is up. Because `namespaceDefaults.archival` in the rendered config has `state: enabled` with the minio URIs, the namespace is created with archival already enabled.\n- **Restart with a persistent DB:** the namespace DB record already has archival enabled from its original creation — the server loads it from DB as-is, no extra step.\n- **Namespace created before archival was enabled:** the DB record has `HistoryArchivalState: disabled`. Restarting with `USE_MINIO_ARCHIVAL=true` does not update it. `temporal-admin-tools` handles this by running the following update on every start when `USE_MINIO_ARCHIVAL=true` (see `script/setup.sh`):\n\n```bash\ntemporal operator namespace update -n default \\\n    --history-archival-state enabled \\\n    --history-uri \"minio://temporal-history/history\" \\\n    --visibility-archival-state enabled \\\n    --visibility-uri \"minio://temporal-visibility/visibility\"\n```\n\nIf archival is not showing as enabled after the stack comes up, verify the namespace state and run the command above manually if needed:\n\n```bash\ntemporal operator namespace describe -n default | grep -i archival\n```\n\n### Querying archived workflows\n\n```bash\n# list all archived workflows\ntemporal workflow list --archived -n default\n\n# filter by execution status\ntemporal workflow list --archived -n default --query \"ExecutionStatus = 'Completed'\"\ntemporal workflow list --archived -n default --query \"ExecutionStatus = 'Failed'\"\ntemporal workflow list --archived -n default --query \"ExecutionStatus = 'Terminated'\"\ntemporal workflow list --archived -n default --query \"ExecutionStatus = 'TimedOut'\"\ntemporal workflow list --archived -n default --query \"ExecutionStatus = 'Canceled'\"\ntemporal workflow list --archived -n default --query \"ExecutionStatus = 'ContinuedAsNew'\"\n\n# retrieve full event history of an archived workflow\ntemporal workflow show -n default --workflow-id <id> --run-id <run-id>\n```\n\nDecompression is transparent — the CLI, SDK, and UI all receive normal uncompressed responses.\n\n### Controlling which statuses are archived\n\nEdit the `allowedStatuses` list in [`template/my_config_template.yaml`](template/my_config_template.yaml) under `archival.history.provider.customStores.minio` and the matching visibility block. An empty list (`[]`) archives all terminal statuses. Add specific values (e.g. `\"Failed\"`, `\"Terminated\"`) to restrict archival to only those statuses.\n\nFor full implementation details, object key layout, known limitations, and instructions for testing archival locally with reduced delays, see [`server/archiver/README.md`](server/archiver/README.md).","summary":"This project provides a robust reference implementation for self-deploying a Temporal server cluster using Docker Compose and Docker Swarm. It features a sophisticated architecture that includes PostgreSQL for persistence, OpenTelemetry integration for observability, and an etcd-based dynamic configuration system for real-time updates. By offering production-ready patterns such as multi-cluster replication, MinIO archival, and separated server roles, it serves as a valuable resource for engineers looking to manage complex Temporal deployments within containerized environments.","description":"Temporal Server setup for Docker","stars":90,"language":"Go"},{"owner":"nickjvandyke","repo":"opencode.nvim","url":"https://github.com/nickjvandyke/opencode.nvim","readme":"# opencode.nvim\n\nBridge Neovim and [OpenCode AI](https://opencode.ai/) to stay in your flow.\n\nhttps://github.com/user-attachments/assets/e85e021c-fa8f-466e-830c-c667b28f611e\n\n## ✨ Features\n\n- Connect to _any_ OpenCode server, or start an integrated instance\n- Inject editor context (cursor, selection, buffer, ...)\n- Input prompts with completions, highlights, and normal mode\n- Select and define re-usable prompts\n- Execute commands\n- Monitor and respond to events\n- Accept/reject and reload edits\n- Interact intuitively via in-process LSP\n- _Vim-y_ — operator and dot-repeat\n- Simple and sensible de
