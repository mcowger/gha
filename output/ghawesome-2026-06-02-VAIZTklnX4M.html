te (`better-sqlite3`) with AES-256-GCM envelope encryption for keys.\n\n## Limitations\n\nStacking free tiers has real trade-offs. Be honest with yourself about them:\n\n- **No frontier models.** The free-tier catalog tops out around Llama 3.3 70B, GLM-4.5, Qwen 3 Coder, and Gemini 2.5 Pro. You will not get GPT-5 or Claude Opus class reasoning through this. For hard problems, pay for a real API.\n- **Intelligence degrades as the day progresses.** Your top-ranked models (usually Gemini 2.5 Pro, GPT-4o via GitHub Models) have the lowest daily caps. Once they hit their limits, the router falls down your priority chain to smaller/weaker models. Expect the effective intelligence of the endpoint to drop in the late hours of each day — then reset at UTC midnight.\n- **Latency is highly variable.** Cerebras and Groq are extremely fast; others are not. You get whichever one is available.\n- **Free tiers can change without notice.** Providers regularly tighten, loosen, or remove free tiers. When that happens you'll see 429s or auth errors until you update the catalog. Re-seed scripts live in `server/src/scripts/`.\n- **No SLA, by definition.** If you need reliability, use a paid provider with a contract.\n- **Local-first.** There's no multi-tenant auth. Run this for yourself; don't expose it to the internet.\n\n## Contributing\n\nContributors very welcome! Good first PRs:\n\n- **Add a provider** — copy `server/src/providers/openai-compat.ts` as a template, wire it into `server/src/providers/index.ts`, seed its models in `server/src/db/index.ts`, add a test in `server/src/__tests__/providers/`.\n- **Add an endpoint** — embeddings, images, moderations. The provider base class can grow new methods; adapters declare which they support.\n- **Improve the router** — cost-aware routing (cheapest-healthy-fastest tradeoffs), better latency-weighted priority, regional pinning.\n- **Dashboard polish** — charts on the Analytics page, key rotation UX, batch import of keys from `.env`.\n- **Docs** — more examples, client library snippets for Go/Rust/etc., a deployment recipe for Docker or Fly.\n\n**Development loop:**\n\n```bash\nnpm install\nnpm run dev      # server on :3001, dashboard on :5173, both with HMR\nnpm test         # server vitest; also runs client tests if the workspace adds them\nnpm run build    # compile server and dashboard\n```\n\nPRs should include a test, keep the existing test suite green, and match the `.editorconfig` / tsconfig defaults already in the repo. Issues and discussions are open.\n\n### Contributors\n\n<a href=\"https://github.com/moaaz12-web\"><img src=\"https://images.weserv.nl/?url=github.com/moaaz12-web.png&w=60&h=60&fit=cover&mask=circle\" width=\"60\" alt=\"@moaaz12-web\" /></a>\n<a href=\"https://github.com/lukasulc\"><img src=\"https://images.weserv.nl/?url=github.com/lukasulc.png&w=60&h=60&fit=cover&mask=circle\" width=\"60\" alt=\"@lukasulc\" /></a>\n<a href=\"https://github.com/VinhPhamAI\"><img src=\"https://images.weserv.nl/?url=github.com/VinhPhamAI.png&w=60&h=60&fit=cover&mask=circle\" width=\"60\" alt=\"@VinhPhamAI\" /></a>\n<a href=\"https://github.com/deadc\"><img src=\"https://images.weserv.nl/?url=github.com/deadc.png&w=60&h=60&fit=cover&mask=circle\" width=\"60\" alt=\"@deadc\" /></a>\n<a href=\"https://github.com/zhangyu1324\"><img src=\"https://images.weserv.nl/?url=github.com/zhangyu1324.png&w=60&h=60&fit=cover&mask=circle\" width=\"60\" alt=\"@zhangyu1324\" /></a>\n<a href=\"https://github.com/jtbrennan-git\"><img src=\"https://images.weserv.nl/?url=github.com/jtbrennan-git.png&w=60&h=60&fit=cover&mask=circle\" width=\"60\" alt=\"@jtbrennan-git\" /></a>\n<a href=\"https://github.com/praveenkumarpranjal\"><img src=\"https://images.weserv.nl/?url=github.com/praveenkumarpranjal.png&w=60&h=60&fit=cover&mask=circle\" width=\"60\" alt=\"@praveenkumarpranjal\" /></a>\n<a href=\"https://github.com/nordbyte\"><img src=\"https://images.weserv.nl/?url=github.com/nordbyte.png&w=60&h=60&fit=cover&mask=circle\" width=\"60\" alt=\"@nordbyte\" /></a>\n<a href=\"https://github.com/mybropro\"><img src=\"https://images.weserv.nl/?url=github.com/mybropro.png&w=60&h=60&fit=cover&mask=circle\" width=\"60\" alt=\"@mybropro\" /></a>\n<a href=\"https://github.com/danscMax\"><img src=\"https://images.weserv.nl/?url=github.com/danscMax.png&w=60&h=60&fit=cover&mask=circle\" width=\"60\" alt=\"@danscMax\" /></a>\n<a href=\"https://github.com/jhash\"><img src=\"https://images.weserv.nl/?url=github.com/jhash.png&w=60&h=60&fit=cover&mask=circle\" width=\"60\" alt=\"@jhash\" /></a>\n<a href=\"https://github.com/JammyJames1234\"><img src=\"https://images.weserv.nl/?url=github.com/JammyJames1234.png&w=60&h=60&fit=cover&mask=circle\" width=\"60\" alt=\"@JammyJames1234\" /></a>\n<a href=\"https://github.com/Sumit4codes\"><img src=\"https://images.weserv.nl/?url=github.com/Sumit4codes.png&w=60&h=60&fit=cover&mask=circle\" width=\"60\" alt=\"@Sumit4codes\" /></a>\n<a href=\"https://github.com/meliani\"><img src=\"https://images.weserv.nl/?url=github.com/meliani.png&w=60&h=60&fit=cover&mask=circle\" width=\"60\" alt=\"@meliani\" /></a>\n<a href=\"https://github.com/thedavidweng\"><img src=\"https://images.weserv.nl/?url=github.com/thedavidweng.png&w=60&h=60&fit=cover&mask=circle\" width=\"60\" alt=\"@thedavidweng\" /></a>\n\n## Terms of Service review\n\nA self-hosted, single-user, personal-use setup was re-reviewed against each provider's ToS (May 2026). Summary:\n\n| Provider | Verdict | Notes |\n|---|---|---|\n| Google Gemini | ⚠️ Caution | March 2026 ToS narrows scope to *\"professional or business purposes, not for consumer use\"* — a self-hosted developer proxy is still defensible, but the clause is new. |\n| Groq | ✅ Likely OK | GroqCloud Services Agreement permits Customer Application integration. |\n| Cerebras | ✅ Likely OK | Permitted; explicitly forbids selling/transferring API keys. |\n| Mistral | ✅ Likely OK | APIs allowed for personal/internal business use. |\n| OpenRouter | ✅ Likely OK | April 2026 ToS sharpens the no-resale / no-competing-service clause; private single-user proxy still fine. |\n| SambaNova | ⚠️ Ambiguous | EULA §1.5(c) blocks resale and \"service bureau\" use; single-user with no third-party access is fine. |\n| Cloudflare Workers AI | ⚠️ Ambiguous | No anti-proxy clause; covered by general Self-Serve Subscription Agreement. |\n| NVIDIA NIM | ⚠️ Caution | Trial ToS §1.2 / §1.4: *\"evaluation only, not production.\"* Disabled in default catalog. |\n| GitHub Models | ⚠️ Caution | Free tier explicitly scoped to *\"experimentation\"* and *\"prototyping.\"* |\n| Cohere | ❌ Avoid | Terms §14 still forbids *\"personal, family or household purposes.\"* |\n| Zhipu (open.bigmodel.cn) | ✅ Likely OK | Personal/non-commercial research carve-out still in the platform docs. |\n| Z.ai (api.z.ai) | ⚠️ Caution | New row — Singapore entity (distinct from Zhipu CN). §III.3(l) anti-traffic-redirect clause could plausibly be read against a proxy; no explicit personal-use carve-out. |\n| Ollama Cloud | ✅ Likely OK | New row — Free plan permits cloud-model access (1 concurrent, 5-hour session caps). No anti-proxy / anti-resale clauses found. *(Integration tracked in #14.)* |\n\nRules of thumb that keep most providers happy: **one account per provider**, **no reselling**, **no sharing your endpoint with other humans**, **don't hammer a free tier as a paid production backend**. This is informational, not legal advice — read each provider's ToS and make your own call.\n\nRemoved since the April 2026 review: Hugging Face, Moonshot, and MiniMax direct integrations were dropped from the catalog (HF — tool-call format issues; Moonshot — moved to paid only; MiniMax — superseded by the OpenRouter `minimax/minimax-m2.5:free` route).\n\n## Disclaimer\n\n**This project is for personal experimentation and learning, not production.** Free tiers exist so developers can prototype against them; they aren't a stable, supported inference substrate and shouldn't be treated as one. If you build something real on top of FreeLLMAPI, swap in a paid API before you ship. Your relationship with each upstream provider is governed by the terms you accepted when you created your account — those terms still apply when the traffic is proxied through this project, and you're responsible for complying with them.\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/chart?repos=tashfeenahmed/freellmapi&type=date&legend=top-left)](https://www.star-history.com/?repos=tashfeenahmed%2Ffreellmapi&type=date&legend=top-left)\n\n## License\n\n[MIT](./LICENSE)\n","summary":"FreeLLMAPI is a powerful tool that aggregates the free tiers of sixteen major LLM providers into a single, unified OpenAI-compatible endpoint. It features an intelligent router that manages rate limits by automatically falling over to alternative providers while tracking per-key token usage to ensure users stay within free-tier constraints. Developers and power users looking to maximize their free inference capacity will benefit from this project, as it simplifies multi-provider management into a single, seamless API workflow.","description":"OpenAI-compatible proxy that stacks the free tiers of 16 LLM providers (~1.7B tokens/month) behind one /v1 endpoint — plus any custom OpenAI-compatible endpoint. Smart routing, automatic failover, encrypted keys. Personal experimentation only.","stars":7099,"language":"TypeScript"},{"owner":"thClaws","repo":"thClaws","url":"https://github.com/thClaws/thClaws","readme":"<div align=\"center\">\n\n# thClaws 🦞\n\n**The open-source agent harness, in your terminal and on your desktop.**\n\nA native-Rust AI agent workspace that codes, automates, remembers, and coordinates — running on your own machine. One binary. Sovereign by design. Built by a small team hacking in public.\n\n[![GitHub stars](https://img.shields.io/github/stars/thClaws/thClaws?style=social)](https://github.com/thClaws/thClaws/stargazers)\n[![Contributors](https://img.shields.io/github/contributors/thClaws/thClaws.svg)](https://github.com/thClaws/thClaws/graphs/contributors)\n[![Discussions](https://img.shields.io/github/discussions/thClaws/thClaws)](https://github.com/thClaws/thClaws/discussions)\n[![Release](https://img.shields.io/github/v/release/thClaws/thClaws)](https://github.com/thClaws/thClaws/releases)\n[![CI](https://img.shields.io/github/actions/workflow/status/thClaws/thClaws/release.yml?branch=main)](https://github.com/thClaws/thClaws/actions)\n[![License: MIT OR Apache-2.0](https://img.shields.io/badge/license-MIT%20OR%20Apache--2.0-blue.svg)](#license)\n[![Platform](https://img.shields.io/badge/platform-macOS%20·%20Windows%20·%20Linux-lightgrey.svg)](#installation)\n[![Built with Rust](https://img.shields.io/badge/built%20with-Rust-orange.svg)](https://www.rust-lang.org/)\n\n[Website](https://thclaws.ai) · [Download](https://thclaws.ai/downloads.html) · [Manual](https://thclaws.ai/manual) · [Discussions](https://github.com/thClaws/thClaws/discussions) · [Contribute](#contribute)\n\n</div>\n\n---\n\n## ✨ New in v0.23 — dynamic workflows\n\n**LLM writes the code. Boa runs the workers.**\n\n`/workflow run <prompt>` lets the model author a small JavaScript orchestration script that fans your task out across as many parallel subagents as it needs. You review the script before it executes — then thClaws runs it deterministically inside a sandboxed Boa engine. Cancel, resume, set time/token budgets, validate worker output against a JSON schema, all from one line.\n\n<div align=\"center\">\n\n<a href=\"https://thclaws.ai/#dynamic-workflows\"><img src=\"docs/img/dynamic-workflow-thumb.jpg\" alt=\"thClaws v0.23 — dynamic workflows demo (opens autoplay on thclaws.ai)\" width=\"900\" /></a>\n\n*Click to watch on thclaws.ai · 20s demo · `/workflow run summarize each .rs file under thclaws/crates/core/src in one line` → LLM authors JS → you approve → Boa fans out across subagents.*\n\n</div>\n\n```js\n// llm wrote this\nconst files = await thclaws.subagent({\n  prompt: \"list all .ts files in src/\",\n});\nconst list = files.split(\"\\n\");\n\nconst reviews = await Promise.all(\n  list.map(f => thclaws.subagent({\n    prompt: `review ${f}`,\n  }))\n);\n```\n\nRead the chapter → [user-manual/ch25-workflows.md](user-manual/ch25-workflows.md) · or jump straight in with `/workflow run \"<your task>\"`.\n\n---\n\n## See it work\n\nThree tabs, one binary — captured from a live thClaws session looking at its own source.\n\n<div align=\"center\">\n\n<a href=\"docs/img/screens-carousel.webp\"><img src=\"docs/img/screens-carousel.webp\" alt=\"thClaws Desktop GUI — cycling through Files, Terminal, and Chat tabs\" width=\"900\" /></a>\n\n**Files** (codemirror + tiptap)  ·  **Terminal** (REPL · slash commands · ANSI tool output)  ·  **Chat** (markdown render · tool indicators)\n\n</div>\n\n---\n\n## Hacking in public\n\nthClaws started in April 2026. As of this writing the project has shipped **20+ releases**, drawn **27 contributors**, and lands roughly a release a week. It's developed by a small team at **ThaiGPT Co., Ltd.** — and a meaningful chunk of the codebase comes from outside contributors who heard about it and stayed.\n\nWe're aiming for **v1.0 = \"the multi-platform agent\"**: the same agent loop on your desktop, in your terminal, and bridged into Telegram, Discord, Slack, WhatsApp, Facebook Messenger, and LINE. Telegram, LINE, and Messenger are already shipping. Discord, Slack, and WhatsApp are next — and they're great places to plug in. ([Contribute →](#contribute))\n\n> Built in Thailand. Meant for the world.\n\n---\n\n## Four surfaces, one engine\n\nThe same `Agent` loop, `Session`, and `ToolRegistry` back every UX:\n\n- **Desktop GUI** (`thclaws`) — native window with Terminal, Chat, Files, and optional Team tabs.\n- **CLI REPL** (`thclaws --cli`) — interactive terminal prompt for SSH, headless servers, or zero-GUI workflows.\n- **Non-interactive mode** (`thclaws -p \"prompt\"`) — single turn, exits. Pipe-friendly for scripts and CI. `-v` for token usage on stderr.\n- **Webapp** (`thclaws --serve --port 7878`) — same engine over WebSocket/HTTP. SSH-tunnel for \"Claude Code anywhere\" without opening a port.\n\n---\n\n## Features\n\nEverything's in one binary. Pick the surface that fits the task, swap the provider, drop in a skill, glue in an MCP server, then walk away while a scheduled job or background agent finishes the work.\n\n- **Multi-provider** — Anthropic (native + Claude Agent SDK via Claude Code auth), OpenAI (Chat Completions + Responses/Codex), Google Gemini & Gemma, Alibaba DashScope (Qwen), DeepSeek, Z.ai (GLM Coding Plan), NVIDIA NIM, NSTDA Thai LLM (OpenThaiGPT, Typhoon, Pathumma, THaLLE), OpenRouter, Agentic Press, Azure AI Foundry, Ollama (local + Anthropic-compatible + Cloud), LMStudio, plus a generic **OpenAI-compatible** slot (`oai/*`) for LiteLLM / Portkey / Helicone / vLLM / internal proxies. Switch mid-session with `/model` or `/provider`.\n- **Open standards, not a walled garden** — [Model Context Protocol](https://modelcontextprotocol.io/) for tools, [`AGENTS.md`](https://agents.md) for project instructions (adopted by Google, OpenAI, Factory, Sourcegraph, Cursor), `SKILL.md` with YAML frontmatter for packaged workflows. Configuration portable between thClaws, other compliant agents, and whatever comes next.\n- **Skills, plugins, MCP servers, hooks** — extend the agent without touching Rust. Skills are folders with a `SKILL.md`. Plugins bundle skills + commands + agent definitions + MCP servers under one manifest. MCP brings in third-party tools (GitHub, filesystems, browsers, Slack…) over stdio or HTTP-Streamable with OAuth 2.1+PKCE. Hooks run shell scripts on lifecycle events (`pre_tool_use`, `permission_denied`, `session_start`, …).\n- **Three tiers of agent orchestration** — model-driven subagents (`Task` tool, blocking, up to 3 levels deep); user-driven concurrent side-channels (`/agent <name> <prompt>`, parallel to main, own cancel token); multi-process **Agent Teams** with shared mailbox, task queue, tmux panes, and optional git worktrees.\n- **Knowledge bases (KMS) + `/dream`** — per-project and per-user wikis under `.thclaws/kms/<name>/pages/`, indexed by a one-line `index.md`. Grep + read (no embeddings), following Andrej Karpathy's LLM-wiki pattern. `/dream` mines your recent sessions in the background and writes a dated audit-trail page to review with `git diff`.\n- **Plan mode** — `EnterPlanMode` proposes an ordered list of steps you Approve / Cancel / Skip / Retry. Same UX in GUI sidebar and `/plan` slash command.\n- **Schedule recurring jobs** — `/schedule add` runs an agent on cron, fixed intervals, or filesystem changes (`watchWorkspace`). In-process scheduler for ephemeral, native daemon (`launchd` / `systemd-user`) for survives-reboot.\n- **Long-running loops & overnight builds** — `/loop` for fixed-interval iteration, `/goal` for audit-driven completion. `/goal --auto` is a Ralph-style overnight builder that keeps going until the goal is satisfied or you wake up.\n- **Document workflow** — native PDF, DOCX, PPTX, XLSX read + edit + create tools, plus image rendering. Ingest a 50-page PDF, summarize into KMS, produce a follow-up deck — one conversation.\n- **Memory & project instructions** — `AGENTS.md` (or `CLAUDE.md`) walked up from `cwd` and injected into the system prompt. Persistent memory store classified as `user` / `feedback` / `project` / `reference`, stored as markdown you can read, edit, or commit.\n- **Settings as one file** — `.thclaws/settings.json` (project) or `~/.config/thclaws/settings.json` (user). API keys go in the OS keychain by default (macOS Keychain / Windows Credential Manager / Linux Secret Service) with `.env` fallback for CI.\n- **Session resume** — `thclaws --resume last` or `--resume <id>`. Sessions live as JSONL under `.thclaws/sessions/` — git-friendly, grep-friendly, never opaque.\n- **Safety first** — filesystem sandbox scoped to working directory. Destructive shell commands flagged. You approve every mutating tool call unless you've opted into auto-approve. Permission requests label which agent is asking when multiple are running.\n- **Offline-capable** — Ollama (native + Anthropic-compatible) lets you run entirely against a local model. No cloud round-trip, no API key.\n- **Deploy what you build** — ship landing pages, web apps, APIs, and AI agents through [Agentic Press Hosting](https://agentic-press.com) (partnered with SIS Cloud Service and Artech.Cloud) — or any host you prefer. Deploy flow ships as a plugin (`/plugin install …-deploy`), so hosts are swappable. The client never locks you in.\n- **Shell escape** — prefix any REPL line with `!` to run a shell command directly. No tokens, no approval prompt, no agent round-trip (`! git status`, `! ls`).\n\n---\n\n## Contribute\n\n**We'd love your help.** thClaws is built in the open by a small team and ~25 contributors so far. Reviews are typically fast, the codebase is approachable, and there's plenty of room to make a real dent.\n\n### Quick start for contributors\n\n```sh\ngit clone https://github.com/thClaws/thClaws.git\ncd thClaws\n\n# One-shot: build frontend, then cargo build --features gui\n./scripts/build.sh           # macOS / Linux\n./scripts/build.ps1          # Windows PowerShell\n\n# Verification suite (cargo fmt --check, clippy, tsc, cargo test)\n./scripts/build.sh --check\n\n# Run\ncargo run --features gui              # GUI\ncargo run -- --cli                    # CLI REPL\ncargo run -- -p \"explain crates/core\" # one-shot\n```\n\n**Prerequisites:** Rust 1.85+, Node.js 20+, pnpm 9+. The helper enforces frontend-before-cargo order (the GUI build embeds `frontend/dist/index.html` at compile time via `include_str!`). See [CONTRIBUTING.md](CONTRIBUTING.md) for the full PR workflow.\n\n### Where we need help right now\n\nIf you want to land something impactful, these are the places we'd most love a hand:\n\n- 🚀 **Discord adapter** — bridge the agent into a Discord guild (same shape as our shipping Telegram + Messenger adapters in `crates/core/src/messenger/` and friends).\n- 🚀 **Slack adapter** — same idea, Slack-side.\n- 🚀 **WhatsApp adapter** — round out the v1.0 multi-platform thesis.\n- 🪟 **Windows ARM polish** — installer, GUI smoke-test on Surface / Snapdragon X.\n- 🧠 **KMS embeddings (opt-in)** — current KMS is grep + read; an optional embeddings layer alongside (not replacing) would be welcome.\n- 🌏 **i18n & translations** — manual chapters and UI strings are EN/TH today; we'd love help with more locales.\n- 🧩 **Skills, plugins, MCP servers** — no Rust needed. Build one, ship it on GitHub, list it on the marketplace. (See [Skills documentation](https://thclaws.ai/manual).)\n- 📝 **Docs, examples, walkthroughs** — typo fixes welcome, case studies even more welcome.\n\nBrowse [**good first issues**](https://github.com/thClaws/thClaws/issues?q=is%3Aopen+is%3Aissue+label%3A%22good+first+issue%22) or [**help wanted**](https://github.com/thClaws/thClaws/issues?q=is%3Aopen+is%3Aissue+label%3A%22help+wanted%22) to start. If you want to land something bigger, drop into [Discussions](https://github.com/thClaws/thClaws/discussions) and pitch it first — that's the lowest-friction path.\n\n### Codebase tour\n\nEverything ships from a single crate, `crates/core/`. The interesting modules:\n\n| Path | What it does |\n|---|---|\n| `crates/core/src/agent.rs` + `agent_runtime.rs` | The agent loop — turns, tool calls, streaming, cancellation |\n| `crates/core/src/commands.rs` | Slash-command registry (`/help`, `/model`, `/skill`, `/schedule`, …) |\n| `crates/core/src/kms.rs` | Knowledge bases (per-project + per-user) with `KmsRead`/`Search`/`Write`/`Append` tools |\n| `crates/core/src/memory.rs` | Persistent memory store (user / feedback / project / reference) |\n| `crates/core/src/mcp.rs` | MCP transport (stdio + HTTP-Streamable + OAuth 2.1 PKCE) |\n| `crates/core/src/hooks.rs` | Lifecycle hooks (`pre_tool_use`, `post_tool_use`, …) |\n| `crates/core/src/marketplace.rs` | Skill / plugin marketplace client |\n| `crates/core/src/permissions.rs` | Filesystem sandbox + tool approval flow |\n| `crates/core/src/compaction.rs` | Context-window management |\n| `crates/core/src/messenger/`, `line/` | Multi-platform adapters (the v1.0 thesis) |\n| `crates/core/src/gui.rs` + `ipc.rs` | Tauri ↔ React bridge |\n| `frontend/src/` | React + Vite GUI (bundled into a single HTML file via `include_str!`) |\n\nDeeper engineering reference: [`thclaws-technical-manual/`](thclaws-technical-manual/) — agent loop, provider abstraction, KMS internals, side-channel + `/dream` plumbing, schedule daemon, hooks lifecycle, plan-mode driver, and the rest. **Read this before sending non-trivial PRs.**\n\n### Contributors\n\nA huge thank you to the people who've shaped thClaws so far:\n\n<a href=\"https://github.com/thClaws/thClaws/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=thClaws/thClaws\" alt=\"thClaws contributors\" />\n</a>\n\n---\n\n## Installation\n\n### Build from source\n\nThe fastest path if you want to contribute or just see how it's built. See [Contribute → Quick start](#quick-start-for-contributors).\n\n### Pre-built binaries\n\nDownload for your platform from the [Releases page](https://github.com/thClaws/thClaws/releases) or [thclaws.ai/downloads](https://thclaws.ai/downloads.html).\n\nSupported: macOS (Apple Silicon & Intel), Windows (x86_64 & ARM64), Linux (x86_64 & ARM64).\n\n<details>\n<summary><b>Linux runtime dependencies</b> — needed for the GUI binary on headless servers</summary>\n\nThe Linux GUI binary links against Wayland and webkit2gtk at runtime. Desktop distros (Ubuntu Desktop, Fedora Workstation) ship these by default. **Headless servers** (cloud VMs, EC2, Docker images without a display) typically don't — `thclaws` will fail at startup with `error while loading shared libraries: libwayland-client.so.0`.\n\nTwo options:\n\n**(a) Use CLI mode** — no GUI deps required:\n\n```sh\nthclaws --cli\nthclaws -p \"what does src/main.rs do?\"\n```\n\n**(b) Install the GUI deps**:\n\n```sh\n# Debian / Ubuntu\nsudo apt install libwayland-client0 libwebkit2gtk-4.1-0 libsoup-3.0-0\n\n# Fedora / RHEL\nsudo dnf install wayland libsoup3 webkit2gtk4.1\n```\n\n</details>\n\n---\n\n## Quick start\n\n```sh\n# First run: pick a secrets backend (OS keychain or .env) when prompted\nthclaws\n\n# Configure a provider (inside the REPL)\n❯ /provider anthropic\n❯ /model claude-sonnet-4-6\n\n# Or try OpenRouter for 300+ models via one key\n❯ /provider openrouter\n❯ /model openrouter/anthropic/claude-sonnet-4-6\n\n# Drop an AGENTS.md or CLAUDE.md in your repo — it's read automatically\n\n# Useful slash commands\n❯ /help         # list everything\n❯ /models       # list available models for the current provider\n❯ /kms          # list attached knowledge bases\n❯ /skill install https://github.com/anthropics/skills.git\n❯ /mcp add github https://mcp.github.com\n❯ ! git status  # shell escape\n\n# Concurrent and long-running work\n❯ /agent translator แปลไฟล์ src/foo.md เป็นภาษาไทย   # spawn a side-channel agent\n❯ /agents                                            # list active background agents\n❯ /dream                                             # consolidate KMS in the background\n❯ /schedule add --cron \"0 9 * * MON-FRI\" \"review the day's PRs\"\n\n# Headless mode\nthclaws -p \"summarize CHANGELOG.md\"          # one-shot to stdout\nthclaws -p \"summarize CHANGELOG.md\" -v       # + token usage on stderr\nthclaws --resume last                        # pick up the latest session\n\n# Web access\nthclaws --serve --port 7878   # then ssh -L 7878:localhost:7878 user@remote\n```\n\n---\n\n## Configuration\n\nSettings are read in this precedence (higher wins):\n\n1. CLI flags\n2. `.thclaws/settings.json` (project)\n3. `~/.config/thclaws/settings.json` (user)\n4. `~/.claude/settings.json` (fallback)\n5. Compiled-in defaults\n\nOpen-standard files honored directly:\n\n- `CLAUDE.md` / `AGENTS.md` — system prompt additions, walked up from `cwd`\n- `.thclaws/skills/` / `.claude/skills/` — skill catalog\n- `.thclaws/agents/` / `.claude/agents/` — subagent definitions\n- `.mcp.json` / `.thclaws/mcp.json` — MCP server configuration\n- `.thclaws-plugin/plugin.json` / `.claude-plugin/plugin.json` — plugin manifest\n\nAPI keys are **never stored in config files** — only the OS keychain (default) or `.env`.\n\n---\n\n## Community\n\n- 💬 **[GitHub Discussions](https://github.com/thClaws/thClaws/discussions)** — questions, ideas, show-and-tell. The best place to start.\n- 🐛 **[Issues](https://github.com/thClaws/thClaws/issues)** — bug reports + concrete feature requests.\n- ✉️ **Email** — for security disclosures or commercial inquiries: [jimmy@thaigpt.com](mailto:jimmy@thaigpt.com) (see also [SECURITY.md](SECURITY.md)).\n\n---\n\n## Documentation\n\n- **Official site** — [thclaws.ai](https://thclaws.ai)\n- **Full user manual** — [thclaws.ai/manual](https://thclaws.ai/manual) or [`user-manual/`](user-manual/) (EN) / [`user-manual-th/`](user-manual-th/) (ภาษาไทย) — 24 chapters + 7 walkthrough case studies (static site deploy, Node.js reservation site, news-aggregation agent, …).\n- **Technical manual** — [`thclaws-technical-manual/`](thclaws-technical-manual/) — engineering reference.\n- [Contributing](CONTRIBUTING.md) — dev setup, PR flow, commit style\n- [Changelog](CHANGELOG.md) — version history\n- [Code of Conduct](CODE_OF_CONDUCT.md) — Contributor Covenant 2.1\n- [Security](SECURITY.md) — vulnerability disclosure\n- [Enterprise](ENTERPRISE.md) — EE features, private marketplaces, policy overrides\n\nFor books, training, and commercial deployment, see [agentic-press.com](https://agentic-press.com).\n\n---\n\n## License\n\nDual-licensed under either:\n\n- [MIT License](LICENSE-MIT)\n- [Apache License 2.0](LICENSE-APACHE)\n\nat your option. Contributions are accepted under the same dual license — you keep your copyright; we just need permission to ship it.\n\n---\n\n## About\n\nthClaws is developed by **ThaiGPT Co., Ltd.** and published under a dual MIT/Apache-2.0 license. The client is free and open source forever. Enterprise Edition, hosting, and support are commercial offerings — see [agentic-press.com](https://agentic-press.com) or contact [jimmy@thaigpt.com](mailto:jimmy@thaigpt.com).\n\n> Built in Thailand. Meant for the world.\n","summary":"thClaws is a sovereign, open-source AI agent workspace built in Rust that runs locally on your machine via a single binary. It offers powerful orchestration features, such as dynamic workflows that allow LLMs to write and execute sandboxed JavaScript scripts to manage parallel subagents. With integrated desktop and terminal interfaces, it is designed for developers who need a robust, private, and highly customizable environment to code, automate tasks, and coordinate complex AI workflows.","description":"Open-source AI agent harness in native Rust — GUI, CLI, headless, and webapp from one binary. Multi-provider, MCP, skills, plugins, agent teams.","stars":1063,"language":"Rust"},{"owner":"alash3al","repo":"stash","url":"https://github.com/alash3al/stash","readme":"# Stash\n\n**Your AI has amnesia. We fixed it.**\n\nEvery LLM starts every conversation from zero. Stash gives your agent persistent memory — it remembers, recalls, consolidates, and learns across sessions. No more explaining yourself from scratch.\n\nOpen source. Self-hosted. Works with any MCP-compatible agent.\n\n## Quick Start\n\n```bash\ngit clone https://github.com/alash3al/stash.git\ncd stash\ncp .env.example .env   # edit with your API key + model\ndocker compose up\n```\n\nThat's it. Postgres + pgvector, migrations, MCP server with background consolidation — all in one command.\n\n**Next:** [Getting Started guide](docs/GETTING_STARTED.md) — connect your MCP client, run `init` / `remember` / `recall`, and verify everything works.\n\n**Fully local (no cloud API):** [Ollama setup guide](docs/LOCAL_OLLAMA.md) — host Ollama + Docker Compose, private embeddings and reasoner.\n\n## MCP Client Setup\n\nAfter `docker compose up`, Stash exposes an MCP server over SSE at:\n\n```\nhttp://localhost:8080/sse\n```\n\nPoint any MCP-compatible client at that URL. Example configs:\n\n**Cursor** — `~/.cursor/mcp.json`\n```json\n{\n  \"mcpServers\": {\n    \"stash\": {\n      \"url\": \"http://localhost:8080/sse\"\n    }\n  }\n}\n```\n\n**Claude Desktop** — `claude_desktop_config.json`\n```json\n{\n  \"mcpServers\": {\n    \"stash\": {\n      \"url\": \"http://localhost:8080/sse\"\n    }\n  }\n}\n```\n\n**OpenCode** — `~/.config/opencode/config.json`\n```json\n{\n  \"mcp\": {\n    \"stash\": {\n      \"type\": \"remote\",\n      \"url\": \"http://localhost:8080/sse\",\n      \"enabled\": true\n    }\n  }\n}\n```\n\n**Windsurf** — `~/.codeium/windsurf/mcp_config.json`\n```json\n{\n  \"mcpServers\": {\n    \"stash\": {\n      \"url\": \"http://localhost:8080/sse\"\n    }\n  }\n}\n```\n\nWorks with any agent that supports MCP over SSE — Claude Desktop, Cursor, Windsurf, Cline, Continue, OpenAI Agents, Ollama, OpenRouter, and more.\n\n## What It Does\n\nStash is a cognitive layer between your AI agent and the world. Episodes become facts. Facts become relationships. Relationships become patterns. Patterns become wisdom.\n\nA 9-stage consolidation pipeline turns raw observations into structured knowledge — facts, relationships, causal links, patterns, contradictions, goal tracking, failure patterns, and hypothesis verification. Each stage only processes new data since the last run.\n\n## Stash Cloud (Beta — Free)\n\nA hosted, multi-tenant version of Stash is available at **[usestash.io](https://usestash.io/)** and is currently free while in beta.\n\nThe cloud version is written from scratch — it shares no code with this repository. It is designed from the ground up for scalability, multi-tenancy, and long-term sustainability as a product. Feature sets differ in both directions: some things available here aren't in the cloud, and vice versa.\n\n## Learn More\n\n**[alash3al.github.io/stash →](https://alash3al.github.io/stash/)**\n\n## License\n\nApache 2.0\n","summary":"Stash is an open-source, self-hosted cognitive layer that provides persistent memory for LLM-based agents, allowing them to recall information and learn across different sessions. The project utilizes a sophisticated nine-stage consolidation pipeline to transform raw interaction data into structured knowledge, including facts, causal links, and behavioral patterns. By functioning as an MCP-compatible server, it integrates seamlessly with popular AI tools like Cursor, Claude Desktop, and Windsurf. Developers and power users who require their AI agents to retain context and evolve over time will find this tool essential for building more intelligent and stateful automation workflows.","description":"Stash — persistent memory layer for AI agents. Episodes, facts, and working context stored in Postgres. MCP server included. Self-hosted, single binary, no cloud required.","stars":710,"language":"Go"},{"owner":"nakagami","repo":"grdpwasm","url":"https://github.com/nakagami/grdpwasm","readme":"# grdpwasm\n\nA web-based RDP client built with Go WebAssembly and [grdp](https://github.com/nakagami/grdp).\nConnect to a Windows Remote Desktop server directly from your browser — no plugins required.\n\n## Architecture\n\n```\nBrowser (WASM) ──WebSocket──► proxy (Go) ──TCP──► RDP Server\n```\n\nBecause browsers cannot open raw TCP sockets, a lightweight Go proxy server bridges\nWebSocket connections from the browser to the RDP server's TCP port.\n\n## Requirements\n\n- Go 1.24 or later\n- A reachable RDP server (Windows or any RDP-compatible host)\n\n## Build\n\n```bash\ngit clone https://github.com/nakagami/grdpwasm.git\ncd grdpwasm\nmake all\n```\n\n`make all` produces:\n\n| Output | Description |\n|---|---|\n| `static/main.wasm` | Go WASM binary (runs in the browser) |\n| `static/wasm_exec.js` | Go runtime JS support file |\n| `proxy/proxy` | WebSocket-to-TCP proxy + static file server |\n\n## Run\n\n```bash\nmake serve\n# or equivalently:\n./proxy/proxy -listen :8080 -static static\n```\n\nThen open **http://localhost:8080** in your browser.\n\n### Proxy options\n\n| Flag | Default | Description |\n|---|---|---|\n| `-listen` | `:8080` | Address and port to listen on |\n| `-static` | `static` | Directory to serve static files from |\n\n## Usage\n\n1. Open `http://localhost:8080` in a browser.\n2. Fill in the connection form:\n   - **Host** — hostname or IP address of the RDP server\n   - **Port** — RDP port (default `3389`)\n   - **Domain** — Windows domain (leave blank for local accounts)\n   - **User** — username\n   - **Password** — password\n   - **Width / Height** — initial desktop resolution\n3. Click **Connect**.\n4. The remote desktop appears in the canvas. Click the canvas to capture keyboard focus.\n5. Click **Disconnect** to end the session.\n\n## Keyboard & Mouse\n\nAll standard keyboard input is forwarded to the remote desktop via RDP scan codes.\nMouse move, button clicks, and scroll wheel are fully supported.\n\n> **Note:** The browser tab must have focus for keyboard events to be forwarded.\n> Click inside the canvas area if keys stop responding.\n\n## Audio\n\nRemote audio is streamed via RDPSND and played through the browser's Web Audio API\n(PCM 44100 Hz, stereo, 16-bit signed little-endian).\n\n## Security notes\n\n- The proxy accepts connections from any origin. Run it only on a trusted network\n  or add authentication before exposing it to the internet.\n- Credentials are transmitted from the browser to the proxy over WebSocket.\n  Use HTTPS/WSS (put the proxy behind a TLS-terminating reverse proxy such as\n  nginx or Caddy) when accessing it over an untrusted network.\n\n## Development\n\n```\nmake wasm       # rebuild only the WASM binary\nmake proxy      # rebuild only the proxy server\nmake wasm_exec  # refresh wasm_exec.js from the local Go toolchain\nmake clean      # remove all build artifacts\n```\n\n## License\n\nGPLv3 — see [grdp LICENSE](https://github.com/nakagami/grdp/blob/master/LICENSE).\n","summary":"grdpwasm is a web-based Remote Desktop Protocol (RDP) client that allows users to connect to Windows servers directly from their browser without requiring any plugins. It utilizes Go WebAssembly for the client-side logic and a lightweight WebSocket-to-TCP proxy to bridge browser requests to the RDP host. This project is ideal for developers and system administrators who need a portable, browser-native solution for remote desktop access that also supports audio streaming and standard input forwarding.","description":"A web-based RDP client","stars":305,"language":"HTML"},{"owner":"sigcli","repo":"sigcli","url":"https://github.com/sigcli/sigcli","readme":"# Sigcli\n\n**Sign in your way. AI works on your behalf.**\n\n<p align=\"center\">\n  <img src=\"website/public/demo-v2.gif\" alt=\"sig demo\" width=\"720\" />\n</p>\n\nAI agents need access to your work systems — Jira, wikis, calendars, internal APIs. But passing credentials through shell history, environment variables, and agent context windows is a security nightmare.\n\n**sig** handles browser SSO, encrypts credentials at rest, and injects them into any process — so your agents authenticate without ever seeing secrets.\n\n```bash\nnpm install -g @sigcli/cli\n```\n\n## Quick Start\n\n```bash\nsig init                              # create ~/.sig/config.yaml\nsig login https://jira.example.com    # authenticate via browser SSO — once\n\n# now your AI agent can work on your behalf:\nsig request https://jira.example.com/rest/api/2/myself\nsig request https://jira.example.com/rest/api/2/search --method POST --body '{\"jql\":\"assignee=currentUser()\"}'\n```\n\n## OAuth2 / API Tokens\n\nFor APIs that use OAuth2 Client Credentials (no browser needed):\n\n```bash\nsig login https://oauth-mock.mock.beeceptor.com \\\n  --strategy oauth2 \\\n  --token-url https://oauth-mock.mock.beeceptor.com/oauth/token/google \\\n  --client-id test-client \\\n  --client-secret test-secret\n```\n\nThis mock server accepts any client_id/secret and returns a JWT token. After setup:\n\n```bash\nsig status oauth-mock                # check token status\nsig get oauth-mock --no-redaction    # see raw Bearer token\nsig logout oauth-mock                # clear token (keeps secrets)\nsig get oauth-mock                   # auto-refreshes using stored credentials\n```\n\nConfigure once, then all commands work the same as browser-based providers — `sig get`, `sig run`, `sig proxy` all inject the Bearer token automatically.\n\n## Why sig\n\n- **Browser SSO** — signs in through a real browser. Works with any website, any login flow.\n- **OAuth2 Client Credentials** — configure once, sig manages token exchange, expiry, and silent refresh. No browser needed.\n- **Encrypted at rest** — AES-256-GCM encryption. Every access is audit-logged.\n- **Declarative config** — define what to extract (cookies, localStorage, tokens) and how to apply them to requests.\n- **Multi-provider** — inject credentials from multiple systems in a single command.\n- **MITM proxy** — agents set `HTTP_PROXY` and credentials are injected transparently. Zero-trust.\n- **AI-native** — stable CLI with predictable exit codes and JSON output. Built for agents.\n\n## How It Works\n\n```\nYou log in once               sig extracts & encrypts           AI agent operates\nin your browser         -->   credentials locally          -->  on your behalf\n(any SSO/login flow)          (~/.sig/credentials/)             (sig request / sig proxy)\n```\n\n**sig login** opens a browser, you log in normally (SSO, MFA, anything). sig extracts credentials based on `extract[]` rules, validates them against `validateUrl` or `validateRule` (or detects login redirects), encrypts with AES-256-GCM, and stores locally. When your agent needs a request, `apply[]` rules inject credentials into HTTP headers, body, or query params.\n\n## Provider Configuration\n\nMost enterprise/SSO sites work with zero config. Public sites need a bit more. Here's the progression from simple to advanced:\n\n### 1. Zero config (auto-provision)\n\nFor SSO-protected internal tools, just run:\n\n```bash\nsig login https://jira.example.com\n```\n\nsig opens a real browser, you log in, and it writes config automatically:\n\n```yaml\n# ~/.sig/config.yaml (auto-generated)\njira-example:\n    domains:\n        - jira.example.com\n    entryUrl: https://jira.example.com/\n    strategy: browser\n    extract:\n        - from: cookies\n          as: session\n          match: '*'\n    apply:\n        - in: header\n          name: Cookie\n          value: '${session}'\n```\n\n### 2. Public sites (`validateUrl` + `validateRule`)\n\nPublic sites set tracking cookies to **all visitors**. sig can't tell auth cookies from junk using redirect detection alone. Use `validateUrl`, `validateRule`, or both:\n\n**`validateUrl`** — point to a protected endpoint. sig probes it and accepts credentials only on 2xx:\n\n```yaml\nreddit:\n    domains:\n        - www.reddit.com\n        - reddit.com\n    entryUrl: https://www.reddit.com/\n    validateUrl: https://www.reddit.com/prefs/friends\n    strategy: browser\n    extract:\n        - from: cookies\n          as: cookie\n          match: '*'\n    apply:\n        - in: header\n          name: Cookie\n          value: '${cookie}'\n```\n\nsig validates extracted credentials against `validateUrl` — 401/403 means not logged in, 2xx means success.\n\n| Site        | validateUrl                                            |\n| ----------- | ------------------------------------------------------ |\n| Reddit      | `https://www.reddit.com/prefs/friends`                 |\n| X (Twitter) | `https://x.com/i/api/2/notifications/all.json?count=1` |\n| LinkedIn    | `https://www.linkedin.com/voyager/api/me`              |\n| YouTube     | `https://www.youtube.com/account`                      |\n| V2EX        | `https://www.v2ex.com/notifications`                   |\n| Zhihu       | `https://www.zhihu.com/api/v4/me`                      |\n\n**`validateRule`** — a JS expression for APIs that return 200 even when unauthenticated (e.g. with an error code in the JSON body). Use alone or together with `validateUrl`:\n\n```yaml\ndouyin:\n    domains:\n        - www.douyin.com\n    entryUrl: https://www.douyin.com\n    validateUrl: https://www.douyin.com/aweme/v1/web/notice/count/\n    validateRule: 'res.body.status_code === 0'\n    strategy: browser\n    extract:\n        - from: cookies\n          as: cookie\n          match: '*'\n    apply:\n        - in: header\n          name: Cookie\n          value: '${cookie}'\n```\n\n`validateRule` is a JavaScript expression with access to `res` (the validation response):\n\n| Field         | Type                     | Description                                  |\n| ------------- | ------------------------ | -------------------------------------------- |\n| `res.status`  | `number`                 | HTTP status code                             |\n| `res.body`    | `object \\| string`       | Parsed JSON body (or raw string if not JSON) |\n| `res.headers` | `Record<string, string>` | Response headers                             |\n\nThe expression must return a truthy value for credentials to be accepted. Examples:\n\n```yaml\n# API returns { \"status_code\": 0 } on success\nvalidateRule: 'res.body.status_code === 0'\n\n# API returns { \"logged_in\": true }\nvalidateRule: 'res.body.logged_in === true'\n\n# Accept any 2xx that isn't an error page\nvalidateRule: 'res.status >= 200 && res.status < 300 && !res.body.error'\n```\n\nWhen `validateRule` is set, it **overrides** the built-in status-code and redirect detection logic entirely.\n\n### 3. Multiple domains\n\nSome sites use multiple domains (e.g. x.com migrated from twitter.com). List all domains so sig captures cookies from both:\n\n```yaml\nx:\n    domains:\n        - x.com\n        - twitter.com\n    entryUrl: https://x.com/\n    validateUrl: https://x.com/i/api/2/notifications/all.json?count=1\n    strategy: browser\n    networkProxy: socks5://127.0.0.1:3333\n    extract:\n        - from: cookies\n          as: cookie\n          match: '*'\n        - from: cookies\n          as: ct0\n          match: 'ct0'\n    apply:\n        - in: header\n          name: Cookie\n          value: '${cookie}'\n        - in: header\n          name: x-csrf-token\n          value: '${ct0}'\n        - in: header\n          name: authorization\n          value: 'Bearer AAAAAAAAAAAAAAAAAAAAANRILgAAAAAAnNwIzUejRCOuH5E6I8xnZz4puTs%3D1Zv7ttfk8LF81IUq16cHjhLTvJu4FA33AGWWjCpTnA'\n```\n\n### 4. localStorage extraction (advanced)\n\nSome apps store tokens in localStorage instead of cookies. Use `from: localStorage` with `match` (key pattern) and `jsonPath` (nested field):\n\n```yaml\napp-slack:\n    domains:\n        - your-org.enterprise.slack.com\n    entryUrl: https://app.slack.com/client/YOUR_TEAM_ID\n    strategy: browser\n    extract:\n        - from: cookies\n          as: session\n          match: '*'\n        - from: localStorage\n          as: xoxc-token\n          match: localConfig_v2\n          jsonPath: teams.YOUR_TEAM_ID.token\n    apply:\n        - in: header\n          name: Cookie\n          value: '${session}'\n        - in: header\n          name: Authorization\n          value: 'Bearer ${xoxc-token}'\n```\n\nFull guide with debugging tips at **[sigcli.ai](https://sigcli.ai)**.\n\n## AI Agent Skills\n\nPre-built Python scripts that let AI agents operate 14+ web services — email, chat, forums, video platforms, social networks, and more. Each skill includes scripts + documentation that agents read and execute autonomously.\n\n<p align=\"center\">\n  <img src=\"pitch/x-demo.gif\" alt=\"X (Twitter) skill: search and reply from your terminal\" width=\"720\" />\n</p>\n\nInstall skills to your coding agent (Claude Code, Cursor, Windsurf, Cline):\n\n```bash\nnpx @sigcli/skills            # install skills to your coding agent\n```\n\nSee the [full skills catalog](skills/README.md) for details.\n\n## Documentation\n\nFull docs, configuration, SDK, and AI agent integration guide at **[sigcli.ai](https://sigcli.ai)**.\n\n## Issues\n\nReport an issue https://github.com/sigcli/sigcli/issues\n\nOr contact me: syncviip@gmail.com\n\n## License\n\n[MIT](LICENSE)\n","summary":"Sigcli is a secure credential management tool designed to allow AI agents to interact with enterprise systems like Jira, wikis, and calendars without exposing raw credentials. By leveraging browser-based SSO and encrypted local storage, it handles authentication, token refreshing, and credential injection seamlessly behind the scenes. It provides developers and AI engineers with a robust way to authorize automated tasks through a proxy or CLI interface, ensuring that sensitive access tokens remain protected and audit-logged at all times.","description":"The authentication CLI & Proxy for AI agents. Give agents access, not your credentials.","stars":244,"language":"TypeScript"},{"owner":"jay-sahnan","repo":"signal","url":"https://github.com/jay-sahnan/signal","readme":"<div align=\"center\">\n\n<!-- Drop your logo at public/signal-logo.png (or .svg) and reference it here -->\n<!-- <img src=\"./public/signal-logo.png\" alt=\"Signal\" width=\"140\" /> -->\n\n# Signal\n\n### Open-source AI sales intelligence and outreach automation.\n\n**The open alternative to Clay, Apollo, and Outreach — run it on your own keys.**\n\n[![License: AGPL v3](https://img.shields.io/badge/License-AGPL_v3-blue.svg)](./LICENSE)\n[![PRs Welcome](https://img.shields.io/badge/PRs-welcome-brightgreen.svg)](./.github/CONTRIBUTING.md)\n[![Built with Claude](https://img.shields.io/badge/Built%20with-Claude-d97757.svg)](https://www.anthropic.com/claude)\n[![Stars](https://img.shields.io/github/stars/jay-sahnan/signal?style=social)](https://github.com/jay-sahnan/signal/stargazers)\n\n🌐 [Website](https://github.com/jay-sahnan/signal) &nbsp;·&nbsp;\n📚 [Docs](./docs) &nbsp;·&nbsp;\n🏗️ [Architecture](./docs/architecture.md) &nbsp;·&nbsp;\n⚡ [Quick start](#-quick-start) &nbsp;·&nbsp;\n💬 [Discussions](../../discussions)\n\n<br />\n\n<!-- Drop a hero screenshot or GIF at docs/assets/hero.png and uncomment: -->\n<!-- <img src=\"./docs/assets/hero.png\" alt=\"Signal workspace\" width=\"860\" /> -->\n\n</div>\n\n---\n\nSignal watches the web for buying signals (hiring changes, funding news, product launches, review shifts), enriches the companies and contacts behind them, drafts personalized outreach, and runs multi-step email sequences — all from a single chat-first workspace.\n\nIt's built for teams that want a CRM-adjacent tool they can read, fork, self-host, and extend. Instead of paying per seat for a black-box SaaS, run Signal on your own Supabase + Anthropic keys and own the pipeline end to end.\n\n> 🧪 Signal is designed for single-tenant self-hosting — one Supabase project per team. See [architecture.md](./docs/architecture.md#multi-tenancy) before deploying for multiple independent teams.\n\n> ⚠️ **Upgrading from a pre-Clerk version?** Auth has migrated from Supabase Auth to Clerk (Supabase remains the data layer). **Take a `pg_dump` first — this migration is destructive and not reversible.** It **wipes all user-owned data** (`campaigns`, `chats`, `user_profile`, `api_usage`, `user_settings`, `email_drafts`, `sent_emails`, `sequences`, plus user-authored `email_skills`) — old Supabase user UUIDs don't map to Clerk IDs. Built-in seed data and shared pools (`organizations`, `people`, `signals`) survive. Sign up for a free Clerk account ([10k MAU free](https://clerk.com/pricing)) and run `pnpm setup` to wire it up. See [docs/setup.md § Clerk](./docs/setup.md#4-clerk-auth) and [`supabase/migrations/20260427000000_clerk_auth_migration.sql`](./supabase/migrations/20260427000000_clerk_auth_migration.sql) if you need a custom backfill.\n\n<br />\n\n## ✨ Features\n\n- 🛰️ **Signals engine** — authorable \"recipes\" that watch companies and surface buying triggers.\n- 💬 **Campaign workspace** — chat-driven interface backed by Claude to research, shortlist, and draft.\n- 🔎 **Contact enrichment** — pulls LinkedIn, GitHub, and company pages into a single profile.\n- ✉️ **Outreach sequences** — multi-step emails via AgentMail with open / reply tracking.\n- 🤖 **Browser automation** — Browserbase + Stagehand for the long tail of sites without APIs.\n- 🔐 **Own your data** — Postgres + RLS on your Supabase; bring your own LLM keys.\n\n<!-- Drop product GIFs here to mimic Postiz's feature grid. Example:\n<div align=\"center\">\n  <img src=\"./docs/assets/signals.gif\" width=\"48%\" />\n  <img src=\"./docs/assets/workspace.gif\" width=\"48%\" />\n  <img src=\"./docs/assets/sequences.gif\" width=\"48%\" />\n  <img src=\"./docs/assets/enrichment.gif\" width=\"48%\" />\n</div>\n-->\n\n<br />\n\n## 🛠️ Tech stack\n\n- **Framework** — Next.js 16 (App Router) + React 19 + TypeScript\n- **Database** — Supabase (Postgres + Auth + RLS)\n- **AI** — Anthropic Claude via `@ai-sdk/anthropic` and the Vercel AI SDK\n- **Automation** — Browserbase + Stagehand for browser tasks\n- **Email** — AgentMail for send / reply / open tracking\n- **Jobs** — QStash (Upstash) for scheduled signal runs\n- **UI** — Tailwind CSS 4, shadcn/ui\n- **Testing** — Vitest, Playwright\n\n<br />\n\n## 🚀 Quick start\n\nYou'll need **Node 20+**, **Docker**, the **Supabase CLI**, a **Supabase project** (hosted or local), and an **Anthropic API key**.\n\n```bash\ngit clone https://github.com/jay-sahnan/signal.git\ncd signal\ncorepack enable      # activates the pinned pnpm version\npnpm install\npnpm setup           # interactive: prompts for required keys, runs migrations\npnpm dev             # http://localhost:3000\n```\n\nPrefer to configure by hand? Follow [`docs/setup.md`](./docs/setup.md).\n\n<br />\n\n## 🐳 Self-host with Docker\n\n```bash\ncp .env.example .env\n# fill in SUPABASE_URL + ANTHROPIC_API_KEY at minimum\ndocker compose up -d\n```\n\nSignal does not bundle Supabase in the compose file — bring your own (hosted Supabase project or local `supabase start`). See [`docs/setup.md`](./docs/setup.md) for the full walkthrough.\n\n<br />\n\n## 🤝 Contributing\n\nIssues and PRs welcome. Start with [`.github/CONTRIBUTING.md`](./.github/CONTRIBUTING.md). AI-assisted PRs are fine — we build with Claude ourselves.\n\nLooking for somewhere to start? Filter issues by [`good first issue`](../../labels/good%20first%20issue).\n\n<br />\n\n## 💬 Community\n\n- 🐛 [Issues](../../issues) — bug reports and feature requests\n- 💡 [Discussions](../../discussions) — questions, ideas, show & tell\n- 🔒 [Security](./.github/SECURITY.md) — vulnerability disclosure\n\n<br />\n\n<br /><br />\n\n## 📄 License\n\n[AGPL-3.0](./LICENSE) with an optional enterprise carve-out for files explicitly tagged. See the license file for details.\n","summary":"Signal is an open-source, AI-powered sales intelligence platform designed to replace traditional tools like Apollo and Outreach by allowing teams to self-host their entire lead generation pipeline. The project provides a chat-first workspace that monitors web-based buying signals, enriches lead data, and executes multi-step, personalized email outreach sequences. By leveraging user-owned Supabase and Anthropic keys, it offers a transparent and extensible alternative for teams that prioritize data sovereignty and custom automation over restrictive SaaS subscription models.","description":null,"stars":266,"language":"TypeScript"},{"owner":"kiwifs","repo":"kiwifs","url":"https://github.com/kiwifs/kiwifs","readme":"<p align=\"center\">\n  <img src=\"kiwifs.png\" alt=\"KiwiFS\" width=\"200\" />\n</p>\n\n<h1 align=\"center\">KiwiFS</h1>\n\n<p align=\"center\">\n  <strong>Markdown filesystem for agents and teams.</strong>\n</p>\n\n<p align=\"center\">\n  Searchable. Structured. Versioned. One binary, zero config.\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/kiwifs/kiwifs/actions/workflows/ci.yml\"><img src=\"https://github.com/kiwifs/kiwifs/actions/workflows/ci.yml/badge.svg\" alt=\"CI\"></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/badge/license-BSL--1.1-blue\" alt=\"License: BSL 1.1\"></a>\n  <a href=\"https://github.com/kiwifs/kiwifs\"><img src=\"https://img.shields.io/badge/go-1.25-00ADD8?logo=go&logoColor=white\" alt=\"Go 1.25\"></a>\n  <a href=\"https://hub.docker.com/r/ameliaanhlam/kiwifs\"><img src=\"https://img.shields.io/docker/pulls/ameliaanhlam/kiwifs\" alt=\"Docker Pulls\"></a>\n  <a href=\"https://github.com/kiwifs/kiwifs\"><img src=\"https://img.shields.io/badge/single_binary-yes-green\" alt=\"Single Binary\"></a>\n  <a href=\"https://github.com/kiwifs/kiwifs\"><img src=\"https://img.shields.io/badge/PRs-welcome-brightgreen\" alt=\"PRs Welcome\"></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://docs.kiwifs.com\">Docs</a> · <a href=\"docs/API.md\">API</a> · <a href=\"https://demo.kiwifs.com/storybook/\">Storybook</a> · <a href=\"docs/EXAMPLES.md\">Examples</a> · <a href=\"docs/FAQ.md\">FAQ</a> · <a href=\"docs/ROADMAP.md\">Roadmap</a> · <a href=\"docs/ARCHITECTURE.md\">Architecture</a> · <a href=\"CONTRIBUTING.md\">Contributing</a>\n</p>\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/kiwifs/kiwifs/main/install.sh | sh\nkiwifs init --root ./knowledge && kiwifs serve --root ./knowledge\n# Open http://localhost:3333\n```\n\n**Or with Docker:**\n\n```bash\ndocker run -p 3333:3333 -v ./knowledge:/data ameliaanhlam/kiwifs\n```\n\n---\n\n## The problem\n\nMarkdown is the lingua franca of agents and developers, but raw `.md` files are just files. No search, no versioning, no structure. Current solutions make you choose: databases agents can't read, read-only retrieval layers agents can't write to, ephemeral sandboxes that vanish, or proprietary SaaS you can't self-host.\n\nKiwiFS makes markdown files writable, searchable, queryable, versioned, and human-readable. Files are the source of truth. Everything else is a derivative index you can rebuild.\n\n```\nAGENT                              HUMAN\ncat /kiwi/pages/auth.md            Web UI (wiki links, graph view,\ngrep -r \"timeout\" /kiwi/             block editor, dark mode)\necho \"# Report\" > /kiwi/r.md      Cmd+K search, backlinks, TOC\n\n       |                                |\n     Markdown files on disk (single source of truth)\n       |                |              |\n    Git versioning   FTS5 + vector   SSE events\n    (audit trail)    (search index)  (live updates)\n```\n\n---\n\n## Features\n\n| | |\n|---|---|\n| **62 MCP tools** | Native integration with Claude, Cursor, and any MCP client. [Docs](https://docs.kiwifs.com/concepts/mcp) |\n| **Web UI** | Block editor with wiki links, backlinks, knowledge graph, and dark mode. Embedded in the binary via `go:embed` — no separate frontend to deploy. [Browse components](https://demo.kiwifs.com/storybook/) |\n| **Full-text + vector search** | BM25 via SQLite FTS5. Pluggable vector: OpenAI, Ollama, Cohere + sqlite-vec, Qdrant, pgvector, Pinecone. [Docs](https://docs.kiwifs.com/concepts/search) |\n| **Git versioning** | Every write is an atomic commit. Blame, diff, point-in-time restore. [Docs](https://docs.kiwifs.com/concepts/versioning) |\n| **DQL queries** | SQL-like queries over frontmatter. `TABLE`, `LIST`, `COUNT`, `WHERE`, `SORT`, `GROUP BY`. [Docs](https://docs.kiwifs.com/concepts/dql) |\n| **6 access protocols** | REST, MCP, NFS, S3, WebDAV, FUSE. All flow through one storage layer. [Docs](https://docs.kiwifs.com/concepts/agent-interface) |\n| **19 data importers** | Postgres, MySQL, MongoDB, Notion, CSV, Obsidian, and more. [Docs](https://docs.kiwifs.com/import/overview) |\n| **Content health** | Stale page detection, broken links, orphans, contradiction finder, trust-ranked search. [Docs](https://docs.kiwifs.com/api/analytics) |\n| **Multi-space** | One server, multiple isolated workspaces. Each with its own git repo and search index. |\n| **Webhooks** | POST to Slack/CI/custom URLs on write/delete events. HMAC signing, retry with backoff. [Docs](https://docs.kiwifs.com/concepts/webhooks) |\n| **Schema validation** | Enforce structure with JSON Schema on writes. [Docs](https://docs.kiwifs.com/concepts/schemas) |\n| **Wiki links** | `[[page]]` syntax with backlinks, knowledge graph visualization. [Docs](https://docs.kiwifs.com/concepts/wiki-links) |\n| **Data export** | JSONL/CSV with optional embeddings, link graph, and content. [Docs](https://docs.kiwifs.com/export/overview) |\n| **CLI** | 25+ commands: `serve`, `mcp`, `query`, `import`, `export`, `lint`, `connect`, and more. [Docs](https://docs.kiwifs.com/cli/commands) |\n| **Embeddable** | Use as a Go library (`pkg/kiwi`) in your own app. [Docs](https://docs.kiwifs.com/deploy/go-embed) |\n\n[See all features and configuration](https://docs.kiwifs.com)\n\n---\n\n## Quickstart\n\n```bash\n# Install (macOS / Linux)\nbrew install kiwifs/tap/kiwifs\n# or: curl -fsSL https://raw.githubusercontent.com/kiwifs/kiwifs/main/install.sh | sh\n# or: go install github.com/kiwifs/kiwifs@latest\n\n# Initialize\nkiwifs init --template knowledge --root ./knowledge\n\n# Serve\nkiwifs serve --root ./knowledge\n# REST API on :3333, web UI at http://localhost:3333\n\n# Write from an agent\ncurl -X PUT 'localhost:3333/api/kiwi/file?path=pages/auth.md' \\\n  -H \"X-Actor: my-agent\" \\\n  -d \"# Authentication\\n\\nOAuth2 + JWT...\"\n```\n\n---\n\n## Connect your AI tools\n\n**Local (Claude Desktop / Cursor / any MCP client):**\n\n```json\n{\n  \"mcpServers\": {\n    \"kiwifs\": {\n      \"command\": \"kiwifs\",\n      \"args\": [\"mcp\", \"--root\", \"/path/to/knowledge\"]\n    }\n  }\n}\n```\n\n**Cloud (KiwiFS Cloud workspace):**\n\n```json\n{\n  \"mcpServers\": {\n    \"kiwi\": {\n      \"url\": \"https://api.kiwifs.com/api/workspaces/my-workspace/mcp\",\n      \"headers\": { \"Authorization\": \"Bearer ${env:KIWI_API_KEY}\" }\n    }\n  }\n}\n```\n\nOr auto-configure all detected clients with one command:\n\n```bash\nkiwifs connect my-workspace --write auto\n```\n\n---\n\n## How it compares\n\n| | KiwiFS | Git repo | Postgres | Obsidian | Chroma |\n|---|---|---|---|---|---|\n| **What it is** | Markdown filesystem | DIY files + git | Relational database | Local markdown editor | Vector store (OSS) |\n| **Agents can write** | MCP, REST, `cat` | `echo` + manual commit | SQL inserts | Local files only | Upsert embeddings |\n| **MCP support** | Native (62 tools) | No | No | No | No |\n| **Human-readable UI** | Built-in web UI | Raw files / GitHub | Needs custom UI | Desktop app | No |\n| **Search** | FTS (BM25) + vector | `grep` | SQL `LIKE` / pg_trgm | Plugins | Vector similarity |\n| **Structured queries** | DQL over frontmatter | No | SQL (full power) | Plugin (Dataview) | Metadata filters |\n| **Versioning** | Auto git commits | Manual | WAL / migrations | No | No |\n| **Data format** | Markdown (portable) | Markdown (portable) | Tables (locked in) | Markdown (portable) | Embeddings (opaque) |\n| **Best for** | Agent workspace + team wiki | Simple scripts | App backends | Personal notes | OSS semantic search |\n\n---\n\n## Who this is for\n\n**AI agent builders** — Your agents write markdown via MCP, REST, or `cat`. Humans browse the same files in a web UI with wiki links and graph view. Context compounds across sessions instead of vanishing.\n\n**Teams replacing Confluence / Notion** — Markdown files on disk, wiki links, graph view, Notion-like editor. `git clone` your entire wiki. Self-hosted. No vendor lock-in.\n\n**Compliance-heavy industries** — Every change is a git commit with SHA-1 hash chain. Immutable audit trail. `git blame` for per-line attribution.\n\n**DevOps / platform teams** — Runbooks that agents update after every incident. Humans review in the UI. No more docs that rot.\n\n---\n\n## Architecture\n\n```\n┌──────────────────────────────────────────────────────────┐\n│  KiwiFS                                    single Go binary\n│                                                          │\n│  ┌────────────────────────────────────────────────────┐  │\n│  │  Web UI (embedded via go:embed)                    │  │\n│  │  shadcn/ui · CodeMirror · react-markdown · Sigma.js│  │\n│  └────────────────────┬───────────────────────────────┘  │\n│                       │                                  │\n│  ┌────────────────────▼───────────────────────────────┐  │\n│  │  Access: REST :3333 · NFS :2049 · S3 :3334 · WebDAV│  │\n│  └────────────────────┬───────────────────────────────┘  │\n│                       │                                  │\n│  ┌────────────────────▼───────────────────────────────┐  │\n│  │  Core                                              │  │\n│  │  Storage · Git versioning · FTS5 + Vector search   │  │\n│  │  Watcher (fsnotify) · SSE events · Schema/lint     │  │\n│  └────────────────────┬───────────────────────────────┘  │\n│                       │                                  │\n│  ┌────────────────────▼───────────────────────────────┐  │\n│  │  Filesystem: local · NFS · EFS · JuiceFS · FUSE-S3 │  │\n│  └────────────────────────────────────────────────────┘  │\n└──────────────────────────────────────────────────────────┘\n```\n\n---\n\n## Community Integrations\n\nBuilt something on KiwiFS? [Open a discussion](https://github.com/kiwifs/kiwifs/discussions) and we'll list it here.\n\n| Project | Description | Author |\n|---------|-------------|--------|\n| [pi-kiwifs-extension](https://github.com/jontstaz/pi-kiwifs-extension) | Full KiwiFS integration for the Pi coding agent | [@jontstaz](https://github.com/jontstaz) |\n\n---\n\n## Inspired by\n\n- **[PocketBase](https://pocketbase.io)** — single Go binary, zero config, just works. KiwiFS brings the same philosophy to markdown infrastructure.\n- **[Obsidian](https://obsidian.md)** — files are the database. Wiki links. Graph view. KiwiFS is Obsidian for the web, plus agents and an API.\n- **[Karpathy's LLM Wiki](https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f)** — raw sources in, compiled wiki out, agent maintains it. KiwiFS is the production runtime for this pattern.\n- **[Notion](https://notion.so)** / **[Confluence](https://www.atlassian.com/software/confluence)** — great UIs, but your content is locked in their database and agents can't use them. KiwiFS gives you the editing experience without the lock-in.\n\n## License\n\n[Business Source License 1.1](LICENSE) — free to use, self-host, and modify. The only restriction: you can't offer KiwiFS as a commercial hosted service. Each release converts to Apache 2.0 after 4 years.\n\nIf you want to offer KiwiFS as a managed service or need a commercial license, [get in touch](mailto:amelia.anh.lam@gmail.com).\n\n\"KiwiFS\" and the KiwiFS logo are trademarks of the KiwiFS Authors. See [LICENSE](LICENSE) for trademark usage guidelines.\n\n## Star History\n\n<a href=\"https://star-history.com/#kiwifs/kiwifs&Date\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/svg?repos=kiwifs/kiwifs&type=Date&theme=dark\" />\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/svg?repos=kiwifs/kiwifs&type=Date\" />\n    <img alt=\"Star History Chart\" src=\"https://api.star-history.com/svg?repos=kiwifs/kiwifs&type=Date\" />\n  </picture>\n</a>\n\n## Contributors\n\nThanks to everyone who has contributed to KiwiFS.\n\n<a href=\"https://github.com/amelia751\"><img src=\"https://github.com/amelia751.png\" width=\"50\" alt=\"amelia751\"></a>\n<a href=\"https://github.com/hermes-agent\"><img src=\"https://github.com/hermes-agent.png\" width=\"50\" alt=\"hermes-agent\"></a>\n<a href=\"https://github.com/shoveller\"><img src=\"https://github.com/shoveller.png\" width=\"50\" alt=\"shoveller\"></a>\n<a href=\"https://github.com/jasperdevs\"><img src=\"https://github.com/jasperdevs.png\" width=\"50\" alt=\"jasperdevs\"></a>\n<a href=\"https://github.com/KavishShah15\"><img src=\"https://github.com/KavishShah15.png\" width=\"50\" alt=\"KavishShah15\"></a>\n<a href=\"https://github.com/Avuru02\"><img src=\"https://github.com/Avuru02.png\" width=\"50\" alt=\"Avuru02\"></a>\n<a href=\"https://github.com/SAY-5\"><img src=\"https://github.com/SAY-5.png\" width=\"50\" alt=\"SAY-5\"></a>\n<a href=\"https://github.com/PranavChahal\"><img src=\"https://github.com/PranavChahal.png\" width=\"50\" alt=\"PranavChahal\"></a>\n<a href=\"https://github.com/nanookclaw\"><img src=\"https://github.com/nanookclaw.png\" width=\"50\" alt=\"nanookclaw\"></a>\n\nWant to help? See [CONTRIBUTING.md](CONTRIBUTING.md).\n","summary":"KiwiFS is a markdown-based filesystem designed to act as a structured, searchable, and versioned source of truth for both human teams and AI agents. It functions as a single, zero-config binary that provides advanced capabilities like full-text and vector search, Git-backed version control, and SQL-like querying over frontmatter metadata. With support for multiple access protocols—including MCP, REST, and FUSE—the project allows developers and AI workflows to interact with markdown files through a unified interface. It is an ideal solution for teams seeking to bridge the gap between human-readable documentation and machine-accessible knowledge management.","description":"Markdown filesystem for agents and teams.","stars":754,"language":"Go"},{"owner":"mendrik-private","repo":"sqv","url":"https://github.com/mendrik-private/sqv","readme":"# sqview\n\n**sqview** is a keyboard-first terminal viewer for SQLite databases. It is built for fast table browsing, in-place editing, filtering, sorting, and foreign-key navigation without leaving the terminal.\n\n<img width=\"2874\" height=\"1593\" alt=\"image\" src=\"https://github.com/user-attachments/assets/c4e6ffbb-f28f-40fe-892c-0abf9f2fc5d0\" />\n<br/>\n<img width=\"2874\" height=\"1593\" alt=\"image\" src=\"https://github.com/user-attachments/assets/43446fd9-01b1-4856-999a-2a59e59fb183\" />\n\n## Highlights\n\n- Fast virtual scrolling for large tables\n- Rich cell editors for text, enums, dates, datetimes, and foreign keys\n- Per-column filters, sorting, and alphabet jump navigation\n- Export current views to CSV, JSON, or SQL\n- Read-only mode for safe inspection\n\n## Install\n\n### Debian/Ubuntu package\n\nDownload the latest Debian package from GitHub Releases and install it directly:\n\n```bash\ntmp_deb=\"$(mktemp /tmp/sqview-linux-amd64.XXXXXX.deb)\"\ncurl -fL --retry 5 --retry-all-errors --retry-delay 2 -o \"$tmp_deb\" \\\n  https://github.com/mendrik-private/sqv/releases/latest/download/sqview-linux-amd64.deb\nchmod 0644 \"$tmp_deb\"\nsudo apt install \"$tmp_deb\"\nrm -f \"$tmp_deb\"\n```\n\nThis installs the `sqview` package and the `sqview` command, avoiding the `sqv` name collision with Ubuntu's OpenPGP tool.\n\n### Release binary\n\nDownload the latest Linux binary archive from GitHub Releases and install it into `/usr/local/bin`:\n\n```bash\ncurl -fL --retry 5 --retry-all-errors --retry-delay 2 -o sqview-linux-x86_64.tar.gz \\\n  https://github.com/mendrik-private/sqv/releases/latest/download/sqview-linux-x86_64.tar.gz\ntar -xzf sqview-linux-x86_64.tar.gz\nsudo install -m 0755 sqview /usr/local/bin/sqview\n```\n\n### From source\n\n```bash\ncargo install --path . --bin sqview\n```\n\nOr run directly from the checkout:\n\n```bash\ncargo run --release -- path/to/database.db\n```\n\nUse the built-in help to inspect the current CLI surface:\n\n```bash\nsqview --help\nsqview --version\n```\n\n## Usage\n\n```text\nsqview [OPTIONS] <DB_PATH>\nsqview check-terminal\nsqview paths\n```\n\n- `DB_PATH`: path to a SQLite database, or `:memory:`\n- `--readonly`: disable writes\n- `--no-watch`: disable automatic external refresh when the database file changes\n- `check-terminal`: print detected terminal capabilities\n- `paths`: print the config, data, and filter-state paths used by sqview\n\n## Keybindings\n\n### Navigation\n\n| Key | Action |\n|-----|--------|\n| `↑ ↓ ← →` / `h j k l` | Move focused cell |\n| `Home` / `End` | First / last column in row |\n| `Ctrl-Home` / `Ctrl-End` | First / last cell in table |\n| `PgUp` / `PgDn` / `Ctrl-↑` / `Ctrl-↓` | Scroll one viewport |\n| `Mouse wheel` | Scroll rows |\n| `Shift-wheel` | Scroll columns |\n| `Click gutter` | Select a row |\n| `Ctrl-click gutter` | Toggle a row in the selection |\n| `Click cell` | Focus cell |\n\n### Editing\n\n| Key | Action |\n|-----|--------|\n| `Enter` | Open the focused cell picker/editor |\n| `Alt-Enter` | Insert a newline in the direct text editor |\n| `e` | Open the focused cell in the direct editor |\n| `n` | Set the focused cell to `NULL` when allowed |\n| `Esc` | Clear selection or close popup |\n| `Alt-Enter` | Save an inserted row from the staged row editor |\n| `i` | Insert row in a staged editor, then validate on save |\n| `d` | Delete row |\n| `Ctrl-z` | Undo last write |\n\n### Filtering, sorting, and other actions\n\n| Key | Action |\n|-----|--------|\n| `s` | Cycle sort on focused column |\n| `f` | Open filter popup for focused column |\n| `Shift-F` | Clear filters |\n| `j` | Jump through a foreign key |\n| `Backspace` | Jump back |\n| `Ctrl-b` | Toggle sidebar |\n| `Ctrl-Shift-P` | Command palette |\n| `Ctrl-Q` | Quit |\n\n## Configuration\n\nConfiguration is read from:\n\n```text\n$XDG_CONFIG_HOME/sqview/config.toml\n```\n\nOn first launch, sqview creates this file automatically if it is missing. If only the legacy `sqv` config exists, sqview copies it forward to the current path before loading it.\n\nExample:\n\n```toml\nnerd_font = true\n\n[theme]\naccent = \"#d99a5e\"\nbg = \"#23211f\"\n\n[symbols]\ntable_icon = \"󰓫\"\nview_icon = \"󰈈\"\nindex_icon = \"󰓹\"\nfilter_icon = \"󰈲\"\nselection = \"⏵\"\ntab_close = \"×\"\n```\n\nEvery theme token and every UI glyph/icon now lives in this config file, so users can fully restyle the palette and override the icon set without editing Rust sources. Single-cell drawing symbols such as borders, cursors, and selection markers must stay one character wide.\n\n## Development\n\n### Local validation\n\n```bash\ncargo fmt\ncargo clippy -- -D warnings\ncargo test\n```\n\n### Release pipeline\n\nGitHub Actions provides:\n\n1. **CI** on pushes and pull requests: format check, clippy, and tests\n2. **Tagged releases** on `v*` tags:\n    - build the release binary\n    - build a Debian package\n    - publish GitHub Release assets\n3. **Manual releases** from the Actions tab:\n    - use the selected branch's `Cargo.toml` version as the release tag\n    - create or update the matching GitHub Release for that commit\n\nTo cut a release:\n\n```bash\ngit tag v0.2.4\ngit push origin v0.2.4\n```\n","summary":"Sqview is a keyboard-first terminal interface designed for efficient browsing and management of SQLite databases. It offers powerful capabilities such as virtual scrolling for large datasets, in-place cell editing with support for various data types, and sophisticated navigation through filters, sorting, and foreign-key linking. This tool is ideal for developers and database administrators who need a fast, interactive way to inspect or modify SQLite files directly from their terminal without relying on graphical interfaces.","description":"sqlite3 viewer","stars":160,"language":"Rust"},{"owner":"wxtsky","repo":"byob","url":"https://github.com/wxtsky/byob","readme":"<div align=\"center\">\n\n<img src=\"assets/logo.svg\" alt=\"byob\" width=\"120\"/>\n\n# byob\n\n**Bring Your Own Browser** — let your AI assistant use the Chrome you already have open.\n\n[![License: MIT](https://img.shields.io/badge/license-MIT-22c55e.svg)](LICENSE) [![MCP](https://img.shields.io/badge/MCP-stdio-0a0a0a.svg)](https://modelcontextprotocol.io) [![Chrome MV3](https://img.shields.io/badge/Chrome-MV3-f59e0b.svg)](https://developer.chrome.com/docs/extensions/mv3/intro/) [![v0.3](https://img.shields.io/badge/v0.3-ready-22c55e.svg)](CHANGELOG.md)\n\n**English** · [中文](README.zh-CN.md)\n\n</div>\n\n---\n\nbyob is a local MCP server that lets AI coding tools (Claude Code, Cursor, Cline, Windsurf, etc.) directly control **your real Chrome** — the one where you're already logged into everything.\n\n```\n\"read my Twitter timeline and summarize the top 5 posts\"\n\"google 'mcp protocol spec', click the first result, read the page\"\n\"take a screenshot of example.com\"\n\"grab my GitHub session cookie so I can curl with it\"\n\"open my Gmail tab and tell me how many unread\"\n```\n\n|  | WebFetch | Headless Puppeteer | **byob** |\n|---|:-:|:-:|:-:|\n| Sees logged-in pages | ❌ | ⚠️ manual cookie copy | ✅ already logged in |\n| Passes bot detection | ❌ | ❌ | ✅ real human browser |\n| Setup time | 0 | hours | **~5 min** |\n| Cloud cost | free | $$ | free |\n\n---\n\n## Install\n\n### Quick install (recommended)\n\n```sh\ncurl -fsSL https://raw.githubusercontent.com/wxtsky/byob/main/install.sh | bash\n```\n\nThe script checks prerequisites (Node.js ≥ 20, bun, Chrome), clones the repo, builds everything, and walks you through MCP registration interactively. If bun is not installed, it offers to install it for you.\n\n> Set `BYOB_INSTALL_DIR` to change the install location (default: `~/byob`).\n\n### Manual install\n\n<details>\n<summary>Prefer to do it yourself?</summary>\n\nRequires **Node.js ≥ 20**, **bun**, **Chrome**, and any MCP-compatible AI tool.\n\n```sh\ngit clone https://github.com/wxtsky/byob\ncd byob\nbun install\nbun run setup\n```\n\n</details>\n\n`bun run setup` walks through the install interactively:\n\n1. Pick output language (English / 中文)\n2. Generates a unique extension key for you\n3. Builds the Chrome extension\n4. Writes the config that lets Chrome talk to byob\n5. Prompts you to multi-select your AI tools, then registers each one (CLI tools via their `mcp add` command, JSON-config tools by writing the config file directly)\n\nAfter the script finishes, three manual steps remain:\n\n### Step 2 — Load extension in Chrome\n\nOpen `chrome://extensions` in Chrome.\n\n1. Top-right → turn ON **Developer mode**\n2. Top-left → click **Load unpacked**\n3. Select the folder printed in your terminal, something like:\n   ```\n   /your/path/to/byob/packages/extension/output/chrome-mv3\n   ```\n\n### Step 3 — Restart Chrome\n\n**Quit Chrome completely** (`⌘Q` on Mac / close all windows on Windows), then reopen.\n\n> Closing a single tab or window is not sufficient — Chrome only reads the Native Messaging config at startup.\n\n### Step 4 — (Reference) Manual MCP registration\n\nThe setup script registers your selected tools automatically. The block below is for reference only — use it if you skipped the prompt or want to register a different tool later:\n\n<details open>\n<summary><b>Claude Code</b></summary>\n\n```sh\nclaude mcp add byob -s user -- /path/to/tsx /path/to/byob-mcp.ts\n```\n\nTo enable `browser_eval`, add `-e BYOB_ALLOW_EVAL=1` after `-s user`.\n\n</details>\n\n<details>\n<summary><b>Codex CLI</b></summary>\n\n```sh\ncodex mcp add byob -- /path/to/tsx /path/to/byob-mcp.ts\n```\n\n</details>\n\n<details>\n<summary><b>Cursor</b></summary>\n\nAdd to `.cursor/mcp.json` (project) or `~/.cursor/mcp.json` (global):\n\n```json\n{\n  \"mcpServers\": {\n    \"byob\": {\n      \"command\": \"/path/to/tsx\",\n      \"args\": [\"/path/to/byob-mcp.ts\"]\n    }\n  }\n}\n```\n\n</details>\n\n<details>\n<summary><b>Windsurf</b></summary>\n\nAdd to `~/.codeium/windsurf/mcp_config.json` (same JSON format as Cursor):\n\n```json\n{\n  \"mcpServers\": {\n    \"byob\": {\n      \"command\": \"/path/to/tsx\",\n      \"args\": [\"/path/to/byob-mcp.ts\"]\n    }\n  }\n}\n```\n\n</details>\n\n<details>\n<summary><b>Cline (VS Code)</b></summary>\n\nOpen Cline sidebar → MCP Servers → Configure, then add (same JSON format):\n\n```json\n{\n  \"mcpServers\": {\n    \"byob\": {\n      \"command\": \"/path/to/tsx\",\n      \"args\": [\"/path/to/byob-mcp.ts\"]\n    }\n  }\n}\n```\n\n</details>\n\n> The actual paths are printed by the setup script. The examples above use shortened paths for readability.  \n> To enable `browser_eval`, add `\"env\": { \"BYOB_ALLOW_EVAL\": \"1\" }` to the config (or `-e BYOB_ALLOW_EVAL=1` for CLI tools).\n\n### Step 5 — Wait for setup to confirm the bridge is online\n\nAfter you finish steps 2 and 3 (load the extension and ⌘Q-restart Chrome), **setup auto-detects the bridge coming online** and prints `✓ bridge online`. The installation is complete — open a new session in your AI tool and try _\"use byob to read ...\"_.\n\nIf you exited setup early with Ctrl+C, or want to check the state later:\n\n```sh\nbun run doctor\n```\n\n`bun run doctor` prints actionable fixes under every `✗` (e.g. \"⌘Q-restart Chrome\", \"extension ID mismatch\", etc.).\n\n---\n\n## Tools\n\n| Tool | What it does |\n|---|---|\n| `browser_read` | Open a page, scroll through, read all text |\n| `browser_read_markdown` | Same, returns clean markdown (no nav/ads) |\n| `browser_extract_table` | Pull `<table>` elements as JSON |\n| `browser_get_console_logs` | Snapshot console.log / warn / error |\n| `browser_start_record_network` | Start recording HTTP + WebSocket traffic |\n| `browser_stop_record_network` | Stop recording, export JSON or HAR |\n| `browser_screenshot` | Screenshot → saved to disk |\n| `browser_download_images` | Download all images from a page |\n| `browser_click` | Click a button or link |\n| `browser_type` | Type into an input (optionally press Enter) |\n| `browser_press_key` | Send a keyboard key (Enter, Escape, F5, ArrowDown, ...) |\n| `browser_hover` | Hover the mouse over an element to trigger tooltips/menus |\n| `browser_select` | Choose an option in a native `<select>` |\n| `browser_scroll` | Scroll to top/bottom, an element, or a Y coordinate |\n| `browser_get_ht
