faults to get you started quickly\n\n## 📦 Setup\n\n### [lazy.nvim](https://github.com/folke/lazy.nvim)\n\n```lua\n{\n  \"nickjvandyke/opencode.nvim\",\n  version = \"*\", -- Latest stable release\n  dependencies = {\n    {\n      -- `snacks.nvim` integration is recommended, but optional\n      ---@module \"snacks\" <- Loads `snacks.nvim` types for configuration intellisense\n      \"folke/snacks.nvim\",\n      optional = true,\n      opts = {\n        input = {}, -- Enhances `ask()`\n        picker = { -- Enhances `select()`\n          actions = {\n            opencode_send = function(...) return require(\"opencode\").snacks_picker_send(...) end,\n          },\n          win = {\n            input = {\n              keys = {\n                [\"<a-a>\"] = { \"opencode_send\", mode = { \"n\", \"i\" } },\n              },\n            },\n          },\n        },\n      },\n    },\n  },\n  config = function()\n    ---@type opencode.Opts\n    vim.g.opencode_opts = {\n      -- Your configuration, if any; goto definition on the type or field for details\n    }\n\n    vim.o.autoread = true -- Required for `opts.events.reload`\n\n    -- Recommended/example keymaps\n    vim.keymap.set({ \"n\", \"x\" }, \"<C-a>\", function() require(\"opencode\").ask(\"@this: \", { submit = true }) end, { desc = \"Ask opencode…\" })\n    vim.keymap.set({ \"n\", \"x\" }, \"<C-x>\", function() require(\"opencode\").select() end,                          { desc = \"Select opencode…\" })\n    vim.keymap.set({ \"n\", \"t\" }, \"<C-.>\", function() require(\"opencode\").toggle() end,                          { desc = \"Toggle opencode\" })\n\n    vim.keymap.set({ \"n\", \"x\" }, \"go\",  function() return require(\"opencode\").operator(\"@this \") end,        { desc = \"Add range to opencode\", expr = true })\n    vim.keymap.set(\"n\",          \"goo\", function() return require(\"opencode\").operator(\"@this \") .. \"_\" end, { desc = \"Add line to opencode\", expr = true })\n\n    vim.keymap.set(\"n\", \"<S-C-u>\", function() require(\"opencode\").command(\"session.half.page.up\") end,   { desc = \"Scroll opencode up\" })\n    vim.keymap.set(\"n\", \"<S-C-d>\", function() require(\"opencode\").command(\"session.half.page.down\") end, { desc = \"Scroll opencode down\" })\n\n    -- You may want these if you use the opinionated `<C-a>` and `<C-x>` keymaps above — otherwise consider `<leader>o…` (and remove terminal mode from the `toggle` keymap)\n    vim.keymap.set(\"n\", \"+\", \"<C-a>\", { desc = \"Increment under cursor\", noremap = true })\n    vim.keymap.set(\"n\", \"-\", \"<C-x>\", { desc = \"Decrement under cursor\", noremap = true })\n  end,\n}\n```\n\n### [nixvim](https://github.com/nix-community/nixvim)\n\n```nix\nprograms.nixvim = {\n  extraPlugins = [\n    pkgs.vimPlugins.opencode-nvim\n  ];\n};\n```\n\n> [!TIP]\n> Run `:checkhealth opencode` after setup.\n\n## ⚙️ Configuration\n\n`opencode.nvim` provides a rich and reliable default experience — see all available options and their defaults [here](./lua/opencode/config.lua).\n\n### Contexts\n\n`opencode.nvim` replaces placeholders in prompts with the corresponding context:\n\n| Placeholder    | Context                                                         |\n| -------------- | --------------------------------------------------------------- |\n| `@this`        | Operator range or visual selection if any, else cursor position |\n| `@buffer`      | Current buffer                                                  |\n| `@buffers`     | Open buffers                                                    |\n| `@visible`     | Visible text                                                    |\n| `@diagnostics` | Current buffer diagnostics                                      |\n| `@quickfix`    | Quickfix list                                                   |\n| `@diff`        | Git diff                                                        |\n| `@marks`       | Global marks                                                    |\n| `@grapple`     | [grapple.nvim](https://github.com/cbochs/grapple.nvim) tags     |\n\n> [!TIP]\n> `opencode` reads referenced files from disk — save your changes!\n\n### Prompts\n\nSelect prompts to review, explain, and improve your code:\n\n| Name          | Prompt                                                                 |\n| ------------- | ---------------------------------------------------------------------- |\n| `diagnostics` | Explain `@diagnostics`                                                 |\n| `diff`        | Review the following git diff for correctness and readability: `@diff` |\n| `document`    | Add comments documenting `@this`                                       |\n| `explain`     | Explain `@this` and its context                                        |\n| `fix`         | Fix `@diagnostics`                                                     |\n| `implement`   | Implement `@this`                                                      |\n| `optimize`    | Optimize `@this` for performance and readability                       |\n| `review`      | Review `@this` for correctness and readability                         |\n| `test`        | Add tests for `@this`                                                  |\n\n### Server\n\nRun local `opencode`s however you like and `opencode.nvim` will find them! Or point `vim.g.opencode_opts.server.url` to a specific server, including remotes.\n\n> [!IMPORTANT]\n> You _must_ run `opencode` with the `--port` flag to expose its server.\n\nIf `opencode.nvim` can't find an existing `opencode`, it starts one for you via `vim.g.opencode_opts.server.start`, defaulting to an embedded terminal.\n\n#### Custom\n\n[`snacks.terminal`](https://github.com/folke/snacks.nvim/blob/main/docs/terminal.md) example:\n\n```lua\nlocal opencode_cmd = 'opencode --port'\n---@type snacks.terminal.Opts\nlocal snacks_terminal_opts = {\n  win = {\n    position = 'right',\n    enter = false,\n    on_win = function(win)\n      -- Set up keymaps and cleanup for an arbitrary terminal\n      require('opencode.terminal').setup(win.win)\n    end,\n  },\n}\n---@type opencode.Opts\nvim.g.opencode_opts = {\n  server = {\n    start = function()\n      require('snacks.terminal').open(opencode_cmd, snacks_terminal_opts)\n    end,\n    stop = function()\n      require('snacks.terminal').get(opencode_cmd, snacks_terminal_opts):close()\n    end,\n    toggle = function()\n      require('snacks.terminal').toggle(opencode_cmd, snacks_terminal_opts)\n    end,\n  },\n}\n```\n\n#### Keymaps\n\n`opencode.nvim` sets these normal-mode keymaps in the embedded terminal for Neovim-like message navigation:\n\n| Keymap  | Command                  | Description           |\n| ------- | ------------------------ | --------------------- |\n| `<C-u>` | `session.half.page.up`   | Scroll up half page   |\n| `<C-d>` | `session.half.page.down` | Scroll down half page |\n| `gg`    | `session.first`          | Go to first message   |\n| `G`     | `session.last`           | Go to last message    |\n| `<Esc>` | `session.interrupt`      | Interrupt             |\n\n## 🚀 Usage\n\n### Ask — `require(\"opencode\").ask()`\n\nInput a prompt for `opencode`.\n\n- End the prompt with a space to append instead of submit.\n- Press `<Up>` to browse recent asks.\n- Highlights and completes contexts and `opencode` subagents.\n  - Press `<Tab>` to trigger built-in completion.\n  - Provided by in-process LSP when using `snacks.input`.\n\n### Select — `require(\"opencode\").select()`\n\nSelect from all `opencode.nvim` functionality.\n\n- Prompts\n- Commands\n- Server controls\n\nHighlights and previews items when using `snacks.picker`.\n\n### Prompt — `require(\"opencode\").prompt()`\n\nPrompt `opencode`.\n\n- End the prompt with a space to append instead of submit.\n- Injects configured contexts.\n- `opencode` will interpret references to files or subagents.\n\n### Operator — `require(\"opencode\").operator()`\n\nWraps `prompt` as an operator, supporting ranges and dot-repeat.\n\n### Command — `require(\"opencode\").command()`\n\nCommand `opencode`:\n\n| Command                  | Description                                        |\n| ------------------------ | -------------------------------------------------- |\n| `session.list`           | List sessions                                      |\n| `session.new`            | Start a new session                                |\n| `session.select`         | Select a session                                   |\n| `session.share`          | Share the current session                          |\n| `session.interrupt`      | Interrupt the current session                      |\n| `session.compact`        | Compact the current session (reduce context size)  |\n| `session.page.up`        | Scroll messages up by one page                     |\n| `session.page.down`      | Scroll messages down by one page                   |\n| `session.half.page.up`   | Scroll messages up by half a page                  |\n| `session.half.page.down` | Scroll messages down by half a page                |\n| `session.first`          | Jump to the first message in the session           |\n| `session.last`           | Jump to the last message in the session            |\n| `session.undo`           | Undo the last action in the current session        |\n| `session.redo`           | Redo the last undone action in the current session |\n| `prompt.submit`          | Submit the TUI input                               |\n| `prompt.clear`           | Clear the TUI input                                |\n| `agent.cycle`            | Cycle the selected agent                           |\n\n### LSP\n\n> [!WARNING]\n> This feature is experimental! Try it out with `vim.g.opencode_opts.lsp.enabled = true`.\n\n`opencode.nvim` provides an in-process LSP to interact with `opencode` via the LSP functions you're used to!\n\n| LSP Function | `opencode.nvim` Handler                                                |\n| ------------ | ---------------------------------------------------------------------- |\n| Hover        | Asks `opencode` for a brief explanation of the symbol under the cursor |\n| Code Actions | Asks `opencode` to explain or fix diagnostics under the cursor         |\n\n## 👀 Events\n\n`opencode.nvim` forwards `opencode`'s Server-Sent-Events as an `OpencodeEvent` autocmd:\n\n```lua\n-- Handle `opencode` events\nvim.api.nvim_create_autocmd(\"User\", {\n  pattern = \"OpencodeEvent:*\", -- Optionally filter event types\n  callback = function(args)\n    ---@type opencode.server.Event\n    local event = args.data.event\n    ---@type string\n    local url = args.data.url\n\n    -- See the available event types and their properties\n    vim.notify(vim.inspect(event))\n    -- Do something useful\n    if event.type == \"session.idle\" then\n      vim.notify(\"`opencode` finished responding\")\n    end\n  end,\n})\n```\n\n### Edits\n\nWhen `opencode` edits a file, `opencode.nvim` automatically reloads the corresponding buffer.\n\n### Permissions\n\nWhen `opencode` requests a permission, `opencode.nvim` waits for idle to ask you to approve or deny it.\n\n#### Edits\n\nFor edit requests, `opencode.nvim` opens the target file in a new tab and uses Neovim's `:diffpatch` to display the proposed changes side-by-side. See `:h 'diffopt'` for customization.\n\n| Keymap  | Function                                                                      |\n| ------- | ----------------------------------------------------------------------------- |\n| `da`    | Accept the entire edit request                                                |\n| `dr`    | Reject the entire edit request                                                |\n| `]c/[c` | Next/prev change                                                              |\n| `dp`    | Natively accept _only_ the hunk under the cursor, and reject the edit request |\n| `do`    | Natively reject _only_ the hunk under the cursor, and reject the edit request |\n| `q`     | Close the diff                                                                |\n\n### Statusline\n\n```lua\nrequire(\"lualine\").setup({\n  sections = {\n    lualine_z = {\n      {\n        require(\"opencode\").statusline,\n      },\n    }\n  }\n})\n```\n\n## 🙏 Acknowledgments\n\n- Inspired by [nvim-aider](https://github.com/GeorgesAlkhouri/nvim-aider), [neopencode.nvim](https://github.com/loukotal/neopencode.nvim), and [sidekick.nvim](https://github.com/folke/sidekick.nvim).\n- Uses `opencode`'s TUI for simplicity — see [sudo-tee/opencode.nvim](https://github.com/sudo-tee/opencode.nvim) for a Neovim frontend.\n- [mcp-neovim-server](https://github.com/bigcodegen/mcp-neovim-server) may better suit you, but it lacks customization and tool calls are slow and unreliable.\n","summary":"opencode.nvim is a Neovim plugin that bridges your editor with the OpenCode AI platform to streamline AI-assisted coding workflows. It enables users to inject local editor context—such as cursor positions, selections, or full buffers—directly into AI prompts, while supporting intuitive interactions like dot-repeatable commands and easy acceptance or rejection of AI-generated edits. This tool is ideal for Neovim power users who want to maintain their coding flow by integrating powerful AI capabilities directly into their terminal environment with a native, \"Vim-y\" feel.","description":"Bridge Neovim and OpenCode AI to stay in your flow.","stars":3527,"language":"Lua"},{"owner":"earthtojake","repo":"text-to-cad","url":"https://github.com/earthtojake/text-to-cad","readme":"<div align=\"center\">\n\n<img src=\"assets/text-to-cad-demo.gif\" alt=\"Demo of the CAD skill generating and previewing CAD geometry\" width=\"100%\">\n\n<br>\n\n<pre>\n ██████╗ █████╗ ██████╗       ███████╗██╗  ██╗██╗██╗     ██╗     ███████╗\n██╔════╝██╔══██╗██╔══██╗      ██╔════╝██║ ██╔╝██║██║     ██║     ██╔════╝\n██║     ███████║██║  ██║      ███████╗█████╔╝ ██║██║     ██║     ███████╗\n██║     ██╔══██║██║  ██║      ╚════██║██╔═██╗ ██║██║     ██║     ╚════██║\n╚██████╗██║  ██║██████╔╝      ███████║██║  ██╗██║███████╗███████╗███████║\n ╚═════╝╚═╝  ╚═╝╚═════╝       ╚══════╝╚═╝  ╚═╝╚═╝╚══════╝╚══════╝╚══════╝\n</pre>\n\nA skills library for CAD, robotics, and hardware design agents\n\n[Docs](https://www.cadskills.xyz) | [Demo](https://demo.cadskills.xyz)\n\n[![GitHub stars](https://img.shields.io/github/stars/earthtojake/text-to-cad?style=for-the-badge&logo=github&label=Stars)](https://github.com/earthtojake/text-to-cad/stargazers)\n[![GitHub forks](https://img.shields.io/github/forks/earthtojake/text-to-cad?style=for-the-badge&logo=github&label=Forks)](https://github.com/earthtojake/text-to-cad/network/members)\n[![License: MIT](https://img.shields.io/badge/License-MIT-blue?style=for-the-badge)](LICENSE)\n[![Follow @earthtojake](https://img.shields.io/badge/Follow-%40earthtojake-000000?style=for-the-badge&logo=x)](https://x.com/earthtojake)\n[![Python](https://img.shields.io/badge/Python-3.11+-3776AB?style=for-the-badge&logo=python&logoColor=white)](skills/cad/requirements.txt)\n[![build123d](https://img.shields.io/badge/build123d-CAD-00A676?style=for-the-badge)](https://github.com/gumyr/build123d)\n[![OCP](https://img.shields.io/badge/OCP-OpenCascade-2F80ED?style=for-the-badge)](skills/cad/requirements.txt)\n[![STEP](https://img.shields.io/badge/STEP-Export-4A5568?style=for-the-badge)](skills/cad/SKILL.md)\n[![STL](https://img.shields.io/badge/STL-Export-4A5568?style=for-the-badge)](skills/cad/SKILL.md)\n[![3MF](https://img.shields.io/badge/3MF-Export-4A5568?style=for-the-badge)](skills/cad/SKILL.md)\n[![URDF](https://img.shields.io/badge/URDF-Robots-6B46C1?style=for-the-badge)](skills/urdf/SKILL.md)\n[![SDF](https://img.shields.io/badge/SDF-Simulation-6B46C1?style=for-the-badge)](skills/sdf/SKILL.md)\n[![SRDF](https://img.shields.io/badge/SRDF-MoveIt2-6B46C1?style=for-the-badge)](skills/srdf/SKILL.md)\n\n</div>\n\n# CAD Skills\n\nCAD Skills is a library of agent skills for generating, inspecting, sourcing,\nslicing, and handing off CAD and robot-description artifacts from local project\nfiles.\n\n## 🧰 Skills\n\nInstall the library to give agents focused workflows for CAD, fabrication,\nrobot description files, simulation, and local review.\n\n| Skill       | Summary                                                                                                                                            | Source                                            |\n| ----------- | -------------------------------------------------------------------------------------------------------------------------------------------------- | ------------------------------------------------- |\n| CAD         | Creates and edits CAD models from plain-language or image requests, with STEP as the main output along with options to export to STL, 3MF and GLB. | [skills/cad](skills/cad/SKILL.md)                 |\n| CAD Viewer  | Shows local browser previews for CAD, G-code, and robot files.                                                                                     | [skills/cad-viewer](skills/cad-viewer/SKILL.md)   |\n| step.parts  | Finds off-the-shelf STEP parts like screws, bearings, motors, and connectors.                                                                      | [skills/step-parts](skills/step-parts/SKILL.md)   |\n| URDF        | Writes robot structure files with links, joints, limits, inertials, and meshes.                                                                    | [skills/urdf](skills/urdf/SKILL.md)               |\n| SRDF        | Adds MoveIt planning groups, end effectors, poses, and collision rules to a URDF.                                                                  | [skills/srdf](skills/srdf/SKILL.md)               |\n| SDF         | Creates simulator models and worlds with frames, physics, sensors, and lights.                                                                     | [skills/sdf](skills/sdf/SKILL.md)                 |\n| SendCutSend | Checks DXF and STEP files before upload to SendCutSend.                                                                                            | [skills/sendcutsend](skills/sendcutsend/SKILL.md) |\n| G-code      | Slices supported mesh files into validated, printer-profiled FDM `.gcode` with real slicer CLIs.                                                   | [skills/gcode](skills/gcode/SKILL.md)             |\n| Bambu Labs  | Dry-runs, uploads, and cautiously starts local Bambu Lab print jobs from validated `.gcode`.                                                       | [skills/bambu-labs](skills/bambu-labs/SKILL.md)   |\n\n## 💻 Installation\n\nFor production use, install or clone from `main`; that branch contains the\ngenerated skill/plugin outputs needed by provider installers.\n\n### Skills\n\nInstall CAD Skills with the Skills CLI:\n\n```bash\nnpx skills install earthtojake/text-to-cad\n```\n\nThis is the preferred installation path. It installs the individual skills\ndirectly for supported agents.\n\n### Plugins\n\nProvider-native plugin installs are also available for Codex and Claude Code:\n\n```bash\n# Codex\ncodex plugin marketplace add earthtojake/text-to-cad\ncodex plugin add cad@text-to-cad\n```\n\n```bash\n# Claude Code\nclaude plugin marketplace add earthtojake/text-to-cad\nclaude plugin install cad@text-to-cad\n```\n\nRestart your agent if newly installed skills do not appear. For local\ndevelopment, branch from `develop`, open PRs against `develop`, and use the symlink\nworkflow in [CONTRIBUTING.md](CONTRIBUTING.md).\n\n## 📸 Screenshots\n\n<table>\n  <tr>\n    <td width=\"33%\">\n      <a href=\"./assets/text-to-cad-demo.gif\">\n        <img src=\"./assets/text-to-cad-demo.gif\" alt=\"CAD skill demo showing generated geometry in CAD Viewer\" width=\"100%\">\n      </a>\n      <a href=\"./skills/cad/SKILL.md\"><strong>CAD</strong></a>\n    </td>\n    <td width=\"33%\">\n      <a href=\"./assets/urdf-demo.gif\">\n        <img src=\"./assets/urdf-demo.gif\" alt=\"URDF skill demo showing robot description output in CAD Viewer\" width=\"100%\">\n      </a>\n      <a href=\"./skills/urdf/SKILL.md\"><strong>URDF</strong></a>\n    </td>\n    <td width=\"33%\">\n      <a href=\"./assets/srdf-moveit2-demo.gif\">\n        <img src=\"./assets/srdf-moveit2-demo.gif\" alt=\"SRDF MoveIt2 skill demo showing inverse kinematics in CAD Viewer\" width=\"100%\">\n      </a>\n      <a href=\"./skills/srdf/SKILL.md\"><strong>SRDF / MoveIt2</strong></a>\n    </td>\n  </tr>\n</table>\n\n## 🧪 Benchmarks\n\nThe repo stores heavyweight assets in `assets/**` and `benchmarks/**` through Git LFS and excludes those trees from default LFS pulls so lightweight clones do not fetch GIF assets. Benchmark markdown remains normal Git for readable diffs. To hydrate only the benchmark assets locally, run:\n\n```bash\ngit lfs pull --include=\"benchmarks/**\"\n```\n\n<table>\n  <thead>\n    <tr>\n      <th>#</th>\n      <th>Target</th>\n      <th>Prompt</th>\n      <th>Output</th>\n    </tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td>1</td>\n      <td><a href=\"benchmarks/01-rectangular-calibration-block.md\">Rectangular calibration block with four holes</a></td>\n      <td>Create a centered 100 x 60 x 20 mm block with four 8 mm vertical through-holes. Add only a 2 mm chamfer on the top outer perimeter.</td>\n      <td><img src=\"benchmarks/benchmark_01_rectangular_calibration_block.gif\" alt=\"Rectangular calibration block orbit gif\" width=\"220\"></td>\n    </tr>\n    <tr>\n      <td>2</td>\n      <td><a href=\"benchmarks/02-circular-flange.md\">Circular flange with bolt-hole pattern</a></td>\n      <td>Create an 80 mm diameter, 10 mm thick circular flange with a 30 mm central through-bore. Add six 6 mm through-holes on a 60 mm bolt circle and fillet the outside circular edges.</td>\n      <td><img src=\"benchmarks/benchmark_02_circular_flange.gif\" alt=\"Circular flange orbit gif\" width=\"220\"></td>\n    </tr>\n    <tr>\n      <td>3</td>\n      <td><a href=\"benchmarks/03-l-bracket.md\">L-bracket with gussets and two hole directions</a></td>\n      <td>Create an L-bracket from a base plate and rear vertical plate. Add vertical base holes, horizontal back-plate holes, two triangular gussets, and a filleted base/back transition.</td>\n      <td><img src=\"benchmarks/benchmark_03_l_bracket.gif\" alt=\"L-bracket orbit gif\" width=\"220\"></td>\n    </tr>\n    <tr>\n      <td>4</td>\n      <td><a href=\"benchmarks/04-stepped-shaft-keyway.md\">Stepped shaft with keyway</a></td>\n      <td>Create a 120 mm shaft along X with 20/30/20 mm diameter stepped sections. Add end chamfers and a shallow rectangular keyway on top of the middle section.</td>\n      <td><img src=\"benchmarks/benchmark_04_stepped_shaft_keyway.gif\" alt=\"Stepped shaft orbit gif\" width=\"220\"></td>\n    </tr>\n    <tr>\n      <td>5</td>\n      <td><a href=\"benchmarks/05-open-top-electronics-enclosure.md\">Open-top electronics enclosure with bosses</a></td>\n      <td>Create a hollow open-top enclosure with 3 mm walls and floor. Add four internal standoffs with centered blind holes and 2 mm outside vertical corner fillets.</td>\n      <td><img src=\"benchmarks/benchmark_05_open_top_electronics_enclosure.gif\" alt=\"Open-top electronics enclosure orbit gif\" width=\"220\"></td>\n    </tr>\n    <tr>\n      <td>6</td>\n      <td><a href=\"benchmarks/06-clevis-bracket-lightening-cutouts.md\">Aerospace-style clevis bracket with lightening cutouts</a></td>\n      <td>Create a symmetric clevis bracket with a base plate, two rounded lugs, base mounting holes, and a horizontal lug bore. Add triangular lightening cutouts, reinforcing ribs, and rounded transitions.</td>\n      <td><img src=\"benchmarks/benchmark_06_clevis_bracket_lightening_cutouts.gif\" alt=\"Clevis bracket orbit gif\" width=\"220\"></td>\n    </tr>\n    <tr>\n      <td>7</td>\n      <td><a href=\"benchmarks/07-radial-engine-cylinder.md\">Radial-engine-style cylinder with cooling fins</a></td>\n      <td>Create a vertical engine-cylinder form with a central barrel, 12 cooling fins, a base flange, and a top cap. Add a 35 degree angled spark-plug boss with a coaxial through-hole.</td>\n      <td><img src=\"benchmarks/benchmark_07_radial_engine_cylinder.gif\" alt=\"Radial-engine-style cylinder orbit gif\" width=\"220\"></td>\n    </tr>\n    <tr>\n      <td>8</td>\n      <td><a href=\"benchmarks/08-centrifugal-impeller.md\">Centrifugal impeller with backward-curved blades</a></td>\n      <td>Create a centrifugal impeller with a backplate, hub, and through-bore. Add 12 fused backward-curved blades sweeping about 45 degrees from root to tip.</td>\n      <td><img src=\"benchmarks/benchmark_08_centrifugal_impeller.gif\" alt=\"Centrifugal impeller orbit gif\" width=\"220\"></td>\n    </tr>\n    <tr>\n      <td>9</td>\n      <td><a href=\"benchmarks/09-spiral-staircase.md\">Spiral staircase with helical handrail</a></td>\n      <td>Create a miniature spiral staircase with a central column, base disk, and 20 rising wedge treads. Add a one-revolution helical handrail and vertical balusters at the tread outer ends.</td>\n      <td><img src=\"benchmarks/benchmark_09_spiral_staircase.gif\" alt=\"Spiral staircase orbit gif\" width=\"220\"></td>\n    </tr>\n    <tr>\n      <td>10</td>\n      <td><a href=\"benchmarks/10-planetary-gear-stage.md\">Simplified planetary gear stage</a></td>\n      <td>Create a flat planetary gear assembly with separate sun, planet, ring, carrier, and pin bodies. Use simplified trapezoidal teeth and place three planets around the sun on a 42 mm radius circle.</td>\n      <td><img src=\"benchmarks/benchmark_10_planetary_gear_stage.gif\" alt=\"Planetary gear stage orbit gif\" width=\"220\"></td>\n    </tr>\n  </tbody>\n</table>\n\n## 🛠️ Contributing\n\nDevelopment happens from the `develop` branch; open PRs against `develop`, not `main`.\nFor local contribution workflow, skill linking, and validation guidance, see\n[CONTRIBUTING.md](CONTRIBUTING.md).\n","summary":"Text-to-CAD is a comprehensive library of specialized agent skills designed to streamline the generation, inspection, and management of CAD and robot-description artifacts. The project enables developers to build intelligent agents capable of creating 3D models from natural language requests, sourcing off-the-shelf parts, and generating complex robot configuration files like URDF and SDF. By supporting multiple export formats and providing integrated browser-based viewing tools, it significantly simplifies workflows for hardware engineers and robotics researchers looking to automate mechanical design tasks.","description":"A collection of agent skills for CAD, robotics and hardware design","stars":5501,"language":"JavaScript"},{"owner":"openclaw","repo":"clawsweeper","url":"https://github.com/openclaw/clawsweeper","readme":"# 🦞🧹 ClawSweeper\n\n![ClawSweeper banner](docs/assets/readme-banner.jpg)\n\nClawSweeper is the conservative maintenance bot for OpenClaw repositories. It\nkeeps the backlog reviewed, keeps maintainer-visible GitHub comments tidy, and\nturns narrow trusted findings into guarded repair or automerge work.\n\nThe current production targets are `openclaw/openclaw`, `openclaw/clawhub`, and\nself-review for `openclaw/clawsweeper`.\n\nThe OpenClaw-hosted ClawSweeper instance is not a public review service and does\nnot provide free reviews for third-party repositories. If you want ClawSweeper\nfor your own project, fork this repository, deploy it in your own organization,\nand configure that self-hosted instance for your repositories.\n\nAt a high level ClawSweeper:\n\n- reviews open issues and pull requests on a schedule and on exact GitHub events\n- writes one durable markdown report per item in generated state\n- syncs one marker-backed public review comment per issue or PR, edited in place\n- closes only unchanged, high-confidence, policy-allowed proposals\n- routes maintainer commands such as `@clawsweeper review`,\n  `@clawsweeper fix`, `@clawsweeper autofix`, and `@clawsweeper automerge`\n- can acknowledge maintainer comment commands through an optional GitHub App\n  webhook before the GitHub Actions fallback starts\n- repairs opted-in PRs through a bounded Codex review/fix loop before merge\n- can open guarded implementation PRs for strict, reproducible bug issues\n- can manually review selected code-bearing commits on target `main` branches\n- publishes dashboard, audit, repair, and activity state to\n  `openclaw/clawsweeper-state`\n\nClawSweeper is not a generic auto-close bot. Review is proposal-only, apply is\nguarded, Codex never gets write credentials during review, and every GitHub\nmutation is rechecked against live target state immediately before it happens.\n\n## Capabilities\n\n### Issue and PR Reviews\n\nScheduled runs scan open issues and pull requests, while target repositories can\nforward exact issue/PR events with `repository_dispatch` for low-latency\none-item reviews. Each review writes\n`records/<repo-slug>/items/<number>.md` with the decision, evidence, proposed\nmaintainer-facing comment, runtime metadata, and GitHub snapshot hash.\n\nClawSweeper syncs one marker-backed public review comment per item and edits it\nin place instead of posting repeated comments. If a review starts before a\ncompleted comment exists, it first posts a short status placeholder, then\nreplaces that same comment with the final review. Pull request comments include\nhidden verdict/action markers so trusted repair and automerge flows can continue\nwithout scraping visible prose. See\n[`docs/pr-review-comments.md`](docs/pr-review-comments.md).\n\nReview prompts include compact related issue and PR context from explicit links,\nlinked closing PRs, existing local ClawSweeper reports, optional gitcrawl\nclusters, and opt-in live GitHub issue search for exact event reviews. This is\nadvisory context for duplicate/superseded reasoning, not a standalone close\ndecision. See\n[`docs/related-issue-discovery.md`](docs/related-issue-discovery.md).\n\nFor open issues with complete, current kept-open reviews, ClawSweeper also\nprojects selected structured review conclusions into advisory GitHub labels for\nmaintainer filtering and project views. These labels expose states such as\ncurrent-main reproduction, source reproduction, linked open PRs, queueable\nfixes, missing info, and product/security review needs. They are advisory only\nand do not trigger repair, merge, or close behavior. Label-only syncs record\n`labels_synced_at` in the durable report so GitHub `updated_at` changes caused\nby ClawSweeper-owned label writes do not look like fresh target-side activity to\nthe scheduler. See\n[`docs/work-lane.md`](docs/work-lane.md).\n\n### Apply and State\n\nApply mode re-fetches live GitHub state, checks labels, maintainer authorship,\npaired issue/PR state, snapshot drift, and repository profile rules before\ncommenting or closing anything. Closed or already-closed reports move to\n`records/<repo-slug>/closed/<number>.md`; reopened archived items move back to\n`items/` as stale work.\n\nGenerated state lives on the `state` branch of `openclaw/clawsweeper-state`:\ndurable `records/`, `jobs/`, `results/`, audit output, workflow status JSON,\nrepair ledgers, and the rendered dashboard. The state repo `main` branch is the\ndashboard renderer source, so a checkout on `main` intentionally does not show\n`records/`. Hydrate this repo with `git -C ../clawsweeper-state switch state &&\nnode scripts/hydrate-state.ts --state-dir ../clawsweeper-state` when local\ncommands need generated records. This repository stays focused on source,\nworkflows, docs, and tests.\n\n### Repair and Automerge\n\nMaintainer commands can opt PRs into `autofix` or `automerge`, dispatch a fresh\nexact-head review, and run a bounded Codex review/fix loop. Codex handles the\ncode repair and local validation loop; deterministic executor steps own every\nGitHub mutation, branch push, label update, and final merge gate.\n\nAutomerge waits for exact-head review, required checks, mergeability, and policy\ngates. If repair was needed, the mutable status comment records each review,\nrepair, re-review, and merge step with timing and links. The final merge result\nsummarizes both the original PR change and any ClawSweeper fixups.\n\nFor issues, strict bug reviews that are high-confidence reproducible, do not\nalready have a linked PR, and do not require feature/config expansion can\ndispatch Codex to open one guarded implementation PR labeled\n`clawsweeper:autogenerated`.\nWhen the separate vision-fit lane is enabled, reviewed issues that clearly fit\nthe target repository `VISION.md`, are small enough for one focused PR, and have\nclear repair shape can use the same PR-only implementation path without\nweakening the strict bug gate.\n\n### Commit Reviews\n\nAutomatic push-triggered commit review is disabled. Maintainers can still run\n`.github/workflows/commit-review.yml` manually for selected commits or ranges.\nThe workflow expands the selected range, skips non-code-only commits cheaply,\nstarts one Codex worker per code-bearing commit, and writes\n`records/<repo-slug>/commits/<sha>.md`.\n\nCommit reports are the source of truth. Optional target commit Check Runs are\ndisabled by default and can be enabled per run or repository. Reports with\n`result: findings` can dispatch to repair intake when the finding is narrow,\nnon-security, and still relevant on latest `main`.\n\n### Operations\n\nRepository-specific rules live in `src/repository-profiles.ts`, so OpenClaw,\nClawHub, and ClawSweeper can share the same engine while keeping different apply\nlimits. Both review and repair lanes support manual workflow dispatch, reruns,\nand backfills. `pnpm commit-reports -- --since 24h`, `--findings`,\n`--non-clean`, `--repo`, and `--author` query flat per-SHA commit storage\nwithout date buckets.\n\n## Guardrails\n\nClawSweeper may propose a close only when the item is clearly one of these:\n\n- implemented on current `main`\n- not reproducible on current `main`\n- better suited for ClawHub skill/plugin work than core\n- duplicate or superseded by a canonical issue/PR\n- low-signal pull request whose branch is mostly unrelated or unmergeable churn\n- concrete but not actionable in this source repo\n- incoherent enough that no action can be taken\n- stale issue older than 60 days with too little data to verify\n\nMaintainer-authored items stay open unless ClawSweeper can verify that the\nrequest is already implemented on current `main`. Everything else stays open.\nIssues with an open PR that references them using GitHub closing syntax such as\n`Fixes #123` stay open until that PR merges, is closed, or ClawSweeper closes\nthat high-confidence PR candidate earlier in the same apply run.\nOpen issue/PR pairs from the same author stay open together unless the paired\nitem is already resolved or a maintainer explicitly asks to close one side.\nPR-to-PR duplicate/superseded closes also require a safe canonical target:\nClawSweeper refuses to close one PR as replaced by another PR that is closed\nunmerged, missing positive real behavior proof, F-rated, already proposed for\nclose, not cleanly mergeable, or otherwise not a viable landing path.\n\nRepository profiles can further narrow apply. ClawHub and ClawSweeper self-review\nare intentionally stricter: they review issues and PRs, but apply may close only\nPRs where current `main` already implements the proposed change with\nsource-backed evidence.\n\n## Maintainer Commands\n\nMaintainers can steer ClawSweeper from target-repo issue and PR comments. The\npreferred form is `@clawsweeper ...`. The router also accepts\n`@clawsweeper[bot] ...`, `@openclaw-clawsweeper ...`,\n`@openclaw-clawsweeper[bot] ...`, and legacy slash aliases such as\n`/clawsweeper ...`, `/review`, `/automerge`, `/auto merge`, and\n`/autoclose <reason>`.\n\nCommon commands:\n\n```text\n@clawsweeper status\n@clawsweeper re-review\n@clawsweeper re-run\n@clawsweeper review\n@clawsweeper fix ci\n@clawsweeper address review\n@clawsweeper rebase\n@clawsweeper autofix\n@clawsweeper automerge\n@clawsweeper approve\n@clawsweeper explain\n@clawsweeper ask is this blocked by flaky CI?\n@clawsweeper visualize state\n@clawsweeper stop\n@clawsweeper why did automerge stop here?\n```\n\n- `status` and `explain` post a short target summary.\n- `review`, `re-review`, and `re-run` dispatch a fresh ClawSweeper issue/PR\n  review without starting repair.\n- Command status replies are marker-backed and edited in place per\n  issue/PR, intent, and head SHA. The visible badge is one lobster plus the\n  current state: `👀` for acknowledgement, `🧹` for review, `🔧` for repair, and\n  `✅` for completed/paused work.\n- Freeform `@clawsweeper ...` mentions and explicit `ask ...` questions dispatch\n  the maintainer-only assist lane. Assist runs `gpt-5.5` with low reasoning, a\n  120-second per-item timeout, and its own five-job cap. It posts a separate\n  non-durable answer comment and never edits the durable ClawSweeper review\n  comment, closes, merges, labels, pushes, repairs, or emits review/apply\n  markers.\n- `visualize [lens]` dispatches the read-only visual assist lane and posts or\n  updates a marker-backed visual brief comment for the requested lens.\n- `fix ci`, `address review`, and `rebase` dispatch the repair worker only for\n  ClawSweeper PRs or PRs already opted into `clawsweeper:autofix` or\n  `clawsweeper:automerge`.\n- `autofix` labels an open PR, creates or reuses the adopted job, dispatches\n  review, and enters the bounded review/fix loop without merging.\n- `automerge` labels an open PR, creates or reuses the adopted job, dispatches\n  review, and enters the bounded review/fix/merge loop. Draft PRs are fix-only\n  until GitHub marks them ready for review.\n- User-facing OpenClaw `fix`, `feat`, and `perf` automerge PRs preserve\n  release-note context in PR bodies and commit messages before merge;\n  contributors are not asked to edit `CHANGELOG.md`.\n- Security-sensitive findings can be repaired only after explicit\n  `autofix`/`automerge` opt-in; ClawSweeper still will not merge until a later\n  exact-head review is clean.\n- `approve` lets a maintainer clear a ClawSweeper human-review pause and merge\n  only after the normal exact-head, checks, mergeability, and gate checks pass.\n- `stop` removes repair-loop labels, adds `clawsweeper:human-review`, and makes\n  older automerge/autofix comments ineligible to continue. `/autoclose <reason>`\n  closes the item and any open same-repo targets explicitly referenced in the\n  command text.\n\nOnly maintainers are accepted for write actions. The router checks repository\ncollaborator permission (`admin`, `maintain`, or `write`) and falls back to\ntrusted `author_association` values when permission lookup is unavailable.\nUsers with repository write access and issue/PR authors may ask\n`@clawsweeper re-review` or `@clawsweeper re-run` for a fresh read-only review.\nOther contributor commands are ignored without a reply. Scheduled comment routing is dry unless\n`CLAWSWEEPER_COMMENT_ROUTER_EXECUTE=1`; workflow dispatch with `execute=true`\ncan be used for one-off live routing.\nFor fast intake, the ClawSweeper GitHub App webhook can post the same queued\nstatus comment and dispatch exact `clawsweeper_comment` or `clawsweeper_item`\nruns from eligible public `openclaw/*` and `steipete/*` repositories. The\ntarget-side dispatcher remains the fallback when the webhook is unavailable.\n\n## Dashboard\n\nLive dashboard and generated state: https://github.com/openclaw/clawsweeper-state\n\nLive pipeline dashboard: https://clawsweeper.openclaw.ai/\n\nThe Cloudflare dashboard is observability-only: it shows active workers,\nrepair/automerge pipeline rows, CI state, recent failures, and automerge timing\nwithout owning GitHub mutations. See [`docs/live-dashboard.md`](docs/live-dashboard.md).\n\nThe optional triage dashboard page at `/triage` exposes ClawSweeper advisory\nissue labels as read-only maintainer views, backed by GitHub Search snapshots\ninstead of GitHub Project writes. See\n[`docs/triage-dashboard.md`](docs/triage-dashboard.md).\n\nThe optional PR proof triage page at `/pr-proof-triage` exposes open pull\nrequests that are blocked on real behavior proof labels, including missing\nproof, supplied-but-not-sufficient proof, mock-only proof, and proof label\nmismatches. See\n[`docs/pr-proof-triage-dashboard.md`](docs/pr-proof-triage-dashboard.md).\n\nThe optional proof-nudge lane can dry-run or post polite reminder comments for\nopen PRs that remain blocked on `triage: needs-real-behavior-proof`. It uses\ncomment-body cooldown markers, never closes PRs, and keeps scheduled operation\nbehind default-off repository variables. See\n[`docs/proof-nudges.md`](docs/proof-nudges.md).\n\n## How It Works\n\nClawSweeper is split into four operational lanes:\n\n- review lane: scheduled and event-driven issue/PR reviews, durable reports, and\n  public review comment sync\n- apply lane: guarded close/comment mutations, audit, reconcile, and state\n  publishing\n- repair lane: maintainer-command routing, autofix, automerge, issue\n  implementation PRs, and repair result publishing\n- commit review lane: main-branch commit dispatch, cheap code/non-code\n  classification, one Codex review worker per code-bearing commit, and optional\n  target commit checks\n\n### Scheduler\n\nThe issue/PR scheduler decides what to scan and how often. New and active items\nget more attention; older quiet items fall back to a slower cadence. Detailed\nscheduling, capacity, and monitoring behavior is documented in\n[`docs/scheduler.md`](docs/scheduler.md).\n\n- hot/new and recently active items are checked hourly, with a 5-minute intake\n  schedule for the newest queue edge\n- target repositories can forward issue and PR events with\n  `repository_dispatch`; those exact item runs use a dedicated single job to\n  review one item, sync the durable comment, and apply only safe close\n  proposals for that same item\n- pull requests and issues younger than 30 days are checked daily once they\n  leave the hot window\n- older inactive issues are checked weekly\n- apply wakes every 15 minutes and exits quickly when there are no unchanged\n  high-confidence close proposals\n\n### Review Lane\n\nReview is proposal-only. It never closes items.\n\n- A planner scans open issues and PRs, then assigns exact item numbers to shards.\n- Manual runs can pass `item_number` or comma-separated `item_numbers` to review\n  exact Audit Health findings without scanning for a normal batch.\n- Each shard checks out the selected target repository at `main`.\n- Codex reviews with `gpt-5.5`, high reasoning, the default service tier, and a\n  10-minute per-item timeout.\n- Each item becomes a flat report under\n  `records/<repo-slug>/items/<number>.md` with the decision, evidence,\n  Codex `/review`-style PR findings, suggested comment, runtime metadata, and\n  GitHub snapshot hash. When GitHub exposes a merged closing PR for an issue,\n  the report records that PR and the close comment links it as fix provenance.\n- High-confidence allowed close decisions become `proposed_close`.\n- After publish, the lane checks the selected items' single marker-backed Codex\n  review comment. Missing comments and missing metadata are synced immediately;\n  existing comments are refreshed only when stale, currently weekly.\n- PR review comments keep the top-level note concise, put source links and full\n  evidence in collapsed details, and use hidden verdict/action markers for the\n  trusted ClawSweeper repair loop; see\n  [`docs/pr-review-comments.md`](docs/pr-review-comments.md).\n\n### Apply Lane\n\nApply reads existing reports and mutates GitHub only when the stored review is\nstill valid.\n\n- Updates the single marker-backed Codex automated review comment in place.\n- Closes only unchanged high-confidence proposals.\n- Reuses the review comment when closing; no duplicate close comment.\n- Moves closed or already-closed reports to\n  `records/<repo-slug>/closed/<number>.md`.\n- Moves reopened archived reports back to the repo’s `items/` folder as stale.\n- Commits checkpoints and machine-readable status during long runs.\n\nApply wakes every 15 minutes, no-ops when there are no unchanged\nhigh-confidence close proposals, and narrows scheduled runs to the currently\neligible proposal list so idle runs do not scan unrelated keep-open records.\nIt defaults to all item kinds, no age floor, a 2-second close delay, and 50\nfresh closes per checkpoint. If it reaches the requested limit, it queues\nanother apply run with the same settings.\n\nExact event runs skip the bulk planner, shard matrix, artifact upload, and\nseparate publish job. They still use the same review and apply code paths, but\nonly for the selected item number and only with immediate-safe reasons enabled\nby default: `implemented_on_main`, `duplicate_or_superseded`, and\n`low_signal_unmergeable_pr`.\n`stale_insufficient_info` issue reports and `mostly_implemented_on_main` PR\nreports are never applied to young items; apply requires those reports to be at\nleast 60 days old unless a manual run explicitly changes the threshold.\n\nThe external state dashboard is fleet-scoped. Each configured repository gets\nits own record folder, status JSON, audit state, cadence counts, and recent\nactivity section. The state repo aggregates those repository snapshots so event\nruns from one repo do not hide the state of another.\n\nThere is still one deterministic apply path for writes. Review can propose and\nsync stale public review comments, but closing remains guarded by apply so a\nfresh GitHub snapshot, labels, maintainer-authorship, and unchanged item state\nare checked immediately before mutation. Maintainer-authored or\n`maintainer`-labeled items can still close when the only protected state is\nmaintainer ownership and the close reason is verified `implemented_on_main`.\nConfigured OpenClaw targets may close issues as `implemented_on_main` when the\nfix is proven on current `main`, even before the next release ships.\n\n### Repair Lane\n\nRepair starts from maintainer intent or trusted ClawSweeper review metadata. The\ncomment router accepts commands from target repositories, validates maintainer\npermissions, updates one mutable command/status comment, and dispatches the\nappropriate repair job.\n\n- `autofix` and `automerge` adopt the PR branch and run exact-head review before\n  making changes.\n- If review or CI finds actionable issues, Codex rebases, addresses PR review\n  comments, fixes CI, runs the requested validation, and returns a structured\n  repair artifact.\n- The deterministic executor applies the artifact, pushes only after validation,\n  re-dispatches exact-head review, and waits for required checks.\n- `automerge` merges only after review verdict, checks, mergeability,\n  security, maintainer stop/approve state, and repository policy gates pass.\n- Issue implementation is narrower: strict, reproducible bugs and separately\n  gated small `VISION.md`-aligned issues with no linked PR can open a generated\n  PR.\n\nRepair internals are documented in\n[`docs/repair/README.md`](docs/repair/README.md), and the automerge state\nmachine is documented in\n[`docs/repair/automerge-flow.md`](docs/repair/automerge-flow.md).\n\n### Commit Review Lane\n\nCommit review is intentionally separate from issue/PR cleanup. It never closes\nitems, writes comments, or fixes code.\n\n- Target repositories forward `push` events from `main` with\n  `repository_dispatch` only when the lane is re-enabled; the production\n  receiver currently accepts manual dispatch only.\n- Manual runs can pass `commit_sha`, optional `before_sha`, optional\n  `additional_prompt`, `enabled`, and `create_checks`.\n- The receiver verifies the selected commits are reachable from `origin/main`.\n- Before selecting and reviewing commits, the receiver waits 60 seconds by\n  default (`CLAWSWEEPER_COMMIT_REVIEW_SETTLE_SECONDS=60`) so a push range has\n  time to settle across GitHub and the runner.\n- The plan job expands ranges, pages large backfills at GitHub's matrix limit,\n  and classifies each commit before Codex starts.\n- Pure documentation, changelog, README/license, and asset-only commits get a\n  skipped report without spending Codex time.\n- Mixed commits and code-bearing commits start one Codex worker per commit. The\n  worker checks out current target `main` and reviews the selected commit by\n  SHA/range instead of detaching the whole repository at that commit.\n- Codex is prompted to read beyond the diff: changed files, callers/callees,\n  runtime entry points, adjacent tests/docs, dependency manifests, release\n  notes, advisories, web sources, and focused live tests when useful.\n- Each commit writes exactly one report at\n  `records/<repo-slug>/commits/<40-char-sha>.md`.\n- Reruns overwrite the same report, including reruns with an\n  `additional_prompt`.\n- Report results are `nothing_found`, `findings`, `inconclusive`, `failed`, or\n  `skipped_non_code`.\n- Optional GitHub Checks use the `ClawSweeper Commit Review` name on the target\n  commit. Clean or skipped reports are green; high-confidence high/critical\n  findings fail; lower-severity, inconclusive, and failed reviews are neutral.\n- Finding reports are dispatched to the repair intake when\n  `CLAWSWEEPER_COMMIT_FINDINGS_ENABLED` is not `false`. ClawSweeper owns\n  the audit log and any repair PR.\n\nUse `pnpm commit-reports -- --since 24h` to review recent reports and add\n`--findings`, `--non-clean`, `--repo`, or `--author` to narrow the list. The\nstorage stays flat so a rerun can overwrite exactly one file for a commit\nwithout rediscovering a date bucket.\n\n### Safety Model\n\n- Maintainer-authored items are excluded from automated closes unless the close\n  reason is verified `implemented_on_main`.\n- Protected labels block close proposals.\n- Apply rechecks older skipped fixed-close reports and archives skipped item\n  records when GitHub already shows the item closed.\n- Apply can retry older `kept_open` close reports and clear linked-PR issue\n  blockers after ClawSweeper closes the PR earlier in the same apply run.\n- Open PRs with GitHub closing references block issue closes until the PR is\n  resolved or closed earlier in the same apply run.\n- Open same-author issue/PR pairs block one-sided closes.\n- Codex runs without GitHub write tokens.\n- Issue/PR event jobs create target write and report-push credentials only after\n  Codex exits.\n- Commit review workers give Codex only a read-scoped target token as `GH_TOKEN`\n  so it can inspect mentioned issues, PRs, workflow runs, and commit metadata.\n- Commit write/check credentials are created only after Codex exits.\n- CI makes the target checkout read-only for reviews.\n- Reviews fail if Codex leaves tracked or untracked changes behind.\n- Snapshot changes block apply unless the only change is the bot’s own review\n  comment.\n- Commit Check Runs are optional and disabled by default.\n\n### Audit\n\n`pnpm run audit` compares live GitHub state with generated records without moving\nfiles. It reports missing open records, archived open records, stale records,\nduplicates, protected-label proposed closes, and stale review-status records.\nProtected proposed closes are reported only for active repo `items/` records\nbecause archived repo `closed/` records are historical and cannot be applied.\nMissing open records are classified as eligible, maintainer-authored, protected,\nor recently created so strict audit mode can flag actionable drift without\ntreating expected queue lag or excluded items as failures.\nUse `--update-dashboard` to publish the latest audit state under\n`results/audit/` in `openclaw/clawsweeper-state` without making every normal\nstatus update scan all open GitHub items. The state repo renders reviewable\nfindings such as missing eligible records, reopened archived records, and stale\nreviews from that state. The\nworkflow refreshes audit state on a separate six-hour schedule, and it can be run\nmanually with `audit_dashboard=true`. The read-only audit lane covers\n`openclaw/openclaw`, `openclaw/clawhub`, and `openclaw/clawsweeper`; it falls\nback to public workflow-token reads when the ClawSweeper App token is not\navailable for a target.\n\n## Local Run\n\nRequires Node 24.\n\nIssue/PR sweeper:\n\n```bash\nsource ~/.profile\ncorepack enable\npnpm install\npnpm run build\npnpm run plan -- --target-repo openclaw/openclaw --batch-size 5 --shard-count 39 --max-pages 250 --codex-model gpt-5.5 --codex-reasoning-effort high\npnpm run review -- --target-repo openclaw/openclaw --target-dir ../openclaw --batch-size 5 --max-pages 250 --artifact-dir artifacts/reviews --codex-model gpt-5.5 --codex-reasoning-effort high --codex-timeout-ms 600000\npnpm run apply-artifacts -- --target-repo openclaw/openclaw --artifact-dir artifacts/reviews --skip-dashboard\npnpm run audit -- --target-repo openclaw/openclaw --max-pages 250 --sample-limit 25 --update-dashboard\npnpm run reconcile -- --target-repo openclaw/openclaw --dry-run\n```\n\nApply unchanged proposals later:\n\n```bash\nsource ~/.profile\ncorepack enable\npnpm run apply-decisions -- --target-repo openclaw/openclaw --limit 20 --apply-kind all --skip-dashboard\n```\n\nSync durable review comments without closing:\n\n```bash\nsource ~/.profile\ncorepack enable\npnpm run apply-decisions -- --target-repo openclaw/openclaw --sync-comments-only --comment-sync-min-age-days 7 --processed-limit 1000 --limit 0 --skip-dashboard\n```\n\nList commit reports:\n\n```bash\nsource ~/.profile\ncorepack enable\npnpm run build\npnpm commit-reports -- --since 24h\npnpm commit-reports -- --since 24h --findings\npnpm commit-reports -- --repo openclaw/openclaw --author steipete --since 7d\n```\n\nManually rerun commit review through GitHub Actions:\n\n```bash\ngh workflow run commit-review.yml \\\n  --repo openclaw/clawsweeper \\\n  --ref main \\\n  -f target_repo=openclaw/openclaw \\\n  -f commit_sha=<commit-sha> \\\n  -f before_sha=<parent-or-range-start-sha> \\\n  -f create_checks=false \\\n  -f enabled=true \\\n  -f additional_prompt='Optional extra review focus.'\n```\n\nOmit `before_sha` for a single-commit review. Pass `before_sha` to review the\nhistoric range `before_sha..commit_sha`.\n\nManual review runs are proposal-only. Use `apply_existing=true` to apply unchanged\nproposals later. Scheduled apply runs process both issues and pull requests by\ndefault, subject to the selected repository profile; pass `target_repo`,\n`apply_kind=issue`, or `apply_kind=pull_request` to narrow a manual run.\n\nScheduled runs cover the configured product profiles. `openclaw/openclaw` runs\nnormal backfill every 5 minutes with up to 27 review shards when the system is\nquiet; `openclaw/clawhub` runs on offset review/apply/audit crons so its reports\nlive under `records/openclaw-clawhub/` without colliding with default repo\nrecords. `openclaw/clawsweeper` has a scheduled read-only audit row and is\navailable for manual and event self-review smoke tests. Broad hot-intake sweeps\ncap scheduled fan-out at 19 one-item shards per run when quiet; exact event\nreviews still use one shard. Normal review, hot intake, and commit review are\nbackground lanes, so they shrink automatically while repair or exact-item work\nis active. Throughput defaults live in\n[docs/limits.md](docs/limits.md) and `config/automation-limits.json`.\n\n### Worker Budget\n\nClawSweeper has one main capacity knob:\n`config/automation-limits.json` -> `workers.max`. The current value is `57`.\nLane limits are derived from that number: normal review defaults to 39 shards\nfor manual/backstop runs, scheduled normal review gets up to 27 after reserves,\nhot intake up to 19 shards, commit review 2 commits per page, and existing\nrepair/issue implementation lanes use 40% of `workers.max`, currently 22 live\nworkers. Imported gitcrawl cluster repair stays at 1 live worker by default.\nExact-item review, repair, and issue implementation are priority work; normal\nreview, hot intake, and commit review are background work and automatically\nyield when priority work is active.\nUse `workers.max` first when turning total Codex usage up or down; use\n`lanes.repair.cluster_max_live_runs` to tune the imported legacy cluster-repair\nlane separately, and individual environment overrides only for temporary\nlane-specific exceptions.\n\nTarget repositories can opt into event-level latency by installing the\ndispatcher workflow in [docs/target-dispatcher.md](docs/target-dispatcher.md).\nThe dispatcher sends `repository_dispatch` events to this repository with the\ntarget repo and exact item number; ClawSweeper then runs one event job that\nreviews, comments, and checks immediate safe apply instead of waiting for the\nnext hot-intake cron or bulk publish lane.\n\nMain-branch commit review is manual-only in production. See\n[docs/commit-dispatcher.md](docs/commit-dispatcher.md) for the historical target\ndispatcher shape if automatic push-range review is re-enabled later.\n\n## Checks\n\n```bash\npnpm run check\npnpm run oxformat\n```\n\n`oxformat` is an alias for `oxfmt`; there is no separate `oxformat` pnpm package.\nThe `CI` GitHub Actions workflow uses the latest Node release and runs\n`pnpm run check` on pushes, pull requests, and manual dispatches. The check gate\nincludes the full test suite, a strict changed-surface coverage threshold, and a\nfull compiled-repo coverage ratchet.\n\n## GitHub Actions Setup\n\nRequired secrets:\n\n- `OPENAI_API_KEY`: OpenAI API key used by the per-job local Codex Responses\n  proxy. Codex subprocesses inherit only the proxy-backed `CODEX_HOME`, not the\n  raw API key.\n- `CLAWSWEEPER_APP_CLIENT_ID`: public GitHub App client ID for `clawsweeper`.\n  Currently `Iv23liOECG0slfuhz093`.\n- `CLAWSWEEPER_APP_PRIVATE_KEY`: private key for `clawsweeper`; plan/review\n  jobs use a short-lived GitHub App installation token for read-heavy target API\n  calls, commit review uses a read-scoped target token while Codex runs, and\n  apply/comment-sync/check jobs use the app token for comments, closes, and\n  optional checks.\n  Keep App credentials scoped to the `actions/create-github-app-token` step.\n  Review shards run Codex over attacker-controlled issue/PR text, so\n  `codexEnv()` also strips these App variables before spawning Codex.\n\nToken flow:\n\n- Review and repair jobs create an isolated per-run `CODEX_HOME`, start a local\n  Responses proxy from `OPENAI_API_KEY`, write proxy-only Codex config there,\n  and run Codex without OpenAI or Codex token environment variables.\n- ClawSweeper uses the `clawsweeper` GitHub App token for read-heavy target\n  context.\n- Apply mode uses the same app token for review comments and closes, so GitHub\n  attributes mutations to the app bot account instead of a PAT user.\n- Commit review passes Codex only a read-scoped target token as `GH_TOKEN` for\n  issue/PR/workflow/commit hydration, then creates write/check credentials only\n  after Codex exits.\n- The ClawSweeper GitHub App commits generated reports back to\n  `openclaw/clawsweeper-state`.\n\nRequired `clawsweeper` app permissions:\n\n- Contents: read/write, for report commits, repair branches, and repository\n  dispatch inputs that need a contents-scoped installation token.\n- Issues: read/write, for issue comments, labels, closes, and maintainer command\n  authorization context.\n- Pull requests: read/write, for PR comments, labels, merge readiness, repair PRs,\n  and guarded automerge.\n- Workflows: write, for adopted automerge repairs that need to rebase or update\n  source branches containing `.github/workflows/*` changes.\n- Actions: read/write on `openclaw/clawsweeper`, for run cancellation, manual\n  dispatch, self-heal, and commit-review continuations.\n- Checks: write on target repositories when commit Check Runs should be\n  published.\n\nClawSweeper no longer falls back to PAT-based write tokens. If the GitHub App\ninstallation does not grant the requested permission set, the workflow fails at\ntoken creation instead of silently switching identity.\n\nTarget repository setup:\n\n- install the issue/PR dispatcher from\n  [docs/target-dispatcher.md](docs/target-dispatcher.md) for exact item event\n  reviews\n- install the commit dispatcher from\n  [docs/commit-dispatcher.md](docs/commit-dispatcher.md) for `main` commit\n  reviews\n- set `CLAWSWEEPER_COMMIT_REVIEW_ENABLED=false` to disable commit dispatch\n  without code changes\n- set `CLAWSWEEPER_COMMIT_REVIEW_CREATE_CHECKS=true` only if commit Check Runs\n  should be published\n- optionally set `CLAWSWEEPER_COMMIT_REVIEW_SETTLE_SECONDS=0` for manual\n  backfills where the target commit range is already settled; the default is\n  `60`\n","summary":"ClawSweeper is a conservative maintenance bot designed to automate repository upkeep, including backlog grooming, issue tracking, and the guarded repair of pull requests. It provides advanced features like scheduled reviews, intelligent comment management, and command-based workflows that allow maintainers to trigger automated fixes or merges while ensuring all mutations are validated against real-time repository state. This tool is ideal for project maintainers who want to streamline their administrative workload while maintaining strict control over automated actions through a secure, audit-friendly framework.","description":"ClawSweeper scans all issues and PRs and suggest what we can close, and why. It runs every PR / Issue once a week.","stars":1700,"language":"TypeScript"},{"owner":"tashfeenahmed","repo":"freellmapi","url":"https://github.com/tashfeenahmed/freellmapi","readme":"<div align=\"center\">\n\n# FreeLLMAPI\n\n**One OpenAI-compatible endpoint. Sixteen free LLM providers. ~1.7B tokens per month.**\n\nAggregate the free tiers from Google, Groq, Cerebras, SambaNova, NVIDIA, Mistral, OpenRouter, GitHub Models, Cohere, Cloudflare, HuggingFace, Z.ai (Zhipu), Ollama, Kilo, Pollinations, and LLM7 — plus any custom OpenAI-compatible endpoint (llama.cpp, LM Studio, vLLM, local Ollama) — behind a single `/v1/chat/completions` endpoint. Keys are stored encrypted. A router picks the best available model for each request, falls over to the next provider when one is rate-limited, and tracks per-key usage so you stay under every free-tier cap.\n\n[![CI](https://github.com/tashfeenahmed/freellmapi/actions/workflows/ci.yml/badge.svg)](https://github.com/tashfeenahmed/freellmapi/actions/workflows/ci.yml)\n[![License: MIT](https://img.shields.io/badge/License-MIT-green.svg)](./LICENSE)\n[![PRs Welcome](https://img.shields.io/badge/PRs-welcome-brightgreen.svg)](#contributing)\n[![Docker image](https://img.shields.io/badge/ghcr.io-freellmapi-2496ED?logo=docker&logoColor=white)](https://github.com/tashfeenahmed/freellmapi/pkgs/container/freellmapi)\n\n![Fallback chain with per-provider token budget](repo-assets/fallback-chain.png)\n\n</div>\n\n---\n\n## Contents\n\n- [Why this exists](#why-this-exists)\n- [Supported providers](#supported-providers)\n- [Features](#features)\n- [Not yet supported](#not-yet-supported)\n- [Quick start](#quick-start)\n- [Docker](#docker)\n- [Using the API](#using-the-api)\n- [Screenshots](#screenshots)\n- [How it works](#how-it-works)\n- [Limitations](#limitations)\n- [Contributing](#contributing)\n- [Terms of Service review](#terms-of-service-review)\n- [Disclaimer](#disclaimer)\n\n## Why this exists\n\nEvery serious AI lab now offers a free tier — a few million tokens a month, a few thousand requests a day. On its own each tier is a toy. Stacked together, they add up to roughly **1.7 billion tokens per month** of working inference capacity, across 100+ models from small-and-fast to reasonably capable.\n\nThe problem is that stacking them by hand is painful: sixteen different SDKs, sixteen different rate limits, sixteen places a request can fail. FreeLLMAPI collapses that into one OpenAI-compatible endpoint. Point any OpenAI client library at your local server, and it routes transparently across whichever providers you've added keys for.\n\n## Supported providers\n\n<table>\n<tr>\n<td align=\"center\" width=\"180\"><a href=\"https://ai.google.dev\"><b>Google</b><br/>Gemini 2.5 Flash · 3.x previews</a></td>\n<td align=\"center\" width=\"180\"><a href=\"https://groq.com\"><b>Groq</b><br/>Llama 3.3, Llama 4, GPT-OSS, Qwen3</a></td>\n<td align=\"center\" width=\"180\"><a href=\"https://cerebras.ai\"><b>Cerebras</b><br/>Qwen3 235B</a></td>\n<td align=\"center\" width=\"180\"><a href=\"https://cloud.sambanova.ai\"><b>SambaNova</b><br/>DeepSeek V3.x · Llama 4 · Gemma 3</a></td>\n</tr>\n<tr>\n<td align=\"center\"><a href=\"https://mistral.ai\"><b>Mistral</b><br/>Large 3 · Medium 3.5 · Codestral · Devstral</a></td>\n<td align=\"center\"><a href=\"https://openrouter.ai\"><b>OpenRouter</b><br/>21 free-tier models</a></td>\n<td align=\"center\"><a href=\"https://github.com/marketplace/models\"><b>GitHub Models</b><br/>GPT-4.1 · GPT-4o</a></td>\n<td align=\"center\"><a href=\"https://developers.cloudflare.com/workers-ai\"><b>Cloudflare</b><br/>Kimi K2 · GLM-4.7 · GPT-OSS · Granite 4</a></td>\n</tr>\n<tr>\n<td align=\"center\"><a href=\"https://cohere.com\"><b>Cohere</b><br/>Command R+ · Command-A (trial)</a></td>\n<td align=\"center\"><a href=\"https://docs.z.ai\"><b>Z.ai (Zhipu)</b><br/>GLM-4.5 · GLM-4.7 Flash</a></td>\n<td align=\"center\"><a href=\"https://build.nvidia.com\"><b>NVIDIA</b><br/>NIM (disabled by default)</a></td>\n<td align=\"center\"><a href=\"https://huggingface.co/docs/inference-providers\"><b>HuggingFace</b><br/>Router → DeepSeek V4 · Kimi K2.6 · Qwen3</a></td>\n</tr>\n<tr>\n<td align=\"center\"><a href=\"https://ollama.com\"><b>Ollama Cloud</b><br/>GLM-4.7 · Kimi K2 · gpt-oss · Qwen3</a></td>\n<td align=\"center\"><a href=\"https://kilo.ai\"><b>Kilo Gateway</b><br/>:free routes (anon ok)</a></td>\n<td align=\"center\"><a href=\"https://pollinations.ai\"><b>Pollinations</b><br/>GPT-OSS 20B (anon ok)</a></td>\n<td align=\"center\"><a href=\"https://llm7.io\"><b>LLM7</b><br/>GPT-OSS · Llama 3.1 · GLM (anon ok)</a></td>\n</tr>\n</table>\n\nPlus a **custom** provider — point at any OpenAI-compatible endpoint (llama.cpp, LM Studio, vLLM, a local Ollama, or a remote gateway) from the Keys page.\n\n## Features\n\n- **OpenAI-compatible** — `POST /v1/chat/completions` and `GET /v1/models` work with the official OpenAI SDKs and any OpenAI-compatible client (LangChain, LlamaIndex, Continue, Hermes, etc.). Just change `base_url`.\n- **Responses API** — `POST /v1/responses` (the wire format current Codex CLI versions require) is implemented as a translating shim over the same router, with full streaming events and tool calls.\n- **Streaming and non-streaming** — Server-Sent Events for `stream: true`, JSON response otherwise. Every provider adapter implements both.\n- **Tool calling** — OpenAI-style `tools` / `tool_choice` requests are passed through, and assistant `tool_calls` + `tool` role follow-up messages round-trip across providers.\n- **Automatic fallover** — If the chosen provider returns a 429, 5xx, or times out, the router skips it, puts the key on a short cooldown, and retries on the next model in your fallback chain (up to 20 attempts).\n- **Per-key rate tracking** — RPM, RPD, TPM, and TPD counters per `(platform, model, key)` so the router always picks a key that's under its caps.\n- **Sticky sessions** — Multi-turn conversations keep talking to the same model for 30 minutes to avoid the hallucination spike that comes from mid-conversation model switches.\n- **Encrypted key storage** — API keys are encrypted with AES-256-GCM before hitting SQLite; decryption happens in-memory just before a request.\n- **Unified API key** — Clients authenticate to your proxy with a single `freellmapi-…` bearer token. You never expose upstream provider keys to your apps.\n- **Dashboard login** — The admin UI and all `/api/*` routes are gated behind an email + password account (scrypt-hashed, session-token auth), set on first run. The `/v1` proxy keeps its own unified-key auth for apps.\n- **Health checks** — Periodic probes mark keys as `healthy`, `rate_limited`, `invalid`, or `error` so the router skips dead ones automatically.\n- **Admin dashboard** — React + Vite UI to manage keys, reorder the fallback chain, inspect analytics, and run prompts in a playground. Dark mode included.\n- **Analytics** — Per-request logging with latency, token counts, success rate, and per-provider breakdowns.\n- **Runs anywhere Node 20+ runs** — Windows, macOS, Linux servers, or a small ARM SBC (Raspberry Pi included). ~40 MB RSS at idle behind PM2 / systemd / whatever supervisor you prefer.\n\n## Not yet supported\n\nThe scope is deliberately narrow. If a feature isn't on this list and isn't below, assume it isn't there yet.\n\n- **Embeddings** (`/v1/embeddings`)\n- **Image generation** (`/v1/images/*`)\n- **Audio / speech** (`/v1/audio/*`)\n- **Legacy completions** (`/v1/completions`) — only the chat endpoint is implemented\n- **Moderation** (`/v1/moderations`)\n- **`n > 1`** (multiple completions per request)\n- **Per-user billing / multi-tenant auth** — single-user by design\n\nPRs that add any of these are very welcome. See [Contributing](#contributing).\n\n## Quick start\n\n**Recommended:** Docker Compose. It runs the API and dashboard together on port 3001 and persists SQLite in a named volume.\n\n**Prerequisites:** Docker, Docker Compose, OpenSSL.\n\n```bash\ngit clone https://github.com/tashfeenahmed/freellmapi.git\ncd freellmapi\n\n# Generate an encryption key for at-rest key storage\nENCRYPTION_KEY=\"$(openssl rand -hex 32)\"\nprintf \"ENCRYPTION_KEY=%s\\nPORT=3001\\n\" \"$ENCRYPTION_KEY\" > .env\n\ndocker compose up -d\n```\n\nOpen http://localhost:3001, add your provider keys on the **Keys** page, reorder the **Fallback Chain** to taste, and grab your unified API key from the **Keys** page header. That unified key is what you point your OpenAI SDK at.\n\n> **Reaching it from another machine?** By default the container is published only on `127.0.0.1`, so `http://<server-ip>:3001` won't load from another device (the page just hangs). To expose it on your LAN — e.g. a Raspberry Pi at `http://192.168.1.x:3001` — start it with `HOST_BIND=0.0.0.0`:\n>\n> ```bash\n> HOST_BIND=0.0.0.0 docker compose up -d\n> ```\n>\n> Only do this on a trusted network: the proxy is single-user and guarded only by the unified API key.\n\n### Local development\n\n**Prerequisites:** Node.js 20+, npm.\n\n```bash\ngit clone https://github.com/tashfeenahmed/freellmapi.git\ncd freellmapi\nnpm install\ncp .env.example .env\nENCRYPTION_KEY=\"$(node -e 'console.log(require(\"crypto\").randomBytes(32).toString(\"hex\"))')\"\nprintf \"ENCRYPTION_KEY=%s\\nPORT=3001\\n\" \"$ENCRYPTION_KEY\" > .env\nnpm run dev\n```\n\n`ENCRYPTION_KEY` is required for startup. The server only falls back to a\ndatabase-stored development key when `DEV_MODE=true` and `NODE_ENV` is not\n`production`; do not use that fallback with real provider keys.\n\nRequest analytics are retained for 90 days or 100000 request rows by default,\nwhichever limit prunes first. Set `REQUEST_ANALYTICS_RETENTION_DAYS=0` or\n`REQUEST_ANALYTICS_MAX_ROWS=0` in `.env` to disable either retention limit.\n\nOpen http://localhost:5173 (the Vite dev UI), add your provider keys on the **Keys** page, reorder the **Fallback Chain** to taste, and grab your unified API key from the **Keys** page header. That unified key is what you point your OpenAI SDK at.\n\nFor a production build without Docker:\n\n```bash\nnpm run build\nnode server/dist/index.js     # server + dashboard both served on :3001\n```\n\n## Docker\n\nFreeLLMAPI publishes a single production image that contains the Express server and the built React dashboard:\n\n```bash\ndocker pull ghcr.io/tashfeenahmed/freellmapi:latest   # or pin a release, e.g. :v1.2.3\n```\n\nThe image is multi-arch (`linux/amd64` + `linux/arm64`, so it runs on a Raspberry Pi). Published tags: `latest` (default branch), `v*.*.*` (git release tags), and `sha-<commit>`.\n\nThe included `docker-compose.yml` is the recommended install path:\n\n```bash\ndocker compose up -d\ndocker compose logs -f freellmapi\n```\n\nBy default the container's port is bound to `127.0.0.1` (localhost only). To reach the dashboard/API from another machine on your network, publish it on all interfaces with `HOST_BIND=0.0.0.0 docker compose up -d` — only on a trusted LAN, since the proxy is single-user.\n\nSQLite data is stored in the `freellmapi-data` volume at `/app/server/data`. Keep the same `.env` `ENCRYPTION_KEY` and volume when upgrading, because provider keys are encrypted at rest.\n\nMore Docker operations and examples live in [docker/README.md](./docker/README.md).\n\n## Using the API\n\nAny OpenAI-compatible client works. Examples:\n\n**Python**\n\n```python\nfrom openai import OpenAI\n\nclient = OpenAI(\n    base_url=\"http://localhost:3001/v1\",\n    api_key=\"freellmapi-your-unified-key\",\n)\n\nresp = client.chat.completions.create(\n    model=\"auto\",  # let the router pick; or specify e.g. \"gemini-2.5-flash\"\n    messages=[{\"role\": \"user\", \"content\": \"Summarise the fall of Rome in one sentence.\"}],\n)\nprint(resp.choices[0].message.content)\nprint(\"Routed via:\", resp.headers.get(\"x-routed-via\"))\n```\n\n**curl**\n\n```bash\ncurl http://localhost:3001/v1/chat/completions \\\n  -H \"Authorization: Bearer freellmapi-your-unified-key\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"model\": \"auto\",\n    \"messages\": [{\"role\": \"user\", \"content\": \"hi\"}]\n  }'\n```\n\n**Streaming**\n\n```python\nstream = client.chat.completions.create(\n    model=\"auto\",\n    messages=[{\"role\": \"user\", \"content\": \"Stream me a haiku about SQLite.\"}],\n    stream=True,\n)\nfor chunk in stream:\n    print(chunk.choices[0].delta.content or \"\", end=\"\", flush=True)\n```\n\n**Tool calling**\n\nPass OpenAI-style `tools` and `tool_choice`; the assistant response round-trips back through the proxy exactly like the OpenAI API. Multi-step flows (assistant `tool_calls` → `tool` role follow-up → final answer) work across every provider the router can reach.\n\n```python\ntools = [{\n    \"type\": \"function\",\n    \"function\": {\n        \"name\": \"get_weather\",\n        \"description\": \"Get current weather for a city.\",\n        \"parameters\": {\n            \"type\": \"object\",\n            \"properties\": {\"city\": {\"type\": \"string\"}},\n            \"required\": [\"city\"],\n        },\n    },\n}]\n\n# 1. Model asks for a tool call\nfirst = client.chat.completions.create(\n    model=\"auto\",\n    messages=[{\"role\": \"user\", \"content\": \"What's the weather in Karachi?\"}],\n    tools=tools,\n    tool_choice=\"required\",\n)\ncall = first.choices[0].message.tool_calls[0]\n\n# 2. You execute the tool, feed the result back\nfinal = client.chat.completions.create(\n    model=\"auto\",\n    messages=[\n        {\"role\": \"user\", \"content\": \"What's the weather in Karachi?\"},\n        first.choices[0].message,\n        {\"role\": \"tool\", \"tool_call_id\": call.id, \"content\": '{\"temp_c\": 32, \"cond\": \"sunny\"}'},\n    ],\n    tools=tools,\n)\nprint(final.choices[0].message.content)\n```\n\n**Vision / image input**\n\nSend images with the standard OpenAI `image_url` content blocks (base64 `data:` URLs or `http(s)` URLs). When a request contains an image, the router restricts itself to **vision-capable models** and ignores text-only ones. Vision models are tagged with a **Vision** badge on the Fallback Chain page; the current set includes Gemini (2.5 / 3.x), Llama 4 Scout/Maverick (Groq, NVIDIA, SambaNova), and GitHub's GPT-4o / GPT-4.1.\n\n```python\nresp = client.chat.completions.create(\n    model=\"auto\",  # auto-routes to a vision model\n    messages=[{\n        \"role\": \"user\",\n        \"content\": [\n            {\"type\": \"text\", \"text\": \"What's in this image?\"},\n            {\"type\": \"image_url\", \"image_url\": {\"url\": \"data:image/png;base64,<...>\"}},\n        ],\n    }],\n)\nprint(resp.choices[0].message.content)\n```\n\nIf no vision-capable model is enabled in your Fallback Chain, an image request returns a clear `422` (`code: \"no_vision_model\"`) rather than silently dropping the image. (Image input on `/v1/responses` isn't supported yet — use `/v1/chat/completions`.)\n\nWorks with `stream=True` as well — you'll get `delta.tool_calls` chunks followed by a `finish_reason: \"tool_calls\"` close. Under the hood, OpenAI-compatible providers (Groq, Cerebras, SambaNova, Mistral, OpenRouter, GitHub Models, HuggingFace, Cloudflare, Cohere compat) get the request passed through; Gemini requests get translated into Google's `functionDeclarations` / `functionResponse` shape and the response is translated back.\n\nEvery response carries an `X-Routed-Via: <platform>/<model>` header so you can see which provider actually served each call. If a request fell over between providers, you'll also see `X-Fallback-Attempts: N`.\n\n## Screenshots\n\n### Keys\n\nManage provider credentials and grab the unified API key your apps connect with. Each key shows a status dot and when it was last health-checked.\n\n![Keys page](repo-assets/keys.png)\n\n### Playground\n\nSend a chat completion through the router and see which provider served it, with the model ID and latency printed right on the message.\n\n![Playground page](repo-assets/playground.png)\n\n### Analytics\n\nRequest volume, success rate, tokens in and out, average latency, and per-provider breakdowns over 24h / 7d / 30d windows.\n\n![Analytics page](repo-assets/analytics.png)\n\n## How it works\n\n```\n┌──────────────────┐   Bearer freellmapi-…   ┌─────────────────────────┐\n│  OpenAI SDK /    │ ──────────────────────▶ │  Express proxy (:3001)  │\n│  curl / any      │ ◀────────────────────── │  /v1/chat/completions   │\n│  OpenAI client   │      streamed tokens    └────────────┬────────────┘\n└──────────────────┘                                      │\n                                                          ▼\n                             ┌────────────────────────────────────────────────┐\n                             │  Router                                        │\n                             │   1. Pick highest-priority model that          │\n                             │      (a) has a healthy key and                 │\n                             │      (b) is under all its rate limits.         │\n                             │   2. Decrypt key, call provider SDK.           │\n                             │   3. On 429/5xx → cooldown + retry next model. │\n                             └────────────────────────────────────────────────┘\n                                          │\n   ┌──────────────┬────────────┬──────────┴─────────┬─────────────┬──────────┐\n   ▼              ▼            ▼                    ▼             ▼          ▼\n Google         Groq        Cerebras           OpenRouter        HF       …10 more\n```\n\n- **Router** (`server/src/services/router.ts`) — picks a model per request.\n- **Rate-limit ledger** (`server/src/services/ratelimit.ts`) — in-memory RPM/RPD/TPM/TPD counters backed by SQLite, with cooldowns on 429s.\n- **Provider adapters** (`server/src/providers/*.ts`) — one file per provider, implementing the `Provider` base class: `chatCompletion()` and `streamChatCompletion()`.\n- **Health service** (`server/src/services/health.ts`) — periodic probe keeps key status fresh.\n- **Dashboard** (`client/`) — React + Vite + shadcn/ui admin surface.\n- **Storage** — SQLi
