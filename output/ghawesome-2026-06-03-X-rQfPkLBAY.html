Eval1** is a comprehensive evaluation benchmark for assessing biological reasoning capabilities across diverse tasks. It contains **433 instances** spanning **10 biological reasoning tasks**, from gene identification to disease diagnosis.\n\n**Tasks Included:**\n- GWAS causal gene identification (3 variants)\n- Lab bench Q&A (2 variants)\n- Patient gene detection\n- Screen gene retrieval\n- GWAS variant prioritization\n- Rare disease diagnosis\n- CRISPR delivery method selection\n\n**Resources:**\n- 🤗 Dataset: [biomni/Eval1](https://huggingface.co/datasets/biomni/Eval1)\n- 💻 Quick Start:\n```python\nfrom biomni.eval import BiomniEval1\n\nevaluator = BiomniEval1()\nscore = evaluator.evaluate('gwas_causal_gene_opentargets', 0, 'BRCA1')\n```\n\n\n## 📚 Know-How Library\n\nBiomni includes a **Know-How Library** — a curated collection of best practices, protocols, and troubleshooting guides for biomedical techniques. These documents are automatically retrieved by the A1 agent when relevant to provide domain expertise and practical knowledge.\n\n**Features:**\n- Automatic retrieval based on query relevance\n- Metadata tracking (authors, affiliations, licensing, commercial use)\n- Compatible with commercial mode (filters non-commercial content)\n\n### 📝 Contributing Know-How Documents\n\nWe're actively seeking community contributions to expand our Know-How Library! Share your expertise by contributing:\n\n- **Lab protocols** (cell culture, flow cytometry, western blotting, etc.)\n- **Analysis best practices** (NGS workflows, microscopy techniques, etc.)\n- **Troubleshooting guides** (common issues and solutions)\n- **Experimental design guidelines** (sample size, controls, validation)\n- **Domain-specific knowledge** (drug formulation, animal models, clinical trials, etc.)\n\nKnow-how documents should be practical, succinct, and include proper attribution. Use [this know-how](know_how/single_cell_annotation.md) as an example.\n\n**To contribute:** Create a markdown file following our template and submit a pull request.\n\n## 🤝 Contributing to Biomni\n\nBiomni is an open-science initiative that thrives on community contributions. We welcome:\n\n- **🔧 New Tools**: Specialized analysis functions and algorithms\n- **📊 Datasets**: Curated biomedical data and knowledge bases\n- **💻 Software**: Integration of existing biomedical software packages\n- **📋 Benchmarks**: Evaluation datasets and performance metrics\n- **📚 Know-How**: Best practices, protocols, and domain expertise\n- **📚 Misc**: Tutorials, examples, and use cases\n- **🔧 Update existing tools**: many current tools are not optimized - fix and replacements are welcome!\n\nCheck out this **[Contributing Guide](CONTRIBUTION.md)** on how to contribute to the Biomni ecosystem.\n\nIf you have particular tool/database/software in mind that you want to add, you can also submit to [this form](https://forms.gle/nu2n1unzAYodTLVj6) and the biomni team will implement them.\n\n## 🔬 Call for Contributors: Help Build Biomni-E2\n\nBiomni-E1 only scratches the surface of what’s possible in the biomedical action space.\n\nNow, we’re building **Biomni-E2** — a next-generation environment developed **with and for the community**.\n\nWe believe that by collaboratively defining and curating a shared library of standard biomedical actions, we can accelerate science for everyone.\n\n**Join us in shaping the future of biomedical AI agent.**\n\n- **Contributors with significant impact** (e.g., 10+ significant & integrated tool contributions or equivalent) will be **invited as co-authors** on our upcoming paper in a top-tier journal or conference.\n- **All contributors** will be acknowledged in our publications.\n- More contributor perks...\n\nLet’s build it together.\n\n\n## Tutorials and Examples\n\n**[Biomni 101](./tutorials/biomni_101.ipynb)** - Basic concepts and first steps\n\nMore to come!\n\n## 🌐 Web Interface\n\nExperience Biomni through our no-code web interface at **[biomni.stanford.edu](https://biomni.stanford.edu)**.\n\n[![Watch the video](https://img.youtube.com/vi/E0BRvl23hLs/maxresdefault.jpg)](https://youtu.be/E0BRvl23hLs)\n\n\n## Important Note\n- Security warning: Currently, Biomni executes LLM-generated code with full system privileges. If you want to use it in production, please use in isolated/sandboxed environments. The agent can access files, network, and system commands. Be careful with sensitive data or credentials.\n- This release was frozen as of April 15 2025, so it differs from the current web platform.\n- Biomni itself is Apache 2.0-licensed, but certain integrated tools, databases, or software may carry more restrictive commercial licenses. Review each component carefully before any commercial use.\n\n## Cite Us\n\n```\n@article{huang2025biomni,\n  title={Biomni: A General-Purpose Biomedical AI Agent},\n  author={Huang, Kexin and Zhang, Serena and Wang, Hanchen and Qu, Yuanhao and Lu, Yingzhou and Roohani, Yusuf and Li, Ryan and Qiu, Lin and Zhang, Junze and Di, Yin and others},\n  journal={bioRxiv},\n  pages={2025--05},\n  year={2025},\n  publisher={Cold Spring Harbor Laboratory}\n}\n```\n","summary":"Biomni is a general-purpose biomedical AI agent designed to autonomously execute complex research tasks across a variety of scientific subfields. By combining large language model reasoning with retrieval-augmented planning and code-based execution, the platform enables users to accelerate research workflows and generate data-driven, testable hypotheses. This tool is intended for biomedical researchers and scientists who seek to enhance their productivity through automated, AI-assisted computational analysis.","description":"Biomni: a general-purpose biomedical AI agent","stars":3158,"language":"Python"},{"owner":"google","repo":"googletest","url":"https://github.com/google/googletest","readme":"# GoogleTest\n\n### Announcements\n\n#### Documentation Updates\n\nOur documentation is now live on GitHub Pages at\nhttps://google.github.io/googletest/. We recommend browsing the documentation on\nGitHub Pages rather than directly in the repository.\n\n#### Release 1.17.0\n\n[Release 1.17.0](https://github.com/google/googletest/releases/tag/v1.17.0) is\nnow available.\n\nThe 1.17.x branch\n[requires at least C++17](https://opensource.google/documentation/policies/cplusplus-support#c_language_standard).\n\n#### Continuous Integration\n\nWe use Google's internal systems for continuous integration.\n\n#### Coming Soon\n\n*   We are planning to take a dependency on\n    [Abseil](https://github.com/abseil/abseil-cpp).\n\n## Welcome to **GoogleTest**, Google's C++ test framework!\n\nThis repository is a merger of the formerly separate GoogleTest and GoogleMock\nprojects. These were so closely related that it makes sense to maintain and\nrelease them together.\n\n### Getting Started\n\nSee the [GoogleTest User's Guide](https://google.github.io/googletest/) for\ndocumentation. We recommend starting with the\n[GoogleTest Primer](https://google.github.io/googletest/primer.html).\n\nMore information about building GoogleTest can be found at\n[googletest/README.md](googletest/README.md).\n\n## Features\n\n*   xUnit test framework: \\\n    Googletest is based on the [xUnit](https://en.wikipedia.org/wiki/XUnit)\n    testing framework, a popular architecture for unit testing\n*   Test discovery: \\\n    Googletest automatically discovers and runs your tests, eliminating the need\n    to manually register your tests\n*   Rich set of assertions: \\\n    Googletest provides a variety of assertions, such as equality, inequality,\n    exceptions, and more, making it easy to test your code\n*   User-defined assertions: \\\n    You can define your own assertions with Googletest, making it simple to\n    write tests that are specific to your code\n*   Death tests: \\\n    Googletest supports death tests, which verify that your code exits in a\n    certain way, making it useful for testing error-handling code\n*   Fatal and non-fatal failures: \\\n    You can specify whether a test failure should be treated as fatal or\n    non-fatal with Googletest, allowing tests to continue running even if a\n    failure occurs\n*   Value-parameterized tests: \\\n    Googletest supports value-parameterized tests, which run multiple times with\n    different input values, making it useful for testing functions that take\n    different inputs\n*   Type-parameterized tests: \\\n    Googletest also supports type-parameterized tests, which run with different\n    data types, making it useful for testing functions that work with different\n    data types\n*   Various options for running tests: \\\n    Googletest provides many options for running tests including running\n    individual tests, running tests in a specific order and running tests in\n    parallel\n\n## Supported Platforms\n\nGoogleTest follows Google's\n[Foundational C++ Support Policy](https://opensource.google/documentation/policies/cplusplus-support).\nSee\n[this table](https://github.com/google/oss-policies-info/blob/main/foundational-cxx-support-matrix.md)\nfor a list of currently supported versions of compilers, platforms, and build\ntools.\n\n## Who Is Using GoogleTest?\n\nIn addition to many internal projects at Google, GoogleTest is also used by the\nfollowing notable projects:\n\n*   The [Chromium projects](https://www.chromium.org/) (behind the Chrome\n    browser and Chrome OS).\n*   The [LLVM](https://llvm.org/) compiler.\n*   [Protocol Buffers](https://github.com/google/protobuf), Google's data\n    interchange format.\n*   The [OpenCV](https://opencv.org/) computer vision library.\n\n## Related Open Source Projects\n\n[GTest Runner](https://github.com/nholthaus/gtest-runner) is a Qt5 based\nautomated test-runner and Graphical User Interface with powerful features for\nWindows and Linux platforms.\n\n[GoogleTest UI](https://github.com/ospector/gtest-gbar) is a test runner that\nruns your test binary, allows you to track its progress via a progress bar, and\ndisplays a list of test failures. Clicking on one shows failure text. GoogleTest\nUI is written in C#.\n\n[GTest TAP Listener](https://github.com/kinow/gtest-tap-listener) is an event\nlistener for GoogleTest that implements the\n[TAP protocol](https://en.wikipedia.org/wiki/Test_Anything_Protocol) for test\nresult output. If your test runner understands TAP, you may find it useful.\n\n[gtest-parallel](https://github.com/google/gtest-parallel) is a test runner that\nruns tests from your binary in parallel to provide significant speed-up.\n\n[GoogleTest Adapter](https://marketplace.visualstudio.com/items?itemName=DavidSchuldenfrei.gtest-adapter)\nis a VS Code extension allowing to view GoogleTest in a tree view and run/debug\nyour tests.\n\n[C++ TestMate](https://github.com/matepek/vscode-catch2-test-adapter) is a VS\nCode extension allowing to view GoogleTest in a tree view and run/debug your\ntests.\n\n[Cornichon](https://pypi.org/project/cornichon/) is a small Gherkin DSL parser\nthat generates stub code for GoogleTest.\n\n## Contributing Changes\n\nPlease read\n[`CONTRIBUTING.md`](https://github.com/google/googletest/blob/main/CONTRIBUTING.md)\nfor details on how to contribute to this project.\n\nHappy testing!\n","summary":"GoogleTest is a comprehensive C++ testing framework that integrates GoogleTest and GoogleMock to provide a robust environment for unit and integration testing. It offers powerful capabilities including automatic test discovery, a rich collection of built-in and user-defined assertions, and support for complex testing scenarios like death tests and value-parameterized tests. This framework is ideal for C++ developers seeking a reliable, xUnit-based tool to ensure code quality and maintainability across professional-grade software projects.","description":"GoogleTest - Google Testing and Mocking Framework","stars":38678,"language":"C++"},{"owner":"LMCache","repo":"LMCache","url":"https://github.com/LMCache/LMCache","readme":"<div align=\"center\">\n  <p align=\"center\">\n    <img src=\"https://raw.githubusercontent.com/LMCache/LMCache/dev/asset/logo.png\" width=\"720\" alt=\"lmcache logo\">\n  </p>\n  \n  [![Docs](https://img.shields.io/badge/docs-live-brightgreen)](https://docs.lmcache.ai/)\n  [![PyPI](https://img.shields.io/pypi/v/lmcache)](https://pypi.org/project/lmcache/)\n  [![PyPI - Python Version](https://img.shields.io/pypi/pyversions/lmcache)](https://pypi.org/project/lmcache/)\n  [![Unit Tests](https://badge.buildkite.com/ce25f1819a274b7966273bfa54f0e02f092c3de0d7563c5c9d.svg)](https://buildkite.com/lmcache/lmcache-unittests)\n  [![Code Quality](https://github.com/lmcache/lmcache/actions/workflows/code_quality_checks.yml/badge.svg?branch=dev&label=tests)](https://github.com/LMCache/LMCache/actions/workflows/code_quality_checks.yml)\n  [![Integration Tests](https://badge.buildkite.com/108ddd4ab482a2480999dec8c62a640a3315ed4e6c4e86798e.svg)](https://buildkite.com/lmcache/lmcache-vllm-integration-tests)\n\n   <br />\n\n  [![OpenSSF Best Practices](https://www.bestpractices.dev/projects/10841/badge)](https://www.bestpractices.dev/projects/10841)\n  [![OpenSSF Scorecard](https://api.scorecard.dev/projects/github.com/LMCache/LMCache/badge)](https://scorecard.dev/viewer/?uri=github.com/LMCache/LMCache)\n  [![Ask DeepWiki](https://deepwiki.com/badge.svg)](https://deepwiki.com/LMCache/LMCache/)\n  [![GitHub commit activity](https://img.shields.io/github/commit-activity/w/LMCache/LMCache)](https://github.com/LMCache/LMCache/graphs/commit-activity)\n  [![PyPI - Downloads](https://img.shields.io/pypi/dm/lmcache)](https://pypi.org/project/lmcache/)\n  [![YouTube Channel Views](https://img.shields.io/youtube/channel/views/UC58zMz55n70rtf1Ak2PULJA)](https://www.youtube.com/channel/UC58zMz55n70rtf1Ak2PULJA)\n\n</div>\n\n\n--------------------------------------------------------------------------------\n\n| [**Blog**](https://blog.lmcache.ai/)\n| [**Documentation**](https://docs.lmcache.ai/)\n| [**Join Slack**](https://join.slack.com/t/lmcacheworkspace/shared_invite/zt-3g8e6xzz8-KzS_HI8bPERGFK5PTB~MYg)\n| [**Interest Form**](https://forms.gle/MHwLiYDU6kcW3dLj7)\n| [**Roadmap**](https://github.com/LMCache/LMCache/issues/1253)\n\n## Summary\n\nLMCache is an **LLM** serving engine extension to **reduce TTFT** and **increase throughput**, especially under long-context scenarios. By storing the KV caches of reusable texts all over the datacenter (including GPU, CPU, Disk and even S3) with a wide range of acceleration technqiue (zero cpu copy, NIXL, GDS and more). LMCache reuses the KV caches of **_any_** reused text (not necessarily prefix) in **_any_** serving engine instance. Thus, LMCache saves precious GPU cycles and reduces user response delay.  \n\nBy combining LMCache with vLLM, developers achieve 3-10x delay savings and GPU cycle reduction in many LLM use cases, including multi-round QA and RAG.\n\n![performance](https://github.com/user-attachments/assets/86137f17-f216-41a0-96a7-e537764f7a4c)\n\nLMCache is used, integrated, or referenced across a growing ecosystem of LLM serving platforms, infrastructure providers, and open-source projects:\n\n- Initiated and officially supported by: [Tensormesh](https://www.tensormesh.ai/)\n- Adopted by inference providers: GMI cloud ([blog post](https://www.gmicloud.ai/blog/gmi-cloud-achieves-4x-llm-performance-boost-with-tensormesh)), Google cloud ([blog post](https://cloud.google.com/blog/topics/developers-practitioners/boosting-llm-performance-with-tiered-kv-cache-on-google-kubernetes-engine)), CoreWeave ([blog post](https://www.coreweave.com/news/coreweave-unveils-ai-object-storage-redefining-how-ai-workloads-access-and-scale-data)) and more\n- Integrated with data and storage infrastructure providers: Redis ([blog post](https://redis.io/blog/get-faster-llm-inference-and-cheaper-responses-with-lmcache-and-redis/)), Weka ([blog post](https://www.weka.io/blog/ai-ml/open-sourcing-gds-integration-from-augmented-memory-grid-see-results-for-yourself/)), PliOps ([blog post](https://www.manilatimes.net/2025/03/12/tmt-newswire/globenewswire/pliops-announces-collaboration-with-vllm-production-stack-to-enhance-llm-inference-performance/2072000)) and more\n- Used by open-source projects and platforms: [vLLM](https://github.com/vllm-project/vllm) [![GitHub stars](https://img.shields.io/github/stars/vllm-project/vllm?style=social)](https://github.com/vllm-project/vllm)\n, [SGLang](https://github.com/sgl-project/sglang) [![GitHub stars](https://img.shields.io/github/stars/sgl-project/sglang?style=social)](https://github.com/sgl-project/sglang)\n, [vLLM Production Stack](https://github.com/vllm-project/production-stack) [![GitHub stars](https://img.shields.io/github/stars/vllm-project/production-stack?style=social)](https://github.com/vllm-project/production-stack), [llm-d](https://github.com/llm-d/llm-d/) [![GitHub stars](https://img.shields.io/github/stars/llm-d/llm-d?style=social)](https://github.com/llm-d/llm-d), [NVIDIA dynamo](https://github.com/ai-dynamo/dynamo) [![GitHub stars](https://img.shields.io/github/stars/ai-dynamo/dynamo)](https://github.com/ai-dynamo/dynamo), [KServe](https://github.com/kserve/kserve) [![GitHub stars](https://img.shields.io/github/stars/kserve/kserve?style=social)](https://github.com/kserve/kserve) and more.\n\nFor more details, please check our [Ray Summit talk](https://www.youtube.com/watch?v=TwLd15HE6AM) and [technical report](https://lmcache.ai/tech_report.pdf).\n\n\n## Features\n\n- [x] 🔥 Integration with vLLM v1 with the following features:\n  * High performance CPU KVCache offloading\n  * Disaggregated prefill\n  * P2P KVCache sharing\n- [x] Integration with SGLang for KV cache offloading\n- [x] Storage support as follows:\n  * CPU\n  * Disk\n  * [NIXL](https://github.com/ai-dynamo/nixl)\n- [x] Installation support through pip and latest vLLM\n\n## Installation\n\nTo use LMCache, simply install `lmcache` from your package manager, e.g. pip:\n\n```bash\npip install lmcache\n```\n\nWorks on Linux NVIDIA GPU platform.\n\nMore [detailed installation instructions](https://docs.lmcache.ai/getting_started/installation) are available in the docs, particularly if you are not using the latest stable version of vllm or using another serving engine with different dependencies. Any \"undefined symbol\" or torch mismatch versions can be resolved in the documentation. \n\n## Getting started\n\nThe best way to get started is to checkout the [Quickstart Examples](https://docs.lmcache.ai/getting_started/quickstart/) in the docs.\n\n## Documentation\n\nCheck out the LMCache [documentation](https://docs.lmcache.ai/) which is available online.\n\nWe also post regularly in [LMCache blogs](https://blog.lmcache.ai/).\n\n## Examples\n\nGo hands-on with our [examples](https://github.com/LMCache/LMCache/tree/dev/examples),\ndemonstrating how to address different use cases with LMCache.\n\n## Interested in Connecting?\n\nFill out the [interest form](https://forms.gle/mQfQDUXbKfp2St1z7), [sign up for our newsletter](https://mailchi.mp/tensormesh/lmcache-sign-up-newsletter), [join LMCache slack](https://join.slack.com/t/lmcacheworkspace/shared_invite/zt-3g8e6xzz8-KzS_HI8bPERGFK5PTB~MYg), or [drop an email](mailto:contact@lmcache.ai), and our team will reach out to you!\n\n## Community meeting\n\nThe community meeting [Zoom Link]( https://uchicago.zoom.us/j/6603596916?pwd=Z1E5MDRWUSt2am5XbEt4dTFkNGx6QT09) for LMCache is hosted bi-weekly. All are welcome to join!\n\nMeetings are held bi-weekly on: Tuesdays at 9:00 AM PT – [Add to Google Calendar](https://calendar.google.com/calendar/u/0/r?cid=Y19mNGY2ZmMwZjUxMWYyYTZmZmE1ZTVlMGI2Yzk2NmFmZjNhM2Y4ODZiZmU5OTU5MDJlMmE3ZmUyOGZmZThlOWY5QGdyb3VwLmNhbGVuZGFyLmdvb2dsZS5jb20)\n\nWe keep notes from each meeting on this [document](https://docs.google.com/document/d/1_Fl3vLtERFa3vTH00cezri78NihNBtSClK-_1tSrcow) for summaries of standups, discussion, and action items.\n\nRecordings of meetings are available on the [YouTube LMCache channel](https://www.youtube.com/channel/UC58zMz55n70rtf1Ak2PULJA).\n\n## Contributing\n\nWe welcome and value all contributions and collaborations.  Please check out [Contributing Guide](CONTRIBUTING.md) on how to contribute.\n\nWe continually update [[Onboarding] Welcoming contributors with good first issues!](https://github.com/LMCache/LMCache/issues/627)\n\n## Citation\n\nIf you use LMCache for your research, please cite our papers:\n\n```\n@inproceedings{liu2024cachegen,\n  title={Cachegen: Kv cache compression and streaming for fast large language model serving},\n  author={Liu, Yuhan and Li, Hanchen and Cheng, Yihua and Ray, Siddhant and Huang, Yuyang and Zhang, Qizheng and Du, Kuntai and Yao, Jiayi and Lu, Shan and Ananthanarayanan, Ganesh and others},\n  booktitle={Proceedings of the ACM SIGCOMM 2024 Conference},\n  pages={38--56},\n  year={2024}\n}\n\n@article{cheng2024large,\n  title={Do Large Language Models Need a Content Delivery Network?},\n  author={Cheng, Yihua and Du, Kuntai and Yao, Jiayi and Jiang, Junchen},\n  journal={arXiv preprint arXiv:2409.13761},\n  year={2024}\n}\n\n@inproceedings{10.1145/3689031.3696098,\n  author = {Yao, Jiayi and Li, Hanchen and Liu, Yuhan and Ray, Siddhant and Cheng, Yihua and Zhang, Qizheng and Du, Kuntai and Lu, Shan and Jiang, Junchen},\n  title = {CacheBlend: Fast Large Language Model Serving for RAG with Cached Knowledge Fusion},\n  year = {2025},\n  url = {https://doi.org/10.1145/3689031.3696098},\n  doi = {10.1145/3689031.3696098},\n  booktitle = {Proceedings of the Twentieth European Conference on Computer Systems},\n  pages = {94–109},\n}\n\n@article{cheng2025lmcache,\n  title={LMCache: An Efficient KV Cache Layer for Enterprise-Scale LLM Inference},\n  author={Cheng, Yihua and Liu, Yuhan and Yao, Jiayi and An, Yuwei and Chen, Xiaokun and Feng, Shaoting and Huang, Yuyang and Shen, Samuel and Du, Kuntai and Jiang, Junchen},\n  journal={arXiv preprint arXiv:2510.09665},\n  year={2025}\n}\n```\n\n## Socials\n\n[Linkedin](https://www.linkedin.com/company/lmcache-lab/?viewAsMember=true) | [Twitter](https://x.com/lmcache) | [Youtube](https://www.youtube.com/@LMCacheTeam)\n\n## License\n\nThe LMCache codebase is licensed under Apache License 2.0. See the [LICENSE](LICENSE) file for details.\n","summary":"LMCache is a high-performance extension for LLM serving engines designed to drastically reduce Time To First Token (TTFT) and improve overall throughput during long-context operations. By implementing a tiered storage architecture, the system enables the caching and reuse of Key-Value (KV) data across GPU, CPU, disk, and cloud object storage, transcending the limitations of single-instance memory. It integrates seamlessly with frameworks like vLLM to provide significant latency savings for use cases such as RAG and multi-round QA. This project is ideal for developers and infrastructure providers seeking to optimize resource utilization and lower inference costs across distributed datacenter environments.","description":"LMCache: Supercharge Your LLM with the Fastest KV Cache Layer","stars":8405,"language":"Python"},{"owner":"supermemoryai","repo":"opensearch-ai","url":"https://github.com/supermemoryai/opensearch-ai","readme":"## OpenSearch GPT\n\nA personalised AI search engine that learns about you and your interests as you browse the web.\n\nIt's like a perplexity / searchGPT clone, but for _you_.\n\n<img width=\"1313\" alt=\"image\" src=\"https://github.com/user-attachments/assets/6dd38f8e-a849-425e-a0cf-610586743b92\" />\n\n\n### Powered by\n\n- [Supermemory](https://supermemory.ai) - Automatic memory collection and retrival\n- [Vercel AI ADK](https://github.com/vercel/ai) - A framework for building AI applications\n- [Next.js](https://nextjs.org/) - The React Framework\n- [Tailwind CSS](https://tailwindcss.com/) - A utility-first CSS framework\n- [Shadcn UI](https://tailwindui.com/) - A set of completely unstyled, fully accessible UI components, designed to integrate beautifully with Tailwind CSS\n- [Cobe](https://github.com/shuding/cobe) - Globe animation\n- [GPT-4o-mini](https://openai.com)\n- [Cloudflare Pages](https://pages.cloudflare.com/) - A platform for building and deploying web applications\n\nBuilt by [Supermemory.ai](https://supermemory.ai) team.\n","summary":"OpenSearch GPT is a personalized AI search engine that functions as a private alternative to tools like Perplexity or SearchGPT by learning from your specific browsing habits and interests. Built on the Supermemory framework, the project automatically collects and retrieves your web data to provide context-aware insights powered by GPT-4o-mini. This tool is ideal for users who want a tailored search experience that evolves with their own digital history and saved information.","description":"SearchGPT / Perplexity clone, but personalised for you.","stars":1320,"language":"TypeScript"},{"owner":"opencode-ai","repo":"opencode","url":"https://github.com/opencode-ai/opencode","readme":"# Archived: Project has Moved\n\nThis repository is no longer maintained and has been archived for provenance.\n\nThe project has continued under the name [Crush][crush], developed by the original author and the Charm team.\n\nPlease follow [Crush][crush] for ongoing development.\n\n[crush]: https://github.com/charmbracelet/crush\n\n\n# ⌬ OpenCode\n\n<p align=\"center\"><img src=\"https://github.com/user-attachments/assets/9ae61ef6-70e5-4876-bc45-5bcb4e52c714\" width=\"800\"></p>\n\n> **⚠️ Early Development Notice:** This project is in early development and is not yet ready for production use. Features may change, break, or be incomplete. Use at your own risk.\n\nA powerful terminal-based AI assistant for developers, providing intelligent coding assistance directly in your terminal.\n\n## Overview\n\nOpenCode is a Go-based CLI application that brings AI assistance to your terminal. It provides a TUI (Terminal User Interface) for interacting with various AI models to help with coding tasks, debugging, and more.\n\n<p>For a quick video overview, check out\n<a href=\"https://www.youtube.com/watch?v=P8luPmEa1QI\"><img width=\"25\" src=\"https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg\"> OpenCode + Gemini 2.5 Pro: BYE Claude Code! I'm SWITCHING To the FASTEST AI Coder!</a></p>\n\n<a href=\"https://www.youtube.com/watch?v=P8luPmEa1QI\"><img width=\"550\" src=\"https://i3.ytimg.com/vi/P8luPmEa1QI/maxresdefault.jpg\"></a><p>\n\n## Features\n\n- **Interactive TUI**: Built with [Bubble Tea](https://github.com/charmbracelet/bubbletea) for a smooth terminal experience\n- **Multiple AI Providers**: Support for OpenAI, Anthropic Claude, Google Gemini, AWS Bedrock, Groq, Azure OpenAI, and OpenRouter\n- **Session Management**: Save and manage multiple conversation sessions\n- **Tool Integration**: AI can execute commands, search files, and modify code\n- **Vim-like Editor**: Integrated editor with text input capabilities\n- **Persistent Storage**: SQLite database for storing conversations and sessions\n- **LSP Integration**: Language Server Protocol support for code intelligence\n- **File Change Tracking**: Track and visualize file changes during sessions\n- **External Editor Support**: Open your preferred editor for composing messages\n- **Named Arguments for Custom Commands**: Create powerful custom commands with multiple named placeholders\n\n## Installation\n\n### Using the Install Script\n\n```bash\n# Install the latest version\ncurl -fsSL https://raw.githubusercontent.com/opencode-ai/opencode/refs/heads/main/install | bash\n\n# Install a specific version\ncurl -fsSL https://raw.githubusercontent.com/opencode-ai/opencode/refs/heads/main/install | VERSION=0.1.0 bash\n```\n\n### Using Homebrew (macOS and Linux)\n\n```bash\nbrew install opencode-ai/tap/opencode\n```\n\n### Using AUR (Arch Linux)\n\n```bash\n# Using yay\nyay -S opencode-ai-bin\n\n# Using paru\nparu -S opencode-ai-bin\n```\n\n### Using Go\n\n```bash\ngo install github.com/opencode-ai/opencode@latest\n```\n\n## Configuration\n\nOpenCode looks for configuration in the following locations:\n\n- `$HOME/.opencode.json`\n- `$XDG_CONFIG_HOME/opencode/.opencode.json`\n- `./.opencode.json` (local directory)\n\n### Auto Compact Feature\n\nOpenCode includes an auto compact feature that automatically summarizes your conversation when it approaches the model's context window limit. When enabled (default setting), this feature:\n\n- Monitors token usage during your conversation\n- Automatically triggers summarization when usage reaches 95% of the model's context window\n- Creates a new session with the summary, allowing you to continue your work without losing context\n- Helps prevent \"out of context\" errors that can occur with long conversations\n\nYou can enable or disable this feature in your configuration file:\n\n```json\n{\n  \"autoCompact\": true // default is true\n}\n```\n\n### Environment Variables\n\nYou can configure OpenCode using environment variables:\n\n| Environment Variable       | Purpose                                                                          |\n| -------------------------- | -------------------------------------------------------------------------------- |\n| `ANTHROPIC_API_KEY`        | For Claude models                                                                |\n| `OPENAI_API_KEY`           | For OpenAI models                                                                |\n| `GEMINI_API_KEY`           | For Google Gemini models                                                         |\n| `GITHUB_TOKEN`             | For Github Copilot models (see [Using Github Copilot](#using-github-copilot))    |\n| `VERTEXAI_PROJECT`         | For Google Cloud VertexAI (Gemini)                                               |\n| `VERTEXAI_LOCATION`        | For Google Cloud VertexAI (Gemini)                                               |\n| `GROQ_API_KEY`             | For Groq models                                                                  |\n| `AWS_ACCESS_KEY_ID`        | For AWS Bedrock (Claude)                                                         |\n| `AWS_SECRET_ACCESS_KEY`    | For AWS Bedrock (Claude)                                                         |\n| `AWS_REGION`               | For AWS Bedrock (Claude)                                                         |\n| `AZURE_OPENAI_ENDPOINT`    | For Azure OpenAI models                                                          |\n| `AZURE_OPENAI_API_KEY`     | For Azure OpenAI models (optional when using Entra ID)                           |\n| `AZURE_OPENAI_API_VERSION` | For Azure OpenAI models                                                          |\n| `LOCAL_ENDPOINT`           | For self-hosted models                                                           |\n| `SHELL`                    | Default shell to use (if not specified in config)                                |\n\n### Shell Configuration\n\nOpenCode allows you to configure the shell used by the bash tool. By default, it uses the shell specified in the `SHELL` environment variable, or falls back to `/bin/bash` if not set.\n\nYou can override this in your configuration file:\n\n```json\n{\n  \"shell\": {\n    \"path\": \"/bin/zsh\",\n    \"args\": [\"-l\"]\n  }\n}\n```\n\nThis is useful if you want to use a different shell than your default system shell, or if you need to pass specific arguments to the shell.\n\n### Configuration File Structure\n\n```json\n{\n  \"data\": {\n    \"directory\": \".opencode\"\n  },\n  \"providers\": {\n    \"openai\": {\n      \"apiKey\": \"your-api-key\",\n      \"disabled\": false\n    },\n    \"anthropic\": {\n      \"apiKey\": \"your-api-key\",\n      \"disabled\": false\n    },\n    \"copilot\": {\n      \"disabled\": false\n    },\n    \"groq\": {\n      \"apiKey\": \"your-api-key\",\n      \"disabled\": false\n    },\n    \"openrouter\": {\n      \"apiKey\": \"your-api-key\",\n      \"disabled\": false\n    }\n  },\n  \"agents\": {\n    \"coder\": {\n      \"model\": \"claude-3.7-sonnet\",\n      \"maxTokens\": 5000\n    },\n    \"task\": {\n      \"model\": \"claude-3.7-sonnet\",\n      \"maxTokens\": 5000\n    },\n    \"title\": {\n      \"model\": \"claude-3.7-sonnet\",\n      \"maxTokens\": 80\n    }\n  },\n  \"shell\": {\n    \"path\": \"/bin/bash\",\n    \"args\": [\"-l\"]\n  },\n  \"mcpServers\": {\n    \"example\": {\n      \"type\": \"stdio\",\n      \"command\": \"path/to/mcp-server\",\n      \"env\": [],\n      \"args\": []\n    }\n  },\n  \"lsp\": {\n    \"go\": {\n      \"disabled\": false,\n      \"command\": \"gopls\"\n    }\n  },\n  \"debug\": false,\n  \"debugLSP\": false,\n  \"autoCompact\": true\n}\n```\n\n## Supported AI Models\n\nOpenCode supports a variety of AI models from different providers:\n\n### OpenAI\n\n- GPT-4.1 family (gpt-4.1, gpt-4.1-mini, gpt-4.1-nano)\n- GPT-4.5 Preview\n- GPT-4o family (gpt-4o, gpt-4o-mini)\n- O1 family (o1, o1-pro, o1-mini)\n- O3 family (o3, o3-mini)\n- O4 Mini\n\n### Anthropic\n\n- Claude 4 Sonnet\n- Claude 4 Opus\n- Claude 3.5 Sonnet\n- Claude 3.5 Haiku\n- Claude 3.7 Sonnet\n- Claude 3 Haiku\n- Claude 3 Opus\n\n### GitHub Copilot\n\n- GPT-3.5 Turbo\n- GPT-4\n- GPT-4o\n- GPT-4o Mini\n- GPT-4.1\n- Claude 3.5 Sonnet\n- Claude 3.7 Sonnet\n- Claude 3.7 Sonnet Thinking\n- Claude Sonnet 4\n- O1\n- O3 Mini\n- O4 Mini\n- Gemini 2.0 Flash\n- Gemini 2.5 Pro\n\n### Google\n\n- Gemini 2.5\n- Gemini 2.5 Flash\n- Gemini 2.0 Flash\n- Gemini 2.0 Flash Lite\n\n### AWS Bedrock\n\n- Claude 3.7 Sonnet\n\n### Groq\n\n- Llama 4 Maverick (17b-128e-instruct)\n- Llama 4 Scout (17b-16e-instruct)\n- QWEN QWQ-32b\n- Deepseek R1 distill Llama 70b\n- Llama 3.3 70b Versatile\n\n### Azure OpenAI\n\n- GPT-4.1 family (gpt-4.1, gpt-4.1-mini, gpt-4.1-nano)\n- GPT-4.5 Preview\n- GPT-4o family (gpt-4o, gpt-4o-mini)\n- O1 family (o1, o1-mini)\n- O3 family (o3, o3-mini)\n- O4 Mini\n\n### Google Cloud VertexAI\n\n- Gemini 2.5\n- Gemini 2.5 Flash\n\n## Usage\n\n```bash\n# Start OpenCode\nopencode\n\n# Start with debug logging\nopencode -d\n\n# Start with a specific working directory\nopencode -c /path/to/project\n```\n\n## Non-interactive Prompt Mode\n\nYou can run OpenCode in non-interactive mode by passing a prompt directly as a command-line argument. This is useful for scripting, automation, or when you want a quick answer without launching the full TUI.\n\n```bash\n# Run a single prompt and print the AI's response to the terminal\nopencode -p \"Explain the use of context in Go\"\n\n# Get response in JSON format\nopencode -p \"Explain the use of context in Go\" -f json\n\n# Run without showing the spinner (useful for scripts)\nopencode -p \"Explain the use of context in Go\" -q\n```\n\nIn this mode, OpenCode will process your prompt, print the result to standard output, and then exit. All permissions are auto-approved for the session.\n\nBy default, a spinner animation is displayed while the model is processing your query. You can disable this spinner with the `-q` or `--quiet` flag, which is particularly useful when running OpenCode from scripts or automated workflows.\n\n### Output Formats\n\nOpenCode supports the following output formats in non-interactive mode:\n\n| Format | Description                     |\n| ------ | ------------------------------- |\n| `text` | Plain text output (default)     |\n| `json` | Output wrapped in a JSON object |\n\nThe output format is implemented as a strongly-typed `OutputFormat` in the codebase, ensuring type safety and validation when processing outputs.\n\n## Command-line Flags\n\n| Flag              | Short | Description                                         |\n| ----------------- | ----- | --------------------------------------------------- |\n| `--help`          | `-h`  | Display help information                            |\n| `--debug`         | `-d`  | Enable debug mode                                   |\n| `--cwd`           | `-c`  | Set current working directory                       |\n| `--prompt`        | `-p`  | Run a single prompt in non-interactive mode         |\n| `--output-format` | `-f`  | Output format for non-interactive mode (text, json) |\n| `--quiet`         | `-q`  | Hide spinner in non-interactive mode                |\n\n## Keyboard Shortcuts\n\n### Global Shortcuts\n\n| Shortcut | Action                                                  |\n| -------- | ------------------------------------------------------- |\n| `Ctrl+C` | Quit application                                        |\n| `Ctrl+?` | Toggle help dialog                                      |\n| `?`      | Toggle help dialog (when not in editing mode)           |\n| `Ctrl+L` | View logs                                               |\n| `Ctrl+A` | Switch session                                          |\n| `Ctrl+K` | Command dialog                                          |\n| `Ctrl+O` | Toggle model selection dialog                           |\n| `Esc`    | Close current overlay/dialog or return to previous mode |\n\n### Chat Page Shortcuts\n\n| Shortcut | Action                                  |\n| -------- | --------------------------------------- |\n| `Ctrl+N` | Create new session                      |\n| `Ctrl+X` | Cancel current operation/generation     |\n| `i`      | Focus editor (when not in writing mode) |\n| `Esc`    | Exit writing mode and focus messages    |\n\n### Editor Shortcuts\n\n| Shortcut            | Action                                    |\n| ------------------- | ----------------------------------------- |\n| `Ctrl+S`            | Send message (when editor is focused)     |\n| `Enter` or `Ctrl+S` | Send message (when editor is not focused) |\n| `Ctrl+E`            | Open external editor                      |\n| `Esc`               | Blur editor and focus messages            |\n\n### Session Dialog Shortcuts\n\n| Shortcut   | Action           |\n| ---------- | ---------------- |\n| `↑` or `k` | Previous session |\n| `↓` or `j` | Next session     |\n| `Enter`    | Select session   |\n| `Esc`      | Close dialog     |\n\n### Model Dialog Shortcuts\n\n| Shortcut   | Action            |\n| ---------- | ----------------- |\n| `↑` or `k` | Move up           |\n| `↓` or `j` | Move down         |\n| `←` or `h` | Previous provider |\n| `→` or `l` | Next provider     |\n| `Esc`      | Close dialog      |\n\n### Permission Dialog Shortcuts\n\n| Shortcut                | Action                       |\n| ----------------------- | ---------------------------- |\n| `←` or `left`           | Switch options left          |\n| `→` or `right` or `tab` | Switch options right         |\n| `Enter` or `space`      | Confirm selection            |\n| `a`                     | Allow permission             |\n| `A`                     | Allow permission for session |\n| `d`                     | Deny permission              |\n\n### Logs Page Shortcuts\n\n| Shortcut           | Action              |\n| ------------------ | ------------------- |\n| `Backspace` or `q` | Return to chat page |\n\n## AI Assistant Tools\n\nOpenCode's AI assistant has access to various tools to help with coding tasks:\n\n### File and Code Tools\n\n| Tool          | Description                 | Parameters                                                                               |\n| ------------- | --------------------------- | ---------------------------------------------------------------------------------------- |\n| `glob`        | Find files by pattern       | `pattern` (required), `path` (optional)                                                  |\n| `grep`        | Search file contents        | `pattern` (required), `path` (optional), `include` (optional), `literal_text` (optional) |\n| `ls`          | List directory contents     | `path` (optional), `ignore` (optional array of patterns)                                 |\n| `view`        | View file contents          | `file_path` (required), `offset` (optional), `limit` (optional)                          |\n| `write`       | Write to files              | `file_path` (required), `content` (required)                                             |\n| `edit`        | Edit files                  | Various parameters for file editing                                                      |\n| `patch`       | Apply patches to files      | `file_path` (required), `diff` (required)                                                |\n| `diagnostics` | Get diagnostics information | `file_path` (optional)                                                                   |\n\n### Other Tools\n\n| Tool          | Description                            | Parameters                                                                                |\n| ------------- | -------------------------------------- | ----------------------------------------------------------------------------------------- |\n| `bash`        | Execute shell commands                 | `command` (required), `timeout` (optional)                                                |\n| `fetch`       | Fetch data from URLs                   | `url` (required), `format` (required), `timeout` (optional)                               |\n| `sourcegraph` | Search code across public repositories | `query` (required), `count` (optional), `context_window` (optional), `timeout` (optional) |\n| `agent`       | Run sub-tasks with the AI agent        | `prompt` (required)                                                                       |\n\n## Architecture\n\nOpenCode is built with a modular architecture:\n\n- **cmd**: Command-line interface using Cobra\n- **internal/app**: Core application services\n- **internal/config**: Configuration management\n- **internal/db**: Database operations and migrations\n- **internal/llm**: LLM providers and tools integration\n- **internal/tui**: Terminal UI components and layouts\n- **internal/logging**: Logging infrastructure\n- **internal/message**: Message handling\n- **internal/session**: Session management\n- **internal/lsp**: Language Server Protocol integration\n\n## Custom Commands\n\nOpenCode supports custom commands that can be created by users to quickly send predefined prompts to the AI assistant.\n\n### Creating Custom Commands\n\nCustom commands are predefined prompts stored as Markdown files in one of three locations:\n\n1. **User Commands** (prefixed with `user:`):\n\n   ```\n   $XDG_CONFIG_HOME/opencode/commands/\n   ```\n\n   (typically `~/.config/opencode/commands/` on Linux/macOS)\n\n   or\n\n   ```\n   $HOME/.opencode/commands/\n   ```\n\n2. **Project Commands** (prefixed with `project:`):\n\n   ```\n   <PROJECT DIR>/.opencode/commands/\n   ```\n\nEach `.md` file in these directories becomes a custom command. The file name (without extension) becomes the command ID.\n\nFor example, creating a file at `~/.config/opencode/commands/prime-context.md` with content:\n\n```markdown\nRUN git ls-files\nREAD README.md\n```\n\nThis creates a command called `user:prime-context`.\n\n### Command Arguments\n\nOpenCode supports named arguments in custom commands using placeholders in the format `$NAME` (where NAME consists of uppercase letters, numbers, and underscores, and must start with a letter).\n\nFor example:\n\n```markdown\n# Fetch Context for Issue $ISSUE_NUMBER\n\nRUN gh issue view $ISSUE_NUMBER --json title,body,comments\nRUN git grep --author=\"$AUTHOR_NAME\" -n .\nRUN grep -R \"$SEARCH_PATTERN\" $DIRECTORY\n```\n\nWhen you run a command with arguments, OpenCode will prompt you to enter values for each unique placeholder. Named arguments provide several benefits:\n\n- Clear identification of what each argument represents\n- Ability to use the same argument multiple times\n- Better organization for commands with multiple inputs\n\n### Organizing Commands\n\nYou can organize commands in subdirectories:\n\n```\n~/.config/opencode/commands/git/commit.md\n```\n\nThis creates a command with ID `user:git:commit`.\n\n### Using Custom Commands\n\n1. Press `Ctrl+K` to open the command dialog\n2. Select your custom command (prefixed with either `user:` or `project:`)\n3. Press Enter to execute the command\n\nThe content of the command file will be sent as a message to the AI assistant.\n\n### Built-in Commands\n\nOpenCode includes several built-in commands:\n\n| Command            | Description                                                                                         |\n| ------------------ | --------------------------------------------------------------------------------------------------- |\n| Initialize Project | Creates or updates the OpenCode.md memory file with project-specific information                    |\n| Compact Session    | Manually triggers the summarization of the current session, creating a new session with the summary |\n\n## MCP (Model Context Protocol)\n\nOpenCode implements the Model Context Protocol (MCP) to extend its capabilities through external tools. MCP provides a standardized way for the AI assistant to interact with external services and tools.\n\n### MCP Features\n\n- **External Tool Integration**: Connect to external tools and services via a standardized protocol\n- **Tool Discovery**: Automatically discover available tools from MCP servers\n- **Multiple Connection Types**:\n  - **Stdio**: Communicate with tools via standard input/output\n  - **SSE**: Communicate with tools via Server-Sent Events\n- **Security**: Permission system for controlling access to MCP tools\n\n### Configuring MCP Servers\n\nMCP servers are defined in the configuration file under the `mcpServers` section:\n\n```json\n{\n  \"mcpServers\": {\n    \"example\": {\n      \"type\": \"stdio\",\n      \"command\": \"path/to/mcp-server\",\n      \"env\": [],\n      \"args\": []\n    },\n    \"web-example\": {\n      \"type\": \"sse\",\n      \"url\": \"https://example.com/mcp\",\n      \"headers\": {\n        \"Authorization\": \"Bearer token\"\n      }\n    }\n  }\n}\n```\n\n### MCP Tool Usage\n\nOnce configured, MCP tools are automatically available to the AI assistant alongside built-in tools. They follow the same permission model as other tools, requiring user approval before execution.\n\n## LSP (Language Server Protocol)\n\nOpenCode integrates with Language Server Protocol to provide code intelligence features across multiple programming languages.\n\n### LSP Features\n\n- **Multi-language Support**: Connect to language servers for different programming languages\n- **Diagnostics**: Receive error checking and linting information\n- **File Watching**: Automatically notify language servers of file changes\n\n### Configuring LSP\n\nLanguage servers are configured in the configuration file under the `lsp` section:\n\n```json\n{\n  \"lsp\": {\n    \"go\": {\n      \"disabled\": false,\n      \"command\": \"gopls\"\n    },\n    \"typescript\": {\n      \"disabled\": false,\n      \"command\": \"typescript-language-server\",\n      \"args\": [\"--stdio\"]\n    }\n  }\n}\n```\n\n### LSP Integration with AI\n\nThe AI assistant can access LSP features through the `diagnostics` tool, allowing it to:\n\n- Check for errors in your code\n- Suggest fixes based on diagnostics\n\nWhile the LSP client implementation supports the full LSP protocol (including completions, hover, definition, etc.), currently only diagnostics are exposed to the AI assistant.\n\n## Using Github Copilot\n\n_Copilot support is currently experimental._\n\n### Requirements\n- [Copilot chat in the IDE](https://github.com/settings/copilot) enabled in GitHub settings\n- One of:\n  - VSCode Github Copilot chat extension\n  - Github `gh` CLI\n  - Neovim Github Copilot plugin (`copilot.vim` or `copilot.lua`)\n  - Github token with copilot permissions\n\nIf using one of the above plugins or cli tools, make sure you use the authenticate\nthe tool with your github account. This should create a github token at one of the following locations:\n- ~/.config/github-copilot/[hosts,apps].json\n- $XDG_CONFIG_HOME/github-copilot/[hosts,apps].json\n\nIf using an explicit github token, you may either set the $GITHUB_TOKEN environment variable or add it to the opencode.json config file at `providers.copilot.apiKey`.\n\n## Using a self-hosted model provider\n\nOpenCode can also load and use models from a self-hosted (OpenAI-like) provider.\nThis is useful for developers who want to experiment with custom models.\n\n### Configuring a self-hosted provider\n\nYou can use a self-hosted model by setting the `LOCAL_ENDPOINT` environment variable.\nThis will cause OpenCode to load and use the models from the specified endpoint.\n\n```bash\nLOCAL_ENDPOINT=http://localhost:1235/v1\n```\n\n### Configuring a self-hosted model\n\nYou can also configure a self-hosted model in the configuration file under the `agents` section:\n\n```json\n{\n  \"agents\": {\n    \"coder\": {\n      \"model\": \"local.granite-3.3-2b-instruct@q8_0\",\n      \"reasoningEffort\": \"high\"\n    }\n  }\n}\n```\n\n## Development\n\n### Prerequisites\n\n- Go 1.24.0 or higher\n\n### Building from Source\n\n```bash\n# Clone the repository\ngit clone https://github.com/opencode-ai/opencode.git\ncd opencode\n\n# Build\ngo build -o opencode\n\n# Run\n./opencode\n```\n\n## Acknowledgments\n\nOpenCode gratefully acknowledges the contributions and support from these key individuals:\n\n- [@isaacphi](https://github.com/isaacphi) - For the [mcp-language-server](https://github.com/isaacphi/mcp-language-server) project which provided the foundation for our LSP client implementation\n- [@adamdottv](https://github.com/adamdottv) - For the design direction and UI/UX architecture\n\nSpecial thanks to the broader open source community whose tools and libraries have made this project possible.\n\n## License\n\nOpenCode is licensed under the MIT License. See the [LICENSE](LICENSE) file for details.\n\n## Contributing\n\nContributions are welcome! Here's how you can contribute:\n\n1. Fork the repository\n2. Create a feature branch (`git checkout -b feature/amazing-feature`)\n3. Commit your changes (`git commit -m 'Add some amazing feature'`)\n4. Push to the branch (`git push origin feature/amazing-feature`)\n5. Open a Pull Request\n\nPlease make sure to update tests as appropriate and follow the existing code style.\n","summary":"OpenCode is a Go-based terminal user interface designed to provide developers with intelligent, AI-driven coding assistance directly within their command-line environment. The tool supports a wide array of AI providers and offers sophisticated features including automated session management, integrated file-system tool execution, and LSP-backed code intelligence. Developers who prefer a terminal-centric workflow will benefit from its ability to handle complex coding tasks and debugging through a streamlined, keyboard-driven interface. Please note that this project has been archived and its development has transitioned to a new project titled Crush.","description":"A powerful AI coding agent. Built for the terminal.","stars":12809,"language":"Go"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
