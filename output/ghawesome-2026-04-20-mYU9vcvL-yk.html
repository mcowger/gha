\n- **Navigation graph** — Internal routes, external links, form descriptors with fields\n- **Interactive-only mode** — Strip static content, show only actionable elements\n- **Action annotations** — Every interactive element tagged with `navigate`, `click`, `fill`, `toggle`, or `select`\n- **Network debugger** — DevTools-style request table with subresource discovery and parallel fetching\n- **Session persistence** — Cookies, headers, localStorage across requests\n- **CDP server** — Chrome DevTools Protocol WebSocket endpoint for automation (14 domains)\n- **Knowledge Graph** — Site-level state map: BFS crawl produces a graph of view-states (semantic + network fingerprints) and verified transitions (link clicks, hash nav, pagination)\n- **PDF extraction** — Navigate to PDF URLs and get a semantic tree back: per-page text extraction with heading detection, no external dependencies\n- **JavaScript execution** — Optional V8 via deno_core with DOM ops (enabled by default, see known issues)\n- **Persistent REPL** — Interactive session with persistent state across commands\n- **Tab management** — Multiple tabs with independent history and state\n- **Fast** — HTTP GET + HTML parse, typically under 200ms\n- **Zero dependencies on Chrome** — Pure Rust, no browser binary needed\n\n## Install\n\nFrom source (requires Rust nightly):\n\n```bash\n# Install nightly toolchain\nrustup install nightly\n\n# Clone and build\ngit clone https://github.com/user/open-browser.git\ncd open-browser\ncargo +nightly install --path crates/open-cli --features js \n```\n\n### Docker\n\n```bash\ndocker build -t open-browser .\ndocker run --rm open-browser navigate https://example.com\n```\n\n## Usage\n\n### Navigate to a URL\n\n```bash\n# Default: Markdown tree\nopen-browser navigate https://example.com\n\n# Raw tree format\nopen-browser navigate https://example.com --format tree\n\n# JSON with navigation graph\nopen-browser navigate https://example.com --format json --with-nav\n\n# Only interactive elements\nopen-browser navigate https://example.com --interactive-only\n\n# Custom headers\nopen-browser navigate https://api.example.com --header \"Authorization: Bearer token\"\n\n# Enable JavaScript execution (improved — problematic scripts are now filtered)\nopen-browser navigate https://example.com --js\n\n# JS with custom wait time (ms) for async rendering\nopen-browser navigate https://example.com --js --wait-ms 5000\n\n# Verbose logging\nopen-browser navigate https://example.com -v\n\n# Capture and display network request table\nopen-browser navigate https://example.com --network-log\n\n# Network log with JSON output\nopen-browser navigate https://example.com --format json --network-log\n```\n\n### PDF viewing\n\nNavigate to a PDF URL the same way you'd navigate to an HTML page. The browser detects `application/pdf` responses, extracts text per-page, and builds a semantic tree with heading detection.\n\n```bash\nopen-browser navigate https://example.com/report.pdf\n```\n\n```\n00:00  open-browser navigate https://example.com/report.pdf\n00:01  connected — parsing semantic state…\n       document  \"Annual Report 2026\"  [role: document]\n       ├── heading (h1)  \"Annual Report 2026\"\n       ├── text  \"This report summarizes our financial performance...\"\n       ├── heading (h2)  \"Revenue\"\n       ├── text  \"Revenue increased by 15% year-over-year...\"\n       ├── heading (h2)  \"Expenses\"\n       └── text  \"Operating expenses decreased due to efficiency gains...\"\n00:01  semantic tree ready — 0 landmarks, 0 links, 3 headings, 0 actions\n```\n\nWorks with all output formats and subcommands:\n\n```bash\n# JSON output\nopen-browser navigate https://example.com/report.pdf --format json\n\n# Tree format\nopen-browser navigate https://example.com/report.pdf --format tree\n```\n\n**How it works:**\n\n1. **Content-type detection** — Responses with `application/pdf` are routed to PDF extraction instead of HTML parsing\n2. **Text extraction** — Uses `pdf-extract` (lopdf) to extract text per page\n3. **Heading detection** — Heuristics classify blocks as headings: first block on page (h1/title), ALL CAPS text, short text without sentence-ending punctuation (h2)\n4. **Semantic tree** — Each page becomes a `region` node (named \"Page N\" for multi-page PDFs), text blocks become `text` nodes, headings become `heading` nodes\n5. **Zero config** — No flags needed, works automatically on PDF URLs\n\n### Output formats\n\n**Markdown (default)** — clean semantic tree with role annotations and element IDs:\n\n```\ndocument  [role: document]\n├── banner  [role: banner]\n│   ├── [#1] link \"Home\"  → /\n│   ├── [#2] link \"Products\"  → /products\n│   └── [#3] button \"Sign In\"\n├── main  [role: main]\n│   ├── heading (h1) \"Welcome to Example\"\n│   ├── region \"Hero\"\n│   │   ├── text \"The fastest way to build\"\n│   │   └── [#4] link \"Get Started\"  → /signup\n│   └── form \"Search\"  [role: form]\n│       ├── [#5] textbox \"Search...\"  [action: fill]\n│       └── [#6] button \"Go\"  [action: click]\n└── contentinfo  [role: contentinfo]\n    ├── [#7] link \"Privacy\"  → /privacy\n    └── [#8] link \"Terms\"  → /terms\n```\n\nEach interactive element has a unique ID in brackets (`[#1]`, `[#2]`, etc.) that can be used with `click-id` and `type-id` commands.\n\n**JSON** — structured data with full navigation graph:\n\n```bash\nopen-browser navigate https://example.com --format json --with-nav\n```\n\nReturns:\n\n```json\n{\n  \"url\": \"https://example.com/\",\n  \"title\": \"Example Domain\",\n  \"semantic_tree\": {\n    \"root\": { \"role\": \"document\", \"children\": [...] },\n    \"stats\": { \"landmarks\": 4, \"links\": 12, \"headings\": 3, \"actions\": 2 }\n  },\n  \"navigation_graph\": {\n    \"internal_links\": [\n      { \"url\": \"/products\", \"label\": \"Products\" },\n      { \"url\": \"/signup\", \"label\": \"Get Started\" }\n    ],\n    \"external_links\": [\"https://github.com/...\"],\n    \"forms\": [\n      {\n        \"action\": \"/search\",\n        \"method\": \"GET\",\n        \"fields\": [\n          { \"name\": \"q\", \"field_type\": \"text\", \"action\": \"fill\" },\n          { \"name\": \"go\", \"field_type\": \"submit\", \"action\": \"click\" }\n        ]\n      }\n    ]\n  },\n  \"network_log\": {\n    \"total_requests\": 4,\n    \"total_bytes\": 6432,\n    \"total_time_ms\": 312,\n    \"failed\": 0,\n    \"requests\": [\n      {\n        \"id\": 1, \"method\": \"GET\", \"type\": \"document\",\n        \"initiator\": \"navigation\", \"description\": \"document · navigation\",\n        \"url\": \"https://example.com/\", \"status\": 200,\n        \"content_type\": \"text/html\", \"body_size\": 4304, \"timing_ms\": 142\n      }\n    ]\n  }\n}\n```\n\n### Network debugger\n\nCapture and display all network requests in a DevTools-style table:\n\n```bash\nopen-browser navigate https://example.com --network-log\n```\n\n```\n00:00  open-browser navigate https://example.com\n00:00  connected — parsing semantic state…\n       # Network — 4 requests — 4.6 KB — 312ms total\n\n         Method  Type        Resource                URL                                         Status  Size     Time\n         —       ——————       —————————                 —————————————————                               ——————   ————————   ——————\n         1       GET         document                 document · navigation                        200     4.2 KB   142ms\n         2       GET         stylesheet               stylesheet · css2                            200     128 B    45ms\n         3       GET         stylesheet               stylesheet · styles.css                      200     2.1 KB   89ms\n         4       GET         script                   script · script.js                           200     0 B      23ms\n00:00  semantic tree ready — 0 landmarks, 1 links, 1 headings, 1 actions\n00:00  agent-ready: structured state exposed · no pixel buffer · 0 screenshots\n```\n\nThe network debugger:\n- Records the main page request (status, timing, size, headers)\n- Discovers all subresources from HTML (`<link>`, `<script>`, `<img>`, `<video>`, `<audio>`, `<iframe>`, `<embed>`, `<object>`, inline CSS `url()`)\n- Fetches all discovered subresources in parallel (concurrency limit of 6)\n- Includes `network_log` in JSON output when using `--format json --network-log`\n\n### CDP server\n\nStart a Chrome DevTools Protocol WebSocket server for automation:\n\n```bash\n# Start on default host/port\nopen-browser serve\n\n# Custom host and port\nopen-browser serve --host 0.0.0.0 --port 9222\n\n# With inactivity timeout\nopen-browser serve --timeout 60\n```\n\nImplemented CDP domains: Browser, Target, Page, Runtime, DOM, Network, Emulation, Input, CSS, Log, Console, Security, Performance, Open (custom extensions)\n\n### Knowledge Graph (site mapping)\n\nMap a site's functional structure into a deterministic state graph. Nodes are view-states (semantic tree hash + resource fingerprint), edges are verified transitions.\n\n```bash\n# Map a site (default: depth 3, max 50 pages)\nopen-browser map https://example.com --output kg.json\n\n# Shallow crawl\nopen-browser map https://example.com --depth 1 --output kg.json\n\n# Deep crawl with higher page limit\nopen-browser map https://example.com --depth 5 --max-pages 200 --output kg.json\n\n# Skip pagination discovery (only follow links)\nopen-browser map https://example.com --output kg.json --no-pagination\n\n# Verbose logging\nopen-browser map https://example.com -v --output kg.json\n```\n\n**Output** — JSON with all view-states, transitions, and stats:\n\n```json\n{\n  \"root_url\": \"https://example.com\",\n  \"built_at\": \"2026-04-02T14:30:00Z\",\n  \"stats\": {\n    \"total_states\": 12,\n    \"total_transitions\": 23,\n    \"verified_transitions\": 21,\n    \"max_depth_reached\": 3,\n    \"pages_crawled\": 12,\n    \"crawl_duration_ms\": 5420\n  },\n  \"states\": {\n    \"a1b2c3...\": {\n      \"url\": \"https://example.com/\",\n      \"title\": \"Example Corp\",\n      \"fingerprint\": {\n        \"url_path\": \"/\",\n        \"tree_hash\": \"def456...\",\n        \"resource_set_hash\": \"789abc...\"\n      },\n      \"semantic_tree\": { ... },\n      \"resource_urls\": [\"https://example.com/styles.css\", ...]\n    }\n  },\n  \"transitions\": [\n    {\n      \"from\": \"a1b2c3...\",\n      \"to\": \"d4e5f6...\",\n      \"trigger\": { \"type\": \"link_click\", \"url\": \"/about\", \"label\": \"About Us\" },\n      \"verified\": true,\n      \"outcome\": { \"status\": 200, \"final_url\": \"https://example.com/about\", \"matched_prediction\": true }\n    },\n    {\n      \"from\": \"a1b2c3...\",\n      \"to\": \"a1b2c3...\",\n      \"trigger\": { \"type\": \"hash_navigation\", \"fragment\": \"features\", \"label\": \"Features\" },\n      \"verified\": true\n    }\n  ]\n}\n```\n\n**How it works:**\n\n1. **BFS crawl** — Starting from the root URL, visits pages breadth-first up to `--depth` and `--max-pages`\n2. **State fingerprinting** — Each page gets a composite ID: blake3 hash of semantic tree structure (roles + interactivity, not text) + resource URLs + URL path\n3. **Deduplication** — Pages with identical fingerprints are merged (same layout, different copy = same state)\n4. **Transition discovery** — For each page, discovers: link clicks, hash navigation (`#section`), pagination (`?page=N`, `/page/N`), and optional form submissions\n5. **Verification** — Each transition is followed and the target state is confirmed\n\n**Transition types:**\n\n| Type | Trigger | Example |\n|------|---------|---------|\n| `link_click` | Click internal link | `<a href=\"/about\">About</a>` |\n| `hash_navigation` | Hash/anchor link | `<a href=\"#features\">Features</a>` |\n| `pagination` | URL-based pagination | `?page=2`, `/page/2`, `?offset=20` |\n| `form_submit` | Form submission | `<form action=\"/search\">` |\n\n### Clean cache\n\n```bash\n# Wipe everything\nopen-browser clean\n\n# Only cookies\nopen-browser clean --cookies-only\n\n# Only cache\nopen-browser clean --cache-only\n\n# Custom cache directory\nopen-browser clean --cache-dir /path/to/cache\n```\n\n### Tab management\n\n```bash\n# Open a new tab (fetches page and shows summary)\nopen-browser tab open https://example.com\n\n# Open with JS execution\nopen-browser tab open https://example.com --js\n\n# List all open tabs\nopen-browser tab list\n\n# Show active tab info\nopen-browser tab info\n\n# Navigate the active tab\nopen-browser tab navigate https://example.com/page2\n```\n\n**Note:** Tab state does not persist across CLI invocations. For persistent tab sessions, use the REPL or the CDP server.\n\n### Interactive REPL\n\nStart a persistent interactive session where browser state (tabs, pages, cookies, history) is preserved across commands:\n\n```bash\n# Start REPL with defaults\nopen-browser repl\n\n# Enable JS execution by default\nopen-browser repl --js\n\n# Set default output format and JS wait time\nopen-browser repl --format json --wait-ms 5000\n```\n\nOnce inside the REPL, the prompt shows the current URL context:\n\n```\nopen> visit https://example.com\n  document  [role: document]\n  └── region  [role: region]\n      ├── heading (h1)  \"Example Domain\"\n      └── link  \"Learn more\"  → https://iana.org/domains/example\n  0 landmarks, 1 links, 1 headings, 1 actions\n\nopen [https://example.com]> tab open https://httpbin.org\nOpened tab 2: httpbin.org\n\nopen [https://httpbin.org]> tab list\nTabs (2 total):\n  * [2] Ready — httpbin.org — https://httpbin.org\n    [1] Ready — Example Domain — https://example.com\n\nopen [https://httpbin.org]> tab switch 1\nSwitched to tab 1: https://example.com\n\nopen [https://example.com]> click 'a'\nNavigated to: https://iana.org/domains/example\n\nopen [https://iana.org/domains/example]> back\nopen [https://example.com]> exit\nBye.\n```\n\n**REPL commands:**\n\n| Command | Description |\n|---------|-------------|\n| `visit <url>` / `open <url>` | Navigate to URL |\n| `click <selector>` | Click an element using CSS selector |\n| `click #<id>` | Click an element by its ID (e.g., `click #1`) |\n| `type <selector> <value>` | Type into a field using CSS selector |\n| `type #<id> <value>` | Type into a field by its ID (e.g., `type #3 hello`) |\n| `submit <selector> [name=value...]` | Submit a form |\n| `scroll [down\\|up\\|to-top\\|to-bottom]` | Scroll the page |\n| `wait <selector> [timeout_ms]` | Wait for element |\n| `back` / `forward` | Navigate history |\n| `reload` | Reload current page |\n| `tab list` / `tab open <url>` / `tab switch <id>` / `tab close [id>` / `tab info` | Tab management |\n| `js [on\\|off]` | Toggle JS execution |\n| `format md\\|tree\\|json` | Change output format |\n| `wait-ms <ms>` | Set JS wait time |\n| `help` | Show available commands |\n| `exit` / `quit` | Exit REPL |\n\n### Programmatic usage\n\nThe `Browser` type unifies navigation, interaction, and tab management into a single API:\n\n```rust\nuse open_core::Browser;\n\nlet mut browser = Browser::new(BrowserConfig::default());\n\n// Navigate (creates a tab automatically)\nlet tab = browser.navigate(\"https://example.com\").await?;\n\n// Interact using CSS selectors — click updates the tab automatically if navigation occurs\nlet result = browser.click(\"a\").await?;\n\n// Interact using element IDs — easier for AI agents\nlet result = browser.click_by_id(1).await?;  // Click element with ID [#1]\nlet result = browser.type_by_id(3, \"search query\").await?;  // Type into element [#3]\n\n// Chain interactions\nbrowser.type_text(\"input[name='q']\", \"search query\")?;\nbrowser.submit(\"form\", &state).await?;\n\n// Tab management\nlet id = browser.create_tab(\"https://example.com/page2\");\nbrowser.switch_to(id).await?;\nbrowser.go_back().await?;\n\n// Access current state\nlet page = browser.current_page().unwrap();\nlet tree = page.semantic_tree();\n\n// Find element by ID\nif let Some(element) = page.find_by_element_id(1) {\n    println!(\"Element selector: {}\", element.selector);\n}\n```\n\n### Page interaction\n\nInteract with pages using the `interact` subcommand. Works at the HTTP level — clicks follow links and submit forms, no rendering engine required.\n\n```bash\n# Click a link — follows href, returns new page\nopen-browser interact https://example.com click 'a'\n\n# Click by element ID — easier for AI agents\nopen-browser interact https://example.com click-id 1\n\n# Click a submit button — finds enclosing form, submits it\nopen-browser interact https://example.com click 'button[type=\"submit\"]'\n\n# Type into a field (returns the field state)\nopen-browser interact https://example.com type 'input[name=\"q\"]' 'search query'\n\n# Type by element ID — easier for AI agents\nopen-browser interact https://example.com type-id 3 'search query'\n\n# Submit a form with field values\nopen-browser interact https://example.com submit 'form' --field 'q=rust+language'\n\n# Wait for a CSS selector to appear (with timeout)\nopen-browser interact https://example.com wait '.result-list' --timeout-ms 5000\n\n# Scroll — detects URL pagination (?page=, ?offset=, /page/N)\nopen-browser interact 'https://example.com/news?page=1' scroll --direction down\n\n# JSON output for the result page\nopen-browser interact https://example.com click 'a' --format json\n\n# Enable JS execution before interaction\nopen-browser interact https://example.com wait '.dynamic-content' --js --wait-ms 3000\n```\n\n**How interactions work:**\n\n| Action | Mechanism |\n|--------|-----------|\n| `click` (link) | Resolves href, HTTP GET, returns new page |\n| `click` (button) | Finds enclosing `<form>`, collects all fields (including hidden CSRF tokens), submits via HTTP |\n| `type` | Returns field selector + value (accumulate in `FormState` before submit) |\n| `submit` | Collects all form fields from HTML, merges with `--field` values, HTTP POST/GET |\n| `wait` | Checks current HTML for selector match; polls by re-fetching if not found |\n| `scroll` | Detects pagination patterns in URL (`?page=`, `?offset=`, `?start=`, `/page/N`) |\n\n## Architecture\n\n```\nopen-browser\n├── crates/open-core    Core library — Browser type, HTML parsing, semantic tree, navigation graph, interaction, tabs\n├── crates/open-debug   Network debugger — request recording, subresource discovery, table output\n├── crates/open-cdp     CDP WebSocket server — Chrome DevTools Protocol for automation (14 domains)\n├── crates/open-kg      Knowledge Graph — BFS site crawler, state fingerprinting, transition discovery\n└── crates/open-cli     CLI binary\n```\n\n**open-core** — The engine. The `Browser` type is the main entry point — it owns the HTTP client, tab state, and provides navigation + interaction as a single cohesive API. Internally, it fetches pages via `reqwest`, parses HTML with `scraper`, and builds semantic trees mapping ARIA roles and interactive states. PDF URLs are detected by content-type and extracted into semantic trees via `pdf-extract`. Provides page interaction (click, type, submit, wait, scroll) with automatic tab updates on navigation. Includes tab management, history navigation, session persistence (cookies, headers, localStorage), and optional JavaScript execution via deno_core (enabled by default). Outputs Markdown, tree, or JSON.\n\n**open-debug** — Network debugging. Records all HTTP requests to a shared `NetworkLog`, discovers subresources from parsed HTML (stylesheets, scripts, images, fonts, media), fetches them in parallel, and formats DevTools-style request tables.\n\n**open-cdp** — Chrome DevTools Protocol server. Exposes a WebSocket endpoint for browser automation with 14 domain handlers (Browser, Target, Page, Runtime, DOM, Network, Emulation, Input, CSS, Log, Console, Security, Performance, Open). Includes event bus, target management, message routing, and session lifecycle.\n\n**open-kg** — Knowledge Graph. BFS site crawler that builds a deterministic state map: nodes are view-states identified by composite fingerprints (semantic tree structure hash + resource URL set hash + normalized URL), edges are verified transitions (link clicks, hash navigation, pagination). Produces a JSON graph suitable for AI agent consumption — an agent can query the graph to understand what states exist and how to reach them without trial-and-error navigation.\n\n**open-cli** — The `open-browser` command-line tool. Provides `navigate`, `interact`, `map`, `tab`, `serve`, `repl`, and `clean` subcommands. All commands use the unified `Browser` type.\n\n## Semantic roles detected\n\n| Element | Role | Action |\n|---------|------|--------|\n| `<html>` / `<body>` | `document` | — |\n| `<header>` | `banner` | — |\n| `<nav>` | `navigation` | — |\n| `<main>` | `main` | — |\n| `<aside>` | `complementary` | — |\n| `<footer>` | `contentinfo` | — |\n| `<section>` / `[role=region]` | `region` | — |\n| `<form>` | `form` | — |\n| `<form role=search>` | `search` | — |\n| `<article>` | `article` | — |\n| `<h1>`–`<h6>` | `heading (hN)` | — |\n| `<a href>` | `link` | `navigate` |\n| `<button>` | `button` | `click` |\n| `<input type=text/email/...>` | `textbox` | `fill` |\n| `<input type=submit>` | `button` | `click` |\n| `<input type=checkbox>` | `checkbox` | `toggle` |\n| `<input type=radio>` | `radio` | `toggle` |\n| `<select>` | `combobox` | `select` |\n| `<textarea>` | `textbox` | `fill` |\n| `<img>` | `img` | — |\n| `<ul>` / `<ol>` | `list` | — |\n| `<li>` | `listitem` | — |\n| `<table>` | `table` | — |\n| `<tr>` | `row` | — |\n| `<td>` | `cell` | — |\n| `<th>` | `columnheader` / `rowheader` | — |\n| `<dialog>` | `dialog` | — |\n| `[role=...]` | custom | varies |\n| `[tabindex]` | varies | varies |\n\n## Roadmap\n\nSee [ROADMAP.md](ROADMAP.md) for the full project roadmap, including:\n\n- ✅ **Completed features** — Semantic tree, CDP server, JS execution, REPL, tab management, Knowledge Graph, PDF extraction\n- 🔧 **In progress** — CDP ↔ Browser API integration, JS-level interactions\n- 📋 **Near-term** — Proxy support, screenshots, KG-driven agent loop\n- 🚀 **Future** — AI agent features, performance, WebSocket/SSE, bindings for Python/Node.js\n\n## Known Issues\n\n| Issue | Status | Workaround |\n|-------|--------|------------|\n| ~~JS execution hangs on complex sites~~ | **Fixed** | ~~Don't use `--js` flag~~ |\n| External scripts not executed | By design | Only inline scripts supported |\n| setTimeout/setInterval no-ops | By design | Prevents infinite loops |\n\n## Requirements\n\n- **Rust nightly** required (deno_core uses `const_type_id` feature)\n- Install: `rustup install nightly`\n\n## License\n\nMIT License\n","summary":"Openbrowser is a lightweight, Rust‑based headless browser engineered for AI agents; it fetches URLs, parses the HTML, and delivers a semantic tree of ARIA roles, landmarks, headings, links, and actions without rendering pixels or screenshots. Key capabilities include element IDs for unambiguous interaction, multi‑format outputs (Markdown, tree, JSON), interactive navigation commands, session persistence, a DevTools‑like network debugger, and an optional JavaScript engine for dynamic content. The tool is ideal for developers of AI‑assistant frameworks, web‑scraping pipelines, and automated testing suites that require fast, structured insights into page content and behaviour rather than visual rendering.","description":"A browser designed for agent","stars":97,"language":"Rust"},{"owner":"tihiera","repo":"raincast","url":"https://github.com/tihiera/raincast","readme":"<p align=\"center\">\n  <img src=\"src-tauri/icons/128x128@2x.png\" width=\"128\" alt=\"Raincast\" />\n</p>\n\n<h1 align=\"center\">Raincast</h1>\n\n<p align=\"center\">\n  Describe an app. Get a native desktop app.<br/>\n  AI-powered app generator that builds real, shippable Tauri applications from natural language.\n</p>\n\n<p align=\"center\">\n  <img src=\"https://img.shields.io/badge/node-%3E%3D18-339933?logo=node.js&logoColor=white\" alt=\"Node\" />\n  <img src=\"https://img.shields.io/badge/rust-stable-DEA584?logo=rust&logoColor=white\" alt=\"Rust\" />\n  <img src=\"https://img.shields.io/badge/tauri-v2-24C8D8?logo=tauri&logoColor=white\" alt=\"Tauri\" />\n  <img src=\"https://img.shields.io/badge/react-19-61DAFB?logo=react&logoColor=black\" alt=\"React\" />\n</p>\n\n<p align=\"center\">\n  <a href=\"#installation\">Install</a> &middot;\n  <a href=\"#how-it-works\">How It Works</a> &middot;\n  <a href=\"#examples\">Examples</a>\n</p>\n\n<p align=\"center\">\n  <img src=\"assets/main.png\" alt=\"Raincast\" />\n</p>\n\n---\n\n## What is Raincast?\n\nRaincast is a desktop application that generates other desktop applications. You describe what you want in plain English, and Raincast builds a fully functional native app:with a real UI, backend commands, file system access, and system integration. Not a mockup. Not a prototype. A compiled, shippable application.\n\nIt generates React + Tauri apps with:\n- **9 layout templates**:dashboard, editor, chat, file manager, media player, data table, playground, utility, and generic\n- **Rust backend**:AI writes Tauri commands for file I/O, shell execution, system monitoring, network calls\n- **Native window chrome**:transparent backgrounds, macOS vibrancy, overlay title bars, custom window sizes\n- **Live preview**:see your app running as it's being built, with hot reload\n- **One-click ship**:compile to a standalone binary you can distribute\n\n## How It Works\n\nYou describe what you want, and Raincast generates the full app: React frontend, Rust backend commands, and Tauri config.\n\nThe interesting part is how the **live preview** works. Generated apps call Rust backend commands via Tauri's `invoke()` bridge, but in dev mode the full Tauri binary isn't compiled yet. So Raincast builds a **proxy binary**: it parses the generated Rust source using AST extraction to find every `#[tauri::command]` function, then generates a standalone CLI binary that reads JSON from stdin, dispatches to the same functions, and writes JSON to stdout. The frontend's `invoke()` calls get routed through this proxy instead of the real Tauri runtime. This means the preview behaves like the real app: file system access, shell commands, system info all work during development, not just after shipping.\n\nWhen you hit **Ship**, Raincast compiles the actual Tauri binary with all the real commands baked in. The proxy is only for dev.\n\n### AI Providers\n\nRaincast supports multiple AI backends:\n\n| Provider | Models | Best For |\n|----------|--------|----------|\n| **Anthropic Claude** | Sonnet 4.6 (pro), Haiku 4.5 (fast) | Complex apps, accurate code |\n| **Google Gemini** | 3.1 Pro, 3 Flash | Fast iteration, multimodal |\n\nBring your own API key. Set it in the app settings.\n\nWant to add **OpenAI Codex**, **xAI Grok**, **DeepSeek**, **Mistral**, or another provider? PRs are welcome:or [open an issue](https://github.com/tihiera/raincast/issues) and we'll prioritize it.\n\n## Installation\n\n### macOS\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/tihiera/raincast/main/scripts/install-macos.sh | bash\n```\n\nThis checks for Rust and Node.js, installs them if missing, builds from source, and places the app in `/Applications`.\n\n**Or build manually:**\n\n```bash\ngit clone https://github.com/tihiera/raincast.git\ncd raincast\nnpm install\nnpm run tauri dev     # development\nnpm run tauri build   # production binary\n```\n\n### Windows\n\nDownload `Raincast_x.x.x_x64-setup.exe` from [Releases](https://github.com/tihiera/raincast/releases) and run it.\n\n### Linux (Debian/Ubuntu)\n\n```bash\n# Download the .deb from Releases, then:\nsudo dpkg -i raincast_x.x.x_amd64.deb\nsudo apt-get install -f\n```\n\nOr download the `.AppImage` from [Releases](https://github.com/tihiera/raincast/releases), make it executable, and run.\n\n### Prerequisites (manual build only)\n\n- [Node.js](https://nodejs.org) 18+\n- [Rust](https://rustup.rs)\n- Xcode Command Line Tools (macOS): `xcode-select --install`\n- Linux: `sudo apt install libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev`\n\n## Examples\n\n<details>\n<summary><strong>Utility Apps</strong></summary>\n\nCompact, single-purpose tools with frosted glass windows.\n\n**\"Build a VPN status utility that shows my current public IP, connection location on a minimal world map, and a one-click toggle to connect/disconnect. Show latency, upload/download speed, and connection uptime.\"**\n\n![VPN Utility](assets/vpn.png)\n\n</details>\n\n<details>\n<summary><strong>Full Applications</strong></summary>\n\n**\"Build a local AI chat app that connects to a [llama.cpp](https://github.com/ggml-org/llama.cpp) server running on my machine. Chat interface with streamed responses, a model picker, and a collapsible dev console showing connection status and server logs.\"**\n\n![Local AI Chat](assets/chat.png)\n\n</details>\n\n<details>\n<summary><strong>Games</strong></summary>\n\n**\"Build a side-scrolling platformer inspired by Super Mario. Pixel-art style sprites with vibrant colors, parallax scrolling backgrounds with gradient skies, a HUD with score, coins, and lives, particle effects on coin collection, and screen shake on damage.\"**\n\n![Super Mario](assets/mario-vid.gif)\n\n</details>\n\n<details>\n<summary><strong>Automation</strong></summary>\n\n**\"Build a compact file organizer that watches Desktop and Downloads, auto-sorts files by filename patterns into categorized folders, shows macOS-style toast notifications, and has a live feed of recently sorted files.\"**\n\n![File Organizer](assets/disck-cleaner.png)\n\n</details>\n\n## Development\n\n```bash\n# Start dev mode (frontend + Tauri backend)\nnpm run tauri dev\n\n# Frontend only (port 1420)\nnpm run dev\n\n# Build production binary\nnpm run tauri build\n\n# Run editkit tests\ncd packages/editkit && npm test\n```\n\n## Contributing\n\nIf you want to contribute:\n\n1. Fork the repo\n2. Create a feature branch\n3. Make your changes\n4. Run `npm run tauri dev` to verify\n5. Open a PR\n\n## License\n\nMIT\n","summary":"Raincast is a desktop application that turns a plain‑English description into a fully‑functional, shippable Tauri app, producing a React front‑end, a Rust back‑end with Tauri commands, and a native executable in a single click. It offers multiple layout templates, a live preview powered by a proxy binary that mimics production file‑system and shell access, and support for several AI providers (Claude, Gemini, etc.) to generate code. The tool is ideal for developers, UI designers, and product managers who need to prototype or build desktop applications quickly without manually setting up wiring between front‑end and back‑end. By abstracting away boilerplate and providing instant compilation, Raincast accelerates desktop app development for both seasoned engineers and hobbyists.","description":" Describe an app. Get a desktop app. AI-powered generator that builds real Tauri applications from natural language. ","stars":122,"language":"TypeScript"},{"owner":"virpo","repo":"pegboard","url":"https://github.com/virpo/pegboard","readme":"# 📍 Pegboard\n\nAI-generated 3D-printable pegboard toy from a hand-drawn sketch.\n\n<table>\n  <tr>\n    <th width=\"50%\">What I gave AI</th>\n    <th width=\"50%\">What it gave me</th>\n  </tr>\n  <tr>\n    <td><img src=\"docs/assets/sketch.jpg\" alt=\"Hand-drawn pegboard sketch\" width=\"100%\"></td>\n    <td><img src=\"docs/assets/oliver-playing.jpg\" alt=\"Oli playtesting the first printed pegboard set\" width=\"100%\"></td>\n  </tr>\n  <tr>\n    <td>A rough marker sketch Oli and I drew together. I gave Codex just two dimensions: the holes are `4 cm` apart and the pegs are `8 mm` wide.</td>\n    <td>Oli playing with the first printed set, after a little fit-and-feel iteration.</td>\n  </tr>\n</table>\n\n## Why This Exists\n\nWe have pegboards and plywood scraps all over the apartment. I wanted to make a tiny one for Oli, or maybe even hang one on our front door instead of a wreath so visitors would have something to play with.\n\nI had already cut the scrap wood and drilled the first board when I sat down at the computer, ready to lose an hour or two in Fusion 360. Then I looked at the sketch on my desk, took a photo, pasted it into Codex, and added the only dimensions that mattered: the holes are `40 mm` apart and the pegs are `8 mm` wide.\n\nAbout a minute later I had the first set of pieces. From there I just iterated a little: print, test, adjust, repeat, until the pegs fit snugly, the pieces felt good by hand, and the gears turned smoothly.\n\nEverything in this repo stays as small Python generators instead of hand-edited meshes, which made those tweaks easy. The time I did not spend drawing every variant in CAD turned into time I could spend printing, testing, and playing with Oli instead.\n\nThe current set is a `40 mm` system with seven play pieces, one tuned peg, four gears, and two printable boards.\n\n## Use AI To Tweak It\n\nThis repo is intentionally easy to modify with coding agents. [AGENTS.md](AGENTS.md) has the current dimensions, folder layout, and the few rules needed to extend the set safely.\n\nYou can ask an agent to:\n\n- build a bigger pegboard like `6x6`\n- make the pegs longer or shorter\n- add new pieces for different peg combinations\n- scale the whole system up or down\n- generate tighter or looser fit-test variants\n\n## What's in this repository\n\n<p align=\"center\">\n  <img src=\"docs/assets/overview.png\" alt=\"Overview render showing the play pieces, gears, printable pegboards, and tuned pegs included in the repository\" width=\"100%\">\n</p>\n\n| Play pieces | Gears | Pegboards and pegs |\n| --- | --- | --- |\n| Seven flat pieces in [models/pieces/](models/pieces) with `8.45 mm` holes, tuned to lift on and off the pegs easily. | Four smooth gears in [models/gears/](models/gears), tuned to mesh on the `40 mm` peg grid. | Two printable boards in [models/boards/](models/boards) plus the tuned peg in [models/pieces/](models/pieces). |\n\n## Repository layout\n\n- `models/`  \n  Final STL exports plus the board-fit prototypes.\n- `scripts/`  \n  Parametric generators for pieces, gears, boards, and README assets.\n- `docs/`  \n  Supporting notes plus the README images.\n- `AGENTS.md`  \n  Instructions for coding agents that want to extend the set.\n\n## Tuned dimensions\n\n- Grid pitch: `40.0 mm`\n- Piece hole diameter: `8.45 mm`\n- Gear hole diameter: `8.45 mm`\n- Peg: `7.72 mm` diameter, `40.0 mm` long, `1.2 mm` end roundover\n- Printed board hole diameter: currently `8.30 mm`, still being validated\n\n## Regenerate\n\n```bash\npython3 -m venv .venv\n. .venv/bin/activate\npip install -r requirements.txt\npython scripts/generate_pegboard_shapes.py\npython scripts/generate_pegboard_gears.py\npython scripts/generate_pegboard_board.py\npython scripts/generate_repository_assets.py\n```\n\n## Notes\n\n- [docs/pieces.md](docs/pieces.md)\n- [docs/gears.md](docs/gears.md)\n- [docs/boards.md](docs/boards.md)\n- [models/board_prototypes/README.md](models/board_prototypes/README.md)\n","summary":"Pegboard is an open‑source kit that turns a simple hand‑drawn sketch into a fully parametric set of 3‑D printable pegboard toys, using Codex to produce an initial design and Python scripts to refine and regenerate the models. The repository supplies generators for boards, pegs, gears, and play pieces that can be tuned in pitch, size or shape, along with scripts that automatically export updated STL files and documentation. It is aimed at makers, hobbyists and parents who want a quick, low‑cost way to prototype and iterate toy components without heavy CAD work. By exposing the dimensions and rules in code, the project enables users to scale, modify or extend the set with simple agent scripts for custom game designs.","description":"AI-generated 3D-printable pegboard toy from a hand-drawn sketch","stars":66,"language":"Python"},{"owner":"cmc-labo","repo":"tinyos-rtos","url":"https://github.com/cmc-labo/tinyos-rtos","readme":"# TinyOS — Ultra-Lightweight RTOS for IoT\n\nAn ultra-lightweight real-time operating system for resource-constrained IoT and embedded devices.  \nKernel footprint under 10 KB, 2 KB minimum RAM, preemptive priority-based scheduling.\n\n---\n\n## Features\n\n| Category | Details |\n|---|---|\n| **Kernel** | Preemptive priority-based scheduling (256 levels), round-robin within same priority, O(1) priority lookup via bitmap, priority inheritance |\n| **Synchronization** | Mutex (with priority inheritance), semaphore, condition variable, event groups, message queues |\n| **Software Timers** | One-shot and auto-reload, millisecond precision, period change at runtime |\n| **Memory** | Fixed-block pool allocator, stack overflow detection, per-task high-water mark |\n| **Shell** | VT100 interactive shell — 23 built-in commands, command history (↑↓), tab completion, full line editor |\n| **POSIX Compatibility** | pthreads (create/join/detach/exit, mutex, cond var) · BSD socket API (socket/bind/listen/accept/connect/send/recv, inet_pton/ntop, htons/htonl) |\n| **File System** | Lightweight block-device FS, POSIX-like API, wear levelling, power-fail safe |\n| **Network** | Ethernet, IPv4, ICMP, UDP, TCP, HTTP client/server, DNS |\n| **TLS / DTLS** | TLS 1.2/1.3 over TCP, DTLS 1.2 over UDP (mbedTLS backend) |\n| **MQTT** | Full MQTT 3.1.1 — QoS 0/1/2 with in-flight retry table, offline queue, auto-reconnect with exponential back-off |\n| **CoAP** | RFC 7252 compliant client/server, observe pattern |\n| **OTA** | A/B partition firmware updates, CRC32 verification, rollback |\n| **Watchdog** | Hardware and software watchdog, per-task timeout monitoring |\n| **Power** | Idle / Sleep / Deep-sleep modes, tickless idle, CPU frequency scaling |\n| **Security** | MPU-based memory protection, secure boot support |\n\n---\n\n## Supported Hardware\n\n| Architecture | Examples |\n|---|---|\n| ARM Cortex-M (M0/M0+/M3/M4/M7) | STM32, nRF52, Raspberry Pi Pico |\n| RISC-V (RV32I) | ESP32-C3 |\n| AVR (experimental) | ATmega |\n\n---\n\n## Quick Start\n\n**Prerequisites:** `gcc-arm-none-eabi`\n\n```bash\nmake example-blink    # LED blink\nmake example-shell    # Interactive shell over UART\nmake example-mqtt     # MQTT publish/subscribe\nmake example-iot      # Multi-sensor IoT node\nmake size             # Binary size report\n```\n\n**Minimal task example:**\n\n```c\n#include \"tinyos.h\"\n\nvoid my_task(void *param) {\n    while (1) {\n        /* work */\n        os_task_delay_ms(100);\n    }\n}\n\nint main(void) {\n    tcb_t task;\n    os_init();\n    os_task_create(&task, \"my_task\", my_task, NULL, PRIORITY_NORMAL);\n    os_start();\n}\n```\n\n---\n\n## API Overview\n\n### Task Management\n\n```c\nos_task_create(tcb, name, entry, param, priority)\nos_task_delete(task)\nos_task_suspend(task) / os_task_resume(task)\nos_task_delay(ticks) / os_task_delay_ms(ms)\nos_task_set_priority(task, priority)\nos_task_get_stats(task, stats)\nos_task_get_stats_by_index(index, stats)   /* iterate all tasks by index */\nos_task_find_by_name(name)                 /* returns tcb_t*, NULL if not found */\nos_get_system_stats(stats)\nos_get_memory_stats(&free, &used, &allocs, &frees)\n```\n\n### Synchronization\n\n```c\nos_mutex_init(mutex) / os_mutex_lock(mutex, timeout) / os_mutex_unlock(mutex)\nos_semaphore_init(sem, count) / os_semaphore_wait(sem, timeout) / os_semaphore_post(sem)\nos_cond_init(cond) / os_cond_wait(cond, mutex, timeout)\nos_cond_signal(cond) / os_cond_broadcast(cond)\nos_event_group_set_bits(eg, bits) / os_event_group_wait_bits(eg, bits, opts, out, timeout)\nos_queue_init(q, buf, item_size, max) / os_queue_send(q, item, timeout)\nos_queue_receive(q, item, timeout) / os_queue_peek(q, item, timeout)\n```\n\n### Timers\n\n```c\nos_timer_create(timer, name, type, period_ms, callback, param)\nos_timer_start(timer) / os_timer_stop(timer) / os_timer_reset(timer)\nos_timer_change_period(timer, ms) / os_timer_get_remaining_ms(timer)\n```\n\n### Shell\n\n```c\n/* Register custom commands before calling shell_start() */\nshell_register_cmd(name, handler_fn, help_text)\n\n/* Provide UART I/O callbacks and start the shell task */\nshell_io_t io = { .getc = uart_getc, .puts = uart_puts };\nshell_start(&io)\n\n/* Change the prompt at any time */\nshell_set_prompt(\"mydevice> \")\n\n/* Execute a single line programmatically */\nshell_exec(line)\n```\n\n**Custom command example:**\n\n```c\nstatic int cmd_led(int argc, char *argv[]) {\n    if (argc < 2) return 1;  /* non-zero → prints usage */\n    bool on = (strcmp(argv[1], \"on\") == 0);\n    gpio_write(LED_PIN, on);\n    return 0;\n}\n\n/* In main(), before shell_start(): */\nshell_register_cmd(\"led\", cmd_led, \"led <on|off>  Toggle LED\");\n```\n\n#### Built-in Shell Commands\n\n| Command | Description |\n|---|---|\n| `help [cmd]` | List all commands, or show detailed help for `cmd` |\n| `clear` | Clear the terminal screen (VT100) |\n| `echo <text>` | Print text to the terminal |\n| `history` | Show command history |\n| `ps` | List all tasks (state, priority, CPU%, stack usage) |\n| `top` | Task list sorted by CPU usage, descending |\n| `kill <name> [suspend\\|resume\\|delete]` | Control a task by name |\n| `mem` | Heap statistics (total / used / free, alloc/free counts) |\n| `ver` | TinyOS version and formatted uptime |\n| `net` | Network statistics (Ethernet, IP, UDP, TCP counters) |\n| `ping <ip> [count]` | Send ICMP echo requests |\n| `ifconfig [ip\\|netmask\\|gw\\|dns <addr>]` | Show or change network configuration |\n| `power [active\\|idle\\|sleep\\|deepsleep]` | Power stats or mode change |\n| `ls [path]` | List directory (default: `/`) |\n| `cat <file>` | Display file contents |\n| `mkdir <path>` | Create directory |\n| `rm <path>` | Remove file or empty directory |\n| `df` | Filesystem usage statistics |\n| `touch <file>` | Create empty file |\n| `cp <src> <dst>` | Copy file |\n| `uptime` | Show system uptime (`HH:MM:SS` or `N day(s), HH:MM:SS`) |\n| `sleep <ms>` | Delay the shell task for N milliseconds |\n| `reboot` | Reboot the system |\n\n**Line editor key bindings:**\n\n| Key | Action |\n|---|---|\n| `←` / `Ctrl-B` | Move cursor left |\n| `→` / `Ctrl-F` | Move cursor right |\n| `Home` / `Ctrl-A` | Jump to start of line |\n| `End` / `Ctrl-E` | Jump to end of line |\n| `↑` / `↓` | Navigate command history |\n| `Tab` | Complete command name |\n| `Ctrl-K` | Kill to end of line |\n| `Ctrl-U` | Kill to start of line |\n| `Ctrl-W` | Kill previous word |\n| `Ctrl-L` | Clear screen and redraw |\n| `Ctrl-C` | Cancel current line |\n\n**Shell configuration** (`include/tinyos/shell.h`):\n\n```c\n#define SHELL_MAX_COMMANDS   32    /* max registered commands       */\n#define SHELL_LINE_MAX       128   /* max input line length (bytes) */\n#define SHELL_ARGV_MAX       16    /* max arguments per command     */\n#define SHELL_HISTORY_DEPTH  8     /* command history entries       */\n```\n\n### Network\n\n```c\nnet_init(driver, config) / net_start()\nnet_socket(type) / net_bind(sock, addr) / net_connect(sock, addr, timeout_ms)\nnet_send(sock, data, len, timeout_ms) / net_recv(sock, buf, len, timeout_ms)\nnet_sendto(sock, data, len, addr) / net_recvfrom(sock, buf, len, addr)\nnet_close(sock)\nnet_ping(dest_ip, timeout_ms, rtt)\nnet_dns_resolve(hostname, ip, timeout_ms)\nnet_http_get(url, response, timeout_ms)\nnet_http_post(url, content_type, body, len, response, timeout_ms)\n```\n\n### POSIX Compatibility\n\nTinyOS provides two thin compatibility layers that allow standard portable code to\nbe compiled and run on TinyOS with minimal changes.\n\n#### pthreads (`include/tinyos/posix_threads.h`)\n\nAdd `src/posix/posix_threads.c` to your build.\n\n```c\n#include \"tinyos/posix_threads.h\"\n\n/* ── Thread ── */\npthread_t tid;\npthread_attr_t attr;\npthread_attr_init(&attr);\ntinyos_pthread_attr_setpriority(&attr, PRIORITY_NORMAL); /* TinyOS extension */\npthread_create(&tid, &attr, my_fn, arg);\npthread_join(tid, &retval);\npthread_detach(tid);    /* free resources automatically on exit */\npthread_exit(retval);   /* terminate calling thread */\npthread_self();         /* handle of calling thread */\n\n/* ── Mutex ── */\npthread_mutex_t mtx = PTHREAD_MUTEX_INITIALIZER;\npthread_mutex_lock(&mtx);\npthread_mutex_trylock(&mtx);   /* returns EBUSY if already locked */\npthread_mutex_unlock(&mtx);\n\n/* ── Condition variable ── */\npthread_cond_t cond = PTHREAD_COND_INITIALIZER;\npthread_cond_wait(&cond, &mtx);\npthread_cond_timedwait(&cond, &mtx, &abstime); /* abstime relative to boot */\npthread_cond_signal(&cond);\npthread_cond_broadcast(&cond);\n```\n\n| Concept | Mapped to |\n|---|---|\n| `pthread_t` | Index into an internal pool of TinyOS `tcb_t` slots |\n| `pthread_mutex_t` | Embeds `mutex_t` directly (zero-init / `PTHREAD_MUTEX_INITIALIZER` valid) |\n| `pthread_cond_t` | Embeds `cond_var_t` directly (zero-init / `PTHREAD_COND_INITIALIZER` valid) |\n| `pthread_join` | Waits on a per-thread `semaphore_t` posted by `pthread_exit` |\n\n**Not supported:** `pthread_cancel`, thread-local storage (`pthread_key_*`),\nrecursive mutexes (returns `ENOTSUP`).\n\n**Configuration** (`include/tinyos/posix_threads.h`):\n\n```c\n#define PTHREAD_MAX_THREADS  MAX_TASKS  /* max concurrent pthreads */\n```\n\n#### BSD Sockets (`include/tinyos/posix_socket.h`)\n\nAdd `src/posix/posix_socket.c` to your build.\n\n```c\n#include \"tinyos/posix_socket.h\"\n\n/* ── TCP server ── */\nint srv = socket(AF_INET, SOCK_STREAM, 0);\n\nint reuse = 1;\nsetsockopt(srv, SOL_SOCKET, SO_REUSEADDR, &reuse, sizeof(reuse));\n\nstruct sockaddr_in addr = {\n    .sin_family = AF_INET,\n    .sin_port   = htons(8080),\n    .sin_addr   = { htonl(INADDR_ANY) },\n};\nbind(srv, (struct sockaddr *)&addr, sizeof(addr));\nlisten(srv, 4);\n\nstruct sockaddr_in peer;\nsocklen_t plen = sizeof(peer);\nint client = accept(srv, (struct sockaddr *)&peer, &plen);\nrecv(client, buf, sizeof(buf), 0);\nsend(client, response, response_len, 0);\nposix_sock_close(client);   /* or define TINYOS_POSIX_WRAP_CLOSE to use close() */\nposix_sock_close(srv);\n\n/* ── TCP client ── */\nint fd = socket(AF_INET, SOCK_STREAM, 0);\nstruct sockaddr_in dest = {\n    .sin_family = AF_INET,\n    .sin_port   = htons(80),\n    .sin_addr   = { inet_addr(\"192.168.1.1\") },\n};\nconnect(fd, (struct sockaddr *)&dest, sizeof(dest));\nsend(fd, request, request_len, 0);\nrecv(fd, buf, sizeof(buf), 0);\nposix_sock_close(fd);\n\n/* ── UDP ── */\nint udp = socket(AF_INET, SOCK_DGRAM, 0);\nsendto(udp, data, len, 0, (struct sockaddr *)&dest, sizeof(dest));\nrecvfrom(udp, buf, sizeof(buf), 0, (struct sockaddr *)&src, &srclen);\nposix_sock_close(udp);\n\n/* ── Address utilities ── */\nhtons(port) / htonl(addr) / ntohs(n) / ntohl(n)\ninet_addr(\"192.168.1.1\")              /* → in_addr_t, network byte order */\ninet_ntoa(in)                          /* → \"192.168.1.1\" (static buffer) */\ninet_pton(AF_INET, \"192.168.1.1\", &in_addr)\ninet_ntop(AF_INET, &in_addr, buf, sizeof(buf))\n```\n\n| BSD call | Mapped to |\n|---|---|\n| `socket()` | `net_socket()` |\n| `bind()` | `net_bind()` |\n| `listen()` | `net_listen()` |\n| `accept()` | `net_accept()` |\n| `connect()` | `net_connect()` |\n| `send()` / `recv()` | `net_send()` / `net_recv()` |\n| `sendto()` / `recvfrom()` | `net_sendto()` / `net_recvfrom()` |\n| `posix_sock_close()` | `net_close()` |\n\n**Supported `setsockopt` options:**\n\n| Option | Effect |\n|---|---|\n| `SO_REUSEADDR` | Accepted; no-op (always reusable in TinyOS) |\n| `SO_RCVTIMEO` | Sets receive timeout per socket (struct timeval → ms) |\n| `SO_SNDTIMEO` | Sets send/connect timeout per socket |\n\n**`close()` redirection:** define `TINYOS_POSIX_WRAP_CLOSE` before including the\nheader to map `close(fd)` → `posix_sock_close(fd)`.\n\n**Not supported:** `select` / `poll` / `epoll`, non-blocking mode (`O_NONBLOCK`),\nIPv6 (`AF_INET6` returns `EAFNOSUPPORT`).\n\n---\n\n### TLS / DTLS\n\nTLS 1.2/1.3 over TCP and DTLS 1.2 over UDP backed by **mbedTLS**.  \nEnable at build time with `-DTINYOS_TLS_ENABLE` and link against mbedTLS.\n\n```c\n/* Client (TLS over TCP) */\ntls_context_t tls;\ntls_config_t  cfg = TLS_CONFIG_DEFAULT_CLIENT;\ncfg.ca_cert     = ca_cert_pem;\ncfg.ca_cert_len = sizeof(ca_cert_pem);\ntls_init(&tls, &cfg);\n\nnet_socket_t sock = net_socket(SOCK_STREAM);\nnet_connect(sock, &broker_addr, 5000);\ntls_connect(&tls, sock, \"example.com\", 5000);\n\ntls_send(&tls, data, len);\ntls_recv(&tls, buf, sizeof(buf), 5000);\ntls_close(&tls);\n\n/* Server (TLS accept) */\ntls_config_t srv_cfg = TLS_CONFIG_DEFAULT_SERVER;\nsrv_cfg.cert     = server_cert_pem;\nsrv_cfg.cert_len = sizeof(server_cert_pem);\nsrv_cfg.key      = server_key_pem;\nsrv_cfg.key_len  = sizeof(server_key_pem);\ntls_init(&tls, &srv_cfg);\ntls_accept(&tls, client_sock, 5000);\n\n/* DTLS over UDP */\ntls_config_t dtls_cfg = TLS_CONFIG_DEFAULT_DTLS_CLIENT;\nnet_socket_t usock = net_socket(SOCK_DGRAM);\ntls_connect_dtls(&tls, usock, \"example.com\", 5000);\n```\n\n### MQTT\n\nFull MQTT 3.1.1 with per-message QoS delivery guarantees.\n\n```c\nmqtt_config_t cfg = {\n    .broker_host          = \"mqtt.example.com\",\n    .client_id            = \"tinyos-01\",\n    .keepalive_sec        = 60,\n    .clean_session        = true,\n    .auto_reconnect       = true,\n    .reconnect_interval_ms = 3000,   /* base; doubles each attempt (max 60 s) */\n};\nmqtt_client_t client;\nmqtt_client_init(&client, &cfg);\nmqtt_set_connection_callback(&client, on_connect, NULL);\nmqtt_set_message_callback(&client, on_message, NULL);\nmqtt_connect(&client);\n\n/* Publish — QoS1/2 are buffered offline if disconnected */\nmqtt_publish(&client, \"sensors/temp\", \"23.5\", 4, MQTT_QOS_1, false);\n\n/* Inspect reliability queues */\nuint8_t in_flight = mqtt_get_inflight_count(&client);  /* sent, awaiting ACK  */\nuint8_t pending   = mqtt_get_pending_count(&client);   /* queued while offline */\n\nmqtt_subscribe(&client, \"cmd/#\", MQTT_QOS_1);\nmqtt_flush_pending(&client);   /* discard offline queue */\nmqtt_disconnect(&client);\n```\n\n#### MQTT Reliability Model\n\n```\nQoS 0  ─── fire-and-forget; dropped if disconnected\nQoS 1  ─── in-flight table tracks each PUBLISH until PUBACK\n              ↳ retransmits with DUP=1 every 5 s, up to 5 times\n              ↳ if offline → offline queue (up to 8 messages)\nQoS 2  ─── full PUBLISH → PUBREC → PUBREL → PUBCOMP handshake\n              ↳ each step is retried independently on timeout\n\nAuto-reconnect back-off: 3 s → 6 s → 12 s → … → 60 s (cap)\nOn reconnect: re-subscribes all topics, flushes offline queue\n```\n\n**MQTT reliability configuration** (`include/tinyos/mqtt.h`):\n\n```c\n#define MQTT_MAX_INFLIGHT          8      /* in-flight slots       */\n#define MQTT_MAX_PENDING           8      /* offline queue slots   */\n#define MQTT_MAX_PAYLOAD_SIZE      512    /* bytes per queued msg  */\n#define MQTT_RETRY_INTERVAL_MS     5000   /* retry after (ms)      */\n#define MQTT_MAX_RETRY_COUNT       5      /* retries before drop   */\n#define MQTT_RECONNECT_BASE_MS     3000   /* first reconnect delay */\n#define MQTT_RECONNECT_MAX_MS      60000  /* backoff ceiling       */\n```\n\n### CoAP\n\n```c\ncoap_init(ctx, config, is_server) / coap_start(ctx) / coap_stop(ctx)\ncoap_get(ctx, ip, port, path, response, timeout_ms)\ncoap_post(ctx, ip, port, path, format, payload, len, response, timeout_ms)\ncoap_resource_create(ctx, path, handler, user_data)\ncoap_process(ctx, timeout_ms)\n```\n\n### OTA\n\n```c\nota_init(config)\nota_start_update(url, callback, user_data)\nota_write_chunk(data, size, offset) / ota_finalize_update()\nota_confirm_boot() / ota_rollback()\nota_verify_partition(type)\n```\n\n### File System\n\n```c\nfs_format(device) / fs_mount(device) / fs_unmount()\nfs_open(path, flags) / fs_close(fd)\nfs_read(fd, buf, size) / fs_write(fd, buf, size)\nfs_seek(fd, offset, whence) / fs_tell(fd)\nfs_mkdir(path) / fs_remove(path) / fs_rmdir(path)\nfs_stat(path, stat)\nfs_opendir(path) / fs_readdir(dir, entry) / fs_closedir(dir)\nfs_get_stats(stats) / fs_get_free_space() / fs_is_mounted()\n```\n\n### Power Management\n\n```c\nos_power_init()\nos_power_set_mode(mode)          /* ACTIVE / IDLE / SLEEP / DEEP_SLEEP */\nos_power_get_mode()\nos_power_enter_sleep(duration_ms)\nos_power_enter_deep_sleep(duration_ms)\nos_power_enable_tickless_idle(enable)\nos_power_set_cpu_frequency(freq_hz)\nos_power_configure_wakeup(source, enable)\nos_power_get_stats(stats)\nos_power_get_consumption_mw()\nos_power_estimate_battery_life_hours()\n```\n\n### Watchdog\n\n```c\nwdt_init(config) / wdt_start() / wdt_stop()\nwdt_feed() / wdt_set_timeout(ms)\nwdt_register_task(task, timeout_ms) / wdt_feed_task(task)\n```\n\n---\n\n## Configuration\n\n**`include/tinyos.h`** — kernel and OS:\n\n```c\n#define MAX_TASKS        8      /* max concurrent tasks           */\n#define STACK_SIZE       256    /* stack size per task (words)    */\n#define TICK_RATE_HZ     1000   /* scheduler tick frequency (Hz)  */\n#define TIME_SLICE_MS    10     /* round-robin time slice (ms)    */\n```\n\n**`include/tinyos/shell.h`** — interactive shell:\n\n```c\n#define SHELL_MAX_COMMANDS   32   /* max registered commands         */\n#define SHELL_LINE_MAX       128  /* max input line length (bytes)   */\n#define SHELL_ARGV_MAX       16   /* max arguments per command       */\n#define SHELL_HISTORY_DEPTH  8    /* command history ring buffer     */\n```\n\n**`include/tinyos/mqtt.h`** — MQTT reliability:\n\n```c\n#define MQTT_MAX_INFLIGHT        8      /* in-flight QoS1/2 slots    */\n#define MQTT_MAX_PENDING         8      /* offline queue slots       */\n#define MQTT_MAX_PAYLOAD_SIZE    512    /* max queued payload bytes  */\n#define MQTT_RETRY_INTERVAL_MS   5000   /* unACKed retry interval    */\n#define MQTT_MAX_RETRY_COUNT     5      /* retries before discard    */\n#define MQTT_RECONNECT_BASE_MS   3000   /* initial reconnect delay   */\n#define MQTT_RECONNECT_MAX_MS    60000  /* back-off ceiling          */\n```\n\n**TLS** — requires mbedTLS; enable with:\n\n```makefile\nCFLAGS += -DTINYOS_TLS_ENABLE\nLDFLAGS += -lmbedtls -lmbedcrypto -lmbedx509\n```\n\n---\n\n## Project Structure\n\n```\ntinyos-rtos/\n├── include/\n│   ├── tinyos.h              # Core API (tasks, sync, timers, memory, FS, power)\n│   └── tinyos/\n│       ├── shell.h           # Interactive shell API & configuration\n│       ├── net.h             # Network stack\n│       ├── tls.h             # TLS 1.2/1.3 + DTLS 1.2 (mbedTLS)\n│       ├── mqtt.h            # MQTT 3.1.1 client\n│       ├── coap.h            # CoAP RFC 7252\n│       ├── ota.h             # OTA firmware updates\n│       ├── watchdog.h        # Watchdog timer\n│       ├── posix_threads.h   # POSIX pthreads compatibility layer\n│       └── posix_socket.h    # BSD socket compatibility layer\n├── src/\n│   ├── kernel.c              # Preemptive scheduler & task management\n│   ├── sync.c                # Mutex, semaphore, queue, condition var, event groups\n│   ├── timer.c               # Software timers\n│   ├── memory.c              # Heap allocator\n│   ├── shell.c               # Interactive shell (VT100, history, tab completion)\n│   ├── filesystem.c          # Block-device file system\n│   ├── security.c            # MPU memory protection\n│   ├── power.c               # Power management & CPU frequency scaling\n│   ├── watchdog.c            # Watchdog (HW + SW, per-task monitoring)\n│   ├── bootloader.c          # Secure bootloader\n│   ├── ota.c                 # OTA A/B partition updates\n│   ├── mqtt.c                # MQTT client (in-flight table, offline queue)\n│   ├── coap.c                # CoAP client/server\n│   ├── net/\n│   │   ├── network.c         # Core & buffer management\n│   │   ├── ethernet.c        # Ethernet / ARP\n│   │   ├── ip.c              # IPv4 / ICMP\n│   │   ├── socket.c          # UDP / TCP socket API\n│   │   ├── http_dns.c        # HTTP client & DNS resolver\n│   │   └── tls.c             # TLS/DTLS (mbedTLS wrapper)\n│   └── posix/\n│       ├── posix_threads.c   # pthreads → TinyOS task/sync wrapper\n│       └── posix_socket.c    # BSD socket → net_* wrapper\n├── drivers/\n│   ├── flash.c / flash.h     # Flash memory driver\n│   ├── ramdisk.c / ramdisk.h # RAM disk (testing)\n│   └── loopback_net.c        # Loopback network driver (testing)\n└── examples/\n    ├── blink_led.c           # GPIO blink\n    ├── iot_sensor.c          # Multi-task sensor node\n    ├── shell_demo.c          # Custom shell commands over UART\n    ├── network_demo.c        # TCP/UDP/HTTP/ping\n    ├── tls_demo.c            # TLS client/server\n    ├── mqtt_demo.c           # MQTT publish/subscribe (QoS 1/2)\n    ├── coap_demo.c           # CoAP client/server\n    ├── ota_demo.c            # Firmware update flow\n    ├── filesystem_demo.c     # File I/O\n    ├── watchdog_demo.c       # Watchdog configuration\n    ├── low_power.c           # Power mode transitions\n    ├── software_timers.c     # Timer creation and callbacks\n    ├── event_groups.c        # Event synchronisation\n    ├── condition_variable.c  # Producer/consumer\n    ├── priority_adjustment.c # Dynamic priority\n    ├── task_statistics.c     # CPU and stack monitoring\n    └── posix_compat_demo.c   # POSIX pthreads + socket usage examples\n```\n\n---\n\n## Performance\n\n| Component | ROM | RAM |\n|---|---|---|\n| Kernel | 6 KB | 512 B |\n| Per task | — | ~1 KB |\n| Mutex | — | 12 B |\n| Semaphore | — | 8 B |\n| Message queue (10 items) | — | 40 B + data |\n| Shell (with 23 built-ins) | ~4 KB | ~2.5 KB |\n| MQTT client (with queues) | ~8 KB | ~10 KB |\n| POSIX threads layer | ~2 KB | ~`PTHREAD_MAX_THREADS` × (tcb_t + 32 B) |\n| POSIX socket layer | ~1 KB | ~`NET_MAX_SOCKETS` × 12 B |\n\n| Architecture | Context switch |\n|---|---|\n| Cortex-M0 | ~2 μs |\n| Cortex-M4 | ~1 μs |\n| RISC-V | ~1.5 μs |\n\n**System requirements:** 2 KB RAM minimum · < 10 KB ROM for kernel alone\n\n---\n\n## License\n\nMIT License — see `LICENSE` for details.\n","summary":"TinyOS is an ultra‑lightweight real‑time operating system designed for resource‑constrained IoT and embedded devices, keeping the kernel under 10 KB of flash and 2 KB of RAM. It offers a preemptive priority‑based scheduler, rich POSIX‑compatible APIs, thread‑safe synchronization primitives, millisecond timers, and a VT100 shell, while also providing full network stacks (TCP/IP, MQTT 3.1.1, CoAP, HTTP) and security features such as TLS/DTLS and MPU support. Built for supported architectures like ARM Cortex‑M and RISC‑V, it also supports OTA A/B firmware updates, power‑management modes, and watch‑dog timers. Developers building low‑footprint IoT firmware who need a feature‑rich, POSIX‑friendly RTOS will find TinyOS a compelling choice.","description":null,"stars":221,"language":"C"},{"owner":"razvandimescu","repo":"numa","url":"https://github.com/razvandimescu/numa","readme":"# Numa\n\n[![CI](https://github.com/razvandimescu/numa/actions/workflows/ci.yml/badge.svg)](https://github.com/razvandimescu/numa/actions)\n[![crates.io](https://img.shields.io/crates/v/numa.svg)](https://crates.io/crates/numa)\n[![License: MIT](https://img.shields.io/badge/license-MIT-blue.svg)](LICENSE)\n\n**DNS you own. Everywhere you go.** — [numa.rs](https://numa.rs)\n\nA portable DNS resolver in a single binary. Block ads on any network, name your local services (`frontend.numa`), and override any hostname with auto-revert — all from your laptop, no cloud account or Raspberry Pi required.\n\nBuilt from scratch in Rust. Zero DNS libraries. RFC 1035 wire protocol parsed by hand. Caching, ad blocking, and local service domains out of the box. Optional recursive resolution from root nameservers with full DNSSEC chain-of-trust validation, plus a DNS-over-TLS listener for encrypted client connections (iOS Private DNS, systemd-resolved, etc.). One ~8MB binary, everything embedded.\n\n![Numa dashboard](assets/hero-demo.gif)\n\n## Quick Start\n\n```bash\n# macOS\nbrew install razvandimescu/tap/numa\n\n# Linux\ncurl -fsSL https://raw.githubusercontent.com/razvandimescu/numa/main/install.sh | sh\n\n# Arch Linux (AUR)\nyay -S numa-git\n\n# Windows — download from GitHub Releases\n# All platforms\ncargo install numa\n\n# Docker\ndocker run -d --name numa --network host ghcr.io/razvandimescu/numa\n```\n\n```bash\nsudo numa                              # run in foreground (port 53 requires root/admin)\n```\n\nOpen the dashboard: **http://numa.numa** (or `http://localhost:5380`)\n\nSet as system DNS:\n\n| Platform | Install | Uninstall |\n|----------|---------|-----------|\n| macOS | `sudo numa install` | `sudo numa uninstall` |\n| Linux | `sudo numa install` | `sudo numa uninstall` |\n| Windows | `numa install` (admin) + reboot | `numa uninstall` (admin) + reboot |\n\nOn macOS and Linux, numa runs as a system service (launchd/systemd). On Windows, numa auto-starts on login via registry.\n\n## Local Services\n\nName your dev services instead of remembering port numbers:\n\n```bash\ncurl -X POST localhost:5380/services \\\n  -d '{\"name\":\"frontend\",\"target_port\":5173}'\n```\n\nNow `https://frontend.numa` works in your browser — green lock, valid cert, WebSocket passthrough for HMR. No mkcert, no nginx, no `/etc/hosts`.\n\nAdd path-based routing (`app.numa/api → :5001`), share services across machines via LAN discovery, or configure everything in [`numa.toml`](numa.toml).\n\n## Ad Blocking & Privacy\n\n385K+ domains blocked via [Hagezi Pro](https://github.com/hagezi/dns-blocklists). Works on any network — coffee shops, hotels, airports. Travels with your laptop.\n\nThree resolution modes:\n\n- **`forward`** (default) — transparent proxy to your existing system DNS. Everything works as before, just with caching and ad blocking on top. Captive portals, VPNs, corporate DNS — all respected.\n- **`recursive`** — resolve directly from root nameservers. No upstream dependency, no single entity sees your full query pattern. Add `[dnssec] enabled = true` for full chain-of-trust validation.\n- **`auto`** — probe root servers on startup, recursive if reachable, encrypted DoH fallback if blocked.\n\nDNSSEC validates the full chain of trust: RRSIG signatures, DNSKEY verification, DS delegation, NSEC/NSEC3 denial proofs. [Read how it works →](https://numa.rs/blog/posts/dnssec-from-scratch.html)\n\n**DNS-over-TLS listener** (RFC 7858) — accept encrypted queries on port 853 from strict clients like iOS Private DNS, systemd-resolved, or stubby. Two modes:\n\n- **Self-signed** (default) — numa generates a local CA automatically. `numa install` adds it to the system trust store on macOS, Linux (Debian/Ubuntu, Fedora/RHEL/SUSE, Arch), and Windows. On iOS, install the `.mobileconfig` from `numa setup-phone`. Firefox keeps its own NSS store and ignores the system one — trust the CA there manually if you need HTTPS for `.numa` services in Firefox.\n- **Bring-your-own cert** — point `[dot] cert_path` / `key_path` at a publicly-trusted cert (e.g., Let's Encrypt via DNS-01 challenge on a domain pointing at your numa instance). Clients connect without any trust-store setup — same UX as AdGuard Home or Cloudflare `1.1.1.1`.\n\nALPN `\"dot\"` is advertised and enforced in both modes; a handshake with mismatched ALPN is rejected as a cross-protocol confusion defense.\n\n**Phone setup** — point your iPhone or Android at Numa in one step:\n\n```bash\nnuma setup-phone\n```\n\nPrints a QR code. Scan it, install the profile, toggle certificate trust — your phone's DNS now routes through Numa over TLS. Requires `[mobile] enabled = true` in `numa.toml`.\n\n## LAN Discovery\n\nRun Numa on multiple machines. They find each other automatically via mDNS:\n\n```\nMachine A (192.168.1.5)              Machine B (192.168.1.20)\n┌──────────────────────┐             ┌──────────────────────┐\n│ Numa                 │    mDNS     │ Numa                 │\n│  - api (port 8000)   │◄───────────►│  - grafana (3000)    │\n│  - frontend (5173)   │  discovery  │                      │\n└──────────────────────┘             └──────────────────────┘\n```\n\nFrom Machine B: `curl http://api.numa` → proxied to Machine A's port 8000. Enable with `numa lan on`.\n\n**Hub mode**: run one instance with `bind_addr = \"0.0.0.0:53\"` and point other devices' DNS to it — they get ad blocking + `.numa` resolution without installing anything.\n\n## Docker\n\n```bash\n# Recommended — host networking (Linux)\ndocker run -d --name numa --network host ghcr.io/razvandimescu/numa\n\n# Port mapping (macOS/Windows Docker Desktop)\ndocker run -d --name numa -p 53:53/udp -p 53:53/tcp -p 5380:5380 ghcr.io/razvandimescu/numa\n```\n\nDashboard at `http://localhost:5380`. The image binds the API and proxy to `0.0.0.0` by default. Override with a custom config:\n\n```bash\ndocker run -d --name numa --network host \\\n  -v /path/to/numa.toml:/root/.config/numa/numa.toml \\\n  ghcr.io/razvandimescu/numa\n```\n\nMulti-arch: `linux/amd64` and `linux/arm64`.\n\n## How It Compares\n\n| | Pi-hole | AdGuard Home | Unbound | Numa |\n|---|---|---|---|---|\n| Local service proxy + auto TLS | — | — | — | `.numa` domains, HTTPS, WebSocket |\n| LAN service discovery | — | — | — | mDNS, zero config |\n| Developer overrides (REST API) | — | — | — | Auto-revert, scriptable |\n| Recursive resolver | — | — | Yes | Yes, with SRTT selection |\n| DNSSEC validation | — | — | Yes | Yes (RSA, ECDSA, Ed25519) |\n| Ad blocking | Yes | Yes | — | 385K+ domains |\n| Web admin UI | Full | Full | — | Dashboard |\n| Encrypted upstream (DoH/DoT) | Needs cloudflared | DoH only | DoT only | DoH + DoT (`tls://`) |\n| Encrypted clients (DoT listener) | Needs stunnel sidecar | Yes | Yes | Native (RFC 7858) |\n| DoH server endpoint | — | Yes | — | Yes (RFC 8484) |\n| Request hedging | — | — | — | All protocols (UDP, DoH, DoT) |\n| Serve-stale + prefetch | — | — | Prefetch at 90% TTL | RFC 8767, prefetch at 90% TTL |\n| Conditional forwarding | — | Yes | Yes | Yes (per-suffix rules) |\n| Portable (laptop) | No (appliance) | No (appliance) | Server | Single binary, macOS/Linux/Windows |\n| Community maturity | 56K stars, 10 years | 33K stars | 20 years | New |\n\n## Performance\n\n0.1ms cached queries — matches Unbound and AdGuard Home. Wire-level cache stores raw bytes with in-place TTL patching. Request hedging eliminates p99 spikes: cold recursive p99 538ms vs Unbound 748ms (−28%), σ 4× tighter. [Benchmarks →](benches/)\n\n## Learn More\n\n- [Blog: DNS-over-TLS from Scratch in Rust](https://numa.rs/blog/posts/dot-from-scratch.html)\n- [Blog: Implementing DNSSEC from Scratch in Rust](https://numa.rs/blog/posts/dnssec-from-scratch.html)\n- [Blog: I Built a DNS Resolver from Scratch](https://numa.rs/blog/posts/dns-from-scratch.html)\n- [Configuration reference](numa.toml) — all options documented inline\n- [REST API](src/api.rs) — 27 endpoints across overrides, cache, blocking, services, diagnostics\n\n## Roadmap\n\n- [x] DNS forwarding, caching, ad blocking, developer overrides\n- [x] `.numa` local domains — auto TLS, path routing, WebSocket proxy\n- [x] LAN service discovery — mDNS, cross-machine DNS + proxy\n- [x] DNS-over-HTTPS — encrypted upstream + server endpoint (RFC 8484)\n- [x] DNS-over-TLS — encrypted client listener (RFC 7858) + upstream forwarding (`tls://`)\n- [x] Recursive resolution + DNSSEC — chain-of-trust, NSEC/NSEC3\n- [x] SRTT-based nameserver selection\n- [x] Multi-forwarder failover — multiple upstreams with SRTT ranking, fallback pool\n- [x] Request hedging — parallel requests rescue packet loss and tail latency (all protocols)\n- [x] Serve-stale + prefetch — RFC 8767, background refresh at <10% TTL and on stale serve\n- [x] Conditional forwarding — per-suffix rules for split-horizon DNS (Tailscale, VPNs)\n- [x] Cache warming — proactive resolution for configured domains\n- [x] Mobile onboarding — `setup-phone` QR flow, mobile API, mobileconfig profiles\n- [ ] pkarr integration — self-sovereign DNS via Mainline DHT\n- [ ] Global `.numa` names — DHT-backed, no registrar\n\n## License\n\nMIT\n","summary":"Numa is a lightweight, all‑in‑one DNS resolver written in Rust that runs as a single binary and can be used on any platform without cloud services or extra hardware. It blocks ads with a large blocklist, lets developers map local services to friendly names (e.g., `frontend.numa`), and supports full DNSSEC‑validated recursive resolution plus a DNS‑over‑TLS listener for encrypted clients. The distribution includes caching, automatic local‑authority generation, and a web‑based dashboard for configuration. It’s ideal for developers who want quick local service routing, privacy‑focused users who need network‑agnostic ad blocking, or anyone looking for a self‑contained DNS solution that works on laptops, phones, or Docker containers.","description":"Portable DNS resolver in Rust — .numa local domains, ad blocking, developer overrides","stars":346,"language":"Rust"},{"owner":"matt-virgo","repo":"baremail","url":"https://github.com/matt-virgo/baremail","readme":"# BAREMAIL ʕ·ᴥ·ʔ\n\n**Email's bare necessities.** A minimalist Gmail client for low-bandwidth environments — airplane wifi, rural connections, developing regions, or any situation where Gmail's full interface is too heavy.\n\n```\n  ʕ·ᴥ·ʔ\n  BAREMAIL\n  ── email's bare necessities ──\n```\n\n![BAREMAIL](marketing/og-image.png)\n\n## What is BAREMAIL?\n\nBAREMAIL is a Progressive Web App that talks directly to the Gmail API. The entire app shell is under 200KB gzipped, cached by a service worker, and then the only network traffic is Gmail API JSON — the UI itself costs zero bytes on repeat visits.\n\n- **App shell: ~60KB** gzipped (Preact + HTM + your styles and logic)\n- **Inbox load: ~3-5KB** of API data for 25 messages\n- **Single email: ~1-3KB** for a typical text message\n- **Offline-first:** read cached emails, compose and queue messages with no connection\n- **Zero-install:** works in any modern browser, installable as a PWA\n\n## Features\n\n- Inbox with unread indicators, starring, and archive\n- Mobile compatible progressive web app\n- Plain text message reader with typewriter effect\n- Compose, reply, and forward (plain text)\n- Search via Gmail's query syntax\n- Labels: Inbox, Starred, Sent, Drafts\n- Light/dark theme (respects system preference)\n- Keyboard shortcuts (j/k navigate, o open, c compose, r reply, e archive)\n- Offline compose with outbox queue and background sync\n- Connection status indicator with bandwidth estimates\n- Inbox zero bear mascot with animated ASCII scenes\n- Hidden mini-game: Honey Catcher\n\n## Quick Start (~3 minutes)\n\n```bash\nnpm install\nnpm start\n```\n\nOpen [http://localhost:3000](http://localhost:3000) and the built-in setup wizard walks you through connecting to Gmail:\n\n```\n  ʕ·ᴥ·ʔ  BAREMAIL\n\n  ʕ·ᴥ·ʔ setup guide                     ~3 minutes\n  ● ○ ○ ○ ○ ○\n  step 1 of 6\n\n  ┌─────────────────────────────────────────────┐\n  │  create a google cloud project              │\n  │                                             │\n  │  click the link below to create a new       │\n  │  google cloud project. name it anything     │\n  │  you like (e.g. \"BAREMAIL\").                │\n  │                                             │\n  │  ┌───────────────────────────────┐          │\n  │  │ open google cloud console →   │          │\n  │  └───────────────────────────────┘          │\n  │                                             │\n  │  ▸ need a google account?                   │\n  └─────────────────────────────────────────────┘\n              ┌──────────────────────┐\n              │  done, next step →   │\n              └──────────────────────┘\n```\n\nThe wizard has 7 steps (one optional) — each one opens the exact Google Cloud page you need, tells you what to click, and lets you paste your credentials directly into the app. No config files to edit.\n\n**Video walkthrough:** [Watch the setup wizard in action](https://youtu.be/I9Jfs52-nf0)\n\n> On first sign-in, you'll see a warning: \"Google hasn't verified this app.\" This is normal for development. Click **Advanced** → **Go to BAREMAIL (unsafe)** to continue. Your data still goes directly to Google's API, never through a third party.\n\n<details>\n<summary><strong>Alternative setup methods</strong></summary>\n\n**CLI setup (interactive):**\n```bash\nnpm run setup\n```\nOpens each Google Cloud page in your browser and prompts for credentials in the terminal. Writes `config.js` automatically.\n\n**Manual config file:**\n```bash\ncp config.example.js config.js\n```\nEdit `config.js` and paste your Client ID and Client Secret:\n```js\nwindow.BAREMAIL_CONFIG = {\n  GOOGLE_CLIENT_ID: 'your-client-id.apps.googleusercontent.com',\n  GOOGLE_CLIENT_SECRET: 'your-client-secret',\n  GOOGLE_REDIRECT_URI: window.location.origin,\n};\n```\n\n> **Note on the client secret:** This is visible in the source code, which is expected for browser-based apps using Google's \"Web application\" OAuth type. The PKCE flow protects against authorization code interception, and the secret alone can't access anyone's data without user consent.\n\n**Manual steps reference:**\n\n1. [Create a Google Cloud project](https://console.cloud.google.com/projectcreate)\n2. [Enable the Gmail API](https://console.cloud.google.com/apis/library/gmail.googleapis.com)\n3. [Configure OAuth consent screen](https://console.cloud.google.com/apis/credentials/consent) — select External, fill in app name + emails\n4. [Add yourself as a test user](https://console.cloud.google.com/auth/audience) — scroll to Test Users, add your Gmail address\n5. *(Optional)* Set up ngrok for mobile — see [Install on iPhone / iPad](#install-on-iphone--ipad) below\n6. [Create OAuth credentials](https://console.cloud.google.com/apis/credentials/oauthclient) — Web application, add `http://localhost:3000` to origins and redirect URIs (plus your ngrok URL if using mobile)\n7. Paste Client ID and Client Secret into the app or `config.js`\n\n</details>\n\n### Install as a PWA (use from your dock)\n\nBAREMAIL is designed to be used as an installed app, not a browser tab. Once installed, the service worker caches everything locally — the app launches instantly from your dock and API calls go directly to Gmail. No server needed after installation.\n\n**Chrome (recommended):**\n1. Visit `http://localhost:3000`\n2. Click the **⋮** menu (top-right) → **Cast, save, and share** → **Install page as app...**\n   - Alternatively, look for the install icon (⊕) in the address bar — but this doesn't always appear\n3. BAREMAIL now appears in your dock, Launchpad, and Spotlight\n\n**Safari (macOS Sonoma+):**\n1. Visit `http://localhost:3000`\n2. Go to **File → Add to Dock**\n3. BAREMAIL appears in your dock\n\n**After installation:**\n- Just click the BAREMAIL icon in your dock — it opens in its own window, no browser chrome\n- The service worker serves the app from cache, so it launches instantly even if `npm start` isn't running\n- To **update** the app after pulling new code: run `npm start` once, open BAREMAIL, and the service worker will pick up the new version in the background\n\n### Install on iPhone / iPad\n\nPWAs require HTTPS, so you'll need to tunnel your local server to get a public URL. [ngrok](https://ngrok.com) is the simplest way.\n\n**One-time setup:**\n\n1. Install ngrok:\n   ```bash\n   brew install ngrok    # macOS\n   # or download from https://ngrok.com/download\n   ```\n2. Create a free account at [ngrok.com](https://ngrok.com) and run:\n   ```bash\n   ngrok config add-authtoken YOUR_TOKEN\n   ```\n\n**Expose your local server:**\n\n1. Make sure BAREMAIL is running (`npm start`)\n2. In a separate terminal:\n   ```bash\n   ngrok http 3000\n   ```\n3. Copy the `https://xxxx.ngrok-free.app` URL from the output\n\n**Add the ngrok URL to Google OAuth:**\n\n1. Go to [Google Cloud Console → Credentials](https://console.cloud.google.com/apis/credentials)\n2. Click on your OAuth client ID\n3. Add the ngrok URL to both **Authorized JavaScript origins** and **Authorized redirect URIs**\n4. Click **Save**\n\n**Install on your phone:**\n\n1. Open **Safari** on your iPhone (must be Safari — other browsers on iOS don't support PWA installation)\n2. Navigate to your `https://xxxx.ngrok-free.app` URL\n3. If ngrok shows an interstitial page, tap through it\n4. BAREMAIL will show the setup wizard — enter the same **Client ID** and **Client Secret** you used on your computer\n5. Sign in with Google\n6. Tap the **Share** button (square with arrow) → **\"Add to Home Screen\"** → **\"Add\"**\n7. Open BAREMAIL from your home screen — it will show the setup wizard one more time (iOS uses separate storage for home screen apps). Enter your credentials again and sign in.\n\nAfter that, BAREMAIL is fully installed. The service worker caches everything locally, so the app will keep working even after you shut down ngrok. You only need ngrok again to push new versions of the app to your phone.\n\n> **Note:** ngrok's free tier generates a new URL each time you restart it. If you restart ngrok, you'll need to update your Google OAuth credentials with the new URL and re-add the PWA on your phone.\n\n## Scripts\n\n| Command | Description |\n|---------|-------------|\n| `npm start` | Production build + serve on port 3000 (use this) |\n| `npm run setup` | Interactive setup — opens GCP pages and writes config.js |\n| `npm run dev` | Dev server with sourcemaps (for development) |\n| `npm run build` | Production build to `dist/` (for deployment) |\n| `npm run watch` | Watch mode, rebuilds on change |\n\n## Deployment (optional)\n\nFor personal use, `npm start` + PWA install is all you need. If you want to host it on a public URL:\n\nBAREMAIL is just static files — deploy the `dist/` folder anywhere:\n\n- **Cloudflare Pages:** connect your repo, build command `npm run build`, publish directory `dist`\n- **Netlify / Vercel:** same setup\n- **GitHub Pages:** push `dist/` to a `gh-pages` branch\n\nUpdate your Google OAuth credentials with the production domain:\n- Authorized JavaScript origins: add `https://yourdomain.com`\n- Authorized redirect URIs: add `https://yourdomain.com`\n- Add any users who need access as **test users** on the OAuth consent screen (until you go through Google's verification process)\n\n## Architecture\n\n```\nBrowser\n├── App Shell (Preact + HTM, cached by service worker)\n│   ├── Inbox view (message list, search, pagination)\n│   ├── Reader view (plain text, attachments list)\n│   ├── Compose view (send/reply/forward, offline queue)\n│   └── Components (header, nav, footer, bear mascot)\n├── Service Worker\n│   ├── Cache-first for app shell\n│   ├── Network-first for Gmail API\n│   └── Background sync for outbox\n├── IndexedDB\n│   ├── Message cache (LRU, 1000 messages)\n│   ├── Outbox queue\n│   └── User preferences\n└── Gmail REST API (direct, no backend)\n```\n\n## Privacy\n\nBAREMAIL runs entirely in your browser. There is no backend server. Your emails go directly between your browser and Google's Gmail API. No data is ever sent to a third party.\n\nOAuth tokens are stored locally. The app requests only the minimum scopes needed: read, send, and modify (for marking read/unread and archiving).\n\n## Tech Stack\n\n| Layer | Choice | Size |\n|-------|--------|------|\n| Framework | Preact + HTM | ~4KB gzipped |\n| Language | TypeScript | Zero runtime cost |\n| Styling | Single CSS file | ~5KB gzipped |\n| Font | IBM Plex Mono (subset) | ~15KB gzipped |\n| Build | esbuild | Fast, minimal config |\n| Offline | Service Worker + IndexedDB | ~5KB |\n| Search | MiniSearch (future) | ~8KB gzipped |\n\n## Keyboard Shortcuts\n\n| Key | Action |\n|-----|--------|\n| `j` / `k` | Navigate inbox up/down |\n| `o` / `Enter` | Open selected email |\n| `c` | Compose new email |\n| `r` | Reply to current
