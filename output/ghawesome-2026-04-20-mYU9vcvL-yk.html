ys that the process never sees. Zerobox injects real values only for approved hosts\n- **File access control:** Allow or deny reads and writes to specific paths\n- **Network filtering:** Allow or deny outbound traffic by domain\n- **Clean environment:** Only essential env vars (PATH, HOME, etc.) are inherited by default\n- **SDKs for Rust, TypeScript, and Python** with a consistent API across languages\n- **Cross-platform:** macOS and Linux. Windows support planned\n- **Single binary:** No Docker, no VMs, ~10ms overhead\n\n<p align=\"center\">\n  <a href=\"https://www.youtube.com/watch?v=wZiPm9BOPCg\" target=\"_blank\" title=\"Watch the video\">\n    <img alt=\"Zerobox Sandbox Flow\" src=\"packages/zerobox/assets/flow.svg\" alt=\"Watch the video\" style=\"width: 100%; max-width: 1135px;\" />\n  </a>\n</p>\n\n## Install\n\n| Channel | Command |\n| --- | --- |\n| Shell (macOS / Linux) | `curl -fsSL https://raw.githubusercontent.com/afshinm/zerobox/main/install.sh \\| sh` |\n| npm | `npm install -g zerobox` |\n| PyPI | `pip install zerobox` |\n| Cargo | `cargo install zerobox` |\n| From source | `git clone https://github.com/afshinm/zerobox && cd zerobox && ./scripts/sync.sh && cargo build --release -p zerobox` |\n\n## Quick start\n\nRun a command with no writes and no network access:\n\n```bash\nzerobox -- node -e \"console.log('hello')\"\n```\n\nAllow writes to a specific directory:\n\n```bash\nzerobox --allow-write=. -- node script.js\n```\n\nAllow network to a specific domain:\n\n```bash\nzerobox --allow-net=api.openai.com -- node agent.js\n```\n\nPass a secret to a specific host and the inner process never sees the real value:\n\n```bash\nzerobox --secret OPENAI_API_KEY=sk-proj-123 --secret-host OPENAI_API_KEY=api.openai.com -- node agent.js\n```\n\nRecord filesystem changes and undo them after execution:\n\n```bash\nzerobox --restore --allow-write=. -- npm install\n```\n\nOr record without restoring, then inspect and undo later:\n\n```bash\nzerobox --snapshot --allow-write=. -- npm install\nzerobox snapshot list\nzerobox snapshot diff <session-id>\nzerobox snapshot restore <session-id>\n```\n\nFor programmatic usage jump to the SDK that matches your stack:\n\n- [Rust SDK](crates/zerobox/README.md)\n- [TypeScript SDK](packages/zerobox/README.md)\n- [Python SDK](sdks/python/README.md)\n\n## Architecture\n\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/afshinm/zerobox/refs/heads/main/packages/zerobox/assets/sandbox-flow.png\" alt=\"Zerobox architecture\" width=\"800\" />\n</p>\n\n## Secrets\n\nSecrets are API keys, tokens, or credentials that should never be visible inside the sandbox. The sandboxed process sees a placeholder in the environment variable and the real value is substituted at the network proxy level only for requested hosts.\n\n```\nsandbox process: echo $OPENAI_API_KEY\n  -> ZEROBOX_SECRET_a1b2c3d4e5...  (placeholder)\n\nsandbox process: curl -H \"Authorization: Bearer $OPENAI_API_KEY\" https://api.openai.com/...\n  -> proxy intercepts, replaces placeholder with real key\n  -> server receives: Authorization: Bearer sk-proj-123\n```\n\nPass a secret with `--secret` and restrict it to a specific domain with `--secret-host`:\n\n```bash\nzerobox --secret OPENAI_API_KEY=sk-proj-123 --secret-host OPENAI_API_KEY=api.openai.com -- node app.js\n```\n\nWithout `--secret-host`, the secret is passed to all domains:\n\n```bash\nzerobox --secret TOKEN=abc123 -- node app.js\n```\n\nMultiple secrets with different hosts:\n\n```bash\nzerobox \\\n  --secret OPENAI_API_KEY=sk-proj-123 --secret-host OPENAI_API_KEY=api.openai.com \\\n  --secret GITHUB_TOKEN=ghp-456 --secret-host GITHUB_TOKEN=api.github.com \\\n  -- node app.js\n```\n\n> Node.js `fetch` does not respect `HTTPS_PROXY` by default. When running Node.js inside a sandbox with secrets, make sure to pass the `--use-env-proxy` argument.\n\nFor SDK code examples, see the [Rust](crates/zerobox/README.md#secrets), [TypeScript](packages/zerobox/README.md#secrets), or [Python](sdks/python/README.md#secrets) README.\n\n## Environment variables\n\nBy default only essential variables are passed to the sandbox, e.g. `PATH`, `HOME`, `USER`, `SHELL`, `TERM`, `LANG`.\n\nInherit all parent env vars:\n\n```bash\nzerobox --allow-env -- node app.js\n```\n\nInherit specific env vars only:\n\n```bash\nzerobox --allow-env=PATH,HOME,DATABASE_URL -- node app.js\n```\n\nBlock specific env vars:\n\n```bash\nzerobox --allow-env --deny-env=AWS_SECRET_ACCESS_KEY -- node app.js\n```\n\nOr set explicit variables:\n\n```bash\nzerobox --env NODE_ENV=production --env DEBUG=false -- node app.js\n```\n\n## Examples\n\n### Run AI-generated code safely\n\nRun AI-generated code without risking file corruption or data leaks:\n\n```bash\nzerobox -- python3 /tmp/task.py\n```\n\nOr allow writes only to an output directory:\n\n```bash\nzerobox --allow-write=/tmp/output -- python3 /tmp/task.py\n```\n\n### Restrict LLM tool calls\n\nEach AI tool call can be sandboxed individually. The parent agent process runs normally and only some operations are sandboxed. Full working examples:\n\n- [`examples/ai-agent-sandboxed`](examples/ai-agent-sandboxed) wraps the entire agent process with secrets so the API key is never visible\n- [`examples/ai-agent`](examples/ai-agent) uses the Vercel AI SDK with per-tool sandboxing and secrets\n- [`examples/workflow`](examples/workflow) runs [Vercel Workflow](https://useworkflow.dev/) with sandboxed durable steps\n\n### Protect your repo during builds\n\nRun a build with network access but writes confined to `./dist`:\n\n```bash\nzerobox --allow-write=./dist --allow-net -- npm run build\n```\n\nRun tests with no network and catch accidental external calls:\n\n```bash\nzerobox --allow-write=/tmp -- npm test\n```\n\n## Performance\n\nSandbox overhead is minimal, typically ~10ms and ~7MB:\n\n| Command            | Bare | Sandboxed | Overhead | Bare Mem | Sandbox Mem |\n| ------------------ | ---- | --------- | -------- | -------- | ----------- |\n| `echo hello`       | <1ms | 10ms      | +10ms    | 1.2 MB   | 8.4 MB      |\n| `node -e '...'`    | 10ms | 20ms      | +10ms    | 39.3 MB  | 39.1 MB     |\n| `python3 -c '...'` | 10ms | 20ms      | +10ms    | 12.9 MB  | 13.0 MB     |\n| `cat 10MB file`    | <1ms | 10ms      | +10ms    | 1.9 MB   | 8.4 MB      |\n| `curl https://...` | 50ms | 60ms      | +10ms    | 7.2 MB   | 8.4 MB      |\n\n<sub>Best of 10 runs with warmup on Apple M5 Pro. Run `./bench/run.sh` to reproduce.</sub>\n\n## Platform support\n\n| Platform | Backend                             | Status          |\n| -------- | ----------------------------------- | --------------- |\n| macOS    | Seatbelt (`sandbox-exec`)           | Fully supported |\n| Linux    | Bubblewrap + Seccomp + Namespaces   | Fully supported |\n| Windows  | Restricted Tokens + ACLs + Firewall | Planned         |\n\n## CLI reference\n\n| Flag                            | Example                                | Description                                                                                                  |\n| ------------------------------- | -------------------------------------- | ------------------------------------------------------------------------------------------------------------ |\n| `--allow-read <paths>`          | `--allow-read=/tmp,/data`              | Restrict readable user data to listed paths. System libraries remain accessible. Default: all reads allowed. |\n| `--deny-read <paths>`           | `--deny-read=/secret`                  | Block reading from these paths. Takes precedence over `--allow-read`.                                        |\n| `--allow-write [paths]`         | `--allow-write=.`                      | Allow writing to these paths. Without a value, allows writing everywhere. Default: no writes.                |\n| `--deny-write <paths>`          | `--deny-write=./.git`                  | Block writing to these paths. Takes precedence over `--allow-write`.                                         |\n| `--allow-net [domains]`         | `--allow-net=example.com`              | Allow outbound network. Without a value, allows all domains. Default: no network.                            |\n| `--deny-net <domains>`          | `--deny-net=evil.com`                  | Block network to these domains. Takes precedence over `--allow-net`.                                         |\n| `--env <KEY=VALUE>`             | `--env NODE_ENV=prod`                  | Set env var in the sandbox. Can be repeated.                                                                 |\n| `--allow-env [keys]`            | `--allow-env=PATH,HOME`                | Inherit parent env vars. Without a value, inherits all. Default: only PATH, HOME, USER, SHELL, TERM, LANG.   |\n| `--deny-env <keys>`             | `--deny-env=SECRET`                    | Drop these parent env vars. Takes precedence over `--allow-env`.                                             |\n| `--secret <KEY=VALUE>`          | `--secret API_KEY=sk-123`              | Pass a secret. The process sees a placeholder. The real value is injected at the proxy for approved hosts.   |\n| `--secret-host <KEY=HOSTS>`     | `--secret-host API_KEY=api.openai.com` | Restrict a secret to specific hosts. Without this, the secret is substituted for all hosts.                  |\n| `-A`, `--allow-all`             | `-A`                                   | Grant all filesystem and network permissions. Env and secrets still apply.                                   |\n| `--no-sandbox`                  | `--no-sandbox`                         | Disable the sandbox entirely.                                                                                |\n| `--strict-sandbox`              | `--strict-sandbox`                     | Require full sandbox (bubblewrap). Fail instead of falling back to weaker isolation.                         |\n| `--debug`                       | `--debug`                              | Print sandbox config and proxy decisions to stderr.                                                          |\n| `--snapshot`                    | `--snapshot`                           | Record filesystem changes during execution.                                                                  |\n| `--restore`                     | `--restore`                            | Record and restore tracked files to pre-execution state after exit. Implies `--snapshot`.                    |\n| `--snapshot-path <paths>`       | `--snapshot-path=./src`                | Paths to track for snapshots (default: cwd).                                                                 |\n| `--snapshot-exclude <patterns>` | `--snapshot-exclude=build`             | Exclude patterns from snapshots.                                                                             |\n| `-C <dir>`                      | `-C /workspace`                        | Set working directory for the sandboxed command.                                                             |\n| `-V`, `--version`               | `--version`                            | Print version.                                                                                               |\n| `-h`, `--help`                  | `--help`                               | Print help.                                                                                                  |\n\n### Snapshot subcommands\n\n| Command                                      | Description                                 |\n| -------------------------------------------- | ------------------------------------------- |\n| `zerobox snapshot list`                      | List recorded sessions.                     |\n| `zerobox snapshot diff <id>`                 | Show changes from a session.                |\n| `zerobox snapshot restore <id>`              | Restore filesystem to a session's baseline. |\n| `zerobox snapshot clean --older-than=<days>` | Remove old snapshot sessions.               |\n\n## SDKs\n\n| Language | Package | README |\n| --- | --- | --- |\n| Rust | [`zerobox` on crates.io](https://crates.io/crates/zerobox) | [crates/zerobox/README.md](crates/zerobox/README.md) |\n| TypeScript / Node | [`zerobox` on npm](https://www.npmjs.com/package/zerobox) | [packages/zerobox/README.md](packages/zerobox/README.md) |\n| Python | [`zerobox` on PyPI](https://pypi.org/project/zerobox/) | [sdks/python/README.md](sdks/python/README.md) |\n\n## License\n\nApache-2.0\n","summary":"Zerobox provides lightweight, cross‑platform process sandboxing powered by the OpenAI Codex runtime, allowing users to run arbitrary commands with strict file, network, and credential controls without the overhead of containers or VMs. It blocks all writes, network traffic, and environment variables by default, offering fine‑grained whitelists for file paths, outbound domains, and host‑specific secret injection that never exposes real credentials to the sandboxed process. The tool is available as a single binary on macOS and Linux with future Windows support, and it exposes consistent SDKs for Rust, TypeScript, and Python. Developers, security teams, and CI/CD pipelines can use Zerobox to safely execute untrusted code, test third‑party libraries, or build reproducible builds with minimal side effects.","description":"Lightweight, cross-platform process sandboxing powered by OpenAI Codex's runtime. Sandbox any command with file, network, and credential controls.","stars":513,"language":"Rust"},{"owner":"halfwhey","repo":"claudraband","url":"https://github.com/halfwhey/claudraband","readme":"<div align=\"center\">\n\n# Claudraband\n\nClaude Code for the power user\n\n[![Claude Code](https://img.shields.io/badge/dynamic/json?url=https%3A%2F%2Fraw.githubusercontent.com%2Fhalfwhey%2Fclaudraband%2Fmaster%2Fpackages%2Fclaudraband-core%2Fpackage.json&query=%24.dependencies%5B%22%40anthropic-ai%2Fclaude-code%22%5D&label=claude-code&color=blue)](https://www.npmjs.com/package/@anthropic-ai/claude-code)\n\n> Experimental: this project is still evolving as Claude Code and ACP clients change.\n\n[CLI](docs/cli.md) •\n[Library](docs/library.md) •\n[Daemon API](docs/daemon-api.md) •\n[Docker](docs/docker.md) •\n[Examples](examples/)\n\n</div>\n\n`claudraband` wraps the official Claude Code TUI in a controlled terminal so you can keep sessions alive, resume them later, answer pending prompts, expose them through a daemon, or drive them through ACP.\n\nIt provides:\n\n- Resumable non-interactive workflows. Essentially `claude -p` with session support: `cband prompt --session <session-id> 'what was the result of the research?'`\n- An HTTP daemon for remote or headless session control\n- An ACP server for editor and alternate frontend integration\n- A TypeScript library for building these workflows into your own tools\n\nCaveats\n\n- This is not a replacement for the Claude SDK. It is geared toward personal, ad-hoc usage.\n- We do not touch OAuth and we do not bypass the Claude Code TUI. You must authenticate through Claude Code, and every interaction runs through a real Claude Code session.\n\n\n## Setup\n\nRequirements:\n\n- Node.js or Bun\n- An already authenticated Claude Code\n- `tmux` for the first-class local and daemon-backed workflow\n\nInstall or run:\n\n```sh\n# one-off\nnpx @halfwhey/claudraband \"review the staged diff\"\nbunx @halfwhey/claudraband \"review the staged diff\"\n\n# install once\nnpm install -g @halfwhey/claudraband\n```\n\nThe package installs both `claudraband` and `cband`. `cband` is the recommended shorthand. The package bundles Claude Code `@anthropic-ai/claude-code@2.1.96`; set `CLAUDRABAND_CLAUDE_PATH` if you need to override the binary.\n\nDocker:\n\n```sh\nmkdir -p \"$PWD/claude-account\"\n\n# one-time onboarding for the mounted Claude account bundle\ndocker run --rm -it \\\n  -v \"$PWD/claude-account:/claude-account\" \\\n  ghcr.io/halfwhey/claudraband:latest claude\n\n# start the daemon with the same mounted account bundle\ndocker run --rm -d --name claudraband \\\n  -p 7842:7842 \\\n  -v \"$PWD/claude-account:/claude-account\" \\\n  ghcr.io/halfwhey/claudraband:latest serve\n\ncband --connect localhost:7842 \"hello from docker\"\n```\n\nIf Claude starts on a native startup permission prompt, answer it with `cband prompt --session <session-id> --select <option>`. For more container details, see [docs/docker.md](docs/docker.md).\n\n## Quick Start\n\nThe two first-class paths are local `tmux` sessions and daemon-backed sessions.\n\n### Local persistent sessions\n\n```sh\ncband \"audit the last commit and tell me what looks risky\"\ncband sessions\ncband prompt --session <session-id> \"keep going\"\ncband prompt --session <session-id> --select 2\ncband watch --session <session-id>\ncband interrupt --session <session-id>\n```\n\n### Daemon-backed sessions\n\n```sh\ncband serve --host 127.0.0.1 --port 7842\ncband --connect localhost:7842 \"start a migration plan\"\ncband attach <session-id>\ncband prompt --session <session-id> --select 2\n```\n\nThe daemon defaults to using `tmux` as the terminal runtime, just like the local path. Use `--connect` only when creating a new daemon-backed session; after that, `prompt`, `send`, `watch`, `interrupt`, `attach`, and `sessions` route through the recorded live owner automatically.\n\n## Experimental xterm.js Backend\n\n`--backend xterm` exists for local or daemon use, but it is experimental and slower than `tmux`. Use it when you need a headless fallback, not as the default path for long-lived interactive work. See [docs/cli.md](docs/cli.md) for current caveats and backend behavior.\n\n## ACP\n\nUse ACP when another tool wants to drive Claude through `claudraband`.\n\n```sh\ncband acp --model opus\n\n# example: toad\nuvx --from batrachian-toad toad acp 'cband acp -c \"--model haiku\"'\n```\n\nEditor and ACP client support varies by frontend, but `claudraband` itself supports session follow and resume through ACP.\n\n## Session Model\n\nLive sessions are tracked in `~/.claudraband/`.\n\n- `cband sessions` lists live tracked sessions\n- `prompt --session <id>` and `send --session <id>` auto-resume a saved session, even when it is no longer live\n- `watch`, `interrupt`, `status`, `last` target a session by id\n- `attach` only works on live sessions\n- `sessions close ...` closes live tracked sessions, either local or daemon-backed\n\n## Examples\n\n### Self-interrogation\n\nClaude can interrogate an older Claude session and justify the choices it made.\n\n![Claude interrogating an older Claude session through claudraband](assets/self-interrogate.png)\n\n### Toad via ACP\n\nToad can use `claudraband acp` as an alternative frontend for Claude Code.\n\n![Toad using claudraband ACP as an alternative frontend](assets/toad-acp.png)\n\nThat UI is still backed by a real Claude Code pane underneath.\n\n![Backing Claude Code pane for the Toad ACP session](assets/toad-claude-pane.png)\n\n### Zed via ACP\n\nZed can also use `claudraband acp` as an alternative frontend.\n\n![Zed using claudraband ACP as an alternative frontend](assets/zed-acp.png)\n\n## Library\n\nRunnable TypeScript examples live in [`examples/`](examples/):\n\n- [`examples/code-review.ts`](examples/code-review.ts)\n- [`examples/multi-session.ts`](examples/multi-session.ts)\n- [`examples/session-journal.ts`](examples/session-journal.ts)\n\nFor the full API, see [docs/library.md](docs/library.md). For CLI details, see [docs/cli.md](docs/cli.md). For raw daemon endpoints, see [docs/daemon-api.md](docs/daemon-api.md).\n\n## Cheat Sheet\n\n```sh\n# install or run once\nnpx @halfwhey/claudraband \"review the staged diff\"\nbunx @halfwhey/claudraband \"review the staged diff\"\nnpm install -g @halfwhey/claudraband\n\n# local persistent sessions\ncband \"audit the last commit\"\ncband sessions\ncband sessions close --all # close all claudraband controlled sessions\ncband prompt --session <session-id> \"keep going\"\ncband send --session <session-id> \"fire and forget\"\ncband watch --session <session-id>\ncband interrupt --session <session-id>\ncband status --session <session-id>\ncband last --session <session-id>\n\n# answer pending prompts\ncband prompt --session <session-id> --select 2\ncband prompt --session <session-id> --select 3 \"xyz\"\n\n# daemon mode\ncband serve --host 127.0.0.1 --port 7842\ncband --connect localhost:7842 \"start a migration plan\"\ncband attach <session-id>\n\n# ACP\ncband acp --model opus\n```\n","summary":"Claudraband is a wrapper around the Claude Code terminal UI that turns interactive Claude sessions into long‑lived, resumable, and scriptable workflows. It exposes a command‑line interface, a TypeScript library, an HTTP daemon, and an ACP server so users can start, pause, resume, and programmatically drive Claude interactions from other tools or headless environments. Key capabilities include tmux‑backed persistent sessions, remote control via a daemon on any port, graceful prompt handling such as selecting options, and integration hooks for editors or automation frameworks. The project is ideal for power users, developers, and researchers who want to embed Claude code generation into custom pipelines or IDE workflows without building a full SDK from scratch.","description":"Claude Code for the Power User","stars":266,"language":"TypeScript"},{"owner":"donghaxkim","repo":"react-rewrite","url":"https://github.com/donghaxkim/react-rewrite","readme":"# react-rewrite\n\n`react-rewrite` lets you edit a React app visually while it is running locally, then automatically writes those changes back to the source files in your project.\n\nIt is built for local development and works by opening a proxy in front of your dev server and injecting an overlay into the page.\n\n## Demo\n![React Rewrite GIF Converter](https://github.com/user-attachments/assets/098e564b-d9a9-411d-8ba0-5cf6109bc2e4)\n\nfull demo:\nhttps://x.com/imdonghakim/status/2038230475894899119\n\n## Fastest path\n\nYou do not need to download or clone this repo.\n\nFrom the root of your React app:\n\n```bash\nnpm install -D react-rewrite-cli\n```\n\nStart your dev server, then in a second terminal run:\n\n```bash\nnpx react-rewrite\n```\n\nIf you want to try it without installing first:\n\n```bash\nnpx react-rewrite-cli@latest\n```\n\n## What it does\n\n- Select an element and inspect its component name, file path, and line number\n- Edit supported Tailwind-based layout, spacing, size, typography, and color properties\n- Double-click text to edit it inline\n- Copy, paste, and duplicate elements\n- Delete elements\n- Reorder sibling elements\n- Stage multiple changes and apply them with **Confirm**\n- Undo in-progress canvas changes and review applied changes in the changelog\n\n## Requirements\n\n- Node.js 20+\n- A React project (18+)\n- A running development server\n- Supported app setups: Next.js, Vite, and Create React App\n\nTailwind CSS is recommended if you want to use the property editor. Text editing and some structural actions do not depend on Tailwind.\n\n## Install\n\nRun this in the root of the React app you want to edit:\n\n```bash\nnpm install -D react-rewrite-cli\n```\n\nIf you don't want to install it first, you can also run it directly with `npx react-rewrite-cli@latest`.\n\n## Quick start\n\n1. Start your React dev server as usual.\n2. In a second terminal, from the same project root, run:\n\n```bash\nnpx react-rewrite\n```\n\nIf auto-detection does not pick the right port, pass it explicitly:\n\n```bash\nnpx react-rewrite 3000\n```\n\nThe tool opens a local proxy in your browser, shows the editing overlay, and writes confirmed changes back into files inside your project.\n\n## Basic flow\n\n1. Click an element to inspect and select it.\n2. Edit properties in the sidebar, drag to reorder where supported, or double-click text to change copy.\n3. Review pending changes in the UI.\n4. Click **Confirm** to apply them to your source files.\n\n## CLI options\n\n```text\nreact-rewrite [options] [port]\n\nArguments:\n  port           Dev server port override\n\nOptions:\n  --no-open      Don't open browser automatically\n  --host <host>  Dev server host (default: \"localhost\")\n  --verbose      Enable debug logging\n```\n\n## Shortcuts\n\n| Shortcut | Action |\n| --- | --- |\n| `Ctrl/Cmd + C` | Copy selected element |\n| `Ctrl/Cmd + V` | Paste copied element as sibling |\n| `Ctrl/Cmd + D` | Duplicate selected element in place |\n| `Delete / Backspace` | Remove selected element |\n| `Ctrl/Cmd + Z` | Undo canvas changes |\n| `Ctrl/Cmd + Shift + L` | Toggle changelog |\n| `Ctrl/Cmd + Click` | Follow links through the overlay |\n| Double-click text | Edit text inline |\n\n## Notes\n\n- Run `react-rewrite` from your app's root directory so it can detect the framework and safely resolve file paths.\n- It only works against development builds, not production builds.\n- Only files inside the current project are eligible for writes.\n\n## Development\n\nTo work on this repository itself:\n\n```bash\npnpm install\npnpm build\npnpm test -- --run\n```\n\nFor iterative CLI development:\n\n```bash\npnpm dev\n```\n\nYou will still need a separate supported React app running locally to test the tool end to end.\n\n## Project structure\n\n```text\npackages/\n  cli/      CLI, proxy server, and source transforms\n  overlay/  Injected browser overlay\n  shared/   Shared TypeScript types\n```\n\n## License\n\n[MIT](./LICENSE)\n","summary":"`react-rewrite` is a local‑development tool that lets you edit a running React application visually, while automatically writing confirmed changes back into your source files. It injects an overlay over the dev server and offers element inspection, inline text editing, copy/paste, duplicate, delete, reordering, and a set of Tailwind‑style property editors, with a changelog and undo support for staged changes. The utility supports Next.js, Vite, and Create React App projects (Node 20+ and React 18+), making it ideal for developers who want rapid, visual tweaks that sync directly to their codebase.","description":"visual editor for running react apps, edit UI elements live directly changes source files. no ai.","stars":263,"language":"TypeScript"},{"owner":"simple10","repo":"agents-observe","url":"https://github.com/simple10/agents-observe","readme":"# Agents Observe\n\nReal-time observability dashboard for Claude Code agents.\n\nIncludes powerful filtering, searching, and visualization of multi-agent sessions.\n\n<p align=\"center\">\n  <a href=\"https://raw.githubusercontent.com/simple10/agents-observe/videos/docs/assets/dashboard.gif\">\n    <img src=\"https://raw.githubusercontent.com/simple10/agents-observe/videos/docs/assets/dashboard.gif\" alt=\"Claude Observe Dashboard Demo\" />\n  </a>\n</p>\n\n<p>\n<a href=\"https://raw.githubusercontent.com/simple10/agents-observe/videos/docs/assets/demo.mp4\">Demo video</a>\n</p>\n\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/simple10/agents-observe/main/docs/assets/dashboard2.png\" alt=\"Claude Observe Dashboard Screenshot - Expanded Row\" />\n</p>\n\n## Quick Start\n\nInstall as a `claude code` plugin:\n\n```bash\n# Add this repo as a marketplace\nclaude plugin marketplace add simple10/agents-observe\n\n# Install the plugin\nclaude plugin install agents-observe\n\n# Then just run claude\n# The plugin will auto start the MCP server and capture events\nclaude\n\n# Use the /observe skill in claude to check status, restart the server, etc.\n> /observe status\n> /observe debug\n> /observe logs\n> /observe restart\n\n# Open the dashboard UI in a browser\nopen http://localhost:4981\n```\n\nDefault dashboard URL: <http://localhost:4981>\n\n### Prerequisites\n\n- [Docker](https://www.docker.com/) (required — the server runs as a container)\n- [Node.js](https://nodejs.org/) (required — hook scripts run via `node`)\n\nIf docker or node are not installed on your host, the plugin will fail to properly load.\n\nUse the `/observe debug` claude command to help troubleshoot and fix installation issues.\n\n## Plugin Skills\n\n| Skill | Description |\n|-------|-------------|\n| `/observe` | Open the dashboard URL and check if the server is running |\n| `/observe status` | Show server health, version, runtime, and config details |\n| `/observe start` | Start the server |\n| `/observe stop` | Stop the server |\n| `/observe restart` | Restart the server |\n| `/observe logs` | Show recent Docker container logs |\n| `/observe debug` | Diagnose server issues (health, docker logs, mcp.log, cli.log) |\n\n## Why observability matters\n\nWhen Claude Code runs autonomously — spawning subagents, calling tools, reading files, executing commands — you have no visibility into what's actually happening. The terminal shows a fraction of the activity. Subagents are invisible. Tool calls blur together. And when something goes wrong three agents deep in a parallel execution, you're left reading through logs after the fact.\n\nClaude Observe captures every hook event as it happens and streams it to a live dashboard. You see exactly what each agent is doing, which tools it's calling, what files it's touching, and how subagents relate to their parents. In real time.\n\nThis matters because:\n\n- **Multi-agent work is opaque.** A coordinator spawns a code reviewer, a test runner, and a documentation agent in parallel. Without observability, you only see the final result. With it, you watch each agent work and catch problems as they happen.\n- **Tool calls are the ground truth.** The assistant's text output is a summary. The actual tool calls — the Bash commands, file reads, edits, grep patterns — tell you what Claude is really doing. Claude Observe shows you both.\n- **Debugging is time travel.** When a subagent makes a bad edit or runs a destructive command, you need to trace back through the exact sequence of events. The event stream gives you that timeline with full payloads.\n- **Sessions are ephemeral, but patterns aren't.** By capturing events across sessions, you can see how agents behave over time, which tools they favor, and where they get stuck.\n\n## What you can do\n\n- Watch tool calls stream in as they happen (PreToolUse → PostToolUse with results)\n- See the full agent hierarchy — which subagent was spawned by which parent\n- Filter by agent, tool type, or search across all events\n- Expand any event to see the full payload, command, and result\n- Click timeline icons to jump to specific events in the stream\n- Browse historical sessions with human-readable names (e.g., \"twinkly-hugging-dragon\")\n\n## Architecture\n\n```\nClaude Code Hooks  →  observe_cli.mjs  →  API Server (SQLite)  →  React Dashboard\n    (dumb pipe)         (HTTP POST)        (parse + store)        (WebSocket live)\n```\n\nThe hook script is a dumb pipe — it reads the raw event from stdin, adds the project name, and POSTs it to the server. The server parses events, stores agent metadata (name, type, parentage), and forwards events to subscribed WebSocket clients. The React dashboard derives all agent state (status, event counts, timing) from the event stream — the server is a dumb store.\n\n## Standalone Installation\n\n> For development or running without the plugin. If you installed via the plugin above, skip this section.\n\n### 1. Clone and install dependencies\n\n```bash\ngit clone https://github.com/simple10/agents-observe.git agents-observe\ncd agents-observe\n\n# Install just if needed\nbrew install just\n\n# Start the docker container\njust start\n\n# Or start local dev servers\njust install\njust dev\n```\n\nSee [justfile](./justfile) for additional commands.\n\n### 2. Configure Claude Code hooks\n\nCopy the hooks from `.claude/settings.json` into your project's settings.in this repo into your target project's Claude Code settings:\n\n- **Project-level** (recommended): `.claude/settings.json` in your project root\n- **User-level** (all projects): `~/.claude/settings.json`\n\nUpdate the `$CLAUDE_PROJECT_DIR` paths to point to your agents-observe install location.\n\n**Environment variables set in the config:**\n\n| Variable | Default | Description |\n|----------|---------|-------------|\n| `AGENTS_OBSERVE_PROJECT_SLUG` | (auto-detected) | Project slug shown in the dashboard URL. If not set, derived from the session transcript path. |\n| `AGENTS_OBSERVE_API_BASE_URL` | `http://127.0.0.1:4981/api` | Full URL for the events endpoint |\n\n### 3. Verify it works\n\n```bash\n# Check the server is running\njust health\n\n# Send a test event\njust test-event\n```\n\nNavigate to **<http://localhost:5174>** (dev) or **<http://localhost:4981>** (Docker). You should see the test event appear. Start a Claude Code session in your configured project and events will stream in automatically.\n\n## Standalone Commands\n\nIf you have [just](https://github.com/casey/just) installed:\n\n```bash\n# Development:\njust install      # Install all dependencies\njust dev          # Start server + client in dev mode (hot reload)\njust test         # Run all tests (server + client)\njust test-event   # Send a test event to the server\njust fmt          # Format all source files\n\n# Server (Docker):\njust build        # Build the Docker image locally\njust start        # Start the server (same path as plugin MCP)\njust stop         # Stop the server\njust restart      # Restart the server\njust logs         # Follow Docker container logs\njust start-local  # Start server locally without Docker\n\n# Utilities:\njust health              # Check server health\njust health              # Check server health\njust db-reset            # Delete the events database\njust cli <command>       # Run CLI directly (hook, health, start, stop, restart, logs)\njust open                # Open the dashboard in browser\n```\n\n## Project structure\n\n```text\napp/\n  server/                    # Node server — Hono routes, SQLite, WebSocket\n  client/                    # React 19 + shadcn dashboard\nhooks/\n  hooks.json                 # Plugin hook definitions\n  scripts/                   # CLI, MCP server, and shared libs\nskills/                      # /observe skills\nscripts/                     # Release tooling\ntest/                        # Integration tests\ndocs/                        # Plans and demo assets\n.claude-plugin/              # Plugin + marketplace manifests\n.env                         # Env config options used by cli & local server\n.mcp.json                    # MCP server configuration\nDockerfile                   # Production container image\ndocker-compose.yml           # Container orchestration - not used by the plugin\njustfile                     # Task runner commands\nstart.mjs                    # Local server entrypoint (non-Docker)\nvitest.config.ts             # Test configuration\npackage.json                 # Version metadata and workspace scripts\n```\n\n## How it works\n\n**Hooks** fire on every Claude Code event (tool calls, prompts, stops, subagent lifecycle). The hook script reads the raw event from stdin, adds the project name, and POSTs it to the server. If the server needs additional data (like the session's human-readable slug), it responds with a request — the hook reads it from the local transcript file and sends it back.\n\n**Server** receives raw events, extracts structural fields (type, tool name, agent ID), stores agent metadata (name, description, type, parentage), and saves everything in SQLite. Events are forwarded to WebSocket clients subscribed to the relevant session — each browser tab only receives events for the session it's viewing. The server tracks session status (active/stopped) but does not track agent status.\n\n**Client** fetches events via REST API on initial load, then receives real-time updates via WebSocket (events are appended to the local cache — no refetching). All agent state (status, event counts, timing) is derived from the event stream. Tool events are deduped client-side (PreToolUse + PostToolUse merged into a single row). The emoji icon mapping and summary generation are editable config files.\n\n### Dev vs Production\n\nIn dev mode, the client and server run as separate processes with separate ports.\n\nIn production or docker mode, the client is bundled and served by the server. Both the API and dashboard are served from the same process and port.\n\nBoth local dev and Docker flows default to using the same sqlite database in ./data. The database is auto created as needed.\n\n## Troubleshooting\n\n**Docker not running?**\n\nThe plugin requires Docker to run the server. Make sure Docker Desktop (or the Docker daemon) is running, then restart Claude Code.\n\n**Port 4981 in use?**\n\nThe server auto-assigns a free port if 4981 is taken. To explicitly set a port, add `AGENTS_OBSERVE_SERVER_PORT=<port>` to your environment or `.env` file.\n\n**Plugin not capturing events?**\n\nRun `/observe debug` to diagnose. It checks server health, Docker container logs, MCP logs, and CLI logs. You can also run `/observe status` for a quick health check.\n\n**Events not appearing in the dashboard?**\n\n1. **Is the server running?** Run `just health` to check.\n2. **Is the hook script configured?** Copy the hooks from `.claude/settings.json` into your project's settings.\n3. **Is `AGENTS_OBSERVE_PROJECT_SLUG` set?** If `AGENTS_OBSERVE_PROJECT_SLUG` is not set, the project is auto-detected from the session transcript path.\n4. **Can the hook reach the server?** Run `just test-event` — if the event appears in the dashboard, the server is reachable.\n\n**WebSocket disconnected?**\n\nThe client reconnects automatically every 3 seconds if the WebSocket connection drops. You'll see \"Disconnected\" in the sidebar footer. Events received during reconnection will appear once the connection is restored and the events are refetched.\n\n**Database issues?**\n\nRun `just db-reset` to delete the SQLite database and start fresh (stops the server, deletes the db, restarts). The database is auto-created on the next server start.\n\n## ROADMAP\n\n- [ ] Add support for Codex\n- [ ] Add support for OpenClaw\n- [ ] Add support for pi-code agents\n\n--\n\n## Reference\n\n- [Claude Hooks](https://code.claude.com/docs/en/hooks.md) - official list of currently supported hooks\n\n## Related Projects\n\n- [Agent Super Spy](https://github.com/simple10/agent-super-spy) - full observability stack for agents, can be run locally or remotely\n- [Multi-Agent Observability System](https://github.com/disler/claude-code-hooks-multi-agent-observability) - inspired this project\n- [Claude DevTools](https://github.com/matt1398/claude-devtools) - visualization for claude session files, requires running on local machine\n\n## License\n\nMIT\n","summary":"Agents‑Observe is a real‑time observability dashboard for Claude Code’s multi‑agent workflows. It captures every agent event—including tool calls, file accesses, and sub‑agent hierarchy—and streams them into a web UI that supports filtering, searching, and detailed payload inspection. The plugin can be installed via the Claude CLI, automatically spins up a Docker‑based server, and provides helper commands (/observe status, logs, debug, restart) to manage the service. Developers and ops teams running autonomous Claude agents will benefit from this instant visibility, making debugging, performance tuning, and audit of nested agent activity far more efficient.","description":"Real-time observability of claude code sessions & multi-agents.","stars":486,"language":"TypeScript"},{"owner":"Realman78","repo":"Kiyeovo","url":"https://github.com/Realman78/Kiyeovo","readme":"# Kiyeovo\n\n> Beta notice: this is the beta version of Kiyeovo. Expect rough edges, missing polish, and behavior changes before the first full release.\n> Tested on: Linux (Debian, Ubuntu, Lubuntu, EndeavourOS) and macOS.\n\nKiyeovo is a decentralized peer-to-peer messenger.\n\n- realtime direct messages are end-to-end encrypted\n- messages can fall back to offline delivery when the other side is not online\n- `fast` mode is for normal day-to-day use: lower latency, relays, and 1:1 audio/video calling\n- `anonymous` mode is for Tor-routed messaging. Better anonymity, but slower and less convenient\n- group chats, encrypted file transfer, and trusted profile import/export\n- no central account or message server; you can use the default bootstrap/relay setup or self-host (see the [guide](#bootstrap-and-relay-setup))\n\nFor technical readers, contributors, and coding agents, start with [Kiyeovo_desktop_technical_documentation.md](./Kiyeovo_desktop_technical_documentation.md). That is the source-of-truth architecture overview.\n\n\n<img width=\"1274\" height=\"739\" alt=\"image\" src=\"https://github.com/user-attachments/assets/787f23da-9317-4e70-a44b-cdf504163e8f\" />\n\n\n## Beta status\n\nThe purpose of this beta release is to gain feedback on the core app functionality and feel.\n\nThe full version will come with:\n\n- big UX improvements\n- group audio/video calls (fast mode)\n- screen sharing in calls (fast mode)\n- performance improvements\n- security hardening\n- easier self-hosted infrastructure setup\n- local API interface for agents and external tools\n- emojis 🪐 *(Added 12th of April)*\n- Platform-specific installers\n\n## Quick start\n\n> If you want to try out the beta without self-hosting immediately, you can do that by connecting to one of my nodes listed [here](#connect-to-already-existing-nodes).\n\n> There is also a tutorial [here](https://marindedic.com/blog/p2p-messenger/), but you can just follow the steps below\n\nRequirements for running:\n\n- Node.js 20+\n- npm\n\nClone the repo:\n\n```\ngit clone https://github.com/Realman78/Kiyeovo.git\ncd Kiyeovo\n```\n\n### Local non-dev run\n\n```bash\nnpm run setup\nnpm run start:local\n```\n\n`npm run setup` installs dependencies and sets up Tor. If you only plan to use fast mode, `npm install` is enough.\n\n### Local development / testing \n\n```bash\nnpm run setup\nDEBUG_MODE=true npm run dev\n```\n\n> You can omit `DEBUG_MODE=true` if you don't plan on reporting any bugs\n\nTechnical detail: In the beta version, `npm run dev` starts Electron with `--no-sandbox`.\n\n### Scrypt note (optional)\n\nIf your machine is not low-end, consider increasing `IDENTITY_SCRYPT_N` and `PROFILE_SCRYPT_N` in [src/core/constants.ts](./src/core/constants.ts) for stronger protection against local brute-force password attacks, but at the cost of slower unlock/import.\n\n## Bootstrap and relay setup\n\n### Fast mode\n\n1. Install dependencies\n\n```bash\nROLE=bootstrap npm install\n```\n\n2. Start a bootstrap node:\n\n```bash\nBOOTSTRAP_NETWORK_MODE=fast \\\nBOOTSTRAP_ANNOUNCE_ADDRS=/ip4/YOUR_PUBLIC_IP/tcp/9000 \\\nnpm run bootstrap\n```\n\nThe fast bootstrap listener defaults to `0.0.0.0:9000`. If you need a different local port, set `BOOTSTRAP_LISTEN_ADDRESS`.\n\n3. Start a relay node (if you already ran `ROLE=bootstrap npm install`):\n\n```bash\nRELAY_ANNOUNCE_ADDRS=/ip4/YOUR_PUBLIC_IP/tcp/4002 \\\nnpm run relay\n```\n\n4. Make sure your firewall rules allow TCP on:\n\n```text\n9000  # bootstrap\n4002  # relay\n```\n\n5. You should be all set now. You can add the addresses to the list of known bootstrap and/or relay addresses in Kiyeovo by clicking on the network status text in the sidebar header - a dialog shall open up:\n\n```text\n/ip4/YOUR_PUBLIC_IP/tcp/9000/p2p/<BOOTSTRAP_PEER_ID>\n/ip4/YOUR_PUBLIC_IP/tcp/4002/p2p/<RELAY_PEER_ID>\n```\n\n\n### Anonymous mode\n\n1. Run the setup script\n\n```bash\nROLE=bootstrap npm run setup\n```\n\n2. Install and start a Tor daemon on the host. Example on linux:\n\n```\napt update\napt install tor\nsystemctl start tor\nsystemctl enable tor # if you want to enable it on startup\nsystemctl status tor # verify it's running\n```\n\n3. Configure a hidden service that forwards the public onion port to the local bootstrap listener. Example on linux - add the below config to `/etc/tor/torrc`:\n\n```conf\nHiddenServiceDir /var/lib/tor/kiyeovo-bootstrap/ # you will find your onion hostname here later\nHiddenServicePort 9000 127.0.0.1:9001\n```\n\nAfter changes, restart the tor service: `systemctl restart tor`\n\nFind your onion host: `cat /var/lib/tor/kiyeovo-bootstrap/hostname`\n\n4. Start a bootstrap node in anonymous mode:\n\n```bash\nBOOTSTRAP_NETWORK_MODE=anonymous \\\nBOOTSTRAP_LISTEN_ADDRESS=/ip4/127.0.0.1/tcp/9001 \\\nBOOTSTRAP_ANNOUNCE_ADDRS=/onion3/YOUR_ONION_HOST:9000 \\\nnpm run bootstrap\n```\n\nIf you host both fast and anonymous bootstrap nodes on the same machine, keep fast mode on `0.0.0.0:9000` and anonymous mode on local `127.0.0.1:9001`.\n\n5. The setup is done. Now you can add the address to the list of known bootstrap addresses in Kiyeovo by clicking on the network status text in the sidebar header - a dialog shall open up:\n\n```text\n/onion3/YOUR_ONION_HOST:9000/p2p/<BOOTSTRAP_PEER_ID>\n```\n\nThe relay is not needed in anonymous mode.\n\n### (Optional) STUN/TURN for calls in Fast mode\n\nCalls are currently fast-mode direct 1:1 calls.\n\nIf you want to self-host calls, a simple path is outlined below. Keep in mind, depending on your and the other party's router setting, you might not even need the TURN server.\n\n1. Set up a TURN server such as coturn. Example on linux:\n    - install coturn with `apt install coturn`\n    - run `sed -i 's/^#TURNSERVER_ENABLED=.*/TURNSERVER_ENABLED=1/' /etc/default/coturn`\n    - add the configuration below to `/etc/turnserver.conf`:\n```\nlistening-port=3478\nfingerprint\nlt-cred-mech\nrealm=kiyeovo\nuser=USERNAME:PASSWORD\nexternal-ip=PUBLIC_IP\nmin-port=49160\nmax-port=49200\nno-cli\n```\n\n2. Set up firewall (if firewall is enabled)\n    - ALLOW TCP and UDP on port 3478\n    - ALLOW UDP on port range 49160:49200.\n    - From before: if you are running bootstrap and relay, ALLOW TCP on ports 9000 (bootstrap) and 4002 (relay)\n\n3. Run `systemctl enable --now coturn`\n\n4. The servers should be running now. You can add the server addresses inside Kiyeovo by clicking on the network status text in the sidebar header - a dialog shall open up:\n\nYou can add multiple ICE servers. Kiyeovo supports `stun`, `turn`, and `turns` entries.\n\n## Technical note\n\nThe desktop app is built with Electron, React, and libp2p.\n\n## How this differs from similar solutions (roughly)\n\n> This comparison reflects the current beta version. The final version differences may differ.\n\n- Briar: Briar runs everything over Tor and also supports syncing via Bluetooth, Wi-Fi or memory cards. Kiyeovo instead has two separate, and completely isolated, network modes -> Fast (clearnet) and Anonymous (Tor) - you can choose between performance (and additional features) and anonymity\n- Session: Session uses its own network of nodes to send and store messages. Kiyeovo uses pure libp2p and stores offline messages in the DHT - simpler, but not guaranteed \"always-on\".\n- Tox: Tox runs as one global P2P network. Kiyeovo splits things into two separate networks depending on the mode.\n- Ricochet: Ricochet is simple Tor-based messaging. Kiyeovo is more full-featured, with groups, offline messages, file transfer, and calls (in fast mode).\n\n## Connect to already existing nodes\n\nThese nodes will be shut down on April 19th 2026.\n\n1. Frankfurt\n    - Anonymous mode Bootstrap: /onion3/rnuq4snx4mpxu26z5t6kkimba2gkjmvuqbc3p5vkgwzafc346fxwb3yd:9000/p2p/12D3KooWM8ZWvVdr2SGo7S2zZ2mCfJoeg6YH6x9KYnM1adzq56Uu\n    - Fast mode Bootstrap: /ip4/188.166.161.63/tcp/9000/p2p/12D3KooWBWfaXd9YLkA2VwRAggsiG3ccTmEwGCdn7uJc3fE8qai9\n    - Relay: /ip4/188.166.161.63/tcp/4002/p2p/12D3KooWLYvrbj3mXSM32Jfie9apftrNsBsJN2Ewv1EPWsGY5nei\n    - STUN: stun:188.166.161.63\n    - TURN: turn:188.166.161.63:3478?transport=udp kiyeovo:marinparin\n\n2. Amsterdam\n    - Anonymous mode Bootstrap: /onion3/iwear2jljjwcjunmwipd5ibusoifbxgreir6brfuot3imk37yor2sfad:9000/p2p/12D3KooWQ5ezKjZ1zYqCsHYdh2tqZ9rxXmXb3URPVrLbCqCWDdBY\n    - Fast mode Bootstrap: /ip4/68.183.15.8/tcp/9000/p2p/12D3KooWEL2tNuaYNxKE9fh4KufvW9TnjzmnS1xBFdbUYtq8N5qx\n    - Relay: /ip4/68.183.15.8/tcp/4002/p2p/12D3KooWRpVU72wHWFEQidYtNhGNvWNHq4rYgk4a8oy2gsEDitcU\n    - STUN: stun:68.183.15.8:3478\n    - TURN: turn:68.183.15.8:3478?transport=udp kiyeovo:marinparin\n\n3. New York\n    - Anonymous mode Bootstrap: /onion3/yzwpxyhhydqka3zbip4om6ufhsbhoyp4bvzakimtj6eeqothaybrayyd:9000/p2p/12D3KooWDXLMQhUJQ3CQzhkQTwN8PiCYvdACfUXmV4tvdy79SfLp\n    - Fast mode Bootstrap: /ip4/157.230.222.64/tcp/9000/p2p/12D3KooWRDGQrpo1rFBLuhjzkj5dX89u1UuRizKYcYtdwop3rc8V\n    - Relay: /ip4/157.230.222.64/tcp/4002/p2p/12D3KooWBEEs9DJiBSExDYdT92FBeDuAnABrBQgN9WB6k98UAUPF\n    - STUN: stun:157.230.222.64:3478\n    - TURN: turn:157.230.222.64:3478?transport=udp kiyeovo:marinparin\n\n4. San Francisco\n    - Anonymous mode Bootstrap: /onion3/pxp6m3daukt7yrn7h76vryazz3azurwspnc75rtduphyo5qua77g7iqd:9000/p2p/12D3KooWPoLM2YyAgfACU27Dds7ELL4DwabrsUH39kdjv9SKRuFw\n    - Fast mode Bootstrap: /ip4/143.198.137.240/tcp/9000/p2p/12D3KooWL9V168N9rzJ2HP5aWKdJMUDtbYWca5ojDtELWWggddVu\n    - Relay: /ip4/143.198.137.240/tcp/4002/p2p/12D3KooWKx9xPFweD6isahRpjkNR6BxEtJKpbZvvfskb44E8q83x\n    - STUN: stun:143.198.137.240:3478\n    - TURN: turn:143.198.137.240:3478?transport=udp kiyeovo:antique_cash_123\n","summary":"Kiyeovo is a decentralized, peer‑to‑peer messenger that delivers real‑time, end‑to‑end encrypted direct messages and supports offline delivery when a peer is offline. It offers a fast mode for everyday chatting with low‑latency relays and 1:1 audio/video calls, and an anonymous Tor‑routed mode for greater privacy at the cost of speed. In addition to individual chats, Kiyeovo supports encrypted group conversations, file transfers, and trusted profile import/export without relying on a central server.\n\nThe project is ideal for privacy‑savvy users who want secure, self‑hostable communication, as well as developers and tech enthusiasts looking to experiment with decentralized messaging protocols and contribute to its evolving architecture.","description":null,"stars":38,"language":"TypeScript"},{"owner":"sleep3r","repo":"mtproto.zig","url":"https://github.com/sleep3r/mtproto.zig","readme":"<div align=\"center\">\n\n# mtproto.zig\n\n**High-performance Telegram MTProto proxy written in Zig**\n\nDisguises Telegram traffic as standard TLS 1.3 HTTPS to bypass network censorship.\n\n**177 KB binary · Sub-1 MB RAM · Boots in <10 ms · Zero dependencies**\n\n[![License: MIT](https://img.shields.io/badge/license-MIT-blue.svg)](LICENSE)\n[![Zig](https://img.shields.io/badge/zig-0.15.2-f7a41d.svg?logo=zig&logoColor=white)](https://ziglang.org)\n[![Platform](https://img.shields.io/badge/platform-linux-blueviolet.svg?logo=linux&logoColor=white)](#install)\n\n</div>\n\n---\n\n<p align=\"center\">\n<a href=\"#why-this-one\">Why this one?</a> · <a href=\"#install\">Install</a> · <a href=\"#update\">Update</a> · <a href=\"#other-mtbuddy-commands\">Commands</a> · <a href=\"#upstream-routing\">Routing</a> · <a href=\"#configuration\">Config</a> · <a href=\"#monitoring-dashboard\">Dashboard</a> · <a href=\"#building-locally\">Build</a> · <a href=\"#docker\">Docker</a> · <a href=\"#troubleshooting--stuck-on-updating\">FAQ</a>\n</p>\n\n---\n\n## Why this one?\n\nMost MTProto proxies are large, dependency-heavy, and use lots of memory. This one is different:\n\n| Proxy | Language | Binary | Baseline RSS | Startup | Dependencies |\n|---|---|---:|---:|---|---|\n| **mtproto.zig** | Zig | **177 KB** | **0.75 MB** | **< 10 ms** | **0** |\n| Official MTProxy | C | 524 KB | 8.0 MB | < 10 ms | openssl, zlib |\n| Telemt | Rust | 15 MB | 12.1 MB | ~ 5-6 s | 423 crates |\n| mtg | Go | 13 MB | 11.6 MB | ~ 30 ms | 78 modules |\n| MTProtoProxy | Python | N/A | ~ 30 MB | ~ 300 ms | python3, cryptography |\n| JSMTProxy | Node.js | N/A | ~ 45 MB | ~ 400 ms | nodejs, openssl |\n\n## Why Zig?\n\nWe chose Zig because it provides the raw performance and micro-footprint of C, but without the memory unsafety or build-system nightmares:\n- **No arbitrary allocations:** All connection slots and buffers are pre-allocated on startup. There is no garbage collector dropping frames under heavy load.\n- **Hermetic cross-compilation:** Run `zig build` on macOS, and out comes a statically linked Linux binary. No Docker, no `glibc` version mismatches.\n- **Comptime:** Costly operations like protocol definition mapping, endianness conversions, and bilingual string lookup for `mtbuddy` are resolved during compilation, giving instant startup times.\n\nIt also ships more evasion techniques than any of the above:\n\n| Technique | What it does |\n|---|---|\n| **Fake TLS 1.3** | Connections look like normal HTTPS to DPI |\n| **DRS** | Mimics Chrome/Firefox TLS record sizes |\n| **Zero-RTT masking** | Local Nginx serves real TLS responses to active probes, defeating timing analysis |\n| **TCPMSS=88** | Fragments ClientHello across 6 TCP packets, breaking DPI reassembly |\n| **nfqws TCP desync** | Sends fake packets + TTL-limited splits to confuse stateful DPI |\n| **Split-TLS** | 1-byte Application records to defeat passive signatures |\n| **VPN tunnel** | Routes through WireGuard/AmneziaWG using explicit socket policy routing (SO_MARK) when DCs are blocked |\n| **IPv6 hopping** | Auto-rotates IPv6 address from /64 on ban detection via Cloudflare API |\n| **Anti-replay** | Rejects replayed handshakes + detects ТСПУ Revisor active probes |\n| **Multi-user** | Independent per-user secrets |\n| **MiddleProxy** | ME transport with auto-refreshed Telegram metadata |\n\n---\n\n## Install\n\nAll installation, updates, and management are done through **mtbuddy** — a native Zig CLI that ships alongside the proxy.\n\n### One command\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/sleep3r/mtproto.zig/main/deploy/bootstrap.sh | sudo bash\n```\n\nThis downloads the latest `mtbuddy` binary and runs `mtbuddy --help`. Then install the proxy:\n\n```bash\n# Minimal — auto-generates a secret, enables all DPI bypass modules\nsudo mtbuddy install --port 443 --domain wb.ru --yes\n\n# Bring your own secret and username\nsudo mtbuddy install --port 443 --domain wb.ru --secret <32-hex> --user alice --yes\n\n# Disable all DPI modules (bare proxy only)\nsudo mtbuddy install --port 443 --domain wb.ru --no-dpi --yes\n\n# Install using an existing config file (auto-maps port and domain)\nsudo mtbuddy install --config /path/to/config.toml --yes\n```\n\nAt the end, mtbuddy prints a ready-to-use `tg://` connection link.\n\n### Interactive wizard\n\nIf you prefer to be walked through the setup:\n\n```bash\nsudo mtbuddy --interactive\n```\n\n<details>\n<summary>Demo: interactive installer</summary>\n<br>\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/sleep3r/mtproto.zig/main/assets/buddy.gif\" alt=\"Demo: interactive installer\" width=\"80%\">\n</p>\n<br>\n\n</details>\n\n### What the install does\n\n1. Downloads the **pre-built proxy binary** from GitHub Releases (auto-detects CPU: `x86_64_v3` → `x86_64` → `aarch64`)\n2. Generates a random secret (or uses `--secret`)\n3. Creates a systemd service (`mtproto-proxy`)\n4. Opens the port in `ufw` (if active)\n5. Applies TCPMSS=88 iptables rules\n6. Sets up Nginx masking + nfqws TCP desync (unless `--no-dpi`)\n7. Prints `tg://` link\n\n### Install options\n\n| Flag | Default | Description |\n|---|---|---|\n| `--port, -p` | `443` | Proxy listen port |\n| `--domain, -d` | `wb.ru` | TLS masking domain |\n| `--secret, -s` | auto | User secret (32 hex chars) |\n| `--user, -u` | `user` | Username in `config.toml` |\n| `--config, -c` | — | Use existing `config.toml` file |\n| `--yes, -y` | — | Skip confirmation prompt |\n| `--bind, -b` | — | Bind to specific IP (default: all interfaces) |\n| `--no-masking` | — | Disable Nginx masking |\n| `--no-nfqws` | — | Disable nfqws TCP desync |\n| `--no-tcpmss` | — | Disable TCPMSS=88 |\n| `--no-dpi` | — | Disable all DPI modules |\n| `--middle-proxy` | — | Enable Telegram MiddleProxy relay |\n\n---\n\n## Update\n\n```bash\n# Update to latest release (checks CPU compat, auto-rollback on failure)\nsudo mtbuddy update\n\n# Pin to a specific version\nsudo mtbuddy update --version v0.11.1\n```\n\n---\n\n## Other mtbuddy commands\n\n```bash\n# Show proxy and module status\nsudo mtbuddy status\n\n# Setup DPI modules after the fact\nsudo mtbuddy setup masking --domain wb.ru\nsudo mtbuddy setup nfqws\nsudo mtbuddy setup recovery\n\n# Install web monitoring dashboard\nsudo mtbuddy setup dashboard\n\n# VPN tunnel (for servers where Telegram DCs are blocked)\nsudo mtbuddy setup tunnel /path/to/awg0.conf\n\n# IPv6 hopping\nsudo mtbuddy ipv6-hop --check\nsudo mtbuddy ipv6-hop --auto --prefix 2a01:abcd:ef00:: --threshold 5\n\n# Update Cloudflare DNS A record\nsudo mtbuddy update-dns 1.2.3.4\n\n# Full help\nmtbuddy --help\n```\n\n---\n\n## Service management\n\n```bash\nsudo systemctl status mtproto-proxy\nsudo journalctl -u mtproto-proxy -f\nsudo systemctl restart mtproto-proxy\n```\n\n---\n\n## Upstream Routing\n\nThe proxy supports multiple ways to route outgoing connections to Telegram DC servers.\n\n### Routing modes\n\n| `[upstream].type` | How it works | When to use |\n|---|---|---|\n| `auto` (default) | Direct egress without tunnel policy marks | Most deployments |\n| `direct` | Connect to Telegram DCs directly from the host | DCs reachable from the server |\n| `tunnel` | Direct connect with `SO_MARK=200` policy-routed via VPN interface | DCs blocked by the ISP |\n| `socks5` | Route through an external SOCKS5 proxy with optional auth | Existing proxy infrastructure |\n| `http` | Route through an HTTP CONNECT proxy with optional auth | Corporate proxy environments |\n\n### VPN tunnel\n\nIf your VPS is in a region where Telegram DCs are blocked at the network level, you can route proxy traffic through a VPN tunnel with explicit socket policy routing. The proxy runs in the host namespace; only sockets marked by the proxy (`SO_MARK=200`) are routed through the tunnel table.\n\nCurrently supported VPN types:\n- **AmneziaWG** — DPI-resistant WireGuard fork (recommended for Russia/Iran)\n- **WireGuard** — standard WireGuard (planned)\n\n```\nClient → mtproto-proxy (host namespace)\n                     │\n                SO_MARK=200\n                     │\n        Linux policy routing table 200\n                     │\n                 awg0 (tunnel)\n                     │\n             Telegram DC servers\n```\n\n```bash\nsudo mtbuddy setup tunnel /path/to/awg0.conf\n```\n\n`mtbuddy` keeps `[general].use_middle_proxy` unchanged and only configures transport (`[upstream].type = \"tunnel\"`).\nAfter setup, it validates policy routes (`mark 200`) to Telegram DC ranges and prints operational commands.\n\nYou can also explicitly configure the tunnel interface in `config.toml`:\n\n```toml\n[upstream]\ntype = \"tunnel\"\n\n[upstream.tunnel]\ntunnel_interface = \"awg0\"\n```\n\n### SOCKS5 proxy\n\nRoute DC connections through an external SOCKS5 proxy. Supports RFC 1928 auth.\n\n```toml\n[upstream]\ntype = \"socks5\"\n\n[upstream.socks5]\nhost = \"127.0.0.1\"\nport = 1080\nusername = \"admin\"    # optional, omit for no-auth\npassword = \"secret\"\n```\n\n### HTTP CONNECT proxy\n\nRoute DC connections through an HTTP CONNECT proxy. Supports Basic auth.\n\n```toml\n[upstream]\ntype = \"http\"\n\n[upstream.http]\nhost = \"127.0.0.1\"\nport = 8080\nusername = \"admin\"    # optional, omit for no-auth\npassword = \"secret\"\n```\n\n> **Note:** Only DC-bound traffic is routed through the configured upstream. Mask (camouflage) connections always go direct.\n\n---\n\n## Configuration\n\nConfig lives at `/opt/mtproto-proxy/config.toml`. MTBuddy generates it on install; you can edit it manually and restart:\n\n```toml\n[general]\nuse_middle_proxy = true   # ME mode for promo-channel parity\n\n[upstream]\ntype = \"auto\"            # auto | direct | tunnel | socks5 | http\n\n[server]\nport = 443\n# public_ip = \"proxy.example.com\"   # Override auto-detected IP (recommended with tunnel)\nmax_connections = 512\nidle_timeout_sec = 120\nhandshake_timeout_sec = 15\nlog_level = \"info\"        # debug | info | warn | err\nrate_limit_per_subnet = 30\ntag = \"\"                  # Optional: promotion tag from @MTProxybot\n\n[censorship]\ntls_domain = \"wb.ru\"\nmask = true\nmask_port = 8443          # 8443 for local Nginx zero-RTT masking\nfast_mode = true          # Recommended: delegates S2C AES to the DC, saves CPU/RAM\ndrs = true                # Dynamic Record Sizing (mimics Chrome/Firefox)\n\n[access.users]\nalice = \"00112233445566778899aabbccddeeff\"\nbob   = \"ffeeddccbbaa99887766554433221100\"\n\n[access.direct_users]\nalice = true   # bypass MiddleProxy for this user\n```\n\n<details>\n<summary>Full configuration reference</summary>\n\n| Key | Default | Description |\n|-----|---------|-------------|\n| `[upstream].type` | `auto` | Egress mode: `auto` (direct), `direct`, `tunnel` (VPN via socket policy routing), `socks5`, or `http` |\n| `[upstream.tunnel] tunnel_interface` | `\"awg0\"` | Name of the VPN network interface for SO_MARK routing |\n| `[upstream.socks5] host` | — | SOCKS5 proxy address |\n| `[upstream.socks5] port` | — | SOCKS5 proxy port |\n| `[upstream.socks5] username` | — | SOCKS5 username (empty = no auth) |\n| `[upstream.socks5] password` | — | SOCKS5 password |\n| `[upstream.http] host` | — | HTTP CONNECT proxy address |\n| `[upstream.http] port` | — | HTTP CONNECT proxy port |\n| `[upstream.http] username` | — | HTTP proxy username (empty = no auth) |\n| `[upstream.http] password` | — | HTTP proxy password |\n| `[general] use_middle_proxy` | `false` | ME mode for DC1..5 (recommended for promo parity) |\n| `[general] ad_tag` | — | Alias for `[server].tag` |\n| `[server] port` | `443` | TCP listen port |\n| `[server] bind_address` | — | Specific IP to bind the listen socket (default: all interfaces) |\n| `[server] public_ip` | auto | Override auto-detected IP/domain. Required with VPN tunnel; set IPv4 explicitly if clients fail on IPv6 links |\n| `[server] backlog` | `4096` | TCP listen queue depth |\n| `[server] max_connections` | `512` | Concurrent connection cap, auto-clamped by RAM and `RLIMIT_NOFILE` |\n| `[server] idle_timeout_sec` | `120` | Connection idle timeout |\n| `[server] handshake_timeout_sec` | `15` | Handshake completion timeout |\n| `[server] middleproxy_buffer_kb` | `1024` | ME per-connection buffer (KiB). Below 1024 may cause overflow on media traffic |\n| `[server] tag` | — | 32 hex-char promotion tag from [@MTProxybot](https://t.me/MTProxybot) |\n| `[server] log_level` | `\"info\"` | `debug` / `info` / `warn` / `err` |\n| `[server] rate_limit_per_subnet` | `30` | Max new conns/sec per /24 (IPv4) or /48 (IPv6). Set `0` to disable |\n| `[server] unsafe_override_limits` | `false` | Disable auto-clamping of `max_connections` |\n| `[monitor] host` | `\"127.0.0.1\"` | Dashboard bind address |\n| `[monitor] port` | `61208` | Dashboard port |\n| `[metrics] enabled` | `false` | Enable embedded Prometheus `/metrics` endpoint |\n| `[metrics] host` | `\"127.0.0.1\"` | Metrics bind address |\n| `[metrics] port` | `9400` | Metrics port |\n| `[censorship] tls_domain` | `\"google.com\"` | Domain to impersonate |\n| `[censorship] mask` | `true` | Forward unauthenticated clients to `tls_domain` |\n| `[censorship] mask_port` | `443` | Local masking port (use `8443` for Nginx zero-RTT) |\n| `[censorship] desync` | `true` | Split-TLS: 1-byte Application records |\n| `[censorship] drs` | `false` | Dynamic Record Sizing |\n| `[censorship] fast_mode` | `false` | Delegate S2C encryption to DC (recommended) |\n| `[access.users] <name>` | — | 32 hex-char secret per user |\n| `[access.direct_users] <name>` | — | Bypass ME for this user |\n\n</details>\n\n> Generate a secret: `openssl rand -hex 16`\n\n---\n\n## Monitoring dashboard\n\nA lightweight web dashboard (~30 MB RAM) shows live connections, CPU/memory, network throughput, proxy stats, tunnel metrics, user management, and streaming logs.\n\nThe dashboard is **embedded directly into the `mtbuddy` binary** — no extra files needed.\n\n```bash\n# Install the dashboard on the server\nsudo mtbuddy setup dashboard\n\n# Open via SSH tunnel (binds to 127.0.0.1:61208 by default)\nssh -L 61208:localhost:61208 root@<server_ip>\n# → http://localhost:61208\n```\n\nAlternatively, expose the dashboard port via `[monitor]` config section and access directly.\n\n<details>\n<summary>Demo: monitoring dashboard</summary>\n<br>\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/sleep3r/mtproto.zig/main/assets/dashboard.gif\" alt=\"Demo: monitoring dashboard\" width=\"80%\">\n</p>\n<br>\n\n</details>\n\n---\n\n## Prometheus metrics\n\n`mtproto-proxy` can expose an embedded Prometheus-compatible metrics endpoint on a dedicated port.\n\nFor a complete Docker-based monitoring stack with `mtproto-zig`, Prometheus, Grafana, and an importable dashboard, see [hack/docker/README.md](hack/docker/README.md).\n\n```toml\n[metrics]\nenabled = true\nhost = \"127.0.0.1\"\nport = 9400\n```\n\nThe endpoint is plaintext HTTP and serves:\n\n```text\nGET /metrics\n```\n\nTypical Docker usage:\n\n```bash\ndocker run --rm \\\n  -p 443:443 \\\n  -p 9400:9400 \\\n  -v \"$PWD/config.toml:/etc/mtproto-proxy/config.toml:ro\" \\\n  mtproto-zig\n```\n\nIt exposes proxy counters plus process metrics such as RSS, virtual memory, CPU time, and open file descriptors.\n\n---\n\n## Building locally\n\nRequires [Zig 0.15.2](https://ziglang.org/download/).\n\n```bash\ngit clone https://github.com/sleep3r/mtproto.zig.git\ncd mtproto.zig\n\nmake build     # debug\nmake release   # optimized\nmake run       # run with config.toml\nmake test      # unit tests (78 tests)\nmake bench     # C2S encapsulation microbenchmark\nmake soak      # 30s multithreaded stability test\n```\n\nCross-compile for Linux from macOS:\n\n```bash\nzig build -Doptimize=ReleaseFast -Dtarget=x86_64-linux -Dcpu=x86_64_v3+aes\nscp zig-out/bin/mtproto-proxy root@<SERVER>:/opt/mtproto-proxy/\n```\n\n---\n\n## Docker\n\n```bash\ndocker pull ghcr.io/sleep3r/mtproto.zig:latest\n\ndocker run --rm \\\n  -p 443:443 \\\n  -v \"$PWD/config.toml:/etc/mtproto-proxy/config.toml:ro\" \\\n  ghcr.io/sleep3r/mtproto.zig:latest\n```\n\nBuild locally:\n\n```bash\ndocker build -t mtproto-zig .\n# multi-arch\ndocker buildx build --platform linux/amd64,linux/arm64 -t your-registry/mtproto-zig:latest --push .\n```\n\nPublished `linux/amd64` images are built with a portable CPU profile (`-Dcpu=x86_64`) to avoid `Illegal instruction` crashes on older VPS CPUs.\n\n> OS-level mitigations (iptables TCPMSS, nfqws, etc.) are not applied inside the container; only the proxy binary runs there.\n\n---\n\n## Troubleshooting — stuck on \"Updating...\"\n\n**1. AAAA record exists but IPv6 doesn't work on the server.**\nDNS has an AAAA → iOS tries IPv6 first → timeout → slow fallback to IPv4.\nFix: remove AAAA until IPv6 routing is fully configured.\n\n```bash\ndig +short proxy.example.com AAAA\nip -6 route\n```\n\n**2. Home Wi-Fi blocks the server's IPv4.**\nMobile networks usually work (they use IPv6). Home routers often block the destination IPv4.\nFix: enable IPv6 Prefix Delegation (IA_PD) on your router.\n\n**3. VPN is dropping MTProto traffic.**\nCommercial VPNs often DPI and drop proxy traffic.\nFix: switch VPN protocol, or use a self-hosted AmneziaWG.\n\n**4. Co-located WireGuard/Docker on the same server.**\nDocker's bridge drops packets from VPN subnet.\nFix: `iptables -I DOCKER-USER -s 172.29.172.0/24 -p tcp --dport 443 -j ACCEPT`\n\n**5. DC203 media resets on non-premium clients.**\nCheck logs: `journalctl -u mtproto-proxy | grep -E \"dc=203|Middle\"`.\nThe proxy auto-refreshes DC203 metadata from Telegram on startup. If `core.telegram.org` is unreachable, it uses bundled fallback addresses.\n\n---\n\n## License\n\n[MIT](LICENSE) © 2026 Aleksandr Kalashnikov\n","summary":"mtproto.zig delivers a minimal, high‑performance Telegram MTProto proxy written in Zig. The 177 KB static binary boots in under 10 ms, consumes less than 1 MB of RAM, and has no external dependencies, while disguising Telegram traffic as legitimate TLS 1.3 HTTPS and incorporating a suite of DPI‑bypass techniques such as fake record sizes, TCP fragmentation, VPN tunneling and IPv6 address hopping. It supports per‑user secrets, zero‑RTT masking, anti‑replay defenses, and automatic updates via the bundled mtbuddy CLI. The tool is ideal for privacy‑conscious users, telecom operators, or anyone who needs a lightweight, easy‑to‑deploy proxy to bypass network censorship for Telegram.","description":"High-performance Telegram proxy with DPI evasion","stars":390,"language":"Zig"},{"owner":"yannick-cw","repo":"korb","url":"https://github.com/yannick-cw/korb","readme":"## // Update: Rewe not yet ready for agentic commerce\n\nRewe seems to not like independent agentic commerce and is actively blocking this CLI, fair choice, less shopping from me, but understandable at the same time. Unfortunately this means the CLI might or might not work depending on their cloudflare tls fingerprinting rules.\n\n## // korb\n\nThe `korb` CLI allows using the REWE APIs programmatically to create baskets and order them for pickup to your local REWE market.\n\nThe CLI is handwritten in Haskell, but designed to be a CLI mostly used by agents to organise your REWE shopping on your behalf. All output is JSON.\n\nhttps://github.com/user-attachments/assets/308041f4-4b1f-4db4-9040-0e157247efea\n\n## // agentic workflow with UI\n\n![agentic_order](https://github.com/user-attachments/assets/ff0d7b91-2572-4ba0-9609-0dac313306b2)\n\n\n## // My e2e flow\n\nMy current E2E flow (I use claude to run korb) is as follows:\n1. **Add grocery when I think of it** A Siri shortcut appends items to a shared markdown file. I say *\"Add oat milk to the shopping list\"* in the kitchen and it's on the list.\n2. **Weekly Order** Tell the agent \"use korb to buy groceries, I need X,Y,Z\". It begins from a default template (my usual items and quantities, created with `korb orders history`) and checks the shopping list file and my input for anything extra.\n3. **Adjust template suggestion** I tell the agent what to skip, change, or add. It searches products via `korb search` / `korb favorites search` and adds them with `korb basket add`.\n4. **Review & confirm** The agent prints the full basket and a selected timeslot. After I confirm, it runs `korb checkout order`.\n5. **Clean shopping list** Ordered items get ticked off in the shopping list.\n\nIn the directory that store the shopping list file I also have a claude.md explaining this process.\nThe **magic** is the generated template of what I always order. Just tell an agent to use `korb orders history` to identify commonly ordered items.\n\n## // Installation\n\n**DON'T: as of right now krob does not work - rewe does not want it to work**\n\n### Dependencies\n\nCurrently it needs `curl` installed.\n\n### Binary (recommended)\n\nDownload the latest release from [GitHub Releases](https://github.com/yannick-cw/korb/releases):\n\n```bash\n# macOS (Apple Silicon)\ncurl -L https://github.com/yannick-cw/korb/releases/latest/download/korb-aarch64-macos -o korb\n\n# macOS (Intel)\ncurl -L https://github.com/yannick-cw/korb/releases/latest/download/korb-x86_64-macos -o korb\n\n# Linux (x86_64)\ncurl -L https://github.com/yannick-cw/korb/releases/latest/download/korb-x86_64-linux -o korb\n```\n\nThen:\n```bash\nchmod +x korb\nmv korb /usr/local/bin/   # or sudo mv on Linux\n```\n\n### From source\n\nRequires GHC 9.12+ and Cabal. You also need the REWE mTLS client certificates.\n\n```bash\ngit clone https://github.com/yannick-cw/korb.git\ncd korb\n\n# Extract mTLS certificates from the REWE app\n# See: https://github.com/ByteSizedMarius/rewerse-engineering/tree/main/docs\n# Place them at:\n#   certs/mobile-clients-api.rewe.de/private.pem\n#   certs/mobile-clients-api.rewe.de/private.key\n\ncabal install --install-method=copy\n```\n\n## // Getting started\n\n```bash\n# 1. Authenticate with your REWE account (one-time, use Chrome to get the link, firefox does not work for this)\nkorb login --pretty\n\n# 2. Find and set your pickup store - stored locally, needs to be done just once\nkorb store search 80336 # returns market identifier for zip code\nkorb store set 420240 80336\n\n# 3. Search for products by name or EAN barcode\nkorb search \"milch\" --pretty\nkorb search \"milch\" --organic --pretty\nkorb search \"4305615100005\" --pretty  # search by EAN barcode\n# Or browse your favorites\nkorb favorites\nkorb favorites search \"avo\"\n\n# 4. Add items to basket\nkorb basket add 8-6AJQ3RLX-bd7c2a1e-f1c1-3464-8250-900b12c90f70\n\n# 5. Check your basket\nkorb basket --pretty\n\n# 6. Pick a timeslot and checkout\nkorb timeslots # lists available timeslots for pickup\nkorb checkout create <TIMESLOT_ID>  # create checkout - not ordered yet\nkorb checkout order # order it with selected timeslot and payment in market\n\n# 7. Cancel an order if needed\nkorb orders\nkorb orders delete <ORDER_ID>\n```\n\n## // Usage\n\n```\nUsage: korb COMMAND [-p|--pretty] [-v|--version]\n  REWE Pickup CLI\n\nAvailable options:\n  -p,--pretty              Pretty JSON output\n  -h,--help                Show this help text\n  -v,--version             Show version\n\nCommands:\n\n  korb store                       Show currently selected store\n  korb store search <ZIP>          Find pickup stores near ZIP code\n  korb store set <ID> <ZIP>        Set active store by market ID and ZIP\n\n  korb search <QUERY|EAN>          Search products by name or EAN barcode (use * to browse all)\n  korb search <Q> --organic        Filter by attribute (--organic, --regional, --vegan, --vegetarian)\n  korb search <Q> --category <SLUG> Filter by category slug (repeatable, from korb categories)\n\n  korb favorites                   Show all favorite products across all lists\n  korb favorites search <QUERY>    Filter favorites by name (case-insensitive, substring match)\n  korb favorites add <LID> <PID>   Add product to default favorites list (listing ID + product ID)\n  korb favorites delete <ITEM_ID>  Remove item from default favorites list (item ID from favorites)\n\n  korb basket                      Show current basket with items, totals, and free pickup status\n  korb basket add <LISTING_ID>     Set item quantity by listing ID. Overwrites existing quantity.\n                                   --qty N sets absolute quantity. Default 1. Use --qty 0 to remove.\n\n  korb timeslots                   List available pickup timeslots\n\n  korb checkout                    Show the checkout for current basket. Payment is always in market.\n  korb checkout create <TIMESLOT_ID> Create a checkout for a given timeslot id\n  korb checkout order              Place the order. Timeslot must be attached first.\n\n  korb orders                      Show open orders.\n  korb orders history              Show all orders.\n  korb orders get <ORDER_ID>       Get an order (with details) by id.\n  korb orders delete <ORDER_ID>    Cancel an order by order ID - will give 200 on successive calls.\n\n  korb suggestion threshold <N>    Suggest N items to add to reach free pickup threshold.\n                                   Ranks by purchase frequency, excludes items already in basket.\n\n  korb categories                   List all product categories (with subcategories).\n\n  korb ebons                       List digital receipts (eBons).\n  korb ebons download <EBON_ID>    Download eBon PDF. --output FILE (default: ebon.pdf)\n\n  korb login                       Authenticate via REWE PKCE browser flow.\n\nAll commands support --pretty for formatted JSON output.\nOutput is JSON for agent consumption.\n```\n\n## // API documentation\n\nReverse-engineered OpenAPI specs for the REWE mobile API:\n\n- [REWE Product & Checkout API](api/rewe.openapi.yaml)\n- [REWE Account / Keycloak API](api/account-rewe.yaml)\n\n## // Platform support\n\nCurrently macOS and linux.\n\n## // Formal verification with Lean 4\n\nThe suggestion engine (`korb suggestion threshold`) is re-implemented in [Lean 4](leanKorb/) with five mathematically proven properties: suggestions have positive frequency, are sorted descending, come from ordered and available products, exclude basket items, and respect the count limit.\nA Differential Random Testing bridge in the Haskell test suite generates random inputs, runs both implementations, and asserts identical output.\nIf the Lean proofs compile and the DRT passes, the Haskell production code behaves like the proven spec.\nInspired by how [AWS Cedar](https://github.com/cedar-policy/cedar-spec) verifies their authorization engine.\n\nI also summarised the approach in a [Blog post](https://www.dev-log.me/formal_verification_in_any_language_for_everybody/).\n\nOh and yes, this is complete overkill here and just for fun.\n\n## // Prior work & attribution\n\n- https://github.com/ByteSizedMarius/rewerse-engineering\n- https://github.com/foo-git/rewe-discounts\n- https://github.com/torbenpfohl/rewe-discounts\n\n## // Disclaimer\n\nThis project is unofficial and not affiliated with REWE. It uses reverse-engineered APIs that may change without notice. Use at your own risk.\n","summary":"`korb` is a command‑line tool that exposes the REWE e‑commerce APIs so users can programmatically browse products, build baskets, and place pickup orders. It provides a set of commands for authentication, store selection, product search (including EAN lookup and organic filters), favorites management, basket manipulation, and timeslot selection, all returning structured JSON that can be consumed by scripts or agents. The tool also records order history and can generate reusable templates for frequent items, enabling repeat orders with minimal input. It is ideal for developers or power users who want to automate grocery ordering with REWE, especially in an agent‑driven or workflow‑oriented environment, though current REWE TLS restrictions may limit functionality.","description":"REWE delivery CLI","stars":242,"language":"Haskell"},{"owner":"JasonHonKL","repo":"Openbrowser","url":"https://github.com/JasonHonKL/Openbrowser","readme":"# open-browser\n\nA headless browser built for AI agents. No pixels, no screenshots — just structured semantic state.\n\n```\n$ open-browser navigate https://example.com\n\n00:00  open-browser navigate https://example.com\n00:05  connected — parsing semantic state…\n       document  [role: document]\n       └── region  [role: region]\n           ├── heading (h1)  \"Example Domain\"\n           └── [#1] link  \"Learn more\"  → https://iana.org/domains/example\n00:05  semantic tree ready — 0 landmarks, 1 links, 1 headings, 1 actions\n00:05  agent-ready: structured state exposed · no pixel buffer · 0 screenshots\n```\n\n**Element IDs** — Interactive elements are tagged with unique IDs (`[#1]`, `[#2]`, etc.) that AI agents can use to reference them. This makes it easy for agents to interact with specific elements without needing to understand CSS selectors.\n\n## Why\n\nAI agents don't need screenshots. They need to know what's on a page, what they can interact with, and where they can go. `open-browser` fetches a URL, parses the HTML, and outputs a clean semantic tree — landmarks, headings, links, buttons, forms, and their actions — in milliseconds, not seconds.\n\nNo Chromium binary. No Docker. No GPU. Just HTTP + HTML parsing.\n\n## Features\n\n- **Semantic tree output** — ARIA roles, headings, landmarks, interactive elements\n- **Element IDs** — Unique IDs for interactive elements (e.g., `[#1]`, `[#2]`) that AI agents can use for easy reference\n- **Page interaction** — Click links, submit forms, type into fields, wait for selectors, scroll\n- **3 output formats** — Markdown (default), tree, JSON
