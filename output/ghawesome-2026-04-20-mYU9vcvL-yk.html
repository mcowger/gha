n_start` → `tool_call` → `run_complete`) + async webhooks |\n| 📦 **Typed SDK** | `npm install @skrun-dev/sdk` — `run()`, `stream()`, `runAsync()` + 6 more methods |\n| 🔧 **Tool calling** | Local scripts (`scripts/`) + MCP servers (`npx`) — same ecosystem as Claude Desktop |\n| 💾 **Stateful** | Agents remember across runs via key-value state |\n| 📖 **Interactive docs** | OpenAPI 3.1 schema + Scalar explorer at `GET /docs` |\n| 🔑 **Caller keys** | Users bring their own LLM keys via `X-LLM-API-Key` — zero cost for operators |\n| ✅ **Agent verification** | Verified flag controls script execution — safe for third-party agents |\n| 📌 **Version pinning** | Pin a specific agent version per call (`version: \"1.2.0\"`) — stable integrations, reproducible runs, no silent drift |\n| 📊 **Structured logs** | JSON to stdout via pino — pipe to Axiom, Datadog, ELK. `LOG_LEVEL` env var controls verbosity |\n| 🌍 **Environment separation** | Agent behavior (model, tools) separated from runtime environment (networking, timeout, sandbox). Per-run overrides via POST /run body |\n| 📁 **Files API** | Agents produce files (PDF, images, data) — callers download via `GET /api/runs/:run_id/files/:filename` |\n\n---\n\n## 📦 SDK\n\n```bash\nnpm install @skrun-dev/sdk\n```\n\n```typescript\nimport { SkrunClient } from \"@skrun-dev/sdk\";\n\nconst client = new SkrunClient({\n  baseUrl: \"http://localhost:4000\",\n  token: \"dev-token\",\n});\n\n// Sync — get the result\nconst result = await client.run(\"dev/code-review\", { code: \"const x = 1;\" });\nconsole.log(result.output);\n\n// Stream — real-time events\nfor await (const event of client.stream(\"dev/code-review\", { code: \"...\" })) {\n  console.log(event.type); // run_start, tool_call, llm_complete, run_complete\n}\n\n// Async — fire and forget with webhook callback\nconst { run_id } = await client.runAsync(\"dev/agent\", input, \"https://your-app.com/hook\");\n\n// Pin a specific agent version — reproducible, no silent drift\nconst pinned = await client.run(\"dev/code-review\", input, { version: \"1.2.0\" });\nconsole.log(pinned.agent_version); // \"1.2.0\" — always echoed back\n```\n\n9 methods: `run`, `stream`, `runAsync`, `push`, `pull`, `list`, `getAgent`, `getVersions`, `verify`. **Zero runtime dependencies**, Node.js 18+.\n\n---\n\n## 🧪 Demo Agents\n\nAll examples use Google Gemini Flash by default. Change the `model` section in `agent.yaml` to use any [supported provider](#-features).\n\n| Agent | What it shows |\n|-------|--------------|\n| 🔍 [code-review](examples/code-review/) | Import a skill, get a code quality API |\n| 📄 [pdf-processing](examples/pdf-processing/) | Tool calling with local scripts |\n| 📊 [seo-audit](examples/seo-audit/) | **Stateful** — run twice, it remembers and compares |\n| 📈 [data-analyst](examples/data-analyst/) | Typed I/O — CSV in, structured insights out |\n| ✉️ [email-drafter](examples/email-drafter/) | Business use case — non-dev API consumer |\n| 🌐 [web-scraper](examples/web-scraper/) | **MCP server** — headless browser via @playwright/mcp |\n\n<details>\n<summary><b>Try an example locally</b></summary>\n\n```bash\n# 1. Start the registry\ncp .env.example .env          # add your GOOGLE_API_KEY\npnpm dev:registry              # keep this terminal open\n\n# 2. In another terminal\nskrun login --token dev-token\ncd examples/code-review\nskrun build && skrun push\n\n# 3. Call the agent\ncurl -X POST http://localhost:4000/api/agents/dev/code-review/run \\\n  -H \"Authorization: Bearer dev-token\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"input\": {\"code\": \"function add(a,b) { return a + b; }\"}}'\n```\n\n> **Windows (PowerShell):** use `curl.exe` instead of `curl`, and use `@input.json` for the body.\n\n</details>\n\n---\n\n## 💻 CLI\n\n| Command | Description |\n|---------|-------------|\n| `skrun init [dir]` | Create a new agent |\n| `skrun init --from-skill <path>` | Import existing skill |\n| `skrun dev` | Local server with POST /run |\n| `skrun test` | Run agent tests |\n| `skrun build` | Package `.agent` bundle |\n| `skrun deploy` | Build + push + live URL |\n| `skrun push` / `pull` | Registry upload/download |\n| `skrun login` / `logout` | Authentication |\n| `skrun logs <agent>` | Execution logs |\n\n---\n\n## 🧠 Key Concepts\n\n- **[Agent Skills](https://agentskills.io)** — SKILL.md standard, compatible with Claude Code, Copilot, Codex\n- **[agent.yaml](docs/agent-yaml.md)** — Runtime config: model, inputs/outputs, environment, state, tests\n- **[POST /run](docs/api.md)** — Every agent is an API. Typed inputs, structured outputs.\n\n---\n\n## 📚 Documentation\n\n- 🌐 **[Interactive API explorer](http://localhost:4000/docs)** — live \"Try it\" interface (start the registry first)\n- 📋 **[OpenAPI schema](http://localhost:4000/openapi.json)** — import into Postman/Insomnia\n- 📖 [API reference](docs/api.md)\n- 🔧 [`agent.yaml` specification](docs/agent-yaml.md)\n- 💻 [CLI reference](docs/cli.md)\n- 🤝 [Contributing](CONTRIBUTING.md)\n- 📝 [Changelog](CHANGELOG.md)\n\n---\n\n## 🏗️ Use Cases\n\n- 🔁 **Turn any skill into a production API** in under 2 minutes — no infra setup\n- 🏢 **Build internal AI tools** (code review, data analysis, email drafting, SEO audits...) with typed inputs/outputs\n- 🔒 **Run untrusted agents safely** with verification + permission flags\n- 💰 **Offer agents as a product** — users bring their own LLM keys, you host the runtime\n- 🌍 **Self-host on any cloud** — Fly.io, AWS, GCP, bare metal — no vendor lock-in\n- 🧩 **Compose agents** with MCP servers — same ecosystem as Claude Desktop\n\n---\n\n## 👥 Community\n\n- 💬 [GitHub Discussions](https://github.com/skrun-dev/skrun/discussions) — ask questions, share agents\n- 🐛 [Issues](https://github.com/skrun-dev/skrun/issues) — report bugs, request features\n- ⭐ [Star the repo](https://github.com/skrun-dev/skrun) if you like the project!\n\n---\n\n## 🤝 Contributing\n\n```bash\ngit clone https://github.com/skrun-dev/skrun.git\ncd skrun\npnpm install && pnpm build && pnpm test\n```\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for conventions and setup.\n\n---\n\n## 📜 License\n\n[MIT](LICENSE) — free to use, modify, self-host, and build on top.\n\n<p align=\"center\">\n  <sub>Built with ❤️ for the open agent ecosystem.</sub>\n</p>\n","summary":"Skrun is an open‑source, multi‑model agent runtime that lets you expose any agent skill as a simple HTTP API through a `POST /run` endpoint. It supports a wide range of LLM providers—including Anthropic, OpenAI, Google, Mistral, Groq, DeepSeek, Kimi, Qwen and any OpenAI‑compatible endpoint—while offering features such as SSE streaming, async webhooks, tool calling with local scripts or MCP servers, stateful memory across runs, and a typed SDK for Node/TypeScript. The platform is fully self‑hostable, free to operate, and ideal for developers, data scientists, and ops teams who need a vendor‑agnostic, cost‑controlled way to run and scale language‑model agents in their own infrastructure.","description":"Deploy any Agent Skill as an API via POST /run. The open-source multi-model alternative to Claude Managed Agents, Microsoft Foundry & Mistral/Koyeb — works with any LLM.","stars":159,"language":"TypeScript"},{"owner":"onesuper","repo":"tui-use","url":"https://github.com/onesuper/tui-use","readme":"<div align=\"center\">\n\n# tui-use\n\n**Like BrowserUse, but for the terminal.**\n\ntui-use lets agents interact with programs that expect a human at the keyboard — REPLs, debuggers, TUI apps, and anything else bash can't reach.\n\n[![License](https://img.shields.io/badge/License-MIT-blue.svg)](LICENSE) [![npm](https://img.shields.io/npm/v/tui-use.svg)](https://www.npmjs.com/package/tui-use)\n\n</div>\n\n## What is tui-use?\n\nAI agents can run shell commands and call APIs — but they can't interact with programs that expect a human at the keyboard. The moment a REPL waits for input, a debugger hits a breakpoint, or a TUI app renders a menu, agents are stuck.\n\ntui-use fills that gap. Spawn any program in a PTY, read its screen as plain text, send keystrokes — all from the command line. Built for the cases where bash isn't enough: live debugging sessions with gigabytes of in-memory state, interactive REPLs, full-screen TUI apps.\n\n### Use cases\n\n- **Scientific computing & large in-memory state** — When your variables are arrays with millions of elements that took an hour to compute, you can't dump them to a log file. Drop an agent into a live Python interpreter or pdb session to debug, inspect, and optimize without losing the running process.\n- **Debugger sessions** — Drive GDB, PDB, or any interactive debugger. Set breakpoints, step through code, inspect variables — all from an agent, without restarting the process.\n- **REPL sessions** — Run code in Python, Node, or any interactive interpreter, inspect the output, and keep going. No more one-shot scripts when you need an interactive session.\n- **TUI applications** — Navigate vim, lazygit, htop, fzf, and other full-screen programs that were never designed to be scripted.\n\nPerfect for **Claude Code**, **Cursor**, **Codex**, **Gemini CLI**, **OpenCode** and other AI coding agents.\n\n### Why not tmux?\n\ntmux is great for humans — but it was never designed for agents.\n\n`tmux send-keys` has no way to signal when a program is done responding. Agents are stuck guessing: `sleep 2` and hope, or poll `capture-pane` in a loop.\n\ntui-use observes every PTY render event directly. `wait` blocks until the screen stabilizes — no sleep, no polling. `wait --text \">>>\"` goes further: wait for a semantic signal, not just silence.\n\n## Features\n\n- **🖥️ Full VT Rendering** — PTY output is processed by a headless xterm emulator. ANSI escape sequences, cursor movement, and screen clearing all work correctly. The `screen` field is always clean plain text.\n- **⏱️ Smart Wait** — `wait` blocks until the screen has been stable for a configurable idle window (debounce), so agents never need to guess how long to sleep. Use `wait --text <pattern>` for semantic signals — wait until the program tells you it's ready, not just until it goes quiet.\n- **📸 Snapshot Model** — Interacting with a terminal program is just a loop: read what's on screen, decide what to type, repeat. tui-use makes that loop explicit — no async streams, no timing guesswork, no partial output to reassemble.\n- **🔍 Highlights** — Every snapshot includes a `highlights` field listing the inverse-video spans on screen — the standard way TUI programs indicate selected items. Agents can read which menu option, tab, or button is currently active without parsing text or guessing from cursor position.\n\n## Installation\n\n**From npm (recommended):**\n\n```bash\nnpm install -g tui-use\n```\n\n**From source:**\n\n```bash\ngit clone https://github.com/onesuper/tui-use.git\ncd tui-use\nnpm install\nnpm run build\nnpm link\n```\n\n## OpenAI Codex Plugin\n\n**Note:** You must install the CLI (see Installation section above) before using the plugin — the plugin only provides skill definitions, the CLI provides the actual PTY functionality.\n\nThis repo includes a Codex plugin bundle at `plugins/tui-use` and a local repo marketplace at `.agents/plugins/marketplace.json`.\n\n### Install from this repo\n\n#### Step 1: Open this repository in Codex\n\nStart Codex with this repository as the working directory, or restart Codex if it was already open while you cloned or updated the repo.\n\n#### Step 2: Open the plugin directory\n\n```\ncodex\n/plugins\n```\n\n#### Step 3: Install the plugin\n\nChoose the `tui-use local plugins` marketplace, open `tui-use`, and select `Install plugin`.\n\n#### Step 4: Start a new thread\n\nAsk Codex to use `tui-use`, or explicitly invoke the installed plugin/skill from the prompt.\n\n## Claude Code Plugin\n\n**Note:** You must install the CLI (see Installation section above) before using the plugin — the plugin only provides skill definitions, the CLI provides the actual PTY functionality.\n\n### Install from self-hosted marketplace\n\n#### Step 1: Add the marketplace\n\n```\n/plugin marketplace add onesuper/tui-use\n```\n\n#### Step 2: Install the plugin\n\n```\n/plugin install tui-use@tui-use\n```\n\n#### Step 3: Reload plugins\n\n```\n/reload-plugins\n```\n\n**More agents coming soon...**\n\n## How It Works\n\ntui-use sits directly on the PTY event stream — every byte the program outputs flows through a headless terminal emulator in real time.\n\nThis is what makes `wait` possible:\n\n```\nprogram outputs → PTY → xterm emulator → render event\n                                        → debounce timer resets on each change\n                                        → 100ms of silence → wait resolves ✓\n```\n\n`wait --text <pattern>` goes further — it resolves the moment a known prompt appears, giving agents a semantic readiness signal rather than just a silence window.\n\nBehind the scenes, a daemon process manages PTY sessions so they persist across CLI calls.\n\n## CLI Interface\n\n### Core Commands\n\n```\ntui-use start <cmd>                            # Start a program\ntui-use start --cwd <dir> <cmd>                # Start in specific directory\ntui-use start --cwd <dir> \"<cmd> -flags\"       # Quote the full command to pass flags (e.g. git rebase -i)\ntui-use start --label <name> <cmd>             # Start with label\ntui-use start --cols <n> --rows <n> <cmd>      # Custom terminal size (default: 120x30)\ntui-use use <session_id>                       # Switch to a session\ntui-use type <text>                            # Type text\ntui-use type \"<text>\\n\"                        # Type with Enter\ntui-use type \"<text>\\t\"                        # Type with Tab\ntui-use paste \"<text>\\n<text>\\n\"               # Multi-line paste (each line + Enter)\ntui-use press <key>                            # Press a key\ntui-use snapshot                               # Get current screen\ntui-use snapshot --format json                 # JSON output\ntui-use scrollup <n>                           # Scroll up to older content\ntui-use scrolldown <n>                         # Scroll down to newer content\ntui-use find <pattern>                         # Search in screen (regex)\ntui-use wait                                   # Wait for screen change (default timeout: 3000ms)\ntui-use wait <ms>                              # Custom timeout, e.g. wait 5000\ntui-use wait --text <pattern>                  # Wait until screen contains pattern\ntui-use wait --debounce <ms>                   # Idle time after last change before resolving (default: 100ms)\ntui-use wait --format json                     # JSON output\ntui-use list                                   # List all sessions\ntui-use use <session_id>                       # Switch to a session\ntui-use info                                   # Show session details\ntui-use rename <label>                         # Rename session\ntui-use kill                                   # Kill current session\ntui-use daemon status                          # Check if daemon is running\ntui-use daemon stop                            # Stop the daemon\ntui-use daemon restart                         # Restart the daemon\n```\n\n## Limitations\n\n- **TUI color/style info is mostly lost** — `screen` contains plain text only; colors and most formatting are stripped. Selected items and active elements are captured in `highlights` via inverse-video detection. Window title and fullscreen mode are captured in `title` and `is_fullscreen`.\n\n## Troubleshooting\n\n### Automatic Rebuild Fails\n\nThe installer automatically detects your platform and uses a prebuilt binary when available. If no compatible prebuild exists, it will automatically rebuild from source (requires build tools).\n\n**Build tools** (only needed if automatic rebuild fails):\n\n- macOS: `xcode-select --install`\n- Linux: `sudo apt-get install build-essential python3 g++`\n- Windows: Prebuilt binaries available (no build tools needed)\n\n## Development\n\n```bash\ngit clone <repo_url>\ncd tui-use\nnpm install\nnpm run build\nnpm link\n\n# Try it\ntui-use start python3 examples/ask.py\ntui-use wait\ntui-use type \"Alice\"\ntui-use press enter\ntui-use wait\ntui-use kill\n```\n\n### Integration Tests\n\nA Claude Code skill is included for running the full integration test suite.\n\nRun the following command in Claude Code:\n\n```\n/tui-use-integration-test\n```\n\nClaude will execute the test suite in order and then report `PASS / FAIL` for each, with actual screen output on any failure.\n\n## License\n\n[MIT License](LICENSE)\n","summary":"tui‑use is a CLI tool that lets AI agents drive terminal programs that normally require a live keyboard—such as REPLs, debuggers, and full‑screen TUI apps—by spawning them in a PTY, rendering the output through a headless xterm emulator, and sending keystrokes. Its core features include full VT terminal rendering, a smart “wait” that blocks until the screen has stabilized (or until a specified text pattern appears), a snapshot model that exposes the entire screen as a clean plain‑text buffer, and automatic detection of inverse‑video highlights to identify selected menu items. These capabilities eliminate the need for ad‑hoc sleeps or polling, enabling deterministic, interactive sessions with programs that handle large in‑memory state or complex workflows. The tool is especially useful for AI coding assistants like Claude, Cursor, Codex, or Gemini CLI that need to inspect, debug, or manipulate live processes without restarting them.","description":"tui-use lets agents interact with programs that expect a human at the keyboard — REPLs, debuggers, TUI apps, and anything else bash can't reach.","stars":200,"language":"TypeScript"},{"owner":"multigres","repo":"multigres-operator","url":"https://github.com/multigres/multigres-operator","readme":"# Multigres Operator\n\nThe **[Multigres](https://github.com/multigres/multigres) Operator** is a Kubernetes operator for managing distributed, sharded PostgreSQL clusters across multiple failure domains (zones or regions). It provides a unified API to define the topology of your database system, handling the complex orchestration of `shards`, `cells` (failure domains), and `gateways`.\n\n## Table of Contents\n\n- [Features](#features)\n- [Installation](#installation)\n- [How it Works](#how-it-works)\n- [Configuration & Defaults](#configuration--defaults)\n- [Backup & Restore](#backup--restore)\n- [Observability](#observability)\n- [Webhook & Certificate Management](#webhook--certificate-management)\n- [GitOps & Webhook Defaults](#gitops--webhook-defaults)\n- [Pool Replication & Quorum](#pool-replication--quorum)\n- [Constraints & Limits](#constraints--limits-v1alpha1)\n- [Further Reading](#further-reading)\n\n## Features\n- **Global Cluster Management**: Single source of truth (`MultigresCluster`) for the entire database topology.\n- **Automated Sharding**: Manages `TableGroups` and `Shards` as first-class citizens.\n- **Direct Pod Management**: Manages individual Pods and PVCs directly (no StatefulSets), enabling targeted decommissioning, rolling updates with primary awareness, and granular PVC lifecycle control.\n- **Failover & High Availability**: Orchestrates Primary/Standby failovers across defined Cells.\n- **Template System**: Define configuration once (`CoreTemplate`, `CellTemplate`, `ShardTemplate`) and reuse it across the cluster.\n- **Hierarchical Defaults**: Smart override logic allowing for global defaults, namespace defaults, and granular overrides.\n- **External Gateway Exposure**: Optional external gateway support via `spec.externalGateway` with configurable `externalIPs`, tracked by a `GatewayExternalReady` condition.\n- **External Admin Web Exposure**: Optional external exposure for the multiadmin-web Service via `spec.externalAdminWeb`, mirroring the gateway pattern with an `AdminWebExternalReady` condition.\n- **PostgreSQL Configuration**: Reference a user-created ConfigMap with `postgresql.conf` overrides via `postgresConfigRef` on shard templates. ConfigMap content changes trigger automatic rolling updates.\n- **Integrated Cert Management**: Built-in self-signed certificate generation and rotation for validating webhooks, with optional support for `cert-manager`.\n\n---\n\n## Installation\n\n### Prerequisites\n- Kubernetes v1.25+\n\n### Quick Start\n\nInstall the operator with built-in self-signed certificate management:\n\n```bash\nkubectl apply --server-side -f \\\n  https://github.com/multigres/multigres-operator/releases/latest/download/install.yaml\n```\n\nThis deploys the operator into the `multigres-operator` namespace with:\n- All CRDs (MultigresCluster, Cell, Shard, TableGroup, TopoServer, and templates)\n- RBAC roles and bindings\n- Mutating and Validating webhooks with self-signed certificates (auto-rotated)\n- The operator Deployment\n- Metrics endpoint\n\nOnce the operator is running, try a sample cluster:\n\n```bash\nkubectl apply -f https://raw.githubusercontent.com/multigres/multigres-operator/main/config/samples/minimal.yaml\n```\n\nFor more sample configurations, see the [samples directory](config/samples/README.md).\n\n### Deployment Options\n\n| Option | Description | Guide |\n| :--- | :--- | :--- |\n| **Self-signed certs** (default) | Zero-config TLS — operator generates and rotates its own CA. | *(Installed above)* |\n| **cert-manager** | External certificate management via cert-manager. | [Cert-Manager Demo](demo/cert-manager/) |\n| **Observability stack** | Full metrics, tracing, and dashboards (Prometheus, Tempo, Grafana). | [Observability Demo](demo/observability/) |\n\n---\n\n## How it Works\n\nThe Multigres Operator follows a **Parent/Child** architecture. You, the user, manage the **Root** resource (`MultigresCluster`) and its shared **Templates**. The operator automatically creates and reconciles all necessary child resources (`Cells`, `TableGroups`, `Shards`, `TopoServers`) to match your desired state.\n\n### Resource Hierarchy\n\n```ascii\n[MultigresCluster] 🚀 (Root CR - User Editable)\n      │\n      ├── 📍 Defines [TemplateDefaults] (Cluster-wide default templates)\n      │\n      ├── 🌍 [GlobalTopoServer] (Child CR) ← 📄 Uses [CoreTemplate] OR inline [spec]\n      │\n      ├── 🤖 MultiAdmin Resources ← 📄 Uses [CoreTemplate] OR inline [spec]\n      │\n      ├── 💠 [Cell] (Child CR) ← 📄 Uses [CellTemplate] OR inline [spec]\n      │    │\n      │    ├── 🚪 MultiGateway Resources\n      │    └── 📡 [LocalTopoServer] (Child CR, optional)\n      │\n      └── 🗃️ [TableGroup] (Child CR)\n           │\n           └── 📦 [Shard] (Child CR) ← 📄 Uses [ShardTemplate] OR inline [spec]\n                │\n                ├── 🧠 MultiOrch Resources (Deployment)\n                └── 🏊 Pools (Operator-managed Pods + PVCs)\n\n📄 [CoreTemplate] (User-editable, scoped config)\n   ├── globalTopoServer\n   └── multiadmin\n\n📄 [CellTemplate] (User-editable, scoped config)\n   ├── multigateway\n   └── localTopoServer (optional)\n\n📄 [ShardTemplate] (User-editable, scoped config)\n   ├── multiorch\n   └── pools (postgres + multipooler)\n```\n\n**Important**:\n*   **Only** `MultigresCluster`, `CoreTemplate`, `CellTemplate`, and `ShardTemplate` are meant to be edited by users.\n*   Child resources (`Cell`, `TableGroup`, `Shard`, `TopoServer`) are **Read-Only**. Any manual changes to them will be immediately reverted by the operator to ensure the system stays in sync with the root configuration.\n\n---\n\n## Configuration & Defaults\n\nThe operator uses a **4-Level Override Chain** to resolve configuration for every component. This allows you to keep your `MultigresCluster` spec clean while maintaining full control when needed.\n\n### 1. The Default Hierarchy\n\nWhen determining the configuration for a component (e.g., a Shard), the operator looks for configuration in this order:\n\n1.  **Inline Spec / Explicit Template Ref**: Defined directly on the component in the `MultigresCluster` YAML.\n2.  **Cluster-Level Template Default**: Defined in `spec.templateDefaults` of the `MultigresCluster`.\n3.  **Namespace-Level Default**: A template of the correct kind (e.g., `ShardTemplate`) named `\"default\"` in the same namespace.\n4.  **Operator Hardcoded Defaults**: Fallback values built into the operator Webhook.\n\n### 2. Templates and Overrides\n\nTemplates allow you to define standard configurations (e.g., \"Standard High-Availability Cell\"). You can then apply specific **overrides** on top of a template.\n\n**Example: Using a Template with Overrides**\n```yaml\nspec:\n  cells:\n    - name: \"us-east-1a\"\n      cellTemplate: \"standard-ha-cell\" # <--- Uses the template\n      overrides:                       # <--- Patches specific fields\n        multigateway:\n          replicas: 5                  # <--- Overrides only the replica count\n```\n\n**Note on Overrides**: When using `overrides`, you must provide the complete struct for the section you are overriding if it's a pointer. For specific fields like resources, it's safer to ensure you provide the full context if the merge behavior isn't granular enough for your needs (currently, the resolver performs a deep merge).\n\n### 3. Template Update Behavior\n\n> [!WARNING]\n> When a template (`CoreTemplate`, `CellTemplate`, or `ShardTemplate`) is updated, **all clusters using that template are reconciled immediately**. This means changes to a shared template propagate to every referencing cluster at once.\n\nFor production environments where you want controlled rollouts, consider **versioning templates by name**:\n\n```yaml\n# Instead of editing \"standard-shard\" in-place...\napiVersion: multigres.com/v1alpha1\nkind: ShardTemplate\nmetadata:\n  name: standard-shard-v2   # <--- New version = new resource\nspec:\n  # ... updated configuration\n```\n\nThen update each cluster's `templateRef` individually when ready:\n```yaml\nspec:\n  templateDefaults:\n    shardTemplate: \"standard-shard-v2\"  # <--- Opt-in to the new version\n```\n\n> [!NOTE]\n> Avoid using `default`-named templates (the namespace-level fallback) in production if you need controlled rollouts. They cannot be versioned since any cluster without an explicit template reference will automatically use whichever template is named `default`.\n>\n> This mechanism may change in future versions. See [Template Propagation](docs/development/template-propagation.md) for details on planned improvements.\n\n---\n\n## Backup & Restore\n\nThe operator integrates **pgBackRest** for automated backups, WAL archiving, and point-in-time recovery (PITR). Two storage backends are supported: **S3** (recommended for production and multi-cell clusters) and **Filesystem** (PVC-based, for development/single-node). Backup configuration is fully declarative and propagates from the cluster level down to individual shards.\n\nKey features:\n- **Replica-based backups** — backups run on a replica to avoid impacting the primary\n- **S3 credential options** — IRSA, static credentials, or EC2 instance metadata\n- **Auto-generated TLS** — pgBackRest inter-node TLS is managed automatically, with optional cert-manager support\n\n> [!WARNING]\n> Filesystem backups are **cell-local**. Cross-cell failover cannot restore from another cell's backup. Use S3 for multi-cell clusters.\n\n📖 **Full documentation:** [Backup & Restore Guide](docs/backup-restore.md)\n\n## Observability\n\nThe operator ships with built-in support for **metrics**, **alerting**, **distributed tracing**, and **structured logging**.\n\n- **Metrics** — Prometheus endpoint with 8 operator-specific metrics + controller-runtime framework metrics\n- **Alerts** — 10 pre-configured PrometheusRule alerts with dedicated runbooks ([view runbooks](docs/monitoring/runbooks/))\n- **Grafana Dashboards** — Operator dashboard, per-cluster topology dashboard, and data-plane operations dashboard\n- **Distributed Tracing** — OpenTelemetry OTLP support, disabled by default, zero overhead when off\n- **Structured Logging** — JSON logging with automatic `trace_id`/`span_id` injection for log-trace correlation\n\n📖 **Full documentation:** [Observability Guide](docs/observability.md) · [Observability Demo](demo/observability/)\n\n---\n\n## Webhook & Certificate Management\n\nThe operator includes a Mutating and Validating Webhook to enforce defaults and data integrity.\n\n### Automatic Certificate Management (Default)\nBy default, the operator manages its own TLS certificates using the generic `pkg/cert` module. This implements a **Split-Secret PKI** architecture:\n\n1.  **Bootstrap**: On startup, the cert rotator generates a self-signed Root CA (ECDSA P-256) and a Server Certificate, storing them in two separate Kubernetes Secrets.\n2.  **CA Bundle Injection**: A post-reconcile hook automatically patches the `MutatingWebhookConfiguration` and `ValidatingWebhookConfiguration` with the CA bundle.\n3.  **Rotation**: A background loop checks certificates hourly. Certs nearing expiry (or signed by a rotated CA) are automatically renewed without downtime.\n4.  **Owner References**: Both secrets are owned by the operator Deployment, so they are garbage-collected on uninstall.\n\n### Using external Cert-Manager\nIf you prefer to use `cert-manager` or another external tool, deploy using the cert-manager overlay (`install-certmanager.yaml`). This overlay:\n\n1.  Creates a `Certificate` and `ClusterIssuer` resource for cert-manager to manage.\n2.  Mounts the cert-manager-provisioned secret to `/var/run/secrets/webhook` so certificates exist on disk at startup.\n\nThe operator **automatically detects** the certificate management strategy on startup:\n- If certificates already exist on disk and the operator did not previously manage them (no cert-strategy annotation), it assumes an external provider (e.g. cert-manager) and skips internal rotation.\n- If no certificates exist on disk, or the operator previously annotated the ValidatingWebhookConfiguration, internal certificate rotation is enabled.\n\n📖 **Cert-Manager walkthrough:** [Cert-Manager Demo](demo/cert-manager/)\n\n---\n\n## GitOps & Webhook Defaults\n\nThe operator's Mutating Webhook materialises all defaults (images, replicas, resources, backup config, etc.) directly into the `MultigresCluster` spec stored in etcd. This means `kubectl get multigrescluster -o yaml` always shows the full effective configuration — no hidden in-memory defaults.\n\nSome fields (like cell assignments on shards) are intentionally kept dynamic and resolved at reconcile time. The resolved values are visible on child CRs (`Shard`, `TableGroup`).\n\nIf you use GitOps tooling (ArgoCD, Flux), the webhook-materialised fields can cause diffs between your Git manifests and the live state. The documentation covers recommended mitigations.\n\n📖 **Full documentation:** [Webhook Defaults & GitOps Guide](docs/gitops-and-webhook-defaults.md)\n\n---\n\n## Pool Replication & Quorum\n\nMultigres uses a configurable **durability policy** to control synchronous replication quorum. The default policy is `AT_LEAST_2`, which requires every write to be acknowledged by at least 2 nodes (the primary + 1 synchronous standby). For multi-AZ clusters, `MULTI_CELL_AT_LEAST_2` enforces cross-zone quorum. This has implications for how many replicas you should run per cell in `readWrite` pools.\n\n| Replicas per Cell | Configuration | Rolling Upgrade Behavior |\n| :--- | :--- | :--- |\n| **1** | 1 pod (primary only, no standbys) | **Downtime during upgrades.** No standby to maintain quorum. |\n| **2** | 1 primary + 1 standby | **Downtime during upgrades.** Draining the standby leaves zero synchronous standbys, violating `AT_LEAST_2`. Upstream multigres rejects the `UpdateSynchronousStandbyList REMOVE` because it would empty the synchronous standby list. |\n| **3** (recommended) | 1 primary + 2 standbys | **Zero-downtime upgrades.** One standby can be drained while the other maintains quorum. |\n\nThe operator enforces a **hard minimum of 1** replica per cell (the CRD rejects `replicasPerCell: 0`). For pools with fewer than 3 replicas, the webhook returns an **admission warning** (not a rejection) explaining the quorum limitation.\n\n📖 **Full documentation:** [Durability Policy](docs/durability-policy.md)\n\n---\n\n## Constraints & Limits (v1alpha1)\n\nPlease be aware of the following constraints in the current version:\n\n*   **Database Limit**: Only **1** database is supported per cluster. It must be named `postgres` and marked `default: true`.\n*   **Shard Naming**: Shards currently must be named `0-inf` - this is a limitation of the current implementation of Multigres.\n*   **Naming Lengths**:\n    *   **TableGroup Names**: If the combined name (`cluster-db-tg`) exceeds **28 characters**, the operator automatically hashes the database and tablegroup names to ensure that the resulting child resource names (Shards, Pods, PVCs) stay within Kubernetes limits (63 chars).\n    *   **Cluster Name**: Recommended to be under **20 characters** to ensure that even with hashing, suffixes fit comfortably.\n*   **Immutable Fields**: Some fields like `zone` and `region` in Cell definitions are immutable after creation.\n*   **Append-Only Pools and Cells**: Pools and cells cannot be renamed or removed from a cluster. This prevents orphaned pods and stale etcd registrations.\n\n---\n\n## Further Reading\n\n| Resource | Description |\n| :--- | :--- |\n| [Operator Capability Levels](docs/operator-capability-levels.md) | Maturity assessment against the [Operator Framework capability model](https://operatorframework.io/operator-capabilities/) |\n| [Webhook Defaults & GitOps](docs/gitops-and-webhook-defaults.md) | How the webhook materialises defaults, dynamic cell resolution, and GitOps compatibility |\n| [Durability Policy](docs/durability-policy.md) | Configurable replication quorum: `AT_LEAST_2` (default) and `MULTI_CELL_AT_LEAST_2` for cross-AZ durability |\n| [External Admin Web](docs/external-admin-web.md) | External exposure for the multiadmin-web Service |\n| [PostgreSQL Configuration](docs/postgresql-configuration.md) | Custom `postgresql.conf` overrides via ConfigMap reference |\n| [Storage Management](docs/storage.md) | PVC deletion policies (Retain/Delete) and volume expansion |\n| [Configuration Reference](docs/configuration.md) | Operator flags, environment variables, and logging |\n| [Demos](demo/) | Guided walkthroughs (webhook, cert-manager, observability) |\n| [Developer Documentation](docs/development/) | Internal architecture, controller patterns, caching strategy |\n| [Contributing](CONTRIBUTING.md) | Development setup, local Kind deployment, code style |\n| [Changelog](CHANGELOG.md) | Release history |\n","summary":"The Multigres Operator is a Kubernetes‑native solution for managing distributed, sharded PostgreSQL clusters across multiple failure domains such as zones or regions. It exposes a single `MultigresCluster` CR to define the entire topology, automatically creates shards, cells, gateways, and manages Pods and PVCs directly for precise control during upgrades and decommissioning. Key capabilities include automated sharding, primary‑aware rolling updates, hierarchical template defaults, failover orchestration, optional external gateways, self‑signed or cert‑manager certificate rotation, and integrated observability hooks. Database administrators and operations teams who run large, multi‑region PostgreSQL workloads on Kubernetes will gain a unified, declarative workflow for high‑availability, scalable database clusters.","description":"Kubernetes operator for Multigres — deploys, scales, and manages horizontally scalable PostgreSQL clusters with automated topology orchestration, drain-safe rolling updates, and admission webhooks","stars":223,"language":"Go"},{"owner":"rvitorper","repo":"go-bt","url":"https://github.com/rvitorper/go-bt","readme":"# go-bt: Minimalist Behavior Trees for Go\n\n`go-bt` is a Behavior Tree library for Go.\n\nDesigned for background workers, game AI, mundane task automation, and asynchronous logic.\n\nInstead of `time.Sleep` or infinite `while` loops, `go-bt` uses a cooperative multitasking model. Nodes return state instantly, yielding control back to the supervisor.\n\n## Core Design Principles\n\n1. **Stateless Nodes:** Nodes (`Sequence`, `Selector`, etc.) do not hold runtime state. All temporal memory and execution states live entirely within the generic `BTContext[T]`.\n2. **The Magic Numbers:** Every node's `Run` method returns exactly one of three integers:\n   * `1` (**Success**): The task is done and successful.\n   * `0` (**Running**): The task needs more time (e.g., waiting on I/O, or sleeping). It yields the thread.\n   * `-1` (**Failure**): The task failed.\n3. **First-Class Context:** `BTContext[T]` directly embeds Go's standard `context.Context`, ensuring your trees natively respect global cancellation tokens and timeouts.\n4. **Time-Travel Testing:** The engine uses an injected clock directly on the context, allowing you to instantly test a 5-minute `Timeout` or `Sleep` node in your unit tests without actually waiting.\n\n## The Node Library\n\n`go-bt` provides a minimalist set of core nodes that can be combined to create any logical control flow:\n\n* **Composites:** `Selector` (Stateless Priority / Fallback), `Sequence` (Stateless AND gate), `MemSequence` (Stateful chronological execution)\n* **Decorators:** `Inverter` (NOT gate), `Optional` (Swallows failures), `Timeout`, `Retry`, `Repeat`\n* **Leaves:** `Condition` (Instant memory read), `Action` (Execution), `Sleep` (Non-blocking wait)\n\n---\n\n## Quick Start\n\n### 1. Define your Blackboard\nYour blackboard is the custom state your tree will read and manipulate. Because the library uses Go Generics, it can be any struct.\n\n```go\ntype WorkerState struct {\n    IsConnected  bool\n    PendingTasks int\n}\n```\n\n### 2. Build the Tree\nYou can use the `go-bt` nodes to assemble your logic. This example asserts that the worker is connected before attempting to process tasks:\n\n```go\npackage main\n\nimport (\n    \"time\"\n    \"context\"\n    \"go-bt/core\"\n    \"go-bt/composite\"\n    \"go-bt/leaf\"\n)\n\nfunc BuildWorkerTree(cancel context.CancelFunc) core.Command[WorkerState] {\n   return composite.NewSelector(\n      composite.NewSequence(\n         composite.NewSelector(\n            leaf.NewCondition(func(blackboard *WorkerState) bool {\n               // Assert connected\n               // Here you'd check whether the connection is valid, etc.\n               return blackboard.IsConnected\n            }),\n            leaf.NewAction(func(ctx *core.BTContext[WorkerState]) int {\n               // Make a network connection\n               // Here you'd actually connect to a database\n               ctx.Blackboard.IsConnected = true\n               return 1\n            }),\n         ),\n         leaf.NewAction(func(ctx *core.BTContext[WorkerState]) int {\n            // Process Tasks if connected\n            if ctx.Blackboard.PendingTasks <= 0 {\n               cancel()\n               return 1\n            }\n            ctx.Blackboard.PendingTasks--\n            return 1\n         }),\n      ),\n   )\n}\n```\n\n### 3. Start the Supervisor Daemon\n`go-bt` provides a concurrent, panic-safe `Supervisor` to drive your tree. It spins up in the background and continuously ticks the logic without blocking your main application thread.\n\n```go\nfunc main() {\n   state := &WorkerState{IsConnected: false, PendingTasks: 2}\n   \n   // Initialize the context with a global cancellation token\n   ctx, cancel := context.WithCancel(context.Background())\n   btCtx := core.NewBTContext(ctx, state)\n   tree := BuildWorkerTree(cancel)\n   \n   // Create a Supervisor that ticks every 100ms\n   supervisor := core.NewSupervisor(tree, 100*time.Millisecond, func(err any) {\n   println(\"Tree panicked, safely recovered:\", err)\n   })\n   \n   // Start the daemon in the background\n   wg := supervisor.Start(btCtx)\n   \n   // Wait for the global context to be cancelled\n   wg.Wait()\n}\n```\n\nYou can check examples in the `example` directory.\n\n---\n\n## Testing & Clock Injection\n\nTesting temporal logic (like `Sleep` or `Timeout`) in CI/CD pipelines usually results in slow, flaky tests. `go-bt` solves this by exposing the `Now` function directly on the `BTContext`.\n\nIn your tests, simply replace the standard clock with a mock closure. This allows you to artificially advance time by hours or days in a single microsecond, instantly triggering your `Timeout` or `Sleep` node's success/failure states to assert structural correctness.","summary":"`go-bt` is a lightweight Behavior Tree library for Go that enables cooperative multitasking by having stateless nodes return a “running” state without blocking the caller. All temporal state and context handling lives in a generic `BTContext[T]`, which embeds Go’s `context.Context`, so trees automatically honor cancellation, timeouts, and can inject a mock clock for instant unit‑testing of delays. The library supplies minimalist composites (Sequence, Selector), decorators (Timeout, Retry, Inverter), and leaves (Action, Condition, Sleep), making it easy to build any control flow for background workers, game AI or asynchronous logic. Developers who need non‑blocking, testable background tasks or game AI logic will benefit most from this concise, generics‑driven approach.","description":"Minimalist BT implementation in Go","stars":100,"language":"Go"},{"owner":"RyanCodrai","repo":"turbovec","url":"https://github.com/RyanCodrai/turbovec","readme":"<p align=\"center\">\n  <img src=\"docs/header.png\" alt=\"turbovec — Google's TurboQuant for vector search\" width=\"100%\">\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/RyanCodrai/turbovec/blob/main/LICENSE\"><img src=\"https://img.shields.io/pypi/l/turbovec\" alt=\"License\"></a>\n  <a href=\"https://pypi.org/project/turbovec/\"><img src=\"https://img.shields.io/pypi/v/turbovec?label=pypi&color=blue\" alt=\"PyPI version\"></a>\n  <a href=\"https://crates.io/crates/turbovec\"><img src=\"https://img.shields.io/crates/v/turbovec?label=crates.io&color=blue\" alt=\"crates.io version\"></a>\n  <a href=\"https://arxiv.org/abs/2504.19874\"><img src=\"https://img.shields.io/badge/paper-arXiv-b31b1b.svg\" alt=\"TurboQuant paper\"></a>\n</p>\n\n---\n\n**A 10 million document corpus takes 31 GB of RAM as float32. turbovec fits it in 4 GB - and searches it faster than FAISS.**\n\nturbovec is a Rust vector index with Python bindings, built on Google Research's [**TurboQuant**](https://arxiv.org/abs/2504.19874) algorithm - a data-oblivious quantizer that matches the Shannon lower bound on distortion with zero training and zero data passes.\n\n- **No codebook training.** Add vectors, they're indexed. No data-dependent calibration, no rebuilds as the corpus grows.\n- **Faster than FAISS.** Hand-written NEON (ARM) and AVX-512BW (x86) kernels beat FAISS IndexPQFastScan by 12–20% on ARM and match-or-beat it on x86.\n- **Pure local.** No managed service, no data leaving your machine or VPC. Pair with any open-source embedding model for a fully air-gapped RAG stack.\n\nBuilding RAG where privacy, memory, or latency matters? **You're in the right place.**\n\n## Python\n\n```bash\npip install turbovec\n```\n\n```python\nfrom turbovec import TurboQuantIndex\n\nindex = TurboQuantIndex(dim=1536, bit_width=4)\nindex.add(vectors)\nindex.add(more_vectors)\n\nscores, indices = index.search(query, k=10)\n\nindex.write(\"my_index.tq\")\nloaded = TurboQuantIndex.load(\"my_index.tq\")\n```\n\n### LangChain\n\n```bash\npip install turbovec[langchain]\n```\n\n```python\nfrom langchain_huggingface import HuggingFaceEmbeddings\nfrom turbovec.langchain import TurboQuantVectorStore\n\nembeddings = HuggingFaceEmbeddings(model_name=\"BAAI/bge-base-en-v1.5\")\n\nstore = TurboQuantVectorStore.from_texts(\n    texts=[\"Document 1...\", \"Document 2...\", \"Document 3...\"],\n    embedding=embeddings,\n    bit_width=4,\n)\n\nretriever = store.as_retriever(search_kwargs={\"k\": 5})\n```\n\n### LlamaIndex\n\n```bash\npip install turbovec[llama-index]\n```\n\n```python\nfrom llama_index.core import VectorStoreIndex, StorageContext\nfrom turbovec.llama_index import TurboQuantVectorStore\n\nvector_store = TurboQuantVectorStore.from_params(dim=768, bit_width=4)\nstorage_context = StorageContext.from_defaults(vector_store=vector_store)\n\nindex = VectorStoreIndex.from_documents(documents, storage_context=storage_context)\nretriever = index.as_retriever(similarity_top_k=5)\n```\n\n## Rust\n\n```bash\ncargo add turbovec\n```\n\n```rust\nuse turbovec::TurboQuantIndex;\n\nlet mut index = TurboQuantIndex::new(1536, 4);\nindex.add(&vectors);\nlet results = index.search(&queries, 10);\nindex.write(\"index.tv\").unwrap();\nlet loaded = TurboQuantIndex::load(\"index.tv\").unwrap();\n```\n\n## Recall\n\nTurboQuant vs FAISS IndexPQFastScan (100K vectors, k=64). FAISS PQ configurations sized to match TurboQuant compression ratios.\n\n![Recall d=1536](docs/recall_d1536.svg)\n\n![Recall d=3072](docs/recall_d3072.svg)\n\nBoth libraries converge to 1.0 by k=4–8. At 4-bit, TurboQuant and FAISS both score 0.955+ at top-1 across every dataset and are within 0.001 of each other. The small differences at 2-bit top-1 (TurboQuant 0.870 vs FAISS 0.882 at d=1536; TurboQuant 0.912 vs FAISS 0.903 at d=3072) reflect how each method behaves at the most aggressive end of the compression curve — they disappear once k ≥ 2. Full results: [d=1536 2-bit](benchmarks/results/recall_d1536_2bit.json), [d=1536 4-bit](benchmarks/results/recall_d1536_4bit.json), [d=3072 2-bit](benchmarks/results/recall_d3072_2bit.json), [d=3072 4-bit](benchmarks/results/recall_d3072_4bit.json), [GloVe 2-bit](benchmarks/results/recall_glove_2bit.json), [GloVe 4-bit](benchmarks/results/recall_glove_4bit.json).\n\nNo FAISS FastScan comparison for GloVe d=200 (dimension not compatible with FastScan's m%32 requirement).\n\n## Compression\n\n![Compression](docs/compression.svg)\n\n## Search Speed\n\nAll benchmarks: 100K vectors, 1K queries, k=64, median of 5 runs.\n\n### ARM (Apple M3 Max)\n\n![ARM Speed — Single-threaded](docs/arm_speed_st.svg)\n\n![ARM Speed — Multi-threaded](docs/arm_speed_mt.svg)\n\nOn ARM, TurboQuant beats FAISS FastScan by 12–20% across every config.\n\n### x86 (Intel Xeon Platinum 8481C / Sapphire Rapids, 8 vCPUs)\n\n![x86 Speed — Single-threaded](docs/x86_speed_st.svg)\n\n![x86 Speed — Multi-threaded](docs/x86_speed_mt.svg)\n\nOn x86, TurboQuant wins every 4-bit config by 1–6% and runs within ~1% of FAISS on 2-bit ST. The 2-bit MT rows (d=1536 and d=3072) are the only configs sitting slightly behind FAISS (2–4%), where the inner accumulate loop is too short for unrolling amortization to match FAISS's AVX-512 VBMI path.\n\n## How it works\n\nEach vector is a direction on a high-dimensional hypersphere. TurboQuant compresses these directions using a simple insight: after applying a random rotation, every coordinate follows a known distribution -- regardless of the input data.\n\n**1. Normalize.** Strip the length (norm) from each vector and store it as a single float. Now every vector is a unit direction on the hypersphere.\n\n**2. Random rotation.** Multiply all vectors by the same random orthogonal matrix. After rotation, each coordinate independently follows a Beta distribution that converges to Gaussian N(0, 1/d) in high dimensions. This holds for any input data -- the rotation makes the coordinate distribution predictable.\n\n**3. Lloyd-Max scalar quantization.** Since the distribution is known, we can precompute the optimal way to bucket each coordinate. For 2-bit, that's 4 buckets; for 4-bit, 16 buckets. The [Lloyd-Max algorithm](https://en.wikipedia.org/wiki/Lloyd%27s_algorithm) finds bucket boundaries and centroids that minimize mean squared error. These are computed once from the math, not from the data.\n\n**4. Bit-pack.** Each coordinate is now a small integer (0-3 for 2-bit, 0-15 for 4-bit). Pack these tightly into bytes. A 1536-dim vector goes from 6,144 bytes (FP32) to 384 bytes (2-bit). That's 16x compression.\n\n**Search.** Instead of decompressing every database vector, we rotate the query once into the same domain and score directly against the codebook values. The scoring kernel uses SIMD intrinsics (NEON on ARM, AVX-512BW on modern x86 with an AVX2 fallback) with nibble-split lookup tables for maximum throughput.\n\nThe paper proves this achieves distortion within a factor of 2.7x of the information-theoretic lower bound (Shannon's distortion-rate limit). You cannot do much better for a given number of bits.\n\n## Building\n\n### Python (via maturin)\n\n```bash\npip install maturin\ncd turbovec-python\nmaturin build --release\npip install target/wheels/*.whl\n```\n\n### Rust\n\n```bash\ncargo build --release\n```\n\nAll x86_64 builds target `x86-64-v3` (AVX2 baseline, Haswell 2013+) via `.cargo/config.toml`. Any CPU that can run the AVX2 fallback kernel can run the whole crate — the AVX-512 kernel is gated at runtime via `is_x86_feature_detected!` and only kicks in on hardware that supports it.\n\n## Running benchmarks\n\nDownload datasets:\n```bash\npython3 benchmarks/download_data.py all            # all datasets\npython3 benchmarks/download_data.py glove          # GloVe d=200\npython3 benchmarks/download_data.py openai-1536    # OpenAI DBpedia d=1536\npython3 benchmarks/download_data.py openai-3072    # OpenAI DBpedia d=3072\n```\n\nEach benchmark is a self-contained script in `benchmarks/suite/`. Run any one individually:\n```bash\npython3 benchmarks/suite/speed_d1536_2bit_arm_mt.py\npython3 benchmarks/suite/recall_d1536_2bit.py\npython3 benchmarks/suite/compression.py\n```\n\nRun all benchmarks for a category:\n```bash\nfor f in benchmarks/suite/speed_*arm*.py; do python3 \"$f\"; done    # all ARM speed\nfor f in benchmarks/suite/speed_*x86*.py; do python3 \"$f\"; done    # all x86 speed\nfor f in benchmarks/suite/recall_*.py; do python3 \"$f\"; done       # all recall\npython3 benchmarks/suite/compression.py                            # compression\n```\n\nResults are saved as JSON to `benchmarks/results/`. Regenerate charts:\n```bash\npython3 benchmarks/create_diagrams.py\n```\n\n## References\n\n- [TurboQuant: Online Vector Quantization with Near-optimal Distortion Rate](https://arxiv.org/abs/2504.19874) (ICLR 2026) -- the paper this implements\n- [FAISS Fast accumulation of PQ and AQ codes](https://github.com/facebookresearch/faiss/wiki/Fast-accumulation-of-PQ-and-AQ-codes-(FastScan)) -- turbovec's x86 SIMD kernel adapts FastScan's pack layout, nibble-LUT scoring, and u16 accumulator strategy\n","summary":"turbovec is a Rust‑based vector index with Python bindings that implements Google Research’s TurboQuant algorithm, a data‑oblivious quantizer that achieves near‑optimal compression with no training or data passes. By encoding vectors at 4‑bit precision it can store a 10 million‑document corpus in roughly 4 GB of RAM while delivering search speeds 12–20 % faster than FAISS on ARM and comparable on x86 thanks to hand‑written NEON and AVX‑512 kernels. The library runs entirely locally, so data never leaves the machine or VPC, making it ideal for privacy‑constrained or latency‑critical RAG pipelines that require tight memory budgets. Developers building retrieval‑augmented generation systems with LangChain, LlamaIndex or custom embeddings will benefit from turbovec’s zero‑overhead indexing, rapid query performance, and proven recall at aggressive compression rates.","description":"A vector index built on TurboQuant, written in Rust with Python bindings","stars":392,"language":"Python"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
