 email |\n| `e` | Archive current email |\n| `Esc` | Back / discard |\n| `Cmd+Enter` | Send message |\n\n## Troubleshooting\n\n**\"Access blocked: This app has not completed the Google verification process\"**\nYou didn't add yourself as a test user. Go to the [OAuth consent screen](https://console.cloud.google.com/apis/credentials/consent), click your app, go to the Test users section, and add your Gmail address.\n\n**\"Error 400: redirect_uri_mismatch\"**\nYour OAuth credentials are missing the redirect URI. Go to [Credentials](https://console.cloud.google.com/apis/credentials), click on your OAuth client, and make sure both **Authorized JavaScript origins** and **Authorized redirect URIs** include `http://localhost:3000` (exact match, no trailing slash).\n\n**\"Error 401: invalid_client\"**\nDouble-check that you copied the full Client ID (it ends with `.apps.googleusercontent.com`). If using `config.js`, make sure the file is saved and you restarted the server.\n\n**\"Google hasn't verified this app\"**\nThis is expected. Click **Advanced** → **Go to BAREMAIL (unsafe)**. This warning appears because your app is in testing mode. Your data still goes directly to Google's API.\n\n## FAQ\n\n**Why not just use Thunderbird / mutt / Apple Mail over IMAP?**\n\nA few reasons:\n\n1. **IMAP is chatty.** It requires many round trips to synchronize mailbox state, and re-establishing that state after a dropped connection is painful. On flaky airplane wifi, that matters — a lot. BAREMAIL talks to Gmail's REST API, which is single request/response per action with no persistent connection to maintain.\n2. **Gmail is phasing out IMAP-friendly auth.** Gmail requires you to either enable \"less secure app\" access (being deprecated) or deal with proprietary OAuth flows that most desktop clients handle poorly. BAREMAIL uses the same OAuth + PKCE flow that Google's own apps use.\n3. **Zero install, works anywhere.** BAREMAIL runs in any browser and installs as a PWA. No desktop app to configure, no IMAP settings to get right, nothing to sync across devices. Open it, sign in, done.\n4. **It's a different use case.** If you already have a desktop mail client synced and ready to go, great — use it! BAREMAIL is for when you're on a plane, open your laptop, and Gmail won't load. No pre-synced mailbox needed; just a browser and a trickle of bandwidth.\n\n**Why not just use regular Gmail? It works okay on bad connections.**\n\nGmail's web client is surprisingly well-optimized *if* you already have it cached. The problem is cold starts — if you haven't loaded Gmail recently (or at all on that device), you're downloading megabytes of JavaScript before you can read a single email. BAREMAIL's entire app shell is ~60KB gzipped and cached by a service worker after the first visit. After that, the only network traffic is the raw API data for your messages.\n\n**Why not switch to Fastmail / Hey / ProtonMail / etc.?**\n\nBAREMAIL isn't a mail service — it's a client. You keep your existing Gmail account, contacts, history, everything. It's free, open source, has no backend, and runs entirely in your browser. If you're happy with Gmail but want a lighter interface, that's what this is for.\n\n**Why do I need to create a Google Cloud project? That sounds complicated.**\n\nGoogle doesn't offer a simple \"connect your app to Gmail\" button — any third-party client needs OAuth credentials from a GCP project. There's no way around this without running a backend server (which would defeat the purpose of BAREMAIL). The built-in setup wizard walks you through each step, opens the exact GCP pages you need, and takes about 3 minutes.\n\n**Is it safe to have the OAuth client secret in browser code?**\n\nYes. Google's OAuth documentation explicitly covers this case for browser-based (\"single-page\") apps. The client secret alone can't access anyone's data — it requires user consent via the OAuth flow, and BAREMAIL uses PKCE to protect against authorization code interception. This is the same model that any client-side Gmail integration uses.\n\n**Can I use this with non-Gmail accounts?**\n\nNot currently. BAREMAIL is built specifically for the Gmail REST API. Supporting generic IMAP would add significant complexity and reintroduce the round-trip problems that BAREMAIL is designed to avoid.\n\n## Contributing\n\n- Every PR must not increase the app shell beyond 200KB gzipped\n- Runtime dependencies must be justified by their size-to-value ratio\n- Features must degrade gracefully offline\n- Feature rubric: \"does this help on airplane wifi?\"\n\n## License\n\nMIT — see [LICENSE](LICENSE)\n\n## Support\n\nIf BAREMAIL saved you from staring at a loading spinner on airplane wifi, consider buying the bear a coffee:\n\n```\n      ʕ·ᴥ·ʔ ☕\n      |    |/\n      |    |    thx for the coffee!\n     /|    |\\\n```\n\n<a href=\"https://www.buymeacoffee.com/mzschwartz88\"><img src=\"https://img.shields.io/badge/Buy_Me_A_Coffee-FFDD00?style=for-the-badge&logo=buy-me-a-coffee&logoColor=black\" alt=\"Buy Me A Coffee\"></a>\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/svg?repos=matt-virgo/baremail&type=Date)](https://star-history.com/#matt-virgo/baremail&Date)\n\n## Thanks!","summary":"BAREMAIL is a minimal progressive web app that connects directly to the Gmail API, delivering a lightweight Gmail experience that works well on low‑bandwidth or unreliable connections. It offers a tiny 200 KB app shell, with inboxes loading just a few kilobytes of JSON, supports offline read and compose with a background sync queue, keyboard shortcuts, theming, search, and basic label management—all without installing native software. Users in remote or bandwidth‑constrained environments, developers looking for a lean Gmail client, or anyone who wants a quick‑to‑install, offline‑first email interface will benefit from its fast startup, low data usage, and pure‑text focus.","description":null,"stars":80,"language":"TypeScript"},{"owner":"mohshomis","repo":"modo","url":"https://github.com/mohshomis/modo","readme":"<p align=\"center\">\n  <img src=\"resources/modo-app-icon.svg\" alt=\"Modo\" width=\"140\" />\n</p>\n\n<h1 align=\"center\">Modo</h1>\n\n<p align=\"center\">\n  The open-source AI IDE that plans before it codes.\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/modoeditor/modo/blob/main/LICENSE.txt\">MIT License</a> · <a href=\"#quick-start\">Quick Start</a> · <a href=\"#what-modo-adds\">What Modo Adds</a> · <a href=\"#contributing\">Contributing</a>\n</p>\n\n<p align=\"center\">\n  <img src=\"resources/modo-demo.gif\" alt=\"Modo in action\" width=\"700\" />\n</p>\n\n---\n\nI wanted a small feature in an AI coding tool. Couldn't find a way to suggest it. So I asked myself: how hard is it to actually build something like Kiro, Cursor, or Windsurf?\n\nTurns out — not as hard as you'd think. Starting from the [Void](https://github.com/voideditor/void) editor (itself a fork of VS Code), I got to roughly 60–70% of what those tools offer in a short stretch of building. It was genuinely fun.\n\nThis is Modo. A standalone desktop IDE where prompts become structured plans before they become code. Open source, MIT licensed, yours to hack on.\n\n## What Modo Adds\n\nEverything below was built on top of Void's existing AI chat, inline edit (Cmd+K), autocomplete, multi-provider LLM support, tool use, and MCP integration. Here's what's new:\n\n### Spec-Driven Development\n\nMost AI tools go prompt → code. Modo goes prompt → requirements → design → tasks → code.\n\nA spec lives in `.modo/specs/<name>/` as three markdown files:\n\n```\n.modo/specs/auth-flow/\n├── requirements.md     # user stories, acceptance criteria\n├── design.md           # architecture, components, data models\n└── tasks.md            # checklist of implementation steps\n```\n\nCreate one with `Cmd+Shift+S` or by picking Spec mode in the session picker. Choose feature or bugfix, then requirements-first or design-first workflow. The agent fills each document, you review, then it executes tasks one by one — marking them done as it goes.\n\nTasks persist to disk. Close the IDE, come back, pick up where you left off.\n\n### Task CodeLens\n\nOpen any `tasks.md` and each pending task gets a clickable \"▶ Run Task\" button inline. A \"Run All Pending Tasks\" button appears at the top. Running tasks show a spinner, completed ones show a checkmark. The agent marks `- [ ]` → `- [~]` → `- [x]` as it works.\n\n### Steering Files\n\nMarkdown documents in `.modo/steering/` that inject project rules into every AI interaction — no need to repeat yourself.\n\n```markdown\n---\ninclusion: always\n---\n# Project Rules\n- Use TypeScript strict mode\n- All endpoints need input validation\n```\n\nThree inclusion modes:\n- `always` — every interaction\n- `fileMatch` — when the active file matches a glob pattern\n- `manual` — referenced via `/` commands in chat\n\nSupports `#[[file:path]]` references to link OpenAPI specs, GraphQL schemas, or any project doc.\n\n### Agent Hooks\n\nJSON configs in `.modo/hooks/` that automate actions around the agent lifecycle.\n\n```json\n{\n  \"name\": \"Lint on Save\",\n  \"version\": \"1.0.0\",\n  \"when\": { \"type\": \"fileEdited\", \"patterns\": [\"**/*.ts\"] },\n  \"then\": { \"type\": \"runCommand\", \"command\": \"npx eslint --fix ${filePath}\" }\n}\n```\n\n10 event types: `fileEdited`, `fileCreated`, `fileDeleted`, `promptSubmit`, `agentStop`, `preToolUse`, `postToolUse`, `preTaskExecution`, `postTaskExecution`, `userTriggered`. Two action types: `askAgent` or `runCommand`. Pre-tool hooks can deny execution. Circular dependency detection built in.\n\n### Autopilot / Supervised Toggle\n\nA status bar pill that switches between Autopilot (agent acts autonomously) and Supervised (agent pauses for approval). Wired directly to auto-approve settings for edits, terminal commands, and MCP tools.\n\n### Parallel Chat Sessions\n\nMultiple chat sessions as tabs. Each has its own thread, context, and history. Open new ones, close old ones, or run them all at once. A searchable history panel lets you find past conversations.\n\n### Vibe and Spec Modes\n\nStart a session in Vibe mode for free-form exploration, or Spec mode for structured development. In Spec mode, your prompt triggers the full requirements → design → tasks workflow. The active spec's content is automatically injected into the LLM system prompt.\n\n### Subagents\n\nSpawn parallel agents for independent subtasks. Each gets its own thread and tool access. Track status, cancel running tasks, or clear completed ones.\n\n### Powers\n\nInstallable knowledge packages that bundle documentation, steering files, and MCP configs. Built-in powers for TypeScript, React, Testing, API Design, and Docker. Activate based on keywords in your prompts. Install custom powers from URLs.\n\n### Dedicated Explorer Pane\n\nA sidebar with collapsible sections for Specs (with progress bars and task counts), Agent Hooks (showing event → action flow), Steering (showing inclusion mode), and Powers.\n\n### Slash Commands\n\nType `/` in chat to access manual hooks, steering files, and built-in commands: create spec, run tasks, export conversation, initialize workspace.\n\n### Context Injection\n\nSteering files and the active spec are automatically prepended to every LLM interaction. The agent follows your project rules and knows what it's building without being told each time.\n\n### Custom Dark Theme\n\nA purpose-built \"Modo Dark\" theme with teal accents, tuned syntax highlighting, and terminal colors.\n\n### Companion Character\n\nA Modo avatar appears before each response with randomized expressions during streaming and a calm default after completion.\n\n### Full Rebranding\n\nCustom app icon, window title, watermark logo, product identity, URL protocol (`modo://`), and data directories (`.modo-editor/`). All Void references in the UI replaced with Modo equivalents.\n\n### Workspace Initialization\n\n`Modo: Initialize Workspace` creates the full `.modo/` directory structure with default steering files and config templates.\n\n### Export\n\nExport any conversation as Markdown to clipboard from the command palette.\n\n\n## Built On\n\nModo wouldn't exist without these projects:\n\n| Project | What it provides | License |\n|---|---|---|\n| [Void](https://github.com/voideditor/void) | AI chat, inline edit, autocomplete, multi-provider LLM, tool use, MCP, apply engine | MIT |\n| [VS Code](https://github.com/microsoft/vscode) | Editor core, extension system, terminal, file system, everything underneath | MIT |\n| [Roo Code](https://github.com/RooCodeInc/Roo-Code) | Some patterns referenced during development | Apache 2.0 |\n\nVoid itself provides: multi-provider support (Anthropic, OpenAI, Gemini, Ollama, Mistral, Groq, OpenRouter), chat sidebar, Cmd+K inline editing, autocomplete, fast/slow apply, tool calling, MCP integration, SCM integration, and the settings system.\n\nModo adds everything in the [What Modo Adds](#what-modo-adds) section on top of that foundation.\n\n\n## Quick Start\n\n```bash\ngit clone https://github.com/mohshomis/modo.git\ncd modo\nnpm install          # requires Node 20\nnpm run buildreact   # compile React UI\nnpm run watch        # compile TypeScript (keep running in a terminal)\n./scripts/code.sh    # launch Modo\n```\n\nOn first launch, onboarding walks you through connecting a model provider. Gemini free tier is the fastest way to start.\n\n\n## Project Structure\n\n```\n.modo/                          # per-project config (created by \"Initialize Workspace\")\n├── steering/                   # markdown rules injected into AI context\n├── specs/                      # structured feature/bugfix workflows\n├── hooks/                      # JSON event → action automation\n└── settings/                   # MCP and other configs\n\nsrc/vs/workbench/contrib/void/\n├── common/\n│   ├── modoSpecService.ts      # spec CRUD, task parsing, context building\n│   ├── modoSteeringService.ts  # steering file loading, front-matter parsing, context assembly\n│   ├── modoHookService.ts      # hook loading, validation, event matching, firing\n│   ├── modoPowersService.ts    # powers registry, activation, keyword matching\n│   └── modoSubagentService.ts  # parallel agent spawning and lifecycle\n├── browser/\n│   ├── modoExplorerPane.ts     # sidebar views for specs, hooks, steering, powers\n│   ├── modoSpecActions.ts      # create spec, run tasks, open files commands\n│   ├── modoTaskCodeLens.ts     # inline Run Task / Done buttons in tasks.md\n│   ├── modoSlashCommands.ts    # / command picker, export, session management\n│   ├── modoStatusBar.ts        # autopilot toggle, active spec indicator\n│   ├── modoHookWiring.ts       # file change events → hook system\n│   └── react/src/\n│       ├── sidebar-tsx/         # session tabs, history, vibe/spec mode, autopilot switch\n│       ├── modo-spec-panel/     # spec management React UI\n│       └── modo-hooks-panel/    # hook management React UI\n└── extensions/\n    └── modo-theme/              # custom dark theme with teal accents\n```\n\n\n## Commands\n\n| Command | Shortcut | Description |\n|---|---|---|\n| Create Spec | `Cmd+Shift+S` | New spec (feature/bugfix, req-first/design-first) |\n| Run Next Task | — | Execute next pending spec task |\n| Run All Tasks | — | Execute all remaining tasks |\n| Open Spec Files | — | Open requirements, design, tasks in editor |\n| Inject Spec Context | — | Load spec context into chat |\n| Reload Spec | — | Re-read spec files from disk |\n| Initialize Workspace | — | Create `.modo/` directory structure |\n| Slash Commands | — | Open `/` command picker |\n| Export Conversation | — | Copy chat as Markdown |\n| Toggle Autopilot | — | Switch Autopilot / Supervised |\n| Open Chat | `Cmd+L` | Focus chat panel |\n| Inline Edit | `Cmd+K` | Edit code inline with AI |\n\n\n## Contributing\n\nThis project is community-maintained. I built it as a learning experiment — I'm not actively maintaining it on a schedule. If you want something fixed or added, the best path is to fork it and submit a PR.\n\n```bash\nnpm run watch        # TypeScript compilation (keep running)\nnpm run buildreact   # React UI (run after changing .tsx files)\n./scripts/code.sh    # Launch the IDE\n```\n\nCore services: `src/vs/workbench/contrib/void/common/`. Browser-side logic: `browser/`. React components: `browser/react/src/`.\n\nSerious contributors who want commit access — open an issue. See [CONTRIBUTING.md](CONTRIBUTING.md) for details.\n\nPRs welcome. MIT licensed.\n\n\n## License\n\nMIT\n","summary":"MoDo is an open‑source desktop AI IDE that turns prompts into structured plans before generating code, enabling spec‑driven development. It adds a workflow where a feature is broken into requirements, design, and a task checklist stored in markdown, with inline “Run Task” buttons and persistent progress, as well as steering files that inject project rules into every AI interaction. The IDE also offers agent hooks for automated actions on file events, an Autopilot/Supervised toggle, and parallel chat sessions for independent tasks. Developers who want more controlled, document‑centric AI assistance—especially those building complex features or maintaining codebases—will benefit most from using MoDo.","description":null,"stars":170,"language":"TypeScript"},{"owner":"randerson112","repo":"craft","url":"https://github.com/randerson112/craft","readme":"# Craft\n\nA lightweight build and workflow tool for C/C++\n\nC and C++ development has always required wrestling with CMake, configuring build systems, and manually managing dependencies. Craft eliminates that friction. You describe your project in a simple `craft.toml` file and Craft handles the rest by generating CMake configuration, managing dependencies, and providing a clean command-line interface that feels modern and smooth.\n\n---\n\n## How Craft Works\n1. Define your project in `craft.toml`\n2. Craft generates `CMakeLists.txt`\n3. Dependencies are fetched automatically\n4. CMake builds your project behind the scenes\n\n---\n\n## Quick Example\n```bash\n# Create a new project\ncraft project my_app\ncd my_app\n\n# Add a dependency\ncraft add --git https://github.com/raysan5/raylib.git --links raylib\n\n# Build it\ncraft build\n\n# Run it\ncraft run\n```\n\n---\n\n## What Craft Solves\n\n### One file defines your project\nDescribe your project in a simple, readable config:\n```toml\n[project]\nname = \"my_app\"\nversion = \"0.1.0\"\nlanguage = \"cpp\"\ncpp_standard = 17\n\n[build]\ntype = \"executable\"\ninclude_dirs = [\"include\"]\nsource_dirs = [\"src\"]\n```\nCraft turns this into a working `CMakeLists.txt` automatically.\n\n### Dependency management that just works\nAdd dependecies to your project with a single command.\n```bash\n# Local Craft project\ncraft add --path ../physics_engine\n\n# Git dependency\ncraft add --git https://github.com/raysan5/raylib --links raylib\n\n# Remove it just as easily\ncraft remove raylib\n\n# Update all dependencies\ncraft update\n```\n- Git repos are cloned automatically\n- CMake wiring is handled for you\n\n### Templates for fast project setup\nSave any project as a reusable template and spin up new projects from it instantly.\n```bash\ncraft template save my_game_template\ncraft project new_game --template my_game_template\n```\nCraft also comes with a few built-in templates for executables and libraries.\n\n---\n\n## Installation\n\n### macOS & Linux\n```bash\ncurl -fsSL https://raw.githubusercontent.com/randerson112/craft/main/install.sh | sh\n```\n\n### Windows (PowerShell)\n```powershell\nirm https://raw.githubusercontent.com/randerson112/craft/main/install.ps1 | iex\n```\n\n**Requirements:** git, cmake\n\n### Verifying Installation\n```bash\ncraft --version\ncraft help\n```\n\n---\n\n## Documentation\n- [Getting started guide](docs/getting-started.md) - installing and learning the basics of Craft\n- [Commands](docs/commands/README.md) - full documentation for each command\n- [craft.toml reference](docs/craft-toml.md) - learn how Craft's main configuration file works\n\n## Contributing\nCraft is open source and community driven. Contributions are welcome. Feel free to open issues, pull requests, or assign yourself to any open issues.\n","summary":"Craft is a lightweight build and workflow tool that automates CMake configuration for C and C++ projects. By describing a project in a single `craft.toml` file, Craft generates the necessary `CMakeLists.txt`, fetches dependencies from Git or local paths, and offers a modern CLI for building, testing, and running code. It also supports reusable project templates and simple commands for adding, removing, or updating dependencies. The tool is ideal for C/C++ developers who want to cut down on manual build system setup and manage libraries more conveniently.","description":"A lightweight build and workflow tool for C/C++","stars":221,"language":"C"},{"owner":"marimo-team","repo":"marimo-pair","url":"https://github.com/marimo-team/marimo-pair","readme":"<h1>\n<p align=\"center\">\n  /marimo-pair\n</h1>\n<p align=\"center\">\n  reactive Python notebooks as environments for agents\n</p>\n</p>\n\n<div align=\"center\">\n  <video src=\"https://github.com/user-attachments/assets/d6d3f57a-e997-423c-bf14-8d9fba75e310\" width=\"600\" controls></video>\n</div>\n\n## Prerequisites\n\n- A running [marimo](https://marimo.io) notebook (`--no-token` for\n  auto-discovery; `MARIMO_TOKEN` env var for servers with auth)\n- `bash`, `curl`, and `jq` available on `PATH`\n\n## Install\n\n### Agent Skills (any tool)\n\nWorks with any agent that supports the [Agent Skills](https://agentskills.io)\nopen standard:\n\n```bash\nnpx skills add marimo-team/marimo-pair\n\n# or upgrade an existing install\nnpx skills upgrade marimo-team/marimo-pair\n```\n\nIf you don't have `npx` installed but have `uv`:\n\n```bash\nuvx deno -A npm:skills add marimo-team/marimo-pair\n```\n\n### Claude Code (plugin)\n\nAdd the marketplace and install the plugin:\n\n```\n/plugin marketplace add marimo-team/marimo-pair\n/plugin install marimo-pair@marimo-team-marimo-pair\n```\n\nTo opt in to auto-updates (recommended), so you always get the latest version:\n\n```\n/plugin → Marketplaces → marimo-team-marimo-pair → Enable auto-update\n```\n\n## FAQ\n\n### I keep getting prompted to allow Bash commands\n\nThe skill declares its own `allowed-tools`, but Claude Code may still prompt\nyou to approve each Bash call. To avoid repeated prompts, copy the absolute\npaths to the scripts from the installed skill and add them to your\n`.claude/settings.json` (project-level) or `~/.claude/settings.json` (global):\n\n```json\n{\n  \"permissions\": {\n    \"allow\": [\n      \"Bash(bash /path/to/skills/marimo-pair/scripts/discover-servers.sh *)\",\n      \"Bash(bash /path/to/skills/marimo-pair/scripts/execute-code.sh *)\"\n    ]\n  }\n}\n```\n","summary":"marimo‑pair turns reactive Python notebooks into executable environments for AI agents, enabling agents to discover, run, and interact with running marimo notebooks. The repository provides a skill that integrates with the Agent Skills open standard, as well as a Claude Code plugin that automatically discovers notebooks via a no‑token connection or a token‑based server, and allows agents to run bash scripts to execute notebook code. With simple `npx` or `uv` commands, developers can install or upgrade the skill, while Claude users can add the marketplace plugin and enable auto‑updates for seamless operation. The tool is especially useful for AI‑developer workflows involving notebook‑based experimentation, debugging, or proving concepts directly from live marimo sessions.","description":"Drop agents inside running marimo notebook sessions","stars":237,"language":"Shell"},{"owner":"brightbeanxyz","repo":"brightbean-studio","url":"https://github.com/brightbeanxyz/brightbean-studio","readme":"<p align=\"center\">\n  <a href=\"https://github.com/brightbeanxyz/brightbean-studio\">\n    <img src=\".github/assets/brightbean-studio-logo.webp\" alt=\"BrightBean Studio\" width=\"280\">\n  </a>\n</p>\n\n<p align=\"center\">\n  <strong>Open-source social media management for creators, agencies, and SMBs.</strong>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/brightbeanxyz/brightbean-studio/actions/workflows/ci.yml\"><img src=\"https://github.com/brightbeanxyz/brightbean-studio/actions/workflows/ci.yml/badge.svg\" alt=\"CI\"></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/badge/License-AGPL--3.0-blue.svg\" alt=\"License: AGPL-3.0\"></a>\n  <a href=\"https://www.python.org/\"><img src=\"https://img.shields.io/badge/Python-3.12%2B-blue.svg\" alt=\"Python 3.12+\"></a>\n  <a href=\"https://www.djangoproject.com/\"><img src=\"https://img.shields.io/badge/Django-5.x-green.svg\" alt=\"Django 5.x\"></a>\n</p>\n\n---\n\n## About BrightBean Studio\n\nBrightBean Studio is an open-source, self-hostable social media management platform built for creators, agencies and SMBs. It does what Sendible, SocialPilot, or ContentStudio do, but free and without per-seat, per-channel, or per-workspace limits. Plan, compose, schedule, approve, publish, and monitor content across Facebook, Instagram, LinkedIn, TikTok, YouTube, Pinterest, Threads, Bluesky, Google Business Profile, and Mastodon from a single multi-workspace dashboard.\n\nIt's for people managing many client accounts under one roof who'd rather own their social stack than pay $100–300/month to a SaaS vendor. Every feature is available to every user. No paid tier, no feature gate, no upsell.\n\nYou can deploy it with a one-click button on Heroku, Render, or Railway, run it on your own VPS via Docker, or run it locally. All platform integrations talk directly to the official first-party APIs using your own developer credentials, so there's no aggregator middleman, no vendor lock-in, and no third party sitting between you and your data.\n\n## Features\n\n| | |\n|---|---|\n| **Multi-workspace & teams** | Unlimited orgs → workspaces → members. Granular RBAC with custom roles, invitations, and a separate Client role for external collaborators. |\n| **Content composer** | Rich editor with per-platform caption/media overrides, version history, reusable templates, content categories & tags, a Kanban idea board. |\n| **Calendar & scheduling** | Visual calendar with recurring weekly posting slots per account and named queues that auto-assign posts to the next available slot. |\n| **Publishing engine** | Direct first-party API integrations (no aggregator), automatic retries, per-account rate-limit tracking, and a 90-day publish audit log. |\n| **Approval workflows** | Configurable stages (none / optional / internal / internal + client), threaded internal & external comments, reminders, and a full audit trail. |\n| **Unified social inbox** | Comments, mentions, DMs, and reviews from every connected platform in one place, with sentiment analysis, assignments, threaded replies, and historical backfill. |\n| **Media library** | Org- and workspace-scoped libraries with nested folders, auto-generated platform-optimized variants, and alt text. |\n| **Client portal** | Passwordless 30-day magic-link access so clients can approve or reject posts without creating an account. |\n| **Notifications** | In-app, email, and webhook delivery with per-user preferences for every event type. |\n| **Security & ops** | Encrypted token & credential storage, Google SSO, Sentry support, and a 14-day reversible org-deletion grace period. 2FA (TOTP) is on the roadmap. |\n| **White-label friendly** | Per-workspace branding (logo, colors) and workspace defaults for hashtags, first comments, and posting templates. |\n\n### A quick look\n\n<table>\n  <tr>\n    <td width=\"50%\"><img src=\".github/assets/BrightBean%20Studio%20Calendar.webp\" alt=\"Calendar view\"><br><sub><b>Visual calendar</b> - drag-and-drop scheduling with recurring slots and queues.</sub></td>\n    <td width=\"50%\"><img src=\".github/assets/BrightBean%20Studio%20Post%20Editor.webp\" alt=\"Post editor\"><br><sub><b>Post editor</b> - composer with per-platform overrides and previews.</sub></td>\n  </tr>\n  <tr>\n    <td width=\"50%\"><img src=\".github/assets/BrightBean%20Studio%20Idea%20Kanban%20Board.webp\" alt=\"Idea kanban board\"><br><sub><b>Idea board</b> - Kanban workflow to keep track of all your post ideas.</sub></td>\n    <td width=\"50%\"><img src=\".github/assets/BrightBean%20Social%20Media%20Platforms.webp\" alt=\"Connected platforms\"><br><sub><b>Connect anything</b> - 10+ first-party integrations, no aggregator.</sub></td>\n  </tr>\n</table>\n\n## Supported Platforms\n\n| Platform | Publish | Comments | DMs | Insights |\n|---|:---:|:---:|:---:|:---:|\n| <img src=\"https://cdn.simpleicons.org/facebook\" width=\"16\" height=\"16\"> Facebook | ✓ | ✓ | ✓ | ✓ |\n| <img src=\"https://cdn.simpleicons.org/instagram\" width=\"16\" height=\"16\"> Instagram | ✓ | ✓ | ✓ | ✓ |\n| <img src=\"https://cdn.simpleicons.org/instagram\" width=\"16\" height=\"16\"> Instagram (Personal) | ✓ | ✓ | ✓ | ✓ |\n| <img src=\"https://api.iconify.design/logos/linkedin-icon.svg\" width=\"16\" height=\"16\"> LinkedIn (Personal) | ✓ | ✓ | — | ✓ |\n| <img src=\"https://api.iconify.design/logos/linkedin-icon.svg\" width=\"16\" height=\"16\"> LinkedIn (Company) | ✓ | ✓ | — | ✓ |\n| <img src=\"https://cdn.simpleicons.org/tiktok\" width=\"16\" height=\"16\"> TikTok | ✓ | — | — | ✓ |\n| <img src=\"https://cdn.simpleicons.org/youtube\" width=\"16\" height=\"16\"> YouTube | ✓ | ✓ | — | ✓ |\n| <img src=\"https://cdn.simpleicons.org/pinterest\" width=\"16\" height=\"16\"> Pinterest | ✓ | — | — | ✓ |\n| <img src=\"https://cdn.simpleicons.org/threads\" width=\"16\" height=\"16\"> Threads | ✓ | ✓ | — | ✓ |\n| <img src=\"https://cdn.simpleicons.org/bluesky\" width=\"16\" height=\"16\"> Bluesky | ✓ | ✓ | — | — |\n| <img src=\"https://api.iconify.design/logos/google-icon.svg\" width=\"16\" height=\"16\"> Google Business Profile | ✓ | — | — | ✓ |\n| <img src=\"https://cdn.simpleicons.org/mastodon\" width=\"16\" height=\"16\"> Mastodon | ✓ | ✓ | — | — |\n\n---\n\n### One-Click Deploy\n\n| Heroku | Render | Railway |\n|:------:|:------:|:-------:|\n| [![Deploy to Heroku](https://www.herokucdn.com/deploy/button.svg)](https://heroku.com/deploy?template=https://github.com/brightbeanxyz/brightbean-studio) | [![Deploy to Render](https://render.com/images/deploy-to-render-button.svg)](https://render.com/deploy?repo=https://github.com/brightbeanxyz/brightbean-studio) | [![Deploy on Railway](https://railway.com/button.svg)](https://railway.com/deploy/brightbean-studio?referralCode=brightbean) |\n\nAfter deploying, set these environment variables in your platform's dashboard:\n\n| Variable | Required | Description |\n|----------|----------|-------------|\n| `DJANGO_SETTINGS_MODULE` | Auto-set | `config.settings.production`. Set if deployment config has not placed it. |\n| `SECRET_KEY` | Auto-generated | Django secret key. Set automatically by the deploy button. |\n| `ENCRYPTION_KEY_SALT` | Auto-generated | Encryption salt. Set automatically by the deploy button. |\n| `DATABASE_URL` | Auto-provisioned | PostgreSQL connection string. Set automatically. |\n| `ALLOWED_HOSTS` | Yes | Your app's domain, e.g. `your-app.herokuapp.com` |\n| `APP_URL` | Yes | Full public URL, e.g. `https://your-app.herokuapp.com` |\n| `STORAGE_BACKEND` | No | Set to `s3` for S3/R2 storage. Default: `local`. Heroku, Render, and Railway have ephemeral filesystems, so uploaded files are lost on redeploy without S3. |\n| `S3_ENDPOINT_URL` | If using S3 | S3-compatible endpoint URL |\n| `S3_ACCESS_KEY_ID` | If using S3 | S3 access key |\n| `S3_SECRET_ACCESS_KEY` | If using S3 | S3 secret key |\n| `S3_BUCKET_NAME` | If using S3 | S3 bucket name |\n| `EMAIL_HOST` | No | SMTP server for sending invitations and password resets |\n| `EMAIL_PORT` | No | SMTP port (default: `587`) |\n| `EMAIL_HOST_USER` | No | SMTP username |\n| `EMAIL_HOST_PASSWORD` | No | SMTP password |\n| `GOOGLE_AUTH_CLIENT_ID` | No | For Google OAuth login. Get from [Google Cloud Console](https://console.cloud.google.com/) → Credentials. |\n| `GOOGLE_AUTH_CLIENT_SECRET` | No | Google OAuth secret |\n\nFor social media API keys, see [Platform Credentials](#platform-credentials). Full variable reference: `.env.example`.\n\n## Quick Start (Docker)\n\n```bash\ngit clone https://github.com/brightbeanxyz/brightbean-studio.git\ncd brightbean-studio\ncp .env.example .env\n```\n\nEdit `.env` - change `DATABASE_URL` to point to the Docker service name:\n\n```\nDATABASE_URL=postgres://postgres:postgres@postgres:5432/brightbean\n```\n\nThen start everything:\n\n```bash\ndocker compose up -d --build\ndocker compose exec app python manage.py migrate\ndocker compose exec app python manage.py createsuperuser\n```\n\nBecause `docker-compose.yml` bind-mounts the project into `/app`, the Tailwind\noutput baked into the image gets shadowed by the host directory on first start.\nBuild it once inside the running container so it lands in the bind-mount:\n\n```bash\ndocker compose exec app sh -c \"cd theme/static_src && npm ci && npm run build\"\n```\n\nOpen http://localhost:8000 - you're running.\n\n\n## Fully Local Development (without Docker)\n\nRun everything natively - no Docker, no PostgreSQL install. Uses SQLite for the database.\n\n### Prerequisites\n\n- Python 3.12+\n- Node.js 20+\n\n### Setup\n\n**1. Clone and configure**\n\n```bash\ngit clone https://github.com/brightbeanxyz/brightbean-studio.git\ncd brightbean-studio\ncp .env.example .env\n```\n\n**2. Switch to SQLite**\n\nOpen `.env` and replace the `DATABASE_URL` line:\n\n```\nDATABASE_URL=sqlite:///db.sqlite3\n```\n\nThat's it - no database server to install or manage.\n\n**3. Set up Python**\n\n```bash\npython3 -m venv .venv\nsource .venv/bin/activate\npip install -r requirements.txt\n```\n\n**4. Set up Tailwind CSS**\n\n```bash\ncd theme/static_src\nnpm install\ncd ../..\n```\n\n**5. Run database migrations**\n\n```bash\npython manage.py migrate\n```\n\n**6. Create your admin account**\n\n```bash\npython manage.py createsuperuser\n```\n\n**7. Start the app (3 terminal tabs)**\n\nTab 1 - Tailwind watcher:\n```bash\ncd theme/static_src && npm run start\n```\n\nTab 2 - Django dev server:\n```bash\nsource .venv/bin/activate\npython manage.py runserver\n```\n\nTab 3 - Background worker:\n```bash\nsource .venv/bin/activate\npython manage.py process_tasks\n```\n\nOpen http://localhost:8000 and log in with the superuser you created.\n\n### Daily workflow (Docker-free)\n\n```bash\nsource .venv/bin/activate                # activate Python env\npython manage.py runserver               # start web server\n# (open another tab)\npython manage.py process_tasks           # start worker\n```\n\n> **Note:** SQLite is fine for local development and small deployments. For production or heavy concurrent usage, switch to PostgreSQL.\n\n## Running Tests\n\n```bash\npytest\n```\n\nWith coverage:\n\n```bash\npytest --cov=apps --cov-report=term-missing\n```\n\n## Linting & Type Checking\n\n```bash\nruff check .                             # lint\nruff format --check .                    # format check\nmypy apps/ config/ --ignore-missing-imports  # type check\n```\n\nAuto-fix lint issues:\n\n```bash\nruff check --fix .\nruff format .\n```\n\n## Production Deployment\n\n### Docker Compose on a VPS (recommended)\n\n```bash\n# On your server:\ngit clone https://github.com/brightbeanxyz/brightbean-studio.git\ncd brightbean-studio\ncp .env.example .env\n# Edit .env:\n#   SECRET_KEY=<generate a random 50+ char string>\n#   DEBUG=false\n#   ALLOWED_HOSTS=yourdomain.com\n#   APP_URL=https://yourdomain.com\n#   DATABASE_URL=postgres://postgres:<strong-password>@postgres:5432/brightbean\n\ndocker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build\ndocker compose exec app python manage.py createsuperuser\n```\n\nThis starts 5 containers: app (Gunicorn), worker, PostgreSQL, Caddy (auto-HTTPS), and a one-shot migrate container that runs database migrations automatically on startup. Edit the `Caddyfile` with your domain.\n\nTo update:\n\n```bash\ngit pull\ndocker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build\n```\n\n### Other Platforms\n\n| Platform | Config file | Notes |\n|----------|-------------|-------|\n| **Heroku** | `Procfile` + `app.json` | Deploy-button ready. Must use Basic+ dynos (Eco dynos break the worker). |\n| **Railway** | `railway.toml` | Three services: web, worker, managed PostgreSQL. |\n| **Render** | `render.yaml` | Blueprint with web, worker, PostgreSQL. Must use paid tier. |\n\nAll platforms with ephemeral filesystems require `STORAGE_BACKEND=s3` - see `.env.example` for S3 configuration.\n\nSee `architecture.md` for detailed per-platform instructions and cost breakdowns.\n\n## Project Structure\n\n```\nbrightbean-studio/\n├── config/\n│   ├── settings/\n│   │   ├── base.py            # Shared settings\n│   │   ├── development.py     # Local dev overrides\n│   │   ├── production.py      # Production hardening\n│   │   └── test.py            # Test overrides\n│   ├── urls.py                # Root URL configuration\n│   ├── wsgi.py\n│   └── asgi.py\n├── apps/\n│   ├── accounts/              # Custom User model, auth, OAuth, sessions\n│   ├── organizations/         # Organization management\n│   ├── workspaces/            # Workspace CRUD\n│   ├── members/               # RBAC, invitations, middleware, decorators\n│   ├── settings_manager/      # Configurable defaults with cascade logic\n│   ├── credentials/           # Platform API credential storage (encrypted)\n│   └── common/                # Shared: encrypted fields, scoped model managers\n├── providers/                 # Social platform API modules (one file per platform)\n├── templates/                 # Django templates\n│   ├── base.html              # Layout with sidebar + nav\n│   └── components/            # Reusable HTMX partials\n├── static/\n│   └── js/                    # Vendored HTMX + Alpine.js\n├── theme/                     # django-tailwind theme app\n│   └── static_src/\n│       ├── src/styles.css     # Tailwind directives\n│       └── tailwind.config.js\n├── Dockerfile\n├── docker-compose.yml         # Dev: app + worker + postgres\n├── docker-compose.prod.yml    # Prod override: adds Caddy, uses Gunicorn\n├── Caddyfile                  # Reverse proxy + auto-HTTPS config\n├── .env.example               # All environment variables\n├── Procfile                   # Heroku\n├── app.json                   # Heroku deploy button\n├── railway.toml               # Railway config\n└── render.yaml                # Render blueprint\n```\n\n> **Settings selection:** The `DJANGO_SETTINGS_MODULE` environment variable controls which settings file Django uses. The defaults are already wired for each context: `manage.py` uses `development`, `wsgi.py`/`asgi.py` use `production`, and `pytest` uses `test` (via `pyproject.toml`). Docker Compose files and platform deploy configs (Heroku, Render) also set it explicitly. You only need to override it manually if you want a non-default module for a specific command, e.g. `DJANGO_SETTINGS_MODULE=config.settings.production python manage.py check --deploy`.\n\n## Platform Credentials\n\nTo connect social media accounts, you need API credentials from each platform's developer portal. You can set these via environment variables in `.env` (see `.env.example`) or through the admin UI at **Settings → Platform Credentials**.\n\n**Redirect URI:** When registering your app on any platform, set the OAuth redirect URI to:\n\n```\n{APP_URL}/social-accounts/callback/{platform}/\n```\n\nFor example, if your `APP_URL` is `https://brightbean.example.com`, the Facebook redirect URI would be `https://brightbean.example.com/social-accounts/callback/facebook/`.\n\n### Meta (Facebook, Instagram, Threads)\n\nFacebook, Instagram, and Threads all use the same Meta app credentials.\n\n1. Go to [Meta for Developers](https://developers.facebook.com/) and create a new app (type: **Business**)\n2. Under **App Settings → Basic**, copy your **App ID** and **App Secret**\n3. In the App Dashboard, go to **Use cases** and add the following four use cases. For each use case, click into it and go to **Permissions and features** to add the required optional permissions:\n\n   **Use case: \"Manage everything on your Page\"** (Facebook)\n   - This use case auto-includes `business_management`, `pages_show_list`, and `public_profile`\n   - Add these optional permissions: `pages_manage_posts`, `pages_read_engagement`, `pages_read_user_content`, `pages_manage_metadata`\n\n   **Use case: \"Messenger from Meta\"** (Facebook Messaging)\n   - Required to enable the `pages_messaging` permission, which is not available under the \"Manage Pages\" use case\n   - Add the optional permission: `pages_messaging`\n\n   **Use case: \"Manage messaging & content on Instagram\"** (Instagram)\n   - Add these permissions: `instagram_basic`, `instagram_content_publish`, `instagram_manage_comments`, `instagram_manage_insights`\n\n   **Use case: \"Access the Threads API\"** (Threads)\n   - This use case auto-includes `threads_basic`\n   - Add these optional permissions: `threads_content_publish`, `threads_manage_insights`, `threads_manage_replies`\n\n4. Under **Facebook Login → Settings → Valid OAuth Redirect URIs**, add the following redirect URIs:\n   ```\n   {APP_URL}/social-accounts/callback/facebook/\n   {APP_URL}/social-accounts/callback/instagram/\n   {APP_URL}/social-accounts/callback/threads/\n   ```\n5. Set the environment variables:\n   ```\n   PLATFORM_FACEBOOK_APP_ID=your-app-id\n   PLATFORM_FACEBOOK_APP_SECRET=your-app-secret\n   ```\n\n### Instagram (Personal Account)\n\nThe Instagram (Personal) connector uses the **Instagram API with Instagram Login** - a separate OAuth flow from the Facebook Login-based Instagram connector above. This supports personal, creator, and business Instagram accounts without requiring a linked Facebook Page.\n\n1. In the same Meta app, go to **Use cases** and add the **\"Instagram API\"** use case\n2. Under **API setup with Instagram Login**, note your **Instagram App ID** and **Instagram App Secret** (these are different from your Facebook App ID/Secret)\n3. Go to **Permissions and features** and add the required permissions:\n   - `instagram_business_basic`, `instagram_business_content_publish`, `instagram_business_manage_comments`, `instagram_business_manage_messages`\n4. Under **API setup with Instagram Login → Step 4: Set up Instagram business login**, click **Set up** and add the redirect URI:\n   ```\n   {APP_URL}/social-accounts/callback/instagram_personal/\n   ```\n5. Set the environment variables:\n   ```\n   PLATFORM_INSTAGRAM_APP_ID=your-instagram-app-id\n   PLATFORM_INSTAGRAM_APP_SECRET=your-instagram-app-secret\n   ```\n\n### LinkedIn\n\nBrightbean uses a **single LinkedIn app** (with Community Management API) for both personal profile and Company Page connections - each flow simply requests different OAuth scopes. The connect page shows two cards: *LinkedIn (Personal Profile)* and *LinkedIn (Company Page)*.\n\n1. Go to the [LinkedIn Developer Portal](https://developer.linkedin.com/) and create a new app\n2. Verify your app's association with a LinkedIn Company Page\n3. Under **Products**, request access to:\n   - **Community Management API** *(restricted - requires LinkedIn review)*\n4. Under **Auth**, add **both** redirect URIs:\n   ```\n   {APP_URL}/social-accounts/callback/linkedin_personal/\n   {APP_URL}/social-accounts/callback/linkedin_company/\n   ```\n5. Scopes are requested per connection type:\n   - **Personal profile:** `r_basicprofile`, `w_member_social`, `r_member_social`\n   - **Company page:** `r_basicprofile`, `w_member_social`, `w_organization_social`, `r_organization_social`, `rw_organization_admin`\n6. Set the environment variables:\n   ```\n   PLATFORM_LINKEDIN_CLIENT_ID=your-client-id\n   PLATFORM_LINKEDIN_CLIENT_SECRET=your-client-secret\n   ```\n\n> **Refresh tokens:** Community Management API provides refresh tokens natively (365-day lifetime, access tokens last 60 days). No Advertising API product is needed. Note: the **Share on LinkedIn** and **Community Management API** products are mutually exclusive on the same app - use Community Management API as it covers both personal and organization scopes.\n\n### TikTok\n\n1. Go to the [TikTok Developer Portal](https://developers.tiktok.com/) and create a new app\n2. Add the products **Login Kit** and **Content Posting API**\n3. Configure the redirect URI under your app's settings:\n   ```\n   {APP_URL}/social-accounts/callback/tiktok/\n   ```\n4. Required scopes: `user.info.basic`, `video.publish`, `video.upload`\n5. Note: TikTok uses **Client Key** (not Client ID). Copy the **Client Key** and **Client Secret** from your app dashboard\n6. Set the environment variables:\n   ```\n   PLATFORM_TIKTOK_CLIENT_KEY=your-client-key\n   PLATFORM_TIKTOK_CLIENT_SECRET=your-client-secret\n   ```\n\n### Google (YouTube, Google Business Profile)\n\nYouTube and Google Business Profile share the same Google Cloud credentials.\n\n1. Go to the [Google Cloud Console](https://console.cloud.google.com/) and create a new project (or select an existing one)\n2. Enable the following APIs under **APIs & Services → Library**:\n   - **YouTube Data API v3** (for YouTube)\n   - **My Business Account Management API**, **My Business Business Information API**, and **Google My Business API** (for Google Business Profile)\n3. Go to **APIs & Services → Credentials** and create an **OAuth 2.0 Client ID** (type: Web application)\n4. Add the following redirect URIs under **Authorized redirect URIs**:\n   ```\n   {APP_URL}/social-accounts/callback/youtube/\n   {APP_URL}/social-accounts/callback/google_business/\n   ```\n5. Copy the **Client ID** and **Client Secret**\n6. Required scopes:\n   - **YouTube:** `https://www.googleapis.com/auth/youtube.upload`, `https://www.googleapis.com/auth/youtube.readonly`, `https://www.googleapis.com/auth/youtube.force-ssl`\n   - **Google Business Profile:** `https://www.googleapis.com/auth/business.manage`\n7. Set the environment variables:\n   ```\n   PLATFORM_GOOGLE_CLIENT_ID=your-client-id\n   PLATFORM_GOOGLE_CLIENT_SECRET=your-client-secret\n   ```\n\n### Pinterest\n\n1. Go to the [Pinterest Developer Portal](https://developers.pinterest.com/) and create a new app\n2. Under your app settings, add the redirect URI:\n   ```\n   {APP_URL}/social-accounts/callback/pinterest/\n   ```\n3. Copy the **App ID** and **App Secret**\n4. Required scopes: `boards:read`, `pins:read`, `pins:write`\n5. Set the environment variables:\n   ```\n   PLATFORM_PINTEREST_APP_ID=your-app-id\n   PLATFORM_PINTEREST_APP_SECRET=your-app-secret\n   ```\n\n### Bluesky\n\nNo developer app registration needed. Users connect by entering their Bluesky handle and an **App Password**:\n\n1. Log in to [Bluesky](https://bsky.app/)\n2. Go to **Settings → Privacy and Security → App Passwords**\n3. Create a new app password and use it when connecting your account in Brightbean\n\n### Mastodon\n\nNo developer app registration needed. Brightbean automatically registers an OAuth application on each Mastodon instance when a user connects their account. Users just need to enter their instance URL (e.g., `mastodon.social`).\n\n## Inbox: Backfill Historical Messages\n\nSee the [Supported Platforms](#supported-platforms) matrix above for per-platform inbox capabilities.\n\nTo import historical messages (e.g., from the last 7 days):\n\n```bash\npython manage.py backfill_inbox --days 7\n```\n\nOptions:\n- `--days N` - Number of days to backfill (default: 7)\n- `--platform NAME` - Only backfill a specific platform (e.g., `youtube`, `linkedin`, `tiktok`)\n- `--account-id UUID` - Only backfill a specific account\n\n---\n\n## Tech Stack\n\n| Layer | Technology |\n|-------|-----------|\n| Backend | Django 5.x |\n| Frontend | Django templates, HTMX, Alpine.js |\n| CSS | Tailwind CSS 4 via django-tailwind |\n| Database | PostgreSQL 16+ |\n| Background jobs | django-background-tasks (no Redis required) |\n| Auth | django-allauth (email + Google OAuth) |\n| Media | Pillow (images), FFmpeg (video) |\n| Deployment | Docker, Gunicorn, Caddy |\n\n---\n\n## Troubleshooting\n\n**Docker: `postgres` container is unhealthy**\nWait 10-15 seconds after `docker compose up` for the health check to pass, then retry your command. Check logs with `docker compose logs postgres`.\n\n**`python manage.py migrate` fails with connection errors**\nMake sure PostgreSQL is running and healthy. For Docker: `docker compose ps` should show postgres as \"healthy\". For local: verify the `DATABASE_URL` in `.env` matches your setup.\n\n**Tailwind CSS changes not appearing**\nMake sure the Tailwind watcher is running: `cd theme/static_src && npm run start`. If styles still don't update, try `npm run build` for a full rebuild.\n\n**OAuth callback errors (\"redirect URI mismatch\")**\nThe redirect URI registered on the platform must exactly match `{APP_URL}/social-accounts/callback/{platform}/`. Check that `APP_URL` in `.env` matches the URL you're accessing (including `http` vs `https` and port number).\n\n**Background tasks not running (posts not publishing)**\nMake sure the worker is running: `python manage.py process_tasks`. In Docker: check `docker compose logs worker`.\n\n## Contributing\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for development setup, coding guidelines, and how to submit pull requests.\n\n## Security\n\nTo report a security vulnerability, see [SECURITY.md](SECURITY.md). Do not open a public issue.\n\n## License\n\n[AGPL-3.0](LICENSE) - see LICENSE for details.\n","summary":"BrightBean Studio is an open‑source, self‑hosted social‑media management platform that lets creators, agencies and SMBs plan, compose, schedule and publish content across dozens of networks—Facebook, Instagram, LinkedIn, TikTok, YouTube, Pinterest, Threads, Bluesky, Google Business Profile, Mastodon and more—without per‑seat or channel limits. It offers a full‑featured suite including multi‑workspace and granular role‑based access, a rich composer with per‑platform overrides, a visual calendar with recurring slots and queues, automated publishing via first‑party APIs, configurable approval workflows, a unified inbox with sentiment analysis, an org‑scoped media library, and a passwordless client portal for post approvals. Designed for teams that manage multiple client accounts, BrightBean Studio removes SaaS vendor lock‑in, allows full ownership of the social stack, and can be deployed easily on Heroku, Render, Railway, Docker or locally. The result is a cost‑free, feature‑complete, white‑labelable solution that simplifies collaboration, security, and reporting for anyone needing robust social‑media coordination.","description":"Open-source, self-hostable social media management platform. Schedule, publish, and manage content across 10+ platforms from a single dashboard. Free alternative to Buffer, Sendible, and SocialPilot.","stars":1206,"language":"HTML"},{"owner":"final-run","repo":"finalrun-agent","url":"https://github.com/final-run/finalrun-agent","readme":"<p align=\"center\">\n  <a href=\"https://finalrun.app/\">\n    <img alt=\"FinalRun logo\" height=\"90\" src=\"https://raw.githubusercontent.com/final-run/finalrun-agent/main/.github/resources/Logo.png\">\n  </a>\n</p>\n\n<p align=\"center\">\n  <a aria-label=\"npm package version\" href=\"https://www.npmjs.com/package/@finalrun/finalrun-agent\" target=\"_blank\">\n    <img alt=\"npm version\" src=\"https://img.shields.io/npm/v/@finalrun/finalrun-agent.svg?style=flat-square&label=npm&labelColor=000000&color=4630EB\" />\n  </a>\n  <a aria-label=\"License: Apache-2.0\" href=\"LICENSE\">\n    <img alt=\"License: Apache-2.0\" src=\"https://img.shields.io/badge/License-Apache%202.0-blue.svg?style=flat-square&color=33CC12\" />\n  </a>\n</p>\n\n<p align=\"center\">\n  <a aria-label=\"FinalRun website\" href=\"https://finalrun.app/\"><b>finalrun.app</b></a>\n  &ensp;•&ensp;\n  <a aria-label=\"FinalRun documentation\" href=\"https://docs.finalrun.app/\">Docs</a>\n  &ensp;•&ensp;\n  <a aria-label=\"FinalRun blog\" href=\"https://blogs.finalrun.app/\">Blog</a>\n  &ensp;•&ensp;\n  <a aria-label=\"Cloud device waitlist\" href=\"https://docs.google.com/forms/d/e/1FAIpQLScOTaNWjvxIG8Ywn6THHYJuqBM-b86Y-Fx39YVoBVhHuBDZ2w/viewform?usp=publish-editor\" target=\"_blank\">Cloud Device Waitlist</a>\n  &ensp;•&ensp;\n  <a aria-label=\"FinalRun Slack community\" href=\"https://join.slack.com/t/finalrun-community/shared_invite/zt-38qg6q9fq-9L87nNF8aX4HZ8_pn9KBgw\" target=\"_blank\">Join Slack Community</a>\n</p>\n\n<h6 align=\"center\">Follow us on</h6>\n<p align=\"center\">\n  <a aria-label=\"Follow FinalRun on X\" href=\"https://x.com/get_final_run\" target=\"_blank\">\n    <img alt=\"FinalRun on X\" src=\"https://img.shields.io/badge/X-000000?style=for-the-badge&logo=x&logoColor=white\" />\n  </a>&nbsp;\n  <a aria-label=\"FinalRun on GitHub\" href=\"https://github.com/final-run\" target=\"_blank\">\n    <img alt=\"FinalRun on GitHub\" src=\"https://img.shields.io/badge/GitHub-222222?style=for-the-badge&logo=github&logoColor=white\" />\n  </a>&nbsp;\n  <a aria-label=\"Follow FinalRun on LinkedIn\" href=\"https://linkedin.com/company/finalrun/\" target=\"_blank\">\n    <img alt=\"FinalRun on LinkedIn\" src=\"https://img.shields.io/badge/LinkedIn-0077B5?style=for-the-badge&logo=linkedin&logoColor=white\" />\n  </a>\n</p>\n\n---\n\n`finalrun-agent` is an AI-driven CLI that tests your Android and iOS apps using natural language. You write a plain-English test in YAML, FinalRun launches your app on an emulator or simulator, uses an AI model (Gemini, GPT, or Claude) to see the screen and perform each step — tapping, swiping, typing — and produces a pass/fail report with video and device logs.\n\n## Demo\n\n<p align=\"center\">\n  <img alt=\"FinalRun demo\" src=\"https://raw.githubusercontent.com/final-run/finalrun-agent/main/.github/resources/finalrun-demo.gif\" />\n</p>\n\n\n## Install\n\n```sh\ncurl -fsSL https://raw.githubusercontent.com/final-run/finalrun-agent/main/scripts/install.sh | bash\n```\n\nSets up Node.js, the CLI, AI coding agent skills, and platform tools. Run `finalrun doctor` to verify host readiness.\n\n\n## Write and Run Your First Test Using AI Agents\n\nFinalRun ships [skills](https://github.com/vercel-labs/skills) that let your AI coding agent generate tests, validate workspaces, and run tests — all from chat.\n\n### Generate tests\n\n`/finalrun-generate-test` skill reads your app's source code, infers the app identity, and generates complete test specs with setup, steps, and expected state — organized by feature folder.\n\nExample:\n\n```sh\n/finalrun-generate-test Generate tests for the authentication feature — cover login with valid credentials, login with wrong password, and logout\n```\n\nThe agent will:\n1. Read your source code to understand the UI and infer the app's package name / bundle ID\n2. Set up `.finalrun/config.yaml` and environment bindings in `.finalrun/env/`\n3. Propose a test plan with file paths and cleanup strategy for your approval\n4. Generate YAML specs under `.finalrun/tests/auth/` and a suite under `.finalrun/suites/`\n5. Run `finalrun check` to validate everything\n\n### Run tests\n\n`/finalrun-generate-test` skill validates and run the test once your tests are generated.\n\nExample:\n\n```sh\n/finalrun-use-cli Run the auth tests on Android\n```\n\n### Debug and fix failing tests\n\n`/finalrun-test-and-fix` skill orchestrates the full **generate → run → diagnose → fix** loop. It authors tests via `finalrun-generate-test`, runs them via `finalrun-use-cli`, reads the CLI artifacts (`result.json`, `actions/`, screenshots, `device.log`) on failure, classifies whether the bug is in the **app code** or the **test**, applies the narrowest fix, and re-runs until the run is green.\n\nExample:\n\n```sh\n/finalrun-test-and-fix Verify and fix the checkout feature end-to-end on Android\n```\n\n\n## How to auto trigger Finalrun to generate and test once feature development is completed\n\nAdd this **[content](docs/autotrigger-finalrun.md)** to your **AGENTS.md** to auto-trigger Finalrun, so you don’t have to explicitly ask your agent to generate and run tests everytime. This will also let your agent fix issues if there is any error while development\n\n\n## API Keys (BYOK — Bring Your Own Key)\n\nFinalRun uses your own AI provider API key to run tests.\n\n```sh\necho \"GOOGLE_API_KEY=your-key-here\" > .env\n```\n\n| Provider | Environment variable |\n|---|---|\n| `google/...` | `GOOGLE_API_KEY` |\n| `openai/...` | `OPENAI_API_KEY` |\n| `anthropic/...` | `ANTHROPIC_API_KEY` |\n\n> Test runs consume API tokens from your configured provider — standard API billing applies.\n\n\n## Running Tests manually with [CLI](docs/cli-reference.md)\n\n```sh\nfinalrun test smoke.yaml --platform android --model google/gemini-3-flash-preview\n```\n\n```sh\nfinalrun suite auth_smoke.yaml --platform android --model google/gemini-3-flash-preview\n```\n\n\n## Documentation\n\nFull docs: **[docs.finalrun.app](https://docs.finalrun.app/)**\n\n- [Autotrigger FinalRun tests (AI agents)](docs/autotrigger-finalrun.md) — when coding agents should generate, validate, and run tests after UI work\n- [YAML Tests](docs/yaml-tests.md) — test format, fields, suites, and environment placeholders\n- [CLI Reference](docs/cli-reference.md) — all commands, flags, and report tools\n- [Configuration](docs/configuration.md) — workspace config, app identity, `--app` flag, and per-environment overrides\n- [Environment & Secrets](docs/environment.md) — dotenv load order, provider keys, and platform prerequisites\n- [Troubleshooting](docs/troubleshooting.md) — common errors and fixes\n\n\n## Development\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for monorepo structure, build commands, and contributor guidelines.\n\n- [CODE_OF_CONDUCT.md](CODE_OF_CONDUCT.md)\n- [SECURITY.md](SECURITY.md)\n- [CHANGELOG.md](CHANGELOG.md)\n- [LICENSE](LICENSE)\n","summary":"The `@finalrun/finalrun-agent` CLI automates mobile app testing by letting developers describe test flows in plain‑English YAML. It launches the app on an emulator or simulator, leverages Gemini, GPT or Claude to interpret screenshots and execute actions—tapping, swiping, typing—and then outputs a detailed pass/fail report complete with video and logs. Built on Vercel Skills, it can automatically generate test specs from your source code, organize them by feature, and validate your workspace before running. Testers, QA engineers and developers who want rapid, code‑free mobile test creation and repeatable, AI‑guided execution will benefit most from this tool.","description":"AI QA Agent for mobile apps","stars":213,"language":"TypeScript"},{"owner":"4RH1T3CT0R7","repo":"ttf-doom","url":"https://github.com/4RH1T3CT0R7/ttf-doom","readme":"# TTF-DOOM\n\nA DOOM-style raycaster that runs inside a TrueType font's hinting program.\n\n<p align=\"center\">\n  <img src=\"docs/media/demo.gif\" width=\"640\" />\n</p>\n\n<p align=\"center\">\n  <a href=\"https://4rh1t3ct0r7.github.io/ttf-doom/\">\n    <img src=\"https://img.shields.io/badge/PLAY_IN_BROWSER-00cc44?style=for-the-badge\" alt=\"Play in Browser\" />\n  </a>\n</p>\n\n## What is this?\n\nTrueType fonts have a built-in virtual machine for grid-fitting glyphs. It's got a stack, storage slots, arithmetic, conditionals, function calls - and it turns out it's Turing-complete. I wanted to see if I could get it to render 3D graphics.\n\nThe font file contains a DDA raycasting engine written in TrueType bytecode. The glyph \"A\" has 16 vertical bar contours, and the hinting program raycasts against a 16x16 tile map and repositions those bars using SCFS instructions to form a 3D perspective view. The whole thing is 6.5 KB.\n\nJS handles movement, enemies, and shooting, then passes coordinates to the font through `font-variation-settings`. The font does the raycasting and wall rendering. Canvas overlay draws enemies, weapon, and HUD on top.\n\n## How it works\n\nI wrote a small compiler that takes a custom DSL and outputs TrueType hinting assembly. The DSL looks like a stripped-down C:\n\n```\nfunc raycast(col: int) -> int:\n    var ra: int = player_angle + col * 3 - FOV_HALF\n    var dx: int = get_cos(ra)\n    var dy: int = get_sin(ra)\n    ...\n```\n\nThis compiles to TT bytecode - `FDEF`, `CALL`, `RS`, `WS`, `SCFS`, etc. - and gets injected into a `.ttf` file along with sin/cos lookup tables and the map data. The compiler handles variable allocation (everything goes into TT storage slots), function definitions (FDEF/ENDF), and a few other things like fixed-point math.\n\nThe pipeline: `doom.doom` -> lexer -> parser -> codegen -> `doom.ttf`\n\n<p align=\"center\">\n  <img src=\"docs/media/transform.gif\" width=\"640\" />\n</p>\n\n## TrueType arithmetic is insane\n\n`MUL` does `(a*b)/64`. Not `a*b`. Everything is F26Dot6 fixed-point internally. So `1 * 4 = 0`. I lost probably two days to this before I found a workaround: `DIV(a, 1)` returns `a * 64` (DIV is equally broken), then `MUL(a*64, b)` = `(a*64*b)/64` = `a*b`.\n\nThere's no WHILE instruction either. Loops compile to recursive FDEFs, and FreeType caps the call stack at ~64 frames. 16 columns x 14 ray steps barely fits.\n\n`return` inside a recursive-while doesn't exit. It pushes a value and keeps going. Everything had to be rewritten with hit flags.\n\nSCFS takes F26Dot6 pixel coordinates, not font units - took me a while to figure out why every bar was a tiny speck. Chrome caches hinted glyphs and sometimes skips re-hinting when axes change - fixed with per-frame jitter. `SVTCA[0]` selects Y, `[1]` selects X.\n\n## Architecture\n\nThe font just renders walls. JS does everything else.\n\nPlayer position and angle go into three font variation axes (`MOVX`, `MOVY`, `TURN`). JS stuffs coordinates into `font-variation-settings` every frame. Browser re-hints the glyph. Shape changes.\n\nPress Tab in the demo to see what's going on under the hood:\n\n<p align=\"center\">\n  <img src=\"docs/media/debug-mode.png\" width=\"640\" />\n</p>\n\n## Try it\n\n```\ngit clone https://github.com/4RH1T3CT0R7/ttf-doom.git\ncd ttf-doom\npip install fonttools freetype-py pygame pytest\npython game/build.py\npython -m http.server 8765\n```\n\nOpen `http://localhost:8765/hosts/browser/index.html` in Chrome or Edge. WASD to move, arrows to turn, Space to shoot. Press Tab for a debug overlay showing the font variation axes in real-time.\n\n## Project layout\n\n```\ncompiler/       DSL -> TrueType assembly (lexer, parser, codegen)\nfontgen/        font builder, glyph generator, sin/cos tables\ngame/           raycaster source (doom.doom) and build script\nhosts/browser/  browser demo\nhosts/python/   pygame host (for development)\ntests/          451 tests\ndoom.ttf        the playable font (6,580 bytes)\n```\n\n## llama.ttf vs this\n\n[llama.ttf](https://github.com/fuglede/llama.ttf) also runs computation in a font, but it uses HarfBuzz's WASM shaper - basically a WebAssembly runtime bolted onto font shaping. TTF-DOOM uses the actual TrueType hinting bytecode that Apple shipped in 1991 for grid-fitting glyphs. Different VM entirely.\n\n## License\n\n[Apache 2.0](LICENSE)\n","summary":"TTF‑Doom nests a full DOOM‑style raycasting engine inside a TrueType font’s hinting language, turning the font’s virtual machine into a tiny, Turing‑complete graphics runtime. It ships a custom DSL compiler that translates C‑like source into TrueType bytecode, producing a 6.5 KB font that draws 3‑D walls by re‑hanging the glyph “A” each frame through font‑variation‑settings, while JavaScript supplies movement, enemies, and HUD overlays. The project demonstrates how fonts can perform arbitrary computation, making it a fascinating case study for esoteric programming enthusiasts, font developers, and developers looking to experiment with unconventional rendering pipelines or lightweight browser‑based games.","description":"A 3D raycasting engine running inside a TrueType font's hinting virtual machine","stars":52,"language":"Python"},{"owner":"HudsonGri","repo":"mdarena","url":"https://github.com/HudsonGri/mdarena","readme":"# mdarena\n\n**Benchmark your CLAUDE.md against your own PRs.**\n\nMost CLAUDE.md files are written blindly. [Research shows](https://arxiv.org/abs/2602.11988) they often *reduce* agent success rates and cost 20%+ more tokens. mdarena lets you measure whether yours helps or hurts, on tasks from your actual codebase.\n\n## Quick Start\n\n```bash\npip install mdarena\n\n# Mine 50 merged PRs into a test set\nmdarena mine owner/repo --limit 50 --detect-tests\n\n# Benchmark multiple CLAUDE.md files + baseline (no context)\nmdarena run -c claude_v1.md -c claude_v2.md -c agents.md\n\n# See who wins\nmdarena report\n```\n\n## How It Works\n\n```\nmdarena mine     ->  Fetch merged PRs, filter, build task set\n                     Auto-detect test commands from CI/package files\n\nmdarena run      ->  For each task x condition:\n                       - Checkout repo at pre-PR commit\n                       - Baseline: all CLAUDE.md files stripped\n                       - Context: inject CLAUDE.md, let Claude discover it\n                       - Run tests if available, capture git diff\n\nmdarena report   ->  Compare patches against gold (actual PR diff)\n                       - Test pass/fail (same as SWE-bench)\n                       - File/hunk overlap, cost, tokens\n                       - Statistical significance (paired t-test)\n```\n\n## Test Execution\n\nmdarena can run your repo's actual tests to grade agent patches, the same way SWE-bench does it.\n\n```bash\n# Auto-detect from CI/CD\nmdarena mine owner/repo --detect-tests\n\n# Or specify manually\nmdarena mine owner/repo --test-cmd \"make test\" --setup-cmd \"npm install\"\n```\n\nParses `.github/workflows/*.yml`, `package.json`, `pyproject.toml`, `Cargo.toml`, and `go.mod`. When tests aren't available, falls back to diff overlap scoring.\n\n## Monorepo Support\n\nPass a directory to benchmark a full CLAUDE.md tree:\n\n```bash\nmdarena run -c ./configs-v1/ -c ./configs-v2/\n```\n\nEach directory mirrors your repo structure. Baseline strips ALL CLAUDE.md and AGENTS.md files from the entire tree.\n\n## Real-world Results\n\nWe ran mdarena against a large production monorepo: 20 merged PRs, Claude Opus 4.6, three conditions (bare baseline, existing CLAUDE.md, hand-written alternative). Patches graded against real test suites. Not string matching, not LLM-as-judge.\n\n**Key findings:**\n- The existing CLAUDE.md improved test resolution by ~27% over bare baseline\n- A consolidated alternative that merged all per-directory guidance into one file performed no better than no CLAUDE.md at all\n- On hard tasks, per-directory instruction files gave the agent targeted context, while the consolidated version introduced noise that caused regressions\n\nThe winning CLAUDE.md wasn't the longest or most detailed. It was the one that put the right context in front of the agent at the right time.\n\n## SWE-bench Compatible\n\n```bash\n# Import SWE-bench tasks\npip install datasets\nmdarena load-swebench lite --limit 50\nmdarena run -c my_claude.md\n\n# Or export your tasks as SWE-bench JSONL\nmdarena export-swebench\n```\n\n## Security\n\nOnly benchmark repositories you trust. mdarena executes code from the repos it benchmarks (test commands run via `shell=True`, Claude Code runs with `--dangerously-skip-permissions`). Sandboxes are isolated temp directories under `/tmp` but processes run as your user.\n\n**Benchmark integrity:** Because tasks come from historical PRs, the gold patch is in the repo's git history. [Claude 4 Sonnet exploited this against SWE-bench](https://bayes.net/swebench-hack/) by walking future commits via tags. mdarena prevents this with history-free checkouts: `git archive` exports a snapshot at `base_commit` into a fresh single-commit repo. Future commits don't exist in the object database at all. See `tests/test_isolated_checkout.py` for the integrity assertions.\n\n## Prerequisites\n\n- Python 3.11+\n- [`gh`](https://cli.github.com/) CLI (authenticated)\n- [`claude`](https://claude.ai/download) CLI (Claude Code)\n- `git`\n\n## Commands\n\n| Command | Description |\n|---------|-------------|\n| `mdarena mine <repo>` | Mine merged PRs into a task set |\n| `mdarena mine <repo> --detect-tests` | Mine with auto-detected test extraction |\n| `mdarena run -c file.md` | Benchmark a single CLAUDE.md |\n| `mdarena run -c a.md -c b.md` | Compare multiple files head-to-head |\n| `mdarena run --no-run-tests` | Skip test execution, diff overlap only |\n| `mdarena report` | Analyze results, show comparison |\n| `mdarena load-swebench [dataset]` | Import SWE-bench tasks |\n| `mdarena export-swebench` | Export tasks as SWE-bench JSONL |\n\n## Development\n\n```bash\ngit clone https://github.com/HudsonGri/mdarena.git\ncd mdarena\nuv sync\nuv run pytest\nuv run ruff check src/\n```\n\n## Roadmap\n\nSee [ROADMAP.md](ROADMAP.md).\n\n## License\n\nMIT. See [LICENSE](LICENSE).\n","summary":"mdarena is a benchmarking toolkit that evaluates how effectively a CLAUDE.md instruction file improves Claude’s ability to fix real pull requests. It automatically mines merged PRs from a target repository, constructs a test set, injects one or more CLAUDE.md files into the repository context, runs the repo’s own tests, and then compares the agent’s generated patches against the gold PR changes, reporting metrics such as accuracy, token cost, and statistical significance. The tool handles monorepos, auto‑detects CI test commands, and supports SWE‑bench tasks, making it useful for researchers and developers who want to measure or improve guidance documents for LLM‐powered software repair.","description":"Benchmark your CLAUDE.md against your own PRs","stars":63,"language":"Python"},{"owner":"rochus-keller","repo":"OberonSystem3Native","url":"https://github.com/rochus-keller/OberonSystem3Native","readme":"### Oberon System 3 Multiboot Edition\n\nThis project modernizes the Kernel of Oberon System 3 (version 2.3.7) by migrating it from the original Oberon Boot Loader (OBL, written in assembler) to the Multiboot specification (handled in Oberon directly in the Kernel). By providing a modern C99-based toolchain and abstracting away legacy constraints, this project allows a historically significant operating system to be easily installed, configured, and booted in modern emulation environments like QEMU, as well as on native ARM-based single-board computers.\n\n### Historical Context and Significance\n\nNiklaus Wirth and Jürg Gutknecht designed Oberon in the late 1980s as a lean, unified programming language and operating system. By the mid-1990s, Oberon System 3 introduced the Gadgets component framework, offering a sophisticated graphical user interface and highly integrated development experience. While elegantly designed, the original system was tightly coupled to specific bare-metal hardware. \n\nBecause the original environment can no longer run on modern PCs, preserving and evolving the system requires decoupling it from legacy bootloaders. This project breathes new life into System 3 by making it highly accessible to compiler enthusiasts, researchers, and systems programmers. Instead of wrestling with obsolete hardware, developers can explore a fully functional Oberon environment using standard virtual machines and a portable cross-compilation toolchain working on current operating systems.\n\n### System Features\n\n- Bootable via Multiboot; OBL assembler and Oberon0 no longer required.\n- System tracing through the Host Console.\n- Configuration strings are passed via the Multiboot information record and parsed directly by the kernel.\n- A dedicated tool creates AosFs volumes and populates them with all necessary runtime files.\n- There is a custom IDE with colored syntax, cross-referencing, and semantic navigation which runs on all current operating systems, available at https://github.com/rochus-keller/activeoberon/.\n\nHere is a screenshot of the IDE and the running system.\n\n![Oberon System and IDE](http://software.rochus-keller.ch/screenshot_oberon_system_and_ide.png)\n\n### The C99 Toolchain\n\n- A standalone C99 version of the OP2 Oberon compiler is available at https://github.com/rochus-keller/op2/.\n- The OP2 compiler runs on any platform that provides a C99 compiler and the Boehm Garbage Collector.\n- This compiler was transpiled directly from the original Oberon sources using the custom transpiler available at https://github.com/rochus-keller/activeoberon/.\n- A new C99 version of the Oberon BootLinker also creates the multiboot header and code which sets up an initial stack to call the Kernel.\n\n### Recent Milestones\n\n- Assembler code was removed from all portable modules (replaced by regular Oberon or `SYSTEM` calls).\n- Modules dependent on hardware-specific `SYSTEM` calls have been moved to the i386 (and arm32) directories.\n- ARMv7 Architecture Support: The system has successfully been migrated to ARMv7. The full system natively boots and works as expected on QEMU 10.2 emulating the `raspi2b` machine, as well as **the physical Raspberry Pi Model 3b** (see below). Note that this is still work-in-progress, traps are to be expected until further notice.\n\n![Oberon System on QEMU ARMv7](http://software.rochus-keller.ch/FullSystemArm_2026-04-01_20-14-38.png)\n\n### Status on 2026-04-10\n\nFinally it works on the Raspberry Pi 3b! See the screenshot below. Basically after three total redesigns of the USB driver. There were also some issues in Usb.Mod which made the hub throwing a stall, and a lot more issues in the bit and timing fiddling of the driver. When the mouse and key events eventually got through, a lot of timing optimizations were necessary. Relying on the standard OS tick was too coarse for USB 2.0 Hub microframes. The driver now bypasses the OS timer and directly reads the BCM2837's 1MHz hardware timer to execute exact 125µs and 20µs micro-waits during active transactions. To keep the OS running smoothly, macro-timing is now handled asynchronously. When a device responds with a NAK, the driver records the target nextPoll time and immediately yields back to the OS. However, the actual micro-sequence of fetching data from the Hub is executed synchronously to guarantee atomic completion. By default, the Oberon USB stack kills a device if an interrupt poll returns an error. The driver now safely absorbs these transient hardware errors, seamlessly resetting the pacing timer and trying again on the next polling cycle, preventing the keyboard or mouse from suddenly \"dying\" during fast typing. \n\nI was also able to add support for the trackpoint integrated with my Lenovo keyboard which required a (portable) change to UsbMouse.Mod. Some additional modifications assured compatibility with the old 128 MB SD cards of which I still have many on stock and which are very well suited for the Oberon system ;-) I also found that forcing the driver to 16 bit color makes the system feel much more fluid on the raspi than the default 32 bits. In addition, the kernel now handles traps similarly to the i386 system, i.e. it restores the processor context after an exception, using a dedicated trap stack to prevent stack overflows and UI deadlocks during trap reporting.\n\nFinally, I made tests on the rpi zero 2; according to the log the system works, but I had issues with the hdmi mini adapter. I will follow-up on this later.\n\n![Oberon System on Raspi 3b](http://software.rochus-keller.ch/OberonSystem3_on_Raspi3.jpg)\n\n### Status on 2026-04-06\n\nAfter several days of debugging directly on the rpi 3b hardware via Jtag, the SD card and display drivers work. There were many surprises, starting from the completely\ndifferent ATAGS string (which required a format and parser refactoring), unexpected alignment and cache handling requirements, different semihosting operators (finally\nadding plain UART which even works much faster) and configuration syntax changes. The USB driver though is a completely different leage. The usual timing issues were\nmanagable, even the PHY, gating and clock issues. It eventually also turned out that the hub cannot be operated at full speed, only at high speed, which required\nthe implementation of split transactions to correctly communicate with connected mouse/keyboard only running at full speed. But so far I still didn't manage to make it work.\nThe DWC2 controller is ready, the hub with 5 ports is detected, but the setup of the connected devices continues to fail. Now that my Easter break is over, I have to move on to something else and put this project on hold. Maybe I’ll come up with the right idea next week, or maybe someone else will give the driver a try (which would be very welcome).\n\nHere is my setup at the moment when the display started working:\n\n![Debugging Setup](http://software.rochus-keller.ch/Raspi3bJtagSetup.jpg)\n\n### How to build\n\nThe scripts required to build the system, statically link the inner core modules, create and populate the AosFs drive and run the system on QEMU are found in the \n`i386/build` directory. The toolchain directory has first to be prepared with the `op2`, `multibootlinker` and `aosfstool`. Also an `output` and `output/drive` directory are \nassumed to run the scripts. Precompiled versions of the toolchain and the resulting system image are made available.\nThe `build_all.sh` script depends on a `Modules.txt` file, the contents of which is generated using the \"Show dependency order\" dialog of the mentioned IDE. \n\nFor the ARM version of the system see the `arm32/build` directory. There is also a tool running on Linux to flash an SD card for the Raspi.\n\n### Roadmap\n\n- Work in progress: debug and run the ARMv7 system on Raspberry Pi Zero 2.\n- Migrate network driver and test adapter\n- Future: migrate the system to the RISC-V based ESP32-P4 architecture, particularly targeting the [new Olimex board](https://www.olimex.com/Products/IoT/ESP32-P4/ESP32-P4-PC/open-source-hardware).\n\n","summary":"The project upgrades Oberon System 3 (v2.3.7) by replacing its original assembler‑based boot loader with a Multiboot‑compliant kernel, enabling the historic OS to boot on modern PCs, QEMU, and ARM‑based boards such as the Raspberry Pi 3 B. It bundles a standalone C99 OP2 compiler, a C‑based boot linker, and utilities that generate AosFs volumes, while removing all legacy assembly code and porting hardware‑specific modules to i386 and arm32 directories. The result is a fully traceable, multiboot‑ready system with a cross‑platform IDE featuring syntax highlighting and semantic navigation. This makes Oberon attractive to compiler aficionados, systems researchers, and programmers who wish to experiment with a classical OS on contemporary hardware without wrestling with obsolete bootloaders.","description":"This is a version based on v2.3.7 supposed to eventually run natively on PC i386, Raspi Model 3b and Olimex ESP32-P4-PC, using existing bootloaders instead of Oberon0","stars":143,"language":"Modula-2"},{"owner":"decisionnode","repo":"DecisionNode","url":"https://github.com/decisionnode/DecisionNode","readme":"<p align=\"center\">\n  <img src=\"website/src/assets/images/DecisionNode-transparent.png\" width=\"150\" />\n</p>\n\n<h1 align=\"center\">DecisionNode</h1>\n\n<p align=\"center\">\n CLI + Local MCP - A shared structured memory store across Claude Code, Cursor, Windsurf, Antigravity, and every MCP client. Semantically queryable.\n</p>\n\n<p align=\"center\
