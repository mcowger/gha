">\n  <a href=\"https://opensource.org/licenses/MIT\"><img src=\"https://img.shields.io/badge/License-MIT-yellow.svg\" alt=\"License: MIT\" /></a>\n  <a href=\"https://www.npmjs.com/package/decisionnode\"><img src=\"https://img.shields.io/npm/v/decisionnode.svg\" alt=\"npm version\" /></a>\n  <img src=\"https://github.com/decisionnode/DecisionNode/actions/workflows/ci.yml/badge.svg\" alt=\"CI\" />\n  <a href=\"https://glama.ai/mcp/servers/decisionnode/DecisionNode\"><img src=\"https://glama.ai/mcp/servers/decisionnode/DecisionNode/badges/score.svg?v=1\" alt=\"Glama\" /></a>\n</p>\n\n---\n\n<p align=\"center\">\n  <img src=\"website/public/recordings/demo.gif\" alt=\"DecisionNode Demo\" width=\"800\" />\n</p>\n\nNot a markdown file — structured decisions with semantic search, exposed over MCP.\n\n## Install\n\n```bash\nnpm install -g decisionnode\ncd your-project\ndecide init      # creates project store\ndecide setup     # configure Gemini API key (free tier)\n\n# Connect to Claude Code (run once)\nclaude mcp add decisionnode -s user decide-mcp\n```\n\n## What a decision looks like\n\n```json\n{\n  \"id\": \"backend-007\",\n  \"scope\": \"Backend\",\n  \"decision\": \"Skipped connection pooling for the embeddings DB — single writer, revisit if we add a sync daemon\",\n  \"status\": \"active\",\n  \"rationale\": \"Only one process writes at a time in the current architecture. Pooling added complexity with no measurable benefit. If we add a background sync process this will need to change.\",\n  \"constraints\": [\n    \"Do not add concurrent writers without revisiting this first\"\n  ],\n  \"createdAt\": \"2024-11-14T09:22:00Z\"\n}\n```\nStored as JSON, embedded as a vector, searchable by meaning.\nDecisions are not exactly \"Rules\" that the AI should have in it's context window the entire time (those are better suited for CLAUDE.md or memory.md). Decisions are thought of to be more like \"Memories\" that the AI can pull in when it's actually relevant through semantic search. \n\n## How it works\n\n1. **A decision is made** — via `decide add` or the AI calls `add_decision` through MCP\n2. **Embedded as a vector** — using Gemini's `gemini-embedding-001`, stored locally in `vectors.json`\n3. **AI retrieves it later** — calls `search_decisions` via MCP, gets back relevant decisions ranked by cosine similarity\n\nThe retrieval is explicit — the AI calls search decisions tool via MCP passing a query and getting back the top N decisions ranked by cosine similarity. Nothing is pre-injected into the system prompt.\n\n## Two interfaces\n\n| | CLI (`decide`) | MCP Server (`decide-mcp`) |\n|---|---|---|\n| **For** | You (and your AI) | Your AI (and you) |\n| **How** | Terminal commands | Structured JSON over MCP |\n| **Does** | Setup, add, search, edit, deprecate, export, import, config | Search, add, update, delete, list, history |\n\nBoth read and write to the same local store (`~/.decisionnode/`).\n\n## Quick reference\n\n```bash\ndecide add                          # interactive add\ndecide add -s Backend -d \"Skipped connection pooling for the embeddings DB — single writer, revisit if we add a sync daemon\"\ndecide add --global                 # applies to all projects\ndecide search \"connection pooling\"  # semantic search\ndecide list                         # list all (includes global)\ndecide deprecate ui-003             # soft-delete (reversible)\ndecide activate ui-003              # bring it back\ndecide check                        # embedding health\ndecide embed                        # fix missing embeddings\ndecide export json > decisions.json # export to file\ndecide ui                           # launch local web UI (graph + vector space + list)\ndecide ui -d                        # run UI in background, return the terminal\ndecide ui stop                      # stop the background UI\n```\n\n## Features\n\n### `decide ui` — visual interface\n\nA local web UI that gives you three live perspectives on your decisions:\n\n- **Graph** — force-directed view where nodes are decisions, edges are cosine similarity. Hover to highlight a decision's neighborhood, drag the threshold slider to tighten/loosen the connections.\n- **Vector Space** — UMAP projection of the 3072-dim Gemini embeddings into 2D, drawn as actual vectors radiating from the origin. Lets you literally see semantic clusters form.\n- **List** — searchable, filterable, sortable cards grouped by scope. The boring-but-essential view for actually reading what you've stored.\n\nLive MCP pulse: when Claude Code, Cursor, Windsurf, or any MCP client searches your decisions, the matched nodes pulse in real time in the matching tool's color. You're literally watching the AI think.\n\n```bash\ndecide ui            # foreground (Ctrl+C to stop)\ndecide ui -d         # background (terminal returns immediately)\ndecide ui status     # check whether the background server is running\ndecide ui stop       # stop the background server\n```\n\nLocal-only HTTP server on `localhost:7788` (falls back to a random port). Read-only — the CLI and MCP remain the write paths.\n\n### Other features\n\n<details>\n<summary><strong>History tracking</strong> — full audit trail with source tracking</summary>\n<br/>\nEvery add, edit, deprecation, and delete is logged. The history shows which tool made each change — <code>cli</code> for terminal commands, or the MCP client name (<code>claude-code</code>, <code>cursor</code>, <code>windsurf</code>) for AI-initiated changes.\n\n<img src=\"website/public/recordings/history.gif\" alt=\"decide history\" width=\"700\" />\n</details>\n\n<details>\n<summary><strong>Conflict detection</strong> — catch duplicates before they're saved</summary>\n<br/>\nWhen adding a decision, existing decisions are checked at 75% similarity. The CLI warns you and asks to confirm. The MCP server returns the conflicts so the AI can decide whether to update, deprecate, or force-add.\n\n<img src=\"website/public/recordings/conflict.gif\" alt=\"conflict detection\" width=\"700\" />\n</details>\n\n<details>\n<summary><strong>Deprecate / Activate</strong> — soft-delete without losing embeddings</summary>\n<br/>\nDeprecated decisions are hidden from search but their embeddings are preserved. Reactivate them later and they're immediately searchable again — no re-embedding needed.\n\n<img src=\"website/public/recordings/deprecate.gif\" alt=\"deprecate and activate\" width=\"700\" />\n</details>\n\n<details>\n<summary><strong>Global decisions</strong> — shared across all projects</summary>\n<br/>\nDecisions like \"never commit .env files\" or \"always use TypeScript strict mode\" can be marked as global. They're stored separately and automatically included in every project's search results.\n\n<img src=\"website/public/recordings/global.gif\" alt=\"global decisions in search\" width=\"700\" />\n</details>\n\n<details>\n<summary><strong>Agent behavior</strong> — control how aggressively the AI searches</summary>\n<br/>\nThis setting changes the <code>search_decisions</code> tool description sent to the AI. <strong>Strict</strong> (default) tells the AI searching is mandatory before any code change. <strong>Relaxed</strong> lets the AI decide when searching is relevant.\n\n<img src=\"website/public/recordings/behavior.gif\" alt=\"agent behavior strict vs relaxed\" width=\"700\" />\n</details>\n\n<details>\n<summary><strong>Configurable threshold</strong> — filter out weak matches</summary>\n<br/>\nSet the minimum similarity score (0.0–1.0) for search results. The default is 0.3. Raise it to reduce noise, lower it to surface more loosely related decisions. Applies to both CLI and MCP searches.\n\n<img src=\"website/public/recordings/threshold.gif\" alt=\"configurable search threshold\" width=\"700\" />\n</details>\n\n<details>\n<summary><strong>Embedding health</strong> — check and fix missing vectors</summary>\n<br/>\n<code>decide check</code> shows which decisions are missing embeddings. <code>decide embed</code> generates them. <code>decide clean</code> removes orphaned vectors from deleted decisions.\n\n<img src=\"website/public/recordings/embed.gif\" alt=\"decide check and decide embed\" width=\"700\" />\n</details>\n\n## Documentation\n\nFull docs at [decisionnode.dev/docs](https://decisionnode.dev/docs)\n\n- [Quickstart](https://decisionnode.dev/docs/quickstart)\n- [CLI Reference](https://decisionnode.dev/docs/cli) — all commands\n- [MCP Server](https://decisionnode.dev/docs/mcp) — 9 tools, setup for Claude/Cursor/Windsurf\n- [Decision Nodes](https://decisionnode.dev/docs/decisions) — structure, fields, lifecycle\n- [Context Engine](https://decisionnode.dev/docs/context) — embedding, search, conflict detection\n- [Configuration](https://decisionnode.dev/docs/setup) — storage, agent behavior, search threshold, global decisions\n- [Workflows](https://decisionnode.dev/docs/workflows) — common patterns\n\nFor LLM consumption: [decisionnode.dev/decisionnode-docs.md](https://decisionnode.dev/decisionnode-docs.md)\n\n## Contributing\n\nSee [ROADMAP.md](./ROADMAP.md) for what's coming next. Bug fixes, features, docs improvements, or just ideas are all welcome. See [CONTRIBUTING.md](./CONTRIBUTING.md) for how to get started.\n\n## License\n\nMIT — see [LICENSE](LICENSE).\n","summary":"DecisionNode is a command‑line and MCP server tool that lets developers store, embed, and semantically search structured decision records in a local JSON‑vector store. It enables adding, updating, listing, and deprecating decisions via simple `decide` commands or JSON APIs, and it integrates with OpenAI’s Gemini embeddings for retrieval by similarity. The system is designed to work seamlessly with AI assistants such as Claude Code, Cursor, Windsurf, and Antigravity, allowing the assistant to request relevant decisions on‑demand through MCP without cluttering the prompt. This is ideal for teams that want a persistent, searchable memory of architectural or operational choices to guide AI‑augmented development workflows.","description":"CLI + Local MCP - A shared structured memory store across Claude Code, Cursor, Windsurf, Antigravity, and every MCP client. Semantically queryable.","stars":24,"language":"TypeScript"},{"owner":"agberohq","repo":"keeper","url":"https://github.com/agberohq/keeper","readme":"# keeper\n\nKeeper is a cryptographic secret store for Go. It encrypts arbitrary byte\npayloads at rest using Argon2id key derivation and XChaCha20-Poly1305 (default)\nauthenticated encryption, and stores them in an embedded bbolt database.\n\nIt ships as three things you can use independently:\n\n- **A Go library** — embed a hardened secret store directly in your process,\n  with four security levels, per-bucket DEK isolation, and a tamper-evident\n  audit chain.\n- **An HTTP handler** (`x/keephandler`) — mount keeper endpoints on any\n  `net/http` mux in one call, with pluggable hooks, guards, and response\n  encoders for access control and audit logging.\n- **A CLI** (`cmd/keeper`) — a terminal interface with a persistent REPL\n  session, no-echo secret entry, and zero shell-history exposure.\n\nKeeper was designed as the foundational secret management layer for the [Agbero](https://github.com/agberohq/agbero)\nload balancer but has no dependency on Agbero and works in any Go project.\n\n---\n\n## Contents\n\n- [Security model](#security-model)\n- [Cryptographic design](#cryptographic-design)\n- [Key hierarchy](#key-hierarchy)\n- [Storage schema](#storage-schema)\n- [Audit chain](#audit-chain)\n- [Jack integration](#jack-integration)\n- [x/keepcmd — reusable CLI operations](#xkeepcmd)\n- [x/keephandler — HTTP handler](#xkeephandler)\n- [API reference](#api-reference)\n- [Error catalogue](#error-catalogue)\n- [Security decisions](#security-decisions)\n- [Dependencies](#dependencies)\n\n---\n\n## Security model\n\nKeeper partitions secrets into buckets. Every bucket has an immutable\n`BucketSecurityPolicy` that governs how its Data Encryption Key (DEK) is\nprotected. Four levels are available.\n\n### Schemes vs. Security Levels\n\nA **scheme** is a URI prefix that groups related buckets (`vault://`, `certs://`,\n`space://`, or any name you register). A **security level** is a property of the\nbucket policy set at creation and immutable thereafter.\n\nYou can mix security levels freely within the same scheme. For example,\n`vault://system` might be `LevelPasswordOnly` (auto-unlocked at startup), while\n`vault://admin` is `LevelAdminWrapped` (requires explicit credential).\n\n### LevelPasswordOnly\n\nThe bucket DEK is derived from the master key using HKDF-SHA256 with a\ndomain-separated info string per bucket (`keeper-bucket-dek-v1:scheme:namespace`).\nAll `LevelPasswordOnly` buckets are unlocked automatically when\n`UnlockDatabase` is called with the correct master passphrase. No per-bucket\ncredential is required at runtime. This level is appropriate for secrets the\nprocess needs at startup without human interaction.\n\n### LevelAdminWrapped\n\nThe bucket has a randomly generated 32-byte DEK unique to that bucket. The DEK\nis never stored in plaintext. For each authorised admin a Key Encryption Key\n(KEK) is derived from `HKDF(masterKey‖adminCred, dekSalt)` and used to wrap\nthe DEK via XChaCha20-Poly1305. The bucket is inaccessible until an admin calls\n`UnlockBucket` with their credential. The master passphrase alone cannot\ndecrypt the bucket. Revoking one admin does not affect any other admin's wrapped\ncopy.\n\n### LevelHSM\n\nThe bucket DEK is generated at `CreateBucket` time and immediately wrapped by\na caller-supplied `HSMProvider`. The provider performs the wrap and unwrap\noperations — keeper never handles the raw DEK after handing it to the provider.\n`UnlockDatabase` automatically calls the provider to unwrap and seed the\nEnvelope for all registered HSM buckets. Master key rotation does not\nre-encrypt these buckets; the DEK is provider-controlled.\n\nA built-in `SoftHSM` implementation backed by a memguard-protected wrapping\nkey is available in `pkg/hsm` for testing and CI environments. Do not use it\nin production.\n\n### LevelRemote\n\nIdentical to `LevelHSM` in key management behaviour, but the `HSMProvider` is\nimplemented by `pkg/remote.Provider` — a configurable HTTPS adapter that\ndelegates wrap and unwrap to any remote KMS service over TLS. Pre-built\nconfigurations for HashiCorp Vault Transit, AWS KMS, and GCP Cloud KMS are\nprovided in `pkg/remote`. For production use, configure `TLSClientCert` and\n`TLSClientKey` to enable mutual TLS authentication.\n\n---\n\n## Cryptographic design\n\n### Master key derivation\n\n```\nsalt ← random 32 bytes, generated once, stored as a versioned SaltStore (unencrypted)\nmasterKey ← Argon2id(passphrase, salt, t=3, m=64 MiB, p=4) → 32 bytes\n```\n\nA verification hash is stored on first derivation:\n\n```\nverifyHash ← Argon2id(masterKey, \"verification\", t=1, m=64 MiB, p=4) → 32 bytes\n```\n\nSubsequent `DeriveMaster` calls recompute this hash and compare it with\n`crypto/subtle.ConstantTimeCompare`. A mismatch returns `ErrInvalidPassphrase`.\n\nThe KDF salt is stored **unencrypted** by design. It must be readable before\n`UnlockDatabase` to derive the master key — encrypting it with a key derived\nfrom the master would be circular. A KDF salt is not a secret; its purpose is\nuniqueness, not confidentiality.\n\n### Secret encryption\n\nEach plaintext value is encrypted with XChaCha20-Poly1305 using the bucket DEK:\n\n```\nnonce ← random 24 bytes\nciphertext ← XChaCha20-Poly1305.Seal(nonce, DEK, plaintext)\n```\n\nThe stored record is a msgpack-encoded `Secret` struct containing the\nciphertext, encrypted metadata, and schema version. Authentication is implicit:\na ciphertext decrypted with the wrong key produces an AEAD authentication\nfailure before any plaintext is returned.\n\n### KEK derivation — LevelAdminWrapped\n\n```\nsalt ← random 32 bytes, generated at bucket creation, stored in policy\nikm ← masterKey ‖ adminCredential\nKEK ← HKDF-SHA256(ikm, salt, info=\"keeper-kek-v1\") → 32 bytes\nwrappedDEK ← XChaCha20-Poly1305.Seal(nonce, KEK, DEK)\n```\n\nThe KEK is derived using HKDF rather than a second Argon2 pass. The master key\nwas already produced by a high-cost KDF; a second Argon2 invocation would add\nhundreds of milliseconds of latency to every `UnlockBucket` call with no\nsecurity benefit. HKDF-SHA256 operates in approximately one microsecond.\n\n**Defense-in-depth:** An attacker who compromises only the database obtains the\nwrapped DEK and the HKDF salt but cannot derive the KEK without the master key.\nAn attacker who compromises only the master key cannot unwrap any\n`LevelAdminWrapped` DEK without also knowing the admin credential.\n\n### Metadata encryption — secrets\n\nSecret metadata (creation time, update time, access count, version) is\nencrypted separately from the ciphertext:\n\n```\nmetaKey ← HKDF-SHA256(bucketDEK, nil, info=\"keeper-metadata-v1\") → 32 bytes\nencryptedMeta ← XChaCha20-Poly1305.Seal(nonce, metaKey, msgpack(metadata))\n```\n\nFor `LevelAdminWrapped`, `LevelHSM`, and `LevelRemote` buckets this means\nmetadata is inaccessible without the bucket credential, preventing an attacker\nwith read access to the database file from learning access patterns or\ntimestamps.\n\n**Timing side-channel note:** XChaCha20-Poly1305 processes the full ciphertext\nbefore returning an authentication error. The fallback decrypt path (new\nderived DEK → old master-key-as-DEK) takes the same wall-clock time regardless\nof which key succeeds. No timing side-channel leaks the migration state of a\nrecord.\n\n### Metadata encryption — policies, WAL, and audit\n\nAll structural metadata is also encrypted at rest. Two keys are derived from\nthe master key at `UnlockDatabase` time:\n\n```\npolicyEncKey ← HKDF-SHA256(masterKey, nil, info=\"keeper-policy-enc-v1\") → 32 bytes\nauditEncKey  ← HKDF-SHA256(masterKey, nil, info=\"keeper-audit-enc-v1\")  → 32 bytes\n```\n\n`policyEncKey` encrypts: `BucketSecurityPolicy` values and the rotation WAL.\n\n`auditEncKey` encrypts: the `Scheme`, `Namespace`, and `Details` fields of\nevery audit event.\n\nBoth keys are cleared from memory at `Lock()`. The cipher used for metadata\nencryption is the same configurable `crypt.Cipher` interface used for secrets —\nthe user's cipher choice (AES-256-GCM for FIPS, XChaCha20-Poly1305 by default)\nflows through automatically.\n\nWire format for all encrypted metadata blobs:\n\n```\nnonce (cipher.NonceSize() bytes) || AEAD-ciphertext\n```\n\n### Policy bucket key hashing\n\nOn-disk policy keys are opaque hashes rather than plaintext `scheme:namespace`\nstrings, preventing offline enumeration of bucket names:\n\n```\nbase ← hex(SHA-256(\"scheme:namespace\"))[:32]   // 32 hex chars = 128-bit key space\n_policies/<base>          → encrypted BucketSecurityPolicy\n_policies/<base>__hash__  → SHA-256(encrypted policy bytes)\n_policies/<base>__hmac__  → HMAC-SHA256(policyKey, encrypted policy bytes)\n```\n\nThe in-memory `schemeRegistry` continues to use `\"scheme:namespace\"` as its\nkey — only the on-disk representation changes.\n\n### Policy authentication\n\nEach policy record carries two integrity tags written atomically in one bbolt\ntransaction:\n\n```\nhash ← SHA-256(encryptedPolicyBytes)                         — unauthenticated, pre-unlock integrity\npolicyKey ← HKDF-SHA256(masterKey, nil, info=\"keeper-policy-hmac-v1\") → 32 bytes\nhmac ← HMAC-SHA256(policyKey, encryptedPolicyBytes)          — authenticated, post-unlock integrity\n```\n\nBefore `UnlockDatabase`, only the SHA-256 hash is available. After unlock,\n`loadPolicy` verifies the HMAC tag. `UnlockDatabase` calls `upgradePolicyHMACs`\nto backfill HMAC tags on policies created before this feature existed.\n\n### Audit HMAC signing\n\n```\nauditKey ← HKDF-SHA256(masterKey, nil, info=\"keeper-audit-hmac-v1\") → 32 bytes\nHMAC ← HMAC-SHA256(auditKey, event fields including Seq)\n```\n\nThe signing key is activated at `UnlockDatabase` and cleared at `Lock`. When\nthe master key is rotated, `Rotate` appends a key-rotation checkpoint event to\nevery active audit chain, signed with the old audit key as the final event of\nthe old epoch. History is never rewritten; the checkpoint is the trust bridge\nbetween epochs.\n\n---\n\n## Key hierarchy\n\n```\npassphrase\n    │\n    └─ Argon2id(salt) ──→ masterKey (32 bytes, memguard Enclave)\n                              │\n                              ├─ HKDF(\"keeper-audit-hmac-v1\")  ──→ auditKey    (HMAC signing)\n                              ├─ HKDF(\"keeper-audit-enc-v1\")   ──→ auditEncKey (audit field encryption)\n                              ├─ HKDF(\"keeper-policy-hmac-v1\") ──→ policyKey   (policy HMAC)\n                              ├─ HKDF(\"keeper-policy-enc-v1\")  ──→ policyEncKey (policy/WAL encryption)\n                              │\n                              ├─ [LevelPasswordOnly]\n                              │       └─ HKDF(\"keeper-bucket-dek-v1:scheme:ns\") ──→ DEK\n                              │               └─ HKDF(\"keeper-metadata-v1\") ──→ metaKey\n                              │\n                              ├─ [LevelAdminWrapped]\n                              │       ├─ random 32 bytes ──→ DEK\n                              │       │       └─ HKDF(\"keeper-metadata-v1\") ──→ metaKey\n                              │       │\n                              │       └─ HKDF(\"keeper-kek-v1\", masterKey‖adminCred, dekSalt)\n                              │                 └─ KEK\n                              │                       └─ XChaCha20-Poly1305(KEK, DEK) ──→ wrappedDEK\n                              │\n                              └─ [LevelHSM / LevelRemote]\n                                      ├─ random 32 bytes ──→ DEK\n                                      │       └─ HKDF(\"keeper-metadata-v1\") ──→ metaKey\n                                      │\n                                      └─ HSMProvider.WrapDEK(DEK) ──→ wrappedDEK\n                                         (stored; provider controls the wrapping key)\n```\n\nAll intermediate keys are zeroed immediately after use. The master key is\nnever written to disk in any form.\n\n---\n\n## Storage schema\n\nThe underlying database is bbolt. All buckets and their contents:\n\n| bbolt bucket | Key | Value |\n|---|---|---|\n| `__meta__` | `salt` | msgpack — SaltStore (unencrypted; circular dependency if encrypted) |\n| `__meta__` | `verify` | raw bytes — Argon2id verification hash |\n| `__meta__` | `rotation_wal` | `nonce‖AEAD(msgpack(RotationWAL))` |\n| `__meta__` | `bucket_dek_done` | `\"1\"` — DEK migration completion marker |\n| `__policies__` | `hex(SHA-256(scheme:ns))[:32]` | `nonce‖AEAD(msgpack(BucketSecurityPolicy))` |\n| `__policies__` | `<base>__hash__` | hex SHA-256 of encrypted policy bytes |\n| `__policies__` | `<base>__hmac__` | hex HMAC-SHA256(policyKey, encrypted policy bytes) |\n| `__audit__/scheme/namespace` | event UUID | JSON — audit Event |\n| `__audit__/scheme/namespace` | `__chain_index__` | JSON — chainIndex |\n| `scheme/namespace` | key string | msgpack — Secret struct |\n\n### Secret struct (msgpack)\n\n```go\ntype Secret struct {\n    Ciphertext    []byte `msgpack:\"ct\"`\n    EncryptedMeta []byte `msgpack:\"em,omitempty\"`\n    SchemaVersion int    `msgpack:\"sv\"`  // always 1\n}\n```\n\n### Audit Event fields\n\nThe `Event` struct uses separate plaintext routing fields (`Scheme`,\n`Namespace`) alongside encrypted payload fields (`EncScheme`, `EncNamespace`,\n`EncDetails`). Checksums are computed over the plaintext routing fields and the\nencrypted `EncDetails` bytes, so chain integrity can be verified at three tiers\nwithout any key:\n\n| Tier | Has | Can verify |\n|---|---|---|\n| Public | Nothing | SHA-256 checksum chain (detects tampering and insertion) |\n| Audit-key holder | `auditEncKey` | Full chain + decrypt Scheme/Namespace/Details |\n| Operator | Master passphrase | Everything |\n\n**Example:** A compliance auditor receives only `auditEncKey`. They can verify\nthe full HMAC chain across key rotations and read all event details, but cannot\ndecrypt any secret values. A public observer with only the database file can\nstill detect if any event was modified or inserted after the fact.\n\n### Versioned salt store\n\nThe KDF salt is stored as a msgpack-encoded `SaltStore` under the `salt`\nmetadata key. Each salt rotation appends a new `SaltEntry` and advances\n`CurrentVersion`. Old entries are retained as an audit trail. The SaltStore is\nstored unencrypted — see [Security decisions](#security-decisions).\n\n### Crash-safe rotation WAL\n\n`Rotate` writes a WAL before touching any record. The WAL carries\n`WrappedOldKey`: the pre-rotation master key encrypted with the new master key.\nAfter a crash the old passphrase is gone; `WrappedOldKey` is the only correct\nway to carry the old key across the boundary. At `UnlockDatabase`, when a WAL\nis present, the new master key decrypts `WrappedOldKey` and rotation resumes\nfrom the WAL cursor. The WAL itself is encrypted with `policyEncKey`.\n\n---\n\n## Audit chain\n\nEvery significant operation appends a tamper-evident event to the bucket's\naudit chain. Chain integrity depends on two mechanisms.\n\n**Checksum.** SHA-256 over prevChecksum, ID, BucketID, Scheme, Namespace,\nEncDetails, EventType, and Timestamp. Using `Scheme`/`Namespace` as plaintext\n(always preserved alongside the encrypted forms) ensures the checksum is stable\nacross load paths. `EncDetails` provides integrity over the encrypted payload.\n\n**HMAC.** HMAC-SHA256 over all fields including Seq. An attacker who can write\nto the database but does not know the audit key cannot produce a valid HMAC.\n`VerifyIntegrity` checks both layers for every event.\n\n**Key rotation epoch boundary.** At `Rotate`, a checkpoint event is appended\nto every active chain carrying fingerprints of both the outgoing and incoming\naudit keys. The checkpoint is signed with the outgoing key. Auditors holding\nany epoch key can recover subsequent epoch keys from the `wrapped_new_key` field\nand verify HMAC continuity across the full chain.\n\n**Automatic pruning.** When `AuditPruneInterval` is set in `Config`, a\n`jack.Scheduler` runs periodically and calls `PruneEvents` on every registered\nbucket. `LevelHSM` and `LevelRemote` buckets are never pruned regardless of\nthis setting.\n\n---\n\n## Jack integration\n\nJack is an optional process supervision library. When a `JackConfig` is\nprovided via `WithJack`, keeper activates background components automatically:\n\n- **Auto-lock Looper:** Periodically checks the last activity timestamp and\n  drops `LevelAdminWrapped` bucket DEKs after `AutoLockInterval`. `LevelPasswordOnly`\n  buckets remain unlocked so background jobs continue uninterrupted. The\n  single-write-lock pattern inside the looper task eliminates the `RUnlock→Lock`\n  race condition present in earlier designs.\n- **Per-bucket DEK Reaper:** TTL-based expiration for `LevelAdminWrapped` DEKs.\n- **Health monitoring patients:** bbolt read latency check and encrypt/decrypt\n  round-trip verification, both registered with `jack.Doctor`.\n- **Audit prune scheduler:** Periodic `PruneEvents` on all non-HSM buckets.\n- **Async event Pool:** Audit events submitted without blocking the main operation.\n\nIf `JackConfig` is not provided, keeper runs without these background tasks.\nKeeper never calls `pool.Shutdown` — the pool lifecycle belongs to the caller.\n\n---\n\n## x/keepcmd\n\n`x/keepcmd` provides reusable keeper operations decoupled from any CLI\nframework. Embed it in your own application to get typed, testable secret\nmanagement without pulling in the CLI binary.\n\n```go\nimport \"github.com/agberohq/keeper/x/keepcmd\"\n\ncmds := &keepcmd.Commands{\n    Store: func() (*keeper.Keeper, error) {\n        return security.KeeperOpen(cfg)  // your own config\n    },\n    Out:     keepcmd.PlainOutput{},\n    NoClose: false, // true in REPL / session contexts\n}\n\ncmds.List()                                          // all keys: scheme://namespace/key\ncmds.List(\"vault\")                                   // all keys in scheme vault\ncmds.List(\"vault\", \"system\")                         // all keys in vault://system\ncmds.Get(\"vault://system/jwt_secret\")\ncmds.Set(\"vault://system/jwt_secret\", \"newsecret\", keepcmd.SetOptions{})\ncmds.Rotate(newPassphraseBytes)    // caller resolved the passphrase — no prompter dependency\ncmds.RotateSalt(currentPassBytes)  // same\n```\n\n`keepcmd` never calls `prompter` or reads from stdin. Passphrase resolution\nis entirely the caller's responsibility — this keeps the package safe in\nheadless server contexts.\n\n`NoClose: true` prevents `Commands` from calling `store.Close()` after each\noperation. Use this in REPL / session contexts where one store is shared\nacross many calls.\n\n---\n\n## x/keephandler\n\n`x/keephandler` mounts keeper HTTP endpoints on any `net/http` mux. No\nexternal router dependency — it uses Go 1.22+ method+pattern routing with\nstdlib `http.ServeMux`.\n\n```go\nimport \"github.com/agberohq/keeper/x/keephandler\"\n\nkeephandler.Mount(mux, store,\n    keephandler.WithPrefix(\"/api/keeper\"),\n    keephandler.WithGuard(func(w http.ResponseWriter, r *http.Request, route string) bool {\n        if !acl.Allow(r.Header.Get(\"X-Principal\"), route) {\n            http.Error(w, `{\"error\":\"forbidden\"}`, http.StatusForbidden)\n            return false\n        }\n        return true\n    }),\n    keephandler.WithHooks(\n        keephandler.Hook{\n            Route:       keephandler.RouteGet,\n            CaptureBody: false,\n            After: func(r *http.Request, status int, _ []byte) {\n                audit.Log(r.Context(), route, status)\n            },\n        },\n    ),\n    keephandler.WithEncoder(func(w http.ResponseWriter, route string, status int, data any) {\n        w.Header().Set(\"Content-Type\", \"application/json\")\n        w.WriteHeader(status)\n        json.NewEncoder(w).Encode(map[string]any{\n            \"ok\":    status < 400,\n            \"route\": route,\n            \"data\":  data,\n        })\n    }),\n    keephandler.WithRoutes(func(m *http.ServeMux) {\n        m.HandleFunc(\"POST /api/keeper/totp/{user}\", myTOTPHandler)\n    }),\n)\n```\n\n### Endpoints\n\n| Method | Path | Description |\n|---|---|---|\n| `POST` | `{prefix}/unlock` | Unlock the store with a passphrase |\n| `POST` | `{prefix}/lock` | Lock the store |\n| `GET` | `{prefix}/status` | Lock state — safe to poll without auth |\n| `GET` | `{prefix}/keys` | List all secret keys |\n| `GET` | `{prefix}/keys/{key}` | Retrieve a secret value |\n| `POST` | `{prefix}/keys` | Store a secret (JSON or multipart) |\n| `DELETE` | `{prefix}/keys/{key}` | Delete a secret |\n| `POST` | `{prefix}/rotate` | Rotate the master passphrase |\n| `POST` | `{prefix}/rotate/salt` | Rotate the KDF salt |\n| `GET` | `{prefix}/backup` | Stream a database snapshot |\n\n### Hook contract\n\n`BeforeFunc` returns `(allow bool, err error)`.\n\n- `(true, nil)` — let the request proceed.\n- `(false, nil)` — abort; the hook has already written a complete response.\n- `(false, err)` — abort; the framework writes a `500` using `err.Error()`.\n  The hook must **not** have written anything to `w`.\n\n`Hook.CaptureBody bool` controls whether `AfterFunc` receives the response\nbody. `false` (default) costs one lightweight `statusWriter` wrapper;\n`true` buffers the full body into a `bytes.Buffer` for the `AfterFunc` — one\nallocation per request.\n\nHooks are executed in registration order. Multiple `WithHooks` calls are\nadditive. Only the first hook registered for a given route name is used—subsequent\nregistrations for the same route are ignored.\n\n---\n\n## API reference\n\n### Construction and unlock\n\n```go\nstore, err := keeper.New(keeper.Config{\n    DBPath:              \"/var/lib/agbero/keeper.db\",\n    AutoLockInterval:    30 * time.Minute,\n    EnableAudit:         true,\n    AuditPruneInterval:  24 * time.Hour,\n    AuditPruneKeepLastN: 10_000,\n    AuditPruneOlderThan: 90 * 24 * time.Hour,\n    DBLatencyThreshold:  200 * time.Millisecond,\n    Logger:              logger,\n}, keeper.WithJack(keeper.JackConfig{\n    Pool:     jackPool,\n    Shutdown: jackShutdown,\n}))\ndefer store.Close()\n\n// Shorthand (wraps DeriveMaster + UnlockDatabase):\nif err := store.Unlock([]byte(os.Getenv(\"KEEPER_PASSPHRASE\"))); err != nil {\n    log.Fatal(err) // ErrInvalidPassphrase on wrong passphrase\n}\n```\n\n`UnlockDatabase` performs the following in order:\n\n1. Derives and activates the audit HMAC signing key\n2. Derives and activates the policy HMAC key\n3. Derives and activates `policyEncKey` and `auditEncKey`\n4. Clears and reloads `schemeRegistry` (decrypts all policy blobs)\n5. Resumes any interrupted rotation WAL\n6. Upgrades policy HMAC tags\n7. Seeds all `LevelPasswordOnly` bucket DEKs into the Envelope\n8. Starts background tasks (migration looper, auto-lock, health patients)\n\n### LevelPasswordOnly bucket — full lifecycle\n\n```go\nerr := store.CreateBucket(\"vault\", \"system\", keeper.LevelPasswordOnly, \"init\")\n\nstore.Set(\"vault://system/jwt_secret\", []byte(\"supersecret\"))\nval, err := store.Get(\"vault://system/jwt_secret\")\n\n// Namespaced convenience wrappers\nstore.SetNamespaced(\"admin\", \"jwt_secret\", secretBytes)\nval, err = store.GetNamespaced(\"admin\", \"jwt_secret\")\n```\n\n### LevelAdminWrapped bucket — full lifecycle\n\n```go\nerr := store.CreateBucket(\"finance\", \"payroll\", keeper.LevelAdminWrapped, \"ops-team\")\nerr = store.AddAdminToPolicy(\"finance\", \"payroll\", \"alice\", []byte(\"alicepass\"))\n\nstore.SetNamespacedFull(\"finance\", \"payroll\", \"salary_key\", []byte(\"AES256...\"))\n\nstore.LockBucket(\"finance\", \"payroll\")\nerr = store.UnlockBucket(\"finance\", \"payroll\", \"bob\", []byte(\"bobpass\"))\n// ErrAuthFailed — does not distinguish wrong password from unknown admin (CWE-204)\n\nerr = store.RevokeAdmin(\"finance\", \"payroll\", \"alice\")\nerr = store.RotateAdminWrappedDEK(\"finance\", \"payroll\", \"bob\", []byte(\"bobpass\"))\n\nneeds, err := store.NeedsAdminRekey(\"finance\", \"payroll\")\n```\n\n### LevelHSM / LevelRemote buckets\n\n```go\nimport (\n    \"github.com/agberohq/keeper/pkg/hsm\"\n    \"github.com/agberohq/keeper/pkg/remote\"\n)\n\n// SoftHSM — testing only\nprovider, _ := hsm.NewSoftHSM()\nstore.RegisterHSMProvider(\"secure\", \"keys\", provider)\nstore.CreateBucket(\"secure\", \"keys\", keeper.LevelHSM, \"ops\")\n\n// Vault Transit\ncfg := remote.VaultTransit(\"https://vault.corp:8200\", vaultToken, \"my-key\")\ncfg.TLSClientCert = \"/etc/keeper/client.crt\"\ncfg.TLSClientKey  = \"/etc/keeper/client.key\"\nprovider, _ = remote.New(cfg)\nstore.RegisterHSMProvider(\"tenant\", \"secrets\", provider)\nstore.CreateBucket(\"tenant\", \"secrets\", keeper.LevelRemote, \"ops\")\n```\n\n### Audit key export\n\n```go\n// Export the audit encryption key to allow a third-party auditor to decrypt\n// event details without access to the master passphrase.\nauditKey, err := store.ExportAuditKey()\ndefer zero.Bytes(auditKey)\n\nevents, err := auditStore.LoadChain(\"vault\", \"system\", auditKey)\n```\n\n### Key rotation\n\n```go\n// Rotate passphrase — crash-safe WAL, resumes on next Unlock if interrupted\nstore.Rotate([]byte(\"new-passphrase\"))\n\n// Rotate KDF salt — re-derives master key, re-encrypts LevelPasswordOnly\nstore.RotateSalt([]byte(\"current-passphrase\"))\n```\n\n### Compare-and-swap\n\n```go\nerr := store.CompareAndSwapNamespacedFull(\"vault\", \"system\", \"counter\",\n    []byte(\"old\"), []byte(\"new\"))\n// ErrCASConflict if current value does not match old\n```\n\n### Backup\n\n```go\nf, _ := os.Create(\"keeper.db.bak\")\ninfo, err := store.Backup(f)\n// info.Bytes, info.Timestamp, info.DBPath\n```\n\n---\n\n## Error catalogue\n\nAll sentinel errors work with `errors.Is` and `errors.As`. Stack traces are\ncaptured at the point of creation via `github.com/olekukonko/errors`.\n\n| Error | Meaning |\n|---|---|\n| `ErrStoreLocked` | Operation attempted while the store is locked |\n| `ErrInvalidPassphrase` | Wrong master passphrase |\n| `ErrAuthFailed` | Any `UnlockBucket` failure — does not distinguish wrong password from unknown admin ID (CWE-204) |\n| `ErrKeyNotFound` | Secret key does not exist |\n| `ErrBucketLocked` | Bucket has not been unlocked |\n| `ErrPolicyImmutable` | Second policy for an existing bucket |\n| `ErrPolicyNotFound` | No policy for the given scheme/namespace |\n| `ErrAdminNotFound` | Admin ID not in policy — `RevokeAdmin` only |\n| `ErrHSMProviderNil` | HSM/Remote bucket created without a registered provider |\n| `ErrCheckLatency` | DB read latency exceeded `DBLatencyThreshold` |\n| `ErrCASConflict` | Current value does not match expected in `CompareAndSwap` |\n| `ErrSecurityDowngrade` | Cross-bucket move from higher to lower security level |\n| `ErrAlreadyUnlocked` | `UnlockDatabase` called on an already-unlocked store |\n| `ErrMasterRequired` | `UnlockDatabase` called with nil or destroyed `Master` |\n| `ErrChainBroken` | Audit chain integrity verification failed |\n| `ErrMetadataDecrypt` | Encrypted metadata could not be decrypted |\n| `ErrPolicySignature` | Policy HMAC verification failed — record was tampered |\n\n---\n\n## Security decisions\n\n**ErrAuthFailed unifies all UnlockBucket failures (CWE-204 / CVSS 5.3).** Both\nan unknown admin ID and a wrong password return `ErrAuthFailed`. This prevents\nadmin ID enumeration by timing or error-string comparison. `RevokeAdmin` retains\n`ErrAdminNotFound` because it is an administrative operation on an\nalready-unlocked store. The constant-time comparison for admin ID presence is\nintentionally omitted. An attacker who can measure sub-microsecond differences\nin bbolt bucket lookups would need local filesystem access—at which point they\ncan read the policy bucket directly. The threat model assumes the database file\nmay be compromised; timing defense against remote enumeration is the primary\nconcern.\n\n**Argon2id dominates timing.** Argon2id takes 200–500 ms on typical hardware.\nPost-derivation comparison differences are four or more orders of magnitude\nsmaller and are not measurable remotely. No artificial equalisation is applied.\n\n**DEK retrieved inside the CAS transaction boundary.** `CompareAndSwapNamespacedFull`\nretrieves the bucket DEK inside the bbolt write transaction, eliminating the\nwindow where a concurrent `Rotate` could change the DEK between retrieval and\nuse.\n\n**Passphrase never stored as a Go string in the HTTP handler.** All three\npassphrase fields (`passphrase`, `new_passphrase`) are decoded from JSON\ndirectly into `[]byte` via raw-map extraction, keeping the string backing array\noff the long-lived heap. The `[]byte` copy is zeroed with `wipeBytes` after use.\n\n**No `--passphrase` flag in the CLI.** Flags appear in `ps` output and shell\nhistory. The CLI accepts the passphrase only from `KEEPER_PASSPHRASE` env or\nan interactive no-echo prompt.\n\n**REPL secret values are never visible.** `set <key>` in the REPL without an\ninline value uses `term.ReadPassword` — it does not appear in terminal\nscrollback, shell history, or `ps`. An inline value (`set key value`) can be\nsupplied for non-sensitive data when convenient.\n\n**SaltStore is intentionally unencrypted.** The KDF salt must be readable\nbefore `UnlockDatabase` to derive the master key. `policyEncKey` (used for all\nother metadata encryption) is itself derived from the master key — encrypting\nthe salt with `policyEncKey` would be circular. A KDF salt provides uniqueness,\nnot confidentiality; there is no security value in encrypting it.\n\n**Policy bucket keys are hashed, not plaintext.** On-disk policy keys are\n`hex(SHA-256(\"scheme:namespace\"))[:32]` — 128 bits of key space — rather than\nreadable strings. An offline attacker reading the bbolt file cannot enumerate\nbucket names without decrypting the policy blobs.\n\n**Metadata encryption uses the same cipher interface as secrets.** All\n`policyEncKey` and `auditEncKey` operations go through `s.config.NewCipher(key)`\n— the same `crypt.Cipher` interface configured for secret values. The user's\ncipher choice (AES-256-GCM for FIPS 140, XChaCha20-Poly1305 by default) flows\nthrough to policy, WAL, and audit encryption automatically. No code path\nhard-codes a specific algorithm.\n\n**LevelHSM and LevelRemote buckets skipped during master key rotation.**\n`reencryptAllWithKey` and `RotateSalt` explicitly skip these buckets. The DEK\nis provider-controlled; master salt rotation does not affect it.\n\n**Crash-safe rotation with WrappedOldKey.** `Rotate` writes a WAL before\ntouching any record. The WAL carries `WrappedOldKey`: the pre-rotation master\nkey encrypted with the new master key. After a crash, `UnlockDatabase` decrypts\n`WrappedOldKey` using the verified new key and resumes rotation from the cursor.\n\n---\n\n## Dependencies\n\n| Package | Purpose |\n|---|---|\n| `go.etcd.io/bbolt` | Embedded key-value store |\n| `golang.org/x/crypto` | Argon2id, XChaCha20-Poly1305, HKDF, scrypt |\n| `github.com/awnumar/memguard` | Memory-safe key enclave (master key, DEKs) |\n| `github.com/vmihailenco/msgpack/v5` | Binary serialisation for secrets and policies |\n| `github.com/olekukonko/jack` | Process supervision (optional Jack integration) |\n| `github.com/olekukonko/ll` | Structured logging |\n| `github.com/olekukonko/errors` | Sentinel errors with stack traces |\n| `github.com/olekukonko/zero` | Safe byte-slice zeroing |\n| `github.com/olekukonko/prompter` | No-echo terminal prompts (CLI only) |\n| `github.com/integrii/flaggy` | CLI flag parsing (cmd/keeper only) |\n| `golang.org/x/term` | TTY detection and raw password reading (CLI only) |\n","summary":"Keeper is a Go‑first cryptographic secret store that encrypts arbitrary byte payloads at rest with Argon2id key derivation and XChaCha20‑Poly1305, persisting them in an embedded bbolt database. It provides three independent components: a hardened library with per‑bucket DEK isolation, tamper‑evident audit chains, and multiple security levels; an HTTP handler that can be mounted on any `net/http` mux with pluggable hooks and access control; and a zero‑history CLI that supports a persistent REPL and secure no‑echo entry. The system is designed for Go applications needing robust, fine‑grained secret management—such as load balancers, microservice backends, or any service that requires secure, isolated bucket protection, admin‑wrapped credentials, or HSM‑backed key handling. With its audit chain, key hierarchy, and integration hooks, Keeper suits developers and ops teams focused on building secure, auditable secret pipelines.","description":"Simple Secure Keeper for Secrets ","stars":104,"language":"Go"},{"owner":"arc53","repo":"fast-ebook","url":"https://github.com/arc53/fast-ebook","readme":"# fast-ebook\n\n[![PyPI version](https://img.shields.io/pypi/v/fast-ebook.svg)](https://pypi.org/project/fast-ebook/)\n[![CI](https://github.com/arc53/fast-ebook/actions/workflows/ci.yml/badge.svg)](https://github.com/arc53/fast-ebook/actions/workflows/ci.yml)\n\nRust-powered EPUB2/EPUB3 library for Python. Fast reading, writing, validation, and markdown conversion — MIT-licensed.\n\n## How fast?\n\nConverting **War and Peace** (1.8 MB EPUB) to a single markdown document:\n\n| Library | Time | |\n|---|---:|---|\n| ebooklib + html2text | 375 ms | baseline |\n| **fast-ebook `book.to_markdown()`** | **56 ms** | **6.7x faster** |\n\n\n```python\nfrom fast_ebook import epub\n\nbook = epub.read_epub('war_and_peace.epub')\nmarkdown = book.to_markdown()\n```\n\nOther operations on the same book — read+extract every chapter is **3x** faster, `get_item_with_id` is **78x** faster. Full numbers and methodology: [docs/benchmarks.md](docs/benchmarks.md).\n\n## Installation\n\n```bash\npip install fast-ebook\n```\n\n## Quick Start\n\n## Migration from ebooklib\n\nThe public API mirrors ebooklib — for most code you only need to change the import:\n\n```python\nfrom fast_ebook import epub\nimport fast_ebook  # for ITEM_* constants\n```\n\nOr use the drop-in compatibility layer for a one-line change:\n\n```python\nimport fast_ebook.compat as ebooklib\nfrom fast_ebook.compat import epub\n```\n\n### Read\n\n```python\nfrom fast_ebook import epub\nimport fast_ebook\n\nbook = epub.read_epub('book.epub')\n\nprint(book.get_metadata('DC', 'title'))\n\nfor img in book.get_items_of_type(fast_ebook.ITEM_IMAGE):\n    print(img.get_name(), len(img.get_content()), 'bytes')\n\nitem = book.get_item_with_id('chapter1')\n\nfor entry in book.toc:\n    print(entry.title, entry.href)\n```\n\nAlso accepts `Path`, `bytes`, or `BytesIO`. See [docs/api.md](docs/api.md) for the full reading API, options (`lazy`, `ignore_ncx`, `ignore_nav`), and the context manager form.\n\n### Write\n\n```python\nfrom fast_ebook import epub\n\nbook = epub.EpubBook()\nbook.set_identifier('id123')\nbook.set_title('My Book')\nbook.set_language('en')\nbook.add_author('Author Name')\n\nc1 = epub.EpubHtml(title='Intro', file_name='chap_01.xhtml', lang='en')\nc1.content = '<h1>Hello</h1><p>World</p>'\n\nbook.add_item(c1)\nbook.add_item(epub.EpubNcx())\nbook.add_item(epub.EpubNav())\n\nbook.toc = [epub.Link('chap_01.xhtml', 'Introduction', 'intro')]\nbook.spine = ['nav', c1]\n\nepub.write_epub('output.epub', book)\n```\n\n### Convert to Markdown\n\n```python\nmd = epub.read_epub('book.epub').to_markdown()\n```\n\n### Parallel batch read\n\n```python\nfrom fast_ebook import epub\n\nbooks = epub.read_epubs(['a.epub', 'b.epub', 'c.epub'], workers=4)\n```\n\n## Documentation\n\n- [docs/api.md](docs/api.md) — Full Python API reference, options, item types, compat layer\n- [docs/benchmarks.md](docs/benchmarks.md) — Read/write/batch/markdown benchmarks vs ebooklib\n- [docs/architecture.md](docs/architecture.md) — How fast-ebook is built (Rust core, PyO3 bridge)\n- [docs/threat-model.md](docs/threat-model.md) — Security model for parsing untrusted EPUBs\n\n## License\n\nMIT\n","summary":"Fast‑ebook is a fast, Rust‑powered library for handling EPUB2/EPUB3 files from Python, delivering quick reading, writing, validation and Markdown conversion while keeping an API familiar to ebooklib users. Its core strengths include 6.7× faster Markdown export of large books (e.g., *War and Peace*), multi‑threaded batch reading, and an introspective metadata and item retrieval system. The library is ideal for developers who need to process, convert, or programmatically manipulate e‑books at scale, such as content‑management teams, digital‑library backends, or data‑mining projects. It is MIT‑licensed, easy to install with pip, and offers a drop‑in compatibility layer for smooth migration from ebooklib.","description":"fast, rust based epub library for python","stars":59,"language":"Rust"},{"owner":"zonelessdev","repo":"zoneless","url":"https://github.com/zonelessdev/zoneless","readme":"<p align=\"center\">\n  <a href=\"https://zoneless.com\">\n    <img src=\"https://zoneless.com/assets/images/screenshots/og.png\" alt=\"Zoneless — The open-source Stripe Connect alternative\" width=\"800\" />\n  </a>\n</p>\n\n<h1 align=\"center\">Zoneless</h1>\n\n<p align=\"center\">\n  <strong>The open-source Stripe Connect alternative.<br>Pay marketplace sellers globally with USDC. ~$0.002 fees. Instant payouts. Self-hosted.</strong>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://zoneless.com/docs\">Docs</a> &middot;\n  <a href=\"https://zoneless.com/#live-demo\">Live Demo</a> &middot;\n  <a href=\"https://zoneless.com\">Website</a> &middot;\n  <a href=\"https://discord.gg/mdMQJug9mG\">Discord</a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/zonelessdev/zoneless/actions/workflows/ci.yml\"><img src=\"https://github.com/zonelessdev/zoneless/actions/workflows/ci.yml/badge.svg\" alt=\"CI\"></a>\n  <a href=\"./LICENSE\"><img src=\"https://img.shields.io/badge/License-Apache%202.0-blue.svg\" alt=\"License: Apache 2.0\"></a>\n</p>\n\n---\n\nZoneless is a free, open-source drop-in replacement for the **payout part of Stripe Connect**. It lets you pay marketplace sellers globally with stablecoins (USDC) using an API identical to Stripe — at near-zero cost.\n\nIf you know Stripe, you already know how to use Zoneless. Same webhooks, same object shapes, same SDK patterns. Just swap `stripe` for `@zoneless/node` and you're live.\n\n## Battle-tested in production\n\nZoneless powers payouts on [PromptBase](https://promptbase.com), an AI marketplace with **450,000+ users**. At the peak, PromptBase was burning **$9,400/month** in opaque Stripe Connect fees for seller payouts. After switching to Zoneless:\n\n<table>\n  <tr>\n    <td align=\"center\"><strong>~$0.002</strong><br><sub>avg. payout cost</sub></td>\n    <td align=\"center\"><strong>1,400+</strong><br><sub>payouts completed</sub></td>\n    <td align=\"center\"><strong>73%</strong><br><sub>of sellers chose Zoneless over Stripe</sub></td>\n    <td align=\"center\"><strong>2,200+</strong><br><sub>sellers onboarded</sub></td>\n  </tr>\n</table>\n\n<sub>Based on 2,500 fully-onboarded sellers given the choice of Stripe or Zoneless payouts, Dec 2025 – Apr 2026.</sub>\n\n> _\"Our payout costs dropped significantly, sellers get paid faster, and we can onboard more countries — which has helped grow the buyer side too. A big worry was that sellers would be confused and hate USDC, but they actually love it.\"_\n>\n> — **Ben Stokes**, Founder of [PromptBase](https://promptbase.com)\n\n## Why Zoneless?\n\n- **Near-zero fees** — Payouts cost ~$0.002 in SOL gas. No $2/month per account, no 0.25% + $0.25 per payout.\n- **Stripe-compatible API** — Same webhooks, events, object shapes, and SDK patterns. Migrate with minimal code changes.\n- **Truly global** — Pay anyone in 220+ countries & regions. No banking restrictions.\n- **Instant payouts** — USDC settles on Solana in seconds, 24/7/365. Not 2–7 business days.\n- **Open source** — Apache 2.0 licensed. Audit, fork, self-host. No vendor lock-in or surprise shutdowns.\n- **Self-custodial** — You hold your keys. Funds never touch a third party.\n\n## Zoneless vs Stripe Connect\n\n|                       | Zoneless                 | Stripe Connect    |\n| --------------------- | ------------------------ | ----------------- |\n| Monthly account fee   | Free                     | $2/active account |\n| Payout fee (domestic) | ~$0.002 (SOL gas)        | 0.25% + $0.25     |\n| Payout fee (intl)     | ~$0.002 (SOL gas)        | $1.50 per payout  |\n| Cross-border fee      | None                     | +0.25–1.25%       |\n| Currency conversion   | None (USDC)              | +0.50–1% FX fee   |\n| Payout speed          | Seconds                  | 2–7 business days |\n| Global coverage       | 220+ countries & regions | ~47 countries     |\n| Source code           | Open source (Apache 2.0) | Proprietary       |\n| Self-hostable         | Yes                      | No                |\n\n## Built for\n\n- **Microtransaction marketplaces** — When payouts cost fractions of a cent, small transactions finally make sense. Digital goods, templates, prompts, and more.\n- **Global creator platforms** — Pay creators worldwide without banking restrictions. No more \"sorry, we don't support your country.\"\n- **AI agent economies** — Programmatic payouts for AI agents and autonomous systems. Machine-to-machine commerce at scale.\n\n## Migrate in minutes\n\n```typescript\n// Before — Stripe Connect\n// import Stripe from 'stripe';\n// const client = new Stripe('sk_live_...');\n\n// After — Zoneless\nimport { Zoneless } from '@zoneless/node';\nconst client = new Zoneless('sk_z_...', 'api.example.com');\n\n// Same API you already know\nconst account = await client.accounts.create({\n  type: 'express',\n  country: 'US',\n  email: 'seller@example.com',\n});\n\n// Fee: $0.002 instead of $2+\nawait client.payouts.create({\n  amount: 10000,\n  currency: 'usdc',\n  destination: account.id,\n});\n```\n\n## Express Dashboard\n\nSellers get a familiar Express-style dashboard to view payouts, track earnings, and manage their account — plus guided wallet onboarding.\n\n<p align=\"center\">\n  <img src=\"https://zoneless.com/assets/images/screenshots/dashboard1.webp\" alt=\"Zoneless Express Dashboard\" width=\"700\" />\n</p>\n\n**[Try the Live Demo →](https://zoneless.com/#live-demo)**\n\n## How sellers get paid\n\n1. **Seller connects a wallet** — During onboarding, sellers connect a Solana wallet (e.g. Phantom). Takes 30 seconds with guided instructions.\n2. **You send USDC** — Trigger payouts via the API. Funds arrive in the seller's wallet in seconds, not days.\n3. **Seller spends or off-ramps** — Sellers spend USDC directly, or convert to local currency via an exchange like Coinbase.\n\nYou create and manage your own platform wallet — top it up with USDC via any exchange and you're ready to send payouts.\n\n## Quick Start\n\n```bash\ngit clone https://github.com/zonelessdev/zoneless.git\ncd zoneless\ndocker compose up -d\n```\n\nOpen [localhost/setup](http://localhost/setup) to create your platform account and API key.\n\nSee the full [Quickstart Guide](https://zoneless.com/docs/quickstart) for creating connected accounts, transfers, and payouts.\n\n## Documentation\n\nAll guides and API reference docs live at **[zoneless.com/docs](https://zoneless.com/docs)**:\n\n- [Quickstart](https://zoneless.com/docs/quickstart) — end-to-end setup in under 5 minutes\n- [Deployment](https://zoneless.com/docs/deployment) — deploy to a VPS with Docker\n- [API Reference](https://zoneless.com/docs/account-links) — Accounts, Transfers, Payouts, Webhooks, and more\n- [Migrate from Stripe](https://zoneless.com/docs/migrate-from-stripe) — step-by-step migration guide\n\n## Local Development\n\n```bash\nnpm install\ndocker compose up -d        # MongoDB\nnpx nx serve api            # API on :3333\nnpx nx serve web            # Dashboard on :4203\n```\n\nOr run everything at once:\n\n```bash\nnpm run dev\n```\n\n### Running Tests\n\n```bash\nnpx nx test api\nnpx nx test web\n```\n\n## Project Structure\n\n```\nzoneless/\n├── apps/\n│   ├── api/              # Express.js API backend\n│   └── web/              # Angular dashboard & onboarding\n├── libs/\n│   └── shared-types/     # Shared TypeScript interfaces\n├── docker-compose.yml    # Full-stack Docker setup\n└── nx.json\n```\n\n## Contributing\n\nSee [CONTRIBUTING.md](./CONTRIBUTING.md) for development setup, style guidelines, and the pull request process.\n\n## Security\n\nSee [SECURITY.md](./SECURITY.md) to report vulnerabilities.\n\n## License\n\n[Apache License 2.0](./LICENSE)\n\n---\n\nIf Zoneless is useful to you, consider giving it a star — it helps others find the project.\n","summary":"Zoneless is an open‑source, self‑hosted replacement for the payout part of Stripe Connect that lets platform operators pay sellers worldwide in USDC via the Solana blockchain, using an API identical to Stripe’s. Key features include near‑zero transaction costs (≈$0.002 per payout), instant USDC settlements in seconds, coverage of 220+ countries, and no cross‑border or exchange fees, all while keeping fund custody in the platform’s own keys. The solution is ideal for micro‑transaction marketplaces, e‑commerce platforms, and any business that needs global payouts with minimal friction and cost.","description":"Open-source Stripe Connect alternative. ~$0.002 payout fees. Identical API to Stripe. Instant global USDC payouts. Self-hosted.","stars":251,"language":"TypeScript"},{"owner":"DinobaseHQ","repo":"dinobase","url":"https://github.com/DinobaseHQ/dinobase","readme":"<div align=\"center\">\n\n<img src=\"readme-cover.png\" alt=\"Dinobase\" width=\"100%\" />\n\n# 🦕 Dinobase\n\n<strong>The data platform for agents.</strong>\n\nDinobase syncs 100+ sources — APIs, databases, files, MCP servers — annotates your data, and makes it SQL-ready for agents.\n\n[![PyPI - Version](https://img.shields.io/pypi/v/dinobase.svg)](https://pypi.org/project/dinobase)\n[![License](https://img.shields.io/badge/license-MIT%20Expat-blue.svg)](LICENSE)\n[![Slack](https://img.shields.io/badge/slack-join%20community-4A154B?logo=slack&logoColor=white)](https://join.slack.com/t/dinobasecommunity/shared_invite/zt-3vd5zvlle-Ys24UiLvbGSg9sxbGMltJA)\n\n[Docs](https://dinobase.ai) · [Getting Started](https://dinobase.ai/docs/getting-started/) · [Connectors](https://dinobase.ai/docs/connectors/overview/) · [Slack Community](https://join.slack.com/t/dinobasecommunity/shared_invite/zt-3vd5zvlle-Ys24UiLvbGSg9sxbGMltJA)\n\n</div>\n\n---\n\n⭐️ star this repo! Thank you for your support!\n\n---\n\n**Your agents are flying blind.** Agent stacks built on per-connector tool calls have a structural gap: agents can't `JOIN` across APIs, have no semantic context to interpret field values, and receive paginated JSON that fills context windows. Take the question *\"Which customers churned last quarter with declining usage AND open support tickets?\"* — it spans three connectors and agents built on tool calls can't answer it reliably. This isn't a model problem. It's an architecture problem.\n\nDinobase is the data platform that fills it. Plug in every source: each connector (SaaS APIs, databases, files, MCP servers) becomes a schema. Agents write one SQL query across all connectors, write data back via SQL mutations with a preview/confirm flow, and get back a single result set. In [benchmarks across 11 LLMs](benchmarks/): **91% accuracy vs 35%, 3x faster, 16-22x cheaper per correct answer.**\n\n---\n\n## Quick start\n\n```bash\n# recommended — installs everything automatically\ncurl -fsSL https://dinobase.ai/install.sh | bash\n\n# or with uv\nuv tool install dinobase\n\n# or with pip\npip install dinobase\n\n# or with pipx\npipx install dinobase\n```\n\n### 1. Connect your data\n\n```bash\ndinobase add stripe --api-key sk_test_...\ndinobase add hubspot --api-key pat-...\ndinobase add linear --api-key lin_api_...\ndinobase sync\n\n# Or parquet files (no sync needed)\ndinobase add parquet --path ./data/events/ --name analytics\n\n# Or databases\ndinobase add postgres --connection-string postgresql://...\n\n# Or any MCP server — auto-discovers read-only tools and syncs them as SQL tables\ndinobase connector create posthog_mcp --transport stdio \\\n  --command \"npx -y @posthog/mcp-server\"\ndinobase sync posthog_mcp\ndinobase query \"SELECT * FROM posthog_mcp.list_projects LIMIT 10\"\n```\n\n### 2. Pick your agent interface\n\n**One-liner** — installs Dinobase and configures your agent in one step:\n\n```bash\ncurl -fsSL https://dinobase.ai/install.sh | bash -s -- claude-code\ncurl -fsSL https://dinobase.ai/install.sh | bash -s -- claude-desktop\ncurl -fsSL https://dinobase.ai/install.sh | bash -s -- cursor\ncurl -fsSL https://dinobase.ai/install.sh | bash -s -- codex\n```\n\n**Already have Dinobase?** Run the install subcommand directly:\n\n<table>\n<tr>\n<td valign=\"top\" width=\"50%\">\n\n**CLI** — for Claude Code, Cursor, Codex, Aider, any agent that runs shell\n\n```bash\ndinobase install claude-code   # Claude Code (~/.claude/CLAUDE.md)\ndinobase install cursor        # Cursor (./AGENTS.md)\ndinobase install codex         # Codex (~/.codex/AGENTS.md)\n```\n\nWrites usage instructions to the tool's instructions file. Agents run `dinobase info`, `dinobase describe`, and `dinobase query` directly.\n\n</td>\n<td valign=\"top\" width=\"50%\">\n\n**MCP server** — for Claude Desktop, any MCP client\n\n```bash\ndinobase install claude-desktop   # Claude Desktop (writes config automatically)\ndinobase serve                    # any other MCP client\n```\n\n`dinobase serve` starts the MCP server on stdio. Run `dinobase mcp-config <client>` to get the JSON snippet to paste into your client's config.\n\n</td>\n</tr>\n</table>\n\n### 3. Ask your agent a cross-connector question\n\n> \"Which companies have closed-won deals over $100K but their subscription is past due?\"\n\nThe agent writes the SQL, Dinobase executes it across your connectors, and the answer comes back in seconds.\n\n### 4. Write data back (reverse ETL)\n\nAgents can also mutate upstream data via SQL. Every mutation goes through a preview/confirm flow — nothing executes until confirmed.\n\n```bash\ndinobase query \"UPDATE stripe.customers SET name = 'Acme Inc' WHERE id = 'cus_123'\"\n# Returns a preview: 1 row affected, will call Stripe API\n\ndinobase confirm <mutation_id>\n# ✓ Stripe API called (1/1 succeeded)\n# ✓ Data updated\n```\n\n### 5. Use MCP servers as connectors — and call their tools directly\n\nConnect any MCP server as a connector. Dinobase auto-discovers read-only tools and syncs them as SQL tables. Query with SQL for reads, call tools directly for writes or parameterized operations:\n\n```bash\n# Connect a server\ndinobase connector create posthog_mcp --transport stdio \\\n  --command \"npx -y @posthog/mcp-server\"\ndinobase sync posthog_mcp\n\n# Query synced data as SQL\ndinobase query \"SELECT name, active FROM posthog_mcp.list_feature_flags\"\n\n# Browse and call tools directly\ndinobase mcp servers --pretty\ndinobase mcp search \"dashboard\"\ndinobase mcp call posthog_mcp.dashboard-get '{\"id\": 1118504}'\n```\n\nOr call tools from Python:\n\n```python\nfrom dinobase.mcp import call, search, servers\n\nresult = call(\"posthog_mcp.dashboard-get\", id=1118504)\nmatches = search(\"feature flag\")\n```\n\nAgents can also run Python code via the `exec_code` MCP tool — chain multiple tool calls, reshape data, or do anything that plain SQL can't:\n\n```python\n# exec_code: chain tool calls and build dynamic queries\nfrom dinobase.mcp import call, search, servers\n\n# discover available tools\nflags = call(\"posthog_mcp.list-feature-flags\")\n\n# chain calls with logic\nfor flag in flags:\n    if not flag[\"active\"]:\n        call(\"posthog_mcp.update-feature-flag\", id=flag[\"id\"], active=True)\n\nresult = {\"reactivated\": len([f for f in flags if not f[\"active\"]])}\n```\n\n`exec_code` has full access to `dinobase.mcp` (call, search, servers, tools, instructions) and `dinobase.db` for direct database access. Assign your return value to `result`. See [exec_code docs](https://dinobase.ai/docs/guides/exec-code/).\n\n### 6. (Optional) Enable the semantic layer\n\n```bash\nexport ANTHROPIC_API_KEY=sk-ant-...\n```\n\nAfter every sync, Dinobase automatically runs a Claude agent in the background to annotate your data — table descriptions, column docs, PII flags, and relationship graphs. Agents can then `describe` any table and get full semantic context.\n\n```bash\ndinobase describe stripe.subscriptions --pretty\n# stripe.subscriptions (1,420 rows)\n# Description: Active and historical customer subscriptions\n#\n#   customer_id  VARCHAR  -- References customers.id\n#   status       VARCHAR  -- Values: active, past_due, canceled, trialing\n#   ...\n# Related tables:\n#   stripe.customers  (customer_id → id, many_to_one)\n```\n\nSet `DINOBASE_AUTO_ANNOTATE=false` to disable. See [Semantic Layer docs](https://dinobase.ai/docs/guides/annotations/).\n\n---\n\n## Benchmark\n\nWe tested Dinobase SQL against per-connector MCP tools across 11 LLMs on 75 questions (same models, same data, same questions):\n\n| Metric | Dinobase (SQL) | Per-Connector MCP |\n|--------|---------------|---------------|\n| **Accuracy** | **91%** | 35% |\n| **Avg latency** | **34s** | 106s |\n| **Cost per correct answer** | **$0.027** | $0.445 |\n\n**56pp more accurate, 3x faster, 16-22x cheaper per correct answer — across every model tested.**\n\nSee [`benchmarks/`](benchmarks/) for full results, per-model breakdown, and methodology.\n\n---\n\n## Connectors\n\n101 connectors across every category. Run `dinobase sources --available --pretty` to list all.\n\n| Category | Connectors |\n|----------|---------|\n| **CRM & Sales** | Salesforce, HubSpot, Pipedrive, Attio, Close, Copper |\n| **Billing & Payments** | Stripe, Paddle, Chargebee, Recurly, Lemon Squeezy |\n| **Support & Success** | Zendesk, Intercom, Freshdesk, HelpScout, Customer.io, Vitally, Gainsight |\n| **Developer Tools** | GitHub, GitLab, Jira, Bitbucket, Sentry, Linear |\n| **Communication** | Slack, Discord, Twilio, SendGrid, Mailchimp, Front |\n| **E-commerce** | Shopify, WooCommerce, BigCommerce, Square |\n| **Marketing & Analytics** | Google Analytics, Google Ads, Facebook Ads, HubSpot Marketing, Mixpanel, PostHog, Segment, Plausible, Matomo, Bing Webmaster |\n| **HR & Recruiting** | Personio, BambooHR, Greenhouse, Lever, Workable, Gusto, Deel |\n| **Project Management** | Asana, ClickUp, Monday, Trello, Todoist |\n| **Databases** | Postgres, MySQL, MariaDB, SQL Server, Oracle, SQLite, Snowflake, BigQuery, Redshift, ClickHouse, CockroachDB, Databricks, Trino, Presto, DuckDB, MongoDB |\n| **Streaming** | Kafka, Kinesis |\n| **Cloud Storage** | S3, GCS, Azure Blob, SFTP |\n| **Finance** | QuickBooks, Xero, Brex, Mercury |\n| **Productivity** | Notion, Airtable, Google Sheets |\n| **Infrastructure** | Datadog, New Relic, PagerDuty, OpsGenie, Statuspage, Cloudflare, Vercel, Netlify |\n| **Content & CMS** | Strapi, Contentful, Sanity, WordPress |\n| **Design & Video** | Figma, Mux |\n| **Files** | Parquet, CSV (local or S3 — read at query time, no sync needed) |\n| **MCP servers** | Any MCP server (stdio, SSE, HTTP) — auto-discovers read-only tools, syncs as SQL tables |\n\n---\n\n## How it works\n\n```\n                Agent (Claude, GPT, etc.)\n                          |\n                +---------+---------+\n                |                   |\n           MCP Server             CLI\n           (tool calls)       (bash commands)\n                |                   |\n                +---------+---------+\n                          |\n                    Query Engine\n                    (DuckDB SQL)\n                          |\n             +------------+------------+\n             |            |            |\n        crm.*      billing.*    analytics.*\n       (synced)     (synced)    (parquet views)\n```\n\nEach connector becomes a schema. Cross-connector joins work via shared columns like email. Data stays in parquet — DuckDB is the query engine and metadata store.\n\nAPI connectors sync to parquet in `~/.dinobase/data/` (or cloud storage). File connectors are read directly via DuckDB views — nothing is copied.\n\n### Cloud storage\n\nStore data in S3, GCS, or Azure instead of local disk:\n\n```bash\ndinobase init --storage s3://my-bucket/dinobase/\n# or\nexport DINOBASE_STORAGE_URL=s3://my-bucket/dinobase/\n```\n\nSupports Amazon S3, Google Cloud Storage, Azure Blob Storage, and S3-compatible services (MinIO, R2). See [Cloud Storage docs](https://dinobase.ai/docs/guides/cloud-storage-backend/).\n\n---\n\n## Integrations\n\nWorks with every major agent framework:\n[CrewAI](https://dinobase.ai/docs/integrations/crewai/) · [LangChain / LangGraph](https://dinobase.ai/docs/integrations/langchain/) · [LlamaIndex](https://dinobase.ai/docs/integrations/llamaindex/) · [Pydantic AI](https://dinobase.ai/docs/integrations/pydantic-ai/) · [Vercel AI SDK](https://dinobase.ai/docs/integrations/vercel-ai/) · [Mastra](https://dinobase.ai/docs/integrations/mastra/) · [OpenClaw](https://dinobase.ai/docs/integrations/openclaw/)\n\n---\n\n## Documentation\n\n- **[Getting Started](https://dinobase.ai/docs/getting-started/)** — Install, connect, and query in 5 minutes\n- **[Connectors](https://dinobase.ai/docs/guides/connecting-sources/)** — Credentials, naming, sync intervals\n- **[Querying Data](https://dinobase.ai/docs/guides/querying/)** — Cross-connector joins, aggregations, DuckDB SQL\n- **[Reverse ETL (Mutations)](https://dinobase.ai/docs/guides/mutations/)** — Write data back to upstream APIs\n- **[MCP Integration](https://dinobase.ai/docs/guides/mcp/)** — Agent setup for Claude Desktop, Cursor\n- **[Cloud Storage Backend](https://dinobase.ai/docs/guides/cloud-storage-backend/)** — Store data in S3, GCS, or Azure\n- **[Schema Annotations](https://dinobase.ai/docs/guides/annotations/)** — How agents understand the data\n- **[CLI Reference](https://dinobase.ai/docs/reference/cli/)** — All commands and flags\n- **[Architecture](https://dinobase.ai/docs/project/architecture/)** — DuckDB, dlt, MCP, module structure\n\n---\n\n## Community\n\nQuestions, feedback, or want to share what you're building? Come hang out:\n\n- **[Join our Slack](https://join.slack.com/t/dinobasecommunity/shared_invite/zt-3vd5zvlle-Ys24UiLvbGSg9sxbGMltJA)** — chat with the team and other users\n- **[Report an issue](https://github.com/DinobaseHQ/dinobase/issues)** — bugs and feature requests\n\n---\n\n## Development\n\n```bash\ngit clone https://github.com/DinobaseHQ/dinobase\npip install -e \".[dev]\"\npytest\n```\n\n---\n\n## License\n\nMIT Expat\n","summary":"Dinobase is a data platform that unifies over 100 data sources—including APIs, databases, files, and MCP servers—into a single SQL‑ready schema that agents can query. It automatically syncs connectors, annotates data for semantic context, and lets agents execute cross‑connector SQL queries, write back results, and receive consolidated responses, dramatically improving accuracy and speed over traditional tool‑call approaches. Built for developers and data scientists working with LLM agents, it streamlines data integration, query execution, and workflow automation, enabling complex, multi‑source analysis without custom connectors or manual data blending.","description":"The agent-first data platform","stars":221,"language":"Python"},{"owner":"glassflow","repo":"clickhouse-etl","url":"https://github.com/glassflow/clickhouse-etl","readme":"<p align=\"center\">\n  <img src=\"docs/public/assets/Readme Banner.png\" alt=\"GlassFlow Banner\" />\n</p>\n<p align=\"center\">\n      <a href=\"https://docs.glassflow.dev\"><strong>Docs</strong></a> ·     \n      <a href=\"https://github.com/glassflow/clickhouse-etl/issues\"><strong>Report Bug</strong></a> ·\n      <a href=\"https://glassflow.dev/roadmap\"><strong>Roadmap</strong></a> ·\n      <a href=\"https://github.com/orgs/glassflow/discussions/categories/support\"><strong>Get Help</strong></a> ·\n      <a href=\"https://docs.glassflow.dev/getting-started#demo-video\"><strong>Watch Demo</strong></a> ·\n      <a href=\"https://docs.glassflow.dev/free-swag\"><strong>Free Swag</strong></a>\n</p>\n\n<div align=\"center\">\n\n[![Join Next Office Hour](https://img.shields.io/badge/Join%20Next%20Office%20Hour-Schedule%20Now-blue?logo=calendar)](https://www.glassflow.dev/office-hours)\n[![Email Support](https://img.shields.io/badge/Email%20Support-help%40glassflow.dev-blue?logo=gmail)](mailto:help@glassflow.dev)\n<br>\n[![Slack](https://img.shields.io/badge/Join%20Slack-GlassFlow%20Hub-blueviolet?logo=slack)](https://join.slack.com/t/glassflowhub/shared_invite/zt-349m7lenp-IFeKSGfQwpJfIiQ7oyFFKg)\n[![Twitter](https://img.shields.io/twitter/url/https/twitter.com/glassflowdev.svg?style=social&label=Follow%20%40GlassFlow)](https://twitter.com/glassflowdev)\n</div>\n<div align=\"center\">\n  <a href=\"https://github.com/glassflow/clickhouse-etl/releases\">\n    <img alt=\"Latest Release\" src=\"https://img.shields.io/github/v/release/glassflow/clickhouse-etl?label=Latest%20Version\">\n  </a>\n</div>\n\n# Run any transformation on Kafka data at TB scale for ClickHouse\n\nGlassFlow is an open-source stream processing engine designed for high-volume data ingestion and transformation from Kafka to ClickHouse. GlassFlow comes with the following core functionalities:\n\n- **Stateless transformations**: Powered by the expr expression engine, enabling flexible data transformations using helper functions and standard operators (e.g., removing null values or replacing missing timestamps).\n- **Stateful transformations**: A built-in state store allows deduplication logic and temporal joins over configurable time windows.\n- **Filtering**: Drop events you don’t want to ingest into ClickHouse before they reach your tables.\n- **Ingest only**: Direct data transfer from Kafka to ClickHouse without transformations.\n- **Metrics & OTEL**: Built-in pipeline metrics with OpenTelemetry support.\n- **Dead-Letter-Queue**: Keep pipelines running when faulty events occur. Inspect failed events and reprocess them later.\n\n## ⚡️ Quick Start\n\nTo get started with GlassFlow, you can:\n\n1. **Try the Live Demo**: Experience GlassFlow running on a live cluster at [demo.glassflow.dev](https://demo.glassflow.dev)\n2. **Install on Kubernetes**: Follow our [Kubernetes Installation Guide](https://docs.glassflow.dev/installation/kubernetes) for production deployment\n3. **Learn More**: Explore our [Usage Guide](https://docs.glassflow.dev/usage-guide) to start creating pipelines\n\n\n## 🧭 Installation Options\n\nGlassFlow is open source and can be self-hosted on Kubernetes. GlassFlow works with any managed Kubernetes services like AWS EKS, GKE, AKS, and more.\n\n| Method                         | Use Case                                | Docs Link                                                                 |\n|-------------------------------|------------------------------------------|---------------------------------------------------------------------------|\n| ☸️ **Kubernetes with Helm**         | Production and development deployment    | [Kubernetes Helm Guide](https://docs.glassflow.dev/installation/kubernetes) |\n\n\n## 🎥 Demo\n\n### Live Preview\nLog in and see a working demo of GlassFlow running on a GPC cluster at [demo.glassflow.dev](https://demo.glassflow.dev). You will see a Grafana dashboard and the setup that we used.\n\n### Demo Video\n\n[![GlassFlow Overview Video](https://raw.githubusercontent.com/glassflow/clickhouse-etl/main/docs/public/assets/video-banner.png)](https://docs.glassflow.dev/getting-started#demo-video)\n\n\n## 📚 Documentation\n\nFor detailed documentation, visit [docs.glassflow.dev](https://docs.glassflow.dev). The documentation includes:\n\n- [Installation Guide](https://docs.glassflow.dev/installation)\n- [Usage Guide](https://docs.glassflow.dev/usage-guide)\n- [Pipeline JSON Reference](https://docs.glassflow.dev/configuration/pipeline-json-reference)\n- [Live Preview](https://docs.glassflow.dev/getting-started/live-preview)\n- [Architecture](https://docs.glassflow.dev/architecture)\n\n## 🗺️ Roadmap\n\nCheck out our [public roadmap](https://glassflow.dev/roadmap) to see what's coming next in GlassFlow. We're actively working on new features and improvements based on community feedback.\n\n**Want to suggest a feature?** We'd love to hear from you! Please use our [GitHub Discussions](https://github.com/orgs/glassflow/discussions/categories/ideas) to share your ideas and help shape the future of GlassFlow.\n\n## 🆘 Support\n\n- [Documentation](https://docs.glassflow.dev)\n- [GitHub Issues](https://github.com/glassflow/clickhouse-etl/issues)\n- [Slack Community](https://join.slack.com/t/glassflowhub/shared_invite/zt-349m7lenp-IFeKSGfQwpJfIiQ7oyFFKg)\n- [Email Support](mailto:help@glassflow.dev)\n\n## ⚖️ License\n\nThis project is licensed under the [Apache License 2.0](LICENSE).\n","summary":"GlassFlow is an open‑source stream‑processing engine that ingests high‑volume Kafka data and writes it to ClickHouse, supporting Transformations, Filtering, and dead‑letter queueing at terabyte scale. It offers both stateless expression‑based transforms and stateful operations such as deduplication and time‑windowed joins, along with native metrics, OpenTelemetry integration, and an ingest‑only path for simple data transfer. The platform is tailored for data and analytics engineers who build production pipelines on Kubernetes, enabling them to deploy scalable, fault‑tolerant workflows that feed ClickHouse with clean, transformed streaming data.","description":"GlassFlow OSS: Purpose-built for running any terabyte-scale transformations in Kafka-to-ClickHouse pipelines","stars":457,"language":"TypeScript"},{"owner":"skrun-dev","repo":"skrun","url":"https://github.com/skrun-dev/skrun","readme":"<p align=\"center\">\n  <img src=\"assets/banner.svg\" alt=\"Skrun — Deploy any Agent Skill as an API\" width=\"600\">\n</p>\n\n<h1 align=\"center\">Skrun</h1>\n\n<p align=\"center\">\n  <b>Deploy any Agent Skill as an API via <code>POST /run</code>.</b><br>\n  The open-source, multi-model agent runtime — works with any LLM.\n</p>\n\n<p align=\"center\">\n  <i>Self-hostable alternative to Claude Managed Agents, Microsoft Foundry Agent Service, and Mistral + Koyeb.</i>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/skrun-dev/skrun/actions\"><img alt=\"CI\" src=\"https://img.shields.io/github/actions/workflow/status/skrun-dev/skrun/ci.yml?branch=main&style=for-the-badge&logo=github&label=CI\"></a>\n  <a href=\"https://www.npmjs.com/package/@skrun-dev/cli\"><img alt=\"npm CLI\" src=\"https://img.shields.io/npm/v/@skrun-dev/cli?style=for-the-badge&logo=npm&label=CLI&color=CB3837\"></a>\n  <a href=\"https://www.npmjs.com/package/@skrun-dev/sdk\"><img alt=\"npm SDK\" src=\"https://img.shields.io/npm/v/@skrun-dev/sdk?style=for-the-badge&logo=npm&label=SDK&color=CB3837\"></a>\n  <a href=\"https://github.com/skrun-dev/skrun/stargazers\"><img alt=\"GitHub stars\" src=\"https://img.shields.io/github/stars/skrun-dev/skrun?style=for-the-badge&logo=github&color=FFD700\"></a>\n  <a href=\"LICENSE\"><img alt=\"License\" src=\"https://img.shields.io/badge/License-MIT-blue?style=for-the-badge\"></a>\n</p>\n\n<p align=\"center\">\n  <img alt=\"Node\" src=\"https://img.shields.io/badge/Node-%E2%89%A518-339933?style=for-the-badge&logo=node.js&logoColor=white\">\n  <img alt=\"TypeScript\" src=\"https://img.shields.io/badge/TypeScript-strict-3178C6?style=for-the-badge&logo=typescript&logoColor=white\">\n  <img alt=\"MCP\" src=\"https://img.shields.io/badge/MCP-compatible-8B5CF6?style=for-the-badge\">\n</p>\n\n<p align=\"center\">\n  <a href=\"#-quick-start\">Quick Start</a> ·\n  <a href=\"#-sdk\">SDK</a> ·\n  <a href=\"#-features\">Features</a> ·\n  <a href=\"docs/api.md\">API Reference</a> ·\n  <a href=\"#-demo-agents\">Examples</a> ·\n  <a href=\"CONTRIBUTING.md\">Contributing</a>\n</p>\n\n---\n\n## 🎯 Why Skrun?\n\nEvery major LLM provider is building their own agent runtime — locked to their models. Skrun is the **open alternative**: same agent, any LLM, your infrastructure, zero lock-in.\n\n| | Skrun | Vendor runtimes (Claude Managed Agents, Foundry, Koyeb) |\n|--|-------|-----------------|\n| **Models** | Anthropic, OpenAI, Google, Mistral, Groq, DeepSeek, Kimi, Qwen + any OpenAI-compatible endpoint | One provider only |\n| **Deployment** | Self-hosted or cloud (coming soon) | Vendor cloud only |\n| **Format** | [Agent Skills](https://agentskills.io) (SKILL.md) — works with Claude Code, Copilot, Codex | Proprietary |\n| **Streaming** | SSE + async webhooks | Varies |\n| **Open source** | MIT | No |\n| **Caller-pays LLM** | Users bring their own keys — zero cost for operators | Vendor bills you |\n\n---\n\n## 🚀 Quick Start\n\n```bash\nnpm install -g @skrun-dev/cli\n\nskrun init --from-skill ./my-skill    # import an existing skill\nskrun deploy                           # build + push + get your API endpoint\n```\n\nThat's it. Your agent is now callable via `POST /run`:\n\n```bash\ncurl -X POST http://localhost:4000/api/agents/dev/my-skill/run \\\n  -H \"Authorization: Bearer dev-token\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"input\": {\"query\": \"analyze this\"}}'\n```\n\n---\n\n## ✨ Features\n\n| Feature | Description |\n|---------|-------------|\n| 🤖 **Multi-model** | 5 built-in providers + any OpenAI-compatible endpoint (DeepSeek, Kimi, Qwen, Ollama, vLLM...) — with automatic fallback |\n| 📡 **Streaming** | SSE real-time events (`ru
