hind every cost-loss and active-time-reset story. Only true ephemeral caches (resolved terminal width, `.tmp` rename staging) belong in tmpdir. Existing tmpdir files are migrated automatically on the first render after upgrade.\n\n**Per-feature state isolation (cost-loss fix).** Active session time lives in its own state file (`active-<sid>.json`), independent from the cum file (`cum-<sid>.json`) that tracks cost / lines / tokens. The cum file is **owned exclusively by `statusline.js`** — no hook ever writes to it. This invariant matters because earlier versions had hooks that wrote partial cum files (containing only their own fields), which made the next statusline render's fallback path reset accumulated `cost.total` to 0. Splitting state per writer eliminates the failure mode entirely; the cum read path was also hardened so a missing field never resets `total`.\n\n**Width is user-set, not auto-detected.** Width auto-detection inside the statusline hook is essentially impossible: stdio is a pipe so `process.stdout.columns` is undefined, `$COLUMNS` is unset, `tput cols` returns 80, PowerShell-spawned subprocesses report their own hidden-window width, and `/dev/tty` is not accessible. The upstream request to expose the actual width was [closed as not planned](https://github.com/anthropics/claude-code/issues/5430). The statusline does try the cheap signals (`process.stdout.columns`, `$COLUMNS`) on the off-chance Anthropic ever fixes the contract, but otherwise falls back to a conservative `120`-column box. **Set `statuslineWidth` in `~/.claude/cc-statusline-rows.json` to your terminal's actual column count** (run `tput cols` in a normal shell to measure). `statuslineWidthOffset` (default 4) reserves a few columns on the right for Claude Code's own padding.\n\n**Three-layer durability for cum files.** On top of the persistent location, every cum write now goes through a stability pipeline: (1) **monotonic invariant** — read the on-disk file right before write and never let in-memory `cost.total` (or `add` / `rm` / `tok`) drop below the stored value, since these accumulators are monotonic by definition; (2) **single-step backup** — the previous content is atomically copied to `cum-<sid>.bak.json` before each write, so a corrupted file can be hand-recovered; (3) **audit log** — significant cost changes (≥ \\$0.01) append one JSON line each to `~/.claude/cc-statusline/audit.log` with timestamp, sid, before / after / delta. The log rotates to `audit.log.1` at ~1 MB.\n\n**Cross-session quota aggregation.** Quotas are global across all your Claude Code sessions, but each session's payload only reflects its own cached observation. The statusline writes a snapshot to `~/.claude/rate-limit-snapshots.json` on every render and aggregates across sessions: it picks the snapshot with the latest live `resets_at` (most recent API observation) and shows MAX `used_percentage` from that group. All sessions converge on the same displayed %.\n\n**All-time cost + tokens by default, rolling-window optional.** The `cost $TOTAL (all time) · $SESSION (this session)` and `tokens TOTAL (SESSION this session)` figures aggregate across `cum-*.json` files in `~/.claude/cc-statusline/` filtered to the canonical 24-hex session-id shape (so stray test fixtures can't poison the number). Set `aggWindowDays` in `~/.claude/cc-statusline-rows.json` to `7` / `30` / `90` etc. for a rolling view; the previous 30-day default existed only to mirror tmpdir's eviction interval and is no longer needed now that state lives outside tmpdir.\n\n**Time-based rate-limit rollover.** Claude Code's `rate_limits.*.resets_at` is frozen at the moment of the last API response. If the user leaves the session idle past a reset boundary, the payload says \"87% used\" even though the window has rolled over to 0%. The statusline checks `resets_at` against real time — past expiry, it auto-zeros the bar and computes the countdown against the next rolling 5h/7d boundary.\n\n**Auto session rename for `/resume` picker.** Claude Code's transcript JSONL supports a `{\"type\":\"custom-title\",\"customTitle\":\"...\"}` entry that drives the `/resume` picker's display name. `summary-updater.js` injects the current summary (first 40 chars) as a custom-title entry every time it writes, so each session gets a meaningful name instead of a UUID — no more guessing which hash is which.\n\n**Whole-session summary with compression.** The summary is meant to capture the entire session arc, not the latest topic. The summary-updater prompt enforces a 120-char cap with explicit compression rules (merge related sub-topics, drop the least-significant older item) so new topics displace less-significant old ones rather than the most-recent work being truncated.\n\n## Customize which rows you see\n\nDon't want every row? Use the `/cc-statusline:rows` slash command (shipped with the plugin; saves to `~/.claude/cc-statusline-rows.json`):\n\n```\n/cc-statusline:rows                      — show current state\n/cc-statusline:rows off                  — master switch: hide statusline entirely\n/cc-statusline:rows on                   — master switch: re-enable\n/cc-statusline:rows hide agents edited   — turn listed rows off\n/cc-statusline:rows show agents          — turn listed rows on\n/cc-statusline:rows only cost quota      — enable listed, disable rest\n/cc-statusline:rows toggle history       — flip listed rows\n/cc-statusline:rows reset                — all on\n```\n\n12 row keys: `summary`, `dir`, `repo`, `model`, `duration`, `cost`, `usage`, `quota`, `agents`, `memory_mcp`, `edited`, `history`.\n\nThe same config file also accepts `\"summaryInterval\": N` to change how often the session summary is rewritten (default every `10` user messages). Set `5` for denser updates, `20` for quieter ones.\n\nThe layout auto-collapses when cells go empty — hide an entire column and the split layout merges into full-width rows; hide the whole split block and the top border fuses with the next section (no redundant horizontal lines).\n\n## Without hooks\n\nThe statusline works without the hooks — you just won't see agents, edited files, message history, compact count, or session summary. Quotas, cost, model, git, tokens, memory, and MCP all work from the built-in statusline JSON payload + the auto-spawned MCP refresher.\n\n## Known limitations\n\n- Claude Code does not pass terminal width to statusline commands ([issue #22115](https://github.com/anthropics/claude-code/issues/22115)). On Windows, the script uses PowerShell as a fallback to detect width. The right border may not perfectly align with the terminal edge until this is fixed upstream.\n- MCP server state shown by the statusline comes from `claude mcp list` (a fresh probe at refresh time). Claude Code's `/mcp` UI shows the running session's cached state. The two can disagree if a server's connection has changed since the session started — the statusline reflects the latest probe, the UI reflects the session's view.\n- `claude mcp list` does not expose all built-in bridges (e.g. `claude-in-chrome`), so the statusline's MCP count can be lower than what `/mcp` shows.\n- Claude Code does not currently expose live MCP state in the statusline JSON payload ([issue #5511](https://github.com/anthropics/claude-code/issues/5511)) — once it does, the auto-spawned refresher won't be needed.\n\n## License\n\nMIT\n","summary":"cc‑statusline is a plugin for Claude Code that inserts a real‑time status line in the terminal, giving an at‑a‑glance dashboard of the current session. It displays a concise, auto‑generated session summary, the working directory and branch, cost and token usage, model performance tiers, session duration, and the status of any subagents and MCP servers, all refreshed automatically without any slash commands. The tool is aimed at Claude Code users and developers who want instant visibility into usage metrics, billing, and project context while working, making it especially useful for teams that need to monitor AI resource consumption and workflow progress.","description":"A comprehensive statusline dashboard for Claude Code — session info, quota bars, agent tracker, MCP health, message history, and more.","stars":220,"language":"JavaScript"},{"owner":"Eronred","repo":"expo-agent-spinners","url":"https://github.com/Eronred/expo-agent-spinners","readme":"# expo-agent-spinners\n\n54 terminal-style agent-like spinners for React Native & Expo. Lightweight, zero native dependencies — just `Text` and `setInterval`. No heavy UI threads\n<img width=\"1152\" height=\"648\" alt=\"expo-agent-spinners\" src=\"https://github.com/user-attachments/assets/bb1ff42b-a3aa-4283-997d-b815b3080233\" />\n\nInspiration from https://github.com/vyfor/rattles\n\n## Preview\n\nBraille, ASCII, arrow, and emoji spinners all in one place, ready to drop into any loading state, AI agent stream, or CLI-style UI.\n\n## Installation\n\nYou can copy any spinner you need from the `src/components/spinners` directory for use in your project.\n\n## Usage\n\nImport the component you need:\n\n```tsx\nimport { DotsSpinner } from \"./src/components/spinners/dots\";\n\nexport default function Loading() {\n  return <DotsSpinner size={24} color=\"#fff\" style={{ width: 40, height: 40 }} />;\n}\n```\n\n### Container sizing\n\nSpinners render Unicode characters whose pixel width depends on font rendering. To prevent layout overflow or shifting, **always wrap spinners in a fixed-size container**:\n\n```tsx\n// ✅ Recommended — fixed container keeps layout stable\n<View style={{ width: 40, height: 40, alignItems: \"center\", justifyContent: \"center\" }}>\n  <DotsSpinner size={24} color=\"#fff\" />\n</View>\n\n// ✅ Also works — pass style directly to the spinner\n<DotsSpinner\n  size={24}\n  color=\"#fff\"\n  style={{ width: 40, height: 40 }}\n/>\n\n// ⚠️ Multi-character spinners (dots12, wave, scan, etc.) are wider —\n//    use a wider fixed container to avoid clipping\n<View style={{ width: 64, height: 40, alignItems: \"center\", justifyContent: \"center\" }}>\n  <Dots12Spinner size={20} color=\"#fff\" />\n</View>\n```\n\n**Suggested container sizes by character count:**\n\n| Spinner type | Characters | Recommended `width` |\n|---|---|---|\n| Single char (`dots`, `moon`, `arc`…) | 1 | `40` |\n| Two chars (`dots12`, `wave`, `scan`…) | 2 | `64` |\n| Three+ chars (`point`, `columns`…) | 3–4 | `80–96` |\n\n### Props\n\nAll spinners share the same interface:\n\n| Prop | Type | Default | Description |\n|------|------|---------|-------------|\n| `size` | `number` | `24` | Font size of the spinner character |\n| `color` | `string` | `\"#fff\"` | Color of the spinner |\n| `style` | `StyleProp<ViewStyle>` | — | Style for the outer container |\n\n## Available Spinners\n\n### Braille (32)\n\n| Name | Import |\n|------|--------|\n| dots | `DotsSpinner` |\n| dots2 | `Dots2Spinner` |\n| dots3 | `Dots3Spinner` |\n| dots4 | `Dots4Spinner` |\n| dots5 | `Dots5Spinner` |\n| dots6 | `Dots6Spinner` |\n| dots7 | `Dots7Spinner` |\n| dots8 | `Dots8Spinner` |\n| dots9 | `Dots9Spinner` |\n| dots10 | `Dots10Spinner` |\n| dots11 | `Dots11Spinner` |\n| dots12 | `Dots12Spinner` |\n| dots13 | `Dots13Spinner` |\n| dots14 | `Dots14Spinner` |\n| sand | `SandSpinner` |\n| bounce | `BounceSpinner` |\n| dots_circle | `DotsCircleSpinner` |\n| wave | `WaveSpinner` |\n| scan | `ScanSpinner` |\n| rain | `RainSpinner` |\n| pulse | `PulseSpinner` |\n| snake | `SnakeSpinner` |\n| sparkle | `SparkleSpinner` |\n| cascade | `CascadeSpinner` |\n| columns | `ColumnsSpinner` |\n| orbit | `OrbitSpinner` |\n| breathe | `BreatheSpinner` |\n| waverows | `WaveRowsSpinner` |\n| checkerboard | `CheckerboardSpinner` |\n| helix | `HelixSpinner` |\n| fillsweep | `FillSweepSpinner` |\n| diagswipe | `DiagSwipeSpinner` |\n\n### ASCII (15)\n\n| Name | Import |\n|------|--------|\n| dqpb | `DqpbSpinner` |\n| rolling_line | `RollingLineSpinner` |\n| simple_dots | `SimpleDotsSpinner` |\n| simple_dots_scrolling | `SimpleDotsScrollingSpinner` |\n| arc | `ArcSpinner` |\n| balloon | `BalloonSpinner` |\n| circle_halves | `CircleHalvesSpinner` |\n| circle_quarters | `CircleQuartersSpinner` |\n| point | `PointSpinner` |\n| square_corners | `SquareCornersSpinner` |\n| toggle | `ToggleSpinner` |\n| triangle | `TriangleSpinner` |\n| grow_horizontal | `GrowHorizontalSpinner` |\n| grow_vertical | `GrowVerticalSpinner` |\n| noise | `NoiseSpinner` |\n\n### Arrows (2)\n\n| Name | Import |\n|------|--------|\n| arrow | `ArrowSpinner` |\n| double_arrow | `DoubleArrowSpinner` |\n\n### Emoji (6)\n\n| Name | Import |\n|------|--------|\n| hearts | `HeartsSpinner` |\n| clock | `ClockSpinner` |\n| earth | `EarthSpinner` |\n| moon | `MoonSpinner` |\n| speaker | `SpeakerSpinner` |\n| weather | `WeatherSpinner` |\n\n## Examples\n\n```tsx\n// Braille — classic terminal feel\n<DotsSpinner size={20} color=\"#6366f1\" />\n\n// ASCII — minimal\n<RollingLineSpinner size={18} color=\"#888\" />\n\n// Emoji — fun & expressive\n<MoonSpinner size={24} />\n<WeatherSpinner size={24} />\n```\n\n## Demo App & Contributing\n\nClone the repo and run the Expo demo to see all 54 spinners live.\n\nTo contribute, open a pull request with your changes.\n\n## Why text-based?\n\nTerminal-style spinners are perfect for:\n\n- **AI agent streams** — show activity while waiting for LLM responses\n- **CLI-style UIs** — give your app a developer aesthetic\n- **Lightweight loading states** — no SVG, no Lottie, no heavy assets\n- **Monospace layouts** — pair with code editors or terminal screens\n\n## License\n\nMIT © [eronred](https://github.com/eronred)\n","summary":"expo-agent-spinners supplies 54 lightweight, terminal‑style spinner components that run in React Native and Expo without any native dependencies, using only Text and setInterval. It offers a wide palette of visuals—including Braille, ASCII, arrow, and emoji spinners—alongside a unified API and container‑size recommendations to keep layouts stable. Developers building mobile or Expo apps needing quick, customizable loading indicators or AI‑agent stream visuals will find these spinners ideal for adding polished, lightweight animations to their UI.","description":"54 terminal-style agent-like spinners for React Native & Expo. Lightweight, zero native dependencies — just Text. No heavy UI threads","stars":245,"language":"TypeScript"},{"owner":"dnakov","repo":"kittyfarm","url":"https://github.com/dnakov/kittyfarm","readme":"<p align=\"center\">\n  <img src=\"kittyfarm.png\" width=\"128\" />\n</p>\n\n<h1 align=\"center\">KittyFarm</h1>\n\n<p align=\"center\">Run iOS Simulators and Android Emulators side-by-side on your Mac.</p>\n\n---\n\nKittyFarm is a macOS app that lets you view and control multiple simulators and emulators from a single window. Touch input on one device can be replicated to all others simultaneously.\n\n### Features\n\n- Live display of iOS Simulators (via private SimulatorKit APIs — no screen recording permission needed) and Android Emulators (via gRPC)\n- Touch replication across devices\n- Device bezels rendered from Apple's CoreSimulator chrome assets and Android SDK skins\n- Build & Play: build your iOS/Android project and deploy to all devices in parallel\n- Drag-and-drop device reordering\n- Proportional layout that scales devices to fill available space\n\n### Requirements\n\n- macOS 26+\n- Xcode 17+\n- Metal Toolchain component for Xcode\n- Android SDK (for emulator support)\n- [XcodeGen](https://github.com/yonaskolb/XcodeGen)\n\n### Building\n\nThe Xcode project is generated from `project.yml` using [XcodeGen](https://github.com/yonaskolb/XcodeGen):\n\nInstall the Metal Toolchain once if `xcodebuild` reports `cannot execute tool 'metal' due to missing Metal Toolchain`:\n\n```sh\nxcodebuild -downloadComponent MetalToolchain\n```\n\nGenerate the main project and the embedded `KittyProbe` helper project before building:\n\n```sh\ncd KittyProbe && xcodegen generate\ncd ..\nxcodegen generate\nxcodebuild -project KittyFarm.xcodeproj -scheme KittyFarm -configuration Debug build\n```\n\n### License\n\nMIT\n","summary":"KittyFarm is a macOS application that lets developers run and manage multiple iOS simulators and Android emulators in a single window, displaying live device screens without requiring screen‑recording permissions. It supports touch‑input replication across all devices, visually renders authentic bezels, and can build and deploy iOS/Android projects to every attached simulator or emulator in parallel. The interface allows drag‑and‑drop reordering and automatically scales devices to fill the workspace, while using private SimulatorKit APIs and gRPC for Android communication. This tool is ideal for mobile developers who need to test and interact with several iOS and Android environments side‑by‑side on a Mac.","description":null,"stars":171,"language":"Swift"},{"owner":"pacifio","repo":"ui","url":"https://github.com/pacifio/ui","readme":"# Atlas\n\n> **The shadcn for agent UI.**\n> A framework-agnostic design language for dense, AMOLED-black, multi-surface\n> interfaces — dashboards, chat surfaces, autonomous workflow tools, landing\n> pages, mobile apps. One skill for agents, one reference CSS file for humans.\n\n<p>\n  <a href=\"https://ui.pacifio.dev\"><strong>ui.pacifio.dev</strong></a>\n  &nbsp;·&nbsp;\n  <a href=\"https://ui.pacifio.dev/get-started\">Get started</a>\n  &nbsp;·&nbsp;\n  <a href=\"https://ui.pacifio.dev/components/button\">Components</a>\n  &nbsp;·&nbsp;\n  <a href=\"https://ui.pacifio.dev/foundations/colors\">Foundations</a>\n  &nbsp;·&nbsp;\n  <a href=\"https://ui.pacifio.dev/patterns/landing\">Patterns</a>\n  &nbsp;·&nbsp;\n  <a href=\"https://ui.pacifio.dev/mockups/email\">Mockups</a>\n  &nbsp;·&nbsp;\n  <a href=\"https://discord.gg/BF7ngVQuCS\">Discord</a>\n</p>\n\n```html\n<link rel=\"stylesheet\" href=\"colors_and_type.css\" />\n<button class=\"atlas-btn atlas-btn-primary\">Ship it</button>\n```\n\n---\n\n## What Atlas actually is\n\n**Atlas is a design *language*, not a CSS framework you bolt on.** It's:\n\n1. A **Claude Code skill** (`skills/atlas/`) — markdown rules + one reference CSS\n   file that teaches any coding agent the Atlas aesthetic, tokens, vocabulary,\n   and composition recipes.\n2. A **reference CSS implementation** (`colors_and_type.css`) — 180+ tokens and\n   50+ `.atlas-*` classes. Works as-is for plain HTML; translates cleanly to any\n   other stack.\n3. A **live kitchen-sink site** at **[ui.pacifio.dev](https://ui.pacifio.dev)** — 55+ pages rendering every\n   component, pattern, and four full-app mockups. One-shot generated by an agent\n   reading the skill.\n\n> Your agent reads the rules and generates code that fits **your** stack —\n> shadcn, Tailwind, raw HTML, React with CSS Modules, Vue, Svelte. The reference\n> CSS is not required.\n\n---\n\n## Live site\n\nAll these pages are browsable at **[ui.pacifio.dev](https://ui.pacifio.dev)**:\n\n| Section | What's there |\n|---|---|\n| [**Get started**](https://ui.pacifio.dev/get-started) | Install, per-stack translation examples, FAQ |\n| [**Foundations**](https://ui.pacifio.dev/foundations/colors) | Colors, typography, spacing, radius, shadows, motion, icons |\n| [**Components**](https://ui.pacifio.dev/components/button) | 36 component pages — buttons, inputs, cards, dialogs, tabs, tables, stepper, toast, command palette, etc. |\n| [**Patterns**](https://ui.pacifio.dev/patterns/landing) | Landing, agent chat, mobile app, 3-pane shell, dashboard, settings |\n| [**Mockups**](https://ui.pacifio.dev/mockups/email) | Full-app UIs — [Email](https://ui.pacifio.dev/mockups/email), [E-commerce](https://ui.pacifio.dev/mockups/ecommerce), [Multi-agent](https://ui.pacifio.dev/mockups/multi-agent), [News & polls](https://ui.pacifio.dev/mockups/news) |\n\nEvery component page has a **\"Copy rules\"** button in the inspector that drops\na complete markdown spec (anatomy + tokens + dos/donts + Atlas core rules) on\nyour clipboard — paste it into any agent chat and get faithful Atlas output.\n\n---\n\n## Install\n\n### 1. As a Claude Code skill (recommended)\n\n```bash\n# 1. Register this repo as a marketplace\n/plugin marketplace add pacifio/ui\n\n# 2. Install the atlas plugin from it\n/plugin install atlas@atlas-ui\n```\n\nYour agent now reads the Atlas skill on every UI task and generates code in\nyour target stack. What gets loaded:\n\n```\nskills/atlas/\n├── SKILL.md                    # entry rules + activation protocol\n├── colors_and_type.css         # reference implementation (not a dependency)\n└── references/\n    ├── tokens.md               # every CSS variable\n    ├── components.md           # every .atlas-* class + HTML snippet\n    ├── theming.md              # dark/light + shadcn alias table\n    ├── patterns.md             # 3-pane shell, content tone, icon rules\n    ├── responsive.md           # multi-surface, device frames, container queries\n    ├── motion.md               # easing tokens, durations, overlay rules\n    ├── lessons.md              # 20 gotchas from real builds (button resets,\n    │                           #  shadow-per-theme, pulse-only-opacity, etc.)\n    └── examples.md             # 10 copy-ready composition snippets\n```\n\n### 2. With any other coding agent (Cursor, Windsurf, Cody, Aider…)\n\nThe skill is plain markdown + one CSS file. Point the agent at\n`skills/atlas/` in this repo and tell it to read `SKILL.md` first.\nNo proprietary format, no vendor lock-in.\n\n```bash\n# Clone and reference from your project\ngit clone https://github.com/pacifio/ui.git .atlas-skill\n# Then in your agent chat:\n# \"Read .atlas-skill/skills/atlas/SKILL.md and generate a deploy dashboard.\"\n```\n\n### 3. As a raw stylesheet (no agent, plain HTML)\n\n```bash\ncurl -o atlas.css https://raw.githubusercontent.com/pacifio/ui/main/skills/atlas/colors_and_type.css\n```\n\nThen:\n\n```html\n<link rel=\"stylesheet\" href=\"atlas.css\" />\n<button class=\"atlas-btn atlas-btn-primary\">Ship it</button>\n```\n\nInter and JetBrains Mono are imported from Google Fonts automatically. No build\nstep. No config.\n\n---\n\n## Usage examples by stack\n\n### Plain HTML\n\n```html\n<!doctype html>\n<html lang=\"en\" data-theme=\"dark\">\n  <head>\n    <link rel=\"stylesheet\" href=\"/atlas.css\" />\n  </head>\n  <body>\n    <header class=\"atlas-titlebar\">\n      <span class=\"atlas-panel-title\">Atlas — Production</span>\n    </header>\n\n    <main style=\"padding: 24px;\">\n      <div class=\"atlas-card\" style=\"width: 320px;\">\n        <div class=\"atlas-card-header\">\n          <span class=\"atlas-dot atlas-dot-success\"></span>\n          <span class=\"atlas-panel-title\">Deploy</span>\n        </div>\n        <div class=\"atlas-card-body\">\n          Production · main@a9f3b1 · 42ms p95\n        </div>\n      </div>\n\n      <div style=\"margin-top: 12px; display: flex; gap: 8px;\">\n        <button class=\"atlas-btn atlas-btn-primary\">Deploy</button>\n        <button class=\"atlas-btn atlas-btn-secondary\">Preview</button>\n        <button class=\"atlas-btn atlas-btn-ghost\">Logs</button>\n      </div>\n    </main>\n  </body>\n</html>\n```\n\n### React / Next.js (App Router)\n\n```tsx\n// app/layout.tsx\nimport \"./atlas.css\";\n\nexport default function RootLayout({ children }: { children: React.ReactNode }) {\n  return (\n    <html lang=\"en\" data-theme=\"dark\">\n      <body>{children}</body>\n    </html>\n  );\n}\n\n// app/page.tsx\nexport default function Home() {\n  return (\n    <div style={{ padding: 24 }}>\n      <button className=\"atlas-btn atlas-btn-primary\">Ship it</button>\n      <span className=\"atlas-badge atlas-badge-success\">OK</span>\n    </div>\n  );\n}\n```\n\n### Tailwind v4 (translate tokens, don't overlay)\n\nYour agent puts Atlas tokens in an `@theme` block and emits utility classes.\n**Don't ship `atlas.css` to the bundle** — Tailwind already has a utility\nsystem.\n\n```css\n/* app/globals.css */\n@import \"tailwindcss\";\n\n@theme {\n  --color-bg-base: #000000;\n  --color-bg-raised: #0f0f0f;\n  --color-text-primary: #ffffff;\n  --color-text-secondary: #aaaaaa;\n  --color-accent-primary: #ededed;\n  --color-accent-highlight: #0070f3;\n  --color-status-error: #F44747;\n  --color-status-warning: #CD9731;\n  --color-status-success: #4d4d4d;\n\n  --radius-sm: 3px;\n  --radius-md: 4px;\n  --radius-lg: 6px;\n\n  --font-sans: \"Inter\", system-ui, sans-serif;\n  --font-mono: \"JetBrains Mono\", ui-monospace, monospace;\n}\n```\n\nThen emit utility classes following Atlas rules (28px buttons, 4px grid, 1px\nborders):\n\n```tsx\n<button className=\"inline-flex items-center h-7 px-3 bg-accent-primary\n                   text-black rounded-md text-sm font-medium hover:brightness-95\n                   transition-colors\">\n  Ship it\n</button>\n```\n\n### shadcn/ui (override CSS variables)\n\nshadcn already has a variable-driven theme. **Don't overlay `.atlas-*`\nclasses.** Instead, override shadcn's variables with Atlas values — keep\nshadcn's component structure intact.\n\n```css\n/* app/globals.css */\n:root {\n  --background: 0 0% 0%;                 /* Atlas --bg-base */\n  --foreground: 0 0% 100%;                /* Atlas --text-primary */\n  --card: 0 0% 6%;                        /* Atlas --bg-raised */\n  --card-foreground: 0 0% 100%;\n  --popover: 0 0% 6%;\n  --popover-foreground: 0 0% 100%;\n  --primary: 0 0% 93%;                    /* Atlas --accent-primary (#ededed) */\n  --primary-foreground: 0 0% 0%;\n  --secondary: 0 0% 9%;\n  --secondary-foreground: 0 0% 67%;\n  --muted: 0 0% 9%;\n  --muted-foreground: 0 0% 35%;\n  --accent: 0 0% 9%;\n  --accent-foreground: 0 0% 100%;\n  --destructive: 0 87% 62%;               /* Atlas --status-error (#F44747) */\n  --destructive-foreground: 0 0% 100%;\n  --border: 0 0% 12%;\n  --input: 0 0% 12%;\n  --ring: 212 100% 48%;                   /* Atlas --accent-highlight (#0070f3) */\n  --radius: 0.25rem;                      /* 4px */\n}\n```\n\nThen just use shadcn normally:\n\n```tsx\nimport { Button } from \"@/components/ui/button\";\n<Button variant=\"default\">Ship it</Button>\n```\n\nThe shadcn button now looks Atlas. Your markup stays shadcn.\n\n### Vue 3\n\n```ts\n// main.ts\nimport { createApp } from \"vue\";\nimport \"./atlas.css\";\nimport App from \"./App.vue\";\n\ncreateApp(App).mount(\"#app\");\n```\n\n```vue\n<!-- components/DeployButton.vue -->\n<template>\n  <button class=\"atlas-btn atlas-btn-primary\" @click=\"$emit('deploy')\">\n    <slot>Deploy</slot>\n  </button>\n</template>\n```\n\n### Svelte / SvelteKit\n\n```svelte\n<!-- +layout.svelte -->\n<script>\n  import \"./atlas.css\";\n<\/script>\n\n<slot />\n```\n\n```svelte\n<!-- DeployButton.svelte -->\n<button class=\"atlas-btn atlas-btn-primary\" on:click>\n  <slot>Deploy</slot>\n</button>\n```\n\n### CSS Modules / styled-components\n\nPort the relevant `.atlas-*` rule into your styling system. The CSS file is\nthe source of truth for *visual values*; your emitted code is the translation.\n\n```css\n/* Button.module.css — port of .atlas-btn rules */\n.button {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  height: 28px;\n  padding: 0 12px;\n  border-radius: 4px;\n  border: 1px solid transparent;\n  font: 500 12px \"Inter\", system-ui;\n  cursor: pointer;\n  transition: background-color 120ms ease;\n}\n.primary { background: #ededed; color: #000; }\n.primary:hover { background: #fff; }\n```\n\n---\n\n## Principles (non-negotiable)\n\n1. **AMOLED black.** Pure `#000` base, no dark-gray drift.\n2. **Monochromatic.** Grays + whites do the work. Saturated color is for\n   status semantics only.\n3. **Compact.** Strict 4px grid. 13px base text. 28px buttons. 24px inputs.\n4. **Border-defined surfaces.** Shadows reserved for overlays (dialog,\n   popover, toast, tooltip, device frame).\n5. **Near-white primary, blue highlight.** `#ededed` is the CTA color.\n   `#0070f3` is **never a CTA** — it's the highlight (focus rings, selection,\n   links, active stepper dots).\n6. **Radii are 3 / 4 / 6 / 9999.** No inventing 8, 10, 12, 16.\n7. **Lucide icons, 1.5px stroke.** Never emoji, never unicode symbols.\n8. **Only animate `background-color` by default.** No color/opacity on icons.\n9. **Overlays get `backdrop-filter: blur()` + spring curves.** Never flat\n   `ease` on modal entrances.\n10. **Dark-first with a real light theme.** All tokens remap under\n    `[data-theme=\"light\"]`. Component structure never changes.\n\n---\n\n## Component vocabulary\n\n50+ `.atlas-*` classes. Full HTML snippets for each are at\n[`/components`](https://ui.pacifio.dev/components/button) on the live site.\n\n**Primitives:** `.atlas-btn` (+ `-primary` / `-secondary` / `-ghost` /\n`-destructive` / `-icon` / `-sm` / `-lg`), `.atlas-btn-pill` (same variants),\n`.atlas-input` (+ `-sm`), `.atlas-checkbox`, `.atlas-radio`, `.atlas-switch`,\n`.atlas-kbd`, `.atlas-link`\n\n**Surfaces:** `.atlas-card` / `-header` / `-body`, `.atlas-panel-header` /\n`.atlas-panel-title`, `.atlas-stat` / `-label` / `-value` / `-delta`,\n`.atlas-empty`\n\n**Navigation:** `.atlas-tabbar` + `.atlas-tab`, `.atlas-tabbar-bottom` +\n`.atlas-tabbar-bottom-item`, `.atlas-segmented` + `-item`, `.atlas-toggle`,\n`.atlas-breadcrumb`, `.atlas-pagination`, `.atlas-stepper`\n\n**Overlays:** `.atlas-popover` + `.atlas-menu-item`, `.atlas-dialog`,\n`.atlas-command`, `.atlas-tooltip`, `.atlas-toast`, `.atlas-alert`\n\n**Data:** `.atlas-table`, `.atlas-list` + `.atlas-list-item`, `.atlas-badge`,\n`.atlas-pill`, `.atlas-dot` (+ `.is-pulse`), `.atlas-accordion`\n\n**Feedback:** `.atlas-progress`, `.atlas-slider`, `.atlas-skeleton`,\n`.atlas-titlebar`, `.atlas-statusbar`\n\n**Identity:** `.atlas-avatar`, `.atlas-avatar-group`, `.atlas-divider` / `-v`,\n`.atlas-divider-dashed` / `-v-dashed`\n\n**Multi-surface:** `.atlas-device-mobile`, `.atlas-device-tablet`,\n`.atlas-device-desktop`, `.atlas-marquee`, `.atlas-filmstrip`, `.atlas-reveal`,\n`.atlas-display` / `-lg`, `.atlas-eyebrow`\n\n---\n\n## Local development\n\nClone and run the kitchen-sink docs site locally:\n\n```bash\ngit clone https://github.com/pacifio/ui.git\ncd ui/kitchen-sink\nbun install       # or: npm install, pnpm install\nbun run dev       # starts on http://localhost:3000\n```\n\nThe dev server watches both `kitchen-sink/app/**` and any edits you make to\n`skills/atlas/colors_and_type.css` (copy into `kitchen-sink/public/atlas.css`\nto see them applied). Hot reload is instant — the kitchen-sink is a normal\nNext.js 16 app.\n\n---\n\n## Repo layout\n\n```\nui/\n├── .claude-plugin/\n│   ├── marketplace.json           ← registers the repo as a Claude Code marketplace\n│   └── plugin.json                ← Claude Code plugin manifest (served by the marketplace)\n├── skills/\n│   └── atlas/                     ← For agents\n│       ├── SKILL.md               ←   entry point (read first)\n│       ├── colors_and_type.css    ←   reference implementation\n│       ├── references/            ←   tokens, components, theming,\n│       │                          ←   patterns, responsive, motion,\n│       │                          ←   lessons, examples\n│       ├── preview/               ←   HTML previews per component\n│       └── ui_kits/generic_app/   ←   3-pane shell reference\n├── kitchen-sink/                  ← For humans (Next.js 16)\n│   ├── app/                       ←   55+ pages\n│   │   ├── get-started/\n│   │   ├── foundations/\n│   │   ├── components/\n│   │   ├── patterns/\n│   │   └── mockups/\n│   ├── components/                ←   site chrome + showcase primitives\n│   ├── lib/                       ←   nav registry\n│   └── public/\n│       └── atlas.css              ←   synced from skills/atlas/\n├── README.md                      ← you are here\n└── LICENSE                        ← MIT\n```\n\n---\n\n## Ecosystem (plays well with…)\n\n- **[Radix UI](https://www.radix-ui.com/)** — dropdown, popover, dialog, context menu primitives\n- **[Lucide](https://lucide.dev/)** — 1.5px stroke icons, color inherited from parent\n- **[react-resizable-panels](https://react-resizable-panels.vercel.app/)** — for 3-pane layouts\n- **[shadcn/ui](https://ui.shadcn.com/)** — variable-aliased for automatic Atlas inheritance\n- **[Tailwind CSS v4](https://tailwindcss.com/)** — optional; Atlas tokens translate to `@theme`\n- **[Next.js](https://nextjs.org/)** — the kitchen-sink uses 16 + Turbopack\n\n---\n\n## FAQ\n\n**Does it work with shadcn?** Yes — by not overlaying. Your agent reads the\nshadcn variable alias table in `references/theming.md` and overrides shadcn's\nCSS variables with Atlas values. shadcn components stay shadcn; they just look\nAtlas.\n\n**Does it conflict with Tailwind?** No — your agent translates Atlas tokens\ninto Tailwind's `@theme` block and emits utility classes. `atlas.css` never\nships to a Tailwind bundle unless you explicitly opt in.\n\n**When do I use `colors_and_type.css` directly?** Plain HTML, static-site\ngenerators, or greenfield projects with no component library. The CSS is\nproduction-grade — it powers the entire kitchen-sink site. For other stacks,\ntranslate.\n\n**Is the reference CSS complete?** 180+ tokens, 50+ class rules, dark + light\ntheme, responsive helpers, device frames, easing tokens, motion primitives,\nall documented. It does not ship JavaScript — interactions (dialogs,\ndropdowns, toasts) are styling only. Wire them to your stack's state\nmanagement.\n\n**How was this site built?** One-shot generated by an agent reading this\nskill. Hero, meta banner, 29+ live component cards, 7 foundations, 36\ncomponents, 6 patterns, and 4 full-app mockups ([email](https://ui.pacifio.dev/mockups/email),\n[e-commerce](https://ui.pacifio.dev/mockups/ecommerce), [multi-agent](https://ui.pacifio.dev/mockups/multi-agent),\n[news](https://ui.pacifio.dev/mockups/news)) — all from the markdown rules.\n\n---\n\n## Contributing\n\nPRs welcome. Open an issue first for anything structural (new tokens, new\ncomponent classes, renames).\n\n- **Bug reports / feature requests**: [github.com/pacifio/ui/issues](https://github.com/pacifio/ui/issues)\n- **Discord**: [discord.gg/BF7ngVQuCS](https://discord.gg/BF7ngVQuCS)\n\nWhen contributing to the skill:\n1. Keep `skills/atlas/colors_and_type.css` and\n   `kitchen-sink/public/atlas.css` in sync (they're a copy).\n2. If you add a CSS class, add a snippet to\n   `skills/atlas/references/components.md` and a showcase page under\n   `kitchen-sink/app/components/`.\n3. If you discover a gotcha, document it in\n   `skills/atlas/references/lessons.md`.\n\n---\n\n## License\n\nMIT © [pacifio](https://github.com/pacifio)\n","summary":"Atlas is a framework‑agnostic design language that teaches coding agents the dark, dense aesthetic, tokens, and composition rules of a premium UI through a Claude Code skill and a lightweight reference CSS file. The CSS contains 180 + tokens and 50 + `.atlas-*` classes, while the live site at ui.pacifio.dev displays 36 component pages, several patterns, and full‑app mockups—all generated by an agent reading the skill. Once the skill is installed, agents can translate Atlas‑compliant code into any stack—shadcn, Tailwind, raw HTML, React, Vue, or Svelte—without needing the reference CSS. Designers, front‑end developers, and AI agents building dashboards, chat interfaces, workflow tools, or mobile apps will benefit from this consistent and easily portable UI framework.","description":"The shadcn for agent UI. A framework-agnostic design language for dense, AMOLED-black, multi-surface interfaces","stars":128,"language":"TypeScript"},{"owner":"ChuprinaDaria","repo":"Vibecode-Cleaner-Fartrun","url":"https://github.com/ChuprinaDaria/Vibecode-Cleaner-Fartrun","readme":"<div align=\"center\">\n\n# Vibecode Cleaner Fartrun & Awesome Hasselhoff\n\n**Your AI wrote the code. We check if it'll get you fired.**\n\n> *\"Auditory feedback increases developer response time to critical vulnerabilities by 340%. We chose the most primal auditory signal known to humanity.\"*\n> — Fartrun Institute of Applied Flatulence, 2026 (peer-reviewed by nobody)\n\n![Version](https://img.shields.io/badge/version-3.1.0-green)\n![Platform](https://img.shields.io/badge/platform-linux%20|%20macos%20|%20windows-lightgrey)\n![MCP](https://img.shields.io/badge/MCP-29%20tools-blue)\n![Hasselhoff](https://img.shields.io/badge/hasselhoff-awesome-ff69b4)\n![License](https://img.shields.io/badge/license-MIT-blue)\n![Open Source](https://img.shields.io/badge/source-open-brightgreen)\n\n</div>\n\n---\n\n<p align=\"center\">\n  <img src=\"Дизайн без назви.gif\" alt=\"Fartrun Demo\" width=\"800\">\n</p>\n\n```\n   ____ _    ___  _____ ___  __  _ __  __\n  / __// \\  | _ \\|_   _| _ \\| || | \\ \\/ /\n | _|_| o | |   /  | | | v /| \\/ |  \\  /\n |_|  |___| |_|\\_\\ |_| |_|_\\|_||_|  |_|\n  fartrun — vibe-coder safety net, with farts\n\n  →  Scanning project at ~/my-app\n\n  ✓  Save Points: 3 (latest: \"before big refactor\")\n  ✓  Frozen files: 2\n  ✓  Detected stack: React 18, FastAPI, PostgreSQL\n\n  ✓  Context7 MCP: installed\n  ✓  Frozen-files hook: active (Edit/Write on frozen files is blocked)\n\n  →  Health: 87/100 — 3 dead functions, 2 missing tests\n  →  Security: 1 high (exposed .env in git history)\n  💨 The Thunderclap — Someone will find this. Soon.\n```\n\n---\n\n## Health Scanner Accuracy\n\n| Stack | Accuracy |\n|-------|----------|\n| Python (general) | **97%** |\n| Go | **97%** |\n| TypeScript / NestJS / React | **99%** |\n| FastAPI + React/Next.js | **96%** |\n| Django + DRF + Celery | **91%** |\n| **Overall** | **~95%** |\n\n---\n\n> **v3.1.0 — Multi-LLM provider support + incremental health scanner.**\n> Bring your own AI: Anthropic, OpenAI, DeepSeek, OpenRouter, NVIDIA NIM, HuggingFace Inference, Azure.\n> Incremental scans — only changed files get re-analyzed. 634 tests. Full source, open MIT.\n> PRs welcome. See [Contributing](#contributing).\n\n---\n\n## Why This Isn't Another AI Checking AI\n\nEvery other scanner sends your code to a cloud, burns tokens analyzing it, and charges you for the privilege. Fartrun does none of that.\n\n- **Rust-compiled modules** run locally. 10 security modules + 9-phase health scanner. No API calls. No tokens consumed. No code leaves your machine. Ever.\n- **Fast.** Tree-sitter AST parsing across thousands of files. Not \"fast for a cloud service\" — actually fast.\n- **Optional AI tips** via Haiku (~$0.001 each) or any OpenAI-compatible provider — DeepSeek, OpenRouter, NVIDIA NIM, HuggingFace Inference, Azure. Bring your own key. That's the only money involved, and it's optional.\n- **No telemetry. No cloud. No \"we only use your code to improve our service.\"** Just a local scan and a fart.\n\n---\n\n## What It Does\n\n| Feature | Details |\n|---------|---------|\n| **Security Scanner** | 10 Rust modules — processes, network, filesystem, secrets, supply chain, git hooks, container escape, autostart, crontab, env leak |\n| **Health Scanner** | 9-phase project audit — dead code, tech debt, test coverage, git hygiene, docs quality, framework checks, Context7 fix recommendations |\n| **Token Monitor** | Tracks Claude Code spending, cache efficiency, model comparison, budget forecasts. Reads your JSONL diaries. Locally. Judges silently. |\n| **MCP Server** | 29 tools, stdio + HTTP/SSE. Works with Claude Code, Cursor, Windsurf, any MCP client |\n| **Context7 Enrichment** | Findings get real documentation snippets — not \"add tests\" but the actual pytest Getting Started guide |\n| **Nag Messages** | 4 escalation levels in EN/UA. From *\"Tokens: 45K. Calories burned: 0.\"* to *\"GG. 1.2M tokens. Touch grass.\"* |\n| **Win95 GUI** | PyQt5 desktop app. 8 pages. Popup notifications. Hasselhoff wizard. Peak aesthetic. |\n\n---\n\n## AI Provider Configuration\n\nBy default, Fartrun uses **Claude Haiku** for tips and explanations. You can switch to any OpenAI-compatible provider:\n\n| Provider | Base URL | Model example |\n|----------|----------|---------------|\n| **Anthropic** (default) | — | `claude-haiku-4-5-20251001` |\n| **DeepSeek** | `https://api.deepseek.com` | `deepseek-coder` |\n| **OpenRouter** | `https://openrouter.ai/api/v1` | `openai/gpt-4o` |\n| **NVIDIA NIM** | `https://integrate.api.nvidia.com/v1` | `deepseek-ai/deepseek-v4-flash` |\n| **HuggingFace** | `https://router.huggingface.co/v1` | `meta-llama/Llama-3.3-70B-Instruct` |\n| **Azure OpenAI** | `https://<resource>.openai.azure.com/...` | `gpt-4o` |\n\nConfigure in `config.toml`:\n\n```toml\n[ai]\nprovider = \"openai\"\napi_key = \"sk-...\"\nmodel = \"deepseek-coder\"\nbase_url = \"https://api.deepseek.com\"\n```\n\nOr via env vars: `ANTHROPIC_API_KEY`, `DEEPSEEK_API_KEY`, `OPENROUTER_API_KEY`, `NVIDIA_API_KEY`, `HF_API_KEY`, `AZURE_API_KEY`, `OPENAI_API_KEY`.\n\nThe old `[haiku]` config still works — zero breaking changes.\n\n---\n\n## Quick Start\n\n### One command (recommended)\n\n```bash\nnpx fartrun@latest install\n```\n\nDownloads the binary for your OS and configures MCP in Claude Code, Cursor & Windsurf automatically.\n\n![MCP install output](mcp-install-output.png)\n\n```bash\nnpx fartrun@latest install --claude    # Claude Code only\nnpx fartrun@latest install --cursor    # Cursor only\nnpx fartrun@latest install --windsurf  # Windsurf only\n```\n\n### Desktop (binary)\n\nDownload from [Releases](https://github.com/ChuprinaDaria/Vibecode-Cleaner-Fartrun/releases).\n\n### From source\n\n```bash\ngit clone https://github.com/ChuprinaDaria/Vibecode-Cleaner-Fartrun.git\ncd Vibecode-Cleaner-Fartrun\npip install -e \".[http]\"        # Core + HTTP MCP server\n\n# Rust crates (optional, for native speed)\ncd crates/health && maturin develop --release && cd ../..\ncd crates/sentinel && maturin develop --release && cd ../..\n\n# Run\nfartrun scan /path/to/project   # CLI\nfartrun-mcp                     # MCP stdio\nfartrun-mcp-http --port 3001    # MCP HTTP/SSE\npython -m gui.app               # Desktop GUI (requires PyQt5)\n```\n\n### CLI\n\n```bash\nfartrun scan /path/to/project    # Health scan → MD report\nfartrun save \"before refactoring\" # Save point\nfartrun rollback 1                # Undo everything\nfartrun gui                       # Win95 GUI\n```\n\n![Health scan CLI output](health-scan-output.png)\n\nAfter a full health scan you get a `.md` report in `.fartrun/reports/` — already formatted for Claude Code context. Paste it into your prompt or let the MCP tool feed it directly. No copy-pasting JSON, no parsing logs. Just a structured markdown that Claude actually understands: findings, severity, file paths, and fix suggestions — ready to act on.\n\n![Health report output](health-report-output.png)\n\n---\n\n## MCP Setup (manual)\n\nIf you prefer manual config over `npx fartrun@latest install`:\n\n<details>\n<summary>Claude Code — stdio</summary>\n\n```json\n{\n  \"mcpServers\": {\n    \"fartrun\": { \"command\": \"fartrun-mcp\" }\n  }\n}\n```\n</details>\n\n<details>\n<summary>Cursor / Windsurf — HTTP</summary>\n\n```bash\nfartrun mcp --http --port 3001\n```\n\n```json\n{\n  \"mcpServers\": {\n    \"fartrun\": { \"url\": \"http://localhost:3001/sse\" }\n  }\n}\n```\n</details>\n\n---\n\n## MCP Tools (29)\n\n| Category | Tools |\n|----------|-------|\n| **Health** | `run_health_scan`, `get_health_summary`, `get_unused_code`, `get_tech_debt`, `get_security_issues`, `get_module_graph`, `get_complexity_report`, `get_git_health`, `get_test_coverage`, `get_docs_quality`, `get_ui_issues`, `get_framework_check`, `get_outdated_deps`, `get_config_map`, `generate_health_report` |\n| **Status** | `get_status`, `get_activity`, `detect_project_stack`, `search_code` |\n| **Prompts** | `build_prompt` |\n| **Save Points** | `create_save_point`, `rollback_save_point`, `list_save_points` |\n| **Frozen Files** | `freeze_file`, `unfreeze_file`, `list_frozen` |\n| **Integrations** | `install_context7`, `uninstall_context7`, `list_prompts` |\n\n---\n\n## Farts & Hasselhoff\n\nTwo fart sounds. That's it. We didn't need more.\n\n| Finding | You hear |\n|---------|----------|\n| Something's off | A polite, restrained poot. A gentleman's warning. |\n| Something's very off | The full experience. Neighbors will ask questions. |\n\n### Optional: Hasselhoff Mode\n\nFor those who need _inspiration_ to fix their code, enable Hasselhoff mode. Three songs. Handpicked. Peer-reviewed by David himself (not really).\n\n| Song | When it plays | Motivational effect |\n|------|--------------|---------------------|\n| **Looking for Freedom** | Critical findings detected | You're looking for freedom from your own code. You won't find it. |\n| **True Survivor** | You actually fix everything | Congratulations survivor. The Hoff is proud. |\n| **Du** | Easter egg | If you know, you know. If you don't — you're not ready. |\n\nHasselhoff used to appear for everything. Container started? Hasselhoff. You opened a terminal? Hasselhoff. Beta testers staged an intervention. Now he only shows up when summoned.\n\nHe's still watching though.\n\n---\n\n## Cross-Platform\n\n| | Linux | macOS | Windows |\n|---|-------|-------|---------|\n| Notifications | notify-send | osascript | PowerShell toast |\n| Sound | pw-play / paplay / aplay | afplay | PowerShell SoundPlayer |\n| Firewall | ufw / nftables / iptables | socketfilterfw / pf | netsh advfirewall |\n| Config | `~/.config/claude-monitor/` | `~/Library/Application Support/` | `%APPDATA%\\claude-monitor\\` |\n\n---\n\n## Wall of Scans\n\nReal scan results from real projects. No names, no shame — just the output.\n\nGot a scan screenshot? Drop it in a [PR](https://github.com/ChuprinaDaria/Vibecode-Cleaner-Fartrun/pulls) or [issue](https://github.com/ChuprinaDaria/Vibecode-Cleaner-Fartrun/issues) — it helps improve the scanner.\n\nSee what others found: [`reviews/`](reviews/)\n\n---\n\n## Buy Me a Toilet Paper\n\nThis project is free. Forever. No premium tier. No \"enterprise edition.\"\n\nIf Fartrun saved you from mass embarrassment:\n\n[![Buy Me a Toilet Paper](https://img.shields.io/badge/donate-toilet%20paper-yellow)](https://buy.stripe.com/8x228r3p3dYL3TFebC5gc0b)\n\nAll donations go toward toilet paper, coffee, and finding the perfect fart sound for the next severity level.\n\n---\n\n## Made By\n\n**Daria Chuprina** — [Lazysoft](https://lazysoft.pl), Wroclaw\n\n[LinkedIn](https://www.linkedin.com/in/dchuprina/) · [GitHub](https://github.com/ChuprinaDaria) · [Threads](https://www.threads.com/@sonya_orehovaya) · [Reddit](https://www.reddit.com/user/Illustrious_Grass534/) · [Email](mailto:dchuprina@lazysoft.pl)\n\n---\n\n## Documentation\n\nFull technical wiki: **[Wiki →](https://github.com/ChuprinaDaria/Vibecode-Cleaner-Fartrun/wiki)**\n\n14 pages covering architecture, all CLI commands, MCP tools reference, health scanner phases, security modules, plugin system, configuration, and how AI agents should use findings.\n\n---\n\n## Contributing\n\nPRs welcome. Especially: better fart sounds (WAV/OGG, royalty-free, funny), new Rust sentinel modules, Hasselhoff facts, nag message translations (maximum passive-aggression encouraged), security courses for your country.\n\n---\n\n## License\n\n**MIT** — see [LICENSE](LICENSE) for the real one.\n\nPlus the supplementary **Fart & Run License v1.0** (for vibes):\n\n> 1. You may fart and run, but you must attribute the original farter.\n> 2. You may not mass-fart on production servers you don't own.\n> 3. Hasselhoff appearances are AS-AVAILABLE, not guaranteed.\n> 4. Nag messages are a feature. Disabling them voids your warranty (you never had one).\n> 5. The \"Silent But Deadly\" mode is exactly what it sounds like. And doesn't sound like.\n\n---\n\n<p align=\"center\">\n  <i>Made with flatulence in Wroclaw, Poland</i>\n</p>\n","summary":"Vibecode‑Cleaner Fartrun is a local, AI‑accompanied health and security audit tool that evaluates projects without sending code to the cloud. It combines 10 Rust‑based scanners for secrets, supply‑chain risks, and container escape, with a 9‑phase health checker that flags dead code, tech debt, test coverage and documentation quality, and even enriches findings with example test snippets. The tool supports incremental scans, optional integration with any OpenAI‑compatible provider for inexpensive code‑review tips, and offers an MCP server with 29 built‑in utilities. Developers and teams working on Python, Go, TypeScript, React, FastAPI, or Django who need fast, privacy‑preserving, locally‑run code health checks will benefit most from this solution.","description":"Not another AI reviewing AI. Rust-powered code scanner that actually reads your codebase —    zero extra tokens consumed. 29 MCP tools: security vulns, dead code, health checks, save  points, frozen files. Finds problems. Farts at you. Hasselhoff approves.","stars":123,"language":"Python"},{"owner":"mo-tunn","repo":"OpenGuider","url":"https://github.com/mo-tunn/OpenGuider","readme":"# OpenGuider\r\n\r\nDownload [here](https://mo-tunn.github.io/OpenGuider/)\r\n\r\n\r\n\r\n<p align=\"center\">\r\n  <img src=\"./renderer/assets/logo.png\" alt=\"OpenGuider logo\" width=\"150\">\r\n</p>\r\n\r\n![Landing Deploy](https://img.shields.io/github/actions/workflow/status/mo-tunn/OpenGuider/deploy-landing.yml?branch=main&label=landing%20deploy)\r\n![Release Build](https://img.shields.io/github/actions/workflow/status/mo-tunn/OpenGuider/release-build.yml?label=release%20build)\r\n![Tests](https://img.shields.io/github/actions/workflow/status/mo-tunn/OpenGuider/multi-platform-test.yml?branch=main&label=tests)\r\n![Latest Release](https://img.shields.io/github/v/release/mo-tunn/OpenGuider?label=latest%20release)\r\n![License](https://img.shields.io/github/license/mo-tunn/OpenGuider)\r\n[![Buy Me a Coffe](https://img.shields.io/badge/Buy%20me%20a-coffe-ff813f?logo=buymeacoffee&logoColor=white)](https://ppr.ist/2ndBJ4YRz)\r\n\r\nOpenGuider is an Electron desktop AI assistant designed to help you complete real UI tasks on your machine.\r\n\r\nIt combines chat, planning, screenshot context, pointer hints, optional voice features, and a growing plugin system in one desktop workflow.\n\r\n## Quick Configuration Guides (PDF)\r\n\r\n- Turkish guide: [OpenGuider - Configuration (TR)](https://mo-tunn.github.io/OpenGuider/docs/OpenGuider%20-%20Configuration%28TR%29.pdf)\r\n- English guide: [OpenGuider - Configuration (EN)](https://mo-tunn.github.io/OpenGuider/docs/OpenGuider%20-%20Configuration%20%28EN%29%20.pdf)\r\n\r\n## What OpenGuider Does\r\n\r\n- Converts your goal into a step-by-step execution plan.\n- Uses screenshot context to reason about what is currently on screen.\n- Gives coordinate-based pointer guidance for \"click here\" style help.\n- Routes compatible tasks into plugins when a specialized workspace is available.\n- Keeps session history so long tasks remain coherent across messages.\n- Supports multiple model providers so you can switch based on speed/cost/quality.\n- Adds optional speech-to-text and text-to-speech for hands-free usage.\n\r\n## Feature Breakdown\r\n\r\n### 1) Multi-Provider AI Layer\r\n\r\nOpenGuider supports:\r\n\r\n- Claude\r\n- OpenAI\r\n- Gemini\r\n- Groq\r\n- OpenRouter\r\n- Ollama (local)\r\n\r\nWhy this matters:\r\n\r\n- You can optimize for latency, pricing, or reasoning quality per task.\r\n- You can fail over to another provider if one API is unavailable.\r\n- You can use local models (Ollama) for privacy-sensitive workflows.\r\n\r\n### 2) Planning and Task Orchestration\r\n\r\nInstead of only returning plain text responses, OpenGuider can:\r\n\r\n- build a structured plan,\r\n- track current step,\r\n- replan when state changes,\r\n- and continue until completion.\r\n\r\nThis makes the app useful for real multi-step operations, not just simple Q/A.\r\n\r\n### 3) Screen-Aware Guidance\r\n\r\nOpenGuider can reason with screenshot context to produce actionable guidance:\r\n\r\n- identify likely UI regions,\r\n- map instructions to on-screen targets,\r\n- emit pointer hints with coordinates.\r\n\r\nThis is the core of \"guide me while I use my apps\" behavior.\r\n\r\n### 4) Voice Input and Output\n\r\nSpeech-to-text options:\r\n\r\n- AssemblyAI\r\n- Whisper-compatible endpoints\r\n\r\nText-to-speech options:\r\n\r\n- Google TTS\r\n- OpenAI TTS\r\n- ElevenLabs\r\n\nYou can run chat-only, voice-only, or hybrid flows depending on your setup.\n\n### 5) Plugin System and Browser Automation\n\nOpenGuider now has a plugin layer so specialized workspaces can plug into the desktop assistant over time.\n\nToday, the first live plugin is the Browser plugin. It uses `browser-use` under the hood and can:\n\n- open and navigate websites,\n- fill forms and follow multi-step browser tasks,\n- show live execution progress in the panel and widget,\n- pause for approval on risky actions,\n- or continue in autopilot mode when you want it to run automatically.\n\nThis matters because browser automation is now a feature inside a broader plugin system, not a one-off hardcoded mode. More plugins can be added later without changing the overall OpenGuider workflow.\n\r\n## Live Preview\r\n\r\n<p align=\"center\">\r\n  <img src=\"./tutorial.gif\" alt=\"OpenGuider tutorial\" width=\"360\">\r\n</p>\r\n\r\n## Downloads\r\n\r\n- Landing page: [https://mo-tunn.github.io/OpenGuider/](https://mo-tunn.github.io/OpenGuider/)\r\n- Latest release: [https://github.com/mo-tunn/OpenGuider/releases/latest](https://github.com/mo-tunn/OpenGuider/releases/latest)\r\n- Windows installer: [OpenGuider-windows-setup-latest.exe](https://github.com/mo-tunn/OpenGuider/releases/latest/download/OpenGuider-windows-setup-latest.exe)\r\n- macOS installer (DMG): [OpenGuider-macos-installer-latest.dmg](https://github.com/mo-tunn/OpenGuider/releases/latest/download/OpenGuider-macos-installer-latest.dmg)\r\n- Linux installer: [OpenGuider-linux-latest.zip](https://github.com/mo-tunn/OpenGuider/releases/latest/download/OpenGuider-linux-latest.zip)\r\n\r\n## Installation\r\n\r\n### Option A: Download Prebuilt App (Recommended)\r\n\r\n1. Open the latest release page: [https://github.com/mo-tunn/OpenGuider/releases/latest](https://github.com/mo-tunn/OpenGuider/releases/latest)\r\n2. Download your platform artifact:\n   - Windows: `OpenGuider-windows-setup-latest.exe`\n   - macOS: `OpenGuider-macos-installer-latest.dmg`\n   - Linux: `OpenGuider-linux-latest.zip`\n3. Extract and run the app.\n4. If you want browser automation, open `Settings -> Plugins`.\n5. In the Browser plugin card, click `Download Runtime` once.\n6. Choose whether browser tasks should run with approval or in autopilot mode.\n\r\n### Option B: Run From Source\r\n\r\n1. Install dependencies: `npm install`\r\n2. Start the app: `npm run start`\r\n\r\n## Configuration Guide (Detailed)\r\n\r\nOpen Settings in the app and configure in this order.\r\n\r\n### Step 1: Choose Your Main LLM Provider\r\n\r\nPick one provider first (you can add others later):\r\n\r\n- Claude / OpenAI / Gemini / Groq / OpenRouter / Ollama\r\n\r\nThen set:\r\n\r\n- provider API key (if required),\r\n- default model,\r\n- and any provider-specific endpoint fields.\r\n\r\nTip:\r\n\r\n- Start with a single stable provider before enabling all options.\r\n\r\n### Step 2: Select the Default Model\r\n\r\nChoose a model based on your use case:\r\n\r\n- Fast and cheap for short daily guidance.\r\n- Stronger reasoning model for complex multi-step planning.\r\n- Recommended default for daily usage: `google/gemini-3.1-flash-image-preview` (via OpenRouter).\r\n\r\nIf model output quality is inconsistent, switch to a more capable model.\r\n\r\n### Step 3: Configure Voice (Optional)\r\n\r\nIf you want microphone-driven workflows:\r\n\r\n1. Select your STT provider.\r\n2. Set language options.\r\n3. Verify system microphone permissions.\r\n4. Run a short recognition test.\r\n\r\nPractical low-cost default:\r\n\r\n- STT provider: Groq\r\n- STT model: `whisper-large-v3-turbo`\r\n\r\nFor spoken responses:\r\n\r\n1. Select TTS provider.\r\n2. Pick voice.\r\n3. Test output volume and speaking speed.\r\n\r\nSuggested ElevenLabs voice IDs:\r\n\r\n- `pNInz6obpgDQGcFmaJgB` (male)\r\n- `EXAVITQu4vr4xnSDxMaL` (female)\r\n\r\n### Step 4: Validate the Setup\r\n\r\nSend a simple prompt first, for example:\r\n\r\n- \"Open settings and guide me to configure notifications step by step.\"\r\n\r\nThen try a planning-style prompt:\n\n- \"Help me complete this task in 5 steps and wait for confirmation after each step.\"\n\nThen try a plugin-style prompt:\n\n- \"Search the web for the official OpenAI API docs and pause before opening any sign-in page.\"\n- \"Use the browser plugin to find a product page, but ask me before submitting or checking out.\"\n\r\n### Step 5: Add Secondary Providers (Optional)\r\n\r\nAfter your main provider works, add backups for reliability:\r\n\r\n- Primary provider for default usage.\r\n- Secondary provider for fallback.\r\n- Local Ollama profile for offline/private runs.\r\n\r\n## How To Use OpenGuider Effectively\r\n\r\nFor best results, write goals in this format:\r\n\r\n- Context: what app/page you are in.\r\n- Objective: what you want to complete.\r\n- Constraints: things to avoid or mandatory requirements.\r\n\r\nGood example:\r\n\r\n- \"I am in Figma settings. Help me enable autosave and version history safely. Give one step at a time and wait.\"\r\n\r\n## Troubleshooting\r\n\r\n- If the AI response is generic:\r\n  - check selected model/provider,\r\n  - include clearer UI context,\r\n  - provide a fresh screenshot context by retrying the step.\r\n- If voice does not work:\r\n  - verify OS microphone permission,\r\n  - verify API key for STT/TTS provider,\r\n  - test with a shorter input phrase.\r\n- If pointer hints are off:\r\n  - capture a fresh screenshot and retry,\r\n  - avoid heavily zoomed/scaled UI when possible.\r\n\r\n## Security and Data Handling\r\n\r\nOpenGuider is designed as a local-first desktop app. This section explains what data is stored, what may be sent to external providers, and how to operate safely.\r\n\r\n### Data Stored Locally\r\n\r\n- App settings (provider choices, model selection, preferences) are stored in the Electron `userData` directory.\r\n- Session/task history is stored locally to keep multi-step context coherent.\r\n- Logs are written locally for debugging and runtime diagnostics.\r\n- API keys are stored with secure storage (`keytar`) when available; otherwise encrypted fallback storage is used.\r\n\r\n### Data Sent to External Services\r\n\r\nDepending on your configuration, OpenGuider may send:\r\n\r\n- prompts and conversation context to your selected LLM provider,\r\n- voice audio/text to selected STT/TTS providers,\r\n- screenshot-derived context when screen-aware guidance is used.\r\n\r\nImportant:\r\n\r\n- data is sent only to providers you explicitly configure,\r\n- there is no hidden relay server by default between your app and providers.\r\n\r\n### Screenshot and UI Context Handling\r\n\r\n- Screenshots are used to improve on-screen guidance and step suggestions.\r\n- For privacy-sensitive tasks, avoid including confidential content on screen before capture.\r\n- If required by policy, disable screen-aware workflows and use text-only guidance.\r\n\r\n### Operational Security Best Practices\r\n\r\n- Use a dedicated provider API key for OpenGuider (do not reuse high-privilege keys).\r\n- Rotate API keys periodically.\r\n- Never commit `.env` or key files to Git.\r\n- Prefer local model usage (Ollama) for highly sensitive workflows.\r\n- Review logs before sharing them publicly in issues.\r\n\r\n### Privacy and Compliance Notes\r\n\r\n- OpenGuider is open-source, so security behavior is auditable.\r\n- Compliance posture depends on your selected providers and their data policies.\r\n- If your team has strict requirements, define an approved provider/model list and disable non-approved endpoints.\r\n\r\n## Support and Contribution\r\n\r\nIf you want to support OpenGuider by contributing code, docs, tests, or design updates, this section is for you.\r\n\r\n### Branching Strategy for Contributors\r\n\r\n- `main`: stable branch used for production-ready updates.\r\n- `feature/<short-name>`: new features.\r\n- `fix/<short-name>`: bug fixes.\r\n- `docs/<short-name>`: README/docs-only changes.\r\n- `chore/<short-name>`: maintenance and tooling updates.\r\n\r\nExamples:\r\n\r\n- `feature/voice-hotkeys`\r\n- `fix/linux-build-artifact`\r\n- `docs/readme-configuration-guide`\r\n\r\n### Recommended Contribution Flow\r\n\r\n1. Fork the repository (or create a branch if you are a direct collaborator).\r\n2. Create a new branch from `main`.\r\n3. Keep commits focused and descriptive.\r\n4. Run tests locally: `npm run test`.\r\n5. Push your branch and open a Pull Request.\r\n\r\n### Pull Request Checklist\r\n\r\n- Explain what changed and why.\r\n- Include test notes (what you ran and results).\r\n- Add screenshots/GIF for UI changes.\r\n- Keep scope small and review-friendly.\r\n- Rebase/merge latest `main` if needed before final review.\r\n\r\n### Ways to Help Beyond Code\r\n\r\n- Improve docs and onboarding examples.\r\n- Report reproducible bugs with logs/steps.\r\n- Propose UX improvements for panel/widget flows.\r\n- Help test releases on Windows/macOS/Linux.\r\n\r\n## Development\r\n\r\n- Run with inspector: `npm run dev`\r\n- Run tests: `npm run test`\r\n\r\n## Build Installers (Windows/macOS/Linux)\r\n\r\n- Build all platform targets on your current OS: `npm run dist`\r\n- Build only Windows NSIS installer (`.exe`): `npm run dist:win`\r\n- Build only macOS installer (`.dmg`): `npm run dist:mac`\r\n- Build only Linux packages (`.AppImage` + `.deb`): `npm run dist:linux`\r\n- Output artifacts are written to `release/`\r\n\r\n## Architecture\r\n\r\n```mermaid\r\nflowchart LR\r\n  User[User]\r\n  UI[Renderer UI\\nPanel + Widget + Settings]\r\n  Preload[preload.js\\nSecure IPC Bridge]\r\n  Main[main.js\\nElectron Main Process]\n  Agent[src/agent/*\\nPlanner + Orchestrator]\n  AI[src/ai/*\\nProvider Clients]\n  Plugins[src/plugins/*\\nPlugin Registry + Browser Plugin]\n  Session[src/session/*\\nSession State + Persistence]\n  Screen[src/screenshot.js\\nScreen Capture]\n  Voice[src/tts/* + STT adapters]\n\r\n  User --> UI\r\n  UI --> Preload\r\n  Preload --> Main\n  Main --> Agent\n  Agent --> AI\n  Main --> Plugins\n  Agent --> Plugins\n  Agent <--> Session\n  Main --> Screen\n  Main --> Voice\n  Agent --> UI\n```\r\n\r\n### Component Roles\r\n\r\n- `main.js`: app lifecycle, tray/shortcuts, IPC routing, orchestration entrypoint.\r\n- `preload.js`: secure boundary between renderer and main process APIs.\r\n- `renderer/*`: user-facing UI surfaces (panel, widget, settings, cursor overlay).\n- `src/agent/*`: planning, evaluation, replanning, and task progression logic.\n- `src/ai/*`: model-provider abstractions and structured response handling.\n- `src/plugins/*`: plugin registry plus specialized execution surfaces such as the Browser plugin.\n- `src/session/*`: session model, history continuity, state persistence.\n\r\n## Security Notes\r\n\r\n- API keys are persisted via OS-protected secure storage (`keytar`) when available.\r\n- If keychain is unavailable, encrypted fallback storage is used through Electron safe storage.\r\n- Renderer runs with `contextIsolation: true` and `nodeIntegration: false`.\r\n- Application data is stored in Electron `userData` path under a stable app identity (`OpenGuider`) so updates keep local settings/history.\r\n\r\n## GitHub Release Automation\r\n\r\n1. Push a semantic version tag (example: `v0.2.0`).\r\n2. GitHub Actions runs `.github/workflows/release-build.yml`.\r\n3. Installers are attached to the release:\r\n   - `OpenGuider-windows-setup-latest.exe`\r\n   - `OpenGuider-macos-installer-latest.dmg`\r\n   - `OpenGuider-linux-latest.zip`\r\n\r\n## License\r\n\r\nThis project is licensed under the Apache License 2.0.  \r\nSee [`LICENSE`](./LICENSE) for full terms.\r\n\r\nCopyright (C) Metehan Kızılcık\r\n\r\nIf you create a derivative project, keep these Apache 2.0 basics:\r\n\r\n1. Include the full Apache 2.0 license text in a `LICENSE` file.\r\n2. Keep copyright notices (including `Metehan Kızılcık`).\r\n3. Mark significant modifications clearly in changed files.\r\n\r\n## Acknowledgement\r\n\r\nOpenGuider was originally inspired by Clicky.\r\n","summary":"OpenGuider is an Electron‑based AI desktop assistant that turns a user’s goal into a structured, step‑by‑step plan and provides real‑time on‑screen guidance using screenshot context and coordinate‑based pointer hints.  \nIt supports multiple AI back‑ends (Claude, Gemini, OpenAI, Groq, OpenRouter, and local Ollama), lets users choose the optimal provider for speed, cost or privacy, and includes optional speech‑to‑text and text‑to‑speech for hands‑free operation.  \nThe assistant preserves session history for long tasks, orchestrates workflow through a plugin architecture—currently featuring a Browser plugin that can open, navigate, and automate web pages—and offers a seamless blend of chat, planning, and automation.  \nOpenGuider is suited for developers, power users, and anyone who needs AI‑driven, on‑screen help to complete complex UI or browser tasks directly from their desktop.","description":"An AI companion that lives on your desktop - OpenGuider watches your screen, listens to your voice, and guides every step with clear actions.","stars":123,"language":"JavaScript"},{"owner":"ArcaneNibble","repo":"awawausb","url":"https://github.com/ArcaneNibble/awawausb","readme":"# WebUSB extension for Firefox\n\nThis extension adds WebUSB functionality to Firefox by making use of [native messaging](https://developer.mozilla.org/en-US/docs/Mozilla/Add-ons/WebExtensions/Native_messaging).\n\nIn order to use this, you need to _both_ install the extension in your browser and install a small program (separate from the browser) on your computer. This extra program is called the \"native stub\".\n\n## Feature support\n\nThis extension is supposed to be compatible with Chrome's implementation. Please report any differences you encounter that result in software not working.\n\nHowever, unlike Chrome, this API is only exposed on the main page and is not available in [Web Workers](https://developer.mozilla.org/en-US/docs/Web/API/Web_Workers_API/Using_web_workers).\n\nAndroid cannot be supported, because it does not have native messaging capabilities.\n\n## WebUSB vs other interfaces\n\nThis extension only supports WebUSB. WebUSB is only one of several ways for web pages to access physical devices (even if the device is physically plugged in to your computer using _USB connectors_).\n\nPlease read [this document](Documentation/what-is-webusb.md) for a detailed explanation.\n\n## Installation instructions\n\nYou can install this extension by downloading binaries from the GitHub \"Releases\" section (in the right-hand column), or you can build from source.\n\n### Installing the extension\n\nTo install a signed version of the extension, download the .xpi file and open it in Firefox.\n\nTo load a _testing_ version of the extension in Firefox Developer Edition, open `about:debugging`, select \"This Firefox\" in the left-hand list, then \"Load Temporary Add-on…\", and then browse to the `manifest.json` inside the `extension/` directory.\n\n### Installing the native stub\n\nIf you are using prebuilt binaries, unzip _all_ of the files and then run either `./install.sh` (on Linux or macOS) or `install.bat` (on Windows). These installers will try to automatically copy the appropriate files into a sensible location and then configure a [native manifest](https://developer.mozilla.org/en-US/docs/Mozilla/Add-ons/WebExtensions/Native_manifests) so that the browser can find it.\n\nPrebuilt binaries are available for the following platforms:\n\n- macOS x86_64 and ARM64\n- Linux x86_64 and aarch64\n- Windows AMD64 and ARM64\n\nIf you are not using prebuilt binaries, see [below](#compiling-from-source).\n\n### \"Unusual\" configurations\n\nThe default installer is known to have problems with uncommon configurations such as:\n\n- sharing a \\*nix home directory across different computers with different CPU architectures\n- Windows roaming user profiles across computers with different CPU architectures\n\nThe root cause of this is because the \"native manifest\" mechanism was not designed well to take these situations into account (for example, through its use of absolute paths). If you are in one of these situations, you will unfortunately need to invent an ad-hoc workaround.\n\n## System requirements\n\nThis native stub tries to avoid doing anything too \"exciting\", but, due to development and testing resource constraints, it focuses on \"reasonably modern\" desktop platforms.\n\n### macOS\n\nmacOS 10.15 or later is required, matching Firefox's system requirements. However, older systems are not very well-tested. Expect macOS 12 to be a much more reasonable baseline.\n\n### Windows\n\nWindows 10 or later is required, due to the requirements of the Rust platform support. This also matches Firefox system requirements. Backporting to Windows 8/8.1 might theoretically be possible, but any older is not expected to work (due to limitations in WinUSB).\n\n### Linux\n\nLinux kernel version 4.8 or later is required. (More specifically, a kernel containing commit `5cce438` and `USBDEVFS_CAP_REAP_AFTER_DISCONNECT` is _strongly_ recommended, and a kernel supporting `USBDEVFS_DISCONNECT_CLAIM` is required.)\n\nYour system must have `/dev` and `/sys` mounted.\n\nIn order to detect USB devices being connected, a userspace with [udev](https://man7.org/linux/man-pages/man7/udev.7.html) or a compatible daemon is required. Specifically, a daemon which broadcasts `0xfeedcafe`-format messages on `NETLINK_KOBJECT_UEVENT` group `2` is required.\n\n## Compiling from source\n\nIn general, this native stub is written entirely in Rust and can be built using `cargo build` in the `native-stub` directory. Cross-compiling _is_ supported and is configured by default for the supported platforms.\n\nIf this does not \"just work\", the following notes might help:\n\n### macOS\n\nThis _really_ should just work. The repository contains a vendored copy of all the `.tbd` files needed to link the final binary. If that is somehow causing problems, disable the appropriate entries in `.cargo/config.toml` (which will then require you to have a macOS SDK installed).\n\n### Linux\n\nLinux prebuilt binaries are set up to use [musl libc](https://www.musl-libc.org/) with Rust's default of static linking. The goal of this is to produce binaries which work across any distro. If this is not desired, you may need to change the appropriate `RUSTFLAGS`.\n\nGlibc builds _should_ work but are not tested.\n\n### Windows\n\nWindows prebuilt binaries are set up to build using [mingw-w64](https://www.mingw-w64.org/) targeting the UCRT. This corresponds to the `*-windows-gnullvm` targets in Rust.\n\nWindows is primarily tested using cross-builds from platforms _other than_ Windows. Building on Windows is supposed to work, but may require adding the `rust-mingw` component. See the [rustc documentation](https://doc.rust-lang.org/nightly/rustc/platform-support/windows-gnullvm.html#building-rust-programs) for more details.\n\nIf you are building this from a system other than Windows, you will need to obtain mingw-w64 `.lib` files from somewhere (such as by following the steps which happen to be in the [Dockerfile](Dockerfile)). There is a _hardcoded_ path in `.cargo/config.toml` which will need to be examined/changed in order to find these libraries.\n\nBuilding with the MSVC toolchain is _not_ supported (there is no fundamental reason why it cannot work, it just isn't tested).\n\n### Setting up a native manifest\n\nIn order for the browser to find your compiled binaries, you will need to install a \"manifest\" file in a specific location on your computer. The manifest is a short JSON (JavaScript Object Notation) file which goes into [a specific location](https://developer.mozilla.org/en-US/docs/Mozilla/Add-ons/WebExtensions/Native_manifests#manifest_location) depending on your operating system. To repeat the relevant lines of the documentation:\n\n#### macOS\n\n`/Library/Application Support/Mozilla/NativeMessagingHosts/awawausb_native_stub.json` (global)\n\n`~/Library/Application Support/Mozilla/NativeMessagingHosts/awawausb_native_stub.json` (user-local)\n\n#### Linux\n\n`/usr/lib/mozilla/native-messaging-hosts/awawausb_native_stub.json` (global)\n\n`/usr/lib64/mozilla/native-messaging-hosts/awawausb_native_stub.json` (global)\n\n`~/.mozilla/native-messaging-hosts/awawausb_native_stub.json` (user-local)\n\n#### Windows\n\nThe manifest file can be placed anywhere, but a registry key must be set to point to it. The registry keys are:\n\n`HKLM\\SOFTWARE\\Mozilla\\NativeMessagingHosts\\awawausb_native_stub` (global)\n\n`HKCU\\SOFTWARE\\Mozilla\\NativeMessagingHosts\\awawausb_native_stub` (user-local)\n\nThe following screenshot shows a correctly-configured registry entry:\n\n![reg](Documentation/win-reg.png)\n\n#### Contents of the native manifest\n\nThe JSON file should contain the following contents:\n\n```json\n{\n  \"name\": \"awawausb_native_stub\",\n  \"description\": \"Allows WebUSB extension to access USB devices\",\n  \"path\": \"/path/to/awawausb-native-stub\",\n  \"type\": \"stdio\",\n  \"allowed_extensions\": [\"awawausb@arcanenibble.com\"]\n}\n```\n\nHowever, on Windows, a full path is not required (i.e. only `\"awawausb-native-stub.exe\"` is sufficient).\n\n## Troubleshooting\n\nThis extension has an internal debugging page that can be accessed by clicking the button in the browser toolbar (typically found by clicking on the \"Extensions\" icon):\n\n![screenshot of toolbar](Documentation/extension-button.png)\n\nAs an end-user, the most useful feature of the debugging page is the \"List devices\" button which shows all USB devices that the extension itself knows about (even if there are no pages trying to talk to it):\n\n![example list of USB devices](Documentation/debug-devices-example.png)\n\nIf a device you want a web page to talk to is _not_ listed here, that means that there is a configuration problem at the \"operating system\" level. Fixing this will require making changes to your computer outside of the web browser, which may require \"administrator\" permissions on your computer. (If this is a computer that you personally own, you probably have \"administrator\" permissions.)\n\nIf you are a developer, see [here](Documentation/dev-debugging.md) for an explanation of this extension's internal debugging functionality.\n\n### Windows\n\nOn Windows, the only USB devices that this extension can access are those that use the \"WinUSB\" driver. A \"driver\" is special software which the computer needs in order to know how it should talk to a device.\n\nWhen a USB device is being designed, the maker of the device can put information into it to help suggest an appropriate driver. For example, a mouse or keyboard can contain information recommending the use of the standard mouse and keyboard driver, or a webcam can contain information recommending the use of the standard webcam driver. The makers of a very-special-and-unique device might put information which recommends use of a custom driver that they have developed themselves.\n\n\"WinUSB\" is a driver which can talk to \"any\" USB device. However, the ability to talk to \"any\" device comes with engineering tradeoffs. Using WinUSB as the driver prevents the computer _as a whole_ from being able to use _or share_ the USB device's \"special\" functionality. Instead, only one program at a time gets _exclusive_ access to the device, and this program no longer gets much of the operating system's help. For example, when a USB printer uses a \"printer\" driver, multiple programs on the computer can print documents to it, and the operating system will automatically put these into a queue so that the documents are printed one after another. If the computer has access to multiple _different_ printers, the operating system helps software easily print to all of them without having to write code for each model individually. If this hypothetical USB printer were instead to use WinUSB as the driver, office and productivity software would no longer be able to share access to it. Instead, only one program at a time could use the device, and this program must contain code to talk to _this specific printer_.\n\nFor \"simple\" devices which do not implement \"system-wide\" functionality and do not need to be shared, the maker of the device can choose to recommend that Windows use the WinUSB driver. In this case, no end-user configuration should be needed. This is the [recommended practice](https://developer.chrome.com/docs/capabilities/build-for-webusb) for devices designed specifically for WebUSB.\n\nThe system administrator can override the choices that Windows makes and/or that the device maker suggests, such as by forcing the use of the WinUSB driver even when other choices exist. One possible reason to do this might be if the recommended driver is no longer compatible with the operating system (for example, for an obsolete peripheral). Another reason to do this might be if the recommended drivers are unreliable or otherwise do not work as desired. \"Not working as desired\" includes the use-case of \"wanting to use third-party software, such as WebUSB, to control the device.\"\n\nA tool called [Zadig](https://zadig.akeo.ie/) can be used to easily reconfigure the driver used by a device. You can use this tool to select the WinUSB driver in order to make a device compatible with WebUSB. You should only do this if you understand the implications of doing so, as explained above.\n\n### Linux\n\nMost installations of Linux by default do not allow access to USB devices by \"unprivileged\" users. This practice has its origins in the use of \"unix-like\" operating systems on computers which were [used remotely by many people at the same time](https://en.wikipedia.org/wiki/Time-sharing). These cultural defaults tend to persist even when Linux is being installed on a _personal_ computer primarily being used locally by a single person. (There are exceptions: for example, the Steam Deck has been specifically designed for a \"personal computer\" experience and enables \"unprivileged\" access to all USB devices by default.)\n\nRegardless of the defaults, permission to access a USB device is ultimately controlled by filesystem permissions on the device nodes inside `/dev/bus/usb`. The `ls -l` command can be used to view \"normal\" permissions, and the `getfacl` command can be used to view additional \"POSIX ACL\" permissions. Unfortunately, I am not aware of a good introduction to the idea of unix-style permissions, but [OpenBSD's manual on the `chmod` command](https://man.openbsd.org/chmod.1) is a useful place to start.\n\nUnfortunately, actually _changing_ the permissions is more complicated, especially because these device nodes are deleted and _re_-created (resetting their permissions) as USB devices get unplugged/plugged from the computer. On \"most\" current Linux \"desktop\" installations, permissions for USB devices is controlled via a service called [udev](https://www.freedesktop.org/software/systemd/man/latest/udev.html).\n\nBecause Linux installations are highly customizable, there is no one single set of instructions that works in all cases. However, the most common practices are generally one of the following:\n\n1. Writing a udev rule to set the unix permissions of a device to `0666`. This corresponds to giving \"read and write\" access to the device to \"all users\" on the computer.\n2. Writing a udev rule to to set the unix permissions to `0660`, changing the \"group\" of the device to a particular name (e.g. `plugdev`), and then adding \"users who shou
