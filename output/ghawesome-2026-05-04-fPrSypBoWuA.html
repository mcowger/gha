menu        |\n| **Key3** (PWR, ~1s long) | toggle screen off    |             |             |             |\n| **Key3** (PWR, ~6s)      | hard power off       |             |             |             |\n| **Shake**                | dizzy                |             |             | —           |\n| **Face-down**            | nap (energy refills) |             |             |             |\n\n### ESP32-C6-Touch-AMOLED-2.16 controls\n\nThe board has three physical keys:\n- **PWR** (middle) — primary action / confirm (= A button)\n- **IO10** (left) — secondary / back / scroll (= B button)\n- **BOOT** (right) — open menu shortcut\n\n|                          | Normal               | Pet         | Info        | Approval    |\n| ------------------------ | -------------------- | ----------- | ----------- | ----------- |\n| **PWR** (middle)         | next screen          | next screen | next screen | **approve** |\n| **IO10** (left, short)   | scroll transcript    | next page   | next page   | **deny**    |\n| **Hold PWR**             | menu                 | menu        | menu        | menu        |\n| **BOOT** (right)         | open menu (shortcut) | open menu   | open menu   | open menu   |\n| **PWR held 4 s**         | power off (AXP cuts ALDO3; press again to wake) |             |             |             |\n| **Shake**                | dizzy                |             |             | —           |\n| **Face-down**            | nap (energy refills) |             |             |             |\n\n### ESP32-S3-Touch-AMOLED-2.16 controls\n\nThe board has three physical keys:\n- **PWR** (middle) — primary action / confirm (= A button)\n- **IO18** (left) — secondary / back / scroll (= B button)\n- **BOOT** (right) — open menu shortcut\n\n|                          | Normal               | Pet         | Info        | Approval    |\n| ------------------------ | -------------------- | ----------- | ----------- | ----------- |\n| **PWR** (middle)         | next screen          | next screen | next screen | **approve** |\n| **IO18** (left, short)   | scroll transcript    | next page   | next page   | **deny**    |\n| **Hold PWR**             | menu                 | menu        | menu        | menu        |\n| **BOOT** (right)         | open menu (shortcut) | open menu   | open menu   | open menu   |\n| **PWR held 4 s**         | power off (AXP cuts ALDO3; press again to wake) |             |             |             |\n| **Shake**                | dizzy                |             |             | —           |\n| **Face-down**            | nap (energy refills) |             |             |             |\n\n### Touch (all boards)\n\nTouch is supplemental — keys remain primary:\n\n- **Swipe up / down** — cycle through all 9 pages (Normal → Pet ×2 → Info ×6). The A button (Key1 on S3 1.8/1.75C, PWR on the 2.16 boards) short-press remains a coarser 3-mode jumper.\n- **Swipe left / right** (clock home screen) — cycle ASCII species\n- **Approval screen** — tap upper half = approve, lower half = deny\n- **Menu / Settings / Reset** — tap a row to select+confirm in one go\n- **Info / Pet pages** — tap top-right corner to cycle pages\n- **Normal HUD** — tap buddy = heart, bottom 32 px = scroll transcript\n\n### Sleep & wake\n\n- **USB plugged** — never auto-offs; the clock face stays visible\n- **Battery + clock visible** — auto-off after **5 minutes**\n- **Battery + other screens** — auto-off after **30 seconds**\n- **Approval prompt up** — never auto-offs\n\nAny key press or screen tap wakes the panel.\n\n## Notable differences from the M5StickC original\n\n- **Display layer** — Arduino_GFX + PSRAM Canvas (was M5.Lcd / TFT_eSprite)\n- **Attention indicator** — small red pill at top of screen\n  (M5 used a GPIO red LED; the AMOLED board has none)\n- **Landscape clock removed** — 368×448 is near-square; rotation pointless\n- **Battery current not exposed** — XPowersLib / AXP2101 only reports\n  voltage, %, and isCharging. The info-page \"current\" reads 0 mA\n- **Transcript supports CJK** — uses `chill7_h_cjk` font for the HUD lines\n  so Chinese / Japanese log entries render legibly\n- **Other UI strings stay ASCII** — non-ASCII bytes in `msg`, `promptTool`\n  and `promptHint` are replaced with random Matrix-rain symbols rather\n  than rendering as garbage glyphs\n- **ESP32-S3 2.16\" rotation** — the Waveshare ESP32-S3-Touch-AMOLED-2.16 panel is physically mounted 90° rotated from its natural orientation; this is handled in firmware via MADCTL=0xA0 and is transparent to the UI code\n\n## Per-state animations\n\n| State       | Trigger                     | Feel                                      |\n| ----------- | --------------------------- | ----------------------------------------- |\n| `sleep`     | bridge not connected        | eyes closed, slow breathing               |\n| `idle`      | connected, nothing urgent   | blinking, looking around                  |\n| `busy`      | sessions actively running   | sweating, working                         |\n| `attention` | approval pending            | alert, **red top-bar pulses**             |\n| `celebrate` | level up (every 50K tokens) | confetti, bouncing                        |\n| `dizzy`     | you shook the device        | spiral eyes, wobbling                     |\n| `heart`     | approved in under 5s        | floating hearts                           |\n\nEighteen ASCII species, each with all seven animations. **Settings →\nascii pet** cycles them; choice persists in NVS.\n\n## Custom GIF characters\n\nIf you want a custom GIF character instead of an ASCII buddy, drag a\ncharacter pack folder onto the drop target in the Hardware Buddy window.\nThe app streams it over BLE and the device switches to GIF mode live.\n**Settings → reset → delete char** reverts to ASCII mode.\n\nA character pack is a folder with `manifest.json` and 96 px-wide GIFs:\n\n```json\n{\n  \"name\": \"bufo\",\n  \"colors\": {\n    \"body\": \"#6B8E23\",\n    \"bg\": \"#000000\",\n    \"text\": \"#FFFFFF\",\n    \"textDim\": \"#808080\",\n    \"ink\": \"#000000\"\n  },\n  \"states\": {\n    \"sleep\": \"sleep.gif\",\n    \"idle\": [\"idle_0.gif\", \"idle_1.gif\", \"idle_2.gif\"],\n    \"busy\": \"busy.gif\",\n    \"attention\": \"attention.gif\",\n    \"celebrate\": \"celebrate.gif\",\n    \"dizzy\": \"dizzy.gif\",\n    \"heart\": \"heart.gif\"\n  }\n}\n```\n\nState values can be a single filename or an array. Arrays rotate\nloop-by-loop, useful for an idle activity carousel.\n\nGIFs are 96 px wide; up to ~140 px tall keeps the character above the HUD.\nThe whole folder must fit under 1.8 MB; `gifsicle --lossy=80 -O3 --colors 64`\ntypically cuts 40–60 %.\n\nSee `characters/bufo/` for a working example. If you're iterating on a\ncharacter and would rather skip the BLE round-trip,\n`tools/flash_character.py characters/bufo` stages it into `data/` and runs\n`pio run -t uploadfs` directly over USB.\n\n## Project layout\n\n```\nsrc/\n  main.cpp           — loop, state machine, UI screens (board-agnostic)\n  buddy.{cpp,h}      — ASCII species dispatch + render helpers\n  buddies/           — one file per species, seven anim functions each\n  character.{cpp,h}  — GIF decode + render\n  ble_bridge.{cpp,h} — Nordic UART service, line-buffered TX/RX\n  data.h             — wire protocol, JSON parse, CJK matrixifier\n  xfer.h             — folder push receiver\n  stats.h            — NVS-backed stats, settings, owner, species choice\n  boards/            — one .h per supported board (pins + capability flags)\n  hw/                — board HAL (display, input, power, imu, rtc,\n                       audio, expander, border). pins.h dispatches on\n                       the BOARD_* build flag\nlib/\n  ES8311/            — vendored Espressif codec driver\n  Arduino_DriveBus/  — vendored FT3168 touch driver (1.8)\n  Adafruit_XCA9554/  — vendored TCA9554 expander driver (1.8)\ncharacters/          — example GIF character packs\ntools/               — generators and converters\ndocs/superpowers/    — design specs + implementation plans\n```\n\nCST92xx touch (1.75C, both 2.16 boards) and PCF85063 RTC (1.8, both\n2.16 boards) come in through `SensorLib` via `platformio.ini` lib_deps\nrather than being vendored.\n\n## Availability\n\nThe BLE API is only available when the Claude desktop apps are in\ndeveloper mode (**Help → Troubleshooting → Enable Developer Mode**).\nIt's intended for makers and developers and isn't an officially\nsupported product feature.\n","summary":"This project portues the Claude Desktop Buddy firmware to a range of Waveshare ESP32‑AMOLED boards, enabling Bluetooth‑Low‑Energy communication between Claude for macOS/Windows and maker hardware. It supports four touch‑enabled AMOLED panels (1.8″, 1.75″ round, 2.16″ rounded‑square) with a unified UI rendered on a 184×224 canvas, automatically scaling to each display. Features include touch input, audio output, RTC, IMU, and button handling—all wrapped in an Arduino‑style PlatformIO build system for easy flashing. Makers and developers looking to build custom hardware that displays Claude prompts or recent messages will benefit from this hardware‑agnostic, ready‑to‑flash firmware.","description":"esp32-s3-touch-amoled-1.8","stars":174,"language":"C++"},{"owner":"TraderAlice","repo":"Auto-Quant","url":"https://github.com/TraderAlice/Auto-Quant","readme":"# Auto-Quant\n\n> LLM-native autonomous quant research loop. Karpathy's\n> [autoresearch](https://github.com/karpathy/autoresearch) pattern applied to\n> FreqTrade strategies on a 5-pair crypto universe (BTC, ETH, SOL, BNB, AVAX)\n> across 1h / 4h / 1d timeframes.\n\nThe idea: give an LLM agent a FreqTrade backtest harness and a single strategy\nfile. The agent modifies the strategy, runs a backtest, checks if the result\nimproved, keeps or discards, and repeats. Over many iterations the hope is to\nobserve which patterns the LLM actually finds useful on this asset pair. The\n**loop lives in `program.md`** — not in any orchestrator — and is executed by\nwhatever LLM agent you point at the repo.\n\nThis is a prototype to validate whether Karpathy's autoresearch pattern\ntransfers to quant research. The success metric is \"did the loop run and\nproduce an interpretable `results.tsv`\", **not** \"did we find a profitable\nstrategy\". Nothing in this repo is a recommendation to trade real capital.\n\n## A run in one picture\n\n![Sharpe frontier — v0.1.0 run](sharpe-frontier.png)\n\nOne dot per backtest over 99 experiments on BTC/USDT + ETH/USDT @ 1h. Green\ndots were kept by the agent, gray were discarded. The red line is the\nrunning best of *kept only* — it plateaus at Sharpe 1.44, **not** at the\nSharpe-18 cluster on the right. Those high-Sharpe runs are gray because the\nagent itself identified them as oracle-gaming (ROI-clipping that compressed\nreturn variance without improving real return) and retroactively discarded\nthem. Full write-up in\n[`versions/0.1.0/retrospective.md`](versions/0.1.0/retrospective.md).\n\n## How it works\n\nFour things that matter:\n\n- **`config.json`** — FreqTrade config, fixed. Pairs, timeframe, fees, dry-run\n  wallet, timerange. The agent does not touch this.\n- **`prepare.py`** — one-time data download from Binance via FreqTrade's Python\n  API. Downloads 1h, 4h, and 1d OHLCV for both pairs (v0.3.0+ uses the extra\n  timeframes via the `@informative` decorator). The agent does not touch this.\n- **`run.py`** — in-process **batch backtest**. Discovers every `.py` under\n  `user_data/strategies/` (skipping files prefixed `_`), runs FreqTrade's\n  `Backtesting` for each, and prints one `---` summary block per strategy.\n  The agent does not touch this.\n- **`user_data/strategies/`** — **the directory the agent owns**. Each `.py`\n  is one strategy; up to 3 active at a time. Agent creates / evolves / forks\n  / kills strategies here. Strategies evaluate on 1h base across the 5-pair\n  portfolio, and can opt into 4h/1d context AND/or cross-pair signals via\n  FreqTrade's `@informative` decorator (see `_template.py.example` for the\n  pattern). `run.py` reports per-pair metrics alongside the aggregate.\n\nPlus:\n\n- **`program.md`** — the autonomous-research instructions the human points the\n  LLM agent at.\n- **`results.tsv`** — event log. Schema: `commit | event | strategy_name | sharpe | max_dd | note`.\n  Events: `create | evolve | stable | fork | kill`. Gitignored so it survives\n  `git reset --hard` — past lessons stay available even when experimental\n  commits get thrown away.\n- **`analysis.ipynb`** — post-hoc read: per-strategy trajectories, cap\n  utilization, event distribution, note word frequency.\n\n*Version history*:\n- **v0.1.0** ([archive](versions/0.1.0/)): single-file mutation. Anchored\n  on one paradigm for all 99 rounds. Headline Sharpe 1.44 was mostly\n  oracle gaming (true-edge 0.19). See [retrospective](versions/0.1.0/retrospective.md).\n- **v0.2.0** ([archive](versions/0.2.0/)): multi-strategy (up to 3 slots).\n  5 paradigms tested / 3 kept / 0 Goodhart attempts. Peak clean Sharpe\n  0.67 (~3.5× better than v0.1.0's true-edge). See [retrospective](versions/0.2.0/retrospective.md).\n- **v0.3.0** (current): multi-strategy + multi-timeframe + multi-asset\n  portfolio. Adds 4h + 1d informative data, expands universe from 2 pairs\n  to 5 (BTC/ETH/SOL/BNB/AVAX), and emits per-pair metrics alongside\n  portfolio aggregate so agents can reason about per-asset edge. In-flight.\n\n## Requirements\n\n- Python 3.11+\n- [uv](https://docs.astral.sh/uv/)\n- TA-Lib (the C library — installed separately from the Python binding)\n\n## Install\n\n```bash\n# 1. Install uv if you don't have it\ncurl -LsSf https://astral.sh/uv/install.sh | sh\n\n# 2. Install the TA-Lib C library\n#    macOS:  brew install ta-lib\n#    Linux:  see https://github.com/mrjbq7/ta-lib#dependencies\n#    If native install is painful on your platform, the FreqTrade Docker\n#    image ships with TA-Lib pre-built and works as an alternate runtime.\n\n# 3. Install Python deps\nuv sync\n\n# 4. One-time data download (~a few minutes)\nuv run prepare.py\n\n# 5. Sanity check — with no strategies yet, run.py should report\n#    \"no strategies found\" and exit. That's expected — the agent creates\n#    1-3 starting strategies during setup before the first real backtest.\nuv run run.py > run.log 2>&1; echo \"exit=$?\"\n```\n\nIf step 5 prints `no strategies found...` and `exit=2`, you're ready. (An\nactual backtest run only starts once the agent has created at least one\nstrategy file.)\n\n## Running the agent\n\nOpen a **second** terminal (keep your editor/IDE in the first so the two\nsessions don't fight over the working tree), `cd` into the repo, and start\nyour preferred LLM agent (Claude Code, Codex, Cursor agent, etc.). Then\nprompt something like:\n\n> Have a look at `program.md` and let's kick off a new experiment. Let's do\n> the setup first.\n\nThe agent reads `program.md`, goes through setup, then enters the experiment\nloop. It keeps iterating until you interrupt it or it runs out of context.\n\n### Permissions\n\nThe loop only works if the agent can run commands without a human approving\neach one — it will invoke `uv run run.py`, `git commit`, `git reset`, and\nedit the strategy file hundreds of times. How you grant that depends on your\ntooling:\n\n- **Claude Code**: prefer a scoped allowlist via a project-level\n  `.claude/settings.json`. See the\n  [permissions docs](https://docs.claude.com/en/docs/claude-code/settings#permissions)\n  for patterns like `Bash(uv run *)` and `Bash(git commit:*)`.\n- **Other agents**: most have an equivalent — a config flag or settings file\n  to mark specific commands or tools as pre-approved.\n\nRead the docs and choose a permission posture you're comfortable with before\nleaving a loop running unattended. The agent is pointed at a sandboxed\nFreqTrade workspace and has no live-trading access (all `dry_run`), but it\ndoes run arbitrary shell commands and write files inside this directory.\n\n## Project structure\n\n```\nAuto-Quant/\n├── README.md\n├── pyproject.toml                     # uv-managed deps\n├── .python-version                    # 3.11\n├── config.json                        # FreqTrade config (read-only for agent)\n├── prepare.py                         # data download (read-only for agent)\n├── run.py                             # backtest + summary (read-only for agent)\n├── program.md                         # agent instructions\n├── analysis.ipynb                     # post-hoc analysis\n├── user_data/\n│   ├── strategies/\n│   │   ├── _template.py.example       # skeleton the agent copies from\n│   │   └── <agent-created files>.py   # up to 3 active at a time\n│   ├── data/                          # gitignored — downloaded OHLCV\n│   └── backtest_results/              # gitignored — FreqTrade outputs\n├── versions/                          # frozen snapshots of past runs\n└── results.tsv                        # gitignored — agent's event log\n```\n\n## Design notes\n\n- **Agent owns one directory, not one file.** `user_data/strategies/` is its\n  workspace; everything else is evaluation contract. Up to 3 strategies\n  simultaneously, hard cap. Multi-strategy exists specifically to fight\n  the single-paradigm anchoring that v0.1.0 exhibited.\n- **No CLI indirection.** The agent only runs `uv run prepare.py` and\n  `uv run run.py`. `run.py` uses FreqTrade's `Backtesting` class in-process,\n  so startup is fast and errors surface as real Python stack traces.\n- **`results.tsv` is a gitignored event log.** Each round, the agent appends\n  rows (one per strategy touched, with event type: create/evolve/stable/fork/kill).\n  It survives `git reset --hard` so past lessons stay available even when\n  experimental commits get thrown away.\n- **LLM decides keep/kill, not a scalar rule.** Sharpe on a finite window\n  is noisy and gameable. Agent reads the full per-strategy summary blocks\n  and decides inline which strategies to evolve, fork, or kill — the\n  program.md rules force action but not which action.\n- **Stagnation rule.** A strategy can't sit idle for more than 3 consecutive\n  stable rounds — agent must evolve, fork, or kill it. With only 3 slots,\n  dead weight is expensive.\n\n## License\n\nMIT.\n","summary":"Auto‑Quant is a prototype framework that lets a language‑model agent autonomously experiment with Quantopian‑style cryptocurrency trading strategies. It hands the LLM a FreqTrade backtest harness and a single Python strategy file, then iteratively mutates, backtests, and evaluates the strategy across a 5‑pair universe (BTC, ETH, SOL, BNB, AVAX) on multiple time‑frames, keeping only those that improve Sharpe while discarding oracle‑gaming cases. Key components include a fixed config, data‑preparation script, batch‑backtesting runner, an editable strategy directory, and a results log that survives hard resets. The tool is aimed at quantitative researchers and developers who want to prototype AI‑driven strategy discovery without committing real capital.","description":null,"stars":254,"language":"Python"},{"owner":"browser-use","repo":"browser-harness-js","url":"https://github.com/browser-use/browser-harness-js","readme":"<img src=\"https://r2.browser-use.com/github/asbfgihsbfbaosfjla.png\" alt=\"Browser Harness\" width=\"100%\" />\n\n# Browser Harness JS ♞\n\nThe thinnest possible bridge from the LLM to Chrome. **No harness, no recipes, no rails** — just every CDP method as a typed JS call.\n\nOne persistent WebSocket, 56 domains, 652 typed wrappers, zero wrapping of what Chrome already does.\n\n```\n  ● agent: wants to click a button\n  │\n  ● no click() helper, no upload_file(), no goto()\n  │\n  ● agent writes the CDP call itself        await session.Input.dispatchMouseEvent({...})\n  │                                          await session.DOM.setFileInputFiles({...})\n  ✓ done — same pattern for all 652 methods\n```\n\n**The protocol is the API.** If Chrome can do it, you can call it.\n\n## Installation\n\n```bash\nnpx skills add https://github.com/browser-use/browser-harness-js --skill cdp\n```\n\nOr paste this into your agent — it'll install the skill, put the CLI on your PATH, and run a first task:\n\n```text\nRun `npx skills add https://github.com/browser-use/browser-harness-js --skill cdp`, then\nsymlink `browser-harness-js` into a directory on my PATH, then use the cdp skill to drive\nmy browser: look at all the tabs I have open, group them by topic, and screenshot the most\ninteresting one.\n```\n\n(The CLI auto-installs [`bun`](https://bun.sh) on first run if it's missing. Set `BROWSER_HARNESS_SKIP_BUN_INSTALL=1` to opt out.)\n\nIf Chrome asks you to tick a remote-debugging checkbox, do it — that's how the agent attaches:\n\n<img src=\"docs/setup-remote-debugging.png\" alt=\"Remote debugging setup\" width=\"520\" style=\"border-radius: 12px;\" />\n\nSee [interaction-skills/](interaction-skills/) for recipes on the mechanics that are not obvious from the CDP method list alone.\n\n## Files\n\n- `SKILL.md` — day-to-day usage; how to connect, pick a tab, call methods, persist state\n- `sdk/browser-harness-js` — tiny CLI that auto-spawns the server and forwards snippets\n- `sdk/repl.ts` — Bun HTTP server holding one persistent `Session`\n- `sdk/session.ts` — the `Session` class: transport, connect, target routing, events\n- `sdk/gen.ts` — codegen: reads `browser_protocol.json` + `js_protocol.json` → typed wrappers\n- `sdk/generated.ts` — every CDP method as `session.<Domain>.<method>(params)` (generated)\n\nNo helpers file. No `click()`, no `goto()`, no `upload_file()` — just the protocol, typed.\n\n## Why no pre-baked helpers?\n\nEvery helper is a lie about what CDP already gives you. `click(x, y)` hides `Input.dispatchMouseEvent` — which has 14 parameters the LLM might need (button, clickCount, modifiers, pointerType, force, tangentialPressure, …). A harness that exposes three of them quietly limits what the agent can do.\n\n- Types are the docs. `session.Page.navigate(` triggers autocomplete with the exact params — same JSDoc as the CDP reference.\n- No version drift. The SDK is regenerated from the upstream protocol JSON; new Chrome methods appear as soon as you swap the JSON.\n- No \"helper doesn't handle my case\" detours. If CDP can do it, the agent can call it — directly, typed, today.\n\nThe only \"helpers\" you'll find are things CDP itself is missing:\n- `listPageTargets()` — filters `chrome://` / `devtools://` out of `Target.getTargets`\n- `resolveWsUrl({wsUrl|port|profileDir})` — reads `DevToolsActivePort` for Chrome 144+\n- `session.use(targetId)` / `session.waitFor(method, pred, timeout)` — the two routing primitives you genuinely need\n\n## Contributing\n\nPRs welcome. The best way to help: **contribute a new interaction skill** under [interaction-skills/](interaction-skills/) when you figure out the CDP recipe for something non-obvious (a dropdown framework, a shadow-DOM trap, a network-wait pattern).\n\n- Keep recipes in **pure CDP** — `session.Domain.method(...)`, not wrapped helpers.\n- Lead with the shortest method call that works; add the workaround or trap afterwards.\n- Small and focused beats comprehensive. One mechanic per file.\n- Bug fixes, codegen improvements, and `session.ts` refinements are equally welcome.\n\n---\n\n[Bitter lesson](https://browser-use.com/posts/bitter-lesson-agent-frameworks) · [Skills](https://browser-use.com/posts/web-agents-that-actually-learn)\n","summary":"Browser‑Harness‑JS is a minimal Node JS toolkit that exposes every Chrome DevTools Protocol method as a typed JavaScript call, avoiding any helper wrappers or abstractions. A single persistent WebSocket session routes all 56 CDP domains, and the SDK auto‑generates 652 typed wrappers from the JSON specification, giving users autocomplete and parameter validation that match the official Chrome docs. The project ships a tiny CLI and REPL that automatically spawn a Bun‑based server, making it simple to attach and interact with a browser instance from scripts or agents. It is ideal for developers, QA engineers, or LLM‑powered agents that need precise, up‑to‑date control over Chrome without the overhead of a full harness or recipe layer.","description":"Self-healing browser harness that enables LLMs to complete any task","stars":435,"language":"TypeScript"},{"owner":"simoncirstoiu","repo":"alice","url":"https://github.com/simoncirstoiu/alice","readme":"<p align=\"center\">\n  <h1 align=\"center\">ALICE</h1>\n  <p align=\"center\"><b>A</b>nalyse · <b>L</b>earn · <b>I</b>ngest · <b>C</b>urate · <b>E</b>xport</p>\n  <p align=\"center\">All-in-one AI-powered image annotation, training, and dataset management toolkit.</p>\n</p>\n\n<p align=\"center\">\n  <img src=\"https://img.shields.io/badge/python-3.8+-blue?logo=python&logoColor=white\" alt=\"Python\">\n  <img src=\"https://img.shields.io/badge/YOLO-v8%20%7C%2011-orange\" alt=\"YOLO\">\n  <img src=\"https://img.shields.io/badge/Frigate-NVR-green\" alt=\"Frigate\">\n  <img src=\"https://img.shields.io/badge/license-PolyForm%20Noncommercial%201.0.0-lightgrey\" alt=\"License\">\n</p>\n\n---\n\n> **Works on both NVIDIA GPU and CPU.** \n\nALICE automatically detects your hardware — if no compatible GPU is found, it falls back to CPU mode. No manual configuration needed.\n\n![Viewer — AI Detection](screenshots/viewer.png)\n\n## Why?\n\nI needed a tool to train a YOLO model for my cameras, using my own images, with the specific angles and scenarios around my house.\nI couldn't find anything on the internet (or if it existed, I was probably too drunk to find it), so I built my own utility to fit my needs.\nIf you find it useful — enjoy. If not, well... cry me a river! :)\n\n## Quick Start\n\n```bash\n# Build and set up virtual environment\npython3 builder.py\n\n# Run\n./alice.py\n```\n\nThe builder assembles `alice.py` from source modules, creates a `.venv` with base dependencies, and patches the shebang so `./alice.py` uses the venv automatically. On Debian/Ubuntu, the builder will auto-install `python3-venv` if missing.\n\nOn first run, a welcome page guides you through initial setup — hardware detection, model download, and dependency installation. Open **http://localhost:8080** and follow the steps.\n\n```bash\n# Options\n./alice.py --port 9090                  # custom port\n./alice.py --conf /path/to/alice.conf   # custom config path\n```\n\n### Docker\n\n```bash\npython3 builder.py --no-venv\n```\n\nThe builder generates `docker-compose.yml` automatically, depending on your configured hardware (GPU or CPU). \nEdit the volume paths to match your Frigate setup, then:\n\n```bash\ndocker compose up --build -d\n```\n\nSee [Docker Setup](#docker-setup) below for details.\n\n## Features\n\n### Viewer — Dataset Mode\nBrowse and annotate YOLO bounding boxes with a full canvas editor — draw, resize, move, delete, undo. Filter by split (train / val / empty) or by class. Gallery grid view, keyboard shortcuts, right-click context menus.\n\n![Viewer — Edit Panel](screenshots/viewer-edit.png)\n\n### Gallery & Dataset Stats\nGallery grid view with thumbnail previews, split badges, and box counts. Dataset statistics panel shows total images, train/val distribution, annotation coverage, and class distribution.\n\n![Gallery — Stats](screenshots/gallery-stats.png)\n\n### Duplicate Detection\nPerceptual hashing (pHash) with DCT-based 64-bit hashes. Multiprocessing-accelerated computation. Side-by-side comparison. Box-similarity dedup per camera. NMS cleanup for overlapping same-class boxes.\n\n![Viewer — Duplicate Detection](screenshots/viewer-dupes.png)\n\n### Viewer — Live Mode\nBrowse Frigate NVR event snapshots in real-time. Filter by camera and time window. Transfer snapshots directly into your training dataset with automatic WebP → JPG conversion.\n\n### Viewer — Video Mode\nFrame-by-frame analysis of Frigate video exports. Seekbar, step controls, adjustable playback FPS. Automated frame scanner with AI detection for batch export.\n\n### AI Analysis\nRun YOLO inference on any image across all three modes. Merge detected boxes into annotations (dedup by IoU > 0.5). Preview mode shows detections without saving. Live detection auto-runs as you navigate.\n\n### Training Pipeline\n\nFive-step pipeline — each step toggleable, runnable individually or as a sequence:\n\n| Step | What it does |\n|------|-------------|\n| **1. Export** | Extract newest snapshots from Frigate DB with round-robin camera distribution → 90/10 train/val split |\n| **2. Dedup** | Remove duplicates via pHash, box similarity, and NMS cleanup |\n| **3. Annotate** | Auto-label all images using a teacher model |\n| **4. Train** | Fine-tune student model with real-time metrics (loss, mAP50, mAP50-95) |\n| **5. Export ONNX** | Convert to ONNX for deployment (FP16 or FP32 on GPU, FP32 only on CPU) |\n\nAll steps log to the Logs tab with COMPLETED / FAILED / STOPPED status.\n\n![Training Pipeline](screenshots/trainer.png)\n\n### Device Detection\n\nALICE automatically detects your hardware at startup and adapts accordingly:\n\n| | NVIDIA GPU | CPU |\n|---|---|---|\n| Training | GPU accelerated | CPU (slower) |\n| Inference | GPU | CPU |\n| ONNX Export | FP16 + FP32 | FP32 only |\n| PyTorch | CUDA build | CPU build |\n| onnxruntime | `onnxruntime-gpu` | `onnxruntime` |\n\nConfigure from **Settings → System → Device** (Auto / NVIDIA GPU / CPU). The sidebar and Device tab show live hardware stats.\n\n### Settings\n\nAll configuration in `alice.conf` — editable from the web UI or directly in the file. Built-in dependency checker with one-click install. Model downloader for YOLO11 and YOLOv8 variants.\n\n<table>\n<tr>\n<td width=\"50%\"><b>Paths</b><br><img src=\"screenshots/settings-paths.png\" alt=\"Settings — Paths\"></td>\n<td width=\"50%\"><b>AI Models</b><br><img src=\"screenshots/settings-ai.png\" alt=\"Settings — AI\"></td>\n</tr>\n<tr>\n<td width=\"50%\"><b>Training</b><br><img src=\"screenshots/settings-training.png\" alt=\"Settings — Training\"></td>\n<td width=\"50%\"><b>System & Dependencies</b><br><img src=\"screenshots/settings-system.png\" alt=\"Settings — System\"></td>\n</tr>\n</table>\n\n## Requirements\n\nPython 3.8+ required. The builder creates a `.venv` and installs the base dependency (Pillow) automatically. All other dependencies are managed by ALICE and can be installed from the welcome page or Settings → System with one click:\n\n| Package | Purpose |\n|---------|---------|\n| **Pillow** | Image processing, pHash, format conversion (auto-installed by builder) |\n| **NumPy** | Numerical operations for dedup |\n| **inotify** | Filesystem watching on Linux (falls back to polling) |\n| **opencv-python-headless** | Video frame extraction |\n| **ONNX** | ONNX model format for export |\n| **onnxslim** | ONNX model optimization |\n| **onnxruntime** | ONNX Runtime — GPU or CPU variant auto-selected |\n| **PyTorch** | Deep learning framework — CUDA or CPU variant auto-selected |\n| **ultralytics** | YOLO model training & inference |\n\nALICE installs the correct PyTorch variant (CUDA or CPU) based on detected hardware. No manual torch installation needed.\n\n> **Note:** ALICE does **not** install NVIDIA drivers or CUDA. If you want GPU-accelerated training, install the [NVIDIA drivers](https://www.nvidia.com/Download/index.aspx) and [CUDA toolkit](https://developer.nvidia.com/cuda-toolkit) on your system before running ALICE.\n\n## Docker Setup\n\nThe builder generates `docker-compose.yml` with GPU support auto-detected from your host:\n\n```bash\npython3 builder.py --no-venv\n```\n\nThis creates `docker-compose.yml` with the NVIDIA GPU block included if a GPU is detected, or CPU-only otherwise.\n\nEdit the volume paths to match your setup:\n\n```yaml\nvolumes:\n  - ./alice.conf:/app/alice.conf\n  - /path/to/datasets:/app/datasets\n  - /path/to/models:/app/models\n  - /path/to/frigate/clips:/app/clips:ro\n  - /path/to/frigate/exports:/app/exports:ro\n  - /path/to/frigate/frigate.db:/app/frigate.db:ro\n```\n\n> **Important:** The `frigate.db` volume must point to the actual **file**, not a directory. If the file doesn't exist on the host at the time of container creation, Docker will create a directory instead and ALICE won't be able to open the database.\n\nThen start:\n\n```bash\ndocker compose up --build -d\n```\n\nOn first run, open ALICE in your browser and install dependencies from the welcome page or Settings → System. Dependencies are persisted in a Docker volume across container restarts.\n\n> **Note:** GPU support in Docker requires [NVIDIA Container Toolkit](https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/latest/install-guide.html) on the host. If running the builder on a machine without GPU, the generated compose file will be CPU-only.\n\n## Dataset Structure\n\nAlice expects standard YOLO format:\n\n```\ndataset/\n├── images/\n│   ├── train/*.jpg\n│   └── val/*.jpg\n├── labels/\n│   ├── train/*.txt\n│   └── val/*.txt\n└── dataset.yaml          ← auto-generated by trainer\n```\n\n## Building from Source\n\nAlice is developed as modular source files assembled into a single `alice.py`:\n\n```bash\npython3 builder.py                     # → alice.py + .venv/ + docker-compose.yml\npython3 builder.py -o /path/to/out.py  # custom output path\npython3 builder.py --no-venv           # skip venv creation (for Docker)\npython3 builder.py --check             # verify all modules and assets exist\npython3 builder.py --list              # show resolved dependency order\npython3 builder.py --strict            # abort on name conflicts\n```\n\nThe builder:\n1. Reads the import graph from `from .module import` statements in each `src/*.py`\n2. Topologically sorts modules by dependency order\n3. Strips all relative imports (redundant in the flat monolith namespace)\n4. Injects CSS, JS, and HTML assets from `src/assets/` into placeholder tokens\n5. Writes a single self-contained `alice.py`\n6. Creates a `.venv` with Pillow and patches the shebang (auto-installs `python3-venv` if missing)\n7. Generates `docker-compose.yml` with GPU support auto-detected\n\nRe-running `builder.py` rebuilds `alice.py` and regenerates `docker-compose.yml`, but skips venv creation if `.venv` already exists.\n\nSource modules live in `src/` — see [CONTRIBUTING.md](CONTRIBUTING.md) for development workflow.\n\n## Keyboard Shortcuts\n\n| Key | Action |\n|-----|--------|\n| `← →` | Navigate images |\n| `D` | Delete selected box |\n| `P` | Set to Person class |\n| `A` | AI Analyse (save) |\n| `M` | Copy/Move dialog |\n| `E` | Toggle panel |\n| `G` | Gallery view |\n| `J` | Jump to image # |\n| `Ctrl+Z` | Undo |\n| `Ctrl+Scroll` | Zoom |\n| `Space` | Play/pause (video) |\n\n## Support\n\nIf you find ALICE useful, you can buy me a coffee:\n\n[![Donate](https://img.shields.io/badge/Donate-PayPal-blue?logo=paypal)](https://www.paypal.com/donate/?hosted_button_id=988G9YXYX78RG)\n\nNeed help or want to chat? Join Alice Discord:\n\n[![Discord](https://img.shields.io/badge/Discord-Join-5865F2?logo=discord&logoColor=white)](https://discord.gg/SnsDbNuhmW)\n\n## License\n\n[PolyForm Noncommercial 1.0.0](https://polyformproject.org/licenses/noncommercial/1.0.0/) — free for personal, non-commercial use. For commercial licensing, contact alice@it-link.net.\n\n\n## Author\n\nSimon Cirstoiu\n","summary":"ALICE is an all‑in‑one, hardware‑aware toolkit that lets users gather, annotate, and train YOLOv8 models directly from camera snapshots and video frames.  It supplies a web‑based viewer with full bounding‑box editing, duplicate‑image detection, live‑mode integration with Frigate NVR, and an automated five‑step training pipeline that splits, cleans, and exports datasets.  Docker‑ready and automatically falling back from GPU to CPU, the package also offers AI inference previews, per‑camera event handling, and simple configuration through a single script.  Hobbyists, researchers, and developers building custom object‑detection models for home‑security or other surveillance scenarios will find it an efficient, end‑to‑end solution.","description":"Analyse · Learn · Ingest · Curate · Export — AI-powered YOLO dataset management toolkit","stars":299,"language":"JavaScript"},{"owner":"nateherkai","repo":"token-dashboard","url":"https://github.com/nateherkai/token-dashboard","readme":"# Token Dashboard\n\nA local dashboard that reads the JSONL transcripts Claude Code writes to `~/.claude/projects/` and turns them into per-prompt cost analytics, tool/file heatmaps, subagent attribution, cache analytics, project comparisons, and a rule-based tips engine.\n\n**Everything runs locally.** No data leaves your machine — no telemetry, no API calls for your data, no login.\n\n![Overview tab — totals and daily charts](docs/images/dashboard-overview-top.jpg)\n\n![Overview tab — per-project, per-model, top tools, recent sessions](docs/images/dashboard-overview-bottom.jpg)\n\n## What this is useful for\n\n- Seeing which of your prompts are expensive (surprise: they usually involve large tool results).\n- Comparing token usage across projects you've worked on.\n- Spotting wasteful patterns — the same file read twenty times in a session, a tool call returning 80k tokens.\n- Understanding what a \"cache hit\" actually saves you.\n- If you're on Pro or Max, confirming you're getting your money's worth in API-equivalent dollars.\n\n## Prerequisites\n\n- **Python 3.8 or newer** — already installed on macOS and most Linux. On Windows: `winget install Python.Python.3.12` or download from python.org.\n- **Claude Code** — installed and with at least one session run. The dashboard reads those sessions. If you just installed Claude Code and haven't used it yet, run at least one prompt first.\n- **A web browser.** Any modern one.\n\nNo `pip install`. No Node.js. No build step.\n\n## Quickstart\n\n```bash\ngit clone https://github.com/nateherkai/token-dashboard.git\ncd token-dashboard\npython3 cli.py dashboard\n```\n\n> On Windows, if `python3` isn't on your PATH, substitute `py -3` for `python3` in every command below.\n\nThe command:\n1. Scans `~/.claude/projects/` (first run can take 20–60 seconds on a heavy user's machine).\n2. Starts a local server at http://127.0.0.1:8080.\n3. Opens your default browser to that URL.\n\nLeave it running; it re-scans every 30 seconds and pushes updates live. Stop with `Ctrl+C`.\n\n## Where the data comes from\n\nClaude Code writes one JSONL file per session here:\n\n| OS | Path |\n|---|---|\n| macOS / Linux | `~/.claude/projects/<project-slug>/<session-id>.jsonl` |\n| Windows | `C:\\Users\\<you>\\.claude\\projects\\<project-slug>\\<session-id>.jsonl` |\n\nThe dashboard never modifies those files — it only reads them and keeps a local SQLite cache at `~/.claude/token-dashboard.db`.\n\nTo point at a different location:\n\n```bash\npython3 cli.py dashboard --projects-dir /path/to/projects --db /path/to/cache.db\n```\n\n### Environment variables\n\n| Var | Default | Purpose |\n|---|---|---|\n| `PORT` | `8080` | Port the local web server listens on |\n| `HOST` | `127.0.0.1` | Bind address. Keep the default. Setting `0.0.0.0` exposes your entire prompt history to anyone on your local network — don't do this on any network you don't fully control (no coffee-shop Wi-Fi, no coworking spaces). |\n| `CLAUDE_PROJECTS_DIR` | `~/.claude/projects` | Where to scan for session JSONL files |\n| `TOKEN_DASHBOARD_DB` | `~/.claude/token-dashboard.db` | SQLite cache location |\n\nPricing lives in [`pricing.json`](pricing.json). Edit it directly if model prices change or to add a new plan.\n\n## CLI reference\n\n```bash\npython3 cli.py scan          # populate / refresh the local DB, then exit\npython3 cli.py today         # today's totals (terminal)\npython3 cli.py stats         # all-time totals (terminal)\npython3 cli.py tips          # active suggestions (terminal)\npython3 cli.py dashboard     # scan + serve the UI at http://localhost:8080\n\n# dashboard flags\npython3 cli.py dashboard --no-open   # don't auto-open the browser\npython3 cli.py dashboard --no-scan   # skip the initial scan (use cached DB only)\n```\n\nChange the port: `PORT=9000 python3 cli.py dashboard`.\n\n## The 7 tabs\n\nThe dashboard is a single page with a hash-router tab bar across the top. Each tab is backed by its own JSON API under `/api/`:\n\n- **Overview** — all-time input/output/cache tokens, sessions, turns, estimated cost on your chosen plan, daily work and cache-read charts, tokens-by-project, token share by model, top tools by call count, and recent sessions. This is the landing tab.\n- **Prompts** — your most expensive user prompts ranked by tokens. Click any row to see the assistant response, tool calls made, and the size of each tool result.\n- **Sessions** — turn-by-turn view of any single session, with per-turn tokens and tool calls.\n- **Projects** — per-project comparison: tokens, session counts, and which files were touched most.\n- **Skills** — which skills you invoke most often, and (where we can measure them) their token cost. See [limitations](docs/KNOWN_LIMITATIONS.md#skills-token-counts-are-partial).\n- **Tips** — rule-based suggestions for reducing token usage (repeated file reads, oversized tool results, low cache-hit rate, etc.).\n- **Settings** — switch pricing between API / Pro / Max / Max-20x so cost figures everywhere else reflect your actual plan.\n\nThe Overview tab also has a built-in \"What do these numbers mean?\" panel that explains input/output/cache tokens in plain English.\n\n## Troubleshooting\n\n**\"No data\" or empty charts.** Run `python3 cli.py scan` once to populate the DB, then reload.\n\n**Port 8080 already in use.** `PORT=9000 python3 cli.py dashboard`.\n\n**Numbers look wrong / stuck.** The DB lives at `~/.claude/token-dashboard.db`. Delete it and re-run `python3 cli.py scan` to rebuild from scratch.\n\n**Running the dashboard twice at the same time.** Don't — both processes will fight over the SQLite DB. Stop all instances before starting a new one.\n\n## Accuracy note\n\nClaude Code writes each assistant response 2–3 times to disk while it streams (the same API message gets snapshotted as output grows). The dashboard dedupes these by `message.id` so the final tally matches what the API actually billed. If you compare against another tool that sums every JSONL row, expect this dashboard's numbers to be lower — and closer to reality.\n\n## Privacy\n\nNothing leaves your machine. No telemetry. No remote calls for your data. The browser fetches its JSON from `127.0.0.1`, and all JS/CSS/fonts are served from that same local server — ECharts is vendored into `web/`, and the UI falls back to system fonts rather than pulling from a font CDN. If you want to verify: `grep -r \"https://\" token_dashboard/ web/` — you'll find nothing.\n\n## Tech stack\n\nPython 3 (stdlib only) for the CLI, scanner, and HTTP server. SQLite for the local cache. Vanilla JS + ECharts for the UI, no build step. Dark theme, hash-based router, server-sent events for live refresh.\n\nData flow: `cli.py` → `token_dashboard/scanner.py` → SQLite DB; `token_dashboard/server.py` exposes `/api/*` JSON routes and serves `web/`.\n\n## Further reading\n\n- [`CLAUDE.md`](CLAUDE.md) — conventions and architecture overview (also picked up automatically by Claude Code)\n- [`CONTRIBUTING.md`](CONTRIBUTING.md) — how to develop and test\n- [`docs/KNOWN_LIMITATIONS.md`](docs/KNOWN_LIMITATIONS.md) — rough edges\n- [`docs/inspiration.md`](docs/inspiration.md) — prior art and how this project diverges\n\n## Contributing\n\nSee [`CONTRIBUTING.md`](CONTRIBUTING.md). Short version: fork, `python3 -m unittest discover tests` before opening a PR, keep it stdlib-only.\n\n## License\n\n[MIT](LICENSE).\n","summary":"Token‑Dashboard provides a purely local web interface that parses the JSONL transcript files generated by Claude Code to surface detailed analytics. It displays per‑prompt cost breakdowns, token heatmaps by tool and file, sub‑agent usage, cache‑hit savings, and cross‑project comparisons, plus a rule‑based tips engine. The tool runs end‑to‑end on a single Python process with no external dependencies, inspecting files in `~/.claude/projects/`. Claude‑Code users and other developers who want to audit token usage, spot inefficiencies, and optimize spending can run it with a simple `python cli.py dashboard` command.","description":"See where Claude Code is burning tokens - turn raw JSONL transcripts into local cost analytics, hotspot views, and session-level usage insight.","stars":348,"language":"Python"},{"owner":"kszenes","repo":"moltui","url":"https://github.com/kszenes/moltui","readme":"# MolTUI\n\n**MolTUI** is a terminal **molecular** and **crystallographic** viewer designed for **quick inspection** of **geometries**, **trajectories**, **orbitals** and **normal modes** directly in the **terminal** using **Unicode** characters.\nIdeal for **remote SSH sessions** and **lightweight analyses**.\n\n<img width=\"480\" height=\"480\" alt=\"benzene\" src=\"https://github.com/user-attachments/assets/c71de594-9dd3-4cb4-9754-e86dc663f730\" />\n\n## Installation\n\n```bash\npip install moltui\n# or\nuv tool install moltui\n```\n\n## Usage\n\n```bash\nmoltui <file>\n```\n\n## Features\n\n**MolTUI** is organized in a series of **modes** that can be **cycled** using the `m` (forward) and `M` (backward) keys.\nEach mode opens a respective **sidebar** which can be **toggled** on and off with `S`.\nThe modes consist of **molecular orbitals**, **normal modes** and **geometry** and availability depends on the file format that was opened.\n\n\n### Visualize Orbitals\n\n- The **rendering** of orbitals can be toggled via `o`.\n- **Molden** and **.gbw** files can contain **multiple molecular orbitals**. **Cycle** through MOs with `n`ext and `p`rev.\n\n<img width=\"1512\" height=\"926\" alt=\"image\" src=\"https://github.com/user-attachments/assets/4c1743ba-aff0-4683-92a7-7ebfaa361258\" />\n\n### Analyze Geometry\n\n- **Bond lengths, angles and dihedrals** can be viewed using the `g`eometry key which opens a sidebar. Navigate between tabs via `<tab>`.\n- The quantity is **highlighted in yellow** on the molecule.\n- **Sort** the quantity in increasing magnitude via `s`.\n- **Atom indices** can be toggled via `#`.\n\n<img width=\"1510\" height=\"923\" alt=\"image\" src=\"https://github.com/user-attachments/assets/8a6dab9a-d377-4d16-bfe1-89c83d0763a1\" />\n\n#### Periodic Systems\n\n- **Periodic systems** can be provided using the **extended XYZ** and **CIF** file formats\n- The **toggling** of the **periodicity** is achieved via the `b` key\n- The **rendering of the box** can be toggled in the visual pane\n\n<img width=\"1508\" height=\"899\" alt=\"image\" src=\"https://github.com/user-attachments/assets/5604ec3a-942c-427e-bef6-fc100be8f96c\" />\n\n\n### Animations\n\n#### Trajectories\n\n**Trajectories** can be provided in the **multi-XYZ** file format (essentially multiple XYZ files concatenated together).\n**Toggle** a looping **animation** of the trajectory using `<space>` and **cycle** individual **frames** using `[` and `]`.\nThe **geometry** sidebar values **updates live** with the **current frame**'s geometry.\n\n<img width=\"1200\" height=\"733\" alt=\"geom-opt\" src=\"https://github.com/user-attachments/assets/b66d6cfb-c4ae-4c56-ba9c-3c26a4fcdf20\" />\n\n#### Normal Modes\n\n**Normal modes** can be provided either via the **Molden** or Orca `.hess` file formats.\n**Animation** playing can be **toggled** with `<space>`.\n\n<img width=\"1920\" height=\"1080\" alt=\"normal-modes2\" src=\"https://github.com/user-attachments/assets/c13326ff-e24e-46d6-8b24-818b18bac73c\" />\n\n\n### Export to PNG Format\n\nThe `e` key **exports** the current **scene** to a **PNG**.\n\n<img width=\"800\" height=\"600\" alt=\"benzene_hf 021\" src=\"https://github.com/user-attachments/assets/2ca67320-9053-4b86-989f-b2abfaca8864\" />\n\n### Tune Visuals\n\nThe `V` key opens a sidebar where the **isovalue**, molecule **style** and **lighting** can be modified.\n\n<img width=\"1229\" height=\"877\" alt=\"image\" src=\"https://github.com/user-attachments/assets/177d4c5a-df88-4fb6-8fd7-5b51c0c467ef\" />\n\nThe lower case `v` cycles between the **styles**.\n\n| CPK | Licorice | VDW |\n|--------|--------|--------|\n| ![](https://github.com/user-attachments/assets/304b38f9-5fee-4bbc-89f6-062eb1fb0962) | ![](https://github.com/user-attachments/assets/b96f1780-90c0-49c2-8dd0-784602390f43) | ![](https://github.com/user-attachments/assets/d32b81b4-72b8-4ae5-9312-2ef7a73030bb) |\n\nToggle between **light** and **dark** mode with `i`.\n\n| Light | Dark |\n| --- | --- |\n|![](https://github.com/user-attachments/assets/a82b5220-4eb4-4105-ada3-5ba1778f7dd6) | ![](https://github.com/user-attachments/assets/304b38f9-5fee-4bbc-89f6-062eb1fb0962) |\n\n\n## Supported formats\n\n| Format                | Geometry | Trajectory | Orbitals | Normal Modes |\n|-----------------------|:--------:|:----------:|:--------:|:------------:|\n| **XYZ** / **extXYZ**  | ✓        | ✓          | —        | —            |\n| **CIF**               | ✓        | —          | —        | —            |\n| Gaussian **ZMAT**     | ✓        | —          | —        | —            |\n| Gaussian **Cube**     | ✓        | —          | ✓        | —            |\n| **Molden**            | ✓        | —          | ✓        | ✓            |\n| Gaussian **.fchk**    | ✓        | ✓          | ✓        | ✓            |\n| Orca **.GBW**¹        | ✓        | —          | ✓        | —            |\n| Orca **.hess**        | ✓        | —          | —        | ✓            |\n| **TrexIO**²           | ✓        | —          | ✓        | —            |\n\n✓ supported; — not part of the file format\n\n¹ Requires `orca_2mkl` in `PATH`\n\n² Requires installing `moltui[trexio]`\n\n### Quantum Chemistry Inputs\n\nThe molecular structures can be viewed from the inputs of the following programs\n\n- **Orca**, **Molcas**, **Q-Chem**, **Gaussian**, **NWChem**, **Turbomole**, **Molpro**, **MRCC**, **CFOUR**, **Psi4**, **GAMESS** **Jaguar**\n\n\n## Keybindings\n\n### Navigation\n\n| Key | Action |\n|-----|--------|\n| `h/j/k/l` or arrows | **Rotate** left/down/up/right |\n| `,/.` | **Roll** clockwise/counter-clockwise |\n| `J/K` or `+/-` | **Zoom** out/in |\n| `t` | Toggle **pan/rotation** mode |\n| `c` | **Center** view |\n| `r` | **Reset** view |\n\n### Display\n\n| Key | Action |\n|-----|--------|\n| `o` | Toggle **orbital isosurfaces** |\n| `i` | Toggle **dark/light** theme |\n| `B` | Toggle **bonds** |\n| `b` | Toggle **periodicity** |\n| `e` | **Export** PNG |\n| `v` | Toggle **style** (CPK, Licorice, VDW) |\n| `#` | Toggle **atom numbers** |\n\n### Panels\n\n| Key | Action |\n|-----|--------|\n| `m` / `M` | Cycle sidebar **mode** forward/backward (Geometry, MO, Normal Modes) |\n| `S` | Toggle current **sidebar** (hide/show) |\n| `V` | Toggle **Visual settings** panel |\n| `n/p` | **Next/previous** row in the active sidebar table |\n| `d/u` | Half page **down/up** in datatable |\n| `g/G` | **Top/bottom** of the datatable |\n\n### Geometry panel\n\n| Key | Action |\n|-----|--------|\n| `Tab/Shift+Tab` | Switch **Bonds/Angles/Dihedrals** tab |\n| `s` | Toggle **sort by value** for active tab |\n\n### Visual panel\n\n| Key | Action |\n|-----|--------|\n| `n/p` | Move focus to **next/previous** control |\n| `Tab/Shift+Tab` | **Increase/decrease** focused slider, or cycle style option |\n\n### Animation and modes\n\n| Key | Action |\n|-----|--------|\n| `Space` | Toggle **play/pause** trajectory or normal mode animation |\n| `[` / `]` | Previous/next **animation step** (frame/phase) |\n\n### General\n\n| Key | Action |\n|-----|--------|\n| `q` | **Quit** |\n\n## Known Issues\n\n- Only up to `g`-shells are implemented as this is the highest orbital shell officially supported by the Molden format.\n- The content is rendered using braille Unicode characters and, therefore, the quality of rendering can depend on the font and terminal emulator. All figures in the repository have been generated using the JetBrains Mono Nerd Font in the Kitty terminal. \n- The Orca GBW file format is typically incompatible between versions. Therefore, the `orca_2mkl` should ideally be of the same version as the Orca version used to produce the GBW file. Newer version of Orca can try to recover earlier GBW files using the [rescue](https://orca-manual.mpi-muelheim.mpg.de/contents/quickstartguide/troubleshooting.html#using-old-orca-inputs) feature. \n\n## Acknowledgements\n\nParser tests are cross-validated with data and reference parsers from [IODATA](https://github.com/theochem/iodata), [cclib](https://github.com/cclib/cclib) / [cclib-data](https://github.com/cclib/cclib-data), [PySCF](https://github.com/pyscf/pyscf), and [ASE](https://gitlab.com/ase/ase).\n","summary":"MolTUI is a lightweight terminal-based viewer that renders molecular geometries, crystallographic datasets, orbitals, normal modes, and trajectories using Unicode characters. It offers interactive modes for inspecting bond metrics, animating trajectories or vibrational modes, toggling periodic boundary boxes, and exporting screenshots, all navigated with simple keybindings. The tool is ideal for computational chemists and researchers who need quick, remote, or SSH-accessible visualizations of molecular data without a graphic interface.","description":"A Terminal Molecular Viewer Based on Unicode","stars":130,"language":"Python"},{"owner":"LordAizen1","repo":"git-newspaper","url":"https://github.com/LordAizen1/git-newspaper","readme":"# git-newspaper\n\nGenerate a Victorian broadsheet newspaper from any git repository's commit history.\n\n```bash\nnpx git-newspaper\n```\n\n![preview](https://raw.githubusercontent.com/LordAizen1/git-newspaper/master/preview.png)\n\nOpens `newspaper.html` in your browser, a fully typeset front page built from your actual commits, authors, deleted files, and code churn. No API keys. No LLM. Works offline.\n\n---\n\n## Install\n\n```bash\nnpm install -g git-newspaper\n```\n\nOr run without installing:\n\n```bash\nnpx git-newspaper\n```\n\n## Usage\n\n```bash\n# Run inside any git repo\ngit-newspaper\n\n# Point at a specific repo\ngit-newspaper --repo /path/to/repo\n\n# Scope to recent activity\ngit-newspaper --since \"2 weeks ago\"\ngit-newspaper --since \"2024-01-01\"\n\n# Export as PNG instead of HTML\ngit-newspaper --format png\n\n# Save to a specific file\ngit-newspaper --output my-paper.html\n\n# Limit commits analysed (default: 500)\ngit-newspaper --limit 200\n\n# Don't open the browser automatically\ngit-newspaper --no-open\n```\n\n## What's in the newspaper\n\nEvery section is generated from your actual git data, nothing is made up.\n\n| Section | Source |\n|---|---|\n| **Front page headline** | Your largest commit by lines changed |\n| **Lead article** | Commit authors, file counts, date range |\n| **Meteorological Report** | Commit sentiment and activity pattern |\n| **Obituaries** | Files deleted in the period |\n| **Opinion column** | Your most-modified file, writing about itself |\n| **Vital Statistics** | Commit counts, top authors, churn rankings |\n| **Commit Activity** | Timeline chart of activity over the period |\n| **Classifieds** | Archetype-specific notices based on your repo's patterns |\n\n## Archetypes\n\nThe tool detects what kind of repository it's looking at and adjusts the layout, tone, and content accordingly:\n\n| Archetype | Trigger | Edition |\n|---|---|---|\n| Revert Crisis | >12% of commits are reverts | Crisis Edition |\n| Solo Marathon | One author dominates >70% of commits | Profile Edition |\n| Ghost Town | Fewer than 8 commits | Quiet Edition |\n| Dependency Churn | >35% of commits touch lock files | Administrative Notice |\n| Refactor Sweep | >25% of commits are refactors | Infrastructure Report |\n| Bugfix Crisis | >35% of commits are fixes | Emergency Edition |\n| Feature Sprint | >35% of commits are features | Launch Edition |\n| Collaborative | 5+ authors with 40+ commits | Collaborative Edition |\n| Balanced | Everything else | Morning Edition |\n\n## PNG export\n\nRequires Playwright (not installed by default):\n\n```bash\nnpm install -D playwright\nnpx playwright install chromium\ngit-newspaper --format png\n```\n\n## How it works\n\n- Parses `git log --stat` locally via [simple-git](https://github.com/steveukx/git-js), no GitHub API, no network requests\n- Detects a repository archetype from commit patterns\n- Selects content from archetype-specific template libraries using a seeded RNG (same repo always produces the same paper)\n- Renders a self-contained HTML file with all fonts and styles inline\n\n## Requirements\n\n- Node.js 18 or later\n- A git repository with at least one commit\n\n## License\n\nMIT\n","summary":"git‑newspaper turns a git repository’s changelog into a fully typeset Victorian broadsheet, displaying a headline from the largest commit, a lead article summarising authors and file churn, and a suite of thematic sections such as obituaries for deleted files and a meteorological report on commit sentiment. The tool operates entirely offline, parsing local history and selecting archetype‑specific content through deterministic RNG, and can output an interactive HTML page or a PNG snapshot via Playwright. Developers, project leads, and history‑hungry teams can use it to visualize code activity, celebrate milestones, or quickly assess repository health without any API keys or network calls.","description":"Generate a Victorian broadsheet newspaper from any git repository's history","stars":102,"language":"JavaScript"},{"owner":"FreePeak","repo":"LeanKG","url":"https://github.com/FreePeak/LeanKG","readme":"<p align=\"center\">\n  <img src=\"https://www.leankg.com/icon.svg\" alt=\"LeanKG\" width=\"80\" height=\"80\">\n</p>\n\n# LeanKG\n\n[![License: MIT](https://img.shields.io/badge/License-MIT-blue.svg)](https://opensource.org/licenses/MIT)\n[![Rust](https://img.shields.io/badge/rust-1.75%2B-orange?logo=rust&logoColor=white)](https://www.rust-lang.org/)\n[![crates.io](https://img.shields.io/badge/crates.io-latest-orange)](https://crates.io/crates/leankg)\n[![SafeSkill 77/100](https://img.shields.io/badge/SafeSkill-77%2F100_Passes%20with%20Notes-yellow)](https://safeskill.dev/scan/freepeak-leankg)\n\n**Lightweight Knowledge Graph for AI-Assisted Development**\n\nLeanKG is a local-first knowledge graph that gives AI coding tools accurate codebase context. It indexes your code, builds dependency graphs, and exposes an MCP server so tools like Cursor, OpenCode, and Claude Code can query the knowledge graph directly. No cloud services, no external databases.\n\n\nVisualize your knowledge graph with force-directed layout, WebGL rendering, and community clustering.\n\n![LeanKG Graph Visualization](docs/screenshots/graph.jpeg)\n![LeanKG Obsidian](docs/screenshots/obsidian.jpeg)\n\nSee [docs/web-ui.md](docs/web-ui.md) for more features.\n\n---\n\n## Live Demo\n\nTry LeanKG without installing: **https://leankg.onrender.com**\n\n```bash\nleankg web --port 9000\n```\n\n---\n\n## Installation\n\n### One-Line Install (Recommended)\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/FreePeak/LeanKG/main/scripts/install.sh | bash -s -- <target>\n```\n\n**Supported targets:**\n\n| Target | AI Tool | Auto-Installed |\n|--------|---------|-----------------|\n| `opencode` | OpenCode AI | Binary + MCP + Plugin + Skill + AGENTS.md |\n| `cursor` | Cursor AI | Binary + MCP + Skill + AGENTS.md + Session Hook |\n| `claude` | Claude Code | Binary + MCP + Plugin + Skill + CLAUDE.md + Session Hook |\n| `gemini` | Gemini CLI | Binary + MCP + Skill + GEMINI.md |\n| `kilo` | Kilo Code | Binary + MCP + Skill + AGENTS.md |\n| `antigravity` | Google Antigravity | Binary + MCP + Skill + GEMINI.md |\n\n**Examples:**\n```bash\ncurl -fsSL https://raw.githubusercontent.com/FreePeak/LeanKG/main/scripts/install.sh | bash -s -- cursor\ncurl -fsSL https://raw.githubusercontent.com/FreePeak/LeanKG/main/scripts/install.sh | bash -s -- claude\n```\n\n### Install via Cargo or Build from Source\n\n```bash\ncargo install leankg && leankg --version\n```\n\n```bash\ngit clone https://github.com/FreePeak/LeanKG.git && cd LeanKG && cargo build --release\n```\n\n---\n\n## Quick Start\n\n```bash\nleankg init                              # Initialize LeanKG in your project\nleankg index ./src                        # Index your codebase\nleankg watch ./src                        # Auto-index on file changes\nleankg impact src/main.rs --depth 3       # Calculate blast radius\nleankg status                             # Check index status\nleankg metrics                            # View token savings\nleankg web                                # Start Web UI at http://localhost:8080\nleankg export --format mermaid            # Export graph as Mermaid, DOT, or JSON\nleankg quality --min-lines 50             # Find oversized functions\nleankg detect-clusters                    # Identify functional code communities\nleankg trace --all                        # Show feature-to-code traceability\nleankg annotate src/main.rs::main -d \"Entry point\"  # Annotate code elements\n\n# Run shell commands with RTK compression\nleankg run -- cargo test -- --compress\n\n# REST API server with auth\nleankg api-serve --port 8081 --auth\nleankg api-key create --name my-key\n\n# Process management\nleankg proc status                        # Show running LeanKG/Vite processes\nleankg proc kill                          # Kill all LeanKG/Vite processes\n\n# Obsidian vault sync\nleankg obsidian init                      # Initialize Obsidian vault structure\nleankg obsidian push                      # Push LeanKG data to Obsidian notes\nleankg obsidian pull                      # Pull annotation edits from Obsidian\nleankg obsidian watch                     # Watch vault for changes and auto-pull\nleankg obsidian status                    # Show vault status\n\n# Microservice call graph (via Web UI)\nleankg web                                # Start Web UI at http://localhost:8080\n                                          # Then visit http://localhost:8080/services\n\n# Multi-repo registry\nleankg register my-project                # Register a repository\nleankg list                               # List all registered repos\nleankg setup                              # Configure MCP for all repos + install Claude hooks\n```\n\nSee [docs/cli-reference.md](docs/cli-reference.md) for all commands.\n\n---\n\n## Claude Code Setup\n\nLeanKG auto-triggers in Claude Code sessions via lifecycle hooks that route search intents to LeanKG tools instead of native tools.\n\n```bash\n# Install LeanKG with Claude Code hooks and plugin\nleankg setup\n\n# Then restart Claude Code or run:\n/reload-plugins\n```\n\n**What `leankg setup` installs:**\n- `.claude-plugin/` - Plugin manifest for Claude Code validation\n- `hooks/` - Full lifecycle hooks: Setup, SessionStart, UserPromptSubmit, PreToolUse, PostToolUse, Stop\n- Adds `leankg@local` to `enabledPlugins` in `~/.claude/settings.json`\n\n**Hook lifecycle:**\n- `Setup` - Version gating on startup\n- `SessionStart` - Injects tool selection hierarchy into every session\n- `UserPromptSubmit` - Initializes session context with LeanKG patterns\n- `PreToolUse` - Nudges toward LeanKG when you use Grep/Read/Bash for code analysis\n- `PostToolUse` - Logs LeanKG MCP tool usage for analytics\n- `Stop` - Captures session summary for future context retrieval\n\n---\n\n## How LeanKG Helps\n\n```mermaid\ngraph LR\n    subgraph \"Without LeanKG\"\n        A1[AI Tool] -->|Full codebase context| B1[15,000-45,000 tokens]\n        B1 --> A1\n    end\n\n    subgraph \"With LeanKG\"\n        A2[AI Tool] -->|Targeted subgraph| C[LeanKG Graph]\n        C -->|Context reduction| A2\n    end\n```\n\n**Without LeanKG**: AI processes full context from files found via grep/search.\n**With LeanKG**: AI queries knowledge graph for targeted context. Token reduction varies by task complexity (see [benchmark results](tests/benchmark/results/clean-benchmark-2026-04-21.md)).\n\n---\n\n\n## Highlights\n\n- **Auto-Init** -- Install script configures MCP, rules, skills, and hooks automatically\n- **Auto-Trigger** -- Session hooks inject LeanKG context into every AI tool session\n- **Token Optimized** -- Targeted subgraph retrieval vs full file scanning\n- **Impact Radius** -- Compute blast radius before making changes\n- **Pre-Commit Risk Analysis** -- `detect_changes` classifies risk as critical/high/medium/low\n- **Dependency Graph** -- Build call graphs with `IMPORTS`, `CALLS`, `TESTED_BY` edges\n- **MCP Server** -- Expose graph via MCP protocol for AI tool integration (40 tools)\n- **Orchestration** -- Smart context routing with caching via natural language intent\n- **Community Detection** -- Auto-detect functional clusters in your codebase\n- **Multi-Language** -- Index Go, TypeScript, Python, Rust, Java, Kotlin, Ruby, PHP, Perl, R, Elixir, Bash with tree-sitter\n- **Android** -- Extract XML layouts, resources, manifest relationships, and navigation graphs\n- **Service Topology** -- Microservice call graph visualization\n- **Annotation Search** -- Search code by `@Entity`, `@HiltViewModel`, and other annotations\n- **Graph Export** -- Export as JSON, DOT, or Mermaid formats\n- **REST API** -- Full REST API with auth and API key management\n- **RTK Compression** -- Run shell commands with token-saving compression\n\nSee [docs/architecture.md](docs/architecture.md) for system design and data model details.\n\n---\n\n## Supported AI Tools\n\n| Tool | Auto-Setup | Session Hook | Plugin | Full Lifecycle Hooks |\n|------|------------|--------------|--------|---------------------|\n| Cursor | Yes | session-start | - | - |\n| Claude Code | Yes | session-start | Yes | Setup, SessionStart, UserPromptSubmit, PreToolUse, PostToolUse, Stop |\n| OpenCode | Yes | - | Yes | - |\n| Kilo Code | Yes | - | - | - |\n| Gemini CLI | Yes | - | - | - |\n| Google Antigravity | Yes | - | - | - |\n| Codex | Yes | - | - | - |\n\n> **Note:** Cursor requires per-project installation. The AI features work on a per-workspace basis, so LeanKG should be installed in each project directory where you want AI context injection.\n\nSee [docs/agentic-instructions.md](docs/agentic-instructions.md) for detailed setup and auto-trigger behavior.\n\n---\n\n## Context Metrics\n\nTrack token savings to understand LeanKG's efficiency.\n\n```bash\nleankg metrics --json              # View with JSON output\nleankg metrics --since 7d           # Filter by time\nleankg metrics --tool search_code   # Filter by tool\n```\n\nSee [docs/metrics.md](docs/metrics.md) for schema and examples.\n\n---\n\n## Update\n\n```bash\n# Check current version\nleankg version\n\n# Update LeanKG binary (kills processes, removes old binary, installs hooks)\nleankg update\n\n# Or via install script\ncurl -fsSL https://raw.githubusercontent.com/FreePeak/LeanKG/main/scripts/install.sh | bash -s -- update\n\n# Obsidian vault sync\nleankg obsidian init                      # Initialize Obsidian vault\nleankg obsidian push                      # Push LeanKG data to Obsidian notes\nleankg obsidian pull                      # Pull annotation edits from Obsidian\n```\n\n\n---\n\n## Documentation\n\n| Doc | Description |\n|-----|-------------|\n| [docs/cli-reference.md](docs/cli-reference.md) | All CLI commands |\n| [docs/mcp-tools.md](docs/mcp-tools.md) | MCP tools reference |\n| [docs/agentic-instructions.md](docs/agentic-instructions.md) | AI tool setup & auto-trigger |\n| [docs/architecture.md](docs/architecture.md) | System design, data model |\n| [docs/web-ui.md](docs/web-ui.md) | Web UI features |\n| [docs/metrics.md](docs/metrics.md) | Metrics schema & examples |\n| [docs/benchmark.md](docs/benchmark.md) | Performance benchmarks |\n| [docs/roadmap.md](docs/roadmap.md) | Feature planning |\n| [docs/tech-stack.md](docs/tech-stack.md) | Tech stack & structure |\n| [docs/android-extraction.md](docs/android-extraction.md) | Android XML & resource extraction |\n\n---\n\n## Troubleshooting\n\n### Database Lock Error\n\nIf you see `database is locked (code 5)`, another LeanKG process is holding the database:\n\n```bash\n# Kill all leankg and vite processes\nleankg-kill\n\n# Or manually\npkill -9 -f \"leankg\"\npkill -9 -f \"vite\"\n```\n\n### Process Management\n\n```bash\nleankg proc kill        # Kill all leankg and vite processes\nleankg proc status      # Show running leankg/vite processes\n```\n\n**Important:** Always kill the web server before indexing to avoid database lock conflicts.\n\n---\n\n## Performance Benchmarks\n\n### Load Test Results (100K nodes)\n\n| Operation | Throughput |\n|-----------|------------|\n| Insert elements | ~57,618 elements/sec |\n| Insert relationships | ~67,067 relationships/sec |\n| Retrieve all elements | ~418,718 elements/sec |\n| Cache speedup (cold to warm) | 345-461x |\n\nRun load tests:\n```bash\ncargo test --release load_test -- --nocapture\n```\n\n### A/B Benchmark Results\n\nSee [tests/benchmark/results/clean-benchmark-2026-04-21.md](tests/benchmark/results/clean-benchmark-2026-04-21.md) for detailed A/B testing results comparing LeanKG vs baseline code search.\n\n---\n\n## Requirements\n\n- Rust 1.75+\n- macOS or Linux\n\n---\n\n## License\n\nMIT\n\n---\n\n## Star History\n\n<a href=\"https://www.star-history.com/?repos=FreePeak%2FLeanKG&type=date&legend=top-left\">\n <picture>\n   <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://api.star-history.com/chart?repos=FreePeak/LeanKG&type=date&theme=dark&legend=top-left\" />\n   <source media=\"(prefers-color-scheme: light)\" srcset=\"https://api.star-history.com/chart?repos=FreePeak/LeanKG&type=date&legend=top-left\" />\n   <img alt=\"Star History Chart\" src=\"https://api.star-history.com/chart?repos=FreePeak/LeanKG&type=date&legend=top-left\" />\n </picture>\n</a>\n","summary":"LeanKG is a lightweight, local‑first knowledge graph that indexes codebases and builds dependency graphs so AI coding assistants can query accurate, on‑device context without cloud services. It offers features such as real‑time indexing, blast‑radius impact analysis, token‑savings metrics, graph visualization, and export to formats like Mermaid or DOT, plus an MCP/Rocket‑based API, Web UI, and Obsidian integration. The tool runs from the command line or via cargo, supports auto‑installation hooks for popular AI platforms (OpenCode, Cursor, Claude, Gemini, etc.), and can be started with a single script or as a background agent. Developers, AI‑assistive‑tool creators, and teams seeking privacy‑preserving, context‑aware code analysis would find LeanKG useful.","description":"LeanKG: Stop Burning Tokens. Start Coding Lean.","stars":180,"language":"Rust"},{"owner":"NYCU-Chung","repo":"cc-statusline","url":"https://github.com/NYCU-Chung/cc-statusline","readme":"# cc-statusline\n\n**English · [繁體中文](./README.zh-TW.md)**\n\nA comprehensive statusline dashboard for Claude Code. See everything at a glance — no slash commands needed.\n\n![Demo](./images/demo-en.png)\n\n## What it shows\n\n| Section | Info |\n|---------|------|\n| **session summary** | Auto-generated whole-session summary (Claude rewrites it every ~10 messages with built-in compression so it stays under ~120 chars) |\n| **directory** | Current working directory + `+added -removed lines` |\n| **repo + branch** | `owner/repo` (parsed from `git remote`) + branch + `(N changed)` |\n| **cost** | `cost $TOTAL (<window>) · $SESSION (this session)` — all-session spend rendered as parallel parenthetical annotations. Window defaults to all time; set `aggWindowDays` in `~/.claude/cc-statusline-rows.json` for a rolling view (e.g. `7` / `30` / `90`). |\n| **model** | Active model name + effort level with 5-tier color ladder (`low` dim / `medium` green / `high` yellow / `xhigh` orange / `max` red) |\n| **duration** | Active session time — sum of every turn's wall-clock duration (UserPromptSubmit → Stop). Inter-turn idle is naturally excluded, no idle threshold needed. Shares the model row area visually but toggles independently (`/cc-statusline:rows hide duration`). |\n| **tokens / context / compact** | `tokens TOTAL (SESSION this session)` (same all+session dual display as cost) · context window % · compact count (`compact 1 time` / `compact N times`) |\n| **5h-quota** | Color-coded bar (green → yellow → red) + auto-rolling `resets Xh Ym` countdown. Auto-zeros when `resets_at` passes real-world time (payload is stale until next message). |\n| **7d-quota** | Color-coded bar + auto-rolling `resets Xd Yh` countdown with same rollover behavior |\n| **agents** | Subagents that ran in this session — `critic ✓ 5m ago`, parallel runs collapse to `critic ○×3` (running) or `critic ✓×2 5m ago` (done) |\n| **memory** | Which CLAUDE.md scopes are loaded (global / project / rules) |\n| **mcp** | MCP server health probed via `claude mcp list` — count of active + each unhealthy server with its state (`✘ failed`, `△ needs auth`) |\n| **edited** | Recently edited files in this session, newest first (long names front-truncated with `…`) |\n| **history** | Right column showing the last messages (▶ you, ◀ Claude), grows to fill terminal width |\n\n## Install\n\n### Option A — plugin install (recommended)\n\n```\nclaude plugin marketplace add NYCU-Chung/cc-statusline\nclaude plugin install cc-statusline@cc-statusline\n```\n\nHooks are registered automatically (via the plugin's own `hooks/hooks.json`), so you can **skip the Hook wiring section below**.\n\nThen add the `statusLine` block to `~/.claude/settings.json` — Claude Code doesn't allow plugins to set this for you:\n\n```json\n{\n  \"statusLine\": {\n    \"type\": \"command\",\n    \"command\": \"node ${CLAUDE_PLUGIN_ROOT}/statusline.js\",\n    \"refreshInterval\": 30\n  }\n}\n```\n\n### Option B — manual install (for hacking on the script)\n\nPick the block that matches your shell. **`~` is expanded by bash/zsh before `git` sees it, but PowerShell and cmd don't expand it** — using `~` there makes `git clone` create a literal `~` folder (reported in [#6](https://github.com/NYCU-Chung/cc-statusline/issues/6)). Use `$HOME` / `%USERPROFILE%` instead.\n\n**bash / zsh / Git Bash on Windows**\n```bash\ngit clone https://github.com/NYCU-Chung/cc-statusline ~/cc-statusline\nmkdir -p ~/.claude/hooks\ncp ~/cc-statusline/statusline.js ~/.claude/statusline.js\ncp ~/cc-statusline/hooks/*.js ~/.claude/hooks/\n```\n\n**PowerShell**\n```powershell\ngit clone https://github.com/NYCU-Chung/cc-statusline \"$HOME/cc-statusline\"\nNew-Item -ItemType Directory -Force \"$HOME/.claude/hooks\" | Out-Null\nCopy-Item \"$HOME/cc-statusline/statusline.js\" \"$HOME/.claude/statusline.js\"\nCopy-Item \"$HOME/cc-statusline/hooks/*.js\" \"$HOME/.claude/hooks/\"\n```\n\n**Windows cmd**\n```cmd\ngit clone https://github.com/NYCU-Chung/cc-statusline \"%USERPROFILE%\\cc-statusline\"\nmkdir \"%USERPROFILE%\\.claude\\hooks\" 2>nul\ncopy \"%USERPROFILE%\\cc-statusline\\statusline.js\" \"%USERPROFILE%\\.claude\\statusline.js\"\ncopy \"%USERPROFILE%\\cc-statusline\\hooks\\*.js\" \"%USERPROFILE%\\.claude\\hooks\\\"\n```\n\nThen add this `statusLine` block to `~/.claude/settings.json`:\n\n```json\n{\n  \"statusLine\": {\n    \"type\": \"command\",\n    \"command\": \"node ~/.claude/statusline.js\",\n    \"refreshInterval\": 30\n  }\n}\n```\n\n### Hook wiring (Option B only — plugin install does this automatically)\n\nAdd these to your `~/.claude/settings.json` hooks section to enable all statusline features:\n\n```json\n{\n  \"hooks\": {\n    \"SubagentStart\": [{ \"matcher\": \".*\", \"hooks\": [{ \"type\": \"command\", \"command\": \"node ~/.claude/hooks/subagent-tracker.js\" }] }],\n    \"SubagentStop\": [{ \"matcher\": \".*\", \"hooks\": [{ \"type\": \"command\", \"command\": \"node ~/.claude/hooks/subagent-tracker.js\" }] }],\n    \"PreCompact\": [{ \"matcher\": \".*\", \"hooks\": [{ \"type\": \"command\", \"command\": \"node ~/.claude/hooks/compact-monitor.js\" }] }],\n    \"UserPromptSubmit\": [{ \"hooks\": [\n      { \"type\": \"command\", \"command\": \"node ~/.claude/hooks/message-tracker.js\" },\n      { \"type\": \"command\", \"command\": \"node ~/.claude/hooks/summary-updater.js\" },\n      { \"type\": \"command\", \"command\": \"node ~/.claude/hooks/active-time-tracker.js\" }\n    ]}],\n    \"Stop\": [{ \"matcher\": \".*\", \"hooks\": [\n      { \"type\": \"command\", \"command\": \"node ~/.claude/hooks/message-tracker.js\" },\n      { \"type\": \"command\", \"command\": \"node ~/.claude/hooks/active-time-tracker.js\" }\n    ]}],\n    \"PostToolUse\": [{ \"matcher\": \"Write|Edit\", \"hooks\": [\n      { \"type\": \"command\", \"command\": \"node ~/.claude/hooks/file-tracker.js\" }\n    ]}]\n  }\n}\n```\n\n## What each hook does\n\n| Hook | Event | Purpose |\n|------|-------|---------|\n| `subagent-tracker.js` | SubagentStart / SubagentStop | Tracks which agents are running or finished, including concurrent invocations |\n| `compact-monitor.js` | PreCompact | Counts how many times context was compacted |\n| `file-tracker.js` | PostToolUse (Write/Edit) | Records recently edited files |\n| `message-tracker.js` | UserPromptSubmit / Stop | Caches recent messages for the history column |\n| `summary-updater.js` | UserPromptSubmit | Every ~10 messages, asks Claude to rewrite the whole-session summary with compression rules |\n| `active-time-tracker.js` | UserPromptSubmit / Stop | Maintains active session time (sum of turn durations) — bootstraps from transcript on first run, then accumulates per turn |\n| `mcp-status-refresh.js` | (none — auto-spawned) | Statusline launches this in the background each render to refresh `~/.claude/mcp-status-cache.json` from `claude mcp list`. Self-skips if cache is fresh (<90s). |\n\n## How it survives resets and multi-session\n\n**Delta-based cost / lines / tokens.** Claude Code occasionally resets `cost.total_cost_usd` etc. mid-session (context compaction, auto-recovery, etc.). The statusline tracks deltas in `/tmp/claude-cum-<sid>.json` — when the payload value drops, only the baseline is reset; the cumulative total never goes backward. (Active session time follows a separate path — see \"Per-feature state isolation\" below.)\n\n**Defensive per-session keying via transcript filename.** Every per-session tmp file (cum, messages, summary, agents, files, compact count) is keyed by `path.basename(transcript_path)` rather than the runtime `session_id` payload, falling back to `session_id` only when no transcript is present. The transcript filename is the canonical UUID of the logical session and is invariant for its lifetime, so this keying stays correct even if `session_id` semantics ever shift. (Empirically on the current Claude Code build, `session_id` and the transcript filename UUID are already identical — the choice is preventive, not a bug fix.)\n\n**Active session time, hook-driven.** The `duration` row is the sum of (`Stop` timestamp − `UserPromptSubmit` timestamp) for every turn, maintained by `hooks/active-time-tracker.js`. The first run on a session bootstraps from the transcript JSONL by replaying user→assistant timestamp pairs. Because every slice is bounded by an open turn, idle time outside turns is naturally excluded — no threshold, no heuristic.\n\n**Persistent state lives under `~/.claude/cc-statusline/`, not `tmpdir`.** All per-session accumulation files (`cum`, `active`, `summary`, `msgs`, `msgcount`, `agents`, `files`, `compacts`) sit under a dedicated dir in the user's `~/.claude/` rather than `os.tmpdir()`. The OS treats tmpdir as throwaway — Windows Storage Sense clears it on a 30-day cycle, `cleanmgr` / antivirus on whim, `/tmp` resets on Linux reboot — which was the root cause be
