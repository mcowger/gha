CKENDS=1\n```\n\n### Supported Providers\n\n| Provider | Platforms | Auto-detected paths |\n|----------|-----------|-------------------|\n| **Copilot CLI** (always on) | All | `~/.copilot/session-store.db`, `~/.copilot/session-state/` |\n| **VS Code** (opt-in) | Linux, macOS, WSL | `~/.config/Code/...`, `~/Library/Application Support/Code/...`, `~/.vscode-server/...` |\n| **JetBrains** (opt-in) | Linux, macOS | `~/.config/JetBrains/`, `~/.config/github-copilot` |\n| **Neovim** (opt-in) | Linux, macOS | `~/.local/share/nvim/`, `~/.config/github-copilot` |\n\n### Lookback Defaults\n\n| Storage type | Default window | Override |\n|-------------|---------------|---------|\n| SQLite (Copilot CLI) | 30 days | `--days N` |\n| JSONL / file backends | 5 days | `--days N` or `SESSION_RECALL_JSONL_DAYS=N` |\n\n### Trust Model\n\nFile-backed content is marked `_trust_level: \"untrusted_third_party\"` and wrapped in sentinel fences (`<<UNTRUSTED-FILE-BACKED-CONTENT>>`). CLI content is `_trust_level: \"trusted_first_party\"`. Downstream agents can use these markers to fence untrusted content.\n\n### Environment Variables\n\n| Variable | Default | Description |\n|----------|---------|-------------|\n| `SESSION_RECALL_ENABLE_FILE_BACKENDS` | `0` | Set to `1` to enable VS Code/JetBrains/Neovim providers |\n| `SESSION_RECALL_JSONL_DAYS` | `5` | Default lookback for file-backed providers |\n| `SESSION_RECALL_DB` | `~/.copilot/session-store.db` | Override SQLite path |\n| `SESSION_RECALL_CLI_STATE_ROOT` | `~/.copilot/session-state` | Override JSONL state dir |\n| `SESSION_RECALL_VSCODE_STORAGE` | auto-detected | Override VS Code workspace path |\n| `SESSION_RECALL_JETBRAINS_ROOT` | auto-detected | Override JetBrains path |\n| `SESSION_RECALL_NEOVIM_ROOT` | auto-detected | Override Neovim path |\n\n## Health Check\n\n`session-recall health` runs a multi-dimensional diagnostic. The core 9 dimensions check your Copilot CLI SQLite database:\n\n```\nsession-recall health\n\nDim Name                   Zone     Score  Detail\n----------------------------------------------------------------------\n 1  DB Freshness           🟢 GREEN   8.0  15.8h old\n 2  Schema Integrity       🟢 GREEN  10.0  All tables/columns OK\n 3  Query Latency          🟢 GREEN  10.0  1ms\n 4  Corpus Size            🟢 GREEN  10.0  399 sessions\n 5  Summary Coverage       🟢 GREEN   7.4  92% (367/399)\n 6  Repo Coverage          🟢 GREEN  10.0  8 sessions for owner/repo\n 7  Concurrency            🟢 GREEN  10.0  busy=0.0%, p95=48ms\n 8  E2E Probe              🟢 GREEN  10.0  list→show OK\n 9  Progressive Disclosure  ⚪ CALIBRATING  —  Collecting baseline (n=42/200)\n```\n\n### Per-Provider Health\n\nUse `--provider` to diagnose a specific backend. Each provider gets 4 sub-dimensions:\n\n| Dimension | What it checks |\n|-----------|---------------|\n| **Path Discovery** | Are the expected directories/DB files present on this machine? |\n| **File Inventory** | How many session files or DB size? Is there data to read? |\n| **Recent Activity** | Sessions within the lookback window (5 days JSONL / 30 days SQLite)? |\n| **Trust Model** | First-party (Copilot CLI) or third-party (VS Code/JetBrains/Neovim)? |\n\n```\nsession-recall health --provider cli\n\n 10 Provider:cli\n      ├─ Path Discovery     🟢 GREEN  10.0  2 path(s) found\n      ├─ File Inventory     🟢 GREEN  10.0  DB 13656064 bytes, 457 state file(s)\n      ├─ Recent Activity    🟢 GREEN  10.0  20 session(s) in last 30d\n      └─ Trust Model        🟢 GREEN  10.0  Trusted first-party; fences disabled\n```\n\n```\nsession-recall health --provider vscode\n\n 10 Provider:vscode\n      ├─ Path Discovery     🟢 GREEN  10.0  1 path(s) found\n      ├─ File Inventory     🟢 GREEN  10.0  12 file(s)\n      ├─ Recent Activity    🔴 RED     0.0  No sessions in last 5d\n      └─ Trust Model        🟢 GREEN  10.0  Untrusted third-party; output fences enabled\n```\n\nAvailable providers: `cli`, `vscode`, `jetbrains`, `neovim`, `all`\n\n**JSON output** for agent parsing:\n\n```bash\nsession-recall health --provider vscode --json\n# Returns structured JSON with providers.vscode.dimensions[] array\n```\n\n**Not enabled?** If you see `error: vscode provider is not enabled`, set the env var first:\n\n```bash\nexport SESSION_RECALL_ENABLE_FILE_BACKENDS=1\n# Or follow the full guide: deploy/install-other-backends.md\n```\n\n## Agent Integration\n\nauto-memory works with **any agent that supports instruction files** — GitHub Copilot CLI, Claude Code, Cursor, Aider, Windsurf, and more. Installation wires session-recall into your agent's instruction file so it runs context recall automatically.\n\nSee [`deploy/install.md`](deploy/install.md) for setup and [`copilot-instructions-template.md`](copilot-instructions-template.md) for integration patterns.\n\nSee [`UPGRADE-COPILOT-CLI.md`](UPGRADE-COPILOT-CLI.md) for schema validation after Copilot CLI upgrades.\n\n## What This Isn't\n\n- **Not a vector database** — no embeddings, SQLite FTS5 only.\n- **Not cross-machine sync** — local only.\n- **Not a replacement for project documentation** — recalls *what you did*, not *how the system works*.\n\n## FAQ\n\n**Is it safe? Does it modify my session data?**\nNo. auto-memory is strictly read-only. It never writes to `~/.copilot/session-store.db`.\n\n**What happens when Copilot CLI updates its schema?**\nRun `session-recall schema-check` to validate. The tool fails fast on schema drift rather than returning bad data. See [UPGRADE-COPILOT-CLI.md](UPGRADE-COPILOT-CLI.md).\n\n## Roadmap\n\nSee [ROADMAP.md](ROADMAP.md).\n\n## Contributing\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for setup and guidelines. Issues, PRs, and docs improvements are welcome.\n\n⭐ **If auto-memory saved you time, [star the repo](https://github.com/dezgit2025/auto-memory)** — it's the best way to help others find it.\n\n🔗 **Share it:** *\"Zero-dependency CLI that gives your AI coding agent session memory. Read-only, schema-checked, ~50 tokens per prompt.\"* → [github.com/dezgit2025/auto-memory](https://github.com/dezgit2025/auto-memory)\n\n## Disclaimer\n\nThis is an independent open-source project. It is **not** affiliated with, endorsed by, or supported by Microsoft, GitHub, or any other company. There is no official support — use at your own risk. Contributions and issues are welcome on GitHub.\n\n## Contributors\n\n- [@jshessen](https://github.com/jshessen) — Multi-storage provider architecture ([PR #5](https://github.com/dezgit2025/auto-memory/pull/5))\n\n## License\n\nMIT\n","summary":"**auto‑memory** gives AI coding assistants an instant memory engine by turning the local SQLite database used by tools like GitHub Copilot CLI into a fast full‑text index that can be queried with a lightweight CLI. It adds zero‑dependency, token‑efficient commands to list, summarize, and retrieve past coding sessions, and now supports Claude Code JSONL files as well as adapters for VS Code, JetBrains, and Neovim. Developers who work within Copilot‑powered or Claude‑based workflows are the primary audience, as the tool lets them pull up context from their last several sessions without any API calls or external servers. A quick installation via `pip install auto-memory` or the optional backend packages hooks the value into existing tools, enabling agents to remember what projects and branches you were working on and how many turns were in each session.","description":"Your AI coding agent never forgets — progressive session recall CLI","stars":323,"language":"Python"},{"owner":"vmi-rs","repo":"ephemera","url":"https://github.com/vmi-rs/ephemera","readme":"# ephemera\n\nMultiplatform windows kernel crash dump analysis tool with a WinDbg flavor.\n\n### Motivation\n\nThis is another episode from the series \"there doesn't seem to exist such\nthing\".\n\nI often find myself needing to analyze Windows kernel crash dumps on non-Windows\nplatforms. Surprisingly, WinDbg/cdb <abbr title=\"doesn't run at all\">runs rather\npoorly under Wine</abbr>. Also, even on Windows, WinDbg is notoriously slow.\n\nI also thought this would be a fun showcase for the [vmi-rs] framework.\n\nInitially, I planned to make `ephemera` a general-purpose memory forensics\nframework - similar to Volatility or Rekall - but I quickly realized that the\nscope of such a project is incompatible with the amount of time I can\nrealistically dedicate to this.\n\nMaybe, some day. Who knows.\n\n### Features\n\n- Supports symbol caching and PDB downloading/parsing via the [`isr`].\n- Supports only Windows kernel crash dumps (i.e. `MEMORY.DMP` files).\n- Supports only AMD64 architecture.\n- Supports only a small subset of WinDbg commands (see below).\n- It's fast. Really fast. `!process 0 7` takes _minutes_ in WinDbg.\n  In `ephemera`, it takes about 1 second on a 4GB dump (if all symbols are\n  already cached).\n\n### Demo\n\n<video src=\"https://github.com/user-attachments/assets/13cd6e4e-cfef-44c5-83a5-c984e2cd7c97\" controls autoplay loop></video>\n\n### Usage\n\nHere's a short list of currently supported commands:\n\n```\nCommands:\n  !analyze                             Analyze the crash.\n  !process [Proc [Flags [Image]]]      Information about a process or all processes.\n                                       Proc: PID, EPROCESS addr, 0 (all), -1 (current).\n  !thread  [Thread [Flags]]            Information about a thread or all threads.\n                                       Thread: TID, ETHREAD addr, 0 (all), -1 (current).\n  dt <type> [address]                  Display type layout, optionally at an address.\n  db  [Address [L<Count> | Address2]]  Display memory as bytes and ASCII.\n                                       Address: hex, 0n<decimal>, register, or module!symbol.\n                                                Arithmetic: a+b, a-b. Empty module means nt.\n  dd  [Address [L<Count> | Address2]]  Display memory as DWORDs.\n  dq  [Address [L<Count> | Address2]]  Display memory as QWORDs.\n  dp  [Address [L<Count> | Address2]]  Alias for dq on 64-bit.\n  dps [Address [L<Count> | Address2]]  Display memory as QWORDs with symbols.\n  k  [FrameCount]                      Display stack backtrace: Child-SP, RetAddr, Call Site.\n  kb [FrameCount]                      As k, plus the first four home-space args per frame.\n  kc [FrameCount]                      As k, Call Site only.\n  kv [FrameCount]                      As kb, plus TrapFrame @ addr for trap-handler frames.\n  r [Reg]                              Display registers.\n                                       Reg: rax..r15, rip, rsp, rbp, cs/ds/es/fs/gs/ss, efl.\n  .process [/r] [/p] <address>         Set the process context.\n  .thread  [/r] [/p] <address>         Set the register context to a thread.\n  ~<n>                                 Change the current processor.\n  .help, help, ?                       Show this list.\n  q, quit, .quit                       Exit the REPL.\n```\n\n### FAQ\n\n- Could it be made into a full-fledged debugger, with support for live\n debugging, breakpoints, ...?\n\n  > Yes! Quite easily, actually. `vmi-rs` supports multiple backend drivers,\n  > so it's just a matter of replacing [`VmiKdmpDriver`] with [something else].\n  > Implementing a new driver is also pretty straightforward - for read-only\n  > operations you only need to implement [`VmiRead`] trait.\n\n# License\n\nThis project is licensed under the MIT license.\n\n[vmi-rs]: https://github.com/vmi-rs/vmi\n[isr]: https://github.com/vmi-rs/isr\n[Volatility]: https://github.com/volatilityfoundation/volatility3\n[Rekall]: https://github.com/google/rekall\n[`VmiRead`]: https://docs.rs/vmi/latest/vmi/trait.VmiRead.html\n[`VmiKdmpDriver`]: https://docs.rs/vmi/0.6.0/vmi/driver/kdmp/struct.VmiKdmpDriver.html\n[something else]: https://docs.rs/vmi/0.6.0/vmi/driver/index.html\n","summary":"ephemera is a fast, cross‑platform tool for analyzing Windows kernel crash dumps, offering a WinDbg‑like command set but designed to run comfortably on non‑Windows systems. It supports symbol caching and PDB download via the `isr` library, handling only AMD64 `MEMORY.DMP` files and a curated selection of WinDbg commands such as `!process`, `!thread`, and stack trace commands. The project demonstrates the `vmi‑rs` framework’s ability to deliver quick, memory‑forensics lookups, with operations that can complete in seconds where WinDbg would take minutes. Security researchers, incident responders, and system developers who need to inspect kernel crash dumps on Linux or macOS will find ephemera a lightweight and efficient alternative to the full Windows debugger.","description":"Multiplatform MEMORY.DMP analysis tool with a WinDbg flavor","stars":147,"language":"Rust"},{"owner":"Lauwed","repo":"tabula-docs","url":"https://github.com/Lauwed/tabula-docs","readme":"# Tabula\n\n**Static, dependency-free API documentation driven by a single JSON file.**\n\n[![npm](https://img.shields.io/npm/v/tabula-docs)](https://www.npmjs.com/package/tabula-docs)\n[![license](https://img.shields.io/github/license/Lauwed/tabula-docs)](./LICENSE)\n[![CI](https://github.com/Lauwed/tabula-docs/actions/workflows/ci.yml/badge.svg)](https://github.com/Lauwed/tabula-docs/actions)\n\n🔗 **[Live demo](https://lauwed.github.io/tabula-docs/)**\n\n<img width=\"1710\" height=\"1004\" alt=\"image\" src=\"https://github.com/user-attachments/assets/583c95d1-bc84-4363-b95c-2e36298e8bbe\" />\n\n---\n\n> [!NOTE]\n> Most of the non-source files in this repository — documentation, CI workflows, CLI scripts, and configuration — were largely generated with the help of [Claude](https://claude.ai). The source files (`src/`) were written by hand and reviewed carefully. That said, if you spot anything insecure or incorrect anywhere in the repo, please don't hesitate to [open an issue](https://github.com/Lauwed/tabula-docs/issues) or submit a PR — all reports are welcome and appreciated.\n\n---\n\n## Why Tabula?\n\n- **Zero runtime dependencies.** Pure HTML + CSS + vanilla JavaScript. No React, no build step, no `node_modules` to serve.\n- **One source of truth.** Edit `api.json`, reload — your docs are up to date.\n- **Framework agnostic.** PHP, Go, Python, Rust, Node — Tabula doesn't care what's behind your API.\n- **Machine-validated.** A built-in linter catches schema errors before they reach the browser.\n- **Themeable.** Colors, fonts, logo, dark mode — all from the `settings` block, no CSS editing needed.\n\n---\n\n## Quickstart\n\n```bash\n# 1. Scaffold a new docs folder\nnpx tabula-docs init my-docs\n\n# 2. Edit your API schema\ncd my-docs && $EDITOR api.json\n\n# 3. Preview locally\nnpx tabula-docs serve .\n```\n\nOpen [http://localhost:3000](http://localhost:3000). Done.\n\n---\n\n## Manual setup\n\nNo CLI needed. Copy `src/` into your project, drop your `api.json` next to `index.html`, and serve with any static server.\n\n```\nmy-docs/\n├── index.html\n├── assets/\n│   ├── images/\n│   ├── scripts/\n│   │   ├── pretty-json.js\n│   │   ├── constants.js\n│   │   ├── endpoints.js\n│   │   ├── inputs.js\n│   │   └── script.js\n│   └── styles/\n│       └── styles.css\n└── api.json        ← your file\n```\n\n---\n\n## Validate your schema\n\n```bash\nnpx tabula-docs validate path/to/api.json\n```\n\nExit `0` = all clear. Exit `1` = errors to fix before deploying.\nSee [`docs/validator.md`](docs/validator.md) for the full list of checks.\n\n---\n\n## Examples\n\n| Example                                              | Description                                                  |\n| ---------------------------------------------------- | ------------------------------------------------------------ |\n| [`examples/minimal/`](examples/minimal/api.json)     | Two tables, ready in 30 seconds                              |\n| [`examples/blog/`](examples/blog/api.json)           | Realistic CRUD — posts, users, tags, pagination              |\n| [`examples/ecommerce/`](examples/ecommerce/api.json) | Advanced — multipart uploads, order state machine, full auth |\n\n---\n\n## Documentation\n\n| Doc                                                    | Content                                         |\n| ------------------------------------------------------ | ----------------------------------------------- |\n| [`docs/getting-started.md`](docs/getting-started.md)   | CLI and manual setup walkthrough                |\n| [`docs/schema-reference.md`](docs/schema-reference.md) | Complete `api.json` field reference             |\n| [`docs/theming.md`](docs/theming.md)                   | Colors, fonts, logo, dark mode                  |\n| [`docs/custom-endpoints.md`](docs/custom-endpoints.md) | Non-CRUD endpoints, file uploads                |\n| [`docs/validator.md`](docs/validator.md)               | Linter usage and GitHub Actions integration     |\n| [`docs/deployment.md`](docs/deployment.md)             | GitHub Pages, Vercel, Netlify, Cloudflare Pages |\n\n---\n\n## Contributing\n\nContributions are welcome. See [`CONTRIBUTING.md`](CONTRIBUTING.md) for setup instructions, commit conventions, and the PR process.\n\n---\n\n## License\n\n[MIT](./LICENSE) © Lauwed\n","summary":"Tabula‑docs is a lightweight, static framework for publishing API documentation that relies on a single JSON file as the source of truth. It offers a truly zero‑dependency solution—pure HTML, CSS, and vanilla JavaScript—while providing automated schema linting, a flexible theming system, and support for non‑CRUD endpoints such as file uploads. The tool is framework‑agnostic and can be scaffolded or embedded into any static site with minimal effort. Developers, product teams, and technical writers who need quick, well‑structured API docs can generate and validate content locally before deploying it to GitHub Pages, Vercel, or other hosting services.","description":"Static, dependency-free API documentation driven by a single JSON file.","stars":125,"language":"JavaScript"}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
