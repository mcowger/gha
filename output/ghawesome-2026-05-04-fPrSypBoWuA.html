ld be able to use USB devices\" to that group.\n3. Adding the `uaccess` \"tag\" attribute to udev's internal model of devices and then relying on [systemd](https://systemd.io/) to dynamically change permissions based on its model of who is \"physically logged in\" to the computer.\n\nDespite its complexity, option 3 is the current recommended best practice.\n\nThe differences between these options are most relevant for certain specific use cases, such as remotely logging in to a computer (meaning that you are not physically sitting in front of the computer and able to touch the hardware connected to it) or \"fast user switching\" between different users on the same computer. In the common use case in the modern day of a portable, personal computer that gets shared by \"physically handing it to somebody irl,\" these technical controls serve very little practical purpose.\n\nIn order to configure option 3 on a typical installation, create a file `/etc/udev/rules.d/50-my-usb-device.rules` and insert something like the following into it:\n\n```text\nACTION!=\"remove\", SUBSYSTEMS==\"usb\", ATTRS{idVendor}==\"1234\", TAG+=\"uaccess\"\n```\n\nIn order to configure options 1 and 2, use `MODE=` and `GROUP=` commands (in a udev rule, placed in the same location).\n\nYou may or may not then need to use the `udevadm` command (as `root`) to reload and/or reapply the new rules. (Supposedly, manually reloading the rules has not been necessary for a long time, but it continues to persist via copy-paste.)\n\n```shell\n# To reload the rules (probably not necessary?)\nudevadm control --reload-rules\n# To reapply rules to all existing devices\nudevadm trigger\n```\n\nAlternatively, you might try unplugging the device and plugging it back in (which will cause any new rules to be applied to the device).\n\n## Developer documentation\n\nSee [Documentation/architecture.md](Documentation/architecture.md) to get started.\n","summary":"ArcaneNibble/awawausb adds WebUSB support to Firefox through a lightweight native messaging stub that mirrors Chrome’s implementation. It exposes the WebUSB API on the main page (but not in Web Workers) and works on desktop macOS, Windows, and Linux with a prebuilt or compiled native binary. The project requires separate installation of the XPI extension and the stub, includes installation scripts for common platforms, and documents system‑specific constraints. Web developers and hardware hobbyists who need to control USB devices directly from web pages in Firefox will find this extension useful.","description":"WebUSB for fopses","stars":300,"language":"Rust"},{"owner":"anthnykr","repo":"codex-voice","url":"https://github.com/anthnykr/codex-voice","readme":"# Codex Voice\n\n`Codex Voice` is an experimental macOS menu bar app that lets you hold `Control-M`, speak, and insert the transcript into the currently focused app.\n\nIt uses the same Codex desktop transcription flow as the Codex app, but works anywhere on your Mac.\n\n## Demo\n\nhttps://github.com/user-attachments/assets/ed182fc9-6cc2-4ef0-a2d8-344461a5719e\n\n## What It Does\n\n- Global `Control-M` hold-to-dictate hotkey\n- Floating HUD while listening, transcribing, and inserting\n- Microphone capture while the hotkey is held\n- Transcript insertion into the focused app\n- Accessibility-first insertion with clipboard paste fallback\n- Codex-backed transcription using your local Codex sign-in\n\n## Status\n\nThis is a reverse-engineered experimental tool.\n\n- It depends on Codex being installed locally.\n- It depends on local Codex auth already existing on your machine.\n- It may break if Codex changes its internal transcription flow.\n\n## Requirements\n\n- macOS 14+\n- Xcode\n- [XcodeGen](https://github.com/yonaskolb/XcodeGen)\n- Codex installed locally\n- An active local Codex sign-in\n\n## Permissions\n\nOn first run, macOS may ask for:\n\n- Microphone\n- Accessibility\n\nAccessibility is required for reliable cross-app text insertion.\n\n## Build\n\n```bash\ncd ~/Projects/codex-voice\nxcodegen generate\nxcodebuild -project CodexVoice.xcodeproj -scheme CodexVoice -configuration Debug build\n```\n\n## Install And Run\n\n```bash\n./scripts/install-local-app.sh\n```\n\nThis installs the app to:\n\n```bash\n~/Applications/CodexVoice.app\n```\n\nUse that installed copy when granting Accessibility permission. Do not rely on a `DerivedData` build path for normal use, because macOS privacy permissions can be flaky when the app identity keeps moving around.\n\nThen hold `Control-M`, speak, and release in any focused text field.\n\n## Notes\n\n- Audio is sent to the Codex transcription backend when you release the hotkey.\n- The app reads local Codex auth from `~/.codex/auth.json`.\n- If auth expires, the app tries to refresh it through the local `codex` CLI.\n- The app looks for `codex` via `CODEX_CLI_PATH`, then your `PATH`, then `/Applications/Codex.app/Contents/Resources/codex`.\n- Debug logging is off by default. To enable it temporarily, launch the app with `CODEX_VOICE_DEBUG_LOG=1`.\n\n## License\n\nMIT\n","summary":"Codex Voice is a macOS menu‑bar utility that lets users dictate text into any active application by holding **Control‑M**. The app captures audio while the hotkey is held, transcribes with the local Codex backend, and inserts the result into the focused text field via an accessibility‑centric workflow with a clipboard fallback. It displays a floating HUD during recording and relies on an existing local Codex installation and authentication. Developers and power users who need quick, context‑free dictation across macOS apps will find this experimental tool useful, especially those already using Codex for transcription.","description":null,"stars":162,"language":"Swift"},{"owner":"GIN-SYSTEMS","repo":"vigil-tui","url":"https://github.com/GIN-SYSTEMS/vigil-tui","readme":"<div align=\"center\">\n\n# VIGIL\n\n**Real-time terminal power monitor — CPU · GPU · RAM · Network · Processes**\n\n[![CI](https://github.com/GIN-SYSTEMS/vigil-tui/actions/workflows/ci.yml/badge.svg)](https://github.com/GIN-SYSTEMS/vigil-tui/actions)\n[![Python](https://img.shields.io/badge/python-3.11%2B-blue?logo=python&logoColor=white)](https://www.python.org/)\n[![Platform](https://img.shields.io/badge/platform-Linux%20%7C%20Windows-lightgrey)](https://github.com/GIN-SYSTEMS/vigil-tui)\n[![License](https://img.shields.io/badge/license-MIT-green)](LICENSE)\n\n</div>\n\n---\n\n![vigil-tui dashboard](assets/screenshot.png)\n\n---\n\n## Overview\n\nvigil is a high-resolution terminal dashboard that shows **live wattage, thermals, clock speeds, efficiency scores, and electricity cost** for every major component — all inside the terminal with no browser, no background service, no telemetry.\n\nIt reads directly from hardware sensors (hwmon, RAPL, LibreHardwareMonitor, NVML) and falls back gracefully when a sensor is unavailable. Every panel updates in real time, the whole thing runs from a single `vigil` command.\n\n---\n\n## Features\n\n### Power & Thermals\n- **CPU package power** — hwmon (k10temp / zenpower / amd_energy) → RAPL → LibreHardwareMonitor WMI → CPU% × TDP estimate\n- **GPU power** — NVIDIA NVML: watts, temperature, utilisation, core/mem clocks, VRAM, fan speed\n- **RAM wattage** — DDR4 power model (slot count × utilisation)\n- **Throttle detection** — blinking `THROTTLE` badge on CPU or GPU thermal throttle\n\n### Charts & Visualisation\n- **Power history** — high-resolution Braille area chart, CPU + GPU overlay\n- **Clock history** — CPU avg frequency + GPU core clock with boost ceiling marker\n- **Per-core bars** — utilisation % + live frequency for every core\n\n### Process Intelligence\n- **Process table** — ranked by estimated wattage contribution\n- **Sparkline trends** — per-process watt history mini-chart\n- **EST.W column** — watts per process derived from CPU% share of package power\n\n### Efficiency & Cost\n- **Efficiency score** — `OPTIMAL` · `NORMAL` · `LOW EFF` · `THROTTLE`\n- **Electricity cost** — /hr, /day, session total (configurable kWh price + currency)\n- **Baseline mode** — snapshot idle state, compare live delta in real time\n\n### Alerts & Logging\n- **Webhook alerts** — HTTP POST when CPU temp or power threshold is breached\n- **Session logging** — optional JSONL tick log (`--log` flag)\n- **SVG screenshot** — full dashboard export with `s`\n\n### Themes & UX\n- **TacticalCyberpunk** (dark) — green / amber / cyan on near-black\n- **GhostWhite** (light) — high-contrast monochrome\n- **Setup wizard** — first-run guided TDP + kWh configuration\n- **Live accent recolour** — sidebar colour tweaks without restart\n\n---\n\n## Platform Support\n\n| Platform | CPU Power | CPU Temp | GPU Power | GPU Temp |\n|---|---|---|---|---|\n| **Linux** | hwmon · RAPL · estimate | hwmon | NVML | NVML |\n| **Windows 11 / 10** | LibreHardwareMonitor · estimate | LHM | NVML | NVML |\n| **macOS** | estimate only | — | NVML (if present) | NVML |\n\n### Windows — accurate CPU readings\n\nvigil reads real CPU wattage through **[LibreHardwareMonitor](https://github.com/LibreHardwareMonitor/LibreHardwareMonitor) (MPL-2.0)** via its WMI interface. Without it, vigil falls back to a CPU% × TDP estimate automatically.\n\n1. Download [LibreHardwareMonitor](https://github.com/LibreHardwareMonitor/LibreHardwareMonitor/releases)\n2. Run it **as Administrator**\n3. Launch vigil — LHM is detected automatically\n\n> vigil does not bundle or modify LibreHardwareMonitor. It connects to its WMI interface at runtime. LHM must be running separately.\n\n---\n\n## Installation\n\n**Requirements:** Python 3.11+\n\n```bash\n# Clone\ngit clone https://github.com/GIN-SYSTEMS/vigil-tui\ncd vigil-tui\n\n# Linux / macOS\npip install .\n\n# Windows (includes WMI + pywin32 for LHM support)\npip install \".[windows]\"\n```\n\n**Run:**\n```bash\nvigil           # launch dashboard\nvigil --log     # launch + write JSONL tick log\nvigil --help    # all options\n```\n\n---\n\n## Key Bindings\n\n| Key | Action |\n|-----|--------|\n| `*` / `?` | Toggle help overlay |\n| `q` / Ctrl+C | Quit |\n| `p` | Pause / resume sampling |\n| `r` | Reset chart history |\n| `+` / `-` | Zoom Y-axis in / out |\n| `b` | Snapshot baseline — press again to clear |\n| `s` | Save SVG screenshot |\n| `t` | Toggle theme (dark ↔ light) |\n| `c` | Open config / setup wizard |\n\n---\n\n## Configuration\n\nFirst launch creates `~/.config/vigil/config.toml`:\n\n```toml\n[hardware]\ncpu_tdp_watts       = 65.0     # CPU TDP ceiling for estimation\ngpu_tdp_watts       = 165.0    # GPU TDP ceiling\nupdate_interval     = 1.0      # seconds between ticks\nhistory_len         = 120      # chart ring-buffer depth\n\n[cost]\nkwh_price           = 2.0      # electricity price per kWh\ncurrency_symbol     = \"₺\"\n\n[alerts]\nwebhook_url         = \"\"       # HTTP POST endpoint — empty = disabled\ncpu_temp_thresh     = 90       # °C\ncpu_watt_thresh_pct = 90       # % of TDP\n\n[ui]\ntheme               = \"tactical\"   # \"tactical\" or \"ghost\"\n```\n\n---\n\n## How the power waterfall works\n\n```\nvigil starts\n│\n├─ Linux?\n│   ├─ hwmon sysfs (k10temp / zenpower / amd_energy)   ← real sensor\n│   ├─ RAPL powercap energy_uj delta                   ← kernel counter\n│   └─ CPU% × TDP estimate                             ← always available\n│\n└─ Windows?\n    ├─ LibreHardwareMonitor WMI (requires Admin + LHM) ← real sensor\n    └─ CPU% × TDP estimate                             ← always available\n\nGPU → NVML (pynvml) on all platforms\n     if no NVIDIA GPU: panel shows \"unavailable\", no crash\n```\n\n---\n\n## Project Structure\n\n```\nvigil-tui/\n├── src/vigil/\n│   ├── app.py                   # Textual app, layout, tick loop\n│   ├── config.py                # Static constants\n│   ├── config_manager.py        # TOML config loader/writer\n│   ├── session.py               # Cost tracking, webhooks, JSONL logging\n│   ├── collectors/\n│   │   ├── base.py              # Collector ABC + SensorReading\n│   │   ├── cpu.py               # hwmon → RAPL → LHM → estimate\n│   │   ├── gpu.py               # NVIDIA NVML\n│   │   ├── ram.py               # RAM wattage model\n│   │   ├── netdisk.py           # Network + disk I/O rates\n│   │   └── system.py            # Orchestrator → SystemSnapshot\n│   └── widgets/\n│       ├── power_header.py      # Top bar: wordmark + gauge\n│       ├── cpu_panel.py         # Left: CPU + per-core bars\n│       ├── braille_chart.py     # Center: power history\n│       ├── clock_chart.py       # Center: clock history\n│       ├── process_table.py     # Center: process ranking\n│       ├── gpu_panel.py         # Right: GPU metrics\n│       ├── financial_widget.py  # Cost display\n│       ├── netdisk_widget.py    # Network + disk rates\n│       ├── status_bar.py        # Footer\n│       ├── boot_screen.py       # Splash screen\n│       ├── help_overlay.py      # Key bindings overlay\n│       └── setup_wizard.py      # First-run wizard\n├── .github/workflows/ci.yml\n├── pyproject.toml\n├── requirements.txt\n└── LICENSE\n```\n\n---\n\n## Dependencies\n\n| Package | Purpose |\n|---------|---------|\n| `textual >= 0.80` | TUI framework |\n| `psutil >= 5.9.8` | CPU%, process list, net/disk I/O |\n| `pynvml >= 11.5.0` | NVIDIA GPU metrics |\n| `wmi >= 1.5.1` *(Windows)* | LHM WMI bridge |\n| `pywin32 >= 306` *(Windows)* | Windows COM/WMI support |\n\n---\n\n## License\n\n[MIT](LICENSE) — free to use, modify, and distribute.\n\n---\n\n<div align=\"center\">\nbuilt by <a href=\"https://github.com/GIN-SYSTEMS\">GIN-SYSTEMS</a>\n</div>\n","summary":"Vigil is a terminal‑based power monitoring dashboard that displays real‑time wattage, thermals, clock speeds and efficiency for CPU, GPU, RAM and network components, all without a browser or background service. It pulls data directly from hardware sensors (hwmon, RAPL, NVML, LibreHardwareMonitor) and visualises it with high‑resolution charts, per‑core bars, a process‑by‑process watt table, and cost estimates based on configurable electricity rates. Users who want fine‑grained, privacy‑respecting insight into their system’s power consumption—such as developers, system administrators, or enthusiasts curious about efficiency and cost—can run it with a single command on Linux, Windows or macOS.","description":"Real-time terminal power monitor — CPU · GPU · RAM wattage dashboard  Visibility","stars":98,"language":"Python"},{"owner":"ChanningLua","repo":"prax-agent","url":"https://github.com/ChanningLua/prax-agent","readme":"<div align=\"center\">\n\n# Prax\n\n**Self-improving agent runtime that learns from experience and drives LLM agents through test-verify-fix loops**\n\n<br>\n\n[![License: MIT](https://img.shields.io/badge/License-MIT-green.svg)](LICENSE)\n[![Python 3.10+](https://img.shields.io/badge/python-3.10+-blue.svg)](https://www.python.org/downloads/)\n\n[Quick Start](#quick-start) · [Why Prax](#why-prax) · [Usage](#usage-examples) · [Results](#results) · [Integration Paths](#integration-paths) · [Configuration](#configuration) · [Architecture](#architecture) · [Contributing](#contributing)\n\n<br>\n\n</div>\n\n---\n\n## Quick Start\n\n**Goal**: install Prax, configure an AI key, run your first task — in under 5 minutes. No programming background required.\n\n> Already an experienced user? Jump to [One-liner for experienced users](#one-liner-for-experienced-users) below.\n\n### Step 1 · Install prerequisites\n\nPrax needs **Node.js** (for the CLI wrapper) and **Python 3.10+** (for the runtime). Check if you already have them:\n\n```bash\nnode --version      # should print v14 or higher\npython3 --version   # should print Python 3.10 or higher\n```\n\nMissing one? Install:\n\n| OS | Install command |\n|---|---|\n| **macOS** | `brew install node python@3.12` (install [Homebrew](https://brew.sh) first if needed) |\n| **Linux** | `sudo apt install nodejs python3 python3-pip` (Debian/Ubuntu) or `sudo dnf install nodejs python3` (Fedora) |\n| **Windows** | Use [WSL2](https://learn.microsoft.com/windows/wsl/install) and follow the Linux commands. Native Windows is not supported yet (on the 0.5.x roadmap). |\n\n### Step 2 · Install Prax\n\n```bash\nnpm install -g praxagent\n```\n\nVerify:\n\n```bash\nprax --version\n```\n\n**Should print**:\n\n```\nprax 0.5.0\n```\n\n(0.5.0 or higher is fine.)\n\n**See `command not found`?**\n- macOS with Homebrew Node: run `export PATH=/opt/homebrew/bin:$PATH` then add it to `~/.zshrc`\n- Linux: confirm `npm prefix -g`'s `bin/` is on your `$PATH`\n\n### Step 3 · Point Prax at an LLM service\n\nPrax needs two things to call any LLM: an **endpoint URL** and an **API key**.\nThe procedure is the same whether you use an official API or a third-party proxy.\n\n1. Get the `base_url` and `api_key` from your service's dashboard or docs.\n\n2. Export them as environment variables (the names are arbitrary — any name your shell can `export` works; `LLM_BASE_URL` / `LLM_API_KEY` is just our recommended convention):\n\n   ```bash\n   export LLM_BASE_URL=\"https://your-service-endpoint\"\n   export LLM_API_KEY=\"your-key\"\n   ```\n\n3. Wire them into Prax via `~/.prax/models.yaml`:\n\n   ```bash\n   mkdir -p ~/.prax\n   cat > ~/.prax/models.yaml <<'YAML'\n   providers:\n     default:\n       base_url_env: LLM_BASE_URL\n       api_key_env: LLM_API_KEY\n       format: openai          # use \"anthropic\" if your service speaks the Anthropic protocol\n       models:\n         - name: <your-model>  # the exact model name your service exposes\n   default_model: <your-model>\n   YAML\n   ```\n\n   Replace `<your-model>` with whatever model identifier your service supports (check the service's `/v1/models` endpoint or its dashboard).\n\n4. Verify it works:\n\n   ```bash\n   prax providers\n   ```\n\n   You should see your provider listed with the model name and a status. With `LLM_API_KEY` set the status reads `available`; if it shows `missing-credentials`, the env var didn't reach Prax — re-run the `export` and make sure `echo $LLM_API_KEY` echoes the key back.\n\n### Step 4 · Your first task\n\n```bash\nmkdir -p ~/Desktop/prax-hello && cd ~/Desktop/prax-hello\nprax prompt \"你是谁？用一句话回答。\"\n```\n\n**Should print** something like:\n\n```\n我是 Prax 这个智能体运行时里跑的 AI 助手，可以帮你执行代码、测试和自动化任务。\n```\n\nCongrats — Prax is working.\n\n### Step 5 · Prove it can touch files (the real power)\n\n```bash\necho \"hello world\" > greeting.txt\nprax prompt \"读 greeting.txt 里的内容，然后把它改成全大写再写回去\"\ncat greeting.txt\n```\n\n**Should print**:\n\n```\nHELLO WORLD\n```\n\nThat's the distinguishing capability — Prax doesn't just chat, it **reads, writes, runs tests, and verifies** in a loop. Everything below builds on this.\n\n**Got stuck at any step?** Common issues:\n\n| Symptom | Fix |\n|---|---|\n| `Error: Model 'xxx' not found` | The `<your-model>` name in `~/.prax/models.yaml` doesn't match what your service exposes. Check its `/v1/models` endpoint or dashboard. |\n| `HTTP 401 / Unauthorized` | Key typo or expired. Regenerate and re-export `LLM_API_KEY`. |\n| Silent exit with no output | Your endpoint is unreachable. Try `curl -s \"$LLM_BASE_URL\"/...` to confirm, or point `LLM_BASE_URL` at a healthy endpoint. |\n| Chinese characters look broken | Set `export LANG=zh_CN.UTF-8` in your shell rc. |\n\n---\n\n## Two ways to use Prax\n\nOnce Step 5 above works, you're ready to pick a usage mode.\n\n### Way 1 · Standalone from the terminal (what you just did)\n\nUse Prax directly at the shell prompt — perfect for automation, cron jobs, CI/CD, or just batching work without opening an IDE.\n\n```bash\nprax prompt \"run pytest -q, fix the first failure, and stop when tests pass\"\nprax prompt \"read README.md and propose 3 concrete improvements as a checklist\"\nprax cron add --name daily-news --schedule \"0 17 * * *\" --prompt \"...\"   # schedule recurring work\n```\n\nPick a role-matched walkthrough to see a real-world pipeline end-to-end:\n\n| Your role | Tutorial | What you'll build |\n|---|---|---|\n| **PM / support lead** | [support-digest](./docs/tutorials/support-digest.md) | Daily PII-redacted ticket digest, local-only processing |\n| **Content creator / knowledge-base hobbyist** | [ai-news-daily](./docs/tutorials/ai-news-daily.md) | Scrape X/知乎/Bilibili → compile Obsidian wiki → send digest |\n| **Release manager** | [release-notes](./docs/tutorials/release-notes.md) | Git log → CHANGELOG + release announcement |\n| **DevEx / tech writer** | [docs-audit](./docs/tutorials/docs-audit.md) | Weekly \"which docs drifted from the code?\" report |\n| **Engineering lead** | [pr-triage](./docs/tutorials/pr-triage.md) | Per-PR triage that actually runs tests on both branches |\n\nAll five tutorials start with sample data — no external API or real PR needed to follow along.\n\n### Way 2 · Inside Claude Code IDE\n\nIf you use [Claude Code](https://claude.com/claude-code) and want Prax's skills, commands, and verification hooks available inside the IDE:\n\n```bash\nprax install --profile full\n```\n\nThis copies Prax's bundled skills (4 commercial recipes + 1 content-automation pipeline + 4 developer workflows) into `~/.claude/`, registers Prax MCP servers, and wires hooks so Claude Code runs Prax's verification loop on every code change.\n\nVerify:\n\n```bash\nprax doctor --target claude\n```\n\nNow reopen your project in Claude Code. You'll see new `/prax-status`, `/prax-doctor`, `/prax-plan`, `/prax-verify` slash commands, the `prax-planner` agent, and Prax's rules automatically applied.\n\nTo undo: `prax uninstall --target claude`.\n\n> **Note**: `prax install` only ships a Claude Code integration today. Any LLM you configure via Step 3 still works as Prax's backend regardless of IDE choice. A skill-export path for additional IDE/CLI hosts is on the 0.5.x roadmap.\n\n### One-liner for experienced users\n\n```bash\ngit clone https://github.com/ChanningLua/prax-agent.git && cd prax-agent\npip install -e .\nexport LLM_BASE_URL=\"https://your-service-endpoint\"\nexport LLM_API_KEY=\"your-key\"\n# (then write ~/.prax/models.yaml as shown in Step 3 above)\nprax prompt \"run pytest -q, fix the failure, and stop when tests pass\"\n```\n\n> Prax can execute shell commands on your behalf. It defaults to `workspace-write` mode — files outside the project are off-limits. Use `--permission-mode read-only` for safe exploration.\n\n---\n\n## Why Prax\n\n**Prax isn't just another LLM wrapper — it's a production-grade agent runtime built for real repository work.**\n\n<p align=\"center\">\n  <img src=\"./docs/assets/capabilities.svg\" alt=\"Agent Capabilities\" width=\"800\">\n</p>\n\n### Experience-Based Self-Improvement\n\nPrax learns from experience and self-improves across sessions and projects:\n\n- **Correction Detection** — Automatically detects when users correct mistakes, extracts problem-solution patterns, and applies them in future sessions (multilingual support)\n- **Cross-Project Experience Accumulation** — Builds a global experience store at `~/.prax/experiences.json` that improves performance across all your repositories\n- **Structured Error Recovery** — Blacklists failing approaches and tries alternatives, preventing repeated mistakes within the same session\n- **Persistent Memory with Confidence Scoring** — Two backends (JSON/SQLite) track context, decisions, and learned patterns with decay over time\n- **Temporal Knowledge Graph** — Tracks entity relationships and their evolution across sessions\n- **Checkpoint/Resume** — Crash recovery ensures no work is lost, even during long-running tasks\n- **Trajectory Recording** — Learns from execution history to identify successful patterns and avoid failure modes\n\nThese capabilities are production-ready and integrated into the core runtime — not experimental plugins.\n\n### Working with Experience & Memory\n\nPrax automatically learns from your work and applies that knowledge to future tasks. Here's how to work with its memory system:\n\n#### Automatic Learning\n\nPrax captures experience in these situations:\n\n- **Correction Detection** — When you correct a mistake (e.g., \"that's wrong\", \"不对\", \"try again\"), Prax extracts the problem-solution pattern and saves it to `.prax/solutions/`\n- **Task Completion** — Facts with confidence ≥ 0.7 are persisted to project memory\n- **Tool Failures** — Failed approaches are blacklisted within the session to avoid repetition\n- **Verification Success** — Successful test-fix patterns are recorded as experiences\n- **Session End** — Context snapshots are saved for the next session to resume\n\n#### Viewing Memory\n\nCheck what Prax has learned:\n\n```bash\n# Project-specific memory\ncat .prax/memory.json          # Facts and context (JSON backend)\ncat .prax/memory.db            # Or SQLite backend\nls .prax/solutions/            # Problem-solution patterns\n\n# Global cross-project experiences\ncat ~/.prax/experiences.json   # Shared learnings (JSON backend)\ncat ~/.prax/experiences.db     # Or SQLite backend\n\n# Session history\nls .prax/sessions/             # Past conversation transcripts\n```\n\n#### Managing Memory\n\nClean up memory when needed:\n\n```bash\n# Clear project memory\nrm -rf .prax/memory.json .prax/solutions/\n\n# Clear global experiences\nrm -rf ~/.prax/experiences.json\n\n# Clear session history\nrm -rf .prax/sessions/\n\n# Full reset\nrm -rf .prax/ ~/.prax/\n```\n\n#### Memory Backends\n\nPrax supports two memory backends:\n\n| Backend | Storage | Best For | Search |\n|---------|---------|----------|--------|\n| **local** (JSON) | `.prax/memory.json` + `~/.prax/experiences.json` | Zero-config, small projects | Linear scan |\n| **sqlite** | `.prax/memory.db` + `~/.prax/experiences.db` | Medium to large projects, full-text search | FTS5 index |\n\nConfigure in `.prax/config.yaml`:\n\n```yaml\nmemory:\n  backend: local  # or sqlite\n  local:\n    max_facts: 100\n    fact_confidence_threshold: 0.7\n    max_experiences: 500\n```\n\n#### Confidence & Decay\n\n- Facts with confidence ≥ **0.7** are persisted to memory\n- Lower-confidence observations are kept in session context only\n- Confidence scoring is static per fact (no time-based decay currently implemented)\n\n### Verification-First Architecture\n\n<p align=\"center\">\n  <img src=\"./docs/assets/verification-loop.svg\" alt=\"Verification Loop\" width=\"800\">\n</p>\n\nMost tools send a prompt and hope for the best. Prax runs a **test-verify-fix loop**: it executes your test suite, analyzes failures, edits code, and re-runs until tests pass. The verification layer is first-class — not an afterthought.\n\n**Benchmark-proven**: 10/10 repository repair tasks solved in 29.56s average (vs 8/10 baseline across peer frameworks).\n\n**Dual Runtime Paths** — Native CLI for automation and CI/CD, Claude Code integration for interactive development. Choose the right tool for the job.\n\n**Cross-Session Persistent Memory** — Context persists when you close the terminal. Two memory backends: JSON (zero-config) and SQLite (full-text search).\n\n**Multi-Model Orchestration** — OpenAI-compatible, Anthropic-compatible, and custom-protocol LLMs with explicit routing, fallback chains, and cost tracking. Switch models mid-session with `/model <your-model>`.\n\n**Security by Design** — Permission modes (`read-only`, `workspace-write`, `danger-full-access`), schema validation, workspace boundaries, and full audit trail.\n\n**Built for Real Codebases** — 25+ built-in tools, middleware pipeline (loop detection, quality gates), multi-language support, and interactive REPL mode.\n\n**Transparent & Measurable** — Real-time cost tracking, session history and replay, benchmark suite included, open architecture for custom extensions.\n\n---\n\n## Usage Examples\n\n### Repository Repair\n\n```\n$ prax \"run pytest -q, fix the failure, and stop when tests pass\"\n▶ VerifyCommand {\"command\": \"pytest -q\"}\n  ✗ FAILED test_auth.py::test_login - AssertionError\n▶ Read {\"file_path\": \"src/auth.py\"}\n▶ Edit {\"file_path\": \"src/auth.py\", ...}\n▶ VerifyCommand {\"command\": \"pytest -q\"}\n  ✓ 1 passed in 0.12s\nVerification passed. Task complete.\n```\n\n### One-off Tasks\n\n```bash\nprax \"explain the authentication flow in login.py\"\nprax \"refactor auth.py error handling, replace requests with httpx\"\nprax \"analyze project architecture, list technical debt, prioritize by impact\"\n```\n\n### Interactive REPL\n\n```bash\nprax repl\n\n> analyze the codebase structure\n> fix the SQL injection in user_query.py\n> /model <your-model>\n> /cost\nSession: 12.4K tokens ($0.04)\n```\n\n### Slash Commands\n\n```\n/model, /session list, /plan, /todo show, /doctor, /cost, /help\n```\n\n### Scheduled Tasks & Notifications (new in 0.4)\n\nPrax can own scheduled work end-to-end. Declare channels in `.prax/notify.yaml`, jobs in `.prax/cron.yaml`, and `prax cron install` writes the system-level trigger for you (LaunchAgent on macOS, crontab line on Linux).\n\n```bash\n# 1. configure an outbound channel (Feishu / Lark / Email)\ncat > .prax/notify.yaml <<YAML\nchannels:\n  daily-digest:\n    provider: feishu_webhook\n    url: \"\\${FEISHU_WEBHOOK_URL}\"\nYAML\n\n# 2. schedule a daily job\nprax cron add \\\n  --name ai-news-daily \\\n  --schedule \"0 17 * * *\" \\\n  --prompt \"触发 ai-news-daily 技能\" \\\n  --notify-on failure \\\n  --notify-channel daily-digest\n\n# 3. install the per-minute dispatcher\nprax cron install\n```\n\nSee [docs/recipes/ai-news-daily.md](./docs/recipes/ai-news-daily.md) for the full AI-news-automation recipe.\n\n### Bundled Skills\n\nSkills live under `skills/` (bundled) or `.prax/skills/` (project-local) and inject prompt guidance when their triggers match. Content / writing helpers:\n\n| Skill | Triggers | Purpose |\n|---|---|---|\n| `browser-scrape` | `抓取` `scrape` `twitter` `zhihu` `bilibili` `autocli` | Drive [AutoCLI](https://github.com/nashsu/AutoCLI) to scrape 55+ sites reusing the user's Chrome login |\n| `knowledge-compile` | `整理` `compile` `wiki` `digest` `知识库` | Turn raw markdown into Obsidian-ready wiki (`index.md` + `topics/` + `daily-digest.md`) |\n| `ai-news-daily` | `ai-news-daily` `daily digest` `日报` | End-to-end pipeline: scrape → compile → notify |\n| `chinese-coding` | `中文` `注释` `文档` | Chinese comments/docs style guide |\n\nFour additional **commercial recipes** (`pr-triage`, `release-notes`, `docs-audit`, `support-digest`) ship under `skills/` as well — see the [Commercial Use Cases](#commercial-use-cases-new-in-04) table below for what each one does. Project-local skills in `.prax/skills/` override bundled ones with the same name.\n\n### Commercial Use Cases (new in 0.4)\n\nFour recipes tuned for team/enterprise workflows — designed to ship **reviewable artefacts** (not \"AI said so\" hallucinations) and to keep destructive actions firmly in human hands.\n\n| Case | Target user | Prax differentiator | Recipe |\n|---|---|---|---|\n| **PR Triage Bot** | Eng lead | *Actually* checks out the PR branch and runs tests via `VerifyCommand`; compares against base. No GitHub side-effects. | [`docs/recipes/pr-triage.md`](./docs/recipes/pr-triage.md) |\n| **Release Notes Generator** | Release manager | Reads git log + issue refs, groups by Conventional Commits into Keep-a-Changelog sections, idempotent per version. Writes files; never tags/pushes/publishes. | [`docs/recipes/release-notes.md`](./docs/recipes/release-notes.md) |\n| **Docs Freshness Audit** | DevEx / tech writer | Diffs recently-changed source vs doc mentions, outputs an evidence-cited drift report. Never edits docs itself. | [`docs/recipes/docs-audit.md`](./docs/recipes/docs-audit.md) |\n| **Support Ticket Digest** | PM / support lead | Zero external API calls; PII redaction runs before any LLM sees the data — compliance-grade local-only processing. | [`docs/recipes/support-digest.md`](./docs/recipes/support-digest.md) |\n\nEach case is 10-minute deployable, works with the cron/notify plumbing above, and has hard contractual limits baked into its SKILL.md (no auto-approve, no auto-merge, no auto-refund, no auto-edit-docs) so the agent cannot drift.\n\n---\n\n## Results\n\n<p align=\"center\">\n  <img src=\"./docs/assets/benchmark-results.svg\" alt=\"Benchmark Results\" width=\"800\">\n</p>\n\nPrax achieves **10/10 success rate** on repository repair tasks, completing them in **29.56s average** — 49% faster than the cross-framework baseline.\n\n| Metric | Prax | Framework Baseline | Improvement |\n|--------|------|-------------------|-------------|\n| Success Rate | **10/10** (100%) | 8/10 (80%) | **+25%** |\n| Average Time | **29.56s** | 58.44s | **-49%** |\n| Timeouts | **0** | 2 | **-100%** |\n\n**What drives these results:**\n- **Verification-First Architecture** — Test-verify-fix loops catch errors early\n- **Quality Gate Middleware** — Loop detection and convergence guidance\n- **Smart Sandbox Downgrade** — Verification commands bypass unnecessary overhead\n- **Experience-Based Learning** — Correction detection, error pattern blacklisting, and cross-session memory accumulation\n\nBenchmark methodology: 10 repeated rounds on real repository-fix tasks with session state preserved. See [docs/BENCHMARKS.md](./docs/BENCHMARKS.md) for full details.\n\n---\n\n## Integration Paths\n\nPrax offers two runtime paths — choose the right tool for the job:\n\n| Feature | Native Runtime | Claude Code Integration |\n|---------|---------------|------------------------|\n| Execution | CLI commands | Claude Code IDE |\n| Interaction | Command-line REPL | IDE conversation interface |\n| Context Management | Local JSON/SQLite | Claude Code sessions |\n| Tool Integration | 25+ built-in tools | Claude Code tools + Prax extensions |\n| Use Cases | Automation, CI/CD | Interactive development, code review |\n\n### Claude Code Integration Advantages\n\n- **IDE Native Experience** — Use Prax capabilities directly within Claude Code\n- **Seamless Integration** — Deep integration via MCP servers and Hooks\n- **Security Protection** — Pre-write secret scanning, pre-commit quality checks\n- **Session Persistence** — Auto-save session state, resume from breakpoints\n- **Bidirectional Collaboration** — Claude Code's conversational ability + Prax's verification loop\n\n<p align=\"center\">\n  <img src=\"./docs/assets/integration-paths.svg\" alt=\"Integration Paths\" width=\"800\">\n</p>\n\n> Installation lives under [Way 2 · Inside Claude Code IDE](#way-2--inside-claude-code-ide) above (`prax install --profile full`, then `prax doctor --target claude`).\n\n---\n\n## Configuration\n\n**Models** — create `.prax/models.yaml` in your project (or edit the global `~/.prax/models.yaml` from Quick Start Step 3):\n\n```yaml\ndefault_model: <your-model>\n\nproviders:\n  default:\n    base_url_env: LLM_BASE_URL    # any env var name; declared in Quick Start Step 3\n    api_key_env: LLM_API_KEY\n    format: openai                # use \"anthropic\" if your endpoint speaks the Anthropic protocol\n    models:\n      - name: <your-model>        # the model identifier your service exposes\n```\n\nTo wire multiple endpoints (e.g. one OpenAI-compatible and one Anthropic-compatible), declare another `providers:` entry with its own `base_url_env` / `api_key_env` and list its models. Each provider can also override `base_url` directly instead of via env (see `core/llm_client.py` for the full schema).\n\n**Permission modes**\n\n| Mode | What it allows | Default |\n|------|---------------|---------|\n| `read-only` | No file writes, no shell commands | |\n| `workspace-write` | Modify files inside the project | ✓ |\n| `danger-full-access` | Unrestricted | |\n\n```bash\nprax --permission-mode read-only \"analyze security vulnerabilities\"\n```\n\n**Runtime paths**\n\n| Flag | Behavior |\n|------|----------|\n| `--runtime-path auto` | Uses Claude CLI bridge if `claude` is installed, otherwise native runtime (default) |\n| `--runtime-path native` | Always use the native runtime |\n| `--runtime-path bridge` | Always use the Claude CLI bridge; fails if `claude` is not installed |\n\n**Data directory**\n\n| Path | Content |\n|------|---------|\n| `.prax/sessions/` | Conversation history |\n| `.prax/memory.json` | Project memory (auto-extracted facts, JSON backend) |\n| `.prax/memory.db` | Project memory (SQLite backend) |\n| `.prax/solutions/` | Problem-solution patterns from correction detection |\n| `.prax/todos.json` | Current task list |\n| `.prax/agents/` | Custom agent definitions |\n| `.prax/models.yaml` | Model configuration |\n| `.prax/config.yaml` | Project-level configuration (memory backend, etc.) |\n| `~/.prax/` | Global config (cross-project) |\n| `~/.prax/experiences.json` | Global cross-project experiences (JSON backend) |\n| `~/.prax/experiences.db` | Global cross-project experiences (SQLite backend) |\n| `~/.prax/config.yaml` | User-level configuration |\n\n---\n\n## Architecture\n\n<p align=\"center\">\n  <img src=\"./docs/assets/architecture.svg\" alt=\"Architecture\" width=\"800\">\n</p>\n\nKey modules:\n\n| Path | Role |\n|------|------|\n| `core/agent_loop.py` | Core orchestration cycle (25 iter max, circuit breaker) |\n| `core/middleware.py` | VerificationGuidance, LoopDetection, QualityGate, etc. |\n| `tools/verify_command.py` | Bounded verification (pytest, npm test, cargo test, go test) |\n| `tools/sandbox_bash.py` | Auto-downgrade: verify commands bypass sandbox overhead |\n| `core/memory/` | Pluggable backends (JSON / SQLite) |\n| `core/llm_client.py` | Provider registry, multi-model routing |\n| `agents/` | Ralph (planner), Sisyphus (executor), Team (parallel) |\n| `workflows/` | Task decomposition and orchestration |\n\n---\n\n## Contributing\n\nWe welcome contributions! See [CONTRIBUTING.md](CONTRIBUTING.md) for:\n- Development setup\n- Code style guidelines\n- Testing requirements\n- PR process\n\nFor benchmark and reproducibility work, also see [docs/BENCHMARKS.md](./docs/BENCHMARKS.md).\n\n---\n\n## License\n\nMIT License — see [LICENSE](LICENSE) for details.\n","summary":"Prax is a self‑improving agent runtime that orchestrates large‑language‑model agents through iterative test‑verify‑fix loops, allowing the agents to learn from experience and refine their behaviour without manual tuning. It includes a CLI wrapper, easy configuration of LLM endpoints via environment variables, and built‑in file‑system and code‑execution capabilities so agents can read, modify, and test files on the fly. The platform is aimed at developers, researchers, and automation engineers who need to build autonomous workflows or data‑science pipelines that can reason, debug, and adapt over time. By handling the repetitive cycles of testing and adjustment, Prax accelerates prototyping and reduces manual intervention in complex AI‑driven tasks.","description":"Self-improving agent runtime that learns from experience — test-verify-fix loops, correction detection, cross-project memory, multi-model orchestration.","stars":295,"language":"Python"},{"owner":"Devvvmn","repo":"ActivSpot","url":"https://github.com/Devvvmn/ActivSpot","readme":"# ActivSpot — Dynamic Island for Hyprland\n\n<img width=\"1946\" height=\"95\" alt=\"image\" src=\"https://github.com/user-attachments/assets/a7ede955-5f4f-4315-ab26-dc21555a0c17\" />\n\n\nMy vision of a dynamic island for Hyprland. Originally developed for personal use, shared after genuine interest from the Reddit community.\n\n> Based on [nixos-configuration](https://github.com/ilyamiro/nixos-configuration) by ilyamiro\n\n---\nIf you'd like to support me, [join my Patreon](https://patreon.com/dxvmxn) <img width=\"50\" alt=\"image\" src=\"https://github.com/user-attachments/assets/762e8414-c1d1-40a1-8da7-6ff9a7df95ad\" />\n\n---\n## Features\n\n**Contextual content** — automatically switches based on system state:\n- Music player (album art, title, artist, progress)\n- Discord voice call (live timer, mute button)\n- Screen recording indicator\n- Notifications with expand-to-read\n- Clock + weather (default)\n\n**Dual bubble** — Discord call pill appears alongside music player simultaneously  \n**App Launcher** — island morphs into Spotlight-style launcher with fuzzy search and icons  \n**Clipboard Viewer** — cliphist-based history with image/text detection  \n**VPN badge** — lock icon with snap-shut animation under temperature  \n**Pet pill** — animated cat reacts to music and notifications  \n\n---\n\n## Stack\n\n| Component     | Technology              |\n|---------------|-------------------------|\n| Shell         | Quickshell              |\n| Language      | QML                     |\n| Compositor    | Hyprland                |\n| IPC           | inotifywait on /tmp/qs_* |\n| Music         | playerctl               |\n| Weather       | wttr.in                 |\n| Clipboard     | cliphist + wl-copy      |\n| Notifications | custom daemon           |\n\n---\n\n## Dependencies\nquickshell inotify-tools playerctl cliphist wl-clipboard\npython3 gtk-launch flatpak (optional)\nJetBrains Mono, Iosevka Nerd Font\n\n---\n\n## Installation\n\nClone repo\n\nRun instalation script\n\n---\n\n## Keybinds\n\n| Bind          | Action           |\n|---------------|------------------|\n| Super + Space | App Launcher     |\n| Super + C     | Clipboard Viewer |\n\n---\n\n## Architecture\n\nEach component is a separate `PanelWindow`. IPC works via `inotifywait` on `/tmp/qs_*` files — no sockets, no daemons. The island hides itself when the launcher opens via `/tmp/qs_launcher_state`, creating a morph illusion since both windows share the same top-center position.\n","summary":"ActivSpot brings Apple‑style Dynamic Island functionality to the Hyprland compositor, displaying contextual overlays for music playback, Discord voice calls, notifications, time, weather, and more. Key features include dual‑bubble support for simultaneous music and call information, a Spotlight‑style fuzzy‐search launcher, a clipboard history viewer with image/text support, an animated pet pill, and a VPN badge. The lightweight stack uses QML on Quickshell with playerctl, cliphist, and inotify‑based IPC, avoiding central daemons. Hyprland users who value a multitasking hub and minimal‑resource desktop overlays will find ActivSpot a convenient addition.","description":"My vision for a dynamic island for Hyprland","stars":271,"language":"QML"},{"owner":"abhisekjha","repo":"pith","url":"https://github.com/abhisekjha/pith","readme":"# Pith\n\n[![GitHub Stars](https://img.shields.io/github/stars/abhisekjha/pith?style=social)](https://github.com/abhisekjha/pith/stargazers)\n\n> **Status: stable — not actively adding features.** Bug fixes welcome via issues.\n\nToken compression hooks for Claude Code. Install once, works in every session, zero config.\n\n```bash\nbash <(curl -s https://raw.githubusercontent.com/abhisekjha/pith/main/install.sh)\n```\n\n---\n\n## How it works\n\nFour hooks attach to Claude Code's lifecycle. Every session, every project, automatically.\n\n- **`PostToolUse`** — compresses file reads, bash output, and grep results before they hit context\n- **`UserPromptSubmit`** — runs `/pith` commands, enforces token ceiling if set\n- **`SessionStart`** — restores compression mode, injects cache-locked rules\n- **`Stop`** — records token usage for `status` and `report`\n\nThe `PostToolUse` hook is where most savings happen — file reads alone account for 30–50% of context in a typical coding session.\n\n| Tool output | What happens | Typical saving |\n|-------------|-------------|----------------|\n| File reads | skeleton only — imports, signatures, types | −88% per read |\n| Bash / build | errors + summary, verbose logs discarded | −91% per run |\n| Grep results | capped at 25 matches | prevents runaway searches |\n| Large payloads | offloaded to `~/.pith/tmp/`, pointer left in context | prevents bloat |\n\n---\n\n## Core features\n\n### 1 — Auto compression (zero config)\n\nRuns automatically. No commands needed. Every file read, bash run, and grep gets compressed on the way back to Claude.\n\nReal session numbers:\n```\nRead large-service.ts  →  1,800 tokens baseline  →  210 tokens compressed  (−88%)\nnpm install output     →    940 tokens baseline  →   80 tokens compressed  (−91%)\n```\n\n### 2 — Output modes\n\nControl how Claude writes back to you.\n\n```\n/pith           → lean: drop filler, short synonyms, fragments OK\n/pith ultra     → maximum: abbreviate, arrows, tables\n/pith precise   → tight but full sentences\n/pith off       → disable output compression\n```\n\nAuto-escalation kicks in as context fills — no manual switching needed:\n```\n50% fill → LEAN\n70% fill → ULTRA\n85% fill → dynamic token ceiling\n```\n\n### 3 — Token status\n\n```\n/pith status    → ASCII flow chart — baseline vs compressed vs output + plain-English savings\n/pith report    → interactive HTML dashboard (auto-refreshes every 30s)\n```\n\n![/pith status — token flow chart, compression ratio, cost breakdown](assets/status-screenshot-v1.2.png)\n\n### 4 — Smart file focus\n\nLoad only the sections of a file relevant to your current question. Saves re-reading large files.\n\n```\n/focus src/services/auth.ts\n```\n\nReturns the 5 most relevant sections with a structure overview. Works on any file type.\n\n### 5 — Symbol extraction\n\nPull exact function or class definitions without reading the whole file.\n\n```\n/pith symbol src/auth.ts handleLogin      → exact 30–50 lines (~95% vs full file)\n/pith symbol --list src/auth.ts           → all symbols with line numbers\n```\n\n---\n\n## Install\n\n```bash\n# One-liner\nbash <(curl -s https://raw.githubusercontent.com/abhisekjha/pith/main/install.sh)\n\n# From source\ngit clone https://github.com/abhisekjha/pith\nbash pith/install.sh\n```\n\nHooks install globally into `~/.claude/hooks/`. Active in every session from that point on.\n\n**Update:**\n```\n/pith update    → git pull + re-sync hooks, commands, settings\n```\n\n**Uninstall:**\n```\n/pith uninstall\n```\n\n---\n\n## Advanced features\n\nAll present and functional. Not the daily workflow, but there when you need them.\n\n| Feature | Command | What it does |\n|---------|---------|-------------|\n| Project wiki | `/pith ingest <file>` | Extract entities, claims, decisions into `wiki/` |\n| URL ingestion | `/pith ingest --url <url>` | Fetch and ingest a web page |\n| Wiki query | `/pith wiki \"question\"` | Search wiki with citations |\n| Wiki synthesis | `/pith compile` | Re-synthesize all sources into wiki pages |\n| Wiki lint | `/pith lint` | Find contradictions, gaps, missing pages |\n| Knowledge graph | `/pith-graph` | Visual graph of wiki entities in browser |\n| jCodeMunch | auto on code files | Structure-aware ingest — skeleton not full source |\n| Token ceiling | `/budget 150` | Hard token cap, enforced every prompt |\n| Structured formats | `/pith debug` / `review` / `arch` / `plan` / `commit` | Output templates |\n| Tour | `/pith tour` | 7-step interactive walkthrough |\n| Health check | `/pith health` | Diagnose hook and config issues |\n| Evals | `python evals/harness.py` | Run compression benchmark (needs API key) |\n\n---\n\n## Honest numbers\n\nEstimates against real usage — not against \"no system prompt.\"\n\n```\nBefore Pith:  Read large-service.ts → 1,800 tokens\nAfter Pith:   Read large-service.ts →   210 tokens   (−88%)\n\nBefore Pith:  npm install output    →   940 tokens\nAfter Pith:   errors + summary      →    80 tokens   (−91%)\n```\n\nSession from real use:\n- 19.9k input tokens (237.9k baseline without Pith)\n- 218k tokens saved — 92% compression ratio\n- $0.07 actual vs $3.33 without Pith — **47× cost ROI**\n\nSee [BENCHMARKS.md](BENCHMARKS.md) for methodology and raw numbers.\n\n---\n\n## Multi-model pricing\n\nPith detects the model automatically and applies correct rates. No config needed.\n\n| Model | Input ($/MTok) | Output ($/MTok) |\n|-------|---------------|----------------|\n| Claude Opus 4.7 / 4.6 / 4.5 | $5.00 | $25.00 |\n| Claude Sonnet 4.6 / 4.5 / 4 | $3.00 | $15.00 |\n| Claude Haiku 4.5 | $1.00 | $5.00 |\n| Claude Haiku 3.5 | $0.80 | $4.00 |\n\nFalls back to Sonnet 4.6 rates if model can't be determined.\n\n---\n\n## Star History\n\n[![Star History Chart](https://api.star-history.com/svg?repos=abhisekjha/pith&type=Date)](https://star-history.com/#abhisekjha/pith&Date)\n\n---\n\n## License\n\nMIT\n","summary":"Pith is a lightweight, zero‑configuration set of hooks for Claude Code that automatically compresses file reads, shell output, and other large payloads before they enter the AI’s context, dramatically cutting token usage. It offers fast output modes, real‑time token‑status dashboards, smart file‑focus commands, and a symbol extraction tool that pulls only the needed parts of code. The result is a cheaper, faster Claude coding experience with automatic token ceilings and optional manual overrides via `/pith` commands. Developers who use Claude Code in large projects or in cost‑constrained environments will find Pith useful for keeping sessions under token limits while maintaining full access to the code they need.","description":"Pith is the hook that makes Claude Code sessions last 3x longer.","stars":95,"language":"Python"},{"owner":"10x-app-builder","repo":"10x","url":"https://github.com/10x-app-builder/10x","readme":"# 10x\n\nAn AI-powered iOS app builder for macOS. Describe the app you want, and 10x generates production-quality SwiftUI code, scaffolds an Xcode project, and previews it on the iOS Simulator — all from a conversational interface. The shipped beta artifact is packaged as **10x.app**.\n\n![macOS 14+](https://img.shields.io/badge/macOS-14%2B-blue)\n![Swift 5.9](https://img.shields.io/badge/Swift-5.9-orange)\n![SwiftUI](https://img.shields.io/badge/UI-SwiftUI-purple)\n\n## How It Works\n\n1. **Describe your app** — type what you want to build in natural language\n2. **Plan mode** — the AI researches, asks clarifying questions, and creates a project plan\n3. **Build mode** — the AI writes SwiftUI code using file tools (create, edit, search, etc.)\n4. **Live preview** — the generated app is compiled and launched on the iOS Simulator with a screenshot captured back into the UI\n\nThe AI runs a full agentic tool loop client-side: it calls Claude via a thin API proxy, parses `tool_use` blocks, executes file operations locally, and loops until the task is complete.\n\n## Architecture\n\n```\nTenXAppApp (@main)\n├── AuthManager                 # Token-based auth (Supabase)\n├── ContentView                 # Tab management (home + per-project tabs)\n│   ├── HomeView                # Project list, creation\n│   └── BuilderView            # Main workspace (3-pane)\n│       ├── FileExplorerSidebar # VS Code-style file tree\n│       ├── ChatPanelView       # Messages, tool steps, inline questions\n│       └── PreviewPanelView    # Simulator preview, plan view\n│\n└── BuilderViewModel (@Observable, state machine)\n    ├── GenerationService       # Claude tool loop orchestration\n    │   ├── BuilderPrompts      # Mode-aware system prompts\n    │   ├── BuilderToolDefs     # Tool schemas for Claude\n    │   └── ToolExecutor        # File I/O, search, run_command\n    ├── XcodePreviewService     # Project scaffolding (XcodeGen)\n    ├── SimulatorPreviewService # Simulator boot, build, screenshot\n    ├── LocalProjectStore       # Local persistence (~tenx/)\n    └── BuilderService          # API client for projects/messages\n```\n\n### Key Services\n\n| Service | Role |\n|---------|------|\n| **GenerationService** | Owns the Claude tool loop — streams responses, parses tool calls, executes them via ToolExecutor, repeats until done |\n| **ToolExecutor** | Executes file operations (create/edit/read/delete/search) against the real filesystem and maintains an in-memory file tree |\n| **XcodePreviewService** | Writes generated Swift files to disk, creates `project.yml`, runs XcodeGen to produce `.xcodeproj` |\n| **SimulatorPreviewService** | Boots an iPhone simulator, runs `xcodebuild`, installs the app, launches it, captures a screenshot |\n| **LocalProjectStore** | Persists messages, file tree, and project plan to `~/Library/Developer/TenXApp/{project}/tenx/` |\n| **BuilderPrompts** | Generates mode-aware system prompts — plan mode focuses on research/architecture, build mode on SwiftUI code generation |\n\n### Data Flow\n\n```\nUser message → BuilderViewModel.sendMessage()\n  → GenerationService.runGeneration()\n    → POST to Claude proxy (streaming NDJSON)\n    → Parse tool_use blocks\n    → ToolExecutor writes files to disk\n    → Loop until Claude stops or ask_user\n  → Events update ViewModel (@Observable)\n  → SwiftUI re-renders reactively\n  → LocalProjectStore persists state\n```\n\n## Project Structure\n\n```\n10x-macos/\n├── TenXAppApp.swift               # @main entry point\n├── ContentView.swift              # Root view, tab management\n├── Config.swift                   # API base URL, Supabase config\n├── Theme.swift                    # Design tokens (colors, spacing, radii)\n│\n├── Models/\n│   ├── BuilderProject.swift       # Project metadata\n│   ├── BuilderStreamEvent.swift   # Stream event parsing\n│   ├── ProjectMode.swift          # .plan | .build\n│   └── AppTab.swift               # Tab state\n│\n├── ViewModels/\n│   ├── AuthManager.swift          # Auth state\n│   └── BuilderViewModel.swift     # Core state machine\n│\n├── Views/\n│   ├── HomeView.swift             # Project list + creation\n│   ├── BuilderView.swift          # Main 3-pane workspace\n│   ├── NewProjectView.swift       # New project wizard\n│   ├── FileExplorerSidebar.swift  # File tree sidebar\n│   ├── Auth/LoginView.swift       # Sign-in screen\n│   ├── Chat/                      # Chat panel views\n│   ├── Preview/                   # Preview + plan views\n│   └── Sidebar/                   # Project list sidebar\n│\n├── Services/\n│   ├── APIClient.swift            # HTTP client (GET/POST/stream)\n│   ├── BuilderService.swift       # Project/message API calls\n│   ├── LocalProjectStore.swift    # Local file persistence\n│   ├── XcodePreviewService.swift  # Xcode project scaffolding\n│   ├── SimulatorPreviewService.swift  # Simulator control\n│   └── Builder/\n│       ├── GenerationService.swift     # Claude tool loop\n│       ├── BuilderPrompts.swift        # System prompts\n│       ├── BuilderToolDefinitions.swift # Tool schemas\n│       └── ToolExecutor.swift          # File tool execution\n│\n└── Assets.xcassets/               # App icon, accent color\n```\n\n## Prerequisites\n\n- **macOS 14.0+**\n- **Xcode 16+** (for building the macOS app itself)\n- **Xcode Simulator runtimes** — install at least one iPhone simulator via Xcode > Settings > Platforms\n- **Bundled `xcodegen` binary** — copied from `10x-macos/Resources/xcodegen` into the app/CLI build products and used to generate `.xcodeproj` files for previewed apps\n\n## Getting Started\n\n1. Clone the repo:\n   ```bash\n   git clone https://github.com/your-org/10x.git\n   cd 10x\n   ```\n\n2. Open in Xcode:\n   ```bash\n   open 10x-macos.xcodeproj\n   ```\n\n3. Build and run (`Cmd+R`). The app targets macOS 14+.\n\n4. On first launch, enter your API token on the login screen (or use \"Continue without Auth\" for local dev).\n\n### Environment\n\nThe app reads config from `Config.swift` plus Xcode build settings. Public defaults are placeholders, so replace them before using hosted auth, backend, or updater flows:\n\n| Variable | Default | Purpose |\n|----------|---------|---------|\n| `apiBaseURL` | `http://localhost:8000` | Backend API proxy |\n| `supabaseURL` | `https://your-project-ref.supabase.co` | Supabase project URL |\n| `supabaseAnonKey` | `sb_publishable_your_key` | Supabase publishable key |\n| `hostedAppsBaseURL` | `https://apps.example.invalid` | Base URL for hosted app pages |\n| `sparkleFeedURL` | `https://downloads.example.invalid/appcast.xml` | Sparkle appcast feed |\n\n## Release Channels\n\nThe repo now includes a direct-download Sparkle distribution pipeline for notarized DMGs outside the Mac App Store:\n\n- Local release tooling lives in `scripts/release/`\n- CI entry workflows live in `.github/workflows/release-beta.yml` and `.github/workflows/release-stable.yml`\n- The shared reusable workflow lives in `.github/workflows/release-channel.yml`\n- Stable downloads publish under `https://downloads.example.invalid/stable`\n- Beta downloads publish under `https://downloads.example.invalid/beta`\n- The canonical Sparkle feed is `https://downloads.example.invalid/appcast.xml`\n- The release workflows publish DMGs, appcasts, release notes, and channel metadata to Vercel behind `downloads.example.invalid`\n- Local publish artifacts default to `build/release/published-site/`\n- All builds use Apple web OAuth for Sign in with Apple, so the app does not ship the native `com.apple.developer.applesignin` entitlement\n\nThese release defaults are placeholders for the open-source repo. Replace them with your own domain, Sparkle keypair, Apple signing setup, and hosting configuration before publishing binaries.\n\nSee [docs/beta-release.md](./docs/beta-release.md) for the release commands, channel rules, and Apple credential requirements.\n\n## CLI Evals\n\nThe repo includes eval sources plus shell wrappers for running real end-to-end evals against the existing builder stack. The wrappers make the terminal flow simpler by listing cases, resolving a usable `10x-evals` binary, and running the default smoke suite without having to remember binary paths.\n\nQuick start:\n\n```bash\n./scripts/evals list\n./scripts/evals smoke\n./scripts/evals smoke --case habit_tracker_build\n```\n\nSee [evals/README.md](./evals/README.md) for the current benchmark apps, binary resolution behavior, suite format, and artifact locations.\n\n## Generated Project Layout\n\nWhen a user creates an app, 10x writes files to:\n\n```\n~/Library/Developer/TenXApp/{project-slug}/\n├── ios/\n│   └── {TargetName}/\n│       ├── App.swift\n│       ├── ContentView.swift\n│       ├── Views/\n│       ├── Models/\n│       └── ...\n├── project.yml           # XcodeGen spec\n├── {TargetName}.xcodeproj/  # Generated by XcodeGen\n└── DerivedData/          # Local build artifacts\n```\n\n## Tech Stack\n\n- **Swift 5.9** / **SwiftUI** — SwiftUI-first app with a small set of Swift package dependencies\n- **Claude API** (via proxy) — agentic tool loop with streaming\n- **XcodeGen** — generates Xcode projects from YAML specs\n- **xcodebuild + simctl** — builds and previews on iOS Simulator\n- **Supabase** — authentication (token-based MVP)\n\n## License\n\nLicensed under PolyForm Noncommercial 1.0.0. See [LICENSE](./LICENSE).\n","summary":"10x is a macOS application that turns natural‑language descriptions of an iOS app into production‑ready SwiftUI code, automatically scaffolding an Xcode project and compiling it into a live preview on the iOS Simulator—all through a conversational interface. The workflow is split into a research‑driven “plan” mode where the AI clarifies requirements, and a “build” mode where it writes and edits source files via a Claude‑powered tool loop that runs client‑side file operations. Features include a VS‑Code‑style file explorer, integrated chat that handles tool calls, automatic XcodeGen project generation, and screenshot‑based preview injection back into the UI. The tool is ideal for SwiftUI developers, rapid prototyping teams, and hobbyists who want to prototype iOS apps without heavy manual setup.","description":"Open-source SwiftUI app builder.","stars":121,"language":"Swift"},{"owner":"dezgit2025","repo":"auto-memory","url":"https://github.com/dezgit2025/auto-memory","readme":"# auto-memory\n\n## Your AI coding agent has amnesia. Here's the fix.\n\n*~1,900 lines of Python. Zero dependencies. Saves you an hour a day.*\n\n> Built by [Desi Villanueva](https://github.com/dezgit2025)\n\n[![PyPI](https://img.shields.io/pypi/v/auto-memory)](https://pypi.org/project/auto-memory/)\n[![CI](https://github.com/dezgit2025/auto-memory/actions/workflows/test.yml/badge.svg)](https://github.com/dezgit2025/auto-memory/actions/workflows/test.yml)\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](LICENSE)\n[![Python 3.10+](https://img.shields.io/badge/python-3.10+-blue.svg)](https://www.python.org)\n[![Zero Dependencies](https://img.shields.io/badge/dependencies-0-brightgreen)](pyproject.toml)\n[![Tests](https://img.shields.io/badge/tests-90%20passed-brightgreen)]()\n[![Discussions](https://img.shields.io/badge/📢_Updates-Discussions-blue)](https://github.com/dezgit2025/auto-memory/discussions)\n\n<!-- AGENTIC-INSTALL-PROTOCOL: v1\n     Files: deploy/install.md, deploy/install-other-backends.md, deploy/install-claude-code.md\n     Entry: Read deploy/install.md\n-->\n\n### 🆕 What's New in v0.4.0\n\n**Claude Code support** — `session-recall-cc` reads Claude Code JSONL sessions and builds an FTS5 index for structured recall. `pip install auto-memory[claude]` to get started. [Full changelog →](CHANGELOG.md)\n\n**Zero-dependency CLI that turns Copilot CLI's local SQLite into instant recall — no MCP server, no hooks, read-only, schema-checked. ~50 tokens per prompt.**\n\n### Works With\n\n| Backend | Status | How to enable |\n|---------|--------|--------------|\n| **GitHub Copilot CLI** | ✅ default | Already on — `pip install auto-memory` is all you need |\n| **Claude Code** | 🟡 opt-in | `pip install auto-memory[claude]` — [Full setup →](deploy/install-claude-code.md) |\n| **VS Code** | 🟡 opt-in | [Enable in 30 seconds →](deploy/install-other-backends.md#32--vs-code-backend) |\n| **JetBrains** | 🟡 opt-in | [Enable →](deploy/install-other-backends.md#33--jetbrains-backend) |\n| **Neovim** | 🟡 opt-in | [Enable →](deploy/install-other-backends.md#34--neovim-backend) |\n\n> **Claude Code user?** `pip install auto-memory[claude] && export SESSION_RECALL_ENABLE_CLAUDE_BACKEND=1` — then ask your agent to read [`deploy/install-claude-code.md`](deploy/install-claude-code.md) for full integration.\n\n> **VS Code user?** Ask your agent to read [`deploy/install-other-backends.md`](deploy/install-other-backends.md) — it walks through detection, env var setup, and verification automatically.\n\n**Coming soon:** Cursor · Codex\n\n---\n\n### Quickstart\n\n```bash\npip install auto-memory           # or: git clone + ./install.sh\npip install --upgrade auto-memory # upgrade to latest\nsession-recall health          # verify it works\n```\n\nNow give your agent a memory. See the **🤖 Agentic Install** section below for agent-driven setup, or follow [`deploy/install.md`](deploy/install.md) manually.\n\n### 📋 Example: Remember Your Last 10 Sessions\n\nWant to recall the last 10 sessions you worked on, which project folder, branch, and what you did? Add this prompt to your agent instructions:\n\n```\nUse `session-recall list --json --limit 10` to show my last 10 sessions.\nDisplay: date, time, full session_id, summary, branch, turns count, project folder.\nFormat as a table.\n```\n\nYour agent runs it and gets:\n\n```\n #  │ Date  │ Time  │ Session ID                                 │ Summary                    │ Branch            │ Project                  │ Turns\n────┼───────┼───────┼────────────────────────────────────────────┼────────────────────────────┼───────────────────┼──────────────────────────┼──────\n 1  │ 05-01 │ 14:32 │ a1b2c3d4-e5f6-7890-abcd-ef1234567890       │ Refactor Auth Module       │ main              │ ~/Projects/acme-api      │   12\n 2  │ 05-01 │ 11:15 │ b2c3d4e5-f6a7-8901-bcde-f12345678901       │ Fix CI Pipeline            │ feat/oauth2       │ ~/Projects/acme-api      │   28\n 3  │ 04-30 │ 22:48 │ c3d4e5f6-a7b8-9012-cdef-123456789012       │ Add Redis Caching          │ feat/cache-layer  │ ~/Projects/acme-api      │   35\n 4  │ 04-30 │ 16:05 │ d4e5f6a7-b8c9-0123-defa-234567890123       │ Debug WebSocket Timeout    │ main              │ ~/Projects/realtime-chat │    8\n 5  │ 04-29 │ 09:33 │ e5f6a7b8-c9d0-1234-efab-345678901234       │ Write Migration Script     │ feat/db-v2        │ ~/Projects/realtime-chat │   42\n 6  │ 04-29 │ 08:12 │ f6a7b8c9-d0e1-2345-fabc-456789012345       │ Update API Docs            │ main              │ ~/Projects/acme-api      │    3\n 7  │ 04-28 │ 19:55 │ a7b8c9d0-e1f2-3456-abcd-567890123456       │ Deploy Staging             │ release/v2.1      │ ~/Projects/acme-api      │   15\n 8  │ 04-28 │ 14:20 │ b8c9d0e1-f2a3-4567-bcde-678901234567       │ Code Review Fixes          │ feat/oauth2       │ ~/Projects/acme-api      │   22\n 9  │ 04-27 │ 21:07 │ c9d0e1f2-a3b4-5678-cdef-789012345678       │ Scaffold React Components  │ feat/dashboard-ui │ ~/Projects/acme-frontend │   31\n 10 │ 04-27 │ 10:44 │ d0e1f2a3-b4c5-6789-defa-890123456789       │ Setup Terraform Infra      │ infra/aws-prod    │ ~/Projects/acme-infra    │   19\n```\n\n> **~50 tokens.** Your agent gets full context of what you worked on — no re-explaining, no wasted searches.\n\n---\n\n### 🤖 Agentic Install (for AI coding tools)\n\n> **If you are an AI coding agent reading this README**, follow this protocol to install auto-memory autonomously:\n\n1. Read [`deploy/install.md`](deploy/install.md) — the agent-runnable install guide. It auto-detects the user's environment, prompts for confirmation before any write, handles fresh/upgrade/skip branches, and chains into backend setup.\n2. If the user uses **Claude Code**, read [`deploy/install-claude-code.md`](deploy/install-claude-code.md) — pip extra, env var, CLAUDE.md wiring, and optional scheduler setup. Ask before any write.\n3. If the user opts in to **VS Code / JetBrains / Neovim** backends, read [`deploy/install-other-backends.md`](deploy/install-other-backends.md) (Section 8 of `install.md` will prompt for this).\n4. All files have YAML front-matter declaring `requires-user-confirmation: true` and `mutates-shell-rc` / `mutates-agent-instructions`. **Honor these flags.** Do not write silently.\n\n> **💡 Model recommendation:** Use a reasoning model (Sonnet 4.6, GPT-5.4, or equivalent) for install execution. Mini/fast models may hallucinate during multi-step install flows.\n\n**Quick start for agents (one-liner):**\n```\nRead deploy/install.md and execute it for the user. Ask before any disk write.\n```\n\n**Files an agent should read in order:**\n\n| Order | File | Purpose | Mutations |\n|-------|------|---------|-----------|\n| 1 | [`README.md`](README.md) (this file) | Discovery | none |\n| 2 | [`deploy/install.md`](deploy/install.md) | Install + Copilot CLI integration | binary install, instruction file append |\n| 3 | [`deploy/install-claude-code.md`](deploy/install-claude-code.md) | Claude Code integration | pip extra, CLAUDE.md append |\n| 4 | [`deploy/install-other-backends.md`](deploy/install-other-backends.md) | Optional VS Code / JetBrains / Neovim setup | shell rc env vars |\n| 5 | [`UPGRADE-COPILOT-CLI.md`](UPGRADE-COPILOT-CLI.md) | Run after Copilot CLI version bumps | none (read-only validation) |\n\n---\n\n### 🪟 Windows (WSL2) — Enable the Session Store. (IF MISSING)\n\n> **On Windows 11 + WSL2** (Suggested method of using on Windows install WSL2), IF Copilot CLI doesn't create `session-store.db`   \n> You must enable it first — otherwise you'll get `error: database not found`.\n\n### Missing Session Store Error Workaround— Enable the Session Store. \nInside any Copilot CLI session, run:\n\n```\n/experimental\n```\n\nSelect **SESSION_STORE** to enable it. This turns on the SQLite-based session store for cross-session history, file tracking, and search.\n\nVerify it worked:\n\n```bash\nls ~/.copilot/session-store.db    # should exist after your next session\n```\n\n> **Note:** This is a one-time setup. Once enabled, the session store persists across all future sessions.\n\n---\n\n## The Problem\n\nEvery AI coding agent ships with a big number on the box. 200K tokens. Sounds massive. Here's what actually happens:\n\n```\n200,000  tokens — context window (theoretical max)\n120,000  tokens — effective limit before context rot kicks in (~60%)\n -65,000  tokens — MCP tools\n -10,000  tokens — instruction files\n=========\n ~45,000  tokens — what you ACTUALLY have before quality degrades\n```\n\nLLMs don't degrade gracefully — once you cross roughly **60% of the context window**, the model starts losing coherence. The industry calls it \"lost in the middle\": attention goes to the beginning (instructions) and the end (recent turns), but your actual working context in the middle gets progressively fuzzier.\n\nI timed it over a week: **68 minutes per day** lost to re-orientation after compactions and new sessions.\n\n> It's a **death spiral of diminishing context** — each compaction leaves the agent slightly dumber, which burns more tokens explaining things, which triggers the next compaction sooner.\n\n### The Compaction Tax\n\nEvery 20–30 turns, the context warning hits and you get two bad choices: ignore it and watch the agent hallucinate, or run `/compact` and watch it lobotomize itself into a tidy two-paragraph summary of a 30-minute investigation. Either way you lose five minutes re-narrating your own project back to the agent like it's a new hire. That's not a workflow — that's a hamster wheel.\n\n## The 200x ROI\n\nHere's the cost comparison that made me build this:\n\n| Operation | Tokens | What you get |\n|-----------|--------|-------------|\n| `grep -r \"auth\" src/` | ~5,000-10,000 | 500 results, mostly irrelevant |\n| `find . -name \"*.py\"` | ~2,000 | Every Python file, no context |\n| Agent re-orientation | ~2,000 | You re-explaining yesterday |\n| **`auto-memory files --json --limit 10`** | **~50** | **Exactly the 10 files you touched yesterday** |\n\n**50 tokens vs 10,000 — a 200x improvement.**\n\n## Before & After\n\n**Before auto-memory** — new session on a project:\n\n```\nYou: Fix the failing test in the auth module\n\nAgent: Let me explore the project structure...\n       $ find . -name \"*.py\" | head -50           ← 2K tokens\n       $ grep -r \"test.*auth\" tests/              ← 5K tokens\n       $ cat tests/test_auth.py                    ← 3K tokens\n       $ cat src/auth/handler.py                   ← 2K tokens\n       I see several test files. Which test is failing?\n\nYou: The one we were working on yesterday, the token refresh edge case\n\nAgent: Let me search for that...\n       $ grep -r \"refresh\" tests/                  ← 4K tokens\n       ...\n```\n\nTotal: ~16K tokens burned, 8 minutes elapsed, agent still isn't oriented.\n\n**After auto-memory** — same scenario:\n\n```\nYou: Fix the failing test in the auth module\n\nAgent: [auto-recall: auto-memory files --json --limit 10]\n       → src/auth/refresh.py, tests/test_refresh_edge_cases.py,\n         src/auth/token_store.py (last touched 14h ago)\n\n       [auto-recall: auto-memory list --json --limit 3]\n       → Yesterday: \"Fixed token refresh race condition, one edge case\n         test still failing on expired token + network timeout combo\"\n\n       I can see from your last session that test_refresh_edge_cases.py\n       has a failing test for the expired token + network timeout case.\n       Let me look at that specific test...\n       $ cat tests/test_refresh_edge_cases.py      ← 1K tokens (targeted)\n```\n\nTotal: ~1.1K tokens, 30 seconds, agent is immediately productive.\n\n## How it compares\n\n| Approach | Dependencies | Writes to DB | Setup | Agent-native |\n|----------|-------------|-------------|-------|-------------|\n| **auto-memory** | None (stdlib) | ❌ Read-only | `pip install` | ✅ Instruction-file |\n| MCP server | Node.js runtime | Varies | Server config | ❌ Protocol layer |\n| Custom hooks | Varies | Often yes | Hook scripts | ❌ Event-driven |\n| Manual grep | None | ❌ | None | ❌ Manual |\n\n## Mental Model: RAM vs Disk\n\n- **Context window = RAM.** Fast, limited, clears on restart.\n- **session-store.db = Disk.** Persistent, searchable, grows forever.\n\nauto-memory is the **page fault handler** — it pulls exact facts from disk in ~50 tokens when the agent needs them.\n\n**It's not unlimited context. It's unlimited context *recall*.** In practice, same thing.\n\n## Design\n\n```\n┌─────────────────────────────────────────────────┐\n│  copilot-instructions.md                        │\n│  \"Run auto-memory FIRST on every prompt\"         │\n└──────────────────┬──────────────────────────────┘\n                   │ agent reads instruction\n                   ▼\n┌─────────────────────────────────────────────────┐\n│  auto-memory CLI                                │\n│  (pure Python, zero deps, read-only)            │\n└──────────────────┬──────────────────────────────┘\n                   │ SELECT ... FROM sessions\n                   ▼\n┌─────────────────────────────────────────────────┐\n│  ~/.copilot/session-store.db                    │\n│  (SQLite + FTS5, owned by Copilot CLI binary)   │\n└─────────────────────────────────────────────────┘\n```\n\n- **Zero dependencies** — stdlib only (sqlite3, json, argparse)\n- **Read-only** — never writes to `~/.copilot/session-store.db`\n- **WAL-safe** — exponential backoff retry on SQLITE_BUSY (50→150→450ms)\n- **Schema-aware** — validates expected schema on every call, fails fast on drift\n- **Telemetry** — ring buffer of last 100 invocations for concurrency monitoring\n\n## Works with Claude Code (opt-in)\n\nIn addition to GitHub Copilot CLI, `auto-memory` can read [Claude Code](https://docs.anthropic.com/claude-code) session logs from `~/.claude/projects/`. This ships as a separate CLI binary (`session-recall-cc`) that is **off unless explicitly enabled** — Copilot CLI users pay zero cost.\n\n### Quick install (3 steps)\n\n```bash\npip install auto-memory[claude]\nexport SESSION_RECALL_ENABLE_CLAUDE_BACKEND=1\nsession-recall-cc health\n```\n\n### Optional: pre-warm scheduler\n\n> Skip this unless you want consistent sub-100ms latency. The CLI already does on-demand indexing (~50ms after the first run).\n\nIf you have the repo cloned, the installer auto-detects your OS:\n\n```bash\nbash scripts/install-claude-sidecar.sh --install    # auto-detects OS\nbash scripts/install-claude-sidecar.sh --status     # check state\nbash scripts/install-claude-sidecar.sh --uninstall  # remove\n```\n\nOtherwise, pick your OS below:\n\n#### macOS (Intel & Apple Silicon)\n\nUses `launchd` — Apple's native scheduler. Survives sleep/wake, auto-runs at login.\n\n```bash\nPYTHON3=\"$(command -v python3)\"\ncat > ~/Library/LaunchAgents/com.session-recall-cc.sidecar.plist <<EOF\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\"\n  \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">\n<plist version=\"1.0\"><dict>\n  <key>Label</key><string>com.session-recall-cc.sidecar</string>\n  <key>ProgramArguments</key><array>\n    <string>$PYTHON3</string><string>-m</string>\n    <string>session_recall.providers.claude_code.sidecar</string>\n    <string>--once</string>\n  </array>\n  <key>EnvironmentVariables</key><dict>\n    <key>SESSION_RECALL_ENABLE_CLAUDE_BACKEND</key><string>1</string>\n    <key>PATH</key><string>/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin</string>\n  </dict>\n  <key>StartInterval</key><integer>300</integer>\n  <key>RunAtLoad</key><true/>\n  <key>StandardOutPath</key><string>$HOME/.claude/.sr-sidecar.log</string>\n  <key>StandardErrorPath</key><string>$HOME/.claude/.sr-sidecar.err.log</string>\n</dict></plist>\nEOF\nlaunchctl load -w ~/Library/LaunchAgents/com.session-recall-cc.sidecar.plist\n```\n\n**Verify:** `launchctl list | grep session-recall-cc`\n**Uninstall:** `launchctl unload -w ~/Library/LaunchAgents/com.session-recall-cc.sidecar.plist && rm ~/Library/LaunchAgents/com.session-recall-cc.sidecar.plist`\n\n#### Linux / Windows WSL2\n\nUses `cron` — works on any distro and WSL2.\n\n```bash\n(crontab -l 2>/dev/null; echo \"*/5 * * * * env SESSION_RECALL_ENABLE_CLAUDE_BACKEND=1 $(command -v python3) -m session_recall.providers.claude_code.sidecar --once >> ~/.claude/.sr-sidecar.log 2>&1\") | crontab -\n```\n\n**Verify:** `crontab -l | grep session-recall`\n**Uninstall:** `crontab -l | grep -v session-recall | crontab -`\n\n> [!TIP]\n> Full details (Windows Task Scheduler, interval tuning, troubleshooting) → [`deploy/install-claude-code.md`](deploy/install-claude-code.md) §7\n\n### How it works\n\n- Reads Claude Code's per-conversation `~/.claude/projects/<cwd>/<uuid>.jsonl` files\n- Builds an FTS5 index at `~/.claude/.sr-index.db`\n- Indexer is **mtime-incremental** — typical update <100ms\n- **Read-only** — never modifies Claude Code's session files\n\n### Sample output\n\n> Try: *\"What work was done on the API integration in this repo? Check session-recall-cc for recent history.\"*\n\n**`session-recall-cc list --limit 5`**\n\n| ID | Repo | Summary | Last Seen | Turns |\n|----|------|---------|-----------|-------|\n| `3b89ff09` | myorg/backend-api | What work was done on the API integration? | 2026-05-02 | 1 |\n| `7e63b4b4` | myorg/infra | Where are the session JSON files for Claude Code located? | 2026-05-02 | 1 |\n| `78c36e1f` | myorg/infra | How do I update Claude Code? | 2026-05-02 | 2 |\n| `aed766c7` | myorg/backend-api | Refactored auth middleware | 2026-04-23 | 1 |\n| `0f532ef0` | myorg/dotfiles | ping | 2026-04-18 | 0 |\n\n**`session-recall-cc search \"database migration\" --limit 3`**\n\n| ID | Repo | Snippet (FTS5 highlights in ⟦⟧) |\n|----|------|---------------------------------|\n| `bc112c14` | myorg/backend-api | ⟦Database⟧ ⟦migration⟧ for user table — added indexes on email and created_at |\n| `01bf810e` | myorg/infra | Check if the staging ⟦database⟧ has pending ⟦migration⟧ scripts |\n| `3b89ff09` | myorg/backend-api | What work was done on ⟦database⟧ ⟦migration⟧ in this repo? |\n\n### 🤖 For your AI coding agent\n\nIf you'd rather have an agent install this for you, point it at [`deploy/install-claude-code.md`](deploy/install-claude-code.md). The doc has YAML front-matter (`requires-user-confirmation: true`) and per-step \"agent: ask user\" prompts so a reasoning model walks you through install with confirmation at every mutating step.\n\n## Usage\n\n### Try these prompts with your agent\n\n Once wired into your agent's instruction file, session-recall runs on every prompt — giving the agent your recent files and sessions as context before it does anything else.\n\n\n```\n\"Search recent sessions about fixing the db connection bug\"\n\"Check past 5 days sessions for latest plans?\"\n\"Pick up where we left off on the API refactor\"\n\"search recent sessions for last 10 files we modified\"\n\"search sessions for the db migration bug\"\n```\n\nNo special syntax. The agent reads your session history and gets oriented in seconds instead of minutes.\n\n### How it works under the hood\n\nProgressive disclosure — most prompts never get past Tier 1.\n\n**Tier 1 — Cheap scan (~50 tokens).** Usually enough.\n\n```bash\nsession-recall files --json --limit 10\nsession-recall list --json --limit 5\n```\n\n**Tier 2 — Focused recall (~200 tokens).** When Tier 1 isn't enough.\n\n```bash\nsession-recall search \"specific term\" --json\n```\n\n**Tier 3 — Full session detail (~500 tokens).** Only when investigating something specific.\n\n```bash\nsession-recall show <session-id> --json\n```\n\n**Operational commands:**\n\n```bash\nsession-recall health          # 9-dimension health dashboard\nsession-recall schema-check    # validate DB schema after Copilot CLI upgrades\nsession-recall repos --json     # discovered repositories across providers\n```\n\n`session-recall` now supports multi-storage discovery for current Copilot CLI layouts, including session-state sources when legacy `session-store.db` is absent.\n\n## Multi-Storage Recall\n\nBy default, session-recall reads only from Copilot CLI's SQLite database. Enable file-backed providers to also recall sessions from VS Code, JetBrains, and Neovim:\n\n```bash\nexport SESSION_RECALL_ENABLE_FILE_BA
