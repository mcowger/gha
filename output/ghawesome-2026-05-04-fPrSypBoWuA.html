<script id="project-data" type="application/json">[{"owner":"Russell-cell","repo":"PPT-Design-Prompt","url":"https://github.com/Russell-cell/PPT-Design-Prompt","readme":"# PPT-Design-Prompt\n\nConvert `DESIGN.md` brand references into presentation-image oriented\n`DESIGN.md` files.\n\n1\n\nThis repository is for **slide image systems**, not full slide decks, not HTML\npresentations, and not product UI implementation. The goal is to turn web-first\nbrand guidance into a format that image models and design agents can use when\ngenerating assets for PowerPoint, Keynote, PDF decks, or visual essays.\n\nThis project is adapted from the upstream `DESIGN.md` collection maintained at\n[VoltAgent/awesome-design-md](https://github.com/VoltAgent/awesome-design-md).\nIts purpose is to reinterpret those web and UI oriented references as\npresentation-image prompts and guidance.\n\n## Upstream source\n\nThe original source catalog for this project is:\n\n- [https://github.com/VoltAgent/awesome-design-md](https://github.com/VoltAgent/awesome-design-md)\n\nThis repository is a derivative conversion tool and prompt library. It is not\nthe original source catalog, and it should not be confused with the upstream\nproject.\n\n## What this repo is\n\n- a converter from source `DESIGN.md` files to `ppt-image/<brand>/DESIGN.md`\n- a small Python CLI that can be installed and re-run locally\n- a generic presentation-image `DESIGN.md` at the repo root\n- a minimal synthetic example for CI and contributor onboarding\n\n## What this repo is not\n\n- not a deck generator\n- not a PowerPoint exporter\n- not a screenshot scraper\n- not a promise that every brand source can be legally redistributed\n\n## Open-source boundary\n\nThis repository is structured so that **local downloaded sources stay local by\ndefault**.\n\n- `source/` is ignored by `.gitignore`\n- local source files are expected to originate from\n  [VoltAgent/awesome-design-md](https://github.com/VoltAgent/awesome-design-md)\n- the repository license applies to repo-authored code and docs\n- third-party brand names and source materials remain the property of their\n  owners\n- if you publish converted brand outputs, review the legal notes in\n  [ATTRIBUTION.md](./ATTRIBUTION.md)\n\nIf your local working copy already contains a populated `source/` directory,\ndouble-check it before making an initial public commit.\n\n## Repository layout\n\n```text\n.\n+-- DESIGN.md                      # generic presentation-image design guide\n+-- ATTRIBUTION.md                 # licensing and provenance boundary\n+-- catalog/brands.txt             # optional expected brand catalog\n+-- examples/minimal/              # synthetic example fixture\n+-- ppt-image/                     # generated outputs\n+-- scripts/                       # convenience wrapper for repo-local runs\n+-- src/awesome_design_md_ppt_images/\n|   +-- cli.py\n|   +-- converter.py\n+-- tests/\n```\n\n## Install\n\n```bash\npython -m pip install -e .\n```\n\n## Quick start\n\nIf you already have local source files under `source/<brand>/DESIGN.md`, run:\n\n```bash\ndesign-md-ppt convert\n```\n\nThis writes:\n\n- converted files to `./ppt-image`\n- a manifest to `./conversion_manifest.json`\n\nIf you want explicit paths:\n\n```bash\ndesign-md-ppt convert \\\n  --source-root ./source \\\n  --output-root ./ppt-image \\\n  --manifest ./conversion_manifest.json \\\n  --brands-file ./catalog/brands.txt\n```\n\n## Example run without third-party data\n\nThis repo ships with a synthetic example so contributors can test the toolchain\nwithout downloading live sources:\n\n```bash\ndesign-md-ppt convert \\\n  --source-root ./examples/minimal/source \\\n  --output-root ./examples/minimal/output \\\n  --manifest ./examples/minimal/manifest.json \\\n  --brands-file ./examples/minimal/brands.txt\n```\n\n## Legacy script\n\nFor people who prefer the old workflow, the repo still includes:\n\n```bash\npython ./scripts/generate_ppt_image_designs.py\n```\n\nThat wrapper runs the same converter with repo-root defaults.\n\n## Why the brand catalog exists\n\n`catalog/brands.txt` is optional.\n\n- if you provide it, the converter knows which brands are expected and can emit\n  placeholders for missing sources\n- if you omit it, the converter simply converts whatever exists under\n  `source/`\n\nThis makes the tool self-contained and removes the old dependency on a sibling\n`awesome-design-md_upstream` checkout.\n\n## Development\n\nRun tests:\n\n```bash\npython -m unittest discover -s tests -v\n```\n\nRun the example conversion:\n\n```bash\ndesign-md-ppt convert \\\n  --source-root ./examples/minimal/source \\\n  --output-root ./tmp-example-output \\\n  --manifest ./tmp-example-manifest.json \\\n  --brands-file ./examples/minimal/brands.txt\n```\n\n## Current repository state\n\nThis working tree currently contains generated outputs under `ppt-image/`. They\ncan be useful as a public catalog, but they may still be too close to upstream\nbrand materials for some maintainers' comfort level. If you want a stricter\nopen-source posture, keep the code and generic docs, then selectively review or\nremove brand-specific generated outputs before your first public push.\n","summary":"PPT‑Design‑Prompt is a lightweight Python tool that transforms web‑centric brand guidance stored in `DESIGN.md` files into presentation‑image–oriented `DESIGN.md` prompts. It provides a CLI converter that reads locally sourced brand files, rewrites them for use by image models or design agents, and outputs the results under `ppt‑image/` along with a conversion manifest. Built around a synthetic example and optional brand catalog, the project keeps third‑party assets local and respects licensing boundaries. Designers, marketers, and AI‑assistant developers who need brand‑consistent slide visuals without generating full decks will find this utility useful.","description":null,"stars":891,"language":"Python"},{"owner":"jasonkneen","repo":"agent-simulator","url":"https://github.com/jasonkneen/agent-simulator","readme":"# Agent Simulator\n\n**Live iOS Simulator preview with React Native inspector, accessibility-tree driven tools, and an MCP bridge.** Drive iOS apps from your browser or an AI agent — see the live screen, click any element to get its real source code, tap / swipe / type without moving the macOS cursor.\n\nBuilt for three audiences at once:\n\n1. **RN / Expo devs** who want a Figma-style \"layers panel\" for their running app, with real `App.tsx:42` source lookups.\n2. **QA & demo flows** that want a scriptable sim without the pain of XCUITest — accessibility-label taps, swipes, keyboard input, screenshots.\n3. **AI agents** (Claude Desktop, OpenAI Agents SDK, Cursor, …) that need a first-class tool surface to *see* what's on the screen and *act* on it. Everything the browser can do is exposed over MCP.\n\n```\n┌──────────────────────────┐    ┌─────────────────────────────┐\n│ Browser UI               │    │ MCP client                  │\n│ /   (agent-simulator)    │    │ (Claude Desktop, Codex, …)  │\n│  - live MJPEG stream     │    └────────────────┬────────────┘\n│  - iOS a11y layer tree   │                     │ stdio\n│  - React component tree  │                     ↓\n│  - props + source window │    ┌─────────────────────────────┐\n│  - tap/swipe/drive/type  │    │ mcp/server.mjs              │\n└─────────────┬────────────┘    │ 15 MCP tools over WS        │\n              │ WS + HTTP       └────────────────┬────────────┘\n              ↓                                  │ WS\n┌──────────────────────────────────────────────────┐\n│ server.js (Node)                                 │\n│ static · /api/config · /api/tree · /api/source   │\n│ WS bridge · Metro /symbolicate proxy             │\n└──┬────────┬──────────────────────────────────────┘\n   │ stdin  │ WS (opt.)\n   ↓        ↓\n┌──────────┐ ┌─────────────────────┐\n│sim-server│ │ Expo / RN app with  │\n│ (Rust)   │ │ agent-simulator     │\n│ MJPEG +  │ │ metro plugin        │\n│ axe HID  │ │ (inspector bridge)  │\n└─────┬────┘ └─────────────────────┘\n      │\n  iOS Simulator (axe + simctl)\n```\n\n---\n\n## Features\n\n| | |\n|---|---|\n| **Cursor-free input** | Every tap / swipe / key goes through [`axe`](https://github.com/cameroncooke/AXe) → `FBSimulatorHID` → `CoreSimulator`. No macOS cursor movement, no Simulator.app focus requirement, pixel-exact at any zoom. |\n| **Drive any iOS app** | Taps, drags, mouse-wheel scroll, multitask, home, lock, keyboard passthrough. Works on Settings, Maps, Messages — not just RN apps. |\n| **iOS accessibility tree** | Populated from `axe describe-ui` on boot. Every on-screen element with its label, role, and frame — before you click anything. |\n| **React component tree** | For RN apps running the metro plugin, inspect any rendered component and get the full fiber stack with real source paths (React 19 `_debugStack` + Metro `/symbolicate`). |\n| **Real source code panel** | Select any component and the Properties panel fetches the actual file and renders a code window around the target line. Works for your code, RN's Libraries, and Expo shims. |\n| **MCP bridge** | 15 tools: `sim_tree`, `sim_tap_by_label`, `sim_swipe`, `sim_type`, `sim_inspect`, `sim_source`, `sim_screenshot`, and more. Every browser capability exposed to AI agents. |\n\n---\n\n## Requirements\n\n- **macOS** with Xcode + at least one iOS simulator installed.\n- **Node ≥ 18** (or Bun — scripts are bun-friendly).\n- **Rust toolchain** (for building `sim-server` once).\n- **[axe](https://github.com/cameroncooke/AXe)** — the cursor-free input driver. One-line install:\n\n  ```bash\n  brew install cameroncooke/axe/axe\n  ```\n\n- **A React Native / Expo app** with the agent-simulator metro plugin, *only if* you want React component inspection. Driving, screenshots, and the iOS accessibility tree all work against any iOS app.\n\n---\n\n## Quick start (1 minute)\n\n```bash\n# 1. Clone & install\ngit clone https://github.com/jkneen/agent-simulator\ncd agent-simulator\nbun install\n\n# 2. Build the Rust sim-server (once)\n(cd sim-server && cargo build --release)\n\n# 3. Build the web UI (once, or after UI changes)\n(cd web-app && bun install && bun run build)\n\n# 4. Boot any simulator yourself, then start the server\nxcrun simctl boot \"iPhone 17 Pro\" || true\nopen -a Simulator\nbun start\n\n# 5. Open the UI\nopen http://localhost:3200\n```\n\nThe UI will attach to whatever iOS simulator is booted. Open Settings, Maps, Messages, or any app — you can drive it immediately. The iOS layer tree on the left is populated from the accessibility API; the React tree is empty until you load an RN app with the inspector bridge (see below).\n\n---\n\n## One-command demo (the fun one)\n\nWe ship an Expo demo app and a launcher that starts everything for you.\n\n```bash\nbun demo\n```\n\nThis will:\n\n1. Boot the first available iPhone simulator (or reuse the booted one).\n2. Start Metro for `examples/expo-demo` on port 8081.\n3. Launch the demo via `exp://127.0.0.1:8081` in Expo Go.\n4. Start the agent-simulator Node server on :3200.\n5. Open `http://localhost:3200` in your browser.\n\nCtrl-C cleans up both processes. Once it's running you can:\n\n- Click anywhere in the preview to drive the app (the tap animates with a pulse ring, and the Layers panel expands to the nearest accessibility element).\n- Hit `I` to enter **Inspect mode**, hover / click a React component, and watch the Properties panel fill with the component name, source file, and actual JSX code.\n- Tap the `+` on the counter — the Code panel opens `examples/expo-demo/App.tsx:42` with the `<Text style={styles.pillText}>+</Text>` line highlighted.\n\nFlags:\n\n```bash\nbun demo --no-open             # skip launching the browser\nbun demo --port=3300           # use a different agent-simulator port\nbun demo --metro-port=8082     # use a different Metro port\nbun demo --device=<UDID>       # target a specific simulator\n```\n\n---\n\n## Adding agent-simulator to your own RN / Expo app\n\nIf you already have an app, add the metro plugin so the inspector bridge injects at boot:\n\n```js\n// metro.config.js\nconst { getDefaultConfig } = require(\"expo/metro-config\");\nconst { withAgentSimulator } = require(\"agent-simulator/runtime/metro-plugin\");\n\nmodule.exports = withAgentSimulator(getDefaultConfig(__dirname));\n```\n\n…then install this package alongside:\n\n```bash\n# Note: `agent-simulator` is not published to npm yet.\n# Install directly from GitHub:\nbun add -D github:jasonkneen/agent-simulator\n```\n\nOr, if you don't want to touch Metro config, import the bridge at your app's entry point *before* `registerRootComponent`:\n\n```ts\n// index.ts\nimport \"agent-simulator/runtime/inspector-bridge\";\nimport { registerRootComponent } from \"expo\";\nimport App from \"./App\";\nregisterRootComponent(App);\n```\n\nWhen your app launches with either setup, the **BRIDGE** pill in the toolbar turns green and inspect clicks produce full component stacks with real source locations.\n\n---\n\n## The UI\n\n| Region | What it shows |\n|---|---|\n| Header | Device chip, stream + bridge status pills, Inspect toggle, Home / Multitask / Lock / Rotate, panel toggles, theme menu. |\n| Layers panel (left) | Toggles between the **iOS accessibility tree** (populated automatically) and the **React component tree** (populated on inspect). Click any layer to select, hover to highlight, the tree auto-expands ancestors when you tap inside the sim. |\n| Simulator canvas | Live MJPEG. In drive mode, the native cursor is hidden and replaced by a round in-preview pointer; taps fire a ping ring, drags become swipes, the mouse wheel scrolls, the keyboard types into the focused field. Inspect mode replaces the pointer with a crosshair and draws selection overlays. |\n| Properties panel (right) | Selected layer's accessibility properties, React component name + source, and a highlighted code window around the JSX call site or component definition. |\n| Status bar | UDID, mode flags, last-inspect frame count, keyboard shortcut hints. |\n\n### Keyboard shortcuts\n\n- `I` — toggle Inspect (disabled when no RN bridge)\n- `Esc` — cancel Inspect / unpin selection\n- Any other keystroke while the preview is focused → forwarded to the sim (works for any text field)\n\n---\n\n## MCP bridge\n\n`mcp/server.mjs` is a standalone [Model Context Protocol](https://modelcontextprotocol.io) server. It speaks stdio to any MCP host and bridges to the running agent-simulator server over WebSocket. All 15 tools:\n\n| Tool | Purpose |\n|---|---|\n| `sim_info` | Device UDID / name / stream URL / device-point size. |\n| `sim_tree` | Full iOS accessibility tree. `flat: true` returns a labelled-element list for cheap LLM context. |\n| `sim_tap` | Tap at `(x, y)` sim-ratio. |\n| `sim_tap_by_label` | Look up an AX element by label / value (optional type filter) and tap its centre — robust to layout changes. |\n| `sim_swipe` | Single-call native swipe with `durationMs`. |\n| `sim_type` | Type printable text into the focused TextField. |\n| `sim_key` | Press one USB-HID keycode (Return=40, Backspace=42, Esc=41, arrows 80–83…). |\n| `sim_button` | `home` / `lock` / `power` / `side-button` / `siri` / `apple-pay`. |\n| `sim_multitask` | Open the app switcher. |\n| `sim_screenshot` | Returns the current frame as an MCP `image` content. |\n| `sim_inspect` | Inspect the RN component at `(x, y)` — returns a source-symbolicated component stack. |\n| `sim_source` | Read a code window around `file:line` for any absolute path in the workspace. |\n| `sim_select_by_source` | Given `fileName` + `line`, probes a grid until it finds a rendered component whose source matches. |\n| `sim_subscribe_selections` | Streams `inspectResult` events back as MCP logging notifications. |\n| `sim_unsubscribe_selections` | Stops the above. |\n\n### Configure an MCP client\n\nFor **Claude Desktop**, add to `~/Library/Application Support/Claude/claude_desktop_config.json`:\n\n```jsonc\n{\n  \"mcpServers\": {\n    \"agent-simulator\": {\n      \"command\": \"node\",\n      \"args\": [\"/absolute/path/to/agent-simulator/mcp/server.mjs\"],\n      \"env\": { \"SIM_PREVIEW_URL\": \"http://localhost:3200\" }\n    }\n  }\n}\n```\n\nThen start the agent-simulator server (`bun start` or `bun demo`). The MCP server connects on demand.\n\nFor any other MCP host (OpenAI Agents SDK, Cursor, Continue, Codex, custom harnesses): spawn `node /path/to/mcp/server.mjs` with `SIM_PREVIEW_URL` pointing at your running server.\n\n### Example agent flow\n\n```\n1. sim_tree flat:true                       → see every element on screen\n2. sim_tap_by_label \"+\"                     → tap the counter's plus\n3. sim_tap_by_label \"Your name\" type:\"TextField\"\n4. sim_type \"hello agent\"\n5. sim_key 40                               → Return\n6. sim_inspect x:0.86 y:0.24                → returns App.tsx:42\n7. sim_source file:\".../App.tsx\" line:42    → read the JSX\n```\n\n---\n\n## Architecture\n\nThree binaries, one simulator:\n\n1. **sim-server (Rust)** — captures the simulator screen via `simctl io screenshot`, encodes MJPEG, serves `/stream.mjpeg`, `/snapshot.jpg`, `/api/tree`, and `/health`. Reads tap / swipe / type commands from stdin and shells out to `axe`.\n2. **server.js (Node)** — orchestrates sim-server, serves the Vite-built UI, exposes `/api/config` / `/api/tree` / `/api/source`, bridges browser and MCP WebSocket clients, proxies stack frames through Metro's `/symbolicate` for React inspection.\n3. **web-app (React + shadcn + Tailwind)** — the UI. Dark / light themes, two trees, resizable panels, keyboard capture, drag-to-swipe, wheel-to-scroll.\n\n### Touch injection\n\nClicks from the UI (or MCP) travel:\n\n```\nbrowser ── WS ──> server.js ── stdin ──> sim-server ── exec ──> axe tap -x … -y … --udid …\n                                                                       │\n                                                                       └──> FBSimulatorHID → CoreSimulator\n                                                                           (device-point coords, cursor-free)\n```\n\nCoordinates are carried as `[0, 1]` ratios end-to-end; `sim-server` converts to device points using the root `AXFrame` from `axe describe-ui` (cached with a 5 s TTL, invalidated on rotate). Every gesture is one subprocess call — no per-step stdin traffic.\n\n### `/api/tree` and `/api/source`\n\n- **`GET /api/tree`** — proxies `axe describe-ui --udid <udid>` via sim-server and returns the raw JSON. The UI pulls this on boot and on refresh; the MCP `sim_tree` tool wraps it.\n- **`GET /api/source?file=ABS&line=N&context=M`** — reads a window of lines around `line` from an absolute path, returns `{file, lines, startLine0, endLine0, targetLine0, language}`. Powers the Code panel in the UI and the `sim_source` MCP tool.\n\n### React source resolution\n\nReact 19 removed `fiber._debugSource`. Sources now live inside `fiber._debugStack`, an `Error` object whose stack string points at bundle-URL line/col pairs. On every `inspectResult`:\n\n1. The inspector-bridge (in the RN app) parses `_debugStack`, collects up to 12 candidate frames per fiber, attaches them as `bundleFrames: […]`.\n2. `server.js` batch-POSTs every bundle frame to `http://localhost:8081/symbolicate` in one round trip and picks the first candidate per fiber that isn't inside React's own `createElement` / `jsxDEV` plumbing.\n3. The UI receives a regular `stack[i].source` with a real absolute file path.\n\nThis means *every* user component, RN internal component (RCTView, ScrollView, …), and Expo shim resolves to actual code on disk.\n\n---\n\n## Stream quality and the FPS ceiling\n\nClick the **Quality** dropdown in the toolbar. Five presets plus fine-tune\nsliders for FPS, JPEG quality, scale, and capture mode.\n\n| Preset | Target FPS | Resolution | Mode | Notes |\n|---|---|---|---|---|\n| **Eco** | 2 | 300×650 | MJPEG | battery-friendly, background monitoring |\n| **Balanced** | 3 | 400×870 | MJPEG | default — matches the CSS size the browser paints |\n| **Smooth** | up to 10 | 400×870 | MJPEG | good for scrolling |\n| **Max** | up to 30 | 400×870 | MJPEG | upper limit of the MJPEG path |\n| **Fluid** | up to 60 | 400×870 | BGRA + keepalive | experimental, see caveats below |\n\nChanging a preset fires a WebSocket `setCapture`, which makes the server\nrespawn `sim-server` with the new arguments and broadcast a\n`configChanged` event. The browser `<img>` re-subscribes to the new\nstream URL automatically. Total switch time is about half a second.\n\n### Click accuracy is decoupled from resolution\n\nEvery tap / swipe carries `[0, 1]` ratios. They get converted to\ndevice points server-side using the root `AXFrame` from\n`axe describe-ui`, so a 300×650 Eco stream has exactly the same click\nprecision as a 1206×2622 native-retina stream. Lower resolutions only\ncost you pixels on screen, not targeting.\n\n### Honest FPS numbers\n\nMeasured on an iPhone 17 Pro simulator on an M-series Mac:\n\n| Path | Requested | Actual |\n|---|---|---|\n| `axe screenshot` (one-shot) | — | 280–370 ms per call — **~3 fps ceiling** |\n| `axe stream-video --format raw --fps 30` | 30 | ~5–10 fps (axe's screenshot loop is the bottleneck) |\n| `axe stream-video --format bgra` | 60 | First frame, then stalls — `FBVideoStreamConfiguration` is hard-coded to `framesPerSecond: nil`, IOSurface callback stays silent on current iOS sims |\n\nSo the \"up to 60 fps\" on the Fluid preset is aspirational: the\narchitecture is in place, but **axe as shipped cannot deliver 60 fps today**. To unblock real 60 fps you'd need one of:\n\n1. Fork [axe](https://github.com/cameroncooke/AXe) and pass a concrete `framesPerSecond` value into `FBVideoStreamConfiguration` on the BGRA path.\n2. Replace the `axe stream-video` subprocess with a Swift helper that links `FBSimulatorControl.xcframework` directly and drives `SimDevice` / `SimDeviceIOClient` ourselves.\n\nBoth are real half-day projects. The current wire protocol is already\na drop-in replacement — swapping in a faster backend is one file.\n\n### Keepalive in Fluid mode\n\nBecause BGRA otherwise delivers a single frame and then nothing,\nsim-server runs a **screenshot keepalive** alongside the BGRA reader\nin that mode. If no frame arrives for 300 ms, it fires one\n`axe screenshot`, decodes the PNG, re-encodes as JPEG, and broadcasts\nit — so the preview is never blank. When BGRA does fire (animation-heavy\napps, scrolling), the keepalive stays silent.\n\nNet effect in practice:\n\n- Idle screen → ~3 fps from keepalive.\n- Active scrolling → keepalive silent, BGRA may or may not contribute.\n- Worst case is never 0 fps.\n\n### Env-var overrides\n\nThe server accepts the same knobs as environment variables so you can\npick defaults without the UI:\n\n```bash\nSP_FPS=10 SP_QUALITY=60 SP_SCALE=0.33 SP_CAPTURE=mjpeg bun start\nSP_CAPTURE=bgra bun start   # force BGRA path from boot\n```\n\n## Tips\n\n- Use **`axe`'s simulator conventions** (device points, not Mac pixels) if you're writing agent scripts directly. The UI handles the ratio ↔ point conversion.\n- **`axe describe-ui`** is a great reference: `axe describe-ui --udid <UDID> | jq '.[0]'`.\n- The Metro cache is invalidated when `inspector-bridge.js` changes. If the bridge version log doesn't advance after an edit, restart Metro with `expo start --clear`.\n- `SP_FPS` and `SP_QUALITY` env vars tune MJPEG performance (defaults: `fps=3 q=55`).\n\n---\n\n## Development\n\n```bash\n# Re-build the Rust server after Rust edits\n(cd sim-server && cargo build --release)\n\n# Re-build the UI after web-app edits\n(cd web-app && bun run build)\n\n# Run the MCP server standalone\nbun mcp\n\n# Tail MCP traffic with the official inspector\nnpx @modelcontextprotocol/inspector node mcp/server.mjs\n```\n\nProject layout:\n\n```\nagent-simulator/\n├── server.js              Node orchestrator, WS bridge, HTTP\n├── scripts/demo.mjs       One-command demo launcher\n├── sim-server/            Rust MJPEG + axe driver\n├── runtime/               RN metro plugin + inspector bridge\n├── web-app/               Vite + React + shadcn UI\n├── web/                   Legacy single-file UI (served at /classic)\n├── mcp/                   MCP server (15 tools)\n├── examples/expo-demo/    Expo app with the plugin pre-configured\n└── LICENSE                AGPL-3.0-or-later\n```\n\n---\n\n## License\n\n**AGPL-3.0-or-later.** See [`LICENSE`](./LICENSE).\n\nIf you're embedding agent-simulator inside a commercial product, or you need a different license, open an issue — I'm happy to talk about dual-licensing.\n","summary":"Agent Simulator gives developers and AI agents a browser‑based way to drive and inspect any iOS app in real time, streaming the simulator’s screen via MJPEG while exposing an accessibility‑driven element tree and, for React Native apps, a live component inspector with source‑code lookup. Cursor‑free input is routed through Axe to the simulator’s HID interface, enabling taps, swipes, key presses, and screenshots without moving the macOS cursor or focusing the Simulator app. Built on a Rust sim‑server, Node back end, and an MCP bridge, it offers 15 WebSocket/HTTP tools that expose everything the browser can do to AI agents such as Claude or OpenAI’s Agents SDK. The result is ideal for RN/Expo developers seeking instant component debugging, QA teams needing scriptable test flows, and AI‑driven tools that must see and act on the app’s UI.","description":"An iOS simulator in a browser you can inspect","stars":185,"language":"TypeScript"},{"owner":"JuliusBrussee","repo":"cavemem","url":"https://github.com/JuliusBrussee/cavemem","readme":"<div align=\"center\">\n\n![](https://em-content.zobj.net/source/apple/391/rock_1faa8.png)\n\n# cavemem\n\n**why agent forget when agent can remember**\n\n[![npm](https://img.shields.io/npm/v/cavemem?style=flat&color=yellow)](https://www.npmjs.com/package/cavemem) [![Stars](https://img.shields.io/github/stars/JuliusBrussee/cavemem?style=flat&color=yellow)](https://github.com/JuliusBrussee/cavemem/stargazers) [![Last Commit](https://img.shields.io/github/last-commit/JuliusBrussee/cavemem?style=flat)](https://github.com/JuliusBrussee/cavemem/commits/main) [![License](https://img.shields.io/github/license/JuliusBrussee/cavemem?style=flat)](LICENSE)\n\n[Install](#install) • [How it works](#how-it-works) • [CLI](#cli) • [MCP](#mcp) • [Settings](#settings)\n\n</div>\n\n<p align=\"center\">\n  <strong>🪨 Caveman Ecosystem</strong> &nbsp;·&nbsp;\n  <a href=\"https://github.com/JuliusBrussee/caveman\">caveman</a> <em>talk less</em> &nbsp;·&nbsp;\n  <strong>cavemem</strong> <em>remember more</em> <sub>(you are here)</sub> &nbsp;·&nbsp;\n  <a href=\"https://github.com/JuliusBrussee/cavekit\">cavekit</a> <em>build better</em>\n</p>\n\n\n---\n\nCross-agent persistent memory for coding assistants. Hooks fire at session boundaries, compress observations with the caveman grammar (~75% fewer prose tokens, code and paths preserved byte-for-byte), and write to local SQLite. Agents query their own history through three MCP tools. No network. No cloud.\n\n**Supports:** Claude Code · Cursor · Gemini CLI · OpenCode · Codex\n\n- **Persistent memory across sessions.** Hooks capture what happened; the store keeps it.\n- **Compressed at rest.** Deterministic caveman grammar, round-trip-guaranteed expansion for humans.\n- **Progressive MCP retrieval.** `search`, `timeline`, `get_observations` — agents filter before fetching.\n- **Hybrid search.** SQLite FTS5 keyword + local vector index, combined with a tunable ranker.\n- **Local by default.** No network calls. Optional remote embedding providers via config.\n- **Web viewer.** Read-only UI at `http://localhost:37777` for browsing sessions in human-readable form.\n- **Cross-IDE installers.** Claude Code, Gemini CLI, OpenCode, Codex, Cursor — one command each.\n- **Privacy-aware.** `<private>...</private>` stripped at write boundary. Path globs exclude whole directories.\n\n---\n\n## Install\n\n```sh\nnpm install -g cavemem\ncavemem install                    # Claude Code\ncavemem install --ide cursor       # cursor | gemini-cli | opencode | codex\ncavemem status                     # see wiring + embedding backfill\ncavemem viewer                     # open http://127.0.0.1:37777\n```\n\nNo daemon to start. Hooks write synchronously. A local worker auto-spawns in the background on the first hook to build embeddings; it self-exits when idle. Disable with `cavemem config set embedding.autoStart false`.\n\n---\n\n## How it works\n\n```\nsession event  →  redact <private>  →  compress  →  SQLite + FTS5\n                                                           ↑\n                                                MCP queries on demand\n```\n\nWhat compression looks like in practice:\n\n```\nInput:  \"The auth middleware throws a 401 when the session token expires; we should add a refresh path.\"\nStored: \"auth mw throws 401 @ session token expires. add refresh path.\"\nViewed: \"The auth middleware throws a 401 when session token expires. Add refresh path.\"\n```\n\nCode blocks, URLs, paths, identifiers, and version numbers are never touched. Hook handlers complete in under 150ms. Full bodies fetched on demand via `get_observations`.\n\n---\n\n## CLI\n\n| Command | |\n|---------|--|\n| `cavemem install [--ide <name>]` | Register hooks + MCP for an IDE |\n| `cavemem uninstall [--ide <name>]` | Remove hooks + MCP |\n| `cavemem status` | Single dashboard: wiring, DB counts, embedding backfill, worker pid |\n| `cavemem config show\\|get\\|set\\|open` | View/edit settings — schema is self-documenting |\n| `cavemem start\\|stop\\|restart` | Control the worker daemon (usually unnecessary — auto-starts) |\n| `cavemem viewer` | Open the memory viewer in your browser |\n| `cavemem doctor` | Verify installation |\n| `cavemem search <query> [--limit N] [--no-semantic]` | Search memory (BM25 + cosine re-rank) |\n| `cavemem compress <file>` | Compress a file with caveman grammar |\n| `cavemem reindex` | Rebuild FTS5 + vector index |\n| `cavemem export <out.jsonl>` | Dump observations to JSONL |\n| `cavemem mcp` | Start MCP server (stdio) |\n\n---\n\n## MCP\n\nProgressive disclosure: `search` and `timeline` return compact results; `get_observations` fetches full bodies.\n\n| Tool | Returns |\n|------|---------|\n| `search(query, limit?)` | `[{id, score, snippet, session_id, ts}]` — BM25 + optional cosine re-rank |\n| `timeline(session_id, around_id?, limit?)` | `[{id, kind, ts}]` |\n| `get_observations(ids[], expand?)` | Full bodies, expanded by default |\n| `list_sessions(limit?)` | `[{id, ide, cwd, started_at, ended_at}]` |\n\n---\n\n## Settings\n\n`~/.cavemem/settings.json`\n\n| Key | Default | |\n|-----|---------|--|\n| `dataDir` | `\"~/.cavemem\"` | SQLite location |\n| `compression.intensity` | `\"full\"` | `lite` / `full` / `ultra` |\n| `compression.expandForModel` | `false` | Return expanded text to model |\n| `embedding.provider` | `\"local\"` | `local` / `ollama` / `openai` |\n| `workerPort` | `37777` | Local viewer port |\n| `search.alpha` | `0.5` | BM25 / vector blend |\n| `search.defaultLimit` | `10` | Default result count |\n| `privacy.excludePatterns` | `[]` | Paths never captured |\n\nContent inside `<private>...</private>` is stripped before write. Paths matching `excludePatterns` are never read. The worker binds to `127.0.0.1` only.\n\n---\n\n## 🪨 The Caveman Ecosystem\n\nThree tools. One philosophy: **agent do more with less**.\n\n| Repo | What | One-liner |\n|------|------|-----------|\n| [**caveman**](https://github.com/JuliusBrussee/caveman) | Output compression skill | *why use many token when few do trick* — ~75% fewer output tokens across Claude Code, Cursor, Gemini, Codex |\n| [**cavemem**](https://github.com/JuliusBrussee/cavemem) *(you are here)* | Cross-agent persistent memory | *why agent forget when agent can remember* — compressed SQLite + MCP, local by default |\n| [**cavekit**](https://github.com/JuliusBrussee/cavekit) | Spec-driven autonomous build loop | *why agent guess when agent can know* — natural language → kits → parallel build → verified |\n\nThey compose: **cavekit** orchestrates the build, **caveman** compresses what the agent *says*, **cavemem** compresses what the agent *remembers*. Install one, some, or all — each stands alone.\n\n## Also by Julius Brussee\n\n- [**Revu**](https://github.com/JuliusBrussee/revu-swift) — local-first macOS study app with FSRS spaced repetition. [revu.cards](https://revu.cards)\n\n## License\n\nMIT\n","summary":"cavemem is a lightweight persistence layer for coding assistants that records every session event, compresses the text with a deterministic caveman grammar, and stores it in a local SQLite database. It exposes three MCP tools—`search`, `timeline`, and `get_observations`—so agents can retrieve filtered, keyword‑searchable history or load full bodies on‑demand, all without external network calls. The tool supports Claude Code, Cursor, Gemini CLI, OpenCode, Codex and others via simple one‑command installers, offers a local web viewer for human‑readable browsing, and respects privacy by redacting `<private>` blocks and excluding glob‑matched paths. Developers and AI‑augmented workflows that need fast, local, privacy‑conscious memory across coding sessions will find cavemem a practical addition.","description":"Cross-agent persistent memory for coding assistants. Stored compressed. Retrieved fast. Local by default.","stars":285,"language":"TypeScript"},{"owner":"openai","repo":"privacy-filter","url":"https://github.com/openai/privacy-filter","readme":"# OpenAI Privacy Filter\n\nOpenAI Privacy Filter is a bidirectional token-classification model for personally identifiable information (PII) detection and masking in text. It is intended for high-throughput data sanitization workflows where teams need a model that they can run on-premises that is fast, context-aware, and tunable.\n\nOpenAI Privacy Filter is pretrained autoregressively to arrive at a checkpoint with similar architecture to gpt-oss, albeit of a smaller size.  We  then converted that checkpoint into a bidirectional token classifier over a privacy label taxonomy, and post-trained with a supervised classification loss. (For architecture details about gpt-oss, please see the gpt-oss model card.) Instead of generating text token-by-token, this model labels an input sequence in a single forward pass, then decodes coherent spans with a constrained Viterbi procedure. For each input token, the model predicts a probability distribution over the label taxonomy which consists of 8 output categories described below.\n\nHighlights:\n\n- Permissive Apache 2.0 license: ideal for experimentation, customization, and commercial deployment.\n- Small size: Runs in a web browser or on a laptop – 1.5B parameters total and 50M active parameters.\n- Fine-tunable: Adapt the model to specific data distributions through easy and data efficient finetuning.\n- Long-context: 128,000-token context window enables processing long text with high throughput and no chunking.\n- Runtime control: configure precision/recall tradeoffs and detected span lengths through preset operating points.\n\n## This Repo\n\nThis repository contains the local code, CLI, and example assets used to run, evaluate, and finetune Privacy Filter checkpoints. It is meant for teams that want to inspect the implementation directly and operate the model in their own environment.\n\nRepository resources: [License](LICENSE) and [Security Policy](SECURITY.md).\n\n### How To Use\n\n1. Install the package locally:\n\n```bash\npip install -e .\n```\n\nAfter this, you will have a python script `opf` that can be run directly or via `python -m opf`. The script can be used in 3 separate ways, as described below.\n\n2. Run one-shot redaction:\n\nBy default, `opf` looks for a model at the directory pointed to by the `OPF_CHECKPOINT` variable, or `~/.opf/privacy_filter`. If a model is not found in the `~/.opf/privacy_filter` location, it will be downloaded.\n\n```bash\nopf \"Alice was born on 1990-01-02.\"\n```\n\nThe code supports running both on GPU (by default) and CPU. To run on CPU, use `--device cpu` flag:\n\n```bash\nopf --device cpu \"Alice was born on 1990-01-02.\"\n```\n\nTo override the default checkpoint, pass `--checkpoint`:\n\n```bash\nopf --checkpoint /path/to/checkpoint_dir \"Alice was born on 1990-01-02.\"\n```\n\nThe redaction mode supports redacting an entire file at once\n\n```bash\nopf -f /path/to/file\n```\n\nThe redaction can also be performed via pipes, to support complex one-liners:\n\n```bash\ncat /path/to/file | grep -e 'some_pattern' | opf\n```\n\nIf no input is provided, `opf` will start in interactive mode. In this mode, for each input example, the CLI prints structured JSON output, using ANSI color-coded previews if the terminal supports them. These options can be controlled by flags.\n\nConsult `opf redact --help` for more flags and information about the redaction mode.\n\n3. Run eval on a labeled dataset:\n\n```bash\nopf eval examples/data/sample_eval_five_examples.jsonl\n```\n\nThe sample eval fixtures under `examples/data/sample_eval_five_examples*.jsonl` are synthetic example data only and do not describe real people or real sensitive records. See `examples/data/README.md`.\n\nConsult `opf eval --help` for more flags and information about the evaluation mode.\n\n4. Finetune on your own labeled dataset:\n\n```bash\nopf train /path/to/train.jsonl --output-dir /path/to/finetuned_checkpoint\n```\n\nConsult `opf train --help` for more flags and information about the finetuning mode.\n\n### Structure\n\n- `opf/__main__.py`: unified CLI entrypoint for redact, eval, and train modes.\n- `opf/_api.py`: Python-facing API over the runtime and decoding stack.\n- `opf/_cli/`: command-line argument parsing and terminal rendering helpers.\n- `opf/_core/`: runtime loading, span conversion, and shared decoding logic.\n- `opf/_eval/`: dataset loading, preprocessing, metrics, and evaluation runners.\n- `opf/_train/`: local finetuning argument parsing and training runners.\n- `opf/_model/`: transformer implementation, checkpoint config, and weight loading.\n- `examples/data/`: sample eval files plus reproducible finetuning demo datasets.\n- `examples/scripts/finetuning/`: runnable finetuning demo harnesses.\n- `FINETUNING.md`: focused finetuning workflow and demo-script guide.\n- `OUTPUT_SCHEMAS.md`: JSON response and export payload formats.\n- `EVAL_AND_OUTPUT_MODES.md`: description of the output modes for redaction and evaluation.\n\n## Model Details\n\n### Model Description\n\nPrivacy Filter is a bidirectional token classification model with span decoding. It is trained in phases, beginning with autoregressive pretraining. The pretrained language model is then modified and post-trained as a bidirectional banded attention token classifier with band size 128 (effective attention window: 257 tokens including self). This means:\n\n* The base model is an autoregressive pretrained checkpoint.\n* The language-model output head is replaced with a token-classification head over privacy labels.\n* Post-training is supervised token-level classification rather than next-token prediction.\n* Inference applies constrained sequence decoding to produce coherent BIOES (Begin, Inside, Outside, End, Single) span labels.\n\nArchitecturally, the implementation in this repo is a pre-norm transformer encoder-style stack with:\n\n* token embeddings\n* 8 repeated transformer blocks\n* grouped-query attention with rotary positional embeddings, with 14 query heads and 2 KV heads (group size = 7 queries per KV head)\n* sparse mixture-of-experts feed-forward blocks with 128 experts total (top-4 routing per token)\n* a final token-classification head over privacy labels (rather than natural language vocabulary tokens), with residual stream width `d_model = 640`.\n\nRelative to iterative autoregressive approaches, this design allows all tokens to be labeled in one pass, which improves throughput. Relative to classical masked-language-model pretraining approaches, this is a post-training conversion of an autoregressive model rather than a native masked-LM setup.\n\n### Output Shape\n\nPrivacy Filter can detect 8 privacy span categories:\n\n1. `account_number`\n2. `private_address`\n3. `private_email`\n4. `private_person`\n5. `private_phone`\n6. `private_url`\n7. `private_date`\n8. `secret`\n\nTo perform token-classification, each non-background span category is expanded into boundary-tagged token classes: `B-<label>`, `I-<label>`, `E-<label>`, `S-<label>`, plus the background class, `O`. So the total number of token-level output classes is 33: 1 background class \\+ 8 span labels \\* 4 boundary tags \\= 33 classes. This means the output head emits 33 logits for each token. For a sequence of length T, the output has shape `[T, 33]`; for a batch of size B, it has shape `[B, T, 33]`.\n\nThe token-label vocabulary consists of the background label `O` plus BIOES-tagged variants of each privacy category: `account_number`, `private_address`, `private_email`, `private_person`, `private_phone`, `private_url`, `private_date`, and `secret`. In other words, for each category, the model predicts `B-`, `I-`, `E-`, and `S-` forms corresponding to begin, inside, end, and single-token spans. At inference time, these per-token logits are decoded into coherent BIOES span labels using constrained sequence decoding.\n\n### Sequence Decoding Rationale and Calibration\n\n#### Rationale\n\nAfter the token classifier produces per-token logits, we decode labels with a constrained Viterbi decoder using linear-chain transition scoring, rather than taking an independent argmax for each token. The decoder enforces allowed BIOES boundary transitions and scores complete label paths with start, transition, and end terms, plus six transition-bias parameters that control background persistence, span entry, span continuation, span closure, and boundary-to-boundary handoff. This global path optimization is intended to improve span coherence and boundary stability by making each token decision depend on sequence-level structure, not just local logits, especially in noisy or mixed-format text where local token decisions alone can produce fragmented or inconsistent boundaries.\n\n#### Operating-Point Calibration\n\nSequence Decoding parameters can discourage staying in background while encouraging span entry and continuation, yielding broader and more contiguous masking for improved recall, or vice versa for improved precision. At runtime, users can tune parameters that control this tradeoff.\n\n### Model Metadata\n\n- Developed by: OpenAI\n- Funded by: OpenAI\n- Shared by: OpenAI\n- Model type: Bidirectional token classification model for privacy span detection\n- Language(s): Primarily English; selected multilingual robustness evaluation reported\n- License: [Apache 2.0](LICENSE)\n\n- Model weights: https://huggingface.co/openai/privacy-filter\n- Demo: https://huggingface.co/spaces/openai/privacy-filter\n- Model card: [OpenAI Privacy Filter Model Card](https://cdn.openai.com/pdf/c66281ed-b638-456a-8ce1-97e9f5264a90/OpenAI-Privacy-Filter-Model-Card.pdf)\n\n## Bias, Risks, and Limitations\n\n### Risk: Over-reliance\n\nPrivacy Filter is a redaction and data minimization aid, not an anonymization, compliance, or a safety guarantee. Over-reliance on the tool as a blanket anonymization claim would risk missing desired privacy objectives. Privacy Filter is best used as one of multiple layers in a holistic end-to-end privacy-by-design approach.\n\n### Limitation: Static Label Policy\n\nThe model will only identify personal data spans that match the trained label taxonomy and definitions. Real-life privacy use cases are varied and complex and definitions of appropriate label policies and decision boundaries can differ. Thus model defaults may not satisfy organization-specific governance requirements without calibration/fine-tuning.\n\nPrivacy Filter does not support configuring label policies dynamically at runtime; instead changing policies requires further finetuning of the model. The native label set and associated decision boundaries may not be appropriate for every use case. For example, the model's training policy aims to prioritize personal identifiers, often preserving context that is not strongly person-linked by design; some users may want to adjust this choice.\n\nPerformance may drop on non-English text, non-Latin scripts, protected-group naming patterns, or domains that are out of distribution compared to model training.\n\n### Failure Modes\n\nLike all models, Privacy Filter can make mistakes, such as: under-detection of uncommon personal names, regional naming conventions, initials, honorific-heavy references, or domain-specific identifiers; over-redaction of public entities, organizations, locations, or common nouns when local context is ambiguous; fragmented or shifted span boundaries in mixed-format text, long documents, or text with heavy punctuation and layout artifacts; missed secrets for novel credential formats, project-specific token patterns, or secrets split across surrounding syntax; and over-redaction of benign high-entropy strings, placeholders, hashes, sample credentials, or synthetic examples that resemble secrets.\n\nThese limitations can interact with demographic, regional, and domain variation. For example, names and identifiers that are underrepresented in training data, or that follow conventions different from the dominant training distribution, may be more likely to be missed or inconsistently bounded.\n\n### High-Risk Deployment Caution\n\nAdditional caution is warranted in high-sensitivity settings such as medical, legal, financial, human resources, education, and government workflows. In these settings, both false negatives and false positives can be costly: missed spans may expose sensitive information, while excess masking can remove material context needed for review, auditing, or downstream decision-making.\n\n### Recommendations\n\n- Use Privacy Filter as part of a holistic privacy-by-design approach, not as a blanket anonymization claim.\n- Evaluate in-domain with local policy references before production.\n- Use task-specific fine-tuning when policy differs from base boundaries.\n- Keep human review paths for high-sensitivity workflows.\n","summary":"OpenAI Privacy Filter is a lightweight, bidirectional token‑classification model that detects and masks personally identifiable information in text, allowing teams to run PII sanitization workflows on‑premises. Built from a gpt‑oss checkpoint, it offers a 1.5 B‑parameter model with only 50 M active parameters, a 128 k‑token context window, and configurable precision‑recall trade‑offs, making it fast enough for web browsers or laptops while still handling long documents without chunking. The repository includes a convenient CLI for one‑shot redaction, file‑wide masking, evaluation on labeled data, and easy fine‑tuning with user‑supplied annotations. Data‑privacy and compliance engineers, as well as organizations needing high‑throughput, on‑prem PII protection, will find this package useful for building secure text processing pipelines.","description":"OpenAI Privacy Filter","stars":1930,"language":"Python"},{"owner":"brexhq","repo":"CrabTrap","url":"https://github.com/brexhq/CrabTrap","readme":"# CrabTrap\n\n<p align=\"center\">\n  <img src=\"assets/logo.png\" alt=\"CrabTrap logo\" width=\"600\" />\n</p>\n\nAn HTTP/HTTPS proxy that sits between AI agents and external APIs, evaluating every outbound request against security policies before it reaches the internet.\n\nIf you run AI agents that call external services — Slack, Gmail, GitHub, or anything else — CrabTrap gives you guardrails. It intercepts every outbound HTTP/HTTPS request, checks it against deterministic rules and an LLM-based policy judge, and either forwards it or blocks it with a reason. Every request and decision is logged to PostgreSQL for a complete audit trail.\n\n<p align=\"center\">\n  <img src=\"docs/crabtrap-flow.svg\" alt=\"CrabTrap request flow\" width=\"800\" />\n</p>\n\n## Quickstart\n\nCrabTrap runs as a Docker container alongside PostgreSQL. See [QUICKSTART.md](QUICKSTART.md) for the full walkthrough — the short version:\n\n```bash\ndocker compose up -d                                                    # start CrabTrap + Postgres\ndocker compose cp crabtrap:/app/certs/ca.crt ./ca.crt                   # copy the generated CA cert\n# create test-admin admin user and store their web_token in a variable\nadmin_token=$(docker compose exec -it crabtrap ./gateway create-admin-user test-admin \\\n    | tail -n1 | cut -d\" \" -f2)\ntoken=$(curl -X POST http://localhost:8081/admin/users \\\n    -H \"Content-Type: application/json\" \\\n    -H \"Authorization: Bearer ${admin_token}\" \\\n    -d '{\"id\": \"alice@example.com\", \"is_admin\": false}' \\\n    | jq -r '.channels[] | select(.channel_type == \"gateway_auth\") | .gateway_auth_token')\n# test with\ncurl -x http://${token}:@localhost:8080 \\\n    --cacert ca.crt https://httpbin.org/get\n```\n\nThe proxy listens on `localhost:8080`, the admin UI is at `localhost:8081` and you can login to it with the $admin_token.\n\n\n## How It Works\n\n1. **Agent connects** — set `HTTP_PROXY` and `HTTPS_PROXY` to point at CrabTrap\n2. **TLS termination** — CrabTrap generates a per-host certificate from a custom CA and decrypts the request\n3. **Static rules** — the request is matched against URL pattern rules (prefix, exact, or glob). If a rule matches, the decision is immediate — no LLM call. Deny rules always take priority over allow.\n4. **LLM judge** — if no static rule matches, the request is evaluated by an LLM against the agent's natural-language security policy. Allowed requests are forwarded; denied requests get a 403 with the reason.\n5. **Audit logged** — every request, decision, and response is recorded in PostgreSQL\n\n## Features\n\n### Security\n\n- **HTTPS interception** — transparent MITM proxy with custom TLS server certificate generation\n- **SSRF protection** — blocks requests to private networks (RFC 1918, loopback, link-local, Carrier-Grade NAT, IPv6 ULA/NAT64/6to4) with DNS-rebinding prevention\n- **Prompt injection defense** — request payloads are JSON-encoded and policy content is JSON-escaped before being sent to the LLM judge\n- **Per-IP rate limiting** — token bucket rate limiter (default 50 req/s, burst 100)\n\n### Policy Evaluation\n\n- **Two-tier evaluation** — deterministic static rules are checked first; the LLM judge is only invoked if no rule matches\n- **Static rules** — prefix, exact, and glob URL pattern matching with optional HTTP method filters\n- **Per-agent LLM policies** — natural-language security policies evaluated via LLM\n- **Circuit breaker** — trips after 5 consecutive LLM failures, reopens after 10s cooldown\n- **Configurable fallback** — deny (default) or passthrough when the LLM judge is unavailable\n\n### Operations\n\n- **Policy builder** — an agentic loop that analyzes observed traffic and drafts security policies automatically\n- **Eval system** — replay historical audit log entries against a policy to measure accuracy\n- **Web UI** — audit trail viewer, policy editor, eval results, and agent management\n\n## What CrabTrap Does NOT Do\n\n- **Not a WAF or inbound firewall** — CrabTrap is a forward proxy (outbound-only) for agent-originated traffic. It does not inspect inbound requests to your services.\n- **Does not redact sensitive data** — the proxy sees all request content in cleartext, including headers like Authorization and Cookie. This is by design; the trust boundary is the proxy itself.\n- **Does not provide human-in-the-loop approval** — there is no approval queue, no Slack prompts, and no escalation path. Decisions are made automatically by static rules and the LLM judge.\n- **Does not filter API responses** — only outbound requests are evaluated. Responses from upstream APIs are streamed back to the agent unexamined.\n- **Does not inspect WebSocket frames** — only the WebSocket upgrade request is evaluated. Once upgraded, frames pass through uninspected.\n\n## Configuration\n\n| Section | Key Settings |\n|---|---|\n| `proxy` | Port (default 8080), timeouts, rate limits, SSRF CIDR allowlist |\n| `tls` | CA cert/key paths, certificate cache size (default 10,000) |\n| `approval` | Mode: `llm` or `passthrough`, timeout (default 30s) |\n| `llm_judge` | Provider, model IDs, fallback mode (`deny`/`passthrough`), circuit breaker |\n| `database` | PostgreSQL connection URL (supports `${DATABASE_URL}` expansion) |\n| `audit` | Output destination: `stderr` (default), `stdout`, or a file path |\n| `log_level` | `debug`, `info` (default), `warn`, `error` |\n\nSee [`config/gateway.yaml.example`](config/gateway.yaml.example) for the full reference with inline comments.\n\n## Project Structure\n\n```\ncrabtrap/\n├── cmd/gateway/          # Entry point, admin API wiring, web UI serving\n├── internal/\n│   ├── proxy/            # MITM proxy, TLS cert generation, SSRF protection, rate limiting\n│   ├── approval/         # Static rules engine + approval orchestration\n│   ├── judge/            # LLM judge prompt construction + response parsing\n│   ├── llm/              # LLM adapters, circuit breaker, concurrency control\n│   ├── builder/          # Policy agent (agentic loop with tools)\n│   ├── eval/             # Eval system (replay audit entries against policies)\n│   ├── admin/            # Admin API routes, auth, user/audit stores\n│   ├── llmpolicy/        # Policy storage and versioning\n│   ├── audit/            # Structured JSON logging + event dispatch\n│   ├── config/           # YAML config loading, validation, defaults\n│   ├── db/               # PostgreSQL connection pool + migrations\n│   └── notifications/    # SSE channel + event dispatcher\n├── pkg/types/            # Shared types (StaticRule, LLMPolicy, AuditEntry, etc.)\n├── web/src/              # React + TypeScript admin UI (Vite)\n├── config/               # YAML configuration files\n├── certs/                # Generated TLS certificates (not committed)\n└── scripts/              # Certificate generation, database migrations\n```\n\n## Observability\n\nCrabTrap ships an optional OpenTelemetry metric surface, exposed in Prometheus scrape format on a dedicated HTTP listener. Disabled by default.\n\nEnable it in `config/gateway.yaml`:\n\n```yaml\nobservability:\n  metrics:\n    enabled: true                # default: false\n    listen: \"127.0.0.1:9090\"     # bind address (default loopback)\n```\n\nThe metrics listener is separate from the admin and proxy ports. It serves only `/metrics` and requires no auth — Prometheus scrapers do not need admin credentials. Network exposure is controlled by the `listen` bind address: the default `127.0.0.1:9090` keeps the surface on loopback so no operator action is required to keep it private. To scrape from another host, change `listen` to a private interface address (e.g. `10.0.1.42:9090`) and reach it from inside the trust boundary.\n\nMinimal Prometheus scrape config (loopback bind, scraper on the same host):\n\n```yaml\nscrape_configs:\n  - job_name: crabtrap\n    static_configs:\n      - targets: ['127.0.0.1:9090']\n    metrics_path: /metrics\n    scrape_interval: 15s\n```\n\nThe current metric surface includes counters for rate-limit hits and approval decisions, a gauge per LLM provider for circuit-breaker state, histograms for judge and approval latency, and a `crabtrap_build_info` gauge that lets operators correlate metric anomalies with deployments. See [docs/observability.md](docs/observability.md) for the full metric catalog, alert suggestions, and cardinality notes.\n\n## Development\n\n```bash\nmake test          # lint (go vet + staticcheck) then tests with -race\nmake fmt           # format Go code\nmake lint          # go vet + staticcheck\nmake build         # production binary with embedded web UI\nmake build-web     # rebuild web UI only\n```\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md) for the full development workflow, PR guidelines, and coding conventions.\n\n## Releases\n\nReleases are automated with [GoReleaser](https://goreleaser.com/) via GitHub Actions. Tag a commit on `main` and push:\n\n```bash\ngit tag v1.2.3\ngit push origin v1.2.3\n```\n\nThis builds cross-platform binaries (linux/darwin, amd64/arm64), creates a GitHub Release with a changelog, and pushes multi-arch Docker images to `quay.io/brexhq/crabtrap`.\n\nSee [CONTRIBUTING.md](CONTRIBUTING.md#releasing-with-goreleaser) for release notes and commit message conventions.\n\n## License\n\nThis project is licensed under the [MIT License](LICENSE).\n\n## Contributing\n\nWe welcome contributions! Please read [CONTRIBUTING.md](CONTRIBUTING.md) for guidelines on getting started, running tests, and submitting pull requests.\n\n## More\n\n- Troubleshooting: [TROUBLESHOOTING.md](TROUBLESHOOTING.md)\n- Architecture: [DESIGN.md](DESIGN.md)\n- Issues: https://github.com/brexhq/CrabTrap/issues\n","summary":"CrabTrap is a forward HTTP/HTTPS proxy that sits between AI agents and external APIs, intercepting every outbound request and evaluating it against deterministic static rules and an LLM‑based policy judge before it reaches the internet.  It performs TLS termination with per‑host certificates, blocks private‑network or SSRF attempts, applies rate limits, and logs all requests, decisions and responses to PostgreSQL for full auditability.  Core features include two‑tier policy evaluation, prompt‑injection defenses, a web UI for policy editing and audit inspection, and an agentic policy‑builder that drafts rules from observed traffic.  AI developers, ops engineers, and security teams that run autonomous agents needing strict outbound guardrails would find CrabTrap especially useful.","description":"An LLM-as-a-judge HTTP proxy to secure agents in production ","stars":569,"language":"Go"},{"owner":"leigest519","repo":"OpenGame","url":"https://github.com/leigest519/OpenGame","readme":"<div align=\"center\">\n\n# OpenGame: Open Agentic Coding for Games\n\nYilei Jiang, Jinyuan Hu, Qianyin Xiao, Yaozhi Zheng, Ruize Ma, Kaituo Feng,<br>\nJiaming Han, Tianshuo Peng, Kaixuan Fan, Manyuan Zhang, Xiangyu Yue*\n\n*CUHK MMLab*<br>\n`yljiang@link.cuhk.edu.hk`, `xyyue@ie.cuhk.edu.hk`<br>\n*\\*Corresponding author*\n\n<br>\n\n[![Project Page](https://img.shields.io/badge/Project-Page-blue.svg)](https://www.opengame-project-page.com/)\n[![arXiv](https://img.shields.io/badge/arXiv-b31b1b.svg)](https://arxiv.org/abs/2604.18394)\n[![Hugging Face Paper](https://img.shields.io/badge/%F0%9F%A4%97%20Hugging%20Face-Paper-yellow)](https://huggingface.co/papers/2604.18394)\n[![Node.js Version](https://img.shields.io/badge/node-%3E%3D20.0.0-brightgreen.svg)](https://nodejs.org/)\n\n**An open-source agentic framework for end-to-end web game creation from a prompt.**\n\n</div>\n\n<div align=\"center\">\n  <img src=\"assets/opengame_teaser.png\" alt=\"OpenGame Teaser\" width=\"100%\">\n</div>\n\n\n## Abstract\n\n> Game development sits at the intersection of creative design and intricate software engineering, demanding the joint orchestration of game engines, real-time loops, and tightly coupled state across many files. While Large Language Models (LLMs) and code agents now solve isolated programming tasks with ease, they consistently stumble when asked to produce a fully playable game from a high-level design, collapsing under cross-file inconsistencies, broken scene wiring, and logical incoherence. We bridge this gap with **OpenGame**, the first open-source agentic framework explicitly designed for end-to-end web game creation. At its core lies **Game Skill**, a reusable, evolving capability composed of a *Template Skill* that grows a library of project skeletons from experience and a *Debug Skill* that maintains a living protocol of verified fixes—together enabling the agent to scaffold stable architectures and systematically repair integration errors rather than patch isolated syntax bugs. Powering this framework is **GameCoder-27B**, a code LLM specialized for game engine mastery through a three-stage pipeline of continual pre-training, supervised fine-tuning, and execution-grounded reinforcement learning. Since verifying interactive playability is fundamentally harder than checking static code, we further introduce **OpenGame-Bench**, an evaluation pipeline that scores agentic game generation along Build Health, Visual Usability, and Intent Alignment via headless browser execution and VLM judging. Across 150 diverse game prompts, OpenGame establishes a new state-of-the-art. We hope OpenGame pushes code agents beyond discrete software engineering problems and toward building complex, interactive real-world applications. \n\n## 📢 News\n\n* **[2026-04-21]** 🚀 We have officially released the **OpenGame** framework! You can now access our [Project Page](https://www.opengame-project-page.com/), read the [arXiv Paper](https://arxiv.org/abs/2604.18394), and start generating your own web games end-to-end.\n## Playable Demos\n\nA curated gallery of web games generated end-to-end by OpenGame from a single prompt. Hover any tile to preview the gameplay; click through for the live build or the full source archive used by the agent.\n\n<table align=\"center\" width=\"100%\">\n  <tr>\n    <td align=\"center\" valign=\"top\" width=\"50%\">\n      <p align=\"center\"><b><font size=\"4\">Marvel Avengers: Infinity Strike</font></b></p>\n      <video src=\"https://github.com/user-attachments/assets/5c8d1ef9-48cb-4916-abd2-fc201e478306\"\n             poster=\"assets/posters/marvel.png\"\n             width=\"100%\" loop muted autoplay playsinline preload=\"metadata\">\n      </video>\n      <div align=\"left\" style=\"padding: 0 15px;\">\n        <p><b>Prompt:</b> <i>\"Build an epic side-scrolling action platformer starring the Avengers. I want to select between Iron Man (lasers & flight), Thor (hammer melee & lightning), or Hulk (smash attacks) to fight through 3 distinct levels: a ruined City, a SHIELD Helicarrier, and finally Titan. Each hero needs a basic attack, a special skill, and a screen-clearing Ultimate move. The final boss must be Thanos using Infinity Stone powers. The art style should be hardcore 90s Capcom arcade pixel art, not cute/chibi.\"</i></p>\n        <p><b>Intro:</b> Choose your superhero. Clear stages with epic beatdowns and crush the mastermind.<br/>选择你的超级英雄，清除关卡并击败Boss。</p>\n      </div>\n      <p align=\"center\">\n        <a href=\"https://www.opengame-project-page.com/#demo\"><b>▶&nbsp;&nbsp;Live Demo</b></a>\n        &nbsp;&nbsp;·&nbsp;&nbsp;\n        <a href=\"https://github.com/leigest519/OpenGame/raw/main/assets/downloads/demo_platformer_marvel.zip\"><b>↓&nbsp;&nbsp;Source</b></a>\n      </p>\n      <br/>\n    </td>\n    <td align=\"center\" valign=\"top\" width=\"50%\">\n      <p align=\"center\"><b><font size=\"4\">Harry Potter: Arithmancy Academy</font></b></p>\n      <video src=\"https://github.com/user-attachments/assets/d70015c5-e2f2-4c5d-b842-8d97f95cd765\"\n             poster=\"assets/posters/harryPotter.png\"\n             width=\"100%\" loop muted autoplay playsinline preload=\"metadata\">\n      </video>\n      <div align=\"left\" style=\"padding: 0 15px;\">\n        <p><b>Prompt:</b> <i>\"Create a turn-based card battle game set in a pixel art Hogwarts. I want to play as a wizard student dueling a rival in the Dueling Club. The twist is that magic requires knowledge: to cast spell cards like 'Expelliarmus' or 'Stupefy', I must answer trivia questions (Math/Science) correctly. Include a 'Magic Resonance' combo system where getting consecutive right answers boosts my spell damage. The style should be atmospheric Gothic fantasy pixel art with parchment-style UI and magical particle effects.\"</i></p>\n        <p><b>Intro:</b> Cast spell cards by answering trivia correctly. Chain combos for bonus damage.<br/>正确答题释放魔法卡牌，连续答对触发魔力共振连击。</p>\n      </div>\n      <p align=\"center\">\n        <a href=\"https://www.opengame-project-page.com/#demo\"><b>▶&nbsp;&nbsp;Live Demo</b></a>\n        &nbsp;&nbsp;·&nbsp;&nbsp;\n        <a href=\"https://github.com/leigest519/OpenGame/raw/main/assets/downloads/demo_uiHeavy_harryPotter.zip\"><b>↓&nbsp;&nbsp;Source</b></a>\n      </p>\n      <br/>\n    </td>\n  </tr>\n  <tr>\n    <td align=\"center\" valign=\"top\" width=\"50%\">\n      <p align=\"center\"><b><font size=\"4\">K.O.F: Celestial Showdown</font></b></p>\n      <video src=\"https://github.com/user-attachments/assets/35fb22d9-2378-416d-8656-ef3c965a2d36\"\n             poster=\"assets/posters/kombat.png\"\n             width=\"100%\" loop muted autoplay playsinline preload=\"metadata\">\n      </video>\n      <div align=\"left\" style=\"padding: 0 15px;\">\n        <p><b>Prompt:</b> <i>\"Make a local 2-player quiz fighting game that looks and feels like a classic 90s SNK retro arcade fighter (like The King of Fighters). Instead of punching, players fight by racing to hit a 'Buzzer Key' to answer physics questions. If you answer fast and correctly, you deal damage; if you're wrong, you take self-damage. The setting is a grand fighting tournament stage located in a majestic 'Heavenly Court' (Chinese celestial realm), complete with ancient jade gates, floating auspicious clouds, and golden traditional motifs. Include dramatic health bars, screen shake on hits, and a 'K.O.' sequence. Visuals should be highly detailed 16-bit pixel art, typical of 90s arcade cabinets.\"</i></p>\n        <p><b>Intro:</b> Two players race to buzz in and answer physics questions. Right answers deal damage; wrong answers backfire.<br/>双人抢答物理题，答对造成伤害，答错反噬自身。</p>\n      </div>\n      <p align=\"center\">\n        <a href=\"https://www.opengame-project-page.com/#demo\"><b>▶&nbsp;&nbsp;Live Demo</b></a>\n        &nbsp;&nbsp;·&nbsp;&nbsp;\n        <a href=\"https://github.com/leigest519/OpenGame/raw/main/assets/downloads/demo_uiHeavy_kombat.zip\"><b>↓&nbsp;&nbsp;Source</b></a>\n      </p>\n      <br/>\n    </td>\n    <td align=\"center\" valign=\"top\" width=\"50%\">\n      <p align=\"center\"><b><font size=\"4\">Hajimi Defense: The Tuna Crisis</font></b></p>\n      <video src=\"https://github.com/user-attachments/assets/06287b6f-4da0-49a5-8cf7-ef5de4bc45e3\"\n             poster=\"assets/posters/hajimi.png\"\n             width=\"100%\" loop muted autoplay playsinline preload=\"metadata\">\n      </video>\n      <div align=\"left\" style=\"padding: 0 15px;\">\n        <p><b>Prompt:</b> <i>\"Make a hilarious tower defense game called 'Hajimi Defense' where cute cats defend a 'Golden Tuna Can' from an invasion of household pests (Cucumbers and Vacuums). The towers should be funny cat memes: a spitting Tabby, a sniper Siamese, and a fat orange cat that throws buns for AOE damage. Include a mechanic where players can click to break obstacles (like boxes) to free up building space. The art style should be hand-drawn, pastel, and super cute (Kawaii).\"</i></p>\n        <p><b>Intro:</b> Deploy cat towers to defend the Golden Tuna Can from waves of household invaders.<br/>部署猫猫炮塔，保卫金枪鱼罐头抵御入侵者。</p>\n      </div>\n      <p align=\"center\">\n        <a href=\"https://www.opengame-project-page.com/#demo\"><b>▶&nbsp;&nbsp;Live Demo</b></a>\n        &nbsp;&nbsp;·&nbsp;&nbsp;\n        <a href=\"https://github.com/leigest519/OpenGame/raw/main/assets/downloads/demo_towerDefense_hajimi.zip\"><b>↓&nbsp;&nbsp;Source</b></a>\n      </p>\n      <br/>\n    </td>\n  </tr>\n  <tr>\n    <td align=\"center\" valign=\"top\" width=\"50%\">\n      <p align=\"center\"><b><font size=\"4\">StarWars: Mandalorian Protocol</font></b></p>\n      <video src=\"https://github.com/user-attachments/assets/3dd63ca5-447c-45fc-b06b-a6dbec0a6b16\"\n             poster=\"assets/posters/starWars.png\"\n             width=\"100%\" loop muted autoplay playsinline preload=\"metadata\">\n      </video>\n      <div align=\"left\" style=\"padding: 0 15px;\">\n        <p><b>Prompt:</b> <i>\"Create a high-intensity top-down action RPG shooter set in the Star Wars universe. Play as The Mandalorian fighting through an Imperial Base to rescue Grogu. The gameplay should be a Twin-Stick Shooter style where I can use a Blaster (ranged), a Beskar Spear (melee), and a Jetpack Dash to dodge. Include Stormtrooper enemies and a tactical depth system where characters can walk behind crates and walls. The visuals should be metallic sci-fi pixel art.\"</i></p>\n        <p><b>Intro:</b> Fight through the Imperial Base as the Mandalorian. Shoot, slash, and dash to rescue Grogu.<br/>扮演曼达洛人突入帝国基地，射击、喷射闪避，营救古古。</p>\n      </div>\n      <p align=\"center\">\n        <a href=\"https://www.opengame-project-page.com/#demo\"><b>▶&nbsp;&nbsp;Live Demo</b></a>\n        &nbsp;&nbsp;·&nbsp;&nbsp;\n        <a href=\"https://github.com/leigest519/OpenGame/raw/main/assets/downloads/demo_topDown_starWars.zip\"><b>↓&nbsp;&nbsp;Source</b></a>\n      </p>\n      <br/>\n    </td>\n    <td align=\"center\" valign=\"top\" width=\"50%\">\n      <p align=\"center\"><b><font size=\"4\">Squid Game: Red Light, Green Light</font></b></p>\n      <video src=\"https://github.com/user-attachments/assets/a9f51ac6-56b2-4bab-95dd-27e39ca612f5\"\n             poster=\"assets/posters/squidGame.png\"\n             width=\"100%\" loop muted autoplay playsinline preload=\"metadata\">\n      </video>\n      <div align=\"left\" style=\"padding: 0 15px;\">\n        <p><b>Prompt:</b> <i>\"Recreate the intense 'Red Light, Green Light' scene from Squid Game as a survival reflex game. The player controls a character in a green tracksuit running across a sandy field towards a finish line. There is a Giant Robot Doll on the right; when she sings, we run; when she turns her head, we must stop instantly or get shot. Crucial visual detail: Dead bodies and blood pools should NOT disappear, they must pile up on the field to create a chaotic atmosphere. Use a gritty, realistic 16-bit pixel art style.\"</i></p>\n        <p><b>Intro:</b> Run when she sings, freeze when she turns. One wrong move and you're eliminated.<br/>她唱歌时跑，她转头时定住。一步走错，当场淘汰。</p>\n      </div>\n      <p align=\"center\">\n        <a href=\"https://www.opengame-project-page.com/#demo\"><b>▶&nbsp;&nbsp;Live Demo</b></a>\n        &nbsp;&nbsp;·&nbsp;&nbsp;\n        <a href=\"https://github.com/leigest519/OpenGame/raw/main/assets/downloads/demo_topDown_squidGame.zip\"><b>↓&nbsp;&nbsp;Source</b></a>\n      </p>\n      <br/>\n    </td>\n  </tr>\n</table>\n\n**To run a demo locally:**\n\n```bash\nunzip demo_*.zip && cd demo_*\nnpm install\nnpm run dev   # opens at http://localhost:5173\n```\n\n## Installation\n\n#### Prerequisites\n\n```bash\n# Node.js 20+\ncurl -qL https://www.npmjs.com/install.sh | sh\n```\n\n#### From source (recommended while we prepare the npm release)\n\n```bash\ngit clone https://github.com/leigest519/OpenGame.git\ncd OpenGame\nnpm install\nnpm run build\nnpm link\n```\n\nThis exposes the `opengame` command on your `PATH`.\n\n## Quick Start\n\nOpenGame is currently driven from the command line in **headless mode** —\nyou give it a one-shot prompt and it builds the game end-to-end.\n\n```bash\n# Create an empty folder for your new game\ncd agent-test\nmkdir -p games/my-game && cd games/my-game\n\n# Generate the game from a single prompt\nopengame -p \"Build a Snake clone with WASD controls and a dark theme.\" --yolo\n```\n\nWhen the agent finishes, open the generated `index.html` (or run the printed\ndev-server command) in your browser to play your game.\n\n> If you prefer to create games anywhere on disk, set absolute paths instead:\n>\n> ```bash\n> export GAME_TEMPLATES_DIR=\"/absolute/path/to/OpenGame/agent-test/templates\"\n> export GAME_DOCS_DIR=\"/absolute/path/to/OpenGame/agent-test/docs\"\n> ```\n>\n> Headless runs auto-elevate the approval mode to `auto-edit` so the agent\n> can write/edit files. Shell commands stay disabled by default — pass\n> `--yolo` (or `--approval-mode yolo`) if you want the agent to also run\n> shell commands. See\n> [`docs/users/features/headless.md`](docs/users/features/headless.md) for\n> the full headless reference.\n\n#### Authentication\n\nOpenGame's agent runtime supports an OpenAI-compatible API. Set the following environment variables:\n\n```bash\nexport OPENAI_API_KEY=\"your-api-key-here\"\nexport OPENAI_BASE_URL=\"https://api.openai.com/v1\"     # optional\nexport OPENAI_MODEL=\"gpt-4o\"                            # optional, swap in GameCoder-27B when running it locally\n```\n\n#### Asset / GDD provider keys (image, video, audio, reasoning)\n\nBeyond the main agent LLM, OpenGame's asset-generation tools talk to image,\nvideo, and audio providers. You bring your own keys for each — OpenGame ships\nwith no defaults. Each modality is configured **independently**, so you can\nmix providers (e.g. DashScope for image, Doubao for video, OpenAI for\nreasoning):\n\n```bash\nexport OPENGAME_IMAGE_PROVIDER=tongyi         # tongyi | doubao | openai-compat\nexport OPENGAME_IMAGE_API_KEY=sk-...\n# ...and similarly for OPENGAME_REASONING_*, OPENGAME_VIDEO_*, OPENGAME_AUDIO_*\n```\n\nA complete env-var reference, settings.json schema, and examples for OpenAI /\nfal.ai / OpenRouter / DashScope / Doubao live in\n[`docs/users/configuration/api-keys.md`](docs/users/configuration/api-keys.md).\nA copy-paste template is at [`.env.example`](.env.example).\n\nOpenGame prints a one-line provider-status banner at startup so you can\nconfirm which modalities are wired up before the run begins.\n\n## Game Skill\n\nOpenGame's agent is bootstrapped with **Game Skill**, a reusable capability split into two parts:\n\n- **Template Skill** — picks an appropriate engine/template (canvas, Phaser, three.js, etc.) and scaffolds a stable, conventional project structure so later edits stay coherent.\n- **Debug Skill** — runs the game in a sandbox, catches integration errors, console errors, and broken interactions, and systematically resolves them until the game is playable end-to-end.\n\nTogether they let the agent move from \"writes plausible code\" to \"ships a working game.\"\n\n## Configuration\n\nOpenGame can be configured via `settings.json`, environment variables, and CLI flags.\n\n- **User settings**: `~/.qwen/settings.json`\n- **Project settings**: `.qwen/settings.json`\n\n> The on-disk settings directory is currently still named `.qwen` for backward compatibility with the upstream agent runtime. We plan to migrate this to `.opengame` in a future release.\n\n## GameCoder-27B\n\n`GameCoder-27B` is a Code LLM purpose-built for OpenGame. It is trained with:\n\n1. **Supervised Fine-Tuning (SFT)** on curated game-development trajectories covering engine APIs, project scaffolding, and bug-fix workflows.\n2. **Reinforcement Learning** with reward signals derived from real game playability (using OpenGame-Bench-style verifiers).\n\n## OpenGame-Bench\n\n`OpenGame-Bench` is a benchmark for evaluating agents that build interactive web games. Unlike static code-evaluation benchmarks, it dynamically launches generated games, drives them with scripted interactions, and verifies playability criteria (rendering, controls, game-loop progression, win/loss states, etc.).\n\nThe evaluation pipeline will be released soon.\n\n## Acknowledgments\n\nOpenGame builds on the excellent open-source work of:\n\n- **[qwen-code](https://github.com/QwenLM/qwen-code)** — the agent runtime and CLI scaffolding that OpenGame extends with Game Skill, GameCoder-27B integration, and OpenGame-Bench tooling.\n- **[Google Gemini CLI](https://github.com/google-gemini/gemini-cli)** — the original CLI architecture that qwen-code is itself based on.\n- **[Phaser](https://github.com/phaserjs/phaser)** — the fast, free, and open-source HTML5 game framework used for game rendering and mechanics.\n\nWe thank these teams and communities for making their work openly available.\n","summary":"OpenGame is an open‑source, agentic framework that produces fully playable web‑based games from a single natural‑language prompt. It builds on a reusable *Game Skill*—which combines a Template Skill that learns evolving project skeletons and a Debug Skill that documents verified fixes—together with GameCoder‑27B, a 27‑billion‑parameter code LLM specialized in game engine logic through continual pre‑training, supervised tuning, and execution‑grounded reinforcement learning. Its OpenGame‑Bench evaluation pipeline measures build health, visual usability, and intent alignment, setting a new state‑of‑the‑art on over 150 diverse game prompts. Game designers, hobbyist developers, and researchers who want an automated, end‑to‑end workflow that handles cross‑file consistency and scene wiring will find OpenGame especially useful.","description":"OpenGame: Open Agentic Coding for Games","stars":1850,"language":"TypeScript"},{"owner":"OpenCoworkAI","repo":"open-codesign","url":"https://github.com/OpenCoworkAI/open-codesign","readme":"# Open CoDesign\n\n**简体中文**: [README.zh-CN.md](./README.zh-CN.md)\n\n> Your prompts. Your model. Your laptop.\n>\n> Turn prompts into polished artifacts — locally, openly, and with whichever model you already pay for.\n\n[Website](https://opencoworkai.github.io/open-codesign/) · [Quickstart](#quickstart) · [What's new](https://github.com/OpenCoworkAI/open-codesign/releases) · [Changelog](./CHANGELOG.md) · [Discussions](https://github.com/OpenCoworkAI/open-codesign/discussions) · [Docs](https://opencoworkai.github.io/open-codesign/quickstart) · [Contributing](./CONTRIBUTING.md) · [Security](./SECURITY.md)\n\n**Open-source alternative to:** [Claude Design](https://opencoworkai.github.io/open-codesign/claude-design-alternative) · [v0 by Vercel](https://opencoworkai.github.io/open-codesign/v0-alternative) · [Lovable](https://opencoworkai.github.io/open-codesign/lovable-alternative) · [Bolt.new](https://opencoworkai.github.io/open-codesign/bolt-alternative) · [Figma AI](https://opencoworkai.github.io/open-codesign/figma-ai-alternative)\n\n<p align=\"center\">\n  <img src=\"https://raw.githubusercontent.com/OpenCoworkAI/open-codesign/main/website/public/screenshots/product-hero.png\" alt=\"Open CoDesign — prompt on the left, live artifact on the right\" width=\"1000\" />\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/OpenCoworkAI/open-codesign/releases\"><img alt=\"GitHub release\" src=\"https://img.shields.io/github/v/release/OpenCoworkAI/open-codesign?label=release&color=c96442\" /></a>\n  <a href=\"LICENSE\"><img alt=\"License\" src=\"https://img.shields.io/badge/license-MIT-blue\" /></a>\n  <a href=\"https://github.com/OpenCoworkAI/open-codesign/actions\"><img alt=\"CI\" src=\"https://img.shields.io/github/actions/workflow/status/OpenCoworkAI/open-codesign/ci.yml?label=CI\" /></a>\n  <a href=\"https://github.com/OpenCoworkAI/open-codesign/stargazers\"><img alt=\"Stars\" src=\"https://img.shields.io/github/stars/OpenCoworkAI/open-codesign?style=social\" /></a>\n  <a href=\"#community\"><img alt=\"WeChat Group\" src=\"https://img.shields.io/badge/WeChat-Group-07C160?logo=wechat&logoColor=white\" /></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/OpenCoworkAI/open-codesign/commits/main\"><img alt=\"Last commit\" src=\"https://img.shields.io/github/last-commit/OpenCoworkAI/open-codesign?label=last%20commit&color=40b4a1\" /></a>\n  <a href=\"https://github.com/OpenCoworkAI/open-codesign/pulse\"><img alt=\"Commit activity\" src=\"https://img.shields.io/github/commit-activity/m/OpenCoworkAI/open-codesign?label=commits%2Fmonth\" /></a>\n  <a href=\"https://github.com/OpenCoworkAI/open-codesign/graphs/contributors\"><img alt=\"C
