ontributors\" src=\"https://img.shields.io/github/contributors/OpenCoworkAI/open-codesign\" /></a>\n  <a href=\"https://github.com/OpenCoworkAI/open-codesign/releases\"><img alt=\"Downloads\" src=\"https://img.shields.io/github/downloads/OpenCoworkAI/open-codesign/total?label=downloads&color=6c5ce7\" /></a>\n</p>\n\n<p align=\"center\">\n  <sub><code>claude-code</code> · <code>claude-design-alternative</code> · <code>v0-alternative</code> · <code>bolt-alternative</code> · <code>lovable-alternative</code> · <code>figma-alternative</code> · <code>ai-design</code> · <code>design-to-code</code> · <code>prompt-to-design</code> · <code>ai-prototyping</code> · <code>desktop-design-tool</code> · <code>byok</code> · <code>local-first</code> · <code>multi-model</code> · <code>electron</code></sub>\n</p>\n\n---\n\n## What's new\n\n- **v0.2.0** *(in preparation, expected in about a week)* — Agentic Design: workspace-backed design sessions · permissioned file/tool loop · lazy skills and scaffolds · `DESIGN.md` design systems\n- **v0.1.4** *(2026-04-23)* — AI image generation · ChatGPT Plus/Codex subscription support · CLIProxyAPI one-click import · API config hardening\n- **v0.1.3** *(2026-04-21)* — Gemini `models/` prefix fix · OpenAI-compatible relay \"instructions required\" fix · third-party relay SSE-truncation hint\n- **v0.1.2** *(2026-04-21)* — Release pipeline · Homebrew / winget / Scoop packaging manifests\n\n[Full release history →](https://github.com/OpenCoworkAI/open-codesign/releases) · [Changelog →](./CHANGELOG.md)\n\n---\n\n## What it is\n\nTurn a prompt into a polished prototype, slide deck, or marketing asset, locally, with the model you already use.\n\n**Open CoDesign is the open-source Claude Design alternative** — built for people who want the speed of AI-native design tools without subscription lock-in, cloud-only workflows, or being forced onto a single provider. An MIT-licensed desktop app, local-first from day one, with BYOK for any model (Claude, GPT, Gemini, DeepSeek, Kimi, GLM, Ollama, or any OpenAI-compatible endpoint). One-click import of your existing Claude Code or Codex API key gets you running in under 90 seconds.\n\n---\n\n## See it generate\n\nFrom a blank prompt to a finished artifact, the agent plans, writes, self-checks, and ships something with hover states, tabs, and empty states already wired up:\n\n![Generate a design from scratch](https://raw.githubusercontent.com/OpenCoworkAI/open-codesign/main/website/public/demos/generate-from-scratch.gif)\n\n---\n\n## Why people star it\n\n- **Runs on your laptop** — no mandatory cloud workspace\n- **Works with your model** — Claude, GPT, Gemini, Ollama, OpenRouter, and more\n- **Exports real files** — HTML, PDF, PPTX, ZIP, Markdown\n- **Shows its work** — live agent activity, visible tool calls, interruptible generation\n\n---\n\n## Why Open CoDesign?\n\nOpen source, desktop-native, and built for people who do not want their design workflow locked to one model or one cloud.\n\n| | **Open CoDesign** | Claude Design | v0 by Vercel | Lovable |\n|---|:---:|:---:|:---:|:---:|\n| Open source | ✅ MIT | ❌ Closed | ❌ Closed | ❌ Closed |\n| Desktop native | ✅ Electron | ❌ Web only | ❌ Web only | ❌ Web only |\n| Bring your own key | ✅ Any provider | ❌ Anthropic only | ❌ Vercel only | ⚠️ Limited |\n| Local / offline | ✅ Fully local app | ❌ Cloud | ❌ Cloud | ❌ Cloud |\n| Models | ✅ 20+ (Claude, GPT, Gemini, Ollama…) | Claude only | GPT-4o | Multi-LLM |\n| Version history | ✅ Local SQLite snapshots | ❌ | ❌ | ❌ |\n| Data privacy | ✅ On-device app state | ❌ Cloud-processed | ❌ Cloud | ❌ Cloud |\n| Editable export | ✅ HTML, PDF, PPTX, ZIP, Markdown | ⚠️ Limited | ⚠️ Limited | ⚠️ Limited |\n| Price | ✅ Free app, token cost only | 💳 Subscription | 💳 Subscription | 💳 Subscription |\n\n---\n\n## Highlights\n\n<table>\n  <tr>\n    <td width=\"50%\">\n      <a href=\"https://raw.githubusercontent.com/OpenCoworkAI/open-codesign/main/website/public/screenshots/comment-mode.png\">\n        <img src=\"https://raw.githubusercontent.com/OpenCoworkAI/open-codesign/main/website/public/screenshots/comment-mode.png\" alt=\"Click any element, leave a pin, let the model rewrite that region\" />\n      </a>\n      <p><b>Comment, don’t retype.</b><br/>Click any element, drop a pin, and let the model rewrite only that region.</p>\n    </td>\n    <td width=\"50%\">\n      <a href=\"https://raw.githubusercontent.com/OpenCoworkAI/open-codesign/main/website/public/screenshots/tweaks-sliders.png\">\n        <img src=\"https://raw.githubusercontent.com/OpenCoworkAI/open-codesign/main/website/public/screenshots/tweaks-sliders.png\" alt=\"AI-emitted tweaks panel with color pickers and RGB inputs\" />\n      </a>\n      <p><b>AI-tuned sliders.</b><br/>The model surfaces the parameters worth tweaking, so you can refine color, spacing, and typography without another full prompt.</p>\n    </td>\n  </tr>\n  <tr>\n    <td width=\"50%\">\n      <a href=\"https://raw.githubusercontent.com/OpenCoworkAI/open-codesign/main/website/public/screenshots/hub-your-designs.png\">\n        <img src=\"https://raw.githubusercontent.com/OpenCoworkAI/open-codesign/main/website/public/screenshots/hub-your-designs.png\" alt=\"Your Designs hub, filled with real generated artifacts\" />\n      </a>\n      <p><b>Every iteration, kept.</b><br/>Designs are saved locally, with instant switching between recent versions.</p>\n    </td>\n    <td width=\"50%\">\n      <a href=\"https://raw.githubusercontent.com/OpenCoworkAI/open-codesign/main/website/public/screenshots/agent-panel.png\">\n        <img src=\"https://raw.githubusercontent.com/OpenCoworkAI/open-codesign/main/website/public/screenshots/agent-panel.png\" alt=\"Live agent panel showing todos and streaming tool calls\" />\n      </a>\n      <p><b>Watch the agent work.</b><br/>Todos, tool calls, and live progress stay visible and interruptible throughout generation.</p>\n    </td>\n  </tr>\n</table>\n\n---\n\n## Quickstart\n\n**Time to first artifact:** about 3 minutes\n\n**Requires:** one API key or local Ollama\n\n**Runs on:** macOS 12+ (Monterey or later), Windows 10+, Linux (glibc ≥ 2.31)\n\n### 1. Install\n\n**One-liner** (recommended):\n\n```bash\n# Windows\nwinget install OpenCoworkAI.OpenCoDesign\n\n# macOS\nbrew install --cask opencoworkai/tap/open-codesign\n```\n\n**Or direct download** (v0.1.x) from [GitHub Releases](https://github.com/OpenCoworkAI/open-codesign/releases):\n\n| Platform | File |\n|---|---|\n| macOS (Apple Silicon) | `open-codesign-*-arm64.dmg` |\n| macOS (Intel) | `open-codesign-*-x64.dmg` |\n| Windows (x64) | `open-codesign-*-x64-setup.exe` |\n| Windows (ARM64) | `open-codesign-*-arm64-setup.exe` |\n| Linux (x64, AppImage) | `open-codesign-*-x64.AppImage` |\n| Linux (x64, Debian/Ubuntu) | `open-codesign-*-x64.deb` |\n| Linux (x64, Fedora/RHEL) | `open-codesign-*-x64.rpm` |\n\nEach release ships with `SHA256SUMS.txt` and a CycloneDX SBOM (`*-sbom.cdx.json`) so you can verify what you downloaded.\n\n<details>\n<summary><b>More package managers</b></summary>\n\n| Manager | Command | Status |\n|---|---|---|\n| Scoop (Windows) | `scoop bucket add opencoworkai https://github.com/OpenCoworkAI/scoop-bucket && scoop install opencoworkai/open-codesign` | 🟢 Live |\n| Flathub (Linux) | `flatpak install flathub ai.opencowork.codesign` | ⏸ Deferred to v0.2 (needs signed build + AppStream metadata) |\n| Snap (Linux) | `snap install --dangerous open-codesign-*.snap` | 🟡 Attached to releases best-effort; Snap Store publish not yet wired |\n\nAfter each tag push, CI auto-syncs SHAs back into `packaging/` and (once the winget PR merges) auto-opens downstream bumps. Every `packaging/*/README.md` documents its own mirror flow.\n</details>\n\n> **v0.1 note:** installers are unsigned. On **macOS Sequoia 15+** right-click → Open no longer bypasses Gatekeeper, and \"Open Anyway\" in System Settings often fails. Reliable one-liner:\n>\n> ```sh\n> xattr -cr \"/Applications/Open CoDesign.app\"\n> ```\n>\n> Then double-click normally. (Older 0.1.x builds are installed as `/Applications/open-codesign.app`.)\n> On **Windows**: SmartScreen → More info → Run anyway.\n>\n> Want a verified build? Compile from source — see [CONTRIBUTING.md](./CONTRIBUTING.md).\n\n### 2. Add your API key\n\nOn first launch, Open CoDesign opens the Settings page. Paste any supported provider key:\n\n- Anthropic (`sk-ant-…`)\n- OpenAI (`sk-…`)\n- Google Gemini\n- Any OpenAI-compatible relay (OpenRouter, SiliconFlow, local Ollama)\n\nCredentials stay in `~/.config/open-codesign/config.toml` (file mode 0600, same convention as Claude Code, Codex, and `gh` CLI). Nothing leaves your machine unless your chosen model provider requires it.\n\n### 3. Type your first prompt\n\nPick one of **fifteen built-in demos** — landing page, dashboard, pitch slide, pricing, mobile app, chat UI, event calendar, blog article, receipt/invoice, portfolio, settings panel, and more — or describe your own. A sandboxed prototype appears in seconds.\n\n---\n\n## Bring your stack\n\nAlready using Claude Code or Codex? Your providers, models, and API keys import in one click, with no copy-paste and no need to re-enter settings:\n\n![Import from Claude Code or Codex in one click](https://raw.githubusercontent.com/OpenCoworkAI/open-codesign/main/website/public/demos/claude-code-import.gif)\n\n---\n\n## Built-in taste\n\nGeneric AI tools tend to produce generic output. Open CoDesign ships with **twelve built-in design skill modules** — slide decks, dashboards, landing pages, SVG charts, glassmorphism, editorial typography, heroes, pricing, footers, chat UIs, data tables, and calendars — plus a built-in taste layer that steers the model toward considered typography, purposeful whitespace, and meaningful color.\n\nEvery skill is available in every generation. Before the model writes a line of CSS, it selects the skills that fit the brief and reasons through layout intent, design-system coherence, and contrast, bringing higher-quality design behavior to whichever model you choose.\n\nAdd a `SKILL.md` to any project to teach the model your own taste.\n\n---\n\n## What you get\n\n### Models and providers\n- **Unified provider model** — Anthropic, OpenAI, Gemini, DeepSeek, OpenRouter, SiliconFlow, local Ollama, or any OpenAI-compatible relay; keyless (IP-allowlisted) proxies supported\n- **One-click import** from Claude Code and Codex configs — bring your existing providers, models, and keys in a single click\n- **Dynamic model picker** — every provider exposes its real model catalogue, not a hardcoded shortlist\n\n### Generation and editing\n- **Prompt → HTML or JSX/React component** prototype, rendered in a sandboxed iframe (vendored React 18 + Babel on-device)\n- **Fifteen built-in demos + twelve design skill modules** — ready-to-edit starting points for common design briefs\n- **Live agent panel** — watch tool calls stream in real time as the model edits files\n- **AI image generation** — opt-in bitmap assets for heroes, product shots, backgrounds, and illustrations\n- **AI-generated sliders** — the model emits the parameters worth tweaking (color, spacing, font)\n- **Comment mode** — click any element in the preview to drop a pin, leave a note, and let the model rewrite only that region\n- **Generation cancellation** — stop mid-stream without losing prior turns\n\n### Preview and workflow\n- **Phone / tablet / desktop preview** — true responsive frames, switch with one click\n- **Files panel** — inspect multi-file artifacts (HTML, CSS, JS) before export\n- **Instant design switching** — the last five designs keep their preview iframes alive, so Hub ↔ Workspace and sidebar navigation stay zero-delay\n- **Connection diagnostic panel** — one-click test for any provider, with actionable errors\n- **Per-generation token counter** — see exactly how many tokens each run cost in the sidebar\n- **Settings with four tabs** — Models, Appearance, Storage, and Advanced\n- **Light + dark themes**, **EN + 简体中文 UI** with live toggle\n\n### Export and packaging\n- **Five export formats** — HTML (inlined CSS), PDF (local Chrome), PPTX, ZIP, Markdown\n- **GitHub Release pipeline** — unsigned DMG (macOS), EXE (Windows), AppImage (Linux). Code-signing lands in v0.5 along with opt-in auto-update\n\n---\n\n## Roadmap\n\nCurrent release: v0.1.4. The next release theme is locked: **Agentic Design**.\n\n### Now — v0.1.4 shipped\n\n- **AI image generation** — opt-in bitmap assets through OpenAI image models or OpenRouter image models\n- **ChatGPT Plus / Codex subscription login** — one-click OAuth for users who do not want to paste an API key\n- **CLIProxyAPI one-click import** — auto-detect a running local proxy and bring it into Settings\n- **API config hardening** — clearer relay diagnostics for timeouts, SSE truncation, missing `/models`, and incompatible Messages APIs\n\n### Next — v0.2.0 (Agentic Design)\n\nExpected in about a week. v0.2 turns Open CoDesign from a one-shot generator into a local design agent with a real workspace:\n\n- **Design as session** — every design is a pi session with JSONL history and a workspace folder on disk\n- **Permissioned agent loop** — pi built-ins for read, write, edit, bash, grep, find, and ls, gated by Open CoDesign's permission UI\n- **Design tools on demand** — `ask`, `scaffold`, `skill`, `preview`, `gen_image`, `tweaks`, `todos`, and `done`\n- **`DESIGN.md` as shared memory** — brand tokens and design-system decisions become editable files, not model memory\n- **v0.1 migration path** — existing SQLite designs migrate into workspaces and session history\n\n### Later — v0.2.x and beyond\n\n- Renderer polish for the new `ask`, `preview`, tweaks, and process-management surfaces\n- Cost transparency — pre-generation estimate + weekly budget (per-generation token count already shipped)\n- Version snapshots + side-by-side diff\n- Three-style parallel exploration\n- Codebase → design system (token extraction)\n- Code-signing (Apple ID + Authenticode) + opt-in auto-update — v0.5\n- Figma layer export — post-1.0\n\nHave a different priority in mind? [Open an issue](https://github.com/OpenCoworkAI/open-codesign/issues/new/choose) or 👍 an existing one — we do read them.\n\n---\n\n## Star History\n\n<p align=\"center\">\n  <a href=\"https://star-history.com/#OpenCoworkAI/open-codesign&Date\">\n    <img\n      alt=\"Star History Chart\"\n      src=\"https://api.star-history.com/image?repos=OpenCoworkAI/open-codesign&type=Date\"\n      width=\"720\"\n    />\n  </a>\n</p>\n\n---\n\n## Built on\n\n- Electron + React 19 + Vite 6 + Tailwind v4\n- `@mariozechner/pi-ai` and `pi-coding-agent` (model/provider and agent-loop primitives)\n- `better-sqlite3`, `electron-builder`\n\n## Reporting issues\n\nFound a bug or have a feature request?\n\n1. **Search** [existing issues](https://github.com/OpenCoworkAI/open-codesign/issues) first.\n2. **Generate a diagnostics bundle** — Settings → Storage → Export diagnostics (API keys and prompts are redacted automatically).\n3. **Open a new issue** using our [bug report](https://github.com/OpenCoworkAI/open-codesign/issues/new?template=bug_report.yml) or [feature request](https://github.com/OpenCoworkAI/open-codesign/issues/new?template=feature_request.yml) template.\n4. For security vulnerabilities, see [SECURITY.md](./SECURITY.md).\n\n## More from OpenCoworkAI \n\nIf you like Open CoDesign, you may also want to check out our earlier project, [Open Cowork](https://github.com/OpenCoworkAI/open-cowork), an open-source AI agent desktop app for Windows and macOS with one-click install, multi-model support, sandbox isolation, and built-in skills.\n\n## Community\n\nOpen CoDesign first launched on the [LINUX DO](https://linux.do/) community — thanks to everyone there for the early feedback and discussion.\n\n- **[GitHub Discussions](https://github.com/OpenCoworkAI/open-codesign/discussions)** — share your designs in [Show & Tell](https://github.com/OpenCoworkAI/open-codesign/discussions/categories/show-and-tell), ask questions in [Q&A](https://github.com/OpenCoworkAI/open-codesign/discussions/categories/q-a), and propose features in [Ideas](https://github.com/OpenCoworkAI/open-codesign/discussions/categories/ideas).\n- **[LINUX DO](https://linux.do/)** — Chinese-speaking discussion, use tips, and feedback (primary community).\n- **GitHub Issues** — [bug reports and reproducible problems](https://github.com/OpenCoworkAI/open-codesign/issues).\n\n### WeChat group\n\nFor Chinese-speaking users, we also keep a WeChat group for product updates, usage questions, and community discussion.\n\n<p align=\"center\">\n  <img\n    src=\"https://raw.githubusercontent.com/OpenCoworkAI/open-codesign/main/website/public/community/wechat-group.jpg\"\n    alt=\"Open CoDesign WeChat group QR code\"\n    width=\"260\"\n  />\n</p>\n\n> ⚠️ The WeChat QR code rotates every 7 days and is currently valid until **May 4**.\n> If the code has expired, please leave a message in [GitHub Issues](https://github.com/OpenCoworkAI/open-codesign/issues) and we will refresh the image in-repo.\n\nSee also the Chinese README: [README.zh-CN.md#社群](./README.zh-CN.md#%E7%A4%BE%E7%BE%A4).\n\n## Contributing\n\nRead [CONTRIBUTING.md](./CONTRIBUTING.md). Open an issue before writing code and run `pnpm lint && pnpm typecheck && pnpm test` before a PR.\n\n## License\n\nMIT — fork it, ship it, sell it. Third-party notices remain in [NOTICE](./NOTICE).\n\n## Cite this project\n\nIf you reference Open CoDesign in a paper, article, or product comparison, please cite the repository as:\n\n```bibtex\n@misc{open_codesign_github,\n  author       = {OpenCoworkAI Contributors},\n  title        = {Open CoDesign: An Open-Source Desktop AI Design Tool},\n  year         = {2026},\n  howpublished = {\\url{https://github.com/OpenCoworkAI/open-codesign}},\n  note         = {GitHub repository}\n}\n````\n\nOr the machine-readable `CITATION.cff` at the repo root.\n","summary":"Open CoDesign is a local, open‑source design tool that lets users turn prompts into polished design artifacts using any paid or free AI model they already own. It features a live preview side‑by‑side interface, support for image generation, multi‑model integration, and a CLI proxy for easy API configuration. The application also plans agentic design sessions, workspace‑backed sessions, and permissioned file tool loops in upcoming releases. Designers and developers who want a privacy‑first, model‑agnostic prototyping and design workflow would benefit the most from this tool.","description":"Open-source Claude Design alternative. One-click import your Claude Code / Codex API key. Prompt → prototype / slides / PDF. Multi-model (Claude, GPT, Gemini, Kimi, GLM, Ollama). BYOK, local-first, MIT.","stars":4608,"language":"TypeScript"},{"owner":"injaneity","repo":"pi-computer-use","url":"https://github.com/injaneity/pi-computer-use","readme":"# pi-computer-use\n\n<p align=\"center\">\n  <img src=\"./assets/logo/logo3.png\" width=\"50%\" alt=\"pi-computer-use\">\n</p>\n\n<p align=\"center\">\n  <a href=\"https://www.npmjs.com/package/@injaneity/pi-computer-use\"><img alt=\"npm\" src=\"https://img.shields.io/npm/v/@injaneity/pi-computer-use?style=flat-square\"></a>\n  <a href=\"./LICENSE\"><img alt=\"license\" src=\"https://img.shields.io/github/license/injaneity/pi-computer-use?style=flat-square\"></a>\n  <img alt=\"platform\" src=\"https://img.shields.io/badge/platform-macOS-lightgrey?style=flat-square\">\n  <a href=\"https://github.com/injaneity/pi-computer-use/actions/workflows/ci.yml\"><img alt=\"ci\" src=\"https://img.shields.io/github/actions/workflow/status/injaneity/pi-computer-use/ci.yml?branch=main&style=flat-square\"></a>\n</p>\n\nCodex-style computer use for [Pi](https://pi.dev/) on macOS.\n\n`pi-computer-use` gives Pi agents a semantic computer-use surface for visible macOS windows. It prefers Accessibility (AX) targets such as `@e1`, returns semantic state after every action, and attaches screenshots only when AX coverage is too weak for reliable operation.\n\n## Table of Contents\n\n- [Quick Start](#quick-start)\n- [What It Adds to Pi](#what-it-adds-to-pi)\n- [Examples](#examples)\n- [How It Works](#how-it-works)\n- [Documentation](#documentation)\n- [Development & Benchmarks](#development--benchmarks)\n- [Release & Install Notes](#release--install-notes)\n- [License](#license)\n- [See Also](#see-also)\n\n## Quick Start\n\nInstall the Pi package:\n\n```bash\npi install git:github.com/injaneity/pi-computer-use@v0.2.1\n```\n\nStart Pi in interactive mode. On the first session, grant macOS permissions to:\n\n```text\n~/.pi/agent/helpers/pi-computer-use/bridge\n```\n\nRequired permissions:\n\n- Accessibility\n- Screen Recording\n\nSome browser automation paths use JavaScript from Apple Events. If the browser blocks that, Pi surfaces a model-readable hint asking the user to enable **Allow JavaScript from Apple Events** in the browser's developer menu, then retry.\n\nThen call `screenshot` first in a Pi session. It selects the controlled window and returns the latest semantic state, including AX refs such as `@e1` when available. If the target app/window is ambiguous, use `list_apps` and `list_windows` first.\n\n```ts\nlist_apps()\nlist_windows({ app: \"Safari\" })\nscreenshot({ window: \"@w1\" })\nclick({ window: \"@w1\", ref: \"@e1\" })\nset_text({ ref: \"@e2\", text: \"hello\" })\n```\n\nUse `/computer-use` in Pi to inspect the effective config and config sources.\n\n## What It Adds to Pi\n\n- Public tools: `list_apps`, `list_windows`, `screenshot`, `click`, `double_click`, `move_mouse`, `drag`, `scroll`, `keypress`, `type_text`, `set_text`, `wait`, `arrange_window`, `navigate_browser`, `computer_actions`.\n- AX target refs in tool results, with capabilities such as `canSetValue`, `canPress`, `canFocus`, `canScroll`, and `adjust`.\n- Stable window refs from `list_windows`, with explicit targeting such as `screenshot({ window: \"@w1\" })` and `click({ window: \"@w1\", ref: \"@eN\" })`.\n- State IDs for stale-action detection.\n- Deterministic window layout through `arrange_window` presets or explicit frames.\n- Optional screenshot attachment mode with `image: \"auto\" | \"always\" | \"never\"`.\n- Ref-first actions such as `click({ ref: \"@eN\" })`, `scroll({ ref: \"@eN\" })`, and `set_text({ ref: \"@eN\", text })`.\n- Batched actions through `computer_actions`, with one post-action semantic state update plus per-action execution metadata.\n- Execution metadata that reports `stealth` for background-safe AX paths and `default` for focus/raw-event fallbacks.\n- Full pointer and keyboard primitive coverage for common GUI flows, with AX-first equivalents where available.\n- Browser-aware targeting, including isolated browser window preference where appropriate.\n- Optional strict AX mode for background-safe operation without foreground focus, raw pointer events, raw keyboard events, or cursor takeover.\n- Official QA benchmark harness in [`benchmarks/`](./benchmarks/README.md).\n\n## Examples\n\nPrefer AX refs over coordinates when a matching target exists:\n\n```ts\nclick({ ref: \"@e1\" })\nscroll({ ref: \"@e3\", scrollY: 600 })\n```\n\nUse coordinates from the latest screenshot only when there is no suitable AX target:\n\n```ts\nclick({ x: 320, y: 180, stateId: \"...\" })\n```\n\nReplace text through AX value semantics:\n\n```ts\nset_text({ ref: \"@e2\", text: \"https://example.com\" })\nkeypress({ keys: [\"Enter\"] })\n```\n\nBatch obvious actions when no intermediate inspection is needed:\n\n```ts\ncomputer_actions({\n  stateId: \"...\",\n  actions: [\n    { type: \"click\", ref: \"@e1\" },\n    { type: \"set_text\", ref: \"@e2\", text: \"https://example.com\" },\n    { type: \"keypress\", keys: [\"Enter\"] }\n  ]\n})\n```\n\nSee [docs/usage.md](./docs/usage.md) for the full workflow and tool patterns.\n\n## How It Works\n\n`pi-computer-use` has three pieces:\n\n1. The Pi extension in [`extensions/computer-use.ts`](./extensions/computer-use.ts) registers the public tools and `/computer-use` command.\n2. The TypeScript bridge in [`src/bridge.ts`](./src/bridge.ts) manages the current window, capture IDs, AX refs, fallback policy, batching, and execution metadata.\n3. The native Swift helper in [`native/macos/bridge.swift`](./native/macos/bridge.swift) talks to macOS Accessibility, ScreenCaptureKit, AppKit, and CoreGraphics.\n\nThe result is semantic-first GUI control: Pi sees useful AX targets first, falls back to screenshots only when needed, and reports whether each action stayed background-safe.\n\n## Documentation\n\n- [Usage guide](./docs/usage.md): tool workflow, AX refs, text input, browser flows, batching, and strict AX mode.\n- [Configuration](./docs/configuration.md): config files, environment overrides, browser control, and stealth mode.\n- [Development](./docs/development.md): local setup, helper builds, validation, release signing notes, and PR workflow.\n- [Troubleshooting](./docs/troubleshooting.md): permissions, helper setup, stale refs, browser refusal, and strict mode errors.\n- [Benchmarks](./benchmarks/README.md): benchmark commands, metrics, regression policy, and local comparison workflow.\n- [Contributing](./CONTRIBUTING.md): issue-first contribution rules and PR checklist.\n\n## Development & Benchmarks\n\nInstall dependencies:\n\n```bash\nnpm install\n```\n\nRun checks:\n\n```bash\nnpm test\n```\n\nRun the local checkout in Pi without loading another installed copy:\n\n```bash\npi --no-extensions -e .\n```\n\nRun the default QA benchmark:\n\n```bash\nnpm run benchmark:qa\n```\n\nRun the wider benchmark that may open apps:\n\n```bash\nnpm run benchmark:qa:full\n```\n\n## Release & Install Notes\n\nThe package is published on npm as `@injaneity/pi-computer-use`.\n\n```bash\nnpm install @injaneity/pi-computer-use\nnpm install @injaneity/pi-computer-use@0.2.1\n```\n\nPi installs should pin a GitHub release tag:\n\n```bash\npi install git:github.com/injaneity/pi-computer-use@v0.2.1\npi install -l git:github.com/injaneity/pi-computer-use@v0.2.1\npi install /absolute/path/to/pi-computer-use\n```\n\nRemove:\n\n```bash\npi remove git:github.com/injaneity/pi-computer-use@v0.2.1\nnpm remove @injaneity/pi-computer-use\n```\n\nFor a different release, replace `v0.2.1` or `0.2.1` with the version you want to pin.\n\n## Screenshots\n\n![pi-computer-use screenshot](./assets/reference/img.jpg)\n\n## License\n\nMIT\n\n## See Also\n\n- [Pi](https://pi.dev/)\n- [`@mariozechner/pi-coding-agent`](https://www.npmjs.com/package/@mariozechner/pi-coding-agent)\n- [`@mariozechner/pi-ai`](https://www.npmjs.com/package/@mariozechner/pi-ai)\n","summary":"**pi-computer-use** supplies Pi agents on macOS with a semantic computer‑interaction layer that treats visible windows as first‑class objects. It wraps macOS Accessibility APIs to expose target references (e.g., `@e1`), returns rich state after each action, and automatically falls back to screenshots when AX coverage is insufficient. The toolkit offers a comprehensive set of GUI primitives—clicking, typing, scrolling, window management, and batched actions—alongside strict‑mode background-safe operations and deterministic window layouts. Developers building Pi‑powered automation scripts, UI testing, or accessibility‑enabled assistants will benefit from the library’s reliable, observable interaction surface.","description":"control your applications using pi-coding-agent. fully invisible.","stars":507,"language":"TypeScript"},{"owner":"TencentCloud","repo":"CubeSandbox","url":"https://github.com/TencentCloud/CubeSandbox","readme":"<p align=\"center\">\n  <img src=\"docs/assets/cube-sandbox-logo.png\" alt=\"Cube Sandbox Logo\" width=\"140\" />\n</p>\n\n<h1 align=\"center\">CubeSandbox</h1>\n\n<p align=\"center\">\n  <strong>Instant, Concurrent, Secure & Lightweight Sandbox Service for AI Agents</strong>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/tencentcloud/CubeSandbox/stargazers\"><img src=\"https://img.shields.io/github/stars/tencentcloud/cubesandbox?style=social\" alt=\"GitHub Stars\" /></a>\n  <a href=\"https://github.com/tencentcloud/CubeSandbox/issues\"><img src=\"https://img.shields.io/github/issues/tencentcloud/cubesandbox\" alt=\"GitHub Issues\" /></a>\n  <a href=\"./LICENSE\"><img src=\"https://img.shields.io/badge/License-Apache_2.0-green\" alt=\"Apache 2.0 License\" /></a>\n  <a href=\"./CONTRIBUTING.md\"><img src=\"https://img.shields.io/badge/PRs-welcome-brightgreen\" alt=\"PRs Welcome\" /></a>\n</p>\n\n<p align=\"center\">\n  <img src=\"https://img.shields.io/badge/⚡_Startup-Tens_of_ms-blue\" alt=\"Fast startup\" />\n  <img src=\"https://img.shields.io/badge/🔒_Isolation-Hardware_Level-critical\" alt=\"Hardware-level isolation\" />\n  <img src=\"https://img.shields.io/badge/🔌_API-E2B_Compatible-blueviolet\" alt=\"E2B compatible\" />\n  <img src=\"https://img.shields.io/badge/📦_Deploy-High_Concurrency·High_Density-orange\" alt=\"High concurrency & high density\" />\n</p>\n\n<p align=\"center\">\n  <a href=\"./README_zh.md\"><strong>中文文档</strong></a> ·\n  <a href=\"./docs/guide/quickstart.md\"><strong>Quick Start</strong></a> ·\n  <a href=\"./docs/index.md\"><strong>Documentation</strong></a> ·\n  <a href=\"./docs/changelog.md\"><strong>Changelog</strong></a>\n</p>\n\n---\n\nCube Sandbox is a high-performance, out-of-the-box secure sandbox service built on RustVMM and KVM. It supports both single-node deployment and can be easily scaled to a multi-node cluster. It is compatible with the E2B SDK, capable of creating a hardware-isolated sandbox environment with full service capabilities in under 60ms, while maintaining less than 5MB memory overhead.\n\n\n<p align=\"center\">\n  <img src=\"./docs/assets/readme_speed_en_1.png\" width=\"400\" />\n  <img src=\"./docs/assets/readme_overhead_en_1.png\" width=\"400\" />\n</p>\n\n\n## Demos\n\n<table align=\"center\">\n  <tr align=\"center\" valign=\"middle\">\n    <td width=\"33%\" valign=\"middle\">\n      <video src=\"https://github.com/user-attachments/assets/f87c409e-29fc-4e86-9eac-dbeaff2aca18\" controls=\"controls\" muted=\"muted\" style=\"max-width: 100%;\"></video>\n    </td>\n    <td width=\"33%\" valign=\"middle\">\n      <video src=\"https://github.com/user-attachments/assets/50e7126e-bb73-4abc-aa85-677fdf2e8c67\" controls=\"controls\" muted=\"muted\" style=\"max-width: 100%;\"></video>\n    </td>\n    <td width=\"33%\" valign=\"middle\">\n      <video src=\"https://github.com/user-attachments/assets/052e0e77-e2d9-409e-90b8-d13c28b80495\" controls=\"controls\" muted=\"muted\" style=\"max-width: 100%;\"></video>\n    </td>\n  </tr>\n  <tr align=\"center\" valign=\"top\">\n    <td>\n      <em>Installation & Demo</em>\n    </td>\n    <td>\n      <em>Performance Test</em>\n    </td>\n    <td>\n      <em>RL (SWE-Bench)</em>\n    </td>\n  </tr>\n</table>\n\n\n## Core Highlights\n\n- **Blazing-fast cold start:** Built on resource pool pre-provisioning and snapshot cloning technology, skipping time-consuming initialization entirely. Average end-to-end cold start time for a fully serviceable sandbox is < 60ms.\n- **High-density deployment on a single node:** Extreme memory reuse via CoW technology combined with a Rust-rebuilt, aggressively trimmed runtime keeps per-instance memory overhead below 5MB — run thousands of Agents on a single machine.\n- **True kernel-level isolation:** No more unsafe Docker shared-kernel (Namespace) hacks. Each Agent runs with its own dedicated Guest OS kernel, eliminating container escape risks and enabling safe execution of any LLM-generated code.\n- **Zero-cost migration (E2B drop-in replacement):** Natively compatible with the E2B SDK interface. Just swap one URL environment variable — no business logic changes needed — to migrate from expensive closed-source sandboxes to free Cube Sandbox with better performance.\n- **Network security:** CubeVS, powered by eBPF, enforces strict inter-sandbox network isolation at the kernel level with fine-grained egress traffic filtering policies.\n- **Ready to use out of the box:** One-click deployment with support for both single-node and cluster setups.\n- **Event-level snapshot rollback (coming soon):** High-frequency snapshot rollback at millisecond granularity, enabling rapid fork-based exploration environments from any saved state.\n- **Production-ready:** Cube Sandbox has been validated at scale in Tencent Cloud production environments, proven stable and reliable.\n\n## Benchmarks\n\nIn the context of AI Agent code execution, CubeSandbox achieves the perfect balance of security and performance:\n\n| Metric | Docker Container | Traditional VM | CubeSandbox |\n|---|---|---|---|\n| **Isolation Level** | Low (Shared Kernel Namespaces) | High (Dedicated Kernel) | **Extreme (Dedicated Kernel + eBPF)** |\n| **Boot Speed** <br>*Full-OS boot duration | 200ms | Seconds | **Sub-millisecond (<60ms)** |\n| **Memory Overhead** | Low (Shared Kernel) | High (Full OS) | **Ultra-low (Aggressively stripped, <5MB)** |\n| **Deployment Density** | High | Low | **Extreme (Thousands per node)** |\n| **E2B SDK Compatible** | / | / | **✅ Drop-in** |\n\n*   *Cold start benchmarked on bare-metal. 60ms at single concurrency; under 50 concurrent creations, avg 67ms, P95 90ms, P99 137ms — consistently sub-150ms.*\n*   *Memory overhead measured with sandbox specs ≤ 32GB. Larger configurations may see a marginal increase.*\n\nFor detailed metrics on startup latency and resource overhead, please refer to:\n\n\n<table align=\"center\">\n  <tr align=\"center\" valign=\"middle\">\n    <td width=\"33%\" valign=\"middle\">\n      <img src=\"./docs/assets/1-concurrency-create.png\" />\n    </td>\n    <td width=\"33%\" valign=\"middle\">\n      <img src=\"./docs/assets/50-concurrency-create.png\" />\n    </td>\n    <td width=\"33%\" valign=\"middle\">\n      <img src=\"./docs/assets/cube-sandbox-mem-overhead.png\" />\n    </td>\n  </tr>\n  <tr align=\"center\" valign=\"top\">\n    <td colspan=\"2\">\n      <em>Sub-150ms sandbox delivery under both single and high-concurrency workloads</em>\n    </td>\n    <td>\n      <em>CubeSandbox base memory footprint across various instance sizes</em><br>\n      <sup>(*Blue: Sandbox specifications; Orange: Base memory overhead). Note that memory consumption increases only marginally as instance sizes scale up.\n</sup>\n    </td>\n  </tr>\n</table>\n\n\n</br>\n\n## Quick Start\n\n<p align=\"center\">\n  <a href=\"./docs/guide/quickstart.md\">\n    <img src=\"docs/assets/fast-start.gif\" alt=\"Cube Sandbox fast start walkthrough\" width=\"720\" />\n  </a>\n</p>\n\n<p align=\"center\">\n  <em>⚡ Millisecond-level startup — watch the fast-start flow, then jump into the <a href=\"./docs/guide/quickstart.md\" target=\"_blank\">Quick Start guide</a>.</em>\n</p>\n\n\n\n\nCube Sandbox requires a KVM-enabled x86_64 Linux environment — **WSL 2**, a **Linux physical machine**, or a **cloud bare-metal server** all work.\n\n> Don't have one yet?\n> - **Windows users**: run `wsl --install` in an admin PowerShell to set up WSL 2 (requires Windows 11 22H2+, with nested virtualization enabled in BIOS / WSL).\n> - **Others**: grab an x86_64 Linux physical machine, or rent a bare-metal server from a cloud provider.\n\nOnce your environment is ready, launch your first sandbox in four steps:\n\n1. **Prepare the runtime environment** (skip this step if you already have an x86_64 bare-metal Linux server)\n\nRun the following on your WSL / Linux machine:\n\n```bash\ngit clone https://github.com/tencentcloud/CubeSandbox.git\n# For faster access from mainland China, clone from the mirror instead:\n# git clone https://cnb.cool/CubeSandbox/CubeSandbox\n\ncd CubeSandbox/dev-env\n./prepare_image.sh   # one-off: download and initialize the runtime image\n./run_vm.sh          # boot the environment; keep this terminal open (Ctrl+a x to exit)\n```\n\nIn a second terminal, log into the environment you just prepared:\n\n```bash\ncd CubeSandbox/dev-env && ./login.sh\n```\n\n> This drops you into a disposable Linux environment where all the subsequent installation happens, so your host stays clean. See [Development Environment](./docs/guide/dev-environment.md) for details.\n\n2. **Start the Cube Sandbox Service**\n\nInside the environment you entered via `login.sh` (or directly on your bare-metal server), run **one** of the following commands depending on your location:\n\n- **Global Users** (downloads from GitHub):\n\n  ```bash\n  curl -sL https://github.com/tencentcloud/CubeSandbox/raw/master/deploy/one-click/online-install.sh | bash\n  ```\n\n- **中国用户请执行这条命令 (Mainland China)**:\n\n  ```bash\n  curl -sL https://cnb.cool/CubeSandbox/CubeSandbox/-/git/raw/master/deploy/one-click/online-install.sh | MIRROR=cn bash\n  ```\n\n> See [Quick Start — China mainland mirror](./docs/guide/quickstart.md#step-2-install) for details.\n\n3. **Create a Code Interpreter Sandbox Template**\n\nAfter installation, create a code interpreter template from the prebuilt image:\n\n```bash\ncubemastercli tpl create-from-image \\\n  --image ccr.ccs.tencentyun.com/ags-image/sandbox-code:latest \\\n  --writable-layer-size 1G \\\n  --expose-port 49999 \\\n  --expose-port 49983 \\\n  --probe 49999\n```\n\nThen run the following command to monitor the build progress:\n\n```bash\ncubemastercli tpl watch --job-id <job_id>\n```\n\n**⚠️ The image is fairly large** — downloading, extracting, and building the template may take a while; please be patient.\n\nWait for the command above to finish and the template status to reach `READY`. Note the **template ID** (`template_id`) from the output — you will need it in the next step.\n\n4. **Run Your First Agent Code**\n\nInstall the Python SDK:\n\n```bash\nyum install -y python3 python3-pip\npip install e2b-code-interpreter\n```\n\nSet environment variables:\n\n```bash\nexport E2B_API_URL=\"http://127.0.0.1:3000\"\nexport E2B_API_KEY=\"dummy\"\nexport CUBE_TEMPLATE_ID=\"<your-template-id>\"  # template ID obtained from Step 3\nexport SSL_CERT_FILE=\"/root/.local/share/mkcert/rootCA.pem\"\n```\n\nRun code inside an isolated sandbox:\n\n```python\nimport os\nfrom e2b_code_interpreter import Sandbox  # drop-in E2B SDK\n\n# Cube Sandbox transparently intercepts all requests\nwith Sandbox.create(template=os.environ[\"CUBE_TEMPLATE_ID\"]) as sandbox:\n    result = sandbox.run_code(\"print('Hello from Cube Sandbox, safely isolated!')\")\n    print(result)\n```\n\n> See [Quick Start — Step 4](./docs/guide/quickstart.md#step-4-run-your-first-agent) for the full variable reference and more examples.\n\nWant to explore more? Check out the 📂 [`examples/`](./examples/) directory, covering scenarios like: code execution, Shell commands, file operations, browser automation, network policies, pause/resume, OpenClaw integration, and RL training.\n\n### Deep Dive\n\n- 📖 [Documentation Home](./docs/index.md) - Complete guide and API reference\n- 🔧 [Template Concepts](./docs/guide/templates.md) - Image-to-Template concepts and workflows\n- 🌟 [Example Projects](./docs/guide/tutorials/examples.md) - Hands-on examples demonstrating various Cube Sandbox use cases (Browser automation, OpenClaw integration, RL training workflows, etc.)\n- 💻 [Development Environment (QEMU VM)](./docs/guide/dev-environment.md) - No bare-metal? Spin up a disposable OpenCloudOS 9 VM and run Cube Sandbox inside it\n\n## Architecture\n\n<p align=\"center\">\n  <img src=\"docs/assets/cube-sandbox-arch.png\" alt=\"Cube Sandbox Architecture\" />\n</p>\n\n| Component | Responsibility |\n|---|---|\n| **CubeAPI** | High-concurrency REST API Gateway (Rust), compatible with E2B. Swap the URL for seamless migration. |\n| **CubeMaster** | Cluster orchestrator. Receives API requests and dispatches them to corresponding Cubelets. Manages resource scheduling and cluster state. |\n| **CubeProxy** | Reverse proxy, compatible with the E2B protocol, routing requests to the appropriate sandbox instances. |\n| **Cubelet** | Compute node local scheduling component. Manages the complete lifecycle of all sandbox instances on the node. |\n| **CubeVS** | eBPF-based virtual switch, providing kernel-level network isolation and security policy enforcement. |\n| **CubeHypervisor & CubeShim** | Virtualization layer — CubeHypervisor manages KVM MicroVMs, CubeShim implements the containerd Shim v2 API to integrate sandboxes into the container runtime. |\n\n👉 For more details, please read the [Architecture Design Document](./docs/architecture/overview.md) and [CubeVS Network Model](./docs/architecture/network.md).\n\n## Community & Contributing\n\nWe welcome contributions of all kinds—whether it’s a bug report, feature suggestion, documentation improvement, or code submission!\n\n- 🐞 **Found a Bug or have questions?** Submit an issue on <a href=\"https://github.com/tencentcloud/CubeSandbox/issues\" target=\"_blank\">GitHub Issues</a>.\n- 💡 **Have an Idea?** Join the conversation in <a href=\"https://github.com/tencentcloud/CubeSandbox/discussions\" target=\"_blank\">GitHub Discussions</a>.\n- 🛠️ **Want to Code?** Check out our <a href=\"./CONTRIBUTING.md\" target=\"_blank\">CONTRIBUTING.md</a> to learn how to submit a Pull Request.\n- 💬 **Want to Chat?** Join our <a href=\"https://discord.gg/kkapzDXShb\" target=\"_blank\">Discord</a>.\n\n## License\n\nCubeSandbox is released under the [Apache License 2.0](./LICENSE).\n\nThe birth of CubeSandbox stands on the shoulders of open-source giants. Special thanks to [Cloud Hypervisor](https://github.com/cloud-hypervisor/cloud-hypervisor), [Kata Containers](https://github.com/kata-containers/kata-containers), virtiofsd, containerd-shim-rs, ttrpc-rust, and others. We have made tailored modifications to some components to fit the CubeSandbox execution model, and the original in-file copyright notices are preserved.\n","summary":"CubeSandbox is a high‑performance sandbox service built on RustVMM and KVM that delivers instant, hardware‑isolated execution environments for AI agents. It achieves sub‑60 ms cold starts, less than 5 MB of per‑instance memory overhead, and supports high‑density, single‑node deployment as well as scalable multi‑node clusters, while remaining fully compatible with the E2B SDK. By providing true kernel‑level isolation instead of Docker’s shared‑kernel model, it lets developers and enterprises run untrusted LLM‑generated code safely and efficiently.","description":"Instant, Concurrent, Secure & Lightweight Sandbox for AI Agents.","stars":4975,"language":"Rust"},{"owner":"cosmicstack-labs","repo":"mercury-agent","url":"https://github.com/cosmicstack-labs/mercury-agent","readme":"<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"docs/img/card-dark.png\">\n    <source media=\"(prefers-color-scheme: light)\" srcset=\"docs/img/card-light.png\">\n    <img alt=\"Mercury — Soul-Driven AI Agent\" src=\"docs/img/card-light.png\" width=\"600\">\n  </picture>\n</p>\n\n<p align=\"center\">\n  <strong>Soul-driven AI agent with permission-hardened tools, token budgets, and multi-channel access.</strong>\n</p>\n\n<p align=\"center\">\n  Remembers what matters. Asks before it acts. Runs 24/7 from CLI or Telegram. 31 built-in tools, extensible skills, SQLite-backed Second Brain memory.\n</p>\n\n<p align=\"center\">\n  <a href=\"https://www.npmjs.com/package/@cosmicstack/mercury-agent\"><img src=\"https://img.shields.io/npm/v/@cosmicstack/mercury-agent\" alt=\"npm\"></a>\n  <a href=\"https://github.com/cosmicstack-labs/mercury-agent\"><img src=\"https://img.shields.io/github/license/cosmicstack-labs/mercury-agent\" alt=\"license\"></a>\n  <a href=\"https://nodejs.org/\"><img src=\"https://img.shields.io/node/v/@cosmicstack/mercury-agent\" alt=\"node\"></a>\n</p>\n\n<p align=\"center\">\n  English | <a href=\"README.zh-CN.md\">简体中文</a>\n</p>\n\n---\n\n## Quick Start\n\n```bash\nnpx @cosmicstack/mercury-agent\n```\n\nOr install globally:\n\n```bash\nnpm i -g @cosmicstack/mercury-agent\nmercury\n```\n\nFirst run triggers the setup wizard — enter your name, an API key, and optionally a Telegram bot token. Takes 30 seconds.\n\nTo reconfigure later (change keys, name, settings):\n\n```bash\nmercury doctor\n```\n\n## Why Mercury?\n\nEvery AI agent can read files, run commands, and fetch URLs. Most do it silently. **Mercury asks first — and remembers what matters.**\n\n- **Permission-hardened** — Shell blocklist (`sudo`, `rm -rf /`, etc. never execute). Folder-level read/write scoping. Pending approval flow. Ask Me or Allow All per session. No surprises.\n- **Second Brain** — Persistent, structured memory with SQLite + FTS5 full-text search. 10 memory types, auto-extraction, conflict resolution, auto-consolidation. Mercury learns your preferences, goals, and habits without manual entry.\n- **Soul-driven** — Personality defined by markdown files you own (`soul.md`, `persona.md`, `taste.md`, `heartbeat.md`). No corporate wrapper.\n- **Token-aware** — Daily budget enforcement. Auto-concise when over 70%. `/budget` command to check, reset, or override.\n- **Live streaming** — Real-time token streaming on CLI with cursor-save/restore and markdown re-rendering. Telegram streaming with editable status messages.\n- **Always on** — Run as a background daemon on any OS. Auto-restarts on crash. Starts on boot. Cron scheduling, heartbeat monitoring, and proactive notifications.\n- **Extensible** — Install community skills with a single command. Schedule skills as recurring tasks. Based on the [Agent Skills](https://agentskills.io) specification.\n\n## Daemon Mode\n\n**One command to make Mercury persistent:**\n\n```bash\nmercury up\n```\n\nThis installs the system service (if not installed), starts the background daemon, and ensures Mercury is running. Use this as your go-to command.\n\nIf Mercury is already running, `mercury up` just confirms it and shows the PID.\n\n### Other daemon commands\n\n```bash\nmercury restart      # Restart the background process\nmercury stop         # Stop the background process\nmercury start -d     # Start in background (without service install)\nmercury logs         # View recent daemon logs\nmercury status       # Show if daemon is running\n```\n\nDaemon mode includes built-in crash recovery — if the process crashes, it restarts automatically with exponential backoff (up to 10 restarts per minute).\n\n### System Service (auto-start on boot)\n\n`mercury up` installs this automatically. You can also manage it directly:\n\n```bash\nmercury service install\n```\n\n| Platform | Method | Requires Admin |\n|----------|--------|---------------|\n| **macOS** | LaunchAgent (`~/Library/LaunchAgents/`) | No |\n| **Linux** | systemd user unit (`~/.config/systemd/user/`) | No (linger for boot) |\n| **Windows** | Task Scheduler (`schtasks`) | No |\n\n```bash\nmercury service status     # Check if service is running\nmercury service uninstall  # Remove the system service\n```\n\nIn daemon mode, Telegram becomes your primary channel — CLI is log-only since there's no terminal for input.\n\n## CLI Commands\n\n| Command | Description |\n|---------|-------------|\n| `mercury up` | **Recommended.** Install service + start daemon + ensure running |\n| `mercury` | Start the agent (same as `mercury start`) |\n| `mercury start` | Start in foreground |\n| `mercury start -d` | Start in background (daemon mode) |\n| `mercury restart` | Restart the background process |\n| `mercury stop` | Stop a background process |\n| `mercury logs` | View recent daemon logs |\n| `mercury doctor` | Reconfigure (Enter to keep current values) |\n| `mercury setup` | Re-run the setup wizard |\n| `mercury status` | Show config and daemon status |\n| `mercury help` | Show full manual |\n| `mercury upgrade` | Upgrade to latest version |\n| `mercury telegram list` | List approved and pending Telegram users |\n| `mercury telegram approve <code\\|id>` | Approve a pairing code or pending request |\n| `mercury telegram reject <id>` | Reject a pending Telegram access request |\n| `mercury telegram remove <id>` | Remove an approved Telegram user |\n| `mercury telegram promote <id>` | Promote a Telegram member to admin |\n| `mercury telegram demote <id>` | Demote a Telegram admin to member |\n| `mercury telegram reset` | Clear all Telegram access and start fresh |\n| `mercury service install` | Install as system service (auto-start on boot) |\n| `mercury service uninstall` | Uninstall system service |\n| `mercury service status` | Show system service status |\n| `mercury --verbose` | Start with debug logging |\n\n## In-Chat Commands\n\nType these during a conversation — they don't consume API tokens. Work on both CLI and Telegram.\n\n| Command | Description |\n|---------|-------------|\n| `/help` | Show the full manual |\n| `/status` | Show agent config, budget, and usage |\n| `/tools` | List all loaded tools |\n| `/skills` | List installed skills |\n| `/stream` | Toggle Telegram text streaming |\n| `/stream off` | Disable streaming (single message) |\n| `/budget` | Show token budget status |\n| `/budget override` | Override budget for one request |\n| `/budget reset` | Reset usage to zero |\n| `/budget set <n>` | Change daily token budget |\n| `/permissions` | Change permission mode (Ask Me / Allow All) |\n| `/tasks` | List scheduled tasks |\n| `/memory` | View and manage second brain memory |\n| `/unpair` | Telegram: reset all access |\n\n## Built-in Tools\n\n| Category | Tools |\n|----------|-------|\n| **Filesystem** | `read_file`, `write_file`, `create_file`, `edit_file`, `list_dir`, `delete_file`, `send_file`, `approve_scope` |\n| **Shell** | `run_command`, `cd`, `approve_command` |\n| **Messaging** | `send_message` |\n| **Git** | `git_status`, `git_diff`, `git_log`, `git_add`, `git_commit`, `git_push` |\n| **Web** | `fetch_url` |\n| **Skills** | `install_skill`, `list_skills`, `use_skill` |\n| **Scheduler** | `schedule_task`, `list_scheduled_tasks`, `cancel_scheduled_task` |\n| **System** | `budget_status` |\n\n## Channels\n\n| Channel | Features |\n|---------|----------|\n| **CLI** | Readline prompt, arrow-key command menus, real-time text streaming with markdown re-rendering, permission mode picker |\n| **Telegram** | HTML formatting, editable streaming messages, file uploads, typing indicators, multi-user access with admin/member roles |\n\n### Telegram Access\n\nMercury uses an **organization access model** with admins and members.\n\n- **First-time setup:** Send `/start` to your bot, receive a pairing code, enter it in the CLI with `mercury telegram approve <code>`. You become the first admin.\n- **Additional users:** Send `/start` to request access. Admins approve or reject from the CLI.\n- **Roles:** Admins can approve/reject requests, promote/demote users, and reset access. Members can chat with Mercury.\n- **Reset:** Admins can send `/unpair` in Telegram or run `mercury telegram reset` in the CLI to clear all access and start fresh.\n- Private chats only — group messages are always ignored.\n\nCLI commands: `mercury telegram list|approve|reject|remove|promote|demote|reset`\n\n## Scheduler\n\n- **Recurring**: `schedule_task` with cron expressions (`0 9 * * *` for daily at 9am)\n- **One-shot**: `schedule_task` with `delay_seconds` (e.g. 15 seconds)\n- Tasks persist to `~/.mercury/schedules.yaml` and restore on restart\n- Responses route back to the channel where the task was created\n\n## Second Brain\n\nMercury builds a structured, persistent memory that grows with every conversation. Enabled by default, it automatically extracts, stores, and recalls facts about you.\n\n- **10 memory types** — identity, preference, goal, project, habit, decision, constraint, relationship, episode, reflection\n- **Automatic extraction** — after each conversation, Mercury pulls 0–3 facts with confidence, importance, and durability scores\n- **Relevant recall** — before each message, the top 5 matching memories (900-char budget) are injected into context\n- **Auto-consolidation** — every 60 min, Mercury builds a profile summary, active-state summary, and generates reflections from patterns\n- **Conflict resolution** — opposing memories are resolved by confidence (higher wins) or recency (newer wins)\n- **Auto-pruning** — active-scope memories stale after 21 days; inferred memories decay; low-confidence durable memories dismissed after 120 days\n- **User controls** — `/memory` for overview, search, pause, resume, and clear\n- **Disable** — `SECOND_BRAIN_ENABLED=false` env var or `memory.secondBrain.enabled: false` in config\n\nAll data stays on your machine in `~/.mercury/memory/second-brain/second-brain.db` (SQLite + FTS5). No cloud.\n\n## Configuration\n\nAll runtime data lives in `~/.mercury/` — not in your project directory.\n\n| Path | Purpose |\n|------|---------|\n| `~/.mercury/mercury.yaml` | Main config (providers, channels, budget) |\n| `~/.mercury/.env` | API keys and tokens (loaded alongside project .env) |\n| `~/.mercury/soul/*.md` | Agent personality (soul, persona, taste, heartbeat) |\n| `~/.mercury/permissions.yaml` | Capabilities and approval rules |\n| `~/.mercury/skills/` | Installed skills |\n| `~/.mercury/schedules.yaml` | Scheduled tasks |\n| `~/.mercury/token-usage.json` | Daily token usage tracking |\n| `~/.mercury/memory/short-term/` | Per-conversation JSON files |\n| `~/.mercury/memory/long-term/` | Auto-extracted facts (JSONL) |\n| `~/.mercury/memory/episodic/` | Timestamped event log (JSONL) |\n| `~/.mercury/memory/second-brain/` | Structured memory database (SQLite + FTS5) |\n| `~/.mercury/daemon.pid` | Background process PID |\n| `~/.mercury/daemon.log` | Daemon mode logs |\n\n## Provider Fallback\n\nConfigure multiple LLM providers. Mercury tries them in order and falls back automatically:\n\n| Provider | Default Model | API Key | Notes |\n|----------|--------------|---------|-------|\n| **DeepSeek** | deepseek-chat | `DEEPSEEK_API_KEY` | Default, cost-effective |\n| **OpenAI** | gpt-4o-mini | `OPENAI_API_KEY` | GPT-4o, o3, etc. |\n| **Anthropic** | claude-sonnet-4 | `ANTHROPIC_API_KEY` | Claude Sonnet, Haiku, Opus |\n| **Grok (xAI)** | grok-4 | `GROK_API_KEY` | OpenAI-compatible endpoint |\n| **Ollama Cloud** | gpt-oss:120b | `OLLAMA_CLOUD_API_KEY` | Remote Ollama via API |\n| **Ollama Local** | gpt-oss:20b | No key needed | Local Ollama instance |\n\nWhen a provider fails, Mercury automatically tries the next one. It remembers the last successful provider and starts there on the next request.\n\n> **More providers incoming** — Google Gemini, Mistral, and others are on the roadmap. Mercury's OpenAI-compatible architecture also supports custom endpoints via base URL configuration.\n\n## Architecture\n\n- **TypeScript + Node.js 18+** — ESM, tsup build\n- **Vercel AI SDK v4** — `generateText` + `streamText`, 10-step agentic loop, provider fallback\n- **grammY** — Telegram bot with typing indicators, editable streaming, and file uploads\n- **SQLite + FTS5** — Second brain with full-text search, conflict resolution, auto-consolidation\n- **JSONL** — Short-term, long-term, and episodic conversation memory\n- **Daemon manager** — Background spawn + PID file + watchdog crash recovery\n- **System services** — macOS LaunchAgent, Linux systemd, Windows Task Scheduler\n\n## License\n\nMIT © [Cosmic Stack](https://github.com/cosmicstack-labs)\n\n---\n\n## Disclaimer\n\n**This is AI - it can break sometimes, please use this at your own risk.**\n\n---\n\n## Contributing\n\nWe're open to contributions! Mercury is built to evolve, and we welcome help from the community. Whether it's fixing a bug, adding a tool, improving memory, or refining the soul — all quality contributions are appreciated.\n\n### 🎯 Agentic Expertise — Must-Have for Contributors\n\nMercury isn't just another open-source project — it's a **soul-driven agent** that runs 24/7, manages permissions, remembers context, and interacts across channels. If you're contributing, you must think like an agent builder, not just a library contributor. These are non-negotiable principles every contributor should internalize:\n\n| Principle | What It Means |\n|-----------|---------------|\n| 🧠 **Think in loops** | Mercury operates in a 10-step agentic loop. Your tool or feature will be called multiple times per conversation. Make it idempotent where possible. |\n| 🔐 **Permission-first** | Every action that touches the outside world (files, shell, network, git) must go through the permission system. Never assume approval. |\n| 💾 **Memory-aware** | If your feature generates facts about the user, consider hooking into the Second Brain. If it reads user data, check memory first. |\n| 📏 **Token-conscious** | Mercury has a daily token budget. Logging, verbose outputs, and large context dumps burn tokens fast. Keep it lean. |\n| 🔌 **Channel-agnostic** | Tools should work identically on CLI and Telegram. Don't assume a terminal, a keyboard, or even a human on the other end. |\n| 🔁 **Graceful degradation** | If a provider fails, a tool errors, or a file doesn't exist — Mercury should recover, not crash. Always handle edge cases. |\n| 📋 **Self-documenting** | Your tool's name and description are what Mercury reads to decide when to use it. Make them clear, specific, and action-oriented. |\n| 🧪 **Test the loop, not just the function** | A tool that works in isolation may fail in the agentic loop (e.g., returns too much data, blocks the next step). Test end-to-end. |\n\n### Code Quality — Dos\n\n| Do | Why |\n|----|-----|\n| ✅ Write clean, readable TypeScript with explicit types | Mercury's codebase is type-safe — keep it that way |\n| ✅ Add JSDoc comments on public functions and tools | Helps other contributors and the agent understand intent |\n| ✅ Keep functions small and single-purpose | Easier to test, review, and reason about |\n| ✅ Use async/await over raw promises | Consistent error handling and readability |\n| ✅ Write tests for new tools and memory features | Reliability matters for a 24/7 agent |\n| ✅ Follow the existing project structure (`src/tools/`, `src/memory/`, `src/channels/`) | Keeps the codebase navigable |\n| ✅ Use the Agent Skills spec for new skill-based features | Ensures compatibility with the skills ecosystem |\n| ✅ Document breaking changes in PR descriptions | Helps maintainers version properly |\n\n### Code Quality — Don'ts\n\n| Don't | Why |\n|-------|-----|\n| ❌ Don't add dependencies without discussion | Mercury is lean — every dep adds surface area |\n| ❌ Don't hardcode API keys, tokens, or paths | Use config/env vars like the rest of the codebase |\n| ❌ Don't bypass the permission system | Tools must ask before acting — that's Mercury's core promise |\n| ❌ Don't introduce sync/blocking I/O in hot paths | Mercury is async-first for a reason |\n| ❌ Don't commit large binary files or secrets | Use `.gitignore` and env files |\n| ❌ Don't change the soul/persona system without discussion | It's the heart of Mercury — changes need care |\n| ❌ Don't submit untested Telegram or daemon changes | These are hard to debug post-merge |\n| ❌ Don't ignore the token budget system | Every tool should be mindful of token consumption |\n\n### Getting Started\n\n1. Fork the repo\n2. Run `npm install`\n3. Make your changes\n4. Run `npm run build` to verify it compiles\n5. Test with `mercury` locally\n6. Open a PR with a clear description of what you changed and why\n\n### PR Guidelines\n\n- Keep PRs focused — one feature/fix per PR\n- Include before/after behavior in the description\n- Tag related issues if applicable\n- Be responsive to review feedback\n\n### Need Help?\n\nOpen an issue or reach out at [mercury@cosmicstack.org](mailto:mercury@cosmicstack.org). We're friendly.\n\n---\n\n## Community\n\n1. **Discord** — [Join the Mercury Agent Discord](https://discord.gg/5emMpMJy5J) for real-time chat, support, and community discussions.\n","summary":"Mercury‑Agent is a permission‑hardened, soul‑driven AI assistant that runs from a terminal or Telegram, asking for permission before executing commands or accessing files and keeping a structured, SQLite‑backed “second brain” of long‑term memories and preferences. It offers 31 built‑in tools, community‑extensible skills, and a token‑budget system that enforces daily usage limits, automatically curating responses when the budget is high. The agent can be deployed as a reboot‑resistant daemon on any OS, with crash‑recovery, heartbeat checks, and real‑time streaming of token usage and markdown outputs. Target users include developers, autonomous‑workflow engineers, and privacy‑conscious power users who need a safe, persistent AI companion to automate tasks while preserving control and context.","description":"Soul-driven AI agent with permission-hardened tools, token budgets, and multi-channel access. Runs 24/7 from CLI or Telegram.","stars":1959,"language":"TypeScript"},{"owner":"Einsia","repo":"OpenChronicle","url":"https://github.com/Einsia/OpenChronicle","readme":"<p align=\"center\">\n  <img src=\"assets/logo.png\" alt=\"OpenChronicle\" width=\"600\" />\n</p>\n\n<h1 align=\"center\">OpenChronicle</h1>\n\n<p align=\"center\">\n  Open-source, local-first memory for any tool-capable LLM agent.\n</p>\n\n<p align=\"center\">\n  Think OpenAI Chronicle - but open, model-agnostic, inspectable, and hackable.\n</p>\n\n---\n\n<p align=\"center\">\n  <a href=\"https://star-history.com/#Einsia/OpenChronicle&Date\">\n    <picture>\n      <source\n        media=\"(prefers-color-scheme: dark)\"\n        srcset=\"https://api.star-history.com/svg?repos=Einsia/OpenChronicle&type=Date&theme=dark\"\n      />\n      <source\n        media=\"(prefers-color-scheme: light)\"\n        srcset=\"https://api.star-history.com/svg?repos=Einsia/OpenChronicle&type=Date\"\n      />\n      <img\n        alt=\"Star History Chart\"\n        src=\"https://api.star-history.com/svg?repos=Einsia/OpenChronicle&type=Date\"\n      />\n    </picture>\n  </a>\n</p>\n\n> **Status:** v0.1.0 · macOS only · early alpha\n\nOpenChronicle gives AI agents a local, inspectable memory built from real screen and app context.\n\nIt runs on your Mac, captures structured context from what you're doing, and turns it into persistent Markdown memory: what you're working on, what you've decided, which tools you use, and which people or projects matter.\n\nAny agent that can call tools can use it. MCP clients work especially well today, but OpenChronicle is meant to be a general memory layer for tool-using agents - not something tied to one protocol, one model provider, or one app.\n\n---\n\n## Why OpenChronicle\n\nOpenAI Chronicle points to an important future: agents that remember your real working context.\n\nOpenChronicle is our open alternative:\n\n- **Local-first** - memory stays on your machine\n- **Model-agnostic** - use Ollama, LM Studio, OpenAI, Anthropic, or any LiteLLM-compatible provider\n- **Tool-friendly** - usable by any tool-capable agent\n- **Inspectable** - Markdown on disk, SQLite locally\n- **Open** - MIT-licensed and built to be extended\n\n---\n\n## Why AX-first\n\nOpenChronicle currently prioritizes **AX Tree / accessibility-tree context** as its primary signal, with screenshots as a secondary signal over time.\n\nWe think this is the right tradeoff for an early memory system:\n\n- **Lower cost** - structured text is far cheaper to process than screenshot-heavy OCR / vision pipelines\n- **Better intent capture** - AX is often better for active app, focused element, edited text, URL, and interaction state\n- **Smaller, cleaner memory** - easier to deduplicate, normalize, index, and retain long-term\n- **Better foundation** - screenshots can later enrich visual context where AX falls short\n\n> **AX-first for accurate, compact, low-cost memory; screenshot-assisted for richer multimodal context.**\n\n---\n\n## OpenChronicle vs OpenAI Chronicle\n\n|                     | OpenAI Chronicle                | **OpenChronicle**                              |\n| ------------------- | ------------------------------- | ---------------------------------------------- |\n| Source              | Closed                          | **MIT, open-source**                           |\n| Model choice        | OpenAI-centric                  | **Your choice**                                |\n| Who can use it      | Product-specific workflow       | **Any tool-capable agent**                     |\n| Primary capture     | Screenshot / OCR-heavy          | **AX Tree first**, screenshot-assisted         |\n| Storage             | Local generated memories        | **Markdown + SQLite on your machine**          |\n| Extensibility       | Limited                         | **Hackable parsers, memory logic, integrations** |\n\n---\n\n## How it works\n\n```mermaid\nflowchart LR\n    W[mac-ax-watcher<br/>events]\n    S0[\"<b>S0</b> dispatcher<br/>dedup · debounce<br/>min-gap\"]\n    S1[\"<b>S1</b> parser<br/>focused_element<br/>visible_text · url\"]\n    BUF[(capture-buffer<br/>/*.json)]\n    TL[\"Timeline<br/>normalizer<br/>1-min · verbatim\"]\n    TB[(timeline_blocks)]\n    SM[\"Session mgr<br/>idle 5m · app-switch 3m<br/>max 2h\"]\n    S2[\"<b>S2</b> reducer\"]\n    ED[(event-<br/>YYYY-MM-DD.md)]\n    CLF[\"Classifier<br/>→ user- / project- / tool- /<br/>topic- / person- / org-*.md\"]\n    STORE[(\"SQLite FTS5<br/>+ Markdown\")]\n\n    W --> S0 --> S1 --> BUF --> TL --> TB --> S2 --> ED --> CLF --> STORE\n    ED --> STORE\n    BUF -. pre_capture_hook<br/>(post-write · skipped on content-dedup) .-> SM\n    SM -. flush 5m / on_end .-> S2\n    TB -. grounding .-> CLF\n```\n\nThe core idea is simple:\n\n1. capture context\n2. compress it into sessions\n3. extract durable facts\n4. store memory locally\n5. let agents query it through tools\n\n---\n\n## What you get\n\n* **Event-driven capture** from macOS AX events\n* **Session-aware memory writing** instead of noisy per-snapshot logs\n* **Human-readable Markdown memory**\n* **Local SQLite indexing**\n* **Structured memory files** like user-, project-, tool-, topic-, person-, org-, and daily event-\n* **Supersede-not-delete history**\n* **Local or cloud model support**\n* **Always-on agent-readable interface**, with MCP as the best-supported path today\n\n---\n\n## Install\n\nRequires **macOS 13+** and **Xcode Command Line Tools** (`xcode-select --install`).\n\n```bash\ngit clone https://github.com/Einsia/OpenChronicle.git\ncd openchronicle\nbash install.sh\n```\n\n---\n\n## Run\n\n```bash\nopenchronicle start\nopenchronicle start --foreground\nopenchronicle status\nopenchronicle pause\nopenchronicle resume\nopenchronicle stop\n```\n\nUseful inspection commands:\n\n```bash\nopenchronicle capture-once\nopenchronicle timeline tick\nopenchronicle timeline list\nopenchronicle writer run\nopenchronicle rebuild-index\n```\n\n---\n\n## Connect an agent\n\nOpenChronicle is designed for **tool-calling agents**.\n\n### Best-supported path today: MCP\n\nThe daemon hosts an MCP endpoint at:\n\n```bash\nhttp://127.0.0.1:8742/mcp\n```\n\nSupported integration paths include:\n\n* Claude Code\n* Claude Desktop\n* Codex\n* opencode\n* custom local agents\n* and more...\n\nSee [docs/mcp.md](docs/mcp.md) for setup details.\n\n---\n\n## Contributing\n\nWe especially want help in three areas:\n\n### 1. Better context parsers\n\nApp-specific parsing and normalization for browsers, terminals, editors, Slack, Notion, Cursor, Linear, Figma, and more.\n\n### 2. Better memory management\n\nSession reduction, durable-fact extraction, compaction, supersede / merge logic, and retrieval quality.\n\n### 3. More agent integrations\n\nSupport for more MCP clients, IDE agents, coding assistants, desktop agents, and local orchestration frameworks.\n\nIf you care about local-first agents, personal AI memory, or open context infrastructure, this project is for you.\n\n---\n\nDocumentation\n\n* [docs/architecture.md](docs/architecture.md) - end-to-end pipeline and code layout\n* [docs/config.md](docs/config.md) - configuration and model setup\n* [docs/capture.md](docs/capture.md) - event-driven capture and AX details\n* [docs/timeline.md](docs/timeline.md) - normalization and anti-hallucination design\n* [docs/session.md](docs/session.md) - session cutting rules\n* [docs/writer.md](docs/writer.md) - reducer, classifier, and retry model\n* [docs/mcp.md](docs/mcp.md) - current tool surface and integrations\n* [docs/memory-format.md](docs/memory-format.md) - file layout and supersede semantics\n* [docs/troubleshooting.md](docs/troubleshooting.md) - common issues\n\n---\n\n## Development\n\n```bash\nuv sync --all-extras\nuv run pytest\nuv run ruff check\n```\n\n---\n\n## License\n\nMIT.\n## Contributors ✨\n\nThanks goes to these wonderful people ([emoji key](https://allcontributors.org/docs/en/emoji-key)):\n\n<!-- ALL-CONTRIBUTORS-LIST:START - Do not remove or modify this section -->\n<!-- prettier-ignore-start -->\n<!-- markdownlint-disable -->\n<table>\n  <tbody>\n    <tr>\n      <td align=\"center\" valign=\"top\" width=\"14.28%\"><a href=\"https://github.com/KMing-L\"><img src=\"https://avatars.githubusercontent.com/u/78015987?v=4?s=100\" width=\"100px;\" alt=\"Qianli Ren\"/><br /><sub><b>Qianli Ren</b></sub></a><br /><a href=\"https://github.com/Einsia/OpenChronicle/commits?author=KMing-L\" title=\"Code\">💻</a> <a href=\"#maintenance-KMing-L\" title=\"Maintenance\">🚧</a></td>\n      <td align=\"center\" valign=\"top\" width=\"14.28%\"><a href=\"https://github.com/abmfy\"><img src=\"https://avatars.githubusercontent.com/u/20623941?v=4?s=100\" width=\"100px;\" alt=\"Bowen Wang\"/><br /><sub><b>Bowen Wang</b></sub></a><br /><a href=\"https://github.com/Einsia/OpenChronicle/commits?author=abmfy\" title=\"Code\">💻</a> <a href=\"#maintenance-abmfy\" title=\"Maintenance\">🚧</a></td>\n      <td align=\"center\" valign=\"top\" width=\"14.28%\"><a href=\"https://github.com/calvin1376\"><img src=\"https://avatars.githubusercontent.com/u/190755633?v=4?s=100\" width=\"100px;\" alt=\"CrazyCalvin\"/><br /><sub><b>CrazyCalvin</b></sub></a><br /><a href=\"https://github.com/Einsia/OpenChronicle/commits?author=calvin1376\" title=\"Code\">💻</a></td>\n      <td align=\"center\" valign=\"top\" width=\"14.28%\"><a href=\"https://github.com/Azure-stars\"><img src=\"https://avatars.githubusercontent.com/u/101097177?v=4?s=100\" width=\"100px;\" alt=\"Firefly\"/><br /><sub><b>Firefly</b></sub></a><br /><a href=\"https://github.com/Einsia/OpenChronicle/commits?author=Azure-stars\" title=\"Code\">💻</a></td>\n      <td align=\"center\" valign=\"top\" width=\"14.28%\"><a href=\"https://github.com/Xiao-ao-jiang-hu\"><img src=\"https://avatars.githubusercontent.com/u/57095350?v=4?s=100\" width=\"100px;\" alt=\"校奥浆糊\"/><br /><sub><b>校奥浆糊</b></sub></a><br /><a href=\"https://github.com/Einsia/OpenChronicle/commits?author=Xiao-ao-jiang-hu\" title=\"Code\">💻</a> <a href=\"#maintenance-Xiao-ao-jiang-hu\" title=\"Maintenance\">🚧</a></td>\n      <td align=\"center\" valign=\"top\" width=\"14.28%\"><a href=\"https://ashitemaru.github.io/\"><img src=\"https://avatars.githubusercontent.com/u/58683876?v=4?s=100\" width=\"100px;\" alt=\"Houde Qian\"/><br /><sub><b>Houde Qian</b></sub></a><br /><a href=\"https://github.com/Einsia/OpenChronicle/commits?author=Ashitemaru\" title=\"Code\">💻</a></td>\n      <td align=\"center\" valign=\"top\" width=\"14.28%\"><a href=\"https://github.com/GiddensF97\"><img src=\"https://avatars.githubusercontent.com/u/253278919?v=4?s=100\" width=\"100px;\" alt=\"GiddensF97\"/><br /><sub><b>GiddensF97</b></sub></a><br /><a href=\"#design-GiddensF97\" title=\"Design\">🎨</a></td>\n    </tr>\n    <tr>\n      <td align=\"center\" valign=\"top\" width=\"14.28%\"><a href=\"https://github.com/SiyiZhu1\"><img src=\"https://avatars.githubusercontent.com/u/132850441?v=4?s=100\" width=\"100px;\" alt=\"SiyiZhu1\"/><br /><sub><b>SiyiZhu1</b></sub></a><br /><a href=\"#design-SiyiZhu1\" title=\"Design\">🎨</a></td>\n    </tr>\n  </tbody>\n</table>\n\n<!-- markdownlint-restore -->\n<!-- prettier-ignore-end -->\n\n<!-- ALL-CONTRIBUTORS-LIST:END -->\n\nThis project follows the [all-contributors](https://github.com/all-contributors/all-contributors) specification. Contributions of any kind welcome!\n","summary":"OpenChronicle is an open‑source, local‑first memory layer that captures structured context from a Mac’s accessibility tree and screenshots, turning it into persistent Markdown and SQLite files that any tool‑capable LLM agent can consume. It is model‑agnostic, supporting providers such as Ollama, LM Studio, OpenAI, Anthropic, or any LiteLLM‑compatible backend, and it can be inspected or extended through its MIT‑licensed code base. Key capabilities include AX‑tree‑first parsing for low‑cost, intent‑rich memory, screenshot‑assisted multimodal enrichment, debounced event handling, and a timeline normalizer that deduplicates and timestamps user activity. The project benefits developers and researchers building or integrating AI agents who need an inspectable, extendable memory component that stays on their own machine.","description":null,"stars":2086,"language":"Python"},{"owner":"vthinkxie","repo":"claude-desktop-buddy-esp32-s3-touch-amoled-1.8","url":"https://github.com/vthinkxie/claude-desktop-buddy-esp32-s3-touch-amoled-1.8","readme":"# claude-desktop-buddy — ESP32 AMOLED port\n\n<img src=\"image.jpg\" width=\"400\" />\n\nClaude for macOS and Windows can connect Claude Cowork and Claude Code to\nmaker devices over BLE, so developers and makers can build hardware that\ndisplays permission prompts, recent messages, and other interactions.\n\nThis is a port of [anthropics/claude-desktop-buddy](https://github.com/anthropics/claude-desktop-buddy)\n(originally targeting M5StickC Plus) to four Waveshare ESP32 AMOLED\nboards. The BLE wire protocol is unchanged — same pairing, same desktop\napps, just a larger screen.\n\n> **Building your own device?** You don't need any of the code here. See\n> **[REFERENCE.md](REFERENCE.md)** for the wire protocol: Nordic UART\n> Service UUIDs, JSON schemas, and the folder push transport.\n\n## Supported boards\n\nAll four run the **same main.cpp / UI** — board-specific wiring, drivers and\ncanvas→panel scaling are isolated in `src/hw/` + one header per board\nunder `src/boards/`.\n\n| | [ESP32-S3-Touch-AMOLED-1.8](https://www.waveshare.com/wiki/ESP32-S3-Touch-AMOLED-1.8) | [ESP32-S3-Touch-AMOLED-1.75C](https://www.waveshare.com/wiki/ESP32-S3-Touch-AMOLED-1.75C) | [ESP32-C6-Touch-AMOLED-2.16](https://www.waveshare.com/wiki/ESP32-C6-Touch-AMOLED-2.16) | [ESP32-S3-Touch-AMOLED-2.16](https://www.waveshare.com/wiki/ESP32-S3-Touch-AMOLED-2.16) |\n| --- | --- | --- | --- | --- |\n| MCU | ESP32-S3R8 (8 MB OPI PSRAM, 8 MB flash) | same | ESP32-C6FH8 (160 MHz RISC-V single-core, 8 MB flash, **no PSRAM**) | ESP32-S3R8 (8 MB OPI PSRAM, 8 MB flash) |\n| Panel | 1.8\" **rectangular** 368×448 AMOLED | 1.75\" **round** 466×466 AMOLED | 2.16\" **rounded-square** 480×480 AMOLED | 2.16\" **rounded-square** 480×480 AMOLED (**rotated 90°**) |\n| Display driver | SH8601 (QSPI) | CO5300 (QSPI) | SH8601 (QSPI) | CO5300 (QSPI) |\n| Touch | FT3168 @ 0x38 | CST92xx @ 0x5A | CST9217 @ 0x5A | CST9217 @ 0x5A |\n| GPIO expander | TCA9554 (LCD/TP resets routed through it) | none — resets are direct GPIOs | none — resets are direct GPIOs | none — resets are direct GPIOs |\n| RTC | PCF85063 (I²C) | none — software clock synced from desktop | PCF85063 (I²C) | PCF85063 (I²C) |\n| IMU | QMI8658 | same | same | same |\n| PMU | AXP2101 | same | same | same |\n| Audio | ES8311 + amp + speaker | same | ES8311 + ES7210 (output + mic codec) | same |\n| Buttons | Key1 (GPIO0 BOOT) + AXP PEK | same (physical layout swapped; corrected in firmware) | three: PWR/IO10/BOOT; PWR is active-HIGH via MOSFET inverter + AXP PWRON | three: PWR/IO18/BOOT; PWR is active-HIGH via BSS138 inverter |\n| Canvas → panel | 184×224 canvas → **2× nearest-neighbor** → 368×448 | 184×224 canvas → **1.5× bilinear** → 276×336 centred in 466×466 (black border) | 184×224 canvas → **2× nearest-neighbor** → 368×448 centred at (56, 16) in 480×480 (56 px L/R / 16 px T/B black border) | 184×224 canvas → **2× nearest-neighbor** → 368×448 centred at (56, 16) in 480×480 (56 px L/R / 16 px T/B black border) |\n\nInternal canvas is **184×224** on all four. The 1.75C rounds the content\ninside its circular bezel; keeping the logical canvas identical means\nUI code, fonts and all buddy rendering are completely board-agnostic.\n\nThe firmware targets ESP32-S3 and ESP32-C6 with Arduino framework 3.x via the\n[pioarduino](https://github.com/pioarduino/platform-espressif32) platform.\n\n## Flashing\n\nInstall\n[PlatformIO Core](https://docs.platformio.org/en/latest/core/installation/),\nthen pick the env that matches your board:\n\n```bash\n# 1.8\" rectangular AMOLED (ESP32-S3)\npio run -e waveshare-esp32s3-touch-amoled-1-8 -t upload\n\n# 1.75C round AMOLED (ESP32-S3)\npio run -e waveshare-esp32s3-touch-amoled-1-75c -t upload\n\n# 2.16\" rounded-square AMOLED (ESP32-C6)\npio run -e waveshare-esp32c6-touch-amoled-2-16 -t upload\n\n# 2.16\" rounded-square AMOLED (ESP32-S3)\npio run -e waveshare-esp32s3-touch-amoled-2-16 -t upload\n```\n\nIf you're starting from a previously-flashed device (e.g. the factory\nXiaozhi firmware), wipe it first:\n\n```bash\npio run -e <env> -t erase && pio run -e <env> -t upload\n```\n\nLittleFS auto-formats on first boot if the partition isn't recognised.\n\n### Adding another board\n\n1. Add a new header at `src/boards/board_<name>.h` declaring all\n   `PIN_*`, `BOARD_HW_W/H`, `BOARD_SAFE_INSET`, and capability flags —\n   the existing headers cover ~16 flags between them\n   (`BOARD_HAS_PSRAM`, `BOARD_HAS_TCA9554`, `BOARD_HAS_PCF85063`,\n   `BOARD_HAS_AXP2101`, `BOARD_HAS_PA_CTRL`, `BOARD_HAS_KEY2`,\n   `BOARD_DISPLAY_CO5300`, `BOARD_DISPLAY_LETTERBOX`,\n   `BOARD_DISPLAY_OFFSET_X/Y`, `BOARD_DISPLAY_SCALE`,\n   `BOARD_DISPLAY_PUSH_STREAMED`, `BOARD_DISPLAY_SH8601_VENDOR_INIT`,\n   `BOARD_CO5300_COL_OFFSET`, `BOARD_CO5300_MADCTL`,\n   `BOARD_LCD_RST_VIA_PMU`, `BOARD_AXP_PWRON_4S_OFF`,\n   `BOARD_AXP_ENABLE_AUX_LDOS`, `BOARD_KEY1_ACTIVE_HIGH`,\n   `BOARD_BTN_THIRD`, `BOARD_BTN_SWAP_AB`, `BOARD_TOUCH_CST92XX`).\n   Pick the values that match your board.\n2. Add a `#elif defined(BOARD_<NAME>)` branch in `src/hw/pins.h`.\n3. Add a matching `[env:<name>]` block in `platformio.ini` with the\n   `-DBOARD_<NAME>` build flag.\n\n`main.cpp` and `buddies/` stay untouched.\n\nOnce running you can also wipe everything from the device itself:\n**hold the A button (Key1 on 1.8/1.75C, PWR on the 2.16 boards) →\nsettings → reset → factory reset → tap twice**.\n\n## Pairing\n\nTo pair your device with Claude, first enable developer mode (**Help →\nTroubleshooting → Enable Developer Mode**). Then open the Hardware Buddy\nwindow in **Developer → Open Hardware Buddy…**, click **Connect**, and pick\nyour device from the list (advertised as `Claude-XXXX`). macOS will prompt\nfor Bluetooth permission on first connect; grant it.\n\nThe device shows a 6-digit passkey on screen — type it on the desktop to\ncomplete LE Secure Connections bonding. Once paired, the bridge\nauto-reconnects whenever both sides are awake.\n\n## Controls\n\n### ESP32-S3 boards (1.8 & 1.75C)\n\nThe board has two physical keys. **Key1** is the BOOT button (acts as\n\"A\" in the table). **Key3** is the AXP power key — short-press is \"B\",\nlong-press toggles screen off, very-long-press hardware-shuts-down.\n\n|                          | Normal               | Pet         | Info        | Approval    |\n| ------------------------ | -------------------- | ----------- | ----------- | ----------- |\n| **Key1** (BOOT)          | next screen          | next screen | next screen | **approve** |\n| **Key3** (PWR, short)    | scroll transcript    | next page   | next page   | **deny**    |\n| **Hold Key1**            | menu                 | menu        | menu        |
