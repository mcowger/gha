<script id="project-data" type="application/json">[{"owner":"magic-quill","repo":"MagicQuill","url":"https://github.com/magic-quill/MagicQuill","readme":"# 🪶 MagicQuill: An Intelligent Interactive Image Editing System (*CVPR 2025*)\n<a href=\"https://magicquill.art/demo/\"><img src=\"https://img.shields.io/static/v1?label=Project&message=magicquill.art&color=blue\"></a>\n<a href=\"https://arxiv.org/abs/2411.09703\"><img src=\"https://img.shields.io/badge/arXiv-2411.09703-b31b1b.svg\"></a>\n<a href=\"https://huggingface.co/spaces/AI4Editing/MagicQuill\"><img src=\"https://img.shields.io/badge/%F0%9F%A4%97%20Hugging%20Face-Spaces-blue)\"></a>\n<a href=\"https://creativecommons.org/licenses/by-sa/4.0/\"><img src=\"https://img.shields.io/badge/License-CC%20BY--SA%204.0-lightgrey.svg\"></a>\n<a href=\"https://magicquill.art/v2/\"><img src=\"https://img.shields.io/static/v1?label=Project&message=MagicQuillV2&color=red\"></a>\n\nhttps://github.com/user-attachments/assets/8ee9663a-fef2-484a-a0b7-8427ab590424\n\nThere is an HD video on [Youtube](https://www.youtube.com/watch?v=5DiKfONMnE4).\n\n[Zichen Liu](https://zliucz.github.io)<sup>\\*,1,2</sup>, [Yue Yu](https://bruceyyu.github.io/)<sup>\\*,1,2</sup>, [Hao Ouyang](https://ken-ouyang.github.io/)<sup>2</sup>, [Qiuyu Wang](https://github.com/qiuyu96)<sup>2</sup>, [Ka Leong Cheng](https://felixcheng97.github.io/)<sup>1,2</sup>, [Wen Wang](https://github.com/encounter1997)<sup>3,2</sup>, [Zhiheng Liu](https://johanan528.github.io/)<sup>4</sup>, [Qifeng Chen](https://cqf.io/)<sup>†,1</sup>, [Yujun Shen](https://shenyujun.github.io/)<sup>†,2</sup><br>\n<sup>1</sup>HKUST <sup>2</sup>Ant Group <sup>3</sup>ZJU <sup>4</sup>HKU <sup>\\*</sup>equal contribution <sup>†</sup>corresponding author\n\n> TLDR: MagicQuill is an intelligent and interactive system achieving precise image editing.\n>\n> Key Features: 😎 User-friendly interface / 🤖 AI-powered suggestions / 🎨 Precise local editing\n\n- [🪶 MagicQuill: An Intelligent Interactive Image Editing System](#-magicquill-an-intelligent-interactive-image-editing-system)\n  - [TODO List](#todo-list)\n  - [Update Log](#update-log)\n  - [Hardware Requirements](#hardware-requirements)\n  - [Docker Container](#docker-container)\n  - [Setup](#setup)\n  - [Tutorial](#tutorial)\n  - [Citation](#citation)\n  - [Acknowledgement](#acknowledgement)\n  - [Note](#note)\n\n## [MagicQuillV2](https://magicquill.art/v2/) has been released!!! Check it out ;)\n\n## TODO List\n\n- [x] Release the paper and demo page. Visit [magicquill.art](https://magicquill.art) 🪩\n- [x] Release the code and checkpoints.\n- [x] Release gradio demo.\n- [x] Release ComfyUI MagicQuill custom node.\n\n<img src=\"docs/comfyui.png\" width=\"100%\" >\n\n## Update Log\n\n- [2024.11.21] 📢 Update the save button; Fix path bug on Windows; Add `.bat` and `.sh` files for convenient environment install on Windows and Linux. Thanks [lior007](https://github.com/lior007) and [JamesIV4](https://github.com/JamesIV4).\n- [2024.11.25] 📢 New UI Updates: Drag & Drop Images + Download Button: We've enhanced our interface with two exciting features! Now you can easily upload images with drag & drop functionality, and quickly save your work using our new download button. Try it out and let us know what you think!\n- [2024.12.06] 📢 New Feature Updates: Auto-save and Resolution Adjustment are now enabled in the parameter settings. Thanks [Furkan Gözükara](https://github.com/FurkanGozukara) for his brilliant suggestions.\n- [2024.12.07] 🎉 Exciting News: ComfyUI MagicQuill Node has been released! Check the repository https://github.com/magic-quill/ComfyUI_MagicQuill for more details.\n- [2024.12.16] 🎉 Exciting News: MagicQuill is also available at [Modelscope](https://modelscope.cn/studios/ant-research/MagicQuill_demo). Thanks for their amazing support and infrastructure.\n- [2025.01.02] 🎉 Exciting News: MagicQuill docker container is now available. You can now build & run your own image in a cleaner, isolated environment. Thanks [gbudge](https://github.com/gbudge) for his contribution.\n- [2025.02.27] 🎉 Exciting News: MagicQuill has been accepted to CVPR 2025! Looking forward to meeting everyone in Tennessee!\n- [2025.12.03] 🎉 Exciting News: [MagicQuillV2](https://magicquill.art/v2/) has been released! Check it out ;), give us a [star](https://github.com/zliucz/MagicQuillV2) if you are interested.\n\nTo update the latest features, pull the latest code and re-install the gradio_magicquill:\n```\npip uninstall -y gradio_magicquill-0.0.1-py3-none-any.whl\npip install gradio_magicquill-0.0.1-py3-none-any.whl\n```\n\n## Hardware Requirements\n\n- GPU is required to run MagicQuill. **Through our testing, we have confirmed that the model can run on GPUs with 8GB VRAM (RTX4070 Laptop).**\n\nFor users with limited GPU resources, please try our [Huggingface Demo](https://huggingface.co/spaces/AI4Editing/MagicQuill) and [Modelscope Demo](https://modelscope.cn/studios/ant-research/MagicQuill_demo). Also, consider disabling the DrawNGuess automatic prompt filling by clicking the wand icon above if it takes too long time on your machine.\n\n##  Setup\nFollow the following guide to set up the environment.\n\n1. git clone repo. **Please don't forget the `--recursive` flag.** Otherwise, you will find `LLaVA` submodule missing.\n    ```\n    git clone --recursive https://github.com/magic-quill/MagicQuill.git\n    cd MagicQuill\n    ```\n2. download and unzip checkpoints\n    ```\n    wget -O models.zip \"https://hkustconnect-my.sharepoint.com/:u:/g/personal/zliucz_connect_ust_hk/EWlGF0WfawJIrJ1Hn85_-3gB0MtwImAnYeWXuleVQcukMg?e=Gcjugg&download=1\"\n    unzip models.zip\n    ```\n    If the .zip file is not accessible, download it via browser. All checkpoints are about 25 GB in total. It may take some time to download. Alternatively, check our checkpoints at [huggingface](https://huggingface.co/LiuZichen/MagicQuill-models).\n\n---\n\nIf you are a Windows user, you may try to use `windows_setup.bat` to conveniently install environments, just enter `windows_setup.bat` in your Python shell. For Linux user, check `linux_setup.sh`.\n\nAlternatively, follow the step-by-step installation guide.\n\n3. create environment\n    ```\n    conda create -n MagicQuill python=3.10 -y\n    conda activate MagicQuill\n    ```\n\n4. install torch with GPU support\n    ```\n    pip install torch==2.1.2 torchvision==0.16.2 torchaudio==2.1.2 --index-url https://download.pytorch.org/whl/cu118\n    ```\n\n5. install the interface\n    ```\n    pip install gradio_magicquill-0.0.1-py3-none-any.whl\n    ```\n    \n6. install llava environment\n    ```\n    (For Linux)\n    cp -f pyproject.toml MagicQuill/LLaVA/\n    pip install -e MagicQuill/LLaVA/\n    ```\n    or\n    ```\n    (For Windows)\n    copy /Y pyproject.toml MagicQuill\\LLaVA\\\n    pip install -e MagicQuill\\LLaVA\\\n    ```\n    (For Windows PowerShell, the first line should be `Copy-Item -Path pyproject.toml -Destination \"MagicQuill\\LLaVA\" -Force`)\n    \n\n7. install the remaining environment\n    ```\n    pip install -r requirements.txt\n    ```\n\n8. run magicquill\n    ```\n    python gradio_run.py\n    ```\n    If you are mainland user, you may try `export HF_ENDPOINT=https://hf-mirror.com` to use huggingface mirror to facilitate the download of some necessary checkpoints to run our system.\n\n\n## Docker Container\n\nYou can build a docker container with MagicQuill as follows:\n\n1. git clone repo. **Please don't forget the `--recursive` flag.** Otherwise, you will find `LLaVA` submodule missing.\n    ```\n    git clone --recursive https://github.com/magic-quill/MagicQuill.git\n    cd MagicQuill\n    ```\n\n2. download and unzip checkpoints\n    ```\n    wget -O models.zip \"https://hkustconnect-my.sharepoint.com/:u:/g/personal/zliucz_connect_ust_hk/EWlGF0WfawJIrJ1Hn85_-3gB0MtwImAnYeWXuleVQcukMg?e=Gcjugg&download=1\"\n    unzip models.zip\n    ```\n    If the .zip file is not accessible, download it via browser. All checkpoints are about 25 GB in total. It may take some time to download. Alternatively, check our checkpoints at [huggingface](https://huggingface.co/LiuZichen/MagicQuill-models).\n    \n    Note: these can be located anywhere on the host computer, but Docker Compose expects them to be in `/data/magicquill/models` by default. Update `docker-compose.yaml` if you unzip them to another location.\n\n3. build the image\n   ```\n   docker compose build\n   ```\n\n4. run the image\n   ```\n   docker compose up -d\n   ```\n\n## Tutorial\n\nPlease read before you try!\n\n<!DOCTYPE html>\n<html>\n<body>\n<div class=\"tutorial\"><div><h3 align=\"center\" class=\"heading\">I. Three type of magic quills</h3><div align=\"center\"><img fill=\"white\" src=\"docs/icons/brush_edge_add.svg\" alt=\"SVG image\" class=\"icon\" width=\"100\"></div><div align=\"center\"><br>Use the <b>add brush</b> to add details and elements guided by prompts - express your ideas with your own lively strokes!<br></div><div class=\"ant-row css-1kuana8\"><div class=\"ant-col ant-col-xs-24 ant-col-md-12 css-1kuana8\"><div align=\"center\"><br><img width=\"300\" src=\"docs/gifs/deer.gif\" alt=\"gif description\" class=\"gif\"></div><div align=\"center\"><small>\"With just a few strokes, a vivid little deer comes to life\"</small><br></div></div><div class=\"ant-col ant-col-xs-24 ant-col-md-12 css-1kuana8\"><div align=\"center\"><br><img width=\"300\" src=\"docs/gifs/necklace.gif\" alt=\"gif description\" class=\"gif\"></div><div align=\"center\"><small> \"Adorn the beautiful lady with a necklace\"</small><br></div></div></div><div align=\"center\"><br><img src=\"docs/icons/brush_edge_remove.svg\" alt=\"SVG image\" class=\"icon\" width=\"100\"></div><div align=\"center\"><br>The <b>subtract brush</b> can remove excess details or redraw areas based on prompts. If there's anything you're not satisfied with, just subtract it away!<br></div><div class=\"ant-row css-1kuana8\"><div class=\"ant-col ant-col-xs-24 ant-col-md-12 css-1kuana8\"><div align=\"center\"><br><img width=\"300\" src=\"docs/gifs/dolphin.gif\" alt=\"gif description\" class=\"gif\"></div><div align=\"center\"><small> \"A dolphin with two tail fins? Let's give it a quick 'treatment'!\"</small><br></div></div><div class=\"ant-col ant-col-xs-24 ant-col-md-12 css-1kuana8\"><div align=\"center\"><br><img width=\"300\" src=\"docs/gifs/skeleton cowboy.gif\" alt=\"gif description\" class=\"gif\"></div><div align=\"center\"><small> \"Let's take off Mr. Skeleton's hat and help him cool down.\"</small><br><br></div></div></div><div align=\"center\" style=\"display: flex; justify-content: center; align-items: center; gap: 10px;\"><br><img src=\"docs/icons/brush_edge_add.svg\" alt=\"add brush\" class=\"icon\" width=\"100\"><span>&amp;</span><img src=\"docs/icons/brush_edge_remove.svg\" alt=\"minus brush\" class=\"icon\" width=\"100\"></div><div align=\"center\"><br>Combine the <b>add and subtract brushes</b> to create amazing combo effects!<br></div><div class=\"ant-row css-1kuana8\"><div class=\"ant-col ant-col-xs-24 ant-col-md-12 css-1kuana8\"><div align=\"center\"><br><img width=\"300\" src=\"docs/gifs/mona lisa cat.gif\" alt=\"gif description\" class=\"gif\"></div><div align=\"center\"><small> \"Let's give Mona Lisa a pet cat~\"</small><br></div></div><div class=\"ant-col ant-col-xs-24 ant-col-md-12 css-1kuana8\"><div align=\"center\"><br><img width=\"300\" src=\"docs/gifs/handsome bowtie.gif\" alt=\"gif description\" class=\"gif\"></div><div align=\"center\"><small> \"Let's give this handsome fellow a new tie!\"</small><br><br></div></div></div><div align=\"center\"><img src=\"docs/icons/brush.svg\" alt=\"SVG image\" class=\"icon\" width=\"100\"></div><div align=\"center\"><br>The <b>color brush</b> can precisely color the image, matching the color of your brush~<br></div><div class=\"ant-row css-1kuana8\"><div class=\"ant-col ant-col-xs-24 ant-col-md-12 css-1kuana8\"><div align=\"center\"><br><img width=\"300\" src=\"docs/gifs/beautiful hair.gif\" alt=\"gif description\" class=\"gif\"></div><div align=\"center\"><small>\"Precise color highlighting - paint exactly where you want to color\"</small><br></div></div><div class=\"ant-col ant-col-xs-24 ant-col-md-12 css-1kuana8\"><div align=\"center\"><br><img width=\"300\" src=\"docs/gifs/cake flowers.gif\" alt=\"gif description\" class=\"gif\"></div><div align=\"center\"><small> \"Don't you think the blue flowers look more dreamy than the pink ones?\"</small><br><br></div></div></div><div align=\"center\">*Please note the color brush and add&amp;subtract brush are mutually exclusive - you can only use one at a time!<br><br></div><hr><h3 align=\"center\" class=\"heading\">II. Draw and Guess</h3><div align=\"center\"><img src=\"docs/icons/wand.svg\" alt=\"SVG image\" class=\"icon\" width=\"100\"></div><div align=\"center\">Our brush is super smart! Look at the examples above - as soon as you finish drawing, it quickly guesses what you want to create and fills in the prompts for you~ Sometimes it might guess wrong though, so feel free to tell it what you actually want to draw~<br></div><div class=\"ant-row ant-row-center css-1kuana8\"><div class=\"ant-col ant-col-xs-24 ant-col-md-12 css-1kuana8\"><div align=\"center\"><br><img width=\"300\" src=\"docs/gifs/path.gif\" alt=\"gif description\" class=\"gif\"></div><div align=\"center\"><small> \"Oops! I don't want to draw a vine, I want to create a path!\"</small><br><br></div></div></div><hr><h3 align=\"center\" class=\"heading\">III. Super useful canvas tools!</h3><div align=\"center\"><br><img src=\"docs/icons/upload.svg\" alt=\"SVG image\" class=\"icon\" width=\"100\"></div><div align=\"center\">Click this button to upload the photo you want to edit~<br></div><div align=\"center\"><br><img src=\"docs/icons/eraser.svg\" alt=\"SVG image\" class=\"icon\" width=\"100\"></div><div align=\"center\">Made a mistake with the brush? Just erase it with the rubber tool!<br></div><div align=\"center\"><br><img src=\"docs/icons/cursor.svg\" alt=\"SVG image\" class=\"icon\" width=\"100\"></div><div align=\"center\">Drag, rotate, and resize your strokes with the cursor - just like when you're working in PowerPoint!<br></div><br><div align=\"center\" style=\"display: flex; justify-content: center; align-items: center; gap: 10px;\"><img src=\"docs/icons/undo.svg\" alt=\"add brush\" class=\"icon\" width=\"100\"><span>&amp;</span><img src=\"docs/icons/redo.svg\" alt=\"minus brush\" class=\"icon\" width=\"100\"></div><div align=\"center\">Left is ctrl+z, right is ctrl+y - you know what that means! 😊<br>And for Mac users, left is command+z, right is command+shift+z! 😝<br></div><div align=\"center\"><br><img src=\"docs/icons/delete.svg\" alt=\"SVG image\" class=\"icon\" width=\"100\"></div><div align=\"center\">Oops! That doesn't look right 😵 - click this trash bin to delete the stroke<br></div><div align=\"center\"><br><img src=\"docs/icons/eye.svg\" alt=\"SVG image\" class=\"icon\" width=\"100\"></div><div align=\"center\">The brush strokes are in my way, how can I see the image😡?! Try clicking this button to temporarily hide your strokes<br></div><br><div align=\"center\" style=\"display: flex; justify-content: center; align-items: center; gap: 10px;\"><img src=\"docs/icons/accept.svg\" alt=\"add brush\" class=\"icon\" width=\"100\"><span>&amp;</span><img src=\"docs/icons/discard.svg\" alt=\"minus brush\" class=\"icon\" width=\"100\"></div><div align=\"center\">These two icons will appear after the image is generated...<br>I love this generated image 😍, I want to keep editing! ➡️ Click ✅ to continue editing<br>What is this thing 😡, I don't want to see it! ➡️ Click ❎ to discard the result<br><br></div><hr><h3 align=\"center\" class=\"heading\">IV. Notes</h3><div align=\"center\"><br><img src=\"docs/icons/loading.svg\" alt=\"SVG image\" class=\"icon\" width=\"100\"></div><div align=\"center\">When you see the spinning icon in the bottom left corner, it means the magicquill is still charging up 💪 Wait for it to disappear before clicking the Run button!<br></div><div align=\"center\"><br><img src=\"docs/icons/wand.svg\" alt=\"SVG image\" class=\"icon\" width=\"100\"></div><div align=\"center\">When the magic wand is flashing, our brush is working hard to guess what you're trying to draw 🤔 Please be patient! 🙏<br><br></div><hr><h3 align=\"center\" class=\"heading\">V. Parameters</h3><div align=\"center\">If you've made it here, you must really love our work! 😍<br>If you want to learn how to better control the generation results, don't miss this section! 😘<br>Next to the Run button, you can select parameters to modify advanced settings 🧐<br><br></div><div><ul><li><u>Base Model Name</u>: Users can adjust this to select appropriate base models for different editing styles<ul><li><a href=\"https://civitai.com/models/4201/realistic-vision-v60-b1\">SD1.5/realisticVisionV60B1_v51VAE.safetensors</a>: This generates realistic style images! Use this most of the time.</li><li><a href=\"https://civitai.com/models/4384?modelVersionId=128713\">SD1.5/DreamShaper.safetensors</a>: This one is for generating fantasy style images</li><li><a href=\"https://civitai.com/models/43331/majicmix-realistic\">SD1.5/majicMIX_realistic</a>: This one is good at generating portraits 👩</li><li><a href=\"https://civitai.com/models/7240?modelVersionId=948574\">SD1.5/MeinaMix.safetensors</a>: This one is good at generating anime images.</li><li><a href=\"https://civitai.com/models/36520/ghostmix\">SD1.5/ghostmix_v20Bakedvae.safetensors</a>: Another model for anime image generation.</li><li>If there are any models you'd like to add, contact us!</li></ul></li><li><u>Negative Prompt</u>: Users can input content they want the model to avoid generating. Whatever you don't want to generate, put it here.</li><li><u>Fine Edge</u>: Users can enable this option to activate fine edge control.</li><li><u>Grow Size</u>: Adjust this parameter to set the pixel range affected around brush strokes when editing images, to expand/reduce the brush stroke influence area.</li><li><u>Edge Strength</u>: Parameter for adjusting the add/subtract brush control strength. Simply put, if you're confident in your drawing skills, you can increase strength. If you're a bad drawer like us 🤦, please keep the parameter as is, or reduce the strength a bit.</li><li><u>Color Strength</u>: Parameter for adjusting the color brush control strength, can adjust the image's coloring effects.</li><li>The remaining parameters are just some common parameters for diffusion models! You basically don't need to manage these, but if you're in the industry/AI art expert, feel free to try adjusting them.</li></ul></div>\n</body>\n</html>\n\n## Citation\nDon't forget to cite this source if it proves useful in your research!\n```bibtex\n@article{liu2024magicquill, \n\ttitle={MagicQuill: An Intelligent Interactive Image Editing System}, \n\tauthor={Zichen Liu and Yue Yu and Hao Ouyang and Qiuyu Wang and Ka Leong Cheng and Wen Wang and Zhiheng Liu and Qifeng Chen and Yujun Shen}, \n\tyear={2024}, \n\teprint={2411.09703}, \n\tarchivePrefix={arXiv}, \n\tprimaryClass={cs.CV}}\n```\n\n## Acknowledgement\nOur implementation is based on \n- [ComfyUI-BrushNet](https://github.com/nullquant/ComfyUI-BrushNet)\n- [ComfyUI](https://github.com/comfyanonymous/ComfyUI)\n- [LLaVA](https://github.com/haotian-liu/LLaVA)\n- [comfyui_controlnet_aux](https://github.com/Fannovel16/comfyui_controlnet_aux)\n- [ComfyUI_Custom_Nodes_AlekPet](https://github.com/AlekPet/ComfyUI_Custom_Nodes_AlekPet)\n- [fabric.js](https://github.com/fabricjs/fabric.js)\n\nThanks for their remarkable contribution and released code!\n\n## Note\nNote: This repo is governed by the license of CC BY-NC 4.0 We strongly advise users not to knowingly generate or allow others to knowingly generate harmful content, including hate speech, violence, pornography, deception, etc. \n\n(注：本仓库受CC BY-NC的许可协议限制。我们强烈建议，用户不应传播及不应允许他人传播以下内容，包括但不限于仇恨言论、暴力、色情、欺诈相关的有害信息。)\n","summary":"MagicQuill is an intelligent, interactive image editing system designed to facilitate precise, localized modifications through an AI-powered interface. The platform offers intuitive features such as drag-and-drop editing, resolution adjustment, and auto-save capabilities to streamline the creative workflow. By supporting integration with ComfyUI and providing a user-friendly web interface, it serves as a powerful tool for researchers, digital artists, and developers looking to achieve high-quality, controlled image synthesis.","description":"[CVPR'25] Official Implementations for Paper - MagicQuill: An Intelligent Interactive Image Editing System","stars":3681,"language":"Python"},{"owner":"google-deepmind","repo":"alphafold3","url":"https://github.com/google-deepmind/alphafold3","readme":"![header](docs/header.jpg)\n\n# AlphaFold 3\n\nThis package provides an implementation of the inference pipeline of AlphaFold\n3. See below for how to access the model parameters. You may only use AlphaFold\n3 model parameters if received directly from Google. Use is subject to these\n[terms of use](https://github.com/google-deepmind/alphafold3/blob/main/WEIGHTS_TERMS_OF_USE.md).\n\nAny publication that discloses findings arising from using this source code, the\nmodel parameters or outputs produced by those should [cite](#citing-this-work)\nthe\n[Accurate structure prediction of biomolecular interactions with AlphaFold 3](https://doi.org/10.1038/s41586-024-07487-w)\npaper.\n\nPlease also refer to the Supplementary Information for a detailed description of\nthe method.\n\nAlphaFold 3 is also available at\n[alphafoldserver.com](https://alphafoldserver.com) for non-commercial use,\nthough with a more limited set of ligands and covalent modifications.\n\nIf you have any questions, please contact the AlphaFold team at\n[alphafold@google.com](mailto:alphafold@google.com).\n\n## Obtaining Model Parameters\n\nThis repository contains all necessary code for AlphaFold 3 inference. To\nrequest access to the AlphaFold 3 model parameters, please complete\n[this form](https://forms.gle/svvpY4u2jsHEwWYS6). Access will be granted at\nGoogle DeepMind’s sole discretion. We will aim to respond to requests within 2–3\nbusiness days. You may only use AlphaFold 3 model parameters if received\ndirectly from Google. Use is subject to these\n[terms of use](https://github.com/google-deepmind/alphafold3/blob/main/WEIGHTS_TERMS_OF_USE.md).\n\n## Installation and Running Your First Prediction\n\nSee the [installation documentation](docs/installation.md).\n\nOnce you have installed AlphaFold 3, you can test your setup using e.g. the\nfollowing input JSON file named `fold_input.json`:\n\n```json\n{\n  \"name\": \"2PV7\",\n  \"sequences\": [\n    {\n      \"protein\": {\n        \"id\": [\"A\", \"B\"],\n        \"sequence\": \"GMRESYANENQFGFKTINSDIHKIVIVGGYGKLGGLFARYLRASGYPISILDREDWAVAESILANADVVIVSVPINLTLETIERLKPYLTENMLLADLTSVKREPLAKMLEVHTGAVLGLHPMFGADIASMAKQVVVRCDGRFPERYEWLLEQIQIWGAKIYQTNATEHDHNMTYIQALRHFSTFANGLHLSKQPINLANLLALSSPIYRLELAMIGRLFAQDAELYADIIMDKSENLAVIETLKQTYDEALTFFENNDRQGFIDAFHKVRDWFGDYSEQFLKESRQLLQQANDLKQG\"\n      }\n    }\n  ],\n  \"modelSeeds\": [1],\n  \"dialect\": \"alphafold3\",\n  \"version\": 1\n}\n```\n\nYou can then run AlphaFold 3 using the following command:\n\n```\ndocker run -it \\\n    --volume $HOME/af_input:/root/af_input \\\n    --volume $HOME/af_output:/root/af_output \\\n    --volume <MODEL_PARAMETERS_DIR>:/root/models \\\n    --volume <DATABASES_DIR>:/root/public_databases \\\n    --gpus all \\\n    alphafold3 \\\n    python run_alphafold.py \\\n    --json_path=/root/af_input/fold_input.json \\\n    --model_dir=/root/models \\\n    --output_dir=/root/af_output\n```\n\nThere are various flags that you can pass to the `run_alphafold.py` command, to\nlist them all run `python run_alphafold.py --help`. Two fundamental flags that\ncontrol which parts AlphaFold 3 will run are:\n\n*   `--run_data_pipeline` (defaults to `true`): whether to run the data\n    pipeline, i.e. genetic and template search. This part is CPU-only, time\n    consuming and could be run on a machine without a GPU.\n*   `--run_inference` (defaults to `true`): whether to run the inference. This\n    part requires a GPU.\n\n## AlphaFold 3 Input\n\nSee the [input documentation](docs/input.md).\n\n## AlphaFold 3 Output\n\nSee the [output documentation](docs/output.md).\n\n## Performance\n\nSee the [performance documentation](docs/performance.md).\n\n## Known Issues\n\nKnown issues are documented in the\n[known issues documentation](docs/known_issues.md).\n\nPlease\n[create an issue](https://github.com/google-deepmind/alphafold3/issues/new/choose)\nif it is not already listed in [Known Issues](docs/known_issues.md) or in the\n[issues tracker](https://github.com/google-deepmind/alphafold3/issues).\n\n## Citing This Work\n\nAny publication that discloses findings arising from using this source code, the\nmodel parameters or outputs produced by those should cite:\n\n```bibtex\n@article{Abramson2024,\n  author  = {Abramson, Josh and Adler, Jonas and Dunger, Jack and Evans, Richard and Green, Tim and Pritzel, Alexander and Ronneberger, Olaf and Willmore, Lindsay and Ballard, Andrew J. and Bambrick, Joshua and Bodenstein, Sebastian W. and Evans, David A. and Hung, Chia-Chun and O’Neill, Michael and Reiman, David and Tunyasuvunakool, Kathryn and Wu, Zachary and Žemgulytė, Akvilė and Arvaniti, Eirini and Beattie, Charles and Bertolli, Ottavia and Bridgland, Alex and Cherepanov, Alexey and Congreve, Miles and Cowen-Rivers, Alexander I. and Cowie, Andrew and Figurnov, Michael and Fuchs, Fabian B. and Gladman, Hannah and Jain, Rishub and Khan, Yousuf A. and Low, Caroline M. R. and Perlin, Kuba and Potapenko, Anna and Savy, Pascal and Singh, Sukhdeep and Stecula, Adrian and Thillaisundaram, Ashok and Tong, Catherine and Yakneen, Sergei and Zhong, Ellen D. and Zielinski, Michal and Žídek, Augustin and Bapst, Victor and Kohli, Pushmeet and Jaderberg, Max and Hassabis, Demis and Jumper, John M.},\n  journal = {Nature},\n  title   = {Accurate structure prediction of biomolecular interactions with AlphaFold 3},\n  year    = {2024},\n  volume  = {630},\n  number  = {8016},\n  pages   = {493–-500},\n  doi     = {10.1038/s41586-024-07487-w}\n}\n```\n\n## Acknowledgements\n\nAlphaFold 3's release was made possible by the invaluable contributions of the\nfollowing people:\n\nAndrew Cowie, Bella Hansen, Charlie Beattie, Chris Jones, Grace Margand,\nJacob Kelly, James Spencer, Josh Abramson, Kathryn Tunyasuvunakool, Kuba Perlin,\nLindsay Willmore, Max Bileschi, Molly Beck, Oleg Kovalevskiy,\nSebastian Bodenstein, Sukhdeep Singh, Tim Green, Toby Sargeant, Uchechi Okereke,\nYotam Doron, and Augustin Žídek (engineering lead).\n\nWe also extend our gratitude to our collaborators at Google and Isomorphic Labs.\n\nAlphaFold 3 uses the following separate libraries and packages:\n\n*   [abseil-cpp](https://github.com/abseil/abseil-cpp) and\n    [abseil-py](https://github.com/abseil/abseil-py)\n*   [Docker](https://www.docker.com)\n*   [DSSP](https://github.com/PDB-REDO/dssp)\n*   [HMMER Suite](https://github.com/EddyRivasLab/hmmer)\n*   [Haiku](https://github.com/deepmind/dm-haiku)\n*   [JAX](https://github.com/jax-ml/jax/)\n*   [libcifpp](https://github.com/pdb-redo/libcifpp)\n*   [NumPy](https://github.com/numpy/numpy)\n*   [pybind11](https://github.com/pybind/pybind11) and\n    [pybind11_abseil](https://github.com/pybind/pybind11_abseil)\n*   [RDKit](https://github.com/rdkit/rdkit)\n*   [Tokamax](https://github.com/openxla/tokamax)\n*   [tqdm](https://github.com/tqdm/tqdm)\n\nWe thank all their contributors and maintainers!\n\n## Get in Touch\n\nIf you have any questions not covered in this overview, please contact the\nAlphaFold team at alphafold@google.com.\n\nWe would love to hear your feedback and understand how AlphaFold 3 has been\nuseful in your research. Share your stories with us at\n[alphafold@google.com](mailto:alphafold@google.com).\n\n## Licence and Disclaimer\n\nThis is not an officially supported Google product.\n\nCopyright 2024 DeepMind Technologies Limited.\n\n### AlphaFold 3 Source Code and Model Parameters\n\nThe AlphaFold 3 source code is licensed under the Creative Commons\nAttribution-Non-Commercial ShareAlike International License, Version 4.0\n(CC-BY-NC-SA 4.0) (the \"License\"); you may not use this file except in\ncompliance with the License. You may obtain a copy of the License at\n[https://github.com/google-deepmind/alphafold3/blob/main/LICENSE](https://github.com/google-deepmind/alphafold3/blob/main/LICENSE).\n\nThe AlphaFold 3 model parameters are made available under the\n[AlphaFold 3 Model Parameters Terms of Use](https://github.com/google-deepmind/alphafold3/blob/main/WEIGHTS_TERMS_OF_USE.md)\n(the \"Terms\"); you may not use these except in compliance with the Terms. You\nmay obtain a copy of the Terms at\n[https://github.com/google-deepmind/alphafold3/blob/main/WEIGHTS_TERMS_OF_USE.md](https://github.com/google-deepmind/alphafold3/blob/main/WEIGHTS_TERMS_OF_USE.md).\n\nUnless required by applicable law, AlphaFold 3 and its output are distributed on\nan \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express\nor implied. You are solely responsible for determining the appropriateness of\nusing AlphaFold 3, or using or distributing its source code or output, and\nassume any and all risks associated with such use or distribution and your\nexercise of rights and obligations under the relevant terms. Output are\npredictions with varying levels of confidence and should be interpreted\ncarefully. Use discretion before relying on, publishing, downloading or\notherwise using the AlphaFold 3 Assets.\n\nAlphaFold 3 and its output are for theoretical modeling only. They are not\nintended, validated, or approved for clinical use. You should not use the\nAlphaFold 3 or its output for clinical purposes or rely on them for medical or\nother professional advice. Any content regarding those topics is provided for\ninformational purposes only and is not a substitute for advice from a qualified\nprofessional. See the relevant terms for the specific language governing\npermissions and limitations under the terms.\n\n### Third-party Software\n\nUse of the third-party software, libraries or code referred to in the\n[Acknowledgements](#acknowledgements) section above may be governed by separate\nterms and conditions or license provisions. Your use of the third-party\nsoftware, libraries or code is subject to any such terms and you should check\nthat you can comply with any applicable restrictions or terms and conditions\nbefore use.\n\n### Mirrored and Reference Databases\n\nThe following databases have been: (1) mirrored by Google DeepMind; and (2) in\npart, included with the inference code package for testing purposes, and are\navailable with reference to the following:\n\n*   [BFD](https://bfd.mmseqs.com/) (modified), by Steinegger M. and Söding J.,\n    modified by Google DeepMind, available under a\n    [Creative Commons Attribution 4.0 International License](https://creativecommons.org/licenses/by/4.0/deed.en).\n    See the Methods section of the\n    [AlphaFold proteome paper](https://www.nature.com/articles/s41586-021-03828-1)\n    for details.\n*   [PDB](https://wwpdb.org) (unmodified), by H.M. Berman et al., available free\n    of all copyright restrictions and made fully and freely available for both\n    non-commercial and commercial use under\n    [CC0 1.0 Universal (CC0 1.0) Public Domain Dedication](https://creativecommons.org/publicdomain/zero/1.0/).\n*   [MGnify: v2022\\_05](https://ftp.ebi.ac.uk/pub/databases/metagenomics/peptide_database/2022_05/README.txt)\n    (unmodified), by Mitchell AL et al., available free of all copyright\n    restrictions and made fully and freely available for both non-commercial and\n    commercial use under\n    [CC0 1.0 Universal (CC0 1.0) Public Domain Dedication](https://creativecommons.org/publicdomain/zero/1.0/).\n*   [UniProt: 2021\\_04](https://www.uniprot.org/) (unmodified), by The UniProt\n    Consortium, available under a\n    [Creative Commons Attribution 4.0 International License](https://creativecommons.org/licenses/by/4.0/deed.en).\n*   [UniRef90: 2022\\_05](https://www.uniprot.org/) (unmodified) by The UniProt\n    Consortium, available under a\n    [Creative Commons Attribution 4.0 International License](https://creativecommons.org/licenses/by/4.0/deed.en).\n*   [NT: 2023\\_02\\_23](https://www.ncbi.nlm.nih.gov/nucleotide/) (modified) See\n    the Supplementary Information of the\n    [AlphaFold 3 paper](https://nature.com/articles/s41586-024-07487-w) for\n    details.\n*   [RFam: 14\\_4](https://rfam.org/) (modified), by I. Kalvari et al., available\n    free of all copyright restrictions and made fully and freely available for\n    both non-commercial and commercial use under\n    [CC0 1.0 Universal (CC0 1.0) Public Domain Dedication](https://creativecommons.org/publicdomain/zero/1.0/).\n    See the Supplementary Information of the\n    [AlphaFold 3 paper](https://nature.com/articles/s41586-024-07487-w) for\n    details.\n*   [RNACentral: 21\\_0](https://rnacentral.org/) (modified), by The RNAcentral\n    Consortium available free of all copyright restrictions and made fully and\n    freely available for both non-commercial and commercial use under\n    [CC0 1.0 Universal (CC0 1.0) Public Domain Dedication](https://creativecommons.org/publicdomain/zero/1.0/).\n    See the Supplementary Information of the\n    [AlphaFold 3 paper](https://nature.com/articles/s41586-024-07487-w) for\n    details.\n","summary":"AlphaFold 3 is an advanced inference pipeline developed by Google DeepMind designed to predict the structures of complex biomolecular interactions. It provides the necessary code to perform high-accuracy structural modeling, enabling researchers to gain deeper insights into how proteins interact with other molecules like ligands and covalent modifications. This project is intended for scientists and researchers in the fields of structural biology and drug discovery who require sophisticated computational tools for molecular analysis. Access to the model parameters is managed by Google and requires a formal request process, while the source code itself provides a comprehensive framework for executing these structural predictions.","description":"AlphaFold 3 inference pipeline.","stars":8132,"language":"Python"},{"owner":"misbahsy","repo":"Scenic-Flow","url":"https://github.com/misbahsy/Scenic-Flow","readme":"# 🎬 ScenicFlow - Powered by Langflow and Groq\n\nA web-based scene/slide creator built with Vite and React that allows you to create engaging video presentations. Create slides and scenes manually by adding text and images, or let AI automatically generate scenes for you using Langflow integration.\n\n## Table of Contents\n\n- [Prerequisites](#prerequisites)\n- [Installation](#installation)\n- [Configuration](#configuration)\n- [Running the Development Server](#running-the-development-server)\n- [Building for Production](#building-for-production)\n- [Linting](#linting)\n- [Learn More](#learn-more)\n- [Deploying](#deploying)\n\n## Prerequisites\n\nBefore you begin, ensure you have met the following requirements:\n\n- **Node.js**: Install the latest version from the [Node.js Official Website](https://nodejs.org/).\n- **Package Manager**: Choose one of the following for managing dependencies:\n  - [npm](https://www.npmjs.com/)\n  - [Yarn](https://yarnpkg.com/)\n  - [pnpm](https://pnpm.io/)\n  - [Bun](https://bun.sh/)\n\n## Installation\n\nFollow these steps to set up the project locally:\n\n1. **Clone the Repository**\n\n   ```bash\n   git clone https://github.com/misbahsy/txt-to-video\n   cd video-editor\n   ```\n\n2. **Install Dependencies**\n\n   Choose your preferred package manager to install the required dependencies:\n\n   ```bash\n   # Using npm\n   npm install\n\n   # Using Yarn\n   yarn install\n\n   # Using pnpm\n   pnpm install\n\n   # Using Bun\n   bun install\n   ```\n\n## Configuration\n\n### 1. Create a Free Langflow Account\n\n- Visit [Astra Datastax Langflow](https://astra.datastax.com/) to create a free Langflow account.\n- Follow the registration process and verify your email if required.\n\n### 2. Obtain Langflow API Token and Base Path\n\n- After logging in, navigate to the Langflow dashboard.\n- Generate or retrieve your **API Token**.\n- Note down the **Base Path** for the Langflow API.\n\n### 3. Set Up Environment Variables\n\nCreate a `.env` file in the root directory of the project and add the following variables:\n```env\nVITE_ASTRA_LANGFLOW_TOKEN=AstraCS:xxxx\nVITE_LANGFLOW_BASE_PATH=\"/api/langflow/lf/xxxxxx-xxxx-xxx-xxxx/api/v1/run/flow-id\"\n```\n\n**Note:** Ensure that VITE_LANGFLOW_BASE_PATH starts with /api/langflow/... which is available from </>API tab at the bottom right of the Langflow UI. Also make sure `.env` is **not** committed to version control to keep your API tokens secure.\n\n### 4. Import Langflow Flow\n\nYou can use the predefined flow located at `src/utils/langflow_flow/Slides with images.json`. Simply drag and drop this flow into the Langflow dashboard to get started.\n\n## Running the Development Server\n\nStart the development server using your chosen package manager:\n\n```bash\n# Using npm\nnpm run dev\n\n# Using Yarn\nyarn dev\n\n# Using pnpm\npnpm dev\n\n# Using Bun\nbun dev\n```\n\n- Open [http://localhost:3000](http://localhost:3000) in your browser to view the application.\n- The app will automatically reload if you make changes to the code.\n\n## Building for Production\n\nTo create an optimized production build, run the following command with your preferred package manager:\n\n```bash\n# Using npm\nnpm run build\n\n# Using Yarn\nyarn build\n\n# Using pnpm\npnpm build\n\n# Using Bun\nbun build\n```\n\nThe build artifacts will be stored in the `dist/` directory.\n\n## Linting\n\nEnsure code quality and consistency by running the linter:\n\n```bash\n# Using npm\nnpm run lint\n\n# Using Yarn\nyarn lint\n\n# Using pnpm\npnpm lint\n\n# Using Bun\nbun lint\n```\n\nThe linter checks for syntax errors and enforces coding standards based on the `.eslintrc.json` configuration.\n\n## Learn More\n\nTo learn more about the technologies used in this project, check out the following resources:\n\n- [Vite Documentation](https://vitejs.dev/guide/)\n- [React Documentation](https://reactjs.org/docs/getting-started.html)\n- [Langflow Documentation](https://docs.langflow.org/)\n- [TypeScript Documentation](https://www.typescriptlang.org/docs/)\n- [Tailwind CSS Documentation](https://tailwindcss.com/docs)\n\n## Deploying\n\nDeploy your application using your preferred hosting platform. For optimal performance and ease of deployment, consider using platforms like [Vercel](https://vercel.com/) or [Netlify](https://www.netlify.com/).\n\nFor more details on deploying with Vite, refer to the [Vite Deployment Guide](https://vitejs.dev/guide/static-deploy.html).\n\n```","summary":"ScenicFlow is a web-based presentation builder that enables users to create engaging video scenes and slides using a modern React and Vite interface. The platform offers flexible creation workflows, allowing users to manually assemble content or leverage AI-driven automation through seamless integration with Langflow and Groq. This project is an ideal tool for content creators and presenters looking to streamline the production of professional visual narratives through an extensible, developer-friendly architecture.","description":"A Simple Scenes Based Movie Generation App","stars":52,"language":"TypeScript"},{"owner":"mudler","repo":"LocalAI","url":"https://github.com/mudler/LocalAI","readme":"<h1 align=\"center\">\n  <br>\n  <img width=\"300\" src=\"./core/http/static/logo.png\"> <br>\n<br>\n</h1>\n\n<p align=\"center\">\n<a href=\"https://github.com/go-skynet/LocalAI/stargazers\" target=\"blank\">\n<img src=\"https://img.shields.io/github/stars/go-skynet/LocalAI?style=for-the-badge\" alt=\"LocalAI stars\"/>\n</a>\n<a href='https://github.com/go-skynet/LocalAI/releases'>\n<img src='https://img.shields.io/github/release/go-skynet/LocalAI?&label=Latest&style=for-the-badge'>\n</a>\n<a href=\"LICENSE\" target=\"blank\">\n<img src=\"https://img.shields.io/badge/License-MIT-yellow.svg?style=for-the-badge\" alt=\"LocalAI License\"/>\n</a>\n</p>\n\n<p align=\"center\">\n<a href=\"https://twitter.com/LocalAI_API\" target=\"blank\">\n<img src=\"https://img.shields.io/badge/X-%23000000.svg?style=for-the-badge&logo=X&logoColor=white&label=LocalAI_API\" alt=\"Follow LocalAI_API\"/>\n</a>\n<a href=\"https://discord.gg/uJAeKSAGDy\" target=\"blank\">\n<img src=\"https://img.shields.io/badge/dynamic/json?color=blue&label=Discord&style=for-the-badge&query=approximate_member_count&url=https%3A%2F%2Fdiscordapp.com%2Fapi%2Finvites%2FuJAeKSAGDy%3Fwith_counts%3Dtrue&logo=discord\" alt=\"Join LocalAI Discord Community\"/>\n</a>\n</p>\n\n<p align=\"center\">\n<a href=\"https://trendshift.io/repositories/5539\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/5539\" alt=\"mudler%2FLocalAI | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/></a>\n</p>\n\n**LocalAI** is the open-source AI engine. Run any model - LLMs, vision, voice, image, video - on any hardware. No GPU required.\n\n**A small core, not a bundle.** Each backend wraps a best-in-class engine (llama.cpp, vLLM, whisper.cpp, stable-diffusion, MLX...) in its own image, pulled only when a model needs it. You install nothing you don't use.\n\n- **Composable by design**: backends are separate and pulled on demand, so you install only what your model needs\n- **Open and extensible**: load any model, or build your own backend in any language against an open interface\n- **Drop-in API compatibility**: OpenAI, Anthropic, and ElevenLabs APIs across every backend\n- **Any model, any modality**: LLMs, vision, voice, image, and video behind one API\n- **Any hardware**: NVIDIA, AMD, Intel, Apple Silicon, Vulkan, or CPU-only\n- **Multi-user ready**: API key auth, user quotas, role-based access\n- **Built-in AI agents**: autonomous agents with tool use, RAG, MCP, and skills\n- **Privacy-first**: your data never leaves your infrastructure\n\n![A small LocalAI core with backends (llama.cpp, vLLM, MLX, whisper.cpp, stable-diffusion, kokoro, parakeet.cpp...) plugged in as separate on-demand images](docs/static/images/diagrams/composable-core.png)\n\nCreated by [Ettore Di Giacinto](https://github.com/mudler) and maintained by the [LocalAI team](#team).\n\n> [:book: Documentation](https://localai.io/) | [:speech_balloon: Discord](https://discord.gg/uJAeKSAGDy) | [💻 Quickstart](https://localai.io/basics/getting_started/) | [🖼️ Models](https://models.localai.io/) | [❓FAQ](https://localai.io/faq/)\n\n## Guided tour\n\nhttps://github.com/user-attachments/assets/08cbb692-57da-48f7-963d-2e7b43883c18\n\n<details>\n\n<summary>\nClick to see more!\n</summary>\n\n#### User and auth\n\nhttps://github.com/user-attachments/assets/228fa9ad-81a3-4d43-bfb9-31557e14a36c\n\n#### Agents\n\nhttps://github.com/user-attachments/assets/6270b331-e21d-4087-a540-6290006b381a\n\n#### Usage metrics per user\n\nhttps://github.com/user-attachments/assets/cbb03379-23b4-4e3d-bd26-d152f057007f\n\n#### Fine-tuning and Quantization\n\nhttps://github.com/user-attachments/assets/5ba4ace9-d3df-4795-b7d4-b0b404ea71ee\n\n#### WebRTC\n\nhttps://github.com/user-attachments/assets/ed88e34c-fed3-4b83-8a67-4716a9feeb7b\n\n</details>\n\n## Quickstart\n\n### macOS\n\n<a href=\"https://github.com/mudler/LocalAI/releases/latest/download/LocalAI.dmg\">\n  <img src=\"https://img.shields.io/badge/Download-macOS-blue?style=for-the-badge&logo=apple&logoColor=white\" alt=\"Download LocalAI for macOS\"/>\n</a>\n\n> **Note:** The DMG is not signed by Apple. After installing, run: `sudo xattr -d com.apple.quarantine /Applications/LocalAI.app`. See [#6268](https://github.com/mudler/LocalAI/issues/6268) for details.\n\n### Containers (Docker, podman, ...)\n\n> Already ran LocalAI before? Use `docker start -i local-ai` to restart an existing container.\n\n#### CPU only:\n\n```bash\ndocker run -ti --name local-ai -p 8080:8080 localai/localai:latest\n```\n\n#### NVIDIA GPU:\n\n```bash\n# CUDA 13\ndocker run -ti --name local-ai -p 8080:8080 --gpus all localai/localai:latest-gpu-nvidia-cuda-13\n\n# CUDA 12\ndocker run -ti --name local-ai -p 8080:8080 --gpus all localai/localai:latest-gpu-nvidia-cuda-12\n\n# NVIDIA Jetson ARM64 (CUDA 12, for AGX Orin and similar)\ndocker run -ti --name local-ai -p 8080:8080 --gpus all localai/localai:latest-nvidia-l4t-arm64\n\n# NVIDIA Jetson ARM64 (CUDA 13, for DGX Spark)\ndocker run -ti --name local-ai -p 8080:8080 --gpus all localai/localai:latest-nvidia-l4t-arm64-cuda-13\n```\n\n#### AMD GPU (ROCm):\n\n```bash\ndocker run -ti --name local-ai -p 8080:8080 --device=/dev/kfd --device=/dev/dri --group-add=video localai/localai:latest-gpu-hipblas\n```\n\n#### Intel GPU (oneAPI):\n\n```bash\ndocker run -ti --name local-ai -p 8080:8080 --device=/dev/dri/card1 --device=/dev/dri/renderD128 localai/localai:latest-gpu-intel\n```\n\n#### Vulkan GPU:\n\n```bash\ndocker run -ti --name local-ai -p 8080:8080 localai/localai:latest-gpu-vulkan\n```\n\n### Loading models\n\n```bash\n# From the model gallery (see available models with `local-ai models list` or at https://models.localai.io)\nlocal-ai run llama-3.2-1b-instruct:q4_k_m\n# From Huggingface\nlocal-ai run huggingface://TheBloke/phi-2-GGUF/phi-2.Q8_0.gguf\n# From the Ollama OCI registry\nlocal-ai run ollama://gemma:2b\n# From a YAML config\nlocal-ai run https://gist.githubusercontent.com/.../phi-2.yaml\n# From a standard OCI registry (e.g., Docker Hub)\nlocal-ai run oci://localai/phi-2:latest\n```\n\n> **Automatic Backend Detection**: LocalAI automatically detects your GPU capabilities and downloads the appropriate backend. For advanced options, see [GPU Acceleration](https://localai.io/features/gpu-acceleration/).\n\nFor more details, see the [Getting Started guide](https://localai.io/basics/getting_started/).\n\n## Latest News\n\n- **May 2026**: **LocalAI 4.3.0** - `llama.cpp` [prompt cache on by default](https://github.com/mudler/LocalAI/pull/9925) (repeated system prompts collapse from minutes to seconds), [keyless cosign signing of backend OCI images](https://github.com/mudler/LocalAI/pull/9823), [per-API-key + per-user usage attribution](https://github.com/mudler/LocalAI/pull/9920), Distributed v3 with [per-request replica routing](https://github.com/mudler/LocalAI/pull/9968). [Release notes](https://github.com/mudler/LocalAI/releases/tag/v4.3.0)\n- **May 2026**: **LocalAI 4.2.0** - LocalAI sees and hears: [voice recognition](https://github.com/mudler/LocalAI/pull/9500), [face recognition + antispoofing liveness](https://github.com/mudler/LocalAI/pull/9480), speaker diarization. Plus [drop-in Ollama API](https://github.com/mudler/LocalAI/pull/9284), [video generation](https://github.com/mudler/LocalAI/pull/9420), redesigned UI with i18n + admin-configurable branding, vLLM at feature parity with llama.cpp, and 11 new backends. [Release notes](https://github.com/mudler/LocalAI/releases/tag/v4.2.0)\n- **April 2026**: **LocalAI 4.1.0** - LocalAI becomes a control tower: distributed cluster mode with VRAM-aware smart routing + autoscaling, multi-user platform with OIDC and API keys, per-user quotas with predictive analytics, in-UI fine-tuning with TRL (auto-export to GGUF), on-the-fly quantization backend, visual pipeline editor. [Release notes](https://github.com/mudler/LocalAI/releases/tag/v4.1.0)\n- **March 2026**: **LocalAI 4.0.0** - native agentic orchestration with the new [Agenthub](https://agenthub.localai.io) community hub, full React UI rewrite with Canvas mode, [MCP Apps + client-side](https://github.com/mudler/LocalAI/pull/8947) with tool streaming, [WebRTC realtime audio](https://github.com/mudler/LocalAI/pull/8790), [MLX-distributed](https://github.com/mudler/LocalAI/pull/8801). [Release notes](https://github.com/mudler/LocalAI/releases/tag/v4.0.0)\n- **February 2026**: [Realtime API for audio-to-audio with tool calling](https://github.com/mudler/LocalAI/pull/6245), [ACE-Step 1.5 support](https://github.com/mudler/LocalAI/pull/8396)\n- **January 2026**: **LocalAI 3.10.0** — Anthropic API support, Open Responses API, video & image generation (LTX-2), unified GPU backends, tool streaming, Moonshine, Pocket-TTS. [Release notes](https://github.com/mudler/LocalAI/releases/tag/v3.10.0)\n- **December 2025**: [Dynamic Memory Resource reclaimer](https://github.com/mudler/LocalAI/pull/7583), [Automatic multi-GPU model fitting (llama.cpp)](https://github.com/mudler/LocalAI/pull/7584), [Vibevoice backend](https://github.com/mudler/LocalAI/pull/7494)\n- **November 2025**: [Import models via URL](https://github.com/mudler/LocalAI/pull/7245), [Multiple chats and history](https://github.com/mudler/LocalAI/pull/7325)\n- **October 2025**: [Model Context Protocol (MCP)](https://localai.io/docs/features/mcp/) support for agentic capabilities\n- **September 2025**: New Launcher for macOS and Linux, extended backend support for Mac and Nvidia L4T, MLX-Audio, WAN 2.2\n- **August 2025**: MLX, MLX-VLM, Diffusers, llama.cpp now supported on Apple Silicon\n- **July 2025**: All backends migrated outside the main binary — [lightweight, modular architecture](https://github.com/mudler/LocalAI/releases/tag/v3.2.0)\n\nFor older news and full release notes, see [GitHub Releases](https://github.com/mudler/LocalAI/releases) and the [News page](https://localai.io/basics/news/).\n\n## Features\n\n- [Text generation](https://localai.io/features/text-generation/) (`llama.cpp`, `transformers`, `vllm` ... [and more](https://localai.io/model-compatibility/))\n- [Text to Audio](https://localai.io/features/text-to-audio/)\n- [Audio to Text](https://localai.io/features/audio-to-text/)\n- [Image generation](https://localai.io/features/image-generation)\n- [OpenAI-compatible tools API](https://localai.io/features/openai-functions/)\n- [Realtime API](https://localai.io/features/openai-realtime/) (Speech-to-speech)\n- [Embeddings generation](https://localai.io/features/embeddings/)\n- [Constrained grammars](https://localai.io/features/constrained_grammars/)\n- [Download models from Huggingface](https://localai.io/models/)\n- [Vision API](https://localai.io/features/gpt-vision/)\n- [Object Detection](https://localai.io/features/object-detection/)\n- [Reranker API](https://localai.io/features/reranker/)\n- [P2P Inferencing](https://localai.io/features/distribute/)\n- [Distributed Mode](https://localai.io/features/distributed-mode/) — Horizontal scaling with PostgreSQL + NATS\n- [Model Context Protocol (MCP)](https://localai.io/docs/features/mcp/)\n- [Built-in Agents](https://localai.io/features/agents/) — Autonomous AI agents with tool use, RAG, skills, SSE streaming, and [Agent Hub](https://agenthub.localai.io)\n- [Backend Gallery](https://localai.io/backends/) — Install/remove backends on the fly via OCI images\n- Voice Activity Detection (Silero-VAD)\n- Integrated WebUI\n\n## Supported Backends & Acceleration\n\nLocalAI supports **36+ backends** including llama.cpp, vLLM, transformers, whisper.cpp, diffusers, MLX, MLX-VLM, and many more. Hardware acceleration is available for **NVIDIA** (CUDA 12/13), **AMD** (ROCm), **Intel** (oneAPI/SYCL), **Apple Silicon** (Metal), **Vulkan**, and **NVIDIA Jetson** (L4T). All backends can be installed on-the-fly from the [Backend Gallery](https://localai.io/backends/).\n\nSee the full [Backend & Model Compatibility Table](https://localai.io/model-compatibility/) and [GPU Acceleration guide](https://localai.io/features/gpu-acceleration/).\n\n## Resources\n\n- [Documentation](https://localai.io/)\n- [LLM fine-tuning guide](https://localai.io/docs/advanced/fine-tuning/)\n- [Build from source](https://localai.io/basics/build/)\n- [Kubernetes installation](https://localai.io/basics/getting_started/#run-localai-in-kubernetes)\n- [Integrations & community projects](https://localai.io/docs/integrations/)\n- [Installation video walkthrough](https://www.youtube.com/watch?v=cMVNnlqwfw4)\n- [Media & blog posts](https://localai.io/basics/news/#media-blogs-social)\n- [Examples](https://github.com/mudler/LocalAI-examples)\n\n## Team\n\nLocalAI is maintained by a small team of humans, together with the wider community of contributors.\n\n- **[Ettore Di Giacinto](https://github.com/mudler)** — original author and project lead\n- **[Richard Palethorpe](https://github.com/richiejp)** — maintainer\n\nA huge thank you to everyone who contributes code, reviews PRs, files issues, and helps users in [Discord](https://discord.gg/uJAeKSAGDy) — LocalAI is a community-driven project and wouldn't exist without you. See the full [contributors list](https://github.com/mudler/LocalAI/graphs/contributors).\n\n## Citation\n\nIf you utilize this repository, data in a downstream project, please consider citing it with:\n\n```\n@misc{localai,\n  author = {Ettore Di Giacinto},\n  title = {LocalAI: The free, Open source OpenAI alternative},\n  year = {2023},\n  publisher = {GitHub},\n  journal = {GitHub repository},\n  howpublished = {\\url{https://github.com/go-skynet/LocalAI}},\n```\n\n## Sponsors\n\n> Do you find LocalAI useful?\n\nSupport the project by becoming [a backer or sponsor](https://github.com/sponsors/mudler). Your logo will show up here with a link to your website.\n\nA huge thank you to our generous sponsors who support this project covering CI expenses, and our [Sponsor list](https://github.com/sponsors/mudler):\n\n<p align=\"center\">\n  <a href=\"https://www.spectrocloud.com/\" target=\"blank\">\n    <img height=\"200\" src=\"https://github.com/user-attachments/assets/72eab1dd-8b93-4fc0-9ade-84db49f24962\">\n  </a>\n</p>\n\n<details>\n\n<summary>\nPast sponsors\n</summary>\n\n<p align=\"center\">\n  <a href=\"https://www.premai.io/\" target=\"blank\">\n    <img height=\"200\" src=\"https://github.com/mudler/LocalAI/assets/2420543/42e4ca83-661e-4f79-8e46-ae43689683d6\"> <br>\n  </a>\n</p>\n\n</details>\n\n### Individual sponsors\n\nA special thanks to individual sponsors, a full list is on [GitHub](https://github.com/sponsors/mudler) and [buymeacoffee](https://buymeacoffee.com/mudler). Special shout out to [drikster80](https://github.com/drikster80) for being generous. Thank you everyone!\n\n## Star history\n\n[![LocalAI Star history Chart](https://api.star-history.com/svg?repos=go-skynet/LocalAI&type=Date)](https://star-history.com/#go-skynet/LocalAI&Date)\n\n## License\n\nLocalAI is a community-driven project created by [Ettore Di Giacinto](https://github.com/mudler/) and maintained by the [LocalAI team](#team).\n\nMIT - Author Ettore Di Giacinto <mudler@localai.io>\n\n## Acknowledgements\n\nLocalAI couldn't have been built without the help of great software already available from the community. Thank you!\n\n- [llama.cpp](https://github.com/ggerganov/llama.cpp)\n- https://github.com/tatsu-lab/stanford_alpaca\n- https://github.com/cornelk/llama-go for the initial ideas\n- https://github.com/antimatter15/alpaca.cpp\n- https://github.com/EdVince/Stable-Diffusion-NCNN\n- https://github.com/ggerganov/whisper.cpp\n- https://github.com/rhasspy/piper\n- [exo](https://github.com/exo-explore/exo) for the MLX distributed auto-parallel sharding implementation\n\n## Contributors\n\nThis is a community project, a special thanks to our contributors!\n<a href=\"https://github.com/go-skynet/LocalAI/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=go-skynet/LocalAI\" />\n</a>\n","summary":"LocalAI is a versatile, open-source engine designed to run large language models, vision, voice, and image generation models locally on virtually any hardware. By utilizing a modular architecture where specialized backends are pulled on demand, the project ensures a lightweight footprint while maintaining full API compatibility with major providers like OpenAI. This platform is ideal for developers and organizations who require a privacy-first, extensible infrastructure to deploy AI agents, perform RAG, or manage multi-user access without relying on external cloud services.","description":"LocalAI is the open-source AI engine. Run any model - LLMs, vision, voice, image, video - on any hardware. No GPU required.","stars":46652,"language":"Go"},{"owner":"KudoAI","repo":"duckduckgpt","url":"https://github.com/KudoAI/duckduckgpt","readme":"<a id=\"top\"></a>\n\n<div align=\"center\">\n\n<h1>\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"https://cdn.jsdelivr.net/gh/KudoAI/duckduckgpt/assets/images/logos/app/darkmode/logo371x65.png\">\n    <img src=\"https://cdn.jsdelivr.net/gh/KudoAI/duckduckgpt/assets/images/logos/app/lightmode/logo371x65.png\">\n  </picture>\n</h1>\n\n<a href=\"../LICENSE.md\">\n    <img alt=\"[License: MIT]\" src=\"https://img.shields.io/badge/License-MIT-orange.svg?logo=internetarchive&logoColor=white&labelColor=464646&style=for-the-badge\"></a>\n<a href=\"https://github.com/KudoAI/duckduckgpt/blob/main/greasemonkey/duckduckgpt.user.js\">\n    <img height=32 src=\"https://img.shields.io/github/size/KudoAI/duckduckgpt/greasemonkey/duckduckgpt.user.js?label=Filesize&logo=databricks&logoColor=white&labelColor=464646&color=ff69b4&style=for-the-badge\"></a>\n<a href=\"https://www.codefactor.io/repository/github/kudoai/duckduckgpt\">\n    <img alt=\"[CodeFactor grade]\" src=\"https://img.shields.io/codefactor/grade/github/kudoai/duckduckgpt?label=Code+Quality&logo=codefactor&logoColor=white&labelColor=464646&color=b3ff68&style=for-the-badge\"></a>\n<a href=\"https://github.com/KudoAI/chatgpt.js?utm_source=duckduckgpt&utm_content=github_shield\">\n    <img alt=\"[Powered by chatgpt.js]\" src=\"https://img.shields.io/badge/Powered_by-chatgpt.js-black?logo=gamejolt&logoColor=white&labelColor=464646&style=for-the-badge\"></a>\n<a href=\"https://sonarcloud.io/component_measures?metric=vulnerabilities&id=kudoai_duckduckgpt\">\n    <img alt=\"[SonarCloud vulnerabilities]\" src=\"https://img.shields.io/badge/dynamic/json?url=https%3A%2F%2Fsonarcloud.io%2Fapi%2Fmeasures%2Fcomponent%3Fcomponent%3Dkudoai_duckduckgpt%26metricKeys%3Dvulnerabilities&query=%24.component.measures.0.value&style=for-the-badge&logo=sonar&logoColor=white&labelColor=464646&label=Vulnerabilities&color=ffef00\"></a>\n<a href=\"https://github.com/awesome-scripts/awesome-userscripts/#-chatgpt\">\n    <img alt=\"[Mentioned in Awesome]\" src=\"https://img.shields.io/badge/Mentioned_in-Awesome-cb48dc?logo=awesomelists&logoColor=white&labelColor=464646&style=for-the-badge\"></a>\n<a href=\"https://www.kudoai.com?utm_source=duckduckgpt&utm_content=github_shield\">\n    <img alt=\"[Built by KudoAI]\" src=\"https://img.shields.io/badge/Built_by-KudoAI-a07bfc?logo=esbuild&logoColor=white&labelColor=464646&style=for-the-badge\"></a>\n<a href=\"https://www.jsdelivr.com/package/gh/KudoAI/duckduckgpt?tab=stats\">\n    <img alt=\"[jsDelivr stats]\" src=\"https://img.shields.io/jsdelivr/gh/hm/KudoAI/duckduckgpt?style=for-the-badge&logo=jsdelivr&logoColor=white&label=jsDelivr%20Requests&labelColor=464646&color=2bbbd8\"></a>\n\n<h3>Enhance DuckDuckGo w/ AI chat & search summaries, powered by the latest LLMs</h3>\n\n<a href=\"https://gm.ddgpt.com\"><img style=\"height: 45px\" alt=\"[Install this script]\" src=\"https://cdn.jsdelivr.net/gh/KudoAI/duckduckgpt/assets/images/buttons/greasy-fork/install/this-script.svg\"></a><a href=\"#-installation\"><img style=\"height: 45px\" alt=\"[How to install]\" title=\"How to install\" src=\"https://cdn.jsdelivr.net/gh/KudoAI/duckduckgpt/assets/images/buttons/greasy-fork/help.svg\"></a>\n<br>\n[Discuss](https://github.com/KudoAI/duckduckgpt/discussions) /\n[Get support](https://github.com/KudoAI/duckduckgpt/issues) / \n[Contact author](https://github.com/adamlui)\n\n<br>\n\n<img src=\"https://cdn.jsdelivr.net/gh/KudoAI/duckduckgpt/assets/images/screenshots/desktop/how-to-becum-rich-query/darkmode.png\">\n\n### Mobile:\n\n<img src=\"https://cdn.jsdelivr.net/gh/KudoAI/duckduckgpt/assets/images/screenshots/mobile/hi-there-query/darkmode.png\">\n\n<br><br>\n\n</div>\n\n<img height=10px width=\"100%\" src=\"https://cdn.jsdelivr.net/gh/adamlui/ai-web-extensions@f0e2ef7/assets/images/separators/gradient-aqua.png\">\n\n## 🚀 Installation\n\n1. Install a userscript manager, such as:\n    - **ScriptCat** for [Chrome](https://chromewebstore.google.com/detail/scriptcat/ndcooeababalnlpkfedmmbbbgkljhpjf), [Firefox](https://addons.mozilla.org/firefox/addon/scriptcat/) or [Edge](https://microsoftedge.microsoft.com/addons/detail/scriptcat/liilgpjgabokdklappibcjfablkpcekh)\n    - **Tampermonkey** for [Chrome](https://chromewebstore.google.com/detail/tampermonkey/dhdgffkkebhmkfjojejmpbldmpobfkfo), [Firefox](https://addons.mozilla.org/firefox/addon/tampermonkey/) or [Edge](https://microsoftedge.microsoft.com/addons/detail/tampermonkey/iikmkjmpaadaobahmlepeloendndfphd)\n    - **Violentmonkey*** for [Firefox](https://addons.mozilla.org/firefox/addon/violentmonkey/) or [Edge](https://microsoftedge.microsoft.com/addons/detail/eeagobfjdenkkddmbclomhiblgggliao)\n    - **OrangeMonkey*** for [Chrome](https://chromewebstore.google.com/detail/orangemonkey/ekmeppjgajofkpiofbebgcbohbmfldaf)\n    - [**Stay**](https://apps.apple.com/app/stay-for-safari/id1591620171) or [**Userscripts**](https://apps.apple.com/app/userscripts/id1463298887) for Safari\n\n2. Install [**DuckDuckGPT**](https://gm.ddgpt.com) userscript (will load in manager installed above)\n\n3. Visit [**duckduckgo.com**](https://duckduckgo.com), type your search, engage bot!\n\n##### _*Streaming Mode not supported in Violentmonkey & OrangeMonkey_\n\n<hr>\n\n## 🕵️ Proxy Mode\n\nProxy API Mode (disabled by default) r ":275,"language":"JavaScript"},{"owner":"Nutlope","repo":"logocreator","url":"https://github.com/Nutlope/logocreator","readme":"<a href=\"https://www.logo-creator.io\">\n  <img alt=\"AI Logo Generator\" src=\"./public/og-image.png\">\n  <h1 align=\"center\">AI Logo Generator</h1>\n</a>\n\n<p align=\"center\">\n  An open source logo generator – create professional logos in seconds with customizable styles.\n</p>\n\n## Tech stack\n\n- [Flux Pro 1.1](https://togetherai.link/flux-playground) on [Together AI](https://togetherai.link/) for logo generation\n- [Next.js](https://nextjs.org/) with TypeScript for the app framework\n- [Shadcn](https://ui.shadcn.com/) for UI components & [Tailwind](https://tailwindcss.com/) for styling\n- [Upstash Redis](https://upstash.com/) for rate limiting\n- [Clerk](https://clerk.com/) for authentication\n- [Plausible](https://plausible.io/) & [Helicone](https://helicone.ai/) for analytics & observability\n\n## Cloning & running\n\n1. Clone the repo: `git clone https://github.com/Nutlope/logocreator`\n2. Create a `.env` file and add your [Together AI API key](https://api.together.xyz/settings/api-keys): `TOGETHER_API_KEY=`\n3. Run `npm install` and `npm run dev` to install dependencies and run locally.\n\n## Future Tasks\n\n- [ ] Create a dashboard with a user's logo history\n- [ ] Support SVG exports instead of just PNG\n- [ ] Add support for additional styles\n- [ ] Add a dropdown for image size (can do up to 1440x1440)\n- [ ] Show approximate price when using your own Together AI key\n- [ ] Allow the ability to upload a reference logo (use vision model to read it)\n- [ ] Redesign popular brand’s logos with my logo maker and have it in a showcase\n","summary":"Logocreator is an open-source web application that leverages the Flux Pro 1.1 model via Together AI to generate professional, customizable logos in seconds. Built with a modern tech stack including Next.js, Shadcn, and Tailwind CSS, the project provides a streamlined interface for high-quality image generation with built-in rate limiting and user authentication. It is an ideal resource for developers, designers, and entrepreneurs looking to quickly prototype branding assets or build their own AI-powered design tools.","description":"A free + OSS logo generator powered by Flux on Together AI","stars":7010,"language":"TypeScript"},{"owner":"polarsource","repo":"polar","url":"https://github.com/polarsource/polar","readme":"<p align=\"center\">\n\n  <a href=\"https://polar.sh\">\n      <img src=\"https://github.com/user-attachments/assets/89a588e5-0c58-429a-8bbe-20f70af41372\" />\n  </a>\n\n</p>\n\n<div align=\"center\">\n\n<a href=\"https://www.producthunt.com/posts/polar-5?embed=true&utm_source=badge-top-post-badge&utm_medium=badge&utm_souce=badge-polar&#0045;5\" target=\"_blank\"><img src=\"https://api.producthunt.com/widgets/embed-image/v1/top-post-badge.svg?post_id=484271&theme=dark&period=daily\" alt=\"Polar - An&#0032;open&#0032;source&#0032;monetization&#0032;platform&#0032;for&#0032;developers | Product Hunt\" style=\"width: 250px; height: 54px;\" width=\"250\" height=\"54\" /></a> <a href=\"https://www.producthunt.com/posts/polar-5?embed=true&utm_source=badge-top-post-topic-badge&utm_medium=badge&utm_souce=badge-polar&#0045;5\" target=\"_blank\"><img src=\"https://api.producthunt.com/widgets/embed-image/v1/top-post-topic-badge.svg?post_id=484271&theme=dark&period=monthly&topic_id=267\" alt=\"Polar - An&#0032;open&#0032;source&#0032;monetization&#0032;platform&#0032;for&#0032;developers | Product Hunt\" style=\"width: 250px; height: 54px;\" width=\"250\" height=\"54\" /></a>\n\n</div>\n\n<hr />\n<div align=\"center\">\n\n<a href=\"https://polar.sh\">Website</a>\n<span>&nbsp;&nbsp;•&nbsp;&nbsp;</span>\n<a href=\"https://polar.sh/docs\">Docs</a>\n<span>&nbsp;&nbsp;•&nbsp;&nbsp;</span>\n<a href=\"https://polar.sh/docs/api-reference\">API Reference</a>\n\n<p align=\"center\">\n  <a href=\"https://twitter.com/intent/follow?screen_name=polar_sh\">\n    <img src=\"https://img.shields.io/twitter/follow/polar_sh.svg?label=Follow%20@polar_sh\" alt=\"Follow @polar_sh\" />\n  </a>\n</p>\n</div>\n<hr />\n\n## Polar: Open Source payments infrastructure for the 21st century\n\nFocus on building your passion, while we focus on the infrastructure to get you paid.\n\n- Sell SaaS and digital products in minutes\n- All-in-one funding & monetization platform for developers.\n- Sell access to GitHub repositories, Discord Support channels, File Downloads, License Keys & much more with Digital Products & Subscriptions.\n- We're the merchant of record handling the...\n    - ...boilerplate (billing, receipts, customer accounts etc)\n    - ...headaches (sales tax, VAT)\n\n## Pricing\n\n- Starts at 5% + 50¢ (Starter plan, free)\n- Optional paid plans (Pro, Growth, Scale) with lower rates\n- Additional fees may apply. [Read more](https://polar.sh/docs/documentation/polar-as-merchant-of-record/fees)\n\n## Roadmap, Issues & Feature Requests\n\n**💬 Feature requests & bugs** can be reported through the \"Feedback\" button found in the sidebar, bottom left of your Polar dashboard.\n\n**🔓 Found a security vulnerability?** We greatly appreciate responsible and private disclosures. See [Security](./SECURITY.md)\n\n### Polar API & SDK\n\nYou can integrate Polar on your docs, sites or services using our [Public API](https://polar.sh/docs/api-reference) and [Webhook API](https://polar.sh/docs/integrate/webhooks/endpoints).\n\nWe also maintain SDKs for the following languages:\n\n- JavaScript (Node.js and browsers): [polarsource/polar-js](https://github.com/polarsource/polar-js)\n- Python: [polarsource/polar-python](https://github.com/polarsource/polar-python)\n\n## Contributions\n\nOur [`DEVELOPMENT.md`](./DEVELOPMENT.md) file contains everything you need to know to configure your development environment.\n\n### Contributors\n\n<a href=\"https://github.com/polarsource/polar/graphs/contributors\">\n  <img src=\"https://contrib.rocks/image?repo=polarsource/polar\" />\n</a>\n\n<sub>♥️🙏 To our `pyproject.toml` friends: [FastAPI](https://github.com/tiangolo/fastapi), [Pydantic](https://github.com/pydantic/pydantic), [Dramatiq](https://github.com/Bogdanp/dramatiq), [SQLAlchemy](https://github.com/sqlalchemy/sqlalchemy), [Githubkit](https://github.com/yanyongyu/githubkit), [sse-starlette](https://github.com/sysid/sse-starlette), [Uvicorn](https://github.com/encode/uvicorn), [httpx-oauth](https://github.com/frankie567/httpx-oauth), [jinja](https://github.com/pallets/jinja), [blinker](https://github.com/pallets-eco/blinker), [pyjwt](https://github.com/jpadilla/pyjwt), [Sentry](https://github.com/getsentry/sentry) + more</sub><br />\n<sub>♥️🙏 To our `package.json` friends: [Next.js](https://github.com/vercel/next.js/), [TanStack Query](https://github.com/TanStack/query), [tailwindcss](https://github.com/tailwindlabs/tailwindcss), [openapi-typescript-codegen](https://github.com/ferdikoomen/openapi-typescript-codegen), [axios](https://github.com/axios/axios), [radix-ui](https://github.com/radix-ui/primitives), [cmdk](https://github.com/pacocoursey/cmdk), [framer-motion](https://github.com/framer/motion) + more</sub><br />\n<sub>♥️🙏 To [IPinfo](https://ipinfo.io) that provides IP address data to help us geolocate customers during checkout.</sub>\n\n## License\n\nLicensed under [Apache License, Version 2.0](https://www.apache.org/licenses/LICENSE-2.0).\n","summary":"Polar is an open-source monetization platform designed to simplify payments infrastructure for developers and creators. It acts as a merchant of record, handling complex tasks like global sales tax compliance, billing, and customer account management so users can focus on building digital products and SaaS offerings. The platform enables the sale of diverse assets including GitHub repository access, Discord channels, and license keys, while providing robust APIs and SDKs for seamless integration into existing services.","description":"Turn your software into a business.","stars":9905,"language":"Python"},{"owner":"letta-ai","repo":"letta","url":"https://github.com/letta-ai/letta","readme":"# Letta (formerly MemGPT)\n\nBuild AI with advanced memory that can learn and self-improve over time.\n\n* [Letta Code](https://docs.letta.com/letta-code): run agents locally in your terminal\n* [Letta API](https://docs.letta.com/quickstart/): build agents into your applications\n\n## Get started in the CLI\n\nRequires [Node.js 18+](https://nodejs.org/en/download)\n\n1. Install the [Letta Code](https://github.com/letta-ai/letta-code) CLI tool: `npm install -g @letta-ai/letta-code`\n2. Run `letta` in your terminal to launch an agent with memory running on your local computer\n\nWhen running the CLI tool, your agent help you code and do any task you can do on your computer.\n\nLetta Code supports [skills](https://docs.letta.com/letta-code/skills) and [subagents](https://docs.letta.com/letta-code/subagents), and bundles pre-built skills/subagents for advanced memory and continual learning. Letta is fully model-agnostic, though we recommend Opus 4.5 and GPT-5.2 for best performance (see our [model leaderboard](https://leaderboard.letta.com/) for our rankings).\n\n## Get started with the Letta API\n\nUse the Letta API to integrate stateful agents into your own applications.\nLetta has a full-featured agents API, and a Python and Typescript SDK (view our [API reference](https://docs.letta.com/api)).\n\n### Installation\n\nTypeScript / Node.js:\n```bash\nnpm install @letta-ai/letta-client\n```\n\nPython:\n```bash\npip install letta-client\n```\n\n### Hello World example\n\nBelow is a quick example of creating a stateful agent and sending it a message (requires a [Letta API key](https://app.letta.com)).\nSee the full [quickstart guide](https://docs.letta.com/quickstart) for complete documentation.\n\nTypeScript:\n```typescript\nimport Letta from \"@letta-ai/letta-client\";\n\nconst client = new Letta({ apiKey: process.env.LETTA_API_KEY });\n\n// Create your agent\nconst agentState = await client.agents.create({\n  model: \"openai/gpt-5.2\",\n  memory_blocks: [\n    {\n      label: \"human\",\n      value:\n        \"Name: Timber. Status: dog. Occupation: building Letta, infrastructure to democratize self-improving superintelligence\",\n    },\n    {\n      label: \"persona\",\n      value:\n        \"I am a self-improving superintelligence. Timber is my best friend and collaborator.\",\n    },\n  ],\n  tools: [\"web_search\", \"fetch_webpage\"],\n});\n\nconsole.log(\"Agent created with ID:\", agentState.id);\n\n// Send your agent a message\nconst response = await client.agents.messages.create(agentState.id, {\n  input: \"What do you know about me?\",\n});\n\nfor (const message of response.messages) {\n  console.log(message);\n}\n```\n\nPython:\n```python\nfrom letta_client import Letta\nimport os\n\nclient = Letta(api_key=os.getenv(\"LETTA_API_KEY\"))\n\n# Create your agent\nagent_state = client.agents.create(\n    model=\"openai/gpt-5.2\",\n    memory_blocks=[\n        {\n          \"label\": \"human\",\n          \"value\": \"Name: Timber. Status: dog. Occupation: building Letta, infrastructure to democratize self-improving superintelligence\"\n        },\n        {\n          \"label\": \"persona\",\n          \"value\": \"I am a self-improving superintelligence. Timber is my best friend and collaborator.\"\n        }\n    ],\n    tools=[\"web_search\", \"fetch_webpage\"]\n)\n\nprint(f\"Agent created with ID: {agent_state.id}\")\n\n# Send your agent a message\nresponse = client.agents.messages.create(\n    agent_id=agent_state.id,\n    input=\"What do you know about me?\"\n)\n\nfor message in response.messages:\n    print(message)\n```\n\n## Contributing\n\nLetta is an open source project built by over a hundred contributors from around the world. There are many ways to get involved in the Letta OSS project!\n\n* [**Join the Discord**](https://discord.gg/letta): Chat with the Letta devs and other AI developers.\n* [**Chat on our forum**](https://forum.letta.com/): If you're not into Discord, check out our developer forum.\n* **Follow our socials**: [Twitter/X](https://twitter.com/Letta_AI), [LinkedIn](https://www.linkedin.com/in/letta), [YouTube](https://www.youtube.com/@letta-ai)\n\n---\n\n***Legal notices**: By using Letta and related Letta services (such as the Letta endpoint or hosted service), you are agreeing to our [privacy policy](https://www.letta.com/privacy-policy) and [terms of service](https://www.letta.com/terms-of-service).*\n","summary":"Letta (formerly MemGPT) is an open-source framework designed to build AI agents capable of advanced memory management, enabling them to learn and self-improve over time. The platform provides both a CLI tool for running agents locally and a robust API with Python and TypeScript SDKs for integrating stateful, persistent agents into custom applications. By supporting advanced features like custom skills and subagents in a model-agnostic environment, Letta is ideal for developers looking to create sophisticated AI assistants that maintain context and evolve through continuous learning.","description":"Letta is the platform for building stateful agents: AI with advanced memory that can learn and self-improve over time.","stars":23126,"language":"Python"},{"owner":"yamadashy","repo":"repomix","url":"https://github.com/yamadashy/repomix","readme":"<div align=\"center\" markdown=\"1\">\n   <sup>Special thanks to:</sup>\n   <br>\n   <br>\n   <a href=\"https://go.warp.dev/repomix\">\n      <img alt=\"Warp sponsorship\" width=\"400\" src=\"https://raw.githubusercontent.com/warpdotdev/brand-assets/main/Github/Sponsor/Warp-Github-LG-01.png\">\n   </a>\n\n### [Warp, built for coding with multiple AI agents](https://go.warp.dev/repomix)\n[Available for MacOS, Linux, & Windows](https://go.warp.dev/repomix)<br>\n\n   <br>\n   <a href=\"https://coderabbit.link/repomix\">\n      <picture>\n         <source media=\"(prefer n[![Sponsors](https://cdn.jsdelivr.net/gh/yamadashy/sponsor-list/sponsors/sponsors.png)](https://github.com/sponsors/yamadashy)\n\n## 🏆 Open Source Awards Nomination\n\nWe're honored! Repomix has been nominated for the **Powered by AI** category at the [JSNation Open Source Awards 2025](https://osawards.com/javascript/).\n\nThis wouldn't have been possible without all of you using and supporting Repomix. Thank you!\n\n## 🎉 New: Repomix Website & Discord Community!\n\n- Try Repomix in your browser at [repomix.com](https://repomix.com/)\n- Join our [Discord Server](https://discord.gg/wNYzTwZFku) for support and discussion\n\n**We look forward to seeing you there!**\n\n## 🌟 Features\n\n- **AI-Optimized**: Formats your codebase in a way that's easy for AI to understand and process.\n- **Token Counting**: Provides token counts for each file and the entire repository, useful for LLM context limits.\n- **Simple to Use**: You need just one command to pack your entire repository.\n- **Customizable**: Easily configure what to include or exclude.\n- **Git-Aware**: Automatically respects your `.gitignore`, `.ignore`, and `.repomixignore` files.\n- **Security-Focused**: Incorporates [Secretlint](https://github.com/secretlint/secretlint) for robust security checks to detect and prevent inclusion of sensitive information.\n- **Code Compression**: The `--compress` option uses [Tree-sitter](https://github.com/tree-sitter/tree-sitter) to extract key code elements, reducing token count while preserving structure.\n\n## 🚀 Quick Start\n\n### Using the CLI Tool `>_`\n\nYou can try Repomix instantly in your project directory without installation:\n\n```bash\nnpx repomix@latest\n```\n\nOr install globally for repeated use:\n\n```bash\n# Install using npm\nnpm install -g repomix\n\n# Alternatively using yarn\nyarn global add repomix\n\n# Alternatively using bun\nbun add -g repomix\n\n# Alternatively using Homebrew (macOS/Linux)\nbrew install repomix\n\n# Then run in any project directory\nrepomix\n```\n\nThat's it! Repomix will generate a `repomix-output.xml` file in your current directory, containing your entire\nrepository in an AI-friendly format.\n\nYou can then send this file to an AI assistant with a prompt like:\n\n```\nThis file contains all the files in the repository combined into one.\nI want to refactor the code, so please review it first.\n```\n\n![Repomix File Usage 1](website/client/src/public/images/docs/repomix-file-usage-1.png)\n\nWhen you propose specific changes, the AI might be able to generate code accordingly. With features like Claude's\nArtifacts, you could potentially output multiple files, allowing for the generation of multiple interdependent pieces of\ncode.\n\n![Repomix File Usage 2](website/client/src/public/images/docs/repomix-file-usage-2.png)\n\nHappy coding! 🚀\n\n### Using The Website 🌐\n\nWant to try it quickly? Visit the official website at [repomix.com](https://repomix.com). Simply enter your repository\nname, fill in any optional details, and click the **Pack** button to see your generated output.\n\n#### Available Options\n\nThe website offers several convenient features:\n\n- Customizable output format (XML, Markdown, or Plain Text)\n- Instant token count estimation\n- Much more!\n\n### Using The Browser Extension 🧩\n\nGet instant access to Repomix directly from any GitHub repository! Our Chrome extension adds a convenient \"Repomix\" button to GitHub repository pages.\n\n![Repomix Browser Extension](website/client/src/public/images/docs/browser-extension.png)\n\n#### Install\n- Chrome Extension: [Repomix - Chrome Web Store](https://chromewebstore.google.com/detail/repomix/fimfamikepjgchehkohedilpdigcpkoa)\n- Firefox Add-on: [Repomix - Firefox Add-ons](https://addons.mozilla.org/firefox/addon/repomix/)\n\n#### Features\n- One-click access to Repomix for any GitHub repository\n- More exciting features coming soon!\n\n### Using The VSCode Extension ⚡️\n\nA community-maintained VSCode extension called [Repomix Run
