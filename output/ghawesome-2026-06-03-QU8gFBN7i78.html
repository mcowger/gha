<script id="project-data" type="application/json">[{"owner":"lavague-ai","repo":"LaVague","url":"https://github.com/lavague-ai/LaVague","readme":"<p align=\"center\">\r\n  <a href=\"https://github.com/lavague-ai/LaVague/stargazers\"><img src=\"https://img.shields.io/github/stars/lavague-ai/LaVague.svg?style=for-the-badge\" alt=\"Stargazers\"></a>\r\n  <a href=\"https://github.com/lavague-ai/LaVague/issues\"><img src=\"https://img.shields.io/github/issues/lavague-ai/LaVague.svg?style=for-the-badge\" alt=\"Issues\"></a>\r\n  <a href=\"https://github.com/lavague-ai/LaVague/network/members\"><img src=\"https://img.shields.io/github/forks/lavague-ai/LaVague.svg?style=for-the-badge\" alt=\"Forks\"></a>\r\n  <a href=\"https://github.com/lavague-ai/LaVague/graphs/contributors\"><img src=\"https://img.shields.io/github/contributors/lavague-ai/LaVague.svg?style=for-the-badge\" alt=\"Contributors\"></a>\r\n</p>\r\n</br>\r\n\r\n<div align=\"center\">\r\n  <img src=\"docs/assets/logo.png\" width=140px: alt=\"LaVague Logo\">\r\n  <h1>Welcome to LaVague</h1>\r\n\r\n<h4 align=\"center\">\r\n <a href=\"https://discord.gg/SDxn9KpqX9\" target=\"_blank\">\r\n    <img src=\"https://img.shields.io/badge/Discord-5865F2?style=for-the-badge&logo=discord&logoColor=white\" height='35px' alt=\"Join our Discord server!\">\r\n  </a>\r\n  <a href=\"https://docs.lavague.ai/en/latest/\"><img src=\"https://img.shields.io/badge/📄-docs-000000?style=for-the-badge&colorA=09c&colorB=555\" height='35px' alt=\"Docs\"></a>\r\n</h4>\r\n  <p>A Large Action Model framework for developing AI Web Agents\r\n</p>\r\n<h1></h1>\r\n</div>\r\n\r\n## LaVague: Web Agent framework for builders\r\n\r\nLaVague is an open-source framework designed for developers who want to create AI Web Agents to automate processes for their end users.\r\n\r\nOur Web Agents can take an objective, such as \"Print installation steps for Hugging Face's Diffusers library,\" and generate and perform the actions required to achieve the objective.\r\n\r\nLaVague Agents are made up of:\r\n\r\n- A World Model that takes an objective and the current state (aka the current web page) and outputs an appropriate set of instructions.\r\n- An Action Engine which “compiles” these instructions into action code, e.g., Selenium or Playwright & executes them\r\n\r\n\r\n### LaVague QA: Dedicated tooling for QA Engineers\r\n**🌊 Built on LaVague**\r\n\r\nLaVague QA is a tool tailored for QA engineers leveraging our framework. \r\n\r\nIt allows you to automate test writing by turning Gherkin specs into easy-to-integrate tests. LaVague QA is a project leveraging the LaVague framework behind the scenes to make web testing 10x more efficient.\r\n\r\nFor detailed information and setup instructions, visit the [LaVague QA documentation](https://docs.lavague.ai/en/latest/docs/lavague-qa/quick-tour/).\r\n\r\n## 🚀 Getting Started\r\n\r\n### Demo\r\n\r\nHere is an example of how LaVague can take multiple steps to achieve the objective of \"Go on the quicktour of PEFT\":\r\n\r\n<p align=\"center\">\r\n  <img src=\"./docs/assets/demo_agent_hf.gif\" alt=\"Demo for agent\">\r\n</p>\r\n\r\n### Hands-on \r\n\r\nYou can do this with the following steps:\r\n\r\n1. Download LaVague with:\r\n\r\n```bash\r\npip install lavague\r\n```\r\n2. Use our framework to build a Web Agent and implement the objective:\r\n\r\n```python\r\nfrom lavague.core import  WorldModel, ActionEngine\r\nfrom lavague.core.agents import WebAgent\r\nfrom lavague.drivers.selenium import SeleniumDriver\r\n\r\nselenium_driver = SeleniumDriver(headless=False)\r\nworld_model = WorldModel()\r\naction_engine = ActionEngine(selenium_driver)\r\nagent = WebAgent(world_model, action_engine)\r\nagent.get(\"https://huggingface.co/docs\")\r\nagent.run(\"Go on the quicktour of PEFT\")\r\n\r\n# Launch Gradio Agent Demo\r\nagent.demo(\"Go on the quicktour of PEFT\")\r\n```\r\n\r\nFor more information on this example and how to use LaVague, see our [quick-tour](https://docs.lavague.ai/en/latest/docs/get-started/quick-tour/).\r\n\r\n> Note, these examples use our default OpenAI API configuration and you will need to set the OPENAI_API_KEY variable in your local environment with a valid API key for these to work.\r\n\r\nFor an end-to-end example of LaVague in a Google Colab, see our [quick-tour notebook](https://colab.research.google.com/github/lavague-ai/lavague/blob/main/docs/docs/get-started/quick-tour-notebook/quick-tour.ipynb)\r\n\r\n## Key Features\r\n\r\n- ✅ [Built-in Contexts](https://docs.lavague.ai/en/latest/docs/get-started/customization/) (aka. configurations)\r\n- ✅ [Customizable configuration](https://docs.lavague.ai/en/latest/docs/get-started/customization/)\r\n- ✅ [A test runner](https://docs.lavague.ai/en/latest/docs/get-started/testing/) for testing and benchmarking the performance of LaVague\r\n- ✅ A [Token Counter](https://docs.lavague.ai/en/latest/docs/get-started/token-usage/) for estimating token usage and costs\r\n- ✅ [Logging tools](https://docs.lavague.ai/en/latest/docs/get-started/customization/)\r\n- ✅ An optional, interactive [Gradio interface](https://docs.lavague.ai/en/latest/docs/get-started/gradio/)\r\n- ✅ [Debugging tools](https://docs.lavague.ai/en/latest/docs/get-started/customization/)\r\n- ✅ [A Chrome Extension](https://docs.lavague.ai/en/latest/docs/get-started/docs-chrome/)\r\n\r\n## Supported Drivers\r\n\r\nWe support three Driver options:\r\n\r\n- A Selenium Webdriver\r\n- A Playwright webdriver\r\n- A Chrome extension driver\r\n\r\nNote that not all drivers support all agent features:\r\n\r\n| Feature                  | Selenium  | Playwright       | Chrome Extension                     |\r\n|--------------------------|-----------|------------------|--------------------------------------|\r\n| Headless agents    | ✅ | ⏳ | N/A |\r\n| Handle iframes     | ✅ | ✅ | ❌ |\r\n| Open several tabs  | ✅ | ⏳ | ✅  |\r\n| Highlight elements | ✅ | ✅  | ✅ |\r\n\r\n\r\n✅ supported  \r\n⏳ coming soon  \r\n❌ not supported \r\n\r\n## 🔎 Support\r\n\r\nIf you're experiencing any issues getting started with LaVague, you can:\r\n\r\n- Check out our [troubleshooting guide](https://docs.lavague.ai/en/latest/docs/get-started/troubleshoot/) where we list information and fixes for common issues.\r\n- Opening a [GitHub issue](https://github.com/lavague-ai/LaVague/issues) describing your issue\r\n- Messaging us in the '#support channel' on our [Discord](https://discord.gg/SDxn9KpqX9\") server\r\n\r\n## 🙋 Contributing\r\n\r\nWe would love your help and support on our quest to build a robust and reliable Large Action Model for web automation.\r\n\r\nTo avoid having multiple people working on the same things & being unable to merge your work, we have outlined the following contribution process:\r\n\r\n1) 📢 We outline tasks using [`GitHub issues`](https://github.com/lavague-ai/LaVague/issues): we recommend checking out issues with the [`help-wanted`](https:/github.com/lavague-ai/LaVague/labels/help%20wanted) & [`good first issue`](https://github.com/lavague-ai/LaVague/labels/good%20first%20issue) labels\r\n2) 🙋‍♀️ If you are interested in working on one of these tasks, comment on the issue! \r\n3) 🤝 We will discuss with you and assign you the task with a [`community assigned`](https://github.com/lavague-ai/LaVague/labels/community-assigned) label \r\n4) 💬 We will then be available to discuss this task with you\r\n5) ⬆️ You should submit your work as a PR\r\n6) ✅ We will review & merge your code or request changes/give feedback\r\n\r\nPlease check out our [`contributing guide`](https://docs.lavague.ai/en/latest/docs/contributing/contributing/) for more details.\r\n\r\n## 🗺️ Roadmap\r\n\r\nTo keep up to date with our project backlog [here](https://github.com/orgs/lavague-ai/projects/1/views/2).\r\n\r\n## 💰 How much does it cost to run an agent?\r\n\r\nLaVague uses LLMs, (by default OpenAI's `gpt4-o` but this is completely customizable), under the hood.\r\n\r\nThe cost of these LLM calls depends on: \r\n- the models chosen to run a given agent\r\n- the complexity of the objective\r\n- the website you're interacting with. \r\n\r\nPlease see our [dedicated documentation on token counting and cost estimations](https://docs.lavague.ai/en/latest/docs/get-started/token-usage/) to learn how you can track all tokens and estimate costs for running your agents.\r\n\r\n## 📈 Data collection\n\nWe want to build a dataset that can be used by the AI community to build better Large Action Models for better Web Agents. You can see our work so far on building community datasets on our [BigAction HuggingFace page](https://huggingface.co/BigAction).\n\nThis is why LaVague collects the following user data telemetry by default:\n\n- Version of LaVague installed\n- Code / List of actions generated for each web action step\n- The past actions\n- The \"observations\" (method used to check the current page)\n- LLM used (i.e GPT4)\n- Multi modal LLM used (i.e GPT4)\n- Randomly generated anonymous user ID\n- Whether you are using a CLI command (lavague-qa for example), the Gradio demo or our library directly.\n- The objective used \n- The chain of thoughts on the agent\n- The interaction zone on the page (bounding box)\n- The viewport size of your browser\n- The current step\n- The instruction(s) generated & the current engine used\n- The token costs & usages\n- The URL you performed an action on\n- Whether the action failed or succeeded\n- The extra used data specified\n- Error message, where relevant\n- The source nodes (chunks of HTML code retrieved from the web page to perform this action)\n\n**Be careful to NEVER includes personal information in your objectives and the extra user data. If you intend to includes personal information in your objectives/extra user data, it is HIGHLY recommended to turn off the telemetry.**\r\n\r\n### 🚫 Turn off all telemetry\r\n\r\nIf you want to turn off all telemetry, you should set the `LAVAGUE_TELEMETRY` environment variable to `\"NONE\"`.\r\n\r\nFor guidance on how to set your `LAVAGUE_TELEMTRY` environment variable, see our guide [here](https://docs.lavague.ai/en/latest/docs/get-started/FAQs/#how-can-i-set-environment-variables).\r\n","summary":"LaVague is an open-source framework designed to help developers build AI-powered web agents capable of automating complex tasks by navigating web pages. The project utilizes a modular architecture—consisting of a World Model for reasoning and an Action Engine for executing code via tools like Selenium or Playwright—to convert high-level objectives into actionable steps. This framework is an ideal solution for developers aiming to streamline user workflows and for QA engineers looking to accelerate test automation by converting Gherkin specifications into functional test code.","description":"Large Action Model framework to develop AI Web Agents","stars":6362,"language":"Python"},{"owner":"tiangolo","repo":"full-stack-fastapi-template","url":"https://github.com/tiangolo/full-stack-fastapi-template","readme":"# Full Stack FastAPI Template\n\n<a href=\"https://github.com/fastapi/full-stack-fastapi-template/actions?query=workflow%3A%22Test+Docker+Compose%22\" target=\"_blank\"><img src=\"https://github.com/fastapi/full-stack-fastapi-template/workflows/Test%20Docker%20Compose/badge.svg\" alt=\"Test Docker Compose\"></a>\n<a href=\"https://github.com/fastapi/full-stack-fastapi-template/actions?query=workflow%3A%22Test+Backend%22\" target=\"_blank\"><img src=\"https://github.com/fastapi/full-stack-fastapi-template/workflows/Test%20Backend/badge.svg\" alt=\"Test Backend\"></a>\n<a href=\"https://coverage-badge.samuelcolvin.workers.dev/redirect/fastapi/full-stack-fastapi-template\" target=\"_blank\"><img src=\"https://coverage-badge.samuelcolvin.workers.dev/fastapi/full-stack-fastapi-template.svg\" alt=\"Coverage\"></a>\n\n## Technology Stack and Features\n\n- ⚡ [**FastAPI**](https://fastapi.tiangolo.com) for the Python backend API.\n  - 🧰 [SQLModel](https://sqlmodel.tiangolo.com) for the Python SQL database interactions (ORM).\n  - 🔍 [Pydantic](https://docs.pydantic.dev), used by FastAPI, for the data validation and settings management.\n  - 💾 [PostgreSQL](https://www.postgresql.org) as the SQL database.\n- 🚀 [React](https://react.dev) for the frontend.\n  - 💃 Using TypeScript, hooks, [Vite](https://vitejs.dev), and other parts of a modern frontend stack.\n  - 🎨 [Tailwind CSS](https://tailwindcss.com) and [shadcn/ui](https://ui.shadcn.com) for the frontend components.\n  - 🤖 An automatically generated frontend client.\n  - 🧪 [Playwright](https://playwright.dev) for End-to-End testing.\n  - 🦇 Dark mode support.\n- 🐋 [Docker Compose](https://www.docker.com) for development and production.\n- 🔒 Secure password hashing by default.\n- 🔑 JWT (JSON Web Token) authentication.\n- 📫 Email based password recovery.\n- 📬 [Mailcatcher](https://mailcatcher.me) for local email testing during development.\n- ✅ Tests with [Pytest](https://pytest.org).\n- 📞 [Traefik](https://traefik.io) as a reverse proxy / load balancer.\n- 🚢 Deployment instructions using Docker Compose, including how to set up a frontend Traefik proxy to handle automatic HTTPS certificates.\n- 🏭 CI (continuous integration) and CD (continuous deployment) based on GitHub Actions.\n\n### Dashboard Login\n\n[![API docs](img/login.png)](https://github.com/fastapi/full-stack-fastapi-template)\n\n### Dashboard - Admin\n\n[![API docs](img/dashboard.png)](https://github.com/fastapi/full-stack-fastapi-template)\n\n### Dashboard - Items\n\n[![API docs](img/dashboard-items.png)](https://github.com/fastapi/full-stack-fastapi-template)\n\n### Dashboard - Dark Mode\n\n[![API docs](img/dashboard-dark.png)](https://github.com/fastapi/full-stack-fastapi-template)\n\n### Interactive API Documentation\n\n[![API docs](img/docs.png)](https://github.com/fastapi/full-stack-fastapi-template)\n\n## How To Use It\n\nYou can **just fork or clone** this repository and use it as is.\n\n✨ It just works. ✨\n\n### How to Use a Private Repository\n\nIf you want to have a private repository, GitHub won't allow you to simply fork it as it doesn't allow changing the visibility of forks.\n\nBut you can do the following:\n\n- Create a new GitHub repo, for example `my-full-stack`.\n- Clone this repository manually, set the name with the name of the project you want to use, for example `my-full-stack`:\n\n```bash\ngit clone git@github.com:fastapi/full-stack-fastapi-template.git my-full-stack\n```\n\n- Enter into the new directory:\n\n```bash\ncd my-full-stack\n```\n\n- Set the new origin to your new repository, copy it from the GitHub interface, for example:\n\n```bash\ngit remote set-url origin git@github.com:octocat/my-full-stack.git\n```\n\n- Add this repo as another \"remote\" to allow you to get updates later:\n\n```bash\ngit remote add upstream git@github.com:fastapi/full-stack-fastapi-template.git\n```\n\n- Push the code to your new repository:\n\n```bash\ngit push -u origin master\n```\n\n### Update From the Original Template\n\nAfter cloning the repository, and after doing changes, you might want to get the latest changes from this original template.\n\n- Make sure you added the original repository as a remote, you can check it with:\n\n```bash\ngit remote -v\n\norigin    git@github.com:octocat/my-full-stack.git (fetch)\norigin    git@github.com:octocat/my-full-stack.git (push)\nupstream    git@github.com:fastapi/full-stack-fastapi-template.git (fetch)\nupstream    git@github.com:fastapi/full-stack-fastapi-template.git (push)\n```\n\n- Pull the latest changes without merging:\n\n```bash\ngit pull --no-commit upstream master\n```\n\nThis will download the latest changes from this template without committing them, that way you can check everything is right before committing.\n\n- If there are conflicts, solve them in your editor.\n\n- Once you are done, commit the changes:\n\n```bash\ngit merge --continue\n```\n\n### Configure\n\nYou can then update configs in the `.env` files to customize your configurations.\n\nBefore deploying it, make sure you change at least the values for:\n\n- `SECRET_KEY`\n- `FIRST_SUPERUSER_PASSWORD`\n- `POSTGRES_PASSWORD`\n\nYou can (and should) pass these as environment variables from secrets.\n\nRead the [deployment.md](./deployment.md) docs for more details.\n\n### Generate Secret Keys\n\nSome environment variables in the `.env` file have a default value of `changethis`.\n\nYou have to change them with a secret key, to generate secret keys you can run the following command:\n\n```bash\npython -c \"import secrets; print(secrets.token_urlsafe(32))\"\n```\n\nCopy the content and use that as password / secret key. And run that again to generate another secure key.\n\n## How To Use It - Alternative With Copier\n\nThis repository also supports generating a new project using [Copier](https://copier.readthedocs.io).\n\nIt will copy all the files, ask you configuration questions, and update the `.env` files with your answers.\n\n### Install Copier\n\nYou can install Copier with:\n\n```bash\npip install copier\n```\n\nOr better, if you have [`pipx`](https://pipx.pypa.io/), you can run it with:\n\n```bash\npipx install copier\n```\n\n**Note**: If you have `pipx`, installing copier is optional, you could run it directly.\n\n### Generate a Project With Copier\n\nDecide a name for your new project's directory, you will use it below. For example, `my-awesome-project`.\n\nGo to the directory that will be the parent of your project, and run the command with your project's name:\n\n```bash\ncopier copy https://github.com/fastapi/full-stack-fastapi-template my-awesome-project --trust\n```\n\nIf you have `pipx` and you didn't install `copier`, you can run it directly:\n\n```bash\npipx run copier copy https://github.com/fastapi/full-stack-fastapi-template my-awesome-project --trust\n```\n\n**Note** the `--trust` option is necessary to be able to execute a [post-creation script](https://github.com/fastapi/full-stack-fastapi-template/blob/master/.copier/update_dotenv.py) that updates your `.env` files.\n\n### Input Variables\n\nCopier will ask you for some data, you might want to have at hand before generating the project.\n\nBut don't worry, you can just update any of that in the `.env` files afterwards.\n\nThe input variables, with their default values (some auto generated) are:\n\n- `project_name`: (default: `\"FastAPI Project\"`) The name of the project, shown to API users (in .env).\n- `stack_name`: (default: `\"fastapi-project\"`) The name of the stack used for Docker Compose labels and project name (no spaces, no periods) (in .env).\n- `secret_key`: (default: `\"changethis\"`) The secret key for the project, used for security, stored in .env, you can generate one with the method above.\n- `first_superuser`: (default: `\"admin@example.com\"`) The email of the first superuser (in .env).\n- `first_superuser_password`: (default: `\"changethis\"`) The password of the first superuser (in .env).\n- `smtp_host`: (default: \"\") The SMTP server host to send emails, you can set it later in .env.\n- `smtp_user`: (default: \"\") The SMTP server user to send emails, you can set it later in .env.\n- `smtp_password`: (default: \"\") The SMTP server password to send emails, you can set it later in .env.\n- `emails_from_email`: (default: `\"info@example.com\"`) The email account to send emails from, you can set it later in .env.\n- `postgres_password`: (default: `\"changethis\"`) The password for the PostgreSQL database, stored in .env, you can generate one with the method above.\n- `sentry_dsn`: (default: \"\") The DSN for Sentry, if you are using it, you can set it later in .env.\n\n## Backend Development\n\nBackend docs: [backend/README.md](./backend/README.md).\n\n## Frontend Development\n\nFrontend docs: [frontend/README.md](./frontend/README.md).\n\n## Deployment\n\nDeployment docs: [deployment.md](./deployment.md).\n\n## Development\n\nGeneral development docs: [development.md](./development.md).\n\nThis includes using Docker Compose, custom local domains, `.env` configurations, etc.\n\n## Release Notes\n\nCheck the file [release-notes.md](./release-notes.md).\n\n## License\n\nThe Full Stack FastAPI Template is licensed under the terms of the MIT license.\n","summary":"The Full Stack FastAPI Template provides a production-ready boilerplate for building modern web applications using a FastAPI backend and a React frontend. It comes pre-configured with essential features like PostgreSQL integration, JWT authentication, secure password management, and automatic API documentation. Developers will also benefit from built-in CI/CD pipelines, Docker Compose support for easy deployment, and comprehensive testing tools like Pytest and Playwright. This project is ideal for developers looking to rapidly bootstrap a scalable, secure, and fully-featured application without the overhead of manual infrastructure setup.","description":"Full stack, modern web application template. Using FastAPI, React, SQLModel, PostgreSQL, Docker, GitHub Actions, automatic HTTPS and more.","stars":43480,"language":"TypeScript"},{"owner":"suyu-emu","repo":"suyu","url":"https://github.com/suyu-emu/suyu","readme":null,"summary":null,"description":null,"stars":null,"language":null,"error":"No README found"},{"owner":"geekan","repo":"MetaGPT","url":"https://github.com/geekan/MetaGPT","readme":"\n# MetaGPT: The Multi-Agent Framework\n\n<p align=\"center\">\n<a href=\"\"><img src=\"docs/resources/MetaGPT-new-log.png\" alt=\"MetaGPT logo: Enable GPT to work in a software company, collaborating to tackle more complex tasks.\" width=\"150px\"></a>\n</p>\n\n<p align=\"center\">\n[ <b>En</b> |\n<a href=\"docs/README_CN.md\">中</a> |\n<a href=\"docs/README_FR.md\">Fr</a> |\n<a href=\"docs/README_JA.md\">日</a> ]\n<b>Assign different roles to GPTs to form a collaborative entity for complex tasks.</b>\n</p>\n\n<p align=\"center\">\n<a href=\"https://opensource.org/licenses/MIT\"><img src=\"https://img.shields.io/badge/License-MIT-blue.svg\" alt=\"License: MIT\"></a>\n<a href=\"https://discord.gg/DYn29wFk9z\"><img src=\"https://img.shields.io/badge/Join-Discord-gGnrXvVz7a?logo=discord\" alt=\"Discord Follow\"></a>\n<a href=\"https://twitter.com/MetaGPT_\"><img src=\"https://img.shields.io/twitter/follow/MetaGPT?style=social\" alt=\"Twitter Follow\"></a>\n</p>\n\n<h4 align=\"center\">\n    \n</h4>\n\n## News\n\n🚀 Mar. 10, 2025: 🎉 [mgx.dev](https://mgx.dev/) is the #1 Product of the Week on @ProductHunt! 🏆\n\n🚀 Mar. &nbsp; 4, 2025: 🎉 [mgx.dev](https://mgx.dev/) is the #1 Product of the Day on @ProductHunt! 🏆\n\n🚀 Feb. 19, 2025: Today we are officially launching our natural language programming product: [MGX (MetaGPT X)](https://mgx.dev/) - the world's first AI agent development team. More details on [Twitter](https://x.com/MetaGPT_/status/1892199535130329356).\n\n🚀 Feb. 17, 2025: We introduced two papers: [SPO](https://arxiv.org/pdf/2502.06855) and [AOT](https://arxiv.org/pdf/2502.12018), check the [code](examples)!\n\n🚀 Jan. 22, 2025: Our paper [AFlow: Automating Agentic Workflow Generation](https://openreview.net/forum?id=z5uVAKwmjf) accepted for **oral presentation (top 1.8%)** at ICLR 2025, **ranking #2** in the LLM-based Agent category.\n\n👉👉 [Earlier news](docs/NEWS.md) \n\n## Software Company as Multi-Agent System\n\n1. MetaGPT takes a **one line requirement** as input and outputs **user stories / competitive analysis / requirements / data structures / APIs / documents, etc.**\n2. Internally, MetaGPT includes **product managers / architects / project managers / engineers.** It provides the entire process of a **software company along with carefully orchestrated SOPs.**\n   1. `Code = SOP(Team)` is the core philosophy. We materialize SOP and apply it to teams composed of LLMs.\n\n![A software company consists of LLM-based roles](docs/resources/software_company_cd.jpeg)\n\n<p align=\"center\">Software Company Multi-Agent Schematic (Gradually Implementing)</p>\n\n## Get Started\n\n### Installation\n\n> Ensure that Python 3.9 or later, but less than 3.12, is installed on your system. You can check this by using: `python --version`.  \n> You can use conda like this: `conda create -n metagpt python=3.9 && conda activate metagpt`\n\n```bash\npip install --upgrade metagpt\n# or `pip install --upgrade git+https://github.com/geekan/MetaGPT.git`\n# or `git clone https://github.com/geekan/MetaGPT && cd MetaGPT && pip install --upgrade -e .`\n```\n\n**Install [node](https://nodejs.org/en/download) and [pnpm](https://pnpm.io/installation#using-npm) before actual use.**\n\nFor detailed installation guidance, please refer to [cli_install](https://docs.deepwisdom.ai/main/en/guide/get_started/installation.html#install-stable-version)\n or [docker_install](https://docs.deepwisdom.ai/main/en/guide/get_started/installation.html#install-with-docker)\n\n### Configuration\n\nYou can init the config of MetaGPT by running the following command, or manually create `~/.metagpt/config2.yaml` file:\n```bash\n# Check https://docs.deepwisdom.ai/main/en/guide/get_started/configuration.html for more details\nmetagpt --init-config  # it will create ~/.metagpt/config2.yaml, just modify it to your needs\n```\n\nYou can configure `~/.metagpt/config2.yaml` according to the [example](https://github.com/geekan/MetaGPT/blob/main/config/config2.example.yaml) and [doc](https://docs.deepwisdom.ai/main/en/guide/get_started/configuration.html):\n\n```yaml\nllm:\n  api_type: \"openai\"  # or azure / ollama / groq etc. Check LLMType for more options\n  model: \"gpt-4-turbo\"  # or gpt-3.5-turbo\n  base_url: \"https://api.openai.com/v1\"  # or forward url / other llm url\n  api_key: \"YOUR_API_KEY\"\n```\n\n### Usage\n\nAfter installation, you can use MetaGPT at CLI\n\n```bash\nmetagpt \"Create a 2048 game\"  # this will create a repo in ./workspace\n```\n\nor use it as library\n\n```python\nfrom metagpt.software_company import generate_repo\nfrom metagpt.utils.project_repo import ProjectRepo\n\nrepo: ProjectRepo = generate_repo(\"Create a 2048 game\")  # or ProjectRepo(\"<path>\")\nprint(repo)  # it will print the repo structure with files\n```\n\nYou can also use [Data Interpreter](https://github.com/geekan/MetaGPT/tree/main/examples/di) to write code:\n\n```python\nimport asyncio\nfrom metagpt.roles.di.data_interpreter import DataInterpreter\n\nasync def main():\n    di = DataInterpreter()\n    await di.run(\"Run data analysis on sklearn Iris dataset, include a plot\")\n\nasyncio.run(main())  # or await main() in a jupyter notebook setting\n```\n\n\n### QuickStart & Demo Video\n- Try it on [MetaGPT Huggingface Space](https://huggingface.co/spaces/deepwisdom/MetaGPT-SoftwareCompany)\n- [Matthew Berman: How To Install MetaGPT - Build A Startup With One Prompt!!](https://youtu.be/uT75J_KG_aY)\n- [Official Demo Video](https://github.com/geekan/MetaGPT/assets/2707039/5e8c1062-8c35-440f-bb20-2b0320f8d27d)\n\nhttps://github.com/user-attachments/assets/888cb169-78c3-4a42-9d62-9d90ed3928c9\n\n## Tutorial\n\n- 🗒 [Online Document](https://docs.deepwisdom.ai/main/en/)\n- 💻 [Usage](https://docs.deepwisdom.ai/main/en/guide/get_started/quickstart.html)  \n- 🔎 [What can MetaGPT do?](https://docs.deepwisdom.ai/main/en/guide/get_started/introduction.html)\n- 🛠 How to build your own agents? \n  - [MetaGPT Usage & Development Guide | Agent 101](https://docs.deepwisdom.ai/main/en/guide/tutorials/agent_101.html)\n  - [MetaGPT Usage & Development Guide | MultiAgent 101](https://docs.deepwisdom.ai/main/en/guide/tutorials/multi_agent_101.html)\n- 🧑‍💻 Contribution\n  - [Develop Roadmap](docs/ROADMAP.md)\n- 🔖 Use Cases\n  - [Data Interpreter](https://docs.deepwisdom.ai/main/en/guide/use_cases/agent/interpreter/intro.html)\n  - [Debate](https://docs.deepwisdom.ai/main/en/guide/use_cases/multi_agent/debate.html)\n  - [Researcher](https://docs.deepwisdom.ai/main/en/guide/use_cases/agent/researcher.html)\n  - [Receipt Assistant](https://docs.deepwisdom.ai/main/en/guide/use_cases/agent/receipt_assistant.html)\n- ❓ [FAQs](https://docs.deepwisdom.ai/main/en/guide/faq.html)\n\n## Support\n\n### Discord Join US\n\n📢 Join Our [Discord Channel](https://discord.gg/ZRHeExS6xv)! Looking forward to seeing you there! 🎉\n\n### Contributor form\n\n📝 [Fill out the form](https://airtable.com/appInfdG0eJ9J4NNL/pagK3Fh1sGclBvVkV/form) to become a contributor. We are looking forward to your participation!\n\n### Contact Information\n\nIf you have any questions or feedback about this project, please feel free to contact us. We highly appreciate your suggestions!\n\n- **Email:** alexanderwu@deepwisdom.ai\n- **GitHub Issues:** For more technical inquiries, you can also create a new issue in our [GitHub repository](https://github.com/geekan/metagpt/issues).\n\nWe will respond to all questions within 2-3 business days.\n\n## Citation\n\nTo stay updated with the latest research and development, follow [@MetaGPT_](https://twitter.com/MetaGPT_) on Twitter. \n\nTo cite [MetaGPT](https://openreview.net/forum?id=VtmBAGCN7o) in publications, please use the following BibTeX entries.   \n\n```bibtex\n@inproceedings{hong2024metagpt,\n      title={Meta{GPT}: Meta Programming for A Multi-Agent Collaborative Framework},\n      author={Sirui Hong and Mingchen Zhuge and Jonathan Chen and Xiawu Zheng and Yuheng Cheng and Jinlin Wang and Ceyao Zhang and Zili Wang and Steven Ka Shing Yau and Zijuan Lin and Liyang Zhou and Chenyu Ran and Lingfeng Xiao and Chenglin Wu and J{\\\"u}rgen Schmidhuber},\n      booktitle={The Twelfth International Conference on Learning Representations},\n      year={2024},\n      url={https://openreview.net/forum?id=VtmBAGCN7o}\n}\n```\n\nFor more work, please refer to [Academic Work](docs/ACADEMIC_WORK.md).\n","summary":"MetaGPT is a multi-agent framework that orchestrates large language models into specialized roles to simulate a complete software company. By utilizing standardized operating procedures (SOPs), the system takes a simple one-line requirement and automates the production of complex deliverables like user stories, technical architecture, API designs, and source code. This project is ideal for developers and organizations looking to streamline complex software development workflows through collaborative, AI-driven automation.","description":"🌟 The Multi-Agent Framework: First AI Software Company, Towards Natural Language Programming","stars":68481,"language":"Python"},{"owner":"Pythagora-io","repo":"gpt-pilot","url":"https://github.com/Pythagora-io/gpt-pilot","readme":"<div align=\"center\">\n\n# 🧑‍✈️ GPT PILOT 🧑‍✈️\n\n</div>\n\n---\n\n<div align=\"center\">\n\n[![Discord](https://img.shields.io/badge/Discord-Join%20Us-5865F2?style=social&logo=discord)](https://discord.gg/HaqXugmxr9)\n[![GitHub Repo stars](https://img.shields.io/github/stars/Pythagora-io/gpt-pilot?style=social)](https://github.com/Pythagora-io/gpt-pilot)\n[![Twitter Follow](https://img.shields.io/twitter/follow/PythagoraAI?style=social)](https://x.com/PythagoraAI)\n\n</div>\n\n---\n\n<div align=\"center\">\n<a href=\"https://www.ycombinator.com/\" target=\"_blank\"><img src=\"https://s3.amazonaws.com/assets.pythagora.ai/yc/PNG/Black.png\" alt=\"Pythagora-io%2Fgpt-pilot | Trendshift\" style=\"width: 250px; height: 93px;\"/></a>\n</div>\n<br>\n<div align=\"center\">\n<a href=\"https://trendshift.io/repositories/466\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/466\" alt=\"Pythagora-io%2Fgpt-pilot | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/></a>\n</div>\n\n<br>\n<br>\n\n<div align=\"center\">\n   \n### GPT Pilot doesn't just generate code, it builds apps!\n\n</div>\n\n<div align=\"center\">\n\nThis repo is not being maintained anymore.\n\n# Visit [Pythagora.ai](https://www.pythagora.ai/) for more info\n\n</div>\n\n---\n<div align=\"center\">\n\n[![See it in action](https://img.youtube.com/vi/o1nEvwjKziw/0.jpg)]([https://youtu.be/4g-1cPGK0GA](https://www.youtube.com/watch?v=o1nEvwjKziw))\n\n(click to open the video in YouTube) (1:04min)\n\n</div>\n\n---\n\n<div align=\"center\">\n\n<a href=\"https://marketplace.visualstudio.com/items?itemName=PythagoraTechnologies.pythagora-vs-code\" target=\"_blank\"><img src=\"https://github.com/Pythagora-io/gpt-pilot/assets/10895136/5792143e-77c7-47dd-ad96-6902be1501cd\" alt=\"Pythagora-io%2Fgpt-pilot | Trendshift\" style=\"width: 185px; height: 55px;\" width=\"185\" height=\"55\"/></a>\n\n</div>\n\nGPT Pilot is the core technology for the [Pythagora VS Code extension](https://marketplace.visualstudio.com/items?itemName=PythagoraTechnologies.pythagora-vs-code) that aims to provide **the first real AI developer companion**. Not just an autocomplete or a helper for PR messages but rather a real AI developer that can write full features, debug them, talk to you about issues, ask for review, etc.\n\n---\n\n📫 If you would like to get updates on future releases or just get in touch, join our [Discord server](https://discord.gg/HaqXugmxr9) or you [can add your email here](http://eepurl.com/iD6Mpo). 📬\n\n---\n\n<!-- TOC -->\n* [🔌 Requirements](#-requirements)\n* [🚦How to start using gpt-pilot?](#how-to-start-using-gpt-pilot)\n* [🔎 Examples](#-examples)\n* [🐳 How to start gpt-pilot in docker?](#-how-to-start-gpt-pilot-in-docker)\n* [🧑‍💻️ CLI arguments](#-cli-arguments)\n* [🏗 How GPT Pilot works?](#-how-gpt-pilot-works)\n* [🕴How's GPT Pilot different from _Smol developer_ and _GPT engineer_?](#hows-gpt-pilot-different-from-smol-developer-and-gpt-engineer)\n* [🍻 Contributing](#-contributing)\n* [🔗 Connect with us](#-connect-with-us)\n* [🌟 Star history](#-star-history)\n<!-- TOC -->\n\n---\n\nGPT Pilot aims to research how much LLMs can be utilized to generate fully working, production-ready apps while the developer oversees the implementation.\n\n**The main idea is that AI can write most of the code for an app (maybe 95%), but for the rest, 5%, a developer is and will be needed until we get full AGI**.\n\nIf you are interested in our learnings during this project, you can check [our latest blog posts](https://blog.pythagora.ai/2024/02/19/gpt-pilot-what-did-we-learn-in-6-months-of-working-on-a-codegen-pair-programmer/).\n\n---\n\n<br>\n\n<div align=\"center\">\n\n### **[👉 Examples of apps written by GPT Pilot 👈](https://github.com/Pythagora-io/gpt-pilot/wiki/Apps-created-with-GPT-Pilot)**\n\n</div>\n<br>\n\n---\n\n# 🔌 Requirements\n\n- **Python 3.9+**\n\n# 🚦How to start using gpt-pilot?\n👉 If you are using VS Code as your IDE, the easiest way to start is by downloading [GPT Pilot VS Code extension](https://bit.ly/3IeZxp6). 👈\n\nOtherwise, you can use the CLI tool.\n\n### If you're new to GPT Pilot:\n\nAfter you have Python and (optionally) PostgreSQL installed, follow these steps:\n\n1. `git clone https://github.com/Pythagora-io/gpt-pilot.git` (clone the repo)\n2. `cd gpt-pilot` (go to the repo folder)\n3. `python3 -m venv venv` (create a virtual environment)\n4. `source venv/bin/activate` (or on Windows `venv\\Scripts\\activate`) (activate the virtual environment)\n5. `pip install -r requirements.txt` (install the dependencies)\n6. `cp example-config.json config.json` (create `config.json` file)\n7. Set your key and other settings in `config.json` file:\n   - LLM Provider (`openai`, `anthropic` or `groq`) key and endpoints (leave `null` for default) (note that Azure and OpenRouter are suppored via the `openai` setting)\n   - Your API key (if `null`, will be read from the environment variables)\n   - database settings: sqlite is used by default, PostgreSQL should also work\n   - optionally update `fs.ignore_paths` and add files or folders which shouldn't be tracked by GPT Pilot in workspace, useful to ignore folders created by compilers\n8. `python main.py` (start GPT Pilot)\n\nAll generated code will be stored in the folder `workspace` inside the folder named after the app name you enter upon starting the pilot.\n\n# 🔎 [Examples](https://github.com/Pythagora-io/gpt-pilot/wiki/Apps-created-with-GPT-Pilot)\n\n[Click here](https://github.com/Pythagora-io/gpt-pilot/wiki/Apps-created-with-GPT-Pilot) to see all example apps created with GPT Pilot.\n\n### PostgreSQL support\n\nGPT Pilot uses built-in SQLite database by default. If you want to use the PostgreSQL database, you need to additional install `asyncpg` and `psycopg2` packages:\n\n```bash\npip install asyncpg psycopg2\n```\n\nThen, you need to update the `config.json` file to set `db.url` to `postgresql+asyncpg://<user>:<password>@<db-host>/<db-name>`.\n\n# 🧑‍💻️ CLI arguments\n\n### List created projects (apps)\n\n```bash\npython main.py --list\n```\n\nNote: for each project (app), this also lists \"branches\". Currently we only support having one branch (called \"main\"), and in the future we plan to add support for multiple project branches.\n\n### Load and continue from the latest step in a project (app)\n\n```bash\npython main.py --project <app_id>\n```\n\n### Load and continue from a specific step in a project (app)\n\n```bash\npython main.py --project <app_id> --step <step>\n```\n\nWarning: this will delete all progress after the specified step!\n\n### Delete project (app)\n\n```bash\npython main.py --delete <app_id>\n```\n\nDelete project with the specified `app_id`. Warning: this cannot be undone!\n\n### Other command-line options\n\nThere are several other command-line options that mostly support calling GPT Pilot from our VSCode extension. To see all the available options, use the `--help` flag:\n\n```bash\npython main.py --help\n```\n\n# 🏗 How GPT Pilot works?\nHere are the steps GPT Pilot takes to create an app:\n\n1. You enter the app name and the description.\n2. **Product Owner agent** like in real life, does nothing. :)\n3. **Specification Writer agent** asks a couple of questions to understand the requirements better if project description is not good enough.\n4. **Architect agent** writes up technologies that will be used for the app and checks if all technologies are installed on the machine and installs them if not.\n5. **Tech Lead agent** writes up development tasks that the Developer must implement.\n6. **Developer agent** takes each task and writes up what needs to be done to implement it. The description is in human-readable form.\n7. **Code Monkey agent** takes the Developer's description and the existing file and implements the changes.\n8. **Reviewer agent** reviews every step of the task and if something is done wrong Reviewer sends it back to Code Monkey.\n9. **Troubleshooter agent** helps you to give good feedback to GPT Pilot when something is wrong.\n10. **Debugger agent** hate to see him, but he is your best friend when things go south.\n11. **Technical Writer agent** writes documentation for the project.\n\n<br>\n\n# 🕴How's GPT Pilot different from _Smol developer_ and _GPT engineer_?\n\n- **GPT Pilot works with the developer to create a fully working production-ready app** - I don't think AI can (at least in the near future) create apps without a developer being involved. So, **GPT Pilot codes the app step by step** just like a developer would in real life. This way, it can debug issues as they arise throughout the development process. If it gets stuck, you, the developer in charge, can review the code and fix the issue. Other similar tools give you the entire codebase at once - this way, bugs are much harder to fix for AI and for you as a developer.\n  <br><br>\n- **Works at scale** - GPT Pilot isn't meant to create simple apps but rather so it can work at any scale. It has mechanisms that filter out the code, so in each LLM conversation, it doesn't need to store the entire codebase in context, but it shows the LLM only the relevant code for the current task it's working on. Once an app is finished, you can continue working on it by writing instructions on what feature you want to add.\n\n# 🍻 Contributing\nIf you are interested in contributing to GPT Pilot, join [our Discord server](https://discord.gg/HaqXugmxr9), check out open [GitHub issues](https://github.com/Pythagora-io/gpt-pilot/issues), and see if anything interests you. We would be happy to get help in resolving any of those. The best place to start is by reviewing blog posts mentioned above to understand how the architecture works before diving into the codebase.\n\n## 🖥 Development\nOther than the research, GPT Pilot needs to be debugged to work in different scenarios. For example, we realized that the quality of the code generated is very sensitive to the size of the development task. When the task is too broad, the code has too many bugs that are hard to fix, but when the development task is too narrow, GPT also seems to struggle in getting the task implemented into the existing code.\n\n## 📊 Telemetry\nTo improve GPT Pilot, we are tracking some events from which you can opt out at any time. You can read more about it [here](./docs/TELEMETRY.md).\n\n# 🔗 Connect with us\n🌟 As an open-source tool, it would mean the world to us if you starred the GPT-pilot repo 🌟\n\n💬 Join [the Discord server](https://discord.gg/HaqXugmxr9) to get in touch.\n","summary":"GPT Pilot is an AI-driven development tool designed to function as an autonomous pair programmer capable of building entire applications rather than just generating code snippets. It features advanced capabilities such as writing complete features, debugging issues, and interacting with human developers to refine implementation and review progress. This project is ideal for software developers looking to accelerate their workflow by delegating up to 95% of routine coding tasks to an intelligent assistant that handles the heavy lifting of full-stack development.","description":"The first real AI developer","stars":33749,"language":"Python"},{"owner":"krahets","repo":"hello-algo","url":"https://github.com/krahets/hello-algo","readme":"<p align=\"center\">\n  <a href=\"https://www.hello-algo.com/\">\n    <img src=\"https://www.hello-algo.com/index.assets/hello_algo_header.png\" width=\"450\"></a>\n</p>\n\n<p align=\"center\">\n  <img style=\"height: 60px;\" src=\"https://readme-typing-svg.demolab.com?font=Noto+Sans+SC&weight=400&duration=3500&pause=2000&color=21C8B8&center=true&vCenter=true&random=false&width=200&lines=Hello%2C+%E7%AE%97%E6%B3%95+!\" alt=\"hello-algo-typing-svg\" />\n  </br>\n  动画图解、一键运行的数据结构与算法教程\n</p>\n\n<p align=\"center\">\n  <a href=\"https://www.hello-algo.com/\">\n    <img src=\"https://www.hello-algo.com/index.assets/btn_read_online_dark.svg\" height=\"45\"></a>\n  <a href=\"https://github.com/krahets/hello-algo/releases\">\n    <img src=\"https://www.hello-algo.com/index.assets/btn_download_pdf_epub_dark.svg\" height=\"45\"></a>\n</p>\n\n<p align=\"center\">\n  <img src=\"https://www.hello-algo.com/index.assets/animation.gif\" width=\"395\">\n  <img src=\"https://www.hello-algo.com/index.assets/running_code.gif\" width=\"395\">\n</p>\n\n<p align=\"center\">\n  <img src=\"https://img.shields.io/badge/Python-snow?logo=python&logoColor=3776AB\" alt=\"\" />\n  <img src=\"https://img.shields.io/badge/Java-snow?logo=coffeescript&logoColor=FC4C02\" alt=\"\" />\n  <img src=\"https://img.shields.io/badge/C%2B%2B-snow?logo=c%2B%2B&logoColor=00599C\" alt=\"\" />\n  <img src=\"https://img.shields.io/badge/C-snow?logo=c&logoColor=A8B9CC\" alt=\"\" />\n  <img src=\"https://img.shields.io/badge/C%23-snow?logo=csharp&logoColor=512BD4\" alt=\"\" />\n  <img src=\"https://img.shields.io/badge/JavaScript-snow?logo=javascript&logoColor=E9CE30\" alt=\"\" />\n  <img src=\"https://img.shields.io/badge/Go-snow?logo=go&logoColor=00ADD8\" alt=\"\" />\n  <img src=\"https://img.shields.io/badge/Swift-snow?logo=swift&logoColor=F05138\" alt=\"\" />\n  <img src=\"https://img.shields.io/badge/Rust-snow?logo=rust&logoColor=000000\" alt=\"\" />\n  <img src=\"https://img.shields.io/badge/Ruby-snow?logo=ruby&logoColor=CC342D\" alt=\"\" />\n  <img src=\"https://img.shields.io/badge/Kotlin-snow?logo=kotlin&logoColor=7F52FF\" alt=\"\" />\n  <img src=\"https://img.shields.io/badge/TypeScript-snow?logo=typescript&logoColor=3178C6\" alt=\"\" />\n  <img src=\"https://img.shields.io/badge/Dart-snow?logo=dart&logoColor=0175C2\" alt=\"\" />\n</p>\n\n<p align=\"center\">\n  简体中文\n  ｜\n  <a href=\"https://github.com/krahets/hello-algo/blob/main/zh-hant/README.md\">繁體中文</a>\n  ｜\n  <a href=\"https://github.com/krahets/hello-algo/blob/main/en/README.md\">English</a>\n  ｜\n  <a href=\"https://github.com/krahets/hello-algo/blob/main/ja/README.md\">日本語</a>\n  ｜\n  <a href=\"https://github.com/krahets/hello-algo/blob/main/ru/README.md\">Русский</a>\n</p>\n\n## 关于本书\n\n本项目旨在打造一本开源免费、新手友好的数据结构与算法入门教程。\n\n- 全书采用动画图解，内容清晰易懂、学习曲线平滑，引导初学者探索数据结构与算法的知识地图。\n- 源代码可一键运行，帮助读者在练习中提升编程技能，了解算法工作原理和数据结构底层实现。\n- 提倡读者互助学习，欢迎大家在评论区提出问题与分享见解，在交流讨论中共同进步。\n\n若本书对您有所帮助，请在页面右上角点个 Star :star: 支持一下，谢谢！\n\n## 推荐语\n\n> “一本通俗易懂的数据结构与算法入门书，引导读者手脑并用地学习，强烈推荐算法初学者阅读。”\n>\n> **—— 邓俊辉，清华大学计算机系教授**\n\n> “如果我当年学数据结构与算法的时候有《Hello 算法》，学起来应该会简单 10 倍！”\n>\n> **—— 李沐，亚马逊资深首席科学家**\n\n## 鸣谢\n\n<p align=\"left\">\n  <a href=\"https://go.warp.dev/hello-algo\">\n    <img src=\"https://github.com/warpdotdev/brand-assets/blob/main/Github/Sponsor/Warp-Github-LG-02.png\" alt=\"Warp-Github-LG-02\" width=\"500\"></a>\n</p>\n\n[Warp is built for coding with multiple AI agents.](https://go.warp.dev/hello-algo)\n\n强烈推荐 Warp 终端，高颜值 + 好用的 AI，体验非常棒！\n\n## 贡献\n\n本开源书仍在持续更新之中，欢迎您参与本项目，一同为读者提供更优质的学习内容。\n\n- [内容修正](https://www.hello-algo.com/chapter_appendix/contribution/)：请您协助修正或在评论区指出语法错误、内容缺失、文字歧义、无效链接或代码 bug 等问题。\n- [代码转译](https://github.com/krahets/hello-algo/issues/15)：期待您贡献各种语言代码，已支持 Python、Java、C++、Go、JavaScript 等 12 门编程语言。\n- 翻译审阅：欢迎您参与本项目的多语言翻译与校对工作，帮助更多读者用母语学习数据结构与算法。\n\n欢迎您提出宝贵意见和建议，如有任何问题请提交 Issues 或微信联系 `krahets-jyd` 。\n\n感谢本开源书的每一位撰稿人，是他们的无私奉献让这本书变得更好，他们是：\n\n<p align=\"left\">\n    <a href=\"https://github.com/krahets/hello-algo/graphs/contributors\">\n        <img width=\"770\" src=\"https://contrib.rocks/image?repo=krahets/hello-algo&max=300&columns=16\" />\n    </a>\n</p>\n\n## License\n\nThe texts, code, images, photos, and videos in this repository are licensed under [CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/).\n","summary":"Hello-Algo is an open-source, beginner-friendly educational project designed to teach data structures and algorithms through intuitive, animated visualizations. The tutorial features code examples in over a dozen programming languages that can be executed directly, allowing users to bridge the gap between theoretical concepts and practical implementation. It is an ideal resource for computer science students and self-taught programmers looking for a smooth, highly visual learning curve to master fundamental algorithmic skills.","description":"《Hello 算法》：动画图解、一键运行的数据结构与算法教程。支持简中、繁中、English、日本語，提供 Python, Java, C++, C, C#, JS, Go, Swift, Rust, Ruby, Kotlin, TS, Dart 等代码实现","stars":126523,"language":"Java"},{"owner":"teableio","repo":"teable","url":"https://github.com/teableio/teable","readme":"<div align=\"center\">\n  <h1 align=\"center\">\n    <picture>\n      <source media=\"(prefers-color-scheme: dark)\" srcset=\"static/assets/images/teable-vertical-dark.png\">\n      <img alt=\"teable logo\" height=\"150\" src=\"static/assets/images/teable-vertical-light.png\">\n    </picture>\n  </h1>\n  <h3 align=\"center\"><strong>Manage Your Data & Connect Your Team</strong></h3>\n  <p>Teable uses a simple, spreadsheet-like interface to create powerful database applications. Collaborate with your team in real-time, and scale to millions of rows\n  <p>Try out Teable using our hosted version at <a href=\"https://teable.ai\">teable.ai</a></p>\n</div>\n\n<div align=\"center\">\n<a href=\"https://trendshift.io/repositories/8516\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/8516\" alt=\"teableio%2Fteable | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/></a>\n</div>\n\n<p align=\"center\">\n  <a target=\"_blank\" href=\"https://teable.ai\">Home</a> | <a target=\"_blank\" href=\"https://help.teable.ai\">Help</a> | <a target=\"_blank\" href=\"https://teable.ai/blog\">Blog</a> | <a target=\"_blank\" href=\"https://teable.ai/templates\">Template</a> | <a target=\"_blank\" href=\"https://help.teable.ai/en/api-doc/token\">API</a> | <a target=\"_blank\" href=\"https://community.teable.ai\">Community</a> | <a target=\"_blank\" href=\"https://twitter.com/teableio\">Twitter</a>\n</p>\n\n<p align=\"center\">\n  <a aria-label=\"Build\" href=\"https://github.com/teableio/teable/actions?query=Build%20and%20Push%20to%20Docker%20Registry\">\n    <img alt=\"build\" src=\"https://img.shields.io/github/actions/workflow/status/teableio/teable/docker-push.yml?label=Build&logo=github&style=flat-quare&labelColor=000000\" />\n  </a>\n  <a aria-label=\"Coverage Status\" href=\"https://coveralls.io/github/teableio/teable?branch=develop\">\n    <img alt=\"Coverage\" src=\"https://coveralls.io/repos/github/teableio/teable/badge.svg?branch=develop\" />\n  </a>\n  <a aria-label=\"Codacy grade\" href=\"https://www.codacy.com/gh/teableio/teable/dashboard?utm_source=github.com&amp;utm_medium=referral&amp;utm_content=teableio/teable&amp;utm_campaign=Badge_Grade\">\n    <img alt=\"Codacy grade\" src=\"https://img.shields.io/codacy/grade/dff9c944af284a0fad4e165eb1727467?logo=codacy&style=flat-square&labelColor=000&label=Codacy\">\n  </a>\n  <a aria-label=\"Top language\" href=\"https://github.com/teableio/teable/search?l=typescript\">\n    <img alt=\"GitHub top language\" src=\"https://img.shields.io/github/languages/top/teableio/teable?style=flat-square&labelColor=000&color=blue\">\n  </a>\n  <a aria-label=\"Gurubase\" href=\"https://gurubase.io/g/teable\">\n    <img alt=\"Gurubase\" src=\"https://img.shields.io/badge/Gurubase-Ask%20Teable%20Guru-006BFF\" />\n  </a>\n</p>\n  <h1 align=\"center\">\n    <picture>\n      <source media=\"(prefers-color-scheme: dark)\" srcset=\"static/assets/images/teable-interface-dark.png\">\n      <img alt=\"teable interface\" width=\"100%\" src=\"static/assets/images/teable-interface-light.png\">\n    </picture>\n  </h1>\n\n## Quick Guide\n\n1. Looking for a quick experience? Select a scenario from the [template center](https://app.teable.ai/public/template) and click \"Use this template\".\n2. Seeking high performance? Try the [1 million rows demo](https://app.teable.ai/share/shrVgdLiOvNQABtW0yX/view) to feel the speed of Teable.\n3. Interested in deploying it yourself? Click [Deploy on Railway](https://railway.app/template/wada5e?referralCode=rE4BjB)\n\n## ✨Features\n\n### 🍺 Feature Packed\n\nEverything you need, right out of the box:\n\n- [x] Aggregation\n- [x] Attachments Preview\n- [x] Batch Editing\n- [x] Charts\n- [x] Comments\n- [x] Custom Columns\n- [x] Field Conversion\n- [x] Filtering\n- [x] Formatting\n- [x] Formula Support\n- [x] Grouping\n- [x] History\n- [x] Import/Export\n- [x] Millions of Rows\n- [x] Plugins\n- [x] Real-time\n- [x] Search\n- [x] Sorting\n- [x] SQL Query\n- [x] Undo/Redo\n- [x] Validation\n\n### 🏞️ Multiple Views\n\nVisualize and interact with data in various ways best suited for their specific tasks.\n\n- [x] Grid View\n- [x] Form View\n- [x] Kanban View\n- [x] Gallery View\n- [x] Calendar View\n\n<table align=\"center\" style=\"width: 100%;\">\n  <tr>\n    <td width=\"50%\"><img alt=\"Grid View\" src=\"static/assets/images/view-grid.png\"></td>\n    <td width=\"50%\"><img alt=\"Search\" src=\"static/assets/images/search.png\"></td>\n  </tr>\n  <tr>\n    <td width=\"50%\"><img alt=\"Calendar View\" src=\"static/assets/images/view-calendar.png\"></td>\n    <td width=\"50%\"><img alt=\"Gallery View\" src=\"static/assets/images/view-gallery.png\"></td>\n  </tr>\n  <tr>\n    <td width=\"50%\"><img alt=\"Kanban View\" src=\"static/assets/images/view-kanban.png\"></td>\n    <td width=\"50%\"><img alt=\"Form View\" src=\"static/assets/images/view-form.png\"></td>\n  </tr>\n  <tr>\n    <td width=\"50%\"><img alt=\"Comments\" src=\"static/assets/images/comments.png\"></td>\n    <td width=\"50%\"><img alt=\"Record history\" src=\"static/assets/images/record-history.png\"></td>\n  </tr>\n</table>\n\nMore features have been added. See our <a target=\"_blank\" href=\"https://help.teable.ai/en/changelog\">Changelog</a>.\n\n---\n\n# Structure\n\n[![Open in Gitpod](https://img.shields.io/badge/Open%20In-Gitpod.io-%231966D2?style=for-the-badge&logo=gitpod)](https://gitpod.io/#https://github.com/teableio/teable)\n\n```\n.\n├── apps (AGPL 3.0)\n│   ├── nextjs-app          (front-end)\n│   └── nestjs-backend      (backend)\n├── packages (MIT)\n│   ├── common-i18n         (locales)\n│   ├── core                (share code and interface)\n│   ├── sdk                 (sdk for extensions)\n│   ├── db-main-prisma      (schema, migrations, prisma client)\n│   ├── eslint-config-bases (to shared eslint configs)\n│   └── ui-lib              (ui component)\n└── plugins (AGPL 3.0)      (custom plugins)\n\n```\n\n## Deploy\n\n### Deploy With Docker\n\n```sh\ncd dockers/examples/standalone/\ndocker-compose up -d\n```\n\nfor more details, see [install teable](https://help.teable.ai/en/deploy/docker)\n\n### One Click Deployment\n\nThese platforms are easy to deploy with one click and come with free credits.\n\n[![Deploy on Railway](https://railway.app/button.svg)](https://railway.app/template/wada5e?referralCode=rE4BjB)\n\n[![Deploy on Sealos](https://sealos.io/Deploy-on-Sealos.svg)](https://template.sealos.io/deploy?templateName=teable)\n\n[![Deploy on Zeabur](https://zeabur.com/button.svg)](https://zeabur.com/templates/QF8695)\n\n[![Deploy to RepoCloud](https://d16t0pc4846x52.cloudfront.net/deploylobe.svg)](https://repocloud.io/details/?app_id=273)\n\n[![Deploy on Elestio](https://elest.io/images/logos/deploy-to-elestio-btn.png)](https://elest.io/open-source/teable)\n\n[![Deploy on AlibabaCloud ComputeNest](https://service-info-public.oss-cn-hangzhou.aliyuncs.com/computenest-en.svg)](https://computenest.console.aliyun.com/service/instance/create/default?ServiceName=Teable%20%E7%A4%BE%E5%8C%BA%E7%89%88)\n\n## Development\n\n#### 1. Initialize\n\n```sh\n# Enabling the Help Management Package Manager\ncorepack enable\n\n# Install project dependencies\npnpm install\n```\n\n#### 2. Initialize Postgres\n\n```sh\nmake switch-db-mode\n```\n\n#### 3. Custom Environment Variables（Optional）\n\n```sh\ncd apps/nextjs-app\ncp .env.development .env.development.local\n```\n\n#### 4. Run Dev Server\n\nyou just need to start backend, it will start next server for frontend automatically, file change will be auto reload\n\n```sh\ncd apps/nestjs-backend\npnpm dev\n```\n\nBy default, the plugin development server is not started. To preview and develop plugins, run:\n\n```sh\n# build packages\npnpm build:packages\n\n# start plugin development server\ncd plugins\npnpm dev\n```\n\nThis will start the plugin development server on port 3002.\n\n## Why Teable?\n\nNo-code tools have significantly speed up how we get things done, allowing non-tech users to build amazing apps and changing the way many work and live. People like using spreadsheet-like UI to handle their data because it's easy, flexible, and great for team collaboration. They also prefer designing their app screens without being stuck with clunky templates.\n\nGiving non-techy people the ability to create their software sounds exciting. But that's just the start:\n\n- As businesses expand, their data needs intensify. No one wishes to hear that once their orders reach 100k, they'll outgrow their current interface. Yet, many no-code platforms falter at such scales.\n- Most no-code platforms are cloud-based. This means your important data sits with the provider, and switching to another platform can be a headache.\n- Sometimes, no-code tools can't do what you want because of their limitations, leaving users stuck.\n- If a tool becomes essential, you'll eventually need some tech expertise. But developers often find these platforms tricky.\n- Maintaining systems with complex setups can be hard for developers, especially if these aren't built using common software standards.\n- Systems that don't use these standards might need revamping or replacing, costing more in the long run. It might even mean ditching the no-code route and going back to traditional coding.\n\n#### What We Think the Future Of No-code Products Look Like\n\n- An interface that anyone can use to build applications easily.\n- Easy access to data, letting users grab, move, and reuse their information as they wish.\n- Data privacy and choice, whether that's in the cloud, on-premise, or even just on your local.\n- It needs to work for developers too, not just non-tech users.\n- It should handle lots of data, so it can grow with your business.\n- Flexibility to integrate with other software, combining strengths to get the job done.\n- Last, native AI integration to takes usability to the next level.\n\nIn essence, Teable isn't just another no-code solution, it's a comprehensive answer to the evolving demands of modern software development, ensuring that everyone, regardless of their technical proficiency, has a platform tailored to their needs.\n\n# License\n\nTeable Community Edition (CE) is free for self-hosting under the AGPL license. See [./LICENSE](./LICENSE) for details.\n\nTeable Enterprise Edition (EE) includes advanced features such as AI, authority matrix, automation and advanced admin. For detailed information and pricing, please visit [pricing](https://teable.ai/pricing).\n","summary":"Teable is an open-source, high-performance database platform that provides a user-friendly, spreadsheet-like interface for building data-driven applications. It supports complex data operations, including formula support, SQL queries, and advanced visualization tools, all while remaining capable of scaling to manage millions of rows in real-time. This project is ideal for teams and developers who require a flexible, collaborative environment to organize information and streamline their workflows without sacrificing backend power.","description":"✨ The Next Gen Airtable Alternative: No-Code Postgres","stars":21287,"language":"TypeScript"},{"owner":"CapSoftware","repo":"cap","url":"https://github.com/CapSoftware/cap","readme":"<p align=\"center\">\n\t<img width=\"150\" height=\"150\" src=\"https://github.com/CapSoftware/Cap/blob/main/apps/desktop/src-tauri/icons/Square310x310Logo.png\" alt=\"Cap logo\">\n</p>\n\n<h1 align=\"center\">Cap</h1>\n\n<p align=\"center\">\n\tBeautiful, shareable screen recordings. Open source, fast, and built for teams that want to own their data.\n</p>\n\n<p align=\"center\">\n\t<a href=\"https://cap.so\">Website</a>\n\t |\n\t<a href=\"https://cap.so/download\">Download</a>\n\t |\n\t<a href=\"https://cap.so/docs\">Docs</a>\n\t |\n\t<a href=\"https://cap.so/pricing\">Pricing</a>\n\t |\n\t<a href=\"https://cap.link/discord\">Discord</a>\n</p>\n\n<p align=\"center\">\n\t<a href=\"https://console.algora.io/org/CapSoftware/bounties?status=open\">\n\t\t<img src=\"https://img.shields.io/endpoint?url=https%3A%2F%2Fconsole.algora.io%2Fapi%2Fshields%2FCapSoftware%2Fbounties%3Fstatus%3Dopen\" alt=\"Open bounties\">\n\t</a>\n</p>\n\n<img src=\"https://raw.githubusercontent.com/CapSoftware/Cap/refs/heads/main/apps/web/public/landing-cover.png\" alt=\"Cap app preview\">\n\nCap is the open source alternative to Loom. It gives you fast screen recording, polished local editing, instant share links, comments, transcripts, analytics, team workspaces, custom domains, custom S3 storage, and full self-hosting when you need complete control.\n\nUse Cap for product demos, bug reports, onboarding, tutorials, design reviews, engineering walkthroughs, async standups, client updates, and any moment where showing the work is faster than scheduling another call.\n\n## Why Cap\n\n- **Record, edit, share.** Capture your screen, camera, and microphone, then share a link or export a finished video.\n- **Instant Mode for speed.** Upload while recording and get a shareable link the moment you stop.\n- **Studio Mode for polish.** Record locally, edit with backgrounds, zooms, trimming, captions, and export controls.\n- **Desktop apps for your team.** Cap runs on macOS and Windows, with a web dashboard for viewing, sharing, and managing recordings.\n- **Own your storage.** Use Cap Cloud, connect your own S3-compatible bucket, keep recordings local, or self-host the full platform.\n- **Privacy by default.** Share publicly or privately, add passwords, use your own domain, or keep sensitive recordings off hosted infrastructure.\n- **Async collaboration.** Comments, reactions, transcripts, viewer analytics, and team workspaces keep feedback attached to the video.\n- **Cap AI.** Generate titles, summaries, clickable chapters, captions, and transcripts automatically.\n- **Move from Loom.** Import existing Loom videos into Cap and keep your library in one place.\n\n## Recording Modes\n\n| Mode | Best for | How it works |\n| --- | --- | --- |\n| Instant Mode | Fast feedback, bug reports, async updates | Cap uploads while you record, then gives you a share link as soon as recording stops. |\n| Studio Mode | Product demos, tutorials, launches, client work | Cap records locally, opens the editor, and lets you export or share a polished video. |\n\n## Data Ownership\n\nCap is designed for people and teams who do not want their recording workflow locked inside a black box.\n\n- Use Cap Cloud for the fastest hosted experience.\n- Connect AWS S3, Cloudflare R2, Backblaze B2, MinIO, Wasabi, or another S3-compatible provider.\n- Serve share pages from your own domain.\n- Self-host Cap Web, the API, database, media server, and object storage with Docker Compose.\n- Point Cap Desktop at your self-hosted instance from `Settings > Cap Server URL`.\n\n## Get Started\n\nFor most users, the fastest path is:\n\n1. Download Cap for macOS or Windows from [cap.so/download](https://cap.so/download).\n2. Sign in or create an account.\n3. Choose Instant Mode or Studio Mode.\n4. Record your first Cap.\n5. Share the link, export the file, or keep it local.\n\nThe full product docs live at [cap.so/docs](https://cap.so/docs).\n\n## Self-Hosting\n\nThe fastest way to self-host Cap Web is Docker Compose:\n\n```bash\ngit clone https://github.com/CapSoftware/Cap.git\ncd Cap\ndocker compose up -d\n```\n\nCap will be available at `http://localhost:3000`.\n\nLogin links appear in the service logs when email is not configured:\n\n```bash\ndocker compose logs cap-web\n```\n\n### Deployment Options\n\n| Method | Best for |\n| --- | --- |\n| Docker Compose | VPS, home servers, and any Docker-capable host |\n| [Railway](https://railway.com/new/template/PwpGcf) | One-click managed hosting |\n| Coolify | Self-hosted PaaS deployments with `docker-compose.coolify.yml` |\n\n[![Deploy on Railway](https://railway.com/button.svg)](https://railway.com/new/template/PwpGcf)\n\nFor production, configure public URLs and replace the default secrets before exposing the deployment to the internet:\n\n```bash\nCAP_URL=https://cap.yourdomain.com\nS3_PUBLIC_URL=https://s3.yourdomain.com\n```\n\nSee the [self-hosting guide](https://cap.so/docs/self-hosting) for email setup, AI providers, SSL, storage, production hardening, and troubleshooting.\n\n## Local Development\n\nCap is a Turborepo monorepo with Rust, TypeScript, Tauri, SolidStart, Next.js, Drizzle, MySQL, Tailwind CSS, and shared media crates.\n\nRequirements:\n\n- Node.js 20 or newer\n- pnpm 10.5.2\n- Rust 1.88 or newer\n- Docker for MySQL, MinIO, and local services\n\nInstall and set up the repo:\n\n```bash\npnpm install\npnpm env-setup\npnpm cap-setup\n```\n\nCommon commands:\n\n| Command | Purpose |\n| --- | --- |\n| `pnpm dev` | Start the full local development stack |\n| `pnpm dev:web` | Start the web app without the desktop app |\n| `pnpm dev:desktop` | Start the desktop app |\n| `pnpm build` | Build the workspace |\n| `pnpm tauri:build` | Build the desktop release |\n| `pnpm lint` | Run Biome linting |\n| `pnpm format` | Format with Biome |\n| `pnpm typecheck` | Run TypeScript project references |\n| `cargo test -p <crate>` | Run Rust tests for a crate |\n\nDatabase commands:\n\n| Command | Purpose |\n| --- | --- |\n| `pnpm db:generate` | Generate database artifacts |\n| `pnpm db:push` | Push schema changes |\n| `pnpm db:studio` | Open Drizzle Studio |\n\n## Repository Map\n\n| Path | What lives there |\n| --- | --- |\n| `apps/desktop` | Tauri v2 desktop app with SolidStart UI and Rust backend |\n| `apps/web` | Next.js web app for marketing, docs, dashboard, sharing, API routes, and auth |\n| `apps/cli` | Rust CLI |\n| `apps/media-server` | Media processing service used by the web app |\n| `apps/discord-bot` | Discord integration |\n| `packages/database` | Drizzle schema and database access |\n| `packages/ui` | Shared React UI |\n| `packages/ui-solid` | Shared Solid UI |\n| `packages/web-backend` | Backend service layer |\n| `packages/web-domain` | Web domain models and types |\n| `packages/env` | Environment validation |\n| `packages/sdk-embed` | Embed SDK |\n| `packages/sdk-recorder` | Recorder SDK |\n| `crates/*` | Recording, capture, camera, audio, encoding, rendering, muxing, export, and test crates |\n| `scripts/*` | Setup, analytics, build, and maintenance tooling |\n| `infra/*` | Infrastructure configuration |\n\nThe web API uses Effect and `@effect/platform` HTTP APIs. Desktop capture and export paths are backed by Rust crates for fast recording, rendering, and platform-specific media access.\n\n## Analytics\n\nCap uses [Tinybird](https://www.tinybird.co) for viewer telemetry dashboards. Set `TINYBIRD_ADMIN_TOKEN` or `TINYBIRD_TOKEN` before running analytics commands.\n\n| Command | Purpose |\n| --- | --- |\n| `pnpm analytics:setup` | Deploy Tinybird datasources and pipes from `scripts/analytics/tinybird` |\n| `pnpm analytics:check` | Validate that the Tinybird workspace matches the app expectations |\n\n`analytics:setup` can remove Tinybird resources outside the checked-in analytics configuration. Use it only against the workspace you intend to manage from this repo.\n\n## Contributing\n\nCap is built in public. Issues, pull requests, design feedback, bug reports, docs fixes, and bounties are welcome.\n\n- Read [CONTRIBUTING.md](CONTRIBUTING.md) before opening a pull request.\n- Join the community on [Discord](https://cap.link/discord).\n- Check open bounties on [Algora](https://console.algora.io/org/CapSoftware/bounties?status=open).\n\n## License\n\nPortions of this software are licensed as follows:\n\n- Code in the `cap-camera*` and `scap-*` crate families is licensed under the MIT License. See [licenses/LICENSE-MIT](https://github.com/CapSoftware/Cap/blob/main/licenses/LICENSE-MIT).\n- Third-party components are licensed under the original license provided by their owner.\n- All other content not mentioned above is available under the AGPLv3 license as defined in [LICENSE](https://github.com/CapSoftware/Cap/blob/main/LICENSE).\n","summary":"Cap is an open-source, privacy-focused alternative to Loom designed for high-quality screen recording and asynchronous team collaboration. It offers versatile workflows through \"Instant Mode\" for rapid sharing and \"Studio Mode\" for professional-grade local editing, AI-powered transcriptions, and advanced analytics. The platform is ideal for product teams, developers, and designers who require full control over their data, offering flexible options for custom S3 storage, private domains, and complete self-hosting via Docker.","description":"Open source Loom alternative. Beautiful, shareable screen recordings.","stars":19331,"language":"TypeScript"},{"owner":"diezo","repo":"Ensta","url":"https://github.com/diezo/Ensta","readme":"# Ensta - Simple Instagram API\n[![PyPI](https://img.shields.io/pypi/v/ensta)](https://pypi.org/project/ensta)\n[![PyPI - Python Version](https://img.shields.io/pypi/pyversions/ensta)]()\n[![Downloads](https://static.pepy.tech/badge/ensta)](https://pepy.tech/project/ensta)\n\n![Logo](https://raw.githubusercontent.com/diezo/Ensta/master/assets/image.jpg)\n\nEnsta is a simple, reliable and up-to-date python package for Instagram API.\n\nBoth **authenticated** and **anonymous** requests are supported.\n\n[<img style=\"margin-top: 10px\" src=\"https://raw.githubusercontent.com/diezo/Ensta/master/assets/coffee.svg\" width=\"180\"/>](https://buymeacoffee.com/sonii)\n\n<!-- ### Python & Instagram Automation Services\nI'm available for freelance work in Python development with a focus on Instagram automation. If you have a project that requires expertise in automating tasks on Instagram, feel free to contact me at **sonniiii@outlook.com** or message me on discord [**@gitdiezo**](https://discordapp.com/users/1183040947035062382). -->\n\n## Revive the Project! 🌟\nContribute to ensta and help revive the project for future updates and maintainance.\n\n[<img src=\"https://raw.githubusercontent.com/diezo/Ensta/master/assets/coffee.svg\" width=\"170\"/>](https://buymeacoffee.com/sonii)\n\n## Installation\nRead the [**pre-requisites**](https://github.com/diezo/Ensta/wiki/Pre%E2%80%90requisites) here.\n\n    pip install ensta\n\n## Example\nFetching profile info by username:\n```python\nfrom ensta import Mobile\n\nmobile = Mobile(username, password)\n\nprofile = mobile.profile(\"leomessi\")\n\nprint(profile.full_name)\nprint(profile.biography)\nprint(profile.profile_pic_url)\n```\n\n## Features\nThese features use the **Mobile API**.\n\n<details>\n\n<summary>Using Proxies</summary><br>\n\nWhen to use a proxy:\n- You're being rate limited.\n- Ensta is not working because your Home IP is flagged.\n- You're deploying Ensta to the cloud. (Instagram blocks requests from IPs of cloud providers, so a proxy must be used)\n\n```python\nfrom ensta import Mobile\n\nmobile = Mobile(\n    username,\n    password,\n    proxy={\n        \"http\": \"socks5://username:password@host:port\",\n        \"https\": \"socks5://username:password@host:port\"\n    }\n)\n```\n\nEnsta uses the same proxy settings as the **requests** module.\n\n</details>\n\n<details>\n\n<summary>Username-Password Login</summary><br>\n\nUsername is recommended to sign in. However, email can also be used.\n\n```python\nfrom ensta import Mobile\n\n# Recommended\nmobile = Mobile(username, password)\n\n# This also works\nmobile = Mobile(email, password)\n```\n\n</details>\n\n<details>\n\n<summary>Change Profile Picture</summary><br>\n\n```python\nfrom ensta import Mobile\n\nmobile = Mobile(username, password)\n\nmobile.change_profile_picture(\"image.jpg\")\n```\n\n</details>\n\n<details>\n\n<summary>Fetch Profile Information</summary><br>\n\n```python\nfrom ensta import Mobile\n\nmobile = Mobile(username, password)\n\nprofile = mobile.profile(\"leomessi\")\n\nprint(profile.full_name)\nprint(profile.biography)\nprint(profile.follower_count)\n```\n\n</details>\n\n<details>\n\n<summary>Follow/Unfollow Account</summary><br>\n\n```python\nfrom ensta import Mobile\n\nmobile = Mobile(username, password)\n\nmobile.follow(\"leomessi\")\nmobile.unfollow(\"leomessi\")\n```\n\n</details>\n\n<details>\n\n<summary>Change Biography</summary><br>\n\n```python\nfrom ensta import Mobile\n\nmobile = Mobile(username, password)\n\nmobile.change_biography(\"New bio here.\")\n```\n\n</details>\n\n<details>\n\n<summary>Switch to Private/Public Account</summary><br>\n\n```python\nfrom ensta import Mobile\n\nmobile = Mobile(username, password)\n\nmobile.switch_to_private_account()\nmobile.switch_to_public_account()\n```\n\n</details>\n\n<details>\n\n<summary>Username to UserID / UserID to Username</summary><br>\n\n```python\nfrom ensta import Mobile\n\nmobile = Mobile(username, password)\n\nmobile.username_to_userid(\"leomessi\")\nmobile.userid_to_username(\"12345678\")\n```\n\n</details>\n\n<details>\n\n<summary>Like/Unlike Post</summary><br>\n\n```python\nfrom ensta import Mobile\n\nmobile = Mobile(username, password)\n\nmobile.like(media_id)\nmobile.unlike(media_id)\n```\n\n</details>\n\n<details>\n\n<summary>Fetch Followers/Followings</summary><br>\n\n```python\nfrom ensta import Mobile\n\nmobile = Mobile(username, password)\n\nfollowers = mobile.followers(\"leomessi\")\nfollowings = mobile.followings(\"leomessi\")\n\nfor user in followers.list:\n    print(user.full_name)\n\nfor user in followings.list:\n    print(user.full_name)\n\n# Fetching next chunk\nfollowers = mobile.followers(\n    \"leomessi\",\n    next_cursor=followers.next_cursor\n)\n```\n\n</details>\n\n<details>\n\n<summary>Add Comment to Post</summary><br>\n\n```python\nfrom ensta import Mobile\n\nmobile = Mobile(username, password)\n\nmobile.comment(\"Hello\", media_id)\n```\n\n</details>\n\n<details>\n\n<summary>Upload Photo</summary><br>\n\n```python\nfrom ensta import Mobile\n\nmobile = Mobile(username, password)\n\nmobile.upload_photo(\n    upload_id=upload_id,\n    caption=\"Hello\"\n)\n```\n\n</details>\n\n<details>\n\n<summary>Upload Sidecar (Multiple Photos)</summary><br>\n\n```python\nfrom ensta import Mobile\nfrom ensta.structures import SidecarChild\n\nmobile = Mobile(username, password)\n\nmobile.upload_sidecar(\n    children=[\n        SidecarChild(uploda_id),\n        SidecarChild(uploda_id),\n        SidecarChild(uploda_id)\n    ],\n    caption=\"Hello\"\n)\n```\n\n</details>\n\n<details>\n\n<summary>Fetch Private Information (Yours)</summary><br>\n\n```python\nfrom ensta import Mobile\n\nmobile = Mobile(username, password)\n\naccount = mobile.private_info()\n\nprint(account.email)\nprint(account.account_type)\nprint(account.phone_number)\n```\n\n</details>\n\n<details>\n\n<summary>Update Display Name</summary><br>\n\n```python\nfrom ensta import Mobile\n\nmobile = Mobile(username, password)\n\nmobile.update_display_name(\"Lionel Messi\")\n```\n\n</details>\n\n<details>\n\n<summary>Block/Unblock User</summary><br>\n\n```python\nfrom ensta import Mobile\n\nmobile = Mobile(username, password)\n\nmobile.block(123456789)  # Use UserID\nmobile.unblock(123456789)  # Use UserID\n```\n\n</details>\n\n<details>\n\n<summary>Upload Story (Photo)</summary>\n\n```python\nfrom ensta import Mobile\n\nmobile = Mobile(username, password)\n\nupload_id = mobile.get_upload_id(\"image.jpg\")\n\nmobile.upload_story(upload_id)\n```\n\n</details>\n\n<details>\n\n<summary>Upload Story (Photo) + Link Sticker</summary>\n\n```python\nfrom ensta import Mobile\nfrom ensta.structures import StoryLink\n\nmobile = Mobile(username, password)\n\nupload_id = mobile.get_upload_id(\"image.jpg\")\n\nmobile.upload_story(upload_id, entities=[\n    StoryLink(title=\"Google\", url=\"https://google.com\")\n])\n```\n\n</details>\n\n<details>\n\n<summary>Send Message (Text)</summary>\n\n```python\nfrom ensta import Mobile\n\nmobile = Mobile(username, password)  # Or use email\ndirect = mobile.direct()\n\ndirect.send_text(\"Hello\", thread_id)\n```\n\n</details>\n\n<details>\n\n<summary>Send Message (Picture)</summary>\n\n```python\nfrom ensta import Mobile\n\nmobile = Mobile(username, password)  # Or use email\ndirect = mobile.direct()\n\nmedia_id = direct.fb_upload_image(\"image.jpg\")\n\ndirect.send_photo(media_id, thread_id)\n```\n\n</details>\n\n<details>\n\n<summary>Add Biography Link</summary>\n\n```python\nfrom ensta import Mobile\n\nmobile = Mobile(username, password)  # Or use email\n\nlink_id = mobile.add_bio_link(\n    url=\"https://github.com/diezo\",\n    title=\"Diezo's GitHub\"\n)\n```\n\n</details>\n\n<details>\n\n<summary>Add Multiple Biography Links</summary>\n\n```python\nfrom ensta import Mobile\nfrom ensta.structures import BioLink\n\nmobile = Mobile(username, password)  # Or use email\n\nlink_ids = mobile.add_bio_links([\n    BioLink(url=\"https://example.com\", title=\"Link 1\"),\n    BioLink(url=\"https://example.com\", title=\"Link 2\"),\n    BioLink(url=\"https://example.com\", title=\"Link 3\")\n])\n```\n\n</details>\n\n<details>\n\n<summary>Remove Biography Link</summary>\n\n```python\nfrom ensta import Mobile\n\nmobile = Mobile(username, password)  # Or use email\n\nmobile.remove_bio_link(link_id)\n```\n\n</details>\n\n<details>\n\n<summary>Remove Multiple Biography Links</summary>\n\n```python\nfrom ensta import Mobile\n\nmobile = Mobile(username, password)  # Or use email\n\nmobile.remove_bio_links([\n    link_id_1,\n    link_id_2,\n    link_id_3\n])\n```\n\n</details>\n\n<details>\n\n<summary>Clear All Biography Links</summary>\n\n```python\nfrom ensta import Mobile\n\nmobile = Mobile(username, password)  # Or use email\n\nmobile.clear_bio_links()\n```\n\n</details>\n\n### Deprecated Features (Web API)\nFeatures still using the **Web API**:\n\n<details>\n\n<summary>Upload Reel</summary><br>\n\n```python\nfrom ensta import Web\n\nhost = Web(username, password)\n\nvideo_id = host.upload_video_for_reel(\"Video.mp4\", thumbnail=\"Thumbnail.jpg\")\n\nhost.pub_reel(\n    video_id,\n    caption=\"Enjoying the winter! ⛄\"\n)\n```\n\n</details>\n\n<details>\n\n<summary>Fetch Web Profile Data</summary><br>\n\n```python\nfrom ensta import Web\n\nhost = Web(username, password)\nprofile = host.profile(\"leomessi\")\n\nprint(profile.full_name)\nprint(profile.biography)\nprint(profile.follower_count)\n```\n\n</details>\n\n<details>\n\n<summary>Fetch Someone's Feed</summary><br>\n\n```python\nfrom ensta import Web\n\nhost = Web(username, password)\nposts = host.posts(\"leomessi\", 100)  # Want full list? Set count to '0'\n\nfor post in posts:\n    print(post.caption_text)\n    print(post.like_count)    \n```\n\n</details>\n\n<details>\n\n<summary>Fetch Post's Likers</summary><br>\n\n```python\nfrom ensta import Web\n\nhost = Web(username, password)\n\npost_id = host.get_post_id(\"https://www.instagram.com/p/Czr2yLmroCQ/\")\nlikers = host.likers(post_id)\n\nfor user in likers.users:\n    print(user.username)\n    print(user.profile_picture_url)\n```\n\n</details>\n\nThey'll be migrated to the **Mobile API** soon.\n\n## Supported Classes\n\n> [!IMPORTANT]\n> The **Web Class** is deprecated and it's features are being migrated to the **Mobile Class**. It'll be removed from Ensta upon completion.\n\n<details>\n\n<br>\n\n<summary><b>Mobile Class</b> (Authenticated)</summary>\n\nRequires login, and has the most features.\n\n```python\nfrom ensta import Mobile\n\nmobile = Mobile(username, password)\nprofile = mobile.profile(\"leomessi\")\n\nprint(profile.full_name)\nprint(profile.biography)\nprint(profile.profile_pic_url)\n```\n\n</details>\n\n<details>\n\n<br>\n\n<summary><b>Guest Class</b> (Non-Authenticated)</summary>\n\nDoesn't require login, but has limited features.\n\n```python\nfrom ensta import Guest\n\nguest = Guest()\nprofile = guest.profile(\"leomessi\")\n\nprint(profile.biography)\n```\n\n</details>\n\n<details>\n\n<br>\n\n<summary><b>Web Class</b> (Authenticated) <i>(Deprecated)</i></summary>\n\n```python\nfrom ensta import Web\n\nhost = Web(username, password)\nprofile = host.profile(\"leomessi\")\n\nprint(profile.biography)\n```\n\n</details>\n\n## Discord Community\nAsk questions, discuss upcoming features and meet other developers.\n\n[<img src=\"https://i.ibb.co/qdX7F1b/IMG-20240105-115646-modified-modified.png\" width=\"150\"/>](https://discord.com/invite/pU4knSwmQe)\n\n## Buy Me A Coffee\nSupport me in the development of this project.\n\n[<img src=\"https://raw.githubusercontent.com/diezo/Ensta/master/assets/coffee.svg\" width=\"170\"/>](https://buymeacoffee.com/sonii)\n\n## Contributors\n[![Contributors](https://contrib.rocks/image?anon=1&repo=diezo/ensta&)](https://github.com/diezo/ensta/graphs/contributors)\n\n## Disclaimer\nThis is a third party library and not associated with Instagram. We're strictly against spam. You are liable for all the actions you take.\n","summary":"Ensta is a lightweight, reliable Python library designed to simplify interaction with the Instagram API. It provides a straightforward interface for common automated tasks, including f
