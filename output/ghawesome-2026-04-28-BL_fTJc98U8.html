ds.io/badge/Vite-7-646CFF?style=for-the-badge&logo=vite&logoColor=white)](viewer/package.json)\n\n</div>\n\n## ✨ Features\n\n- **Generate** - Create source-controlled CAD models with coding agents like Codex and Claude Code.\n- **Export** - Produce STEP, STL, DXF, GLB, topology data, and URDF robot descriptions.\n- **Browse** - Inspect generated geometry in a local CAD Explorer viewer.\n- **Reference** - Copy stable `@cad[...]` references so agents can make precise follow-up edits.\n- **Review** - Render quick snapshots for fast checks during an iteration loop.\n- **Reproduce** - Edit source files first, then regenerate explicit targets.\n- **Local** - Run the harness and viewer locally with no backend to host.\n\n## 🧰 Bundled Skills\n\nThis harness vendors file-targeted skills for CAD and robot-description work. Use the bundled copies here for local `models/` projects, or use the dedicated repositories when installing the skills outside this harness.\n\n- **CAD Skill** - STEP, STL, DXF, GLB/topology, snapshots, and `@cad[...]` geometry references. [Bundled docs](skills/cad/README.md) · [Standalone repo](https://github.com/earthtojake/cad-skill)\n- **URDF Skill** - Generated URDF XML, robot links, joints, limits, validation, and mesh references. [Bundled docs](skills/urdf/README.md) · [Standalone repo](https://github.com/earthtojake/urdf-skill)\n\n## 🔁 Workflow\n\n1. **Describe** - Tell your agent about the part, assembly, fixture, robot, or mechanism you want.\n2. **Edit** - Let your coding agent update CAD source files under `models/`.\n3. **Regenerate** - Create explicit STEP, STL, DXF, GLB, or URDF targets.\n4. **Inspect** - Open the CAD Explorer viewer to review the generated model.\n5. **Reference** - Copy `@cad[...]` handles when you want geometry-aware edits.\n6. **Commit** - Save the source and generated artifacts together once the model is ready.\n\n## 🚀 Quick Start\n\nClone the repo:\n\n```bash\ngit clone https://github.com/earthtojake/text-to-cad.git\ncd text-to-cad\n```\n\nInstall Python CAD dependencies:\n\n```bash\npython3.11 -m venv .venv\n./.venv/bin/python -m pip install --upgrade pip\n./.venv/bin/pip install -r requirements-cad.txt\n```\n\nInstall viewer dependencies:\n\n```bash\ncd viewer\nnpm install\n```\n\nRun the local CAD Explorer:\n\n```bash\nnpm run dev\n```\n\nThen open [http://localhost:4178](http://localhost:4178).\n","summary":"Text‑to‑cad is an open‑source harness that lets users generate, export, and inspect CAD geometry entirely with large‑language‑model coding agents such as Codex or Claude Code. It supports producing STEP, STL, DXF, GLB, topology data, and even URDF robot descriptions, while offering a local, no‑backend React/Node viewer and stable `@cad[…]` references for precise, iterative edits. The toolkit bundles reusable CAD and URDF skills so designers can maintain source‑controlled models and keep generated assets in sync automatically. Engineers, mechanical designers, and robotics developers can leverage this streamlined workflow to accelerate design cycles and collaborate directly with LLMs through a single, version‑controlled process.","description":"An open source harness for generating CAD models","stars":1020,"language":"JavaScript"},{"owner":"openclaw","repo":"clawsweeper","url":"https://github.com/openclaw/clawsweeper","readme":"# ClawSweeper\n\nClawSweeper is the conservative maintenance bot for OpenClaw repositories. It\ncurrently sweeps `openclaw/openclaw` and `openclaw/clawhub`.\n\nIt keeps one markdown report per open issue or PR, publishes one durable Codex\nautomated review comment when useful, and only closes items when the evidence is\nstrong.\n\n## Guardrails\n\nClawSweeper may propose a close only when the item is clearly one of these:\n\n- implemented on current `main`\n- not reproducible on current `main`\n- better suited for ClawHub skill/plugin work than core\n- duplicate or superseded by a canonical issue/PR\n- concrete but not actionable in this source repo\n `, high reasoning, fast service tier, and a\n  10-minute per-item timeout.\n- Each item becomes a flat report under\n  `records/<repo-slug>/items/<number>.md` with the decision, evidence,\n  suggested comment, runtime metadata, and GitHub snapshot hash.\n- High-confidence allowed close decisions become `proposed_close`.\n- After publish, the lane checks the selected items' single marker-backed Codex\n  review comment. Missing comments and missing metadata are synced immediately;\n  existing comments are refreshed only when stale, currently weekly.\n\n### Apply Lane\n\nApply reads existing reports and mutates GitHub only when the stored review is\nstill valid.\n\n- Updates the single marker-backed Codex automated review comment in place.\n- Closes only unchanged high-confidence proposals.\n- Reuses the review comment when closing; no duplicate close comment.\n- Moves closed or already-closed reports to\n  `records/<repo-slug>/closed/<number>.md`.\n- Moves reopened archived reports back to the repo’s `items/` folder as stale.\n- Commits checkpoints and dashboard heartbeats during long runs.\n\nApply wakes every 15 minutes, no-ops when there are no unchanged\nhigh-confidence close proposals, and narrows scheduled runs to the currently\neligible proposal list so idle runs do not scan unrelated keep-open records.\nIt defaults to all item kinds, no age floor, a 2-second close delay, and 50\nfresh closes per checkpoint. If it reaches the requested limit, it queues\nanother apply run with the same settings.\n\nExact event runs skip the bulk planner, shard matrix, artifact upload, and\nseparate publish job. They still use the same review and apply code paths, but\nonly for the selected item number and only with immediate-safe reasons enabled\nby default: `implemented_on_main` and `duplicate_or_superseded`.\n`stale_insufficient_info` is never applied to young items; apply requires those\nissue reports to be at least 30 days old unless a manual run explicitly changes\nthe threshold.\n\nThe README dashboard is fleet-scoped. Each configured repository gets its own\nrecord folder, workflow status marker, audit-health marker, cadence counts, and\nrecent activity section. The top dashboard aggregates those repository snapshots\nso event runs from one repo do not hide the state of another.\n\nThere is still one deterministic apply path for writes. Review can propose and\nsync stale public review comments, but closing remains guarded by apply so a\nfresh GitHub snapshot, labels, maintainer-authorship, and unchanged item state\nare checked immediately before mutation.\n\n### Safety Model\n\n- Maintainer-authored items are excluded from automated closes.\n- Protected labels block close proposals.\n- Open PRs with GitHub closing references block issue closes until the PR is\n  resolved.\n- Open same-author issue/PR pairs block one-sided closes.\n- Codex runs without GitHub write tokens.\n- Event jobs create target write and report-push credentials only after Codex\n  exits.\n- CI makes the target checkout read-only for reviews.\n- Reviews fail if Codex leaves tracked or untracked changes behind.\n- Snapshot changes block apply unless the only change is the bot’s own review\n  comment.\n\n### Audit\n\n`pnpm run audit` compares live GitHub state with generated records without moving\nfiles. It reports missing open records, archived open records, stale records,\nduplicates, protected-label proposed closes, and stale review-status records.\nProtected proposed closes are reported only for active repo `items/` records\nbecause archived repo `closed/` records are historical and cannot be applied.\nMissing open records are classified as eligible, maintainer-authored, protected,\nor recently created so strict audit mode can flag actionable drift without\ntreating expected queue lag or excluded items as failures.\nUse `--update-dashboard` to publish the latest audit health into this README\nwithout making every normal dashboard heartbeat scan all open GitHub items.\nAudit Health includes a copyable `item_numbers` input for reviewable findings\nsuch as missing eligible records, reopened archived records, and stale reviews.\nThe workflow refreshes Audit Health on a separate six-hour schedule, and it can\nbe run manually with `audit_dashboard=true`.\n\n## Local Run\n\nRequires Node 24.\n\n```bash\nsource ~/.profile\ncorepack enable\npnpm install\npnpm run build\npnpm run plan -- --target-repo openclaw/openclaw --batch-size 5 --shard-count 100 --max-pages 250 --codex-model gpt-5.5 --codex-reasoning-effort high --codex-service-tier fast\npnpm run review -- --target-repo openclaw/openclaw --target-dir ../openclaw --batch-size 5 --max-pages 250 --artifact-dir artifacts/reviews --codex-model gpt-5.5 --codex-reasoning-effort high --codex-service-tier fast --codex-timeout-ms 600000\npnpm run apply-artifacts -- --target-repo openclaw/openclaw --artifact-dir artifacts/reviews\npnpm run audit -- --target-repo openclaw/openclaw --max-pages 250 --sample-limit 25 --update-dashboard\npnpm run reconcile -- --target-repo openclaw/openclaw --dry-run\n```\n\nApply unchanged proposals later:\n\n```bash\nsource ~/.profile\ncorepack enable\npnpm run apply-decisions -- --target-repo openclaw/openclaw --limit 20 --apply-kind all\n```\n\nSync durable review comments without closing:\n\n```bash\nsource ~/.profile\ncorepack enable\npnpm run apply-decisions -- --target-repo openclaw/openclaw --sync-comments-only --comment-sync-min-age-days 7 --processed-limit 1000 --limit 0\n```\n\nManual review runs are proposal-only even if `--apply-closures` or workflow input `apply_closures=true` is set. Use `apply_existing=true` to apply unchanged proposals later. Scheduled apply runs process both issues and pull requests by default, subject to the selected repository profile; pass `target_repo`, `apply_kind=issue`, or `apply_kind=pull_request` to narrow a manual run.\n\nScheduled runs cover both configured profiles. `openclaw/openclaw` keeps the\nexisting cadence; `openclaw/clawhub` runs on offset review/apply/audit crons so\nits reports live under `records/openclaw-clawhub/` without colliding with\ndefault repo records.\n\nTarget repositories can opt into event-level latency by installing the\ndispatcher workflow in [docs/target-dispatcher.md](docs/target-dispatcher.md).\nThe dispatcher sends `repository_dispatch` events to this repository with the\ntarget repo and exact item number; ClawSweeper then runs one event job that\nreviews, comments, and checks immediate safe apply instead of waiting for the\nnext hot-intake cron or bulk publish lane.\n\n## Checks\n\n```bash\npnpm run check\npnpm run oxformat\n```\n\n`oxformat` is an alias for `oxfmt`; there is no separate `oxformat` pnpm package.\nThe `CI` GitHub Actions workflow runs `pnpm run check` on pushes, pull requests,\nand manual dispatches.\n\n## GitHub Actions Setup\n\nRequired secrets:\n\n- `OPENAI_API_KEY`: OpenAI API key used to log Codex in before review shards run.\n- `CODEX_API_KEY`: optional compatibility alias for the same key during the login check.\n- `OPENCLAW_GH_TOKEN`: optional fallback GitHub token for read-heavy target scans and artifact publish reconciliation when the GitHub App token is unavailable.\n- `CLAWSWEEPER_APP_CLIENT_ID`: public GitHub App client ID for `openclaw-ci`. Currently `Iv23liOECG0slfuhz093`.\n- `CLAWSWEEPER_APP_PRIVATE_KEY`: private key for `openclaw-ci`; plan/review jobs use a short-lived GitHub App installation token for read-heavy target API calls, and apply/comment-sync jobs use the app token for comments and closes.\n  Keep App credentials scoped to the `actions/create-github-app-token` step.\n  Review shards run Codex over attacker-controlled issue/PR text, so\n  `codexEnv()` also strips these App variables before spawning Codex.\n\nToken flow:\n\n- Review shards log Codex in with `OPENAI_API_KEY`, then run without OpenAI or\n  Codex token environment variables.\n- ClawSweeper uses the `openclaw-ci` GitHub App token for read-heavy target\n  context, falling back to `OPENCLAW_GH_TOKEN` only if app secrets are absent.\n- Apply mode uses the app token for review comments and closes, so GitHub\n  attributes mutations to `clawsweeper[bot]`.\n- The built-in `GITHUB_TOKEN` commits generated reports back to this repo.\n\nRequired app permissions:\n\n- read access for target scan context\n- write access to target repository issues and pull requests\n- optional Actions write on `openclaw/clawsweeper` for app-token-based run\n  cancellation or dispatch\n","summary":"ClawSweeper is a maintenance bot that automates issue and pull‑request triage for the OpenClaw repositories, producing markdown reports, posting durable Codex‑generated review comments, and proposing closures only when clear evidence supports it. It enforces guardrails such as closing items that are already implemented, unreproducible, duplicate, or stale, while preserving items that require further action or are authored by maintainers. The bot also applies stricter rules for ClawHub, only closing PRs that are already satisfied in the current `main`. Developers and maintainers of OpenClaw projects, as well as other teams seeking automated, evidence‑based issue management, would find this tool valuable for keeping repositories clean and reducing manual triage effort.","description":"ClawSweeper scans all issues and PRs and suggest what we can close, and why. It runs every PR / Issue once a week.","stars":1238,"language":"JavaScript"},{"owner":"tashfeenahmed","repo":"freellmapi","url":"https://github.com/tashfeenahmed/freellmapi","readme":"<div align=\"center\">\n\n# FreeLLMAPI\n\n**One OpenAI-compatible endpoint. Fourteen free LLM providers. ~1.3B+ tokens per month.**\n\nAggregate the free tiers from Google, Groq, Cerebras, SambaNova, NVIDIA, Mistral, OpenRouter, GitHub Models, Hugging Face, Cohere, Cloudflare, Zhipu, Moonshot, and MiniMax behind a single `/v1/chat/completions` endpoint. Keys are stored encrypted. A router picks the best available model for each request, falls over to the next provider when one is rate-limited, and tracks per-key usage so you stay under every free-tier cap.\n\n[![CI](https://github.com/tashfeenahmed/freellmapi/actions/workflows/ci.yml/badge.svg)](https://github.com/tashfeenahmed/freellmapi/actions/workflows/ci.yml)\n[![License: MIT](https://img.shields.io/badge/License-MIT-green.svg)](./LICENSE)\n[![PRs Welcome](https://img.shields.io/badge/PRs-welcome-brightgreen.svg)](#contributing)\n\n![Fallback chain with per-provider token budget](repo-assets/fallback-chain.png)\n\n</div>\n\n---\n\n## Contents\n\n- [Why this exists](#why-this-exists)\n- [Supported providers](#supported-providers)\n- [Features](#features)\n- [Not yet supported](#not-yet-supported)\n- [Quick start](#quick-start)\n- [Using the API](#using-the-api)\n- [Screenshots](#screenshots)\n- [How it works](#how-it-works)\n- [Limitations](#limitations)\n- [Contributing](#contributing)\n- [Terms of Service review](#terms-of-service-review)\n- [Disclaimer](#disclaimer)\n\n## Why this exists\n\nEvery serious AI lab now offers a free tier — a few million tokens a month, a few thousand requests a day. On its own each tier is a toy. Stacked together, they add up to roughly **1.3 billion tokens per month** of working inference capacity, across dozens of models from small-and-fast to reasonably capable.\n\nThe problem is that stacking them by hand is painful: fourteen different SDKs, fourteen different rate limits, fourteen places a request can fail. FreeLLMAPI collapses that into one OpenAI-compatible endpoint. Point any OpenAI client library at your local server, and it routes transparently across whichever providers you've added keys for.\n\n## Supported providers\n\n<table>\n<tr>\n<td align=\"center\" width=\"180\"><a href=\"https://ai.google.dev\"><b>Google</b><br/>Gemini 2.5 Pro / Flash</a></td>\n<td align=\"center\" width=\"180\"><a href=\"https://groq.com\"><b>Groq</b><br/>Llama 4, Qwen, Kimi</a></td>\n<td align=\"center\" width=\"180\"><a href=\"https://cerebras.ai\"><b>Cerebras</b><br/>Llama 3.3, Qwen</a></td>\n<td align=\"center\" width=\"180\"><a href=\"https://cloud.sambanova.ai\"><b>SambaNova</b><br/>Llama 3.3 70B</a></td>\n</tr>\n<tr>\n<td align=\"center\"><a href=\"https://build.nvidia.com\"><b>NVIDIA</b><br/>NIM catalog</a></td>\n<td align=\"center\"><a href=\"https://mistral.ai\"><b>Mistral</b><br/>La Plateforme</a></td>\n<td align=\"center\"><a href=\"https://openrouter.ai\"><b>OpenRouter</b><br/>Free-tier models</a></td>\n<td align=\"center\"><a href=\"https://github.com/marketplace/models\"><b>GitHub Models</b><br/>GPT-4o, Llama, Phi</a></td>\n</tr>\n<tr>\n<td align=\"center\"><a href=\"https://huggingface.co\"><b>Hugging Face</b><br/>Inference Providers</a></td>\n<td align=\"center\"><a href=\"https://cohere.com\"><b>Cohere</b><br/>Command R+ (trial)</a></td>\n<td align=\"center\"><a href=\"https://developers.cloudflare.com/workers-ai\"><b>Cloudflare</b><br/>Workers AI</a></td>\n<td align=\"center\"><a href=\"https://bigmodel.cn\"><b>Zhipu</b><br/>GLM-4 series</a></td>\n</tr>\n<tr>\n<td align=\"center\"><a href=\"https://platform.moonshot.cn\"><b>Moonshot</b><br/>Kimi</a></td>\n<td align=\"center\"><a href=\"https://platform.minimax.io\"><b>MiniMax</b><br/>abab / hailuo</a></td>\n<td align=\"center\" colspan=\"2\"><i>Adding another? See <a href=\"#contributing\">Contributing</a>.</i></td>\n</tr>\n</table>\n\n## Features\n\n- **OpenAI-compatible** — `POST /v1/chat/completions` and `GET /v1/models` work with the official OpenAI SDKs and any OpenAI-compatible client (LangChain, LlamaIndex, Continue, Hermes, etc.). Just change `base_url`.\n- **Streaming and non-streaming** — Server-Sent Events for `stream: true`, JSON response otherwise. Every provider adapter implements both.\n- **Tool calling** — OpenAI-style `tools` / `tool_choice` requests are passed through, and assistant `tool_calls` + `tool` role follow-up messages round-trip across providers.\n- **Automatic fallover** — If the chosen provider returns a 429, 5xx, or times out, the router skips it, puts the key on a short cooldown, and retries on the next model in your fallback chain (up to 20 attempts).\n- **Per-key rate tracking** — RPM, RPD, TPM, and TPD counters per `(platform, model, key)` so the router always picks a key that's under its caps.\n- **Sticky sessions** — Multi-turn conversations keep talking to the same model for 30 minutes to avoid the hallucination spike that comes from mid-conversation model switches.\n- **Encrypted key storage** — API keys are encrypted with AES-256-GCM before hitting SQLite; decryption happens in-memory just before a request.\n- **Unified API key** — Clients authenticate to your proxy with a single `freellmapi-…` bearer token. You never expose upstream provider keys to your apps.\n- **Health checks** — Periodic probes mark keys as `healthy`, `rate_limited`, `invalid`, or `error` so the router skips dead ones automatically.\n- **Admin dashboard** — React + Vite UI to manage keys, reorder the fallback chain, inspect analytics, and run prompts in a playground. Dark mode included.\n- **Analytics** — Per-request logging with latency, token counts, success rate, and per-provider breakdowns.\n- **Deploys to a Raspberry Pi** — Runs happily on a Pi 4 under PM2 behind nginx. ~40 MB RSS at idle.\n\n## Not yet supported\n\nThe scope is deliberately narrow. If a feature isn't on this list and isn't below, assume it isn't there yet.\n\n- **Embeddings** (`/v1/embeddings`)\n- **Image generation** (`/v1/images/*`)\n- **Audio / speech** (`/v1/audio/*`)\n- **Vision / multimodal inputs** — message content is text-only\n- **Legacy completions** (`/v1/completions`) — only the chat endpoint is implemented\n- **Moderation** (`/v1/moderations`)\n- **`n > 1`** (multiple completions per request)\n- **Per-user billing / multi-tenant auth** — single-user by design\n\nPRs that add any of these are very welcome. See [Contributing](#contributing).\n\n## Quick start\n\n**Prerequisites:** Node.js 20+, npm.\n\n```bash\ngit clone https://github.com/tashfeenahmed/freellmapi.git\ncd freellmapi\nnpm install\n\n# Generate an encryption key for at-rest key storage\ncp .env.example .env\necho \"ENCRYPTION_KEY=$(node -e \"console.log(require('crypto').randomBytes(32).toString('hex'))\")\" >> .env\n\n# Start server + dashboard together\nnpm run dev\n```\n\nOpen http://localhost:5173 (the Vite dev UI), add your provider keys on the **Keys** page, reorder the **Fallback Chain** to taste, and grab your unified API key from the **Keys** page header. That unified key is what you point your OpenAI SDK at.\n\nFor a production build:\n\n```bash\nnpm run build\nnode server/dist/index.js     # server + dashboard both served on :3001\n```\n\n## Using the API\n\nAny OpenAI-compatible client works. Examples:\n\n**Python**\n\n```python\nfrom openai import OpenAI\n\nclient = OpenAI(\n    base_url=\"http://localhost:3001/v1\",\n    api_key=\"freellmapi-your-unified-key\",\n)\n\nresp = client.chat.completions.create(\n    model=\"auto\",  # let the router pick; or specify e.g. \"gemini-2.5-flash\"\n    messages=[{\"role\": \"user\", \"content\": \"Summarise the fall of Rome in one sentence.\"}],\n)\nprint(resp.choices[0].message.content)\nprint(\"Routed via:\", resp.headers.get(\"x-routed-via\"))\n```\n\n**curl**\n\n```bash\ncurl http://localhost:3001/v1/chat/completions \\\n  -H \"Authorization: Bearer freellmapi-your-unified-key\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"model\": \"auto\",\n    \"messages\": [{\"role\": \"user\", \"content\": \"hi\"}]\n  }'\n```\n\n**Streaming**\n\n```python\nstream = client.chat.completions.create(\n    model=\"auto\",\n    messages=[{\"role\": \"user\", \"content\": \"Stream me a haiku about SQLite.\"}],\n    stream=True,\n)\nfor chunk in stream:\n    print(chunk.choices[0].delta.content or \"\", end=\"\", flush=True)\n```\n\n**Tool calling**\n\nPass OpenAI-style `tools` and `tool_choice`; the assistant response round-trips back through the proxy exactly like the OpenAI API. Multi-step flows (assistant `tool_calls` → `tool` role follow-up → final answer) work across every provider the router can reach.\n\n```python\ntools = [{\n    \"type\": \"function\",\n    \"function\": {\n        \"name\": \"get_weather\",\n        \"description\": \"Get current weather for a city.\",\n        \"parameters\": {\n            \"type\": \"object\",\n            \"properties\": {\"city\": {\"type\": \"string\"}},\n            \"required\": [\"city\"],\n        },\n    },\n}]\n\n# 1. Model asks for a tool call\nfirst = client.chat.completions.create(\n    model=\"auto\",\n    messages=[{\"role\": \"user\", \"content\": \"What's the weather in Karachi?\"}],\n    tools=tools,\n    tool_choice=\"required\",\n)\ncall = first.choices[0].message.tool_calls[0]\n\n# 2. You execute the tool, feed the result back\nfinal = client.chat.completions.create(\n    model=\"auto\",\n    messages=[\n        {\"role\": \"user\", \"content\": \"What's the weather in Karachi?\"},\n        first.choices[0].message,\n        {\"role\": \"tool\", \"tool_call_id\": call.id, \"content\": '{\"temp_c\": 32, \"cond\": \"sunny\"}'},\n    ],\n    tools=tools,\n)\nprint(final.choices[0].message.content)\n```\n\nWorks with `stream=True` as well — you'll get `delta.tool_calls` chunks followed by a `finish_reason: \"tool_calls\"` close. Under the hood, OpenAI-compatible providers (Groq, Cerebras, SambaNova, Mistral, OpenRouter, GitHub Models, HuggingFace, Cloudflare, Cohere compat) get the request passed through; Gemini requests get translated into Google's `functionDeclarations` / `functionResponse` shape and the response is translated back.\n\nEvery response carries an `X-Routed-Via: <platform>/<model>` header so you can see which provider actually served each call. If a request fell over between providers, you'll also see `X-Fallback-Attempts: N`.\n\n## Screenshots\n\n### Keys\n\nManage provider credentials and grab the unified API key your apps connect with. Each key shows a status dot and when it was last health-checked.\n\n![Keys page](repo-assets/keys.png)\n\n### Playground\n\nSend a chat completion through the router and see which provider served it, with the model ID and latency printed right on the message.\n\n![Playground page](repo-assets/playground.png)\n\n### Analytics\n\nRequest volume, success rate, tokens in and out, average latency, and per-provider breakdowns over 24h / 7d / 30d windows.\n\n![Analytics page](repo-assets/analytics.png)\n\n## How it works\n\n```\n┌──────────────────┐   Bearer freellmapi-…   ┌─────────────────────────┐\n│  OpenAI SDK /    │ ──────────────────────▶ │  Express proxy (:3001)  │\n│  curl / any      │ ◀────────────────────── │  /v1/chat/completions   │\n│  OpenAI client   │      streamed tokens    └────────────┬────────────┘\n└──────────────────┘                                      │\n                                                          ▼\n                             ┌────────────────────────────────────────────────┐\n                             │  Router                                        │\n                             │   1. Pick highest-priority model that          │\n                             │      (a) has a healthy key and                 │\n                             │      (b) is under all its rate limits.         │\n                             │   2. Decrypt key, call provider SDK.           │\n                             │   3. On 429/5xx → cooldown + retry next model. │\n                             └────────────────────────────────────────────────┘\n                                          │\n   ┌──────────────┬────────────┬──────────┴─────────┬─────────────┬──────────┐\n   ▼              ▼            ▼                    ▼             ▼          ▼\n Google         Groq        Cerebras           OpenRouter        HF       …10 more\n```\n\n- **Router** (`server/src/services/router.ts`) — picks a model per request.\n- **Rate-limit ledger** (`server/src/services/ratelimit.ts`) — in-memory RPM/RPD/TPM/TPD counters backed by SQLite, with cooldowns on 429s.\n- **Provider adapters** (`server/src/providers/*.ts`) — one file per provider, implementing the `Provider` base class: `chatCompletion()` and `streamChatCompletion()`.\n- **Health service** (`server/src/services/health.ts`) — periodic probe keeps key status fresh.\n- **Dashboard** (`client/`) — React + Vite + shadcn/ui admin surface.\n- **Storage** — SQLite (`better-sqlite3`) with AES-256-GCM envelope encryption for keys.\n\n## Limitations\n\nStacking free tiers has real trade-offs. Be honest with yourself about them:\n\n- **No frontier models.** The free-tier catalog tops out around Llama 3.3 70B, GLM-4.5, Qwen 3 Coder, and Gemini 2.5 Pro. You will not get GPT-5 or Claude Opus class reasoning through this. For hard problems, pay for a real API.\n- **Intelligence degrades as the day progresses.** Your top-ranked models (usually Gemini 2.5 Pro, GPT-4o via GitHub Models) have the lowest daily caps. Once they hit their limits, the router falls down your priority chain to smaller/weaker models. Expect the effective intelligence of the endpoint to drop in the late hours of each day — then reset at UTC midnight.\n- **Latency is highly variable.** Cerebras and Groq are extremely fast; others are not. You get whichever one is available.\n- **Free tiers can change without notice.** Providers regularly tighten, loosen, or remove free tiers. When that happens you'll see 429s or auth errors until you update the catalog. Re-seed scripts live in `server/src/scripts/`.\n- **No SLA, by definition.** If you need reliability, use a paid provider with a contract.\n- **Local-first.** There's no multi-tenant auth. Run this for yourself; don't expose it to the internet.\n\n## Contributing\n\nContributors very welcome! Good first PRs:\n\n- **Add a provider** — copy `server/src/providers/openai-compat.ts` as a template, wire it into `server/src/providers/index.ts`, seed its models in `server/src/db/index.ts`, add a test in `server/src/__tests__/providers/`.\n- **Add an endpoint** — embeddings, images, moderations. The provider base class can grow new methods; adapters declare which they support.\n- **Improve the router** — cost-aware routing (cheapest-healthy-fastest tradeoffs), better latency-weighted priority, regional pinning.\n- **Dashboard polish** — charts on the Analytics page, key rotation UX, batch import of keys from `.env`.\n- **Docs** — more examples, client library snippets for Go/Rust/etc., a deployment recipe for Docker or Fly.\n\n**Development loop:**\n\n```bash\nnpm install\nnpm run dev      # server on :3001, dashboard on :5173, both with HMR\nnpm test         # vitest — 75 tests across providers, routes, router, ratelimit\n```\n\nPRs should include a test, keep the existing test suite green, and match the `.editorconfig` / tsconfig defaults already in the repo. Issues and discussions are open.\n\n### Contributors\n\nThanks to everyone who's helped improve FreeLLMAPI:\n\n- [@moaaz12-web](https://github.com/moaaz12-web) — tool-calling support across providers (#3)\n\n## Terms of Service review\n\nA self-hosted, single-user, personal-use setup was reviewed against each provider's ToS (April 2026). Summary:\n\n| Provider | Verdict | Notes |\n|---|---|---|\n| Google Gemini | ✅ Likely OK | No adverse clause; proxy for personal use not prohibited. |\n| Groq | ✅ Likely OK | Explicitly permits integrating into a \"Customer Application.\" |\n| Cerebras | ✅ Likely OK | Permitted; don't resell keys. |\n| Mistral | ✅ Likely OK | APIs allowed for personal/internal business use. |\n| OpenRouter | ✅ Likely OK | Private-use only; don't expose the proxy publicly. |\n| Hugging Face | ✅ Likely OK | BYO-key proxying is the documented pattern. |\n| Zhipu | ✅ Likely OK | Explicit \"personal, non-commercial research\" carve-out. |\n| Moonshot / Kimi | ✅ Likely OK | Competitive-products clause is broad but not aimed at single-user proxies. |\n| SambaNova | ⚠️ Ambiguous | Public terms are silent on APIs. |\n| MiniMax | ⚠️ Ambiguous | Public terms silent. |\n| Cloudflare Workers AI | ⚠️ Ambiguous | No adverse clause found. |\n| NVIDIA NIM | ⚠️ Caution | Free tier is \"evaluation only, not production.\" |\n| GitHub Models | ⚠️ Caution | Free tier scoped to \"experimentation.\" |\n| Cohere | ❌ Avoid | Trial ToS §14 explicitly forbids personal/household use. |\n\nRules of thumb that keep most providers happy: **one account per provider**, **no reselling**, **no sharing your endpoint with other humans**, **don't hammer a free tier as a paid production backend**. This is informational, not legal advice — read each provider's ToS and make your own call.\n\n## Disclaimer\n\n**This project is for personal experimentation and learning, not production.** Free tiers exist so developers can prototype against them; they aren't a stable, supported inference substrate and shouldn't be treated as one. If you build something real on top of FreeLLMAPI, swap in a paid API before you ship. Your relationship with each upstream provider is governed by the terms you accepted when you created your account — those terms still apply when the traffic is proxied through this project, and you're responsible for complying with them.\n\n## License\n\n[MIT](./LICENSE)\n","summary":"FreeLLMAPI offers a single OpenAI‑compatible `/v1/chat/completions` endpoint that aggregates the free tiers of fourteen major LLM providers, giving users access to roughly 1.3 billion tokens per month without writing separate SDK calls. It routes requests intelligently across providers, automatically falls back to the next service on rate‑limits, and tracks each key’s usage so users stay under every free‑tier cap, all while supporting both streaming and non‑streaming responses. The system is built for developers, AI labs, and hobbyists who want a turnkey way to tap thousands of free inference tokens across a variety of models through a familiar OpenAI API interface.","description":"OpenAI-compatible proxy that aggregates free-tier keys from ~14 AI providers with automatic failover. For personal experimentation only.","stars":635,"language":"TypeScript"},{"owner":"GammaLabTechnologies","repo":"harmonist","url":"https://github.com/GammaLabTechnologies/harmonist","readme":"<div align=\"center\">\n\n# Harmonist\n\n### Portable AI agent orchestration with mechanical protocol enforcement\n\n*A drop-in multi-agent framework for Cursor, Claude Code, Copilot, Windsurf, Aider, and other AI coding assistants.*\n\n[![GitHub stars](https://img.shields.io/github/stars/GammaLabTechnologies/harmonist?style=flat&logo=github&color=yellow)](https://github.com/GammaLabTechnologies/harmonist/stargazers)\n[![CI](https://github.com/GammaLabTechnologies/harmonist/actions/workflows/ci.yml/badge.svg)](https://github.com/GammaLabTechnologies/harmonist/actions/workflows/ci.yml)\n[![License: MIT](https://img.shields.io/badge/License-MIT-yellow.svg)](LICENSE)\n[![Python 3.9+](https://img.shields.io/badge/python-3.9+-blue.svg)](https://www.python.org/downloads/)\n[![Version 1.0.0](https://img.shields.io/badge/version-1.0.0-brightgreen.svg)](CHANGELOG.md)\n[![Agents: 186](https://img.shields.io/badge/agents-186-purple.svg)](agents/index.json)\n[![Tests: 430+](https://img.shields.io/badge/tests-430+-success.svg)](#testing)\n[![Stdlib only](https://img.shields.io/badge/dependencies-stdlib%20only-lightgrey.svg)](#requirements)\n\n**Built and maintained by [GammaLab](https://gammalab.ae) · [@GammaLabTechnologies](https://github.com/GammaLabTechnologies)**\n\n</div>\n\n---\n\nMost AI coding frameworks trust the language model to follow the\nrules. Harmonist **refuses to let it skip them**. Every code-changing\nturn is gated by hooks that check whether the required reviewers ran,\nwhether memory was updated, and whether the supply chain of every\nshipped file is intact. If the checks fail, the turn doesn't complete —\nno matter how confidently the model claims it's done.\n\nThis is the first open-source agent framework where **protocol\nenforcement is a mechanical gate, not a polite request in a prompt**.\n\n---\n\n## Table of contents\n\n- [Why Harmonist exists](#why-harmonist-exists)\n- [What makes it different](#what-makes-it-different)\n- [Requirements](#requirements)\n- [Quick start](#quick-start)\n- [Architecture](#architecture)\n- [The 186-agent catalogue](#the-186-agent-catalogue)\n- [Mechanical enforcement](#mechanical-enforcement)\n- [Structured validated memory](#structured-validated-memory)\n- [Supply-chain integrity](#supply-chain-integrity)\n- [Supported IDE integrations](#supported-ide-integrations)\n- [Key scripts](#key-scripts)\n- [Documentation](#documentation)\n- [Testing](#testing)\n- [FAQ](#faq)\n- [Contributing](#contributing)\n- [Security](#security)\n- [License](#license)\n- [About GammaLab](#about-gammalab)\n\n---\n\n## Why Harmonist exists\n\nAI coding assistants have a structural problem that prompt engineering\nalone cannot fix.\n\n**The problem:** every serious engineering workflow has non-negotiable\nrules — \"no floating-point for money\", \"run QA before merging\", \"every\nexternal call retries with idempotency keys\", \"security review before\ntouching auth code\". An LLM can be *told* to follow them, but there is\nno mechanism forcing it to. It can agree, move on, and silently skip\nthe step. On a good day you notice. On a bad day the bug ships.\n\n**The current landscape** is split between two imperfect answers:\n\n- **Thin agent frameworks** (LangChain, CrewAI, AutoGen, MetaGPT and\n  many others) give you orchestration primitives but leave enforcement\n  to the prompt. The model can always override its own protocol.\n- **Heavy enterprise platforms** promise governance through separate\n  runtimes, databases, and vendor lock-in — but need infrastructure to\n  install, don't work on a solo developer's laptop, and can't be\n  audited file-by-file.\n\n**Harmonist takes a different stance.** Protocol enforcement is\nimplemented as IDE-level hooks — concrete shell and Python scripts that\nobserve every subagent dispatch, every file edit, every session stop.\nWhen the rules the project declared aren't met, the `stop` hook\nreturns a `followup_message` to the AI and refuses to allow the turn\nto complete. The model can't argue with that; it's a state machine on\ndisk.\n\nNo runtime. No database. No vendor lock-in. Just markdown, stdlib\nPython, and bash — sitting next to your code, doing one job\ncorrectly.\n\n---\n\n## What makes it different\n\nSeven concrete, checkable properties — each one addresses a gap that\nother open-source agent frameworks leave open.\n\n### 1. Mechanical protocol enforcement via IDE hooks\n\nThe `stop` hook in `.cursor/hooks/` parses subagent dispatch markers\nfrom the session, checks whether `qa-verifier` ran, whether any\nrequired reviewer was missing, whether `session-handoff.md` was\nupdated, and returns a structured `followup_message` if the turn\nis incomplete. `loop_limit: 3` caps retries. On exhaustion, an\nincident is recorded and surfaced in the next session. **The AI\nliterally cannot ship a code change that skipped review.**\n\n### 2. Supply-chain verification of agent definitions\n\nEvery shipped file is hashed in `MANIFEST.sha256`. `upgrade.py`\nsha-verifies each source *before* copying into a project. A tampered\n`security-reviewer.md` (say, one that returns `approve` for\neverything) is REFUSED — it never enters the project. `install_extras.py`\ninherits the same guard for on-demand specialist installs. This is\nthe first OSS agent catalogue with paranoid-level supply-chain\nposture.\n\n### 3. Memory correlation IDs that the LLM cannot forge\n\nEvery memory entry has a `correlation_id` of the form\n`<session_id>-<task_seq>` generated by the hooks at session start\n(`<unix-seconds><pid4>` — collision-safe across parallel sessions).\nThe LLM reads the active ID via CLI; it never writes the ID itself.\nThis means the linkage between a `state` entry, a `decision`, and a\n`pattern` from the same task is **cryptographically ordered** from\nthe hook's perspective — not trusted to the model.\n\n### 4. Schema-validated memory with secret-pattern scanning\n\n`memory.py append` is the only supported write path. It validates\nevery entry against a YAML schema (`memory/SCHEMA.md`), rejects\nduplicates, and scans the body for ~30 classes of secrets: AWS\naccess keys, GitHub PATs, Stripe tokens, Slack webhooks, GCP service\naccounts, Azure connection strings, Telegram bot tokens, Discord\ntokens, Heroku/Postmark UUIDs (context-scoped), generic high-entropy\ntokens with `secret:` prefixes, and DB connection strings with\nembedded credentials. Placeholder fences (`${VAR}`, `<NAME>`) suppress\nthe scan so your templates still write cleanly.\n\n### 5. 186 curated domain specialists, not one generic \"coder\"\n\nHarmonist's catalogue is not a handful of roles. It's **186 curated\nspecialists** across 16 categories: blockchain-security-auditor for\nSolidity audits, zk-steward for zero-knowledge circuits, visionos-\nspatial-engineer for Apple Vision Pro, wechat-mini-program-developer\nand xiaohongshu-specialist for the China market, laravel-livewire-\nspecialist for PHP, roblox-systems-scripter for Roblox Luau, 30+\nmarketing agents from SEO to Douyin, finance / sales / product /\nsupport / academic coverage. The orchestrator picks by\n`domains × roles × tags`, not by hard-coded slug lists.\n\n### 6. Integration-as-a-prompt\n\nThere is no installer binary. Integration happens by pasting\n`integration-prompt.md` into a Cursor Agent-mode session. The AI\nreads the prompt, analyzes the project, asks the user which `roles`\nwill be active (engineering / design / product / marketing / sales /\nsupport / finance / testing / academic), selects the right\nspecialists from `agents/index.json`, and wires everything up —\nincluding writing a project-specific `AGENTS.md` with domain-tailored\ninvariants. The AI integrates itself.\n\n### 7. Zero runtime dependencies, cross-platform parity\n\nNo npm, no Docker, no LangChain, no vector database. **Pure Python\nstdlib + bash.** The enforcement runtime has two implementations —\nPOSIX `.sh` scripts for macOS / Linux / WSL, and a pure-Python\n`hook_runner.py` for native Windows — and both paths are exercised\nagainst identical test scenarios. 430+ test assertions in CI keep\nthem bit-for-bit compatible.\n\n---\n\n## Requirements\n\n- **Python 3.9+** — every script ships with a version guard; older\n  interpreters exit with a per-OS install hint.\n- **Bash 3.2+** for POSIX shell paths (macOS default works). On native\n  Windows, the pure-Python `hook_runner.py` takes over; no WSL or Git\n  Bash required.\n- **Git** for version tracking.\n- **An AI coding assistant that supports subagent dispatch** — Cursor\n  is the primary integration; Claude Code, Copilot, Windsurf, Aider,\n  Kimi, Qwen, Gemini CLI, OpenCode, OpenClaw, and Antigravity are all\n  supported via adapters.\n- **No third-party Python dependencies** — stdlib only. No npm, no\n  Docker, no LangChain, no vector database.\n\n---\n\n## Quick start\n\n### Option 1 — Integrate via Cursor (recommended)\n\n```bash\n# 1. Clone into the root of your project\ncd your-project/\ngit clone https://github.com/GammaLabTechnologies/harmonist.git\n\n# 2. Open the project in Cursor, switch to Agent mode\n# 3. Paste the contents of harmonist/integration-prompt.md\n# 4. Follow the AI's walkthrough — it will ask about your\n#    project's domain and roles, then wire everything up.\n# 5. Start a NEW chat when integration is done.\n```\n\nThat's it. The AI reads `harmonist/agents/index.json`, picks the\nright specialists for your stack, writes a domain-specific\n`AGENTS.md`, bootstraps `.cursor/memory/`, installs the enforcement\nhooks, and records the integration state in\n`.cursor/pack-version.json`.\n\n### Option 2 — Integrate via CLI (no Cursor needed)\n\n```bash\ncd your-project/\ngit clone https://github.com/GammaLabTechnologies/harmonist.git\npython3 harmonist/agents/scripts/integrate.py --pack harmonist --project .\n```\n\n### Option 3 — Manual integration\n\nSee [`GUIDE_EN.md`](GUIDE_EN.md) for the step-by-step manual path.\n\n---\n\n## Architecture\n\n```\n                     ┌────────────────────────────┐\n                     │        AGENTS.md           │\n                     │      Orchestrator          │\n                     │                            │\n                     │  Protocol · Hook Phases    │\n                     │  Invariants · Memory       │\n                     └─────────────┬──────────────┘\n                                   │  reads\n                                   ▼\n                     ┌────────────────────────────┐\n                     │   agents/index.json        │   ← generated\n                     │                            │\n                     │   by category · by tag     │   ← routing table\n                     │   186 entries              │\n                     └─────────────┬──────────────┘\n                                   │  routes to\n            ┌──────────────────────┼──────────────────────┐\n            ▼                      ▼                      ▼\n     ┌──────────────┐      ┌──────────────┐      ┌──────────────┐\n     │ orchestration│      │   review     │      │   persona    │\n     │ (scout,      │      │ (strict,     │      │ (engineering,│\n     │  repo-map)   │      │  readonly)   │      │  design, …)  │\n     └──────────────┘      └──────────────┘      └──────────────┘\n                                   │                      │\n            ┌──────────────────────┴──────────────────────┐\n            ▼                                             ▼\n     ┌──────────────┐                             ┌──────────────┐\n     │ Review gates │                             │   .cursor/   │\n     │              │                             │   memory/    │\n     │ qa · sec     │                             │              │\n     │ sre · perf   │                             │ session      │\n     │ regression   │                             │ decisions    │\n     └──────────────┘                             │ patterns     │\n                                                  └──────────────┘\n```\n\n### How it works\n\n1. **Single unified pool.** Every agent lives at\n   `agents/<category>/<slug>.md` with the same [Schema v2](agents/SCHEMA.md)\n   frontmatter. One schema, one catalogue.\n2. **Data-driven routing.** The orchestrator never hard-codes slugs.\n   It extracts task tags (\"payments\", \"react\", \"solidity\"),\n   intersects with `agents/index.json`, filters by the project's\n   declared `domains` and `roles`, and picks the right specialist.\n3. **Protocol tiers by metadata.** `protocol: strict` agents\n   (orchestration + review) are mandatory gates that run on triggers.\n   `protocol: persona` agents are free-form specialists with domain\n   depth.\n4. **Hook-observed execution.** `sessionStart`, `afterFileEdit`,\n   `subagentStart`, `subagentStop`, and `stop` hooks track the full\n   lifecycle. The `stop` hook is the gate.\n5. **Persistent memory.** Between sessions, state / decisions /\n   patterns live under `.cursor/memory/`, linked by correlation IDs.\n   The next session reads the last three state snapshots and three\n   decisions before planning.\n\n---\n\n## The 186-agent catalogue\n\nEvery count below is mirrored from `agents/index.json` and verified by\n`check_pack_health.py` — the table and the index cannot drift.\n\n| Category            | Count | Protocol | Focus                                               |\n|---------------------|-------|----------|-----------------------------------------------------|\n| `orchestration`     |   2   | strict   | Scout before implementation, route to right agent   |\n| `review`            |   6   | strict   | Readonly reviewers — security, quality, QA, SRE, regression, a11y |\n| `engineering`       |  46   | persona  | Backend, frontend, DevOps, data, AI, embedded, Solidity, LLM eval |\n| `design`            |   8   | persona  | UI/UX, brand, accessibility, visual storytelling    |\n| `testing`           |   8   | persona  | QA, performance, API testing, evidence collection   |\n| `product`           |   5   | persona  | Product management, sprints, feedback, trends       |\n| `project-management`|   7   | persona  | Planning, studio production, coordination           |\n| `marketing`         |  30   | persona  | Growth, SEO, content, social, Douyin/WeChat/Xiaohongshu |\n| `paid-media`        |   7   | persona  | PPC, tracking, campaign audits                      |\n| `sales`             |   8   | persona  | Outbound, deals, discovery, proposals               |\n| `finance`           |   6   | persona  | FPA, bookkeeping, tax, investments                  |\n| `support`           |   5   | persona  | Customer support, compliance, analytics             |\n| `academic`          |   5   | persona  | Research, psychology, history, anthropology         |\n| `game-development`  |  20   | persona  | Unity, Unreal, Godot, Roblox, Blender               |\n| `spatial-computing` |   6   | persona  | visionOS, WebXR, Metal, XR interaction              |\n| `specialized`       |  17   | persona  | Blockchain audit, MCP builder, Salesforce, ZK, niche |\n\nEach agent carries structured frontmatter: `description`, `tags`,\n`domains`, `distinguishes_from` (near-peers), `disambiguation`\n(one-line \"when to pick this over X\"), `version`, and `updated_at`.\nThe orchestrator reads all of this for tie-breaking when multiple\ncandidates match a task's tags.\n\n---\n\n## Mechanical enforcement\n\nThe enforcement layer is what separates Harmonist from a \"nice prompt\npack\". It lives in `hooks/` and gets installed into `.cursor/hooks/`\nat integration time.\n\n### Five hook phases\n\n| Phase              | What happens                                                                |\n|--------------------|-----------------------------------------------------------------------------|\n| `sessionStart`     | Bootstrap correlation_id, inject last 3 state / decision memory entries, warn about prior incidents |\n| `afterFileEdit`    | Record every write to session state for the stop gate                       |\n| `subagentStart`    | Parse `AGENT: <slug>` marker, credit the reviewer, enforce `readonly` capability scoping |\n| `subagentStop`     | Record verdict, update telemetry                                            |\n| `stop`             | **The gate.** Verify reviewers ran, memory updated, protocol satisfied. Return `followup_message` if not. |\n\n### What the stop gate actually checks\n\nIf the session touched any file outside ignored patterns:\n\n1. At least one `category: review` agent was invoked via Task.\n2. Specifically `qa-verifier` was invoked.\n3. `.cursor/memory/session-handoff.md` was updated during the session.\n\nIf any check fails, the hook returns `followup_message` telling the AI\nexactly what's missing. `loop_limit: 3` caps retries. On exhaustion,\nthe incident is persisted to `.cursor/hooks/.state/incidents.json`\nand surfaced in the next session as an unmissable banner.\n\n### PROTOCOL-SKIP escape hatch\n\nFor genuinely trivial turns (typo fix in a comment, markdown\nrewording), the AI can emit `PROTOCOL-SKIP: <reason>` to bypass\nthe gate. The hook logs it. If the skip rate crosses a threshold\n(default `> 25%` of all completions, min 5 skips), the next session\nstarts with a warning about abuse. Easy to opt out of cleanly;\nhard to abuse quietly.\n\n---\n\n## Structured validated memory\n\nMemory is a contract, not free-form markdown. Every entry is a YAML\nblock delimited by `<!-- memory-entry:start -->` /\n`<!-- memory-entry:end -->` with required fields: `id`,\n`correlation_id`, `at`, `kind`, `status`, `author`, `summary`.\n\nThree files with explicit roles:\n\n| File                    | `kind`     | Purpose                              |\n|-------------------------|------------|--------------------------------------|\n| `session-handoff.md`    | `state`    | Project state snapshot. Latest = authoritative. |\n| `decisions.md`          | `decision` | Append-only architectural decisions. |\n| `patterns.md`           | `pattern`  | Lessons learned — what worked, what didn't. |\n\n### CLI as the only write path\n\n```bash\npython3 .cursor/memory/memory.py append \\\n  --file session-handoff --kind state --status done \\\n  --summary \"Integrated Stripe webhook handler\" \\\n  --tags payments,backend \\\n  --body-file /tmp/handoff-body.md\n```\n\nThe CLI:\n\n- Generates `id` and `at` deterministically.\n- Reads the active `correlation_id` from the hooks (not from the LLM).\n- Validates the entry against `memory/SCHEMA.md` before writing.\n- Scans the body for ~30 secret patterns and rejects leaks.\n- Refuses duplicates unless `--allow-duplicate`.\n\n### Search, rotate, dedupe\n\n```bash\npython3 .cursor/memory/memory.py search --tag payments\npython3 .cursor/memory/memory.py latest --file session-handoff --n 5\npython3 .cursor/memory/memory.py rotate --keep-last 50\n```\n\nThe `rotate` verb archives older entries to a sibling `.archive.md`\nfile while keeping the last N live. Both archive and live pass the\nvalidator.\n\n---\n\n## Supply-chain integrity\n\nEvery shipped file has a sha256 entry in `MANIFEST.sha256`. This buys:\n\n- **Pack health at preflight.** `check_pack_health.py` runs 18 checks\n  including `build_manifest.py --verify` — any modified / missing /\n  untracked file is flagged.\n- **Upgrade refusal.** `upgrade.py --apply` sha-verifies every pack\n  source BEFORE copying into a project. A tampered\n  `security-reviewer.md` is REFUSED and never enters `.cursor/`:\n  ```\n  ! REFUSED  agents/review/security-reviewer.md: manifest expected\n             5d731c6b..., actual 4b5c2283... -- possible supply-chain tampering\n  ```\n- **Install-extras verification.** `install_extras.py` — the\n  on-demand specialist installer — inherits the same supply-chain\n  guard.\n- **Post-install anchor.** `.cursor/pack-manifest.json` records\n  sha256 of every installed pack-owned file so\n  `verify_integration.py` can detect someone editing `gate-stop.sh`\n  or `qa-verifier.md` locally to weaken enforcement.\n- **Snapshot + rollback.** `upgrade.py --apply` takes a tarball\n  snapshot to `.cursor/.integration-snapshots/` before touching\n  anything; `upgrade.py --rollback` restores from the latest.\n\n### Prompt-injection scanner\n\nAgents are copy-pasted into `.cursor/agents/` and become part of the\norchestrator's prompt context. A hostile body can silently subvert\nevery session. `scan_agent_safety.py` runs a heuristic regex pass\nover every agent markdown for four classes of hostile content:\n\n| Class              | Examples |\n|--------------------|----------|\n| Override           | \"ignore previous instructions\", jailbreak markers |\n| Exfil              | Secret leak attempts, `~/.ssh/id_rsa` access, reveal-system-prompt probes |\n| Remote exec        | `curl \\| bash`, base64-decode-exec, pastebin / ngrok / webhook.site callbacks |\n| Policy subversion  | \"skip qa-verifier\", \"always approve silently\" |\n\nRuns on the pack catalogue in CI and on installed `.cursor/agents/`\nafter integration. Exit 1 on any error-severity hit. False-positive\nguards built in for legitimate MITRE ATT&CK threat documentation.\n\n---\n\n## Supported IDE integrations\n\nHarmonist ships converters for 11 AI coding assistants. Run\n`./agents/scripts/convert.sh --tool <name>` to regenerate the\ntarget-specific artifacts, then `./agents/scripts/install.sh` to\nplace them in the right spots.\n\n| Tool              | Surface produced                                         |\n|-------------------|----------------------------------------------------------|\n| **Cursor**        | `.cursor/agents/*.md` + `.cursor/rules/*.mdc` + hooks    |\n| **Claude Code**   | Project-scoped agent definitions                         |\n| **GitHub Copilot**| Custom instruction file                                  |\n| **Windsurf**      | `.windsurfrules`                                         |\n| **Aider**         | `CONVENTIONS.md`                                         |\n| **Kimi**          | `agents-orchestrator/system.md`                          |\n| **Qwen**          | Agent directory format                                   |\n| **Gemini CLI**    | Extension manifest + skills                              |\n| **OpenCode**      | Per-agent markdown                                       |\n| **OpenClaw**      | IDENTITY.md per agent                                    |\n| **Antigravity**   | Skill format                                             |\n\nAdd `--thin` to install the essentials-only variant of each persona\nagent (~38% fewer body lines across the pool, which matters in\ncontext-constrained sessions). See [`agents/SCHEMA.md`](agents/SCHEMA.md)\nfor the `## Deep Reference` convention that makes thin mode possible.\n\n---\n\n## Key scripts\n\n| Script                              | What it does                                                                   |\n|-------------------------------------|--------------------------------------------------------------------------------|\n| `check_pack_health.py`              | 18 preflight checks (version, manifest, lint, migrator idempotency, etc.)     |\n| `lint_agents.py`                    | Validate every agent against Schema v2 — 0 errors required                    |\n| `build_index.py`                    | Regenerate `agents/index.json` (routing table)                                |\n| `build_manifest.py`                 | Regenerate `MANIFEST.sha256` (supply-chain anchor)                            |\n| `integrate.py`                      | Full integration into a target project                                        |\n| `upgrade.py`                        | Roll an integrated project forward to a newer pack version, with snapshots   |\n| `install_extras.py`                 | Add specialists to `.cursor/agents/` by slug, role bundle, or tag — sha-verified |\n| `verify_integration.py`             | Objective post-integration audit — what's missing, what's customised         |\n| `scan_agent_safety.py`              | Prompt-injection / exfil scanner for catalogue + installed agents            |\n| `scan_memory_leaks.py`              | Audit git history for accidentally-committed memory files                    |\n| `scan_rules_conflicts.py`           | Detect phantom slugs, duplicate-purpose rules, protocol contradictions       |\n| `insert_deep_ref_marker.py`         | Add `## Deep Reference` cut point to long persona agents                     |\n| `extract_essentials.py`             | Produce the thin variant of a persona agent                                  |\n| `report_usage.py`                   | Render local agent-usage telemetry; recommend dead-balance removal           |\n\nFull script index: [`agents/scripts/`](agents/scripts/).\n\n---\n\n## Documentation\n\n| File | Purpose |\n|------|---------|\n| [`AGENTS.md`](AGENTS.md) | Orchestrator template — protocol, hook phases, memory, resilience. Copied into every integrated project and customized to the project's domain. |\n| [`GUIDE_EN.md`](GUIDE_EN.md) | Condensed walkthrough for first-time users. |\n| [`integration-prompt.md`](integration-prompt.md) | The one-shot prompt to paste into Cursor Agent mode for fully automated integration. |\n| [`agents/SCHEMA.md`](agents/SCHEMA.md) | Frontmatter contract (Schema v2) every agent file must satisfy. |\n| [`agents/STYLE.md`](agents/STYLE.md) | How agent bodies should read — canonical shapes, anti-patterns, retrofit checklist. |\n| [`agents/TAGS.md`](agents/TAGS.md) | Curated tag vocabulary (253 tags organized by layer). |\n| [`memory/SCHEMA.md`](memory/SCHEMA.md) | Memory entry schema (v1), correlation-ID format, validation rules. |\n| [`CONTRIBUTING.md`](CONTRIBUTING.md) | How to contribute, PR checklist, release process. |\n| [`SECURITY.md`](SECURITY.md) | Vulnerability reporting policy, scope, response timelines. |\n| [`CODE_OF_CONDUCT.md`](CODE_OF_CONDUCT.md) | Community standards. |\n| [`CHANGELOG.md`](CHANGELOG.md) | Release history in Keep-a-Changelog format. |\n| [`playbooks/`](playbooks/) | Optional NEXUS 7-phase lifecycle with phase-specific runbooks for startups, enterprises, incident response, and marketing campaigns. |\n\n---\n\n## Testing\n\nThe enforcement layer, memory CLI, and every script ship with\nexhaustive test coverage. `430+ test assertions` across hooks, memory,\nand shell-based integration suites — all green in CI on every push.\n\n| Suite                              | Assertions | Covers                                              |\n|------------------------------------|-----------:|-----------------------------------------------------|\n| Hook tests                         |         30 | All 5 phases, capability scoping, loop-limit, incident surfacing, cross-platform runner parity |\n| Memory tests                       |         29 | Append, validate, search, rotate, dedupe, migrations, secret patterns |\n| Integration + upgrade + install_extras  |        90+ | End-to-end integration, snapshots, rollback, on-demand specialist install |\n| Supply-chain integrity             |         23 | MANIFEST verification, tampered-source refusal, pack-manifest tracking |\n| 15 other script suites             |        250+| lint, extract, freshness, rules-conflicts, memory-privacy, telemetry, project-context, regression detection, py-guard sync, smoke test, etc. |\n\nRun the full regression locally:\n\n```bash\npython3 agents/scripts/check_pack_health.py       # 18 preflight checks\nbash hooks/tests/run-hook-tests.sh                # 30 scenarios\nbash memory/tests/run-memory-tests.sh             # 29 scenarios\nfor t in agents/scripts/test_*.sh; do bash \"$t\"; done  # 17 more suites\n```\n\n---\n\n## FAQ\n\n### Is this another LangChain / AutoGen / CrewAI alternative?\n\nNo. Those are **frameworks you build an agentic application on top of**\n— they provide abstractions for chaining LLM calls, tool use, and\norchestration logic.\n\nHarmonist is **a pack you drop into an existing project** to make your\nAI assistant follow a protocol. It doesn't replace your app's runtime;\nit installs next to your code and intercepts how the coding assistant\n(Cursor, Claude Code, Copilot, etc.) interacts with your project.\n\nThe two can coexist. Harmonist governs the *coding workflow*; a\nLangChain / AutoGen / CrewAI app is something the workflow might\n*produce*.\n\n### Why mechanical enforcement instead of prompt guidance?\n\nBecause prompt guidance is advisory and AI models treat it that way.\n\"Always run QA before marking done\" in a prompt is aspirational. A\nstop hook that refuses to let the turn finish until QA ran is a\ncontract. We chose contracts.\n\n### Does it work without Cursor?\n\nYes. Cursor is the primary integration because of its subagent and\nhooks support, but the pack ships adapters for 10 other tools (see\n[Supported IDE integrations](#supported-ide-integrations)). The\nenforcement layer is strongest with Cursor; in other tools it falls\nback to convention-plus-validation.\n\n### Can I customize the protocol?\n\nYes, and you should. The project-level `AGENTS.md` is the canonical\nsource for your domain's invariants, stack, modules, and resilience\npolicies. The orchestrator gives *it* precedence over any persona\nagent body. Persona agents adapt to your rules; your rules don't\nadapt to personas.\n\nPack-owned sections of `AGENTS.md` are delimited by\n`<!-- pack-owned -->` markers and upgrade-replaced by `upgrade.py`.\nEverything outside those markers is yours — untouched by upgrades.\n\n### Is telemetry enabled by default? What does it collect?\n\nLocal telemetry is enabled by default. It records per-agent\ninvocation counts, session counts, and gate-allow / PROTOCOL-SKIP\ncounters to `.cursor/telemetry/agent-usage.json`. **Nothing is\nuploaded anywhere — it's a local file, gitignored, and readable in\nplain JSON.**\n\nDisable completely by setting `telemetry_enabled: false` in\n`.cursor/hooks/config.json`.\n\n### Why 186 agents? Isn't that too many?\n\nMost projects activate 10–20 specialists for their actual working\nroles. The other ~170 are available but invisible — filtered out by\nthe `domains × roles × tags` intersection during routing. A TON\nblockchain project never sees WeChat or Xiaohongshu marketing\nagents. A Web SaaS never sees Solidity or ZK specialists.\n\nThe size of the catalogue is an **asset**, not a cost — it means when\nyour project grows into a new role (adds marketing, adds support,\npivots to a new platform), the specialists are already curated and\nvetted. Install them on demand with:\n```bash\npython3 agents/scripts/install_extras.py --role marketing\n```\n\n### How do I add my own agent?\n\nSee [`agents/STYLE.md`](agents/STYLE.md) for the canonical persona\ntemplate and [`agents/SCHEMA.md`](agents/SCHEMA.md) for the\nfrontmatter contract. Create the file under the right category\ndirectory, run `python3 agents/scripts/lint_agents.py` to validate,\nregenerate the index (`build_index.py`) and manifest\n(`build_manifest.py`), and commit.\n\n### What's the license and who owns the code?\n\nMIT — [see LICENSE](LICENSE). Copyright © 2026 GammaLab.\nFree to use, modify, fork, and ship commercial products built on\ntop of.\n\n### I found a security issue. Where do I report it?\n\nOpen a **private security advisory** via the repository's Security\ntab — see [`SECURITY.md`](SECURITY.md). Do not open a public issue\nfor security-sensitive reports.\n\n---\n\n## Contributing\n\nHarmonist welcomes contributions that raise the bar:\n\n- **New agents** for domains not yet covered.\n- **Tighter enforcement** in the hooks.\n- **New integrations** for AI assistants we don't support yet.\n- **Documentation** that helps someone go from \"I just heard of this\"\n  to \"I integrated it into a real project\" faster.\n\nBefore opening a PR, read [`CONTRIBUTING.md`](CONTRIBUTING.md). For\nnon-trivial work, **open an issue first** to align on approach. Drive-\nby reformatting will be closed; content-driven PRs will be reviewed\nquickly.\n\n---\n\n## Security\n\n- Private vulnerability reports: see [`SECURITY.md`](SECURITY.md).\n- Supply-chain audit: run `python3 agents/scripts/check_pack_health.py`\n  after every `git pull`.\n- Community standards: [`CODE_OF_CONDUCT.md`](CODE_OF_CONDUCT.md).\n\n---\n\n## License\n\nHarmonist is released under the [MIT License](LICENSE) —\n**Copyright © 2026 GammaLab**. Free for commercial use, modification,\nand distribution.\n\n---\n\n## About GammaLab\n\n[**GammaLab**](https://gammalab.ae) is a technology company working on\nrobotics, artificial intelligence, and machine cognition. Harmonist\nis our first open-source release — a tool we built to enforce\nengineering discipline in AI-assisted development, and one we use\ndaily across our own internal projects.\n\nIf you ship production code with AI assistance and you care about\nmaking that code safe, auditable, and aligned with your project's\nactual rules — Harmonist is for you.\n\n- **Website:** [gammalab.ae](https://gammalab.ae)\n- **GitHub:** [@GammaLabTechnologies](https://github.com/GammaLabTechnologies)\n- **Contact:** Open an issue for public discussion; use the\n  repository's Security tab for private reports.\n\n---\n\n<div align=\"center\">\n\n**If Harmonist helps you ship safer AI-assisted code,\nstar the repository — it's the cheapest signal you can send\nthe maintainers that this work matters.** ⭐\n\nMade with engineering discipline by [GammaLab](https://gammalab.ae).\n\n</div>\n","summary":"Harmonist is a portable AI agent orchestration framework that enforces coding protocols through mechanical, IDE‑level hooks instead of relying on model‑level compliance. It plugs into popular assistants such as Copilot, Claude Code, Cursor, Windsurf and Aider, gating every code‑changing turn until checks—like required reviews, memory‑updates, and supply‑chain integrity—succeed. Built with only the Python standard library, it ships over 180 reusable agents and integrates directly with editors through shell and Python scripts, offering a zero‑runtime, audit‑ready solution. This makes it especially useful for solo developers and teams that need firm governance on AI‑generated code without deploying heavy infrastructure.","description":"Portable AI agent orchestration with mechanical protocol enforcement. 186 agents, zero runtime dependencies.","stars":782,"language":"Python"},{"owner":"russellromney","repo":"honker","url":"https://github.com/russellromney/honker","readme":"<h1 align=\"center\">\n  <img src=\"assets/honker-logo.png\" width=\"120\" alt=\"\" /><br/>honker\n</h1>\n\n`honker` is a SQLite extension + language bindings that add Postgres-style `NOTIFY`/`LISTEN` semantics to SQLite, with built-in durable pub/sub, task queue, and event streams, without client polling or a daemon/broker. Any language that can `SELECT load_extension('honker')` gets the same features.\n\nhonker ships as a [Rust crate](https://crates.io/crates/honker) (`honker`, plus `honker-core`/`honker-extension`), a [SQLite loadable extension](#sqlite-extension-any-sqlite-39-client), and language packages: Python (`honker`), Node (`@russellthehippo/honker-node`), Bun (`@russellthehippo/honker-bun`), Ruby (`honker`), Go, Elixir, C++. The on-disk layout is defined once in Rust; every binding is a thin wrapper around the loadable extension.\n\n`honker` works by replacing application-level polling with a single-digit-µs `PRAGMA data_version` read on the database every 1ms, achieving push-like semantics and cross-process notifications with single-digit-millisecond delivery.\n\n> Experimental. API may change.\n\nSQLite is increasingly the database for shipped projects. Those inevitably require pubsub and a task queue. The usual answer is \"add Redis + Celery.\" That works, but it introduces a second datastore with its own backup story, a dual-write problem between your business table and the queue, and the operational overhead of running a broker.\n\nhonker takes the approach that if SQLite is the primary datastore, the queue should live in the same file. That means `INSERT INTO orders` and `queue.enqueue(...)` commit in the same transaction. Rollback drops both. The queue is just rows in a table with a partial index.\n\nPrior art:  [`pg_notify`](https://www.postgresql.org/docs/current/sql-notify.html) (fast triggers, no retry/visibility), [Huey](https://github.com/coleifer/huey) (SQLite-backed Python), [pg-boss](https://github.com/timgit/pg-boss) and [Oban](https://github.com/sorentwo/oban) (the Postgres-side gold standards we're chasing on SQLite). If you already run Postgres, use those, as they are excellent.\n\n## At a glance\n\n```python\nimport honker\n\ndb = honker.open(\"app.db\")\nemails = db.queue(\"emails\")\n\n# Enqueue\nemails.enqueue({\"to\": \"alice@example.com\"})\n\n# Consume (worker process)\nasync for job in emails.claim(\"worker-1\"):\n    send(job.payload)\n    job.ack()\n```\n\nAny enqueue can be atomic with a business write. Rollback drops both.\n\n```python\nwith db.transaction() as tx:\n    tx.execute(\"INSERT INTO orders (user_id) VALUES (?)\", [42])\n    emails.enqueue({\"to\": \"alice@example.com\"}, tx=tx)\n```\n\n## Features\n\nToday:\n\n- Notify/listen across processes on one `.db` file\n- Work queues with retries, priority, delayed jobs, and a dead-letter table\n- Any send can be atomic with your business write (commit together or roll back together)\n- Single-digit millisecond cross-process reaction time, no polling\n- Handler timeouts, declarative retries with exponential backoff\n- Delayed jobs, task expiration, named locks, rate-limiting\n- Crontab-style periodic tasks with a leader-elected scheduler\n- Opt-in task result storage (`enqueue` returns an id, worker persists the\n  return value, caller awaits `queue.wait_result(id)`)\n- Durable streams with per-consumer offsets and configurable flush interval\n- SQLite loadable extension so any SQLite client can read the same tables\n- Bindings: Python, Node.js, Rust, Go, Ruby, Bun, Elixir\n- Works inside an ORM-owned SQLite connection. SQLAlchemy, SQLModel, Django, Drizzle, Kysely, sqlx, GORM, ActiveRecord, Ecto ([guide](https://honker.dev/guides/orm/))\n\nDeliberately not built: task pipelines/chains/groups/chords, multi-writer replication, workflow orchestration with DAGs.\n\n## Quick start \n\n### Python: queue (durable at-least-once work)\n\n```bash\npip install honker\n```\n\n```python\nimport honker\ndb = honker.open(\"app.db\")\nemails = db.queue(\"emails\")\n\nwith db.transaction() as tx:\n    tx.execute(\"INSERT INTO orders (user_id) VALUES (?)\", [42])\n    emails.enqueue({\"to\": \"alice@example.com\"}, tx=tx)   # atomic with order\n\n# Then in a worker, do: \nasync for job in emails.claim(\"worker-1\"):               # wakes on any commit to the db\n    try:\n        send(job.payload); job.ack()\n    except Exception as e:\n        job.retry(delay_s=60, error=str(e))\n```\n\n`claim()` is an async iterator. Each iteration is one `claim_batch(worker_id, 1)`. Wakes on any commit to the db, falls back to a 5 s paranoia poll only if the commit watcher can't fire. For batched work, call `claim_batch(worker_id, n)` explicitly and ack with `queue.ack_batch(ids, worker_id)`. Defaults: visibility 300 s.\n\n### Python: tasks (Huey-style decorators)\n\nIf you want a function call to turn into an enqueued job without wrapping `queue.enqueue` by hand:\n\n```python\n@emails.task(retries=3, timeout_s=30)\ndef send_email(to: str, subject: str) -> dict:\n    ...\n    return {\"sent_at\": time.time()}\n\n# Caller\nr = send_email(\"alice@example.com\", \"Hi\")   # enqueues, returns a TaskResult\nprint(r.get(timeout=10))                    # blocks until worker runs it\n```\n\nWorker side, either in-process or as its own process:\n\n```bash\npython -m honker worker myapp.tasks:db --queue=emails --concurrency=4\n```\n\nAuto-name is `{module}.{qualname}` (Huey/Celery convention). Explicit names with `@emails.task(name=\"...\")` are recommended in prod so renames don't orphan pending jobs. Periodic tasks use `@emails.periodic_task(crontab(\"0 3 * * *\"))`. Full details in [`packages/honker/examples/tasks.py`](packages/honker/examples/tasks.py).\n\n### Python: stream (durable pub/sub)\n\n```python\nstream = db.stream(\"user-events\")\n\nwith db.transaction() as tx:\n    tx.execute(\"UPDATE users SET name=? WHERE id=?\", [name, uid])\n    stream.publish({\"user_id\": uid, \"change\": \"name\"}, tx=tx)\n\nasync for event in stream.subscribe(consumer=\"dashboard\"):\n    await push_to_browser(event)\n```\n\nEach named consumer tracks its own offset in the `_honker_stream_consumers` table. `subscribe` replays rows past the saved offset, then transitions to live delivery on commit wake. The iterator auto-saves offset at most every 1000 events or every 1 second (whichever first) so a high-throughput stream doesn't hammer the single-writer slot. Override with `save_every_n=` / `save_every_s=`, or set both to 0 to disable auto-save and call `stream.save_offset(consumer, offset, tx=tx)` yourself (atomic with whatever you just did in that tx). At-least-once: a crash re-delivers in-flight events up to the last flushed offset.\n\n### Python: notify (ephemeral pub/sub)\n\n```python\nasync for n in db.listen(\"orders\"):\n    print(n.channel, n.payload)\n\nwith db.transaction() as tx:\n    tx.execute(\"INSERT INTO orders (id, total) VALUES (?, ?)\", [42, 99.99])\n    tx.notify(\"orders\", {\"id\": 42})\n```\n\nListeners attach at current `MAX(id)`; history is not replayed. Use `db.stream()` if you need durable replay. The notifications table is not auto-pruned. Call `db.prune_notifications(older_than_s=…, max_keep=…)` from a scheduled task. Task payloads have to be valid JSON so a Python writer and Node reader can share a channel.\n\n### Node.js\n\n```js\nconst { open } = require('@russellthehippo/honker-node');\nconst db = open('app.db');\n\n// Atomic: business write + notify commit together\nconst tx = db.transaction();\ntx.execute('INSERT INTO orders (id) VALUES (?)', [42]);\ntx.notify('orders', { id: 42 });\ntx.commit();\n\n// Listen wakes on any commit to the db, filters by channel\nfor await (const n of db.listen('orders')) {\n  handle(n.payload);\n}\n```\n\n### SQLite extension (any SQLite 3.9+ client)\n\n```sql\n.load ./libhonker_ext\nSELECT honker_bootstrap();\nINSERT INTO _honker_live (queue, payload) VALUES ('emails', '{\"to\":\"alice\"}');\nSELECT honker_claim_batch('emails', 'worker-1', 32, 300);    -- JSON array\nSELECT honker_ack_batch('[1,2,3]', 'worker-1');              -- DELETEs; returns count\nSELECT honker_sweep_expired('emails');                       -- count moved to dead\nSELECT honker_lock_acquire('backup', 'me', 60);              -- 1 = got it, 0 = held\nSELECT honker_lock_release('backup', 'me');                  -- 1 = released\nSELECT honker_rate_limit_try('api', 10, 60);                 -- 1 = under, 0 = at limit\nSELECT honker_rate_limit_sweep(3600);                        -- drop windows >1h old\nSELECT honker_cron_next_after('0 3 * * *', unixepoch());     -- unix ts of next fire\nSELECT honker_scheduler_register('nightly', 'backups',\n  '0 3 * * *', '\"go\"', 0, NULL);                         -- register periodic task\nSELECT honker_scheduler_tick(unixepoch());                   -- JSON: fires due\nSELECT honker_scheduler_soonest();                           -- min next_fire_at\nSELECT honker_scheduler_unregister('nightly');               -- 1 = deleted\nSELECT honker_stream_publish('orders', 'k', '{\"id\":42}');    -- returns offset\nSELECT honker_stream_read_since('orders', 0, 1000);          -- JSON array\nSELECT honker_stream_save_offset('worker', 'orders', 42);    -- monotonic upsert\nSELECT honker_stream_get_offset('worker', 'orders');         -- offset or 0\nSELECT honker_result_save(42, '{\"ok\":true}', 3600);          -- save w/ 1h TTL\nSELECT honker_result_get(42);                                -- value or NULL\nSELECT honker_result_sweep();                                -- prune expired\nSELECT notify('orders', '{\"id\":42}');\n```\n\nThe extension shares `_honker_live`, `_honker_dead`, and `_honker_notifications` with the Python binding, so a Python worker can claim jobs any other language pushed via the extension. Schema compatibility is pinned by `tests/test_extension_interop.py`.\n\n## Design\n\nThis repo includes the `honker` SQLite loadable extension and bindings for Python, Node, Rust, Go, Ruby, Bun, and Elixir. \n\nFor most applications, [SQLite alone is sufficient](https://www.epicweb.dev/why-you-should-probably-be-using-sqlite). There are already great libraries that leverage SQLite for durable messaging. [Huey](https://github.com/coleifer/huey) is the one honker draws the most from. This project is inspired by it and seeks to do something similar across languages and frameworks by moving package logic into a SQLite extension.\n\nFor Postgres-backed apps, [`pg_notify`](https://www.postgresql.org/docs/current/sql-notify.html) + [pg-boss](https://github.com/timgit/pg-boss) or [Oban](https://hexdocs.pm/oban/) is the equivalent. This library is for apps where SQLite is the primary datastore.\n\nThe extension has three primitives that tie it together: ephemeral pub/sub (`notify()`), durable pub/sub with per-consumer offsets (`stream()`), at-least-once work queue (`queue()`). All three are INSERTs inside your transaction, which lets a task \"send\" be atomic with your business write, and rollback drops everything.\n\nThe explicit goal is to do `NOTIFY`/`LISTEN` semantics without application-level polling, to achieve single-digit ms reaction time. If you use your app's existing SQLite file containing business logic, it will notify workers on every commit to the database. This means that most triggers will not result in anything happening: instead, workers just read the message/queue with no result. This \"overtriggering\" is on purpose and is the tradeoff for push-like semantics and fast reaction time.\n\n### WAL is the recommended default\n\nThe language bindings default to `journal_mode = WAL` because it gives concurrent readers with one writer and efficient fsync batching (`wal_autocheckpoint = 10000`). Other modes (DELETE, TRUNCATE, MEMORY) still work. The wake path is `PRAGMA data_version`, which increments on every commit in every journal mode and is visible across processes. What you lose in non-WAL modes is WAL's concurrent-read-while-writing property; correctness and cross-process wake do not depend on WAL.\n\n- One `.db` is the entire system (plus `.db-wal` / `.db-shm` sidecars if you've opted into WAL). You get every benefit of SQLite (embedded, local, durable, snapshot-able) that your app already uses.\n- Claim is one `UPDATE … RETURNING` via a partial index; ack is one `DELETE`. One writer at a time no matter the journal mode; concurrent readers come with WAL.\n- We poll `PRAGMA data_version` every 1 ms to detect commits from any connection in any journal mode. The counter increments on every commit and on checkpoint, so WAL truncation, journal-file comings-and-goings, and exact-size collisions are all handled correctly.\n- SQLite has no wire protocol. Consumers must initiate reads; server-push is impossible. Wake signal = counter increment → `SELECT`.\n- Transactions are cheap, so jobs, events, and notifications are rows in the caller's open `with db.transaction()` block in an \"outbox\"-type pattern.\n- We use `PRAGMA data_version` instead of `stat(2)` on the WAL file or kernel watchers (`F
