runbook`, `research`, or start blank with `kiwifs init`.\n\n---\n\n## Features\n\n### Web UI\n\nEmbedded in the binary via `go:embed`. No separate frontend deploy, no Node runtime. Obsidian's knowledge features (wiki links, backlinks, graph view) with a Notion-style block editor.\n\n- **WYSIWYG editor** — block-based (BlockNote), drag handles, 15+ block types, slash commands\n- **`[[Wiki links]]` + backlinks** — type `[[auth]]`, resolves to `concepts/authentication.md`. Backlinks panel shows \"linked from 3 pages.\" This is Obsidian's core feature — notes are connected, not isolated.\n- **Knowledge graph** — visual map of all pages and their connections (Sigma.js + ForceAtlas2). Same organic clustering as Obsidian's graph view.\n- **Cmd+K search** — full-text with highlighted matches\n- **Breadcrumbs** — `Knowledge > Concepts > Authentication`\n- **Table of contents** — auto-generated, sticky sidebar, scroll tracking\n- **Inline comments** — select text, add annotation. Stored in `.kiwi/comments/`, not in the markdown\n- **Dark mode** — toggle a CSS class\n- **Themeable** — CSS variables, Tailwind-based, drop into any shadcn/ui project\n\nBuilt on shadcn/ui + Radix. Accessible. Beautiful by default. Fully customizable.\n\n### Agent interface\n\nWhen your agent has a real filesystem mount:\n\n```bash\ncat /kiwi/concepts/authentication.md\ngrep -r \"timeout\" /kiwi/\nls /kiwi/reports/\necho \"# New finding\" > /kiwi/reports/finding-042.md\n```\n\nWhen a real mount isn't available, agents use the REST API or MCP tools instead.\n\n### MCP (Model Context Protocol)\n\n```bash\nkiwifs mcp --root ~/knowledge          # in-process, no server needed\nkiwifs mcp --remote http://host:3333   # proxy to a running KiwiFS server\n```\n\n7 tools: `kiwi_read`, `kiwi_write`, `kiwi_search`, `kiwi_tree`, `kiwi_query_meta`, `kiwi_delete`, `kiwi_bulk_write`. Plus resources (`kiwi://schema`, `kiwi://file/{path}`, `kiwi://tree/{path}`).\n\n**Claude Desktop / Cursor:**\n```json\n{\n  \"mcpServers\": {\n    \"kiwifs\": {\n      \"command\": \"kiwifs\",\n      \"args\": [\"mcp\", \"--root\", \"/path/to/knowledge\"]\n    }\n  }\n}\n```\n\n### Search (three tiers)\n\n```bash\nkiwifs serve --search grep      # Tier 1: zero deps, exact match\nkiwifs serve --search sqlite    # Tier 2: SQLite FTS5, BM25 ranked (default)\nkiwifs serve                    # Tier 3: + vector search (if configured)\n```\n\n```\nGET /api/kiwi/search?q=payment+timeout           → BM25 ranked results\nGET /api/kiwi/search?q=\"connection reset\" AND ws  → boolean + phrase search\nPOST /api/kiwi/search/semantic                    → vector similarity search\n```\n\nVector search is pluggable — mix any embedder with any vector store:\n\n| Embedder | Vector Store |\n|---|---|\n| OpenAI, Ollama, Cohere, Vertex AI, Bedrock, custom HTTP | sqlite-vec (default), Qdrant, pgvector, Pinecone, Weaviate, Milvus |\n\nDefault (sqlite-vec + OpenAI) needs one env var and zero infrastructure. For fully offline setups: Ollama + sqlite-vec, everything runs locally.\n\n### Git versioning\n\nEvery write is an atomic git commit. Users never see Git — the API abstracts it.\n\n```\nGET /api/kiwi/versions?path=concepts/auth.md   → commit history\nGET /api/kiwi/diff?path=auth.md&from=a1b&to=c3d → unified diff\nGET /api/kiwi/blame?path=concepts/auth.md       → per-line attribution\n```\n\nWhat Git gives you for free: crash recovery, immutable audit trail (SHA-1 hash chain), point-in-time restore, tamper detection, replication via `git push`.\n\n### Access protocols\n\nEvery protocol flows through the same storage layer. Every write — regardless of how it enters — gets a git commit, a search index update, and an SSE broadcast.\n\n```\n┌─────────────────────────────────────────┐\n│              KiwiFS Server              │\n│                                         │\n│  REST API  │  NFS   │  S3    │ WebDAV   │\n│   :3333    │ :2049  │ :3334  │  :3335   │\n│            └────┬───┘        │          │\n│       ──────────┴────────────┘          │\n│    Storage → Git → Index → SSE          │\n└─────────────────────────────────────────┘\n```\n\n| Protocol | Use case | Example |\n|---|---|---|\n| **REST API** | Web frontend, scripts | `curl localhost:3333/api/kiwi/file?path=index.md` |\n| **MCP** | AI agents (Claude, Cursor, custom) | `kiwifs mcp --root ~/knowledge` |\n| **NFS** | Docker, Kubernetes (native mount, no FUSE, no privileged) | `docker run --mount type=nfs,...` |\n| **S3** | Backup, data pipelines, any tool that \"supports S3\" | `aws s3 sync s3://knowledge/ /backup/` |\n| **WebDAV** | Windows mapped drives, legacy tools | Map Network Drive in Explorer |\n| **FUSE** | Developer workstations, remote mount as local folder | `kiwifs mount --remote http://server:3333 ~/kiwi` |\n\n### Structured metadata\n\nFrontmatter from every markdown file is mirrored into a SQLite table. Query it:\n\n```\nGET /api/kiwi/meta?where=$.status=published&where=$.priority=high&sort=$.updated&order=desc\n```\n\n### Provenance tracking\n\nKnow which agent run produced which knowledge:\n\n```bash\ncurl -X PUT localhost:3333/api/kiwi/file?path=report.md \\\n  -H \"X-Actor: agent:exec_abc\" \\\n  -H \"X-Provenance: run:run-249\" \\\n  -d \"# Run 249 Report...\"\n```\n\nKiwiFS injects `derived-from` into the frontmatter automatically. Query later: \"show me every page produced by run-249.\"\n\n### Multi-space\n\nOne server, multiple independent knowledge bases:\n\n```\nGET /api/kiwi/{space}/tree\nGET /api/kiwi/{space}/file?path=...\n```\n\nEach space has its own root directory, git repo, search index. Spaces map to NFS exports and S3 buckets.\n\n### Real-time events\n\n```\nGET /api/kiwi/events → SSE stream\n\nevent: write\ndata: {\"path\":\"reports/finding-042.md\",\"actor\":\"agent:exec_abc\"}\n```\n\nUI updates live when knowledge changes. No polling.\n\n### Permalinks\n\nSet `public_url` in config and every API response includes stable, shareable URLs:\n\n```\nhttps://wiki.mycompany.com/page/concepts/authentication.md\n```\n\n- **SPA deep linking** — `/page/{path}` routes via HTML5 history (no `#` fragments)\n- **Wiki link resolution** — `[[auth]]` resolves to the full permalink URL for external contexts (Slack, PR comments, exports)\n- **X-Permalink header** — every file read returns the permalink in the response header\n- **`KIWI_PUBLIC_URL` env var** — override config for Docker/CI without editing TOML\n\n### Knowledge health\n\nBuilt-in janitor scans your knowledge base for quality issues:\n\n- **Stale page detection** — pages not reviewed within a configurable window (default 90 days)\n- **Contradiction finder** — pages with conflicting claims on the same topic\n- **Trust-ranked search** — pages marked `status: verified` or `source-of-truth: true` rank higher\n- **Scheduled scans** — background janitor runs on a configurable interval (default 24h)\n- **Share links** — password-protected public access to specific pages (bcrypt-hashed)\n\n### CLI\n\nEvery feature is accessible via `kiwifs <command>`:\n\n| Command | What it does |\n|---|---|\n| `kiwifs serve` | Start the server (REST API + web UI + optional NFS/S3/WebDAV) |\n| `kiwifs init` | Scaffold a knowledge base from a template (`knowledge`, `wiki`, `runbook`, `research`, or blank) |\n| `kiwifs mcp` | Start a Model Context Protocol server (for Claude, Cursor, etc.) |\n| `kiwifs mount` | FUSE-mount a remote KiwiFS server as a local folder |\n| `kiwifs reindex` | Rebuild search indexes from files (FTS5 + vector + metadata) |\n| `kiwifs lint` | Validate knowledge base (orphan pages, broken links, missing frontmatter) |\n| `kiwifs backup` | Push to a git remote for off-site backup |\n| `kiwifs restore` | Clone from a git remote and rebuild indexes |\n| `kiwifs janitor` | Run a knowledge health scan (stale pages, contradictions, orphans) |\n\nAll commands support `--help` for full flag reference.\n\n---\n\n## Quickstart\n\n### 1. Install\n\n```bash\n# One-line install (macOS / Linux)\ncurl -fsSL https://raw.githubusercontent.com/kiwifs/kiwifs/main/install.sh | sh\n```\n\nOr build from source (requires Go 1.25+ and Node.js 20+):\n\n```bash\ngit clone https://github.com/kiwifs/kiwifs.git && cd kiwifs\ncd ui && npm install && npm run build && cd ..\ngo build -o kiwifs .\n```\n\n### 2. Initialize\n\n```bash\nkiwifs init --template knowledge --root ./knowledge\n# Creates SCHEMA.md, index.md, log.md, concepts/, entities/, reports/\n```\n\n### 3. Serve\n\n```bash\nkiwifs serve --root ./knowledge\n# REST API on :3333, web UI at http://localhost:3333\n```\n\n### 4. Write from an agent\n\n```bash\n# Via filesystem (if mounted):\necho \"# Authentication\\n\\nOAuth2 + JWT...\" > ./knowledge/concepts/auth.md\n\n# Via API:\ncurl -X PUT 'localhost:3333/api/kiwi/file?path=concepts/auth.md' \\\n  -H \"X-Actor: my-agent\" \\\n  -d \"# Authentication\\n\\nOAuth2 + JWT...\"\n```\n\n### 5. Browse in the web UI\n\nOpen `http://localhost:3333`. See `concepts/auth.md` rendered as a styled page with wiki links, backlinks, and table of contents.\n\n---\n\n## Configuration\n\n```toml\n# .kiwi/config.toml\n\n[server]\nport = 3333\nhost = \"0.0.0.0\"\npublic_url = \"https://wiki.mycompany.com\"  # enables permalinks\n\n[storage]\nroot = \"/data/knowledge\"\n\n[search]\nengine = \"sqlite\"                # grep | sqlite | vector\n\n[search.vector]\nenabled = true\n\n[search.vector.embedder]\nprovider = \"openai\"              # openai | ollama | cohere | bedrock | vertex | http\nmodel = \"text-embedding-3-small\"\napi_key = \"${OPENAI_API_KEY}\"\n\n[search.vector.store]\nprovider = \"sqlite-vec\"          # sqlite-vec | qdrant | pgvector | pinecone | weaviate | milvus\n\n[versioning]\nstrategy = \"git\"                 # git | cow | none\n\n[auth]\ntype = \"none\"                    # none | apikey | perspace | oidc\n```\n\nCLI flags override config: `kiwifs serve --port 4000 --search sqlite --versioning git`.\n\n---\n\n## Deployment\n\n### Docker\n\n```bash\n# Build locally (pre-built images coming soon)\ndocker build -t kiwifs .\ndocker run -v ./knowledge:/data -p 3333:3333 kiwifs\n```\n\n### Docker Compose (with vector search)\n\nSee `docker-compose.yml` in the repo for a ready-to-use setup with optional pgvector sidecar.\n\n### Embedded in your app (Go library)\n\n```go\nimport \"github.com/kiwifs/kiwifs/pkg/kiwi\"\n\nsrv, err := kiwi.New(\"/data/knowledge\", kiwi.WithSearch(\"sqlite\"))\nif err != nil { log.Fatal(err) }\ndefer srv.Close()\n\n// Mount as an HTTP handler alongside your own routes\nmux.Handle(\"/knowledge/\", http.StripPrefix(\"/knowledge\", srv.Handler()))\n\n// Or run standalone\nlog.Fatal(srv.ListenAndServe(\":3333\"))\n```\n\n### With NFS (Docker / Kubernetes)\n\n```bash\nkiwifs serve --root /data/knowledge --nfs --nfs-port 2049\n```\n\n```yaml\n# Kubernetes PersistentVolume\napiVersion: v1\nkind: PersistentVolume\nspec:\n  nfs:\n    server: kiwifs.internal\n    path: /\n```\n\n---\n\n## REST API\n\n```\nGET    /health                              → {\"status\":\"ok\"}\n\nGET    /api/kiwi/tree?path=                 → directory tree (JSON)\nGET    /api/kiwi/file?path=                 → raw markdown + ETag\nPUT    /api/kiwi/file?path=                 → write + git commit + re-index\nDELETE /api/kiwi/file?path=                 → delete + git commit\nPOST   /api/kiwi/bulk                       → multi-file write, one commit\n\nGET    /api/kiwi/search?q=                  → full-text search (BM25)\nPOST   /api/kiwi/search/semantic            → vector search\n\nGET    /api/kiwi/versions?path=             → git log for file\nGET    /api/kiwi/version?path=&version=     → content at commit\nGET    /api/kiwi/diff?path=&from=&to=       → unified diff\nGET    /api/kiwi/blame?path=                → per-line attribution\n\nGET    /api/kiwi/meta?where=$.field=val     → structured query over frontmatter\nGET    /api/kiwi/backlinks?path=            → pages that link to this page\nGET    /api/kiwi/toc?path=                  → heading outline\nGET    /api/kiwi/events                     → SSE stream\nPOST   /api/kiwi/resolve-links             → resolve [[wiki-links]] to permalinks\n\nGET    /api/kiwi/stale                      → pages past their review date\nGET    /api/kiwi/contradictions             → pages with conflicting claims\nGET    /api/kiwi/search/verified            → trust-ranked search (verified pages boosted)\nGET    /api/kiwi/janitor                    → knowledge health scan\n\nPOST   /api/kiwi/share                     → create a share link (password-protected)\nGET    /api/kiwi/share                     → list active share links\nDELETE /api/kiwi/share/:id                 → revoke a share link\n\nPOST   /api/kiwi/assets                     → upload binary asset (images, PDFs)\n```\n\nWrites accept `X-Actor` (git attribution), `X-Provenance` (lineage tracking), and `If-Match` (optimistic locking — 409 on conflict).\n\n---\n\n## Design principles\n\n1. **Files are the source of truth.** Every artifact is a plain markdown file. No proprietary format. Delete the search index — the files remain. `cat file.md` always works.\n\n2. **Two interfaces, one truth.** The web UI and the agent filesystem read/write the same files. No sync. No eventual consistency. One folder, two ways to access it.\n\n3. **Search is derivative.** The FTS5 index, the vector index, the metadata table — all rebuildable from files. `kiwifs reindex` and you're back. The folder is the truth, never the index.\n\n4. **Storage-agnostic.** KiwiFS depends on `open()`, `read()`, `write()`, `listdir()`. It doesn't care if the folder is on a laptop SSD, NFS, EFS, JuiceFS, or a FUSE-mounted S3 bucket.\n\n5. **Git as the WAL.** Instead of building a custom write-ahead log, every write is a git commit. Crash recovery, audit trail, tamper detection, replication — all for free.\n\n6. **Embeddable.** The Go library (`pkg/kiwi`) lets you embed KiwiFS in any Go application. The web UI components (`<KiwiTree />`, `<KiwiPage />`, `<KiwiEditor />`, `<KiwiSearch />`) are built for future standalone use as an npm package.\n\n---\n\n## How it compares\n\n| | KiwiFS | agent-vfs | ChromaFS | Obsidian | Outline | Confluence |\n|---|---|---|---|---|---|---|\n| **Agent-native** (`cat`/`grep`/NFS) | Yes | Virtual only | Read-only | Local only | API only | No |\n| **Web UI** (Notion-like) | Yes | No | No | Desktop | Yes | Yes |\n| **Versioned** (git audit trail) | Yes | No | No | No | Limited | Plugin ($$$) |\n| **Searchable** (FTS + vector) | Yes | No | Chroma | Plugins | Yes | Yes |\n| **Single binary** | Yes | No | No | No | No | No (SaaS) |\n| **Embeddable** (Go library) | Yes | No | No | No | No | No |\n| **Self-hosted** | Yes | Yes | Yes | N/A | Yes | No |\n| **Files are the truth** | Yes | DB is truth | DB is truth | Yes | Postgres | Proprietary DB |\n\n---\n\n## Who this is for\n\n**AI agent builders** — Give your agent persistent, searchable memory it accesses with `cat`. Users browse the same files in a web UI with wiki links and graph view. Knowledge compounds across sessions instead of vanishing.\n\n**Teams replacing Confluence / Notion** — Obsidian's file-first philosophy with a web UI anyone on your team can use. `git clone` your entire wiki. Self-hosted. No vendor lock-in.\n\n**Compliance-heavy industries** — Every change is a git commit with SHA-1 hash chain. Immutable audit trail. `git blame` for per-line attribution. An auditor can verify with standard tools.\n\n**DevOps / platform teams** — Runbooks that agents update after every incident. Humans review in the UI. No more docs that rot after three months.\n\n---\n\n## Architecture\n\n```\n┌──────────────────────────────────────────────────────────┐\n│  KiwiFS                                    single Go binary\n│                                                          │\n│  ┌────────────────────────────────────────────────────┐  │\n│  │  Web UI (embedded via go:embed)                    │  │\n│  │  shadcn/ui · BlockNote · react-markdown · Sigma.js │  │\n│  └────────────────────┬───────────────────────────────┘  │\n│                       │                                  │\n│  ┌────────────────────▼───────────────────────────────┐  │\n│  │  Access: REST :3333 · NFS :2049 · S3 :3334 · WebDAV│  │\n│  └────────────────────┬───────────────────────────────┘  │\n│                       │                                  │\n│  ┌────────────────────▼───────────────────────────────┐  │\n│  │  Core                                              │  │\n│  │  Storage · Git versioning · FTS5 + Vector search   │  │\n│  │  Watcher (fsnotify) · SSE events · Schema/lint     │  │\n│  └────────────────────┬───────────────────────────────┘  │\n│                       │                                  │\n│  ┌────────────────────▼───────────────────────────────┐  │\n│  │  .git/ (audit WAL)  ·  .kiwi/state/ (indexes)      │  │\n│  └────────────────────┬───────────────────────────────┘  │\n│                       │                                  │\n│  ┌────────────────────▼───────────────────────────────┐  │\n│  │  Filesystem: local · NFS · EFS · JuiceFS · FUSE-S3 │  │\n│  └────────────────────────────────────────────────────┘  │\n└──────────────────────────────────────────────────────────┘\n```\n\n---\n\n## Inspired by\n\n- **[PocketBase](https://pocketbase.io)** — single Go binary, zero config, just works. KiwiFS is PocketBase for knowledge.\n- **[Obsidian](https://obsidian.md)** — files are the database. Wiki links. Graph view. KiwiFS is Obsidian for the web — plus an agent interface and an API.\n- **[Karpathy's LLM Wiki](https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f)** — raw sources in, compiled wiki out, agent maintains it. KiwiFS is the production runtime for this pattern.\n- **[Mintlify ChromaFS](https://www.mintlify.com/blog/how-we-built-a-virtual-filesystem-for-our-assistant)** — the filesystem is the best agent interface. Agents already know `cat`/`grep`/`ls`.\n- **[Confluence](https://www.atlassian.com/software/confluence)** / **[Notion](https://notion.so)** — great UIs, but your content is locked in their database. KiwiFS gives you the editing experience without the lock-in.\n\n## License\n\n[Business Source License 1.1](LICENSE) — free to use, self-host, and modify. The only restriction: you can't offer KiwiFS as a commercial hosted service. Each release converts to Apache 2.0 after 4 years.\n\nIf you want to offer KiwiFS as a managed service or need a commercial license, [get in touch](mailto:amelia.anh.lam@gmail.com).\n\n\"KiwiFS\" and the KiwiFS logo are trademarks of the KiwiFS Authors. See [LICENSE](LICENSE) for trademark usage guidelines.\n\n## Contributors\n\n<a href=\"https://github.com/PranavChahal\"><img src=\"https://avatars.githubusercontent.com/u/76513953?v=4\" width=\"50\" height=\"50\" alt=\"Pranav\" style=\"border-radius:50%\"></a>\n","summary":"KiwiFS is a lightweight knowledge‑server written in Go that turns a directory of Markdown files into a full‑stack knowledge base. It provides file‑first storage with Git‑based versioning, a web UI similar to Obsidian Publish, full‑text and optional vector search, and optimistic concurrency control using ETags, all without a database or extra configuration. By exposing files via a simple REST API, agents can read and write with familiar shell commands while humans can browse, edit, and audit changes in a browser. The tool is ideal for developers, knowledge‑workers, and open‑source teams who want a self‑hosted, versioned, searchable knowledge hub that agents and humans can both natively use.","description":"The knowledge server — PocketBase for knowledge. One Go binary, zero config.","stars":120,"language":"Go"},{"owner":"Beever-AI","repo":"beever-atlas","url":"https://github.com/Beever-AI/beever-atlas","readme":"<h1 align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"web/public/logo-white.svg\" />\n    <img src=\"web/public/logo-primary.svg\" alt=\"\" height=\"48\" align=\"absmiddle\" />\n  </picture>\n  &nbsp;Beever Atlas\n</h1>\n\n<div align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"assets/banner-dark.png\" />\n    <img src=\"assets/banner.png\" alt=\"Beever Atlas — LLM-first Wiki Knowledge Base\" width=\"85%\" />\n  </picture>\n</div>\n\n<h3 align=\"center\">\n  Turn your team's Slack, Discord, Teams &amp; Mattermost chats<br>\n  into a self-maintaining wiki — automatically.\n</h3>\n\n<p align=\"center\">\n  <a href=\"https://docs.beever.ai/atlas\"><img src=\"https://img.shields.io/badge/DOCS-docs.beever.ai/atlas-FFC107?style=for-the-badge&labelColor=4A4A4A\" alt=\"Docs\" /></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/badge/LICENSE-Apache_2.0-7CB342?style=for-the-badge&labelColor=4A4A4A\" alt=\"License Apache 2.0\" /></a>\n  <a href=\"https://beever.ai\"><img src=\"https://img.shields.io/badge/BUILT_BY-BEEVER.AI-15404E?style=for-the-badge&labelColor=4A4A4A\" alt=\"Built by Beever.ai\" /></a>\n  <a href=\"https://google.github.io/adk-docs/\"><img src=\"https://img.shields.io/badge/BUILT_WITH-Google_ADK-FF6F00?style=for-the-badge&labelColor=4A4A4A\" alt=\"Built with Google ADK\" /></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://discord.gg/VshBCUUX\"><img src=\"https://img.shields.io/badge/DISCORD-Join_Community-5865F2?style=for-the-badge&labelColor=4A4A4A&logo=discord&logoColor=white\" alt=\"Join our Discord\" /></a>\n  <a href=\"https://x.com/Beever_AI\"><img src=\"https://img.shields.io/badge/X-@Beever__AI-000000?style=for-the-badge&labelColor=4A4A4A&logo=x&logoColor=white\" alt=\"Follow us on X\" /></a>\n  <a href=\"https://beever.ai/\"><img src=\"https://img.shields.io/badge/WEBSITE-beever.ai-15404E?style=for-the-badge&labelColor=4A4A4A\" alt=\"beever.ai\" /></a>\n</p>\n\n---\n\nBeever Atlas pulls the conversations your team already has on Slack, Discord, Microsoft Teams, and Mattermost, extracts atomic facts, deduplicates them, and clusters them into topic pages with citations. A graph store links the people, decisions, and projects mentioned across channels. Ask questions in natural language and get answers cited back to the source messages — through the dashboard, or through MCP into Claude Code and Cursor.\n\nIf you want a knowledge base that grows on its own from the chats your team already has, this is it.\n\n---\n\n## ✨ Features in action\n\nSix short clips — connect a workspace, sync history, watch memory build, browse the auto-generated wiki, ask questions, plug external AI agents in via MCP.\n\n<table>\n  <tr>\n    <td width=\"33%\" align=\"center\" valign=\"top\">\n      <strong>Multi-Platform</strong><br><br>\n      <img src=\"assets/clips/multi-platform.gif\" alt=\"Multi-platform connections demo\" width=\"100%\"><br>\n      Connect Slack, Discord, Teams, Mattermost, or file imports. One bot, every workspace.\n    </td>\n    <td width=\"33%\" align=\"center\" valign=\"top\">\n      <strong>Message Sync</strong><br><br>\n      <img src=\"assets/clips/sync.gif\" alt=\"Channel sync demo\" width=\"100%\"><br>\n      Pull channel history on demand or on a schedule. Resumable and rate-limit aware.\n    </td>\n    <td width=\"33%\" align=\"center\" valign=\"top\">\n      <strong>Memory Ingestion</strong><br><br>\n      <img src=\"assets/clips/memory.gif\" alt=\"Memory ingestion pipeline demo\" width=\"100%\"><br>\n      6-stage ADK pipeline distils messages into atomic facts, entities, and relationships.\n    </td>\n  </tr>\n  <tr>\n    <td width=\"33%\" align=\"center\" valign=\"top\">\n      <strong>LLM Wiki</strong><br><br>\n      <img src=\"assets/clips/wiki.gif\" alt=\"LLM wiki browsing demo\" width=\"100%\"><br>\n      Auto-maintained wiki per channel — overview, topics, people, decisions, citations.\n    </td>\n    <td width=\"33%\" align=\"center\" valign=\"top\">\n      <strong>QA Agent</strong><br><br>\n      <img src=\"assets/clips/qa.gif\" alt=\"QA agent answering demo\" width=\"100%\"><br>\n      Streams cited answers over SSE. Smart router picks semantic or graph per question.\n    </td>\n    <td width=\"33%\" align=\"center\" valign=\"top\">\n      <strong>MCP Server</strong><br><br>\n      <img src=\"assets/clips/mcp.gif\" alt=\"MCP server querying from Claude Code demo\" width=\"100%\"><br>\n      Plug Claude Code / Cursor into your knowledge base — 16 tools, per-agent auth.\n    </td>\n  </tr>\n</table>\n\n---\n\n## 🏗️ Architecture\n\nConversations from any supported platform flow into a unified ingestion pipeline that produces two complementary memory systems — a **3-tier semantic store** (channel / topic / atomic fact) for fast hybrid search, and a **graph store** that extracts entities and their relationships. Those memories fuel two consumer surfaces: the **LLM Wiki** (distilled, auto-maintained) and **QA Agents** (served through the dashboard directly, or through **MCP** into Claude Code / Cursor).\n\n<p align=\"center\">\n  <picture>\n    <source media=\"(prefers-color-scheme: dark)\" srcset=\"assets/architecture-dark.png\" />\n    <img src=\"assets/architecture.png\" alt=\"Beever Atlas architecture — chat platforms → memory ingestion → 3-tier semantic memory + graph memory → LLM Wiki and QA Agent → Dashboard and MCP clients\" width=\"60%\" />\n  </picture>\n</p>\n\n<p align=\"center\"><em>From chat platforms to MCP agents — one ingestion path, two memory systems, two delivery surfaces.</em></p>\n\nUnder the hood, three services (backend, bot, frontend) are backed by four data stores (Weaviate, Neo4j, MongoDB, Redis). See the [architecture overview](https://docs.beever.ai/atlas/concepts/architecture) on the documentation site for the full design — component responsibilities, dual-memory internals, and the smart query router.\n\n---\n\n## 💡 Why Wiki-First RAG?\n\nMost RAG systems answer questions by retrieving raw message snippets and feeding them straight to an LLM. Beever Atlas takes a different approach: it continuously distils conversations into a structured, auto-maintained wiki — with topic pages, entity graphs, decisions, and citations — before any query is issued. When you ask a question, the retrieval layer works against clean, deduplicated knowledge rather than noisy chat history. This means answers are more consistent, citations are traceable to source messages, and the wiki itself becomes a useful artifact your team can browse independently of the Q&A interface. The dual-memory architecture (semantic + graph) lets the query router pick the right retrieval strategy per question, keeping latency low and context precise.\n\n<div align=\"center\">\n  <img src=\"assets/wiki-preview.png\" alt=\"Beever Atlas wiki view — auto-generated overview with concept map, topics, FAQ, glossary, and resources, built from Slack messages\" width=\"85%\" />\n</div>\n<p align=\"center\"><em>A live auto-generated channel wiki: overview, concept map, topics, FAQ, glossary — distilled from 246 Slack messages, not hand-written.</em></p>\n\n### The inspiration: LLMs read wikis, not chat logs\n\nThe per-channel wiki concept is directly inspired by [Andrej Karpathy's observation](https://x.com/karpathy/status/2039805659525644595) that LLMs are far better at reasoning over curated, encyclopedic content (books, docs, wikis) than over raw conversational transcripts. Chat history is noisy, redundant, temporally scattered, and full of implicit context that only humans resolve. A wiki, by contrast, is the *already-distilled* form of that knowledge — deduplicated, structured, citation-bearing, and organised by topic rather than by timestamp.\n\nBeever Atlas operationalises this insight: every synced channel gets its own **auto-generated, continuously-updated wiki** — sections for topics, entities, decisions, open questions, and timelines — rebuilt incrementally as new messages arrive. The QA agent retrieves against this wiki first, falling back to raw messages only when a fact hasn't been distilled yet.\n\n### What this unlocks in practice\n\n- **Better answers, fewer hallucinations** — retrieval operates on fact-dense prose with explicit entity relationships, not on fragmented turn-by-turn chat.\n- **Traceable citations** — every wiki claim links back to the source messages that produced it, so answers are auditable all the way down to the original Slack/Discord/Teams thread.\n- **A browsable artifact, not just a Q&A box** — the wiki is useful *on its own*. New teammates onboarding to a channel can read the distilled wiki instead of scrolling three months of history.\n- **Cheaper inference at query time** — the expensive distillation work happens once, at ingestion. Queries hit compact, pre-digested context instead of re-summarising raw logs on every request.\n- **Graph-aware reasoning** — the entity graph built alongside the wiki lets the query router answer relational questions (\"who worked on X with Y?\") that pure vector RAG struggles with.\n\nFor a detailed comparison with other LLM knowledge tools, see [the comparison page](https://docs.beever.ai/atlas/comparison) on the documentation site.\n\n---\n\n## 🚀 Quick Start\n\nBeever Atlas ships as a Docker Compose stack (backend + bot + web + 4 datastores). You can try a seeded demo in 30 seconds with zero keys, then pick one of **three deployment options** to install it for real.\n\n### 1. Get the code\n\n```bash\ngit clone https://github.com/beever-ai/beever-atlas.git\ncd beever-atlas\n```\n\n### 2. Try the demo first (optional, no keys needed for seeding)\n\n```bash\nmake demo\n```\n\n`make demo` brings up the full stack pre-loaded with a public Wikipedia corpus (Ada Lovelace + Python history). Seeding uses pre-computed fixtures — no API keys required. Asking questions via `/api/ask` needs a free-tier `GOOGLE_API_KEY` because the QA agent calls Gemini. See [demo/README.md](demo/README.md) for curl examples.\n\nSkip this step if you're ready to install for real.\n\n### 3. Before you start: get your API keys\n\nTwo free keys are required before installing. Both offer generous free tiers — enough to sync a small team's channels for testing.\n\n| Key | Purpose | Where to get it |\n|---|---|---|\n| `GOOGLE_API_KEY` | Gemini — extraction, entity graph, answers | [aistudio.google.com/apikey](https://aistudio.google.com/apikey) |\n| `JINA_API_KEY` | Jina v4 embeddings (2048-dim) for semantic search | [jina.ai/api-dashboard](https://jina.ai/api-dashboard/) |\n\nOptional (skip unless you know you need them):\n\n| Key | What it enables |\n|---|---|\n| `TAVILY_API_KEY` | External web search when QA retrieval confidence is low — [tavily.com](https://tavily.com/) |\n| Slack / Discord / Teams bot tokens | **Configured via the web UI after setup**, not `.env` — the bot stores platform credentials encrypted in MongoDB |\n\n> **Tip:** Keep the two required keys handy before you start. Option 1 prompts for them interactively; Options 2 and 3 need them pasted into `.env`.\n\n### 4. Choose a deployment option\n\n| Option | When to use | Time to \"up\" |\n|---|---|---|\n| **1. One-line install** (recommended) | You want the fastest path to a running stack. | ~2 min first run |\n| **2. Manual Docker** | CI/CD, ops environments, or when you want explicit control over every step. | ~3 min first run |\n| **3. Local development** | Active contributors who need hot-reload on backend and frontend. | varies |\n\n### Option 1 — One-line install (recommended)\n\n```bash\n./atlas\n```\n\nThe `atlas` installer walks you through a guided 4-step checklist:\n\n1. **Required LLM keys** — prompts for `GOOGLE_API_KEY` (Gemini) and `JINA_API_KEY` (embeddings); press Enter to skip either.\n2. **Optional integrations** — Tavily web search, Ollama, MCP server for Claude Code / Cursor.\n3. **Graph backend** — Neo4j (default) or skip.\n4. **Auth tokens** — keep dev defaults or rotate now.\n\nUnder the hood it verifies `docker` + `docker compose`, copies `.env.example` → `.env` (preserves your values on re-run, `chmod 600`), auto-generates `CREDENTIAL_MASTER_KEY` (64 hex) and `WEAVIATE_API_KEY` (32 hex), runs a port-conflict preflight, launches the stack via `docker compose up -d --build --force-recreate --remove-orphans`, and polls `/api/health` before printing the ready card.\n\nWhen you see **\"Beever Atlas is ready\"**, open **[http://localhost:3000](http://localhost:3000)**.\n\nFor CI or unattended installs — skip prompts, pre-seed keys from shell env:\n\n```bash\nGOOGLE_API_KEY=... JINA_API_KEY=... ./atlas --non-interactive\n```\n\nRe-running `./atlas` on an existing stack is idempotent.\n\n### Option 2 — Manual Docker\n\nFull control, step-by-step.\n\n```bash\ncp .env.example .env\n```\n\nOpen `.env` and fill in the two required keys:\n\n```env\nGOOGLE_API_KEY=your_gemini_key\nJINA_API_KEY=your_jina_key\n```\n\nGenerate two required secrets and paste them into `.env`:\n\n```bash\n# CREDENTIAL_MASTER_KEY — AES-256-GCM key for stored platform credentials (64 hex chars)\npython -c \"import secrets; print(secrets.token_hex(32))\"\n\n# WEAVIATE_API_KEY — auth between backend and Weaviate (required by docker-compose)\npython -c \"import secrets; print(secrets.token_hex(16))\"\n```\n\nLaunch:\n\n```bash\ndocker compose up -d --build\n```\n\nOpen **[http://localhost:3000](http://localhost:3000)**.\n\n**Services started:**\n\n| Service | Port | Description |\n|---|---|---|\n| Web (nginx) | `:3000` | React dashboard |\n| Backend | `:8000` | FastAPI + ADK agents |\n| Bot | `:3001` | Platform bridge (Slack / Discord / Teams) |\n| Weaviate | `:8080` | Semantic memory |\n| Neo4j | `:7474` / `:7687` | Graph memory |\n| MongoDB | `:27017` | State + wiki cache |\n| Redis | `:6380` | Sessions (internal `:6379`) |\n\nFirst run takes 2–3 minutes while images build and databases initialize. Subsequent runs start in seconds.\n\n### Option 3 — Local development\n\nDatabases in Docker, app services native for hot-reload.\n\n**Prerequisites:** Python 3.12+ with [uv](https://docs.astral.sh/uv/), Node.js 20+\n\n```bash\ncp .env.example .env\n# Fill in GOOGLE_API_KEY, JINA_API_KEY, CREDENTIAL_MASTER_KEY, WEAVIATE_API_KEY (same as Option 2)\n\n# Start just the databases\ndocker compose up -d weaviate neo4j mongodb redis\n\n# Backend (terminal 1)\nuv sync\nuv run uvicorn beever_atlas.server.app:app --reload --port 8000\n\n# Bot (terminal 2)\ncd bot && npm install && npm run dev\n\n# Web (terminal 3) — Vite dev server with HMR\ncd web && npm install && npm run dev\n```\n\nOpen **[http://localhost:5173](http://localhost:5173)** (the Vite dev port — **not** `:3000`).\n\nThe Vite dev server proxies `/api/*` to `http://localhost:8000` (configured via `VITE_API_URL`).\n\n### Before going to production\n\n`.env.example` defaults are tuned for local testing. Before any real deploy, rotate the secrets that ship with placeholder values and flip the environment flag:\n\n| What to change | Why | How |\n|---|---|---|\n| `BEEVER_API_KEYS`, `BEEVER_ADMIN_TOKEN` | Ship as `dev-key-change-me` / `dev-admin-change-me` — public placeholders | `python -c \"import secrets; print(secrets.token_hex(24))\"` per token |\n| `BRIDGE_API_KEY` | Shared secret between backend and bot; blank by default, required outside local dev | Same `secrets.token_hex(24)` |\n| `VITE_BEEVER_API_KEY`, `VITE_BEEVER_ADMIN_TOKEN` | Vite bakes these into the web bundle at build time — must mirror the rotated backend values above | Copy the rotated `BEEVER_API_KEYS` / `BEEVER_ADMIN_TOKEN` values |\n| `NEO4J_PASSWORD` + password half of `NEO4J_AUTH` | Dev password is public in this repo | Pick a strong password; both values must match |\n| `BEEVER_ENV=production` | Enables fail-fast startup that rejects every dev default above | Flip the value in `.env` |\n\nOption 1 (`./atlas`) handles all of this through the **\"Rotate auth tokens\"** prompt in step 4 of the checklist — answer **Y** and the installer generates random tokens and mirrors the VITE_* values for you. If you used Option 2 or 3, you can re-run `./atlas` on the existing `.env`, skip every other prompt with Enter, and only accept the rotation prompt.\n\n### 5. Open the dashboard\n\nNavigate to the URL for your chosen option:\n\n- **Options 1 & 2** → **[http://localhost:3000](http://localhost:3000)**\n- **Option 3** → **[http://localhost:5173](http://localhost:5173)**\n\nFrom there:\n\n- **Real mode** (default, `ADAPTER_MOCK=false`): connect a workspace in **Settings → Connections** — Slack / Discord / Teams tokens are entered through the UI, not `.env`.\n- **Mock mode** (`ADAPTER_MOCK=true`): uses fixture data — opt in for local UI iteration without platform credentials.\n\n### 6. Sync a channel\n\nFrom the dashboard: **Connections → Add Workspace → Select channels → Sync**.\n\nOr via API (auto-extracts your bearer token from `.env`):\n\n```bash\ncurl -X POST http://localhost:8000/api/channels/C12345/sync \\\n  -H \"Authorization: Bearer $(grep -E '^BEEVER_API_KEYS=' .env | cut -d= -f2 | cut -d, -f1)\"\n```\n\n### MCP server (for external AI agents)\n\nBeever Atlas exposes a curated MCP (Model Context Protocol) server at `/mcp` for AI agents like Claude Code and Cursor. This allows external code assistants to query your team's knowledge base without using the dashboard.\n\nSee [docs/mcp-server.md](docs/mcp-server.md) for:\n- **Tool catalog** — 16 tools for discovery, retrieval, graph traversal, and long-running operations\n- **Auth setup** — generating and managing `BEEVER_MCP_API_KEYS`\n- **Client configuration** — ready-to-use `.mcp.json` templates for Claude Code and Cursor\n- **Rate limits** — principal-keyed limits to prevent one agent from throttling others\n\nQuick example (Claude Code):\n```json\n{\n  \"mcpServers\": {\n    \"beever-atlas\": {\n      \"url\": \"https://atlas.example.com/mcp\",\n      \"transport\": \"streamable-http\",\n      \"headers\": {\n        \"Authorization\": \"Bearer ${BEEVER_MCP_KEY}\"\n      }\n    }\n  }\n}\n```\n\n### Common commands\n\n```bash\ndocker compose up -d                     # Start in background\ndocker compose logs -f beever-atlas      # Tail backend logs\ndocker compose down                      # Stop (keeps data)\ndocker compose down -v                   # Stop and DELETE all indexed data\nmake demo                                # Full stack + seeded demo corpus\nmake docker-up                           # Shortcut for `docker compose up -d`\n```\n\n---\n\n## 🔒 Privacy & Telemetry\n\nBeever Atlas collects no telemetry. No usage data, error reports, or analytics are sent anywhere by default. All LLM calls go through API keys you configure in your own `.env`, and all data stays in the databases you control.\n\n---\n\n## 📐 API Stability\n\nAll `/api/*` endpoints are **UNSTABLE** in 0.1.0. v0.2.0 will introduce a `/api/v1/*` prefix; clients pinning current paths will break. See [SECURITY.md](SECURITY.md).\n\n---\n\n## 💬 Community & Contact\n\n- **Discord**: [discord.gg/VshBCUUX](https://discord.gg/VshBCUUX) — get help, share what you're building, talk to the team\n- **X / Twitter**: [@Beever_AI](https://x.com/Beever_AI) — release notes, posts, announcements\n- **Website**: [beever.ai](https://beever.ai/) — about the company and other projects\n- **GitHub Discussions**: [github.com/Beever-AI/beever-atlas/discussions](https://github.com/Beever-AI/beever-atlas/discussions) — longer-form questions and ideas\n\nCommercial support, partnerships, or press: `tech@beever.ai`.\n\n---\n\n## 📜 License\n\n[Apache License 2.0](LICENSE) © 2026 Beever Atlas contributors. Third-party attributions in [NOTICE](NOTICE).\n\nSecurity policy: [SECURITY.md](SECURITY.md) | Community standards: [CODE_OF_CONDUCT.md](CODE_OF_CONDUCT.md)\n\n","summary":"Beever Atlas automatically transforms your team’s existing Slack, Discord, Teams, and Mattermost conversations into a self‑maintaining wiki, pulling each message, extracting atomic facts, deduplicating them, and clustering related topics into searchable pages with citations. The platform offers a multi‑platform bot, scheduled or on‑demand channel syncing, a six‑stage extraction pipeline that builds a graph of people, decisions, and projects, and an LLM‑powered QA agent that answers natural‑language queries with source links. By integrating with MCP, the generated knowledge can be consumed by Claude, Cursor, or other AI agents. Built for knowledge workers and product teams, Beever Atlas delivers an automatically growing knowledge base that keeps pace with continuous team communication.","description":"Your First LLM-Wiki Conversation Knowledge Base","stars":146,"language":"Python"},{"owner":"jasonkneen","repo":"openclicky","url":"https://github.com/jasonkneen/openclicky","readme":"# OpenClicky\n\nOpenClicky is a native macOS menu-bar companion by Jason Kneen. It provides push-to-talk voice help, screen-aware responses, a cursor overlay for pointing at UI elements, and an Agent Mode dashboard for coding, research, writing, and automation tasks.\n\nOpenClicky uses local configuration only. There is no Google login requirement and no hosted key-sync flow.\n\n## Requirements\n\n- macOS 14.2 or newer\n- Xcode with the macOS SDK\n- A signing team configured in Xcode for local runs\n- Local API keys supplied outside the repository\n\n## Repository Layout\n\n- `leanring-buddy.xcodeproj` and `leanring-buddy/` contain the macOS app target.\n- `leanring-buddyTests/` contains focused app tests.\n- `leanring-buddyUITests/` contains UI test scaffolding.\n- `AppResources/OpenClicky/` contains bundled model instructions, skills, wiki seed, Codex runtime, and completion audio.\n- `appcast.xml`, `clicky-demo.gif`, and `dmg-background.png` support distribution and release packaging.\n- `docs/APP_UPDATES.md` documents the Sparkle update feed and direct-distribution release flow.\n\nThe legacy `leanring-buddy` folder and scheme names are kept for project continuity. The product, bundle display name, and app identity are OpenClicky.\n\n## Secrets\n\nDo not commit API keys to this repository.\n\nOpenClicky can read local secrets from:\n\n- the in-app Settings fields\n- launch environment variables\n- a secrets file at `~/.config/openclicky/secrets.env`\n- a custom file path set with `OPENCLICKY_SECRETS_FILE`\n\nSupported values:\n\n```sh\nANTHROPIC_API_KEY=your_anthropic_key\nELEVENLABS_API_KEY=your_elevenlabs_key\nELEVENLABS_VOICE_ID=your_elevenlabs_voice_id\nOPENAI_API_KEY=your_openai_or_codex_key\n```\n\nRecommended local setup:\n\n```sh\nmkdir -p ~/.config/openclicky\nchmod 700 ~/.config/openclicky\n$EDITOR ~/.config/openclicky/secrets.env\nchmod 600 ~/.config/openclicky/secrets.env\n```\n\nThe repo `.gitignore` excludes `.env` and `.env.local`, but the app no longer reads repo-local `.env` files. Keep secrets outside the project directory.\n\n## Build And Run\n\nOpen the project in Xcode:\n\n```sh\nopen leanring-buddy.xcodeproj\n```\n\nIn Xcode:\n\n1. Select the `leanring-buddy` scheme.\n2. Select the OpenClicky app target.\n3. Set your signing team.\n4. Run the app with `Cmd+R`.\n5. Grant Accessibility, Microphone, and Screen Recording permissions when macOS asks.\n\nDo not use terminal `xcodebuild` for permission testing. macOS TCC permissions are tied to the signed app identity and install path, and throwaway command-line builds can cause permission loops.\n\n## Development Verification\n\nFor a lightweight syntax check that does not disturb macOS permissions, run `swiftc -parse` over the changed source files. Avoid launching unsigned or temporary build products for permission testing.\n\n## Direct Updates\n\nOpenClicky uses Sparkle for direct-distribution OTA updates. Installed builds check the signed `appcast.xml` feed from this repository's `main` branch, then download and install signed release DMGs from GitHub Releases. See [docs/APP_UPDATES.md](docs/APP_UPDATES.md) for the release checklist and appcast item template.\n\n## Credits And Upstream Work\n\nOpenClicky is maintained by [Jason Kneen](https://github.com/jasonkneen).\n\nThis project builds on the original open-source Clicky work:\n\n- Original project: [farzaa/clicky](https://github.com/farzaa/clicky)\n- Original creator: Farza, GitHub [@farzaa](https://github.com/farzaa), X [@FarzaTV](https://x.com/farzatv)\n\nOpenClicky has also incorporated ideas and implementation patterns from these forks:\n\n- [@danpeg](https://github.com/danpeg)'s [danpeg/clicky](https://github.com/danpeg/clicky), reviewed locally as `clicky-teach`, for tutor-mode direction and idle observation behavior.\n- [@milind-soni](https://github.com/milind-soni)'s [milind-soni/tiptour-macos](https://github.com/milind-soni/tiptour-macos), for developer-menu/debug tooling patterns and related teaching-assistant UX ideas.\n\n## License\n\nMIT. Copyright 2026 Jason Kneen. Portions are derived from or informed by the upstream MIT-licensed projects credited above.\n","summary":"OpenClicky is a native macOS menu‑bar companion that delivers push‑to‑talk voice help, screen‑aware prompts, and a cursor overlay for pointing at UI elements. It bundles an Agent Mode dashboard that supports coding, research, writing and automation tasks, all powered locally without any Google login or key‑sync requirement. Developers, researchers, writers, and automation engineers can benefit from its hands‑free, contextual assistance that integrates directly into the macOS workflow.","description":"openclicky -- the open source version of clicky","stars":151,"language":"Swift"},{"owner":"jay-sahnan","repo":"signal","url":"https://github.com/jay-sahnan/signal","readme":"<div align=\"center\">\n\n<!-- Drop your logo at public/signal-logo.png (or .svg) and reference it here -->\n<!-- <img src=\"./public/signal-logo.png\" alt=\"Signal\" width=\"140\" /> -->\n\n# Signal\n\n### Open-source AI sales intelligence and outreach automation.\n\n**The open alternative to Clay, Apollo, and Outreach — run it on your own keys.**\n\n[![License: AGPL v3](https://img.shields.io/badge/License-AGPL_v3-blue.svg)](./LICENSE)\n[![PRs Welcome](https://img.shields.io/badge/PRs-welcome-brightgreen.svg)](./.github/CONTRIBUTING.md)\n[![Built with Claude](https://img.shields.io/badge/Built%20with-Claude-d97757.svg)](https://www.anthropic.com/claude)\n[![Stars](https://img.shields.io/github/stars/jay-sahnan/signal?style=social)](https://github.com/jay-sahnan/signal/stargazers)\n\n🌐 [Website](https://github.com/jay-sahnan/signal) &nbsp;·&nbsp;\n📚 [Docs](./docs) &nbsp;·&nbsp;\n🏗️ [Architecture](./docs/architecture.md) &nbsp;·&nbsp;\n⚡ [Quick start](#-quick-start) &nbsp;·&nbsp;\n💬 [Discussions](../../discussions)\n\n<br />\n\n<!-- Drop a hero screenshot or GIF at docs/assets/hero.png and uncomment: -->\n<!-- <img src=\"./docs/assets/hero.png\" alt=\"Signal workspace\" width=\"860\" /> -->\n\n</div>\n\n---\n\nSignal watches the web for buying signals (hiring changes, funding news, product launches, review shifts), enriches the companies and contacts behind them, drafts personalized outreach, and runs multi-step email sequences — all from a single chat-first workspace.\n\nIt's built for teams that want a CRM-adjacent tool they can read, fork, self-host, and extend. Instead of paying per seat for a black-box SaaS, run Signal on your own Supabase + Anthropic keys and own the pipeline end to end.\n\n> 🧪 Signal is designed for single-tenant self-hosting — one Supabase project per team. See [architecture.md](./docs/architecture.md#multi-tenancy) before deploying for multiple independent teams.\n\n<br />\n\n## ✨ Features\n\n- 🛰️ **Signals engine** — authorable \"recipes\" that watch companies and surface buying triggers.\n- 💬 **Campaign workspace** — chat-driven interface backed by Claude to research, shortlist, and draft.\n- 🔎 **Contact enrichment** — pulls LinkedIn, GitHub, and company pages into a single profile.\n- ✉️ **Outreach sequences** — multi-step emails via AgentMail with open / reply tracking.\n- 🤖 **Browser automation** — Browserbase + Stagehand for the long tail of sites without APIs.\n- 🔐 **Own your data** — Postgres + RLS on your Supabase; bring your own LLM keys.\n\n<!-- Drop product GIFs here to mimic Postiz's feature grid. Example:\n<div align=\"center\">\n  <img src=\"./docs/assets/signals.gif\" width=\"48%\" />\n  <img src=\"./docs/assets/workspace.gif\" width=\"48%\" />\n  <img src=\"./docs/assets/sequences.gif\" width=\"48%\" />\n  <img src=\"./docs/assets/enrichment.gif\" width=\"48%\" />\n</div>\n-->\n\n<br />\n\n## 🛠️ Tech stack\n\n- **Framework** — Next.js 16 (App Router) + React 19 + TypeScript\n- **Database** — Supabase (Postgres + Auth + RLS)\n- **AI** — Anthropic Claude via `@ai-sdk/anthropic` and the Vercel AI SDK\n- **Automation** — Browserbase + Stagehand for browser tasks\n- **Email** — AgentMail for send / reply / open tracking\n- **Jobs** — QStash (Upstash) for scheduled signal runs\n- **UI** — Tailwind CSS 4, shadcn/ui\n- **Testing** — Vitest, Playwright\n\n<br />\n\n## 🚀 Quick start\n\nYou'll need **Node 20+**, **Docker**, the **Supabase CLI**, a **Supabase project** (hosted or local), and an **Anthropic API key**.\n\n```bash\ngit clone https://github.com/jay-sahnan/signal.git\ncd signal\ncorepack enable      # activates the pinned pnpm version\npnpm install\npnpm setup           # interactive: prompts for required keys, runs migrations\npnpm dev             # http://localhost:3000\n```\n\nPrefer to configure by hand? Follow [`docs/setup.md`](./docs/setup.md).\n\n<br />\n\n## 🐳 Self-host with Docker\n\n```bash\ncp .env.example .env\n# fill in SUPABASE_URL + ANTHROPIC_API_KEY at minimum\ndocker compose up -d\n```\n\nSignal does not bundle Supabase in the compose file — bring your own (hosted Supabase project or local `supabase start`). See [`docs/setup.md`](./docs/setup.md) for the full walkthrough.\n\n<br />\n\n## 🤝 Contributing\n\nIssues and PRs welcome. Start with [`.github/CONTRIBUTING.md`](./.github/CONTRIBUTING.md). AI-assisted PRs are fine — we build with Claude ourselves.\n\nLooking for somewhere to start? Filter issues by [`good first issue`](../../labels/good%20first%20issue).\n\n<br />\n\n## 💬 Community\n\n- 🐛 [Issues](../../issues) — bug reports and feature requests\n- 💡 [Discussions](../../discussions) — questions, ideas, show & tell\n- 🔒 [Security](./.github/SECURITY.md) — vulnerability disclosure\n\n<br />\n\n\n<br /><br />\n\n## 📄 License\n\n[AGPL-3.0](./LICENSE) with an optional enterprise carve-out for files explicitly tagged. See the license file for details.\n","summary":"Signal is an open‑source AI‑powered sales intelligence and outreach automation platform that lets teams replace commercial SaaS such as Clay, Apollo, and Outreach while fully owning their data. It watches the web for buying signals, enriches company and contact profiles, drafts personalized outreach, and runs multi‑step email sequences—all within a single chat‑first workspace powered by Claude. Key capabilities include a configurable signals engine, contact enrichment from LinkedIn and GitHub, browser‑based automation for sites lacking APIs, and end‑to‑end data control via Supabase. Sales and marketing teams that need a self‑hosted, extensible CRM‑adjacent tool without per‑seat fees will benefit most.","description":null,"stars":170,"language":"TypeScript"},{"owner":"Amansingh-afk","repo":"milli.nvim","url":"https://github.com/Amansingh-afk/milli.nvim","readme":"# milli.nvim\n\nAnimated ASCII splash screens for Neovim. Ships with 24 bundled splashes, and lets you drop in your own from any image or GIF. Works with dashboard-nvim, alpha-nvim, snacks.nvim, mini.starter, or raw `VimEnter`.\n\n![demo](demo.gif)\n\n## Contents\n\n- [Bundled splashes](#bundled-splashes)\n- [Install](#install)\n- [Quick start](#quick-start)\n- [Using your own splash](#using-your-own-splash) ← bring any image or GIF\n- [Dashboard integrations](#dashboard-integrations)\n  - [dashboard-nvim](#dashboard-nvim)\n  - [alpha-nvim](#alpha-nvim)\n  - [snacks.nvim](#snacksnvim)\n  - [mini.starter](#ministarter)\n  - [No plugin (raw VimEnter)](#no-plugin-raw-vimenter)\n- [Previewing](#previewing)\n- [API](#api)\n- [Requirements](#requirements)\n- [License](#license)\n\n## Bundled splashes\n\n<table>\n<tr>\n<td align=\"center\"><b>aiface</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/aiface.gif\" width=\"380\"></td>\n<td align=\"center\"><b>attackontitan</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/attackontitan.gif\" width=\"380\"></td>\n<td align=\"center\"><b>aurora</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/aurora.gif\" width=\"380\"></td>\n</tr>\n<tr>\n<td align=\"center\"><b>badge</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/badge.gif\" width=\"380\"></td>\n<td align=\"center\"><b>blackhole</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/blackhole.gif\" width=\"380\"></td>\n<td align=\"center\"><b>cactus</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/cactus.gif\" width=\"380\"></td>\n</tr>\n<tr>\n<td align=\"center\"><b>catwoman</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/catwoman.gif\" width=\"380\"></td>\n<td align=\"center\"><b>chrome</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/chrome.gif\" width=\"380\"></td>\n<td align=\"center\"><b>dancer</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/dancer.gif\" width=\"380\"></td>\n</tr>\n<tr>\n<td align=\"center\"><b>dancerramp</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/dancerramp.gif\" width=\"380\"></td>\n<td align=\"center\"><b>finger</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/finger.gif\" width=\"380\"></td>\n<td align=\"center\"><b>fire</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/fire.gif\" width=\"380\"></td>\n</tr>\n<tr>\n<td align=\"center\"><b>flyingcat</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/flyingcat.gif\" width=\"380\"></td>\n<td align=\"center\"><b>flyingdragon</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/flyingdragon.gif\" width=\"380\"></td>\n<td align=\"center\"><b>ididnot</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/ididnot.gif\" width=\"380\"></td>\n</tr>\n<tr>\n<td align=\"center\"><b>lighningtornado</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/lighningtornado.gif\" width=\"380\"></td>\n<td align=\"center\"><b>lights</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/lights.gif\" width=\"380\"></td>\n<td align=\"center\"><b>retrocircle</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/retrocircle.gif\" width=\"380\"></td>\n</tr>\n<tr>\n<td align=\"center\"><b>robot</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/robot.gif\" width=\"380\"></td>\n<td align=\"center\"><b>shader</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/shader.gif\" width=\"380\"></td>\n<td align=\"center\"><b>shadertwo</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/shadertwo.gif\" width=\"380\"></td>\n</tr>\n<tr>\n<td align=\"center\"><b>skeleton</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/skeleton.gif\" width=\"380\"></td>\n<td align=\"center\"><b>skullone</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/skullone.gif\" width=\"380\"></td>\n<td align=\"center\"><b>skullthree</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/skullthree.gif\" width=\"380\"></td>\n</tr>\n<tr>\n<td align=\"center\"><b>skulltwo</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/skulltwo.gif\" width=\"380\"></td>\n<td align=\"center\"><b>spaceship</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/spaceship.gif\" width=\"380\"></td>\n<td align=\"center\"><b>spinner</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/spinner.gif\" width=\"380\"></td>\n</tr>\n<tr>\n<td align=\"center\"><b>vibecat</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/vibecat.gif\" width=\"380\"></td>\n<td align=\"center\"><b>vibecattwo</b><br><img src=\"https://raw.githubusercontent.com/amansingh-afk/milli.nvim/media/previews/vibecattwo.gif\" width=\"380\"></td>\n<td></td>\n</tr>\n</table>\n\n## Install\n\n**lazy.nvim:**\n```lua\n{ \"amansingh-afk/milli.nvim\", lazy = false }\n```\n\n**packer.nvim:**\n```lua\nuse \"amansingh-afk/milli.nvim\"\n```\n\n## Quick start\n\n```lua\n-- preview any bundled splash in a scratch buffer\n:MilliPreview fire\n\n-- or wire into your dashboard\nrequire(\"milli\").dashboard({ splash = \"fire\", loop = true })\n```\n\nList bundled splash names:\n```lua\n:lua print(vim.inspect(require(\"milli\").list()))\n```\n\nFor dashboard-nvim / alpha-nvim / snacks.nvim / mini.starter wiring, see [Dashboard integrations](#dashboard-integrations).\n\n## Using your own splash\n\n> Powered by [**milli**](https://github.com/Amansingh-afk/milli) - the ASCII engine behind this plugin. [⭐ Star it on GitHub](https://github.com/Amansingh-afk/milli) if you find it useful.\n\nThe 29 bundled splashes are a starting point. Bring any image or GIF you want - a custom logo, mascot, anything - and it becomes a splash in four steps.\n\n**1. Install the CLI** ([@amansingh-afk/milli](https://www.npmjs.com/package/@amansingh-afk/milli)):\n\n```bash\nnpm install -g @amansingh-afk/milli\n```\n\n**2. Generate `frames.lua` from any image / GIF:**\n\n```bash\nmilli export mycat.gif ./out -t lua -w 60 --no-bg\n```\n\nUseful flags:\n- `-w 60` - width in columns; tune to taste\n- `--no-bg` - drop background color (cleaner on dashboards)\n- `-m braille` - braille mode for higher-detail line art\n\n**3. Copy `frames.lua` into your Neovim config:**\n\n```bash\nmkdir -p ~/.config/nvim/lua/milli/splashes\ncp out/frames.lua ~/.config/nvim/lua/milli/splashes/mycat.lua\n```\n\nNeovim's runtimepath auto-discovers `~/.config/nvim/lua/`, so this file becomes a sibling to the plugin's bundled splashes - findable by the same machinery, tab-completable in `:MilliPreview`.\n\n**4. Use it - same API as any bundled splash:**\n\n```lua\nrequire(\"milli\").dashboard({ splash = \"mycat\", loop = true })\n```\n\nPreview it first:\n```\n:MilliPreview mycat\n```\n\n### Custom module path (advanced)\n\nIf you don't want to piggyback on the `milli.splashes` namespace (e.g. you organize splashes under a dotfiles module), drop the file anywhere on runtimepath and reference it by Lua module path:\n\n```lua\n-- ~/.config/nvim/lua/mydots/splashes/mycat.lua\nrequire(\"milli\").dashboard({ module = \"mydots.splashes.mycat\", loop = true })\n```\n\nWorks with every preset - `splash = \"name\"` for bundled/user-local, `module = \"path.to.mod\"` for custom namespaces.\n\n## Dashboard integrations\n\nPick your dashboard plugin. Each preset (`dashboard`, `alpha`, `snacks`, `starter`, `vimenter`) works identically with bundled or custom splashes.\n\n### dashboard-nvim\n\n```lua\nreturn {\n  \"nvimdev/dashboard-nvim\",\n  event = \"VimEnter\",\n  dependencies = { \"amansingh-afk/milli.nvim\" },\n  opts = function()\n    local splash = require(\"milli\").load({ splash = \"finger\" })\n    return {\n      theme = \"doom\",\n      config = {\n        header = splash.frames[1],         -- seed header with frame 0\n        center = {\n          { icon = \"  \", desc = \"Find File\", key = \"f\", action = \"Telescope find_files\" },\n          { icon = \"  \", desc = \"Quit\",      key = \"q\", action = \"qa\" },\n        },\n      },\n    }\n  end,\n  config = function(_, opts)\n    require(\"dashboard\").setup(opts)\n    require(\"milli\").dashboard({ splash = \"finger\", loop = true })\n  end,\n}\n```\n\n### alpha-nvim\n\n```lua\nrequire(\"milli\").alpha({ splash = \"fire\", loop = true })\n```\n\n### snacks.nvim\n\n```lua\nreturn {\n  \"folke/snacks.nvim\",\n  priority = 1000,\n  lazy = false,\n  dependencies = { \"amansingh-afk/milli.nvim\" },\n  opts = function()\n    local splash = require(\"milli\").load({ splash = \"fire\" })\n    return {\n      dashboard = {\n        enabled = true,\n        preset = {\n          header = table.concat(splash.frames[1], \"\\n\"),\n        },\n        sections = {\n          { section = \"header\", padding = 1 },\n          { section = \"keys\",   gap = 1, padding = 1 },\n          { section = \"startup\" },\n        },\n      },\n    }\n  end,\n  config = function(_, opts)\n    require(\"snacks\").setup(opts)\n    require(\"milli\").snacks({ splash = \"fire\", loop = true })\n  end,\n}\n```\n\n`preset.header` seeds frame 0 of the splash as snacks's default header so milli's anchor-search can locate the buffer position to animate over. The splash name in `preset.header` and in `require(\"milli\").snacks({ splash = ... })` must match.\n\n### mini.starter\n\n```lua\nrequire(\"milli\").starter({ splash = \"fire\", loop = true })\n```\n\n### No plugin (raw VimEnter)\n\n```lua\nrequire(\"milli\").vimenter({ splash = \"fire\", loop = true })\n```\n\n## Previewing\n\n```\n:MilliPreview <name>\n```\n\nOpens a scratch buffer, plays the splash in a loop. `q` or `<Esc>` dismisses. Tab-completes against bundled splashes and any you've dropped into `~/.config/nvim/lua/milli/splashes/`. Run `:MilliPreview` with no arg to list what's available.\n\n## API\n\n```lua\nrequire(\"milli\").play(buf, opts)       -- paint/animate into buf\nrequire(\"milli\").load(opts)            -- return the data table\nrequire(\"milli\").list()                -- array of all discovered splash names\n\nrequire(\"milli\").dashboard(opts)       -- autocmd preset for dashboard-nvim\nrequire(\"milli\").alpha(opts)           -- alpha-nvim\nrequire(\"milli\").snacks(opts)          -- snacks.nvim\nrequire(\"milli\").starter(opts)         -- mini.starter\nrequire(\"milli\").vimenter(opts)        -- raw VimEnter\n```\n\n### `opts`\n\n```lua\n{\n  splash = \"fire\",     -- bundled or user-local splash name, OR\n  module = \"mysplash\", -- require path to an external splash module, OR\n  data = { ... },      -- the data table directly\n  loop = true,         -- repeat forever (default: false - play once)\n}\n```\n\nA plain string is sugar for `{ splash = <string> }`. So `require(\"milli\").dashboard(\"fire\")` works.\n\n## Requirements\n\n- Neovim 0.10+ (extmarks, namespaces)\n- `termguicolors` enabled (`vim.opt.termguicolors = true`)\n\n## Why extmarks, not ANSI escapes?\n\nNeovim buffers strip ANSI. Colors are applied via extmarks + per-color highlight groups generated on demand. The groups are keyed on quantized fg/bg so a truecolor splash doesn't blow through Neovim's highlight-group cap (E849).\n\n## License\n\nMIT.\n","summary":"milli.nvim adds animated ASCII splash screens to Neovim, shipping with 24 ready‑to‑use splashes while allowing users to drop in any image or GIF as a custom splash. The plugin integrates seamlessly with popular startup displays such as dashboard‑nvim, alpha‑nvim, snacks.nvim, mini.starter, and also works on a bare VimEnter event. Its features include easy configuration via an API, support for animated GIFs converted to ASCII frames, and optional previewing of custom splash assets. The plugin is ideal for Neovim developers and power users who want a lively, personalized startup experience or wish to showcase custom artwork each time the editor launches.","description":" Animated ASCII splash screens for Neovim. 29 bundled splashes + bring your own via the   milli CLI / web playground.","stars":175,"language":"Lua"},{"owner":"sigcli","repo":"sigcli","url":"https://github.com/sigcli/sigcli","readme":"# Sigcli\n\n**Sign in your way. AI works on your behalf.**\n\n<p align=\"center\">\n  <img src=\"website/public/demo.gif\" alt=\"sig demo\" width=\"720\" />\n</p>\n\nAI agents need access to your work systems — Jira, wikis, calendars, internal APIs. But passing credentials through shell history, environment variables, and agent context windows is a security nightmare.\n\n**sig** handles browser SSO, encrypts credentials at rest, and injects them into any process — so your agents authenticate without ever seeing secrets.\n\n```bash\nnpm install -g @sigcli/cli\n```\n\n## Quick Start\n\n```bash\nsig init                              # create ~/.sig/config.yaml\nsig login https://jira.example.com    # authenticate via browser SSO — once\n\n# now your AI agent can work on your behalf:\nsig request https://jira.example.com/rest/api/2/myself\nsig request https://jira.example.com/rest/api/2/search --method POST --body '{\"jql\":\"assignee=currentUser()\"}'\n```\n\n## Why sig\n\n- **Browser SSO** — signs in through a real browser. Works with any website, any login flow.\n- **Encrypted at rest** — AES-256-GCM encryption. Every access is audit-logged.\n- **Multi-provider** — inject credentials from multiple systems in a single command.\n- **MITM proxy** — agents set `HTTP_PROXY` and credentials are injected transparently. Zero-trust.\n- **AI-native** — stable CLI with predictable exit codes and JSON output. Built for agents.\n\n## How It Works\n\n```\nYou log in once               sig stores & encrypts             AI agent operates\nin your browser         -->   credentials locally          -->  on your behalf\n(browser SSO)                 (~/.sig/credentials/)             (sig request / sig proxy)\n```\n\n## AI Agent Skills\n\nPre-built Python scripts that let AI agents operate 14+ web services — email, chat, forums, video platforms, social networks, and more. Each skill includes scripts + documentation that agents read and execute autonomously.\n\nInstall skills to your coding agent (Claude Code, Cursor, Windsurf, Cline):\n\n```bash\nnpx @sigcli/skills            # install skills to your coding agent\n```\n\nSee the [full skills catalog](skills/README.md) for details.\n\n## Documentation\n\nFull docs, configuration, strategies, SDK, and AI agent integration guide at **[sigcli.ai](https://sigcli.ai)**.\n\n## License\n\n[MIT](LICENSE)\n","summary":"Sigcli is a CLI that lets you authenticate once through a real‑browser SSO, then securely stores and encrypts those credentials locally for use by AI agents. It injects the secrets into any process via a MITM proxy or direct request, logs every access, supports multiple providers, and bundles pre‑built skills so agents can talk to over 140 web services. Developers building AI assistants, especially those using tools like Claude Code or Cursor, can use Sigcli to add zero‑trust authentication to external APIs without leaking secrets. It is ideal for teams that need a secure, audit‑friendly way to give AI agents controlled access to internal systems.","description":"The authentication CLI & Proxy for AI agents. Give agents access, not your credentials.","stars":124,"language":"TypeScript"},{"owner":"machinepulse-ai","repo":"world2agent","url":"https://github.com/machinepulse-ai/world2agent","readme":"![Welcome to World2Agent](https://world2agent.ai/assets/readme-banner.png)\n\n<p align=\"center\">\n  <i>Agents can't act on what they can't perceive.</i>\n</p>\n\n<p align=\"center\">\n  <a href=\"./LICENSE\"><img src=\"https://img.shields.io/badge/License-Apache%202.0-blue.svg\" alt=\"License\" /></a>\n  <a href=\"https://www.npmjs.com/org/world2agent\"><img src=\"https://img.shields.io/badge/npm-%40world2agent-red\" alt=\"npm\" /></a>\n</p>\n\n<p align=\"center\">\n  <a href=\"https://world2agent.ai\">Website</a> ·\n  <a href=\"#quick-start\">Quick Start</a> ·\n  <a href=\"#sensors\">Sensors</a> ·\n  <a href=\"https://world2agent.ai/hub\">SensorHub</a> ·\n  <a href=\"./docs\">Docs</a> ·\n  <a href=\"#community\">Community</a>\n</p>\n\n<!-- Concept Video -->\n<p align=\"center\">\n  <a href=\"https://world2agent.ai/assets/promo-w2a.mp4\">\n    Watch the W2A Concept Video\n  </a>\n</p>\n\n<p align=\"center\">\n  <img src=\"https://world2agent.ai/assets/github-star.gif\" width=\"600\" alt=\"star\" />\n</p>\n\n***\n\n## What is World2Agent?\n\nWorld2Agent (W2A) is an open protocol that standardizes how AI agents perceive the real world. Install a sensor, your agent gets structured, real-time data. Swap sensors freely — they all speak the same schema.\n\nW2A isn't a product. It's an open protocol and an invitation. We built the first sensors — the real breakthroughs will come from the community.\n\n→ [Why W2A? Full story](./docs/why-w2a.md)\n\n## Architecture\n\n**World → Sensor → Agent**\n\nSensors watch data sources and emit structured data following W2A Protocol. Your agent receives signals and decides what to do.\n\n![World2Agent system architecture](./docs/images/system-architecture.png)\n\n→ [Signal format spec](./docs/signal-format.md) · [Architecture deep dive](./docs/architecture.md)\n\n## Quick Start\n\nThe fastest way to feel W2A is with Claude Code. In an active session, install the `world2agent` plugin:\n\n```\n/plugin marketplace add machinepulse-ai/world2agent-plugins\n/plugin install world2agent@world2agent-plugins\n/reload-plugins\n```\n\nAdd a sensor — for example, Hacker News stories, frontier AI lab posts:\n\n```\n/world2agent:sensor-add @world2agent/sensor-hackernews\n/world2agent:sensor-add @quill-io/sensor-frontier-ai-news\n```\n\n→ Browse the full catalog on [SensorHub](https://world2agent.ai/hub).\n\nRestart Claude Code with the plugin channel loaded so sensor signals flow into your session:\n\n```bash\nclaude --dangerously-load-development-channels plugin:world2agent@world2agent-plugins\n```\n\n> **Security — install only sensors you trust.** A sensor's signals drive what your agent perceives and does, so an untrusted sensor is effectively an untrusted instruction source. Stick to open-source sensors from authors you trust, and review the code first.\n\nNative integrations for other agent runtimes are *coming soon*.\n\n**Integrating W2A into your own agent system?** See the [developer quick start](./docs/quick-start.md#option-2-code--sdk--sensor) for the SDK code path.\n\n→ [Full guide](./docs/quick-start.md) · [Multi-sensor](./docs/multi-sensor.md) · [SensorHub](./docs/sensorhub.md)\n\n## Sensors\n\n### [SensorHub](https://world2agent.ai/hub)\n\n**SensorHub is the catalog of every W2A sensor** — official and community-built, organized by what each one perceives (markets, news, production alerts, weather, AI labs, …). Browse it to see what's available, view each sensor's signal schema, and grab the one-line install command. **Looking for a sensor? Start here.**\n\nEvery sensor is a standard npm package — `npm search w2a-sensor` works as a fallback if you prefer the raw view.\n\n→ [SensorHub guide](./docs/sensorhub.md)\n\n### Missing a sensor?\n\n[Build your own](./docs/build-a-sensor.md) in ~50 lines. The `build-w2a-sensor` skill walks an AI coding agent through discovery, signal design, scaffolding, and the install recipe — install it with:\n\n```bash\nnpx skills add https://github.com/machinepulse-ai/world2agent/skills/build-w2a-sensor\n```\n\nOnce it's ready, ship it to npm:\n\n```bash\nnpm publish\n```\n\nThat's it — your sensor is now installable by anyone, anywhere.\n\n## Roadmap\n\n* **Graph layer** — compose and enrich signals from multiple sensors before they reach your agent. → [RFC](./docs/rfc-graph.md)\n\n## Contributing\n\n* 🔧 **Build a sensor** — `npm publish` and it's live\n\n* 🐛 **Report bugs** — [open an issue](https://github.com/machinepulse-ai/world2agent/issues)\n\n* 💡 **Suggest a sensor** — [Discussions](https://github.com/machinepulse-ai/world2agent/discussions)\n\n→ [Contributing guide](./docs/CONTRIBUTING.md)\n\n## Community\n\n[Website](https://machinepulse.ai/) · [X / Twitter](https://x.com/MachinePulse_AI) · [YouTube](https://youtube.com/@MachinePulse_AI) · [Discord](https://discord.gg/hDjaD8pX)\n\n<!-- Star History — uncomment after launch -->\n<!-- [![Star History Chart](https://api.star-history.com/svg?repos=machinepulse-ai/world2agent&type=Date)](https://star-history.com/#machinepulse-ai/world2agent&Date) -->\n\n## License\n\n[Apache 2.0](./LICENSE)\n\n***\n\n<p align=\"center\">\n  Built by <a href=\"https://machinepulse.ai\">MachinePulse</a> · Open source, open protocol, open invitation.\n</p>\n","summary":"World 2 Agent (W2A) is an open protocol that transforms real‑world data into a unified, real‑time signal format that AI agents can ingest directly. By installing npm‑package sensors, developers receive structured data streams—such as news, market feeds, or IoT telemetry—conforming to a standard schema that allows sensors to be swapped or combined with ease. The project offers a SensorHub catalog of community‑built sensors, a lightweight SDK for integrating W2A into existing agent runtimes, and tooling to build new sensors in roughly fifty lines of code. It is especially useful for researchers, developers, and enterprises building or extending AI agents that need reliable, extensible world perception.","description":"World2Agent(W2A) is an open protocol that standardizes how Al agents perceive the real world.","stars":165,"language":"TypeScript"},{"owner":"asekachov","repo":"Markie","url":"https://github.com/asekachov/Markie","readme":"# Markie\n\nA tiny menu-bar app for jotting down a line and having it land in the right file — no app switch, no save dialog, no friction.\n\n**[⬇︎ Download Markie for macOS](https://github.com/asekachov/Markie/releases/latest/download/Markie.dmg)**.\n\nYou point Markie at the few files you actually use (a daily log, a notes file, a running todo list, whatever), give each one a hotkey, and you're done. Hit the hotkey, type, press return — the line shows up at the bottom of the file. That's the whole idea.\n\n<img width=\"2560\" height=\"1440\" alt=\"Frame 1948754415\" src=\"https://github.com/user-attachments/assets/d677614c-cf4b-42fe-806a-5adf44be46c1\" />\n\n\n## Install\n\n1. [**Download Markie.dmg**](https://github.com/asekachov/Markie/releases/latest/download/Markie.dmg).\n2. Open the DMG and drag **Markie** into your **Applications** folder.\n3. Launch it. Markie sits in the menu bar — look for the small grid icon on the right side.\n\nRequires macOS 26.1 or later.\n\n## How to use it\n\n**Set up a file.** From the menu bar, open Markie's settings and add any plain-text or Markdown file. Optionally give it an alias and a hotkey of your own.\n\n**Capture a thought.** Press the hotkey. A small panel slides in, focused and ready. Type whatever you want to save.\n\n**Send it on its way.**\n\n| Shortcut | What it does |\n|---|---|\n| ⌘ ↩ | Append the line to the file |\n| ⌘ ⇧ ↩ | Prepend (write at the top instead) |\n| ⌘ ⌥ ↩ | Append, then open the file |\n| ⌘ O | Just open the file |\n| ⎋ | Cancel and dismiss |\n\n**Switch files.** Press ⇥ to open a list of all your files; arrow keys + return to pick one.\n\n**Todo mode.** Mark a file as todo-style and new lines come out as checklist items.\n\nThat's it. Markie stays out of the way until you need it, and gets out of the way the moment you're done.\n\n## Updates\n\nMarkie checks for new versions on its own. When one's available it'll quietly offer to install it on launch — no maintenance on your end.\n\n## Releases\n\nSee [the Releases page](https://github.com/asekachov/Markie/releases) for what's new in each version.\n\n---\n\n*This README was generated by [Claude Code](https://claude.com/claude-code).*\n","summary":"Markie is a macOS menu‑bar utility that lets you jot a single line into a pre‑selected text or Markdown file with a single hotkey, avoiding any app switching or dialog boxes. It supports appending, prepending, auto‑opening the file, and a todo‑style mode that formats lines as checklists, all from a small sliding panel and a simple file‑switcher. Writers, researchers, developers, or anyone who maintains daily logs, notes, or running to‑do lists will benefit from its frictionless, quick‑capture workflow. The app stays hidden in the background, surfacing only when you need to capture a thought.","description":"Markie — quick-add panel for macOS. Public release feed (DMGs + Sparkle appcast).","stars":125,"language":null}]</script>
<script id="lang-colors" type="application/json">{"TypeScript":"#3178c6","JavaScript":"#f1e05a","Python":"#3572A5","Rust":"#dea584","Go":"#00ADD8","Java":"#b07219","C++":"#f34b7d","C":"#555555","C#":"#178600","Ruby":"#701516","PHP":"#4F5D95","Swift":"#F05138","Kotlin":"#A97BFF","Dart":"#00B4AB","Shell":"#89e051","HTML":"#e34c26","CSS":"#563d7c","Scala":"#c22d40","Elixir":"#6e4a7e","Haskell":"#5e5086","Lua":"#000080","Zig":"#ec915c","Vue":"#41b883","Svelte":"#ff3e00"}</script>

<script>
(function(){
  const projects = JSON.parse(document.getElementById('project-data').textContent);
  const colors = JSON.parse(document.getElementById('lang-colors').textContent);
  const list = document.getElementById('list');

  projects.forEach(function(p, i){
    const div = document.createElement('div');
    div.className = 'project';

    const top = document.createElement('div');
    top.className = 'project-top';

    const a = document.createElement('a');
    a.href = p.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = p.owner + '/' + p.repo;

    top.appendChild(a);

    if(p.language){
      const lang = document.createElement('span');
      lang.className = 'lang';
      lang.style.background = colors[p.language] || '#8b949e';
      lang.textContent = p.language;
      top.appendChild(lang);
    }

    if(p.stars != null){
      const s = document.createElement('span');
      s.className = 'stars';
      s.textContent = '★ ' + (p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : String(p.stars));
      top.appendChild(s);
    }

    div.appendChild(top);

    var summaryText = p.summary || p.description || '';
    if(summaryText){
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summaryText;
      div.appendChild(sum);

      // Check if text is clamped (needs "show more")
      requestAnimationFrame(function(){
        if(sum.scrollHeight > sum.clientHeight + 2){
          const btn = document.createElement('button');
          btn.className = 'show-more';
          btn.textContent = 'Show more';
          btn.onclick = function(){
            sum.classList.toggle('expanded');
            btn.textContent = sum.classList.contains('expanded') ? 'Show less' : 'Show more';
          };
          div.appendChild(btn);
        }
      });
    }

    list.appendChild(div);
  });
})();
</script>
