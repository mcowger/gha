s://s.click.aliexpress.com/e/_c4W6CP4H) |\n| USB-C to USB-C Adapter | [Buy here](https://s.click.aliexpress.com/e/_c4nUhoEV) |\n| USB-C to USB-A Adapter | [Buy here](https://s.click.aliexpress.com/e/_c43FLfM9) |\n\n---\n\n> 💡 Some links may be affiliate links that help support the project.\n\n---\n\n## ⚡ How it works\n\n### 🔐 Password Mode\n- Select account\n- Device types:\n  - username\n  - password\n  - both automatically\n\n### 🔢 TOTP Mode\n- Generates 2FA codes (like Google Authenticator)\n- Works based on time + secret key\n- Can auto-type the code via USB\n\n### ⚙️ Settings Mode\n- Connect to device Wi-Fi\n- Open local page\n- Add / edit / delete accounts\n- Generate passwords\n\n---\n\n## 📦 Status\n\n**Version 1 (Prototype)**\n\nMore features coming soon 👇\n\n---\n\n## 🔮 Roadmap\n\n- [ ] Bluetooth HID support\n- [ ] Encrypted storage\n- [ ] Backup & restore\n- [ ] Fingerprint / local unlock\n- [ ] Better UI/UX\n- [ ] Hardware improvements\n\n---\n\n## ⚠️ Important Notice\n\nThis project is for **educational and personal use only**.\n\n❌ Selling this project is NOT allowed  \n❌ Commercial use is NOT allowed  \n\n✅ Only the original creator (**Dr. Maker**) has the right to commercialize this project.\n\n---\n\n## ❤️ Support the project\n\nIf you like this project and want to support its development:\n\n[![Support me](https://img.shields.io/badge/Support-PayPal-blue?style=for-the-badge&logo=paypal)](https://paypal.com/ncp/payment/CRE2CT9J2JJRQ)\n\n\n---\n\n## 🤝 Contributing\n\nThis is an open-source project — let’s build it together!\n\nYou can help by:\n- improving the code\n- suggesting features\n- improving UI/UX\n- enhancing security\n- testing on different devices\n\n---\n\n## 👨‍💻 Author\n\n**Dr. Maker**\n\n---\n\n## 📄 License\n\nThis project uses a custom non-commercial license.  \nCommercial use and selling are not allowed.\n\nSee the [LICENSE](LICENSE) file for details.\n","summary":"The Dr. Passwords project is an open‑source, ESP32‑S3 based physical password manager that keeps credentials on a local device rather than in the cloud. It lets users store, edit, and generate strong passwords and automatically type usernames, passwords, or combined username‑TAB‑password sequences using HID keyboard emulation, while also offering TOTP 2‑factor codes that can be auto‑typed. An on‑device screen and buttons give a simple UI, and Wi‑Fi can be used to sync the clock for accurate TOTP generation. The solution appeals to privacy‑conscious makers, hobbyists, and anyone who prefers owning a tamper‑proof, offline password vault instead of relying on cloud services.","description":"Open-source physical password manager built with ESP32-S3 with HID typing and TOTP support.","stars":103,"language":"C++"},{"owner":"intave","repo":"intave","url":"https://github.com/intave/intave","readme":"\n![Intave](docs/assets/hero_banner.png \"Intave\")\n\n\nIntave is an enterprise anticheat plugin for Minecraft servers in development since 2016.\nAfter almost a decade of use on the world's largest Minecraft servers\nand shutting down in mid-2025, we now decided to give back to the community by making Intave source-available to everyone.\n\n## General\n\nUnlike traditional module-based anticheats, Intave accurately simulates player movement, client-side entity and block\ndata to detect even the smallest manipulations. Through this approach, Intave successfully prevents any kind of combat,\nmovement and interaction exploits, such as speed/fly cheats or reaching beyond the 3.0 block range.\n\nAdditionally, Intave provides heuristic checks to counter aimbot, auto-clicker, timer, placement, block breaking,\ninventory\nand many other cheats that cannot be detected by solely simulating client logic.\n\nFor more information, see the documentation of Intave's\nchecks [here](https://docs.intave.ac/mechanics/checks-01-overview.html).\n\n## Development\n\n### Setup\n\n1. Clone the project: `git clone https://github.com/intave/intave.git`.\n2. Open the project as Gradle project; wait a few minutes for IntelliJ to index and build the\n   project.\n\n### Testing\n\nChoose one of the `intave/run_X.X.X` gradle tasks corresponding to the Minecraft server version\nyou want to test. Intave is then automatically installed on that server. In case of Intave failing to download\nProtocolLib, make sure you manually install ProtocolLib on the server by moving it into the `plugins` directory.\n\nBy doing so, you can run the plugin directly in the IDE. Breakpoints and hotswapping is\nenabled!\nWe use [this IntelliJ plugin](https://plugins.jetbrains.com/plugin/14832-single-hotswap) for efficient hotswapping, which\ncan swap method contents that don't have an indy lambda or anonymous class.\n\n## Contributing\n\nWe accept contributions to the project, but please make sure to read the [contributing guidelines](docs/CONTRIBUTING.md) before doing so.\nFor a high-level overview of the project organization, see [this document](docs/STRUCTURE.md).\nA cheatsheet can be found [here](docs/CHEATSHEET.md) to quickly find your way around the codebase, contributions welcome!\nOur block system is briefly outlined in [this document](docs/BLOCK_SYSTEM.md).\nIf you have any questions, feel free to get in touch with us on [Discord](https://intave.ac/go/discord).\n\n## License\nWe want to make Intave completely free and open, available for everyone, indefinitely.\nHowever, we don't want you or others to take this work, rebrand it and sell it as their own creation.\nWe've seen this happen multiple times with other anticheats, and we explicitly forbid this kind of behavior.\nStill, we want to allow Minecraft servers commercial use of Intave and\nthe ability to modify and adapt it to their needs, as long as they don't sell it as a product or publish it.\nTherefore, we decided to use the [Polyform Perimeter License 1.0.0](LICENSE.md),\nprohibiting any form of competitive use.\nWe also want to encourage everyone to contribute back to the project instead of creating their personal spin-offs,\nmaking the project better for everyone instead of fragmenting the community and development efforts.\nThis also technically means Intave isn't actually \"open-source\", but \"source-available\" for everyone to use and modify, but not to sell,\nrebrand as their own or mix into their own product or project, no matter the respective licenses.\nIn case of source stealing or commercial redistribution we will be issuing DMCA takedowns and in blatant cases we will go \nthe extra mile to bring legal action against you, we are not joking about this.\nPlease note that Intave uses third-party libraries, which are licensed under their respective licenses and\nmay not be covered by the Polyform Perimeter License.","summary":"Intave is an enterprise‑grade anti‑cheat plugin for Minecraft servers that has been in use on the largest servers for nearly a decade, now released as source‑available to the community. By fully simulating player movement, client‑side entity and block data, it detects even subtle exploits such as speed, fly, and out‑of‑range combat, while heuristic checks cover aimbot, auto‑clicker, timer, placement, block‑breaking, inventory and other cheats that pure simulation can miss. The plugin is designed for server operators of any size who need robust protection against a wide range of cheats without sacrificing gameplay. Contributions are welcome under the Polyform Perimeter license, allowing free use and modification for server admins but prohibiting commercial redistribution or rebranding of the software.","description":"Intave is an enterprise, high-performance anticheat for Minecraft built on years of experience protecting the world's largest servers ","stars":192,"language":"Java"},{"owner":"Jakubantalik","repo":"transitions.dev","url":"https://github.com/Jakubantalik/transitions.dev","readme":"# Transitions.dev\n\nTransitions.dev is an interactive collection of reusable CSS transitions. Each card on the index page demonstrates a different interaction pattern and ships a copy-ready, portable CSS snippet for each.\n\nLive site: https://transitions.dev/\n\n## Transitions\n\n| # | Name | What it shows |\n|---|------|---------------|\n| 1 | **Card resize** | Smooth card resize transition. |\n| 2 | **Number pop-in** | Digit flip with blur and stagger. |\n| 3 | **Notification badge** | Diagonal slide with spring pop-in. |\n| 4 | **Text states swap** | Text swap transition with blur. |\n| 5 | **Menu dropdown** | Origin-aware open / close transition. |\n| 6 | **Modal open / close** | Modal transition with scale. |\n| 7 | **Panel reveal** | Panel open / close transition. |\n| 8 | **Page side-by-side** | Forward / back page transition. |\n| 9 | **Icon swap** | Scale and blur icon swap. |\n\nEach card has a copy button that emits a self-contained CSS snippet: semantic CSS custom properties on `:root`, the transition rules namespaced under `t-*` classes, and a `@media (prefers-reduced-motion: reduce)` guard — so you can paste the snippet into any project and apply it to any component without pulling in demo-specific markup or sizing.\n\n## Files\n\n- `index.html` — main showcase page with all nine transitions and per-card \"copy CSS\" buttons.\n- `assets/` — icons, favicons, and the social-share OG image.\n- `site.webmanifest`, `robots.txt`, `sitemap.xml` — PWA/SEO metadata.\n\n## Run locally\n\n```bash\npython3 -m http.server 8765\n```\n\nThen open http://127.0.0.1:8765/.\n","summary":"Transitions.dev is an interactive showcase of reusable CSS transition snippets. On its index page, each card demonstrates a distinct UI interaction—such as card resizing, modal opening, or icon swapping—and provides a copy‑ready CSS block that includes semantic custom properties, namespaced classes, and a prefers‑reduced‑motion guard. The library ships no demo‑specific markup, making it easy for front‑end developers and designers to drop a transition into any component. Anyone building interactive web interfaces can benefit by quickly adding polished, accessible animations without writing them from scratch.","description":"Collection of the most essential transitions for web apps that you can just copy and paste into any project. ","stars":225,"language":"HTML"},{"owner":"sweriko","repo":"ai4anim-webgpu","url":"https://github.com/sweriko/ai4anim-webgpu","readme":"# ai4anim-webgpu\n\nA TypeScript three.js WebGPU inference port of the biped + quadruped neural-motion-matching demos from [facebookresearch/ai4animationpy](https://github.com/facebookresearch/ai4animationpy) by [Paul Starke](https://github.com/paulstarke) and [Sebastian Starke](https://github.com/sebastianstarke).\n\n**Live demo:** [motionsynth.sweriko.com](https://motionsynth.sweriko.com)\n\n<img width=\"1375\" height=\"773\" alt=\"image\" src=\"https://github.com/user-attachments/assets/ac3abd00-18ba-4e70-97be-1c96e9805598\" />\n\n\n## What it does\n\n- Runs the upstream biped + quadruped neural networks directly in the browser\n- Batched compute: one dispatch per prediction tick across every active agent, with mixed-precision matmul kernels (fp16 weights, fp32 accumulator).\n- All agents share a single instanced `SkinnedMesh`\n- basic controll interface\n\n## setup\n\n```bash\nnpm install\nnpm run dev     \n```\n\n## Attribution & license\n\nThis is a derivative work of AI4AnimationPy. See [`NOTICE`](./NOTICE) for full attribution and [`LICENSE`](./LICENSE) for the license terms (CC BY-NC 4.0 — non-commercial use only). The \"ai4anim-\" prefix is descriptive; this project is not affiliated with or endorsed by Meta or the original authors.\n","summary":"ai4anim‑webgpu is a TypeScript port that runs the biped and quadruped neural‑motion‑matching models from Facebook Research’s AI4Animation directly in the browser using WebGPU. It performs batched inference with a single GPU dispatch per tick, employing mixed precision matmul kernels (fp16 weights, fp32 accumulators) to keep performance high. Each agent shares an instanced SkinnedMesh, and the package offers a minimal control interface for real‑time manipulation. This makes it useful for researchers, animators, or developers who want to experiment with or integrate neural motion synthesis into web‑based 3D applications.","description":null,"stars":184,"language":"TypeScript"},{"owner":"stainlu","repo":"hermes-labyrinth","url":"https://github.com/stainlu/hermes-labyrinth","readme":"# Hermes Labyrinth\n\nWhere the agent has been.\n\nHermes Labyrinth is a read-only observability plugin for\n[Hermes Agent](https://github.com/NousResearch/hermes-agent). It turns agent\nactivity into a map of crossings: prompts, tool calls, tool results, failures,\nmodel switches, subagents, approvals, memory hits, redactions, context\ncompression, cron runs, and reportable evidence.\n\nIt is not a chat UI. It is a blackbox recorder for autonomous work.\n\n## Demo\n\n- Live demo: https://stainlu.github.io/hermes-labyrinth/\n- Repo: https://github.com/stainlu/hermes-labyrinth\n\nThe public demo is static and uses mocked Hermes state so it can run on GitHub\nPages. The installable dashboard plugin reads local Hermes state through its\nFastAPI plugin routes.\n\n## What it does\n\n- **Journey index**: recent CLI, dashboard, gateway, cron, and delegated work.\n- **Labyrinth map**: ordered crossings through a selected agent journey.\n- **Inspector**: input, output, duration, status, evidence, and guideposts for\n  a selected crossing.\n- **Guideposts**: generated observations backed by local evidence.\n- **Skill atlas**: bundled, optional, external, and user skill inventory.\n- **Cron gate**: scheduled autonomy, next runs, last failures, and workdirs.\n- **Model ferry**: model/provider transitions across sessions.\n- **Reports**: redacted Markdown and JSON exports for one journey.\n\n## Install\n\nInstall into the Hermes user plugin directory:\n\n```bash\nmkdir -p ~/.hermes/plugins\ngit clone https://github.com/stainlu/hermes-labyrinth.git ~/.hermes/plugins/hermes-labyrinth\n```\n\nStart or restart the dashboard:\n\n```bash\nhermes dashboard\n```\n\nIf the dashboard is already running, rescan plugins:\n\n```bash\ncurl http://127.0.0.1:9119/api/dashboard/plugins/rescan\n```\n\nOpen the dashboard and select the `Labyrinth` tab.\n\nOptional theme scaffold:\n\n```bash\nmkdir -p ~/.hermes/dashboard-themes\ncp ~/.hermes/plugins/hermes-labyrinth/theme/hermes-labyrinth.yaml ~/.hermes/dashboard-themes/\n```\n\n## Repository Layout\n\n```text\n.\n├── dashboard/\n│   ├── manifest.json        # Hermes dashboard plugin manifest\n│   ├── plugin_api.py        # Read-only API over local Hermes state\n│   └── dist/                # Generated dashboard plugin bundle\n├── docs/\n│   ├── CONCEPT.md\n│   ├── DESIGN_BRIEF.md\n│   └── FUNCTIONAL_SPEC.md\n├── scripts/\n│   ├── build-plugin.mjs     # Builds dashboard/dist from src\n│   ├── smoke-demo.mjs       # Browser smoke test for the public demo\n│   ├── test-plugin-api.py   # Fixture tests for API normalization helpers\n│   └── verify.mjs           # Local verification checks\n├── src/\n│   ├── demo/                # GitHub Pages demo source\n│   ├── parts/               # Ordered frontend source chunks\n│   └── labyrinth.css        # Frontend CSS source\n├── theme/\n│   └── hermes-labyrinth.yaml\n├── index.html               # Generated GitHub Pages demo\n├── package.json             # Build/check scripts, no runtime deps\n└── Hermes Labyrinth _standalone_.html\n```\n\n## Development\n\n`dashboard/dist/` is generated from `src/parts/*.js` and `src/labyrinth.css`.\n`index.html` is generated from `src/demo/index.html` with content-hash query\nstrings on the local JS/CSS assets. These files are checked in because Hermes\ndashboard plugins and GitHub Pages are loaded directly from built static files.\n\n```bash\nnpm run build\nnpm run check\nnpm run smoke\n```\n\n`npm run check` verifies:\n\n- `dashboard/dist` is up to date with `src`\n- the public demo is using cache-busted plugin assets\n- frontend JavaScript parses\n- backend Python parses\n- API normalization helper fixtures pass\n- both static HTML demo artifacts parse\n- the removed `New journey` dead control has not returned\n\n`npm run smoke` starts a local static server, opens the demo in headless Chrome,\nfails on browser/runtime errors, and clicks through the main routes and controls.\nUse `npm run smoke:live` to run the same pass against GitHub Pages.\n\n## Architecture\n\n```text\nHermes local state\n  ├─ state.db sessions/messages\n  ├─ skills directories\n  └─ cron config\n        ↓\ndashboard/plugin_api.py\n        ↓\n/api/plugins/hermes-labyrinth/*\n        ↓\nsrc/parts/*.js + src/labyrinth.css\n        ↓ npm run build\ndashboard/dist/*\n        ↓\nHermes dashboard tab: Labyrinth\n```\n\nThe plugin is read-only. It does not start, stop, mutate, or create Hermes\nsessions.\n\n## API Surface\n\n```text\nGET /api/plugins/hermes-labyrinth/health\nGET /api/plugins/hermes-labyrinth/journeys\nGET /api/plugins/hermes-labyrinth/journeys/{journey_id}\nGET /api/plugins/hermes-labyrinth/journeys/{journey_id}/crossings\nGET /api/plugins/hermes-labyrinth/skills\nGET /api/plugins/hermes-labyrinth/cron\nGET /api/plugins/hermes-labyrinth/guideposts\nGET /api/plugins/hermes-labyrinth/reports/{journey_id}.json\nGET /api/plugins/hermes-labyrinth/reports/{journey_id}.md\n```\n\n## Data Policy\n\n- Read-only by design.\n- Secret redaction is applied to previews and reports.\n- Unknown fields stay unknown.\n- Reports are generated from local Hermes state.\n- The public demo uses sample data and should not be treated as live telemetry.\n\n## Status\n\nHackathon build, moving toward production readiness. See\n[Known Limitations](./KNOWN_LIMITATIONS.md) and [Roadmap](./ROADMAP.md).\n","summary":"Hermes Labyrinth is a read‑only observability plugin for the Hermes Agent that turns an agent’s autonomous activity into a detailed, ordered map of “crossings” such as prompts, tool calls, model switches, approvals and failures. It supplies features including a journey index, a visual labyrinth map, an inspector panel that shows inputs, outputs, timing and evidence, guideposts, a skill inventory, cron scheduling insights, model transition tracking, and exportable reports. The plugin is designed for developers and researchers who use Hermes to build autonomous agents and need a transparent, dashboard‑based way to audit, debug, and document the agent’s behavior. By installing it into the Hermes plugin directory, users can launch the Hermes dashboard and explore agent journeys without modifying the agent itself.","description":null,"stars":155,"language":"HTML"},{"owner":"EmGi96","repo":"TrailPrint3D","url":"https://github.com/EmGi96/TrailPrint3D","readme":"# TrailPrint3D\n\nA Blender addon that turns GPS trails and geographic data into 3D-printable miniature maps.\n\n[TrailPrint3D.com](https://www.trailprint3d.com)\n\n[Slightly outdated Video Tutorial](https://www.youtube.com/watch?v=2NzwC3188HY&t=242s)\n\n## Features\n\n### Map Generation\n- Import a GPX file and generate a 3D map around your trail\n- Three generation modes: **Single Trail**, **Multi-Trail chain** *(Premium)*, **Terrain** *(Premium)*\n- Terrain generation from custom map bounds (center + radius, two corner points, or a blank tile)\n- Configurable shape: circle, square (with independent width/height), ellipse (with aspect ratio), hexagon, octagon, medal\n- Elevation scaling, path thickness, and single-color-mode for clean single-material prints\n\n### Terrain Elements\nAutomatically fetches and renders geographic data from OpenStreetMap:\n- Water (ponds, small rivers, big rivers)\n- Ocean\n- Forests, Scree, Glaciers\n- Farmland, Greenspaces\n- City boundaries\n- Buildings (3D, experimental)\n- Roads (major, primary, and small streets)\n\n### Post-Processing\n- **Color Mountains** — assigns material zones by elevation threshold\n- **Contour Lines** — adds printable contour line geometry\n- **Magnet Holes** — drills holes for magnets (configurable diameter/depth)\n- **Dovetail Cutouts** — adds dovetail joints for tiling maps\n- **Bottom Mark** — engraves a mark on the bottom face\n- **SVG / Text Import** — imports SVG outlines or custom text as 3D objects\n- **Pin Placement** — places a pin at GPS coordinates; pin on city name *(Premium)*\n- **Heightmap Import** *(Premium)* — imports a 2D image as a heightmap\n\n\n### Export\n- Export to **STL**, **OBJ**, and **3MF** (3mf is using the [3MF Addon by Clonephaze](https://github.com/Clonephaze/3MF-Blender-Add-on---Maintained))\n- Configurable default export folder in addon preferences\n- Optional auto-export after generation\n\n\n## Requirements\n\n- Blender **5.0** or newer\n- Internet connection for elevation and map data APIs\n- (Optional) OpenTopography API key — free at [portal.opentopography.org](https://portal.opentopography.org)\n- (Optional) [3MF Addon by Clonephaze](https://github.com/Clonephaze/3MF-Blender-Add-on---Maintained) for 3MF export\n\n## Installation\n\n1. Download the latest release zip (or from https://trailprint3d.com).\n2. In Blender, go to **Edit → Preferences → Add-ons → Install**.\n3. Select the downloaded zip and enable **TrailPrint3D**.\n4. If not visible, Press \"N\" on your Keyboard to open the Sidebar. Navigate to the\n   TrailPrint3D Tab in the Sidebar\n\n\n## Data Sources\n\n| Data | Provider | Used for |\n| Elevation (SRTM & others) | [OpenTopoData](https://www.opentopodata.org) | Terrain height |\n| Elevation (SRTM/NASA) | [Open-Elevation](https://open-elevation.com) | Terrain height |\n| Elevation tiles | [Terrain Tiles / Mapzen](https://registry.opendata.aws/terrain-tiles/) | Terrain height |\n| Elevation (high-res datasets) | [OpenTopography](https://opentopography.org) | Terrain height (API key required) |\n| Water, forests, roads, buildings, cities | [Overpass API](https://overpass-api.de) | Map elements |\n| Geographic data | [OpenStreetMap contributors](https://www.openstreetmap.org/copyright) | Underlying map data |\n\n## License\n\nCopyright (C) 2026 EmGi.\nReleased under the [GNU General Public License](https://www.gnu.org/licenses/gpl-3.0.html).\nModels generated by this addon may be used commercially.\n","summary":"TrailPrint3D is a Blender addon that converts GPS GPX trails and OpenStreetMap data into ready‑to‑print miniature maps. It lets users import a trail, choose between single‑trail, premium multi‑trail, or terrain modes, and customize shape, elevation scaling, and path thickness, while automatically adding terrain elements such as water, forests, roads, and buildings; post‑processing options include colored elevation zones, contour lines, magnet holes, dovetail joints, and SVG/text imports. Exported models can be saved as STL, OBJ, or 3MF with configurable folders and optional auto‑export. The addon serves 3‑D‑printing hobbyists, hikers, geographers, and developers who need accurate, aesthetic, and printable representations of real‑world routes.","description":null,"stars":147,"language":"Python"},{"owner":"wxtsky","repo":"byob","url":"https://github.com/wxtsky/byob","readme":"<div align=\"center\">\n\n<img src=\"assets/logo.svg\" alt=\"byob\" width=\"120\"/>\n\n# byob\n\n**Bring Your Own Browser** — let your AI assistant use the Chrome you already have open.\n\n[![License: MIT](https://img.shields.io/badge/license-MIT-22c55e.svg)](LICENSE) [![MCP](https://img.shields.io/badge/MCP-stdio-0a0a0a.svg)](https://modelcontextprotocol.io) [![Chrome MV3](https://img.shields.io/badge/Chrome-MV3-f59e0b.svg)](https://developer.chrome.com/docs/extensions/mv3/intro/) [![v0.3](https://img.shields.io/badge/v0.3-ready-22c55e.svg)](CHANGELOG.md)\n\n**English** · [中文](README.zh-CN.md)\n\n</div>\n\n---\n\nbyob is a local MCP server that lets AI coding tools (Claude Code, Cursor, Cline, Windsurf, etc.) directly control **your real Chrome** — the one where you're already logged into everything.\n\n```\n\"read my Twitter timeline and summarize the top 5 posts\"\n\"google 'mcp protocol spec', click the first result, read the page\"\n\"take a screenshot of example.com\"\n\"grab my GitHub session cookie so I can curl with it\"\n\"open my Gmail tab and tell me how many unread\"\n```\n\n|  | WebFetch | Headless Puppeteer | **byob** |\n|---|:-:|:-:|:-:|\n| Sees logged-in pages | ❌ | ⚠️ manual cookie copy | ✅ already logged in |\n| Passes bot detection | ❌ | ❌ | ✅ real human browser |\n| Setup time | 0 | hours | **~5 min** |\n| Cloud cost | free | $$ | free |\n\n---\n\n## Install\n\n### Quick install (recommended)\n\n```sh\ncurl -fsSL https://raw.githubusercontent.com/wxtsky/byob/main/install.sh | bash\n```\n\nThe script checks prerequisites (Node.js ≥ 20, bun, Chrome), clones the repo, builds everything, and walks you through MCP registration interactively. If bun is not installed, it offers to install it for you.\n\n> Set `BYOB_INSTALL_DIR` to change the install location (default: `~/byob`).\n\n### Manual install\n\n<details>\n<summary>Prefer to do it yourself?</summary>\n\nRequires **Node.js ≥ 20**, **bun**, **Chrome**, and any MCP-compatible AI tool.\n\n```sh\ngit clone https://github.com/wxtsky/byob\ncd byob\nbun install\nbun run setup\n```\n\n</details>\n\n`bun run setup` walks through the install interactively:\n\n1. Pick output language (English / 中文)\n2. Generates a unique extension key for you\n3. Builds the Chrome extension\n4. Writes the config that lets Chrome talk to byob\n5. Prompts you to multi-select your AI tools, then registers each one (CLI tools via their `mcp add` command, JSON-config tools by writing the config file directly)\n\nAfter the script finishes, three manual steps remain:\n\n### Step 2 — Load extension in Chrome\n\nOpen `chrome://extensions` in Chrome.\n\n1. Top-right → turn ON **Developer mode**\n2. Top-left → click **Load unpacked**\n3. Select the folder printed in your terminal, something like:\n   ```\n   /your/path/to/byob/packages/extension/output/chrome-mv3\n   ```\n\n### Step 3 — Restart Chrome\n\n**Quit Chrome completely** (`⌘Q` on Mac / close all windows on Windows), then reopen.\n\n> Closing a single tab or window is not sufficient — Chrome only reads the Native Messaging config at startup.\n\n### Step 4 — (Reference) Manual MCP registration\n\nThe setup script registers your selected tools automatically. The block below is for reference only — use it if you skipped the prompt or want to register a different tool later:\n\n<details open>\n<summary><b>Claude Code</b></summary>\n\n```sh\nclaude mcp add byob -s user -- /path/to/tsx /path/to/byob-mcp.ts\n```\n\nTo enable `browser_eval`, add `-e BYOB_ALLOW_EVAL=1` after `-s user`.\n\n</details>\n\n<details>\n<summary><b>Codex CLI</b></summary>\n\n```sh\ncodex mcp add byob -- /path/to/tsx /path/to/byob-mcp.ts\n```\n\n</details>\n\n<details>\n<summary><b>Cursor</b></summary>\n\nAdd to `.cursor/mcp.json` (project) or `~/.cursor/mcp.json` (global):\n\n```json\n{\n  \"mcpServers\": {\n    \"byob\": {\n      \"command\": \"/path/to/tsx\",\n      \"args\": [\"/path/to/byob-mcp.ts\"]\n    }\n  }\n}\n```\n\n</details>\n\n<details>\n<summary><b>Windsurf</b></summary>\n\nAdd to `~/.codeium/windsurf/mcp_config.json` (same JSON format as Cursor):\n\n```json\n{\n  \"mcpServers\": {\n    \"byob\": {\n      \"command\": \"/path/to/tsx\",\n      \"args\": [\"/path/to/byob-mcp.ts\"]\n    }\n  }\n}\n```\n\n</details>\n\n<details>\n<summary><b>Cline (VS Code)</b></summary>\n\nOpen Cline sidebar → MCP Servers → Configure, then add (same JSON format):\n\n```json\n{\n  \"mcpServers\": {\n    \"byob\": {\n      \"command\": \"/path/to/tsx\",\n      \"args\": [\"/path/to/byob-mcp.ts\"]\n    }\n  }\n}\n```\n\n</details>\n\n> The actual paths are printed by the setup script. The examples above use shortened paths for readability.  \n> To enable `browser_eval`, add `\"env\": { \"BYOB_ALLOW_EVAL\": \"1\" }` to the config (or `-e BYOB_ALLOW_EVAL=1` for CLI tools).\n\n### Step 5 — Wait for setup to confirm the bridge is online\n\nAfter you finish steps 2 and 3 (load the extension and ⌘Q-restart Chrome), **setup auto-detects the bridge coming online** and prints `✓ bridge online`. The installation is complete — open a new session in your AI tool and try _\"use byob to read ...\"_.\n\nIf you exited setup early with Ctrl+C, or want to check the state later:\n\n```sh\nbun run doctor\n```\n\n`bun run doctor` prints actionable fixes under every `✗` (e.g. \"⌘Q-restart Chrome\", \"extension ID mismatch\", etc.).\n\n---\n\n## Tools\n\n| Tool | What it does |\n|---|---|\n| `browser_read` | Open a page, scroll through, read all text |\n| `browser_read_markdown` | Same, returns clean markdown (no nav/ads) |\n| `browser_extract_table` | Pull `<table>` elements as JSON |\n| `browser_get_console_logs` | Snapshot console.log / warn / error |\n| `browser_start_record_network` | Start recording HTTP + WebSocket traffic |\n| `browser_stop_record_network` | Stop recording, export JSON or HAR |\n| `browser_screenshot` | Screenshot → saved to disk |\n| `browser_download_images` | Download all images from a page |\n| `browser_click` | Click a button or link |\n| `browser_type` | Type into an input (optionally press Enter) |\n| `browser_press_key` | Send a keyboard key (Enter, Escape, F5, ArrowDown, ...) |\n| `browser_hover` | Hover the mouse over an element to trigger tooltips/menus |\n| `browser_select` | Choose an option in a native `<select>` |\n| `browser_scroll` | Scroll to top/bottom, an element, or a Y coordinate |\n| `browser_get_html` | Get raw HTML of an element or the whole page |\n| `browser_get_cookies` | Export cookies for `curl` / scripts |\n| `browser_navigate` | Open a URL in a new or existing tab |\n| `browser_go_back` | Go back one step in browser history |\n| `browser_go_forward` | Go forward one step in browser history |\n| `browser_wait_for` | Wait for an element to appear |\n| `browser_list_tabs` | List all open tabs |\n| `browser_switch_tab` | Switch to a tab |\n| `browser_close_tab` | Close a tab by tabId |\n| `browser_eval` | Run JavaScript on the page (off by default) |\n| `browser_set_cookies` | Write a cookie via `chrome.cookies.set` (CHIPS-aware). |\n| `browser_print_pdf` | Save current page as PDF (default `~/.byob/pdfs/`). |\n| `browser_get_storage` | Read `localStorage` / `sessionStorage` for an origin. |\n| `browser_get_performance` | Page Web Vitals + navigation timing. |\n| `browser_upload_file` | Upload local files to `<input type=\"file\">`. |\n| `browser_intercept_start` | Start a stateful request-interception session. |\n| `browser_intercept_stop` | Stop a `browser_intercept_start` session and return hit stats. |\n| `browser_drag` | Drag the mouse from one point to another (linear interpolation). |\n| `browser_emulate_device` | Emulate mobile/tablet viewport / DPR / touch / UA. |\n\n17 of these tools support `framePath` to reach into nested iframes (including cross-origin).\n\nFull schemas: [`shared/src/schemas.ts`](shared/src/schemas.ts)\n\n---\n\n## How it works\n\n```\nAI tool → byob-mcp → byob-bridge → Chrome extension → your tab\n         (stdio)    (Unix socket) (Native Messaging) (Chrome DevTools Protocol)\n```\n\nAll communication stays local. No data leaves your machine. When Chrome closes, all byob processes exit automatically.\n\n---\n\n## Everyday commands\n\n```sh\nbun run setup      # install or re-install\nbun run doctor     # check what's working\nbun run bridges    # list running bridge processes\nbun run logs       # tail the bridge log\nbun run unsetup    # remove everything\n```\n\nAll run from the byob repo root.\n\n---\n\n## Reliability\n\n- **End-to-end cancellation.** `Ctrl+C` propagates through the entire chain (MCP → bridge → extension → Chrome), cleanly detaching all debug sessions.\n- **DevTools conflict handling.** If DevTools is open on a tab, `browser_eval` automatically falls back to `chrome.scripting.executeScript`.\n- **Sleep/wake recovery.** After a laptop sleep cycle, byob resets all debug sessions so the next call starts from a clean state.\n\n---\n\n## Security\n\n- `browser_eval` is **off by default** — enable with `BYOB_ALLOW_EVAL=1`. Every call logs + notifies.\n- `chrome://`, `file://`, Google/MS/Apple login pages are blocked by default.\n- Each install gets a unique extension key — no collisions.\n- Socket files are `0600`, dirs are `0700`. Other users can't see them.\n- **Zero outbound network traffic.** No analytics, no pings, no crash reports.\n- Chrome displays a \"byob is debugging this browser\" banner on active tabs. This is a Chrome security feature and cannot be suppressed.\n\n---\n\n## Troubleshooting\n\n| Symptom | Cause | Fix |\n|---|---|---|\n| `No live bridge` | Chrome not running or extension disabled | Check `chrome://extensions` |\n| `cdp_attach_failed` | DevTools open on that tab | Close DevTools |\n| `url_forbidden` | URL on the blocklist | See Security section |\n| `extension_not_connected` | Extension lost connection | Reload at `chrome://extensions` |\n| Nothing works after install | Chrome was not fully restarted | Quit Chrome completely (`⌘Q`) and reopen |\n\nRun `bun run doctor` for detailed diagnostics on which step failed.\n\n---\n\n## Platform notes\n\n| Platform | Auto | Manual |\n|---|---|---|\n| **macOS** | Auto-registers selected MCP tools | Open `chrome://extensions` and load the unpacked extension |\n| **Windows** | Same + writes Native Messaging host to registry | Same as macOS |\n| **Linux** | Auto-registers selected MCP tools | Same as macOS |\n\n---\n\n## More\n\n- [Changelog](CHANGELOG.md)\n- [Contributing](CONTRIBUTING.md)\n- [Design notes](docs/superpowers/specs/2026-04-25-byob-design.md)\n- [Test checklist](docs/e2e-checklist.md)\n\nMIT licensed. byob has broad access to your browser — only use it on machines and accounts you own.\n","summary":"byob is a local Model Context Protocol server that lets AI coding tools such as Claude Code, Cursor, and Windsurf directly control the Chrome browser you already have open. It works through a lightweight Chrome extension that exposes the real, logged‑in browser to the AI, enabling tasks like browsing, taking screenshots, reading Gmail or GitHub cookies while naturally passing bot‑detection checks. The setup is quick—under five minutes—and free, making it ideal for developers and AI‑assistant users who need reliable, authenticated web automation without running separate headless browsers or manually managing cookies.","description":"Bring Your Own Browser — let your AI agent use the Chrome you already have open","stars":90,"language":"TypeScript"},{"owner":"evanklem","repo":"evanflow","url":"https://github.com/evanklem/evanflow","readme":"# EvanFlow\n\n**A TDD-driven iterative feedback loop for software development with Claude Code.**\n\n16 cohesive skills + 2 custom subagents walk an idea from brainstorm through implementation, with checkpoints throughout where you stay in control. One entry point: say *\"let's evanflow this\"* and the orchestrator runs the loop.\n\n```\nbrainstorm → plan → execute (vertical-slice TDD per task) → iterate → STOP\n                    └─ sequential, or parallel coder/overseer\n```\n\nTDD is not a separate phase after execute — it's the discipline *inside* each code-writing task. Execute is the harness (task tracking, blockers, quality checks); `evanflow-tdd` is what runs inside any task that produces production code.\n\nThe loop is **conductor, not autopilot**: real checkpoints at design approval, plan approval, and after iteration. The agent stops short of every git operation and waits for your direction. No auto-commits. No forced ceremony. No \"must invoke a skill\" tax.\n\n---\n\n## Quick Install\n\nThe **recommended** path — Claude Code's plugin marketplace:\n\n```\n/plugin marketplace add evanklem/evanflow\n/plugin install evanflow@evanflow\n```\n\nRestart, then try:\n\n> \"Let's evanflow this — I want to add a small feature that does X.\"\n\n`evanflow-go` fires and walks the loop. The git-guardrails hook auto-activates with the plugin (no settings.json edit needed). Skills appear under the `evanflow:` namespace (e.g., `/evanflow:evanflow-go`).\n\nSee [Installation](#installation) below for two alternative paths.\n\n---\n\n## What Makes It a Feedback Loop\n\nThe loop is built around **discipline that compounds across iterations**, not single-shot generation. Every step has a checkpoint that gates the next:\n\n- **Brainstorm** clarifies intent, proposes 2–3 approaches with embedded grill (stress-test) → you approve the design\n- **Plan** maps file structure first (deep modules, deletion test) → you approve the plan\n- **Execute** runs task-by-task with inline verification → blockers stop the loop and surface to you. Inside each code-writing task, **TDD** is the discipline (not a separate phase that comes after).\n- **TDD** is vertical-slice only and **per-cycle full RED → GREEN → REFACTOR**: one failing test → minimal impl → refactor *while the test you just wrote is still fresh as your safety net* → next test. Refactor is not deferred to the end. Tests verify behavior through public interfaces, so they survive refactors\n- **Iterate** re-reads the diff with fresh eyes, runs quality checks, screenshots UI changes, and runs against a Five Failure Modes checklist (hallucinated actions, scope creep, cascading errors, context loss, tool misuse). Hard cap of 5 iterations\n- **STOP.** Report. Await your direction. The agent never auto-commits, never auto-stages, never proposes a PR\n\nFor plans with 3+ truly independent units, the loop forks into a **parallel coder/overseer orchestration**: one coder per unit (using vertical-slice TDD with a RED checkpoint), one overseer per coder (read-only review subagent that can't modify code), plus an integration overseer that runs named integration tests at every touchpoint. The integration tests *are* the executable contract — interfaces can't drift if both sides have to satisfy the same passing test.\n\n## Hard Rules Baked Into the Loop\n\nEach rule below cites the source it came from. If a citation is missing, the rule is opinion from running the loop on real projects, not research — labeled as such.\n\n- **Never invent values** — file paths, env vars, IDs, function names, library APIs. If unsure, the agent stops and asks. *Source: action-hallucination is the top failure mode in [DAPLab/Columbia \"9 Critical Failure Patterns of Coding Agents\"](https://daplab.cs.columbia.edu/general/2026/01/08/9-critical-failure-patterns-of-coding-agents.html).*\n- **Assertion-correctness warning** — over 62% of LLM-generated test assertions were incorrect across HumanEval evaluation of four LLMs. *Source: [\"Test-Driven Development for Code Generation\" (arXiv 2402.13521)](https://arxiv.org/pdf/2402.13521), §3.2.* Both `evanflow-tdd` and the overseer review explicitly check whether a one-character bug in the implementation would still let the assertion pass.\n- **Five Failure Modes pass** in iterate + overseer review — hallucinated actions, scope creep, cascading errors, context loss, tool misuse. *Source: synthesized from the DAPLab failure patterns paper above.*\n- **Context drift watch** — `evanflow-compact` triggers at clean phase boundaries and on drift symptoms (re-asking settled questions, contradicting earlier decisions). *Source: nearly 65% of enterprise AI failures in 2025 were attributed to context drift or memory loss during multi-step reasoning, not raw context exhaustion — see [Alex Merced, \"Context Management Strategies for OpenCode\" (March 2026)](https://datalakehousehub.com/blog/2026-03-context-management-opencode/).*\n- **Never auto-commit, never auto-stage** — opinion, not research. Came from running the loop on real projects: every time the agent decided to integrate, it integrated wrong.\n- **No skill tax** — opinion. Skills are tools, not a tollbooth.\n\n---\n\n## The Skill Set\n\n### Default Loop (5 skills)\n\n| Skill | Purpose |\n|---|---|\n| `evanflow-brainstorming` | Clarify intent, propose 2–3 approaches with embedded grill (stress-test). Mockup quick-mode for visual-only requests. |\n| `evanflow-writing-plans` | File structure first, bite-sized tasks, embedded grill. Step 2.5 offers `evanflow-coder-overseer` if the plan is parallelizable. |\n| `evanflow-executing-plans` | Task-by-task with inline verification. Step 0 re-offers parallel path. Hands off to iterate, then STOPS. |\n| `evanflow-tdd` | Vertical-slice TDD. One test → one impl → repeat. Behavior through public interface. Assertion-correctness warning. |\n| `evanflow-iterate` | Self-review loop after implementation. Re-read diff, fix issues, run quality checks, screenshot UI (via headless Chromium). Five Failure Modes checklist. Hard cap of 5 iterations. |\n\n### Special-Purpose (8 skills)\n\n| Skill | Purpose |\n|---|---|\n| `evanflow-go` | **Single entry point.** Say \"let's evanflow this\" and it walks the whole loop. |\n| `evanflow-glossary` | Extract canonical domain terms into `CONTEXT.md`. Flag ambiguities and synonyms. |\n| `evanflow-improve-architecture` | Surface refactor opportunities via the deletion test + deep-modules vocabulary. |\n| `evanflow-design-interface` | \"Design it twice\" — spawn 3+ parallel sub-agents with radically different constraints, compare on depth/simplicity/efficiency. |\n| `evanflow-debug` | Root-cause discipline. Hypothesis stated explicitly, embedded grill before fixing, failing test first. |\n| `evanflow-review` | Both halves of code review (giving + receiving). Don't capitulate to feedback you can't justify. |\n| `evanflow-prd` | Synthesize a PRD from existing context. For substantial new features. |\n| `evanflow-qa` | Conversational bug discovery → issue draft. Asks before filing. |\n\n### Cross-Cutting (1 skill)\n\n| Skill | Purpose |\n|---|---|\n| `evanflow-compact` | Long-session context management. Strategies for proactive summarization at clean boundaries. Drift symptoms checklist. |\n\n### Meta (1 skill)\n\n| Skill | Purpose |\n|---|---|\n| `evanflow` | The index. Shared vocabulary + when to invoke each `evanflow-*` skill. |\n\n### Custom Subagents (2)\n\nIn `agents/` — invoked via `Agent` tool with `subagent_type:` parameter:\n\n| Subagent | Tool restrictions | Purpose |\n|---|---|---|\n| `evanflow-coder` | Read, Edit, Write, Glob, Grep, Bash, TodoWrite | Implementation subagent for `evanflow-coder-overseer`. Tools + system prompt prevent git ops, out-of-scope edits, value hallucination. |\n| `evanflow-overseer` | Read, Grep, Glob (no Edit/Write/Bash) | Read-only review subagent. Tools physically enforce \"report findings, never fix.\" |\n\n### Bundled Hook\n\n`hooks/block-dangerous-git.sh` — PreToolUse hook that blocks destructive git ops (`git push`, `git reset --hard`, `git clean -f`, `git branch -D`, `git checkout .`, `git restore .`). Auto-activates with the plugin install path.\n\n---\n\n## Hard Rules (apply to every skill)\n\n1. **Never auto-commit, never auto-stage, never auto-finish.** Every git write op requires you to explicitly ask in the current turn.\n2. **Never invent values.** File paths, env vars, IDs, function names, library APIs — if unsure, the agent stops and asks.\n3. **No skill tax.** Ad-hoc questions don't require a skill invocation. Skills are tools, not a tollbooth.\n4. **No forced spec/plan paths.** Files live where you want them.\n5. **Verify before claiming done.** Quality checks (typecheck, lint, test) run before any \"done\" report.\n\n---\n\n## Requirements\n\n- **[Claude Code](https://claude.com/claude-code)** (any recent version)\n- **Bash** — for the bundled hook script (Linux, macOS, or Windows + WSL)\n- **`jq`** — used by the hook script to parse Claude's JSON tool input. Install via `apt install jq`, `brew install jq`, or your platform's package manager. **If `jq` is missing, the guardrail hook fails silently and dangerous git ops are NOT blocked.**\n\nOptional but recommended:\n\n- **`chromium`** or `google-chrome` — for `evanflow-iterate`'s visual verification of UI changes (`chromium --headless --screenshot=...`). Falls back gracefully if missing — the skill flags it and asks you to verify visually.\n\n---\n\n## Installation\n\nThree paths, in priority order. All three end with the same skill set in your `.claude/skills/`. The plugin path additionally auto-wires the guardrail hook.\n\n### Path 1 — Claude Code Plugin Marketplace (recommended)\n\nThis is the cleanest install. Skills, agents, AND the guardrail hook all activate automatically.\n\n```\n/plugin marketplace add evanklem/evanflow\n/plugin install evanflow@evanflow\n```\n\nRestart Claude Code (or `/reload-plugins`). Skills appear namespaced as `/evanflow:evanflow-go`, `/evanflow:evanflow-tdd`, etc. Auto-invocation via \"let's evanflow this\" still works regardless of namespace.\n\nTo uninstall: `/plugin uninstall evanflow@evanflow`.\n\n### Path 2 — `npx skills@latest add` CLI\n\nWorks against any GitHub repo with `SKILL.md`-shaped folders. Installs skills only — **does not install the guardrail hook or custom subagents** (you'd add those manually if you want them).\n\n```bash\n# Install all 16 skills at once\nnpx skills@latest add evanklem/evanflow -s '*' -y\n\n# Or install individual skills\nnpx skills@latest add evanklem/evanflow/evanflow-go\nnpx skills@latest add evanklem/evanflow/evanflow-tdd\n# ...\n```\n\nThis places skills under `~/.claude/skills/` (global) or `.claude/skills/` (project, auto-detected).\n\n### Path 3 — Manual Copy\n\nFor users who want full control, no CLI dependencies.\n\n```bash\ngit clone https://github.com/evanklem/evanflow.git\ncd evanflow\n\n# Skills (project-level — adjust to ~/.claude/skills/ for global)\nmkdir -p .claude/skills\ncp -r skills/* .claude/skills/\n\n# Agents (custom subagents used by evanflow-coder-overseer)\nmkdir -p .claude/agents\ncp agents/*.md .claude/agents/\n\n# Git guardrails hook (optional but recommended)\nmkdir -p .claude/hooks\ncp hooks/block-dangerous-git.sh .claude/hooks/\nchmod +x .claude/hooks/block-dangerous-git.sh\n```\n\nThen register the hook in your `.claude/settings.json`:\n\n```json\n{\n  \"hooks\": {\n    \"PreToolUse\": [\n      {\n        \"matcher\": \"Bash\",\n        \"hooks\": [\n          {\n            \"type\": \"command\",\n            \"command\": \"\\\"$CLAUDE_PROJECT_DIR\\\"/.claude/hooks/block-dangerous-git.sh\"\n          }\n        ]\n      }\n    ]\n  }\n}\n```\n\nOptionally, paste `examples/CLAUDE.md.snippet` into your project's `CLAUDE.md` to brief Claude about EvanFlow's conventions.\n\n### Verify Any Install Path\n\nRestart Claude Code. Try saying:\n\n> \"Let's evanflow this — I want to add a small feature that does X.\"\n\n`evanflow-go` should fire and walk you through the loop. To verify the guardrail hook (paths 1 and 3 only): try `git reset --hard HEAD` from the Bash tool — it should be blocked with \"BLOCKED: ... matches dangerous pattern\".\n\n---\n\n## Customization\n\nEvery skill has a clear structure with a `## Hard Rules` section. To adapt to your project:\n\n- **Replace `<frontend>` and `<backend>` placeholders** in skills like `evanflow-writing-plans` with your actual paths if you find yourself answering the same question repeatedly.\n- **Document your project's quality checks** in your `CLAUDE.md` — exact `typecheck`, `lint`, and `test` commands. The skills reference these abstractly.\n- **Adapt the visual verification step** in `evanflow-iterate` if you don't have `chromium` available — substitute `google-chrome --headless` or another tool.\n- **Edit the cohesion contract template** in `evanflow-coder-overseer` to match your project's conventions (your authentication middleware name, your DB write helper, etc.).\n\nThe skills are designed to be edited. Treat them as starting points, not gospel.\n\nIf you fork to make a vendor-specific variant (your-name-flow), great — that's the spirit.\n\n---\n\n## How EvanFlow Works End-to-End\n\n```\nYou say: \"let's evanflow this — I want to add a feature that does X\"\n           │\n           ▼\n       evanflow-go (the conductor)\n           │\n           ├─ Phase 0: Restate idea, scope check\n           ├─ Phase 1: evanflow-brainstorming (CHECKPOINT: design approval)\n           ├─ Phase 2: evanflow-writing-plans (CHECKPOINT: plan approval)\n           │            └─ Step 2.5: parallelization check\n           ├─ Phase 3: evanflow-executing-plans (sequential)\n           │            OR\n           │            evanflow-coder-overseer (parallel)\n           │              ├─ contract with named tests + integration tests\n           │              ├─ RED checkpoint (all coders write failing tests, orchestrator verifies)\n           │              ├─ GREEN phase (vertical-slice TDD per coder)\n           │              ├─ per-coder overseers (review, never fix)\n           │              └─ integration overseer (runs touchpoint tests)\n           ├─ Phase 4: evanflow-iterate (5x cap, Five Failure Modes pass)\n           └─ Phase 5: STOP. Report what was done. Await your direction.\n```\n\nCross-cutting: `evanflow-compact` runs at clean boundaries when context gets heavy.\n\nSpecial-purpose skills (`evanflow-debug`, `evanflow-improve-architecture`, `evanflow-design-interface`, `evanflow-glossary`, `evanflow-prd`, `evanflow-qa`, `evanflow-review`) are pulled in mid-flow when relevant.\n\n---\n\n## Repository Structure\n\n```\n.\n├── .claude-plugin/\n│   ├── plugin.json          — plugin identity (name, description, version)\n│   └── marketplace.json     — marketplace manifest (lists EvanFlow as one bundled plugin)\n├── skills/                  — 16 SKILL.md folders\n│   ├── evanflow/\n│   ├── evanflow-go/\n│   ├── evanflow-brainstorming/\n│   ... (etc)\n├── agents/                  — 2 custom subagent definitions\n│   ├── evanflow-coder.md\n│   └── evanflow-overseer.md\n├── hooks/\n│   ├── hooks.json           — auto-activated when plugin installs\n│   └── block-dangerous-git.sh\n├── examples/\n│   └── CLAUDE.md.snippet    — for the manual-copy install path\n├── docs/\n│   └── skills-audit.md      — verdict on all 38 candidate skills considered\n├── README.md\n└── LICENSE                  — MIT\n```\n\n---\n\n## Credits\n\nEvanFlow synthesizes ideas from:\n\n- **[mattpocock/skills](https://github.com/mattpocock/skills)** by Matt Pocock — vertical-slice TDD, deep modules, deletion test, design-it-twice, ubiquitous language, grill-me, caveman.\n- **[superpowers](https://github.com/obra/superpowers)** by Jesse Vincent — verification-before-completion, code review patterns, parallel agent dispatch, finishing-a-development-branch (the 4-option presentation).\n- **[git-guardrails-claude-code](https://github.com/mattpocock/skills/tree/main/git-guardrails-claude-code)** — bundled in `hooks/` (script copied verbatim). Original by Matt Pocock.\n\nIndustry research informing the design:\n\n- Anthropic's [2026 Agentic Coding Trends Report](https://resources.anthropic.com/hubfs/2026%20Agentic%20Coding%20Trends%20Report.pdf?hsLang=en)\n- [9 Critical Failure Patterns of Coding Agents (DAPLab, Columbia)](https://daplab.cs.columbia.edu/general/2026/01/08/9-critical-failure-patterns-of-coding-agents.html)\n- [Test-Driven Development for Code Generation](https://arxiv.org/pdf/2402.13521) (arXiv 2402.13521) — assertion-correctness findings\n\n---\n\n## License\n\nMIT. See [LICENSE](LICENSE).\n\n---\n\n## Contributing\n\nIssues and pull requests welcome. EvanFlow is opinionated by design — proposals to add ceremony or auto-actions will be politely declined. Proposals to **further reduce** ceremony, sharpen rules, or add evidence-backed improvements are very welcome.\n","summary":"EvanFlow is a Claude Code-based orchestration system that guides a developer through a fully TDD‑driven feedback loop—from brainstorming and planning to vertical‑slice development, iterative testing, and refactoring—while keeping full human control over every checkpoint. Its core tooling comprises 16 reusable skills and two custom subagents that move the project through design approval, plan validation, code execution, and quality checks, all without making automatic Git commits or forcing ceremony. The loop is adaptable to parallel coding for independent units, leveraging overseer agents and shared integration tests to enforce contract‑driven interfaces. Developers who want disciplined, incremental code generation with built‑in safety nets and clear stopping points will find EvanFlow an efficient companion for building robust software.","description":"A TDD-driven iterative feedback loop for software development. 16 cohesive Claude Code skills walk an idea from brainstorm → plan → execute → iterate, with checkpoints throughout.","stars":309,"language":"Shell"},{"owner":"jameesy","repo":"foundry-vault","url":"https://github.com/jameesy/foundry-vault","readme":"![Foundry](docs/header.png)\n\n# Foundry\n\nA personal knowledge vault maintained by Claude. You collect sources. Claude compiles them into a wiki of concepts, connections, and open questions.\n\nBased on [Andrej Karpathy's LLM wiki pattern](https://x.com/karpathy/status/2039805659525644595): raw source documents go in, an LLM incrementally compiles them into concept articles with backlinks, and the wiki becomes a rich substrate for Q&A and further research.\n\n## Quick start\n\n1. **Clone this repo** and open it in [Obsidian](https://obsidian.md)\n2. **Install Claude Code** — [claude.ai/code](https://claude.ai/code) (or your preferred agent!)\n3. **Drop something into `inbox/`** — a URL, a web clipping (via [Obsidian Web Clipper](https://obsidian.md/clipper)), a PDF, or pasted text\n4. **Run `/foundry-ingest`** — Claude processes everything in the inbox into clean source notes\n5. **Run `/foundry-compile`** — Claude scans for un-compiled sources and builds concept articles when themes recur across 2+ sources\n6. **Run `/foundry-ask`** followed by a question — Claude researches your question across the vault and writes a report\n\nThat's it. Drop, ingest, compile. The vault grows itself.\n\n## How it works\n\n### Three layers\n\n| Directory | Purpose | Who writes |\n|---|---|---|\n| `inbox/` | Staging for unprocessed drops | You |\n| `sources/` | One atomic note per article, paper, or transcript | Claude |\n| `wiki/` | Concept articles, people pages, query reports, index, and log | Claude |\n\n### The contract\n\nYou curate what goes in. Claude writes and maintains the derived layer. The separation matters — your taste decides what's worth keeping; Claude does the synthesis work that humans can't sustain at scale.\n\n### The 2-source rule\n\nClaude won't create a concept article from a single source. Themes are logged as **candidates** in `wiki/_meta/index.md` until a second independent source confirms the pattern. This prevents the wiki from filling up with speculative one-offs.\n\n### What compounds\n\n- **Sources** build the raw material\n- **Concepts** crystallise when themes recur\n- **Queries** (`/foundry-ask`) produce research reports that get filed back into the wiki — so questions add up over time\n- **Research threads** emerge as clusters of 3+ concepts sharing keywords\n\n## The four commands\n\n| Command | What it does |\n|---|---|\n| `/foundry-ingest` | Process inbox into source notes |\n| `/foundry-compile` | Build or extend concept articles from un-compiled sources |\n| `/foundry-ask` | Research a question across the vault |\n| `/foundry-lint` | Health-check: stats, orphans, keyword drift |\n\n## Companion vault (optional)\n\nIf you already keep personal notes (a commonplace, Zettelkasten, or notes folder), you can point Claude at it as a read-only companion. Claude will cross-reference your notes when compiling but never write into them. See `CLAUDE.md` for setup.\n\n## Customisation\n\n- **Areas**: Edit the `#area/` taxonomy in `CLAUDE.md` to match your interests\n- **Keywords**: Managed in `wiki/_meta/index.md` — add new ones as your reading grows\n- **Obsidian theme**: The `.obsidian/` config is included with a clean setup. Swap themes or plugins as you like\n- **Voice**: Concept articles are written as sharp foundations for *your* writing, not finished essays. Adjust the voice instructions in `CLAUDE.md` if you want a different tone\n\n## What's included\n\nThis template ships with two example sources and one example concept to show the structure:\n\n- `sources/LLM Knowledge Bases (Karpathy).md` — the post that inspired this vault pattern\n- `sources/What Matters in the Age of AI Is Taste.md` — on taste as the human differentiator in AI-augmented work\n- `wiki/Two-layer knowledge systems.md` — a concept article compiled from both sources\n- `wiki/Andrej Karpathy.md` — an example people page\n\nDelete these and clear `wiki/_meta/index.md` once you've seen how they work, or keep them as seeds for your own vault.\n\n## Schema\n\nEverything Claude needs to know is in `CLAUDE.md`. That file is the single source of truth for how the vault operates. Read it if you want to understand or modify the rules.\n\n---\n\nBuilt with [Claude Code](https://claude.ai/code) and [Obsidian](https://obsidian.md).\n","summary":"Foundry is a personal knowledge vault that uses Claude to ingest raw documents, transform them into clean “source” notes, and automatically compile recurring themes into concept‑based wiki pages. Users drop URLs, PDFs or clips into an Obsidian inbox and run the `/foundry‑ingest` and `/foundry‑compile` commands; the system creates articles only after a theme appears in at least two independent sources, preventing speculative entries. Additional commands allow researchers to query the vault (`/foundry‑ask`) and run health checks (`/foundry‑lint`). The tool is ideal for writers, researchers, and anyone maintaining a Zettelkasten‑style knowledge base who wants automated synthesis of their reading material within an Obsidian workflow.","description":"An agentic Obsidian vault: you curate, Claude compiles.","stars":62,"language":null},{"owner":"systalyze","repo":"utilyze","url":"https://github.com/systalyze/utilyze","readme":"# Utilyze\n\nUtilyze measures how efficiently your GPU is doing useful work, not just whether it's busy. It runs live against your workload with negligible overhead.\n\n![utlz in action](./assets/utlz.png)\n\nStandard tools like `nvidia-smi` and `nvtop` only check whether a kernel is running on the GPU. They can show 100% while your workload is using a tiny fraction of the hardware's real capacity. \n\nUtilyze reads GPU performance counters directly to show what's actually being used, and provides an estimate of how far you can push utilization given a workload, model, and hardware. To learn more, read [our blog post](https://systalyze.com/utilyze).\n\nUtilyze is created by [Systalyze](https://systalyze.com).\n\n**Read this in other languages:** [中文](./README.zh-CN.md)\n\n## Requirements\n\n- Linux amd64 (arm64 support coming soon)\n- NVIDIA Ampere or newer GPU (A100, H100, H200, B200, RTX 3000+)\n- CUDA Toolkit 11.0+\n- `sudo` or `CAP_SYS_ADMIN` (see below), or privileged container\n\n## Installation\n\n```bash\n# macOS/Linux\ncurl -sSfL https://systalyze.com/utilyze/install.sh | sh\n\n# Windows\niex (curl.exe -L https://systalyze.com/utilyze/install.ps1 | Out-String)\n```\n\nFor macOS and Windows versions, **Utilyze acts as a client for another Utilyze process running on a remote Linux machine with profiling capabilities.** These do not require root nor any native libraries. On Windows, you may need to add an exception to executable path for Windows Defender and then reinstall Utilyze:\n\n```powershell\nAdd-MpPreference -ExclusionPath <INSTALL_DIR>\niex (curl.exe -L https://systalyze.com/utilyze/install.ps1 | Out-String)\n```\n\nUtilyze will likely require root for profiling capabilities depending on your host configuration (see below) and will prompt you for your password during installation to install it system-wide.\n\nIf CUPTI 12+ is not found, `utlz` will prompt you to install the latest release from PyPI on first run.\n\n## Usage\n\nOn a Linux machine with profiling capabilities, you can:\n```bash\n# monitor all GPUs for SOL metrics\nsudo utlz\n\n# monitor specific GPUs\nsudo utlz --devices 0,2\n\n# show discovered inference server endpoints per GPU\nsudo utlz --endpoints\n```\nThis starts a WebSocket server that listens for connections from other Utilyze processes on port 8079 by default. Further instances will automatically connect to the same server.\n\nOn a macOS/Windows machine, you can connect to a running server with:\n```bash\nutlz --connect <SERVER_URL>\n```\n\nNote that a single device ID can only be monitored by a single instance of `utlz`. This is due to the way NVIDIA's Perf SDK API handles device access.\n\n### Attainable SOL\n\nUtilyze discovers running inference servers to detect which model is loaded on each GPU. It computes an attainable compute SOL ceiling (your realistic peak given that model and hardware).\n\nCurrently Utilyze only supports vLLM as a backend, with more (e.g. SGLang) coming soon. We are expanding model and hardware coverage over time; at present we support a subset of models on H100-80G and A100-80G GPUs within a node (up to 8 GPUs).\n\nTo enable this, Utilyze anonymously sends GPU configuration data to Systalyze's servers. Disable with `UTLZ_DISABLE_METRICS=1`.\n\n### Running without sudo\n\nBy default, NVIDIA restricts GPU profiling counters to admin users. To allow non-root access, disable the restriction on the host and reboot:\n\n```bash\necho 'options nvidia NVreg_RestrictProfilingToAdminUsers=0' | sudo tee /etc/modprobe.d/nvidia-profiling.conf\nsudo reboot\n```\n\nAfter this, `utlz` can run without sudo. If `utlz` warns about missing capabilities, you can disable the warning via `UTLZ_DISABLE_PROFILING_WARNING=1` (see Options).\n\n### Options\n\nFlags (most have environment variable equivalents):\n\n- `--endpoints`: show discovered inference server endpoints per GPU\n- `--devices` / `UTLZ_DEVICES`: monitor specific GPUs (comma-separated list of device IDs)\n- `--log` / `UTLZ_LOG`: a file to write logs to (default: no logging)\n- `--log-level` / `UTLZ_LOG_LEVEL`: set the log level (default: `INFO`, other options: `DEBUG`, `WARN`, `ERROR`)\n- `--version`: show the version\n\nEnvironment variables only:\n\n- `UTLZ_DISABLE_PROFILING_WARNING`: disable the warning about GPU profiling capabilities on startup\n- `UTLZ_BACKEND_URL`: set the backend URL for Systalyze's roofline SOL metrics API (default: `https://api.systalyze.com/v1/utilyze`)\n- `UTLZ_DISABLE_METRICS`: disable workload detection and Systalyze roofline SOL metrics API\n\n## Build from source\n\nTo build from source you'll need:\n\n- Go 1.25+ for the CLI\n- Docker for building the native library with wide compatibility\n- CUDA Toolkit (13.1 is linked against by default but can be set via `CUDA_VERSION`)\n\n```bash\n# build the native library and the CLI\nmake all\n\n# build and package the native library via Docker\nmake dist-tarball-docker\n\n# build the CLI only\nmake utlz\n```\n\nThere is experimental support for ARM64 builds using the sbsa-linux CUDA target.\n","summary":"Utilyze tracks the actual useful work performed by NVIDIA GPUs instead of merely showing kernel activity, providing low‑overhead, real‑time metrics that reflect hardware capacity. It reads performance counters directly, estimates attainable “SOL” (sustained offerable load) ceilings for the models currently deployed on each GPU, and exposes a WebSocket server that allows remote clients on macOS and Windows to collect data from a Linux host. Core features include selective device monitoring, endpoint discovery for inference servers such as vLLM, and optional suppression of root‑required profiling permissions. The tool is ideal for ML engineers, data‑center operators, and researchers who need precise GPU utilization metrics to optimize workloads and troubleshoot performance bottlenecks.","description":null,"stars":140,"language":"Go"},{"owner":"mendrik-private","repo":"sqv","url":"https://github.com/mendrik-private/sqv","readme":"# sqv\n\n**sqv** is a keyboard-first terminal viewer for SQLite databases. It is built for fast table browsing, in-place editing, filtering, sorting, and foreign-key navigation without leaving the terminal.\n\n<img width=\"2880\" height=\"1555\" alt=\"image\" src=\"https://github.com/user-attachments/assets/38ea5b40-a57e-4c49-b3bd-19033f8c7a48\" />\n<br/>\n<img width=\"2880\" height=\"1555\" alt=\"image\" src=\"https://github.com/user-attachments/assets/32771472-7b33-424b-9138-516edb54c427\" />\n\n\n## Highlights\n\n- Fast virtual scrolling for large tables\n- Rich cell editors for text, enums, dates, datetimes, and foreign keys\n- Per-column filters, sorting, and alphabet jump navigation\n- Export current views to CSV, JSON, or SQL\n- Read-only mode for safe inspection\n\n## Install\n\n### apt (GitHub Pages repository)\n\nThe project publishes an `amd64` Debian package to a GitHub-hosted apt repository.\n\n```bash\necho \"deb [trusted=yes arch=amd64] https://mendrik-private.github.io/sqv stable main\" \\\n  | sudo tee /etc/apt/sources.list.d/sqv.list\nsudo apt update\nsudo apt install sqv\n```\n\n`trusted=yes` is required because the repository is published from GitHub Pages without apt signing.\n\n### Release binary\n\nDownload the latest Linux binary archive from GitHub Releases and install it into `/usr/local/bin`:\n\n```bash\ncurl -fsSL -o sqv-linux-x86_64.tar.gz \\\n  https://github.com/mendrik-private/sqv/releases/latest/download/sqv-linux-x86_64.tar.gz\ntar -xzf sqv-linux-x86_64.tar.gz\nsudo install -m 0755 sqv /usr/local/bin/sqv\n```\n\n### From source\n\n```bash\ncargo install --path .\n```\n\nOr run directly from the checkout:\n\n```bash\ncargo run --release -- path/to/database.db\n```\n\n## Usage\n\n```text\nsqv <DB_PATH> [--readonly]\nsqv check-terminal\n```\n\n- `DB_PATH`: path to a SQLite database, or `:memory:`\n- `--readonly`: disable writes\n- `check-terminal`: print detected terminal capabilities\n\n## Keybindings\n\n### Navigation\n\n| Key | Action |\n|-----|--------|\n| `↑ ↓ ← →` / `h j k l` | Move focused cell |\n| `Home` / `End` | First / last column in row |\n| `Ctrl-Home` / `Ctrl-End` | First / last cell in table |\n| `PgUp` / `PgDn` / `Ctrl-↑` / `Ctrl-↓` | Scroll one viewport |\n| `Mouse wheel` | Scroll rows |\n| `Shift-wheel` | Scroll columns |\n| `Click cell` | Focus cell |\n\n### Editing\n\n| Key | Action |\n|-----|--------|\n| `Enter` | Open the focused cell picker/editor |\n| `Alt-Enter` | Insert a newline in the direct text editor |\n| `e` | Open the focused cell in the direct editor |\n| `n` | Set the focused cell to `NULL` when allowed |\n| `Esc` | Close popup |\n| `Ctrl-Enter` | Save an inserted row from the staged row editor |\n| `i` | Insert row in a staged editor, then validate on save |\n| `d` | Delete row |\n| `Ctrl-z` | Undo last write |\n\n### Filtering, sorting, and other actions\n\n| Key | Action |\n|-----|--------|\n| `s` | Cycle sort on focused column |\n| `f` | Open filter popup for focused column |\n| `Shift-F` | Clear filters |\n| `j` | Jump through a foreign key |\n| `Backspace` | Jump back |\n| `Ctrl-b` | Toggle sidebar |\n| `Ctrl-Shift-P` | Command palette |\n| `Ctrl-Q` | Quit |\n\n## Configuration\n\nConfiguration is read from:\n\n```text\n$XDG_CONFIG_HOME/sqv/config.toml\n```\n\nExample:\n\n```toml\nnerd_font = true\n```\n\n## Development\n\n### Local validation\n\n```bash\ncargo fmt\ncargo clippy -- -D warnings\ncargo test\n```\n\n### Release pipeline\n\nGitHub Actions provides:\n\n1. **CI** on pushes and pull requests: format check, clippy, and tests\n2. **Tagged releases** on `v*` tags:\n    - build the release binary\n    - build a Debian package\n    - publish GitHub Release assets\n    - publish an apt repository to GitHub Pages\n\nTo cut a release:\n\n```bash\ngit tag v0.1.2\ngit push origin v0.1.2\n```\n\nBefore the first tagged release, enable **GitHub Pages** for the repository so the apt repository can be deployed from GitHub Actions. Tagged releases now wait for a successful Pages deployment before publishing release assets.\n","summary":"sqv is a keyboard‑first terminal viewer for SQLite databases that enables fast virtual scrolling, in‑place editing, filtering, sorting, and foreign‑key navigation directly within a terminal window. It supports rich cell editors for text, enums, dates, foreign keys, offers per‑column filters and sorting, lets users jump through foreign keys, and can export the current view to CSV, JSON, or SQL while providing a read‑only mode for safe inspection. Developers, database administrators, and sysadmins who need quick, interactive database inspection and manipulation without leaving the command line will benefit most from using sqv.","description":"sqlite3 viewer","stars":87,"language":"Rust"},{"owner":"julianmemberstack","repo":"marko","url":"https://github.com/julianmemberstack/marko","readme":"# [Marko](https://askmarko.xyz/)\n\nA grumpy senior code reviewer for [Claude Code](https://docs.claude.com/en/docs/claude-code) and [Codex](https://github.com/openai/codex). He reviews your changes, tells you what's wrong, and never suggests fixes.\n\nMore at **[askmarko.xyz](https://askmarko.xyz/)**.\n\n```\n**Verdict:** bad\n\nThree concurrency bugs and a log line leaking PII.\n\n1. `src/worker.ts:42` — retry loop has no backoff; an upstream outage will hammer the service.\n2. `src/worker.ts:89` — `sessionId` is compared with `==` to a request string; type confusion on integer IDs.\n3. `src/auth.ts:14` — full email logged at info; move to debug or redact.\n4. `src/queue.ts:110` — inner `flush()` is not awaited; writes can be dropped on shutdown.\n```\n\n## What he does\n\n- Reviews your current `git diff`, branch diff, or recent edits.\n- Returns a one-word verdict: **`catastrophe` / `bad` / `mediocre` / `ok`**.\n- Lists concrete, `file:line`-anchored gripes that a coding agent can act on directly.\n- Never suggests fixes. Never softens. Never pads. \"ok\" is the ceiling and it is rare.\n\nThe point is signal-to-noise. A review that ends \"LGTM, ship it\" contains no information. Marko's does.\n\n## Install\n\nOne command, installs for both tools:\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/julianmemberstack/marko/main/install.sh | bash\n```\n\nFlags:\n\n```bash\n# Just one tool\ncurl -fsSL https://raw.githubusercontent.com/julianmemberstack/marko/main/install.sh | bash -s -- --claude-only\ncurl -fsSL https://raw.githubusercontent.com/julianmemberstack/marko/main/install.sh | bash -s -- --codex-only\n```\n\nOr manually:\n\n- **Claude Code:** copy `SKILL.md` to `~/.claude/skills/marko/SKILL.md`\n- **Codex:** copy `codex/marko.md` to `~/.codex/prompts/marko.md`\n\n## Use\n\n### Claude Code\n\nAddress him by name. Natural language triggers the skill:\n\n- `marko?`\n- `what do you think marko?`\n- `hey marko, take a look`\n- `marko thoughts on this branch?`\n\nHe picks what to review in this order: uncommitted `git diff` → branch diff → recently edited files → asks you.\n\nYou will need to restart your Claude Code session once after install so the new skill is picked up.\n\n### Codex\n\nType `/marko` in a session. Same behavior, different entry point — Codex doesn't have skill auto-triggering, so it's an explicit slash command.\n\n### Periodic reviews\n\nWant Marko watching while you work? In Claude Code:\n\n```\n/loop 10m marko?\n```\n\nOr wire a `Stop` hook in `~/.claude/settings.json` so he chimes in after every turn.\n\n## How it works\n\nMarko is a prompt, not a tool. The repo contains two files:\n\n- `SKILL.md` — the Claude Code skill. Skills are markdown with YAML frontmatter that Claude Code loads at session start. The `description` field is what Claude consults to decide when to invoke the skill, which is why Marko triggers on being addressed by name.\n- `codex/marko.md` — the Codex custom prompt. Plain markdown injected into the conversation when you type `/marko`.\n\nThe two files contain the same instructions with minor framing differences (third-person \"Marko does X\" vs. second-person \"you do X\") so each tool's invocation model reads naturally.\n\n## Design\n\nA few deliberate choices that make Marko actually useful instead of just funny:\n\n- **No praise inflation.** \"ok\" means the code is actually good. This is the point of the whole exercise — a verdict is only information if it distinguishes good from bad.\n- **No suggested fixes.** Forces each complaint to stand on its own. Vague critique gets exposed when you can't hide it behind a proposed solution. Also keeps the output short.\n- **`file:line` anchors on every gripe.** The output is designed to be consumed by another agent (Claude Code, Codex) that then fixes the issues. Vague complaints are useless for that; concrete ones are actionable.\n- **Few words.** A reviewer who writes three paragraphs per gripe is not reviewing, they are performing.\n- **No caricature.** The \"grumpy senior engineer\" persona exists to strip out flattery and verbosity. No accent, no stereotypes, no theatre.\n\n## Uninstall\n\n```bash\nrm -rf ~/.claude/skills/marko ~/.codex/prompts/marko.md\n```\n\n## License\n\nMIT. See [LICENSE](./LICENSE).\n","summary":"Marko is a grumpy code‑reviewer skill for Claude Code and Codex that inspects a git diff, branch diff, or recent edits and returns a single‑word verdict— *catastrophe*, *bad*, *mediocre*, or *ok*—alongside concrete, file:line‑anchored complaints. It never offers fixes or praise, delivering short, actionable feedback that other agents can consume directly. The project ships with a one‑line install script, optional flags for each platform, and supports periodic reviews via loop commands. It is ideal for developers and AI agents who need objective, noise‑free code reviews without the clutter of traditional commentary.","description":"Marko — a grumpy senior code reviewer for Claude Code and Codex. Verdict, concrete gripes, no praise inflation, no suggested fixes.","stars":69,"language":"Shell"},{"owner":"kiwifs","repo":"kiwifs","url":"https://github.com/kiwifs/kiwifs","readme":"<p align=\"center\">\n  <img src=\"kiwifs.png\" alt=\"KiwiFS\" width=\"200\" />\n</p>\n\n<h1 align=\"center\">KiwiFS</h1>\n\n<p align=\"center\">\n  <strong>The knowledge server.</strong>\n</p>\n\n<p align=\"center\">\n  PocketBase for Knowledge — one Go binary, zero config. Obsidian's file-first philosophy. Agents write with <code>cat</code>. Humans read in a wiki. Git versions everything.\n</p>\n\n<p align=\"center\">\n  <a href=\"https://github.com/kiwifs/kiwifs/actions/workflows/ci.yml\"><img src=\"https://github.com/kiwifs/kiwifs/actions/workflows/ci.yml/badge.svg\" alt=\"CI\"></a>\n  <a href=\"LICENSE\"><img src=\"https://img.shields.io/badge/license-BSL--1.1-blue\" alt=\"License: BSL 1.1\"></a>\n  <a href=\"https://github.com/kiwifs/kiwifs\"><img src=\"https://img.shields.io/badge/go-1.25-00ADD8?logo=go&logoColor=white\" alt=\"Go 1.25\"></a>\n  <a href=\"https://github.com/kiwifs/kiwifs\"><img src=\"https://img.shields.io/badge/single_binary-yes-green\" alt=\"Single Binary\"></a>\n  <a href=\"https://github.com/kiwifs/kiwifs\"><img src=\"https://img.shields.io/badge/PRs-welcome-brightgreen\" alt=\"PRs Welcome\"></a>\n</p>\n\n```bash\ncurl -fsSL https://raw.githubusercontent.com/kiwifs/kiwifs/main/install.sh | sh\nkiwifs init ./knowledge && kiwifs serve --root ./knowledge\n# Open http://localhost:3333\n```\n\n---\n\n## The problem\n\nEvery agent memory project gives you **storage**. A database table. A vector index. A key-value store.\n\nBut storage is only one layer. In practice you need:\n\n- **An agent interface** — agents already know `cat`, `grep`, `ls`. They don't need a custom SDK.\n- **A human interface** — someone has to review what the agent wrote. An Obsidian-like UI, not pgAdmin.\n- **An audit trail** — who changed what, when, and why. Cryptographic, not \"trust the vendor.\"\n- **Search** — full-text (BM25) and semantic (vector), over the same files.\n\nNo existing tool does all four. Obsidian has files but no web UI and no agent interface. Confluence has a web UI but your content is trapped in a database. Outline has a web UI but content lives in Postgres. agent-vfs gives you a virtual FS but no UI, no versioning, no search.\n\nKiwiFS is the full stack.\n\n```\nAGENT                              HUMAN\n─────                              ─────\ncat /kiwi/concepts/auth.md         Web UI (like Obsidian Publish\ngrep -r \"timeout\" /kiwi/             + Notion's block editor)\necho \"# Report\" > /kiwi/r.md      wiki links, graph view, search\n\n       ↕                                ↕\n     ┌──────────────────────────────────────┐\n     │         Markdown files in folders    │\n     │         (the single source of truth) │\n     └──────────────────────────────────────┘\n       ↕                ↕              ↕\n    Git versioning   FTS5 + vector   SSE events\n    (audit trail)    (search index)  (live updates)\n```\n\n## Why files, not a database\n\nThis is the core design decision. Every other choice follows from it.\n\n**Files are the only format that is simultaneously human-readable, agent-native, and tool-agnostic.** `cat file.md` works in every shell, every container, every sandbox, every CI pipeline. No driver. No connection string. No SDK. The agent doesn't need to learn your API — it already knows the filesystem from training data.\n\nA Postgres table is invisible to both agents and humans without custom tooling. A JSON blob requires parsing. A proprietary format requires a client library. Markdown files require nothing.\n\nBut raw files alone aren't enough. You need versioning, search, concurrency control, a web UI. KiwiFS layers database-like guarantees **on top of** files:\n\n| Need | How KiwiFS solves it |\n|---|---|\n| **Versioning** | Git — every write is an atomic commit. Crash recovery, blame, diff, point-in-time restore. |\n| **Search** | SQLite FTS5 (BM25 ranked) + pluggable vector search. Rebuildable from files anytime. |\n| **Concurrency** | Optimistic locking via ETags (git blob hash). Standard HTTP `If-Match` / `409 Conflict`. |\n| **Structured queries** | Frontmatter → SQLite `file_meta` table. Query by field, sort, filter. |\n| **Audit trail** | Git commit log. SHA-1 hash chain. Tamper = broken chain. |\n| **Real-time sync** | SSE broadcast on every write/delete. UI updates live. |\n\nThe files are the truth. Everything else is a derivative index you can rebuild.\n\n> **\"I already have this in Postgres.\"**\n>\n> Postgres stores your data. KiwiFS makes it *accessible* — to agents via `cat`/`grep`/NFS/S3, to humans via a web UI with wiki links and graph view, to auditors via `git blame`. If your agent's knowledge lives in Postgres, your humans need a custom UI to review it, your agents need SQL to query it, and you have no audit trail. KiwiFS gives you all three interfaces over the same files.\n\n## The LLM Wiki pattern\n\nKiwiFS implements [Karpathy's LLM Wiki](https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f) as production infrastructure. The pattern: raw sources in, compiled wiki out, agent maintains it over time.\n\n```bash\nkiwifs init --template knowledge\n```\n\n```\nknowledge/\n├── SCHEMA.md          # Agent instructions: ingest, query, lint\n├── index.md           # Auto-maintained table of contents\n├── log.md             # Append-only chronological record\n├── concepts/          # One page per concept (agent-created)\n├── entities/          # One page per named entity\n└── reports/           # Chronological reports\n```\n\nThe agent reads `SCHEMA.md` to understand how to maintain the wiki. Three operations:\n\n- **Ingest** — process a new source, create/update wiki pages, update index + log.\n- **Query** — search the wiki to answer a question.\n- **Lint** — audit for orphan pages, broken links, contradictions, stale content.\n\nOther templates: `wiki`, `
