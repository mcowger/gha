SEvents`/`inotify`/`kqueue`). `data_version` is a monotonic counter incremented by SQLite on every commit by any connection: it handles WAL truncation, clock skew, and rolled-back transactions correctly. Kernel watchers drop same-process writes on macOS, and `stat(2)` on `(size, mtime)` misses commits when the WAL is truncated then grows back to the same size. `PRAGMA data_version` works identically on Linux/macOS/Windows at ~1 ms granularity for negligible CPU. Cost: ~3.5 µs per query, ~3.5 ms/sec total at 1 kHz.\n- Single machine, single writer. SQLite's locking is designed for a single host. Two servers writing one `.db` over NFS will corrupt it. Shard by file, or switch to Postgres.\n\n## Architecture\n\n### Wake path\n\n- One PRAGMA-poll thread per `Database`, queries `data_version` every 1 ms\n- Counter change → fan out a tick to each subscriber's bounded channel\n- Each subscriber runs `SELECT … WHERE id > last_seen` against a partial index, yields rows, returns to wait\n- 100 subscribers = 1 poll thread\n- Idle listeners run zero SQL queries\n\nIdle cost is a single `PRAGMA data_version` query per millisecond per database. Listener count scales for free because the wake signal is a SQLite counter read instead of a polling query.\n\n`SharedWalWatcher` (in `honker-core`) owns the poll thread and fans out to N subscribers via bounded `SyncSender<()>` channels keyed by subscriber id. Each `db.wal_events()` call registers a subscriber and returns a handle whose `Drop` auto-unsubscribes, so a dropped listener causes the bridge thread's `rx.recv() -> Err` and exits cleanly.\n\n### Queue schema\n\n- `_honker_live`: pending + processing rows\n- Partial index: `(queue, priority DESC, run_at, id) WHERE state IN ('pending','processing')`\n- Claim = one `UPDATE … RETURNING` via that index\n- Ack = one `DELETE`\n- Retry-exhausted → `_honker_dead` (never scanned by claim path)\n\nPartial-index on state means the claim hot path is bounded by the *working-set* size rather than the *history* size. A queue with 100k dead rows claims as fast as a queue with zero.\n\n### Claim iterator\n\n- `async for job in q.claim(id)` yields one job at a time via `claim_batch(id, 1)`\n- `Job.ack()` is one `DELETE` in its own transaction. Return is an honest bool: `True` iff the claim was still valid, `False` if the visibility window elapsed and another worker reclaimed.\n- Wakes on any commit to the db from any process; a 5 s paranoia poll is the only fallback.\n\nFor batched work, call `claim_batch(worker_id, n)` directly and ack with `queue.ack_batch(ids, worker_id)`. The library doesn't hide batching behind the iterator. The per-tx cost and the at-most-once visibility semantics are easier to reason about when the API doesn't try to be clever.\n\n### Transactional coupling\n\n- `notify()` is a SQL scalar function registered on the writer connection\n- INSERTs into `_honker_notifications` under the caller's open tx\n- `queue.enqueue(…, tx=tx)` and `stream.publish(…, tx=tx)` do the same\n- Rollback drops the job/event/notification with the rest of the tx\n\nThis is the transactional outbox pattern, by default, without a library to install. Business write and side-effect enqueue commit or roll back together. There is no separate dispatch table and no separate dispatcher process: the side-effect row *is* the committed row, and any process watching the db picks it up within ~1 ms.\n\n### Over-triggering quickly is better than over-triggering from polling\n\n- A `data_version` change wakes *every* subscriber on that `Database`, not just the ones whose channel committed\n- Each wasted wake = one indexed SELECT (microseconds)\n- A missed wake = a silent correctness bug\n\nThe library prefers waking ten listeners that don't care over missing one that does. Channel filtering happens in the `SELECT` path instead of the trigger notification. [Many small queries are efficient in SQLite](https://www.sqlite.org/np1queryprob.html).\n\n### Retention\n\n- Queue jobs persist until ack; retry-exhausted rows move to `_honker_dead`\n- Stream events persist; each named consumer tracks its own offset\n- Notify is fire-and-forget and not auto-pruned\n\nThe caller chooses retention per primitive. `db.prune_notifications(older_than_s=…, max_keep=…)` is a tool you invoke. This keeps retention policy visible in the caller's code instead of inherited from a library default.\n\n## Crash recovery\n\n- Rollback drops jobs/events/notifications with your business write (SQLite ACID).\n- SIGKILL mid-tx is safe. SQLite's atomic-commit rollback on next open leaves no stale state (WAL or rollback journal, depending on mode). Verified in `tests/test_crash_recovery.py` (subprocess killed pre-COMMIT, `PRAGMA integrity_check == 'ok'`, fresh notifies still flow).\n- If a worker crashes mid-job, the claim expires after `visibility_timeout_s` (default 300 s) and another worker reclaims. `attempts` increments. After `max_attempts` (default 3), the row moves to `_honker_dead`.\n- Listeners offline during a prune miss the pruned events. For durable replay, use `db.stream()`, which tracks per-consumer offsets.\n\n## Wiring into your web framework\n\nHonker ships no framework plugins. API is small and the integration is a few lines of glue:\n\n```python\n# FastAPI: enqueue in a request, run workers via lifespan.\n@app.on_event(\"startup\")\nasync def _start_workers():\n    async def worker_loop():\n        async for job in db.queue(\"emails\").claim(\"worker\"):\n            await honker._worker.run_task(\n                job, send_email, timeout=30, retries=3, backoff=2.0\n            )\n    app.state._worker = asyncio.create_task(worker_loop())\n\n@app.post(\"/orders\")\nasync def create_order(order: dict):\n    with db.transaction() as tx:\n        tx.execute(\"INSERT INTO orders (user_id) VALUES (?)\", [order[\"user_id\"]])\n        db.queue(\"emails\").enqueue({\"to\": order[\"email\"]}, tx=tx)\n    return {\"ok\": True}\n```\n\nSSE endpoints are ~30 lines of `async def stream(...): yield f\"data: ...\\n\\n\"` over `db.listen(channel)` or `db.stream(name).subscribe(...)`. For Django/Flask, run the worker as a dedicated CLI process (same pattern as Celery/RQ).\n\n### Using an ORM (SQLAlchemy, Django, Drizzle, ActiveRecord, Ecto, …)\n\nLoad `libhonker_ext` on your ORM's connection and call the SQL functions inside the ORM's own transaction. The enqueue commits atomically with your business write.\n\n```python\n# SQLAlchemy\n@event.listens_for(engine, \"connect\")\ndef _load_honker(conn, _):\n    conn.enable_load_extension(True)\n    conn.load_extension(\"/path/to/libhonker_ext\")\n    conn.execute(\"SELECT honker_bootstrap()\")\n\nwith Session(engine) as s, s.begin():\n    s.add(Order(user_id=42))\n    s.execute(text(\"SELECT honker_enqueue(:q, :p, NULL, NULL, 0, 3, NULL)\"),\n              {\"q\": \"emails\", \"p\": '{\"to\":\"alice@example.com\"}'})\n```\n\nWorkers run as a separate process using `honker.open(\"app.db\")`. The commit watcher wakes on commits from any connection to the file. See [Using with an ORM](https://honker.dev/guides/orm/) for Django, SQLModel, Drizzle, Kysely, sqlx, GORM, ActiveRecord, Ecto, a typed-payload `TypedQueue[T]` wrapper pattern for SQLModel/Pydantic, and the Prisma caveat.\n\n## Performance\n\nHandles thousands of messages per second on a modern laptop, with cross-process wake latency bounded by the 1 ms poll cadence (~1–2 ms median on M-series). Run `bench/wake_latency_bench.py` and `bench/real_bench.py` to measure on your hardware.\n\n## Development\n\nLayout:\n\n```\nhonker-core/              # Rust rlib shared across all bindings (in-tree, published on crates.io)\nhonker-extension/         # SQLite loadable extension (cdylib, published on crates.io)\npackages/\n  honker/                 # Python package (PyO3 cdylib + Queue/Stream/Outbox/Scheduler)\n  honker-node/            # napi-rs Node.js binding           [git submodule]\n  honker-rs/              # ergonomic Rust wrapper            [git submodule]\n  honker-go/              # Go binding                        [git submodule]\n  honker-ruby/            # Ruby binding                      [git submodule]\n  honker-bun/             # Bun binding                       [git submodule]\n  honker-ex/              # Elixir binding                    [git submodule]\n  honker-cpp/             # C++ binding                       [git submodule]\ntests/                    # integration tests (cross-package)\nbench/                    # benches\nsite/                     # honker.dev (Astro)                [git submodule]\n```\n\nEach binding repo is published independently (PyPI / npm / crates.io / Hex / RubyGems) and pinned here as a git submodule; `honker-core` + `honker-extension` live in-tree since they're the shared foundation every binding depends on. Clone with `git clone --recursive` or run `git submodule update --init --recursive` after a normal clone.\n\n```bash\nmake test                   # default: rust + python + node (fast, ~10s)\nmake test-python-slow       # soak + real-time cron tests (~2 min)\nmake test-all               # everything including slow marks\n\nmake build                  # PyO3 maturin develop + loadable extension\n\npython bench/wake_latency_bench.py --samples 500\npython bench/real_bench.py --workers 4 --enqueuers 2 --seconds 15\npython bench/ext_bench.py\n```\n\n### Coverage\n\nOne-time: `make install-coverage-deps` (installs `coverage.py` + `cargo-llvm-cov`).\n\n```bash\nmake coverage               # both HTML reports into coverage/\nmake coverage-python        # honker python paths\nmake coverage-rust          # honker-core Rust unit tests\n```\n\nPython coverage reflects the full honker test suite (~92% of `packages/honker/`). Rust coverage reflects only `cargo test`. Many `honker_ops.rs` paths (`honker_enqueue`, `honker_claim_batch`, etc.) are only exercised via the Python test suite and won't show up in the Rust report. Combined cross-language coverage is non-trivial (LLVM profile-data merging across PyO3 boundaries) and is deferred.\n\n## License\n\nApache 2.0. See [LICENSE](LICENSE).\n","summary":"honker is a SQLite extension and language‑binding suite that brings Postgres‑style `NOTIFY`/`LISTEN` semantics, a durable task queue, and event streams to a single SQLite file, eliminating the need for an external broker. It achieves sub‑millisecond cross‑process notification by polling `PRAGMA data_version` every millisecond, while offering atomic enqueueing with business writes, retries, priorities, delayed tasks, dead‑letter handling, leader‑elected scheduling, rate‑limiting, and durable streams with per‑consumer offsets. The project ships as a Rust crate, a loadable SQLite extension, and thin wrappers for Python, Node.js, Go, Ruby, Elixir, Bun, and more, so any client that can load the extension gains the same features. Developers who ship apps with SQLite as the primary datastore and require pub/sub or background job processing without adding Redis, Celery, or a dedicated message broker will find honker a lightweight, operationally simple solution.","description":"SQLite extension + bindings for Postgres NOTIFY/LISTEN semantics with durable queues, streams, pub/sub, and scheduler","stars":643,"language":"Python"},{"owner":"thClaws","repo":"thClaws","url":"https://github.com/thClaws/thClaws","readme":"# thClaws 🦞\n\n> **Open-source Agent Harness Platform** — a native AI agent workspace that codes, automates, remembers, and coordinates. Runs on your own machine. Sovereign by design.\n\nthClaws is a **native-Rust AI agent workspace** that runs locally on your machine. Not just coding — it edits code, automates workflows, searches your knowledge bases, and coordinates teams of agents, all in one binary. You tell it what you want in natural language; it reads your files, runs commands, uses tools, and talks back to you while it works.\n\n[![License: MIT OR Apache-2.0](https://img.shields.io/badge/license-MIT%20OR%20Apache--2.0-blue.svg)](#license)\n[![Platform: macOS · Windows · Linux](https://img.shields.io/badge/platform-macOS%20·%20Windows%20·%20Linux-lightgrey.svg)](#installation)\n[![Built with Rust](https://img.shields.io/badge/built%20with-Rust-orange.svg)](https://www.rust-lang.org/)\n\n---\n\n## See it work\n\nThree tabs, one binary — captured from a live thClaws session looking at its own source.\n\n<table>\n  <tr>\n    <td width=\"33%\" align=\"center\">\n      <a href=\"docs/img/screen-files.webp\"><img src=\"docs/img/screen-files.webp\" alt=\"thClaws Files tab — landing-page source open in the editor with file tree\" /></a><br/>\n      <strong>Files</strong><br/>\n      <sub>preview · edit · browse — codemirror + tiptap</sub>\n    </td>\n    <td width=\"33%\" align=\"center\">\n      <a href=\"docs/img/screen-terminal.webp\"><img src=\"docs/img/screen-terminal.webp\" alt=\"thClaws Terminal tab — REPL session with ASCII banner\" /></a><br/>\n      <strong>Terminal</strong><br/>\n      <sub>raw REPL · slash commands · ANSI tool output</sub>\n    </td>\n    <td width=\"33%\" align=\"center\">\n      <a href=\"docs/img/screen-chat.webp\"><img src=\"docs/img/screen-chat.webp\" alt=\"thClaws Chat tab — conversational interface answering a product question\" /></a><br/>\n      <strong>Chat</strong><br/>\n      <sub>conversational · markdown render · tool indicators</sub>\n    </td>\n  </tr>\n</table>\n\n---\n\n## Three interfaces, one binary\n\n- **Desktop GUI** (`thclaws`) — a native window with Terminal, Chat, Files, and optional Team tabs.\n- **CLI REPL** (`thclaws --cli`) — an interactive terminal prompt for SSH, headless servers, or when you want zero GUI overhead.\n- **Non-interactive mode** (`thclaws -p \"prompt\"`) — runs a single turn and exits. Handy for scripts, CI pipelines, and shell one-liners.\n\n---\n\n## What makes it different\n\n- **Multi-provider.** Anthropic, OpenAI, Gemini, Alibaba DashScope, OpenRouter, Ollama (local and Anthropic-compatible), Agentic Press, plus a generic **OpenAI-compatible** slot (`oai/*`) for LiteLLM / Portkey / Helicone / vLLM / internal proxies — auto-detected by model name prefix. Switch mid-session with `/model` or swap the whole provider with `/provider`.\n\n- **Any knowledge worker, not just engineers.** Chat tab for researchers, PMs, ops, legal, marketing, finance — natural-language prompts, file access, knowledge-base lookup, drafting. Terminal tab for engineers who want the raw REPL. Same engine, same sessions, same config — different preferred surface.\n\n- **Open standards, not a walled garden.** Built on the conventions the agent-tooling industry is converging on, not bespoke formats you have to learn only for us. [Model Context Protocol](https://modelcontextprotocol.io/) for tool servers. [`AGENTS.md`](https://agents.md) for project instructions — the vendor-neutral standard adopted by Google, OpenAI, Factory, Sourcegraph, and Cursor. `SKILL.md` with YAML frontmatter for packaged workflows. Your configuration is portable between thClaws, other agents that speak the same standards, and whatever comes next.\n\n- **Skills.** Reusable expert workflows packaged as a directory with `SKILL.md` plus optional scripts. The agent picks the right skill automatically when a request matches the `whenToUse` trigger, or you can invoke one explicitly as `/<skill-name>`. Install from a git URL or `.zip` archive with `/skill install`.\n\n- **MCP servers.** Plug in tools built by third parties — GitHub, filesystems, databases, browsers, Slack, and more. Both stdio and HTTP Streamable transports, with OAuth 2.1 + PKCE for protected servers. Add one with `/mcp add` or ship a `.mcp.json` in your project.\n\n- **Plugin system.** Skills + commands + agent definitions + MCP servers bundled under a single manifest, installable from git or `.zip`. One install, one uninstall, one version to pin — ideal for sharing a team's extensions.\n\n- **Memory & project instructions.** Drop an `AGENTS.md` (or `CLAUDE.md`) in your repo — thClaws walks up from `cwd` and injects every match into the system prompt. A persistent memory store holds longer-lived facts the agent has learned about you, classified as `user` / `feedback` / `project` / `reference` and stored as markdown you can read, edit, or commit.\n\n- **Knowledge bases (KMS).** Per-project and per-user wikis the agent can search and read on demand. Drop markdown pages under `.thclaws/kms/<name>/pages/`, give each a one-line entry in `index.md`, and the agent gets a table of contents every turn plus `KmsRead` / `KmsSearch` tools. No embeddings — grep + read, following Andrej Karpathy's LLM-wiki pattern.\n\n- **Agent orchestration.** Delegate subtasks to isolated sub-agents via the `Task` tool — each gets its own tool registry and can recurse up to 3 levels deep. Scale further with **Agent Teams**: multiple thClaws processes coordinating through a shared mailbox and task queue, each in its own tmux pane and optional git worktree. One agent writes your backend while a teammate builds the frontend in parallel, lead merges the branches when both are done.\n\n- **Settings as one file.** Every knob — permission mode, thinking budget, allowed/disallowed tools, provider endpoints, KMS attachments — lives in `.thclaws/settings.json` (project) or `~/.config/thclaws/settings.json` (user). API keys go in the OS keychain by default (macOS Keychain / Windows Credential Manager / Linux Secret Service) with `.env` fallback for CI.\n\n- **Safety first.** A filesystem sandbox scopes file tools to the working directory. Destructive shell commands are flagged before execution. You approve every mutating tool call unless you've opted into auto-approve.\n\n- **Offline-capable.** Ollama (native and Anthropic-compatible) lets you run entirely against a local model — no cloud round-trip, no API key.\n\n- **Deploy what you build.** Ship the landing pages, web apps, APIs, and AI agents you create through [Agentic Press Hosting](https://agentic-press.com) (partnered with SIS Cloud Service and Artech.Cloud) — or any other host you prefer. Schedule agents on cron, respond to webhooks, stream from public URLs. The deploy flow ships as a plugin (`/plugin install …-deploy`), so hosts are swappable; the client never locks you in.\n\n- **Shell escape.** Prefix any REPL line with `!` to run a shell command directly — no tokens, no approval prompt, no agent round-trip (`! git status`, `! ls`, etc.).\n\n---\n\n## Installation\n\n### Pre-built binaries\n\nDownload the latest release for your platform from the [Releases page](https://github.com/thClaws/thClaws/releases) or from [thclaws.ai/downloads](https://thclaws.ai/downloads).\n\nSupported: macOS (Apple Silicon & Intel), Windows (x86_64 & ARM64), Linux (x86_64 & ARM64).\n\n### Build from source\n\n**Prerequisites:** Rust 1.85+, Node.js 20+, pnpm 9+.\n\n```sh\ngit clone https://github.com/thClaws/thClaws.git\ncd thClaws\n\n# Build frontend (React + Vite, bundled as a single HTML file)\ncd frontend && pnpm install && pnpm build && cd ..\n\n# Build Rust (CLI + GUI)\ncargo build --release --features gui --bin thclaws\n\n# Run\n./target/release/thclaws          # GUI\n./target/release/thclaws --cli    # CLI\n./target/release/thclaws -p \"what does src/main.rs do?\"  # one-shot\n```\n\n---\n\n## Quick start\n\n```sh\n# First run: pick a secrets backend (OS keychain or .env) when prompted\nthclaws\n\n# Configure a provider (inside the REPL)\n❯ /provider anthropic\n❯ /model claude-sonnet-4-6\n\n# Or try OpenRouter for 300+ models via one key\n❯ /provider openrouter\n❯ /model openrouter/anthropic/claude-sonnet-4-6\n\n# Drop an AGENTS.md or CLAUDE.md in your repo — it's read automatically\n\n# Useful slash commands\n❯ /help         # list everything\n❯ /models       # list available models for the current provider\n❯ /kms          # list attached knowledge bases\n❯ /skill install https://github.com/anthropics/skills.git\n❯ /mcp add github https://mcp.github.com\n❯ ! git status  # shell escape\n```\n\n---\n\n## Configuration\n\nthClaws reads settings in this precedence order (higher wins):\n\n1. CLI flags\n2. `.thclaws/settings.json` (project)\n3. `~/.config/thclaws/settings.json` (user)\n4. `~/.claude/settings.json` (fallback location)\n5. Compiled-in defaults\n\nOpen-standard files are honored directly:\n\n- `CLAUDE.md` / `AGENTS.md` — system prompt additions, walked up from `cwd`\n- `.thclaws/skills/` / `.claude/skills/` — skill catalog\n- `.thclaws/agents/` / `.claude/agents/` — subagent definitions\n- `.mcp.json` / `.thclaws/mcp.json` — MCP server configuration\n- `.thclaws-plugin/plugin.json` / `.claude-plugin/plugin.json` — plugin manifest\n\nAPI keys are **never stored in config files** — only in the OS keychain (default) or `.env`.\n\n---\n\n## Documentation\n\n- **Official site** — [thclaws.ai](https://thclaws.ai)\n- **Full user manual** — [thclaws.ai/manual](https://thclaws.ai/manual) *(soon)* or the [`user-manual/`](https://github.com/thClaws/user-manual) companion repo. 24 chapters covering every feature plus 7 walkthrough case studies (static site deploy, Node.js reservation site, news-aggregation agent, etc.).\n- [Contributing](CONTRIBUTING.md) — dev setup, PR flow, commit style\n- [Changelog](CHANGELOG.md) — version history\n- [Code of Conduct](CODE_OF_CONDUCT.md) — Contributor Covenant 2.1\n- [Security](SECURITY.md) — vulnerability disclosure\n\nFor books, training, and commercial deployment, see [agentic-press.com](https://agentic-press.com).\n\n---\n\n## Contributors\n\nEvery avatar below has a merged commit in this repo. The roadmap is theirs.\n\n[![Contributors](https://contrib.rocks/image?repo=thClaws/thClaws)](https://github.com/thClaws/thClaws/graphs/contributors)\n\nAuto-generated from the [contributors graph](https://github.com/thClaws/thClaws/graphs/contributors) (refreshes within ~24h of a new merge). Filed a PR or shipped a fix? You'll show up here automatically — no README edit required. For the per-PR attribution of who shipped what, see the entries in [CHANGELOG.md](CHANGELOG.md).\n\n---\n\n## License\n\nDual-licensed under either:\n\n- [MIT License](LICENSE-MIT)\n- [Apache License 2.0](LICENSE-APACHE)\n\nat your option. Contributions are accepted under the same dual license.\n\n---\n\n## About\n\nthClaws is developed by **ThaiGPT Co., Ltd.** and published under a dual MIT/Apache-2.0 license. The client is free and open source forever. Enterprise Edition, hosting, and support are commercial offerings — see [agentic-press.com](https://agentic-press.com) or contact [jimmy@thaigpt.com](mailto:jimmy@thaigpt.com).\n\nBuilt in Thailand. Meant for the world.\n","summary":"thClaws is a native‑Rust AI agent platform that runs entirely locally, enabling users to code, edit files, automate workflows, and coordinate teams of agents from a single binary. It supports multiple LLM providers, plug‑in tools, and a reusable “skill” system discovered from incoming prompts, with interfaces for a desktop GUI, a CLI REPL, or headless execution. Designed for both developers and broader knowledge workers—researchers, PMs, ops, marketing, legal, and finance—it offers natural‑language chat, terminal access, and file‑browsing within a unified session, all while keeping data sovereign on the host machine.","description":"Open-source agent harness platform. Native Rust, multi-provider, runs on your own machine. Sovereign by design.","stars":589,"language":"Rust"},{"owner":"alash3al","repo":"stash","url":"https://github.com/alash3al/stash","readme":"# Stash\n\n**Your AI has amnesia. We fixed it.**\n\nEvery LLM starts every conversation from zero. Stash gives your agent persistent memory — it remembers, recalls, consolidates, and learns across sessions. No more explaining yourself from scratch.\n\nOpen source. Self-hosted. Works with any MCP-compatible agent.\n\n## Quick Start\n\n```bash\ngit clone https://github.com/alash3al/stash.git\ncd stash\ncp .env.example .env   # edit with your API key + model\ndocker compose up\n```\n\nThat's it. Postgres + pgvector, migrations, MCP server with background consolidation — all in one command.\n\n## What It Does\n\nStash is a cognitive layer between your AI agent and the world. Episodes become facts. Facts become relationships. Relationships become patterns. Patterns become wisdom.\n\nAn 8-stage consolidation pipeline turns raw observations into structured knowledge — facts, relationships, causal links, goal tracking, failure patterns, hypothesis verification, and confidence decay. Each stage only processes new data since the last run.\n\nWorks with Claude Desktop, Cursor, Windsurf, Cline, Continue, OpenAI Agents, Ollama, OpenRouter — anything MCP.\n\n## Learn More\n\n**[alash3al.github.io/stash →](https://alash3al.github.io/stash/)**\n\n## License\n\nApache 2.0\n","summary":"Stash adds continuous, self‑hosted persistent memory to language‑model agents, turning every conversation into a shareable knowledge base that survives restarts. It implements an eight‑stage consolidation pipeline that transforms raw observations into facts, relationships, causal links, goal tracking, failure patterns, hypothesis verification, and confidence decay, all processed incrementally with PostgreSQL and pgvector. The framework runs behind an MCP‑compatible server, integrating seamlessly with Claude Desktop, Cursor, Wind­surf, Cline, Continue, OpenAI Agents, Ollama, and OpenRouter. Developers building AI agents who need long‑term context, pattern recognition, or bias‑free learning will find Stash a ready‑to‑deploy cognitive layer for smoother, more intelligent interactions.","description":"Stash — persistent memory layer for AI agents. Episodes, facts, and working context stored in Postgres. MCP server included. Self-hosted, single binary, no cloud required.","stars":469,"language":"Go"},{"owner":"chekusu","repo":"wanman","url":"https://github.com/chekusu/wanman","readme":"# wanman\n\n**English** | [中文](README.zh.md) | [日本語](README.ja.md)\n\nAgent Matrix framework — run a supervised network of Claude Code or Codex agents that collaborate on your machine.\n\nwanman is an open-source local-mode agent matrix framework. Runs a supervised network of Claude Code or Codex agents on your machine, coordinated through a JSON-RPC supervisor.\n\n## About wanman\n\nThe name wanman comes from the Japanese [ワンマン電車 / one-man train](https://en.wikipedia.org/wiki/One-person_operation): a train operated by one driver without a conductor. wanman's design goal is similar in spirit: the human user steps back into an observer role and watches the agent matrix run automatically from every angle.\n\n[wanman.ai](https://wanman.ai/) provides the fully automated 24/7 sandbox edition of wanman, running for free on [Sandbank Cloud](https://cloud.sandbank.dev/)'s sandbox cloud.\n\n## What it does\n\n- Coordinates multiple agents (CEO, dev, devops, marketing, feedback, etc.) through an async message bus with steer/follow-up priorities.\n- Runs each agent as a real Claude Code or Codex CLI subprocess — you bring your own CLI auth, wanman orchestrates spawning, prompting, and lifecycle.\n- Isolates every agent in a per-agent worktree and per-agent `$HOME`, so agents never mutate your dirty checkout or shell profile.\n- Is CLI-first: everything is scriptable, observable, and reproducible through `wanman` commands and a JSON-RPC supervisor.\n\n[wanman.ai](https://wanman.ai/) adds hosted-only capabilities:\n- Isolates each agent runtime group in its own sandbox environment, supporting large-scale, high-concurrency task execution.\n- Dynamically configures agent roles, including automatically extracting roles from high-quality agent role catalogs on the internet.\n- Supports dynamic skill self-evolution.\n- Supports db9-powered global search and story retrieval.\n\n## Quickstart\n\n```bash\n# Prerequisites: Node 20+, pnpm 9+, git, a logged-in Claude Code or Codex CLI.\ngit clone git@github.com:chekusu/wanman.git wanman.dev\ncd wanman.dev\npnpm install\npnpm build\n\n# Run from source; no npm package publish is required.\npnpm --filter @wanman/cli exec wanman takeover /path/to/any/git/repo\n```\n\nIf you want a single-file CLI bundle instead:\n\n```bash\npnpm --filter @wanman/cli standalone\nnode packages/cli/dist/wanman.mjs takeover /path/to/any/git/repo\n```\n\nIf `wanman` is already on your `PATH`, you can also run `wanman takeover .` from inside the target repository.\n\nSee [`docs/quickstart.md`](docs/quickstart.md) for the full walkthrough.\n\n## CLI commands\n\n| Command | What it does |\n|---------|--------------|\n| `wanman send <agent> <msg>` | Send a message to an agent (`--steer` interrupts the target). |\n| `wanman recv [--agent <name>]` | Receive and mark pending messages as delivered. |\n| `wanman agents` | List registered agents and their current states. |\n| `wanman context get` / `context set` | Read or write shared key/value context. |\n| `wanman escalate <msg>` | Escalate to the CEO agent. |\n| `wanman task …` | Manage the task pool: `create`, `list`, `get`, `update`, `done`. Supports `--after` dependencies. |\n| `wanman initiative …` | Manage long-lived initiatives: `create`, `list`, `get`, `update`. |\n| `wanman capsule …` | Manage change capsules: `create`, `list`, `mine`, `get`, `update`. |\n| `wanman artifact …` | Store and retrieve structured artifacts: `put`, `list`, `get`. |\n| `wanman hypothesis …` | Track hypotheses with status transitions: `create`, `list`, `update`. |\n| `wanman watch` | Live-stream supervisor and agent activity. |\n| `wanman run <goal>` | Start a matrix against a one-shot goal. |\n| `wanman takeover <path>` | Take over an existing git repo with the full agent matrix. |\n| `wanman skill:check [path]` | Validate that skill docs reference only real CLI commands. |\n\nRun `wanman --help` for the full, current list.\n\n## Architecture\n\n```\n+----------------+          +--------------------+          +-----------------+\n|  wanman CLI    |  JSON    |  Supervisor        |  spawn   |  Agent process  |\n|  (host shell)  | ---RPC-->|  (local process)   | -------> |  (Claude/Codex) |\n|                |  /rpc    |  message/context/  |          |  per-agent $HOME|\n|                |          |  task/artifact     |          |  per-agent wt   |\n+----------------+          +--------------------+          +-----------------+\n                                    |                              |\n                                    v                              v\n                           +--------------------+        +-----------------+\n                           |  files + SQLite    |        |  worktree       |\n                           +--------------------+        +-----------------+\n```\n\n- `wanman <subcommand>` speaks JSON-RPC 2.0 to a Supervisor process.\n- The Supervisor owns the message store, context store, task pool, artifact store, and spawns one child process per agent.\n- Each agent child is a local Claude Code or Codex subprocess bound to a per-agent worktree and isolated `$HOME`.\n\nDeep dive: [`docs/architecture.md`](docs/architecture.md).\n\n## Configuration\n\n| Env var | Meaning |\n|---------|---------|\n| `WANMAN_URL` | Supervisor HTTP URL for the CLI (default `http://localhost:3120`). |\n| `WANMAN_AGENT_NAME` | Identifies the current agent; used as default sender/receiver inside agent processes. |\n| `WANMAN_RUNTIME` | `claude` (default) or `codex` — selects the per-agent CLI adapter. |\n| `WANMAN_MODEL`, `WANMAN_CODEX_MODEL`, `WANMAN_CODEX_REASONING_EFFORT` | Per-runtime model overrides. |\n| `WANMAN_CODEX_FAST` | When set, biases the Codex adapter toward lower-latency defaults. |\n| `WANMAN_SKILL_SNAPSHOTS_DIR` | Override where the runtime materializes skill-activation snapshots (default: sibling of the shared-skills dir, falling back to `$TMPDIR/wanman-skill-snapshots`). |\n\nAn optional `@sandbank.dev/db9` brain adapter can be attached for cross-run memory — see [`docs/architecture.md`](docs/architecture.md#brain--persistence).\n\n## Agent configs\n\nAgent definitions live in a single JSON file:\n\n```json\n{\n  \"agents\": [\n    { \"name\": \"echo\", \"lifecycle\": \"24/7\", \"model\": \"standard\", \"systemPrompt\": \"...\" },\n    { \"name\": \"ping\", \"lifecycle\": \"on-demand\", \"model\": \"standard\", \"systemPrompt\": \"...\" }\n  ],\n  \"dbPath\": \".wanman/wanman.db\",\n  \"port\": 3120,\n  \"workspaceRoot\": \".wanman/agents\"\n}\n```\n\nEach agent entry has:\n- `name` — unique identifier used on the message bus.\n- `lifecycle` — `24/7` (continuous respawn loop), `on-demand` (idle until triggered), or `idle_cached` (idle until triggered, but the prior Claude `session_id` is preserved across triggers via `claude --resume` so context survives idle periods). **`idle_cached` is Claude-only**: pairing it with `runtime: codex` (or `WANMAN_RUNTIME=codex`) is rejected at startup since Codex has no equivalent resume mechanism in this runtime.\n- `model` — usually an abstract tier (`high` or `standard`); the runtime adapter maps it to Claude or Codex defaults, with environment overrides available.\n- `systemPrompt` — baked-in persona/mission; agents also auto-discover shared skill files at `~/.claude/skills/`.\n- Optional `cron`, `events`, and `tools` fields — see the architecture doc for the full schema.\n\n## Testing\n\n```bash\npnpm typecheck\npnpm test\npnpm exec vitest run --coverage --coverage.reporter=text-summary --coverage.reporter=json-summary --coverage.exclude='**/dist/**'\n```\n\nThe current coverage target is at least 90% line coverage. The latest verified local run reports `Lines: 90.17%`; the machine-readable summary is written to `coverage/coverage-summary.json`.\n\n## Project structure\n\n```\nwanman.dev/\n  packages/\n    cli/                 wanman CLI (send/recv/task/artifact/run/takeover/...)\n    core/                Shared types, JSON-RPC protocol, skills (core/skills/)\n    host-sdk/            Host-side SDK for embedding wanman into other tools\n    runtime/             Supervisor, agent process manager, SQLite stores, adapters\n  docs/                  Architecture and quickstart guides\n```\n\nShared skills shipped today (`packages/core/skills/`):\n- `artifact-naming`, `artifact-quality` — conventions for agent-produced artifacts.\n- `cross-validation` — CEO consistency checks across agent outputs.\n- `research-methodology` — market/data research methodology.\n- `wanman-cli` — CLI command reference consumed by agents at runtime.\n- `workspace-conventions` — file-system conventions inside agent workspaces.\n\n## Further reading\n\n- [Quickstart](docs/quickstart.md) — first-run walkthrough against any git repo.\n- [Architecture](docs/architecture.md) — agent lifecycle, JSON-RPC, stores, adapters.\n- [Contributing](CONTRIBUTING.md) — tests, typecheck, commit conventions.\n\n## License\n\nApache-2.0 — see [LICENSE](LICENSE).\n","summary":"wanman is an open‑source, CLI‑first framework that runs a supervised network of Claude Code or Codex agents on a single machine, orchestrated through a JSON‑RPC supervisor. It coordinates distinct roles—CEO, dev, devops, marketing, etc.—over an asynchronous message bus, spawning each agent in an isolated worktree and `$HOME` to avoid interference with the user’s environment. The framework exposes a rich set of scriptable commands for sending messages, managing tasks, initiatives, capsules, artifacts, hypotheses, and for live‑streaming activity, making it easy to observe and reproduce complex multi‑agent workflows. Developers, engineers, and product teams looking to automate collaborative code generation, testing, and deployment pipelines would benefit most from using wanman.","description":"wanman is an open-source agent matrix runtime inspired by Japanese one-man trains. It lets human users step back into an observer role while local agent runtimes coordinate autonomous multi-agent workflows, task execution, and artifacts.","stars":397,"language":"TypeScript"},{"owner":"deepseek-ai","repo":"TileKernels","url":"https://github.com/deepseek-ai/TileKernels","readme":"# Tile Kernels\n\nOptimized GPU kernels for LLM operations, built with [TileLang](https://github.com/tile-ai/tilelang). TileLang is a domain-specific language for expressing high-performance GPU kernels in Python, featuring easy migration, agile development, and automatic optimization.\n\nMost kernels in this project approach the limit of hardware performance regarding the compute intensity and memory bandwidth. Some of them have already been used in internal training and inference scenarios. However, they do not represent best practices and we are actively working on improving the code quality and documentation.\n\n## Features\n\n- **Gating** — Top-k expert selection and scoring for Mixture of Experts routing\n- **MoE Routing** — Token-to-expert mapping, fused expansion/reduction and weight normalization\n- **Quantization** — Per-token, per-block, and per-channel FP8/FP4/E5M6 casting with fused SwiGLU+quantization ops\n- **Transpose** — Batched transpose operations\n- **Engram** — Engram gating kernels with fused RMSNorm, forward/backward passes and weight gradient reduction\n- **Manifold HyperConnection** — Hyper-connection kernels including Sinkhorn normalization and mix splitting/application\n- **Modeling** — High-level `torch.autograd.Function` wrappers composing low-level kernels into trainable layers (engram gate, mHC pipeline)\n\n## Requirements\n\n- Python 3.10 or higher\n- PyTorch 2.10 or higher\n- TileLang 0.1.9 or higher\n- NVIDIA SM90 or SM100 architecture GPU\n- CUDA Toolkit 13.1 or higher\n\n## Installation\n\n### Install a local development version\n\n```bash\npip install -e \".[dev]\"\n```\n\n### Install a release version\n\n```bash\npip install tile-kernels\n```\n\n## Testing\n\nTests using pytest:\n\n### Test single test file\n\n```bash\npytest tests/transpose/test_transpose.py -n 4 # Correctness only with 4 workers\npytest tests/transpose/test_transpose.py --run-benchmark # Correctness + Benchmarking\n```\n\n### Pressure test\n\n```bash\nTK_FULL_TEST=1 pytest -n 4 --count 2\n```\n\n## Project Structure\n\n```txt\ntile_kernels/\n├── moe/        # Mixture of Experts routing related kernels\n├── quant/      # FP8/FP4/E5M6 quantization\n├── transpose/  # Batched transpose\n├── engram/     # Engram gating kernels\n├── mhc/        # Manifold HyperConnection kernels\n├── modeling/   # High-level autograd modeling layers (engram, mHC)\n├── torch/      # PyTorch reference implementations\n└── testing/    # Test and benchmark utilities\n```\n\n## Acknowledgement\n\nThis project is built on [TileLang](https://github.com/tile-ai/tilelang). Thanks and respect to the developers!\n\n## License\n\nThis code repository is released under [the MIT License](LICENSE).\n\n## Citation\n\n```bibtex\n@misc{tilekernels,\n      title={TileKernels},\n      author={Xiangwen Wang, Chenhao Xu, Huanqi Cao, Rui Tian, Weilin Zhao, Kuai Yu and Chenggang Zhao},\n      year={2026},\n      publisher = {GitHub},\n      howpublished = {\\url{https://github.com/deepseek-ai/TileKernels}},\n}\n```\n","summary":"TileKernels delivers highly optimized GPU kernels for large‑scale language‑model workloads, built with the TileLang domain‑specific language for efficient development and automatic tuning. It includes modules for MoE routing, top‑k expert gating, per‑token and per‑block FP8/FP4/E5M6 quantization, batched transposes, Engram gating, and manifold hyper‑connection operations, along with PyTorch‑compatible autograd wrappers that expose these kernels as trainable layers. The library is aimed at ML researchers and practitioners who need near‑hardware‑level performance for training and inference on NVIDIA GPUs, especially those working with mixture‑of‑experts, quantized models, or custom LLM architectures.","description":"A kernel library written in tilelang","stars":1304,"language":"Python"},{"owner":"hiteshchoudhary","repo":"gitbackup","url":"https://github.com/hiteshchoudhary/gitbackup","readme":"# GitBackup\n\nA desktop application to back up all your GitHub repositories locally and optionally to cloud storage (AWS S3 / Cloudflare R2).\n\n![Electron](https://img.shields.io/badge/Electron-35-47848F?logo=electron&logoColor=white)\n![React](https://img.shields.io/badge/React-19-61DAFB?logo=react&logoColor=white)\n![TypeScript](https://img.shields.io/badge/TypeScript-5-3178C6?logo=typescript&logoColor=white)\n![License](https://img.shields.io/badge/License-MIT-green)\n\n## Features\n\n- **One-click GitHub backup** — Enter your Personal Access Token and back up all repositories with full code and branches\n- **Smart incremental updates** — First run clones everything; subsequent runs only fetch changes\n- **Flexible repo selection** — Filter by owned, organization, starred, forked, or collaborator repositories\n- **Cloud storage support** — Upload compressed `.tar.gz` archives to AWS S3 or Cloudflare R2\n- **Scheduled backups** — Set daily, weekly, or monthly automatic backups with system tray support\n- **Rate limit aware** — Handles GitHub API pagination and rate limits for accounts with 200-300+ repos\n- **Concurrent processing** — Configurable parallelism (1-10 repos at a time) for faster backups\n- **Real-time progress** — Detailed per-repo status tracking with live log viewer\n- **Secure** — Token stored encrypted locally, cleaned from git remote URLs after operations\n\n## Screenshots\n\n### Setup\nConfigure your GitHub token, backup folder, and optional cloud storage with a guided setup flow.\n\n### Repositories\nBrowse and select repositories with filters for owned, org, starred, forked, and collaborator repos.\n\n### Backup\nMonitor real-time progress with per-repo status, progress bars, and a detailed log viewer.\n\n## Download\n\nDownload the latest version for your platform from the [Releases](https://github.com/hiteshchoudhary/gitbackup/releases/latest) page.\n\n| Platform | File | Notes |\n|----------|------|-------|\n| **macOS** | `GitBackup-x.x.x.dmg` | Open the `.dmg` and drag GitBackup to Applications. On first launch, right-click → Open to bypass Gatekeeper. |\n| **Windows** | `GitBackup-Setup-x.x.x.exe` | Run the installer. Windows Defender may show a warning — click \"More info\" → \"Run anyway\". |\n| **Linux** | `GitBackup-x.x.x.AppImage` | Make it executable: `chmod +x GitBackup-*.AppImage` then run it. |\n\n> **Prerequisite:** [Git](https://git-scm.com/) must be installed on your system. GitBackup uses it to clone and update repositories.\n\n### Creating a GitHub Token\n\nYou'll need a Personal Access Token to connect your account:\n\n1. Go to [github.com/settings/tokens](https://github.com/settings/tokens)\n2. Click **Personal access tokens** → **Tokens (classic)**\n3. Click **Generate new token (classic)**\n4. Select scopes: `repo` (full access) and `read:org` (for org repos)\n5. Click **Generate token** and paste it into the app\n\nFine-grained tokens also work — grant **Repository access → All repositories**.\n\n## Building from Source\n\n### Prerequisites\n\n- [Node.js](https://nodejs.org/) 18+\n- [Git](https://git-scm.com/) installed and available in PATH\n\n### Installation\n\n```bash\ngit clone https://github.com/hiteshchoudhary/gitbackup.git\ncd gitbackup\nnpm install\n```\n\n### Development\n\n```bash\nnpm run dev\n```\n\nThis starts the Vite dev server with hot reload and launches the Electron app.\n\n### Build & Package\n\n```bash\n# Build for current platform\nnpm run package\n\n# Platform-specific builds\nnpm run package:mac\nnpm run package:win\nnpm run package:linux\n```\n\nPackaged apps are output to the `release/` directory.\n\n## How It Works\n\n1. **Authenticate** — Paste your GitHub PAT. The app validates it and fetches your account info.\n2. **Select repos** — Choose filters (owned, org, starred, etc.) and fetch your repository list. Select which repos to back up.\n3. **Choose backup folder** — Pick a local directory. Repos are cloned as `owner/repo-name/` with all branches.\n4. **Configure cloud (optional)** — Add AWS S3 or Cloudflare R2 credentials. Each repo is archived as an individual `.tar.gz` and uploaded.\n5. **Run backup** — Click Start. The app clones new repos and fetches updates for existing ones, compresses archives, and uploads to cloud — all with configurable concurrency.\n6. **Schedule (optional)** — Set up daily/weekly/monthly automatic backups. The app runs in the system tray.\n\n## Project Structure\n\n```\ngitbackup/\n├── electron/                    # Main process (Node.js)\n│   ├── main.ts                  # App window, tray, lifecycle\n│   ├── preload.ts               # Secure IPC bridge\n│   ├── tray.ts                  # System tray\n│   ├── ipc/                     # IPC handlers\n│   ├── services/\n│   │   ├── github.service.ts    # GitHub API (Octokit)\n│   │   ├── git.service.ts       # Clone & update repos\n│   │   ├── compress.service.ts  # tar.gz archiving\n│   │   ├── cloud.service.ts     # S3/R2 uploads\n│   │   ├── backup-orchestrator.ts  # Core backup pipeline\n│   │   └── scheduler.service.ts    # Cron scheduling\n│   └── store/store.ts           # Encrypted settings\n├── src/                         # Renderer process (React)\n│   ├── pages/                   # Setup, Repos, Backup, Settings\n│   ├── components/              # UI components\n│   └── hooks/                   # IPC & state hooks\n└── resources/                   # App icons\n```\n\n## Tech Stack\n\n| Layer | Technology |\n|-------|-----------|\n| Framework | Electron 35 |\n| Frontend | React 19 + Tailwind CSS |\n| Language | TypeScript 5 |\n| Bundler | Vite 8 |\n| GitHub API | @octokit/rest |\n| Git | simple-git |\n| Cloud | AWS SDK v3 (S3-compatible, works with R2) |\n| Storage | electron-store (encrypted) |\n| Scheduling | node-cron |\n| Packaging | electron-builder |\n\n## Configuration\n\nAll settings are persisted locally in encrypted storage. No data is sent to any third-party service other than GitHub API and your configured cloud storage.\n\n| Setting | Description |\n|---------|-------------|\n| GitHub Token | PAT with `repo` + `read:org` scopes |\n| Backup Path | Local directory for cloned repos |\n| Cloud Provider | None, AWS S3, or Cloudflare R2 |\n| Schedule | Daily / Weekly / Monthly + time |\n| Concurrency | 1-10 parallel repo operations |\n\n## License\n\nMIT\n\n---\n\nA [chaicode.com](https://chaicode.com) product\n","summary":"GitBackup is a cross‑platform desktop application that lets users quickly clone and archive all of their GitHub repositories—including every branch—locally and optionally to cloud services such as AWS S3 or Cloudflare R2. The app offers one‑click backups, smart incremental updates, granular repository filtering (owned, org, starred, forked, collaborator), scheduled runs, rate‑limit‑aware pagination, and configurable parallelism, while displaying live per‑repo progress and logs. Securely stores the Personal Access Token in encrypted form and cleans it from Git remote URLs after use. Developers, DevOps engineers, and teams who need reliable, automated backups of their codebases to a local or cloud archive will find this tool especially valuable.","description":"It was personal script but now it is a complete desktop application to take backup of your github account","stars":253,"language":"TypeScript"},{"owner":"actuallyepic","repo":"background-computer-use","url":"https://github.com/actuallyepic/background-computer-use","readme":"# BackgroundComputerUse\n\nLocal macOS computer-use API for controlling native apps, browser windows, and multi-window desktop workflows without taking over the user's pointer.\n\nThe runtime exposes a loopback HTTP API, reads window screenshots and Accessibility state, and dispatches clicks, scrolling, text, key presses, secondary actions, and window motion against target windows. It uses macOS Accessibility, Screen Recording, and native/private window-event APIs.\n\nAt rough parity with OpenAI Codex Computer Use plugin \n\n[![BackgroundComputerUse demo](cover.png)](https://youtu.be/RmB5Ontqb3Y)\n\n[Watch the demo](https://youtu.be/RmB5Ontqb3Y)\n\n## Start\n\n```bash\n./script/start.sh\n```\n\nThe script builds the Swift package, creates/signs a `.app` bundle, installs it to `~/Applications/BackgroundComputerUse.app`, launches it, waits for the runtime manifest, prints the active local URL, and calls `/v1/bootstrap`.\n\nRuntime metadata is written to:\n\n```text\n$TMPDIR/background-computer-use/runtime-manifest.json\n```\n\nThe manifest includes `baseURL`, permission status, bootstrap instructions, and route summaries. Agents should read this file instead of assuming a fixed port.\n\n## Signing And Permissions\n\nSince the app requires accessibility + screenshot permissions, you need to sign (self-sign ok) the app after building \n\nmacOS permissions attach to the signed app bundle, not to an arbitrary command-line binary. Launch development builds through:\n\n```bash\n./script/start.sh\n```\n\nor:\n\n```bash\n./script/build_and_run.sh run\n```\n\nIf no signing identity is configured, `script/build_and_run.sh` calls `script/bootstrap_signing_identity.sh` to create a local development code-signing identity in:\n\n```text\n~/Library/Keychains/background-computer-use-dev.keychain-db\n```\n\nYou can override signing with:\n\n```bash\nBACKGROUND_COMPUTER_USE_SIGNING_IDENTITY=\"Developer ID Application: ...\"\n./script/start.sh\n```\n\nIf `/v1/bootstrap` reports missing permissions, grant them in System Settings and relaunch the app through the script.\n\n## Swift Package Usage\n\nThe package also exposes a direct Swift API for callers that do not need the loopback server:\n\nDepend on the `BackgroundComputerUseKit` library product, then import the `BackgroundComputerUse` module:\n\n```swift\nimport BackgroundComputerUse\n\nlet runtime = BackgroundComputerUseRuntime()\nlet apps = runtime.listApps()\nlet windows = try runtime.listWindows(.init(app: \"Safari\"))\n```\n\nDirect package calls default to `visualCursor: .disabled`, so action methods do not start the virtual cursor overlay or wait for cursor animation before dispatching. Existing action verification and post-action rereads still run.\n\nTarget factories validate the same shape as the HTTP JSON decoder and throw for invalid display indexes or empty node identifiers.\n\nEnable the visual cursor explicitly when you want the same cursor choreography used by the app runtime:\n\n```swift\nlet runtime = BackgroundComputerUseRuntime(\n    options: .init(visualCursor: .enabled)\n)\n```\n\nmacOS permissions attach to the signed host application. The bundled HTTP runtime keeps using the stable `xyz.dubdub.backgroundcomputeruse` app identity from `script/build_and_run.sh`; direct package consumers should use their own stable signed app identity if they need Accessibility or Screen Recording permissions.\n\n## API Flow\n\n1. `GET /v1/bootstrap`\n2. Check `permissions` and `instructions.ready`.\n3. `GET /v1/routes`\n4. `POST /v1/list_apps`\n5. `POST /v1/list_windows`\n6. `POST /v1/get_window_state`\n7. Act with `/v1/click`, `/v1/scroll`, `/v1/type_text`, `/v1/press_key`, `/v1/set_value`, `/v1/perform_secondary_action`, `/v1/drag`, `/v1/resize`, or `/v1/set_window_frame`.\n8. Read state again.\n\nFor visual work, request screenshots with `imageMode: \"path\"` or `imageMode: \"base64\"` and inspect them whenever possible. The AX tree is useful for semantic targeting, but screenshots are the visual ground truth; AX state and verifier summaries can lag, omit visual-only state, or be incomplete in some apps.\n\n## Routes\n\n`GET /v1/routes` is the self-documenting API catalog. It returns each route's method, path, summary, request schema, and response schema.\n\nAction responses omit verbose implementation `notes` by default. Add `\"debug\": true` to action requests when you want transport/planner notes for debugging.\n\nCore routes:\n\n- `GET /health`\n- `GET /v1/bootstrap`\n- `GET /v1/routes`\n- `POST /v1/list_apps`\n- `POST /v1/list_windows`\n- `POST /v1/get_window_state`\n- `POST /v1/click`\n- `POST /v1/scroll`\n- `POST /v1/perform_secondary_action`\n- `POST /v1/drag`\n- `POST /v1/resize`\n- `POST /v1/set_window_frame`\n- `POST /v1/type_text`\n- `POST /v1/press_key`\n- `POST /v1/set_value`\n\n## Minimal Curl\n\n```bash\nBASE=\"$(python3 - <<'PY'\nimport json, os\npath = os.path.join(os.environ[\"TMPDIR\"], \"background-computer-use\", \"runtime-manifest.json\")\nprint(json.load(open(path))[\"baseURL\"])\nPY\n)\"\n\ncurl -s \"$BASE/v1/bootstrap\" | python3 -m json.tool\ncurl -s \"$BASE/v1/routes\" | python3 -m json.tool\ncurl -s -X POST \"$BASE/v1/list_apps\" -H 'content-type: application/json' -d '{}' | python3 -m json.tool\n```\n\n## State And Actions\n\nRead a window:\n\n```bash\ncurl -s -X POST \"$BASE/v1/list_windows\" \\\n  -H 'content-type: application/json' \\\n  -d '{\"app\":\"Safari\"}' | python3 -m json.tool\n\ncurl -s -X POST \"$BASE/v1/get_window_state\" \\\n  -H 'content-type: application/json' \\\n  -d '{\"window\":\"WINDOW_ID\",\"imageMode\":\"path\",\"maxNodes\":6500}' | python3 -m json.tool\n```\n\nClick by semantic target:\n\n```bash\ncurl -s -X POST \"$BASE/v1/click\" \\\n  -H 'content-type: application/json' \\\n  -d '{\"window\":\"WINDOW_ID\",\"target\":{\"kind\":\"display_index\",\"value\":12},\"clickCount\":1,\"imageMode\":\"path\"}' | python3 -m json.tool\n```\n\nClick by screenshot coordinate:\n\n```bash\ncurl -s -X POST \"$BASE/v1/click\" \\\n  -H 'content-type: application/json' \\\n  -d '{\"window\":\"WINDOW_ID\",\"x\":240,\"y\":180,\"clickCount\":2,\"imageMode\":\"path\"}' | python3 -m json.tool\n```\n\nType into a text target:\n\n```bash\ncurl -s -X POST \"$BASE/v1/type_text\" \\\n  -H 'content-type: application/json' \\\n  -d '{\"window\":\"WINDOW_ID\",\"target\":{\"kind\":\"display_index\",\"value\":4},\"text\":\"hello\",\"focusAssistMode\":\"focus_and_caret_end\",\"imageMode\":\"path\"}' | python3 -m json.tool\n```\n\nUse the optional `cursor` object on action routes to show an on-screen agent cursor:\n\n```json\n{\"id\":\"agent-1\",\"name\":\"Agent\",\"color\":\"#20C46B\"}\n```\n\nCursors are session-based. Reuse the same `cursor.id` across related actions to move the same on-screen cursor continuously; use different IDs for independent agents or lanes.\n\n## License\n\nMIT\n\n---\n\ncrafted by [cam](https://x.com/financialvice) and [anupam](https://x.com/anupambatra_) | [dubdubdub labs](https://www.dubdubdub.xyz/)\n","summary":"BackgroundComputerUse is a macOS framework that exposes a local HTTP API for controlling native applications, browser windows, and desktop workflows without commandeering the user’s mouse. It utilizes Accessibility, Screen Recording, and native window‑event APIs to capture screenshots, query the accessibility tree, and execute actions such as clicks, scrolling, typing, key presses, window drag/resize, and other window commands through JSON endpoints. The package also offers a direct Swift API for developers who prefer programmatic access without the HTTP layer. Designers, automation engineers, and AI agents that need reliable, visual‑based computer interaction on macOS would find this tool most useful.","description":null,"stars":159,"language":"Swift"},{"owner":"nakagami","repo":"grdpwasm","url":"https://github.com/nakagami/grdpwasm","readme":"# grdpwasm\n\nA web-based RDP client built with Go WebAssembly and [grdp](https://github.com/nakagami/grdp).\nConnect to a Windows Remote Desktop server directly from your browser — no plugins required.\n\n## Architecture\n\n```\nBrowser (WASM) ──WebSocket──► proxy (Go) ──TCP──► RDP Server\n```\n\nBecause browsers cannot open raw TCP sockets, a lightweight Go proxy server bridges\nWebSocket connections from the browser to the RDP server's TCP port.\n\n## Requirements\n\n- Go 1.24 or later\n- A reachable RDP server (Windows or any RDP-compatible host)\n\n## Build\n\n```bash\ngit clone https://github.com/nakagami/grdpwasm.git\ncd grdpwasm\nmake all\n```\n\n`make all` produces:\n\n| Output | Description |\n|---|---|\n| `static/main.wasm` | Go WASM binary (runs in the browser) |\n| `static/wasm_exec.js` | Go runtime JS support file |\n| `proxy/proxy` | WebSocket-to-TCP proxy + static file server |\n\n## Run\n\n```bash\nmake serve\n# or equivalently:\n./proxy/proxy -listen :8080 -static static\n```\n\nThen open **http://localhost:8080** in your browser.\n\n### Proxy options\n\n| Flag | Default | Description |\n|---|---|---|\n| `-listen` | `:8080` | Address and port to listen on |\n| `-static` | `static` | Directory to serve static files from |\n\n## Usage\n\n1. Open `http://localhost:8080` in a browser.\n2. Fill in the connection form:\n   - **Host** — hostname or IP address of the RDP server\n   - **Port** — RDP port (default `3389`)\n   - **Domain** — Windows domain (leave blank for local accounts)\n   - **User** — username\n   - **Password** — password\n   - **Width / Height** — initial desktop resolution\n3. Click **Connect**.\n4. The remote desktop appears in the canvas. Click the canvas to capture keyboard focus.\n5. Click **Disconnect** to end the session.\n\n## Keyboard & Mouse\n\nAll standard keyboard input is forwarded to the remote desktop via RDP scan codes.\nMouse move, button clicks, and scroll wheel are fully supported.\n\n> **Note:** The browser tab must have focus for keyboard events to be forwarded.\n> Click inside the canvas area if keys stop responding.\n\n## Audio\n\nRemote audio is streamed via RDPSND and played through the browser's Web Audio API\n(PCM 44100 Hz, stereo, 16-bit signed little-endian).\n\n## Security notes\n\n- The proxy accepts connections from any origin. Run it only on a trusted network\n  or add authentication before exposing it to the internet.\n- Credentials are transmitted from the browser to the proxy over WebSocket.\n  Use HTTPS/WSS (put the proxy behind a TLS-terminating reverse proxy such as\n  nginx or Caddy) when accessing it over an untrusted network.\n\n## Development\n\n```\nmake wasm       # rebuild only the WASM binary\nmake proxy      # rebuild only the proxy server\nmake wasm_exec  # refresh wasm_exec.js from the local Go toolchain\nmake clean      # remove all build artifacts\n```\n\n## License\n\nGPLv3 — see [grdp LICENSE](https://github.com/nakagami/grdp/blob/master/LICENSE).\n","summary":"grdpwasm is a browser‑based Remote Desktop Protocol client written in Go using WebAssembly, allowing users to connect to Windows or other RDP servers directly from a web page without any plugins. It runs a Go WebSocket proxy that bridges the browser to the RDP server’s TCP port, supporting full keyboard, mouse, and audio routing via the Web Audio API. The client exposes a simple form for specifying host, port, domain, user, password, and screen size, making it easy to launch a remote session in any modern browser. It is ideal for developers, IT administrators, or anyone who needs quick, secure remote desktop access from the web, especially when running in trusted internal networks or behind a TLS‑terminating reverse proxy.","description":null,"stars":231,"language":"Go"},{"owner":"machinarii","repo":"hypervibe","url":"https://github.com/machinarii/hypervibe","readme":"<img src=\"banner.png\" alt=\"HyperVibe — a walkie-talkie for Claude Code\">\n\n# HyperVibe V0.1\n\nOne-handed vibe coding using Apple TV remote, customizable buttons and gestures.\n\nGrab a remote, push to talk, and vibe-code with Claude Code without breaking flow.\n\n<img src=\"demo.gif\" alt=\"HyperVibe demo\" width=\"70%\">\n\nTested with the 1st-gen Siri Remote (Model A1513). Support for Xbox Adaptive Joystick coming soon.\n\n> **Experimental release.** For now, HyperVibe ships as an experiment — there is no pre-built binary. You'll have to build the app bundle yourself (see [Building](#building)). Your mileage may vary.\n\n---\n\n## Features\n\n### Buttons\n\nEach physical Siri Remote button is independently assignable via the menu bar.\n\n<img src=\"siri-remote-button-mapping-default.png\" alt=\"Default Siri Remote button mapping\" width=\"50%\">\n\n<img src=\"screenshot-button-mapping.png\" alt=\"Button Mappings menu screenshot\" width=\"70%\">\n\n**Default Button Mapping (Customizable):**\n- Menu → Esc\n- TV → Ctrl + C\n- Siri → Space (Claude voice dictation)\n- Play/Pause → Enter\n- Volume Up → Up arrow\n- Volume Down → Down arrow\n\n| Action | Behavior |\n|---|---|\n| Play/pause button | Enter (submit prompt) |\n| Volume up button | Up arrow |\n| Volume down button | Down arrow |\n| Menu button | Esc (Navigate back) |\n| TV button | Control + C (cancel prompt) |\n| Trackpad click | Left mouse click |\n| Siri/mic button | Space on hold (Claude voice dictation must be enabled) |\n\n**Hold-Capable Buttons:** Push-to-talk actions require buttons that emit both press and release HID events. Only Play/Pause, Volume Up, Volume Down, and Siri buttons allow for both events. Also this button can trigger right command or option key for other dictation apps like [VoiceInk](https://github.com/Beingpax/VoiceInk).\n\n\n### Swipe Gestures\n\nFour independently configurable single-finger swipe directions on the trackpad surface. Detection is velocity-gated: **distance ≥ 35%** of trackpad, **duration < 350 ms**, **dominant axis ≥ 2×** the other. Slow drags continue to move the cursor; only deliberate flicks trigger actions.\n\n<img src=\"siri-remote-gesture-mapping.png\" alt=\"Siri Remote swipe gesture mapping\" width=\"50%\">\n\n<img src=\"screenshot-swipe-mapping.png\" alt=\"Swipe Gestures menu screenshot\" width=\"70%\">\n\n**Default Gesture Mapping (Customizable):**\n- Swipe Up → `/usage`\n- Swipe Down → `/compact`\n- Swipe Left → `/model`\n- Swipe Right → Mode Switching (Shift + Tab)\n\nAssignable actions:\n\n- **Arrow keys (direction-matched)**: \"Left: Navigate Left\" offered only on Swipe Left; \"Right: Navigate Right\" offered only on Swipe Right.\n- **Mode Switching (Shift + Tab)** — toggle between normal / plan / auto-accept modes in Claude Code.\n- **`ultrathink`** — inserts the keyword (with trailing space) into the prompt.\n- **Slash commands**: `/btw`, `/compact`, `/config`, `/context`, `/effort`, `/init`, `/model`, `/remote-control`, `/schedule`, `/tasks`, `/usage`.\n- **None**.\n\n**Trailing-space policy.** Commands that typically take an argument (`/btw`, `/schedule`, `ultrathink`) are typed with a trailing space so you can keep typing. Commands that stand alone or open an interactive picker (`/compact`, `/config`, `/context`, `/effort`, `/init`, `/model`, `/remote-control`, `/tasks`, `/usage`) are typed without a trailing space.\n\n**Enter is never sent** — gestures type the command but leave Enter for the user, so the command can be reviewed, edited, or augmented with arguments.\n\n### Other Trackpad Inputs\n\n- **Cursor movement** via single-finger drag\n- **Two-finger scroll** (natural-scroll direction, configurable scale)\n- **Tap-to-click** on the trackpad surface\n- **Drag** by holding the trackpad click and moving\n\n### Persistence\n\nButton mappings and swipe mappings are saved to UserDefaults (`buttonMappings`, `swipeMappings`) and survive restarts. Schema versioning handles future upgrades (`buttonMappingsSchema`).\n\n### Safety\n\n- **Stuck-key prevention.** If the remote disconnects while a push-to-talk key is held, HyperVibe releases the virtual key automatically.\n- **Stale-hold self-heal.** If a release HID event is ever missed, the next press closes the stale hold before opening a new one.\n- **HID seize.** On connect, HyperVibe seizes the remote at the HID level so macOS no longer also sees media key events from it — no double-dispatch (e.g., to iTunes/Music), no system funk sound on unhandled keys.\n\n---\n\n## Building\n\n### Prerequisites\n\n- macOS 11 (Big Sur) or later\n- Xcode Command Line Tools: `xcode-select --install`\n\n### Build\n\n```bash\n./build.sh\n```\n\nThis runs a single `swiftc` invocation over all the project's Swift files, linking IOKit, CoreGraphics, AudioToolbox, Carbon, AppKit, and the private MultitouchSupport framework via a bridging header. No Xcode project is required.\n\n---\n\n## Installing and Running\n\n1. Build and bundle: `./build.sh && ./create_app_bundle.sh`\n2. Move `HyperVibe.app` to `/Applications` (optional but helps icon caching)\n3. Launch it (`open HyperVibe.app`)\n4. Grant permissions in **System Settings → Privacy & Security**:\n   - **Accessibility** (for posting keyboard/mouse events)\n   - **Input Monitoring** (for reading HID events)\n   - **Bluetooth** (to communicate with the remote)\n5. Pair the Siri Remote via **System Settings → Bluetooth** if it isn't already paired\n6. Use the menu-bar walkie-talkie glyph to access Button Mappings and Swipe Gestures\n\n> ⚠️ **Important:** You must explicitly add **HyperVibe.app** to **System Settings → Privacy & Security → Input Monitoring** (click the **+** button and select the app). Without this, HyperVibe may not properly intercept HID events/media keys, which means vol up and down buttons and play/pause buttons will trigger volume change and triggering of Apple Music.\n\nA diagnostic log is written to `/tmp/hypervibe.log` (NSLog is redacted under hardened runtime, so HyperVibe uses file-based logging).\n\n---\n\n### Why two paths for the same button?\n\nA physical Siri Remote press can arrive two ways:\n\n1. **HID (seized)** — `RemoteInputHandler` reads raw HID input.\n2. **AVRCP → NX_SYSDEFINED** — Bluetooth media-key events `MediaKeyInterceptor` catches via an event tap.\n\nBoth paths converge on the same button mapping through a 200 ms debounce (static `lastProcessedButton`/`lastProcessedTime` on `RemoteInputHandler`), so a press fires the mapped action exactly once regardless of which path delivers it first.\n\n### The NX_SYSDEFINED hack (media keys)\n\nmacOS has no public API for synthesizing or intercepting media keys (Play/Pause, Next, Previous, Volume, Mute). Both `MediaKeyInterceptor` and `MediaController` rely on the same undocumented `NSSystemDefined` event format used internally by the Human Interface Device stack:\n\n- **Event type** `NX_SYSDEFINED` (raw value `14`) with **subtype `8`**.\n- **Key code and state packed into `data1`** as a bitfield: `(nxKeyCode << 16) | (keyState << 8)`, where `0xA` = key down and `0xB` = key up.\n- **Magic `modifierFlags`** (`0xa00` for down, `0xb00` for up) mirror the state nibble — real media key events arrive with these flags, and some consumers (e.g. Music.app) won't accept posted events without them.\n\n`MediaKeyInterceptor` installs a **`.cghidEventTap`** at `.headInsertEventTap` so it sees `NX_SYSDEFINED` events *before* the system dispatcher routes them to Music/iTunes/etc. — a session-level tap would arrive too late. It then manually unpacks `data1` to recover the key code and down/up state. The tap is automatically re-enabled on `tapDisabledByTimeout`, `tapDisabledByUserInput`, and `NSWorkspace.didWakeNotification`, because macOS silently disables event taps across sleep/wake and input stalls.\n\n`MediaController` goes the other way: it **fabricates** matching `NSSystemDefined` events via `NSEvent.otherEvent(...)` with the same magic flags, subtype, and `data1` packing, then posts the underlying `CGEvent` to the session tap. A **`usleep(50_000)`** gap between the down and up events is required — without the 50 ms pause, macOS coalesces or drops the pair and the media key is ignored.\n\nThis is the standard reverse-engineered technique (originally surfaced in projects like SPMediaKeyTap and Noteify), but it is entirely undocumented and can change without notice in any macOS release.\n\n---\n\n## Caveats\n\n- Uses Apple's **private `MultitouchSupport` framework** — not App Store compatible; Apple may change or remove this API in future macOS releases.\n- **NX_SYSDEFINED media-key synthesis and interception is undocumented** — relies on magic modifier-flag values (`0xa00`/`0xb00`), subtype `8`, and a manual `data1` bitfield layout. Apple could break this in any release.\n\n### Long-term direction: Xbox Adaptive Joystick\n\nBetween the private `MultitouchSupport` framework and the undocumented `NX_SYSDEFINED` plumbing, the Siri Remote path is built on two proprietary, reverse-engineered interfaces that Apple can break at any time. HyperVibe may migrate its primary input to the **Xbox Adaptive Joystick**, which speaks standard USB HID / GameController.framework and avoids every proprietary hazard above. That gives a more permanent, App Store–viable foundation — and, as a bonus, a genuinely accessible input device — while the Siri Remote support remains as a best-effort path for users who already own one.\n- Tested on **Siri Remote 1st-gen (A1513, product ID `0x266`)**. Button HID codes are a superset likely to cover the 2nd-gen Siri Remote (A2540) as well, but its click-ring directional presses and dedicated Mute button are not yet mapped in `identifyButton`.\n- Ad-hoc signing ties TCC permission grants to the exact binary hash — rebuilds may require re-approval in System Settings.\n\n---\n\n## Credits\n\n **Fork & improvements.** HyperVibe is built on top of [Remotastic](https://github.com/lauschue/Remotastic) by [@lauschue](https://github.com/lauschue), which provided the foundational Siri-Remote HID handling, MultitouchSupport integration, and menu-bar scaffolding. HyperVibe extends it with configurable Claude Code workflows, keyboard shortcuts, push-to-talk and swipe gesture.\n- Icons from [The Noun Project](https://thenounproject.com/):\n  - [Arrow Up by Dayeong Kim](https://thenounproject.com/icon/arrow-up-6066125/)\n  - [Microphone by Alvida](https://thenounproject.com/icon/microphone-8162320/)\n  - [Radio by Kiran Shastry](https://thenounproject.com/icon/radio-2338991/)","summary":"HyperVibe turns an Apple TV remote into a one‑handed “vibe‑coding” interface for Claude Code, letting users push‑to‑talk and type directly from the Siri Remote’s buttons and trackpad. It offers fully assignable button shortcuts, velocity‑based swipe gestures that insert slash commands or switch modes, and native cursor control via the remote’s trackpad, with all mappings persisted in UserDefaults. The app is perfect for developers who want to keep both hands free while coding or dictating, or for users of voice‑driven AI tools who prefer a compact hardware controller. HyperVibe is still experimental and requires building from source, but it already supports the first‑generation Siri Remote and will soon add Xbox Adaptive Joystick support.","description":"One-handed vibe coding using Apple TV Remote, customizable buttons and gestures.","stars":116,"language":"Swift"},{"owner":"browser-use","repo":"bux","url":"https://github.com/browser-use/bux","readme":"# Browser Use Box ♞\n\n<img src=\"docs/hero.jpg\" alt=\"Browser Use Box hero\" width=\"100%\" />\n\n\n## Your 24/7 Claude Code agent with a real browser, on any box you own.\n\nRent any $5 VPS (Hetzner, DigitalOcean, Mac mini, Raspberry Pi — anything that runs Ubuntu), point one install script at it, and text your agent from anywhere.\n\n```\n$ curl -fsSL https://raw.githubusercontent.com/browser-use/bux/main/install.sh \\\n    | sudo BROWSER_USE_API_KEY=bu_xxx bash\n```\n\nThree minutes from a blank VPS to *\"hey claude, check my email and summarize the unread ones\"* via Telegram.\n\n## Setup prompt\n\nPaste into Claude Code (on your laptop) and it will set up your VPS for you:\n\n```text\nSet up https://github.com/browser-use/bux on my remote box.\n\nSSH into it (I'll paste the host below), run install.sh with my BROWSER_USE_API_KEY, and optionally wire up a Telegram bot if I give you a token from @BotFather. Read install.md first. After the install completes, verify the services are running (systemctl is-active bux-browser-keeper bux-ttyd), then become the `bux` user and run `claude /login` so I can complete the OAuth flow. Once logged in, test the setup by asking claude to visit https://browser-use.com and report the page title.\n```\n\n## What you get\n\n- **Claude Code** logged in and always on\n- A real **Chromium** session via [browser-harness](https://github.com/browser-use/browser-harness) — cookies persist, logins stick\n- A **Telegram bot** so you can text your agent — pass `TG_BOT_TOKEN=xxx` to the installer to enable\n- A **web terminal** bound to localhost for when SSH is too much\n- When claude hits a login wall / 2FA / CAPTCHA, it hands you a **live view URL** and waits — no credential-stuffing, no brittle workarounds\n\n## Requirements\n\n- **A box** — Ubuntu 22.04+ with ≥2GB RAM. A $5/mo VPS is fine.\n- **[Browser Use Cloud API key](https://cloud.browser-use.com/new-api-key)** — free tier: 3 concurrent browsers, proxies, CAPTCHA solving.\n- An Anthropic API key *or* Claude Max subscription (claude asks on first `/login`).\n- *(optional)* A Telegram bot token from [@BotFather](https://t.me/BotFather).\n\n## How it works\n\n```\n  telegram ──►  telegram_bot.py ─┐\n                                 ├──► claude -p  ──► browser-harness ──► BU Cloud\n  browser  ──►  ttyd ────────────┘         │            (cdp over wss)\n                                           ▼\n                                  /home/bux (persistent state)\n```\n\nThree small services under systemd. Agent state lives in `/home/bux`, so reboots keep your cookies, skills, and chat history.\n\n## Docs\n\n- [install.md](install.md) — full install guide, troubleshooting, recipes\n- [agent/CLAUDE.md](agent/CLAUDE.md) — the context claude loads on every session\n- [docs/recipes/](docs/recipes/) — provider-specific deploy notes\n\n## Managed offering\n\nIf you'd rather not run your own VPS: [cloud.browser-use.com](https://cloud.browser-use.com) provisions a box for you in ~60s — same software, zero setup, one-command `bux up` via a Claude Code skill.\n\n## Contributing\n\nPRs welcome — **[deploy recipes](docs/recipes/)** are the highest-leverage contribution (one `.md` per provider). Bug fixes and docs tweaks equally welcome.\n\n## License\n\nMIT. See [LICENSE](LICENSE).\n","summary":"Browser‑Use bux turns any cheap VPS into a 24/7 Claude‑powered code agent that runs a real Chromium session via Browser‑Harness, keeping cookies and logins persistently on the host. A single‑line install script launches three lightweight systemd services—a Claude agent, a web terminal, and a Telegram bot—so users can trigger web‑based actions from anywhere and receive a live view when login hurdles like 2‑FA or CAPTCHAs arise. After a quick setup, the agent can be instructed from Claude Code or Telegram to browse, scrape, or automate tasks with the same stateful browsing experience as in a normal browser. This is ideal for developers or power users who want a cost‑effective, always‑on, remote assistant for repetitive web tasks such as email summarization, data extraction, or automated workflows.","description":"A 24/7 Claude Code agent with Browser Harness, on any box you own.","stars":222,"language":"Python"},{"owner":"saltpi","repo":"Aria.X","url":"https://github.com/saltpi/Aria.X","readme":"# AriaX\n\nEnglish | [简体中文](README_zh.md)\n\n![AriaX Screenshot 1](images/screenshot1.png)\n\n---\n\n## AriaX: The Ultimate Download Manager for Apple Users\n\nAriaX is a modern, high-performance download manager designed specifically for the Apple ecosystem (macOS & iOS). Built with **SwiftUI**, it offers a seamless, native experience that combines the industrial-strength power of `aria2` with the elegance of modern Apple design.\n\n![AriaX Screenshot 2](images/screenshot2.png)\n\n### Why AriaX?\n\n*   **Native & Modern**: Fully crafted with SwiftUI for a smooth, responsive interface that feels like a part of the OS.\n*   **Zero Configuration (Full Version)**: Includes a built-in, pre-configured `aria2` engine. Download and start immediately—no terminal required.\n*   **Hybrid Power**: Whether you want to manage local downloads or control a remote NAS/Server via JSON-RPC, AriaX handles both with ease.\n*   **Deep Integration**: \n    *   **Safari Extension**: Official extension to send tasks to AriaX with one click.\n    *   **Smart URL Scheme**: Integrate with third-party apps using `ariax://`.\n*   **Globalized**: Fully localized in 10+ languages including English, Simplified/Traditional Chinese, Japanese, German, and French.\n*   **Dual Versions**: \n    *   **AriaX (Full)**: Includes the built-in engine, distributed via DMG.\n    *   **AriaX Lite**: A lightweight remote controller available on the Mac App Store.\n\n### Installation\n\n1.  **AriaX (Standard/Full)**: Download the latest `.dmg` from our official distribution channel. This version contains the integrated download core.\n2.  **AriaX Lite**: Search for \"AriaX\" on the **Mac App Store**. Best for users who already have a running `aria2` service on another device.\n\n### Browser Integration\n\nEnable the official Safari Extension for the best experience:\n1.  Open **AriaX** -> **Settings** -> **Browser Integration**.\n2.  Click **Enable Safari Extension**.\n3.  In Safari Settings, check the **AriaX Extension**.\n4.  Right-click any link to see \"Download with AriaX\".\n\n### Privacy & Security\n\nAriaX is designed with privacy in mind. We do not collect your download history or server credentials. All data is stored locally on your device or within your private iCloud container if syncing is enabled.\n\n### License & Credits\n\n- **Aria2Helper**: This component is open-source and licensed under the [GNU GPLv2](Aria2Helper/LICENSE).\n- **aria2**: The core engine [aria2](https://github.com/aria2/aria2) is licensed under GNU GPLv2.\n- **AriaNg**: The web interface is based on [AriaNg](https://github.com/mayswind/AriaNg), which is licensed under the MIT License.\n\n---\n\n© 2026 AriaX. All rights reserved.\n","summary":"AriaX is a high‑performance download manager for macOS and iOS that blends Apple’s SwiftUI interface with the robust aria2 engine. It lets users download files locally or remotely via JSON‑RPC, and includes a one‑click Safari extension, a custom URL scheme for third‑party apps, and support for over ten languages. Two editions are offered: a full version with a built‑in aria2 core for instant use, and a lightweight “Lite” controller that works with a pre‑running aria2 service. The app appeals to Apple users who want a native, privacy‑respecting downloader that eliminates the need for command‑line setup.","description":"AriaX: The Ultimate Download Manager for Apple Users","stars":176,"language":"C++"},{"owner":"thedrmaker","repo":"DrPasswords","url":"https://github.com/thedrmaker/DrPasswords","readme":"# Dr. Passwords 🔐\n\n<p align=\"center\">\n  <img src=\"assets/device.jpg\" width=\"300\"/>\n</p>\n\n<p align=\"center\">\n  <b>A physical open-source password manager built with ESP32-S3</b>\n</p>\n\n---\n\n## 🎬 Watch the video\n\n[![Watch the video](https://img.youtube.com/vi/tpA8L6P6DDg/0.jpg)](https://www.youtube.com/watch?v=tpA8L6P6DDg)\n\n---\n\n## 🚀 Features\n\n- 🔐 Store passwords locally (no cloud)\n- ⌨️ Type passwords automatically (HID keyboard emulation)\n- 👤 Username / Password / Username+TAB+Password modes\n- 🔢 Built-in TOTP (2FA) generator\n- 📟 On-device UI (screen + buttons)\n- ⚙️ Settings page (add / edit / delete passwords)\n- 🔑 Generate strong random passwords\n- 🌐 Wi-Fi assisted time sync for TOTP\n\n---\n\n## 🧠 Concept\n\nThis project is inspired by **hardware crypto wallets**.\n\nInstead of trusting cloud services, your passwords are stored in a **physical device** that you control.\n\n---\n\n## 🛠️ Hardware\n\n### Main board\n- ESP32-S3 (recommended)\n\n### Optional parts\n- RTC module (for offline time keeping)\n- Compact USB adapter (for flash-drive style form factor)\n\n---\n\n### 🔗 Components & Links\n\n| Component | Link |\n|----------|------|\n| LILYGO ESP32-S3 | [Buy here](https://s.click.aliexpress.com/e/_c3U8wX7j) |\n| RTC Module | [Buy here](http
