<script id="project-data" type="application/json">[{"owner":"googleapis","repo":"genai-toolbox","url":"https://github.com/googleapis/genai-toolbox","readme":"<div align=\"center\">\n\n![logo](./logo.png)\n\n# MCP Toolbox for Databases\n\n<a href=\"https://trendshift.io/repositories/25495\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/25495\" alt=\"googleapis%2Fmcp-toolbox | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/></a>\n\n[![Go Report Card](https://goreportcard.com/badge/github.com/googleapis/mcp-toolbox)](https://goreportcard.com/report/github.com/googleapis/mcp-toolbox)\n[![License: Apache\n2.0](https://img.shields.io/badge/License-Apache%202.0-blue.svg)](https://opensource.org/licenses/Apache-2.0)\n[![Docs](https://img.shields.io/badge/Docs-MCP_Toolbox-blue)](https://mcp-toolbox.dev/)\n[![Discord](https://img.shields.io/badge/Discord-%235865F2.svg?style=flat&logo=discord&logoColor=white)](https://discord.gg/Dmm69peqjh)\n[![Medium](https://img.shields.io/badge/Medium-12100E?style=flat&logo=medium&logoColor=white)](https://medium.com/@mcp_toolbox)\n\n[![Python SDK](https://img.shields.io/pypi/v/toolbox-core?logo=python&logoColor=white&label=Python%20SDK)](https://pypi.org/project/toolbox-core/)\n[![JS/TS SDK](https://img.shields.io/npm/v/@toolbox-sdk/core?logo=javascript&logoColor=white&label=JS%20SDK)](https://www.npmjs.com/package/@toolbox-sdk/core)\n[![Go SDK](https://img.shields.io/github/v/release/googleapis/mcp-toolbox-sdk-go?logo=go&logoColor=white&label=Go%20SDK)](https://pkg.go.dev/github.com/googleapis/mcp-toolbox-sdk-go)\n[![Java SDK](https://img.shields.io/maven-central/v/com.google.cloud.mcp/mcp-toolbox-sdk-java?logo=apache-maven&logoColor=white&label=Java%20SDK)](https://mvnrepository.com/artifact/com.google.cloud.mcp/mcp-toolbox-sdk-java)\n</div>\n\nMCP Toolbox for Databases is an open source Model Context Protocol (MCP) server that connects your AI agents, IDEs, and applications directly to your enterprise databases. \n\n<p align=\"center\">\n<img src=\"docs/en/documentation/introduction/architecture.png\" alt=\"architecture\" width=\"50%\"/>\n</p>\n\nIt serves a **dual purpose**:\n1. **Ready-to-use MCP Server (Build-Time):** Instantly connect Gemini CLI, Google Antigravity, Claude Code, Codex, or other MCP clients to your databases using our *prebuilt generic tools*. Talk to your data, explore schemas, and generate code without writing boilerplate.\n2. **Custom Tools Framework (Run-Time):** A robust framework to build specialized, highly secure AI tools for your production agents. Define structured queries, semantic search, and NL2SQL capabilities safely and easily.\n\n\nThis README provides a brief overview. For comprehensive details, see the [full documentation](https://mcp-toolbox.dev/).\n\n> [!IMPORTANT]  \n> **Repository Name Update:** The `genai-toolbox` repository has been officially renamed to `mcp-toolbox`. To ensure your local environment reflects the new name, you may update your remote:\n> `git remote set-url origin https://github.com/googleapis/mcp-toolbox.git`\n\n> [!NOTE]\n> This solution was originally named “Gen AI Toolbox for Databases” (github.com/googleapis/genai-toolbox) as its initial development predated MCP, but was renamed to align with the MCP compatibility.\n\n<!-- TOC ignore:true -->\n## Table of Contents\n\n- [Why MCP Toolbox?](#why-mcp-toolbox)\n- [Quick Start: Prebuilt Tools](#quick-start-prebuilt-tools)\n- [Quick Start: Custom Tools](#quick-start-custom-tools)\n- [Install & Run the Toolbox server](#install--run-the-toolbox-server)\n- [Connect to Toolbox](#connect-to-toolbox)\n  - [MCP Client](#mcp-client)\n  - [Toolbox SDKs: Integrate with your Application](#toolbox-sdks-integrate-with-your-application)\n- [Additional Features](#additional-features)\n- [Versioning](#versioning)\n- [Contributing](#contributing)\n- [Community](#community)\n\n---\n\n## Why MCP Toolbox?\n\n- **Out-of-the-Box Database Access:** Prebuilt generic tools for instant data exploration (e.g., `list_tables`, `execute_sql`) directly from your IDE or CLI.\n- **Custom Tools Framework:** Build production-ready tools with your own predefined logic, ensuring safety through Restricted Access, Structured Queries, and Semantic Search.\n- **Simplified Development:** Integrate tools into your Agent Development Kit (ADK), LangChain, LlamaIndex, or custom agents in less than 10 lines of code.\n- **Better Performance:** Handles connection pooling, integrated auth (IAM), and end-to-end observability (OpenTelemetry) out of the box.\n- **Enhanced Security**: Integrated authentication for more secure access to your data.\n- **End-to-end Observability**: Out of the box metrics and tracing with built-in support for OpenTelemetry.\n\n---\n\n## Quick Start: Prebuilt Tools\n\nStop context-switching and let your AI assistant become a true co-developer. By connecting your IDE to your databases with MCP Toolbox, you can query your data in plain English, automate schema discovery and management, and generate database-aware code.\n\nYou can use the Toolbox in any MCP-compatible IDE or client (e.g., Gemini CLI, Google Antigravity, Claude Code, Codex, etc.) by configuring the MCP server.\n\n**Prebuilt tools are also conveniently available via the [Google Antigravity MCP Store](https://antigravity.google/docs/mcp) with a simple click-to-install experience.**\n\n1. Add the following to your client's MCP configuration file (usually `mcp.json` or `claude_desktop_config.json`):\n\n    ```json\n    {\n      \"mcpServers\": {\n        \"toolbox-postgres\": {\n          \"command\": \"npx\",\n          \"args\": [\n            \"-y\",\n            \"@toolbox-sdk/server\",\n            \"--prebuilt=postgres\",\n            \"--stdio\"\n          ]\n        }\n      }\n    }\n    ```\n\n2. Set the appropriate environment variables to connect, see the [Prebuilt Tools Reference](https://mcp-toolbox.dev/documentation/configuration/prebuilt-configs/).\n\nWhen you run Toolbox with a `--prebuilt=<database>` flag, you instantly get access to standard tools to interact with that database. \n\nSupported databases currently include:\n- **Google Cloud:** AlloyDB, BigQuery, Cloud SQL (PostgreSQL, MySQL, SQL Server), Spanner, Firestore, Knowledge Catalog (formerly known as Dataplex).\n- **Other Databases:** PostgreSQL, MySQL, SQL Server, Oracle, MongoDB, Redis, Elasticsearch, CockroachDB, ClickHouse, Couchbase, Neo4j, Snowflake, Trino, and more.\n\nFor a full list of available tools and their capabilities across all supported databases, see the [Prebuilt Tools Reference](https://mcp-toolbox.dev/documentation/configuration/prebuilt-configs/).\n\n*See the [Install & Run the Toolbox server](#install--run-the-toolbox-server) section for different execution methods like Docker or binaries.*\n\n\n> [!TIP]\n> For users looking for a managed solution, [Google Cloud MCP Servers](https://cloud.google.com/blog/products/databases/managed-mcp-servers-for-google-cloud-databases) \n> provide a managed MCP experience with prebuilt tools; you can [learn more about the differences here](https://mcp-toolbox.dev/dev/reference/faq/).\n\n---\n\n## Quick Start: Custom Tools\n\nToolbox can also be used as a framework for customized tools.\nThe primary way to configure Toolbox is through the `tools.yaml` file. If you\nhave multiple files, you can tell Toolbox which to load with the `--config\ntools.yaml` flag.\n\nYou can find more detailed reference documentation to all resource types in the\n[Resources](https://mcp-toolbox.dev/documentation/configuration/).\n\n### Sources\n\nThe `sources` section of your `tools.yaml` defines what data sources your\nToolbox should have access to. Most tools will have at least one source to\nexecute against.\n\n```yaml\nkind: source\nname: my-pg-source\ntype: postgres\nhost: 127.0.0.1\nport: 5432\ndatabase: toolbox_db\nuser: toolbox_user\npassword: my-password\n```\n\nFor more details on configuring different types of sources, see the\n[Sources](https://mcp-toolbox.dev/documentation/configuration/sources/).\n\n### Tools\n\nThe `tools` section of a `tools.yaml` define the actions an agent can take: what\ntype of tool it is, which source(s) it affects, what parameters it uses, etc.\n\n```yaml\nkind: tool\nname: search-hotels-by-name\ntype: postgres-sql\nsource: my-pg-source\ndescription: Search for hotels based on name.\nparameters:\n  - name: name\n    type: string\n    description: The name of the hotel.\nstatement: SELECT * FROM hotels WHERE name ILIKE '%' || $1 || '%';\n```\n\nFor more details on configuring different types of tools, see the\n[Tools](https://mcp-toolbox.dev/documentation/configuration/tools/).\n\n### Toolsets\n\nThe `toolsets` section of your `tools.yaml` allows you to define groups of tools\nthat you want to be able to load together. This can be useful for defining\ndifferent groups based on agent or application.\n\n```yaml\nkind: toolset\nname: my_first_toolset\ntools:\n    - my_first_tool\n    - my_second_tool\n---\nkind: toolset\nname: my_second_toolset\ntools:\n    - my_second_tool\n    - my_third_tool\n```\n\n### Prompts\n\nThe `prompts` section of a `tools.yaml` defines prompts that can be used for\ninteractions with LLMs.\n\n```yaml\nkind: prompt\nname: code_review\ndescription: \"Asks the LLM to analyze code quality and suggest improvements.\"\nmessages:\n  - content: >\n         Please review the following code for quality, correctness,\n         and potential improvements: \\n\\n{{.code}}\narguments:\n  - name: \"code\"\n    description: \"The code to review\"\n```\n\nFor more details on configuring prompts, see the\n[Prompts](https://mcp-toolbox.dev/documentation/configuration/prompts/).\n\n---\n\n## Install & Run the Toolbox server\n\nYou can run Toolbox directly with a [configuration file](#quick-start-custom-tools):\n\n```sh\nnpx @toolbox-sdk/server --config tools.yaml\n```\n\nThis runs the latest version of the Toolbox server with your configuration file.\n\n> [!NOTE]\n> This method is optimized for convenience rather than performance. \n> For a more standard and reliable installation, please use the binary\n> or container image as described in [Install & Run the Toolbox server](#install--run-the-toolbox-server).\n\n### Install Toolbox\n\nFor the latest version, check the [releases page][releases] and use the\nfollowing instructions for your OS and CPU architecture.\n\n[releases]: https://github.com/googleapis/mcp-toolbox/releases\n\n<details open>\n<summary>Binary</summary>\n\nTo install Toolbox as a binary:\n\n<!-- {x-release-please-start-version} -->\n> <details>\n> <summary>Linux (AMD64)</summary>\n>\n> To install Toolbox as a binary on Linux (AMD64):\n>\n> ```sh\n> # see releases page for other versions\n> export VERSION=1.3.0\n> curl -L -o toolbox https://storage.googleapis.com/mcp-toolbox-for-databases/v$VERSION/linux/amd64/toolbox\n> chmod +x toolbox\n> ```\n>\n> </details>\n> <details>\n> <summary>macOS (Apple Silicon)</summary>\n>\n> To install Toolbox as a binary on macOS (Apple Silicon):\n>\n> ```sh\n> # see releases page for other versions\n> export VERSION=1.3.0\n> curl -L -o toolbox https://storage.googleapis.com/mcp-toolbox-for-databases/v$VERSION/darwin/arm64/toolbox\n> chmod +x toolbox\n> ```\n>\n> </details>\n> <details>\n> <summary>macOS (Intel)</summary>\n>\n> To install Toolbox as a binary on macOS (Intel):\n>\n> ```sh\n> # see releases page for other versions\n> export VERSION=1.3.0\n> curl -L -o toolbox https://storage.googleapis.com/mcp-toolbox-for-databases/v$VERSION/darwin/amd64/toolbox\n> chmod +x toolbox\n> ```\n>\n> </details>\n> <details>\n> <summary>Windows (Command Prompt)</summary>\n>\n> To install Toolbox as a binary on Windows (Command Prompt):\n>\n> ```cmd\n> :: see releases page for other versions\n> set VERSION=1.3.0\n> curl -o toolbox.exe \"https://storage.googleapis.com/mcp-toolbox-for-databases/v%VERSION%/windows/amd64/toolbox.exe\"\n> ```\n>\n> </details>\n> <details>\n> <summary>Windows (PowerShell)</summary>\n>\n> To install Toolbox as a binary on Windows (PowerShell):\n>\n> ```powershell\n> # see releases page for other versions\n> $VERSION = \"1.3.0\"\n> curl.exe -o toolbox.exe \"https://storage.googleapis.com/mcp-toolbox-for-databases/v$VERSION/windows/amd64/toolbox.exe\"\n> ```\n>\n> </details>\n</details>\n\n<details>\n<summary>Container image</summary>\nYou can also install Toolbox as a container:\n\n```sh\n# see releases page for other versions\nexport VERSION=1.3.0\ndocker pull us-central1-docker.pkg.dev/database-toolbox/toolbox/toolbox:$VERSION\n```\n\n</details>\n\n<details>\n<summary>Homebrew</summary>\n\nTo install Toolbox using Homebrew on macOS or Linux:\n\n```sh\nbrew install mcp-toolbox\n```\n\n</details>\n\n<details>\n<summary>Compile from source</summary>\n\nTo install from source, ensure you have the latest version of\n[Go installed](https://go.dev/doc/install), and then run the following command:\n\n```sh\ngo install github.com/googleapis/mcp-toolbox@v1.3.0\n```\n<!-- {x-release-please-end} -->\n\n</details>\n<details>\n<summary>Gemini CLI</summary>\nCheck out the [Gemini CLI extensions](https://geminicli.com/extensions/) to install prebuilt tools for specific databases like AlloyDB, BigQuery, and Cloud SQL directly into Gemini CLI.\n\n```sh\n# Install Gemini CLI\nnpm install -g @google/gemini-cli\n# Install the extension\ngemini extensions install https://github.com/gemini-cli-extensions/cloud-sql-postgres\n# Run Gemini CLI\ngemini\n```\n\nInteract with your custom tools using natural language through the Gemini CLI.\n\n```sh\n# Install the extension\ngemini extensions install https://github.com/gemini-cli-extensions/mcp-toolbox\n```\n</details>\n\n\n### Run Toolbox\n\n[Configure](#quick-start-custom-tools) a `tools.yaml` to define your tools, and then\nexecute `toolbox` to start the server:\n\n<details open>\n<summary>Binary</summary>\n\nTo run Toolbox from binary:\n\n```sh\n./toolbox --config \"tools.yaml\"\n```\n\n> ⓘ Note  \n> Toolbox enables dynamic reloading by default. To disable, use the\n> `--disable-reload` flag.\n\n</details>\n\n<details>\n\n<summary>Container image</summary>\n\nTo run the server after pulling the [container image](#install-toolbox):\n\n```sh\nexport VERSION=0.24.0 # Use the version you pulled\ndocker run -p 5000:5000 \\\n-v $(pwd)/tools.yaml:/app/tools.yaml \\\nus-central1-docker.pkg.dev/database-toolbox/toolbox/toolbox:$VERSION \\\n--config \"/app/tools.yaml\"\n```\n\n> ⓘ Note  \n> The `-v` flag mounts your local `tools.yaml` into the container, and `-p` maps\n> the container's port `5000` to your host's port `5000`.\n\n</details>\n\n<details>\n\n<summary>Source</summary>\n\nTo run the server directly from source, navigate to the project root directory\nand run:\n\n```sh\ngo run .\n```\n\n> ⓘ Note  \n> This command runs the project from source, and is more suitable for development\n> and testing. It does **not** compile a binary into your `$GOPATH`. If you want\n> to compile a binary instead, refer the [Developer\n> Documentation](./DEVELOPER.md#building-the-binary).\n\n</details>\n\n<details>\n\n<summary>Homebrew</summary>\n\nIf you installed Toolbox using [Homebrew](https://brew.sh/), the `toolbox`\nbinary is available in your system path. You can start the server with the same\ncommand:\n\n```sh\ntoolbox --config \"tools.yaml\"\n```\n\n</details>\n\n<details>\n<summary>NPM</summary>\n\nTo run Toolbox directly without manually downloading the binary (requires Node.js):\n```sh\nnpx @toolbox-sdk/server --config tools.yaml\n```\n\n</details>\n<details>\n<summary>Gemini CLI</summary>\nAfter installing a [Gemini CLI extensions](https://geminicli.com/extensions/), the prebuilt tools will be available during use.\n\n```sh\n# Run Gemini CLI\ngemini\n\n# List extensions\n/extensions list\n# List MCP servers\n/mcp list\n```\n\n</details>\n\n\nYou can use `toolbox help` for a full list of flags! To stop the server, send a\nterminate signal (`ctrl+c` on most platforms).\n\nFor more detailed documentation on deploying to different environments, check\nout the resources in the [Deploy Toolbox\nsection](https://mcp-toolbox.dev/documentation/deploy-to/)\n\n---\n\n## Connect to Toolbox\n\nOnce your Toolbox server is up and running, you can load tools into your MCP-compatible client or\napplication. \n\n### MCP Client\n\nAdd the following configuration to your MCP client configuration:\n\n```json\n{\n  \"mcpServers\": {\n    \"toolbox\": {\n      \"type\": \"http\",\n      \"url\": \"http://127.0.0.1:5000/mcp\",\n    }\n  }\n}\n```\n\nIf you would like to connect to a specific toolset, replace url with \"http://127.0.0.1:5000/mcp/{toolset_name}\".\n\n\n### Toolbox SDKs: Integrate with your Application\n\nToolbox Client SDKs provide the easy-to-use building blocks and advanced features for connecting your custom applications to the MCP Toolbox server. See below the list of Client SDKs for using various frameworks:\n\n<details open>\n  <summary>Python (<a href=\"https://github.com/googleapis/mcp-toolbox-sdk-python\">Github</a>)</summary>\n  <br>\n  <blockquote>\n\n  <details open>\n    <summary>Core</summary>\n\n1. Install [Toolbox Core SDK][toolbox-core]:\n\n    ```bash\n    pip install toolbox-core\n    ```\n\n1. Load tools:\n\n    ```python\n    from toolbox_core import ToolboxClient\n\n    # update the url to point to your server\n    async with ToolboxClient(\"http://127.0.0.1:5000\") as client:\n\n        # these tools can be passed to your application!\n        tools = await client.load_toolset(\"toolset_name\")\n    ```\n\nFor more detailed instructions on using the Toolbox Core SDK, see the\n[project's README][toolbox-core-readme].\n\n[toolbox-core]: https://pypi.org/project/toolbox-core/\n[toolbox-core-readme]: https://github.com/googleapis/mcp-toolbox-sdk-python/tree/main/packages/toolbox-core/README.md\n\n  </details>\n  <details>\n    <summary>LangChain / LangGraph</summary>\n\n1. Install [Toolbox LangChain SDK][toolbox-langchain]:\n\n    ```bash\n    pip install toolbox-langchain\n    ```\n\n1. Load tools:\n\n    ```python\n    from toolbox_langchain import ToolboxClient\n\n    # update the url to point to your server\n    async with ToolboxClient(\"http://127.0.0.1:5000\") as client:\n\n        # these tools can be passed to your application!\n        tools = client.load_toolset()\n    ```\n\n    For more detailed instructions on using the Toolbox LangChain SDK, see the\n    [project's README][toolbox-langchain-readme].\n\n    [toolbox-langchain]: https://pypi.org/project/toolbox-langchain/\n    [toolbox-langchain-readme]: https://github.com/googleapis/mcp-toolbox-sdk-python/blob/main/packages/toolbox-langchain/README.md\n\n  </details>\n  <details>\n    <summary>LlamaIndex</summary>\n\n1. Install [Toolbox Llamaindex SDK][toolbox-llamaindex]:\n\n    ```bash\n    pip install toolbox-llamaindex\n    ```\n\n1. Load tools:\n\n    ```python\n    from toolbox_llamaindex import ToolboxClient\n\n    # update the url to point to your server\n    async with ToolboxClient(\"http://127.0.0.1:5000\") as client:\n\n        # these tools can be passed to your application!\n        tools = client.load_toolset()\n    ```\n\n    For more detailed instructions on using the Toolbox Llamaindex SDK, see the\n    [project's README][toolbox-llamaindex-readme].\n\n    [toolbox-llamaindex]: https://pypi.org/project/toolbox-llamaindex/\n    [toolbox-llamaindex-readme]: https://github.com/googleapis/genai-toolbox-llamaindex-python/blob/main/README.md\n\n  </details>\n</details>\n</blockquote>\n<details>\n  <summary>Javascript/Typescript (<a href=\"https://github.com/googleapis/mcp-toolbox-sdk-js\">Github</a>)</summary>\n  <br>\n  <blockquote>\n\n  <details open>\n    <summary>Core</summary>\n\n1. Install [Toolbox Core SDK][toolbox-core-js]:\n\n    ```bash\n    npm install @toolbox-sdk/core\n    ```\n\n1. Load tools:\n\n    ```javascript\n    import { ToolboxClient } from '@toolbox-sdk/core';\n\n    // update the url to point to your server\n    const URL = 'http://127.0.0.1:5000';\n    let client = new ToolboxClient(URL);\n\n    // these tools can be passed to your application!\n    const tools = await client.loadToolset('toolsetName');\n    ```\n\n    For more detailed instructions on using the Toolbox Core SDK, see the\n    [project's README][toolbox-core-js-readme].\n\n    [toolbox-core-js]: https://www.npmjs.com/package/@toolbox-sdk/core\n    [toolbox-core-js-readme]: https://github.com/googleapis/mcp-toolbox-sdk-js/blob/main/packages/toolbox-core/README.md\n\n  </details>\n  <details>\n    <summary>LangChain / LangGraph</summary>\n\n1. Install [Toolbox Core SDK][toolbox-core-js]:\n\n    ```bash\n    npm install @toolbox-sdk/core\n    ```\n\n2. Load tools:\n\n    ```javascript\n    import { ToolboxClient } from '@toolbox-sdk/core';\n\n    // update the url to point to your server\n    const URL = 'http://127.0.0.1:5000';\n    let client = new ToolboxClient(URL);\n\n    // these tools can be passed to your application!\n    const toolboxTools = await client.loadToolset('toolsetName');\n\n    // Define the basics of the tool: name, description, schema and core logic\n    const getTool = (toolboxTool) => tool(currTool, {\n        name: toolboxTool.getName(),\n        description: toolboxTool.getDescription(),\n        schema: toolboxTool.getParamSchema()\n    });\n\n    // Use these tools in your Langchain/Langraph applications\n    const tools = toolboxTools.map(getTool);\n    ```\n\n  </details>\n  <details>\n    <summary>Genkit</summary>\n\n1. Install [Toolbox Core SDK][toolbox-core-js]:\n\n    ```bash\n    npm install @toolbox-sdk/core\n    ```\n\n2. Load tools:\n\n    ```javascript\n    import { ToolboxClient } from '@toolbox-sdk/core';\n    import { genkit } from 'genkit';\n\n    // Initialise genkit\n    const ai = genkit({\n        plugins: [\n            googleAI({\n                apiKey: process.env.GEMINI_API_KEY || process.env.GOOGLE_API_KEY\n            })\n        ],\n        model: googleAI.model('gemini-2.0-flash'),\n    });\n\n    // update the url to point to your server\n    const URL = 'http://127.0.0.1:5000';\n    let client = new ToolboxClient(URL);\n\n    // these tools can be passed to your application!\n    const toolboxTools = await client.loadToolset('toolsetName');\n\n    // Define the basics of the tool: name, description, schema and core logic\n    const getTool = (toolboxTool) => ai.defineTool({\n        name: toolboxTool.getName(),\n        description: toolboxTool.getDescription(),\n        schema: toolboxTool.getParamSchema()\n    }, toolboxTool)\n\n    // Use these tools in your Genkit applications\n    const tools = toolboxTools.map(getTool);\n    ```\n\n  </details>\n  <details>\n    <summary>ADK</summary>\n\n1. Install [Toolbox ADK SDK][toolbox-adk-js]:\n\n    ```bash\n    npm install @toolbox-sdk/adk\n    ```\n\n2. Load tools:\n\n    ```javascript\n    import { ToolboxClient } from '@toolbox-sdk/adk';\n\n    // update the url to point to your server\n    const URL = 'http://127.0.0.1:5000';\n    let client = new ToolboxClient(URL);\n\n    // these tools can be passed to your application!\n    const tools = await client.loadToolset('toolsetName');\n    ```\n\n    For more detailed instructions on using the Toolbox ADK SDK, see the\n    [project's README][toolbox-adk-js-readme].\n\n    [toolbox-adk-js]: https://www.npmjs.com/package/@toolbox-sdk/adk\n    [toolbox-adk-js-readme]:\n       https://github.com/googleapis/mcp-toolbox-sdk-js/blob/main/packages/toolbox-adk/README.md\n\n  </details>\n</details>\n</blockquote>\n<details>\n  <summary>Go (<a href=\"https://github.com/googleapis/mcp-toolbox-sdk-go\">Github</a>)</summary>\n  <br>\n  <blockquote>\n\n  <details>\n    <summary>Core</summary>\n\n1. Install [Toolbox Go SDK][toolbox-go]:\n\n    ```bash\n    go get github.com/googleapis/mcp-toolbox-sdk-go\n    ```\n\n2. Load tools:\n\n    ```go\n    package main\n\n    import (\n      \"github.com/googleapis/mcp-toolbox-sdk-go/core\"\n      \"context\"\n    )\n\n    func main() {\n      // Make sure to add the error checks\n      // update the url to point to your server\n      URL := \"http://127.0.0.1:5000\";\n      ctx := context.Background()\n\n      client, err := core.NewToolboxClient(URL)\n\n      // Framework agnostic tools\n      tools, err := client.LoadToolset(\"toolsetName\", ctx)\n    }\n    ```\n\n    For more detailed instructions on using the Toolbox Go SDK, see the\n    [project's README][toolbox-core-go-readme].\n\n    [toolbox-go]: https://pkg.go.dev/github.com/googleapis/mcp-toolbox-sdk-go/core\n    [toolbox-core-go-readme]: https://github.com/googleapis/mcp-toolbox-sdk-go/blob/main/core/README.md\n\n  </details>\n  <details>\n    <summary>LangChain Go</summary>\n\n1. Install [Toolbox Go SDK][toolbox-go]:\n\n    ```bash\n    go get github.com/googleapis/mcp-toolbox-sdk-go\n    ```\n\n2. Load tools:\n\n    ```go\n    package main\n\n    import (\n      \"context\"\n      \"encoding/json\"\n\n      \"github.com/googleapis/mcp-toolbox-sdk-go/core\"\n      \"github.com/tmc/langchaingo/llms\"\n    )\n\n    func main() {\n      // Make sure to add the error checks\n      // update the url to point to your server\n      URL := \"http://127.0.0.1:5000\"\n      ctx := context.Background()\n\n      client, err := core.NewToolboxClient(URL)\n\n      // Framework agnostic tool\n      tool, err := client.LoadTool(\"toolName\", ctx)\n\n      // Fetch the tool's input schema\n      inputschema, err := tool.InputSchema()\n\n      var paramsSchema map[string]any\n      _ = json.Unmarshal(inputschema, &paramsSchema)\n\n      // Use this tool with LangChainGo\n      langChainTool := llms.Tool{\n        Type: \"function\",\n        Function: &llms.FunctionDefinition{\n          Name:        tool.Name(),\n          Description: tool.Description(),\n          Parameters:  paramsSchema,\n        },\n      }\n    }\n\n    ```\n\n  </details>\n  <details>\n    <summary>Genkit</summary>\n\n1. Install [Toolbox Go SDK][toolbox-go]:\n\n    ```bash\n    go get github.com/googleapis/mcp-toolbox-sdk-go\n    ```\n\n2. Load tools:\n\n    ```go\n    package main\n    import (\n      \"context\"\n      \"log\"\n\n      \"github.com/firebase/genkit/go/genkit\"\n      \"github.com/googleapis/mcp-toolbox-sdk-go/core\"\n      \"github.com/googleapis/mcp-toolbox-sdk-go/tbgenkit\"\n    )\n\n    func main() {\n      // Make sure to add the error checks\n      // Update the url to point to your server\n      URL := \"http://127.0.0.1:5000\"\n      ctx := context.Background()\n      g := genkit.Init(ctx)\n\n      client, err := core.NewToolboxClient(URL)\n\n      // Framework agnostic tool\n      tool, err := client.LoadTool(\"toolName\", ctx)\n\n      // Convert the tool using the tbgenkit package\n      // Use this tool with Genkit Go\n      genkitTool, err := tbgenkit.ToGenkitTool(tool, g)\n      if err != nil {\n        log.Fatalf(\"Failed to convert tool: %v\\n\", err)\n      }\n      log.Printf(\"Successfully converted tool: %s\", genkitTool.Name())\n    }\n    ```\n\n  </details>\n  <details>\n    <summary>Go GenAI</summary>\n\n1. Install [Toolbox Go SDK][toolbox-go]:\n\n    ```bash\n    go get github.com/googleapis/mcp-toolbox-sdk-go\n    ```\n\n2. Load tools:\n\n    ```go\n    package main\n\n    import (\n      \"context\"\n      \"encoding/json\"\n\n      \"github.com/googleapis/mcp-toolbox-sdk-go/core\"\n      \"google.golang.org/genai\"\n    )\n\n    func main() {\n      // Make sure to add the error checks\n      // Update the url to point to your server\n      URL := \"http://127.0.0.1:5000\"\n      ctx := context.Background()\n\n      client, err := core.NewToolboxClient(URL)\n\n      // Framework agnostic tool\n      tool, err := client.LoadTool(\"toolName\", ctx)\n\n      // Fetch the tool's input schema\n      inputschema, err := tool.InputSchema()\n\n      var schema *genai.Schema\n      _ = json.Unmarshal(inputschema, &schema)\n\n      funcDeclaration := &genai.FunctionDeclaration{\n        Name:        tool.Name(),\n        Description: tool.Description(),\n        Parameters:  schema,\n      }\n\n      // Use this tool with Go GenAI\n      genAITool := &genai.Tool{\n        FunctionDeclarations: []*genai.FunctionDeclaration{funcDeclaration},\n      }\n    }\n    ```\n\n  </details>\n  <details>\n    <summary>OpenAI Go</summary>\n\n1. Install [Toolbox Go SDK][toolbox-go]:\n\n    ```bash\n    go get github.com/googleapis/mcp-toolbox-sdk-go\n    ```\n\n2. Load tools:\n\n    ```go\n    package main\n\n    import (\n      \"context\"\n      \"encoding/json\"\n\n      \"github.com/googleapis/mcp-toolbox-sdk-go/core\"\n      openai \"github.com/openai/openai-go\"\n    )\n\n    func main() {\n      // Make sure to add the error checks\n      // Update the url to point to your server\n      URL := \"http://127.0.0.1:5000\"\n      ctx := context.Background()\n\n      client, err := core.NewToolboxClient(URL)\n\n      // Framework agnostic tool\n      tool, err := client.LoadTool(\"toolName\", ctx)\n\n      // Fetch the tool's input schema\n      inputschema, err := tool.InputSchema()\n\n      var paramsSchema openai.FunctionParameters\n      _ = json.Unmarshal(inputschema, &paramsSchema)\n\n      // Use this tool with OpenAI Go\n      openAITool := openai.ChatCompletionToolParam{\n        Function: openai.FunctionDefinitionParam{\n          Name:        tool.Name(),\n          Description: openai.String(tool.Description()),\n          Parameters:  paramsSchema,\n        },\n      }\n\n    }\n    ```\n\n  </details>\n  <details open>\n    <summary>ADK Go</summary>\n\n1. Install [Toolbox Go SDK][toolbox-go]:\n\n    ```bash\n    go get github.com/googleapis/mcp-toolbox-sdk-go\n    ```\n\n1. Load tools:\n\n    ```go\n    package main\n\n    import (\n      \"github.com/googleapis/mcp-toolbox-sdk-go/tbadk\"\n      \"context\"\n    )\n\n    func main() {\n      // Make sure to add the error checks\n      // Update the url to point to your server\n      URL := \"http://127.0.0.1:5000\"\n      ctx := context.Background()\n      client, err := tbadk.NewToolboxClient(URL)\n      if err != nil {\n        return fmt.Sprintln(\"Could not start Toolbox Client\", err)\n      }\n\n      // Use this tool with ADK Go\n      tool, err := client.LoadTool(\"toolName\", ctx)\n      if err != nil {\n        return fmt.Sprintln(\"Could not load Toolbox Tool\", err)\n      }\n    }\n    ```\n\n    For more detailed instructions on using the Toolbox Go SDK, see the\n    [project's README][toolbox-core-go-readme].\n\n\n  </details>\n</details>\n</blockquote>\n</details>\n\n---\n\n## Additional Features\n\n### Test tools with the Toolbox UI\n\nTo launch Toolbox's interactive UI, use the `--ui` flag. This allows you to test\ntools and toolsets with features such as authorized parameters. To learn more,\nvisit [Toolbox UI](https://mcp-toolbox.dev/documentation/configuration/toolbox-ui/).\n\n```sh\n./toolbox --ui\n```\n\n### Telemetry\n\nToolbox emits traces and metrics via OpenTelemetry. Use `--telemetry-otlp=<endpoint>` \nto export to any OTLP-compatible backend like Google Cloud Monitoring, Agnost AI, or \nothers. See the [telemetry docs](https://mcp-toolbox.dev/documentation/monitoring/export_telemetry/) for details.\n\n### Generate Agent Skills\n\nThe `skills-generate` command allows you to convert a **toolset** into an **Agent Skill** compatible with the [Agent Skill specification](https://agentskills.io/specification). This is useful for distributing tools as portable skill packages.\n\n```bash\ntoolbox --config tools.yaml skills-generate \\\n  --name \"my-skill\" \\\n  --toolset \"my_toolset\" \\\n  --description \"A skill containing multiple tools\"\n```\n\nOnce generated, you can install the skill into the Gemini CLI:\n\n```bash\ngemini skills install ./skills/my-skill\n```\n\nFor more details, see the [Generate Agent Skills guide](https://mcp-toolbox.dev/documentation/configuration/skills/).\n\n---\n\n## Versioning\n\nMCP Toolbox for Databases follows [Semantic Versioning](https://semver.org/).\n\nThe Public API includes the Toolbox Server (CLI, configuration manifests, and pre-built toolsets) and the Client SDKs.\n\n- **Major versions** are incremented for breaking changes, such as incompatible CLI or manifest changes.\n- **Minor versions** are incremented for new features, including modifications to pre-built toolsets or beta features.\n- **Patch versions** are incremented for backward-compatible bug fixes.\n\nFor more details, see our [Full Versioning Policy](https://mcp-toolbox.dev/reference/versioning/).\n\n---\n\n## Contributing\n\nContributions are welcome. Please, see the [CONTRIBUTING](CONTRIBUTING.md) guide to get started. \n\nFor technical details on setting up a environment for developing on Toolbox itself, see the [DEVELOPER](DEVELOPER.md) guide.\n\nPlease note that this project is released with a Contributor Code of Conduct. By participating in this project you agree to abide by its terms. See [Contributor Code of Conduct](CODE_OF_CONDUCT.md) for more information.\n\n---\n\n## Community\n\nJoin our [Discord community](https://discord.gg/GQrFB3Ec3W) to connect with our developers!\n","summary":"MCP Toolbox for Databases is an open-source Model Context Protocol (MCP) server that provides a seamless bridge between AI agents, IDEs, and enterprise databases. The project offers a dual-mode architecture, providing both prebuilt tools for immediate data exploration and a robust framework for developers to build secure, custom tools like NL2SQL and semantic search. This solution is ideal for developers and engineers looking to enhance their AI workflows with reliable, direct access to database schemas and content without the burden of boilerplate code.","description":"MCP Toolbox for Databases is an open source MCP server for databases.","stars":15463,"language":"Go"},{"owner":"Alibaba-NLP","repo":"WebAgent","url":"https://github.com/Alibaba-NLP/WebAgent","readme":"<div align=\"center\">\n  <picture>\n      <img src=\"./assets/logo.png\" width=\"100%\">\n  </picture>\n</div>\n\n<hr>\n\n<div align=\"center\" style=\"line-height: 1;\">\n\n[![MODELS](https://img.shields.io/badge/Models-5EDDD2?style=for-the-badge&logo=huggingface&logoColor=ffffff&labelColor)](https://huggingface.co/Alibaba-NLP/Tongyi-DeepResearch-30B-A3B)\n[![GITHUB](https://img.shields.io/badge/Github-24292F?style=for-the-badge&logo=github&logoColor=white)](https://github.com/Alibaba-NLP/DeepResearch)\n[![Blog](https://img.shields.io/badge/Blog-4285F4?style=for-the-badge&logo=google-chrome&logoColor=white)](https://tongyi-agent.github.io/blog/introducing-tongyi-deep-research/)\n[![Paper](https://img.shields.io/badge/Paper-red?style=for-the-badge&logo=arxiv&logoColor=white)](https://arxiv.org/pdf/2510.24701)\n\n</div>\n<p align=\"center\">\n<p align=\"center\">\n🤗 <a href=\"https://huggingface.co/Alibaba-NLP/Tongyi-DeepResearch-30B-A3B\" target=\"_blank\">HuggingFace</a> ｜\n<img src=\"./assets/tongyi.png\" width=\"14px\" style=\"display:inline;\"> <a href=\"https://modelscope.cn/models/iic/Tongyi-DeepResearch-30B-A3B\" target=\"_blank\">ModelScope</a> | 💬 <a href=\"./assets/wechat_new.jpg\">WeChat(微信)</a> | 📰 <a href=\"https://tongyi-agent.github.io/blog/introducing-tongyi-deep-research/\">Blog</a> | 📑 <a href=\"https://arxiv.org/pdf/2510.24701\">Paper</a>\n\n<p align=\"center\">\n<a href=\"https://trendshift.io/repositories/14895\" target=\"_blank\"><img src=\"https://trendshift.io/api/badge/repositories/14895\" alt=\"Alibaba-NLP%2FDeepResearch | Trendshift\" style=\"width: 250px; height: 55px;\" width=\"250\" height=\"55\"/></a>\n\n👏 Welcome to try Tongyi DeepResearch via our **[<img src=\"./assets/tongyi.png\" width=\"14px\" style=\"display:inline;\"> Modelscope online demo](https://www.modelscope.cn/studios/jialongwu/Tongyi-DeepResearch)** or **[🤗 Huggingface online demo](https://huggingface.co/spaces/Alibaba-NLP/Tongyi-DeepResearch)** or <img src=\"./WebAgent/assets/aliyun.png\" width=\"14px\" style=\"display:inline;\"> **[bailian service](https://bailian.console.aliyun.com/?spm=a2ty02.31808181.d_app-market.1.6c4974a1tFmoFc&tab=app#/app/app-market/deep-search/)**!\n\n> [!NOTE]\n> This demo is for quick exploration only. Response times may vary or fail intermittently due to model latency and tool QPS limits. For a stable experience we recommend local deployment; for a production-ready service, visit <img src=\"./WebAgent/assets/aliyun.png\" width=\"14px\" style=\"display:inline;\"> [bailian](https://bailian.console.aliyun.com/?spm=a2ty02.31808181.d_app-market.1.6c4974a1tFmoFc&tab=app#/app/app-market/deep-search/) and follow the guided setup.\n\n# Introduction\n\nWe present <img src=\"./assets/tongyi.png\" width=\"14px\" style=\"display:inline;\"> **Tongyi DeepResearch**, an agentic large language model featuring 30.5 billion total parameters, with only 3.3 billion activated per token. Developed by Tongyi Lab, the model is specifically designed for **long-horizon, deep information-seeking** tasks. Tongyi DeepResearch demonstrates state-of-the-art performance across a range of agentic search benchmarks, including Humanity's Last Exam, BrowseComp, BrowseComp-ZH, WebWalkerQA,xbench-DeepSearch, FRAMES and SimpleQA.\n\n> Tongyi DeepResearch builds upon our previous work on the <img src=\"./assets/tongyi.png\" width=\"14px\" style=\"display:inline;\"> [WebAgent](./WebAgent/) project.\n\nMore details can be found in our 📰&nbsp;<a href=\"https://tongyi-agent.github.io/blog/introducing-tongyi-deep-research/\">Tech Blog</a>.\n\n<p align=\"center\">\n  <img width=\"100%\" src=\"./assets/performance.png\">\n</p>\n\n## Features\n\n- ⚙️ **Fully automated synthetic data generation pipeline**: We design a highly scalable data synthesis pipeline, which is fully automatic and empowers agentic pre-training, supervised fine-tuning, and reinforcement learning.\n- 🔄 **Large-scale continual pre-training on agentic data**: Leveraging diverse, high-quality agentic interaction data to extend model capabilities, maintain freshness, and strengthen reasoning performance.\n- 🔁 **End-to-end reinforcement learning**: We employ a strictly on-policy RL approach based on a customized Group Relative Policy Optimization framework, with token-level policy gradients, leave-one-out advantage estimation, and selective filtering of negative samples to stabilize training in a non‑stationary environment.\n- 🤖 **Agent Inference Paradigm Compatibility**: At inference, Tongyi DeepResearch is compatible with two inference paradigms: ReAct, for rigorously evaluating the model's core intrinsic abilities, and an IterResearch-based 'Heavy' mode, which uses a test-time scaling strategy to unlock the model's maximum performance ceiling.\n\n# Model Download\n\nYou can directly download the model by following the links below.\n\n|            Model            |                                                                           Download Links                                                                           | Model Size | Context Length |\n| :-------------------------: | :----------------------------------------------------------------------------------------------------------------------------------------------------------------: | :--------: | :------------: |\n| Tongyi-DeepResearch-30B-A3B | [🤗 HuggingFace](https://huggingface.co/Alibaba-NLP/Tongyi-DeepResearch-30B-A3B)<br> [🤖 ModelScope](https://modelscope.cn/models/iic/Tongyi-DeepResearch-30B-A3B) |  30B-A3B   |      128K      |\n\n# News\n\n[2025/09/20]🚀 Tongyi-DeepResearch-30B-A3B is now on [OpenRouter](https://openrouter.ai/alibaba/tongyi-deepresearch-30b-a3b)! Follow the [Quick-start](https://github.com/Alibaba-NLP/DeepResearch?tab=readme-ov-file#6-you-can-use-openrouters-api-to-call-our-model) guide.\n\n[2025/09/17]🔥 We have released **Tongyi-DeepResearch-30B-A3B**.\n\n# Deep Research Benchmark Results\n<p align=\"center\">\n  <img width=\"100%\" src=\"./assets/benchmark.png\">\n</p>\n\n## Quick Start\n\nThis guide provides instructions for setting up the environment and running inference scripts located in the [inference](./inference/) folder.\n\n### 1. Environment Setup\n- Recommended Python version: **3.10.0** (using other versions may cause dependency issues).\n- It is strongly advised to create an isolated environment using `conda` or `virtualenv`.\n\n```bash\n# Example with Conda\nconda create -n react_infer_env python=3.10.0\nconda activate react_infer_env\n```\n\n### 2. Installation\n\nInstall the required dependencies:\n```bash\npip install -r requirements.txt\n```\n\n### 3. Environment Configuration and Prepare Evaluation Data\n\n#### Environment Configuration\n\nConfigure your API keys and settings by copying the example environment file:\n\n```bash\n# Copy the example environment file\ncp .env.example .env\n```\n\nEdit the `.env` file and provide your actual API keys and configuration values:\n\n- **SERPER_KEY_ID**: Get your key from [Serper.dev](https://serper.dev/) for web search and Google Scholar\n- **JINA_API_KEYS**: Get your key from [Jina.ai](https://jina.ai/) for web page reading\n- **API_KEY/API_BASE**: OpenAI-compatible API for page summarization from [OpenAI](https://platform.openai.com/)\n- **DASHSCOPE_API_KEY**: Get your key from [Dashscope](https://dashscope.aliyun.com/) for file parsing\n- **SANDBOX_FUSION_ENDPOINT**: Python interpreter sandbox endpoints (see [SandboxFusion](https://github.com/bytedance/SandboxFusion))\n- **MODEL_PATH**: Path to your model weights\n- **DATASET**: Name of your evaluation dataset\n- **OUTPUT_PATH**: Directory for saving results\n\n> **Note**: The `.env` file is gitignored, so your secrets will not be committed to the repository.\n\n#### Prepare Evaluation Data\n\nThe system supports two input file formats: **JSON** and **JSONL**.\n\n#### Supported File Formats:\n\n**Option 1: JSONL Format (recommended)**\n- Create your data file with `.jsonl` extension (e.g., `my_questions.jsonl`)\n- Each line must be a valid JSON object with `question` and `answer` keys:\n  ```json\n  {\"question\": \"What is the capital of France?\", \"answer\": \"Paris\"}\n  {\"question\": \"Explain quantum computing\", \"answer\": \"\"}\n  ```\n\n**Option 2: JSON Format**\n- Create your data file with `.json` extension (e.g., `my_questions.json`)\n- File must contain a JSON array of objects, each with `question` and `answer` keys:\n  ```json\n  [\n    { \"question\": \"What is the capital of France?\", \"answer\": \"Paris\" },\n    { \"question\": \"Explain quantum computing\", \"answer\": \"\" }\n  ]\n  ```\n\n**Important Note:** The `answer` field contains the **ground truth/reference answer** used for evaluation. The system generates its own responses to the questions, and these reference answers are used to automatically judge the quality of the generated responses during benchmark evaluation.\n\n#### File References for Document Processing:\n\n- If using the _file parser_ tool, **prepend the filename to the `question` field**\n- Place referenced files in `eval_data/file_corpus/` directory\n- Example: `{\"question\": \"(Uploaded 1 file: ['report.pdf'])\\n\\nWhat are the key findings?\", \"answer\": \"...\"}`\n\n#### File Organization:\n```\nproject_root/\n├── eval_data/\n│   ├── my_questions.jsonl          # Your evaluation data\n│   └── file_corpus/                # Referenced documents\n│       ├── report.pdf\n│       └── data.xlsx\n```\n\n### 4. Configure the Inference Script\n\n- Open `run_react_infer.sh` and modify the following variables as instructed in the comments:\n  - `MODEL_PATH` - path to the local or remote model weights.\n  - `DATASET` - full path to your evaluation file, e.g. `eval_data/my_questions.jsonl` or `/path/to/my_questions.json`.\n  - `OUTPUT_PATH` - path for saving the prediction results, e.g. `./outputs`.\n- Depending on the tools you enable (retrieval, calculator, web search, etc.), provide the required `API_KEY`, `BASE_URL`, or other credentials. Each key is explained inline in the bash script.\n\n### 5. Run the Inference Script\n\n```bash\nbash run_react_infer.sh\n```\n---\n\nWith these steps, you can fully prepare the environment, configure the dataset, and run the model. For more details, consult the inline comments in each script or open an issue.\n\n### 6. You can use OpenRouter's API to call our model\n\nTongyi-DeepResearch-30B-A3B is now available at [OpenRouter](https://openrouter.ai/alibaba/tongyi-deepresearch-30b-a3b). You can run the inference without any GPUs.\n\nYou need to modify the following in the file [inference/react_agent.py](https://github.com/Alibaba-NLP/DeepResearch/blob/main/inference/react_agent.py):\n\n- In the call_server function: Set the API key and URL to your OpenRouter account’s API and URL.\n- Change the model name to alibaba/tongyi-deepresearch-30b-a3b.\n- Adjust the content concatenation way as described in the comments on lines **88–90.**\n\n## Benchmark Evaluation\n\nWe provide benchmark evaluation scripts for various datasets. Please refer to the [evaluation scripts](./evaluation/) directory for more details.\n\n## FAQ\n\nPlease refer to the [FAQ](./FAQ.md) for more details.\n\n## Deep Research Agent Family\n\n<p align=\"center\">\n  <img width=\"100%\" src=\"./assets/family17.png\">\n</p>\n\nTongyi DeepResearch also has an extensive deep research agent family. You can find more information in the following paper:\n\n[1] [WebWalker: Benchmarking LLMs in Web Traversal](https://arxiv.org/pdf/2501.07572) (ACL 2025)<br>\n[2] [WebDancer: Towards Autonomous Information Seeking Agency](https://arxiv.org/pdf/2505.22648) (NeurIPS 2025)<br>\n[3] [WebSailor: Navigating Super-human Reasoning for Web Agent](https://arxiv.org/pdf/2507.02592)<br>\n[4] [WebShaper: Agentically Data Synthesizing via Information-Seeking Formalization](https://arxiv.org/pdf/2507.15061)<br>\n[5] [WebWatcher: Breaking New Frontier of Vision-Language Deep Research Agent](https://arxiv.org/pdf/2508.05748)<br>\n[6] [WebResearcher: Unleashing unbounded reasoning capability in Long-Horizon Agents](https://arxiv.org/pdf/2509.13309)<br>\n[7] [ReSum: Unlocking Long-Horizon Search Intelligence via Context Summarization](https://arxiv.org/pdf/2509.13313)<br>\n[8] [WebWeaver: Structuring Web-Scale Evidence with Dynamic Outlines for Open-Ended Deep Research](https://arxiv.org/pdf/2509.13312)<br>\n[9] [WebSailor-V2: Bridging the Chasm to Proprietary Agents via Synthetic Data and Scalable Reinforcement Learning](https://arxiv.org/pdf/2509.13305)<br>\n[10] [Scaling Agents via Continual Pre-training](https://arxiv.org/pdf/2509.13310)<br>\n[11] [Towards General Agentic Intelligence via Environment Scaling](https://arxiv.org/pdf/2509.13311)<br>\n[12] [AgentFold: Long-Horizon Web Agents with Proactive Context Management](https://arxiv.org/pdf/2510.24699)<br>\n[13] [WebLeaper: Empowering Efficient, Info-Rich Seeking for Web Agents](https://arxiv.org/pdf/2510.24697)<br>\n[14] [BrowseConf: Confidence-Guided Test-Time Scaling for Web Agents](https://arxiv.org/pdf/2510.23458)<br>\n[15] [Repurposing Synthetic Data for Fine-grained Search Agent Supervision](https://arxiv.org/pdf/2510.24694)<br>\n[16] [ParallelMuse: Agentic Parallel Thinking for Deep Information Seeking](https://arxiv.org/pdf/2510.24698)<br>\n[17] [AgentFrontier: Expanding the Capability Frontier of LLM Agents with ZPD-Guided Data Synthesis](https://arxiv.org/pdf/2510.24695)<br>\n[18] [Nested Browser-Use Learning for Agentic Information Seeking](https://arxiv.org/pdf/2512.23647)<br>\n\n## 🌟 Misc\n\n<div align=\"center\">\n\n[![Star History Chart](https://api.star-history.com/svg?repos=Alibaba-NLP/DeepResearch&type=Date)](https://www.star-history.com/#Alibaba-NLP/DeepResearch&Date)\n\n</div>\n\n## 🚩 Talent Recruitment\n\n🔥🔥🔥 We are hiring! Research intern positions are open (based in Hangzhou、Beijing、Shanghai)\n\n📚 **Research Area**：Web Agent, Search Agent, Agent RL, MultiAgent RL, Agentic RAG\n\n☎️ **Contact**：[yongjiang.jy@alibaba-inc.com]()\n\n## Contact Information\n\nFor communications, please contact Yong Jiang (yongjiang.jy@alibaba-inc.com).\n\n## Citation\n\n```bibtex\n@article{tongyidr,\n  title={Tongyi DeepResearch Technical Report},\n  author={Team, Tongyi DeepResearch and Li, Baixuan and Zhang, Bo and Zhang, Dingchu and Huang, Fei and Li, Guangyu and Chen, Guoxin and Yin, Huifeng and Wu, Jialong and Zhou, Jingren and others},\n  journal={arXiv preprint arXiv:2510.24701},\n  year={2025}\n}\n```\n","summary":"Tongyi DeepResearch is an agentic large language model developed by Alibaba’s Tongyi Lab specifically designed to excel at long-horizon, deep information-seeking tasks. The project features a highly efficient 30.5 billion parameter architecture that utilizes only 3.3 billion activated parameters per token, supported by a fully automated synthetic data generation pipeline. With state-of-the-art performance across numerous agentic search benchmarks, the model is an ideal solution for researchers and developers requiring sophisticated autonomous reasoning and web-based research capabilities.","description":"Tongyi Deep Research, the Leading Open-source Deep Research Agent","stars":19186,"language":"Python"},{"owner":"landing-ai","repo":"agentic-doc","url":"https://github.com/landing-ai/agentic-doc","readme":"### DEPRECATION WARNING\n\n⚠️⚠️⚠️ The agentic-doc Python library is now legacy. Please migrate to the new [landingai-ade library](https://github.com/landing-ai/ade-python), which is now the official Python library for Agentic Document Extraction and supports our newer API endpoints.\n\n<div align=\"center\">\n\n# Agentic Document Extraction – Python Library\n\n[![Unit test status](https://github.com/landing-ai/agentic-doc/actions/workflows/ci-unit.yml/badge.svg)](https://github.com/landing-ai/agentic-doc/actions/workflows/ci-unit.yml)\n[![Integration test status](https://github.com/landing-ai/agentic-doc/actions/workflows/ci-integ.yml/badge.svg)](https://github.com/landing-ai/agentic-doc/actions/workflows/ci-integ.yml)\n[![](https://dcbadge.vercel.app/api/server/wPdN8RCYew?compact=true&style=flat)](https://discord.gg/RVcW3j9RgR)\n[![PyPI version](https://badge.fury.io/py/agentic-doc.svg)](https://badge.fury.io/py/agentic-doc)\n\n**[Web App](https://va.landing.ai/demo/doc-extraction) · [Discord](https://discord.com/invite/RVcW3j9RgR) · [Blog](https://landing.ai/blog/going-beyond-ocrllm-introducing-agentic-document-extraction) · [Docs](https://support.landing.ai/docs/document-extraction)**\n\n</div>\n\n## Overview\n\nThe LandingAI **Agentic Document Extraction** API pulls structured data out of visually complex documents—think tables, pictures, and charts—and returns a hierarchical JSON with exact element locations.\n\nThis Python library wraps that API to provide:\n\n* **Long‑document support** – process 100+ page PDFs in a single call\n* **Auto‑retry / paging** – handles concurrency, time‑outs, and rate limits\n* **Helper utilities** – bounding‑box snippets, visual debuggers, and more\n\n### Features\n\n- 📦 **Batteries‑included install:** `pip install agentic-doc` – nothing else needed → see [Installation](#installation)\n- 🗂️ **All file types:** parse PDFs of *any* length, single images, or URLs → see [Supported Files](#supported-files)\n- 📚 **Long‑doc ready:** auto‑split & parallel‑process 1000+ page PDFs, then stitch results → see [Parse Large PDF Files](#parse-large-pdf-files)\n- 🧩 **Structured output:** returns hierarchical JSON plus ready‑to‑render Markdown → see [Result Schema](#result-schema)\n- 👁️ **Ground‑truth visuals:** optional bounding‑box snippets and full‑page visualizations → see [Save Groundings as Images](#save-groundings-as-images)\n- 🏃 **Batch & parallel:** feed a list; library manages threads & rate limits (`BATCH_SIZE`, `MAX_WORKERS`) → see [Parse Multiple Files in a Batch](#parse-multiple-files-in-a-batch)\n- 🔄 **Resilient:** exponential‑backoff retries for 408/429/502/503/504 and rate‑limit hits → see [Automatically Handle API Errors and Rate Limits with Retries](#automatically-handle-api-errors-and-rate-limits-with-retries)\n- ⚙️ **Config via env / .env:** tweak parallelism, logging style, retry caps—no code changes → see [Configuration Options](#configuration-options)\n- 🌐 **Raw API ready:** advanced users can still hit the REST endpoint directly → see the [API Docs](https://support.landing.ai/docs/document-extraction)\n\n\n## Quick Start\n\n### Installation\n\n```bash\npip install agentic-doc\n```\n\n### Requirements\n- Python version 3.9, 3.10, 3.11 or 3.12\n- LandingAI agentic AI API key (get the key [here](https://va.landing.ai/settings/api-key))\n\n### Set the API Key as an Environment Variable\nAfter you get the LandingAI agentic AI API key, set the key as an environment variable (or put it in a `.env` file):\n\n```bash\nexport VISION_AGENT_API_KEY=<your-api-key>\n```\n\n### Supported Files\nThe library can extract data from:\n- PDFs (any length)\n- Images that are supported by OpenCV-Python (i.e. the `cv2` library)\n- URLs pointing to PDF or image files\n\n### Basic Usage\n\n#### Extract Data from One Document\nRun the following script to extract data from one document and return the results in both markdown and structured chunks.\n\n```python\nfrom agentic_doc.parse import parse\n\n# Parse a local file\nresult = parse(\"path/to/image.png\")\nprint(result[0].markdown)  # Get the extracted data as markdown\nprint(result[0].chunks)  # Get the extracted data as structured chunks of content\n\n# Parse a document from a URL\nresult = parse(\"https://example.com/document.pdf\")\nprint(result[0].markdown)\n\n#### Extract Data from Multiple Documents\nRun the following script to extract data from multiple documents.\n\n```python\nfrom agentic_doc.parse import parse\n\n# Parse multiple local files\nfile_paths = [\"path/to/your/document1.pdf\", \"path/to/another/document2.pdf\"]\nresults = parse(file_paths)\nfor result in results:\n    print(result.markdown)\n\n# Parse and save results to a directory\nresults = parse(file_paths, result_save_dir=\"path/to/save/results\")\nresult_paths = []\nfor result in results:\n    result_paths.append(result.result_path)\n# result_paths: [\"path/to/save/results/document1_20250313_070305.json\", ...]\n```\n\n\n#### Using field extraction\n\n```python\nfrom pydantic import BaseModel, Field\nfrom agentic_doc.parse import parse\n\nclass ExtractedFields(BaseModel):\n    employee_name: str = Field(description=\"the full name of the employee\")\n    employee_ssn: str = Field(description=\"the social security number of the employee\")\n    gross_pay: float = Field(description=\"the gross pay of the employee\")\n    employee_address: str = Field(description=\"the address of the employee\")\n\nresults = parse(\"mydoc.pdf\", extraction_model=ExtractedFields)\nfields = results[0].extraction\nmetadata = results[0].extraction_metadata\nprint(f\"Field value: {fields.employee_name}, confidence: {metadata.employee_name.confidence}\")\n```\n\n\n#### Extract Data Using Connectors\nThe library now supports various connectors to easily access documents from different sources:\n\n##### Google Drive Connector\n\n**Prerequisites: Follow the [Google Drive API Python Quickstart](https://developers.google.com/workspace/drive/api/quickstart/python) tutorial first to set up your credentials.**\n\nThe Google Drive API quickstart will guide you through:\n1. Creating a Google Cloud project\n2. Enabling the Google Drive API\n3. Setting up OAuth 2.0 credentials\n\nAfter completing the quickstart tutorial, you can use the Google Drive connector as follows:\n\n```python\nfrom agentic_doc.parse import parse\nfrom agentic_doc.connectors import GoogleDriveConnectorConfig\n\n# Using OAuth credentials file (from quickstart tutorial)\nconfig = GoogleDriveConnectorConfig(\n    client_secret_file=\"path/to/credentials.json\",\n    folder_id=\"your-google-drive-folder-id\"  # Optional\n)\n\n# Parse all documents in the folder\nresults = parse(config)\n\n# Parse with filtering\nresults = parse(config, connector_pattern=\"*.pdf\")\n```\n\n##### Amazon S3 Connector\n```python\nfrom agentic_doc.parse import parse\nfrom agentic_doc.connectors import S3ConnectorConfig\n\nconfig = S3ConnectorConfig(\n    bucket_name=\"your-bucket-name\",\n    aws_access_key_id=\"your-access-key\",  # Optional if using IAM roles\n    aws_secret_access_key=\"your-secret-key\",  # Optional if using IAM roles\n    region_name=\"us-east-1\"\n)\n\n# Parse all documents in the bucket\nresults = parse(config)\n\n# Parse documents in a specific prefix/folder\nresults = parse(config, connector_path=\"documents/\")\n```\n\n##### Local Directory Connector\n```python\nfrom agentic_doc.parse import parse\nfrom agentic_doc.connectors import LocalConnectorConfig\n\nconfig = LocalConnectorConfig()\n\n# Parse all supported documents in a directory\nresults = parse(config, connector_path=\"/path/to/documents\")\n\n# Parse with pattern filtering\nresults = parse(config, connector_path=\"/path/to/documents\", connector_pattern=\"*.pdf\")\n\n# Parse all supported documents in a directory recursively (search subdirectories as well)\nconfig = LocalConnectorConfig(recursive=True)\nresults = parse(config, connector_path=\"/path/to/documents\")\n```\n\n##### URL Connector\n```python\nfrom agentic_doc.parse import parse\nfrom agentic_doc.connectors import URLConnectorConfig\n\nconfig = URLConnectorConfig(\n    headers={\"Authorization\": \"Bearer your-token\"},  # Optional\n    timeout=60  # Optional\n)\n\n# Parse document from URL\nresults = parse(config, connector_path=\"https://example.com/document.pdf\")\n```\n\n#### Raw Bytes Input\n\n```python\nfrom agentic_doc.parse import parse\n\n# Load a PDF or image file as bytes\nwith open(\"document.pdf\", \"rb\") as f:\n    raw_bytes = f.read()\n\n# Parse the document from bytes\nresults = parse(raw_bytes)\n```\n\nYou can also parse image bytes:\n\n```python\nwith open(\"image.png\", \"rb\") as f:\n    image_bytes = f.read()\n\nresults = parse(image_bytes)\n```\n\nThis is useful when documents are already loaded into memory (e.g., from an API response or uploaded via a web interface). The parser will auto-detect the file type from the bytes.\n\n\n## Why Use It?\n\n- **Simplified Setup:** No need to manage API keys or handle low-level REST calls.\n- **Automatic Large File Processing:** Splits large PDFs into manageable parts and processes them in parallel.\n- **Built-In Error Handling:** Automatically retries requests with exponential backoff and jitter for common HTTP errors.\n- **Parallel Processing:** Efficiently parse multiple documents at once with configurable parallelism.\n\n## Main Features\n\nWith this library, you can do things that are otherwise hard to do with the Agentic Document Extraction API alone.\nThis section describes some of the key features this library offers.\n\n### Parse Large PDF Files\n\n**A single REST API call can only handle up to certain amount of pages at a time** (see [rate limits](https://docs.landing.ai/ade/ade-rate-limits#maximum-pages-per-document)). This library automatically splits a large PDF into multiple calls, uses a thread pool to process the calls in parallel, and stitches the results back together as a single result.\n\nWe've used this library to successfully parse PDFs that are 1000+ pages long.\n\n### Parse Multiple Files in a Batch\n\nYou can parse multiple files in a single function call with this library. The library processes files in parallel.\n\n> **NOTE:** You can change the parallelism by setting the `batch_size` setting.\n\n### Save Groundings as Images\n\nThe library can extract and save the visual regions (groundings) of the document where each chunk of content was found. This is useful for visualizing exactly what parts of the document were extracted and for debugging extraction issues.\n\nEach grounding represents a bounding box in the original document, and the library can save these regions as individual PNG images. The images are organized by page number and chunk ID.\n\nHere's how to use this feature:\n\n```python\nfrom agentic_doc.parse import parse\n\n# Parse a document from a URL & save groundings\nresults = parse([\"https://www.rbcroyalbank.com/banking-services/_assets-custom/pdf/eStatement.pdf\"],\n                grounding_save_dir=\"./grounding\")\n\n\n# Print the path to each saved grounding\nfor chunk in results[0].chunks:\n    for grounding in chunk.grounding:\n        if grounding.image_path:\n            print(f\"Grounding saved to: {grounding.image_path}\")\n```\n\n\n### Visualize Parsing Results\n\nThe library provides a visualization utility that creates annotated images showing where each chunk of content was extracted from the document. This is useful for:\n- Verifying the accuracy of the extraction\n- Debugging extraction issues\n\nHere's how to use the visualization feature:\n\n```python\nfrom agentic_doc.parse import parse\nfrom agentic_doc.utils import viz_parsed_document\nfrom agentic_doc.config import VisualizationConfig\n\n# Parse a document\nresults = parse(\"path/to/document.pdf\")\nparsed_doc = results[0]\n\n# Create visualizations with default settings\n# The output images have a PIL.Image.Image type\nimages = viz_parsed_document(\n    \"path/to/document.pdf\",\n    parsed_doc,\n    output_dir=\"path/to/save/visualizations\"\n)\n\n# Or customize the visualization appearance\nviz_config = VisualizationConfig(\n    thickness=2,  # Thicker bounding boxes\n    text_bg_opacity=0.8,  # More opaque text background\n    font_scale=0.7,  # Larger text\n    # Custom colors for different chunk types\n    color_map={\n        ChunkType.TITLE: (0, 0, 255),  # Red for titles\n        ChunkType.TEXT: (255, 0, 0),  # Blue for regular text\n        # ... other chunk types ...\n    }\n)\n\nimages = viz_parsed_document(\n    \"path/to/document.pdf\",\n    parsed_doc,\n    output_dir=\"path/to/save/visualizations\",\n    viz_config=viz_config\n)\n\n# The visualization images will be saved as:\n# path/to/save/visualizations/document_viz_page_X.png\n# Where X is the page number\n```\n\nThe visualization shows:\n- Bounding boxes around each extracted chunk\n- Chunk type and index labels\n- Different colors for different types of content (titles, text, tables, etc.)\n- Semi-transparent text backgrounds for better readability\n\n### Automatically Handle API Errors and Rate Limits with Retries\n\nThe REST API endpoint imposes rate limits per API key. This library automatically handles the rate limit error or other intermittent HTTP errors with retries.\n\nFor more information, see [Error Handling](#error-handling) and [Configuration Options](#configuration-options).\n\n### Error Handling\n\nThis library implements a retry mechanism for handling API failures:\n\n- Retries are performed for these HTTP status codes: 408, 429, 502, 503, 504.\n- Exponential backoff with jitter is used for retry wait time.\n- The initial retry wait time is 1 second, which increases exponentially.\n- Retry will stop after `max_retries` attempts. Exceeding the limit raises an exception and results in a failure for this request.\n- Retry wait time is capped at `max_retry_wait_time` seconds.\n- Retries include a random jitter of up to 10 seconds to distribute requests and prevent the thundering herd problem.\n\n### Parsing Errors\n\nIf the REST API request encounters an unrecoverable error during parsing (either from client-side or server-side), the library includes an [errors](./agentic_doc/common.py#L75) field in the final result for the affected page(s).\nEach error contains the error message, error_code and corresponding page number.\n\n## Configuration Options\n\nThe library uses a [`Settings`](./agentic_doc/config.py) object to manage configuration. You can customize these settings either through environment variables or a `.env` file:\n\nBelow is an example `.env` file that customizes the configurations:\n\n```bash\n# Number of files to process in parallel, defaults to 4\nBATCH_SIZE=4\n# Number of threads used to process parts of each file in parallel, defaults to 5.\nMAX_WORKERS=2\n# Maximum number of retry attempts for failed intermittent requests, defaults to 100\nMAX_RETRIES=80\n# Maximum wait time in seconds for each retry, defaults to 60\nMAX_RETRY_WAIT_TIME=30\n# Logging style for retry, defaults to log_msg\nRETRY_LOGGING_STYLE=log_msg\n```\n\n### Max Parallelism\n\nThe maximum number of parallel requests is determined by multiplying `BATCH_SIZE` × `MAX_WORKERS`.\n\n> **NOTE:** The maximum parallelism allowed by this library is 100.\n\nSpecifically, increasing `MAX_WORKERS` can speed up the processing of large individual files, while increasing `BATCH_SIZE` improves throughput when processing multiple files.\n\n> **NOTE:** Your job's maximum processing throughput may be limited by your API rate limit. If your rate limit isn't high enough, you may encounter rate limit errors, which the library will automatically handle through retries.\n\nThe optimal values for `MAX_WORKERS` and `BATCH_SIZE` depend on your API rate limit and the latency of each REST API call. For example, if your account has a rate limit of 5 requests per minute, and each REST API call takes approximately 60 seconds to complete, and you're processing a single large file, then `MAX_WORKERS` should be set to 5 and `BATCH_SIZE` to 1.\n\nYou can find your REST API latency in the logs. If you want to increase your rate limit, schedule a time to meet with us [here](https://scheduler.zoom.us/d/56i81uc2/landingai-document-extraction).\n\n### Set `RETRY_LOGGING_STYLE`\n\nThe `RETRY_LOGGING_STYLE` setting controls how the library logs the retry attempts.\n\n- `log_msg`: Log the retry attempts as a log messages. Each attempt is logged as a separate message. This is the default setting.\n- `inline_block`: Print a yellow progress block ('█') on the same line. Each block represents one retry attempt. Choose this if you don't want to see the verbose retry logging message and still want to track the number of retries that have been made.\n- `none`: Do not log the retry attempts.\n\n\n## Troubleshooting & FAQ\n\n### Common Issues\n- **API Key Errors:**\n  Ensure your API key is correctly set as an environment variable.\n- **Rate Limits:**\n  The library automatically retries requests if you hit the API rate limit. Adjust `BATCH_SIZE` or `MAX_WORKERS` if you encounter frequent rate limit errors.\n- **Parsing Failures:**\n  If a document fails to parse, an error chunk will be included in the result, detailing the error message and page index.\n- **URL Access Issues:**\n  If you're having trouble accessing documents from URLs, check that the URLs are publicly accessible and point to supported file types (PDF or images).\n\n### Note on `include_marginalia` and `include_metadata_in_markdown`\n\n- `include_marginalia`: If True, the parser will attempt to extract and include marginalia (footer notes, page number, etc.) from the document in the output.\n- `include_metadata_in_markdown`: If True, the output markdown will include metadata.\n\nBoth parameters default to True. You can set them to False to exclude these elements from the output.\n\n#### Example: Using the new parameters\n\n```python\nfrom agentic_doc.parse import parse\n\nresults = parse(\n    \"path/to/document.pdf\",\n    include_marginalia=False,  # Exclude marginalia from output\n    include_metadata_in_markdown=False  # Exclude metadata from markdown\n)\n```\n","summary":"The Agentic Document Extraction Python library is a legacy tool designed to pull structured data and hierarchical JSON from complex documents, including those containing tables, charts, and images. It provides robust capabilities such as long-document processing, automated batching with retry logic, and built-in visual debugging utilities for document analysis. Developers and data engineers needing to convert visually dense PDFs or images into machine-readable formats will benefit from its structured output and simplified API integration. Please note that this project is now deprecated, and users should transition to the official `landingai-ade` library for continued support.","description":"Legacy Python library for Agentic Document Extraction (ADE). Use the landingai-ade library for all new projects.","stars":2400,"language":"Python"},{"owner":"embabel","repo":"embabel-agent","url":"https://github.com/embabel/embabel-agent","readme":"# Embabel Agent Framework\n\n<img align=\"left\" src=\"https://github.com/embabel/embabel-agent/blob/main/embabel-agent-api/images/315px-Meister_der_Weltenchronik_001.jpg?raw=true\" width=\"180\">\n\n[![Docs](https://img.shields.io/badge/docs-live-brightgreen)](https://docs.embabel.com/embabel-agent/guide/0.1.2-SNAPSHOT/)\n[![MvnRepository](https://badges.mvnrepository.com/badge/com.embabel.agent/embabel-agent-api/badge.svg?label=MvnRepository)](https://mvnrepository.com/artifact/com.embabel.agent/embabel-agent-api)\n![Build](https://github.com/embabel/embabel-agent/actions/workflows/maven.yml/badge.svg)\n[![YourKit](https://img.shields.io/badge/Profiling-YourKit-blue)](https://www.yourkit.com/)\n[![JProfiler](https://img.shields.io/badge/Profiled%20with-JProfiler-blue)](https://www.ej-technologies.com/products/jprofiler/overview.html)\n[![Quality Gate Status](https://sonarcloud.io/api/project_badges/measure?project=embabel_embabel-agent&metric=alert_status)](https://sonarcloud.io/summary/new_code?id=embabel_embabel-agent)\n[![Discord](https://img.shields.io/discord/1277751399261798401?logo=discord)](https://discord.gg/t6bjkyj93q)\n\n[//]: # ([![Quality Gate Status]&#40;https://sonarcloud.io/api/project_badges/measure?project=embabel_embabel-agent&metric=alert_status&token=d275d89d09961c114b8317a4796f84faf509691c&#41;]&#40;https://sonarcloud.io/summary/new_code?id=embabel_embabel-agent&#41;)\n\n[//]: # ([![Bugs]&#40;https://sonarcloud.io/api/project_badges/measure?project=embabel_embabel-agent&metric=bugs&#41;]&#40;https://sonarcloud.io/summary/new_code?id=embabel_embabel-agent&#41;)\n![Kotlin](https://img.shields.io/badge/kotlin-%237F52FF.svg?style=for-the-badge&logo=kotlin&logoColor=white)\n![Java](https://img.shields.io/badge/java-%23ED8B00.svg?style=for-the-badge&logo=openjdk&logoColor=white)\n![Spring](https://img.shields.io/badge/spring-%236DB33F.svg?style=for-the-badge&logo=spring&logoColor=white)\n![Spring Boot](https://img.shields.io/badge/Spring%20Boot-6DB33F.svg?style=for-the-badge&logo=Spring-Boot&logoColor=white)\n![Apache Tomcat](https://img.shields.io/badge/apache%20tomcat-%23F8DC75.svg?style=for-the-badge&logo=apache-tomcat&logoColor=black)\n![Apache Maven](https://img.shields.io/badge/Apache%20Maven-C71A36?style=for-the-badge&logo=Apache%20Maven&logoColor=white)\n![JUnit](https://img.shields.io/badge/JUnit5-25A162.svg?style=for-the-badge&logo=JUnit5&logoColor=white)\n![ChatGPT](https://img.shields.io/badge/chatGPT-74aa9c?style=for-the-badge&logo=openai&logoColor=white)\n![Jinja](https://img.shields.io/badge/jinja-white.svg?style=for-the-badge&logo=jinja&logoColor=black)\n![JSON](https://img.shields.io/badge/JSON-000?logo=json&logoColor=fff)\n![GitHub Actions](https://img.shields.io/badge/github%20actions-%232671E5.svg?style=for-the-badge&logo=githubactions&logoColor=white)\n![SonarQube](https://img.shields.io/badge/SonarQube-black?style=for-the-badge&logo=sonarqube&logoColor=4E9BCD)\n![Docker](https://img.shields.io/badge/docker-%230db7ed.svg?style=for-the-badge&logo=docker&logoColor=white)\n![IntelliJ IDEA](https://img.shields.io/badge/IntelliJIDEA-000000.svg?style=for-the-badge&logo=intellij-idea&logoColor=white)\n[![License](https://img.shields.io/github/license/embabel/embabel-agent?style=for-the-badge&logo=apache&color=brightgreen)](https://www.apache.org/licenses/LICENSE-2.0)\n[![Commits](https://img.shields.io/github/commit-activity/m/embabel/embabel-agent.svg?label=commits&style=for-the-badge&logo=git&logoColor=white)](https://github.com/embabel/embabel-agent/pulse)\n\n&nbsp;&nbsp;&nbsp;&nbsp;\n\nEmbabel (Em-BAY-bel) is a framework for authoring agentic flows on the JVM that seamlessly mix LLM-prompted interactions\nwith code and domain models. Supports\nintelligent path finding towards goals. Written in Kotlin\nbut offers a natural usage\nmodel from Java.\nFrom the creator of Spring.\n\n&nbsp;\n\n## Key Concepts\n\nModels agentic flows in terms of:\n\n- **Actions**: Steps an agent takes\n- **Goals**: What an agent is trying to achieve\n- **Conditions**: Conditions to assess before executing an action or determining that a goal has been achieved.\n  Conditions are reassessed after each action is executed.\n- **Domain model**: Objects underpinning the flow and informing Actions, Goals and Conditions.\n- **Plan**: A sequence of actions to achieve a goal. Plans are dynamically formulated by the system, not the programmer.\n  The\n  system replans after the completion of each action, allowing it to adapt to new information as well as observe the\n  effects of the previous action.\n  This is effectively an [OODA loop](https://en.wikipedia.org/wiki/OODA_loop).\n\n> Application developers don't usually have to deal with these concepts directly,\n> as most conditions result from data flow defined in code, allowing the system to infer\n> pre and post conditions.\n\nThese concepts underpin these differentiators versus other agent frameworks:\n\n- **Sophisticated planning.** Goes beyond a finite state machine or sequential execution\n  with nesting by introducing a true planning step, using a\n  non-LLM AI algorithm. This enables the system to perform tasks it wasn’t programmed to do by combining known\n  steps in\n  a novel order, as well as make decisions about parallelization and other runtime behavior.\n- **Superior extensibility and reuse**: Because of dynamic planning, adding more domain objects, actions, goals and\n  conditions\n  can extend the capability of the system, _without editing FSM definitions_ or existing code.\n- **Strong typing and the benefits of object orientation**: Actions, goals and conditions are informed by a domain\n  model, which can\n  include behavior. Everything is strongly typed and prompts and\n  manually authored code interact cleanly. No more magic maps. Enjoy full refactoring support.\n\nOther benefits:\n\n- **Platform abstraction**: Clean separation between programming model and platform internals allows running locally\n  while\n  potentially offering higher QoS in production without changing application code.\n- **Designed for LLM mixing**: It is easy to build applications that mix LLMs, ensuring the most cost-effective yet\n  capable solution.\n  This enables the system to leverage the strengths of different models for different tasks. In particular, it\n  facilitates\n  the use of local models for point tasks. This can be important for cost and privacy.\n- **Built on Spring and the JVM,** making it easy to access existing enterprise functionality and capabilities.\n  For example:\n    - Spring can inject and manage agents, including using Spring AOP to decorate functions.\n    - Robust persistence and transaction management solutions are available.\n- **Designed for testability** from the ground up. Both unit testing and agent end to end testing are easy.\n\nFlows can be authored in one of two ways:\n\n- An annotation-based model similar to Spring MVC, with types annotated with the Spring stereotype `@Agent`, using\n  `@Goal`, `@Condition` and\n  `@Action` methods.\n- Idiomatic Kotlin DSL with `agent {` and `action {` blocks.\n\nEither way, flows are backed by a domain model of objects that can have rich behavior.\n\n> We are working toward allowing natural language actions and goals to be deployed.\n\nThe planning step is pluggable.\n\nThe default planning approach is\n[Goal Oriented Action Planning](https://medium.com/@vedantchaudhari/goal-oriented-action-planning-34035ed40d0b).\nGOAP is a popular AI planning algorithm used in gaming. It allows for dynamic decision-making and action selection based\non the current state of the world and the goals of the agent.\n\nGoals, actions and plans are independent of GOAP. Embabel also\nsupports [Utility AI](https://en.wikipedia.org/wiki/Utility_system) out of the box, which can run the same actions but\nchooses actions\nbased on (potentially dynamic) utility scores rather than strict preconditions and postconditions. This is valuable for\nexploration and\nopen-ended tasks, when we do not need to achieve a specific goal but want to maximize overall utility.\n\nThe framework executes via an `AgentPlatform` implementation.\n\nAn agent platform supports the following modes of execution:\n\n- **Focused**, where user code requests particular functionality: User code calls a method to run a particular agent,\n  passing in input. This is ideal for code-driven flows such as a flow invoked in response to an incoming event.\n- **Closed**, where user intent (or another incoming event) is classified to choose an agent. The platform tries to\n  find a\n  suitable agent among all the agents it knows about.\n  Agent choice is dynamic, but only actions defined within the particular agent\n  will run.\n- **Open**, where the user's intent is assessed and the platform uses _all_ its resources to try to achieve it. The\n  platform tries to find a\n  suitable goal among all the goals it knows about and builds a custom agent to achieve it from the start state,\n  including relevant actions and conditions. The platform will not proceed if it is unconvinced as to the applicability\n  of any goal. The `GoalChoiceApprover` interface provides developers a way to limit goal choice further.\n\nOpen mode is the most powerful, but least deterministic.\n> In open mode, the platform is capable of finding novel paths that were not envisioned by developers, and even\n> combining functionality from multiple providers.\n\nEven in open mode, the platform will only perform individual steps\nthat have been specified. (Of course, steps may themselves be LLM\ntransforms, in which case the prompts are controlled by user code but the\nresults are still non-deterministic.)\n\nPossible future modes:\n\n- **Evolving** mode: Where the platform can work with multiple goals in the same process and modify a running process to\n  add further goals and agents.\n  For example, an action can realize that it has become important to achieve additional goals.\n\nEmbabel agent systems will also support federation, both with other Embabel systems (allowing planning to incorporate\nremote actions and goals) and third party agent frameworks.\n\n## Quick Start\n\nGet an agent running in under 5 minutes.\n\nCreate your own agent repo from our [Java](https://github.com/embabel/java-agent-template)\nor [Kotlin](https://github.com/embabel/kotlin-agent-template) GitHub template by clicking the \"Use this template\"\nbutton.\n\nYou'll have an agent running in under a minute\nif you already have an `OPENAI_API_KEY` and have Maven installed.\n\n**📚 For examples and tutorials**, see\nthe [Embabel Agent Examples Repository](https://github.com/embabel/embabel-agent-examples)\n\n**🚗 For a sophisticated, realistic example application**, see\nthe [Tripper travel planner agent](https://github.com/embabel/tripper)\n\n<img src=\"images/tripper_output1.jpg\" alt=\"Travel Planner Output\" width=\"600\"/>\n\n*AI-generated travel itinerary with detailed recommendations*\n\n<img src=\"images/tripper_map.jpg\" alt=\"Interactive map\" width=\"600\"/>\n\n*Map link included in output*\n\n## Why Is Embabel Needed?\n\nTL;DR Because the evolution of agent frameworks is early and there's a lot of room for improvement; because an agent\nframework on the JVM will deliver great business value.\n\n- _Why do we need an agent framework at all_? We can write code without higher level abstractions, directly invoking\n  LLMs
